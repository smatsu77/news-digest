グループが、未成年者へのジェンダー適合医療を禁じるテネシー州の法律を支持した。\n\nタイトルXの家族計画から性的暴行防止訓練まで、女性と少女を支援する政府プログラムを潰し、公務員から閣僚まで女性を不均衡な割合で解雇してきた政権が、今や「女性を守っている」という。女性を「陰部を掴む」ことは問題ないと言った男が、トランスジェンダーの女子生徒を「女性と少女の危険と侮辱」の原因として非難している。判事に就任する前に性的暴行の申し立てを否定した男が、差別的な禁止措置がいかに女性アスリートへの公正を救うかという法的根拠を書いている。\n\n擬似フェミニズムとともに、右派は身体的自律への戦争において擬似科学を駆使している。中絶反対派は胎児の痛みと「中絶後症候群」を作り上げ、早期妊娠の生存可能性と中絶の医学的リスクの両方を誇張している。彼らはジェンダーの「補完性」という宗教的原則の同盟者として自然を利用する。すなわち、男性は強く、女性は弱い。男性はリードし、女性は従うべきだというものだ。\n\nトランス排除の言説も、人間の生物学と関係について同様のピンクとブルーのビジョンを提示している。クラレンス・トーマス判事は女性スポーツの件に関する補足意見でその理論を要約した。「性別違和感を持つ男性と男の子」——本人が経験する性別と出生時に割り当てられた性別の不一致を表す医学用語——「は、たとえ自分がそうだと信じていても、女性や少女ではない」と彼は書いた。「性別は不変の『生物学的』特性だ……それは二元的であり、『男性』と『女性』、『少年』と『少女』は、各性別の成人と子どもに対応する言葉だ……現実を曖昧にするために言語を使うこと——『真実に対する無関心を示す』こと——は嘘をつくことだ」", "vocab": [{"word": "bodily autonomy", "definition": "身体的自律（権）。自分の身体に関する決定を自ら下す権利のこと。医療・生殖・ジェンダーの議論でよく使われる概念。"}, {"word": "constitutionality", "definition": "合憲性。ある法律や行為が憲法の規定に適合しているかどうかを指す法律用語。"}, {"word": "protean", "definition": "多様な、変幻自在の。ギリシャ神話の変身の神プロテウスに由来し、容易に形や性質が変わることを表す高度な形容詞。"}, {"word": "draconian", "definition": "厳酷な、過酷な。古代アテナイの立法者ドラコンに由来し、法律や規制が極めて厳しく容赦のないことを表す。"}, {"word": "vilifying", "definition": "中傷する、悪者扱いする。特定の人物や集団について悪意を持って否定的なイメージを広める行為を指す。"}, {"word": "complementarity", "definition": "補完性。ここでは宗教的・保守的な文脈で、男女は本質的に異なる役割を持ち互いを補完するという考え方を指す。"}, {"word": "pseudoscience", "definition": "擬似科学。科学的に見せかけているが、実際には科学的根拠や検証に欠ける主張や理論のこと。"}]}, {"title_ja": "パレスチナ国家を建設せよ：米国のパレスチナ自治支援の必要性", "title_en": "Build a Palestinian State: The Case for U.S. Commitment to Palestinian Self-Governance", "summary_ja": "筆者は、米国とイスラエルの関係を再調整することは必要だが、中東の安定には不十分であり、米国はパレスチナの独立国家建設を支援することを優先しなければならないと主張する。2007年から2011年にかけてのサラム・ファイヤード首相の下での制度構築の成功事例を踏まえ、パレスチナ問題を真の自治によって解決しない限り、持続可能な地域平和は実現しないと論じている。", "summary_en": "The author argues that recalibrating the U.S.-Israel relationship is necessary but insufficient for Middle East stability, and that the United States must prioritize helping Palestinians build an independent state. Drawing on the relative success of Palestinian institution-building under Prime Minister Salam Fayyad from 2007 to 2011, the author contends that sustainable regional peace is impossible without resolving the Palestinian question through genuine self-governance.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/palestinian-territories/build-palestinian-state", "state_media": false, "category": "オピニオン", "full_text": "In recent months, the U.S.-Israeli relationship has been subjected to unprecedented scrutiny from all sides. Forty Democratic senators voted to block an arms sale to Israel in April because of the Israeli government’s actions in Gaza, Iran, and Lebanon, a vote that would have been unimaginable only a year earlier. Last December in Foreign Affairs, Andrew Miller made the case for a “normal” relationship between the two countries that ends the blank-check support the United States has provided to Israel over the years. In the wake of the Iran war, the chorus of critics has come to include members of U.S. President Donald’s Trump’s coalition, many of whom see Israel as responsible for dragging the country into an unnecessary and costly conflict.\nRecalibrating the relationship between the United States and Israel is a necessary shift in American policy as Washington seeks to turn its focus away from the Middle East and toward other priorities. But recalibration alone is insufficient. If the United States hopes to avoid being drawn back into conflicts in the region, it must first pursue a more stable regional order. And as Hamas’s October 7, 2023, attack on Israel and its aftermath have made painfully clear, any strategy that ignores the Palestinian issue is doomed to fail. Not every problem in the Middle East stems from the Israeli-Palestinian conflict, but the region will never be truly stable until it is resolved. That will happen only if Palestinians are given the opportunity to govern themselves.\nFor the past 15 years, Washington has done little to advance that outcome. It has instead treated the Palestinian file as an adjunct to the U.S.-Israeli relationship—an issue revisited only during intermittent peace processes and one in which nearly every decision is subordinated to Israeli preferences. That must change. The Trump administration may seem an unlikely agent for this change. But President Donald Trump is nothing if not unpredictable, and with his administration’s relationship to Israel in flux, there may be room for maneuver. And even if such a change does not happen under Trump, his successors in the White House will need a plan to treat ending the conflict as a geopolitical imperative. If the United States wants a more peaceful and stable Middle East, it must prioritize its bilateral relationship with the Palestinians. Put simply, it must help Palestinians build a state of their own.\nPROGRESSIVE ERA\nThe United States has pursued a nation-building strategy for the Palestinians in the recent past. The Palestinian Authority, the governing body established in the 1990s as part of the Oslo accords, made great strides from 2007 to 2011 under Prime Minister Salam Fayyad toward building institutions that could eventually support statehood. Fayyad improved the PA’s financial management and transparency, and with the help of a U.S.-led training program, professionalized its security forces. Combined with billions of dollars of aid from Washington and other international donors, these reforms delivered rapid economic growth, increasing GDP in the West Bank by an average of ten percent every year for the first four years of Fayyad’s tenure. In 2011, the World Bank concluded that Palestinian institutions were “well-positioned to establish a state at any point in the near future.” Public support followed performance: A majority of Palestinians approved of PA President Mahmoud Abbas and indicated they would vote for him; 58 percent supported the two-state framework; and over 60 percent backed diplomacy and nonviolence.\nAnalysts often attribute the PA’s successes during this time to Fayyad’s technocratic leadership. But Fayyad could not have succeeded if not for the favorable conditions that made his governing agenda possible. Chief among them was preexisting political legitimacy. Two years before he appointed Fayyad as prime minister, Abbas secured a broad mandate by winning 62 percent of the vote in the Palestinian presidential election. Abbas’s electoral mandate and the relative popularity of his Fatah party provided Fayyad with the political cover he needed to pursue ambitious fiscal transparency reforms and consolidate the PA’s security control across major cities in the West Bank. These reforms gave Palestinians reason to believe that their institutions could deliver meaningful gains toward statehood.\nFayyad’s PA also operated alongside an Israeli government that viewed strengthening Palestinian moderates as a strategic priority. Israeli Prime Minister Ehud Olmert engaged regularly with Abbas, facilitated the transfer of Palestinian tax revenues collected by Israel on the PA’s behalf, and eased restrictions on movement by Palestinians in the West Bank. This cooperation did not resolve core political disputes—Olmert and Abbas ultimately failed to reach a final-status agreement—but it enabled Palestinian institutions to function effectively and deliver for their constituents.\nThe promise of Palestinian domestic", "translation_ja": "ここ数ヶ月、米国とイスラエルの関係はあらゆる方面から前例のない scrutiny（精査）にさらされてきた。民主党上院議員40名が4月にイスラエルへの武器売却を阻止する投票を行ったが、これはガザ、イラン、レバノンにおけるイスラエル政府の行動を理由としたものであり、わずか1年前には想像もできなかった行動だ。昨年12月、フォーリン・アフェアーズ誌にてアンドリュー・ミラーは、米国がイスラエルに対して長年提供してきた無条件の支援を終わらせ、両国間の「普通の」関係を築くべきだと論じた。イランとの戦争を受けて、批判の声はドナルド・トランプ米大統領の支持連合のメンバーにまで及んでおり、その多くはイスラエルが米国を不必要かつ代償の大きい紛争に引き込んだと見ている。\n\n米国がその関心を中東から他の優先課題へと移そうとする中、米国とイスラエルの関係を再調整することは政策上必要な転換である。しかし、再調整だけでは不十分だ。米国が地域の紛争に再び引き込まれることを避けたいのであれば、まずより安定した地域秩序を追求しなければならない。そして、2023年10月7日のハマスによるイスラエルへの攻撃とその余波が痛切に示したように、パレスチナ問題を無視したいかなる戦略も失敗に終わる運命にある。中東のあらゆる問題がイスラエル・パレスチナ紛争に起因するわけではないが、この問題が解決されない限り、地域が真に安定することはない。そしてそれは、パレスチナ人が自らを統治する機会を与えられた場合にのみ実現する。\n\n過去15年間、ワシントンはその結果を促進するためにほとんど何もしてこなかった。代わりに、パレスチナ問題を米国・イスラエル関係の付属物として扱い、断続的な和平プロセスの際にのみ取り上げられ、ほぼすべての決定においてイスラエルの意向に従属させてきた。これは変わらなければならない。トランプ政権はこの変化をもたらす主体として似つかわしくないように見えるかもしれない。しかし、ドナルド・トランプ大統領は何よりも予測不可能な人物であり、政権のイスラエルとの関係が流動的な今、動く余地があるかもしれない。そして、たとえそのような変化がトランプ政権下で起こらないとしても、その後継者たちは紛争終結を地政学的な至上命題として扱う計画を必要とするだろう。米国がより平和で安定した中東を望むなら、パレスチナとの二国間関係を優先しなければならない。端的に言えば、パレスチナ人が独自の国家を建設するのを支援しなければならないのだ。\n\n【進歩の時代】\n\n米国はかつてパレスチナに対する国家建設戦略を追求したことがある。1990年代のオスロ合意の一環として設立された統治機構であるパレスチナ自治政府（PA）は、2007年から2011年にかけてサラム・ファイヤード首相の下で、最終的に国家を支えられるような制度の構築に向けて大きな進展を遂げた。ファイヤードはPAの財務管理と透明性を改善し、米国主導の訓練プログラムの支援を受けて治安部隊を専門化した。ワシントンや他の国際支援国からの数十億ドルの援助と合わせて、これらの改革はファイヤード在任の最初の4年間で西岸地区のGDPを平均10パーセント成長させるという急速な経済成長をもたらした。2011年、世界銀行はパレスチナの制度について「近い将来いかなる時点においても国家を樹立できる態勢が整っている」と結論付けた。国民の支持は成果に伴った。パレスチナ人の過半数がPA議長マフムード・アッバスを支持し、彼に投票すると示した。58パーセントが二国家枠組みを支持し、60パーセント以上が外交と非暴力を支持した。\n\n分析家はこの時期のPAの成功をファイヤードのテクノクラート的なリーダーシップに帰することが多い。しかし、ファイヤードの統治アジェンダを可能にした有利な条件がなければ、彼は成功できなかっただろう。その最たるものが、既存の政治的正当性であった。アッバスはファイヤードを首相に任命する2年前、パレスチナ大統領選挙で62パーセントの票を獲得し、広範な信任を得ていた。アッバスの選挙における信任とその政党ファタハの相対的な人気が、ファイヤードが野心的な財政透明性改革を追求し、西岸地区の主要都市全域でPAの治安支配を強化するために必要な政治的後ろ盾を提供した。これらの改革はパレスチナ人に対して、自分たちの制度が国家建設に向けた意義ある成果をもたらせるという信頼を与えた。\n\nファイヤードのPAはまた、パレスチナ穏健派の強化を戦略的優先事項と見なすイスラエル政府と並存していた。イスラエルのエフード・オルメルト首相はアッバスと定期的に交渉し、イスラエルがPAに代わって徴収したパレスチナの税収の移転を促進し、西岸地区でのパレスチナ人の移動制限を緩和した。この協力は核心的な政治的対立を解決するものではなかった――オルメルトとアッバスは最終的に最終地位合意に達することができなかった――しかし、それによってパレスチナの制度が効果的に機能し、その構成員に成果をもたらすことが可能になった。\n\nパレスチナの国内的な可能性の約束は――", "vocab": [{"word": "recalibrating", "definition": "（方針や関係などを）再調整すること。既存の枠組みを見直して微調整するという意味で、政治・外交文脈でよく使われる上級語彙。"}, {"word": "adjunct", "definition": "付属物、補足的なもの。主要なものに付随する二次的な要素を指し、「an adjunct to～」の形で使われることが多い学術・論説系の語彙。"}, {"word": "technocratic", "definition": "テクノクラート的な、技術官僚主義的な。政治的判断よりも専門知識や技術的能力を重視した統治スタイルを表す形容詞。"}, {"word": "subordinated", "definition": "従属させられた、二次的な地位に置かれた。「subordinate A to B」でAをBの下位に置くという意味。政治・組織論の文脈で頻出する上級語彙。"}, {"word": "geopolitical imperative", "definition": "地政学的な至上命題・必須事項。国家の地理的位置や国際情勢に基づいて、どうしても実行しなければならない政策上の要請を指す複合表現。"}, {"word": "intermittent", "definition": "断続的な、不定期に起こる。一定のリズムなく時々発生することを表す形容詞で、TOEIC 800点以上のレベルで頻出する語彙。"}, {"word": "consolidate", "definition": "統合する、強固にする。権力・組織・立場などをより安定した一枚岩の状態にまとめるという意味で使われる動詞。"}]}, {"title_ja": "ヨーロッパはいかにしてプーチンの注意を引くべきか：構造的外交の必要性", "title_en": "How Europe Can Get Putin's Attention: The Case for Structured Diplomacy", "summary_ja": "筆者は、欧州の指導者たちがプーチンとの対話を求めるのは正しいが、そのための一貫した枠組みが欠如していると論じる。フランス、ドイツ、英国に東欧諸国を加えた有志連合がモスクワと交渉し、関係を安定させて紛争拡大を防ぐべきだと主張する。トランプ政権下で米国の危機外交が不安定になる中、この取り組みはより広範な戦争を防ぐための安全弁となり得る。", "summary_en": "The author argues that European leaders are right to seek dialogue with Putin, but lack a coherent framework for doing so. A coalition of major European powers—France, Germany, the UK, and an eastern European state—should engage Moscow to stabilize the relationship and prevent escalation. This approach would not end hostilities but could establish guardrails against a wider war, especially as U.S. crisis diplomacy under Trump has become unreliable.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/russia/how-europe-can-get-putins-attention", "state_media": false, "category": "オピニオン", "full_text": "“I believe we should talk to Putin,” Finnish President Alexander Stubb said in an early June interview. It was a revealing admission. Stubb has, for years, been one of Europe’s most pro-Ukraine politicians and generally hawkish toward the Kremlin. But now, Stubb told journalists, ignoring Russian President Vladimir Putin was becoming untenable. “This border will remain,” he said, referring to his country’s 833-mile boundary with Russia. “At some point, we will have to maintain political relations.”\nStubb is hardly the only European politician who has recently advocated talking to the Kremlin. French President Emmanuel Macron spoke in favor of it back in February, as did Italian Prime Minister Giorgia Meloni in June. These European leaders are motivated, in part, by a sense that high-level diplomacy could yield a deal that finally ends the war in Ukraine. But they are also motivated by a desire to stabilize the increasingly dangerous Russian-European relationship, which has yielded an uncontrolled arms race; Russian hybrid operations on EU territory, such as its arson attacks in the United Kingdom and drone incursions on Europe’s east; and an overall growing risk of direct military confrontation. The continent, in other words, is looking for ways to contain a potential crisis and prevent escalation.\nEurope’s leaders are right to want to speak with Putin. But they do not yet have a path forward for doing so. They do not, at the most basic level, know who should talk to the Kremlin on the continent’s behalf. More important, they are not quite sure what should be on the agenda.\nTo answer these questions, the continent must establish a coalition of the willing. Europe’s leading powers—France, Germany, and the United Kingdom—should join with an eastern European state, such as Finland or Poland, to engage with Putin. Their goal should be to stabilize relations with Moscow while continuing to support Kyiv. This will not end the Russian-European standoff, much less lead to friendship. But it could shore up European security and help prevent a wider war.\nDANGER ZONE\nEurope’s frustration with the idea of talking to the Kremlin is rooted in experience. In the lead-up to Russia’s full-scale invasion of Ukraine, Macron and German Chancellor Olaf Scholz met directly with Putin to try to dissuade him from attacking. Putin, in turn, lied to their faces, promising that he would not invade even as he prepared to do so. Following this humiliation, Europe issued sweeping sanctions against Russia and joined the United States in offering extensive support to Ukraine. Most of the continent’s countries severed almost all their official lines of contact with the Kremlin.\nSince then, Washington has handled most of the crisis diplomacy with Russia to prevent escalation. Whenever NATO countries stepped up support for Kyiv and pushed against the Kremlin’s ostensible redlines, Europe could be sure that a competent Biden administration official, such as former CIA director Bill Burns, would work the phones with Russian counterparts to establish guardrails and manage confrontation.\nThen, U.S. President Donald Trump returned to the White House and filled his administration with neophytes. Steve Witkoff, a real estate developer with no government experience, was charged with speaking directly to Putin. Pete Hegseth, a Fox News host, was picked to lead the Pentagon. At the same time, the White House started threatening to pull back from NATO, criticizing European allies for neglecting defense spending, and even threatening to annex Greenland.\nRussia and Europe are at risk of replaying the most dangerous parts of the Cold War.\nMeanwhile, Europe’s security predicament vis-à-vis Moscow deteriorated. Putin has publicly said that Russia is confronting not only Ukraine but all of Europe, since the continent supplies Kyiv with weapons, intelligence, military training, technology, and general funding. The Kremlin plans to massively increase its military presence along the EU’s borders and has begun carrying out more hybrid attacks against EU members, such as by floating drones over their territory. Russia is rapidly building up its missile and drone arsenals—just as the last remaining arms control deals between Russia and NATO have been destroyed.\nEurope, too, has enhanced its long-range and medium-range missile capabilities. It is scaling up drone production and testing new weapons systems. Many European countries are designing these systems specifically to hit the Russian heartland. Some European leaders are even making plans to extend the continent’s system of nuclear deterrence, either by having France patrol European skies with its strategic bombers or by having other European states develop their own nuclear weapons.\nStill, these steps are unlikely to prevent conflict by themselves. In the absence of guardrails and channels of communication, the growing arsenals could prompt miscalculation and escalation as each side becomes more fearful and mo", "translation_ja": "「私はプーチンと話し合うべきだと考えている」――フィンランドのアレクサンデル・ストゥッブ大統領は6月初旬のインタビューでそう語った。これは示唆に富む発言だった。ストゥッブは長年にわたり、欧州で最もウクライナ寄りかつクレムリンに対して強硬な政治家の一人とされてきた。しかし今や、ロシアのウラジーミル・プーチン大統領を無視し続けることは持続不可能になっていると、ストゥッブは記者たちに語った。「この国境はこのまま存在し続ける」と彼は言った。ロシアとの833マイルにわたる国境線に言及しながら、「いずれ、政治的な関係を維持しなければならなくなる」と述べた。\n\nクレムリンとの対話を最近提唱した欧州の政治家は、ストゥッブだけではない。フランスのエマニュエル・マクロン大統領は2月にそれを支持する発言をし、イタリアのジョルジャ・メローニ首相も6月に同様の見解を示した。これらの欧州指導者たちは、部分的には、ハイレベルの外交がウクライナ戦争を最終的に終結させる合意をもたらし得るという考えに動機づけられている。しかし同時に、制御不能な軍備拡張競争、英国での放火攻撃や欧州東部へのドローン侵入といったEU領域内でのロシアのハイブリッド作戦、そして直接的な軍事衝突のリスクの全般的な高まりをもたらしている、ますます危険になるロシアと欧州の関係を安定させたいという願望にも突き動かされている。つまり欧州大陸は、潜在的な危機を封じ込め、エスカレーションを防ぐ方法を模索しているのだ。\n\n欧州の指導者たちがプーチンと話し合いたいと考えるのは正しい。しかし、そのための具体的な道筋はまだ描けていない。最も基本的なレベルにおいて、誰が大陸を代表してクレムリンと交渉すべきかすら定まっていない。さらに重要なことに、議題に何を乗せるべきかも十分に明確ではない。\n\nこれらの問いに答えるために、大陸は有志連合を設立しなければならない。フランス、ドイツ、英国といった欧州の主要大国が、フィンランドやポーランドなどの東欧諸国と組んでプーチンと関与すべきだ。その目標は、引き続きキーウを支援しながらも、モスクワとの関係を安定させることである。これによってロシアと欧州の対立が終わるわけではなく、まして友好関係が生まれるわけでもない。しかし、欧州の安全保障を強化し、より広範な戦争を防ぐ一助となり得る。\n\n【危険地帯】\n\nクレムリンとの対話という考えに対する欧州の不満は、経験に根ざしている。ロシアによるウクライナへの全面侵攻の直前、マクロン大統領とドイツのオラフ・ショルツ首相は直接プーチンと会談し、攻撃を思いとどまらせようとした。これに対してプーチンは、侵攻の準備を進めながらも侵攻しないと約束し、二人の顔に向かって嘘をついた。この屈辱の後、欧州はロシアに対して広範な制裁を発動し、ウクライナへの大規模な支援において米国とともに歩んだ。大陸のほとんどの国々は、クレムリンとのほぼすべての公式接触ラインを断ち切った。\n\nそれ以降、エスカレーションを防ぐための危機外交は主にワシントンが担ってきた。NATO諸国がキーウへの支援を強化し、クレムリンが示す「レッドライン」を押し広げるたびに、欧州は、元CIA長官のビル・バーンズのような有能なバイデン政権の高官が電話でロシア側との協議を行い、安全弁を設け対立を管理してくれると信頼することができた。\n\nその後、ドナルド・トランプ米大統領がホワイトハウスに返り咲き、素人たちで政権を固めた。政府経験のない不動産開発業者スティーブ・ウィットコフが、プーチンと直接話す役割を任された。フォックス・ニュースの司会者ピート・ヘグセスが国防長官に指名された。同時に、ホワイトハウスはNATOからの撤退を示唆し始め、防衛費を怠ってきた欧州の同盟国を批判し、グリーンランドを併合すると脅しさえした。\n\nロシアと欧州は、冷戦の最も危険な局面を繰り返すリスクを抱えている。\n\n一方、モスクワに対する欧州の安全保障上の状況は悪化し続けた。プーチンはロシアがウクライナだけでなく欧州全体と対峙していると公言している。欧州大陸がキーウに武器、情報、軍事訓練、技術、そして全般的な資金を提供しているからだ。クレムリンはEU国境沿いの軍事プレゼンスを大幅に増強する計画を持ち、EU加盟国の領空をドローンが飛行するなど、ハイブリッド攻撃を増加させている。ロシアはミサイルとドローンの兵器庫を急速に増強しており、ロシアとNATOの間に残っていた最後の軍備管理協定はすべて崩壊してしまった。\n\n欧州もまた、長距離・中距離ミサイル能力を強化している。ドローン生産を拡大し、新たな兵器システムを試験している。多くの欧州諸国は、ロシアの中枢を攻撃することを念頭にこれらのシステムを設計している。一部の欧州指導者は、フランスが戦略爆撃機で欧州上空を哨戒するか、他の欧州諸国が独自の核兵器を開発するかという形で、大陸の核抑止体制を拡張する計画さえ立てている。\n\nしかし、こうした措置だけでは紛争を防ぐことはできそうにない。安全弁と意思疎通の回路が存在しない中では、増大する兵器庫が誤算とエスカレーションを引き起こしかねない。双方がより恐怖心を抱き、より……", "vocab": [{"word": "untenable", "definition": "（立場・主張などが）支持できない、維持できないという意味の形容詞。議論や状況が論理的・現実的に成り立たなくなった際に用いられる。"}, {"word": "hawkish", "definition": "外交・安全保障において強硬派・タカ派的な姿勢を指す形容詞。軍事力や強硬手段を好む傾向を表す政治的文脈でよく使われる。"}, {"word": "neophytes", "definition": "ある分野や職務において経験の浅い新参者・初心者を指す名詞。政治や専門職の文脈で能力不足を示唆するニュアンスで使われることが多い。"}, {"word": "guardrails", "definition": "本来は物理的な防護柵を意味するが、外交・政策文脈では危険なエスカレーションを防ぐための制約や取り決めを指す比喩的表現。"}, {"word": "hybrid operations", "definition": "通常の軍事行動に加え、サイバー攻撃・情報工作・破壊活動などを組み合わせた複合的な作戦行動を指す安全保障上の専門用語。"}, {"word": "coalition of the willing", "definition": "共通の目標のために自発的に集まった国家や勢力の連合を指す慣用表現。義務条約に基づかない有志参加型の協力体制を意味する。"}, {"word": "miscalculation", "definition": "状況の誤った判断や見誤りを意味する名詞。特に外交・軍事文脈では、意図せず紛争や危機を引き起こす誤った戦略的判断を指す。"}]}, {"title_ja": "AIインフラ構築の新たなアプローチ：国家的野心と地域の正統性の橋渡し", "title_en": "A Better Way to Build AI Infrastructure: Bridging National Ambition and Local Legitimacy", "summary_ja": "筆者は、米国がAIインフラ整備における国家的野心と、重要プロジェクトを阻止・遅延させうる地方分権的な統治構造との間に根本的な緊張関係を抱えていると論じる。ニューヨーク州カユガ湖畔でのデータセンター計画への個人的な関与を踏まえ、民主主義的制度は地域コミュニティの支持を障壁ではなく戦略的資産として扱うべきだと主張する。許認可プロセスを一度限りの同意から継続的な関係へと転換しなければ、米国は中国のような競合国に重要な戦略的優位を譲り渡すリスクがあると警告する。", "summary_en": "The author argues that the U.S. faces a fundamental tension between its national AI infrastructure ambitions and decentralized local governance that can block or delay critical projects. Drawing on personal experience with a data center proposal near Cayuga Lake, New York, the author contends that democratic institutions must treat local community buy-in as a strategic asset rather than an obstacle. The solution lies in transforming permitting into a sustained relationship rather than a single consent moment, lest the U.S. cede strategic advantage to rivals like China.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/better-way-build-ai", "state_media": false, "category": "オピニオン", "full_text": "As the United States races to build the infrastructure required for artificial intelligence, it faces a constraint: legitimacy at the local level. Data centers, transmission lines, and energy-intensive computing facilities have become strategic assets, central to economic competitiveness and national power. Yet they must be sited, permitted, and sustained in communities whose priorities do not always align with national ambitions. The result is a widening gap between federal technological strategy and the local governance structures responsible for implementing it.\nThis tension between national ambition and local authority is not universal. In China, for example, large-scale digital infrastructure is planned, permitted, and constructed through nationally coordinated processes that subordinate local opposition to state priorities. The Chinese Communist Party treats data centers, transmission corridors, and energy projects as instruments of national strategy rather than negotiated outcomes. That model carries its own political and social risks, concentrating burdens on communities that lack the freedom to contest projects or the legal and political mechanisms to hold planners accountable. But it confers strategic advantage: speed, scale, and predictability.\nThe United States, by contrast, must pursue comparable ambitions within a decentralized system that grants local governments veto power. If the country is serious about leading in artificial intelligence, it will need an institutional model that connects national ambition with local legitimacy. Without such a model, the physical foundations of AI leadership will continue to be contested one community at a time—and each new data center risks becoming another battleground in a broader struggle over how technological progress is governed. The pattern is increasingly familiar: a company proposes a facility, a community mobilizes in opposition, and the debate devolves into mistrust, rumor, and hardened positions. The outcome is not simply delay but a loss of confidence on both sides that makes compromise increasingly difficult.\nThe challenge for democratic institutions is not to imitate China but to adapt fast enough to sustain technological leadership. That requires treating local buy-in as an asset rather than a hurdle. U.S. regulators and developers must transform permitting from a single moment of consent into a sustained relationship. If they fail to make this shift, the United States risks a future in which projects stall in litigation, local resistance hardens into permanent opposition, and the country cedes an important strategic advantage to rivals willing to build without the public’s consent.\nTHE VIEW FROM CAYUGA\nI have observed this debate not as a detached analyst but as a resident of Lansing, New York, where the energy and digital infrastructure company TeraWulf is seeking to develop a large data center campus supporting next-generation AI computing on the site of a retired coal plant. The proposal has drawn passionate support and opposition from local residents and officials.\nLike many in the community, I value Cayuga Lake not as an abstraction but as something irreplaceable that we have a duty to protect. At the same time, the region’s economic realities are difficult to ignore: a shrinking tax base, aging infrastructure, and rising public costs that have strained local government for years.\nAs both a resident who would live with the project’s consequences and a tech policy scholar who studies the governance of digital infrastructure and has a background in environmental impact, I offered to conduct an independent assessment of the project’s likely effects on water use, power demand, employment, and the local tax base. (The company agreed and compensated me for the time required to conduct the analysis. It had no role in determining the scope of the study, conducting the research, interpreting the findings, or drafting the report, and it exercised no editorial control over the final product.) I found that the engineering, on its own terms, was sound. The proposed closed-loop cooling system would largely eliminate operational water withdrawals from Cayuga Lake, replacing the retired coal plant’s once water-intensive operations. Similarly, although the data center campus’s electricity demand would be substantial, the site already has considerable transmission infrastructure and is located within a regional grid in which electricity generation is predominantly carbon free and sizable surplus capacity exists.\nRegulators and developers must treat local buy-in as an asset rather than a hurdle.\nMuch of the opposition ran on misinformation and the conflation of project-specific issues with broader anxieties. Some concerns reflected a general apprehension about AI, corporate power, and environmental change that extended beyond the project itself. Questions about surveillance, workers being displaced by AI, and environmental harm became intertwined with d", "translation_ja": "AIをより良く構築する方法\n\n米国が人工知能に必要なインフラの整備を急ぐ中、一つの制約に直面している。それは地域レベルにおける正統性の問題だ。データセンター、送電線、エネルギー集約型の計算施設は戦略的資産となり、経済競争力と国家的権力の中核を担うようになった。しかしそれらは、国家的野心と必ずしも一致しない優先事項を持つ地域社会において、立地選定、許認可、そして維持管理が行われなければならない。その結果、連邦政府の技術戦略と、それを実施する責任を持つ地方統治構造との間に、拡大する乖離が生じている。\n\nこの国家的野心と地方の権限との緊張関係は、すべての国に共通するものではない。たとえば中国では、大規模なデジタルインフラが国家的に調整されたプロセスを通じて計画・許認可・建設され、地方の反対意見は国家の優先事項に従属させられる。中国共産党はデータセンター、送電回廊、エネルギープロジェクトを、交渉によって得られる成果としてではなく、国家戦略の手段として扱う。そのモデルはそれ自体の政治的・社会的リスクを伴う。プロジェクトに異議を唱える自由も、計画立案者に説明責任を求める法的・政治的手段も持たないコミュニティに負担が集中するのだ。しかしそれは戦略的優位をもたらす。すなわち、スピード、規模、そして予測可能性である。\n\n対照的に米国は、地方政府に拒否権を付与する分権化されたシステムの中で、同等の野心を追求しなければならない。もし米国が人工知能において主導権を握ることを真剣に考えるならば、国家的野心と地域の正統性を結びつける制度的モデルが必要となる。そうしたモデルなしでは、AIリーダーシップの物理的基盤はコミュニティごとに争われ続け、新たなデータセンターのたびに、技術的進歩がいかに統治されるべきかをめぐる広範な闘争の戦場となるリスクがある。そのパターンはますます見慣れたものになっている。企業が施設を提案し、コミュニティが反対のために立ち上がり、議論は不信と噂と硬直した立場へと堕していく。その結果は単なる遅延にとどまらず、双方における信頼の喪失であり、それが妥協をますます困難にする。\n\n民主主義的制度にとっての課題は、中国を模倣することではなく、技術的リーダーシップを維持できるほど素早く適応することだ。そのためには、地域の支持を障壁ではなく資産として扱うことが求められる。米国の規制当局と開発業者は、許認可を単一の同意の瞬間から継続的な関係へと転換しなければならない。この転換に失敗すれば、米国はプロジェクトが訴訟で行き詰まり、地域の抵抗が恒久的な反対へと硬化し、公衆の同意なしに建設することをいとわない競合国に重要な戦略的優位を譲り渡す未来に直面するリスクがある。\n\nカユガからの眺め\n\n私はこの議論を、距離を置いた分析者としてではなく、ニューヨーク州ランシングの住民として観察してきた。同地では、エネルギーおよびデジタルインフラ企業のテラウルフが、廃止された石炭火力発電所の跡地に、次世代AIコンピューティングを支援する大規模なデータセンターキャンパスの開発を求めている。この提案は、地域住民と地方当局者の間で熱烈な支持と反対の両方を引き起こしている。\n\nこの地域の多くの人々と同様に、私はカユガ湖を抽象的なものとしてではなく、守る義務のある、かけがえのないものとして大切にしている。同時に、この地域の経済的現実を無視することは難しい。縮小する税基盤、老朽化するインフラ、地方政府を長年にわたって圧迫してきた増加する公共コストがある。\n\n結果とともに生きることになる住民として、また、デジタルインフラのガバナンスを研究し、環境影響の分野を背景に持つテクノロジー政策学者として、私はこのプロジェクトが水の使用、電力需要、雇用、地域の税基盤に与える可能性のある影響について独立した評価を実施することを申し出た。（同社はこれに同意し、分析に必要な時間に対して私に報酬を支払った。同社は調査範囲の決定、調査の実施、調査結果の解釈、報告書の起草において何ら関与せず、最終成果物に対して編集上の管理も行使しなかった。）私は、エンジニアリングはそれ自体の観点からは堅実であると判断した。提案されているクローズドループ冷却システムは、カユガ湖からの運用上の取水をほぼ完全に排除し、廃止された石炭火力発電所のかつての水集約的な操業に取って代わるものだ。同様に、データセンターキャンパスの電力需要は相当なものになるが、この敷地にはすでにかなりの送電インフラが整備されており、電力発電が主に炭素フリーで相当の余剰容量が存在する地域系統内に位置している。\n\n規制当局と開発業者は、地域の支持を障壁ではなく資産として扱わなければならない。\n\n反対意見の多くは誤った情報と、プロジェクト固有の問題をより広範な不安と混同することに基づいて展開された。いくつかの懸念は、プロジェクト自体を超えたAI、企業権力、環境変化に対する全般的な不安を反映していた。監視、AIによる労働者の置き換え、環境被害に関する問題が、プロジェクトの具体的な詳細と絡み合って…", "vocab": [{"word": "permitting", "definition": "許認可手続きのこと。インフラや建設プロジェクトを開始する前に政府機関から必要な許可を取得するプロセスを指す。政策・行政分野で頻繁に使われる専門用語。"}, {"word": "decentralized", "definition": "権力や権限が中央ではなく複数の地方主体に分散されている状態を指す形容詞。統治・組織論の文脈でよく用いられる。"}, {"word": "subordinate", "definition": "動詞として使う場合、あるものを別のものより低い地位や優先度に置くことを意味する。ここでは地方の反対意見を国家の優先事項に従属させることを指す。"}, {"word": "conflation", "definition": "本来は異なる二つ以上の概念や問題を誤って一つにまとめてしまうこと。議論や分析の文脈で「混同」「混同化」を指すやや高度な語彙。"}, {"word": "legitimacy", "definition": "正統性・正当性のこと。政治・社会科学の文脈では、権力や政策・制度が人々から受け入れられ、支持される資格や根拠を指す重要な概念語。"}, {"word": "cede", "definition": "（権利・領土・優位性などを）譲り渡す、放棄するという意味の動詞。外交・政治・ビジネス文脈で使われるフォーマルな語。"}, {"word": "apprehension", "definition": "漠然とした不安や懸念を指す名詞。単なる恐れではなく、まだ起きていない事態に対する心配や危惧のニュアンスを持つ、やや格式のある語。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}
