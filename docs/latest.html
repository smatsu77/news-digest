"title_en": "Vance: Iran Agrees to Allow Nuclear Inspectors Back as US-Iran Talks Show Progress", "summary_ja": "米国のJDバンス副大統領は、イランがIAEAの核査察官の受け入れに同意し、早ければ同日中にも協議が始まる可能性があると発表した。スイスで行われた米イラン初の実務協議では、仲介国のカタールとパキスタンが60日以内に最終合意へのロードマップで両者が一致したと確認した。ホルムズ海峡の再開通や地域停戦、イランの濃縮核物質の扱いも議題に上った。", "summary_en": "US Vice President JD Vance announced that Iran has agreed to allow IAEA nuclear inspectors back into the country, with discussions potentially starting as soon as Monday. The announcement follows the first round of US-Iran talks in Switzerland, where mediators Qatar and Pakistan confirmed both sides agreed to a roadmap toward a final deal within 60 days. Key issues discussed include reopening the Strait of Hormuz, a regional ceasefire, and Iran's enriched nuclear material stockpile.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/c3vy3nr63gxo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "カタール最大のガス施設で爆発、少なくとも13人死亡・66人負傷", "title_en": "At Least 13 Killed in Explosion at Qatar's Largest Gas Facility in Ras Laffan", "summary_ja": "日曜夜、カタールのラス・ラファン工業地帯にあるバルザン・ガス供給施設で爆発が発生し、少なくとも13人が死亡、66人が負傷した。死者はいずれもインドまたはパキスタン国籍で、爆発はドーハ中心部から70キロ以上離れた場所でも感じられた。カタールのエネルギー相は輸出への影響はないと述べ、テロや妨害行為ではなく事故であると強調したが、原因究明のための調査が開始された。", "summary_en": "An explosion at Qatar's Barzan gas supply facility in the Ras Laffan industrial zone killed at least 13 people and injured 66 others on Sunday night. All fatalities were nationals of India and Pakistan, and the blast was felt as far as 70km away in central Doha. Qatar's Energy Minister said exports would not be affected and that the explosion was accidental, not an act of sabotage, though a full investigation is underway.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/cwy05llpjpno?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "IT"}, {"title_ja": "国連報告：ミャンマー軍が6か月間で700人以上の民間人を殺害", "title_en": "Myanmar Army Killed Over 700 Civilians in Six Months, UN Report Finds", "summary_ja": "国連人権事務所が発表した報告書によると、2024年8月から2025年1月の間にミャンマー軍によって少なくとも702人の民間人が殺害され、そのなかには女性224人と子ども153人が含まれる。空爆が最大の被害要因とされており、サガイン地域が最も危険な地域として挙げられた。国連人権高等弁務官のフォルカー・テュルク氏は、国際支援の縮小が数百万人の苦しみをさらに悪化させていると警告した。", "summary_en": "A UN Human Rights Office report covering August 2024 to January 2025 verified a minimum of 702 civilian deaths caused by Myanmar's military, including 224 women and 153 children. Air strikes were cited as the single largest cause of destruction, with the Sagaing region being the most dangerous area for civilians. UN Human Rights Chief Volker Türk warned that declining international assistance is compounding the suffering of millions, calling the situation a grave humanitarian crisis.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/cnv97e42r7yo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "欧州を襲う記録的熱波、来週まで猛暑が続く見通し", "title_en": "Europe Bakes Under Intense Heatwave With No Relief Expected Until Next Week", "summary_ja": "強力な「熱ドーム」が欧州全土を覆い、気温が40℃を超える地域も出ている。英国気象庁は中南部イングランドに異例の最高レベルの熱波警報を発令し、フランスでは南部カルパントラで2歳と4歳の子どもが車内で死亡した。パリでは6月としての過去最高夜間気温を記録し、気象当局は2003年の熱波（フランスで約1万5000人が死亡）に匹敵する深刻な事態になりかねないと警告している。", "summary_en": "A powerful heat dome has pushed temperatures across Europe above 40°C (104°F), prompting rare red heat warnings in the UK and red alerts in France. Two young children were found dead in a car in southern France, and Paris recorded its hottest-ever June night. Germany, France, the UK, and Portugal are all severely affected, with forecasters warning conditions could rival the deadly 2003 European heatwave.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/europe-sizzles-under-heatwave-with-little-relief-in-sight/live-77663026?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "ドイツの年金改革案、賛否両論を呼ぶ", "title_en": "Germany's Pension Reform Proposals Draw Mixed Reactions", "summary_ja": "ドイツの専門家委員会が30項目の年金改革案を漏洩し、保守派からは支持を得る一方、労働組合や野党からは強い批判が上がっている。主な提案には、退職年齢を平均寿命に連動させること、45年間納付した場合の63歳での減額なし早期退職の廃止、年金積立金の一部を資本市場で運用すること、公務員年金制度の見直しなどが含まれる。メルツ首相とバス労働大臣は、年金制度の長期的な持続可能性を確保するために改革が不可欠だと主張している。", "summary_en": "A 13-member expert commission has leaked 30 pension reform proposals in Germany, prompting praise from conservatives and sharp criticism from trade unions and left-wing parties. Key measures include tying the retirement age to life expectancy, eliminating penalty-free early retirement at 63, investing a portion of pension contributions in capital markets, and reducing the number of civil servants exempt from the general pension system. Chancellor Friedrich Merz and Labor Minister Bärbel Bas have defended the reforms as necessary to ensure long-term affordability of Germany's pension system.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-s-pension-plans-draw-praise-and-outrage/a-77663371?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "2026年W杯に便乗したAIフェイク画像が政治的デマを拡散", "title_en": "AI Deepfakes Spread Political Narratives During 2026 World Cup", "summary_ja": "2026年FIFAワールドカップに関連したAI生成の偽画像がSNSで拡散し、政治的な偽情報が広がっている。DWのファクトチェックチームは、イラン選手の抗議シーン、英国のスターマー首相がクロアチアのユニフォームを着た画像、ブラジルのルラ大統領逮捕を求めるファンの画像など複数の偽情報を否定した。専門家は、W杯の世界規模の視聴者層がディープフェイク拡散に格好の環境を提供していると警告している。", "summary_en": "Fake AI-generated images tied to the 2026 FIFA World Cup are going viral on social media, spreading political disinformation. DW Fact Check debunked several examples, including fabricated images of an Iranian player protesting, UK Prime Minister Keir Starmer in a Croatia jersey, and a Brazilian fan calling for President Lula's arrest. Experts warn the World Cup's massive global audience makes it an ideal environment for deepfake campaigns aimed at manipulating public narratives.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/fact-check-ai-fakes-around-the-world-cup-spread-political-narratives/a-77659085?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "キア・スターマー英首相が辞意表明、アンディ・バーナムへの道開く", "title_en": "Keir Starmer Resigns as UK Prime Minister, Paving Way for Andy Burnham", "summary_ja": "英国のキア・スターマー首相が辞意を表明し、数週間以内に首相職を退く見通しとなった。後継候補として、労働党の人気市長アンディ・バーナム氏が次期首相に就く可能性が浮上している。バーナム氏が就任すれば、英国は10年間で7人目の首相を迎えることになる。", "summary_en": "UK Prime Minister Keir Starmer has announced his resignation, with his departure expected in the coming weeks. His exit opens the door for Andy Burnham, the popular Labour Party mayor, to potentially become the next prime minister. If confirmed, Burnham would be the UK's seventh prime minister within a single decade.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/22/world/europe/keir-starmer-andy-burnham-prime-minister-britain.html", "state_media": false, "category": "政治"}, {"title_ja": "米、イラン産石油制裁を緩和も核査察めぐり双方の主張が食い違い", "title_en": "U.S. Eases Iran Oil Sanctions Amid Conflicting Signals on Nuclear Inspections", "summary_ja": "米国はイラン産石油に対する制裁を緩和する方針を示したが、核問題をめぐる進展は不透明な状況が続いている。バンス副大統領はイランが国連の核査察官受け入れに同意したと主張した一方、イラン側は「新たな約束は一切していない」と否定した。核査察はトランプ大統領が2018年にオバマ政権時代の核合意を破棄して以来、大幅に制限されたままとなっている。", "summary_en": "The United States has moved to ease sanctions on Iranian oil exports, but progress on nuclear issues remains unclear. Vice President JD Vance claimed Iran agreed to allow UN nuclear inspectors into the country, while Iranian officials denied making any new commitments. Nuclear inspections have been severely limited since President Trump withdrew from the Obama-era nuclear deal in 2018.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/22/world/iran-us-trump-lebanon", "state_media": false, "category": "政治"}, {"title_ja": "燃料危機でキューバの学校が年度を早期終了", "title_en": "Cuba's Fuel Crisis Forces Early End to School Year", "summary_ja": "キューバでは深刻な燃料不足により、学校が立ち往生し、学年度を予定より早く終了することを余儀なくされている。この危機は、米国による石油封鎖が原因とされており、もともと困難な状況にあった教育システムをさらに麻痺させている。今回の早期終了は、エネルギー危機が続く中、キューバの学生たちの教育にとってまた一つの大きな打撃となっている。", "summary_en": "Cuba is ending its academic year ahead of schedule due to a severe fuel shortage that has brought schools to a standstill. The crisis has been attributed to a U.S. oil blockade that has crippled the country's already-struggling education system. The early closure marks another significant disruption to Cuban students' education amid the ongoing energy emergency.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/22/world/americas/cuba-oil-gas-crisis-schools-education.html", "state_media": false, "category": "社会"}, {"title_ja": "人質交渉の打開受け、パレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を分断する軍事ゾーンを越えて、避難していたパレスチナ人が北部へ戻ることを許可した。この動きは、行き詰まっていた人質解放交渉が突破口を開いたことを受けたものである。数千人のガザ市民が軍事化された回廊を徒歩で移動した。", "summary_en": "Israel permitted displaced Palestinians to cross a military zone dividing Gaza, allowing them to return to the northern part of the enclave. The movement follows a breakthrough in negotiations over hostage releases that had previously stalled. Thousands of Gazans made the journey on foot through the militarized corridor.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治"}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Real Estate Crisis Concerns", "summary_ja": "中国の大手不動産デベロッパー、万科（バンケ）が巨額の損失を報告し、同国の不動産危機が引き続き拡大していることが浮き彫りになった。万科の経営難は、中国不動産セクター全体の健全性に対する深刻な懸念を呼び起こしている。中国政府が事態の悪化を防ぐために介入するかどうか、市場関係者は固唾をのんで見守っている。", "summary_en": "Leading Chinese property developer Vanke has reported a massive financial loss, signaling that the country's real estate crisis continues to spread. The troubles at Vanke raise serious questions about the broader health of China's property sector. Observers are now watching closely to see whether the Chinese state will intervene to prevent further deterioration.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会"}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Their Bodies From Oct. 7 Attack", "summary_ja": "イスラエルの医療当局者によると、ガザから解放された人質の体内には、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。一部の女性は長期間にわたり単独で拘束され、地下トンネルで8か月を過ごした人質もいたという。これらの事実は、人質が拘束中に受けた深刻な身体的・精神的苦痛を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack, according to an Israeli medical official. Some of the women had been held in isolation for extended periods, with several spending eight months confined in underground tunnels. The revelations highlight the severe physical and psychological conditions endured by the hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会"}, {"title_ja": "世界最大のウルトラマラソン、2万人がコムレーズに挑む", "title_en": "Sweat and Camaraderie: 20,000 Runners Tackle World's Largest Ultramarathon", "summary_ja": "南アフリカで世界最古かつ最大のウルトラマラソン「コムレーズ」が開催され、2万人以上のランナーがダーバンからピーターマリッツバーグまでの約88kmを走った。1921年に第一次世界大戦の戦没者を追悼する目的で始まったこのレースは、当初は白人男性限定だったが、1975年に人種・性別の制限が撤廃され、南アフリカを代表する国民的行事へと成長した。離婚後のうつ病を乗り越えるために走り始めたウィリアム・セレカのように、それぞれの人生を背負ったランナーたちが感動のドラマを繰り広げた。", "summary_en": "More than 20,000 runners took part in the 2024 Comrades Marathon, the world's oldest and largest ultramarathon, racing 55 miles from Durban to Pietermaritzburg in South Africa. Founded in 1921 as an all-white, all-male event to honour fallen World War I soldiers, the race was desegregated in 1975 and has since become a unifying cultural institution in South Africa. Participants range from professional athletes to first-timers like William Seleka, who began running to cope with depression and completed the race as a personal milestone.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/21/comrades-ultramarathon-south-africa", "state_media": false, "category": "社会"}, {"title_ja": "ガーナ会議、大西洋奴隷貿易への正式謝罪を求めるグローバル枠組みを採択", "title_en": "Ghana Conference Adopts Global Framework Demanding Formal Apologies for Transatlantic Slave Trade", "summary_ja": "ガーナの首都アクラで開催された3日間の国際会議で、大西洋奴隷貿易に関する賠償的正義のための19項目のグローバル枠組みが採択され、すべての国家・非国家機関に対して正式かつ無条件の謝罪を求めた。アフリカおよびカリブ海諸国の首脳らは、賠償的正義、文化財返還、法律の3つの国際パネル設置にも合意した。枠組みはさらに、奴隷制や植民地主義の遺産に影響を受けた国々への公正な補償、債務救済、文化財の返還も求めている。", "summary_en": "A three-day conference in Accra, Ghana has adopted a 19-point global framework for reparatory justice, calling on all state and non-state institutions to issue formal, unconditional apologies for the transatlantic slave trade. Leaders from Africa and the Caribbean also agreed to establish three international panels covering reparatory justice, cultural restitution, and legal matters. The framework additionally calls for fair compensation, debt relief, and the return of cultural property to countries affected by legacies of enslavement and colonialism.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/news/2026/jun/19/global-framework-reparations-justice-adopted-at-landmark-conference-in-accra-ghana", "state_media": false, "category": "政治"}, {"title_ja": "CDCがコンゴ民主共和国とウガンダのエボラ対応に1億700万ドルの緊急資金を投入", "title_en": "CDC Allocates $107M in Emergency Funding to Combat Ebola Outbreak in DRC and Uganda", "summary_ja": "米疾病対策センター（CDC）は、コンゴ民主共和国（DRC）とウガンダで拡大するエボラ出血熱の感染拡大に対応するため、1億700万ドルの緊急資金を投入すると発表した。今回の流行は記録上3番目に大規模で、DRC国内31の保健区域で約1,000件の確定症例が報告されており、アフリカの保健当局は現在の感染速度では封じ込めに1年かかる可能性があると警告している。感染は飛沫ではなく直接接触で広がるため世界的リスクは低いとされるが、既に誓約された約9億1,000万ドルのうち受領済みは10%未満にとどまり、対応資金の不足が深刻な課題となっている。", "summary_en": "The CDC is deploying $107 million in emergency funding to respond to an Ebola outbreak in the Democratic Republic of the Congo and Uganda, now the third largest on record with nearly 1,000 confirmed cases across 31 health zones. The outbreak involves Bundibugyo viral disease, a rare Ebola species with a 30–50% fatality rate, and African health officials warn it could take a year to contain at current infection rates. While global risk remains low due to the disease's non-airborne transmission, funding efforts face challenges as less than 10% of the $910 million pledged by donors has been received.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/us-news/2026/jun/18/cdc-emergency-ebola-funding", "state_media": false, "category": "社会"}, {"title_ja": "独裁国家が新たな国際紛争調停者に台頭", "title_en": "Autocracies Are Becoming the World's New Conflict Mediators", "summary_ja": "かつて西側民主主義国や国際機関が主導してきた紛争調停の場に、権威主義的な体制が次々と乗り込んでいる。こうした独裁国家が仲介する和平合意は、民主主義的な調停者が関与した場合とは性質が大きく異なる。この地政学的な変化は、世界の平和の持続可能性や公正性について深刻な疑問を投げかけている。", "summary_en": "Authoritarian regimes are increasingly stepping into the role of conflict mediators, a space traditionally dominated by Western democracies and international institutions. The deals brokered by these autocracies tend to reflect their own political values and interests, producing agreements that look markedly different from those shaped by democratic mediators. This shift raises serious questions about the long-term durability and fairness of peace settlements worldwide.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会"}, {"title_ja": "アジアの同盟国、トランプ氏との緊密関係を余儀なくされる", "title_en": "Asian Allies Have No Choice But to Embrace Trump", "summary_ja": "日本をはじめとするアジア諸国は、中国への抑止力として中堅国連合では不十分であることを認識している。トランプ氏の予測不可能な言動に懸念を抱きつつも、中国の脅威に対抗できるのは米国のみという現実がある。そのため、アジアの同盟国は政治的な摩擦を抱えながらも、ワシントンとの緊密な関係を維持せざるを得ない状況だ。", "summary_en": "Japan and other Asian nations are finding that middle-power coalitions offer little real security against China. Despite misgivings about Donald Trump's unpredictability, these countries recognize that only the United States possesses the military and strategic weight to deter Chinese aggression. As a result, Asian allies are compelled to maintain close ties with Washington regardless of the political complications.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会"}, {"title_ja": "ワールドカップ優勝の秘訣：富よりも移民受け入れが効果的", "title_en": "How to Win the World Cup: Wealth Helps, but Immigration Helps More", "summary_ja": "ワールドカップでの成功要因を分析した研究によると、国家の豊かさはトレーニングやインフラへの投資を可能にし、サッカーにおいて大きな優位性をもたらすことがわかった。しかしそれ以上に、移民に対する開放性が成功をより強く予測する指標であることが示された。移民を積極的に受け入れる国々は多様な人材を活用でき、国際大会においてより優れた成績を収める傾向にある。", "summary_en": "Research into World Cup success reveals that national wealth gives countries a significant advantage in football, providing resources for training and infrastructure. However, openness to immigration proves to be an even stronger predictor of success, as diverse talent pools and foreign-born players boost national team performance. Countries that embrace migrants tend to field stronger squads and achieve better results in international competition.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/10/how-to-win-the-world-cup", "state_media": false, "category": "社会"}, {"title_ja": "フランスの熱波時に知っておくべき重要な疑問", "title_en": "Smart Questions to Ask During a Heatwave in France", "summary_ja": "ル・モンド紙は、フランスで熱波が発生した際に人々が抱く素朴だが重要な疑問に答える記事を掲載した。熱波時の安全対策や健康リスクに関する実践的な情報提供を目的としている。なお、技術的な問題により記事の全文を取得することができなかった。", "summary_en": "Le Monde addresses common but important questions people have during heatwaves in France. The article aims to provide practical guidance on staying safe and understanding heat-related risks. Due to a technical issue, the full article content was unavailable for detailed summarization.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/les-decodeurs/article/2026/06/22/the-not-so-stupid-questions-to-ask-during-a-heatwave-in-france_6754753_8.html", "state_media": false, "category": "社会"}, {"title_ja": "気候変動への適応という課題を否定する政治家と大統領候補たち", "title_en": "Politicians and Presidential Candidates in Denial Over Climate Adaptation Challenges", "summary_ja": "ル・モンドの報道によると、政治家や大統領候補たちは気候変動への適応という深刻な課題に十分に向き合っていないとされる。科学的証拠や気候関連災害が増加しているにもかかわらず、政治指導者たちは必要な抜本的対策に真剣に取り組もうとしない姿勢を見せている。地球温暖化の影響が加速する中、こうした現実逃避は社会に重大なリスクをもたらすと警告されている。", "summary_en": "A Le Monde report highlights that politicians and presidential candidates are failing to adequately address the growing challenges of adapting to climate change. Despite mounting scientific evidence and increasing climate-related disasters, political leaders appear unwilling to engage seriously with the transformative measures required. This denial poses significant risks as societies face accelerating impacts from a warming planet.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/article/2026/06/22/politicians-and-presidential-candidates-remain-in-denial-about-the-challenges-of-adapting-to-global-warming_6754740_114.html", "state_media": false, "category": "政治"}, {"title_ja": "フランスで熱波はより頻繁になっているのか？", "title_en": "Are Heatwaves Becoming More Frequent in France?", "summary_ja": "ル・モンド紙はフランスにおける熱波の発生頻度が増加しているかどうかを検証している。技術的な問題により記事本文を取得することができなかった。見出しから、気候データや極端な高温現象に関するトレンドを分析した内容と推測される。", "summary_en": "Le Monde examines whether heatwaves are increasing in frequency across France. The full article could not be retrieved due to a technical issue with the source page. Based on the headline, the piece likely explores climate data and trends related to extreme heat events in the country.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/videos/video/2026/06/22/are-heatwaves-becoming-more-frequent-in-france_6754747_108.html", "state_media": false, "category": "社会"}, {"title_ja": "カタール首相：スイスでの米・イラン協議で進展", "title_en": "Qatar PM: Progress Made in US-Iran Nuclear Talks in Switzerland", "summary_ja": "カタールのモハンマド・ビン・アブドゥルラフマン・アール・サーニー首相はアルジャジーラに対し、スイスで行われた米国とイランの協議が大きな進展を遂げたと述べた。カタールとパキスタンが仲介したこの交渉は18時間に及び、最終合意に向けた土台が築かれた。現在は両国の技術チームが引き続き交渉を進めている。", "summary_en": "Qatar's Prime Minister Sheikh Mohammed bin Abdulrahman Al Thani told Al Jazeera that US-Iran negotiations held in Switzerland have made significant progress. The talks, mediated by Qatar and Oman, lasted 18 hours and laid the groundwork for a potential final deal. Technical teams from both sides are now continuing the negotiations to work toward a resolution.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/6/22/qatars-pm-tells-al-jazeera-progress-made-in-us-iran-talks?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "ケニア高裁、エボラ隔離施設建設巡り保健大臣を法廷侮辱と認定", "title_en": "Kenyan Court Finds Health Minister in Contempt Over US Ebola Quarantine Site", "summary_ja": "ケニア高裁は、米国人エボラ感染者向け隔離施設の建設を裁判所命令に反して進めたとして、アデン・ドゥアレ保健大臣を法廷侮辱罪と認定した。計画されていたナニュキ近郊のライキピア空軍基地への施設設置は、秘密裏に進められたとして市民や医療従事者の大規模な抗議を引き起こしていた。大臣は火曜日に量刑審問に出廷する予定で、最大20万シリング（約1,500ドル）の罰金または禁錮6カ月が科される可能性がある。", "summary_en": "Kenya's High Court found Health Minister Aden Duale in contempt for proceeding with construction of a quarantine facility for US nationals infected with Ebola, defying multiple court orders issued in late May and early June. The planned site at Laikipia Air Base near Nanyuki sparked widespread protests, with critics arguing it was developed secretly and could threaten Kenya's fragile health system. Duale faces sentencing Tuesday, with penalties including a fine of up to 200,000 shillings ($1,500) and/or six months in jail.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/22/kenyan-court-finds-minister-in-contempt-over-us-ebola-site?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "米・イラン合意はイラン経済を変革するか？", "title_en": "Will a US-Iran Deal Transform the Iranian Economy?", "summary_ja": "米国とイランの合意が実現すれば、凍結資産の解放や石油輸出の急増、数千億ドル規模の投資誘致が期待され、イランの経済的未来が大きく塗り替えられる可能性がある。イランは数十年にわたり厳しい制裁下に置かれ、石油の多くを非公式ネットワークを通じて販売せざるを得なかった。最終合意が成立し維持されれば、テヘランにとって数年来最大の経済的好機となり、国際原油市場やエネルギー価格にも広範な影響を与えるとみられる。", "summary_en": "A potential US-Iran deal could unlock frozen assets, boost oil exports, and attract hundreds of billions in investment, reshaping Iran's economic future. Iran has endured decades of heavy sanctions, forcing it to rely on shadow networks for oil sales. If a final agreement is reached and holds, it would represent the biggest economic opportunity for Tehran in years, with significant implications for global oil markets and energy prices.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/counting-the-cost/2026/6/22/will-a-us-iran-deal-transform-the-iranian-economy?traffic_source=rss", "state_media": false, "category": "経済"}, {"title_ja": "パレスチナ承認と入植者制裁：イスラエル問題におけるスターマー首相の遺産", "title_en": "Keir Starmer's Legacy on Israel: Palestine Recognition and Settler Sanctions", "summary_ja": "英国のキア・スターマー首相は、イスラエル・パレスチナ紛争に関して注目すべき外交政策の遺産を残した。同首相の任期中、英国はパレスチナ国家を承認し、ヨルダン川西岸のイスラエル人入植者への制裁を実施した。これらの措置は、世界で最も複雑な紛争の一つに対する英国の外交姿勢の大きな転換を示している。", "summary_en": "UK Prime Minister Keir Starmer has shaped a notable foreign policy legacy regarding the Israel-Palestine conflict. His tenure has been marked by Britain's recognition of Palestinian statehood and the imposition of sanctions on Israeli settlers in the West Bank. These moves represent a significant shift in British diplomatic positioning on one of the world's most contentious conflicts.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikAJBVV95cUxPMTNZTUkzemZtczg2NVNNLVZYQ3U4dVQxT3lvbW03bnFMNHM0anBNcURuVUdXU2dMTlZDcldKQVpYYXVZaGw1ZkVlOUViUmZhSnBjeUVmN3pGRENEbEV3UEgwblpjelNJZHBHYzczSXZrNGhYLV9xcjR3SjdMbXdUeTVzN2s0aTJSc3F6dGplNGZYQV9FbFFLUXY1RUNIYk1XampacTBPWXdBdEJPQmViMGR2dW1uS2dZcm5LY1k3YkNDOWtSa0NNb18tOWo5UThlQVh1cktUZklYSkJ6eW5SUUJId0dqSEFSZWk5cXQ5LWlKSmZ5QmE0cTJURUZGWHJEam5DUG9lMWFORHBUOE93ZQ?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "イスラエル、北部の全制限を解除　レバノンからの限定的撤退も協議か", "title_en": "Israel Lifts All Restrictions in North, May Discuss Limited Lebanon Withdrawal", "summary_ja": "イスラエルは北部地域に課していた全ての制限を解除し、レバノン国境沿いの緊張緩和に向けた動きを見せている。当局はレバノンからの限定的な撤退についても協議を検討しているとされる。この動きは、最近の衝突を受けたイスラエルの軍事姿勢の転換を示唆している。", "summary_en": "Israel has lifted all restrictions in its northern region, signaling a potential easing of tensions along the Lebanese border. Authorities are also reportedly considering discussions around a limited withdrawal from Lebanon. The move suggests a possible shift in Israel's military posture in the area following recent conflict.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiowJBVV95cUxPb2xsMlo1WFRlZFFOa3FsYXhaWnhqR0JESEpGS1AyRjV5MkpDTXFLTTRWNDlYT1dpdUpRWl9QN2lZWGFLX1BwUThGcDl0c2FQZzhsb21xZVE0a3JvYTVmamVpNGVOeDRfUE9WNmFUbmF2VzczZlZNQm5UWVpocGttYUFpcGFNNUo0REVEMXdQblFucm5VMWxQUnBnR1E1dXF0SHVMRzBMMDdVZGRhRFYtYWQwT2FhaElwVHRoRnFVeHNZbTdZb3B3c1dPX1BHQ0hjZlRENDhtWUtGTThueHlfcU5oV2JUanVFblo2MFhicGk0YXlxRXNaSXppWG14T1pQZjJXcnU4ZnN4ZGZDOURsWmFib3RFNzJVM0dFel90bVRDZUE?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イスラエル軍のティール近郊攻撃で著名なレバノン人ウミガメ保護活動家が死亡", "title_en": "Lebanese Sea Turtle Conservationist Killed in IDF Strike Near Tyre", "summary_ja": "レバノン南部の都市ティール近郊で、イスラエル国防軍による攻撃により、著名なウミガメ保護活動家が死亡した。この人物はレバノンにおける海洋生物保護活動に多大な貢献をしてきたことで知られていた。今回の事件は、レバノンでの継続的な紛争が環境保護活動家を含む市民に与える人的被害を改めて浮き彫りにした。", "summary_en": "A renowned Lebanese sea turtle conservationist was killed in an Israeli Defense Forces attack near the city of Tyre in southern Lebanon. The individual was known for their significant contributions to marine wildlife preservation in the region. The incident has drawn attention to the human cost of ongoing hostilities in Lebanon, including the loss of environmental advocates.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiogJBVV95cUxOc3dwNWFGWldTOUY0YlktQVVKVzFIYXpKVERvOXlvblVucFYwODhUc1QzLXVIR1NvdU1mMlhzb3ZUVnQtN2tYY2J3T0VxdmJ4LS0tNWtWTV8zQ3puOVFqbU5DOHN2cnJBTW9ucW1YcFFwX2VqSlB2dk9rYnltV0FhUFcwa1gzUWlHTExHYUY1azZabWJONEM0SXVrVS1MZjgtRV81czRGZGZZVzdmMzhwSGplTm8tVHpOY3JBZDdPMFZrR3BMY1M3S01KMGlhTWlNandtTjMxSWNDNnFuczF4NEp6RkUxX2tjZWh1aDJqNjFJZGVpX2NPM3VOTzB4bFhYak5FSGNORFY0dlVRMXRlRWZ4MkFaUXhoQjljTVhzSU52QQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "国防省ニュースレター更新 – 2026年6月22日", "title_en": "Mindef Newsletter Update – June 22, 2026", "summary_ja": "シンガポール国防省（Mindef）は、2026年6月22日月曜日にストレーツ・タイムズのメール配信サービスを通じてニュースレターを発行した。読者向けの購読管理オプションが案内されたが、具体的な国防政策や作戦に関する詳細は掲載されていない。", "summary_en": "The Singapore Ministry of Defence (Mindef) issued a newsletter update on Monday, June 22, 2026, distributed via The Straits Times email service. The notice included standard subscription management options for readers. No specific defence policy or operational details were provided in the available excerpt.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治"}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ・ニュースレター", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "ストレーツ・タイムズは、その日のトップニュースをまとめたイブニング・アップデート・ニュースレターを配信しました。この号は2026年6月22日（月曜日）に発行され、同紙の無料ニュースレターサービスの一環として提供されています。読者は提供されたリンクから、購読設定の管理や追加ニュースレターへの登録を行うことができます。", "summary_en": "The Straits Times publishes its Evening Update newsletter, delivering a curated summary of the day's top stories to subscribers. The edition is distributed on Monday, June 22, 2026, as part of the publication's ongoing free newsletter service. Readers can manage their subscription preferences or sign up for additional newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治"}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニング・ブリーフィングは、主要ニュースを毎日読者にお届けするニュースレターです。掲載されたエディションは月曜日発行のメタデータを持っています。読者はストレーツ・タイムズのウェブサイトから購読管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a daily newsletter digest delivering top news stories to subscribers. The edition referenced carries metadata suggesting a Monday publication. Readers can manage their subscription or sign up for additional free newsletters via The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治"}, {"title_ja": "プルバヤ、信頼性と財政管理の試練に直面", "title_en": "Purbaya Faces Test of Credibility and Fiscal Management", "summary_ja": "インドネシア預金保険公社（LPS）のプルバヤ・ユディ・サデワ総裁が、信頼性と財政管理能力における重大な試練に直面している。複雑な金融監督責任を果たしながら、公的機関および国民の信頼を維持することが求められている。同氏のパフォーマンスは、インドネシアの金融安定性とガバナンス水準を示す重要な指標として注目されている。", "summary_en": "Purbaya Yudhi Sadewa, head of Indonesia's Deposit Insurance Corporation (LPS), is facing a significant test of his credibility and fiscal management capabilities. The challenges involve navigating complex financial oversight responsibilities while maintaining public and institutional trust. His performance in this role is seen as a key indicator of Indonesia's broader financial stability and governance standards.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqAFBVV95cUxPQlQyalZ6Z3JIekNSZ1NGU1FwelpJVEdGV1ExVW9uVTZGclZLMzhvdmlsTEtiOEwzdlQxNDlNaFA1c0NOc2lBMk0yUmlrbG95YS16Q3BDYVYwa2htNFNlbHV4NDU2MXRIaGlpSnRxMWFUcVNGRzd4a3lzR3MzOXlaV0RlZVBZdGFLRHQ1aFYzRlRlNnVqYzRIT3ZXVS1mQkFsTnk0QUN2NG8?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "私のすべて：ノンバイナリーになるための旅", "title_en": "All of Me: A Personal Journey of Becoming Nonbinary", "summary_ja": "ジャカルタ・ポスト紙は、ノンバイナリーとしてのアイデンティティを受け入れるまでの個人的な旅を描いた手記を掲載した。伝統的な二元的性別規範の外で生きることの感情的・社会的な困難が綴られている。インドネシア社会において自分らしく生きるための自己発見の過程が率直に描かれている。", "summary_en": "The Jakarta Post features a personal narrative exploring one individual's journey of identifying as nonbinary. The piece reflects on the emotional and social challenges of embracing a gender identity outside traditional binary norms. It offers an intimate look at self-discovery and the process of living authentically in Indonesian society.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqAFBVV95cUxPdHhRQmxQVEZWS2xlOHNfdlZ6SURkRDFsUWxxRlJ1eVpjaEJEbkp6S2Jrcm14bFFoMUNQRzV3MEd6anI0Y1dRVFlMMTJIbWRqRENEWEp3RlNLVkpRRmZJb3FMRmdUNjF1VlRMcldqNWVDc0VET0thb293ZnBLNWF4eWpqRXJXbzNHRC1rTDI3N2kyZVlCdTRlWE9Pc21Wa0NiQVN4WndiZWU?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "スラウェシの古代洞窟壁画、先史時代の芸術はヨーロッパだけではなかった", "title_en": "Sulawesi's Ancient Cave Art Challenges Europe's Monopoly on Prehistoric Creativity", "summary_ja": "インドネシアのスラウェシ島で発見された古代洞窟壁画が、先史時代の人類の創造性に関する従来の見方を覆しつつある。これまでヨーロッパが先史芸術の発祥地とされてきたが、東南アジアでも独自に芸術表現が花開いていたことが示された。この発見は、人類の認知・文化的進化に関するヨーロッパ中心主義的な通説に根本的な疑問を投げかけている。", "summary_en": "Recent discoveries of ancient cave art in Sulawesi, Indonesia, are reshaping our understanding of prehistoric human creativity. The findings suggest that early artistic expression was not exclusive to Europe, as long assumed, but flourished independently in Southeast Asia. This challenges the longstanding Eurocentric narrative of human cognitive and cultural evolution.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMitgFBVV95cUxQdE95UzFpM09BSDdSUV90b0Jxc3BUMHY4azRnRE1DWTZrSVl0QXcxeDJheHFWUFp5WmI4c3UwWU1UWTV1Y2E5czdsTmVxblFvV1V6a1htR2dHUU9VbzB0Q3h1dUlzV09HbkVuaUNGU0JZR2VINmI1RnpKOW1vanhzODBCZEtZWkhVU210SGZmTGw4RkRqUzBhMi1PQl9OVzUweG1mS0xXd3haX0c0VDBCOENEb1NmUQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イスラエル軍がヨルダン川西岸でパレスチナ人10代2人を射殺", "title_en": "Israeli Soldiers Kill Two Palestinian Teens in West Bank Near Jewish Settlement", "summary_ja": "イスラエル軍は6月22日、占領下のヨルダン川西岸にあるユダヤ人入植地カルメイ・ツール近郊で、15歳と19歳のパレスチナ人少年2人を射殺した。イスラエル軍は、3人が火炎瓶と燃えるタイヤで入植地を攻撃したと主張しているが、パレスチナ側はこれに対する即時のコメントを出していない。国連データによると、2026年に入ってからヨルダン川西岸での入植者・軍による事件で少なくとも57人のパレスチナ人が死亡しており、緊張が続いている。", "summary_en": "Israeli soldiers shot and killed two Palestinian teenagers, aged 15 and 19, in the occupied West Bank near the settlement of Karmei Tzur on Monday. The Israeli military said the teens were among three individuals attacking the settlement with fire bombs and burning tyres, while a third person was wounded and hospitalized. The incident highlights ongoing violence in the West Bank, where at least 57 Palestinians have been killed in settler and military incidents since the start of 2026, according to U.N. data.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/israeli-soldiers-shoot-dead-two-palestinian-teens-in-west-bank/article71134681.ece", "state_media": false, "category": "政治"}, {"title_ja": "コロンビア大統領選、右派のデ・ラ・エスプリエリャ氏が僅差で勝利―各国右派指導者が祝意", "title_en": "Rightist Leaders Congratulate Colombia's President-elect De la Espriella After Narrow Victory", "summary_ja": "2026年6月22日、コロンビアの大統領選挙で強硬右派のアベラルド・デ・ラ・エスプリエリャ氏が左派のイバン・セペダ上院議員を僅差で破り、当選を確実にした。得票率はデ・ラ・エスプリエリャ氏が49.66%、セペダ氏が48.70%だった。米国のトランプ大統領やアルゼンチンのミレイ大統領など中南米の右派指導者たちが相次いで祝意を表明し、同氏の勝利はラテンアメリカ全体で続く右派の潮流をさらに強めるものとみられている。", "summary_en": "Hard-right candidate Abelardo de la Espriella won Colombia's presidential election on June 22, 2026, narrowly defeating leftist Senator Ivan Cepeda with 49.66% of the vote. His victory drew congratulations from U.S. President Donald Trump, Argentine President Javier Milei, and other right-leaning leaders across Latin America. De la Espriella's win is expected to improve Colombia's relations with Washington and continues a broader rightward political shift across the region.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/rightist-leaders-congratulate-colombian-president-elect/article71134609.ece", "state_media": false, "category": "政治"}, {"title_ja": "キア・スターマー英首相が就任2年未満で辞任", "title_en": "Keir Starmer Resigns as UK Prime Minister After Less Than Two Years in Office", "summary_ja": "スターマー首相は2026年6月22日、2024年7月の労働党圧勝から2年足らずで辞任を表明した。英国経済はG7で最高水準の成長率や インフレ率の低下、NHS待機リストの縮小など一定の改善を見せていたにもかかわらず、スターマー氏は歴史的な低支持率、党内の不満、政治的判断の失敗、そして改革党など極右勢力の台頭による選挙での敗北に直面していた。先週、「北部の王」と呼ばれる元グレーター・マンチェスター市長のアンディ・バーナムが補欠選挙で議席を獲得したことで、辞任は事実上確定的となった。", "summary_en": "Keir Starmer announced his resignation on June 22, 2026, less than two years after Labour's landslide election victory in July 2024. Despite some economic improvements — including the UK's strongest G7 growth in Q1 2026, falling inflation, and reduced NHS waitlists — Starmer faced historically low poll ratings, internal party discontent, poor political appointments, and electoral losses to Reform and other hard-right parties. His resignation was effectively sealed when Andy Burnham, former Mayor of Greater Manchester, won a Westminster by-election last week.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/analysis-why-keir-starmer-resigned/article71132963.ece", "state_media": false, "category": "政治"}, {"title_ja": "台湾がMQ-9B「スカイガーディアン」ドローンの試験運用を開始", "title_en": "Taiwan Begins Testing MQ-9B SkyGuardian Drone", "summary_ja": "台湾がMQ-9B「スカイガーディアン」無人航空機の試験運用を開始したと、フォーカス台湾が情報筋の話として報じた。この高性能ドローンの導入は、台湾の監視・防衛能力を強化する上で重要な一歩となる。試験プログラムの規模や期間についての詳細は明らかにされていない。", "summary_en": "Taiwan has commenced testing of the MQ-9B SkyGuardian drone, according to a source cited by Focus Taiwan. The advanced unmanned aerial vehicle represents a significant step in bolstering Taiwan's surveillance and defense capabilities. Details about the scope and timeline of the testing program have not been fully disclosed.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTFBZczFqSzVBSHUtN09KbDViLXhJSzdFMms1LTRFSE5RMmc5QXhfSzFXa3c3TjN2MzJjUlpzSC1YRkI1Qm9TNFhwQXBucnY1YWdtdGtxNXU0MA?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "野球チアリーダー、モデル仕事中に刃物による襲撃を生き延びる", "title_en": "Baseball Cheerleader Survives Knife Attack During Modeling Gig", "summary_ja": "台湾の野球チアリーダーが、モデルとして仕事をしている最中に刃物で襲われたが、一命を取り留めた。被害者は何とか逃れることができ、当局が事件の捜査を進めている。チアリーダーの知名度の高さから、この事件は社会的に大きな注目を集めている。", "summary_en": "A baseball cheerleader in Taiwan survived a knife attack that occurred while she was working a modeling engagement. The victim escaped the assault and authorities are investigating the incident. The case has drawn significant public attention given the cheerleader's public profile.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTFAxTVpFVnczNkYzbDFlbUh5SzBVQnJaZTROemtPQVZ1YWl1YTgzMlhjUUxfclhTOXRyc3FXR1p5T1NKN25jVnB3cHMxdmxyVUVSUHpGSzBR?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾、中国による侵攻に備えた即応訓練を実施", "title_en": "Taiwan Conducts Quick Response Drill Against Potential Chinese Invasion", "summary_ja": "台湾は、中国による侵攻の可能性に備えた軍事即応訓練を実施している。この演習は、台湾海峡の緊張が高まる中、台湾が防衛態勢の強化に継続的に取り組んでいることを示している。こうした訓練は、中国からの脅威に対する軍事能力と対応速度を向上させるための台湾の広範な戦略の一環である。", "summary_en": "Taiwan is conducting a quick response military drill designed to prepare for a possible Chinese invasion. The exercise reflects Taiwan's ongoing efforts to bolster its defense readiness amid heightened cross-strait tensions. Such drills are part of Taiwan's broader strategy to enhance its military capabilities and response times in the face of perceived threats from China.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE44eEhRdDdJZS1JaW5oSThoTmhhaHZBQmZDRmVtallHdkRhVXJBNXdPSnkxcWlPdU5hblhMSGxRcjlYb3pqNjN0ZHFXU09WQ3c0NzdadjRQQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イタマラチー、トランプ氏の選挙介入を警戒―「ブラジルはベネズエラではない」", "title_en": "Brazil's Foreign Ministry Fears Trump Election Interference, Says Brazil 'Is Not Venezuela'", "summary_ja": "ルラ政権はトランプ米大統領がブラジルの選挙に介入する可能性を注視しており、外交官たちはその意図が次第に明確になっていると指摘している。トランプ氏はG7でブラジルの政治状況を「危険」と発言し、ボルソナロ一家を擁護したことで懸念が高まり、ルラ大統領は「ブラジルの選挙に介入するな」と公式に警告した。政府内では即時対応を求める声がある一方、トランプ氏がルラ氏への好意を示しながらもボルソナロ一家を支持するという矛盾したシグナルを慎重に見極めるべきとの意見も存在する。", "summary_en": "The Lula administration is closely monitoring signs of U.S. President Donald Trump potentially interfering in Brazil's upcoming elections, with diplomats noting his intentions are becoming increasingly apparent. Trump drew comparisons to Venezuela after capturing Nicolás Maduro and defending the Bolsonaro family at the G7, prompting Lula to publicly warn him not to interfere. While some government allies demand an immediate response, others urge caution, noting Trump's mixed signals as he claims to like Lula while simultaneously backing the Bolsonaro family.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米当局、逮捕のブラジル人男性をPCC・CVの幹部と主張するも判決に証拠なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC, but Court Records Show No Gang Link", "summary_ja": "米移民税関執行局（ICE）は、ノースカロライナ州で逮捕したブラジル人フェリペ・リナレス・デ・オリヴェイラ・デル・アキッラ容疑者を、ブラジルの大規模犯罪組織PCCとCVの「幹部」と称した。しかし、ブラジルでの薬物密売・詐欺・恐喝に関する過去の有罪判決には、両組織への言及が一切含まれていない。米国土安全保障省の主張と司法記録の間に食い違いがあり、その根拠に疑問が生じている。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested in North Carolina by ICE, which labeled him a 'commander' of both the PCC and CV criminal organizations. However, his prior Brazilian convictions for drug trafficking, fraud, and extortion contain no mention of either group. The U.S. Department of Homeland Security's claims remain unsubstantiated by court records, raising questions about the accuracy of the designation.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ブラジル、G7文書の大半を拒否　トランプ配慮の内容に異議", "title_en": "Brazil Breaks With G7 on Key Documents, Citing Trump-Driven Omissions", "summary_ja": "ブラジルはフランス・エビアンで開催されたG7サミットで発表された5つの文書のうち2つにしか署名せず、テキストがトランプ大統領を刺激しないよう内容を薄めたと批判した。ブラジルは国際開発とエボラ出血熱に関する声明を拒否し、気候変動やWHO、対外債務、飢餓問題が除外されたことを問題視した。癌と麻薬密売に関する声明には賛同したが、マクロ経済不均衡や移民、重要鉱物に関するテキストは拒否する見通しだ。", "summary_en": "Brazil signed only two of five documents issued at the G7 summit in Évian, France, arguing the texts were watered down to avoid upsetting President Trump. Brasília rejected statements on international development and the Ebola outbreak, criticizing the omission of climate change, WHO, foreign debt, and hunger. Brazil did align on cancer and drug trafficking statements, but is expected to reject texts on macroeconomic imbalances, migration, and critical minerals.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/brazil-diverges-from-most-g7-documents-says-texts-were-shaped-to-avoid-upsetting-trump.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ザンファラ州政府、停職中の工科大学学長を調査する委員会を設置", "title_en": "Zamfara Govt Forms Panel to Investigate Suspended Abdu Gusau Polytechnic Rector", "summary_ja": "ナイジェリアのザンファラ州政府は、アブドゥ・グサウ工科大学の停職中の学長シラジョ・アブドゥラヒ・シンカフィ博士に対する行政上の重大な不正行為および服務違反の疑いを調査する8人委員会を発足させた。委員会は元行事長ムジタバ・イサ氏を委員長とし、州都グサウで州政府長官により正式に発足した。州政府はこの調査を通じて、工科大学および州立高等教育機関全体のガバナンス強化にも役立てる方針を示している。", "summary_en": "The Zamfara State Government has inaugurated an eight-member panel to investigate allegations of gross administrative misconduct and insubordination against the suspended Rector of Abdu Gusau Polytechnic, Dr Sirajo Abdullahi Shinkafi. The panel, headed by former Head of Service Mujtaba Isah, was inaugurated by the state's Secretary to the Government in Gusau and tasked with ensuring fairness and objectivity. Beyond the specific probe, the government also expects the panel to identify institutional governance gaps and recommend improvements across state-owned tertiary institutions.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/promoted/889836-zamfara-govt-inaugurates-panel-to-probe-suspended-poly-rector-over-alleged-misconduct.html", "state_media": false, "category": "社会"}, {"title_ja": "コギ州治安部隊が違法武器を押収、容疑者3人逮捕", "title_en": "Kogi State Security Forces Intercept Illegal Arms Cache, Arrest Three Suspects", "summary_ja": "ナイジェリアのコギ州で、DSS・陸軍・国家安全保障顧問室のハイブリッド部隊による合同作戦が実施され、武装犯罪グループへ輸送されていた違法武器が押収された。容疑者3人は2週間以上の監視を経てソコト州で逮捕され、AK-47ライフル2丁、拳銃2丁、実弾67発、軍用制服などが回収された。当局は、この武器が最近の軍事作戦で打撃を受けた犯罪集団への補充物資であったとみており、捜査を継続している。", "summary_en": "Kogi State security operatives, in a joint operation involving the DSS, Nigerian Army, and ONSA Hybrid Forces, intercepted illegal weapons being transported to criminal groups in the state. Three suspects were arrested in Sokoto State after more than two weeks of surveillance, and recovered items include two AK-47 rifles, two pistols, 67 rounds of ammunition, and military uniforms. Authorities believe the weapons were intended to resupply criminal gangs weakened by recent military operations, including those following the killing of suspected bandit leader Kachalla Batijo.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/north-central/889832-kogi-intercepts-illegal-arms-arrests-suspects.html", "state_media": false, "category": "政治"}, {"title_ja": "ナイジェリア軍、ソコトとカツィナで攻撃撃退・拉致被害者を救出", "title_en": "Nigerian Troops Repel Attack, Rescue Abductees in Sokoto and Katsina", "summary_ja": "ナイジェリア合同任務部隊「作戦ファンサン・ヤンマ」の部隊は、ソコト州トゥレタでテロリストの攻撃を撃退し、拉致された民間人を救出するとともに、追跡中の伏撃を突破して略奪された家畜を回収した。別動隊はカツィナ州マタズで武装勢力の拠点を急襲し、戦闘員2人を殺害、小銃や通信機器など複数の装備品を押収した。北西部地域では誘拐や家畜略奪が続いており、軍は作戦を継続して武装ネットワークの解体を目指すと表明している。", "summary_en": "Nigerian Joint Task Force troops of Operation FANSAN YAMMA repelled a terrorist attack in Tureta, Sokoto, rescuing abducted civilians and recovering rustled cattle after pursuing fleeing gunmen through an ambush. In a separate raid in Matazu, Katsina, troops stormed a suspected terrorist enclave, killing two fighters and seizing weapons including a PKT assault rifle, an AK-47, motorcycles and communication devices. The operations come amid heightened security concerns in the North-West region, where attacks, kidnappings and cattle rustling continue despite repeated military offensives.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/889830-troops-repel-attack-rescue-abductees-in-sokoto-katsina.html", "state_media": false, "category": "社会"}, {"title_ja": "イラン・米国協議がスイスで終了、60日間のロードマップを設定", "title_en": "Iran-US Talks in Switzerland Set 60-Day Roadmap Toward Final Nuclear Deal", "summary_ja": "CGTNによると、イランと米国の覚書（MoU）に基づく初の高級協議がスイスのビュルゲンシュトックで終了し、仲介役のパキスタンとカタールは「積極的かつ建設的な雰囲気」の中で進展があったと発表した。CGTNの報道では、両者は政治的監督を担う高級委員会の設立と60日以内の最終合意を目指すロードマップを承認し、レバノンにおける軍事作戦の停止を監視する調整機関の創設にも合意したとされる。一方でCGTNは、イラン側交渉団が米国による停戦合意違反を抗議し、イスラエル軍が南レバノンの「安全地帯」から撤退しなければホルムズ海峡を再開放しないとの立場を示したと伝えている。", "summary_en": "CGTN reports that the first session of high-level Iran-US talks under their Memorandum of Understanding concluded in Burgenstock, Switzerland, with mediators Pakistan and Qatar stating progress was made in a 'positive and constructive atmosphere.' CGTN reports that the parties agreed to establish a High-Level Committee and endorsed a 60-day roadmap toward a final agreement, along with a deconfliction cell to monitor compliance with the cessation of military operations in Lebanon. CGTN further reports that Iran's Foreign Minister Araghchi claimed major concessions including sanctions waivers on oil exports and the release of some frozen assets, while Iranian negotiators protested alleged US ceasefire violations linked to continued Israeli military presence in southern Lebanon.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-22/news-1OaWrEvA0Tu/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "シカゴで銃撃相次ぐ、ジューンティーンス祝日週末に8人死亡・38人負傷", "title_en": "8 Killed, 38 Injured in Chicago Shootings Over Juneteenth Holiday Weekend", "summary_ja": "CGTNによると、米シカゴでジューンティーンスの祝日週末に一連の銃撃事件が発生し、地元警察の発表として少なくとも8人が死亡、38人が負傷したと報じている。CGTNによれば、6月19日夜には市南部で2人の銃撃犯がSUVから群衆に向けて発砲し、少なくとも12人が負傷したとされる。トランプ大統領は軍事介入を改めて求めたが、シカゴ市警のデータでは近年、全国的な傾向と同様に同市の凶悪犯罪は概ね減少しているとCGTNは伝えている。", "summary_en": "CGTN reports that at least 8 people were killed and 38 injured in a series of shootings across Chicago during the extended Juneteenth holiday weekend, according to local police. CGTN reports that among the incidents, at least 12 people were wounded on the night of June 19 when two gunmen fired from an SUV into a crowd on the city's Far South Side. CGTN reports that President Trump renewed calls for military intervention, while Chicago Police Department data shows violent crime has generally declined in the city in recent years despite a slight uptick in shooting incidents compared to the first half of last year.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-22/8-killed-38-injured-in-shootings-during-holiday-weekend-in-Chicago-1OaSletOKjK/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "米国とイランが平和覚書に署名、パキスタン首相が発表", "title_en": "US and Iran Sign Peace MoU, Pakistani PM Announces", "summary_ja": "CGTNによると、パキスタンのシェバズ・シャリフ首相は、米国とイランが「イスラマバード覚書」に電子署名したと発表した。CGTNによれば、この合意に基づき、イランはホルムズ海峡を即時再開し、米国は海上封鎖を直ちに解除するとされている。発表は2026年6月18日木曜日に行われた。", "summary_en": "CGTN reports that Pakistani Prime Minister Shehbaz Sharif announced the signing of the 'Islamabad Memorandum of Understanding' between the United States and Iran. CGTN reports that under the agreement, Iran will reopen the Strait of Hormuz and the US will lift its naval blockade. The announcement was made on Thursday, June 18, 2026.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-18/news-1O4clPiSLhm/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "メッシ、W杯男子部門の歴代最多得点者になったとタスが報道", "title_en": "Messi Becomes All-Time Leading Goalscorer in Men's World Cup History", "summary_ja": "タス通信は、アルゼンチンのリオネル・メッシがオーストリア戦でFIFAワールドカップ通算17得点目を記録し、男子W杯史上最多得点者になったと報じた。同通信によれば、この得点によりメッシはドイツのミロスラフ・クローゼと並んでいた16得点の記録を更新したとされる。", "summary_en": "TASS reports that Argentina's Lionel Messi scored his 17th FIFA World Cup goal during a match against Austria, which the outlet claims makes him the all-time leading goalscorer in men's World Cup history. TASS reports that this goal broke the previous joint record of 16 goals, which Messi had shared with Germany's Miroslav Klose.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/sports/2149969", "state_media": true, "category": "社会"}, {"title_ja": "トランプ氏、イランが大規模な核査察に同意すると主張", "title_en": "Trump Claims Iran Will Agree to Large-Scale Nuclear Inspections", "summary_ja": "ロシア国営メディアのTASSは、トランプ米大統領がイランは将来にわたる「核の誠実さ」を確保するため、大規模な兵器査察に同意するだろうと主張していると伝えている。TASSによると、米国とイランは了解覚書に署名しており、ペンス副大統領はイランがIAEA査察官を核施設に再招待することに合意したと述べたという。TASSはさらに、バンス副大統領がこれを「イランの核プログラムの最終的な非核化または終了への第一歩」と表現し、査察官が6月22日にも到着する可能性を示唆したと報じている。", "summary_en": "State media outlet TASS reports that US President Donald Trump claims Iran will agree to major weapons inspections to ensure 'nuclear honesty' going forward. TASS further reports that Washington and Tehran have signed a memorandum of understanding, with Vice President JD Vance stating that Iran agreed to reinvite IAEA inspectors to its nuclear facilities. TASS reports that Vance described this as 'the first step towards final denuclearization or the termination of the nuclear program in Iran,' suggesting inspectors could arrive as early as June 22.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2149967", "state_media": true, "category": "政治"}, {"title_ja": "トルコ与党：米・イラン和平の実質的作業は始まったばかり、イスラエルが妨害と主張", "title_en": "Turkey: Substantive US-Iran Peace Work Just Starting, Israel Seeking to Disrupt Process", "summary_ja": "トルコの与党・公正発展党（AKP）のオメル・チェリク報道官は、米国とイランの和平合意に向けた実質的な作業は始まったばかりだとTASSが伝えている。チェリク氏によると、ホルムズ海峡の開放や米国による封鎖解除など主要問題を60日以内に解決する必要があるという。同報道官はまた、イスラエルがこの和平プロセスを「根底から覆すような過激な発言」を行っていると主張し、バンス米副大統領がイスラエルに和平尊重を求めたと言及した。", "summary_en": "Turkey's ruling AKP spokesman Omer Celik reports that the substantive work on a US-Iran peace agreement is only beginning, with key issues such as the opening of the Strait of Hormuz and lifting of US sanctions to be resolved within a 60-day window. TASS reports that Celik claims Israel is making 'radical statements to undermine' the peace process, and called for a firm stance against Israeli aggression. He also cited US Vice President Vance's reported warning that Israel must respect the ongoing peace process.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2149961", "state_media": true, "category": "社会"}, {"title_ja": "トランプ氏の労働者層支持基盤に亀裂、中間選挙に暗雲", "title_en": "Cracks Show in Trump's Blue-Collar Base Ahead of Midterms", "summary_ja": "コラムニストのスティーブン・グリーンハウス氏は、白人労働者層におけるトランプ大統領の支持率が急落し、不支持率が2025年2月の32%から現在54%に上昇したと論じている。インフレの高止まり、製造業雇用の減少、イランとの戦争、そしてメディケイドや食料支援の削減が支持基盤の離反を招いているという。筆者はこの動向が、民主党が11月の中間選挙で上下両院を奪還する好機になり得ると主張している。", "summary_en": "Opinion columnist Steven Greenhouse argues that Trump's support among white working-class voters has collapsed dramatically, with 54% now disapproving of his performance, up from 32% in early 2025. Greenhouse contends that Trump has failed to deliver on key promises—lower prices, manufacturing job growth, and avoiding foreign wars—while the Iran conflict, high inflation, and cuts to Medicaid and food assistance have alienated his core base. The author suggests this growing disenchantment presents a significant opportunity for Democrats to recapture the House and Senate in the November midterms.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/22/trump-voter-base-support-loss", "state_media": false, "category": "オピニオン"}, {"title_ja": "AIの台頭で「エリートキャリアの登竜門」コンサル業界が崩壊しつつある", "title_en": "The Slow Death of the Prestige Consulting Career in the Age of AI", "summary_ja": "寄稿者アリス・ラスマンは、AIの普及によってエリートコンサルティングファームのキャリアが持つ本質的な価値が失われつつあると主張する。マッキンゼーやBCGなどが社内AIツールを導入した結果、若手アナリストが担ってきた分析業務の大半がAIに代替され、育成モデルそのものが機能不全に陥っている。かつて「黄金のチケット」と呼ばれた転職・独立へのキャリアパスも縮小しており、コンサル業界はエリート養成機関としての地位を急速に失いつつあるというのが筆者の見解だ。", "summary_en": "Opinion writer Alice Lassman argues that AI is fundamentally undermining the value proposition of elite consulting careers, where junior analysts traditionally built foundational skills through hands-on work. With firms like McKinsey and BCG deploying internal AI tools that handle core analytical tasks, entry-level roles have been reduced to little more than fact-checking and prompt management, hollowing out the apprenticeship model. Lassman contends that both the skill-building promise and the coveted exit opportunities that made consulting a 'golden ticket' are rapidly disappearing, signaling the broader decline of the prestige career path.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/22/consulting-ai-prestige-careers", "state_media": false, "category": "オピニオン"}, {"title_ja": "意見：2026年に18歳を迎える400万人、なぜ有権者登録をしないのか", "title_en": "Opinion: Four Million Turning 18 in 2026 — Why Aren't We Registering Them to Vote?", "summary_ja": "著者のローラ・W・ブリル氏は、若者の有権者登録率が低い原因は無関心ではなく制度的な障壁にあると主張する。中間選挙年には18歳の登録率が30%未満にとどまる一方、登録済みの若者は高齢者とほぼ同水準の投票率を示すというデータを示す。同氏は高校での有権者登録を卒業前の標準的な手続きとして義務付けることを提唱し、オレゴン州やミシガン州の成功例を挙げて問題は解決可能だと訴えている。", "summary_en": "Author Laura W. Brill argues that America's failure to register young voters stems not from apathy but from systemic barriers, noting that fewer than 30% of 18-year-olds are registered in typical midterm years. She contends that making voter registration a standard part of high school education is the most practical fix, pointing to states like Oregon and Michigan as proof the problem is solvable. Brill calls on lawmakers to prioritize automatic and school-based pre-registration while urging communities to act in the meantime.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/21/young-people-voter-registration", "state_media": false, "category": "オピニオン"}, {"title_ja": "AIで職を失う労働者たち：貿易調整支援の教訓", "title_en": "When Workers Lose to AI: Lessons from Trade Adjustment Assistance", "summary_ja": "筆者は、AIによる大規模な雇用喪失に備えるにあたり、1962年に設立された貿易調整支援（TAA）プログラムの失敗の歴史から学ぶ必要があると主張する。TAAはAI時代の労働政策のモデルとして度々引用されているが、狭い受給資格、対応の遅さ、労働者の主体性の欠如により目標を達成できなかった。AI時代に有効な政策は、財政的支援や職業訓練にとどまらず、雇用喪失の規模に見合った新たな雇用創出を伴うものでなければならないと論じている。", "summary_en": "The author argues that the U.S. must learn from the flawed history of Trade Adjustment Assistance—a program created in 1962 to aid workers displaced by trade—as it prepares for potentially massive AI-driven job displacement. While TAA is frequently cited as a model for AI labor policy, the author contends it fell short due to narrow eligibility, slow implementation, and a lack of worker agency. Effective AI-era programs must provide financial cushions, job training, and proactive job creation at a scale that matches the true breadth of displacement.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/when-workers-lose-ai", "state_media": false, "category": "オピニオン"}, {"title_ja": "中国は戦わずして台湾を手に入れられるか", "title_en": "China Could Win Taiwan Without Fighting", "summary_ja": "筆者は、習近平が軍事力を用いずに台湾を支配下に置くため、トランプ政権の台湾に対する懐疑的姿勢を巧みに利用していると論じる。外交的圧力を通じて米国の対台湾政策の「常識」を塗り替えることで、台湾に北京との妥協を迫ることが狙いだという。米国が台湾へのコミットメントで譲歩し続ければ、地域のパワーバランスが中国に有利な形で決定的に変化すると警告している。", "summary_en": "The author argues that Xi Jinping is pursuing a strategy to gain control of Taiwan without military force by leveraging the Trump administration's skepticism toward the island. By pressuring Washington to distance itself from Taiwan through diplomatic signaling and exploiting Trump's transactional instincts, Xi aims to redefine U.S. policy norms in ways that would erode Taiwan's confidence in American support. The author warns that if the U.S. continues ceding ground on Taiwan commitments, it risks a decisive regional power shift in Beijing's favor.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/taiwan/china-could-win-taiwan-without-fighting", "state_media": false, "category": "オピニオン"}, {"title_ja": "欧州を救う唯一の道：ドイツ主導の統合深化", "title_en": "The Only Way to Save Europe: German-Led Integration", "summary_ja": "筆者は、EUが米国の信頼性低下・ロシアの侵略・中国の圧力という外部の脅威と、ポピュリスト・ナショナリズムという内部の危機という二重の存亡的課題に直面していると論じる。これに対応する唯一の手段は、マリオ・ドラギ前ECB総裁の改革提言とドイツのリーダーシップを結びつけ、欧州統合を一段と深化させることだと主張する。統合の質的飛躍によってEUは戦略的自律性を獲得し、経済再生を通じて反自由主義的ポピュリズムの潮流にも対抗できると訴えている。", "summary_en": "The author argues that the EU faces existential threats from without—including U.S. unreliability, Russian aggression, and Chinese pressure—and from within, as populist nationalism erodes cohesion. The only effective response, the author contends, is to deepen European integration by combining Mario Draghi's reform agenda with assertive German leadership. This would allow the EU to achieve strategic autonomy, act as a unified global actor, and generate the economic growth needed to counter illiberal populism.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/europe/only-way-save-europe", "state_media": false, "category": "オピニオン"}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  const sb=document.getElementById("d-state");
  sb.style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-22 18:25 JST";
renderTabs();renderList();
</script>
