rship. That requires treating local buy-in as an asset rather than a hurdle. U.S. regulators and developers must transform permitting from a single moment of consent into a sustained relationship. If they fail to make this shift, the United States risks a future in which projects stall in litigation, local resistance hardens into permanent opposition, and the country cedes an important strategic advantage to rivals willing to build without the public’s consent.\nTHE VIEW FROM CAYUGA\nI have observed this debate not as a detached analyst but as a resident of Lansing, New York, where the energy and digital infrastructure company TeraWulf is seeking to develop a large data center campus supporting next-generation AI computing on the site of a retired coal plant. The proposal has drawn passionate support and opposition from local residents and officials.\nLike many in the community, I value Cayuga Lake not as an abstraction but as something irreplaceable that we have a duty to protect. At the same time, the region’s economic realities are difficult to ignore: a shrinking tax base, aging infrastructure, and rising public costs that have strained local government for years.\nAs both a resident who would live with the project’s consequences and a tech policy scholar who studies the governance of digital infrastructure and has a background in environmental impact, I offered to conduct an independent assessment of the project’s likely effects on water use, power demand, employment, and the local tax base. (The company agreed and compensated me for the time required to conduct the analysis. It had no role in determining the scope of the study, conducting the research, interpreting the findings, or drafting the report, and it exercised no editorial control over the final product.) I found that the engineering, on its own terms, was sound. The proposed closed-loop cooling system would largely eliminate operational water withdrawals from Cayuga Lake, replacing the retired coal plant’s once water-intensive operations. Similarly, although the data center campus’s electricity demand would be substantial, the site already has considerable transmission infrastructure and is located within a regional grid in which electricity generation is predominantly carbon free and sizable surplus capacity exists.\nRegulators and developers must treat local buy-in as an asset rather than a hurdle.\nMuch of the opposition ran on misinformation and the conflation of project-specific issues with broader anxieties. Some concerns reflected a general apprehension about AI, corporate power, and environmental change that extended beyond the project itself. Questions about surveillance, workers being displaced by AI, and environmental harm became intertwined with d", "translation_ja": "AIを構築するより良い方法\n\n米国が人工知能に必要なインフラの整備を急ぐ中、ある制約に直面している。地域レベルにおける正統性の問題だ。データセンター、送電線、エネルギー集約型の演算施設は戦略的資産となり、経済的競争力と国家権力の中核を担っている。しかしそれらは、国家の野心と必ずしも一致しない優先事項を持つ地域社会において、立地選定され、許可を取得し、維持されなければならない。その結果、連邦政府の技術戦略と、その実施を担う地方統治構造との間に、広がる乖離が生じている。\n\n国家的野心と地方の権限との間のこうした緊張は、普遍的なものではない。たとえば中国では、大規模なデジタルインフラが国家調整のプロセスを通じて計画・許可・建設され、地方の反対意見が国家的優先事項に従属させられる。中国共産党はデータセンター、送電回廊、エネルギープロジェクトを、交渉による成果物ではなく国家戦略の手段として扱う。そのモデルは固有の政治的・社会的リスクを伴う——プロジェクトに異議を唱える自由や、計画立案者に責任を問う法的・政治的手段を持たない地域社会に負担を集中させるのだ。しかしそれは戦略的優位性をもたらす。すなわち、スピード、規模、そして予測可能性だ。\n\nこれとは対照的に、米国は地方政府に拒否権を与える分散型システムの中で、同等の野心を追求しなければならない。もし米国がAIにおいてリードすることを真剣に考えるなら、国家的野心と地域の正統性を結びつける制度モデルが必要となるだろう。そのようなモデルなしには、AIリーダーシップの物理的基盤はコミュニティごとに争われ続け、新たなデータセンターはそれぞれ、技術的進歩がいかに統治されるべきかをめぐるより大きな闘争の戦場となるリスクがある。そのパターンはますます見慣れたものになりつつある。企業が施設を提案し、地域社会が反対運動を起こし、議論は不信感、流言、硬直した立場へと堕落していく。その結果は単なる遅延にとどまらず、双方の信頼喪失であり、それが妥協をますます困難にする。\n\n民主主義的制度にとっての課題は、中国を模倣することではなく、技術的リーダーシップを維持するのに十分な速さで適応することだ。そのためには、地域の賛同を障害としてではなく、資産として扱うことが求められる。米国の規制当局と開発業者は、許認可プロセスを一度限りの同意の瞬間から、持続的な関係へと転換しなければならない。この転換を怠れば、米国はプロジェクトが訴訟で行き詰まり、地域の抵抗が恒久的な反対へと固化し、公衆の同意なしに建設しようとする競合国に重要な戦略的優位性を譲り渡す未来を迎えるリスクがある。\n\nカユガからの視点\n\n私はこの議論を、超然とした分析者としてではなく、ニューヨーク州ランシングの住民として観察してきた。そこではエネルギーとデジタルインフラ企業のテラウルフが、廃炉となった石炭発電所跡地に次世代AI演算を支援する大規模データセンターキャンパスを開発しようとしている。この提案は地元住民や行政からの熱烈な支持と反対の両方を集めている。\n\n地域の多くの人々と同様、私もカユガ湖を抽象的なものとしてではなく、私たちが守る義務を持つ代替不可能なものとして大切にしている。同時に、この地域の経済的現実を無視することはできない。縮小する税基盤、老朽化するインフラ、地方政府を長年圧迫してきた増大する公共コストだ。\n\nプロジェクトの結果とともに生きることになる住民として、またデジタルインフラのガバナンスを研究し環境影響の専門知識を持つテクノロジー政策研究者として、私はプロジェクトが水使用量、電力需要、雇用、地元税基盤に与える可能性のある影響について独立した評価を実施することを申し出た。（同社はこれに同意し、分析の実施に要した時間に対して報酬を支払った。同社は調査範囲の決定、研究の実施、調査結果の解釈、報告書の起草において何ら関与せず、最終成果物に対して編集上の管理も行使しなかった。）私は、エンジニアリングそれ自体としては健全であると判断した。提案された閉ループ冷却システムは、カユガ湖からの運用上の水取水をほぼ完全に排除し、廃炉となった石炭発電所のかつての水集約的な運用を置き換えるものだ。同様に、データセンターキャンパスの電力需要は相当なものになるが、この立地にはすでにかなりの送電インフラが存在し、発電の大部分が実質的にカーボンフリーで相当な余剰容量を持つ地域系統内に位置している。\n\n規制当局と開発業者は、地域の賛同を障害としてではなく資産として扱わなければならない。\n\n反対意見の多くは誤った情報と、プロジェクト固有の問題をより広範な不安と混同することによって動いていた。一部の懸念は、プロジェクト自体を超えたAI、企業権力、環境変化に対する一般的な不安を反映していた。監視、AIによる雇用喪失、環境被害に関する疑問が、個別の提案とは直接関係のない議論へと絡み合っていった。", "vocab": [{"word": "decentralized", "definition": "権限や機能が中央ではなく地方や複数の主体に分散している状態を指す形容詞。政治・行政・組織構造の文脈でよく使われる。"}, {"word": "permitting", "definition": "政府機関がインフラや建設プロジェクトに対して許可・認可を与えるプロセスのこと。米国では複雑な規制手続きを伴う重要な行政行為を指す。"}, {"word": "subordinate", "definition": "動詞として使う場合、あるものを別のものより低い地位・優先度に置くことを意味する。ここでは地方の反対意見を国家的優先事項に従属させるという意味で用いられている。"}, {"word": "conflation", "definition": "異なる概念や問題を誤って一つのものとして混同・融合させること。論理的誤りや議論の混乱を指摘する文脈で使われる名詞。"}, {"word": "hardened", "definition": "立場や態度が柔軟性を失い、より強固・頑固になった状態を表す形容詞。交渉や対立の文脈で「強固な立場」を表すのに使われる。"}, {"word": "cede", "definition": "権利、領土、優位性などを相手に譲り渡す・放棄することを意味する動詞。国際政治や競争の文脈で戦略的不利益を表す際によく使われる。"}, {"word": "closed-loop cooling", "definition": "データセンターや工業施設で用いられる冷却方式で、冷却水を外部に排出せず循環再利用するシステム。環境負荷を低減するための技術的手法を指す専門用語。"}]}, {"title_ja": "信頼なくして大西洋同盟は存続できない", "title_en": "The Transatlantic Alliance Can't Survive Without Trust", "summary_ja": "筆者は、欧州がついにNATOの防衛費目標を達成しつつある一方で、トランプ政権の一方的な行動と欧州同盟国を重要な意思決定から排除する姿勢が、深刻な信頼の危機を招いていると主張する。この信頼の失墜は、米国が最も必要とする同盟そのものを損なうリスクをはらんでいる。ワシントンが関係修復に動かなければ、ますます強力かつ価値ある同盟国を失いかねないと警告する。", "summary_en": "The author argues that while Europe is finally meeting NATO defense spending targets — doing exactly what Washington has long demanded — the Trump administration's unilateral actions and exclusion of European allies from key decisions have created a dangerous crisis of trust. This erosion of confidence risks undermining the very alliance the United States needs most. Unless Washington repairs the damage, it may lose an increasingly capable and valuable partner.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/nato-transatlantic-alliance-cant-survive-without-trust", "state_media": false, "category": "オピニオン", "full_text": "For over a decade, U.S. President Donald Trump has accused Washington’s European allies of free-riding on American security guarantees. He has been criticizing NATO members that do not pay “their fair share” since launching his first presidential campaign in 2015. He threatened to pull out of the alliance after winning office, and then again when running for president in 2024. Just a few weeks ago, at a NATO meeting, U.S. Secretary of Defense Pete Hegseth announced a six-month review of the American military presence in Europe and declared that Washington’s payment of its annual NATO dues would be “contingent on other countries’ meeting their defense spending targets.” And at this month’s NATO summit in Turkey, the Trump administration’s threats to stop supporting Europe will surely hang over the proceedings.\nThe United States has suggested it might cut back its contributions to European security on many occasions since the end of the Cold War, but it has always come to the continent’s defense when required. When Europe proved unable to manage the war that broke out in Bosnia and Herzegovina in 1992, the United States intervened, paving the way for negotiations that ended the conflict. And even though Washington showed little appetite for coordinating a response to Russia’s annexation of Crimea in 2014, handing the diplomatic reins to France and Germany, the U.S. government stepped up after Russia’s full-scale invasion in 2022, offering strategic leadership and providing the bulk of NATO members’ military support to Ukraine. Throughout this time, the United States has pushed Europe to shoulder a greater share of NATO’s defense burden. But Europeans, confident that Washington would continue to support them when it counted, did not take this message as seriously as they should have.\nThe Trump administration has now challenged Europe’s sense of safety. It has downplayed U.S. interests in Ukraine, excluded European countries from talks to end the war there and from American deliberations to start a war with Iran, and eschewed formal processes to coordinate withdrawals of U.S. conventional forces from Europe. Unsure of the United States’ reliability and worried about facing Russian aggression alone, Europe has begun gathering the necessary resources to become a capable military power. The irony is that just as Europe becomes the kind of partner the United States should want on its side, Washington’s behavior has created a crisis of trust within the alliance. Now, if Washington cannot repair the damage it has done, it risks losing this ever more valuable ally altogether.\nESTRANGED PARTNERS\nOn paper, the transatlantic alliance is stronger and more balanced than ever. Almost all NATO members have met or exceeded the alliance’s defense spending target of two percent of GDP as of 2025, with spending increasing by 20 percent between 2024 and 2025. European allies and Canada now account for 40 percent of NATO’s total defense spending, up from 30 percent in 2020. If Europeans meet NATO’s 2035 targets, they would be spending more than $800 billion, a significant increase from Europe’s estimated total spending of $574 billion in 2025 and almost on par with the United States’ spending in 2025. In effect, the continent is beginning to do precisely what successive U.S. administrations have demanded for decades: assume greater responsibility for its own defense and thus enable Washington to focus resources elsewhere.\nYet a prolonged crisis of trust could erase any benefits Europe’s new defense commitments bring to the alliance. European leaders are increasingly frustrated with the United States’ lack of consultation with its allies. Washington, for instance, did not discuss its plans with European leaders before attacking Iran, and European governments have distanced themselves from the subsequent war as a result. In 2003, by contrast, several European governments opposed the U.S. invasion of Iraq but still offered limited support because of a sense of allied solidarity. They participated in NATO consultations and shared intelligence. Today, European governments are far more reluctant to engage at all. Some have even restricted U.S. military access to their airspace or bases for operations linked to Iran.\nThis wariness of the United States has been building for months. In Ukraine, rather than clearly representing collective allied interests in the diplomatic process to end the war, Washington has presented itself as a mediator between Russia and NATO. This was most apparent in Trump’s 28-point peace plan, leaked in November 2025, that heavily favored Russian interests, causing consternation in European capitals. Meanwhile, his public threats to seize Greenland have been met with outright hostility. In January, when Washington threatened to impose tariffs on European countries that opposed Trump’s ambition to acquire the territory, the European Union started to consider retaliatory economic measures whose use against an ally w", "translation_ja": "大西洋同盟は信頼なくして存続できない\n\n10年以上にわたり、米国のドナルド・トランプ大統領は、ワシントンの欧州同盟国が米国の安全保障の恩恵にただ乗りしていると非難してきた。彼は2015年に初めて大統領選に出馬して以来、NATO加盟国が「応分の負担」を果たしていないと批判し続けている。就任後には同盟からの離脱をちらつかせ、2024年の大統領選出馬時にも再びその脅しを繰り返した。ほんの数週間前、NATOの会議でピート・ヘグセス国防長官は米軍の欧州駐留についての6か月間の見直しを宣言し、米国が毎年拠出するNATOの分担金は「他国が防衛費目標を達成することを条件とする」と述べた。そして今月トルコで開催されるNATOサミットでも、欧州支援を停止するというトランプ政権の脅しが影を落とすことは間違いない。\n\n米国は冷戦終結以降、欧州安全保障への貢献を削減するかもしれないと示唆することを繰り返してきたが、実際に必要となった際には常に欧州の防衛に乗り出してきた。1992年にボスニア・ヘルツェゴビナで勃発した戦争を欧州が単独で処理できないと分かると、米国が介入し、紛争を終結させる交渉の道を開いた。また、2014年のロシアによるクリミア併合に対し、ワシントンは対応を調整することにほとんど乗り気を見せず、外交的主導権をフランスとドイツに委ねたものの、2022年にロシアが全面侵攻に踏み切ると米国は戦略的リーダーシップを発揮し、NATO加盟国によるウクライナへの軍事支援の大部分を担った。この間、米国は欧州に対してNATO防衛の負担をより多く引き受けるよう求め続けた。しかし欧州は、いざとなればワシントンが支援してくれるという確信を持っていたため、このメッセージを本来あるべき真剣さで受け止めなかった。\n\nトランプ政権は今、欧州の安全感を根底から揺さぶっている。同政権はウクライナにおける米国の利益を軽視し、欧州諸国をウクライナ戦争終結に向けた協議やイランとの戦争に関する米国内の議論から除外し、欧州からの米通常戦力撤退を調整する公式プロセスを無視してきた。米国の信頼性を疑い、ロシアの侵略に単独で直面することを恐れた欧州は、有能な軍事大国となるために必要なリソースを集め始めた。皮肉なことに、欧州が米国にとって真に望ましいパートナーへと変貌しつつある今まさに、ワシントンの振る舞いが同盟内に信頼の危機を生み出している。今後ワシントンが自ら招いた損害を修復できなければ、ますます価値を高めるこの同盟国を完全に失うリスクを冒すことになる。\n\n疎遠なパートナーたち\n\n表面上、大西洋横断同盟はかつてなく強固で、かつバランスが取れている。2025年時点でほぼすべてのNATO加盟国が防衛費のGDP比2%という目標を達成もしくは超過しており、2024年から2025年の間に支出は20%増加した。欧州同盟国とカナダは現在、NATO全体の防衛費の40%を占めており、2020年の30%から上昇している。欧州がNATOの2035年目標を達成すれば、その支出は8000億ドルを超え、2025年の欧州の推計総支出5740億ドルから大幅に増加し、2025年の米国の支出とほぼ肩を並べる水準となる。実質的に欧州は、歴代の米国政権が数十年にわたり求めてきたことをまさに実行し始めている。すなわち、自国防衛の責任をより多く担い、それによってワシントンが他の地域にリソースを集中できるようにすることだ。\n\nしかし、長引く信頼の危機は、欧州の新たな防衛コミットメントが同盟にもたらす利益を無に帰しかねない。欧州の指導者たちは、米国が同盟国と十分に協議しないことへの苛立ちを募らせている。例えばワシントンは、イランを攻撃する前に欧州の指導者たちと計画を協議せず、その結果として欧州各国政府はその後の戦争から距離を置いている。対照的に2003年には、複数の欧州政府がイラク侵攻に反対しながらも、同盟の連帯という意識から限定的な支援を提供した。NATOの協議に参加し、情報を共有したのだ。今日、欧州各国政府はそもそも関与することに対してはるかに消極的になっている。一部の国はイランに関連する作戦のために自国の領空や基地への米軍のアクセスを制限してさえいる。\n\n米国への警戒感はここ数か月にわたって高まってきた。ウクライナ問題において、ワシントンは戦争終結のための外交プロセスにおいて同盟国の集団的利益を明確に代表するのではなく、ロシアとNATOの間の仲介者として自らを位置づけてきた。このことが最も顕著に表れたのが、2025年11月に流出したトランプの28項目の和平案であり、ロシアの利益を大きく優遇する内容が欧州各国の首都に動揺をもたらした。一方、グリーンランド獲得をめぐるトランプの公然たる脅しは、明確な敵意をもって受け止められた。1月には、ワシントンがトランプの領土取得の野望に反対する欧州諸国に関税を課すと脅したことを受け、欧州連合は同盟国に対して用いることが前例のない報復的経済措置の検討を始めた。", "vocab": [{"word": "free-riding", "definition": "他者の提供する利益や公共財に対して相応の対価や負担を払わずに便乗すること。国際関係において、同盟国の防衛費負担に依存しながら自国の拠出を怠る行為を指す慣用表現。"}, {"word": "contingent on", "definition": "「〜を条件として」「〜次第で」という意味のイディオム。ある事柄の実現が別の条件の成就にかかっていることを表し、ビジネスや外交文書でよく使われる。"}, {"word": "consternation", "definition": "突然の悪い知らせや出来事によって引き起こされる強い驚きや動揺、狼狽を意味する名詞。フォーマルな文章や報道でよく用いられる上級語彙。"}, {"word": "eschewed", "definition": "動詞 eschew の過去形で、何かを意図的に避ける・遠ざけるという意味。特にフォーマルな文脈で、習慣的または原則として何かを回避する場合に使われる。"}, {"word": "retaliatory", "definition": "報復的な、仕返しのという意味の形容詞。外交・経済・軍事の文脈で、相手方の行動に対する対抗措置を形容する際に頻繁に用いられる。"}, {"word": "allied solidarity", "definition": "同盟の連帯を意味する表現。加盟国間の共通の目的意識や相互支援の精神を指し、国際関係や安全保障の議論において重要な概念として使われる。"}, {"word": "estranged", "definition": "かつて親密だった関係が疎遠になった、仲たがいした状態を表す形容詞。人間関係だけでなく、国家間の関係が冷却化した状況を描写する際にも用いられる。"}]}, {"title_ja": "トゥキュディデスの誤読――力なき知恵は滅びをもたらす", "title_en": "Misreading Thucydides: Strength Without Wisdom Leads to Ruin", "summary_ja": "筆者は、トランプ政権の高官やニール・ファーガソンらの論者が、メロス対話を力の政治の正当化として引用することでトゥキュディデスを根本的に誤読していると主張する。『ペロポネソス戦争史』を丁寧に読めば、アテナイの傲慢さと無謀な野心が壊滅的な敗北を招いたという正反対の教訓が浮かび上がる。真の「トゥキュディデスの罠」とは覇権争いの必然的衝突ではなく、思慮を失った強者が自らを滅ぼすという警告である。", "summary_en": "The author argues that Trump administration officials and commentators like Niall Ferguson have fundamentally misread Thucydides by citing the Melian Dialogue as a endorsement of raw power politics. A careful reading of The Peloponnesian War reveals the opposite lesson: Athenian arrogance and unchecked ambition led directly to catastrophic defeat. The true 'Thucydides trap' is not about rising powers clashing, but about how hubris and the abandonment of prudent strategy bring down even the strongest states.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/strong-do-what-they-can-and-suffer-what-they-must", "state_media": false, "category": "オピニオン", "full_text": "It seems to many these days that the world is a jungle beholden only to one law. Since returning to office in 2025, U.S. President Donald Trump has not only made a spectacle of American power—by striking alleged drug smugglers in the Caribbean, kidnapping Venezuelan President Nicolás Maduro, bombing Iran, and even threatening the sovereignty of allies—he has also made a principle out of it. Trump described Maduro’s capture as a vindication of the “iron laws that have always determined global power.” In a similar vein, White House Deputy Chief of Staff Stephen Miller asserted in January that the world is “governed by force” and “governed by power” and that “these are the iron laws of the world since the beginning of time.” Observers heard in these blunt statements echoes of Thucydides, the ancient Athenian aristocrat often considered the first proponent of the cold-blooded doctrine of realism. The Peloponnesian War, his magisterial opus on Athens’ doomed decades-long conflict with Sparta in the fifth century BC, includes the famous line, “The strong do what they can and the weak suffer what they must.”\nThat well-known line comes from an important section of the text known as the Melian Dialogue, in which representatives of Athens browbeat emissaries from the island of Melos. After the Athenians fail to persuade the Melians to accept unconditional surrender, they kill all the island’s men and enslave its women and children. Thucydides’s Melos passage has long been cited as proof that little governs the world beyond strength and its exercise—and as evidence that the brilliant Athenian general, historian, and philosopher himself believed that. Generations of students of international relations have been assigned these decontextualized snippets from his vast work and instructed that this was indeed Thucydides’s lesson. Today, a cottage industry of commentators now celebrate (or bemoan) what is described as a Thucydidean turn in American foreign policy. In “How Trump Won Davos,” an essay published in January, the historian Niall Ferguson explicitly invoked the Melian Dialogue to tout the triumph of Trump as a realist in the mode of Thucydides and asserted that, at Melos, “the realists won an emphatic victory.”\nBut that understanding of both the dialogue and its author gets his meaning fundamentally backward. Thucydides repeatedly refers to, but never endorses, the idea that the strong have the freedom to do what they want: to the contrary, a careful reading of The Peloponnesian War suggests a rather different view. Among the principal lessons to learn from Thucydides is that the ambition of the strong can lead to their own undoing. Right after Thucydides reports the fateful words of the Athenian envoys and the subsequent destruction of Melos, he describes at great length the disastrous campaign Athens pursued in Sicily—an effort that eventually led to Athenian defeat and Spartan victory. In this light, the Melian Dialogue is not proof of the great virtue of strength in international relations but an illustration of pride before the fall.\nThe political scientist Graham Allison famously coined the term “Thucydides trap” to refer to the dynamic inherent in The Peloponnesian War, of how the tensions between a rising power and an existing power will invariably bubble over into conflict. The real Thucydides trap, however, is different. The crucial lesson of the book is not to sketch how Athens and Sparta found themselves sleepwalking into a war that neither side wanted or understood. As Thucydides elaborately elucidates, both went into the conflict with eyes wide open. Moreover, in his view, the start of that war was hardly a trap. Thucydides supported the commencement of hostilities and the careful strategy of Pericles, the Athenian leader who rallied the public behind his demand for war with Sparta. The true catastrophe, and the real trap, occurred many years later, when Athens abandoned Pericles’s prudence and became recklessly ambitious, most grimly demonstrated by the misguided bid to conquer Sicily.\nThe central tragedy of The Peloponnesian War is the story of growing Athenian arrogance and hubris and its fateful consequences. Modern-day Athenians, trumpeting the virtue of strength, would do well to heed Thucydides’s warnings if they don’t want to court their own disasters.\nTRUTH IN THE TALE\nThe Melian Dialogue indeed offers vital lessons, but only if it is understood in the context of The Peloponnesian War as the book was written. That requires familiarity not with a few selected sentences but with the content of the entire work—and with Thucydides’s brilliant, precise, and overarching method. In his estimation, the 27-year conflict (431–404 BC) between Athens and Sparta unfolded in three distinct phases: an initial ten years of direct conflict, an uneasy seven-year interregnum of constant skirmishes and jockeying for position, and then another ten years of war before Athens’s unconditional surrender. Thucydides ", "translation_ja": "今日、世界はただ一つの掟に支配されるジャングルだと感じる人が多い。2025年に再び政権に就いたドナルド・トランプ米大統領は、カリブ海で麻薬密輸業者とされる人物を攻撃し、ベネズエラのニコラス・マドゥロ大統領を拉致し、イランを爆撃し、同盟国の主権すら脅かすことでアメリカの力を誇示してきただけでなく、それを原則にまで高めている。トランプはマドゥロの拘束を「世界の力関係を常に規定してきた鉄の法則」の正当性が証明されたものだと表現した。同様に、ホワイトハウスの副首席補佐官スティーブン・ミラーは1月、世界は「力によって統治され」「権力によって統治され」ており、「これは太古の昔からの世界の鉄の法則だ」と主張した。こうした率直な発言を耳にした観察者たちは、古代アテナイの貴族であり冷徹なリアリズムの最初の提唱者とされるトゥキュディデスの言葉を連想した。彼の畢生の大作『ペロポネソス戦争史』は、紀元前5世紀にアテナイがスパルタと繰り広げた数十年にわたる悲劇的な戦争を記録しており、「強者はできることをし、弱者は耐えなければならないことに耐える」という有名な一節を含んでいる。\n\nこの有名な一節は、アテナイの使節がメロス島の代表団を恫喝する「メロス対話」として知られる重要な章に登場する。アテナイ側がメロス人を無条件降伏に説得することに失敗した後、島の男性全員を殺害し、女性と子どもを奴隷にする。トゥキュディデスのメロスに関する記述は長らく、力とその行使以外には世界を律するものは何もないという証拠として、また輝かしいアテナイの将軍・歴史家・哲学者である彼自身がそれを信じていた証拠として引用されてきた。国際関係論を学ぶ幾世代もの学生が、彼の膨大な著作から切り取られたこれらの断片を課題として与えられ、これこそがトゥキュディデスの教訓だと教えられてきた。今日、アメリカ外交政策における「トゥキュディデス的転換」と表現されるものを称賛する（あるいは嘆く）論者たちの小業界が生まれている。歴史家ニール・ファーガソンは1月に発表した論考「トランプはいかにしてダボスを制したか」の中で、メロス対話を明示的に引用してトランプをトゥキュディデス流のリアリストとしての勝利を称え、メロスで「リアリストたちが圧倒的な勝利を収めた」と断言した。\n\nしかし、この対話とその著者についてのそうした理解は、彼の真意を根本的に逆さまに解釈している。トゥキュディデスは強者が好き勝手にできるという考えを繰り返し言及しているが、決してそれを支持してはいない。むしろ『ペロポネソス戦争史』を注意深く読めば、まったく異なる見解が浮かび上がる。トゥキュディデスから学ぶべき主要な教訓の一つは、強者の野心が自らの破滅につながりうるということだ。トゥキュディデスはアテナイ使節の運命的な言葉とそれに続くメロスの壊滅を記した直後に、アテナイがシチリアで展開した悲惨な遠征を長々と描写している――それが最終的にアテナイの敗北とスパルタの勝利につながる。この観点から見れば、メロス対話は国際関係における力の美徳の証明ではなく、驕りの後に没落が来るという例証なのだ。\n\n政治学者グレアム・アリソンは「トゥキュディデスの罠」という言葉を世に広め、台頭する大国と既存の大国の間の緊張が必然的に衝突へと発展するという『ペロポネソス戦争史』に内在するダイナミクスを指し示した。しかし本当の「トゥキュディデスの罠」は異なる。この書物の肝心な教訓は、アテナイとスパルタが双方とも望まず理解もしない戦争に夢遊病のように陥っていく過程を描くことではない。トゥキュディデスが詳細に説き明かしているように、双方とも目を開けたまま戦争に突入した。さらに彼の見解では、その戦争の開始は罠ではなかった。トゥキュディデスは戦端を開くことと、スパルタとの戦争に向けて世論を結集させたアテナイの指導者ペリクレスの慎重な戦略を支持していた。真の破局、そして真の罠は、その何年も後にアテナイがペリクレスの思慮を捨て、無謀な野心に駆られた時――最も痛ましい形で示されたのがシチリア征服という誤った企てだった。\n\n『ペロポネソス戦争史』の中心的悲劇は、アテナイの驕りと傲慢さの増大と、その致命的な結果の物語だ。力の美徳を声高に謳う現代のアテナイ人たちは、自らの災いを招きたくなければ、トゥキュディデスの警告に耳を傾けるべきだろう。\n\n【物語の中の真実】\n\nメロス対話は確かに重要な教訓を提供している――ただし、それが書かれた文脈の中で『ペロポネソス戦争史』全体として理解された場合に限る。そのためには、いくつかの選ばれた文章ではなく、作品全体の内容と、トゥキュディデスの卓越した、精緻で包括的な方法論に親しむことが必要だ。彼の見立てでは、アテナイとスパルタの間の27年にわたる戦争（紀元前431年から404年）は三つの明確な段階で展開した。最初の10年間の直接的な衝突、絶え間ない小競り合いと主導権争いが続く7年間の不安定な休戦期間、そしてアテナイが無条件降伏するまでのさらに10年間の戦争である。トゥキュディデスは……", "vocab": [{"word": "browbeat", "definition": "恫喝する、威圧する。力や権威をもって相手を脅し、従わせようとすること。"}, {"word": "decontextualized", "definition": "文脈から切り離された。元の背景や状況を無視して引用・解釈された状態を指す。"}, {"word": "interregnum", "definition": "空位期間、中間期。二つの統治・局面の間の移行的・不安定な期間を指す。"}, {"word": "hubris", "definition": "傲慢さ、過度の自信。特に神や運命への挑戦ともなるような度を超えた自尊心を指し、悲劇的な没落を招く要因として古典文学で頻繁に用いられる。"}, {"word": "elucidates", "definition": "明確に説明する、解明する。複雑な事柄をわかりやすく詳述することを意味する動詞。"}, {"word": "emissaries", "definition": "使節、使者。特定の目的や任務を帯びて派遣された外交的代表者を指す。"}, {"word": "magisterial", "definition": "権威ある、堂々とした。学術的・知的な分野で卓越した権威と深みを持つ作品や人物を形容する際に使われる。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}
