<script>
const CATS = ["全て","政治","経済","IT","社会","オピニオン"];
const DATA = [{"title_ja": "イラン最高指導者モジュタバー・ハメネイー、父の葬儀を欠席―憶測が広がる", "title_en": "Iran's Supreme Leader Mojtaba Khamenei Absent from Father's Funeral Amid Speculation", "summary_ja": "イランの新最高指導者モジュタバー・ハメネイーは、父アリー・ハメネイーの葬儀を欠席し、米国・イスラエルの空爆で負傷したとの憶測が広がっている。大統領や革命防衛隊司令官を含む高官らが参列し、当局が「世紀の葬儀」と称する式典には数百万人の弔問客が集まった。イランとイスラエルの間では脆弱な停戦が続いており、恒久的な和平交渉が進行中である。", "summary_en": "Iran's newly appointed Supreme Leader Mojtaba Khamenei was notably absent from his father Ali Khamenei's funeral on Sunday, fuelling speculation he may have been wounded in the US-Israel air strikes that killed the elder Khamenei. Senior officials including President Pezeshkian and Revolutionary Guards chief Vahidi attended, as millions of mourners gathered for what authorities are calling the 'funeral of the century.' A fragile ceasefire between Iran and Israel remains in place while peace negotiations continue.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cevllyj9vv3o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Iran's supreme leader absent as senior officials attend ayatollah's funeral\n- Published\nIran's Supreme Leader Mojtaba Khamenei was conspicuously absent from his father's funeral, as senior regime figures joined thousands paying their respects to the late ayatollah on Sunday.\nAli Khamenei's other three sons - Masoud, Mostafa and Meysam - all attended the service on Sunday, alongside officials including President Masoud Pezeshkian and Revolutionary Guards chief Ahmad Vahidi.\nSpeculation about Mojtaba's condition - fuelled by rumours he was wounded in the same US-Israel air strikes that killed his father - has continued as he has not appeared in public since his appointment in early March.\nThe elder Khamenei ruled the Islamic republic from 1989 until his death in February.\nOfficial funeral proceedings for the late supreme leader began on Friday, with events planned across Iran and Iraq over the coming week.\nIranian authorities say 12-20 million people are expected to attend the ceremonies, which they are calling the \"funeral of the century\".\nKhamenei's body is currently lying in state at Tehran's Grand Mosalla religious complex, with a funeral service led by prominent Shia cleric Jafar Sobhani, a 97-year-old scholar who teaches at seminaries in the holy city of Qom.\nSunday was declared a public holiday across Iran, and later in the day Khamenei's body will be moved out of the Grand Mosalla ahead of a procession through the capital on Monday.\nThe ceremonies have been carefully choreographed and Mojtaba Khamenei's absence from the proceedings comes against a backdrop of fears that Israel may want to assassinate him as well.\nA fragile ceasefire between the warring countries is currently holding while talks on a permanent peace deal continue - though both sides have warned they were ready to resume military action.\nNews website Axios quoted US President Donald Trump on Saturday as saying that peace talks had been paused for a week for the events surrounding the funeral.\nWith many of the Iranian regime's senior officials attending, Washington could take them all out with \"one shot\", it quoted Trump as saying, adding: \"But we are not going to do that because then we would have nobody to negotiate with.\"\nThe president also said he had been surprised to see Iranians crying, saying he thought people hated Khamenei. \"Maybe it's fake tears,\" he said.\nIn response to Trump's claim, mourner Zahra Safaei, 50, told Reuters: \"We did not make a revolution 47 years ago to shed fake tears. We did not sacrifice all these martyrs to shed fake tears.\"\nThe Associated Press and Guardian report that people were calling for US President Donald Trump's death on Sunday, with poet Mohammad Rasouli saying at a poetry recitation before the prayer that \"Trump's murder is our responsibility\".\nRasouli could also be heard drawing calls of \"death to America\" and \"death to Israel\".\nPeople in the city were seen on Sunday holding banners that included slogans \"kill Trump\", \"kill Bibi\", in reference to Israel's Prime Minister Benjamin Netanyahu, and \"we will avenge\".\nThe Tehran events alone are expected to attract more than 10 million mourners from across Iran, with strict security measures imposed and official media warned of a risk of crowd crushes.\nIran's official news agency Irna reported on Sunday that more than 4,000 people had visited medical centres located in and near the Grand Mosalla - though no deaths had been recorded.\nImages from the funeral show mourners being sprayed with mist to keep them cool and medics carrying an elderly woman away on a stretcher.\nKhamenei's coffin is being displayed alongside those of four relatives who were killed in the strikes on Tehran, including his one-year-old granddaughter Zahra Mohammadi Golpayegani.\nThroughout his rule, Ali Khamenei pursued a policy of confrontation with the West and for years provided support to anti-US and anti-Israel armed groups across the Middle East, including Hamas in Gaza, Hezbollah in Lebanon and the Houthis in Yemen.\nAfter the processions through Tehran on Monday, Khamenei's coffin will be moved to Qom on Tuesday, then a significant Shia site in neighbouring Iraq on Wednesday, before the burial on Thursday in his north-eastern hometown of Mashhad.\nRelated topics\n- Published10 hours ago\n \n- Published8 March\n \n- Published1 March", "translation_ja": "イランの最高指導者モジュタバー・ハメネイーは、日曜日に行われた父の葬儀に目立って欠席し、政権の上級幹部たちが故アヤトラーに別れを告げる数千人の列に加わった。\n\nアリー・ハメネイーの他の3人の息子―マスード、モスタファ、メイサム―はいずれも日曜日の式典に出席し、マスード・ペゼシュキアン大統領や革命防衛隊司令官アフマド・ワヒディーら高官も同席した。\n\nモジュタバーの状態をめぐる憶測―彼が父を殺害した米国・イスラエルの空爆で負傷したとの噂に煽られて―は、3月初旬の就任以来公の場に姿を現していないことから、依然として続いている。\n\n父ハメネイーは1989年からその死去する2月まで、イスラム共和国を統治した。\n\n故最高指導者の公式葬儀は金曜日に始まり、今後1週間にわたってイランとイラク各地でイベントが予定されている。\n\nイラン当局は、「世紀の葬儀」と称するこの式典に1200万から2000万人が参列すると見込んでいる。\n\nハメネイーの遺体は現在、テヘランのグランド・モサッラー宗教施設に安置されており、聖都コムの神学校で教鞭をとる97歳の学者で著名なシーア派聖職者ジャアファル・ソブハーニーが葬儀を主宰している。\n\n日曜日はイラン全土で祝日と宣言され、その後ハメネイーの遺体はグランド・モサッラーから移送され、月曜日に首都を行進する葬列に備えることになっている。\n\n式典は入念に演出されており、モジュタバー・ハメネイーが葬儀に欠席しているのは、イスラエルが彼をも暗殺しようとしているのではないかという懸念を背景としている。\n\n両国間の脆弱な停戦は現在維持されており、恒久的な和平協定に向けた交渉が続いているが、双方は軍事行動を再開する用意があると警告している。\n\nニュースサイト「アクシオス」は、ドナルド・トランプ米大統領が土曜日に、葬儀をめぐる一連の行事のために和平交渉が1週間停止されたと述べたと伝えた。\n\nイラン政権の上級幹部の多くが参列していることから、ワシントンは「一発」で全員を排除できるとトランプ氏が語ったとされるが、「交渉相手がいなくなるのでそうしない」と付け加えたという。\n\nまた同大統領は、イラン人が泣いているのを見て驚いたとも述べ、人々はハメネイーを憎んでいると思っていたと語った。「涙はおそらく偽物だろう」と彼は言った。\n\nトランプ氏の発言に対し、弔問客のザフラー・サファーイー（50歳）はロイターに対して「私たちは47年前に、偽の涙を流すために革命を起こしたわけではない。これほど多くの殉教者を犠牲にしたのは、偽の涙を流すためではない」と語った。\n\nAPとガーディアンは、日曜日に人々がトランプ米大統領の死を叫んでいたと報じており、詩人のモハンマド・ラスーリーが礼拝前の詩の朗読で「トランプを殺すことは我々の責務だ」と述べたと伝えている。\n\nラスーリーはまた、「アメリカに死を」「イスラエルに死を」というコールを引き出す場面もあった。\n\n市内では日曜日、「トランプを殺せ」「ビビを殺せ」（イスラエルのベンヤミン・ネタニヤフ首相を指す）、「我々は復讐する」といったスローガンを掲げた横断幕を持つ人々の姿が見られた。\n\nテヘランでの式典だけでも全国から1000万人以上の弔問客が集まると予想されており、厳重な警備措置が取られ、官製メディアには群衆の将棋倒しのリスクについて警告が発せられている。\n\nイランの公式通信社イルナーは日曜日、グランド・モサッラー内外に設置された医療センターに4000人以上が訪れたが、死者は記録されていないと報じた。\n\n葬儀の映像には、弔問客が涼を取るためにミストを噴霧されている様子や、医療スタッフが老齢の女性をストレッチャーで運び去る場面が映っている。\n\nハメネイーの棺は、テヘランへの空爆で死亡した4人の親族の棺とともに展示されており、その中には1歳の孫娘ザフラー・モハンマディー・ゴルパーヤガーニーも含まれている。\n\n在任中、アリー・ハメネイーは西側諸国との対立政策を推進し、長年にわたってガザのハマス、レバノンのヒズボラ、イエメンのフーシー派など中東各地の反米・反イスラエル武装勢力を支援してきた。\n\n月曜日にテヘラン市内を行進した後、ハメネイーの棺は火曜日にコムへ移され、水曜日には隣国イラクの重要なシーア派聖地へ、そして木曜日に彼の出身地である北東部マシュハドで埋葬される予定だ。", "vocab": [{"word": "conspicuously", "definition": "「目立って、明らかに」という意味の副詞。何かが非常に目立つ形で存在したり、あるいは欠けていたりする様子を表す。例：conspicuously absent（明らかに欠席している）。"}, {"word": "ceasefire", "definition": "「停戦」を意味する名詞で、交戦中の両者が戦闘を一時的に停止することを指す。fragile ceasefire（脆弱な停戦）のように形容詞を伴って使われることが多い。"}, {"word": "choreographed", "definition": "本来は「振り付けされた」という意味だが、転じて「入念に計画・演出された」という意味で使われる。政治的・儀式的な文脈で、細部まで意図的に設計されたイベントを指す。"}, {"word": "fuelled", "definition": "「煽られた、助長された」という意味の動詞fuelの過去形・過去分詞。噂や懸念などが何かによってさらに強められる状況を表す比喩的表現。"}, {"word": "procession", "definition": "「行列、行進」を意味する名詞で、特に葬儀や儀式などの公式な場面での人や車両の隊列を指す。funeral procession（葬列）は代表的な用法。"}, {"word": "assassination", "definition": "「暗殺」を意味する名詞で、政治的・宗教的な理由から要人を殺害する行為を指す。TOEIC上級レベルの語彙で、国際政治のニュースで頻出する。"}, {"word": "mourner", "definition": "「弔問客、喪に服する人」を意味する名詞で、葬儀や追悼式に参列して故人を悼む人を指す。関連語にmournful（悲しげな）やmourning（喪）がある。"}]}, {"title_ja": "US marks 250th birthday with fireworks, flyovers and extreme weather", "title_en": "US marks 250th birthday with fireworks, flyovers and extreme weather", "summary_ja": "US President Donald Trump's speech included some of his political agenda but also honoured war veterans and American history.", "summary_en": "US President Donald Trump's speech included some of his political agenda but also honoured war veterans and American history.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cp9lppvkmz5o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "US marks 250th birthday with fireworks, flyovers and extreme weather\n- Published\nThe US has marked its 250th birthday with fireworks and flyovers - but celebrations across the country were complicated by extreme weather.\n\"The American dream is back,\" US President Donald Trump told a cheering crowd during a delayed rally at the National Mall in Washington DC, before what he described as the world's largest fireworks display.\nThe 4 July federal holiday commemorates the 13 US colonies signing the Declaration of Independence in 1776 to end British rule.\nDespite the celebrations, Trump has been criticised for making himself central to the milestone and politicising the celebrations.\nThe president's speech, which finished just before midnight, touched on political themes including the rejection of communism and the right to bear arms.\n\"Long live the cause of independence,\" he said. \"May it reign forever and ever and ever. We will always be on top, we will never let our country fall, we will always be the best.\"\nTrump capped off his remarks by calling the moment \"only the dawn of the golden age of America\" with its destiny \"written by God\".\nCelebrations in the US capital were delayed because of a thunderstorm, which forced an evacuation of the National Mall earlier in the evening.\nGuests attending the Salute to America, the Great American State Fair and Fifa fan zone were asked to seek temporary shelter in nearby buildings.\nOnce the storm had passed, festivities began again, including a flyover featuring the new Air Force One and a concert.\nThe grande finale - the fireworks show - was marked by a massive flurry of blasts, concluding at about 01:00 local time (05:00 GMT). The small crowd on Capitol Hill cheered before rapidly walking towards the exits as it began to lightly rain.\n- Trump's new take on 250 years of American expansionism - Published1 day ago\n \n- After 250 years the American Dream is surviving, but only just - Published2 days ago\n \n- Trump presidency and power - debate reignited at 250 years - Published3 days ago\n \nPeople travelled across the country to attend, including Tammy Wapshott, who travelled from South Carolina and had been planning her trip to Washington DC since last November.\nShe told the BBC she had come to celebrate \"the best country in the world\" where all were \"free to do what we wanna do\".\nAround 400 members of the white nationalist group Patriot Front were seen carrying US flags while marching in unison through the streets of the capital.\nVideos posted on social media show the masked, uniformed members marching near the Capitol building and Union Station, the city's main passenger rail hub.\nConcerts and naturalisation ceremonies\nAccusations that Trump had politicised the anniversary arose from his launching Freedom 250, a privately funded events committee to compete with the America 250 commission established by the US Congress.\nAs part of the bipartisan America 250 celebrations, communities across the country took part in \"America's Block Party\" and hosted local gatherings.\nMusicians including Ne-Yo, Mary J Blige, The Smashing Pumpkins, Chaka Khan, Christina Aguilera and Will Smith performed across the country.\nOn Thursday, members of Congress gathered at the \"birthplace of America\" where the Declaration was signed in 1776, Philadelphia's Independence Hall.\nAmerica 250 organisers also buried a time capsule - to be opened in 200 years - that included a Coca-Cola bottle, a signed copy of the Constitution and artefacts from the 50 states and US territories.\nAt Mount Vernon in Virginia - the first US president George Washington's estate - a naturalisation ceremony welcomed 150 people from 50 countries as US citizens.\nNew York City hosted its annual hot dog eating contest, a tradition since 1972, in which Joey Chestnut won his 18th title. Chestnut ate 66 hot dogs in 10 minutes, according to CBS, the BBC's US news partner.\nIn the women's competition, Miki Sudo finished 38 and three-quarters of a hot dog to claim her 12th contest title.\nChris Cornell, who travelled to the capital from Maryland, rejected the notion that the 250th anniversary celebrations had become political, commenting: \"We're all just here to celebrate our country.\"\nHeatwaves and power cuts\nSome events around Independence Day were cancelled or temporarily closed due to the blistering heat on the US East Coast this week.\nThe National Park Service's Independence Day Parade in Washington DC was cancelled on Friday, with other celebrations shut down in New Jersey, Pennsylvania, Maryland and Colorado.\nWashington DC had broiled in 100F (37C) temperatures on Saturday as the main celebrations got under way.\nSome of the highest temperatures on Saturday included 106F (41C) in New Jersey and 101F (38C) in Delaware.\nAbout 750,000 properties in Wisconsin, Michigan, Illinois, Pennsylvania, Ohio, New York and New Jersey went without power due to extreme weather, according to tracker Power Outage.\nEnergy company DTE said that severe weat", "translation_ja": "", "vocab": []}, {"title_ja": "テイラー・スウィフトとトラヴィス・ケルシーの結婚式にゲストが続々と反応", "title_en": "Guests React to Taylor Swift and Travis Kelce's Wedding at Madison Square Garden", "summary_ja": "テイラー・スウィフトとトラヴィス・ケルシーがニューヨークのマディソン・スクエア・ガーデンで結婚式を挙げ、音楽・映画・スポーツ界の著名人を含む約1,000人が招待された。ジェシカ・アルバやBBCラジオ1のグレッグ・ジェームズらがSNSで出席を報告し、夜の様子を「魔法のよう」「感動的」と表現した。カップルはいまだ公式写真を公開しておらず、詳細の多くは明かされていない。", "summary_en": "Taylor Swift and Travis Kelce were married at New York's Madison Square Garden, with approximately 1,000 guests including major celebrities from music, film, and sport. Guests such as Jessica Alba, BBC Radio 1's Greg James, and Suki Waterhouse have begun sharing reactions on social media, describing the night as magical and emotional. The couple has yet to release official photos, and details remain largely under wraps.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/clyxxr9n2kjo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "IT", "full_text": "From 'a beautiful night' to 'world's greatest hangover', guests react to Taylor and Travis's wedding\n- Published\nIt's been two days since Taylor Swift's wedding to Travis Kelce, and some of their superstar friends have started giving us tantalising glimpses into what it was like.\nAbout 1,000 names were reportedly on the guest list, including some of the biggest celebrities from music, Hollywood and sport.\nDetails of the wedding had been a closely guarded secret, with guests assumed to be under instructions not to give away details or photos. The couple are also yet to release any photos from the event.\nBut following Friday night's bash at New York's Madison Square Gardens, big names such as BBC Radio 1 DJ Greg James and Sin City star Jessica Alba have been posting online, confirming they attended and congratulating the pop sensation and her Super Bowl champion husband.\nOthers have been more cryptic, sharing images of their outfits set to Swift's tracks which strongly suggest they were at the wedding.\nHere's who was there, and who we think was there - and what they've been saying about it.\nActress Jessica Alba was among those who didn't hold back from confirming her attendance, as she shared a photo of the outfit she donned for the big day in a story on her Instagram account, external.\n\"We love love,\" she wrote, along with a selfie of herself in a slinky black Prada gown. \"Congrats to T&T - such a beautiful night celebrating you.\"\nThe picture was set to Swift's song, Love Story, while another post, set to The Fate of Ophelia, took her fans behind-the-scenes as she and her partner Danny Ramirez got ready for the nuptials.\n'Oh my god, what a night'\nBreakfast show host James, whom Swift invited to the wedding live on his programme, also confirmed he was there, external, posting on Instagram on Saturday: \"Just&t to say: true to her word, of course the invitation arrived and of course I couldn't tell anyone.\n\"And oh my god, what an unbelievably brilliant night.\"\nHe also indicated that he was feeling the after-effects of a big night of partying, writing: \"I am currently experiencing the world's greatest hangover and unable to reply to the hilarious number of messages I have received over the last 24 hours.\"\nJames wasn't the only one apparently suffering from a few too many drinks after the wedding.\nThe actress and singer Suki Waterhouse posted a story on Sunday, with the Francis Bacon quote: \"I often work best with a hangover because my mind is crackling with energy and I can think very clearly.\"\nWaterhouse also shared a carousel of photos from her time in New York, including a selfie of her in a silver gown in a car, with the caption: \"NYC, land of love.\"\nWhile she didn't say she was definitely at the wedding, she had previously confirmed she was on the guestlist for her friend Swift's wedding earlier this year in an interview with Variety, external.\n\"I'm gonna go to Taylor's wedding, and maybe I'll get some inspiration,\" she said, in a reference to her own upcoming nuptials to Robert Pattinson. \"It will be amazing.\"\nOther stars who took to social media to share photos of their outfits include Severance actor Adam Scott, who posted a picture of himself, external with fellow actor Paul Rudd along with the caption \"T&T\" and two love hearts.\nActress Niecy Nash posted a video, external of her car journey to Madison Square Gardens alongside her wife, singer-songwriter, Jessica Betts, along with photos of herself in a strapless floor-length blue gown.\n\"The Betts pulled up to the Travis Kelce & Taylor Swift wedding. A time was had. The love in the room was palpable,\" she wrote.\n\"Wowwwwwww is the best way to describe it. From beginning to end, no detail was spared! Congrats! Welcome to the club!\"\n'Like living in the internet'\nMusic video director Joseph Kahn, who helmed a number of Swift's videos including Bad Blood and Look What You Made Me Do, also took to Instagram over the weekend to say he had had a \"wonderful\" time at the wedding.\n\"I got to meet Steven Spielberg and the lovely Kate Capshaw and talk filmmaking with the GOAT (lifelong dream achieved),\" he revealed.\n\"What I will say about the wedding was it was so much funnier and emotional than expected, and as big as it was, it also felt very intimate. And yes, literally everyone was there,\" he said, adding that it was \"like living in the internet\".\nOther A-list attendees seen either entering or leaving the wedding included Selena Gomez, Camila Cabello, Hugh Grant, Gracie Abrams, Gigi Hadid, Bradley Cooper, Tom Hanks, Millie Bobby Brown, Ellie Goulding, Graham Norton and Dakota Johnson.\nMany more drove straight in and out, away from the view of media and photographers.\nThe bridegroom's mother was, of course, in attendance - and in a Macy's department store post about their 4 July fireworks, external posted on Sunday, Donna Kelce was asked about the wedding.\nShe said: \"I really can't say a heck of a lot but it was magical, man, magical\".\nOther rumoured names include ", "translation_ja": "「美しい夜」から「世界最高の二日酔い」まで――テイラーとトラヴィスの結婚式にゲストが反応\n\nテイラー・スウィフトとトラヴィス・ケルシーの結婚式から2日が経ち、スーパースターの友人たちがその夜の様子を少しずつ明かし始めた。\n\nゲストリストには約1,000人の名前があったと伝えられており、音楽・ハリウッド・スポーツ界の大物セレブリティも多数含まれていた。\n\n結婚式の詳細は厳重に秘匿されており、ゲストは詳細や写真を漏らさないよう指示されていたとみられる。また、カップル自身もまだ式の写真を公開していない。\n\nしかし金曜夜のニューヨーク・マディソン・スクエア・ガーデンでのパーティーを経て、BBCラジオ1のDJグレッグ・ジェームズや『シン・シティ』のジェシカ・アルバといった著名人がオンラインに投稿し、出席を確認するとともに、このポップスターとスーパーボウル王者の夫に祝福の言葉を贈った。\n\nほかにも、スウィフトの楽曲を背景に自身の衣装の写真をシェアするなど、結婚式に出席したことを強く示唆しながらも、より謎めいた投稿をした人々もいた。\n\nここでは、実際に出席したと確認されている人物、そして出席したとみられる人物と、彼らの発言をまとめる。\n\n女優のジェシカ・アルバは出席を隠すことなく公表した一人で、Instagramのストーリーに当日着用した衣装の写真を投稿した。\n\n「愛は素晴らしい」と彼女は書き、スリムなプラダの黒いガウンを着た自撮り写真を添えた。「T&Tおめでとう――あなたたちを祝う、本当に美しい夜だった。」\n\n写真にはスウィフトの曲「Love Story」が流れており、また別の投稿では「The Fate of Ophelia」をBGMに、パートナーのダニー・ラミレスと一緒に結婚式に向けて準備する舞台裏の様子を披露した。\n\n「ああ、なんて夜だったんだ」\n\n生放送中にスウィフト本人から招待を受けたブレックファスト・ショーの司会者グレッグ・ジェームズも出席を確認し、土曜日にInstagramに投稿した。「ひとつ言わせてください：彼女らしく、もちろん招待状は届きました。そしてもちろん、誰にも言えませんでした。信じられないほど素晴らしい夜でした。」\n\n彼はまた、盛大なパーティーの後遺症を感じていることも示唆し、「今まさに世界最高の二日酔いを経験中で、この24時間に届いた爆笑もののメッセージの数々に返信できていません」と綴った。\n\n結婚式後の二日酔いに苦しんでいたのはジェームズだけではないようだ。\n\n女優兼歌手のスキ・ウォーターハウスは日曜日にストーリーを投稿し、フランシス・ベーコンの言葉を引用した。「私は二日酔いのときに最もよく仕事ができる。頭が冴え渡り、非常に明晰に考えられるから。」\n\nウォーターハウスはまた、ニューヨーク滞在中の写真をまとめたカルーセル投稿もシェアし、車中でシルバーのガウンを着た自撮り写真に「NYC、愛の街」というキャプションをつけた。\n\n結婚式に確実に出席したとは明言しなかったものの、彼女は今年初めに雑誌「Variety」のインタビューで、友人スウィフトの結婚式のゲストリストに載っていることを認めていた。\n\n「テイラーの結婚式に行くつもりで、インスピレーションをもらえるかもしれない」と彼女は語っており、これはロバート・パティンソンとの自身の近々の結婚式を念頭に置いた発言だ。「きっと素晴らしいに違いない。」\n\nSNSに衣装写真を投稿した他のスターには、『セヴェランス』の俳優アダム・スコットがおり、俳優のポール・ラッドとのツーショット写真に「T&T」とハートのアイコンを添えた。\n\n女優のニーシー・ナッシュは、シンガーソングライターの妻ジェシカ・ベッツとともにマディソン・スクエア・ガーデンへ向かう車中の動画を投稿し、肩出しのフロアレングスブルーガウン姿の写真も添えた。\n\n「ベッツ夫妻がトラヴィス・ケルシーとテイラー・スウィフトの結婚式に乗り込みました。最高の時間でした。会場の愛の空気は肌で感じられるほどでした」と彼女は書いた。\n\n「『わあ』という言葉が最もよく表現しています。始まりから終わりまで、細部に至るまで妥協がなかった！おめでとう！ようこそ、このクラブへ！」\n\n「インターネットの中にいるみたいだった」\n\n「Bad Blood」や「Look What You Made Me Do」などスウィフトの数多くのミュージックビデオを手がけた映像監督のジョセフ・カーンも、週末にInstagramで結婚式が「素晴らしかった」と語った。\n\n「スティーヴン・スピルバーグと素敵なケイト・キャプショーに会い、映画界のGOAT（最高の人物）と映画制作について話すことができました（生涯の夢が叶いました）」と明かした。\n\n「結婚式について言えるのは、想像以上におかしくて、感動的だったということ。規模は大きかったけれど、とても親密な雰囲気もあった。そして本当に、文字通り全員がそこにいた」と語り、まるで「インターネットの中で生きているようだった」と表現した。\n\n式の入退場時に目撃された他のAリスト出席者には、セレーナ・ゴメス、カミラ・カベロ、ヒュー・グラント、グレーシー・エイブラムス、ジジ・ハディッド、ブラッドリー・クーパー、トム・ハンクス、ミリー・ボビー・ブラウン、エリー・ゴールディング、グレアム・ノートン、ダコタ・ジョンソンらがいた。\n\n他の多くは、メディアやカメラマンの目が届かないよう、そのまま車で直行し退場した。\n\n花婿の母親も、もちろん出席していた。日曜日に投稿されたメイシーズ百貨店の独立記念日（7月4日）花火に関する投稿の中で、ドナ・ケルシーは結婚式について尋ねられた。\n\n彼女は「あまり多くは言えないけれど、魔法みたいだったわ、本当に魔法みたいだった」と語った。\n\nその他の噂される出席者には", "vocab": [{"word": "tantalising", "definition": "「じらすような、もどかしいほど魅力的な」という意味の形容詞。欲しい情報や物がすぐには手に入らない状況で使われる上級表現。"}, {"word": "cryptic", "definition": "「謎めいた、難解な」という意味の形容詞。意図的に曖昧にされたメッセージや行動を表す際に使われる。"}, {"word": "nuptials", "definition": "「結婚式、婚礼」を意味するやや格式張った名詞。journalismや文学的文脈でweddingの代わりに用いられることが多い。"}, {"word": "palpable", "definition": "「明白な、肌で感じられるほどの」という意味の形容詞。感情や雰囲気が非常に強く感じられる様子を表す際に使われる。"}, {"word": "helmed", "definition": "動詞helmの過去形で「（プロジェクトや作品を）指揮した、率いた」という意味。映画・音楽業界でdirectedの代わりに使われるジャーナリズム用語。"}, {"word": "intimate", "definition": "「親密な、ごく少数の近しい人々の間での」という意味の形容詞。大規模なイベントの中でも個人的な温かみがある雰囲気を描写する際に使われる。"}, {"word": "bridegroom", "definition": "「花婿」を意味する名詞で、groomよりやや格式のある表現。結婚式関連の報道や公式文書でよく使われる。"}]}, {"title_ja": "改革党、ファラージ党首が詐欺有罪の盟友からの利益を申告せず――規則違反を否定", "title_en": "Reform denies Farage broke rules over undeclared benefits from fraud-convicted ally", "summary_ja": "英改革党のロバート・ジェナリックは、ナイジェル・ファラージ党首が米国で電信詐欺の有罪判決を受けた盟友ジョージ・コットレルから受けた利益を申告しなかったとの報道について、議会規則違反はないと否定した。コットレルはファラージ氏が議員になる前の1年間、警備員やソーシャルメディアスタッフを提供し、バッキンガム宮殿近くの物件に滞在させたとも報じられている。自由民主党は議会基準委員に調査を求めており、ファラージ氏側は当該支援は純粋に個人的なものであり、政治復帰前のことだと主張している。", "summary_en": "Reform UK's Robert Jenrick denied any parliamentary rules were broken by Nigel Farage after reports emerged that Farage failed to declare benefits provided by George Cottrell, an ally convicted of wire fraud in the US. Cottrell allegedly supplied security staff, social media workers, and accommodation to Farage in the year before he became an MP. The Liberal Democrats have asked the parliamentary standards commissioner to investigate, while Farage's team argues the support was purely personal and predated his return to active politics.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cy0424end7vo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "経済", "full_text": "Reform denies rules broken by Farage after benefits from ally not declared\n- Published\nRobert Jenrick says \"no rules have been broken whatsoever\" by Nigel Farage, after reports the Reform UK leader failed to declare benefits provided by an ally once convicted of fraud in the US.\nThe Sunday Times says George Cottrell supplied support, external including security and social media staff who worked on Farage's online content in the year before he was elected. It also claims Farage used a property rented by Cottrell near Buckingham Palace.\nJenrick, Reform's Treasury spokesman, told the BBC that Farage did not need to register the support as it was in a \"purely personal capacity\" before he became an MP.\nThe Liberal Democrats have asked the parliamentary standards commissioner to investigate.\n- Farage says £5m gift spending details 'not public's business' - Published23 June\n \n- Farage declares earning £270,000 for promoting gold bullion - Published4 days ago\n \nFarage is already facing a parliamentary probe over a £5m gift from a billionaire Reform UK donor which was not registered.\nHe has argued that money was for personal security and was not political because it was received when he was not involved in politics.\nHis team have made a similar argument for why the \"in kind\" - non-cash - benefits allegedly from Cottrell were not registered.\nCottrell, 32, who admitted a count of wire fraud in the US in 2017, is a long-standing ally of Farage. He was involved with UKIP as a volunteer in the run-up to the Brexit referendum.\nAccording to the Sunday Times, Cottrell is a cryptocurrency entrepreneur and is involved with the offshore gambling website Tether.bet.\nSpeaking to the BBC's Sunday with Laura Kuenssberg, Jenrick described Cottrell as an \"old friend\" of Farage's.\nJenrick said: \"He did give support to Nigel before he was a Member of Parliament, he hasn't done so since he became a Member of Parliament.\n\"No rules have been broken whatsoever.\"\nJenrick said it was a \"very old story that has been dredged up\" in a bid to \"drag Nigel downwards\", adding: \"It's not going to succeed.\"\nAsked if Farage stayed in a townhouse being rented by Cottrell, Jenrick replied: \"I believe Nigel has said that he stayed a couple of times there, very infrequently, as you're allowed to.\n\"Nigel Farage is allowed to have friends, as a politician you're allowed to stay at a friend's house, and certainly remember Nigel was not an elected politician. He was, if you like, an ex-politician at the time.\"\nJenrick also said Farage had \"absolutely\" received help from Cottrell with staffing costs, including security, before he became an MP.\nHe said: \"You're allowed to accept a gift, support, whatever you want to call it, from a personal friend before you're a Member of Parliament if it's in a purely personal capacity.\n\"So there is absolutely nothing to see in this story.\"\nIn 2017, Cottrell was jailed for eight months in the US after pleading guilty to a charge of wire fraud after admitting attempting to defraud criminals on the dark web by posing as a money launderer.\nFarage was with him when US authorities pounced as the pair were returning to the UK from a Republican convention.\nFarage served as Reform's honorary president between March 2021 and June 2024. On 3 June 2024, he confirmed he was returning as party leader and standing in the general election. He became Clacton MP in July 2024.\nUnder parliamentary rules, new MPs must declare financial interests and \"registrable benefits\" received in the 12 months before their election.\nThe guidelines say purely personal gifts or benefits do not need to be registered.\nWhen he became an MP, Farage registered a £9,253 trip to Belgium in April 2024 donated by Cottrell, and later added a £15,276 donation from Cottrell for a US domestic flight he provided in December 2024.\nNo other support from Cottrell is listed in the Register of Members' Financial Interests., external\nA spokesman for Farage said: \"It comes as no surprise that the Sunday Times has chosen to publish this baseless and contrived story, covering a period of time when Nigel Farage was not even an active politician let alone an elected one, given that the newspaper backed the Labour Party at the last general election.\n\"Contrary to the story's tone, no parliamentary rules have been broken.\"\nA source said Reform paid for Farage's security and staff after his return to politics.\nThe source also denied Farage received accommodation from Cottrell - saying the MP did not stay at the London property.\nThe Parliamentary Standards Commissioner, Daniel Greenberg, is currently investigating whether Farage broke the rules over the £5m gift from British cryptocurrency investor Christopher Harborne in early 2024.\nFarage has said Harborne gave him the money to pay for his personal security, adding the gift was \"purely private\" and \"wasn't political in any sense at all\".\nLib Dem MP Josh Babarinde has asked Greenberg to \"get to the bottom\" of the latest allegations linke", "translation_ja": "改革党、ファラージ党首の規則違反を否定――詐欺有罪の盟友からの利益未申告問題\n\nロバート・ジェナリックは「いかなる規則も一切破られていない」と述べた。これは、改革党（Reform UK）の党首ナイジェル・ファラージ氏が、米国で詐欺罪で有罪判決を受けたことのある盟友から提供された利益を申告しなかったとの報道を受けてのことだ。\n\nサンデー・タイムズ紙によると、ジョージ・コットレル氏はファラージ氏が当選する前の1年間、警備員やファラージ氏のオンラインコンテンツを担当するソーシャルメディアスタッフなどの支援を提供していたという。また、ファラージ氏がバッキンガム宮殿近くにあるコットレル氏が賃借する物件を利用していたとも伝えている。\n\n改革党の財務担当スポークスマンを務めるジェナリック氏はBBCに対し、ファラージ氏がその支援を登録する必要はなかったと述べた。なぜなら、議員になる前の「純粋に個人的な立場」での支援だったからだという。\n\n自由民主党は議会基準委員に調査を求めた。\n\n・ファラージ氏、500万ポンドの贈与の支出詳細は「国民が知る必要はない」と発言――6月23日公開\n・ファラージ氏、金地金プロモーションで27万ポンドの収入を申告――4日前公開\n\nファラージ氏はすでに、登録されていなかった億万長者の改革党支持者からの500万ポンドの贈与をめぐる議会調査に直面している。\n\n同氏は、その資金は個人の警備費に充てられたものであり、政治活動に関与していない時期に受け取ったものであるため政治的なものではないと主張している。\n\n彼のチームは、コットレル氏から受け取ったとされる「現物（非現金）」支援が登録されていない理由についても同様の主張をしている。\n\n2017年に米国で電信詐欺の罪を認めたコットレル氏（32歳）は、ファラージ氏の長年の盟友だ。ブレグジット国民投票の準備期間中、英国独立党（UKIP）にボランティアとして関わっていた。\n\nサンデー・タイムズによると、コットレル氏は暗号資産起業家であり、オフショアのギャンブルサイト「Tether.bet」にも関与しているという。\n\nBBCの「サンデー・ウィズ・ローラ・クエンズバーグ」に出演したジェナリック氏は、コットレル氏をファラージ氏の「古い友人」と表現した。\n\nジェナリック氏はこう語った。「コットレル氏はナイジェルが議員になる前に支援を行いましたが、議員になってからは一切行っていません。規則は何も破られていません」\n\nジェナリック氏はまた、この件を「ナイジェルをおとしめようとする目的で掘り起こされた非常に古い話」と表現し、「成功しないだろう」と付け加えた。\n\nファラージ氏がコットレル氏の賃借するタウンハウスに滞在したかどうかを問われると、ジェナリック氏はこう答えた。「ナイジェルは数回、非常にまれにそこに滞在したと述べていると思います。それは許されていることです。ナイジェル・ファラージは友人を持つ権利があります。政治家として友人の家に泊まることは許されていますし、当時ナイジェルは選出された政治家ではありませんでした。いわば元政治家という立場でした」\n\nジェナリック氏はまた、ファラージ氏が議員になる前に警備を含む人件費についてコットレル氏から「確かに」援助を受けていたことも認めた。\n\n同氏はこう述べた。「議員になる前に、純粋に個人的な立場で個人的な友人からの贈り物や支援などを受けることは許されています。ですから、この話には全く問題はありません」\n\n2017年、コットレル氏はダークウェブ上で資金洗浄業者を装い犯罪者を詐欺しようとした電信詐欺罪を認め、米国で8か月の禁固刑を受けた。\n\nファラージ氏は、米当局が共和党大会からの帰国途中の2人を拘束した際、コットレル氏と同行していた。\n\nファラージ氏は2021年3月から2024年6月まで改革党の名誉総裁を務めた。2024年6月3日、同氏は党首として復帰し総選挙に立候補することを表明。同年7月にクラクトン選挙区の下院議員となった。\n\n議会規則によれば、新たに当選した議員は当選前12か月間に受けた財務上の利益や「登録すべき恩恵」を申告しなければならない。\n\nガイドラインには、純粋に個人的な贈り物や恩恵は登録不要と記されている。\n\nファラージ氏は議員就任時に、コットレル氏から提供された2024年4月のベルギー出張費9,253ポンドを登録しており、後に2024年12月にコットレル氏が提供した米国国内線航空券15,276ポンドの寄付も追加登録した。\n\n議員財務利益登録簿にはコットレル氏からのそれ以外の支援は記載されていない。\n\nファラージ氏のスポークスマンはこうコメントした。「サンデー・タイムズが今回の根拠のない作為的な記事を掲載したことは驚くことではありません。この記事は、ナイジェル・ファラージが積極的な政治家でも選出された政治家でもなかった時期を対象としており、同紙が前回の総選挙で労働党を支持したことを考えれば当然です。記事の論調に反して、議会規則は何も破られていません」\n\nある情報筋は、ファラージ氏の政界復帰後の警備費とスタッフ費は改革党が負担したと述べた。\n\nまた同情報筋は、ファラージ氏がコットレル氏から宿泊施設を提供されたとの報道を否定し、議員はロンドンの物件に滞在していなかったと述べた。\n\n議会基準委員のダニエル・グリーンバーグ氏は現在、ファラージ氏が2024年初頭に英国の暗号資産投資家クリストファー・ハーボーン氏から受け取った500万ポンドの贈与をめぐる規則違反の疑いを調査している。\n\nファラージ氏はハーボーン氏が個人の警備費として資金を提供したとし、「純粋にプライベートなもの」であり「政治的な意味は全くない」と述べている。\n\n自由民主党のジョシュ・ババリンデ議員はグリーンバーグ委員に対し、今回の新たな疑惑の「真相を明らかにする」よう求めた。", "vocab": [{"word": "wire fraud", "definition": "電信詐欺。電子通信手段（電話・インターネット等）を使って行われる詐欺行為を指す米国の法律用語。ビジネス・法律文書で頻出する専門表現。"}, {"word": "in kind", "definition": "現物で、物品・サービスの形で。現金ではなく物品やサービスとして提供される支援や寄付を指す表現で、財務・法律文書でよく使われる。"}, {"word": "registrable benefits", "definition": "登録義務のある利益・恩恵。英国議会規則において、議員が申告・登録しなければならない財務上の利益やサービスを指す専門的な議会用語。"}, {"word": "dredged up", "definition": "（過去の事柄を）掘り起こす、蒸し返す。不都合な過去の情報や話題をわざわざ表面に引き上げることを意味する慣用表現。"}, {"word": "parliamentary standards commissioner", "definition": "議会基準委員。英国議会において議員の行動規範や利益申告に関する規則違反を調査する独立した役職を指す制度的・政治的用語。"}, {"word": "contrived", "definition": "作為的な、意図的に仕組まれた。不自然なほど計算されていたり、でっち上げられた印象を与えるものを表す形容詞。批判的な文脈で使われることが多い。"}, {"word": "honorary president", "definition": "名誉総裁・名誉会長。実際の執行権限を持たず、名目上・象徴的にトップの地位に就く役職を指す表現。組織・政党で用いられる肩書き。"}]}, {"title_ja": "「お坊ちゃんジョージ」：ファラージュ論争の中心にいる貴族出身の有罪判決を受けた犯罪者とは？", "title_en": "'Posh George': The aristocrat and convicted criminal at the centre of Farage's controversy", "summary_ja": "英国改革党党首ナイジェル・ファラージュが、「お坊ちゃんジョージ」として知られるジョージ・コットレルから受けた便宜を議会に申告しなかったとして批判にさらされている。32歳の貴族出身者であるコットレルは、FBI囮捜査により詐欺罪で有罪となり、過去に米国で8か月服役した経歴を持つ。改革党は、当該支援は純粋に個人的な立場で提供されたものであり、議会規則に違反していないと主張している。", "summary_en": "Nigel Farage is facing scrutiny after reportedly failing to declare benefits provided by George Cottrell, a 32-year-old aristocrat and convicted fraudster known as 'Posh George'. Cottrell, who previously served eight months in a US prison following an FBI sting operation, allegedly supplied Farage with security staff, social media support, and accommodation in the year before he became an MP. Reform UK insists no parliamentary rules were broken, arguing the support was provided in a purely personal capacity.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c5yzzw5vk8vo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "IT", "full_text": "'Posh George': Who is aristocrat and convicted criminal at heart of Farage controversy?\n- Published\nUntil Saturday night, little was known about the relationship between Nigel Farage and convicted criminal George Cottrell.\nNow, the 32-year-old aristocrat is at the centre of the latest controversy surrounding the Reform UK leader, after Farage reportedly failed to declare benefits provided by the man known as \"Posh George\".\nThe Sunday Times reports that Cottrell supplied support, external including security and social media staff who worked on Farage's online content in the year before he became an MP.\nUnder parliamentary rules, new members must declare financial interests and \"registrable benefits\" received in the 12 months before their election.\nReform says no rules have been broken; its Treasury spokesman Robert Jenrick told the BBC that the support did not need to be registered since it was provided in a \"purely personal capacity\" prior to Farage's election.\nWho is Cottrell, the long-time Farage ally and reported cryptocurrency entrepreneur once convicted of fraud in the US?\n- Reform denies rules broken by Farage after benefits from ally not declared - Published4 hours ago\n \nBorn in Gloucester in October 1993, Cottrell's mother, the Honourable Fiona Cottrell, is an aristocrat whose father, the third Baron Manton, inherited a family soap empire, the Sunday Times reports.\nCottrell reportedly left education without A-levels after being expelled from Malvern College in Worcestershire due to a \"gambling addiction\".\nIt is not clear when he became close with Farage, but Cottrell volunteered for him in an Essex by-election in 2015 and was rewarded with a role as Ukip's head of fundraising, aged 22.\nIn 2016, they were together on the day of the Brexit referendum.\nA month later, Cottrell was arrested in the US as he and Farage were preparing to return to the UK after the Republican convention, where Farage had spoken at a rally in support of Donald Trump.\nCottrell had been caught agreeing to launder money for undercover agents posing as drug traffickers in an FBI sting operation.\nFarage said at the time that he was surprised by what had happened and had \"never had any suspicions\" about Cottrell. He said he could not be held responsible for \"what everyone around me does\".\nCottrell faced 20 years in jail for 21 counts related to money laundering, fraud, blackmail and extortion.\nBut he eventually brokered a plea deal, admitted guilt to a charge of wire fraud and ended up serving just eight months in prison.\nIn the plea bargain, Cottrell said: \"I falsely claimed that I would launder the criminal proceeds through my bank accounts for a fee.\"\nHe claimed that rather than launder the money, he and an associate planned on keeping it themselves.\nUpon his release, Cottrell moved back to the UK and dated Georgia Toffolo, reality TV star and winner of I'm a Celebrity... Get Me Out of Here.\nHe then moved to Montenegro where the Sunday Times reports he became a \"key player\" in Tether.bet, an online bookmaker and casino offering users large stakes on sports and politics in cash or cryptocurrency.\nThis included Tether, a digital currency part owned by Christopher Harborne, a billionaire who gave Farage a £5m gift in early 2024.\nThe Parliamentary Standards Commissioner is currently investigating whether Farage broke the rules over that gift.\nFarage has said Harborne gave him the money to pay for his personal security, adding that the gift was \"purely private\" and \"wasn't political in any sense at all\".\nThe Sunday Times reports that in 2023, Cottrell put Farage in contact with Jack Anderton, a 25-year-old right-wing political activist from Liverpool, to help run his social media operation, particularly on TikTok - where Farage's engagement surged.\nIt reports that Cottrell paid Anderton a salary equivalent to around £55,000 a year.\nLater that year, Cottrell helped negotiate a £1.5 million fee for Farage to appear on I'm a Celebrity..., the newspaper reports, and started providing Farage with security, primarily composed of elite former soldiers, and drivers.\nAfter Farage announced that he would stand as a Reform UK candidate in the 2024 general election and became party leader, he started travelling the country - often with Cottrell by his side.\nOne such occasion was Farage's campaign launch in Clacton, Essex, where a milkshake was thrown over him.\nAround this time, the Sunday Times reports that Cottrell began renting a residential property near Buckingham Palace, for which he is understood to be paying tens of thousands of pounds per month, and where Farage has been allowed to stay.\nOn 4 July 2024, Farage was elected as the MP for Clacton.\nHe then registered a £9,253 trip to Belgium in April 2024 donated by Cottrell, and later added a £15,276 donation from Cottrell for a US domestic flight he provided in December 2024.\nNo other support from Cottrell is listed in the Register of Members' Financial Interests.\nCottrell is now reportedl", "translation_ja": "「お坊ちゃんジョージ」：ファラージュ論争の中心にいる貴族出身の有罪判決を受けた犯罪者とは？\n\n公開日：\n\n土曜日の夜まで、ナイジェル・ファラージュとジョージ・コットレルという有罪判決を受けた犯罪者との関係についてはほとんど知られていなかった。\n\nしかし今や、この32歳の貴族は、改革党（Reform UK）党首を取り巻く最新の論争の中心人物となっている。ファラージュが「お坊ちゃんジョージ」として知られる人物から受けた便宜を申告しなかったと報じられたのだ。\n\nサンデー・タイムズ紙は、コットレルがセキュリティ担当者やソーシャルメディアスタッフなど、ファラージュが議員になる1年前からオンラインコンテンツに携わるスタッフを提供していたと報じている。\n\n議会規則によれば、新議員は選挙の12か月前に受けた財務上の利益や「登録すべき便宜」を申告しなければならない。\n\n改革党は規則に違反はないと主張しており、党の財務報道官であるロバート・ジェンリックはBBCに対し、当該支援はファラージュの議員就任前に「純粋に個人的な立場」で提供されたものであるため、登録の必要はないと述べた。\n\nコットレルとは何者か？長年のファラージュ支持者であり、米国で詐欺罪により有罪判決を受けた暗号通貨起業家として知られる人物だ。\n\n・改革党、ファラージュが支持者からの便宜を申告しなかった件について規則違反を否定　（4時間前公開）\n\n1993年10月にグロスターで生まれたコットレルの母親、オナラブル・フィオナ・コットレルは貴族の出身で、その父は第三代マントン男爵であり、一族の石鹸事業帝国を受け継いだと、サンデー・タイムズ紙は伝えている。\n\nコットレルはギャンブル依存症が原因でウスターシャーにあるマルバーン・カレッジを退学処分となり、Aレベル（大学入学資格試験）を取得せずに学業を終えたと報じられている。\n\n彼がいつファラージュと親密になったかは定かではないが、2015年にエセックス補欠選挙でファラージュのボランティアとして参加し、その功績が認められ、22歳でUKIPの募金活動責任者という役職を与えられた。\n\n2016年には、ブレグジット国民投票の当日も共に行動していた。\n\nその翌月、コットレルはファラージュとともに英国に帰国しようとしていた際、米国で逮捕された。ファラージュはドナルド・トランプを支持する集会で演説するため共和党大会に出席していた。\n\nコットレルは、麻薬密売人を装ったFBI囮捜査官に対し、マネーロンダリングへの協力に同意していたところを摘発されたのだ。\n\nファラージュは当時、何が起こったかに驚いたと述べ、コットレルについて「一切疑いを持ったことがなかった」と語った。また、「自分の周囲の人物全員の行動に責任を持つことはできない」とも述べた。\n\nコットレルはマネーロンダリング、詐欺、脅迫、恐喝に関連する21件の罪で最大20年の懲役刑に直面していた。\n\nしかし最終的に司法取引を成立させ、電信詐欺の1件について有罪を認め、わずか8か月の服役で済んだ。\n\n司法取引において、コットレルは次のように述べた。「私は、手数料と引き換えに犯罪収益を自分の銀行口座を通じてロンダリングすると虚偽の申告をした。」\n\n彼はさらに、実際にマネーロンダリングを行う代わりに、自分と共犯者がその金を自分たちのものにしようと計画していたと主張した。\n\n釈放後、コットレルは英国に戻り、人気リアリティ番組「アイム・ア・セレブリティ…ゲット・ミー・アウト・オブ・ヒア！」の優勝者であるリアリティTV女優のジョージア・トッフォロと交際した。\n\nその後コットレルはモンテネグロに移住し、サンデー・タイムズ紙によれば、オンラインブックメーカー兼カジノ「Tether.bet」の「中心的人物」となった。同サービスはスポーツや政治において現金または暗号通貨で高額の賭けを可能にするものだ。\n\nこれには、2024年初頭にファラージュに500万ポンドを贈ったとされる億万長者クリストファー・ハーボーンが一部出資するデジタル通貨「テザー」が含まれている。\n\n議会基準委員会は現在、ファラージュがその贈与について規則に違反していないかを調査している。\n\nファラージュは、ハーボーンが個人的な警備費用のために資金を贈ったと述べており、「純粋に私的なもので、政治的な意味は一切なかった」と主張している。\n\nサンデー・タイムズ紙は、2023年にコットレルがファラージュに、リバプール出身の25歳の右翼政治活動家ジャック・アンダートンを紹介し、特にTikTokを中心としたソーシャルメディア運営を支援させたと報じている。ファラージュのTikTokでのエンゲージメントはその後急増した。\n\n同紙によると、コットレルはアンダートンに年間約5万5,000ポンド相当の給与を支払っていた。\n\nその年の後半には、コットレルがファラージュの「アイム・ア・セレブリティ…」出演に際して150万ポンドのギャラ交渉を手伝い、主に精鋭の元軍人で構成される警備チームと運転手の提供を開始したとも報じられている。\n\nファラージュが2024年総選挙に改革党候補として立候補し、党首に就任すると、コットレルを傍らに伴って全国を遊説するようになった。\n\nその一例が、ミルクシェイクを投げつけられたクラクトン（エセックス州）での選挙運動発表会だ。\n\nこの頃、サンデー・タイムズ紙は、コットレルがバッキンガム宮殿近くに住宅物件を借り始め、月に数万ポンドを支払っているとみられ、ファラージュもそこに滞在を許可されていると報じた。\n\n2024年7月4日、ファラージュはクラクトン選挙区の国会議員として選出された。\n\n彼はその後、コットレルから寄付された2024年4月のベルギー訪問（9,253ポンド相当）を登録し、後に2024年12月にコットレルが提供した米国国内フライト（15,276ポンド）の寄付も追加した。\n\nそれ以外のコットレルからの支援は、議員財務上の利益登録簿には記載されていない。\n\nコットレルは現在、（記事はここで途切れている）", "vocab": [{"word": "registrable benefits", "definition": "議会規則において申告が義務付けられている財務上の利益や便宜のこと。政治家が受け取った支援を透明化するために登録する制度的概念。"}, {"word": "plea deal", "definition": "司法取引のこと。被告が一部の罪について有罪を認める代わりに、より軽い刑罰を得ることができる法的合意を指す。"}, {"word": "sting operation", "definition": "囮捜査のこと。法執行機関が犯罪者を摘発するために身分を偽って接触し、犯罪行為を誘引して証拠を収集する捜査手法。"}, {"word": "extortion", "definition": "恐喝・強要のこと。脅迫や強制手段を用いて相手から金品や行動を不当に引き出す犯罪行為を指す。"}, {"word": "entrepreneurship", "definition": "起業家精神・事業家としての活動を指し、ここでは暗号通貨分野における事業活動の文脈で使われている専門的な概念。"}, {"word": "launder (money)", "definition": "マネーロンダリングを行うこと。不正に得た資金を合法的な収益に見せかけるために金融システムを通じて洗浄する行為。"}, {"word": "aristocrat", "definition": "貴族の出身者・上流階級の人物を指す語。世襲的な称号や家柄を持つ人物を表し、英国の階級制度の文脈でよく使われる。"}]}, {"title_ja": "テュヘル、厳重警備の中でメキシコファンの礼儀正しさを称賛", "title_en": "Tuchel praises respectful Mexico fans amid enhanced security at England's hotel", "summary_ja": "イングランド代表監督トーマス・テュヘルは、ワールドカップ共同開催国メキシコとのラウンド16を前に、地元ファンを「友好的で礼儀正しい」と称賛した。エクアドルのファン妨害問題を受け、イングランドのホテル周辺にはメキシコ国家警備隊と機動隊が配備された。テュヘルはまた、アステカ競技場の高地による影響やキックオフ時間変更騒動についても冷静に語った。", "summary_en": "England manager Thomas Tuchel has praised Mexico fans for being 'friendly and respectful' as his side prepare to face the World Cup co-hosts in a last-16 match on Sunday. Enhanced security measures, including Mexico's National Guard and riot police, have been deployed around England's hotel following complaints from Ecuador about fan disruption. Tuchel also addressed the challenges of altitude at the Estadio Azteca and dismissed concerns over a potential kick-off time change.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/sport/football/articles/c8r2827pyxlo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Tuchel praises respectful Mexico fans amid increased security\n- Published\nThomas Tuchel has dismissed concerns over England's treatment in Mexico as they prepare to face the World Cup co-hosts - saying it had been \"nicer than I expected\" and that home fans were \"friendly and respectful\".\nTuchel's side take on Mexico in a last-16 match that kicks off at 18:00 local time on Sunday (Monday 01:00 BST, live on BBC One, iPlayer and Radio 5 Live).\nOn Saturday, the team were met with a mixture of cheers and jeers from fans as they left their hotel for training under enhanced security measures in Mexico City.\nEcuador - beaten 2-0 by Mexico in the World Cup last 32 - lodged a noise complaint with Fifa after fans with loudspeakers, motorbikes and horns disrupted their sleep last week.\nAs a result, members of Mexico's National Guard are lining the entrance to England's hotel, while police officers in riot gear are stood next to barriers on the road outside.\nAny Mexico fans who attempt to get close to the hotel are being moved on by police.\n\"We had no issues tonight and I think Fifa took care of the situation,\" head coach Tuchel said. \"We have security around the hotel so we expect a good night's sleep.\n\"I don't want to talk about problems that don't exist yet. If they come, we will accept them. The best way to approach is to be relaxed and calm.\n\"We have a six o'clock kick-off, so if we miss some hours of sleep we will have time to get some other hours in the late morning.\n\"What I experienced until now was very respectful and emotional and very supportive towards our teams, so we are very respectful towards everyone. We expect to be treated with respect and that was the case.\n\"It was even nicer than I expected.\"\nTuchel said he had felt the energy in Mexico City.\n\"It just catches you straight away once you land here and saw the excitement and the emotions,\" he said.\n\"This will be a proper World Cup match. We are in an iconic place, an iconic stadium and a massive knockout game.\n\"It is a big stage and we feel it. It makes you sharper and brings the best out of you. It makes you feel alive.\"\n- BBC offers 'Stay Up or Catch Up' for England v Mexico - Published2 days ago\n \nTuchel and squad feel altitude impact\nAnother big talking point has been the altitude in Mexico City - with the Estadio Azteca 7,220ft (2,240m) above sea level.\nThat means the Earth's atmospheric pressure is lower, making the air thinner and meaning less oxygen is taken into the bloodstream with each breath.\nThis can lead to increased heart rate, shortness of breath, dehydration, and quicker and more intense fatigue.\nTuchel said he had felt it since arriving on Saturday evening.\n\"We feel it even if we don't train,\" he said. \"I felt a slight headache through the day, for example.\n\"I didn't sleep as well as the days before but nothing you cannot handle and that you cannot adapt.\n\"The players felt it in the first minutes of the training session and the longer it went they could cope with it better.\n\"It is just what it is. We cannot physically adapt, it is impossible. But we are here one day before to experience it at least.\n\"It is not a coincidence Mexico starts their matches strong and aggressively as the first 15 to 20 minutes maybe the tougher. Once we overcome that, I think we are in a good place.\n\"The players are kind of adapted - you know about the situation. We will take care of what we need to take care of. We need a strong performance and I feel we will have one.\"\nKick-off chaos 'not worth losing your head' over\nTuchel was asked about the kick-off chaos, with Fifa being set to move the game forward six hours to 12:00 local time (19:00 BST) before U-turning.\n\"Inside the bubble it was quite calm,\" Tuchel said. \"The players were not aware there was a possible change of kick-off.\n\"Just this example shows you to not lose your head - we cannot influence it. Three and a half hours later, you land in Mexico and the kick-off time stayed the same. It is not worth losing your head.\"\n\"Altitude: it is what it is. Home crowd: it is what it is. We have the spirit, we have the commitment, we have the pure will and the glue in the team to overcome these things. We know what is coming. But that is the beauty of it.\"\n- Published21 hours ago\n \n- Published18 hours ago", "translation_ja": "テュヘル、厳重警備の中でメキシコファンの礼儀正しさを称賛\n\nトーマス・テュヘルは、ワールドカップ共同開催国メキシコと対戦する準備を進める中、イングランドのメキシコでの扱いに関する懸念を一蹴した。「予想していたよりも良かった」とし、地元ファンは「友好的で礼儀正しかった」と述べた。\n\nテュヘル率いるイングランドは、日曜日の現地時間18時（英国夏時間月曜日午前1時、BBCワン・iPlayer・ラジオ5 Liveで生中継）にキックオフするラウンド16でメキシコと対戦する。\n\n土曜日、チームはメキシコシティで警備が強化される中、トレーニングに向けてホテルを出発する際に、ファンから歓声とブーイングの混じった声援を受けた。\n\nワールドカップ1回戦でメキシコに0対2で敗れたエクアドルは、ファンがメガホン、バイク、クラクションを使ってチームの睡眠を先週妨害したとして、FIFAに騒音苦情を申し立てた。\n\nその結果、イングランドのホテル入口にはメキシコ国家警備隊の隊員が配置され、外の道路の柵の横には機動隊の警官が立っている。ホテルに近づこうとするメキシコファンは警察によって移動させられている。\n\n「今夜は何の問題もなく、FIFAが状況に対処してくれたと思います」とヘッドコーチのテュヘルは語った。「ホテルの周りに警備があるので、ぐっすり眠れると思います。\n\n「まだ存在しない問題については話したくありません。問題が来たら受け入れます。最善のアプローチはリラックスして落ち着くことです。\n\n「6時キックオフなので、数時間の睡眠を失っても、午前遅くに補う時間があります。\n\n「これまで私が経験したことは非常に礼儀正しく、感情的で、チームへの支持に満ちていました。だから私たちも全員に敬意を持っています。尊重されることを期待しており、実際そうでした。\n\n「予想していたよりも素晴らしかったです。」\n\nテュヘルは、メキシコシティで熱気を感じたと語った。\n\n「ここに着いた瞬間から、その興奮と感情に一気に引き込まれます」と彼は言った。\n\n「これは本物のワールドカップの試合になるでしょう。私たちは象徴的な場所、象徴的なスタジアムにいて、大きなノックアウト戦を迎えています。\n\n「大舞台であることを感じています。それが自分を鋭くさせ、最高の力を引き出してくれます。生きていると感じさせてくれます。」\n\nテュヘルと選手団が高地の影響を実感\n\nもう一つの大きな話題は、メキシコシティの高地問題だ。エスタディオ・アステカは海抜7,220フィート（2,240メートル）に位置する。\n\nそのため地球の大気圧が低く、空気が薄くなり、呼吸のたびに血流に取り込まれる酸素量が少なくなる。これにより、心拍数の増加、息切れ、脱水症状、そしてより早く強烈な疲労が生じる可能性がある。\n\nテュヘルは土曜夜の到着以来、その影響を感じていると語った。\n\n「トレーニングをしなくても感じます」と彼は言った。「たとえば、一日中軽い頭痛を感じました。\n\n「以前の日ほどよく眠れませんでしたが、対処できないほどのことでも、適応できないほどのことでもありません。\n\n「選手たちはトレーニングセッションの最初の数分間に影響を感じましたが、時間が経つにつれてうまく対処できるようになりました。\n\n「これはそういうものです。身体的に適応することは不可能です。しかし、少なくとも経験するために1日前にここに来ています。\n\n「メキシコが試合の序盤に強くアグレッシブにスタートするのは偶然ではありません。最初の15〜20分が最もきつい時間帯かもしれません。それを乗り越えれば、良い状態になれると思います。\n\n「選手たちはある程度適応しています。状況は分かっています。必要なことに対処します。強いパフォーマンスが必要であり、そうなると感じています。」\n\nキックオフ混乱は「頭を悩ませる価値はない」\n\nテュヘルは、FIFAが試合を6時間前倒しして現地時間12時（英国夏時間19時）にしようとした後、撤回したキックオフ混乱について質問を受けた。\n\n「バブルの中は非常に落ち着いていました」とテュヘルは語った。「選手たちはキックオフ変更の可能性があることさえ知りませんでした。\n\n「この例だけを見ても、頭を悩ませてはいけないということが分かります。私たちには影響を与えられません。3時間半後、メキシコに着いたらキックオフ時間は同じままでした。頭を悩ませる価値はありません。」\n\n「高地：それはそういうものです。ホームの観客：それはそういうものです。私たちにはスピリット、コミットメント、純粋な意志、そしてチームをまとめる結束力があります。何が来るかは分かっています。でもそれこそが醍醐味です。」", "vocab": [{"word": "enhanced", "definition": "「強化された、増強された」という意味の形容詞。セキュリティや機能が通常より高められた状態を表す際によく使われる。"}, {"word": "atmospheric pressure", "definition": "「大気圧」という意味の技術的・科学的用語。地球の大気が地表に及ぼす圧力を指し、高地では低くなる。"}, {"word": "dehydration", "definition": "「脱水症状」という意味の医学用語。体内の水分が不足した状態を指し、高地や激しい運動時に起こりやすい。"}, {"word": "u-turning", "definition": "「方針を撤回する、転換する」という意味のイディオム的表現。元々は車のUターンを指すが、決定や政策を覆す際に比喩的に使われる。"}, {"word": "iconic", "definition": "「象徴的な、伝説的な」という意味の形容詞。文化・歴史的に広く認知され、特定の時代や概念を代表するものに使われる。"}, {"word": "knockout", "definition": "スポーツにおいて「トーナメント形式の、負けたら脱落する」という意味。ノックアウト戦は敗者が即座に大会から敗退する試合形式を指す。"}, {"word": "disrupted", "definition": "「妨害された、乱された」という意味の動詞の過去形。通常の活動や計画が外部の要因によって中断される状況を表す。"}]}, {"title_ja": "ガザの学生、欧州へ留学実現——しかし数十人は出国できず宙吊りに", "title_en": "Some Gaza Students Reach Europe to Study, While Dozens Remain Stranded", "summary_ja": "パレスチナ・ガザ出身の2人の学生が奨学金を受け、多くの官僚的障壁を乗り越えてオランダの大学に到着した。一方、マレーシアの奨学金を得た62人のガザ学生は、マレーシアがイスラエルと外交関係を持たないために出国できないままでいる。国連は2025年11月時点でガザの大学キャンパスの95%が被害を受けたと報告し、教育制度の組織的破壊に警鐘を鳴らしている。", "summary_en": "Two Palestinian students from Gaza have successfully arrived in the Netherlands to pursue university studies with scholarship support, after overcoming extensive bureaucratic hurdles. However, 62 other Gaza students holding Malaysian scholarships remain unable to depart because Malaysia lacks diplomatic relations with Israel, and the Israeli coordinating body COGAT has not responded to departure requests. The UN has warned of the systematic destruction of Gaza's education system, with 95% of university campuses damaged or destroyed as of November 2025.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/students-leave-gaza-to-continue-studies-others-in-limbo/a-77816921?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Students leave Gaza to continue studies, others in limbo\nJuly 5, 2026When 24-year-old Amira Al-Khatib arrived in the Netherlands from Gaza last week to begin her master's degree at Radboud University, the joy of finally reaching safety and the sorrow of leaving home collided.\n\"I am so grateful to everyone who supported me and yet, leaving Gaza was one of the hardest moments I have ever experienced,\" she told DW from her new home in the town of Nijmegen.\nAl-Khatib graduated with a bachelor's degree in computer systems engineering from Gaza's Al-Azhar University in 2025. \"For the past two years, I studied in an environment where internet connectivity could not be taken for granted,\" she said.\nThe only place where she could get an internet signal was on the roof of her house. \"I completed my graduation project with drones flying overhead, placing my hand over my heart every few minutes, hoping I would survive long enough to finish it,\" she recalled.\n\"Engineers who have experienced war understand, perhaps better than anyone else, what our communities actually need,\" she said. \"That's why I chose to continue my education in data science and artificial intelligence. My dream is to help build technological systems that remain reliable even during humanitarian crises and emergencies.\"\nMohammad Herzallah, a 20-year-old engineering student, also left Gaza last Monday to enroll at The Hague University of Applied Sciences. \"Before the war, I never imagined leaving Gaza,\" he told DW.\n\"When bombs were falling, I stopped thinking about studies or my career,\" he said. He had hoped to resume studies in Gaza after the war. \"But the situation only worsened, so I applied abroad even though I did not want to leave my family.\"\nStudents face many 'bureaucratic obstacles'\nBoth students received scholarships through the Gazan Student Support Network (GSSN), an Amman-based NGO established in January 2024 to help students from Gaza continue their higher education.\n\"There are so many bureaucratic obstacles, and every country has its own challenges,\" said GSSN Executive Director Mabrookah Heneidi. In the Netherlands, for example, securing approval for the students took over eight months and involved court cases brought by universities.\nFor 62 other Palestinian students with Malaysian scholarships, their date of departure remains uncertain. \"They have obtained transit approval from Jordan but cannot leave Gaza because Malaysia does not have diplomatic relations with Israel,\" said Heneidi.\nShe explained that all student departures must pass through the Kerem Shalom crossing on Gaza's border with Israel. So far, however, the Israeli military body responsible for coordinating civilian affairs in Gaza, COGAT, has not responded to requests to approve the students' departure.\nWhen asked by DW, COGAT's spokespeople said in a written statement that \"the departure of residents from the Gaza Strip is subject to the submission of a request by a third country willing to receive the individual, as well as the completion of the required security screening by the competent Israeli authorities. The vast majority of requests submitted are approved.\"\nIn their statement, COGAT added that since the beginning of the war nearly 50,000 Gaza Strip residents have departed for third countries for various reasons, including medical treatment, foreign citizenship, residency visas, and academic studies.\nCOGAT didn't provide any details about the permits for the students with scholarships from Malaysia.\nUN warns of 'systemic obliteration' of Gaza's schools\nDuring the war, which was triggered by the Hamas attacks on Israel on October 7, 2023, most of Gaza's 88,000 university students enrolled in the 2022-23 academic year saw their education upended. Alongside widespread death, repeated displacement and a prolonged humanitarian crisis, many also lost their academic and personal records as much of Gaza's higher education system was destroyed.\nIn April 2024, UN experts warned of the \"systemic obliteration\" of Gaza's education system. \"With more than 80% of schools in Gaza damaged or destroyed, it may be reasonable to ask if there is an intentional effort to comprehensively destroy the Palestinian education system, an action known as 'scholasticide',\" the experts said.\nThis past June, the UN updated this figure in its latest report. \"As of November 2025, 95% of campuses have been affected: 22 campuses out of 38 are completely destroyed, and an additional 14 campuses have sustained different levels of damage.\"\nIn an October 2025 report, UNESCO estimated that about 745,000 schoolchildren and students in Gaza had been out of school since October 2023. \"The prospect of resuming education remains highly uncertain due to the extensive damage to Gaza's educational infrastructure,\" it said.\nMeanwhile, online courses and limited in-person classes have resumed at Gaza's largest universities, including Al-Azhar University and the Islamic University of Gaza.\nNo official enrollment f", "translation_ja": "ガザの学生たち、学業継続のため出国——しかし宙吊りのままの者も\n\n2026年7月5日\n\n24歳のアミラ・アル＝ハティブが先週ガザからオランダに到着し、ラドバウド大学で修士課程を始めたとき、ようやく安全な場所にたどり着いた喜びと、故郷を離れる悲しみが入り交じった。\n\n「支援してくださったすべての方々に心から感謝しています。それでもガザを去ることは、これまで経験した中で最もつらい瞬間の一つでした」と、彼女は新居を構えるナイメーヘン市からDWに語った。\n\nアル＝ハティブは2025年にガザのアル＝アズハル大学でコンピュータシステム工学の学士号を取得した。「過去2年間、インターネット接続が当たり前ではない環境で勉強しました」と彼女は言う。インターネットの電波が届く唯一の場所は自宅の屋上だった。「頭上にドローンが飛び交う中で卒業制作を完成させ、数分おきに胸に手を当て、最後まで生き延びられるよう祈り続けました」と振り返る。\n\n「戦争を経験したエンジニアは、地域社会が本当に何を必要としているかを、誰よりもよく理解しているかもしれません」と彼女は語った。「だからこそ、データサイエンスと人工知能の分野で学業を続けることを選びました。人道危機や緊急事態の最中でも信頼性を保てる技術システムの構築に貢献することが私の夢です」\n\n20歳の工学部学生モハマド・ヘルザッラーは、先週月曜日にガザを出発し、ハーグ応用科学大学に入学した。「戦争前は、ガザを離れることなど考えもしませんでした」とDWに語った。「爆弾が落ちているとき、学業やキャリアのことは考えられなくなりました」。彼は戦後にガザで勉強を再開したいと願っていた。「しかし状況は悪化する一方だったので、家族を残すことは望んでいなかったものの、海外に出願しました」\n\n学生たちが直面する多くの「官僚的障壁」\n\n両学生は、2024年1月にアンマンで設立されたNGO「ガザ学生支援ネットワーク（GSSN）」を通じて奨学金を受けた。GSSNはガザの学生が高等教育を継続できるよう支援することを目的としている。\n\n「官僚的な障壁が非常に多く、国ごとに異なる課題があります」とGSSN事務局長マブルーカ・ヘネイディは語った。オランダでは、学生たちの承認を取得するのに8か月以上かかり、大学による法廷闘争も伴った。\n\n一方、マレーシアの奨学金を得た62人のパレスチナ人学生については、出発日がいまだ未定のままだ。「ヨルダン経由の通過承認は取得していますが、マレーシアがイスラエルと外交関係を持っていないため、ガザを出発できません」とヘネイディは述べた。\n\n彼女によると、学生の出発はすべて、ガザとイスラエルの国境にあるケレム・シャローム検問所を通過しなければならない。しかし、ガザにおける民間人問題の調整を担うイスラエルの軍組織COGATは、学生の出発承認を求める要請に対してこれまで応答していないという。\n\nDWの取材に対し、COGATの広報担当者は書面による声明で次のように述べた。「ガザ地区の住民の出発には、その個人を受け入れる意思のある第三国からの要請の提出、および所管のイスラエル当局による必要な安全審査の完了が条件となっています。提出された要請の大多数は承認されています」\n\nCOGATは声明の中で、戦争開始以来、医療、外国籍の取得、居住ビザ、学術的研究など様々な理由で、ガザ地区の住民約5万人が第三国へ出発したとも付け加えた。\n\nCOGATはマレーシアの奨学金を持つ学生たちの許可に関する詳細については言及しなかった。\n\n国連、ガザの学校の「組織的抹消」を警告\n\n2023年10月7日のハマスによるイスラエルへの攻撃をきっかけに始まった戦争の間、2022〜23年度に在籍していたガザの大学生8万8,000人のほとんどが、教育を中断させられた。広範な死者、繰り返される避難、長期にわたる人道危機に加え、多くの学生が学業記録や個人記録を失い、ガザの高等教育システムの大部分が破壊された。\n\n2024年4月、国連専門家はガザの教育システムの「組織的抹消」について警告を発した。「ガザの学校の80%以上が損傷または破壊されており、パレスチナの教育システムを包括的に破壊しようとする意図的な取り組みがあるのではないかと問うことは合理的かもしれません。この行為は『スコラサイド（学術的虐殺）』とも呼ばれます」と専門家らは述べた。\n\n今年6月、国連は最新報告書においてこの数字を更新した。「2025年11月時点で、キャンパスの95%が被害を受けており、38キャンパス中22キャンパスが完全に破壊され、さらに14キャンパスが様々な程度の損傷を受けています」\n\n2025年10月のユネスコの報告書は、ガザで2023年10月以来学校に通えていない児童・学生が約74万5,000人に上ると推定した。「ガザの教育インフラの広範な被害により、教育が再開される見通しは依然として非常に不透明です」と報告書は述べている。\n\nその一方で、アル＝アズハル大学やガザ・イスラム大学など、ガザの主要大学ではオンライン授業や限定的な対面授業が再開されている。\n\n公式な入学者数のデータは——", "vocab": [{"word": "bureaucratic", "definition": "官僚的な、という意味の形容詞。規則や手続きが複雑で非効率なさまを指し、「bureaucratic obstacles（官僚的障壁）」のように行政手続きの煩雑さを批判的に表現する際に使われる。"}, {"word": "scholasticide", "definition": "教育制度や学術機関を意図的かつ組織的に破壊する行為を指す造語。ジェノサイドになぞらえた用語で、国連専門家がガザの教育破壊を表現する文脈で使用した。"}, {"word": "obliteration", "definition": "完全な消滅・抹消を意味する名詞。物理的・制度的な破壊が徹底的で痕跡をとどめないほどである状況を強調する際に用いられる上級語彙。"}, {"word": "humanitarian", "definition": "人道的な、という意味の形容詞で、人命や基本的人権に関わる危機や支援活動を説明するときに使われる。「humanitarian crisis（人道危機）」は国際報道で頻出する重要表現。"}, {"word": "transit approval", "definition": "第三国を経由して目的地へ移動するための通過許可を指す表現。外交・入国管理の文脈で使われ、特に外交関係が複雑な地域での移動に関連して用いられる。"}, {"word": "systemic", "definition": "組織的・体系的な、という意味の形容詞。個別の問題ではなく、制度や構造全体に根ざした問題であることを強調する際に使われるTOEIC高得点レベルの語彙。"}, {"word": "upended", "definition": "ひっくり返された・完全に乱されたという意味の動詞の過去形。生活や計画が根本から覆される状況を表すイディオマティックな表現で、特に突発的な混乱を描写する報道文で使用される。"}]}, {"title_ja": "イラン高官らがハメネイ師葬儀2日目に参列、後継者の行方は依然不明", "title_en": "Iranian Officials Gather for Day 2 of Khamenei's Funeral as Successor Remains Missing", "summary_ja": "イランのペゼシュキアン大統領やイスラム革命防衛隊幹部らを含む高官たちが、日曜日にテヘランで行われた殺害されたアリー・ハメネイ最高指導者の葬儀2日目に参列した。ハメネイ師の後継者で息子のモジュタバーは、父親を死亡させた2月の空爆で負傷したとされて以来、公の場に姿を現していない。1週間にわたる葬儀期間中、米国とイランの和平交渉は一時停止されており、トランプ大統領は哀悼期間中はイランへの攻撃を行わないと表明した。", "summary_en": "Top Iranian officials, including IRGC leaders and President Pezeshkian, attended the second day of funeral proceedings for slain Supreme Leader Ali Khamenei in Tehran on Sunday. Khamenei's successor and son Mojtaba has not been seen publicly since reportedly being wounded in the same February airstrike that killed his father. The week-long funeral has temporarily paused US-Iran peace negotiations, with President Trump stating he would not attack Iran during the mourning period.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/top-iranian-officials-attend-day-2-of-ali-khamenei-s-funeral/a-77836567?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Top Iranian officials attend day 2 of Ali Khamenei's funeral\nJuly 5, 2026Top Iranian officials attended the second day of funeral proceedings for slain Supreme Leader Ali Khamenei on Sunday.\nKhamanei's family members were also in attendance, including three of his sons. But the son who succeeded him as Iran's top leader, Motjaba Khamenei, was nowhere to be seen as speculation grows as to his whereabouts.\nMotjaba has not been seen in public since he was reportedly wounded in the same February 28 airstrike that killed his father and several others. His face was reportedly disfigured and he suffered significant injury to one or both legs.\nKhamenei's sons, IRGC leaders make rare public appearance\nPresent on Sunday were Khamenei's sons Meysam, Mostafa and Masoud, who was seen wiping tears with a keffiyeh — a symbol of solidarity with Palestinians. The three hadn't been seen in public since the war broke out.\nIslamic Revolutionary Guard Corps (IRGC) leader Gen. Ahmad Vahidi, who himself had only been photographed for the first time since the war on Thursday, was spotted in the crowd of mourners flanked by plainclothes security.\nEsmail Qaani, who leads the Revolutionary Guard's expeditionary Quds Force, was also in attendance.\nPresident Masoud Pezeshkian and parliament speaker Mohammad Bagher Qalibaf prayed behind Khamenei's coffin, which was flanked by the coffins of his daughter, son-in-law, daughter-in-law and 14-month-old granddaughter, who were also killed in the strike.\nLater on X, Qalibaf called Khamenei a \"martyr,\" and hailed how the \"proud and invincible nation of Islamic Iran unanimously\" paid its tributes.\nSunday's ceremony was facilitated by poet Mohammad Rasouli, who led chants of \"Death to America!\" and \"Death to Israel!\"\nHe criticized US President Donald Trump in his speech, adding that \"the world is no longer a good place for\" the US leader.\nMeanwhile, thousands of mourners carrying flags filled the Grand Mosalla in Tehran as temperatures eclipsed 35 degrees Celsius (95 degrees Fahrenheit). Mist machines were deployed at scale while attendees were also handed refreshments.\nPeace negotiations on hold\nAuthorities are anticipating a massive funeral procession in central Tehran on Monday, after which Khamenei's remains will be transported to the seminary city of Qom.\nFrom there, the body will be flown to Iraq, where ceremonies will continue in the Shi'ite holy shrine cities of Najaf and Kerbala on Wednesday. Khamenei's will then return to Iran where he will be buried by the Shi'ite imam tombs in Mashhad.\nThe week-long funeral has put on hold talks with the US intended to reach a permanent end to the war. Trump separately told US news website Axios that he would not attack Iran during the funeral to preserve negotiations.\nHaving a major funeral turnout in the meantime could help Iran strengthen its position in future negotiations.\n\"Our foreign policy should not be shaped in a way that allows our martyred leader's blood to be dishonored and other countries can afford to do such things, without any serious response from our government and diplomatic system,\" one mourner in Tehran told the Associated Press.\nEdited by: Jenipher Camino Gonzalez", "translation_ja": "イラン高官らがハメネイ師葬儀2日目に参列\n\n2026年7月5日　イランの最高指導者アリー・ハメネイ師の葬儀2日目となった日曜日、イランの高官たちが葬儀に参列した。\n\nハメネイ師の家族も参列しており、息子3人の姿も確認された。しかし、父親の後を継いでイランの最高指導者となった息子のモジュタバー・ハメネイは姿を見せず、その所在をめぐる憶測が広がっている。\n\nモジュタバーは、父親や数名が死亡した2月28日の空爆で負傷したと報じられて以来、公の場に姿を現していない。顔に重傷を負い、両脚あるいは片脚にも深刻な損傷を受けたと伝えられている。\n\nハメネイ師の息子らとイスラム革命防衛隊幹部が異例の公の場への姿\n\n日曜日には、ハメネイ師の息子であるメイサム、モスタファ、マスードが参列した。マスードはパレスチナへの連帯を示すシンボルであるケフィエで涙をぬぐう姿が目撃された。3人は戦争が始まってから一度も公の場に姿を現していなかった。\n\nイスラム革命防衛隊（IRGC）のアフマド・ワヒディ司令官も参列者の中に確認された。同司令官自身も、戦争開始以来初めて写真が撮影されたのが木曜日であったばかりで、私服の警護員に挟まれながら姿を見せた。\n\n革命防衛隊の精鋭部隊であるクッズ軍を率いるエスマイール・カアニ司令官も参列した。\n\nマスード・ペゼシュキアン大統領と国会議長のモハンマド・バゲル・ガリバフ氏が棺の後ろで礼拝を行った。ハメネイ師の棺の両脇には、同じく空爆で死亡した娘、婿、義理の娘、そして生後14か月の孫娘の棺が並べられた。\n\nその後、ガリバフ議長はX（旧ツイッター）上でハメネイ師を「殉教者」と呼び、「誇り高く不屈のイスラムイランの国民が一致団結して」追悼を捧げたことを称えた。\n\n日曜日の式典は詩人のモハンマド・ラスーリが進行を務め、「アメリカに死を！」「イスラエルに死を！」というシュプレヒコールを先導した。\n\nラスーリはスピーチの中でアメリカのドナルド・トランプ大統領を批判し、「世界はもはやトランプ大統領にとって良い場所ではなくなっている」と述べた。\n\n一方、テヘランのグランド・モサッラでは気温が摂氏35度（華氏95度）を超える中、旗を掲げた数千人の参列者が広場を埋め尽くした。会場では大型のミスト機が設置され、参列者には飲み物も配布された。\n\n和平交渉は一時停止\n\n当局は月曜日にテヘラン中心部で大規模な葬列が行われることを見込んでおり、その後ハメネイ師の遺体は神学都市コムへ移送される予定だ。\n\nそこから遺体は飛行機でイラクへ運ばれ、水曜日にはシーア派の聖地であるナジャフとカルバラーで儀式が行われる。その後、ハメネイ師の遺体はイランに戻り、マシュハドにあるシーア派イマームの墓廟のそばに埋葬される。\n\n1週間にわたる葬儀により、戦争の恒久的な終結を目指す米国との交渉は一時停止となっている。トランプ大統領は別途、米ニュースサイト「アクシオス」に対し、交渉を維持するために葬儀期間中はイランを攻撃しないと語った。\n\nその間に大規模な葬儀参列者を集めることで、イランは将来の交渉において立場を強化できる可能性がある。\n\n「わが国の外交政策は、殉教した指導者の血が汚辱され、他国がいかなる深刻な対応もなく、そのような行為を行えるような形で形成されてはならない」とテヘランの参列者の一人がAP通信に語った。\n\n編集：ジェニファー・カミノ・ゴンサレス", "vocab": [{"word": "disfigured", "definition": "（顔や体が）ひどく損傷・変形された状態を表す形容詞。事故や暴力などによって外見が著しく損なわれた場合に用いる。"}, {"word": "expeditionary", "definition": "海外での軍事作戦や遠征任務のために編成・派遣された部隊や組織に関する形容詞。軍事・外交の文脈で使われる専門的な語。"}, {"word": "eclipsed", "definition": "本来は「日食・月食」を意味するが、比喩的に「（数値や規模が）ある基準を超えた・上回った」という意味で使われる動詞。"}, {"word": "flanked", "definition": "人物や物体の両側に別の人や物が配置されている状態を表す動詞（過去分詞形）。警護や儀式の場面で頻繁に使われる。"}, {"word": "procession", "definition": "葬儀や式典などで行われる行列・行進を意味する名詞。特に宗教的・公式な場での整然とした行列に用いられる。"}, {"word": "unanimously", "definition": "全員一致で、異議なくという意味の副詞。投票・決議・意見の一致を強調する際に使われ、政治・外交報道に頻出する語。"}, {"word": "speculation", "definition": "確かな情報がない状態での推測・憶測を意味する名詞。ジャーナリズムや金融の分野で広く使われ、不確実性を示すニュアンスを持つ。"}]}, {"title_ja": "南アフリカの反移民抗議でナイジェリア人2人死亡、ナイジェリア政府が強く非難", "title_en": "Nigeria Condemns Killing of Two Nationals Amid South Africa Anti-Migrant Protests", "summary_ja": "ナイジェリアは、反移民抗議運動が広がる南アフリカで6月28日に自国民2人が死亡したことを強く非難した。1人はプレトリアで警察官に殺害されたとされ、もう1人はムプマランガ州で身元不明の攻撃者に殺害された。ナイジェリア外務省は即時調査を求めるとともに、政治家たちが外国人嫌悪的な発言で緊張を煽っていることへの懸念を表明している。", "summary_en": "Nigeria has denounced the deaths of two of its citizens killed in South Africa on June 28, as anti-immigrant protests sweep the country. One man was allegedly killed by police in Pretoria, while the other was murdered by unidentified attackers in Mpumalanga province. Nigeria's Foreign Ministry is calling for an immediate investigation and expressing concern over xenophobic rhetoric by politicians.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/nigeria-condemns-deaths-of-2-nationals-in-south-africa-protests/a-77838899?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Nigeria condemns deaths of 2 nationals in S. Africa protests\nJuly 5, 2026Nigeria on Sunday denounced the deaths of two of its nationals in South Africa, warning that foreign nationals are being \"unduly targeted\" amid anti-migrant protests.\nIn recent weeks, South African cities and towns have seen large turnouts for the marches — some of which turned violent — demanding that migrants be sent home.\nWhat do we know?\nNigeria's Foreign Ministry said the pair were killed on June 28.\nOne of the men, Emeka Charles Iroegbu, was allegedly killed by police officers in Sunnyside, Pretoria.\nThe ministry blamed the alleged use of \"gruesome interrogation techniques\" for Iroegbu's death, but offered no evidence.\nThe other, Musa Yunana Joe, was killed in front of his shop in the town of Witbank in Mpumalanga province by unidentified attackers.\nA ministry statement said the deaths happened two days before a deadline set by protesters for foreign workers to leave the country.\nNigerian Foreign Ministry spokesperson Kimiebi Imomotimi Ebienfa said: \"These two killings come at a time when foreigners are being unduly targeted in South Africa.\"\n\"This raises questions about [the] deliberate attempt by some elements to wrongfully generalize and tag well-meaning, hard-working and respectable Nigerians as criminals.\"\nThe ministry called for an immediate investigation into the deaths and said it was concerned that politicians were further inflaming tensions through xenophobic remarks in local media.\nSouth African authorities have yet to comment.\nProtest movement growing\nA growing wave of anti-immigrant sentiment has swept across South Africa in recent months, sparking widespread protests that blame foreigners for high unemployment, crime and pressure on public services.\nOn June 30 alone, over 120 marches took place nationwide, with thousands participating in major cities like Johannesburg and Durban.\nThe demos have sometimes turned violent — on one day, more than 900 people were arrested.\nIn response, Nigeria, Ghana, and Malawi have repatriated many of their citizens and summoned South African diplomats.\nForeign-born residents make up roughly 5% of South Africa's 63 million population.\nEdited by: Wesley Dockery\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred news source on Google by clicking here, so you'll always see our verified news first.", "translation_ja": "ナイジェリア、南アフリカの抗議で自国民2人の死亡を非難\n\n2026年7月5日 — ナイジェリアは日曜日、南アフリカで自国民2人が死亡したことを非難し、反移民抗議が続く中で外国籍の人々が「不当に標的にされている」と警告した。\n\nここ数週間、南アフリカの各都市や町では、移民を国外追放するよう求める大規模な行進が行われており、その一部は暴力的なものとなっている。\n\n【わかっていること】\nナイジェリア外務省によると、2人は6月28日に死亡した。\nそのうちの1人、エメカ・チャールズ・イロエグブは、プレトリアのサニーサイドで警察官に殺害されたとされている。外務省は「残酷な尋問手法」の使用がイロエグブの死因であると主張しているが、証拠は示されていない。\nもう1人のムサ・ユナナ・ジョーは、ムプマランガ州ウィットバンクの町にある自分の店の前で、身元不明の攻撃者によって殺害された。\n外務省の声明によると、2人の死亡は、抗議参加者が外国人労働者に対して設定した国外退去期限の2日前に起きたという。\nナイジェリア外務省報道官のキミエビ・イモモティミ・エビエンファは次のように述べた。「この2件の殺害は、外国人が南アフリカで不当に標的とされている時期に起きたものです。」\n「これは、一部の勢力が善良で勤勉かつ誠実なナイジェリア人を犯罪者として不当に一般化し、レッテルを貼ろうとする意図的な試みがあるのではないかという疑念を生じさせます。」\n外務省は2件の死亡に関する即時調査を要求するとともに、政治家たちが地元メディアで外国人嫌悪的な発言をすることで緊張をさらに煽っていることへの懸念を表明した。\n南アフリカ当局はまだコメントを発表していない。\n\n【拡大する抗議運動】\nここ数か月間、反移民感情の波が南アフリカ全土に広がり、外国人が高い失業率や犯罪、公共サービスへの負担の原因であるとして非難する大規模な抗議運動が各地で発生している。\n6月30日だけでも全国で120件以上の行進が行われ、ヨハネスブルクやダーバンなどの主要都市では数千人が参加した。\nデモはときに暴力的となり、ある1日には900人以上が逮捕された。\nこれを受け、ナイジェリア、ガーナ、マラウイは多くの自国民を帰国させ、南アフリカの外交官を召喚した。\n南アフリカの人口6,300万人のうち、外国生まれの居住者は約5%を占めている。\n\n編集：ウェズリー・ドッカリー", "vocab": [{"word": "denounced", "definition": "「強く非難する」という意味の動詞。公式な立場から道徳的・政治的に不正とみなす行為を公に批判する際に使われる改まった表現。"}, {"word": "unduly", "definition": "「不当に、過度に」という意味の副詞。正当な理由や根拠なく何かが行われている状況を強調するときに用いる。"}, {"word": "xenophobic", "definition": "「外国人嫌悪の」という意味の形容詞。外国人や異文化に対する根拠のない恐怖や偏見・差別的態度を指す政治・社会的文脈でよく使われる語。"}, {"word": "repatriated", "definition": "「本国に送還した・帰国させた」という意味の動詞の過去形。自国民や難民などを元の国籍国へ戻す公式な手続きを指す外交・国際関係用語。"}, {"word": "inflaming", "definition": "「（感情や対立を）煽る、悪化させる」という意味のイディオム的表現。すでに緊張した状況をさらに激化させる行為を表す際に使われる。"}, {"word": "summoned", "definition": "「召喚した」という意味の動詞の過去形。外交の文脈では、抗議や説明要求のために相手国の外交官を外務省に呼び出す行為を指す。"}, {"word": "generalize", "definition": "「一般化する」という意味の動詞。ここでは特定の個人の行動を集団全体の特徴として不当に当てはめることを批判的に指摘する文脈で使われている。"}]}, {"title_ja": "バーガム長官、リフレクティング・プール修繕費を擁護――「費用は少額になる」", "title_en": "Burgum Defends $16M Reflecting Pool Repairs, Calls Project 'A Big Success'", "summary_ja": "内務長官ダグ・バーガム氏はABCニュースの番組「ディス・ウィーク」に出演し、リンカーン記念館のリフレクティング・プール改修工事について「大きな成功だ」と擁護した。工事費は当初の随意契約額を400万ドル超過し、総額1,600万ドル以上に達している。バーガム氏はプールの防水ライナーへの損傷は破壊行為によるものだというトランプ大統領の主張を支持し、追加修繕費は「少額」になると述べた。", "summary_en": "Interior Secretary Doug Burgum defended the Lincoln Memorial Reflecting Pool renovation project on ABC News' 'This Week,' calling it a 'big success' despite costs exceeding $16 million — $4 million over the original no-bid contract. Burgum backed President Trump's claim that vandals caused damage to the pool's liner, saying additional repairs will cost a 'small number.' He also praised a new nanobubbler system for combating algae and said the water is now 'crystal clear.'", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/Politics/secretary-burgum-defends-cost-reflecting-pool-repairs-small/story?id=134494488", "state_media": false, "category": "社会", "full_text": "Secretary Burgum defends cost of Reflecting Pool repairs: 'It's going to be a small number'\nThe Interior secretary backs Trump's claims that vandals cut the pool's liner.\nInterior Secretary Doug Burgum on Sunday defended President Donald Trump's renovations of the Lincoln Memorial Reflecting Pool despite its being plagued by peeling paint and algae, saying it has been a \"big success.\"\nRenovations to the Reflecting Pool began in April, and have cost more than $16 million, $4 million more than the original no-bid contract. The Trump administration has repeatedly defended the project that was a made a priority for repairs ahead of the country's 250th anniversary celebration this weekend.\n\"Well, it's fixed in the sense that it's no longer leaking 45,000 gallons a day. And we've got, you know, less than one-tenth of one percent of that industrial liner that's been damaged. And that's the only thing that remains to go back and fix the damage done by the vandals,\" Burgum told ABC News' \"This Week\" anchor George Stephanopoulos on Sunday.\nBurgum, who is overseeing the project, said that the initial renovation was done for a \"fraction of the cost\" as past projects, and that additional fixes to the pool's lining will not cost much more.\n\"I think it's going -- the -- it's going to be a small number because the majority of the work was related to the labor and the materials for the liner. And, of course, the new nanobubbler system, which has taken care of and won the battle against the algae, which is something, you know -- you know, in a -- in a shallow pool, in hot weather, has been -- has been a historic challenge,\" Burgum said.\n\"So the Reflecting Pool has been a big success,\" Burgum added. \"And we've got 340 million people in this country that are celebrating 250. We did have a few vandals, but all that's going to be repairable, and that'll all be fixed in the coming weeks as we go forward.\"\nTrump has blamed vandals for ripping a 350-foot gash in the liner at the bottom of the pool, saying that people cut it with a \"knife or box-cutter.\" Burgum backed those claims and said more cameras have been installed at the Reflecting Pool as a result.\n\"It's multiple gashes that add up to 350 feet across that. And so -- and again, some of this happened early on. There was a -- where we've installed more cameras. I mean we weren't expecting that we were going to have a small group of people that wanted to try to destroy effectively what is part of the Lincoln Memorial.\"\nThe Reflecting Pool renovations have been a contentious point with the president's critics, including top House Oversight Committee Democrat Robert Garcia. In June, Garcia sent letters demanding more information from contractors about the project by July 8. In a statement, Garcia called the pool Trump's \"latest failed vanity project.\"\nBurgum claimed that the Reflecting Pool, which was temporarily closed for the July Fourth fireworks display on Saturday, is \"crystal clear.\"\nAnybody that's there and anybody that was there last week before the fireworks started being installed on either side of the, the Reflecting Pool could see that it was -- the water was crystal clear. So that part's been taken care of. So, again, we are, we are, you know, on to the next thing because this has all been done so well.\"", "translation_ja": "内務長官バーガム、リフレクティング・プール修繕費を擁護――「費用は少額になる」\n\nバーガム内務長官、リフレクティング・プール改修費を擁護：「少額になるだろう」\nトランプ大統領の「破壊者がプールのライナーを切り裂いた」との主張を内務長官が支持\n\n内務長官ダグ・バーガム氏は日曜日、リンカーン記念館のリフレクティング・プール改修工事がペンキの剥がれや藻の発生に悩まされているにもかかわらず、「大きな成功だ」と述べ、ドナルド・トランプ大統領による改修を擁護した。\n\n改修工事は4月に始まり、費用は1,600万ドル以上に達しており、当初の随意契約額を400万ドル超えている。トランプ政権は、今週末に予定されている建国250周年記念式典に向けて優先的に修繕が進められてきたこのプロジェクトを繰り返し擁護してきた。\n\n「修繕された、という意味においては、もはや1日に4万5,000ガロンの水漏れはありません。また、工業用ライナー全体のうち損傷を受けているのは0.1パーセント未満です。それが残っている唯一の修繕箇所であり、破壊者による損傷を元に戻す作業です」と、バーガム氏はABCニュースの「ディス・ウィーク」のアンカー、ジョージ・ステファノプロス氏に対して日曜日に語った。\n\nこのプロジェクトを監督するバーガム氏は、当初の改修工事は過去のプロジェクトの「ほんの一部のコスト」で行われたと述べ、プールのライナーの追加修繕にはそれほど費用はかからないと語った。\n\n「費用は少額になると思います。作業の大部分は、ライナーの労働費と材料費に関連していたからです。そしてもちろん、新しいナノバブラーシステムにより、藻との戦いに勝利しました。浅いプールで、暑い気候の中では、藻は歴史的に困難な課題であり続けてきました」とバーガム氏は語った。\n\n「リフレクティング・プールは大きな成功でした」とバーガム氏は付け加えた。「この国には3億4,000万人の国民がいて、建国250周年を祝っています。破壊者が数人いたことは確かですが、すべて修繕可能であり、今後数週間で修復されるでしょう」\n\nトランプ大統領は、プール底部のライナーに350フィートにわたる切り傷をつけたとして破壊者を非難しており、「ナイフかカッターナイフ」で切り裂かれたと述べている。バーガム氏もその主張を支持し、その結果としてリフレクティング・プールにより多くのカメラが設置されたと述べた。\n\n「350フィートに及ぶ複数の切り傷です。そして、これらの一部は早い段階で発生しました。カメラを増設した箇所もあります。つまり、リンカーン記念館の一部とも言えるものを実質的に破壊しようとする少数のグループが出てくるとは予想していませんでした」\n\nリフレクティング・プールの改修工事は、下院監視委員会の民主党筆頭理事ロバート・ガルシア氏を含む大統領批判者の間で論争の的となっている。ガルシア氏は6月、7月8日までにプロジェクトに関するより詳しい情報を請負業者に求める書簡を送った。ガルシア氏は声明の中で、このプールをトランプ氏の「最新の失敗した見栄プロジェクト」と呼んだ。\n\nバーガム氏は、土曜日の7月4日の独立記念日花火大会のため一時閉鎖されていたリフレクティング・プールの水は「透き通っている」と主張した。\n\n「そこを訪れた方、また先週、プールの両側に花火が設置される前に訪れた方なら誰でも、水が透き通っていたことを確認できたはずです。その点は解決されています。ですから、すべてがうまくいっているので、私たちは次のことに取り掛かっています」", "vocab": [{"word": "no-bid contract", "definition": "競争入札なしに特定の業者と直接締結する契約のこと。「随意契約」とも呼ばれ、透明性の欠如として批判されることが多い。"}, {"word": "liner", "definition": "ここでは、プールの底や側面に張る防水シートや防水材のこと。液体の漏れを防ぐために使用される工業用の内張り材を指す。"}, {"word": "nanobubbler", "definition": "水中に極めて微細な気泡（ナノバブル）を発生させる装置のこと。水質改善や藻の抑制などに用いられる比較的新しい技術用語。"}, {"word": "contentious", "definition": "議論や論争を引き起こしやすい、争点となっているという意味の形容詞。政治や社会的な文脈でよく使われる上級語彙。"}, {"word": "vanity project", "definition": "実用的な目的よりも、関係者の名声や自己満足のために行われるプロジェクトを指す表現。批判的なニュアンスを持つイディオム。"}, {"word": "plagued", "definition": "問題や困難が絶え間なく続いている状態を表す動詞（受動態で使用）。「〜に悩まされている」「〜に苦しめられている」という意味で用いられる。"}, {"word": "gash", "definition": "鋭利なもので切られた深くて長い切り傷や裂け目を指す名詞。刃物による大きな損傷を描写する際に使われる具体的な語彙。"}]},
