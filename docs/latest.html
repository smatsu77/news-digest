ension, which stemmed from a straight red card at the 2025 World Cup. Fifa's independent appeal committee subsequently suspended the ban for 12 months, allowing Balogun to play against Belgium in the last 16. The decision has drawn widespread criticism from Uefa, Belgium, and England coach Thomas Tuchel, who warn it undermines the integrity of football.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/sport/football/articles/c1myykx0gmxo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Trump confirms he asked Fifa to review Balogun ban\n- Published\nPresident Donald Trump has confirmed he asked Fifa to review United States striker Folarin Balogun's one-match suspension at the World Cup.\nBalogun, 25, was set to miss his side's last-16 tie against Belgium after being shown a straight red card for a foul on Bosnia-Herzegovina defender Tarik Muharemovic in the previous round.\nBut Fifa made the shock decision to suspend the automatic one-match ban for 12 months, leading to widespread criticism, including from Uefa, Belgium and England boss Thomas Tuchel.\nFifa's decision frees US forward Balogun, who has scored three goals at this summer's tournament, to be selected for the match in Seattle, which kicks off at 17:00 local time (01:00 BST on Tuesday).\nThe Royal Belgian Football Association (RBFA) says it is \"astonished\" by the move and has told the United States Soccer Federation it \"contests the eligibility\" of Balogun playing in the tie after its appeal against the decision was dismissed.\nTrump said football's world governing body \"made the right decision\", adding it would have left a \"big stain\" on the tournament had the ban been implemented.\nSpeaking at the White House on Monday, Trump said he had asked Fifa to review the decision because he \"didn't think it was a foul\".\nHe confirmed he had spoken to Fifa president Gianni Infantino but said \"all\" he did was ask for a review and added he did not tell the Swiss he had to suspend Balogun's ban.\nTrump added: \"I think it [the suspension] would have left a big stain. I can't tell them what to do. I don't believe they made the decision; I believe it was the commission that made the decision. And it was the right decision.\"\nHowever, European football governing body Uefa said it left the integrity of football at stake.\nTrump also said referee Raphael Claus' decision to send off Balogun was \"horrible\" and called the Brazilian \"a little bit suspect\".\nIn response, the Brazilian football conferdation (CBF) defended Claus' integrity, stating: \"There is nothing in his record that discredits him or gives grounds for any suspicion. He is an exemplary professional.\"\nIn a statement on X, Infantino said that on receiving a call from Trump, he told the US President there was \"an ongoing legal process involving Fifa's independent judicial bodies and that the case would be decided in due course by the competent bodies\".\nThe Fifa appeal committee deemed Belgium are not an interested party as they were not involved in the original decision and are merely the United States' next opponents.\n\"The request was rendered inadmissible on the grounds that the Belgian FA is not a party to the proceedings and, as such, has no standing to appeal the decision,\" said Fifa in a statement.\nThis means Balogun will be free to play against Belgium because there is no party who would appeal against the decision.\nThe RBFA said it has \"still not received any grounds\" for the Fifa appeal committee rejecting its appeal and is still awaiting information requested, including the \"motivation [for] declearing the player eligible as well as the referee's report\".\nThe RBFA added this is a \"breach\" of Fifa regulations.\nWhen asked by BBC Sport about Trump's comments and his view on Claus, Fifa said it had \"nothing more\" to add.\nInfantino later stated Fifa's judicial bodies were \"independent\" and rulings \"must always be respected\".\nHe added: \"I read the decisions of the Fifa Disciplinary Committee when they are issued. Sometimes I am surprised by them. Sometimes I agree with them, and sometimes I disagree.\n\"What I always do, however, is respect those decisions and the autonomy of the bodies that make them. Whether we personally like a decision or not is irrelevant.\n\"Respect for independent institutions and the rule of law is what protects the integrity of our competitions and the credibility of Fifa at all times.\"\n- USA striker Balogun's one-game ban suspended after Trump intervention - Published23 hours ago\n \n- Integrity of game at stake over Fifa Balogun decision - Uefa - Published5 hours ago\n \nIn raising its concerns, the RBFA said: \"Regardless of the sporting outcome of this match, the RBFA is deeply concerned by the course of events and will continue to fight in the coming hours, days and months in defence of the fundamental principles of ethics, fair competition, and the interests of football as a whole.\"\nEngland head coach Thomas Tuchel said the ruling set a dangerous precedent.\nTuchel had defender Jarell Quansah sent off in a dramatic 3-2 win over Mexico.\n\"Where to draw the line is the question that I ask,\" he said. \"I have no answer to that.\n\"Do we appeal if a yellow card is not a yellow card? Do we think it is not a red card or who thinks it? Where does this start and where does this end? It's my question. I don't have an answer.\"\nUefa said intervening to effectively cancel a suspension at a tournament \"crossed a red line\".\nOf the 189 other red cards at the World Cup, only once has a player", "translation_ja": "トランプ大統領、バロガンの出場停止処分見直しをFIFAに要請したことを認める\n\nドナルド・トランプ大統領は、FIFA（国際サッカー連盟）に対し、米国代表FWフォラリン・バロガンのワールドカップ1試合出場停止処分の見直しを求めたことを認めた。\n\nバロガン（25歳）は、前の試合でボスニア・ヘルツェゴビナのDF タリク・ムハレモビッチへのファウルにより一発退場となり、ベルギーとの決勝トーナメント1回戦を欠場する予定だった。\n\nしかしFIFAは驚くべき決断を下し、自動的に科される1試合出場停止処分を12か月間停止した。この決定はUEFA、ベルギー、イングランド代表監督トーマス・トゥヘルを含む多方面から広く批判を受けた。\n\nFIFAのこの決定により、今大会でここまで3ゴールを挙げている米国代表FWバロガンは、シアトルで現地時間17時（日本時間火曜日午前9時）にキックオフされるベルギー戦に出場できることになった。\n\nベルギー王立サッカー協会（RBFA）はこの措置に「驚愕している」と述べ、同決定に対する異議申し立てが却下された後も、米国サッカー連盟に対してバロガンの試合出場資格を「争う」姿勢を示している。\n\nトランプ氏は、世界サッカーの統括団体が「正しい判断を下した」と述べ、もし出場停止処分が実施されていれば、今大会に「大きな汚点」を残すことになっていたと語った。\n\n月曜日にホワイトハウスで発言したトランプ氏は、「ファウルではなかったと思った」ためFIFAに見直しを求めたと述べた。\n\n同氏はFIFA会長ジャンニ・インファンティノと話したことを認めたが、見直しを求めただけであり、スイス人会長に対してバロガンの出場停止を撤回するよう命じてはいないと付け加えた。\n\nトランプ氏はさらにこう述べた。「あの出場停止は大きな汚点を残したと思う。彼らに何かを強制することはできない。決定を下したのは委員会だと思っており、それは正しい判断だった。」\n\nしかし、欧州サッカーの統括団体であるUEFAは、この件がサッカーの完全性を脅かすと指摘した。\n\nトランプ氏はまた、審判のラファエル・クラウスがバロガンを退場させた判断を「ひどい」と批判し、このブラジル人審判は「少々疑わしい」と発言した。\n\nこれに対しブラジルサッカー連盟（CBF）はクラウス審判の清廉性を擁護し、「彼の経歴には、彼の信用を傷つけたり、いかなる疑惑の根拠ともなるものは一切ない。彼は模範的なプロフェッショナルだ」と声明を発表した。\n\nインファンティノ会長はX（旧ツイッター）への声明で、トランプ氏から電話を受けた際、「FIFAの独立した司法機関が関与する法的手続きが進行中であり、案件は適切な機関によって適切な時期に決定される」と米国大統領に伝えたと述べた。\n\nFIFAの上訴委員会は、ベルギーは元の決定に関与しておらず、単に米国の次の対戦相手であるに過ぎないとして、利害関係者ではないと判断した。\n\n「ベルギーサッカー連盟は当該手続きの当事者ではなく、したがって決定に対して異議申し立てを行う資格がないという理由で、申し立ては受理不能とされた」とFIFAは声明で述べた。\n\nこれにより、当該決定に対して異議申し立てできる当事者が存在しないため、バロガンはベルギー戦に自由に出場できることになる。\n\nRBFAは、FIFAの上訴委員会による自らの異議申し立て却下の「根拠をいまだ受け取っていない」と述べ、「選手の出場資格を認めた理由」や「審判のレポート」を含む要請した情報をいまだ待っていると述べた。\n\nRBFAはさらに、これがFIF規則の「違反」にあたると付け加えた。\n\nBBCスポーツがトランプ氏の発言およびクラウス審判への見解についてFIFAにコメントを求めたところ、FIFAは「それ以上付け加えることはない」と回答した。\n\nインファンティノ会長はその後、FIFAの司法機関は「独立」しており、裁定は「常に尊重されなければならない」と述べた。\n\n同氏はこう加えた。「FIFAの規律委員会の決定は、発表された際に読んでいる。時に驚くこともあれば、賛同することも、反対することもある。しかし私が常に行うのは、それらの決定と、それを下す機関の自律性を尊重することだ。私たちが個人的にある決定を好むか否かは無関係だ。独立した機関と法の支配の尊重こそが、常に私たちの大会の完全性とFIFAの信頼性を守るものだ。」\n\nRBFAは懸念を示す中でこう述べた。「この試合のスポーツ上の結果にかかわらず、RBFAは一連の出来事の経緯を深く懸念しており、今後数時間、数日、数か月にわたって、倫理の基本原則、公正な競争、そしてサッカー全体の利益を守るために闘い続ける。」\n\nイングランド代表監督トーマス・トゥヘルは、この裁定が危険な前例を設定すると述べた。トゥヘルは、メキシコとのドラマチックな3対2の勝利でDFジャレル・クァンサーが退場処分を受けていた。\n\n「どこで線引きをするかが問題だ」と彼は言った。「答えはない。イエローカードが正しくなければ異議申し立てをするのか？レッドカードではないと思ったら？あるいは誰がそう思うのか？これはどこから始まり、どこで終わるのか？それが私の疑問だ。答えはない。」\n\nUEFAは、大会中に出場停止を事実上取り消すよう介入することは「一線を越えた」と述べた。\n\n今大会でのその他189枚のレッドカードのうち、出場停止が停止されたケースは過去に1度しかなく——", "vocab": [{"word": "suspension", "definition": "出場停止処分や業務停止などの「一時的な資格剥奪」を意味する名詞。スポーツや法律の文脈で頻繁に使われる。"}, {"word": "inadmissible", "definition": "法的・手続き的に「受理不能である」「証拠として認められない」を意味する形容詞。法律や公式手続きの文脈で使われる上級語彙。"}, {"word": "precedent", "definition": "将来の判断や行動の基準となる「先例・前例」を意味する名詞。'set a precedent'（前例を作る）という形でよく用いられる。"}, {"word": "integrity", "definition": "「誠実さ・高潔さ」または組織や制度の「完全性・健全性」を意味する名詞。倫理的・制度的な文脈で多用される重要語。"}, {"word": "autonomy", "definition": "組織や個人が外部の干渉を受けずに自らを統治・管理する「自律性・自治権」を意味する名詞。政治・組織論の文脈で頻出。"}, {"word": "eligibility", "definition": "特定の条件を満たしていることによる「資格・適格性」を意味する名詞。スポーツや法律の文脈で選手や候補者の出場・応募資格を指す。"}, {"word": "confedration", "definition": "共通の目的のために複数の団体や国家が緩やかに結合した「連合・連盟」を意味する名詞。スポーツや政治の組織構造を説明する際に使われる。"}]}, {"title_ja": "迎撃ミサイル不足をウクライナが警告、キーウ地域で23人死亡", "title_en": "Ukraine warns of interceptor missile shortage as 23 killed in Kyiv region", "summary_ja": "ウクライナ空軍は日曜夜にロシアがキーウへ発射した23発の弾道ミサイルを1発も撃墜できなかったと認め、迎撃ミサイルの「深刻な不足」を明らかにした。この攻撃で首都と周辺地域合わせて少なくとも23人が死亡した。ゼレンスキー大統領はアンカラで開催されるNATOサミットを前に、同盟国に対してパトリオットミサイルを含む防空システムの供与を強く訴えた。", "summary_en": "Ukraine's Air Force acknowledged a 'serious shortage' of interceptor missiles after failing to shoot down any of the 23 ballistic missiles fired by Russia at Kyiv on Sunday night, killing at least 23 people across the capital and wider region. President Zelensky appealed to NATO allies to supply more air defense systems, particularly Patriot missiles, ahead of this week's NATO summit in Ankara. The attack involved 68 missiles and 351 drones in total, with Ukrainian forces managing to intercept cruise missiles and drones but remaining powerless against the ballistic missiles.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cewqqnd7zdwo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Ukraine warns of interceptor missile shortage as 23 killed in Kyiv region\n- Published\nThe Ukrainian Air Force says a \"serious shortage\" of interceptor missiles meant none of the 23 ballistic missiles fired by Russia at Kyiv on Sunday night were shot down.\nAt least 15 people were killed in the second large-scale Russian attack on the Ukrainian capital in a week, officials said. Eight more were killed in the wider Kyiv region.\nUkrainian President Volodymyr Zelensky has appealed for allies to take \"strong decisions\" at this week's Nato summit to provide Kyiv with air defences.\nAfter the strikes, he said the Ukrainian military had been successful in intercepting cruise missiles and drones – but not ballistic missiles.\nSunday's \"massive Russian attack\" consisted of 68 missiles and 351 strike drones, he said in a post on X. The air force shot down or suppressed 37 missiles and 326 drones, it said.\nZelensky warned that Moscow would continue to hit residential buildings as long as defensive Patriot missiles \"remain in our allies' stockpiles\".\nIt was another frightening night for people in the capital, with loud explosions and the boom of Ukraine's air defences in action.\nWidespread destruction was visible on Monday morning. Three large blocks of flats in the city have partially collapsed, some were hit directly by missiles.\nHelicopters have been shuttling back and forth in the sky, carrying water from the river to douse fires in the city.\nUkraine's State Emergency Service said 56 people were injured in the capital, including seven children. Forty-eight people were also injured in the wider Kyiv region, authorities added.\nAt the site of one missile strike, in the Podilskyi district of Kyiv, rescue teams have been working in the ruins of an apartment block with a big hole blown through its middle.\nSpecialists have been using sniffer dogs to try to find the missing among the wreckage as cranes lift giant slabs of concrete from collapsed flats, sending bricks crashing to the ground.\nA woman, crying on a bench, was too distraught to talk but a team helping her said two of her relatives were buried in the rubble.\nThe BBC spoke to residents who have lost everything, as they queued to register their loss with the police.\nOne woman, whose flat was on the eighth floor that has now vanished, began to speak only to have to turn away as she sobbed. People here are already drained by four punishing years of this war, and now the aerial attacks are getting worse.\n\"After the first blast, nearby, the glass shattered and hit us, almost on our heads. Then everything was shaking,\" another woman, Olena, said.\nShe admitted she did not go to the bomb shelter when the sirens wailed because she was exhausted and wanted to sleep before work.\n\"I feel like I have calmed down, but I am still trembling all over.\"\nOlena had a question of her own about the fact that Ukraine did not manage to stop a single ballistic missile this time.\n\"The missiles hit our houses, and that's terrible. Really scary. It seems we have nothing to intercept them with. So where are our partners? What's happening? That's my question,\" she said.\nHours before the latest strikes, Zelensky had warned that Moscow was preparing a second \"massive strike\" on Kyiv following its attacks on Thursday that killed 30 people.\nUkraine accused Moscow of deliberately attacking civilian areas in that attack. Russia said it had targeted military and energy bases in retaliation for recent Ukrainian strikes on power stations and energy facilities in Russian territory.\nKyiv has kept up its drone attacks on critical Russian energy facilities, with power being cut off temporarily in the city of Sevastopol in Russian-occupied Crimea.\nThe Ukrainian military said it struck three Russian oil refineries, including the country's largest in Omsk. At more than 2,414 km (1,500 miles) away, it is one of Kyiv's longest-range targets inside Russia.\nRussia's Ministry of Defence said Kyiv had launched 625 long-range strike drones and that its forces had shot down 613 of them.\n- Putin makes rare admission of fuel shortages caused by Ukrainian strikes - Published7 days ago\n \n- Why Ukrainian strikes on annexed Crimea are a blow to Putin - Published13 hours ago\n \nSeveral reports suggest Zelensky will meet US President Donald Trump on the sidelines of the Nato summit, which begins in Ankara in Turkey on Tuesday.\nIn his post on X on Monday, Zelensky said it was \"critically important\" that the US and Ukraine's European partners come to the summit \"with strong decisions in support of our air defense, and thus the protection of ordinary people's lives\".\n\"The United States and Europe have enough power to stop this terror,\" he said.\nPresident of the EU Commission Ursula von der Leyen said Ukraine's \"urgent\" need for more air defence would be discussed at the summit.\nRussia launched its full-scale invasion of Ukraine in February 2022, and currently controls approximately one-fifth of Ukrainian territory.\nRelated topics\n-", "translation_ja": "ウクライナ、迎撃ミサイル不足を警告――キーウ地域で23人死亡\n\nウクライナ空軍は、「深刻な迎撃ミサイル不足」により、日曜夜にロシアがキーウへ向けて発射した23発の弾道ミサイルを1発も撃墜できなかったと発表した。\n\n当局によると、首都への2度目の大規模ロシア攻撃で少なくとも15人が死亡し、さらにキーウ州全体で8人が死亡した。\n\nウクライナのウォロディミル・ゼレンスキー大統領は、今週開催されるNATOサミットにおいて、同盟国が防空システムの供与に向けた「強い決断」を下すよう訴えた。\n\n攻撃後、ゼレンスキー氏はウクライナ軍が巡航ミサイルと無人機の迎撃には成功したが、弾道ミサイルの迎撃には失敗したと述べた。\n\n同氏はX（旧ツイッター）への投稿で、日曜日の「大規模ロシア攻撃」は68発のミサイルと351機の攻撃用ドローンで構成されていたと説明した。空軍は37発のミサイルと326機のドローンを撃墜または無力化したとしている。\n\nゼレンスキー氏は、防衛用パトリオットミサイルが「同盟国の備蓄に残っている限り」、モスクワは住宅地への攻撃を続けるだろうと警告した。\n\n首都では、大きな爆発音やウクライナ防空システムの砲声が響き渡り、市民にとって再び恐怖の夜となった。\n\n月曜朝には広範囲にわたる破壊の様子が明らかになった。市内の3棟の大型集合住宅が一部崩壊し、一部はミサイルの直撃を受けた。\n\nヘリコプターが空を行き来し、川から水を運んで市内で発生した火災の消火活動にあたった。\n\nウクライナ国家緊急事態庁によると、首都では56人が負傷し、うち7人は子どもだった。またキーウ州全体でも48人が負傷したと当局は発表した。\n\nキーウのポジルスキー地区にあるミサイル攻撃現場では、中央部に大きな穴が空いたアパートの廃墟の中で救助隊が活動を続けた。\n\n専門家たちは嗅覚犬を使って瓦礫の中に残された行方不明者を捜索し、クレーンが崩壊したアパートから巨大なコンクリートの塊を持ち上げるたびにレンガが地面へと崩れ落ちた。\n\nベンチで泣き崩れていた女性は、あまりの悲しみに言葉が出ない様子だったが、支援チームによると、彼女の2人の親族が瓦礫の下に埋まっているという。\n\nBBCは、すべてを失った住民たちが警察に被害を届け出るために列を作っている現場で話を聞いた。\n\n今や消え去った8階の部屋に住んでいたある女性は話し始めたものの、すすり泣きのために途中で顔をそらすしかなかった。この地の人々は4年間の過酷な戦争にすでに疲弊しており、さらに空爆は激化している。\n\n「最初の爆発の後、近くのガラスが割れて、ほぼ頭上に降り注いできた。その後はすべてが揺れていた」と別の女性、オレナさんは語った。\n\n彼女は、出勤前に眠りたくて疲れ果てていたため、サイレンが鳴っても防空シェルターに行かなかったと認めた。\n\n「落ち着いたと思うけれど、まだ全身が震えている」\n\nオレナさんは、今回ウクライナが弾道ミサイルを1発も止められなかったという事実についても問いを投げかけた。\n\n「ミサイルが私たちの家を直撃した。それは恐ろしいことです。本当に怖い。迎撃するものが何もないように感じる。では、私たちのパートナーはどこにいるの？何が起きているの？それが私の問いです」と彼女は語った。\n\n最新の攻撃の数時間前、ゼレンスキー氏は、先週木曜日に30人を死亡させた攻撃に続き、モスクワがキーウへの2度目の「大規模攻撃」を準備していると警告していた。\n\nウクライナはモスクワが意図的に民間地域を攻撃したと非難した。これに対してロシアは、ウクライナによるロシア領内の発電所やエネルギー施設への攻撃への報復として、軍事・エネルギー拠点を標的にしたと述べた。\n\nキーウはロシアの重要エネルギー施設へのドローン攻撃を続けており、ロシア占領下のクリミアのセバストポリ市では一時的に停電が発生した。\n\nウクライナ軍は、ロシア最大の石油精製所を含む3つの石油精製所を攻撃したと発表した。最大のものはオムスク市にあり、2,414km（約1,500マイル）以上の距離は、ウクライナによるロシア国内攻撃の中でも最長距離の一つとなる。\n\nロシア国防省は、キーウが625機の長距離攻撃型ドローンを発射し、ロシア軍がそのうち613機を撃墜したと発表した。\n\n複数の報道によると、ゼレンスキー氏は火曜日からトルコのアンカラで始まるNATOサミットの傍らでアメリカのドナルド・トランプ大統領と会談する見通しだ。\n\nゼレンスキー氏は月曜日のX投稿で、米国とウクライナの欧州パートナーがサミットに「防空支援に向けた強い決断、つまり一般市民の命の保護のための決断」を持ち寄ることが「極めて重要だ」と述べた。\n\n「米国と欧州にはこのテロを止める力がある」とも語った。\n\nEU委員会のウルズラ・フォン・デア・ライエン委員長は、ウクライナの防空に関する「緊急」ニーズがサミットで議論されると述べた。\n\nロシアは2022年2月にウクライナへの全面侵攻を開始し、現在ウクライナ領土の約5分の1を支配している。", "vocab": [{"word": "interceptor", "definition": "迎撃機・迎撃ミサイルなど、敵の攻撃を途中で阻止するために使用される兵器や手段を指す軍事用語。「interceptor missile（迎撃ミサイル）」のように使われる。"}, {"word": "ballistic missile", "definition": "弾道ミサイルのこと。発射後に弾道（放物線軌道）を描いて目標に向かう長距離ミサイルを指す軍事・国際安全保障分野の専門用語。"}, {"word": "suppressed", "definition": "ここでは「（ミサイルや脅威を）無力化した・制圧した」という軍事的な意味で使われており、単に「抑制する」という一般的な意味よりも踏み込んだニュアンスを持つ。"}, {"word": "stockpiles", "definition": "大量に蓄えられた物資や備蓄を指す名詞。軍事・政策文脈では武器や弾薬の「備蓄量」を意味することが多い。"}, {"word": "sidelines", "definition": "「on the sidelines of～」で「～の傍ら（周辺）で」という意味の慣用表現。公式の場に関連しながらも非公式または付随的な形で行われる会合を指す。"}, {"word": "annexed", "definition": "「併合された」という意味の形容詞・動詞過去形。国際法上の正当性が認められない形で一方的に他国の領土を自国に編入することを指し、地政学・外交分野で頻出する語。"}, {"word": "distraught", "definition": "深い悲しみや苦しみで正常な判断ができないほど取り乱している様子を表す形容詞。感情的な混乱状態を強調する上級語彙。"}]}, {"title_ja": "チャーリー・カーク殺害容疑者の予備審問に遺族が出廷", "title_en": "Charlie Kirk's Family Attends Preliminary Hearing for Suspect Charged with His Murder", "summary_ja": "保守派活動家チャーリー・カークの遺族が月曜日、殺人罪で起訴されたタイラー・ロビンソン（23歳）の予備審問に出席し、検察側が証拠を提示した。カークは2025年9月10日、ユタバレー大学のキャンパスでの講演中に銃撃され死亡した。ロビンソンはまだ罪状認否を行っておらず、検察側は死刑を求めている。", "summary_en": "The family of conservative activist Charlie Kirk attended a preliminary hearing on Monday where prosecutors presented evidence against Tyler Robinson, 23, charged with his murder. Kirk was fatally shot on September 10, 2025, during a campus tour at Utah Valley University. Prosecutors are seeking the death penalty for Robinson, who has not yet entered a plea.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c1myyyyjvx5o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Charlie Kirk's family attends hearing for suspect charged with his murder\n- Published\nThe family of US conservative activist Charlie Kirk came face-to-face on Monday with his alleged killer as prosecutors laid out their evidence for the murder case against Tyler Robinson, 23, in a preliminary hearing.\nKirk, a key Trump ally and founder of youth organisation Turning Point USA, was fatally shot on 10 September 2025 as he spoke on the campus of Utah Valley University in Orem, Utah, kicking off an intense manhunt.\nAuthorities announced the arrest two days later of Robinson, who has been charged with aggravated murder, felony discharge of a firearm, obstructing justice and witness tampering.\nRobinson has not yet entered a plea. Utah County prosecutors are seeking the death penalty.\nThe family of Kirk, a 31-year-old father of two, released a statement to local media in advance of Monday's proceedings, which are scheduled to last through Friday.\n\"Charlie was a beloved husband, son, brother, friend, and father,\" said Kirk's widow, Erika, his parents, Robert and Kathryn, and sister, Mary. \"Every court proceeding serves as a painful reminder of his death and the loss that has irrevocably impacted our lives and the lives of his children.\"\nKirk's parents and widow arrived at court separately on Monday.\n\"We remain deeply grateful for the support, prayers, and kindness we have received,\" the family statement continued. \"This outpouring has sustained us during the darkest days of our lives.\n\"Out of respect for the judicial process, we will not be commenting further at this time. We ask for continued privacy as we navigate this process and immense grief.\"\nDefense attorneys in previous hearings sought to exclude various evidence and unsuccessfully attempted to ban cameras from the courtroom during the preliminary proceedings that began on Monday. They have also asked Judge Tony Graf to take the death penalty off the table.\nRobinson, wearing a light-coloured suit, sat between his attorneys at the defense table.\nProsecutors said that four law enforcement witnesses were expected to take the stand during the day.\nKirk was addressing a crowd from under a tent on 10 September as part of his American Comeback tour of college campuses, during which he invited attendees to debate him.\nA shot rang out around 12.20pm as he was speaking about gun violence; Kirk slumped over to the side.\nBagley had been stationed on a building above and realised from the noise that it had come from a rifle, not a handgun.\nHe described a chaotic scene of people shouting and running and told the court that he was informed by law enforcement that a shooter had been taken into custody.\nBut he said he discovered suspicious evidence leading him to believe it might not be the right suspect.\nBagley said he found a screwdriver and an impression in gravel on a roof indicative of a sniper and then viewed security footage showing an individual dropping down and escaping from the area.\nHe described a telling impression the suspect had left behind.\n\"I could see the disturbance of gravel; to me, it looks like a sniper pad, a person that has been laying in a prone position, and you've got markings of elbows, knees and feet - where somebody was in the line of sight of where Charlie's tent was.\"\nDefense attorney Kathryn Nestor voiced several objections throughout the prosecution's questioning of Bagley. She would have opportunities to question him and the other officers later in the hearing.\nRelated topics\n- Published26 June", "translation_ja": "チャーリー・カークの家族、殺害容疑者の審問に出席\n\n米国の保守派活動家チャーリー・カークの家族は月曜日、検察官がタイラー・ロビンソン（23歳）に対する殺人事件の証拠を提示する予備審問において、カークの死の容疑者と対面した。\n\nトランプ元大統領の主要な支持者であり、若者向け団体「ターニング・ポイントUSA」の創設者であるカークは、2025年9月10日、ユタ州オレムにあるユタバレー大学のキャンパスで演説中に銃撃され死亡した。この事件は大規模な犯人追跡へと発展した。\n\n当局は2日後、ロビンソンの逮捕を発表した。同容疑者は、加重殺人、銃器の不法発射、司法妨害、証人威迫の罪で起訴されている。\n\nロビンソンはまだ罪状認否を行っていない。ユタ郡検察は死刑を求めている。\n\nカークの家族は、月曜日から金曜日まで行われる予定の審問に先立ち、地元メディアに声明を発表した。カークは31歳で2人の子を持つ父親だった。\n\nカークの未亡人エリカ、両親のロバートとキャスリン、そして妹のメアリーは「チャーリーは愛される夫、息子、兄弟、友人、そして父親でした」と述べた。「法廷での手続きのたびに、彼の死と、私たちや子供たちの人生に取り返しのつかない影響を与えた喪失を痛烈に思い知らされます。」\n\nカークの両親と未亡人は月曜日、別々に法廷に到着した。\n\n「私たちへの支援、祈り、そして温かいお気持ちに深く感謝しています」と家族の声明は続けた。「この支えが、私たちの人生で最も辛い日々を乗り越える力となっています。」\n\n「司法プロセスへの敬意から、現時点ではこれ以上のコメントは控えます。この過程と深い悲しみを乗り越えていく中で、引き続きプライバシーへのご配慮をお願いいたします。」\n\n弁護側は過去の審問において、さまざまな証拠の排除を求め、月曜日から始まった予備審問中の法廷内へのカメラ持ち込み禁止も求めたが、いずれも認められなかった。また、トニー・グラフ裁判官に対し死刑の選択肢を外すよう求めてもいる。\n\nロビンソンは薄い色のスーツを着て、弁護人の間に座った。\n\n検察側によれば、この日は4人の法執行機関の証人が証言台に立つ予定だという。\n\nカークは9月10日、大学キャンパスを巡る「アメリカン・カムバックツアー」の一環として、テント下で聴衆に向けて演説していた。このツアーでは、参加者がカークとの討論に参加できる形式を採っていた。\n\n銃声が響いたのは午後0時20分頃で、カークが銃暴力について話していた最中のことだった。カークはそのまま横に崩れ落ちた。\n\nバグリーは建物の上に配置されており、銃声の音からハンドガンではなくライフルによるものだと判断したと述べた。\n\n彼は人々が叫んだり走ったりする混乱した場面を描写し、法執行機関から射手が拘束されたと知らされたと法廷で証言した。\n\nしかし彼は、その容疑者が正しくない可能性を示唆する不審な証拠を発見したと述べた。\n\nバグリーはある屋根の上でドライバーと砂利に残された痕跡を発見し、それがスナイパーの存在を示すものだと判断した。さらに、個人が飛び降りてその場から逃げる様子を映した防犯カメラの映像を確認した。\n\n容疑者が残した痕跡についてこう説明した。\n\n「砂利が乱れているのが見えました。私にはスナイパーパッドのように見えました——うつ伏せになっていた人物の跡で、肘、膝、足の痕跡があります。チャーリーのテントの方向を向いた射線上に誰かがいたことを示しています。」\n\n弁護人のキャスリン・ネスターは、バグリーへの検察側の尋問を通じていくつかの異議を申し立てた。彼女は後ほどバグリーや他の警察官を尋問する機会が与えられる予定だ。", "vocab": [{"word": "preliminary hearing", "definition": "予備審問。正式な裁判の前に、証拠が十分かどうかを裁判官が判断するための手続き。法律用語として頻出。"}, {"word": "aggravated murder", "definition": "加重殺人。計画性や特定の悪化要因（凶器の使用など）を伴う殺人罪で、通常の殺人よりも重い罪に問われる法律用語。"}, {"word": "irrevocably", "definition": "取り返しのつかない形で、という意味の副詞。変更や回復が不可能な状態を強調する際に使われる高度な語彙。"}, {"word": "prone position", "definition": "うつ伏せの姿勢。軍事・スポーツ・医療の文脈で使われる専門的表現で、特に狙撃手が使う姿勢として言及されることが多い。"}, {"word": "obstructing justice", "definition": "司法妨害。捜査や法的手続きを意図的に妨げる行為を指す法律用語で、刑事罪として重く扱われる。"}, {"word": "outpouring", "definition": "（感情・支援などの）溢れ出ること、殺到すること。多くの人が一斉に感情や支援を示す様子を表す表現。"}, {"word": "sniper", "definition": "狙撃手。遠距離から隠れて標的を狙い撃つ射手のこと。軍事・犯罪報道でよく使われる専門用語。"}]}, {"title_ja": "ヘンダーソン、W杯セレブレーション中に手首を負傷し手術の見込み", "title_en": "Henderson expected to have surgery on injured wrist after World Cup celebration fall", "summary_ja": "イングランドのMFジョーダン・ヘンダーソンは、W杯決勝トーナメント1回戦のメキシコ戦（3対2の勝利）でのゴール後の祝福中に手首を負傷し、手術が必要となる見込みです。36歳のヘンダーソンはアステカ・スタジアムの広告ボードに倒れ込み、担架でピッチを離れました。監督のトーマス・トゥヘルは負傷を「かなり深刻」と表現しており、残りの大会への出場が危ぶまれています。", "summary_en": "England midfielder Jordan Henderson is expected to undergo surgery after injuring his wrist while celebrating England's 3-2 win over Mexico in the World Cup last 16. The 36-year-old fell over advertising hoardings at the Azteca Stadium and was taken to hospital in Mexico City by stretcher. Head coach Thomas Tuchel described the injury as 'quite serious,' and Henderson's participation in the rest of the tournament is now in doubt.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/sport/football/articles/cvgmmm5923yo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Henderson expected to have surgery on injured wrist\n- Published\nEngland midfielder Jordan Henderson is expected to have surgery on the wrist he injured while celebrating his side's last-16 win over Mexico, casting doubt over his participation in the remainder of the World Cup.\nThe 36-year-old appeared to land awkwardly as he fell over the advertising hoardings at the Azteca Stadium and left the pitch on a stretcher.\n\"Jordan [Henderson] just fell over and injured his wrist. It looks really bad,\" England head coach Thomas Tuchel said on BBC One after the 3-2 victory.\n\"It's a quite serious injury and it doesn't fit to the evening that Jordan is now not with us. The doctor told me he is in hospital.\"\nHenderson was accompanied to hospital in Mexico City by a member of England's support staff after the game on Monday and did not travel back with the team to their Kansas City base.\nIt is understood the Brentford midfielder is keen to stay with the squad for the remainder of their time in the United States.\nRelated topics\n- Published13 hours ago\n \n- Published16 hours ago", "translation_ja": "ヘンダーソン、手首の負傷で手術の見込み\n\nイングランドのMFジョーダン・ヘンダーソンは、W杯決勝トーナメント1回戦でメキシコに勝利した際のセレブレーション中に負傷した手首の手術を受ける見込みで、残りの大会への参加が危ぶまれている。\n\n36歳のヘンダーソンは、アステカ・スタジアムの広告ボードに体が乗り上げるような形で倒れ、担架でピッチを後にした。\n\n「ジョーダン（ヘンダーソン）はただ転倒して手首を負傷してしまった。かなり重傷に見える」とイングランド代表ヘッドコーチのトーマス・トゥヘルは3対2の勝利後にBBCワンのインタビューで語った。\n\n「かなり深刻な負傷で、こんな素晴らしい夜にジョーダンがチームにいられないのは残念でならない。医師からは彼が病院にいると聞いている」\n\nヘンダーソンは月曜日の試合後、イングランドのサポートスタッフ1名に付き添われメキシコシティの病院へ向かい、チームとともにカンザスシティの拠点へは戻らなかった。\n\nブレントフォードのMFは、アメリカ滞在中はチームに残りたいという強い意向を示しているとされている。", "vocab": [{"word": "casting doubt", "definition": "「疑問を投げかける、不確かにする」という意味の慣用表現。ある事柄の実現可能性を不確実にする際に使われる。"}, {"word": "advertising hoardings", "definition": "スポーツ競技場などのフィールド沿いに設置された大型広告パネルのこと。主にイギリス英語で使われる専門用語。"}, {"word": "stretcher", "definition": "負傷者を運ぶための担架のこと。スポーツや医療の文脈で用いられる名詞。"}, {"word": "participation", "definition": "「参加、出場」を意味する名詞。公式・フォーマルな文脈でよく使われるTOEIC頻出語。"}, {"word": "support staff", "definition": "チームや組織において主要メンバーを補佐する裏方スタッフの総称。スポーツや企業の文脈でよく使われる表現。"}, {"word": "remainder", "definition": "「残り、残余」を意味する名詞で、ある期間や数量のうち残っている部分を指す。フォーマルな文脈で使われることが多い。"}]}, {"title_ja": "バッキンガム宮殿、ハリー王子の滞在を拒否―双方の主張が真っ向から対立", "title_en": "Buckingham Palace denies Prince Harry accommodation amid conflicting accounts", "summary_ja": "バッキンガム宮殿とハリー王子のチームは、今回の英国訪問中に王子が宮殿に滞在するよう招待されたかどうかについて、互いに矛盾する声明を発表した。宮殿側はハリー王子のチームが期限内に招待を確認しなかったと主張する一方、王子の広報担当者は正式に受諾した招待が「土壇場で撤回された」と述べた。この対立は両陣営の深い不信感を浮き彫りにしており、チャールズ国王との面会をさらに困難にする可能性がある。", "summary_en": "Buckingham Palace and Prince Harry's team have issued contradictory statements over whether the Duke of Sussex was offered and accepted accommodation at the palace during his UK visit. The Palace claims Harry's team failed to confirm the offer in time, while Harry's spokesman says an accepted invitation was 'withdrawn' at the last moment. The dispute highlights deep distrust between the two camps and may complicate a potential meeting with King Charles.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c77yykl87yno?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Buckingham Palace says Prince Harry will not stay at palace\n- Published\nBuckingham Palace says the Duke of Sussex will not be staying at the palace during his visit to London this week, despite his team announcing he had accepted an invitation to do so.\nRoyal sources said the duke had not responded in time to the offer of accommodation at a royal residence, adding he had been informed on Saturday evening that he would not be able to stay there.\nA spokesperson for Prince Harry said despite their earlier statement they understood that the offer to stay at the palace had been \"withdrawn\" - a decision they described as \"disappointing\".\nIt is a chaotic start to a week in which the duke, who arrived in the UK on Monday, according to his spokesman, is to support his charities.\nIn Buckingham Palace's version of events, there was an offer of accommodation for Prince Harry, but the Sussex team had failed to confirm whether it would accept and had then formally declined the invitation on Saturday.\nAccording to Buckingham Palace, the duke's team had later that same day changed their position and had accepted the offer to stay - but by then it was too late to make arrangements and to provide staffing.\nThe palace said Prince Harry was told on Saturday evening that he could not stay and that he was aware of the decision.\nThere were also concerns from the Palace about the duke staying when a court result about his claims against Associated Newspapers was being published on Tuesday.\nThere were worries about the optics for King Charles, who has a position of neutrality, if Prince Harry delivered a controversial response to the high-profile court case while staying at the symbolic HQ of the monarchy.\nIn response, a spokesman for the Duke of Sussex described the situation differently, claiming Buckingham Palace had withdrawn an offer that had been formally accepted.\nIt appears this was only about a stay of one night - and the question was raised as to whether the Palace could not accommodate one person for one night?\nThe Sussex version of events said that the timing of the court case result was already known last week and rejected it as being a factor.\n\"It is therefore unclear why, having formally accepted the accommodation offer, it has now been withdrawn at the last moment,\" said the spokesman for the Duke of Sussex.\nThis acrimonious war of words is a row that shows how much distrust and poor communication exists between the two camps - the Sussex team and Buckingham Palace.\nBoth sides are putting out contradictory versions of the invitation to stay at the palace - with no sign of either side accepting the other's account.\nThis could make a meeting between the King and Prince Harry, which had been expected this week, even more complicated.\nPrince Harry is still set to carry out his engagements this week, starting with an event in London on Tuesday.\nPrince Harry's trip: How the briefings have changed so far\n27 June: The Duke and Duchess of Sussex and their children planned to come to the UK, and expected to stay in a royal residence\n28 June: Because of security fears, Prince Harry reconsidered plans to bring his family\n29 June: Prince Harry still hoped security problems could be overcome to bring Meghan and children\n2 July: Court sources said that the result of Prince Harry's case against Associated Newspapers will be 7 July, the first day of the visit\n4 July: Meghan and children will not come to the start of the trip to the UK in London, but might come to latter part of the week\nPrince Harry is said to have initially rejected and then accepted accommodation at Buckingham Palace. The Palace said he had been told it was too late and could not stay\n6 July: The Sussexes' team said Prince Harry had accepted an invitation to stay at Buckingham Palace. Buckingham Palace rejected this and said he had already been informed that it wasn't possible to stay\n7 July: Prince Harry's engagements due to start in London\nPrince Harry has travelled to the UK to promote the Invictus Games, which will be held in Birmingham next year, and charity events.\nIt was already understood that the prince would not be accompanied by his wife Meghan and their two children, Prince Archie and Princess Lilibet, during the visit to London, after it was confirmed that the family would not be provided with taxpayer-funded police security.\nBut it is possible that they may join Prince Harry in Birmingham to promote the Invictus Games later in the week.\nIt is unclear whether a meeting between King Charles and his two grandchildren, aged seven and five - whom he has not seen in person for four years - will take place under the revised schedule.\nDuring his visit to Birmingham, Prince Harry is expected to visit the city's children's hospital and Birmingham's National Exhibition Centre, which will be hosting the Invictus Games - held for injured military personnel.\nThere had been reports that the latter part of the trip would also include a visit to Althorp in Northampto", "translation_ja": "バッキンガム宮殿、ハリー王子の宮殿滞在はないと発表\n\nバッキンガム宮殿は、サセックス公爵が今週のロンドン訪問中に宮殿に滞在しないと発表した。これは、王子のチームが招待を受け入れたと発表したにもかかわらずの決定である。\n\n王室関係者によると、公爵は王室の宮殿に滞在するという申し出に対して適切な時間内に返答しなかったという。また、土曜日の夜に宮殿への滞在は不可能だと通知されたとしている。\n\nハリー王子の広報担当者は、以前の声明にもかかわらず、宮殿への滞在の申し出が「撤回」されたと理解しており、その決定を「失望的だ」と表現した。\n\nこれは、広報担当者によれば月曜日に英国に到着した公爵が慈善活動を支援する予定の今週にとって、混乱した幕開けとなった。\n\nバッキンガム宮殿の説明によれば、ハリー王子への宿泊の申し出はあったものの、サセックスのチームがそれを受け入れるかどうかの確認を怠り、その後土曜日に正式に招待を断った。\n\nバッキンガム宮殿によると、公爵のチームは同じ日の後になって立場を変え、滞在の申し出を受け入れたとしているが、その時点ではすでに手配やスタッフの準備をするには遅すぎたという。\n\n宮殿側はハリー王子に土曜日の夜に滞在できないことを告げており、王子もその決定を知っていたとしている。\n\nまた、宮殿側は、アソシエイテッド・ニュースペーパーズに対するハリー王子の訴訟の判決が火曜日に下される中、公爵が宮殿に滞在することへの懸念もあった。\n\n中立の立場にあるチャールズ国王が、ハリー王子が君主制の象徴的な本部に滞在しながら注目度の高い裁判に対して物議を醸す反応を示した場合の外見的問題が懸念されていた。\n\nこれに対して、サセックス公爵の広報担当者は状況を異なる形で説明し、バッキンガム宮殿が正式に受諾された申し出を撤回したと主張した。\n\nこれはわずか一泊の滞在についてのことであったとみられ、なぜ宮殿が一人の人物を一晩泊めることができないのかという疑問も提起された。\n\nサセックス側の説明では、裁判結果のタイミングはすでに先週から分かっていたとして、それが要因であることを否定した。\n\n「したがって、宿泊の申し出を正式に受け入れた後に、なぜ土壇場になってそれが撤回されたのか不明です」とサセックス公爵の広報担当者は述べた。\n\nこの険悪な非難合戦は、サセックスのチームとバッキンガム宮殿という二つの陣営の間に、いかに深い不信感と不十分なコミュニケーションが存在するかを示す争いである。\n\n双方は宮殿への滞在招待について矛盾した説明を出しており、どちらかが相手の説明を受け入れる兆候は見られない。\n\nこのことは、今週行われると予想されていた国王とハリー王子の面会をさらに複雑にする可能性がある。\n\nハリー王子は今週のスケジュールを予定通り実施する予定で、火曜日にロンドンでのイベントから始まる。\n\nハリー王子の訪英：これまでのブリーフィングの変遷\n\n6月27日：サセックス公爵夫妻と子供たちが英国に来る計画を立て、王室の宮殿に滞在する予定だった\n6月28日：警備上の懸念から、ハリー王子は家族を連れてくる計画を再考した\n6月29日：ハリー王子はまだメーガンと子供たちを連れてくるために警備問題を解決できると期待していた\n7月2日：裁判所の関係者が、アソシエイテッド・ニュースペーパーズに対するハリー王子の訴訟の結果が訪問初日の7月7日に出ることを明らかにした\n7月4日：メーガンと子供たちはロンドンでの英国滞在の最初の部分には来ないが、週の後半に来る可能性がある\nハリー王子は最初バッキンガム宮殿での宿泊を断り、その後受け入れたとされている。宮殿側は、すでに滞在は不可能だと伝えていたと述べた\n7月6日：サセックスのチームはハリー王子がバッキンガム宮殿への滞在招待を受け入れたと発表。バッキンガム宮殿はこれを否定し、すでに滞在は不可能だと通知していたと述べた\n7月7日：ハリー王子のロンドンでのスケジュールが始まる予定\n\nハリー王子は、来年バーミンガムで開催されるインヴィクタス・ゲームズのプロモーションと慈善イベントのために英国を訪問した。\n\n王子がメーガン妃と二人の子供、アーチー王子とリリベット王女を伴わないことは、家族に対して税金による警察の警備が提供されないことが確認された後、すでに分かっていた。\n\nしかし、週の後半にバーミンガムでのインヴィクタス・ゲームズのプロモーションのためにメーガン妃らが合流する可能性はある。\n\nチャールズ国王と、4年間直接会っていない7歳と5歳の二人の孫との面会が、変更されたスケジュールの下で実現するかどうかは不明だ。\n\nバーミンガム訪問中、ハリー王子はバーミンガム市内の小児病院と、負傷した軍人のために開催されるインヴィクタス・ゲームズの会場となるバーミンガム国立展示センターを訪問する予定だ。\n\nまた、今回の訪問の後半にはノーサンプトンのアルソープへの訪問も含まれるとの報道があった。", "vocab": [{"word": "acrimonious", "definition": "「激しい怒りや憎しみを伴う」という意味の形容詞。特に言い争いや議論が険悪で苦々しい状況を指す際に使われる。"}, {"word": "optics", "definition": "政治・社会的文脈で「ある行動や状況が外部からどのように見えるか、世間への印象」を指す比喩的な表現。「外見上の問題」とも訳される。"}, {"word": "neutrality", "definition": "「中立性」を意味する名詞で、特定の側に肩入れせず公平な立場を保つことを指す。政治的・外交的文脈でよく使われる。"}, {"word": "contradictory", "definition": "「矛盾している、相反する」という意味の形容詞。二つの主張や事実が互いに一致しない、または打ち消し合う状況を表す。"}, {"word": "chaotic", "definition": "「混乱した、無秩序な」という意味の形容詞。物事が整然と進まず、大混乱の状態にあることを表す。"}, {"word": "accommodate", "definition": "「収容する、宿泊させる」という意味の動詞。ここでは人を泊める・住まわせるという意味で使われており、ビジネスや公式の文脈でも広く用いられる。"}, {"word": "acrimonious", "definition": "「険悪な、辛辣な」を意味し、感情的な対立や敵意を含んだやり取りを描写する際に使用される上級語彙。"}]}, {"title_ja": "ピザ・エクスプレス、アンドリュー王子のウォーキング来店主張を内部調査していた", "title_en": "Pizza Express conducted internal inquiry into Prince Andrew's Woking alibi claim", "summary_ja": "ピザ・エクスプレスは2019年、アンドリュー王子が2001年3月10日にサリー州ウォーキングの店舗を訪れたかどうかについて内部調査を実施したことが、BBCニュースナイトの取材で明らかになった。調査の結果、来店を裏付ける証拠も否定する証拠も見つからなかった。ロンドン警視庁はその日に王室護衛官が同行していたかどうかの確認を「国家安全保障」を理由に拒否した。", "summary_en": "Pizza Express launched an internal investigation in 2019 into whether Prince Andrew had visited its Woking branch on 10 March 2001, the day Virginia Giuffre alleged he had sex with her. The inquiry found no evidence either confirming or denying his presence, and BBC Newsnight's own research also uncovered no witnesses. The Metropolitan Police refused to confirm whether royal protection officers accompanied Andrew that day, citing national security.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c1my27lyjx9o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "経済", "full_text": "Pizza Express held inquiry into Andrew's Woking claim\n- Published\nPizza Express held an internal inquiry into whether Andrew Mountbatten-Windsor had visited its restaurant in Woking, BBC Newsnight has learned.\nThe former prince claimed in his infamous 2019 Newsnight interview that he had been at the branch in Surrey on the day he was alleged to have slept with Virginia Giuffre, one of late sex offender Jeffrey Epstein's victims.\nBBC Newsnight has now discovered the pizza chain investigated the claim and found no evidence that he had, or had not, been there. Our research has also found no record of anyone seeing him there on the night in 2001.\nMountbatten-Windsor did not respond to a request for comment but he has strenuously denied any wrongdoing.\nNewsnight has revisited the 2019 interview in light of the Epstein files, and Mountbatten-Windsor's arrest in February on suspicion of misconduct in public office by Thames Valley Police. He was subsequently released under investigation.\nGiuffre alleged she was forced to have sex with Mountbatten-Windsor three times, including when she was aged 17.\nOne of these was alleged to have taken place on 10 March 2001, when Giuffre said she had dined with him, danced with him at a nightclub and gone on to have sex with him at the house of Ghislaine Maxwell, a friend of the then-prince, in Belgravia, central London.\nIn his Newsnight interview, Mountbatten-Windsor said he had instead taken his daughter Princess Beatrice to a party at a Pizza Express in Woking at \"4pm or 5pm in the afternoon\" on that day before spending the night at home.\nThe vast majority of the interview was broadcast, but a small amount of material was not included because of time constraints.\nThis included Mountbatten-Windsor talking in more detail about Pizza Express, including a claim that his staff had looked at a diary to find out more information.\n\"I'd taken Beatrice to a Pizza Express in Woking,\" he said in the interview.\n\"This has all been worked out by my staff, who've looked at the diary and everything else.\n\"The duchess [Sarah Ferguson] was away, I think, United States somewhere. And we had a very simple rule: at that stage, the children had one or other of us for all, most of the, well, as often as we could manage.\n\"So if one of us was out, the other one was in. And then occasionally they would have both of us and on this particular occasion, she was away and I was at home.\"\nMountbatten-Windsor's mention of Pizza Express in the interview made headlines worldwide in 2019, with some newspapers labelling it an \"alibi\".\nPizza Express searched for records of visit\nNewsnight has now been told that in 2019, the senior management team of Pizza Express looked into the plausibility of Mountbatten-Windsor's claim because they believed it was a matter of public interest.\nBosses held an internal inquiry that involved looking for records from that time period, none of which could be found, and trying to talk to past members of staff and local management.\nThe manager of the Woking branch in 2001 had since left the business so could not be spoken to, it is understood.\nFollowing its internal inquiry, the chain concluded it had found no evidence to suggest Mountbatten-Windsor had visited and was telling the truth, and nothing to suggest he was not.\nNewsnight has made extensive inquiries to see if there is any record of a customer or staff member having seen him at the Pizza Express restaurant, but has found no evidence of him being there.\nCalls for Met transparency\nOne of the routes we tried was submitting a Freedom of Information request to the Metropolitan Police, asking if any royal protection officers accompanied the former prince to the Woking branch 25 years ago.\nIn response, the force said it could \"neither confirm nor deny\" whether it holds this information, citing \"national security\" among other reasons.\n\"Confirming or denying that information is held would reveal whether protection had been afforded to a specific individual other than the King and the prime minister,\" the Met said in reply to us.\nThis is despite Scotland Yard previously referring to Mountbatten-Windsor's close protection officers, including in a press statement issued in February.\nThe Met's response has drawn criticism from Liberal Democrat leader Sir Ed Davey.\n\"Of course the police are rightly very careful about giving any information about who they give special protection to,\" he told the BBC.\n\"I completely understand that and it's right. But too often we see these types of 'neither confirm nor deny' answers where there really isn't a legitimate security reason – and I think that's what's happening here.\"\nHe called for an \"exception\" to be made by the force to reveal the information.\n\"I really can't see how revealing that Andrew had police protection 25 years ago would play into the hands of terrorists as the Met claims,\" he added.\nGiuffre died by suicide in April 2025 aged 41.\nMountbatten-Windsor's military titles and royal patronag", "translation_ja": "ピザ・エクスプレス、アンドリューのウォーキング来店主張を調査\n\nBBCニュースナイトが入手した情報によると、ピザ・エクスプレスは、アンドリュー・マウントバッテン＝ウィンザーが同社のウォーキング店を訪問したかどうかについて、内部調査を実施していたことが明らかになった。\n\n元王子は、2019年の悪名高いニュースナイトのインタビューにおいて、故性犯罪者ジェフリー・エプスタインの被害者の一人であるバージニア・ジュフリーと性行為に及んだと申し立てられた日、サリー州のその支店にいたと主張していた。\n\nBBCニュースナイトは今回、このピザチェーンが主張の信憑性を調査し、彼が来店した証拠も来店しなかった証拠も見つけられなかったことを突き止めた。また、本紙の調査でも、2001年のその夜に彼をそこで目撃した人物の記録は一切見つかっていない。\n\nマウントバッテン＝ウィンザーはコメントの求めに応じなかったが、いかなる不正行為も断固として否定している。\n\nニュースナイトは、エプスタイン関連ファイルの公開と、テムズバレー警察による公務上の非行の容疑でのマウントバッテン＝ウィンザーの2月の逮捕を受けて、2019年のインタビューを再検証した。彼はその後、捜査中として釈放されている。\n\nジュフリーは、マウントバッテン＝ウィンザーから3度にわたって性的関係を強要されたと主張しており、そのうちの1回は彼女が17歳のときだったとしている。\n\nそのうちの1回は2001年3月10日とされており、ジュフリーは当日、彼と食事をし、ナイトクラブでダンスをし、当時の王子の友人であるギスレーン・マクスウェルのロンドン中心部ベルグレイヴィアの自宅で性行為に及んだと述べている。\n\nニュースナイトのインタビューの中でマウントバッテン＝ウィンザーは、その日の「午後4時か5時ごろ」に娘のプリンセス・ビアトリスをウォーキングのピザ・エクスプレスのパーティーに連れて行き、その後は自宅で夜を過ごしたと述べた。\n\nインタビューのほぼ全体が放送されたが、時間の制約から一部の内容は放送されなかった。\n\nその中には、マウントバッテン＝ウィンザーがピザ・エクスプレスについてより詳しく語った部分が含まれており、スタッフが日記を調べてより多くの情報を確認したという主張も含まれていた。\n\n「私はビアトリスをウォーキングのピザ・エクスプレスに連れて行きました」と彼はインタビューで語った。\n\n「これはすべて私のスタッフが日記などを調べて確認したことです。\n\n「ダッチェス（サラ・ファーガソン）はその時、確かアメリカに出かけていたと思います。そして私たちには一つの決まりがありました。当時、子どもたちには親のどちらかが常に付き添うようにしていました。できる限りそうしていました。\n\n「つまり一方が外出していれば、もう一方が家にいる。ときには二人とも揃っていることもありましたが、この日は彼女が不在で、私が自宅にいました」\n\nインタビューでのピザ・エクスプレスへの言及は2019年に世界中で報道され、一部の新聞はそれを「アリバイ」と呼んだ。\n\nピザ・エクスプレスが来店記録を調査\n\nニュースナイトが入手した情報によると、2019年にピザ・エクスプレスの上級管理チームは、マウントバッテン＝ウィンザーの主張の信憑性を公共の関心事として調査した。\n\n経営幹部は内部調査を行い、該当期間の記録を探したが何も見つからず、かつての従業員や地元の管理職への聞き取りも試みた。\n\n2001年当時のウォーキング店のマネージャーはすでに退職していたため、話を聞くことはできなかったとされている。\n\n内部調査の結果、同社はマウントバッテン＝ウィンザーが来店したことを示す証拠も、来店していないことを示す証拠も見つからなかったと結論づけた。\n\nニュースナイトもウォーキングのピザ・エクスプレスで彼を目撃した客や従業員の記録を探すために広範な調査を行ったが、彼がそこにいた証拠は何も発見できなかった。\n\nメトロポリタン警察の透明性を求める声\n\n本紙が試みた手段の一つとして、ロンドン警視庁（メトロポリタン警察）に情報公開請求を提出し、25年前に王室護衛官が元王子をウォーキングの支店に同行させたかどうかを尋ねた。\n\nこれに対し、警察はこの情報を保有しているかどうかについて「確認も否定もできない」と回答し、「国家安全保障」などをその理由として挙げた。\n\n「確認または否定することにより、国王および首相以外の特定の個人に護衛が提供されたかどうかが明らかになってしまう」と警察は回答の中で述べた。\n\nこれは、スコットランドヤード（ロンドン警視庁本部）が以前にマウントバッテン＝ウィンザーの近接警護担当官に言及していたこと——2月に発表されたプレスリリースを含む——とは矛盾するものだ。\n\n警察の回答は自由民主党のエド・デイビー党首から批判を受けている。\n\n「警察が特別な保護を提供する相手に関する情報の開示に慎重であることは当然のことです」と彼はBBCに語った。\n\n「それは完全に理解できますし、正しいことだと思います。しかし、こういった『確認も否定もできない』という回答が、正当な安全保障上の理由がないにもかかわらず使われるケースがあまりにも多い——そして今回まさにそれが起きていると思います」\n\n彼は警察がこの情報を開示するための「例外」を設けるよう求めた。\n\n「メトが主張するように、アンドリューが25年前に警察の護衛を受けていたことを明らかにすることが、どのようにテロリストの利益になるのか、私にはまったく理解できません」と彼は付け加えた。\n\nジュフリーは2025年4月、41歳で自ら命を絶った。\n\nマウントバッテン＝ウィンザーの軍の称号および王室の後援資格は（記事はここで途切れている）。", "vocab": [{"word": "plausibility", "definition": "もっともらしさ、信憑性。ある主張や説明がどの程度信じられるかを指す名詞。「the plausibility of a claim（主張の信憑性）」のように使われる。"}, {"word": "strenuously", "definition": "断固として、精力的に。特に否定や抗議を強く行う際に用いる副詞。「strenuously denied（断固として否定した）」という形でよく使われる。"}, {"word": "patronage", "definition": "後援、支援。特に王室や権威ある人物が公式に組織や活動を支持・後援することを指す名詞。「royal patronage（王室の後援）」という形でよく使われる。"}, {"word": "misconduct", "definition": "非行、不正行為、職権濫用。特に公務員や専門職による不適切な行為を指す名詞。「misconduct in public office（公務上の非行）」という法律用語として使われる。"}, {"word": "alibi", "definition": "アリバイ、不在証明。犯罪や問題の発生時に別の場所にいたことを証明するための証拠や主張を指す名詞。法律・犯罪報道で頻繁に使われる。"}, {"word": "transparency", "definition": "透明性。組織や政府などが情報を公開し、行動を隠さないことを指す名詞。特に行政や報道の文脈でよく使われる。"}, {"word": "corroborate", "definition": "（証拠・証言などを）裏付ける、確証する。ある主張や事実を別の証拠によって支持・確認することを意味する動詞で、法律・ジャーナリズムの文脈で頻出する。"}]}, {"title_ja": "マクロン仏大統領、アサド政権崩壊から18か月後にシリアを訪問", "title_en": "Macron visits Syria 18 months after Assad's fall, first Western European leader to do so", "summary_ja": "フランスのエマニュエル・マクロン大統領は2026年7月6日にダマスカスに到着し、2024年12月に新政権が発足して以来、シリアを訪問した西欧の国家元首として初めての事例となった。マクロン大統領はシリアのアフメド・アル・シャラア大統領と会談し、主権ある統一シリアへのフランスの関与を誓約した。今回の訪問では、復興投資、少数民族の保護、イスラム国との戦いが主要議題となっている。", "summary_en": "French President Emmanuel Macron arrived in Damascus on July 6, 2026, becoming the first Western European head of state to visit Syria since the new authorities took power in December 2024. Macron met with Syrian President Ahmed al-Sharaa and pledged France's commitment to a sovereign, united Syria. The visit focuses on reconstruction investment, minority protections, and the fight against Islamic State militants.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/emmanuel-macron-visits-syria-18-months-after-assad-s-fall/a-77856791?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Emmanuel Macron visits Syria, 18 months after Assad's fall\nJuly 6, 2026French President Emmanuel Macron arrived in Damascus on Monday evening for the first visit by a Western European head of state since Syria's new authorities took power in December 2024.\nSyrian Foreign Minister Asaad al-Shaibani welcomed the French leader and his Foreign Minister Jean-Noel Barrot at the airport.\n\"I have come to express France's commitment to the Syrian people. For a sovereign Syria, united in its diversity and at peace with its neighbors,\" Macron wrote online soon after arrival.\n\"Together, let us open a new chapter of stability and peace.\"\nEuropean Commission President Ursula von der Leyen visited Damascus earlier in the year, as did Ukrainian President Volodymyr Zelenskyy.\nSyria hails 'pivotal' visit\nPresident Ahmed al-Sharaa has been trying to reboot Syria's international credentials and revive ties with other countries since the militias under his control seized power from former dictator Bashar Assad after more than a decade of civil war.\nSyrian state news agency SANA described Macron's visit as \"a pivotal step in the process of restoring Syria's international presence.\"\nIn May of 2025, Macron had hosted al-Sharaa on his first official visit to an EU country, a move that preceded the Syrian leader's visits to Berlin to meet Chancellor Friedrich Merz and to Washington for talks with Donald Trump's administration.\nGiven that al-Sharaa was once subject to extensive sanctions as the founder and leader of the terrorist group known as the al-Nusra Front, it was anything but certain whether western powers would welcome his rapid rise to the presidency. Macron was a leading voice in calling for these sanctions to be lifted as part of a bid to turn a new page.\nNo French president had visited Syria since Nicolas Sarkozy in 2009, not long before Assad's regime intensified a brutal crackdown on opposition protests that ultimately led to more than a decade of civil war across multiple fronts.\nAlthough drastically improved, the security situation in Syria remains tense more than 18 months after Assad's fall.\nA bomb blast at a Damascus cafe last week killed 10 people, various attacks on religious minorities in the country have been blamed on so-called Islamic State militants, and the government's forces retain a difficult relationship with Kurdish forces based in the north and east, with whom they were in open combat as recently as January.\nMacron calls for 'free, pluralist Syria'\nThe French presidency told journalists ahead of the trip that Macron would advocate for \"a free, pluralist Syria that respects each of its components.\"\nSeveral key business players like Rodolphe Saade, chief executive of maritime transport giant CMA CGM, and TotalEnergies boss Patrick Pouyanne are accompanying the president.\nReconstruction efforts and investment security is likely to feature in the talks, with French business still reportedly wary of returning to the former warzone.\nMacron's program listed plans for \"informal\" talks with al-Sharaa ahead of official meetings on Tuesday.\nAfter sectarian bloodshed targeting Alawite and Druze heartlands last year, and the battle for control of partly Kurdish areas near the Turkish and Iraqi borders, Macron is expected to press the former Sunni militia group leader al-Sharaa on his pledges to protect minorities in Syria after taking power.\nThe fight against the Islamic State and the ongoing presence of a handful of French jihadis on Syria soil are also likely to feature. Al-Sharaa's Syria joined the international anti-IS coalition last year.\nThe Elysee Palace also said on Monday that, now that the civil war had ended, Macron would be returning 23 archaeological artefacts from the Mesopotamian, Canaanite, Nabataean, Palmyrene, Roman, Byzantine and Umayyad civilizations, which \"were loaned to the Arab World Institute [in Paris] in 2010 and which, for obvious reasons, were not able to be returned to Syria.\"\nAl-Sharaa, whose main backer during the internal conflict was neighboring Turkey, is also expected at this week's NATO summit in Ankara. The White House has said US President Donald Trump will speak to him on the sidelines of the event.\nEdited by: Zac Crellin\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google by clicking here and hitting the \"star\" or \"preferred\" button, so you'll always see our verified news first.", "translation_ja": "マクロン仏大統領、アサド政権崩壊から18か月後にシリアを訪問\n\n2026年7月6日――フランスのエマニュエル・マクロン大統領は月曜日の夜にダマスカスに到着した。これは、2024年12月にシリアの新政権が権力を握って以来、西欧の国家元首による初めての訪問である。\n\nシリアのアサアド・アル・シャイバニ外相は、フランスのジャン＝ノエル・バロ外相とともにマクロン大統領を空港で出迎えた。\n\n「私はフランスのシリア国民への関与を表明するために来た。多様性の中で統一された、近隣諸国と平和な主権あるシリアのために」とマクロン大統領は到着直後にオンラインに投稿した。\n\n「ともに、安定と平和の新たな章を開こう。」\n\n欧州委員会のウルズラ・フォン・デア・ライエン委員長は年初にダマスカスを訪問しており、ウクライナのウォロディミル・ゼレンスキー大統領も同様に訪問している。\n\nシリア、「重要な」訪問を称賛\n\nアフメド・アル・シャラア大統領は、10年以上に及ぶ内戦の末に彼の指揮下の民兵組織が元独裁者バシャール・アサドから権力を奪取して以来、シリアの国際的な信頼性を再構築し、他国との関係を復活させようと努めてきた。\n\nシリア国営通信SANAは、マクロン大統領の訪問を「シリアの国際的プレゼンス回復のプロセスにおける重要な一歩」と評した。\n\n2025年5月、マクロン大統領はアル・シャラア大統領をEU加盟国への初の公式訪問として迎え入れた。この動きは、シリア指導者がフリードリヒ・メルツ首相との会談のためにベルリンを、そしてドナルド・トランプ政権との協議のためにワシントンを訪問する先駆けとなった。\n\nアル・シャラア大統領はかつて、テロ組織として知られるアル・ヌスラ戦線の創設者兼指導者として広範な制裁の対象となっていたことから、西側諸国が彼の急速な大統領就任を歓迎するかどうかは決して確実ではなかった。マクロン大統領は、新たなページを開く取り組みの一環としてこれらの制裁解除を求める声を主導した。\n\nフランスの大統領がシリアを訪問したのは、アサド政権が最終的に10年以上にわたる複数の前線での内戦につながる反政府デモへの残虐な弾圧を強化する少し前の2009年、ニコラ・サルコジ以来のことである。\n\n大幅に改善されたとはいえ、アサド政権崩壊から18か月以上が経過したシリアの安全保障状況は依然として緊張をはらんでいる。\n\n先週、ダマスカスのカフェでの爆発により10人が死亡し、国内の宗教的少数派に対するさまざまな攻撃はいわゆるイスラム国（IS）の戦闘員によるものとされており、政府軍は北部・東部を拠点とするクルド人勢力との難しい関係を抱え、1月にも実際に交戦状態にあった。\n\nマクロン大統領、「自由で多元的なシリア」を求める\n\nフランス大統領府は訪問前に記者団に対し、マクロン大統領が「それぞれの構成要素を尊重する自由で多元的なシリア」を主張すると伝えた。\n\n海運大手CMA CGMのロドルフ・サアデ最高経営責任者やトタルエナジーズのパトリック・プヤンヌ社長など、複数の主要ビジネス関係者が大統領に同行している。\n\n復興努力と投資の安全保障が会談の主要テーマになる見込みであり、フランスのビジネス界はかつての戦場への復帰にいまだ慎重だと伝えられている。\n\nマクロン大統領の日程には、火曜日の公式会議に先立ち、アル・シャラア大統領との「非公式」会談の計画が含まれている。\n\n昨年のアラウィー派やドゥルーズ派の地域を標的とした宗派間の流血、そしてトルコおよびイラク国境付近の一部クルド人地域の支配をめぐる戦闘の後、マクロン大統領は元スンニ派民兵集団指導者のアル・シャラア大統領に対し、権力掌握後の少数民族保護の公約について迫ることが期待されている。\n\nイスラム国との戦いと、シリア領内に残存する少数のフランス人ジハーディストの問題も議題に上る可能性が高い。アル・シャラア大統領のシリアは昨年、国際的な対IS連合に加盟した。\n\nエリゼ宮はまた月曜日、内戦が終結した今、マクロン大統領がメソポタミア、カナン、ナバテア、パルミラ、ローマ、ビザンティン、ウマイヤ朝の各文明に属する23点の考古学的遺物を返還すると発表した。これらは「2010年にパリのアラブ世界研究所に貸与されたが、明らかな理由からシリアに返還できなかった」ものである。\n\n内戦中の主要な後ろ盾が隣国トルコであったアル・シャラア大統領は、今週アンカラで開催されるNATOサミットにも出席する見込みである。ホワイトハウスは、ドナルド・トランプ米大統領がこのイベントの傍らで同大統領と会談すると述べている。\n\n編集：ザック・クレリン", "vocab": [{"word": "pluralist", "definition": "多元的な、複数の異なる集団や価値観が共存することを認める様子を表す形容詞。政治や社会の文脈で「多様性を尊重する」という意味でよく用いられる。"}, {"word": "pivotal", "definition": "極めて重要な、決定的な転換点となるという意味の形容詞。「a pivotal moment（重大な転換点）」のように、歴史的・戦略的に重要な局面を表す際に使われる。"}, {"word": "sectarian", "definition": "宗派的な、特定の宗教的・民族的派閥に関連するという意味の形容詞。「sectarian violence（宗派間の暴力）」のように、対立や紛争の文脈で頻繁に使用される。"}, {"word": "artefacts", "definition": "人工遺物、特に歴史的・考古学的価値を持つ人間が作った物品を指す名詞（英国式綴り）。「archaeological artefacts（考古学的遺物）」として文化財の文脈でよく用いられる。"}, {"word": "reboot", "definition": "元来はコンピュータの再起動を意味するが、比喩的に「（関係や組織を）刷新・再出発させる」という意味で使われるインフォーマルな動詞。"}, {"word": "sidelines", "definition": "外交・ビジネスの文脈では「（主要な公式行事の）傍ら、合間」を意味する名詞。「on the sidelines of the summit（サミットの傍らで）」のように、非公式な接触の機会を指す際に用いられる。"}, {"word": "credentials", "definition": "資格、信任状、または信頼性・正統性を示す実績や評判を意味する名詞。「international credentials（国際的な信頼性）」のように、外交や専門分野での認知度を表す際に使われる。"}]}, {"title_ja": "セネガル憲法改正をめぐる権力闘争：議会が可決も大統領が国民投票を宣言", "title_en": "Senegal's Constitutional Crisis: Parliament Passes Reform as President Calls Referendum", "summary_ja": "セネガル議会は、大統領権限を縮小する物議を醸す憲法改正案を可決したが、野党のボイコットや暴力的な抗議の中での採決となった。ファイ大統領は法案への署名を拒否し、時期を明示しないまま国民投票の実施を発表した。かつての盟友であるファイ大統領とソンコ国会議長の対立激化は、同国の政治的安定を脅かしている。", "summary_en": "Senegal's parliament passed a controversial constitutional reform backed by parliamentary speaker Ousmane Sonko that would curtail presidential powers, amid violent protests and an opposition boycott. President Bassirou Diomaye Faye refused to sign the bill and announced a referendum instead, without specifying a date. The escalating power struggle between former allies Faye and Sonko threatens governmental stability in the West African nation.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/senegal-s-power-struggle-referendum-to-decide-on-constitutional-reform/a-77809238?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Senegal's new twist in the fight over power\nJuly 6, 2026Senegal's constitional reform continues to split the country's political landscape: Outside the parliament building in Dakar, angry protesters marched last week against the new country's proposed new constitution.\nThe situation however escalated when security forces fired tear gas to disperse the crowd.\nMeanwhile, lawmakers inside the building engaged in a heated debate, with opposition politicians boycottng the vote on the reform; some were even seen storming the podium. One lawmaker had to be forcibly removed from the chamber by security forces.\nDespite all this, the controversial constitutional reform was eventually passed in parliament by a majority vote of the ruling PASTEF (African Patriots of Senegal for Work, Ethics, and Brotherhood) party amid great confusion of who supports whom in the escalating power struggle in Senegal's top political positions.\nHowever, there's no victory for anyone to celebrate just yet: President Bassirou Diomaye Faye refused to sign the bill, announcing that a referendum would be held instead.\nHe did not specify a date when the public would get to vote on the proposed amendments.\nPlans to curtial presidential powers\nInitiated by former prime minister and current parliamentary leader Ousmane Sonko, the legislative amendment is evidently intended to curtail the powers of incumbent President Faye.\nAccording to media reports, the new constitution aims to replace the Constitutional Council with a Constitutional Court, which would be comprised of more membersm and to strengthen parliament's oversight powers.\nUnder the changes, parliament must also be \"automatically informed\" of investment agreements related to natural resources in the country with a view towards improving the monitoring of public finances.\nAnother provision states that the incumbent president of Senegal cannot simultaneously serve as the chair of a political party.\n\"Parliament is being used to weaken the president,\" says Aminata Toure, chair of the presidential coalition. \"The proposals appear to be aimed at limiting the influence of the President of the Republic by expanding the powers of the Speaker of the National Assembly.\"\nAn imbalance of power?\nThe escalating power struggle between President Faye and his former ally Sonko has become all too apparent in parliament and beyond.\nDespite coming to power together in 2024, taking over from former President Macky Sall's government, the former allies within the PASTEF party have now become bitter rivals.\nThe two had promised their voters a long list of comprehensive reforms, aiming to combat corruption in the country while boost the economy and offering better prospects for young people.\nBut relations between the president and his now-former prime minister deteriorated, with Sonko openly criticizing Faye for his handling of Senegal's debt problems.\nDisagreements over governance intensified, with the tensions escalating in May: Faye fired Sonko as prime minister and dissolved the coalition government.\nSonko however enjoys broad support in parliament; since PASTEF holds the majority of seats in the National Assembly, Sonko was swiftly elected party chairman and speaker of the National Assembly by the members of parliament.\nThus, he was able to regain a position of power and continue to exert influence over the country's politics, for the time being.\nAccording to analyst Malao Kante, this could trigger a direct confrontation between the two former allies: \"We can actually view Ousmane Sonko as the new face of the opposition, though this opposition now holds a parliamentary majority,\" Kante told DW, highlighting the changing power dynamics in the country.\n\"There is a danger of a vote of no-confidence against the next prime minister. It is clear that this will put the country in a somewhat complicated situation and hinder the proper functioning of the state,\" he added.\nWelcome reaction to referendum\nFaye's decision to hold a plebiscite was welcome by the demonstrators, most of whom belong to the \"Alliance for the Republic\" (APR), the party of former President Macky Sall.\nPape Abdou Ndiaye, was one of the protestors outside the parliament building in the capital Dakar. \"If we want to change something, it has to be discussed, and a referendum held,\" the 23-year-old told the French Agence France-Presse (AFP) news agency.\nHe believes that that any reform should \"based on consensus,\" reflecting a sentiment shared by many Senegalese.\nMoussa Niang joined the demonstrations, saying that the people were marching \"on the streets of Dakar to defend our constitution.\"\n\"What they want to establish today under the guise of a constitutional amendment is a dual-headed system; a powerful National Assembly that can even limit the powers of the President of the Republic in order to — rightly or wrongly — impose its will on other institutions,\" he told AFP.\nMor Fall, 27, also insists that the people must have the final say. There is a ", "translation_ja": "セネガルの権力闘争における新たな展開\n\n2026年7月6日――セネガルの憲法改正をめぐる議論は、同国の政治的地形を二分し続けている。先週、ダカールの議会議事堂の外では、新たな憲法案に反対する怒った抗議者たちがデモ行進を行った。しかし状況はエスカレートし、治安部隊が群衆を解散させるために催涙ガスを発射した。\n\n一方、議事堂内では議員たちが激しい討論を展開し、野党議員たちは改正案の採決をボイコット。中には演壇に突進する議員も見られ、ある議員は治安部隊によって強制的に議場から連れ出された。こうした混乱にもかかわらず、与党PASTEF（セネガル・アフリカ愛国者・労働・倫理・友愛党）が多数決により、誰が誰を支持しているのか判然としない混乱の中で、この物議を醸す憲法改正案を最終的に可決した。\n\nしかし、まだ誰も勝利を祝える状況ではない。バシル・ジオマイ・ファイ大統領は法案への署名を拒否し、代わりに国民投票を実施すると発表した。国民が提案された改正案について投票する時期については、明確にしなかった。\n\n大統領権限の縮小計画\n\n元首相で現在は国会議長を務めるウスマン・ソンコが主導したこの法案改正は、現職のファイ大統領の権限を縮小することを明らかに意図している。メディア報道によると、新憲法は憲法評議会をより多くの委員で構成される憲法裁判所に置き換えるとともに、議会の監督権限を強化することを目指している。\n\nさらに改正案では、天然資源に関連する投資協定について公共財政の監視強化を目的として議会に「自動的に通知」しなければならないとしている。また、セネガルの現職大統領は同時に政党の党首を兼任できないとする規定も盛り込まれている。\n\n大統領連合の議長アミナタ・トゥーレは「議会は大統領を弱体化させるために利用されている」と述べた。「これらの提案は、国民議会議長の権限を拡大することで大統領の影響力を制限することを目的としているように見える」と彼女は語った。\n\n権力の不均衡？\n\nファイ大統領とかつての盟友ソンコとの間で激化する権力闘争は、議会内外でますます明らかになっている。2024年に前マッキー・サル大統領の政権を引き継いで共に権力の座についたにもかかわらず、PASTEF内のかつての盟友は今や激しいライバル関係にある。\n\n二人は有権者に対し、腐敗の撲滅、経済の活性化、若者への将来の展望の提供を目指した包括的な改革の長いリストを約束していた。しかし大統領と元首相の関係は悪化し、ソンコはセネガルの債務問題に対するファイの対応を公然と批判するようになった。\n\n統治をめぐる意見の相違が激化し、5月には緊張が頂点に達した。ファイ大統領はソンコを首相から解任し、連立政権を解散させた。しかしソンコは議会で幅広い支持を享受しており、PASTEFが国民議会の過半数の議席を保有しているため、ソンコはすぐに議員たちによって党首および国会議長に選出された。こうして彼は権力の座を取り戻し、当面の間、国の政治に影響力を行使し続けることができるようになった。\n\nアナリストのマラオ・カンテ氏によれば、これは二人のかつての盟友間の直接対決を引き起こす可能性があるという。「ウスマン・ソンコは事実上、新たな野党の顔と見なすことができます。ただし、この野党が今や議会の過半数を握っているという点が特徴的です」とカンテ氏はDWに語り、同国における権力力学の変化を浮き彫りにした。「次の首相に対する不信任投票の危険性がある。これが国を複雑な状況に陥れ、国家の適切な機能を妨げることは明らかだ」と彼は付け加えた。\n\n国民投票への歓迎の声\n\nファイ大統領の国民投票実施の決定は、抗議者たちから歓迎された。その大半は前マッキー・サル大統領の政党「共和国同盟」（APR）のメンバーである。\n\nパペ・アブドゥ・ンジャイ（23歳）は首都ダカールの議会議事堂前で抗議活動に参加した一人だ。「何かを変えたいなら、議論を尽くして国民投票を行わなければならない」と彼はフランスの通信社AFP（フランス通信社）に語った。\n\n彼はいかなる改革も「コンセンサスに基づくべき」だと考えており、その意見は多くのセネガル国民が共有する思いを反映している。\n\nムサ・ニアンも抗議活動に参加し、人々はダカールの街頭に出て「われわれの憲法を守るために」行進していると語った。「彼らが今日、憲法改正の名の下に確立しようとしているのは、二頭体制だ。共和国大統領の権限さえも制限できる強力な国民議会が、正当かどうかにかかわらず、他の機関に自らの意思を押し付けようとするものだ」と彼はAFPに語った。\n\nモル・フォール（27歳）も、国民が最終的な決定権を持つべきだと主張している。", "vocab": [{"word": "curtail", "definition": "（権限・活動などを）制限する、縮小するという意味の動詞。政治・法律文脈で権力や権利の削減を表す際によく使われる。"}, {"word": "plebiscite", "definition": "国民投票、住民投票を意味する名詞。特に憲法改正や重要な政治問題について国民全体が直接投票する制度を指す正式な表現。"}, {"word": "boycott", "definition": "抗議の意思表示として特定の活動や組織への参加を拒否・不参加にすることを意味する動詞・名詞。政治的文脈では採決や選挙への不参加を指すことが多い。"}, {"word": "oversight", "definition": "監督、監視を意味する名詞。特に議会や行政機関による政府活動・公共財政などの監督権限を指す政治・行政用語。"}, {"word": "escalate", "definition": "（緊張・紛争・状況などが）段階的に悪化・拡大する、エスカレートするという意味の動詞。政治・外交・社会問題の文脈で頻繁に使われる。"}, {"word": "incumbent", "definition": "現職の、在職中のという意味の形容詞。特定の職や役職を現在保持している人物を指す際に使用される政治・行政用語。"}, {"word": "no-confidence", "definition": "不信任を意味する形容詞で、「vote of no-confidence（不信任投票）」の形で使われることが多い。議会が内閣や首相への支持を撤回する際の正式な議会手続きを指す。"}]}, {"title_ja": "スペイン・パンプローナで「牛追い祭り」サン・フェルミン祭が開幕", "title_en": "Spain's San Fermín Festival Opens in Pamplona with Traditional 'Running of the Bulls'", "summary_ja": "2026年7月6日、スペイン北部のパンプローナで、牛追いで有名なサン・フェルミン祭が開幕し、1万2千人以上が市内中心部に集まった。祝祭は市庁舎のバルコニーから打ち上げられる伝統的な「チュピナソ」で幕を開け、参加者たちはワインを掛け合い、歌や踊りで盛り上がった。最初の牛追いは火曜日の朝に行われ、旧市街の848メートルのコースを走る予定だ。", "summary_en": "More than 12,000 people gathered in Pamplona, Spain, on July 6, 2026, to celebrate the opening of the Festival of San Fermín, famous for its daily running of the bulls. The festivities began with the traditional 'Chupinazo' rocket launch, followed by wine-pouring and dancing in the streets. The first bull run is scheduled for Tuesday morning along an 848-meter course through the Old Quarter.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/spain-s-running-of-the-bulls-festival-opens-in-pamplona/a-77855360?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Spain's 'running of the bulls' festival opens in Pamplona\nJuly 6, 2026More than 12,000 people gathered in the center of Pamplona in northern Spain on Monday to celebrate the start of the Festival of San Fermin, known for the running of the bulls.\nThe festival kicked off with the traditional \"Chupinazo,\" a small rocket fired from the town hall balcony over a jam-packed plaza.\nThe revelers celebrated by pouring wine and grape juice over each other, while holding up red scarves, singing and dancing, and shouting \"San Fermin, San Fermin, San Fermin.\"\nThe first running of the bulls will start on Tuesday morning, and take place every day until July 14.\nAt 8:00 a.m. several 600-kilogram fighting bulls will be unleashed through the narrow streets of the Old Quarter along an 848-meter course towards a bullring with hundreds of people in front of them.\nDozens of people are injured every year, and there have been 16 fatalities since 1924.\nIn the evening, some the same bulls that run through the streets are killed in a bullfight. Other festival events include concerts and parades.\nAs in previous years, animal rights activists protested against the running of the bulls, with dozens seen wearing bull horns and covered in red paint\nPamplona and the running of the bulls provided the backdrop for US author Ernest Hemingway's first major novel, \"The Sun Also Rises,\" which turns 100 years old this year. Hemingway's novel helped make the running of the bulls famous around the world.\nEvery year, the festival draws visitors from Europe, Australia, Asia and the United States. The festival dates back to the late 16th century and honors Pamplona's patron saint, San Fermin.\nEdited by: Zac Crellin\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google by clicking here and hitting the \"star\" or \"preferred\" button, so you'll always see our verified news first.", "translation_ja": "スペインの「牛追い祭り」、パンプローナで開幕\n\n2026年7月6日　スペイン北部パンプローナの中心部に月曜日、1万2千人以上が集まり、牛追いで知られるサン・フェルミン祭の開幕を祝った。\n\n祭りは伝統的な「チュピナソ」で幕を開けた。チュピナソとは、人々で埋め尽くされた広場に向かって市庁舎のバルコニーから打ち上げられる小型のロケット花火だ。\n\n参加者たちは赤いスカーフを掲げながら互いにワインやグレープジュースを掛け合い、歌い踊りながら「サン・フェルミン、サン・フェルミン、サン・フェルミン」と叫んで祝った。\n\n最初の牛追いは火曜日の朝に始まり、7月14日まで毎日行われる。\n\n午前8時、重さ約600キログラムの闘牛数頭が旧市街の狭い路地に放たれ、数百人の走者を追いながら848メートルのコースを牛闘技場へと向かう。\n\n毎年数十人が負傷しており、1924年以降16人の死者が出ている。\n\n夕方には、路地を走った牛の一部が闘牛で殺される。その他の祭りのイベントには、コンサートやパレードなどがある。\n\n例年同様、動物の権利活動家たちが牛追いに抗議し、数十人が牛の角を着け赤いペンキを体に塗った姿で抗議活動を行った。\n\nパンプローナと牛追い祭りは、米国の作家アーネスト・ヘミングウェイの最初の主要小説『日はまた昇る』の舞台となっており、同作は今年刊行100周年を迎える。ヘミングウェイの小説は牛追い祭りを世界的に有名にする一助となった。\n\n毎年、ヨーロッパ、オーストラリア、アジア、そして米国から多くの観光客がこの祭りに訪れる。祭りの起源は16世紀後半にさかのぼり、パンプローナの守護聖人サン・フェルミンを称えるものだ。\n\n編集：ザック・クレリン", "vocab": [{"word": "revelers", "definition": "祝宴や祭りで騒ぎながら楽しむ人々を指す。名詞として祝祭の文脈でよく使われる。"}, {"word": "unleashed", "definition": "「解き放つ」「制御を外して放出する」という意味の動詞unleasheの過去形。動物や力を突然解放する場面で用いられる。"}, {"word": "fatalities", "definition": "事故や災害などによる死者・死亡例を指す名詞。ニュース報道や統計の文脈で頻繁に使われるフォーマルな語。"}, {"word": "backdrop", "definition": "物事の「背景」や「舞台」を比喩的に表す名詞。文学・演劇・ニュース報道など幅広い文脈で使われる。"}, {"word": "patron saint", "definition": "特定の都市・職業・グループなどを守護するとされるキリスト教の聖人を指す複合名詞。宗教・文化的文脈で使われる。"}, {"word": "bullfight", "definition": "闘牛を意味する名詞で、スペインや中南米の伝統的な闘牛の興行を指す文化・スポーツ用語。"}, {"word": "idiomatic", "definition": "ある言語や文化に特有の慣用的な表現を形容する言葉。言語学や英語教育の文脈でよく使われる上級語彙。"}]}, {"title_ja": "FIFAがバロガンのレッドカード出場停止処分に関するベルギーの異議申し立てを却下", "title_en": "FIFA Rejects Belgium's Appeal Over Balogun Red Card Ban Suspension", "summary_ja": "FIFAの上訴委員会は、フォラリン・バロガンのレッドカード出場停止処分の一時停止に対するベルギー王立サッカー協会の異議申し立てを「受理不能」として却下した。この決定は、トランプ大統領がFIFAのインファンティーノ会長に電話し審査を要請するという異例の介入を受けて下されたもの。バロガンはベルギーとの決勝トーナメント1回戦に出場できることになった。", "summary_en": "FIFA's Appeal Committee rejected Belgium's appeal against the suspension of Folarin Balogun's red card ban, ruling the Royal Belgian Football Association had no standing to appeal. The decision came after President Trump called FIFA President Infantino to request a review, a highly unusual intervention that drew widespread attention. Balogun will be allowed to play in the US Round of 16 match against Belgium, with his one-game suspension placed on a one-year probationary hold.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/GMA/Culture/us-world-cup-star-folarin-baloguns-red-card/story?id=134500486", "state_media": false, "category": "政治", "full_text": "Trump says he asked FIFA to review US World Cup star Folarin Balogun's red card ban\nPresident Donald Trump on Monday confirmed that he spoke with FIFA President Gianni Infantino and asked him to review the red card suspension of U.S. soccer star Folarin Balogun.\nSpeaking at an Oval Office event, Trump said he watched the July 1 match and thought the one-game red card suspension, which Balogun received for landing on an opposing player's ankle, was \"very unfair\" and that the clash between Balogun and the opposing team's player \"wasn't a foul.\"\n\"So yes, I asked for a review by FIFA,\" Trump said.\nIn the wake of the call, Balogun's suspension for the U.S. round of 16 match against Belgium was put on hold for a year pending behavior -- a highly unusual move that drew criticism from the Belgian team.\nOn Monday, the FIFA Appeal Committee said it rejected an appeal from the Royal Belgian Football Association as \"inadmissible.\"\n\"The request was rendered inadmissible on the grounds that the RBFA is not a party to the proceedings and, as such, has no standing to appeal the decision,\" FIFA said in a statement.\nRed cards have long been a staple of the game and are not reviewable or eligible for appeal during the FIFA World Cup. While yellow and red cards can be appealed in other tournaments and leagues, it's rare for it to happen in the World Cup, which last saw it happen in 1962.\nPresident Trump defended his conversation with Infantino and was dismissive when asked by a reporter if the episode could lead other world leaders to do the same in the future.\n\"I think it's terrible if they wouldn't allow, you know, a top player, maybe the best, maybe among the best players on the team, to play,\" Trump said. \"I think it would have had a big stain. And I related just that feeling.\"\n\"I didn't tell him what to do. I can't tell him what to do,\" Trump said. \"And I don't believe he made the decision. I think it was a committee that made the decision, and they made the right decision.\"\nThe U.S. and Belgium will face off at 8 p.m. ET on Monday from Seattle Stadium.\nTrump's call with Infantino took place last week, according to sources familiar with the situation.\nA U.S. official told ABC News that Trump and Infantino discussed why a red card was issued, and that the U.S. government provided additional evidence that was used in the appeal process.\nIn a statement on Monday, Infantino said he \"regularly\" talks with Trump about matters related to FIFA World Cup -- and said he spoke to the president about Balogun's red card.\n\"I regularly discuss matters related to the FIFA World Cup with the President of the United States, and on this matter, I did receive a call from President Donald Trump, just as I receive calls from heads of state, government officials, football stakeholders and business executives from around the world on many different issues,\" Infantino wrote. \"During our conversation, I explained that there was an ongoing legal process involving FIFA’s independent judicial bodies and that the case would be decided in due course by the competent bodies. That is how FIFA’s system works, and it is a principle that I will always uphold.\"\nBalogun was given the red card during the second half of the U.S. match against Bosnia-Herzegovina on July 1. The penalty led to Balogun being ejected from the game and automatically landed him a one-game suspension. FIFA told ABC News at the time that the call by the referee was final and not able to be overturned or appealed.\nHowever, on Sunday, FIFA changed course, saying that \"the implementation of the match suspension is suspended for a probationary period of one year.\"\nThe football governing body added Sunday that if Balogun \"commits another infringement of a similar nature and gravity during the probationary period, the suspension shall be revoked and the sanction enforced without prejudice to any additional sanction imposed for the new infringement.\"\nUSMNT Head Coach Mauricio Pochettino told reporters after last week's match, which the U.S. won 2-0, that Balogun was \"disappointed\" by the call and that the clash was not intentional, according to ESPN.\nU.S. Soccer said in a statement Sunday that it accepted and was \"pleased\" with the decision of FIFA's disciplinary committee to suspend the one-game ban.\n\"Our full attention is focused on the Round of 16 match against Belgium in Seattle, and we look forward to the continued support of our amazing fans,\" U.S. Soccer said.\nABC News' Lauren Peller, Christiane Cordero and Nic Uff contributed to this report.", "translation_ja": "トランプ大統領、FIFAにアメリカ代表スター・バロガンのレッドカード審査を要請したと明かす\n\nドナルド・トランプ大統領は月曜日、FIFA会長ジャンニ・インファンティーノと会話し、アメリカ代表サッカースター、フォラリン・バロガンのレッドカード出場停止処分の審査を求めたことを認めた。\n\n大統領執務室で行われたイベントでトランプ氏は、7月1日の試合を観戦し、バロガンが相手選手の足首に着地したことで科された1試合のレッドカード出場停止処分は「非常に不当だ」と感じ、バロガンと相手選手の接触は「ファウルではなかった」と述べた。\n\n「だから私はFIFAに審査を求めた」とトランプ氏は語った。\n\nこの電話を受け、バロガンのアメリカ対ベルギーの決勝トーナメント1回戦における出場停止処分は、行動を条件に1年間保留となった。これは非常に異例の措置であり、ベルギー代表チームから批判を招いた。\n\n月曜日、FIFAの上訴委員会は、ベルギー王立サッカー協会（RBFA）からの異議申し立てを「受理不能」として却下したと発表した。\n\nFIFAは声明の中で、「RBFAは当該手続きの当事者ではなく、したがって決定を上訴する資格がないことを理由に、申し立ては受理不能と判断された」と述べた。\n\nレッドカードはサッカーの長年にわたる基本ルールであり、FIFAワールドカップ期間中は審査や上訴の対象とはならない。イエローカードやレッドカードは他のトーナメントやリーグでは上訴できる場合があるが、ワールドカップでそれが起きたのは1962年が最後であり、非常に稀なことである。\n\nトランプ大統領はインファンティーノとの会話を擁護し、この件が将来他国の首脳も同様のことをするきっかけになるかと記者に問われると、取り合わなかった。\n\n「トップ選手、もしかしたら最高の、あるいはチームで最高の選手の一人が試合に出られないのは最悪だと思う」とトランプ氏は語った。「大きな汚点になっていたと思う。私はその思いを伝えただけだ。」\n\n「私は彼に何をすべきかは言っていない。そんな権限はない」とトランプ氏は述べた。「そして彼が決定を下したとは思っていない。委員会が決定を下したのだと思うし、彼らは正しい決断をした。」\n\nアメリカとベルギーは東部時間の月曜日午後8時、シアトル・スタジアムで対戦する予定だ。\n\nトランプ氏とインファンティーノの通話は先週行われたと、状況を知る複数の情報筋が明らかにした。\n\nアメリカ政府関係者はABCニュースに対し、トランプ氏とインファンティーノがなぜレッドカードが出されたかについて話し合い、米国政府が上訴プロセスで使用される追加証拠を提供したと述べた。\n\n月曜日の声明でインファンティーノ会長は、FIFAワールドカップに関する事柄についてトランプ大統領と「定期的に」話していると述べ、バロガンのレッドカードについてもトランプ大統領と話したことを認めた。\n\n「私はFIFAワールドカップに関連する事柄についてアメリカ合衆国大統領と定期的に話し合っており、今回の件についてもドナルド・トランプ大統領から電話を受けた。世界中の国家元首、政府関係者、サッカー関係者、ビジネス幹部からさまざまな問題について電話を受けるのと同様だ」とインファンティーノは記した。「会話の中で私は、FIFAの独立した司法機関が関与する法的手続きが進行中であり、このケースは適切な機関によって然るべき時に決定されると説明した。それがFIFAの仕組みであり、私が常に守り続ける原則だ。」\n\nバロガンは7月1日のアメリカ対ボスニア・ヘルツェゴビナ戦の後半でレッドカードを受けた。この処分によりバロガンは試合から退場となり、自動的に1試合の出場停止処分が科された。FIFAは当時ABCニュースに対し、審判の判定は最終的なものであり、覆したり上訴したりすることはできないと述べていた。\n\nしかし日曜日、FIFAは方針を転換し、「試合出場停止の執行は1年間の試験観察期間として停止される」と発表した。\n\nFIFAはさらに日曜日、バロガンが「試験観察期間中に同様の性質と重大性を持つ別の違反を犯した場合、停止は取り消され、新たな違反に対して科される追加制裁を妨げることなく処罰が執行される」と付け加えた。\n\nアメリカ代表のマウリシオ・ポチェッティーノ監督は先週の試合後、ESPNによると記者団に対し、バロガンはその判定に「失望していた」と述べ、この接触は意図的なものではなかったと語った。アメリカは2対0で勝利した。\n\n米国サッカー連盟は日曜日の声明で、FIFAの規律委員会が1試合の出場停止処分を一時停止するという決定を受け入れ、「満足している」と述べた。\n\n「私たちの全ての注意はシアトルでのベルギーとの決勝トーナメント1回戦に向けられており、素晴らしいファンの皆さんの引き続きのご支援を楽しみにしている」と米国サッカー連盟は述べた。\n\nABCニュースのローレン・ペラー、クリスティアン・コルデロ、ニック・アフがこの報道に貢献した。", "vocab": [{"word": "inadmissible", "definition": "（証拠や申し立てなどが）受理不能な、許容されないという意味。法的・手続き上の文脈で、正式に受け付けられない申請や証拠を指す際に使われる。"}, {"word": "probationary", "definition": "試用・試験観察期間に関係する形容詞。ある条件を満たすかどうかを一定期間観察・監視する状況を指し、「probationary period（試験観察期間）」のように使われる。"}, {"word": "standing", "definition": "法律用語として、訴訟や手続きに参加・上訴する資格や権限のことを指す。「has no standing to appeal（上訴する資格がない）」のように使われる。"}, {"word": "infringement", "definition": "規則・法律・権利などの侵害や違反を意味する名詞。スポーツや法律の文脈で規則違反を指す際に用いられる。"}, {"word": "dismissive", "definition": "相手の意見や質問を軽視・一蹴する態度を表す形容詞。「was dismissive when asked（質問されても取り合わなかった）」のように、真剣に受け止めない様子を示す。"}, {"word": "judicial", "definition": "司法・裁判に関連する形容詞。「independent judicial bodies（独立した司法機関）」のように、裁判や法的判断に関わる機関・プロセスを修飾する際に使われる。"}, {"word": "staple", "definition": "ある分野や状況において基本的・不可欠な要素を指す名詞。「a staple of the game（サッカーの基本的要素）」のように、長年定着している慣例や構成要素を表す。"}]}, {"title_ja": "ABCニュースライブ：24時間体制のニュース・生中継", "title_en": "ABC News Live: 24/7 Breaking News and Live Event Coverage", "summary_ja": "ABCニュースライブは、速報ニュースや生中継イベントを24時間365日配信しています。国内外の主要ニュースをリアルタイムで伝え、視聴者に最新情報を届けます。いつでもライブ放送や特別レポートを視聴することができます。", "summary_en": "ABC News Live provides continuous around-the-clock coverage of breaking news and live events. The stream delivers real-time updates on major national and international stories as they develop. Viewers can access live broadcasts and special reports at any time through the platform.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "チャーリー・カーク殺害事件：予備審問開始、遺族がコメント発表", "title_en": "Charlie Kirk Murder Trial: Preliminary Hearing Begins as Family Speaks Out", "summary_ja": "保守派活動家チャーリー・カークを殺害したとして起訴された23歳のタイラー・ジェームズ・ロビンソンを正式裁判にかけるに足る証拠があるかを判断する予備審問が、月曜日にユタ州で始まった。検察側は大学警備員の証言など複数の証拠を提示し、死刑を求刑する方針を明らかにした。カークの未亡人や両親、ドナルド・トランプ・ジュニアが法廷に出席する中、遺族は悲しみの中でプライバシーを守るよう求める声明を発表した。", "summary_en": "A preliminary hearing began Monday in Utah to determine whether sufficient evidence exists to try 23-year-old Tyler James Robinson for the murder of conservative activist Charlie Kirk. Prosecutors presented testimony from a university security officer who described hearing the fatal shot fired on September 10, 2025 at Utah Valley University. Kirk's widow, parents, and Donald Trump Jr. attended the hearing, while the family released a statement asking for privacy during their grief.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/US/prosecutors-present-evidence-charlie-kirks-alleged-assassin-tyler/story?id=134501574", "state_media": false, "category": "政治", "full_text": "'Painful reminder': Charlie Kirk's family speaks as accused killer's hearing begins\nDonald Trump Jr. is seated in the courtroom gallery with Kirk's family.\nA crucial court hearing got underway on Monday to determine whether prosecutors have enough evidence to warrant a murder trial for the alleged assassin of conservative activist Charlie Kirk.\nUtah prosecutors said they have a mountain of evidence against the suspect, 23-year-old Tyler James Robinson, and plan to seek the death penalty.\nThe state began presenting its evidence on Monday at a preliminary hearing in the 4th District Court in Provo, Utah. The hearing is expected to last up to five days.\nKirk's widow, Erika Kirk, and his parents, Robert and Kathryn Kirk, are attending the hearing, marking the first time they have seen Robinson in person. President Donald Trump's son, Donald Trump Jr., who was a friend of Charlie Kirk, was also seated in the courtroom gallery.\nThe Kirk family released a statement Monday morning, saying, \"Charlie was a beloved husband, son, brother, friend, and father.\"\n\"Every court proceeding serves as a painful reminder of his death and the loss that has irrevocably impacted our lives and the lives of his children,\" the family said. \"We remain deeply grateful for the support, prayers, and kindness we have received. This outpouring has sustained us during the darkest days of our lives.\"\nThe family said it will not be commenting further on the case: \"We ask for continued privacy as we navigate this process and immense grief.\"\nGraphic exhibits to be presented at hearing\nDistrict Judge Tony Graf, who is presiding over the hearing, will weigh the evidence presented by prosecutors and decide if there is enough to hold Robinson over for trial and whether prosecutors can proceed in seeking the death penalty.\nAt the start of the hearing, Chief Deputy Utah County Attorney Chad Gruander informed Graf that the state plans t
