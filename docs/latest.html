": "", "vocab": []}, {"title_ja": "AIMIM, NCP lose one BMC corporator each after caste certificates invalidated", "title_en": "AIMIM, NCP lose one BMC corporator each after caste certificates invalidated", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/mumbai/aimim-ncp-lose-one-bmc-corporator-each-after-caste-certificates-invalidated-10781136/", "state_media": false, "category": "社会", "full_text": "AIMIM, NCP lose one BMC corporator each after caste certificates invalidated\nAccording to civic officials the two constituencies (138 and 170) were originally reserved for the women candidates hailing from other Backward class (OBC) communities.\nNow with two councillors losing their candidature in ward numbers 137 and 138, two neighbouring wards in Mumbai's marginalised M east ward are set to run without any elected representative. (Express file photo)\nIn another major blow to the opposition in Brihanmumbai Municipal Corporation(BMC), two more elected corporators lost their candidature after the state government’s caste scrutiny committee invalidated their caste certificates that were submitted during the election registration process earlier in January this year.\nRoshan Shaikh from the AIMIM was elected from Mumbai’s ward number 138 in the Govandi-Mankhurd area. Shaikh is the second corporator to lose candidature from AIMIM.\nEarlier on June 22, AIMIM candidate — Sameer Ramzan Patel, who was elected from the neighbouring ward number 137 was suspended on similar grounds.\nNow with two councillors losing their candidature in ward numbers 137 and 138, two neighbouring wards in Mumbai’s marginalised M east ward are set to run without any elected representative.\nAnother candidate — Bushra Nadeem Malik from the Nationalist Congress Party (NCP) who was elected from ward number 170 in Kurla east also lost her candidature on Friday. Malik is the daughter in law of Kaptan Malik — who is the brother of Nawab Malik — senior NCP leader and former cabinet minister in Maharashtra.\nThe suspension of candidature of these two candidates was announced by Mumbai’s Mayor — Ritu Tawde in the civic house on Friday afternoon. Meanwhile, with these two suspensions, the total number of municipal councillors goes up to four in just two months.\nAccording to civic officials the two constituencies (138 and 170) were originally reserved for the women candidates hailing from other Backward class (OBC) communities.\nStory continues below this ad\nThe civic body’s rules state that whenever the candidature of a corporator is disqualified, the candidate who finished second in the last civic election will be declared as the new incumbent corporator for that post.\n“The declaration is to be made by the court, only after that candidate approaches it. Till then, the seat will stay vacant,” an official told the Indian Express.\nFor the Kurla (Malik) ward the seat is likely to go to a Bharatiya Janata Party (BJP) candidate, while for the Govandi Mankhurd (Shaikh) ward the seat will go to the Samajwadi Party (SP).\nFor AIMIM, this brings down the number of elected representatives from this party to 6, while that of NCP will come down to 2.\nStory continues below this ad\nMeanwhile, the BJP seat is likely to increase to 91, while SP’s seat count will go up to 3.\nEarlier on June 18, Shiv Sena (UBT) corporator — Deepak Sawant was the first candidate to lose his candidature owing to submission of false certificates. Sawant was elected from Bhandup’s ward number 111 and his seat is likely to go to a BJP candidate. Meanwhile, Patel’s seat is likely to go to a Shiv Sena candidate.\nThe suspension of these candidates are likely to take up the seats of the ruling Mahayuti alliance to 120 in the Mumbai civic body.\nPratip Acharya is a seasoned journalist based in Mumbai reporting for The Indian Express. With a career spanning over a decade, his work demonstrates strong Expertise and Authority in critical urban issues, civic affairs, and electoral politics across Eastern and Western India.\nExpertise & Authority\nCurrent Role: Journalist, The Indian Express (IE), reporting from Mumbai.\nCore Authority: Pratip's reporting focuses sharply on local democracy and development, specializing in:\nUrban Governance and Civic Affairs: Providing in-depth analysis of municipal decision-making, city planning, and local infrastructure, essential for informed urban reporting.\nCity Politics and Environment: Covering the political dynamics of Mumbai and surrounding areas, alongside critical environmental challenges impacting the metro region.\nElectoral Coverage (High-Stakes Experience): He has extensive experience in high-stakes political reporting, having covered major elections, establishing his Trustworthiness in political analysis:\nNational: Lok Sabha elections in 2014 and 2019.\nState: West Bengal Assembly elections in 2016 and Maharashtra Assembly elections in 2019.\nMajor Assignments (Ground Reporting): Pratip demonstrated commitment during crises by conducting ground reporting throughout the Covid-19 pandemic since its breakout in 2020, offering first-hand accounts and analysis of the public health crisis.\nExperience\nExtensive Experience: Starting his career in 2014, Pratip has built his foundation across multiple prominent English dailies:\nStarted at The Times of India in Kolkata (2014).\nRelocated to Mumbai (2016) and worked with The Free Press Journal and Hindustan Times before join", "translation_ja": "", "vocab": []}, {"title_ja": "Canada sent no one to make its case against U.S. tariffs. So I went instead. What I saw sickened me - Toronto Star", "title_en": "Canada sent no one to make its case against U.S. tariffs. So I went instead. What I saw sickened me - Toronto Star", "summary_ja": "Canada sent no one to make its case against U.S. tariffs. So I went instead. What I saw sickened me Toronto Star", "summary_en": "Canada sent no one to make its case a ost Police speak on release of kidnapped Oyo pupils, teachers appeared first on Premium Times Nigeria .", "summary_en": "“Those who have done it were not supposed to have done it.\" The post Police speak on release of kidnapped Oyo pupils, teachers appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/headlines/894415-police-speak-on-release-of-kidnapped-oyo-pupils-teachers.html", "state_media": false, "category": "社会", "full_text": "The abducted schoolchildren and teachers kidnapped from their schools by gunmen in Oyo State have regained their freedom, bringing to nearly two months of anxiety that forced public schools across the state to shut down and sparked widespread protests by teachers.\nTheir release was displayed in a circulating video, where the teachers and children were thanking God, the country’s president, and security operatives.\nHowever, the Oyo State Commissioner of Police, Olugbenga Abimbola, confirmed the development to PREMIUM TIMES on Friday evening and said security agencies were still compiling details surrounding the victims’ release.\n“We are still working on the details. We cannot just jump into information now,” Mr Abimbola said in a telephone interview.\n“Those who have done it were not supposed to have done it. At the appropriate time, we will provide more details. I’m waiting for more details.”\nThe police commissioner did not immediately disclose whether the victims were rescued during a security operation or released by their abductors.\nThe identities and exact number of those released were also yet to be officially confirmed as of the time of filing this report.\nThe release brings relief to families, residents and the education community after about two months of uncertainty following one of the most disturbing school abductions recorded in Oyo State in recent years.\nREAD ALSO: BREAKING: Kidnapped Oyo pupils, teachers freed\nVictims were abducted when armed men attacked schools in Oriire Local Government Area on May 15, kidnapping pupils and teachers, including the principal of Community High School, Ahoro-Esiele, Rachael Alamu.\nThe attack triggered widespread outrage across the state and renewed concerns over worsening insecurity around communities bordering the Old Oyo National Park, an area that security agencies have repeatedly identified as a hideout for kidnapping syndicates.\nDays after the abduction, the kidnappers released a disturbing video showing one of the abducted teachers, Michael Oyedokun, being beheaded. The killing intensified pressure on security agencies and the Oyo State Government to secure the release of the remaining captives.", "translation_ja": "", "vocab": []}, {"title_ja": "Soludo seeks restructuring, backs state police, judicial reforms", "title_en": "Soludo seeks restructuring, backs state police, judicial reforms", "summary_ja": "“More responsibilities have been transferred to states without a corresponding review of the revenue allocation formula,” the Anambra governor said. The post Soludo seeks restructuring, backs state police, judicial reforms appeared first on Premium Times Nigeria .", "summary_en": "“More responsibilities have been transferred to states without a corresponding review of the revenue allocation formula,” the Anambra governor said. The post Soludo seeks restructuring, backs state police, judicial reforms appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/ssouth-east/894405-soludo-seeks-restructuring-backs-state-police-judicial-reforms.html", "state_media": false, "category": "社会", "full_text": "Governor Charles Soludo of Anambra State has called for comprehensive restructuring of Nigeria’s federal system, saying the debate on state police should extend beyond security to include fiscal and judicial reforms.\nMr Soludo made the call during a Town Hall Meeting in Awka on Thursday, where he described the growing support for state police as an inevitable step toward a more effective federal system.\nHe said the debate had moved beyond whether Nigeria should establish state police, stressing that attention should now focus on the modalities for implementing the initiative.\nThe governor said his administration’s experience in Anambra had shown the need for effective collaboration among federal, state and private security agencies.\nHe added that broader constitutional changes should complement security reforms.\nMr Soludo also decried what he described as the fiscal imbalance between the federal government and the states.\n“More responsibilities have been transferred to states without a corresponding review of the revenue allocation formula.\n“The federal government currently retains about 53 per cent of national revenue, while the 36 states share about 26 per cent, averaging less than one per cent per state.\n“I’m advocating a leaner federal government with a maximum of 40 per cent share of national revenue, while more resources should be devolved to states to enable them to discharge their constitutional responsibilities effectively,” he said.\nThe governor also called for reforms in the nation’s judicial system, describing it as a major obstacle to true federalism.\nHe said that despite moves toward decentralised security, the judiciary remained largely unitary, resulting in prolonged litigation that often lasts for decades.\nMr Soludo said that in Anambra, about 70 per cent of court cases, including those involving violence, were land-related and frequently ended up at the Supreme Court after 30 to 40 years.\nREAD ALSO: Gunmen attack convoy of Soludo’s chief of staff, kill police officers, others\nHe therefore advocated establishing State Courts of Appeal and State Supreme Courts to align the judiciary with the country’s federal structure.\nThe governor commended President Bola Tinubu for advancing discussions on federalism and expressed optimism that ongoing reforms would strengthen Nigeria’s federal system.\nHe said initiatives, such as states’ moves to establish correctional facilities, reflected the growing momentum toward deeper constitutional and institutional reforms.\nMr Soludo urged stakeholders to sustain discussions on restructuring, saying comprehensive reforms were necessary to promote constitutional balance, effective governance and economic viability for the states.", "translation_ja": "", "vocab": []}, {"title_ja": "Police arrest man for allegedly killing own father", "title_en": "Police arrest man for allegedly killing own father", "summary_ja": "Blessing Agabe, the police spokeswoman in Rivers, confirmed the arrest while speaking with journalists in Port Harcourt on Thursday. The post Police arrest man for allegedly killing own father appeared first on Premium Times Nigeria .", "summary_en": "Blessing Agabe, the police spokeswoman in Rivers, confirmed the arrest while speaking with journalists in Port Harcourt on Thursday. The post Police arrest man for allegedly killing own father appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/south-south-regional/894392-police-arrest-man-for-allegedly-killing-own-father.html", "state_media": false, "category": "社会", "full_text": "The police command in Rivers State has confirmed the arrest of a man alleged to have killed his father in the Ada George area of Port Harcourt.\nBlessing Agabe, the police spokeswoman in Rivers, confirmed the arrest while speaking with journalists in Port Harcourt on Thursday.\nMs Agabe, an assistant superintendent of police, said the suspect, believed to be in his mid-30s, allegedly attacked his father with a machete, inflicting multiple fatal injuries.\nAccording to her, the incident occurred on Sunday, and the suspect has been arrested and is currently in police custody.\n“Investigations have commenced with a view to ensuring that justice is served,” she said.\nMs Agabe added that further details would be made available as investigations progressed.\nA witness familiar with the incident told the News Agency of Nigeria (NAN) that the victim was a retired marine captain, identified as Davide Nwoke.\nThe source, who spoke on condition of anonymity, alleged that the incident stemmed from a dispute over a family property.\nHe said the slain man had concluded arrangements to relocate to his village in the South-east and had invited his children to share portions of his estate.\nHe claimed the suspect, said to be the son of the deceased’s second wife, received his share but later demanded his father’s car.\n“The boy, after being settled by his father, also demanded the car, insisting that his father should not retire to the village with it,” the source alleged.\nThe witness further claimed the suspect later hid inside the family residence and waited for his father to return from his routine morning exercise.\n“When Nwoke returned and went upstairs, his son allegedly emerged from hiding and attacked him with a machete,” he said.\nHe alleged that the domestic worker in the house who intervened and attempted to rescue Mr Nwoke was also attacked and forced to flee.\nREAD ALSO: How keke rider contracted for transport to school raped 13-year-old girl – Police\nAccording to the source, the injured victim managed to run downstairs but was pursued and attacked again.\n“The son repeatedly attacked him with the machete until he died.\n“He then collected the car key from Nwoke’s body and locked himself in one of the rooms in the house,” the source claimed.\nHe said the housekeeper alerted neighbours, who subsequently contacted the police.\n“Following the distress call, officers from the Rumuokpani Police Division arrived at the scene and arrested the suspect,” the source added.\n(NAN)", "translation_ja": "", "vocab": []}, {"title_ja": "Iran’s Supreme Leader Remains Absent, a Void at the Top of the Regime", "t r Power Plant hit by US projectile", "summary_ja": "Perimeter of Iran's Bushehr Nuclear Power Plant hit by US projectile", "summary_en": "Perimeter of Iran's Bushehr Nuclear Power Plant hit by US projectile", "source": "CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-09/news-1ODP7pWAcWA/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Venezuelan FM thanks China for quake relief aid", "title_en": "Venezuelan FM thanks China for quake relief aid", "summary_ja": "Venezuelan Foreign Minister Yvan Gil on Monday thanked the Chinese government and people for sending humanitarian aid to assist those affected by the earthquakes.", "summary_en": "Venezuelan Foreign Minister Yvan Gil on Monday thanked the Chinese government and people for sending humanitarian aid to assist those affected by the earthquakes.", "source": "CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-07/Venezuelan-FM-thanks-China-for-quake-relief-aid-1OzJlBtyg3C/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Shanghai to host record-breaking World AI Conference in July", "title_en": "Shanghai to host record-breaking World AI Conference in July", "summary_ja": "Shanghai to host record-breaking World AI Conference in July", "summary_en": "Shanghai to host record-breaking World AI Conference in July", "source": "CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-07/Shanghai-to-host-record-breaking-World-AI-Conference-July-17-to-20-1OAHU3xSEog/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Burundi, Russia discuss investments in chemical plants — republic’s foreign minister", "title_en": "Burundi, Russia discuss investments in chemical plants — republic’s foreign minister", "summary_ja": "The parties discussed ways to find alternative financing mechanisms for joint projects, Edouard Bizimana stated", "summary_en": "The parties discussed ways to find alternative financing mechanisms for joint projects, Edouard Bizimana stated", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2158859", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "EU would not rush to admit Serbia even if it joins anti-Russian sanctions — Vucic", "title_en": "EU would not rush to admit Serbia even if it joins anti-Russian sanctions — Vucic", "summary_ja": "The Serbian leader revealed that the key condition for being admitted to the EU had always been joining the anti-Russian sanctions", "summary_en": "The Serbian leader revealed that the key condition for being admitted to the EU had always been joining the anti-Russian sanctions", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2158857", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "US early warning aircraft spotted near Persian Gulf", "title_en": "US early warning aircraft spotted near Persian Gulf", "summary_ja": "Additionally, the source reported that around five US Boeing KC-135R Stratotankers and Boeing KC-46A Pegasus military transport tankers are presently overhead in the waters of the Persian Gulf and the Gulf of Oman", "summary_en": "Additionally, the source reported that around five US Boeing KC-135R Stratotankers and Boeing KC-46A Pegasus military transport tankers are presently overhead in the waters of the Persian Gulf and the Gulf of Oman", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2158855", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "The Israel-Lebanon Recipe for Never-Ending War", "title_en": "The Israel-Lebanon Recipe for Never-Ending War", "summary_ja": "Lebanon’s political circumstances, together with Iran’s strengthened regional position, make Hezbollah’s complete disarmament highly unlikely. By conditioning Israel’s withdrawal from Lebanon on this outcome—but with no provisions about cutting Hezbollah’s Iranian lifeline—the new framework agreemen", "summary_en": "Lebanon’s political circumstances, together with Iran’s strengthened regional position, make Hezbollah’s complete disarmament highly unlikely. By conditioning Israel’s withdrawal from Lebanon on this outcome—but with no provisions about cutting Hezbollah’s Iranian lifeline—the new framework agreemen", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/new-framework-agreement-will-keep-israel-in-lebanon-indefinitely-by-shlomo-ben-ami-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Israel-Lebanon Recipe for Never-Ending War\nLebanon’s political circumstances, together with Iran’s strengthened regional position, make Hezbollah’s complete disarmament highly unlikely. By conditioning Israel’s withdrawal from Lebanon on this outcome—but with no provisions about cutting Hezbollah’s Iranian lifeline—the new framework agreement is dead on arrival.\nTEL AVIV—Late last month, Lebanon and Israel signed a framework agreement with the United States that Lebanon’s chief negotiator, Nada Hamadeh Moawad, described as a “first step on the road to restoring Lebanese sovereignty and territorial integrity.” But, as the agreement implicitly acknowledges, Israel is not the only threat to Lebanon’s sovereignty. The departure of the Israel Defense Forces from southern Lebanon hinges on the “verified disarmament” of Iran’s proxy, Hezbollah.", "translation_ja": "", "vocab": []}, {"title_ja": "Why This Energy Shock Is Different", "title_en": "Why This Energy Shock Is Different", "summary_ja": "Unlike recent energy crises, today’s geopolitical shock is destroying supply rather than rerouting it, exposing the limits of the standard policy toolkit. Governments can mitigate its impact on those most exposed, but only if fiscal and monetary policy work in concert.", "summary_en": "Unlike recent energy crises, today’s geopolitical shock is destroying supply rather than rerouting it, exposing the limits of the standard policy toolkit. Governments can mitigate its impact on those most exposed, but only if fiscal and monetary policy work in concert.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/iran-war-energy-shock-requires-new-policy-toolkit-by-gene-frieda-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Why This Energy Shock Is Different\nCANNES—The Gulf ceasefire lasted barely three weeks. After Iranian attacks on three commercial ships in the Strait of Hormuz, the United States struck more than 80 targets, revoked Iran’s oil-sanctions waiver, and declared the memorandum of understanding “over.” Yet the market response was telling: Brent crude rose to around $79 per barrel—a meaningful jump, but far below April’s $120 peak, when the strait was closed outright. That gap between renewed war and restrained prices confronts policymakers with a key question: Is this the road back to blockade, or a violent renegotiation of the terms of passage?", "translation_ja": "", "vocab": []}, {"title_ja": "China’s Erasure of Tibet Is Accelerating", "title_en": "China’s Erasure of Tibet Is Accelerating", "summary_ja": "In recent years, the international community has stood idly by while China has systematically eradicated Tibetan culture and identity. With the authorities stepping up their assimilation efforts, Asia risks not only losing one of its oldest civilizations, but also facing a China that is bigger, bold", "summary_en": "In recent years, the international community has stood idly by while China has systematically eradicated Tibetan culture and identity. With the authorities stepping up their assimilation efforts, Asia risks not only losing one of its oldest civilizations, but also facing a China that is bigger, bold", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/china-erasing-tibet-culture-and-identity-to-strengthen-its-strategic-position-by-brahma-chellaney-2026-07", "state_media": false, "category": "オピニオン", "full_text": "China’s Erasure of Tibet Is Accelerating\n                        In recent years, the international community has stood idly by while China has systematically eradicated Tibetan culture and identity. With the authorities stepping up their assimilation efforts, Asia risks not only losing one of its oldest civilizations, but also facing a China that is bigger, bolder, and more powerful than ever.\n                    \n                        NEW YORK—The self-immolation of exiled Tibetan activist Lobga Rangzen outside United Nations headquarters in New York on July 2 was not an expression of personal despair. It was a desperate attempt to jolt the world out of its growing indifference to one of the most important international issues of our time: Tibet’s systematic erasure.\n        https://prosyn.org/4UhVJEN", "translation_ja": "", "vocab": []}, {"title_ja": "Burnham will have to master something Starmer couldn’t: the art of dealing with Donald Trump | Gaby Hinsliff", "title_en": "Burnham will have to master something Starmer couldn’t: the art of dealing with Donald Trump | Gaby Hinsliff", "summary_ja": "The new PM will need a superb foreign secretary and the ability to get like-minded countries on board. Early signs suggest he may have the right skills It’s all starting to feel very real now . Or so Andy Burnham said on the day he in effect became Britain’s official prime minister-in-waiting; a mom", "summary_en": "The new PM will need a superb foreign secretary and the ability to get like-minded countries on board. Early signs suggest he may have the right skills It’s all starting to feel very real now . Or so Andy Burnham said on the day he in effect became Britain’s official prime minister-in-waiting; a mom", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/10/andy-burnham-keir-starmer-donald-trump-foreign-secretary", "state_media": false, "category": "オピニオン", "full_text": "It’s all starting to feel very real now. Or so Andy Burnham said on the day he in effect became Britain’s official prime minister-in-waiting; a moment both heady and sobering.\nThe papers are signed, the die cast. Keir Starmer has yet to leave the building, but his party is already talking about him as if he somehow couldn’t hear. On Friday, Burnham made his first brutal break with his predecessor, apologising over Starmer’s head for Labour’s handling of the war in Gaza. The government should, he said, have called for a ceasefire earlier, and should now be increasing pressure on Israel.\nSince the Foreign Office is already considering further sanctions, that’s arguably less a dramatic foreign policy shift than a change of domestic tone. Recognising the deep anguish on the left over Gaza, which undoubtedly drove some Labour voters to the Greens, Burnham is signalling that for good or ill he’ll listen more closely to the grassroots than Starmer did. (Though some won’t be satisfied until he calls the war a genocide and bans arms sales.) But like any attempt to toughen British policy on Israel, it also raises some intriguing questions for his relationship with the White House.\nHow will the man Donald Trump dismissed as “the mayor of a town” deal, in office, with this impossible president? Though it’s business as usual in some ways – Burnham committed this week to the 3.5% Nato target for defence spending, though without explaining how it will be paid for, and to keeping Jonathan Powell as national security adviser – he enters office at a tipping point for the US’s relationship with the west.\nCanada’s prime minister, Mark Carney, is telling anyone who will listen – including the Burnham camp, to which he is well connected via his adviser Andy Haldane, his old deputy when he ran the Bank of England – that the old America isn’t coming back. Even Italy’s Giorgia Meloni, the president’s former favourite, seems to have lost patience with him.\nFrustration was palpable at this week’s Nato summit in Ankara, where Trump threatened to ban trade with Spain if it doesn’t obey his demands for more defence spending; confirmed his desire to own Greenland; and tore up a fragile Gulf ceasefire by resuming the bombing of Iran. More disconcerting even than the resulting rise in oil prices is the prospect of a new kind of rolling conflict in the Gulf that would be the lethal equivalent of Trump’s endlessly on-again, off-again trade wars, conducted with scant regard for existing norms or damage to allies.\nIn his bluntly titled new book Ten Steps to Prevent World War Three, the former Foreign Office minister and soldier Tobias Ellwood depicts a future where such conflicts are routine. It opens in 2040, imagining the west looking back and ruing the chances missed in the mid-2020s to avert disaster. For by 2040, it’s too late: Trump’s bulldozing of rules-based world order has allowed China to occupy the vacuum, building a new order through strategic alliances with Russia and others that is based on coercion, destabilisation and deniable attacks.\nEllwood’s third world war isn’t one territorial battle but a series of localised and proxy conflicts around the globe, creating a climate of near-permanent violence and insecurity in which battlefield taboos – including over the use of tactical nuclear weapons – are routinely broken. Greenland is gone, Nato collapsed, and western governments reduced to managing decline. Climate disasters or disease outbreaks hit harder than they otherwise would have, because countries won’t cooperate against shared threats. It’s just one possible scenario, Ellwood stresses, not a prediction. But it’s a little too plausible for comfort.\nHis prescription for avoiding it begins with defining exactly which bits of the rules-based world order the west seeks to defend, and then circling the wagons of like-minded countries around them. Rejoin the single market, share renewable energy technology with poorer countries, widen European military participation in rapidly deployable forces, and forge a new “stability alliance” of middle-ranking powers – from Europe to Canada, and India to Brazil – focused on early prevention and de-escalation of conflicts before they reach all-out war.\nThis agenda isn’t a terrible fit for Burnham, whose skill as a mayor was in convening alliances of the like-minded, and who already preaches early intervention in domestic policy. But it leaves open the question of how far to go in confronting the man it’s designed to contain. The case for making nice with Trump has always been that lives depended on it: Ukraine needed US help to fight Russia, Europe needed time to re-arm, and Britain relies too heavily on Washington for its nuclear deterrent and for intelligence sharing to play hardball.\nBut the threat to Greenland, repeated this week, convinced many European leaders that something had to change. Ukraine still needs US assistance, but less than it did now, having built up its own defence manufa", "translation_ja": "", "vocab": []}, {"title_ja": "Democrats need to rethink their image of a ‘man of the people’ | Judith Levine", "title_en": "Democrats need to rethink their image of a ‘man of the people’ | Judith Levine", "summary_ja": "For progressives too, working-class heroes are bearded, buff white guys. Their treatment of women can be overlooked Ana Marie Cox’s New Republic profile of the Maine oyster farmer and former Democratic senatorial candidate Graham Platner begins with an encounter on the shore with a salt in rubber bo", "summary_en": "For progressives too, working-class heroes are bearded, buff white guys. Their treatment of women can be overlooked Ana Marie Cox’s New Republic profile of the Maine oyster farmer and former Democratic senatorial candidate Graham Platner begins with an encounter on the shore with a salt in rubber bo", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/10/graham-platner-democrats-image", "state_media": false, "category": "オピニオン", "full_text": "Ana Marie Cox’s New Republic profile of the Maine oyster farmer and former Democratic senatorial candidate Graham Platner begins with an encounter on the shore with a salt in rubber boots. Learning that she’s looking for Platner, the guy says: “Good man.”\nIn the 2025 article, Cox is charmed by Platner, who’s as voluble as this guy is terse. She’s impressed by the oyster, calling it a metaphor for “how labor, science, and regulation can still stitch together a community and economy.”.\nShe is unvexed by one of Platner’s biggest contradictions – his protest of the war in Iraq, followed by his enlistment to fight in it, his three voluntary tours of duty with the reputedly badass marines, plus one with the army in Afghanistan. “I might have read too much Hemingway,” explains Platner, who returned from the wars in 2008 with numerous physical injuries and a case of PTSD.\nWrites Cox: “It reminds me of some boys I grew up with. Young men for whom joining the military and radical protests were both ways of proving you could take more than most people could handle.”\nMuck-smeared, disheveled, battle-scarred yet a little bookish, Platner was the very model of the working-class political hero. “If Bernie is what righteous anger sounds like,” says Cox, “Platner is what it sounds like when that anger represents longing for connection.”\nFor more than a year, his allies strained to keep connecting. Progressives agreed to overlook the Nazi-adjacent tattoo, whose meaning Platner claimed not to have understood. When it was revealed that he’d used the “R” word on social media, they accepted his apology: “I am endeavoring to improve, every single day. I am not a perfect person.”\nSupporters in Maine defended him when his primary opponent, the Maine governor, Janet Mills, ran an ad highlighting social media posts in which Platner appeared to blame victims of rape. Under one Reddit post about rape prevention, he commented: “How about people just take some responsibility for themselves and not get so fucked up they wind up having sex with someone they don’t mean to?”\nEach time he was challenged, he vowed that he is a different person than he was then.\nEven after Jenny Racicot, a woman he dated and a political compatriot, accused him of raping her, the feminist state representative Valli Geiger posted that while she would never “slander” Racicot, she believes “Graham is a man becoming a better man and working hard on it”.\nBut on Monday, when Politico published a detailed, highly convincing account of Racicot’s experience, and she told CNN that Platner had “absolutely” raped her, most of his allies decided they’d taken more than they could handle.\nOn Wednesday night, in an 11-minute video suspending his campaign, Platner vehemently denied Racicot’s accusation. The distress and lividness in his face signaled honesty. It is possible that if he did it, he may not know he did. Racicot told Politico he was “almost blackout drunk” that night; he fell asleep afterward and didn’t remember any of it the next morning. We may never know, or find out why she came forward now, when the party has less than a month to choose a replacement.\n“We’re not doing it because of the allegations,” said Platner in the video. “We’re doing it because of the structures that are being taken away from us by those in power.” It is unclear whom Platner is blaming for his downfall: Racicot, anyone who persuaded her to speak up or the Democratic establishment, which abandoned him. He is blaming everyone but himself.\nCredible as I find Racicot’s account based on the reporting to date, I suspect more people might have defended him were it not for the unceasing ickiness preceding it. But why did everyone put up with the ickiness until now?\nHere’s my take: a party aching for working-class cred – and progressives aching for real working-class politics – feel they’re in no position to be picky. The working-class hero doesn’t even have to be working-class. Platner is a private school graduate, son of a lawyer and a restaurateur, and grandson of a prominent architect. His main source of income is almost $5,000 a month in veterans’ benefits.\nBut what they feel least picky about is how a candidate regards or treats women.\n“Voters don’t want authentic,” noted the New York Times Opinion page writer Michelle Cottle. “They want authentically charming and folksy and looking regular guy-y.”\nCottle may not be suggesting this, but by the unacknowledged logic of candidate selection, across the political spectrum, “regular” means white and “guy-y” means masculine. Only this regular guy can reach the alienated “working-class” voter – because, it is assumed, “working class” also means white and male.\nThis imagined white, male, working-class voter, furthermore, cares about one “real” issue: his pocketbook. He might also care about the wars in Gaza and Iran, about corruption and healthcare. But what he feels least picky – or icky – about is how a candidate treats women. Because he is a he, “wo", "translation_ja": "", "vocab": []}, {"title_ja": "The Nato summit exposed the real source of Trump’s power | Robert Reich", "title_en": "The Nato summit exposed the real source of Trump’s power | Robert Reich", "summary_ja": "It comes from his willingness to violate all norms, rules and laws – and leaving everyone else to pick up the pieces At the Nato summit just ended, Trump lashed out at other Nato members, saying he was “very disappointed with Nato” and asking: “Why are we spending hundreds of billions of dollars, an", "summary_en": "It comes from his willingness to violate all norms, rules and laws – and leaving everyone else to pick up the pieces At the Nato summit just ended, Trump lashed out at other Nato members, saying he was “very disappointed with Nato” and asking: “Why are we spending hundreds of billions of dollars, an", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/10/nato-summit-trump-power", "state_media": false, "category": "オピニオン", "full_text": "At the Nato summit just ended, Trump lashed out at other Nato members, saying he was “very disappointed with Nato” and asking: “Why are we spending hundreds of billions of dollars, and they’re not there for us?” He reiterated his desire to take over Greenland, blasted European energy and immigration policies, insulted Spain, and worried allies by declaring that the fighting between Kyiv and Moscow “doesn’t affect us”.\nYet throughout the proceedings, Trump was treated by other Nato powers with as much courtesy and respect as any US president has ever received from Nato – perhaps more. “It was a great meeting, there was a lot of love in that room, a lot of unity,” Trump said when it was over.\nWhat happened? It’s important to understand the source of Trump’s power.\nHis power doesn’t come from his being president of the most powerful nation in the world. In fact, his arbitrary tariffs, absurd war in Iran, and outright abduction of Nicolás Maduro have reduced the US’s standing in much of the world.\nNor does his power come from his Maga base, which is now having second thoughts about supporting someone who got the US involved in another Middle Eastern war, caused prices to rise, and whose administration still refuses to release the complete Epstein files.\nNor does his power flow from any kind of strategic brilliance or cunning.\nTrump’s power comes from his willingness to violate all the norms, rules and laws about how US presidents are supposed to act – to do anything that helps him accumulate more wealth, power and glory, and wreak vengeance on anyone who has tried to get in the way.\nThe Nato presidents and prime ministers treated Trump with extraordinary deference because they’re afraid of what he might do if he doesn’t get what he wants.\nWhether it’s Nato, Iran, the World Cup, the 2020 election, making billions off his presidency – or anything else – he’s unconstrained by norms, rules, treaties and laws.\nWhen the global community of World Cup fans objected to his intervention last weekend on the side of the US, he responded: “If [Belgium] beat us, then they can be really proud. The other way, if they beat us, we’ll say it was – I’d say – it was rigged, just like the election was rigged in 2020.”\nNote how he corrected himself – from we’ll say to I’d say. Ethics is all about “we” – our collective judgment about what’s right or wrong. Trump doesn’t give a fig for the world’s or the nation’s judgment about right or wrong. He doesn’t think about right or wrong.\nWe’ve been missing the boat by characterizing Trump as breaching ethical standards. Ethics assumes some sort of agreed-upon standards against which a breach can be defined and measured. But Trump doesn’t have any standards at all. His entire approach to life, to business, and now to the presidency, has nothing whatever to do with standards. It’s about winning at all costs. Whatever it takes.\nTrump isn’t unethical. He’s non-ethical. He isn’t immoral. He’s amoral.\nIt’s hard for most of us to conceive of living in a Trumpian world without standards, norms, rules or laws – a world composed only of transactions and calculations in which the only test is what’s in it for me and at what cost.\nAnd that difficulty most of us have of imagining such a world is itself the key to Trump’s power.\nWhether you’re president of the United States or anyone else, it’s always possible to extract personal benefits by being the first to break a widely accepted norm.\nThink of a small town where people don’t lock their doors or windows because of the unwritten rule that no one steals. Under these circumstances, the first thief to commit robberies operates at a huge advantage. He can effortlessly get into anyone’s house.\nThis first-mover advantage disappears as soon as people catch on and start locking their doors and windows. But the thief doesn’t bear the costs of the locks or the hassle of locking all the doors and windows. He exploits the community’s trust. Then, once he destroys that trust, he leaves it to them to protect themselves against such future violations.\nThat asymmetry – small cost for the violator of trust, large costs for everyone who has to thereafter protect themselves – is the very essence of Trump’s MO. He gains wealth, power and glory for himself by shattering norms, after which everyone else has to pick up the pieces.\nAs president, he has far bigger norms to shatter than does a small-town thief, and at far greater benefit to himself.\nAs president, his thuggery has paid off, at least for himself. But it has also damaged all sorts of institutions that the US and the world have relied on – from Nato to Fifa to the US Department of Justice – institutions based on the trust that no American president would ever do what he’s done.\nHe’ll be remembered as the most powerful president the US has ever had, but also the worst.\nWhen he’s gone, all of us will be paying to clean up the mess. We’ll have to buy an infinite number of locks for an endless number of doors and windo", "translation_ja": "", "vocab": []}, {"title_ja": "How to Win the Defense Innovation Contest", "title_en": "How to Win the Defense Innovation Contest", "summary_ja": "America and its allies must pool their efforts.", "summary_en": "America and its allies must pool their efforts.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/how-win-defense-innovation-contest", "state_media": false, "category": "オピニオン", "full_text": "Washington’s alliances are under immense strain. Many allies and partners are subject to increased threats from great-power adversaries, and they are coming to doubt whether they can rely on the United States. The response to these pressures is to rearm. Like the United States itself, U.S. partners across Asia, Europe, and elsewhere are building up their defense industrial and technological bases to improve their ability to project power, deter enemies, and prevail in a protracted conflict.\nThe problem is that both the United States and its partners have treated their defense buildups primarily as domestic projects when what they need, in fact, is to pool their resources more effectively. The war with Iran demonstrates the risks of a siloed approach: American legacy platforms—stealth fighters, guided missile destroyers, and aircraft carriers—delivered potent attacks but could not eliminate Iran’s military threat. The conflict rapidly depleted U.S. stockpiles of high-end, long-range strike munitions and air defense interceptors, while U.S. bases, Gulf infrastructure, and shipping through the Strait of Hormuz proved vulnerable to cheap and plentiful Iranian missiles and drones. It was just the latest illustration that no single country, not even one as powerful as the United States, can by itself produce drones, ships, and critical munitions on a sufficient scale or develop a defense industrial base that is innovative and adaptable enough to prevail in a protracted, high-intensity conflict or to deter capable adversaries.\nThis is especially true at a time when the adversaries of the United States and its allies are themselves pursuing deeper defense industrial and technological cooperation. During the war in Ukraine, Iran has shared drone technology with Russia, and North Korea has provided munitions and troops. China, which is engaged in its own massive military modernization and industrial scaling projects, has offered Russia dual-use components and economic relief. Moscow, in return, is transferring advanced weapons, know-how, and intelligence to its partners.\nThe United States and a trusted circle of allies and partners—including NATO members; other U.S. treaty allies such as Australia, Japan, and South Korea; and capable partners such as Brazil, India, Israel, and Taiwan—are the world’s leaders in scientific and technological development. As such, they should be able to counter their rivals’ increasingly unified front. But their strengths will go underutilized or misallocated unless they more closely align their efforts. The traditional model of government-to-government cooperation—formal mechanisms including the United States’ foreign military sales program, bilateral coproduction agreements, and NATO procurement processes—remains useful but is inadequate. This system allows too many opportunities for politics to derail progress, and it moves too slowly to keep pace with a battlefield where technological change happens in weeks rather than years.\nThe real momentum for effective and durable cooperation among U.S. allies and partners lies among the private companies and research institutions in which many of the technological innovations that yield cutting-edge military capabilities occur. To maximize the benefits of defense and technological collaboration, the U.S. government and its partners must pair national efforts with transnational ones: pooling allied capital, technical know-how, production capacity, and supply chains through networks of firms, universities, investors, and governments. Building these networks will not only make it possible to innovate more quickly and produce at scale. It will also reinforce the United States’ increasingly uneasy alliances and partnerships, providing durable connections that can withstand a transactional and turbulent world.\nPRIVATE-SECTOR POTENTIAL\nThe United States and its partners are ramping up their defense production capacity and advancing defense innovation. New technologies that originated in the commercial sector, including outer space–based sensors, artificial intelligence, and autonomous systems, have transformed the battlefield in the past five years. The speed with which new technologies are developed and adopted has picked up, too, as demonstrated by the fast-paced innovation in drone technology in Ukraine. Countries are adjusting their innovation processes accordingly. The U.S. military, for instance, has acquired a drone system called LUCAS that is a copy of the Iranian Shahed drone. Last year, the Pentagon launched an ambitious acquisition program designed to make the adoption of new technologies faster and easier, and earlier this year, Secretary of Defense Pete Hegseth announced an aggressive strategy to integrate AI across the department. U.S. allies such as Germany and Japan and partners such as India, meanwhile, have streamlined their innovation structures and processes to better harness commercial technologies.\nBut current efforts prioritize", "translation_ja": "", "vocab": []}, {"title_ja": "Iran Is Losing Iraq", "title_en": "Iran Is Losing Iraq", "summary_ja": "Baghdad goes its own way.", "summary_en": "Baghdad goes its own way.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/iran/iran-losing-iraq", "state_media": false, "category": "オピニオン", "full_text": "Whenever the Iran war comes to an end, the Islamic Republic is likely to emerge in a stronger position. Should the terms of a June memorandum of understanding be met, Western governments would lift many sanctions on Tehran and the country would gradually be reintegrated into the global economy. Iranian control of the Strait of Hormuz, once an open waterway, might be formalized through some kind of joint tolling system. And Iran might be free to reconstitute its ballistic missiles and drone capabilities, weapons that proved very useful in the most recent months of fighting.\nBut at least in one area, the war has left Iran notably weaker: Iraq. Ever since the toppling of the Iraqi dictator Saddam Hussein in 2003, Iran has been able to exercise a great deal of influence over its western neighbor. It has embedded itself within Iraq’s Shiite political establishment, mediating between rival factions, shaping successive governments, and using Iraq to gain hard cash through smuggling and currency exchange networks. Iran supported many of the Iraqi paramilitary groups that helped defeat the Islamic State, also known as ISIS, in 2017. Iraqis still grew to resent Iran’s overweening influence in their country, not least because of the involvement of Iranian-backed militias in a brutal crackdown on anticorruption protesters in 2019 and 2020. Now, the tumult of recent months has further tilted Iraqis against Iran’s desire to make their country a staging ground of resistance to the United States and Israel. Leaders of political parties and militia groups that once hewed close to Tehran are pulling away.\nIn early June, fighters from Saraya al-Salam, a militia loyal to the Iraqi Shiite cleric Muqtada al-Sadr, gathered in the city of Samarra to hand over their weapons to the Iraqi government. That disarmament marked the group’s withdrawal from the Popular Mobilization Forces, a powerful umbrella coalition of mostly Shiite militias that exists at once inside and outside the Iraqi state. Saraya al-Salam’s thousands of fighters were the first to pull out of the alliance, and they have not been the last: Asaib Ahl al-Haq, a powerful Iranian-backed militia, announced that it, too, would leave the PMF.\nSeveral prominent Iranian-backed militias remain doggedly committed to advancing Tehran’s interests in Iraq and the wider region. But the splintering of the PMF is a real blow to Iran. The so-called axis of resistance, Iran’s network of proxies across the region, has been badly damaged since Hamas’s October 7, 2023, attacks on Israel and Israel’s subsequent campaigns in Gaza and Lebanon. But in Iraq, the Iranian-aligned militias had largely stayed out of the fight and maintained their strength and standing. That position is now unraveling; Iran’s allied militias are being pushed toward the margins of Iraqi politics. And as Tehran’s hold loosens, Iraq glimpses a tantalizing future—one in which it might set its own path, free from the direction of the Islamic Republic.\nMONOPOLY ON VIOLENCE\nBefore Israeli and U.S. forces attacked Iran in February, the Iraqi government pursued a determined, albeit increasingly strained policy: to balance between Washington and Tehran, maintaining ties with both while staying out of their confrontations. The fighting that followed the launch of Operation Epic Fury, however, made that posture impossible. Iraq became a theater of operations as Iran and Iranian-backed forces struck U.S. positions inside the country; diplomatic missions belonging to the United Arab Emirates and the United States; and Iraqi security, energy, and civilian infrastructure, particularly in the autonomous region of Iraqi Kurdistan. They also carried out strikes from Iraqi soil against targets in nearby Gulf countries. The United States retaliated against the Iranian-backed militias in Iraq, with the Iraqi government watching like a bystander. Baghdad was finally forced to face a question it had long avoided: Who controls the use of force within Iraq’s borders?\nOver the past decade, Iraq had allowed Iranian-aligned groups to take over many functions of the state. The PMF was formally integrated into Iraq’s defense system in 2016. On paper, it is meant to report to the Iraqi prime minister, the country’s commander in chief. In practice, those factions retained their own chains of command and loyalties, often to Tehran. The Baghdad government allowed the militias to claim the resources of the Iraqi state and the legitimacy of being the state’s representatives even as those very militias denied the state the monopoly on force that would make it sovereign.\nA newly formed government under Prime Minister Ali al-Zaidi, whose selection in May was endorsed by U.S. President Donald Trump, has made disarming the militias a priority. It has been able to encourage PMF actors to leave the coalition and integrate with the state. If these efforts gather further momentum, Baghdad may be able to rein in the Iranian-aligned militias and assert greater", "translation_ja": "", "vocab": []}, {"title_ja": "How to Save the UN From Irrelevance", "title_en": "How to Save the UN From Irrelevance", "summary_ja": "Ending the peacekeeper’s paralysis.", "summary_en": "Ending the peacekeeper’s paralysis.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/ukraine/how-save-irrelevance", "state_media": false, "category": "オピニオン", "full_text": "In early September 2022, in the no man’s land between the military frontlines of Ukraine and Russia, I had a decision to make: press on under fire, to establish a team of International Atomic Energy Agency safety experts at Europe’s largest nuclear power plant, or turn around. It had taken weeks of diplomacy to get this far; we decided to push on. Our armored vehicles zigzagged to avoid land mines, jostling the IAEA symbol on our jackets—a spinning atom surrounded by the two olive branches that the organization shares with the UN. As we drove past bombed buildings, burned-out cars, and families fleeing westward toward safer parts of Ukraine and its bordering countries, talk turned to whether Europe would have enough gas reserves for the winter.\nThe line between conflict and international consequences is thinning. Wars are displacing a record number of people and upending global trade and energy networks. The integrated global economy built after the Cold War, in which goods, capital, and technology flow relatively freely across borders, is fraying. The traditional separation of trade, security, development, and environmental concerns has become increasingly artificial. Cyber vulnerabilities, too, are expanding beyond mere technical concerns to affect vital infrastructure, energy grids, elections, and banking systems. As diplomatic standoffs and military conflicts disrupt supply chains, countries are moving to decouple.\nThe return of war to Europe has reshaped security perceptions and strategic calculations across the continent. In the Middle East, cycles of confrontation are generating consequences that extend well beyond the region, contributing to political divisions and disrupting energy markets, trade routes, food prices, and confidence in the world economy. In Asia, competition now spans military, economic, technological, and maritime domains. In Africa, demographic growth and economic potential run up against unequal access to finance and uneven institutional capacity. In Latin America and elsewhere, more sophisticated transnational criminal networks are exploiting global markets, financial systems, ports, logistics chains, and governance gaps. In this system, the consequences of failure travel faster and wider than ever before.\nMeanwhile, multilateralism and international law and norms, which reduce the chances of catastrophic errors, provide stability, and offer shared solutions to shared problems, have come under strain as they struggle to adjust to these structural shifts. Most of the nuclear arms reduction and control treaties forged during the Cold War, such as the New Strategic Arms Reduction Treaty and the Intermediate-Range Nuclear Forces Treaty, are dead or weakened. Major nuclear arsenals are modernizing and expanding, rather than getting smaller, and the channels of communication that reduce the risk of miscalculation between powerful states have eroded. In some countries that have upheld their legal obligations to not develop nuclear weapons, debates have emerged over the merits of pursuing them.\nToday, we are at greater risk of a major conflagration, including a nuclear one, than at any time since World War II. As the generations that experienced the horrors of two world wars and built the frameworks to prevent a third disappear, so does the memory of the consequences of unchecked global rivalry. The United Nations—which, despite its shortcomings, has in the past 80 years facilitated shared responses to common threats, supported decolonization, and helped prevent World War III—has been so weakened that some commentators suggest that it is heading the way of the League of Nations. Just when the world needs it most in the quest for peace, the UN is absent, including from the war in Ukraine; the confrontation involving the United States, Israel, and Iran; and regional conflicts in Asia and Africa.\nThe UN cannot be expected to prevent or end every war, but working toward that end is its core task. It can again become a capable, impartial, and present broker for peace. Failing to be in the room where it happens creates disillusionment and puts the UN on a path to irrelevance. Institutions that cannot explain where they add value become vulnerable to indifference, and indifference in the current climate is not a passive condition—it is actively eroding the UN’s finances and political will. The UN has a liquidity crisis, which, at its core, is a crisis of confidence in the institution by its member states.\nThe most immediate action that the international community can take to address this crisis of confidence is in its choice of the next secretary-general, for which I am contending. History suggests that a more active secretary-general, who goes into the field to prevent conflict and who is present at tables where diplomatic solutions are negotiated, can be effective, even in a deeply divided world.\nNATIONS FOR PEACE\nThe United Nations should focus on reducing the conditions that produce crises", "translation_ja": "", "vocab": []}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

  if(navigator.share){navigator.share({title:"Morning Read",url:url});}

}
