t reactionaries. Elected western politicians who appease autocrats, excuse the inexcusable and criminalise their opponents as terrorists fuel this invidious moral collapse. Yet the fault is shared. Potentially complicit, too, is every citizen, high or low, who fails to speak out.\nWhere may moral leadership be found in these shiftless times? Pope Leo, for one, is seeking a way out of the swamp. Speaking in April, he decried “a world ravaged by a handful of tyrants”, leaving little doubt in Washington, Moscow and Jerusalem who he meant. He has repeatedly deplored the evils of war-making and concomitant failures to fund the global fight against poverty, ignorance and disease. And he has fiercely condemned Vance and the US defence secretary, Pete Hegseth, who claim divine justification for acts of aggression. “Woe to those who manipulate religion and the very name of God for their own military, economic and political gain, dragging that which is sacred into darkness and filth,” Leo declared.\nLeo is not just talk. He has a plan. Presiding over a “consistory” – a rare gathering of all the Catholic church’s cardinals – in Rome last weekend, he sought to tighten up the just-war theory of St Augustine and St Thomas Aquinas that is frequently hijacked to legitimise so-called preventive wars of choice. Leo argues war is only morally justified for “proportional self-defence”, and only after all peaceful options are exhausted. “War is never worthy of humanity, and it is never blessed by God,” he told the cardinals. “War is not merely a conflict between states”, but originates in “a culture of power”. The world must “rebuild a culture of cooperation”.\nThis struggle for the soul of today’s newly adversarial world order has dra", "translation_ja": "ドナルド・トランプ、ウラジーミル・プーチン、ベンヤミン・ネタニヤフの三者には何が共通しているのか。答えは、善悪を判断する能力の慢性的な欠如である。現在世界で最も大きな害をもたらしているこの三人の指導者は、暴力への偏愛、冷え冷えとするほどの共感の欠如、そして妄想と混じり合った異常なまでの自己中心性を共有している。しかし彼らを最も深く結びつける特徴は、基本的な道徳基準の拒絶、あるいはそれを理解できないことである。さらに悪いことに、これらの人物は少なくとも公の場においては、根本的に非道徳的な行動をとることが常態化している。そしてそれは誰にとっても問題である。彼らの道徳的な病は伝染するのだ。\n\n絶対的な意味で何が正しく何が間違っているかという考え方は、アリストテレスからカントに至るまでの道徳哲学者たちが示してきたように、常に論争の的となる。カトリック信者の指導者である教皇レオは最近、「私たちは、すべての人にとって何が真に善であるかを認識することさえ困難になりつつある時代に生きている」と警告した。しかし、ほとんどの人は、ほとんどの場合、他者と共有する個人的な道徳規範を守っている。たとえば、殺すこと、盗むこと、欺くこと、嘘をつくことは間違いであるという広い合意が存在する。表面上は世俗化した時代にあっても、2020年には世界人口の76%が何らかの宗教と結びついていた――これは個人と集団の道徳性の力強い表れである。\n\nプーチンのロシアはウクライナに意図的にミサイルを撃ち込み、民間人を無差別に殺している。ほとんどの人の感覚では、それは非道徳的である。ネタニヤフのイスラエルは、国連が言うように、ガザの子どもたちを標的にすることでいまだ集団虐殺を続けている。それもまた非道徳的である。そしてトランプ政権の道徳的堕落は際限を知らない。米副大統領JDヴァンスは先週、リチャード・ニクソンの大統領職を粉砕したウォーターゲート事件は今日では大した問題にならないだろうと主張した。ニクソンは米国憲法を覆す陰謀を企て、犯罪行為を行い、国民に嘘をついた。しかしヴァンスの発言が示唆するように、そのような行為は今や当たり前のことなのだという。\n\n公職における非道徳的行為の正常化は、トランプの永続する遺産となるかもしれない。海外では、カリブ海での法外な殺害から、ウクライナと欧州の同盟国の裏切り、北京の人権侵害者への追従まで、その範囲は広がっている。イランへの違法なアメリカ・イスラエルによる戦争の開始時にミナブで起きた小学生の大量殺害は、軍事的に無能であり、道徳的に許し難いものだった。にもかかわらず、この残虐行為は隠蔽されるというよりも、傲慢に無視されている。国内では、トランプの名前は暗号資産による強欲、露骨な腐敗、スキャンダルと同義語となっている。しかし彼の恥知らずなメッセージは明確だ――これはすべて今や普通のことなのだ、と。\n\n国際法は理論上、別個の、非人格的な道徳規範を支持している。しかしその制約は日常的に回避され、その起訴状は無視されている。市民的義務と社会的責任という拘束力ある感覚といった他のカテゴリーの道徳的命令もまた、分極化した時代に侵食されている。道徳的なものはいかに一般的な幸福を増進するかによって決まるというジェレミー・ベンサムの功利主義的考えは、今日ではほとんど意味をなさない。億万長者、戦争犯罪人、巨大企業、AI、武器商人が支配する現代の政治的荒野において、普通の人々の幸福はほとんど計算に入らない。\n\n寛容さや平等権など、現代の進歩主義者やリベラル派が不変と思っていた原則は、節操のない極右ナショナリスト・ポピュリスト反動主義者によって損なわれている。独裁者に迎合し、許しがたいことを免罪し、反対勢力をテロリストとして犯罪視する選出された西側の政治家たちは、この有害な道徳的崩壊に拍車をかけている。しかし非難は共有されるべきである。声を上げることを怠るすべての市民も、高い地位にある者も低い地位にある者も、潜在的に共犯者となりうる。\n\nこのよるべない時代において、道徳的指導力はどこに求めればよいのか。教皇レオはその一人として、沼地からの出口を模索している。4月の演説で彼は「一握りの専制者によって荒廃した世界」を非難し、ワシントン、モスクワ、エルサレムのいずれを指しているかほとんど疑いの余地を残さなかった。彼は繰り返し、戦争行為の悪と、貧困・無知・疾病との世界的な闘いへの資金提供の失敗を嘆いている。そして彼は、侵略行為に神の正当性を主張するヴァンスと米国防長官ピート・ヘグセスを厳しく非難している。「自らの軍事的・経済的・政治的利益のために宗教や神の名そのものを利用し、神聖なものを闇と汚泥の中に引きずり込む者たちに災いあれ」とレオは宣言した。\n\nレオは口先だけではない。彼には計画がある。先週末にローマで開催された全カトリック教会枢機卿が集まる「コンシストリー」という稀な会議を主宰した彼は、いわゆる予防的な選択戦争を正当化するために頻繁に悪用されるアウグスティヌス聖人とトマス・アクィナス聖人の「正戦論」を厳格化しようとした。レオは、戦争が道徳的に正当化されるのは「均衡のとれた自衛」のためだけであり、すべての平和的選択肢が尽くされた後に限るとする。「戦争は決して人間性にふさわしいものではなく、神に祝福されることもない」と彼は枢機卿たちに語った。「戦争は単なる国家間の紛争ではなく」、「権力の文化」に端を発している。世界は「協力の文化を再建」しなければならない。\n\n今日の新たに対立的となった世界秩序の魂をめぐるこの闘いは、まだ……（原文ここで終了）", "vocab": [{"word": "predilection", "definition": "特定のものへの強い好み・偏愛を意味する名詞。「a predilection for violence（暴力への偏愛）」のように、しばしば否定的な文脈で使われる。"}, {"word": "concomitant", "definition": "何かに付随して同時に起こるという意味の形容詞・名詞。「concomitant failures（それに伴う失敗）」のように、ある事象と同時に生じる関連事象を指す改まった表現。"}, {"word": "invidious", "definition": "不公平で他者の反感や憤慨を引き起こすような、という意味の形容詞。「invidious moral collapse（有害な道徳的崩壊）」のように、特に不当または差別的な状況を批判的に表現する際に用いられる。"}, {"word": "utilitarian", "definition": "最大多数の最大幸福を道徳の基準とする功利主義に関する形容詞。哲学・政治・経済の文脈で頻繁に用いられる学術的な語。"}, {"word": "kowtowing", "definition": "権力者や目上の者に卑屈に従い媚びへつらうことを意味する動詞（kow-tow）の現在分詞形。もともと中国語由来で、地面に額をつける礼の動作から転じた表現。"}, {"word": "consistory", "definition": "カトリック教会において教皇が全枢機卿を招集して開く公式の評議会を指す専門用語。稀にしか開催されない重要な教会会議を意味する。"}, {"word": "extrajudicial", "definition": "正式な司法手続きや法的権限の範囲外で行われることを指す形容詞。「extrajudicial killings（法外な殺害）」のように、法的手続きを経ない処刑や拘束を批判する文脈で使われる。"}]}, {"title_ja": "軍と共和国：アメリカにおける文民統制の重要性", "title_en": "The Military and the Republic: Civil-Military Relations in America", "summary_ja": "筆者は、健全な文民軍事関係がアメリカ民主主義の根幹であると主張し、国内の政治問題を解決するために軍に頼ろうとする高まる誘惑に警鐘を鳴らす。ジョージ・ワシントンが文民権力への服従を範として示したことを引き合いに出しながら、政治的に論争的な任務に軍を過度に活用することは、軍の戦闘即応態勢と共和国そのものを損なうと論じる。筆者はアメリカの諸制度の継続的な改善を求めつつ、軍は選出された文民指導者の下に置かれるべきだと訴えている。", "summary_en": "The author argues that healthy civil-military relations are foundational to American democracy, warning against the growing temptation to rely on the military to solve domestic political problems. Drawing on George Washington's example of deference to civilian authority, the piece contends that overusing the military for politically contentious missions undermines both its combat readiness and the republic itself. The author calls for continuous improvement in American institutions while keeping the military subordinate to elected civilian leadership.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/military-and-republic-charles-q-brown", "state_media": false, "category": "オピニオン", "full_text": "Celebrations of America’s founding and reflections on its ideals often overlook the central role of civil-military relations. This is a mistake. In the Declaration of Independence, a chief complaint was that King George III “affected to render the Military independent of and superior to the Civil power.” George Washington himself worried about this abuse of power and went to great pains to avoid it in his own career. Throughout the Revolutionary War, he constantly deferred to the Continental Congress despite its calamitous delays and erratic instructions, because he recognized that his authority over the Continental Army flowed from the people’s representatives. Given his immense personal popularity, he was often encouraged to redress this or that political dysfunction, but he knew that the republic would suffer in the long run if the military were to become an instrument of the commander’s will rather than of the people’s elected leaders.\nThe United States has not recently had leaders of Washington’s popularity, but in other ways the present moment recalls the era that followed the country’s founding. Today, as it was then, there is gridlock in the civilian political system. Similarly, Americans today hold the military in high regard compared with civilian branches of government. When the public is confronted with a problem that seems too big for the civilian branches to solve, the reflex is to ask the military to handle it. Both Presidents Donald Trump and Joe Biden, for instance, looked to the military to play a leading role in responding to the COVID-19 pandemic.\nThe temptation for mission creep is understandable: the U.S. military is the most advanced in the world, with a budget two to three times that of its nearest competitor. As the recent capture of Venezuelan dictator Nicolàs Maduro demonstrated, U.S. service members can do things no other military in the world can do. And in the face of a genuine national disaster, the public will readily embrace the military’s help; during the Great Depression, for instance, President Herbert Hoover directed the military to set up relief camps and President Franklin Roosevelt ordered it to establish the Civilian Conservation Corps, which put unemployed men to work to develop public land.\nBut when presidents use the armed forces for more politically contentious missions, such as addressing domestic crime in cities, the work of the military becomes more fraught. Resorting to a military solution rather than fixing the underlying incapacity or dysfunction in civilian institutions diverts the military from focusing on its primary combat mission. And, as Washington knew, it is not the military’s job to save the republic from political impasses. Indeed, if you ask too much of the military, you risk the entire enterprise.\nTHE AMERICAN INHERITANCE\nA quarter millennium after the first Americans rejected monarchy, representative democracy remains an “experiment entrusted to the hands of the American people,” as Washington said in his first inaugural address. It has been tenderly handed down from generation to generation, and it has been bitterly contested. The Civil War was only the greatest test of whether this experiment could survive its divisions, as the United States has faced disagreements throughout its history, including in the agrarian discontent of the 1890s, the depression and isolationism of the 1930s, the progress and tumult of the 1960s, and the political polarization of recent years.\nIn each chapter, the best political leaders found inspiration to overcome political divisions in the ideals that prompted the first patriots. These leaders held dear the self-evident truths “that all men are created equal [and] endowed by their Creator with certain unalienable Rights.” Of course, those ideals, so well articulated by the founders, were not so well practiced by them. Thomas Jefferson held the pen for the stirringly universal Declaration of Independence, yet he also held people in bondage. Washington, the indispensable man, considered the institution of slavery to be indispensable to the nation’s prosperity (at least initially). All the founders left women out of the equation entirely. But the American experiment strengthens each time its leaders recognize that the founders’ project to create a more perfect union is an enduring one—one to be passed down to every generation.\nThe ideal was better than the reality 250 years ago, and so it is today. For every American institution, including the military, this project of continuous improvement takes concerted effort and is not easy. Indeed, despite its advantages, the U.S. military today must stay humble and learn the lessons of the wars in Ukraine and Iran, including questioning traditional assumptions of U.S. air supremacy. To maintain professionalism in its all-volunteer force, the military must also find new ways to remain connected to American society and to persuade capable young men and women from all walks of li", "translation_ja": "アメリカの建国を祝い、その理念を振り返る際、文民軍事関係という中心的な役割がしばしば見過ごされる。これは誤りである。独立宣言において、主要な不満の一つは、ジョージ三世が「軍を文民権力から独立させ、それより優位に置こうとした」ことであった。ジョージ・ワシントン自身もこの権力の乱用を憂慮し、自らの経歴においてそれを避けるために多大な努力を払った。独立戦争を通じて、彼は大陸会議の壊滅的な遅延や一貫性を欠いた指示にもかかわらず、常にその意向に従った。なぜなら、大陸軍に対する自らの権限は、人民の代表者から生じるものだと認識していたからである。絶大な個人的人気を誇っていた彼は、さまざまな政治的機能不全を是正するよう促されることが多かった。しかし、軍が人民の選出した指導者の意思ではなく、司令官個人の意思の道具となるならば、長期的に共和国が損なわれると彼は理解していた。\n\nアメリカは近年、ワシントンほどの人気を持つ指導者を輩出していないが、他の点では現在の状況は建国直後の時代を彷彿とさせる。当時と同様に今日も、文民政治システムには機能不全が存在する。同様に、今日のアメリカ人は政府の文民部門と比べて軍を高く評価している。文民部門では解決できそうもないと思われる問題に直面したとき、人々の反射的な反応は軍に対処を求めることである。例えば、ドナルド・トランプとジョー・バイデンの両大統領は、新型コロナウイルス感染症（COVID-19）のパンデミックへの対応において軍に主導的役割を求めた。\n\n任務の肥大化への誘惑は理解できる。アメリカ軍は世界最強であり、その予算は最も近い競合国の二倍から三倍に上る。最近のベネズエラの独裁者ニコラス・マドゥロの拘束が示したように、アメリカの軍人は世界の他のいかなる軍隊にもできないことを成し遂げることができる。そして、真の国家的災害に直面したとき、国民は喜んで軍の支援を受け入れる。例えば大恐慌の際、ハーバート・フーバー大統領は軍に救済キャンプの設営を命じ、フランクリン・ルーズベルト大統領は軍に市民保全部隊の創設を命じて、失業者に公有地の整備という仕事を与えた。\n\nしかし、大統領が都市部の国内犯罪への対処など、より政治的に論争的な任務に軍を投入する場合、軍の役割はより複雑になる。文民機関の根本的な機能不全を修正する代わりに軍事的解決策に頼ることは、軍が本来の戦闘任務に集中することを妨げる。そして、ワシントンが知っていたように、政治的行き詰まりから共和国を救うことは軍の仕事ではない。実際、軍に過度の負担を求めれば、その企図全体を危うくするリスクがある。\n\n【アメリカの遺産】\n\nアメリカが初めて君主制を拒絶してから四分の一千年が経過した今も、代議制民主主義はワシントンが最初の就任演説で述べたように「アメリカ国民の手に委ねられた実験」であり続けている。それは世代から世代へと大切に受け継がれ、そして激しく争われてきた。南北戦争は、この実験がその分断を乗り越えられるかどうかの最大の試練に過ぎず、アメリカは1890年代の農業不況、1930年代の恐慌と孤立主義、1960年代の進歩と混乱、そして近年の政治的分極化を含む、歴史を通じて数々の対立に直面してきた。\n\nそれぞれの時代において、最良の政治指導者たちは、最初の愛国者たちを突き動かした理念の中に政治的分断を乗り越えるためのインスピレーションを見出した。彼らは「すべての人は平等に創られ、創造主によって一定の譲渡不可能な権利を与えられている」という自明の真理を大切にした。もちろん、建国者たちによってそれほど見事に表現されたその理念は、彼ら自身によって必ずしも実践されていたわけではない。トーマス・ジェファーソンは感動的なほど普遍的な独立宣言の起草者であったが、同時に人々を束縛下に置いてもいた。なくてはならない人物であったワシントンは（少なくとも当初は）奴隷制度を国家の繁栄にとって不可欠な制度と考えていた。建国者たちは全員、女性を方程式から完全に除外した。しかし、建国者たちのより完全な連合を作るという計画は永続的なものであり、すべての世代に受け継がれるべきものだと指導者たちが認識するたびに、アメリカの実験は強化される。\n\n二百五十年前も理想は現実より優れていたし、今日も同様である。軍を含むすべてのアメリカの機関にとって、この継続的な改善という計画は協調した努力を必要とし、容易ではない。実際、その優位性にもかかわらず、今日のアメリカ軍は謙虚さを保ち、ウクライナとイランにおける戦争の教訓を学ぶ必要がある。それはアメリカの航空優勢に関する従来の前提を問い直すことを含む。志願制の軍隊における専門性を維持するために、軍はアメリカ社会との繋がりを保ち、あらゆる境遇の優秀な若い男女を説得する新たな方法を見出さなければならない。", "vocab": [{"word": "calamitous", "definition": "「壊滅的な、惨憺たる」という意味の形容詞。深刻な損害や苦難をもたらす状況を描写する際に用いられる上級語彙。"}, {"word": "mission creep", "definition": "「任務の肥大化」を意味する慣用表現で、当初の目標を超えて軍事・組織的な任務の範囲が徐々に拡大していく現象を指す。"}, {"word": "fraught", "definition": "「（危険・困難・不安などを）はらんだ、複雑で厄介な」という意味の形容詞で、ある状況が問題や緊張をはらんでいることを示す。"}, {"word": "polarization", "definition": "「極化、二極分化」を意味する名詞で、政治や社会において意見や集団が対立する両極端に分かれていく現象を指す。政治・社会科学分野で頻出の語。"}, {"word": "unalienable", "definition": "「譲渡不可能な、剥奪できない」という意味の形容詞で、主に法的・政治的文脈で、他者に移転したり取り上げたりすることのできない権利を指す際に使われる。"}, {"word": "agrarian", "definition": "「農業の、農地に関する」という意味の形容詞で、農業や農村社会・土地政策に関連する事柄を表す際に用いられる専門的な語彙。"}, {"word": "concerted", "definition": "「協調した、一致団結した」という意味の形容詞で、複数の人や組織が共通の目標に向けて計画的・組織的に取り組む様子を表す。"}]}, {"title_ja": "トゥキュディデスの誤読：知恵なき力は破滅を招く", "title_en": "Misreading Thucydides: Strength Without Wisdom Leads to Ruin", "summary_ja": "筆者は、トランプ政権の高官やニーアル・ファーガソンのような論者が、メロス対話を力の政治の正当化として引用することでトゥキュディデスを根本的に誤読していると主張する。『ペロポネソス戦争史』を丁寧に読めば、トゥキュディデスは強者の傲慢さに対して警告を発していたことが分かる。メロス島の破壊はアテネのシチリア遠征での惨敗への序章であり、真の教訓は力の万能ではなく、無節操な野心が自滅を招くというものである。", "summary_en": "The author argues that Trump administration officials and commentators like Niall Ferguson have fundamentally misread Thucydides by citing the Melian Dialogue as an endorsement of raw power politics. A careful reading of The Peloponnesian War reveals that Thucydides actually warned against the hubris of the strong, using Athens's destruction of Melos as a prelude to its catastrophic defeat in Sicily. The true lesson of Thucydides is not that strength justifies everything, but that unchecked ambition leads to self-destruction.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/strong-do-what-they-can-and-suffer-what-they-must", "state_media": false, "category": "オピニオン", "full_text": "It seems to many these days that the world is a jungle beholden only to one law. Since returning to office in 2025, U.S. President Donald Trump has not only made a spectacle of American power—by striking alleged drug smugglers in the Caribbean, kidnapping Venezuelan President Nicolás Maduro, bombing Iran, and even threatening the sovereignty of allies—he has also made a principle out of it. Trump described Maduro’s capture as a vindication of the “iron laws that have always determined global power.” In a similar vein, White House Deputy Chief of Staff Stephen Miller asserted in January that the world is “governed by force” and “governed by power” and that “these are the iron laws of the world since the beginning of time.” Observers heard in these blunt statements echoes of Thucydides, the ancient Athenian aristocrat often considered the first proponent of the cold-blooded doctrine of realism. The Peloponnesian War, his magisterial opus on Athens’ doomed decades-long conflict with Sparta in the fifth century BC, includes the famous line, “The strong do what they can and the weak suffer what they must.”\nThat well-known line comes from an important section of the text known as the Melian Dialogue, in which representatives of Athens browbeat emissaries from the island of Melos. After the Athenians fail to persuade the Melians to accept unconditional surrender, they kill all the island’s men and enslave its women and children. Thucydides’s Melos passage has long been cited as proof that little governs the world beyond strength and its exercise—and as evidence that the brilliant Athenian general, historian, and philosopher himself believed that. Generations of students of international relations have been assigned these decontextualized snippets from his vast work and instructed that this was indeed Thucydides’s lesson. Today, a cottage industry of commentators now celebrate (or bemoan) what is described as a Thucydidean turn in American foreign policy. In “How Trump Won Davos,” an essay published in January, the historian Niall Ferguson explicitly invoked the Melian Dialogue to tout the triumph of Trump as a realist in the mode of Thucydides and asserted that, at Melos, “the realists won an emphatic victory.”\nBut that understanding of both the dialogue and its author gets his meaning fundamentally backward. Thucydides repeatedly refers to, but never endorses, the idea that the strong have the freedom to do what they want: to the contrary, a careful reading of The Peloponnesian War suggests a rather different view. Among the principal lessons to learn from Thucydides is that the ambition of the strong can lead to their own undoing. Right after Thucydides reports the fateful words of the Athenian envoys and the subsequent destruction of Melos, he describes at great length the disastrous campaign Athens pursued in Sicily—an effort that eventually led to Athenian defeat and Spartan victory. In this light, the Melian Dialogue is not proof of the great virtue of strength in international relations but an illustration of pride before the fall.\nThe political scientist Graham Allison famously coined the term “Thucydides trap” to refer to the dynamic inherent in The Peloponnesian War, of how the tensions between a rising power and an existing power will invariably bubble over into conflict. The real Thucydides trap, however, is different. The crucial lesson of the book is not to sketch how Athens and Sparta found themselves sleepwalking into a war that neither side wanted or understood. As Thucydides elaborately elucidates, both went into the conflict with eyes wide open. Moreover, in his view, the start of that war was hardly a trap. Thucydides supported the commencement of hostilities and the careful strategy of Pericles, the Athenian leader who rallied the public behind his demand for war with Sparta. The true catastrophe, and the real trap, occurred many years later, when Athens abandoned Pericles’s prudence and became recklessly ambitious, most grimly demonstrated by the misguided bid to conquer Sicily.\nThe central tragedy of The Peloponnesian War is the story of growing Athenian arrogance and hubris and its fateful consequences. Modern-day Athenians, trumpeting the virtue of strength, would do well to heed Thucydides’s warnings if they don’t want to court their own disasters.\nTRUTH IN THE TALE\nThe Melian Dialogue indeed offers vital lessons, but only if it is understood in the context of The Peloponnesian War as the book was written. That requires familiarity not with a few selected sentences but with the content of the entire work—and with Thucydides’s brilliant, precise, and overarching method. In his estimation, the 27-year conflict (431–404 BC) between Athens and Sparta unfolded in three distinct phases: an initial ten years of direct conflict, an uneasy seven-year interregnum of constant skirmishes and jockeying for position, and then another ten years of war before Athens’s unconditional surrender. Thucydides ", "translation_ja": "今日、世界はただ一つの法則にのみ支配されるジャングルであると多くの人が感じているようだ。2025年に再び政権に就いて以来、ドナルド・トランプ米大統領はアメリカの力を誇示するだけでなく——カリブ海で麻薬密輸業者とされる人物への攻撃、ベネズエラのニコラス・マドゥロ大統領の拉致、イランへの爆撃、さらには同盟国の主権への脅しなど——それを原則にまで高めてきた。トランプはマドゥロの拘束について、「世界の力を常に規定してきた鉄の法則」の正当性が証明されたと述べた。同様に、ホワイトハウスの副首席補佐官スティーブン・ミラーは1月、世界は「力によって統治され」「権力によって統治される」のであり、「これは太古の昔から続く世界の鉄の法則だ」と主張した。観察者たちは、こうした率直な発言の中に、冷徹なリアリズム理論の最初の提唱者とも言われる古代アテネの貴族、トゥキュディデスの声を聞き取った。スパルタとの数十年にわたる運命的な戦争を描いた彼の傑作『ペロポネソス戦争史』には、有名な一節がある。「強者はできることをし、弱者は甘受しなければならないことを甘受する。」\n\nこの有名な一節は、テキスト中の重要な箇所、いわゆる「メロス対話」から来ている。そこではアテネの使節がメロス島の代表者を力で押さえつける様子が描かれている。アテネ人が無条件降伏を受け入れるようメロス人を説得することに失敗した後、彼らは島の男性を全員殺し、女性と子供を奴隷にした。トゥキュディデスのメロスの場面は長らく、世界を支配するのは力とその行使以外にほとんど何もないことの証拠として引用されてきた。そして、この卓越したアテネの将軍・歴史家・哲学者自身がそれを信じていたという根拠としても引き合いに出されてきた。国際関係論の学生たちは世代を超えて、彼の膨大な著作から文脈を無視して切り取られたこうした一節を課題として与えられ、これこそがトゥキュディデスの教えであると指導されてきた。今日では、アメリカの外交政策における「トゥキュディデス的転換」と称されるものを称賛する（あるいは嘆く）論者たちの一大産業が生まれている。1月に発表された論稿「トランプはいかにしてダボスを制したか」の中で、歴史家ニーアル・ファーガソンはメロス対話を明示的に引用し、トゥキュディデス流のリアリストとしてのトランプの勝利を称え、メロスにおいて「リアリストたちは圧倒的な勝利を収めた」と断言した。\n\nしかし、そのような対話とその著者の理解は、彼の意図を根本的に取り違えている。トゥキュディデスは、強者が望むことを自由に行えるという考えを繰り返し言及しながら、決してそれを支持していない。それどころか、『ペロポネソス戦争史』を注意深く読むと、まったく異なる見解が浮かび上がる。トゥキュディデスから学ぶべき主要な教訓の一つは、強者の野心が自らの破滅につながりうるということだ。アテネの使節の運命的な言葉とその後のメロスの破壊を記録した直後、トゥキュディデスはアテネがシチリアで追求した壊滅的な遠征を詳細に描写している——それはやがてアテネの敗北とスパルタの勝利につながった遠征だ。この観点から見れば、メロス対話は国際関係における力の偉大な美徳を証明するものではなく、「驕る者の没落」を示す実例なのである。\n\n政治学者グレアム・アリソンは、『ペロポネソス戦争史』に内在するダイナミクス、すなわち台頭する大国と既存の大国の間の緊張が必然的に衝突へと発展するという動態を指して「トゥキュディデスの罠」という言葉を広めた。しかし、真のトゥキュディデスの罠はそれとは異なる。この書の本質的な教訓は、アテネとスパルタがいかにして双方とも望まなかった、あるいは理解していなかった戦争へと夢遊病者のように歩み込んでいったかを描くことではない。トゥキュディデスが詳細に解明しているように、双方は目を開けたまま戦争に突入した。さらに彼の見解によれば、その戦争の始まりは罠などでは全くなかった。トゥキュディデスは、スパルタとの戦争を求めて民衆を糾合したアテネの指導者ペリクレスの慎重な戦略と開戦の決断を支持していた。真の惨事、そして真の罠は、何年も後にアテネがペリクレスの慎慮を捨て、無謀な野心に身を委ねた時に生じた。その最も暗い実例こそが、シチリア征服という誤った企てだった。\n\n『ペロポネソス戦争史』の中心的な悲劇は、アテネの傲慢さと驕りの増大、そしてその運命的な帰結の物語である。力の美徳を喧伝する現代のアテネ人たちは、自らの惨禍を招かないためにも、トゥキュディデスの警告に耳を傾けるべきだろう。\n\n【物語の中の真実】\n\nメロス対話は確かに重要な教訓を提供しているが、それは『ペロポネソス戦争史』という書物として書かれた文脈の中で理解された場合に限られる。そのためには、切り取られた数文ではなく、作品全体の内容と、トゥキュディデスの卓越した、精緻で包括的な方法論に習熟することが必要だ。彼の見立てでは、アテネとスパルタの27年にわたる戦争（紀元前431年〜404年）は三つの明確な段階で展開した。最初の10年間の直接対決、絶え間ない小競り合いと主導権争いが続く7年間の不安定な休戦期間、そしてアテネの無条件降伏に至るさらなる10年間の戦争である。", "vocab": [{"word": "browbeat", "definition": "脅したり威圧したりして相手を屈服させること。「browbeat emissaries」で「使節を威圧する」という意味。権力による心理的強制を指す動詞。"}, {"word": "decontextualized", "definition": "本来の文脈や背景から切り離された状態を指す形容詞。引用や情報が元の意味を歪める形で断片的に使われる際に用いる。"}, {"word": "interregnum", "definition": "二つの統治期間や段階の間の空白期間・中間期を指す名詞。歴史・政治の文脈でよく使われるラテン語由来の専門用語。"}, {"word": "hubris", "definition": "過度の傲慢さや自己過信を指すギリシャ語由来の名詞。特に神や運命に挑むような思い上がりが破滅を招くという文脈で用いられる。"}, {"word": "elucidates", "definition": "複雑な事柄を明確に説明・解明することを意味する動詞。学術・論説文で「詳しく解き明かす」というニュアンスで使われる。"}, {"word": "magisterial", "definition": "権威があり、深い知識や熟達を示すさまを表す形容詞。著作や論述が卓越した権威を持つ場合に使われる。"}, {"word": "recklessly", "definition": "結果を顧みず無謀に行動するさまを表す副詞。慎重さを欠いた危険な行為を描写する際に用いる。"}]}, {"title_ja": "ハマスの終焉：なぜこの組織は回復不能なのか", "title_en": "The End of Hamas: Why the Group Is Beyond Recovery", "summary_ja": "筆者は、主流の分析家の見解に反し、ハマスは2年間にわたるイスラエルとの戦争によって壊滅的な打撃を受け、もはや再建不可能な状態にあると主張する。イスラエルはハマスの指導部全体を組織的に排除し、イランとの関係を断ち切り、同組織は今や財政崩壊、政治的麻痺、そしてガザ市民からの支持喪失に直面している。筆者は、ハマスとイスラエルの双方がこの組織を依然として強力であるかのように見せかける動機を持っており、それが末期的な衰退という現実を覆い隠していると指摘する。", "summary_en": "The author argues, contrary to mainstream analyst consensus, that Hamas has been so thoroughly devastated by two years of war with Israel that it cannot recover. Israel has systematically eliminated Hamas's entire leadership structure, severed its ties with Iran, and the group now faces financial collapse, political paralysis, and loss of public support among Gazans. The author contends that both Hamas and Israel have incentives to pretend the organization remains strong, obscuring the reality of its terminal decline.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/palestinian-territories/end-hamas", "state_media": false, "category": "オピニオン", "full_text": "The consensus among analysts is that Hamas is down, but hardly out. The group may be badly battered, but it has been around since 1987, and in that time, it has been repeatedly attacked by Israel and has always grown back. The conditions that gave rise to the organization—occupation, dispossession, and humiliation at the hands of Israel—are as severe as ever. And in the Gaza Strip, there is no comprehensive alternative to Hamas’s governance. Even in its weakened state, the group has institutional memory, administrative infrastructure, and coercive capacity that its competitors cannot match.\nBut in truth, Hamas’s two-year war with Israel has decimated the organization beyond the point of recovery. It may still be more powerful than other groups in Gaza. But Israel’s bombing campaigns and invasion have cost Hamas essential military infrastructure, torn apart its leadership, and cut it off from its patrons. As a result, the organization lacks the power to actually rule Gaza. It is suffering from political paralysis and facing financial disaster in the enclave. Finally, it has lost public support: many Gazans blame the group for starting a war that has resulted in the destruction or damage of 90 percent of the homes in the Gaza Strip and the deaths of roughly four percent of the prewar population.\nDespite these facts, officials on both sides of Gaza’s yellow line have embraced the idea that Hamas is alive and well. Members of Hamas perpetuate this farce for an obvious reason: they do not want to admit that they lost. But Israel is also pretending that its nemesis remains strong so it can justify its continuing military operations—and avoid having to answer difficult questions about the future of Palestinians.\nUNAUTHORIZED OBITUARY\nSince Hamas attacked Israel on October 7, 2023, Israel has killed an entire echelon of Hamas leaders. This includes its former top officials: Yahya Sinwar, Ismail Haniyeh, Mohammed Deif, and Mohammed Sinwar. In May of this year, Israeli forces assassinated Izz al-Din al-Haddad, the head of Hamas’s military wing, at a residence, along with some of his family. Eleven days later, it killed Haddad’s replacement, Mohammed Odeh, along with his wife and two of his children. Today, only one Hamas commander who held a senior position before October 7 is left standing: Imad Aqel. Israel has also taken out hundreds of midlevel commanders. What it has done, in other words, goes beyond a mere decapitation strategy. It has removed Hamas’s entire nervous system.\nIsrael has also rendered Hamas incapable of regeneration. The fact that Haddad and Odeh were killed in their homes, with their families, indicates that the safe houses, tunnels, and countersurveillance architecture that once made Hamas’s senior leadership elusive are now gone. So are its overseas outposts. In the last three years, Israel has killed (or tried to kill) Hamas officials in Iran, Lebanon, and Qatar.\nIt is therefore little wonder that Hamas is experiencing a leadership crisis. Since Yahya Sinwar was killed, in October 2024, the group has been unable to decide who should take the helm of its political bureau. Hamas’s Shura Council, made up of 50 to 80 members, was supposed to elect a new leader in early 2025, but it could not meet and vote because of Israel’s ongoing bombardment. When a vote was finally held in February 2026, it did not produce a winner. For now, the group is run by a five-man council that has been hamstrung by infighting.\nThe relationship between Iran and Hamas is effectively over.\nHamas has settled on two leadership candidates: Khalil al-Hayya and Khaled Mashal. Each has a very different agenda. Hayya and his supporters favor close ties with Iran and continued armed confrontation, whereas Mashal and his backers want more sponsorship from Sunni states and more pragmatic negotiations with Israel. Of course, many healthy organizations have factional disagreements that they negotiate and resolve. But these divisions have instead resulted in deadlock. When the United States and Israel began bombing Iran on February 28 of this year, for example, Hamas could not agree on a statement or a response. It thus remained silent for three weeks. When it spoke, it sent conflicting signals. The group’s political leadership in Qatar called on Iran to “avoid targeting neighboring countries,” whereas the group’s military spokesman in Gaza put out a statement with a markedly different tone that praised Tehran’s war efforts.\nHamas’s political crisis is more than just internal. Since October 7, the group has lost external support. For decades, Hamas was an integral part of the so-called axis of resistance—Iran’s network of partners across the Middle East. This partnership was never seamless, in part because Hamas is a Sunni Islamist movement embedded in a Shiite-led alliance. But it was functional. Iran provided Hamas with weapons, training, and funding to the tune of $100 million annually. Hamas, in return, allowed Iran to indirectly ", "translation_ja": "分析家の間でのコンセンサスは、ハマスは打撃を受けているが、決して終わったわけではないというものだ。同組織は大きなダメージを受けているかもしれないが、1987年から存在し続けており、その間イスラエルから繰り返し攻撃を受けながらも常に再建を果たしてきた。この組織を生み出した条件——イスラエルによる占領、財産の剥奪、そして屈辱——は依然として深刻なままだ。そしてガザ地区では、ハマスの統治に代わる包括的な選択肢が存在しない。弱体化した状態であっても、同組織は競合勢力が到底及ばない組織的記憶、行政インフラ、そして強制力を保持している。\n\nしかし実際のところ、ハマスの2年間にわたるイスラエルとの戦争は、同組織を回復不能なほどまでに壊滅させた。ガザ内の他の組織よりも依然として強力かもしれない。しかしイスラエルの爆撃作戦と地上侵攻は、ハマスの重要な軍事インフラを破壊し、指導部を分断し、支援者たちとの関係を断ち切った。その結果、同組織はガザを実際に統治する力を失っている。政治的麻痺に苦しみ、飛び地での財政的危機に直面している。そして最終的に、民衆の支持を失った。多くのガザ市民が、ガザ地区の住宅の90パーセントを破壊または損傷させ、戦前の人口の約4パーセントの死者をもたらした戦争を開始した責任をハマスに帰しているのだ。\n\nこうした事実にもかかわらず、ガザのイエローライン両側の当局者たちは、ハマスが健在であるという考えを受け入れている。ハマスのメンバーがこの茶番を維持しているのは明白な理由からだ——自分たちが敗北したことを認めたくないのである。しかしイスラエルもまた、継続する軍事作戦を正当化し、パレスチナ人の将来についての難しい問いに答えることを避けるために、宿敵が依然として強力であるかのように振る舞っている。\n\n【無許可の訃報】\n\n2023年10月7日にハマスがイスラエルを攻撃して以来、イスラエルはハマスの指導者の一つの世代全体を殺害してきた。これには元最高幹部たち、すなわちヤヒヤ・シンワル、イスマイル・ハニヤ、モハメド・デイフ、そしてモハメド・シンワルが含まれる。今年5月、イスラエル軍はハマスの軍事部門の長であるイズッディーン・アル・ハッダードを、家族の一部とともに住居で暗殺した。その11日後、ハッダードの後継者モハメド・オデと、その妻と子供2人を殺害した。現在、10月7日以前に上級職を持っていたハマスの指揮官で生き残っているのは、イマード・アケルただ一人だ。イスラエルはまた、数百人の中堅指揮官も排除してきた。要するに、イスラエルがやってきたことは単なる「首切り戦略」を超えている。ハマスの神経系全体を除去したのである。\n\nイスラエルはまた、ハマスを再生不能な状態にしてしまった。ハッダードとオデが家族とともに自宅で殺されたという事実は、かつてハマス上級指導部の発見を困難にしていたセーフハウス、トンネル、そして監視対策のアーキテクチャが今やなくなっていることを示している。海外の拠点も同様だ。過去3年間で、イスラエルはイラン、レバノン、カタールでハマス幹部を殺害（あるいは殺害しようと試み）している。\n\nしたがって、ハマスが指導力の危機に陥っているのも不思議ではない。2024年10月にヤヒヤ・シンワルが殺されて以来、同組織は政治局の新たなトップを誰にするか決められずにいる。50〜80人のメンバーで構成されるハマスのシュラ評議会は、2025年初頭に新指導者を選出するはずだったが、イスラエルの継続的な爆撃のために会合を開いて投票することができなかった。2026年2月にようやく投票が行われたものの、勝者は生まれなかった。現在、同組織は内紛によって身動きが取れなくなった5人委員会によって運営されている。\n\nイランとハマスの関係は事実上終わった。\n\nハマスは二人のリーダー候補に絞り込んだ。カリル・アル・ハイヤとハレド・マシャルである。それぞれが全く異なる方針を持っている。ハイヤとその支持者はイランとの緊密な関係とイスラエルとの武力対立の継続を支持しているが、マシャルとその支持者はスンニ派諸国からの支援拡大とイスラエルとのより現実的な交渉を望んでいる。もちろん、多くの健全な組織にも派閥間の意見の相違があり、それを調整して解決している。しかしこれらの分裂は、解決ではなく行き詰まりをもたらしている。例えば今年2月28日に米国とイスラエルがイランへの爆撃を開始した際、ハマスは声明や対応について合意できなかった。そのため3週間にわたり沈黙を保った。発言した時には、相互に矛盾するシグナルを送った。カタールのハマス政治指導部はイランに対して「近隣諸国への攻撃を避けるよう」呼びかけたが、ガザのハマス軍事報道官はまったく異なるトーンの声明を発表し、テヘランの戦争努力を称えた。\n\nハマスの政治危機は内部にとどまらない。10月7日以降、同組織は外部からの支援を失ってきた。数十年にわたり、ハマスはいわゆる「抵抗の枢軸」——中東全域にわたるイランのパートナーネットワーク——の不可欠な一部であった。このパートナーシップは、ハマスがシーア派主導の同盟に組み込まれたスンニ派イスラム主義運動であるという部分的な理由から、決してシームレスなものではなかった。しかし機能していた。イランはハマスに年間1億ドル規模の武器、訓練、資金を提供していた。ハマスはその見返りとして、イランが間接的に……", "vocab": [{"word": "decapitation strategy", "definition": "「首切り戦略」とも呼ばれる軍事・政治的手法で、組織の上層部の指導者を標的に排除することで組織全体を機能不全に陥らせる戦略。安全保障や紛争分析の文脈で用いられる専門用語。"}, {"word": "coercive capacity", "definition": "強制力または強圧的能力のこと。国家や非国家主体が、武力や威圧によって他者の行動をコントロールする能力を指す政治学・安全保障上の用語。"}, {"word": "enclave", "definition": "周囲を他の領土や勢力に囲まれた、地理的・政治的に孤立した区域のこと。ここではガザ地区を指しており、地政学的な文脈で頻繁に使われる語。"}, {"word": "countersurveillance", "definition": "監視対策または対諜報監視活動のこと。敵や当局による監視・追跡を発見・回避・妨害するための技術や手段を指す。情報・安全保障分野の専門用語。"}, {"word": "hamstrung", "definition": "「無力化された」「身動きが取れなくなった」という意味の形容詞。内部対立や外部からの制約によって行動能力が著しく制限された状態を表す慣用的表現。"}, {"word": "pragmatic", "definition": "実用主義的な、実際的なという意味の形容詞。イデオロギーや原則よりも現実的な利益や効果を優先するアプローチを指し、政治・外交の文脈で広く使われる。"}, {"word": "farce", "definition": "茶番、茶番劇のこと。本来真剣であるべき状況や行為が、実態を伴わない滑稽なものになっていることを批判的・皮肉的に表現する語。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}

document.getElementById("footer").textContent="Generated 2026-07-05 17:13 JST";
