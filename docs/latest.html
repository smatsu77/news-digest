o call four witnesses on Monday, all law enforcement officers, and present 40 to 50 exhibits, some he warned are graphic in nature.\nThe fatal shooting of Kirk, who was the founder of the conservative youth movement Turning Point USA and a strong ally of President Donald Trump, occurred on Sept. 10, 2025 at an outdoor rally at Utah Valley University in Orem, Utah.\nKirk was holding the first stop of his \"The American Comeback Tour,\" which invited students on college campuses to debate hot-button issues. He was at an amphitheater on the college taking a question about gun violence in America when a single shot rang out from a distance away, hitting him in the left side of his neck.\nRobinson has been charged with aggravated murder, felony discharge of a firearm causing serious bodily injury, obstruction of justice, two counts of witness tampering and commission of a violent offense in the presence of a child.\nRobinson has yet to enter a plea to the charges, and his attorneys have not issued any statements on his guilt or innocence.\nOfficer describes hearing the fatal shot\nThe first witness called by the state was former Utah Valley University senior officer Christopher Bagley, who was posted in the campus' Hall of Flags, above the amphitheater where Kirk was speaking to crowd by under a tent.\n\"[Kirk] was answering a question, a kid asked him a question. And then I heard a shot fired,\" Bagley testified, recalling the time of the shooting was 12:23 p.m. local time.\nHe testified that he saw Kirk fall to his left.\nAs Bagley was testifying about the shooting, Erika Kirk and her late husband's parents left the courtroom.\nBagley said chaos immediately broke out with people running in all directions. He said he ran down a staircase to the amphitheater. As he was searching for the shooter, Bagley said he received a radio dispatch that the shooter was in custody.\nHe testified that when he got to the area where the suspected shooter was detained, he saw an empty pistol holster on the grass.\n\"At that moment, things had died down just a split second and I realized that the shot I heard was more of a rifle shot and not a pistol shot,\" Bagley said.\nPolice later determined that the person initially detain was not the shooter.\n\"I looked up at that moment and saw the Losee building that had a direct line of sight\" to where Kirk was speaking, Bagley said.\nBagley said he then went to the roof of the Losee Center to investigate, and saw something out of place on the graveled roof: a black and white screw driver.\nProsecutors alleged that Robinson shot Kirk with a Mauser .30-06 rifle from the roof of the Losee Center and made his getaway by blending in with the chaotic crowd.\nPolice investigators have said the shot that killed Kirk was fired about 200 feet from where Kirk was speaking.\nReasonable grounds needed for judge hold defendant over for trial\nProsecutors need only to demonstrate that there are reasonable grounds to warrant a trial for Robinson. If Graf orders Robinson to proceed to trial, prosecutors must then prove beyond a reasonable dou", "translation_ja": "「痛ましい思い出」：チャーリー・カークの遺族が語る、容疑者の審問始まる\n\nドナルド・トランプ・ジュニアが、カーク家と共に法廷傍聴席に着席した。\n\n保守派活動家チャーリー・カークの殺害事件において、検察側が殺人裁判を正当化するだけの証拠を有しているかどうかを判断するための重要な法廷審問が月曜日に始まった。\n\nユタ州の検察官は、容疑者である23歳のタイラー・ジェームズ・ロビンソンに対して大量の証拠を持っており、死刑を求刑する方針だと述べた。\n\n月曜日、プロボにある第4地区裁判所で予備審問が始まり、最大5日間続く見通しだ。\n\nカークの未亡人エリカ・カーク、および両親であるロバートとキャサリン・カークが審問に出席し、ロビンソンと直接対面するのは今回が初めてとなった。チャーリー・カークの友人でもあったドナルド・トランプ大統領の息子、ドナルド・トランプ・ジュニアも法廷の傍聴席に座っていた。\n\nカーク家は月曜日の朝に声明を発表し、「チャーリーは愛される夫、息子、兄弟、友人、そして父親でした」と述べた。\n\n「法廷での手続きが進むたびに、彼の死と、私たちや子供たちの生活に取り返しのつかない影響を与えたその喪失を痛烈に思い知らされます」と遺族は述べた。「これまで寄せていただいたご支援、お祈り、そして温かいお気持ちに深く感謝しております。この温かさが、人生で最も暗い日々を乗り越える力となっています。」\n\n遺族は、今後この事件についてはコメントを控えると述べ、「このプロセスと深い悲しみを乗り越えるため、引き続きプライバシーへのご配慮をお願いいたします」と呼びかけた。\n\n審問で提示されるグラフィックな証拠\n\n審問を担当するトニー・グラフ地区判事は、検察側が提示する証拠を検討した上で、ロビンソンを裁判にかけるだけの根拠があるか、また検察側が死刑を求刑することを認めるかどうかを判断する。\n\n審問の冒頭、ユタ郡首席副検察官のチャド・グルアンダーは、検察側は月曜日に4人の証人（全員が法執行官）を召喚し、40〜50点の証拠を提出する予定であり、一部はグラフィックな内容を含むと判事に告げた。\n\nカークの殺害事件は、2025年9月10日、ユタ州オレムにあるユタバレー大学の野外集会で発生した。カークは保守系若者運動「ターニング・ポイントUSA」の創設者であり、ドナルド・トランプ大統領の強力な支持者でもあった。\n\nカークは「アメリカン・カムバック・ツアー」の最初の訪問地として同大学を訪れており、このツアーは大学キャンパスの学生たちと時事問題についてディベートするというものだった。彼は大学内の野外円形劇場でテントの下に立ち、アメリカにおける銃による暴力についての質問に答えていたとき、離れた場所から一発の銃声が響き、首の左側に弾丸が当たった。\n\nロビンソンは、加重殺人、重大な身体傷害を引き起こした銃器の違法発射、司法妨害、証人威迫2件、子供の面前での暴力行為の罪で起訴されている。\n\nロビンソンはまだ罪状認否を行っておらず、弁護士も彼の有罪・無罪についての声明を発表していない。\n\n警察官が致命的な銃声を聞いた瞬間を証言\n\n検察側が最初に召喚した証人は、カークが演説していた野外円形劇場の上方にある「旗の広間」に配備されていた、元ユタバレー大学上級警備員クリストファー・バグリーだった。\n\n「カークさんが質問に答えていました。ある学生が質問をしました。そして私は銃声を聞きました」とバグリーは証言し、発砲時刻は現地時間の午後12時23分であったと述べた。\n\n彼は、カークが左に倒れるのを見たと証言した。\n\nバグリーが銃撃について証言する中、エリカ・カークと亡き夫の両親は法廷を退出した。\n\nバグリーは、人々が四方八方に逃げ出すなどすぐに混乱状態になったと述べた。彼は階段を駆け下りて円形劇場に向かったと言い、射手を捜索していたとき、射手が身柄を拘束されたとの無線連絡が入ったと証言した。\n\n拘束された容疑者がいる場所に到着したとき、芝生の上に空のピストルホルスターが落ちているのを目にしたと証言した。\n\n「その瞬間、少し落ち着きを取り戻したとき、私が聞いた銃声はピストルではなくライフルの音だと気づきました」とバグリーは述べた。\n\n警察はその後、最初に拘束された人物は射手ではないと判断した。\n\n「その瞬間に目を上げると、カークさんが演説していた場所に直接視線が届くロシービルディングが見えました」とバグリーは語った。\n\nバグリーは、調査のためにロシーセンターの屋上に向かったところ、砂利が敷かれた屋根の上に不自然なものを発見したと述べた。それは白黒のスクリュードライバーだった。\n\n検察は、ロビンソンがロシーセンターの屋上からモーゼル・30-06ライフルでカークを射殺した後、混乱した群衆の中に紛れ込んで逃走したと主張している。\n\n警察の捜査官によれば、カークを死に至らしめた銃弾は、カークが演説していた場所から約60メートル離れた地点から発射されたとされている。\n\n被告を裁判にかけるには合理的な根拠が必要\n\n検察側がロビンソンを裁判にかけるには、裁判を正当化するだけの合理的な根拠があることを示すだけでよい。グラフ判事がロビンソンを裁判に付すよう命じた場合、検察側は合理的な疑いを超えた証明を行わなければならない。", "vocab": [{"word": "preliminary hearing", "definition": "予備審問。正式裁判を開始するに足る証拠が存在するかどうかを裁判官が判断する審問手続きのこと。法律用語として頻出。"}, {"word": "aggravated murder", "definition": "加重殺人。計画性や特に悪質な状況（子供の前での犯行など）が伴う殺人罪で、通常の殺人罪より重い罪として扱われる法律用語。"}, {"word": "irrevocably", "definition": "取り返しのつかない形で、という意味の副詞。ある変化や損失が永久に元に戻せないことを強調する際に使われる高度な語彙。"}, {"word": "preliminary", "definition": "予備的な、事前の、という意味の形容詞。本格的な手続きや行動の前段階として行われるものを指す際に使われる。"}, {"word": "obstruction of justice", "definition": "司法妨害。捜査や裁判の適正な進行を故意に妨げる行為を指す法律用語で、証拠隠滅や証人への圧力などが含まれる。"}, {"word": "witness tampering", "definition": "証人威迫・証人買収。裁判における証人の証言に不正な影響を与えようとする行為で、刑事犯罪として扱われる法律用語。"}, {"word": "outpouring", "definition": "（感情・支援などの）溢れ出し、殺到。多くの人々から一斉に感情や支援が示される様子を表す表現で、「an outpouring of support（支援の殺到）」のように使われる。"}]}, {"title_ja": "エジプトで保存状態の良いビザンチン時代の都市と古代墓群を発見", "title_en": "Archaeologists Uncover Well-Preserved Byzantine City and Ancient Tombs in Egypt", "summary_ja": "エジプトの考古学者たちが、西部砂漠のダフラ・オアシスで保存状態の良い4世紀のビザンチン時代の都市を発見した。バシリカ式教会や住居跡のほか、金貨や文字が刻まれた土器片などの遺物も見つかった。また、アレクサンドリア近郊のマリーナ・エル・アラメインでは18基の古代墓が発見され、花崗岩の石棺やプラスター製スフィンクス像などが出土した。", "summary_en": "Archaeologists in Egypt have discovered a well-preserved fourth-century Byzantine city in the Dakhla oasis of the western desert, complete with a basilica, residential structures, and artifacts including gold coins and pottery inscriptions. Separately, 18 ancient tombs were found at Marina el-Alamein near Alexandria, yielding a granite sarcophagus, a plaster sphinx statue, and gold pieces placed in the mouths of the deceased. Both discoveries offer significant insights into daily life, religious practices, and urban development in ancient Egypt.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/04/archaeologists-uncover-ancient-byzantine-city-in-egypts-western-desert", "state_media": false, "category": "経済", "full_text": "Archaeologists in Egypt have uncovered a well-preserved Byzantine-era city in the western desert.\nThe fourth-century quarters had residential and religious structures, including a basilica-style church in the Dakhla oasis. Archaeologists also found coins, pottery fragments and tools.\nSeparately, 18 ancient tombs were discovered at Marina el-Alamein, near Alexandria, which includes rock-cut and limestone tombs, pottery and a granite sarcophagus.\nThe tourism and antiquities ministry said the first discovery reveals details of daily life, urban development and economic activities when Egypt was part of the Byzantine empire.\nThe unearthed quarters included north-south thoroughfares intersected by east-west streets, forming open squares and public spaces, said Hisham el-Leithy, secretary general of the supreme council of antiquities.\nA basilica dating back to the mid-fourth century stands at the settlement’s head, overlooking its main streets, along with remains of two watchtowers to safeguard the outskirts, according to Mahmoud Massoud, who chairs the archaeological mission.\nThe oasis, located in Egypt’s western province of New Valley, is on Unesco’s tentative list, a step away from being added to the agency’s world heritage list.\nA heavily fortified structure with thick defensive walls, and many houses consisting of reception halls and vaulted roofs, were found in the area, Massoud added.\nAmong them were the house of Tisous, a church deacon, which dates to the second half of the fourth century. Archaeologists believe it served as a house church before the construction of the city’s basilica.\nArchaeologists also uncovered bread ovens, kitchens, grinding tools and bronze coins bearing portraits of Byzantine emperors, Latin inscriptions and Christian symbols.\nA group of gold coins unearthed dated to the reign of Roman emperor Constantius II, who ruled between 337 and 361, the ministry statement said.\nDiaa Zahran, head of the Islamic, Coptic and Jewish antiquities department, said they found a collection of about 200 pottery fragments which would have been used as writing material. The fragments, known as ostraca, have inscriptions detailing commercial transactions, correspondence and other details of daily life, according to Zahran.\nArchaeologists also found ancient tombs in the Marina el-Alamein archaeological site, which is about 62 miles (100km) west of the Mediterranean city of Alexandria.\nThe findings included 11 rock-cut tombs with an average depth of eight metres, and seven surface limestone-built tombs, the ministry said. It has brought the total tombs found at the site to 48.\nIn the site, archaeologists found pottery vessels, amphorae, lamps, plates, altars and limestone basins.\nThe mission chief, Eman Abdel-Khaliq, said they found a 2.5-metre-long granite sarcophagus, with skeleton remains that were being studied. Close to the sarcophagus, they found the remains of a plaster sphinx statue, she said.\nFour gold pieces were placed inside the mouths of some of the deceased, known as “the golden tongue”, which had been a practice associated with funerary beliefs of that era, Abdel-Khaliq said.\nMarina el-Alamein is an archaeological site close to the city of Alamein on Egypt’s northern coast, unearthed in 1986. Archaeologists believe the site was the ancient Greco-Roman port city of Leukaspis on the Mediterranean, which was built in the second century and thrived until the fourth century.", "translation_ja": "エジプトの考古学者たちが、西部砂漠で保存状態の良いビザンチン時代の都市を発見した。\n\n4世紀の居住区には、ダフラ・オアシスにあるバシリカ式教会を含む住居施設と宗教施設があった。考古学者たちはコイン、陶器の破片、道具なども発見した。\n\n別の場所では、アレクサンドリア近郊のマリーナ・エル・アラメインで18基の古代墓が発見され、岩窟墓や石灰岩造りの墓、陶器、花崗岩の石棺が含まれていた。\n\n観光・文化財省は、最初の発見によってエジプトがビザンチン帝国の一部であった時代の日常生活、都市発展、経済活動の詳細が明らかになると述べた。\n\n最高考古学評議会事務局長のヒシャム・エル=レイシー氏によると、発掘された居住区には南北方向の幹線道路と東西方向の道路が交差し、広場や公共空間を形成していた。\n\n考古学調査団を率いるマフムード・マスード氏によると、4世紀中頃に建てられたバシリカが集落の中心に位置し、主要な道路を見下ろすように建っており、周辺を守るための2基の監視塔の遺構も残っている。\n\nこのオアシスはエジプト西部のニューバレー州に位置し、ユネスコの世界遺産暫定リストに掲載されており、世界遺産リストへの登録まであと一歩のところにある。\n\nマスード氏はさらに、厚い防御壁を持つ強固な要塞構造物や、接客ホールやアーチ型天井を備えた多くの家屋が発見されたと述べた。\n\nその中には、4世紀後半に建てられた教会助祭ティスース氏の家もあった。考古学者たちは、この家が都市のバシリカが建設される以前に家屋教会として使われていたと考えている。\n\nまた、パン焼き炉、台所、製粉道具、ビザンチン皇帝の肖像やラテン語の碑文、キリスト教のシンボルが刻まれた青銅貨幣も発見された。\n\n出土した金貨の一部は、337年から361年にかけて統治したローマ皇帝コンスタンティウス2世の治世にさかのぼるものだと、省の声明は述べている。\n\nイスラム・コプト・ユダヤ文化財部門長のディア・ザフラン氏は、書字材料として使われていたとみられる約200点の陶器片の集まりが見つかったと述べた。「オストラカ」と呼ばれるこれらの破片には、商取引や書簡、その他の日常生活の詳細を記した碑文があると、ザフラン氏は説明した。\n\n考古学者たちはまた、地中海に面するアレクサンドリア市の西約100キロ（62マイル）に位置するマリーナ・エル・アラメイン遺跡でも古代墓を発見した。\n\n発見物には、平均深度8メートルの岩窟墓11基と、地上に建てられた石灰岩造りの墓7基が含まれており、省によるとこれによって同遺跡で発見された墓の総数は48基となった。\n\n遺跡では、陶器の器、アンフォラ、ランプ、皿、祭壇、石灰岩の水盤も発見された。\n\n調査団長のエマン・アブデル・ハリーク氏は、骨格の遺骨が研究されている2.5メートルの長さの花崗岩の石棺が見つかったと述べた。石棺の近くには、石膏製のスフィンクス像の遺構も発見されたという。\n\n一部の故人の口の中には金片が4枚置かれていたが、これは「黄金の舌」として知られ、その時代の葬送信仰に関連した慣習だったとアブデル・ハリーク氏は述べた。\n\nマリーナ・エル・アラメインはエジプト北岸のアラメイン市近くにある考古学遺跡で、1986年に発掘が始まった。考古学者たちは、この遺跡が2世紀に建設され4世紀まで栄えた古代ギリシャ・ローマ時代の地中海港湾都市「レウカスピス」であると考えている。", "vocab": [{"word": "basilica", "definition": "初期キリスト教時代に建てられた長方形の会堂形式の教会建築。古代ローマの公共建築様式に由来し、宗教的・歴史的文脈でよく使われる専門用語。"}, {"word": "ostraca", "definition": "古代において書字材料として使用された陶器や石灰岩の破片（単数形はostrakon）。考古学・歴史学の専門用語で、古代の日常的な記録が残されていることが多い。"}, {"word": "sarcophagus", "definition": "石材（主に石灰岩や花崗岩）で作られた棺。特に古代エジプトやギリシャ・ローマ時代の遺物を指す考古学用語で、「肉を食らうもの」を意味するギリシャ語に由来する。"}, {"word": "amphorae", "definition": "古代ギリシャ・ローマで液体や食料の輸送・保存に使われた両耳付きの大型陶器容器（単数形はamphora）。考古学・古代史の文脈で使われる専門用語。"}, {"word": "tentative list", "definition": "ユネスコ世界遺産への正式登録を申請する前段階として各国が提出する候補リストのこと。国際的な文化遺産保護の文脈で使われる専門的な表現。"}, {"word": "thoroughfare", "definition": "主要な通りや幹線道路を指す、やや格式のある表現。都市計画や歴史的な都市描写の文脈でよく使われるTOEIC上級レベルの語彙。"}, {"word": "funerary", "definition": "葬儀や埋葬に関連することを意味する形容詞。考古学・人類学の文脈で「葬送の」「埋葬に関する」という意味で使われる専門的な語彙。"}]}, {"title_ja": "「状況は壊滅的」―ドローン攻撃に晒されるスーダン・エル・オベイドで支援活動を続ける人々の声", "title_en": "Aid Workers Describe Dire Conditions in Sudan's El Obeid Amid Relentless Drone Strikes", "summary_ja": "スーダンの都市エル・オベイドでは、準軍事組織「即応支援部隊（RSF）」によるドローン攻撃が学校・病院・燃料施設など民間インフラを繰り返し標的にし、多数の死傷者が出ている。国連や人権団体は、昨年のエル・ファシェル虐殺に匹敵する人道的大惨事が迫っていると警告している。現地の支援活動家たちは、恐怖・避難民の急増・物資不足によって都市が機能麻痺しつつある実態を訴えている。", "summary_en": "The Sudanese city of El Obeid is facing a worsening humanitarian crisis as RSF drone strikes target civilian infrastructure including schools, hospitals, and fuel stations, killing dozens. The UN and human rights organizations warn of an imminent catastrophe reminiscent of last year's massacre in El Fasher. Aid workers describe a city paralyzed by fear, displacement, and shortages.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/04/el-obeid-aid-workers-sudan-war-drone-strikes", "state_media": false, "category": "政治", "full_text": "Fatima has lost count of the number of drone attacks on the besieged city of El Obeid in Sudan, but said the attacks this past weekend were the most violent so far.\nThe drones hit schools and fuel stations, killing more than 20 people, including students, she said. “Over the past few months, seeing 40 or 45 drones is the norm. You can literally count them,” said the aid volunteer, whose name has been changed for fear of retribution.\nEl Obeid, a city of half a million people, is a key battleground in the war between the Sudanese Armed Forces (SAF) and the paramilitary Rapid Support Forces (RSF). Attacks mounted by the RSF have prompted the UN and other agencies to warn of the risk of atrocities.\nLocated between RSF-held areas in the western Darfur region and army-controlled regions in the east, El Obeid has suffered repeated drone strikes on its infrastructure. The army is fighting to stop the paramilitary group setting up another blockade after a siege in February last year.\nAt least 45 people were killed and 41 injured in 15 drone strikes in the city and surrounding areas from 6 June to 28 June, according to the UN human rights office. There are growing fears of a repeat of the massacre in the city of El Fasher last year, when RSF fighters went on a rampage after capturing the city at the end of an 18-month siege.\nAmnesty International released a report on Wednesday saying the RSF had committed ethnic cleansing and crimes against humanity in its campaign to capture El Fasher. An independent fact-finding mission for the UN had already said the RSF’s seizure of the city showed the “hallmarks of genocide” against non-Arab communities.\nOn Friday, Volker Türk, the UN high commissioner for human rights, addressed delegates in Geneva during an urgent debate of the UN human rights council called by the UK and backed by Germany, Ireland, Norway and the Netherlands.\nHe said: “The signs from El Obeid are clear and unmistakable: another human rights catastrophe is unfolding in Sudan.\n“This is not a drill. It is a red alert that needs to land on the desks of heads of state and government around the world. Their phones should be running hot in the coming days and weeks, with ideas on how to prevent atrocity crimes in El Obeid and in other places in Kordofan.”\nEl Obeid hosts an SAF infantry division and an airbase, in addition to about 100,000 refugees displaced by violence.\nExperts have highlighted significant concentrations of RSF troops around the city and warn of an imminent ground offensive. A report released on Monday by the Yale Humanitarian Research Lab found damage to electricity generation, fuel storage facilities and the main market that was “consistent with intentional bombardment of civilian infrastructure necessary for the sustainment of life”.\nThe report also noted an increase of more than 700 temporary structures at internally displaced persons camps in El Obeid in one month that was “consistent with a recent influx of highly vulnerable civilian populations to the city”.\nIt said the SAF has constructed about 30 miles (50km) of defensive positions – suggesting it expected a siege.\nNohad Eltayeb, a senior research assistant at the Acled conflict monitoring group, said it had recorded 27 drone strikes last month around El Obeid, the highest monthly total since the start of the conflict in 2023.\nIn a audio diary for the Avaaz human rights advocacy group, Fatima spoke of living life on the edge because of drone attacks on hospitals, fuel stations and other facilities. An attack last week struck the city’s main power station, causing blackouts in most of the city, she said. Drones have also hit people gathering to share Starlink internet connections when telecommunications networks are down, she added.\n“I cannot begin to describe how terrible the situation is right now,” Fatima said. “Even the way people talk at funerals is different. Instead of praying for the deceased, they would be talking about how they died.”\nAccording to Fatima, merchants have increased prices, saying their goods are targeted by drones on the way to El Obeid from other parts of the country or simply looted.\nAhlam, a humanitarian worker whose name has also been changed, said residents had become accustomed to pain, loss and fear from constant drone attacks. “In just the past two weeks, nearly every essential service and piece of critical infrastructure has been hit,” she said.\nShe added that some people had considered leaving the city, but attacks on fuel stations had driven up prices, making transport much more expensive. She fears devastating consequences if the conflict escalates, noting the already huge number of displaced people in the city.\nWill Davies, Sudan director at Avaaz, said the drone attacks had created an “extremely dire” situation in El Obeid. He said the city lacked the ethnic dynamics that were a factor in the El Fasher killings and there was unlikely to be a major ground offensive because “the evidence isn’t there in te", "translation_ja": "ファティマはスーダンの包囲都市エル・オベイドへのドローン攻撃が何度あったか数えきれなくなっているが、先週末の攻撃はこれまでで最も激しかったと語った。\n\nドローンは学校や燃料スタンドを直撃し、学生を含む20人以上が死亡したという。「ここ数か月、40機や45機のドローンを見るのは普通のことになりました。文字通り数えられるんです」と、報復を恐れて名前を変えた支援ボランティアの女性は語った。\n\n人口50万人の都市エル・オベイドは、スーダン国軍（SAF）と準軍事組織「即応支援部隊（RSF）」の戦争における重要な戦場となっている。RSFによる攻撃は、国連や各機関に残虐行為のリスクを警告させるほどのものだ。\n\n西部のダルフール地域にあるRSF支配地域と東部の国軍支配地域の間に位置するエル・オベイドは、インフラへの繰り返しのドローン攻撃に見舞われている。国軍は、昨年2月の包囲に続く新たな封鎖をこの準軍事組織に許すまいと戦っている。\n\n国連人権事務所によると、6月6日から6月28日にかけて市内および周辺地域で発生した15回のドローン攻撃により、少なくとも45人が死亡し41人が負傷した。昨年、18か月に及ぶ包囲の末にRSF戦闘員が市内に侵入して虐殺を行ったエル・ファシェルの悲劇が繰り返されるのではないかという懸念が高まっている。\n\nアムネスティ・インターナショナルは水曜日、RSFがエル・ファシェル制圧作戦において民族浄化と人道に対する罪を犯したとする報告書を発表した。国連の独立調査団もすでに、RSFによる同市制圧が非アラブ系住民に対する「ジェノサイドの特徴」を示していると述べていた。\n\n金曜日、国連人権高等弁務官のフォルカー・テュルク氏は、英国が主導しドイツ・アイルランド・ノルウェー・オランダが支持した国連人権理事会の緊急討議の場でジュネーブの代表団に向けて演説した。\n\n同氏はこう述べた。「エル・オベイドからの兆候は明確で疑う余地がない。スーダンでは新たな人権上の大惨事が進行しつつある。\n\nこれは訓練ではない。世界中の国家・政府首脳の机の上に届けられなければならない赤色警報だ。エル・オベイドおよびコルドファン各地での残虐犯罪を防ぐためのアイデアを議論すべく、今後数日・数週間、彼らの電話は鳴り続けるべきだ。」\n\nエル・オベイドには国軍の歩兵師団と空軍基地があるほか、暴力によって避難した約10万人の難民が身を寄せている。\n\n専門家たちは市周辺へのRSF部隊の大規模な集結を指摘しており、地上攻撃が差し迫っていると警告している。月曜日にイェール大学人道研究ラボが発表した報告書は、電力施設・燃料貯蔵施設・主要市場への被害が「生命維持に不可欠な民間インフラへの意図的な爆撃と一致する」と指摘した。\n\nまた同報告書は、エル・オベイドの国内避難民キャンプにおける仮設構造物が1か月で700棟以上増加したことも記録しており、「脆弱性の高い民間人が最近大量に流入したことと一致する」としている。\n\nさらに、国軍が約50キロメートルの防衛陣地を構築したことも明らかにしており、包囲戦に備えていることがうかがえる。\n\n紛争監視グループ「ACLED」のシニア・リサーチ・アシスタント、ノハド・エルタイエブ氏は、同グループが先月エル・オベイド周辺で27件のドローン攻撃を記録したと述べた。これは2023年の紛争開始以来、月間最多の記録である。\n\n人権擁護団体アバースのための音声日記の中で、ファティマは病院・燃料スタンド・その他の施設へのドローン攻撃のために常に瀬戸際で生活していると語った。先週の攻撃では市の主要発電所が直撃を受け、市内の大部分で停電が発生したという。また、通信ネットワークが不通の際にスターリンクのインターネット接続を共有しようと集まった人々もドローンの標的になったと付け加えた。\n\n「今この状況がどれほどひどいか、言葉では表せません」とファティマは語った。「葬儀での人々の話し方さえ変わってしまいました。故人のために祈る代わりに、どうやって亡くなったかを話し合っているんです。」\n\nファティマによると、商人たちは価格を引き上げており、その理由として、国内各地からエル・オベイドへ運ぶ途中でドローンに狙われるか、あるいは単純に略奪されるからだと説明しているという。\n\nやはり名前を変えた人道支援ワーカーのアフラムは、絶え間ないドローン攻撃による痛み・喪失・恐怖に住民が慣れ切ってしまったと語った。「ここ2週間だけで、ほぼすべての生活に必要なサービスと重要インフラが攻撃を受けました」と彼女は述べた。\n\nまた、脱出を考えた人もいるが、燃料スタンドへの攻撃によって価格が高騰し、移動費用が大幅に上がっていると指摘した。すでに膨大な数の避難民が市内に滞在していることを踏まえ、紛争が激化した場合の壊滅的な結果を彼女は懸念している。\n\nアバースのスーダン担当ディレクター、ウィル・デイヴィス氏は、ドローン攻撃によってエル・オベイドの状況は「極めて深刻」になっていると述べた。同市にはエル・ファシェルの殺戮の一因となったような民族的な構図はなく、「その証拠がない」ため大規模な地上攻撃が行われる可能性は低いと語った。", "vocab": [{"word": "paramilitary", "definition": "正規軍に準じた組織・武装集団を指す形容詞。国家の正式な軍隊ではないが、軍事的な組織・装備・訓練を持つ集団に用いられる。"}, {"word": "atrocities", "definition": "戦時などに行われる残虐行為・蛮行を指す名詞（複数形）。大規模な暴力や人権侵害を伴う極めて残酷な行為に使われる。"}, {"word": "ethnic cleansing", "definition": "特定の民族・宗教・文化集団を暴力や強制によって地域から排除・抹消しようとする行為を指す専門用語。国際法上の重大犯罪とされる。"}, {"word": "hallmarks", "definition": "ある物事の典型的な特徴・証拠を指す名詞（複数形）。もともとは金属の品質保証刻印を意味し、転じて「顕著な特徴」として比喩的に使われる。"}, {"word": "sustainment", "definition": "生命・活動・組織などを継続・維持するための支援や供給体制を指す名詞。特に軍事・人道支援の文脈で、物資の補給や維持活動を表す専門用語として用いられる。"}, {"word": "imminent", "definition": "危険や出来事が今にも起ころうとしている、差し迫っている様子を表す形容詞。特に脅威や危機的状況の緊迫性を強調する際に使われる。"}, {"word": "rampage", "definition": "暴力的・破壊的に荒れ回る行為を指す名詞または動詞。集団や個人が制御を失って激しく暴れ回る状況に用いられる。"}]}, {"title_ja": "英国、女性・女児向け海外教育プログラムを2年で廃止", "title_en": "UK axes £45m overseas education programme for women and girls after two years", "summary_ja": "英国政府は、アフリカ・アジア・中東で100万人の女児の就学継続を目指す4500万ポンド規模のSHEFEプログラムを、開始からわずか2年で廃止した。批判者たちは、この決定が政府の女性・女児支援への公約と矛盾すると指摘し、国際教育援助の広範な削減傾向の一環だと批判している。英国の政府開発援助予算は過去最低水準に引き下げられる見通しで、他の国際ドナーにも影響が及んでいる。", "summary_en": "The UK government has cancelled the SHEFE programme, a £45m initiative aimed at keeping 1 million girls in school across Africa, Asia and the Middle East, just two years after its launch. Critics say the move contradicts the government's stated commitment to women and girls, and follows a broader pattern of cuts to international education aid. The UK's overseas aid budget is set to fall to its lowest level on record, with knock-on effects felt by other global donors.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/04/overseas-education-project-for-women-and-girls-axed-by-uk-after-two-years", "state_media": false, "category": "政治", "full_text": "A leading higher education programme, aimed at keeping 1 million girls in school across Africa, Asia and the Middle East, has been axed by the British government just two years after it was announced.\nThe scheme, Strengthening higher education for female empowerment (SHEFE), which was unveiled with some fanfare two years ago by the outgoing Conservative government, had a £45m budget to increase access to higher education for 1 million students worldwide. It has now had its tender withdrawn, the Foreign, Commonwealth and Development Office (FCDO) said.\nIn May, Yvette Cooper, the foreign secretary, stressed her commitment to women and girls, declaring they were a priority at the FCDO and that she was “determined to work across borders to ensure women’s safety is a worldwide priority”.\nBambos Charalambous, the Labour MP who chairs the all-party parliamentary group on global education, said he was concerned. “I’m alarmed that a flagship higher education programme designed to empower women and girls and help them achieve their potential appears to have been scrapped because of the aid cuts,” he said.\n“FCDO has acknowledged how such partnerships can transform lives, while also benefiting institutions here at home. It is vital to start thinking now about how to build back from the aid cuts to save similar projects.”\nThe programme was designed in part because girls who benefit from higher education are up to six times less likely to marry as children and are less likely to experience violence from a partner. Women who have advanced levels of learning also increase their earnings.\nPeople working in the international development and education sectors claimed the move to axe SHEFE was the latest decision to severely undermine the UK’s professed commitment to women and girls.\nThe Home Office has blocked new study visas for applicants from Afghanistan, Sudan, Myanmar and Cameroon, meaning many women whose opportunities to study in their own countries were restricted will miss out on life-changing opportunities. British universities earn large amounts of money from foreign students, who pay much higher fees than UK-born students.\nJoseph Nhan-O’Reilly, co-founder of the International Parliamentary Network for Education, said: “The government talks up its commitment to women and girls but at every turn it denies the world’s most marginalised girls the thing that everyone agrees has the biggest impact on their lives and that of their communities: access to higher education.”\nEarlier this year, the FCDO announced it was cancelling the tender for its planned Education for All programme in South Sudan, Nhan-O’Reilly said. The £150m scheme had been designed to support the education of girls and children with disabilities in one of the world’s poorest countries, with one of the highest rates of children out of education and the world’s fourth-lowest literacy rate.\nLast year, Charalambous wrote in the Independent that a UK programme in the Democratic Republic of the Congo, which had seen tens of thousands of girls going to school for the first time, was being abandoned. Educational work was also cut in Ethiopia, Sierra Leone, Nigeria and Zimbabwe, and the FCDO Girls’ Education Department lost 51% of its funding.\nA spokesperson at Bond, a UK network for organisations working in international development and humanitarian aid, said: “Any cuts to programmes that support women and girls, including through education, threaten to reverse hard-won progress on ending gender-based violence and exploitation, and advancing gender equality worldwide.\n“Last year, polling by More in Common found the majority of the UK public wanted programmes that protect women and girls’ safety to be shielded from cuts to the UK aid budget. We urge the foreign secretary to uphold her commitment to prioritising the safety, human rights and economic opportunity of women and girls around the world.”\nAccording to analysis by Unicef, international aid to education is projected to fall by $3.2bn (£2.4bn) by 2026 – a 24% drop. It estimated that 6 million more children risk being out of school by the end of the year, with 30% of them in humanitarian settings. This is equivalent to emptying every primary school in Germany and Italy combined.\nThe UK had previously been one of the champions of global education, said Nhan-O’Reilly, and the cuts announced last year closely followed those in the US. “These cuts can’t be seen on their own; they’ve set the tone and influenced the posture and level of commitment from many other donors,” he said.\nThe prime minister, Keir Starmer, announced last year that the UK aid budget would be cut from 0.5% of gross national income to 0.3% in 2027, its lowest level since records began. The UN target is for countries to give 0.7%, something the Conservative former prime minister David Cameron pledged to do in 2012 despite protests from his own party.\nThe cut in 2025 was a reversal of Labour manifesto pledges and led to the resignation of Ann", "translation_ja": "アフリカ、アジア、中東全域で100万人の女児の就学継続を目指す主要な高等教育プログラムが、英国政府によって発表からわずか2年で廃止された。\n\n「女性のエンパワーメントのための高等教育強化（SHEFE）」と名付けられたこの計画は、2年前に前保守党政権が鳴り物入りで発表したもので、世界中で100万人の学生の高等教育へのアクセス拡大を目指す4500万ポンドの予算が組まれていた。外務・英連邦・開発省（FCDO）によれば、入札が取り下げられたという。\n\n5月、外務大臣のイヴェット・クーパー氏はFCDOにおいて女性・女児問題が優先事項であると強調し、「女性の安全を世界的な優先課題とするべく、国境を越えて取り組む決意だ」と宣言していた。\n\n全党議会グループ「グローバル教育」の議長を務める労働党下院議員バンボス・チャランバウス氏は懸念を示した。「女性・女児のエンパワーメントとその潜在能力の発揮を支援するために設計された主要な高等教育プログラムが、援助削減のために廃止されたとみられることに強い危機感を覚えている」と述べた。\n\n「FCDOはこうしたパートナーシップが人々の生活を変え得ると認めており、国内の機関にとっても恩恵がある。援助削減から立て直し、同様のプロジェクトを守るための方策を今から考え始めることが不可欠だ」と続けた。\n\nこのプログラムは、高等教育の恩恵を受けた女児は子どもとして結婚する可能性が最大6分の1になること、また親密なパートナーから暴力を受ける可能性が低くなることなどを背景に設計された。高度な教育を受けた女性は収入も増加する。\n\n国際開発・教育分野の関係者たちは、SHEFEの廃止は英国が公言してきた女性・女児への支援姿勢を著しく損なう一連の決定の最新事例だと主張している。\n\n内務省はアフガニスタン、スーダン、ミャンマー、カメルーンからの新たな留学ビザ申請をブロックしており、自国での就学機会が制限されていた多くの女性が人生を変えるような機会を逃すことになる。英国の大学は留学生から多大な収入を得ており、彼らは英国生まれの学生より大幅に高い授業料を支払っている。\n\n教育のための国際議会ネットワーク共同創設者のジョセフ・ニャン＝オライリー氏は次のように述べた。「政府は女性・女児へのコミットメントを声高に語るが、あらゆる場面で、世界で最も疎外された女児たちにとって最大のインパクトをもたらすと誰もが認めるもの、すなわち高等教育へのアクセスを否定し続けている」\n\n今年初め、FCDOは南スーダンで計画していた「万人のための教育」プログラムの入札取り消しを発表したとニャン＝オライリー氏は述べた。1億5000万ポンド規模のこの計画は、世界最貧国の一つであり、就学していない子どもの割合が極めて高く、識字率が世界で4番目に低い南スーダンで、女児や障害を持つ子どもたちの教育を支援することを目的としていた。\n\n昨年、チャランバウス氏はインディペンデント紙に、コンゴ民主共和国における英国のプログラムが廃止されようとしていると寄稿した。このプログラムでは数万人の女児が初めて学校に通えるようになっていた。エチオピア、シエラレオネ、ナイジェリア、ジンバブエでの教育支援も削減され、FCDOの女児教育局は予算の51%を失った。\n\n国際開発・人道支援分野の英国ネットワーク「ボンド」のスポークスパーソンは次のように述べた。「教育を含め、女性・女児を支援するプログラムへのあらゆる削減は、ジェンダーに基づく暴力や搾取の根絶、そして世界的なジェンダー平等の推進に向けて積み重ねてきた成果を後退させる恐れがある。昨年、『モア・イン・コモン』による世論調査では、英国国民の大多数が女性・女児の安全を守るプログラムを援助予算削減から保護することを求めていることが明らかになった。外務大臣が世界の女性・女児の安全、人権、経済的機会を優先するという約束を守るよう強く求める」\n\nユニセフの分析によると、教育への国際援助は2026年までに32億ドル（24億ポンド）、率にして24%減少する見込みだという。年末までにさらに600万人の子どもが就学できなくなるリスクがあり、そのうち30%は人道的危機の状況下にあると試算されている。これはドイツとイタリア全土の小学校の生徒を合わせた数に相当する。\n\n英国はかつてグローバル教育の旗手の一つだったとニャン＝オライリー氏は述べ、昨年発表された削減は米国の動きと密接に連動していると指摘した。「これらの削減は個別に見ることはできない。これらは他の多くのドナー国の姿勢やコミットメントの水準に影響を与え、その方向性を定めてしまっている」と語った。\n\n首相のキア・スターマー氏は昨年、英国の援助予算を国民総所得比0.5%から0.3%に削減すると発表した。これは統計開始以来最低の水準となる。国連の目標は0.7%であり、保守党の前首相デイビッド・キャメロン氏は党内の反発にもかかわらず、2012年にその目標達成を公約していた。2025年のこの削減は労働党のマニフェスト公約を翻すものとなり、アン（氏の辞任につながった）。", "vocab": [{"word": "fanfare", "definition": "大々的な宣伝や華やかな発表のこと。「with some fanfare」で「鳴り物入りで」という意味。重要な発表やイベントに際して大げさな注目を集める行為を指す。"}, {"word": "empower", "definition": "人や集団に力・権限・自信を与えること。国際開発の文脈では、特に社会的弱者が自律的に行動できる能力を高めることを意味する。"}, {"word": "professed", "definition": "公言された、表向きの、という意味の形容詞。実態と異なる可能性を含意しており、「professed commitment」は「公言しているコミットメント（だが実態は伴っていない）」というニュアンスを持つ。"}, {"word": "marginalised", "definition": "社会的・経済的に周縁化された、主流から排除された状態を指す。特に国際開発の文脈で、貧困や差別によって機会を奪われた集団を表す際に用いられる。"}, {"word": "humanitarian", "definition": "人道的な、という形容詞。「humanitarian settings」は紛争・災害・難民危機などの人道的緊急事態が生じている状況・地域を指す専門用語。"}, {"word": "posture", "definition": "ここでは物理的な姿勢ではなく、ある問題に対する立場・方針・態度を意味する。外交・政策の文脈で「donor posture（ドナー国の姿勢）」のように使われる。"}, {"word": "knock-on effects", "definition": "ある出来事が連鎖的に引き起こす二次的・三次的な影響を指すイディオム。「ドミノ効果」に近い意味で使われる。"}]}, {"title_ja": "コンゴ民主共和国のエボラ死者数が500人を超える、医療従事者のストライキ警告も", "title_en": "Ebola Death Toll in DR Congo Surpasses 500 Amid Worker Strike Threat", "summary_ja": "世界保健機関（WHO）の7月4日付報告書によると、コンゴ民主共和国におけるエボラ出血熱の流行で506人以上が死亡し、1,561人の感染が確認された。ワクチンも承認された治療法も存在しないブンジブジョウイルスによる第17次流行は、発生初月として過去最悪を記録した。さらに、最前線で働く医療従事者が未払いの手当と劣悪な労働環境を理由にストライキを警告し、危機に拍車をかけている。", "summary_en": "The Ebola outbreak in the Democratic Republic of Congo has killed over 506 people and infected 1,561, according to a WHO report dated July 4. The 17th epidemic, caused by the Bundibugyo virus for which no vaccine or approved treatment exists, has been declared the worst first month on record. The crisis is compounded by front-line health workers threatening to strike over unpaid benefits and poor working conditions.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/6/ebola-death-toll-in-dr-congo-surpasses-500?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Ebola death toll in DR Congo surpasses 500\nThe DR Congo’s 17th Ebola epidemic is fuelled by the Bundibugyo virus, with no existing vaccine or approved treatment options.\nThe death toll from the Ebola outbreak in the Democratic Republic of the Congo (DR Congo) has risen above 500, according to the World Health Organization (WHO), as health workers threaten strike action over low wages and poor working conditions.\nThe data released on Monday, based on reports from Congolese health authorities, showed that at least 506 deaths and 1,561 confirmed Ebola cases have been recorded in the country, according to a WHO situation report dated July 4. In neighbouring Uganda, the toll remained at two deaths and 20 confirmed cases.\nRecommended Stories\nlist of 3 items- list 1 of 3Alarm as Ebola spreads into new areas of DR Congo\n- list 2 of 3Medical teams in Goma face mistrust from relatives of Ebola victims\n- list 3 of 3DR Congo arrive in the US for the World Cup after Ebola quarantine\nEbola, which is transmitted through contact with bodily fluids and causes haemorrhagic fever, has killed more than 15,000 people in Africa over the past 50 years. The deadliest outbreak in the DR Congo resulted in nearly 2,300 deaths out of 3,500 recorded cases between 2018 and 2020.\nThe 17th epidemic in the DR Congo, officially declared on May 15, is caused by the Bundibugyo virus, for which there is neither a vaccine nor a treatment.\nA clinical trial involving two treatments for this rare strain began on Thursday, according to the WHO, which also granted emergency use authorisation for the first molecular diagnostic test for the virus.\nOfficials have yet to identify the outbreak’s patient zero and still need to trace possibly tens of thousands of people who have come in contact with infected individuals.\nThe first month of this Ebola outbreak was already the worst on record, the WHO has said.\nIn the mining town of Mongbwalu in Ituri province, considered the starting point of the epidemic, the high lethality of 50.7 percent suggests persistent challenges in early management and access to care for the sick.\nStrike threat\nThe crisis in the province has been further compounded by front-line health workers threatening to go on strike on Monday over unpaid benefits and poor working conditions.\nIn a notice to the government, a copy of which was seen by the AP news agency, workers both in and outside hospitals said they had not been paid benefits since the outbreak began and they do not have adequate supplies for their work.\nThey also complained of poor salaries, the “arrogance” of teams sent from the DR Congo’s capital of Kinshasa, and the “excessive” use of labour from other provinces without prioritising local labor in Ituri, as well as the lack of adequate equipment.\nThe virus is also present in the provinces near North Kivu and South Kivu, where the provincial capitals and large swathes of territory are controlled by the anti-government armed group M23.\nIn North Kivu, the mortality rate of 57.4 percent, significantly higher than the average, is considered “worrying” by Congolese health authorities.\nIn South Kivu province, no cases have been confirmed since May 26.\nHealth authorities in the M23 region announced last week that the epidemic had been eradicated in the controlled areas.", "translation_ja": "コンゴ民主共和国のエボラ死者数が500人を超える\n\nコンゴ民主共和国における第17次エボラ流行は、既存のワクチンも承認された治療法も存在しないブンジブジョウイルスによって引き起こされている。\n\n世界保健機関（WHO）によると、コンゴ民主共和国（DRコンゴ）でのエボラ出血熱の流行による死者数が500人を超え、低賃金と劣悪な労働環境に抗議する医療従事者がストライキを警告している。\n\n月曜日に発表されたデータは、コンゴの保健当局の報告に基づいており、7月4日付のWHO状況報告書によると、同国で少なくとも506人の死亡と1,561件の確認されたエボラ感染症例が記録された。隣国ウガンダでは死者数は2人、確認感染者数は20人にとどまっている。\n\n体液との接触によって感染し、出血熱を引き起こすエボラ出血熱は、過去50年間でアフリカにおいて15,000人以上の命を奪ってきた。DRコンゴで最も壊滅的な流行は、2018年から2020年にかけて記録された3,500件の感染者のうち約2,300人が死亡したものである。\n\n5月15日に正式に宣言されたDRコンゴでの第17次流行は、ワクチンも治療法も存在しないブンジブジョウイルスによるものである。\n\nWHOによると、この希少なウイルス株に対する2種類の治療法を対象とした臨床試験が木曜日に開始された。またWHOは、このウイルスに対する初の分子診断検査に緊急使用承認を付与した。\n\n当局はいまだに感染源となった「患者ゼロ」を特定できておらず、感染者と接触した可能性のある数万人規模の追跡調査も続けられている。\n\nWHOは、今回のエボラ流行の最初の1か月は記録上最悪であったと述べている。\n\n流行の起点とされるイトゥリ州の鉱業都市モンブワルでは、致死率が50.7パーセントに達しており、感染初期の管理と患者への医療アクセスに根強い課題があることを示している。\n\nストライキの警告\n\n州内の危機は、最前線で働く医療従事者が月曜日にストライキを実施すると政府に警告したことでさらに深刻化している。未払いの手当と劣悪な労働環境がその理由だ。\n\nAP通信が入手した政府への通告書の写しによると、病院内外で働く医療従事者は、流行開始以来手当が支払われておらず、業務に必要な十分な物資も確保されていないと訴えている。\n\n彼らはまた、低賃金、DRコンゴの首都キンシャサから派遣されたチームの「傲慢な態度」、そしてイトゥリ州の地元労働者を優先せずに他州からの労働力を「過剰に」活用していることへの不満も表明した。さらに、適切な装備が不足しているとも訴えた。\n\nウイルスは、反政府武装勢力M23が州都や広大な地域を支配している北キブ州および南キブ州近郊の州にも存在している。\n\n北キブ州では、死亡率が57.4パーセントと平均を大幅に上回っており、コンゴの保健当局はこれを「憂慮すべき」状況と見なしている。\n\n南キブ州では、5月26日以降、新たな感染確認例は報告されていない。\n\nM23支配地域の保健当局は先週、管理地域内での流行は根絶されたと発表した。", "vocab": [{"word": "haemorrhagic", "definition": "「出血性の」という意味の医学用語。「haemorrhagic fever（出血熱）」のように使われ、体内外での異常な出血を伴う疾患を指す。"}, {"word": "lethality", "definition": "「致死性・致死率」を意味する医学・統計用語。ある疾病や物質がどれほど死をもたらす可能性があるかを示す度合いを指す。"}, {"word": "authorisation", "definition": "「承認・許可」を意味する名詞で、特に公的機関や規制当局が正式に許可を与える行為を指す。「emergency use authorisation（緊急使用承認）」のように医療・行政の文脈で頻出する。"}, {"word": "compounded", "definition": "「悪化させられた・複合的に増大した」という意味の動詞compoundの過去分詞形。既存の問題に新たな要因が加わりさらに深刻になる状況を表す。"}, {"word": "eradicated", "definition": "「根絶された・完全に排除された」を意味する動詞eradicateの過去分詞形。病気や害虫などを完全に消滅させることを指し、公衆衛生の文脈で多用される。"}, {"word": "arrogance", "definition": "「傲慢さ・尊大な態度」を意味する名詞。他者を見下し自分が優れていると過度に信じる態度や振る舞いを指す。"}, {"word": "prioritising", "definition": "「優先する・優先順位をつける」を意味する動詞prioritiseの現在分詞形。複数の事項の中で重要度に応じて順位をつけて取り組むことを意味し、ビジネスや政策の文脈でよく使われる。"}]}, {"title_ja": "トランプ大統領、新生児向け投資口座「トランプ・アカウント」を創設", "title_en": "Trump Launches 'Trump Account' Investment Funds for Newborns", "summary_ja": "ドナルド・トランプ米大統領は、ニューヨーク証券取引所とナスダックの取引開始のベルを鳴らし、子ども向けの新たな投資プログラム「トランプ・アカウント」の開始を宣言した。このプログラムでは、大統領の2期目在任中に生まれた子どもを対象に、政府が自動的に1,000ドルを投資口座に入金する。今回の発表は、若年層向けの貯蓄を支援する重要な連邦政府の新たな金融施策となる。", "summary_en": "US President Donald Trump ceremonially rang the opening bells at the New York Stock Exchange and Nasdaq to launch a new children's investment program called 'Trump Accounts.' The initiative provides an automatic $1,000 government deposit into investment accounts for children born during his second presidential term. The announcement marks a significant new federal financial program targeting youth savings.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/6/trump-rings-in-new-trump-account-investment-accounts-for-children?traffic_source=rss", "state_media": false, "category": "経済", "full_text": "Trump rings in new ‘Trump Account’ investment accounts for children\nTrump rings in new ‘Trump Account’ investment accounts for children\nUS President Donald Trump rang the opening bells of the New York Stock Exchange and Nasdaq to mark the start of ‘Trump Accounts’ for children born during his second term. The government has guaranteed an automatic $1,000 deposit into these special investment accounts.\nPublished On 6 Jul 2026", "translation_ja": "トランプ大統領、子ども向け「トランプ・アカウント」投資口座の開設を宣言\n\nドナルド・トランプ米大統領は、ニューヨーク証券取引所およびナスダックの取引開始を告げるベルを鳴らし、大統領2期目の任期中に生まれた子どもたちを対象とした「トランプ・アカウント」のスタートを記念した。政府はこれらの特別な投資口座に対し、自動的に1,000ドルを入金することを保証している。\n\n発表日：2026年7月6日", "vocab": [{"word": "rang the opening bells", "definition": "「取引開始のベルを鳴らす」という慣用表現で、証券取引所の取引開始を象徴的に宣言する儀式を指す。著名人や企業が招待されて行うことが多い。"}, {"word": "investment accounts", "definition": "「投資口座」のこと。株式や債券などの金融商品を運用・管理するために開設される口座を指し、金融・経済の文脈で頻繁に使用される専門用語。"}, {"word": "guaranteed", "definition": "「保証された」という意味の形容詞・動詞で、ここでは政府が確実に実施することを約束するという強い意味合いで使われている。"}, {"word": "automatic deposit", "definition": "「自動入金」のこと。手続きなしに自動的に口座へ資金が振り込まれる仕組みを指す金融用語。"}, {"word": "second term", "definition": "「2期目」を意味する政治用語で、大統領や首長などが再選によって就任する2回目の任期を指す。"}]}, {"title_ja": "イラン、ハメネイ師葬儀中に司法長官モフセニ・エジェイを再任", "title_en": "Iran Reappoints Judiciary Chief Mohseni-Ejei Amid Khamenei Funeral Proceedings", "summary_ja": "イランは新最高指導者モジュタバ・ハメネイ師のテキストメッセージによる確認のもと、ゴラム・ホセイン・モフセニ・エジェイを司法長官として5年間の任期で再任した。この発表は、2月28日の米・イスラエルによる空爆で死亡した前最高指導者アリー・ハメネイ師の葬儀準備中に行われた。モフセニ・エジェイは大量処刑や安全保障関連訴追を主導してきたことで知られ、現在ワシントンと交渉中の最高国家安全保障会議でも投票権を持つ。", "summary_en": "Iran has reappointed Gholam-Hossein Mohseni-Ejei as chief justice for another five-year term, confirmed by new Supreme Leader Mojtaba Khamenei via text message. The announcement came during funeral preparations for former Supreme Leader Ali Khamenei, who was killed in a US-Israel air strike on February 28. Mohseni-Ejei, known for overseeing mass executions and security prosecutions, also holds a vote on the Supreme National Security Council currently negotiating with Washington.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/6/iran-reappoints-a-familiar-face-to-powerful-post-during-khamenei-funeral?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Iran reappoints a familiar face to powerful post during Khamenei funeral\nThe judiciary chief has emphasised the need to avenge the death of Supreme Leader Ali Khamenei and prosecute foreign 'aggressors'.\nTehran, Iran – Iran has reappointed Gholam-Hossein Mohseni-Ejei as chief justice as authorities focus on continuity amid the funeral of former Supreme Leader Ayatollah Ali Khamenei.\nSupreme Leader Mojtaba Khamenei, who has not been seen since succeeding his father in March, confirmed the reappointment of the 69-year-old cleric for another five-year term in a text message attributed to Iran’s new head of state.\nThe announcement came as crowds prepared to gather along a designated route in Tehran to accompany the remains of the former supreme leader and four of his family members, who were killed in an air strike on February 28, the opening day of the US-Israel war on Iran.\nThe funeral procession, guarded by members of the Islamic Revolutionary Guard Corps (IRGC), will then head to Qom and neighbouring Iraq before burial in the holy Shia city of Mashhad, in northeastern Iran.\nMohseni-Ejei was among the leading officials who were seen attending Khamenei’s funeral procession, as well as President Masoud Pezeshkian, former President Mahmoud Ahmadinejad, and IRGC commander-in-chief Ahmad Vahidi.\nIn his confirmation message, Mojtaba Khamenei asked Mohseni-Ejei to remain committed to the fight against corruption and embark on unspecified measures that would amount to a “judicial transformation”. He was also asked to pursue crimes by “arrogant powers” and “global aggressors”.\nMohseni-Ejei told state TV on Monday that he is committed to “peaks” of success envisioned by leaders of the Islamic Republic, and spoke about calls for revenge for the assassination of Khamenei.\n“Why do our dear people say ‘Revenge, revenge’? Because they want these criminal acts [of assassination] not to be repeated again. They want punishments that would deter enemies from committing such war and non-war crimes,” he said.\nWhat does Mohseni-Ejei’s appointment mean for Iranians?\nEarlier this week, Mohseni-Ejei renewed his pledge to support the “axis of resistance”, the network of regional armed groups aligned with Iran.\nAmid mounting economic troubles in Iran, Mohseni-Ejei promised “decisive action” against anyone who engages in hoarding, price gouging, or other moves harming people’s livelihoods.\nUnder a law passed after last year’s 12-day war with Israel and the US, Iranian authorities have significantly ramped up prosecution of “espionage” and other national security-related offences.\nUnder Mohseni-Ejei’s watch during the war, the judiciary has carried out near-daily executions of dissidents who were arrested for security offences. This includes protesters involved in nationwide anti-government demonstrations in January, when thousands were killed.\nInternational human rights organisations have warned that the executions have surged to their highest numbers since the late 1980s, when the theocratic establishment hanged many dissidents in the aftermath of a gruelling eight-year war with invading Iraq.\nTens of thousands have also been arrested since the protests broke out, while businessmen, celebrities, and other figures have had their assets confiscated by the state in connection with security charges.\nWhat powers does Mohseni-Ejei have?\nArticle 158 of the Islamic Republic’s constitution gives the head of the judicial branch authority over the judiciary’s organisational structure, judicial bills, and the hiring, dismissal, transfer, promotion and assignment of judges.\nMohseni-Ejei can also appoint the head of the Supreme Court and the prosecutor general after consultation with Supreme Court judges. He can nominate six legal jurists of the 12-member constitutional watchdog known as the Guardian Council, who are then elected by parliament.\nSince the council vets election candidates and has to ratify legislation before they can be enforced, this gives the judiciary chief indirect influence over the electoral and legislative process.\nIn the days between Khamenei’s killing and the selection of his son, Mojtaba, as his replacement by the 88-member clerical Assembly of Experts, Mohseni-Ejei was part of a three-man council temporarily in charge of the country, along with the president and a member of the Guardian Council.\nMohseni-Ejei can also continue to directly influence politics via his vote on the Supreme National Security Council, the top Iranian decision-making body that is currently spearheading mediated negotiations with Washington.\nAccording to officials and local media, Mohseni-Ejei voted in favour of the memorandum of understanding the US and Iran signed last month to effectively halt the conflict between the two countries. All but one person on the council approved the document, which paved the way for months more of talks on a more permanent peace deal. The negotiations are slated to continue after the funeral processions, with US Pres", "translation_ja": "イラン、ハメネイ師葬儀中に有力ポストへ顔なじみを再任\n\n司法長官は最高指導者アリー・ハメネイ師の死への報復と外国「侵略者」の訴追の必要性を強調した。\n\nイラン・テヘラン発 ― イランは、前最高指導者アヤトラ・アリー・ハメネイ師の葬儀において当局が継続性を重視する中、ゴラム・ホセイン・モフセニ・エジェイを司法長官に再任した。\n\n3月に父の後を継いで最高指導者に就任して以来、公の場に姿を見せていない最高指導者モジュタバ・ハメネイ師は、この69歳の聖職者をさらに5年間任命することを、イランの新国家元首に帰せられるテキストメッセージで確認した。\n\nこの発表は、米・イスラエルによるイランへの戦争開戦日である2月28日の空爆で死亡した前最高指導者とその家族4名の遺体を見送るため、テヘランの指定されたルート沿いに群衆が集まる準備をしている最中に行われた。\n\nイスラム革命防衛隊（IRGC）の隊員が警護する葬儀行列は、その後コムおよび隣国イラクへと向かい、イラン北東部のシーア派の聖地マシュハドで埋葬される予定だ。\n\nモフセニ・エジェイはハメネイ師の葬儀行列に出席した主要幹部の一人であり、マスウード・ペゼシュキアン大統領、マフムード・アフマディネジャド前大統領、IRGC最高司令官アフマド・ヴァヒディも姿を見せた。\n\nモジュタバ・ハメネイ師は確認メッセージの中で、モフセニ・エジェイに対し汚職との闘いへの継続的な取り組みと、「司法の変革」につながる具体的内容が明示されていない措置の実施を求めた。また、「傲慢な勢力」や「世界の侵略者」による犯罪の追及も求めた。\n\nモフセニ・エジェイは月曜日、国営テレビに対し、イスラム共和国の指導者たちが描く成功の「頂点」に向けて取り組む意欲を示し、ハメネイ師暗殺への報復を求める声についても語った。\n\n「なぜわが親愛なる国民は『復讐、復讐』と叫ぶのか。それは、こうした（暗殺という）犯罪行為が二度と繰り返されないことを望んでいるからだ。敵がそのような戦争・非戦争犯罪を犯すことを抑止するような罰を求めているのだ」と彼は述べた。\n\nモフセニ・エジェイの任命はイラン人にとって何を意味するか？\n\n今週初め、モフセニ・エジェイはイランと連携する地域武装組織のネットワークである「抵抗の枢軸」への支持を改めて誓った。\n\nイランで経済的困難が高まる中、モフセニ・エジェイは買いだめや不当な値上げ、または人々の生活を損なうその他の行為に対して「断固とした措置」を取ると約束した。\n\n昨年の米・イスラエルとの12日間の戦争後に成立した法律のもと、イラン当局は「スパイ行為」やその他の国家安全保障関連の犯罪に対する訴追を大幅に強化した。\n\nモフセニ・エジェイの監督下において、戦時中の司法機関はほぼ毎日、安全保障上の罪で逮捕された反体制派の処刑を実施してきた。これには1月に全国規模の反政府デモが起き、数千人が死亡した際に逮捕された抗議者も含まれる。\n\n国際的な人権団体は、処刑件数が1980年代後半以来最高水準に達していると警告している。当時、神政体制の政権はイラクによる8年間の侵略戦争の余波の中で多くの反体制派を絞首刑にした。\n\n抗議活動が始まって以来、数万人が逮捕されており、実業家や著名人などが安全保障上の容疑で国家に資産を没収されている。\n\nモフセニ・エジェイはどのような権限を持つか？\n\nイスラム共和国憲法第158条は、司法府の長に対し、司法の組織構造、司法関連法案、および裁判官の採用・解任・異動・昇進・任命に関する権限を与えている。\n\nモフセニ・エジェイはまた、最高裁判所判事との協議を経て最高裁長官と検事総長を任命することができる。また、議会での選挙を経て、12人からなる憲法監視機関「護憲評議会」の法律専門家6名を指名する権限も持つ。\n\n護憲評議会は選挙候補者の審査と、施行前の立法の承認を行うため、司法長官は選挙と立法過程に間接的な影響力を持つ。\n\nハメネイ師が殺害されてから、88人の聖職者からなる専門家会議が息子のモジュタバ師を後継者として選出するまでの数日間、モフセニ・エジェイは大統領と護憲評議会のメンバーとともに、国家を一時的に指揮する3人委員会の一員を務めた。\n\nモフセニ・エジェイはまた、現在ワシントンとの仲介交渉を主導しているイラン最高意思決定機関、最高国家安全保障会議での投票を通じて、政治に直接影響力を持ち続けることができる。\n\n当局者と地元メディアによれば、モフセニ・エジェイは先月、米国とイランが両国間の紛争を事実上停止するために署名した了解覚書に賛成票を投じた。会議メンバーのうち1名を除く全員がこの文書を承認し、より恒久的な和平合意に向けた数カ月にわたる協議の道が開かれた。交渉は葬儀行列の後も継続される予定であり、米国のバイデン大統領...", "vocab": [{"word": "reappoint", "definition": "（人を）同じ職に再び任命すること。政治・行政の文脈で役職の継続を示す際に用いられる。"}, {"word": "judiciary", "definition": "司法府、または裁判官・裁判所の総体を指す。「judiciary chief」は司法長官を意味する。"}, {"word": "theocratic", "definition": "神政政治の、宗教的権威が国家を統治する体制に関する形容詞。イランのような宗教指導者が政治権力を握る国家を表す際に使われる。"}, {"word": "prosecute", "definition": "（犯罪者や容疑者を）法的に訴追・起訴すること。法律・司法の文脈で多用される動詞。"}, {"word": "memorandum of understanding", "definition": "了解覚書。複数の当事者間で合意内容を文書化した非拘束的または拘束的な協定。国際外交の文脈で頻出する表現。"}, {"word": "espionage", "definition": "スパイ行為、諜報活動。国家機密を不法に収集・漏洩する行為を指し、安全保障・法律の文脈で使われる。"}, {"word": "ratify", "definition": "（条約・法律・決定などを）正式に承認・批准すること。議会や公式機関が文書の有効性を確定させる行為を指す。"}]}, {"title_ja": "英F-35戦闘機、ノルウェー海でロシア機を迎撃・誘導", "title_en": "British F-35 Jets Intercept Russian Bear-F Aircraft Near NATO Carrier Strike Group", "summary_ja": "2026年7月6日、英国のF-35戦闘機がノルウェー海で英空母打撃群に繰り返し接近したロシアのベアF哨戒機を迎撃し、誘導した。ロシア機は低高度でHMSプリンス・オブ・ウェールズに接近し、潜水艦探知用のソノブイを投下した。この事態はトルコのアンカラで開催されるNATO首脳会議の前日に発生した。", "summary_en": "British F-35 jets intercepted and escorted a Russian Bear-F aircraft that repeatedly approached the UK's Carrier Strike Group in the Norwegian Sea on July 6, 2026. The Russian aircraft flew at low altitude and dropped sonobuoys near HMS Prince of Wales, a device used to detect submarines. The incident occurred on the eve of NATO's annual summit in Ankara, Turkey.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/british-jets-intercept-russian-aircraft/article71190176.ece", "state_media": false, "category": "社会", "full_text": "London\nBritish F-35 jets, on Monday (July 6, 2026), escorted a Bear-F Russian aircraft that “repeatedly approached” the U.K.’s Carrier Strike Group in the Norwegian Sea and dropped sonobuoys (devices using sonar to detect submarines) near the aircraft carrier, according to the U.K.’s Ministry of Defence (MoD).\nThe incident occurred on the eve of the North Atlantic Treaty Organization’s (NATO) military alliance’s annual summit, scheduled for July 7-8 in Ankara.\nThe Bear-F passed at “low altitude and unnecessarily close” to HMS Prince of Wales (part of the fleet), dropping a large number of sonobuoys in “close proximity” to the carrier, according to the U.K. MoD.\n“The Russian aircraft was intercepted and escorted by two U.K. F-35 jets from HMS Prince of Wales until it left the area,” the statement said.\nThe Carrier Strike Group is deployed in the region as part of NATO’s Arctic Sentry, part of the alliance’s military posture in the Arctic and High North.\nU.K. Defence Secretary Dan Jarvis and Iceland’s Foreign Minister, Thorgerdur Katrin Gunnarsdottir, had visited HMS Prince of Wales over the weekend. Mr Jarvis is reportedly hoping to stay on in his post if Andy Burnham takes the reins at No.10 Downing Street.\nPublished - July 06, 2026 09:38 pm IST", "translation_ja": "ロンドン\n\n英国防省（MoD）によると、英国のF-35戦闘機が月曜日（2026年7月6日）、ノルウェー海において英国の空母打撃群に「繰り返し接近」し、航空母艦付近にソノブイ（ソナーを使用して潜水艦を探知する装置）を投下したロシアのベアF哨戒機を誘導した。\n\nこの事案は、7月7日から8日にトルコのアンカラで開催が予定されていた北大西洋条約機構（NATO）の年次首脳会議の前日に発生した。\n\n英国防省によると、ベアF哨戒機はHMSプリンス・オブ・ウェールズ（艦隊の一部）に対して「低高度かつ不必要なほど近い距離」を通過し、同空母の「至近距離」に大量のソノブイを投下した。\n\n「ロシアの航空機はHMSプリンス・オブ・ウェールズから発進した英国のF-35戦闘機2機によって迎撃され、当該空域を離れるまで誘導された」と同省の声明は述べている。\n\n空母打撃群は、北極圏および高緯度北方地域におけるNATOの軍事態勢の一環である「NATO北極哨戒（Arctic Sentry）」の一部として同地域に展開している。\n\n英国のダン・ジャービス国防相とアイスランドのソルゲルデュル・カトリン・グンナルスドッティル外相は週末にHMSプリンス・オブ・ウェールズを訪問していた。アンディ・バーナム氏がダウニング街10番地（英首相官邸）の指揮を執った場合でも、ジャービス氏は現職に留まることを望んでいると伝えられている。\n\n掲載：2026年7月6日午後9時38分（インド標準時）", "vocab": [{"word": "sonobuoys", "definition": "ソノブイ。水中に投下して音波（ソナー）により潜水艦を探知するための浮遊式電子装置。軍事・海洋調査で使用される専門用語。"}, {"word": "intercept", "definition": "迎撃する、遮断する。軍事文脈では、自国の戦闘機が外国の航空機に接近してその行動を阻止・監視する行為を指す。"}, {"word": "Carrier Strike Group", "definition": "空母打撃群。航空母艦を中心に、駆逐艦・潜水艦・補給艦などで構成される海軍の機動部隊のことを指す軍事用語。"}, {"word": "proximity", "definition": "近接、近さ。「in close proximity to」の形で「〜のすぐ近くに」という意味で使われる。日常英語より改まった書き言葉・報道表現。"}, {"word": "posture", "definition": "（軍事的な）態勢、姿勢。「military posture」で「軍事的配備・戦略的立場」を意味し、防衛・外交文脈で頻繁に用いられる上級語彙。"}, {"word": "escorted", "definition": "護衛した、誘導した。軍事文脈では戦闘機が他の航空機に並走して監視・誘導する行為を指し、単なる「付き添い」より強制的なニュアンスを含む。"}]}, {"title_ja": "ムンバイの豪雨で10人以上死亡、野党が政府の対応を批判", "title_en": "Mumbai Rains Kill Over 10; Opposition Questions Government Response", "summary_ja": "インド・ムンバイでは激しい降雨により洪水と交通障害が発生し、10人以上が死亡した。野党はこの危機に対する政府の対応を問題視している。また、カルール群衆事故の続報や、預言者ムハンマドに関する発言をめぐる最高裁判所の判断についても報じられている。", "summary_en": "Heavy rainfall in Mumbai has caused flooding and transport disruptions, resulting in more than 10 deaths. The opposition has raised questions about the government's handling of the crisis. The situation is covered alongside updates on the Karur stampede case and a Supreme Court ruling on procedural matters.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/videos/watch-mumbai-rains-kill-over-10-opposition-questions-govts-response-above-the-fold-06072026/article71190564.ece", "state_media": false, "category": "社会", "full_text": "Published - July 06, 2026 09:24 pm IST\nYou are logged in\nLoading...\nYou don’t have any Active Subscription.\nSubscribe nowSubscribed with another email? Logout and Login with that one.\nYour active subscription(s)\nAccount subscription benefits alongside Premium Stories, Editorials, Opinions and more. Unlock these with Subscription\nProducts you've access to\nAdditional Subscription Benefits\nAccount Settings\nNeed help with your subscription?\nMumbai continues to reel under heavy rainfall as flooding and transport disruptions affect daily life. In this episode, we bring you the latest on the city’s rain situation, an update on the Karur stampede case, and the Supreme Court’s refusal to “short-circuit” procedure while hearing a plea over remarks on the Prophet Mohammad, and more.\nPublished - July 06, 2026 09:24 pm IST\nPublished - July 06, 2026 09:24 pm IST\nComments have to be in English, and in full sentences. They cannot be abusive or personal. Please abide by our community guidelines for posting your comments.\nWe have migrated to a new commenting platform. If you are already a registered user of The Hindu and logged in, you may continue to engage with our articles. If you do not have an account please register and login to post comments. Users can access their older comments by logging into their accounts on Vuukle.", "translation_ja": "ムンバイは激しい降雨の影響が続いており、洪水や交通障害が市民生活に深刻な打撃を与えている。このエピソードでは、同市の降雨状況に関する最新情報、カルール群衆転倒事故の続報、そして預言者ムハンマドに関する発言をめぐる申し立てを審理する中で最高裁判所が手続きを「省略」することを拒否した判断など、各ニュースをお届けする。", "vocab": [{"word": "reel under", "definition": "「〜に苦しむ・翻弄される」という意味の慣用表現。困難や衝撃的な状況に対処しきれず混乱している様子を表す。"}, {"word": "stampede", "definition": "群衆が突然パニックに陥り、押し合いながら一斉に逃げ出す現象を指す。人命事故につながることが多く、ニュース報道で頻出する語。"}, {"word": "short-circuit", "definition": "本来踏むべき手順や過程を意図的に省略・迂回することを指す比喩的表現。法律・行政の文脈では正規の手続きを飛ばすことを意味する。"}, {"word": "plea", "definition": "法律用語で、裁判所に対して行う正式な申し立てや訴えのこと。特定の救済や判断を求めて提出される請願を指す。"}, {"word": "disruptions", "definition": "通常の活動や秩序が混乱・中断されることを指す。交通・業務・社会インフラなど幅広い文脈で使われる上級語彙。"}, {"word": "migrated", "definition": "ここではシステムやプラットフォームを別の環境へ移行・乗り換えたことを意味する技術的文脈での使用。一般には人や動物の移住も指す。"}]}, {"title_ja": "West Asia War LIVE: Mourners throng funeral procession in Tehran for Iran's Supreme Leader Ayatollah Ali Khamenei", "title_en": "West Asia War LIVE: Mourners throng funeral procession in Tehran for Iran's Supreme Leader Ayatollah Ali Khamenei", "summary_ja": "Israeli strike in southern Lebanon kills 4, including 3 women, says state media", "summary_en": "Israeli strike in southern Lebanon kills 4, including 3 women, says state media", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-live-updates-july-6-2026-khamenei-funeral-ceremonies/article71187769.ece", "state_media": false, "category": "政治", "full_text": "Mourners dressed in black flooded into Iran’s capital on Monday (July 6, 2026) for a procession as part of the funeral of the late Supreme Leader Ayatollah Ali Khamenei, with throngs of people calling for the death of U.S. President Donald Trump.\nKhamenei’s flag-draped coffin, and those of his family killed Feb. 28 in an airstrike at the start of the war launched by Israel and the United States, sat on board a truck. Authorities decorated the truck’s side to resemble the ornamental grating that surrounds the shrine of an imam.\nThe massive turnout, encouraged by Iran’s theocracy as a sign of strength, came as it negotiates with the U.S. over a permanent end to the war that killed the 86-year-old cleric.\nThe coffins will be taken through the streets of Tehran on their way to Mehrabad International Airport over a 12-hour journey, said Revolutionary Guard Gen. Hasan Hasanzsdeh, who is overseeing the procession.\nFollow live updates below:", "translation_ja": "", "vocab": []}, {"title_ja": "ハメネイ師葬儀の中、トランプ大統領が「米国は仕事を完遂する」とイランに警告", "title_en": "Trump warns 'US will finish the job' as Iran mourns Khamenei's death", "summary_ja": "米国のドナルド・トランプ大統領は、イランの最高指導者アリー・ハメネイ師の葬儀が行われる中、「米国は仕事を完遂する」と強硬な警告を発した。この発言は、イランが指導部の移行という敏感な時期を迎える中、テヘランへの圧力継続を示唆するものだ。この警告は、イランの核開発計画と地域的影響力をめぐるワシントンとテヘランの緊張関係を反映している。", "summary_en": "US President Donald Trump issued a stark warning to Iran, declaring that the United States 'will finish the job,' amid the funeral proceedings for Supreme Leader Ali Khamenei. The statement signals continued pressure on Tehran as Iran navigates a sensitive period of leadership transition. The warning reflects ongoing tensions between Washington and Tehran over Iran's nuclear program and regional influence.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/world/donald-trump-iran-finish-the-job-warning-khamenei-funeral-tehran-defiance-10774540/", "state_media": false, "category": "政治", "full_text": "The Express Global Desk at indianexpress.com which delivers authoritative, verified, and context-driven coverage of key international developments shaping global politics, policy, and migration trends. The desk focuses on stories with direct relevance for Indian and global audiences, combining breaking news with in-depth explainers and analysis. A major focus area of the desk is US immigration and visa policy, including developments related to student visas, work permits, permanent residency pathways, executive actions, and court rulings. The Global Desk also closely tracks Canada’s immigration, visa, and study policies, covering changes to study permits, post-study work options, permanent residence programmes, and regulatory updates affecting migrants and international students. All reporting from the Global Desk adheres to The Indian Express’ editorial standards, relying on official data, government notifications, court documents, and on-record sources. The desk prioritises clarity, accuracy, and accountability, ensuring readers can navigate complex global systems with confidence. Core Team The Express Global Desk is led by a team of experienced journalists and editors with deep expertise in international affairs and migration policy: Aniruddha Dhar – Senior Assistant Editor with extensive experience in global affairs, international politics, and editorial leadership. Nischai Vats – Deputy Copy Editor specialising in US politics, US visa and immigration policy, and policy-driven international coverage. Mashkoora Khan – Sub-editor focusing on global developments, with a strong emphasis on Canada visa, immigration, and study-related policy coverage. ... Read More\nStay updated with the latest - Click here to follow us on Instagram", "translation_ja": "トランプ大統領がハメネイ師の葬儀の中でイランに「米国は仕事を完遂する」と警告した背景とは\n\nイランの最高指導者アリー・ハメネイ師の葬儀が執り行われる中、米国のドナルド・トランプ大統領は「米国は仕事を完遂する」という強硬な警告をイランに向けて発した。この発言は、イランが指導部の移行という歴史的に重要かつ敏感な局面を迎えているタイミングと重なり、国際社会の注目を集めている。\n\nこの警告は、イランの核開発計画をめぐる長年の緊張、そして中東地域における米国とイランの代理勢力間の衝突という広範な文脈の中に位置づけられる。トランプ政権は以前から、イランの核保有を阻止するために軍事的選択肢を含むあらゆる手段を排除しないという姿勢を示してきた。\n\nハメネイ師の死去とその後の権力移行は、イラン国内の政治的な不確実性を高めるとともに、米国やイスラエルなどの国々にとって外交的・安全保障上の計算を複雑にする要因となっている。トランプ大統領の発言は、この移行期においても米国がイランへの強硬路線を維持する意図を持つことを明確に示したものとして受け止められている。\n\n本記事はインディアン・エクスプレス・グローバルデスクが提供する国際情勢の報道であり、世界政治・政策・移住動向に関する権威ある検証済みの文脈重視の報道を届けることを使命としている。同デスクはインド及び世界の読者に直接関連する記事に注力し、速報ニュースと詳細な解説・分析を組み合わせている。", "vocab": [{"word": "stark", "definition": "（警告・現実などが）厳しい、冷酷なほど明白な、という意味の形容詞。'a stark warning'（厳しい警告）のように用いられる。"}, {"word": "authoritative", "definition": "信頼性が高く、権威ある情報源や報道を指す形容詞。専門的な知識や公式な裏付けに基づいていることを示す。"}, {"word": "explainers", "definition": "複雑なニュースや政策を分かりやすく解説する記事形式を指すジャーナリズム用語（名詞・複数形）。"}, {"word": "accountability", "definition": "責任の所在を明確にし、説明責任を果たすことを意味する名詞。ジャーナリズムや政治の文脈で頻繁に使われる。"}, {"word": "permanent residency", "definition": "永住権のことを指す移民・ビザ政策の専門用語。特定の国に無期限で居住する法的権利を意味する。"}, {"word": "editorial standards", "definition": "報道機関が記事を作成・公開する際に遵守する編集上の基準や規範を指す複合名詞。正確性・公平性・透明性などを含む。"}]}, {"title_ja": "ムンバイ―プネ「ミッシング・リンク」、18時間の通行止め後に部分再開――2車線は依然閉鎖", "title_en": "Mumbai-Pune Missing Link Reopens After 18-Hour Monsoon Closure, Two Lanes Still Shut", "summary_ja": "記録的なモンスーン降雨による地滑りで18時間以上にわたり閉鎖されていたムンバイ―プネ間の「ミッシング・リンク」道路が部分的に再開した。プネからムンバイ方向の4車線のうち2車線のみが復旧し、残り2車線は依然として冠水のため閉鎖中である。当局は、モンスーンの影響が続く間は不要不急の外出を控えるよう通勤者に呼びかけている。", "summary_en": "The Mumbai-Pune Missing Link road reopened partially after an 18-hour closure caused by a landslide and record monsoon rainfall. Only two of four lanes on the Pune-to-Mumbai carriageway have been restored, as water still flows over the remaining two. Authorities are urging commuters to avoid non-essential travel while monsoon conditions persist.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/pune/mumbai-pune-missing-link-reopens-after-18-hour-disruption-amid-heavy-monsoon-advisory-issued-for-travellers-10774515/", "state_media": false, "category": "社会", "full_text": "Traffic on the Pune–Mumbai corridor of the Missing Link resumed after remaining disrupted for more than 18 hours, bringing relief to thousands of commuters stranded or affected by the prolonged closure. Authorities restored vehicular movement after ensuring the route was safe for travel following adverse weather conditions.\nEven as traffic has resumed, officials have urged commuters to avoid non-essential travel in view of the continuing heavy monsoon. The commuters are advised to strictly adhere to traffic advisories issued by the authorities as the rainfall may continue to impact traffic movement in the region.\n🚨 IMPORTANT UPDATE\n✅ Traffic has resumed on the Pune–Mumbai Connecting Link Road. Vehicular movement has been restored after completion of extensive safety operations.\nDespite relentless monsoon conditions, including heavy rainfall, strong winds and low visibility, MSRDC… pic.twitter.com/LCRirbWao0\n— MSRDCofficial (@MSRDC_official) July 6, 2026\nAs indicated, only two of the four lanes of the Pune to Mumbai corridor have been opened. A highway police statement read, “After the Maharashtra State Road Development Corporation, road safety engineers and the construction company certified that the route was safe, two lanes on the Pune–Mumbai carriageway have been reopened to traffic. The remaining two lanes continue to remain closed as water is still flowing over them.”\nBarely nine weeks after it was inaugurated as Maharashtra’s answer to the Mumbai-Pune Expressway’s most notorious traffic bottleneck, the Rs 6,695-crore Missing Link suffered its first major monsoon disruption on Monday, with a landslide damaging a retaining structure near one of its tunnels and forcing the closure of the Pune-to-Mumbai carriageway, as Maharashtra received record rainfall with 670 mm of rain battering Lonavala in over 24 hours.\nMumbai surpassed its average rainfall quota for July in six days even as Pune recorded 108 mm of rain in 24 hours until 8.30 am on Monday, the fourth-highest reading for the month since records started being maintained in 1896.", "translation_ja": "ムンバイ―プネ回廊の「ミッシング・リンク」における交通は、18時間以上にわたる通行止めの末に再開し、長期閉鎖によって立ち往生または影響を受けた数千人の通勤者に安堵をもたらした。当局は悪天候後にルートの安全を確認し、車両通行を回復させた。\n\n交通が再開した一方で、当局者は引き続き続く激しいモンスーンを踏まえ、不要不急の外出を避けるよう通勤者に強く促している。降雨が引き続き当該地域の交通に影響を及ぼす可能性があるため、通勤者は当局が発表する交通情報に厳格に従うよう求められている。\n\n（MSRDCオフィシャルによるツイート）\n「🚨 重要なお知らせ\n✅ プネ―ムンバイ連絡道路の交通が再開しました。大規模な安全確認作業の完了後、車両通行が復旧しました。激しい降雨・強風・低視程といった絶え間ないモンスーン状況にもかかわらず、MSRDCは……」\n\n発表によると、プネからムンバイ方向の4車線のうち2車線のみが開通している。高速道路警察の声明には次のように記されている。「マハラシュトラ州道路開発公社（MSRDC）、道路安全エンジニア、および建設会社がルートの安全を証明した後、プネ―ムンバイ方向の2車線を交通に再開放しました。残りの2車線は依然として水が流れているため、引き続き閉鎖されています。」\n\n開通式から僅か9週間、このルートがムンバイ―プネ高速道路で最も悪名高い渋滞ボトルネックに対するマハラシュトラ州の解決策として6,695クローレ（インドルピー）をかけて開通してから間もなく、「ミッシング・リンク」は月曜日に最初の深刻なモンスーン障害に見舞われた。トンネルの一つ近くで擁壁が地滑りにより損傷し、プネからムンバイ方向の車線が閉鎖を余儀なくされた。マハラシュトラ州では記録的な降雨が観測され、ロナワラでは24時間以上で670mmの雨が降り注いだ。\n\nムンバイは6日間で7月の平均降雨量を超え、プネでは月曜日午前8時30分までの24時間に108mmの雨が記録された。これは1896年の記録開始以来、同月で4番目に高い数値である。", "vocab": [{"word": "carriageway", "definition": "道路の一方向の車線群を指す技術用語。特に中央分離帯で区切られた往復それぞれの走行帯を表す際に使われる。"}, {"word": "retaining structure", "definition": "土砂や斜面の崩壊を防ぐために設置される擁壁などの土木構造物を指す専門用語。山岳道路や切り通しで多用される。"}, {"word": "disruption", "definition": "通常の流れや運営が大きく乱されること。交通・ビジネス・サービスなど幅広い文脈で使われる上級語彙。"}, {"word": "bottleneck", "definition": "交通や生産の流れが特定の地点で著しく滞る状況を指す比喩的表現。インフラや物流の文脈で頻出するイディオム。"}, {"word": "adverse", "definition": "条件や状況が不利・有害・悪影響をもたらすさまを表す形容詞。「adverse weather conditions（悪天候）」のように専門的文脈でよく使われる。"}, {"word": "inauguration", "definition": "新しい施設・制度・政権などが正式に開始・開通されることを指す名詞。式典を伴う公式な開始を意味する。"}, {"word": "adhere", "definition": "規則・指示・方針などに忠実に従うことを意味する動詞。「adhere to guidelines（指針を遵守する）」のような形で公式文書や報道でよく使われる。"}]}, {"title_ja": "Destiny’s least favourite child, Neymar bows out without a FIFA World Cup", "title_en": "Destiny’s least favourite child, Neymar bows out without a FIFA World Cup", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/sports/football/neymar-bows-out-without-fifa-world-cup-destiny-least-favourite-10774519/", "state_media": false, "category": "社会", "full_text": "Shuvaditya Bose is a Deputy Copy Editor at the sports desk of The Indian Express. ... Read More\n- Tags:\n- FIFA\n- FIFA World Cup 2026\n- Neymar\nThe bards and poets must have been smiling. It was the ending they would have written themselves: a final act composed to perfection.\nStrip away context for a moment, and reflect on the final telling act of Brazil versus Norway. A penalty. Walking up was Neymar. Brazil’s highest scorer, with more goals than Pele and more than Rivaldo and Ronaldinho combined. A goal would make him only the second Brazilian to score at four World Cups.\nAnd against him, Ørjan Nyland. Impregnable. He had denied Bruno Guimaraes from the spot, and then the undeniable Vinicius Junior. Every Brazilian attack disappeared.\nThen came Neymar. Ostentatious gait. Snobbish smile. The air of a man untouched by consequence.\n“Onde você quer?” he asked. (‘Where do you want it?’ )\n“Tenta na trave,” said Nyland. ‘Hit the woodwork.’\nNeymar didn’t. Back of the net. The sequence had reached its conclusion. Or, did it? Neymar walked up to the goalkeeper and whispered: “Comigo não, otário.” ‘Not with me, **ucker.’\nReality soon intruded. It was effectively the final kick of a match Brazil had already lost. A humiliation: only 34% possession against Norway. Their earliest World Cup exit since 1990.\nThe smirk dissolved into tears. Inconsolable, Neymar would announce his retirement from the national team. That penalty amounted to nothing. A fleeting moment of irrelevant brilliance.\nAnd herein lies a career encapsulated. Radiating flamboyance in moments, but overwhelmed by the larger story unfolding around it.\n“Não faça o que Menotti fez,” a journalist yelled at Dunga, as the erstwhile coach announced his squad for the 2010 World Cup. ‘Don’t do what Menotti did.’\nIn 1978, César Luis Menotti had omitted a 17-year-old Diego Maradona from Argentina’s World Cup squad, deeming him too inexperienced. Thirty-two years later, Dunga reached the same conclusion about an 18-year-old Neymar.\nPele and Romario urged Dunga to reconsider. A “Neymar é Seleção” petition drew thousands. Fans and journalists gathered outside Dunga’s house until he called the police.\nArgentina stopped asking questions once Menotti lifted the trophy without Maradona. Brazil only asked louder after a quarter-final exit to the Netherlands.\nDunga lost his job, and his successor, Mano Menezes, had to save his job by selecting Neymar.\nThe protests were vindicated within 28 minutes: a debut goal against the USA. Six weeks later, he was gone. Dropped for indiscipline after berating Santos manager Dorival Júnior for refusing to let him take a penalty.\nOn occasions, he wasn’t refused; he was flawless. In the 2010 San–São derby, he unveiled the paradinha, freezing Rogério Ceni before calmly scoring.\n‘Why don’t you hit it normally?’ a journalist asked.\nThe reply: “You don’t stand out by just doing the normal things.”\n2013. Brazil marched for two causes: against corruption on the streets and behind Neymar in the stadiums. Then came the Confederations Cup.\nOnly a trophy could alleviate the nation’s troubles — be it psychologically. If they didn’t, a disaster was waiting, warned the current president, Lula. Brazil won. Neymar was irresistible: four goals, two assists, and the Golden Ball.\n“I could see myself winning the World Cup,” he claimed.\nA year after the triumph, Neymar would exit the World Cup in tears. Quarter-final against Colombia. A knee to the back fractured his vertebrae. A few inches to either side, and he would have had to be dependent on a wheelchair forever.\n“My destiny was taken away from me, but I will come back stronger,” he said.\nDestiny’s least favourite child. The Confederations Cup was his first senior trophy for Brazil. It would also be his last.\nNeymar arrived in Russia in 2018 with a fractured metatarsal barely healed, and still left with four goal contributions. Only, they came up against the greatest Belgian squad ever assembled. At Qatar in 2022, he had an ankle injury, but still waltzed past a sea of bodies clad in chequered red and white to score in the quarter-final.\nBy 2026, time had become the opponent. An ACL rupture, hamstring and calf injuries restricted Neymar to barely three-and-a-half matches for Brazil between the previous World Cup and the current one. Yet, in the final act of his international career, he still found the net. With swagger.\nPerhaps there is an alternate timeline. One where Juan Camilo Zúñiga’s knee never crashes into his back in Fortaleza. One where Thibaut Courtois doesn’t produce the save of the tournament in Kazan. One where Croatia never find their equaliser in Al Rayyan. One where Erling Braut Haaland doesn’t leap in East Rutherford.\nIn that timeline, Neymar retires draped in medals. In this one, he leaves behind something far less tangible. The elasticos. The rainbow flicks. The mohawks. The showboating. But not a World Cup.\nDestiny’s least favourite child bows out.", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ大統領のCUSMA延長拒否、カナダに有利との見方", "title_en": "Trump Rejecting CUSMA Extension May Have Done Canada a Favour, Gurney argues", "summary_ja": "コラムニストのマット・ガーニー氏は、トランプ大統領がCUSMA貿易協定の延長を拒否したことについて、カナダ国民が過度に心配する必要はないと主張している。同氏はむしろこの動きがカナダに有利に働く可能性があると指摘し、より明確な条件での再交渉を促す契機になり得ると述べた。トランプ大統領の決定を後退と捉えるのではなく、カナダが貿易上の立場を見直す好機と位置づけている。", "summary_en": "Columnist Matt Gurney argues that Canadians should not be alarmed by Donald Trump's rejection of a CUSMA trade agreement extension. Gurney suggests the move may actually benefit Canada by forcing a clearer renegotiation on more defined terms. Rather than viewing it as a setback, he frames Trump's decision as an opportunity for Canada to reassess its trade position.", "source": "The Star", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMilwJBVV95cUxPTGF5M2xRSG96YXE3dzc3cXU2QzdXeXotWThjLUlkbjlvMWRibnJWQk1vbHFETmU5QlptLUdrWWxjVk9IelcxbTZaVVdSM29OSG83NnhkU0ZJam1tWGY0TWdXS29COTcxUWhQTUxhcEJmWWlIZER0elVRc21WY3g3UjctWWZSYjFoQkJodl85UGk4UjZIV2YzQmRtNUpOQ2hFdXVpdmhpR1lxNk9LekFPQnJEODNHRlRyTjNQeGFJcGhfN2NSVzdSdW8tTFBybEIxVEloekJrbVQ5TGpZVm1OREY3dUNCejdnQ2ZkTE4zOWxkV0R2YVlHZlV5ZUtpY0NZSTlXWVdTd  celebrate the milestone year. Further details about the specific programs and events are expected to be announced as the centennial approaches.", "source": "O Globo", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxPMVZRN2RsM0EtZWt6dlpuR0tvNElsSkhsaDdsd0lYalpqS285YlBna1RjbUdxWkFZOXotLWxJV3ZUczBZMGVPeUl0X0FLYXZXYy1ILTBqN3E1XzJVVTFrUXo0Y29RamNyanhVcUF6U2ZpUEdITV9ubk1oMF82c3FjM2ljZUZVbmZ0UG5sY0hkRTNvNGVqTnpuNlR2N21sYUZybkJHeVBHUkF2MUlUSFlpREtOQTFXaVJVUmfSAcgBQVVfeXFMUDJCRm16ZDU5bjViV21mdm1KMzJ5c3JnVjBEcVpJUGF2b0tnZ1JkRGhVVDVYM1pyMFNKQUNIdDVGQWRkTjNhR0dSai1kQS1nLVFwUFlDYm1aMjFaNEx2Y1YzWjVRWlNfN3lPWC1ERF9ZcVFhOFpTY3VVX0w2bmNyR2Rick9VLXRDemFydWFXOHhaSFhLai1PSmdfUlhDT0NiY0Z0TGJFUGZxLVhDdmxmZ25hcHl0T3dhWm9VeHZaWTRPa252QVNQdkM?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ナイジェリア関税局、2025年歳入目標を6,740億ナイラ超過――2026年は11兆ナイラを提案", "title_en": "Nigeria Customs exceeds 2025 revenue target by ₦674bn, proposes ₦11tn for 2026", "summary_ja": "ナイジェリア関税局は2025年の歳入目標6兆5,840億ナイラを6,740億ナイラ上回り、合計7兆2,770億ナイラを徴収した。2026年度には11兆400億ナイラの目標を提案しており、デジタル改革や密輸取締り強化によって達成を目指す。上院関税委員会は同提案を承認し、今後は本会議に報告書が提出される予定だ。", "summary_en": "The Nigeria Customs Service surpassed its 2025 revenue target of ₦6.584 trillion by ₦674 billion, generating ₦7.277 trillion in total. For 2026, the agency has proposed a revenue target of ₦11.04 trillion, supported by ongoing digital reforms and anti-smuggling operations. The Senate Committee on Customs approved the proposal, which will now be presented to the full Senate for adoption.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/893414-customs-surpasses-2025-revenue-target-projects-n11tn-for-2026.html", "state_media": false, "category": "経済", "full_text": "The Nigeria Customs Service (NCS) says it exceeded its 2025 revenue target by ₦674 billion, generating more than it realised in the previous year.\nThe Comptroller-General of Customs, Bashir Adeniyi, disclosed this on Monday while defending the agency’s 2026 budget proposal before the Senate Committee on Customs.\nMr Adeniyi said the service initially projected ₦6.584 trillion in revenue for 2025, based on its approved budget, but generated ₦7.277 trillion, representing a 10.24 per cent increase over the target.\nHe, however, noted that the service could have generated more revenue if excise duties on telecommunications services had been collected and import duty waivers on Compressed Natural Gas (CNG) equipment had not been granted during the period.\nThe CG also cited the Russia-Ukraine war as a factor affecting revenue generation, noting that disruptions to international trade, particularly the import of wheat and other commodities, impacted collections.\nHe further said the non-collection of import duties on military equipment, which accounted for about 40.52 per cent of the forgone revenue, also affected the agency’s earnings.\nProposal for 2026\nFor the 2026 fiscal year, the NCS proposed a revenue target of ₦11.04 trillion.\nMr Adeniyi said ₦5.542 trillion of the projected revenue will accrue to the Federation Account, ₦1.491 trillion to non-Federation accounts, ₦2.773 trillion to Import VAT, while ₦1.26 trillion will come from Free-on-Board (FOB) collections.\nHe added that the service expects to generate ₦1.235 trillion as operating income, comprising ₦949.86 billion from FOB, ₦55.47 billion from the NCS’s two per cent share of VAT, and ₦230.04 billion from ongoing capital budget funding.\nMr Adeniyi said the agency was confident of achieving the target through ongoing reforms, including the deployment of the Indigenous Unified Customs Information System (UCIS), enhanced post-clearance audits, and intelligence-driven anti-smuggling operations.\n“Our technology platform is now fully operational after overcoming initial implementation challenges. It has significantly improved automation across our commands and strengthened revenue collection and trade facilitation.\nOn the agency’s performance this year, the CG disclosed that the service had already generated ₦4.043 trillion between January and June 2026, expressing confidence that it would meet its annual revenue target before the end of the year.\nHe also expressed optimism that easing geopolitical tensions and improving global trade conditions would further boost revenue in the second half of the year.\n“We are hopeful that the de-escalation of the crisis will continue and that international trade activities will gradually return to normal. June recorded our highest monthly revenue so far in 2026, and we expect that momentum to continue,” he said.\nREAD ALSO: Audit Report: Senate panel clears Customs of ₦62 billion non-remittance query\nLawmakers commend Customs\nAfter the presentation, members of the Senate Committee on Customs commended the agency for surpassing its 2025 revenue target.\nThe committee chairman, Isah Jibrin, praised the CG and his management team, urging them to sustain the momentum and exceed the proposed 2026 target.\n“I want to commend you and your management team for what you have achieved so far. We urge you to work harder and ensure that you actualise the projected revenue figures for 2026. The committee is satisfied with your responses and remains confident in your ability to deliver,” he said.\nMr Jibrin, who represents Kogi East Senatorial District, subsequently put the proposed 2026 revenue target to a voice vote, with the committee members approving it.\nThe committee chairman thereafter announced the approval and congratulated the Customs Service.\nThe proposal will now be presented to the Senate in the committee’s report. If adopted by the Senate after debate, it will receive final legislative approval.", "translation_ja": "ナイジェリア関税局（NCS）は、2025年の歳入目標を6,740億ナイラ上回り、前年度を超える収入を達成したと発表した。\n\n関税局長官バシル・アデニーイ氏は月曜日、上院関税委員会での2026年度予算案審議の場でこの成果を明らかにした。\n\n同氏によると、同局は当初、承認予算に基づき2025年の歳入を6兆5,840億ナイラと見込んでいたが、実際には7兆2,770億ナイラを徴収し、目標比で10.24%の増収となった。\n\nただし同氏は、通信サービスに対する消費税の徴収が実施されていれば、また圧縮天然ガス（CNG）機器への輸入関税免除が付与されていなければ、さらに多くの歳入を確保できたと指摘した。\n\n長官はまた、ロシア・ウクライナ戦争も歳入に影響を及ぼした要因として挙げ、国際貿易——特に小麦やその他の一次産品の輸入——の混乱が徴収額に打撃を与えたと述べた。\n\nさらに、軍事装備品への輸入関税が徴収されなかったことも同局の収益に影響し、これは機会損失歳入の約40.52%を占めると説明した。\n\n【2026年度の提案】\n\n2026年度について、NCSは1兆1,400億ナイラの歳入目標を提案した。\n\nアデニーイ氏によると、予測歳入のうち5兆5,420億ナイラは連邦勘定に、1兆4,910億ナイラは非連邦勘定に、2兆7,730億ナイラは輸入消費税（輸入VAT）として、1兆2,600億ナイラはFOB（本船渡し）徴収分として配分される見通しだ。\n\n同氏はさらに、同局が1兆2,350億ナイラの業務収入を見込んでいることを明らかにし、その内訳はFOBからの9,498億6,000万ナイラ、NCSのVAT2%取り分からの554億7,000万ナイラ、進行中の資本予算財源からの2,300億4,000万ナイラとなると説明した。\n\nアデニーイ氏は、国産統合関税情報システム（UCIS）の導入、事後審査の強化、情報主導型の密輸取締り活動など、進行中の改革を通じて目標を達成できると確信していると述べた。\n\n「我々のテクノロジー・プラットフォームは、当初の導入時の課題を克服し、現在は完全に稼働しています。全国の各拠点における業務自動化が大幅に向上し、歳入徴収と貿易円滑化も強化されました。」\n\n同局の今年の実績について、長官は2026年1月から6月の間にすでに4兆430億ナイラを徴収したことを明らかにし、年内に年間歳入目標を達成できると自信を示した。\n\n同氏はまた、地政学的緊張の緩和と世界貿易環境の改善が、下半期の歳入をさらに押し上げると楽観視していると述べた。\n\n「危機の緩和が続き、国際貿易活動が徐々に正常化することを期待しています。6月は2026年に入って最高の月間歳入を記録しており、この勢いが続くことを見込んでいます」と同氏は語った。\n\n【議員らが関税局を称賛】\n\n発表後、上院関税委員会のメンバーは、関税局が2025年の歳入目標を上回ったことを称えた。\n\n委員長のイサ・ジブリン氏は長官と幹部チームを表彰し、この勢いを維持し2026年の目標を超えるよう促した。\n\n「あなたとあなたの幹部チームがこれまで達成してきたことを称賛したいと思います。さらに努力を重ね、2026年の予測歳入額を実現されるよう願います。委員会は皆さんの対応に満足しており、実現する能力を引き続き信頼しています」と同氏は述べた。\n\nコギ東部選挙区選出のジブリン氏はその後、2026年の歳入目標案を起立採決に諮り、委員会メンバーはこれを承認した。\n\n委員長はその後、承認を宣言し、関税局に祝意を表した。\n\n今後、この提案は委員会報告書として上院本会議に提出される。上院での審議を経て採択されれば、最終的な立法承認を受けることになる。", "vocab": [{"word": "excise duties", "definition": "特定の国内生産物（酒類、タバコ、通信サービスなど）に課される間接税のこと。関税（輸入税）とは区別される。"}, {"word": "post-clearance audits", "definition": "通関後に行われる事後審査のことで、輸入業者の申告内容や関税支払いが正確であったかを事後的に検証する手続きを指す。"}, {"word": "geopolitical", "definition": "地政学的な、という意味の形容詞で、地理的・政治的要因が国際関係や経済に与える影響を表す際に使われる上級語彙。"}, {"word": "accrued", "definition": "（収益・費用などが）発生する・累積するという意味の動詞。財務・会計文脈で特定の勘定や口座に収入が帰属・積み立てられる場合に用いられる。"}, {"word": "forgone revenue", "definition": "免税措置や政策判断などにより徴収されなかった、機会損失としての歳入を指す。「foregone revenue」とも表記され、財政・税務の文脈で使われる専門的表現。"}, {"word": "Free-on-Board (FOB)", "definition": "
