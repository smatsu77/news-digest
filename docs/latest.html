age for missing people. More than 130,000 were evacuated, mostly in the Guangxi region.\nMaysak killed large swathes of livestock and resulted in massive agriculture loss. It also spurred two rare tornadoes in the central Hubei province.\nRelated topics\n- Published3 days ago", "translation_ja": "", "vocab": []}, {"title_ja": "Zulu king expresses regret after video captures tirade against his wife", "title_en": "Zulu king expresses regret after video captures tirade against his wife", "summary_ja": "In the footage widely shared in South Africa, King Misuzulu threatens to physically assault his wife and accuses her of cheating.", "summary_en": "In the footage widely shared in South Africa, King Misuzulu threatens to physically assault his wife and accuses her of cheating.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cy8dl9n1v3vo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Zulu king expresses regret after video captures tirade against his wife\n- Published\nSouth Africa's Zulu king has expressed \"deep\" regret after a leaked video captured him hurling a barrage of insults at one of his wives.\nIn the video, which was widely shared on Wednesday, King Misuzulu kaZwelithini threatened to physically assault Queen Nomzamo Myeni, accused her of having an affair and said he wanted her out of the house.\nThe queen appeared to be the person filming the footage, remaining silent until the end of the video, when she said: \"This is the life I live, day and night\".\nOn Friday, a statement from the king's office said he recognised the outburst caused \"pain\" and \"embarrassment\" among royal circles and the broader Zulu ethnic group.\n\"It is important to clarify that the recordings are historical in nature and do not represent the present circumstances within the Royal Household,\" the statement also said.\nIn the video, King Misuzulu criticises his wife, who he married last November, for making excursions without his approval.\n\"She's out there without my permission. When you're a wife, you ask for permission. At least let your husband know,\" he told the queen, who is his third wife.\nAfter repeatedly insulting the queen, he told her he had a girlfriend waiting for him.\n\"I want you out,\" he said, as he left the room.\nIt is not clear who released the video into the public domain.\nThe statement from the royal household noted that on the day the video was leaked, the king and queen were receiving a group of politicians as part of their official duties.\nEngagements such as this demonstrate that the \"difficult circumstances\" captured in the video have been replaced by \"reconciliation\" and \"reflection\", the statement added.\nRegarded as the \"lion of the nation\", the Zulu king is the custodian of age-old traditions that place marriage and polygamy at the heart of royal success.\nHis role within South Africa may only be ceremonial, but he remains hugely influential, with a yearly government-funded budget of several million dollars.\nThe video has caused a sharp divide on social media - some have accused the king of displaying abusive and undignified behaviour, while others criticised the queen for airing private matters in public.\nSouth African journalist Asanda Magaqa said that while she would never encourage anyone to film private moments, \"watching that video, I understand why she felt compelled to record it\".\n\"No woman deserves to live like that,\" she wrote on social media platform X.\nThe footage also showed the king saying he became a monarch through witchcraft. King Misuzulu's coronation came after a year-long family feud, with some royals arguing that he was not the rightful heir and that his father's will had been forged.\nZulu society is deeply patriarchal, with women often expected to comply with traditional gender norms.\nSouth Africa has one of the highest rates of violence against women in the world.\nLast year, South Africa classified gender-based violence (GBV) as a \"national disaster\".\nThe king's marriage to Queen Myeni was delayed for months last year as he dealt with a scandal involving his first wife, Queen Ntokozo kaMayisela.\nQueen kaMayisela went to court in a bid to halt the wedding, arguing that her husband would be committing the offence of \"bigamy\" without first \"converting\" his civil marriage to her into a traditional Zulu marriage.\nBut the judge threw out her case, saying Queen kaMayisela had a \"turnaround\" in attitude as she had already agreed that her husband could take other wives.\nAdditional reporting by Khanyisile Ngcobo in Johannesburg\n- How royal divorce papers have shaken the Zulu kingdom - Published2 March 2025\n \n- The pomp and celebrations as new Zulu king crowned - Published21 August 2022\n \nGo to BBCAfrica.com, external for more news from the African continent.\nFollow us on Twitter @BBCAfrica, external, on Facebook at BBC Africa, external or on Instagram at bbcafrica, external", "translation_ja": "", "vocab": []}, {"title_ja": "Prince Harry, Meghan and children visit King and Queen", "title_en": "Prince Harry, Meghan and children visit King and Queen", "summary_ja": "King Charles and Queen Camilla host the Sussexes at Highgrove House on Friday afternoon.", "summary_en": "King Charles and Queen Camilla host the Sussexes at Highgrove House on Friday afternoon.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cj4g79exkzlo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Prince Harry, Meghan and children visit King and Queen\n- Published\nThe Duke and Duchess of Sussex, along with their children Prince Archie and Princess Lilibet, have visited King Charles and Queen Camilla.\nBuckingham Palace confirmed on Friday evening that the King and Queen hosted the family at Highgrove House earlier in the afternoon.\nIt is the first time Prince Harry and Meghan have been in the UK together since 2022, when they attended the funeral of Elizabeth II. The prince has travelled to the country alone since, and met his father on a trip last September.\nPrince Harry has attended a number of public events in the UK this week, but it had not been confirmed whether Meghan and the couple's two children had travelled.\nThis breaking news story is being updated and more details will be published shortly. Please refresh the page for the fullest version.\nYou can receive Breaking News on a smartphone or tablet via the BBC News App. You can also follow @BBCBreaking on X, external to get the latest alerts.", "translation_ja": "", "vocab": []}, {"title_ja": "Top Boy actor Micheal Ward found not guilty of rape", "title_en": "Top Boy actor Micheal Ward found not guilty of rape", "summary_ja": "Micheal Ward told the jury the encounter with his accuser was \"wholly consensual\".", "summary_en": "Micheal Ward told the jury the encounter with his accuser was \"wholly consensual\".", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cewq9vznzz5o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Top Boy actor Micheal Ward found not guilty of rape\n- Published\nBritish actor Micheal Ward has been cleared of raping a woman who claimed he had attacked her in the back of a car.\nWard, 28, denied two charges of rape and three of sexual assault, and a jury at Snaresbrook Crown Court acquitted him on all counts on Friday.\nHe had met the woman, who cannot be named for legal reasons, at an east London nightclub on 2 January 2023.\nBafta winner Ward, who is best known for the film Blue Story and Netflix series Top Boy, said: \"Everything we did was wholly consensual.\"\nDuring the trial, Ward told the jury he thought they were \"having a great time\" during the encounter.\nThe court heard the actor - who played gang leader Jamie in Top Boy - thought the woman was \"very cute\" when he met her and sensed \"there was interest there\".\nHe asked her to join him in a car, where there was a \"continuation of the flirting\".\n\"She was reciprocating the energy. She was pulling me close. For me, that was an inviting act and we were both enjoying that moment,\" Ward said, adding that she \"never mentioned anything about wanting to leave\".\nHe told the jury she had seemed \"absolutely fine\" and had a \"nice and engaging general conversation\".\nLater they exchanged messages, he sent a smiling emoji with a heart and she told him to enjoy the rest of his night.\nIn court, the woman broke down as she gave a different account.\nShe said she would have \"never would have got in that car with him\" if she had known what would happen.\nShe denied to Sallie Bennett-Jenkins KC, defending for Ward, that it was consensual, telling the court that \"Micheal raped me\".\nThe woman said she \"completely shut down\" and \"did not use the word no\" during the alleged attack.\nShe said she repeatedly told Ward she needed to leave \"on multiple occasions\". On the way home with a friend, she ordered an STI kit, ticking a box asking if she had been sexually assaulted.\nWhen Ward was arrested on 18 January that year he told police in a prepared statement: \"I deny the allegation of rape. I want to put on record that we had consensual foreplay and consensual sex.\"\nThe actor was given the Bafta Rising Star Award in 2020 and was later nominated twice for roles in the BBC's Small Axe and the 2022 film Empire of Light.\nRelated topics\n- Published3 days ago", "translation_ja": "", "vocab": []}, {"title_ja": "Bayeux Tapestry arrives in UK for first time in 900 years under police guard", "title_en": "Bayeux Tapestry arrives in UK for first time in 900 years under police guard", "summary_ja": "The famous artefact depicting events leading up to the Norman Conquest of England will go on display in September.", "summary_en": "The famous artefact depicting events leading up to the Norman Conquest of England will go on display in September.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cly9r54e5r4o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Bayeux Tapestry arrives in UK for first time in 900 years under police guard\n- Published\nThe Bayeux Tapestry has arrived in the UK, for the first time since it is believed to have been created here nearly 1,000 years ago.\nAt 02:50 BST, chaperoned from a secret location in northern France by a police guard, it was driven into a loading bay at the British Museum, which will put it on display in September.\nThe 70m-long 11th Century embroidery depicts in 58 scenes events leading up to the Battle of Hastings and Norman Conquest of England in 1066 - the moment that changed the country forever.\nThe heavy-looking crate, encased in an aluminium frame, was lowered out of the lorry in front of a select crowd including the French ambassador to the UK and the director of the British Museum.\nNick Cullinan, the director of the British Museum, told me: \"We've just witnessed something rather extraordinary, which is the arrival of the Bayeux Tapestry at the British Museum but specifically it is returning to England for the first time in almost 1,000 years.\n\"It feels like a really remarkable thing not just to witness but to be part of, and we're so excited to share it with as many people as possible.\"\nA big black crate being removed from a lorry in the dead of night may not sound that exciting but this is a historic moment - and BBC News was also there to witness it.\nMillie Horton-Insch, project curator of British Museum Bayeux Tapestry exhibition, said: \"It probably sounds a bit strange to be that excited at seeing a lorry reverse into a loading bay and a box removed, but when you consider the object within it, how old it was, how close to the events it depicts it was made, by people who lived through those events, it's really profound.\n\"I did well up a little bit when I saw it coming off the lorry so I imagine I'll probably be in floods of tears when I actually see it.\"\nFrench President Emmanuel Macron said in the Times, external that the loan was \"a gesture of trust, a tangible expression of a long-standing friendship and a sign of our shared desire to see France and the United Kingdom build their future together\".\nHe earlier posted a photograph of an image of the Bayeux Tapestry which the British Museum had projected on to the white cliffs of Dover. On the image was \"merci\" (thank you).\nBut in France ever since the announcement, there has been some disquiet that a work of such fragility and historical importance was to go on loan more than 300 miles away. A French petition to stop it called it a \"heritage crime\".\nEven artist David Hockney, before his death, said that he did not think it should come to the UK because moving it could put it in jeopardy. \"Some things are too precious to take a risk with,\" he wrote.\nShock absorbers and practice runs - how it was moved\nTo ensure it travelled safely - and without damage - the folding stand, which the tapestry has been kept on since it was taken down from display in Bayeux last year, was put inside a crate, with temperature and humidity regulation. That crate was then placed into an outer cage, in which metal springs acted as shock absorbers to protect it from bumps in the road.\nThe work travelled across the Channel on the Eurotunnel before making its way to central London in the dead of night.\nCullinan told me: \"If anybody had said on the other side, especially on the French side as the lenders, 'I think this is too risky to do', it wouldn't be arriving now. That's the reality. A museum would never do something that imperilled the objects in its care.\"\nNo damage is \"the goal\", he added. \"That's what all the care has gone into trying to achieve and we feel very confident about that. And the thing to say too is much more fragile things travel all the time. We lend more fragile things.\"\nTwo practice journeys with a textile copy were previously made, to test the route and the crate. The point was to measure the vibrations and reduce any major impact or shock.\nPeter Ricketts, the UK special envoy for the loan of the tapestry, said: \"everything possible\" had been done to avoid damage.\n\"No-one would want to bring the tapestry to the UK if they thought there was any damage or danger to this extraordinary object. I'm not worried, I'm relieved. It looks like all those meticulous arrangements for the transport are working very well.\"\nHe described the loan as \"two old nations coming together to look at their shared history and that is very special\".\nThe Bayeux Tapestry's epic story\nThe Bayeux Tapestry is not actually a tapestry at all: it is linen with embroidered pictures of the tussle between William, Duke of Normandy then Conqueror of England, and Harold II, King of England, stitched on in coloured woollen yarn.\nAn embroidery of immense significance - 58 scenes, 626 characters (but only six women), 202 horses - ships, swords and arrows (including one hitting the soldier believed to be Harold II - although there are questions about whether this was added later).\nHorton-Insch said it was ", "translation_ja": "", "vocab": []}, {"title_ja": "UK police arrest murder suspect in Ann Widdecombe's death", "title_en": "UK police arrest murder suspect in Ann Widdecombe's death", "summary_ja": "Police in southwest England say they have arrested a 26-year-old man on suspicion of murdering politician Ann Widdecombe. Based on initial inquiries, they were not treating the case as terrorism or politically motivated.", "summary_en": "Police in southwest England say they have arrested a 26-year-old man on suspicion of murdering politician Ann Widdecombe. Based on initial inquiries, they were not treating the case as terrorism or politically motivated.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/uk-police-arrest-murder-suspect-in-ann-widdecombe-s-death/a-77910345?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "UK police arrest murder suspect in Ann Widdecombe's death\nPublished July 10, 2026last updated July 10, 2026Authorities arrested a man on suspicion of the murder of Ann Widdecombe, police in southwest England announced on Friday, a few hours after news of the once-prominent politician being found dead emerged.\nA Conservative government minister in the 1990s known for her sharp tongue, Widdecombe became an ally of right-wing populist Nigel Farage later in her political career.\nWhat did police say about the case?\nPolice said nothing initially about a potential motive or backdrop in the nascent case.\n\"Our murder enquiry is in its early stages but moving at a significant pace,\" Detective Chief Inspector Ilona Rosson said. \"We are deploying all necessary resources to find out exactly what has happened and to locate the person responsible who we believe to be a white male.\"\nBut soon after their initial announcement, police said that a white male, a British citizen aged 26, had been arrested and remained in custody.\nMatt Longman from Devon and Cornwall Police said that, at least based on preliminary inquiries, the incident \"is not being treated as terrorism\" or as being politically motivated.\nPolice said they were called to Widdecombe's address in Dartmoor in Devon around midday on Thursday where she was found to have died having \"sustained serious injuries.\"\nRosson appealed to anyone with information to come forward, \"however insignificant\" it might seem.\n\"We are particularly keen to hear from anyone who may have seen anything suspicious in the vicinity of Haytor Vale, Haytor, or anyone with CCTV, doorbell or dashcam footage which could assist with our investigation,\" Rosson said.\nHow did Prime Minister Keir Starmer respond?\nBritish Prime Minister Keir Starmer expressed condolences to Widdecombe's family and friends amid the \"really shocking news,\" hailing Widdecombe as a \"distinguished\" politician.\n\"I think this is really important that this a moment where we rise above any political differences, the political divide,\" Starmer said soon before news of the suspect's arrest, saying the priority was to identify and secure a man who was \"clearly dangerous.\"\nStarmer said he had spoken with the speaker of parliament, Conservative leader Kemi Badenoch, Reform UK's Nigel Farage, and his heir apparent Andy Burnham \"to urge everybody to come together at a moment like this and to urge everybody to help the police.\"\nWho was Ann Widdecombe?\nWiddecombe, 78, was a former government minister and Conservative member of parliament from 1987 until 2010, who held ministerial positions in John Major's UK government in the 1990s.\nWiddecombe served as prisons minister after junior posts in the Department of Employment and working on social security.\nAfter Labour came to power in 1997, she was a senior shadow minister in opposition, first as Shadow Health Secretary and then as Shadow Home Secretary. She sought the party leadership in 2001 but couldn't drum up enough support among fellow MPs to launch a bid.\nShe retired from politics at the 2010 general election, but returned to the frontlines amid the 2016 Brexit referendum.\nA prominent supporter of Brexit, she became closely tied to Nigel Farage in later life, first joining the now-defunct Brexit Party and later moving to Farage's latest party, Reform UK. She was serving as the right-wing populist party's immigration and justice spokeswoman.\nWiddecombe also featured on reality TV as a contestant on the \"Strictly Come Dancing\" show in its heyday in 2010, and later in the 21st series of \"Celebrity Big Brother\" in 2018, finishing as runner-up.\nA later life convert to Catholicism — who described the Anglican Church decision to ordain women priests as \"the last straw\" — Widdecombe was known for her traditional views on various issues like law and order, immigration, climate change and sexuality.\nEdited by: Natalie Muller\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google by clicking here and hitting the \"star\" or \"preferred\" button, so you'll always see our verified news first.", "translation_ja": "", "vocab": []}, {"title_ja": "Trump signals support for Patriot production in Ukraine", "title_en": "Trump signals support for Patriot production in Ukraine", "summary_ja": "US President Donald Trump says he may let Ukraine produce Patriot air defense missiles. Analysts welcome the move as a sign of support for the country — but warn it could take years before production begins.", "summary_en": "US President Donald Trump says he may let Ukraine produce Patriot air defense missiles. Analysts welcome the move as a sign of support for the country — but warn it could take years before production begins.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/trump-signals-support-for-patriot-production-in-ukraine/a-77909681?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Trump signals support for Patriot production in Ukraine\nJuly 10, 2026NATO members agreed a comprehensive military aid package for Ukraine totaling €140 billion at their recent Ankara summit. In addition, after meeting with Ukrainian President Volodymyr Zelenskyy, US President Donald Trump announced that he intends to grant Ukraine a license to produce Patriot air defense missiles on its own soil.\nThese missiles are crucial for defending the country against Russian ballistic attacks. It has been reported that Ukrainian Patriot missiles stockpiles are running low. Indeed, the Ukrainian Air Force was unable to shoot down a single Russian missile during the massive attack on July 6.\nThe US intends to share its Patriot technology with Ukraine and grant it the right to produce the air defense missiles, Trump said. He also said the US was willing to provide any necessary support.\nTrump also said he wants to buy Ukrainian drones, marking a complete reversal in his attitude toward Ukraine's defense industry, which he had previously dismissed. Now, however, he praised the country's extensive drone manufacturing capabilities.\nHe called it \"amazing\" that Ukraine was still able to build drones \"in a war situation.\" Ukrainian drone expertise is widely sought after, including in Europe, and numerous countries signed drone agreements with Ukraine at the recent Ankara summit.\nA historic decision\nUkraine would be the third country in the world — after Japan and Germany — granted the right to produce Patriot missiles. Going from political declarations to the actual production stage, however, will take years, says military expert Oleh Katkov, editor-in-chief of Defense Express, a Ukrainian media and consulting company.\n\"That's really great, it's a historic moment,\" Katkov told DW. \"But it's important to realize that a process like this doesn't take just a few days or weeks. Despite its industry, skills, and expertise, it took Japan two years from reaching the agreement to starting production. We are likely still only in the stage of the Ukrainian and US governments reaching a general political agreement.\"\nHe told DW a government-level agreement needs to be finalized before defense contractors begin cooperation. Only then, Katkov said, will it be possible to negotiate with the US companies that hold the rights to the Patriot missiles.\n\"PAC-3 missiles are manufactured by Lockheed Martin, and PAC-2 missiles are built by RTX (Raytheon),\" Katkov explained. \"These companies must first draw up contracts with Ukrainian firms and only then can we talk about starting production in Ukraine.\"\nUkraine's Centre for Defence Strategies director Oleksandr Khara noted that the issue goes beyond whether Ukraine will receive a license to produce Patriot missiles. \"I really hope there aren't any hidden conditions,\" Khara told DW. \"Like expecting Ukraine to make concessions to Russia before it receives these Patriot missiles. We can expect all kinds of things from the current US administration.\"\nIhor Reiterovych of Kyiv's Taras Shevchenko National University, however, voiced doubts the Patriot missile agreement will be implemented soon. \"This is more of a symbolic matter,\" the political analyst told DW. \"First and foremost, it's a message to the Russian Federation: 'Look at what might happen next.' It is clear, however, that Ukraine will need a lot of time to actually establish Patriot missile production in its country.\"\nThe White House is showing the Kremlin that it is not abandoning Ukraine but supports it, Reiterovych said. \"If it does not produce Patriots now, then Ukraine will do so in the future, and that should serve as a warning to Russia.\"\nIs Ukrainian NATO membership off the agenda?\nWhat was striking about the Ankara summit was that there was almost no discussion of Ukraine's potential NATO membership. Oleksandr Khara mainly attributes this to Trump's stance. \"Even before his return to the White House, Trump made it clear that he is opposed to Ukraine joining NATO,\" adding that \"if the alliance's most important country takes such a position, it's clear that no one is going to seriously discuss membership now.\" Khara nevertheless thinks Kyiv should not abandon its strategic goal of joining the bloc.\nEurope will continue to maintain a collective security system, and Ukraine should be part of it, Khara told DW. \"We will not be able to contain Russia on our own in the long run.\"\nEven though Ukraine's possible NATO accession was not discussed in Ankara, Ihor Reiterovych believes the summit was still a success for Kyiv. That is because discussions focused on Ukraine, indicating its key role in European security matters, Reiterovych said.\nThis article was translated from German", "translation_ja": "", "vocab": []}, {"title_ja": "Ukraine's Bidnyi 'outraged' by Russia's Olympic return", "title_en": "Ukraine's Bidnyi 'outraged' by Russia's Olympic return", "summary_ja": "In exclusive comments to DW, Ukraine's sports minister, Matviy Bidnyi, said he is outraged by the IOC opening the door to Russia's return to the Olympics", "summary_en": "In exclusive comments to DW, Ukraine's sports minister, Matviy Bidnyi, said he is outraged by the IOC opening the door to Russia's return to the Olympics", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/ukraine-s-bidnyi-outraged-by-russia-s-olympic-return/a-77903308?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Ukraine's Bidnyi 'outraged' by Russia's Olympic return\nJuly 10, 2026Ukrainian Sports Minister Matviy Bidnyi says he is \"outraged\" at the International Olympic Committee's (IOC) decision to lift restrictions on Russian athletes and he has called on IOC President Kirsty Coventry to visit Ukraine.\n\"Together with all Ukrainians and the entire clean sports community worldwide, I am profoundly outraged. This decision is deeply unfair to every athlete who plays by the rules, and it is a total disrespect to the memory of hundreds of Ukrainian athletes killed by Russia,\" Bidnyi wrote in response to a DW query.\nBidnyi added that Coventry should come to Ukraine in order to \"see the reality with her own eyes.\"\n\"I want her to stand on our train platforms and see our defenders saying goodbye to their children before leaving for the frontline. I want her to visit our ruined sports academies and meet our young athletes who have to train under missile sirens. I am absolutely convinced that after witnessing this firsthand, any talk of 'neutrality' or 'procedural compliance' would stop immediately,\" the sports minister said.\nA legal trick?\nIn its statement released on Tuesday, the IOC said that analysis conducted by its Legal Affairs Commission had found that the Russian Olympic Committee (ROC) no longer included any regional sports organizations in territories falling under the jurisdiction of the Ukrainian Olympic Committee.\nRussian Sports Minister Mikhail Degtyarev welcomed the IOC's decision, saying it should clear the way for Russian athletes to make a full return to international sport.\nHowever, Bidnyi, his Ukrainian counterpart, said this was misleading because the ROC had actually excluded all 89 of its regional sports organizations, not just those in conquered Ukrainian territory.\n\"A direct exclusion of only Ukrainian territories would be perceived inside Russia as a sign of weakness. It would be a de facto admission that these territories do not belong to them – which is the absolute truth. I simply do not believe that the IOC fails to understand this. This is a deliberate decision to ignore reality, which completely ruins their own credibility.\"\nDW has approached the IOC for comment on the matter.\nRussia has been shut out of international sporting competitions since it launched its full-scale invasion of Ukraine in 2022, with the IOC suspending Russia's Olympic Committee in 2023. In both Paris in 2024 and in Milano Cortina in 2026, some Russian athletes were still able to compete as neutrals but only if they could prove they did not support the war and had no affiliation with Russia's military or security forces.\nIn 2023, Bidnyi said in an interview with DW that calling Russian athletes \"neutral means supporting murder.\" Three years later, Ukraine's sports minister met the latest IOC decision with an equally powerful response.\n\"It sends a dangerous message of total impunity to the entire world,\" Bidnyi wrote.\nNear-daily attacks continue\nRecently, Ukrainian drone attacks have sparked fires at an oil refinery, fuel depots and a port in southern Russia. Kyiv described the strikes as retaliation for Russia's near-daily attacks on Ukrainian civilians and energy infrastructure since Moscow launched its invasion.\n\"For Ukraine, this is a matter of survival. Since the full-scale invasion began, 688 Ukrainian athletes and coaches have been killed by Russia. Additionally, 911 sports infrastructure facilities have been ruined or damaged,\" Bidnyi said.\nVladyslav Heraskevych had his Olympic moment \"stolen\" as a result of honoring some of these athletes at the 2026 Winter Olympics. The Ukrainian athlete was prevented from competing in the men's skeleton for wearing a helmet showing the portraits of more than 20 Ukrainian athletes who have been killed since Russia launched its invasion.\nFighting to stop 'moral failure for the entire sports world'\nUkraine's sports minister said the country will fight the IOC decision in order to \"defend the true values of sport.\n\"The symbols of an aggressor state have no place at international sports events,\" Bidnyi said. \"We cannot allow the world to forget the cost of this war, and we will keep exposing how Russia uses sport as a tool for war propaganda.\"\nWhen asked whether he agreed with Coventry's position, that punishing athletes for the actions of governments is unfair, Bidnyi disagreed. The sports minister said this was not about individuals being punished for their passport, but more a case of accountability.\n\"You cannot celebrate 'human dignity' on an Olympic podium while your institution turns a blind eye to the ongoing murder of Ukrainian athletes,\" he said.\nIn Tuesday's statement, the IOC confirmed that the previous requirement that neutral athletes demonstrate that they have no links to Russia's military and security agencies and hadn't publicly supported the war, had been dropped,.\nCoventry said though, that the IOC would continue to monitor social media posts by Russian athletes.\n\"Th", "translation_ja": "", "vocab": []}, {"title_ja": "Iran live updates: Trump agrees to continue talks with Iran, but ceasefire is 'OVER'", "title_en": "Iran live updates: Trump agrees to continue talks with Iran, but ceasefire is 'OVER'", "summary_ja": "President Donald Trump announced \"major combat operations\" against Iran on Feb. 28, with massive joint U.S.-Israeli strikes.", "summary_en": "President Donald Trump announced \"major combat operations\" against Iran on Feb. 28, with massive joint U.S.-Israeli strikes.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/International/live-updates/iran-live-updates-thousands-throng-tehran-streets-khamenei/?id=134509610", "state_media": false, "category": "政治", "full_text": "Trump agrees to continue talks with Iran, but says ceasefire is 'OVER'\nPresident Donald Trump said that he has agreed to Iran’s request to continue talks, but he maintained, \"Cease Fire is OVER!\"\n\"The Islamic Republic of Iran has asked us to continue 'talks.' We have agreed to do so, but the United States has stated to them, in no uncertain terms, that the Cease Fire is OVER!,\" Trump said in a social media post Friday.", "translation_ja": "", "vocab": []}, {"title_ja": "LIVE:  ABC News Live", "title_en": "LIVE:  ABC News Live", "summary_ja": "24/7 coverage of breaking news and live events", "summary_en": "24/7 coverage of breaking news and live events", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Passenger window on Ryanair flight dislodges, partially sucking out passenger", "title_en": "Passenger window on Ryanair flight dislodges, partially sucking out passenger", "summary_ja": "A passenger window on a Ryanair flight dislodged shortly after takeoff from Thessaloniki, Greece, partially sucking out a passenger.", "summary_en": "A passenger window on a Ryanair flight dislodged shortly after takeoff from Thessaloniki, Greece, partially sucking out a passenger.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/US/passenger-window-ryanair-flight-dislodges-partially-sucking-passenger/story?id=134652591", "state_media": false, "category": "社会", "full_text": "Passenger window on Ryanair flight dislodges, partially sucking out passenger\nThe passenger is currently in the hospital, according to a doctor.\nA passenger window on a Ryanair flight dislodged shortly after takeoff from Thessaloniki, Greece, partially sucking out a passenger on Friday.\nA 61-year-old male passenger in the window seat was partially sucked out, according to a Greek doctor who treated the passenger on the tarmac once the plane safely landed.\nThe doctor said the passenger's wife was holding her husband's feet to stop him from being completely sucked out of the aircraft. The passenger is currently in the hospital.\nThe aircraft declared an emergency with oxygen masks dropping in the cabin. The plane returned to Thessaloniki, landing safely on Friday morning, according to a senior Greek aviation official.\nThe official told ABC News that the Ryanair Boeing 737 suffered an uncontained engine failure. Parts from the engine hit the plane, damaging the fuselage and breaking a passenger window, according to the official.\nGreek authorities are in contact with Ryanair's chief pilot in Malta and with the head of Ryanair's safety department, who will share more details when available, the official said.\n\"Ryanair flight from Thessaloniki to Memmingen on Friday morning (10 July) returned to Thessaloniki shortly after takeoff when a passenger window dislodged inflight. The aircraft landed normally and passengers returned to the terminal,\" Ryanair said in a statement to ABC News.\nAdding, \"One passenger requested and received medical assistance on the ground in Thessaloniki. In order to minimize any delay, a replacement aircraft was arranged to bring passengers to Memmingen, which departed Thessaloniki at 9:53 local this morning.\"\nBoeing told ABC News in a statement that it is aware of the incident and is in contact with the airline.\nThe National Transportation Safety Board said it was notified that the aircraft \"did an air turnback to LGTS due to a right engine issue and cabin decompression on July 10, 2026.\"\n\"Under the provisions of the International Civil Aviation Organization's Annex 13, the Republic of North Macedonia, as the country of occurrence, will lead the investigation and determine the composition of the investigative team and any international participation,\" the NTSB said in a statement.\nThe 737 Next Generation aircraft involved in this incident was delivered by Boeing in 2008.\nABC News has reached out to the engine maker for comment.", "translation_ja": "", "vocab": []}, {"title_ja": "Developing countries spend more repaying foreign debt than on education, UN reveals", "title_en": "Developing countries spend more repaying foreign debt than on education, UN reveals", "summary_ja": "Unesco report shows children lost out to servicing debt in 113 countries, with 18 spending five times more on loans Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up ", "summary_en": "Unesco report shows children lost out to servicing debt in 113 countries, with 18 spending five times more on loans Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up ", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/10/developing-countries-spend-more-foreign-debt-education-aid-cuts-unesco", "state_media": false, "category": "社会", "full_text": "Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up to 30%.\nMore was spent on servicing foreign debt than on education in 113 developing countries in 2025, according to research by the UN’s culture and education agency, Unesco. In sub-Saharan Africa, countries spent 3.6 times more on debt than education.\nThe situation is likely to be exacerbated by funding cuts, the agency warned. Low- and lower-middle-income countries have already lost 21% of the aid to education they were receiving in 2023 and could lose up to 30% by 2027. Some countries – including Afghanistan, Mali, Niger and Liberia – have already lost more than 40% in three years.\nMin Jeong Kim, director of Unesco’s education division, said: “Current approaches really keep the countries trapped in a cycle of austerity, underinvestment and stalled development.\n“This is really weakening countries’ stances on economic growth, eroding domestic revenue mobilisation and ultimately also diminishing their ability to handle their debt over time.”\nEighteen of the most indebted countries spent five times the amount they did on education on debt – and up to 16 times more in the case of Sri Lanka.\nAccording to the UK-based campaign group Debt Justice, repayments by poorer countries hit a 35-year high last year, with 56 countries spending almost a fifth of their total revenue on servicing loans.\nTim Jones, policy director at Debt Justice, said: “Countries’ debt payments have ballooned following a series of shocks from Covid, energy price and interest rate rises and climate disasters.\n“In the worst-affected [countries], this is leading to cuts in spending on essential services such as health and education.”\nThe situation has been made worse by aid cuts made by the US and Europe, which saw funding to education drop by $600m (£470m) in 2024, the last recorded figures, and is expected to have fallen further in 2025.\nThe combined impact of aid cuts and public spending being redirected to debt servicing has meant disruption to education systems, with schools often not receiving sufficient funds to operate and teachers not being paid.\nIn the long term, there is concern that weakened education systems affect indebted countries’ ability to develop their economies and better equip themselves to handle debt burdens in the future.\nUnesco said there needed to be a change to how debt relief was structured, shifting away from short-term relief to long-term arrangements that allowed countries to continue funding public services.\nJones said that another key factor in changing debt relief was ensuring that private lenders, often based in Britain and the US, were not able to block agreements to extract more profit for themselves, as they recently did with Ethiopia.\n“The UK needs to use its presidency of the G20 in 2027 to get major changes to the debt-relief process, including more debt cancellation and a faster process,” he said. “Central to this is incorporating the process into English law, so that private creditors can no longer disrupt and hold out from the debt relief.”", "translation_ja": "", "vocab": []}, {"title_ja": "Furore in Nigeria over fake federal agency set up in government HQ", "title_en": "Furore in Nigeria over fake federal agency set up in government HQ", "summary_ja": "President orders investigation after fictitious body given funding, triggering renewed scrutiny of alleged corruption A fictitious federal entity that was allocated 1.3bn naira (£700,000) in Nigeria’s 2026 budget has precipitated a political storm in Africa’s largest democracy in the run-up to a gen", "summary_en": "President orders investigation after fictitious body given funding, triggering renewed scrutiny of alleged corruption A fictitious federal entity that was allocated 1.3bn naira (£700,000) in Nigeria’s 2026 budget has precipitated a political storm in Africa’s largest democracy in the run-up to a gen", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/09/bola-tinubu-under-pressure-fake-nigerian-government-agency-political-storm", "state_media": false, "category": "政治", "full_text": "A fictitious federal entity that was allocated 1.3bn naira (£700,000) in Nigeria’s 2026 budget has precipitated a political storm in Africa’s largest democracy in the run-up to a general election set for January.\nThe fake agency came to light last October when Femi Gbajabiamila, the president’s chief of staff, wrote to the police alleging that his signature, along with official seals and reference numbers, had been forged by Adeniyi Adeyemi Matthew, who was claiming to have been appointed by the presidency to head the presidential foreign intervention promotion council (PFIPC).\nThe case is due to be heard in a court in the capital, Abuja, on 27 July, more than six months after the police filed an eight-count charge including criminal forgery, impersonation and obtaining by false pretence against Adeyemi and two others.\nIn a 1 July statement, the Nigerian presidency also claimed Adeyemi had met ambassadors without the knowledge of the foreign affairs ministry and misled the country’s accountant-general’s office into opening accounts for PFIPC with the central bank and 33 commercial banks.\nThe actual Nigerian investment promotion council had also reportedly raised an alarm about the similarities with the PFIPC.\nApart from being included in the budget, the PFIPC was also allocated office space in the federal secretariat in Abuja, a huge complex housing the headquarters of Nigeria’s civil service and many government ministries and agencies.\nThat has raised questions about how Adeyemi was able to gain access, with some critics speculating collusion with officials at the highest echelons of government.\n“Politicians and members of the public who are weaponising Adeyemi’s claim against the chief of staff should refrain from swallowing his narrative hook, line and sinker,” the presidency statement said, defending Gbajabiamila.\nLocal reports say Adeyemi has claimed he was given the appointment letter by Gbajabiamila, who has denied knowing him or ever being in touch.\nOn Monday, President Bola Ahmed Tinubu directed the independent corrupt practices and other related offences commission (ICPC) to open a probe. Days later, a Senate motion to independently investigate the presidential foreign intervention promotion council (PFIPC) did not pass.\nMeanwhile the House of Representatives set up a committee to question Abubakar Atiku Bagudu, the minister of budget and economic planning.\nThe presidency and supporters of the ruling party have pointed out that Adeyemi had previously misrepresented himself as the newly elected president-general of a UN youth agency called World Youth Organisation back in 2017.\nHis aides had said he was seeking permission from the UN security council to appoint staff across the world.\n“The 967 nominees will work with my office across the globe,” one of his representatives was quoted as saying in Nigerian daily Punch. “This will enable the organisation to function effectively and bring coordination across the world.”\nIt later turned out that the WYO was not affiliated with or part of the UN.\nCritics of the Tinubu administration have pointed to the controversial record of key government officials mentioned in the scandal.\nIn 2007, the supreme court of the US state of Georgia handed Gbajabiamila a three-year suspension from practising law in Atlanta after he failed to pass on $25,000 awarded as an injury settlement to a client four years earlier.\nGbajabiamila paid back the money in 2006, and later admitted he violated professional conduct rules, but blamed the incident on a paralegal who “closed the files as per my instruction, but unfortunately never paid the woman”.\nBagudu spent six months in a federal prison in Houston in 2003. According to the US Department of Justice, he was arrested for being an alleged accomplice to former dictator Sani Abacha who “embezzled, misappropriated and extorted billions of dollars from the government of Nigeria” amounting to more than $282m in one instance.\nBagudu reportedly agreed to return $163m to Nigerian authorities, who in turn dropped all cases against him, leading to his release without admission of wrongdoing.\nThe latest scandal has piled pressure on Tinubu, 74, ahead of January’s election, thrusting endemic corruption in Africa’s largest economy back into the spotlight.\nFormer vice-president Atiku Abubakar, who is due to challenge Tinubu’s re-election bid in January, called on his rival to set an independent commission of inquiry comprising neutral parties such as civil society leaders, opposition parties and the Nigerian Bar Association, to establish , exactly who was involved with the scheme.\n“Nigerians deserve the whole truth, not carefully scripted press statements,” his spokesperson Phrank Shuaibu said earlier this month, adding: “We therefore demand a truly independent investigation that follows the evidence wherever it leads. No sacred cows. No political protection. No selective justice.”", "translation_ja": "", "vocab": []}, {"title_ja": "LGBTQ+ cruise ship refused entry to Egypt days after Turkey turned it away", "title_en": "LGBTQ+ cruise ship refused entry to Egypt days after Turkey turned it away", "summary_ja": "Scarlet Lady’s 2,000 passengers told of change as one of those onboard says they will ‘sparkle and spend elsewhere’ An LGBTQ+ cruise ship blocked from Turkish waters this week has been refused entry into Egypt. The Scarlet Lady’s 2,000 passengers, including the Broadway performer Patti LuPone , woke", "summary_en": "Scarlet Lady’s 2,000 passengers told of change as one of those onboard says they will ‘sparkle and spend elsewhere’ An LGBTQ+ cruise ship blocked from Turkish waters this week has been refused entry into Egypt. The Scarlet Lady’s 2,000 passengers, including the Broadway performer Patti LuPone , woke", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/09/lgbtq-cruise-ship-refused-entry-egypt-turkey", "state_media": false, "category": "社会", "full_text": "An LGBTQ+ cruise ship blocked from Turkish waters this week has been refused entry into Egypt.\nThe Scarlet Lady’s 2,000 passengers, including the Broadway performer Patti LuPone, woke on Thursday morning to find a note placed under their cabin doors informing them that the ship was urgently looking for alternative ports.\n“Early this morning, we were informed that Scarlet Lady has been denied entry into Egyptian waters, and, as a result, will no longer be able to call in Alexandria today,” Rich Campbell, the chief executive of Atlantis Events, the tour group that chartered the Virgin Voyages ship, told passengers.\n“I know how much this visit meant to so many of you. We successfully sailed a similar itinerary last year without issue. So we were surprised by this unfortunate decision,” he wrote.\nThe note concluded: “Please know that both the Atlantis and Virgin Voyages teams worked tirelessly to make this call in Alexandria a possibility. This news came as a surprise to all of us, and we’re just as disappointed as you are.”\nThe visit to Egypt was already a change to the planned tour, hastily arranged after the ship was refused entry to Turkey. No official reason has yet been given for the decision of the Egyptian government.\nThe 10-day Athens to Venice cruise was blocked from Turkey after authorities published a statement online saying the cruise was chartered “by groups known for behaviours that do not align with the structure of our society and our moral values”.\nThe ship’s arrival had been cancelled after it “sparked significant public concern”, they added. “There is absolutely no possibility of the group in question visiting our province for an event of this nature.”\nRandy Slovacek, who is on the cruise, wrote on his blog: “In the company’s 36-year history, Atlantis had never had a ship denied entry to dock. And now it’s happened in two countries in one week.\n“Trust and believe, me and my fellow passengers will be fine: if they don’t want our tourism, we will sparkle and spend elsewhere. As my fellow blogger Joe Jervis once wrote: ‘They wish we were invisible. We’re not. Let’s dance.’”\nKyle Olsen, the owner of Hermes Holidays, another LGBTQ+ tour company, said he believed that if Turkey had not refused entry to the ship this week, Egypt would not have issued its ban. “I worry that other countries are going to be emboldened in turn to ban gay cruises from their ports as well,” he said.\n“This is a sad representation of the way the world is going. Successive governments are falling to rightwing groups and the rights of LGBT+ people are being taken away as a result across the globe.”\nOlsen said that after the actions of Turkey and Egypt, he would not be recommending the countries to his customers. “But it’s important to note that the views of the government are not necessarily reflective of the views of the peoples of those countries,” he said. “We’ve been to Turkey and Egypt many times in the past and have found the people very warm, friendly and engaging.”\nOlsen, who has friends onboard the Scarlet Lady, said the Egypt stop had been expected to be a high point of the tour by the passengers, who had got up at 6am to be ready for the day. “This was literally a last-minute call by the Egyptian government,” said Olsen. “The night before, everything was fine.\n“Lots of passengers had paid a lot of money for private tours to see the pyramids and the museums. It was going to be the trip of lifetime but now they’re in limbo.”\nThe ship has now been rerouted a second time, and will be docking in Chania, Crete, on Friday and Montenegro on Sunday.\nCampbell called Turkey’s decision “stunning”, telling CNN: “The reasoning behind it is that it’s a gay group.”\nAtlantis had chartered cruises to Turkey 13 times over the past 25 years without incident, he added, and calls involving the US embassy in Turkey had failed to reverse the ban.\nLuPone, the 77-year-old Tony award winner who is performing on the ship, shared her shock regarding the news on Instagram on Saturday. “The Atlantis cruise I am performing on next week has been banned from entering Turkey,” she wrote. “A ship – a magnificent ship – full of gay men. And me. Denied entry to Turkey simply because of who is onboard.\n“I am furious, but I am sailing, as the ship will make other ports of call. I am ready to perform for all the wonderful men on this Atlantis cruise, who deserve so much better than this.”\nAtlantis Events and Virgin Voyages have been approached for comment.", "translation_ja": "", "vocab": []}, {"title_ja": "Hospital workers wounded in Israeli drone attack on Gaza’s Kamal Adwan", "title_en": "Hospital workers wounded in Israeli drone attack on Gaza’s Kamal Adwan", "summary_ja": "Palestinian Health Ministry denounces attack as part of Israel&#039;s &#039;systematic targeting of health facilities&#039;.", "summary_en": "Palestinian Health Ministry denounces attack as part of Israel&#039;s &#039;systematic targeting of health facilities&#039;.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/10/hospital-workers-wounded-in-israeli-drone-attack-on-gazas-kamal-adwan?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Hospital workers wounded in Israeli drone attack on Gaza’s Kamal Adwan\nPalestinian Health Ministry describes attack as part of Israel’s ‘systematic targeting of health facilities’.\nAn Israeli drone attack on a hospital in northern Gaza injured staff members, despite a “ceasefire” being in place, according to the Palestinian Ministry of Health.\nThe attack on Friday was at Kamal Adwan Hospital in Beit Lahiya. At least three people were hurt in the courtyard and three others nearby, medical sources said.\nRecommended Stories\nlist of 3 items- list 1 of 3Gaza mourns aid worker killed by Israel who helped them see the World Cup\n- list 2 of 3The search for Gaza’s missing brings heartbreak and closure for loved ones\n- list 3 of 3Israel bans Jerusalem’s grand mufti from Al-Aqsa Mosque for one week\nThe Palestinian news agency, Wafa, said three “civilians” were wounded in the courtyard and three “maintenance workers” in the vicinity. The attack happened despite the facility being in the so-called Green Zone, an area under Israeli control.\nThe ministry condemned the attack, describing it as part of Israel’s “systematic targeting of health facilities”. It warned that attacks jeopardise the ability of healthcare workers and hospitals to provide both routine and life-saving medical services.\nGaza’s healthcare system has all but collapsed as a result of Israel’s genocide. Thousands of Palestinians require medical treatment abroad, but Israeli restrictions on movement have prevented the vast majority from leaving the Strip, compounding the humanitarian crisis.\nAt least a dozen people were injured in Israeli attacks across Gaza on Friday, Wafa reported.\nSeveral were wounded when Israeli forces opened fire on Palestinians near the Bureij refugee camp in central Gaza. Israeli drones targeted homes in the Tuffah neighbourhood of Gaza City.\nThe health ministry has called on the United Nations and humanitarian organisations to publicly condemn Israeli attacks on Gaza’s healthcare infrastructure in an effort to pressure Israel to stop.\nPressure on Israel to release Palestinian doctor\nThe attack on Kamal Adwan Hospital follows growing international pressure on Israel to release its director, Hussam Abu Safia. The Palestinian doctor has been arbitrarily detained by Israel for more than 18 months without charge or trial. His lawyers say his life is at imminent risk.\nEarlier this week, UN experts demanded that Israel release him and all other healthcare workers who have been arbitrarily detained.\nIsrael said on Friday that Abu Safia’s detention was “lawful”, and rejected reports that he suffered a life-threatening condition.\nAbu Safia “is lawfully detained by Israel based on concrete intelligence”, Israel’s diplomatic mission in Geneva said on X, accusing him of being a member of Hamas.\n“At no stage of his detention has he exhibited any indication of a life-threatening condition.”\nIsrael has been found to have repeatedly lied about possessing evidence that justified the killing of Palestinian civilians. In April last year, Israeli officials revised their account of the killing of 15 Palestinian medics after video contradicted their initial claims. The Israeli military subsequently admitted to “professional failures” and “breaches of orders”.\nIsrael has killed at least 73,110 Palestinians since launching its assault on Gaza on October 7, 2023. At least 1,084 Palestinians have been killed since the “ceasefire” started last October.", "translation_ja": "", "vocab": []}, {"title_ja": "Ronaldo still has Portugal future if he wants it, says new coach Jesus", "title_en": "Ronaldo still has Portugal future if he wants it, says new coach Jesus", "summary_ja": "The 2026 World Cup exit for Portugal was believed to be the end of Cristiano Ronaldo&#039;s international career.", "summary_en": "The 2026 World Cup exit for Portugal was believed to be the end of Cristiano Ronaldo&#039;s international career.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/7/10/ronaldo-still-has-portugal-future-if-he-wants-it-says-new-coach-jesus?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Ronaldo still has Portugal future if he wants it, says new coach Jesus\nThe 2026 World Cup exit for Portugal was believed to be the end of Cristiano Ronaldo’s international career.\nPortugal has appointed Jorge Jesus as their new national team coach, and he has said he would continue to call on veteran superstar Cristiano Ronaldo if he is available, insisting the forward will “never” be a problem.\nRonaldo, who said he has appeared at his last World Cup, has not decided whether he will continue to play for the national team after Spain eliminated Portugal, under former manager Roberto Martinez, in the last 16 of the 2026 World Cup.\nRecommended Stories\nlist of 4 items- list 1 of 4Hundreds give hero’s welcome to Egypt after best World Cup run\n- list 2 of 4Does more World Cup history beckon for Norway? England stand in their way\n- list 3 of 4England vs Norway: Key talking points ahead of World Cup quarterfinal\n- list 4 of 4‘Unstoppable force’: Mbappe’s France crush Morocco’s World Cup dreams\n“As long as he’s playing and is in a condition to be selected, I will pick him, within certain limits and under the conditions that I consider best for the national team,” Jesus told reporters Friday at his presentation.\nThe 71-year-old journeyman coach said he has not spoken to Ronaldo yet but that they would discuss the former Manchester United and Real Madrid star’s future in the game.\n“I haven’t spoken with Cris yet … Cris is never going to be a problem for the national team. Not for the national team, nor for me,” Jesus explained.\n“Cris is a symbol of Portuguese football. Cris is a symbol of the national team… that will forever be in the history books.\n“I had great pleasure working with him this past year … [it’s] easy to work with him.\n“We’re going to have a conversation between the two of us about what he wants to do with the future of his career.”\nJesus coached five-time Ballon d’Or winner Ronaldo at Al-Nassr before leaving in May after guiding the club to the Saudi Pro League title.\n“I know [Ronaldo] wants to keep playing at Al-Nassr, because, as you know, I spent a year with him,” added Jesus.\n“He always told me, ‘I’m going to end my career at Al-Nassr.'”\nJesus will lead Portugal until after the 2030 World Cup, which the country is hosting along with Spain and Morocco.", "translation_ja": "", "vocab": []}, {"title_ja": "FIFA has nearly 1,200 tickets still on sale for World Cup final at $7,380", "title_en": "FIFA has nearly 1,200 tickets still on sale for World Cup final at $7,380", "summary_ja": "Several tickets remain for lower decks ranging from $19,995 to $32,970, as well as Trophy Lounge section at $34,500.", "summary_en": "Several tickets remain for lower decks ranging from $19,995 to $32,970, as well as Trophy Lounge section at $34,500.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/7/10/fifa-has-nearly-1200-tickets-still-on-sale-for-world-cup-final-at-7380?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "FIFA has nearly 1,200 tickets still on sale for World Cup final at $7,380\nSeveral tickets remain for lower decks ranging from $19,995 to $32,970, as well as Trophy Lounge section at $34,500.\nFIFA had nearly 1,200 category two tickets priced at $7,380 on sale for the World Cup final on July 19 at MetLife Stadium in East Rutherford, New Jersey.\nThe governing body’s last-minute ticket sales site, which at times had listed the game as sold out, had 1,178 seats available across five sections of the top deck along the sidelines: 282 in section 344, 299 in section 343, 139 in section 335, 443 in section 334 and 15 in section 333.\nRecommended Stories\nlist of 4 items- list 1 of 4Gaza mourns aid worker killed by Israel who helped them see the World Cup\n- list 2 of 4‘Unstoppable force’: Mbappe’s France crush Morocco’s World Cup dreams\n- list 3 of 4Norway change World Cup team hotel in Miami days before England showdown\n- list 4 of 4Which records has Kylian Mbappe broken at the World Cup?\nFIFA also was selling 68 front category one tickets in the lower deck at prices ranging from $19,995 to $32,970 and had remaining hospitality tickets in its Trophy Lounge and Trophy Lounge+ sections priced at $34,500 and $32,500, including food and drinks.\nIn addition, FIFA had tickets available at $1,600 to $3,995 for Saturday’s quarterfinal between Argentina and Switzerland at Arrowhead Stadium in Kansas City, Missouri.\nResale tickets for the final were available on FIFA’s marketplace at prices from $7,440.50 to $11,499,998.85.\nFIFA repeatedly faced searing criticism over the cost of World Cup tickets throughout various sales phases ahead of the tournament, with one fan group filing a lawsuit over “excessive ticket prices”.\nIn April, FIFA had four tickets on its resale market priced at $2m each; President Gianni Infantino joked about that, but otherwise defended the eyewatering prices, insisting that football’s global governing body was obliged to take advantage of laws in the US that allow tickets to be resold for thousands of dollars above face value.\nFIFA also faces a subpoena from the states of New York and New Jersey as part of an investigation surrounding ticket pricing and the accuracy of seat locations for the World Cup.", "translation_ja": "", "vocab": []}, {"title_ja": "Ukrainian drones hit southern Russian refineries, Azov port", "title_en": "Ukrainian drones hit southern Russian refineries, Azov port", "summary_ja": "Kyiv has beefed up its efforts in recent months to hinder Moscow’s financial capabilities in its war against Ukraine, targeting energy infrastructure in retaliatory strikes and causing a nationwide fuel shortage", "summary_en": "Kyiv has beefed up its efforts in recent months to hinder Moscow’s financial capabilities in its war against Ukraine, targeting energy infrastructure in retaliatory strikes and causing a nationwide fuel shortage", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/ukrainian-drones-hit-southern-russian-refineries-azov-port/article71207976.ece", "state_media": false, "category": "政治", "full_text": "Ukrainian drone strikes on Friday (July 10, 2026) hit southern Russian oil refineries and the port of Taganrog on the Azov Sea, where authorities declared an emergency and evacuated some residents, officials said.\nKyiv has beefed up its efforts in recent months to hinder Moscow’s financial capabilities in its war against Ukraine, targeting energy infrastructure in retaliatory strikes and causing a nationwide fuel shortage.\nRussia’s Defence Ministry said its forces downed over 370 Ukrainian drones, including over the Moscow region.\nIn the port of Taganrog, near occupied Ukraine, social media videos showed plumes of smoke rising over the city. Local governor Yuri Slyusar said he visited the port after “massive” night-time strikes. “Efforts to extinguish the fire of petroleum products at the seaport are ongoing.”\nIn the neighbouring Krasnodar region, authorities said drones caused a fire at the Ilsky oil refinery. Authorities reported no casualties.\nRussian leader Vladimir Putin has acknowledged that the Ukrainian strikes are causing a fuel shortage and said they are aimed at dividing Russians.\nMeanwhile, Ukraine’s commander-in-chief Oleksandr Syrsky said that a turning point in the war with Russia was “still a long way off”, despite hailing a string of recent successes for his troops.\nKyiv’s army has halted the Russian advance across much of the front line in recent months, and delivered a string of major long-range attacks on Russian oil refineries. Many in Ukraine and among their backers abroad are saying Kyiv’s troops are on the front foot in the more than four-year war.\nIn a social media post summarising the first half of the year, Mr. Syrsky noted a decrease in the number of “active offensive fronts”, and said Russia’s assaults had dropped by half.\n“At the same time, we are still far from a turning point in the war,” he added.\nPublished - July 10, 2026 11:30 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Mysterious strikes target Iran after U.S. air attacks", "title_en": "Mysterious strikes target Iran after U.S. air attacks", "summary_ja": "Israel, which under Prime Minister Benjamin Netanyahu has engaged in an intense campaign against Iran, has not attacked the Islamic Republic since June.", "summary_en": "Israel, which under Prime Minister Benjamin Netanyahu has engaged in an intense campaign against Iran, has not attacked the Islamic Republic since June.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/mysterious-strikes-target-iran-after-us-air-attacks/article71207953.ece", "state_media": false, "category": "政治", "full_text": "A series of mysterious, unclaimed air strikes that hit Iran after the U.S. said it finished its attacks have again raised questions of who else may be targeting the Islamic Republic.\nThe strikes on Thursday (July 9, 2026), just as Iran prepared to bury the late Supreme Leader Ayatollah Ali Khamenei, hit areas across southern Iran. The country’s theocracy hasn’t directly blamed anyone for the strikes, though one lawmaker issued a warning to the United Arab Emirates over allegedly providing support to the United States in its campaign against Iran.\nGulf Arab states, which repeatedly have been targeted by Iran since the war began February 28, did not immediately respond to requests for comment on Friday over the strikes. The attacks come as they and the U.S. insist the Strait of Hormuz must be open and free to ships to transit.\nIsrael, which under Prime Minister Benjamin Netanyahu has engaged in an intense campaign against Iran, has not attacked the Islamic Republic since June. Israel also broadly immediately claims its attacks on Iran.\nOn Friday (July 10), Iranian state media quoted Esmail Kousari, a former commander in IRGC, as warning the UAE would “pay the price for its cooperation with the United States”.\nPublished - July 10, 2026 11:14 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Iran has asked to continue talks, and the U.S. agreed, Trump says", "title_en": "Iran has asked to continue talks, and the U.S. agreed, Trump says", "summary_ja": "The two nations reached an interim deal last month to end ‌a four-month conflict that has throttled worldwide energy supplies", "summary_en": "The two nations reached an interim deal last month to end ‌a four-month conflict that has throttled worldwide energy supplies", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/iran-has-asked-to-continue-talks-and-the-us-agreed-trump-says/article71207807.ece", "state_media": false, "category": "経済", "full_text": "U.S. President Donald Trump on Friday (July 10, 2026) said the United States had agreed to talks with Iran after Tehran asked to continue negotiations, while stressing that the June ceasefire between the two nations was over. “The Islamic Republic of Iran has asked us to continue ‘talks.’ We have agreed to do so, but the United States has stated to them, in no uncertain terms, that the Cease Fire is OVER!” Mr. Trump wrote in a post on Truth Social.\nThe U.S. and Iran traded strikes this week, with the Iranian armed forces launching attacks on U.S. military infrastructure in Gulf states on Thursday (July 9, 2026) following U.S. strikes on Iran’s southern coastal and eastern provinces.\nThe two nations reached an interim deal last month to end a four-month conflict that has throttled worldwide energy supplies. Mr. Trump’s inability to end the war has frustrated the President, whose Republican Party faces midterm elections later this year amid high gas prices and voter discontent.\nPublished - July 10, 2026 10:26 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Modi, Albanese announce Big Bash League opener in Chennai", "title_en": "Modi, Albanese announce Big Bash League opener in Chennai", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/sports/cricket/modi-albanese-announce-big-bash-league-opener-in-chennai-10781154/", "state_media": false, "category": "社会", "full_text": "Modi, Albanese announce Big Bash League opener in Chennai\nPrime Minister Narendra Modi and Australian Prime Minister Anthony Albanese announced that the opening match of the men's Big Bash League will take place in Chennai in December\nIndian Prime Minister Narendra Modi and Australian Prime Minister Anthony Albanese, right, during a community event in Melbourne, Australia, Thursday, July 9, 2026. (AP Photo/Hamish Blair)\nIndia and Australia decided to strengthen sports cooperation and announced a roadmap as Prime Minister Narendra Modi met Australian Prime Minister Anthony Albanese at the Melbourne Cricket Ground on Friday, as part of his two-day Australia visit.\nThe two leaders announced that the opening match of the men’s Big Bash League will take place in Chennai in December this year. This will be the first foreign cricket league to play in India.\nThe event will be the cornerstone of a week-long festival, called G’Day Namaste, to be held across India in December, featuring Australian cultural, business and sports events. G’Day Namaste will promote Australia’s economic priorities outlined in A New Roadmap for Australia’s Economic Engagement with India.\nThe two leaders also announced the roadmap on sports cooperation, and the roadmap will “leverage Australia’s experience and India’s ambitions to host major sporting events, creating opportunities to increase our trade, tourism and investment ties”, a statement by the Australian Prime Minister’s office said.\nIt sets out priorities across capacity building, sports science and technology research, industry and investment, it said.\nThe roadmap will provide opportunities to deepen cooperation on major sporting events, as Australia prepares to host the 2032 Olympic Games and Paralympic and India prepares to host the 2030 Commonwealth Games.\nPM Albanese said, “Australia and India are united by our love and passion for sport. This sports roadmap will focus on practical priority areas such as capability building, technology and research to strengthen this cornerstone of our bilateral relationship. I am excited to expand cooperation with India on sport, which not only brings joy to Australians but boosts trade, tourism and investment.”\nStory continues below this ad\nPM Modi said, “Sport is a key pillar of the India-Australia partnership, bringing our people closer through shared passion and mutual respect. Delighted to visit the iconic Melbourne Cricket Ground (MCG) with PM Albanese. More sporting exchanges, youth engagement and collaboration can further strengthen the India-Australia friendship.”\nDuring the visit, the leaders interacted with young athletes participating in Kabbadi, Australian Football and Cricket exhibition games.\nModi visited the Melbourne Cricket Ground accompanied by Albanese and the Premier of Victoria, Jacinta Allan, for an event celebrating India-Australia sporting ties. Several Australian sporting legends, including Steve Waugh and Lisa Sthalekar, were present at the event.\nAustralian Minister for Trade and Tourism Don Farrell said, “The Australia-India relationship is vital for our shared economic prosperity, supporting farmers, jobs and businesses across Australia. Major sporting events are huge opportunities for Australian tourism, bringing tens of thousands of new tourists to our shores and this roadmap will help us make the most of the green and gold decade”\nStory continues below this ad\nAustralian Minister for Sport Anika Wells said, “India and Australia share a significant and meaningful connection through sport, particularly cricket, and this roadmap will take that relationship to the next stage. The Australian sports ecosystem is actively sharing knowledge and expertise with our Indian counterparts, including through the Australian Sports Commission and our national sporting bodies. We are excited to further deepen that engagement as we count down to the Amdavad 2030 Commonwealth Games and Brisbane 2032 Olympic and Paralympic Games.”\nModi, who is on a three-nation trip wrapped up his visit to Australia on Friday, and reached New Zealand. He has visited Indonesia in the first leg of the trip.\nShubhajit Roy, Diplomatic Editor at The Indian Express, has been a journalist for more than 25 years now. Roy joined The Indian Express in October 2003 and has been reporting on foreign affairs for more than 17 years now. Based in Delhi, he has also led the National government and political bureau at The Indian Express in Delhi — a team of reporters who cover the national government and politics for the newspaper. He has got the Ramnath Goenka Journalism award for Excellence in Journalism ‘2016. He got this award for his coverage of the Holey Bakery attack in Dhaka and its aftermath. He also got the IIMCAA Award for the Journalist of the Year, 2022, (Jury’s special mention) for his coverage of the fall of Kabul in August 2021 — he was one of the few Indian journalists in Kabul and the only mainstream newspaper to have covered the Taliban’s capture", "translation_ja": "", "vocab": []}, {"title_ja": "How severe anxiety affected Prince Narula’s health and marriage with Yuvika Chaudhary", "title_en": "How severe anxiety affected Prince Narula’s health and marriage with Yuvika Chaudhary", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/lifestyle/feelings/prince-narula-anxiety-health-marriage-yuvika-chaudhary-expert-tips-10780318/", "state_media": false, "category": "社会", "full_text": "Severe anxiety can take a toll on physical health, relationships, work and day-to-day functioning, yet many people struggle to recognise when their symptoms require professional help. On Neha Dhupia and Angad Bedi’s chat show Double Date, Prince Narula spoke candidly about one of the most difficult periods of his life, describing how anxiety affected both his health and his marriage to Yuvika Chaudhary.\nReflecting on that phase, Prince said, “There was a time when I was taking 18 tablets a day. I had palpitations, night fear, weight gain, and several medical problems. It was one of the toughest phases of my life. Music helped me a lot. It gave me peace when I was struggling.” Speaking about his wife’s support, he added, “She stood by me when things were really difficult.” Prince also revealed how the emotional strain affected their relationship, saying, “Neither Yuvika was wrong, nor was I. We were both not in the right headspace.”\nDISCLAIMER: This article is based on information from the public domain and/or the experts we spoke to.\nAccording to him, becoming parents marked a turning point. “After having a baby, life has completely changed. Now we don’t even fight with each other. And even if we do, it gets resolved just by looking at our daughter,” he shared. Addressing rumours about their marriage, Prince clarified, “When I posted that vlog, people misunderstood what I meant. It was a phase when I was under a lot of pressure. During Yuvika’s pregnancy, there came a time when I was trying to manage several things at once. I was getting our house built, handling work, and dealing with many responsibilities. I wanted the baby to come into our new home. At that time, I asked Yuvika to move to her mother’s house temporarily to avoid dust allergies. During that period, I said in a vlog that ‘we don’t live together anymore.’ What I meant was that she was staying at her home and I was staying at mine. People assumed that we were no longer together, but we were only not together distance-wise.”\nHis experience raises broader questions about how anxiety can influence relationships, communication and family life. We asked an expert.\nSonal Khangarot, licensed rehabilitation counsellor and psychotherapist, The Answer Room, tells indianexpress.com, “Severe anxiety is more than everyday stress. While stress is a normal response to challenging situations and usually improves once the situation passes, an anxiety disorder is characterised by persistent, excessive worry or fear that is difficult to control and begins to interfere with daily life. Symptoms may include palpitations, disturbed sleep, restlessness, difficulty concentrating, muscle tension, changes in appetite or weight, and avoidance of situations due to overwhelming fear.”\nWarning signs that should never be ignored include anxiety lasting for several weeks or months, frequent panic attacks, significant disruption in work, relationships or routine activities, persistent sleep disturbance, reliance on alcohol or substances to cope, and physical symptoms that continue despite medical evaluation. “Most importantly, thoughts of self-harm, hopelessness or suicide require immediate professional attention. Early assessment by a qualified mental health professional can help identify the underlying cause and provide appropriate treatment, preventing symptoms from becoming more severe and improving long-term wellbeing,” says Khangarot.\nAnxiety has a way of changing how we experience relationships. Khangarot explains that when your mind is constantly anticipating the worst, even simple conversations can feel threatening. You may overthink a delayed reply, struggle to express what you’re feeling, seek repeated reassurance or withdraw completely because everything feels overwhelming. At the same time, the other partner may feel confused, helpless or believe they’re doing something wrong. Over time, this can affect communication, conflict resolution and emotional intimacy.\n“What often helps is remembering that anxiety is something a couple faces together, but it isn’t one partner’s responsibility to fix. Honest conversations, empathy, healthy boundaries and checking in with each other without judgment can strengthen the relationship. Equally important is ensuring the person experiencing anxiety takes responsibility for their own recovery by seeking professional support, practising coping strategies and communicating their needs. A partner can walk beside you through the journey, but they shouldn’t have to carry the entire weight of it,” reveals Khangarot.\nDISCLAIMER: This article is based on information from the public domain and/or the experts we spoke to.", "translation_ja
