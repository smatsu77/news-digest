記者会見で部分崩壊の恐れがあると述べた。\n\n市は、午前8時頃にかかってきた911通報を受けてビル周囲の数ブロックを「凍結ゾーン」として設定した。NYPDによると、作業員が「構造支持梁が座屈し始めているのを目撃した」との通報だった。\n\nこれにより、同ビルの21〜26階が荷重のストレスで沈下し始めたと、FDNY（ニューヨーク市消防局）および市の建築局の当局者が述べた。\n\n当局が懸念しているのは部分崩壊であり、それは内部崩壊となる可能性があると言われている。火曜日の記者会見で消防署長のジョン・エスポジト氏は、建物が道路上に完全倒壊する可能性は低いと述べた。\n\n「私たちが現場にいる間もビルは動き続けている」とエスポジト氏は報道陣に語った。「それはまだ安定していないことを意味する。」\n\nエスポジト氏によると、救急隊員が到着した時点でビルはすでに動いていたが、市の当局者は午後2時45分頃にABCニュースへ、その後2時間ビルが動いていないと伝えた。\n\n6人のチームが午後3時頃にビルに入り、補強作業を開始できるかどうかを確認したと、当局者は述べた。\n\n警察によると、負傷者の報告はなく、建設作業員は全員安全に避難したという。\n\n構造エンジニアたちは建物の外からその動きを監視していたと、ニューヨーク市建築局長のアハメド・ティガニ氏が記者団に語った。\n\n「状況を評価するための広範な作業が現在進行中だ」と同氏は述べた。\n\nニューヨーク市長のゾーラン・マムダニ氏は、40丁目から45丁目、および1番街から3番街の間に凍結ゾーンが設定されたと述べた。該当する通りは歩行者・車両ともに通行止めとなっている。\n\n37階建てのこの商業ビルはかつてのファイザー本社であり、現在は建築局（DOB）によると住宅ビルへの改装工事中とのこと。市の歴史上最大規模のオフィスからアパートへの転換プロジェクトの一つだと当局者は述べた。\n\n転換プロジェクトのデベロッパーであるメトロ・ロフト社は声明の中で、建築局と協力しながら状況を調査していると述べた。\n\n「作業員と公衆の安全は常に、そしてこれからも私たちの最優先事項だ」と同デベロッパーは述べた。\n\nDOBの記録によると、このビルは2025年7月から12月の間に7件の違反があり、3万2000ドル以上の罰金が科されている。\n\n市長によると、235番地イースト42丁目の近隣にある7つの建物も避難措置となり、近くのハンプトン・インも含まれているという。\n\nマムダニ市長は火曜日の朝、別の記者会見で、避難した施設の中に400人の生徒が通う学校も含まれていると述べた。\n\n「ニューヨーク市民には正直に伝えたい。これは急速に変化している状況だ。私たちは一分一分対応している」と同氏は記者に語った。\n\n市長はさらに、凍結ゾーン内に住んだり働いたりしている人々に最新情報を提供し続けるとし、避難に協力してくれていることへの感謝を述べた。\n\nキャシー・ホークル州知事は声明を発表し、市当局者と連絡を取っており、州の建築検査官も現場に出動していると述べた。\n\nABCニュースのニコール・カッチスとトーニャ・シンプソンがこの報道に貢献した。", "vocab": [{"word": "buckling", "definition": "（構造物や部材が）座屈すること。圧縮荷重によって梁や柱が横方向に急激に変形・崩れる現象を指す工学・建築用語。"}, {"word": "shoring", "definition": "建築・土木における「支保工」または「仮支え」のこと。不安定な構造物や掘削壁を一時的に支えて崩壊を防ぐ作業を指す専門用語。"}, {"word": "frozen zone", "definition": "危険区域として設定され、一般人の立ち入りや交通が全面的に禁止された区域のこと。緊急事態や捜査において当局が使用する表現。"}, {"word": "compromised", "definition": "ここでは構造的に「損なわれた・機能が低下した」という意味。安全性や完全性が脅かされている状態を表す上級語彙。"}, {"word": "partial collapse", "definition": "建物や構造物の一部が崩壊すること。建物全体の倒壊ではなく、特定のフロアや区画が崩れ落ちる状態を指す建築・防災用語。"}, {"word": "renovation", "definition": "建物の改装・改修工事のこと。単なる修繕ではなく、用途変更や大規模な構造的変更を伴う場合にも使われる上級語彙。"}, {"word": "violation", "definition": "ここでは建築基準や規制に対する「違反」を指す。当局による罰則や是正命令を伴う公式な法令違反の記録を表す語。"}]}, {"title_ja": "Catnip lotion as effective as Deet at repelling mosquitoes, study finds", "title_en": "Catnip lotion as effective as Deet at repelling mosquitoes, study finds", "summary_ja": "Researchers testing a cheap, homegrown oil in Uganda found what cats knew all along – it worked as well as the artificial chemical used globally A homegrown catnip lotion has proven “just as effective as Deet” as a mosquito repellant in trials carried out in Uganda. Catnip, or Nepeta cataria , is a ", "summary_en": "Researchers testing a cheap, homegrown oil in Uganda found what cats knew all along – it worked as well as the artificial chemical used globally A homegrown catnip lotion has proven “just as effective as Deet” as a mosquito repellant in trials carried out in Uganda. Catnip, or Nepeta cataria , is a ", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/07/catnip-lotion-as-effective-as-deet-at-repelling-mosquitoes-study-finds", "state_media": false, "category": "社会", "full_text": "A homegrown catnip lotion has proven “just as effective as Deet” as a mosquito repellant in trials carried out in Uganda.\nCatnip, or Nepeta cataria, is a common herb from the mint family. The chemical in the plant that causes feline euphoria – nepetalactone – also has insect-repelling properties but this has not previously been commercialised.\nNew tools are vital in the fight against malaria, the disease spread by mosquitoes that infects about 282 million people a year and killed 610,000 in 2024 – the majority of them young children in African countries. There are concerns about rising resistance to insecticides, as well as the frontline drugs used to treat the disease.\nIn a study presented at the Society for Experimental Biology conference in Florence on Tuesday, a team working between Uganda and Wales found mosquitoes seeking a blood meal were less likely to land on people wearing lotions made from catnip.\nDr Simon Scofield, a senior lecturer at Cardiff University, said: “We found that a 6% catnip oil was just as effective as Deet, and the 2% catnip oil was only marginally less effective than that.\n“Deet is out of the price bracket for most rural Ugandan subsistence farmers, so buying commercially available mosquito repellents is just not practicable.\n“We wanted to make a repellent, which is highly efficacious, but also allows local people to be involved in the production cycle so that it costs a minimal amount of money,” he said.\nWhether or not local cats were more likely to follow lotion wearers was not part of the research, Scofield admitted. “We did not conduct any experiments to see if it is attractive to cats, but given that the active ingredient [nepetalactone] has well-known cat-attractive properties, I would expect they would quite like it,” he said.\nIn the first part of the evaluation, laboratory tests confirmed that catnip oil could be an effective insect repellent. Researchers then successfully tested the catnip repellent in the field in eastern Uganda by checking how many mosquitoes landed on volunteers’ legs over an evening.\nSome volunteers used Deet (the world’s most widely used and effective insect repellent), some used a lotion with 2% concentration of catnip, others a 6% catnip lotion, while others used placebo creams.\nThe research also established that the lotion could be made locally by a community enterprise. So far it has been distributed for free, using grant funding, but the next phase of the project will see production increased and the lotion sold to create a sustainable income for workers.\n“Once we know that we can sell and distribute the repellent at a low cost, that should generate a self-sustaining system where the money is flowing back to everybody at each stage in the development,” said Scofield.\nThe Deet (N,N-Diethyl-meta-toluamide) lotion used for comparison in the trial contains 15% Deet and is the most widely available in Uganda. Travellers from the UK visiting malaria-endemic regions are advised to use stronger repellents of at least 50% Deet.\nSwai Kyeba, a research entomologist from the Ifakara Health Institute in Tanzania who was not involved in the study, said: “New vector-control tools are necessary in the fight against malaria, especially those that are cheap and locally produced, to help improve accessibility.\n“However, a challenge with topical repellents is low compliance because they require regular application. This is why they remain a complementary tool in the fight against malaria.”\nHe urged further research on Ugandan households using currently available repellents before the catnip lotion production was scaled up.", "translation_ja": "", "vocab": []}, {"title_ja": "マスクのDOGEによるUSAIDエボラ対策予算削減が彼の遺産を定義する", "title_en": "Musk's DOGE Cuts to USAID Ebola Programs May Define His Legacy", "summary_ja": "イーロン・マスクがDOGEを通じてUSAIDを解体したことが、コンゴ民主共和国でのエボラ出血熱の流行を受けて改めて批判を浴びている。マスク自身もエボラ検知・対応プログラムを「誤って」削減したことを認めていた。専門家たちは、一連の援助削減によって数百万人が死亡する可能性があると警告しており、ランセット誌の研究ではUSAIDが完全に廃止された場合、最大1400万人が死亡すると推計している。", "summary_en": "Elon Musk's dismantling of USAID through DOGE has come under renewed scrutiny amid an Ebola outbreak in the Democratic Republic of the Congo, after he admitted to accidentally cutting Ebola detection programs. Experts warn that millions of deaths could result from the aid cuts, with a Lancet study estimating up to 14 million deaths if USAID were abolished entirely. Former USAID officials argue that Musk's personal investment in destroying the agency will become a defining — and damning — part of his legacy.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/technology/2026/jul/07/elon-musk-doge-cuts-usaid-ebola", "state_media": false, "category": "政治", "full_text": "Elon Musk has an Ebola problem. SpaceX stock dropped precipitously after its initial public offering, and Tesla faces a wave of lawsuits. But instead of focusing on his companies, Musk has posted frequently on X about the US Agency for International Development (USAID), which he helped dismantle – or, in his words, feed into the woodchipper – last year.\n“Elon’s USAID crash-out over the past week has been a thing to behold,” said Jeremy Konyndyk, a former top USAID official who oversaw the agency’s Ebola response in 2014-2015 and the president of Refugees International. “In a way, it’s helpful that Elon is doing this, because it’s putting attention back on the issue of what he did last year.”\nMusk has said his critics “cannot cite a single name of someone who died” and “If there were, it would be worldwide headline news!” When confronted with the names – including those of children who died because of the cuts – Musk called a journalist “an utter piece of shit and a liar” and “utterly evil”. Musk has claimed, without evidence, that US tax dollars went to arming militants and “corrupt politicians”.\nMusk’s cuts, through the short-lived US “department of government efficiency” (Doge), have come under renewed scrutiny during the Ebola outbreak in the Democratic Republic of the Congo (DRC). Last year, Musk admitted to “accidentally” cutting Ebola detection and response programs.\n“This is one of the reasons why there was not enough surveillance and preparedness for the outbreak of Ebola,” said Davide Rasella, a research professor at the Catalan Institution for Research and Advanced Studies and head of the Global Health Impact Assessment and Evaluation Group at the Barcelona Institute for Global Health (ISGlobal) in Spain.\nIf global health programs hadn’t been slashed in the DRC and elsewhere, the Ebola outbreak would have been detected much earlier, Konyndyk said. “I’m very confident about that,” he added.\nThe cuts have affected global health, nutrition and education around the world.\nOne Lancet study estimated there would be 14 million deaths, including 4.5 million child deaths, if USAID were abolished entirely. When Ro Khanna, a Democratic congressman from California, cited the study, Musk threatened to sue, and he doubled down on his claims that Doge did nothing wrong.\nRasella, one of the authors of the Lancet study, was unfamiliar with the Khanna-Musk conflict, but he stood by the estimates.\nMusk “uses science for launching rockets”, Rasella said. “When we speak about public health and global health, we use the same statistical mathematical tools that we use to launch rockets into space.”\nIt’s difficult to pinpoint exactly how many people will die as a result of these cuts, said Rasella.\n“But the important thing is the scale,” he said. There will probably be millions of deaths over the next several years, he added. “This is really unquestionable.”\nSome of these losses are already occurring.\n“People are absolutely dying. They’re dying in significant numbers in some places,” Konyndyk said.\nMusk’s demolition of USAID, and the resulting suffering and death, “is going to be a defining part of his legacy, and I do wonder if that’s why he’s scrambling so hard to rewrite that history now”, Konyndyk said.\nMusk took a model he used in his companies to “cut until people scream, and then when people scream, you’ve cut too far, and then you restore”, Konyndyk said. “That’s not how public funding works. Here the cost is literal human lives.”\nIf not for Musk, USAID would probably still exist, Konynydk said. Without him, and administrators like Pete Marocco, USAID would have taken “some huge hits”, but would have survived in some form, like other health and science agencies – “much diminished, much weaker, but still existing”, Konyndyk said.\n“His personal investment in that project gave it the reach all the way up to the White House,” he added.\nCongress could have stopped the dismantling of USAID – and it still could, Konyndyk said. USAID is required to exist by law, and what few aid programs still operate have been choked by the slow release of funding from the state department, he said.\nAfter the Covid pandemic caused about 20 million deaths around the globe, it was “absurd” to cut programs that would prevent and prepare for the next pandemic, Rasella said.\n“When you disrupt a single piece of that [aid], you can really create more and larger damage to the entire system,” Rasella said. “This is just the beginning.”\nBut that means there’s still time to act and avert some of the worst effects of ending foreign aid, Konyndyk said.\n“We have a window here to try and bring some of this back before the worst of the harms set in,” he said.", "translation_ja": "イーロン・マスクにはエボラ問題がある。SpaceXの株価は新規株式公開後に急落し、テスラは訴訟の波に晒されている。しかしマスクは自社の問題に集中する代わりに、米国国際開発庁（USAID）についてX上で頻繁に投稿している。彼が解体を主導した――あるいは彼自身の言葉を借りれば「チッパーにかけた」――機関だ。\n\n「過去一週間のイーロンのUSAIDをめぐるパニックぶりは、まさに見物だった」と語るのは、2014〜2015年にUSAIDのエボラ対応を監督した元幹部であり、現在はリフュジーズ・インターナショナルの代表を務めるジェレミー・コニンダイクだ。「ある意味、イーロンがこうした行動を取ることは助かる。なぜなら、彼が昨年やったことに改めて注目が集まるからだ。」\n\nマスクは批判者たちが「死亡した人物の名前を一人も挙げられない」と主張し、「もし実在するなら、世界中でトップニュースになっているはずだ！」と述べている。しかし実際に名前を突きつけられると――削減の影響で亡くなった子どもたちの名前を含め――マスクはあるジャーナリストを「まったくの屑野郎で嘘つき」「完全に邪悪だ」と罵倒した。マスクはまた、根拠を示さないまま、米国の税金が武装勢力や「腐敗した政治家」への資金援助に流れていたと主張している。\n\n短命に終わった米国「政府効率化省」（DOGE）を通じたマスクの予算削減は、コンゴ民主共和国（DRC）でのエボラ出血熱の流行を受けて、再び厳しい目を向けられている。昨年、マスクはエボラの検知・対応プログラムを「誤って」削減したことを認めていた。\n\n「これが、エボラの流行に対する監視と準備が不十分だった理由の一つだ」と述べるのは、カタルーニャ高等研究院の研究教授であり、スペインのバルセロナ・グローバルヘルス研究所（ISGlobal）でグローバルヘルス影響評価・評価グループを率いるダビデ・ラセッラだ。\n\nDRCやその他の地域でグローバルヘルスプログラムが削減されていなければ、エボラの流行はもっと早く検知されていただろうと、コニンダイクは語る。「それについては非常に自信がある」と彼は付け加えた。\n\n一連の削減は、世界中のグローバルヘルス、栄養、教育に影響を与えている。\n\nランセット誌のある研究では、USAIDが完全に廃止された場合、子どもの死亡450万人を含む1400万人が死亡すると推計されている。カリフォルニア州選出の民主党下院議員ロー・カナがこの研究を引用すると、マスクは訴訟を起こすと脅し、DOGEは何も悪いことをしていないという主張を重ねて強調した。\n\nランセット研究の著者の一人であるラセッラは、カナとマスクの対立については知らなかったが、推計の正確さを支持した。\n\nマスクは「ロケットを打ち上げるために科学を使う」とラセッラは言う。「しかし公衆衛生やグローバルヘルスについて話すとき、私たちはロケットを宇宙に打ち上げるために使うのと同じ統計的・数学的ツールを使っている。」\n\nこれらの削減の結果、具体的に何人が死亡するかを正確に特定するのは難しいとラセッラは述べる。\n\n「しかし重要なのはその規模だ」と彼は言う。今後数年間でおそらく数百万人が死亡するだろうと付け加えた。「これは本当に疑いの余地がない。」\n\nこうした損失の一部はすでに生じている。\n\n「人々は間違いなく死んでいる。一部の地域では相当な数が亡くなっている」とコニンダイクは述べた。\n\nマスクによるUSAIDの解体、そしてそれによってもたらされた苦しみと死は、「彼の遺産を定義するものとなるだろう。彼が今、必死にその歴史を書き換えようとしているのは、そのためではないかと思う」とコニンダイクは語った。\n\nマスクは自分の企業で使ってきたモデルを応用した。それは「人々が悲鳴を上げるまで削減し、悲鳴が上がったら削りすぎたとわかり、それから回復させる」というものだとコニンダイクは述べた。「しかし公的資金の使途はそのようには機能しない。ここでのコストは、文字通り人の命だ。」\n\nマスクがいなければ、USAIDはおそらく今も存在していただろうとコニンダイクは語る。彼がいなければ、そしてピート・マロッコのような行政官がいなければ、USAIDは「大きな打撃を受けた」かもしれないが、他の医療・科学機関のように何らかの形で生き残っていただろう――「大幅に縮小され、大幅に弱体化しながらも、依然として存続していた」とコニンダイクは述べた。\n\n「彼がそのプロジェクトに個人的に投資したことで、ホワイトハウスにまで影響力が及んだ」と彼は付け加えた。\n\n議会はUSAIDの解体を阻止できたはずだし、今でもできると、コニンダイクは言う。USAIDは法律によって存在が義務付けられており、今もわずかに続いている援助プログラムは、国務省からの資金の緩慢な放出によって窒息させられているという。\n\nコロナウイルスのパンデミックが世界で約2000万人の死者を出した後、次のパンデミックを予防・準備するためのプログラムを削減することは「不条理だ」とラセッラは述べた。\n\n「その（援助の）単一の部分を破壊すると、システム全体にさらに大きな被害をもたらすことになる」とラセッラは言う。「これはまだ始まりにすぎない。」\n\nしかし、それは外国援助の終焉による最悪の影響の一部を回避するために行動する時間がまだあることを意味するとコニンダイクは語った。\n\n「最悪の被害が顕在化する前に、この一部を取り戻そうとする窓がある」と彼は述べた。", "vocab": [{"word": "precipitously", "definition": "「急激に、急落して」という意味の副詞。株価や数値が急速かつ大幅に下落する場合などに使われる上級表現。"}, {"word": "dismantle", "definition": "「解体する、分解する」という意味の動詞。組織や仕組みを意図的に段階的に壊していくことを指し、ビジネスや政治の文脈でよく使われる。"}, {"word": "scrutiny", "definition": "「精査、厳しい監視・調査」という意味の名詞。特に権力者や機関の行動が詳細に検証される場面で用いられるフォーマルな表現。"}, {"word": "surveillance", "definition": "「監視、サーベイランス」という意味の名詞。医療・公衆衛生の文脈では感染症の動向を追跡・監視する活動を指す専門用語。"}, {"word": "pinpoint", "definition": "「正確に特定する、ピンポイントで指摘する」という意味の動詞。曖昧さなく正確に何かを識別・特定する際に使われるイディオム的表現。"}, {"word": "preparedness", "definition": "「事前準備、備え」という意味の名詞。特に災害や感染症のパンデミックなど緊急事態に対する組織的な準備状態を指す公衆衛生・政策分野の専門用語。"}, {"word": "avert", "definition": "「（危険・悪い事態を）回避する、防ぐ」という意味の動詞。特に深刻な結果や危機を未然に防ぐ文脈で使われるフォーマルな表現。"}]}, {"title_ja": "リベリア当局、200kg超のコカイン押収で5人を起訴―調味料と偽装し密輸", "title_en": "Five charged in Liberia after 200kg cocaine seizure disguised as seasoning cubes", "summary_ja": "リベリア当局は、マギーの調味料キューブと偽って申告された200kg超のコカイン（推定価格約190万ドル）をモンロビアの国際空港で発見し、5人の容疑者を起訴した。容疑者の氏名公表の遅れが議会と市民の強い反発を招き、有力者を守るための捜査妨害への懸念が高まった。今回の摘発は、西アフリカが南米とヨーロッパを結ぶ麻薬の主要な中継地点となっている実態を改めて浮き彫りにした。", "summary_en": "Liberian authorities have charged five suspects following the discovery of over 200kg of cocaine falsely declared as Maggi seasoning cubes at Monrovia's international airport, with an estimated street value of $19 million. The case drew significant public outcry and parliamentary scrutiny over delays in naming suspects, fueling fears of interference to protect influential figures. The bust highlights West Africa's growing role as a transit hub for cocaine shipments between South America and Europe.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/07/charged-liberia-200kg-cocaine-seized-drug-bust", "state_media": false, "category": "社会", "full_text": "Authorities in Liberia have charged five suspects over one of the largest drug seizures in the country’s history, after police found more than 200kg of cocaine falsely declared as Maggi seasoning cubes.\nThe shipment, with an estimated value of $19m (£14.2m), was discovered at the international airport in Monrovia on 8 June, but the suspects were not named until a press briefing at the weekend.\n“This was a serious transnational cocaine trafficking operation using Liberia’s aviation and logistics system as a channel for organised crime,” said Insp Gen Gregory Coleman late on Saturday. He added that his team had found evidence linking the shipment to a similar one processed in May.\nNews of the drug bust caused uproar in Liberia, and prompted President Joseph Boakai to order a combined investigation by the police and national anti-drug agency. “Liberia will not be used as a safe haven, transit point, warehouse, financial centre or operational base by criminal networks engaged in narcotics trafficking,” he said at the time.\nBut the delay in naming the suspects caused a row in parliament, where Coleman was summoned to a special senate hearing, and fed public speculation that the investigation was being tampered with to protect powerful Liberian citizens.\nOn Saturday, Coleman announced that his team had found evidence suggesting the complicity of the logistics company that handled the shipment. He then named the suspects who are being charged for the transportation, possession and illicit trafficking of controlled substances and criminal conspiracy.\nThe key suspect, the operations manager of the firm, is now in custody in Monrovia. Coleman said arrest warrants would be issued in collaboration with Interpol for the others who remain at large. Another suspect, believed to be attending an event in China at the time of the bust, has not been back to the country. Prosecutors also released the Dutch phone number of one UK-based suspect and his house address with a Birmingham postcode.\nThe bust has reinforced reports that west Africa, a region with porous land and sea borders, has become a major staging post for the movement of narcotics between South America and Europe.\nIn October 2022, authorities intercepted a shipping container at Monrovia seaport with 520kg of cocaine valued at $100m (£74.86m). One of the suspects named on Saturday was reportedly released from prison after being arrested in connection with another drug-related case in 2024.\nIn neighbouring Sierra Leone, one of Europe’s most wanted drug dealers has taken refuge since at least 2022 in the country’s capital, Freetown, and is in a serious relationship with the president’s daughter, a Guardian investigation showed in February 2025.\nIn May, Spanish police working with US and Dutch officials confiscated 45 tonnes of cocaine worth €812m (£694m) in what a Madrid court said was Europe’s largest-ever cocaine bust. Authorities said the Comoros-flagged cargo vessel, which was raided near the Canary Islands, had left Freetown with Libya as its official destination. Another drug shipment out of Freetown was also seized en route to Spain in February.", "translation_ja": "リベリア当局は、マギーの調味料キューブと偽って申告された200kg超のコカインが同国史上最大規模の薬物押収の一つとなったことを受け、5人の容疑者を起訴した。\n\nこの薬物の推定価格は1900万ドル（約1420万ポンド）とされ、6月8日にモンロビアの国際空港で発見されたが、容疑者の名前は週末の記者会見まで公表されなかった。\n\nグレゴリー・コールマン警察長官は土曜日遅くに「これは、組織犯罪の通路としてリベリアの航空・物流システムを利用した、深刻な国際的コカイン密輸作戦だった」と述べ、同チームが5月に処理された類似の荷物との関連を示す証拠を発見したと付け加えた。\n\nこの薬物摘発のニュースはリベリア国内で大きな波紋を呼び、ジョセフ・ボアカイ大統領は警察と国家麻薬対策機関による合同捜査を命じた。大統領は当時、「リベリアを麻薬密輸に関与する犯罪ネットワークの安全な隠れ家、中継地点、倉庫、資金センター、または作戦基地として利用させない」と述べた。\n\nしかし、容疑者の氏名公表の遅れは議会での論争を引き起こした。コールマン長官は上院の特別公聴会に召喚され、捜査が有力なリベリア市民を守るために妨害されているのではないかという市民の憶測が広まった。\n\n土曜日、コールマン長官は、荷物を取り扱った物流会社の関与を示す証拠をチームが発見したと発表した。その後、麻薬物質の輸送・所持・不法売買および共同謀議の罪で起訴される容疑者の名前を公表した。\n\n主要容疑者は当該企業の業務部長であり、現在モンロビアで拘束中だ。コールマン長官は、依然として逃走中の残りの容疑者については、インターポールと協力して逮捕状を発行すると述べた。摘発時に中国でのイベントに参加していたとみられる別の容疑者は、その後帰国していない。検察はまた、英国在住の容疑者のオランダの電話番号とバーミンガムの郵便番号が記載された自宅住所も公開した。\n\n今回の摘発は、陸と海の国境が脆弱な地域である西アフリカが、南米とヨーロッパの間で麻薬を輸送する際の主要な中継地点となっているという報告を裏付けるものだ。\n\n2022年10月、モンロビアの海港でコカイン520kg（価格1億ドル、約7486万ポンド相当）が入った輸送コンテナが当局に押収された。土曜日に名前が挙がった容疑者の一人は、2024年に別の薬物関連事件で逮捕された後、釈放されたと伝えられている。\n\n隣国シエラレオネでは、欧州で最も指名手配されている麻薬密売人の一人が少なくとも2022年以降、首都フリータウンに潜伏しており、大統領の娘と真剣な交際関係にあることが、2025年2月のガーディアン紙の調査で明らかになった。\n\n5月には、スペイン警察が米国およびオランダの当局と協力し、マドリードの裁判所が欧州史上最大のコカイン摘発と認定した作戦で、8億1200万ユーロ（6億9400万ポンド）相当の45トンのコカインを押収した。当局によると、カナリア諸島付近で臨検を受けたコモロ船籍の貨物船は、リビアを公式の目的地としてフリータウンを出港していた。2月にもフリータウンからスペインへ向かう途中の別の麻薬積み荷が押収されている。", "vocab": [{"word": "transnational", "definition": "国境を越えた、複数の国にまたがることを意味する形容詞。主に犯罪・企業・組織などに関連して使われる。例：transnational crime（国際的犯罪）。"}, {"word": "complicity", "definition": "犯罪や不正行為への共謀・加担を意味する名詞。法律・ジャーナリズムの文脈で頻繁に用いられる。"}, {"word": "illicit", "definition": "法律や規則によって禁じられた、不法な、という意味の形容詞。illegal よりもフォーマルで書き言葉的な表現。"}, {"word": "porous", "definition": "本来は「多孔質の」という意味だが、国境や規制に用いる場合は「管理が緩い、抜け穴が多い」という比喩的な意味になる。"}, {"word": "staging post", "definition": "長距離輸送や作戦における中継地点・補給基地を指す名詞句。比喩的に「ある目的のための経由地」という意味でも使われる。"}, {"word": "tampered with", "definition": "「不正に手を加える、改ざんする、妨害する」という意味のイディオム。証拠・捜査・機器などが不当に操作される状況で使われる。"}, {"word": "confiscated", "definition": "当局が財産や物品を没収・押収することを意味する動詞の過去形。法執行や税関の文脈でよく使われる。"}]}, {"title_ja": "イスラエルの刑務所に拘束されるガザの医師「殺すために連れてこられた」", "title_en": "Gaza Doctor Held Without Charge in Israeli Prison Fears for His Life", "summary_ja": "フサム・アブ・サフィア医師は2024年12月から起訴されないままイスラエルの刑務所に拘束されている。弁護士が7月2日に面会したところ、医師は激しく暴行を受けており、死の瀬戸際にあると訴えた。医師本人も「殺すためにここへ連れてこられた」と述べたと報告されている。", "summary_en": "Dr. Hussam Abu Safia has been detained in an Israeli prison without charge since December 2024. His lawyer visited him on July 2nd and found him severely beaten, describing him as being on the verge of death. The doctor himself reportedly said he was brought there to be killed.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/7/they-brought-me-here-to-kill-me-says-gaza-doctor-in-israeli-prison?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "‘They brought me here to kill me’ says Gaza doctor in Israeli prison\n‘They brought me here to kill me’ says Gaza doctor in Israeli prison\nDr. Hussam Abu Safia, held in Israeli prisons without charge since December 2024, is being tortured and on the verge of death, according to his lawyer who found him badly beaten on July 2nd.\nPublished On 7 Jul 2026", "translation_ja": "「殺すためにここへ連れてこられた」イスラエルの刑務所に拘束されるガザの医師が語る\n\n2024年12月から起訴されないままイスラエルの刑務所に拘束されているフサム・アブ・サフィア医師は、拷問を受けており死の瀬戸際にある。7月2日に面会した弁護士が、医師が激しく暴行されていることを明らかにした。\n\n2026年7月7日掲載", "vocab": [{"word": "without charge", "definition": "「起訴されることなく」という意味の法律用語的表現。正式な刑事告訴なしに拘留されている状態を指す。"}, {"word": "tortured", "definition": "「拷問された」という意味。身体的・精神的に苦痛を与えられる行為を受けたことを示す動詞の過去形。"}, {"word": "on the verge of", "definition": "「〜の瀬戸際に」「〜寸前で」という意味のイディオム。ある重大な状態や出来事が差し迫っていることを表す。"}, {"word": "detained", "definition": "「拘留された」「身柄を拘束された」という意味の法律・報道用語。逮捕または拘禁されている状態を指す。"}, {"word": "beaten", "definition": "「殴打された」「暴行を受けた」という意味。身体的に繰り返し打たれた状態を示す過去分詞。"}]}, {"title_ja": "フランスのマリーヌ・ルペン、控訴審判決を受け電子足輪装着を命じられる", "title_en": "France's Marine Le Pen ordered to wear ankle tag after appeal court ruling", "summary_ja": "フランスの控訴裁判所は、マリーヌ・ルペン氏の欧州議会資金流用に関する有罪判決を支持しつつも、公職追放期間を短縮した。裁判所はまた、同氏に電子足輪の装着を命じた。この判決により、2027年の大統領選挙への出馬という狭い可能性が残された形となる。", "summary_en": "A French appeals court upheld Marine Le Pen's conviction for misusing European Parliament funds while shortening her ban from public office. The court additionally ordered her to wear an electronic ankle tag. The ruling leaves open a narrow possibility for Le Pen to contest the 2027 presidential election.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/7/frances-marine-le-pen-must-wear-ankle-tag-after-appeal-ruling?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "France's Marine Le Pen must wear ankle tag after appeal ruling\nFrance’s Marine Le Pen must wear ankle tag after appeal ruling\nA French appeals court upheld Marine Le Pen’s conviction for misusing European Parliament funds but shortened her ban from seeking public office, keeping alive a narrow path to the 2027 presidential race. The court also ordered her to wear an electronic ankle tag.\nPublished On 7 Jul 2026", "translation_ja": "フランスのマリーヌ・ルペン、控訴審判決を受け電子足輪装着を命じられる\n\nフランスの控訴裁判所は、欧州議会の資金を流用したとしてマリーヌ・ルペン氏に下された有罪判決を支持したが、公職への就任を禁じる期間を短縮した。これにより、2027年の大統領選挙への出馬に向けた狭い道筋が残されることとなった。裁判所はまた、同氏に電子足輪の装着を命じた。\n\n2026年7月7日公開", "vocab": [{"word": "upheld", "definition": "（上位の機関が以前の決定や判決を）支持・維持したという意味。法律文脈で頻繁に使われる動詞 'uphold' の過去形。"}, {"word": "conviction", "definition": "裁判で有罪と認定されること、有罪判決。法律用語として広く使われ、'secure a conviction'（有罪判決を得る）のように用いる。"}, {"word": "misusing", "definition": "資金や権限などを不正または不適切な目的のために使用すること。'misuse of funds'（資金の不正使用）は法律・政治文脈でよく登場する表現。"}, {"word": "ankle tag", "definition": "電子足輪。保釈中や刑事罰の一環として被告の位置情報を当局が監視するために足首に装着させる電子機器。'electronic monitoring device' とも言う。"}, {"word": "ban from seeking public office", "definition": "選挙への出馬や公職への就任を法的に禁止すること。政治的制裁の一形態として判決に盛り込まれることがある慣用表現。"}, {"word": "narrow path", "definition": "困難ではあるが可能性がゼロではない選択肢や道筋を指す比喩的表現。'a narrow path to victory'（勝利への細い道）のように政治・外交文脈で用いられる。"}]}, {"title_ja": "アルゼンチン、劇的な逆転でエジプトを3-2で下しW杯ベスト8進出", "title_en": "Argentina Stage Stunning Late Comeback to Beat Egypt 3-2 in World Cup Last 16", "summary_ja": "アルゼンチンは0-2のビハインドから驚異的な逆転劇を演じ、W杯ラウンド16でエジプトを3-2で下した。ロメロ、メッシ、フェルナンデスが終盤に得点を挙げ、前回王者が崖っぷちからの生還を果たした。メッシはW杯通算21ゴール目を記録し、アルゼンチンは準々決勝でコロンビアまたはスイスと対戦する。", "summary_en": "Argentina overcame a 2-0 deficit to defeat Egypt 3-2 in the World Cup round of 16, with goals from Cristian Romero, Lionel Messi, and Enzo Fernandez in the final minutes. Messi, who had a penalty saved earlier, scored his 21st World Cup goal to draw level before Fernandez completed the stunning turnaround. The defending champions will face either Colombia or Switzerland in the quarterfinals.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/7/7/argentina-stage-stunning-late-comeback-to-beat-egypt-in-world-cup-last-16?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Argentina stage stunning late comeback to beat Egypt in World Cup last 16\nHolders Argentina survive huge scare to earn a 3-2 win over Egypt and reach the World Cup quarterfinals.\nArgentina staged a stunning comeback from 2-0 down to avoid a shocking exit at the hands of Egypt and prolong Lionel Messi’s World Cup career with a 3-2 win to reach the quarterfinals.\nThe holders looked down and out on Tuesday when goals from Yasser Ibrahim and Mostafa Ziko, either side of Messi having a penalty saved, put the Pharaohs in sight of a historic victory in Atlanta.\nRecommended Stories\nlist of 4 items- list 1 of 4‘MAGA agenda on display’: FIFA, Trump slammed amid Balogun red card row\n- list 2 of 4FIFA defends Balogun red card referee after Trump calls him ‘a bit suspect’\n- list 3 of 4Mbappe slams racism by Paraguay’s Amarilla at World Cup: What we know\n- list 4 of 4The World Cup is exposing the contradictions of national identity\nHowever, Cristian Romero’s header sparked the comeback as Argentina struck three times in the final 11 minutes plus stoppage time.\nMessi smashed home the equaliser to score for a ninth consecutive World Cup game and retake the lead for the Golden Boot with eight this tournament.\nEnzo Fernandez completed the turnaround with a superb header two minutes into stoppage time.\nAt the end, Messi shed tears of joy as he embraced his teammates.\nEgypt were left furious after a number of controversial calls went against them, including a disallowed goal early in the second half, and a member of their coaching staff was red-carded in the aftermath of the winning goal.\nBut despite a second almighty scare against African opposition, Argentina will face either Colombia or Switzerland in the last eight on Saturday.\nLionel Scaloni attempted to refresh a side that looked dead on their feet in the closing stages of a 3-2 win over Cape Verde in the last 32 on Friday.\nNicolas Tagliafico, Leandro Paredes and Julian Alvarez came in from the team that started in Miami, but Argentina got off to another slow start.\nMarwan Attia’s deep cross to the back post was powered home by Yasser.\nArgentina had the chance to level five minutes later when Tagliafico was wiped out by Haissem Hassan inside the box.\nHowever, there was another chapter to Messi’s misery from the penalty spot at World Cups.\nThe eight-time Ballon d’Or’s strike was tentative, and Mostafa Shobeir flew to his left to save, meaning Messi has now missed four of his eight non-shootout penalties at World Cups. He also became the first player to miss two in a single tournament, having also failed to hit the target against Austria in the group stages.\nThe penalty save was just the start of Shobeir’s inspired afternoon.\nAlexis Mac Allister’s powerful header from point-blank range was next to be parried by the Al Ahly stopper.\nShobeir then produced one of the saves of the tournament to prevent Alvarez’s shot finding the bottom corner.\nEgypt thought they had doubled their lead on the hour mark after a brilliant counterattack.\nMohamed Salah played in Mostafa Ziko, who dinked the ball perfectly over the onrushing Emi Martinez.\nHowever, Egyptian celebrations were cut short by a hugely controversial VAR intervention for a foul on Lisandro Martinez, just outside the Egypt box, at the start of the buildup to the goal.\nThe decision finally fired up the majority Argentinian crowd, but they were silenced once more moments later by another blistering Egyptian break.\nSalah again led the charge before feeding Hassan, and his cross was swept in by Zico.\nArgentina looked like a beaten side with Messi among those whose head was bowed during the second-half drinks break.\nYet Romero’s header – that Shobeir just failed to keep out – sparked a remarkable revival as the defending champions hauled themselves off the canvas.\nMoments later a dazzling run by Messi teed up Lautaro Martinez, who headed just wide and Messi was to have his moment of redemption seven minutes from time.\nGonzalo Montiel fed the ball back for his captain to strike sweetly on the half volley.\nShobeir again got a touch but could not keep it out as the ball cannoned in off the bar for Messi’s 21st World Cup goal.\nThen Fernandez’s bullet header from Lautaro Martinez’s cross completed the fightback, and Argentina’s relief was on full display after the final whistle.\nScaloni gave a very brief interview to reporters after the match.\n“I can’t look up, I’m sorry. I’m really emotional right now,” Argentina’s coach said.\n“What a group of players, man. That’s it, I’ve got to go.”", "translation_ja": "アルゼンチン、W杯ラウンド16で驚異的な逆転劇を演じエジプトを撃破\n\n前回王者アルゼンチンは大きな苦境を乗り越え、エジプトに3-2で勝利し、W杯準々決勝への切符を手にした。\n\nアルゼンチンは、ヤッセル・イブラヒムとモスタファ・ジコの得点——その間にメッシがPKを止められるという場面もあった——により、アトランタで行われた試合で2-0とされ、エジプトに歴史的勝利が見えかけた火曜日の試合で、絶体絶命の状況に追い込まれていた。\n\nしかしクリスティアン・ロメロのヘディングが反撃の狼煙を上げ、アルゼンチンはロスタイムを含む最後の11分間で3点を奪った。\n\nメッシはエクアライザーを豪快に決め、W杯で9試合連続ゴールを記録。今大会8ゴールとして得点王争いの首位に再び立った。\n\nエンツォ・フェルナンデスはロスタイム2分に見事なヘディングで逆転を完成させた。\n\n試合終了後、メッシはチームメートと抱き合いながら歓喜の涙を流した。\n\nエジプト側は、前半終了間際のゴール取り消しを含む数々の物議を醸す判定に激怒し、決勝点直後にはコーチングスタッフの一人がレッドカードを受けた。\n\nそれでも、アフリカ勢相手に二度目の大きな苦戦を強いられながらも、アルゼンチンは土曜日にコロンビアまたはスイスと準々決勝で対戦する。\n\nリオネル・スカローニ監督は、先週金曜日のラウンド32でのカーボベルデ戦（3-2勝利）の終盤に疲弊したチームに変化をもたらそうとした。\n\nニコラス・タリアフィコ、レアンドロ・パレデス、フリアン・アルバレスがマイアミでの試合のスタメンから入れ替わって先発したが、アルゼンチンは再びスロースタートとなった。\n\nマルワン・アッティアの深いクロスをバックポストでヤッセルが力強く合わせて先制点を奪われた。\n\nアルゼンチンは5分後に同点の機会を得た。タリアフィコがペナルティエリア内でハイセム・ハサンに倒されてPKを獲得した。\n\nしかしW杯でのPKにまつわるメッシの苦い記憶にまた一ページが加わった。\n\n8度のバロンドール受賞者のシュートは弱々しく、モスタファ・ショベイルが左へ飛んでこれを阻止。メッシはW杯の非シュートアウトPKで8本中4本を外したことになり、グループステージのオーストリア戦に続き、同一大会で2本のPKを外した史上初の選手となった。\n\nしかしPKストップはショベイルの活躍の始まりに過ぎなかった。\n\nアレクシス・マック・アリスターのゴール至近距離からの強烈なヘディングも、アル・アハリのGKはパンチングで弾き出した。\n\nさらにショベイルは、アルバレスのシュートがゴール隅に入るのを阻む今大会屈指のセーブを披露した。\n\n60分、エジプトは鮮やかなカウンターアタックで2点目を奪ったと思われた。\n\nモハメド・サラーがモスタファ・ジコに絶妙なパスを送り、ジコは飛び出してきたエミ・マルティネスの頭上を完璧なループで破った。\n\nしかしエジプトの歓喜はVARの介入によって瞬く間に打ち消された。ゴールの起点となったプレーで、エジプトのボックス外わずかのところでリサンドロ・マルティネスへのファウルがあったと判定されたのだ。この判定でアルゼンチン寄りの多数の観客はついに火がついたが、その直後に再びエジプトの電光石火のカウンターに沈黙させられた。\n\nサラーが今度も突進を先導してハサンに送り、そのクロスをジコが押し込んだ。\n\nメッシをはじめとするアルゼンチン選手たちは後半の飲水タイム中、うなだれており、チームは敗北間近のように見えた。\n\nしかしショベイルが辛うじて弾ききれなかったロメロのヘディングが驚異的な復活の口火を切り、ディフェンディングチャンピオンはキャンバスから立ち上がった。\n\n直後にメッシの目の覚めるような突破からラウタロ・マルティネスがヘディングするもわずかに外れ、そして7分後にメッシ自身の汚名返上の時が訪れた。\n\nゴンサロ・モンティエルが後ろへ落とし、キャプテンがハーフボレーで鮮やかに決めた。\n\nショベイルが再び触れたが弾ききれず、ボールはバーに当たって弾み込み、メッシのW杯通算21ゴール目となった。\n\nそしてフェルナンデスがラウタロ・マルティネスのクロスから放った弾丸ヘッドで逆転が完成し、最終笛の後にアルゼンチンの安堵感は全開となった。\n\nスカローニ監督は試合後、報道陣に対し極めて短いコメントを残した。\n\n「顔を上げられません、申し訳ない。本当に今、感情が溢れています」とアルゼンチンの指揮官は語った。\n\n「なんという選手たちだ。それだけです、もう行かなければ。」", "vocab": [{"word": "turnaround", "definition": "状況が逆転すること、特にスポーツや事業などで劣勢から優勢への転換を指す。「complete the turnaround」のように「逆転を完成させる」という意味で使われる。"}, {"word": "almighty", "definition": "（口語・強調表現として）非常に大きな、恐ろしいほどの、という意味の形容詞。「an almighty scare」で「ひどい冷や汗をかかせるような出来事」を指す。"}, {"word": "tentative", "definition": "自信なさげな、確信が持てない様子を表す形容詞。ここではメッシのPKキックが「力強さに欠ける、弱々しい」ものだったことを描写している。"}, {"word": "dinked", "definition": "「dink」の過去形で、サッカーなどのスポーツでボールを相手の頭上に柔らかくチップキックすること。主にGKをかわすループシュートの場面で使われる。"}, {"word": "redemption", "definition": "過去の失敗や罪を取り戻すこと、汚名返上。「moment of redemption」はスポーツ文脈で以前の失敗を帳消しにする活躍の瞬間を指す。"}, {"word": "bulwark", "definition": "（本記事には登場しないが関連語として）防壁・守護者を意味する語。代わりに本記事の高度語として「disallowed」を取り上げる——審判またはVARによってゴールが「認められない」と判定されることを指すサッカー用語。"}, {"word": "prolong", "definition": "何かを引き延ばす、継続させるという意味の動詞。「prolong Messi's World Cup career」は「メッシのW杯でのキャリアを続かせる」という意味で使われている。"}]}, {"title_ja": "インド、イスラエル・パレスチナ問題で二国家解決策を支持　インドネシアと防衛協定に署名", "title_en": "India Backs Two-State Solution for Israel-Palestine, Signs Defence Deals with Indonesia", "summary_ja": "2026年7月7日、ナレンドラ・モディ首相はジャカルタを訪問し、インドネシアのプラボウォ・スビアント大統領との首脳会談でイスラエル・パレスチナ紛争における二国家解決策への支持を改めて表明した。両首脳はブラモス超音速巡航ミサイルおよびアストラMk-1空対空ミサイルのインドネシアへの供与を含む14件の協定・覚書の署名式に立ち会った。モディ首相はインドネシア最高の栄誉である「ビンタン・アディプルナ」勲章も授与された。", "summary_en": "Prime Minister Narendra Modi, during a visit to Jakarta on July 7, 2026, reaffirmed India's support for a two-state solution to the Israel-Palestine conflict while meeting Indonesian President Prabowo Subianto. The two leaders oversaw the signing of 14 agreements, including landmark defence deals for the supply of BrahMos supersonic cruise missiles and Astra Mk-1 air-to-air missiles to Indonesia. Modi was also honoured with Indonesia's highest civilian award, the Bintang Adipurna.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/national/india-supports-two-state-solution-for-solving-israel-palestine-conflict-says-pm-modi/article71194955.ece", "state_media": false, "category": "経済", "full_text": "Prime Minister Narendra Modi on Tuesday (July 7, 2026) said that India and Indonesia are going to deepen cooperation on global issues and reiterated the importance of the two-state solution to end the Israel-Palestine conflict. Mr. Modi made the remark while delivering a statement before the press in Jakarta where he and Indonesian President Prabowo Subianto presided over the signing of multiple agreements including the ones that will allow India to deliver BrahMos supersonic cruise missile system and Astra Mk-1 beyond the visual-range air-to-air missiles to Indonesia.\n“In this period of global turbulence, India believes that the role of dialogue and diplomacy has become more important than ever before. On the issue of Palestine, we continue to support a two-state solution and the pursuit of lasting peace,” said the Prime Minister while focusing on commonalities between India and Indonesia in dealing with globally important issues.\nSynergy with ASEAN\nHighlighting the “special importance” of the ASEAN grouping, he said, “There is strong synergy in our respective outlooks on the Indo-Pacific”. A joint statement issued at the end of the official dialogue mentioned that Mr. Modi and Mr. Subianto expressed “deep concern” over the war in West Asia and “its global effects”. “They welcomed the memorandum of understanding signed on 17 June 2026,” mentioned the joint statement, while adding that “transit passage through the Strait of Hormuz” has to be in “accordance with international law including the provisions of UNCLOS”.\nIt further mentioned that the Indonesian President welcomed “India’s interest in partnering on the integrated development of the Sabang Port” which will include maritime industries, and “shore-based services supporting offshore energy activities in the Andaman Sea”.\n14 agreements signed\nThe two sides signed 14 agreements and MoUs including two on BrahMos missile system and air-to-air missiles. Both are ‘in-principle’ agreements that are aimed at procurement of these weapon systems by Indonesia. The overarching agreement for the procurement of Astra Mk-1 beyond-visual-range air-to-air missiles is for Indonesia’s fleet of Su-30 fighter aircraft. The number of missiles to be acquired will be determined during the contract negotiations, an official has said.\nIndonesian Defence Minister Sjafrie Sjamsoeddin had visited India in November 2025 for discussions on the BrahMos missile deal, paving the way for the agreements during Mr. Modi’s visit to Indonesia. Under the proposed arrangement, Bharat Dynamics Limited (BDL), which manufactures the Astra missile, will integrate the weapon system with the Indonesian Air Force’s Su-30 fighters.\nThe Astra Mk-1 is already in operational service with the Indian Air Force and is powered by a solid rocket motor, offering an engagement range of approximately 80-110 kilometres. The BrahMos missile, jointly developed by India’s Defence Research and Development Organisation (DRDO) and Russia’s NPO Mashinostroyenia, has a range of over 290 kilometres and travels at speeds of up to Mach 2.8.\nIndonesia bestowed the Prime Minister with its highest honour ‘Bintang Adipurna of the Republic of Indonesia’. Mr. Modi is the second Indian Prime Minister to receive this award. India’s first Prime Minister Jawaharlal Nehru received the same award posthumously on December 12, 1995. “It reflects the goodwill of the people of Indonesia and stands as a tribute to the historic and enduring bonds of friendship between India and Indonesia,” said Mr. Modi in his press statement expressing gratitude to Indonesian leadership and people for the gesture.\nPublished - July 07, 2026 11:09 pm IST", "translation_ja": "インドのナレンドラ・モディ首相は7日（2026年7月7日火曜日）、インドとインドネシアがグローバルな問題での協力を深めていくと述べるとともに、イスラエル・パレスチナ紛争の解決に向けた二国家解決策の重要性を改めて強調した。モディ首相はジャカルタでの記者会見でこの発言を行った。同会見では、モディ首相とインドネシアのプラボウォ・スビアント大統領が共同で議長を務め、ブラモス超音速巡航ミサイルシステムおよびアストラMk-1視程外空対空ミサイルのインドネシアへの供与を可能にする協定を含む複数の協定の署名式が行われた。\n\n「世界的な混乱が続くこの時代において、インドは対話と外交の役割がかつてないほど重要になっていると考えています。パレスチナ問題については、引き続き二国家解決策を支持し、永続的な和平の実現を追求していきます」とモディ首相は述べ、世界的に重要な問題への取り組みにおけるインドとインドネシアの共通点を強調した。\n\n■ASEANとの連携\n\nASEAN（東南アジア諸国連合）の「特別な重要性」を強調し、「インド太平洋に関するそれぞれの展望には強い相乗効果があります」と述べた。公式対話の終了時に発表された共同声明には、モディ首相とスビアント大統領が中東での戦争と「その世界的影響」に対し「深刻な懸念」を表明したことが記された。共同声明は「2026年6月17日に署名された覚書を歓迎した」と言及するとともに、「ホルムズ海峡の通過航行」は「UNCLOSの規定を含む国際法に従って」行われなければならないと付け加えた。\n\nさらに共同声明では、インドネシア大統領が「アンダマン海における沖合エネルギー活動を支援する海洋産業および陸上サービス」を含むサバン港の統合開発への「インドの参画への関心」を歓迎したことが記された。\n\n■14件の協定に署名\n\n両国はブラモスミサイルシステムと空対空ミサイルに関する2件を含む、14件の協定・覚書に署名した。いずれも「原則合意」であり、インドネシアによるこれらの兵器システムの調達を目的としている。アストラMk-1視程外空対空ミサイルの調達に関する包括的合意は、インドネシアが保有するSu-30戦闘機への搭載を想定している。調達するミサイルの数量は契約交渉の中で決定される予定だと当局者は述べた。\n\nインドネシアのシャフリエ・シャムスディン国防大臣は2025年11月にインドを訪問し、ブラモスミサイル契約についての協議を行っており、これがモディ首相のインドネシア訪問中の協定締結への道を開いた。提案されている取り決めでは、アストラミサイルを製造するバーラト・ダイナミクス・リミテッド（BDL）がインドネシア空軍のSu-30戦闘機にこの兵器システムを統合する予定だ。\n\nアストラMk-1はすでにインド空軍で運用されており、固体ロケットモーターを動力源とし、約80〜110キロメートルの交戦距離を持つ。インドの防衛研究開発機構（DRDO）とロシアのNPOマシノストロイェーニヤが共同開発したブラモスミサイルは、290キロメートルを超える射程を持ち、最大マッハ2.8の速度で飛行する。\n\nインドネシアはモディ首相に同国最高の栄誉である「インドネシア共和国ビンタン・アディプルナ」勲章を授与した。モディ首相はこの勲章を受章した2人目のインド首相となる。インド初代首相ジャワハルラール・ネルーは1995年12月12日に同勲章を死後に受章している。モディ首相は記者会見での声明の中で「これはインドネシア国民の善意を反映するものであり、インドとインドネシアの歴史的かつ永続的な友好の絆への賛辞です」と述べ、この贈り物に対してインドネシアの指導者と国民への感謝を表明した。\n\n掲載日時：2026年7月7日午後11時09分（IST）", "vocab": [{"word": "reiterated", "definition": "「繰り返し述べた、改めて強調した」という意味の動詞。すでに述べた意見や立場を公式の場で再度表明する際に使われるフォーマルな表現。"}, {"word": "supersonic", "definition": "「超音速の」という意味の形容詞で、音速（マッハ1）を超える速度を指す航空・軍事分野の専門用語。"}, {"word": "synergy", "definition": "「相乗効果」を意味し、複数の要素や組織が協力することで、個々の能力の総和を超える成果が生まれることを指すビジネス・外交分野で頻出の語。"}, {"word": "turbulence", "definition": "本来は「乱気流」を意味するが、転じて「混乱、動乱」という意味で政治・経済的な不安定な状況を表す際に使われる比喩的表現。"}, {"word": "procurement", "definition": "「調達、購入」を意味し、特に政府や軍が公式な手続きを経て物資や兵器を取得することを指す行政・防衛分野の専門用語。"}, {"word": "posthumously", "definition": "「死後に」という意味の副詞で、当事者の死後に賞や名誉が授与される場合などに用いられるフォーマルな語。"}, {"word": "overarching", "definition": "「包括的な、全体を覆うような」という意味の形容詞で、個別の要素を束ねる上位の枠組みや合意を表す際に使われる表現。"}]}, {"title_ja": "ホルムズ海峡で24時間以内に船舶3隻が攻撃される", "title_en": "Three Ships Hit in 24 Hours as Strait of Hormuz Tensions Flare", "summary_ja": "カタールのLNG船を含むタンカー3隻が24時間以内にホルムズ海峡で攻撃を受け、カタールはイランによる「容認できない」攻撃として非難した。いずれの攻撃もオマーン近海で発生し、最高指導者ハメネイ師の追悼式典開始以来初の事案となった。一方、イスラエルのサール外相はレバノンとの次回協議が7月15〜16日にローマで行われると確認した。", "summary_en": "Three tankers, including a Qatari LNG vessel, were struck within 24 hours in the Strait of Hormuz, with Qatar condemning what it called an Iranian attack. The incidents occurred near Oman and marked the first reported strikes in the strait since mourning ceremonies began for Supreme Leader Ayatollah Ali Khamenei. Separately, Israeli Foreign Minister Gideon Saar confirmed Israel-Lebanon talks will resume in Rome on July 15-16.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-live-updates-july-7-2026-khamenei-funeral-ceremonies/article71191969.ece", "state_media": false, "category": "政治", "full_text": "Three tankers including a Qatari LNG vessel were struck within 24 hours in the Strait of Hormuz, maritime monitors and Qatar said on Tuesday (July 7, 2026), with peace mediator Doha denouncing an “unacceptable” Iranian attack. An “unknown projectile” hit a tanker overnight, causing a fire, before two more were hit, at least one by a drone, British maritime security agency UKMTO said.\nAlso Read: Trump says there will either be a deal with Iran or U.S. will ‘finish the job’\nAll three vessels were struck close to Oman. The attack on the tanker near Limah overnight, which triggered a blaze eight nautical miles (14 km) off the coast of Oman, was the first reported incident in the Strait of Hormuz since mourning ceremonies began last week for Supreme Leader Ayatollah Ali Khamenei. Earlier in the day, Iran said there would be no more peace talks unless Donald Trump halted his repeated threats to restart the war, as millions of Iranians vowed vengeance at funeral processions for their slain leader.\nAlso Read: The last revolutionary of Iran\nIsraeli Foreign Minister Gideon Saar confirmed on Tuesday (July 7, 2026) that the next round of talks with Lebanon will take place in Rome, as the two countries work to build on a framework agreement reached last month with U.S. backing. “Israel has no territorial ambitions in Lebanon,” he said at a press conference. A ministry spokesperson said the talks would take place at the ambassador level on July 15 and 16.", "translation_ja": "カタールと海上安全保障当局者らは火曜日（2026年7月7日）、カタールのLNG船を含むタンカー3隻が24時間以内にホルムズ海峡で攻撃を受けたと発表した。平和仲介国であるドーハはイランによる「容認できない」攻撃を強く非難した。英国の海上安全保障機関UKMTOによると、まず夜間に「正体不明の発射体」がタンカーに命中して火災が発生し、その後さらに2隻が攻撃を受け、少なくとも1隻はドローンによるものだったという。\n\n関連記事：トランプ氏、イランとの合意が成立するか、さもなければ米国が「仕事を終える」と発言\n\n3隻はいずれもオマーン近海で攻撃を受けた。リマ沖でのタンカー攻撃は夜間に発生し、オマーン海岸から8海里（14キロ）沖合で火災を引き起こした。この事案は、最高指導者アリー・ハメネイ師の追悼式典が先週始まって以来、ホルムズ海峡で初めて報告された事件となる。同日早く、イランはドナルド・トランプ大統領が戦争再開の脅しを繰り返すのをやめない限り、これ以上の和平協議には応じないと表明。数百万人ものイラン国民が、殺害された指導者のための葬列で復讐を誓った。\n\n関連記事：イランの最後の革命家\n\nイスラエルのギデオン・サール外相は火曜日（2026年7月7日）、先月米国の仲介のもとで合意された枠組み協定を土台に、レバノンとの次回協議がローマで行われることを確認した。同外相は記者会見で「イスラエルはレバノンに対して領土的野心を持っていない」と述べた。外務省の報道官は、協議が7月15日と16日に大使レベルで行われると発表した。", "vocab": [{"word": "projectile", "definition": "発射体・飛翔体のこと。軍事・安全保障の文脈で、ミサイルや砲弾など発射されて飛ぶ物体を指す技術的な用語。"}, {"word": "denouncing", "definition": "（行為や人物を）公式に強く非難・糾弾すること。政治・外交の文脈でよく使われる改まった表現。"}, {"word": "mediator", "definition": "紛争や交渉において中立的な立場で当事者間の調停を行う仲介者・調停者のこと。外交や法律の文脈で頻繁に使われる。"}, {"word": "flare-up", "definition": "紛争や病気などが突然再発・悪化すること。「緊張のflare-up」のように、状況が急激に悪化する場面で使われるイディオム的表現。"}, {"word": "vengeance", "definition": "復讐・報復のこと。「vow vengeance（復讐を誓う）」のように、強い怒りを伴った報復の意志を表す際に用いられる改まった語。"}, {"word": "framework agreement", "definition": "具体的な詳細を後で詰めることを前提とした、基本的な原則や方針を定めた大枠の合意のこと。国際交渉や外交でよく使われる複合語。"}, {"word": "nautical miles", "definition": "海里のこと。海上や航空での距離を測る際に使用される単位で、1海里は約1.852キロメートル。航海・海事分野の専門用語。"}]}, {"title_ja": "トランプ氏、エルドアン氏を称賛しNATO同盟国を非難――アンカラ首脳会議が開幕", "title_en": "Trump praises Erdogan, berates NATO allies as Ankara summit opens", "summary_ja": "米国のドナルド・トランプ大統領は2026年7月7日、NATO首脳会議のためトルコのアンカラに到着し、エルドアン大統領との個人的な「相性の良さ」を称賛する一方、イラン戦争に対する欧州同盟国の対応を強く批判した。トランプ氏はトルコへのF-35戦闘機売却を検討する可能性を示唆し、グリーンランドは米国が管理すべきとの持論を改めて強調した。ウクライナのゼレンスキー大統領は首脳会議の場でNATO諸国に防空支援の強化を訴え、ウクライナのNATO加盟実現を改めて求めた。", "summary_en": "U.S. President Donald Trump arrived in Ankara for a NATO summit on July 7, 2026, praising his personal chemistry with Turkish President Erdogan while criticizing European allies over their response to the Iran war. Trump signaled Washington may reconsider selling F-35 jets to Turkey and reiterated his stance that Greenland should be under U.S. control. Meanwhile, Ukrainian President Zelensky urged NATO members to boost air defense support and renewed his push for Ukraine's membership in the alliance.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/trump-berates-nato-praises-turkeys-erdogan-as-summit-starts/article71195130.ece", "state_media": false, "category": "政治", "full_text": "U.S. President Donald Trump praised his \"chemistry\" with Turkish leader Recep Tayyip Erdogan as he arrived in Ankara for a NATO summit on Tuesday (July 7, 2026), while hitting out at European allies for their response to his war in Iran.\nMr. Trump was greeted personally by Mr. Erdogan on the tarmac as he descended from Air Force One, before being escorted through the empty streets of the Turkish capital by a guard of riders on white horses.\nThe summit comes at a fraught time for the 77-year-old transatlantic alliance, as Mr. Trump has lashed out at allies and Washington steps back from Europe.\n\"I was very disappointed with NATO,\" Mr. Trump said, sitting next to Mr. Erdogan at the Turkish leader's vast presidential palace.\n\"Frankly, if it (the summit) weren't held in Turkey, where my friend happens to be a very strong leader, a very strong person, it's possible that I wouldn't have attended.\"\nNATO officials are hoping President Trump's strong relationship with the Turkish leader could help smooth over the bad blood caused by the Iran war.\n\"It's a chemistry that works between us,\" Mr. Trump said.\nIn a potentially major boost for Mr. Erdogan, Mr. Trump said Washington would consider selling F-35 fighter jets to Turkey, after booting it out of the programme in 2019 over Ankara's purchase of a Russian system.\nMr. Turkey has long sought to resolve the question of its readmittance to the F35 programme and the lifting of US sanctions that have soured ties and hampered Turkish defence projects — and has looked to Trump's visit to break the deadlock.\n\"Mr Trump has also personally given us his word on this matter,\" Mr. Erdogan said through a translator.\n'Testing'\nEuropean leaders are aiming to avoid a bust-up with the mercurial U.S. leader that could deal a further blow to NATO's credibility, after Mr. Trump repeatedly cast doubt on Washington's commitment to protecting its allies.\nBut ahead their main session on Wednesday, the U.S. President was clearly still smarting over the restrictions some allies placed on U.S. forces using bases at the start of the Iran conflict.\n\"I was testing to see whether or not they'd be there, because I've long said that we helped them,\" he said.\n\"Italy turned us down, and Germany turned us down, and France turned us down.\"\nMr. Trump also risked reopening another old wound with NATO when he reiterated his stance that Greenland \"should be controlled by the United States, not by Denmark\".\nIn a bid to prove to Mr. Trump that they are making good on a pledge last year to ramp up defence spending, NATO allies unveiled tens of billions in arms deals ahead of his arrival.\nNATO chief Mark Rutte has insisted European countries are \"delivering\" by bolstering military budgets and moving to take more responsibility for the defence of their continent in the face of Russia.\n\"These are billions that are invested in our security, boosting our economies and supporting hundreds of thousands of new jobs,\" Mr. Rutte said at a glitzy industry forum.\nZelenskyy makes pitch\nWhile NATO wanted to focus Mr. Trump's attention on its surging defence budgets, the stalled U.S. efforts to try to halt the war in Ukraine also rose back up the agenda.\nMr. Trump spoke to Russian President Vladimir Putin ahead of the NATO gathering and is expected to meet Ukraine's Volodymyr Zelensky on the summit sidelines on Wednesday (July 8, 2026).\n\"I think they both want to make a deal,\" Mr. Trump said.\n\"It's too bad it took so long, but I think something's going to come out.\"\nMr. Zelenskyy for his part urged NATO to step up help for the country's air defences as it struggles with shortages of crucial interceptors to shoot down Russian missiles.\n\"Please let more determination and more decisions for air defence be one of the key outcomes of this NATO summit,\" he said.\nThe Ukrainian leader also made a new pitch for Kyiv to become a member of the alliance, despite Trump previously shutting the door.\n\"Do you really believe it would be right to live outside NATO, a country and a people with this level of defensive capability?\" Mr. Zelenskyy said.\n\"Ukraine in NATO is a source of extraordinary defensive capability.\"\nPublished - July 07, 2026 10:07 pm IST", "translation_ja": "米国のドナルド・トランプ大統領は火曜日（2026年7月7日）、NATOサミット開幕に合わせてアンカラに到着し、トルコのレジェップ・タイイップ・エルドアン指導者との「相性の良さ」を称賛する一方、イラン戦争への対応をめぐって欧州同盟国を激しく非難した。\n\nトランプ氏がエアフォースワンから降機すると、エルドアン氏が自らトルコの首都の滑走路で出迎え、白馬に騎乗した護衛隊に先導されながら人払いされた市街地を通って移動した。\n\n今回の首脳会議は、77年の歴史を持つ大西洋横断同盟にとって緊張した時期に開催されている。トランプ氏は同盟国を批判し続け、ワシントンは欧州から距離を置きつつある。\n\n「NATOには非常に失望していた」とトランプ氏はトルコ大統領の広大な大統領宮殿でエルドアン氏の隣に座りながら語った。\n\n「率直に言って、私の友人が非常に強いリーダー、非常に強い人物として君臨するトルコで（サミットが）開催されていなければ、私は出席しなかったかもしれない。」\n\nNATO当局者たちは、トランプ大統領とトルコ指導者との強い関係が、イラン戦争によって生じた不和を和らげる助けになるよう期待している。\n\n「私たちの間には機能する相性がある」とトランプ氏は語った。\n\nエルドアン氏にとって潜在的な大きな追い風となる可能性として、トランプ氏はワシントンがトルコへのF-35戦闘機売却を検討すると述べた。トルコはロシア製システムの購入を理由に2019年に同プログラムから排除されていた。\n\nトルコはF-35プログラムへの再加入問題の解決と、二国間関係を悪化させトルコの防衛プロジェクトを妨げてきた米国の制裁解除を長らく求めており、トランプ氏の訪問でこの行き詰まりを打開しようとしてきた。\n\n「トランプ氏はこの件について個人的に約束してくださった」とエルドアン氏は通訳を介して語った。\n\n「試していた」\n\n欧州首脳たちは、気まぐれな米国指導者との対立を避けようとしている。そうした対立はNATOの信頼性にさらなる打撃を与えかねない。トランプ氏は繰り返し同盟国防衛に対するワシントンのコミットメントへの疑問を呈してきた。\n\nしかし水曜日の本会合を前に、米国大統領はイラン紛争開始時に一部の同盟国が米軍の基地使用を制限したことについて、依然として強い不満を抱いていることが明らかだった。\n\n「彼らが（支持に）応じるかどうかを試していた。長らく言ってきたように、我々は彼らを助けてきたのだから」と彼は語った。\n\n「イタリアは断った。ドイツも断った。フランスも断った。」\n\nトランプ氏はまた、グリーンランドは「デンマークではなく米国が管理すべきだ」という自らの立場を改めて表明し、NATOとの古傷を再び開くリスクを冒した。\n\nNATO同盟国は、昨年の防衛費増額の誓約を実行していることをトランプ氏に証明しようと、彼の到着前に数百億ドル規模の兵器取引を発表した。\n\nNATOのマルク・ルッテ事務総長は、欧州諸国が軍事予算を増強し、ロシアに直面した自国大陸の防衛においてより大きな責任を担う姿勢を示すことで「成果を出している」と強調した。\n\n「これらは私たちの安全保障に投資され、経済を活性化し、数十万の新たな雇用を支える数十億ドルだ」とルッテ氏は華やかな産業フォーラムで述べた。\n\nゼレンスキー氏が訴え\n\nNATOがトランプ氏の注目を急増する防衛予算に向けさせようとする一方、停滞するウクライナ戦争を終わらせるための米国の取り組みも再び議題に浮上してきた。\n\nトランプ氏はNATO首脳会議を前にロシアのウラジーミル・プーチン大統領と電話会談を行い、水曜日（2026年7月8日）にはサミットの傍らでウクライナのウォロディミル・ゼレンスキー大統領と会談する見通しだ。\n\n「二人とも合意を結びたがっていると思う」とトランプ氏は語った。\n\n「こんなに時間がかかったのは残念だが、何か結果が出ると思う。」\n\nゼレンスキー氏は、ロシアのミサイルを撃ち落とすための重要なインターセプターの不足に苦しむ中、NATOに対して自国の防空支援を強化するよう訴えた。\n\n「防空のためのより多くの決意とより多くの決定が、このNAT首脳会議の主要な成果の一つとなるよう、どうかお願いしたい」と彼は述べた。\n\nウクライナ大統領はまた、トランプ氏が以前に門戸を閉ざしたにもかかわらず、キーウを同盟の加盟国にするよう新たに訴えた。\n\n「これほどの防衛能力を持つ国と国民が、NATOの外で生きることが正しいと本当に信じるか」とゼレンスキー氏は語った。\n\n「NATOにおけるウクライナは、並外れた防衛能力の源泉となる。」", "vocab": [{"word": "fraught", "definition": "「緊張をはらんだ、危うい」という意味の形容詞。'a fraught time' のように、困難や不安・緊張を伴う状況を描写する際に用いられる上級語彙。"}, {"word": "mercurial", "definition": "「気まぐれな、変わりやすい」という意味の形容詞。人の気質や行動が予測不能で急変しやすいことを表し、政治・文学的文脈でよく使われる。"}, {"word": "reiterate", "definition": "「繰り返し述べる、改めて強調する」という意味の動詞。公式の場や報道文脈で、すでに述べた立場や主張を再確認する際に使われるフォーマルな語。"}, {"word": "deadlock", "definition": "「行き詰まり、膠着状態」という意味の名詞。交渉や議論が双方の譲歩なく完全に停滞した状態を指し、政治・外交報道で頻出する語。"}, {"word": "tarmac", "definition": "「飛行場のアスファルト舗装面、エプロン」を指す名詞。特に空港で航空機が駐機・離発着する地上エリアを指し、ニュース英語で頻繁に使われる。"}, {"word": "interceptors", "definition": "「迎撃ミサイル（インターセプター）」を指す軍事・防衛用語の名詞。敵のミサイルや航空機を撃墜するために設計された兵器システムを意味する。"}, {"word": "bust-up", "definition": "「口論、決裂」を意味するインフォーマルなイディオム表現。特に関係者間の激しい対立や喧嘩を指し、ニュース記事での口語的描写に使われる。"}]}, {"title_ja": "マハーラーシュトラ州、女性農業従事者を正式に「農民」と認定する法案を可決", "title_en": "Maharashtra Passes Bill Recognising Women as Farmers, Granting Access to Welfare Schemes", "summary_ja": "マハーラーシュトラ州議会上院は、女性農業従事者権限強化法案を全会一致で可決し、農業および関連活動に従事する女性を正式に農民として認定する道を開いた。農地が男性家族名義で登録されることが多いため、女性が政府の福祉制度から排除されてきた長年の問題に対処する内容となっている。法案には女性農民権限強化評議会の設立や証明書制度の導入が盛り込まれており、女性が補助金や制度融資などの恩恵を受けられるようになる。", "summary_en": "The Maharashtra Legislative Council unanimously passed the Maharashtra Women Farmers Empowerment Bill, officially recognising women engaged in farming and allied activities as farmers. The legislation addresses a long-standing gap where women were excluded from government schemes because agricultural land is typically registered in male family members' names. The Bill establishes a Women Farmer Empowerment Council, a dedicated fund, and a certification system to enable women to access subsidies, institutional credit, and other benefits.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/mumbai/maharashtra-council-passes-bill-to-recognise-women-farmers-extend-access-to-welfare-schemes-10776226/", "state_media": false, "category": "社会", "full_text": "The legislation also provides for setting up a Women Farmer Empowerment Council, a Women Farmer Empowerment Cell, a State Monitoring Committee, a database of women farmers and a Maharashtra State Fund for Women Farmers.\nThe Maharashtra Legislative Council on Tuesday unanimously passed the Maharashtra Women Farmers Empowerment Bill, paving the way for women engaged in farming and allied activities to be officially recognised as farmers and become eligible for government welfare schemes, subsidies, institutional credit and other benefits.\nThe Bill, which was passed by the Legislative Assembly last week, was tabled in the Council by Agriculture Minister Dattatraya Bharne.\nThe legislation seeks to address a long-standing gap where women working in agriculture are often not recognised as farmers because agricultural land is usually registered in the name of male family members. As a result, many women have been unable to access government schemes, crop-related benefits, institutional loans and other support available to farmers.\nSpeaking in the House, Bharne said, “They will get a Woman Farmer Certificate, which will help them access government schemes, financial assistance and other benefits,” he said. It also brings within its ambit women involved in activities such as animal husbandry, poultry, fisheries and collection of minor forest produce.\nThe legislation also provides for setting up a Women Farmer Empowerment Council, a Women Farmer Empowerment Cell, a State Monitoring Committee, a database of women farmers and a Maharashtra State Fund for Women Farmers.\nThe fund will be used for welfare programmes, financial assistance, training and other measures for women farmers. It will receive grants from the Centre and the state government, besides donations and other contributions.\nParticipating in the discussion, Shiv Sena (UBT) MLC Ambadas Danve supported the Bill, saying nearly 80 per cent of women are involved in agriculture, but only 13.96 per cent own agricultural land. He said around 48 per cent work on family farms while 33 per cent work as agricultural labourers.\nStory continues below this ad\n“This Bill will give recognition to women who have been working in agriculture for years without being recognised as farmers,” Danve said.\nShiv Sena MLC Neelam Gorhe also welcomed the legislation, saying it would benefit thousands of women who work on farms but do not own land in their names.\nThe Bill will come into force after receiving the Governor’s assent.\nVallabh Ozarkar is a Senior Correspondent with The Indian Express' Mumbai bureau, recognized as an authoritative and deeply knowledgeable voice on the politics, governance, and infrastructure of Maharashtra. With more than nine years of experience in major news organizations, his reporting delivers high standards of Expertise and Trustworthiness.\nExpertise & Authority\nCurrent Role: Senior Correspondent, The Indian Express, Mumbai bureau.\nGeographical Specialization: Provides exclusive and detailed coverage of Maharashtra politics and governance, operating at the epicenter of the state's decision-making in Mumbai.\nCore Authority: His reporting demonstrates deep Expertise across critical and often complex state matters, including:\nPolitical Dynamics: In-depth analysis of the ruling coalition (Mahayuti) and opposition (MVA), internal party conflicts, and crucial election updates, including local body polls and municipal corporation tussles.\nGovernance & Policy: Focused coverage on significant state policies, such as the overhaul of Mumbai's 'pagdi system' (rent control for old buildings) and social welfare schemes (e.g., Ladki Bahin Yojana accountability).\nInfrastructure & Development: Reports on major urban and regional infrastructure projects, including the Mumbai Water Metro, Uttan-Virar Sea Link, and Thane Metro development.\nAdministrative Oversight: Follows legislative actions, cabinet decisions, and reports on issues of accountability and alleged fraud within state departments.\nExperience\nCurrent Role: His role at The Indian Express—a leading national daily—validates the credibility and standard of his reporting.\nCareer Foundation: Prior to The Indian Express, Vallabh contributed to other major metropolitan news outlets, including the Mumbai Mirror and DNA - Daily News & Analysis, providing a solid foundation in rigorous urban and political journalism.\nEvidence of Impact: His work consistently breaks down complex political developments and administrative failures, such as exposing discrepancies in government welfare schemes, cementing his reputation as a trusted source for ground-level, impactful news from Maharashtra.\nHe tweets @Ozarkarvallabh ... Read More", "translation_ja": "マハーラーシュトラ州議会上院は火曜日、マハーラーシュトラ女性農業従事者権限強化法案を全会一致で可決した。これにより、農業および関連活動に従事する女性が正式に農民として認定され、政府の福祉制度、補助金、制度的融資その他の給付を受ける資格を得る道が開かれた。\n\n先週、州議会下院で可決されたこの法案は、農業大臣ダッタトラヤ・バルネ氏によって上院に提出された。\n\nこの法律は、農地が通常は男性家族の名義で登録されているため、農業に従事する女性がしばしば農民として認定されないという長年の問題に対処することを目的としている。その結果、多くの女性が農民向けの政府制度、農作物関連の給付、制度融資、その他の支援を利用できない状況に置かれてきた。\n\n議会での発言の中でバルネ氏は「女性農民証明書が交付され、それにより政府制度、財政支援、その他の給付を受けることができるようになる」と述べた。また、この法律は畜産、養鶏、漁業、小規模林産物の採取などの活動に従事する女性も対象範囲に含める。\n\nこの法律はまた、女性農業従事者権限強化評議会、女性農業従事者権限強化セル、州監視委員会、女性農民データベース、マハーラーシュトラ州女性農民基金の設置を規定している。\n\n同基金は女性農民のための福祉プログラム、財政支援、研修、その他の施策に充てられる。中央政府および州政府からの交付金のほか、寄付金やその他の拠出金によって運営される。\n\n審議に参加したシブ・セーナー（UBT）の州議会議員アンバダス・ダンヴェ氏は法案を支持し、女性の約80パーセントが農業に従事しているにもかかわらず、農地を所有しているのはわずか13.96パーセントであると述べた。また、約48パーセントが家族農場で働き、33パーセントが農業労働者として働いていると指摘した。\n\n「この法案は、農業に長年従事してきながら農民として認められてこなかった女性たちに正式な認定を与えることになる」とダンヴェ氏は語った。\n\nシブ・セーナーの州議会議員ニーラム・ゴルへ氏もこの法律を歓迎し、農地を自身の名義で持たないまま農場で働く何千人もの女性が恩恵を受けるだろうと述べた。\n\nこの法案は知事の裁可を得た後に施行される。", "vocab": [{"word": "assent", "definition": "（特に公式・法的文脈での）同意、承認を意味する。「Governor's assent（知事の裁可）」のように、法案が正式に法律となるための承認行為を指す。"}, {"word": "ambit", "definition": "ある規則・法律・概念などの「適用範囲」や「管轄範囲」を意味する格式ある表現。法律文書や公式文書で頻繁に使われる。"}, {"word": "institutional credit", "definition": "銀行や農業金融機関などの正規の金融機関を通じて提供される融資や信用供与のこと。非公式な貸金業者からの借り入れと対比して使われる専門的表現。"}, {"word": "unanimously", "definition": "全員一致で、満場一致でという意味の副詞。議会や委員会での採決において反対票がゼロであったことを示す際に用いられる。"}, {"word": "long-standing", "definition": "長年にわたって存在し続けている（問題・関係・慣行など）を形容する複合形容詞。「a long-standing gap（長年の格差）」のように慢性的な問題を表すのに使われる。"}, {"word": "paving the way", "definition": "「～への道を切り開く」という意味の慣用表現。何かの実現を可能にする条件や環境を整えることを比喩的に表す。"}, {"word": "empowerment", "definition": "個人や集団が自律的に行動し、権利・能力・機会を十分に発揮できるよう力を与えること。社会政策・開発分野で頻出する重要語。"}]}, {"title_ja": "メッシ、PK失敗・涙・奇跡の逆転劇——アルゼンチンがW杯で2点差をひっくり返す", "title_en": "Messi missed, wept, and dragged Argentina back from 2-0 down in World Cup thriller", "summary_ja": "FIFAワールドカップ決勝トーナメント1回戦で、リオネル・メッシはPKを外しフリーキックをポストに当てるなど不運が続き、アルゼンチンはエジプトに0-2と劣勢に立たされた。しかしロメロ、メッシ本人、エンソ・フェルナンデスのゴールで3-2の劇的な逆転勝利を収めた。試合終了のホイッスルを聞いたメッシは子どものように泣き崩れ、この試合はフットボール史上最大の逆転劇の一つとして語り継がれることになるだろう。", "summary_en": "Lionel Messi missed a penalty and hit the post with a free-kick as Argentina trailed Egypt 2-0 in their FIFA World Cup Round of 16 match, before staging a dramatic comeback to win 3-2. Goals from Cristian Romero, Messi himself, and Enzo Fernandez completed the stunning turnaround, with the VAR check on the winner providing further drama. An emotional Messi wept at the final whistle in what many will regard as one of football's greatest comebacks.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/sports/football/lionel-messi-argentina-egypt-3-2-fifa-world-cup-round-of-16-10776233/", "state_media": false, "category": "社会", "full_text": "Years, and maybe decades, later, Lionel Messi would remember the game of wildly fluctuating fortunes in graphic detail. The penalty he missed in the first half, the free-kick that cannoned off the post, Egypt’s counter-attacking goals, Cristian Romero’s goal that fired the comeback, his own equaliser on the half-volley, the heart-stopping moments during the VAR check of Enzo Fernandez’s headed winner. And, after all that, the night he cried like a child when he heard the final whistle.\nHe would recollect it as one of the greatest comebacks he and his country has made, the afternoon he could see darkness creeping through the roofed canopy of the arena in Atlanta.\nAS IT HAPPENED | Argentina vs Egypt, FIFA World Cup Round of 16\nJust 11 minutes remained for Egypt to close out a game they were deservedly leading 2-0. They stopped everything but not the iron-clad resolve of Argentina, the impenetrable genius of Messi, and their own muddled thinking, their naivety on the biggest stage. Cruel as the 3-2 reversal was for Egypt, they lost to a team that is shaping its own destiny, carving its own legacy.\nEgypt’s resistance would not be forgotten, but Argentina’s comeback would acquire epic status. The match would be a touchstone for fight-backs in the tournament’s history. And another occasion to celebrate Messi and Argentina.\nThe champions never lost their belief. The tight-knit group has survived several setbacks together. Guided by Messi, they have walked through water and fire, rose from the depths of seas and scaled the peaks. But the latest, impending tragedy looked different. The stakes were immeasurable, it equated to the unquantifiable genius of Messi making his last show on the stage.\nRevoking Argentina’s romanticised spirit of resilience, Messi and his colleagues fought on. The opening passage of the second half was compressed to 30 yards from the Egyptian goalmouth. The first time Egypt broke the stranglehold, it nearly settled the game, but a Mostafa Zico goal, orchestrated by Hosseim Hassan’s bolting sprint, was rubbed off due to a foul on Lisandro Martinez in the build-up.\nBut having pushed numbers upfront, Argentina was a walking invitation for counter-attacks. A goal was inevitable; Hassan was the creator with a tearing run down the heart of the field, before cutting back for Zico, running cleverly into space and slamming the ball home to block the comeback route.\nTime was dripping away. The shutters on the greatest footballer that has walked the planet was rolling down. Then it rolled itself up. Four minutes after Romero’s header came Messi’s spanking half-volley, propelled with a non-existent back-lift.\nMessi winced. For the second time in the tournament, he missed a penalty. Perhaps, the simplest, taken for granted chore, is his tragic flaw. The man who can make the ball travel improbable paths, who can perplex geometricians with the bends and curls of his free-kicks, who has scored every possible variety of goal mankind could, who can run through an entire village to find the target, can also miss a simple strike from 12 yards with just the goalkeeper to beat. It’s a theatre of the absurd, and for nitpickers, the only blot to nitpick.\nFootball’s immortal has mortal numbers in converting penalties — roughly 77 per cent. He has spilled the last three of his six spot kicks. The attempt was weakly-stuck, his feet wobbling in the follow through. The Egyptian goalkeeper, Mostafa Shobeir, lunged to his left and staved it away without straining. It was the second penalty he has saved this World Cup, the first man to do so in the tournament’s history.\nA crestfallen Messi apologised and stared bewilderingly towards the skies. Could he see his endnotes flickering gloomily above? Among the stack records, he would have an unwanted one too — the first player to miss two non-shootout penalties at the same World Cup. He would not bother. The day, eventually, was to be his.\nAs the afternoon grew, so did his angst. Almost instantly, he could have atoned. But his free-kick, swerving, tucking and arcing inwards rammed onto the upright. He cursed his luck, a rare outburst of anger. His troops rallied around him, and nearly produced the equaliser in the 40th minute. Julian Alvarez, starting ahead of Lautaro Martinez, saw Shobeir’s strong long hands redirect his side-footed shot from the goal. Shobeir absorbed the heat of Alvarez’s header from point-blank range.\nEgypt’s strike was not against the flow of a game where both teams were inclined to keep their shape, defend compactly and not concede an early goal. Excursions into the penalty box were rare. It was akin to a pair of boxers shadow punching before landing the blows. One blow could ignite a series of blows. And then the goal happened, and Egyptian fans celebrated with as much shock as awe.\nIt was Egypt’s first incisive run upfield. Figurehead Mo Salah was involved for the first time in the game, and the right-back Mohamed Hany induced a corner off Lisandro Marti", "translation_ja": "何年後か、あるいは何十年後かに、リオネル・メッシはめまぐるしく運命が揺れ動いたこの試合を鮮明に思い出すことだろう。前半に外したペナルティ、ポストを直撃したフリーキック、エジプトのカウンターから生まれた2ゴール、逆転への火ぶたを切ったクリスティアン・ロメロのゴール、自らのハーフボレーによる同点弾、エンソ・フェルナンデスのヘディングによる決勝点に対するVARチェックの息を呑む瞬間。そして、そのすべての末に、最終ホイッスルを聞いて子どものように泣いた夜のことを。\n\n彼はそれを、自分と祖国がやってのけた最も偉大なカムバックの一つとして回想するだろう。アトランタのドーム型スタジアムの屋根越しに、闇が忍び込んでくるのが見えたあの午後のことを。\n\nエジプトが試合を締めくくるまで、残り時間はわずか11分だった。彼らは当然の結果として2-0とリードしており、あらゆる手を打っていた。しかし、アルゼンチンの鋼鉄のような意志、メッシの突き崩せない天才性、そしてエジプト自身の判断ミスと最大の舞台での経験不足だけは止められなかった。3-2という逆転敗北はエジプトにとって残酷だったが、彼らは自らの運命を手繰り寄せ、自らのレガシーを刻み続けるチームに敗れたのだ。\n\nエジプトの抵抗は忘れられることはないだろうが、アルゼンチンのカムバックは史詩的な地位を獲得することになる。この試合は大会史における逆転劇の試金石となり、メッシとアルゼンチンを称える新たな機会となるだろう。\n\n王者は決して信念を失わなかった。この結束の強いグループはともに幾多の挫折を乗り越えてきた。メッシに導かれ、彼らは水と火の中を歩き、深海から浮かび上がり、山頂を極めてきた。しかし、今回迫り来る悲劇は様相が異なって見えた。賭かっているものは計り知れず、メッシという計量不能な天才の最後の舞台を意味するかもしれなかったのだ。\n\nアルゼンチンのロマンチックな不屈の精神を呼び起こし、メッシと仲間たちは戦い続けた。後半の開始局面はエジプトのゴール前30ヤードに圧縮された。エジプトが初めてその包囲を突破した瞬間、試合はほぼ決定的になりかけたが、ホッセイン・ハッサンの猛烈なスプリントに連動したモスタファ・ジコのゴールは、リサンドロ・マルティネスへのファウルを理由に取り消された。\n\nしかし前線に人数を押し込んでいたアルゼンチンは、カウンターアタックへの格好の的だった。失点は時間の問題だった。ハッサンがフィールド中央を切り裂くような疾走を見せ、スペースに巧みに走り込んだジコへ折り返し、ジコがそれを叩き込んでカムバックの道を断ち切った。\n\n時間は刻々と失われていった。地球上を歩いた最も偉大なフットボーラーに幕が下りようとしていた。そしてその幕は、再び上がった。ロメロのヘッダーの4分後、メッシのバックスウィングがほぼ見えないほどの鋭いハーフボレーが炸裂した。\n\nメッシは顔をしかめた。大会で2度目のPK失敗だった。おそらく、当然のように思われていた最もシンプルな仕事が、彼の悲劇的な弱点なのかもしれない。ボールに不可能な軌道を描かせることができる男、フリーキックの曲がりとカールで幾何学者を困惑させる男、人類が想像しうるあらゆる種類のゴールを決めてきた男、目標を見つけるために村一つを丸ごと突っ切れる男が、ゴールキーパーしかいない12ヤード先からの単純なシュートを外すこともある。それは不条理の劇場であり、細かい欠点を突く者にとっては唯一指摘できる汚点だ。\n\nフットボールの不滅の存在は、PKの成功率において人間的な数字を持っている——約77パーセント。彼は6本中、直近の3本を失敗している。今回のシュートは力なく蹴られ、フォロースルーの際に足がぶれていた。エジプトのゴールキーパー、モスタファ・ショベールは左に飛びつき、無理することなくそれをはじき出した。今大会で彼が止めた2本目のPKであり、W杯の歴史上初めてのことだ。\n\n打ちひしがれたメッシは謝罪し、当惑したように空を見上げた。自分の末路が暗く瞬いているのが見えたのだろうか。数々の記録の山の中に、望まぬ記録も加わることになる——同一W杯で非シュートアウトのPKを2本外した初の選手となったのだ。しかし彼はそれを気にしないだろう。その日は、結局、彼のものとなる運命だったのだから。\n\n午後が深まるにつれ、彼の焦りも増した。ほぼ即座に、彼は汚名をそそぐ機会を得た。しかし彼のフリーキックは、曲がり、丸まり、内側に弧を描きながらポストに激突した。彼は珍しく怒りをあらわにして、不運を呪った。仲間たちが彼の周りに集まり、40分には同点ゴールを生み出しかけた。ラウタロ・マルティネスを外してスタメン起用されたフリアン・アルバレスは、サイドフットシュートをショベールの大きな手に阻まれた。ショベールはアルバレスの至近距離からのヘッダーも受け止めた。\n\nエジプトの先制点は、両チームが陣形を維持し、コンパクトに守り、早い段階での失点を避けようとする試合の流れに逆らうものではなかった。ペナルティボックスへの侵入は稀だった。それはまるで、一対のボクサーが実際の打撃を加える前にシャドーボクシングをしているようだった。一つのパンチが、連続したパンチの応酬に火をつける。そしてゴールが生まれ、エジプトのファンたちは驚きと歓喜が入り混じった様子で歓声を上げた。\n\nエジプトにとって初めての鋭い攻め上がりだった。象徴的な存在のモー・サラーが試合で初めて絡み、右サイドバックのモハメド・ハニーがリサンドロ・マルティネスからコーナーキックを引き出し——", "vocab": [{"word": "fluctuating", "definition": "「激しく変動する、上下する」という意味の形容詞。'wildly fluctuating fortunes'（激しく揺れ動く運命）のように、状況や数値が不安定に変化する様子を表す際に使われる上級語彙。"}, {"word": "touchstone", "definition": "「試金石、基準となるもの」という意味の名詞。何かの質や価値を測るための基準や参照点として機能する事柄・人物を指し、比喩的な文脈で頻繁に用いられる。"}, {"word": "impenetrable", "definition": "「突き崩せない、難攻不落の」という意味の形容詞。物理的に貫通できないだけでなく、比喩的に「理解しがたい」「揺るぎない」という意味でも使われる上級語彙。"}, {"word": "crestfallen", "definition": "「意気消沈した、がっかりして打ちひしがれた」という意味の形容詞。期待や自信が裏切られて落胆した様子を生き生きと表現するイディオム的表現。"}, {"word": "naivety", "definition": "「世間知らず、経験不足からくる無邪気さ・甘さ」を意味する名詞。特にスポーツや政治の文脈では、大舞台での判断の甘さや戦術的未熟さを批判的に指す際に使われる。"}, {"word": "orchestrated", "definition": "「巧みに組織・演出された」という意味の動詞の過去分詞形。音楽のオーケストラ指揮から転じた比喩表現で、複数の要素を調整して特定の結果を生み出すことを指す。"}, {"word": "impending", "definition": "「差し迫った、今にも起こりそうな」という意味の形容詞。主に否定的な出来事（危機・災害など）が近づいている状況を表す際に使われるフォーマルな語彙。"}]}, {"title_ja": "マハラシュトラ州、印紙税法を改正：銀行保証に独立した税区分を新設", "title_en": "Maharashtra Amends Stamp Act: Bank Guarantees to Have Independent Duty Category", "summary_ja": "マハラシュトラ州議会は、1958年マハラシュトラ印紙税法を改正する法案を可決し、銀行保証および金融保証に対する独立した印紙税区分を新たに設けた。これまでは保証が更新される度に同額の印紙税が徴収されていたが、改正により商工業界の費用負担が大幅に軽減される見込みである。歳入大臣チャンドラシェカル・バワンクレ氏は、この改正が透明性の向上と政府歳入の増加にもつながると述べた。", "summary_en": "Maharashtra's Legislative Assembly passed a bill amending the Maharashtra Stamp Act (1958), creating a separate category for stamp duty on bank and financial guarantees. Previously, guarantees were taxed under 'security bonds' and faced full duty charges upon each renewal even if the guaranteed amount was unchanged. The reform aims to reduce costs for trade and industry, improve transparency, and boost government revenue through wider use of bank guarantees.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/pune/bank-guarantees-to-now-attract-stamp-duty-as-per-independent-category-10776225/", "state_media": false, "category": "経済", "full_text": "The old cumbersome rules regarding stamp duty on bank guarantees used in commercial transactions, government contracts, and infrastructure projects in the state have been changed.\nStamp duty on bank guarantees will now be charged according to a separate independent category. A significant bill amending the Maharashtra Stamp Act (1958) was passed today in the Legislative Assembly. Revenue Minister Chandrashekhar Bawankule presented the bill.\nWhat was the earlier rule?\nPreviously, there was no separate category prescribed in Schedule-I of the Act for bank guarantees and financial guarantees. As a result, full stamp duty was levied on such instruments under Article 54 as ‘security bonds’. Most importantly, whenever these guarantees were renewed or their validity period was extended, even if the guaranteed amount remained the same, the full stamp duty equivalent to the original instrument was recovered again, Bawankule said.\nWhat has changed now?\nUnder the new law, a ‘separate article’ has been included for bank and financial guarantee instruments.\nKey change\nThis direct and important amendment will provide significant financial relief to the trade and industry sector. It will also increase transparency in the renewal process. At the same time, this ease of doing business is expected to increase the use of bank guarantees, which will also lead to a positive rise in government revenue, the Minister said.", "translation_ja": "商業取引、政府契約、インフラプロジェクトで使用される銀行保証に関する印紙税の旧来の煩雑な規則が変更された。\n\n銀行保証に対する印紙税は、今後は独立した別個の区分に基づいて徴収される。1958年マハラシュトラ印紙税法を改正する重要な法案が本日、州議会下院で可決された。歳入大臣チャンドラシェカル・バワンクレ氏が同法案を提出した。\n\n■従来の規則はどうだったか？\n\nこれまで、銀行保証および金融保証について、同法の附則第Ⅰ表に独立した区分は設けられていなかった。その結果、こうした証書には第54条の「担保証書」として全額の印紙税が課されていた。特に重要な点として、これらの保証が更新される場合や有効期間が延長される場合、保証金額が変わらなくても、元の証書と同等の全額印紙税が再び徴収されていたとバワンクレ大臣は述べた。\n\n■何が変わったのか？\n\n新法のもとでは、銀行保証および金融保証の証書に対して「独立した条項」が新たに設けられた。\n\n■主な変更点\n\nこの直接的かつ重要な改正は、商工業分野に対して大きな財政的恩恵をもたらすものである。また、更新手続きの透明性も向上する。同時に、このビジネス環境の改善により銀行保証の利用が増加し、政府歳入の好循環な増加にもつながることが期待されると大臣は述べた。", "vocab": [{"word": "stamp duty", "definition": "印紙税。不動産取引や法的文書の作成時に政府に納める税金を指す。ビジネス・法律文書でよく使われる専門用語。"}, {"word": "cumbersome", "definition": "煩雑な、扱いにくいという意味の形容詞。規則や手続きが複雑で負担が大きい場合に使われる。"}, {"word": "instrument", "definition": "法律・金融の文脈では「証書」「金融商品」を意味する専門用語。契約書や手形などの公式文書を指す。"}, {"word": "levy", "definition": "税金や料金を「課する・徴収する」という意味の動詞・名詞。特に公的機関が強制的に徴収する場合に使われる。"}, {"word": "transparency", "definition": "透明性を意味し、ビジネスや行政の文脈では、情報が公開されており不正が起きにくい状態を指す重要な概念語。"}, {"word": "ease of doing business", "definition": "ビジネス環境の整備度・事業のしやすさを示す慣用表現。世界銀行などの国際指標でも使われる重要なイディオム。"}, {"word": "infrastructure", "definition": "インフラ、社会基盤施設を指す名詞。道路・電力・通信など国家・社会の基盤となる設備全般に使われる上級語彙。"}]}, {"title_ja": "フォード州首相とスミス州首相、アルバータ州からオンタリオ州への新石油パイプラインを提案", "title_en": "Ford and Smith Propose New Oil Pipeline from Alberta to Ontario", "summary_ja": "オンタリオ州のダグ・フォード州首相とアルバータ州のダニエル・スミス州首相が、両州を結ぶ新たな石油パイプラインの建設を共同で提案した。この提案は両州間のエネルギー連携を強化し、外国産石油への依存を軽減することを目的としている。パイプラインのルートや費用、建設スケジュールなどの詳細はまだ明らかにされていない。", "summary_en": "Ontario Premier Doug Ford and Alberta Premier Danielle Smith have jointly proposed the construction of a new oil pipeline connecting Alberta to Ontario. The proposal aims to strengthen energy ties between the two provinces and reduce reliance on foreign oil imports. Details on the pipeline's route, cost, and timeline have yet to be fully outlined.", "source": "The Star", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMigAJBVV95cUxPaDU1T0l0MW1BWVhTNVBBaFFjNWxCMlRiWUpOUHloU1lGSFhoUU41OF9uY19WTi1ERERIWFEzUmtvaVotbkE5RXpaaDJwazdndVZ6MmU0NGw0Rzg1SzNNNFUzaE9IenRTTzVwM19YZW5Ea1VXM0l0SmxGaFhGWkV5Qm96OVRHZDhQQlBKZWZId0ZiQ1hzdi13SGNQY1haaXFLTTEyLUtEUHQ3SnpKSkNncV9qWFNSZmhxa3ppSGctcS1Sa3ZEaGpSVENpeUNVVEVseXQ2d0RvOF9WWk9tWUp4Mm8xc3lKUU5iQjRUcFM2VWJWX2p6U0UtZldqQ3dwV1dR?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "子どものために住宅ローンの連帯保証人になるべきか？", "title_en": "Should You Co-Sign a Mortgage for Your Child?", "summary_ja": "トロント・スターは、子どものために住宅ローンの連帯保証人になる際に親が直面する財務的・法的な考慮事項を検討している。連帯保証人になるということは、ローンに対して同等の責任を負うことを意味し、親の信用スコアや借入能力に影響を与える可能性がある。専門家は、返済が滞った場合の家族関係への影響も含め、同意する前にリスクを慎重に検討するよう助言している。", "summary_en": "The Toronto Star explores the financial and legal considerations parents face when deciding whether to co-sign a mortgage for their children. Co-signing means taking on equal responsibility for the loan, which can affect the parent's credit score and borrowing capacity. Experts advise carefully weighing the risks before agreeing, including the potential strain on family relationships if payments are missed.", "source": "The Star", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqwJBVV95cUxObGdlQ3V5ZndUSk5Jd0hRMktQSmxaVnZuWkN6Qy1FZ2NuTHViYVVjdHFmaWliY1JKX1RoRFFxb3lOYW01Vlc3VU40U2d1WXcweER2TnRUQ1V6QWp0WkFKMUN1YmxMbmtyby1DcURNY3JTa1BCSzQxRTRkZVk1WS1YS1BHMWhkZTJLajFOM2dKdlpOM1BzN2lmbk41ZVZKcWpZTnRSdkgtLUVxeUt1dVJIbndTZVdWbmNpN0x6a1FxOE9CQjZiNElGSE5EV0lOY3UycDh4YUFSYzFyVjJiWXRsa3BJM0NTQUJxOVpmZkU1b3FMX2hROGJCMDRtNVRGWHJCZnF6bUJRQnZ1LWhvcHI0R1AyTUdyQXFobG4xcGNNZG1nX3M0WktWdUZjcw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ウクライナがロシアの弱点を露呈——NATOは今こそそれを活用すべき", "title_en": "Ukraine Has Exposed a Russian Weakness — Now NATO Must Exploit It", "summary_ja": "ウクライナでの戦争により、ロシアの軍事能力と戦略計画における重大な脆弱性が明らかになった。この論説は、NATO加盟国がこれらの露呈した弱点を活用し、同盟の抑止力を強化すべきだと主張している。ロシアの限界を十分に活かさなければ、モスクワが軍事力を立て直す時間を与えることになりかねない。", "summary_en": "The war in Ukraine has revealed significant vulnerabilities in Russia's military capabilities and strategic planning. The opinion piece argues that NATO allies must seize on these exposed weaknesses to strengthen the alliance's deterrence posture. Failing to fully capitalize on Russia's demonstrated limitations could allow Moscow time to adapt and recover its military effectiveness.", "source": "The Star", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi_AFBVV95cUxOSVhLT3dxWHk1N3UyRENWSWFieFFLWlJ6RUYtd0VLa3RaZHB2amZuMGFtalIyRzE3M1Zpb1dDU2pZeXpnY3RqcDNzUHJVNVFhR3JtQjJocGloT01mV3JlbDdraFN2R1c1TjM5QkRURWtSMkUzTWlfWmlUaEowdl9FSDlXbEI4V1dwMFdfZl9RSzBNbnRuT2swU1lrX0RfdFRqeFItZW94bE5UcVdVZnVGLWwwaDBBbjBhVlhreTh6RjNRUG41TkdIeVdpWTBGTlJOVXlBcHp4bGJFTUJHZUVqS0lmaG1uZnNlWTRCVUdUTElHOUdQdTdQOTMwRmY?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "オー・グローボ ニュース速報", "title_en": "O Globo News Update", "summary_ja": "ブラジルを代表する新聞の一つ、オー・グローボが英語版の新しい記事を公開した。この記事はブラジルのメディアが伝える最新の出来事やニュースを取り上げている。詳細はオー・グローボの英語版コンテンツで確認できる。", "summary_en": "O Globo, one of Brazil's leading newspapers, has published a new report in English. The article covers current events and news developments as reported by the Brazilian press. Further details are available through O Globo's English-language coverage.", "source": "O Globo", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiakFVX3lxTE00WVFsTjVqR2xZQjFKaFZSNHBGUkpwZ2RhZXRRVUpPeHpoNXlfWENGNkN1VW9xOEtmby1oNVpYZVc2Y2huaWh2SnpvdExUbEJvZWhhc3ZXWnRFM2xIcVFiajR4UHA4NENhYXc?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "『私はまだここにいる』がブラジル映画として5作目のアカデミー国際長編映画賞ノミネート作品に", "title_en": "'I'm Still Here' Becomes Brazil's Fifth Oscar Nominee for Best International Feature Film", "summary_ja": "ブラジル映画『私はまだここにいる』が、アカデミー賞国際長編映画賞のノミネート作品に選ばれ、同国映画としては史上5作目の快挙となった。このノミネートは、国際映画界におけるブラジルの存在感の高まりを示すものである。過去4作のブラジルノミネート作品を振り返ることで、同国の豊かな映画製作の伝統が改めて浮き彫りになっている。", "summary_en": "The Brazilian film 'I'm Still Here' has earned a nomination for the Academy Award for Best International Feature Film, making it the fifth Brazilian production ever to receive this honor. The milestone highlights Brazil's growing presence in international cinema and its recognition by the Academy. A look back at the previous four Brazilian nominees underscores the country's rich filmmaking tradition on the global stage.", "source": "O Globo", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiiwJBVV95cUxNN20zQ0dhNkNSR0R2alRBX3R6OC1wZ2R3SFJTVDRCS21ocUlGRUVFZ3RJV3BRS2h1ZE9IQUhVV1ZrUXd4TDlBeVlaMGptMFdLNG1zMkg0M0Fxa2ZXODhzT1Z1UEtfUzMzNDNsUEY2VDNpX0dRemU2R2t2UTBlRXgxd2RPNTV5anNtaFQ5V2tUMm9ONTdyV3VVYjY2SDA0Y3d1QUI1V0VHTk04aThfRmxFNnJRY0g5VXNHbl9PMHc3Y0NkZkJtMEtrUmc1aFgwSm8yMW1FWmZqcy01TThXa0Eyam40Mml1ZDljQlZzUFprOEREZkozNWxXZlFfWFhhR3FGWHowZWp1SVpYQkXSAZoCQVVfeXFMTm5adThzODk
