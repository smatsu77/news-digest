xWGFUb1J0aUpId0FwTjVZRWM5bVJOQVNjOVl3WlhIY0Y0U0pGVGFHVkxDU0w3b2xTclBRR04yVFYxWmJQS0lvcUZrRnRoMXBRZllWTndPR1VVd25DX0U2VWRjcmZ4cnBpZVM1RENwQzlIU0diYVRtX1lESjZYRm5SSmlqMEpDcFVyT0hDYlBKWEZabXFfZ0U5LXMybjNURjJLeXJHZU5DSnVPRUEyUVJtOUZDQUdYVnk1Yks4Mm9aNnhZWFlSbXFBZllhU0tSb0NlbWxzMVBhMF84RnB0SlNDMFh2ZGRaRENZY0EtT1d3SzB4UDZ2S1NJNGRvTl90SW5CSFA1elNTaXFqeFpMbjdiRGF3?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "グルーポ・グローボ、創立100周年記念の取り組みを準備中", "title_en": "Grupo Globo Prepares Special Initiatives for Its Centennial Anniversary", "summary_ja": "ブラジルの大手メディアコングロマリット、グルーポ・グローボは創立100周年を記念した一連の取り組みを準備している。ラテンアメリカ最大級のメディア企業として、同グループは傘下の様々なプラットフォームや媒体を通じた記念プロジェクトを計画している。100周年の節目が近づくにつれ、具体的な祝賀イベントの詳細が発表される見込みだ。", "summary_en": "Brazil's Grupo Globo is developing a series of initiatives to celebrate its 100th anniversary. The media conglomerate, one of the largest in Latin America, is planning commemorative projects across its various platforms and outlets. Details of the centennial celebrations are expected to be unveiled as the milestone year approaches.", "source": "O Globo", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxPMVZRN2RsM0EtZWt6dlpuR0tvNElsSkhsaDdsd0lYalpqS285YlBna1RjbUdxWkFZOXotLWxJV3ZUczBZMGVPeUl0X0FLYXZXYy1ILTBqN3E1XzJVVTFrUXo0Y29RamNyanhVcUF6U2ZpUEdITV9ubk1oMF82c3FjM2ljZUZVbmZ0UG5sY0hkRTNvNGVqTnpuNlR2N21sYUZybkJHeVBHUkF2MUlUSFlpREtOQTFXaVJVUmfSAcgBQVVfeXFMUDJCRm16ZDU5bjViV21mdm1KMzJ5c3JnVjBEcVpJUGF2b0tnZ1JkRGhVVDVYM1pyMFNKQUNIdDVGQWRkTjNhR0dSai1kQS1nLVFwUFlDYm1aMjFaNEx2Y1YzWjVRWlNfN3lPWC1ERF9ZcVFhOFpTY3VVX0w2bmNyR2Rick9VLXRDemFydWFXOHhaSFhLai1PSmdfUlhDT0NiY0Z0TGJFUGZxLVhDdmxmZ25hcHl0T3dhWm9VeHZaWTRPa252QVNQdkM?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ティヌブ大統領、偽の大統領府機関スキャンダルでICPCに30日以内の調査を命令", "title_en": "Tinubu Orders ICPC to Investigate Fake Presidential Agency Scandal Within 30 Days", "summary_ja": "ナイジェリアのボラ・ティヌブ大統領は、「大統領対外介入促進評議会（PFIPC）」と称する架空機関に関する調査を汚職防止委員会（ICPC）に命じた。アデニイ・アデイェミ・マシューと名乗る人物が同機関の長官を詐称し、偽造文書を用いて公式承認や外交支援を得ようとしたとされる。調査は30日以内に完了し、大統領に報告書を提出することが求められている。", "summary_en": "President Bola Tinubu has directed the ICPC to investigate a fictitious agency called the 'Presidential Foreign Intervention Promotion Council,' which was fraudulently presented as a legitimate government body. A man named Adeniyi Adeyemi Matthew falsely claimed to be its Director-General and a presidential appointee, using forged documents to seek official recognition and open bank accounts. The investigation must be completed within 30 days, with all federal ministries ordered to cooperate fully.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/893643-fake-agency-scandal-tinubu-orders-icpc-to-investigate-gives-30-day-deadline.html", "state_media": false, "category": "政治", "full_text": "President Bola Tinubu has directed the Independent Corrupt Practices and Other Related Offences Commission (ICPC) to conduct a thorough investigation into the activities of a “Presidential Foreign Intervention Promotion Council” (PFIPC) and all related matters.\nThe President directed that the investigation be concluded and a comprehensive report submitted to him within 30 days.\nThe directive follows the discovery of the fictitious PFIPC, which was never established by the Federal Government of Nigeria and has no basis in any law, presidential instrument, executive approval, or other lawful act of government.\nOne Adeniyi Adeyemi Matthew presented himself as the Director-General of the so-called PFIPC and falsely claimed to be a presidential appointee.\nAmong the issues to be investigated by the ICPC are the forged appointment letters and other official government documents; the use of a false claim of presidential appointment to seek or obtain official recognition and diplomatic support, including visa facilitation; and the opening of multiple bank accounts in the names of purported government agencies using allegedly forged documents.\nPresident Tinubu directed the ICPC to investigate not only the conduct of the principal individual and other collaborators involved but also the wider circumstances that may have enabled a fictitious body and a false claim of presidential appointment to acquire an appearance of official legitimacy.\nThe investigation is to examine the provenance and use of false official documents; the processes through which official recognition or diplomatic support may have been sought or obtained; the opening and operation of any related bank accounts; the source and movement of any funds involved; and the role of any public officer, private individual, financial institution, intermediary or other person or entity that may have facilitated, enabled or participated in the alleged scheme.\nThe President further directed the Commission to identify any weaknesses in government and institutional procedures that may have been exploited and to recommend immediate measures to prevent the recurrence of similar abuses.\nREAD ALSO: Gbajabiamila-Adeyemi Saga: Why National Assembly appropriated ₦1.3bn for fake agency – Senate spokesperson\nAll ministries, departments and agencies of the Federal Government have been directed to provide the ICPC, upon lawful request, with all relevant information, records and assistance required for the expeditious completion of the investigation.\nPresident Tinubu stated that the integrity of the Presidency and the institutions of the Federal Government must be protected against impersonation, forgery, abuse of official identity and the exploitation of weaknesses in the public service.\nThe President directed that all persons found culpable be treated strictly in accordance with applicable law.\nBayo Onanuga\nSpecial Adviser to the President\n(Information and Strategy)", "translation_ja": "ボラ・ティヌブ大統領は、「大統領対外介入促進評議会（PFIPC）」の活動および関連するすべての事案について、独立汚職・その他関連犯罪防止委員会（ICPC）に徹底的な調査を実施するよう指示した。\n\n大統領は、調査を30日以内に完了させ、包括的な報告書を自らに提出するよう求めた。\n\nこの指示は、架空のPFIPCの発覚を受けて下されたものである。同機関はナイジェリア連邦政府によって設立されたことはなく、いかなる法律、大統領令、行政承認、その他の合法的な政府行為にも根拠を持たない。\n\nアデニイ・アデイェミ・マシューと名乗る人物が、いわゆるPFIPCの長官を自称し、大統領任命者であると虚偽の主張を行った。\n\nICPCが調査すべき事項には、偽造された任命状およびその他の公式政府文書、大統領任命者であるという虚偽の主張を利用してビザ取得の便宜を含む公式承認や外交的支援を求めまたは取得した行為、偽造文書を使用して架空の政府機関名義で複数の銀行口座を開設した行為などが含まれる。\n\nティヌブ大統領は、関与した主要人物および共謀者の行為のみならず、架空の機関および大統領任命者という虚偽の主張が公式な正当性を装うことを可能にした、より広範な状況についても調査するようICPCに指示した。\n\n調査の対象には、偽の公式文書の出所と使用状況、公式承認や外交的支援が求められまたは取得された経緯、関連する銀行口座の開設および運営状況、関与した資金の出所と移動、ならびに当該スキームを促進・支援・関与した可能性のある公務員、民間人、金融機関、仲介者またはその他の個人・団体の役割が含まれる。\n\n大統領はさらに、委員会に対し、悪用された可能性のある政府および機関の手続き上の脆弱性を特定し、類似の不正行為の再発を防ぐための即時措置を勧告するよう指示した。\n\n連邦政府のすべての省庁および機関は、調査の迅速な完了に必要な関連情報、記録および支援を、合法的な要請に基づいてICPCに提供するよう指示を受けた。\n\nティヌブ大統領は、大統領府および連邦政府の諸機関の信頼性を、なりすまし、文書偽造、公式身分の乱用、および公務における脆弱性の悪用から守らなければならないと述べた。\n\n大統領は、関与が認められたすべての人物について、適用される法律に厳格に従って対処するよう指示した。\n\nバヨ・オナヌガ\n大統領特別顧問\n（情報・戦略担当）", "vocab": [{"word": "fictitious", "definition": "「架空の、虚偽の」という意味の形容詞。実際には存在しないにもかかわらず、本物であるかのように見せかけられた物事を指す際に用いられる。"}, {"word": "provenance", "definition": "「出所、起源」を意味する名詞で、主に文書、芸術品、情報などがどこから来たかを追跡する文脈で使われる専門的な表現。"}, {"word": "expeditious", "definition": "「迅速な、手際よい」を意味する形容詞で、業務や手続きを効率的かつ速やかに行うことを強調する際に使われる、やや格式ばった語。"}, {"word": "impersonation", "definition": "「なりすまし、身元詐称」を意味する名詞。他者や公的機関であるかのように偽ることを指し、法律・犯罪に関する文脈で頻繁に登場する。"}, {"word": "culpable", "definition": "「有責の、責任を負うべき」を意味する形容詞で、主に法律や倫理的文脈において、過失や罪が認められる人物や行為を表す際に使われる。"}, {"word": "intermediary", "definition": "「仲介者、中間業者」を意味する名詞。二者の間に入って交渉や取引を媒介する人物や組織を指し、法律・金融・外交の文脈でよく使われる。"}]}, {"title_ja": "メッシがアルゼンチンを救う――エジプトに3-2の逆転勝利で8強進出", "title_en": "Messi Rescues Argentina in 3-2 Comeback Win Over Egypt at 2026 World Cup", "summary_ja": "リオネル・メッシのゴールとアシストに牽引され、アルゼンチンはエジプトに3-2の劇的な逆転勝利を収め、2026年FIFAワールドカップの準々決勝へと駒を進めた。2点のビハインドを背負いながらも、ロメロ、メッシ、エンソ・フェルナンデスのゴールで逆転に成功した。エジプトは史上初のノックアウトステージ進出という最高の成績を残しながらも、大会を後にした。", "summary_en": "Lionel Messi scored and created goals to inspire Argentina's dramatic 3-2 comeback victory over Egypt, sending the defending champions into the 2026 FIFA World Cup quarter-finals. Despite falling two goals behind and Messi missing a penalty, late goals from Romero, Messi himself, and Enzo Fernández secured the win. Egypt bowed out having achieved their best-ever World Cup campaign by reaching the knockout stage for the first time.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/sports/football/893640-world-cup-messi-rescues-argentina-as-champions-fight-back-to-beat-egypt.html", "state_media": false, "category": "社会", "full_text": "Lionel Messi once again proved why he is regarded as one of football’s greatest players, inspiring Argentina to a dramatic 3-2 comeback victory over Egypt to send the defending champions into the quarter-finals of the 2026 FIFA World Cup.\nArgentina looked set for a shock exit after falling two goals behind, but Messi scored one goal and created another as the South Americans fought back to keep alive their hopes of defending the title.\nThe victory also saw Messi make more World Cup history. The Argentina captain became the first player to score in six consecutive World Cup knockout matches. However, it was also a night of mixed emotions as he became the first player to miss two penalties at a single World Cup tournament, excluding penalty shootouts.\nEgypt made a brighter start and stunned the favourites in the 15th minute when Yasser Ibrahim headed home from a well-worked corner.\nArgentina had a chance to respond almost immediately after Haissem Hassan fouled an opponent inside the box, but goalkeeper Mostafa Shobeir brilliantly saved Messi’s penalty. The Egyptian goalkeeper continued his outstanding display by denying Alexis Mac Allister, Messi and Julián Álvarez before half-time.\nEgypt thought they had doubled their lead early in the second half, but VAR ruled out Mostafa Ziko’s effort for a foul in the build-up.\nThe Pharaohs were not to be denied for long. Mohamed Salah produced another excellent pass to Hassan, who squared the ball for Ziko to make it 2-0 and send Egyptian fans into celebration.\nArgentina finally found a way back in the 79th minute when Cristian Romero headed home from Messi’s inviting cross.\nREAD ALSO: WAFU B U20 Championship: Ahmed Musa motivates Flying Eagles with cash gift\nWith time running out, Messi stepped up again, driving a powerful shot past Shobeir to level the score and spark hopes of another famous Argentina escape.\nDeep into stoppage time, Lautaro Martínez broke clear and crossed for Enzo Fernández, who headed home the dramatic winner.\nArgentina will now face either Switzerland or Colombia in the quarter-finals. At the same time, Egypt bowed out after their best-ever World Cup campaign, having reached the knockout stage for the first time in the country’s history.", "translation_ja": "リオネル・メッシは改めて、なぜ自身がサッカー界最高の選手の一人と見なされているかを証明した。メッシはアルゼンチンを牽引し、ディフェンディングチャンピオンは2026年FIFAワールドカップの準々決勝進出をかけたエジプト戦で劇的な3-2の逆転勝利を収めた。\n\nアルゼンチンは2点のビハインドを背負い、まさかの敗退が現実味を帯びていた。しかしメッシが1得点1アシストを記録し、南米の強豪は追い上げを見せて王座防衛の夢をつなぎとめた。\n\nこの勝利はメッシにとって新たなワールドカップ史への刻み込みとなった。アルゼンチンの主将は、ワールドカップのノックアウトステージ6試合連続得点を達成した史上初の選手となった。しかし一方で、PK戦を除く1大会での2度のPK失敗という不名誉な記録も樹立してしまい、複雑な夜ともなった。\n\nエジプトは序盤から勢いよく試合に入り、15分に好連携から繰り出されたコーナーキックをヤセル・イブラヒムがヘッドで押し込み、優勝候補の大国を驚かせた。\n\nアルゼンチンは直後に反撃のチャンスを得た。ハイセム・ハッサンがペナルティエリア内でファウルを犯し、PKを獲得したのだ。しかしGKのモスタファ・ショベイルが見事なセーブでメッシのシュートを阻止した。エジプトの守護神はその後も圧巻のプレーを続け、前半終了前にアレクシス・マク・アリスター、メッシ、フリアン・アルバレスのシュートを次々と止めてみせた。\n\nエジプトは後半開始早々にリードを2点に広げたかに見えたが、VARがモスタファ・ジコのゴールを直前のファウルとしてとり消した。\n\nしかし「ファラオ」軍団はまもなく追加点を奪い取った。モハメド・サラーがまたしても絶妙なパスをハッサンに送り、ハッサンが折り返したボールをジコが押し込んで2-0とし、エジプトサポーターを歓喜させた。\n\nアルゼンチンがようやく反撃の糸口をつかんだのは79分のこと。メッシの魅力的なクロスからクリスティアン・ロメロがヘッドを叩き込んだ。\n\n【関連記事】WAFU B U20選手権：アフメド・ムサがフライング・イーグルスに現金を贈呈し激励\n\n試合終了が近づく中、メッシが再び立ち上がった。力強いシュートをショベイルの守るゴールに突き刺してスコアを振り出しに戻し、またしてもアルゼンチンの奇跡的な逆転への期待を高めた。\n\nそしてアディショナルタイム終盤、ラウタロ・マルティネスが抜け出してクロスを送ると、エンソ・フェルナンデスがヘッドで劇的な決勝ゴールを決めた。\n\nアルゼンチンは準々決勝でスイスまたはコロンビアと対戦することになる。一方のエジプトは、ノックアウトステージ進出という同国史上最高のワールドカップ成績を残しながらも、大会を去ることとなった。", "vocab": [{"word": "comeback", "definition": "不利な状況から盛り返すこと。スポーツや競争の場面で「逆転」や「挽回」を意味する表現として頻繁に使われる。"}, {"word": "consecutive", "definition": "連続した、途切れなく続くことを意味する形容詞。「consecutive wins（連勝）」のように、記録や統計を述べる際によく用いられる。"}, {"word": "defending champions", "definition": "前回大会の優勝チームを指す表現で「ディフェンディングチャンピオン」とも言う。スポーツ報道で頻出する慣用句。"}, {"word": "VAR", "definition": "「ビデオ・アシスタント・レフェリー」の略語で、サッカーにおいてビデオ映像を用いて審判の判定を補助・検証するシステムのこと。"}, {"word": "inviting", "definition": "ここでは「魅力的な、絶好の」という意味の形容詞として使われており、「inviting cross（絶妙なクロス）」のようにスポーツ文脈で好機を示す際に使われる。"}, {"word": "knockout stage", "definition": "トーナメント方式の大会において、敗退すれば即座に脱落となるノックアウト方式の段階を指す。グループステージの後に行われる決勝トーナメントを意味する。"}, {"word": "stoppage time", "definition": "サッカーにおいて、試合中の中断によって失われた時間を補うために前後半終了後に追加される時間のこと。「アディショナルタイム」とも呼ばれる。"}]}, {"title_ja": "NDDCが汚職対策部門を強化し、ニジェールデルタの透明性向上へ", "title_en": "NDDC Bolsters Anti-Corruption Unit to Drive Transparency in Niger Delta", "summary_ja": "ニジェールデルタ開発委員会（NDDC）は、ポートハーコートの本部で汚職防止・透明性ユニット（ACTU）の新幹部を発足させた。サミュエル・オグブク長官は、汚職と戦う立場にある者が不正に染まれば全てが危機に陥ると警告し、最高水準の誠実さを維持するよう求めた。独立汚職犯罪委員会（ICPC）の支援のもと、同ユニットは説明責任の強化と倫理教育の推進を目指す。", "summary_en": "The Niger Delta Development Commission (NDDC) has inaugurated new executives for its Anti-Corruption and Transparency Unit (ACTU) at its Port Harcourt headquarters. Managing Director Samuel Ogbuku urged unit members to maintain unquestionable integrity, warning that compromised anti-corruption officers put everything at stake. The initiative, supported by the ICPC, aims to strengthen accountability, ethics education, and public confidence in the commission.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/893636-nddc-strengthens-anti-corruption-unit-to-enhance-transparency.html", "state_media": false, "category": "社会", "full_text": "The Niger Delta Development Commission (NDDC) has strengthened its Anti-Corruption and Transparency Unit (ACTU) as part of efforts to promote transparency, accountability, and good governance.\nThe NDDC Managing Director, Samuel Ogbuku, stated this while inaugurating the new executives of the unit at the commission’s headquarters in Port Harcourt on Tuesday.\nRepresented by the Executive Director, Finance and Administration, Boma Iyaye, Mr Ogbuku described the unit as a critical mechanism for promoting ethical conduct and preventing corruption. He said the unit would also help strengthen public confidence in the commission and improve service delivery across the Niger Delta region.\nThe managing director charged members of the anti-corruption unit to uphold the highest standards of integrity and professionalism in the discharge of their duties.\n“Corruption is a global challenge. As members of the Anti-Corruption and Transparency Unit, your integrity must remain unquestionable. If those entrusted with fighting corruption become compromised, everything is at stake. You must lead by example and uphold transparency and accountability,” he said.\nMr Ogbuku urged the NDDC’s Internal Audit Department to work closely with the unit to reinforce accountability across all departments and maintain the agency’s positive public image. He thanked the Independent Corrupt Practices and Other Related Offences Commission (ICPC) for its collaboration and support.\nAccording to him, the Anti-Corruption and Transparency Unit members were carefully selected based on their competence, credibility, and integrity. The NDDC chief reaffirmed the commitment of the commission’s board and management to President Bola Tinubu’s Renewed Hope Agenda. He said the commission remained focused on entrenching transparency, accountability, and effective service delivery in the region.\nThe Chairman of the ICPC, Musa Aliyu, described the initiative as a step towards strengthening integrity across institutions in the country. Represented by the Resident Anti-Corruption Commissioner for the Rivers and Bayelsa Zonal Office, Ekere Usiere, Mr Aliyu said the NDDC anti-corruption unit was established in 2001.\n“The unit serves as an internal mechanism for identifying and addressing systemic weaknesses that could encourage corruption in public institutions,” he said. He urged members of the committee to discharge their responsibilities with fairness, professionalism, and integrity. Mr Aliyu cautioned them against witch-hunting or abusing the confidence reposed in them by the commission and the public.\nREAD ALSO: Tinubu nominates new NDDC board member\nIn her acceptance remarks, the Chairwoman of the unit, Deinma Ebong, pledged to strengthen the link between the ideals of the ICPC and the commission’s daily operations. She said the unit would focus on strengthening systems rather than policing staff, while prioritising ethics education and continuous sensitisation.\n“The unit will promote open communication and collaboration with departments, directorates, units, and state offices to prevent corruption before it occurs,” she said. Mrs Ebong commended the NDDC management for the confidence reposed in the committee and appealed to staff members for cooperation in advancing the commission’s transparency and accountability agenda.\n(NAN)", "translation_ja": "ニジェールデルタ開発委員会（NDDC）は、透明性・説明責任・良好なガバナンスを推進する取り組みの一環として、汚職防止・透明性ユニット（ACTU）を強化した。\n\nNDDCのサミュエル・オグブク長官は、火曜日にポートハーコートの委員会本部で同ユニットの新幹部を発足させた際にこのように述べた。財務・行政担当専務理事のボマ・イヤイェが代理出席したオグブク長官は、同ユニットを倫理的行動を推進し汚職を防止するための重要なメカニズムと位置づけた。また、このユニットは委員会に対する国民の信頼を高め、ニジェールデルタ地域全体でのサービス提供を改善する助けになるとも述べた。\n\n長官は汚職防止ユニットのメンバーに対し、職務遂行において最高水準の誠実さとプロ意識を堅持するよう訓示した。\n\n「汚職は世界的な課題です。汚職防止・透明性ユニットのメンバーとして、あなた方の誠実さは疑いの余地があってはなりません。汚職と戦うことを委ねられた者が不正に染まれば、すべてが危機に陥ります。あなた方は模範を示し、透明性と説明責任を堅持しなければなりません」と述べた。\n\nオグブク長官はNDDCの内部監査部門に対し、ユニットと緊密に連携してすべての部門における説明責任を強化し、機関の良好な社会的イメージを維持するよう求めた。また、独立汚職犯罪・その他関連犯罪委員会（ICPC）の協力と支援に感謝の意を示した。\n\n長官によると、汚職防止・透明性ユニットのメンバーは、能力・信頼性・誠実さを基準に慎重に選抜されたという。NDDC長官は、大統領ボラ・ティヌブ氏の「再生の希望アジェンダ」に対する委員会の理事会と経営陣のコミットメントを改めて表明した。また、委員会は同地域における透明性・説明責任・効果的なサービス提供の確立に引き続き注力していると述べた。\n\nICPC議長のムサ・アリユ氏は、この取り組みを国内の諸機関における誠実さを強化するための一歩と評した。リバーズ州・バイェルサ州地域事務所担当常駐汚職対策委員のエケレ・ウシエレが代理出席したアリユ議長は、NDDCの汚職防止ユニットは2001年に設立されたと述べた。\n\n「このユニットは、公的機関における汚職を助長しうる組織的弱点を特定し対処するための内部メカニズムとして機能しています」と述べた。同議長はユニットメンバーに対し、公正さ・プロ意識・誠実さをもって職責を果たすよう求めた。また、委員会と国民から寄せられた信頼を悪用したり、特定の者を標的にした追及を行わないよう警告した。\n\n関連記事：ティヌブ大統領、NDDCの新理事候補を指名\n\n受諾挨拶において、ユニット委員長のデインマ・エボン氏は、ICPCの理念と委員会の日常業務との連携を強化することを誓約した。同ユニットは職員を監視するのではなく、システムの強化に重点を置き、倫理教育と継続的な啓発活動を優先すると述べた。\n\n「このユニットは、汚職が発生する前に防止するため、各部門・局・ユニット・州事務所との間でオープンなコミュニケーションと協力関係を促進します」と述べた。エボン委員長はNDDC経営陣が委員会に寄せた信頼を称え、委員会の透明性・説明責任アジェンダの推進において職員の協力を呼びかけた。\n\n（NAN）", "vocab": [{"word": "inaugurate", "definition": "（新しい組織・制度・建物などを）正式に発足・開設する、就任させるという意味の動詞。公式な式典を伴う場合に使われることが多い。"}, {"word": "accountability", "definition": "自らの行動や決定に対して責任を負い、それを説明・報告する義務のこと。ガバナンスや組織運営の文脈で頻繁に使用される重要な概念。"}, {"word": "systemic", "definition": "個々の問題ではなく、システムや組織の構造全体に関わる、あるいはそこから生じるという意味の形容詞。「systemic weaknesses（組織的弱点）」のように使われる。"}, {"word": "reaffirm", "definition": "すでに述べた立場や約束・信念を改めて確認・表明するという意味の動詞。公式声明やスピーチで強調のために用いられることが多い。"}, {"word": "witch-hunting", "definition": "証拠や正当な理由なく、特定の個人や集団を不当に追及・非難する行為を指す慣用表現。政治・組織的文脈で否定的な意味合いで使われる。"}, {"word": "entrench", "definition": "制度・慣行・価値観などをしっかりと定着・確立させるという意味の動詞。しばしば良い意味（改革の定着）でも悪い意味（悪習の固着）でも使われる。"}, {"word": "sensitisation", "definition": "特定の問題や課題について人々の意識を高め、理解を促す活動・プロセスを指す名詞。公衆衛生や倫理教育の文脈でよく用いられる（米英語ではsensitization）。"}]}, {"title_ja": "NATOの次なる局面、欧州はリードできるか", "title_en": "In NATO's Next Act, Can Europe Lead?", "summary_ja": "NATO首脳会議がトルコで開催され、同盟の新たな枠組み構築に向けた議論が行われる。トランプ大統領が米国の関与縮小を求める一方、欧州加盟国に対してより多くの負担を担うよう圧力をかけている。この会議は、欧州がNATOにおける主導的役割を果たせるかどうかを問う重要な転換点となっている。", "summary_en": "NATO leaders are gathering at a summit in Turkey to discuss a new model for the alliance. The meeting comes as President Trump pushes the United States to reduce its commitments while pressuring European member states to take on greater responsibility. The summit represents a pivotal moment for Europe to potentially step up as a leading force within NATO.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/07/world/europe/nato-trump-rutte-ankara-turkey.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラン最高指導者ハメネイ師の追悼式、聖地クムで大規模に挙行", "title_en": "Mass Mourning Held in Qom for Ayatollah Khamenei as Iran Marks Week of Funeral Rites", "summary_ja": "シーア派イスラム教徒にとって神聖な都市クムで、アリー・ハメネイ師の大規模な追悼式が執り行われた。この式典はイラン政府が主催する一週間にわたる国葬の一環として実施された。クムはハメネイ師がイランの聖職者界において絶大な権威を持っていたことから、重要な追悼の場となった。", "summary_en": "A major mourning ceremony for Ayatollah Ali Khamenei was held in Qom, a city considered sacred by Shiite Muslims. The event was part of a weeklong state funeral organized by the Iranian government. Qom served as a significant venue given Khamenei's dominant authority over Iran's clerical establishment.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/07/world/middleeast/iran-khamenei-qom-funeral.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ファラージ氏がリフォームUK党首を辞任、補欠選挙への出馬を表明", "title_en": "Farage Resigns as Reform UK Leader, Plans to Run in By-Election", "summary_ja": "英国の右派ポピュリスト政党「リフォームUK」の党首ナイジェル・ファラージ氏が、未申告の贈答品や寄付に関する一連の疑惑が浮上する中、党首職を辞任した。ファラージ氏は辞任を表明する一方で、近く行われる補欠選挙への出馬を明らかにした。今回の財務上の不正疑惑は、同氏が率いてきた政党に大きな打撃を与えている。", "summary_en": "Nigel Farage has resigned as leader of the populist right-wing party Reform UK amid mounting pressure over undisclosed gifts and donations. Despite stepping down from the leadership role, Farage announced his intention to run again in the upcoming special election. The revelations about financial impropriety have dealt a significant blow to the party he has led.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/07/07/world/nigel-farage-reform-uk", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "人質交渉の膠着打開でパレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を二分する軍事ゾーンを避難民が通過することを許可し、パレスチナ人が徒歩で北ガザへの帰還を開始した。この動きは、人質解放をめぐる交渉の膠着状態が打開されたことを受けたものである。今回の展開は、ガザ紛争における情勢の大きな変化を示している。", "summary_en": "Israel permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The move came after a deadlock over hostage releases was resolved. The development marks a significant shift in the ongoing conflict situation within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Real Estate Crisis Fears", "summary_ja": "中国の大手不動産デベロッパー、万科（Vanke）が巨額の損失を報告し、同国の不動産危機がさらに拡大していることが浮き彫りになった。この事態は、長期化する中国の不動産セクターの低迷がどこまで広がるかについて深刻な懸念を呼んでいる。中国政府が経営難に陥った万科を救済するために介入するかどうか、市場関係者は固唾をのんで見守っている。", "summary_en": "Leading Chinese property developer Vanke has reported a massive financial loss, signaling that the country's real estate crisis continues to widen. The troubles at Vanke raise serious questions about the depth and spread of China's prolonged property sector downturn. Observers are now watching closely to see whether the Chinese government will intervene to stabilize the struggling developer.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の砲弾破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "イスラエルの医療当局者によると、ガザから解放された人質の体内には、10月7日のハマス攻撃による砲弾の破片がいまだに残っていたことが明らかになった。一部の女性は長期間にわたり単独で拘束され、約8か月間を地下トンネルの中で過ごしたという。今回の所見は、人質たちが拘束中に置かれた過酷な身体的・精神的状況を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack, according to an Israeli medical official. Some of the women had been held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The findings highlight the severe physical and psychological conditions endured by the hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ氏への過剰な賛辞がNATOを救う代償となるか", "title_en": "Flattering Trump May Be the Price of Saving NATO", "summary_ja": "NATO事務総長マーク・ルッテは、米国の同盟へのコミットメントを維持するため、ドナルド・トランプ氏に対して過度ともいえる賛辞を贈る戦略を取っている。その姿勢は鼻につくと感じる向きもあるが、エコノミスト誌はこれが重要な戦略的目的に沿ったものだと主張する。トランプ氏の懐疑論を前にNATOの結束を守るためなら、外交的な気まずさも正当化されるという論旨だ。", "summary_en": "NATO Secretary General Mark Rutte has adopted a strategy of effusive flattery toward Donald Trump in order to keep the United States committed to the alliance. While his approach may seem grating or undignified, The Economist argues it serves a genuinely important strategic purpose. Preserving NATO's cohesion in the face of Trump's skepticism justifies the diplomatic awkwardness.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/07/06/if-ludicrous-trump-flattery-can-save-nato-bring-it-on", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国の関与縮小を受け、NATOは東欧防衛を再考", "title_en": "NATO Rethinks Eastern Europe Defense as U.S. Reduces Commitment", "summary_ja": "米国が同盟への軍事関与を縮小する兆しを見せる中、NATO加盟国は東欧防衛の在り方を見直している。ドイツはかつて第二次世界大戦で蹂躙した地域に戦車を派遣するなど、より積極的な役割を担いつつある。この変化は、欧州諸国が大陸防衛の負担を自ら引き受けようとする動きを反映している。", "summary_en": "NATO allies are reassessing how to defend Eastern Europe amid signs that the United States is scaling back its military engagement with the alliance. Germany is playing a more prominent role, deploying tanks to a region its forces once devastated during World War II. The shift reflects growing European efforts to shoulder more of the continent's defense burden.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/07/02/nato-ponders-how-to-defend-eastern-europe-as-america-pulls-back", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "同盟国が米国を手玉に取る方法を学ぶ", "title_en": "Allies Learn How to Bully America Over Trade", "summary_ja": "トランプ政権の攻撃的な通商政策に対し、一部の米同盟国が独自の交渉力を活用して対抗しようとしている。世界の半導体製造を支配する台湾は、米国の圧力に抵抗する上で特に有利な立場にある可能性がある。焦点は、半導体産業における優位性が実質的な地政学的交渉力に転換できるかどうかだ。", "summary_en": "As Donald Trump pursues aggressive trade policies, some US allies are discovering leverage of their own to push back. Taiwan, with its dominant position in global semiconductor manufacturing, may be uniquely positioned to resist American pressure. The question is whether chipmaking prowess can translate into genuine geopolitical bargaining power.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/30/allies-learn-how-to-bully-america", "state_media": false, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ルペン氏、禁固短縮受け2027年大統領選出馬を表明し再上訴へ", "title_en": "Marine Le Pen Vows Presidential Run After Appeals Court Shortens Office Ban", "summary_ja": "フランスの控訴裁判所は火曜日、極右指導者マリーヌ・ルペン氏の横領罪を支持しつつも、公職就任禁止期間を短縮し、2027年の大統領選への出馬を可能とする判決を下した。ルペン氏は大統領選に出馬する意向を表明するとともに、判決を不服として再度上訴する姿勢を示した。この裁判はフランス政界で最も影響力のある人物の一人を政治の舞台から遠ざける可能性があっただけに、今回の判決は重大な局面を迎えたと言える。", "summary_en": "A French appeals court upheld Marine Le Pen's embezzlement conviction on Tuesday but reduced her ban from holding elected office, clearing the way for her to run in the 2027 presidential election. The far-right leader announced she intends to seek the presidency and will appeal the conviction once more. The ruling marks a significant development in a case that had threatened to sideline one of France's most prominent political figures.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/france/live/2026/07/07/marine-le-pen-says-she-will-run-for-president-and-appeal-conviction-again_6755231_7.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "マクロン大統領のダマスカス訪問中に爆発、滞在ホテル付近で発生", "title_en": "Explosions Near Macron's Hotel During Damascus Visit", "summary_ja": "フランスのエマニュエル・マクロン大統領がダマスカスの大統領宮殿でシリアのアフマド・アル=シャラア大統領と会談中、大統領が宿泊するホテル付近で爆発が発生した。この訪問は、ポスト・アサド政権に対する西側首脳による重要な外交的接触として注目されている。爆発による死傷者や原因の詳細は、現時点では明らかになっていない。", "summary_en": "French President Emmanuel Macron was meeting Syrian President Ahmad al-Sharaa at the presidential palace in Damascus when explosions occurred near his hotel. The blasts rattled the Syrian capital during what marks a significant diplomatic visit by a Western leader to the post-Assad government. Details on casualties or the cause of the explosions were not immediately available.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/syria/article/2026/07/07/explosions-rock-damascus-during-french-president-macron-s-visit_6755225_229.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ピレネー山脈で50年ぶり最大規模の山火事、住民避難し依然鎮火せず", "title_en": "Pyrénées Wildfires Force Evacuations as Largest Fire in 50 Years Rages Uncontrolled", "summary_ja": "フランスのピレネー地方トレビヤック付近で発生した山火事は、この地域で50年ぶりの最大規模とされ、月曜夜の時点でも依然として制御不能の状態が続いている。イル＝シュル＝テットの住民たちは避難を余儀なくされ、「生きて逃げられるとは思わなかった」と語る生存者もおり、深刻な衝撃を受けている。火災は広範囲にわたって甚大な被害をもたらしている。", "summary_en": "A massive wildfire near Trévillach in the French Pyrénées, described as the largest the region has seen in 50 years, remained out of control as of Monday evening. Residents of the evacuated town of Ille-sur-Têt are in shock, with some survivors recounting harrowing near-death experiences. The fires have devastated the surrounding landscape, leaving widespread destruction in their wake.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/article/2026/07/07/pyrenees-wildfires-destroy-everything-in-their-path-i-didn-t-think-i-d-make-it-out-alive_6755229_114.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国防省ニュースレター更新", "title_en": "Mindef Newsletter Update", "summary_ja": "シンガポール国防省（Mindef）は2026年7月7日火曜日にニュースレターを配信した。この通知はストレーツ・タイムズのメールニュースレタープラットフォームを通じて送信された。購読者は提供されたリンクからニュースレターの配信設定を管理することができる。", "summary_en": "The Singapore Ministry of Defence (Mindef) issued a newsletter update on Tuesday, July 7, 2026. The communication was distributed via The Straits Times email newsletter platform. Subscribers are able to manage their newsletter preferences through the provided subscription management link.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ・ニュースレター", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "シンガポールの主要紙ストレーツ・タイムズが、イブニング・アップデートのニュースレターを配信した。このメールは読者への日次ブリーフィングとして送付される定期配信物である。読者はウェブサイトを通じて購読管理や追加の無料ニュースレターへの登録が可能となっている。", "summary_en": "The Straits Times published its Evening Update newsletter edition. The content appears to be a standard daily briefing distributed to subscribers via email. Readers can manage their subscription or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モーニングブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニングブリーフィングは、読者にその日の主要ニュースをまとめて届ける毎日配信のニュースレターです。今回の号はストレーツ・タイムズのデジタルプラットフォームを通じて配信されました。読者は提供されたリンクからニュースレターの購読管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a daily newsletter digest delivering top news highlights to subscribers. The edition referenced carries a publication timestamp from The Straits Times digital platform. Readers can manage their newsletter subscriptions or sign up for additional free newsletters via the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ氏、トルコへのF-35売却を「検討中」と表明　エルドアン大統領は「5機を約束された」と主張", "title_en": "Trump Says U.S. 'Considering' F-35 Sale to Turkey; Erdogan Claims 5 Jets Promised", "summary_ja": "トランプ大統領は、長年凍結されていたトルコへのF-35戦闘機売却を米国が検討していると明らかにした。これに対しエルドアン大統領は、すでに5機の供与が約束されたと踏み込んだ発言をした。トルコは2019年にロシア製防空システム「S-400」を購入したことを理由に、F-35共同開発計画から除外されていた。", "summary_en": "President Trump indicated the United States is considering selling F-35 fighter jets to Turkey, reviving a long-stalled deal. Turkish President Erdogan went further, claiming that five F-35s had already been promised to Ankara. Turkey was originally removed from the F-35 program in 2019 after purchasing Russia's S-400 missile defense system.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi-AFBVV95cUxQc29ORWlrck56RXQ4ckxsQUxmZHQwU1BrbENOUVNnWGFFaVR4OWxudnQtZHotdHpJMW42c2oycDFzMDlTSjZWalNqMG9wS2pNTVlkV204N19VQkt2VVNGLTNGYnllNHhGSFQyRzBVVTRtUlpodDNBXzdjTnpwTTRQTmNkRHM4NFFFTnhvbXVsekhOLWQ3bkIzYUlxTTlpdURlR1VkREFmWWNjSHI1WTBhSDJmTmxZM0lNUkZjY21LLXFVaTh4U0NXUUJnNmF6VHMwdDFsSEkzcERScER4Smttb3ZSNzZLWEhrdkM4Z2tZRkNYbURoRkF4dw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "論説：米イスラエル「特別な関係」は終焉、イスラエルは準備不足", "title_en": "Opinion: The US-Israel 'Special Relationship' Is Over, and Israel Is Unprepared", "summary_ja": "ハアレツ紙の論説は、米国とイスラエルの間で長年続いてきた「特別な関係」が事実上終わりを迎えたと主張している。筆者はイスラエルの政治指導部がこの根本的な変化を認識できておらず、対応策も講じていないと警告する。この伝統的な同盟の枠組みを失うことで、イスラエルは対処する準備が整っていない重大な戦略的・外交的課題に直面することになる。", "summary_en": "A Haaretz opinion piece argues that the long-standing 'special relationship' between the United States and Israel has effectively come to an end. The author warns that Israel's political leadership has failed to recognize or adapt to this fundamental shift in American foreign policy attitudes. Without this traditional alliance framework, Israel faces significant strategic and diplomatic challenges it is not yet equipped to handle.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiiwJBVV95cUxPd3ZjUVJQYm96YWlNZWxBMWs0MVZUQXN3RXJyVjJXeWdjRmRBNm5YRkYzT1hMX2xTRkRHNk9ZUWpwVTIyZUk5S1ZuTE8wNWc3OHg3VEx4WWJ4bDY3Vk9ITFJsN1dLVDFnV1pZSmFNbWktZERKT3d0WVJEcW1yZVpyeFFqWGVaeFFhc2FNWWdjbWwxRUwwYi1pOWhOQlVlXzdQX1JSakpwVE55TWFOZmJKNGgyZEVfMXg0VmpwQW1nVzJpODBMQzVFLW5MOUI3MllscVI5YlR4Vzl6TmFWNVlUaFlYa2pIc2RYMk1LX3pXWHNVLUIwSGx2MlhMa1cxLXRQeW5oSENmYkJUSlk?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ラーム・エマニュエル、ネタニヤフ首相がイスラエルを「行き詰まり」に導いたと非難へ", "title_en": "Rahm Emanuel to Rebuke Netanyahu for Leading Israel to 'Dead End'", "summary_ja": "元駐日米国大使のラーム・エマニュエル氏が、イスラエルのネタニヤフ首相を政治的・戦略的な行き詰まりに導いたとして批判する演説を行う予定であることが明らかになった。この批判は、ネタニヤフ政権の対応に対する米国内の著名人の間での不満の高まりを示している。エマニュエル氏の発言は、イスラエル政府に対する国際的な圧力をさらに強めるものとなると見られている。", "summary_en": "Former U.S. Ambassador Rahm Emanuel is preparing a speech criticizing Israeli Prime Minister Benjamin Netanyahu for leading Israel into a political and strategic dead end. The rebuke signals growing frustration among prominent American figures with Netanyahu's handling of the conflict and governance. Emanuel's remarks are expected to add to international pressure on the Israeli government to reconsider its current course.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMigAJBVV95cUxPSDZEZEttM0ZqbWFQcC00M3pFVmRuM0hoSlg1RmJYeFR5Yk9DZ3YwaS0wTHNTc3NFZ0ZoUHEtU1Qtcml6MzcyVGx4QXdFTWtYcUdJOTg4eVhZNFlVOUxqYWFmR0NFMTZrREVVV24xS1pRTXRMTVlNd1cwSzF0VUkwcXhfOGdXRzM3YmVsd2Rqd0tBeFV3dnN3Z1Q2TWg5MWoxRkhGS0tpOGtfZmpPczh2MGVjNngtNmxOaFpPdm1xaElpakl3aTlzenFsNjBoT2hnWWlHWHZ6LU4zdVF3WWdwUWg2T1NiUDd6WWNrUGtjMUxyYkRxbGRHQnRsMGZMemZR?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台湾NIA、夏の渡航者に豚肉持ち込み禁止を警告", "title_en": "Taiwan NIA Warns Summer Travelers Not to Bring Pork Products Into the Country", "summary_ja": "台湾の内政部移民署（NIA）は、夏の渡航シーズンを前に、海外から豚肉や豚肉製品を台湾に持ち込まないよう旅行者に警告を発した。国際的な往来が増加する夏季において、アフリカ豚熱などの動物疾病の侵入リスクが高まっていることが背景にある。禁止された肉製品を携帯しているとみなされた旅行者は、動物疾病防止に関する規定に基づき罰金が科される可能性がある。", "summary_en": "Taiwan's National Immigration Agency (NIA) has issued a warning to summer travelers against bringing pork or pork products into Taiwan. The alert comes as the summer travel season increases the flow of international visitors, raising concerns about the potential spread of animal diseases such as African swine fever. Travelers found carrying prohibited meat products may face fines under Taiwan's animal disease prevention regulations.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE9zZUc1eXp0a1Q2azJZcWcycURtOW41S3BpcHlyaW1Jek11a3ZtZFMwWmxwU3VscmxfLWJBSjBfeW0waWsxQS1rT1VWUzYxWHBvOVJkeVRn?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "香港民主活動家の林栄基氏、台北で70歳で死去", "title_en": "Hong Kong Dissident Lam Wing-kee Dies at 70 in Taipei", "summary_ja": "香港の民主活動家、林栄基氏が台北で70歳の生涯を閉じた。林氏は中国指導部を批判する政治的に敏感な書籍を販売する書店主として知られ、2015年に銅鑼湾書店関係者5人が相次いで失踪した事件の当事者の一人だった。その後、香港の政治的締め付けが強まる中、台湾に渡り活動を続けていた。", "summary_en": "Hong Kong dissident Lam Wing-kee has died at the age of 70 in Taipei, Taiwan. Lam was a prominent bookseller known for selling politically sensitive titles critical of Chinese leadership and was one of five people associated with Causeway Bay Books who disappeared in 2015. He had been living in Taiwan after fleeing Hong Kong amid the city's tightening political climate.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE91ekNvRWVlNElqaHE1ckdsT0VZS2JLNDd3TGYzUHZfZURiV2ltOXBTQWxsSklTNlpNQzJURkM0TGM3SkRFOEZhRl9TX3R0cm5Id3oxRTBlcw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台湾・陸委会、日本人コメンテーターへの攻撃に中国が関与か示唆", "title_en": "Taiwan's MAC Suggests China Behind Attack on Japanese Commentator", "summary_ja": "台湾の大陸委員会（陸委会）は、日本人コメンテーターを標的にした攻撃に中国が関与している可能性を示唆した。この声明は、事件が両岸および国際的な側面を持つ可能性を示している。北京が海外の批判者を脅迫・沈黙させようとしているとの懸念が改めて注目を集めている。", "summary_en": "Taiwan's Mainland Affairs Council (MAC) has suggested that China may be involved in an attack targeting a Japanese commentator. The council's statement implies potential cross-strait and international dimensions to the incident. The case has drawn attention to concerns about Beijing's alleged efforts to intimidate or silence critics abroad.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5pYWhmbXk3SnR0TUZZZ1otcENaNWp6UG1uTGhQRmROR1RDY0R4UXFWbmhOOGFUZG55OWo0Q05QRVB3dTV1M1prT3V3UWVZZGdic3BKR0Jwcw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国、地震救援のためベネズエラに緊急支援物資80トンを送付", "title_en": "China Sends 80 Tonnes of Emergency Aid to Venezuela for Earthquake Relief", "summary_ja": "CGTNによると、中国政府がベネズエラの地震救援を目的として提供した緊急支援物資の第一陣が首都カラカスに到着したと伝えている。CGTNは、今回の輸送量が80トンに上ると報じている。中国国営メディアは、この支援をベネズエラの災害復旧に向けた中国の人道的援助として位置づけている。", "summary_en": "CGTN reports that the first batch of emergency aid supplies provided by the Chinese government to Venezuela has arrived in Caracas. CGTN reports that the shipment totals 80 tonnes and is intended to support earthquake relief efforts in the country. The delivery represents what Chinese state media describes as China's humanitarian assistance to Venezuela in the wake of the disaster.", "source": "CGTN", "tier": "state", "link": "https://newsus.cgtn.com/news/2026-07-07/80-tones-of-aid-sent-by-China-lands-in-Venezuela-1OzEzn8FBGE/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震の死者数が2,954人に増加、負傷者は16,592人", "title_en": "Venezuela Earthquake Death Toll Rises to 2,954 With Over 16,000 Injured", "summary_ja": "中国国営メディアのCGTNは、先週ベネズエラを襲った2度の地震による死者数が2,954人に増加したと伝えている。同メディアによると、ベネズエラ国民議会のホルヘ・ロドリゲス議長が土曜日に発表した情報として、負傷者は16,592人に上るとしている。", "summary_en": "CGTN, a state-controlled outlet, reports that the death toll from two earthquakes that struck Venezuela last week has climbed to 2,954. The network further reports that 16,592 people were injured, citing Venezuelan National Assembly President Jorge Rodriguez as the source of the figures announced on Saturday.", "source": "CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-05/Venezuela-quake-death-toll-rises-to-2-954-with-16-592-injured-1Owwif16ceI/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラン最高指導者ハメネイ師の2日間の告別式がテヘランで開催", "title_en": "Two-Day Farewell Ceremony for Iran's Late Supreme Leader Khamenei Held in Tehran", "summary_ja": "CGTNによると、イランの故最高指導者アリー・ハメネイ師の2日間にわたる告別式が土曜日の朝、テヘランのイマーム・ホメイニー・モサッラ礼拝堂で始まったと伝えている。CGTNは、全国各地から大勢の市民が集まり、故指導者との最後の別れを告げたと報じている。", "summary_en": "CGTN reports that a two-day farewell ceremony for Iran's late Supreme Leader Ali Khamenei began at Imam Khomeini's Mosalla prayer hall in Tehran on Saturday. CGTN reports that the event drew large crowds from across the country to pay their final respects to the deceased leader.", "source": "CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-05/2-day-farewell-ceremony-for-Iran-s-late-supreme-leader-held-in-Tehran-1OwxVEbkykg/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "IEA：ロシアのEUへのパイプラインガス供給、2026年上半期に5%増", "title_en": "Russian Pipeline Gas Supplies to EU Rise 5% in First Half of 2026, IEA Says", "summary_ja": "ロシア国営メディアのTASS・RTによると、国際エネルギー機関（IEA）は2026年上半期におけるロシアからEUへのパイプラインガス供給が5%増加したと報告している。同メディアは、IEAの推計としてロシア産パイプラインガスがヨーロッパのガス需要全体に占める割合が約8%に達したと伝えている。ロシア国営メディアはこの数字を、制裁や脱ロシアエネルギーの取り組みにもかかわらずロシアのエネルギー供給が部分的に回復していることを示すものとして報じている。", "summary_en": "TASS/RT reports that Russian pipeline gas supplies to the European Union increased by 5% in the first half of 2026, according to the International Energy Agency. State-controlled Russian media reports that the IEA estimates Russia's share of piped gas in Europe's overall gas demand stood at approximately 8% during this period. The figures, as framed by Russian state outlets, suggest a partial recovery in Russian energy flows to Europe despite ongoing sanctions and diversification efforts.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2157133", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "クレムリン、欧州にロシアとの緊張緩和に向けた4つの提言を提示", "title_en": "Kremlin Offers Europe Four Steps to Avoid Escalation, Denies Being a Threat", "summary_ja": "ロシア国営メディアTASS・RTによると、クレムリン報道官ドミトリー・ペスコフ氏は欧州に対し、ロシアとの緊張を緩和するための4つの提言を示したと伝えている。同報道官は、ロシアは欧州にとっての脅威ではないと強調したとされるが、これは国営メディアを通じた一方的な主張である。提言の詳細について独立した検証はなされていない。", "summary_en": "TASS/RT reports that Kremlin spokesman Dmitry Peskov outlined four recommendations for Europe to reduce tensions with Russia. State media reports that Peskov emphasized Russia does not consider itself a source of danger for Europe, framing the initiative as a goodwill gesture. The Kremlin's state-controlled outlet presents these tips without independent verification of the underlying claims.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2157127", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "クレムリン：トランプ氏の対話姿勢を歓迎、ただし全面的な同意はせず", "title_en": "Kremlin: Russia Welcomes Trump's Dialogue Push but Doesn't Agree on Everything", "summary_ja": "タス通信およびRTの報道によると、クレムリンのドミトリー・ペスコフ報道官は、ロシアがトランプ前大統領の対話への意欲を歓迎する一方、すべての問題で立場が一致しているわけではないと述べたとされる。国営メディアはペスコフ氏がトランプ氏をヨーロッパの政治家と明確に異なる存在と位置づけたと伝えている。クレムリンのこの発言は、トランプ政権下での米露関係改善に向けた慎重な楽観論を示すものとして報じられている。", "summary_en": "TASS/RT reports that Kremlin spokesperson Dmitry Peskov stated Russia welcomes Donald Trump's expressed desire for dialogue, even as Moscow does not share his positions on all issues. State media reports that Peskov characterized Trump as markedly different from European politicians in his approach. The Kremlin's remarks signal cautious optimism about potential US-Russia engagement under the Trump administration, according to the outlet.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2157125", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "欧州テック主権に欠けている要素", "title_en": "The Missing Ingredient for European Tech Sovereignty", "summary_ja": "筆者は、EUが新たに発表した「テック主権パッケージ」は前向きな一歩ではあるものの、真のデジタル自律性を達成するには不十分だと主張する。同パッケージはAIや半導体、クラウドインフラ、オープンソースソフトウェアへの投資を盛り込んでいるが、ビッグテックがEUのデジタル経済を支配する根本原因への対処が欠けている。市場集中を抑制する野心的な取り組みなしには、この政策は戦略目標を達成できないと警告している。", "summary_en": "The author argues that the EU's newly unveiled Tech Sovereignty Package, while a positive step, is insufficient on its own to achieve true digital autonomy. The package invests in AI, semiconductors, cloud infrastructure, and open-source software, but fails to adequately address the root causes of Big Tech's dominance over Europe's digital economy. Without ambitious measures to curb market concentration, the initiative is unlikely to fulfill its strategic goals.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/eu-tech-sovereignty-package-must-be-accompanied-by-robust-antitrust-enforcement-by-giorgos-verdi-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Missing Ingredient for European Tech Sovereignty\nEurope’s dependence on US technology companies is both an economic challenge and a strategic vulnerability. The European Union’s new Tech Sovereignty Package is a step in the right direction, but without equally ambitious efforts to curb market concentration, it is bound to fall short.\nBRUSSELS—In early June, the European Commission unveiled its Tech Sovereignty Package, a new policy agenda designed to strengthen Europe’s strategic autonomy through investments in AI, domestic semiconductor manufacturing, cloud infrastructure, and open-source software. While ambitious, the package is not enough. To ensure that AI and digital technologies advance the European Union’s economic and security interests requires confronting the root causes of Big Tech’s dominance over Europe’s digital economy.", "translation_ja": "欧州テック主権に欠けている要素\n\nEUの米国テクノロジー企業への依存は、経済的な課題であると同時に戦略的な脆弱性でもある。EUの新しい「テック主権パッケージ」は正しい方向への一歩ではあるが、市場集中を抑制するための同様に野心的な取り組みを伴わなければ、その効果は限定的なものにとどまるだろう。\n\nブリュッセル発――6月初旬、欧州委員会はAI、国内半導体製造、クラウドインフラ、オープンソースソフトウェアへの投資を通じて欧州の戦略的自律性を強化することを目的とした新たな政策アジェンダ「テック主権パッケージ」を発表した。野心的な内容ではあるものの、それだけでは十分ではない。AIおよびデジタル技術がEUの経済的・安全保障上の利益に資するものとするためには、ビッグテックが欧州のデジタル経済を支配するに至った根本原因に正面から向き合う必要がある。", "vocab": [{"word": "sovereignty", "definition": "主権・自主独立性を意味し、特に国家や地域が外部の影響を受けずに自らの意思決定を行う能力を指す。政治・技術分野で頻繁に使われる上級語彙。"}, {"word": "strategic autonomy", "definition": "「戦略的自律性」を意味する表現で、外部勢力に依存せず独自の判断で行動できる能力を指す。EUの政策議論で特に多用される専門的イディオム。"}, {"word": "market concentration", "definition": "「市場集中」を意味する経済・競争政策の専門用語で、少数の企業が市場シェアの大部分を占めている状態を指す。"}, {"word": "semiconductor", "definition": "「半導体」を意味する技術用語で、電子機器やコンピューターチップの製造に不可欠な素材・部品を指す。現代のテクノロジー政策議論において重要なキーワード。"}, {"word": "dominance", "definition": "「支配・優位性」を意味し、ある企業や勢力が市場や分野において圧倒的な影響力を持つ状態を表す。競争法や地政学的文脈でよく使われる上級語彙。"}, {"word": "vulnerability", "definition": "「脆弱性・弱点」を意味し、攻撃や影響を受けやすい状態を指す。安全保障やサイバーセキュリティの文脈で頻繁に使われるTOEIC高得点レベルの語彙。"}]}, {"title_ja": "ワールドカップの「小さな挑戦者たち」を称えて", "title_en": "In Praise of the World Cup's Little Guys", "summary_ja": "筆者は、ワールドカップにおいて格下とされた小国が繰り返し下馬評を覆してきたと主張し、規模や力が常に結果を左右するという思い込みに異を唱えている。カーボベルデのシドニー・ロペス・カブラルがアルゼンチン戦で延長終了間際に驚異的なゴールを決めた例を挙げ、弱者の精神を称賛する。筆者はサッカーを比喩として用い、大国や巨大組織が必然的に支配するという考え方に反論している。", "summary_en": "The author argues that smaller, less-favored nations at the World Cup have repeatedly defied expectations, challenging the assumption that size and power always determine outcomes. Using the example of Cape Verde's Sidny Lopes Cabral scoring a stunning late goal against Argentina, the piece celebrates the underdog spirit. The author uses football as a metaphor to push back against the notion that great powers and large entities inevitably dominate.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/small-countries-success-at-world-cup-mirrors-economic-pattern-by-andres-velasco-2026-07", "state_media": false, "category": "オピニオン", "full_text": "In Praise of the World Cup’s Little Guys\n                        In a world of great-power rivalry and hyper-scaling tech behemoths, you would be forgiven for thinking that the bulky bully always has the edge. But as this year's World Cup has shown repeatedly, you would be wrong.\n                    \n                        LONDON — The inevitable was about to happen: Argentina would dispatch Cape Verde. But then, deep into extra time, wonder struck: Sidny Lopes Cabral, aged 23 but looking 17, took a pass on the left flank and, instead of lobbing the ball in search of a header, shifted direction (sending the defender skidding the wrong way) and let fly a curling wonder of a shot that ended in the farthest and most unreachable corner of the Argentine goal.\n        https://prosyn.org/dVjJboO", "translation_ja": "ワールドカップの「小さな挑戦者たち」を称えて\n\n大国間の覇権争いや超大型テック企業が幅を利かせる世界では、力のある大きな存在が常に有利だと思いたくなるのも無理はない。しかし今年のワールドカップが繰り返し示してきたように、それは間違いである。\n\nロンドン発 — 避けられない結末が近づいていた。アルゼンチンがカーボベルデを下すのは時間の問題だと思われていた。ところが、延長戦も終盤に差し掛かったとき、奇跡が起きた。23歳ながら17歳にも見えるシドニー・ロペス・カブラルが左サイドでパスを受けると、ヘディングを狙ってボールを放り込む代わりに、向きを変え（ディフェンダーを逆方向に滑らせながら）、カーブのかかった渾身のシュートを放った。ボールはアルゼンチンのゴールの最も遠く、最も届かないコーナーへと突き刺さった。", "vocab": [{"word": "dispatch", "definition": "（試合などで）相手を打ち負かす、素早く片付けるという意味。ここでは「アルゼンチンがカーボベルデを難なく倒す」というニュアンスで使われている。"}, {"word": "hyper-scaling", "definition": "急速かつ大規模に拡大・成長することを指す複合形容詞。主にテクノロジー企業の爆発的な規模拡大を表す際に使われる専門的表現。"}, {"word": "behemoth", "definition": "旧約聖書に登場する巨大な怪物に由来し、比喩的に「巨大で圧倒的な力を持つ組織や企業」を指す。"}, {"word": "great-power rivalry", "definition": "大国間の覇権をめぐる競争や対立を指す政治・外交上の慣用表現。国際関係論でよく使われる。"}, {"word": "curling", "definition": "ここではサッカーのシュートがカーブを描いて曲がりながら飛ぶ様子を表す形容詞として使われている。スポーツ文脈で頻出する表現。"}, {"word": "underdog", "definition": "競争や試合において不利な立場にある人物やチームを指すイディオム。「弱者」「下馬評で負けると思われている側」を意味する。"}]}, {"title_ja": "ウクライナの革新的ドローン産業の内側", "title_en": "Inside Ukraine's Game-Changing Drone Industry", "summary_ja": "ウクライナは2014年当時の限定的な偵察用途から、ロシア領土深部を攻撃できる世界最先端の軍事ドローン産業へと急速に発展させた。筆者は、ドローンがはるかに大きな侵略者に対する防衛において不可欠な役割を果たしてきた一方で、それだけで戦争を終結させることはできないと主張する。それでもウクライナの開発・調達プロセスはNATO諸国に重要な教訓をもたらす可能性がある。", "summary_en": "Ukraine has transformed its drone industry from limited reconnaissance use in 2014 into a world-leading military technology capable of striking deep inside Russian territory. The author argues that while drones have been critical to Ukraine's defense against a much larger aggressor, they alone will not be sufficient to end the war. Ukraine's development and procurement processes may nonetheless offer valuable lessons for NATO allies discussing rearmament.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/how-ukraine-developed-world-leading-drone-technology-by-yuriy-gorodnichenko-et-al-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Inside Ukraine’s Game-Changing Drone Industry\n, , andIn recent months, Ukrainian drones have successfully struck dozens of sites deep inside Russia, targeting the oil industry, weapons plants, and logistics hubs. But while Ukraine has developed a world-leading military technology to defend itself from a much larger aggressor, drones will not be enough to end the war.\nBERKELEY/KYIV—If necessity is the mother of innovation, Ukraine’s military technology industry, particularly drone production, is Exhibit A. When Russia first attacked Ukraine in 2014, drones were used mostly for reconnaissance. Ukrainian firms developed many models, but production was limited and mainly geared to the civilian sector. Today, Ukrainian drones are central to the country’s ability to hold off a much larger aggressor, and Ukraine’s development and procurement processes may hold lessons for NATO’s leaders as they discuss rearmament at their Ankara summit this week.", "translation_ja": "ウクライナの革新的ドローン産業の内側\n\nここ数カ月で、ウクライナのドローンはロシア領土深部の数十カ所の施設への攻撃に成功しており、石油産業、兵器工場、物流拠点などを標的にしている。しかしウクライナは、はるかに大きな侵略者から自国を守るために世界最先端の軍事技術を開発したものの、ドローンだけでは戦争を終わらせるには十分ではないだろう。\n\nバークレー／キーウ発――「必要は発明の母」というならば、ウクライナの軍事技術産業、とりわけドローン生産はその最たる事例である。2014年にロシアが最初にウクライナを攻撃した当時、ドローンは主に偵察目的で使用されていた。ウクライナの企業は多くのモデルを開発したが、生産規模は限られており、主に民間部門向けであった。今日、ウクライナのドローンは、はるかに大きな侵略者を食い止めるための同国の能力の中核を担っており、ウクライナの開発・調達プロセスは、今週アンカラで開催されるNATOサミットで再軍備について議論するNATO首脳陣にとって重要な教訓を示す可能性がある。", "vocab": [{"word": "reconnaissance", "definition": "軍事的な偵察・情報収集活動のこと。戦場において敵の動向や地形を把握するために行われる調査活動を指し、軍事・安全保障の文脈で頻繁に使われる専門用語。"}, {"word": "aggressor", "definition": "先に攻撃を仕掛けた国家や勢力を指す語。国際政治や安全保障の文脈で用いられ、侵略行為を行った側を明確に示すニュアンスを持つ。"}, {"word": "procurement", "definition": "物資や装備を組織的・計画的に調達するプロセスを指す。特に軍事・政府・企業の文脈で、物品やサービスの購入・取得活動全般を意味するビジネス・行政用語。"}, {"word": "rearmament", "definition": "国家や軍事同盟が軍備を再び増強・整備すること。一度縮小した軍事力を再建する意味合いが強く、地政学・国際関係の議論でよく使われる語。"}, {"word": "logistics", "definition": "物資の輸送・補給・管理など、軍事または企業活動を支える後方支援の体制全般を指す。軍事用語として発展したが、現在はビジネス分野でも広く使われる。"}, {"word": "game-changing", "definition": "状況や競争の構図を根本的に変えてしまうほどの革新的な影響力を持つことを表す慣用表現。技術・戦略・製品などが従来の常識を覆す場合に用いられる。"}]}, {"title_ja": "米国はアメリカサッカー史上最大のチャンスを無駄にした", "title_en": "The US Wasted the Biggest Opportunity in American Soccer History", "summary_ja": "コラムニストのアレクサンダー・アブノスは、米国男子代表が2026年ワールドカップでベルギーに4-1で敗れ、アメリカにおけるサッカーの普及拡大という一世一代のチャンスを台無しにしたと主張する。ホーム開催で数千万人もの新規視聴者が注目する中、チームの低調なパフォーマンスは悪印象を残した。アブノスは、これがアメリカサッカー史上最大の成長機会であったと断言し、それが無駄にされたと批判している。", "summary_en": "Opinion writer Alexander Abnos argues that the US men's national team squandered a once-in-a-generation chance to grow soccer's mainstream appeal in America by losing 4-1 to Belgium at the 2026 World Cup. With tens of millions of new viewers tuning in for a home tournament, the team's poor performance — marked by disorganization, defensive failures, and tactical inferiority — left a damaging first impression. Abnos contends this was the single greatest growth opportunity in American soccer history, and it was wasted.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/football/2026/jul/07/usmnt-world-cup-belgium", "state_media": false, "category": "オピニオン", "full_text": "In the closing moments of the USA’s 3-2 win against Portugal at the 2002 World Cup, the ESPN commentator Jack Edwards took a moment to remind viewers who had stayed up all night of the profound result they were witnessing. From his perch in Suwon, South Korea – where he was watching the first match of a campaign that would end in a quarter-final that remains the high‑water mark for the modern US men’s national team – Edwards delivered a soliloquy that cut straight to the heart of the profound role World Cups play not just for the USA men’s team but for soccer as a force in American life.\n“The players on that 1950 team that beat England … this [result] is about the foundation that they laid,” Edwards said in his booming bravado as the hour crept toward 7am ET. “This is about the thousands of American families who have helped this sport grow, and the people in those pockets all over the country who have stuck with soccer. And it’s also for those seven- or eight- or nine‑year-old kids, who are going to hear about this result when they wake up in the morning and rush outside, and knock a ball against a wall, and dream of something even greater than this.”\nI found myself thinking of Edwards’s monologue often during the USA’s run at the World Cup this year. It’s played in my mind whenever I saw the streets teeming with red, white and blue on matchdays all along the west coast. It echoed every time eye-popping TV numbers dropped. I thought of it whenever I saw groups of kids – seven, eight, or nine years old – gathered with their parents at practice facilities and stadiums and hotels, eager to get an autograph or simply to catch a glimpse of their heroes.\nEach time, I found myself wondering: when will that inspirational moment come for these kids? Who will provide it? What will it look like, sound like? At no point during the tournament did I consider the ramifications should the complete opposite come to pass.\nWhat on earth would those kids have thought about what the USA produced on Monday night during their 4-1 defeat against Belgium? What were the nation’s soccer fans saying to their non-soccer-fan friends who they had finally convinced to watch a game with them, because this was the big one? The families Edwards referred to – what must they have thought? One moment they’re blessed with the feeling that they were on the edge of something great, and that the hard work and dedication they had put into the sport might finally pay off with mainstream acceptance.\nWhat inspiration was there to be found in the team’s disjointed moves forward, of the missed defensive assignments, of the lack of poise the team played with in nearly every key moment? Of the alarming lack of technical and tactical wherewithal compared to a very good Belgian side? Of the opponents and pundits from other countries celebrating their national team’s demise?\nWe don’t know yet what the TV numbers from the game on Monday look like, but in a similar weekday primetime slot last week, the previous US record for a soccer broadcast was shattered, with around 31 million. At the very least, millions more – probably tens of millions – were tuning in on Monday night for their first US men’s national team experience. And their first impression was a side that was not up to the task.\nThese people were not the longtime foundations of the game to whom Edwards referred. But they will have understood what a team going toe-to-toe with a top‑class opponent looks like. They would have seen it had they watched Mexico, for all their faults, scrap and claw in search of a foothold against England. They would have seen it had they even watched any of the USA’s previous games in this World Cup – from the fever dream‑like 4-1 win against Paraguay to the businesslike 2-0 victory against Bosnia and Herzegovina in the last 32.\nThe 2026 World Cup was supposed to be a herald of the future for the US men’s national team program. And the great illusion of this tournament may well turn out to be that, for a feverish couple of weeks, we all thought that it would be. Instead we are right back where we were. Good against the teams we should beat, but still waiting for that extra breakthrough against the teams we shouldn’t.\nThere will be plenty of time spent and ink spilled breaking down why the USA fell short on Monday night. I’m not convinced any of that really matters. Rather, I’m left with a belief as unshakeable as it is daunting to consider: that the US have just wasted the single biggest growth opportunity in the history of American soccer.\nWhat happens when a nation of potential new fans – the living, breathing promise of a once‑in‑a‑generation home World Cup tournament – are delivered something worse than heartbreak: total inadequacy?\nWe may be about to find out.", "translation_ja": "2002年ワールドカップでアメリカがポルトガルに3-2で勝利した試合の終盤、ESPNの実況アナウンサー、ジャック・エドワーズは、一晩中起きて観戦していた視聴者に向けて、自分たちが目撃している結果の重みを改めて伝える言葉を口にした。韓国・水原のスタジアムに陣取った彼は――そこで現代のアメリカ男子代表の最高到達点として今も語り継がれるベスト8進出となるキャンペーンの初戦を見守りながら――サッカーがアメリカという国の文化においていかに重要な意味を持つかを突いた独白を披露した。東部時間の朝7時に近づく中でのことだった。\n\n「イングランドを破った1950年代表の選手たち……この結果はあの人たちが築いた土台があってこそだ」と、エドワーズは堂々たる声で語った。「このスポーツを育ててきた何千もの家族のために。全国各地でサッカーを支え続けてきた人たちのために。そして、朝目が覚めてこのニュースを聞き、外に飛び出して壁にボールを蹴りつけながら、これよりもさらに大きな夢を見るだろう、7歳、8歳、9歳の子どもたちのためでもある。」\n\n今年のワールドカップにおけるアメリカの躍進を見守りながら、私はエドワーズのこの言葉を何度も思い返した。西海岸一帯の街路が赤・白・青に染まる試合当日の光景を見るたびに、その言葉が頭をよぎった。驚異的なテレビ視聴率の数字が報告されるたびに、その言葉が響いた。練習施設やスタジアム、ホテルに集まり、サインを求めたりヒーローの姿を一目見ようとする7歳、8歳、9歳の子どもたちの姿を見るたびに思い出した。\n\nそのたびに私は自問した——あの子たちにとって、エドワーズが語ったような感動的な瞬間はいつ訪れるのか？それをもたらすのは誰で、どんな形をしているのか？しかし大会を通じて、まったく逆の事態が起きた場合の影響について、私は一度たりとも考えていなかった。\n\nベルギーに4-1で敗れた月曜夜のアメリカの戦いぶりを見て、あの子どもたちは一体何を感じただろうか？ようやく「今回こそは」と説き伏せて一緒に観戦することになった非サッカーファンの友人に、ファンたちは何と言葉をかけただろうか？エドワーズが語った「家族」たちは、何を思っただろうか？ほんの少し前まで、何か偉大なものの入り口に立っているような感覚があり、このスポーツに注いできた労力と献身がようやく主流への認知として報われるかもしれないと感じていたのに。\n\n前に進もうとするチームの連携の乱れ、守備のポジショニングミス、重要な場面でほぼ毎回見せた落ち着きのなさ——そこに何の希望が見いだせるというのか。非常に優秀なベルギー代表と比べたときの、技術的・戦術的な水準の圧倒的な低さは何だったのか。相手チームや他国のサッカー関係者が、アメリカ代表の敗退を喜んでいたのは何だったのか。\n\n月曜夜の試合の視聴率がどうだったかはまだわからない。しかし先週の同様な平日プライムタイム枠では、サッカー放送の過去最高記録が更新され、約3100万人が視聴したとされている。月曜夜は少なくとも数百万人、おそらく数千万人以上が、アメリカ男子代表の試合を初めて見たはずだ。そしてその第一印象は、力不足のチームだった。\n\nこうした人たちは、エドワーズが言及したような「サッカーを長年支えてきた人々」ではない。しかし彼らは、強豪相手に対等に渡り合うチームの戦いがどんなものかは理解できたはずだ。たとえばメキシコが、多くの問題を抱えながらもイングランド相手にしがみつき、活路を探す姿を見ていれば理解できた。今大会のアメリカの前の試合を見ていればよかった——パラグアイに4-1で圧勝した夢のような試合も、ラウンド32でボスニア・ヘルツェゴビナに2-0でしっかり勝利した試合も。\n\n2026年ワールドカップは、アメリカ男子代表プログラムの未来を告げる祭典になるはずだった。そして今大会の最大の幻想は、熱狂的な数週間の間、私たちが皆そうなると信じていたことかもしれない。しかし現実は、私たちが元の場所に戻ってきたというものだ。勝てるはずの相手には強いが、勝てないはずの相手への突破口は、まだ見つけられていない。\n\n月曜夜にアメリカが負けた理由を分析するために、多くの時間と論考が費やされるだろう。しかし私には、それがどれほどの意味を持つのか確信が持てない。それよりも私には、揺るぎない、しかし考えれば考えるほど重くのしかかる確信がある——アメリカはアメリカサッカー史上最大の成長機会を、たった今、無駄にしたのだと。\n\n一世一代のホームワールドカップという生きた可能性、潜在的な新規ファンの国を前に、胸の張り裂けるような敗戦ではなく、「力が及ばない」という結末を見せてしまったとき、何が起きるのか。\n\nその答えを、私たちはまもなく知ることになるかもしれない。", "vocab": [{"word": "soliloquy", "definition": "独り言、または一人語り。演劇や放送において、一人の人物が内心や思いを長々と語る場面を指す。"}, {"word": "wherewithal", "definition": "（何かを成し遂げるための）手段・能力・資質。「tactical wherewithal」で「戦術的な力量」を意味し、ビジネスやスポーツ分析でよく使われる。"}, {"word": "herald", "definition": "何か重要なことの前触れや先駆けとなるもの・人。「a herald of the future」で「未来の到来を告げるもの」という意味になる。"}, {"word": "ramifications", "definition": "ある行為や出来事から生じる、広範かつ複雑な結果や影響。多くの場合、否定的な文脈で使われる。"}, {"word": "disjointed", "definition": "まとまりがなく、ちぐはぐな状態を指す形容詞。チームの連携や議論の論理が乱れている場合に使われる。"}, {"word": "pundits", "definition": "特定の分野（スポーツ、政治など）における専門的な解説者や評論家のこと。メディア上のコメンテーターを指すことが多い。"}, {"word": "demise", "definition": "終焉、没落、または死。ここではアメリカ代表の大会からの敗退・脱落を比喩的に表現している。"}]}, {"title_ja": "トランプが「共産主義の脅威」を叫ぶ理由――打つ手がなくなったから", "title_en": "Trump's 'Communist Menace' Rhetoric Is a Sign He's Run Out of Options", "summary_ja": "ロバート・ライク氏は、トランプが経済・外交・移民政策のいずれの実績も語れないため、中間選挙を前に冷戦時代の「共産主義」煽動に頼り始めたと論じる。1950年代のマッカーシズムとの類似を指摘しつつ、そうした戦術は1946年の選挙では一時的に効果を上げたが、最終的にはマッカーシー自身を破滅させたと述べる。若い進歩派民主党員が掲げる政策は国民の多数に支持されており、同様の攻撃は失敗すると主張している。", "summary_en": "Robert Reich argues that Trump is resorting to Cold War-era 'communist' scaremongering because he cannot run on his record on the economy, foreign policy, or immigration ahead of the midterms. Reich draws parallels to McCarthyism of the 1950s, noting that such tactics temporarily worked in 1946 but ultimately destroyed McCarthy himself. He suggests Trump's attacks on young progressive Democrats will similarly fail because the policies they advocate are broadly popular.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/07/trump-communists-mccarthyism-midterm-elections", "state_media": false, "category": "オピニオン", "full_text": "Trump has run out of cards to play in the midterm elections, which is why he’s now talking about the “communist menace”.\nHe can’t talk about the economy because prices continue to rise faster than wages, which means most Americans are getting poorer. He can’t talk about foreign policy because his war in Iran has been a debacle, his tariffs an utter failure, and he obviously hasn’t settled the war in Ukraine on “day one”. He can’t talk about immigration because his raids and mass deportations have become so unpopular.\nSo, facing the midterm elections, what’s left?\nHe’s resorting to the oldest of rightwing tropes – accusing Democrats (especially a rising generation of new, young, vigorous Democratic politicians) of being communists.\nHe kicked off America’s 250th anniversary celebrations on Friday with a speech at Mount Rushmore extolling American culture and warning of a resurgence of the “communist menace”. With the granite faces of four of his predecessors behind him, Trump took aim at what he called “radicals” and “extremists”.\n“There is now a resurgence of the communist menace in our land, including from newcomers to our country who embrace ideas totally opposed to our way of life and our great success. You can be a communist, or you can be a patriot. You cannot be both.”\nOh, please.\nFor years, Trump has been trying to scare Americans about Democrats who advocate Medicare for All, universal childcare, free public higher education and higher taxes on the super-wealthy to pay for them (all of which the rising young Democrats are advocating).\nBut he hasn’t gotten anywhere because these initiatives are supported by most Americans.\nSo now he’s throwing scary labels at the wall and seeing what sticks.\nCommunism was the scare word used after the first and second world wars to crack the whip on the left. It provoked witch-hunts and ruined careers.\nIt made the former Wisconsin senator Joe McCarthy a one-man bomb squad in the early 1950s, when he forced American citizens to “name names” and ridiculed the “pitiful squealing” of “those egg-sucking phony liberals” who “would hold sacrosanct those communists and queers”.\nMcCarthyism was a by-product of the Republican party’s postwar effort to eradicate the New Deal. The party had portrayed the midterm election of 1946 as a “battle between Republicanism and communism”, and the Republican National Committee chairperson claimed that the federal bureaucracy was filled with “pink puppets”.\nSouthern segregationist Democrats joined in the red-baiting. The Mississippi senator Theodore Bilbo, a Klansman who had filibustered to block anti-lynching legislation, described multiracial labor unions’ advocacy for civil rights as the work of “northern communists”. Representative John Elliott Rankin, a racist and antisemitic Mississippi Democrat who helped establish the House Committee on Un-American Activities, called labor unions’ southern organizing campaign “a communist plot”, fearing it would give more voting rights to Black people. “We’re asleep at the switch,” he warned. “They’re taking over this country; we’ve got to stop them if we want this country.”\nThe communist scare tactics were temporarily successful. In the 1946 midterms, Democrats lost control of both chambers of Congress. Wisconsin sent Joe McCarthy to the Senate. California sent to the House a young Republican lawyer who had already figured out how to use red-baiting as a political tool, Richard Nixon. Four years later it sent him to the Senate, too.\nIt’s likely that Trump’s earliest political memories are of Joe McCarthy’s red scare. Trump and I are the same age, and those are among my earliest memories.\nOn 9 June 1954, I sat at my father’s side on our living room couch watching the Army-McCarthy hearings. McCarthy had accused the US army of having poor security at a top-secret facility, hinting at communist subversion. He charged that one of the young attorneys on the staff of Joseph Welch, who was representing the army, was a communist. The charge could destroy the young man’s career.\n“Son-of-a-bitch!” my father shouted at McCarthy on television. I hid my head.\nAs McCarthy continued his attack on the young attorney, Welch broke in: “Until this moment, senator, I think I never really gauged your cruelty or your recklessness.”\nI was only eight years old, but I was spellbound.\nMcCarthy didn’t stop.\n“Son-of-a-bitch!” my father shouted, even more loudly.\nAt this point, Welch demanded that McCarthy listen to him. “Let us not assassinate this lad further, senator,” he said. “You have done enough. Have you no sense of decency?”\nAlmost overnight, McCarthy imploded. Welch had aroused the decency of the American people. McCarthy’s national popularity evaporated. Three years later, censured by his Senate colleagues, ostracized by his party, and ignored by the press, McCarthy drank himself to death, a broken man at the age of 48.\nDuring those hearings, McCarthy’s chief counsel was Roy Cohn, who had gained prominence as the Dep", "translation_ja": "トランプは中間選挙で打つ手がなくなった。だからこそ今、「共産主義の脅威」を語り始めている。\n\n経済については語れない。物価が賃金を上回るペースで上昇し続けており、大多数のアメリカ人が実質的に貧しくなっているからだ。外交政策も語れない。イランとの戦争は惨憺たる結果に終わり、関税政策は完全な失敗であり、「就任初日にウクライナ戦争を終結させる」という約束も果たせていないからだ。移民政策も語れない。強制捜査や大規模強制送還があまりにも不人気になっているからだ。\n\nでは、中間選挙を目前に控えて、何が残っているのか？\n\n彼が頼っているのは、右派の最も古い常套手段だ――民主党員（特に台頭しつつある若く活力ある新世代の民主党政治家たち）を共産主義者と呼んで非難することである。\n\nトランプは金曜日、マウント・ラシュモアでアメリカ建国250周年記念の祝典を開幕し、アメリカ文化を称えつつ「共産主義の脅威の復活」を警告する演説を行った。四人の前任大統領の花崗岩の顔を背後に従えながら、トランプは「急進主義者」や「過激派」と呼ぶ者たちを攻撃した。\n\n「わが国土において、共産主義の脅威が再び頭をもたげている。われわれの生き方とわれわれの偉大な成功にまったく相容れない思想を奉じる新移民たちからの脅威も含めて。共産主義者であることと愛国者であることは両立しない」\n\nいい加減にしてほしい。\n\nトランプは長年にわたり、「国民皆保険（メディケア・フォー・オール）」「普遍的な保育」「公立高等教育の無償化」、そしてその財源として富裕層への増税を支持する民主党員についてアメリカ国民を怖がらせようとしてきた（これらはすべて台頭する若い民主党員たちが主張していることだ）。\n\nしかし彼は全く成果を上げられなかった。なぜなら、これらの政策はアメリカ国民の大多数に支持されているからだ。\n\nだから今、彼は恐怖を煽る言葉を壁に投げつけ、何かが引っかかるのを待っている。\n\n「共産主義」は、第一次・第二次世界大戦後に左翼を締め上げるために使われた恐怖の言葉だった。それは魔女狩りを引き起こし、多くのキャリアを破壊した。\n\nそれはかつてのウィスコンシン州上院議員ジョー・マッカーシーを、1950年代初頭の一人の爆弾処理班にした。彼はアメリカ市民に「名前を挙げる」よう強制し、「共産主義者や変質者を神聖不可侵なものとして守ろうとする」「あの卵をすすって生きるような偽善的なリベラルたち」の「みじめな泣き言」を嘲笑った。\n\nマッカーシズムは、共和党が戦後ニューディール政策を根絶しようとした試みの副産物だった。党は1946年の中間選挙を「共和主義と共産主義の戦い」として描き、共和党全国委員会の委員長は連邦官僚機構が「ピンクの操り人形」で満ちていると主張した。\n\n南部の人種隔離主義的民主党員たちもこの赤狩りに加担した。反リンチ法案を阻止するために議事妨害を行ったKKKの一員であるミシシッピ州上院議員セオドア・ビルボは、多民族の労働組合が公民権のために行った活動を「北部の共産主義者たちの仕業」と表現した。黒人の投票権拡大を恐れ、非米活動委員会の設立を助けた人種差別主義者かつ反ユダヤ主義者のミシシッピ州民主党下院議員ジョン・エリオット・ランキンは、労働組合の南部組織化キャンペーンを「共産主義の陰謀」と呼んだ。「我々は油断していた」と彼は警告した。「奴らはこの国を乗っ取ろうとしている。食い止めなければならない」\n\n共産主義への恐怖を利用した戦術は一時的に成功した。1946年の中間選挙で民主党は上下両院の支配を失った。ウィスコンシン州はジョー・マッカーシーを上院に送り込んだ。カリフォルニア州は、すでに赤狩りを政治的道具として使う術を会得していた若い共和党の弁護士、リチャード・ニクソンを下院に送り込んだ。四年後には上院にも送り込んだ。\n\nトランプの最も古い政治的記憶の中に、ジョー・マッカーシーの赤狩りがあることは間違いない。トランプと私は同い年であり、それは私の最も早い記憶の一つでもある。\n\n1954年6月9日、私は居間のソファで父の隣に座り、陸軍・マッカーシー公聴会をテレビで見ていた。マッカーシーは、極秘施設のセキュリティに問題があるとして米陸軍を告発し、共産主義者の工作を示唆していた。彼は、陸軍側の代理人を務めていたジョセフ・ウェルチのスタッフの若い弁護士の一人が共産主義者だと告発した。その告発は、その若者のキャリアを破壊しかねないものだった。\n\n「このくそ野郎！」父はテレビの中のマッカーシーに向かって叫んだ。私は頭を引っ込めた。\n\nマッカーシーがその若い弁護士への攻撃を続けると、ウェルチが割って入った。「上院議員、今この瞬間まで、あなたの残酷さと無謀さを私は本当に理解していなかったと思います」\n\n私はまだ八歳だったが、すっかり魅入られてしまっていた。\n\nマッカーシーは止まらなかった。\n\n「このくそ野郎！」父はさらに大きな声で叫んだ。\n\nこの時点でウェルチはマッカーシーに聞くよう求めた。「上院議員、これ以上この若者を傷つけるのはやめてください」と彼は言った。「あなたはもう十分にやった。あなたには良識というものがないのですか？」\n\nほぼ一夜にして、マッカーシーは自滅した。ウェルチはアメリカ国民の良識を呼び覚ましたのだ。マッカーシーの全国的な人気は消滅した。三年後、上院の同僚から非難決議を受け、党から排斥され、メディアにも無視されたマッカーシーは、48歳という若さで、自暴自棄の末に酒に溺れて死んだ。\n\nあの公聴会の際、マッカーシーの首席顧問を務めていたのがロイ・コーンだった。コーンはその後、副……", "vocab": [{"word": "debacle", "definition": "大失敗、崩壊を意味する名詞。計画や政策が完全に破綻した状況を指す強い否定的表現。例：「his war in Iran has been a debacle（イランとの戦争は惨憺たる結果に終わった）」"}, {"word": "McCarthyism", "definition": "1950年代初頭の米上院議員ジョー・マッカーシーに由来する政治用語で、証拠が不十分なまま共産主義者・国家反逆者として個人を告発する魔女狩り的手法を指す。転じて、根拠の薄い政治的弾圧全般を意味する。"}, {"word": "red-baiting", "definition": "政敵を「赤（共産主義者・社会主義者）」と呼んで中傷・攻撃する政治的戦術を指す慣用表現。冷戦時代に特に多用された。"}, {"word": "filibuster", "definition": "議会において、長時間の演説などで議事を意図的に引き延ばし、採決を阻止する議事妨害戦術を指す動詞・名詞。米国上院で特に知られる手続き的戦術。"}, {"word": "ostracized", "definition": "集団や社会から排除・追放されることを意味する動詞ostraciizeの過去分詞形。古代ギリシャの陶片追放（ostracism）に由来する。"}, {"word": "sacrosanct", "definition": "神聖不可侵である、絶対に侵してはならないという意味の形容詞。宗教的な文脈から転じて、批判や変更が許されないとみなされる事柄に使われる。"}, {"word": "censured", "definition": "公式に非難・譴責されることを意味する動詞censeureの過去分詞形。議会において同僚議員に対する正式な非難決議が可決された際に使われる用語。"}]}, {"title_ja": "最高裁のトランスジェンダー・スポーツ判決は身体的自律への攻撃——ジュディス・レヴァイン", "title_en": "Supreme Court's Trans Sports Ruling Is an Attack on Bodily Autonomy, Argues Levine", "summary_ja": "意見寄稿者ジュディス・レヴァインは、トランスジェンダー選手を女性スポーツから排除する州法を合憲とした米最高裁の判決は、公正さや安全とは無関係であり、身体的自律に対する保守派の広範な攻撃の一環だと主張する。判決は数十年の研究と矛盾する擬似科学的な性の二元論に基づいていると彼女は論じる。レヴァインはこの判決を中絶権の後退やトランプ政権下でのトランスジェンダーへの差別的政策の連鎖と結びつけている。", "summary_en": "Opinion writer Judith Levine argues that the US Supreme Court's ruling allowing states to ban transgender athletes from women's sports has nothing to do with fairness or safety, but is rather part of a broader conservative assault on bodily autonomy. She contends the ruling relies on pseudoscience and a rigid binary view of sex that contradicts decades of research. Levine connects the decision to the rollback of abortion rights and a pattern of discriminatory policies targeting trans people under the Trump administration.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/07/supreme-courts-trans-ruling-bodily-autonomy", "state_media": false, "category": "オピニオン", "full_text": "Last week, the US supreme court ruled that states may restrict participation in girls’ and women’s sports to “biological females” and exclude transgender athletes from competing. In the past six years, 27 states have enacted such bans; before the court were challenges to West Virginia’s Save Women’s Sports Act and Idaho’s Fairness in Women’s Sports Act.\nThe majority opinion, penned by Justice Brett Kavanaugh, upholds the laws’ legality under Title IX, the federal statute that guarantees women’s equal participation in college sports, and their constitutionality under the equal protection clause of the 14th amendment. It also vindicates Donald Trump’s February 2025 executive order “Keeping Men out of Women’s Sports”. That directive withdraws funding from “educational programs that deprive women and girls of fair athletic opportunities, which results in the endangerment, humiliation, and silencing of women and girls and deprives them of privacy”. US policy, the order continues, will “oppose male competitive participation in women’s sports more broadly, as a matter of safety, fairness, dignity, and truth”.\nNeither the ruling nor the order has anything to do with privacy, safety, fairness or dignity. In fact, the bans will deprive trans athletes of all of these. The science on which the ruling is based, moreover, lies far from the truth.\nA half-century of science has discovered the protean nature of sex, gender and desire. Along with liberation movements and legislative reform, medical advances – safe contraceptives, effective abortion pills, puberty blockers – have enabled people to live with more freedom and agency in their bodies. Among the biggest beneficiaries are women and trans people.\nAs religious conservatives see it, if you can’t tell the boys from the girls, nothing else makes sense. To deviate from a narrow, nostalgic and (in reality) never-fixed norm is to mock God. It’s no wonder they are fighting to wrest the newfound bodily autonomy from women who don’t choose motherhood and people seeking to live in bodies consonant with their experienced genders.\nThe ruling on women’s sports, West Virginia et al v BPJ, was the Trump administration’s latest assault on bodily autonomy. In his first term, the president handpicked the justices to overturn Roe v Wade; in 2022, Dobbs v Jackson rescinded the federal government’s protection of women’s control over their reproductive destinies, unloosing 21 states to ban or impose draconian restrictions on abortion.\nTwo years later, Republicans have spent $215m on ads vilifying trans people. At a rally a month before his inauguration, the president-elect vowed to “stop the transgender lunacy”. Right after his swearing-in, Trump issued “Defending Women from Gender Ideology Extremism and Restoring Biological Truth to the Federal Government”, the executive order requiring the federal government to recognize only two, mutually exclusive, immutable sexes, and identity documents to reflect only a person’s sex assigned at birth, even if it differs from their current identity or appearance.\nIn February, following another executive order, the Trump administration moved to begin discharging trans service members; in May the supreme court allowed a ban to go forward. In June 2025, the same conservative bloc upheld Tennessee’s ban on gender-affirming care for minors.\nAn administration that is crushing government programs supporting women and girls, from Title X family planning to sexual assault prevention training, and disproportionately firing women, from civil servants to cabinet members, is now “defending women”. A man who says it’s OK to “grab” women “by the pussy” is blaming transgender schoolgirls for the “endangerment [and] humiliation … of women and girls.” A man who denied a sexual assault allegation before being seated on the court is writing the legal rationale for how a discriminatory ban is in fact rescuing fairness for women athletes.\nAlong with pseudo-feminism, the right deploys pseudoscience in the war on bodily autonomy. Abortion opponents invented fetal pain and “post-abortion syndrome”; they exaggerate both early-gestation viability and the medical risks of abortion. They recruit nature as an ally to the religious principle of gender “complementarity”: men are strong, women weak; men should lead and women submit.\nAnti-trans discourse offers a similar pink-and-blue vision of human biology and relations. Justice Clarence Thomas’s concurrence in the women’s sports case summarized the theory: “Men and boys with gender dysphoria” – the medical term for a misalignment between a person’s experienced sex and their sex assigned at birth – “are not women or girls even if they believe that they are”, he wrote. “Sex is an immutable, ‘biological’ characteristic … it is binary, and ‘man’ and ‘woman,’ ‘boy’ and ‘girl,’ are the terms that correspond to adults and children of each sex ... To use language to obscure reality – to show ‘indifference regarding the truth’ – is to lie ", "translation_ja": "先週、米国最高裁判所は、州が女子・女性スポーツへの参加を「生物学的女性」に限定し、トランスジェンダー選手を競技から排除することを認める判決を下した。過去6年間で27州がこのような禁止措置を制定しており、最高裁に持ち込まれたのはウェストバージニア州の「女性スポーツ保護法」とアイダホ州の「女性スポーツ公平法」に対する異議申し立てだった。\n\nブレット・カバノー判事が執筆した多数意見は、女子大学スポーツへの平等な参加を保障する連邦法であるタイトルIXの下での合法性と、合衆国憲法修正第14条の平等保護条項の下での合憲性を認めた。またこの判決は、ドナルド・トランプが2025年2月に発令した「男性を女性スポーツから締め出す」大統領令を追認するものでもある。その指令は、「女性と少女から公正な競技機会を奪い、危険にさらし、侮辱し、沈黙させ、プライバシーを侵害する教育プログラム」への資金援助を撤回するものだ。同令はさらに、米国の政策は「安全、公正、尊厳、真実の観点から、女性スポーツにおける男性の競技参加に幅広く反対する」と続けている。\n\nしかし、この判決も大統領令も、プライバシー、安全、公正、尊厳とは何の関係もない。実際には、これらの禁止措置こそがトランスジェンダー選手からこれらすべてを奪うことになる。さらに、判決の根拠とされた科学は真実からほど遠いものだ。\n\n半世紀にわたる科学的研究は、性、ジェンダー、欲望の多様な性質を明らかにしてきた。解放運動や立法改革とともに、医療の進歩——安全な避妊薬、効果的な中絶薬、思春期抑制剤——は人々が自分の身体においてより大きな自由と自律性をもって生きることを可能にしてきた。その最大の受益者の中には女性とトランスジェンダーの人々がいる。\n\n宗教的保守派の見方では、男の子と女の子を区別できないのであれば、他のことも何も意味をなさないことになる。狭く、懐古的で、（現実には）かつて固定されたことのない規範から逸脱することは、神を嘲ることだ。母性を選ばない女性や、自分が経験するジェンダーと一致する身体で生きることを求める人々から、新たに獲得された身体的自律を奪おうとしているのは当然のことかもしれない。\n\n女性スポーツに関する判決「ウェストバージニア他対BPJ」は、トランプ政権による身体的自律への最新の攻撃だった。大統領は第1期政権でロー対ウェイド判決を覆すために判事を自ら選び、2022年のドブス対ジャクソン判決は、連邦政府による女性の生殖上の自己決定の保護を廃止し、21州が中絶を禁止または厳しく制限することを許した。\n\nそれから2年、共和党はトランスジェンダーの人々を中傷する広告に2億1500万ドルを費やしてきた。就任1か月前の集会で、大統領選候補者は「トランスジェンダーの狂気を止める」と誓った。就任直後、トランプはジェンダーイデオロギー過激主義から女性を守り、連邦政府に生物学的真実を回復することを求める大統領令を発令し、連邦政府が二つの相互排他的かつ不変の性のみを認め、たとえ現在のアイデンティティや外見と異なる場合でも、本人確認書類には出生時に割り当てられた性別のみを反映することを義務付けた。\n\n2月、別の大統領令に続き、トランプ政権はトランスジェンダーの兵役員の除隊手続きを開始しようとし、5月には最高裁が禁止令の執行を認めた。2025年6月、同じ保守派の判事
