{"title_ja": "ABCニュースライブ：24時間ニュース速報", "title_en": "ABC News Live: 24/7 Breaking News Coverage", "summary_ja": "ABCニュースライブは、最新のニュース速報やライブイベントを24時間365日配信しています。米国内外で起きる出来事をリアルタイムでお届けし、視聴者が常に最新情報を把握できるようにしています。重要なニュースが展開する中、いつでも視聴して情報を得ることができます。", "summary_en": "ABC News Live provides continuous around-the-clock coverage of breaking news and live events. The stream delivers real-time updates on the latest developments from across the United States and around the world. Viewers can tune in at any time to stay informed on major stories as they unfold.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ大統領、記録的猛暑と悪天候の中ナショナルモールで独立記念日演説", "title_en": "Trump Delivers July 4th Address at National Mall Amid Record Heat and Weather Delays", "summary_ja": "トランプ大統領は米国建国250周年を祝う独立記念日の演説をナショナルモールで行ったが、雷雨と記録的な摂氏39度の猛暑のため1時間以上遅延した。演説ではSAVE America法の推進や共産主義批判、退役軍人・名誉勲章受章者への敬意表明などが行われた。同大統領は依然として低い支持率に直面しており、6月のクイニピアック調査では支持率38%、不支持率55%という結果が示された。", "summary_en": "President Trump delivered a Fourth of July speech at the National Mall celebrating America's 250th birthday, though the event was delayed over an hour due to thunderstorms and record-breaking 102-degree heat. During his address, Trump promoted his SAVE America Act, spoke against communism, and honored veterans and Medal of Honor recipients. The event came as Trump faces low approval ratings, with a June Quinnipiac poll showing 38% approval and 55% disapproval.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/Politics/trump-hold-rally-celebrate-july-fourth-washington/story?id=134374334", "state_media": false, "category": "政治", "full_text": "Trump celebrates Fourth of July in National Mall address, repeatedly touches on politics\nWeather delayed Trump's address celebrating America's 250th birthday.\nPresident Donald Trump on Saturday delivered a Fourth of July address from the National Mall, praising the American spirit and the founders who fought the British 250 years ago to pave the path to American independence -- hours after the event was delayed by weather in the nation's capital.\nTaking the stage at 11:15 p.m., an hour and 15 minutes after originally planned, the president said, \"Tonight we pledge allegiance to the flag they gave us, and we say, God bless the immortal patriots of 1776. And long live the cause of independence.\"\nThe president brought up present-day politics. During the speech, he promoted his signature SAVE America Act, which would drastically change the administration of American elections just months out from the midterms, and repeatedly railed against communism.\nDuring his speech, Trump touted several historic flags that hung on the stage behind him, including an original 1777 flag and the flag that draped over President Abraham Lincoln's coffin. The president had multiple veterans and Medal of Honor recipients from various American wars come onto stage at several points to salute the historic flags.\nThe speech, which culminated in a flyover and a massive fireworks display, came following a major disruption to the show as crowds who waited for hours in the record heat were forced to evacuate the grounds due to thunderstorms hitting Washington, D.C.\nThe preliminary high temperature in Washington, D.C., Saturday was 102 degrees -- making it the hottest July Fourth on record for the city, according to ABC News' meteorologists. It broke the previous record high of 100 degrees set on July 4, 1919.\nAt times during the evacuation, there was confusion among the crowd as the dispersal orders were announced.\nThe president thanked the crowd for their patience.\n\"I want to thank everybody, because they did the right thing. They saw lightning. And I said, 'There's no way if we have to speak in front of one person at 4 in the morning, I'm going to be here.' There's no way we can be deterred,\" he said.\nThe \"Salute to America 250 Celebration & Fireworks\" celebration was slated to begin at 7 p.m. but did not start until 10:45 p.m.\nAlmost all of the musical guests and performances were cancelled due to the late start.\nTrump remained determined to give his speech, which he vowed earlier in the week would happen despite the heat.\n\"One of my very brilliant people backstage said, 'Don't worry about it, sir. We can do it. Maybe next week.' I said, 'It doesn't work next week. This is the big day, we want July Fourth,\" he said.\nTwelve people on the National Mall and surrounding area were transported to local area hospital because of the triple digit heat as of 8 p.m. Saturday, according to local authorities.\nThe president's speech came as he and his administration have faced pushback for controversial domestic and international policies. The president also faces low approval ratings -- though a June Quinnipiac poll found them up from the lowest of his second term.\nAccording to the poll, 38% of voters approve of Trump and 55% disapprove (in May it was 34% to 58%).\nQuinnipiac found majorities of voters disapproved of the way that Trump is handling immigration issues, the economy, foreign policy and the ongoing war with Iran.\nABC News' Beatrice Peterson, Fritz Farrow, Noah Minnie, and Daniel Peck contributed to this report.", "translation_ja": "トランプ大統領、独立記念日にナショナルモールで演説――政治的発言も相次ぐ\n\nトランプ大統領、建国250周年を祝う独立記念日演説でナショナルモールに立つ――悪天候により開始が遅延\n\nドナルド・トランプ大統領は土曜日、ナショナルモールで独立記念日の演説を行い、アメリカの精神と、250年前にイギリスと戦ってアメリカ独立への道を切り開いた建国の父たちを称えた。演説は当初の予定より大幅に遅れ、首都を襲った悪天候の影響で時間がずれ込んだ。\n\n当初の予定より1時間15分遅れの午後11時15分に登壇したトランプ大統領は、「今夜、私たちは彼らが与えてくれた国旗に忠誠を誓い、こう言おう。神よ、1776年の不滅の愛国者たちを祝福したまえ。そして独立の大義よ、永遠に生きよ」と述べた。\n\n大統領は現在の政治問題にも言及した。演説の中で、中間選挙まで数か月という時期にアメリカの選挙管理を大幅に変更するとされる目玉法案「SAVE America Act（アメリカを救え法）」を宣伝するとともに、共産主義を繰り返し激しく批判した。\n\n演説の中でトランプ大統領は、背後のステージに掲げられた複数の歴史的な国旗を称えた。1777年の旗や、エイブラハム・リンカーン大統領の棺を覆った国旗などが含まれていた。大統領はまた、さまざまな戦争に従軍した退役軍人や名誉勲章受章者を何度かステージに招き、歴史的な国旗への敬礼を行わせた。\n\n演説の締めくくりには航空機のフライオーバーと大規模な花火の打ち上げが行われたが、イベント本番に先立って大きなトラブルが発生した。記録的な猛暑の中で何時間も待ち続けた観客が、ワシントンD.C.を直撃した雷雨のために会場からの退避を余儀なくされたのだ。\n\n土曜日のワシントンD.C.の最高気温は華氏102度（摂氏約39度）に達し、ABC Newsの気象専門家によれば、同市の独立記念日の最高気温記録を更新した。これは1919年7月4日に記録された従来の最高記録100度（摂氏約38度）を上回るものだった。\n\n退避中は、群衆への避難指示の伝達が混乱する場面もあった。\n\nトランプ大統領は集まった人々の忍耐に感謝を述べた。\n\n「皆さんに感謝したい。皆さんは正しい行動を取った。雷が見えた。そして私は言った。『たとえ朝4時に一人の前で話すことになっても、私はここにいる。どんなことがあっても私たちを阻むことはできない』」と彼は語った。\n\n「アメリカ250周年祝典と花火（Salute to America 250 Celebration & Fireworks）」は午後7時開始の予定だったが、実際に始まったのは午後10時45分だった。\n\n開始の大幅な遅れにより、音楽ゲストやパフォーマンスのほぼすべてがキャンセルされた。\n\nトランプ大統領は演説を行うことへの強い意志を持ち続けた。同大統領は今週初め、猛暑にもかかわらず演説は必ず行うと宣言していた。\n\n「バックステージにいた非常に優秀なスタッフの一人が言った。『ご心配なく、できますよ。来週でもいいのでは』。私は言った。『来週では意味がない。この大切な日は7月4日でなければならない』」と語った。\n\n地元当局によると、午後8時時点で、三桁の気温（華氏）による影響でナショナルモールおよびその周辺エリアで12人が地元の病院に搬送された。\n\n大統領の演説は、トランプ氏とその政権が国内外の物議を醸す政策をめぐって批判にさらされる中で行われた。大統領はまた、低い支持率にも直面しているが、6月のクイニピアック調査では第2期政権の最低値から回復しつつあることが示された。\n\n同調査によると、有権者の38%がトランプ氏を支持し、55%が不支持と回答した（5月時点では支持34%、不支持58%）。\n\nクイニピアックの調査では、移民問題、経済、外交政策、そしてイランとの継続中の戦争に関するトランプ氏の対応について、過半数の有権者が不支持であることも明らかになった。\n\n本記事には、ABC Newsのビアトリス・ピーターソン、フリッツ・ファロー、ノア・ミニー、ダニエル・ペックが取材協力した。", "vocab": [{"word": "culminated", "definition": "「最高潮に達した、締めくくられた」という意味の動詞。一連の出来事や過程が最終的なクライマックスや結末を迎える際に使われる表現。"}, {"word": "railed against", "definition": "「激しく非難した、猛烈に批判した」という意味のイディオム。感情的かつ強い言葉で特定の対象を攻撃・批判する行為を表す。"}, {"word": "dispersal", "definition": "「解散、分散」という意味の名詞。群衆や集団を特定の場所から散らす行為や命令を指し、主に公式・行政的な文脈で使われる。"}, {"word": "deterred", "definition": "「阻まれた、思いとどまらされた」という意味の動詞の過去分詞形。恐怖や障害などによって行動や意図を妨げられることを表す。"}, {"word": "pushback", "definition": "「反発、抵抗」という意味の名詞。政策や提案などに対して、反対意見や批判として示される抵抗・圧力を指すビジネス・政治用語。"}, {"word": "drastically", "definition": "「大幅に、抜本的に」という意味の副詞。変化や影響の規模が非常に大きく、根本的であることを強調する際に用いられる。"}]}, {"title_ja": "エジプト西部砂漠で古代ビザンチン都市と墓が発掘される", "title_en": "Archaeologists Uncover Ancient Byzantine City and Tombs in Egypt's Western Desert", "summary_ja": "エジプトの考古学者たちが、西部砂漠のダクラ・オアシスで4世紀のビザンチン時代の都市を発見した。住居や教会建築のほか、硬貨や陶器の破片なども出土している。また、アレクサンドリア近郊のマリーナ・エル・アラメイン遺跡では古代の墓18基が発掘され、花崗岩の石棺や故人の口に納められた金貨も見つかった。", "summary_en": "Archaeologists in Egypt have discovered a well-preserved Byzantine-era city from the fourth century in the Dakhla oasis of the western desert, featuring residential structures, a basilica-style church, coins, and pottery. Separately, 18 ancient tombs were uncovered at the Marina el-Alamein archaeological site near Alexandria, including a granite sarcophagus and gold coins placed in the mouths of the deceased. Both discoveries offer significant insights into daily life and urban development during the Byzantine and Greco-Roman periods in Egypt.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/04/archaeologists-uncover-ancient-byzantine-city-in-egypts-western-desert", "state_media": false, "category": "経済", "full_text": "Archaeologists in Egypt have uncovered a well-preserved Byzantine-era city in the western desert.\nThe fourth-century quarters had residential and religious structures, including a basilica-style church in the Dakhla oasis. Archaeologists also found coins, pottery fragments and tools.\nSeparately, 18 ancient tombs were discovered at Marina el-Alamein, near Alexandria, which includes rock-cut and limestone tombs, pottery and a granite sarcophagus.\nThe tourism and antiquities ministry said the first discovery reveals details of daily life, urban development and economic activities when Egypt was part of the Byzantine empire.\nThe unearthed quarters included north-south thoroughfares intersected by east-west streets, forming open squares and public spaces, said Hisham el-Leithy, secretary general of the supreme council of antiquities.\nA basilica dating back to the mid-fourth century stands at the settlement’s head, overlooking its main streets, along with remains of two watchtowers to safeguard the outskirts, according to Mahmoud Massoud, who chairs the archaeological mission.\nThe oasis, located in Egypt’s western province of New Valley, is on Unesco’s tentative list, a step away from being added to the agency’s world heritage list.\nA heavily fortified structure with thick defensive walls, and many houses consisting of reception halls and vaulted roofs, were found in the area, Massoud added.\nAmong them were the house of Tisous, a church deacon, which dates to the second half of the fourth century. Archaeologists believe it served as a house church before the construction of the city’s basilica.\nArchaeologists also uncovered bread ovens, kitchens, grinding tools and bronze coins bearing portraits of Byzantine emperors, Latin inscriptions and Christian symbols.\nA group of gold coins unearthed dated to the reign of Roman emperor Constantius II, who ruled between 337 and 361, the ministry statement said.\nDiaa Zahran, head of the Islamic, Coptic and Jewish antiquities department, said they found a collection of about 200 pottery fragments which would have been used as writing material. The fragments, known as ostraca, have inscriptions detailing commercial transactions, correspondence and other details of daily life, according to Zahran.\nArchaeologists also found ancient tombs in the Marina el-Alamein archaeological site, which is about 62 miles (100km) west of the Mediterranean city of Alexandria.\nThe findings included 11 rock-cut tombs with an average depth of eight metres, and seven surface limestone-built tombs, the ministry said. It has brought the total tombs found at the site to 48.\nIn the site, archaeologists found pottery vessels, amphorae, lamps, plates, altars and limestone basins.\nThe mission chief, Eman Abdel-Khaliq, said they found a 2.5-metre-long granite sarcophagus, with skeleton remains that were being studied. Close to the sarcophagus, they found the remains of a plaster sphinx statue, she said.\nFour gold pieces were placed inside the mouths of some of the deceased, known as “the golden tongue”, which had been a practice associated with funerary beliefs of that era, Abdel-Khaliq said.\nMarina el-Alamein is an archaeological site close to the city of Alamein on Egypt’s northern coast, unearthed in 1986. Archaeologists believe the site was the ancient Greco-Roman port city of Leukaspis on the Mediterranean, which was built in the second century and thrived until the fourth century.", "translation_ja": "エジプトの考古学者たちが、西部砂漠で保存状態の良いビザンチン時代の都市を発見した。\n\n4世紀の街区には住居や宗教的建造物が残っており、ダクラ・オアシスにはバシリカ様式の教会も含まれていた。考古学者たちはコイン、陶器の破片、道具類も発見した。\n\n別の発見として、アレクサンドリア近郊のマリーナ・エル・アラメインでは18基の古代墓が発掘され、岩窟墓や石灰岩造りの墓、陶器、花崗岩の石棺が含まれていた。\n\n観光・遺物省は、最初の発見によってエジプトがビザンチン帝国の一部であった時代の日常生活、都市発展、経済活動の詳細が明らかになると述べた。\n\n最高遺物評議会の事務局長ヒシャム・エル＝ライシー氏によると、発掘された街区には南北に走る大通りが東西の通りと交差し、広場や公共空間を形成していたという。\n\n考古学ミッションを率いるマフムード・マスウード氏によると、4世紀中頃にさかのぼるバシリカが集落の中心に建ち、主要な通りを見下ろすように位置しており、周辺を守るための2つの監視塔の遺構も残っていたという。\n\nオアシスはエジプト西部のニューバレー州に位置しており、ユネスコの暫定リストに掲載されており、世界遺産リストへの追加まであと一歩のところにある。\n\nマスウード氏はさらに、厚い防御壁を持つ強固な要塞構造物や、応接間とアーチ型天井を持つ多くの家屋が発見されたと述べた。\n\nその中には、4世紀後半にさかのぼる教会助祭ティスースの家があり、考古学者たちはこの家が都市のバシリカが建設される以前に「家の教会」として使われていたと考えている。\n\nまた、パン焼き窯、台所、製粉道具、ビザンチン皇帝の肖像やラテン語の碑文、キリスト教の紋章が刻まれた青銅貨幣も発掘された。\n\n発掘された金貨の一群は、337年から361年の間に統治したローマ皇帝コンスタンティウス2世の治世にさかのぼるものだと省の声明は述べている。\n\nイスラム・コプト・ユダヤ遺物部門の責任者ディアー・ザフラン氏は、書写材料として使われていたとみられる約200点の陶器の破片が発見されたと述べた。「オストラカ」として知られるこれらの破片には、商取引や書簡、その他日常生活の詳細を記した碑文が刻まれていたという。\n\n考古学者たちは地中海都市アレクサンドリアの西約100キロメートル（62マイル）に位置するマリーナ・エル・アラメイン遺跡でも古代の墓を発見した。\n\n省によると、発掘物には平均深さ8メートルの岩窟墓11基と、地上に築かれた石灰岩造りの墓7基が含まれており、これにより同遺跡で発見された墓の総数は48基となった。\n\n遺跡では陶器の容器、アンフォラ、ランプ、皿、祭壇、石灰岩の水盤が発見された。\n\nミッション長のエマン・アブデル＝ハリーク氏は、全長2.5メートルの花崗岩の石棺が発見され、中に残っていた人骨が研究中だと述べた。石棺の近くには漆喰製のスフィンクス像の遺構も見つかったという。\n\nアブデル＝ハリーク氏によると、一部の故人の口の中には金片が4枚納められており、「黄金の舌」として知られるこの慣習は、当時の葬儀にまつわる信仰と関係していたという。\n\nマリーナ・エル・アラメインはエジプト北部海岸の都市アラメイン近郊にある遺跡で、1986年に発掘された。考古学者たちは、この遺跡が2世紀に建設され4世紀まで栄えた地中海沿岸の古代ギリシャ・ローマの港湾都市「レウカスピス」であると考えている。", "vocab": [{"word": "basilica", "definition": "バシリカ。古代ローマ・ビザンチン時代に建てられた長方形の会堂形式の建築物で、特にキリスト教の教会建築に用いられた様式を指す。"}, {"word": "ostraca", "definition": "オストラカ（単数形：オストラコン）。古代において文字を書き記すために使われた陶器や石板の破片を指す考古学用語。"}, {"word": "sarcophagus", "definition": "石棺。古代において遺体を納めるために使用された石製の棺を指し、特にエジプトやギリシャ・ローマ文化圏で多く見られる。"}, {"word": "amphorae", "definition": "アンフォラ（複数形）。古代ギリシャ・ローマ時代に液体や食料の輸送・保存に使われた、持ち手が両側に付いた細長い陶製の壺。"}, {"word": "tentative list", "definition": "暫定リスト。ユネスコ世界遺産への登録申請を検討している物件を事前に登録しておくリストで、正式な世界遺産登録の前段階として位置づけられる。"}, {"word": "vaulted", "definition": "アーチ型の、ヴォールト天井の。建築用語として、曲線状のアーチや半円形の構造で支えられた天井や屋根を形容する際に使われる。"}, {"word": "funerary", "definition": "葬儀の、埋葬に関する。葬儀や埋葬に関わる慣習・儀式・物品などを形容する際に用いられる形容詞で、考古学・歴史学の文脈でよく使われる。"}]}, {"title_ja": "「状況は壊滅的」―スーダンのエル・オベイドで続くドローン攻撃、援助活動家が証言", "title_en": "Aid Workers Describe Worsening Drone Strikes on Sudan's El Obeid City", "summary_ja": "スーダンの都市エル・オベイドでは、準軍事組織「即応支援部隊（RSF）」によるドローン攻撃が激化し、病院や燃料スタンド、発電所などの重要インフラが破壊されて多数の死者が出ている。援助活動家たちは壊滅的な生活状況を証言しており、昨年エル・ファシェルで起きた民族浄化の再来を懸念する声が高まっている。国連人権高等弁務官は緊急警告を発し、各国首脳に即時行動を呼びかけた。", "summary_en": "The Sudanese city of El Obeid is facing intensifying drone strikes by the paramilitary Rapid Support Forces, killing dozens and destroying critical infrastructure including hospitals, fuel stations, and power facilities. Aid workers describe catastrophic living conditions as fears grow of a repeat of the ethnic cleansing seen in El Fasher. The UN's human rights chief has issued a red alert, urging world leaders to act urgently to prevent atrocity crimes.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/04/el-obeid-aid-workers-sudan-war-drone-strikes", "state_media": false, "category": "政治", "full_text": "Fatima has lost count of the number of drone attacks on the besieged city of El Obeid in Sudan, but said the attacks this past weekend were the most violent so far.\nThe drones hit schools and fuel stations, killing more than 20 people, including students, she said. “Over the past few months, seeing 40 or 45 drones is the norm. You can literally count them,” said the aid volunteer, whose name has been changed for fear of retribution.\nEl Obeid, a city of half a million people, is a key battleground in the war between the Sudanese Armed Forces (SAF) and the paramilitary Rapid Support Forces (RSF). Attacks mounted by the RSF have prompted the UN and other agencies to warn of the risk of atrocities.\nLocated between RSF-held areas in the western Darfur region and army-controlled regions in the east, El Obeid has suffered repeated drone strikes on its infrastructure. The army is fighting to stop the paramilitary group setting up another blockade after a siege in February last year.\nAt least 45 people were killed and 41 injured in 15 drone strikes in the city and surrounding areas from 6 June to 28 June, according to the UN human rights office. There are growing fears of a repeat of the massacre in the city of El Fasher last year, when RSF fighters went on a rampage after capturing the city at the end of an 18-month siege.\nAmnesty International released a report on Wednesday saying the RSF had committed ethnic cleansing and crimes against humanity in its campaign to capture El Fasher. An independent fact-finding mission for the UN had already said the RSF’s seizure of the city showed the “hallmarks of genocide” against non-Arab communities.\nOn Friday, Volker Türk, the UN high commissioner for human rights, addressed delegates in Geneva during an urgent debate of the UN human rights council called by the UK and backed by Germany, Ireland, Norway and the Netherlands.\nHe said: “The signs from El Obeid are clear and unmistakable: another human rights catastrophe is unfolding in Sudan.\n“This is not a drill. It is a red alert that needs to land on the desks of heads of state and government around the world. Their phones should be running hot in the coming days and weeks, with ideas on how to prevent atrocity crimes in El Obeid and in other places in Kordofan.”\nEl Obeid hosts an SAF infantry division and an airbase, in addition to about 100,000 refugees displaced by violence.\nExperts have highlighted significant concentrations of RSF troops around the city and warn of an imminent ground offensive. A report released on Monday by the Yale Humanitarian Research Lab found damage to electricity generation, fuel storage facilities and the main market that was “consistent with intentional bombardment of civilian infrastructure necessary for the sustainment of life”.\nThe report also noted an increase of more than 700 temporary structures at internally displaced persons camps in El Obeid in one month that was “consistent with a recent influx of highly vulnerable civilian populations to the city”.\nIt said the SAF has constructed about 30 miles (50km) of defensive positions – suggesting it expected a siege.\nNohad Eltayeb, a senior research assistant at the Acled conflict monitoring group, said it had recorded 27 drone strikes last month around El Obeid, the highest monthly total since the start of the conflict in 2023.\nIn a audio diary for the Avaaz human rights advocacy group, Fatima spoke of living life on the edge because of drone attacks on hospitals, fuel stations and other facilities. An attack last week struck the city’s main power station, causing blackouts in most of the city, she said. Drones have also hit people gathering to share Starlink internet connections when telecommunications networks are down, she added.\n“I cannot begin to describe how terrible the situation is right now,” Fatima said. “Even the way people talk at funerals is different. Instead of praying for the deceased, they would be talking about how they died.”\nAccording to Fatima, merchants have increased prices, saying their goods are targeted by drones on the way to El Obeid from other parts of the country or simply looted.\nAhlam, a humanitarian worker whose name has also been changed, said residents had become accustomed to pain, loss and fear from constant drone attacks. “In just the past two weeks, nearly every essential service and piece of critical infrastructure has been hit,” she said.\nShe added that some people had considered leaving the city, but attacks on fuel stations had driven up prices, making transport much more expensive. She fears devastating consequences if the conflict escalates, noting the already huge number of displaced people in the city.\nWill Davies, Sudan director at Avaaz, said the drone attacks had created an “extremely dire” situation in El Obeid. He said the city lacked the ethnic dynamics that were a factor in the El Fasher killings and there was unlikely to be a major ground offensive because “the evidence isn’t there in te", "translation_ja": "ファティマはスーダンの包囲都市エル・オベイドへのドローン攻撃の回数を数えるのをあきらめたが、この週末の攻撃はこれまでで最も激しいものだったと語った。\n\nドローンは学校や燃料スタンドを直撃し、生徒を含む20人以上が死亡したという。「ここ数カ月間、40機から45機のドローンが飛来するのは普通のことです。文字通り数えることができるほどです」と、報復を恐れて名前を変えたその援助ボランティアは語った。\n\n50万人が暮らす都市エル・オベイドは、スーダン国軍（SAF）と準軍事組織「即応支援部隊（RSF）」との戦争における重要な戦場となっている。RSFによる攻撃は、国連や他の機関が残虐行為のリスクについて警告を発する事態を招いている。\n\n西部ダルフール地方のRSF支配地域と東部の軍管轄地域の間に位置するエル・オベイドは、インフラへの繰り返しのドローン攻撃にさらされてきた。国軍は、昨年2月の包囲に続いて準軍事組織が新たな封鎖を構築するのを阻止しようと戦っている。\n\n国連人権事務所によると、6月6日から6月28日の間に市内および周辺地域で15回のドローン攻撃があり、少なくとも45人が死亡し41人が負傷した。昨年、18カ月に及ぶ包囲の末にRSF戦闘員が市を占領した後に虐殺が起きたエル・ファシェルの悲劇が繰り返されるのではないかという懸念が高まっている。\n\nアムネスティ・インターナショナルは水曜日、RSFがエル・ファシェル占領の過程で民族浄化と人道に対する罪を犯したとする報告書を発表した。国連の独立した事実調査団もすでに、RSFによる同市の占拠が非アラブ系コミュニティへの「ジェノサイドの特徴」を示していると述べていた。\n\n金曜日、国連人権高等弁務官のフォルカー・テュルク氏は、英国が主導しドイツ、アイルランド、ノルウェー、オランダが支持して国連人権理事会が開催した緊急討論においてジュネーブの代表団に向けて演説した。\n\n同氏は次のように述べた。「エル・オベイドからの兆候は明確で間違いありません。スーダンでまた一つの人権的惨事が進行しています。\n\n「これは訓練ではありません。世界中の国家元首や政府首脳のデスクに届くべき赤色警報です。エル・オベイドやコルドファンの他の地域における残虐犯罪を防ぐための方策について、今後数日から数週間、彼らの電話は引きも切らないはずです。」\n\nエル・オベイドには国軍の歩兵師団と空軍基地があるほか、暴力によって避難した約10万人の難民が暮らしている。\n\n専門家たちは市周辺でのRSF部隊の大規模な集結を指摘し、地上攻撃が差し迫っていると警告している。月曜日にエール大学人道研究所が公表した報告書は、発電設備、燃料貯蔵施設、主要市場への被害が「生活維持に必要な民間インフラへの意図的な爆撃と一致している」と指摘した。\n\nまた同報告書は、エル・オベイドの国内避難民キャンプにおける仮設構造物がわずか1カ月で700棟以上増加したことを記録しており、これは「非常に脆弱な民間人の急激な流入と一致している」としている。\n\n国軍が約50キロメートルに及ぶ防衛陣地を構築していることも判明しており、包囲戦を想定していたことをうかがわせると報告書は指摘した。\n\n紛争監視グループ「アクレッド」のシニア調査アシスタント、ノハド・エルタイエブ氏は、先月エル・オベイド周辺で27回のドローン攻撃を記録したと述べ、これは2023年の紛争開始以来最多の月間記録だと語った。\n\n人権擁護団体アヴァーズのために作成した音声日記の中で、ファティマは病院、燃料スタンド、その他の施設へのドローン攻撃のせいで常に危険と隣り合わせの生活を送っていると語った。先週の攻撃では市の主要発電所が直撃され、市内のほとんどの地域で停電が発生したという。また、通信ネットワークが遮断された際にスターリンクのインターネット接続を共有するために集まっていた人々がドローンに狙われたとも付け加えた。\n\n「今の状況がいかに悲惨かは、とても言葉では言い表せません」とファティマは語った。「葬儀での人々の話し方さえ変わってしまいました。故人への祈りの代わりに、どのように亡くなったかを話しているのです。」\n\nファティマによれば、商人たちは値段を引き上げており、その理由として、国内の他の地域からエル・オベイドへの輸送途中に商品がドローンに狙われるか、あるいは単純に略奪されると訴えているという。\n\n名前を変えた人道支援ワーカーのアフラムは、住民たちが絶え間ないドローン攻撃による痛み、喪失、恐怖に慣れてしまったと語った。「この2週間だけで、ほぼすべての重要なサービスと主要インフラが攻撃を受けました」と彼女は言った。\n\n彼女はまた、市を離れることを考えた人もいるが、燃料スタンドへの攻撃が価格を高騰させ、交通費が大幅に値上がりしていると述べた。彼女は、すでに市内に大勢の避難民がいることを念頭に置きつつ、紛争が拡大した場合の壊滅的な結果を恐れている。\n\nアヴァーズのスーダン担当ディレクター、ウィル・デイビス氏は、ドローン攻撃がエル・オベイドに「極めて深刻な」状況をもたらしていると語った。同市にはエル・ファシェルの殺戮の一因となった民族的緊張がなく、「証拠が示されていない」として大規模な地上攻撃は起こりにくいと述べた。", "vocab": [{"word": "paramilitary", "definition": "正規軍に準じた組織・活動を指す形容詞。国家の正式な軍隊ではないが、軍事的な訓練や装備を持つ武装集団に使われる専門用語。"}, {"word": "atrocities", "definition": "極めて残酷な暴力行為や大規模な人権侵害を指す名詞。戦争犯罪や虐殺など、道義的に許しがたい蛮行に用いられる。"}, {"word": "ethnic cleansing", "definition": "特定の民族・宗教・人種集団を地域から強制排除または殲滅しようとする行為を指す政治・法律用語。ジェノサイドと並んで国際人道法上の重大犯罪とされる。"}, {"word": "hallmarks", "definition": "ある物事や行為に特有の明確な特徴・証拠を指す名詞。元々は金属製品の品質保証刻印を意味し、転じて「典型的な特徴」という意味で広く使われる慣用表現。"}, {"word": "sustainment", "definition": "人や組織が生存・活動を継続するために必要な物資・サービスの供給・維持を指す名詞。軍事・人道支援の分野で多用される専門用語。"}, {"word": "imminent", "definition": "危険や出来事が今にも起ころうとしている差し迫った状態を表す形容詞。特に脅威やリスクの切迫性を強調する文脈で使われる上級語彙。"}, {"word": "rampage", "definition": "制御を失い暴力的・破壊的に荒れ回る行為を指す名詞または動詞。集団や個人が無差別に暴力を振るう場面で用いられる表現。"}]}, {"title_ja": "英国、女性向け高等教育プログラム「SHEFE」を2年で廃止", "title_en": "UK axes £45m women's education programme SHEFE after just two years", "summary_ja": "英国政府は、アフリカ・アジア・中東全域で100万人の女子生徒の就学継続を目指す4500万ポンド規模の「女性エンパワーメントのための高等教育強化（SHEFE）」プログラムを廃止した。批評家らは、この決定がイベット・クーパー外相の女性・女児支援への公約と矛盾すると指摘しており、他の国際教育プログラム削減とも相次いでいる。英国の援助予算は過去最低水準に落ち込む見通しで、専門家は数百万人の子どもたちが教育機会を失うリスクがあると警告している。", "summary_en": "The UK government has cancelled the Strengthening Higher Education for Female Empowerment (SHEFE) programme, a £45m initiative designed to keep 1 million girls in school across Africa, Asia and the Middle East. Critics say the axing contradicts Foreign Secretary Yvette Cooper's stated commitment to women and girls, and follows a series of other cuts to global education programmes. The UK aid budget is set to fall to its lowest level on record, with analysts warning millions more children risk losing access to school.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/04/overseas-education-project-for-women-and-girls-axed-by-uk-after-two-years", "state_media": false, "category": "政治", "full_text": "A leading higher education programme, aimed at keeping 1 million girls in school across Africa, Asia and the Middle East, has been axed by the British government just two years after it was announced.\nThe scheme, Strengthening higher education for female empowerment (SHEFE), which was unveiled with some fanfare two years ago by the outgoing Conservative government, had a £45m budget to increase access to higher education for 1 million students worldwide. It has now had its tender withdrawn, the Foreign, Commonwealth and Development Office (FCDO) said.\nIn May, Yvette Cooper, the foreign secretary, stressed her commitment to women and girls, declaring they were a priority at the FCDO and that she was “determined to work across borders to ensure women’s safety is a worldwide priority”.\nBambos Charalambous, the Labour MP who chairs the all-party parliamentary group on global education, said he was concerned. “I’m alarmed that a flagship higher education programme designed to empower women and girls and help them achieve their potential appears to have been scrapped because of the aid cuts,” he said.\n“FCDO has acknowledged how such partnerships can transform lives, while also benefiting institutions here at home. It is vital to start thinking now about how to build back from the aid cuts to save similar projects.”\nThe programme was designed in part because girls who benefit from higher education are up to six times less likely to marry as children and are less likely to experience violence from a partner. Women who have advanced levels of learning also increase their earnings.\nPeople working in the international development and education sectors claimed the move to axe SHEFE was the latest decision to severely undermine the UK’s professed commitment to women and girls.\nThe Home Office has blocked new study visas for applicants from Afghanistan, Sudan, Myanmar and Cameroon, meaning many women whose opportunities to study in their own countries were restricted will miss out on life-changing opportunities. British universities earn large amounts of money from foreign students, who pay much higher fees than UK-born students.\nJoseph Nhan-O’Reilly, co-founder of the International Parliamentary Network for Education, said: “The government talks up its commitment to women and girls but at every turn it denies the world’s most marginalised girls the thing that everyone agrees has the biggest impact on their lives and that of their communities: access to higher education.”\nEarlier this year, the FCDO announced it was cancelling the tender for its planned Education for All programme in South Sudan, Nhan-O’Reilly said. The £150m scheme had been designed to support the education of girls and children with disabilities in one of the world’s poorest countries, with one of the highest rates of children out of education and the world’s fourth-lowest literacy rate.\nLast year, Charalambous wrote in the Independent that a UK programme in the Democratic Republic of the Congo, which had seen tens of thousands of girls going to school for the first time, was being abandoned. Educational work was also cut in Ethiopia, Sierra Leone, Nigeria and Zimbabwe, and the FCDO Girls’ Education Department lost 51% of its funding.\nA spokesperson at Bond, a UK network for organisations working in international development and humanitarian aid, said: “Any cuts to programmes that support women and girls, including through education, threaten to reverse hard-won progress on ending gender-based violence and exploitation, and advancing gender equality worldwide.\n“Last year, polling by More in Common found the majority of the UK public wanted programmes that protect women and girls’ safety to be shielded from cuts to the UK aid budget. We urge the foreign secretary to uphold her commitment to prioritising the safety, human rights and economic opportunity of women and girls around the world.”\nAccording to analysis by Unicef, international aid to education is projected to fall by $3.2bn (£2.4bn) by 2026 – a 24% drop. It estimated that 6 million more children risk being out of school by the end of the year, with 30% of them in humanitarian settings. This is equivalent to emptying every primary school in Germany and Italy combined.\nThe UK had previously been one of the champions of global education, said Nhan-O’Reilly, and the cuts announced last year closely followed those in the US. “These cuts can’t be seen on their own; they’ve set the tone and influenced the posture and level of commitment from many other donors,” he said.\nThe prime minister, Keir Starmer, announced last year that the UK aid budget would be cut from 0.5% of gross national income to 0.3% in 2027, its lowest level since records began. The UN target is for countries to give 0.7%, something the Conservative former prime minister David Cameron pledged to do in 2012 despite protests from his own party.\nThe cut in 2025 was a reversal of Labour manifesto pledges and led to the resignation of Ann", "translation_ja": "アフリカ・アジア・中東全域で100万人の女子生徒の就学継続を目指す主要な高等教育プログラムが、英国政府によって発表からわずか2年で廃止された。\n\n「女性エンパワーメントのための高等教育強化（SHEFE）」と呼ばれるこの制度は、2年前に退任した保守党政権によって大々的に発表されたもので、世界中の100万人の学生の高等教育へのアクセスを拡大するために4500万ポンドの予算が充てられていた。外務・英連邦・開発省（FCDO）は、入札が取り下げられたと発表した。\n\n5月、外務大臣のイベット・クーパーは女性・女児への支援に対する自らの決意を強調し、彼女たちをFCDOの最優先課題と位置づけ、「女性の安全が世界的な優先事項となるよう、国境を越えて取り組む決意がある」と宣言していた。\n\n国際教育に関する全党議会グループの議長を務める労働党議員バンボス・カラランブーは懸念を示した。「女性・女児のエンパワーメントを目的とし、彼女たちの潜在能力の発揮を支援するために設計された旗艦的な高等教育プログラムが、援助削減を理由に廃止されたことに強い懸念を覚える」と述べた。\n\n「FCDOは、こうしたパートナーシップが人々の生活を変え、国内の機関にも恩恵をもたらすことを認めている。援助削減の影響から立て直し、同様のプロジェクトを救うための方策を、今すぐ考え始めることが不可欠だ。」\n\nこのプログラムは、高等教育を受けた女子は児童婚に至る可能性が最大6分の1に低下し、パートナーからの暴力を受けにくくなるという事実を背景に設計されていた。また、高度な教育を受けた女性は収入も増加する。\n\n国際開発・教育分野で働く関係者は、SHEFEの廃止は英国が公言してきた女性・女児への支援という姿勢を著しく損なう最新の決定だと主張した。\n\n内務省はアフガニスタン、スーダン、ミャンマー、カメルーンからの新規留学ビザを停止しており、自国での就学機会が制限された多くの女性が人生を変えるチャンスを失っている。英国の大学は留学生から多額の収益を得ており、留学生は英国出身の学生よりもはるかに高い授業料を支払っている。\n\n国際議員教育ネットワークの共同創設者であるジョセフ・ナン=オライリーは言う。「政府は女性・女児への支援を声高に掲げているが、あらゆる場面で、世界で最も疎外された女子たちから、誰もが彼女たちとその地域社会にとって最大の効果があると認める唯一のもの、すなわち高等教育へのアクセスを奪い続けている。」\n\n今年初め、FCDOは南スーダンで計画していた「万人のための教育」プログラムの入札取り消しを発表した、とナン=オライリーは述べた。1億5000万ポンドのこの計画は、学校に通えない子どもの割合が極めて高く、世界で4番目に識字率が低い最貧国の一つで、女子や障害を持つ子どもたちの教育支援を目的としていた。\n\n昨年、カラランブーはインディペンデント紙への寄稿で、コンゴ民主共和国における英国プログラムが廃止されようとしていると書いた。このプログラムでは数万人の女子が初めて学校に通うようになっていた。エチオピア、シエラレオネ、ナイジェリア、ジンバブエでも教育支援活動が削減され、FCDOの女子教育部門は51%の予算削減を受けた。\n\n国際開発・人道支援分野の英国団体ネットワーク「ボンド」のスポークスパーソンは次のように述べた。「教育を含め、女性・女児を支援するプログラムへのあらゆる削減は、ジェンダーに基づく暴力や搾取の根絶、世界的なジェンダー平等の推進において積み重ねてきた成果を逆行させる恐れがある。\n\n「昨年、モア・イン・コモンが実施した世論調査では、英国国民の大多数が、女性・女児の安全を守るプログラムは英国援助予算の削減から守られるべきだと望んでいることが明らかになった。私たちは外務大臣に対し、世界中の女性・女児の安全、人権、経済的機会を優先するという約束を守るよう求める。」\n\nユニセフの分析によると、国際的な教育援助は2026年までに32億ドル（24億ポンド）、24%減少すると予測されている。年末までにさらに600万人の子どもが就学できなくなるリスクがあり、そのうち30%が人道的危機の状況下にあると推定している。これはドイツとイタリア全土の小学校を合わせた規模に相当する。\n\n英国はかつて国際教育の旗手の一つだったと、ナン=オライリーは述べる。昨年発表された削減は米国の削減の直後に続いており、「これらの削減は単独では見られない。多くの他のドナー国の姿勢や支援水準に対し、一つのトーンを設定し影響を与えてきた」と彼は言う。\n\n首相のキア・スターマーは昨年、英国の援助予算を2027年までに国民総所得の0.5%から過去最低となる0.3%に削減すると発表した。国連の目標は各国が0.7%を拠出することであり、保守党の前首相デイビッド・キャメロンは党内の反発にもかかわらず2012年にこれを公約していた。\n\n2025年の削減は労働党のマニフェストの公約を覆すものであり、アン（記事はここで途切れている）の辞任につながった。", "vocab": [{"word": "fanfare", "definition": "大々的な宣伝や華々しい発表のこと。何かを印象的に世間に知らせる際に用いられる表現で、「with some fanfare（大々的に）」という形でよく使われる。"}, {"word": "tender", "definition": "入札・調達手続きのこと。政府や機関が特定の事業を外部組織に委託する際に行う公式な募集プロセスを指す。「withdraw a tender（入札を取り下げる）」のように使われる。"}, {"word": "empowerment", "definition": "エンパワーメント。個人やグループが自らの生活や環境をコントロールする力を与えられること。特に社会的弱者の権利拡大や自立支援の文脈で頻繁に用いられる。"}, {"word": "professed", "definition": "公言された・表向きの、という意味の形容詞。実態と乖離している可能性を示唆するニュアンスを持つことが多く、「professed commitment（公言されているにすぎない約束）」のように批判的文脈で使われる。"}, {"word": "marginalised", "definition": "社会的・経済的に周縁化された、疎外されたという意味。主流の社会や意思決定から排除された集団を指す際に使われる重要な社会科学用語。"}, {"word": "humanitarian", "definition": "人道的な、または人道支援に関連する、という意味の形容詞。紛争・災害・貧困などの緊急状況において人々の基本的ニーズを満たす活動を指す文脈で使われる。"}, {"word": "posture", "definition": "（政治・外交上の）姿勢・立場・態度のこと。物理的な姿勢だけでなく、国家や組織が特定の問題に対してとる方針や態度を比喩的に表す上級語彙。"}]}, {"title_ja": "シリア、移行期議会の初会合を理由を示さず延期", "title_en": "Syria postpones inaugural transitional parliament session with no reason given", "summary_ja": "シリア当局は、月曜日に予定されていた新たな移行期議会の初会合を無期限に延期した。アハメド・アル・シャラア大統領が一部を任命した210議席の議会は、30か月の任期中に新たな選挙法を起草することを使命としている。ドルーズ派が多数を占むスウェイダ州では、昨年の宗派間暴力の影響で議員の選出がまだ完了しておらず、延期の一因となっている。", "summary_en": "Syrian authorities have indefinitely postponed the first session of the newly formed transitional parliament, which had been scheduled for Monday. The 210-member body, partially appointed by President Ahmed al-Sharaa, is tasked with drafting a new elections law over its 30-month term. The delay comes as Druze-majority Suwayda province has yet to designate its members following sectarian violence.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/5/syria-delays-first-session-of-transitional-parliament-without-explanation?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "Syria delays first session of transitional parliament without explanation\nThe transitional parliament aims to draft a new elections law during its 30-month term.\nSyrian authorities have postponed the first meeting of the new transitional parliament, days after announcing the inaugural session had been scheduled for Monday.\n“The convening of the first session of the people’s assembly has been postponed to a date to be determined later,” state television reported on Sunday, citing an electoral official and without specifying a reason.\nRecommended Stories\nlist of 3 items- list 1 of 3Syrians reject Trump’s call for Syria to combat Hezbollah in Lebanon\n- list 2 of 3Syria frees activist Hassan Akkad days after he was detained\n- list 3 of 3Netanyahu: ‘We will remain in Lebanon, Syria, and Gaza as long as required’\nSyria’s new authorities dissolved the country’s rubber-stamp legislature after toppling longtime ruler Bashar al-Assad in December 2024, following almost 14 years of civil war which killed about half a million people.\nIn March 2025, new President Ahmed al-Sharaa signed a temporary constitution that will be in force for a five-year transitional period.\nIn October, local committees appointed by the electoral commission, which was in turn appointed by al-Sharaa, began selecting two-thirds of the 210 members of the new parliament, with Sharaa to appoint the remaining third.\nHe appointed 70 members this week.\nDruze-majority Suwayda province in the south has still not designated its members, after sectarian bloodshed there last year.\nElectoral authorities have said the selection process would be held there when conditions are “appropriate”.\nThe selection process was held in formerly Kurdish-run areas of the north and northeast earlier this year after authorities in the capital Damascus assumed control there and signed a deal on integrating Kurdish institutions into the state.\nThe new parliament will have a 30-month term and work on a new elections law while preparing the ground for a popular vote, according to the head of the electoral committee, Mohammed Taha al-Ahmad.", "translation_ja": "シリア、移行期議会の初会合を理由を示さず延期\n\n移行期議会は30か月の任期中に新たな選挙法を起草することを目指している。\n\nシリア当局は、初会合が月曜日に予定されていると発表してから数日後、新たな移行期議会の初会合を延期した。\n\n「国民議会の初会合は、追って定める日程に延期された」と、国営テレビは日曜日、選挙当局者の発言を引用し、理由を明示することなく報じた。\n\nシリアの新当局は、2024年12月に長期独裁者バシャール・アル・アサドを打倒した後、同国のお飾りに過ぎなかった立法府を解散した。この政変に至るまで約14年間の内戦が続き、およそ50万人が命を落とした。\n\n2025年3月、新大統領アハメド・アル・シャラアは、5年間の移行期間中に効力を持つ暫定憲法に署名した。\n\n10月には、アル・シャラアによって任命された選挙委員会が指名した地方委員会が、新議会の210議席のうち3分の2にあたる議員の選出を開始した。残りの3分の1はシャラア大統領が任命することになっており、同大統領は今週、70名の議員を任命した。\n\n南部にあるドルーズ派が多数を占めるスウェイダ州では、昨年の宗派間流血事件を受け、いまだ議員が選出されていない。選挙当局は、同州での選出手続きは状況が「適切」になった時点で行われると述べている。\n\n北部および北東部のかつてクルド人が統治していた地域では、首都ダマスカスの当局がその支配権を引き継ぎ、クルド人機関を国家に統合する協定に署名した後、今年初めに選出手続きが実施された。\n\n選挙委員会委員長のモハメド・タハ・アル・アフマド氏によると、新議会の任期は30か月で、国民投票の地ならしをしながら新たな選挙法の策定に取り組む予定だという。", "vocab": [{"word": "inaugurate", "definition": "（新しい制度・建物・役職などを）正式に開始・発足させること。「inaugural session」で「初회合・開会式」を意味し、公式な開始を強調するフォーマルな表現。"}, {"word": "transitional", "definition": "ある状態から別の状態へと移行する期間に関わることを指す形容詞。政治文脈では「移行期の」と訳され、暫定的な制度や政府を表す際に使われる。"}, {"word": "topple", "definition": "権力者や政権を力によって打倒・失脚させることを意味する動詞。政治ニュースで「政権を崩壊させる」という意味でよく用いられるインフォーマルな表現。"}, {"word": "sectarian", "definition": "宗教的・宗派的な派閥や対立に関係する形容詞。「sectarian violence（宗派間暴力）」のように、異なる宗教・民族集団間の争いを表す文脈で頻繁に使用される。"}, {"word": "designate", "definition": "特定の役割・地位・目的のために人や物を公式に指名・指定することを意味する動詞。「appoint」よりも選定・識別のニュアンスが強い。"}, {"word": "integrating", "definition": "「integrate」の動名詞形で、異なる組織・集団・制度を一つの統合された全体に組み込む過程を指す。政治・社会文脈では機関の統合や編入を表す。"}, {"word": "rubber-stamp", "definition": "形式的に承認するだけで実質的な審議・権限を持たない機関や行為を指す慣用表現。「rubber-stamp legislature」は「お飾りの議会」を意味する。"}]}, {"title_ja": "ルクレール、セーフティカー終了のイギリスGPで優勝―アントネッリは機械トラブルで失速", "title_en": "Leclerc wins British GP behind safety car as Antonelli suffers mechanical failure", "summary_ja": "シャルル・ルクレールが2026年F1イギリスGPでフェラーリに通算250勝目をもたらし、セーフティカー先導のまま優勝した。ジョージ・ラッセルが2位、フォールスタートのペナルティを受けたルイス・ハミルトンが3位でフィニッシュした。選手権首位のキミ・アントネッリはブレーキ冷却系のトラブルに見舞われ、16位に終わった。", "summary_en": "Charles Leclerc claimed victory at the 2026 British Grand Prix at Silverstone, giving Ferrari their 250th win, as the race ended under a safety car. George Russell finished second while Lewis Hamilton took third for Ferrari, despite receiving a penalty for a false start. Championship leader Kimi Antonelli was forced to retire effectively after a brake cooling issue dropped him to 16th place.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/7/5/charles-leclerc-wins-f1-british-grand-prix-behind-the-safety-car?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Charles Leclerc wins F1 British Grand Prix behind the safety car\nCharles Leclerc collects his first victory of the 2026 F1 season after late safety car confusion in the final laps.\nCharles Leclerc gave Ferrari their 250th Grand Prix victory when he won a gripping British GP at Silverstone which ended under a safety car on Sunday as championship leader Kimi Antonelli missed out on a top 10 finish.\nAntonelli’s Mercedes teammate and championship rival George Russell came through to take second place while Lewis Hamilton in the other Ferrari crossed the line in third.\nRecommended Stories\nlist of 4 items- list 1 of 4All eyes on the Azteca: Mexico, England clash in blockbuster World Cup tie\n- list 2 of 4Brazil look to overcome Norway hoodoo in World Cup last 16 clash\n- list 3 of 4World Cup 2026 Day 25: Round of 16 schedule and predictions\n- list 4 of 4Cape Verde celebrates team’s return after historic World Cup\nHamilton, a nine-time Silverstone winner, was later put under investigation for a yellow flag infringement, having already served a five-second penalty for a false start.\nAntonelli, who won the sprint on Saturday, still leads the title race with 179 points, 25 ahead of Russell with Hamilton a further seven points back in third.\nIt was Leclerc’s ninth grand prix victory and first since he won the United States GP in Austin in October 2024, and puts him fourth in the championship with 108 points.\n“Finally, this one feels particularly good,” said Leclerc over the radio after taking the chequered flag.\n“I wish for a bit more normal ending. Hard work paid off, hard times never last, only tough people last.”\nAntonelli began on pole but was overtaken by both Ferraris at the start before battling back to make it a dogfight with Leclerc.\nOn lap 42 of 52 the 19-year-old Italian reported a problem and was forced into the pits.\nWhen he came out he limped on before returning to the pits where the mechanics removed a brake cooling inlet. It didn’t help him and, combined with a five-second penalty, he could only finish 16th.\nMax Verstappen looked a dead cert for the podium, running a strong third when his Red Bull flew off the track and into the gravel on lap 48 of 52.", "translation_ja": "シャルル・ルクレール、セーフティカー先導でF1イギリスGPを制す\n\nシャルル・ルクレールは2026年F1シーズン初勝利を収めた。最終ラップで生じたセーフティカーをめぐる混乱の末、劇的な幕切れとなった。\n\nシャルル・ルクレールは日曜日、シルバーストーンで行われた手に汗握るイギリスGPを制し、フェラーリに通算250勝目をもたらした。レースはセーフティカー先導のまま終了し、選手権首位のキミ・アントネッリはトップ10入りを逃す結果となった。\n\nアントネッリのメルセデスチームメイトであり選手権争いのライバルでもあるジョージ・ラッセルが2位に浮上し、もう一台のフェラーリに乗るルイス・ハミルトンが3位でチェッカーフラッグを受けた。\n\nシルバーストーンで9勝を挙げているハミルトンは、フォールスタートによる5秒加算ペナルティをすでに受けていたうえ、その後イエローフラッグ違反の疑いで審議対象となった。\n\n土曜日のスプリントレースを制していたアントネッリは依然として選手権首位を守り、獲得ポイントは179点。ラッセルに25点差、さらにその7点後方にハミルトンが3位につけている。\n\nルクレールにとってこれは9度目のGP優勝であり、2024年10月のアメリカGP（オースティン）以来の勝利となった。これによりルクレールは108点でチャンピオンシップ4位に浮上した。\n\n「ようやく勝てた。この勝利は格別だ」とルクレールはチェッカーフラッグを受けた後、無線で喜びを語った。\n「もう少し普通の終わり方を望んでいたが、努力は必ず報われる。苦しい時代はいつまでも続かない。逞しい人間だけが生き残るんだ。」\n\nポールポジションからスタートしたアントネッリだったが、スタート直後に両フェラーリに抜かれ、その後ルクレールとの激しい争いを繰り広げた。\n\n52周のレース42周目、19歳のイタリア人ドライバーはトラブルを報告し、ピットへの緊急入庫を余儀なくされた。\n\nコースに戻った後もマシンは思うように走れず、再度ピットイン。メカニックがブレーキ冷却インレットを取り外したものの効果はなく、5秒加算ペナルティも重なり、最終的に16位でフィニッシュするにとどまった。\n\n一方、マックス・フェルスタッペンは52周中48周目まで3位を走行しており、表彰台はほぼ確実かと思われたが、レッドブルがグラベルに飛び込んでリタイアとなった。", "vocab": [{"word": "gripping", "definition": "（観客や読者を）引きつけて離さないほど緊張感・興奮があるさま。「a gripping race」で「手に汗握るレース」を意味し、スポーツ報道でよく使われる形容詞。"}, {"word": "infringement", "definition": "規則・法律・権利などの違反や侵害を指す名詞。F1では「yellow flag infringement（イエローフラッグ違反）」のように規則違反の文脈で用いられる。"}, {"word": "inlet", "definition": "液体や空気を取り込む入口・吸気口を指す技術用語。ここでは「brake cooling inlet（ブレーキ冷却インレット）」として冷却空気をブレーキに導く部品を意味する。"}, {"word": "dogfight", "definition": "もとは航空機同士の近接空中戦を意味するが、転じて激しい接戦や熾烈な争いを表す比喩的表現として広く使われる。"}, {"word": "chequered flag", "definition": "モータースポーツでレース終了を示す白黒市松模様の旗。「take the chequered flag」でゴールを切る・優勝するという意味のイディオム。"}, {"word": "limped", "definition": "本来「足を引きずって歩く」を意味するが、機械・車両が不具合を抱えながらどうにか動き続ける様子を表す比喩表現としても使われる。"}]}, {"title_ja": "拘束されたパレスチナ人被拘禁者の写真、ガザの2人の母親に苦悩をもたらす", "title_en": "Photo of Abused Palestinian Detainee Causes Anguish for Two Gaza Mothers", "summary_ja": "目隠しをされ、厳しく拘束されたパレスチナ人被拘禁者を写した流出写真が、ガザの2人の母親に深い苦悩をもたらしている。それぞれの母親は、写真の男性が自分の行方不明の息子だと確信している。イスラエル軍は写真の真正性を認め調査中と述べたが、被拘禁者の身元や収容場所は明らかにしていない。この事件は、物議を醸す法律の下でイスラエルに拘束されているガザ出身のパレスチナ人約1,200人を巡るより広い危機を浮き彫りにしている。", "summary_en": "A leaked photo showing a blindfolded, severely restrained Palestinian detainee has devastated two Gaza mothers, each convinced the man is her own missing son. The Israeli military confirmed the image is genuine and said an inquiry is underway, but has not identified the detainee or disclosed his location. The case highlights a broader crisis surrounding some 1,200 Palestinians from Gaza currently held in Israel under a controversial law allowing unlimited detention.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/features/2026/7/5/photo-of-abused-palestinian-detainee-sparks-anguish-for-two-gaza-mothers?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Photo of abused Palestinian detainee causes anguish for two Gaza mothers\nDisturbing image showing restrained detainee adds to agony of two mothers, each of whom is certain the man is her own missing son.\nA leaked photograph showing a Palestinian detainee blindfolded, stripped to his underwear and severely restrained has caused anguish for two mothers in Gaza.\nWhile the Israeli military has acknowledged the photo is genuine, it has not identified the man or disclosed where he is being held.\nThat has added to the agony of the two mothers, Rana Abu Nassar and Joudeh Al-Ghou, each of whom is absolutely certain that the man being mistreated is her missing son.\nThe photo was originally posted on Instagram by a user whose account appears to have since been deleted. It featured the words “good morning” written in Hebrew.\nIn the screenshot, which had the words “good morning” in Hebrew written over it, the man’s hands are bound behind his back, his right foot tied to the bottom corner of a cot. A wooden rod is bound to the back of his body, running from his right foot up to his neck. His face is mostly obscured.\nThe Israeli military said it had identified the incident and that an inquiry was under way. A spokesperson quoted by Reuters said that “those involved will be dealt with in accordance with the findings” and said that the treatment depicted in the photo “does not align” with the military’s values.\nAbu Nassar said that from the moment she saw the photo two days ago, she knew it was her son Osama.\n“I know the details of his body. He has swelling in his foot and scars on his leg – the same swelling on his left leg I saw in the picture,” she told Reuters.\nShe said that was the first image of him she had seen since he was arrested in March in an area near the so-called “Yellow Line”, demarcating Israeli control within Gaza.\nHis arrest on March 19 gained international attention because he was detained along with his one-year-old child, who was released the same day with what his family said were cigarette burn marks on his legs.\nHis mother said Osama suffers from mental health issues and that a “normal person would not take his son to that area” near the “Yellow Line” where Israeli forces frequently open fire on Palestinians.\nIsrael’s military rejected allegations that its forces abused Osama’s son. It said the marks on the boy’s legs were the result of warning shots troops fired to compel Osama not to approach the “Yellow Line.”\nJoudeh Al-Ghoul, whose son Ameen was arrested in November 2023 while trying to travel from southern Gaza to the enclave’s north, also said she recognised the man in the image from the moment she saw it.\n“It’s him – his hair and chin. He is my son. A mother’s heart can recognise her son. I hugged the mobile phone and started crying,” she told Reuters from a displaced persons camp in Gaza City. “He is my son, my soul, my life.”\nThe families’ plight highlights a broader crisis facing Palestinians in Israeli custody. Currently, some 1,200 Palestinians from Gaza are being held in Israel under the Internment of Unlawful Combatants Law.\nThe controversial law allows for the unlimited detention of individuals suspected of participating, directly or indirectly, in hostile acts.\nAmani Sarahneh of the Palestinian Prisoners Society said that since the image’s release the organisation has submitted both men’s names to the military in order to try to get lawyer visits with them.\n“Visits do take place, but with great difficulty. The coordination process takes a very long time,” Sarahneh said.", "translation_ja": "パレスチナ人被拘禁者虐待写真、ガザの2人の母親に苦悩をもたらす\n\n目隠しをされ、下着姿にされ、厳しく拘束されたパレスチナ人被拘禁者を写した流出写真が、ガザの2人の母親に深い苦悩をもたらしている。\n\nイスラエル軍はこの写真が本物であることを認めたが、男性の身元を明かしておらず、どこに収容されているかも公表していない。\n\nこのことが、2人の母親ラナ・アブ・ナッサルとジューデ・アル・グールの苦悩をさらに深めている。2人はそれぞれ、虐待を受けている男性が自分の行方不明の息子だと絶対的な確信を持っている。\n\nこの写真はもともと、現在アカウントが削除されたとみられるインスタグラムのユーザーによって投稿されたもので、ヘブライ語で「おはよう」という言葉が書き添えられていた。\n\nそのスクリーンショットには、ヘブライ語の「おはよう」という文字が重ねられており、男性は両手を後ろ手に縛られ、右足がコットの端に縛り付けられている。木製の棒が右足から首まで体の背面に沿って固定されており、顔はほぼ隠されている。\n\nイスラエル軍はこの事案を把握しており、調査が進行中だと述べた。ロイター通信が引用した広報担当者によると、「関係者は調査結果に基づいて対処される」とし、写真に写っている扱いは軍の価値観と「一致しない」と述べた。\n\nアブ・ナッサルは、2日前にこの写真を見た瞬間から、男性が息子のオサマだとわかったと語った。\n\n「私は息子の体の細部を知っている。足に腫れがあり、足に傷跡がある。写真で見た左足と同じ腫れだ」と彼女はロイターに語った。\n\n彼女によると、オサマが3月にガザ内のイスラエルの支配区域を区切るいわゆる「イエローライン」付近で逮捕されて以来、息子の写真を見たのはこれが初めてだという。\n\n3月19日の逮捕は、生後1歳の子どもと共に拘束されたことで国際的な注目を集めた。子どもは同日釈放されたが、家族によると足にタバコの火傷の痕があったという。\n\n母親によると、オサマは精神的な問題を抱えており、「正常な人間ならば、イスラエル軍がパレスチナ人に向けて頻繁に発砲する『イエローライン』付近に息子を連れて行くはずがない」と述べた。\n\nイスラエル軍は、部隊がオサマの息子を虐待したという疑惑を否定した。男の子の足の傷は、オサマが「イエローライン」に近づかないようにするために発砲した警告射撃によるものだと軍は説明した。\n\n息子のアミーンが2023年11月にガザ南部から北部へ移動しようとした際に逮捕されたというジューデ・アル・グールも、写真を見た瞬間から男性が自分の息子だとわかったと語った。\n\n「間違いなく彼だ。髪と顎が彼のものだ。息子だ。母親の心は我が子を見分けることができる。携帯電話を抱きしめて泣き始めた」と彼女はガザ市内の避難民キャンプからロイターに語った。「彼は私の息子、私の魂、私の命だ。」\n\n2家族の苦境は、イスラエルに拘束されているパレスチナ人が直面するより広い危機を浮き彫りにしている。現在、ガザ出身のパレスチナ人約1,200人が「非合法戦闘員拘禁法」に基づいてイスラエルで拘束されている。\n\nこの物議を醸す法律は、敵対行為に直接的または間接的に参加したと疑われる個人を無期限に拘禁することを認めている。\n\nパレスチナ人囚人協会のアマニ・サラーネは、写真が公開されて以来、同組織は弁護士との面会を実現しようと両名の名前をイスラエル軍に提出したと述べた。\n\n「面会は行われているが、非常に困難を伴う。調整のプロセスに非常に長い時間がかかる」とサラーネは語った。", "vocab": [{"word": "restrained", "definition": "物理的に動けないよう拘束された状態を指す。ここでは被拘禁者が縄などで縛られている状況に使われており、法的・医療的な文脈でも用いられる形容詞。"}, {"word": "demarcating", "definition": "境界線を引いて区画・区分することを意味する動詞demarcateの現在分詞形。地理的・政治的な境界の画定を表す際に使われる専門的な表現。"}, {"word": "internment", "definition": "特に戦時や安全保障上の理由による、正式な裁判なしの拘禁・抑留を指す名詞。主に政治的・軍事的文脈で用いられる上級語彙。"}, {"word": "unlawful combatants", "definition": "国際法上の正規の戦闘員としての地位を持たないとされる武装勢力の構成員を指す法律用語。捕虜条約の保護が適用されない場合があるとして議論を呼ぶ概念。"}, {"word": "plight", "definition": "危機的・悲惨な状況や苦境を表す名詞。単なる困難ではなく、深刻で同情を引くような状況に用いられるやや文語的な語。"}, {"word": "inquiry", "definition": "公式な調査・審問を指す名詞。特に組織や政府機関が行う正式な調査手続きを表す際に使われる、ニュース・法律文書でよく見られる語。"}, {"word": "coordination", "definition": "複数の当事者や機関の間での活動・手続きを調整・連携させることを指す名詞。外交・行政・医療など幅広い分野で使われるTOEIC頻出の上級語彙。"}]}, {"title_ja": "インド、グワハティでBRICS麻薬対策機関長会議を主催", "title_en": "India to Host BRICS Anti-Drug Agency Heads Meeting in Guwahati", "summary_ja": "インドは2026年7月6日から2日間、グワハティでBRICS麻薬対策機関長会議を主催する。麻薬取締局（NCB）が主催するこの会議では、合成薬物の拡散、情報共有、ダークネットを利用した密売、暗号通貨を用いた資金移動などが議題となる。会議はBRICS加盟11か国による共同宣言の採択をもって締めくくられる予定だ。", "summary_en": "India will host a two-day BRICS Heads of Anti-Drug Agencies meeting in Guwahati starting July 6, 2026, organized by the Narcotics Control Bureau. The meeting will address synthetic drug proliferation, intelligence sharing, darknet trafficking, and cryptocurrency-based financial flows. The gathering will conclude with the adoption of a joint declaration among the 11 BRICS member nations.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/national/india-to-host-two-day-brics-anti-drugs-meet/article71186105.ece", "state_media": false, "category": "社会", "full_text": "India will host the two-day BRICS Heads of Anti-Drug Agencies meeting in Guwahati from Monday (July 6, 2026). Organised by the Narcotics Control Bureau (NCB), the meeting will focus on issues such as combating synthetic drugs, strengthening intelligence sharing and operational coordination, and capacity building and institutional cooperation.\n“India envisions this meeting as a pivotal step in transforming BRICS cooperation from dialogue-centric engagement to structured and action-oriented collaboration, with a focus on strengthening operational coordination, intelligence sharing, capacity building, and collective responses to emerging drug-related threats,” the Union Home Ministry said in a statement.\nHighlighting emerging transnational challenges such as proliferation of synthetic drugs, new psychoactive substances, darknet-enabled trafficking, and cryptocurrency-based financial flows, the Ministry noted: “At the same time, advances in interdiction technologies, data analytics, and financial intelligence present significant opportunities for enhanced international cooperation and coordinated enforcement action.”\nAt the meeting, India will showcase its efforts to combat the drug menace. “Over the past few years, India has significantly strengthened its fight against drug trafficking and substance abuse. While the government is taking stringent action against illicit drug trafficking and the organised criminal networks, it is also placing equal emphasis on awareness generation, community participation and treatment for those affected by addiction,” said the Ministry.\nOn the lines of its whole-of-government and network-centric approaches, India has recently released the Vision Document on Narcotics Control (2026-2029) to further strengthen institutional capacity in the fight against drugs.\n“As chair, New Delhi will seek to strengthen cooperation through information sharing on clandestine laboratories and emerging synthetic drug trends, enhanced monitoring of precursor chemicals and pharmaceuticals, intelligence exchange, sharing of best practices, joint training programmes and expert exchanges,” the Ministry said.\nThe meeting will culminate with the adoption of a joint declaration.\nBRICS comprises 11 major emerging markets and developing countries of the world: India, China, Brazil, Russia, Egypt, Ethiopia, Indonesia, Iran, Saudi Arabia, South Africa, and the United Arab Emirates.\nPublished - July 05, 2026 09:15 pm IST", "translation_ja": "インドは月曜日（2026年7月6日）からグワハティにおいて、2日間のBRICS麻薬対策機関長会議を主催する。麻薬取締局（NCB）が主催するこの会議では、合成薬物への対処、情報共有と作戦調整の強化、能力構築と制度的協力などの問題に焦点が当てられる。\n\n「インドはこの会議を、BRICSの協力体制を対話中心の関与から、作戦調整の強化、情報共有、能力構築、そして新たな薬物関連の脅威への集団的対応に重点を置いた、体系的かつ行動志向の協力へと転換するための重要な一歩と位置づけている」と、連邦内務省は声明の中で述べた。\n\n内務省は、合成薬物や新向精神性物質の拡散、ダークネットを利用した密売、暗号通貨を用いた資金移動といった新たな国際的課題を強調しつつ、「同時に、摘発技術、データ分析、金融インテリジェンスの進歩は、国際協力の強化と協調した取締り活動に向けた重要な機会をもたらしている」と指摘した。\n\n会議では、インドが薬物問題への取り組みを紹介する。「ここ数年、インドは麻薬密売と薬物乱用への対処を大幅に強化してきた。政府は非合法の麻薬密売や組織犯罪ネットワークに対して厳格な措置を講じる一方、啓発活動、地域社会の参加、そして依存症に苦しむ人々への治療にも同等の重点を置いている」と内務省は述べた。\n\n全省庁横断的アプローチとネットワーク中心型アプローチの方針に沿って、インドは近年、麻薬対策における制度的能力をさらに強化するため、「麻薬取締ビジョン文書（2026〜2029年）」を公表した。\n\n「議長国として、ニューデリーは、秘密薬物製造施設と新たな合成薬物動向に関する情報共有、前駆物質化学品および医薬品の監視強化、情報交換、優良事例の共有、合同訓練プログラム、専門家交流を通じて協力関係の強化を図る」と内務省は述べた。\n\n会議は共同宣言の採択をもって締めくくられる予定だ。\n\nBRICSは、インド、中国、ブラジル、ロシア、エジプト、エチオピア、インドネシア、イラン、サウジアラビア、南アフリカ、アラブ首長国連邦の11の主要新興市場国・途上国で構成されている。\n\n掲載：2026年7月5日午後9時15分（IST）", "vocab": [{"word": "interdiction", "definition": "（麻薬・武器などの）阻止・摘発を意味する専門用語。特に法執行機関が違法物資の輸送を阻止する活動を指す。"}, {"word": "proliferation", "definition": "急速な拡散・増殖を意味する語。ここでは合成薬物が広範囲に広がる現象を指しており、主に危険なものの急増を表す文脈で用いられる。"}, {"word": "psychoactive", "definition": "脳や精神に作用する（物質）を意味する形容詞で、主に薬理学・薬物政策の文脈で用いられる専門用語。"}, {"word": "precursor", "definition": "前駆物質・前兆を意味する語。ここでは麻薬の合成に使用される化学原料（前駆化学物質）を指す専門的用法。"}, {"word": "clandestine", "definition": "秘密裏に行われる・非合法に隠れて運営されることを意味する形容詞。「clandestine laboratories（秘密製造所）」のように犯罪捜査の文脈でよく使われる。"}, {"word": "culminate", "definition": "一連の過程や出来事が最終的な結果・頂点に達することを意味する動詞。「culminate with/in ～」の形で「～をもって締めくくられる」という意味で用いられる。"}, {"word": "action-oriented", "definition": "具体的な行動や成果に重点を置く姿勢・方針を表す複合形容詞。対話や議論だけでなく実際の実施・実行を重視するニュアンスを持つ。"}]}, {"title_ja": "人権団体、インドで休暇中のイスラエル兵士に対し「戦争犯罪」の訴状を提出", "title_en": "Rights group files war crimes complaint in India against Israeli soldier on vacation", "summary_ja": "パレスチナの人権団体「ヒンド・ラジャブ財団」は2026年6月2日、インドのヒマーチャル・プラデーシュ州で休暇中のイスラエル兵士エイタン・ギルボア氏の逮捕を求め、インド当局に訴状を提出した。ギルボア氏は第271戦闘工兵大隊の隊員であり、2024年にガザで戦争犯罪を犯したとして告発されている。同財団は、ジオロケーション付き動画、ソーシャルメディア映像、指揮系統文書を証拠として提出した。", "summary_en": "The Hind Rajab Foundation, a Palestinian rights organisation, filed a complaint with Indian authorities on June 2, 2026, seeking the arrest of Israeli soldier Eitan Gilboa, who was vacationing in Himachal Pradesh. Gilboa, a member of the 271st Combat Engineering Battalion, is accused of committing war crimes in Gaza in 2024, including destruction of civilian infrastructure in Khan Yunis and Rafah. The HRF submitted geo-located videos, social media footage, and chain-of-command documentation as evidence.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/eitan-gilboa-israeli-soldier-spotted-along-india-hummus-trail/article71185358.ece", "state_media": false, "category": "政治", "full_text": "On June 2, 2026, the Hind Rajab Foundation (HRF), a Palestinian rights organisation based in Brussels, filed a complaint with the Union Ministry of Home Affairs, the Bureau of Immigration and the police to arrest Eitan Gilboa, an Israeli soldier, who was found to be vacationing in Himachal Pradesh. Gilboa, a member of the 271st Combat Engineering Battalion, was accused by the organisation of committing “war crimes in Gaza” in 2024.\nThe organisation submitted evidence that involves specific instances in which he participated in the destruction of residential buildings and civilian infrastructure in Khan Yunis and Rafah. He filmed videos of himself celebrating the execution of these activities, which were later posted on social media by his mother. The HRF provided geo-located videos, social media videos and chain-of-command documentation along with the complaint.\nPublished - July 05, 2026 02:58 pm IST", "translation_ja": "2026年6月2日、ブリュッセルを拠点とするパレスチナの人権団体「ヒンド・ラジャブ財団（HRF）」は、インドのヒマーチャル・プラデーシュ州で休暇を過ごしていることが判明したイスラエル兵士、エイタン・ギルボア氏を逮捕するよう求め、インド連邦内務省、出入国管理局、および警察に訴状を提出した。第271戦闘工兵大隊の隊員であるギルボア氏は、2024年にガザで「戦争犯罪」を犯したとして同団体から告発されている。\n\n同団体は、ギルボア氏がハン・ユニスおよびラファにおける住宅建物や民間インフラの破壊に具体的に関与したとする証拠を提出した。同氏はこれらの活動の実行を祝う動画を自ら撮影しており、後に母親によってソーシャルメディアに投稿された。HRFは訴状とともに、ジオロケーション付き動画、ソーシャルメディア動画、および指揮系統に関する文書を提供した。\n\n掲載：2026年7月5日 午後2時58分（IST）", "vocab": [{"word": "geo-located", "definition": "GPS情報などを用いて撮影地点の地理的位置が特定・記録された状態を指す形容詞。法的証拠や報道において、映像や画像の信憑性を裏付けるために用いられる。"}, {"word": "chain-of-command", "definition": "軍隊や組織における命令・権限の階層的な連鎖を指す表現。法的文脈では、誰が誰に命令を下したかを示す責任の所在を証明するために使われる。"}, {"word": "civilian infrastructure", "definition": "一般市民の生活を支える道路、電力、水道、建物などの社会基盤施設を指す。国際人道法において、その意図的な破壊は戦争犯罪とみなされる場合がある。"}, {"word": "complaint", "definition": "法的手続きにおいて、当局に対して正式に提出される告訴・申告文書を指す。ここでは刑事訴追を求めて提出された正式な申立書を意味する。"}, {"word": "execution", "definition": "ここでは「（作戦や計画の）実行・遂行」という意味で使われており、人の処刑という意味ではなく、軍事的行動の実施を指す技術的な用法である。"}, {"word": "vacationing", "definition": "休暇を過ごしている状態を表す動詞の進行形。本記事では、告発対象の兵士が観光地で休暇中に発見されたという文脈で用いられている。"}]}, {"title_ja": "超大型台風バビ、米領太平洋諸島に接近――カテゴリー5相当の猛烈な暴風", "title_en": "Super Typhoon Bavi Threatens U.S. Pacific Territories with Category-5 Force Winds", "summary_ja": "超大型台風バビは最大瞬間風速時速280キロメートルに達する勢力を持ち、2026年7月6日（月）早朝にグアムおよび北マリアナ諸島を直撃する見通しとなった。米国気象局は壊滅的な暴風被害や高潮への警戒を呼びかけており、特に人口約1,500人の小島ロタが数週間にわたり居住不能となる可能性があると警告した。台風の急激な発達は、記録的な高水温の海洋と強いエルニーニョ現象の発生と関連しているとみられる。", "summary_en": "Super Typhoon Bavi, packing sustained winds of up to 280 km/h, was set to strike Guam and the Northern Marianas early Monday, July 6, 2026, prompting warnings of catastrophic damage. The National Weather Service cautioned of devastating storm surges and wind destruction, particularly for the small island of Rota, which could be rendered uninhabitable for weeks. The intensification of the typhoon is linked to record-hot ocean temperatures and the onset of a strong El Niño event.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/very-dangerous-super-typhoon-nears-us-pacific-islands/article71186041.ece", "state_media": false, "category": "政治", "full_text": "Howling winds and lashing rains battered Guam and the Northern Marianas late on Sunday (July 5, 2026), hours before the projected arrival of a “super typhoon” with equivalent force to a category-5 hurricane over the U.S. Pacific territories.\nSuper Typhoon Bavi was forecast to roar westwards over the area early on Monday (July 6, 2026) with maximum sustained winds of up to 280 kilometres (173 miles) per hour and gusts of 333 kmh, according to the Joint Typhoon Warning Centre.\nThe National Weather Service (NWS) called the typhoon “very dangerous”, warning of possible “catastrophic wind damage” near the eye as well as storm surges and “hazardous” surf.\nAlready on Sunday (July 5, 2026) afternoon, there were few cars on the roads in Guam or the Northern Marianas — between them home to some 2,10,000 people — with police driving around warning people to take care.\nPinky Cubacub, 55, said as she boarded up the windows of her eatery that she had lined up early on Saturday (July 4, 2026) to buy $500 worth of plywood at a lumber store.\n“I cannot afford to lose so many days. It hurts,” she told AFP.\nCall center employee Arabella Paulino, 48, said: “My girls were saying to me it’s scary. But it will be okay.”\n“My house is concrete, so the worst that can happen is a window could blow in,” she said.\nJapanese tourist Miku Sakurai, 25, was supposed to fly back to Tokyo with her friends, but their flight was cancelled. “We will stay in the hotel when the storm comes. I am scared,” the office worker said.\nAround a dozen surfers, however, were making the most of the windy conditions at one beach in Guam’s Talofofo Bay.\n“There’s quite a lot of debris in the water but it’s a lot of fun,” said one of them.\n‘Praying’\nThe Northern Marianas in the western Pacific have a population of around 40,000, and nearby Guam — a separate U.S. territory, although both are part of the Marianas archipelago — about 170,000.\nSuper Typhoon Sinlaku, which hit the region in mid-April, knocked out power for tens of thousands of inhabitants, uprooted trees, overturned cars and ripped metal roofs off buildings.\nIn 2023 another massive typhoon, Mawar, the biggest in decades, caused devastation too.\nBavi was forecast to pass nearest the small island of Rota, the southernmost part of the Northern Marianas, at around 8:00 a.m. on Monday (2200 GMT Sunday), the NWS said.\nIf Bavi tracks near or over Rota, home to around 1,500 people, most of the area “will be uninhabitable for weeks, perhaps longer. Many non-concrete, non-reinforced homes will be destroyed, with total roof failure and wall collapse,” it said.\n“Nearly all trees will be snapped or uprooted and power poles downed. Fallen trees and power poles will isolate residential areas. Power outages will last for weeks to possibly months.”\n“By working together and taking the necessary precautions, we can help protect our families, neighbors and community. We pray for the safety of our people,” Rota mayor Aubry Hocog said.\nEl Nino\nThe world’s oceans experienced their hottest June on record and could set fresh highs in the months ahead, the European Union’s Copernicus Marine Service said on Wednesday (July 1, 2026).\nWarmer oceans help tropical storms to intensify and add more moisture, which can fall as heavy rain.\nThe World Meteorological Organisation warned on Friday (July 3, 2026) that El Nino, which typically occurs every two to seven years and lasts nine to 12 months, has already begun in the tropical Pacific and is likely to be strong.\nThe natural climate phenomenon warms surface temperatures in the central and eastern equatorial Pacific Ocean, bringing worldwide changes in winds, pressure and rainfall patterns.\nPublished - July 05, 2026 07:25 pm IST", "translation_ja": "唸りをあげる強風と激しい雨が日曜日（2026年7月5日）夜遅く、グアムおよび北マリアナ諸島を襲った。カテゴリー5のハリケーンに相当する勢力を持つ「超大型台風」が、米領太平洋諸島に到達すると予測されていた数時間前のことである。\n\n合同台風警報センターによると、超大型台風バビは月曜日（2026年7月6日）早朝、最大持続風速時速280キロメートル（173マイル）、突風時速333キロメートルを伴いながら、この地域を西方向へ猛烈な勢いで通過すると予報された。\n\n米国気象局（NWS）は台風を「非常に危険」と表現し、台風の目付近での「壊滅的な暴風被害」の可能性とともに、高潮や「危険な」高波についても警告を発した。\n\n日曜日（2026年7月5日）の午後にはすでに、グアムおよび北マリアナ諸島の道路を走る車はほとんど見られなかった。両地域を合わせた人口は約21万人で、警察官が車で巡回しながら住民に注意を呼びかけていた。\n\n55歳のピンキー・クバクブさんは、自分の飲食店の窓に板を打ち付けながら、土曜日（2026年7月4日）の早朝から材木店に並び、500ドル分の合板を購入したと語った。「これほど多くの日数を失う余裕はない。本当につらい」と彼女はAFPに語った。\n\nコールセンター勤務のアラベラ・パウリーノさん（48歳）は「娘たちは怖いと言っていました。でも大丈夫でしょう」と話した。「家はコンクリート造りなので、最悪の場合でも窓が吹き飛ぶくらいだと思います」と彼女は述べた。\n\n日本人観光客の桜井美玖さん（25歳）は友人たちと東京へ帰る予定だったが、フライトがキャンセルされた。「嵐が来たらホテルに滞在します。怖いです」とこのオフィスワーカーは語った。\n\n一方、グアムのタロフォ湾では約12人のサーファーが強風による波を楽しんでいた。「水中にはかなりのがれきがありますが、とても楽しいですよ」とそのうちの一人は語った。\n\n【祈り】\n\n西太平洋に位置する北マリアナ諸島の人口は約4万人で、隣接するグアム――どちらもマリアナ諸島群島の一部だが、別々の米自治領――の人口は約17万人である。\n\n4月中旬にこの地域を直撃した超大型台風シンラクは、数万人の住民を停電させ、木々をなぎ倒し、車を横転させ、建物の金属製屋根を吹き飛ばした。\n\n2023年には別の巨大台風マワールが数十年ぶりの規模で上陸し、甚大な被害をもたらした。\n\nNWSによると、バビは月曜日（日曜日のグリニッジ標準時2200時）午前8時ごろ、北マリアナ諸島最南端の小島ロタに最接近する見通しである。\n\nバビがロタ付近または直上を通過した場合、人口約1,500人の同島のほぼ全域が「数週間、場合によってはそれ以上にわたって居住不能となる。コンクリート造りでない、または補強されていない多くの家屋は倒壊し、屋根の全壊や壁の崩落が生じる」とNWSは警告した。\n\n「ほぼすべての木々は折れるか根こそぎ倒れ、電柱も倒壊する。倒れた木々や電柱により住宅地は孤立する。停電は数週間から数か月にわたる可能性がある」とも述べられた。\n\n「力を合わせ、必要な備えをすることで、家族、隣人、そしてコミュニティを守ることができる。住民の安全を祈っています」とロタのオーブリー・ホコグ市長は語った。\n\n【エルニーニョ】\n\nEUのコペルニクス海洋環境モニタリングサービスは水曜日（2026年7月1日）、世界の海洋が記録上最も暑い6月を経験したと発表し、今後数か月でさらに新たな記録を更新する可能性があると述べた。\n\n海水温の上昇は熱帯性低気圧の発達を助け、大雨をもたらす水分量を増加させる。\n\n世界気象機関（WMO）は金曜日（2026年7月3日）、通常2〜7年ごとに発生し9〜12か月続くエルニーニョ現象が熱帯太平洋ですでに始まっており、強い現象となる可能性が高いと警告した。\n\nこの自然気候現象は、太平洋中部および東部の赤道付近の海面水温を上昇させ、世界各地の風、気圧、降水パターンに変化をもたらす。\n\n公開日：2026年7月5日 午後7時25分（インド標準時）", "vocab": [{"word": "sustained winds", "definition": "「持続風速」を意味する気象用語で、瞬間的な突風ではなく一定時間継続して観測される平均的な風速を指す。台風やハリケーンの強度を示す際に使われる重要な専門用語。"}, {"word": "storm surge", "definition": "「高潮」を意味する気象・防災用語で、台風や強い低気圧によって海面が異常に上昇する現象を指す。沿岸部に壊滅的な浸水被害をもたらすことがある。"}, {"word": "uninhabitable", "definition": "「居住不能な」という意味の形容詞で、人が住むことができない状態を表す。disaster reportingや環境・建築分野で用いられる上級語彙。"}, {"word": "archipelago", "definition": "「列島」「諸島」を意味する地理用語で、複数の島が集まって形成された島群を指す。TOEIC高得点レベルで求められる地理・政治系の専門語彙。"}, {"word": "intensification", "definition": "「強化」「激化」を意味する名詞で、気象文脈では台風や嵐が急速に勢力を増すプロセスを指す。rapid intensificationとして気象報道でよく使われる。"}, {"word": "equatorial", "definition": "「赤道の」「赤道付近の」を意味する形容詞で、赤道に関連した地域や気候条件を説明する際に使われる地理・気象の専門用語。"}, {"word": "precautions", "definition": "「予防措置」「事前の備え」を意味する名詞で、危険や問題を避けるためにあらかじめ取る対策を指す。take precautionsの形でニュースや公式文書に頻出する表現。"}]}, {"title_ja": "ディルジット・ドサンジュ主演映画『サトルジ』、公開2日でZEE5から削除", "title_en": "Diljit Dosanjh's Film 'Satluj' Pulled from ZEE5 Two Days After Premiere in India", "summary_ja": "ディルジット・ドサンジュ主演の映画『サトルジ』は、7月3日にZEE5で公開されたわずか2日後にインド国内で視聴不可となった。OTTプラットフォームのZEE5は「今後の通知があるまでインドでは視聴できない」と発表し、正式な手続きを通じて再公開を目指すとした。同作は人権活動家ジャスワント・シン・カルラの生涯を描いており、インド映画審査委員会（CBFC）との長年にわたる検閲闘争を経て公開に至った経緯がある。", "summary_en": "Diljit Dosanjh's film Satluj, based on human rights activist Jaswant Singh Khalra, was removed from ZEE5 just two days after its July 3 premiere. The OTT platform announced the film will be unavailable in India 'until further notice,' while affirming its commitment to bringing it back through due process. The film had already faced years of censorship battles with the CBFC, including demands for extensive cuts before receiving certification.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/entertainment/bollywood/diljit-dosanjhs-satluj-removed-from-zee5-the-film-will-be-unavailable-in-india-10772827/", "state_media": false, "category": "社会", "full_text": "Click here to follow Screen Digital on YouTube and stay updated with the latest from the world of cinema.\nDiljit Dosanjh’s Satluj removed from ZEE5: ‘The film will be unavailable in India’\nDiljit Dosanjh's much-awaited film Satluj, which was previously titled Punjab 95, released on ZEE5 on July 3 after years of delays.\nDiljit Dosanjh’s Satluj, based on the life of human rights activist Jaswant Singh Khalra, was taken down from ZEE5 on Sunday, just two days after premiering on the platform.\nAnnoucing the decision, the OTT platform said, “In light of the current developments, Satluj will be unavailable in India until further notice.”\nA note posted by ZEE on social media read, “The response to Satluj since its release has been truly overwhelming. We are deeply grateful to every viewer who chose to subscribe, watch and champion the film. Your love and support have meant a great deal to us and to everyone who brought this story to life. At ZEE5, we stand firmly by Satluj and the creative vision behind it. We believe powerful storytelling has the ability to inspire, endure and leave a lasting impact. We remain committed to championing authentic and meaningful narratives.\nIt further read, “In light of the current developments, Satluj will be unavailable in India until further notice. We remain committed to exploring every appropriate avenue through due process to bring the film back to our audiences at the earliest opportunity. Our commitment to creators and to stories told with conviction, artistic integrity and purpose remains unwavering.”\nAlso Read – Satluj movie review: Diljit Dosanjh’s performance gives this film its strength\nHoney Trehan’s much-awaited film Satluj, which was previously titled Punjab 95, released on ZEE5 on July 3 after years of delays.\nThe film’s prolonged delay stemmed from a censorship dispute that began after it was submitted to the Central Board of Film Certification (CBFC) in 2022. Over several months, the board sought numerous cuts before granting certification. In September 2023, Punjab 95 was scheduled to have its world premiere at the Toronto International Film Festival (TIFF). However, the filmmakers were informed by Indian authorities that the screening would have to be withdrawn.\nIn an exclusive interview with SCREEN last year, Honey Trehan detailed the prolonged certification process. “At first instance, I made the 21 cuts reluctantly, thinking this way the film wouldn’t get stuck. They wanted the name changed right from the beginning (it started off by being called ‘Ghaluhgara’), and they also wanted us to drop the line ‘inspired from true events.’ We made the cuts, created a new DCP (print) and gave it in, they came back with some more cuts. We made those also, and gave in a fresh print yet again, and again there was silence.”\nAccording to the filmmaker, the cycle continued throughout 2024, with fresh cuts being suggested after every submission. At the beginning of 2025, there were discussions about releasing the film outside India, but that plan, too, did not materialise. Speaking about some of the changes sought by the CBFC, Trehan had said: “Amongst the cuts demanded are the ones that ‘we have verbally been told are non-negotiable’. Change Khalra’s name. Drop any visuals of the Indian flag. Take out all sounds of the ‘gurbani.’ Don’t say Punjab police, when it is clearly the state police in turbans that’s on screen. Take out the names of the places mentioned in the film where the bodies were discovered in the morgue. And change the name of the film. What is left then?”\nThe matter had also reached the Bombay High Court in 2023. However, at a crucial stage, the producers were advised to withdraw the case. What followed, according to Honey Trehan, was a series of postponements and continued uncertainty. Speaking to SCREEN at the time, he had revealed that the film would eventually be released under the title Sutlej and that the production team had complied with all the cuts sought by the authorities.\nAlso Read – Diljit Dosanjh on Punjab 95’s title change to Satluj: ‘Absolutely no cuts in the film’\nStarring Diljit Dosanjh, Kanwaljeet Singh, Arjun Rampal, Suvinder Vicky and Geetika Vidya Ohlyan, among others, Satluj revisits one of Punjab’s darkest chapters, focusing on the disappearances, alleged extra-judicial killings and illegal detentions linked to the state’s counter-insurgency operations against Khalistani militancy during the 1980s and 1990s.", "translation_ja": "ディルジット・ドサンジュの映画『サトルジ』がZEE5から削除：「インドでは視聴不可に」\n\nディルジット・ドサンジュの待望作『サトルジ』（旧題：パンジャブ95）は、数年にわたる公開延期を経て、7月3日にZEE5にて公開された。\n\n人権活動家ジャスワント・シン・カルラの生涯に基づくディルジット・ドサンジュ主演の映画『サトルジ』は、プラットフォームで公開されてからわずか2日後の日曜日に、ZEE5から削除された。\n\nこの決定を発表するにあたり、OTTプラットフォームは「現在の状況を踏まえ、『サトルジ』は追ってご連絡するまでインドでは視聴できない状態となります」と述べた。\n\nZEEがソーシャルメディアに投稿したコメントには次のように記されていた。「公開以来、『サトルジ』に対する反響は本当に圧倒的なものでした。ご登録いただき、ご視聴いただき、この映画を応援してくださったすべての視聴者の皆さまに、心より感謝申し上げます。皆さまのご支援とご愛顧は、私たちにとっても、この物語を作り上げたすべての方々にとっても、大きな励みとなりました。ZEE5は、『サトルジ』およびその背後にあるクリエイティブなビジョンを断固として支持します。私たちは、力強いストーリーテリングが人々を奮い立たせ、時代を超えて深い影響を与える力を持つと信じています。私たちは、真摯で意義深い物語を発信し続けることにコミットし続けます。」\n\nさらにコメントは続く。「現在の状況を踏まえ、『サトルジ』は追ってご連絡するまでインドでは視聴できない状態となります。私たちは、できる限り早期に観客の皆さまに映画をお届けできるよう、正式な手続きを通じてあらゆる適切な手段を探ることにコミットしています。確固たる信念と芸術的誠実さ、そして目的意識を持って語られた物語とクリエイターへの私たちのコミットメントは、揺るぎないものです。」\n\nハニー・トレハン監督の待望作『サトルジ』（旧題：パンジャブ95）は、数年にわたる公開延期を経て、7月3日にZEE5にて公開された。\n\nこの映画の長期にわたる公開延期は、2022年にインド映画審査委員会（CBFC）に審査申請を提出した後に始まった検閲をめぐる紛争に起因する。委員会は数ヶ月にわたり、認定を付与する前に多数のカットを求めた。2023年9月、パンジャブ95はトロント国際映画祭（TIFF）でワールドプレミアを行う予定だったが、インド当局から上映を取り下げるよう通告された。\n\nSCREENとの独占インタビューの中で、ハニー・トレハン監督は長期にわたる認定プロセスについて詳しく語った。「最初は、こうすれば映画が止まらずに済むだろうと渋々21箇所のカットを行いました。最初の段階からタイトルの変更を求められており（最初は『ガルーガラ』という題名でした）、『実際の出来事に着想を得た』というテキストも削除するよう求められました。カットを行い、新しいDCP（プリント）を作成して提出したところ、さらに追加のカットが求められました。それにも応じて新たなプリントを再度提出したのですが、また沈黙が続きました。」\n\n映画監督によれば、このサイクルは2024年を通じて続き、提出のたびに新たなカットが求められたという。2025年初頭には、インド国外での公開についての話し合いが行われたが、その計画も実現しなかった。CBFCが求めた変更の一部について、トレハン監督はこう述べていた。「求められたカットの中には、『口頭で非交渉条件と告げられたもの』が含まれています。カルラの名前を変えること。インド国旗の映像をすべて削除すること。グルバニー（シク教の聖典聖歌）の音声をすべて取り除くこと。画面上に明らかにターバンを巻いた州警察が映っているのに、パンジャブ警察と言わないこと。映画に登場する、遺体が発見された霊安室の地名をすべて削除すること。そして映画のタイトルを変えること。それでは一体何が残るというのでしょうか？」\n\nこの問題は2023年にボンベイ高等裁判所にも持ち込まれた。しかし、重要な局面において、製作者側は訴えを取り下げるよう助言を受けた。その後に続いたのは、ハニー・トレハン監督によれば、相次ぐ延期と続く不透明な状況だったという。当時SCREENに対して彼は、映画は最終的に『スータレジュ（サトルジ）』というタイトルで公開されることになり、制作チームは当局から求められたすべてのカットに応じたことを明かしていた。\n\nディルジット・ドサンジュ、カンワルジート・シン、アルジュン・ラムパル、スヴィンダー・ヴィッキー、ギーティカ・ヴィドヤー・オーリャンらが出演する『サトルジ』は、パンジャブの最も暗い時代のひとつを振り返り、1980年代から90年代にかけてのカリスタニー武装勢力に対する州の対反乱作戦に関連した失踪事件、法外な処刑疑惑、違法拘禁に焦点を当てている。", "vocab": [{"word": "censorship", "definition": "政府や機関が出版物・映像などの内容を審査・規制する行為。「censorship dispute（検閲をめぐる紛争）」のように使われる。"}, {"word": "certification", "definition": "公式な認定や証明書の付与を指す。映画の文脈では映画審査委員会による公開許可の認定を意味する。"}, {"word": "extra-judicial", "definition": "法的な手続きや司法の監督なしに行われることを形容する語。「extra-judicial killings（法外な処刑）」は裁判なしに行われる殺害を指す。"}, {"word": "counter-insurgency", "definition": "武装反乱勢力に対抗するための軍事的・政治的作戦を指す複合語。しばしば人権問題と絡めて論じられる。"}, {"word": "materialise", "definition": "計画や期待が実際に現実のものとなること。「that plan did not materialise（その計画は実現しなかった）」のように使われる。"}, {"word": "unwavering", "definition": "意志や姿勢が全くぶれない、揺るぎないことを表す形容詞。「unwavering commitment（揺るぎないコミットメント）」のように強い決意を強調する際に用いる。"}, {"word": "prolonged", "definition": "通常より長く引き延ばされた状態を指す形容詞。「prolonged delay（長期にわたる遅延）」のように時間的な長さを強調する文脈で使われる。"}]}, {"title_ja": "ケーララ出身の男性、UAEエティハド・レールで初のインド人列車長に", "title_en": "Kerala man set to become first Indian train captain for UAE's Etihad Rail", "summary_ja": "ケーララ州アラップーザ出身の29歳ニシャド氏が、UAEのエティハド・レールの旅客サービスで初のインド人列車長となる見通しだ。2014年にUAEに移住し、さまざまな仕事を経て鉄道業界に転身した彼は、困難を乗り越えてこのポジションを獲得した。彼が運転する列車は最高時速200kmで走行し、フジャイラとアブダビを1時間45分で結ぶ予定だ。", "summary_en": "Nishad, a 29-year-old from Alappuzha, Kerala, is set to become the first Indian train captain for Etihad Rail's upcoming passenger service in the UAE. Having moved to the UAE in 2014 and worked a series of odd jobs before breaking into the rail industry, he persevered through setbacks to secure his position. He will operate trains running at up to 200 km/h, connecting Fujairah and Abu Dhabi in just one hour and 45 minutes.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/trending/trending-globally/kerala-nishad-first-indian-train-captain-etihad-rail-10772826/", "state_media": false, "category": "社会", "full_text": "Nishad, 29, from Kerala, is making waves as he is set to become the first Indian train captain for Etihad Rail’s passenger service.\nHailing from Alappuzha, Nishad will be among the drivers operating the UAE’s newly launched passenger trains. His appointment comes as Etihad Rail prepares to roll out its long-awaited passenger network connecting key emirates across the country. When the inaugural passenger service departs from Fujairah to Abu Dhabi, Nishad will be in the driver’s cabin.\nAccording to The Week, Nishad joins Emirati train captains Ibrahim Al Hammadi and Sara Al Mazrouei, who earlier became the UAE’s first national train captains. Nishad is now the first Indian to earn the distinction.\nHowever, his path to success was anything but easy. According to Mathrubhumi, Nishad moved to the UAE in 2014 and, like many expatriates starting from scratch, accepted any job that came his way. He worked as a cashier, sold perfumes, prepared hot dog sandwiches, and even handled delivery jobs to support himself while pursuing bigger ambitions.\nHis breakthrough came when he landed his first railway job with the Palm Jumeirah Monorail in 2017. The role marked the beginning of a career in the rail sector, which later saw him work with the Dubai Tram, Dubai Metro, and eventually at Zayed International Airport, the report added.\nView this post on Instagram\nThere was, however, a setback that nearly derailed his dream. In 2020, Nishad applied for a position with Etihad Rail, but a minor error in his email address prevented his application from progressing. Rather than giving up, he reapplied in 2022, successfully cleared the recruitment process, and secured his place as a train captain.\nThe Week reported that Etihad Rail’s passenger trains will operate at speeds of up to 200 km/h, reducing travel time between Fujairah and Abu Dhabi to just one hour and 45 minutes.\nThe railway is expected to serve around 10 million passengers annually once fully operational. The trains will feature assigned seating, complimentary Wi-Fi, charging points, fold-out tables, luggage storage, extra legroom and a capacity of up to 400 passengers, the report stated.", "translation_ja": "29歳のニシャド氏はケーララ州出身で、UAEのエティハド・レール旅客サービスにおける初のインド人列車長となることが決まり、注目を集めている。\n\nアラップーザ出身のニシャド氏は、UAEが待望の旅客鉄道ネットワーク開業に向けて準備を進める中、その列車を運転するドライバーの一人となる。エティハド・レールがフジャイラからアブダビへの初旅客便を出発させる際、ニシャド氏は運転室に座ることになる。\n\n「ザ・ウィーク」紙によると、ニシャド氏はUAE初の国内人列車長となったイブラヒム・アル・ハンマディ氏とサラ・アル・マズルーイ氏に続く形で、インド人として初めてこの称号を得た人物となる。\n\nしかし、彼の成功への道は決して平坦ではなかった。「マトゥルブーミ」紙によると、ニシャド氏は2014年にUAEに移住し、多くの外国人労働者と同様に一から始め、手に入る仕事は何でもこなした。キャッシャーとして働き、香水を販売し、ホットドッグサンドイッチを作り、より大きな夢を追いながら自分を養うためにデリバリーの仕事もこなした。\n\n転機が訪れたのは、2017年にパーム・ジュメイラ・モノレールで最初の鉄道関連の仕事を得たときだった。この役割が鉄道業界でのキャリアの始まりとなり、その後ドバイ・トラム、ドバイ・メトロ、そして最終的にはザイード国際空港での勤務へとつながった。\n\nただし、夢を危うくする挫折もあった。2020年、ニシャド氏はエティハド・レールのポジションに応募したが、メールアドレスのちょっとしたミスが原因で応募が先に進まなかった。それでも諦めず、2022年に再応募し、採用プロセスを見事に突破して列車長の座を確保した。\n\n「ザ・ウィーク」紙によると、エティハド・レールの旅客列車は最高時速200kmで運行し、フジャイラとアブダビ間の移動時間をわずか1時間45分に短縮する。\n\nこの鉄道は完全稼働後、年間約1000万人の乗客を運ぶ見込みだ。列車には指定席、無料Wi-Fi、充電ポイント、折り畳みテーブル、荷物収納スペース、ゆったりとした足元スペースが備わり、最大400人の乗客を収容できる。", "vocab": [{"word": "inaugural", "definition": "「最初の」「初回の」を意味する形容詞。公式な開始や記念すべき初めての出来事を表す際に使われる改まった表現。"}, {"word": "expatriate", "definition": "自国を離れて外国に居住・就労する人を指す名詞または形容詞（略してexpat）。特にビジネスや労働目的で海外在住の人に用いられる。"}, {"word": "derailed", "definition": "本来は列車が「脱線する」という意味だが、比喩的に計画や夢が「頓挫する・妨げられる」という意味でも使われる慣用的表現。"}, {"word": "distinction", "definition": "他と区別される「名誉」「称号」「卓越さ」を意味する名詞。特定の業績や地位において特別に認められることを表す。"}, {"word": "complimentary", "definition": "「無料で提供される」または「賞賛の」を意味する形容詞。サービス業においては無償サービスを指す文脈で頻繁に使われる。"}, {"word": "recruitment", "definition": "人材の「採用」「募集」プロセスを指す名詞。企業や組織が新たなメンバーを選抜・雇用する一連の活動を表す。"}]}, {"title_ja": "800kgの雄牛が選手に突進、クリケット試合が中断・中止に", "title_en": "Cricket Match Abandoned After 800kg Bull Charges Players on Field", "summary_ja": "イングランドのノースイースト・プレミアリーグのクリケット試合で、近隣の農場から逃げ出した体重約800kgの雄牛がフィールドに乱入し、選手たちに繰り返し突進したため、試合が中止となった。雌牛を連れてくるなど雄牛を追い出す試みはすべて失敗し、最終的に警察が到着した後、雄牛は自ら立ち去った。クリケットの試合に動物が乱入する出来事は過去にも複数例があり、珍しい現象ではない。", "summary_en": "A North East Premier League cricket match between Burnopfield Cricket Club and Hetton Lyons was abandoned after an 800kg bull escaped from a nearby farm and charged at players on the field. Multiple attempts to remove the animal failed, including bringing a cow to lure it away, before police arrived and the bull eventually left on its own. Animal pitch invasions are not unprecedented in cricket, with similar incidents involving cows, bees, snakes, and other creatures recorded over the years.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/sports/cricket/bull-invasion-cricket-match-called-off-charges-10772816/", "state_media": false, "category": "社会", "full_text": "Stay updated with the latest sports news across Cricket, Football, Chess, and more. Catch all the action with real-time live cricket score updates and in-depth coverage of ongoing matches.\nIn a bizarre incident, a North East Premier League match between Burnopfield Cricket Club and Hetton Lyons was called off after a bull entered the field of play and kept charging at the players. After a lot of failed attempts to get the animal off the field, the match was abandoned.\nThe bull which weighed about 800kg had escaped from a farm and had travelled for 1.6km to reach the playing field and the animal’s owner had even driven a cow to the field in order to get the bull off the ground but the ruse had failed, according to a report by the BBC. Ultimately, the police arrived before the bull left on its own.\n“At first it was quite novel, it was quite funny,
