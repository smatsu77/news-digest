but we never thought it was going to impact on our game being abandoned. We couldn’t get rid of it. There was no chance that the game was going to restart before the cut-off time,” Burnopfield club director Martin Oswell said to the BBC.\nCow stops play as @HettonLyonsCC attempt chase down 227 against Burnopfield CC.\n🐄🏏❌😜😜@SkyCricket @SkySportsNews @neplcricket @burnopfieldcri1\njust wanted to remind everyone that it still has the best moo-vement on the pitch. 😂#PitchInvader #CowCorner #OnlyInCricket pic.twitter.com/J92UBXBL1X— Hetton Lyons CC (@HettonLyonsCC) July 4, 2026\n“The farmer who owned the bull arrived at the ground and tried at first to sort of cajole it and get it into a pen, but it failed. The bull was very frightened, it was spooked. Two farmers tried to stop the bull and it actually hit one of them. He was OK but I mean the beast probably weighed about 800kg. It was a juvenile bull, incredibly fit, athletic, quite frankly, it was quite dangerous,” he added.\nAnimals and insects interrupting cricket matches are nothing new with bees, snakes, dogs and even African subterranean termites having invaded the fields in the past. In 2017, a village cricket match between Kerridge and Mossley was also interrupted when a cow invaded the pitch and began to charge at the players before eventually leaving.\nStay updated with the latest sports news across Cricket, Football, Chess, and more. Catch all the action with real-time live cricket score updates and in-depth coverage of ongoing matches.", "translation_ja": "クリケット、フットボール、チェスなど最新のスポーツニュースをお届けします。リアルタイムのライブクリケットスコア更新や進行中の試合の詳細カバレッジで、すべてのアクションをお楽しみください。\n\n奇妙な出来事として、バーノップフィールド・クリケット・クラブとヘットン・ライオンズの間で行われたノースイースト・プレミアリーグの試合が、雄牛がフィールドに乱入し選手たちに繰り返し突進したため中止となった。動物をフィールドから追い出す試みが何度も失敗した末、試合は放棄された。\n\nBBCの報道によると、体重約800kgのこの雄牛は近くの農場から逃げ出し、1.6kmを移動してグラウンドに到達した。雄牛の飼い主は雄牛をグラウンドから誘い出そうと雌牛を連れてきたが、その策略も失敗に終わった。最終的には警察が到着し、その後雄牛は自ら立ち去った。\n\nバーノップフィールドのクラブディレクター、マーティン・オズウェルはBBCに対し、「最初はかなり珍しくて、面白かったのですが、まさか試合が中止になるとは思っていませんでした。どうしても追い出せなかったんです。制限時間前に試合を再開できる見込みはまったくありませんでした」と語った。\n\n「雄牛を所有する農家がグラウンドに来て、最初は何とかなだめて囲いの中に入れようとしましたが、失敗しました。雄牛はとても怯えていて、興奮状態にありました。2人の農家が雄牛を止めようとしましたが、実際に1人がぶつかられてしまいました。その方は大丈夫でしたが、あの獣はおそらく約800kgはあったでしょう。若い雄牛で、信じられないほど体力があり、運動能力も高く、率直に言ってかなり危険でした」と彼は付け加えた。\n\nミツバチ、ヘビ、イヌ、さらにはアフリカのシロアリまで、動物や昆虫がクリケットの試合を中断させることは珍しいことではない。2017年には、ケリッジとモーズリーの間で行われた村のクリケットの試合でも、雌牛がピッチに乱入して選手たちに突進し始め、最終的に立ち去るという出来事があった。\n\nクリケット、フットボール、チェスなど最新のスポーツニュースをお届けします。リアルタイムのライブクリケットスコア更新や進行中の試合の詳細カバレッジで、すべてのアクションをお楽しみください。", "vocab": [{"word": "abandoned", "definition": "（試合・計画などが）途中で放棄・中止されること。スポーツ報道でよく使われる表現で、単なる「延期」ではなく完全な中止を意味する。"}, {"word": "ruse", "definition": "目的を達成するための策略やごまかしの手段。やや文語的な表現で、TOEIC高得点レベルの語彙として読解問題に登場することがある。"}, {"word": "cajole", "definition": "甘言や説得でなだめすかして人（または動物）を動かそうとすること。「懐柔する」に相当し、強制ではなく巧みな働きかけによる説得を意味する。"}, {"word": "spooked", "definition": "動物や人が突然の刺激や恐怖によって怯え、パニック状態になること。口語的・インフォーマルな表現で、特に動物の行動描写で使われる。"}, {"word": "juvenile", "definition": "若い・未成熟な個体や人物を指す形容詞。生物学や法律用語でも使われ、「成体に達していない」というニュアンスを持つ。"}, {"word": "subterranean", "definition": "地下に存在する、または地下で生活することを指す形容詞。「subterranean termites（地下シロアリ）」のように学術・専門的文脈で使われることが多い。"}, {"word": "proceedings", "definition": "公式な行事や試合、法的手続きなどの「進行・経過」を指す名詞。「disrupt proceedings（進行を妨害する）」のように公式イベントの文脈で頻繁に使われる。"}]}, {"title_ja": "フェミ・ファニ＝カヨデ、幼なじみの王子ナジール・アド・イブラヒムに追悼文を捧げる", "title_en": "Femi Fani-Kayode Pays Tribute to Prince Nazir Ado Ibrahim, Childhood Friend and Northern Royal", "summary_ja": "ナイジェリアの元大臣フェミ・ファニ＝カヨデが、コギ州エビラランドのアッタ王家出身のナジール・アド・イブラヒム王子の逝去を悼む追悼文を発表した。60年にわたる友情を振り返り、ラゴス、ロンドン、ニューヨークでの華やかで冒険に満ちた青春時代の思い出を綴っている。ファニ＝カヨデは、ヨルバ語を流暢に話しながらもエビラの王族としての誇りを持ち続けたナジール王子を「北部と南部を繋ぐ架け橋」と表現した。", "summary_en": "Former Nigerian minister Femi Fani-Kayode mourns the passing of Prince Nazir Ado Ibrahim of the Royal House of the Atta's in Ebiraland, Kogi State, describing him as a lifelong friend of 60 years. The tribute recalls their shared adventures across Lagos, London, and New York from the early 1970s to mid-1980s, painting a vivid picture of a privileged yet wild youth. Fani-Kayode remembers Prince Nazir as a bridge between Nigeria's North and South, fluent in Yoruba yet proud of his Ebira heritage.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/opinion/893090-prince-nazir-ado-ibrahim-a-tribute-by-femi-fani-kayode.html", "state_media": false, "category": "社会", "full_text": "Sadly we did not spend much time together in the last few years and were only in touch from time to time but when I heard of your passing something broke in me… I realised that you were literally the living symbol of my lost childhood and the rallying point and star of those of us who grew up with and loved you…. You were the bridge between the North and the South: who spoke Yoruba better than I did, but who was proud of his noble Ebira Northern heritage and his royal roots.\nMy dearest brother, Prince Nazir Ado Ibrahim of the Royal House of the Atta’s in Ebiraland, Kogi State, has passed and it hit me hard.\nWe grew up together, shared an eventful and rich childhood with many remarkable experiences, and went through thick and thin together for 60 years!\nI thought we would grow old together and share the memories of our childhood, whilst in retirement.\nI thought we would comfort each other in old age, whilst the world quietly passed us by.\nI thought so much and planned so much, but alas you are gone!\nYou were one in a million brother. Always putting smiles on everyone’s faces.\nI remember the days of Atta Lodge in Yaba, Lagos, your dear father, the late Ohinoyi of Ebiraland, His Royal Majesty Dr Abdulrahman Ado Ibrahim’s private house, where we all used to meet with friends and have a great time in the late 1970s and early 1980s.\nI remember our days in the United Kingdom, at my apartment in Pier House, Chelsea, my father’s “Tower House” in Temple Gardens, Brighton, and your father’s massive mansion in Belgrade Square, Belgravia.\nI remember the days of Lagos Polo Club, Ikoyi Club and Apapa Club, where we used to gather and move around in our fearsome and daring “gang” of wild and adventurous friends!\nI remember the boxing and karate lessons we used to have and what a great warrior and courageous fighter you were.\nI remember how we were at JB’s house in a place called Bourdillon, near the National Stadium in Surulere, Lagos, and police raided the place!\nI remember how we fought back to back and shoulder to shoulder together against our assailants, whenever either of us was attacked or threatened.\nWe never lost brother and they never had us down! That is what made our relationship so special. Nothing and no-one could come between us.\nWe spoke a strange language to one another and we communicated in code and with our eyes.\nWe walked the dark side together and, by the grace of God, we both survived.\nI remember how we learnt to ride horses together and play polo, and how we used to both love marking the streets and treading the paths of the rougher sides of old Lagos in flashy cars, whilst flexing our hard and crazy muscles.\nI remember the rivalries we all had over the girls. I remember the fights with the white boys and the locals. I remember the squabbles we all used to have over the most insignificant things. I remember the love that our band of brothers shared. I remember the numerous controversies we got into. I remember the numerous punishments that we jointly faced from our respective parents for our many wild outings. And, I remember how we used to go to night clubs like Legends, Tramp, Main Squeeze, Monkberrys and others in London; Studio 54 and Xenon in New York; and Princes in Federal Palace Hotel, Lagos, which was owned by the Dan Princewill brothers.\nI remember visiting you in a place called Geneva in upstate New York, where you went to University, and how we drove to meet our brother, Des Braithwaite, in a place called Syracuse, where he was in University; again in upstate New York!\nI remember your Porsche 928S and his and mine, and I remember how, in the various cities in the world, the police would stop and ask us how we could afford such cars at such a young age.\nWe laughed them to scorn because they did not know who and what we were, and more often than not we served them with hot words and left them with teary eyes and red faces!\nThat was in the early-1970s to the mid-1980s, and my goodness we had fun!\nDo you remember the wild teenage years that we shared?\nDo you remember when we stormed the home of the Adeyeye brothers in large numbers in the dead of the night, in a strange place called Catford, for daring to make a pass at one of our girlfriends?\nDo you remember Layeni Fagbayi, Tonye Amachree, and those we fondly called the Kentucky Fried Chicken gang?\nDo you remember that pretty, tall, slim, wild white girl with long and jet black hair from the Kings Road, who refused to leave my apartment?\nDo you remember Glenn “the shady character” in Sloane Square and Etan “the fixer” in Hampstead?\nDo you remember the Good Earth Chinese Restaurant on the Kings Road, Mr. Chows in Knightsbridge, the White Elephant on the River on the banks of the Thames, and in front of Dolphin Square and Mumtaz, London’s best Indian restaurant in St. Johns Wood – all four of where we used to wine, dine and make merry whenever you flew into London from the United States?\nDo you remember the Horn of Plenty, that beautiful resta", "translation_ja": "悲しいことに、ここ数年はともに過ごす時間もほとんどなく、時折連絡を取り合う程度でした。しかしあなたの訃報を聞いたとき、私の中で何かが壊れました……あなたはまさに、私が失った子供時代の生きた象徴であり、あなたとともに育ち、あなたを愛した私たちの集いの星であり、よりどころだったのだと気づいたのです……あなたは北部と南部の架け橋でした。私よりもヨルバ語が上手でありながら、高貴なエビラ北部の家系と王族としての血筋を誇りにしていた人でした。\n\n最愛の兄弟、コギ州エビラランドのアッタ王家出身、ナジール・アド・イブラヒム王子が逝ってしまいました。それは私に深い衝撃を与えました。\n\n私たちはともに育ち、数多くの素晴らしい経験に満ちた豊かで波乱万丈な子供時代を共有し、60年間、苦楽をともにしてきました。\n\n老いてもなお一緒にいて、子供時代の思い出を語り合いながら、静かに引退の日々を過ごせると思っていました。\n\n世界が静かに移ろう中、老いを互いに慰め合えると思っていました。\n\nたくさんのことを考え、たくさんの計画を立てていたのに、ああ、あなたはもういない！\n\nあなたは百万人に一人の存在でした。いつも誰の顔にも笑顔をもたらしていた。\n\nラゴスのヤバにあったアッタ・ロッジの日々を思い出します。あなたの父上、故エビラランドのオヒノイ、アブドゥルラーマン・アド・イブラヒム博士陛下の私邸で、1970年代後半から1980年代前半にかけて、私たちは皆そこに集まって友人たちと素晴らしいひとときを過ごしていましたね。\n\nイギリスでの日々を思い出します。チェルシーのピア・ハウスにある私のアパート、ブライトンのテンプル・ガーデンズにある父の「タワー・ハウス」、そしてベルグレイビアのベオグラード・スクエアにあるあなたの父上の大邸宅での日々を。\n\nラゴス・ポロクラブ、イコイ・クラブ、アパパ・クラブの日々を思い出します。私たちはそこに集まって、野性的で冒険心あふれる「ギャング」仲間たちと連れ立って歩き回っていましたね。\n\n私たちが一緒に受けたボクシングと空手の稽古、そしてあなたがどれほど素晴らしい戦士で勇敢な闘士であったかを思い出します。\n\nスルレレの国立スタジアム近く、ブールドンというところにあるJBの家にいたとき、警察が急襲してきたことを思い出します！\n\n私たちのどちらかが攻撃されたり脅かされたりするたびに、背中合わせ、肩を並べて共に戦ったことを思い出します。\n\n私たちは決して負けなかった、兄弟よ、そして彼らに私たちを倒させることもなかった！それが私たちの絆をこんなにも特別なものにしていたのです。何も、誰も、私たちの間に割り込むことはできなかった。\n\n私たちはお互いに不思議な言葉で語り合い、暗号と目で意思疎通していました。\n\n私たちは一緒に暗い側の世界を歩き、神の恵みによって二人とも生き延びました。\n\n一緒に乗馬とポロを覚えたこと、そして古いラゴスの荒々しい界隈の通りを派手な車で走り回り、たくましくクレイジーな筋肉を誇示していたことを思い出します。\n\n女の子たちをめぐる私たちの競争を思い出します。白人の少年たちや地元の人たちとの喧嘩を思い出します。些細なことで私たちがよく言い争っていたのを思い出します。兄弟たちの絆が分かち合った愛を思い出します。私たちが巻き込まれた数々の騒動を思い出します。数々の派手な外出のせいで、それぞれの親から一緒に受けた数々の罰を思い出します。そして、ロンドンではレジェンズ、トランプ、メイン・スクイーズ、モンクベリーズなどのナイトクラブへ、ニューヨークではスタジオ54とゼノンへ、ラゴスではダン・プリンスウィル兄弟が経営していたフェデラル・パレス・ホテルのプリンセスへと、夜の街に繰り出したことを思い出します。\n\nあなたが大学に通っていたニューヨーク州北部のジュネーヴという場所を訪ねたこと、そして同じくニューヨーク州北部のシラキュースという場所で大学に通っていた兄弟分のデス・ブレイスウェイトに会いに二人でドライブしたことを思い出します。\n\nあなたのポルシェ928S、彼のそして私のを思い出します。世界中のさまざまな都市で、警察が私たちを呼び止めては、なぜこんな若さでこんな車が買えるのかと尋ねてきたことを思い出します。\n\n彼らが私たちの何者であるかを知らなかったので、私たちは彼らを嘲笑い、多くの場合、彼らに痛烈な言葉を浴びせて、涙目と赤い顔のままにして立ち去ったものです！\n\nそれは1970年代前半から1980年代中頃のことで、本当に楽しかった！\n\n私たちが共に過ごした野性的な十代の日々を覚えていますか？\n\nカットフォードという見知らぬ場所に住むアデイェイェ兄弟が私たちのガールフレンドの一人に言い寄ったことに腹を立て、真夜中に大勢で乗り込んだことを覚えていますか？\n\nラエニ・ファグバイ、トニエ・アマクリー、そして私たちが「ケンタッキー・フライド・チキン・ギャング」と呼んでいたあの仲間たちを覚えていますか？\n\nキングス・ロード出身の、長くて真っ黒な髪を持つあの可愛くて背が高くてスリムな野性的な白人の女の子、私のアパートから出て行こうとしなかったあの子を覚えていますか？\n\nスローン・スクエアの「影の男」グレン、そしてハムステッドの「手回し屋」エタンを覚えていますか？\n\nキングス・ロードのグッド・アース中華レストラン、ナイツブリッジのミスター・チャウズ、テムズ川のほとりでドルフィン・スクエアの前にある「ホワイト・エレファント・オン・ザ・リバー」、そしてセント・ジョンズ・ウッドにあるロンドン最高のインド料理レストラン、ムムタズ——あなたがアメリカからロンドンに飛んでくるたびに、私たちが飲み食いし楽しんだその四軒を覚えていますか？\n\n「ホーン・オブ・プレンティ」、あの美しいレスト（原文ここで途切れています）", "vocab": [{"word": "assailants", "definition": "攻撃者、暴漢のこと。動詞 assail（攻撃する）の名詞形で、身体的または言語的に誰かを攻撃する人物を指す。"}, {"word": "rallying point", "definition": "人々が集まる中心的な存在や場所を意味するイディオム表現。仲間をまとめたり鼓舞したりする象徴的な人物や事物に使われる。"}, {"word": "alas", "definition": "悲しみや遺憾の気持ちを表す古風・文語的な感嘆詞。「ああ、残念ながら」という意味で、改まった文章や文学的な文脈でよく使われる。"}, {"word": "heritage", "definition": "先祖から受け継いだ文化的・歴史的・民族的な遺産や伝統のこと。個人やコミュニティのアイデンティティを形成する背景を指す際に使われる。"}, {"word": "eventful", "definition": "多くの重要な出来事や経験に満ちている様子を表す形容詞。単調ではなく、印象的な出来事が多く起きた期間や人生に対して使われる。"}, {"word": "squabbles", "definition": "些細なことをめぐる口論や小競り合いを指す名詞（または動詞）。深刻な対立ではなく、軽微なもめごとに対して使われるインフォーマルな表現。"}, {"word": "controversies", "definition": "公の場での強い意見の対立や論争を指す名詞。社会的・政治的に賛否が分かれる問題や出来事に関連してよく使われる。"}]}, {"title_ja": "AIの残酷な効率化：世界は多少の非効率を残すべきではないか？", "title_en": "The AI Brutality: Should the World Preserve Some Inefficiency?", "summary_ja": "コラムニストのトペ・ファスアは、人類が絶えず追求してきた効率化、そして今やAIによって加速するその流れが、最終的に混乱をもたらす可能性があると論じる。インバーターエアコンからAIツールまで、技術革新の歴史を効率追求の観点から振り返りつつ、AI活用スキルは現代のプロフェッショナルに不可欠だと述べる。一方で、ある程度の非効率を社会が意図的に保持することの価値についても問いかけている。", "summary_en": "Columnist 'Tope Fasua examines whether humanity's relentless pursuit of efficiency—now turbocharged by artificial intelligence—could ultimately do more harm than good. He traces the history of innovation as a drive toward efficiency, from inverter air conditioners to AI tools that compress creativity into nanoseconds. He argues that while AI skills are essential for modern professionals, society must pause to consider whether some degree of inefficiency is worth preserving.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/opinion/893076-the-ai-brutality-could-the-world-do-with-a-little-inefficiency-by-tope-fasua.html", "state_media": false, "category": "IT", "full_text": "But the real question we should be asking is whether the world could and should actually retain some inefficiencies, rather than the relentless pursuit of efficiency and more efficiency that may tip the scale and lead us all into confusion. There will certainly not come any day in the future where human beings will not have to lift a finger because robots have fixed all the problems. Artificial Intelligence will not be able to do every work – even though it will try hard.\nThe history of governments and businesses in this world could be validly summed up as the pursuit of efficiency. A good government is an efficient government that does the most with the littlest public resources and delivers the most value to citizens. Of course, achieving this level of perfection is impossible but governments around the world are giving it a shot, while being put under pressure by citizens for the highest levels of transparency, efficiency, frugality, value-for-money. For companies, shareholders want the highest returns, and even today, with the development of management theories, and the transition to the stakeholder paradigm, companies try to achieve an intricate mix of efficiency between their obligation to shareholders and other stakeholders.\nThe history of discoveries, inventions and innovations, the world over, is totally about how to achieve more efficiency. I was discussing inverter air-conditioning with a knowledgeable friend recently, and he lectured me on how the old A/C compressors had pistons inside them, which worked the same way as car engine pistons. But someone thought about how the same cooling could be achieved with less force than before. My friend explained how air-conditioning systems have become intelligent lately, slowing down when they achieve a level of cooling, and starting to work a little harder when the room temperature rises. This is in just one tiny corner of human existence. We must commend those who have done the research that makes our lives a little more liveable. Whether it is innovation in health systems, medicine, engineering, agriculture, housing, travel, and indeed everywhere, the truth is that humanity now lives a lot better than we did a hundred years ago.\nThe pursuit of comfort is endless, and smart innovators target systems that deliver more comfort to humanity. A machine is anything that allows human beings to use less effort to achieve the same results. I actually got this definition from a fictional engineering genius in an Indian movie. The movie is titled Three Idiots, and the genius is Chatur Ramalingam (Aamir Khan), standing up to the authoritarian Mr Virus (Viru Sahastrabuddhe), the director of the Imperial College of Engineering (ICE). It is known as one of the greatest Indian movies made and it won several awards. Now, we could discuss the politics of how much African people have contributed to these innovations that make live more liveable. This is not the focus of this article. African professionals and research may have suffered suppression, but the largest room in the world is the room for improvement. The bottom line is that everyone values a little more comfort, ease, efficiency, durability, speed, portability and other such conveniences. One could even argue that Nigerians overdo the pursuit of these conveniences, which they obtain for cash at whatever prices – the latest phones, gadgets, cars, even private jets. It is important to consider the sustainability of our tastes, our practices, our financial choices.\nThis is where the brutal efficiency of AI comes in.\nAI has been developed to:\n- Make work and the workplace more efficient;\n- Save time required for human beings to think – and thus maximise efficiency, especially in workplaces;\n- Shorten the time for creativity to the barest minimum – nanoseconds. And this could be an office document, a complex drawing, an artistic rendition, music, movies, etc.;\n- Help maximise relaxation and entertainment for human beings;\n- Demystify logistics and supply chains;\n- Among others.\nThis is what I can surmise so far about the AI phenomenon. I have been learning a lot more about it and have obtained certifications in Claude, Gemini and ChatGPT under the Coursiv platform, while continuing another eight-week learning on AI and Business Analytics at Cambridge University, online. In time, billions of people in the world will learn how to get more incredibly efficient using AI. People talk about an AI Bubble – in the event that too much hype and money has gone into its development everywhere. Well, that could be a possibility, but for now, this is evidently a skill that all professionals must acquire. With the ‘cheap’ Coursiv programme, I can now prompt AI to create images, short clips, and even music. This is apart from being able to use AI platforms to generate documents or perform analysis of documents, including comparisons among documents. And I am still quite a novice.\nNow, in the last few months, the top tech companies i", "translation_ja": "しかし私たちが本当に問うべきは、世界がある程度の非効率を保持できるか、また保持すべきかという点である。効率、さらなる効率を際限なく追い求めることで均衡が崩れ、私たち全員が混乱に陥る可能性があるからだ。将来、ロボットがあらゆる問題を解決し、人間が一切手を動かさなくて済む日が来ることは決してないだろう。人工知能はあらゆる仕事をこなせるわけではない――そうしようと懸命に試みるだろうが。\n\n世界における政府と企業の歴史は、効率の追求として正当に要約できる。良い政府とは、最小限の公共資源で最大の成果を上げ、市民に最大の価値を提供する効率的な政府である。もちろん、この水準の完璧さを達成することは不可能だが、世界中の政府が挑戦を続けており、市民からは最高水準の透明性・効率性・倹約・費用対効果を求める圧力にさらされている。企業にとっては、株主が最高の利益を求めている。今日においても、経営理論の発展やステークホルダー・パラダイムへの移行を経て、企業は株主とその他の利害関係者への義務の間で複雑な効率のバランスを実現しようとしている。\n\n世界中における発見・発明・イノベーションの歴史は、いかにより多くの効率を達成するかという問いに完全に集約される。先日、知識豊富な友人とインバーター式エアコンについて話していた際、彼は旧式のエアコン・コンプレッサーには内部にピストンがあり、自動車エンジンのピストンと同じ仕組みで動いていたと教えてくれた。しかしある人物が、従来よりも少ない力で同じ冷却効果を得る方法を考案した。友人は、エアコンがいかに近年賢くなったかを説明してくれた――一定の冷却レベルに達すると動作を緩め、室温が上昇すると少し強めに稼働するのだという。これは人間の生活のほんの小さな一角での話だ。私たちの生活を少し快適にしてくれる研究を行った人々を称えなければならない。医療システム・医学・工学・農業・住宅・交通、そしてあらゆる分野におけるイノベーションにより、人類は今や百年前と比べてはるかに豊かな生活を送っている。\n\n快適さの追求に終わりはなく、賢い革新者は人類にさらなる快適さをもたらすシステムを目標とする。機械とは、人間が同じ結果を達成するためにより少ない力を使えるようにするものである。この定義は実は、あるインド映画に登場する架空の天才エンジニアから得たものだ。その映画の題名は「三人のアホ」（Three Idiots）であり、天才は権威主義的なウイルス先生（ヴィル・サハストラブッデ）に立ち向かうチャトゥル・ラマリンガム（アーミル・カーン）である。インペリアル工科大学（ICE）の学長と対峙するこの映画は、最高のインド映画の一つとして知られ、数々の賞を受賞している。ここで、こうした生活向上のイノベーションにアフリカ人がどれほど貢献してきたかという政治的問題を論じることもできる。しかしこの記事の焦点はそこではない。アフリカの専門家や研究は抑圧されてきた側面もあるかもしれないが、世界で最も広い部屋は改善の余地のある部屋だ。重要なのは、誰もが少しでも多くの快適さ・利便性・効率性・耐久性・速度・携帯性などを求めているという事実である。ナイジェリア人はこうした利便性の追求を過剰に行っている、と言えるかもしれない――最新の電話・ガジェット・車、さらにはプライベートジェットまで、いくらかかろうとも現金で手に入れる。自分たちの趣味・習慣・財務的選択の持続可能性を考慮することが重要だ。\n\nここでAIの苛烈な効率化が登場する。\n\nAIは以下の目的のために開発されてきた：\n・仕事と職場をより効率的にすること；\n・人間が考えるために必要な時間を節約し、特に職場における効率を最大化すること；\n・創造性に要する時間をナノ秒単位まで短縮すること。これはオフィス文書、複雑な図面、芸術的表現、音楽、映画なども含む；\n・人間のリラクゼーションとエンターテインメントを最大化すること；\n・物流やサプライチェーンの複雑さを解消すること；\n・その他多数。\n\nこれが、私がAI現象についてこれまでに把握できた内容だ。私はこのテーマについて多くを学んでおり、CoursivというプラットフォームでClaude・Gemini・ChatGPTの認定資格を取得しつつ、ケンブリッジ大学のオンライン講座でAIとビジネス・アナリティクスの8週間のコースも受講継続中だ。やがて世界中の何十億もの人々が、AIを使ってより信じられないほど効率的になる方法を学ぶだろう。AIバブルについて語る人もいる――あまりにも多くの誇大宣伝と資金が世界中でその開発に注ぎ込まれているのではないかという懸念だ。その可能性はあるかもしれないが、今のところ、これはすべての専門家が習得しなければならないスキルであることは明らかだ。「安価な」Coursivプログラムを通じて、私は今やAIに画像・短編動画・音楽まで作成させることができる。これは、AIプラットフォームを使って文書を生成したり、複数文書の比較分析を行ったりする能力とは別の話だ。それでもまだ、私は相当な初心者だ。\n\nここ数か月で、大手テクノロジー企業は", "vocab": [{"word": "frugality", "definition": "倹約・節約を意味する名詞。お金や資源を無駄にしない姿勢を指し、政府や個人の財政管理の文脈でよく使われる。"}, {"word": "stakeholder paradigm", "definition": "企業経営において株主だけでなく従業員・顧客・社会など全利害関係者を重視するという考え方。現代の経営理論・ビジネス文脈でのイディオム的表現。"}, {"word": "surmise", "definition": "十分な証拠がないまま推測・推論することを意味する動詞・名詞。フォーマルな文章や論説文でよく用いられる。"}, {"word": "demystify", "definition": "複雑または神秘的に見えるものをわかりやすくする・謎を解くという意味の動詞。技術や専門分野の説明文脈で多用される。"}, {"word": "authoritarian", "definition": "権威主義的・独裁的であることを表す形容詞。個人や組織が絶対的な服従を要求する姿勢を指す。"}, {"word": "rendition", "definition": "芸術作品や楽曲などの解釈・表現・演奏バージョンを意味する名詞。創作物がどのように表現・再現されるかを示す際に使われる。"}, {"word": "relentless", "definition": "容赦なく続く・執拗な・止まらないという意味の形容詞。否定的または中立的なニュアンスで、強度の継続性を強調する際に使われる。"}]}, {"title_ja": "NDLEA、ラゴス空港でコカイン13kgを所持するナイジェリア系英国人の祖母を逮捕", "title_en": "NDLEA arrests Nigerian-British grandmother with 13kg cocaine at Lagos airport", "summary_ja": "ナイジェリアの麻薬取締機関NDLEAは、ラゴスのムルタラ・ムハンマド国際空港において、プランテン（調理用バナナ）の皮に偽装して隠されたコカイン13kgを荷物の中から発見し、67歳のナイジェリア系英国人の祖母を逮捕した。別の作戦では、アナンブラ州でコカイン密輸組織の主犯格とされる博士課程の学生が逮捕されたほか、複数の州でトラマドール、メタンフェタミン、大麻などが大量に押収された。NDLEA長官のブバ・マルワ氏は各部隊の活躍を称え、引き続き高い作戦水準を維持するよう指示した。", "summary_en": "Nigerian drug enforcement agency NDLEA arrested a 67-year-old Nigerian-British grandmother at Lagos's Murtala Muhammed International Airport after discovering 13kg of cocaine concealed inside fake plantain peels in her luggage. In separate operations, a PhD student linked to a cocaine smuggling syndicate was arrested in Anambra State, and large seizures of tramadol, methamphetamine, cannabis, and skunk were made across multiple Nigerian states. NDLEA Chairman Buba Marwa commended officers for the operations and urged them to maintain high operational standards.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/893084-ndlea-arrests-nigerian-british-grandma-with-13kg-cocaine-recovers-large-tramadol-consignments.html", "state_media": false, "category": "社会", "full_text": "The National Drug Law Enforcement Agency (NDLEA) has arrested a 67-year-old Nigerian-British grandma following the discovery of 13kg of cocaine in her luggage at the Murtala Muhammed International Airport (MMIA), Ikeja, Lagos.\nThis was contained in a statement issued by the Director, Media and Advocacy, NDLEA, Femi Babafemi, on Sunday. in Abuja.\nThe anti-drug agency said the drugs were concealed in peels of plantain, which appeared as real plantains and were packed among other food items.\nMr Babafemi said the suspect, who works as a caregiver in the UK, was arrested at the departure hall of Terminal 2 of the Lagos Airport while attempting to board a Virgin Atlantic airline flight to London on Sunday, 28 June.\nHe said that a thorough search of her bags resulted in the discovery of 31 big wraps of cocaine, which were packaged to appear like plantain hands, weighing a total of 13 kilograms.\n“In her statement, the elderly woman admitted full ownership of the recovered cocaine exhibits,” he said.\nIn another development, he said, a sting operation in Ekwusigo Local Government Area of Anambra State on Monday, 29 June, has resulted in the arrest of a 45-year-old PhD student at the University of Putra, Malaysia, over the seizure of 5.80kg of cocaine.\nMr Babafemi said the drugs were concealed in the walls of nine cartons of Orijin bitters, a consignment that was part of a consolidated cargo heading to Kuala Lumpur, Malaysia.\nHe said the arrest of the suspect in Anambra followed the interception of 36 parcels of cocaine, with a gross weight of 5.80kg, concealed within the walls of the herbal drink cartons.\nFour suspects were initially arrested in parts of Lagos during the investigation, including a driver who delivered the consignment to the cargo agent.\n“Also, a trader at ASPANDA market, Trade Fair Complex, Lagos, handed over the consignment to the driver for delivery to the cargo agent.\n“There was also an accomplice who supplied the cartons of Origin bitters used in concealing the cocaine.\n“The efforts eventually paid off, leading to the unmasking of the main suspect hiding in his village, Aziora, Ozubulu, Anambra, as the leader of the syndicate,” he said.\nIn another development, in Taraba, NDLEA operatives, acting on credible intelligence, on Saturday, 4 July, arrested a suspect with 43,980 capsules of Tramadol.\nMr Babafemi said the drugs were concealed inside two vehicle fuel tanks along Zaki-biam roa,d Wukari Local Government Area of the state, while coming from Onitsha, Anambra state.\n“Two suspects were arrested in possession of 1.7 kilograms of methamphetamine by NDLEA officers on Thursday, July 2, during a raid operation at Gwantu, Gwantu LGA, Kaduna state.\n“A 65-year-old suspect was nabbed with 231.7kg skunk at Ikwo, Ebonyi state, on Saturday,” he said.\nSimilarly, a 75-year-old grandpa was arrested in possession of 15kg of skunk at Kurgwi, Qua’anpan Local Government Area (LGA), Plateau State, on Friday, 3 July.\nAdditionally, in Gombe State, NDLEA operatives acting on credible intelligence on Wednesday, arrested two suspects at Kuri village, Yamaltu- Deba LGA, where they were found with 587 blocks of cannabis sativa, weighing 556kg.\nWith the same level of dedication, Mr Babafemi said that commands and formations of the agency across the country have continued the War Against Drug Abuse (WADA) sensitisation activities.\nThe campaigns, he said, were carried out in schools, worship centres, workplaces and communities, among other places, over the past week.\nREAD ALSO: NDLEA seizes N12.4bn cannabis shipment at Lagos port, arrests suspected traffickers\nThe NDLEA, he added, took the campaign to students and staff of Girls Secondary School, Abagana, Anambra, and Government Technical College, Obe, Enugu.\nOthers include Adeola Odutola College, Ijebu Ode, Ogun State, and FCE Staff Demonstration School, Kabuga, Kano State.\nThe NDLEA Chairman, Buba Marwa, commended the officers and men of the MMIA, Taraba, Kaduna, Ebonyi, Plateau, and Gombe Commands for the arrests and seizures.\nHe tasked officers to continue to raise the operational bar.\n(NAN)", "translation_ja": "国家麻薬法執行機関（NDLEA）は、ラゴス州イケジャにあるムルタラ・ムハンマド国際空港（MMIA）において、67歳のナイジェリア系英国人の祖母の荷物からコカイン13kgを発見し、同人を逮捕した。\n\nこれは、NDLEAの報道・広報局長フェミ・ババフェミ氏が日曜日にアブジャで発表した声明に記載されていた。\n\n同麻薬取締機関によると、薬物は本物のプランテンに見せかけた皮の中に隠されており、他の食料品とともに梱包されていたという。\n\nババフェミ氏は、英国でケアギバー（介護士）として働く容疑者が、6月28日（日曜日）にロンドン行きのヴァージン・アトランティック航空便に搭乗しようとしていたところ、ラゴス空港のターミナル2の出発ホールで逮捕されたと述べた。\n\n同氏によると、荷物を徹底的に調べた結果、プランテンの房に見せかけて梱包されたコカインの大きな包みが31個発見され、総重量は13キログラムに上ったという。\n\n「この高齢女性は供述の中で、押収されたコカインの所有を全面的に認めました」と同氏は語った。\n\nまた別の件として、6月29日（月曜日）にアナンブラ州エクウシゴ地方政府区域で実施された潜入捜査により、マレーシアのプトラ大学の博士課程に在籍する45歳の学生がコカイン5.80kgの押収を受けて逮捕されたと同氏は述べた。\n\nババフェミ氏によると、薬物はクアラルンプール（マレーシア）に向かう混載貨物の一部であった「オリジン・ビターズ」（ハーブ系飲料）9箱の壁の中に隠されていたという。\n\n同氏は、アナンブラ州での逮捕は、ハーブ飲料の段ボール箱の壁内に隠されたコカイン36包（総重量5.80kg）の押収に続くものだったと述べた。\n\n捜査の過程でラゴス各地において当初4人の容疑者が逮捕され、その中には貨物を通関業者に届けた運転手も含まれていた。\n\n「また、ラゴスのトレードフェアコンプレックスにあるASPANDA市場の商人が、貨物を運転手に渡して通関業者への配達を依頼していました。さらに、コカインの隠匿に使用されたオリジン・ビターズの段ボール箱を供給した共犯者もいました。こうした努力が実を結び、アナンブラ州オズブル・アジオラの村に潜伏していた組織のリーダーを特定することができました」と同氏は語った。\n\nさらに別の件として、タラバ州では、NDLEAの捜査員が信頼できる情報に基づいて行動し、7月4日（土曜日）に同州ウカリ地方政府区域のザキ・ビアム道路沿いで、アナンブラ州オニチャから来た車両2台の燃料タンクの中からトラマドール43,980カプセルを発見し、容疑者を逮捕した。\n\n「7月2日（木曜日）に、カドゥナ州グワントゥ地方政府区域グワントゥで実施した家宅捜索作戦において、NDLEAの捜査員がメタンフェタミン1.7kgを所持していた容疑者2人を逮捕しました。また、土曜日にはエボニ州イクウォで65歳の容疑者がスカンク（大麻）231.7kgを所持しているところを逮捕されました」と同氏は述べた。\n\n同様に、75歳の祖父がプラトー州クアアンパン地方政府区域クルグウィで7月3日（金曜日）にスカンク15kgを所持しているとして逮捕された。\n\nさらに、ゴンベ州では、信頼できる情報に基づいて行動したNDLEAの捜査員が水曜日に同州ヤマルトゥ＝デバ地方政府区域クリ村で容疑者2人を逮捕し、総重量556kgの大麻ブロック587個を押収した。\n\nこうした活躍と同水準の取り組みとして、ババフェミ氏は、全国各地の機関・部隊が先週にわたり「薬物乱用との戦い（WADA）」の啓発活動を継続したと述べた。\n\nキャンペーンは学校、礼拝施設、職場、地域社会などで実施されたという。\n\nNDLEAはまた、アナンブラ州アバガナの女子中等学校やエヌグ州オベの政府工科大学の生徒・職員にも啓発活動を実施した。\n\nその他にも、オグン州イジェブ・オデのアデオラ・オドゥトラ・カレッジやカノ州カブガのFCEスタッフ附属学校なども対象となった。\n\nNDLEA長官のブバ・マルワ氏は、MMIA、タラバ、カドゥナ、エボニ、プラトー、ゴンベの各部隊の捜査員と職員の逮捕・押収の成果を称賛し、作戦水準をさらに高めるよう指示した。\n\n（NAN）", "vocab": [{"word": "concealed", "definition": "「隠された、秘匿された」という意味の形容詞・動詞過去形。意図的に見えないように隠す行為を指し、犯罪報道や法律文書で頻繁に使用される。"}, {"word": "consignment", "definition": "「荷物、委託貨物」を意味する名詞で、特に輸送・貿易の文脈で使用される。一度に送られる商品のまとまりを指す専門用語。"}, {"word": "syndicate", "definition": "「（犯罪）組織、シンジケート」を意味する名詞。共通の目的のために協力する集団を指し、特に組織的な犯罪集団に用いられることが多い。"}, {"word": "interception", "definition": "「傍受、阻止、押収」を意味する名詞。目的地に到達する前に何かを止める行為を指し、法執行や軍事の文脈でよく使われる。"}, {"word": "unmasking", "definition": "「正体を暴くこと、素顔を明らかにすること」を意味する名詞・動名詞。比喩的に隠されていた真実や人物の正体を明らかにする際に使われる表現。"}, {"word": "sensitisation", "definition": "「啓発、意識向上」を意味する名詞（英国式綴り）。特定の問題について人々の意識や理解を高めるための活動を指す。"}, {"word": "credible intelligence", "definition": "「信頼できる情報（インテリジェンス）」を意味するイディオム的表現。法執行や安全保障の文脈で、信頼性が高いとみなされる情報源や情報を指す。"}]}, {"title_ja": "イラン最高指導者ハメネイ師の葬儀で参列者が「復讐」を叫ぶ", "title_en": "Mourners Chant 'Revenge' at Funeral for Iran's Slain Supreme Leader Khamenei", "summary_ja": "2月に死亡したイランの最高指導者アリー・ハメネイ師の葬儀が行われ、参列者らは復讐を求めるシュプレヒコールを上げた。公式追悼期間の2日目を迎えたが、後継者とされる息子のモジュタバー・ハメネイ師の姿は依然として公の場で確認されていない。後継者の不在により、イランの指導体制の行方をめぐる不透明感が高まっている。", "summary_en": "Funeral prayers were held for Ayatollah Ali Khamenei, Iran's Supreme Leader who was killed in February, drawing mourners who chanted calls for revenge. The second day of public mourning unfolded with no public appearance by his son and designated successor, Mojtaba Khamenei. The absence of the successor has fueled uncertainty about the future of Iran's leadership.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/05/world/middleeast/iran-funeral-supreme-leader.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラの公共住宅、地震前から専門家が脆弱性を警告していた", "title_en": "Years of Warnings About Venezuela's Public Housing Preceded Deadly Earthquakes", "summary_ja": "住民や建設専門家、地震学者たちは長年にわたり、ベネズエラの公共住宅が地震に対して危険なほど脆弱であると警告し続けていた。しかし、こうした構造上の懸念は繰り返し訴えられながらも放置され、地域住民は深刻なリスクにさらされたままとなっていた。地震が発生した際、住宅インフラに内在する欠陥が被害の甚大化につながったとみられる。", "summary_en": "Residents, construction experts, and seismologists had long warned that Venezuela's public housing was dangerously vulnerable to earthquakes. Despite repeated calls for attention, the structural concerns went unaddressed, leaving communities exposed to significant risk. When earthquakes struck, the pre-existing weaknesses in the housing infrastructure contributed to the devastating impact on affected populations.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/05/world/americas/venezuela-earthquake-la-guaira-building-collapse-government.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ウクライナ、ドネツク東部の都市制圧というロシアの主張を否定", "title_en": "Ukraine Denies Russian Claim of Capturing Eastern Donetsk City", "summary_ja": "ウクライナ軍は、ロシア軍が東部ドネツク州の都市を制圧したというクレムリンの主張を否定した。ウクライナ軍は、侵入を試みるロシア軍に対して陣地を維持していると発表している。両軍の兵士は廃墟と化した最前線でドローンを避けながら、首都から遠く離れた地で激しい戦闘を続けている。", "summary_en": "Ukraine's military has rejected a Kremlin assertion that Russian forces have seized a city in the eastern Donetsk region. Ukrainian troops report they are continuing to hold their positions against Russian infiltration attempts. The grinding frontline battle plays out amid ruined landscapes where soldiers on both sides navigate drone threats far from the capitals.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/05/world/europe/ukraine-russia-donetsk-front.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "人質交渉の膠着打開でパレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を二分する軍事ゾーンを避難民が通過することを許可し、パレスチナ人が徒歩で北ガザへの帰還を始めた。この措置は、人質解放をめぐる交渉の膠着状態が打開されたことを受けて実施された。今回の動きは、ガザ地区内の人道的状況における重要な変化を示している。", "summary_en": "Israel has permitted displaced Palestinians to begin crossing a military zone that divides the Gaza Strip, allowing them to return to northern Gaza on foot. The move came after a deadlock over hostage releases was resolved. The development marks a significant shift in the humanitarian situation within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Property Sector Crisis", "summary_ja": "中国大手不動産デベロッパーの万科（ヴァンキー）が多額の損失を報告し、同国の不動産危機がさらに拡大していることが浮き彫りになった。この事態は中国不動産市場全体の安定性に対する懸念を新たに高めている。市場関係者は、中国政府が事態の悪化を防ぐために介入するかどうかを注視している。", "summary_en": "Leading Chinese property developer Vanke has reported a significant financial loss, signaling that the country's real estate crisis continues to spread. The development raises fresh concerns about the stability of China's broader property market. Analysts and investors are now watching closely to see whether the Chinese government will intervene to prevent further deterioration.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性人質は長期間にわたり単独で拘束され、約8か月間を地下トンネルの中で過ごしたという。この事実は、人質たちが拘束中に極めて深刻な身体的・精神的苦境に置かれていたことを浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The disclosures highlight the severe physical and psychological conditions endured by hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国の関与後退でNATOが東欧防衛戦略を再考", "title_en": "NATO Rethinks Eastern Europe Defense as U.S. Commitment Wavers", "summary_ja": "米国のNATOへのコミットメント低下への懸念が高まる中、NATOは東欧防衛戦略の見直しを迫られている。ドイツはかつて自国軍が破壊した地域に戦車を派遣するなど、同地域でより積極的な軍事的役割を担いつつある。米国の安全保障への依存が不透明になる中、欧州各国は独自の防衛力強化に向けた取り組みを加速させている。", "summary_en": "NATO is reassessing its strategy for defending Eastern Europe amid concerns about reduced American engagement in the alliance. Germany is taking on a more prominent military role in the region, deploying tanks to areas its forces once devastated during World War II. This shift reflects a broader European effort to bolster its own defense capabilities as reliance on U.S. security guarantees becomes less certain.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/07/02/nato-ponders-how-to-defend-eastern-europe-as-america-pulls-back", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "同盟国がアメリカに圧力をかける術を学ぶ", "title_en": "Allies Learn How to Bully America Over Trade", "summary_ja": "トランプ政権が強硬な通商政策を推し進める中、一部の同盟国は独自の交渉力を持つことに気づき始めている。世界最先端の半導体製造を担う台湾は、そのチップ産業における優位性を活用してアメリカの圧力をかわせる可能性がある。経済的な相互依存の構造が、小国が強力なパートナーに対抗する手段についての再考を促している。", "summary_en": "As Donald Trump pursues an aggressive trade agenda, some US allies are discovering they have leverage of their own. Taiwan, home to the world's most advanced semiconductor manufacturing, may be able to use its chipmaking dominance to resist or soften American pressure. The dynamics of economic interdependence are forcing a rethink of how smaller nations can push back against a powerful partner.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/30/allies-learn-how-to-bully-america", "state_media": false, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大学生の学力が予想以上に低下、小学生レベルの学力しかない学生も", "title_en": "Students Are Performing Worse Than Expected, Some Testing at Elementary School Level", "summary_ja": "新たな報告書によると、大学生の学力に深刻なギャップが存在し、一部の学生は10歳児と同程度の学力しか持っていないことが明らかになった。高等教育機関が読み書きや計算などの基礎的なスキルを欠いた学生を受け入れている可能性が示唆されている。この結果は、初等教育から大学に至るまでの教育水準全体に関して、重大な疑問を投げかけている。", "summary_en": "A new report highlights alarming academic performance gaps among college and university students, with some testing at levels equivalent to ten-year-olds. The findings suggest that higher education institutions may be enrolling students who lack foundational skills in literacy and numeracy. This raises serious questions about educational standards across the pipeline from primary school through university.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ大統領、独立250周年記念式典を自己賛美の場に―「共産主義者」攻撃も", "title_en": "Trump Turns 250th Independence Day Into Self-Celebration, Attacks 'Communists'", "summary_ja": "ドナルド・トランプ大統領は、アメリカ独立250周年を祝う7月4日の式典で、熱波と雷雨の影響により1時間以上遅延した後、雨の中で演説を行った。トランプ氏はこの祝賀の場を自らの功績を称える機会として活用し、政敵を「共産主義者」と呼んで攻撃した。混乱した式典の中で同大統領は「アメリカは復活した」と宣言した。", "summary_en": "President Donald Trump delivered a rain-soaked speech at a delayed Fourth of July celebration marking 250 years of American independence. The event, pushed back over an hour due to extreme heat and thunderstorms, saw Trump use the occasion largely to glorify himself and attack political opponents he labeled 'communists.' The Republican president declared that 'America is back' before the crowd gathered for the chaotic festivities.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/07/05/250-years-of-american-independence-trump-praises-us-and-attacks-communists-at-chaotic-celebration_6755164_4.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "2026年W杯：フランス、パラグアイに辛勝しベスト8進出", "title_en": "2026 World Cup: France beat Paraguay 1-0 to advance to quarter-finals", "summary_ja": "フランスは2026年ワールドカップの決勝トーナメント1回戦で、パラグアイを1-0で下しベスト8進出を決めた。猛暑の中で行われた試合は終始緊迫した展開となり、粘り強く反撃するパラグアイに手を焼いた。薄氷の勝利を手にしたフランスは、次の準々決勝へと駒を進めた。", "summary_en": "France secured a narrow 1-0 victory over Paraguay in a tense and grueling World Cup round-of-16 match. Playing in sweltering heat, the French side struggled against a resilient Paraguayan team that mounted a fierce comeback effort. The hard-fought win sends France through to the quarter-finals of the 2026 World Cup.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/sports/article/2026/07/05/2026-world-cup-france-edge-past-paraguay-in-tense-battle-to-reach-the-quarter-finals_6755165_9.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "熱波でフランス・スペイン・ポルトガルの森林火災が深刻化", "title_en": "Heatwave Fuels Devastating Forest Fires Across France, Spain, and Portugal", "summary_ja": "激しい熱波の影響により、フランス、スペイン、ポルトガルで大規模な森林火災が発生し、一部地域では日曜日に気温が40℃に達すると予測されている。数百人の消防士が出動し、すでに数千ヘクタールが焼失した山火事の鎮火に当たっている。今回の火災は、今シーズン西欧・南欧を襲った最も深刻な環境危機の一つとなっている。", "summary_en": "A severe heatwave has triggered massive wildfires across France, Spain, and Portugal, with temperatures forecast to hit 40°C in some areas on Sunday. Hundreds of firefighters have been deployed to combat the blazes, which have already burned thousands of hectares of forest. The fires represent one of the most significant environmental crises to hit southern and western Europe this season.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/07/05/heatwave-fires-devastate-forests-across-europe_6755166_4.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国防省ニュースレター更新", "title_en": "Mindef Newsletter Update", "summary_ja": "シンガポール国防省（Mindef）は2026年7月5日にニュースレターの更新情報を配信した。この通知はストレーツ・タイムズのメールニュースレタープラットフォームを通じて送信された。読者はストレーツ・タイムズを通じて購読管理や追加の無料ニュースレターへの登録が案内された。", "summary_en": "The Singapore Ministry of Defence (Mindef) released a newsletter update on July 5, 2026. The communication was distributed via The Straits Times email newsletter platform. Readers were directed to manage their subscriptions or sign up for additional free newsletters through The Straits Times.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イブニングアップデート：ストレーツ・タイムズ日刊ニュースレター", "title_en": "Evening Update: The Straits Times Daily Newsletter", "summary_ja": "ストレーツ・タイムズは、最新ニュースを読者にお届けする日刊ニュースレター「イブニングアップデート」を発行しています。今回の号は2026年7月5日（日曜日）付けで、メールにて配信されました。読者はストレーツ・タイムズのウェブサイトから購読管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times publishes its Evening Update newsletter, a daily digest delivering top news stories to subscribers. The edition referenced is dated Sunday, July 5, 2026, distributed via email. Readers can manage their subscriptions or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニング・ブリーフィングは、その日の主要ニュースをまとめて届ける日刊メールニュースレターです。今回は2026年7月5日（日曜日）付けの配信となっています。読者は提供されたリンクから購読の管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a daily email newsletter delivering top news summaries to subscribers. This edition is dated Sunday, July 5, 2026. Readers can manage their subscription or sign up for additional free newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "午前3時からの現地取材：CGTNがハメネイ師葬儀を報道", "title_en": "On the Ground at 3 A.M.: CGTN Reports from Khamenei's Funeral", "summary_ja": "中国国営メディアCGTNは、ハメネイ師の葬儀を午前3時から現地記者が取材したと伝えている。同メディアによると、特派員らが式典の様子を現場からリポートしたという。ただし、CGTNは国家管理下のメディアであり、報道内容は同局の立場を反映している点に留意が必要である。", "summary_en": "CGTN reports that it covered Khamenei's funeral with on-the-ground journalists beginning as early as 3 A.M. The state-controlled outlet reports that the event drew significant attention, with its correspondents providing live reporting from the scene. Details of the funeral proceedings and crowd response are framed through CGTN's state-media perspective.", "source": "CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-04/On-the-Ground-from-3-A-M-Reporting-from-Khamenei-s-Funeral-1OvDFOkrxwk/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震から1週間以上、ラグアイラで捜索活動続く", "title_en": "Search continues in Venezuela's La Guaira over a week after deadly earthquakes", "summary_ja": "CGTNによると、ベネズエラのラグアイラでは壊滅的な地震発生から1週間以上が経過した現在も、救助隊員と家族が行方不明者を求めて瓦礫の中での捜索を続けているという。同メディアは、生存者発見への希望を捨てず懸命な努力が続けられていると伝えている。国営メディアであるCGTNは、この継続的な救助活動を、地域社会と政府による災害への断固たる対応として描いている。", "summary_en": "CGTN reports that rescue teams and family members are continuing to search through rubble in La Guaira, Venezuela, more than a week after devastating earthquakes struck the region. CGTN reports that efforts remain relentless as hope persists for finding survivors or recovering those still missing. The state media outlet frames the ongoing operation as a determined community and government response to the disaster.", "source": "CGTN", "tier": "state", "link": "https://newsus.cgtn.com/news/2026-07-03/Rescuers-search-rubble-more-than-a-week-after-Venezuela-earthquakes--1OsJWDND2Cc/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国共産党記念日における習近平演説に外国メディアが反応", "title_en": "Foreign Media React to Xi Jinping's Speech Marking CPC Centenary Anniversary", "summary_ja": "CGTNは、習近平国家主席が中国共産党記念日に行った演説に対し、外国メディアが見解を示したと伝えている。同国営メディアは、国際的な報道が演説の要点を取り上げたと主張しているが、取り上げられた反応の選定は北京側の意向を反映している可能性がある。外国メディアが実際にどの程度、またどのような論調で報道したかについての独立した検証は示されていない。", "summary_en": "CGTN reports that foreign media outlets shared commentary on Xi Jinping's speech delivered for the Chinese Communist Party's anniversary. The state outlet claims that international coverage highlighted key points from the address, though the framing and selection of foreign reactions reflect Beijing's preferred narrative. Independent verification of how broadly or favorably foreign media actually covered the speech is not provided.", "source": "CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-02/Foreign-media-share-views-on-Xi-Jinping-s-speech-for-CPC-anniversary-1OrVmJjUP2E/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "テヘランの集会参加者、イラン・ロシア関係の明るい未来を確信", "title_en": "Tehran Rally Participants Express Confidence in Iran-Russia Relations' Future", "summary_ja": "国営メディアのTASS/RTは、テヘランで開かれた集会の参加者がイラン・ロシア関係の将来に強い自信を示したと伝えている。同メディアによれば、参加者は両国の関係強化が双方に利益をもたらし、東西間の勢力均衡の確立に寄与すると主張したという。テヘラン交響楽団の音楽家・指揮者モフセン・クヘスタニ・ネジャード氏も、二国間関係への支持を表明した人物として引用されている。", "summary_en": "State media TASS/RT reports that participants at a Tehran rally expressed strong confidence in the future of Iran-Russia relations. The outlet claims attendees believe closer ties would benefit both nations and help establish a balance of power between East and West. Musician and Tehran Symphony Orchestra conductor Mohsen Kuhestani Nezhad was cited as among those voicing support for the bilateral relationship.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2155927", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ネタニヤフ首相、イランを含む米イスラエル間に意見の相違なしと主張", "title_en": "Netanyahu Claims No US-Israel Disagreements, Including on Iran", "summary_ja": "国営メディアであるTASS/RTの報道によれば、イスラエルのネタニヤフ首相は、イラン問題を含めてイスラエルと米国の間に意見の相違は存在しないと述べたとされる。同首相は、両国がイランに核兵器開発プログラムを放棄させるという共通の目標を持っていると主張したと伝えられている。この報道は国家管理下のメディアによるものであり、外交的な一致の描写については慎重な見方が求められる。", "summary_en": "State media TASS/RT reports that Israeli Prime Minister Benjamin Netanyahu stated there are no disagreements between Israel and the United States, including on the issue of Iran. Netanyahu claims that both countries share the goal of seeing Iran abandon its nuclear weapons program. The report comes from state-controlled media and should be treated with appropriate scrutiny regarding its framing of diplomatic alignment.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2155925", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロスアトム総裁、米国の小型原子炉開発はロシア戦略の正しさを証明と主張", "title_en": "Rosatom Chief Claims US Small Nuclear Plant Progress Validates Russian Strategy", "summary_ja": "国営企業ロスアトムのアレクセイ・リハチョフ総裁は、米国における小型モジュール炉の開発がロスアトム自身の原子力計画の正当性を裏付けると主張した。TASSおよびRTによると、リハチョフ総裁は数十年ぶりにマイクロ原子炉の物理的生産を実現した米国の関係者に祝意を示したとされる。同国営メディアは、米国の進展をロシアが小型原子力発電所技術に長年投資してきたことの証左として位置づけている。", "summary_en": "State-owned Rosatom CEO Alexey Likhachev claims that US development of small modular reactors proves the correctness of Rosatom's own nuclear energy plans. TASS/RT reports that Likhachev congratulated American counterparts on achieving physical production of microreactors for the first time in decades. The state media outlet frames US progress as vindication of Russia's long-standing investment in small nuclear power plant technology.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2155923", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "今日の大型テック株はどれほど安全か？", "title_en": "How Safe Are Today's Blockbuster Tech Stocks?", "summary_ja": "著者は、現在の大型テック株や巨大IPOのリスクを、過去の技術ブームの歴史的な類似事例と比較しながら検討している。特に1987年のNTT上場が、現在の状況を理解する上で示唆に富む警告的な事例として取り上げられている。AIや宇宙技術への投資トレンドが、過去のバブル崩壊の轍を踏むのかどうかを問いかけている。", "summary_en": "The author examines the risks of today's major technology stocks and mega-IPOs by drawing historical analogies to past technological booms. The piece highlights the 1987 NTT IPO as a particularly instructive and cautionary parallel. The author questions whether current AI and space technology investment trends will follow the path of past booms that ended in bust.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/japan-ntt-ipo-sobering-analogy-for-tech-stocks-today-by-barry-eichengreen-2026-07", "state_media": false, "category": "オピニオン", "full_text": "How Safe Are Today’s Blockbuster Tech Stocks?\nToday’s wave of mega-IPOs has unleashed a wave of analogies to past booms. While no analogy is perfect, an especially apposite—and sobering—case may be what followed Nippon Telegraph and Telephone’s IPO in February 1987.\nDARTMOUTH, UK—Questions about the financial implications of radical new technologies—AI, space travel, and their associated infrastructures, to pick a few—have led to a veritable analogy-fest. Is this a replay of the railway boom of the 1870s, which came to grief in the 1880s? A repeat of the electrification boom of the 1890s, which unfolded smoothly but took three decades to play out?", "translation_ja": "今日の大型テック株はどれほど安全か？\n\n今日の大型IPOの波は、過去のブームとの類似点をめぐる議論の波を巻き起こしている。どんな類推も完全ではないが、特に適切で—かつ冷静にさせる—事例として挙げられるのが、1987年2月の日本電信電話（NTT）のIPO後に起きた出来事かもしれない。\n\n英国ダートマス発——AI、宇宙旅行、そしてそれらに関連するインフラといった急進的な新技術の財務的な意味合いをめぐる問いが、類推合戦とも言うべき状況を生み出している。これは1870年代の鉄道ブームの再現であり、1880年代に破綻したパターンの繰り返しなのか。それとも1890年代の電化ブームの再来であり、順調に展開したものの完全に実を結ぶまでに30年を要したケースなのか。", "vocab": [{"word": "mega-IPO", "definition": "超大型の新規株式公開のこと。巨大企業が株式市場に初めて上場する際に用いられる表現で、市場に多大な影響を与えることが多い。"}, {"word": "apposite", "definition": "「非常に適切な、ぴったりの」という意味の形式的な形容詞。特定の状況や議論に対して的確に当てはまる事例や表現を指す際に使われる。"}, {"word": "sobering", "definition": "「冷静にさせる、真剣に考えさせる」という意味で、楽観的な気分や興奮を鎮め、現実を直視させるような事実や出来事を表す形容詞。"}, {"word": "analogy-fest", "definition": "「類推の祭典・乱発」を意味する砕けた複合表現で、ある話題をめぐって多くの人が次々と歴史的・比喩的な類似点を持ち出す状況を指す。"}, {"word": "came to grief", "definition": "「失敗に終わった、破綻した」を意味するイディオム。計画やブームなどが悲惨な結末を迎えた際に用いられる慣用表現。"}, {"word": "implications", "definition": "「含意、影響、意味合い」を意味する名詞。ある出来事や技術が将来的にもたらす可能性のある結果や波及効果を指すときに使われる。"}]}, {"title_ja": "ヨーロッパのAI「ドルチェ・ヴィータ」？", "title_en": "Europe's AI Dolce Vita?", "summary_ja": "筆者は、ヨーロッパが分断された資本市場や高いエネルギーコスト、低成長などの理由でAI競争において敗者になりかねないと指摘しつつも、労働よりも余暇を重視する文化的特性が逆に戦略的優位性となる可能性を論じている。AI主導の豊かさの時代において、ヨーロッパの福祉国家モデルとライフスタイルの価値観が人間的繁栄の先進モデルとなり得るという逆説的な主張を展開している。これはヨーロッパのAI革命における役割についての斬新な視点を提供するオピニオン記事である。", "summary_en": "The author argues that while Europe appears poised to lose out in the AI race due to fragmented capital markets, high energy costs, and slow growth, its cultural emphasis on leisure over work may paradoxically become a strategic advantage. Europe's existing welfare structures and lifestyle priorities could position it as a leading model for human flourishing in an era of AI-driven abundance. The piece presents a nuanced, contrarian perspective on Europe's role in the AI revolution.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/ai-could-give-europe-unexpected-competitive-edge-by-kenneth-rogoff-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Europe’s AI Dolce Vita?\nGlacial growth, aging welfare states, and a shortage of centrist leaders suggest Europe faces a major debt crisis in the years ahead. But its emphasis on leisure over work could become a decisive advantage, positioning the continent as the leading model for thriving in an age of AI-driven abundance.\nPARIS—In many respects, the European Union appears likely to become one of the AI revolution’s biggest losers, with China and the United States leaving its economies in the dust. Even if European energy policies were not already making a massive data-center buildout prohibitively expensive, its fragmented capital markets would make raising the necessary financing extraordinarily difficult.", "translation_ja": "ヨーロッパのAI「ドルチェ・ヴィータ」？\n\n極めて緩慢な成長、高齢化する福祉国家、そして中道派リーダーの不足は、ヨーロッパが今後数年以内に深刻な債務危機に直面することを示唆している。しかし、労働よりも余暇を重視するヨーロッパの姿勢は、決定的な優位性となり得る。それはAIが駆動する豊かさの時代において、繁栄するための先進的なモデルとして同大陸を位置づける可能性があるのだ。\n\nパリ発―多くの点で、欧州連合（EU）はAI革命の最大の敗者の一つとなる可能性が高く、中国と米国にその経済を大きく引き離されることになりそうだ。たとえヨーロッパのエネルギー政策が大規模なデータセンター建設をすでに法外なコストにしていないとしても、分断された資本市場は必要な資金調達を極めて困難なものにするだろう。", "vocab": [{"word": "glacial", "definition": "「氷河のように遅い」という意味で、進行や成長が非常に緩慢であることを比喩的に表す形容詞。ビジネスや経済の文脈で改革や成長の遅さを批判的に表現する際に使われる。"}, {"word": "fragmented", "definition": "「断片化した・分断された」という意味で、統一性や一体性がなくバラバラな状態を指す。ここでは欧州の資本市場が各国ごとに分割されて統合されていない状況を表している。"}, {"word": "prohibitively", "definition": "「法外に・現実的に不可能なほど」という意味の副詞で、コストや障壁が高すぎて実行を妨げるレベルであることを示す。主に経済・ビジネス文書で使用される。"}, {"word": "abundance", "definition": "「豊かさ・潤沢さ」を意味する名詞で、資源や富が十分以上に存在する状態を指す。AI・テクノロジー文脈では、自動化によって生み出される経済的余剰を指すことが多い。"}, {"word": "centrist", "definition": "「中道主義の・穏健派の」という意味の形容詞・名詞で、政治的に左右いずれにも極端に偏らない立場を指す。欧州政治の文脈で指導者や政党の立場を描写する際によく使われる。"}]}, {"title_ja": "プーチンのエスカレーションリスク", "title_en": "The Putin Escalation Risk", "summary_ja": "筆者は、クリミアへの攻撃、ロシア本土への打撃、前線での挫折、経済的圧迫など複数の方面で前例のない圧力にさらされるプーチン大統領が、25年の政権史上最も脆弱な立場に追い込まれていると論じる。追い詰められたプーチンが窮地を脱しようと、西側諸国に対して劇的なエスカレーションを試みるリスクが高まっているというのが論考の核心である。これは、絶望的な独裁者を追い詰めることの危険性を警告するオピニオンとして位置づけられる。", "summary_en": "The author argues that Putin, facing unprecedented pressure on multiple fronts including Crimea, Russian territory strikes, frontline setbacks, and economic strain, finds himself in the most vulnerable position of his 25-year rule. The central thesis is that as Putin feels increasingly cornered, the risk grows that he will attempt to escape his predicament through a dramatic, game-changing escalation against the West. This is framed as an opinion warning about the dangers of pushing a desperate autocrat into a corner.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/putin-escalation-risk-failing-ukraine-war-could-lead-to-rash-behavior-by-ian-bremmer-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Putin Escalation Risk\n                        If Ukraine can continue to disrupt Crimea, strike more targets in the heart of Russia, frustrate Russia’s frontline forces, and pile more pressure on Russia’s hobbled economy, President Vladimir Putin will feel increasingly cornered. The temptation to escape his predicament through a game-changing attack will grow stronger.\n                    \n                        NEW YORK—With Russia under pressure on multiple fronts, President Vladimir Putin finds himself in a tighter spot than at any other moment of his quarter-century in power. Putin remains firmly in charge of the Kremlin, but there is a growing risk that he will try to escape his current predicament by escalating his conflict with the West.\n        https://prosyn.org/sEAQlcI", "translation_ja": "プーチンのエスカレーションリスク\n\nウクライナがクリミアを引き続き混乱させ、ロシア中枢部のより多くの標的を攻撃し、ロシアの前線部隊を苦しめ、疲弊したロシア経済にさらなる圧力をかけ続けるならば、ウラジーミル・プーチン大統領はますます追い詰められた状況を感じるようになるだろう。局面を一変させる攻撃によって窮地を脱しようとする誘惑は、ますます強まっていくことになる。\n\nニューヨーク発――複数の戦線でロシアが圧力にさらされる中、ウラジーミル・プーチン大統領は、四半世紀に及ぶ権力掌握のいかなる時期よりも厳しい状況に置かれている。プーチンは依然としてクレムリンを確固たる支配下に置いているが、彼が現在の窮地から脱しようとして西側諸国との紛争をエスカレートさせるリスクが高まりつつある。", "vocab": [{"word": "predicament", "definition": "苦境、窮地を意味する名詞。解決が難しい困難な状況に置かれていることを指し、本文ではプーチンが追い詰められた状況を表現するために使われている。"}, {"word": "escalating", "definition": "段階的に激化・拡大させることを意味する動詞の現在分詞形。紛争や緊張が徐々にレベルを上げていく様子を表し、国際関係や安全保障の文脈で頻出する。"}, {"word": "hobbled", "definition": "妨げられた、機能を損なわれた状態を意味する形容詞。本来は足を縛られた馬を指すが、比喩的に経済や組織が制約を受けて十分に機能できない状態を表す。"}, {"word": "game-changing", "definition": "状況や局面を一変させるほどの大きな影響力を持つことを意味する複合形容詞。スポーツ由来の表現で、ビジネスや政治・軍事の文脈でも広く使われる慣用表現。"}, {"word": "cornered", "definition": "逃げ場を失い追い詰められた状態を意味する形容詞。動物が隅に追い詰められたイメージから転じて、政治的・外交的に選択肢がなくなった状況を比喩的に表す。"}, {"word": "frustrate", "definition": "計画や試みを妨げ、達成できないようにすることを意味する動詞。単に「苛立たせる」だけでなく「阻止する・無効にする」という意味でも使われる上級語彙。"}]}, {"title_ja": "建国250年：マムダニの統一ビジョン対トランプの歴史改ざん", "title_en": "Mamdani's Unity Vision vs. Trump's Rewritten History on America's 250th", "summary_ja": "7月3日、ニューヨーク市長ゾーラン・マムダニとトランプ大統領は、アメリカに対する全く異なるビジョンを示す演説をそれぞれ行った。コラムニストのムスタファ・バユーミは、マムダニが矛盾を認めつつも統一と前進を訴えた誠実な演説を行った一方、トランプは冷戦時代のレトリックや歴史修正主義、政治的な恐怖煽動に頼ったと論じる。著者は、ラコタ族から奪われた土地に建つマウント・ラシュモアでトランプが歴史的不正義を認める者を非難したことの皮肉を指摘する。", "summary_en": "On July 3rd, NYC Mayor Zohran Mamdani and President Trump delivered competing speeches with starkly different visions of America. Columnist Moustafa Bayoumi argues that Mamdani offered an honest, unifying address acknowledging contradictions and striving for progress, while Trump relied on Cold War rhetoric, revisionist history, and political fear-mongering. The author highlights the irony of Trump speaking at Mount Rushmore—built on land stolen from the Lakota people—while condemning those who acknowledge America's history of injustice.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/05/on-americas-250th-mamdani-called-for-unity-while-trump-rewrote-the-past", "state_media": false, "category": "オピニオン", "full_text": "If Donald Trump’s address on 3 July from Mount Rushmore will be remembered at all, it will be because that was the day of competing speeches, and competing visions, of the United States. Earlier on 3 July, the New York City mayor, Zohran Mamdani, delivered a speech that was about half as long as Trump’s 28-minute address, but one that offered a far different assessment of the challenges facing his city and our nation.\n“We see a city of contradictions within a nation of contradictions,” Mamdani said, while seated at George Washington’s desk and flanked by newly naturalized American citizens. “We see the wealthiest country in the history of the world – one where children go to sleep hungry while the world’s first trillionaire hungers for more.”\nMamdani’s speech was rich with historical references, beginning with his mention of the Lenape people who lived on the land of what we now call New York City before the Europeans arrived. (As far as I know, Trump never mentions the Indigenous nations of this land.) Mamdani’s address made a (too) brief nod to American chattel slavery, before celebrating American immigration, noting: “Irish immigrants [who] arrived with stomachs aching from a famine manufactured by imperial cruelty” along with “Jewish people escaping pogroms”.\nNext, it offered a sharp warning that the nation must not lose its way. “Those ideals upon which our nation was built – they are strong enough to endure any authoritarian regime, but only if we reach for them,” the mayor said. “Ours is a nation working each day towards the perfection in which it was conceived. A nation striving each day to better itself. Therein lies the work of America – the striving, the bettering, the reaching towards perfection.”\nBy their nature, these types of speeches are flavored with more than a dash of national self-flattery. And while Mamdani’s speech was clearly situated in the conflicts of our present political moment, his rhetoric was nevertheless unifying and optimistic. The latter half of Trump’s 3 July address and parts of his 4 July address were basically a stump speech for Republicans, as they face a tough midterm election season ahead.\nTrump, clearly rattled by the success of the left wing of the Democratic party in New York and across the country, has decided to return to the 1950s. He is now brazenly resurrecting cold war rhetoric, repeatedly labeling his opponents “godless communists”, as he did on Friday.\nTrump delivered yet another speech on 4 July and in Washington DC. This address, besides being almost rained out, felt more like a strange mix of a State of the Union Address and a 1970’s game show, as Trump kept wheeling out old flags and centenarian veterans onto his stage as if they were all up for auction. Human and non-human props aside, his actual 4 July lecture offered, perhaps surprisingly, less substance than the one he had given the day before.\nBut democratic socialists are clearly not the “godless communists” Trump claims. Take our mayor, for example. Since Mamdani is a Muslim and a democratic socialist, he would be a Muslim communist and not a godless one. Please get it right, Mr President. Of course, the whole “godless communists” thing is pure fiction, but, as Trump well knows, it’s easier to fight the enemy who lives in your imagination than your actual opponent challenging you at the polls.\nMamdani offered sober assessments of political opportunism. “At every moment in our past, those who led through exclusion and isolation have tried to win power and enrich themselves by turning us against one another,” he said, “Division is the oldest trick in politics, and the cheapest.”\nTrump, on the other hand, simply rewrote the past. “As for those who peddle Marxist lies about our heritage, tell our children that we live on stolen land or that our heroes were oppressors, they’re doing something much worse than slandering our past,” Trump said on 3 July. “They are slandering and attacking our future – not going to let that happen.”\nBut Trump was delivering his speech on stolen land. That day, he was on Mount Rushmore, which is in the Black Hills, sacred territory of the Lakota people, who call the area He Sapa. “A more ripe and rank case of dishonorable dealings will never, in all probability, be found in our history” is how a 1980 US supreme court opinion described the theft of the Black Hills from the “Sioux Nation of Indians”.\nAs historian Nick Estes points out about that supreme court decision: “The court awarded the tribe $102 million; today, with the accumulated interest, it comes to nearly $2 billion. But the Lakota position remains unwavering, as shown by the popular slogan, ‘The Black Hills are not for sale!’ The relationship with He Sapa cannot be translated into money. The land itself, the tribes said, must be returned.”\nTrump’s hubris is legendary (he has suggested he wants his face on Mount Rushmore), and he obsessively repeats, as he did in this speech, that the United States was “laughed ", "translation_ja": "ドナルド・トランプが7月3日にマウント・ラシュモアで行った演説が記憶されるとすれば、それはこの日、競い合う二つの演説と、アメリカ合衆国に対する競い合う二つのビジョンがあったからだろう。7月3日の早い時間、ニューヨーク市長のゾーラン・マムダニは、トランプの28分間の演説の約半分の長さの演説を行ったが、その内容は彼の市と我々の国が直面する課題について、まったく異なる評価を示すものだった。\n\n「私たちは、矛盾に満ちた国の中の、矛盾に満ちた都市を見ています」とマムダニは述べた。彼はジョージ・ワシントンの机に座り、新たに市民権を取得したアメリカ人たちに囲まれていた。「私たちは、世界の歴史上最も豊かな国を見ています――子どもたちが空腹のまま眠りにつく一方で、世界初のトリリオネア（兆万長者）がさらなる富を渇望している国を。」\n\nマムダニの演説は歴史的な言及に富んでいた。まず、ヨーロッパ人が到来する以前に現在のニューヨーク市の土地に暮らしていたレナペの人々に触れることから始まった（私の知る限り、トランプがこの土地の先住民族に言及することはない）。マムダニの演説はアメリカの奴隷制度についても（簡潔ではあるが）触れた後、アメリカへの移民を称え、「帝国主義の残酷さによって引き起こされた飢饉で空腹を抱えながら到来したアイルランド移民」や「ポグロムから逃れたユダヤ人」に言及した。\n\n次に、国が道を見失ってはならないという鋭い警告を発した。「我が国が築かれたその理念は——いかなる権威主義的な体制にも耐えられるほど強固です。しかし、私たちがその理念に手を伸ばし続ける場合に限って」と市長は述べた。「我々の国は、構想された完成形へと日々歩み続けている国です。毎日自らをより良くしようと努力している国です。そこにこそアメリカの使命があります——努力し、向上し、完成へと手を伸ばし続けること。」\n\nその性質上、こうした演説には多少の自国礼賛が含まれるものだ。マムダニの演説は明らかに現在の政治的対立の文脈に置かれていたが、彼のレトリックは依然として統一的で楽観的なものだった。一方、トランプの7月3日の演説の後半と7月4日の演説の一部は、基本的に共和党のための選挙演説であり、彼らが厳しい中間選挙の季節を前にしていることを反映していた。\n\nトランプは、ニューヨークや全米における民主党左派の成功に明らかに動揺し、1950年代への回帰を決意したようだ。彼は今や臆面もなく冷戦時代のレトリックを復活させ、金曜日に行ったように、対立相手を繰り返し「無神論的共産主義者」と呼んでいる。\n\nトランプは7月4日にもワシントンDCでさらに演説を行った。この演説はほぼ雨に流されそうになったほかに、国家演説と1970年代のゲームショーを奇妙に混ぜ合わせたような印象を与えた。トランプが古い旗や百歳を超えた退役軍人たちを次々と舞台に引き出す様子は、まるで競売にかけているようだった。人間や非人間の小道具はさておき、彼の7月4日の演説の内容は、前日のものよりも実質が乏しかった。\n\nしかし、民主社会主義者たちはトランプが主張するような「無神論的共産主義者」ではない。例えば我々の市長を見てみよう。マムダニはムスリムであり民主社会主義者であるから、彼は「ムスリム共産主義者」となり、無神論者ではないことになる。大統領、正確に把握してください。もちろん、「無神論的共産主義者」という表現は全くの虚構だが、トランプがよく知っているように、現実の選挙で自分に挑む実際の相手よりも、想像の中の敵と戦う方が容易なのだ。\n\nマムダニは政治的日和見主義について冷静な評価を下した。「私たちの過去のあらゆる瞬間に、排除と孤立によって指導しようとした者たちは、私たちを互いに反目させることで権力を握り、自らを富ませようとしてきました」と彼は述べた。「分断は政治において最も古い手口であり、最も安易な手口です。」\n\n一方トランプは、単純に過去を書き換えた。「我々の歴史についてマルクス主義的な嘘を流布し、子どもたちに私たちが盗んだ土地に住んでいると教え、我々の英雄を圧制者と言う者たちは、過去を中傷するよりもはるかに悪いことをしている」とトランプは7月3日に述べた。「彼らは私たちの未来を中傷し、攻撃しているのだ——そんなことはさせない。」\n\nしかし、トランプはまさに盗まれた土地の上で演説をしていたのだ。その日、彼はマウント・ラシュモアにいたが、それはブラックヒルズにあり、ラコタ族の聖地であり、彼らがヘ・サパと呼ぶ地だ。1980年の米最高裁の判決は、この地がラコタ族から不当に奪われたことについて「我が国の歴史の中でこれほど不名誉な取引は、おそらく今後も見つからないだろう」と表現した。\n\n歴史家のニック・エステスがこの最高裁判決について指摘するように、「裁判所は部族に1億200万ドルを授与した。今日では積み上がった利子と合わせてほぼ20億ドルになる。しかしラコタ族の立場は、『ブラックヒルズは売り物ではない！』という広く知られたスローガンが示すように、揺るぎないままだ。ヘ・サパとの関係は金銭に換算できるものではない。土地そのものを返還しなければならないと部族は言った。」\n\nトランプの傲慢さは伝説的だ（彼はマウント・ラシュモアに自分の顔を刻みたいと示唆したことすらある）。彼はこの演説でも繰り返し強調したように、アメリカはかつて世界に「笑われていた」と執拗に述べ続けた。", "vocab": [{"word": "chattel slavery", "definition": "動産奴隷制。人間を財産（動産）として所有・売買する制度のこと。アメリカ史における奴隷制度を指す際に使われる法的・歴史的用語。"}, {"word": "hubris", "definition": "傲慢さ、思い上がり。特に権力者が自らの力を過信し、限度を超えた自信を持つことを指すギリシャ語由来の表現。"}, {"word": "revisionist", "definition": "修正主義的な。歴史的事実や定説を意図的に書き換えたり、都合よく解釈し直したりすることを形容する言葉。"}, {"word": "stump speech", "definition": "選挙運動演説。政治家が選挙活動中に繰り返し行う定型的な遊説演説を指す慣用表現。"}, {"word": "peddle", "definition": "（思想・情報などを）広める、売り込む。主に否定的な文脈で、虚偽や危険な考えを広めることを指して使われる動詞。"}, {"word": "pogrom", "definition": "ポグロム。主にロシア帝国などで起きたユダヤ人への組織的な迫害・虐殺を指す歴史的用語。"}, {"word": "opportunism", "definition": "日和見主義。原則や信念よりも状況や利益に応じて行動や立場を変える態度のこと。政治的文脈でよく使われる。"}]}, {"title_ja": "アメリカ人はかつて暴君から独立を宣言した――今また、そうしなければならない", "title_en": "Americans Declared Independence From a Tyrant Once — We Must Do So Again", "summary_ja": "著者クレア・フィンケルスタインは、独立宣言に記されたジョージ3世の横暴と、2025年のトランプ政権による国内への軍隊展開を鋭く対比させている。連邦軍を市民統治に介入させ、司法の監視を弱体化させる行為は、建国者たちが戦った専制主義と重なると主張する。彼女は、軍の独立性と三権分立の侵食がアメリカ民主主義に深刻な脅威をもたらしていると警告する。", "summary_en": "Author Claire Finkelstein draws stark parallels between King George III's abuses listed in the Declaration of Independence and the Trump administration's domestic military deployments in 2025. She argues that using federal troops against civilian governance, suppressing judicial oversight, and potentially influencing midterm elections mirrors the tyrannical behavior the founders fought against. Finkelstein warns that the erosion of military independence and checks and balances poses a grave threat to American democracy.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/05/declaration-of-independence-trump", "state_media": false, "category": "オピニオン", "full_text": "As the United States marks the 250th anniversary of the Declaration of Independence, marking the official birth of the new nation, it is worth remembering some of the reasons the document offers as just cause for making war on the British monarchy.\n“No taxation without representation” is the slogan that is best known as the core complaint of the colonists, a reference to the colonists’ objections to the 1765 Stamp Act and a series of taxes levied by the British crown thereafter over which Americans had no means of objecting in parliament. But such taxes were not the only provocation to war.\nAnother significant objection to the crown’s control over the colonies was its insertion of military troops into civilian life. The Declaration details the fact that King George had sent British officers to harass the people; that he had kept standing armies among the people during peacetime without the consent of colonial legislatures; that he had attempted to place the military in control of civilian governments; that he had forced civilians to house British officers (“quartering”) in their own homes; that he had forced Americans taken prisoner to take up arms against their own countrymen; and finally that he had provoked domestic insurrections among the people and even incited Native Americans against the colonists.\nThis list of complaints is striking in light of events of the present day. Substitute ICE and Customs and Border Protection (CBP) for the British officers sent to harass the people; substitute federalization and deployment of the national guard and the marines to US cities in 2025 for keeping standing armies; substitute using federal troops over the objections of Democratic governors; and substitute portraying protests in Portland in 2020 and Minnesota in 2026 as violent civil unrest warranting federal force, and the pictures are dismayingly similar.\nGiven the oath members of the US military swear to defend the constitution upon enlistment, and their general adherence to that oath, the campaign critics say presses federal troops into service against political opposition and weakens checks and balances has not been entirely smooth sailing for Donald Trump.\nIt has required the removal of top Pentagon lawyers and internal pressure against those who voice objections to the Department of Defense’s policies. Slowly but surely, this pressure campaign has been working to undermine integrity in the services and encourage or compel compliance with legally questionable policies, such as the strikes on drug boats in the Caribbean and eastern Pacific.\nUltimately, current expansive interpretations of commander-in-chief authority increase the likelihood of military compliance with presidential directives, even in domestic deployments where such compliance might be least expected.\nUsing the military to undermine traditional civilian modes of governance, the signatories to the Declaration remind us, is one of the preferred tools of dictators. If the military can be brought along, the president’s ability to eliminate other checks and balances is greatly facilitated. This is also the path to undermining the rule of law.\nThe signatories to the Declaration also point to King George’s attack on another branch of government, namely the judiciary. Among other things, courts have the power to issue rulings that rein in the military, and thus controlling the judges is a critical part of the effort to concentrate the power of the executive.\nSurprisingly, the US supreme court did not come through for Trump in its December decision regarding federalization of the Illinois national guard. Much to Trump’s dismay, the court found that the administration violated the law in deploying the state’s guard troops in Chicago to control civil unrest, exceeding its authority under 10 USC §12406, the statute used to deploy federal troops.\nTrump v Illinois was likely only a temporary setback for the administration, given the other options at its disposal for domestic deployments. In particular, Trump could invoke the Insurrection Act, an amalgam of statutes of longstanding concern to civil rights groups who have warned it may be an unassailable assertion of presidential might.\nOthers, the present author included, take a more tempered view of its authority, but it is generally agreed to be more supportive of a president’s ability to federalize and deploy troops over the objections of state governors than any other source of law.\nWhy Trump stopped short of using the Insurrection Act after the Illinois ruling is anybody’s guess. One danger is that he could be saving it for a break-glass moment when there is an urgent need to influence politics, such as midterms. His threats to make use of it are surely to be taken seriously.\nPreparing for military involvement in the midterms\nThe idea that a president might use federal troops to influence domestic elections may seem far-fetched, but it is not. When Trump lost the 2020 election, he entertained a plan, a", "translation_ja": "アメリカが独立宣言250周年を迎えるにあたり、この文書が英国王政に対する正当な開戦理由として挙げた幾つかの根拠を振り返ることは意義深い。\n\n「代表なくして課税なし」というスローガンは、植民地人の核心的な不満として最もよく知られている。これは1765年の印紙税法と、その後イギリス王室が課した一連の税金に対する異議申し立てを指しており、植民地人には議会でこれに反対する手段がなかった。しかし、課税だけが開戦の口実ではなかった。\n\n王室による植民地支配に対するもう一つの重大な異議は、軍隊を市民生活に介入させたことである。独立宣言は、ジョージ王が人々を嫌がらせするためにイギリス士官を派遣したこと、植民地議会の同意なく平時に常備軍を駐留させたこと、軍を文民政府の支配下に置こうとしたこと、市民に自宅へのイギリス士官の宿泊（「クォータリング」）を強制したこと、捕虜となったアメリカ人に同胞に対して武器を取るよう強制したこと、そして国内での反乱を煽り、さらにはネイティブ・アメリカンを植民地人に対してそそのかしたことを詳述している。\n\nこの不満のリストは、現在の出来事に照らしてみると驚くほど示唆的である。人々を嫌がらせするために派遣されたイギリス士官をICEや税関・国境警備局（CBP）に置き換えてみよ。常備軍の駐留を、2025年に米国の都市に展開された州兵と海兵隊の連邦化・派遣に置き換えてみよ。民主党知事の反対を押し切った連邦軍の使用、そして2020年のポートランドや2026年のミネソタでの抗議活動を軍による鎮圧を正当化する暴力的な市民不安として描写することに置き換えてみると、その構図は不安なほど酷似している。\n\n入隊時に憲法を守ることを誓う米軍将兵は一般にその誓いを守っているため、批判者が言うように連邦軍を政治的反対勢力への行使に向かわせ、抑制と均衡を弱体化させようとするキャンペーンは、ドナルド・トランプにとって必ずしも順調ではなかった。\n\nそのためには、国防総省の政策に異議を唱える者に対する国防省内の国防法律顧問の罷免や内部圧力が必要とされてきた。この圧力キャンペーンは徐々に機能し、軍内部の誠実さを損ない、カリブ海および東太平洋での麻薬密輸船への攻撃など、法的に疑わしい政策への服従を促し、あるいは強制している。\n\n最終的に、現在の拡大した最高司令官権限の解釈は、大統領の指令への軍の服従の可能性を高めており、そのような服従が最も期待されない国内展開においてすら同様である。\n\n軍を使って伝統的な文民統治を弱体化させることは、独立宣言の署名者たちが独裁者の常套手段の一つとして指摘している。軍を取り込むことができれば、大統領は他の抑制と均衡をも排除しやすくなる。これはまた、法の支配を損なう道でもある。\n\n独立宣言の署名者たちはまた、ジョージ王による別の政府機関、すなわち司法への攻撃も指摘している。裁判所は軍を抑制する判決を下す権限を持っており、したがって判事を制御することは行政権を集中させる取り組みの重要な部分となっている。\n\n意外なことに、連邦最高裁判所はイリノイ州州兵の連邦化をめぐる12月の判決でトランプ側に有利な判断を下さなかった。トランプの失望をよそに、最高裁は市民の騒乱を抑制するためにシカゴに州兵を展開することが、連邦軍の展開に使用された法律である合衆国法典第10編第12406条の下で行政権を逸脱した違法行為であると判断した。\n\nトランプ対イリノイ州訴訟は、おそらく一時的な挫折にすぎないだろう。なぜなら、国内展開には他の手段もあるからだ。特に、トランプは反乱鎮圧法（インサレクション・アクト）を発動することもできる。これは市民権団体が大統領権限の抵抗し難い行使になりかねないと警告してきた、長年懸念されてきた法律の複合体である。\n\n本稿の著者を含む他の論者はその権限についてより抑制的な見方をしているが、いずれにせよこの法律は、他のいかなる法源よりも州知事の反対を押し切って部隊を連邦化・展開する大統領の権限を支持するものと広く認識されている。\n\nイリノイ州判決の後でもトランプが反乱鎮圧法の発動に踏み切らなかった理由は誰にもわからない。一つの懸念は、中間選挙のように政治に影響を与える緊急の必要が生じた際の「非常用」として温存している可能性だ。この法律を利用するという彼の脅しは確かに真剣に受け止めなければならない。\n\n中間選挙への軍の関与に備えて\n\n大統領が連邦軍を国内選挙に影響を与えるために使う可能性などとても現実的とは思えないかもしれないが、決してそうではない。トランプが2020年の選挙で敗北した際、彼はある計画を検討していた――", "vocab": [{"word": "quartering", "definition": "軍人を民間人の家屋に強制的に宿泊させること。歴史的・法律的文脈で使われる用語で、アメリカ独立宣言でも問題とされた王権の乱用の一つ。"}, {"word": "federalization", "definition": "州の軍隊（州兵など）を連邦政府の指揮下に置くこと。政治・法律の文脈で、大統領権限の行使として論じられる専門用語。"}, {"word": "insurrection", "definition": "政府や権威に対する武装反乱または暴力的な反抗のこと。「Insurrection Act（反乱鎮圧法）」のように法律用語としても用いられる。"}, {"word": "amalgam", "definition": "異なる要素や法律などが混合・融合したもの。ここでは複数の法律が一つにまとめられた複合体を指す比喩的表現。"}, {"word": "far-fetched", "definition": "「無理のある」「現実離れした」という意味のイディオム。議論や考えが信じがたいほど不自然であることを表す。"}, {"word": "checks and balances", "definition": "三権分立における抑制と均衡の原則を指す政治・憲法用語。一つの機関が権力を独占しないよう相互に監視・制限する仕組み。"}, {"word": "compel", "definition": "「強制する」「余儀なくさせる」という意味の動詞。外部からの圧力によって行動を強いる状況で使われ、単なる「説得」より強い強制力を示す。"}]}, {"title_ja": "世界の指導者たちの不道徳は伝染する――希望の光としての教皇", "title_en": "World Leaders' Immorality Is Contagious — Pope Leo Offers a Moral Counterweight", "summary_ja": "コラムニストのサイモン・ティスダルは、トランプ、プーチン、ネタニヤフの3首脳が善悪の判断を欠くという共通点を持ち、その不道徳な行動が世界規模で「普通のこと」として定着しつつあると論じる。国際法や伝統的な道徳規範は極右ポピュリズムと権力の乱用によって侵食されており、市民社会も沈黙することで共犯になりうると警告する。一方、新教皇レオは戦争を厳しく非難し、「協力の文化」の再建を訴える数少ない道徳的指導者として称賛されている。", "summary_en": "Opinion columnist Simon Tisdall argues that Trump, Putin, and Netanyahu share a fundamental inability to distinguish right from wrong, and that their immoral conduct in public office is normalizing unethical behavior worldwide. He contends that international law and traditional moral frameworks are eroding under the influence of far-right populism and unchecked power. He holds up newly elected Pope Leo as a rare voice of moral leadership, citing the pope's efforts to restrict justifications for war and rebuild a culture of global cooperation.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/05/world-leaders-immorality-pope-leo-war-criminals-corporations-catholic-church", "state_media": false, "category": "オピニオン", "full_text": "What do Donald Trump, Vladimir Putin and Benjamin Netanyahu have in common? Answer: a chronic inability to tell right from wrong. The three leaders currently causing the most harm in the world share a predilection for violence, a chilling lack of compassion, and extraordinary self-regard mixed with paranoia. Yet the characteristic linking them most closely is their rejection of – or failure to grasp – basic moral standards. Worse, these men typically behave, in their public lives at least, in ways that are fundamentally immoral. And that’s a problem for everyone. Their moral malaise is contagious.\nIdeas about what, in absolute terms, constitutes right and wrong are always contentious, as moral philosophers from Aristotle to Kant have shown. Pope Leo, leader of the world’s Catholics, warned recently that “we are living in a time when it is becoming difficult even to recognise what is truly good for everyone”. Yet most people, most of the time, observe a personal moral code held in common with others. There is broad agreement, for example, that it’s wrong to kill, steal, cheat and lie. In an ostensibly secular age, 76% of people worldwide identified with a religion in 2020 – a potent expression of individual and collective morality.\nPutin’s Russia deliberately fires missiles at Ukraine, randomly murdering civilians. In most people’s book, that’s immoral. Netanyahu’s Israel is still committing genocide by targeting Gaza’s children, the UN says. That’s immoral, too. And the defining immorality of the Trump regime knows no bounds. The US vice-president, JD Vance, claimed last week that the Watergate scandal that shattered Richard Nixon’s presidency would not be a big deal today. Nixon conspired to subvert the US constitution, acted criminally and lied to the American people. But as Vance’s remarks implied, such behaviour is par for the course these days.\nThe normalisation of immoral conduct in public office may be Trump’s lasting legacy. Abroad, it ranges from extrajudicial killings in the Caribbean, to the betrayal of Ukrainian and European allies, to kowtowing to Beijing’s human rights abusers. The mass killing of primary school children in Minab at the start of the unlawful US-Israel war on Iran was militarily inept and morally unforgivable. Yet this atrocity is not so much covered up as arrogantly ignored. At home, Trump’s name is synonymous with crypto-greed, rank corruption and sleaze. But his shameless message is clear: all this is normal now.\nInternational law upholds, in theory, a separate, impersonal moral code. Yet its constraints are routinely bypassed, its indictments flouted. Other categories of moral imperative, such as a binding sense of civic duty and societal responsibility, are also eroding in a polarised age. Jeremy Bentham’s utilitarian idea that what is moral is determined by how much it enhances the general wellbeing has scant relevance today. In a contemporary political wasteland dominated by billionaires, war criminals, mega-corporations, AI and arms salesmen, the greater happiness of ordinary folk barely computes.\nPrinciples that modern progressives and liberals had thought immutable, such as tolerance and equal rights, are undermined by unprincipled far-right nationalist-populis
