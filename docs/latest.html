": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "数々の記録を打ち立てたロナウド、ワールドカップ制覇だけは叶わず", "title_en": "Ronaldo's World Cup Dream Remains Unfulfilled Despite Record-Breaking Career", "summary_ja": "サッカー界で数多くの記録を塗り替えてきたクリスティアーノ・ロナウドだが、その輝かしいキャリアの中でFIFAワールドカップの優勝だけは手にすることができなかった。個人タイトルや得点記録では他の追随を許さない実績を残したものの、世界最大の舞台での頂点には届かなかった。ワールドカップにおける彼の物語は、偉大な才能が報われなかった惜しい歴史として語り継がれることになる。", "summary_en": "Cristiano Ronaldo, one of football's greatest record-breakers, was never able to win the FIFA World Cup throughout his illustrious career. Despite his numerous individual achievements and records, the ultimate team prize at the global stage eluded him. His World Cup legacy remains a story of what could have been, even as his personal statistics stand unmatched.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMioAFBVV95cUxNTHdneUZ0NWlnWHZSSHl6RkhjcXFXV1pKNzZzb21iZ0ZkSEpIYTB6OVlpWnVBSnh2VVRBUDA4R0NLX05rV01aVEpTdG9TOXg5MEZGR2FOVUkwbEtoeW1pNVFFcURrb0ZtT2p2Sk8zWUJyV0FSUFhDUWdlQUxpTkNaZ3g2NndfWElsQnZxNlpyOUE0dFlzQWJ0VWlVWnZnTmZh?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ル・ペン氏、横領有罪判決にもかかわらずフランス大統領選への出馬を表明", "title_en": "Marine Le Pen to run for French presidency despite embezzlement conviction", "summary_ja": "マリーヌ・ル・ペン氏は、EU資金280万ユーロの不正流用に関するパリ控訴裁判所の有罪判決にもかかわらず、2027年のフランス大統領選に出馬すると発表した。同氏は電子監視タグを装着しながらも、フランス最高民事裁判所である破毀院に上訴する方針を示した。また、国民連合党首のジョルダン・バルデラ氏と協力し、自身が大統領、同氏が首相として連携する構想を明らかにした。", "summary_en": "Marine Le Pen has announced she will run for the French presidency in 2027, despite a Paris appeal court confirming her conviction for misusing €2.8 million in EU funds. She will appeal the verdict to France's highest civil court, the Court of Cassation, while wearing an electronic monitoring tag. Le Pen stated she would work alongside National Rally president Jordan Bardella, envisioning herself as president and him as prime minister.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c7vygl3zymjo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Marine Le Pen to run for French presidency and appeal conviction in top court\n- Published\nFrench hard-right leader Marine Le Pen has said she will run for the presidency in 2027, and appeal to the country's highest court against an embezzlement conviction that requires her to wear an electronic tag for a year.\n\"I can't campaign with a tag,\" the National Rally leader told French TV in a combative primetime interview. \"I want to pursue all legal avenues to defend my innocence in this case.\"\nHours earlier, a Paris appeal court found her guilty of misusing €2.8m (£2.4m) in EU funds in a fake jobs scheme, but ruled she could stand for the presidency while wearing a tag.\nShe will now take the case to France's top civil court, the Court of Cassation.\nThe decision is a remarkable political gamble - and it puts an end to months of speculation that Le Pen would hand the candidacy to the 30-year-old president of her party, Jordan Bardella.\nPublic prosecutors have also said they will appeal.\nAsked whether there was a scenario in which she might not run, she said: \"No, there isn't. I am here tonight to tell you I am candidate for the 2027 elections.\"\nShe said her campaign would start immediately to \"begin the rebirth of France\" - and that she would not change her mind.\nAlthough Le Pen continues to maintain her innocence, she and a number of party colleagues have now been found guiltytwice of a scam that she denied organising but did admit earlier to being \"a mistake\".\nParis appeal court confirmed the initial ruling that between 2004-16 she and others had embezzled funds meant for members of the European Parliament and had used the money to pay for party staff.\nHer decision to announce her candidacy comes less than 10 months before first round of the French presidential elections on 18 April and 2 May 2027.\n- Marine Le Pen's moment of truth: Why Tuesday court verdict matters for France - Published12 hours ago\n \nThe Court of Cassation is likely to take a few months to reach a decision. If it does confirm Tuesday's verdict, Le Pen could find herself having to wear an electronic tag as the election campaign moves into its most important period early next year. This would risk becoming an embarrassment as well as a handicap.\nIn the hours after Tuesday's court verdict, Le Pen was locked in talks with Jordan Bardella, as well as lawyers and party colleagues. Then she and Bardella were driven to the studios of TF1 TV for her decision.\nShe said Jordan Bardella had been with her for years and the cause was greater than the two of them: \"We both have beliefs - we both imagine this role seriously. And we have character... The tests we have gone through have made us stronger, both in will and in the quality of our work together.\"\nIf elected, she stated she and Bardella would work together - she as president and he as prime minister. \"We have a solid partnership, we complement each other.\"\nAhead of Tuesday's verdict Le Pen had said several times she would not run for president if she had to wear tag as she would not feel \"totally free\" to campaign.\nWhen asked what would happen if her appeal to the Court of Cassation did not go her way, she said: \"We will see, and the French will be the judge, because the good news from this evening is they will be free to choose\".\nRelated topics\n- Published12 hours ago", "translation_ja": "マリーヌ・ル・ペン、大統領選出馬を表明し最高裁に有罪判決の上訴へ\n\nフランスの極右指導者マリーヌ・ル・ペン氏は、2027年の大統領選に出馬すると表明し、1年間の電子タグ装着を命じた横領有罪判決に対してフランス最高裁判所に上訴する意向を示した。\n\n「タグを装着したまま選挙運動はできない」と、国民連合の党首はフランスのテレビ番組でのプライムタイムインタビューで強い口調で語った。「この件で自身の無実を証明するため、あらゆる法的手段を尽くしたい」\n\n数時間前、パリ控訴裁判所は同氏が偽の雇用スキームにおいてEU資金280万ユーロ（240万ポンド）を不正流用したとして有罪を認定したが、電子タグを装着した状態での大統領選への出馬は認めるとの判決を下した。\n\n同氏はフランス最高民事裁判所である破毀院に上訴する。\n\nこの決断は注目すべき政治的賭けであり、ル・ペン氏が30歳の党首ジョルダン・バルデラ氏に候補者の座を譲るのではないかという数ヶ月にわたる憶測に終止符を打つものとなった。\n\n公訴官側も上訴すると表明している。\n\n出馬しない可能性があるシナリオはあるかと問われた同氏は、「いいえ、ありません。今夜皆さんに伝えるために来ました。私は2027年の選挙の候補者です」と答えた。\n\n「フランスの再生を始める」ためにすぐにも選挙運動を開始すると述べ、考えを変えることはないと強調した。\n\nル・ペン氏は引き続き無実を主張しているが、同氏と複数の党同僚は、自身は組織したとは認めないながらも以前に「ミス」と認めた詐欺行為について、二度目の有罪判決を受けたことになる。\n\nパリ控訴裁判所は、2004年から2016年の間に同氏らが欧州議会議員向けの資金を横領し、党のスタッフ給与に充てていたとする初審の判決を支持した。\n\n出馬表明の決断は、2027年4月18日と5月2日に設定されているフランス大統領選挙の第1回投票まで10ヶ月を切ったタイミングで行われた。\n\n破毀院の判断が下るまでには数ヶ月かかる見込みだ。もし火曜日の判決が確定した場合、来年初頭に選挙運動が最も重要な局面を迎える時期に、ル・ペン氏が電子タグを装着したまま活動しなければならない事態となりかねない。これは恥辱であるとともにハンデにもなり得る。\n\n火曜日の裁判所の判決後、ル・ペン氏はジョルダン・バルデラ氏、弁護士、党同僚らと協議を続けた。その後、ル・ペン氏とバルデラ氏はTF1テレビのスタジオに向かい、出馬の決断を表明した。\n\n同氏はジョルダン・バルデラ氏が長年自身とともに歩んできたと述べ、大義は二人を超えたものだと語った。「私たちは共通の信念を持っている。この役割を真剣に考えている。そして私たちには気概がある……共に乗り越えてきた試練が、意志においても仕事の質においても、私たちをより強くしてくれた」\n\n当選した場合、自身が大統領、バルデラ氏が首相としてともに歩むと表明した。「私たちは強固なパートナーシップを持ち、互いを補い合っている」\n\n火曜日の判決前、ル・ペン氏はタグを装着することになれば「完全に自由」に選挙運動ができないとして、大統領選には出馬しないと繰り返し述べていた。\n\n破毀院への上訴が認められなかった場合どうするかと問われると、「様子を見ましょう。そしてフランス国民が判断する。今夜の朗報は、国民が自由に選択できるということだから」と答えた。", "vocab": [{"word": "embezzlement", "definition": "横領。職務上預かっている他人の金銭や財産を不正に自分のものにする行為。法律・犯罪報道でよく使われる専門用語。"}, {"word": "misusing", "definition": "不正使用・悪用すること。本来の目的以外に資金や権限を使う行為を指し、法的・行政的文脈で頻繁に使われる。"}, {"word": "combative", "definition": "好戦的な、論争的な。議論や批判に対して積極的に反論・対抗しようとする態度を表す形容詞。"}, {"word": "candidacy", "definition": "候補者の地位・立候補。選挙に出馬する意向や資格を指す名詞で、政治報道において頻出する重要語。"}, {"word": "speculation", "definition": "憶測・推測。確証のない情報をもとに様々な可能性を論じること。ニュースや金融の文脈で広く使われる。"}, {"word": "verdict", "definition": "評決・判決。裁判において陪審員や裁判官が下す最終的な判断を指す法律用語。"}, {"word": "avenues", "definition": "手段・方策（比喩的用法）。'pursue all legal avenues'のように、目標達成のために取り得るアプローチや選択肢を表すイディオム的表現。"}]}, {"title_ja": "トランプ氏の言動がNATO首脳会議に影を落とす――欧州再軍備の課題に直面する同盟", "title_en": "Trump Disrupts NATO Summit as Alliance Grapples with Europe's Rearmament Challenge", "summary_ja": "アンカラで開催されたNATO首脳会議で、トランプ大統領はグリーンランドに関する発言やイラン問題での同盟国批判など、物議を醸す言動を繰り返し、結束のイメージを損なった。それでもNATO加盟国は新型輸送機や早期警戒機の大型調達契約を発表し、欧州防衛強化に向けた実務協議を進めた。ゼレンスキー大統領はロシアのミサイル攻撃が続くなか、手頃な価格で大量生産できる対弾道ミサイルシステムの早期整備を強く求めた。", "summary_en": "At the NATO summit in Ankara, President Trump made inflammatory remarks about Greenland and criticized allies over Iran, undermining the alliance's show of unity. Despite the diplomatic tensions, NATO members announced major defence contracts including new transport aircraft and early warning systems to bolster European security. Ukrainian President Zelensky urged allies to accelerate the development of affordable anti-ballistic missile systems as Russia continues to strike civilian targets in Kyiv.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/ckg06d3dgnlo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Trump looms large as Nato grapples with challenge of rearming Europe\n- Published\nBlack-clad Turkish police on street corners, giant blue banners proclaiming \"The Key to Peace\" and a ceremonial welcome for Donald Trump.\nThis may be a Nato summit but it's the US president who's had the metaphorical red carpet laid out for him.\nTrump has made no secret of his disdain for Nato. He says he has only come to Ankara this year because the summit is being hosted by his friend, the Turkish President Recep Tayyip Erdogan, who made a point of going to the airport to welcome Trump in person.\nThen the two men walked arm-in-arm while a band played the Stars and Stripes, and Turkish air force jets performed a flypast overhead, trailing red, white and blue smoke.\nThere was always the risk that Trump would be something of a disruptor at this summit. And sure enough, his inflammatory words have punctuated the carefully crafted image of unity at this crucial gathering.\nSoon after landing, he delivered a throwaway line repeating that the US should really take over Greenland, an island that is part of the Kingdom of Denmark, a fellow Nato member.\nHe did acknowledge, though, that his earlier thoughts on this subject had upset his relations with Nato. They certainly did.\nDenmark's prime minister has said if the US were ever to take Greenland by force it would spell the end for the alliance.\nThen there is Iran. Trump is clearly still bitter that his Nato allies did not join in his war of choice earlier this year, a conflict launched without consulting allies that played havoc with the global economy.\nHe even singled out the UK for criticism despite Sir Keir Starmer allowing him to launch airstrikes on Iranian missile sites from British airbases.\nReferring to the UK prime minister, Trump said: \"He said no we'll help after the war is over. I said I don't want that kind of help. We didn't need any help at all. In a way I was testing people, I was testing to see whether or not they'd be there because I've long said that we help them but I'm not sure that they'd be there for us.\"\nThe British delegation here has been keen to promote its defence collaboration with European partners.\nBut Sir Keir has come to Ankara, his final Nato summit, with a Defence Investment Plan derided for being billions of pounds short of the requirements set out in last year's much-praised Strategic Defence Review.\nBut beyond the optics and the speeches, Nato delegates have been getting down to the serious business of rearming Europe and seeing how their defence industries can best co-operate.\nLarge contracts have been announced for a new fleet of transport aircraft to be built by Airbus. Nato's ageing fleet of AWACS (Airborne Warning and Control System) early warning aircraft are to be replaced by Sweden's GlobeEye planes.\nAnd there is much talk of joint projects on missiles. President Volodymyr Zelensky of Ukraine is here. He knows all too well what can happen to a country that lacks sufficient air defence.\nIn recent days Russia's ballistic missiles have been smashing into residential buildings in Kyiv, killing dozens of civilians, with the air defence teams complaining of a desperate shortage of interceptors.\n\"Europe needs its own effective anti-ballistic system and missiles\" said President Zelensky.\n\"And this work is already under way and I urge you and all of our partners to give it the attention it deserves. And this cannot wait until 2030 or beyond, Europe needs affordable mass-produced anti-ballistic systems as soon as possible.\"\nHe's right. As the US steadily reduces its defence commitments to Europe, the race is on to build up credible air defences against Russia's growing arsenal of powerful missiles and drones.\nEveryone here says they want the war in Ukraine to stop. But there is also a fear that once that happens, Russia will embark on a rapid rearmament programme and be in a position to threaten Nato territory within four years.\nRelated topics\n- Published6 hours ago\n \n- Published5 hours ago", "translation_ja": "トランプ氏、NATOが欧州再軍備の課題に取り組む中で存在感を示す\n\nトルコの警察官が黒い制服姿で街角に立ち、「平和への鍵」と記された巨大な青いバナーが掲げられ、ドナルド・トランプ大統領を迎える式典が執り行われた。\n\nこれはNATO首脳会議ではあるが、比喩的な意味でのレッドカーペットが敷かれたのは米大統領に対してだった。\n\nトランプ氏はNATOへの軽蔑を隠そうともしていない。今年アンカラでの首脳会議に出席したのは、開催国トルコのレジェップ・タイイップ・エルドアン大統領が友人であるためだと語っており、エルドアン大統領はわざわざ空港まで出向いてトランプ氏を個人的に出迎えた。\n\nその後、両首脳は腕を組みながら歩き、楽団が「星条旗よ永遠なれ」を演奏する中、トルコ空軍の戦闘機が赤・白・青の煙を引きながら上空を飛行した。\n\nトランプ氏がこの首脳会議で「かき乱す存在」になる恐れは最初からあった。そして果たして、同氏の過激な発言が、この重要な会合で丹念に作り上げられた結束のイメージに水を差す形となった。\n\n到着早々、トランプ氏はデンマーク王国の一部であるグリーンランドを米国が占領すべきだという持論を、さりげなく繰り返した。グリーンランドはNATO加盟国でもある。\n\nもっとも同氏は、この件に関する自らの以前の発言がNATOとの関係を損なったことは認めた。実際そうなった。\n\nデンマークの首相は、もし米国が武力でグリーンランドを奪取しようとすれば、それは同盟の終わりを意味すると述べている。\n\n次にイランの問題がある。トランプ氏は、今年初めに自らが選択した対イラン戦争にNATOの同盟国が加わらなかったことに、明らかに今も憤っている。同盟国に事前相談なく開始されたこの紛争は、世界経済に深刻な混乱をもたらした。\n\nトランプ氏は、キア・スターマー英首相がイランのミサイル基地への空爆をイギリスの空軍基地から実施することを認めたにもかかわらず、英国を名指しで批判した。\n\nトランプ氏は英首相について、こう述べた。「彼は『戦争が終わってから支援する』と言った。私は『そんな支援は要らない』と言った。私たちはいかなる支援も必要としなかった。ある意味、私は人々を試していた。いざとなれば助けてくれるかどうかを試していたのだ。私たちが彼らを助けているのに、彼らが私たちのために動くかどうか、ずっと疑問に思っていたから」\n\n英国代表団は、欧州のパートナーとの防衛協力を積極的にアピールしようとしている。\n\nしかしスターマー首相は、自身最後のNATO首脳会議となるアンカラに、昨年高く評価された戦略防衛見直しが示した必要額に数十億ポンド届かないとして批判を受けた防衛投資計画を携えて訪れた。\n\nだが、外見上の演出や演説の陰で、NATO代表団は欧州再軍備という本格的な課題と、各国の防衛産業が最も効果的に協力できる方法の模索に取り組んでいる。\n\nエアバス社が製造する新型輸送機の大型調達契約が発表された。NATOの老朽化したAWACS（空中警戒管制システム）早期警戒機は、スウェーデンのグローブアイ機に更新される予定だ。\n\nまた、ミサイルの共同開発プロジェクトについても活発な議論が交わされた。ウクライナのウォロディミル・ゼレンスキー大統領もアンカラに来ている。十分な防空能力を欠く国がどうなるか、同氏は痛いほど承知している。\n\nここ数日、ロシアの弾道ミサイルがキエフの住宅街を次々と破壊し、数十人の民間人が命を失っている。防空部隊は迎撃ミサイルの深刻な不足を訴えている。\n\n「欧州には独自の実効的な対弾道ミサイルシステムとミサイルが必要だ」とゼレンスキー大統領は述べた。\n\n「この取り組みはすでに始まっている。私はあなた方と全パートナーに、しかるべき関心を払ってほしいと強く求める。2030年以降まで待つことはできない。欧州には、手頃な価格で大量生産できる対弾道ミサイルシステムができるだけ早く必要だ」\n\n同大統領の言う通りだ。米国が欧州への防衛コミットメントを着実に縮小する中、ロシアが増強を続ける強力なミサイルやドローンの脅威に対し、信頼性の高い防空体制を構築するための競争が始まっている。\n\nここにいる誰もがウクライナの戦争の終結を望んでいる。だが同時に、戦争が終わった後、ロシアが急速な再軍備プログラムに乗り出し、4年以内にNATO領域を脅かせる体制を整えるのではないかという懸念もある。", "vocab": [{"word": "inflammatory", "definition": "人々の感情を刺激し怒りや対立を引き起こすような（発言・言動などに使う）。政治的・外交的文脈で「過激な」「挑発的な」という意味で頻出する上級語彙。"}, {"word": "disruptor", "definition": "既存の秩序や計画を意図的に乱す人物や存在を指す語。ビジネスや政治の文脈で「破壊者」「撹乱者」として使われるTOEIC高得点レベルの語彙。"}, {"word": "disdain", "definition": "軽蔑・侮り・見下す気持ちを表す名詞・動詞。'disdain for～'の形で「～に対する軽蔑」という意味でよく使われる上級語彙。"}, {"word": "derided", "definition": "deride（嘲笑する・あざけって批判する）の過去分詞形。公的な計画や人物を「こき下ろされた」「酷評された」と表現する際に使うフォーマルな語彙。"}, {"word": "interceptors", "definition": "軍事・防衛用語で「迎撃機」または「迎撃ミサイル」を指す。敵の航空機やミサイルを阻止・撃墜するために使用される兵器・機体のこと。"}, {"word": "arsenal", "definition": "兵器・武器の貯蔵庫、またはある国・組織が保有する兵器の総量を指す名詞。比喩的に「豊富な手段・資源の集まり」としても使われる技術・政治用語。"}, {"word": "ceremonial", "definition": "儀式・式典に関連する、または儀礼的な性格を持つことを表す形容詞。外交・公式行事の文脈で「式典用の」「儀礼的な」という意味で使われる上級語彙。"}]}, {"title_ja": "モナコ爆弾攻撃の容疑者、ウクライナで射殺体で発見", "title_en": "Monaco bomb attack suspect Anastasiia Berezovska found dead in Ukraine with gunshot wounds", "summary_ja": "モナコで制裁対象のウクライナ人富豪とその家族を負傷させた小包爆弾攻撃の容疑者、アナスタシア・ベレゾフスカがキエフ近郊の森で頭部に銃創を負った遺体で発見された。元法執行官と現役のウクライナ軍情報機関将校の2名が殺害の容疑で起訴されており、情報機関将校は犯行を自供した。当局はモナコの攻撃に関与した他の容疑者の特定を続けている。", "summary_en": "Anastasiia Berezovska, suspected of carrying out a parcel bombing in Monaco that injured a sanctioned Ukrainian billionaire and his family, has been found dead in a forest near Kyiv with gunshot wounds to her head. Two men — a former law enforcement officer and a current Ukrainian military intelligence officer — have been charged with her murder. The intelligence officer confessed to the killing, and investigators are continuing to probe the wider network behind the Monaco attack.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c5yz3770yg8o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Woman suspected of Monaco bomb attack found dead in Ukraine\n- Published\nThe woman suspected of carrying out a parcel bombing in Monaco which injured a sanctioned Ukrainian multi-millionaire and his family has been found dead, Ukraine's security service (SBU) has said.\nA cross-border manhunt had been launched for Anastasiia Berezovska, a Ukrainian woman who officials believed had fled the wealthy city-state after planting the bomb in the entrance hall of an apartment building on 29 June.\nThe 39-year-old's body was found buried in a forest in the Kyiv region with gunshot wounds to the head, according to the SBU and Ukraine's prosecutor general.\nTwo people, including a current officer within Ukraine's military intelligence service, have been charged over her murder.\nBerezovska arrived in Ukraine two days after the attack on 1 July, the SBU said in its statement, citing law enforcement sources.\nTwo suspects met Berezovska in a car on a highway in the Kyiv region two days later, the office of Ukraine's prosecutor general told the BBC.\n\"The victim traveled a certain distance with them, after which she was killed.\"\nThe SBU said she had communicated with her family and two men after entering Ukraine - a former law enforcement officer and a current officer in Ukraine's Main Directorate of Intelligence, an agency of the Ministry of Defence.\nThe two men were investigated as possible accomplices in the Monaco attack based on information they repeatedly transferred funds to Berezovska's \"crypto and bank accounts\".\nThe intelligence officer subsequently confessed to Berezovska's murder and said he had done so with \"another suspect\", the agency said.\nBoth men have since been charged with \"intentional murder committed by prior conspiracy by a group of persons\".\nThe SBU said a basement room \"resembling a torture chamber\" had also been found during a search of the former law enforcement officer's home in the Kyiv region.\nUkraine's prosecutor general said it had \"no evidence\" the room had been involved in Berezovska's case and that it \"simply reflect[s] the profile of one of the suspects\".\nHis office released a video of the room, which showed a mat dotted with what appear to be small spots of blood. Two axes, a pickaxe, tarpaulin spread on the floor and a large bag are also visible.\nMonaco's deputy prosecutor Morgan Raymond said Berezovska had spent days casing out the residence and was \"disguised as a man\" during the attack last Monday.\nThree people were injured, two of them seriously, when a package exploded just as they entered the building shortly after 21:00 local time (19:00 GMT).\nBerezovska was believed to have fled in a hire car to Italy and onwards to Germany - where special forces searched an apartment rented by a 39-year-old Ukrainian woman \"currently on the run\" in the central state of Hesse on Thursday, police said.\nInterpol issued a red notice alerting police worldwide that she was a fugitive wanted for attempted murder, placing an explosive device on a public road with criminal intent and criminal conspiracy on Friday.\nThe SBU said Ukrainian authorities had shared all available information with officials in Monaco, with who its prosecutor general was in \"close co-operation\".\nLaw enforcement authorities were working to identify \"other suspects\" in the attack, it added.\nAuthorities in Monaco have not confirmed the victims' identities, but local media reported Vadym Yermolaiev, his partner and his 13-year-old son had been targeted.\nYermolaiev, a real estate developer, was named the 39th richest Ukrainian by Forbes magazine in 2020 with a reported fortune of $230m (£173.8m).\nHe has major interests in wine and alcohol in Crimea, which Russia illegally annexed in 2014, and has been the subject of sanctions imposed by the government in Kyiv since 2023.\nHe is a Cypriot citizen, having renounced his Ukrainian citizenship in 2019, and has been living in Monaco.\nCorrection - 7 July 2026: An earlier version of this story said investigators believed Anastasiia Berezovska had been held in a basement belonging to one of the suspects. Ukrainian authorities later clarified there was no evidence the room was involved in Berezovska's murder, and they had released footage of it \"to reflect the profile of one of the suspects\".", "translation_ja": "モナコ爆弾攻撃の容疑者がウクライナで死亡しているのが発見される\n\n公開日\n\nモナコで制裁対象となっているウクライナ人富豪とその家族に怪我を負わせた小包爆弾攻撃を実行したとみられる女性が死亡しているのが発見された、とウクライナ保安庁（SBU）が発表した。\n\n当局は、6月29日にあるアパートの入口ホールに爆弾を仕掛けた後、この富裕な都市国家から逃走したと信じられていたウクライナ人女性、アナスタシア・ベレゾフスカを国際的に指名手配していた。\n\nSBUおよびウクライナの検察総長によると、39歳の遺体は頭部に銃創を負った状態でキエフ州の森に埋められていた。\n\nウクライナ軍情報機関の現役将校を含む2名が彼女の殺害に関与したとして起訴された。\n\nSBUは声明の中で、法執行当局の情報源を引用し、ベレゾフスカは攻撃の2日後である7月1日にウクライナに入国したと述べた。\n\n2日後、2名の容疑者がキエフ州の幹線道路上の車内でベレゾフスカと落ち合ったと、ウクライナ検察総長室がBBCに伝えた。\n\n「被害者は一定の距離を彼らと共に移動した後、殺害された。」\n\nSBUによると、彼女はウクライナ入国後、家族と2名の男性と連絡を取り合っていたという。その2名とは、元法執行官とウクライナ国防省の機関であるウクライナ国防情報総局の現役将校である。\n\nこの2名の男性は、ベレゾフスカの「暗号資産および銀行口座」に繰り返し送金していたという情報に基づき、モナコ攻撃の共犯者として捜査された。\n\nその後、情報機関将校はベレゾフスカ殺害を自供し、「別の容疑者」と共に行ったと述べた、と同機関は発表した。\n\n両名はその後、「集団による事前共謀を伴う故意の殺人」の罪で起訴された。\n\nSBUは、元法執行官のキエフ州の自宅を捜索した際、「拷問部屋に似た」地下室も発見されたと述べた。\n\nウクライナの検察総長は、その部屋がベレゾフスカの事件に関与した「証拠はない」とし、それは「単に容疑者の一人のプロフィールを反映しているに過ぎない」と述べた。\n\n同事務所はその部屋の映像を公開した。映像には、小さな血痕のような斑点が点在するマット、2本の斧、つるはし、床に広げられたビニールシート、そして大きなバッグが映っていた。\n\nモナコの副検察官モルガン・レイモンド氏は、ベレゾフスカが数日間かけて住居を下見しており、先週月曜日の攻撃の際には「男装」していたと述べた。\n\n3人が負傷し、そのうち2人は重傷だった。小包は彼らが午後9時過ぎ（グリニッジ標準時19時）に建物に入ろうとした際に爆発した。\n\nベレゾフスカはレンタカーでイタリアに逃走し、その後ドイツに向かったとみられていた。木曜日には、ドイツ中部ヘッセン州で「現在逃走中」の39歳のウクライナ人女性がレンタルしたアパートを特殊部隊が捜索したと警察が発表した。\n\nインターポルは、彼女が殺人未遂、刑事的意図を持った公道への爆発物設置、および共謀罪で手配されている逃走中の指名手配犯であるとして、世界中の警察に警戒を呼びかける赤手配書を金曜日に発行した。\n\nSBUは、ウクライナ当局がモナコ当局と利用可能なすべての情報を共有しており、検察総長は「緊密に協力」していると述べた。\n\n法執行当局は攻撃に関与した「他の容疑者」の特定に取り組んでいると付け加えた。\n\nモナコ当局は被害者の身元を確認していないが、地元メディアはヴァディム・イェルモライエフ、その交際相手、そして13歳の息子が標的にされたと報じた。\n\n不動産開発業者のイェルモライエフは、2020年にフォーブス誌によってウクライナで39番目の富豪に選ばれ、その資産は2億3000万ドル（約1億7380万ポンド）と報告されている。\n\n彼はロシアが2014年に不法に併合したクリミアのワインとアルコール事業に大きな利権を持っており、2023年以降キエフ政府から制裁の対象となっている。\n\n彼は2019年にウクライナ国籍を放棄してキプロスの市民権を取得し、モナコに居住している。\n\n訂正 — 2026年7月7日：本記事の以前のバージョンでは、捜査当局がアナスタシア・ベレゾフスカは容疑者の一人が所有する地下室に監禁されていたと信じていたと報じていた。ウクライナ当局はその後、その部屋がベレゾフスカの殺害に関与した証拠はなく、「容疑者の一人のプロフィールを反映するため」に映像を公開したと明確にした。", "vocab": [{"word": "manhunt", "definition": "逃走中の犯罪者を捕まえるための大規模な捜索活動を指す。主にニュース報道で使われる名詞。"}, {"word": "sanctioned", "definition": "政府や国際機関によって経済的・政治的制裁を課された状態を指す形容詞。金融取引や渡航などに制限が加えられることを意味する。"}, {"word": "accomplice", "definition": "犯罪行為に共同で関与した共犯者を指す名詞。法律・犯罪報道で頻繁に使われる。"}, {"word": "casing out", "definition": "犯行前に目標となる場所を密かに下見・偵察することを意味するイディオム表現。犯罪やスパイ活動の文脈でよく使われる。"}, {"word": "conspiracy", "definition": "複数の人物が共同で違法行為を計画・実行することを指す法律用語。'criminal conspiracy'（刑事共謀）のように使われる。"}, {"word": "renounced", "definition": "権利や国籍などを正式に放棄することを意味する動詞'renounce'の過去形。'renounce citizenship'（国籍を放棄する）のように使われる。"}, {"word": "tarpaulin", "definition": "防水加工された厚手のビニールシートまたは帆布を指す名詞。物を覆ったり床に敷いたりするために使われる。"}]}, {"title_ja": "ファラージ氏、議員辞職を表明し補欠選挙で再出馬へ――財務問題めぐる論争の中", "title_en": "Farage Resigns as MP and Vows to Fight By-Election Amid Finances Row", "summary_ja": "改革英国党党首のナイジェル・ファラージ氏は、クラクトン選挙区の下院議員を辞職し、後続の補欠選挙に立候補すると発表した。議会倫理基準調査が政治的手段として利用されていると主張している。彼は富豪の支持者から受け取った500万ポンドの寄付を申告しなかったとして調査を受けているが、労働党・保守党・自由民主党など主要野党は補欠選挙への候補者擁立を拒否した。", "summary_en": "Nigel Farage has announced his resignation as MP for Clacton and pledged to stand in the subsequent by-election, citing parliamentary standards investigations as politically motivated. He faces scrutiny over an undeclared £5m gift from a billionaire Reform donor and alleged undisclosed support from a convicted ally. However, major opposition parties including Labour, the Conservatives, and the Lib Dems have all refused to stand candidates against him.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c0ly51kzdz3o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Farage resigns as MP and vows to fight by-election amid finances row\n- Published\nNigel Farage says he will resign as MP for Clacton and stand in the subsequent by-election, after facing intense scrutiny over financial support he has received.\nThe Reform UK leader said the \"people of Clacton should be the judges of my actions\", as he insisted he has done nothing wrong.\nBut the Conservatives, Labour, Restore Britain and the Lib Dems have ruled out standing candidates against him, in an effective boycott by his main opponents.\nFarage has been under investigation from Parliament's standards commissioner since May after not declaring a £5m gift he received from a billionaire Reform donor before he became an MP.\nOpposition parties have been calling for a further such probe, after it emerged he did not disclose support reportedly provided by a different political ally.\nFarage claimed parliamentary standards investigations were \"now being used as a political tool\" and he did not want to be \"judged\" by the media, before announcing he would force a by-election in which he would stand.\nIn a live video statement released to the media by Reform, he said the by-election would give voters the chance to \"stick two fingers up at the entire establishment\".\nBut Labour has ruled out standing against him, with a spokesperson saying it would not \"indulge\" the Reform UK leader by standing a candidate \"in this circus\".\nTory leader Badenoch dismissed the by-election as a \"gimmick\", adding that Farage had called it to \"distract people from what is happening\".\nShe added her party would stand instead in a \"real by-election\" she hoped would be triggered in the wake of the standards investigation.\nFarage's resignation will mean the ongoing investigation by the standards commissioner into the £5m gift is suspended. It will be resumed if Farage wins the by-election and returns to Parliament.\nOne possible outcome of a standards investigation is a suspension which triggers a recall petition. This process enables an MP to be removed and a by-election triggered if 10% of eligible registered voters sign a petition.\nFarage used his speech to claim \"the establishment\" had turned to \"foul means\" to target Reform following the party's rise in popularity.\nChanges to political donation rules and the government's decision to delay 30 local council elections in England - a decision it later reversed after a legal challenge from Reform - were among the issues cited by him.\nHe also said he spent the weekend thinking about his future after complaining about media treatment of his family, following the publication of a story by the Sunday Times on his links to longstanding ally George Cottrell.\nThe newspaper said Farage had received support ahead of the 2024 election from Cottrell, who was jailed for eight months in the US in 2017 after pleading guilty to a charge of wire fraud.\nThis reportedly included paying for staff who provided Farage's security and worked on his social media content. According to the newspaper, Farage also used a property near Buckingham Palace rented by Cottrell.\nScrutiny over Farage's finances first hit the headlines earlier this year, after it emerged he had received a £5m gift from Christopher Harborne, a Thailand-based British cryptocurrency investor, in April 2024, before he entered Parliament.\nHarborne is one of the party's most important financial backers, having donated £15m to Reform since the start of last year.\nFarage said the £5m gift was given on an \"unconditional basis\" and it was needed to help with his personal security in future.\nHis team has made a similar argument for why the \"in kind\" - non-cash - benefits allegedly from Cottrell were not registered.\n\"Let me be absolutely clear: I have done nothing wrong. I have not broken the law in any way at all. I have not misused public money,\" he added.\nParliament's rulebook says newly-elected MPs have to declare gifts or benefits, including accommodation, received in the 12 months before their election that relate to their \"parliamentary or political activities\".\nThere is an exemption for gift and benefits that are \"purely personal\".\n'Vanity project'\nFarage won Clacton at the 2024 general election, finishing 8,405 votes ahead of the Conservatives. He had previously been unsuccessful on his previous seven times standing to be an MP.\nFarage's resignation will only be confirmed once the government has given him a crown appointment, the mechanism that disqualifies him from being an MP.\nLiberal Democrat leader Sir Ed Davey called for the government to \"block his resignation until the standards commissioner has finished investigating him\".\n\"If this by-election does go ahead now, we are calling on all parties to stand aside and refuse to give oxygen to Farage's vanity project,\" he added.\nRestore Britain leader Rupert Lowe said his party would not stand in the by-election triggered by Farage's resignation, but would if a by-election was ultimately triggered by the standards inves", "translation_ja": "ファラージ氏、議員辞職を表明し財務問題めぐる論争の中で補欠選挙への出馬を誓う\n\n・公開日\n\nナイジェル・ファラージ氏は、自身が受け取った財政的支援をめぐる激しい批判を受け、クラクトン選挙区の下院議員を辞職し、後続の補欠選挙に立候補すると表明した。\n\n改革英国党の党首は「クラクトン市民が私の行動を判断すべきだ」と主張し、自分は何も悪いことはしていないと強調した。\n\nしかし、保守党、労働党、レストア・ブリテン党、自由民主党はいずれも対抗候補の擁立を見送ることを宣言しており、主要な政敵による事実上のボイコットとなっている。\n\nファラージ氏は、下院議員となる前に改革英国党の富豪支持者から受け取った500万ポンドの寄付を申告しなかったとして、今年5月から議会の倫理基準コミッショナーによる調査を受けている。\n\n野党各党は、別の政治的盟友から提供されたとされる支援も開示されていなかったことが明らかになり、さらなる調査を求めていた。\n\nファラージ氏は、議会倫理基準調査が「今や政治的手段として利用されている」と主張し、メディアに「判断」されることを望まないとして、補欠選挙を強行し自ら立候補すると表明した。\n\n改革党がメディアに公開したライブ動画声明の中で、彼は補欠選挙が有権者に「既成勢力全体に二本指を突き立てる」機会を与えると述べた。\n\nしかし労働党は対立候補の擁立を拒否し、スポークスマンは「この茶番劇で」改革英国党党首を「増長させるような」候補者は立てないと述べた。\n\n保守党党首のバデノック氏は補欠選挙を「ごまかし」と一蹴し、ファラージ氏が「起きていることから人々の目をそらすために」これを仕組んだと付け加えた。\n\n彼女はその代わり、倫理基準調査の結果として引き起こされることを期待している「本物の補欠選挙」に自党が立候補すると述べた。\n\nファラージ氏の辞職により、500万ポンドの寄付をめぐる倫理基準コミッショナーの調査は一時停止となる。ファラージ氏が補欠選挙で勝利して議会に戻った場合、調査は再開される。\n\n倫理基準調査の可能な結果の一つは、リコール請願を引き起こす資格停止処分である。このプロセスにより、有権者登録者の10%が請願書に署名すれば、議員を失職させ補欠選挙を実施することができる。\n\nファラージ氏は演説の中で、改革党の人気上昇を受けて「既成勢力」が改革党を標的にするために「卑劣な手段」に訴えていると主張した。\n\n政治献金規制の変更、および政府によるイングランドの30の地方議会選挙の延期決定（後に改革党の法的異議申し立てを受けて撤回）などが彼の挙げた問題に含まれた。\n\nまた彼は、長年の盟友ジョージ・コトレル氏との関係についてサンデー・タイムズ紙が記事を掲載した後、自分の家族へのメディアの扱いに不満を示し、週末に自身の将来について考えたと述べた。\n\n同紙によると、コトレル氏は2017年に電信詐欺罪で有罪答弁をして米国で8ヶ月の禁固刑を受けており、ファラージ氏は2024年選挙前に同氏から支援を受けていたという。\n\nこれには、ファラージ氏の警護とソーシャルメディアコンテンツに携わったスタッフの費用負担も含まれていたとされている。また、ファラージ氏がコトレル氏の借りたバッキンガム宮殿近くの物件を使用していたとも伝えられている。\n\nファラージ氏の財務をめぐるスキャンダルが今年初めに表面化したのは、議会入りする前の2024年4月に、タイ在住の英国人暗号資産投資家クリストファー・ハーボーン氏から500万ポンドの寄付を受けていたことが判明したためだ。\n\nハーボーン氏は昨年初頭以来、改革党に1500万ポンドを寄付しており、同党にとって最も重要な資金支援者の一人である。\n\nファラージ氏は、500万ポンドの寄付は「無条件で」提供されたものであり、将来の個人的な警護費用として必要だったと説明した。\n\n彼のチームは、コトレル氏から受けたとされる「現物」（非現金）の便宜が登録されていなかった理由についても同様の主張をしている。\n\n「はっきり申し上げる。私は何も悪いことをしていない。いかなる法律も犯していない。公金を不正に使用したことも一切ない」と彼は付け加えた。\n\n議会の規則集によれば、新たに選出された議員は、選挙の12ヶ月前以内に受け取った贈り物や便宜（宿泊を含む）が「議会活動や政治活動」に関連している場合、申告しなければならない。\n\n「純粋に個人的な」贈り物や便宜については免除規定がある。\n\n「虚栄のプロジェクト」\n\nファラージ氏は2024年の総選挙でクラクトン選挙区を制し、保守党候補に8,405票差をつけて当選した。それ以前の7回の下院議員選挙ではいずれも落選していた。\n\nファラージ氏の辞職は、政府が彼を議員資格から失格させるメカニズムである「王室任命」を与えた時点で正式に確定する。\n\n自由民主党党首のサー・エド・デービー氏は、政府に対して「倫理基準コミッショナーが調査を完了するまで辞職を阻止する」よう求めた。\n\n「この補欠選挙が今行われるとすれば、ファラージ氏の虚栄のプロジェクトに酸素を与えないよう、すべての政党に候補者を擁立しないよう求める」と彼は付け加えた。\n\nレストア・ブリテン党党首のルパート・ロウ氏は、ファラージ氏の辞職によって引き起こされる補欠選挙には立候補しないが、最終的に倫理基準調査によって補欠選挙が引き起こされた場合には立候補すると述べた。", "vocab": [{"word": "scrutiny", "definition": "厳密な調査や精査を意味する名詞。政治や財務の文脈で、行動や記録が詳しく調べられる状況を指す。"}, {"word": "boycott", "definition": "特定の人物・組織・行事などへの参加や取引を集団的に拒否する行為。抗議や圧力をかける手段として用いられる。"}, {"word": "unconditional", "definition": "条件や制限が一切付かない状態を表す形容詞。寄付や支援が特定の見返りを求めずに提供されたと主張する際に使われる。"}, {"word": "disqualifies", "definition": "資格や権利を剥奪することを意味する動詞。議会では特定の任命を受けることで議員資格を失う仕組みを指す。"}, {"word": "recall petition", "definition": "選出された議員を有権者の署名によって失職させる制度的手続きを指す政治・法律用語。英国では登録有権者の10%の署名が必要。"}, {"word": "in kind", "definition": "現金ではなく物品やサービスの形で提供される支援や寄付を指す慣用表現。会計・政治献金の文脈で頻繁に使用される。"}, {"word": "indulge", "definition": "ここでは相手の望みや要求に乗ることを意味する動詞。政治的文脈では、反対派の意図に加担することへの拒否を表す皮肉的な表現として使われる。"}]}, {"title_ja": "財政疑惑の中、ファラージ議員辞職を表明しクラクトン補欠選挙へ", "title_en": "Farage resigns as MP to force Clacton by-election amid finance scandal", "summary_ja": "ナイジェル・ファラージ氏は下院議員を辞職し、自身が保持するクラクトン選挙区での補欠選挙に再挑戦すると発表した。この動きは、未申告の財政的贈与をめぐる議会基準コミッショナーの調査が進む中での「先手を打つ」戦略とみられる。リフォーム党は議会の夏季休会前に補欠選挙を実施すべく手続きを急ぐ方針で、他党はこれを「売名行為」と批判している。", "summary_en": "Nigel Farage announced he will resign as MP and contest a by-election in his Clacton seat, seeking to reframe ongoing controversies about undisclosed financial gifts as a 'people versus establishment' battle. The move comes as the Parliamentary Commissioner for Standards was already investigating a £5m undisclosed gift from crypto billionaire Christopher Harborne. Reform intends to move quickly, potentially triggering the by-election before Parliament's summer recess.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c1my1g29gk7o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Chris Mason: Farage attempts to seize back the agenda after finance row\n- Published\nNigel Farage has long had a capacity for political theatre – and here he goes again.\nHaving tantalised Westminster with a teasing social media post about his \"future in public life\", he took to Reform's stage, in front of Reform's camera and without journalists in the room, to set out how he would again try to seize the limelight and the initiative.\nHis address held onto its headline until the last few sentences: he will resign as an MP and then refight the seat of Clacton in Essex that has held for the last two years.\nSo why is he doing this?\nIn recent weeks, and indeed days, Nigel Farage has been under the cosh.\nHeadline after headline about his relationships with rich folk willing to give him money and his lack of willingness to disclose and register this, later exposed by journalists, meant his back was against the wall.\nHe has repeatedly insisted he didn't need to disclose what were, he says, personal gifts from before he returned to politics.\nThe weekly, sometimes daily, diet of Reform news conferences at Westminster had dried up.\nThe Parliamentary Commissioner for Standards had opened an inquiry into the £5m gift Farage had received from the Thailand-based British crypto billionaire Christopher Harborne but decided not to declare.\nFarage insisted he didn't need to, because it was a personal gift. Many others pointed to the rules demanding such disclosures from benefits received in the 12 months before being elected – and an inquiry began.\nAnd the headlines kept coming – not least the Sunday Times investigation, published at the weekend, external, into the support given to Farage by George Cottrell, a man previously convicted and jailed for fraud in the US.\nA key thing to understand here is the inquiry by the Parliamentary Commissioner for Standards, Daniel Greenberg, had the potential to lead to a by-election itself.\nGranted we were several steps away from that, but a growing number of folk at Westminster were anticipating its likelihood.\nIn that situation, Nigel Farage could have been forced to face his electorate. In this situation he is seeking to seize the initiative and bring it on himself.\nSpeaking to his allies after his announcement, I am told his aim throughout the forthcoming campaign – as he himself said in his speech – is to clearly frame this as \"the people versus the establishment\", as one friend put it.\n\"This is Nigel setting the agenda, he is sick to death of being judged by Sky, The Times and Daniel Greenberg,\" they added.\nThe reference to Sky News is because Farage is boiling with anger at what he sees as the recent \"harassment\" of his daughter at one of his properties.\nSky insist they have behaved appropriately.\nReform intend, I am told, to get on with the by-election as quickly as possible.\nThey will crack on with the parliamentary formalities immediately.\nThis will mean Farage being given a Crown appointment which bars him from being an MP - either Crown Steward and Bailiff of the Chiltern Hundreds or Crown Steward and Bailiff of the Manor of Northstead.\nOnce this has happened and the Clacton seat is vacant, the writ can be moved in the Commons to trigger a by-election, while Parliament is still sitting and before its summer break begins at the end of next week.\nThat would likely mean a by-election at some point next month - just as a new government led by Andy Burnham is beginning its time in power, in all likelihood.\nThe question now is how Reform's opponents react.\nDo they put up candidates or not?\nRestore Britain, led by former Reform MP Rupert Lowe, has already said it won't stand.\nReform is baiting Labour to do so, claiming it would be Burnham's first big test.\nBut Team Burnham are describing it as a \"gimmick\" and the prime minister, at the Nato Summit in Ankara in Turkey has labelled it a \"desperate stunt\".\nAnd there is a precedent in these situations for opponents not to put up candidates - and to argue they are not going to endorse what they see as a publicity stunt by taking part.\nIn 2008, Conservative MP David Davis resigned his seat of Haltemprice and Howden as part of a campaign about civil liberties. Neither Labour nor the Liberal Democrats stood against him.\nIt is worth remembering, incidentally, that this by-election doesn't end the investigation that the Standards Commissioner is conducting, which, as I mentioned, could itself eventually lead to what is known as a recall petition and, yes, a by-election.\nIt has led some in Parliament to envisage a scenario where Nigel Farage fights and wins one by-election, only to be confronted by another.\nThis would only happen if Parliament concluded this punishment was appropriate, and, crucially, 10% of those on the electoral roll in Clacton signed a recall petition demanding one.\nIt could be, in that scenario, that people there have had enough of ballot boxes and polling stations.\nLet's see.\nWhat Reform are effectively trying to say is we ar", "translation_ja": "クリス・メイソン：財政疑惑を受け、ファラージ氏が主導権奪回を図る\n\nナイジェル・ファラージ氏は長年にわたり、政治的な演出の才能を持ち合わせてきた——そして今、またしてもその手腕を発揮しようとしている。\n\n「公人としての自分の将来」についてほのめかすソーシャルメディア投稿でウェストミンスターをじらした後、彼はリフォーム党のステージに上がり、リフォーム党のカメラの前で、記者を部屋に入れないまま、どのようにして再び注目と主導権を握ろうとするかを表明した。\n\n彼の演説は最後の数文まで肝心な内容を明かさなかった。すなわち、彼は下院議員を辞職し、過去2年間保持してきたエセックス州クラクトン選挙区で再び戦うというものだ。\n\nでは、なぜ彼はこうするのか？\n\nここ数週間、さらにはここ数日、ナイジェル・ファラージ氏は苦境に立たされてきた。\n\n裕福な人物たちとの関係、そして彼らから受け取った金銭の申告・登録を怠り後にジャーナリストたちによって暴露されたことに関する見出しが次々と現れ、彼は追い詰められていた。\n\n彼は、政界に復帰する前に受け取った個人的な贈り物については申告の必要がないと繰り返し主張してきた。\n\nウェストミンスターでのリフォーム党の記者会見は、週1回、時には毎日行われていたが、それも途絶えていた。\n\n議会基準コミッショナーは、ファラージ氏がタイ在住の英国人暗号通貨億万長者クリストファー・ハーボーン氏から受け取りながら申告しなかった500万ポンドの贈り物について調査を開始していた。\n\nファラージ氏は、それは個人的な贈り物であるため申告の必要はないと主張した。一方、多くの関係者は、選出される12か月前に受けた便益については申告を義務付けるルールを指摘し、調査が始まった。\n\nそして見出しは続いた——特に週末に公開されたサンデー・タイムズの調査報道では、米国で詐欺罪により有罪判決を受け服役したジョージ・コットレル氏によるファラージ氏への支援が明らかにされた。\n\nここで重要なのは、ダニエル・グリーンバーグ議会基準コミッショナーによる調査が、それ自体として補欠選挙につながる可能性を持っていたという点だ。\n\nそこまでには複数のステップが必要だったとはいえ、ウェストミンスターの多くの関係者がその可能性を見越していた。\n\nその状況では、ナイジェル・ファラージ氏は有権者の審判を強いられる立場になりえた。今の状況では、彼は自ら主導権を握り、それを引き起こそうとしている。\n\n発表後に彼の側近たちと話したところ、今後の選挙運動全体を通じた彼の目標は——彼自身が演説でも述べたように——「国民対既成勢力」という構図を明確に打ち出すことだ、と教えられた。\n\n「これはナイジェルが議題を設定しているのだ。彼はスカイ、タイムズ、そしてダニエル・グリーンバーグに裁かれることにうんざりしている」とある友人は付け加えた。\n\nスカイ・ニュースへの言及は、ファラージ氏が自身の所有物件の一つで娘が最近「嫌がらせ」を受けたとみなしている件に対して煮えくり返るような怒りを感じているためだ。\n\nスカイ・ニュースは適切に取材を行ったと主張している。\n\nリフォーム党は、できる限り早急に補欠選挙を進める意向だと伝えられている。\n\n彼らは直ちに議会上の手続きに着手する。\n\nこれにより、ファラージ氏は下院議員の資格を失う王室任命職——チルターン・ハンドレッズの王室管財人兼執行官、またはノーススティード荘園の王室管財人兼執行官のいずれか——に就くことになる。\n\nこの手続きが完了し、クラクトン議席が空席となった後、来週末に始まる夏季休会前に議会がまだ開会中であれば、補欠選挙を実施するための令状が下院で動議される可能性がある。\n\nそうなれば、補欠選挙はおそらく来月のどこかで行われることになる——ちょうどアンディ・バーナム率いる新政権が発足する頃と重なる可能性が高い。\n\n今問われているのは、リフォーム党の対立勢力がどう反応するかだ。\n\n候補者を立てるのか、それとも立てないのか？\n\n元リフォーム党議員ルパート・ロウ氏率いる「リストア・ブリテン」はすでに不出馬を表明している。\n\nリフォーム党は労働党に出馬を促し、バーナム氏にとっての最初の大きな試練になると主張している。\n\nしかしバーナム陣営はこれを「売名行為」と表現しており、トルコのアンカラで開かれるNATO首脳会議に出席中の首相はこれを「見苦しいパフォーマンス」と批判した。\n\nこうした状況において、対立勢力が候補者を立てないという先例もある——世間の注目を狙った行動に加担するつもりはないと主張するためだ。\n\n2008年、保守党のデービッド・デービス議員が市民的自由をめぐるキャンペーンの一環としてハルタンプライス・アンド・ハウデン選挙区の議席を辞職した際、労働党も自由民主党も対立候補を立てなかった。\n\nちなみに、この補欠選挙があっても、基準コミッショナーが進めている調査は終わらないという点は覚えておく価値がある。この調査は最終的に、いわゆるリコール請願、そして補欠選挙につながる可能性がある。\n\nこれにより議会内では、ナイジェル・ファラージ氏が一つの補欠選挙を戦って勝利した後、別の補欠選挙に直面するというシナリオを描く人も出てきた。\n\nこれが起こるのは、議会がこの懲罰が適切だと判断した場合であり、さらに重要なことは、クラクトンの有権者名簿に登録された人々の10％がリコール請願に署名した場合に限られる。\n\nそのシナリオでは、現地の人々が投票箱や投票所にうんざりしているということになりかねない。\n\n成り行きを見守ろう。\n\nリフォーム党が事実上伝えようとしているのは、我々は……", "vocab": [{"word": "tantalise", "definition": "（人を）じらす、焦らす。手が届きそうで届かないものをちらつかせて相手の期待や欲求をあおる行為を指す。"}, {"word": "limelight", "definition": "世間の注目・脚光。「seize the limelight」で「注目を集める・主役の座を奪う」という意味の慣用表現として使われる。"}, {"word": "Parliamentary Commissioner for Standards", "definition": "議会基準コミッショナー。英国下院において議員の行動規範違反を調査する独立した監察官の役職。"}, {"word": "recall petition", "definition": "リコール請願。選挙区の有権者の一定割合が署名することで現職議員の罷免と補欠選挙を求める手続き。英国では有権者名簿の10%の署名が必要。"}, {"word": "writ", "definition": "（ここでは）補欠選挙を実施するための正式な令状・命令書。「move the writ」で補欠選挙の実施を議会に動議することを指す法律・議会用語。"}, {"word": "precedent", "definition": "先例、前例。過去に起きた類似の出来事や判断で、現在の状況における行動の参考・根拠となるもの。"}, {"word": "under the cosh", "definition": "苦境に立たされている、圧力をかけられている。英国の口語的慣用表現で、強い批判や圧力にさらされている状態を意味する。"}]}, {"title_ja": "Harry loses High Court privacy case against Daily Mail publisher", "title_en": "Harry loses High Court privacy case against Daily Mail publisher", "summary_ja": "Judge Mr Justice Nicklin says the claimants had failed to prove the allegations.", "summary_en": "Judge Mr Justice Nicklin says the claimants had failed to prove the allegations.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c9324nyqwjno?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Harry loses High Court privacy case against Daily Mail publisher\n- Published\nThe Duke of Sussex and six others have lost their High Court privacy case against the publisher of the Daily Mail and Mail on Sunday.\nJudge Mr Justice Nicklin said the claimants had failed to prove the allegations of unlawful information gathering.\nPrince Harry brought the case against Associated Newspapers, along with a number of well-known figures.\nThey claimed that the newspaper group used unlawful methods for getting information for stories, allegations which were strenuously denied by Associated Newspapers.\nIn a joint statement following the ruling, Prince Harry and Baroness Doreen Lawrence, another claimant and peer whose son Stephen was murdered in 1993, said: \"We came to Court seeking justice and accountability. But we have received neither.\"\n\"It is a complete and obvious whitewash, but sadly not altogether unexpected\", the pair added.\nA spokesperson for the publisher described the judgement as an \"overwhelming victory for the Daily Mail and its journalists\".\nThe prince did not respond to the BBC's questions about the judgement as he left an Invictus Games event in London.\nIn a summary of his ruling, Mr Justice Nicklin concluded the allegations were serious and therefore required more convincing evidence before being proven.\nHe said the seven claimants could not rely on \"suspicion, even where understandable\". Instead, he said they had to prove information had been obtained unlawfully.\nMr Justice Nicklin refused to make a finding as to whether what became known as unlawful information gathering had become \"widespread and habitual\" at Associated Newspapers and instead decided the merits of each individual claim.\nHe said he accepted the denials of Associated Newspaper journalists \"who gave lawful explanations for the sourcing of the disputed articles and incidents\".\nHe ruled that the claimants had also failed to prove three senior Associated executives - former editors Paul Dacre and Peter Wright, and current senior lawyer for the publisher Elizabeth Hartley - had lied in their evidence to the Leveson Inquiry where they said there was no unlawful activity at the Daily Mail and Mail on Sunday.\nIn his full 436-page judgement, Mr Justice Nicklin examined each claimed breach of privacy, and often noted that there was suspicion about how information was obtained by the journalists.\nIn one article, the Daily Mail's Royal Editor wrote in 2013 that Prince Harry faced a lonely New Year's Eve without his girlfriend Cressida Bonas.\nIt was claimed a freelance journalist was asked to \"blag\" travel details for Ms Bonas.\nPrince Harry said in a witness statement this was \"creepy\" and he did not know how the newspaper could have obtained the information about the couple's separate whereabouts.\nMr Justice Nicklin said: \"I accept that he found the article intrusive and was genuinely concerned by how journalists appeared to know private information concerning his relationships. But suspicion, even understandable suspicion, is not proof.\"\nDozens of people gave evidence during the trial, including Prince Harry and the other claimants, as well as many current and former Associated Newspapers journalists and executives who gave evidence denying illegal activity.\nDuring the trial at the beginning of the year, Prince Harry became emotional when talking about the impact of the articles on himself and those close to him, and said Associated Newspapers had made the life of his wife, the Duchess of Sussex, \"an absolute misery\".\nOther claimants in the case included actors Elizabeth Hurley and Sadie Frost, singer Sir Elton John and his husband David Furnish, former Liberal Democrat minister Sir Simon Hughes, and Baroness Lawrence.\nDuring the trial:\n- Hurley was reduced to tears after describing the effect of the reporting of the paternity row about her son with the American businessman Steve Bing \n- Prince Harry flew in to give evidence in person - his anger was plain to see as he argued there were 14 articles written using unlawfully gathered information about his private life \n- Frost's claims covered 11 articles including a draft story about Frost's ectopic pregnancy \n- Baroness Lawrence alleged five articles relied on information \"stolen\" about her and the investigation into her son Stephen's murder \n- On Sir Elton John and his husband David Furnish, barrister David Sherborne said details were published about the birth of their surrogate son - including his birth certificate before the couple had received their own copy \n- For Sir Simon, the barrister said the Mail was \"prepared to exploit his sexuality\", also citing a moment in 2006 when Hughes was \"outed on the front page of the Sun\" \nAssociated Newspapers denied all the allegations.\nIn a statement after the judgment was delivered, Sir Simon described it as \"very disappointing\" and said he would now \"take time to consider\" the judge's findings.\nAn Associated Newspaper spokesperson said: \"Mr Justice Nic", "translation_ja": "", "vocab": []}, {"title_ja": "フランス：ル・ペン氏、汚職有罪判決が支持されるも大統領選出馬を誓う", "title_en": "France: Le Pen vows to run for presidency despite upheld graft conviction", "summary_ja": "フランスの控訴裁判所はマリーヌ・ル・ペン氏の2025年の汚職有罪判決を支持したが、公職追放期間を15か月に短縮し、禁固刑を3年に減刑したため、来年の大統領選への出馬が可能となった。ル・ペン氏はテレビ局TF1で出馬を宣言し、破毀院への上訴が判決の効力を停止させると説明した。同氏は一貫して無罪を主張しており、以前は電子監視ブレスレットを着用しながら選挙運動はしないと述べていた。", "summary_en": "A French appeals court upheld Marine Le Pen's 2025 corruption conviction but reduced her ban from public office to 15 months and her prison term to three years, making her eligible to run in next year's presidential election. Le Pen announced on TF1 television that she intends to run, citing her ability to appeal to the Court of Cassation, which suspends the ruling's effects in the meantime. She maintains her innocence and previously stated she would not campaign while wearing an electronic monitoring bracelet.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/france-le-pen-vows-to-run-despite-upheld-graft-conviction/a-77859337?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "France: Le Pen vows to run despite upheld graft conviction\nPublished July 7, 2026last updated July 7, 2026The face of France's far-right, Marine Le Pen, has said in a television interview that she intends to run for the presidency for her National Rally (RN) party next year.\nThis follows an appeals court upholding her graft conviction but reudcing a ban from holding public office, making it possible for her to run while wearing an electronic monitoring device on her ankle. She also reiterated her plan to appeal again to France's top court, the Court of Cassation in Paris, saying she considered herself \"innocent.\"\n\"I want to pursue all legal avenues to defend my innocence in this case. I am a candidate tonight,\" Le Pen told the TF1 TV channel in a prime time interview.\nLe Pen had previously said she would not run if sentenced to legal monitoring, and had left the courtroom earlier without speaking to journalists.\n\"I had stated that I would not campaign while wearing an electronic monitoring bracelet,\" she told TF1. \"But since I have the option to file an appeal with the Court of Cassation ... and that appeal suspends the effects of the ruling, I will campaign without an electronic monitoring bracelet,\" Le Pen said.\nIf the 57-year-old daughter of former French far-right leader Jean-Marie Le Pen does run, it would be her fourth shot at the presidency, after coming second to Emmanuel Macron in 2017 and 2022 and failing to make the runoff vote in 2012.\nThe Court of Cassation had indicated earlier that evening to expect a decision on whether it would hear Le Pen's appeal no earlier than next week.\nAs to her protege Jordan Bardella, seen as her stand-in in the event that she could not or would not run, Le Pen said they would form a \"partnership consisting of a reliable prime minister and president.\"\nWhat happened in court on Tuesday?\nIn the long-awaited verdict, the appeals judge upheld her 2025 graft conviction, but lessened her sentence.\nLe Pen, 57, had been sentenced to a five-year ban from public office last year by a lower court, as well as four years in prison over a fake jobs scam when she was a member of the European Parliament\nPer Tuesday's ruling, her ban on standing in an election has been shortened to 15 months, and her prison term reduced to three years — two suspended and one with an electronic monitor.\nThat means she could still enter the race for office, but only with an ankle tag.\nDW's Paris correspondent Lisa Louis said the long queue in front of the courthouse, the old Palais de Justice in central Paris, was an indication of how closely watched the verdict was set to be — in France and abroad.\n\"The first national and international journalists got here at 5 a.m.,\" she said. \"I arrived two hours later — but was still one of the happy few to get a seat in the courtroom.\"\nWhat was Le Pen convicted of?\nAs a member of what was then called the National Front, Le Pen was a member of the European Parliament from 2004 to 2017.\nAlongside some two dozen former far-right staffers, she was found guilty of misappropriating EU funds to pay alleged staffers for jobs that did not really exist.\nProsecutors said she \"professionalized\" a type of graft first introduced by her father, the late far-right leader Jean-Marie Le Pen, to siphon EU funds.\nLe Pen, the party, and 10 others appealed their verdicts, with her fellow RN chief Bardella calling the trials \"politically motivated.\" She has consistently denied any wrongdoing.\nEdited by: Zac Crellin, Natalie Muller\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google by clicking here and hitting the \"star\" or \"preferred\" button, so you'll always see our verified news first.", "translation_ja": "フランス：ル・ペン氏、汚職有罪判決が支持されるも出馬を誓う\n\n2026年7月7日公開・更新\n\nフランス極右の顔、マリーヌ・ル・ペン氏は、テレビインタビューで来年の大統領選に国民連合（RN）の候補として出馬する意向を示した。\n\nこの発言は、控訴裁判所が彼女の汚職有罪判決を支持しつつも公職追放の禁止期間を短縮したことを受けたもので、足首に電子監視装置を装着した状態であれば出馬が可能となった。また、自身を「無実」と考えているとして、パリの最高裁判所・破毀院に再度上訴する計画を改めて表明した。\n\n「この件で自分の無実を証明するためにあらゆる法的手段を尽くしたい。今夜、私は候補者だ」とル・ペン氏はプライムタイムのインタビューでTF1テレビに語った。\n\nル・ペン氏はかつて、法的監視下に置かれた場合は出馬しないと述べており、判決言い渡し後はジャーナリストに話しかけることなく法廷を後にしていた。\n\n「電子監視ブレスレットを着けたまま選挙運動はしないと述べていた」と彼女はTF1に語った。「しかし、破毀院に上訴する選択肢がある限り……その上訴は判決の効力を停止させるため、電子監視ブレスレットなしで選挙運動を行う」とル・ペン氏は述べた。\n\n57歳の彼女、故フランス極右指導者ジャン＝マリー・ル・ペン氏の娘が出馬すれば、2017年と2022年にエマニュエル・マクロン氏に次ぐ2位、2012年には決選投票進出を逃した後の、4度目の大統領選挑戦となる。\n\n破毀院はその夜早くに、上訴を受理するかどうかについての判断は早くとも翌週以降になると示唆していた。\n\n彼女の後継者とみなされ、彼女が出馬できないまたは出馬しない場合の代役と見られているジョルダン・バルデラ氏については、「信頼できる首相と大統領によるパートナーシップを組む」と述べた。\n\n火曜日の法廷では何があったのか？\n\n待望の評決において、控訴審判事は2025年の汚職有罪判決を支持したが、量刑を軽減した。\n\nル・ペン氏（57歳）は昨年、欧州議会議員時代に行ったとされる架空雇用詐欺をめぐり、下級裁判所から5年間の公職追放と4年の禁固刑を言い渡されていた。\n\n火曜日の判決では、選挙への立候補禁止期間が15か月に短縮され、禁固刑は3年（うち2年は執行猶予、1年は電子監視付き）に減刑された。\n\nつまり、彼女は依然として選挙に出馬できるが、足首タグを着用した状態に限られる。\n\nDWのパリ特派員リザ・ルイ記者は、パリ中心部にある旧パレ・ド・ジュスティスの裁判所前に長い列ができていたことが、この判決がフランス国内外でいかに注目されていたかを示していると述べた。\n\n「最初の国内外のジャーナリストたちは午前5時にここに到着した」と彼女は語った。「私は2時間後に来たが、それでも法廷内で席を確保できた幸運な少数の一人だった。」\n\nル・ペン氏は何で有罪とされたのか？\n\nル・ペン氏は、当時「国民戦線」と呼ばれていた政党に所属し、2004年から2017年まで欧州議会議員を務めた。\n\n約20人あまりの元極右スタッフとともに、実際には存在しない職務に対してスタッフに給与を支払うためにEU資金を横領したとして有罪判決を受けた。\n\n検察は、彼女が故父ジャン＝マリー・ル・ペン氏が最初に導入したとされるEU資金の横領手口を「プロ化」させたと主張した。\n\nル・ペン氏、同党、そして他の10人が判決を不服として控訴し、RN党首のバルデラ氏は裁判を「政治的動機によるもの」と呼んだ。彼女は一貫して不正行為を否定している。\n\n編集：ザック・クレリン、ナタリー・ミュラー", "vocab": [{"word": "graft", "definition": "汚職・収賄を意味する名詞。公職者が地位を利用して不正に金銭や利益を得る行為を指す。政治・法律報道で頻繁に使われる。"}, {"word": "misappropriating", "definition": "資金や財産を不正に流用・横領することを意味する動詞の現在分詞形。特に公的資金や他者の資産を不正目的に使用する文脈で使われる。"}, {"word": "protege", "definition": "目上の人物に保護・育成されている後継者や弟子を指すフランス語由来の名詞。英語でも政治やビジネスの文脈でよく用いられる。"}, {"word": "upheld", "definition": "上位裁判所が下位裁判所の判決や決定を支持・維持することを意味する動詞uphold の過去分詞形。法律文書や裁判報道で多用される。"}, {"word": "siphon", "definition": "資金や資源を不正にまたは密かに横流しすることを意味する動詞。本来は液体をサイフォンで移す意味だが、比喩的に不正資金移動に使われる。"}, {"word": "reiterated", "definition": "すでに述べたことを改めて繰り返し強調することを意味する動詞reiterate の過去形。公式声明や政治的文脈でよく使われる上級語彙。"}]}, {"title_ja": "ドローンがイランの「抵抗の枢軸」民兵組織を変えた方法――レバノン、ガザ、イエメン、イラク", "title_en": "How drones transformed Iran's Axis of Resistance militias in Lebanon, Gaza, Yemen and Iraq", "summary_ja": "中東各地のイランの代理民兵組織は、ドローン技術を通じて大きな作戦上の自律性を獲得し、イランの直接的な指揮統制への依存度を低下させている。フーシ派やヒズボラなどの組織は、イラン設計に基づき、主に中国から調達した部品を使って無人航空機を独自に製造できるようになった。この技術的変化は、米国とイスラエルによるイランへの攻撃が続く中でも、イランと同盟組織との関係の性質を変えつつある。", "summary_en": "Iran's proxy militias across the Middle East have developed significant operational autonomy through drone technology, reducing their dependence on direct Iranian command and control. Groups like the Houthis and Hezbollah can now manufacture UAVs independently using Iranian designs and components sourced globally, particularly from China. This technological shift is reshaping the nature of Iran's relationships with its allies even as the US-Israel war on Iran continues.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/how-drones-transformed-iran-s-axis-of-resistance-militias-in-lebanon-gaza-yemen-and-iraq/a-77864220?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "How drones transformed Iran's relationships with its proxies\nJuly 7, 2026When the United States and Israel launched the war on Iran in late February, they hoped to cripple both the Islamic Republic and its so-called \"Axis of Resistance\" in the Middle East. This comprises Iran's paramilitary proxy groups, including Hamas in Gaza, Hezbollah in Lebanon, the Houthis in Yemen and militias in Iraq, all of whom are opposed to the US and Israel.\nThe assumption was that \"by hitting the right leaders, weapons facilities and supply lines, an outside actor could induce catastrophic failure across the Iranian regime and its web of Middle Eastern allies,\" said Peter Salisbury, a fellow at US think tank Century International and lead author of the think tank's recently published report\"Beyond the Axis.\"\nDespite the US and Israel achieving many of those military objectives, Iranian forces were able to continue launching drone attacks on neighboring Gulf states and shipping in the Strait of Hormuz, while their allies in Lebanon and Yemen intensified attacks against Israel and commercial shipping in the Red Sea.\nOperational autonomy\nFor Wolf-Christian Paes, associate fellow at the International Institute for Strategic Studies, and one of the contributors to the \"Beyond the Axis\" report, the term \"proxies\" is actually misleading as it implies a command-and-control relationship between Tehran and the members of the axis.\n\"Unmanned aerial vehicle [UAV] proliferation is a good example,\" he told DW. A few years ago, Tehran transferred complete systems and the necessary training to its allies. \"Today these militias can build their own UAVs, based on Iranian designs, with most of the parts coming from countries other than Iran,\" Paes said.\nFor example, according to the report, which was published after two years of research, these groups are able to source large quantities of engines for the Shahed-136 drone directly from Chinese manufacturers.\n\"Dual-use technology is difficult to control in the first place and without a traditional hub for smuggling, tracking the supply chain is like looking for a needle in a haystack,\" Paes told DW, adding that for example China, Russia but also Oman have so far made no real attempts to control the movement of these items.\nAccording to the \"Beyond the Axis\" report, drone-related conflict incidents around the world rose from 140 in 2016 to more than 58,000 in 2025, a 41,000% increase.\nChanging ties\n\"The growing ability of Iran's partners to manufacture and deploy drones independently is also changing the nature of their relationship with Tehran,\" Neil Quilliam, an associate fellow with the Middle East and North Africa program at the UK-based think tank Chatham House, told DW.\nIn his view, the Houthi militia in Yemen illustrates this trend. The group now possesses a level of operational autonomy that would have been difficult to imagine a decade ago. \"Iran and Lebanon's Hezbollah helped establish the foundations of the Houthis' drone and missile programs, while years of conflict and isolation compelled them to develop domestic production capabilities,\" he told DW.\nDuring the two-year war in Gaza from 2023 to 2025, the Houthis attacked Israel as well as international shipping in the Red Sea with drones and missiles in what they said was a bid to show support for Palestinians in Gaza. During the war in Iran from February to April 2026, the Houthis resumed attacks.\nThe report also notes that, since at least 2022, a small group of senior Houthi officers in Sanaa have built relationships across the African coasts of the Red Sea and the Gulf of Aden. \"Houthi smuggling networks are now present in Somalia, Djibouti, Eritrea and Sudan,\" the report said.\nLebanon's Hezbollah militia\nFor many years, Lebanon's Hezbollah militia was Tehran's best equipped proxy largely because of its proximity to Israel. A day after Hamas attacked Israel on Oct.7, 2023, Hezbollah opened a second front in Israel's north which escalated into a war in Lebanon.\n\"Israeli efforts to degrade the organization's leadership and military infrastructure created a situation in which Iranian assistance became essential for recovery,\" Quilliam said.\nA November 2024 ceasefire fell apart in early March 2026, after Hezbollah attacked Israel with drones and missiles following the Israeli killing of the Iran's leader Ali Khamenei, who Hezbollah also pledged allegiance to. In the peace talks between the US and Tehran, the front in Lebanon has since become a key issue.\n\"Hezbollah's participation alongside Iran during the recent conflict, coupled with Tehran's insistence that any ceasefire arrangement include Lebanon, demonstrated how closely the two remain linked,\" Quilliam said.\nHamas in Gaza, paramilitary groups in Iraq\nAs a consequence of Israel's prolonged military campaign in Gaza, Tehran's access to Gaza and Hamas is reduced, Quilliam said. \"That should not be mistaken for a permanent decline in Iranian relevance, as the relationships, training", "translation_ja": "ドローンがイランと代理組織との関係を変えた方法\n\n2026年7月7日\n\n米国とイスラエルが2月下旬にイランへの戦争を開始した際、両国はイスラム共和国と、いわゆる中東の「抵抗の枢軸」を壊滅させることを期待していた。この枢軸には、ガザのハマス、レバノンのヒズボラ、イエメンのフーシ派、イラクの民兵組織など、米国とイスラエルに反対するイランの準軍事的代理組織が含まれる。\n\n米シンクタンク「センチュリー・インターナショナル」のフェローであり、同シンクタンクが最近発表した報告書「枢軸を超えて」の主執筆者であるピーター・ソールズベリー氏によると、「適切な指導者、兵器施設、補給路を攻撃することで、外部の行為者がイラン政権とその中東同盟国のネットワーク全体に壊滅的な崩壊をもたらすことができるという前提があった」という。\n\n米国とイスラエルがそうした軍事目標の多くを達成したにもかかわらず、イラン軍は周辺湾岸諸国やホルムズ海峡の船舶へのドローン攻撃を継続することができた。一方、レバノンとイエメンの同盟組織はイスラエルおよび紅海の商業船舶への攻撃を激化させた。\n\n作戦上の自律性\n\n国際戦略研究所（IISS）のアソシエイト・フェローであり、「枢軸を超えて」報告書の執筆者の一人であるウォルフ＝クリスティアン・パース氏にとって、「代理組織」という用語は実際には誤解を招くものであり、テヘランと枢軸構成員との間に指揮統制関係があることを示唆してしまうと指摘する。\n\n「無人航空機（UAV）の拡散はその好例です」と同氏はDWに語った。数年前、テヘランは同盟組織に完全なシステムと必要な訓練を提供していた。「今日、これらの民兵組織はイランの設計に基づき、部品の大半をイラン以外の国から調達しながら、独自のUAVを製造できます」とパース氏は述べた。\n\nたとえば、2年間の調査を経て発表されたこの報告書によると、これらの組織はシャヘド136ドローン用のエンジンを中国のメーカーから直接大量に調達できるという。\n\n「デュアルユース技術はそもそも管理が難しく、密輸の伝統的な中継拠点がない状況では、サプライチェーンを追跡することは干し草の山の中から針を探すようなものです」とパース氏はDWに語り、たとえば中国、ロシア、そしてオマーンも、こうした物品の移動を制限する本格的な取り組みをこれまでのところ行っていないと付け加えた。\n\n「枢軸を超えて」報告書によると、世界におけるドローン関連の紛争事案は、2016年の140件から2025年には5万8000件以上に増加し、4万1000%の増加となった。\n\n変化する関係\n\n「イランのパートナー組織がドローンを独自に製造・運用する能力が高まっていることは、テヘランとの関係の性質も変えつつあります」と、英シンクタンク「チャタムハウス」の中東・北アフリカプログラムのアソシエイト・フェロー、ニール・キリアム氏はDWに語った。\n\n同氏の見解では、イエメンのフーシ派民兵組織がこの傾向を象徴している。同組織は今や、10年前には想像しにくかったレベルの作戦上の自律性を持つ。「イランとレバノンのヒズボラがフーシ派のドローン・ミサイルプログラムの基盤を確立する手助けをし、長年にわたる紛争と孤立が同組織に国内生産能力の開発を促した」と同氏は述べた。\n\n2023年から2025年にかけての2年間にわたるガザ戦争中、フーシ派はパレスチナ人への連帯を示すとして、イスラエルや紅海の国際船舶をドローンとミサイルで攻撃した。2026年2月から4月にかけてのイランとの戦争中も、フーシ派は攻撃を再開した。\n\nまた報告書は、少なくとも2022年以降、サナアのフーシ派上級将校の小グループが紅海とアデン湾のアフリカ沿岸各地との関係を構築してきたと指摘している。「フーシ派の密輸ネットワークは現在、ソマリア、ジブチ、エリトリア、スーダンに存在する」と報告書は述べている。\n\nレバノンのヒズボラ民兵組織\n\n長年にわたり、レバノンのヒズボラ民兵組織は、イスラエルとの近接性から主にテヘランの最も装備の整った代理組織であった。2023年10月7日にハマスがイスラエルを攻撃した翌日、ヒズボラはイスラエル北部に第二戦線を開き、それはレバノンにおける戦争へとエスカレートした。\n\n「組織の指導部と軍事インフラを劣化させようとするイスラエルの取り組みが、イランの支援が復興に不可欠となる状況を生み出した」とキリアム氏は述べた。\n\n2024年11月の停戦は、ヒズボラがイランの最高指導者アリー・ハメネイー師のイスラエルによる殺害を受けてドローンとミサイルでイスラエルを攻撃した2026年3月初めに崩壊した。ヒズボラもハメネイー師への忠誠を誓っていた。米国とテヘランの和平交渉において、レバノン戦線はその後、主要な争点となっている。\n\n「最近の紛争においてイランと並んでヒズボラが参戦したこと、そしてテヘランがいかなる停戦合意もレバノンを含むものでなければならないと主張していることは、両者がいかに緊密に結びついたままであるかを示している」とキリアム氏は述べた。\n\nガザのハマス、イラクの準軍事組織\n\nイスラエルによるガザでの長期にわたる軍事作戦の結果、ガザとハマスへのテヘランのアクセスは縮小しているとキリアム氏は述べた。「それはイランの影響力の永続的な低下として誤解されるべきではない。なぜなら、関係や訓練は――」", "vocab": [{"word": "proxy", "definition": "代理人・代理組織のこと。国際政治では、ある国家が直接介入せずに別の組織や国家を利用して目的を達成する場合に使われる。「proxy war（代理戦争）」のように使われることが多い。"}, {"word": "proliferation", "definition": "急速な増加・拡散を意味する名詞。特に兵器や技術が広範囲に広がる状況を指し、「nuclear proliferation（核拡散）」のように安全保障の文脈で頻繁に用いられる。"}, {"word": "dual-use", "definition": "民間・軍事の両方の目的に使用できる技術や製品を指す形容詞。輸出規制や安全保障の文脈で頻繁に登場する専門用語。"}, {"word": "operational autonomy", "definition": "上位の指揮系統から独立して、独自に作戦や行動を計画・実行できる能力や状態を指す複合表現。軍事・組織管理の文脈で使われる。"}, {"word": "degrade", "definition": "軍事・技術の文脈では、敵の能力・インフラ・組織の効率や機能を低下させることを意味する動詞。日常語の「品質を落とす」より戦略的なニュアンスを持つ。"}, {"word": "paramilitary", "definition": "正規軍に準じた組織や活動を指す形容詞・名詞。政府の正規軍ではないが軍事的な訓練・構造を持つ組織に対して使われる。"}, {"word": "ceasefire", "definition": "交戦中の双方が戦闘行為を一時的または恒久的に停止することに合意する「停戦」を意味する名詞。外交・安全保障報道で頻出する専門語。"}]}, {"title_ja": "IOC、ロシア選手への制限を解除　LA2028五輪予選への参加を容認", "title_en": "IOC lifts restrictions on Russian athletes ahead of LA 2028 qualifying events", "summary_ja": "国際オリンピック委員会（IOC）は、ロシア人選手への制限を解除し、2028年ロサンゼルス五輪の予選を含むチーム競技への参加を認めると発表した。ロシアのオリンピック委員会は、ロシアがウクライナから不法に併合した地域のスポーツ組織を傘下に置いたとして2023年に資格停止処分を受けていた。選手の競技復帰は認められるものの、ロシア国旗と国歌の使用禁止は継続され、厳格なドーピング検査も課される。", "summary_en": "The International Olympic Committee announced it will lift restrictions on Russian athletes, allowing them to compete in team events and qualifying competitions for the 2028 Los Angeles Olympics. Russia's Olympic Committee had been suspended since 2023 after it recognized regional sports organizations in Ukrainian territories illegally annexed by Russia. While athletes may return to competition, the Russian flag and anthem remain banned, and strict anti-doping procedures will apply.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/ioc-paves-way-for-russia-s-return-to-olympics/a-77868069?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "IOC paves way for Russia's return to Olympics\nJuly 7, 2026The International Olympic Committee (IOC) announced on Tuesday that it would lift restrictions on Russian athletes to allow them to compete in team events and in qualifying competitions.\nIt all comes ahead of qualifying events for the Los Angeles 2028 Olympic Games and just two months after the IOC lifted restrictions for Russia's ally Belarus, whose athletes would be allowed to compete again without any restrictions and with their national symbols.\nRussia's has been shut out of international sporting competitions since it launched an invasion in Ukraine that began the war in 2022.\nThe IOC suspended Russia's Olympic Committee in 2023, after Russia unilaterally recognized regional sports organizations in the four Ukrainian territories that Russia illegally annexed in 2022.\nRussian athletes were still able to compete as neutral athletes at the 2024 Paris Olympics and at the 2026 Milano Cortina Winter Games, but only if they are proven to not support the war and have no affiliation with Russia's military or security forces.\nIOC chief: Athletes 'should not pay the price' of war\nIn a statement, the IOC said that a thorough analysis by its Legal Affairs Commission had found that the Russian Olympic Committee (ROC) no longer included any regional sports organizations in territories falling under the jurisdiction of the National Olympic Committee (NOC) of Ukraine as its members.\nIOC president Kirsty Coventry told reporters that the IOC opposes \"any kind of violence and war and will continue to support Ukraine,\" but she also said that it wasn't right that athletes \"should pay the price for this.\"\nRussian sports minister Mikhail Degtyarev welcomed the IOC's decision, saying it should clear the way for Russian athletes to make a full return to the international sporting stage.\n\"Our country's return to the Olympic family is a green light for international federations to reinstate all our athletes,\" Degtyarev said.\nNo flag or anthem for now\nThe IOC said, however, that Russians will still go through strict anti-doping procedures in order to \"address the lack of confidence in the global sporting community relating to the return of Russian athletes to international competition.\"\nThe IOC also said it would not organize IOC events in Russia or invite Russian government or state officials to its events.\nThe ban on the Russian national anthem being played and the flag being displayed has also been kept in place for now.\n\"We made it clear that all athletes had the possibility to compete at the Olympic Games. This is what this decision speaks to. It allows Russian athletes to take part in sports competitions. We thought it was really important for athletes to have that possibility,\" Coventry told a press conference.\n\"It was very clear when we strengthened our neutrality bylaw that selection would not be based only on sports performance, but also ability to serve as role models,\" she added.\nEdited by: Zac Crellin", "translation_ja": "IOC、ロシアの五輪復帰への道を開く\n\n2026年7月7日　国際オリンピック委員会（IOC）は火曜日、ロシア人選手への制限を解除し、チーム競技および予選大会への出場を認めると発表した。\n\nこの決定は、2028年ロサンゼルス五輪の予選大会を前にしたものであり、IOCがロシアの同盟国ベラルーシへの制限を解除してからわずか2か月後のことである。ベラルーシの選手は、国家のシンボルを使用した上での制限なしの競技参加が認められることになっていた。\n\nロシアは2022年にウクライナへの侵攻を開始し、戦争が始まって以来、国際スポーツ競技から締め出されていた。\n\nIOCは2023年にロシアオリンピック委員会（ROC）を資格停止とした。ロシアが2022年に不法に併合した4つのウクライナ地域における地域スポーツ組織を、ロシアが一方的に傘下に加えたためである。\n\nロシア人選手は、2024年パリ五輪および2026年ミラノ・コルティナ冬季五輪において、戦争を支持していないことが証明され、ロシア軍や治安部隊との関係がないことを条件に、中立選手として出場することは可能だった。\n\nIOC会長：選手は「戦争の代償を払うべきではない」\n\nIOCは声明の中で、法務委員会による詳細な分析の結果、ロシアオリンピック委員会（ROC）がウクライナ国内オリンピック委員会（NOC）の管轄下にある地域のスポーツ組織を加盟団体として含まなくなったことが確認されたと述べた。\n\nIOCのカースティ・コベントリー会長は記者団に対し、IOCは「いかなる暴力や戦争にも反対し、ウクライナへの支援を続ける」と述べる一方で、選手たちが「その代償を払うべきではない」とも語った。\n\nロシアのミハイル・デグチャリョフ・スポーツ大臣はIOCの決定を歓迎し、ロシア人選手が国際スポーツ舞台に完全復帰するための道が開かれると述べた。\n\n「我が国の五輪ファミリーへの復帰は、国際競技連盟がすべてのロシア人選手を復帰させるためのゴーサインだ」とデグチャリョフ氏は語った。\n\n国旗・国歌は当面引き続き使用禁止\n\nただしIOCは、国際スポーツ界のロシア人選手復帰に対する信頼の欠如に対処するため、ロシア人選手に対して引き続き厳格なドーピング検査を実施すると述べた。\n\nまたIOCは、ロシア国内でIOC主催イベントを開催しないこと、またロシアの政府・国家関係者をイベントに招待しないことも明らかにした。\n\nロシアの国歌演奏と国旗掲示の禁止も当面維持される。\n\n「私たちは、すべての選手が五輪に出場できる可能性を持つべきだと明確に述べてきた。今回の決定はそれを体現するものだ。ロシア人選手がスポーツ競技に参加できるようになる。選手たちがその可能性を持つことが本当に重要だと考えた」とコベントリー会長は記者会見で述べた。\n\n「中立性に関する規則を強化した際に明確にしたのは、選考が競技成績だけでなく、ロールモデルとして行動できるかどうかにも基づくということだ」と同氏は付け加えた。\n\n編集：ザック・クレリン", "vocab": [{"word": "unilaterally", "definition": "一方的に。他の関係者の同意や協議なしに、単独で行動することを意味する副詞。外交・法律文書でよく使われる。"}, {"word": "annexed", "definition": "併合した。ある国家が別の地域や領土を強制的に自国に組み込むことを指す動詞annexの過去形。国際法や政治的文脈で頻出する。"}, {"word": "affiliation", "definition": "所属・関係。ある組織や団体との正式なつながりや関係性を指す名詞。ビジネスや政治の文脈でも広く使われる。"}, {"word": "jurisdiction", "definition": "管轄権・司法権。ある機関や政府が権限を行使できる範囲や領域を指す法律用語。"}, {"word": "neutrality", "definition": "中立性。特定の側に立たず、どちらにも偏らない立場や状態を指す名詞。スポーツや外交の文脈でよく使われる。"}, {"word": "bylaw", "definition": "内規・細則。組織や団体が内部運営のために定めた規則や規定を指す名詞。IOCなどの国際機関の文書に頻出する。"}, {"word": "reinstate", "definition": "復帰させる・再加入させる。一度停止または追放された人物や組織を元の地位や状態に戻すことを意味する動詞。"}]}, {"title_ja": "メッシとアルゼンチン、W杯の劇的な試合でエジプトに逆転勝利", "title_en": "Messi, Argentina Stage Stunning Comeback Against Egypt in World Cup Thriller", "summary_ja": "アルゼンチンはFIFAワールドカップの決勝トーナメント1回戦で、エジプトを相手に終盤15分間で3得点を挙げる劇的な逆転勝利を収め、3対2で試合を制した。リオネル・メッシは83分にゴールを決め、得点王（ゴールデンブーツ）争いに踏みとどまった。ディフェンディングチャンピオンのアルゼンチンは準々決勝に進出し、スイス対コロンビアの勝者と対戦する。", "summary_en": "Argentina mounted a dramatic late comeback against Egypt, scoring three unanswered goals in the final 15 minutes to win 3-2 in the Round of 16 at the FIFA World Cup. Lionel Messi scored in the 83rd minute, keeping him in contention for the Golden Boot. The defending champions now advance to the quarterfinals to face the winner of Switzerland vs. Colombia.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/GMA/Culture/lionel-messi-leads-argentina-past-egypt-world-cup/story?id=134558817", "state_media": false, "category": "社会", "full_text": "'Game for the ages': Messi, Argentina stage comeback against Egypt in World Cup thriller\nLionel Messi led Argentina on a late run of three unanswered goals against Egypt Tuesday, bringing the defending champions one step closer to winning back-to-back FIFA World Cup titles.\nEgypt had mounted a 2-0 lead until nearly 80 minutes into the game, before Argentina scored a trio of goals in the last 15 minutes. The final score was 3-2.\nMessi scored in the 83rd minute, keeping him in the race for the Golden Boot, given to the World Cup's top scorer.\nThe broadcasters calling the match described the thriller between Argentina and Egypt as \"a game for the ages\" and \"one of the great World Cup games.\"\nThe round of 16 matchup in Atlanta saw Egypt surprise the defending champions early on, jumping out to an early lead with a 15th minute goal from Yasser Ibrahim.\nThe upset seemed to further take shape when Egypt's Mostafa Ziko added on another goal in the 67th minute. Prior to the second goal, another Egyptian goal was disallowed for a foul at the start of the play.\nArgentina began to mount their counter attack with a 79th minute goal from Cristian Romero followed by Messi's 83rd minute goal, and finally a stoppage time goal for Enzo Fernández to improbably lift Argentina over Egypt in a miraculous comeback.\nMessi appeared to become emotional on the pitch following the match, according to ESPN.\nThe thrilling result is the second time in as many matches that Argentina narrowly avoided defeat. On Friday, Argentina defeated tournament long-shot Cape Verde in extra time, by the same score of 3 to 2.\nThe defending champions now move on to the quarterfinals where they will play the winner of Switzerland and Colombia. That match will take place on July 11 at 9 p.m. ET.", "translation_ja": "「時代に残る一戦」：メッシとアルゼンチン、W杯スリラーでエジプトに逆転劇\n\nリオネル・メッシが火曜日、エジプト戦で終盤に3連続ゴールをアルゼンチンに導き、ディフェンディングチャンピオンをFIFAワールドカップ連覇へまた一歩近づけた。\n\nエジプトは試合の80分近くまで2対0とリードを保っていたが、アルゼンチンは残り15分で3ゴールを決めた。最終スコアは3対2だった。\n\nメッシは83分にゴールを決め、ワールドカップの最多得点者に贈られるゴールデンブーツ争いに残り続けている。\n\n試合の実況を担当した放送陣は、アルゼンチン対エジプトのスリラーを「時代に残る一戦」「偉大なワールドカップの試合のひとつ」と表現した。\n\nアトランタで行われた決勝トーナメント1回戦では、エジプトがディフェンディングチャンピオンを早々に驚かせ、15分にヤセル・イブラヒムのゴールで先制した。\n\nエジプトのモスタファ・ジコが67分にゴールを追加したことで、番狂わせはさらに現実味を帯びてきた。2点目の前にもエジプトのゴールがあったが、プレー開始時のファウルにより取り消された。\n\nアルゼンチンは79分にクリスティアン・ロメロがゴールを決めて反撃を開始し、続いてメッシが83分に得点、そして最後はエンソ・フェルナンデスがアディショナルタイムにゴールを決め、信じられないような逆転劇でアルゼンチンがエジプトを奇跡的に下した。\n\nESPNによると、メッシは試合後にピッチ上で感情的になった様子だったという。\n\nこの劇的な結果は、アルゼンチンが2試合連続で辛くも敗戦を免れた2度目のことである。金曜日、アルゼンチンは同じく3対2のスコアで延長戦の末にトーナメントのダークホース、カーボベルデを下している。\n\nディフェンディングチャンピオンは準々決勝に進出し、スイスとコロンビアの勝者と対戦する。その試合は7月11日午後9時（東部標準時）に行われる予定だ。", "vocab": [{"word": "unanswered", "definition": "スポーツの文脈で「相手に得点を許さないまま連続して得点すること」を意味する。例：「three unanswered goals（3連続無失点ゴール）」のように使われる。"}, {"word": "improbably", "definition": "「ありそうもない形で、信じがたいことに」という意味の副詞。予想外の結果や出来事を強調する際に使われる上級表現。"}, {"word": "disallowed", "definition": "スポーツや法律の文脈で「無効とされた、認められなかった」を意味する。ゴールやポイントが規則違反により取り消される場合に使われる。"}, {"word": "stoppage time", "definition": "サッカーにおける「アディショナルタイム（ロスタイム）」のことで、試合中の中断によって失われた時間を補うために追加される時間を指す専門用語。"}, {"word": "mount", "definition": "「（攻撃・反撃などを）仕掛ける、組み立てる」という意味の動詞で、「mount a comeback（逆転を試みる）」や「mount an attack（攻撃を仕掛ける）」のように使われる。"}, {"word": "long-shot", "definition": "「成功の見込みが薄いもの、大穴」を意味するイディオム。スポーツや競争の文脈で優勝候補でないチームや人物を指す際に使われる。"}, {"word": "contention", "definition": "「争い、競争、候補」を意味する名詞で、「in contention for～（～を争う立場にある）」という形で競争や争いの中に残っていることを表す上級表現。"}]}, {"title_ja": "ABCニュースライブ：24時間365日のbreaking newsと生中継", "title_en": "ABC News Live: 24/7 Breaking News and Live Event Coverage", "summary_ja": "ABCニュースライブは、速報ニュースや生放送イベントを24時間365日途切れなく配信するストリーミングサービスです。国内外の主要な出来事をリアルタイムで伝え、視聴者はいつでも最新情報にアクセスできます。ABCニュースの特派員やアンカーによる中断のないライブ報道を提供しています。", "summary_en": "ABC News Live provides continuous, around-the-clock coverage of breaking news and live events. The stream delivers real-time updates on major national and international developments as they unfold. Viewers can access uninterrupted live journalism from ABC News correspondents and anchors at any time.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "マンハッタン・ミッドタウンのビル、梁の座屈で部分崩壊の恐れ―複数ブロックを避難", "title_en": "Midtown Manhattan Building at Risk of Partial Collapse After Structural Beams Found Buckling", "summary_ja": "火曜日の朝、マンハッタン・ミッドタウンの235番地イースト42丁目にあるビルの21階で構造支持梁の座屈が発見され、周辺数ブロックが避難措置となった。同ビルはかつてのファイザー本社で、現在住宅への転換工事中であり、21〜26階にかけて圧力による沈下が始まっていると当局が発表した。建物の動きは続いていたが、午後3時頃に技術者チームが内部に入り安全確認を開始し、負傷者は報告されていない。", "summary_en": "Several blocks in Midtown Manhattan were evacuated Tuesday after construction workers discovered structural support beams buckling on the 21st floor of 235 E. 42nd Street, a former Pfizer headquarters being converted into residential housing. The building continued to move, raising fears of a partial collapse across floors 21 through 26, though a full street-level collapse was considered less likely. No injuries were reported, and a team of engineers entered the building around 3 p.m. to assess conditions.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/US/midtown-manhattan-blocks-evacuated-after-beams-found-buckling/story?id=134549272", "state_media": false, "category": "社会", "full_text": "Midtown Manhattan buildings evacuated after beams found buckling at construction site: Police\nThe building has continued to move, according to fire department officials.\nSeveral Midtown Manhattan blocks were evacuated Tuesday morning after construction workers discovered the structure of a massive office building being converted into residential housing was compromised on the 21st floor, officials said.\nThe building at 235 E. 42nd Street has continued to move as engineers and first responders work to secure the site, with fears there could be a partial collapse, officials said at a press conference.\nThe city established a frozen zone for several blocks surrounding the building following the 911 calls that were made around 8:00 a.m. after workers \"observed structural support beams beginning to buckle,\" the NYPD said.\nThat caused the 21st through 26th floors of the building to start caving under the stress, officials from FDNY and the city's Department of Buildings said.\nThe fear, officials said, is a partial collapse, which could be internal. A full collapse onto the street is less likely, Fire Chief John Esposito said at Tuesday's news conference.\n\"The building has continued to move since we have been on scene,\" Esposito told reporters. \"It does mean it is not yet stable.\"\nEsposito said that when first responders arrived, the building had moved, but a city official told ABC News around 2:45 p.m. that the building had not moved for two hours.\nA team of six people was able to enter the building around 3 p.m. to determine if it was safe to begin shoring efforts, according to the official.\nThere were no reported injuries and all construction workers were safely evacuated, according to police.\nStructural engineers monitored the building's movement from the outside, New York City Buildings Commissioner Ahmed Tigani told reporters.\n\"There is extensive work going on now to evaluate the situation,\" he said.\nNew York City Mayor Zohran Mamdani said that a frozen zone was set up between 40th and 45th Streets and 1st and 3rd Avenues. Those streets are closed to both pedestrian and vehicular traffic.\nThe 37-story commercial building, formerly the Pfizer headquarters, is currently undergoing renovations to convert it into a residential building, according to the DOB. It is one of the largest office-to-apartment conversion projects in city history, officials said.\nMetro Loft, the developer of the conversion project, said in a statement that it is working with the Department of Buildings as it investigates the situation.\n\"The safety of our workers and the public has always been, and remains, our top priority,\" the developer said.\nThis building has seven violations between July and December 2025, resulting in more than $32,000 in fines issued, according to DOB records.\nThe mayor said that seven other buildings near 235 East 42nd Street were also evacuated, including a nearby Hampton Inn, according to officials.\nMamdani said at an unrelated news conference earlier Tuesday morning that among the evacuated locations was a school with 400 students.\n\"I want to be honest with New Yorkers that this is a fast-developing situation. We are taking it minute by minute,\" he told reporters.\nThe mayor added that the people living and working in the frozen zone will get updates and thanked them for cooperating with the evacuations.\nGov. Kathy Hochul released a statement, saying she is in contact with city officials and state building inspectors are also on the scene.\nABC News' Nicole Katchis and Tonya Simpson contributed to this report.", "translation_ja": "ミッドタウン・マンハッタンのビル、建設現場で梁の座屈が発見され避難措置\n\nビルは依然として動き続けていると消防当局が発表。\n\n火曜日の朝、建設作業員が巨大なオフィスビルの住宅への転換工事中に21階部分の構造が損なわれていることを発見し、マンハッタン・ミッドタウンの複数ブロックが避難措置となった、と当局が発表した。\n\n235 E. 42丁目に位置するこのビルは、エンジニアと救急隊員が現場の安全確保に取り組む中でも動き続けており、当局は
