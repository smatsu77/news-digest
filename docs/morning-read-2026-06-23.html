s://www.bbc.co.uk/news/articles/c3vy3nr63gxo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "国連調査委員会、イスラエルがガザで子どもを標的にした「ジェノサイド」と認定", "title_en": "UN Inquiry: Israel Committing Genocide Against Palestinian Children in Gaza", "summary_ja": "国連の独立調査委員会は、イスラエルがガザのパレスチナ人の子どもたちを意図的に標的にしており、ジェノサイドや人道に対する罪、戦争犯罪に当たると結論付けた。報告書は、精密兵器による射殺、病院への攻撃、飢餓の戦術的利用、未成年者の拘禁・拷問などを指摘している。イスラエル外務省は報告書を「中傷的なでたらめ」として強く否定した。", "summary_en": "A UN commission of inquiry has concluded that Israel has deliberately targeted Palestinian children in Gaza, constituting genocide, crimes against humanity, and war crimes. The report cites shootings with precision weapons, attacks on hospitals, use of starvation as a war method, and detention and torture of minors. Israel's foreign ministry rejected the report as a 'libellous sham,' while the commission noted killings have continued even after the October 2025 ceasefire.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c0jy96w6pw2o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "記録的熱波がヨーロッパを直撃、各国が最高レベルの警戒警報を発令", "title_en": "Europe on Red Alert as Record-Breaking Heatwave Grips Continent", "summary_ja": "2026年6月、フランス、スペイン、イタリア、イギリスなど西ヨーロッパ各地で気温が40度を超える記録的な熱波が発生し、複数の国が最高レベルの熱波警報を発令した。フランスでは先週木曜日以降約40人が溺死し、ドイツでも週末に複数の溺死者が確認されるなど、暑さを避けようとした人々による水難事故が相次いでいる。国連のグテーレス事務総長は、化石燃料への依存と気候変動が今回のような極端な高温現象をより頻繁かつ深刻にしていると警告した。", "summary_en": "A severe heatwave is sweeping across Western Europe in June 2026, with temperatures exceeding 40°C in France, Spain, Italy, and the UK, prompting the highest-level heat alerts in multiple countries. Dozens of people have drowned in France and Germany as residents seek relief in unauthorized swimming areas, and two children were found dead in a car in France. UN Secretary-General António Guterres warned that climate change and fossil fuel dependence are driving increasingly intense and deadly heat events.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/europe-on-red-alert-for-record-breaking-heat/live-77663026?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "トルコ、NATO首脳会議前に200人超を逮捕――テロ組織関係者を標的に一斉摘発", "title_en": "Turkey arrests over 200 suspects in security crackdown ahead of NATO summit in Ankara", "summary_ja": "トルコの治安当局は火曜日、イスラム国（IS）やDHKP-Cのメンバーとみられる容疑者209人を拘束した。7月7〜8日にアンカラで開催されるNATO首脳会議にはトランプ米大統領を含む32カ国の首脳が参加予定で、トルコ政府は警備強化を進めている。当局は6月28日からデモを禁止し、会議場や代表団宿泊ホテル周辺を封鎖する方針を発表した。", "summary_en": "Turkish security forces detained 209 people out of 241 issued arrest warrants on Tuesday, targeting suspected members of ISIS and the DHKP-C ahead of the NATO summit. NATO leaders, including US President Donald Trump, are expected to gather in Ankara on July 7-8. Turkey has announced a ban on public demonstrations starting June 28 and will seal off roads and areas around summit venues as part of heightened security measures.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/turkey-arrests-more-than-200-in-crackdown-before-nato-summit/a-77669771?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "欧州の防衛強化に現実の壁――支出急増も構造的課題が浮き彫りに", "title_en": "Europe's Defense Ambitions Face Reality Check Amid Spending Surge and Structural Gaps", "summary_ja": "欧州のNATO加盟国は2025年に過去最高の5590億ドルを国防費に投じたが、ウクライナ侵攻や米国の安全保障コミットメントへの不安が背景にある。しかし、仏独共同次世代戦闘機「FCAS」計画が破綻するなど、野心と成果の間には大きな乖離が残る。専門家は、問題は資金不足ではなく、国家間の調整不足や国内優先主義、意思決定の遅さといった制度的欠陥にあると指摘している。", "summary_en": "European NATO members spent a record $559 billion on defense in 2025, driven by Russia's invasion of Ukraine and uncertainty over US security commitments. However, a significant gap persists between ambition and outcomes, as weapons makers struggle to ramp up production and high-profile joint projects like the Franco-German FCAS fighter jet have collapsed. Experts say the core problem is not funding but institutional fragmentation, national protectionism, and slow procurement processes.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/europe-s-defense-ambitions-get-reality-check/a-77650976?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "NATO事務総長マルク・ルッテ、予測不能なトランプ氏にどう対処するか", "title_en": "How NATO's Mark Rutte Navigates an Unpredictable Trump", "summary_ja": "NATO事務総長マルク・ルッテはワシントンへ向かっており、トランプ政権復帰による同盟の不確実性に直面している。ルッテの外交スタイルは、予測不能な米大統領をなだめることを意図しているが、同盟維持を彼に頼るヨーロッパ首脳らをしばしば苛立たせてきた。大西洋同盟の結束を保つための繊細なバランス外交が求められている。", "summary_en": "NATO Secretary General Mark Rutte is traveling to Washington as the alliance faces uncertainty under a returning Trump administration. Rutte's diplomatic style, aimed at managing the unpredictable U.S. president, has at times frustrated European leaders who depend on him to keep the alliance unified. His approach reflects the delicate balancing act required to maintain transatlantic cohesion.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/23/world/europe/mark-rutte-nato-trump.html", "state_media": false, "category": "政治"}, {"title_ja": "スターマー首相の後継者バーナム氏、英国の難題を克服できるか", "title_en": "Could Andy Burnham Succeed Where Starmer Failed as UK's Next Labour Leader?", "summary_ja": "アンディ・バーナム氏は、キア・スターマー首相の有力な後継者と広く見なされている。しかし彼が引き継ぐのは、経済停滞とポピュリズムの台頭という深刻な課題を抱えた分断された英国だ。疲弊した国民が新たなリーダーに十分な時間と信頼を与える準備ができているかどうかが、最大の焦点となっている。", "summary_en": "Andy Burnham is widely seen as the likely successor to Prime Minister Keir Starmer, should Starmer fall from power. He would inherit a deeply divided Britain grappling with economic stagnation and rising populism. The central question is whether a fractured nation would grant him the time and goodwill needed to chart a different course.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/23/world/europe/uk-burnham-starmer-politics.html", "state_media": false, "category": "政治"}, {"title_ja": "イラン、ホルムズ海峡の支配強化へ―通航料徴収も検討", "title_en": "Iran Moves to Assert Control Over Strait of Hormuz, May Charge Transit Fees", "summary_ja": "イランは、世界の石油輸送の要衝であるホルムズ海峡への支配を強める動きを見せている。これまで同海峡を危険な状態にすることで事実上の「武器化」を図ってきたイランが、今度は通過船舶から通航料を徴収することを検討しているという。専門家たちは、これがイランによる重要海上交通路の戦略的利用における重大な方針転換であると警告している。", "summary_en": "Iran is escalating its efforts to control the Strait of Hormuz, a vital global waterway. After previously weaponizing the strait by making it too dangerous for commercial shipping, Iran is now reportedly considering charging fees to vessels seeking to pass through. Experts warn this marks a significant shift in Iran's strategy to leverage one of the world's most critical maritime chokepoints.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/23/world/middleeast/iran-control-strait-of-hormuz.html", "state_media": false, "category": "社会"}, {"title_ja": "人質交渉の行き詰まり打開後、パレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を分断する軍事ゾーンの通過を避難民のパレスチナ人に許可し、北部への帰還が始まった。この措置は、人質解放をめぐる交渉の行き詰まりが打開されたことを受けて実施された。多くのガザ市民を南部に留め置いていた移動制限が緩和される重要な転換点となっている。", "summary_en": "Israel permitted displaced Palestinians to cross a military zone dividing Gaza, allowing them to return to the northern part of the enclave on foot. The move came after a deadlock over hostage releases was resolved. The development marks a significant shift in movement restrictions that had confined many Gazans to the south.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治"}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Property Sector Crisis", "summary_ja": "中国大手不動産開発会社の万科（Vanke）が巨額の損失を報告し、中国の不動産危機が引き続き拡大していることが浮き彫りとなった。万科の経営難は、不動産セクター全体の健全性に対する深刻な懸念を呼び起こしている。中国政府が事態悪化を防ぐために介入するかどうかが、市場関係者の間で注目されている。", "summary_en": "Vanke, one of China's leading property developers, has reported a massive financial loss, signaling that the country's real estate crisis continues to widen. The troubles at Vanke raise serious questions about the broader health of China's property sector. Observers are watching closely to see whether the Chinese state will intervene to prevent further deterioration.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会"}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が今も体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による破片が今も残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性は長期間にわたり単独で拘束され、約8か月間を地下トンネルの中で過ごしたという。この事実は、人質たちが受けた深刻な肉体的・精神的被害を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The findings highlight the severe physical and psychological toll endured by those held captive in Gaza.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会"}, {"title_ja": "ケニア保健相、法廷侮辱を受け米国エボラ施設の建設中止を命令", "title_en": "Kenyan Minister Halts US Ebola Quarantine Facility After Contempt Ruling", "summary_ja": "ケニアのアデン・ドゥアレ保健相は、以前の工事停止命令を無視したとして法廷侮辱罪に問われた後、ライキピア空軍基地で建設中の米国運営エボラ隔離施設の即時・完全停止を命じた。この施設はエボラ出血熱が流行するコンゴ民主共和国から避難した米国市民を隔離するために計画されたもので、3人が死亡する抗議活動を引き起こしている。米国は1350万ドルの支援を約束しているが、批評家たちは公開協議の欠如と植民地主義的な側面を問題視している。", "summary_en": "Kenya's Health Minister Aden Duale has ordered an immediate halt to construction of a US-run Ebola quarantine facility at Laikipia air base after being held in contempt of court for ignoring a previous stop-work order. The facility, intended to isolate US citizens evacuated from Ebola-stricken DR Congo, has sparked deadly protests that have killed three people. Critics argue the arrangement lacks public consultation and carries colonial overtones, despite a US pledge of $13.5 million for Kenya's Ebola preparedness.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/23/kenya-minister-orders-halt-us-ebola-facility", "state_media": false, "category": "政治"}, {"title_ja": "世界最大のウルトラマラソン「コムレーズ」に2万人が挑戦", "title_en": "20,000 Runners Take On Comrades, the World's Largest Ultramarathon", "summary_ja": "6月14日、南アフリカのダーバンで世界最古かつ最大のウルトラマラソン「コムレーズ・マラソン」が開催され、2万人以上のランナーが約88kmのコースに臨んだ。1921年に白人男性34人で始まったこのレースは、1975年に人種・性別の制限が撤廃され、今や南アフリカ社会に深く根付いた国民的行事となっている。離婚後のうつ状態を乗り越えるために走り始めたウィリアム・セレカのように、参加者それぞれが切実な理由を胸にスタートラインに立っている。", "summary_en": "Over 20,000 runners gathered in Durban on June 14 for the Comrades Marathon, the world's oldest and largest ultramarathon covering roughly 55 miles to Pietermaritzburg. The race, which began in 1921 with 34 white men, was desegregated in 1975 and has since become a cornerstone of South African life, drawing participants from all walks of life. Personal stories like that of William Seleka, who took up running to cope with depression after his divorce, reflect the deeply human motivations behind the grueling 12-hour challenge.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/21/comrades-ultramarathon-south-africa", "state_media": false, "category": "社会"}, {"title_ja": "ガーナ会議、大西洋奴隷貿易への正式謝罪を求めるグローバル枠組みを採択", "title_en": "Ghana Conference Adopts Global Framework Demanding Formal Apologies for Transatlantic Slave Trade", "summary_ja": "ガーナの首都アクラで開催された3日間の国際会議で、賠償的正義に関する19項目のグローバル枠組みが採択され、アフリカ・カリブ海諸国の指導者たちが大西洋奴隷貿易で利益を得た国々に正式な謝罪を求めた。枠組みには補償、債務救済、文化財の返還なども盛り込まれている。ガーナのマハマ大統領はまた、アフリカ人の奴隷化を人道に対する最も重大な犯罪と認定した国連決議を受け、賠償推進のための3つの国際専門委員会の設立を発表した。", "summary_en": "A global framework for reparatory justice was adopted at a three-day conference in Accra, Ghana, with African and Caribbean leaders calling for formal apologies from nations that benefited from the transatlantic slave trade. The 19-point framework includes demands for compensation, debt relief, and the return of cultural property to countries of origin. Ghana's President John Mahama also announced three international panels to advance reparations efforts, following a landmark UN resolution recognizing the enslavement of Africans as the gravest crime against humanity.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/news/2026/jun/19/global-framework-reparations-justice-adopted-at-landmark-conference-in-accra-ghana", "state_media": false, "category": "政治"}, {"title_ja": "権威主義国家が台頭する新たな国際調停の時代", "title_en": "Autocracies Are Reshaping Global Conflict Mediation", "summary_ja": "民主主義国家に代わり、権威主義体制の国々が国際紛争の調停役として存在感を高めている。これらの国が仲介する和平合意は、従来の西側主導による調停とは内容や優先事項が大きく異なる。こうした変化は、合意の長期的な持続可能性や公正性に対する懸念を生んでいる。", "summary_en": "Authoritarian regimes are increasingly stepping into the role of international peacemakers, displacing traditional democratic mediators. The deals being brokered by these autocracies differ markedly in structure and priorities from those historically facilitated by Western-led institutions. This shift raises questions about the long-term durability and fairness of the agreements produced.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会"}, {"title_ja": "アジアの同盟国はトランプ大統領と緊密な関係を維持するしかない", "title_en": "Asian Allies Have No Choice But to Embrace Trump", "summary_ja": "日本をはじめとするアジア諸国は、中国に対抗するための中規模国家連合を形成する構想を事実上断念しつつある。トランプ氏の指導力に懸念を抱きながらも、アメリカの軍事的抑止力が地域の安全保障において不可欠であることをこれらの国々は認識している。その結果、外交的な困難が伴うとしても、アジアの同盟国はワシントンとの緊密な関係を維持せざるを得ない状況に置かれている。", "summary_en": "Japan and other Asian nations are abandoning hopes of forming independent middle-power coalitions to counterbalance China. Despite reservations about Donald Trump, these countries recognize that American military deterrence remains irreplaceable in the region. As a result, they are compelled to maintain close ties with Washington regardless of the diplomatic complications Trump's leadership presents.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会"}, {"title_ja": "ワールドカップ制覇の秘訣：富よりも移民受け入れが鍵", "title_en": "How to Win the World Cup: Wealth Helps, but Immigration Helps More", "summary_ja": "新たな分析によると、国の経済力はワールドカップでの成功に有利に働くが、移民に対する開放性はさらに強力な成功要因であることが示された。外国生まれの選手を積極的に受け入れ、多様な人材を活用する国は、富裕でも閉鎖的なライバルを上回る傾向がある。この知見は、強い代表チームを作るために何が必要かという従来の常識に疑問を投げかけるものだ。", "summary_en": "A new analysis suggests that national wealth gives countries an advantage in World Cup competition, but openness to immigration proves to be an even stronger predictor of success. Nations that welcome foreign-born players and draw on diverse talent pools tend to outperform richer but more insular rivals. The findings challenge traditional assumptions about what it takes to build a winning national football team.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/10/how-to-win-the-world-cup", "state_media": false, "category": "社会"}, {"title_ja": "フランス、観測史上最高気温を更新する4日間の記録的熱波に直面", "title_en": "France Faces Unprecedented Heatwave With Four Record-Breaking Days Expected", "summary_ja": "フランスは、気象当局が「観測史上最も暑い4日間」になると警告する前例のない熱波に備えている。この熱波は同国の気候史における重大な節目となり、公衆衛生やインフラへの深刻な影響が懸念されている。当局は市民に対し、記録的な高温に備えた対策を講じるよう呼びかけている。", "summary_en": "France is bracing for an extreme heatwave that meteorologists warn could produce four of the hottest days ever recorded in the country's history. The event signals a significant climate milestone for the nation, raising urgent concerns about public health, infrastructure, and emergency preparedness. Authorities are urging residents to take precautions as temperatures are expected to reach historic highs.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/article/2026/06/23/france-faces-unprecedented-heatwave-we-are-about-to-experience-four-of-the-hottest-days-ever-recorded-in-the-country_6754769_114.html", "state_media": false, "category": "社会"}, {"title_ja": "ブレグジットから10年、英国とEUは関係修復に苦闘", "title_en": "Ten Years After Brexit, UK and Europe Struggle to Revive Relations", "summary_ja": "ブレグジットから10年が経過した現在も、英国と欧州連合（EU）は二国間関係の再構築に大きな困難を抱えている。歴史的な離脱がもたらした長期的影響の中で、外交・貿易関係は依然として緊張した状態が続いている。関係強化に向けた取り組みは遅々として進まず、主要な対立点は未解決のままとなっている。", "summary_en": "A decade after Brexit, the United Kingdom and the European Union continue to face significant challenges in rebuilding their bilateral relationship. Diplomatic and trade ties remain strained as both sides navigate the long-term consequences of the historic split. Efforts toward closer cooperation have progressed slowly, with key disagreements still unresolved.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/23/ten-years-after-brexit-uk-and-europe-struggle-to-revive-relations_6754786_4.html", "state_media": false, "category": "社会"}, {"title_ja": "マルク・ブロック：ナチス占領軍だけでなくフランス国家からも迫害された歴史家", "title_en": "Marc Bloch: Persecuted by Nazi Occupiers and the French State Alike", "summary_ja": "アナール学派の共同創設者である歴史家マルク・ブロックは、第二次世界大戦中にナチス占領軍だけでなく、ヴィシー・フランス政府からも迫害を受けた。ユダヤ人であったブロックは、フランス政府が制定した反ユダヤ法により大学の職を追われた。その後フランス・レジスタンスに加わったが、1944年にゲシュタポに捕らえられ処刑された。", "summary_en": "Historian Marc Bloch, co-founder of the Annales school of history, faced persecution not only from Nazi occupiers during World War II but also from the Vichy French state. Bloch, who was Jewish, was dismissed from his university post under antisemitic laws enacted by the French government. He later joined the French Resistance and was captured and executed by the Gestapo in 1944.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/opinion/article/2026/06/23/marc-bloch-was-persecuted-not-only-by-the-nazi-occupiers-but-also-by-the-french-state_6754774_23.html", "state_media": false, "category": "政治"}, {"title_ja": "イスラエル軍がレバノンで2人を殺害、ヒズボラは停戦違反と非難", "title_en": "Israeli Fire Kills Two in Lebanon, Hezbollah Calls It Truce Violation", "summary_ja": "イスラエル軍がレバノン南部のナバティエ近郊で発砲し、道路の障害物除去作業中だった男性2人が死亡した。これは3日ぶりとなるイスラエルの砲火による死者で、日曜日から概ね維持されてきた米国仲介の停戦合意を脅かしている。ヒズボラはこの攻撃を停戦の「露骨な違反」と非難し、同様の報復を行う準備があると警告した。一方、ワシントンではイスラエルとレバノンの米国仲介による新たな交渉が始まった。", "summary_en": "Israeli troops opened fire in southern Lebanon, killing two men near Nabatieh who were working to unblock a road, marking the first reported deaths from Israeli fire in three days. Hezbollah condemned the attack as a 'blatant' violation of the US-brokered ceasefire that has largely held since Sunday, warning it remains ready to retaliate 'in kind.' US-mediated talks between Israel and Lebanon resumed in Washington, with key disputes remaining over Israeli troop withdrawal and Hezbollah's weapons.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/23/israeli-fire-kills-two-in-lebanon-as-hezbollah-slams-truce-violation?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "ニューヨークでアラブ系ファンがワールドカップを祝って集結", "title_en": "Arab Fans Unite in New York to Celebrate World Cup Results", "summary_ja": "2026年ワールドカップで、アラブ系ファンたちがニューヨークに集まり、すべてのアラブ代表チームへの連帯と支持を示した。勝敗にかかわらず全アラブチームを応援するという姿勢が、参加者たちから表明された。この集まりはアラブ諸国の団結と地域コミュニティの誇りを象徴するものとなった。", "summary_en": "Arab fans gathered in New York City to celebrate and show solidarity with all Arab teams competing at the 2026 World Cup. Supporters expressed unconditional backing for every Arab nation, regardless of match outcomes. The gathering reflected a strong sense of pan-Arab unity and community pride during the tournament.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/6/23/arab-fans-celebrate-world-cup-results-in-new-york?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "国連調査委員会：イスラエルによるガザのパレスチナ人の子どもへの攻撃はジェノサイドに当たる", "title_en": "UN Inquiry: Israel Targeting Palestinian Children Amounts to Genocide, War Crimes in Gaza", "summary_ja": "国連調査委員会は、イスラエルがガザでパレスチナ人の子どもを組織的に標的にしており、その行為がジェノサイド、戦争犯罪および人道に対する罪に該当すると断定した。報告書によれば、2023年10月の戦争開始以降に死亡した人のうち約30％が子どもであり、産科・新生児病棟への攻撃や援助封鎖が子どもたちの生存機会を著しく損なっている。ユニセフは2025年10月の停戦後も毎日少なくとも1人の子どもが殺害されており、開戦以来5万人以上の子どもが死亡または負傷したと推計している。", "summary_en": "A UN commission of inquiry has accused Israel of systematically targeting Palestinian children in Gaza, concluding that its actions constitute genocide, war crimes, and crimes against humanity. The report states roughly 30 percent of those killed since October 2023 were children, with attacks on maternity wards, an aid blockade, and destruction of schools and orphanages devastating child survival. UNICEF estimates over 50,000 Palestinian children have been killed or wounded, with at least one child killed daily even after the October 2025 ceasefire.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/gallery/2026/6/23/palestinian-children-face-genocide-war-crimes-in-gaza-un-says?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "ネタニヤフ首相がレバノン情勢で虚偽の説明、トランプ政権はイラン交渉でイスラエルを排除", "title_en": "Netanyahu Pushes False Narrative on Lebanon as Trump Sidelines Israel in Iran Talks", "summary_ja": "イスラエルのネタニヤフ首相がレバノン情勢について実態とかけ離れた説明を行っていると、ハアレツ紙の分析が指摘している。同時に、トランプ政権はイランとの交渉においてイスラエルを蚊帳の外に置いているとされる。この二重の展開は、イスラエルが北部戦線と米国主導の外交交渉の両面で影響力を失いつつあることへの懸念を高めている。", "summary_en": "Israeli Prime Minister Netanyahu is accused of presenting a fictional account of the situation in Lebanon, according to a Haaretz analysis. Simultaneously, the Trump administration appears to be marginalizing Israel in ongoing negotiations with Iran. The dual development raises questions about Israel's influence over both its northern front and broader U.S.-led diplomatic efforts in the region.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiogJBVV95cUxNb2I5T3BMZ3d1UEl4bDd5S0loUzJVbWVYcm12bEhJd2gzTU5xVXd4d1JVYWFtemdnREZ1T19SZmR3ZnBqRE0xYUlYZDF4Z2lVbEtNODJqZzRUazZzLU91N0hiMndEOWNpZTFsS1V0UXE2OHZZZjg5a3BmR1EtR3h3Wlc2ckhtbHJVZlNuemVtWTFqSlE0aVU2YnZNc3EwbTVNU21NYk1sUUxSZ0hwX1RlMnZvM1lrQjZ3UzhkeXVLbnRodndVaDJnYnQ2WFZNY0IyZl84R0dpNzI4RTVOVEl4bXlHV1RVTWxabGpaRmU3VUFVRWNXRDZIcVdsWjBSejVONVFyYV9zXy1DMzNGSXJMZ0pSNk04d1ZrWDdtbXQ4Smd6Zw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "フロリダ州で米国・イスラエル二重国籍者が連邦ヘイトクライム罪で起訴", "title_en": "Dual U.S.-Israeli Citizen Arraigned on Federal Hate Crime Charges in Florida", "summary_ja": "米国とイスラエルの二重国籍を持つ人物が、フロリダ州で連邦ヘイトクライム罪により起訴された。イスラエル紙ハアレツがこの事件を報じたが、被告の詳細や犯行の具体的内容は明らかにされていない。米国の連邦ヘイトクライム法に基づく起訴は、重大な刑事罰を伴う可能性がある。", "summary_en": "A dual U.S.-Israeli citizen has been arraigned on federal hate crime charges in Florida. The case was reported by Haaretz, though specific details about the nature of the alleged crimes and the defendant's identity were not fully disclosed in the excerpt. Federal hate crime charges carry significant penalties under U.S. law.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihgJBVV95cUxPNzdIMjJ0d1ZiWk8wR1hCVGJKOElWNktwLWc3U3Jpd184VElaTW5nZEMzWnlrbEdUSGJTLTcyQjBDNGhpN0xrMFpQOVJOQkh3bFdvZUZCQlpTQmZXQkc5OF9scG1INUJkMXRJb1J1N19Sb1dqbFVhZjBwNWtrYzR1UllQaGU4V0s1NXdtT2daMkZTOUZfRDljTUN0MHo2VVJDQW1nbHhmWl9CSE44eGVqdHVZZFAyT2pwQ0RuUXk1dGlVLWtQbGt6Vlc0VlM4d0tyLVFGQ21JT3hGZVhnRXFPSExkV0hyRzhNR1FMRUt4WDYtYVhxSzg5SWJFVmg0TUw2dnNYWm5B?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "モントリオールのユダヤ人街で銃撃事件、射手含む3人死亡", "title_en": "Three Killed Including Gunman in Shooting in Montreal Jewish Neighborhood", "summary_ja": "カナダのモントリオールにあるユダヤ人居住区で銃撃事件が発生し、射手を含む3人が死亡した。イスラエル紙ハアレツが報じた。当局は事件の詳細について調査を進めている。", "summary_en": "A shooting in a Jewish neighborhood of Montreal resulted in three deaths, including the gunman. The incident was reported by Haaretz. Authorities are investigating the circumstances of the attack.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi-gFBVV95cUxNOHJCUzRTZFh0TmJDakFMZ193MTc1Vjl5QjNVdWZvV1ZTOEp3Z2VzRXZETWVtYWFVV1YxVDV1eUR6S09PazVLa0l2QTRXYmtpdUdIT2s5UDdQX2Z2Y2dQaHcxT1ZaejhvbGgzMkNOS1ZGVDd5U3FoY3JIWkctWUFyY01kX1FaSjVySnVSQVFtdGFsc0VyX0g0bzhYWEFVUTROZkdHRXp6LWV3WGtrMUFhSS13V1Z6RGZ3ODFzOFc5MDdwYVB2dEtEZHV6U0NEeUNxZjdmTFFPX3B3QmZrZkVTc2dEaFdCSDhqNFAwMldDemEzck1MeF9ibjN3?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "国防省ニュースレター更新 – 2026年6月23日", "title_en": "Mindef Newsletter Update – June 23, 2026", "summary_ja": "シンガポール国防省（Mindef）は2026年6月23日火曜日、ストレーツ・タイムズを通じてニュースレターを配信した。このメールはメール形式で正常に表示されない場合はブラウザで閲覧するよう案内しており、購読管理のリンクも含まれている。公開されている抜粋には、具体的な政策発表や運用上の詳細は含まれていない。", "summary_en": "The Singapore Ministry of Defence (Mindef) issued a newsletter update on Tuesday, June 23, 2026, distributed via The Straits Times. The communication appears to be a standard email newsletter dispatch, with instructions for subscribers to manage their preferences or view the email in a browser if not displayed properly. No specific policy announcements or operational details were included in the available excerpt.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治"}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ", "title_en": "Evening Update – The Straits Times", "summary_ja": "ストレーツ・タイムズは2026年6月23日火曜日にイブニング・アップデートニュースレターを配信した。この日刊メールは、その日の主要ニュースをまとめて読者に届けるものである。購読者はストレーツ・タイムズのウェブサイトを通じて、ニュースレターの購読管理や追加の無料ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times published its Evening Update newsletter on Tuesday, June 23, 2026. The digest provides readers with a curated summary of the day's top news stories. Subscribers can manage their newsletter preferences or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治"}, {"title_ja": "モーニングブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニングブリーフィングは、読者に毎日のトップニュースをお届けするニュースレターです。今回取り上げられているのは2026年6月23日火曜日付けの号です。読者はストレーツ・タイムズのウェブサイトから購読管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a daily newsletter delivering top news updates to subscribers. The edition referenced appears to be from Tuesday, June 23, 2026. Readers can manage their subscription or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治"}, {"title_ja": "インドネシアのプルバヤ氏、信頼性と財政管理で試練に直面", "title_en": "Indonesia's Purbaya Faces Test of Credibility and Fiscal Management", "summary_ja": "インドネシアの政府高官プルバヤ氏が、その信頼性と財政管理能力において重大な試練に直面していると、ジャカルタ・ポスト紙が報じた。インドネシアの経済運営と公共財政ガバナンスに関する懸念が高まる中、同氏への注目が集まっている。市場関係者やステークホルダーは、同氏の財政政策運営を注視している。", "summary_en": "Indonesian official Purbaya is facing a significant test of his credibility and fiscal management capabilities, according to The Jakarta Post. The scrutiny comes amid broader concerns about Indonesia's economic stewardship and public financial governance. His performance in managing fiscal policy will be closely watched by markets and stakeholders.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqAFBVV95cUxPQlQyalZ6Z3JIekNSZ1NGU1FwelpJVEdGV1ExVW9uVTZGclZLMzhvdmlsTEtiOEwzdlQxNDlNaFA1c0NOc2lBMk0yUmlrbG95YS16Q3BDYVYwa2htNFNlbHV4NDU2MXRIaGlpSnRxMWFUcVNGRzd4a3lzR3MzOXlaV0RlZVBZdGFLRHQ1aFYzRlRlNnVqYzRIT3ZXVS1mQkFsTnk0QUN2NG8?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "私のすべて：ノンバイナリーになるための旅", "title_en": "All of Me: A Personal Journey of Becoming Nonbinary", "summary_ja": "ある人物が、伝統的な性別の枠を超えたノンバイナリーとしてのアイデンティティを持つ個人的な体験を語っている。自己発見と自分らしく生きることの難しさを、感情的・社会的な側面から深く掘り下げた内容となっている。厳格なジェンダー規範が残るインドネシア社会において、ノンバイナリーの視点を当事者が語る貴重な記事として、ジャカルタ・ポスト紙に掲載された。", "summary_en": "An individual shares their personal experience of identifying as nonbinary, exploring the emotional and social dimensions of stepping outside traditional gender categories. The piece reflects on self-discovery, identity, and the challenges of living authentically in a society with rigid gender norms. Published in The Jakarta Post, the story offers a rare first-person perspective on nonbinary identity in an Indonesian context.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqAFBVV95cUxPdHhRQmxQVEZWS2xlOHNfdlZ6SURkRDFsUWxxRlJ1eVpjaEJEbkp6S2Jrcm14bFFoMUNQRzV3MEd6anI0Y1dRVFlMMTJIbWRqRENEWEp3RlNLVkpRRmZJb3FMRmdUNjF1VlRMcldqNWVDc0VET0thb293ZnBLNWF4eWpqRXJXbzNHRC1rTDI3N2kyZVlCdTRlWE9Pc21Wa0NiQVN4WndiZWU?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "スラウェシの古代洞窟壁画、先史時代の芸術はヨーロッパだけではなかった", "title_en": "Sulawesi's Ancient Cave Art Challenges Europe's Monopoly on Prehistoric Creativity", "summary_ja": "インドネシアのスラウェシ島で発見された古代洞窟壁画が、先史時代の人類の創造性に関する通説を覆しつつある。これまでヨーロッパが先史時代芸術の発祥地とされてきたが、東南アジアでも独自に高度な芸術表現が生まれていたことが示された。この発見は、人類の認知・文化的進化に関するヨーロッパ中心的な見方に根本的な疑問を投げかけている。", "summary_en": "Recent discoveries of ancient cave art in Sulawesi, Indonesia, are reshaping our understanding of prehistoric human creativity. The findings suggest that early artistic expression was not exclusive to Europe, as long believed, but also flourished independently in Southeast Asia. This challenges the Eurocentric narrative of human cognitive and cultural evolution.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMitgFBVV95cUxQdE95UzFpM09BSDdSUV90b0Jxc3BUMHY4azRnRE1DWTZrSVl0QXcxeDJheHFWUFp5WmI4c3UwWU1UWTV1Y2E5czdsTmVxblFvV1V6a1htR2dHUU9VbzB0Q3h1dUlzV09HbkVuaUNGU0JZR2VINmI1RnpKOW1vanhzODBCZEtZWkhVU210SGZmTGw4RkRqUzBhMi1PQl9OVzUweG1mS0xXd3haX0c0VDBCOENEb1NmUQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "欧州を熱波が直撃、フランスで40人溺死―気温43℃超も", "title_en": "40 Drown in France as Heatwave Sweeps Europe, Temperatures Near 44°C", "summary_ja": "フランスでは6月18日以降、管理されていない水域での水泳中に少なくとも40人が溺死し、首相が警戒を呼びかけた。オメガブロックと呼ばれる気象パターンが西・中央欧州に熱ドームを形成し、フランスでは最高43℃、スペインでは44℃超が記録されている。英国、イタリア、スペイン、ベルギーでも学校閉鎖や交通障害が相次ぎ、世界気象機関は欧州の温暖化が世界平均の2倍以上のペースで進んでいると警告している。", "summary_en": "At least 40 people have drowned in unsupervised swimming areas in France since June 18 as a severe heatwave pushes temperatures toward 43°C across the country. An Omega block weather pattern is trapping a heat dome over western and central Europe, with Britain, Italy, Spain, and Belgium also recording extreme temperatures and disruptions to schools and transport. Climate change is intensifying such heatwaves, with Europe warming at more than twice the global average, according to the World Meteorological Organization.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/uk-weather-forecast-europe-heatwave/article71137255.ece", "state_media": false, "category": "社会"}, {"title_ja": "アンディ・バーナム：北部の王から次期英国首相候補へ", "title_en": "Andy Burnham: From Northern Mayor to Likely Next UK Prime Minister", "summary_ja": "キア・スターマー首相が6月に辞任したことを受け、マーカーフィールド補欠選挙で勝利したアンディ・バーナムが労働党の次期党首兼首相候補として急浮上している。ブレア・ブラウン両政権で閣僚を歴任したバーナムは、2017年にグレーター・マンチェスター市長に転身し、ロンドン中心の政治に対して北部の声を代弁してきた。市長として公共交通の地方分権化やコロナ禍における中央政府への対抗など、顕著な実績を残している。", "summary_en": "Following Keir Starmer's resignation as UK Prime Minister in June, Andy Burnham has emerged as the leading candidate to succeed him as Labour leader after winning a by-election in Makerfield. Burnham, who previously served in senior ministerial roles under Blair and Brown, made a pivotal career shift in 2017 by becoming Greater Manchester's Mayor, championing northern England against London-centric politics. As Mayor, he achieved notable successes including decentralising bus services and pushing back against Westminster during the COVID-19 pandemic.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/andy-burnham-the-king-in-the-north/article71136400.ece", "state_media": false, "category": "社会"}, {"title_ja": "高市早苗首相のグワハティ訪問が中止、会談はニューデリーに変更", "title_en": "Japanese PM Takaichi's Guwahati visit cancelled, meetings shifted to New Delhi", "summary_ja": "日本の高市早苗首相は、7月1日から3日のインド訪問において、当初予定されていたグワハティへの訪問を取りやめ、すべての会談をニューデリーで行うことになった。国会会期中による日程の逼迫と首都外訪問に伴う物流上の問題が理由とされている。グワハティ訪問はインド北東部における日本の「自由で開かれたインド太平洋」構想の重要性を示す目玉として計画されていたが、2019年の安倍晋三元首相のアッサム訪問中止に続く形となった。", "summary_en": "Japanese Prime Minister Sanae Takaichi will no longer visit Guwahati during her July 1-3 trip to India, with all scheduled meetings relocated to New Delhi due to her tight schedule and logistical constraints. The Guwahati leg had been planned as the centerpiece of the visit, intended to highlight Japan's strategic interest in India's northeastern region within the context of the Free and Open Indo-Pacific initiative. This follows a similar cancellation in 2019, when late PM Shinzo Abe's planned visit to Assam was called off amid protests over the Citizenship Amendment Act.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/national/japanese-pm-sanai-takaichis-guwahati-visit-cancelled-meetings-will-be-hosted-in-delhi/article71137181.ece", "state_media": false, "category": "政治"}, {"title_ja": "台湾、中国侵攻を想定した迅速対応演習を実施", "title_en": "Taiwan Conducts Quick Response Drill Simulating Chinese Invasion Scenario", "summary_ja": "台湾は中国による侵攻の可能性を想定した迅速対応軍事演習を実施している。この演習は、島の防衛態勢と迅速な動員能力を試験することを目的としている。台湾海峡の緊張が高まる中、こうした演習は台湾の防衛力強化に向けた継続的な取り組みの一環となっている。", "summary_en": "Taiwan is conducting a quick response military drill designed to simulate and prepare for a possible Chinese invasion. The exercise aims to test the island's defensive readiness and rapid mobilization capabilities. Such drills are part of Taiwan's ongoing efforts to strengthen its defense posture amid heightened cross-strait tensions.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE44eEhRdDdJZS1JaW5oSThoTmhhaHZBQmZDRmVtallHdkRhVXJBNXdPSnkxcWlPdU5hblhMSGxRcjlYb3pqNjN0ZHFXU09WQ3c0NzdadjRQQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾でMQ-9B「スカイガーディアン」無人機の試験運用が開始", "title_en": "Taiwan Begins Testing MQ-9B SkyGuardian Drone", "summary_ja": "関係筋によると、台湾でMQ-9B「スカイガーディアン」無人機の試験運用が開始された。この高高度長時間滞空型の無人航空機は、情報収集・監視・偵察任務に対応できる高性能機だ。台湾は防衛能力の強化を図る一環として、同機の評価試験を進めている。", "summary_en": "Taiwan has begun testing the MQ-9B SkyGuardian drone, according to a source familiar with the matter. The advanced unmanned aerial vehicle is being evaluated as part of Taiwan's ongoing efforts to bolster its defense capabilities. The MQ-9B is a high-altitude, long-endurance drone capable of intelligence, surveillance, and reconnaissance missions.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTFBZczFqSzVBSHUtN09KbDViLXhJSzdFMms1LTRFSE5RMmc5QXhfSzFXa3c3TjN2MzJjUlpzSC1YRkI1Qm9TNFhwQXBucnY1YWdtdGtxNXU0MA?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "野球チアリーダー、モデル撮影中に刃物で襲われるも生還", "title_en": "Baseball Cheerleader Survives Knife Attack During Modeling Gig", "summary_ja": "台湾で野球チアリーダーを務める女性が、モデルとしての仕事中に刃物による襲撃を受けたが、一命を取り留めた。被害者がスポーツ界で知名度の高い人物であることから、この事件は大きな注目を集めた。当局は事件の経緯について捜査を開始した。", "summary_en": "A baseball cheerleader in Taiwan survived a knife attack that occurred while she was working at a modeling event. The incident drew significant public attention due to the victim's profile as a well-known sports entertainer. Authorities launched an investigation into the attack and the circumstances surrounding the assault.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTFAxTVpFVnczNkYzbDFlbUh5SzBVQnJaZTROemtPQVZ1YWl1YTgzMlhjUUxfclhTOXRyc3FXR1p5T1NKN25jVnB3cHMxdmxyVUVSUHpGSzBR?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イタマラチー、トランプ氏の干渉を警戒―「ブラジルはベネズエラではない」", "title_en": "Itamaraty Fears Trump Interference but Insists Brazil Is Not Venezuela", "summary_ja": "ブラジルのルラ政権は、トランプ米大統領が次期選挙に干渉する可能性を注視しており、外交筋はその意図が次第に明確になっていると指摘している。トランプ氏はG7でブラジルの政治状況を「危険」と発言し、ボルソナロ一家を擁護したほか、ベネズエラのマドゥロ独裁者を拘束するなど南米への関与を強めている。政府内ではトランプ氏がルラ大統領への好意を示しつつボルソナロ家も支持するという矛盾したシグナルに対し、即時対応を求める声と慎重な分析を求める声が交錯している。", "summary_en": "Brazil's Lula administration is monitoring signs of U.S. President Donald Trump's potential interference in Brazil's upcoming elections, with diplomats noting his intentions are becoming increasingly apparent. Trump drew comparisons to Venezuela after capturing Nicolás Maduro and commenting on Brazil's political situation at the G7, where he defended the Bolsonaro family. While some government allies push for an immediate response, others urge caution given Trump's contradictory signals, including his stated personal affinity for Lula.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米当局、逮捕のブラジル人男性をPCC・CVの幹部と主張するも有罪判決に関連なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC, but Court Records Show No Gang Links", "summary_ja": "米移民・関税執行局（ICE）はノースカロライナ州でブラジル人のフェリペ・リナレス・デ・オリヴェイラ・デル・アキラを逮捕し、米国土安全保障省は同氏をブラジル最大の犯罪組織PCCとCVの「司令官」と称した。しかし、ブラジルでの麻薬密売・詐欺・恐喝に関する過去の有罪判決には、両組織への言及は一切ない。同氏はブラジルの要請に基づくインターポール手配の対象であり、妻を車内に監禁していた疑いがある中で交通検問で拘束された。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested by ICE in North Carolina, with US authorities labeling him a 'commander' of both the PCC and CV, Brazil's largest criminal organizations recently designated as terrorist groups by the US. However, his prior Brazilian convictions for drug trafficking, fraud, and extortion contain no mention of either gang. He was reportedly stopped during a traffic inspection while allegedly holding his wife inside the vehicle and was subject to an Interpol warrant issued at Brazil's request.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ブラジル、トランプ配慮で形骸化と批判しG7文書の大半に不参加", "title_en": "Brazil Splits From G7 Majority, Citing Trump-Shaped Texts That Sidelined Climate and WHO", "summary_ja": "ブラジルはフランス・エビアンで開催されたG7サミット2日目に発表された5つの文書のうち、2つにしか署名しなかった。ブラジル政府は、米国の参加を確保するためにトランプ大統領の拒否権を避ける形で文書が作成され、気候変動やWHOの役割などが意図的に省かれたと批判した。ブラジルはがんや麻薬密売に関する声明には賛同したが、マクロ経済の不均衡、移民、重要鉱物に関する文書は拒否する見通しだ。", "summary_en": "Brazil endorsed only two of five documents issued on the second day of the G7 summit in Évian, France, arguing the texts were deliberately weakened to secure U.S. participation under President Trump. Brasília rejected statements on international development and the Ebola outbreak, citing omissions on climate change, foreign debt, hunger, and the role of the WHO. Brazil did align on cancer and drug trafficking declarations, but is expected to reject texts on macroeconomic imbalances, migration, and critical minerals.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/brazil-diverges-from-most-g7-documents-says-texts-were-shaped-to-avoid-upsetting-trump.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ナイジェリア下院委員会、石油中流部門への監視強化を宣言", "title_en": "Nigeria House Committee Vows Tougher Oversight of Midstream Petroleum Sector", "summary_ja": "ナイジェリア下院の石油資源（中流）委員会は、ポートハーコートとラゴスで開催した研修会を経て、石油・ガス中流部門に対する立法監視を強化する方針を表明した。委員長のオディアノセン・オコジェ氏は、公式報告書に頼るだけでなく、議員が直接施設を視察する実践的なアプローチを採ると述べ、グリーンビルLNGへの追跡調査も予定されている。委員会はインドラマ石油化学を高く評価し、パイプライン・インフラストラクチャー・ナイジェリア社のインフラ保護への貢献にも称賛を送った。", "summary_en": "Nigeria's House of Representatives Committee on Petroleum Resources (Midstream) has pledged to intensify legislative oversight of the country's midstream oil and gas sector following retreats held in Port Harcourt and Lagos. Committee chairman Odianosen Okojie said lawmakers will conduct direct facility inspections rather than relying solely on official reports, with a follow-up visit to Greenville LNG already planned. The committee also endorsed Indorama Petrochemicals and praised Pipeline Infrastructure Nigeria Limited for their contributions to sector stability and infrastructure protection.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/889988-reps-panel-to-intensify-oversight-of-midstream-petroleum-sector-targets-improved-accountability.html", "state_media": false, "category": "経済"}, {"title_ja": "エヌグ－オニチャ幹線道路でタンカー火災、3人死亡・被害額9億ナイラ", "title_en": "Tanker Fire on Enugu-Onitsha Expressway Kills Three, Causes N900M in Damage", "summary_ja": "6月22日月曜日の未明、エヌグ州のエヌグ－オニチャ幹線道路において、ダンゴテ社のセメント輸送トラックがLNGタンカーに衝突し、火災が発生して3人が死亡、複数人が負傷した。連邦消防署によると、トラックのブレーキ故障が原因でタンカーに追突し、LNGが漏洩して引火したとみられる。消防隊はエヌグ州消防署や付近の検問所に駐屯する兵士の支援を受けて午前6時38分までに鎮火し、約8億ナイラ相当の資産を救出した。", "summary_en": "A collision between a Dangote cement truck and an LNG tanker on the Enugu-Onitsha Expressway in the early hours of Monday, 22 June, sparked a fire that killed three people and injured several others. The Federal Fire Service confirmed that brake failure on the Dangote truck caused it to ram into the LNG tanker, triggering a leak and blaze that destroyed an estimated N900 million worth of property. Firefighters, supported by the Enugu State Fire Service and Nigerian soldiers at a nearby checkpoint, contained the fire by 6:38 a.m. and salvaged assets valued at approximately N800 million.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/headlines/889985-enugu-tanker-fire-claims-three-lives.html", "state_media": false, "category": "社会"}, {"title_ja": "アブジャ住民、INEC有権者登録ポータルの予約枠不足に不満", "title_en": "Abuja Residents Frustrated by Lack of Appointment Slots on INEC Voter Registration Portal", "summary_ja": "ナイジェリアの首都圏（FCT）の住民が、2027年選挙を前に実施されているINECの継続的有権者登録ポータルで予約枠を確保できず困惑している。プレミアム・タイムズの調査によると、アブジャ管轄の大半のINEC事務所では予約枠が表示されず、アバジとクワリのみが利用可能な状態が続いている。INECの匿名当局者は、オンライン予約なしでも直接事務所に出向いて登録できると説明している。", "summary_en": "Residents of Nigeria's Federal Capital Territory are struggling to secure appointment slots on the INEC Continuous Voter Registration portal ahead of the 2027 elections, with most Abuja-area offices showing no availability. Checks by Premium Times confirmed that only Abaji and Kwali INEC offices have open slots, leaving residents in AMAC, Gwagwalada, and other councils unable to pre-register online. An unnamed INEC official noted that registration can still be completed in person at designated offices without an online appointment.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/889982-abuja-residents-lament-inability-to-pre-register-for-pvc-on-inec-portal.html", "state_media": false, "category": "社会"}, {"title_ja": "王毅氏：米イラン平和覚書の履行が中東に平和をもたらす鍵", "title_en": "Wang Yi: US-Iran Peace MoU Key to Restoring Middle East Stability", "summary_ja": "CGTNによると、中国の外交トップである王毅氏は2026年6月22日にニューデリーでイランの安全保障当局者カディル・ニザミプール氏と会談し、米イラン間で署名された平和に関する覚書（MoU）の維持・履行が停戦を強固にし、中東に平和をもたらすと述べたと伝えられている。CGTNはさらに、王氏がパキスタンとカタールの仲介による米イラン後続協議を支持し、14項目の覚書草案を国連憲章の原則に沿うものと評価したと報じている。また同報道によれば、王氏はイランの「包括的戦略パートナー」としての中国の立場を再確認し、地域の平和回復に向けた建設的な支援を継続すると表明したとされる。", "summary_en": "CGTN reports that China's top diplomat Wang Yi stated that maintaining and implementing the recently signed US-Iran peace memorandum of understanding will help consolidate the ceasefire and bring peace back to the Middle East, during a meeting with Iranian security official Qadir Nizamipour in New Delhi on June 22, 2026. CGTN reports that Wang expressed China's support for follow-up Iran-US talks mediated by Pakistan and Qatar, describing the 14-point draft MoU as consistent with UN Charter principles. CGTN further reports that Wang reaffirmed China's role as Iran's 'comprehensive strategic partner' and pledged continued constructive assistance in restoring regional peace.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-22/Wang-Yi-Implementing-US-Iran-MoU-helps-bring-peace-back-to-Mideast-1ObA2zJaDRK/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "中国、新たな戦時証拠を受けて日本に歴史直視を要求", "title_en": "China Urges Japan to Reckon With Wartime Past After New Evidence of Human Experiments", "summary_ja": "CGTNによると、日本メディアが1938年に日本軍が人体実験を行ったとする新たな記録を報じたことを受け、中国外務省の郭嘉昆報道官は日本に対して戦時中の歴史に正面から向き合うよう求めたと伝えている。郭報道官は、侵略戦争中に日本軍が大規模な人体実験や細菌戦を行ったと主張し、1949年のハバロフスク裁判が広範な証拠を残していると述べたとCGTNは報じている。さらに同報道官は日本の再軍備化を牽制し、「軍国主義と完全に決別」してアジア近隣諸国の信頼を行動で示すよう촉구したとされる。", "summary_en": "CGTN reports that China's Foreign Ministry urged Japan to confront its wartime history after Japanese media cited newly uncovered records allegedly showing the Japanese army conducted live human experiments, including animal-to-human blood transfusions, on 23 individuals in 1938. Spokesperson Guo Jiakun claims the invading Japanese army carried out large-scale human experiments and germ warfare, pointing to the 1949 Khabarovsk Trials as supporting evidence. CGTN further reports that Guo warned against Japan's remilitarization, urging Tokyo to 'make a clean break with militarism' and earn the trust of Asian neighbors through concrete actions.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-22/China-urges-Japan-to-reflect-on-history-after-new-wartime-evidence-1ObuNcaOoNO/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "米がイラン海上封鎖を解除、ホルムズ海峡の通航再開へ――米イランMoU署名受け", "title_en": "US Lifts Iran Maritime Blockade; Hormuz Transit Resuming Under New US-Iran MoU", "summary_ja": "CGTNは、米国がイランへの海上封鎖を解除し、両国が覚書（MoU）に電子署名したことを受け、イランがホルムズ海峡を通航する船舶の手続きを迅速化するよう命じたと報じている。CGTNによれば、MoUは即時停戦と60日間の最終合意交渉の枠組みを定めており、イランは60日間の通航料免除を表明した。一方、MoUに署名していないイスラエルがレバノン南部からの撤退を拒否したため、CGTNはイランがスイスでの交渉に向けた代表団の派遣を停止したと伝えている。", "summary_en": "CGTN reports that the United States has lifted its maritime blockade on Iran and that Tehran has ordered expedited vessel processing through the Strait of Hormuz, following the digital signing of a memorandum of understanding between the two countries. CGTN reports that the MoU establishes an immediate ceasefire and a 60-day negotiation window, with Iran waiving Hormuz transit fees for 60 days. However, CGTN reports that implementation faces uncertainty as Israel, a non-signatory, rejected withdrawal from southern Lebanon, prompting Iran to suspend its delegation's trip to Switzerland for follow-on talks.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-19/US-says-it-lifts-Iran-blockade-Tehran-says-to-speed-up-Hormuz-transit-1O5ZtXiQ9Nu/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "アークティクウゴリと北方フォーラム、北極圏科学協力に関する覚書に署名", "title_en": "Arktikugol and Northern Forum Sign Arctic Scientific Cooperation Memorandum", "summary_ja": "TASSは、ロシアのアークティクウゴリ・トラスト社と北方フォーラム・アカデミーが、北極圏における科学協力と共同プロジェクトの推進を目的とした覚書を締結したと伝えている。TASSによれば、署名式にはスピッツベルゲンのロシア総領事も出席し、バレンツブルクを多国間の北極プロジェクトの拠点とすることが目指されているという。同社は1931年設立の国営企業で、90年以上にわたりスピッツベルゲン諸島でロシアの存在感を維持しているとTASSは報じている。", "summary_en": "TASS reports that Russia's Arktikugol Trust Company and the Academy of the Northern Forum signed a Memorandum of Understanding aimed at developing scientific cooperation and joint projects in the Arctic. According to TASS, the agreement was signed by Arktikugol CEO Ildar Neverov and Northern Forum Academy Executive Director Vladimir Vasiliev, with Russia's Consul General in Spitsbergen present at the ceremony. TASS reports that the memorandum is described as a step toward diversifying Arktikugol's activities and positioning Barentsburg as a platform for multinational Arctic initiatives.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2150365", "state_media": true, "category": "社会"}, {"title_ja": "学生チームがソロヴェツキー諸島で北極探検隊の夏季遠征を開始", "title_en": "Students Launch Arctic Team Summer Expedition on Solovetsky Islands", "summary_ja": "タスは、ロシア53地域の116大学が参加する大規模な学際プロジェクト「北極チーム」の夏季遠征がソロヴェツキー諸島で始まったと伝えている。同メディアによれば、学生たちはスパソ・プレオブラジェンスキー・ソロヴェツキー修道院の敷地整備や巡礼サービスの支援を行いながら、ロシア北部の伝統や建築を学んでいるという。主催者は2026年に同地での遠征シフト数を過去最多にする計画を示したと報じられている。", "summary_en": "TASS reports that the Arctic Team summer expedition, an inter-university project uniting 116 universities across 53 Russian regions, has begun on the Solovetsky Islands. The state media outlet reports that student participants are assisting with preservation work at the Spaso-Preobrazhensky Solovetsky Monastery and supporting its pilgrimage service, while also studying the architecture and traditions of Russia's North. Organizers are quoted as saying a record number of expedition shifts are planned for the site in 2026.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2150361", "state_media": true, "category": "社会"}, {"title_ja": "プーチン大統領、西側の対ロ戦争準備を警告し迅速な対応を誓う", "title_en": "Putin Warns of Western War Preparations Against Russia, Vows Swift Response", "summary_ja": "TASSによると、ロシアのプーチン大統領は軍の大学卒業式で、NATOなど西側諸国がロシアとの戦争に向けた準備を公言し、軍事予算を拡大していると主張した。また同報道によれば、プーチン氏は西側が「ロシアの脅威」を捏造して自らの攻撃的政策を正当化していると批判し、ロシアはいかなる脅威にも迅速かつ適切に対応すると強調した。さらにTASSは、2025年に1000種類以上の兵器が実戦条件下でテストされ、核戦力の近代化が継続されているとのプーチン氏の発言を伝えている。", "summary_en": "TASS reports that Russian President Vladimir Putin claimed at a military graduation ceremony that Western NATO nations are openly preparing for war with Russia and expanding their military budgets. Putin further asserted, according to TASS, that the West fabricates a 'Russian threat' to justify its own aggressive policies, while Russia advocates multipolar security. TASS also reports Putin stating that Russia is modernizing its nuclear triad and that over a thousand weapons were tested in combat conditions in 2025.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2150351", "state_media": true, "category": "政治"}, {"title_ja": "ブレグジットを超えて——欧州への回帰", "title_en": "Beyond Brexit—and Back to Europe", "summary_ja": "著者は、2016年のブレグジット国民投票から10年が経過した現在も英EU関係が停滞しているように見えるが、新たな世論調査では英仏海峡の両側で再関与を支持する大多数の声があることを論じている。キア・スターマー英首相の辞任がブレグジット10周年と重なったことを、ブレグジットが英国政治にもたらし続ける毒性の象徴として捉えている。著者は、現在の膠着状態を超えて英EU関係を刷新する機運が高まりつつあるという見解を示している。", "summary_en": "The author argues that despite the apparent stagnation in UK-EU relations since the 2016 Brexit referendum, new polling data suggests large majorities on both sides of the English Channel now favor re-engagement. The piece uses the resignation of Prime Minister Keir Starmer, coinciding with the tenth anniversary of the Brexit vote, as a symbol of the ongoing political toxicity Brexit has generated in British politics. The author's perspective suggests momentum is building for a renewed UK-EU relationship beyond the current impasse.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/brexit-uk-eu-voters-now-favor-return-to-closer-relationship-by-mark-leonard-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "イランをめぐるトランプの愚行", "title_en": "Trump's March of Folly in Iran", "summary_ja": "筆者は、米国とイランが署名した覚書はアメリカの事実上の降伏であり、トランプ大統領がそれを勝利として偽装しようとしていると主張する。イランは敵国の政治姿勢を変えさせることに成功し、戦争の本質的な目的を達成したと論じている。この結果は単なる個人の無能さではなく、芸能人や利益追求者が権力の座に就くことを許してきたアメリカの政策と制度の欠陥を反映していると指摘する。", "summary_en": "The author argues that the US-Iran memorandum of understanding represents a capitulation by the United States, dressed up by Trump as a victory. The deal is characterized as a humiliating defeat for Trump and America, with Iran successfully forcing a change in US political posture. The author contends this outcome reflects deeper systemic failures in American institutions that allow unqualified leaders to rise to power rather than merely incompetent individual leadership.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/trump-america-capitulated-to-iran-strategic-ethical-disaster-by-timothy-snyder-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "アラン・グリーンスパンの功罪——複雑な遺産", "title_en": "Alan Greenspan's Mixed Legacy as Federal Reserve Chair", "summary_ja": "100歳で死去したアラン・グリーンスパンは、連邦準備制度理事会史上最も影響力のある議長の一人だったが、その在任期間は決して無謬ではなかった。筆者は、グリーンスパンが過去の危機から誤った教訓を引き出し、緩やかな規制でも市場は自律回復できると信じ続けたと批判する。実際には厳格な市場規制と有能なテクノクラートの存在が不可欠であり、彼の長期在任はむしろその正しさを証明する結果となったと論じている。", "summary_en": "Alan Greenspan, who died at age 100, was one of the most consequential Federal Reserve chairs in the institution's history, but his tenure was far from faultless. The author argues that Greenspan drew the wrong lessons from past crises, believing lightly regulated markets could self-correct, when in fact his long tenure ultimately vindicated the case for strict market regulation and competent technocratic oversight.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/alan-greenspan-fed-chair-mixed-legacy-by-barry-eichengreen-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "超強力エルニーニョが迫る中、トランプ政権は気候予測システムを無謀に解体しようとしている", "title_en": "A Super El Niño Threatens Disaster While Trump Dismantles Climate Forecasting Systems", "summary_ja": "元NOAA副長官のテリー・ガルシア氏は、2026〜27年冬にかけて「非常に強い」水準に達する確率63%と予測されるエルニーニョが、干ばつや山火事、洪水などの深刻なリスクをもたらすと警告する。トランプ政権は連邦気候科学への広範な攻撃の一環として、災害予測に不可欠な3億8600万ドル規模の海洋観測網「海洋観測所イニシアチブ」の解体を試みたと主張する。超党派の上院法案により解体は一時停止されたが、ガルシア氏はこれらの重要システムを政治的判断から守るための恒久的な法的措置が必要だと訴えている。", "summary_en": "Former NOAA deputy administrator Terry Garcia argues that a strengthening El Niño, forecast with a 63% chance of reaching 'very strong' intensity by 2026-27, poses serious risks of drought, wildfires, and flooding. He contends the Trump administration recklessly sought to dismantle the Ocean Observatories Initiative—a $386 million sensor network critical to disaster forecasting—as part of a broader assault on federal climate science. While a bipartisan Senate bill temporarily halted the dismantling, Garcia warns that permanent legal protections are needed to keep these life-saving systems out of reach of political interference.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/23/super-el-nino-extreme-weather-trump", "state_media": false, "category": "オピニオン"}, {"title_ja": "大気汚染は解決できる――ロンドンとニューヨークが示す都市主導の成功モデル", "title_en": "Air Pollution Is Fixable: How London and New York Are Leading the Way", "summary_ja": "ロンドン市長サディク・カーンと元ニューヨーク市長マイケル・ブルームバーグは、年間800万人以上が死亡する大気汚染は、国家政府を待たずとも都市レベルで解決できると主張する。ロンドンの超低排出ゾーン（ULEZ）やニューヨークのデータ主導型政策がその証拠であり、大胆な行動により大気汚染を大幅に削減できることを示している。両氏はこの知見を世界14都市に広げる「ブリーズ・シティーズ」イニシアチブを発表し、清潔な空気は基本的権利であると訴えている。", "summary_en": "London Mayor Sadiq Khan and former New York Mayor Michael Bloomberg argue that air pollution, which kills over 8 million people annually, is a solvable problem that cities can tackle without waiting for national governments. They cite London's Ultra Low Emission Zone and New York's air quality monitoring as proof that data-driven municipal policies can dramatically reduce pollution within years. They announce the Breathe Cities initiative, a Bloomberg Philanthropies program expanding these best practices to 14 cities worldwide, including Accra and Nairobi.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/23/air-pollution-clean-up-london-new-york-sadiq-khan-michael-bloomberg", "state_media": false, "category": "オピニオン"}, {"title_ja": "トランプのイラン「勝利宣言」は自ら招いた惨事をさらに深めた", "title_en": "Trump's Iran War Victory Claims Masked a Strategic Catastrophe, Argues Blumenthal", "summary_ja": "シドニー・ブルーメンタールは、トランプ大統領がイラン紛争を通じて繰り返した早期の勝利宣言が、彼の詐欺師的本質を世界に露呈させると同時に戦略的損害を拡大させたと論じる。イランを地域覇権国に押し上げ、イスラエルや湾岸諸国との同盟関係を損ない、中国の影響力を高め、米国の威信を失墜させたと指摘する。さらにトランプ自身が「政権交代が目標だった」と主張しながら後に「政権交代など気にしたことはない」と述べたことで、開戦の大義そのものを自ら否定したと結論付けている。", "summary_en": "Sidney Blumenthal argues that Trump's repeated and premature declarations of victory throughout the Iran conflict exposed him as a fraudulent leader while deepening the actual strategic damage. He contends that Trump elevated Iran into a regional hegemon, alienated key allies including Israel and Gulf states, boosted China's influence, and wasted US military power. Blumenthal concludes that Trump's own contradictory statements—first claiming regime change, then praising the Iranian regime—demolished any coherent rationale for the war.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/23/trump-iran-victory-rationale", "state_media": false, "category": "オピニオン"}, {"title_ja": "ハートランド対リムランド：ユーラシア独裁勢力に対抗する自由主義的海洋秩序の再構築", "title_en": "Heartland vs. Rimland: Rebuilding the Liberal Maritime Order Against Autocratic Eurasia", "summary_ja": "筆者は、現代の地政学的対立が歴史的なユーラシア陸上勢力と海洋連合の抗争を反映しており、中国・ロシア・イラン・北朝鮮が修正主義的な「ハートランド」を形成し、米国主導の「リムランド」同盟に挑戦していると論じる。ハートランドは強圧的な力を持つ一方で経済・技術面では脆弱であり、リムランド連合は同盟国の依存体質や内部不和、米国の単独主義によって危険なほど分裂していると指摘する。筆者は、米国が自国の内向きで非自由主義的な衝動を抑制しつつ、領土とデジタルネットワークの両面を統治する結束したリムランド秩序を再構築しなければ、独裁勢力に世界的影響力を奪われると警告している。", "summary_en": "The author argues that today's geopolitical contest mirrors historical struggles between Eurasian land powers and maritime coalitions, with China, Russia, Iran, and North Korea forming a revisionist 'heartland' bloc challenging a U.S.-led 'rimland' alliance. While the heartland is internally contradictory—coercively powerful but economically and technologically weak—the rimland coalition is dangerously fractured by allied dependence, internal discord, and American unilateralism. The author contends that the United States must rebuild a cohesive rimland order governing both territory and digital networks, while resisting its own illiberal impulses, or risk ceding global influence to autocratic powers.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/china/heartland-vs-rimland-beckley-brands", "state_media": false, "category": "オピニオン"}, {"title_ja": "機能不全に陥った核の傘：米国の拡大抑止はもはや信頼できるか", "title_en": "The Broken Nuclear Umbrella: Why the U.S. Can No Longer Guarantee Allied Security", "summary_ja": "筆者は、冷戦後の地政学的変化により、米国がアジアや欧州の同盟国に提供してきた拡大核抑止の信頼性が著しく低下していると主張する。韓国やポーランド、ラトビアなどの同盟国が、米国が自国の安全のために核戦争のリスクを冒すかどうか確信を持てなくなっているのは正当な懸念だとしている。そのうえで筆者は、ワシントンはこの現実を受け入れ、同盟国が独自の核抑止力を構築するなど、より自律的な安全保障体制を模索することを支持すべきだと訴えている。", "summary_en": "The author argues that America's extended nuclear deterrence commitments to allies in Europe and Asia have lost credibility in the post-Cold War era, as modern conflicts are largely regional and Washington is increasingly prioritizing its own core interests. The piece contends that allies in countries like South Korea, Poland, and Latvia are right to doubt that the U.S. would risk nuclear war on their behalf. The author urges Washington to accept this reality and support partners in developing more autonomous nuclear deterrence arrangements, including potential independent arsenals, rather than maintaining a hollow security guarantee.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/broken-nuclear-umbrella-lind-press", "state_media": false, "category": "オピニオン"}, {"title_ja": "中国の軍事的優位は幻想——台湾征服能力の現実", "title_en": "The Mirage of China's Military Edge: Why Beijing Cannot Conquer Taiwan", "summary_ja": "著者は、中国が過去30年間で大規模な軍備増強を行ったにもかかわらず、台湾を武力で征服する能力は現時点では備わっておらず、近い将来もそれは変わらないと主張する。軍事技術のトレンドは台湾・米国側に有利に働いており、日本やフィリピンを含む地域連携も抑止力を強化している。一方で、中国の脅威を過大評価する悲観的な見方は中国を勢いづかせ、台湾支持国の結束を損なう危険性があると警告している。", "summary_en": "The author argues that despite China's significant military buildup over three decades, it remains incapable of successfully conquering Taiwan, and this limitation is unlikely to change in the near future. Trends in military technology now favor Taiwan and the United States, and growing regional coalitions including Japan and the Philippines further reinforce deterrence. The author warns that alarmist assessments of Chinese military superiority are themselves dangerous, as they could embolden Beijing and undermine the resolve of Taiwan's supporters.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/china/mirage-chinas-military-edge-dennis-blair", "state_media": false, "category": "オピニオン"}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  const sb=document.getElementById("d-state");
  sb.style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-23 12:35 JST";
renderTabs();renderList();
</script>
