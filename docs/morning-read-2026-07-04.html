, published in the late 1990s, was a love letter of sorts to the American ideal, arguing that it was the fruit of a rebellion against an antiquated, British system of government under which we on this side of the Atlantic still laboured. The book was called Bring Home the Revolution, but the original subtitle was: How Britain Can Live the American Dream. When an interviewer, responding to the impeachment proceedings that had just begun against Bill Clinton, joked that, “It’s all a bit of a nightmare now, isn’t it?” I pushed back, insisting that, whatever the flaws in its realisation, the US ideal itself remained noble. No matter what problem ailed the US, the remedy was to be found in that marvel of a founding document, the US constitution.\nThis past decade has shifted my view. In Trump, the constitution has come face-to-face with exactly the kind of figure the founders feared – a president who seeks to rule as a monarch, enriching himself and his family in the process. The founders erected several barriers to such a person, whether emoluments clauses, to guard against the receipt of foreign gifts and the pursuit of e", "translation_ja": "アメリカの大きな誕生日は、最悪のタイミングにやってきた。土曜日、北米13植民地がジョージ3世率いる大英帝国からの独立を宣言して250年を迎えるのは、分断された国家である。かつて植民地の人々が打ち立てた共和国が今や脆弱なのではないかと、多くの市民が不安を抱いている。ホワイトハウスに居座る「皇帝志望者」の存在が、その懸念に拍車をかけている。\n\n希望と不安は常にアメリカの物語の中で絡み合ってきた、と自らを慰める人もいるだろう。輝かしい例外的なアメリカの未来への確信は、最初から不吉な予感や疑念と共存してきた。1787年の制憲会議の閉会直後、ある女性が建国の父のひとりベンジャミン・フランクリンに近づき、代表たちが樹立したのは君主制か共和制か、と尋ねた。フランクリンの答えはこうだった。「共和制です。あなた方がそれを守り続けられればの話ですが」。\n\nその不安の一端は、新生国家が生来の欠陥を抱えて誕生したという、おそらく静かな認識から来ていたのだろう。独立宣言は「すべての人は平等に創られた」と高らかに謳いながら、女性を除外し、奴隷制という現実と到底折り合いのつかない矛盾をはらんでいた。その文章の主要な起草者であるトーマス・ジェファーソン自身が奴隷主であり、自らの偽善の知識が彼に取り憑いていた。「神が公正であり、その正義が永遠に眠り続けることはできないと考えるとき、私はわが国のために身を震わせる」と彼は記した。\n\nしかし未来への恐れは、建国者たちの野望のあまりにも大きなスケールにも起因していた。古代世界の歴史家トム・ホランドが言うように、アメリカは「初期ローマ共和国の模倣として建国された。そしてローマ史の教訓は、共和国はいずれ独裁制へと変わるということだ」。7月4日の宣言に署名のインクが乾く間もなく、アメリカ人は「カエサルの出現を恐れ始めた」とホランドは言う。\n\nこれらのことは、今日のアメリカ人に楽観論を促すかもしれない。先人たちも同様に恐れたが、その懸念は結局、杞憂に終わったのだ、と。ドナルド・トランプがますます大きな権力を自らに集中させようとしていることを見ても、それほど前例のないことではないと言える。フランクリン・ルーズベルトは「帝王的大統領制」を築いたとして批判され、世俗の聖人と称されるエイブラハム・リンカーンでさえ、抗議者を戒厳令下に置き、人身保護令状の権利を停止させた（もっとも彼には内戦という言い訳があったが）。権力への欲求という点では、トランプは非常に錚々たる先人たちと同じ道を歩んでいると言えるだろう。\n\nそうであれば、バラ色の眼鏡をかけたアメリカ人は、土曜日のバーベキューや花火を楽しみながら、「これもやがて過ぎ去る」と言い張ることができる。そう、粗野で卑しく自慢ばかりの男が執務室に座っている——今週明らかになったところによれば、復帰後わずか1年でポケットに22億ドルを収めた人物が。そして彼はアメリカの宿敵であるイランを強化し、アメリカを弱体化させるだけの惨めな戦争を引き起こした。さらに彼は、アメリカが利益を得るだけだった1945年以降の国際秩序を解体しようとしている。加えて彼と副大統領は、市民権をアメリカの核心的理念に賛同する者すべてに開かれた「信条的」アイデンティティの概念から、民族的・血統的な定義へと置き換えようとしているようだ。しかしそれらすべても過ぎ去るだろう。この見方によれば、南北戦争も、ジム・クロウ法による人種差別も、1940〜50年代のマッカーシズムの魔女狩りも生き延びたアメリカは、トランプとトランプ主義も乗り越えられるはずだ。\n\nさらに、アメリカ軍とアメリカ経済の圧倒的な力を加えれば、AIにおける先行優位によって両者はさらなるアドバンテージを得るとも言われており、展望はまさに明るいはずだ。\n\nしかし私は、それでも納得できない。長年にわたり、私はまさに今説明したような立場を保ち続けてきた。確かにアメリカには目に余る欠陥や問題がある、しかしアメリカのシステム自体が克服できないものは何もない、と。1990年代後半に出版した私の最初の著書は、ある意味でアメリカの理想への愛の書簡だった。時代遅れのイギリス式統治体制に今なお縛られているこちら側の私たちに対して、アメリカの理想こそがその体制への反乱の産物であると論じたのだ。その本は『革命をもち帰れ』と題されたが、原題のサブタイトルは「イギリスはいかにアメリカン・ドリームを生きられるか」だった。ちょうどビル・クリントン弾劾手続きが始まった頃、あるインタビュアーが「今はちょっと悪夢みたいじゃないですか?」と冗談めかして言ったとき、私は反論した。理想の実現に欠陥があるとしても、アメリカの理想そのものは崇高であり続けている、と。アメリカを苦しめる問題が何であれ、その解決策はあの驚くべき建国文書、合衆国憲法の中に見出せる、と。\n\nこの10年で私の見方は変わった。トランプという人物において、憲法はまさに建国者たちが恐れたタイプの人物と正面から向き合うことになった——君主として君臨しようとし、その過程で自分と家族を富ませる大統領と。建国者たちはそのような人物に対していくつかの障壁を築いた。外国からの贈り物の受け取りや個人的利益の追求を禁じる報酬条項もそのひとつだが……", "vocab": [{"word": "simulacrum", "definition": "何かの模倣や複製を意味する高度な語彙。ここでは米国が初期ローマ共和国を模して建国されたことを指す。"}, {"word": "sanguine", "definition": "困難な状況においても楽観的・前向きであることを表す形容詞。「sanguine about the future（将来を楽観視する）」のように使われる。"}, {"word": "emoluments", "definition": "職務や地位から得られる報酬・利益を指す法律・政治用語。米国憲法の「報酬条項（Emoluments Clause）」として頻出する。"}, {"word": "venal", "definition": "賄賂や金銭によって左右される、腐敗した、という意味の形容詞。道徳的腐敗を強調する文脈で用いられる。"}, {"word": "habeas corpus", "definition": "ラテン語由来の法律用語で「人身保護令状」を意味し、不当な拘禁から個人を守る権利を指す。英米法の基本原則として重要。"}, {"word": "creedal", "definition": "信条・信仰・理念に基づくことを意味する形容詞。「creedal national identity（信条的な国民的アイデンティティ）」は、民族や血統ではなく理念への賛同を基盤とする帰属意識を指す。"}, {"word": "egregious", "definition": "著しく悪い、目に余るほどひどいことを意味する形容詞。否定的な事柄を強調する際に使われるフォーマルな語。"}]}, {"title_ja": "軍と共和国：アメリカ民主主義における文民統制の重要性", "title_en": "The Military and the Republic: Civil-Military Relations in American Democracy", "summary_ja": "筆者は、健全な文民・軍事関係がアメリカ民主主義の根幹であると主張し、国内の政治問題を軍事力で解決しようとする誘惑の高まりに警鐘を鳴らしている。ジョージ・ワシントンが文民の権威に従った先例を引きながら、軍を国内任務に多用することは民主主義制度と軍の即応能力の双方を損なうと警告する。著者はアメリカの理想を絶えず向上させながら、軍を選出された文民指導者の下に置き続けることを求めている。", "summary_en": "The author argues that healthy civil-military relations are foundational to American democracy, warning against the growing temptation to use the military to solve civilian political problems. Drawing on George Washington's example of deferring to civilian authority, the piece cautions that over-relying on the military for domestic missions undermines both democratic institutions and military readiness. The author calls for continuous improvement of American ideals while keeping the military subordinate to elected civilian leadership.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/military-and-republic-charles-q-brown", "state_media": false, "category": "オピニオン", "full_text": "Celebrations of America’s founding and reflections on its ideals often overlook the central role of civil-military relations. This is a mistake. In the Declaration of Independence, a chief complaint was that King George III “affected to render the Military independent of and superior to the Civil power.” George Washington himself worried about this abuse of power and went to great pains to avoid it in his own career. Throughout the Revolutionary War, he constantly deferred to the Continental Congress despite its calamitous delays and erratic instructions, because he recognized that his authority over the Continental Army flowed from the people’s representatives. Given his immense personal popularity, he was often encouraged to redress this or that political dysfunction, but he knew that the republic would suffer in the long run if the military were to become an instrument of the commander’s will rather than of the people’s elected leaders.\nThe United States has not recently had leaders of Washington’s popularity, but in other ways the present moment recalls the era that followed the country’s founding. Today, as it was then, there is gridlock in the civilian political system. Similarly, Americans today hold the military in high regard compared with civilian branches of government. When the public is confronted with a problem that seems too big for the civilian branches to solve, the reflex is to ask the military to handle it. Both Presidents Donald Trump and Joe Biden, for instance, looked to the military to play a leading role in responding to the COVID-19 pandemic.\nThe temptation for mission creep is understandable: the U.S. military is the most advanced in the world, with a budget two to three times that of its nearest competitor. As the recent capture of Venezuelan dictator Nicolàs Maduro demonstrated, U.S. service members can do things no other military in the world can do. And in the face of a genuine national disaster, the public will readily embrace the military’s help; during the Great Depression, for instance, President Herbert Hoover directed the military to set up relief camps and President Franklin Roosevelt ordered it to establish the Civilian Conservation Corps, which put unemployed men to work to develop public land.\nBut when presidents use the armed forces for more politically contentious missions, such as addressing domestic crime in cities, the work of the military becomes more fraught. Resorting to a military solution rather than fixing the underlying incapacity or dysfunction in civilian institutions diverts the military from focusing on its primary combat mission. And, as Washington knew, it is not the military’s job to save the republic from political impasses. Indeed, if you ask too much of the military, you risk the entire enterprise.\nTHE AMERICAN INHERITANCE\nA quarter millennium after the first Americans rejected monarchy, representative democracy remains an “experiment entrusted to the hands of the American people,” as Washington said in his first inaugural address. It has been tenderly handed down from generation to generation, and it has been bitterly contested. The Civil War was only the greatest test of whether this experiment could survive its divisions, as the United States has faced disagreements throughout its history, including in the agrarian discontent of the 1890s, the depression and isolationism of the 1930s, the progress and tumult of the 1960s, and the political polarization of recent years.\nIn each chapter, the best political leaders found inspiration to overcome political divisions in the ideals that prompted the first patriots. These leaders held dear the self-evident truths “that all men are created equal [and] endowed by their Creator with certain unalienable Rights.” Of course, those ideals, so well articulated by the founders, were not so well practiced by them. Thomas Jefferson held the pen for the stirringly universal Declaration of Independence, yet he also held people in bondage. Washington, the indispensable man, considered the institution of slavery to be indispensable to the nation’s prosperity (at least initially). All the founders left women out of the equation entirely. But the American experiment strengthens each time its leaders recognize that the founders’ project to create a more perfect union is an enduring one—one to be passed down to every generation.\nThe ideal was better than the reality 250 years ago, and so it is today. For every American institution, including the military, this project of continuous improvement takes concerted effort and is not easy. Indeed, despite its advantages, the U.S. military today must stay humble and learn the lessons of the wars in Ukraine and Iran, including questioning traditional assumptions of U.S. air supremacy. To maintain professionalism in its all-volunteer force, the military must also find new ways to remain connected to American society and to persuade capable young men and women from all walks of li", "translation_ja": "アメリカの建国を祝い、その理想を振り返る機会において、文民・軍事関係の中心的な役割はしばしば見過ごされる。これは誤りである。独立宣言において主要な不満の一つは、ジョージ三世が「軍を文民権力から独立させ、それより優位に立てようとした」ことであった。ジョージ・ワシントン自身もこの権力乱用を憂慮し、自らのキャリアにおいてそれを回避するために細心の注意を払った。独立戦争を通じて彼は、大陸会議の致命的な遅延や不安定な指示にもかかわらず、常に同会議に従った。なぜなら、大陸軍に対する自らの権限は人民の代表者から生じていると認識していたからである。圧倒的な個人的人気を誇っていた彼は、さまざまな政治的機能不全を是正するよう幾度となく求められたが、軍が選出された指導者の意志ではなく司令官個人の意志の道具となれば、共和国は長期的に損害を被ると理解していた。\n\nアメリカは近年、ワシントンほどの人気を持つ指導者を輩出していないが、他の点では現在の状況は建国直後の時代を彷彿とさせる。当時と同様に今日も、文民政治システムは行き詰まりに陥っている。同様に、今日のアメリカ国民は政府の文民部門と比較して軍を高く評価している。文民部門では解決できそうにない問題に直面すると、軍にその対処を求めるのが反射的な反応となっている。たとえばドナルド・トランプとジョー・バイデンの両大統領は、新型コロナウイルス感染症のパンデミック対応において軍に主導的役割を求めた。\n\nミッション・クリープへの誘惑は理解できる。アメリカ軍は世界最高水準であり、その予算は最も近い競合国の二倍から三倍に上る。最近のベネズエラの独裁者ニコラス・マドゥロの拘束が示したように、アメリカの軍人たちは他のいかなる国の軍隊にも不可能なことを成し遂げることができる。そして真の国家的災害に直面したとき、国民は軍の支援を快く受け入れる。たとえば大恐慌の際、ハーバート・フーバー大統領は軍に救援キャンプの設置を命じ、フランクリン・ルーズベルト大統領は失業者に公有地の整備作業を行わせる市民保全部隊の設立を軍に命じた。\n\nしかし大統領が、都市部の国内犯罪への対処など、より政治的に論争を呼ぶ任務のために軍を活用しようとすると、その活動はより困難なものとなる。軍事的解決策に頼って文民機関の根本的な機能不全や無能を修正しないでいることは、軍が本来の戦闘任務に集中することを妨げる。そしてワシントンが知っていたように、政治的行き詰まりから共和国を救うことは軍の仕事ではない。実際、軍に過大な要求をすれば、共和国という大事業全体を危険にさらすことになる。\n\n【アメリカの遺産】\n\n最初のアメリカ人たちが君主制を拒否してから四分の一千年が経過した今も、代議制民主主義はワシントンが最初の就任演説で述べたように「アメリカ国民の手に委ねられた実験」であり続けている。それは世代から世代へと大切に受け継がれてきたが、激しく争われもしてきた。南北戦争はこの実験がその分裂を乗り越えて生き残れるかどうかの最大の試練であったが、アメリカはその歴史を通じて、1890年代の農業不満、1930年代の恐慌と孤立主義、1960年代の進歩と混乱、そして近年の政治的分極化など、常に深刻な対立に直面してきた。\n\nそれぞれの時代において、最良の政治指導者たちは最初の愛国者たちを奮い立たせた理想の中に政治的分裂を乗り越える霊感を見出した。彼らは「すべての人間は平等に創られ、創造主によって一定の奪うことのできない権利を与えられている」という自明の真理を大切にした。もちろん、建国者たちによってこれほど巧みに表現されたその理想は、彼ら自身によって十分に実践されたとは言えない。トーマス・ジェファーソンは感動的なほど普遍的な独立宣言を起草したが、同時に人々を奴隷として所有してもいた。不可欠の人物であるワシントンは（少なくとも当初は）奴隷制度が国家の繁栄にとって不可欠であると考えていた。建国者たちは全員、方程式から女性を完全に排除した。しかし建国者たちの「より完全な連邦を作る」というプロジェクトが、あらゆる世代に受け継がれるべき永続的なものであることを指導者たちが認識するたびに、アメリカの実験は強化されてきた。\n\n二百五十年前も理想は現実よりも優れていたが、今日も同様である。軍を含むすべてのアメリカの機関にとって、継続的改善というこのプロジェクトは一致した努力を必要とし、容易ではない。実際、その優位性にもかかわらず、今日のアメリカ軍は謙虚さを保ち、ウクライナとイランにおける戦争の教訓を学び続けなければならない。それはアメリカの航空優勢に関する従来の前提を問い直すことも含む。志願制部隊における専門性を維持するために、軍はアメリカ社会との結びつきを保ち、あらゆる階層の有能な若い男女を説得する新たな方法を見つけなければならない。", "vocab": [{"word": "mission creep", "definition": "当初の目的を超えて任務や役割が徐々に拡大していく現象を指す慣用表現。軍事・政策分野で特によく使われる。"}, {"word": "calamitous", "definition": "「壊滅的な、惨憺たる」という意味の形容詞で、重大な損害や混乱をもたらす状況を描写する際に用いられる上級語彙。"}, {"word": "erratic", "definition": "「一貫性のない、不規則な」という意味の形容詞で、予測不能な行動やパターンを表す際に使われる。"}, {"word": "fraught", "definition": "「（困難・危険・不安などを）はらんだ、緊張した」という意味の形容詞で、問題や複雑さを内包する状況を表す。"}, {"word": "gridlock", "definition": "「行き詰まり、膠着状態」を意味する名詞で、特に議会や政治システムが対立により機能不全に陥った状況を指す。"}, {"word": "polarization", "definition": "「分極化」を意味する名詞で、社会や政治において意見・立場が両極端に分かれていく現象を指す政治・社会科学の用語。"}, {"word": "unalienable", "definition": "「譲渡不可能な、奪うことのできない」という意味の形容詞で、主に権利の文脈で用いられる法律・政治的な高度な語彙。"}]}, {"title_ja": "トゥキュディデスの誤読：知恵なき力は破滅を招く", "title_en": "Misreading Thucydides: Strength Without Wisdom Leads to Ruin", "summary_ja": "筆者は、トランプ政権の高官やニール・ファーガソンらの論者が、メロス島対話を力の政治の肯定として引用することで、トゥキュディデスを根本的に誤読していると主張する。『ペロポネソス戦争史』を丁寧に読めば、トゥキュディデスは抑制なき野心に警告を発していたことがわかる。メロス島の残虐行為の直後にアテネはシチリア遠征という大惨事を招いており、真の教訓は「強者による支配の正当化」ではなく「傲慢さと驕りが自滅をもたらす」というものだ。", "summary_en": "The author argues that Trump administration officials and commentators like Niall Ferguson fundamentally misread Thucydides by citing the Melian Dialogue as endorsement of raw power politics. A careful reading of The Peloponnesian War shows that Thucydides actually warned against unchecked ambition, as Athens's brutal treatment of Melos was immediately followed by the catastrophic Sicilian Expedition. The true lesson of Thucydides is not that strength justifies domination, but that arrogance and hubris lead to self-destruction.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/strong-do-what-they-can-and-suffer-what-they-must", "state_media": false, "category": "オピニオン", "full_text": "It seems to many these days that the world is a jungle beholden only to one law. Since returning to office in 2025, U.S. President Donald Trump has not only made a spectacle of American power—by striking alleged drug smugglers in the Caribbean, kidnapping Venezuelan President Nicolás Maduro, bombing Iran, and even threatening the sovereignty of allies—he has also made a principle out of it. Trump described Maduro’s capture as a vindication of the “iron laws that have always determined global power.” In a similar vein, White House Deputy Chief of Staff Stephen Miller asserted in January that the world is “governed by force” and “governed by power” and that “these are the iron laws of the world since the beginning of time.” Observers heard in these blunt statements echoes of Thucydides, the ancient Athenian aristocrat often considered the first proponent of the cold-blooded doctrine of realism. The Peloponnesian War, his magisterial opus on Athens’ doomed decades-long conflict with Sparta in the fifth century BC, includes the famous line, “The strong do what they can and the weak suffer what they must.”\nThat well-known line comes from an important section of the text known as the Melian Dialogue, in which representatives of Athens browbeat emissaries from the island of Melos. After the Athenians fail to persuade the Melians to accept unconditional surrender, they kill all the island’s men and enslave its women and children. Thucydides’s Melos passage has long been cited as proof that little governs the world beyond strength and its exercise—and as evidence that the brilliant Athenian general, historian, and philosopher himself believed that. Generations of students of international relations have been assigned these decontextualized snippets from his vast work and instructed that this was indeed Thucydides’s lesson. Today, a cottage industry of commentators now celebrate (or bemoan) what is described as a Thucydidean turn in American foreign policy. In “How Trump Won Davos,” an essay published in January, the historian Niall Ferguson explicitly invoked the Melian Dialogue to tout the triumph of Trump as a realist in the mode of Thucydides and asserted that, at Melos, “the realists won an emphatic victory.”\nBut that understanding of both the dialogue and its author gets his meaning fundamentally backward. Thucydides repeatedly refers to, but never endorses, the idea that the strong have the freedom to do what they want: to the contrary, a careful reading of The Peloponnesian War suggests a rather different view. Among the principal lessons to learn from Thucydides is that the ambition of the strong can lead to their own undoing. Right after Thucydides reports the fateful words of the Athenian envoys and the subsequent destruction of Melos, he describes at great length the disastrous campaign Athens pursued in Sicily—an effort that eventually led to Athenian defeat and Spartan victory. In this light, the Melian Dialogue is not proof of the great virtue of strength in international relations but an illustration of pride before the fall.\nThe political scientist Graham Allison famously coined the term “Thucydides trap” to refer to the dynamic inherent in The Peloponnesian War, of how the tensions between a rising power and an existing power will invariably bubble over into conflict. The real Thucydides trap, however, is different. The crucial lesson of the book is not to sketch how Athens and Sparta found themselves sleepwalking into a war that neither side wanted or understood. As Thucydides elaborately elucidates, both went into the conflict with eyes wide open. Moreover, in his view, the start of that war was hardly a trap. Thucydides supported the commencement of hostilities and the careful strategy of Pericles, the Athenian leader who rallied the public behind his demand for war with Sparta. The true catastrophe, and the real trap, occurred many years later, when Athens abandoned Pericles’s prudence and became recklessly ambitious, most grimly demonstrated by the misguided bid to conquer Sicily.\nThe central tragedy of The Peloponnesian War is the story of growing Athenian arrogance and hubris and its fateful consequences. Modern-day Athenians, trumpeting the virtue of strength, would do well to heed Thucydides’s warnings if they don’t want to court their own disasters.\nTRUTH IN THE TALE\nThe Melian Dialogue indeed offers vital lessons, but only if it is understood in the context of The Peloponnesian War as the book was written. That requires familiarity not with a few selected sentences but with the content of the entire work—and with Thucydides’s brilliant, precise, and overarching method. In his estimation, the 27-year conflict (431–404 BC) between Athens and Sparta unfolded in three distinct phases: an initial ten years of direct conflict, an uneasy seven-year interregnum of constant skirmishes and jockeying for position, and then another ten years of war before Athens’s unconditional surrender. Thucydides ", "translation_ja": "今日、世界はただ一つの法則に支配されるジャングルだと感じる人が多い。2025年に再び就任して以来、米国のドナルド・トランプ大統領はアメリカの力を誇示するだけでなく——カリブ海で麻薬密輸業者とされる者たちへの攻撃、ベネズエラのニコラス・マドゥロ大統領の拉致、イランへの爆撃、さらには同盟国の主権への脅迫——それを一つの原則にまで高めている。トランプはマドゥロの拿捕を、「グローバルな権力を常に規定してきた鉄の法則」の正当性の証明と表現した。同様に、ホワイトハウスの副首席補佐官スティーブン・ミラーは1月に、世界は「力によって統治され」「権力によって統治されており」、「これは太古の昔からの世界の鉄の法則だ」と主張した。観察者たちはこれらの率直な発言の中に、トゥキュディデス——古代アテネの貴族で、冷酷な現実主義の思想の最初の提唱者とされることが多い——の残響を聞き取った。彼の畢生の大作『ペロポネソス戦争史』は、紀元前5世紀のアテネとスパルタの数十年にわたる悲劇的な戦争を描いており、その中に「強者はできることをなし、弱者は甘んじなければならないことを受け入れる」という有名な一節がある。\n\nこのよく知られた一節は、「メロス島対話」として知られる重要な節から来ている。そこでは、アテネの使者がメロス島の代表者たちを威圧する場面が描かれる。アテネ人がメロス人に無条件降伏を受け入れさせることに失敗した後、島の男たちは全員殺され、女性と子どもたちは奴隷にされる。トゥキュディデスのメロス島の記述は長らく、力とその行使以外には世界を律するものは何もないという証拠として引用されてきた——そして、天才的なアテネの将軍・歴史家・哲学者であるトゥキュディデス自身がそう信じていたという証拠としても。国際関係論を学ぶ世代の学生たちは、この膨大な著作から文脈を外されたいくつかの断片を割り当てられ、これこそがトゥキュディデスの教えだと指導されてきた。今日では、アメリカの外交政策のいわゆる「トゥキュディデス的転換」を称賛または嘆く論者たちによる副業的産業が出現している。歴史家ニール・ファーガソンは1月に発表した論文「トランプはいかにしてダボスを制したか」の中で、メロス島対話を明示的に引用し、トゥキュディデスと同じ現実主義者としてのトランプの勝利を称え、「メロス島では現実主義者が圧倒的な勝利を収めた」と断言した。\n\nしかし、対話とその著者に対するそのような理解は、彼の真意を根本的に逆さまにしている。トゥキュディデスは「強者は望むことをする自由を持つ」という考えを繰り返し言及しているが、決してそれを支持していない。むしろ、『ペロポネソス戦争史』を注意深く読むと、まったく異なる見解が浮かび上がってくる。トゥキュディデスから学ぶべき主要な教訓の一つは、強者の野心は自らの破滅をもたらしうるということだ。トゥキュディデスはアテネの使者たちの運命的な言葉とその後のメロス島の破壊を記した直後に、アテネがシチリアで追求した悲惨な遠征を詳細に描写している——それはやがてアテネの敗北とスパルタの勝利につながった。この文脈において、メロス島対話は国際関係における力の偉大な美徳の証明ではなく、「驕り高ぶりは滅びの前触れ」の実例なのである。\n\n政治学者のグレアム・アリソンは「トゥキュディデスの罠」という言葉を造り出したことで有名だ。これは『ペロポネソス戦争史』に内在するダイナミクス——台頭する勢力と既存の勢力の間の緊張が必然的に紛争へと発展する——を指す。しかし、真の「トゥキュディデスの罠」は異なる。この書の核心的な教訓は、アテネとスパルタがいかにして誰も望まず誰も理解していない戦争に夢遊病者のように踏み込んでいったかを描くことではない。トゥキュディデスが詳しく解説しているように、両者は目を見開いたまま、つまり状況を十分に認識した上でこの紛争に入っていった。さらに彼の見方では、その戦争の始まりはほとんど罠ではなかった。トゥキュディデスはスパルタとの戦争を求める主張の背後に市民を結集させたアテネ指導者ペリクレスの慎重な戦略と、開戦を支持していた。真の惨事、そして真の罠は、何年も後にアテネがペリクレスの慎重さを捨て、無謀な野心に駆られるようになったときに訪れた——それはシチリア征服という誤った試みとして最も痛烈に示されている。\n\n『ペロポネソス戦争史』の中心的な悲劇は、アテネの増大する傲慢さと驕りとその運命的な結果の物語である。力の美徳を喧伝する現代のアテネ人たちは、自らの惨事を招かないためにも、トゥキュディデスの警告に耳を傾けるべきである。\n\n【物語の中の真実】\n\nメロス島対話は確かに重要な教訓を提供している——しかしそれは、書かれたままの『ペロポネソス戦争史』という文脈の中で理解された場合に限られる。そのためには、選び取られたいくつかの文だけでなく、作品全体の内容に——そしてトゥキュディデスの卓越した、精緻で包括的な方法に——精通することが必要だ。彼の見解によれば、アテネとスパルタの間の27年間の紛争（紀元前431〜404年）は三つの明確な段階を経て展開した。最初の10年間の直接的な戦闘、絶え間ない小競り合いと主導権争いが続く不安定な7年間の休戦期間、そしてアテネが無条件降伏するまでの再び10年間の戦争である。トゥキュディデスは……", "vocab": [{"word": "browbeat", "definition": "脅したり威圧したりして相手を従わせること。「browbeat emissaries」で「使者を威圧する」という意味。権力差を背景にした心理的強制を指す。"}, {"word": "interregnum", "definition": "二つの統治期間や局面の間の空白期間・過渡期のこと。ここでは戦争の第一段階と第三段階の間の不安定な休戦期間を指す。"}, {"word": "hubris", "definition": "過度な傲慢さや自信過剰を意味するギリシャ語起源の語で、しばしば破滅的な結末を招く慢心を指す。国際政治・古典文学の文脈で頻繁に用いられる。"}, {"word": "decontextualized", "definition": "本来の文脈や背景から切り離された状態を指す形容詞。「decontextualized snippets」で「文脈を外された断片」という意味になる。"}, {"word": "elucidates", "definition": "複雑な事柄を分かりやすく説明・解明することを意味する動詞。学術的・論説的な文章でよく使われる高度な語彙。"}, {"word": "emissaries", "definition": "特定の使命を帯びて派遣された使者や特使のこと。外交・政治的文脈で用いられる正式な語。"}, {"word": "recklessly", "definition": "結果を顧みずに無謀に行動する様子を表す副詞。「recklessly ambitious」で「無謀なほど野心的な」という意味になる。"}]}, {"title_ja": "ハマスの終焉：なぜ同組織は回復不能なのか", "title_en": "The End of Hamas: Why the Group Is Beyond Recovery", "summary_ja": "筆者は、大方の見方とは異なり、ハマスはイスラエルとの2年間の戦争によって回復不能なほど壊滅的な打撃を受けたと主張する。組織の指導部構造は完全に解体され、資金源は断たれ、ガザ市民からの支持も崩壊した。ハマスとイスラエルの双方が、それぞれの政治的理由から同組織がいまだ機能していると見せかけているというのが筆者の見立てだ。", "summary_en": "The author argues, contrary to prevailing consensus, that Hamas has been devastated beyond recovery by two years of war with Israel. Its entire leadership structure has been dismantled, its financial lifelines severed, and its public support in Gaza has collapsed. Both Hamas and Israel, the author contends, have political reasons to perpetuate the fiction that the group remains a viable force.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/palestinian-territories/end-hamas", "state_media": false, "category": "オピニオン", "full_text": "The consensus among analysts is that Hamas is down, but hardly out. The group may be badly battered, but it has been around since 1987, and in that time, it has been repeatedly attacked by Israel and has always grown back. The conditions that gave rise to the organization—occupation, dispossession, and humiliation at the hands of Israel—are as severe as ever. And in the Gaza Strip, there is no comprehensive alternative to Hamas’s governance. Even in its weakened state, the group has institutional memory, administrative infrastructure, and coercive capacity that its competitors cannot match.\nBut in truth, Hamas’s two-year war with Israel has decimated the organization beyond the point of recovery. It may still be more powerful than other groups in Gaza. But Israel’s bombing campaigns and invasion have cost Hamas essential military infrastructure, torn apart its leadership, and cut it off from its patrons. As a result, the organization lacks the power to actually rule Gaza. It is suffering from political paralysis and facing financial disaster in the enclave. Finally, it has lost public support: many Gazans blame the group for starting a war that has resulted in the destruction or damage of 90 percent of the homes in the Gaza Strip and the deaths of roughly four percent of the prewar population.\nDespite these facts, officials on both sides of Gaza’s yellow line have embraced the idea that Hamas is alive and well. Members of Hamas perpetuate this farce for an obvious reason: they do not want to admit that they lost. But Israel is also pretending that its nemesis remains strong so it can justify its continuing military operations—and avoid having to answer difficult questions about the future of Palestinians.\nUNAUTHORIZED OBITUARY\nSince Hamas attacked Israel on October 7, 2023, Israel has killed an entire echelon of Hamas leaders. This includes its former top officials: Yahya Sinwar, Ismail Haniyeh, Mohammed Deif, and Mohammed Sinwar. In May of this year, Israeli forces assassinated Izz al-Din al-Haddad, the head of Hamas’s military wing, at a residence, along with some of his family. Eleven days later, it killed Haddad’s replacement, Mohammed Odeh, along with his wife and two of his children. Today, only one Hamas commander who held a senior position before October 7 is left standing: Imad Aqel. Israel has also taken out hundreds of midlevel commanders. What it has done, in other words, goes beyond a mere decapitation strategy. It has removed Hamas’s entire nervous system.\nIsrael has also rendered Hamas incapable of regeneration. The fact that Haddad and Odeh were killed in their homes, with their families, indicates that the safe houses, tunnels, and countersurveillance architecture that once made Hamas’s senior leadership elusive are now gone. So are its overseas outposts. In the last three years, Israel has killed (or tried to kill) Hamas officials in Iran, Lebanon, and Qatar.\nIt is therefore little wonder that Hamas is experiencing a leadership crisis. Since Yahya Sinwar was killed, in October 2024, the group has been unable to decide who should take the helm of its political bureau. Hamas’s Shura Council, made up of 50 to 80 members, was supposed to elect a new leader in early 2025, but it could not meet and vote because of Israel’s ongoing bombardment. When a vote was finally held in February 2026, it did not produce a winner. For now, the group is run by a five-man council that has been hamstrung by infighting.\nThe relationship between Iran and Hamas is effectively over.\nHamas has settled on two leadership candidates: Khalil al-Hayya and Khaled Mashal. Each has a very different agenda. Hayya and his supporters favor close ties with Iran and continued armed confrontation, whereas Mashal and his backers want more sponsorship from Sunni states and more pragmatic negotiations with Israel. Of course, many healthy organizations have factional disagreements that they negotiate and resolve. But these divisions have instead resulted in deadlock. When the United States and Israel began bombing Iran on February 28 of this year, for example, Hamas could not agree on a statement or a response. It thus remained silent for three weeks. When it spoke, it sent conflicting signals. The group’s political leadership in Qatar called on Iran to “avoid targeting neighboring countries,” whereas the group’s military spokesman in Gaza put out a statement with a markedly different tone that praised Tehran’s war efforts.\nHamas’s political crisis is more than just internal. Since October 7, the group has lost external support. For decades, Hamas was an integral part of the so-called axis of resistance—Iran’s network of partners across the Middle East. This partnership was never seamless, in part because Hamas is a Sunni Islamist movement embedded in a Shiite-led alliance. But it was functional. Iran provided Hamas with weapons, training, and funding to the tune of $100 million annually. Hamas, in return, allowed Iran to indirectly ", "translation_ja": "アナリストたちの間で共通しているのは、ハマスは打撃を受けてはいるが、壊滅したわけではないという見方だ。組織はひどく傷ついているかもしれないが、1987年から存在し続け、その間にイスラエルから繰り返し攻撃を受けながらも常に立ち直ってきた。この組織を生み出した条件——占領、土地の収奪、イスラエルによる屈辱——は依然として深刻なままだ。そしてガザ地区には、ハマスの統治に代わる包括的な選択肢が存在しない。弱体化した状態にあっても、ハマスは競合する勢力には到底及ばない組織的な記憶、行政インフラ、そして強制力を持っている。\n\nしかし実際のところ、ハマスとイスラエルの2年間にわたる戦争は、この組織を回復不能なほど壊滅させた。ガザにおいて他のグループよりも依然として強力かもしれない。だがイスラエルの爆撃作戦と地上侵攻によって、ハマスは不可欠な軍事インフラを失い、指導部は引き裂かれ、後援者との関係も断ち切られた。その結果、組織はガザを実際に統治する力を持っていない。政治的な麻痺状態に陥り、当地での財政危機にも直面している。さらに、民衆の支持も失った。多くのガザ市民は、ガザ地区の住宅の90パーセントを破壊または損傷させ、戦前の人口の約4パーセントを死亡させるに至った戦争を始めた責任をハマスに帰している。\n\nこれらの事実にもかかわらず、ガザの黄色い境界線の両側にいる当局者たちは、ハマスが健在だという考えに固執している。ハマスのメンバーがこの茶番を続けるのは明白な理由がある。敗北を認めたくないのだ。しかしイスラエルも、軍事作戦を継続する口実を作り、パレスチナ人の将来についての難しい問いに答えを迫られないよう、宿敵がいまだ強力であるかのように振る舞っている。\n\n■無許可の死亡記事\n\nハマスが2023年10月7日にイスラエルを攻撃して以来、イスラエルはハマス指導者の一つの階層全体を殺害した。これにはかつての最高幹部たち——ヤヒヤ・シンワル、イスマイル・ハニヤ、モハメド・デイフ、モハメド・シンワル——が含まれる。今年5月、イスラエル軍はハマス軍事部門の長イズ・アッディーン・アル・ハッダードを、一部の家族とともに住居で暗殺した。その11日後には、ハッダードの後継者モハメド・オデーを、妻と2人の子どもとともに殺害した。現在、10月7日以前に上級職にあったハマスの司令官で生き残っているのは、イマード・アケルただ一人だ。イスラエルはまた、数百人の中堅指揮官も排除した。つまりイスラエルが行ったことは、単なる「首切り」戦略をはるかに超えている。ハマスの神経系全体を取り除いたのだ。\n\nイスラエルはまた、ハマスの再生能力をも奪った。ハッダードとオデーが家族ともども自宅で殺されたという事実は、かつてハマス上級指導部の発見を困難にしていた隠れ家、トンネル、および監視をかわすための仕組みがすでに機能しなくなっていることを示している。海外の拠点も同様だ。過去3年間で、イスラエルはイラン、レバノン、カタールでハマス幹部を殺害、あるいは殺害を試みた。\n\nハマスが指導部の危機に陥っているのは、それゆえ驚くべきことではない。2024年10月にヤヒヤ・シンワルが殺害されて以来、同グループは政治局の新しい指導者を誰にするか決定できないでいる。50人から80人のメンバーで構成されるハマスのシュラ評議会は、2025年初頭に新指導者を選出する予定だったが、イスラエルの継続的な砲撃のため会合を開くことができなかった。2026年2月にようやく投票が行われたが、勝者は決まらなかった。現在、組織は内部抗争に悩まされる5人評議会によって運営されている。\n\nイランとハマスの関係は事実上終わった。\n\nハマスは指導者候補を2人に絞った。カリール・アル・ハイヤとハーレド・マシャルだ。両者のアジェンダは大きく異なる。ハイヤとその支持者はイランとの緊密な関係と武力対決の継続を支持し、マシャルとその側近はスンニ派諸国からの支援の拡大とイスラエルとのより実務的な交渉を望んでいる。もちろん、健全な組織の多くには派閥間の対立があり、それを交渉によって解決している。しかしこれらの分断はむしろ行き詰まりをもたらしている。たとえば今年2月28日に米国とイスラエルがイランへの爆撃を開始した際、ハマスは声明も対応も合意できなかった。そのため3週間にわたって沈黙した。ようやく声を上げた時も、矛盾したシグナルを発した。カタールにいるハマスの政治指導部はイランに対して「隣国への攻撃を避けるよう」求めたが、ガザにいる同組織の軍事スポークスマンは著しくトーンの異なる声明を出し、テヘランの戦争努力を称賛した。\n\nハマスの政治的危機は内部にとどまらない。10月7日以降、同グループは外部からの支援も失った。数十年にわたり、ハマスはいわゆる「抵抗の枢軸」——中東全域におけるイランのパートナーネットワーク——の不可欠な一員だった。ハマスがシーア派主導の同盟に組み込まれたスンニ派イスラム主義運動であるという事情もあって、このパートナーシップは決してシームレスではなかった。しかし機能はしていた。イランはハマスに武器、訓練、年間1億ドル相当の資金を提供していた。ハマスはその見返りとして、イランが間接的に……", "vocab": [{"word": "decapitation strategy", "definition": "「首切り戦略」とも呼ばれる軍事・政治的手法で、組織の上層部の指導者を標的にして排除することで組織全体を機能不全に陥らせる戦略。国際安全保障や対テロ戦略の文脈で用いられる専門用語。"}, {"word": "coercive capacity", "definition": "「強制力」または「威圧能力」を指し、組織や国家が他者を従わせるために武力や脅迫などの強制手段を行使できる能力のこと。政治学・安全保障論でよく使われる表現。"}, {"word": "enclave", "definition": "地理的・政治的に周囲と区別された、他の領土や勢力圏に囲まれた小さな地域や集団を指す。ガザ地区のような特定の地域を指す文脈で使われることが多い中上級語彙。"}, {"word": "countersurveillance", "definition": "「対監視」を意味し、自分たちが敵に監視・追跡されることを防ぐための技術や手段の総称。諜報・軍事・セキュリティの分野で使用される専門的複合語。"}, {"word": "hamstrung", "definition": "「行動を妨げられた」「無力化された」という意味の形容詞・分詞。本来は腱を切られて動けなくなるという意味から転じて、組織や人が内外の制約によって機能できない状態を表す慣用表現。"}, {"word": "farce", "definition": "「茶番」「笑劇」を意味し、真剣に見せかけているが実態は馬鹿げているか欺瞞的な状況や行為を強く批判的に表現する語。TOEICや論説文での頻出上級語彙。"}, {"word": "pragmatic", "definition": "「実用的な」「現実主義的な」を意味し、理想や原則よりも実際の結果や効果を重視する態度・アプローチを指す。政治・外交・ビジネスの文脈で広く使われる中上級語彙。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-07-04 10:42 JST";
renderTabs();renderList();
