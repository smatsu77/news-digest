ties are urging residents to stay indoors and seek cooling centers as the heat is expected to persist for several days.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cevlkzer7vdo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ケイコ・フジモリ氏、ペルー大統領選の勝者に認定", "title_en": "Keiko Fujimori Declared Winner of Peru's Presidential Election", "summary_ja": "投票から約1か月を経て、ケイコ・フジモリ氏がペルー大統領選挙の勝者として正式に認定された。不名誉な元大統領アルベルト・フジモリ氏の娘であるケイコ氏は、接戦を制して勝利を収めた。開票結果の確定が大幅に遅れたことは、選挙がいかに僅差であったかを示している。", "summary_en": "Keiko Fujimori has been declared the winner of Peru's presidential election, nearly a month after voting took place. The daughter of former president Alberto Fujimori, who is widely regarded as disgraced, secured victory in what was described as a tight race. The delayed announcement reflects the closely contested nature of the election.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cr5jpvv06e1o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "インド政府、パキスタン拠点の23人を「テロリスト」に指定", "title_en": "India Designates 23 Pakistan-Based Individuals as Terrorists Under Anti-Terror Law", "summary_ja": "インド政府は、反テロ法に基づきパキスタンを拠点とする23人を正式に「テロリスト」に指定した。この措置はインドとパキスタン間の継続的な緊張関係を反映しており、国境を越えた安全保障上の脅威に対するニューデリーの強い姿勢を示している。詳細については今後さらに報道される見込みだ。", "summary_en": "The Indian government has officially designated 23 individuals based in Pakistan as 'terrorists' under its anti-terror legislation. The move reflects ongoing tensions between India and Pakistan and signals New Delhi's continued focus on cross-border security threats. Further details are expected to be reported by Deutsche Welle as the story develops.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/india-news-government-lists-23-pakistanis-as-terrorists/live-77830565?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ウクライナ、サンクトペテルブルク近郊の石油施設を長距離攻撃", "title_en": "Ukraine Strikes Oil Terminals Near St. Petersburg in Long-Range Attack", "summary_ja": "ウクライナはロシアのサンクトペテルブルク近郊にある石油ターミナルに対して長距離攻撃を実施した。この攻撃は、ロシア経済に打撃を与え、戦争遂行能力を妨げることを目的としたウクライナの作戦拡大の一環である。今回の攻撃は、ウクライナがロシア領土深部の戦略的インフラを標的にする能力を持つことを示す重大なエスカレーションとなっている。", "summary_en": "Ukraine has carried out long-range strikes targeting oil terminals near St. Petersburg, Russia. The attack is part of Ukraine's expanding campaign to inflict economic damage on Russia and disrupt its war effort. The strikes represent a significant escalation in Ukraine's ability to hit strategic infrastructure deep inside Russian territory.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/ukraine-strikes-oil-terminals-near-st-petersburg-in-russia/a-77830574?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大規模抗議の中、AfDが党大会をエアフルトで開幕", "title_en": "AfD Party Conference Opens in Erfurt Amid Large-Scale Protests", "summary_ja": "ドイツの極右政党「ドイツのための選択肢（AfD）」がエアフルトで党大会を開幕する中、数千人の抗議者が市内を行進し、道路を封鎖するなど大規模なデモが繰り広げられた。この抗議活動は、同党の政策や影響力拡大に対する広範な反発を示している。一方、シュトゥットガルトでは同時刻に大規模な火災が発生し、消防隊が消火活動に当たった。", "summary_en": "Germany's far-right Alternative für Deutschland (AfD) party kicked off its conference in Erfurt as thousands of protesters took to the streets, marching and blocking roads across the city. The demonstrations reflect widespread opposition to the party's policies and growing influence. Separately, firefighters in Stuttgart were battling a major blaze at the same time.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-news-afd-kicks-off-conference-amid-massive-protests/live-77830605?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "葬儀での束の間の団結の裏に潜むイラン指導部の深い亀裂", "title_en": "Iran's Leaders Show Deep Divisions Beneath Funeral's Momentary Unity", "summary_ja": "イランの指導者たちは葬儀の場で一時的に結束を見せたものの、内部の政治的分裂はすぐに再び表面化した。アヤトラ・モジュタバ・ハメネイ師の欠席が、イランの政治circles内で誰が実質的に国を動かしているのかという疑問を呼び起こしている。こうした緊張は、イランの現在の指導体制が脆弱で分裂した状態にあることを浮き彫りにしている。", "summary_en": "The funeral of a senior Iranian figure briefly brought the country's leaders together, but underlying political divisions quickly resurfaced. The notable absence of Ayatollah Mojtaba Khamenei has sparked questions within Iranian political circles about who truly holds power in the country. These tensions highlight the fragile and fractured nature of Iran's current leadership structure.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/04/world/middleeast/iran-supreme-leader-funeral-divisions.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ルワンダ、7月4日を「解放記念日」としてツチ族虐殺の終結を追悼", "title_en": "Rwanda Marks July 4 as Liberation Day, Remembering End of Tutsi Genocide", "summary_ja": "中央アフリカのルワンダは、1994年にツチ族を標的とした虐殺が終結した日として、7月4日を「解放記念日」として毎年追悼している。この大量虐殺では数十万人もの命が奪われた。この日はルワンダにとって、20世紀最大級の人道的悲劇を忘れないための重要な記念日となっている。", "summary_en": "Rwanda commemorates July 4 as Liberation Day, marking the end of the 1994 genocide against the Tutsi ethnic group. The murderous campaign claimed the lives of hundreds of thousands of people in the Central African nation. The day serves as a solemn reminder of one of the 20th century's most devastating humanitarian tragedies.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/04/world/africa/rwanda-july-4-liberation-day.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ政権の渡航規制がメキシコ観光に追い風、ワールドカップへの期待も高まる", "title_en": "Trump's Travel Restrictions Boost Mexican Tourism as World Cup Approaches", "summary_ja": "トランプ政権による渡航規制の影響で、米国を避けた旅行者がメキシコに流れ、同国の観光業が恩恵を受けている。メキシコ当局はワールドカップ開催も追い風に、世界第5位の観光大国入りを目指している。一方、ワールドカップが長期的な観光促進につながるかどうかについては、懐疑的な見方も存在する。", "summary_en": "Mexico is seeing unexpected benefits from U.S. travel restrictions under the Trump administration, with tourism numbers rising as some travelers opt for Mexican destinations. Mexican officials are hopeful that the upcoming World Cup will further accelerate growth, potentially pushing the country to become the fifth most visited nation in the world. However, some critics remain skeptical about whether the World Cup will deliver lasting long-term tourism gains.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/04/world/americas/world-cup-mexico-tourism-trump.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "人質交渉の膠着打開でパレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を二分する軍事ゾーンを越えて避難民のパレスチナ人が帰還することを許可した。これは人質解放をめぐる交渉の行き詰まりが打開されたことを受けた措置である。今回の動きは、ガザ地区内の人道状況における重要な転換点となっている。", "summary_en": "Israel has permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The movement comes after a breakthrough in negotiations over hostage releases ended a prolonged deadlock. The development marks a significant shift in the humanitarian situation within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Property Sector Crisis", "summary_ja": "中国の大手不動産デベロッパー、万科（ヴァンキー）が巨額の損失を報告し、同国の不動産危機が一段と深刻化していることが浮き彫りになった。万科の経営難は、不動産不況がどこまで広がるかについて新たな懸念を呼び起こしている。中国政府が事態の安定化に向けて介入するかどうかに市場の注目が集まっている。", "summary_en": "Leading Chinese property developer Vanke has reported a massive financial loss, signaling that the country's real estate crisis continues to worsen. The troubles at Vanke raise fresh concerns about how far the property downturn may spread across the sector. Analysts and investors are watching closely to see whether the Chinese government will intervene to stabilize the situation.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still Embedded From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性人質は長期間にわたって単独で拘束され、約8か月を地下トンネルの中で過ごしたという。この事実は、ハマスによる襲撃で拉致された人々が受けた深刻な肉体的・精神的被害を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The findings highlight the severe physical and psychological toll endured by those taken captive during the Hamas assault.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "英国、女性・女児向け海外教育プログラムを2年で廃止", "title_en": "UK axes £45m overseas education programme for women and girls after two years", "summary_ja": "英国政府は、アフリカ・アジア・中東で100万人の女子生徒の就学継続を目指す「女性エンパワーメントのための高等教育強化（SHEFE）」プログラムを、発表からわずか2年で廃止した。総額4500万ポンドの予算が組まれていたこの取り組みは、保守党政権下で鳴り物入りで発表されたものだった。廃止は英国政府による幅広い対外援助削減の一環とされている。", "summary_en": "The UK government has cancelled the Strengthening Higher Education for Female Empowerment (SHEFE) programme, just two years after it was announced. The £45m initiative aimed to keep one million girls in school across Africa, Asia and the Middle East. The scheme was scrapped as part of broader aid cuts by the British government.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/04/overseas-education-project-for-women-and-girls-axed-by-uk-after-two-years", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モディ首相、海外歴訪でまた勲章を受章―セーシェルで「青い地平線の守護者」賞", "title_en": "Modi Collects Yet Another Foreign Honor on Overseas Trip to Seychelles", "summary_ja": "インドのナレンドラ・モディ首相は、最近のセーシェル訪問でパトリック・エルミニー大統領から「青い地平線の守護者」賞を授与された。モディ首相は海外歴訪のたびに各国から勲章や栄誉を受け取る習慣があり、中には同首相のために新設された賞も存在する。こうした姿勢に対し、批判的な見方も出ている。", "summary_en": "Indian Prime Minister Narendra Modi received the 'Guardian of the Blue Horizon' award from Seychelles President Patrick Herminie during a recent visit to the island nation. The honor is among the latest in a long pattern of Modi collecting prestigious awards during his foreign travels, with some created specifically for him as their first and only recipient. Critics have noted his eagerness to accept such accolades on the international stage.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/03/narendra-modi-awards-honours-overseas-trips", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コートジボワールの洪水で59人死亡、西アフリカ全域で豪雨被害", "title_en": "Côte d'Ivoire Floods Kill 59 as West Africa Hit by Deadly Rains", "summary_ja": "コートジボワールでは5月以降の洪水により少なくとも59人が死亡し、当局は雨季の捜索救助活動が続く中、死者数がさらに増加する恐れがあると警告している。被害は西アフリカ全域に広がっており、ガーナで13人が死亡したほか、ベナン、トーゴ、ナイジェリアでも洪水が発生している。5月から7月にかけての雨季は年々被害が深刻化していると当局者は述べている。", "summary_en": "Floods in Côte d'Ivoire have killed at least 59 people since May, with authorities warning the death toll could rise as rescue operations continue during the rainy season. The disaster has spread across West Africa, with Ghana reporting 13 deaths and flooding also affecting Benin, Togo, and Nigeria. Officials say the rainy season, which runs from May to July, is becoming increasingly deadly.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/02/cote-d-ivoire-floods-dead-west-africa-rains", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国の関与後退でNATOは東欧防衛を再考", "title_en": "NATO Rethinks Eastern Europe Defense as US Commitment Wavers", "summary_ja": "米国の同盟へのコミットメントに不透明感が高まる中、NATO加盟国は東欧防衛戦略の見直しを迫られている。ドイツはかつて自国軍が蹂躙した地域に戦車を派遣するなど、防衛面での存在感を高めている。米国が従来のリーダーシップ的役割から退く可能性を背景に、欧州は自律的な防衛能力の構築を急いでいる。", "summary_en": "NATO allies are reassessing their strategy for defending Eastern Europe amid growing uncertainty over American military commitment to the alliance. Germany is playing an increasingly prominent role, deploying tanks to a region its forces once devastated during World War II. The shift signals a broader European effort to build autonomous defense capabilities as the US potentially pulls back from its traditional leadership role.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/07/02/nato-ponders-how-to-defend-eastern-europe-as-america-pulls-back", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "同盟国がアメリカに圧力をかける方法を学ぶ", "title_en": "Allies Learn How to Bully America Over Trade", "summary_ja": "トランプ政権が強硬な通商政策を推進する中、一部の米国同盟国は自国の経済的強みを活用して対抗する手段を模索している。世界最先端の半導体製造を誇る台湾は、ワシントンに対して大きな交渉力を持つ可能性がある。半導体製造における台湾の圧倒的な優位性は、米国の圧力に抵抗・交渉するための希少なカードとなり得る。", "summary_en": "As Donald Trump pursues an aggressive trade policy, some US allies are exploring ways to leverage their economic strengths to push back. Taiwan, home to the world's most advanced semiconductor manufacturing, may hold significant bargaining power over Washington. The island's dominance in chipmaking gives it a rare tool to resist or negotiate American pressure.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/30/allies-learn-how-to-bully-america", "state_media": false, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大学生の学力は思っているより低い", "title_en": "Students are doing worse than you think", "summary_ja": "新たな分析により、大学生の学力が驚くほど低いレベルにあることが明らかになった。一部の高等教育機関の学生は、10歳児と同等の学力しか示していないという。この調査結果は、中等・高等教育の質と水準に対する深刻な懸念を呼び起こしている。", "summary_en": "A new analysis reveals that college and university students are performing at surprisingly low academic levels. Some higher education students are testing at competency levels equivalent to ten-year-old children. The findings raise serious concerns about the quality and rigor of education systems at both secondary and tertiary levels.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アメリカ独立250周年：幻滅の記念日", "title_en": "250 Years of American Independence: A Disenchanted Anniversary", "summary_ja": "アメリカが建国250周年を迎えるにあたり、トランプ氏の二期にわたる政権が国内の分断を深め、国民的結束を損なっている。建国文書に掲げられた平等の理念や三権分立の仕組みは揺らぎ、抜本的な改革は困難な状況だ。一方、歴史家たちは過去の危機を乗り越えてきた歴史を踏まえ、冷静な視点を持つよう呼びかけている。", "summary_en": "As the United States approaches its 250th anniversary, Trump's two terms in office have deepened divisions and undermined national cohesion. The founding ideals of equality and the system of checks and balances are under strain, with meaningful reform appearing increasingly out of reach. Yet historians urge perspective, noting that Americans' faith in their shared history, while eroding, has survived crises before.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/07/04/250-years-of-american-independence-a-disenchanted-anniversary_6755138_4.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "記録的熱波でフランスの野生動物が危機的状況に", "title_en": "France Heatwave Pushes Wildlife to Crisis Point", "summary_ja": "激しい熱波により、フランス全土の野生動物救護センターに熱中症にかかった動物が記録的な数で搬送されている。ジロンド県オーダンジュにあるフランス野鳥保護連盟（LPO）の施設では、これまでにない数の動物を受け入れており、全国各地の救護施設でも同様の傾向が見られる。この事態は、極端な高温現象がフランスの野生動物に与える脅威の深刻化を浮き彫りにしている。", "summary_en": "A severe heatwave has caused a record number of heat-stricken animals to arrive at wildlife rescue centers across France. The LPO facility in Audenge, Gironde, reported unprecedented intake numbers, reflecting a nationwide trend at rehabilitation sites. The crisis highlights the growing threat that extreme heat events pose to French wildlife populations.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/article/2026/07/04/devastating-heatwave-leaves-france-s-wildlife-in-crisis_6755134_114.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "19歳の天才ポール・セイシャス、フランスのツール・ド・フランス優勝への希望を背負う", "title_en": "Teen Phenom Paul Seixas Leads France's Tour de France Hopes at 19", "summary_ja": "フランスの19歳サイクリスト、ポール・セイシャスが土曜日にバルセロナで開幕するツール・ド・フランスに初出場する。若さと経験不足にもかかわらず、4度の優勝を誇るタデイ・ポガチャルへの主要な対抗馬の一人として既に注目されている。その台頭はフランス国内で大きな期待を呼び、本格的な優勝争いへの参戦が期待されている。", "summary_en": "French cyclist Paul Seixas, just 19 years old, is making his debut at the Tour de France, which kicks off Saturday in Barcelona. Despite his youth and inexperience at the race, he is already considered one of the primary challengers to four-time champion Tadej Pogacar. His emergence has generated significant excitement in France as fans hope he can mount a serious title challenge.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/sports/article/2026/07/04/paul-seixas-the-19-year-old-phenom-carrying-france-s-tour-hopes_6755139_9.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アルゼンチンに敗れるもカーボベルデのサポーターはチームのW杯活躍に歓喜", "title_en": "Cape Verde Fans Proud Despite World Cup Loss to Argentina", "summary_ja": "カーボベルデのサポーターたちは、ワールドカップ王者アルゼンチンに敗れたものの、自国チームの素晴らしいW杯での戦いを祝福した。小さな島国の代表チームが世界の舞台で見せた力強いパフォーマンスは、国民に大きな誇りをもたらした。カーボベルデ国内外のファンにとって、今回のチームの躍進は深く心に響くものとなった。", "summary_en": "Fans of Cape Verde celebrated their national team's remarkable World Cup run even after a loss to reigning world champions Argentina. The tiny island nation's strong performance on the global stage left supporters feeling immensely proud. The team's journey resonated deeply with Cape Verdeans both at home and abroad.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/7/4/cape-verde-fans-overjoyed-with-teams-world-cup-run-despite-argentina-loss?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "最高指導者ハメネイ師の葬儀がテヘランで開幕、数千人が参列", "title_en": "Thousands Gather in Tehran as Funeral Ceremonies Begin for Supreme Leader Khamenei", "summary_ja": "イランの最高指導者アリー・ハメネイ師の公式葬儀がテヘランで始まり、数千人の市民が追悼のために集まった。大規模な葬列はイランの歴史における重要な節目となり、国全体が長年にわたり国家を率いた指導者の死を悼んでいる。首都テヘランの街路は、ハメネイ師への最後の別れを告げようとする群衆で埋め尽くされた。", "summary_en": "Thousands of mourners have gathered in Tehran for the public grand procession honoring Iran's late Supreme Leader Ali Khamenei. The large-scale funeral ceremonies mark a significant moment in Iranian history as the country mourns the passing of its long-serving top leader. Crowds filled the streets of the capital to pay their final respects to Khamenei.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/4/thousands-gather-as-khamenei-funeral-ceremonies-open-in-tehran?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "武装勢力がマリ各地の複数の町を攻撃", "title_en": "Armed Fighters Attack Multiple Towns Across Mali", "summary_ja": "トゥアレグ族主導の武装集団が、マリ軍とロシア人戦闘員が駐留する北部の町を含む複数の町への攻撃を主張した。この組織的な攻撃は、同地域における紛争の大幅なエスカレーションを示している。今回の攻撃は、外国軍事要員の存在下でもマリの不安定な情勢が続いていることを浮き彫りにした。", "summary_en": "A Tuareg-led armed group has claimed responsibility for attacks on multiple towns across Mali, including a northern town that serves as a base for Malian troops and Russian fighters. The coordinated assaults mark a significant escalation in ongoing conflict in the region. The attacks highlight the continued instability in Mali amid the presence of foreign military personnel.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/4/armed-fighters-attack-multiple-towns-across-mali?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "新説：最小の古代人類は狩猟者ではなくトカゲの食べ残しを漁る存在だった", "title_en": "New Theory: Tiny Ancient Human Was a Scavenger, Not a Hunter", "summary_ja": "これまでの定説を覆す新たな仮説が、既知の中で最も小さな人類種であるホモ・フロレシエンシスについて提唱された。研究者らは、この古代の人類が積極的な狩猟者ではなく、トカゲなどの食べ残しを漁って生き延びていた可能性を示唆している。この仮説は、小柄な人類の親戚の行動様式や食習慣に関する理解を大きく塗り替えるものだ。", "summary_en": "A new theory challenges previous assumptions about Homo floresiensis, the smallest known human species. Researchers now suggest that rather than being active hunters, these ancient hominins may have survived by scavenging leftover lizard remains. The hypothesis reshapes our understanding of the behavioral and dietary habits of this diminutive human relative.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihgJBVV95cUxQNGNyZ3dDUkc5djF6cDJqMldsbWo3VkcyRFl4S0t1bS13WWtoLVgxUHhIZV9MUXR3NmNyTVlNeGpQZGMwc3dmbGRkZHRkWmNZZ0Y1V2R3Q2FpZUd2dUVlc0RkUF90Ym5OVmJMRVNsWU9mTjkzS25DVWE2UFNyLTdyZTQ0dUZKcU1EUGFnOFFLaUc4TGN5eHdqRDMyTGVaWkcxdURnbzRQUGc0dFhreGRLazBJaERWdlRueEtBS0ZjYXk5bGtDdF9UTzFZelotcVVzSGt2N2VUVURaaXJjSUdfQ1kzTHM1amFxVUprazdIb1RLcmF0endHZzZlVm10UnRCZlFKVm13?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "「外交的津波」の警告を無視し続けたイスラエル、ついにその波が到来", "title_en": "Israel Has Long Ignored Warnings of a 'Diplomatic Tsunami.' Now It Has Arrived", "summary_ja": "イスラエルは長年にわたり、占領地政策や入植地拡大が深刻な国際的反発を招くという警告を無視してきた。しかし今、かつてない規模の外交的孤立が現実のものとなりつつある。ハアレツ紙の分析は、こうした警告を繰り返し退けてきた結果、イスラエルは国際社会からの圧力に対して無防備な状態に置かれていると指摘している。", "summary_en": "For years, Israeli officials were warned that continued occupation and settlement expansion would eventually trigger a massive international backlash. That moment appears to have arrived, as Israel now faces unprecedented diplomatic isolation from allies and adversaries alike. The analysis in Haaretz argues that repeated dismissals of these warnings have left Israel ill-prepared for the scale of the current global pressure.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMioAJBVV95cUxQY2tfNUR6NU9ySFNlYjNIM09UTHBuVEZSdU52Q0NUbzlqV0FIQWx6WlF3UlRQTGU1UmVOLWk2emVuRG9uR29aNTJmWElHSE9jSXQzM0ZZVTJPNjB3bUh2M2s1WVo2bUpCTDQyNEtDVlFGYjU4ZUtMamkxV0ttbWp6SXRvOW5uNzRxZzhRWG9vVlgyeHdHSXg4dTNINjFBdDc5ZHU1YXpBbm8wRHlxR1ZyN2d0eGpqa1Uwald1QTBOTGlLbGRVOWVmZm1mRnNzSXFQTkloRlhneWJPcnp0SFFxRGRZckU3amN5cElka003WU5DMnVndzY3Y3JQbXA0Q0g0THNlbE4tLVlBVnhMLXhYbHd2YzVvb1dLMnFZYllQUUs?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イスラエルの先進システムがカタールとサウジアラビアに売却、文書が示す", "title_en": "Advanced Israeli Systems Sold to Qatar and Saudi Arabia, Documents Reveal", "summary_ja": "ハアレツ紙が入手した文書と画像により、イスラエルの先進システムがカタールおよびサウジアラビアに売却されていたことが明らかになった。イスラエルとこれらの湾岸諸国の間には正式な外交関係がないため、この事実は重大な意味を持つ。報道は、公式外交の表面下で秘密裏に防衛・技術取引が行われていたことを示唆している。", "summary_en": "Documents and images obtained by Haaretz indicate that advanced Israeli systems were sold to Qatar and Saudi Arabia. The revelation is significant given the lack of formal diplomatic relations between Israel and these Gulf states. The report suggests covert defense or technology trade taking place beneath the surface of official diplomacy.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMimgJBVV95cUxQUm8yZkRJQm9NMWtYSGp1RWpZRGM3ekhFU21YMGxoSnhwLTlwQVd3ZWxGNHk5N05zbTVOM05aX3FDQTNJemxWdEQyR1czOHlnU3QzcHAyYzN1RDhGN3hoMmlVVHhlbV8zS3ZQTVdjTi1ZN1p0TS1WR0pjRTVaMHdRTDFydGpFaHBXeThVV1FWbk9kSndSYTdNWEpzYWV3d3YyOWNCaF9TTHZyLWdBY3JoNGRPTElsVjU3NEdFZjdzeUMzRm95NzA5UUJQcVE0dV9jeVRXWlJ6STBCWG40bHlFLS0tYlowNHJPaHhsM0QxUzZIYW1nNDJOVDdRbE1mUk5mS09ibTlSdUVoZkxYOU1LSXNMNzIwNmhtdVE?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国防省からのお知らせ", "title_en": "Mindef News Update", "summary_ja": "シンガポール国防省（Mindef）が公式アップデートを発表した。このお知らせは2026年7月4日（土）にストレーツ・タイムズのニュースレターを通じて配信された。読者はストレーツ・タイムズのサイトから追加の無料ニュースレターへの登録や購読管理を行うよう案内されている。", "summary_en": "The Singapore Ministry of Defence (Mindef) has issued an official update. The notice was distributed via The Straits Times newsletter on Saturday, July 4, 2026. Readers are directed to manage their subscriptions or sign up for additional free newsletters through The Straits Times.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "夕刊アップデート – ストレーツ・タイムズ", "title_en": "Evening Update – The Straits Times", "summary_ja": "ストレーツ・タイムズは2026年7月4日（土）に夕刊ニュースレター「イブニング・アップデート」を配信した。このメールは同紙の定期購読者向けに送付されたものである。読者は公式チャンネルを通じて、購読の管理や追加の無料ニュースレターへの登録を行うよう案内された。", "summary_en": "The Straits Times published its Evening Update newsletter on Saturday, July 4, 2026. The brief dispatch was distributed via email to subscribers of the publication. Readers were directed to manage their subscriptions or sign up for additional free newsletters through the outlet's official channels.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニング・ブリーフィングは、主要ニュースを読者に届ける毎日のニュースレターです。今回の配信は2026年7月4日（土曜日）付けです。読者はリンクを通じて購読の管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a daily newsletter digest delivering top news stories to subscribers. This edition is dated Saturday, July 4, 2026. Readers can manage their subscription or sign up for additional free newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "元インドネシア教育相ナディエム、クロームブック汚職事件で懲役10年の判決", "title_en": "Former Indonesian Education Minister Nadiem Makarim Sentenced to 10 Years in Chromebook Corruption Case", "summary_ja": "インドネシアの元教育大臣ナディエム・マカリムが、クロームブックの調達をめぐる汚職事件で懲役10年の判決を受けた。この事件は、全国の学校向けにノートパソコンを配布する政府プログラムにおける不正疑惑に関するものである。現職閣僚経験者が関与した汚職事件として、インドネシア国内で大きな注目を集めている。", "summary_en": "Former Indonesian Education Minister Nadiem Makarim has been sentenced to 10 years in prison in connection with a corruption case involving the procurement of Chromebook laptops. The case centers on alleged irregularities in a government program to distribute devices to schools across Indonesia. The verdict marks a significant development in one of Indonesia's high-profile corruption prosecutions involving a former cabinet minister.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMivgFBVV95cUxOQVBXd2RnQTdQMS1UWUZmV1liTGMzbXN5TXNXdEZBTi11QVJMOEhuSEg1YWR4R0NvejRIRUstUW1kNzdFRkVJYXVXU1VTS2lPUmRiUjdnTURiakdicFhwUW8wYmV4UHUtOEh1aWJpNndqUVpqOWZTbmhwMXRUWmI0aDRHdUE0dE9xMXJjbFNwM3Foem4tNHNVa2Y3b3BTd0VJaXJrM0M5N3BCbkNoMkZEZVJLTEQ1bkdYc2xoNm93?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "持続可能性の建前と経済的現実：両立は可能か？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、途上国が直面する持続可能性への公約と経済的圧力の間に生じる緊張を検証している。政府や企業は環境に配慮した言葉を掲げながら、実際には環境目標と相反する成長優先の政策を推進することが多い。記事は、長期的な持続可能性目標と短期的な経済的現実を真に両立させることが可能かどうかを問いかけている。", "summary_en": "The Jakarta Post examines the growing tension between sustainability commitments and economic pressures facing developing nations. Governments and corporations often espouse green rhetoric while pursuing growth-driven policies that conflict with environmental goals. The article questions whether it is genuinely possible to reconcile long-term sustainability targets with short-term economic realities.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コモド島への観光客が増加傾向に", "title_en": "Tourist Visits to Komodo Island on the Rise", "summary_ja": "世界的に有名なコモドオオトカゲの生息地であるコモド島で、観光客数が大幅に増加している。国内外からの関心の高まりが、インドネシアを代表する自然遺産への訪問者増加に反映されている。当局や自然保護団体は、希少な爬虫類が生息する脆弱な生態系を守るため、この急増を注視している。", "summary_en": "Komodo Island, home to the world-famous Komodo dragons, is experiencing a significant increase in tourist arrivals. The uptick in visitors highlights growing international and domestic interest in Indonesia's iconic natural heritage site. Authorities and conservationists are monitoring the surge to ensure the fragile ecosystem and its rare reptile inhabitants are protected.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikwFBVV95cUxOQnVENlpVakhEVnVrUXdKUzdjUVljNjJzQ2pMRnliQTB5Wm4xV01fdEx3Y3JwaWcxc3Z3SUM2U1MyLU9fNHV6MFJ6MTRmN2E1NTBMZlZKU3d0NGZ2VU0yUVBEZzF4NG4xdTE2NmFXVDQ3TDYyMHRQQ1FaeVhDaVFmWkE1ZmpWOHhiNmxRd0NmbnpSdlk?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "駐中国インド大使、中国の対印投資拡大と輸出増加を呼びかけ", "title_en": "India's Envoy to China Calls for More Chinese Investment and Greater Indian Exports", "summary_ja": "インドの駐中国大使ヴィクラム・ドライスワミ氏は、中国によるインドへの投資拡大が両国関係全体にとって有益であると訴えた。また、インドが世界的に競争力を持つ医薬品分野を中心に、インドから中国への輸出拡大を求めた。この発言は、両国間の外交正常化が進む中、貿易不均衡の是正を目指すインドの姿勢を示すものとみられる。", "summary_en": "India's Ambassador to China, Vikram Doraiswami, has advocated for increased Chinese investment in India, saying it would benefit the broader bilateral relationship. He also made a case for expanding Indian exports to China, particularly in sectors like pharmaceuticals where India holds strong global competitiveness. The remarks signal India's intent to rebalance trade ties with China amid ongoing diplomatic normalization efforts.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/more-chinese-investment-good-for-larger-relationship-says-indias-envoy-to-china/article71182210.ece", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラン、最高指導者ハメネイ師の国葬をテヘランで開始", "title_en": "Iran Holds State Funeral for Supreme Leader Ayatollah Ali Khamenei in Tehran", "summary_ja": "イランは最高指導者アリー・ハメネイ師の国葬をテヘランで開始した。当局はハメネイ師の遺体を収めた棺をガラスケースに入れ、テヘランのグランド・モサッラで公開し、市民が別れを告げられるようにした。この式典は、中東地域で緊張が続く中、イランにとって歴史的な節目となっている。", "summary_en": "Iran has begun the state funeral for Supreme Leader Ayatollah Ali Khamenei, who has passed away. Authorities placed his casket in a glass case on display at the Grand Mosalla in Tehran for mourners to pay their respects. The ceremony marks a historic moment for Iran amid ongoing tensions across the West Asia region.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-live-updates-july-4-2026-khamenei-funeral-ceremonies/article71181636.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ブンディブギョ型エボラ治療薬の臨床試験がDRCで開始、WHOが発表", "title_en": "Trial for Bundibugyo Ebola Treatment Begins in DRC, WHO Announces", "summary_ja": "世界保健機関（WHO）によると、コンゴ民主共和国でブンディブギョ型エボラウイルスに対する新たな治療薬の臨床試験が開始された。試験では、マップ・バイオファーマシューティカルの実験的抗体薬「MBP134」を単独投与する場合と、ギリアド・サイエンシズの抗ウイルス薬レムデシビルと併用する場合の両方が評価される。ブンディブギョ型エボラは現在承認された治療薬が存在しない株であり、今回の試験はその解決策を目指すものだ。", "summary_en": "A clinical trial for a new Bundibugyo Ebola virus treatment has begun in the Democratic Republic of Congo, according to the WHO. The trial will assess Mapp Biopharmaceutical's experimental MBP134 antibody both as a standalone therapy and in combination with Gilead Sciences' antiviral drug remdesivir. Bundibugyo Ebola is a distinct strain of the virus for which no approved treatment currently exists.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/sci-tech/health/trial-for-bundibugyo-ebola-treatment-starts-in-drc-who-says/article71182211.ece", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台北動物園、帝王切開で生まれた珍しいオランウータンの双子を迎える", "title_en": "Taipei Zoo Welcomes Rare Orangutan Twins Born via Cesarean Section", "summary_ja": "台北動物園で、帝王切開によって珍しいオランウータンの双子が誕生した。オランウータンの双子は非常にまれなケースであり、動物園にとって重要な出来事となっている。獣医スタッフが新生児の健康と成長を注意深く見守っている。", "summary_en": "Taipei Zoo has welcomed a rare set of orangutan twins, delivered via cesarean section. Twin births are exceptionally uncommon among orangutans, making this a significant event for the zoo. The newborns are being closely monitored by veterinary staff to ensure their health and development.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE9reEFsVm1NSmpnWmp3aXFjZ3lPdllyaFhqR2xiTkJMNk10M3BfNHplalBTWFBPVFZFY2NvVUNnN1ZpOERVaGtNbEhqXzY4c3M2MXl2S1Z3?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台湾と中国、両岸経済依存度めぐり対立", "title_en": "Taiwan and China Clash Over Cross-Strait Economic Dependence", "summary_ja": "台湾と中国は、両岸間の経済的相互依存の程度とその影響をめぐって対立している。台湾の中国経済への依存度と、それが両岸関係に与える意味について、双方は異なる見解を示している。台湾が貿易相手国の多様化を図る一方、中国は経済的なつながりを外交的影響力として活用しようとしており、この論争は両岸間の緊張を反映している。", "summary_en": "Taiwan and China are engaged in a dispute over the extent and implications of their economic interdependence. The two sides hold contrasting views on how reliant Taiwan is on the Chinese economy and what that means for cross-strait relations. The debate reflects broader tensions as Taiwan seeks to diversify its trade partnerships while China emphasizes economic ties as leverage.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE9QWXlxOHZiVUhIbDBrVnZYc3hTblgxRlZJcTlLSVNQaktiRE1Fd0xCQ29kVWVweXFMMnNKajZjclJXUFBBOWxnbXlGb3VBd3d1UVZtU3h1aw?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "香港の民主活動家・林栄基氏が台北で70歳で死去", "title_en": "Hong Kong Dissident Lam Wing-kee Dies at 70 in Taipei", "summary_ja": "香港の民主活動家である林栄基氏が台湾・台北で70歳の生涯を閉じた。同氏は中国共産党指導部を批判する政治的に敏感な書籍を販売していた書店主として知られていた。2015年に中国当局に拘束された「銅鑼湾書店失踪事件」の当事者の一人であり、その後香港を脱出して台湾に移住していた。", "summary_en": "Hong Kong dissident Lam Wing-kee has died at the age of 70 in Taipei, Taiwan. Lam was a prominent bookseller known for selling politically sensitive publications critical of Beijing's leadership. He had been living in Taiwan after fleeing Hong Kong, where he had been detained by Chinese authorities in 2015 as part of the Causeway Bay Books disappearances.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE91ekNvRWVlNElqaHE1ckdsT0VZS2JLNDd3TGYzUHZfZURiV2ltOXBTQWxsSklTNlpNQzJURkM0TGM3SkRFOEZhRl9TX3R0cm5Id3oxRTBlcw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震の瓦礫に埋まった父親を救出へ、ブラジル在住家族が支援呼びかけ", "title_en": "Brazilian-Based Venezuelan's Family Seeks Help to Find Father Buried in Earthquake Rubble", "summary_ja": "約20年間ブラジルに在住するベネズエラ人フェリックス・トバル（70歳）は、ベネズエラで地震が発生した際にラ・グアイラ州プラヤ・グランデの「ラ・アルメンドリーナ」ベーカリーにいたとみられる。家族はボランティアが瓦礫を掘り進めるための道具の寄付を募っている。トバル氏はブラジルとベネズエラの両国を行き来しながら生活していた。", "summary_en": "The family of 70-year-old Félix Tovar, a Venezuelan who has lived in Brazil for nearly 20 years, is collecting donations of tools to aid volunteers searching for him in the rubble of La Almendrina Bakery in Playa Grande, La Guaira. Tovar was at the bakery when earthquakes struck Venezuela. Volunteers are working to dig through the debris in hopes of finding him alive.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/brazilian-mobilizes-help-to-find-father-buried-under-rubble-in-venezuela.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ、米国強制送還者が死亡した被災地へのアクセスを遮断", "title_en": "Venezuela Blocks Access to Site Where U.S. Deportees Died in Earthquake", "summary_ja": "ベネズエラ政府は、先週発生した地震で壊滅的な被害を受けた沿岸地域ラ・グアイラへのアクセスを遮断した。この地震では米国から強制送還された人々を含む多数の死者が出ている。イェイソン・ラムス（47歳）は、行方不明の兄弟を捜すため、国境州タチラからラ・グアイラまで国内を横断した。アクセス制限により、救助・復旧活動や家族による安否確認が困難な状況となっている。", "summary_en": "Venezuela has blocked access to La Guaira, the coastal region devastated by last week's earthquakes, where a number of U.S. deportees were reported to have died. Yeison Lamus, 47, traveled across the country from the border state of Táchira searching for his missing brother amid the destruction. The restrictions are hampering rescue and recovery efforts as families desperately seek information about loved ones.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/venezuela-blocks-access-to-site-where-us-deportees-died.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "地震でベネズエラの移住危機が悪化、国内避難民が急増", "title_en": "Venezuela's Migration Crisis Worsens as Earthquakes Displace Thousands Internally", "summary_ja": "少なくとも10年にわたりベネズエラを苦しめてきた強制移住の危機が、約1週間前に発生した地震により新たな局面を迎えた。この災害により国内避難民が急増し、すでに深刻な人道的状況がさらに悪化している。政治・経済的混乱に長年苦しんできた国民にとって、複合的な危機が重くのしかかっている。", "summary_en": "Venezuela's decade-long forced migration crisis has taken a new turn following earthquakes that struck the country nearly a week ago. The disasters have triggered a surge in internally displaced people, adding a new layer to an already severe humanitarian situation. The compounding crises are straining resources and deepening the struggles of a population already battered by years of political and economic turmoil.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/venezuelas-longstanding-migration-crisis-deepens-after-earthquakes.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ハッサン、エジプトの歴史的W杯勝利を祝う「我々は歴史に刻まれた」", "title_en": "Hassan celebrates Egypt's landmark World Cup win: 'We've entered history'", "summary_ja": "エジプト代表FWハイセム・ハッサンは、チームの歴史的なワールドカップ勝利の重大さについて、試合終了のホイッスルが鳴って初めて実感が湧いたと語った。ファラオズはエジプトサッカー史に残る画期的な勝利を収め、国民に大きな喜びをもたらした。ハッサンの感情的な反応は、この勝利が選手たちと国全体にとっていかに重要であるかを物語っている。", "summary_en": "Egyptian forward Haissem Hassan reflected on the significance of Egypt's historic World Cup victory, saying the magnitude of the achievement only hit him after the final whistle. The Pharaohs secured a landmark result that has etched their name into Egyptian football history. Hassan's emotional reaction underscored the importance of the win for the nation and its players.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/sports/football/892871-weve-entered-egypts-history-hassan-celebrates-pharaohs-landmark-world-cup-win.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イグボ・エゼ・サウス議長、アフリケアの卓越賞を受賞", "title_en": "Igbo-Eze South Chairman Receives Africare Excellence Award", "summary_ja": "イグボ・エゼ・サウス地方自治体議長が、アフリケアより卓越賞を授与された。ウクウエズ議長は受賞スピーチの中で、この栄誉をイグボ・エゼ・サウスの住民たちに捧げると述べ、彼らの信頼と協力が奉仕への意欲を高めていると語った。今回の受賞は、地域社会への貢献と公共サービスへの献身が評価されたものである。", "summary_en": "The chairman of Igbo-Eze South Local Government Area has been honored with an excellence award from Africare. In his acceptance remarks, Mr. Ukwueze dedicated the recognition to the people of Igbo-Eze South, citing their confidence, cooperation, and support as motivating forces. The award highlights his commitment to public service in the community.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/promoted/892865-igbo-eze-south-chairman-receives-africares-excellence-award.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "PZカッソンズの年間純利益が298%急増、資産売却益が収益を押し上げ", "title_en": "PZ Cussons' Annual Profit Surges 298% Driven by Asset Disposal Gains", "summary_ja": "ナイジェリアの消費財大手PZカッソンズは、当会計年度の純利益が約4倍のN491億に達し、前年比298%増となったと発表した。この急成長の主な要因は固定資産の売却益であり、前年のわずかN650万に対し、N387億を計上した。この一時的な資産売却益が同社の業績を大きく押し上げた形となった。", "summary_en": "PZ Cussons Nigeria reported a nearly fourfold increase in net profit to N49.1 billion for the fiscal year, a 298% jump from the prior period. The surge was largely driven by profit on disposal of fixed assets, which contributed N38.7 billion compared to just N6.5 million the previous year. The consumer goods company's underlying business performance was bolstered significantly by this one-time asset disposal gain.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/business/business-news/892863-pz-cussons-annual-profit-quickens-by-298-as-asset-disposal-boosts-earnings.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震の生存者が復興を開始", "title_en": "Venezuela Earthquake Survivors Begin Rebuilding Efforts", "summary_ja": "新華社・CGTNによると、ベネズエラで発生した地震の生存者たちが地域の復興作業を開始したと報じられている。国営メディアは、被災した住民が損壊した住宅やインフラの修復に取り組んでいると伝えている。新華社・CGTNは復興活動が進められていると報じているが、被害の規模や外部支援の詳細については国営報道では限定的な情報にとどまっている。", "summary_en": "Xinhua/CGTN reports that survivors of a recent earthquake in Venezuela have begun the process of rebuilding their communities. State media reports that affected residents are working to restore damaged homes and infrastructure in the wake of the disaster. Xinhua/CGTN reports that recovery efforts are underway, though details on the scale of destruction and outside assistance remain limited in state coverage.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://newsus.cgtn.com/news/2026-07-04/Venezuela-s-quake-survivors-begin-rebuilding-1OuC9K0lgd2/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震の死者数が2,295人に上昇、負傷者は1万1,000人超", "title_en": "Venezuela Earthquake Death Toll Rises to 2,295 with Over 11,000 Injured", "summary_ja": "国営メディアの新華社・CGTNによると、6月24日にベネズエラを襲った2度の強い地震による死者数が2,295人に達したと報じられている。ベネズエラ国民議会のホルヘ・ロドリゲス議長は水曜日、負傷者数も1万1,267人に増加したと述べたとされる。この数字は災害の深刻な規模を示しており、救助・救援活動が続いているとされる。", "summary_en": "State-controlled Xinhua/CGTN reports that the death toll from two powerful earthquakes that struck Venezuela on June 24 has risen to 2,295. Venezuelan National Assembly President Jorge Rodriguez stated on Wednesday that the number of injured has also climbed to 11,267. The figures highlight the devastating scale of the disaster as rescue and relief efforts continue.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-02/news-1OroUaWnAAg/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国外相、サウジ外相との会談で米イラン協議にコメント", "title_en": "Chinese FM Comments on US-Iran Nuclear Talks in Meeting with Saudi Counterpart", "summary_ja": "新華社・CGTNによると、中国の外相はサウジアラビアの外相と会談し、進行中の米イラン交渉について見解を示したと伝えている。同メディアは、北京がイランの核問題をめぐる外交努力に関する立場を表明し、中国を地域の安定における建設的な関与国として位置づけたと報じている。今回の会談は、中東情勢の対話による平和的解決に対する中国の姿勢を強調するものだったと同メディアは伝えている。", "summary_en": "Xinhua/CGTN reports that Chinese Foreign Minister met with his Saudi Arabian counterpart and offered remarks on the ongoing US-Iran negotiations. State media reports that Beijing expressed its position on diplomatic efforts surrounding Iran's nuclear program, framing China as a constructive stakeholder in regional stability. The outlet reports that the meeting underscored China's stated interest in dialogue and peaceful resolution of Middle East tensions.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-01/Chinese-FM-comments-on-US-Iran-talks-in-meeting-with-Saudi-counterpart-1OqkI5m3sd2/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "FSB、クラスノダール地方でウクライナのエージェントを拘束と発表", "title_en": "FSB Claims Detention of Alleged Ukrainian Agent in Krasnodar Region", "summary_ja": "ロシアの連邦保安局（FSB）は、ウクライナの保安局（SBU）のためにスパイ活動を行ったとして、1980年生まれのアナパ市在住の男を拘束したと発表した。国営メディアのTASSによれば、容疑者は自らSBUの担当者に接触し、破壊工作やテロ関連活動への協力に同意したとされている。この事案は国家に対するスパイ行為として捜査が進められていると、同局は主張している。", "summary_en": "Russia's FSB reports that it has detained a resident of Anapa, born in 1980, on charges of intelligence gathering for Ukraine's Security Service (SBU). The agency claims the suspect independently initiated contact with an SBU representative and allegedly agreed to assist in sabotage and terrorism-related activities. TASS, a state-controlled outlet, reports that the case is being investigated as espionage against the Russian state.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/emergencies/2155635", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア国営メディア、ウクライナがコンスタンチノフカ周辺で1万3500人の兵士を失ったと主張", "title_en": "Russia Claims Ukraine Lost 13,500 Troops Near Konstantinovka in Donbass", "summary_ja": "ロシア国営メディアのTASS/RTは、ウクライナ軍がドンバス地方のコンスタンチノフカ周辺の戦闘で約1万3500人の死傷者を出したと報じている。同メディアによれば、キエフはこれらの作戦を戦場での成果を示すために展開したとされている。TASS/RTはコンスタンチノフカをドンバスにおけるウクライナの「最後の拠点」への鍵と位置づけている。", "summary_en": "Russian state media TASS/RT reports that Ukrainian forces suffered approximately 13,500 casualties in fighting around Konstantinovka. The outlet claims Kiev launched these operations in an attempt to demonstrate battlefield successes. TASS/RT characterizes Konstantinovka as the key to what it calls Ukraine's last stronghold in the Donbass region.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/defense/2155625", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア参謀本部、ウクライナ軍がコンスタンチノフカ死守を命令――西側を喜ばせるためと主張", "title_en": "Russian MoD Claims Ukraine Ordered Troops to Hold Konstantinovka to Impress Western Backers", "summary_ja": "ロシア国防省はTASS・RTを通じ、ウクライナ軍司令部がコンスタンチノフカ(コスチャンティニウカ)の死守を命じたと主張している。ロシア側の報道によれば、キーウ政権は西側支援国に対してロシア軍の進攻を阻止できると印象づけようとしたとされる。これらの主張はロシア国営メディアによるものであり、独立した検証はできていない。", "summary_en": "Russia's General Staff reports that Ukrainian command ordered forces to hold Konstantinovka in an effort to satisfy Western supporters. Russian state media TASS/RT reports that Kyiv allegedly sought to convince Western backers of Ukraine's ability to halt Russian advances in that direction. These claims originate from Russian state-controlled sources and cannot be independently verified.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/defense/2155603", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "今日の大型ハイテク株はどれほど安全か？", "title_en": "How Safe Are Today's Blockbuster Tech Stocks?", "summary_ja": "著者は、現在の注目度の高いテクノロジー株や大型IPOに潜むリスクを、過去の好景気と崩壊のサイクルとの歴史的な類比を通じて検証する。特に1987年の日本電信電話（NTT）のIPOが、現在の状況に対する警告的な先例として最も適切であると指摘する。鉄道ブームや電化ブームとの比較が盛んに行われる中、どの歴史的前例が最も当てはまるかを慎重に見極めることの重要性を訴えている。", "summary_en": "The author examines the risks surrounding today's high-profile technology stocks and mega-IPOs by drawing historical analogies to past boom-and-bust cycles. The piece highlights the 1987 Nippon Telegraph and Telephone IPO as a particularly relevant cautionary parallel. The author suggests that while analogies to railway and electrification booms are popular, investors should carefully consider which historical precedent best applies.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/japan-ntt-ipo-sobering-analogy-for-tech-stocks-today-by-barry-eichengreen-2026-07", "state_media": false, "category": "オピニオン", "full_text": "How Safe Are Today’s Blockbuster Tech Stocks?\nToday’s wave of mega-IPOs has unleashed a wave of analogies to past booms. While no analogy is perfect, an especially apposite—and sobering—case may be what followed Nippon Telegraph and Telephone’s IPO in February 1987.\nDARTMOUTH, UK—Questions about the financial implications of radical new technologies—AI, space travel, and their associated infrastructures, to pick a few—have led to a veritable analogy-fest. Is this a replay of the railway boom of the 1870s, which came to grief in the 1880s? A repeat of the electrification boom of the 1890s, which unfolded smoothly but took three decades to play out?", "translation_ja": "今日の大型ハイテク株はどれほど安全か？\n\n今日の大型IPOの波は、過去のブームとの数々の類比を生み出している。どの類比も完璧ではないが、特に適切かつ示唆に富む事例として、1987年2月の日本電信電話（NTT）のIPO後に何が起きたかが挙げられるかもしれない。\n\n英国ダートマス発――AI、宇宙旅行、そしてそれらに関連するインフラといった急進的な新技術の財務的含意をめぐる問いは、まさに類比合戦を引き起こしている。これは1870年代の鉄道ブームの再演なのか――そのブームは1880年代に破綻した。あるいは1890年代の電化ブームの繰り返しなのか――そちらは順調に進んだものの、展開するのに30年を要した。", "vocab": [{"word": "mega-IPOs", "definition": "超大型の新規株式公開のこと。「mega」は「巨大な」を意味し、市場に大きな影響を与える規模の株式上場を指す複合語。"}, {"word": "apposite", "definition": "「非常に適切な、ぴったり当てはまる」という意味の形式ばった形容詞。特定の状況や議論に対して的確に合致することを表す際に用いられる。"}, {"word": "sobering", "definition": "「（現実を直視させるような）冷静にさせる、気を引き締めさせる」という意味の形容詞。楽観的な気分に水を差し、深刻さを認識させるような事実や出来事を描写する際に使われる。"}, {"word": "analogies", "definition": "「類比、アナロジー」。異なる二つの事象や概念の間にある類似点を示すことで、理解や説明を助けるための比較手法を指す名詞。"}, {"word": "veritable", "definition": "「まさに、真の、本物の」という意味の強調的な形容詞。後に続く名詞を強調し、「まさしく〜と言える」というニュアンスを付加するために用いられる。"}, {"word": "implications", "definition": "「含意、影響、波及効果」という意味の名詞。ある事象や決定が直接的には述べられていないが論理的に導かれる結果や意味合いを指す。"}, {"word": "came to grief", "definition": "「失敗に終わった、破綻した」という意味のイディオム。計画や試みが悲惨な結末を迎えたことを表す慣用表現として使われる。"}]}, {"title_ja": "ヨーロッパのAI「ドルチェ・ヴィータ」？余暇重視文化が潜在的強みになる可能性", "title_en": "Europe's AI Dolce Vita? Leisure Culture as a Potential Advantage", "summary_ja": "筆者は、ヨーロッパがAI競争において分断された資本市場や高エネルギーコスト、高齢化する福祉国家など構造的な不利を抱えながらも、労働より余暇を重視する文化的価値観が逆説的に強みとなり得ると論じる。AIが豊かさをもたらし労働の必要性を低下させる時代において、ヨーロッパのライフスタイル志向の価値観はモデル社会としての地位を確立する可能性がある。本稿は、生産性における欠点とみられてきた特性がAI時代には優位性に転じうるという逆張りの主張を展開している。", "summary_en": "The author argues that while Europe faces significant structural disadvantages in the AI race—including fragmented capital markets, high energy costs, aging welfare states, and slow growth—its cultural emphasis on leisure over work may paradoxically become a strength. As AI drives abundance and reduces the necessity of labor, Europe's lifestyle-oriented values could position it as a model society. The piece presents a contrarian case that Europe's perceived weaknesses in productivity may transform into advantages in an AI-abundant future.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/ai-could-give-europe-unexpected-competitive-edge-by-kenneth-rogoff-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Europe’s AI Dolce Vita?\nGlacial growth, aging welfare states, and a shortage of centrist leaders suggest Europe faces a major debt crisis in the years ahead. But its emphasis on leisure over work could become a decisive advantage, positioning the continent as the leading model for thriving in an age of AI-driven abundance.\nPARIS—In many respects, the European Union appears likely to become one of the AI revolution’s biggest losers, with China and the United States leaving its economies in the dust. Even if European energy policies were not already making a massive data-center buildout prohibitively expensive, its fragmented capital markets would make raising the necessary financing extraordinarily difficult.", "translation_ja": "ヨーロッパのAI「ドルチェ・ヴィータ」？\n\n低迷する成長率、高齢化する福祉国家、そして中道派リーダーの不足は、ヨーロッパが今後数年以内に深刻な債務危機に直面することを示唆している。しかし、労働よりも余暇を重視するその姿勢は、AI主導の豊かさの時代において繁栄するための決定的な優位性となり、同大陸を先駆的なモデルとして位置づける可能性がある。\n\nパリ発——多くの点において、欧州連合（EU）はAI革命の最大の敗者の一つとなる可能性が高く、中国とアメリカにその経済を大きく引き離されるだろう。たとえヨーロッパのエネルギー政策が大規模なデータセンターの整備を法外なコストにしていないとしても、分断された資本市場は必要な資金調達を極めて困難なものにするだろう。", "vocab": [{"word": "glacial", "definition": "「氷河のように遅い」という意味で、比喩的に進行や成長が非常に緩慢であることを表す形容詞。ビジネスや経済の文脈で変化や回復の遅さを強調する際に使われる。"}, {"word": "fragmented", "definition": "「断片化した・分断された」という意味で、全体が統一されずにバラバラな状態であることを指す。資本市場や政策、組織などが一体化されていない状況を表すのに用いられる。"}, {"word": "prohibitively", "definition": "「法外に・著しく高く」という意味の副詞で、コストや障壁があまりに大きく実質的に不可能にさせるほどであることを示す。主に経済・ビジネス文脈で使われる。"}, {"word": "centrist", "definition": "「中道派の」という意味の形容詞・名詞で、政治的に左右どちらの極端にも偏らない穏健な立場を指す。政治分析や社説でよく登場する語。"}, {"word": "dolce vita", "definition": "イタリア語由来の表現で「甘い生活・優雅な暮らし」を意味する慣用句。フェリーニ監督の映画に由来し、享楽的・余暇重視のライフスタイルを象徴的に表す際に使われる。"}]}, {"title_ja": "プーチンのエスカレーションリスク", "title_en": "The Putin Escalation Risk", "summary_ja": "筆者は、ウクライナの軍事攻撃や西側の制裁、経済的圧力によって前例のないプレッシャーにさらされているプーチン大統領が、25年間の統治の中で最も脆弱な立場に置かれていると主張する。核心的な懸念は、追い詰められたプーチンが窮地を脱するために西側に対して劇的なエスカレーション行動に出る可能性があるという点だ。ウクライナによる継続的な圧力は戦略的に理にかなっている一方で、プーチンが局面を一変させる危険な行動に出る誘惑を高めるリスクがあると警告している。", "summary_en": "The author argues that Putin, facing unprecedented pressure from Ukraine's military strikes, Western sanctions, and economic strain, finds himself in the most vulnerable position of his 25-year rule. The central concern is that a cornered Putin may resort to a dramatic escalatory move against the West to escape his predicament. The piece warns that continued Ukrainian pressure, while strategically sound, increases the temptation for Putin to take a game-changing and potentially dangerous action.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/putin-escalation-risk-failing-ukraine-war-could-lead-to-rash-behavior-by-ian-bremmer-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Putin Escalation Risk\n                        If Ukraine can continue to disrupt Crimea, strike more targets in the heart of Russia, frustrate Russia’s frontline forces, and pile more pressure on Russia’s hobbled economy, President Vladimir Putin will feel increasingly cornered. The temptation to escape his predicament through a game-changing attack will grow stronger.\n                    \n                        NEW YORK—With Russia under pressure on multiple fronts, President Vladimir Putin finds himself in a tighter spot than at any other moment of his quarter-century in power. Putin remains firmly in charge of the Kremlin, but there is a growing risk that he will try to escape his current predicament by escalating his conflict with the West.\n        https://prosyn.org/sEAQlcI", "translation_ja": "プーチンのエスカレーションリスク\n\nウクライナがクリミアへの妨害作戦を続け、ロシア中枢部のより多くの標的を攻撃し、ロシアの前線部隊を苦しめ、弱体化したロシア経済にさらなる圧力をかけることができれば、プーチン大統領はますます追い詰められた状況に陥るだろう。局面を一変させる攻撃によって窮地を脱しようとする誘惑は、ますます強まっていくことになる。\n\nニューヨーク発――複数の戦線でロシアが圧力を受ける中、プーチン大統領は四半世紀に及ぶ権力掌握の中でかつてないほど厳しい立場に置かれている。プーチンは依然としてクレムリンの権力を確固として握っているが、現在の窮地を脱するために西側との対立をエスカレートさせようとするリスクが高まりつつある。", "vocab": [{"word": "predicament", "definition": "苦境、窮地を意味する名詞。解決が難しい困った状況を指す。例：「escape his predicament（窮地を脱する）」のように使われる。"}, {"word": "escalating", "definition": "段階的に拡大・激化させることを意味する動詞の現在分詞形。紛争や緊張が徐々に高まる文脈でよく用いられる。"}, {"word": "hobbled", "definition": "足かせをはめられた、機能を著しく損なわれた状態を意味する形容詞的表現。ここでは制裁などで弱体化した経済を描写している。"}, {"word": "frustrate", "definition": "（計画や試みを）妨げる、挫折させるという意味の動詞。ここでは敵の前線部隊の活動を阻むという文脈で使われている。"}, {"word": "game-changing", "definition": "状況や局面を根本的に一変させるほどの影響力を持つことを表す形容詞的複合語。ビジネスや政治・軍事の文脈で頻繁に使われる。"}, {"word": "cornered", "definition": "追い詰められた、逃げ場のない状況に置かれたという意味の形容詞。動物が角に追い詰められるイメージから転じた表現。"}]}, {"title_ja": "建国250年、アメリカは自滅している――それは驚くべきことではない", "title_en": "America Is Destroying Itself at 250: The Seeds Were Always There", "summary_ja": "スティーブン・マーシュ氏は、トランプ政権下で進むアメリカの政治的崩壊は突然の異変ではなく、建国当初から内包されていた矛盾の帰結だと主張する。超党派対立、格差拡大、歴史の書き換えが自壊を加速させており、ワシントンやリンカーンでさえその危機を予言していたと指摘する。建国250周年は、アメリカという実験の神話と致命的欠陥の両方を問い直す機会だと論じている。", "summary_en": "Author Stephen Marche argues that America's current political collapse under Trump is not a sudden aberration but the fulfillment of contradictions embedded in the nation's founding. Drawing on his research into political decline, he contends that the American experiment has effectively ended, with hyperpartisanship, inequality, and historical revisionism accelerating a self-destruction that Washington and Lincoln themselves foresaw. The 250th anniversary offers a moment to reckon with both the myths and the fatal flaws of the American project.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/04/us-history-destruction", "state_media": false, "category": "オピニオン", "full_text": "The 250th anniversary of the Declaration of Independence has arrived at a moment of some embarrassment for the Republic. The United States of America, established to overthrow a mad king, has elected, 250 years later, a mad king of its very own. America is setting itself on fire at its birthday party. It always had a dramatic streak.\nIn 30 or 40 years, scholars of history, if they exist, will want to know how the richest country in history, with the world’s most powerful alliance network, and a scientific and research capacity fuelled by the talent of the world, chose to throw it all away.\nI have been closer than most to some kind of answer. For my book The Next Civil War, I interviewed hundreds of experts, trying to fathom the underlying causes and structures of the decline. I met with extremists on the left and right. I argued that the dark dawning was coming. And yet, in some part of me, I didn’t really believe they would do it. The American self-destruction, I can only inform those future historians, is a mystery to us, too.\nWhen did it all go wrong? Most of the researchers into political collapse that I spoke to blamed 2008, the financial crisis that crippled the dream of social mobility, but others brought up 1980, when income inequality first spiked and trust in institutions began to crater, and yet others 1876, the end of reconstruction, and those with even longer memories back to the civil war, or to the War of 1812.\nBut that was before Trump 2. It’s become obvious, since he took office again, that the crisis America currently faces has been there from the beginning.\nFrom the beginning, the most intelligent Americans understood that their origin contained, within itself, the seeds of its own destruction. George Washington’s Farewell Address predicted, with startling precision, the hyperpartisanship currently ripping apart the nation he founded.\nAbraham Lincoln prophesied: “If destruction be our lot, we must ourselves be its author and finisher … as a nation of freemen we must live through all time or die by suicide.” His prophecy has come true.\nThe semiquincentennial is an opportunity to reconsider the American project, and not just because it has provoked a reconsideration of the revolution itself. The American experiment has ended, and the beginning must offer at least some clue to its ending.\nLike those of any creation myth, the details of the Revolution are fuzzy but the impressions indelible. A boy stands beside a hack-down cherry tree. A man rides through the dark, waking villagers. Men hurl tea into a harbor. Women stitch stars into a flag. The events surrounding the revolution exist half in a dream space. History bleeds into the shades of myth.\nOne of the earliest signals of the sudden and rapid American decline has been the intellectual whiplash of its understanding of its own history. During the grand iconoclasm of 2020, mostly devoted to the desecration of civil war generals, protesters also tore down statues of Jefferson and Washington.\nIn response to the radical critique of US history, both Florida and Texas have rewritten their school curricula on the revolution, to promote more conservative viewpoints. In Florida, they have called their alternative to AP history the Florida Advanced Courses and Tests, or Fact, proving that somebody still has a sense of humor.\nIts vision of the founding focuses on “American civilization, as well as its deep roots in English and, more broadly, Western civilization”, which is a bit rich. If you wanted English civilization, you wouldn’t have become Americans in the first place. But agenda-driven histories of the revolution, on both left and right, shouldn’t be taken seriously as an account or a reckoning. They’re vibes: America’s, like, gross. Or, America’s, like, the best.\nThere have been works of more substantial history to coincide with the 250th anniversary. Ken Burns’ The American Revolution is of the same quality and depth as any of his other documentaries but less satisfying. In his works on the civil war and jazz and baseball, he expanded and informed the broad strokes of widely known histories with vivid detail and rich storytelling. But the revolution is so mythical already that learning what it was actually like diminishes it somehow.\nIn his telling, the founders weren’t heroes. They weren’t monsters. They were men in the mess of history, a stew of ideals and venality and interests, living in the middle of situations and mixed loyalties and physical necessities. They committed brutalities occasionally. They shone with bravery occasionally. They were stupid occasionally. They were brilliant occasionally.\nBurns bares the contradictions of the revolution, but they’ve already been well established. The founders’ love of liberty derived, directly, from their practice of slavery. Jefferson wrote the Declaration of Independence while a valet who was the son of his slave and his father-in-law served him tea. “The crisis is arrived when we must assert ", "translation_ja": "独立宣言から250周年の記念日が、共和国にとってやや気まずい瞬間に訪れた。狂える王を打倒するために建国されたアメリカ合衆国は、250年後、自ら狂える王を選出した。アメリカは誕生日パーティーで自らに火を放っている。もっとも、アメリカにはもともと劇的な一面があった。\n\n30年か40年後、もし歴史学者が存在するならば、彼らはこう問いたがるだろう――史上最も豊かな国が、世界最強の同盟ネットワークと、世界中の才能によって支えられた科学・研究能力を持ちながら、なぜそのすべてを投げ捨てることを選んだのか、と。\n\n私はその答えに、ほかの誰よりも近いところにいた。著書『次の内戦』のために、私は数百人の専門家に取材し、衰退の根本的な原因と構造を理解しようとした。左右両極端の過激派とも議論した。暗い夜明けが来ると主張した。それでも、心のどこかで、本当にそうなるとは信じていなかった。アメリカの自己破壊は、未来の歴史家たちに伝えるほかないが、私たちにとっても謎なのだ。\n\nいつから何もかもが狂い始めたのか。私が話を聞いた政治的崩壊の研究者の多くは、社会的流動性の夢を打ち砕いた2008年の金融危機を挙げた。しかし、所得格差が初めて急拡大し、制度への信頼が崩れ始めた1980年を挙げる者もいた。再建期の終わりである1876年を挙げる者もいれば、さらに長い記憶を持つ者は南北戦争や1812年の戦争まで遡った。\n\nしかしそれは、第二次トランプ政権以前の話だ。彼が再び就任して以来、アメリカが現在直面している危機は最初から存在していたことが明白になった。\n\n最初から、最も聡明なアメリカ人たちは、その起源の中に自己破壊の種が宿っていることを理解していた。ジョージ・ワシントンの告別演説は、彼が建国した国家を現在引き裂いている超党派対立を、驚くほど正確に予言していた。\n\nエイブラハム・リンカーンはこう預言した。「もし破滅が我々の運命であるならば、その著者にして完成者は我々自身でなければならない……自由な国民として、我々は永久に生き続けるか、自殺によって死ぬかのどちらかだ」。その預言は現実のものとなった。\n\n建国250周年は、アメリカという計画を再考する機会だ――それが革命そのものの再考を促しているからだけではない。アメリカという実験は終わった。そして、その始まりは、終わりへの手がかりを少なくとも与えてくれるはずだ。\n\nいかなる創世神話においても、細部は曖昧だが印象は消えない。少年が切り倒された桜の木のそばに立っている。ある男が暗闇の中を馬で駆け、村人たちを起こして回る。男たちが港に茶を投げ込む。女たちが旗に星を縫い付ける。革命をめぐる出来事は、半ば夢の空間の中に存在する。歴史は神話の影の中へと溶け込んでいく。\n\nアメリカの急速な衰退の最も早い兆候の一つは、自国の歴史理解における知的な揺れ戻しだった。2020年の大規模な偶像破壊の波の中で、主に南北戦争の将軍像の破壊に向けられたが、抗議者たちはジェファーソンやワシントンの像も引き倒した。\n\nアメリカ史への急進的な批判への反発として、フロリダとテキサスはともに革命に関する学校のカリキュラムを書き直し、より保守的な視点を推進した。フロリダでは、APヒストリーの代替として「フロリダ上級講座・テスト」、略してFACTと名付けた。誰かにはまだユーモアのセンスが残っているようだ。\n\nその建国観は「アメリカ文明、そして英国文明、さらに広くは西洋文明に深く根ざしたもの」に焦点を当てているが、これは少々厚かましい。英国文明が欲しかったのなら、そもそもアメリカ人にはなっていないはずだ。しかし、左右いずれかの議題に沿った革命の歴史は、正式な記録や総括として真剣に受け止めるべきではない。それはただの雰囲気だ――アメリカって、なんかダメ。あるいは、アメリカって、なんか最高。\n\n250周年に合わせて、より実質的な歴史作品も生まれている。ケン・バーンズの『アメリカ革命』は彼の他のドキュメンタリーと同じ質と深みを持つが、満足感はやや薄い。南北戦争やジャズ、野球に関する彼の作品では、広く知られた歴史の大まかな輪郭を、鮮やかな細部と豊かな物語で膨らませ、豊かにした。しかし革命はすでに非常に神話的であるため、それが実際にどのようなものだったかを知ることで、どこか輝きが失われてしまう。\n\n彼の語りの中で、建国者たちは英雄ではない。怪物でもない。彼らは歴史の混乱の中にいた人間であり、理想と強欲と利害が混ざり合い、状況の真っただ中で生き、忠誠心も肉体的な必要も入り乱れていた。時に残酷な行為を犯した。時に勇敢な輝きを放った。時に愚かだった。時に卓越した知性を示した。\n\nバーンズは革命の矛盾をさらけ出すが、それはすでによく知られたことだ。建国者たちの自由への愛は、直接的に、彼らの奴隷制の実践から生まれていた。ジェファーソンが独立宣言を書いている間、彼の奴隷と義父の息子である従者が彼に茶を運んだ。「危機は到来した、我々が主張しなければならない時が」――", "vocab": [{"word": "hyperpartisanship", "definition": "極度の党派対立のこと。政治的な二極化が激しく、対話や妥協が不可能になった状態を指す複合語で、現代アメリカ政治を論じる際によく使われる。"}, {"word": "semiquincentennial", "definition": "250周年記念を意味するラテン語由来の語。'semi-'（半分）+'quincentennial'（500周年）から成り、非常に格式ある文脈や歴史的記念行事の報道で使用される稀な語。"}, {"word": "iconoclasm", "definition": "偶像破壊主義、あるいは既成の権威や慣習・象徴を打ち壊す行為を指す。ここでは2020年に起きた歴史的人物の銅像を破壊する運動を比喩的に表している。"}, {"word": "venality", "definition": "金銭や利益のために道徳や原則を売り渡す腐敗した性質・行為を指す名詞。政治や歴史の文脈で、指導者の不正や利己主義を批判する際に用いられる。"}, {"word": "desecration", "definition": "神聖なものや敬われるべきものを冒涜・損壊する行為。ここでは南北戦争の将軍像が破壊されたことを指し、文化的・歴史的象徴への侵害という意味合いで使われている。"}, {"word": "fathom", "definition": "動詞として「〜を深く理解する・真相を究明する」を意味する。元々は海の深さを測るnautical用語だが、比喩的に複雑な事柄の本質を把握しようとする行為を表す。"}, {"word": "aberration", "definition": "正常な状態や期待される軌道からの逸脱・例外的な異常を指す名詞。科学・政治・行動科学など幅広い分野で「一時的な逸常事態」を表すために用いられる。"}]}, {"title_ja": "ワールドカップでアメリカを応援することをためらう人へ――それでも応援すべき理由", "title_en": "Some Americans hesitate to cheer for the US at the World Cup — but they shouldn't", "summary_ja": "コラムニストのアレクサンダー・アブノスは、アメリカ政府の国内外での行動を理由に米国代表チームを応援することに抵抗を感じる人々がいることを認め、その懸念に共感を示す。しかし彼は、チームを応援することは政府を支持することとは別物だと主張し、イランの分断されたサポーターを例に挙げて論じる。最終的に、国際サッカーの真の魅力は個々の選手の政治観や政府ではなく、ファン同士の一体感にあると結論づけている。", "summary_en": "Columnist Alexander Abnos acknowledges that many Americans feel uncomfortable supporting the US national soccer team given the government's domestic and foreign misdeeds, and validates those concerns. However, he argues that supporting the team is not the same as endorsing the government, drawing parallels with Iran's divided fanbase. Ultimately, he contends that the real appeal of international soccer lies in the communal experience of fans, not the politics of individual players or governments.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/football/2026/jul/04/some-americans-are-reluctant-to-cheer-for-the-us-at-the-world-cup-they-shouldnt-be", "state_media": false, "category": "オピニオン", "full_text": "The US men’s national team are on the verge of history. One win away from matching their best-ever run in the World Cup’s modern era, they are playing with more verve and quality than they ever have before at this stage. Wednesday’s win over Bosnia and Herzegovina has begotten a rarity: American soccer, in the spotlight, in America.\nTo longtime US soccer fans, the question of whether to support this particular team at this particular time is barely a question. Or if it is one, it’s vaguely along the lines of “should I breathe?”\nBut there are plenty of newcomers along for the ride now, who may only watch the team at a World Cup, if ever. Within this group, it stands to reason that plenty will be uncomfortable with the idea of supporting a US national sports team at all. I can hardly blame them. Just within the last year, they will have seen USA’s baseball team cloak themselves in military propaganda, practically begging to be considered an unlikeable bully. Just a few weeks before that, we saw the USA men’s hockey team cozy up to the levers of power at the Olympics, just as innumerable crises were unfolding at home. The hockey players allowed these people into their locker room to chug beers, and yukked right along with them as the US women’s team – also gold medalists – were ridiculed.\nAnd that’s completely aside from all of the non-sports reasons why many Americans, or Americans-to-be, might find cheering for their national team difficult. They can base their discomfort on the US government’s misdeeds over the last few years, or the last few generations, or maybe even since the founding of the republic. For as much bluster and bravado as some proclaim the US to be the “greatest country in the world,” how many lives have been ruined – or ended – as a result of the government’s actions? Whatever your real-life grievance is, I cannot in good conscience tell you to ignore your qualms.\nWhat I would encourage you to do, though, is to hold that truth right alongside some others.\nFor one, the US is far from the only country with this sort of dilemma. Consider how many Germans felt as if they could not celebrate their team’s triumphs until decades after the end of the second world war. Need a more modern example? Just look at Iran, where the fanbase remains deeply divided over Team Melli’s role in their society, and their closeness to a repressive and at times violent regime that has driven many out of the country. Does the Iranian national team play for that government, or do they play for the people of Iran – among the kindest, most generous and football-mad populations on the planet? Among the admittedly self-selecting sample in the stadium at each of Iran’s games this summer, the conclusion was undoubtedly the latter. Fans booed the Iranian national anthem, they wore protest shirts and covered up the flag’s central insignia. But when Iran played, and when they scored, the stands in Los Angeles and Seattle went wild.\nSo in the US, what is our reason to cheer the US at a time when we are led by a government despised at home and abroad? How do we put the ICE raids and the attacks on other countries and the mistreatment of so many of our fellow Americans aside and allow ourselves to feel patriotic for 90 minutes, plus extra time, and – God forbid – penalties too?\nI could tell you all sorts of reasons why this particular team is worth rooting for. How they represents the diversity that makes us the nation we are; how their version of an American attitude has been expertly honed by a coach who considers himself “200% Argentinian.” I may encourage you to remember that, just like the Olympics, these people are extremely good at their jobs. They have trained for years and made innumerable sacrifices to reach this, the pinnacle of their game. And they either live in your country, grew up there, or chose to represent it over other options. They may even play in your town and like the same condiments you do (wait until you hear about Weston McKennie and ranch dressing). Unlike so much of the soccer world, at least some portion of their existence can be implicitly understood by Americans. And that understanding has nothing to do with anything the government has done, or will do.\nBut ultimately, my best argument for supporting this team is that the team is not who you are supporting. The players, coaches, staff and their wide range of political opinions are ultimately temporary. They will come and go; some will play great and some will play terribly, some will annoy, others will feel like kin. You will love the politics of one and hate the politics of another, depending on how much they even open up about that stuff. And then they’ll make way for the next generation. It is a great irony of sports that fans and journalists spend so much time obsessing over these people, when the real attraction is in something greater.\nIn international soccer, those attractions lie, more than in any other sport, in the people immediately arou", "translation_ja": "アメリカ男子代表チームは歴史的な瞬間の瀬戸際に立っている。ワールドカップの現代における自国最高の成績に並ぶまであと1勝、これまでのこの段階よりも活気あふれる質の高いサッカーを見せている。水曜日のボスニア・ヘルツェゴビナ戦での勝利は一つの珍事を生んだ――アメリカのサッカーが、アメリカ国内で、脚光を浴びているのだ。\n\n長年のアメリカサッカーファンにとって、この特定のチームをこの特定の時期に応援するかどうかという問いは、ほとんど問いにすらならない。あるいは問いだとすれば、「息をすべきか？」という問いに近い、ぼんやりとしたものだ。\n\nしかし今、このムーブメントに乗ってきた新参者も大勢いる。ワールドカップのときだけ、あるいはそれさえも見ないような人たちだ。このグループの中には、そもそもアメリカの国家代表スポーツチームを応援するという発想自体に違和感を覚える人が少なくないと考えるのは自然なことだ。私は彼らをほとんど責められない。つい昨年だけを見ても、アメリカの野球チームが軍事的プロパガンダに身を包み、まるで嫌われ者の乱暴者と見られたがっているかのように振る舞うのを目にしただろう。その数週間前には、アメリカ男子ホッケーチームがオリンピックの場で権力の中枢と親しげに肩を組む様子を目撃した、まさにその頃、国内では数え切れないほどの危機が噴出していたにもかかわらず。ホッケーの選手たちはそういった人物たちをロッカールームに招き入れ、ビールをあおりながら、同じく金メダリストであるアメリカ女子チームが嘲笑されるのを笑って見過ごした。\n\nそれはすべて、多くのアメリカ人や「アメリカ人になろうとしている人々」が自国チームを応援することを難しく感じる、スポーツ以外の理由を完全に度外視した話だ。彼らの不快感は、ここ数年のアメリカ政府の失策に基づくものかもしれないし、ここ数世代にわたるものかもしれないし、あるいは建国以来のものかもしれない。「アメリカは世界最高の国だ」と豪語する者がいる一方で、政府の行動によって人生を壊された人――あるいは命を奪われた人――がどれほどいることか。あなたがどんな実際の不満を抱えていようと、私は良心に従って「そのこだわりを無視しなさい」とは言えない。\n\nただ、私がお勧めしたいのは、その真実を他のいくつかの真実と並べて持ち続けることだ。\n\nまず、こうした葛藤を抱えているのはアメリカだけではない。ドイツ人の多くが、第二次世界大戦終結から数十年が経つまで、自国チームの勝利を祝うことができないと感じていたことを考えてみよう。もっと現代的な例が必要なら、イランを見ればいい。そこでは、チーム・メッリ（イラン代表）が社会においてどのような役割を担うべきかをめぐって、ファンの間で深刻な分断がある。多くの人々を国外に追い出してきた抑圧的で時に暴力的な政権との近しさも問題だ。イラン代表は政府のために戦っているのか、それとも国民のために戦っているのか――地球上で最も親切で、寛大で、サッカーを愛する民族の一つのために。今夏のイランの各試合、確かに自己選択的なサンプルではあるが、スタジアムの観客の結論は疑いなく後者だった。ファンはイランの国歌に向かってブーイングし、抗議のシャツを着て、国旗の中央の紋章を隠した。しかしイランが試合をし、ゴールを決めると、ロサンゼルスやシアトルのスタンドは熱狂した。\n\nではアメリカにおいて、国内外から嫌われている政府のもとで、なぜアメリカを応援できるのか？ICEによる強制捜査や他国への攻撃、多くの同胞への不当な扱いを脇に置いて、どうすれば90分間――そしてもしあるなら延長戦も、あろうことかPK戦でさえも――愛国心を感じることができるのか？\n\nこのチームを応援する価値がある理由はいくつも挙げられる。彼らがアメリカという国を形成する多様性を体現していること、彼らのアメリカ的な姿勢が「自分は200パーセントアルゼンチン人だ」と自認する監督によって見事に磨き上げられていること。オリンピックと同様、彼らは自分の仕事において並外れた能力を持つ人々であることを思い出してほしい。彼らは何年もかけてトレーニングを積み、無数の犠牲を払って、競技の頂点であるこの舞台に立っている。そして彼らはあなたの国に住んでいるか、そこで育ったか、他の選択肢よりもその国を代表することを選んだ人々だ。あなたと同じ町でプレーし、あなたと同じ調味料が好きな選手さえいるかもしれない（ウェストン・マッケニーとランチドレッシングの話は聞く価値がある）。サッカーの世界の多くとは異なり、彼らの存在の少なくとも一部は、アメリカ人にとって暗黙のうちに理解できるものだ。そしてそれは政府が何をしたか、あるいはこれからするかとは一切関係がない。\n\nしかし結局のところ、このチームを応援すべき最良の理由は、あなたが応援しているのはチームではない、ということだ。選手、監督、スタッフ、そして彼らが持つ多様な政治的見解は、つまるところ一時的なものだ。彼らは来ては去る。華々しいプレーをする者もいれば、ひどいプレーをする者もいる。苛立たしい者もいれば、身内のように感じる者もいる。ある選手の政治観には共感し、別の選手のそれには嫌悪感を覚えるかもしれない――そういった話をどれだけ打ち明けてくれるかにもよるが。そしてやがて彼らは次の世代に道を譲る。スポーツにおける大きな皮肉の一つは、ファンやジャーナリストがこれらの人々を追いかけることに多大な時間を費やす一方で、本当の魅力はもっと大きな何かにあるということだ。\n\n国際サッカーにおいて、その魅力は他のどのスポーツよりも、すぐ周りにいる人々の中にある――", "vocab": [{"word": "verve", "definition": "活気・情熱・生気を意味する名詞。芸術やスポーツなどにおける熱量あふれるエネルギーを表す際に使われる上級語彙。"}, {"word": "begotten", "definition": "「生み出した・もたらした」を意味するbegetの過去分詞形。文語・古語的なニュアンスを持ち、フォーマルな文章や文学的表現で使われる。"}, {"word": "bravado", "definition": "実際には臆病であるにもかかわらず見せる虚勢や大げさな勇敢さを指す名詞。侮蔑的なニュアンスを含む場合が多い。"}, {"word": "qualms", "definition": "良心的な疑念・不安・ためらいを意味する名詞（通常複数形で使用）。道徳的・倫理的な引っかかりを表すニュアンスがある。"}, {"word": "self-selecting", "definition": "調査やサンプルの文脈で、研究者が選んだのではなく対象者が自ら参加を選んだことによるバイアスを指す複合形容詞。統計・社会科学分野で頻出する専門表現。"}, {"word": "innumerable", "definition": "数え切れないほど多い・無数のという意味の形容詞。countlessと同義だが、よりフォーマルで書き言葉的なニュアンスを持つ。"}, {"word": "implicitly", "definition": "「暗黙のうちに・明示せずとも」を意味する副詞。明示的（explicitly）の対義語であり、言葉にしなくても理解・了解されている様子を表す。"}]}, {"title_ja": "かつてアメリカという偉大な実験を崇拝していた。トランプ後、私はもはや確信が持てない｜ジョナサン・フリードランド", "title_en": "I Used to Revere America. After Trump, I'm Not So Sure | Jonathan Freedland", "summary_ja": "ジョナサン・フリードランドは、アメリカ独立250周年を前に、かつて抱いていた「米国の制度はどんな欠陥も自力で克服できる」という信念がトランプ時代によって揺らいだと論じる。トランプは建国者たちが恐れたカエサル的独裁者の典型であり、それを防ぐはずの憲法上の安全装置が機能不全に陥っていると指摘する。フリードランドはアメリカの理想の礼賛者から、共和国の存続への真剣な懐疑論者へと変わったと告白している。", "summary_en": "Jonathan Freedland reflects on America's 250th birthday, arguing that while he once believed the US constitutional system could overcome any flaw, the Trump era has shaken that faith. He contends that Trump represents precisely the Caesar-like figure the Founders feared, and that the constitutional safeguards designed to stop such a leader have proven insufficient. Freedland has moved from admirer of the American ideal to genuine doubt about whether the republic can survive its current crisis.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/03/united-states-constitution-donald-trump-washington-dc", "state_media": false, "category": "オピニオン", "full_text": "America’s big birthday has come at a bad time. On Saturday it will be a divided nation that marks 250 years since 13 North American colonies declared their independence from the Great Britain of George III. Many will be anxious that the republic they established that day is fragile – not least because of the would-be emperor in the White House.\nSome will console themselves that hope and angst have always been intertwined in the American story. From the very start, confidence in a bright, exceptional US future was combined with foreboding and doubt. At the close of the 1787 constitutional convention, a woman approached one of the founding fathers, Benjamin Franklin, to ask if the delegates had established a monarchy or a republic. Franklin’s answer: “A republic, if you can keep it.”\nSome of that unease was the result, one hopes, of a quiet understanding that the new nation had arrived with a built-in defect, in the form of a terrible contradiction. The declaration proclaimed that “all men are created equal”, which excluded women and could not be squared with the fact that this new entity was founded on slavery. That text’s principal author, Thomas Jefferson, was himself a slave owner, and the knowledge of his hypocrisy haunted him. “I tremble for my country when I reflect that God is just: that his justice cannot sleep for ever,” he wrote.\nBut that fear for the future also owed something to the sheer scale of the founders’ ambition. As Tom Holland, historian of the ancient world, puts it, the US was “founded as a simulacrum of the early Roman republic. And the lesson of Roman history is that at some point, a republic will become an autocracy.” The ink was barely dry on the 4 July declaration, says Holland, when Americans started “dreading the emergence of a Caesar”.\nAll of which might encourage today’s Americans to be sanguine, reassured that their predecessors were similarly fearful, only for their apprehensions to prove unfounded. Take Donald Trump’s determination to gather ever greater powers to himself. On one reading, that is hardly unprecedented. Franklin Roosevelt was lambasted for constructing an imperial presidency, while even the secular saint that is Abraham Lincoln subjected protesters to martial law and suspended the right of habeas corpus (though he did have the excuse of a civil war). In his appetite for power, Trump could say he’s in very good company.\nAnd so, the American in rose-tinted glasses could enjoy Saturday’s barbecues and fireworks displays, insisting that this too will pass. That yes, a crude, venal braggart is in the Oval Office – one who, we learned this week, personally pocketed $2.2bn in his first year back in office; and yes, he launched a disastrous war that has made one of America’s sworn enemies, Iran, stronger and the US weaker; and yes, he has set about dismantling a post-1945 rules-based international order from which the US only ever benefited, growing stronger and richer; and yes, he and his vice-president seem determined to replace their country’s animating “creedal” conception of national identity, in which citizenship is open to whoever subscribes to America’s core ideals, with a definition that instead demands blood-and-soil ethnic heritage – but all of that will pass. In this view, an America that has survived a civil war, Jim Crow racial segregation and the McCarthyite witchhunts of the 1940s and 1950s, can survive Trump and Trumpism.\nAdd to that the phenomenal might of the US military and US economy, both set to be handed a further advantage over their rivals thanks to the US head-start on AI, and the outlook is positively sunny.\nAnd yet, I’m not convinced. For years, I maintained precisely the position I’ve just sketched out: that, sure, the US had egregious flaws and problems, but nothing that the US system itself could not overcome. My first book
