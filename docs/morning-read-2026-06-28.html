ns about the perilousness of our global water supply, the site itself is not exactly a massive national emergency. I’m more concerned with my Apple Watch beeping about my heart rate after a third martini than I am an artificial lake that … shows you a reversed version of the thing you’re standing in front of. Yup, there it is. That building. Again. But upside down. Brilliant.\nThe reflecting pool is just another pointless infrastructure project in a long line of pointless infrastructure projects that have come to define the blockbuster sequel to Trump 1.0. The White House ballroom, the Kennedy Center, the comically large arch designed to give Europe serious concrete envy. The politics pages of the news are starting to look more like Architectural Digest, which, quite frankly, is more fun to read usually. Except: every single one of these projects seems doomed to failure. The projects barely limp along as more than the governmental equivalent of a grandpa’s bucket list. Trump’s name is off the Kennedy Center. The ballroom is mired in litigation and political wrangling. The reflecting pool is a mess. It’s a parade of no-bid contracts, outlandish promises and unchecked vanity. Naturally, all these problems have to be someone else’s fault.\nAccording to Trump, the reason the reflecting pool looks like a runny plate of mushy peas full of dead ducks is because vandals cut into the hard surface at the bottom of the pool under cover of darkness. Several people were said to have been arrested for the alleged act, though the details are thin. .\nI don’t know if it “reflects” (sorry, I had to) well on the work of Atlantic Industrial Coatings if you can cut large gashes into the pool with some kind of small tool. Or maybe it was actually something more substantial, like a machete or the sword from Final Fantasy VII. I’m sure a pack of people wandering a national monument with massive blades in the middle of the night would avoid detection. Stealth is, of course, one of the primary attributes of the leftist agenda. It should also be said that Trump alleged the vandals dumped fertilizer into the pool, so add that to the midnight packing list. Might as well hire a 20-mule team to lug all that gear.\nIn response to the ongoing threat of possibly imaginary liberal ninja warriors carrying bags of manure, the government has erected a fence around the pool to keep out agitators, though the administration states that fencing was always meant to go up prior to Fourth of July festivities. It’s just apparently going up sooner to keep the pool secure. Nothing screams “beautification project” quite like a big fence. The Louvre should put up some chain-link around their artworks while we’re at it.\nNational monuments and historical landmarks are usually created for the sake of the public’s enjoyment. I might not personally see much use in staring at my own reflection, but I can see the appeal for some. Specifically Trump, who probably can’t help but take a gander at his own face staring back at him. It might be a dream he’s had more than once. There I am. Look at me. I’m so me, it’s outrageous how very me I can be. Perhaps we should just replace the pool with a large bit of mirrored glass. Pretty much the same thing, but with less bacteria fermenting. Just don’t stand too close to it at midday.\nSometimes, it feels like America is a Star Trek-style mirror universe where everything is backwards, nothing quite looks correct and everyone is sporting a goatee (metaphorically speaking). I think I’ve gotten to the point where everything not making sense has come around to making total sense. The paradox of delaying an affordable housing bill to prioritize a restrictive voting bill no one wants. The aching metaphors of the stagnant, murky pool meant to memorialize democratic progress. Is this a perverted alternate dimension reflecting back at us or just another day in soul-crushing reality?\n- \n  Dave Schilling is a Los Angeles-based writer and humorist", "translation_ja": "", "vocab": []}, {"title_ja": "アフリカのドローン戦争で勝っているのは誰か？", "title_en": "Who Is Winning Africa's Drone Wars?", "summary_ja": "筆者は、アフリカの非国家武装勢力が安価で組み立て容易なドローンを迅速に取得し、国家軍よりも効果的に運用するようになっており、技術的格差が急速に縮まっていると主張する。アフリカ各国政府はもはや外国からのドローン供給や旧来の戦略に頼って軍事的優位を維持することはできない。代わりに、独自のドローン能力を開発し、現代の反乱鎮圧に求められる非正規戦に対応した軍組織を構築しなければならない。", "summary_en": "The author argues that non-state armed groups in Africa are now deploying drones more effectively than state militaries, having rapidly acquired low-cost, easily assembled systems that have narrowed the technological gap. African governments can no longer rely on foreign drone suppliers or outdated strategies to maintain military superiority. Instead, they must develop indigenous drone capabilities and restructure their forces for the irregular warfare demanded by modern insurgencies.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/somalia/who-winning-africas-drone-wars", "state_media": false, "category": "オピニオン", "full_text": "On June 22, 2025, fiber-optic first-person-view drones operated by the Azawad Liberation Front (FLA), a Tuareg rebel group, slammed into a convoy of Russian Africa Corps and Malian armed forces vehicles in northern Mali. Footage shows the drones striking two trucks, then cuts to fighters posing beside the wreckage. The significance was unmistakable: a little over a year after fiber-optic drones first appeared in Ukraine, a rebel group with scant resources had deployed the cutting-edge technology to humiliate two comparatively superior state actors.\nA decade earlier, the use of armed drones in African airspace looked very different. In 2011, the United States conducted the first drone strike on the continent, targeting senior leaders of the Somali Islamist group al-Shabab. At the time, Washington held a near monopoly in drone capability: only the world’s most advanced militaries had the access and technical expertise to employ the $20 million Predator drone used in the attack. That monopoly has since collapsed. Over the past decade, at least 37 African militaries have acquired drones of varying sophistication and cost.\nDrones have allowed African states’ small, lightly equipped forces to extend their reach across vast territories where state authority is contested. But over the last four years, armed nonstate actors in more than a dozen countries have begun to acquire and experiment with drones of their own, using them to enable ground operations, drop mortars, and conduct suicide attacks. They are now deploying these small uncrewed systems, many of which can be assembled from widely available and inexpensive parts, more effectively than states, who continue to rely on foreign governments for supply. In doing so, they have demonstrated that the gap between less-resourced and better-resourced adversaries has narrowed since the dawn of the drone wars, threatening the air dominance once enjoyed by states across the world.\nAfrican governments cannot hope to regain the military advantage by employing the strategies of a decade ago. Nor can they rely on foreign governments that have other incentives to provide them with the necessary firepower. Instead, they must learn to develop their own drones and integrate them into militaries built specifically for the irregular warfare required to defeat the insurgents that threaten them.\nAIR TRAFFIC CONTROL\nAfrica’s drone race began in Libya and Ethiopia. During its second civil war, which officially lasted from 2014 to 2020, Libya became the world’s most active drone battlefield. The country’s relatively open terrain, along with extensive weapons supply lines from external state actors, turned the war into a testing ground for emerging technology. The Tripoli-based Government of National Accord and the Benghazi-based Libyan National Army exchanged thousands of drone strikes, culminating in the 2020 battle for Tripoli. During the battle, Bayraktar TB2 drones supplied to the GNA by Turkey loitered just beyond the range of the LNA’s Russian-supplied air defenses and provided critical air support to GNA forces as they beat back an LNA attack on the capital. The failure of the LNA offensive ultimately led to the 2020 cease-fire that ended hostilities.\nDrones played an even more consequential role in Ethiopia’s 2020–22 conflict with the rebel Tigray Defense Forces (TDF). By late 2021, a TDF offensive had advanced to within 65 miles of Addis Ababa, the country’s capital and seat of the African Union. Desperate, Ethiopian Prime Minister Abiy Ahmed turned to Iran, Turkey, and the United Arab Emirates for drones, which inflicted heavy casualties, targeted the TDF’s vulnerable communications and supply lines, and turned the imminent collapse of the government into a sweeping defeat for the TDF. As a former Tigrayan officer involved in the offensive later told The Economist, “We could have captured Addis easily . . . . It was those fucking drones . . . . We had no way of shooting them down.”\nThe outcome of the Libyan and Ethiopian conflicts turned on a small number of capable drones, employed alongside capable infantry and mechanized forces. The GNA and the Ethiopian armed forces’ access to superior drone technology allowed them to repel an exposed, invading adversary whose forces were concentrated. Other states took notice.\nWE’RE NOT IN ADDIS ANYMORE\nIn the years since, dozens of countries across Africa, seduced by the idea of affordable access to the air, have acquired long-endurance drones to deal with their adversaries, regardless of whether those adversaries used the same tactics as the LNA or the TDF.\nToday, the most significant threat facing African governments is a different type of insurgency: militant groups expanding their reach across the Sahel, the Lake Chad Basin, and Somalia. After a wave of military coups between 2020 and 2023 led to the expulsion of French, U.S., and UN forces, juntas in Mali, Burkina Faso, and Niger turned to Turkish Bayraktar and Akinci drones to re", "translation_ja": "2025年6月22日、アザワド解放戦線（FLA）というトゥアレグ系反政府勢力が運用する光ファイバー式一人称視点（FPV）ドローンが、マリ北部でロシアのアフリカ軍団とマリ国軍の車両部隊に次々と突入した。映像には、ドローンが2台のトラックに命中する様子と、その後に残骸の傍らでポーズをとる戦闘員の姿が映し出されている。その意義は明白だった。光ファイバー式ドローンがウクライナに初めて登場してからわずか1年余りで、乏しい資金しか持たない反政府勢力が最先端技術を用いて、比較的優位な2つの国家行為者を屈辱的な敗北に追い込んだのである。\n\n10年前、アフリカ上空における武装ドローンの使用は全く異なる様相を呈していた。2011年、米国はアフリカ大陸で初のドローン攻撃を実施し、ソマリアのイスラム主義組織アル・シャバブの幹部指導者を標的とした。当時、ワシントンはドローン能力においてほぼ独占的地位を占めており、その攻撃に使用された2000万ドルのプレデター・ドローンを運用できるのは、世界でも最先端の軍事力を持つ国々に限られていた。その独占はその後崩壊した。過去10年間で、少なくとも37のアフリカの軍隊が、精度や価格帯の異なるドローンを取得している。\n\nドローンにより、アフリカ諸国の小規模で軽装備の部隊は、国家の権威が争われる広大な領土にわたって勢力を伸ばすことが可能となった。しかし過去4年間で、12か国以上の非国家武装勢力がドローンを独自に取得・実験し始め、地上作戦の支援、迫撃砲の投下、自爆攻撃に活用している。彼らは現在、広く入手可能な安価な部品から組み立てられるこれらの小型無人システムを、外国政府からの供給に依存し続ける国家よりも効果的に運用している。そうすることで、ドローン戦争の夜明け以来、資源の乏しい勢力と資源豊富な対立勢力との間の格差が縮まったことを実証し、かつて世界各地の国家が享受してきた制空権を脅かしている。\n\nアフリカ各国政府は、10年前の戦略を踏襲することで軍事的優位を取り戻すことはできない。また、彼らを脅かす反乱勢力を打倒するために必要な火力を供給してくれる外国政府に頼ることもできない。代わりに、独自のドローンを開発し、それらを自国を脅かす反乱勢力に対処するために必要な非正規戦に特化した軍隊に統合する方法を学ばなければならない。\n\n【航空管制】\n\nアフリカのドローン競争はリビアとエチオピアで始まった。2014年から2020年まで公式に続いた第二次内戦の期間中、リビアは世界で最もドローン攻撃が活発な戦場となった。比較的開けた地形と、外部国家行為者からの大規模な武器供給ルートが相まって、この戦争は新興技術の試験場と化した。トリポリを拠点とする「民族合意政府（GNA）」とベンガジを拠点とする「リビア国民軍（LNA）」は数千回ものドローン攻撃を交わし、2020年のトリポリ攻防戦でその応酬は頂点に達した。この戦闘では、トルコからGNAに供給されたバイラクタルTB2ドローンがLNAのロシア製防空システムの射程外で滞空し、LNAが首都への攻撃を仕掛ける中でGNA部隊に重要な航空支援を提供した。LNAの攻勢が失敗したことで、最終的に2020年の停戦合意が締結され、戦闘は終息した。\n\nドローンはエチオピアの2020〜22年のティグライ防衛軍（TDF）との紛争においても、さらに決定的な役割を果たした。2021年末までに、TDFの攻勢はエチオピアの首都でありアフリカ連合の本部でもあるアディスアベバからわずか65マイルの地点まで迫っていた。窮地に立たされたエチオピアのアビー・アハメド首相はイラン、トルコ、アラブ首長国連邦にドローンを要請した。これらのドローンはTDFに甚大な損害を与え、脆弱な通信線と補給線を標的にし、差し迫った政府崩壊をTDFの完敗へと逆転させた。後にエコノミスト誌に語ったティグライ側の元将校は次のように述べた。「我々は簡単にアディスを制圧できたはずだ……あのくそったれなドローンさえいなければ……我々には撃墜する手段がなかった」\n\nリビアとエチオピアの紛争の結末は、有能な歩兵部隊と機甲部隊とともに運用された少数の高性能ドローンによって左右された。GNAとエチオピア軍が優れたドローン技術を利用できたことで、集結した状態で侵攻してきた露出した対立勢力を撃退することができた。他の国家はこの事実を見て取った。\n\n【もはやアディスではない】\n\nその後の数年間で、アフリカ各国は「手頃な価格で空へのアクセスを得る」という考えに魅力を感じ、数十か国が長時間滞空型ドローンを取得して対立勢力に対処しようとした。しかしそれらの対立勢力が、LNAやTDFと同じ戦術を用いているかどうかは問わなかった。\n\n今日、アフリカ各国政府が直面する最も深刻な脅威は、異なる種類の反乱である。それはサヘル地域、チャド湖盆地、ソマリアへと勢力を拡大している武装勢力である。2020年から2023年にかけての一連の軍事クーデターにより、フランス、米国、国連軍が追放された後、マリ、ブルキナファソ、ニジェールの軍事政権は、トルコ製バイラクタルおよびアクンジ・ドローンを購入して……", "vocab": [{"word": "loitered", "definition": "（航空機・ドローンが）特定の地域上空に長時間滞空・待機すること。軍事・航空文脈で頻繁に使われる専門的表現。"}, {"word": "insurgents", "definition": "政府や既存の権力に対して武力で反乱を起こす勢力のこと。政治・軍事分野の上級語彙で、単なる「反乱者」より組織的な武装勢力を指す。"}, {"word": "nonstate actors", "definition": "国家以外の主体（武装勢力、テロ組織、NGOなど）を指す国際関係論・安全保障分野の専門用語。"}, {"word": "monopoly", "definition": "特定の分野や市場において、一者が独占的な支配・管理を持つ状態。ここでは技術的優位の独占という意味で使われている。"}, {"word": "mechanized", "definition": "軍事文脈で、装甲車両や機械化された輸送手段を用いた部隊・戦闘様式を指す専門語。"}, {"word": "juntas", "definition": "クーデターにより権力を掌握した軍部による政府・統治グループを指す政治用語。スペイン語由来で英語でも広く用いられる。"}, {"word": "indigenous", "definition": "「その土地・国で生まれた・独自に開発された」という意味。ここでは外国に頼らない自国製の能力開発を指す上級語彙。"}]}, {"title_ja": "イランは戦争に勝っていない――中東紛争の結果を再評価する", "title_en": "Iran Didn't Win the War: A Reassessment of the Middle East Conflict Outcome", "summary_ja": "筆者は、米国とイスラエルによるイランとの停戦合意が広く批判されているにもかかわらず、約3年間にわたる地域紛争の累積的な結果としてイランは大幅に弱体化したと主張する。イランの代理勢力ネットワークは崩壊し、軍事力は壊滅的な打撃を受け、核開発プログラムも制約されている。著者は戦争の遂行が完璧ではなかったことを認めつつも、米国は制裁と軍事的信頼性という強力なレバレッジを保持しており、停戦覚書は失敗ではなく長期的な地域安定の基盤となり得ると論じている。", "summary_en": "The author argues that despite widespread criticism of the U.S.-Israel cease-fire deal with Iran, the cumulative outcome of nearly three years of regional conflict has left Iran significantly weakened—its proxy networks dismantled, its military capabilities decimated, and its nuclear program constrained. While acknowledging the war was not perfectly executed and fell short of some objectives, the author contends that the United States retains substantial leverage through sanctions and military credibility to secure lasting limits on Iranian enrichment. The memorandum of understanding is framed not as a failure, but as a potential foundation for long-term regional stabilization.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/iran/iran-didnt-win-war", "state_media": false, "category": "オピニオン", "full_text": "Much of Washington has greeted the Iran cease-fire deal with scorn. After more than three months of war, the United States and Israel failed to achieve many of their objectives, which included overthrowing the regime in Tehran and ending a potential Iranian nuclear threat.\nBut when viewed from a broader perspective, the outcome looks different. The almost three-year-long regional conflict that started with Hamas’s attack on Israel in October 2023 and culminated in Operation Epic Fury this spring has put the United States and its partners in a far stronger position in the Middle East and left Iran much weaker. Iran’s proxy network of militant groups is largely in ruins; Syrian President Bashar al-Assad, one of Iran’s key partners, is gone; Tehran has been mostly ignored by its supposed allies in Beijing and Moscow; and Iran’s conventional forces, and much of its defense and nuclear industrial base, have been decimated. Iran’s sole victory from the latest round of conflict has come from its ability to close the Strait of Hormuz and cause economic damage across the world. But closing the strait also harms Iran itself, and the impact of a closure is likely to weaken over time as countries seek alternative suppliers, substitutes for oil, and new shipping routes to avoid the strait.\nThis is not to say that the war was perfectly executed or that it has gone according to plan. But the cumulative effect of three years’ worth of efforts to defang a dangerous and threatening regime in Iran has left the United States in a strong position to solidify its gains. The memorandum of understanding to end the war opens the door to direct U.S.-Iranian talks, which could further stabilize the region. The memorandum’s limits on Iran’s nuclear program are vague for now, but the United States’ ability to wield economic sanctions and credibly threaten more bombing gives it the leverage to achieve permanent limits on Iranian enrichment. Rather than a foreign policy failure, the war could be the final piece of a successful effort to contain Tehran’s regional threats and achieve a long-term cease-fire.\nTHE BIG PICTURE\nThe military campaign that the United States and Israel launched on February 28 cannot be viewed in isolation. In its legal justification for the operation, released on April 21, the Department of State explained: “Epic Fury is only the latest round of an ongoing international armed conflict with Iran.” That conflict began with the 2023 Hamas attack on Israel, and continued across the region in both the Biden and the Trump administrations. It included Israeli ground combat in Gaza and Lebanon; the toppling of Assad; U.S. and European navies fighting air and sea battles with the Houthis in and around the Red Sea; and Iranian air and missile strikes against Israel, the United States, and Gulf Arab partners.\nViewed as a campaign in an ongoing conflict, the most recent round of fighting with Iran was all but inevitable. After the United States and Israel had bombed Fordow and other nuclear sites during the 12-day war in June 2025, the Trump administration called off additional Israeli airstrikes, signaling that Washington sought a comprehensive settlement with Tehran to end the cycle of violence and limit its nuclear program. The administration then held another round of nuclear talks with Iran in February to get Tehran to limit enrichment and to probe if, in doing so, Iran would also moderate its aggressive approach to the region. Although Iran made some concessions—according to leaked reports, Iran agreed to temporarily halt enrichment—American negotiators concluded that Iran was unwilling to abandon its larger nuclear ambitions and thus its quest for regional hegemony.\nThe war destroyed much of Iran’s remaining military capabilities.\nIran’s actions after the 12-day war reinforced the perception that it was insistent on maintaining its regional dominance. Tehran rapidly deployed new long-range ballistic missiles, which the Israelis understood as providing a shield for Iran’s nuclear program. In January, the Iranian regime brutally suppressed a nationwide popular uprising. The Islamic regime thus showed it was not changing, which meant that the United States and Israel were dealing with the same foe that had started the war in 2023 via its proxies and which would inevitably incite more conflict.\nThe only question for Washington was whether it made more sense to strike sooner or later. The Trump administration and Israel decided that it was better to attack while Iran was still relatively weak from the 12-day war and the popular uprising than to wait until it had regained control and rebuilt missile stocks. The problem with the decision to attack on February 28 was not the timing. The problem was with the overly ambitious belief that the administration could achieve a total victory similar to what it had done in Venezuela and with its lack of preparation for obvious countermoves. The administration ignored decades of U.S. mi", "translation_ja": "イランは戦争に勝っていない\n\nワシントンの多くは、イランとの停戦合意を軽蔑をもって受け止めた。3か月以上に及ぶ戦争の末、米国とイスラエルはテヘランの政権打倒やイランの潜在的な核の脅威の終結を含む目標の多くを達成できなかったからだ。\n\nしかし、より広い視点から見れば、結果は異なる様相を呈している。2023年10月のハマスによるイスラエル攻撃に始まり、今春の「オペレーション・エピック・フューリー」で頂点に達したおよそ3年間の地域紛争は、米国とそのパートナーを中東においてはるかに有利な立場に置き、イランを著しく弱体化させた。イランの代理勢力による武装組織ネットワークはほぼ壊滅し、イランの重要なパートナーであったシリアのバッシャール・アサド大統領は失脚し、テヘランは北京とモスクワという名目上の同盟国からほぼ無視され、イランの通常戦力と防衛・核産業基盤の大部分は壊滅的な打撃を受けた。最新の紛争においてイランが収めた唯一の勝利は、ホルムズ海峡を閉鎖し世界各地に経済的打撃を与えられたことだ。しかし海峡の閉鎖はイラン自身をも傷つけており、各国が代替供給源、石油の代替品、海峡を迂回する新たな輸送ルートを模索するにつれ、閉鎖の影響は時間とともに弱まっていく可能性が高い。\n\nこれは、戦争が完璧に遂行されたとか、計画どおりに進んだということを意味するわけではない。しかし、危険で脅威的なイラン政権を「牙を抜く」ために3年間積み重ねてきた取り組みの累積的な効果は、米国を利益を確固たるものにできる強い立場に置いている。戦争終結のための了解覚書は、地域のさらなる安定化につながりうる米国とイランの直接交渉への扉を開いた。イランの核プログラムに関する覚書の制限は現時点では曖昧だが、経済制裁を行使し、さらなる爆撃を信頼できる形で脅かす米国の能力は、イランのウラン濃縮に永続的な制限を課すためのレバレッジを与えている。外交政策の失敗どころか、この戦争はテヘランの地域的脅威を封じ込め、長期的な停戦を実現するための取り組みの最後のピースとなりうる。\n\n大局的な視点\n\n2月28日に米国とイスラエルが開始した軍事作戦は、単独で見ることはできない。4月21日に公表された作戦の法的根拠において、国務省はこう説明した。「エピック・フューリーは、イランとの継続中の国際武力紛争における最新の一局面に過ぎない」。この紛争は2023年のハマスによる攻撃に始まり、バイデン政権とトランプ政権の両政権にわたり地域全体で継続した。それはイスラエルのガザとレバノンでの地上戦闘、アサド政権の打倒、紅海とその周辺でのフーシ派との海空戦闘における米欧海軍の関与、そしてイランによるイスラエル、米国、湾岸アラブ諸国への航空・ミサイル攻撃を含んでいた。\n\n継続中の紛争における一連の作戦として捉えれば、イランとの最新の戦闘はほぼ不可避だった。2025年6月の12日間戦争において米国とイスラエルがフォルドウや他の核施設を爆撃した後、トランプ政権はイスラエルによる追加空爆を中止させ、ワシントンがテヘランとの包括的な和解を求め、暴力の連鎖を断ち切り核プログラムを制限しようとしていることを示唆した。政権はその後、2月にイランとさらなる核交渉を行い、テヘランに濃縮の制限を求めるとともに、そうすることでイランが地域への攻撃的なアプローチを穏健化させるかどうかを探った。イランはいくつかの譲歩を示したが——リーク情報によれば、イランは濃縮の一時停止に合意したとされる——米国の交渉担当者は、イランがより大きな核野望、つまり地域覇権の追求を放棄する意思がないと結論付けた。\n\nこの戦争はイランの残存する軍事力の大部分を壊滅させた。\n\n12日間戦争後のイランの行動は、地域的な覇権の維持に固執しているという認識を強めた。テヘランは新型長距離弾道ミサイルを急速に配備したが、イスラエルはこれをイランの核プログラムへの盾を提供するものと理解した。1月には、イラン政権が全国規模の民衆蜂起を残忍に鎮圧した。イスラム政権はこうして変わっていないことを示した。それはつまり、米国とイスラエルが2023年にその代理勢力を通じて戦争を始め、必然的にさらなる紛争を引き起こしていく同じ敵と向き合っていることを意味した。\n\nワシントンにとっての問題は、早期に攻撃するか、それとも後に攻撃するかどちらが理にかなっているかということだけだった。トランプ政権とイスラエルは、イランが立て直しを図りミサイルの備蓄を再建するまで待つよりも、12日間戦争と民衆蜂起によってイランがまだ比較的弱体化している間に攻撃する方が得策だと判断した。2月28日の攻撃決定における問題は、そのタイミングではなかった。問題は、ベネズエラで達成したような完全な勝利を実現できるという過度に野心的な信念と、明らかな対抗措置への準備の欠如にあった。政権は数十年にわたる米国の軍事的教訓を無視した——", "vocab": [{"word": "decimated", "definition": "（軍事力や組織などが）壊滅的な打撃を受けて大幅に弱体化した状態を指す。元来は「10分の1を殺す」という意味だが、現代では「甚大な被害を受けた」という意味で広く使われる。"}, {"word": "hegemony", "definition": "ある国家や勢力が他国に対して持つ政治的・軍事的・文化的な支配力や優位性のこと。国際政治の文脈で頻繁に使われる上級語彙。"}, {"word": "memorandum of understanding", "definition": "（MOU）法的拘束力を持たないことが多い、当事者間の合意事項を文書化した覚書。外交・ビジネス交渉の場でよく使われる専門用語。"}, {"word": "leverage", "definition": "交渉や競争において相手に影響を与えるための優位性や手段のこと。「レバレッジをかける」という形で外交・金融の文脈で広く用いられる。"}, {"word": "defang", "definition": "脅威となる相手の力や危険性を取り除くことを意味する比喩的表現。「牙を抜く」という直訳どおり、危険な存在を無力化するという文脈で使われる。"}, {"word": "culminated", "definition": "一連の出来事や過程が最高潮・クライマックスに達したことを表す動詞。「culminate in ~」で「~という結果に至る・頂点を迎える」という意味になる。"}, {"word": "countermoves", "definition": "相手の行動や戦略に対抗するための対応策や手立てのこと。軍事・外交・ゲーム理論などの文脈で用いられる複合語。"}]}, {"title_ja": "新首相、同じ問題：ブレグジットの「ツケ」がついに英国に到来", "title_en": "New Prime Minister, Same Problem: Brexit's Bill Finally Arrives for Britain", "summary_ja": "筆者は、キア・スターマー率いる労働党の政治的崩壊は戦術的ミスではなく、長年先送りにされてきたブレグジットの経済的代償がついに顕在化した結果だと論じる。トランプ政権の関税政策により英国経済の緩衝材が失われた今、EU市場へのアクセスを欠くことの打撃は深刻だ。筆者は、英国の軍事力をてこにEUとの緊密なパートナーシップを追求することが唯一の現実的な道だと主張する。", "summary_en": "The author argues that Labour's political collapse under Keir Starmer—who announced his resignation in June 2025—stems not from tactical errors but from Brexit's long-deferred economic consequences finally materializing. With Trump's trade disruptions removing the UK's remaining buffers, Britain's lack of EU market access has become acutely damaging. The author contends that closer partnership with the EU, leveraging Britain's military strength in exchange for market access, is the only viable path forward.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-kingdom/new-prime-minister-same-problem", "state_media": false, "category": "オピニオン", "full_text": "When British Prime Minister Keir Starmer led the Labour Party to a landslide victory in July 2024, he hailed the result as the end of 14 years of misrule by the Conservative Party and the beginning of a long period of stable, technocratic government. Starmer, the cautious former director of public prosecutions, drew a deliberate contrast to Conservative Prime Minister Boris Johnson’s illegal parties during the COVID-19 lockdown and the financial meltdown triggered by Johnson’s successor, Liz Truss, by promising a return to seriousness, and his chancellor of the Exchequer, Rachel Reeves, vowed to pair fiscal responsibility with a more active state. The exhausted electorate gave Labour a modest 33.7 percent of the vote, which translated to 411 out of 650 seats in the House of Commons because of the way votes were distributed. It was no ringing endorsement—immediately dubbed a “loveless landslide”—but it was more than enough to earn Starmer the benefit of the doubt.\nAlmost two years later, voters’ doubt has hardened into something closer to contempt. Labour has been trailing Nigel Farage’s insurgent Reform UK party in most national polls by almost ten points, a sharp contrast to the 2024 election, when Reform’s share of the vote was nearly 20 points below Labour’s. On June 22, his position no longer tenable, Starmer bowed to the inevitable and announced that he will step down as soon as Labour chooses his successor. His all but inevitable successor is Andy Burnham, the popular former mayor of Greater Manchester who joined Parliament after winning a by-election in Makerfield on June 18 with nearly 55 percent of the vote.\nMost explanations for Labour’s troubles focus on tactical errors: Starmer’s communication failures, Reeves’ overly strict fiscal rules, a cut in 2024 to pensioners’ winter fuel payments, and a tax on family farms imposed in 2025. All are real, but they are symptoms, not causes. The deeper story is that Brexit, the defining political event of modern British history, is finally presenting its bill, and Labour happens to be in office as it arrives. For a decade, the United Kingdom managed to defer a full reckoning with its vote to leave the European Union in June 2016. Starmer’s strategy depended on neutralizing Brexit as a live political issue, defusing it so that it could neither rally his opponents nor split his own coalition. This meant ruling out a customs union or membership in the single market and dressing up modest regulatory cooperation with the EU as the limit of his ambition.\nElectorally, that strategy worked. It cost nothing in the short term, and in the comparatively forgiving conditions of 2024, the British economy could underperform its peers but avoid an acute crisis. That environment no longer exists. U.S. President Donald Trump’s return to the White House, his weaponization of tariffs, and the breakdown of the rules-based trading order have exposed a British economy with no shock absorbers left. The EU, for all its dysfunctions, has a huge internal market and the scale to negotiate with the great powers as more than a supplicant. The United Kingdom does not.\nThe best way now for the United Kingdom to weather the global storm—and the best way for Labour to keep its coalition from falling apart—is to pursue closer partnership with the EU. There is reason to think a grand bargain is possible. The British economy needs access to European markets, and Europe needs Britain’s military power. What is needed is a final, elusive ingredient: political will.\nWHAT HAS GONE\nTo understand why the United Kingdom is suffering more than its continental neighbors from recent economic shocks, it helps to recall what EU membership provided. The single market gave British firms barrier-free access to 450 million consumers and made the United Kingdom a magnet for foreign investment seeking a foothold in Europe. The customs union spared British exports the rules-of-origin checks, sanitary inspections, and paperwork that now burden shipments across the English Channel. Rules that allowed EU firms to operate anywhere in the bloc—a privilege known as passporting—made the City of London the continent’s de facto financial center, and coordinated regulation gave the United Kingdom a seat at the table when European standards were written. None of this required the United Kingdom to give up its currency, central bank, fiscal policy, or army. The opt-outs British Prime Minister John Major negotiated at Maastricht in the early 1990s gave the country most of the upside of integration with little of the supranational constraint. This was a deal the rest of Europe tolerated because the United Kingdom brought military weight, financial expertise, and a counterweight to Franco-German dominance.\nThe decision to leave that arrangement was, as Mark Blyth and I argued in Foreign Affairs two years ago, a colossal economic own goal. The introduction of nontariff barriers raised the cost of trading with Europe by an amount ", "translation_ja": "英国のキア・スターマー首相が2024年7月に労働党を地滑り的勝利に導いた際、同氏は保守党による14年間の悪政の終焉と、安定した実務主義的政権の長期にわたる幕開けを宣言した。かつて慎重な姿勢で知られた元検察局長官のスターマーは、ボリス・ジョンソン首相のコロナ禍における違法パーティーや、後継者リズ・トラスが引き起こした金融混乱とあえて対比させるように「真剣さへの回帰」を約束し、財務大臣のレイチェル・リーブスは財政責任と積極的な国家介入の両立を誓った。疲弊した有権者は労働党にわずか33.7%の得票率をもたらしたが、票の分布により下院650議席中411議席の獲得に結びついた。熱狂とは程遠い——即座に「愛なき地滑り勝利」と揶揄された——結果だったが、スターマーへの信頼の猶予を与えるには十分すぎるものだった。\n\nそれから約2年、有権者の疑念は軽蔑に近いものへと変質した。労働党は、ナイジェル・ファラージ率いる新興政党「リフォームUK」に全国世論調査でほぼ10ポイントの差をつけられる状況が続いており、2024年総選挙時にリフォームの得票率が労働党を約20ポイント下回っていたことと比べると、鮮烈な対比をなす。6月22日、もはや立場を維持できないと判断したスターマーは既定路線に従い、労働党が後継者を選出し次第辞任することを表明した。後継者として最有力視されているのは、6月18日のメーカーフィールド補欠選挙で約55%の得票率で議会に返り咲いた、マンチェスター広域圏の元市長として人気を博すアンディ・バーナムである。\n\n労働党の苦境に対する説明の大半は戦術的ミスに焦点を当てている。スターマーのコミュニケーション失敗、リーブスの過度に厳格な財政規律、2024年の年金生活者向け冬季燃料手当の削減、そして2025年に課された農家への相続税などだ。いずれも現実の問題だが、それらは原因ではなく症状にすぎない。より深層にある物語は、近代英国政治史における最も決定的な出来事であるブレグジットが、ついにその請求書を提示しつつあり、折悪しく労働党がその到来時に政権の座にあるということだ。英国は10年にわたり、2016年6月のEU離脱という国民投票の決定と真正面から向き合うことを先送りにしてきた。スターマーの戦略はブレグジットを現役の政治的争点として無力化し、反対勢力を結集させることも自らの連立をバラバラにすることもないよう、その影響を拡散させることにかかっていた。そのためには関税同盟への加入や単一市場への復帰を排除し、EUとの小規模な規制協力を自らの野心の限界として粉飾することを意味した。\n\n選挙戦略としては、それは機能した。短期的にはコストゼロであり、比較的寛容だった2024年の経済環境では、英国経済は同水準の国々に対して劣後しながらも、急性の危機を回避することができた。しかしその環境はもはや存在しない。ドナルド・トランプ米大統領のホワイトハウス復帰、関税の武器化、そしてルールに基づく貿易秩序の崩壊は、緩衝材を使い果たした英国経済を丸裸にした。EUはその機能不全にもかかわらず、巨大な域内市場を持ち、大国と対等に交渉できる規模を備えている。英国にはそれがない。\n\n今や英国が世界的嵐を乗り越える最善の方法——そして労働党が連立を崩壊から守る最善の方法——は、EUとのより緊密なパートナーシップを追求することだ。大きな取引が可能だと考える理由はある。英国経済はヨーロッパ市場へのアクセスを必要とし、ヨーロッパは英国の軍事力を必要としている。必要なのは、いまだ掴みどころのない最後の要素、すなわち政治的意志だ。\n\n失われたもの\n\nなぜ英国が最近の経済的衝撃から大陸の隣国より大きな打撃を受けているかを理解するには、EU加盟が何をもたらしていたかを振り返ることが助けになる。単一市場は英国企業に4億5000万人の消費者への障壁なきアクセスを与え、英国をヨーロッパへの足がかりを求める外国投資の磁石にした。関税同盟は、今や英仏海峡を越える輸送を悩ませる原産地規則の確認、衛生検査、書類作成から英国の輸出業者を解放していた。EU企業が域内のどこでも事業を展開できるルール——「パスポーティング」として知られる特権——はロンドン・シティを大陸の事実上の金融センターとし、協調した規制体制は欧州基準の策定にあたって英国に発言権を与えていた。これらは英国に自国通貨、中央銀行、財政政策、軍隊の放棄を求めるものでは何一つなかった。1990年代初頭にマーストリヒトでジョン・メージャー首相が交渉した適用除外規定は、超国家的な制約をほとんど受けることなく統合の恩恵の大部分を英国に与えるものだった。これは、英国が軍事的存在感、金融の専門性、そしてフランス・ドイツ主導への対抗軸をもたらす限り、ヨーロッパの残りが許容してきた取引だった。\n\nその取り決めから離脱するという決定は、マーク・ブライスと私が2年前に『フォーリン・アフェアーズ』誌で論じたように、途方もない経済的自傷行為だった。非関税障壁の導入はヨーロッパとの貿易コストを……", "vocab": [{"word": "passporting", "definition": "金融規制における「パスポーティング」とは、EU域内の金融機関が一つの加盟国で免許を取得すれば他の全加盟国でも事業を展開できる権利のこと。ブレグジット後、英国の金融機関はこの特権を失った。"}, {"word": "supplicant", "definition": "「懇願者」「お願いする立場の弱者」を意味し、ここでは大国との交渉で対等な立場に立てない小国の状況を指す。外交・国際政治の文脈で力の非対称性を表す際に用いられる。"}, {"word": "nontariff barriers", "definition": "「非関税障壁」とは、関税以外の手段（規制、検査、書類手続きなど）によって貿易を制限・阻害する措置の総称。ブレグジット後の英EU間貿易コスト増大の主因として頻繁に言及される専門用語。"}, {"word": "technocratic", "definition": "「テクノクラート的な」という形容詞で、政治的イデオロギーよりも専門的知識や技術的合理性に基づいた統治スタイルを指す。スターマーの政権運営スタイルを描写する文脈で使われている。"}, {"word": "insurgent", "definition": "本来「反乱者」を意味するが、政治文脈では既成政治体制に挑戦する新興の勢力や運動を指す。ここではリフォームUKが既存の二大政党制に揺さぶりをかける存在として描写されている。"}, {"word": "opt-outs", "definition": "EU条約において特定の加盟国が一部の政策（共通通貨ユーロや申根協定など）への参加を免除される「適用除外」規定のこと。英国がマーストリヒト条約で獲得した特権的地位を説明する際の重要な法的・政治的用語。"}, {"word": "reckoning", "definition": "「清算」「ツケを払う時」を意味する表現で、過去の決断や行動の結果として生じる厳しい現実との対峙を指す。'Brexit is presenting its bill'と並んで使われ、先送りにしてきた代償の到来を示す比喩的表現。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-28 10:53 JST";
renderTabs();renderList();
</script>
