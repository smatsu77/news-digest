 as swatting. Law enforcement responded to the fabricated emergency call, causing a temporary disruption for the Buttigieg family. Police confirmed the report was false and no one was harmed in the incident.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMioAFBVV95cUxQVGktUXdaTUpaYmFCZWJwOG4tVWwzLVR4cEtCWk1zY3ExQnItQkxmWE9jRTJuRFcta2JYYUFyNG5GU0tzZ1FnODBVbVRmVVhlMjlQM0FIS3FqRm1naDhBSElkSldIbmZkWkxDSkZXaXlXZmtrVTg4WTAxZ1djUC00UnJlbWtVUURoTFVPTnNvUTJHNTB6WmV3Y0k1QUQ3bjZN?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震：瓦礫の下に取り残された肉親を呼び続ける家族たち", "title_en": "Families Vigil Over Rubble as Loved Ones Remain Trapped After Venezuela Earthquakes", "summary_ja": "ベネズエラのラ・グアイラでは、地震によって倒壊した建物の下に家族が閉じ込められていると信じる人々が、現場で不安な夜を過ごしている。重い瓦礫を取り除くための十分な機材がなく、救助活動は困難を極めている。被災地では緊急救助体制の強化が急務となっている。", "summary_en": "Desperate families in La Guaira, Venezuela are keeping vigil at collapsed buildings where they believe relatives are trapped following recent earthquakes. Rescuers and family members face the enormous challenge of moving heavy debris without adequate equipment. The situation highlights the urgent need for emergency response resources in the affected region.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cp8l451420zo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カラカスで続く救助活動、希望が薄れる中で怒りが拡大", "title_en": "Caracas Faces Its Darkest Hour as Rescue Efforts Continue Amid Growing Anger", "summary_ja": "ベネズエラの首都カラカスでは、救助隊が瓦礫の下に閉じ込められた生存者を救出するため昼夜を問わず活動を続けており、多くの人々がこれをベネズエラ現代史上最も困難な瞬間と表現している。生存者発見への希望が薄れるにつれ、市民の間では不満と怒りが高まっている。この危機は、ベネズエラの首都を襲う深刻な人道的・社会的圧力を浮き彫りにしている。", "summary_en": "Rescue teams in Caracas are working around the clock to reach survivors trapped under rubble in what many describe as the hardest moment in Venezuela's modern history. As hopes of finding survivors diminish, frustration and anger among the population are intensifying. The crisis reflects the deepening humanitarian and social pressures gripping the Venezuelan capital.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cdjk8zwe7z3o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国とイランが相互攻撃、双方が停戦違反と非難", "title_en": "US and Iran Trade Strikes, Each Accusing the Other of Ceasefire Violations", "summary_ja": "米国とイランが軍事攻撃を応酬し、双方が相手側の停戦協定違反を非難している。イランは、米国がイラン国内の複数の標的を攻撃したことへの報復として、クウェートとバーレーンの米国インフラを攻撃したと発表した。この激化する応酬は、両国間の緊張が危険な水準まで高まっていることを示している。", "summary_en": "The United States and Iran have exchanged military strikes, with each side accusing the other of breaking a ceasefire agreement. Iran announced retaliatory attacks on US infrastructure in Kuwait and Bahrain, following American strikes on multiple targets across Iran. The escalating exchanges mark a dangerous deterioration in tensions between the two nations.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cdxdwkgqgq0o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ファクトチェック：欧州の猛暑、日焼け止めは本当に信頼できるのか？", "title_en": "Fact Check: Can You Trust Your Sunscreen During Europe's Heat Wave?", "summary_ja": "欧州を襲う熱波の中、日焼け止めの安全性や皮膚がんとの関連を疑うオンライン上の主張が再び広まっている。ドイチェ・ヴェレがこれらの根強い情報についてファクトチェックを実施した。専門家たちは、日焼け止めは有害な紫外線から肌を守るための安全かつ実証済みの手段であると強調している。", "summary_en": "As a heat wave grips Europe, online claims questioning the safety of sunscreen and its alleged links to skin cancer are spreading widely. Deutsche Welle conducted a fact check to examine these recurring claims. Health experts emphasize that sunscreen remains a proven and safe tool for protecting skin against harmful UV radiation.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/fact-check-as-europe-bakes-should-you-trust-your-sunscreen/a-77707226?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ハンガリーのマジャル新政権、「煉獄作戦」でオルバン体制の解体に着手", "title_en": "Hungary's Magyar Launches 'Operation Purgatory' to Dismantle Orban's System", "summary_ja": "ハンガリーのマジャル新政権は、前首相ビクトル・オルバンが構築した政治体制を解体するための大規模な取り組み「煉獄作戦」を開始した。この作戦は、汚職撲滅、国営メディアの改革、民主主義の擁護を主な柱としている。オルバン政権の終焉を受け、ハンガリーの政治は大きな転換点を迎えている。", "summary_en": "Hungary's new government under Magyar has launched 'Operation Purgatory,' a sweeping initiative to dismantle the political system built by former Prime Minister Viktor Orban. The effort focuses on combating corruption, reforming state media, and strengthening democratic institutions. The moves signal a dramatic shift in Hungary's political direction following Orban's removal from power.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/with-operation-purgatory-magyar-moves-to-demolish-orban-system/a-77726207?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ドイツの猛暑が東部へ移動、緑の党は公共施設へのエアコン設置を要求", "title_en": "Extreme Heat Wave Shifts East Across Germany as Greens Push for Public Air Conditioning", "summary_ja": "ドイツを襲っていた大規模な熱波は東部へと移動し徐々に和らいでいるが、国内のほぼ全域で依然として猛暑警報が発令されている。緑の党の政治家は、危険な気温に対応するため、公共施設へのエアコンの迅速な設置を求めている。今回の事態は、夏の猛暑がますます深刻化する中、インフラ整備への懸念が高まっていることを浮き彫りにしている。", "summary_en": "A major heat wave in Germany is gradually moving eastward and beginning to ease, though extreme heat warnings remain in effect across nearly the entire country. A politician from the Green Party is calling for the rapid installation of air conditioning in public facilities in response to the dangerous temperatures. The situation highlights growing concerns about infrastructure preparedness for increasingly severe summer heat events.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-news-extreme-heat-heads-east-greens-want-air-con/live-77733670?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ氏が仲介した採掘契約、息子らと商務長官の関係者が利益を得る構図", "title_en": "Trump Brokered Mining Deal Benefiting His Sons and Commerce Secretary Ties", "summary_ja": "米国とカザフスタンの間で締結された協定により、トランプ大統領および商務長官と関係を持つ米国人投資家グループが、世界最大級の未開発タングステン鉱床へのアクセス権を獲得した。トランプ大統領の息子たちもこの数十億ドル規模の採掘契約から利益を得る立場にある。この取り決めは、政権中枢における利益相反に関する新たな倫理上の懸念を呼び起こしている。", "summary_en": "A U.S.-Kazakhstan agreement has granted American investors connected to President Trump and Commerce Secretary a stake in one of the world's largest untapped tungsten reserves. Trump's sons are among those positioned to profit from the billion-dollar mining deal. The arrangement raises fresh ethics concerns about conflicts of interest at the highest levels of the administration.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/28/world/europe/trump-lutnick-sons-kazakhstan.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国とイランが脅迫を応酬、湾岸同盟国がイラン製ドローンを迎撃", "title_en": "U.S. and Iran Trade Threats as Gulf Allies Intercept Iranian Drones on Day Four", "summary_ja": "トランプ大統領とイランの革命防衛隊が激しい脅迫を応酬し、両国間の敵対行為は4日目に突入した。湾岸地域の米国同盟国は、イラン製ドローンを迎撃したと報告している。緊張が高まり続ける中、緊張緩和の兆しはほとんど見られない。", "summary_en": "President Trump and Iran's Revolutionary Guards exchanged escalating threats as hostilities between the two nations entered a fourth consecutive day. U.S. allies in the Gulf region reported intercepting Iranian drones amid the ongoing tensions. There are few signs of de-escalation as the standoff continues to intensify.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/28/world/us-iran-strikes-hormuz", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "北京の最高層ビルに小型機が衝突、パイロットの死亡を中国当局が確認", "title_en": "China Confirms Pilot Dead After Small Plane Crashes Into Beijing's Tallest Tower", "summary_ja": "中国当局は、北京で最も高いビルに小型飛行機を衝突させたパイロットの死亡を正式に確認した。事故は中国共産党本部からわずか約8キロの地点で発生し、13人が負傷した。前日にはオンライン上に落下する破片や機体の部品とみられる画像が拡散していた。", "summary_en": "Chinese authorities have confirmed the death of a pilot whose small plane struck Beijing's tallest skyscraper. The incident, which occurred just five miles from Communist Party headquarters, also left 13 others injured. Images circulating online the previous day had shown falling debris and aircraft parts from the collision.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/28/world/asia/china-pilot-died-plane-crash-beijing.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "人質解放の行き詰まり打開後、パレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を二分する軍事ゾーンをパレスチナ避難民が通過することを許可し、北ガザへの徒歩帰還が始まった。この措置は、人質解放をめぐる交渉の行き詰まりが打開されたことを受けたものである。今回の動きは、ガザ地区内の人道状況における重要な転換点とみられている。", "summary_en": "Israel permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The move came after a deadlock over hostage releases was resolved. The development marks a significant shift in the humanitarian situation within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss Amid Deepening Property Crisis", "summary_ja": "中国の大手不動産デベロッパーである万科が多額の損失を計上し、同国の不動産セクターの悪化が続いていることが浮き彫りになった。この問題は不動産危機がさらに広範な経済に波及するかどうかへの懸念を高めている。中国政府が事態の安定化に向けて介入するかどうかに市場の注目が集まっている。", "summary_en": "Leading Chinese property developer Vanke has reported a significant financial loss, highlighting the continued deterioration of China's real estate sector. The troubles raise concerns about how far the property crisis may spread across the broader economy. Analysts and investors are watching closely to see whether the Chinese government will intervene to stabilize the situation.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の弾片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still Embedded From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による弾片が依然として残っていたことが明らかになった。イスラエルの医療当局者によると、女性の一部は長期間にわたり単独で拘束され、約8か月間を地下トンネルの中で過ごしていたという。この事実は、人質たちが拘束中に受けた深刻な身体的・精神的被害を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The findings highlight the severe physical and psychological toll endured by the hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カーボベルデのW杯躍進、英国在住のディアスポラ・コミュニティに喜びと誇り", "title_en": "Cape Verde's World Cup Run Delights UK Diaspora Community", "summary_ja": "カーボベルデ代表がワールドカップでスペインやウルグアイと引き分けるなど健闘を見せ、英国在住のカーボベルデ系移民コミュニティに大きな誇りをもたらしている。かつて地図で自国を見つけることすら難しかったという13歳のローリンさんは、世界舞台に立つ祖国の姿に感激していると語った。チームの活躍により、これまであまり知られていなかったこのアフリカの島国に世界中から注目が集まっている。", "summary_en": "Cape Verde's impressive performance at the World Cup, including hard-fought draws against Spain and Uruguay, has brought immense pride to the Cape Verdean diaspora in the UK. Thirteen-year-old Lauryn, who once struggled to find her family's home nation on a map, says the tournament has finally put the tiny African island nation in the global spotlight. Community members say the team's skill and talent have captured worldwide attention and sparked widespread conversations about Cape Verde.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/26/cape-verde-world-cup-run-delights-diaspora-community-uk", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コンゴ民主共和国でエボラ感染者約300人の行方不明、大規模感染拡大を懸念", "title_en": "Nearly 300 Ebola Patients Unaccounted For in DR Congo Amid Fears of Mass Outbreak", "summary_ja": "アフリカCDCのトップによると、コンゴ民主共和国でエボラ陽性と判定された約300人の行方が分からなくなっている。紛争による人道危機で100万人以上が避難民キャンプに暮らしており、医療従事者はそれらの地域にアクセスできない状況だ。感染が地域社会で広がり続けた場合、9月までに数千人規模の死者が出るとモデルが予測している。", "summary_en": "Almost 300 people who tested positive for Ebola in the Democratic Republic of the Congo have gone missing, according to the head of Africa CDC. A humanitarian crisis driven by ongoing conflict has displaced over one million people into camps that health workers cannot access. Modelling warns the outbreak could cause thousands of deaths in the DRC by September if community transmission continues unchecked.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ソマリア政府をSNSで批判した女性に禁固3年の判決、国内外で怒りの声", "title_en": "Somali Woman Jailed 3 Years for Criticizing Government Online", "summary_ja": "ソマリアで27歳の看護学卒業生サディア・モアリム・アリさんが、SNS上での政府機関への批判を理由に6月25日、禁固3年の判決を受けた。この判決は「根本的に不当」として、元大統領や元首相、人権団体から即座に非難の声が上がり、国内で大きな怒りを呼んでいる。当初は政府機関への侮辱と犯罪扇動の2つの罪で起訴されたが、最終的に前者のみで有罪となった。", "summary_en": "Sadia Moalim Ali, a 27-year-old nursing graduate and rickshaw driver in Somalia, was sentenced to three years in prison on June 25 for insulting government institutions on social media. The case has sparked widespread outrage, with the sentence condemned as 'fundamentally unjust' by former presidents, prime ministers, and human rights groups. She was originally charged with both insulting government institutions and incitement to commit a crime, but was ultimately convicted only on the former charge.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/26/woman-sadia-moalim-ali-three-year-jail-sentence-somalia-online-comments-governement", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大学生の学力、想像以上に低下——10歳児並みの成績も", "title_en": "Students Are Performing Far Worse Than Expected, Some Testing at Elementary School Level", "summary_ja": "新たな調査により、大学・短大生の学力水準が一般的に思われているよりも大幅に低いことが明らかになった。一部の高等教育在籍者は、10歳児と同程度のテスト結果しか出せていないという。この発見は、教育水準や高等教育の資格が持つ本来の価値について深刻な疑問を投げかけている。", "summary_en": "A new analysis reveals that academic performance among college and university students is significantly lower than widely assumed. Some higher education students are achieving test scores comparable to those of ten-year-old children. The findings raise serious concerns about educational standards and the true value of post-secondary credentials.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "独裁国家が主導する新たな国際紛争調停", "title_en": "Autocracies Are Reshaping Global Conflict Mediation", "summary_ja": "権威主義国家が国際紛争の調停役として台頭し、従来の民主主義国家に代わる存在となりつつある。こうした独裁国家が仲介する合意は、自国の政治的利益や価値観を反映しており、民主主義国家が促進してきた和平合意とは大きく異なる性質を持つ。この変化は、成立する和平協定の長期的な持続可能性や公正性に対する懸念を呼んでいる。", "summary_en": "Authoritarian states are increasingly stepping in as mediators in international conflicts, displacing traditional democratic peacemakers. The deals brokered by these autocracies tend to reflect their own political interests and values, differing markedly from agreements facilitated by liberal democracies. This shift raises concerns about the long-term durability and fairness of the peace settlements being produced.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アジアの同盟国、トランプ氏を受け入れざるを得ない現実", "title_en": "Asian Allies Have No Choice But to Embrace Trump", "summary_ja": "日本をはじめとするアジア諸国は、中国に対抗するうえで米国の安全保障の代替手段が存在しないことを認識している。中規模国家による連合構想は現実的な選択肢とはなり得ず、トランプ政権との関係強化が不可避となっている。アジアの同盟国はトランプ氏の条件を受け入れてでも、米国との同盟を維持する道を選ぶとみられる。", "summary_en": "Japan and other Asian nations are finding that middle-power coalitions offer no viable alternative to American security guarantees. Despite concerns about Donald Trump's reliability, these countries recognize that only the United States possesses the military deterrence capacity needed to counter China. As a result, Asian allies are expected to draw closer to Washington, accepting Trump's terms rather than risk standing alone against Beijing.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "1万5000人が死亡した2003年の熱波から20年、フランスの気候適応は依然として不十分", "title_en": "France Still Unprepared for Heatwaves Despite 2003 Disaster That Killed 15,000", "summary_ja": "2003年8月、フランス政府が夏季休暇中に前例のない熱波が襲い、1万5000人が死亡した。この公衆衛生上の惨事を受けて熱中症対策や警報システムは改善されたものの、気候変動に伴う猛暑の激化に対応するための抜本的な構造改革は進んでいない。専門家たちは、フランスのインフラや都市設計がもはや存在しない過去の気候を前提に作られていると警告している。", "summary_en": "A catastrophic heatwave in August 2003 killed 15,000 people in France while the government was on vacation, prompting reforms to heat alert systems and medical response protocols. However, experts warn that France has failed to undertake the deeper structural adaptations needed to cope with increasingly severe heatwaves driven by climate change. The country's infrastructure, urban planning, and public systems were built for a climate that no longer exists.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/france/article/2026/06/28/our-infrastructure-was-designed-for-a-climate-that-no-longer-exists-france-s-unfinished-reckoning-with-increasing-heatwaves_6754944_7.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "マルタン・マルジェラ、個人アーカイブから200点をオークションに出品", "title_en": "Martin Margiela Auctions 200 Pieces from Personal Archives in Paris", "summary_ja": "その極度の秘密主義で知られるファッションデザイナー、マルタン・マルジェラが、7月9日にパリで個人所蔵品やプロトタイプ200点をオークションに出品する。2008年にファッション界を去ったマルジェラ自身が企画・主導するこのセールは、彼の創作プロセスを垣間見る貴重な機会となる。この大胆な行動は、彼のラディカルな芸術的歩みを体現するものだ。", "summary_en": "Legendary fashion designer Martin Margiela, known for his extreme secrecy, is putting 200 personal items and prototypes up for auction in Paris on July 9. The sale, personally initiated and organized by Margiela himself, offers a rare glimpse into his creative process. Having left the fashion world in 2008, this bold gesture reflects the same radical spirit that defined his artistic career.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/lifestyle/article/2026/06/28/martin-margiela-puts-200-pieces-from-his-personal-archives-up-for-sale_6754941_37.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震で約1500人死亡、数百万人が支援必要", "title_en": "Venezuela Earthquakes Kill Nearly 1,500 as Millions Face Humanitarian Crisis", "summary_ja": "ベネズエラで発生した地震により、これまでに約1500人が死亡した。国連人道問題調整事務所のトム・フレッチャー代表は、5万人以上が行方不明となっており、死者数がさらに増加する可能性があると警告している。すでに深刻な人道危機を抱える同国で、数百万人が緊急支援を必要としている。", "summary_en": "A series of earthquakes in Venezuela has killed almost 1,500 people, with UN aid chief Tom Fletcher warning the death toll could rise further. More than 50,000 people remain missing, and millions more are in urgent need of humanitarian assistance. The disaster has prompted international concern over the scale of the crisis in the already struggling nation.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/28/venezuela-quakes-kill-almost-1-500-with-millions-more-in-need_6754937_4.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラク治安部隊、汚職摘発で複数の当局者を逮捕", "title_en": "Iraq Security Forces Arrest Several Officials in Anticorruption Crackdown", "summary_ja": "イラクの治安部隊は夜明けに大規模な汚職摘発作戦を実施し、バグダッドで複数の当局者を逮捕した。作戦はグリーンゾーンおよび首都各地の複数の地区を対象に行われたと、治安筋が明らかにした。今回の摘発は、イラク当局が政府内に根付く汚職に対して改めて取り締まりを強化する姿勢を示すものだ。", "summary_en": "Iraqi security forces conducted a large-scale anticorruption operation at dawn, arresting several officials in Baghdad. The operation targeted the Green Zone as well as multiple neighbourhoods across the capital, according to a security source. The crackdown signals a renewed push by Iraqi authorities to tackle entrenched corruption within government ranks.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/28/iraq-security-forces-arrest-several-officials-in-anticorruption-crackdown?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "FIFAワールドカップ ラウンド・オブ・32：組み合わせ・日程・イランが敗退", "title_en": "FIFA World Cup Round of 32: Bracket, Schedule & Key Storylines as Iran Exit", "summary_ja": "FIFAワールドカップの決勝トーナメント1回戦が始まり、南アフリカ対カナダの試合で幕を開けた。イランはグループステージで敗退し、アフリカ勢は今大会で歴史的な快進撃を見せた。メッシとロナウドの夢の決勝対決への期待も高まっている。", "summary_en": "The FIFA World Cup knockout stage kicks off with South Africa facing Canada in the opening Round of 32 match. Iran have been eliminated from the tournament, while African nations have made history in the group stage. Excitement builds around a potential Messi-Ronaldo final as the bracket takes shape.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/6/28/fifa-world-cup-2026-sunday-schedule-round-of-32-fixtures-predictions?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラン、米軍攻撃への報復としてクウェートとバーレーンを攻撃", "title_en": "Iran Attacks Kuwait and Bahrain Following US Strikes", "summary_ja": "イランは米軍による攻撃への報復として、クウェートとバーレーンに対して攻撃を実施し、湾岸地域の緊張が急激に高まった。クウェートとバーレーンの両国はイランによる攻撃を強く非難した。今回の事態により、進行中の米イラン外交交渉にも深刻な影響が及んでいる。", "summary_en": "Iran launched attacks against Kuwait and Bahrain in retaliation for US military strikes, escalating tensions across the Gulf region. Both Kuwait and Bahrain have condemned the Iranian actions. The strikes have placed significant strain on ongoing US-Iran diplomatic negotiations.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/28/iran-attacks-kuwait-and-bahrain-in-response-to-us-strikes?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "再生したドイツ左翼党、「ガザ戦争はジェノサイド」と主張しつつイスラエルの存在権を支持", "title_en": "Rejuvenated German Left Party: Gaza War Is Genocide, Israel Should Exist", "summary_ja": "再建を果たしたドイツの左翼党は、ガザでの戦争をジェノサイドと断定する一方で、イスラエルの存在権を支持するという二元的な立場を表明した。この姿勢は、親パレスチナ的な感情とイスラエルの主権尊重を両立させようとする党の試みを反映している。左翼党は内部分裂による低迷期を経て、政治的存在感の回復を目指している。", "summary_en": "Germany's reinvigorated Left party has taken a dual stance, declaring that the war in Gaza constitutes genocide while simultaneously affirming Israel's right to exist. The position reflects the party's attempt to balance pro-Palestinian sentiment with a commitment to Israel's sovereignty. This stance comes as the German Left party seeks to rebuild its political relevance following a period of internal turmoil.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiowJBVV95cUxQaEFQSDduYnJwRWk4NDV2aFRnSkx5VWxXZDk4VXdTY3RjV3VSeV9Ob0plRWJUVVdvbHRsbUpqMno0RVBveGhKMDZkTlFieTdXVjlJXy1DWm9mOFhic1BJRnJleW1oXy1sNURCTGNXU1JUZXNlbUU4d3doN0VFVlZhMzZHbTJKXzF2aDdwbFBnSHZzY25SVnJKd25UM3RJbUNpbXJEZFZaQVJHQVgyZ3VkZ3gzc3lob05IMWZwcGlxZEE5S3BRWHlDMFd4Z1VZTnl3VXlOeWNGY2hPbTRyb2RTZU5XMzlGem1DN002cVduX3dGaTZKdHdLd19tSFMxTzAzMlgyQTVJUzFsU3otX3pQZHBpNjFsUUdKUWloMTdmWkEtVTA?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "シアトルの「プライドマッチ」にエジプト対イラン戦、アラブ世界で激しい反発", "title_en": "Arab World Outraged Over Egypt–Iran Soccer Match Dubbed 'Pride Match' in Seattle", "summary_ja": "シアトルで開催予定のエジプト対イランのサッカー試合が「プライドマッチ」として宣伝され、アラブ世界全体で強い反発を招いた。多くのアラブ人やムスリムの識者は、自国チームの試合を観戦するためにLGBTQ+のシンボルを掲げることを求められるのかと不満を示した。この論争は、西洋のLGBTQ+推進と中東に根強い保守的価値観との文化的摩擦を改めて浮き彫りにしている。", "summary_en": "An Egypt–Iran soccer match scheduled in Seattle has sparked widespread outrage across the Arab world after it was promoted as a 'Pride Match' coinciding with LGBTQ+ Pride events. Many Arab and Muslim commentators expressed deep offense, questioning whether they were expected to celebrate LGBTQ+ symbols to watch their national teams play. The controversy highlights ongoing cultural tensions between Western LGBTQ+ advocacy and conservative values prevalent in the Middle East.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihAJBVV95cUxOSE92Vmt4b19DYkE4TFFuTzBQbjdpbTczRHlWemtXNDVHSEFPcFBJdlpPejZwV2ZSaTYzNXFoeG1wUXp4RlRaUFdrdk5ZRW5qcW8yZ1QtZG1XcTdpT2JUazN5c2pxaEJvaGN1TmpYUFdmakcwSFVGcVc0VDNLN2xpc2p0b1VDTnM5Tm8xQkRnT3QzdWZZS2FYSlQ1NEVEVU5aWF9vY05rTkhCNGFHWU9FUU5IMG9PTzdBclhnR2VtZ1RSZlJyc3BlclBzcmM1NTUtZUJKcVhDczBPSXBudXJReDItS0ZYX0czUUhTSHVZVlQxV3EyaFRLRC1MWXpVdDFvOXZGWA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "入植者がパレスチナ人の家屋に放火を試みるも、ヨルダン川西岸の村で激しい抵抗に遭う", "title_en": "Settlers Attempted to Torch Palestinian Homes, Met Fierce Resistance in West Bank Village", "summary_ja": "イスラエルの入植者たちがヨルダン川西岸のパレスチナ人の村で家屋に放火しようとしたが、地元住民の強い抵抗に遭い失敗した。この事件は、入植者とパレスチナ人コミュニティの間で続く緊張関係を浮き彫りにしている。イスラエル紙ハアレツによると、村が攻撃を撃退したことは、入植者による暴力事件としては異例の結果となった。", "summary_en": "Israeli settlers attempted to set fire to Palestinian homes in a West Bank village, but were met with strong resistance from local residents. The incident highlights ongoing tensions between settlers and Palestinian communities in the region. Haaretz reports the village successfully defended itself against the attack, marking an unusual outcome in settler violence cases.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMirgJBVV95cUxOdC0zSnZJUDFyNjE3amYtMkdXM3ZJamhRM3FBa19nRlowcHFvMC1PWExDWFZnOWhTRnhTc010MVFocHhPZTdsS1pRSHh0RnFKcmRwVDhOeGhWMUI1cDJ2NEw2c2VUenhSTkVJeUtpeE9zNUYxZ3hKMy1HdDFLc3FHd1hGVnVBZG5vZndlRWE2TDE5dmZ1eXVtekVud0lNUlVveldLUFBkb29ram9HT0ZqZVI0WklqMXFtbzM0MmtnS1Y2dTFQd3lwVXdqd2lWdnF3SXRHeTBUYjdjSmRQWU9fdGc4UXU2WmVQOVV4QXpEZ0twc2tMb0tyZG5reXh2YzlpYTJ4S1lwX2pxTkdJbjJXdTg1aVdmSnprWnlWSjlCcl9QTEpjWE1sQ3VucEZCZw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国防省（Mindef）ニュースレター更新 – 2026年6月28日", "title_en": "Mindef Newsletter Update – June 28, 2026", "summary_ja": "シンガポール国防省（Mindef）は2026年6月28日（日）、ストレーツ・タイムズのメール配信プラットフォームを通じてニュースレターを発行した。メールが正しく表示されない場合は、提供されたリンクをクリックするよう受信者に案内している。また、追加の無料ニュースレターへの登録や、専用ポータルでの購読管理も呼びかけている。", "summary_en": "The Singapore Ministry of Defence (Mindef) issued a newsletter update on Sunday, June 28, 2026, distributed via The Straits Times mailing platform. The notice advises recipients to click a provided link if the email is not displaying correctly. Readers are also invited to sign up for additional free newsletters and manage their subscription preferences through the designated portal.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "ストレーツ・タイムズの夕刊ニュースレター「イブニング・アップデート」の配信です。最新ニュースや注目記事をまとめてお届けします。購読管理や他の無料ニュースレターへの登録も可能です。", "summary_en": "The Straits Times publishes its Evening Update newsletter, delivering a curated summary of the day's top news and stories. Readers can manage their subscription or sign up for additional free newsletters through the provided links. The update is distributed digitally and optimized for email viewing.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ストレーツ・タイムズ モーニング・ブリーフィング", "title_en": "The Straits Times Morning Briefing", "summary_ja": "ストレーツ・タイムズのモーニング・ブリーフィングは、主要ニュースを読者に届ける毎日配信のニュースレターです。今回取り上げられているのは2026年6月28日（日曜日）付けの版です。読者はウェブサイトを通じて購読管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a daily newsletter delivering top news highlights to subscribers. The edition referenced appears to be from Sunday, June 28, 2026. Readers can manage their subscription or sign up for additional free newsletters through the publication's website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "持続可能性の建前と経済的現実：両立は可能か？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、持続可能性への誓約と途上国が直面する厳しい経済的現実との間に生じる緊張関係を検証している。野心的な環境目標が、経済成長や貧困削減という喫緊の課題と両立できるかどうかを問う内容となっている。政策立案者やビジネスリーダーに対し、建前を超えて生態的責任と財政的実現可能性のバランスを取る現実的な道筋を示すよう求めている。", "summary_en": "The Jakarta Post examines the growing tension between sustainability pledges and hard economic realities facing developing nations. The piece questions whether ambitious environmental commitments can be reconciled with the urgent need for economic growth and poverty reduction. It challenges policymakers and business leaders to move beyond rhetoric and find practical pathways that balance ecological responsibility with financial viability.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コモド島への観光客が増加傾向に", "title_en": "Tourist Visits to Komodo Island on the Rise", "summary_ja": "世界的に有名なコモドドラゴンの生息地として知られるコモド島で、観光客数が増加している。独自の野生動物や自然景観への世界的な関心の高まりを反映し、インドネシアのこの観光地への訪問者が増えている。当局や自然保護活動家たちは、観光の発展と島の繊細な生態系の保護を両立させるため、この動向を注視している。", "summary_en": "Komodo Island, home to the world-famous Komodo dragons, is experiencing a growing influx of tourists. The Indonesian destination has seen increased visitor numbers, reflecting rising global interest in its unique wildlife and natural scenery. Authorities and conservationists are monitoring the trend to balance tourism growth with the protection of the island's fragile ecosystem.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikwFBVV95cUxOQnVENlpVakhEVnVrUXdKUzdjUVljNjJzQ2pMRnliQTB5Wm4xV01fdEx3Y3JwaWcxc3Z3SUM2U1MyLU9fNHV6MFJ6MTRmN2E1NTBMZlZKU3d0NGZ2VU0yUVBEZzF4NG4xdTE2NmFXVDQ3TDYyMHRQQ1FaeVhDaVFmWkE1ZmpWOHhiNmxRd0NmbnpSdlk?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ジャカルタ、「ディープステート」と対峙する", "title_en": "Jakarta Confronts the Deep State", "summary_ja": "ジャカルタ・ポスト紙は、「ディープステート」の概念がジャカルタおよびインドネシア政治にどう当てはまるかを検証している。官僚や軍の既得権益が水面下で政治を動かしている可能性を掘り下げ、インドネシアの政治における透明性と説明責任の問題を提起している。", "summary_en": "The Jakarta Post examines the concept of the 'deep state' as it applies to Jakarta and Indonesian politics. The article explores how entrenched bureaucratic and military interests may be shaping governance behind the scenes. It raises questions about transparency and accountability in Indonesia's political landscape.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihAFBVV95cUxPWnN5Vjh2ZnRIZFFURUdUSWhoMVJIOHliTVo0VW9MTDI1SVktcGg1T1AyS3hHX21KU0NTbjg4U25TWHE1a2lGRlFPblp6WUJWaFdkcldsVXhpc0xfeE1pSTRjeHBNMTVVelF1c0JIRlFrSU5MT19pc29MYUFVbXR3VnhxNWM?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ウガンダ軍司令官が主要独立系メディアグループを閉鎖命令", "title_en": "Uganda Army Chief Orders Shutdown of Leading Independent Media Group", "summary_ja": "ムセベニ大統領の息子でウガンダ軍司令官のムホージ・カイネルガバ氏が、主要な独立系メディアグループの閉鎖を命じた。同氏はここ数カ月で政治家や活動家の逮捕を相次いで指示するなど、権力掌握を強めている。今回の報道機関への弾圧は、報道の自由と大統領の後継をめぐる権力集中に対する深刻な懸念を呼んでいる。", "summary_en": "Uganda's military chief Muhoozi Kainerugaba, son of President Yoweri Museveni, has ordered the closure of a leading independent media group. The move marks the latest in a series of authoritarian actions by Kainerugaba, who has also ordered arrests of politicians and activists. The shutdown raises serious concerns about press freedom and the consolidation of power by the president's son ahead of a potential succession.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/uganda-army-chief-shuts-down-leading-independent-media-group/article71157517.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラク、ホルムズ海峡の再開をイランに要求　米軍はイラン国内10目標を攻撃", "title_en": "Iraq Urges Iran to Reopen Hormuz Strait as US Strikes 10 Targets in Iran", "summary_ja": "イラクの外相がイランの外相に対し、ホルムズ海峡の再開を求めた。米軍は停戦が2日目に入った中でもイラン国内の10か所の目標を攻撃したと発表した。西アジア情勢は依然として緊張が続いており、地域全体の安定が脅かされている。", "summary_en": "Iraq's Foreign Minister has urged his Iranian counterpart to reopen the Strait of Hormuz amid escalating tensions in West Asia. The US military confirmed it struck 10 targets inside Iran as a fragile ceasefire came under strain on its second day. The situation remains volatile with continued exchanges of attacks threatening broader regional stability.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-iran-us-conflict-israel-lebanon-strikes-tehran-washington-ceasefire-live-updates-june-28-2026/article71156840.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モディ首相がセーシェルを訪問、インド洋を「機会の海」にする構想を表明", "title_en": "Modi Visits Seychelles, Envisions Indian Ocean as 'Ocean of Opportunity'", "summary_ja": "インドのナレンドラ・モディ首相はセーシェルを訪問し、インド洋を「機会の海」にするというインドのビジョンを示した。セーシェル政府はモディ首相の指導力を称え、「青い地平線の守護者」という称号を授与した。モディ首相はエルミニー大統領と代表団レベルの会談を行い、両国間の二国間関係強化を図った。", "summary_en": "Prime Minister Narendra Modi visited Seychelles, where he declared India's vision to transform the Indian Ocean into an Ocean of Opportunity. Seychelles honored Modi with the title 'Guardian of the Blue Horizon' in recognition of his leadership. Modi also held delegation-level talks with Seychelles President Herminie aimed at deepening bilateral ties between the two nations.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/national/pm-modi-seychelles-visit-guardian-of-the-blue-horizon-bilateral-ties-defence-security-indian-ocean/article71157393.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国民党主席：両岸対話再開には「一つの中国」現状維持への回帰が不可欠", "title_en": "KMT Head: Returning to 'One China' Status Quo Is Key to Restarting Cross-Strait Talks", "summary_ja": "台湾の国民党（KMT）主席は、北京との両岸対話を再開するためには「一つの中国」の現状維持への回帰が不可欠だと述べた。同主席は、この枠組みを認めることが台湾と中国の間で実質的な交渉を再開するための前提条件であると強調した。この発言は、共通の歴史的認識のもとで中国大陸との関与を重視する国民党の従来の立場を反映している。", "summary_en": "The chairman of Taiwan's Kuomintang (KMT) party has stated that returning to the 'one China' status quo is essential for resuming cross-strait dialogue with Beijing. The KMT leader emphasized that acknowledging this framework is a prerequisite for restarting meaningful negotiations between Taiwan and China. The statement reflects the KMT's longstanding position favoring engagement with mainland China under a shared historical understanding.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5oTXhBLVZ3a1A3YnZSellabldoMlFWeWlZRzFSVjNEZWNBajFIQ19XTFZfVHFUR0RicHBoZzdQcW1rdDVsdFpHSW1CcEhYeWc5U3UzQmJsQQ?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ヤンキース、台湾人投手有望株と100万ドルで契約", "title_en": "Yankees Sign Taiwanese Pitching Prospect for $1 Million", "summary_ja": "ニューヨーク・ヤンキースが台湾人の投手有望株と100万ドルの契約を結んだ。今回の契約は、メジャーリーグ球団が台湾人選手の育成に引き続き強い関心を持っていることを示している。選手の経歴や今後の育成計画についての詳細は、まだ明らかにされていない。", "summary_en": "The New York Yankees have signed a Taiwanese pitching prospect to a deal worth US$1 million. The signing highlights continued interest from Major League Baseball teams in developing talent from Taiwan. Details about the prospect's background and expected development timeline have not yet been fully disclosed.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVEFVX3lxTE51blNPT0lEWlJOVEloZm9BdDd5NnB0LWRlbVVhRXJuV0JReE51cDQ2bUxzY0N5cy15MmxtU0xYRWt0U2xYWWZkcFEyZ2FZZUVyYnIyVA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "野党、内閣提出の2100億台湾ドル規模ドローン調達法案の審査を遅延", "title_en": "Opposition Delays Review of Cabinet's NT$210 Billion Drone Procurement Bill", "summary_ja": "台湾の野党は、行政院が提出した2100億台湾ドル規模のドローン調達法案の立法院における審査を遅らせた。この法案は、ドローンの大規模調達を通じて台湾の軍事力を強化することを目的とした重要な国防計画の一環である。今回の遅延は、国防費の優先順位をめぐる与党と野党議員の間の政治的緊張を反映している。", "summary_en": "Taiwan's opposition parties have delayed the legislative review of a NT$210 billion drone procurement bill proposed by the Cabinet. The move stalls a major defense initiative aimed at bolstering Taiwan's military capabilities through expanded drone acquisition. The delay reflects ongoing political tensions between the ruling government and opposition lawmakers over defense spending priorities.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE9NN1dzX2N5TUROUktCWGoyMUl2ajB3V2t1aXJmdS1Yd3NrbEtWWkdwWFc2aXpXS3Y5TE5FdExhNzdLTm1rTTlGMng4RkxoR0ExYkVxSkxMMA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コロンビアで極右が勝利、ブラジルは南米で孤立する左派の「孤島」に", "title_en": "Far Right Wins in Colombia, Leaving Brazil as South America's Last Left-Wing Stronghold", "summary_ja": "コロンビアでの極右勝利により、南米全体で保守派の波が強まり、ブラジル大統領選まで残り4か月となるルラ大統領は地域内で政治的に孤立した状態に置かれている。2022年にルラが当選した当時、アルゼンチン、ボリビア、チリ、コロンビアなど南米の主要国の多くは左派政権が担っていた。しかし現在では、コロンビア、エクアドル、ペルー、ボリビア、パラグアイ、チリ、アルゼンチンのほぼすべてが右派または極右政権となっている。", "summary_en": "The far right's victory in Colombia has deepened a conservative wave across South America, politically isolating Brazilian President Lula just four months before Brazil's own elections. When Lula was elected in 2022, the left governed most of the continent, including Argentina, Bolivia, Chile, and Colombia. Today, nearly every major South American nation — Colombia, Ecuador, Peru, Bolivia, Paraguay, Chile, and Argentina — is led by right-wing or far-right governments.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/with-far-right-in-colombia-brazil-is-a-left-wing-island-in-south-america.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イタマラティ、トランプ介入を懸念も「ブラジルはベネズエラではない」と強調", "title_en": "Itamaraty Fears Trump Interference but Says Brazil 'Is Not Venezuela'", "summary_ja": "ルーラ政権はトランプ米大統領がブラジルの選挙に介入する可能性について懸念を認め、その動向を注意深く監視していると表明した。ブラジルの外交官らはトランプ氏による選挙プロセスへの干渉の試みが次第に明確になっていると指摘している。一方、匿名の外交筋は「ブラジルはベネズエラではない」と強調し、同国の民主主義制度が外部からの圧力に対抗できると示唆した。", "summary_en": "The Lula administration has acknowledged concerns about potential U.S. President Donald Trump interfering in Brazil's upcoming elections, saying it is closely monitoring any signs of involvement. Brazilian diplomats say Trump's attempts to meddle in the electoral process are becoming increasingly apparent. However, an anonymous diplomatic source emphasized that Brazil's democratic institutions are fundamentally different from Venezuela's, suggesting the country is better positioned to resist external pressure.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米当局、拘束したブラジル人男性をCVとPCCの幹部と主張するも、有罪判決に関連の記述なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC Gangs, But Court Records Show No Such Links", "summary_ja": "米国移民・関税執行局（ICE）は月曜日、ブラジル人のフェリペ・リナーレス・デ・オリヴェイラ・デル・アキラを逮捕し、同人がブラジルの犯罪組織CVおよびPCCの幹部であると発表した。しかしブラジルの裁判記録では、同人は麻薬密売・詐欺・恐喝で有罪判決を受けているものの、いずれの組織との関与も記載されていない。この食い違いにより、米当局が提供した情報の正確性に疑問が呈されている。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested in the United States on Monday by ICE, with US authorities claiming he was a leader of both the CV and PCC criminal organizations. However, Brazilian court records show he had prior convictions for drug trafficking, fraud, and extortion, with no mention of ties to either gang. The discrepancy raises questions about the accuracy of information provided by US immigration authorities.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "APC、ゴンベ州の地方選挙で全議席を制覇", "title_en": "APC Sweeps All Seats in Gombe Local Government Elections", "summary_ja": "ナイジェリアの与党・全進歩会議（APC）が、ゴンベ州地方政府選挙の全議席を獲得した。結果は土曜日、ゴンベ州独立選挙委員会（GOSIEC）のアブドゥラヒ・タラツェ委員長が同委員会本部で発表した。今回の圧勝により、ゴンベ州におけるAPCの政治的優位性がさらに強固なものとなった。", "summary_en": "Nigeria's ruling All Progressives Congress (APC) won every seat in the Gombe State local government elections. The results were announced on Saturday by Abdullahi Talatse, Chairman of the Gombe State Independent Electoral Commission (GOSIEC), at the commission's headquarters in Gombe. The clean sweep reinforces the APC's dominance in Gombe State politics.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/nnorth-east/891222-apc-sweeps-gombe-local-government-elections.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カドゥナ州知事、女性リンチ殺害事件で正義を誓う―容疑者41人拘束", "title_en": "Kaduna Governor Vows Justice After Woman Lynched, 41 Suspects Arrested", "summary_ja": "ナイジェリアのカドゥナ州知事は、集団暴行で殺害された女性の遺族に弔意を表し、正義を実現することを誓った。すでに41人の容疑者が拘束されており、当局は事件に加担した警察官がいないかどうかも調査している。知事はまた、被害者の子どもたちへの生涯にわたる支援を約束した。", "summary_en": "The Kaduna State governor has paid condolences to the family of a woman who was lynched and pledged that justice will be served. Forty-one suspects have been taken into custody, and authorities are investigating whether any police officers were complicit in the incident. The governor also promised lifelong support for the victim's children and full accountability for all those responsible.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/nwest/891214-governor-pays-condolences-vows-justice-lifelong-support-for-survivors-of-lynched-kaduna-woman.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "チキン・リパブリック、改良版スモーキー・ジョロフを発売", "title_en": "Chicken Republic Launches Improved Smokey Jollof Recipe", "summary_ja": "ナイジェリアのファストフードチェーン、チキン・リパブリックは、人気メニュー「スモーキー・ジョロフ」の改良版を発表した。新レシピは顧客により優れた味の体験を提供することを目的としている。この取り組みは、同ブランドがメニューの質を継続的に向上させるという姿勢を示すものだ。", "summary_en": "Nigerian fast-food chain Chicken Republic has unveiled an improved version of its popular Smokey Jollof dish. The new recipe is designed to deliver a better taste experience for customers. The move reflects the brand's ongoing commitment to enhancing its menu offerings.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/promoted/891210-chicken-republic-unveils-improved-smokey-jollof.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "バングラデシュ首相ラーマン氏、就任後初の外遊で北京を訪問", "title_en": "Bangladesh PM Rahman Arrives in Beijing for First Overseas Visit Since Taking Office", "summary_ja": "中国国営メディアの報道によると、バングラデシュのタリク・ラーマン首相が水曜日に公式訪問のため北京に到着し、6月26日まで滞在する予定だという。国営メディアはこの訪問が就任後初の海外訪問であり、中国・バングラデシュ間の経済関係強化が主要な議題とされていると伝えている。", "summary_en": "Xinhua/CGTN reports that Bangladeshi Prime Minister Tarique Rahman arrived in Beijing on Wednesday for an official visit running through June 26. State media reports this marks Rahman's first overseas trip since assuming office, with economic ties between China and Bangladesh described as a central focus of the visit.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-25/China-Bangladesh-economic-ties-in-focus-as-PM-Rahman-visits-China-1OgIMKnnrna/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "多国籍企業が中国との関係を強調：「切り離せない」", "title_en": "Multinational Firms on China Ties: 'We Can't Be Separated'", "summary_ja": "国営メディアの新華社・CGTNは、多国籍企業が中国でのビジネス関係を「切り離せない」と表現し、強い関与の姿勢を示していると報じている。同メディアによると、地政学的緊張が続く中でも外国企業は中国を不可欠な市場とパートナーと見なしているという。ただし、この報道は中国国営メディアによるものであり、内容の枠組みには留意が必要である。", "summary_en": "Xinhua/CGTN reports that multinational companies have expressed strong commitment to their operations in China, characterizing their business relationships as inseparable. State media reports that foreign firms view China as an indispensable market and partner despite ongoing geopolitical tensions. The outlet frames these statements as evidence of China's continued attractiveness to global business, though the sourcing reflects a state-media perspective.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-25/Multinational-firms-on-China-We-can-t-be-separated--1OgusmC395u/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国とバングラデシュ、「共同の未来」共同体の構築を宣言", "title_en": "China and Bangladesh Announce 'Shared Future' Partnership", "summary_ja": "新華社によると、中国の習近平国家主席は金曜日、北京でバングラデシュのタリク・ラーマン首相と会談したと伝えられている。国営メディアは、両首脳が「新時代における中国・バングラデシュ運命共同体」の構築を宣言し、二国間関係をより高い水準に引き上げると発表したと報じている。この会談は、中国が独自の外交的枠組みのもとでバングラデシュとの関係強化を図るものとされている。", "summary_en": "Xinhua reports that Chinese President Xi Jinping met with Bangladeshi Prime Minister Tarique Rahman in Beijing on Friday. State media claims the two leaders announced the building of a 'China-Bangladesh community with a shared future in the new era,' framing it as an advancement of bilateral relations to a higher level. The meeting signals Beijing's reported push to deepen ties with Dhaka under its broader diplomatic framework.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-26/President-Xi-Jinping-meets-Bangladeshi-PM-Tarique-Rahman-1OhGkKtsTsI/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア、クルスク州でウクライナ製ドローン117機を撃墜と主張", "title_en": "Russia Claims 117 Ukrainian Drones Shot Down Over Kursk Region in Single Day", "summary_ja": "ロシア国営メディアのTASS・RTは、ロシアの防空システムが1日以内にクルスク州上空でウクライナのドローン117機を迎撃・撃墜したと報じている。同メディアによると、ドローンはロシア領土に対して7回にわたって爆発物を投下したという。これらの情報はロシア国家管理下のメディアによるものであり、独立した検証は行われていない。", "summary_en": "Russian state media TASS/RT reports that Russian air defenses allegedly intercepted and destroyed 117 Ukrainian drones over the Kursk Region within a single day. The source claims that drones dropped explosive devices on Russian territory on seven separate occasions during this period. These figures come exclusively from Russian state-controlled outlets and have not been independently verified.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/emergencies/2152609", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア軍、ドニプロペトロウシク・ザポリージャ州の2集落を制圧と主張", "title_en": "Russian Forces Claim Capture of Two Settlements in Dnipropetrovsk and Zaporizhzhia Regions", "summary_ja": "ロシア国営メディアのTASS・RTは、東部戦闘グループの部隊がウクライナ東部の防衛ラインへ前進したと伝えている。同メディアによれば、ロシア軍はドニプロペトロウシク州のピサンツィとザポリージャ州のノヴォショロフカを「解放」したと主張している。これらの情報はロシア国営メディアによるものであり、独立した機関による検証は行われていない。", "summary_en": "Russian state media TASS/RT reports that units of Battlegroup East have advanced into Ukrainian defensive lines in eastern Ukraine. According to these reports, Russian forces claim to have liberated the settlements of Pisantsy and Novosyolovka in the Dnipropetrovsk and Zaporizhzhia regions respectively. These claims originate from Russian state-controlled media and have not been independently verified.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/defense/2152607", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ソウルと東京、朝鮮半島の非核化へのコミットメントを再確認", "title_en": "Seoul and Tokyo Reaffirm Commitment to Korean Peninsula Denuclearization", "summary_ja": "国営メディアのTASS/RTによると、韓国と日本は朝鮮半島の非核化に向けた共同のコミットメントを改めて表明したと伝えている。同メディアは、北朝鮮が核保有国としての地位は交渉の余地がないと繰り返し主張していることも指摘しており、非核化実現の見通しには不透明感が漂う。ソウルと東京の外交的連携は、地域の安全保障政策における両国の協調姿勢を示すものとなっている。", "summary_en": "TASS/RT reports that South Korea and Japan have jointly reaffirmed their commitment to the denuclearization of the Korean Peninsula. The state-controlled outlet notes that North Korea has repeatedly insisted its nuclear status is non-negotiable, casting doubt on the prospects of such efforts. The diplomatic alignment between Seoul and Tokyo signals continued coordination on regional security policy.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2152569", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "欧州エネルギー単一市場は本当に良いアイデアか？", "title_en": "Is a European Single Market for Energy Such a Good Idea?", "summary_ja": "筆者は、今年のエネルギー供給混乱により、気候変動対策とエネルギー安全保障の両面から化石燃料からの脱却が急務であることが改めて示されたと論じる。しかしより重要な示唆として、欧州は今世紀における世界GDPシェアの急落に対処するため、エネルギーコストを引き下げなければならないと指摘する。その手段として欧州エネルギー単一市場が本当に有効かどうかを問いかけている。", "summary_en": "The author argues that recent energy supply disruptions reinforce the urgency of phasing out fossil fuels for both climate and security reasons. However, the piece focuses on a less obvious implication for Europe: the continent must dramatically reduce its energy costs to reverse its declining share of global GDP. The author questions whether a European single energy market is the right mechanism to achieve this goal.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/european-energy-single-market-political-risks-vs-economic-rewards-by-brigitte-granville-2026-06", "state_media": false, "category": "オピニオン", "full_text": "Is a European Single Market for Energy Such a Good Idea?\nLONDON—Whatever happens with the US-Iran peace process and global energy prices, the strategic implications of this year’s supply disruptions are already clear. The crisis is further confirmation of the need to phase out fossil fuels, both to mitigate climate change and to strengthen energy security. But for Europe, which remains heavily dependent on imported energy, some less obvious implications may ultimately prove more consequential. To address the precipitous decline in its share of global GDP this century, Europe must lower its energy costs.", "translation_ja": "欧州エネルギー単一市場は本当に良いアイデアか？\n\nロンドン発――米国とイランの和平プロセスや世界のエネルギー価格がどう動こうとも、今年の供給混乱がもたらす戦略的な含意はすでに明らかだ。この危機は、気候変動の緩和とエネルギー安全保障の強化という両面から、化石燃料を段階的に廃止する必要性をあらためて裏付けるものである。しかし、輸入エネルギーへの依存度が依然として高い欧州にとって、より目立たない示唆が最終的にはるかに重大な意味を持つかもしれない。今世紀における世界GDP比率の急激な低下に対処するため、欧州はエネルギーコストを引き下げなければならないのだ。", "vocab": [{"word": "precipitous", "definition": "「急激な、険しい」という意味の形容詞。数値や状況が急速かつ大幅に悪化・低下する様子を表す際に用いられる上級語彙。"}, {"word": "phase out", "definition": "「段階的に廃止する・撤廃する」という意味の句動詞。政策や制度、製品などを徐々に使用停止にするプロセスを指す。"}, {"word": "mitigate", "definition": "「緩和する、軽減する」という意味の動詞。リスクや悪影響を部分的に和らげる行為を指し、環境・政策分野で頻出する専門用語。"}, {"word": "consequential", "definition": "「重大な結果をもたらす、重要な」という意味の形容詞。ある事柄が広範かつ深刻な影響を持つことを強調する際に使われる。"}, {"word": "strategic implications", "definition": "「戦略的含意」という意味の名詞句。ある出来事や政策が長期的・広域的な戦略に与える影響や意味合いを指す表現。"}, {"word": "precipitous decline", "definition": "「急激な低下・落込み」を意味する名詞句。統計的指標や経済指標が短期間で大幅に悪化する状況を描写するフォーマルな表現。"}]}, {"title_ja": "中国の経済リバランス政策の失敗", "title_en": "China's Failed Economic Rebalancing", "summary_ja": "筆者は、中国が投資・輸出主導の成長から国内消費主導へと経済を転換しようとする取り組みが根本的に失敗したと主張している。温家宝元首相が問題を指摘してから約20年が経過したにもかかわらず、家計消費のGDP比は依然として低いままだ。当局が国内需要の拡大を約束し続けてきたが、その信頼性はすでに失われており、中国および世界経済にとって深刻な懸念をもたらしていると筆者は論じている。", "summary_en": "The author argues that China's efforts to rebalance its economy away from investment- and export-led growth toward domestic consumption have fundamentally failed. Nearly two decades after Premier Wen Jiabao identified the problem, household consumption remains a stubbornly low share of GDP. The author contends that officials' repeated promises to boost domestic demand have lost all credibility, raising serious concerns for China and the global economy.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/chinese-economy-consumer-led-rebalancing-has-failed-by-stephen-s-roach-2026-06", "state_media": false, "category": "オピニオン", "full_text": "China’s Failed Rebalancing\nWhen China’s leaders first acknowledged the need to rebalance the economy nearly two decades ago, it seemed like a matter of when, not if. But with the household consumption share of Chinese GDP remaining stubbornly low, officials’ promises to boost domestic demand have lost all credibility.\nNEW HAVEN—China’s efforts to rebalance its economy have been an abject failure. Nearly two decades after former Premier Wen Jiabao bemoaned the Chinese economy’s excessive dependence on investment- and export-led growth, the problem has gone from bad to worse. The lack of meaningful consumer-led rebalancing implies increased reliance on these time-worn sources of economic activity, raising critical questions for China and the rest of the world.", "translation_ja": "中国の経済リバランス政策の失敗\n\n中国の指導者たちが経済リバランスの必要性を初めて認めたのは約20年前のことだ。当時は「実現するかどうか」ではなく「いつ実現するか」の問題に思われていた。しかし、家計消費のGDP比が頑として低いまま推移する中、国内需要を拡大するという当局の約束はその信頼性をすっかり失ってしまった。\n\nニューヘイブン発——中国の経済リバランスへの取り組みは完全な失敗に終わっている。温家宝元首相が中国経済の投資・輸出主導の成長への過度な依存を嘆いてから約20年、問題は改善されるどころか悪化の一途をたどっている。消費者主導による意味のあるリバランスが実現しないことは、こうした旧来の経済活動源への依存がさらに高まることを意味しており、中国と世界の双方にとって重大な問いを突きつけている。", "vocab": [{"word": "rebalancing", "definition": "経済構造の再調整・転換を意味する用語。特定の成長源への偏りを是正し、より均衡のとれた経済構造へと移行するプロセスを指す。"}, {"word": "abject", "definition": "「完全な」「惨めなほどの」という意味の強意的な形容詞。'abject failure'（完全な失敗）のように、否定的な名詞を強調する際に用いられる。"}, {"word": "bemoaned", "definition": "「～を嘆いた」「～を悲しんだ」を意味する動詞bemoanの過去形。公の場で問題や状況を遺憾に思い、声に出して訴える際に使われる。"}, {"word": "stubbornly", "definition": "「頑固に」「なかなか変わらずに」という意味の副詞。状況や数値が改善や変化を拒むように持続している様子を表す際に用いられる。"}, {"word": "time-worn", "definition": "「使い古された」「長年にわたって繰り返されてきた」という意味の形容詞。新鮮味や有効性を失った慣習・手法・表現などを指す。"}, {"word": "credibility", "definition": "「信頼性」「信憑性」を意味する名詞。発言や政策、機関などが信頼に値するかどうかを示す度合いを表す。"}]}, {"title_ja": "健全なポピュリズムの台頭", "title_en": "Crowning a Healthy Populism", "summary_ja": "筆者は、21世紀の政治的混乱が専ら独裁的な民族ナショナリズムによって駆動されているという通説に異議を唱える。ハンガリーやアルバニアなど中東欧での最近の政治的動員は、より複雑な反乱の様相を示しており、ノスタルジーは民族ナショナリズムだけでなく独裁への抵抗をも鼓舞しうると論じる。これらの運動がMAGA型の攻撃的ナショナリズムとは異なる、新たな健全なポピュリズムの雛形となり得るかを問う論考である。", "summary_en": "The author challenges the conventional view that 21st-century political unrest is driven purely by autocratic ethnonationalism. Recent mobilizations in Hungary, Albania, and Central and Eastern Europe suggest a more nuanced political revolt, where nostalgia can fuel resistance to autocracy as much as it can fuel ethnonationalism. The piece asks whether these movements could model a new, healthier form of populist politics distinct from MAGA-style aggressive nationalism.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/hungary-albania-rejecting-maga-international-by-harold-james-2026-06", "state_media": false, "category": "オピニオン", "full_text": "Crowning a Healthy Populism\nAlthough recent political mobilizations in Hungary, Albania, and other parts of Central and Eastern Europe could be described as populist and nationalist, they have little in common with the aggressive ethnonationalism that MAGA professes. Could they be a model for a new form of politics?\nPRINCETON—Conventional wisdom has it that an autocratic ethnonationalist backlash against global capitalism and liberal democracy is driving 21st-century politics. Yet recent developments have shown the political revolt to be more nuanced. In an era of rapid technological and economic change, people invariably look to the past. But nostalgia can inspire both ethnonationalists and those seeking to resist autocracy.", "translation_ja": "健全なポピュリズムの台頭\n\nハンガリー、アルバニア、そして中東欧各地における最近の政治的動員は、ポピュリスト的・ナショナリスト的と表現できるかもしれないが、MAGAが標榜する攻撃的な民族ナショナリズムとはほとんど共通点がない。これらは新たな政治の形のモデルとなり得るのだろうか？\n\nプリンストン発――独裁的な民族ナショナリズムによる反動がグローバル資本主義と自由民主主義に対抗し、21世紀の政治を動かしているというのが通説だ。しかし最近の展開は、この政治的反乱がより複雑な様相を呈していることを示している。急速な技術的・経済的変化の時代において、人々は必然的に過去へと目を向ける。だがノスタルジーは、民族ナショナリストを鼓舞するだけでなく、独裁に抵抗しようとする人々をも鼓舞し得るのである。", "vocab": [{"word": "mobilization", "definition": "政治的・社会的目的のために人々を組織し行動させること。ここでは市民や大衆を政治運動に動員する行為を指す。"}, {"word": "ethnonationalism", "definition": "民族的・文化的アイデンティティに基づくナショナリズムの一形態で、特定の民族集団の優位性や純粋性を強調する思想。"}, {"word": "autocratic", "definition": "独裁的な、専制的なという意味の形容詞。一人の支配者や権力者が絶対的な権限を持つ統治形態を指す。"}, {"word": "nuanced", "definition": "微妙なニュアンスや細かな差異を含む、という意味。単純に割り切れない複雑な側面を持つことを表す。"}, {"word": "nostalgia", "definition": "過去の時代や状況への郷愁・懐古の情。政治的文脈では、過去の秩序や価値観への回帰願望として使われる。"}, {"word": "profess", "definition": "（信念・主義などを）公言する、表明するという意味の動詞。ここではMAGAが民族ナショナリズムを標榜していることを指す。"}]}, {"title_ja": "レーガンからヴァンスへ：ウォーターゲート事件を矮小化するのは共和党の伝統", "title_en": "Minimizing Watergate Is a Long-Standing Republican Tradition, From Reagan to Vance", "summary_ja": "著者リック・パールスタインは、JDヴァンスがウォーターゲート事件を「ディープステートによるニクソン追い落とし」と最近一蹴したことは衝撃的でも新しいことでもなく、1973年のレーガンによるニクソン擁護にまで遡る共和党の確立された伝統だと主張する。パールスタインは、ニクソンの犯罪を矮小化することがレーガン、パット・ブキャナン、そして数多くの修正主義的な書籍の著者たちに繰り返し政治的な報酬をもたらしてきた経緯を追う。彼は、仲間の共和党員を罪から免責するこのパターンが、保守的な政治キャリアを築く強力な手段であり続けてきたと論じる。", "summary_en": "Author Rick Perlstein argues that JD Vance's recent dismissal of Watergate as a 'deep state' takedown is not shocking or new, but rather a well-established Republican tradition dating back to Ronald Reagan's 1973 defense of Nixon. Perlstein traces how minimizing Nixon's crimes has repeatedly rewarded Republican figures politically, from Reagan to Pat Buchanan to a steady stream of revisionist books. He contends that this pattern of absolving fellow Republicans of wrongdoing has been a powerful tool for building conservative political careers.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/28/reagan-jd-vance-nixon-watergate-republicans", "state_media": false, "category": "オピニオン", "full_text": "When JD Vance spoke at the Richard M Nixon presidential library last week about his new book on his journey from atheism to an allegedly devout Catholicism, he raised eyebrows by minimizing Watergate. “The idea that it [took] down a presidency is crazy,” he said. He said it was the “deep state that took down Richard Nixon”– not the 37th president’s implication in serious crimes.\nCommentators were shocked. Did the vice-president not know that the investigation proved Nixon directed a conspiracy to bribe the men who broke into the Democratic party headquarters to lie in court from a secret, illegal slush fund?\nThat, when the president’s lawyer John Dean tried to warn him away from the attempt by suggesting it would take a million dollars that they would have to launder – “this is the sort of thing mafia people can do” – Nixon reassured him that the mafia had nothing on him: “You could get it in cash. I know where it could be gotten.”\nVance’s blithe avowal was said by commenters in my country to represent a new low in Republican cynicism. Was this the sort of thing they now think presidents should get away with?\nMy fellow Americans: you have memories like goldfish. Republicans have always said that – ever since Nixon’s first speech on Watergate in April 1973 about the botched burglary that set the scandal in motion 10 months earlier, when a prominent ally said it was just a prank at a press conference the next day, that the break-in was part of the “usual atmosphere of campaigning”, and the culprits were “not criminals at heart”.\nThat Republican ally was the governor of California, Ronald Reagan, speaking at a reception for visiting group of students. The media mocked him. The New York Times columnist Tom Wicker was enraged at how an “exponent of law and order” had surrendered to the philosophy that “[s]afeguards that ‘we’ support and revere in ordinary times must be suspended or limited for the duration – but only for ‘them’. ‘We’ will not be safe until ‘we’ crack down on ‘them’, occasionally by adopting their tactics.”\nReagan did not listen. After it was revealed that Nixon secretly taped many of the people he met, he called the investigation a “witch-hunt” and a “lynching”. After Nixon gave a speech insisting there wasn’t even anything to cover up, only 25% of Americans believed him. But Reagan called it “the voice of reason”.\nAt that, Reagan’s own anguished political aides had enough. They leaked to columnists their anguish that efforts to promote him for the presidency as “the successful architect of clean, frugal government, free of scandal” were being stymied by their boss’s insistence in treating the conspirators as “no worse than double parkers”. But they were wrong.\nIn my 2014 book, The Invisible Bridge: The Fall of Nixon and the Rise of Reagan, I demonstrate it was precisely Reagan’s ability to rhetorically absolve his fellow Republicans of sin, in supporting the Nixon of Watergate, that made him so attractive to the conservative rank and file as a party standard bearer – so much so that he came shockingly close to defeating incumbent Gerald Ford for the party’s presidential nomination in 1976.\nAnd that same mystic ability to affirm Americans’ sense of their own unimpeachable innocence, even if they had supported crimes – such as Watergate or Vietnam – eventually made him president.\nReagan was hardly the only figure to rise in the Republican firmament this way. One Nixon White House aide, Pat Buchanan, testified to the Senate investigating committee that its very investigation was merely politics by other means: the liberal Washington establishment working to steal back the White House after Nixon won it fair and square with his 1972 landslide.\nHe was rewarded for his candor with a widely syndicated column, becoming such a conservative hero that in 1992 he made a shockingly strong showing as a candidate in the 1992 New Hampshire primary against George HW Bush – himself something of a professional Watergate minimizer in his role back then as RNC chair.\nA steady stream of books spin conspiracies that anyone but the president’s men were behind it: that it was the CIA (Jim Hougan, Secret Agenda, 1984); or a Silent Coup (Len Colodny and Robert Gettlin, 1992) executed by Dean himself to hide a prostitution ring run by his wife, or The Secret Plot to Make Ted Kennedy President (Geoff Shepard, former Nixon White House aide, 2008).\nShepard then published two more tomes elaborating his version of the plot, in 2015 and 2021, then wrapped them up in a 2024 documentary that’s proven highly influential in the young Maga circles in which JD Vance moves.\nA book called It Didn’t Start With Watergate, in 1977, dubiously elevated a number of peccadilloes from past Democratic presidents to a Nixonian level of equivalency, and even claimed Democratic party foreknowledge – and indifference – to the 1972 burglary.\nIt proved so influential that the phrase “everyone did it, Nixon got caught” became an American commonplace; ", "translation_ja": "先週、JDヴァンスがリチャード・M・ニクソン大統領図書館で、無神論からいわゆる敬虔なカトリック信仰への自身の歩みを綴った新著について講演した際、ウォーターゲート事件を矮小化する発言をして物議を醸した。「それが大統領職を失墜させたという考えは馬鹿げている」と彼は言った。また、「ディープステートがリチャード・ニクソンを失脚させた」のであって、第37代大統領が深刻な犯罪に関与していたからではないと主張した。\n\nコメンテーターたちは驚愕した。副大統領は、調査によってニクソンが、民主党本部に侵入した男たちに法廷で偽証させるよう賄賂を贈る陰謀を秘密の不正資金を使って指示したことが証明されているという事実を知らないのだろうか。\n\n大統領の弁護士ジョン・ディーンが、それには洗浄しなければならない100万ドルが必要だと示唆して——「これはマフィアがやるようなことです」——その試みから遠ざかるよう警告しようとしたとき、ニクソンはマフィアなど問題ではないと彼を安心させた。「現金で手に入れられる。どこで手に入れるか知っている」と。\n\nヴァンスのこの無頓着な発言は、私の国のコメンテーターたちから、共和党の偽善の新たな底を打ったものだと評された。これは今や大統領が逃れていいと彼らが考えることなのか、と。\n\nアメリカ国民の皆さん、あなた方の記憶は金魚のようだ。共和党員はずっとそう言い続けてきた——1973年4月にニクソンがウォーターゲートに関する最初の演説を行い、10か月前に起きたスキャンダルの発端となった失敗した侵入事件について語った翌日、著名な同盟者がそれはただのいたずらだったと記者会見で発言した時からずっとだ。その人物は、侵入は「通常の選挙運動の雰囲気の一部」であり、犯人たちは「根っからの犯罪者ではない」と述べた。\n\nその共和党の同盟者とは、カリフォルニア州知事のロナルド・レーガンであり、来訪した学生グループのための歓迎会で話した。メディアは彼を嘲笑した。ニューヨーク・タイムズのコラムニスト、トム・ウィッカーは、「法と秩序」の擁護者がいかに「通常時には『われわれ』が支持し崇拝するような保護措置は、その期間中は停止または制限されなければならない——ただし『彼ら』に対してだけ。『われわれ』は時に彼らの戦術を採用することで『彼ら』を取り締まるまで安全ではない」という哲学に屈したかに激怒した。\n\nレーガンは耳を貸さなかった。ニクソンが面会した多くの人々を秘密裏に録音していたことが明らかになると、彼は調査を「魔女狩り」と「リンチ」と呼んだ。ニクソンが隠蔽すべきものなど何もなかったと主張する演説を行った後、信じたアメリカ人はわずか25%だった。しかしレーガンはそれを「理性の声」と称した。\n\nそれに際して、レーガン自身の苦悩する政治顧問たちはついに我慢の限界に達した。彼らはコラムニストたちに自分たちの苦悩をリークした。「スキャンダルのない、清廉で倹約的な政府の成功した建築家」としてレーガンを大統領候補に売り込もうとする努力が、共謀者たちを「二重駐車違反者より悪くない」扱いにしようとする上司の主張によって妨げられているという苦悩だ。しかし彼らは間違っていた。\n\n私の2014年の著書『見えない橋：ニクソンの失墜とレーガンの台頭』において、私はレーガンがウォーターゲートのニクソンを支持したことへの罪から仲間の共和党員たちを修辞的に免罪する能力こそが、党の標準的担い手として保守的な一般党員たちに彼をそれほど魅力的にさせたと論証する——あまりにも魅力的であったため、1976年の党の大統領候補指名において、現職のジェラルド・フォードを破るところまで驚くほど迫ったのだ。\n\nそして、ウォーターゲートやベトナムのような犯罪を支持していたとしても、アメリカ人自身の非の打ちどころのない無実の感覚を肯定するその同じ神秘的な能力が、結局彼を大統領にした。\n\nレーガンはそのような形で共和党の星座の中に輝いた唯一の人物ではなかった。ニクソン政権のある補佐官、パット・ブキャナンは、上院調査委員会において、その調査そのものが単なる別の手段による政治に過ぎないと証言した：自由主義的なワシントンの既成勢力が、ニクソンが1972年の地滑り的勝利で正当に勝ち取ったホワイトハウスを取り戻そうとしているというわけだ。\n\n彼はその率直な発言に対して、広く配信されるコラムという報酬を得て保守派の英雄となり、1992年には共和党のニューハンプシャー予備選挙でジョージ・H・W・ブッシュに対して驚くほど善戦する候補者となった——ブッシュ自身も当時の共和党全国委員会議長という立場において、ウォーターゲート矮小化のプロのような存在だった。\n\n大統領側近以外の誰かが事件を仕組んだという陰謀論を展開する書籍が絶え間なく出版されてきた：CIAがやった（ジム・ホーガン著『秘密の議題』1984年）、あるいはディーン自身が妻が経営する売春組織を隠すために実行した「静かなクーデター」（レン・コロドニーとロバート・ゲトリン著、1992年）、あるいは元ニクソン政権補佐官のジェフ・シェパード著『テッド・ケネディを大統領にする秘密の陰謀』（2008年）などだ。\n\nシェパードはさらに2冊の大著で自らのバージョンの陰謀を詳述し（2015年と2021年）、それらを2024年のドキュメンタリーにまとめた。このドキュメンタリーはJDヴァンスが活動する若いMAGA界隈に大きな影響を与えていることが証明されている。\n\n1977年に出版された『ウォーターゲートから始まったわけではない』という本は、過去の民主党大統領たちの数々のちょっとした不正行為をニクソン並みの同等レベルに疑わしくも引き上げ、1972年の侵入事件についての民主党の事前知識——そして無関心——さえも主張した。\n\nそれはきわめて影響力を持ち、「誰もがやっていた、ニクソンだけが捕まった」というフレーズがアメリカで広く流通する常套句となった。", "vocab": [{"word": "blithe", "definition": "「のんきな、無頓着な」という意味の形容詞。深刻な問題を軽々しく、無関心に扱う様子を表す。例：a blithe avowal（無頓着な言明）。"}, {"word": "implication", "definition": "「関与、巻き込み」または「含意」という意味の名詞。ここでは犯罪への関与・共謀を指す。"}, {"word": "unimpeachable", "definition": "「非の打ちどころのない、疑いようのない」という意味の形容詞。信頼性や誠実さが完璧で批判の余地がない状態を表す。"}, {"word": "peccadillo", "definition": "「些細な過ち、軽微な不正行為」という意味の名詞。重大な犯罪とは対照的に用いられる、取るに足らない道徳的逸脱を指す。"}, {"word": "firmament", "definition": "「天空、星座」を原義とするが、比喩的に「（特定分野の）著名人の世界、上層部」を意味する名詞。"}, {"word": "syndicated", "definition": "「（コラムや番組が）複数のメディアに配信・掲載される」という意味の形容詞。広く流通・配信されることを指す。"}, {"word": "slush fund", "definition": "「秘密資金、不正資金」という意味の慣用表現。不正目的のために帳簿外で管理される資金を指す。"}]}, {"title_ja": "ミシェル・オバマを嘲笑したUFC選手が「褒め言葉だった」と主張——露わになる人種差別と女性蔑視の常態化", "title_en": "UFC Fighter's Mockery of Michelle Obama Exposes Mainstreamed Racism and Misogyny", "summary_ja": "UFC選手ジョシュ・ホキットがホワイトハウスの芝生で開催されたイベントでミシェル・オバマを男性だと虚偽発言し、後に「褒め言葉だった」と釈明した。コラムニストのアルワ・マフダウィは、この事件を単なる愚かな発言として片付けるべきではなく、黒人女性を男性化する社会的傾向とトランプ政権による差別の主流化を示すものだと論じる。また、市民強姦訴訟で責任を認定されたコナー・マクレガーをジミー・ファロンがお咎めなしに番組に招いたことも批判している。", "summary_en": "At a UFC event on the White House lawn, heavyweight fighter Josh Hokit falsely claimed Michelle Obama is a man, later defending it as a 'compliment.' Author Arwa Mahdawi argues this incident is not merely a stupid remark but reflects the systemic masculinization of Black women and the normalization of racism and misogyny under the Trump administration. She also criticizes Jimmy Fallon for platforming Conor McGregor without addressing his civil rape liability.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/27/josh-hokit-michelle-obama-remark", "state_media": false, "category": "オピニオン", "full_text": "Michelle Obama should feel honoured, apparently.\nDo you know what the greatest compliment you can give a woman is? It’s not telling her she’s smart or kind or funny. No, it’s calling her a man. After all, what could be better than being a man?\nThese words of wisdom are brought to you by, you guessed it, a man. At last week’s UFC event on the White House lawn, the heavyweight fighter Josh Hokit yelled into the microphone: “Michelle Obama is a man. Am I right, America?”\nHis outburst drew mixed reactions. The crowd was largely quiet, but there were some laughs and boos. CNN reported that “in a brief moment captured on camera, Donald Trump … appeared to show a half-smile seconds after the false remark, which has previously circulated online”.\nThis week, Hokit decided to explain himself. It turns out he wasn’t engaging in “misogynoir”, Moya Bailey’s term for the anti-Black, racist misogyny that Black women experience. Not at all. During an appearance on The Ariel Helwani Show, Hokit said he thought he was giving the former first lady “a compliment”. The silly woman should have been grateful! Hokit explained: “Michelle Obama being a man, that’s like, uh, she knows how to deal with adversity, know, she knows how to work hard like a man. You know, when the times get tough, you know, the tough keep going.”\nI’m sure Hokit has suffered a few head injuries during his fighting career, but it seems even he might have realised how ridiculous that sounded. After host Ariel Helwani pushed back on this excuse, asking why Hokit had even brought Obama up, the fighter pivoted to talking about free speech.\n“I thought it was a perfect opportunity to, you know, show the world how great this country is with the freedom of speech. You know you go somewhere [else in the world], and you say something like that, and you die.” He went on: “There’s a certain side that pokes at another side, and there’s no outrage there, and so I thought it was a perfect time to take a jab.” Anyway, Hokit added, he said what he said, and he doesn’t regret it.\nLet’s not write off this incident as just another stupid man saying yet another stupid thing in a country that seems to grow stupider by the day. The fact that the president has so far refused to denounce Hokit’s comments shows the extent to which misogyny and racism have been mainstreamed by the White House. Why would anyone expect Trump to condemn Hokit’s comments when he built his entire political career from othering the Obamas and spreading racist conspiracy theories that Barack Obama was not born in the US? Why would anyone expect Trump to denounce Hokit when he himself posted (then later deleted) a video depicting Barack and Michelle Obama as apes earlier this year?\nThe UFC CEO, Dana White, I should note, has condemned Hokit’s comment. White, a close Trump ally, told Time: “I understand that the Obamas are public figures, but I’m completely against saying nasty and false things about people’s families.” He added, “Everyone knows my position on free speech, but I hate this kind of nonsense.”\nWhite’s statement was better than nothing, but it still falls short. This wasn’t just a nasty jab at a public figure; it was an example of the way in which society masculinises Black women. Serena Williams, for example, has addressed online conspiracy theories that she was born a man. So has the basketball player Brittney Griner. Recently, the Wicked actor Cynthia Erivo said she felt her “humanity had been bastardized” after the internet joked she was her co-star Ariana Grande’s “bodyguard”, following an incident in which Erivo helped fend off a fan who was trying to grab Grande.\n“I think that we haven’t really come to terms with the insidious nature of how we view Black women,” Erivo told Variety. “[T]here was this assumption that I was bigger than my co-star and so I had to be controlling or protecting, and that was my role. I would hazard a guess that it would not have been the same had it been the other way around.”\nTo paraphrase Hokit, I think this is a perfect opportunity to show the world how great the US is when it comes to freedom of speech. So let me say that Donald Trump is not the big, strong man he thinks he is. He is weak and pathetic; his only legacy will be corruption and mass immiseration. Am I right, America?\nWhy did Jimmy Fallon platform Conor McGregor?\nIn 2024, a jury in an Irish civil court found McGregor, a champion fighter, liable in a civil rape case brought by a brave woman called Nikita Hand. A year later, he lost an appeal trying to overturn the jury’s order. Still, while the courts may not have rehabilitated him, the media are helpfully whitewashing his image. McGregor appeared on The Tonight Show this week ahead of his 11 July fight in Las Vegas, his first in about five years. Fallon was all chummy-chummy with McGregor, saying the pair should go out for drinks and pointedly making zero mention of all the controversies surrounding McGregor. Fallon, to jog your memory, is the guy ", "translation_ja": "ミシェル・オバマは光栄に思うべきらしい。\n\n女性に贈ることができる最大の褒め言葉とは何か？それは彼女が賢いとか、優しいとか、面白いと言うことではない。そう、男性と呼ぶことだ。男性であることより素晴らしいことなど、他にあるだろうか？\n\nこの「金言」をもたらしたのは、お察しの通り、男性だ。先週ホワイトハウスの芝生で開催されたUFCイベントで、ヘビー級ファイターのジョシュ・ホキットはマイクに向かって叫んだ。「ミシェル・オバマは男だ。そうだろ、アメリカ？」\n\nこの発言は様々な反応を引き起こした。観客の大部分は沈黙していたが、笑いや野次も一部上がった。CNNは「カメラに捉えられた短い瞬間に、ドナルド・トランプが……以前からオンラインで拡散していたこの虚偽発言の直後、かすかな微笑みを見せたように見えた」と報じた。\n\n今週、ホキットは自分の行動を説明することにした。彼は「ミソジノワール」——モヤ・ベイリーが命名した、黒人女性が経験する反黒人的・人種差別的な女性嫌悪——に加担していたわけではないという。全くそうではない。アリエル・ヘルワニ・ショーへの出演で、ホキットは前ファーストレディへの発言が「褒め言葉」のつもりだったと述べた。愚かな女性は感謝すべきだったというわけだ。ホキットはこう説明した。「ミシェル・オバマが男性的というのは、つまり、彼女は逆境に立ち向かう方法を知っている、男性のように一生懸命働く方法を知っている、ということです。苦しい時でも、強い者は前進し続けるということ。」\n\nホキットは格闘キャリアの中で何度か頭部に打撃を受けたことがあるだろうが、自分の言い訳がいかに馬鹿げているかに気付いていたようだ。司会者のアリエル・ヘルワニがこの言い訳に疑問を呈し、なぜそもそもオバマの話を持ち出したのかと問うと、ホキットは言論の自由の話に切り替えた。\n\n「この国がいかに偉大かを言論の自由という形で世界に示す、絶好の機会だと思ったんです。他の国では、あんなことを言ったら死にますよ。」彼は続けた。「ある側が別の側をからかっていても批判されないことがある。だから今こそ一発かます絶好のタイミングだと思った。」いずれにせよ、ホキットは言いたいことを言った、後悔はしないと付け加えた。\n\nこの事件を、愚かさが日増しに増していく国でまた一人の愚かな男がまた一つの愚かな発言をしただけと切り捨ててはならない。大統領がホキットの発言を今のところ非難することを拒んでいるという事実は、女性蔑視と人種差別がいかにホワイトハウスによって主流化されているかを示している。トランプが自分の政治キャリア全体をオバマ一家の「他者化」と、バラク・オバマが米国生まれではないという人種差別的陰謀論の拡散の上に築いてきたのに、誰がトランプにホキットの発言を非難することを期待できるだろうか？トランプ自身が今年、バラクとミシェル・オバマを類人猿に見立てた動画を投稿（後に削除）したのに、誰がトランプにホキットを非難することを期待できるだろうか？\n\nUFCのCEO、ダナ・ホワイトはホキットの発言を非難したことを付記しておくべきだろう。トランプの親密な盟友でもあるホワイトはタイム誌に対し、「オバマ夫妻が公人であることは理解しているが、人の家族について不快で虚偽の発言をすることには全面的に反対だ」と述べた。「言論の自由に対する私の立場はみんな知っているが、こうした馬鹿げた行為は嫌いだ」とも付け加えた。\n\nホワイトの声明は何もないよりはましだが、それでも不十分だ。これは単に公人への不快な一撃ではなく、社会が黒人女性を男性化する方法の一例だ。セリーナ・ウィリアムズは、例えば、自分が男性として生まれたというオンラインの陰謀論に言及している。バスケットボール選手のブリトニー・グライナーも同様だ。最近では、映画『ウィキッド』の俳優シンシア・エリヴォが、アリアナ・グランデのファンが彼女を掴もうとした際にエリヴォが追い払ったことで、インターネット上でグランデの「ボディーガード」と揶揄された事件を受け、「自分の人間性が歪められた」と感じたと語った。\n\nエリヴォはバラエティ誌に対し、「私たちはまだ、黒人女性の見方にまつわる陰湿な性質と真剣に向き合えていないと思う」と語った。「共演者より私の方が体が大きいという思い込みから、私が支配したり守ったりする役割を担っているという決めつけがあった。逆の立場だったとしても同じだったかどうか、甚だ疑問だ。」\n\nホキットの言葉を借りれば、これは米国の言論の自由がいかに素晴らしいかを世界に示す絶好の機会だと思う。だから言わせてもらおう。ドナルド・トランプは自分が思い込んでいるような偉大で強い男ではない。彼は弱く、哀れだ。その遺産として残るのは腐敗と大規模な困窮だけだろう。そうだろ、アメリカ？\n\n---\n\nなぜジミー・ファロンはコナー・マクレガーを番組に呼んだのか？\n\n2024年、アイルランドの民事裁判所の陪審員は、チャンピオンファイターのマクレガーが、ニキータ・ハンドという勇敢な女性が起こした民事強姦訴訟において責任があると認定した。1年後、彼は陪審員の命令を覆そうとした控訴でも敗訴した。しかし、裁判所が彼の名誉回復を認めなくても、メディアが喜んでその評判を洗い流そうとしている。マクレガーは今週、約5年ぶりとなる7月11日のラスベガスでの試合を前に、ザ・トゥナイト・ショーに出演した。ファロンはマクレガーと仲良く話し、一緒に飲みに行こうと言い、マクレガーを巡る数々のスキャンダルには意図的に一切触れなかった。念のため言っておくと、ファロンは……", "vocab": [{"word": "misogynoir", "definition": "黒人女性に向けられた人種差別と女性嫌悪が交差する特定の差別形態を指す造語（モヤ・ベイリーによる）。学術的・社会活動的な文脈で使われる専門用語。"}, {"word": "othering", "definition": "特定の人物や集団を「自分たちとは異なる存在」として扱い、排除・周縁化する行為や言説を指す社会学的用語。"}, {"word": "mainstreamed", "definition": "本来は周縁的・過激とされていた考え方や行動が、社会の主流・一般的なものとして受け入れられるようになった状態を表す動詞の過去分詞形。"}, {"word": "masculinises", "definition": "女性や女性的とされる対象に対して男性的な特徴や属性を割り当てる、またはそのように描写することを意味する動詞（イギリス英語綴り）。"}, {"word": "insidious", "definition": "表面上は無害に見えながら、じわじわと深刻な害をもたらす性質を指す形容詞。差別や偏見の隠れた危険性を述べる文脈でよく使われる。"}, {"word": "whitewashing", "definition": "問題のある人物や組織の否定的な側面を覆い隠し、好意的なイメージを作り上げる行為を指す慣用的表現。メディア批評の文脈でよく使用される。"}, {"word": "immiseration", "definition": "大多数の人々を貧困や苦難に陥れる過程や状態を指す経済・政治的な専門用語。マルクス経済学に由来し、政策批判の文脈で使われることが多い。"}]}, {"title_ja": "Forget crumbling democracy: America’s biggest crisis is a stagnant, murky pool | Dave Schilling", "title_en": "Forget crumbling democracy: America’s biggest crisis is a stagnant, murky pool | Dave Schilling", "summary_ja": "The Lincoln Memorial reflecting pool is a painful metaphor for the state of our union When you hear the word “pool” in these sun-baked days of summer, you might think of taking a cheeky dip in the water to cool off the skin that is conspicuously peeling off your haggard body. Everyone ( except me ) ", "summary_en": "The Lincoln Memorial reflecting pool is a painful metaphor for the state of our union When you hear the word “pool” in these sun-baked days of summer, you might think of taking a cheeky dip in the water to cool off the skin that is conspicuously peeling off your haggard body. Everyone ( except me ) ", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/27/american-democracy-washington-dc-reflecting-pool", "state_media": false, "category": "オピニオン", "full_text": "When you hear the word “pool” in these sun-baked days of summer, you might think of taking a cheeky dip in the water to cool off the skin that is conspicuously peeling off your haggard body. Everyone (except me) loves a pool. Donald Trump really loves a pool, but not the kind you can swim in. Or stand too close to. Or enjoy at all, really.\nThe state of the Lincoln Memorial reflecting pool rehabilitation effort has become the primary crisis affecting the United States. That is, if you ask the current administration. Limiting the right to vote is running a close second in the World Cup of Political Football, but it’s the reflecting pool that is attracting the most fervent attention. As emergencies go, it’s as thrilling as watching a really large body of still water in the middle of a park. The paint is peeling and it’s full of green algae.\nWhile the inability to keep the pool from looking like a stagnant lake in the Ozarks carries some pretty serious environmental ome
