k": "https://news.google.com/rss/articles/CBMiowFBVV95cUxORFhPdjNudUZFenptYVBPVGI2ZGNaU0txdFZ0VE1ZOHVFN0FjbXlFN1psdXU1cDgtOFpnQVVmd2FwYmVqenA0Sks0UGxTRUhJNmNLQWp0VTU5UzlmWDVoemUtY2RkVkRhOGhrUUVlbkRIVWstRV9RZnp4dC1QcnJHcFF4UjlOeG5RSFUzenFENHNyUVJqOVM0Y3pCTndrcEpVcHpr?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシアがウクライナの首都キーウに大規模攻撃、少なくとも21人死亡", "title_en": "Russia launches heavy strikes on Kyiv, killing at least 21", "summary_ja": "ロシアはウクライナの首都キーウに対し、過去最大級の攻撃を行い、少なくとも21人が死亡した。攻撃は市内各地に広範な破壊をもたらし、住宅地や民間インフラが標的となった。ウクライナ当局はこの攻撃を民間人への意図的な暴力として強く非難した。", "summary_en": "Russia carried out one of its heaviest bombardments of Ukraine's capital Kyiv, killing at least 21 people. The strikes caused widespread destruction across the city, targeting residential and civilian infrastructure. Ukrainian officials condemned the attack as a deliberate assault on civilian life.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMipwFBVV95cUxPaHNTaXZqSXdZU3VxemduZGktc2NXazJYODljRUdSQTJlMEFBQ0xwY1JLdlNwWUo2MG5ETnVNWGFUanRZRXJUQVROTjZuZVVPeU9jVXpBSHBTZ1lWYnVzWVoxS3Ywa2dORElkdEt3TFBaNzhyX0Z5dVZnTktQVXZMM0EtUFh1MjRFd1M3cEpkRXkxTVdXNmtGUmJyV0VmQks5MEw4V0hkdw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "エンパイアステートビルのアンテナに登りプロポーズしたカップルが逮捕", "title_en": "Couple Arrested After Climbing Empire State Building Antenna for Marriage Proposal", "summary_ja": "ニューヨーク市のエンパイアステートビルの頂上にあるアンテナに無断でよじ登ったカップルが、プロポーズとみられる行為の末に逮捕された。2人は許可なく象徴的な超高層ビルのアンテナ部分まで登り、当局に逮捕された。この事件は、世界で最も有名なランドマークの一つにおけるセキュリティ対策に注目を集めた。", "summary_en": "A couple was arrested after illegally scaling the antenna atop the Empire State Building in New York City in what appeared to be a romantic marriage proposal stunt. The pair climbed the iconic skyscraper's antenna without authorization, prompting their arrest by authorities. The incident drew attention to security measures pse into the Iranian port city at the center of ongoing maritime tensions.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cvg53ngvvpxo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震、駐車場の崩壊から8日後に生存者を救出", "title_en": "Venezuela Earthquake Survivor Rescued After Eight Days Trapped Under Collapsed Parking Structure", "summary_ja": "ベネズエラで発生した地震により崩壊した複数階建ての駐車場の下に閉じ込められていたエルナン・ヒル氏が、8日後に生きた状態で救出された。がれきの下で8日間もの間生き延びたことは、奇跡的な生還として注目を集めている。救助隊員たちの懸命な作業により、この驚異的な救出劇が実現した。", "summary_en": "A man named Hernán Gil was pulled out alive after spending eight days trapped beneath a collapsed multi-storey car park in Venezuela following an earthquake. His rescue marks a remarkable survival story given the extended time he remained buried under the rubble. Emergency crews worked to free him in what has been described as a extraordinary feat of endurance and rescue efforts.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/ce375v12z0qo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モナコ、ウクライナ人実業家爆弾攻撃の容疑者を特定", "title_en": "Monaco Issues Arrest Warrant for Suspect in Bomb Attack on Ukrainian Oligarch", "summary_ja": "モナコ当局は、キーウから制裁を受けているウクライナ系実業家ら3人が負傷した爆弾攻撃の容疑者として、ウクライナ人女性を特定した。当局はインターポールの国際手配（レッドノーティス）と逮捕状を発行した。標的となった実業家はウクライナ当局による制裁対象者の一人である。", "summary_en": "Monaco authorities have identified a Ukrainian woman as a suspect in a bombing that injured a Ukrainian-born businessman sanctioned by Kyiv along with two other people. An Interpol Red Notice and arrest warrant have been issued against the suspect. The targeted businessman is among those sanctioned by Ukrainian authorities.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/monaco-ids-suspect-in-bomb-attack-on-ukrainian-oligarch/a-77814163?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モルドバのムンテアヌ首相、就任8か月で突然辞任", "title_en": "Moldova PM Alexandru Munteanu Resigns After Eight Months in Office", "summary_ja": "モルドバのアレクサンドル・ムンテアヌ首相が、就任からわずか8か月で突然の辞任を発表した。マイア・サンドゥ大統領は、モルドバの親EU路線を継続するため後任を「速やかに」任命すると表明した。今回の予期せぬ辞任は、EUとの関係強化を進める同国の政権安定性に疑問を投げかけている。", "summary_en": "Moldovan Prime Minister Alexandru Munteanu announced a surprise resignation after serving only eight months as head of government. President Maia Sandu responded by pledging to appoint a successor quickly to ensure continuity of Moldova's pro-European Union political course. The unexpected departure raises questions about the stability of the government as Moldova pursues closer ties with the EU.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/moldova-prime-minister-munteanu-resigns/a-77817415?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ハメネイ師の葬儀にロシア・中国など各国要人がテヘランに集結", "title_en": "World Dignitaries Arrive in Tehran for Ayatollah Khamenei's Funeral", "summary_ja": "米国とイスラエルによる対イラン軍事作戦の開始時に行われた空爆で死亡したイランの最高指導者ハメネイ師の葬儀に、中国、ロシア、インドなど各国の高官がテヘランに到着した。イランは国家的な喪に服しており、世界各地から弔問団が集まっている。この葬儀はイランの政治的将来と地域情勢に大きな影響を与えるとみられている。", "summary_en": "Senior officials from China, Russia, India, and other nations have gathered in Tehran for the funeral of Supreme Leader Ayatollah Khamenei. Khamenei was killed in an airstrike carried out at the outset of a joint US-Israeli military campaign against Iran. The ceremony marks a significant moment of mourning and geopolitical consequence for the Islamic Republic.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/iran-dignitaries-arrive-for-ayatollah-khamenei-s-funeral/a-77816592?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシアがキーウに大規模攻撃、少なくとも21人死亡", "title_en": "Russia Launches Deadly Missile Strikes on Kyiv, Killing at Least 21", "summary_ja": "ロシアはウクライナの首都キーウに大規模なミサイル攻撃を行い、地元当局によると少なくとも21人が死亡した。ウクライナのゼレンスキー大統領はモスクワが大規模攻撃を計画していると事前に警告していた。この攻撃は、ウクライナ軍がロシア領内への越境攻撃を深めている最中に発生した。", "summary_en": "Russia carried out a massive aerial attack on Ukraine's capital Kyiv, killing at least 21 people according to local authorities. Ukrainian President Volodymyr Zelensky had previously warned that Moscow was planning a large-scale strike. The attack comes as Ukrainian forces have been pushing deeper into Russian territory in a cross-border offensive.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/07/02/world/ukraine-kyiv-russia-attack", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "世界最大のスタジアムが示す世界経済の真実とは？", "title_en": "Can the World's Largest Stadium Explain the Global Economy?", "summary_ja": "ベトナムは高い経済成長率と急増する輸出により、アジアで最も野心的な国の一つとして注目されている。しかしその輝かしい数字の裏には、国民の深い不満と複雑な現実が隠されている。同国の姿は、世界経済が抱える矛盾や課題を映し出す鏡ともなっている。", "summary_en": "Vietnam's high growth rates and surging exports present an image of economic success, but they mask deep frustrations within the country. As one of Asia's most ambitious nations, Vietnam serves as a lens through which broader global economic dynamics can be examined. The contrast between headline economic figures and on-the-ground realities highlights tensions that extend well beyond Vietnam's borders.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/02/world/asia/vietnam-stadium-corporate-inequality.html", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国のイラン投資構想、数十年の歴史的対立からの転換を模索", "title_en": "U.S. Hopes for Iran Investment Deal Would Mark Historic Shift", "summary_ja": "米国の高官らは、イランが対米姿勢を転換すれば多大な経済的恩恵を受けられると示唆している。しかしイランの指導部はこれまで繰り返しそのような取引を拒否してきた経緯がある。両国間の長年にわたる相互不信を考えると、合意実現への道筋には深い懐疑論が残る。", "summary_en": "Senior U.S. officials have suggested Iran could receive significant economic rewards if it changes its stance toward the United States. However, Iran's leadership has repeatedly rejected such offers in the past, making any deal a major departure from decades of hostile relations. The prospect faces deep skepticism given the long history of mutual distrust between the two nations.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/02/world/middleeast/us-iran-negotiations-economy-opening-up.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "人質交渉の膠着打開でパレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルはガザ地区を二分する軍事ゾーンの通過を避難民に許可し、パレスチナ人が北ガザへ徒歩で帰還を始めた。この動きは、人質解放をめぐる交渉の膠着状態が打開されたことを受けたものである。今回の展開は、ガザ情勢における重要な転換点となっている。", "summary_en": "Israel has permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The movement follows the resolution of a deadlock over hostage releases. The development marks a significant shift in the ongoing conflict situation within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Real Estate Crisis Fears", "summary_ja": "中国の大手不動産デベロッパーである万科が多額の損失を計上し、同国の不動産危機が引き続き拡大していることが浮き彫りとなった。万科の経営難は不動産セクター全体への波及リスクへの懸念を高めている。中国政府が事態の安定化に向けて介入するかどうかに、市場関係者の注目が集まっている。", "summary_en": "Leading Chinese property developer Vanke has reported a substantial financial loss, signaling that the country's real estate crisis continues to spread. The troubled company's situation raises concerns about contagion across the broader property sector. Analysts and investors are now questioning whether the Chinese government will intervene to stabilize the situation.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still Embedded From Oct. 7 Attack", "summary_ja": "イスラエルの医療当局者によると、ガザから解放された人質の体内には、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。一部の女性は長期間にわたり単独で拘束され、約8カ月間を地下トンネルの中で過ごしたという。この事実は、人質たちが拘束中に受けた深刻な身体的・精神的苦痛を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel in their bodies from the October 7 Hamas attack, according to an Israeli medical official. Some of the women had been held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The revelation highlights the severe physical and psychological conditions endured by hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モディ首相、海外訪問でまた勲章を受章――セーシェルで最高位の栄誉", "title_en": "Modi Collects Yet Another Foreign Honor on Overseas Trip to Seychelles", "summary_ja": "インドのナレンドラ・モディ首相は、セーシェル訪問中にパトリック・エルミニー大統領から同国最高位の栄誉のひとつである「青い地平線の守護者賞」を受章した。モディ首相は海外訪問のたびに各国から勲章や賞を受け取る傾向があることで知られており、中には同首相が初めて唯一の受章者となった賞も存在する。こうした慣行に対して批判的な見方も出ている。", "summary_en": "Indian Prime Minister Narendra Modi received the 'Guardian of the Blue Horizon' award from Seychelles President Patrick Herminie during a recent visit to the island nation. The award is among the country's highest honors. Critics have noted a pattern of Modi collecting foreign awards during his overseas travels, with some honors created specifically for him as their first and only recipient.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/03/narendra-modi-awards-honours-overseas-trips", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コートジボワールの洪水で59人死亡、西アフリカ全域で豪雨被害", "title_en": "Côte d'Ivoire Floods Kill 59 as West Africa Hit by Deadly Rains", "summary_ja": "コートジボワールでは5月以降の洪水により少なくとも59人が死亡したと、同国の情報通信相が閣議で発表した。5月から7月にかけての雨季には救助隊が行方不明者の捜索を続けており、死者数はさらに増える恐れがある。この災害は西アフリカ全域に及ぶ広域的な危機の一部であり、ガーナでも13人の死亡が報告されたほか、ベナン、トーゴ、ナイジェリアでも洪水被害が発生している。", "summary_en": "Floods in Côte d'Ivoire have killed at least 59 people since May, according to the country's communication minister. The death toll may rise further as rescue teams continue searching for victims during the rainy season, which runs from May to July. The disaster is part of a wider regional crisis, with Ghana reporting 13 dead and flooding also affecting Benin, Togo, and Nigeria.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/02/cote-d-ivoire-floods-dead-west-africa-rains", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "エボラウイルスの野生動物起源の解明が次の大規模感染拡大防止に不可欠", "title_en": "Understanding Ebola's Wildlife Origins Is Key to Preventing the Next Outbreak", "summary_ja": "コンゴ民主共和国で現在流行中のエボラ出血熱（ブンディブギョウイルス）は、すでに1,250件以上の感染例と少なくとも362人の死者を出しているにもかかわらず、十分な注目を集めていない。科学者たちは、ウイルスの野生動物宿主が特定されない限り、人間への感染リスクは続くと警告している。さらに、感染源が不明なままでは、ウイルスの宿主と疑われた野生動物が報復として無用に殺される被害も生じている。", "summary_en": "The Bundibugyo virus, responsible for the current Ebola outbreak in the Democratic Republic of the Congo with over 1,250 cases and at least 362 deaths, remains dangerously under-researched. Scientists warn that without identifying the wildlife reservoir of Ebola, humans will continue to face outbreak risks. Additionally, ignorance of the source leads to unnecessary retaliation killings of wildlife suspected of carrying the virus.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/environment/2026/jul/02/understanding-ebola-wildlife-origins-crucial-preventing-next-big-outbreak", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国の関与縮小でNATOが東欧防衛戦略を再考", "title_en": "NATO Rethinks Eastern Europe Defense as US Reduces Commitment", "summary_ja": "米国がNATOへの軍事的関与を縮小する姿勢を示す中、NATOは東欧防衛戦略の見直しを迫られている。かつて第二次世界大戦でこの地域を蹂躙したドイツが、再び戦車を派遣するなど防衛の中核的役割を担いつつある。大西洋同盟に新たな緊張が生じる中、欧州の戦略的自立をめぐる議論が高まっている。", "summary_en": "NATO is reassessing its strategy for defending Eastern Europe amid signals that the United States may scale back its military engagement with the alliance. Germany is playing an increasingly central role, with its tanks being deployed to a region that German forces once devastated during World War II. The shift reflects broader questions about European strategic autonomy as transatlantic ties face new strains.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/07/02/nato-ponders-how-to-defend-eastern-europe-as-america-pulls-back", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "同盟国がアメリカを脅す術を学ぶ：台湾は半導体産業でトランプに対抗できるか", "title_en": "Allies Learn How to Bully America: Can Taiwan Leverage Its Chip Industry Against Trump?", "summary_ja": "トランプ政権が強硬な貿易・外交政策を推し進める中、一部の同盟国は自国の経済的優位性を活用して反撃する方法を模索している。世界最重要の半導体製造拠点である台湾は、その圧倒的なチップ生産能力をワシントンへの交渉材料として使える立場にある。この動きは、小国であっても取引主義的な姿勢を強める米国に対して圧力をかけられることを示している。", "summary_en": "As Donald Trump pursues an aggressive trade and foreign policy agenda, some US allies are discovering ways to push back using their own economic leverage. Taiwan, home to the world's most critical semiconductor manufacturing, may be uniquely positioned to use its chipmaking dominance as a bargaining chip against Washington. The dynamic signals a shift in how smaller nations can exert pressure on a powerful but increasingly transactional United States.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/30/allies-learn-how-to-bully-america", "state_media": false, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大学生の学力は思っているよりも低い", "title_en": "Students are doing worse than you think", "summary_ja": "大学や大学院に在籍する学生の中に、10歳児と同程度の学力しか示せない者がいるという衝撃的な調査結果が明らかになった。高等教育への進学率の上昇が、必ずしも実質的な学力向上につながっていないことが示されている。この結果は、世界各地の教育機関の質と厳格さについて深刻な疑問を投げかけている。", "summary_en": "A report highlights alarming gaps in academic performance among college and university students, with some testing at levels no better than ten-year-olds. The findings suggest that higher education enrollment does not necessarily translate into genuine learning or competency gains. This raises serious questions about the quality and rigor of educational institutions worldwide.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "記録的早期熱波がフランス農業を直撃、農家は深刻な被害に無力感", "title_en": "Early Heatwaves Devastate French Agriculture, Leaving Farmers Facing Dire Losses", "summary_ja": "例年より早い熱波がフランス農業に甚大な被害をもたらしており、作物の焼損、家畜の大量死、二桁台の生産量減少が報告されている。農家は極端な高温への対応に苦慮しており、今後さらに状況が悪化することを恐れている。この危機は、気候変動が食料生産に与える影響についての懸念を一層高めている。", "summary_en": "Unusually early heatwaves are causing severe damage to French agriculture, with scorched crops, decimated livestock, and double-digit production declines. Farmers are struggling to respond to the extreme heat and fear that conditions will worsen as the season progresses. The crisis highlights growing concerns about the impact of climate change on food production in France.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/economy/article/2026/07/03/early-heatwaves-are-devastating-french-agriculture-and-leaving-farmers-helpless_6755111_19.html", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ルコルニュ仏首相、異例に早い深刻な山火事シーズンに警告", "title_en": "French PM Lecornu warns of unusually early and severe wildfire season", "summary_ja": "フランスのルコルニュ首相は、山火事のシーズンが例年より少なくとも2週間早く始まっていると警告した。植生がすでに極度に乾燥しており、深刻な火災のリスクが高まっている。首相は消火活動に当たる資源の「持続力」についても懸念を示し、今後数週間への警戒を呼びかけた。", "summary_en": "French Prime Minister Lecornu has warned that the country's wildfire season is running at least two weeks ahead of its normal schedule. Extremely dry vegetation is raising the risk of serious fires, prompting concerns about the capacity of firefighting resources to sustain a prolonged response. The prime minister described the expected fires as 'fairly severe,' signaling heightened alarm over the coming weeks.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/article/2026/07/03/french-pm-lecornu-warns-of-fairly-severe-wildfires-arriving-unusually-early_6755097_114.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "「ブレグジット時にどの立場だったか」仏大統領選候補者全員が答えるべき＝ルモンド紙コラム", "title_en": "French Presidential Candidates Should Declare Their Brexit Stance, Says Le Monde Columnist", "summary_ja": "ルモンド紙のコラムニスト、アラン・フラション氏は、フランス大統領選の全候補者に対し、英国のEU離脱（ブレグジット）をめぐって当時どの立場をとっていたかを明らかにするよう求めた。英国の歴史的な国民投票から10年が経過するなか、フラション氏はその教訓があまりにも早く忘れ去られていると警鐘を鳴らす。この問いかけは、欧州統合への姿勢を測る踏み絵として機能するとの見方を示している。", "summary_en": "Le Monde columnist Alain Frachon argues that French presidential candidates must answer where they stood on Brexit, marking ten years since the UK's historic vote to leave the European Union. Frachon warns that the lessons of that unprecedented referendum have been too quickly forgotten by political leaders. He implies the question serves as a litmus test for candidates' commitment to European integration.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/opinion/article/2026/07/03/which-side-were-you-on-during-brexit-every-candidate-in-the-french-presidential-election-should-answer-this-question_6755106_23.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "メッシの「第二の故郷」マイアミでアルゼンチンサポーターが熱狂、カーボベルデ戦前に祝祭ムード", "title_en": "Argentina Fans Celebrate Messi's Miami Homecoming Ahead of Cape Verde World Cup Match", "summary_ja": "アルゼンチン代表サポーターたちは、カーボベルデとのワールドカップ予選を前にマイアミビーチを祝祭の場へと変えた。マイアミはメッシが所属するインテル・マイアミの本拠地であり、彼の「第二の故郷」として特別な意味を持つ。この試合はマイアミで開催されるアルゼンチンの唯一のワールドカップ関連公式戦となる。", "summary_en": "Argentine supporters transformed Miami Beach into a festive hub ahead of their national team's match against Cape Verde. The game holds special significance as Miami is considered Lionel Messi's adoptive home city, where he plays for Inter Miami. Fans gathered to celebrate what is Argentina's only scheduled World Cup qualifier match in the city.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/7/3/argentina-fans-revel-in-messis-miami-homecoming-before-cape-verde-match?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ナーゲルスマン監督、W杯2026早期敗退を受けドイツ代表監督を辞任", "title_en": "Nagelsmann Resigns as Germany Coach After World Cup 2026 Early Exit", "summary_ja": "ユリアン・ナーゲルスマン監督は、2026年ワールドカップでの早期敗退を受け、ドイツ代表監督を辞任した。この辞任により、元リバプール監督のユルゲン・クロップが後任に就く可能性が開かれた。ドイツサッカー協会は今後、新たな代表監督の選定という課題に直面することになる。", "summary_en": "Julian Nagelsmann has stepped down as Germany national football team coach following an early elimination from the 2026 World Cup. His departure opens the door for former Liverpool manager Jurgen Klopp to potentially take over the role. The German Football Association now faces the task of finding a successor to lead the national team forward.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/7/3/nagelsmann-steps-down-germany-coach-klopp-paraguay-world-cup-round-of-32?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ナヤラ・エナジーとは？ロシアが石油輸入しているとされるインド企業", "title_en": "Nayara Energy: The Indian Firm at the Center of Russia's Oil Import Reports", "summary_ja": "インドの石油会社ナヤラ・エナジーは、ロシアが同社から精製石油製品を輸入しているとの報道を受け、注目を集めている。ウクライナ軍がロシアの石油施設を繰り返し攻撃した結果、ロシア国内では燃料不足と長蛇の列が各地で発生している。この状況は、ウクライナ戦争勃発以降に深まったインドとロシアの複雑なエネルギー取引関係を浮き彫りにしている。", "summary_en": "Nayara Energy, an Indian oil company with significant Russian ownership, has come under scrutiny amid reports that Russia is importing refined petroleum products from the firm. This comes as Ukrainian forces have repeatedly struck Russian oil infrastructure, creating widespread fuel shortages and long queues across Russia. The situation highlights the complex energy trade relationships that have developed between India and Russia since the onset of the war in Ukraine.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/3/what-is-nayara-the-indian-firm-russia-is-reportedly-importing-oil-from?traffic_source=rss", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ゴールドマン下院議員、イスラエル支持が民主党予備選敗北の原因と発言", "title_en": "Rep. Dan Goldman Says Pro-Israel Stance Cost Him New York Democratic Primary", "summary_ja": "ニューヨーク州選出の民主党下院議員ダン・ゴールドマン氏は、民主党予備選での敗北の原因をイスラエルへの支持姿勢に帰した。ゴールドマン議員は、イスラエル・ガザ紛争に関する自身の立場が選挙区内の多くの民主党支持者を遠ざけたと認めた。この結果は、イスラエルに対する米国の政策をめぐる民主党内の緊張の高まりを反映している。", "summary_en": "New York Democratic Representative Dan Goldman has attributed his loss in a Democratic primary election to his support for Israel. Goldman acknowledged that his position on the Israel-Gaza conflict alienated a significant portion of Democratic voters in his district. The outcome reflects growing tensions within the Democratic Party over U.S. policy toward Israel.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi_AFBVV95cUxQZmctRXkyRVpDcko2bDdxRGFYVUVGZlBQWHFYMGgzZUtjcXhHMjJpazFzNGloVDZSRzBHSTlrZE10VTZIVVBoaDVYb20xVU9XSEFzTHRlSHlGVENGb3NFTDNPODBzSGtySnQ5RXRobHFOWTVXNDRMdXB6NW1ZOWlObVBRamZRTWxUSjBNZTRXVnRjZ2xGYXM2SGpZeGhkT1RETEV3WVJDcEs5Rm5XMjJCUGxJU1VJcTJTOHNjUWhjYmNDQ25EQ21BWUlPem41WTRiWHZjYjFJc1lHd25VRzJNZVZOeHpNMXJ5SDc5bUxIWEJ0dGEzRS1HWkJyR1A?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "社説：イランとの戦争はイスラエルの「イカロスの瞬間」となった", "title_en": "Opinion: The Iran Conflict Has Become Israel's Icarus Moment", "summary_ja": "ハアレツ紙の論説は、イスラエルのイランとの軍事的対立を、太陽に近づきすぎたイカロスの神話になぞらえ、危険な過信による暴走だと論じている。記事は、エスカレートする対イラン紛争においてイスラエルが戦略的慎重さの限界を超えた可能性を示唆している。著者は、傲慢さと抑制のない野心が国家に壊滅的な転落をもたらす恐れがあると警告する。", "summary_en": "A Haaretz opinion piece argues that Israel's military confrontation with Iran represents a dangerous overreach, likening it to the myth of Icarus flying too close to the sun. The piece suggests Israel may have exceeded the limits of strategic prudence in its escalating conflict with Iran. The author warns that hubris and unchecked ambition could lead to a catastrophic fall for the country.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi6AFBVV95cUxObDVvTDlKeExnREppemFUU2lrc1FndmV3MlFhZEhoMlBfZF9JQzJzeFZDdjF5cWQ4dmRHU3ZXUzduRW9KalFaLUFjNTlZemRVU2otcVFVeVVKTWdrNl93djBNMWExcG1CM2k5LVh6Zm5qa1lhYVllQnN2ZzUyc2JqLXBsQ3RFYXFDYlNMZ1RCTGwxTkw0a0NQOHEtaE9Zb2RqbEtZUUw2QWpJRmNHU3RFRTc5RmxnRUNlSmFDWHhDSTh2MUJjX084dzE5bVZMVzFEM3FyN0VSTUlGS3JGWm9BVktrWXdhTFZY?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "オピニオン：ハアレツなければイスラエル人は占領を知らなかった", "title_en": "Opinion: Without Haaretz, Israelis Would Not Know About the Occupation", "summary_ja": "ハアレツ紙に掲載されたオピニオン記事は、同紙がパレスチナ占領の実態をイスラエル社会に伝える上で不可欠な役割を果たしていると主張している。著者は、ハアレツの報道がなければ、この問題はイスラエルの公論からほぼ姿を消していただろうと指摘する。この記事は、権力の監視と重大な政治的現実への認識を維持するための独立したジャーナリズムの重要性を強調している。", "summary_en": "An opinion piece in Haaretz argues that the newspaper plays a critical role in informing Israeli society about the realities of the occupation of Palestinian territories. The author suggests that without Haaretz's reporting, this issue would largely be absent from Israeli public discourse. The piece underscores the importance of independent journalism in holding power accountable and maintaining awareness of contentious political realities.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi-gFBVV95cUxNeFY1eXRMX085c01UQzRUb3NCdlBoUExsR2R4Vlllb1d0NXpkMFdGYTJSQnhyaGFXUERuMjMweS1jMVVTQ19QaHhvVXB6NWk2T3BVYUR6RFNKSjdGNkVpMkZINFo5VHpaQk1LeE1rVS1udm5wcHFYRmczVXlNM20xQ21yRWhsV1R5WWtWYVByeUZIZ21ZaDB3Q0FrOWNNcDI3ajdITGczbkdDQ1d1aUN1bmNpM3VnV1NVckdvN21jQ1hQbVFOTmN3UjAwdUk5aVhNb0VFaV9nZ29SZnRkUUpMcjBIb0dVb2FBZUNtQU1wanVtY2VKZGxvTVhR?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "シンガポール国防省（Mindef）からのニュース更新", "title_en": "Singapore Mindef News Update", "summary_ja": "シンガポール国防省（Mindef）は、ストレーツ・タイムズを通じてニュースの更新情報を発表した。この通知は2026年7月3日金曜日に公開された。提供された抜粋からは、これ以上の詳細は確認できない。", "summary_en": "The Singapore Ministry of Defence (Mindef) has issued a news update as reported by The Straits Times. The notice was published on Friday, July 3, 2026. No further details were available from the provided excerpt.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ", "title_en": "Evening Update – The Straits Times", "summary_ja": "ストレーツ・タイムズは2026年7月3日金曜日にイブニング・アップデートニュースレターを配信した。この briefingは同紙が定期的に提供するニュースレターサービスの一環で、その日の主要ニュースをまとめたものである。読者はリンクを通じて購読設定の管理や追加の無料ニュースレターへの登録が可能となっている。", "summary_en": "The Straits Times published its Evening Update newsletter on Friday, July 3, 2026. The briefing is part of the publication's regular newsletter service, offering readers a summary of the day's top stories. Subscribers can manage their preferences or sign up for additional free newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニング・ブリーフィングは、購読者に定期的に配信されるニュースレターです。今回の抜粋にはメタデータと書式設定の案内のみが含まれており、要約できる実質的なニュース内容は含まれていません。読者はストレーツ・タイムズのウェブサイトから購読管理や追加ニュースレターの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a regular newsletter digest delivered to subscribers. The excerpt provided contains only metadata and formatting instructions, with no substantive news content available for summarization. Readers can manage their subscription or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "元インドネシア教育相ナディエム、クロームブック汚職事件で懲役10年の判決", "title_en": "Former Indonesian Education Minister Nadiem Makarim Sentenced to 10 Years in Chromebook Corruption Case", "summary_ja": "インドネシアの元教育大臣ナディエム・マカリム氏が、クロームブック調達をめぐる汚職事件で懲役10年の判決を受けた。この事件は、全国の学校へのノートパソコン供給プログラムにおける不正疑惑に関するものである。ナディエム氏はライドシェア大手ゴジェックの共同創業者でもあり、著名な元閣僚への判決として大きな注目を集めている。", "summary_en": "Former Indonesian Education Minister Nadiem Makarim has been sentenced to 10 years in prison in connection with a corruption case involving the procurement of Chromebooks. The case centers on alleged irregularities in a government program to supply laptops to schools across Indonesia. The verdict marks a significant legal outcome for one of Indonesia's most prominent former cabinet members and co-founder of ride-hailing giant Gojek.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMivgFBVV95cUxOQVBXd2RnQTdQMS1UWUZmV1liTGMzbXN5TXNXdEZBTi11QVJMOEhuSEg1YWR4R0NvejRIRUstUW1kNzdFRkVJYXVXU1VTS2lPUmRiUjdnTURiakdicFhwUW8wYmV4UHUtOEh1aWJpNndqUVpqOWZTbmhwMXRUWmI0aDRHdUE0dE9xMXJjbFNwM3Foem4tNHNVa2Y3b3BTd0VJaXJrM0M5N3BCbkNoMkZEZVJLTEQ1bkdYc2xoNm93?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "持続可能性の rhetoric vs. 経済的現実：両立は可能か？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、持続可能性への公約と途上国が直面する経済的圧力の間に高まる緊張を分析している。各国政府や企業がグリーンアジェンダを推進する一方で、化石燃料や伝統的産業からの移行コストは依然として大きな負担となっている。記事は、野心的な環境目標と、いまだ発展途上にある人々の差し迫った経済的ニーズを真に両立させることが可能かどうかを問いかけている。", "summary_en": "The Jakarta Post examines the growing tension between sustainability pledges and economic pressures facing developing nations. As governments and corporations champion green agendas, the practical costs of transitioning away from fossil fuels and traditional industries remain a significant burden. The article questions whether it is truly possible to reconcile ambitious environmental goals with the immediate economic needs of populations still striving for development.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コモド島への観光客が増加傾向", "title_en": "Tourist Visits to Komodo Island on the Rise", "summary_ja": "世界的に有名なコモドオオトカゲが生息するコモド島で、観光客の訪問数が大幅に増加している。国内外から多くの旅行者がこの島を訪れ、自然の生息地でオオトカゲを観察しようとしている。当局は島固有の生態系保護のため、増加する観光客への対応を注視している。", "summary_en": "Komodo Island, home to the world-famous Komodo dragons, is experiencing a significant increase in tourist arrivals. The Indonesian destination continues to attract both domestic and international visitors eager to see the giant lizards in their natural habitat. Authorities are monitoring the growing influx to ensure the preservation of the island's unique ecosystem.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikwFBVV95cUxOQnVENlpVakhEVnVrUXdKUzdjUVljNjJzQ2pMRnliQTB5Wm4xV01fdEx3Y3JwaWcxc3Z3SUM2U1MyLU9fNHV6MFJ6MTRmN2E1NTBMZlZKU3d0NGZ2VU0yUVBEZzF4NG4xdTE2NmFXVDQ3TDYyMHRQQ1FaeVhDaVFmWkE1ZmpWOHhiNmxRd0NmbnpSdlk?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "オーストラリア首相、子どものSNS禁止法改正の遅延を非難", "title_en": "Australian PM Condemns Delay in Implementing Child Social Media Ban", "summary_ja": "オーストラリアのアンソニー・アルバニージー首相は、子どものソーシャルメディア利用を禁止する法律の改正が遅れていることを強く非難した。当初の法律は2024年に議会で圧倒的な支持を得て可決されたものである。首相の批判は、この画期的な児童保護措置の施行を急ぐよう求める強いメッセージとなっている。", "summary_en": "Australian Prime Minister has strongly condemned delays in implementing changes to legislation banning children from social media. The initial law was passed by Parliament with overwhelming bipartisan support in 2024. The PM's criticism signals urgency in enforcing the landmark child protection measure.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/australian-prime-minister-condemns-delay-of-changes-to-child-social-media-ban/article71177697.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "建国250年のアメリカ：希望と疑念の間で揺れるインド系アメリカ人", "title_en": "America at 250: Indian Americans Navigate Hope and Doubt", "summary_ja": "アメリカが建国250周年を迎えるにあたり、インド系アメリカ人たちは自らのアイデンティティと居場所をめぐって複雑な感情を抱えている。コミュニティのメンバーたちは、アメリカンドリームへの期待と、現在の社会・政治的現実との間で生じる葛藤を語る。彼らの声は、機会への感謝と帰属意識への不安が交錯するコミュニティの姿を映し出している。", "summary_en": "As the United States approaches its 250th anniversary, Indian Americans find themselves grappling with deeply conflicted feelings about their place in the country. Community members reflect on the tension between the promise of the American dream and the realities of belonging in today's political and social climate. Their stories reveal a community caught between gratitude for opportunities and anxiety about identity and acceptance.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/society/america-at-250-caught-between-hope-and-doubt-anjali-enjeti-sundal-ali-moni-basu/article71168912.ece", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米大使、クック諸島の重要鉱物を外交上の最優先課題に指定", "title_en": "US Ambassador Flags Cook Islands Critical Minerals as Top Diplomatic Priority", "summary_ja": "ニュージーランド兼クック諸島駐在の米国大使は、重要鉱物が過去1年間で急速に外交課題の上位に浮上したと述べた。この動きは、太平洋地域における鉱物資源の確保に対する米国の関心の高まりを反映している。南太平洋に位置するクック諸島は、海底鉱物資源の豊富な埋蔵可能性を持ち、国際的な注目を集めている。", "summary_en": "The U.S. ambassador to New Zealand and the Cook Islands has identified critical minerals as a rapidly rising priority on his diplomatic agenda. The shift reflects growing American interest in securing mineral resources in the Pacific region. The Cook Islands, situated in the South Pacific, holds significant potential for seabed mineral deposits that have drawn international attention.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/us-envoy-says-cook-islands-minerals-are-a-top-priority/article71177582.ece", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ヤンキース、台湾人投手有望株と100万ドルで契約", "title_en": "Yankees Sign Taiwanese Pitching Prospect for $1 Million", "summary_ja": "ニューヨーク・ヤンキースが台湾人の投手有望株と総額100万米ドルの契約を締結した。この契約は、台湾人選手に対するメジャーリーグ球団の継続的な関心を示すものである。選手の詳細な情報や契約の具体的な条件については明らかにされていない。", "summary_en": "The New York Yankees have signed a Taiwanese pitching prospect to a deal worth US$1 million. The signing highlights continued interest from Major League Baseball organizations in developing talent from Taiwan. Details about the pitcher's age, hometown, and specific terms beyond the base signing bonus were not immediately disclosed.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVEFVX3lxTE51blNPT0lEWlJOVEloZm9BdDd5NnB0LWRlbVVhRXJuV0JReE51cDQ2bUxzY0N5cy15MmxtU0xYRWt0U2xYWWZkcFEyZ2FZZUVyYnIyVA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台北動物園、帝王切開で生まれた珍しいオランウータンの双子を迎える", "title_en": "Taipei Zoo Welcomes Rare Orangutan Twins Born via Cesarean Section", "summary_ja": "台北動物園で、帝王切開によって珍しいオランウータンの双子が誕生した。オランウータンの双子の出産は極めて稀なケースであり、動物園にとっても保護活動においても重要な出来事となっている。母親と双子は手術後、動物園の獣医スタッフによって注意深く見守られている。", "summary_en": "Taipei Zoo has welcomed a rare set of orangutan twins that were delivered via cesarean section. Twin births are exceptionally uncommon among orangutans, making this a significant event for the zoo and conservation efforts. Both mother and infants are being closely monitored by zoo veterinary staff following the procedure.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE9reEFsVm1NSmpnWmp3aXFjZ3lPdllyaFhqR2xiTkJMNk10M3BfNHplalBTWFBPVFZFY2NvVUNnN1ZpOERVaGtNbEhqXzY4c3M2MXl2S1Z3?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台湾と中国、両岸経済依存をめぐり対立", "title_en": "Taiwan and China Clash Over Cross-Strait Economic Dependence", "summary_ja": "台湾と中国は、台湾海峡をまたぐ経済的依存関係の実態と影響をめぐって対立している。両政府は貿易・投資関係が政治的影響力や経済安全保障に与える影響について異なる見解を示している。この対立は、深く結びついた両岸経済のリスクと利益を双方が再評価する中で、より広範な緊張関係を反映している。", "summary_en": "Taiwan and China are engaged in a dispute over the extent and implications of economic dependence across the Taiwan Strait. The two sides hold differing views on how trade and investment ties affect political leverage and economic security. The disagreement reflects broader tensions as both governments reassess the risks and benefits of their deeply intertwined economies.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE9QWXlxOHZiVUhIbDBrVnZYc3hTblgxRlZJcTlLSVNQaktiRE1Fd0xCQ29kVWVweXFMMnNKajZjclJXUFBBOWxnbXlGb3VBd3d1UVZtU3h1aw?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ、米国強制送還者が死亡した地震被災地へのアクセスを遮断", "title_en": "Venezuela Blocks Access to Site Where U.S. Deportees Died in Earthquake", "summary_ja": "ベネズエラ政府は、先週発生した地震で壊滅的な被害を受けた沿岸地域ラ・グアイラへの立ち入りを制限しており、同地では米国から強制送還された人々の死亡が報告されている。47歳のジェイソン・ラムスさんは、行方不明の兄弟を探すため、国境州タチラからラ・グアイラまでベネズエラを半縦断した。アクセス制限により家族の安否確認が困難となっており、災害対応の透明性に対する懸念も高まっている。", "summary_en": "Venezuela has blocked access to La Guaira, the coastal region devastated by last week's earthquakes, where a number of U.S. deportees were reported to have died. Yeison Lamus, 47, traveled across the country from the border state of Táchira to La Guaira searching for his missing brother. The restriction is hampering family reunification efforts and raising concerns about transparency in the disaster response.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/venezuela-blocks-access-to-site-where-us-deportees-died.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "地震でベネズエラの移住危機が深刻化、国内避難民が急増", "title_en": "Venezuela's Migration Crisis Worsens as Earthquakes Displace Thousands Internally", "summary_ja": "少なくとも10年にわたりベネズエラを苦しめてきた強制移住の危機が、約1週間前に発生した地震を機に新たな局面を迎えた。この災害により国内避難民が急増し、すでに深刻な人道的状況がさらに悪化している。当局と支援団体は、海外への移住者問題に加え、国内での避難民対応という二重の課題に直面している。", "summary_en": "Venezuela's long-running forced migration crisis, which has affected the country for at least a decade, has entered a new phase following earthquakes that struck nearly a week ago. The disasters have triggered a growing wave of internal displacement, compounding an already severe humanitarian situation. Authorities and aid organizations are now confronting both the ongoing exodus of Venezuelans abroad and a mounting domestic displacement emergency.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/venezuelas-longstanding-migration-crisis-deepens-after-earthquakes.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ブラジル海軍、ベネズエラ震災の震源地ラグアイラで野戦病院を運営開始", "title_en": "Brazil Deploys Navy Mobile Hospital With Surgical Center at Venezuela Earthquake Epicenter", "summary_ja": "ブラジル海軍は、地震による人道危機の中心地であるベネズエラのラグアイラに、外科センターを備えた移動式野戦病院の運営を開始した。フォーリャ・デ・サンパウロの記者が初日の様子を取材し、地元住民がブラジル国旗の掲げられたテントに恐る恐る近づく光景を伝えた。この展開は、隣国ベネズエラの危機に対するブラジルの重要な人道支援活動となっている。", "summary_en": "The Brazilian Navy has launched operations of a mobile hospital, including a surgical center, in La Guaira, the area hardest hit by Venezuela's earthquake-driven humanitarian crisis. A Folha de S.Paulo reporter documented the facility's first day, noting that local residents were initially approaching the Brazilian-flagged tents with caution. The deployment marks a significant humanitarian effort by Brazil amid the ongoing crisis in neighboring Venezuela.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/brazil-operates-hospital-with-surgical-center-at-the-epicenter-of-venezuelas-crisis.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ナイジェリアの裁判所、議員に関連する1億5000万ナイラのキックバックの最終没収を命令", "title_en": "Nigerian Court Orders Final Forfeiture of N150 Million Kickback Linked to Lawmaker", "summary_ja": "ナイジェリアの裁判所は、現職議員に関連する1億5000万ナイラの資金について最終的な没収命令を下した。経済金融犯罪委員会（EFCC）の調査により、この資金は当該議員が立法活動に関与する中で受け取ったキックバックの収益であることが判明した。今回の判決は、公職者を対象としたナイジェリアの汚職撲滅への取り組みにおける重要な前進とみられている。", "summary_en": "A Nigerian court has ordered the final forfeiture of N150 million tied to a serving lawmaker following an investigation by the Economic and Financial Crimes Commission (EFCC). The EFCC determined the funds represent proceeds from kickbacks the legislator received in connection with his official duties. The ruling marks a significant step in Nigeria's ongoing anti-corruption efforts targeting public officials.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/headlines/892658-court-orders-final-forfeiture-of-n150-million-kickback-linked-to-nigerian-lawmaker.html", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "キング・アマクリーとGSSグボコが第26回MILOバスケットボール選手権で優勝", "title_en": "King Amakree and GSS Gboko Win 26th MILO Basketball Championship", "summary_ja": "第26回MILOバスケットボール選手権が閉幕し、キング・アマクリーとGSSグボコがそれぞれ王者に輝いた。ネスレナイジェリアのワッシム・エルフセイニ社長、ナイジェリア学校スポーツ連盟のビシ・ジョセフ会長らが出席し、優勝チームにトロフィーと賞金を授与した。同大会はネスレナイジェリアが学校スポーツの振興を目的として支援を続けているものである。", "summary_en": "The 26th MILO Basketball Championship concluded with King Amakree and GSS Gboko crowned as champions. Trophies and cheques were presented by Nestlé Nigeria Plc managing director Wassim Elhusseini, joined by Nigerian School Sport Federation president Bisi Joseph and Nestlé beverages category manager Gilbert Tweneboah-Koduah. The event, organized under the MILO brand, highlighted Nestlé Nigeria's continued support for school sports development.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/892655-king-amakree-gss-gboko-crowned-champions-as-26th-milo-basketball-championship-ends-in-style.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "NHRCがナイジェリアの刑務所過密問題に対処する新たな連携を計画", "title_en": "NHRC Plans New Partnership to Address Nigeria's Prison Congestion Crisis", "summary_ja": "ナイジェリア国家人権委員会（NHRC）は、長年にわたる刑務所の過密問題に対処するための新たなパートナーシップを計画している。この問題は数十年にわたり多くの介入策が講じられてきたにもかかわらず改善されず、同国の刑事司法制度における深刻な懸念事項となっている。今回の取り組みは、国内で最も根深い人権問題の一つに対し、協力して解決策を見出そうとする新たな試みである。", "summary_en": "Nigeria's National Human Rights Commission (NHRC) is planning a new partnership aimed at tackling the country's persistent prison congestion problem. The crisis has resisted numerous interventions over the decades and continues to be a major concern within Nigeria's criminal justice system. The initiative signals a fresh effort to find collaborative solutions to one of the nation's most entrenched human rights challenges.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/892647-nhrc-plans-new-partnership-to-tackle-prison-congestion.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "危険な熱波、米国独立記念日の祝祭に影響か", "title_en": "Heat Wave Threatens US Fourth of July Holiday Weekend", "summary_ja": "中国国営メディアのCGTN・新華社は、危険な熱波が米国中西部から東海岸にかけて全米の半数以上の地域に広がっていると報じている。同メディアによると、この猛暑により、米国で最も賑わう祝日のひとつである独立記念日（7月4日）の週末に記録的な高温となるリスクが高まっているという。", "summary_en": "State-controlled outlet CGTN/Xinhua reports that a dangerous heat wave is spreading across more than half of the United States, stretching from the Midwest to the East Coast. The outlet reports that the extreme heat raises the risk of record-breaking temperatures coinciding with the Fourth of July weekend, one of the busiest holiday periods in the country.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-03/Dangerous-heat-wave-threatens-US-Fourth-of-July-celebrations-1OtaVVu5ncA/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "湾岸地域の専門家が中国の成果を称賛と国営メディアが報道", "title_en": "Gulf Region Experts Praise China's Development Achievements, State Media Reports", "summary_ja": "中国国営メディアの新華社およびCGTNは、湾岸地域の専門家たちが中国の発展成果を高く評価していると報じている。国営メディアによれば、これらの専門家が中国の進歩に賞賛の意を示したとされているが、具体的な発言内容や専門家の詳細は提供されていない。国家管理下にあるメディアの報道であることを踏まえ、情報の受け取りには注意が必要である。", "summary_en": "Xinhua/CGTN reports that experts in the Gulf region have spoken highly of China's achievements. State media claims these experts expressed admiration for China's development progress, though specific details of their statements and identities are not provided in the excerpt. As a state-controlled outlet, Xinhua's framing of foreign expert opinions should be considered within that editorial context.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-02/Experts-in-Gulf-region-speak-highly-of-China-s-achievement-1Os3kRPMInK/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カタール、米特使のドーハ滞在を確認　イランとの直接協議は予定せず", "title_en": "Qatar confirms US envoys in Doha, no direct Iran talks planned", "summary_ja": "新華社・CGTNによると、カタールはトランプ米大統領の特使スティーブ・ウィトコフ氏とジャレッド・クシュナー氏がドーハに滞在していることを確認したと報じている。同メディアは、米特使とイラン当局者との直接会談は予定されていないとカタール側が表明したと伝えている。カタールを仲介とした間接的な外交的関与が進んでいる可能性が示唆される。", "summary_en": "Xinhua/CGTN reports that Qatar confirmed US President Donald Trump's special envoys Steve Witkoff and Jared Kushner are present in Doha. The state outlet reports that despite their presence, no direct meetings between the US envoys and Iranian officials are planned. The development suggests indirect diplomatic engagement may be underway through Qatari intermediaries.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-30/Qatar-says-US-envoys-in-Doha-no-direct-talks-with-Iran-planned-1OoXeUk78MU/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア大使「英国は新首相就任後もロシア政策を変えず」と主張", "title_en": "UK Russia Policy Unchanged Under New PM, Russian Ambassador Claims", "summary_ja": "ロシア国営メディアTASS/RTによると、ロシアのアンドレイ・ケーリン大使は、英国が新首相のもとでもロシアに対する政策を変えないと述べたとされる。同大使はまた、労働党が2024年に政権を握った際、ロシアとの関係をリセットする機会があったにもかかわらず、それを活かせなかったと主張したとロシア側メディアは伝えている。これらは国家管理下にあるロシアのメディアによる報道であり、内容の中立性には注意が必要である。", "summary_en": "Russian Ambassador Andrey Kelin reports that the UK will not alter its policy toward Russia under the new Prime Minister. TASS/RT reports that Kelin claims the Labour Party missed an opportunity to reset relations with Moscow when it came to power in 2024. According to the state-controlled Russian source, Kelin suggests Labour has continued rather than revised the previous government's stance on Russia.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2155037", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "2026年1〜5月、ロシアのトルコ産水産物輸入が7%減少", "title_en": "Russian Fish Imports from Turkey Drop 7% in First 5 Months of 2026", "summary_ja": "ロシアの水産業界団体「フィッシュ・ユニオン」は、2026年1〜5月のトルコからの水産物輸入が7%減少したと報告している。一方、同団体によれば、冷凍トラウトの供給量は数量ベースで25%、金額ベースで20%急増し、1万2,000トン・7,900万ドル相当に達したという。全体的な輸入減少の背景には、水産物市場における貿易動向の変化があるとされている。", "summary_en": "Russia's Fish Union reports that fish imports from Turkey fell 7% in the first five months of 2026. However, the state-affiliated source reports that frozen trout supplies bucked the trend, surging 25% in volume and 20% in value to reach 12,000 metric tons worth $79 million. The Fish Union attributed the overall decline to shifting trade dynamics in the broader seafood market.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2155035", "state_media": true, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア大使、英露関係改善の根拠なしと発言", "title_en": "Russian Ambassador Says No Basis for UK-Russia Relations to Improve", "summary_ja": "タス通信・RTによると、駐英ロシア大使アンドレイ・ケリン氏は、英露二国間関係が改善される根拠はないと述べたと報じている。大使は、二国間の接触はイギリス当局の主導により凍結されていると主張したとされる。この発言はモスクワが外交的膠着の責任をロンドン側に帰していることを示唆している。", "summary_en": "TASS/RT reports that Russian Ambassador to the UK Andrey Kelin stated there are no grounds for an improvement in bilateral relations between Russia and the United Kingdom. The ambassador reports that bilateral contacts have been frozen at the initiative of the British authorities. Kelin's remarks suggest Moscow places responsibility for the diplomatic standoff squarely on London.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2155027", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ヨーロッパの新たなドイツ問題：統合なき防衛費増額の限界", "title_en": "Europe's New German Question: Defense Spending Without Integration", "summary_ja": "筆者は、EU加盟国が個別に防衛費を増額するだけでは欧州の安全保障は実現しないと主張する。EU全体を統括する枠組みなしには防衛能力の断片化が続き、米国への依存から脱却できないと警告する。特にドイツが単独路線を取れば、新たなリスクを生み出す恐れがあると論じている。", "summary_en": "The author argues that simply increasing defense spending will not make Europe secure if member states pursue it in isolation. Without an EU-level framework to coordinate and scale defense capabilities, fragmentation will persist and European dependence on the US will continue. Germany, in particular, risks worsening the situation by going it alone rather than building a unified European defense architecture.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/cooperation-is-vital-to-credible-european-defense-capabilities-by-marco-buti-and-francesco-nicoli-1-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Europe’s New German Question\nand\n                        Without a EU-level framework capable of turning resources into scale, the bloc’s defense capabilities will remain limited, no matter how much member countries spends. If Germany, in particular, insists on going it alone, Europe could remain fully dependent on the US for key assets.\n                    \n                        FLORENCE/TURIN—Many European Union countries, starting with Germany, assume that higher defense spending will automatically generate the capabilities needed to keep Europe secure. But if they pursue such spending in isolation, they will merely perpetuate the fragmented, outdated defense system that has left them dependent on the United States for more than 70 years—and possibly even create new risks.\n        https://prosyn.org/ntM0yIU", "translation_ja": "フィレンツェ／トリノ発―ドイツをはじめとする多くの欧州連合（EU）加盟国は、防衛費を増額すれば自動的に欧州の安全保障に必要な能力が備わると考えている。しかし、各国がそうした支出を個別に追求するならば、70年以上にわたって米国への依存を招いてきた断片的で時代遅れの防衛体制を永続させるだけであり、場合によっては新たなリスクを生み出しかねない。資源を規模へと転換できるEUレベルの枠組みがなければ、加盟国がいかに多くの費用を投じようとも、欧州の防衛能力は限定的なままにとどまる。とりわけドイツが単独行動にこだわるならば、欧州は主要な防衛資産において引き続き米国に全面依存し続けることになりかねない。", "vocab": [{"word": "perpetuate", "definition": "（悪しき状態などを）永続させる、存続させるという意味の動詞。否定的な状況が変わらずに続く文脈でよく使われる。"}, {"word": "fragmented", "definition": "断片化された、バラバラに分割された状態を表す形容詞。組織や政策が統一されずに分散している様子を指す。"}, {"word": "bloc", "definition": "共通の目的や利益のために結束した国家や組織のグループを指す名詞。EUのような政治・経済的連合体に使われることが多い。"}, {"word": "isolation", "definition": "他から切り離された状態、孤立を意味する名詞。「in isolation」で「単独で・孤立して」という慣用表現として頻出する。"}, {"word": "framework", "definition": "枠組み、制度的な構造を指す名詞。政策や協力体制の基盤となる仕組みを表す際に使われる。"}, {"word": "scale", "definition": "規模、または規模を拡大することを意味する名詞・動詞。「turn resources into scale」は資源を大規模な能力へと転換するという意味で使われている。"}]}, {"title_ja": "アメリカ独立革命から普通選挙権へ", "title_en": "From the American Revolution to Universal Suffrage", "summary_ja": "この論説は、現代の歴史家にほとんど知られていないチャールズ・レノックス（第三代リッチモンド公爵）という18世紀イギリスの政治的人物に焦点を当てている。著者は、1765年にヴェルサイユ宮廷への英国大使を務めたリッチモンドの初期のキャリアと、ジョージ三世との確執を追う。本稿は、アメリカ独立革命と普通選挙権の概念を結びつけたリッチモンドの民主主義的思想への貢献が、より大きな歴史的評価を受けるべきだと主張しているとみられる。", "summary_en": "This opinion piece examines the largely forgotten historical figure of Charles Lennox, the Third Duke of Richmond, exploring his political significance in 18th-century Britain. The author traces Richmond's early career, including his role as British ambassador to Versailles in 1765 and his ongoing feud with King George III. The piece appears to argue that Richmond's contributions to democratic thought, potentially linking the American Revolution to the concept of universal suffrage, deserve greater historical recognition.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/onpoint/how-the-american-revolution-helped-reshape-britain-by-danielle-allen-2026-07", "state_media": false, "category": "オピニオン", "full_text": "OnPoint Subscriber Exclusive\nLonger Reads provide in-depth analysis of the ideas and forces shaping politics, economics, international affairs, and more.\nFrom the American Revolution to Universal Suffrage\nCAMBRIDGE—October 1765 found 30-year-old Charles Lennox, the Third Duke of Richmond, serving as Britain’s ambassador to the Court of Versailles. Largely unknown to contemporary scholars, Richmond was already five years into a bitter feud with King George III and in his first major post, though one beneath his abilities and ambitions.", "translation_ja": "ケンブリッジ発――1765年10月、30歳のチャールズ・レノックス、第三代リッチモンド公爵は、ヴェルサイユ宮廷への英国大使を務めていた。現代の学者にはほとんど知られていないリッチモンドは、すでにジョージ三世との激しい確執に5年間身を置いており、自身の能力と野心に見合わない最初の主要な職に就いていた。", "vocab": [{"word": "feud", "definition": "長期にわたる激しい対立や確執を意味する名詞・動詞。特に個人間や家族間の根深い争いを指す。"}, {"word": "ambassador", "definition": "外交上の最高位の使節である「大使」を指す名詞。特定の国や国際機関に派遣される国家の正式代表者。"}, {"word": "in-depth", "definition": "「徹底的な」「詳細な」を意味する形容詞的表現。表面的ではなく、深く掘り下げた分析や調査を形容する際に使われる。"}, {"word": "subscriber", "definition": "雑誌やサービスなどの「購読者」「会員」を指す名詞。定期的に料金を支払ってコンテンツにアクセスする人物を意味する。"}, {"word": "universal suffrage", "definition": "「普通選挙権」を意味する政治用語。性別・財産・身分などに関係なく、すべての成人市民が選挙権を持つ制度を指す。"}]}, {"title_ja": "アメリカ国家資本主義の250年", "title_en": "250 Years of American State Capitalism", "summary_ja": "筆者は、アメリカが自由放任主義資本主義の上に繁栄を築いたという通説は神話に過ぎないと主張する。建国当初から、米国政府は国家的優先事項のために民間企業を誘導・補助・救済してきた混合経済モデルを採用してきた。自由市場を称賛する支配的な言説とは裏腹に、実際の政策立案は常により実用主義的であったと筆者は論じている。", "summary_en": "The author argues that the popular narrative of American laissez-faire capitalism is a myth, contending that the US has operated a hybrid economic model since its founding. From its earliest days, the federal government has actively directed, subsidized, and bailed out private enterprise to serve national priorities. The author suggests that American policymaking has always been more pragmatic than the free-market ideology it publicly champions.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/american-state-capitalism-started-under-george-washington-never-ceased-by-shang-jin-wei-2026-07", "state_media": false, "category": "オピニオン", "full_text": "250 Years of American State Capitalism\nNEW YORK—As the United States marks 250 years since the signing of the Declaration of Independence this summer, there is no better time to reckon with one of the great myths of American economic life: that the country’s prosperity was built on laissez-faire capitalism. From its very founding, the US has had a hybrid model in which the state directs, subsidizes, and occasionally bails out private enterprise in the service of national priorities. While the prevailing narrative has often extolled free markets, policymaking itself has been more pragmatic.", "translation_ja": "アメリカ国家資本主義の250年\n\nニューヨーク発―今夏、米国が独立宣言署名から250周年を迎えるにあたり、アメリカ経済における大いなる神話の一つと向き合うのにこれ以上の機会はない。その神話とは、この国の繁栄が自由放任主義資本主義の上に築かれたというものだ。建国の当初から、米国は国家が民間企業を誘導し、補助金を与え、時に救済するという混合モデルを採用し、国家的優先事項に奉仕してきた。自由市場を称賛する言説が支配的であり続けた一方で、政策立案そのものは常により実用主義的であった。", "vocab": [{"word": "laissez-faire", "definition": "「自由放任主義」を意味するフランス語由来の経済用語。政府が市場に介入せず、経済活動を民間に委ねるという考え方を指す。"}, {"word": "hybrid model", "definition": "「混合モデル」のこと。ここでは国家介入と自由市場の両方の要素を組み合わせた経済体制を指す複合的な概念。"}, {"word": "subsidizes", "definition": "「補助金を与える」という意味の動詞。政府や機関が特定の産業や企業に財政的支援を行うことを指し、経済・政策文書で頻出する。"}, {"word": "prevailing narrative", "definition": "「支配的な言説・通説」という意味の表現。ある時代や社会において広く受け入れられている物語や見解を指す上級表現。"}, {"word": "extolled", "definition": "「称賛した・絶賛した」という意味の動詞extolの過去形。強い賞賛を表す文語的・書き言葉的な表現で、TOEICや論説文でよく使われる。"}, {"word": "pragmatic", "definition": "「実用主義的な・実際的な」という意味の形容詞。理念よりも現実や結果を重視する姿勢を表し、政治・経済論説で頻出する上級語彙。"}, {"word": "reckon with", "definition": "「～と向き合う・～を直視する」という意味の慣用句。困難な現実や問題を真剣に受け止めて対処することを含意する上級イディオム。"}]}, {"title_ja": "建国250年のアメリカ：祝祭ではなく修復が必要な国家", "title_en": "America at 250: A Nation in Need of Repair, Not Celebration", "summary_ja": "コラムニストのジャミル・スミスは、アメリカ建国250周年は祝う理由にならないと主張する。この国は今もなお欠陥を抱え、根本的な修復を必要とする未完の構造物だからだ。彼は最近の最高裁判決——出生地主義的市民権の維持、選挙資金規制の緩和、トランスジェンダーのスポーツ参加禁止の容認——を、民主主義が少しずつ解体されつつある証拠として分析する。真の愛国心とは、都合のよい建国神話に浸ることではなく、市民権・民主主義・公的記憶を守る地味な作業を続けることだとスミスは訴える。", "summary_en": "Columnist Jamil Smith argues that America's 250th anniversary is no cause for celebration, as the country remains a flawed and contested structure still requiring fundamental repair. He analyzes recent Supreme Court rulings—upholding birthright citizenship while loosening campaign finance limits and permitting transgender sports bans—as evidence of a democracy being dismantled piece by piece. Smith contends that true patriotism means doing the unglamorous work of protecting civil rights, democracy, and public memory rather than indulging comfortable national myths.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/03/america-250-celebration-under-repair", "state_media": false, "category": "オピニオン", "full_text": "To call this Saturday the nation’s 250th birthday is to indulge a comfortable fiction. 1776 was a declaration, not a birth certificate – and the founders wrote its claims of human equality while this nation enslaved human beings. A truer account of American freedom runs through 1619 and Juneteenth, when Americans forced the country, at last, to begin making its promises answerable to reality.\nSo I’m not in the mood to celebrate “America 250”, and I’m not alone. The affection is thin this summer: the Pew Research Center found that 69% of Americans were dissatisfied with the country’s direction early this year. That is not ingratitude. Sometimes a sour mood is simply clear vision.\nIn the final days before 4 July, the US supreme court gave the country a diagnosis of itself. It preserved one of the country’s greatest repairs – birthright citizenship under the 14th amendment – while loosening a guardrail against corruption and weakening another promise of equal protection.\nNearly 250 years later, the US is not a finished monument, but a structure still under repair, still contested – and in places being quietly stripped for parts.\nRepair is not nostalgia. It is not a fresh coat of patriotic paint on a crumbling house. Repair is the unglamorous work of keeping a structure standing: protecting democracy and civil rights, building enough homes for people to live with dignity, limiting the power of money, and preserving the public memory that tells a country what it has broken and why.\nStart with what held. The president tried, by executive order, to read the children of undocumented and temporary residents out of the 14th amendment. The court blocked him, six to three – though only five justices joined the chief justice’s full constitutional reasoning. Justice Ketanji Brown Jackson, concurring, called the Reconstruction amendments “an anticaste, antisubordination reset”, not “a mere spot treatment for the dark stain of slavery”.\nThe citizenship clause was not a gift the founders left us; it was a repair, built after Dred Scott, slavery and war to overrule a court that had made blood the measure of belonging. Repair is not merely restoration. It is how we get better. Birthright citizenship is proof that the founding promise did not preserve itself; it had to be rebuilt into the constitution after the country’s own highest court exposed the lie beneath the celebration.\nThe victory did not last the afternoon. Within hours, the president called the ruling “too bad for our Country” and told Congress to “start TODAY” on ending birthright citizenship, insisting no amendment was needed.\nThat is not how the constitution works – ordinary legislation cannot rewrite a constitutional guarantee. But he is reaching for a door a sixth justice left ajar: Brett Kavanaugh wrote that Congress could carve out exceptions by statute. A repair can be upheld in the morning and marked for demolition by nightfall.\nIt can also be undone slowly, by reinterpretation – which is why memory is itself a form of repair. Distortion, not just forgetting, is how an old hierarchy returns in new language. That is the civic work of Bryan Stevenson and the Equal Justice Initiative’s Legacy Sites: memory as infrastructure, not sentiment.\nThe Thomas dissent recast the 14th amendment as a narrow favor to freed slaves – this from the court’s most devoted believer in a “colorblind” constitution. Jackson named the danger: a retelling that pits Black Americans against immigrants, when the people who fought for Reconstruction did no such thing.\nAs it protected citizenship, the court took down a guardrail meant to keep representation from becoming a market. In a case brought by Republican campaign committees, the justices struck decades-old limits on how much a party may spend in direct coordination with its candidates. Those limits stopped donors from buying through the party what they could not buy through the candidate.\nRepair also means seeing people as people. The court upheld state laws barring transgender girls from girls’ sports, and in the West Virginia case it let the category decide without asking whether excluding one child – who socially transitioned in grade school and took puberty blockers before she ever competed – actually served the state’s stated interests. That isn’t equal protection. It’s permission to discriminate.\nRepair is not only constitutional. It is material. Days earlier, Congress passed a rare bipartisan housing bill to make homes easier to build and afford. The president canceled the signing ceremony, calling the bill “a big yawn“ and less urgent than a voting bill that would make registration harder – a restriction he called a “National Emergency”.\nCelebration will not house people, protect voters or repair what power is trying to break. A country can be taken apart slowly, lawfully, one ruling at a time – and the people taking it apart are not vandals but officials: a president who cancels a housing signing by lunchtime, a court tha", "translation_ja": "今週土曜日をこの国の250回目の誕生日と呼ぶことは、心地よい虚構に甘んじることだ。1776年は宣言であって、出生証明書ではない——そして建国の父たちは、この国が人間を奴隷にしていた最中に、人間の平等という主張を書き記した。アメリカの自由のより真実な記録は、1619年とジューンティーンス（奴隷解放記念日）を通じて流れている。その日、アメリカ人たちはこの国に対し、ついに自らの約束を現実に対して責任あるものにするよう強いたのだ。\n\nだから私は「アメリカ250」を祝う気分にはなれない。そして私だけではない。今夏、愛国心の熱は薄い。ピュー・リサーチセンターは、今年初めの時点でアメリカ人の69%が国の方向性に不満を抱いていることを明らかにした。それは感謝知らずではない。時に暗い気分は、単に明晰な視点に過ぎない。\n\n7月4日を前にした最後の数日間、合衆国最高裁はこの国に対して自己診断を下した。最高裁は、この国が成し遂げた最大の修復のひとつ——修正第14条に基づく出生地主義的市民権——を維持する一方で、汚職に対する防護柵を緩め、平等保護のもうひとつの約束を弱めた。\n\n建国から250年近くが経とうとしている今も、アメリカは完成した記念碑ではなく、いまだ修復の途上にある構造物であり、いまだ争われており、そしてある部分では静かに部品を剥ぎ取られつつある。\n\n修復とはノスタルジーではない。朽ちかけた家に愛国心というペンキを塗り直すことでもない。修復とは、構造物を立ち続けさせるための地味な作業だ。民主主義と市民的権利を守り、人々が尊厳をもって暮らせる十分な住宅を建て、金の力を制限し、この国が何を壊し、なぜ壊したかを語る公的記憶を保全することである。\n\nまず何が持ちこたえたかから始めよう。大統領は大統領令によって、不法滞在者や一時滞在者の子どもたちを修正第14条の適用対象から外そうとした。最高裁は6対3でこれを阻止した——ただし、首席裁判官の憲法上の論拠すべてに同意した判事は5人にとどまった。協調意見を書いたケタンジ・ブラウン・ジャクソン判事は、南北戦争後の憲法修正条項を「奴隷制という暗い染みへの局所的な処置」ではなく、「カースト制度と従属に対抗するためのリセット」と呼んだ。\n\n市民権条項は建国の父たちが私たちに残した贈り物ではなかった。それは修復だった。ドレッド・スコット判決と奴隷制と戦争の後に、血統を帰属の尺度にした裁判所を覆すために、憲法に築き上げられたものだ。修復とは単なる復元ではない。それが私たちをより良くする手段なのだ。出生地主義的市民権は、建国の約束がそれ自体では保たれなかった証拠だ。この国自身の最高裁が祝祭の下に潜む嘘を暴いた後、憲法の中に再建されなければならなかったのだ。\n\nその勝利はその日の午後も持ちこたえられなかった。数時間のうちに、大統領はその判決を「わが国にとって残念なことだ」と呼び、議会に「今日から」出生地主義的市民権の廃止に取り掛かるよう求め、修正条項は必要ないと主張した。\n\nそれは憲法の仕組みではない——通常の立法では憲法上の保障を書き換えることはできない。しかし彼は、6人目の判事が開け放したままにした扉に手を伸ばしている。ブレット・カバノー判事は、議会が法律によって例外を設けることができると書いた。修復は午前中に支持され、日暮れには取り壊しの印をつけられることもある。\n\n再解釈によってゆっくりと覆されることもある——だからこそ記憶それ自体が修復の一形態なのだ。忘却だけでなく、歪曲こそが古い階層秩序を新しい言葉で蘇らせる手段だ。それが、ブライアン・スティーブンソンとイコール・ジャスティス・イニシアチブの「レガシー・サイト」の市民的役割だ。記憶を感傷としてではなく、インフラとして捉えることである。\n\nトーマス判事の反対意見は、修正第14条を解放された奴隷への狭い恩恵として再解釈した——これは「色盲」の憲法観の最も熱心な信奉者である判事の口から出た言葉だ。ジャクソン判事はその危険性を指摘した。再建時代のために戦った人々はそうしなかったのに、黒人アメリカ人と移民を対立させるような語り直しだと。\n\n最高裁が市民権を守る一方で、代表制が市場になるのを防ぐための防護柵を取り除いた。共和党の選挙委員会が起こした訴訟において、判事たちは、党が候補者と直接協調して支出できる金額に対する数十年来の制限を撤廃した。それらの制限は、候補者を通じては買えないものを党を通じて買うことをドナーに禁じていたのだ。\n\n修復とはまた、人々を人として見ることを意味する。最高裁はトランスジェンダーの少女を女子スポーツから締め出す州法を支持したが、ウェストバージニア州の訴訟では、小学生の頃に社会的に性別移行し、競技に参加するよりも前に思春期抑制剤を使用していたその一人の子ども——を排除することが州の主張する目的に実際に沿っているかどうかを問うことなく、カテゴリーだけで判断した。それは平等保護ではない。差別を許可することだ。\n\n修復は憲法上のことだけではない。それは物質的なことでもある。数日前、議会は超党派の住宅法案を可決し、住宅の建設と入手を容易にしようとした。大統領はその署名式典をキャンセルし、同法案を「大したヤウン（あくび）だ」と呼び、有権者登録をより困難にする投票法案——彼が「国家緊急事態」と呼ぶ規制——より緊急性が低いと述べた。\n\n祝祭は人々を住まわせず、有権者を守らず、権力が壊そうとしているものを修復しない。一国は、一度の判決ごとに、ゆっくりと、合法的に解体されうる——そしてそれを解体している人々は破壊者ではなく公職者だ。昼食時に住宅の署名式を取り消す大統領、そして……", "vocab": [{"word": "birthright citizenship", "definition": "出生地主義的市民権。ある国の領土内で生まれた者に自動的に市民権を付与する原則を指す法律用語。アメリカでは修正第14条に規定されている。"}, {"word": "guardrail", "definition": "本来は道路の安全柵を意味するが、ここでは比喩的に「制度的な歯止め・防護柵」を指す。政治的・法的な濫用を防ぐための規制や規則のことを表す。"}, {"word": "antisubordination", "definition": "「反従属」を意味する法律・憲法学上の概念で、特定のグループが社会的・政治的に劣位に置かれることに反対する原則を指す。"}, {"word": "concurring", "definition": "法律用語で「協調意見の」を意味し、裁判官が結論には同意するものの異なる理由付けを示す際に用いる。名詞形は「concurrence（協調意見）」。"}, {"word": "ingratitude", "definition": "「感謝知らず」「恩知らず」を意味する名詞。受けた恩恵や好意に対して感謝の念を示さないことを指す。"}, {"word": "reinterpretation", "definition": "「再解釈」を意味し、既存の法律・文書・概念を異なる観点や意図から読み直すこと。ここでは憲法条項の意味を変質させる手段として用いられている。"}, {"word": "bipartisan", "definition": "「超党派の」を意味する形容詞で、対立する二つの政党が協力して何かを推進・支持する状況を指す政治用語。"}]}, {"title_ja": "トランプに利益相反はない――なぜなら彼の関心事はただ一つ、自分自身だから", "title_en": "Trump Has No Conflicts of Interest — Because He Has Only One Interest: Himself", "summary_ja": "元労働長官のロバート・ライクは、トランプが暗号資産事業、市場を意識したタイミングでの株取引、外国との商取引を通じて在職中に10億ドル以上の個人的富を蓄積したと主張する。ライクはこれを単なる利益相反ではなく大規模な腐敗だと断じ、トランプの政策が自身の金融資産に直接利益をもたらしていると指摘する。再選も将来の選挙も関係なく、自らの遺産にも無頓着なトランプには、大統領職を最大限に私物化する動機しかないと結論づけている。", "summary_en": "Former Labor Secretary Robert Reich argues that Trump has used his presidency to amass over $1 billion in personal wealth through crypto ventures, market-timed stock trades, and foreign business deals. Reich contends this constitutes large-scale corruption, not merely conflicts of interest, as Trump's policies directly benefit his own financial holdings. He concludes that Trump, as a self-described malignant narcissist unconcerned with legacy or future elections, has every incentive to exploit the presidency for maximum personal gain.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/02/trump-crypto-conflict-of-interest", "state_media": false, "category": "オピニオン", "full_text": "In financial disclosures released on Tuesday, Trump reported earning more than $1bn last year from his several cryptocurrency ventures.\nAll told – including other parts of his vast holdings, such as his real estate assets – Trump made at least $2.2bn last year, as opposed to the roughly $622m his businesses raked in in 2024, before he returned to the presidency.\nIn other words, it’s a fair guess that last year he made more than $1bn off his presidency.\nWe’re talking big money and big looting.\nFor example, Trump embraced crypto as a candidate in 2024. Then he and his family invested like mad in it – through CIC Digital, a Trump Organization affiliate that is behind his memecoin, $Trump, and through another Trump family-backed crypto company, World Liberty Financial, co-founded by Trump, his sons and the family of the special envoy Steve Witkoff in the middle of the 2024 presidential campaign (but which the White House says Trump has divested from). World Liberty is now behind several prominent crypto tokens.\nThe problem here is more than potential conflicts of interest, more than the mere appearance of conflicts of interest.\nSince taking office, Trump has installed friendly regulators to oversee digital assets, and he’s pushed for landmark crypto legislation that would further free crypto from being treated as a security (in which case all sorts of disclosures would have to be made about it).\nAnd this is just crypto. His investment accounts made more than 20,000 trades last year – and many appear to be timed to take maximum advantage of his public announcements that moved markets.\nJust one day before he announced a 90-day pause on his sweeping tariffs, for example, his investment accounts made 327 individual stock purchases, each valued as much as $250,000. It was one of the largest single-day buys disclosed in Monday’s financial disclosures. The following day, when Trump announced the pause, the S&P soared nearly 10% – one of the biggest single-day gains in the index’s history.\nHe’s made a bundle from real estate deals that foreign governments have been eager to strike with him and his family, presumably because he’s given them – or will give them – something in return. Entities from the Middle East paid about $300m to Trump’s businesses last year, more than any other foreign region identifiable in his financial disclosures.\nOn Wednesday, he traveled to North Dakota on the maiden flight of the new Air Force One, a $400m jet gifted to him by the Qatari royal family whose ownership will transfer to Trump when he leaves office (technically, it will go to Trump’s own presidential library foundation, but there’s nothing stopping him from using it for private purposes).\nThis is called corruption, folks. And it’s on a massive scale.\nA White House spokesperson says neither Trump nor his family “has ever engaged – or will ever engage – in conflicts of interest”.\nOh please. Next we’ll be told Trump never tells a lie, either.\nThese deals make it impossible for the public to judge whether Trump is working for America or for himself when he advocates for or implements a particular policy, such as his crypto policy or his moves in the Middle East.\nWe don’t even know for sure that Trump has disclosed all his investments. How can anyone be certain Trump has ever come clean about anything?\nBut perhaps the most troubling thing about all this is Trump doesn’t give a shite.\nIn his first term, when asked about conflicts of interest, he said: “The president can’t have a conflict of interest … because everything a president does in some ways is like a conflict of interest.”\nHe’s also said Americans “don’t care at all” about his unreleased tax returns or his personal finances.\nNow, in his second term, he has nothing to lose by making as much money as possible off his presidency.\nHe probably figures he’s survived two impeachments so far, and won’t be impeached for pesky conflicts of interest. He won’t be running for the presidency again, so he doesn’t have to worry that his self-dealing will be used against him in a future campaign. Why not rake in as much as he can?\nAs to his legacy, Trump isn’t worried, either. He probably believes he can create his own history. That’s what he’s tried to do for the 2020 election and the subsequent attack on the Capitol on 6 January 2021. That’s what his “Presidential Walk of Fame” in the White House is all about – framed portraits of all US presidents accompanied by Trump’s own partisan, gold-lettered plaques, many written by Trump himself.\nIn other words, we’re dealing with a malignant narcissist who thinks only about his own wealth and power, and about vengeance against those who have tried to stop him from acquiring even more.\nHow can we possibly expect that he’s working for the people of the United States rather than for himself?\nTrump doesn’t have any conflicts of interest. That’s because he really has only one interest: himself.\n- \n  Robert Reich, a former US secretary of labor, is a profes", "translation_ja": "火曜日に公開された財務開示書によると、トランプは昨年、複数の暗号資産事業から10億ドル以上を稼いだと申告している。\n\n不動産資産などその他の広大な資産を含めると、トランプは昨年少なくとも22億ドルを手にしたことになる。これは、大統領に返り咲く前の2024年に事業が稼いだ約6億2200万ドルとは対照的だ。\n\n言い換えれば、昨年彼は大統領職から10億ドル以上を稼いだと推測するのは妥当なことだ。\n\nこれは大きな金額であり、大規模な略奪だ。\n\n例えば、トランプは2024年の選挙候補者として暗号資産を支持した。そして彼と家族は、メームコイン「$Trump」の背後にあるトランプ・オーガニゼーションの関連会社CICデジタルを通じて、また2024年大統領選キャンペーン中にトランプ、息子たち、特別使節スティーブ・ウィトコフの家族が共同設立したトランプ家支援の別の暗号資産会社「ワールド・リバティ・ファイナンシャル」を通じて（ホワイトハウスはトランプが同社から撤退したと主張しているが）、猛烈に投資した。ワールド・リバティは現在、複数の著名な暗号資産トークンを手掛けている。\n\nここでの問題は、潜在的な利益相反よりも深刻であり、利益相反のように見えるという外観の問題よりもはるかに重大だ。\n\n就任以来、トランプはデジタル資産を監督する友好的な規制当局を据え置き、暗号資産が有価証券として扱われることからさらに自由にする画期的な暗号資産法制を推し進めてきた（有価証券として扱われれば、あらゆる種類の開示が求められることになる）。\n\nそしてこれは暗号資産に関することだけだ。彼の投資口座は昨年2万件以上の取引を行っており、その多くは市場を動かした公式発表を最大限に利用するタイミングで行われたように見える。\n\n例えば、広範な関税を90日間停止すると発表する前日、彼の投資口座はそれぞれ最大25万ドル相当の個人株327件を購入した。これは月曜日の財務開示書で明らかになった最大級の一日取引の一つだった。翌日、トランプが停止を発表すると、S&P500は約10％急騰し、同指数の歴史上最大級の一日上昇率を記録した。\n\n彼は、外国政府が熱心に結ぼうとしている不動産取引からも大金を稼いでいる。おそらくトランプが彼らに何かを与えたか、与えるからだろう。中東からの組織・企業は昨年、トランプの事業に約3億ドルを支払っており、財務開示書で特定できる外国地域の中で最多だ。\n\n水曜日、彼はカタール王家から贈られた4億ドルの新型エアフォースワンの就航初便でノースダコタ州へ飛んだ。この航空機の所有権はトランプが大統領を退任した際に彼に移転する（正確にはトランプ自身の大統領図書館財団に帰属するが、私的目的での使用を妨げるものは何もない）。\n\nこれは腐敗と呼ばれるものだ、皆さん。しかも大規模な腐敗だ。\n\nホワイトハウスの報道官は、トランプもその家族も「利益相反に関与したことはなく、今後も決して関与しない」と述べている。\n\nお断りしたい。次には、トランプは嘘をついたことがないとでも言われるのだろう。\n\nこれらの取引によって、トランプが暗号資産政策や中東での動きのような特定の政策を提唱・実施する際に、アメリカのために働いているのか、自分自身のために働いているのかを国民が判断することは不可能になっている。\n\nトランプが自分のすべての投資を開示したかどうかさえ確かめることができない。トランプが何かについて本当のことを言ったと、誰がどうやって確信できるだろうか？\n\nしかし、これらすべてにおいて最も憂慮すべきことは、トランプがまったく気にしていないということかもしれない。\n\n第一期政権時、利益相反について問われた際、彼はこう言った。「大統領は利益相反を持つことができない……なぜなら大統領がすることはすべて、ある意味で利益相反のようなものだからだ。」\n\n彼はまた、アメリカ人は彼の未公開の納税申告書や個人財産について「まったく気にしない」とも述べている。\n\n今、第二期政権において、彼は大統領職からできる限りの金を稼ぐことで失うものは何もない。\n\n彼はおそらく、これまで二度の弾劾を乗り越えてきたのだから、些細な利益相反で弾劾されることはないと考えているのだろう。再び大統領選に出馬することはないので、自己利益追求が将来の選挙戦で不利に使われる心配もない。できる限り稼いでしまえばいいではないか？\n\n遺産についても、トランプは心配していない。彼はおそらく自分で歴史を作ることができると信じている。それが2020年大統領選挙とその後の2021年1月6日の議会議事堂襲撃に対して彼が試みてきたことだ。それがホワイトハウスの「大統領の殿堂」の意味するところでもある——全米大統領の額入り肖像と、トランプ自身が書いたものも多いトランプの党派的な金文字のプレートが並ぶ展示だ。\n\n言い換えれば、私たちが相手にしているのは、自身の富と権力のことしか考えず、それをさらに増やそうとするのを阻止しようとした者への復讐だけを考えている、悪性のナルシストだ。\n\n彼がアメリカ国民のためではなく、自分自身のために働いていると、どうして期待できようか？\n\nトランプには利益相反がない。なぜなら、彼には本当にただ一つの関心事しかないからだ。それは自分自身だ。\n\n――ロバート・ライク、元米国労働長官、教授", "vocab": [{"word": "malignant narcissist", "definition": "悪性のナルシスト。自己愛が病的に強く、他者への共感を欠き、権力や支配を求める傾向を持つ人物を指す心理学・政治分析の用語。"}, {"word": "looting", "definition": "略奪。本来は戦時や災害時の略奪行為を指すが、ここでは権力者が公職を私利私欲のために利用して富を不当に奪い取る行為を比喩的に表している。"}, {"word": "memecoin", "definition": "ミームコイン。インターネットのミームやジョークを基にした暗号資産の一種で、実用的な技術基盤よりも話題性や投機目的で流通することが多い。"}, {"word": "divested", "definition": "（資産を）売却・処分した。利益相反を避けるために保有する株式や事業権益などを手放すことを指し、特に公職者の倫理規定の文脈で用いられる。"}, {"word": "self-dealing", "definition": "自己取引・私腹を肥やす行為。公職者や受託者が個人的な利益のために権限を行使したり、公的立場を利用して自分に有利な取引を行うことを指す。"}, {"word": "partisan", "definition": "党派的な。特定の政党や思想に偏った立場をとることを指し、客観性や中立性を欠いた見方や行動を批判的に表す際に用いられる形容詞。"}, {"word": "disclosures", "definition": "開示（書）。法律や規制によって義務付けられた情報の公開を指し、特に政治家や公務員が財産・投資状況を申告する財務開示書の文脈で使われる。"}]}, {"title_ja": "トランプ氏、思わぬ気候変動の英雄に？ 二つの並行するクライメート物語", "title_en": "Trump as Accidental Climate Hero: A Tale of Two Parallel Climate Stories", "summary_ja": "筆者は、現在世界で二つの気候変動ナラティブが同時進行していると主張する。一つは、人為的な気候変動が引き起こす記録的な熱波による死者増加という恐怖の物語であり、もう一つは再生可能エネルギーの急速な普及という希望の物語だ。皮肉にも、トランプ大統領のホルムズ海峡封鎖などの外交的失策が、化石燃料依存からの脱却を加速させるきっかけとなっている。太陽光・風力・蓄電池のコストが大幅に低下し、再生可能エネルギーは世界で最も安価で拡張性の高いエネルギー源として台頭しつつある。", "summary_en": "The author argues that two parallel climate narratives are unfolding globally: a horror story of record-breaking deadly heatwaves across Europe and beyond driven by human-made climate change, and an unlikely feelgood story of accelerating renewable energy adoption. Ironically, Donald Trump's foreign policy blunders—including a blockade of the Strait of Hormuz—have inadvertently accelerated the shift toward clean energy independence. The piece presents data showing solar, wind, and battery storage are growing at historic rates, positioning renewables as the cheapest and most scalable energy solution worldwide.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/environment/2026/jul/03/donald-trump-strait-of-hormuz-climate-crisis-europe-heatwave", "state_media": false, "category": "オピニオン", "full_text": "Two real-life climate-themed movies are playing in parallel across the globe. They are about the world today, but they are also a snapshot of the future. The first is a slow-building horror story; the second, a feelgood summer hit. Both are worth watching.\nHorror films are suddenly box-office gold, so let’s start there. The World Health Organisation says the extreme, record-breaking heatwave blanketing Europe has killed more than 1,300 people. But everyone knows that number will end up a dramatic understatement.\nIn the summer of 2022, the final estimate of heat-related deaths on the continent was more than 60,000. The past 10 days have been significantly hotter. As the Guardian’s Damian Carrington reported, scientists from the World Weather Attribution consortium found nearly half Europe’s 850 biggest cities have been enduring their worst heat stress in recorded history. Temperatures have consistently been 5C and 12C above seasonal averages.\nThe horrific destruction caused by twin earthquakes in Venezuela has rightly drawn international attention and assistance as the confirmed death toll has climbed past 1,900 and could top 10,000. The heatwave is a completely different kind of disaster. It is less abrupt, less violent and less visible. There is no call for an international fleet of thousands of rescuers to help, as there has been in Caracas. But the number of lives lost may be greater.\nThe heatwave has also disrupted life for countless others. It ruptured the surface of Germany’s Autobahn, forcing lane closures. It buckled t
