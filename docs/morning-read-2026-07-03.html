rain lines, degraded power lines, crippled medical equipment and forced the closure of nuclear plants due to regulations limiting the use of rivers to cool reactors if temperatures get too high.\nScientists found daytime temperatures in recent days would have been impossible in the European heatwave of 1976, and 10 times less likely when temperatures soared in 2003. It has taken the underlying increase in global temperatures – caused by rising atmospheric greenhouse gases – for it to happen now. It’s the exacerbating role of human-made climate change in action.\nThere are versions of this across the globe, including in Australia, where the early signs suggest the southern continent may be headed for its warmest winter on record. The first month of its ski season relied almost entirely on artificial snow. It is a fraction of what the best evidence says the future could hold. With the recently declared El Niño weather pattern over the Pacific Ocean, that future could feel like it is accelerating in the months ahead.\nThe feelgood movie is a better place to be. It may have a surprise accidental hero: Donald J Trump.\nHis inept attack on Iran alongside Israel, and the resulting blockade in the strait of Hormuz of about 20% of the world’s oil and gas supply, has triggered fresh consideration of how countries can win independence from the global fossil fuel trade. In the short term, there are examples of decisions that have bolstered the use of dirty fuels. But attention is also on how to ramp up clean energy and electrification in the name of energy security and lowering costs.\nThis move was already under way. For the first time, renewable energy – solar, wind and hydro – last year overtook coal-fired power as the leading source of electricity, providing a third of the global total. Add nuclear – not renewable, but zero emissions – and the total non-fossil generation was 42%.\nSolar energy is expanding at an astonishing pace. It grew 30% in 2025 – the single largest annual increase of any electricity source in history. Battery storage – not an electricity source in its own right, but needed as part of a package with variable solar and wind – grew 66% from a lower base.\nThe reasons for the solar surge aren’t complicated. It’s comparatively cheap, increasingly consumer-friendly, and not reliant on fuel that has to be shipped from somewhere else. In a recent speech, the UN secretary general, Antonio Guterres, noted the cost of solar and batteries had fallen 90% and 95% respectively over the past 15 years, while wind energy costs were down 70%. He argued they presented the world with a “clean way out” of its energy crisis, summarising: “Renewables are the cheapest, fastest and most scalable source of new electricity in most of the world.”\nIn Pakistan, one of the world’s top 20 emitting nations, solar capacity has increased more than tenfold in four years as gas power turned unreliable and grid electricity became wildly expensive. Solar electricity last year topped 25% of the country’s electricity, prompting the government to cancel liquified natural gas (LNG) imports scheduled for this financial year.\nIn the EU, solar and wind provided about 30% of electricity in 2025, up from 19% in 2021. The last fossil fuel price shock, after Russia attacked Ukraine in 2022, played a part in the switch. According to the thinktank Ember, solar in the EU has recorded annual growth of about 20% for four years straig", "translation_ja": "世界では現在、気候をテーマにした二本の実写映画が並行して上映されている。どちらも現代の世界を描いているが、同時に未来のスナップショットでもある。一本目はじわじわと恐怖が高まるホラー映画、二本目は夏の大ヒット・ハートウォーミング作品だ。どちらも見る価値がある。\n\nホラー映画は今や興行収入の稼ぎ頭だから、まずそちらから始めよう。世界保健機関（WHO）によると、ヨーロッパを覆う記録的な猛暑熱波はすでに1,300人以上の死者を出している。しかし誰もが、その数字は最終的には大幅な過小評価になると知っている。\n\n2022年夏の最終推計では、欧州における熱中症関連死は6万人を超えた。ここ10日間の気温はその時よりも著しく高かった。ガーディアン紙のダミアン・カリントンが報じたように、ワールド・ウェザー・アトリビューション・コンソーシアムの科学者たちは、欧州の主要850都市のほぼ半数が観測史上最悪の熱ストレスにさらされていることを明らかにした。気温は季節平均を5度から12度も上回り続けている。\n\nベネズエラで起きた二度の大地震による壊滅的な被害は、確認された死者数が1,900人を超えて1万人に達する可能性もあり、国際社会の注目と支援を正当に集めている。一方、熱波はまったく異なる種類の災害だ。より緩慢で、より暴力的ではなく、より目に見えにくい。カラカスのような数千人規模の国際救助隊の出動要請もない。しかし失われる命の数はそれを上回るかもしれない。\n\n熱波はまた、無数の人々の生活を混乱させた。ドイツのアウトバーンの路面を陥没させ、車線閉鎖を余儀なくした。鉄道線路をゆがめ、送電線を劣化させ、医療機器を機能不全にし、原子炉冷却に使う河川の水温が高くなりすぎた場合の規制により原子力発電所の閉鎖も強いた。\n\n科学者たちは、ここ数日の昼間の気温は1976年の欧州熱波では起こり得ず、2003年の猛暑時と比べても10分の1以下の確率だったと明らかにした。今これが起きているのは、大気中の温室効果ガス濃度上昇によって引き起こされた地球全体の気温上昇という下地があるからだ。これこそが人為的気候変動の悪化作用が実際に働いている姿だ。\n\nこのような現象は世界各地で起きている。オーストラリアでも同様で、初期の兆候は南半球のこの大陸が観測史上最も暖かい冬に向かっている可能性を示している。スキーシーズンの最初の1ヶ月はほぼ全面的に人工雪に頼った。これは最良の科学的根拠が示す将来像のほんの一端にすぎない。太平洋上で最近宣言されたエルニーニョ現象により、その未来は今後数ヶ月でさらに加速するように感じられるかもしれない。\n\nハートウォーミングな映画の方が居心地はいい。そこには思わぬ偶然の英雄がいるかもしれない。ドナルド・J・トランプ氏だ。\n\n彼がイスラエルと共にイランへ仕掛けた不手際な攻撃と、その結果生じたホルムズ海峡での世界の石油・ガス供給の約20%に及ぶ封鎖は、各国が世界の化石燃料取引からいかに独立できるかという問いを新たに呼び起こした。短期的には、汚れた燃料の使用を後押しするような決定の例もある。しかし同時に、エネルギー安全保障の観点とコスト削減のために、クリーンエネルギーと電化をいかに加速させるかにも注目が集まっている。\n\nこの動きはすでに始まっていた。昨年初めて、再生可能エネルギー——太陽光、風力、水力——が石炭火力発電を抜いて最大の電力源となり、世界総発電量の3分の1を供給した。排出量ゼロだが再生可能ではない原子力を加えると、非化石燃料による発電合計は42%に達する。\n\n太陽光エネルギーは驚異的なペースで拡大している。2025年には30%成長を遂げ、これは電力源として史上最大の年間増加率だ。単体では電力源とはならないが、変動する太陽光や風力とセットで必要な蓄電池も、より低い水準からではあるが66%の成長を記録した。\n\n太陽光の急増の理由は複雑ではない。比較的安価で、消費者にとって使いやすく、どこかから輸送してくる燃料に依存しない。最近の演説で、アントニオ・グテーレス国連事務総長は、過去15年間で太陽光と蓄電池のコストがそれぞれ90%と95%低下し、風力エネルギーのコストも70%下がったと指摘した。そして、それらがエネルギー危機からの「クリーンな出口」をもたらすと主張し、こう総括した。「再生可能エネルギーは、世界の大半において新規電力の中で最も安価で、最速で、最もスケーラブルな供給源だ。」\n\n世界20大排出国の一つであるパキスタンでは、ガス発電が不安定になり系統電力のコストが高騰する中、太陽光発電容量が4年間で10倍以上に増加した。昨年、太陽光発電は同国の電力の25%以上を供給し、政府は今会計年度に予定していた液化天然ガス（LNG）輸入をキャンセルするに至った。\n\nEUでは、2025年に太陽光と風力が電力の約30%を供給し、2021年の19%から増加した。2022年にロシアがウクライナを攻撃した後の前回の化石燃料価格ショックも、この転換に一役買った。シンクタンクのEmberによると、EUにおける太陽光発電は4年連続で年間約20%の成長を記録し続けている。", "vocab": [{"word": "exacerbating", "definition": "（問題や状況を）悪化させる、さらに深刻にするという意味の形容詞・動詞。「exacerbate」の現在分詞形で、気候変動などが既存の問題をより深刻にする文脈でよく使われる。"}, {"word": "inept", "definition": "不器用な、無能な、的外れなという意味の形容詞。特に、何かをうまく処理できない人や行動を批判的に表現する際に使われる。"}, {"word": "blockade", "definition": "封鎖という意味の名詞・動詞。軍事的または政治的に港や海峡などの通行を遮断する行為を指し、国際政治や安全保障の文脈で頻出する。"}, {"word": "scalable", "definition": "規模を拡大・縮小できる、拡張性があるという意味の形容詞。ビジネスやテクノロジーの文脈で、システムや事業が需要に応じて効率的に拡張できる能力を指す。"}, {"word": "consortium", "definition": "コンソーシアム、共同事業体という意味の名詞。共通の目的のために協力する複数の企業・機関・個人の集合体を指し、学術・金融・国際機関の文脈でよく用いられる。"}, {"word": "bolstered", "definition": "強化した、後押しした、支持したという意味の動詞（bolsterの過去形）。何かを支え、強化する行為を表し、政策・経済・軍事など幅広い文脈で使われる。"}, {"word": "thinktank", "definition": "シンクタンクという意味の名詞。政策立案や社会問題の研究・提言を行う専門的な研究機関を指し、政治・経済・環境分野の報道でよく登場する複合語。"}]}, {"title_ja": "トゥキュディデスの誤読：知恵なき力は滅亡を招く", "title_en": "Misreading Thucydides: Strength Without Wisdom Leads to Ruin", "summary_ja": "筆者は、トランプ政権関係者やニーアル・ファーガソンらの論者が、メロス対話を「力による支配」の正当化として引用することで、トゥキュディデスを根本的に誤読していると主張する。『ペロポネソス戦争史』を丁寧に読めば、トゥキュディデスは実際には無制限の野心に対する警告を発していることが分かる。アテナイがメロスを残虐に扱った直後にシチリア遠征で壊滅的敗北を喫したという文脈が示すように、この書の真の教訓は「力は美徳」ではなく「傲慢さは強国自身を滅ぼす」というものだ。", "summary_en": "The author argues that Trump administration officials and commentators like Niall Ferguson have fundamentally misread Thucydides by citing the Melian Dialogue as justification for raw-power realism. A careful reading of The Peloponnesian War shows that Thucydides actually warns against unchecked ambition, as Athens's brutal treatment of Melos directly preceded its catastrophic defeat in Sicily. The true lesson of Thucydides is not that strength is virtuous, but that hubris and arrogance lead powerful states to their own downfall.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/strong-do-what-they-can-and-suffer-what-they-must", "state_media": false, "category": "オピニオン", "full_text": "It seems to many these days that the world is a jungle beholden only to one law. Since returning to office in 2025, U.S. President Donald Trump has not only made a spectacle of American power—by striking alleged drug smugglers in the Caribbean, kidnapping Venezuelan President Nicolás Maduro, bombing Iran, and even threatening the sovereignty of allies—he has also made a principle out of it. Trump described Maduro’s capture as a vindication of the “iron laws that have always determined global power.” In a similar vein, White House Deputy Chief of Staff Stephen Miller asserted in January that the world is “governed by force” and “governed by power” and that “these are the iron laws of the world since the beginning of time.” Observers heard in these blunt statements echoes of Thucydides, the ancient Athenian aristocrat often considered the first proponent of the cold-blooded doctrine of realism. The Peloponnesian War, his magisterial opus on Athens’ doomed decades-long conflict with Sparta in the fifth century BC, includes the famous line, “The strong do what they can and the weak suffer what they must.”\nThat well-known line comes from an important section of the text known as the Melian Dialogue, in which representatives of Athens browbeat emissaries from the island of Melos. After the Athenians fail to persuade the Melians to accept unconditional surrender, they kill all the island’s men and enslave its women and children. Thucydides’s Melos passage has long been cited as proof that little governs the world beyond strength and its exercise—and as evidence that the brilliant Athenian general, historian, and philosopher himself believed that. Generations of students of international relations have been assigned these decontextualized snippets from his vast work and instructed that this was indeed Thucydides’s lesson. Today, a cottage industry of commentators now celebrate (or bemoan) what is described as a Thucydidean turn in American foreign policy. In “How Trump Won Davos,” an essay published in January, the historian Niall Ferguson explicitly invoked the Melian Dialogue to tout the triumph of Trump as a realist in the mode of Thucydides and asserted that, at Melos, “the realists won an emphatic victory.”\nBut that understanding of both the dialogue and its author gets his meaning fundamentally backward. Thucydides repeatedly refers to, but never endorses, the idea that the strong have the freedom to do what they want: to the contrary, a careful reading of The Peloponnesian War suggests a rather different view. Among the principal lessons to learn from Thucydides is that the ambition of the strong can lead to their own undoing. Right after Thucydides reports the fateful words of the Athenian envoys and the subsequent destruction of Melos, he describes at great length the disastrous campaign Athens pursued in Sicily—an effort that eventually led to Athenian defeat and Spartan victory. In this light, the Melian Dialogue is not proof of the great virtue of strength in international relations but an illustration of pride before the fall.\nThe political scientist Graham Allison famously coined the term “Thucydides trap” to refer to the dynamic inherent in The Peloponnesian War, of how the tensions between a rising power and an existing power will invariably bubble over into conflict. The real Thucydides trap, however, is different. The crucial lesson of the book is not to sketch how Athens and Sparta found themselves sleepwalking into a war that neither side wanted or understood. As Thucydides elaborately elucidates, both went into the conflict with eyes wide open. Moreover, in his view, the start of that war was hardly a trap. Thucydides supported the commencement of hostilities and the careful strategy of Pericles, the Athenian leader who rallied the public behind his demand for war with Sparta. The true catastrophe, and the real trap, occurred many years later, when Athens abandoned Pericles’s prudence and became recklessly ambitious, most grimly demonstrated by the misguided bid to conquer Sicily.\nThe central tragedy of The Peloponnesian War is the story of growing Athenian arrogance and hubris and its fateful consequences. Modern-day Athenians, trumpeting the virtue of strength, would do well to heed Thucydides’s warnings if they don’t want to court their own disasters.\nTRUTH IN THE TALE\nThe Melian Dialogue indeed offers vital lessons, but only if it is understood in the context of The Peloponnesian War as the book was written. That requires familiarity not with a few selected sentences but with the content of the entire work—and with Thucydides’s brilliant, precise, and overarching method. In his estimation, the 27-year conflict (431–404 BC) between Athens and Sparta unfolded in three distinct phases: an initial ten years of direct conflict, an uneasy seven-year interregnum of constant skirmishes and jockeying for position, and then another ten years of war before Athens’s unconditional surrender. Thucydides ", "translation_ja": "今日、世界はただ一つの法則にのみ支配されるジャングルであると感じている人々は多い。2025年に返り咲いたドナルド・トランプ米大統領は、カリブ海で麻薬密輸業者とされる者たちを攻撃し、ベネズエラのニコラス・マドゥロ大統領を拉致し、イランを爆撃し、さらには同盟国の主権さえ脅かすなど、アメリカの力を誇示してきただけでなく、その力そのものを原則にまで高めてしまった。トランプはマドゥロ拘束を「世界の力を古来より決定してきた鉄則」の正当性の証明と表現した。同様に、ホワイトハウスのスティーブン・ミラー大統領次席補佐官も1月、世界は「力によって統治され」「権力によって統治される」のであり、「これらは太古の昔から続く世界の鉄則だ」と主張した。観察者たちは、こうした率直な発言の中に、冷徹なリアリズム理論の最初の提唱者とよく称される古代アテナイの貴族、トゥキュディデスの残響を聞き取った。彼の畢生の大作『ペロポネソス戦争史』は、紀元前5世紀におけるアテナイとスパルタとの運命的な数十年にわたる紛争を扱ったものであり、「強者はできることをし、弱者は甘受しなければならないことを甘受する」という有名な一節を含んでいる。\n\nこの名高い一節は、「メロス対話」として知られる重要な箇所に登場する。アテナイの使者がミロス島の代表者たちを恫喝する場面だ。アテナイ人が無条件降伏を受け入れるようメロス人を説得することに失敗した後、島の男性を全員殺害し、女性と子供を奴隷にする。トゥキュディデスのメロスの描写は長らく、世界を支配するのは力とその行使以外の何物でもないという証拠として引用されてきた。また、才気あふれるアテナイの将軍・歴史家・哲学者であるトゥキュディデス自身がそう信じていたことの証左としても用いられてきた。国際関係論を学ぶ幾世代もの学生が、彼の膨大な著作から文脈を切り離した断片を読まされ、それがトゥキュディデスの教訓であると教え込まれてきた。今日では、アメリカ外交政策における「トゥキュディデス的転換」と呼ばれるものを称える（あるいは嘆く）論者の一大産業が生まれている。1月に発表されたエッセイ「トランプはダボスをいかに制したか」の中で、歴史家のニーアル・ファーガソンはメロス対話を明示的に引用し、トゥキュディデス流のリアリストとしてのトランプの勝利を称え、メロスにおいて「リアリストが圧倒的勝利を収めた」と断言した。\n\nしかし、対話とその著者に関するこうした理解は、彼の真意を根本的に逆転させるものだ。トゥキュディデスは、強者が望むことを何でもできる自由を持つという考えを繰り返し言及しているが、決してそれを支持してはいない。それどころか、『ペロポネソス戦争史』を丁寧に読めば、全く異なる見解が浮かび上がってくる。トゥキュディデスから学べる主要な教訓の一つは、強者の野心が自らの破滅につながりうるということだ。トゥキュディデスがアテナイ使節の運命的な言葉とその後のメロス破壊を記した直後、彼はアテナイがシチリアで展開した悲惨な遠征を詳述している——この遠征がやがてアテナイの敗北とスパルタの勝利につながることになる。この文脈に照らせば、メロス対話は国際関係における力の偉大な美徳の証明ではなく、「驕り高ぶりの後に訪れる没落」の図解に他ならない。\n\n政治学者グレアム・アリソンは、「トゥキュディデスの罠」という用語を作り、『ペロポネソス戦争史』に内在するダイナミクス——台頭する勢力と既存の勢力の間の緊張が必然的に衝突に発展するという動態——を指す言葉として広めた。しかし、本当の「トゥキュディデスの罠」は異なる。この書の肝心な教訓は、アテナイとスパルタが互いに望みもせず理解もしない戦争へとなし崩し的に突入していく様を描くことではない。トゥキュディデスが詳細に明らかにしているように、双方とも目を大きく見開いたまま紛争に突入していった。しかも彼の見方では、戦争の開始は「罠」などでは全くなかった。トゥキュディデスは戦闘の開始と、スパルタとの開戦を求めて世論を結集させたアテナイの指導者ペリクレスの慎重な戦略を支持していた。真の大惨事、そして真の「罠」が訪れたのは数年後——アテナイがペリクレスの慎慮を捨て、無謀な野心に駆られた時であり、その最も悲惨な表れがシチリア征服という誤った企てだった。\n\n『ペロポネソス戦争史』の中心的悲劇は、アテナイの増大する傲慢さと驕りの物語であり、その運命的な結末の物語だ。力の美徳を声高に叫ぶ現代のアテナイ人たちは、自らの破滅を招きたくなければ、トゥキュディデスの警告に真剣に耳を傾けるべきだろう。\n\n■物語の中の真実\n\nメロス対話は確かに重要な教訓を提供している——しかしそれは、書かれた作品としての『ペロポネソス戦争史』という文脈の中でこそ理解される場合に限られる。そのためには、断片的に選び出された数文ではなく、作品全体の内容と、トゥキュディデスの卓越した、精緻かつ包括的な方法論に通じていることが必要だ。彼の見立てでは、アテナイとスパルタの27年にわたる紛争（紀元前431～404年）は三つの明確な段階で展開した。最初の10年間の直接対決、絶え間ない小競り合いと主導権争いが続いた不安定な7年間の中間期、そしてアテナイの無条件降伏に終わる再びの10年間の戦争である。", "vocab": [{"word": "browbeat", "definition": "脅したり威圧したりして相手を屈服させること。「browbeat emissaries」で「使節を恫喝する」の意。強い圧力をかけて従わせる行為を指す。"}, {"word": "decontextualized", "definition": "本来の文脈や背景から切り離された状態を指す形容詞。「decontextualized snippets」で「文脈を無視した断片」を意味し、学術・評論文でよく使われる。"}, {"word": "interregnum", "definition": "二つの統治や段階の間の空白期間・中間期を指すラテン語由来の名詞。政治・歴史文脈で「移行期」や「空位期間」として用いられる上級語彙。"}, {"word": "hubris", "definition": "ギリシャ語由来で、過度な傲慢さや自己過信を指す名詞。特に権力者が分をわきまえない高慢さを示す場合に使われ、しばしば没落の前兆として描かれる。"}, {"word": "elucidate", "definition": "複雑な事柄をわかりやすく説明・解明することを意味する動詞。「elaborately elucidates」で「詳細に解き明かす」の意となり、学術文書で頻出する上級表現。"}, {"word": "prudence", "definition": "慎重さ、思慮深さを意味する名詞。特に政治・外交の文脈で「先を見通した判断力」や「分別ある行動」を指す。「Pericles's prudence」でペリクレスの慎慮を表す。"}, {"word": "magisterial", "definition": "権威ある、堂々とした、卓越した質を持つことを表す形容詞。著作や発言が深い知識と権威を感じさせる場合に用いられる。「magisterial opus」で「傑作・大著」を意味する。"}]}, {"title_ja": "軍と共和国：アメリカ民主主義における文民統制の意義", "title_en": "The Military and the Republic: Civil-Military Relations in American Democracy", "summary_ja": "筆者は、アメリカの建国理念が文民による軍の統制という原則と深く結びついていると論じ、軍の役割を国内政治に拡大することは民主主義的制度を危うくすると警告する。ワシントンの先例を引きながら、文民の政治的機能不全を軍事力で補おうとすることは軍の本来の任務を損なうと主張する。筆者はすべてのアメリカの機関に対し、謙虚さと民主主義の実験への継続的なコミットメントを求めている。", "summary_en": "The author argues that America's founding ideals are deeply tied to the principle of civilian control over the military, warning that expanding military roles into domestic politics risks undermining democratic institutions. Drawing on Washington's example, the piece contends that using the military as a fix for civilian political dysfunction diverts it from its core mission and endangers the republic. The author calls for humility, continuous improvement, and renewed commitment to the democratic experiment across all American institutions.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/military-and-republic", "state_media": false, "category": "オピニオン", "full_text": "Celebrations of America’s founding and reflections on its ideals often overlook the central role of civil-military relations. This is a mistake. In the Declaration of Independence, a chief complaint was that King George III “affected to render the Military independent of and superior to the Civil power.” George Washington himself worried about this abuse of power and went to great pains to avoid it in his own career. Throughout the Revolutionary War, he constantly deferred to the Continental Congress despite its calamitous delays and erratic instructions, because he recognized that his authority over the Continental Army flowed from the people’s representatives. Given his immense personal popularity, he was often encouraged to redress this or that political dysfunction, but he knew that the republic would suffer in the long run if the military were to become an instrument of the commander’s will rather than of the people’s elected leaders.\nThe United States has not recently had leaders of Washington’s popularity, but in other ways the present moment recalls the era that followed the country’s founding. Today, as it was then, there is gridlock in the civilian political system. Similarly, Americans today hold the military in high regard compared with civilian branches of government. When the public is confronted with a problem that seems too big for the civilian branches to solve, the reflex is to ask the military to handle it. Both Presidents Donald Trump and Joe Biden, for instance, looked to the military to play a leading role in responding to the COVID-19 pandemic.\nThe temptation for mission creep is understandable: the U.S. military is the most advanced in the world, with a budget two to three times that of its nearest competitor. As the recent capture of Venezuelan dictator Nicolàs Maduro demonstrated, U.S. service members can do things no other military in the world can do. And in the face of a genuine national disaster, the public will readily embrace the military’s help; during the Great Depression, for instance, President Herbert Hoover directed the military to set up relief camps and President Franklin Roosevelt ordered it to establish the Civilian Conservation Corps, which put unemployed men to work to develop public land.\nBut when presidents use the armed forces for more politically contentious missions, such as addressing domestic crime in cities, the work of the military becomes more fraught. Resorting to a military solution rather than fixing the underlying incapacity or dysfunction in civilian institutions diverts the military from focusing on its primary combat mission. And, as Washington knew, it is not the military’s job to save the republic from political impasses. Indeed, if you ask too much of the military, you risk the entire enterprise.\nTHE AMERICAN INHERITANCE\nA quarter millennium after the first Americans rejected monarchy, representative democracy remains an “experiment entrusted to the hands of the American people,” as Washington said in his first inaugural address. It has been tenderly handed down from generation to generation, and it has been bitterly contested. The Civil War was only the greatest test of whether this experiment could survive its divisions, as the United States has faced disagreements throughout its history, including in the agrarian discontent of the 1890s, the depression and isolationism of the 1930s, the progress and tumult of the 1960s, and the political polarization of recent years.\nIn each chapter, the best political leaders found inspiration to overcome political divisions in the ideals that prompted the first patriots. These leaders held dear the self-evident truths “that all men are created equal [and] endowed by their Creator with certain unalienable Rights.” Of course, those ideals, so well articulated by the founders, were not so well practiced by them. Thomas Jefferson held the pen for the stirringly universal Declaration of Independence, yet he also held people in bondage. Washington, the indispensable man, considered the institution of slavery to be indispensable to the nation’s prosperity (at least initially). All the founders left women out of the equation entirely. But the American experiment strengthens each time its leaders recognize that the founders’ project to create a more perfect union is an enduring one—one to be passed down to every generation.\nThe ideal was better than the reality 250 years ago, and so it is today. For every American institution, including the military, this project of continuous improvement takes concerted effort and is not easy. Indeed, despite its advantages, the U.S. military today must stay humble and learn the lessons of the wars in Ukraine and Iran, including questioning traditional assumptions of U.S. air supremacy. To maintain professionalism in its all-volunteer force, the military must also find new ways to remain connected to American society and to persuade capable young men and women from all walks of li", "translation_ja": "アメリカの建国を祝い、その理想を振り返る際、文民と軍の関係という中心的なテーマが見落とされることが多い。しかしこれは誤りである。独立宣言の中で主要な不満の一つとして挙げられたのは、国王ジョージ3世が「軍を文民権力から独立させ、それより優越した存在にしようとした」ことであった。ジョージ・ワシントン自身もこの権力の濫用を懸念し、自らのキャリアにおいてそれを避けるために多大な努力を払った。独立戦争を通じて、彼は大陸会議が引き起こした壊滅的な遅延や不規則な指示にもかかわらず、常に同会議に従った。なぜなら、大陸軍に対する自らの権限は人民の代表者から生じるものだと認識していたからである。絶大な個人的人気を誇っていた彼は、この政治的機能不全やあの政治的問題を是正するよう促されることもしばしばあったが、軍が人民の選出した指導者の意志ではなく司令官個人の意志の道具となれば、共和国は長期的に損なわれると理解していた。\n\nアメリカは近年、ワシントンほどの人気を誇る指導者を持ってはいないが、他の点では現在の状況は建国直後の時代を彷彿とさせる。今日も当時と同様に、文民の政治システムは膠着状態にある。同様に、今日のアメリカ人は政府の文民部門と比較して軍を高く評価している。文民部門には手に負えないほど大きな問題に直面したとき、軍に対処を求めるのが反射的な反応となっている。例えば、ドナルド・トランプ大統領もジョー・バイデン大統領も、新型コロナウイルス感染症のパンデミックへの対応において軍が主導的な役割を果たすことを期待した。\n\nミッション・クリープへの誘惑は理解できる。米軍は世界で最も高度な軍隊であり、その予算は最も近い競合国の2〜3倍に達する。最近のベネズエラの独裁者ニコラス・マドゥロの拘束が示したように、米軍は世界の他のどの軍隊にもできないことを成し遂げることができる。そして本物の国家的災害に直面したとき、国民は喜んで軍の助けを受け入れる。例えば、大恐慌の時代にはハーバート・フーバー大統領が軍に救済キャンプの設置を命じ、フランクリン・ルーズベルト大統領は失業者を公有地の開発に従事させる民間保全部隊の設立を軍に命じた。\n\nしかし、大統領が都市部の国内犯罪への対処といった、より政治的に論争的な任務のために軍を使用する場合、軍の活動はより問題含みになる。文民機関の根本的な無力さや機能不全を修正する代わりに軍事的解決策に頼ることは、軍の主要な戦闘任務への集中を妨げる。そしてワシントンが知っていたように、政治的行き詰まりから共和国を救うことは軍の仕事ではない。実際、軍に多くを求めすぎれば、その取り組み全体を危険にさらすことになる。\n\nアメリカの遺産\n\n最初のアメリカ人が君主制を拒絶してから四半世紀後の今も、代議制民主主義はワシントンが最初の就任演説で述べたように「アメリカ国民の手に委ねられた実験」であり続けている。それは世代から世代へと大切に受け継がれてきたが、激しく争われてもきた。南北戦争はこの実験がその分裂を乗り越えられるかどうかの最大の試練に過ぎず、アメリカは1890年代の農業不満、1930年代の恐慌と孤立主義、1960年代の進歩と騒乱、そして近年の政治的二極化など、歴史を通じて幾多の対立を経験してきた。\n\nそれぞれの局面で、最良の政治指導者たちは最初の愛国者たちを突き動かした理想の中に政治的分裂を乗り越えるインスピレーションを見出した。これらの指導者たちは、「すべての人は平等に創られ、創造主から一定の譲渡不可能な権利を与えられている」という自明の真理を大切にした。もちろん、建国者たちによってこれほど見事に表現されたそれらの理想は、彼ら自身によって十分に実践されたわけではない。トーマス・ジェファーソンは感動的なほど普遍的な独立宣言の起草者でありながら、人々を束縛の中に置いていた。欠くことのできない人物と称されたワシントンは（少なくとも当初は）奴隷制度を国家の繁栄に欠くことのできない制度とみなしていた。建国者たちは全員、方程式から女性を完全に除外していた。しかし、指導者たちが、より完全な連合を創設するという建国者たちの計画が永続的なものであり、あらゆる世代に受け継がれるべきものであると認識するたびに、アメリカの実験は強化されてきた。\n\n250年前も理想は現実よりも優れていたが、今日も同様である。軍を含むあらゆるアメリカの機関にとって、この継続的改善というプロジェクトには多大な努力が必要であり、容易ではない。実際、その優位性にもかかわらず、今日の米軍は謙虚さを保ち、ウクライナとイランにおける戦争の教訓を学ばなければならない。それには米軍の航空優勢に関する伝統的な前提を問い直すことも含まれる。志願制に基づく軍の専門性を維持するためには、軍はアメリカ社会とのつながりを保ち、あらゆる階層の有能な若い男女を説得する新たな方法を見つけなければならない。", "vocab": [{"word": "mission creep", "definition": "組織や活動の本来の目的や範囲を超えて任務が少しずつ拡大していく現象。軍事・政策の文脈で特によく使われる慣用表現。"}, {"word": "calamitous", "definition": "壊滅的な、甚大な被害をもたらす、という意味の形容詞。単なる「悪い」を超えた深刻な結果を伴う状況に使われる。"}, {"word": "fraught", "definition": "不安・困難・危険などをはらんでいる、という意味の形容詞。'fraught with risk'（危険をはらんでいる）のように前置詞withを伴うことが多い。"}, {"word": "gridlock", "definition": "政治や交渉などが完全に行き詰まり、何も進展しない状態。元々は交通渋滞で車が動けなくなる状況を指す語。"}, {"word": "unalienable", "definition": "譲渡不可能な、取り上げることができない、という意味の形容詞。主に権利や自由の文脈で使用される法律・政治的な用語。"}, {"word": "deferred", "definition": "defer（従う・判断や決定を相手に委ねる）の過去形。権威ある人物や組織の判断を尊重して自分の意見を引っ込める場合に使う。"}, {"word": "polarization", "definition": "社会や政治において意見・立場が両極端に分かれ、対立が深まる現象。近年の政治discourse（言説）で頻出する重要語。"}]}, {"title_ja": "ハマスの終焉：回復不能な崩壊の実態", "title_en": "The End of Hamas: Why the Group Is Beyond Recovery", "summary_ja": "筆者は、ハマスは依然として存続しているという通説に反し、2年間のイスラエルとの戦争によって組織は回復不能なほど壊滅したと主張する。指導部の全滅、軍事インフラの喪失、イランからの資金途絶、そして壊滅的な破壊の責任を問うガザ市民からの支持喪失が重なっている。ハマスとイスラエルの双方が、それぞれの政治的思惑からハマスの強さという神話を維持しようとしていると筆者は指摘する。", "summary_en": "The author argues that despite conventional wisdom suggesting Hamas remains a resilient force, the organization has been decimated beyond recovery by two years of war with Israel. Hamas has lost its entire leadership structure, military infrastructure, external funding from Iran, and crucially, the public support of Gazans who blame it for catastrophic destruction. The author contends that both Hamas and Israel are invested in perpetuating the myth of Hamas's continued strength for their own political reasons.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/palestinian-territories/end-hamas", "state_media": false, "category": "オピニオン", "full_text": "The consensus among analysts is that Hamas is down, but hardly out. The group may be badly battered, but it has been around since 1987, and in that time, it has been repeatedly attacked by Israel and has always grown back. The conditions that gave rise to the organization—occupation, dispossession, and humiliation at the hands of Israel—are as severe as ever. And in the Gaza Strip, there is no comprehensive alternative to Hamas’s governance. Even in its weakened state, the group has institutional memory, administrative infrastructure, and coercive capacity that its competitors cannot match.\nBut in truth, Hamas’s two-year war with Israel has decimated the organization beyond the point of recovery. It may still be more powerful than other groups in Gaza. But Israel’s bombing campaigns and invasion have cost Hamas essential military infrastructure, torn apart its leadership, and cut it off from its patrons. As a result, the organization lacks the power to actually rule Gaza. It is suffering from political paralysis and facing financial disaster in the enclave. Finally, it has lost public support: many Gazans blame the group for starting a war that has resulted in the destruction or damage of 90 percent of the homes in the Gaza Strip and the deaths of roughly four percent of the prewar population.\nDespite these facts, officials on both sides of Gaza’s yellow line have embraced the idea that Hamas is alive and well. Members of Hamas perpetuate this farce for an obvious reason: they do not want to admit that they lost. But Israel is also pretending that its nemesis remains strong so it can justify its continuing military operations—and avoid having to answer difficult questions about the future of Palestinians.\nUNAUTHORIZED OBITUARY\nSince Hamas attacked Israel on October 7, 2023, Israel has killed an entire echelon of Hamas leaders. This includes its former top officials: Yahya Sinwar, Ismail Haniyeh, Mohammed Deif, and Mohammed Sinwar. In May of this year, Israeli forces assassinated Izz al-Din al-Haddad, the head of Hamas’s military wing, at a residence, along with some of his family. Eleven days later, it killed Haddad’s replacement, Mohammed Odeh, along with his wife and two of his children. Today, only one Hamas commander who held a senior position before October 7 is left standing: Imad Aqel. Israel has also taken out hundreds of midlevel commanders. What it has done, in other words, goes beyond a mere decapitation strategy. It has removed Hamas’s entire nervous system.\nIsrael has also rendered Hamas incapable of regeneration. The fact that Haddad and Odeh were killed in their homes, with their families, indicates that the safe houses, tunnels, and countersurveillance architecture that once made Hamas’s senior leadership elusive are now gone. So are its overseas outposts. In the last three years, Israel has killed (or tried to kill) Hamas officials in Iran, Lebanon, and Qatar.\nIt is therefore little wonder that Hamas is experiencing a leadership crisis. Since Yahya Sinwar was killed, in October 2024, the group has been unable to decide who should take the helm of its political bureau. Hamas’s Shura Council, made up of 50 to 80 members, was supposed to elect a new leader in early 2025, but it could not meet and vote because of Israel’s ongoing bombardment. When a vote was finally held in February 2026, it did not produce a winner. For now, the group is run by a five-man council that has been hamstrung by infighting.\nThe relationship between Iran and Hamas is effectively over.\nHamas has settled on two leadership candidates: Khalil al-Hayya and Khaled Mashal. Each has a very different agenda. Hayya and his supporters favor close ties with Iran and continued armed confrontation, whereas Mashal and his backers want more sponsorship from Sunni states and more pragmatic negotiations with Israel. Of course, many healthy organizations have factional disagreements that they negotiate and resolve. But these divisions have instead resulted in deadlock. When the United States and Israel began bombing Iran on February 28 of this year, for example, Hamas could not agree on a statement or a response. It thus remained silent for three weeks. When it spoke, it sent conflicting signals. The group’s political leadership in Qatar called on Iran to “avoid targeting neighboring countries,” whereas the group’s military spokesman in Gaza put out a statement with a markedly different tone that praised Tehran’s war efforts.\nHamas’s political crisis is more than just internal. Since October 7, the group has lost external support. For decades, Hamas was an integral part of the so-called axis of resistance—Iran’s network of partners across the Middle East. This partnership was never seamless, in part because Hamas is a Sunni Islamist movement embedded in a Shiite-led alliance. But it was functional. Iran provided Hamas with weapons, training, and funding to the tune of $100 million annually. Hamas, in return, allowed Iran to indirectly ", "translation_ja": "アナリストたちの間での共通認識は、ハマスは弱体化しているが、壊滅には程遠いというものだ。組織は深刻なダメージを受けているかもしれないが、1987年の結成以来、イスラエルから繰り返し攻撃を受けながらも常に復活を遂げてきた。組織を生み出した条件——占領、財産の剥奪、そしてイスラエルによる屈辱——は依然として深刻なままだ。そしてガザ地区には、ハマスの統治に代わる包括的な代替勢力が存在しない。弱体化した状態であっても、組織は他の競合勢力が太刀打ちできない組織的な記憶、行政インフラ、そして強制力を保持している。\n\nしかし実際には、ハマスとイスラエルの2年間の戦争は、組織を回復不能な地点まで壊滅させた。ガザの他の勢力よりも依然として強力かもしれない。しかしイスラエルの爆撃作戦と地上侵攻は、ハマスの重要な軍事インフラを奪い、指導部を引き裂き、支援者との関係を断ち切った。その結果、組織はガザを実効支配する力を失っている。政治的な麻痺に苦しみ、飛び地での財政的な危機に直面している。さらに、民衆の支持も失った。多くのガザ市民は、ガザ地区の住宅の90パーセントの破壊または損傷、そして戦前の人口の約4パーセントに相当する死者を招いた戦争を開始したとして、ハマスを非難している。\n\nこれらの事実にもかかわらず、ガザの黄色い境界線の両側にいる当局者たちは、ハマスが依然として健在であるという考えを受け入れている。ハマスのメンバーがこの茶番を続けるのは明らかな理由がある。彼らは敗北を認めたくないのだ。しかしイスラエルもまた、継続的な軍事作戦を正当化し、パレスチナ人の将来についての困難な問いに答えることを回避するために、宿敵が依然として強力であると見せかけているのだ。\n\n■ 無断の死亡記事\n\nハマスが2023年10月7日にイスラエルを攻撃して以来、イスラエルはハマスの指導者の一世代全体を殺害してきた。これには元最高幹部たちが含まれる。ヤヒヤ・シンワル、イスマイル・ハニヤ、モハメド・デイフ、そしてモハメド・シンワルだ。今年5月、イスラエル軍はハマスの軍事部門の長であるイズ・アル＝ディン・アル＝ハダッドを、一部の家族とともに居宅で暗殺した。11日後、ハダッドの後継者モハメド・オデーを、妻と子ども2人とともに殺害した。今日、10月7日以前に上級職を占めていたハマスの指揮官で生き残っているのは、イマド・アケルただ一人だ。イスラエルはまた、数百人の中間幹部も排除してきた。つまりイスラエルが行ったことは、単なる「斬首作戦」をはるかに超えている。ハマスの神経系全体を除去したのだ。\n\nイスラエルはまた、ハマスの再生能力をも奪った。ハダッドとオデーが家族とともに自宅で殺害されたという事実は、かつてハマスの最高指導部を捕捉困難にしていたセーフハウス、トンネル、そして監視を逃れるための組織的な仕組みが今や消滅していることを示している。海外拠点も同様だ。この3年間で、イスラエルはイラン、レバノン、カタールでハマスの幹部を殺害している（または殺害を試みている）。\n\nハマスが指導部の危機に陥っているのも、それゆえ当然のことだ。2024年10月にヤヒヤ・シンワルが殺害されて以降、組織は政治局の新しいトップを誰にするか決定できずにいる。50人から80人のメンバーで構成されるハマスのシューラ評議会は、2025年初頭に新指導者を選出することになっていたが、イスラエルの継続的な爆撃により、会合を開いて投票することができなかった。2026年2月にようやく投票が行われたが、勝者は生まれなかった。現在、組織は内部抗争によって機能不全に陥った5人委員会によって運営されている。\n\nイランとハマスの関係は事実上終わった。\n\nハマスは2人の指導者候補に絞り込んでいる。ハリル・アル＝ハヤとハーリド・マシャルだ。それぞれが全く異なる方針を持っている。ハヤとその支持者はイランとの緊密な関係と武装対決の継続を支持するのに対し、マシャルとその支持者はスンニ派諸国からの支援拡大とイスラエルとのより実用的な交渉を望んでいる。もちろん、多くの健全な組織も派閥間の意見の相違を交渉して解決している。しかしこれらの分裂は、代わりに行き詰まりをもたらしている。たとえば今年2月28日にアメリカとイスラエルがイランへの爆撃を開始した際、ハマスは声明や対応について合意できなかった。そのため3週間にわたって沈黙したままだった。発言した際には、相矛盾するシグナルを発した。カタールのハマス政治指導部はイランに対して「近隣諸国への攻撃を避けるよう」求めたのに対し、ガザのハマス軍事報道官は著しく異なるトーンの声明を出し、テヘランの戦争努力を称賛した。\n\nハマスの政治的危機は内部だけの問題ではない。10月7日以降、組織は外部からの支援を失った。数十年にわたり、ハマスはいわゆる「抵抗の枢軸」——中東全域にわたるイランのパートナーネットワーク——の不可欠な一部であった。ハマスがスンニ派イスラム主義運動でありながらシーア派主導の同盟に組み込まれているという事実もあり、このパートナーシップは決して円滑なものではなかった。しかし機能はしていた。イランはハマスに武器、訓練、そして年間1億ドルに上る資金を提供してきた。ハマスはその見返りとして、イランが間接的に……", "vocab": [{"word": "decapitation strategy", "definition": "組織の上位指導者を標的にして組織を弱体化させる軍事・政治的戦略のこと。「斬首作戦」とも訳される。"}, {"word": "countersurveillance", "definition": "監視・追跡活動を検知・回避・無効化するための手段や仕組みのこと。諜報・軍事的文脈で頻繁に使われる専門用語。"}, {"word": "enclave", "definition": "周囲を他の勢力や領域に囲まれた、独立した地理的・政治的区域のこと。ガザ地区のように外部から隔絶された地域を指す際に使用される。"}, {"word": "decimated", "definition": "元来は「10分の1を殺す」という意味だが、現代英語では組織や集団が壊滅的なダメージを受けた状態を表す。"}, {"word": "deadlock", "definition": "対立する勢力や意見が均衡して、どちらも前進できない状態。交渉や意思決定が完全に行き詰まっている状況を指す。"}, {"word": "farce", "definition": "現実とかけ離れた茶番や見せかけのこと。実態を隠すために維持される虚偽の状況を皮肉的に表現する際に用いられる。"}, {"word": "hamstrung", "definition": "行動や進展を妨げられ、機能不全に陥っている状態を表す形容詞。組織や人物が制約によって力を発揮できない場面で使われる慣用表現。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-07-03 11:56 JST";
renderTabs();renderList();
</script>
