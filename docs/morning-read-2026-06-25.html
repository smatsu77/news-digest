yYm5JMmFjX2J1OWtRMy1aWkJaZVo4d1FMajQtWGhrSHNwYWNQcm91TWVyQ3BSUG5FYnlKRHNXSlZBQVJTVTZOZHN4UVFiR3dWaS02QzNDeVJlZk1mYnBBcGVkQQ?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "ベネズエラで連続大地震、160人以上死亡 住民「死ぬかと思った」", "title_en": "Venezuelans Describe Terror as Back-to-Back Earthquakes Kill Over 160", "summary_ja": "水曜日の夕方、マグニチュード7.2と7.5の大地震が相次いでベネズエラを襲い、160人以上が死亡、数百人が負傷した。首都カラカスや最も被害の大きかったラ・グアイラ州では建物が倒壊し、多くの住民が路上や広場での夜を余儀なくされた。停電や通信インフラの損傷により被害状況の全容把握が難航しており、当局は実際の死者数はさらに増える可能性があると警告している。", "summary_en": "Two powerful earthquakes measuring 7.2 and 7.5 in magnitude struck Venezuela on Wednesday evening, leaving over 160 people dead and hundreds injured. The tremors devastated parts of Caracas and the state of La Guaira, collapsing buildings and forcing hundreds of residents to sleep in streets and public squares. Authorities warn the true death toll has yet to be determined as power and internet outages hamper information flow from the hardest-hit areas.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/czj8vjvmz38o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "西ヨーロッパを記録的熱波が直撃――フランス・英国・スペインで観測史上最高気温", "title_en": "Record-Breaking Heatwave Scorches Western Europe: France, UK and Spain Hit Unprecedented Highs", "summary_ja": "深刻な熱波が西ヨーロッパ全域で気温記録を塗り替え、フランスでは1947年以来最も暑い日を記録、英国では6月の観測史上最高気温36.1度、スペインでは1950年以来最高の日平均気温を記録した。パリでは気温が41度近くに達し、ルーブル美術館とエッフェル塔が早期閉館を余儀なくされ、フランスでは熱波に関連した水難事故で少なくとも40人が死亡した。気候変動が原因とされるこの猛暑は週末にかけてドイツ・オランダ・ベルギー・東欧へと拡大する見通しだ。", "summary_en": "A severe heatwave has shattered temperature records across western Europe, with France recording its hottest day since 1947, the UK logging its hottest June day ever at 36.1C, and Spain reaching its highest daily average temperature since 1950. Paris temperatures approached 41C, prompting early closures of the Louvre and Eiffel Tower, while at least 40 people drowned in heat-related incidents in France alone. The extreme heat, driven by climate change, is expected to spread eastward and affect Germany, the Netherlands, Belgium, and Eastern Europe through the weekend.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c78y4102n1zo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "トランプ大統領、対イラン戦費として8兆円超を议会に要求　共和党内の亀裂も表面化", "title_en": "Trump Seeks $87.6bn for Iran War as Republican Tensions Simmer in Congress", "summary_ja": "ホワイトハウスは「作戦エピック・フューリー」と称するイランとの軍事作戦に関連する「緊急ニーズ」を主な名目として、総額876億ドル（約8兆7600億円）の予算を議会に正式に要請した。予算の大部分にあたる670億ドルは国防総省向けで、弾薬補充や作戦経費、機密プログラムなどに充てられる。共和党のカシディ上院議員はトランプ大統領との激しい口論の末、ペンス副大統領らから説明を受けた後に態度を翻し、追加の戦争権限決議案の否決に回った。", "summary_en": "The White House has formally requested $87.6 billion from Congress, primarily to fund ongoing military operations against Iran under 'Operation Epic Fury,' a day after the Senate passed a symbolic war powers resolution rebuking the president. The bulk of the funding—$67 billion—is earmarked for the Department of Defense, covering munitions, operational costs, and classified programs. Republican Senator Bill Cassidy, who initially defied Trump by supporting the war powers measure, reversed course after an alleged heated confrontation with the president and subsequent briefings from senior administration officials.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c1eydwldzdjo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "ファクトチェック：ゼレンスキー大統領暗殺説は虚偽、ボットキャンペーンの疑い", "title_en": "Fact Check: Zelenskyy Assassination Claims Are False and Linked to Bot Campaign", "summary_ja": "ロシアの空爆でウクライナのゼレンスキー大統領が死亡したとするSNSの投稿は虚偽であることが確認された。拡散した動画は2015年に中国・天津で起きた倉庫爆発の映像であり、大統領はOECD幹部との会談映像をX上に自ら投稿していた。専門家は、ほぼ同一の文言を持つ30以上の投稿がAIを活用したボットネットワークによる組織的な偽情報活動の兆候を示していると指摘している。", "summary_en": "Viral social media posts claiming Ukrainian President Zelenskyy was killed in a Russian airstrike are false. A video attached to the posts actually shows the 2015 Tianjin warehouse explosion in China, and Zelenskyy was confirmed alive in a meeting with an OECD official. Analysts say the coordinated campaign shows signs of AI-assisted bot activity, with at least 30 near-identical posts sharing the same misinformation.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/fact-check-no-zelenskyy-wasn-t-killed-in-a-russian-airstrike/a-77704409?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "欧州熱波：1億人超が35℃以上にさらされ、スペインで212人死亡か", "title_en": "Europe Heat Wave: 101 Million Face Temperatures Above 35°C as Death Toll Rises", "summary_ja": "欧州を襲う記録的な熱波により、木曜日には1億人以上が気温35℃超の酷暑にさらされており、フランスとドイツが特に深刻な影響を受けている。スペインでは日曜から水曜にかけて少なくとも212人の死亡が熱波と関連している可能性があり、ドイツでも観測史上最も暖かい夜の記録に並んだ。英国気象庁は熱波に関する異例の「赤色警報」を発令し、フランスでは2日連続で過去最高の日平均気温を記録した。", "summary_en": "A severe heat wave gripping Europe is exposing over 101 million people to temperatures above 35°C on Thursday, with France and Germany among the hardest hit. At least 212 deaths in Spain between Sunday and Wednesday are likely linked to the extreme heat, while Germany recorded an all-time warmest night and may set a new June temperature record on Friday. Britain's Met Office has issued a rare red heat warning, and France logged record-breaking average daily temperatures two days in a row.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/europe-heat-wave-no-respite-as-extreme-heat-continues/live-77663026?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "ドイツ鉄道が猛暑で払い戻し提供、AI競争での遅れに警告、W杯ローテーションも発表", "title_en": "Germany Roundup: Deutsche Bahn Heat Refunds, AI Warning, Export Outlook, World Cup Rotation", "summary_ja": "ドイツの国営鉄道ドイチェ・バーンは、猛暑による鉄道インフラへの影響を理由に、乗客に旅行の延期を勧めるとともに全額払い戻しを提供すると発表した。一方、ドイツ銀行はドイツのソフトウェア投資がGDPの1%未満にとどまっており、AI競争で他国に大きく後れを取るリスクがあると警告した。サッカーW杯では、ドイツ代表のナーゲルスマン監督がエクアドル戦でのターンオーバーを表明したが、3得点のウンダフは引き続きベンチスタートとなる。", "summary_en": "Deutsche Bahn is offering full refunds and advising passengers to postpone travel as extreme heat threatens rail infrastructure across Germany. Deutsche Bank warned that Germany risks falling behind in the global AI race due to software investment levels below 1% of GDP, while the Ifo Institute reported a slight improvement in export expectations despite ongoing caution. Germany coach Julian Nagelsmann confirmed squad rotations for the World Cup group match against Ecuador, keeping top scorer Deniz Undav on the bench.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-news-deutsche-bahn-advises-against-travel-amid-heat/live-77704395?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "ベネズエラ地震、死者164人以上　救助隊が生存者を懸命に捜索", "title_en": "Venezuela Earthquakes Kill at Least 164 as Rescuers Search for Survivors", "summary_ja": "マグニチュード7.2と7.5の大地震がベネズエラを襲い、少なくとも164人が死亡、数百人が行方不明となっている。救助隊は生存者を求めて懸命な捜索活動を続けており、被害の全容はいまだ明らかになっていない。当局は影響を受けた各地域の被害状況の把握を急いでいる。", "summary_en": "Two powerful earthquakes measuring 7.2 and 7.5 in magnitude struck Venezuela, killing at least 164 people and leaving hundreds missing. Rescue teams are conducting urgent search operations as the full extent of the destruction continues to emerge. Authorities are working to assess the scale of damage across affected regions.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/25/world/venezuela-earthquake", "state_media": false, "category": "社会"}, {"title_ja": "スペイン、熱波による死者増加を警告―欧州全土で高温続く", "title_en": "Spain Warns of High Death Toll as European Heat Wave Continues", "summary_ja": "スペイン保健省は、日曜日以降の熱波により約200人が死亡した可能性があると発表した。欧州全土では木曜日まで気温が平年を大幅に上回る状態が続く見通しで、当局は警戒を強めている。危険な高温状態が大陸全域で継続しており、各国が対応に追われている。", "summary_en": "Spain's health ministry reported that approximately 200 people may have died since Sunday due to an intense heat wave. Temperatures across Europe were forecast to remain significantly above normal through Thursday. Authorities are on high alert as the dangerous conditions persist across the continent.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/25/weather/europe-heat-wave-uk-france", "state_media": false, "category": "政治"}, {"title_ja": "南スーダンの教育危機、若者世代の未来は守れるか", "title_en": "Can a Youth Boom Survive South Sudan's Education Crisis?", "summary_ja": "世界で最も新しい国家である南スーダンでは、教育制度が崩壊の瀬戸際に立たされており、一世代全体が危機にさらされている。若者人口の急増は、適切な教育が提供されなければ、国家の資産ではなく負担となりかねない。早急な対策が講じられなければ、この教育危機は不安定な国家の長期的な安定と発展を根底から脅かす恐れがある。", "summary_en": "South Sudan, the world's newest nation, is facing a severe collapse of its education system that threatens an entire generation of young people. The country's youth population boom could become a liability rather than an asset if children are denied access to quality schooling. Without urgent intervention, the education crisis risks undermining long-term stability and development in the fragile nation.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/25/world/africa/south-sudan-usaid-education.html", "state_media": false, "category": "社会"}, {"title_ja": "人質合意の突破口を機に、パレスチナ人がガザ北部へ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を二分する軍事ゾーンを避難民が通過することを許可し、パレスチナ人が北部へ徒歩で帰還し始めた。この動きは、人質解放をめぐる膠着状態が打開されたことを受けたものである。長期にわたり自宅へ戻れなかった市民にとって、現地の状況における重要な転換点となっている。", "summary_en": "Israel permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to the northern part of the enclave on foot. The movement came after a stalemate over hostage releases was resolved. The development marks a significant shift in conditions on the ground for civilians who had been unable to return home.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治"}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Property Sector Crisis", "summary_ja": "中国の大手不動産デベロッパー、万科（Vanke）が多大な損失を計上し、同国の不動産危機が一段と深刻化していることが浮き彫りとなった。万科の経営難は、不動産不況がどこまで広がるかについて新たな懸念を呼び起こしている。中国政府が事態を安定させるために介入するかどうか、市場関係者は固唾をのんで見守っている。", "summary_en": "Leading Chinese property developer Vanke has reported a significant financial loss, signaling that the country's real estate crisis continues to worsen. The troubles at Vanke raise fresh concerns about how broadly the property downturn may spread across China's economy. Observers are now watching closely to see whether the Chinese government will intervene to stabilize the situation.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会"}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の弾片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃で受けた弾片がいまだに残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性人質は長期間にわたり単独で拘束され、約8か月間を地下トンネルの中で過ごしたという。今回の所見は、人質が拘束中に受けた深刻な身体的・精神的苦痛を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were discovered to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The findings highlight the severe physical and psychological conditions endured by hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会"}, {"title_ja": "フランスでエボラ出血熱の初感染確認、コンゴ民主共和国から帰国した医師", "title_en": "France Confirms First Ebola Case in Doctor Returned from DRC Mission", "summary_ja": "フランス保健省は、コンゴ民主共和国（DRC）で人道支援活動に従事した後に帰国した医師のエボラ出血熱感染を確認した。患者は専門医療施設に隔離され、容態は安定しているという。今回の流行はワクチンも承認済み治療薬も存在しない希少なブンディブギョウイルスによるもので、DRCでは1,048件以上の感染と267人の死亡が報告されており、過去最大規模の流行となる可能性が指摘されている。", "summary_en": "France has confirmed its first Ebola case in a doctor who returned from a humanitarian mission in the Democratic Republic of the Congo. The patient is isolated in a specialist facility in stable condition, while authorities trace contacts who must quarantine for 21 days. The ongoing DRC outbreak, caused by the rare Bundibugyo strain with no approved vaccine, has recorded over 1,048 cases and 267 deaths, with modelling suggesting it could become the largest Ebola outbreak on record.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/24/france-ebola-first-case-doctor-drc", "state_media": false, "category": "社会"}, {"title_ja": "ケニアの演劇『フリー・ミー』、深刻化するジェンダー暴力の危機に光を当てる", "title_en": "Kenyan Play 'Free Me' Shines Light on Rising Gender-Based Violence Crisis", "summary_ja": "ケニアの演劇プロデューサー、ガトーニ・キムユが自身のDV被害体験を基に制作した自伝的演劇が、フェミサイドやジェンダーに基づく暴力（GBV）が増加するナイロビで大きな反響を呼んでいる。公演は市民による抗議デモと時期を同じくしており、政府の報告書はフェミサイドの独立した犯罪としての明文化やGBVの国家危機宣言を勧告しているが、いまだ実施には至っていない。出演者や観客は、この作品が被害者を人間として描き、加害者の責任を問い、生存者が声を上げる勇気を与えると語っている。", "summary_en": "An autobiographical play by Kenyan producer Gathoni Kimuyu, depicting her own experience of domestic abuse, has resonated deeply with audiences in Nairobi amid surging rates of femicide and gender-based violence in Kenya. The production coincides with public protests and a government-commissioned report recommending that femicide be codified as a distinct crime and that GBV be declared a national crisis, though the recommendations have yet to be implemented. Cast members and audiences say the play humanizes victims, challenges perpetrators, and encourages survivors to speak out.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/24/kenya-play-free-me-gender-based-violence", "state_media": false, "category": "社会"}, {"title_ja": "ケニア保健相、米国のエボラ施設建設を停止命令――法廷侮辱の裁定受け", "title_en": "Kenyan Minister Halts US Ebola Facility Construction After Contempt Ruling", "summary_ja": "ケニアのアデン・ドゥアレ保健相は、裁判所の前回の建設停止命令を無視したとして法廷侮辱と認定された後、ライキピア空軍基地における米国主導のエボラ隔離施設の建設を即時・完全に停止するよう命じた。同施設はコンゴ民主共和国から避難する米国市民を収容する目的で計画されており、5月の発表以来、抗議運動で3人が死亡するなど強い反発を招いている。現在の流行はワクチンや承認済み治療薬のない希少なブンディブギョウイルスによるもので、米疾病予防管理センターの試算では過去最大規模の流行になる可能性が示されている。", "summary_en": "Kenya's Health Minister Aden Duale ordered an immediate stop to construction of a US-run Ebola quarantine facility at Laikipia air base after a court found him in contempt for ignoring a previous halt order. The facility, intended to house US citizens evacuated from Ebola-hit DRC, has sparked deadly protests, with three people killed since its announcement in May. The current outbreak involves the rare Bundibugyo strain with no vaccine, and CDC modelling suggests it could become the largest Ebola outbreak on record.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/23/kenya-minister-orders-halt-us-ebola-facility", "state_media": false, "category": "政治"}, {"title_ja": "独裁国家が新たな国際調停者として台頭、和平合意の性格に変化", "title_en": "Autocracies Are Replacing Democracies as the World's New Conflict Mediators", "summary_ja": "かつて西側民主主義国が主導していた国際紛争の調停役を、権威主義体制の国々が急速に担うようになっている。こうした独裁国家が仲介する和平合意は、自国の政治的価値観や利益を反映した内容となりやすく、その持続性と公正性に懸念が生じている。この変化は、民主主義国家の影響力低下に伴うグローバル外交の大きな再編を示している。", "summary_en": "Authoritarian regimes are increasingly stepping into the role of international peacemakers, displacing the Western-led institutions that once dominated conflict mediation. The deals brokered by these autocracies tend to reflect their own political values and interests, raising concerns about the durability and fairness of such agreements. This shift signals a broader realignment in global diplomacy as democratic influence wanes.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会"}, {"title_ja": "アジアの同盟国はトランプ氏と緊密な関係を維持せざるを得ない", "title_en": "Asian Allies Have No Choice but to Embrace Trump", "summary_ja": "日本をはじめとするアジア諸国は、中国の台頭に対抗するための独自の中堅国連合を形成することは難しい状況にある。トランプ前大統領の予測不可能な外交姿勢に不満を抱きながらも、アジアの同盟国は中国を抑止できるのは米国だけだと認識している。そのため、トランプ氏の要求や行動にかかわらず、アジア各国はワシントンとの緊密な関係を維持し続けるとみられる。", "summary_en": "Japan and other Asian nations are unlikely to form independent coalitions to counter China's growing power. Despite frustrations with Donald Trump's unpredictable foreign policy, these countries recognize that only the United States possesses the military deterrence capability needed to balance China. As a result, Asian allies are expected to maintain close ties with Washington regardless of Trump's demands or behavior.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会"}, {"title_ja": "ワールドカップ優勝の秘訣：富裕さより移民受け入れが鍵", "title_en": "How to Win the World Cup: Wealth Helps, But Immigration Helps More", "summary_ja": "ワールドカップの成績を分析した調査によると、国の経済力は有利に働くものの、移民への開放性がより強力な成功要因であることが明らかになった。外国出身の選手を積極的に受け入れ、多様な人材を活用する国は、より裕福でも閉鎖的な競合国を上回る傾向がある。この研究結果は、文化的な開放性と人口の多様性がスポーツの頂点における成功に直結することを示している。", "summary_en": "Research into World Cup success suggests that national wealth gives countries an advantage in football, but openness to immigration proves to be an even stronger predictor of success. Nations that welcome foreign-born players and embrace diverse talent pools tend to outperform wealthier but more restrictive competitors. The findings highlight how cultural openness and demographic diversity can translate into sporting excellence on the global stage.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/10/how-to-win-the-world-cup", "state_media": false, "category": "社会"}, {"title_ja": "パリ市長グレゴワール氏：気候危機への適応には生活様式の変革が必要", "title_en": "Paris Mayor Grégoire: Tackling Climate Crisis Requires Changing Our Way of Life", "summary_ja": "パリ市長グレゴワール氏はル・モンド紙のインタビューで、気候危機への適応には市民全体が生活様式を変えることが不可欠だと訴えた。同市長は、環境問題への対応において共同行動の重要性を強調した。なお、記事の全文は技術的な問題により取得できなかった。", "summary_en": "Paris Mayor Grégoire addressed the urgent need to adapt to the climate crisis, emphasizing that collective lifestyle changes are essential. The interview, published in Le Monde, highlights the mayor's vision for communal action in responding to environmental challenges. Full article content was unavailable due to a technical loading issue.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/politics/article/2026/06/25/paris-mayor-gregoire-on-the-climate-crisis-to-adapt-together-we-need-to-change-our-way-of-life_6754853_5.html", "state_media": false, "category": "社会"}, {"title_ja": "ベネズエラ、126年ぶり最悪の連続地震に見舞われる", "title_en": "Venezuela hit by deadliest double earthquake in 126 years", "summary_ja": "ベネズエラで2回の強い地震が相次いで発生し、同国にとって126年ぶりとなる最悪の地震被害をもたらした。この連続地震により多数の死傷者と広範囲にわたる建物被害が報告されている。当局は被害状況の全容把握を進めるとともに、救助・救援活動を展開している。", "summary_en": "Venezuela has been struck by a pair of powerful earthquakes, marking the deadliest seismic event the country has experienced in 126 years. The twin quakes caused significant casualties and widespread destruction across affected regions. Rescue and relief efforts are underway as authorities assess the full extent of the damage.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/article/2026/06/25/venezuela-reels-after-deadliest-double-earthquake-in-126-years_6754858_114.html", "state_media": false, "category": "社会"}, {"title_ja": "ウクライナのロシア製油所攻撃、燃料不足と国民の不満を招く", "title_en": "Ukrainian Strikes on Russian Refineries Spark Fuel Shortages and Growing Discontent", "summary_ja": "ウクライナによるロシアの石油精製施設へのドローン・ミサイル攻撃が、ロシア国内で燃料不足を引き起こし始めている。精製能力の低下により燃料価格が上昇し、ロシア市民の間で不満が高まっている。この攻撃はロシアのエネルギーインフラと経済を弱体化させるためのウクライナの戦略的取り組みの一環とみられる。", "summary_en": "Ukrainian drone and missile strikes targeting Russian oil refineries have begun causing fuel shortages inside Russia. The disruptions to refining capacity are leading to rising prices and increasing public discontent among Russian citizens. The attacks represent a strategic effort by Ukraine to undermine Russia's energy infrastructure and economy.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/25/ukrainian-strikes-on-russian-refineries-are-triggering-shortages-and-rising-discontent_6754849_4.html", "state_media": false, "category": "経済"}, {"title_ja": "イスラエル軍、ヨルダン川西岸でパレスチナ人男性を自宅急襲中に殺害", "title_en": "Israeli Forces Kill Palestinian Man During Home Raid in West Bank", "summary_ja": "イスラエル軍は、占領下のヨルダン川西岸サルフィット近郊において、32歳のパレスチナ人男性の自宅を急襲し、同男性を殺害した。この事件は2026年6月25日に報告された。急襲の詳しい経緯についてはまだ明らかにされていない。", "summary_en": "Israeli forces killed a 32-year-old Palestinian man during a raid on his home near the town of Salfit in the occupied West Bank. The incident was reported on June 25, 2026. No further details regarding the circumstances of the raid have been provided.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/6/25/israeli-forces-kill-palestinian-man-during-raid-on-his-home?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "ホルムズ海峡における機雷除去作戦の仕組み：ビジュアルガイド", "title_en": "How Minesweeping in the Strait of Hormuz Works: A Visual Guide", "summary_ja": "米国とイランの枠組み合意により、イランは30日以内にホルムズ海峡の機雷を除去することが義務付けられ、フランスと英国が多国籍の機雷除去活動を主導している。機雷には海底型・係留型・漂流型・吸着型などの種類があり、安価に製造できる一方で発見・除去には多大なコストとリスクが伴う。除去作業にはソナー搭載の水中ドローンや遠隔操作機器、潜水士が投入され、機雷掃海ケーブルを用いた掃海作業も実施されている。", "summary_en": "Following a US-Iran framework agreement requiring Iran to clear naval mines within 30 days, France and the UK are leading a multinational demining effort in the Strait of Hormuz. Naval mines—including bottom, moored, drifting, and limpet types—are cheap to deploy but costly and dangerous to remove, and their presence continues to deter normal shipping traffic. Mine countermeasure operations rely on sonar-equipped underwater drones, remotely operated vehicles, specialist divers, and minesweeping cables to locate and neutralize the explosives.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/25/how-minesweeping-in-the-strait-of-hormuz-works-a-visual-guide?traffic_source=rss", "state_media": false, "category": "IT"}, {"title_ja": "ルビオ米国務長官、湾岸諸国にイラン合意が安全保障を確保すると表明", "title_en": "Rubio Reassures Gulf Allies That US-Iran Deal Will Protect Their Security", "summary_ja": "マルコ・ルビオ米国務長官はバーレーンで開催された湾岸アラブ諸国外相会議で、米イラン間のいかなる合意も同盟国の安全保障と繁栄を損なわないと伝えた。この3日間の湾岸歴訪は、2月28日に始まった戦争の停戦延長と恒久的終結に向けた協議を定めた米イラン覚書締結後、初の高レベル外交ミッションとなる。草案には弾道ミサイルへの制限がなく、3000億ドルの復興基金やイランの地域的影響力拡大につながる条項が含まれているとされる。", "summary_en": "Secretary of State Marco Rubio told Gulf Arab leaders in Bahrain that any US-Iran deal would account for their security and prosperity interests. His three-day Gulf tour follows a US-Iran Memorandum of Understanding extending their ceasefire and initiating talks toward a permanent end to the war that began February 28. The draft agreement reportedly includes no limits on Iran's ballistic missiles, a $300bn reconstruction fund, and provisions that could expand Tehran's regional influence.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/25/rubio-tells-gulf-allies-that-iran-deal-will-ensure-their-security?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "イスラエル、南レバノンからの部分撤退報道を否定", "title_en": "Israel Denies Report of Partial Withdrawal from Southern Lebanon", "summary_ja": "イスラエルは、南レバノンから部隊を部分的に撤退させたとする報道を否定した。イスラエル当局者は、兵力移動に関して流布している情報を公式に否定した。同地域での軍事作戦が続く中、現地の状況は依然として流動的であり、最新情報が随時更新されている。", "summary_en": "Israel has denied reports of a partial withdrawal of its forces from southern Lebanon. The denial came amid ongoing military operations in the region, with Israeli officials contradicting circulating claims about troop movements. The situation remains fluid as live updates continue to track developments on the ground.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMinwJBVV95cUxOaTV4TUlabTJzYzN6VHItdEhNTlRlNFA3ckxWUi1zSmh5RFhHNFJEWDQwMlNaMlVIVFVKdFFndThYTlA2YnhibTZJRFhlbHZyOVo4X29wUVdRTkV5ck9sMGlRRGN6M1AzSEhSSnljUHB1ZjFLSm5UWDdNUDhLVjR0V3l1bU5DLXFxYVNseW1ESFFBdjNoZ0NsVDdBeUV2aG9NWndkMWhQc21JT0h2UlZnYVZjeHBXQ1RUQkxUYVdGaDZaOFhsZ0dJNFRwTEZuTEk5N1NNUmRwTWUyZ3RFVHhsY2V6eE5aTlo5dU8zOTZ1SHBWbTdrdklEOThKcE1oVzVZNnFoZF9UQ1Z4WGVqRUlUbzcxS2Q5U2xXbXFrb1hhYw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イスラエルの軍事戦略は失敗した――なぜネタニヤフの反対派は声を上げられないのか", "title_en": "Israel's Military Strategy Has Failed. Why Won't Netanyahu's Opponents Admit It?", "summary_ja": "ハアレツ紙は、イスラエルのガザにおける軍事戦略が目標達成に失敗したと論じている。しかし、ネタニヤフ首相の政治的反対派はこの失敗を公然と認めることを避けている。記事では、反対派がこうした批判を表明しにくい政治的背景を分析している。", "summary_en": "Haaretz argues that Israel's military strategy in Gaza has failed to achieve its stated objectives. Despite this, Netanyahu's political opponents have been reluctant to openly acknowledge the failure. The piece examines the political dynamics that make it difficult for opposition figures to voice this criticism.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMingJBVV95cUxNb0FHUlBVVkhBaVExTTl3M1pWc3ZoTTc3V3lVODRhN2JsNHBfazlBWGF1TU80Q0Exc0Vld0xQVzY1STE2Sk9TMDd0TkRuUlVPNWJrZV9NYmpBVTZsQ2d2VUducjYwMkY1djlaV2M1T0tiZ0p6VDc1UnhRRDlDRVkteHA3dmhfYVl4aXY1X2tsdXh3NWNRdUd2MW01NkpjUkE0Y0hobXEwQUVBaXNPZzlXNElsaGxzQUFuZDNFd3kxWVZKWmdIVUVTamtPZlltZjIwWE12SnRJVUdLekU4d2VzSzJwNUdXQjFyd1I4VVZVLWtLcGN1S3F4d0dJSl9aZFNhQzlnOXREb2FEeUk3blUya0gyd3JPR1hFVFg1cHRn?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "米国でのAIPAC批判が危険な領域に突入", "title_en": "AIPAC-Bashing in America Has Moved Into Dangerous Territory", "summary_ja": "強力な親イスラエル圧力団体AIPACへの批判が、専門家や評論家が「危険」と呼ぶ水準にまで高まっている。同組織をめぐる言説は、正当な政策論争と反ユダヤ的な固定観念の境界線をますます曖昧にしつつある。イスラエル紙ハアレツは、この傾向が米国における市民的言論とユダヤ人コミュニティに深刻なリスクをもたらすと警告している。", "summary_en": "Criticism of AIPAC, the powerful pro-Israel lobbying group, has escalated to a level that analysts and commentators are calling dangerous. The rhetoric surrounding the organization has increasingly blurred the line between legitimate policy debate and antisemitic tropes. Haaretz warns that this trend poses serious risks to civil discourse and Jewish communities in the United States.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiiwJBVV95cUxPSzZKekZ3SUJOWUZrZzNSakN5X0k0c0hUY3ZtZk9RM0JXWUpBcWVQeVQzcnU1MktRV0lHOUtJMDVFNGU5cEtKc1hMZm1KMDE0dUE0WWVaaUJ2YjhMcjNPOHZxcU9WblpYMHBMSkFLR0dXcEhjUkVrbThnaEhabHB1Tzd0OHBJanVoNFEwQndUS3E0MmNlOGh5OENzd01uTGo2ZXJXbXE5QXZTbHRiUmxER04tU01JeGRKUnNPeFc5UHU3WXFPOVUwVEJzcEZjYnE0ZllWWHUtTHlXdE9LdWVnX1Q0NmNLYzdEeEF6WmtHVWo2VnFQdHc4azFnMEJTV2pqaVZoc3BVWUJXeHc?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "国防省ニュースレター更新 – 2026年6月25日", "title_en": "Mindef Newsletter Update – June 25, 2026", "summary_ja": "シンガポール国防省（Mindef）は、2026年6月25日木曜日にストレーツ・タイムズを通じてニュースレターを配信した。このニュースレターは、購読者向けのフォーマットされたメール通信として発行されたものである。読者はストレーツ・タイムズのプラットフォームを通じて、購読の管理や追加の無料ニュースレターへの登録を案内された。", "summary_en": "The Singapore Ministry of Defence (Mindef) released a newsletter update on Thursday, June 25, 2026, distributed via The Straits Times. The newsletter was flagged as a formatted email communication for subscribers. Readers were directed to manage their subscriptions or sign up for additional free newsletters through The Straits Times platform.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治"}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ", "title_en": "Evening Update – The Straits Times", "summary_ja": "ストレーツ・タイムズは2026年6月25日木曜日にイブニング・アップデート・ニュースレターを配信した。この夕刊ブリーフィングでは、その日の主要ニュースが厳選してまとめられている。読者はウェブサイトを通じて購読管理や追加の無料ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times published its Evening Update newsletter on Thursday, June 25, 2026. The briefing provides subscribers with a curated roundup of the day's top news stories. Readers can manage their subscription or sign up for additional free newsletters through the publication's website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治"}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズは2026年6月25日付けのモーニング・ブリーフィング・ニュースレターを配信した。このブリーフィングは購読者に毎日メールで届けられる日刊ダイジェストである。読者はストレーツ・タイムズのウェブサイトから購読管理や追加の無料ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times published its Morning Briefing newsletter on June 25, 2026. The briefing is a daily digest delivered via email to subscribers. Readers can manage their subscriptions or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治"}, {"title_ja": "私のすべて：ノンバイナリーになるための旅", "title_en": "All of Me: A Personal Journey of Becoming Nonbinary", "summary_ja": "ジャカルタ・ポスト紙に掲載されたこのエッセイは、ある人物がノンバイナリーとしてのアイデンティティを見出していく個人的な旅を描いている。伝統的な性別二元論の枠を超えたジェンダーアイデンティティを理解し受け入れるまでの感情的・社会的なプロセスが綴られている。インドネシアでノンバイナリーとして生きることの困難と自己発見が率直に語られている。", "summary_en": "A personal essay published in The Jakarta Post explores one individual's journey of identifying as nonbinary. The piece reflects on the emotional and social process of understanding and embracing a gender identity outside the traditional binary. It offers an intimate look at the challenges and self-discovery involved in living as a nonbinary person in Indonesia.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqAFBVV95cUxPdHhRQmxQVEZWS2xlOHNfdlZ6SURkRDFsUWxxRlJ1eVpjaEJEbkp6S2Jrcm14bFFoMUNQRzV3MEd6anI0Y1dRVFlMMTJIbWRqRENEWEp3RlNLVkpRRmZJb3FMRmdUNjF1VlRMcldqNWVDc0VET0thb293ZnBLNWF4eWpqRXJXbzNHRC1rTDI3N2kyZVlCdTRlWE9Pc21Wa0NiQVN4WndiZWU?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "持続可能性の建前と経済の現実：矛盾を解消できるか？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、途上国が直面する持続可能性への取り組みと経済的プレッシャーの間の高まる緊張を分析する。政府や企業はグリーンな言葉を掲げながらも、短期的な経済成長を優先する傾向があり、気候公約の誠実さに疑問が呈されている。環境目標と経済発展の要求を真に両立させることが可能かどうかを論じている。", "summary_en": "The Jakarta Post examines the growing tension between sustainability commitments and economic pressures facing developing nations. Governments and businesses often champion green rhetoric while prioritizing short-term economic growth, raising questions about the sincerity of climate pledges. The article explores whether it is genuinely possible to reconcile environmental goals with the demands of economic development.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "ブログ、マレーシアへの50万トンのコメ輸出4億5000万ドル契約を最終調整", "title_en": "Bulog Finalizing $450M Deal to Supply 500,000 Tonnes of Rice to Malaysia", "summary_ja": "インドネシアの国営物流機関ブログは、マレーシアへ50万トンのコメを輸出する4億5000万ドル規模の契約の最終調整を進めている。この取引は、インドネシアが地域のコメ輸出国としての地位を確立しようとする重要な一歩となる。両国間で契約の詳細が詰められている段階だ。", "summary_en": "Indonesian state logistics agency Bulog is in the final stages of a $450 million agreement to export 500,000 tonnes of rice to Malaysia. The deal marks a significant step in Indonesia's effort to position itself as a regional rice exporter. Details of the contract are being finalized between the two parties.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiwAFBVV95cUxQQ2tIV3BBMDBqa1FVVzRuMGlKMC1Zb0wxWVVoLVJEQTk2azZzZWFONC1oRjJlZG1fOGdMVFVUNUt5Y1ZCZWZOODRhcGFrOTFVVUtZeG1sc1hsdm03TkNPc3Zud3M4YUZLelo2bmViVGFoRzV2dXNNY0lUQWlyS0FmRmpRcFNVQzVrVnV2TmY0dFdiOXdYMXYyUWNIOFdjLWlaNlhwUV8zUXdKeGVnTTc5MmpyU2VQR2dQTENNV013eUk?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "「ニューデリーで出馬すれば100万票」メローニ首相、2023年インド訪問を回顧", "title_en": "Meloni recalls India welcome: 'You'd win a million votes in New Delhi'", "summary_ja": "イタリアのジョルジャ・メローニ首相は新著『ジョルジャのビジョン』の中で、2023年3月のインド訪問時にニューデリーの道路沿いに自身の顔写真入りポスターが並んでいたことを振り返り、同行したアントニオ・タヤーニ副首相から「ここで出馬すれば100万票取れる」と冗談を言われたと明かした。同書ではチュニジア大統領とのたばこ休憩やポーランドでの指輪物語カフェ訪問など、非公式な場での外交エピソードも紹介されている。ジャーナリストのアレッサンドロ・サルスティとの対話形式で構成され、J・D・ヴァンス米副大統領が序文を寄せており、ルパ出版から695ルピーで発売中だ。", "summary_en": "Italian Prime Minister Giorgia Meloni writes in her new book 'Giorgia's Vision' that during her March 2023 visit to India, roads in New Delhi were lined with posters of her face, prompting Deputy PM Antonio Tajani to joke she could win a million votes there. The book, structured as conversations with journalist Alessandro Sallusti, also recounts how Meloni built diplomatic relationships through informal moments such as cigarette breaks with Tunisia's president and a Lord of the Rings café visit in Warsaw. Published by Rupa Publications and priced at ₹695, the book includes a foreword by U.S. Vice President J.D. Vance.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/if-you-ran-in-new-delhi-youd-win-a-million-votes-giorgia-meloni-recalls-2023-india-visit/article71145838.ece", "state_media": false, "category": "社会"}, {"title_ja": "ベネズエラでM7.1とM7.5の連続地震、少なくとも164人死亡・971人負傷", "title_en": "Venezuela Twin Earthquakes Kill 164, Injure 971 as Magnitude 7.1 and 7.5 Tremors Strike", "summary_ja": "2026年6月24日、ベネズエラでマグニチュード7.1と7.5の強い地震が約1分間隔で相次いで発生し、少なくとも164人が死亡、971人が負傷した。首都カラカス近郊の国際空港が閉鎖されるなど広範囲に被害が及び、揺れはブラジルのアマゾン地域（約1,700km先）でも感知された。暫定大統領のデルシー・ロドリゲス氏は非常事態を宣言し、米国やブラジル、メキシコなど複数の国が支援を申し出た。", "summary_en": "Two powerful earthquakes measuring magnitudes 7.1 and 7.5 struck Venezuela within a minute of each other on June 24, 2026, killing at least 164 people and injuring 971. The back-to-back tremors, among the strongest to hit the country in over a century, caused widespread building collapses, closed Simón Bolívar International Airport, and were felt as far as Brazil's Amazon region. Acting President Delcy Rodríguez announced a state of emergency, while multiple nations including the United States, Brazil, and Mexico offered aid.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/venezuela-earthquakes-live-updates-terremoto-caracas-magnitude-7-tsunami-alert-damages-death-toll-live-updates-june-25-2026/article71144983.ece", "state_media": false, "category": "政治"}, {"title_ja": "イラン、ホルムズ海峡の通行を制限警告―イスラエルのレバノン撤退も否定", "title_en": "Israel-Lebanon Tensions Rise as Iran Threatens Strait of Hormuz Access", "summary_ja": "イラン革命防衛隊は、ホルムズ海峡を無許可で通過する船舶を「対処する」と警告し、米国務長官マルコ・ルビオはイランの通行料徴収が他の水路にも波及し「完全な混乱」を招くと牽制した。米当局者がイスラエルの南レバノンからの部分撤退を示唆したが、イスラエルとレバノンの高官はいずれもこれを否定した。一方、米上院共和党はトランプ大統領の圧力を受け、イラン関連の戦争権限決議を否決した。", "summary_en": "Iran's Revolutionary Guards warned that unauthorized vessels in the Strait of Hormuz 'will be dealt with,' prompting U.S. Secretary of State Marco Rubio to caution that Iranian tolls on shipping could spread chaos across global waterways. Senior Israeli and Lebanese officials denied reports of any Israeli troop withdrawal from southern Lebanon, contradicting a U.S. official's claim of a goodwill gesture. Meanwhile, U.S. Senate Republicans voted to reject a war powers resolution amid pressure from President Trump over his Iran war policy.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-iran-usa-israel-conflict-washington-tehran-peace-deal-donald-trump-strait-of-hormuz-live-updates-june-25-2026/article71144582.ece", "state_media": false, "category": "政治"}, {"title_ja": "国民党主席：「一つの中国」現状回帰が両岸対話再開の鍵", "title_en": "KMT Chief: Returning to 'One China' Status Quo Is Key to Resuming Cross-Strait Talks", "summary_ja": "台湾の主要野党・中国国民党（KMT）の主席は、北京との両岸対話を再開するためには「一つの中国」の現状に戻ることが不可欠だと述べた。国民党は引き続き「1992年コンセンサス」を対中関与の基盤として支持する姿勢を示している。この立場は、同コンセンサスの枠組みを拒否する与党・民主進歩党の方針と鋭く対立している。", "summary_en": "The head of Taiwan's main opposition party, the Kuomintang (KMT), has stated that returning to the 'one China' status quo is essential for restarting cross-strait dialogue with Beijing. The KMT leader's remarks signal the party's continued support for the 1992 Consensus as a foundation for engagement with China. This stance contrasts sharply with the ruling Democratic Progressive Party's position, which rejects the consensus framework.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5oTXhBLVZ3a1A3YnZSellabldoMlFWeWlZRzFSVjNEZWNBajFIQ19XTFZfVHFUR0RicHBoZzdQcW1rdDVsdFpHSW1CcEhYeWc5U3UzQmJsQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾がMQ-9B「スカイガーディアン」無人機のテストを開始", "title_en": "Taiwan Begins Testing MQ-9B SkyGuardian Drone", "summary_ja": "台湾が高性能無人航空機MQ-9B「スカイガーディアン」のテストを開始したことが、事情に詳しい関係者の話で明らかになった。この無人機は台湾の防衛能力強化の一環として評価が進められている。MQ-9Bは長時間飛行が可能な無人機で、監視・偵察任務に対応できる能力を持つ。", "summary_en": "Taiwan has begun testing the MQ-9B SkyGuardian drone, according to a source familiar with the matter. The advanced unmanned aerial vehicle is being evaluated as part of Taiwan's efforts to strengthen its defense capabilities. The MQ-9B is a long-endurance drone capable of surveillance and reconnaissance missions.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTFBZczFqSzVBSHUtN09KbDViLXhJSzdFMms1LTRFSE5RMmc5QXhfSzFXa3c3TjN2MzJjUlpzSC1YRkI1Qm9TNFhwQXBucnY1YWdtdGtxNXU0MA?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾、中国侵攻に備えた即応訓練を実施", "title_en": "Taiwan Conducts Quick Response Drill Against Possible Chinese Invasion", "summary_ja": "台湾は、中国による侵攻シナリオに備えた即応軍事訓練を実施している。この演習では、攻撃を受けた際に迅速に動員・対応する能力が試される。台湾海峡の緊張が高まる中、同訓練は台湾の防衛態勢強化に向けた継続的な取り組みの一環である。", "summary_en": "Taiwan is conducting a quick response military drill designed to prepare for a potential Chinese invasion. The exercise tests the island's ability to rapidly mobilize and respond to an attack scenario. Such drills are part of Taiwan's ongoing efforts to strengthen its defense readiness amid rising cross-strait tensions.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE44eEhRdDdJZS1JaW5oSThoTmhhaHZBQmZDRmVtallHdkRhVXJBNXdPSnkxcWlPdU5hblhMSGxRcjlYb3pqNjN0ZHFXU09WQ3c0NzdadjRQQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "コロンビア極右勝利でブラジルは南米の「左派孤島」に", "title_en": "Far-Right Win in Colombia Leaves Brazil as Left-Wing Outlier in South America", "summary_ja": "コロンビアの極右候補アベラルド・デ・ラ・エスプリエージャの勝利により、南米全体で保守化の波が加速し、ブラジルのルラ大統領は選挙4か月前に地域内で孤立する形となった。2022年に左派が主要国を席巻していた南米では、今やアルゼンチン、チリ、ペルーなど多くの国が右派・極右政権に転換している。エスプリエージャ氏の当選はミレイ大統領やトランプ前大統領らに歓迎され、トランプ氏は開票直後に同氏と電話会談を行ったと明らかにした。", "summary_en": "The far right's victory in Colombia deepens a conservative shift across South America, politically isolating Brazilian President Lula just four months before his country's elections. Where left-wing governments once dominated the region in 2022, countries including Colombia, Argentina, Chile, and Peru are now led by right-wing or far-right leaders. Colombia's president-elect Abelardo de la Espriella was celebrated by figures such as Javier Milei and Donald Trump, who spoke with him shortly after the results.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/with-far-right-in-colombia-brazil-is-a-left-wing-island-in-south-america.shtml", "state_media": false, "category": "政治"}, {"title_ja": "イタマラチー、トランプ氏の干渉を警戒——「ブラジルはベネズエラではない」", "title_en": "Itamaraty Fears Trump Interference but Insists Brazil Is Not Venezuela", "summary_ja": "ルラ政権はトランプ米大統領がブラジルの選挙に干渉する兆候を注視しており、外交筋はその意図が次第に明確になっていると指摘している。ルラ大統領はすでにトランプ氏に対し「ブラジルの選挙に干渉するな」と直接警告を発した。一方、政府内の一部はトランプ氏のシグナルが矛盾していると慎重な姿勢を示しており、同氏がルラ氏を好むと言いながらボルソナーロ一家を支持している点を問題視している。", "summary_en": "The Lula administration is closely monitoring signs of U.S. President Donald Trump's potential interference in Brazil's upcoming elections, with diplomats noting his intentions are becoming increasingly apparent. Lula has already issued a direct warning to Trump not to interfere, while some government allies call for an immediate response. However, a faction within the government urges caution, noting that Trump's signals remain contradictory, as he claims to like Lula while simultaneously defending the Bolsonaro family.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米当局「逮捕のブラジル人はCVとPCCの幹部」、しかし有罪判決に組織との関連なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC, but Court Records Show No Gang Ties", "summary_ja": "米移民・関税執行局（ICE）は月曜日、ノースカロライナ州でブラジル国籍のフェリペ・リナレス・デ・オリベイラ・デル・アキッラを逮捕し、米国土安全保障省は同人をブラジルの二大犯罪組織PCCおよびCVの「司令官」と主張した。しかしブラジルの裁判記録には麻薬密売・詐欺・恐喝での有罪判決が記されているものの、いずれの組織への言及も存在しない。同容疑者はブラジルの要請によるインターポール手配の対象であり、妻を車内に監禁していたとされる状況でメキシコへの逃亡を図ったとみられている。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested by ICE in North Carolina on Monday, with US authorities claiming he was a 'commander' of both the PCC and CV, two major Brazilian criminal organizations recently designated as terrorist groups by the US government. However, Brazilian court records showing prior convictions for drug trafficking, fraud, and extortion contain no mention of either organization. He was stopped during a traffic inspection in Mooresville while allegedly holding his wife inside the vehicle, and was subject to an Interpol warrant issued at Brazil's request.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ゼニスバンク、デルタ州オスビに初の商業銀行支店を開設", "title_en": "Zenith Bank Opens First-Ever Bank Branch in Osubi, Delta State", "summary_ja": "ゼニスバンクはデルタ州オクペ地方政府エリアのオスビに新支店を開設し、同地域初の商業銀行となった。開所式にはシェリフ・オボレウォリ知事が出席し、支店用地を寄贈するとともに、州への投資促進に向けた環境整備の成果として歓迎した。最高経営責任者のアダオラ・ウメオジ博士は、同支店がデルタ州19店舗目となり、金融包摂の推進と中小企業・女性起業家の支援に貢献すると述べた。", "summary_en": "Zenith Bank has opened its 19th branch in Delta State, becoming the first commercial bank to establish a presence in Osubi, Okpe Local Government Area. The commissioning ceremony was attended by Delta State Governor Sheriff Oborevwori, who donated the land for the branch and praised the move as a sign of investor confidence in the state. Zenith Bank CEO Dr Adaora Umeoji said the branch will drive financial inclusion and support individuals, women entrepreneurs, and SMEs in underserved communities.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/promoted/890619-zenith-bank-expands-delta-footprint-with-new-branch-in-osubi.html", "state_media": false, "category": "経済"}, {"title_ja": "ワイク大臣、2027年選挙に向けPDP候補者に「権力を勝ち取れ」と檄", "title_en": "Wike Urges PDP Candidates to Fight for Power Ahead of 2027 Elections", "summary_ja": "ナイジェリア連邦首都圏大臣のニョソム・ワイク氏は、アブジャで開催されたPDP第109回全国執行委員会で演説し、2027年総選挙に向けて党候補者たちに権力は与えられるものではなく自ら闘い取るものだと訴えた。同氏はPDPがもはや連邦政権与党ではないことを指摘し、惰性や依存体質からの脱却を求めた。また、タニム・トゥラキ派の対抗勢力による脅しを一蹴し、INECのアクセスコード付与が正統性を決定すると強調した。", "summary_en": "FCT Minister Nyesom Wike addressed PDP's 109th NEC meeting in Abuja, urging party candidates to be ready to struggle and fight for power rather than expect it to be handed to them ahead of the 2027 general elections. He warned members against complacency and 'food is ready' politics, reminding them that PDP is no longer the ruling party at the federal level. Wike also dismissed threats from a rival PDP faction led by Tanimu Turaki, saying INEC's access code allocation would determine which group fields legitimate candidates.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/890604-2027-be-prepared-to-struggle-for-power-wike-tells-pdp-candidates.html", "state_media": false, "category": "社会"}, {"title_ja": "ナイジェリア最高裁、7月1日に電子申請・訴訟管理システムを導入へ", "title_en": "Nigeria Supreme Court to Launch E-Filing and Case Management System on July 1", "summary_ja": "ナイジェリア最高裁判所は7月1日、電子申請システム（E-Filing）とナイジェリア訴訟管理システム（NCMS）を正式に稼働させると、カビル・アカンビ主任書記官が発表した。両システムはクディラト・ケケレ＝エクン最高裁長官によって公式に開始され、訴訟の申請・管理を電子化することで、効率性・透明性・司法へのアクセス向上を目指す。この取り組みは、紙ベースの業務からの脱却を図り、ナイジェリア司法の頂点に立つ最高裁の近代化を推進する重要な一歩となる。", "summary_en": "Nigeria's Supreme Court will formally launch an Electronic Filing System and the Nigeria Case Management System (NCMS) on July 1, as announced by Chief Registrar Kabir Akanbi. The platforms, to be unveiled by Chief Justice Kudirat Kekere-Ekun, aim to digitise case filing and management to improve efficiency, transparency, and access to justice. The move marks a significant step in modernising the country's apex court and reducing reliance on manual, paper-based processes.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/890615-supreme-court-to-launch-electronic-filing-system-case-management-platform.html", "state_media": false, "category": "社会"}, {"title_ja": "欧州7カ国がスーダンの暴力即時停止を要求、RSFがエル・オベイドを包囲", "title_en": "Seven European Nations Urge Immediate End to Violence as RSF Encircles Sudan's El-Obeid", "summary_ja": "CGTNによると、英国・フランス・ドイツ・アイルランド・イタリア・オランダ・ノルウェーの7カ国が共同声明を発表し、準軍事組織RSFが戦略都市エル・オベイドへの攻勢を準備しているとしてスーダンにおける暴力の即時停止を求めたと伝えている。CGTNによれば、国連当局者は人道支援が緊急に届かなければ同市は数週間以内に人道的災害に直面すると警告しており、包囲により食料価格が最大300%上昇し水も高騰しているという。CGTNは、支援機関が治安悪化により活動を停止しており、人道支援担当者が飢饉が宣言されたエル・ファシェルと同様の惨状になりかねないと警告していると報じている。", "summary_en": "CGTN reports that seven European countries — Britain, France, Germany, Ireland, Italy, the Netherlands, and Norway — have jointly called for an immediate halt to violence in Sudan, warning of an imminent RSF offensive on the strategic city of El-Obeid. CGTN reports that a UN official warned the city is only weeks away from humanitarian disaster, with food prices rising up to 300% and water becoming unaffordable due to the ongoing siege. CGTN reports that aid agencies have suspended missions amid worsening insecurity, with humanitarian officials cautioning that conditions could mirror the catastrophic siege of El-Fasher, where famine has already been declared.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-24/Seven-European-countries-call-for-immediate-halt-to-Sudan-violence-1Oel7HqA968/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "イスラエルとレバノン、領土返還の試験的枠組みをワシントンで協議", "title_en": "Israel and Lebanon Discuss Pilot Territory Handover Scheme in Washington Talks", "summary_ja": "CGTNによると、イスラエルとレバノンは米国が支持する試験的提案について協議しており、イスラエル軍が占領中のレバノン領土の一部から撤退しレバノン軍に管理を移譲する案がワシントンでの会談で議題となっている。CGTNによると、イスラエルのカッツ国防相は米国が求めても南レバノンから撤退しないと表明した一方、イランはレバノンからのイスラエル撤退を米国との暫定核合意の条件と主張しているという。CGTNによると、米国とイランはスイスでの協議後に停戦遵守を確保する「衝突回避セル」の設置で合意したとされる。", "summary_en": "CGTN reports that Israel and Lebanon are discussing a US-backed pilot proposal for Israeli forces to withdraw from parts of occupied Lebanese territory and hand control to the Lebanese army, in talks ongoing in Washington. CGTN reports that Israeli officials say Lebanese troops would undergo US training and vetting to screen out Hezbollah links, while Israeli Defence Minister Katz stated Israel would not withdraw from southern Lebanon even under US pressure. CGTN reports that Iran has insisted Lebanese withdrawal is part of its interim nuclear deal with the US, and a joint US-Iran statement referenced a 'de-confliction cell' to uphold the ceasefire.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-24/Israel-Lebanon-discussing-pilot-scheme-for-handover-of-territory-1Of257gxv5S/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "日本の学者ら、戦時中に持ち出された中国の文化財返還を訴え", "title_en": "Japanese Scholars Call for Return of Chinese Relics Looted During Wartime", "summary_ja": "CGTNは、日本の学者や市民活動家らが東京でシンポジウムを開き、戦時中に日本へ持ち出された中国の文化財の返還を政府に求めたと伝えている。同メディアによれば、参加者たちはヨーロッパ諸国が植民地時代の文物を返還している事例を挙げ、日本はいまだ侵略の歴史に向き合えていないと主張したとされる。特に唐代の鴻臚井碑の返還が求められているが、CGTNは日本政府がこれまで返還要請に積極的に応じていないと報じている。", "summary_en": "CGTN reports that a group of Japanese scholars and civic activists held a symposium in Tokyo urging their government to return Chinese cultural relics taken during wartime. The state media outlet reports that participants argued Japan has yet to reckon with its history of aggression, citing examples of European nations returning colonial-era artifacts, and specifically called for the repatriation of the Tang Dynasty Honglujing Stele, which CGTN reports was dismantled and shipped to Japan by a Japanese garrison administration in 1908. The Japanese government has not responded positively to repatriation requests, according to the report.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-21/Japanese-scholars-urge-return-of-Chinese-relics-looted-during-wartime-1O9Gqt5wWty/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "ベネズエラでM7.5の大地震後、少なくとも10回の余震を記録", "title_en": "Ten aftershocks recorded in Venezuela following major 7.5 magnitude earthquake", "summary_ja": "TASSによると、ベネズエラの地震研究財団Funvisisは6月24日に発生した大地震の後、少なくとも10回の余震を記録したと伝えられており、その多くはラグアイラ州とミランダ州でマグニチュード2.4から4.5の規模で発生したとされる。TASSの報道では、最初の地震はヤラクイ州でマグニチュード7.2と7.5の二つの揺れが40秒以内に相次いで発生したとされている。デルシー・ロドリゲス大統領代行は少なくとも32人が死亡、700人が負傷したと述べたとされており、当局は非常事態を宣言しラグアイラ州を災害地域に指定したと報じられている。", "summary_en": "TASS reports that Venezuela's seismological foundation Funvisis recorded at least ten aftershocks following a powerful earthquake on June 24, with most occurring in La Guaira and Miranda states at magnitudes between 2.4 and 4.5. TASS reports that the initial event involved two tremors of magnitudes 7.2 and 7.5 striking within 40 seconds in Yaracuy state. Acting President Delcy Rodriguez reportedly stated at least 32 people were killed and 700 injured, with authorities declaring a state of emergency and designating La Guaira a disaster zone.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/emergencies/2151475", "state_media": true, "category": "社会"}, {"title_ja": "プーチン大統領、安全保障会議で国内安定と近隣諸国との関係を協議", "title_en": "Putin Holds Security Council Meeting on Domestic Stability and Relations with Neighboring States", "summary_ja": "TASSによると、ロシアのプーチン大統領は安全保障会議の常任メンバーと会合を開き、国内の安全保障・安定と近隣諸国との関係という2つの議題を協議したと伝えられている。同メディアによれば、内政問題ではFSBのボルトニコフ長官と内務省のコロコルツェフ大臣が発言者として指名されたという。ミシュスチン首相やベロウソフ国防相、ラブロフ外相ら高官も出席したと報じられている。", "summary_en": "TASS reports that Russian President Vladimir Putin convened a meeting with permanent Security Council members to discuss two agenda items: domestic security and stability, and relations with neighboring countries. State media reports that FSB Director Alexander Bortnikov and Interior Minister Vladimir Kolokoltsev were named as speakers on internal matters. Senior officials including Prime Minister Mishustin, Defense Minister Belousov, and Foreign Minister Lavrov were also reportedly in attendance.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2151467", "state_media": true, "category": "政治"}, {"title_ja": "ロシアのYak-130M練習機、搭載機器を50%以上刷新し初飛行", "title_en": "Russia's Yak-130M Trainer Completes Debut Flight with Over 50% Upgraded Avionics", "summary_ja": "TASSによると、ロシアの近代化戦闘練習機Yak-130Mがイルクーツク航空機工場で初飛行を完了し、高度2,000メートル、速度600km/hで約50分間飛行したと報じられている。ロシア国営メディアは、同機の搭載機器が50%以上刷新され、現代的なレーダーや拡張された兵器システムが搭載されたと主張している。ロステックによれば、この改良により昼夜・全天候での訓練・戦闘任務への対応が可能になるとされている。", "summary_en": "TASS reports that Russia's modernized Yak-130M combat trainer aircraft has completed its first flight at the Irkutsk Aviation Plant, lasting approximately 50 minutes at altitudes up to 2,000 meters and speeds up to 600 km/h. State media claims the aircraft's onboard equipment has been renewed by over 50%, incorporating a modern radar, advanced onboard systems, and an expanded weapons suite capable of engaging both air and ground targets including heavy-class drones. Rostec reports that the upgrade is intended to enable training and combat operations in all weather conditions, day and night.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2151427", "state_media": true, "category": "社会"}, {"title_ja": "AI強化経済で恩恵を受けるのは誰か？", "title_en": "Who Gains in an AI-Supercharged Economy?", "summary_ja": "バンガードは2027年の米国GDP成長率を3%と予測しており、これは他の専門家予測を大きく上回る数字で、AIが汎用技術へと進化することが背景にある。筆者は、AIが投資フェーズを脱するにつれ、最大の経済的恩恵はAI開発者から幅広い産業のAI利用者へと移行すると主張する。これは過去の革新的技術が辿ってきた歴史的パターンと一致しており、経済成長の軌道における根本的な転換を示唆している。", "summary_en": "Vanguard projects 3% US GDP growth by 2027, significantly above consensus forecasts, driven by AI becoming a general-purpose technology. The author argues that as AI matures beyond its investment phase, the greatest economic rewards will shift from AI builders to AI users across the broader economy. This mirrors historical patterns seen with other transformative technologies and signals a fundamental shift in the economy's growth trajectory.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/ai-economic-growth-where-value-will-lie-by-joseph-h-davis-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "混乱の時代における開発：後発国はいかにして先進国を追い越すか", "title_en": "Development in a Time of Disruption", "summary_ja": "筆者は、途上国が先進国を模倣するだけでは真の意味での追いつきは実現できないという「キャッチアップのパラドックス」を提唱する。後発国が真に先進国を追い越すためには、新興技術を戦略的に活用して既存の技術体系を「リープフロッグ（段階を飛び越えること）」する必要があると論じる。現在の技術的混乱の時代は、こうした戦略を実行するうえで特に好条件が整っている可能性があるという。", "summary_en": "The author argues that developing countries cannot achieve true catch-up growth simply by imitating advanced economies, a contradiction they call the 'catch-up paradox.' Instead, latecomers should strategically leverage emerging technologies to leapfrog incumbent leaders rather than following their established paths. Current conditions of technological disruption may offer particularly favorable opportunities for such leapfrogging strategies.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/technological-disruption-could-create-opportunities-for-leapfrogging-development-by-keun-lee-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "トランプの「非アメリカ的」資本主義", "title_en": "Trump's Un-American Capitalism", "summary_ja": "筆者は、トランプ政権が実践する縁故資本主義は、アメリカの自由企業の根本原則に反すると主張する。優れた製品を生み出す企業ではなく、権力者に取り入ることが得意な者が勝者となる寡頭制的競争が蔓延しているという。トランプが社会主義の脅威を警告する一方で、共和党自身が真の資本主義を捨て去ったと筆者は指摘する。", "summary_en": "The author argues that Trump's administration practices a form of crony capitalism that contradicts the foundational principles of American free enterprise. Rather than rewarding innovation and competition, the system favors those who flatter and align with political power. The author contends that despite Trump's warnings about socialism, his own GOP has abandoned genuine capitalism in favor of oligarchic corruption.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/trump-thuggery-capitalism-corruption-cronyism-against-democracy-and-economic-growth-by-joseph-e-stiglitz-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "トランプ政権、連邦政策で冷凍胚を「子ども」と表現——胎児の人格権付与に向けた動きが加速", "title_en": "Trump Administration Labels Frozen Embryos 'Children' in Federal Policy Shift", "summary_ja": "トランプ政権は連邦助成金のガイドラインで冷凍胚を「子ども」と呼ぶ文言を静かに導入した。コラムニストのモイラ・ドネガンは、この表現の変更が胎児に憲法上の人格権を認めようとする反中絶派の主張に法的根拠を与え、体外受精や避妊手段にも深刻な影響を及ぼしかねないと論じる。また2024年にアラバマ州最高裁が冷凍胚を「人」と認定してIVFが一時停止に追い込まれた前例を引き、政権が中間選挙後に反中絶政策をさらに強化する可能性があると警告している。", "summary_en": "The Trump administration has quietly introduced language in federal grant guidelines referring to frozen embryos as 'children,' a move the author argues represents a significant escalation toward enshrining fetal personhood in law. Opinion writer Moira Donegan contends this rhetorical shift provides legal ammunition to anti-abortion groups and could ultimately threaten IVF access, contraception, and reproductive rights broadly—drawing parallels to the 2024 Alabama Supreme Court ruling that briefly halted IVF in the state. Donegan warns this may signal the administration is preparing to accelerate its anti-abortion agenda following the midterms.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/25/the-trump-administration-is-calling-frozen-embryos-children", "state_media": false, "category": "オピニオン"}, {"title_ja": "W杯など大型スポーツイベントが社会の分断を超える絆をもたらす", "title_en": "World Cup and Big Sports Events Can Bridge Social Divides, Recent Examples Show", "summary_ja": "コラムニストのマーガレット・サリバンは、大型スポーツイベントが文化的・社会的な壁を越えた連帯感と温かさをもたらす力を持つと主張する。スコットランドのW杯ファンとボストン市民の交流、ニックスの優勝がニューヨーク市民を一つにした出来事、そしてバッファローでアメリカ人観客がカナダ国歌を合唱した感動的な場面を具体例として挙げる。こうした瞬間は一時的なものであっても、分極化した世界において人々の共通の人間性を思い起こさせる持続的な力があると彼女は訴える。", "summary_en": "Opinion columnist Margaret Sullivan argues that major sporting events have demonstrated a rare power to foster unity and warmth across cultural and social divides. She cites three recent examples: Scottish World Cup fans bonding with Bostonians at Fenway Park, the let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  const sb=document.getElementById("d-state");
  sb.style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-25 12:10 JST";
renderTabs();renderList();
</script>
