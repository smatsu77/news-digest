const CATS = ["全て","政治","経済","IT","社会","オピニオン"];
const DATA = [{"title_ja": "ワールドカップの公式ボールはどのように進化してきたか", "title_en": "How the World Cup Ball Has Evolved Over the Decades", "summary_ja": "FIFAワールドカップの公式試合球は、スポーツ技術とデザインの進歩を反映しながら、大会の草創期から大きな変革を遂げてきた。大会ごとに新しい公式ボールが導入され、メーカーは空力特性や素材、構造の限界に挑み続けてきた。こうした革新は、国際サッカーの最高峰における試合のあり方にも影響を与えてきた。", "summary_en": "The FIFA World Cup match ball has undergone significant transformations since the tournament's early days, reflecting advances in sports technology and design. Each edition of the tournament has introduced a new official ball, with manufacturers pushing the boundaries of aerodynamics, materials, and construction. These innovations have shaped how the game is played at the highest level of international football.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMibkFVX3lxTE9iVFplek44QmV0bkx1SlFyeVh0V2JVNndRQVZzZWxOdER5RWQwUy1pQVh0QXJNNzlYWTNGN3M5NmlMVkMycFFjN2JDdGFxQW4yX2czSlp6Z25JQ3E5QVBsNGR0MWY0MlZUbEZNY1ZB?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "サラーがエジプトをニュージーランドに3-1の歴史的W杯勝利へ導く", "title_en": "Salah Inspires Egypt to Historic 3-1 World Cup Win Over New Zealand", "summary_ja": "モハメド・サラーの活躍により、エジプトがワールドカップでニュージーランドに3-1で勝利し、歴史的な一勝を収めた。この勝利はエジプトにとってサッカーの国際舞台における重要な節目となる。サラーの卓越したパフォーマンスが勝利の決め手となった。", "summary_en": "Mohamed Salah led Egypt to a historic 3-1 victory over New Zealand in World Cup action. The win marks a significant milestone for Egypt on the global football stage. Salah's inspired performance was central to securing the result for his nation.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMitAFBVV95cUxPTTBRRjNNNGhQOWRpbER4S2luSHFlaHBBZHdkNmM0c0xSamlLbXBQRldSdmZLdlVpcm5oc3B1dzdkdUhuVm4zVlhKOGc1d0k1VmJqMmR1dFNMVXFFUTU2NkVSY0ZOdnR0YW5Tbk1GbWtKMTBYTndPS2xDWVktYXZoM243alpxaWNJakIxY1FvNnFMVUZXU1hzQlNla0VCeUJhV01TT3lvdF9rLW8tTTJHQWxGaUY?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イランがベルギーとの引き分け後、LAのロッカールームに感謝のメモを残す", "title_en": "Iran Leave Thank-You Note in LA Locker Room After Draw with Belgium", "summary_ja": "イラン代表サッカーチームは、ベルギーとの引き分け試合の後、ロサンゼルスのロッカールームに感謝のメモを残した。このジェスチャーは、試合中に示されたホスピタリティへの感謝を示すものだった。両国間のスポーツマンシップの表れとして、この心温まる行動が注目を集めた。", "summary_en": "Iran's national football team left a note of thanks in their locker room in Los Angeles following a draw against Belgium. The gesture highlighted the team's appreciation for the hospitality shown during the match. The act of goodwill drew attention as a positive display of sportsmanship between the two nations.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMisAFBVV95cUxNMmdpVk8ySmlSOWJRQjJ3YXI5VGFKcm5DUkZab05LcjBXS2t4bG9yaFdORHJxcXRRc0Q5cGFPbG1tTlVfY3FSX1JwRXRMNEZydWxsVlZCMEN6MXRQTUhlZ00ydnBVMXZtZFRzTWp2WjBfM1ZBYlVHTFpQNVFGRVFvS1plRXY1ZXZBNHQtdjF5SEZ4NTRLRXVxQVFtYWJOdzVwRU5wS2p3ZkdmZWlOaUotZg?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ヴァンス副大統領、イランとの協議が停戦合意の「良い基盤」を築いたと表明", "title_en": "Vance Says Iran Talks Set 'Good Foundation' for Deal to End War", "summary_ja": "JDヴァンス米副大統領は、イラン当局者との最近の協議が戦争終結に向けた合意の「良い基盤」を築いたと述べた。この発言は、テヘランとの外交的進展に対する米国側の慎重な楽観論を示している。潜在的な合意の具体的な条件や時期については、詳細は明らかにされていない。", "summary_en": "Vice President JD Vance stated that recent talks with Iranian officials have laid a 'good foundation' for reaching a deal to end the ongoing conflict. The remarks suggest cautious optimism from the U.S. side regarding diplomatic progress with Tehran. No specific details about the terms or timeline of a potential agreement were immediately disclosed.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMipgFBVV95cUxQeUJQNlpPSVpIZmFCR1pnckJLd25Eblo1OERBRFdscDFOOUZHbURVM2tNd1hPaHo5aHIxeExhbGt5R2RxZjFDMWhENm9GQnpadlRNQVg4QTN4ODBwRUNuVGNYLUt3YUdBODJSTXpEZHF3QjN0Zk1iVlVzdnhEblh3N0JkZUNTU3Q5QmxKdUEwTVc5LUd2czMxTC1FQVpDdnVvaWg2Tkh3?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "スターマー英首相が辞意表明、バーナムが後継候補に名乗り", "title_en": "Starmer Announces Resignation as UK Prime Minister, Burnham Confirms Leadership Bid", "summary_ja": "英国のキア・スターマー首相が首相職を辞任すると発表した。アンディ・バーナム氏は労働党の党首選に出馬することを正式に表明した。この発表により、次期首相を決める党内指導者選挙が始まることになる。", "summary_en": "UK Prime Minister Keir Starmer has announced his resignation from the top government post. Andy Burnham has confirmed he will run to succeed Starmer as leader of the Labour Party. The announcement triggers a leadership contest within the party to determine Britain's next prime minister.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiswFBVV95cUxQNGtvWjFQWS1WTXM2ZkZHM0Jaei1QaEl4OF9NVXdQdEF1UVFPamVfX2VVd2ZkaDh0RG9OMTNIRUxBd3F2S0ZGWkl0Nzg1REc0b1pKQWFtb2hzZHFZaEpEZFV4UVBhWWV6YV9YdUNKVFNHdzBUUUFKb1RYczNKaTI4aVRWMDBCWU8yc3kyM29lNlUtR0ttTXhlZ01zZXVpT2hYNjlGZ3JKbGtKWVVSQkdTZXdyQQ?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "フランスで猛烈な熱波、死者も発生", "title_en": "France Endures Deadly Heat Wave as Temperatures Soar", "summary_ja": "フランスは今週、厳しい熱波に見舞われており、すでに複数の死者が報告されている。当局は住民に対し、高温への対策を講じるよう警告を発している。危険な暑さが続く中、緊急対応が行われており、公衆衛生やインフラへの影響が懸念されている。", "summary_en": "France is experiencing a severe heat wave that has already resulted in fatalities across the country. Authorities are warning residents to take precautions as punishing temperatures persist throughout the week. The deadly conditions have prompted emergency responses and raised concerns about public health and infrastructure.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMinwFBVV95cUxQTGhnZE1kNUxUcTJpWmdWMnhlRzhpN1kwZWRQOFRtSG9aUS0wNnBoaDdMSGtiOWtQWFFNOFI4dzNhUXpONllqMEhSZGsxMDJEd1R2ZE5yZHFnUDNlaVdqSkJHeVlac3JOb3V2WXFTQUVBRmJKYjNlQldVT0haRjFLMHVMNW1vVXNYNG5MZi1WS2ZqaW93SkxPUzg1dGhSM2s?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "米イラン協議が「前向きな進展」で閉幕、仲介国が60日間のロードマップを発表", "title_en": "US-Iran Talks End With 'Encouraging Progress,' Mediators Report 60-Day Roadmap", "summary_ja": "スイスで開催された米国とイランの第1回交渉が終了し、仲介国のカタールとパキスタンは「前向きな進展」があったと発表、60日以内の最終合意に向けたロードマップで両者が合意したと述べた。イランのアラグチー外相はレバノン紛争終結に向けた「大きな進展」を強調し、制裁解除や3000億ドルの復興計画、ホルムズ海峡の再開通などを含む覚書が先週署名された。一方、レバノンでは金曜日に新たな停戦が宣言されたものの、イスラエル軍とヒズボラの戦闘は続いており、イランの核問題も依然として未解決のままとなっている。", "summary_en": "The first round of US-Iran negotiations held in Switzerland concluded with mediators Qatar and Pakistan reporting 'encouraging progress' and an agreed roadmap toward a final deal within 60 days. Iran's foreign minister cited 'major progress' on ending the Lebanon conflict, with the signed MoU covering sanctions relief, a $300bn reconstruction plan, and reopening the Strait of Hormuz. However, fighting between Israeli forces and Hezbollah in southern Lebanon has continued despite a new ceasefire declared Friday, and Iran's nuclear program remains unresolved.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/cwy0q41v1lzo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "トランプ氏が支持したコロンビアの政治的新人、大統領選で勝利", "title_en": "Trump-Backed Outsider Abelardo de la Espriella Wins Colombia Presidential Election", "summary_ja": "右派の弁護士で政治経験のないアベラルド・デ・ラ・エスプリエャが、コロンビア大統領選決選投票で左派のイバン・セペダを僅差で破り、当選した。得票率はデ・ラ・エスプリエャが約49.7%、セペダが48.7%だった。ドナルド・トランプ大統領の支持を受けた同氏は、武装勢力や麻薬密売への軍事的な取り締まり強化を公約しており、ペトロ現政権からの大きな路線転換を意味する。セペダ氏は敗北を認めておらず、ペトロ大統領も不正の証拠を示さないまま投票ソフトウェアの監査を要求している。", "summary_en": "Right-wing lawyer and political outsider Abelardo de la Espriella has narrowly won Colombia's presidential runoff election, defeating left-wing candidate Iván Cepeda with nearly 49.7% of the vote to Cepeda's 48.7%. Endorsed by Donald Trump, de la Espriella has pledged a military crackdown on armed groups, drug trafficking, and crime, marking a sharp departure from outgoing President Gustavo Petro's approach. Cepeda has not yet conceded, and incumbent President Petro has called for an audit of voting software amid unverified allegations of irregularities.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/clye4ky2yzpo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "オーストラリア史上最大のコカイン押収：シドニーの地下バンカーから2.7トンを摘発", "title_en": "Australia's Largest Cocaine Bust: 2.7 Tonnes Seized from Underground Bunker in Sydney", "summary_ja": "オーストラリア連邦警察は、シドニー西部ロンドンデリーの敷地内にある輸送コンテナの二重床下に隠された地下バンカーから、末端価格8億1600万豪ドル相当のコカイン2.7トンを押収した。これはオーストラリア史上最大のコカイン摘発となる。現場で逃走を図った21歳と25歳の男2人が逮捕・起訴され、有罪となれば終身刑に処される可能性がある。この摘発は、5月に北クイーンズランド州のボートランプ付近で40kgのコカインが漂流しているのが発見されたことを機に始まった「ミンジャン作戦」の一環として行われた。", "summary_en": "Australian police seized 2.7 tonnes of cocaine worth A$816 million from an underground bunker hidden beneath false floors in shipping containers at a property in Londonderry, western Sydney. Two men aged 21 and 25 were arrested at the scene and face life in prison if convicted. The bust was part of Operation Minjiang, launched after 40kg of cocaine was found floating near a boat ramp in North Queensland in May.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/c14ygjzr8j7o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "インフレがナイジェリアの砂糖税を骨抜きにする", "title_en": "How Inflation Is Undermining Nigeria's Sugar Tax Policy", "summary_ja": "ナイジェリアは2022年に糖尿病などの生活習慣病対策として砂糖入り飲料に1リットルあたり10ナイラの課税を導入したが、急激なインフレにより税額はボトル小売価格のわずか2%にまで低下し、消費者行動への影響力を失っている。固定額課税のため物価上昇や製造コスト増に自動的に対応できず、メーカーが砂糖含有量を減らす動機にもなっていないと専門家は指摘する。保健当局者や公衆衛生の専門家は税率を1リットルあたり130ナイラに引き上げることを求めているが、飲料業界は雇用喪失を招くとして強く反発している。", "summary_en": "Nigeria introduced a 10 Naira per liter tax on sugar-sweetened beverages in 2022 to combat rising diabetes and diet-related diseases, but four years on, rampant inflation has eroded the levy to just 2% of a bottle's retail price. Experts argue the fixed, non-percentage-based tax fails to adjust for inflation or incentivize manufacturers to reduce sugar content. Health advocates are pushing to raise the tax to 130 Naira per liter, which could cut annual sugary drink consumption by 29%, though the beverage industry warns of potential job losses.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/how-inflation-undermines-nigeria-s-sugar-tax/a-77655043?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "経済"}, {"title_ja": "ゲーテ・インスティトゥート創立75周年：ドイツの世界的文化外交の歩み", "title_en": "75 Years of the Goethe-Institut: Germany's Global Cultural Diplomat", "summary_ja": "ゲーテ・インスティトゥートは2026年に創立75周年を迎え、1951年の小規模な語学研修団体から100カ国154拠点を擁するグローバルネットワークへと成長した。ウクライナなどの紛争地域でも活動を継続し、危機に瀕する市民社会の重要なパートナーとして自らを位置づけている。ドイツの中東政策をめぐる緊張など困難に直面しながらも、対話と相互理解の促進という使命を堅持している。", "summary_en": "The Goethe-Institut marks its 75th anniversary in 2026, having grown from a small language-training association founded in 1951 into a global network of 154 locations across 100 countries. Beyond promoting German language and culture, the institute has evolved into a partner for civil society in crisis regions, keeping branches open in conflict zones like Ukraine. Despite funding pressures and geopolitical challenges, including tensions over Germany's Middle East stance, it remains committed to dialogue, cultural exchange, and mutual learning.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/75-years-of-the-goethe-institut-germany-s-global-cultural-voice/a-77659551?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "アラン・グリーンスパン：「マエストロ」から金融危機の立役者へ", "title_en": "Alan Greenspan: From 'Maestro' of Monetary Policy to Architect of Financial Crisis", "summary_ja": "アラン・グリーンスパンは約20年間にわたり米連邦準備制度理事会（FRB）議長を務め、低金利政策で数々の経済危機を乗り越えたとして神話的な名声を誇った。しかし市場の自己規制能力への信奉と低金利の長期維持が、金融規制緩和や過剰債務を助長し、2007年の住宅バブル崩壊と世界金融危機の遠因となったと広く指摘されている。かつて「史上最高の中央銀行総裁」と称えられた彼の評判は、金融危機後に大きく傷ついた。", "summary_en": "Alan Greenspan served as Federal Reserve Chairman for nearly 20 years, earning near-mythical status for guiding the US economy through multiple crises using low interest rates. His belief in market self-regulation and policy of cheap money, however, contributed to the deregulation and debt build-up that fueled the 2007 housing bubble and subsequent global financial crisis. Once celebrated as the greatest central banker in history, his reputation was significantly damaged in the crisis's aftermath.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/alan-greenspan-irrational-exuberance-to-financial-crisis/a-77658667?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "スターマー英首相が辞任、バーナムが重要な支持を獲得し後継争いに参戦", "title_en": "Starmer Resigns as UK Prime Minister; Burnham Enters Leadership Race with Key Backing", "summary_ja": "英国のキア・スターマー首相が労働党党首を辞任し、与党内でリーダーシップ争いが始まった。労働党内で最も人気の高い政治家とされるアンディ・バーナム氏が首相の座を目指すと表明した。バーナム氏は早々に有力な対抗馬からの支持を取り付け、レースの最有力候補として浮上している。", "summary_en": "UK Prime Minister Keir Starmer has resigned as leader of the Labour Party, triggering a leadership contest within the governing party. Andy Burnham, widely regarded as Labour's most popular politician, has announced his bid for the prime ministership. Burnham strengthened his position early by securing the endorsement of a potential rival, making him an immediate frontrunner.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/22/world/uk-keir-starmer-resign-pressure", "state_media": false, "category": "政治"}, {"title_ja": "米・イラン核協議の第1ラウンド終了、バンス副大統領が進展を表明", "title_en": "Vance Claims Progress in U.S.-Iran Nuclear Talks After First Round of Negotiations", "summary_ja": "JDバンス米副大統領は、米・イラン交渉の第1ラウンド終了後、イランが国連の核査察官の受け入れに同意したと述べ、協議に進展があったと発表した。協議は月曜日に終了したが、イラン側はバンス副大統領の発言に対してすぐには反応を示さなかった。この動きは、イランの核開発問題をめぐる外交的取り組みにおいて重要な一歩となる可能性がある。", "summary_en": "Vice President JD Vance announced progress following the first round of U.S.-Iran negotiations, stating that Iran had agreed to allow U.N. nuclear inspectors back into the country. The talks concluded on Monday, though Iran had not immediately confirmed or commented on Vance's claims. The development marks a potentially significant diplomatic step in ongoing efforts to address Iran's nuclear program.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/22/world/iran-us-trump-lebanon", "state_media": false, "category": "政治"}, {"title_ja": "米イラン協議の第1回会合、期待と課題を残して終了", "title_en": "First Round of U.S.-Iran Talks Ends With Hope but Hurdles Remain", "summary_ja": "米国とイランの第1回交渉が終了し、仲介者らは60日以内に最終合意に達することへの楽観的な見方を示した。しかし、すでに解決済みとされていた問題に交渉担当者が多くの時間を費やしたことも明らかになった。協議は慎重ながらも前進の兆しを見せる一方、外交的な課題の複雑さも浮き彫りとなった。", "summary_en": "The first round of U.S.-Iran negotiations concluded with mediators expressing optimism about reaching a final deal within 60 days. However, officials acknowledged that negotiators spent significant time revisiting issues that were expected to have already been resolved. The talks reflect both cautious progress and the complexity of the diplomatic challenges ahead.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/22/world/europe/iran-us-peace-talks.html", "state_media": false, "category": "政治"}, {"title_ja": "人質合意の突破口開け、パレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を二分する軍事ゾーンを越えて避難民が北部へ戻ることを許可した。この動きは、人質解放をめぐる行き詰まりが打開されたことを受けたものである。紛争が続く中、民間人の域内移動において重要な転換点となっている。", "summary_en": "Israel permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The move came after a deadlock over hostage releases was resolved. The development marks a significant shift in the movement of civilians within the enclave amid the ongoing conflict.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治"}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Real Estate Crisis Concerns", "summary_ja": "中国の大手不動産デベロッパー、万科（バンケ）が巨額の損失を報告し、同国の不動産危機が引き続き拡大していることが浮き彫りとなった。万科の経営悪化は、中国不動産セクター全体の健全性に対する懸念をさらに高めている。中国政府が事態収拾のために介入するかどうか、市場関係者は固唾をのんで見守っている。", "summary_en": "Leading Chinese property developer Vanke has reported a massive financial loss, signaling that the country's real estate crisis continues to deepen and spread. The troubled developer's situation raises critical questions about the broader health of China's property sector. Observers are now watching closely to see whether the Chinese government will intervene to prevent further contagion.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会"}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Their Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による破片がいまだ残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性は長期間にわたり単独で拘束され、約8カ月間を地下トンネルの中で過ごしたという。これらの事実は、人質たちが受けた深刻な肉体的・精神的苦痛を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women had been held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The disclosures highlight the severe physical and psychological toll endured by those held captive.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会"}, {"title_ja": "世界最大のウルトラマラソン「コムレーズ」に2万人が挑戦", "title_en": "Sweat and Camaraderie: 20,000 Runners Take On the World's Largest Ultramarathon", "summary_ja": "6月14日、南アフリカのダーバンで世界最古かつ最大のウルトラマラソン「コムレーズ・マラソン」が開催され、2万人以上のランナーが約88キロの道のりをピーターマリッツバーグまで12時間以内に完走しようと挑んだ。1921年に白人男性34人で始まったこのレースは、1975年に人種・性別の制限が撤廃され、今では人種や社会的格差を超えた南アフリカの国民的行事へと成長した。離婚後の苦境から立ち直るために走り始めたウィリアム・セレカのように、多くの市井の人々がそれぞれの思いを胸にスタートラインに立った。", "summary_en": "More than 20,000 runners gathered in Durban on 14 June to compete in the Comrades Marathon, the world's oldest and largest ultramarathon, covering nearly 55 miles uphill to Pietermaritzburg within a 12-hour cutoff. First held in 1921 with 34 white men, the race was desegregated in 1975 and has since grown into a beloved South African institution that transcends racial and social divides. Participants like William Seleka, who took up running to cope with personal hardship, exemplify how the race inspires ordinary people across the country.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/21/comrades-ultramarathon-south-africa", "state_media": false, "category": "社会"}, {"title_ja": "ガーナ会議、大西洋奴隷貿易への正式謝罪を求める賠償的正義の国際枠組みを採択", "title_en": "Ghana Conference Adopts Global Framework Calling for Formal Apologies Over Transatlantic Slave Trade", "summary_ja": "ガーナの首都アクラで開催された3日間の国際会議で、アフリカおよびカリブ海諸国の首脳らが賠償的正義に関する19項目の世界的枠組みを正式に採択した。この枠組みは、大西洋奴隷貿易から利益を得た国々に対する無条件の公式謝罪、アフリカ系子孫への適正な補償、そして文化財や人骨の返還などを求めている。また、奴隷貿易を人道に対する最も重大な犯罪と認定した国連決議を受け、賠償的正義と文化財返還に関する3つの国際パネルも設置された。", "summary_en": "A three-day conference in Accra, Ghana concluded with leaders from Africa and the Caribbean formally adopting a 19-point global framework for reparatory justice. The framework calls for unconditional apologies from nations that benefited from the transatlantic slave trade, fair compensation for people of African descent, and the return of cultural property to countries of origin. Three global panels on reparatory justice and restitution were also established, building on a landmark UN resolution recognizing the trafficking of enslaved Africans as the gravest crime against humanity.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/news/2026/jun/19/global-framework-reparations-justice-adopted-at-landmark-conference-in-accra-ghana", "state_media": false, "category": "政治"}, {"title_ja": "CDCがコンゴとウガンダのエボラ対応に1億700万ドルの緊急資金を投入", "title_en": "CDC Allocates $107M in Emergency Funding to Combat Ebola Outbreak in DRC and Uganda", "summary_ja": "米疾病対策センター（CDC）は、コンゴ民主共和国とウガンダで拡大するエボラ出血熱の感染拡大に対応するため、1億700万ドルの緊急資金を投入すると発表した。今回の流行は記録上3番目に大規模で、致死率30〜50%の希少なブンジブグヨウイルス病が原因であり、アフリカの保健当局は過去最悪の事態になる恐れがあると警告している。空気感染しない疾患のため世界的なリスクは低いものの、資金不足や住民の不信感、物資の不足が封じ込め活動の妨げとなっている。", "summary_en": "The CDC is deploying $107 million in emergency funding to respond to a growing Ebola outbreak in the Democratic Republic of the Congo and Uganda, now the third largest on record with nearly 1,000 confirmed cases across 31 health zones. The outbreak involves Bundibugyo viral disease, a rare Ebola strain with a 30–50% fatality rate, and African health officials warn it could become the worst ever recorded. While global risk remains low due to the disease's non-airborne transmission, response efforts are hampered by donor funding shortfalls, mistrust, and equipment shortages.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/us-news/2026/jun/18/cdc-emergency-ebola-funding", "state_media": false, "category": "社会"}, {"title_ja": "独裁国家が台頭する新たな国際調停勢力", "title_en": "Autocracies Are Replacing Democracies as the World's New Conflict Mediators", "summary_ja": "これまで民主主義国家や国際機関が担ってきた紛争調停の役割を、権威主義的な国家が急速に引き受けるようになっている。こうした独裁国家が仲介する和平合意は、その構造や内容において民主主義国家が主導するものとは大きく異なる傾向がある。この変化は、平和の持続性や説明責任、国際規範の行方に対して深刻な問いを投げかけている。", "summary_en": "Authoritarian states are increasingly stepping into the role of conflict mediators on the global stage, a role traditionally held by democratic nations and multilateral institutions. The deals brokered by these autocracies tend to look markedly different in structure and outcome from those negotiated by liberal democracies. This shift raises serious questions about the long-term implications for peace, accountability, and international norms.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会"}, {"title_ja": "アジアの同盟国はトランプ氏を抱き込むしかない", "title_en": "Asian Allies Must Embrace Trump Despite Reservations", "summary_ja": "日本をはじめとするアジアの同盟国は、トランプ政権下でも米国との緊密な関係を維持せざるを得ない状況にある。中国の脅威を抑止できる代替的な安全保障の枠組みは存在せず、中堅国連合という構想も現実的ではないことが明らかになっている。アジア諸国は安全保障の傘を守るため、トランプ氏の要求に応じることを余儀なくされている。", "summary_en": "Japan and other Asian allies have little choice but to maintain close ties with the United States under Donald Trump, as no alternative security arrangement can match American deterrence against China. The idea of middle-power coalitions as a substitute for the US alliance has proven unrealistic. Asian nations are therefore compelled to accommodate Trump's demands to preserve the security umbrella they depend on.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会"}, {"title_ja": "ワールドカップ優勝の秘訣：富裕さより移民受け入れが効果的", "title_en": "How to Win the World Cup: Wealth Helps, But Immigration Helps More", "summary_ja": "新たな分析によると、国の経済力はワールドカップでの成功に有利に働くが、移民への開放性はさらに強力な成功予測因子であることが示された。外国生まれの選手をチームに受け入れる国は、自国出身の選手のみに頼る国を一貫して上回る成績を収めている。この発見は、サッカーの強豪国が純粋に経済力によって決まるという従来の通説に疑問を投げかけるものだ。", "summary_en": "A new analysis suggests that national wealth gives countries an advantage in football's World Cup, but openness to immigration proves to be an even stronger predictor of success. Nations that welcome foreign-born players into their squads consistently outperform those that rely solely on native talent. The findings challenge traditional assumptions about football dominance being tied purely to a country's economic resources.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/10/how-to-win-the-world-cup", "state_media": false, "category": "社会"}, {"title_ja": "大統領候補者たち、気候変動適応の課題から目を背ける", "title_en": "Presidential Candidates in Denial About Climate Change Adaptation Challenges", "summary_ja": "ル・モンド紙によると、大統領候補者たちは気候変動への適応という重大な課題に対して十分に向き合えていないと指摘されている。温暖化による避けられない影響に社会や経済をどう備えさせるか、具体的な政策提案が候補者から示されていないことが批判されている。この問題の回避や否認は、気候政策の将来について専門家や活動家の間で懸念を高めている。", "summary_en": "According to Le Monde, presidential candidates are failing to adequately address the significant challenges posed by climate change adaptation. The article critiques the lack of serious policy proposals from candidates on how to prepare societies and economies for the unavoidable impacts of a warming planet. This denial or avoidance of the issue raises concerns among climate experts and advocates about the future of climate policy.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/article/2026/06/22/politicians-and-presidential-candidates-remain-in-denial-about-the-challenges-of-adapting-to-global-warming_6754740_114.html", "state_media": false, "category": "政治"}, {"title_ja": "英国首相キア・スターマー氏が辞任を表明", "title_en": "UK Prime Minister Keir Starmer Announces Resignation", "summary_ja": "フランス紙ル・モンドの報道によると、英国のキア・スターマー首相が辞任を表明した。ただし、ソース記事のコンテンツ読み込みエラーにより、辞任の経緯や時期などの詳細は確認できていない。事実であれば、英国政治に重大な変化をもたらす出来事となる。", "summary_en": "UK Prime Minister Keir Starmer has announced his resignation, according to a report by Le Monde. Further details about the circumstances and timing of his departure were not available due to a content loading error in the source article. This development would mark a significant shift in British politics if confirmed.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/22/uk-prime-minister-keir-starmer-announces-resignation_6754736_4.html", "state_media": false, "category": "政治"}, {"title_ja": "経済学者ブランコ・ミラノヴィッチ氏：「新自由主義イデオロギーへの回帰はない」", "title_en": "Economist Branko Milanovic: 'Neoliberal ideology will not return'", "summary_ja": "著名な経済学者ブランコ・ミラノヴィッチ氏は、新自由主義イデオロギーの時代は完全に終わったと主張している。ル・モンド紙とのインタビューで、拡大する格差、地政学的変化、グローバリゼーションの失敗が経済・政治の構造を恒久的に変えたと指摘した。今後は国家が経済においてより大きな役割を担うとし、ワシントン・コンセンサスの時代との明確な決別を示唆している。", "summary_en": "Renowned economist Branko Milanovic argues that the era of neoliberal ideology is definitively over. In an interview with Le Monde, he contends that rising inequality, geopolitical shifts, and the failures of globalization have permanently altered the economic and political landscape. He suggests that states will play a larger role in economies going forward, marking a clear break from the Washington Consensus era.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/opinion/article/2026/06/22/branko-milanovic-economist-there-will-be-no-return-to-neoliberal-ideology_6754731_23.html", "state_media": false, "category": "経済"}, {"title_ja": "中国、米国10社を輸出規制リストに追加――ペンタゴンのブラックリストへの報復措置", "title_en": "China Adds 10 US Firms to Export Control List in Retaliation for Pentagon Blacklist", "summary_ja": "中国商務部は、レアアース採掘会社MPマテリアルズを含む米国企業10社を輸出規制リストに追加し、中国企業がこれらの企業へデュアルユース品目を輸出することを禁じた。また財政部は、ロッキード・マーティンやボーイングなど米国防関連企業の子会社を含む約50社を政府調達の対象から除外した。専門家はこの措置を、米国防総省がアリババやバイドゥなど中国大手約80社をブラックリストに加えたことへの対抗措置と見ており、さらなる報復合戦が続く可能性があると警告している。", "summary_en": "China's Ministry of Commerce has added 10 US companies, including rare-earth miner MP Materials Corp, to its export control list, banning Chinese firms from exporting dual-use goods to them. A separate order bars Chinese government procurement from nearly 50 US firms, including subsidiaries of Lockheed Martin, Boeing, and General Dynamics. Analysts describe the move as a tit-for-tat response to the Pentagon's June blacklisting of roughly 80 Chinese companies, including Alibaba, Baidu, and BYD, and warn further escalation is likely.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/22/china-adds-10-us-firms-including-rare-earth-miner-to-export-control-list?traffic_source=rss", "state_media": false, "category": "経済"}, {"title_ja": "パキスタン、大雨・洪水の恐れで全国警戒令を発令", "title_en": "Pakistan Issues Nationwide Alert Over Heavy Rains and Flood Risks", "summary_ja": "パキスタン国家災害管理局（NDMA）は、全国に雷雨・豪雨・都市型洪水および氷河湖決壊洪水（GLOF）への警戒を呼びかける全国警報を発令した。同国は4年連続で壊滅的なモンスーンに見舞われる恐れがあり、ギルギット・バルティスタン州やカイバル・パクトゥンクワ州、首都イスラマバードなどが特に脆弱な地域として挙げられている。記録的な高温による急速な氷河融解が洪水リスクを高める一方、2022年の大洪水からの復興支援には依然として大きな資金不足が続いている。", "summary_en": "Pakistan's National Disaster Management Authority issued a nationwide alert warning of thunderstorms, heavy rainfall, urban flooding, and glacial lake outburst floods across the country. The warning comes as Pakistan braces for a likely fourth consecutive year of devastating monsoon rains, with the most vulnerable areas including Gilgit-Baltistan, Khyber Pakhtunkhwa, Islamabad, and Rawalpindi. The country, home to 13,000 glaciers, faces accelerating glacial melt driven by record temperatures, while a significant funding gap has hampered recovery from the catastrophic 2022 floods.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/22/pakistan-issues-nationwide-alert-over-fears-of-heavy-rains-floods?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "極右デ・ラ・エスプリエリャ氏、僅差でコロンビア大統領選に勝利", "title_en": "Far-right De la Espriella wins Colombia presidency in razor-thin victory", "summary_ja": "トランプ米大統領の支持を受けた極右の富豪アベラルド・デ・ラ・エスプリエリャ氏（47）が、得票率49.66%で左派のイバン・セペダ上院議員を約25万票差で破り、コロンビア大統領選に勝利した。コロンビアで初の左派大統領グスタボ・ペトロが誕生してからわずか4年で、同国は大きく右傾化したことになる。デ・ラ・エスプリエリャ氏はイスラエルとの外交関係の回復や在エルサレム大使館の設置、ペトロ政権の経済・安全保障政策の刷新を公約に掲げている。", "summary_en": "Far-right millionaire Abelardo de la Espriella, endorsed by Donald Trump, has won Colombia's presidential election with 49.66 percent of the vote, narrowly defeating left-wing Senator Ivan Cepeda by roughly 250,000 votes. The result marks a sharp ideological shift just four years after Colombia elected its first-ever leftist president, Gustavo Petro. De la Espriella has pledged to restore ties with Israel, move the Colombian embassy to Jerusalem, and overhaul Petro's economic and security policies.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/22/far-right-de-la-espriella-elected-colombia-president-whats-next?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "キア・スターマーのイスラエル政策の遺産：パレスチナ承認と入植者制裁", "title_en": "Keir Starmer's Legacy on Israel: Palestine Recognition and Settler Sanctions", "summary_ja": "英国のキア・スターマー首相は、イスラエル・パレスチナ紛争に関して在任中に注目すべき政策的遺産を残した。その政策にはパレスチナ国家の承認やヨルダン川西岸のイスラエル入植者への制裁が含まれる。これらの措置は、英国の中東地域に対する外交政策の大きな転換を示している。", "summary_en": "British Prime Minister Keir Starmer has shaped a notable legacy regarding the Israel-Palestine conflict during his tenure. His policies have included recognizing Palestinian statehood and imposing sanctions on Israeli settlers in the West Bank. These moves mark a significant shift in UK foreign policy toward the region.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikAJBVV95cUxPMTNZTUkzemZtczg2NVNNLVZYQ3U4dVQxT3lvbW03bnFMNHM0anBNcURuVUdXU2dMTlZDcldKQVpYYXVZaGw1ZkVlOUViUmZhSnBjeUVmN3pGRENEbEV3UEgwblpjelNJZHBHYzczSXZrNGhYLV9xcjR3SjdMbXdUeTVzN2s0aTJSc3F6dGplNGZYQV9FbFFLUXY1RUNIYk1XampacTBPWXdBdEJPQmViMGR2dW1uS2dZcm5LY1k3YkNDOWtSa0NNb18tOWo5UThlQVh1cktUZklYSkJ6eW5SUUJId0dqSEFSZWk5cXQ5LWlKSmZ5QmE0cTJURUZGWHJEam5DUG9lMWFORHBUOE93ZQ?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "著名なレバノンのウミガメ保護活動家、ティルス近郊でIDF攻撃により死亡", "title_en": "Renowned Lebanese Sea Turtle Conservationist Killed in IDF Strike Near Tyre", "summary_ja": "レバノン南部の都市ティルス近郊で、ウミガメの保護活動で知られるレバノン人活動家がイスラエル国防軍の攻撃により死亡した。この出来事は、環境保護に従事する市民を含む一般市民への紛争の深刻な影響を浮き彫りにしている。イスラエルのメディア「ハアレツ」がこの攻撃の詳細を報じた。", "summary_en": "A well-known Lebanese conservationist dedicated to protecting sea turtles was killed in an Israeli Defense Forces airstrike near the southern Lebanese city of Tyre. The death highlights the human toll of the ongoing conflict on civilians, including environmental advocates working in the region. Details about the specific circumstances of the strike were reported by Haaretz.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiogJBVV95cUxOc3dwNWFGWldTOUY0YlktQVVKVzFIYXpKVERvOXlvblVucFYwODhUc1QzLXVIR1NvdU1mMlhzb3ZUVnQtN2tYY2J3T0VxdmJ4LS0tNWtWTV8zQ3puOVFqbU5DOHN2cnJBTW9ucW1YcFFwX2VqSlB2dk9rYnltV0FhUFcwa1gzUWlHTExHYUY1azZabWJONEM0SXVrVS1MZjgtRV81czRGZGZZVzdmMzhwSGplTm8tVHpOY3JBZDdPMFZrR3BMY1M3S01KMGlhTWlNandtTjMxSWNDNnFuczF4NEp6RkUxX2tjZWh1aDJqNjFJZGVpX2NPM3VOTzB4bFhYak5FSGNORFY0dlVRMXRlRWZ4MkFaUXhoQjljTVhzSU52QQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "AIPACのアイデンティティ危機：オバマ政権とのイラン核合意を巡る対立から10年、今度はトランプと向き合う", "title_en": "AIPAC Identity Crisis: A Decade After Fighting Obama on Iran, It Now Faces Trump", "summary_ja": "強力な親イスラエル・ロビー団体であるAIPACは、トランプ政権下の政治環境において深刻なアイデンティティ危機に直面している。オバマ政権のイラン核合意に対して高知名度の戦いを繰り広げてから10年が経過し、今度は予想外の形で米国外交政策を塗り替えた共和党政権との関係を模索しなければならない状況だ。イスラエルをめぐる米国政治の二極化が進む中、同団体が長年維持してきた超党派戦略は岐路に立たされている。", "summary_en": "AIPAC, the powerful pro-Israel lobbying group, is facing an identity crisis as it confronts a challenging political landscape under President Trump. A decade after its high-profile battle against the Obama administration's Iran nuclear deal, the organization now must navigate tensions with a Republican administration that has reshaped U.S. foreign policy in unexpected ways. The group's traditional bipartisan strategy is under strain as American politics grows increasingly polarized around Israel policy.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiigJBVV95cUxPMFlmQlNyM3VmZnZOUm9DY2pjR2YzZnZqd1JHNU15NzlPTUlsbVdhLWRIWHZMaG14TUhDY1BiTXhTQlhpeklVSmYxeWE2amFtazUyVG1ad0luc3JoZlpKTWs0Mmh5ejduVGF0bl80YkFSWElEa25XR0hQZFpCSE81ODlVaVZJeVdjRWpQSjdDMkx5dWVQdmRSMElPeXRUUGd6TDF2YjRicElrZ3R0dUNqN253bzM4U0NvZkhvc1JCcy14UWZBWnpkb3dOZXdDcjJBZzR6eXJUby1oSlRDSkNxVkExSEZmWTlOMmgzQUpBVE9CS2pGVHZrWFBMNmpOQlFHQlphVm96eU5TZw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "国防省ニュースレター更新 – 2026年6月22日", "title_en": "Mindef Newsletter Update – June 22, 2026", "summary_ja": "シンガポール国防省（Mindef）は2026年6月22日（月）、ストレーツ・タイムズのニュースレターを通じて最新情報を配信した。この通知は定期メールニュースレターサービスの一環として送付されたものである。読者はストレーツ・タイムズのプラットフォームから購読管理や追加の無料ニュースレター登録を行うよう案内された。", "summary_en": "The Singapore Ministry of Defence (Mindef) released an update via The Straits Times newsletter on Monday, June 22, 2026. The communication was distributed as part of a regular email newsletter service. Readers were directed to manage their subscriptions or sign up for additional free newsletters through The Straits Times platform.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治"}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ・ニュースレター", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "ストレーツ・タイムズは、その日の主要ニュースをまとめたイブニング・アップデート・ニュースレターを配信した。このニュースレターは、読者向けに提供されている無料メール配信サービスの一環である。読者はリンクを通じて、購読の管理や追加ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times publishes its Evening Update newsletter, delivering a curated summary of the day's top news. The edition is part of the publication's ongoing free newsletter service available to readers. Subscribers can manage their preferences or sign up for additional newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治"}, {"title_ja": "ストレーツ・タイムズ モーニングブリーフィング", "title_en": "The Straits Times Morning Briefing", "summary_ja": "ストレーツ・タイムズは定期的なモーニングブリーフィングニュースレターを配信した。このブリーフィングは、主要ニュースをまとめたメール形式のダイジェストである。読者はウェブサイトを通じて、ニュースレターの購読管理や追加の無料ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times published its Morning Briefing newsletter edition. The briefing is a regular email digest offering readers a summary of top news stories. Subscribers can manage their newsletter preferences or sign up for additional free newsletters through the publication's website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治"}, {"title_ja": "私のすべて：ノンバイナリーになるための旅", "title_en": "All of Me: A Personal Journey of Becoming Nonbinary", "summary_ja": "ある人物が、従来の性別規範を超えたノンバイナリーとしてのアイデンティティを見つけるまでの個人的な旅を語る。自己発見と受容の過程、そして厳格な性別観を持つ社会の中でアイデンティティを模索する複雑さが描かれている。ジャカルタ・ポストに掲載されたこの記事は、インドネシアにおけるジェンダーの多様性をめぐる議論の高まりを反映している。", "summary_en": "An individual shares their personal journey of identifying as nonbinary, exploring the emotional and social challenges of stepping outside traditional gender norms. The story reflects on self-discovery, acceptance, and the complexities of navigating identity in a society with rigid gender expectations. Published in The Jakarta Post, the piece highlights growing conversations around gender diversity in Indonesia.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi4gFBVV95cUxNNkgwVTF5OUdUSTMtRzNmT0hIQTNkNjJPREcyX3RINGlIbEo5SEZmMDR6SnhITHROako0bjhIcndxTTFEM2o3RXFWbDUzV0I4UThqeV9XRTlWRXJ1SnlDaFF4YTFTeUFSa3JsLURiMlk5NHc3UW5nTUJ5YnFKTjQxNUNqR2s2LWhtU1ZhLWJHZWtMS0pVSmRLcUJaQ2NLcUh2Y2huSGhONGs5dXY2bGlGTUx6Q1o1ODR6TGYxbFhUelQ3S2tOQkNBcXZ1Y1VFYUFhN0l3TVRBUFhYbmNMY1RxX1RR?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "スラウェシの古代洞窟壁画がヨーロッパ中心の先史時代観を覆す", "title_en": "Sulawesi's Ancient Cave Art Challenges Europe's Monopoly on Prehistoric Creativity", "summary_ja": "インドネシアのスラウェシ島で発見された古代洞窟壁画が、先史時代の人類の創造性に関する従来の定説を塗り替えつつある。これらの発見は、芸術表現の起源がヨーロッパに限定されるものではなく、東南アジアでも同時期あるいはそれ以前に独自に発展していたことを示唆している。この発見は、先史時代の芸術と人類の認知進化の研究を長年支配してきたヨーロッパ中心主義的な見方に根本的な疑問を投げかけている。", "summary_en": "Recent discoveries of ancient cave art in Sulawesi, Indonesia, are reshaping our understanding of prehistoric human creativity. The findings suggest that early artistic expression was not exclusive to Europe, as long believed, but emerged independently in Southeast Asia at comparable or even earlier dates. This challenges the Eurocentric narrative that has long dominated the study of prehistoric art and human cognitive evolution.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMitgFBVV95cUxQdE95UzFpM09BSDdSUV90b0Jxc3BUMHY4azRnRE1DWTZrSVl0QXcxeDJheHFWUFp5WmI4c3UwWU1UWTV1Y2E5czdsTmVxblFvV1V6a1htR2dHUU9VbzB0Q3h1dUlzV09HbkVuaUNGU0JZR2VINmI1RnpKOW1vanhzODBCZEtZWkhVU210SGZmTGw4RkRqUzBhMi1PQl9OVzUweG1mS0xXd3haX0c0VDBCOENEb1NmUQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ブログ、インドネシア産米50万トンのマレーシア向け4億5000万ドル契約を最終調整", "title_en": "Bulog Finalizing $450M Malaysian Deal for 500,000 Tonnes of Indonesian Rice", "summary_ja": "インドネシアの国家物流庁ブログは、マレーシアへ50万トンの米を供給する4億5000万ドル規模の契約締結に向け、最終段階の調整を進めている。この合意は、これまで主に米を輸入してきたインドネシアにとって重要な輸出の節目となる。両国間の二国間貿易協定の条件を詰める作業が続いている。", "summary_en": "Indonesia's state logistics agency Bulog is in the final stages of securing a $450 million deal to supply 500,000 tonnes of rice to Malaysia. The agreement would represent a significant export milestone for Indonesia, which has historically been a rice importer. Bulog is working to finalize the terms of the bilateral trade arrangement between the two Southeast Asian neighbors.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiwAFBVV95cUxQQ2tIV3BBMDBqa1FVVzRuMGlKMC1Zb0wxWVVoLVJEQTk2azZzZWFONC1oRjJlZG1fOGdMVFVUNUt5Y1ZCZWZOODRhcGFrOTFVVUtZeG1sc1hsdm03TkNPc3Zud3M4YUZLelo2bmViVGFoRzV2dXNNY0lUQWlyS0FmRmpRcFNVQzVrVnV2TmY0dFdiOXdYMXYyUWNIOFdjLWlaNlhwUV8zUXdKeGVnTTc5MmpyU2VQR2dQTENNV013eUk?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "キア・スターマー英首相が就任2年未満で辞任した理由", "title_en": "Why Keir Starmer Resigned as UK Prime Minister After Less Than Two Years", "summary_ja": "スターマー首相は2026年6月22日、2024年の労働党圧勝からわずか2年未満で辞任を表明した。歴史的な低支持率、党内の派閥対立、ピーター・マンデルソン駐米大使任命などの政治的判断ミス、そして相次ぐ選挙での敗北が主な原因とされる。極右政党リフォームUKの台頭や党内左右両派からの圧力が高まる中、アンディ・バーナムの下院議員当選が事実上、辞任への決定打となった。", "summary_en": "Keir Starmer resigned as UK Prime Minister on June 22, 2026, less than two years after Labour's landslide 2024 election victory. His departure was driven by historically low approval ratings, internal Labour Party factionalism, poor judgment in political appointments including the Peter Mandelson scandal, and a string of poor electoral results. The rise of hard-right parties like Reform UK and Labour's internal divisions between left and centrist factions made his position untenable, with Andy Burnham's entry into Westminster widely seen as sealing his fate.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/analysis-why-keir-starmer-resigned/article71132963.ece", "state_media": false, "category": "政治"}, {"title_ja": "キア・スターマー英首相が辞意表明、アンディ・バーナムが後継者に浮上", "title_en": "Keir Starmer Resigns as UK Prime Minister, Andy Burnham Expected to Succeed Him", "summary_ja": "英国のキア・スターマー首相は2026年6月22日、労働党の議員団が次期総選挙に向けた党首として自身を最適と見なしていないとして、辞意を表明した。ダウニング街10番地前での声明で、スターマー首相は実質賃金の上昇やG7最速の経済成長など在任中の実績を強調した。先週の補欠選挙で勝利したグレーター・マンチェスター市長のアンディ・バーナム氏が後継者の最有力候補とみられており、7月17日の議会休会前に首相就任の宣誓を行う可能性がある。", "summary_en": "UK Prime Minister Keir Starmer announced his resignation on June 22, 2026, stating that Labour's parliamentary party no longer viewed him as the best candidate to lead them into the next general election. Speaking outside No. 10 Downing Street, Starmer cited achievements including real wage growth, the fastest G7 economic expansion, and improved public services during his tenure. Greater Manchester Mayor Andy Burnham, who won a special by-election last week, is widely expected to succeed Starmer and could be sworn in as Prime Minister before Parliament enters recess on July 17.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/starmer-announces-exit-timetable-as-rival-burnham-heads-to-uk-parliament/article71131866.ece", "state_media": false, "category": "政治"}, {"title_ja": "イランと米国、60日以内の最終合意に向けたロードマップで合意　仲介国が進展を発表", "title_en": "Iran and U.S. Agree on 60-Day Roadmap Toward Final Deal, Mediators Report Progress", "summary_ja": "パキスタンとカタールの仲介国は2026年6月22日、イランと米国が60日以内に最終合意に達するためのロードマップで合意したと共同声明で発表した。両国はまた、レバノンとの間に「紛争回避セル」を設置し、軍事作戦を停止することでも合意した。仲介国は長時間にわたる初回会合を経て、西アジア紛争の終結に向け大きな進展があったと評価した。", "summary_en": "Iran and the United States have agreed on a roadmap to reach a final deal within 60 days, according to a joint statement from mediators Pakistan and Qatar on June 22, 2026. The two sides also agreed to establish a 'de-confliction cell' with Lebanon to halt ongoing military operations. Mediators described the lengthy opening session as producing significant progress toward ending the West Asia conflict.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-iran-us-conflict-israel-lebanon-strikes-strait-of-hormuz-tehran-washington-peace-talks-in-switzerland-live-updates-june-22-2026/article71131544.ece", "state_media": false, "category": "政治"}, {"title_ja": "台湾がMQ-9B「スカイガーディアン」無人機の試験を開始", "title_en": "Taiwan Begins Testing MQ-9B SkyGuardian Drone", "summary_ja": "台湾が米国製の高性能無人航空機MQ-9B「スカイガーディアン」の試験運用を開始したことが、関係筋の情報により明らかになった。ジェネラル・アトミクス社が製造するこの無人機は、台湾軍への配備を視野に入れた評価試験が行われている。この動きは、地域の安全保障情勢を背景に台湾が防衛能力の強化を進めていることを示している。", "summary_en": "Taiwan has commenced testing of the MQ-9B SkyGuardian unmanned aerial vehicle, according to a source familiar with the matter. The advanced drone, manufactured by General Atomics, is being evaluated for potential operational use by Taiwan's military. The development signals a continued strengthening of Taiwan's defense capabilities amid regional security concerns.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTFBZczFqSzVBSHUtN09KbDViLXhJSzdFMms1LTRFSE5RMmc5QXhfSzFXa3c3TjN2MzJjUlpzSC1YRkI1Qm9TNFhwQXBucnY1YWdtdGtxNXU0MA?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "野球チアリーダー、モデル仕事中に刃物による襲撃を生き延びる", "title_en": "Baseball Cheerleader Survives Knife Attack During Modeling Gig", "summary_ja": "台湾の野球チアリーダーが、モデルの仕事中に刃物で襲われたが一命を取り留めた。この事件は、芸能関係者や公人がプライベートな仕事中に直面する安全上のリスクへの懸念を高めている。当局は事件の経緯について捜査を進めている。", "summary_en": "A baseball cheerleader in Taiwan survived a knife attack that occurred while she was working a modeling gig. The incident raised concerns about the safety of public figures and entertainers during private engagements. Authorities are investigating the circumstances of the attack.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTFAxTVpFVnczNkYzbDFlbUh5SzBVQnJaZTROemtPQVZ1YWl1YTgzMlhjUUxfclhTOXRyc3FXR1p5T1NKN25jVnB3cHMxdmxyVUVSUHpGSzBR?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾、中国による侵攻に備えた即応訓練を実施", "title_en": "Taiwan Conducts Quick Response Drill Against Possible Chinese Invasion", "summary_ja": "台湾は、中国による侵攻の可能性を想定した軍事即応訓練を実施している。この演習は、武力衝突が発生した際の島の防衛動員能力と即応態勢を検証することを目的としている。こうした訓練は、台湾海峡の緊張が高まる中、台湾が防衛態勢を強化するための継続的な取り組みの一環である。", "summary_en": "Taiwan is conducting a quick response military drill designed to simulate and prepare for a potential Chinese invasion. The exercise aims to test the island's readiness and ability to mobilize defenses rapidly in the event of an armed conflict. Such drills are part of Taiwan's ongoing efforts to strengthen its defense posture amid heightened cross-strait tensions.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE44eEhRdDdJZS1JaW5oSThoTmhhaHZBQmZDRmVtallHdkRhVXJBNXdPSnkxcWlPdU5hblhMSGxRcjlYb3pqNjN0ZHFXU09WQ3c0NzdadjRQQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イタマラティ、トランプ氏の干渉を警戒――「ブラジルはベネズエラではない」", "title_en": "Itamaraty Fears Trump Interference but Insists Brazil Is Not Venezuela", "summary_ja": "ブラジルのルラ政権は、トランプ米大統領がブラジルの選挙に干渉する兆候を注視しており、外交官らはその意図が次第に明確になりつつあると指摘している。トランプ氏はG7でブラジルの政治情勢を「危険だ」と述べてボルソナロ一家を擁護する一方、ベネズエラのマドゥロ独裁者を拘束するなど地域への関与を強めている。政府内では即座に強硬姿勢で応じるべきだとする意見と、トランプ氏の発言は矛盾しており慎重な見極めが必要だとする意見が対立している。", "summary_en": "Brazil's Lula administration is closely monitoring signs of U.S. President Donald Trump's potential interference in Brazil's upcoming elections, with diplomats noting his intentions are becoming increasingly apparent. Trump drew attention by calling Brazil's political situation dangerous at the G7 and defending the Bolsonaro family, while also having captured Venezuelan dictator Nicolás Maduro. The Brazilian government is divided between those urging an immediate firm response and those who caution that Trump's signals remain contradictory.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米当局「逮捕のブラジル人はCVとPCCの幹部」、しかし有罪判決に組織との関連なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC, but His Convictions Show No Gang Links", "summary_ja": "ブラジル人のフェリペ・リナレス・デ・オリベイラ・デル・アキッラ容疑者は、ノースカロライナ州ムーアズビルで交通検問中にICEに逮捕された。米国土安全保障省は彼をブラジルの二大犯罪組織PCCとCVの「司令官」と称したが、ブラジルでの薬物密売・詐欺・恐喝に関する有罪判決にはいずれの組織名も登場しない。両組織は先月、米政府によりテロ組織に指定されたばかりであり、当局の主張の根拠が問われている。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested by ICE in Mooresville, North Carolina, after being stopped during a traffic inspection while allegedly holding his wife captive in the car. The U.S. Department of Homeland Security described him as a 'commander' of both the PCC and CV, two of Brazil's largest criminal organizations recently designated as terrorist groups by the U.S. However, Brazilian court records of his prior convictions for drug trafficking, fraud, and extortion contain no mention of either organization.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ブラジル、G7文書の大半を拒否――トランプ配慮の内容と批判", "title_en": "Brazil Breaks With Most G7 Statements, Citing Trump-Shaped Texts", "summary_ja": "ブラジルはフランス・エヴィアンで開催されたG7サミットで発表された5つの文書のうち2つにしか署名せず、残りはトランプ大統領の拒否権を避けるために意図的に骨抜きにされたと批判した。ブラジルは気候変動やWHOへの言及が欠落しているとして、国際開発およびエボラ出血熱に関する声明を拒否した。一方、がんや麻薬密売に関する声明には賛同したが、マクロ経済の不均衡、移民、重要鉱物に関する文書は拒否する見通しだ。", "summary_en": "Brazil joined only two of five documents released at the G7 summit in Évian, France, arguing the texts were deliberately weakened to avoid a U.S. veto under President Trump. Brasília rejected statements on international development and the Ebola outbreak, citing omissions of climate change, the WHO, foreign debt, and hunger. Brazil approved statements on cancer and drug trafficking, but is expected to reject texts on macroeconomic imbalances, migration, and critical minerals.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/brazil-diverges-from-most-g7-documents-says-texts-were-shaped-to-avoid-upsetting-trump.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ナイジェリアのラッサ熱死亡率が19.3%に上昇、感染は23州に拡大", "title_en": "Nigeria's Lassa Fever Death Rate Rises to 19.3% as Outbreak Spreads Across 23 States", "summary_ja": "ナイジェリア疾病管理予防センター（NCDC）は、2026年のラッサ熱の致死率が2025年同時期の18.9%から19.3%に上昇したと報告した。感染は23州・109の地方自治体区域に広がっており、オンド州が確認症例の28%を占め最多となっている。21〜30歳の若年成人層が最も多く感染しており、国家インシデント管理システムが引き続き対応活動を調整している。", "summary_en": "Nigeria's NCDC reports the Lassa fever case fatality rate climbed to 19.3% in 2026, up from 18.9% during the same period in 2025, as the outbreak continues to affect 23 states and 109 local government areas. Ondo State leads confirmed cases at 28%, followed by Bauchi at 25% and Taraba at 15%, with young adults aged 21–30 being the most affected demographic. The national Incident Management System remains activated to coordinate surveillance and case management efforts across all affected states.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/health/health-news/889810-ncdc-updates-lassa-fever-death-rate-to-19-3-as-outbreak-reaches-23-states.html", "state_media": false, "category": "政治"}, {"title_ja": "スープの鍋をめぐり女性を暴行した男をナイジェリア警察が逮捕", "title_en": "Nigerian Police Arrest Man Filmed Brutally Assaulting Woman Over Pot of Soup", "summary_ja": "ナイジェリア南東部アビア州の警察は、同州アバ市内のアパートで女性を激しく暴行する動画がFacebook上で拡散した後、37歳のアグウ・ウクポ容疑者を逮捕した。4月に起きたこの事件は、アパートのオーナーが記録した映像が6月に表面化したもので、暴行の発端はスープの鍋をめぐるトラブルだったとされる。容疑者は殺人未遂および暴行罪で起訴される予定で、警察はこの行為を「野蛮で許しがたい非人道的なドメスティックバイオレンス」と強く非難している。", "summary_en": "Police in Abia State, Nigeria, have arrested 37-year-old Agwu Ukpo after a video of him violently assaulting a woman named Amarachi Chinyere inside a shared apartment in Aba went viral on Facebook. The incident, which occurred in April, was recorded by the apartment owner who later reported it to police. The suspect faces charges of attempted murder and assault, with police condemning the act as 'barbaric, unacceptable and inhumane domestic violence.'", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/ssouth-east/889798-police-arrest-man-filmed-assaulting-woman-over-pot-of-soup.html", "state_media": false, "category": "社会"}, {"title_ja": "NUJサミット：ナイジェリアの治安トップが報道機関との対話を回避、透明性への懸念高まる", "title_en": "NUJ Security Summit: Nigeria's Security Chiefs Snubbed the Press, Raising Transparency Concerns", "summary_ja": "ナイジェリア記者組合（NUJ）がアブジャで開催した「メディアと治安機関の連携による国家建設」をテーマとした国家安全保障サミットの2日目、上級治安当局者が軒並み欠席し、透明性への懸念が広がった。欠席の背景には、違法採掘と犯罪組織への資金提供、および治安要員の関与疑惑に関する追及を避ける意図があったとの見方も出ている。一方、元国防情報部長のクリス・オルコラデ退役少将は出席し、2014年に物議を醸した新聞配送車両の検問事件について異例の説明を行った。", "summary_en": "Senior Nigerian security officials were conspicuously absent on the second day of the Nigeria Union of Journalists' National Security Summit in Abuja, themed 'Media and Security Agencies as Partners in Nation Building.' Their absence fueled speculation that officials wanted to avoid tough questions about alleged links between illegal mining, criminal financing, and complicit security personnel. Crisis communication expert and former Defence Information chief Major General Chris Olukolade (rtd) did attend and offered rare clarification on a controversial 2014 incident involving intercepted newspaper distribution vehicles.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/opinion/889791-nuj-summit-when-security-chiefs-avoided-the-press-by-yushau-a-shuaib.html", "state_media": false, "category": "政治"}, {"title_ja": "イラン・米国協議、スイスで60日間のロードマップで合意", "title_en": "Iran-US Talks in Switzerland Yield 60-Day Roadmap for Final Deal", "summary_ja": "CGTNは、イランと米国が覚書に基づく初の高レベル協議をスイスのビュルゲンシュトックで終了し、仲介国パキスタンおよびカタールが「前向きで建設的な雰囲気」の中で進展があったと発表したと報じている。CGTNによれば、両者は最終合意に向けた60日間のロードマップを承認し、レバノンでの軍事作戦停止を監視する調整セルの設置にも合意したとされる。CGTNはまた、イランのアラグチー外相が石油輸出制裁免除や凍結資産の一部解放などの成果を主張した一方、イラン代表団が米国の停戦違反を抗議したと報じている。", "summary_en": "CGTN reports that the first session of high-level Iran-US talks under their Memorandum of Understanding concluded in Burgenstock, Switzerland, with mediators Pakistan and Qatar stating progress was made in a 'positive and constructive atmosphere.' CGTN reports that the parties agreed to establish a High-Level Committee and endorsed a 60-day roadmap toward a final agreement, along with a deconfliction cell to monitor the cessation of military operations in Lebanon. CGTN reports that Iran's Foreign Minister claimed major concessions including sanctions waivers on oil exports and asset releases, while the Iranian delegation allegedly protested US violations of ceasefire commitments.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-22/news-1OaWrEvA0Tu/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "シカゴで銃撃相次ぐ、ジューンティーンス週末に8人死亡・38人負傷", "title_en": "8 Killed, 38 Injured in Chicago Shootings Over Juneteenth Holiday Weekend", "summary_ja": "CGTNによると、ジューンティーンスの祝日をはさんだ週末にシカゴ各地で銃撃事件が相次ぎ、少なくとも8人が死亡、38人が負傷したと地元警察が発表した。CGTNによれば、6月19日夜には南部地区で2人の銃撃犯がSUVから群衆に向けて発砲し、少なくとも12人が負傷する事件も起きた。トランプ大統領は軍の介入を改めて求めたが、シカゴ市警のデータでは近年同市の凶悪犯罪は全般的に減少傾向にあるとされている。", "summary_en": "CGTN reports that at least 8 people were killed and 38 injured in a series of shootings across Chicago during the extended Juneteenth holiday weekend, with victims ranging in age from 14 to 70. CGTN reports that one of the deadliest incidents occurred on June 19, when two gunmen fired from an SUV into a crowd on the city's Far South Side, wounding at least 12. President Trump renewed calls for military intervention in Chicago, though the Chicago Police Department's own data indicates violent crime has generally declined in the city in recent years.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-22/8-killed-38-injured-in-shootings-during-holiday-weekend-in-Chicago-1OaSletOKjK/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "米国とイランが平和覚書に署名、パキスタン首相が発表", "title_en": "US and Iran Sign Peace MoU, Pakistani PM Announces", "summary_ja": "CGTNは、パキスタンのシャフバズ・シャリフ首相が米国とイランによる「イスラマバード覚書」の署名を発表したと報じている。同メディアによれば、両国はこの覚書に電子署名したとされる。CGTNはさらに、イランがホルムズ海峡を即時再開放し、米国が海上封鎖を解除するとの条件が含まれていると伝えている。", "summary_en": "CGTN reports that Pakistani Prime Minister Shehbaz Sharif announced the signing of the 'Islamabad Memorandum of Understanding' between the United States and Iran. According to the state-controlled outlet, the agreement was electronically signed by both nations. CGTN further reports that under the terms, Iran will reopen the Strait of Hormuz and the US will lift its naval blockade.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-18/news-1O4clPiSLhm/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "ロシアのカリンスカヤ、バート・ホンブルク・オープン初戦を快勝", "title_en": "Russia's Kalinskaya Opens Bad Homburg Open With Commanding Victory", "summary_ja": "TASSによると、ロシアのアンナ・カリンスカヤがドイツで開催中のWTA500バート・ホンブルク・オープン初戦でオーストリアのシンヤ・クラウスを6-4、6-1で下した。世界ランク20位のカリンスカヤは次戦でルーマニアのルーセまたは第5シードのノスコワと対戦する予定だとTASSは伝えている。6月20日から27日まで開催される同大会は賞金総額120万ドルで、2024年にはロシアのダイアナ・シュナイダーが優勝している。", "summary_en": "TASS reports that Anna Kalinskaya of Russia defeated Austria's Sinja Kraus 6-4, 6-1 in the first round of the Bad Homburg Open WTA-500 tournament in Germany. TASS reports that the world No. 20 Kalinskaya will next face either Elena-Gabriela Ruse or fifth-seeded Linda Noskova. The grass-court tournament, running June 20-27, offers $1.2 million in prize money and was previously won by Russia's Diana Shnaider in 2024.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/sports/2149891", "state_media": true, "category": "社会"}, {"title_ja": "ザポロジエ原発は通常運転継続も、周辺情勢は緊迫―タス通信報道", "title_en": "ZNPP Continues Normal Operations Amid Tense Situation, State Media Reports", "summary_ja": "タス通信によると、ザポロジエ原子力発電所は職員による継続的な監視のもとで通常運転を続けているが、周辺情勢は依然として緊迫しているという。同発電所の関連都市エネルゴダルではロシア側がウクライナ軍のドローン攻撃と主張する被害により停電が発生していると、同通信は伝えている。また6月17日には従業員1人が死亡、1人が重傷を負い、翌日には輸送部門に少なくとも14回の攻撃が行われたとタス通信は報じている。", "summary_en": "TASS reports that the Zaporozhye Nuclear Power Plant continues to operate normally under continuous personnel oversight, though the situation remains tense. The plant's satellite city of Energodar is reportedly experiencing a blackout following what Russian state media characterizes as Ukrainian drone attacks on the power grid. TASS also reports that on June 17, one ZNPP employee was killed and another injured in a drone strike, with at least 14 additional strikes recorded on the plant's transportation department the following day.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2149885", "state_media": true, "category": "社会"}, {"title_ja": "イスラエル、米国での協議前にレバノン南部からの「象徴的」撤退を検討か", "title_en": "Israel May Announce Symbolic Troop Withdrawal from Southern Lebanon Ahead of US Talks", "summary_ja": "TASSおよびCNNの報道によると、イスラエルは今週後半にワシントンで予定されているイスラエル・レバノン3日間協議を前に、レバノン南部からの「象徴的」な部隊撤退を発表することを検討しているとされる。イスラエル側の情報筋によれば、撤退はいわゆる「イエローライン」後方の一部小規模地域からの後退にとどまる見通しだという。一方、イスラエルのカッツ国防相はレバノン南部の安全保障地帯、ボーフォール城周辺を含む地域からの撤退を計画していないと従来から述べており、今回の動きとは矛盾する。", "summary_en": "TASS/CNN reports that Israel is considering announcing a 'symbolic' withdrawal of troops from southern Lebanon ahead of three-day Israeli-Lebanese talks scheduled in Washington later this week. The state-controlled outlet reports that an Israeli source said the potential pullback would involve minor areas behind the so-called Yellow Line. This comes despite Israeli Defense Minister Israel Katz previously stating that Israel had no plans to withdraw forces from its security zone in southern Lebanon, including the Beaufort Castle area.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2149883", "state_media": true, "category": "社会"}, {"title_ja": "イラン戦争が世界に教えた食料安全保障の教訓", "title_en": "What the Iran War Taught the World About Food Security", "summary_ja": "筆者は、ホルムズ海峡の封鎖による肥料供給の混乱が、世界の農業サプライチェーンに潜む重大な脆弱性を露わにしたと主張する。貿易を回復させるだけでなく、各国は戦略備蓄の構築、供給経路の多様化、エネルギー依存の低減、精密な栄養管理への投資を進める必要がある。次の危機が訪れる前に、先手を打った構造的投資こそがレジリエンスの鍵だという主張が論考の核心をなしている。", "summary_en": "The author argues that the disruption to fertilizer flows through the Strait of Hormuz exposed a critical and long-understood vulnerability in global agricultural supply chains that the world failed to adequately prepare for. Rather than simply restoring trade, countries must build strategic reserves, diversify supply corridors, reduce energy dependence, and invest in precision nutrient management. The central lesson is that resilience requires proactive structural investment before the next inevitable shock arrives.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/iran-war-exposed-global-agriculture-lack-of-resilience-by-maximo-torero-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "オレンジの山賊：トランプの略奪的統治", "title_en": "The Orange Bandit: Trump's Predatory Governance", "summary_ja": "筆者は、ドナルド・トランプ大統領が持続可能な統治よりも短期的な略奪を選んだと主張し、その姿勢をローマ皇帝ティベリウスの「羊の毛を刈る」のではなく「皮を剥ぐ」という比喩になぞらえている。トランプは米国政府を私物化し国富を食い物にしているとされ、長期的な経済的繁栄を犠牲にしていると批判される。この論考はトランプの大統領職を、統治する国家そのものへの露骨な略奪行為として位置づけている。", "summary_en": "The author argues that Donald Trump has chosen short-term plunder over sustainable governance, likening his approach to the Roman Emperor Tiberius's metaphor of 'skinning the sheep' rather than 'shearing' them. By allegedly using the US government to pillage national resources and wealth, Trump is seen as sacrificing long-term economic productivity for immediate gain. The piece frames Trump's presidency as an act of brazen predation against the very country he leads.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/trump-corruption-pillaging-america-with-impunity-by-aziz-huq-and-tom-ginsburg-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "熱帯林保全の正しいアプローチ：TFFFの欠陥とより良い代替手段", "title_en": "How (Not) to Conserve Tropical Forests: Why the TFFF Falls Short", "summary_ja": "筆者は、COP30で発足した「熱帯林永続基金（TFFF）」は市場の現実、補償の不確実性、政権交代による政策継続性の問題から成功する見込みが薄いと主張する。代替策として、チリやウルグアイが先行導入したサステナビリティ連動型ソブリン債・ローン（SLB・SLL）を推奨しており、これらは森林保全の成果に応じて金利が変動する仕組みで政府に即時資金を提供し、政権をまたいだ保全継続の動機を与える。筆者が警鐘を鳴らすのはTFFFの資金調達失敗ではなく、より効果的なこれらの手段が排除されてしまうリスクだ。", "summary_en": "The author argues that the Tropical Forest Forever Facility (TFFF), launched at COP30, is unlikely to succeed due to market realities, uncertain compensation for tropical governments, and political time-inconsistency problems. As a better alternative, the author advocates for sustainability-linked sovereign bonds and loans (SLBs/SLLs), which tie interest rates to forest conservation performance, giving governments upfront funding and durable incentives that survive changes in administration. The real danger, the author warns, is not that the TFFF fails to raise money, but that it crowds out these more effective financial instruments.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/sustainability-linked-bonds-loans-better-than-tropical-forest-facility-by-bard-harstad-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "トランプ氏のブルーカラー支持基盤に亀裂、共和党の中間選挙に暗雲", "title_en": "Cracks in Trump's Blue-Collar Base Spell Trouble for Republicans in Midterms", "summary_ja": "オピニオンコラムニストのスティーブン・グリーンハウス氏は、白人労働者階級のトランプ支持が急落し、現在54%が大統領の職務遂行を不支持としていると論じている。インフレ抑制や製造業雇用創出などの公約未達、イランへの軍事介入、富裕層優遇の減税とメディケイド削減が不満の主因だと指摘する。筆者はこうした動向が民主党にとって中間選挙で上下両院を奪還する好機になると結論付けている。", "summary_en": "Opinion columnist Steven Greenhouse argues that Trump's support among white working-class voters has sharply eroded, with 54% now disapproving of his performance — up from 32% in early 2025. Greenhouse contends that broken promises on inflation, manufacturing jobs, and foreign wars, combined with tax cuts favoring the wealthy and cuts to Medicaid, have fueled blue-collar disenchantment. He concludes this shift represents a significant opportunity for Democrats to retake the House and Senate in the upcoming midterm elections.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/22/trump-voter-base-support-loss", "state_media": false, "category": "オピニオン"}, {"title_ja": "AIが「エリートキャリアの登竜門」コンサルティング業界を空洞化させている", "title_en": "The Slow Death of the Prestige Career: How AI Is Hollowing Out Consulting's Golden Ticket", "summary_ja": "オピニオン執筆者のアリス・ラスマン氏は、マッキンゼーやBCGなどの大手コンサルティングファームがかつて若手アナリストに提供していた「厳しい訓練と輝かしいキャリアへの切符」という価値提案が、AIの台頭によって崩壊しつつあると主張する。AIが財務モデル作成やデッキ資料の作成といった基礎的な業務を代替する中、エントリーレベルの役割は事実確認とプロンプト入力に矮小化され、人材育成のための徒弟制度が機能しなくなっていると指摘する。その結果、「耐えて学び、昇進する」というエリートキャリアの暗黙の契約は崩れ、業界全体の採用・育成パイプラインが壊れ始めていると警告している。", "summary_en": "Opinion writer Alice Lassman argues that AI is dismantling the core value proposition of elite management consulting firms like McKinsey, BCG, and Bain, which historically offered junior analysts unparalleled training and coveted exit opportunities. She contends that as AI tools take over foundational analytical tasks, entry-level roles have been reduced to glorified fact-checking and prompt management, stripping away the apprenticeship model that once built exceptional skills. The result, she warns, is a broken career pipeline where the 'prestige career' contract—endure, learn, and ascend—no longer holds.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/22/consulting-ai-prestige-careers", "state_media": false, "category": "オピニオン"}, {"title_ja": "なぜアメリカは18歳の有権者登録を自動化しないのか", "title_en": "Why Aren't We Automatically Registering America's 18-Year-Olds to Vote?", "summary_ja": "寄稿者ローラ・W・ブリル氏は、アメリカの若者の有権者登録率が低い原因は無関心ではなく、制度的な障壁にあると主張する。中間選挙では18歳の登録率が30%未満にとどまり、運転免許取得率の低下や不備な自動登録制度が数百万人の若者を民主主義から排除していると指摘する。同氏は高校卒業時の有権者登録を標準化することを提唱し、オレゴン州やミシガン州の成功例を挙げて問題は解決可能だと訴えている。", "summary_en": "Opinion author Laura W. Brill argues that America's low youth voter registration rates stem not from apathy but from systemic barriers, noting fewer than 30% of 18-year-olds are registered in typical midterm years. She contends that declining teen driver's license rates and poorly designed automatic registration systems leave millions of young Americans excluded from democracy. Brill calls for making voter registration a standard part of high school graduation, citing Oregon and Michigan as proof the problem is solvable.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/21/young-people-voter-registration", "state_media": false, "category": "オピニオン"}, {"title_ja": "AIで職を失う労働者たち：貿易調整支援の教訓", "title_en": "When Workers Lose to AI: Lessons from Trade Adjustment Assistance", "summary_ja": "筆者は、1962年に創設された貿易被害労働者支援プログラム「貿易調整支援（TAA）」の功罪を振り返り、AIによる大規模な雇用喪失に備えるための政策的教訓を論じている。TAAは自由貿易による打撃を受けた労働者を支援する試みとして意義があったが、狭い受給資格や対応の遅さ、規模の不十分さから期待された成果を上げられなかった。著者は、AI時代の雇用政策は対象範囲を広げ、迅速に機能し、かつ新たな良質な雇用創出と組み合わせなければ、労働者の生活と米国社会の安定を守れないと主張する。", "summary_en": "The author argues that the U.S. must learn from the mixed legacy of Trade Adjustment Assistance—a 1962 program aiding trade-displaced workers—as it confronts potential mass displacement from artificial intelligence. While the TAA showed that governments can acknowledge economic disruption and attempt to cushion its impact, it ultimately fell short due to narrow eligibility, slow implementation, and insufficient scale. The author contends that any new AI displacement policy must be broader, faster, and paired with proactive job creation to protect both workers' livelihoods and America's social and political stability.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/when-workers-lose-ai", "state_media": false, "category": "オピニオン"}, {"title_ja": "中国は戦わずして台湾を手に入れられる", "title_en": "China Could Win Taiwan Without Fighting", "summary_ja": "筆者は、習近平が軍事力に頼らず台湾を支配下に置くため、トランプ政権に台湾との距離を置かせる戦略を推進していると論じる。習近平はトランプ氏の同盟懐疑論と取引優先の外交姿勢を利用し、米国の台湾政策における「常識」を塗り替えることに成功しつつある。筆者は、米国の台湾へのコミットメントが揺らげば地域同盟国の信頼が失われ、パワーバランスが北京に有利な形で決定的に変化すると警告している。", "summary_en": "The author argues that Xi Jinping is pursuing a non-military strategy to bring Taiwan under Chinese control by pressuring the Trump administration to distance itself from Taipei. Xi appears to be successfully reshaping what Washington considers 'normal' policy on Taiwan, exploiting Trump's skepticism toward allies and his transactional foreign policy instincts. The author warns that if U.S. commitments to Taiwan erode, regional allies will lose confidence in American security guarantees, decisively shifting the balance of power toward Beijing.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/taiwan/china-could-win-taiwan-without-fighting", "state_media": false, "category": "オピニオン"}, {"title_ja": "欧州を救う唯一の道：ドイツ主導の統合深化", "title_en": "The Only Way to Save Europe: German-Led Integration", "summary_ja": "筆者は、トランプ政権下での米国の信頼性低下、ロシアの侵略、中国の圧力という外部の脅威に加え、ポピュリスト的ナショナリズムという内部の危機がEUの存続を脅かしていると論じる。こうした二重の脅威に対応する唯一の有効策は、マリオ・ドラギ元首相の改革提言とドイツのリーダーシップを結びつけ、欧州統合を抜本的に深化させることだと主張する。統合の強化によってEUが単一の戦略的主体として行動できるようになり、反自由主義的ポピュリズムの台頭を抑える経済的反転も実現できると訴えている。", "summary_en": "The author argues that the EU faces existential threats from outside—including U.S. unreliability under Trump, Russian aggression, and Chinese pressure—and from within, as populist nationalism erodes integration. The only effective response, the author contends, is to deepen European integration by combining Mario Draghi's reform proposals with decisive German leadership. This would move the EU toward strategic autonomy and generate the economic growth needed to counter illiberal populism.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/europe/only-way-save-europe", "state_media": false, "category": "オピニオン"}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  const sb=document.getElementById("d-state");
  sb.style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-22 14:00 JST";
renderTabs();renderList();
</script>
