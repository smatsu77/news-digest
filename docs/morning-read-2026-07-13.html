82c3FjM2ljZUZVbmZ0UG5sY0hkRTNvNGVqTnpuNlR2N21sYUZybkJHeVBHUkF2MUlUSFlpREtOQTFXaVJVUmfSAcgBQVVfeXFMUDJCRm16ZDU5bjViV21mdm1KMzJ5c3JnVjBEcVpJUGF2b0tnZ1JkRGhVVDVYM1pyMFNKQUNIdDVGQWRkTjNhR0dSai1kQS1nLVFwUFlDYm1aMjFaNEx2Y1YzWjVRWlNfN3lPWC1ERF9ZcVFhOFpTY3VVX0w2bmNyR2Rick9VLXRDemFydWFXOHhaSFhLai1PSmdfUlhDT0NiY0Z0TGJFUGZxLVhDdmxmZ25hcHl0T3dhWm9VeHZaWTRPa252QVNQdkM?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "“I didn’t go to school, but I know more than many graduates” — MC Oluomo", "title_en": "“I didn’t go to school, but I know more than many graduates” — MC Oluomo", "summary_ja": "“It's not about being proud, I've been spending money since I was 13 years old…” The post “I didn’t go to school, but I know more than many graduates” — MC Oluomo appeared first on Premium Times Nigeria .", "summary_en": "“It's not about being proud, I've been spending money since I was 13 years old…” The post “I didn’t go to school, but I know more than many graduates” — MC Oluomo appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/entertainment/naija-fashion/895066-i-didnt-go-to-school-but-i-know-more-than-many-graduates-mc-oluomo.html", "state_media": false, "category": "社会", "full_text": "The President of the National Union of Road Transport Workers (NURTW), Musiliu “MC Oluomo” Akinsanya, has reflected on his rise from a bus conductor to one of Nigeria’s most influential transport union leaders.\nMC Oluomo spoke at the 50th golden jubilee birthday celebration of Islamic singer Hafsat Adegoke and the unveiling of her new album, which Fuji musician Saheed Osupa attended.\nThe transport union leader, who has repeatedly faced public ridicule over his spoken English and educational background, said practical experience had given him a greater understanding than many people with university degrees.\nMC Oluomo also pointed to his children’s achievements as proof that his lack of formal schooling did not stop him from prioritising education, revealing that they have become a doctor, a lawyer and an engineer.\nHe said at the event held in Alausa, Lagos State, on Sunday: “It’s not about being proud, I’ve been spending money since I was 13 years old. I worked as a conductor from 12pm to 6pm. I would go to Danjuma Cinema to watch Indian movies with my own money, and in turn, I would go home to give my mother money for her food.\n“That’s what I did until I got to this stage. I didn’t enter the NURTW as a bastard. I learned the work, mastered it, and got to where I am today. I didn’t go to school, but the knowledge and understanding I possess in my head are greater than those held by people with degrees.”\nChildren\nFurthermore, the 51-year-old maintained that he was illiterate, but he had educated his children well, and they were now doing very well in their respective fields.\n“I used to tell people that if I am uneducated, glory be to God. My children today are a doctor, a lawyer, and an engineer, and they are in America. God should not let our children die an untimely death”, he added.\nMC Oluomo further recounted his humble beginnings, when he used to eat at Taibatu Adelanwa’s home, the mother of Saheed Osupa.\nHe said, “That’s the King of Music, Saheed Osupa, sitting over there. We were having a conversation, and I bent down to greet him. He asked why I did that, and I said it was because he is older than I am, and secondly, because I ate Tuwo at his mother’s side when I was young.\n“May her soul rest in peace. Osupa and I were so close; he knew everything about me, starting from my childhood days.”\nMen\nAdditionally, MC Oluomo criticised the rate at which married men neglected their responsibilities towards their wives.\nHe said any man who refused to fulfil his responsibilities towards his children and wife was an enemy of God.\n“I used to say that any man on earth who does not take care of his children is an enemy of God, because the person we are celebrating and spending money on today, if a time comes when we stop spending that money, will be left with only him and his children.\n“In today’s Nigeria, seventy-five per cent of women are mothers of two, three, four, five, six or seven children, and they are the ones who pay their children’s school fees, accommodation, clothes and food,, said MC Oluomo.\nWomen\nREAD ALSO: Why I published false stories about Governor Soludo, son – Blogger\nHe praised the resilient women who had taken over responsibilities many husbands had abandoned.\n“If she has a mother, she will still be paying for her house rent, others, and if she has a sister, she will not want her sister to end up like her, not because they are widows.\n“They have husbands, but because some men prefer paying school fees for children born outside their marriage rather than for their real children. But in their old age, they will cry.”\nMC Oluomo last made headlines when he hosted Yoruba actor Olanrewaju “Baba Ijesha” James and his wife, fashion entrepreneur Abiodun Tokunbo, in Abuja.", "translation_ja": "", "vocab": []}, {"title_ja": "Police officer praises Akwa Ibom ambulance service for rescuing convulsing man", "title_en": "Police officer praises Akwa Ibom ambulance service for rescuing convulsing man", "summary_ja": "A police officer has praised Akwa Ibom's emergency ambulance service after it rescued a convulsing man in Uyo, overcoming bystanders' fears and highlighting improvements in the state's emergency healthcare system. The post Police officer praises Akwa Ibom ambulance service for rescuing convulsing ma", "summary_en": "A police officer has praised Akwa Ibom's emergency ambulance service after it rescued a convulsing man in Uyo, overcoming bystanders' fears and highlighting improvements in the state's emergency healthcare system. The post Police officer praises Akwa Ibom ambulance service for rescuing convulsing ma", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/south-south-regional/895052-police-officer-praises-akwa-ibom-ambulance-service-for-rescuing-convulsing-man.html", "state_media": false, "category": "社会", "full_text": "A senior police officer has commended the Akwa Ibom State Emergency Ambulance Service after it responded to a distress call and rescued a man who collapsed and began convulsing along Ikot Ekpene Road in Uyo.\nThe officer, Odiko Macdon, a Chief Superintendent of Police and Divisional Police Officer of ‘A’ Division, Uyo, stated that many bystanders watched from a distance because they believed the unidentified man had epilepsy and feared the condition was contagious.\nMr Macdon, a former police spokesperson in Akwa Ibom State, recounted the incident in a Facebook post on Sunday.\nHe said he was driving home on Saturday night when he noticed the man lying near Kilimanjaro Restaurant on Ikot Ekpene Road.\n“I saw the unknown young man jerking profusely, foaming at the mouth.”\nAccording to him, although a crowd had gathered, no one was willing to assist. “No one dared touch him; the fear was that he had epilepsy, and that epilepsy was contagious!”\nEpilepsy is not contagious. Medical experts advise that a person having a seizure should be protected from injury while emergency medical help is sought.\nRace to save a life\nMr Macdon said he and another passerby ran to a nearby pharmacy for him, then asked members of the crowd for the emergency ambulance hotline number.\nAfter obtaining the number, he called the emergency service and was assured that an ambulance had been dispatched.\nAs the victim continued to convulse, Mr Macdon said he feared the response might come too late.\n“I remember telling those around that the ambulance was coming, but what if they don’t come? Or come on time? What if this guy dies before their arrival? Both fear and faith took hold of me, but I wasn’t going anywhere.”\nAbout 15 minutes later, the ambulance arrived.\n“My excitement knew no bounds when, in about fifteen minutes, the ambulance arrived! Truly, this service and the health sector are working.”\nA video accompanying Mr Macdon’s Facebook post showed emergency health workers placing the unconscious man on a stretcher before taking him into a waiting ambulance.\nGood Samaritan recognised\nMr Macdon also praised another passer-by, photographer Uko Akpan, for helping the victim despite others’ fears.\n“He never considered the contagious supposition nor the consequences thereof (if any),” said the officer, who urged residents to show compassion to people in distress.\n“We just need to be our brother’s keeper to make the world a better place.”\nEmergency service expansion\nThe incident comes as the Akwa Ibom State Government says it is strengthening emergency medical services across the state.\nREAD ALSO: Magistrate withdraws from Akwa Ibom anti-open grazing case after controversy\nIn an interview published by BusinessDay Newspaper in February, the Commissioner for Health, Ekem John, said the Akwa Ibom Emergency Medical Service and Ambulance System, launched on 1 March 2025, attended to 2,500 emergencies within its first 10 months of operation. Of those cases, 1,799 patients were stabilised at the scene, whilst 708 were transported to hospitals for further treatment.\nMr John said the state has 31 ambulances deployed across its 31 local government areas, enabling emergency teams to respond more quickly to distress calls.\nAccording to him, ambulance response times have improved from an initial target of 30 minutes to between seven and 13 minutes, with the government now working towards a response window of five to 20 minutes as it expands the service.\nMr Macdon’s account that the ambulance reached the scene in about 15 minutes reflects the response time the state says it is striving to maintain.\nThe Commissioner also stated that about 170,000 residents have enrolled in the state’s health insurance scheme, which covers services including consultations, surgeries, maternal healthcare and referrals, helping more residents access affordable healthcare.\nMr Macdon encouraged residents to save the state’s emergency ambulance number, noting that prompt access to emergency responders could save lives during medical emergencies.", "translation_ja": "", "vocab": []}, {"title_ja": "Court of Appeal judgement does not affect our primaries – ADC", "title_en": "Court of Appeal judgement does not affect our primaries – ADC", "summary_ja": "“We wish to assure members of the party and the general public that this judgment has no effect whatsoever on the direct primaries through which the party’s candidates have emerged at all levels.” The post Court of Appeal judgement does not affect our primaries – ADC appeared first on Premium Times ", "summary_en": "“We wish to assure members of the party and the general public that this judgment has no effect whatsoever on the direct primaries through which the party’s candidates have emerged at all levels.” The post Court of Appeal judgement does not affect our primaries – ADC appeared first on Premium Times ", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/895063-court-of-appeal-judgement-does-not-affect-our-primaries-adc.html", "state_media": false, "category": "社会", "full_text": "The African Democratic Congress (ADC) says the judgement of the Court of Appeal on its ward, local government and state congresses does not affect the direct primaries that produced its candidates for the 2027 elections.\nThe party said this in a statement by its spokesperson, Bolaji Abdullahi, on Monday.\nThe appellate court in Abuja had earlier on Monday upheld the judgement of the Federal High Court restraining the Independent National Electoral Commission (INEC) from recognising state congresses organised by committees appointed by the David Mark-led caretaker leadership of the African Democratic Congress (ADC).\nA three-member panel of the court, in a judgement delivered by Okon Abang, said it found no reason to set aside the restraining order the lower court in Abuja had issued against the Mark-led ADC on 29 April.\nIt also upheld the order of the judge, Joyce Abdulmalik, which restrained the Mark-led executives from interfering with the tenure and functions of the party’s elected state executives.\nBut Mr Abdullahi said in the statement posted on his X account that the “judgement has no effect whatsoever on the direct primaries through which the party’s candidates have emerged at all levels.”\nHe added that the ADC had already commenced the process of appealing the judgement, which it disagreed with because it is “legally unsustainable.”\nThe full statement read:\nThe African Democratic Congress (ADC) notes the judgment delivered by the Court of Appeal in Abuja on Monday in a matter concerning party congresses to elect the Party’s ward, local government, and state executive committees.\nREAD ALSO: Appeal Court upholds judgment barring INEC from recognising ADC congresses organised by Mark-led executives\nWe wish to assure members of the party and the general public that this judgment does not affect whatsoever on the direct primaries through which the Party’s candidates have emerged at all levels.\nThe party has already commenced the process of appealing the judgment, which we respectfully disagree with and consider to be legally unsustainable.\nWe also note the dissenting judgment of the presiding Justice, which, in our view, more accurately reflects the settled position of the law and the Party’s position.\nWe urge all Party members and the millions of our supporters to remain calm, confident and focused.\nThe African Democratic Congress remains committed to providing Nigerians with a credible alternative and will continue to pursue that mission in accordance with the Constitution and the rule of law.\nSigned:\nMallam Bolaji Abdullahi\nNational Publicity Secretary\nAfrican Democratic Congress (ADC)", d Trump’s plans to seize control over the waterway and to levy a security toll of 20%", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2159757", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "The Mother of All Economic Shocks Is Chinese Mercantilism", "title_en": "The Mother of All Economic Shocks Is Chinese Mercantilism", "summary_ja": "Because analysts tend to put the United States at the center of the global economic story, they have overlooked the single most important force of the past 50 years. But it will be obvious to later generations that Chinese mercantilism has been more globally consequential than any other economic sho", "summary_en": "Because analysts tend to put the United States at the center of the global economic story, they have overlooked the single most important force of the past 50 years. But it will be obvious to later generations that Chinese mercantilism has been more globally consequential than any other economic sho", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/chinese-mercantilism-mother-of-all-global-shocks-by-arvind-subramanian-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Mother of All Economic Shocks Is Chinese Mercantilism\n                        Because analysts tend to put the United States at the center of the global economic story, they have overlooked the single most important force of the past 50 years. But it will be obvious to later generations that Chinese mercantilism has been more globally consequential than any other economic shock or policy choice.\n                    \n                        WASHINGTON, DC—In the long sweep of history, China’s economic performance over the past 50 years will obviously stand out for the sheer scale and pace of quality-of-life improvements within that country. But China’s impact on the rest of the world has still been underappreciated.\n        https://prosyn.org/12LalEg", "translation_ja": "", "vocab": []}, {"title_ja": "Letting Russia Burn", "title_en": "Letting Russia Burn", "summary_ja": "From relentless Ukrainian drone strikes to soaring inflation and fuel shortages, Russia is paying an ever-higher price for Vladimir Putin's war of choice. But the war has become the organizing principle of Putin’s regime, leaving no path to lasting peace without a fundamental political transformatio", "summary_en": "From relentless Ukrainian drone strikes to soaring inflation and fuel shortages, Russia is paying an ever-higher price for Vladimir Putin's war of choice. But the war has become the organizing principle of Putin’s regime, leaving no path to lasting peace without a fundamental political transformatio", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/why-putin-cannot-afford-to-walk-away-from-ukraine-by-nina-l-khrushcheva-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Letting Russia Burn\nMOSCOW—Karl Marx once wrote that theory becomes a material force the moment it grips the masses. Soviet leaders took that line and ran with it—straight into catastrophe—again and again. Vladimir Lenin turned it into a rationale for revolution, while Joseph Stalin used it as a license to starve and work millions of people to death in pursuit of rapid industrialization and a “bright future” that never arrived. Nikita Khrushchev, for his part, invoked it to legitimize de-Stalinization in 1956, as though history could simply be ordered onto a different path.", "translation_ja": "", "vocab": []}, {"title_ja": "What AI Governance Demands", "title_en": "What AI Governance Demands", "summary_ja": "AI governance must account for everything from the technology’s material requirements to its effects on communities, businesses, labor markets, the environment, and strategic competition. To this end, a framework of verification-based trust—broader than national regulation and more flexible than a c", "summary_en": "AI governance must account for everything from the technology’s material requirements to its effects on communities, businesses, labor markets, the environment, and strategic competition. To this end, a framework of verification-based trust—broader than national regulation and more flexible than a c", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/ai-governance-framework-by-ana-palacio-2026-07", "state_media": false, "category": "オピニオン", "full_text": "What AI Governance Demands\n                        AI governance must account for everything from the technology’s material requirements to its effects on communities, businesses, labor markets, the environment, and strategic competition. To this end, a framework of verification-based trust—broader than national regulation and more flexible than a classic treaty—is essential.\n                    \n                        MADRID—One way to represent the AI age is with a steep curve and a gradual slope. The curve rises almost vertically: models rapidly grow cheaper, more powerful, more accessible, and more deeply embedded in production, science, education, finance, administration, security, and war. Beneath it, the slope moves on a far shallower incline. This is the capacity of society to absorb change.\n        https://prosyn.org/ShzTDpz", "translation_ja": "", "vocab": []}, {"title_ja": "Trump’s Nato remarks rang hollow – but he recognizes something real | Christopher S Chivvis", "title_en": "Trump’s Nato remarks rang hollow – but he recognizes something real | Christopher S Chivvis", "summary_ja": "US political leaders must be more clear-eyed about our global alliances, without embracing his scorched-earth approach Donald Trump memorably took out a full-page advertisement in multiple newspapers in 1987 charging that America was carrying too much weight for its allies. In his first term he repe", "summary_en": "US political leaders must be more clear-eyed about our global alliances, without embracing his scorched-earth approach Donald Trump memorably took out a full-page advertisement in multiple newspapers in 1987 charging that America was carrying too much weight for its allies. In his first term he repe", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/13/trump-nato-international-alliances", "state_media": false, "category": "オピニオン", "full_text": "Donald Trump memorably took out a full-page advertisement in multiple newspapers in 1987 charging that America was carrying too much weight for its allies. In his first term he repeated this charge, threatening to withdraw from Nato and berating US allies around the world in the process. Last week’s gathering of Nato’s heads of government in Turkey suggests his approach is running out of steam as the world adjusts and the president bumps up against the limits of American unilateral power in Iran.\nTrump’s domestic political opponents should breathe a sigh of relief but not rush headlong into an uncritical embrace of US alliances. For all his counterproductive bluster, Trump recognized something real. If his opponents in the Democratic and Republican parties are not more clear-eyed about what alliances cost Americans – as Biden failed to be with Israel – they will fuel the fires that brought Trump to power in the first place.\nThe Ankara summit shows the limits of how far Trump will go. Weakened by his failed war on Iran, which now seems destined to drag on in fits and starts indefinitely, Trump found that his attempt to dominate the meeting rang hollow. His talking points berating allies for not doing enough – this time to support him against Iran – have lost their shock value. What’s more, they conflicted with his later claims that the meeting was filled with “tremendous love”.\nA year ago, tensions ran high as European leaders feared Trump might withdraw America from Nato altogether, leaving them to fend for themselves against a hostile and militarized Russia. This threat is losing its force. Withdrawing from the almost 80-year-old alliance would be a lot of trouble, creating a domestic political firestorm that Trump cannot afford. It could also look weak, and Trump likes the stage that Nato offers him anyway. More important, Europe is growing stronger and less vulnerable to Trump’s threats of abandonment and is now on course to acquire serious defenses against Russia for as long as the threat persists.\nWashington should welcome this. Europe and America are allies because of shared interests in sustaining peace and prosperity, and only secondarily because they belong to institutions like Nato. As long as those interests remain, the alliance will work; without them, the institutional structures will hollow out anyway.\nEven if Trump’s Sherman’s march through longstanding US global institutions like Nato is slowing, the damage he has done is still real and will take years to repair. His threats have destroyed trust and undermined confidence in Washington. This will make it more difficult for Washington to build the partnerships it does need, including for pressing challenges on climate, global health and the world economy.\nBut if Trump’s approach to US alliances has been badly misguided, too many of his political opponents – Democrat and Republican – remain overcommitted to American military alliances, espousing an enthusiasm that borders on the religious.\nSuperficially, alliances might seem like the international equivalent of social clubs – like-minded states meeting to talk about their shared values and global vision – but the core of an alliance is a commitment to fight a war for another country. The commitment may be explicit or implicit, but it is a huge cost, and US leaders cannot afford to tie their nation to allies that do not reciprocate with real benefits for the American people themselves.\nBiden’s bear hug of Israel was the most glaring case. It drove his administration deeply into the arms of Benjamin Netanyahu and with that, the tragedy of Israel’s Gaza strategy. But there are other examples as well, in Biden’s one-dimensional reassurance of European allies, his unwillingness to show daylight with Ukraine, and his pledges of unconditional support to Taiwan.\nThe Nato summit in Ankara is likely to be remembered less as a US-European divorce than as another step toward a Nato in which Europe’s role becomes equal to America’s – and toward a more balanced US-European relationship that can still be productive for both sides. Future American leaders can learn from Trump’s mistakes without simply reacting against them. The world needs constructive American leadership, but it also needs realism about the limits of American power and the costs the American people will bear – and should be expected to bear – for the other nations of the world. This requires a balanced approach to US alliances, neither a full-throated embrace nor a Trumpian scorched-earth campaign.\n- \n  Christopher S Chivvis is a senior fellow and director of the American Statecraft Program at the Carnegie Endowment for International Peace", "translation_ja": "", "vocab": []}, {"title_ja": "Graham Platner was an unforced error – the left has lessons to learn | Osita Nwanevu", "title_en": "Graham Platner was an unforced error – the left has lessons to learn | Osita Nwanevu", "summary_ja": "Many imagined his buff, gruff and tattooed traits would help him connect with working-class men. But this logic was flawed The left would do well to revisit New York ’s Democratic primaries two weeks ago – it was a sunnier news cycle, yes, but those races were also an object lesson in progressive re", "summary_en": "Many imagined his buff, gruff and tattooed traits would help him connect with working-class men. But this logic was flawed The left would do well to revisit New York ’s Democratic primaries two weeks ago – it was a sunnier news cycle, yes, but those races were also an object lesson in progressive re", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/13/graham-platner-unforced-error-left-lessons-to-learn", "state_media": false, "category": "オピニオン", "full_text": "The left would do well to revisit New York’s Democratic primaries two weeks ago – it was a sunnier news cycle, yes, but those races were also an object lesson in progressive realpolitik.\nZohran Mamdani, busy as he already was, devoted a remarkable amount of time, resources and political capital to selecting and backing the eventual victors in three different races – in one case reversing a promise to support an incumbent, Adriano Espaillat, in favor of activist Darializa Avila Chevalier, and in another case supporting Claire Valdez, a relatively unknown assemblywoman, even as the Working Families party, major unions and other progressives backed the Brooklyn borough president, Antonio Reynoso.\nHe also did what he could to push other candidates out of the running entirely, including the city councilwoman Alexa Avilés, who might have run against the mayor’s pick, Brad Lander, and Dan Goldman in New York’s 10th congressional district, and the city councilman Chi Ossé, whose planned run against the House minority leader, Hakeem Jeffries, was torpedoed.\nOnly time will tell just how deeply these decisions will affect Mamdani’s standing with city leaders and key constituencies. But he and his team clearly thought long and hard about which races to prioritize and why, ran the political calculus on what it would take to win, and succeeded with a slate of candidates chosen with intention – whose only outward liabilities, collectively, are some old social media posts and a few once-controversial positions on issues such as immigration and the US’s relationship with Israel that their constituents are increasingly receptive to.\nHere, by contrast, is the process by which Graham Platner, who suspended his Senate campaign on Wednesday night, became the progressive standard bearer in Maine. Last summer, after seeing footage of him speaking out against the development of a salmon farm, a group of national progressive operatives working with local activists and labor groups to find a candidate worthy of taking on 29-year incumbent Susan Collins decided Platner – a veteran, harbormaster and chair of a local planning board, with a small oyster farming operation on the side – was their man on presentation alone.\nHe was then put through a rushed vetting process at a discount – without a full research book on his vulnerabilities or a candidate questionnaire. The next month, Platner was introduced to Maine voters and the world with a viral ad featuring shots of him boating and chopping wood, some now-boilerplate progressive rhetoric about taking on billionaires and rescuing the middle class, and the kind of heave-ho rock’n’roll Ford sells F-150s with.\nHe was buff, gruff and, perhaps best of all, tattooed – traits, many imagined, that would help him connect with the working-class men Democrats have been struggling with. And 10 days later, he was endorsed by Bernie Sanders. A month later, the campaign reported it had raised more than $3m.\nThough Platner eventually won his primary – the establishment’s pick, the incumbent governor, Janet Mills, gained so little traction that she left the race just about two months before election day – the campaign that followed that rollout was beset by a train of scandals practically from the jump, culminating in the rape accusation that finally ended it.\nThe self-exonerating recriminations one would expect have ensued, alongside much more meaningful and serious conversations about how willing some in ostensibly progressive circles are to tolerate sexual abuse and misogyny.\nBut the Platner disaster also gives progressives an opportunity to think critically about their own electoral future – a chance to decide whether the left’s campaigns will be shaped from here on out by the kind of discipline and circumspection it takes to reliably win elections or whether it will continue to field candidates chosen on vibes alone.\nAccording to the New York Times, Platner strategist Dan Moraff, one of the people who recruited him into the race in the first place, compared him to Barack Obama in conversations with Democratic officials in the early days of the campaign. As deluded as that sounds now, it was a telling analogy.\nThough it’s not often remarked upon, it shouldn’t be forgotten that the generation of millennials and older zoomers now managing much of the progressive electoral infrastructure, including campaigns like Platner’s, were molded by the Obama era – a period that began when a charismatic candidate with a change message, aided by early social media, managed to upset and upend his party’s establishment in a hard-fought primary.\nIn 2016, Donald Trump managed a kind of negative-image version of the same within the Republican party, and both of Bernie Sanders’ campaigns for the presidency ran on the same theory of change, which now shapes down-ballot campaigns, large and small – with the right message and agenda, a winning background or personality, and the enthusiasm of base donors and volunteers, an o", "translation_ja": "", "vocab": []}, {"title_ja": "Did the media fall short in its reporting on Graham Platner? | Margaret Sullivan", "title_en": "Did the media fall short in its reporting on Graham Platner? | Margaret Sullivan", "summary_ja": "The twisting road to the candidate’s exit left a lot to be desired. But ultimately, reporters ferreted out the truth After the New York Times published an article in early June about the Senate candidate Graham Platner’s treatment of the women he dated, the story’s main source reacted with disappoin", "summary_en": "The twisting road to the candidate’s exit left a lot to be desired. But ultimately, reporters ferreted out the truth After the New York Times published an article in early June about the Senate candidate Graham Platner’s treatment of the women he dated, the story’s main source reacted with disappoin", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/13/graham-platner-media", "state_media": false, "category": "オピニオン", "full_text": "After the New York Times published an article in early June about the Senate candidate Graham Platner’s treatment of the women he dated, the story’s main source reacted with disappointment and anger.\nIt was a “gift to the Platner campaign”, charged Lyndsey Fifield, who had dated the Democratic combat veteran years ago and who spoke candidly to the Times about that experience.\nThe story’s headline called his behavior “unsettling”. That adjective seemed particularly careful and quite mild if you read deeper into the story. And the story’s narrative approach – including a long lead-in from the perspective of the Platner campaign – was notably indirect.\nBut those who read the article would eventually encounter Fifield’s shocking recollection of how Platner allegedly grabbed her by the shoulders hard enough to leave marks, once yanked her out of a cab against her will, and how during one argument, “he twisted her arm behind her back, shoved her into a bedroom and held the door closed from the other side so she couldn’t get out.” She also told Times reporters that Platner would refer to women as “hatchet wounds”, referring to female anatomy.\nPlatner vehemently denied any violence, and the Times article stated that reporters “could not independently corroborate Ms. Fifield’s account of the altercations”. (Fifield has complained they didn’t try hard enough.)\nWhile the article spooked some Platner supporters, others were quick to label Fifield’s account as a politically motivated smear campaign. They emphasized Fifield’s political leanings; the first reference in the Times article describes her as “a Virginia conservative who has worked for right-leaning groups and Republican campaigns”.\nWith the continued support of progressive elected officials, including Bernie Sanders and Ro Khanna, Platner went on to win the Democratic primary convincingly. As July rolled around, he appeared battered but ready to take on the longtime Republican incumbent Susan Collins in November – and perhaps help turn the Senate blue.\nBut soon, other shoes dropped. Just days ago, Politico published a bombshell story in which another woman Platner dated, Jenny Racicot, described how Platner came to her home drunk and allegedly forced her to have sex against her will.\n“I remember him grabbing my pelvis and being really forceful of me,” she told reporters. “I remember the specific moment where I thought to myself, like, ‘This is no longer my choice.’” Platner denied it and has consistently denied that his treatment of women has ever been nonconsensual.\nPolitico stopped short of using the term rape. But people understand that forced sex is rape, after all, and that’s how the story has been widely received.\nSoon after it published, CNN’s Jake Tapper interviewed Racicot on air, retelling her experience. It all hit hard – much harder than the initial Times story, in which Racicot was a named source but said far less and got far less attention.\nSupporters might have been able to look past Platner’s Nazi-like tattoo, his sexting with multiple women shortly after his marriage, and Fifield’s recollection of his rough treatment. He was, after all, a combat veteran who had experienced PTSD and claimed to have grown and changed; that was all part of his roughhewn appeal.\nBut these allegations of rape were – finally – a bridge too far.\nEven Platner’s most devoted supporters were bailing out when the Washington Post reported, one day later, Fifield’s charges that Platner had repeatedly, and without her consent, removed condoms during sex with her. (He denied this too.)\nPlatner effectively ended his Senate campaign within days. And Democrats’ post-primary scramble to replace him is under way, all to the familiar tune of blame-shifting and finger-pointing.\nAmid this, it’s fair to ask if journalism did its job in reporting fairly and accurately on Platner. In the big picture, I think reporters succeeded in ferreting out the truth, though not with flawless timing or execution.\nAs a result of their work, Maine’s voters (and the nation) know how deeply unsuitable Platner is. And he’s out.\n“All of this is profoundly troubling, wish-we-knew-it-sooner stuff, and a reminder of the patient work that Me Too reporting requires,” wrote Betsy Morais, the editor of Columbia Journalism Review. “Reporting on sexual violence is an extraordinarily difficult, sensitive task, and there are often serious questions of timing and approach.”\nAsked about timing and approach, Times representatives have said they conscientiously published what they were able to verify and in as timely a manner as possible.\nBut questions of “what if?” haunt the mess left behind.\nWhat if the Times story had been more definitive and more direct, but had still come out before the primary?\nWhat if the reporting from Politico, CNN and the Washington Post had come a couple of weeks earlier?\nThat sounds good in retrospect, and with the benefit of hindsight, but this kind of reporting doesn’t happen on a conveni", "translation_ja": "", "vocab": []}, {"title_ja": "Senegal Is on the Brink", "title_en": "Senegal Is on the Brink", "summary_ja": "The IMF, the World Bank, and the debt crisis that imperils West Africa.", "summary_en": "The IMF, the World Bank, and the debt crisis that imperils West Africa.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/senegal/senegal-brink", "state_media": false, "category": "オピニオン", "full_text": "West Africa is reeling. Over the past five years, coups have racked Burkina Faso, Mali, and Niger, and the juntas now in charge are dismantling the countries’ institutions. Even as they repress their subjects, they are losing territory to emboldened insurgents. And as these insurgent groups become more entrenched in the central Sahel, they are beginning to threaten the coastal states of Benin, Côte d’Ivoire, Ghana, and Togo.\nBut amid this upheaval, Senegal remains a democracy in which strong institutions mostly govern capably. The country possesses skilled civil servants with track records of transparent, efficient fiscal management. In 2024, Senegal faced a severe political crisis when the outgoing administration resisted leaving power, but an independent Constitutional Council and an engaged civil society prevented an unconstitutional postponement of elections. Senegal is essentially the only major country in Francophone West Africa whose government remains accountable to its citizens; its stability telegraphs to its neighbors that democratic rule is both desirable and achievable.\nNow, however, Senegal is grappling with its own existential threat. On a single day in February 2025, the country went from being considered one of Africa’s most stable economies to one of its most vulnerable after the discovery that President Diomaye Faye’s predecessor, Macky Sall, had hidden extensive debt. The country’s debt-to-GDP ratio has since soared from under 75 percent to over 132 percent. Amid a recent fallout between the country’s top two political leaders, Senegal is attempting to negotiate a new program with the International Monetary Fund. Without help, Senegal could default.\nA little support in the form of debt relief from the IMF and the World Bank would quickly help restore balance. A punishing debt burden, on the other hand, would sap resources for badly needed public services, infrastructure, and economic development initiatives. Beyond weakening Senegal’s governing capabilities, such an outcome would create new political and security vulnerabilities throughout West Africa at precisely the moment when Russia is trying to exploit disorder to recruit new proxies.\nHIDDEN FIGURES\nOver the past five years, military regimes seized power in the central Sahel states, Côte d’Ivoire elected an 83-year-old fourth-term president who banned opposition candidates from running, and Togo pushed through constitutional reforms to keep a two-decade-old dynasty in power. But Senegal managed to remain stable and accountable. In 2024, civil society actors and an independent judiciary drew on what the political scientists Ibrahima Fall and Catherine Lena Kelly describe as Senegal’s democratic “muscle memory”—decades of mobilizing to defend checks and balances—to ensure elections proceeded on schedule. A duo of youthful reformers (Faye and the fiery Ousmane Sanko, who now serves as speaker of the National Assembly) defeated Sall’s handpicked candidate in a decisive first-round victory.\nAnd until February 2025, Senegal’s economic outlook was mostly sunny, having enjoyed a strong recovery after the COVID pandemic. In recent decades, Senegal has expanded access to quality public services, closed the gender gap in school enrollment, and significantly reduced infant mortality rates. New hydrocarbon projects were expected to allow for increased government investments in roads, energy, and water.\nBut when Faye took over from Sall, his government commissioned an independent audit of state finances to establish the extent of Senegal’s public debt amid rumors of anomalies. The audit’s findings, published on February 12, 2025, came as a shock: they revealed an estimated $7 billion to $13 billion in unreported debt incurred between 2019 and 2023. It became clear that over the course of his second term, Sall had significantly boosted government borrowing and spending as he pursued an unconstitutional third term, all while intentionally misreporting debt figures in legally mandated public accounting to Senegal’s parliament.\nThe huge debt had gone unnoticed because Senegal’s presidency and finance ministry had hidden it from the National Assembly, the IMF, and the World Bank by keeping unrecorded loans off the books. But the latter two institutions played a role in the accrual of the illegal debt. Since the 1990s, the IMF and the World Bank have been long-term development partners for Senegal, making substantial technical and financial commitments intended to promote growth and reduce poverty. The most recent were a $1.8 billion loan package from the IMF and $300 million in budget support from the World Bank. At that point, these institutions had enough material evidence to discern anomalies, yet they kept financing Sall’s government.\nSenegal’s IMF reporting had red flags as early as 2021.\nUnder Senegal’s program with the IMF, the multilateral lender would have had full electronic access to the government’s fiscal and financial data, enabling it t", "translation_ja": "", "vocab": []}, {"title_ja": "America and Iran’s Strange Moment of Opportunity", "title_en": "America and Iran’s Strange Moment of Opportunity", "summary_ja": "How a deadlocked conflict can pave the way for peace.", "summary_en": "How a deadlocked conflict can pave the way for peace.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/america-and-irans-strange-moment-opportunity", "state_media": false, "category": "オピニオン", "full_text": "The U.S.-Iranian relationship is worse than ever before. Over the last four months, the American and Israeli militaries have waged full-scale war against the Islamic Republic, including by assassinating much of its political and military leadership. Iran has retaliated by attacking U.S. military bases, infrastructure in Gulf Arab states, and Israel. The two sides struck a cease-fire deal in early April, and in June they signed a memorandum of understanding designed to end the conflict. But those deals have, so far, failed; Iran and the United States have continued to exchange fire. They remain far apart on core disputes, including those related to Iran’s nuclear program, the Strait of Hormuz, and sanctions relief. As a result, many analysts are skeptical that the parties can eventually achieve a permanent deal.\nThe increasingly sharp hostilities since the memorandum came into effect demonstrate that this skepticism is well-founded. Rather than marking a new chapter in U.S.-Iranian relations, the two sides remain mired in the old. They are trading accusations that the other is operating bad faith and claiming that each is breaching the agreement they reached in April. They are engaging in a fitful dialogue largely conducted through third parties, rather than speaking directly. And their continued use of military force proves that they are willing to up the ante. There were more than 300 U.S. strikes against Iran in recent days. Tehran has retaliated against at least five regional states, as well as multiple ships transiting the Strait of Hormuz.\nYet paradoxically, the war may have created a moment of opportunity for Iran and the United States to repair their broken relationship. That is because the conflict has descended into a mutually unsatisfying stalemate. Washington is clearly unable to topple the Islamic Republic, to compel it to give up its nuclear program, to make it stop supporting its regional allies, or to get it to give up control over the Strait of Hormuz. Tehran is unable to force the United States to vacate its backyard or to abandon its use of coercive economic and military tools. The war, in other words, has made it plainly apparent that neither government can deliver a knockout blow to the other at an acceptable cost—and that unmanaged hostility has become too costly and perilous.\nIn both capitals, many officials are starting to realize this fact, even as the fighting continues. As a result, some decision-makers in each have started looking for ways to coexist. For the first time in nearly a decade, senior American and Iranian officials have met directly as part of negotiations. They are discussing meaningful compromises. And the two sides may agree to set up a hotline that would connect their militaries, designed to help manage conflict before it spirals. If they make good on this tentative pledge, it will be the first such U.S.-Iranian channel since revolutionaries stormed the American embassy in Tehran, in 1979.\nThese efforts might well fail. The memorandum, after all, is on the verge of collapse. Each country is home to formidable forces that oppose diplomacy and prefer confrontation. There will certainly be limits to just how much these two nemeses can achieve via engagement. But both sides may eventually arrive, through sheer exhaustion, at the same reluctant conclusion: the old playbook has failed. Change will still be difficult, but it is imaginable.\nMAXIMUM FAILURE\nThe 2015 Joint Comprehensive Plan of Action was the last serious attempt to stabilize and reset U.S.-Iranian relations. Formally, it was a narrow deal. Iran pledged to restrict its nuclear program and accept increased international inspections. In exchange, the United States offered limited sanctions relief. But politically, the JCPOA was a larger wager. If the status of Iran’s nuclear program could be solved, officials thought, perhaps Tehran and Washington could address other issues, such as Iran’s support for regional militias like Hezbollah in Lebanon and the Houthis in Yemen. Eventually, the two sides might even be able to establish a normal diplomatic relationship.\nBut this proposition was never properly tested. By the time the JCPOA was implemented, in January 2016, negotiators on both sides had reached their limits. Almost immediately after the deal went into force, it came under intense domestic pressure in both countries. In the United States, Republicans roundly rejected it, as did some Democrats, for being too accommodating toward Iran. In Tehran, President Hassan Rouhani and Foreign Minister Mohammad Javad Zarif had to defend the agreement against critics who saw compromise with the United States as at best deeply naive and at worst outright treasonous. Neither group had the diplomatic stamina or the political space to address other points of tension in the bilateral relationship. And when President Donald Trump won office in late 2016, any remaining opportunity vanished. Trump had derided the JCPOA as the “", "translation_ja": "", "vocab": []}, {"title_ja": "How to Win the Defense Innovation Contest", "title_en": "How to Win the Defense Innovation Contest", "summary_ja": "America and its allies must pool their efforts.", "summary_en": "America and its allies must pool their efforts.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/how-win-defense-innovation-contest", "state_media": false, "category": "オピニオン", "full_text": "Washington’s alliances are under immense strain. Many allies and partners are subject to increased threats from great-power adversaries, and they are coming to doubt whether they can rely on the United States. The response to these pressures is to rearm. Like the United States itself, U.S. partners across Asia, Europe, and elsewhere are building up their defense industrial and technological bases to improve their ability to project power, deter enemies, and prevail in a protracted conflict.\nThe problem is that both the United States and its partners have treated their defense buildups primarily as domestic projects when what they need, in fact, is to pool their resources more effectively. The war with Iran demonstrates the risks of a siloed approach: American legacy platforms—stealth fighters, guided missile destroyers, and aircraft carriers—delivered potent attacks but could not eliminate Iran’s military threat. The conflict rapidly depleted U.S. stockpiles of high-end, long-range strike munitions and air defense interceptors, while U.S. bases, Gulf infrastructure, and shipping through the Strait of Hormuz proved vulnerable to cheap and plentiful Iranian missiles and drones. It was just the latest illustration that no single country, not even one as powerful as the United States, can by itself produce drones, ships, and critical munitions on a sufficient scale or develop a defense industrial base that is innovative and adaptable enough to prevail in a protracted, high-intensity conflict or to deter capable adversaries.\nThis is especially true at a time when the adversaries of the United States and its allies are themselves pursuing deeper defense industrial and technological cooperation. During the war in Ukraine, Iran has shared drone technology with Russia, and North Korea has provided munitions and troops. China, which is engaged in its own massive military modernization and industrial scaling projects, has offered Russia dual-use components and economic relief. Moscow, in return, is transferring advanced weapons, know-how, and intelligence to its partners.\nThe United States and a trusted circle of allies and partners—including NATO members; other U.S. treaty allies such as Australia, Japan, and South Korea; and capable partners such as Brazil, India, Israel, and Taiwan—are the world’s leaders in scientific and technological development. As such, they should be able to counter their rivals’ increasingly unified front. But their strengths will go underutilized or misallocated unless they more closely align their efforts. The traditional model of government-to-government cooperation—formal mechanisms including the United States’ foreign military sales program, bilateral coproduction agreements, and NATO procurement processes—remains useful but is inadequate. This system allows too many opportunities for politics to derail progress, and it moves too slowly to keep pace with a battlefield where technological change happens in weeks rather than years.\nThe real momentum for effective and durable cooperation among U.S. allies and partners lies among the private companies and research institutions in which many of the technological innovations that yield cutting-edge military capabilities occur. To maximize the benefits of defense and technological collaboration, the U.S. government and its partners must pair national efforts with transnational ones: pooling allied capital, technical know-how, production capacity, and supply chains through networks of firms, universities, investors, and governments. Building these networks will not only make it possible to innovate more quickly and produce at scale. It will also reinforce the United States’ increasingly uneasy alliances and partnerships, providing durable connections that can withstand a transactional and turbulent world.\nPRIVATE-SECTOR POTENTIAL\nThe United States and its partners are ramping up their defense production capacity and advancing defense innovation. New technologies that originated in the commercial sector, including outer space–based sensors, artificial intelligence, and autonomous systems, have transformed the battlefield in the past five years. The speed with which new technologies are developed and adopted has picked up, too, as demonstrated by the fast-paced innovation in drone technology in Ukraine. Countries are adjusting their innovation processes accordingly. The U.S. military, for instance, has acquired a drone system called LUCAS that is a copy of the Iranian Shahed drone. Last year, the Pentagon launched an ambitious acquisition program designed to make the adoption of new technologies faster and easier, and earlier this year, Secretary of Defense Pete Hegseth announced an aggressive strategy to integrate AI across the department. U.S. allies such as Germany and Japan and partners such as India, meanwhile, have streamlined their innovation structures and processes to better harness commercial technologies.\nBut current efforts prioritize", "translation_ja": "", "vocab": []}];

let curCat = "全て";

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function buildFocusHtml(){
  if(!FOCUS)return"";
  const cards=FOCUS.coverages.map(c=>{
    const sc=c.state_media?" state-media":"";
    const sb=c.state_media?` <span style="color:var(--danger);font-size:.65rem">[国営]</span>`:"";
    return `<div class="cov-card${sc}"><div class="cov-header"><span class="cov-region">${esc(c.region)}</span><span class="cov-name">${esc(c.name)}${sb}</span></div><div class="cov-summary">${esc(c.summary_ja)}</div><div class="cov-perspective">${esc(c.perspective_ja)}</div><a class="cov-link" href="${esc(c.link)}" target="_blank" rel="noopener">元記事 →</a></div>`;
  }).join("");
  return `<div class="focus-section"><div class="focus-label">&#127919; 今日の焦点 — 5社の報道比較</div><div class="focus-topic">${esc(FOCUS.topic_ja)}</div><div class="focus-analysis">${esc(FOCUS.analysis_ja)}</div><div class="cov-list">${cards}</div></div>`;
}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  let html=(curCat==="政治"||curCat==="社会")?buildFocusHtml():"";
  if(!arts.length){el.innerHTML=html+'<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  html+=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
  el.innerHTML=html;
}

function setCat(cat){
  curCat=cat;
  history.pushState({view:"list",cat:cat},"","?tab="+encodeURIComponent(cat));
  renderTabs();renderList();
  document.getElementById("list-view").style.display="block";
  document.getElementById("detail-view").style.display="none";
  window.scrollTo(0,0);
}

function showDetailInternal(idx){
  const a=filteredArts()[idx];
  if(!a)return;
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function showDetail(idx){
  history.pushState({view:"detail",cat:curCat,idx:idx},"","?tab="+encodeURIComponent(curCat)+"&art="+idx);
  showDetailInternal(idx);
}

function backToList(){history.back();}

window.addEventListener("popstate",function(e){
  const s=e.state||{view:"list",cat:"全て"};
  curCat=s.cat||"全て";
  renderTabs();
  if(s.view==="detail"){
    showDetailInternal(s.idx);
  }else{
    renderList();
    document.getElementById("list-view").style.display="block";
    document.getElementById("detail-view").style.display="none";
    window.scrollTo(0,0);
  }
});

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}

(function init(){
  const p=new URLSearchParams(location.search);
  const tab=p.get("tab")||"全て";
  curCat=tab;
  history.replaceState({view:"list",cat:tab},"",location.href);
  document.getElementById("footer").textContent="Generated 2026-07-13 19:05 JST";
  renderTabs();renderList();
})();
</script>
</body>
</html>
