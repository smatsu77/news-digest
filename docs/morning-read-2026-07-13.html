e and the passage of oil tankers and commercial vessels\".\nAny cooperation with the US would be considered an act of \"war\" against Iran's sovereignty, he added, warning that if the conflict spreads \"the flames of war will engulf all the countries of the region\".\nWhat Trump's latest announcement means in practice remains unclear.\nUnited Nations rules allow countries to exercise control of territorial seas up to 12 nautical miles (13.8 miles) from their coastline. At the narrowest point, the Strait of Hormuz and its shipping lanes lie entirely within Iran and Oman's territorial waters.\nIran effectively shut down the strait - through which some 25% of the world's oil and 20% of global liquefied natural gas previously passed - after the US and Israel launched strikes against Iran on 28 February.\nTehran retaliated by firing missiles and drones on Israel and US military bases in a number of Gulf countries.\nIran's Islamic Revolutionary Guards Corps (IRGC) also fired on commercial ships attempting to go through the strait without its permission, and seized two vessels. Maritime traffic through the strait dropped dramatically, triggering a rise in oil prices.\nThe US first imposed a naval blockade of all Iranian ports in April to put pressure on Tehran, eventually lifting it in June as part of an initial memorandum of understanding between the two countries to end the conflict.\nNow, many US allies are likely to baulk at the prospect of reimbursing the US and paying 20% of all cargo shipped - and Trump detractors at home and abroad are likely to point out that the strait was open and unencumbered before the war began.\nThe announcement could also become politically complicated for the president domestically.\nSome lawmakers - including fellow Republicans - had openly questioned what the US gained from the ceasefire, its extension and further negotiations.\nMany Americans are also likely to wonder why - despite repeated promises to the contrary - oil prices are inch ring through Bédar, leaving Malcolm, Annette and their friends having to make the quick decision to flee.\nAs the flames - aided by strong winds - neared their property on Thursday, the couple and their neighbours decided to try escape by car.\nBut Malcolm chose to head back to their house for their cats, Charlie and Lilly.\n\"If we'd have done the sensible thing and gone the other way and let our cats die, we both would be alive. But when you've got animals, you don't think like that.\"\nWith both cats secured, Malcolm says he attempted to catch up with the group - but saw they were now out of their vehicles.\n\"My wife and our other seven friends and neighbours - against me screaming at them not to - decided the only safe way was to walk out in front of the firewall.\n\"I've subsequently heard that that fire wall was moving at 20 kilometres per hour, plus. They had no chance.\"\nFinding himself on his own in the chaotic situation, Malcolm said he attempted to take refuge in the now-abandoned cars: \"Of the six cars, four of them instantly combusted and as each one started to go, I moved back one car.\n\"For some reason of fate, the last two cars, although very, very badly singed and paint bubbled and burnt, survived.\n\"And I survived inside the last one with a cat.\"\n- British couple return to village at heart of deadly Spanish wildfire - Published18 hours ago\n \nThe flames eventually passed by and Malcolm was rescued by emergency workers.\nHowever the bodies of eight people were subsequently discovered on a path down from the couple's house.\nThere are still four large scorch marks where four vehicles were discovered burnt out.\nLocal authorities have said four more victims of the fire, recovered in a right hand drive vehicle, were thought to be British.\nNot all of those killed in the wildfire have yet been identified, but Spanish authorities have said that three Britons and one national each from France, Belgium and Spain were among the victims.\nOne of them was a 93-year-old woman, believed to be British, who died of her injuries in hospital on Sunday.\nMany British expats in the village of Bedar have criticised the lack of a mobile phone alert - but Malcolm did not want to apportion blame.\nLocal authorities \"didn't have time to get the seaplanes here before dark,\" he said, adding: \"The helicopters couldn't get up because of the smoke.\"\nWith high winds, dry land and soaring temperatures, Malcolm believed there could not have been a worse combination.\n\"It's nobody's fault. Nobody can be blamed for this.\"\nMalcolm says he has been overwhelmed by the support of friends of all nationalities.\nHe and Annette moved to Spain after many years sailing together. They had each previously lost their partners to terminal illnesses and shared a love of travel and making new friends.\nThe couple had hoped to live out their final years together in the tranquillity of the Andalusian countryside.\n\"There's just that little spark of hope, even though I know a body has been found clutching a cat. Hard cold facts are pointing to the bodies they've found.\"\nMalcolm said the local police have also been a huge help and have been keeping him up to date with their work.\nBut he fears what will happen in the coming days as his the magnitude of his loss hits him.\n\"So we are just waiting now for DNA clarification. And after that, I will probably just fall apart.\"\nAdditional reporting by Kostas Kallergis and Juan Dominguez.", "translation_ja": "", "vocab": []}, {"title_ja": "At least 28 killed, 25 critically injured after fire engulfs Bangkok bar", "title_en": "At least 28 killed, 25 critically injured after fire engulfs Bangkok bar", "summary_ja": "Firefighters arrived at the scene in the Chatuchak district to find patrons running through flames to escape.", "summary_en": "Firefighters arrived at the scene in the Chatuchak district to find patrons running through flames to escape.", "source": "BBC World", "tier": "public", "link":  reported. \"There was a boom – a very fast boom... There was no way to get out at all,\" 41-year-old Usa Tadsree said.\nShe described seeing rescuers carry out the body of a friend she was drinking and enjoying the music with, just minutes earlier.\n\"I lost my mind,\" she said. \"It looked like she was asleep.\"\nPrime Minister Anutin Charnvirakul, who visited the scene early on Monday, said a musician who was performing when the fire broke out told him \"there was blasting and everybody tried to flee from the smoke and flames\".\nMany people did not make it out of the bar because they \"went to the back of the building and tried to hide themselves... in the toilet\", the musician said, according to Anutin.\nFirefighters, who were alerted to the blaze by a passing driver, were reportedly able to bring the flames under control in about half an hour.\nHowever, despite their efforts, 28 people were killed. Some 71 people were injured, including 25 who are in critical condition, authorities said.\nAccording to an update on Monday evening, 14 people are moderately injured, while 32 are slightly injured.\nThe owner of the bar is among those currently in intensive care.\nInitial findings suggest the majority of the victims died from smoke inhalation, said Suriyachai Raviwan, the director of Bangkok's disaster mitigation department.\nBangkok governor Chatchart Sittipunt said the flammable interior decorations on the bar's ceiling may have facilitated the blaze's rapid spread.\nThere are also reports of people found unconscious near the building's emergency exit, suggesting that there may have been some obstruction, the governor added.\nAuthorities say these suggestions can only be confirmed through further investigation by forensic officers.\nOne motorcyclist, Surin Jaiharn, told AFP that he helped about five people flee the burning bar using clothing to extinguish flames on their bodies.\n\"I feel depressed. I saw many deaths and I do not know the fate of the people I helped,\" he told AFP.\nThe driver who alerted the fire department told Thai news outlet the Daily News that he broke windows to help two people escape.\nDramatic video footage of the event showed smoke billowing, and then fire blasting, through a doorway. Fire investigator Vithyaa Thavapalan told the BBC this is not unusual.\n\"As the fire grows, a layer of extremely hot gases and smoke forms beneath the ceiling. Once an opening such as a doorway becomes available, that hot gas layer vents out of the building,\" the managing director and forensic fire investigator at Forensic Origin & Cause Investigations described.\n\"While it appears intense, this can be normal behaviour in a well-developed compartment fire,\" he added.\nAs of Monday morning, the bar has been cordoned off, with shattered windows and furniture piled up outside its entrance. Confronting pictures have emerged of many body bags lined up outside the bar.\nInside, the furniture, walls and ceiling are completely blackened, with parts of the ceiling peeled off. When the BBC arrived at the scene on Monday, an acrid smell of burning lingered in the air.\nThe Chatukchak district office announced on Monday that the b", "translation_ja": "", "vocab": []}, {"title_ja": "Ann Widdecombe suspect not known to Prevent as counter terrorism police take over investigation", "title_en": "Ann Widdecombe suspect not known to Prevent as counter terrorism police take over investigation", "summary_ja": "Home Secretary Shabana Mahmood confirmed the suspect was not known to the government's anti-terrorism programme in an update to MPs.", "summary_en": "Home Secretary Shabana Mahmood confirmed the suspect was not known to the government's anti-terrorism programme in an update to MPs.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c0mydjl12mwo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Ann Widdecombe suspect not known to Prevent as counter terrorism police take over investigation\n- Published\nCounter terrorism police are now leading the investigation into the death of Ann Widdecombe after \"new information and evidence\" came to light, officers have said.\nA 28-year-old white British man from Rotherham, South Yorkshire, originally arrested on suspicion of murder on Saturday, has now been re-arrested on suspicion of commission, preparation or instigation of acts of terrorism.\nSpeaking in the House of Commons on Monday, Home Secretary Shabana Mahmood confirmed the suspect was not known to the government's Prevent anti-terror scheme.\nWiddecombe, a 78-year-old former Conservative minister turned Reform UK spokeswoman, was found dead at her home in Devon, having sustained serious injuries.\nHer death sparked a manhunt resulting in the suspect's arrest at about 21:00 on Saturday.\nCounter Terrorism Policing South East (CTPSE) said new information had \"come to light during what has been a dynamic and complex investigation\".\nNational Counter Terrorism Policing head Laurence Taylor said the new arrest builds on \"progress made by our colleagues in Devon and Cornwall Police\", and that they were working to establish a motivation for the the attack.\n\"Our priority is progressing this investigation quickly, with all the capabilities we have available to us. If anyone has any information, please share it with the police,\" he added.\nThe announcement comes after the suspect in the investigation was seen in CCTV footage appearing to get into a car in Yorkshire, hours before the former Conservative minister is thought to have been attacked in her home in Devon.\nThe man, dressed in a white shirt and shorts, can be seen getting into a red vehicle outside a house in Rotherham with a long object appearing to protrude from his shorts pocket, in footage time-stamped at 07:51 on Wednesday, first reported by the Sun., external\nThe distance between Widdecombe's home and Rotherham, where the 28-year-old was arrested, is about 270 miles (430km) - about a four-and-a-half-hour drive.\nAt least two police vehicles were seen parked outside a property in Rotherham believed to be connected to the investigation on Sunday, which was cordoned off while officers and forensic teams worked at the scene.\nSpeaking to BBC News on the same day, one neighbour said: \"I was making some food in the kitchen and looked out the window, there was loads of banging, and there was armed police in the pathway and they just went into the house and pulled [the suspect] out.\"\nAnother neighbour said police took a red car off the drive.\nIn her statement to MPs on Monday afternoon, Mahmood also paid tribute to Widdecombe as \"forthright and fearless\" and as someone who \"thought seriously about ideas but she did not take herself too seriously\".\nShe said her death raised questions about the security of those in public life, and that police intend to issue guidance to MPs on safety soon.\nMahmood added she had recently commissioned former Lord Chancellor Sir Robert Buckland to review the lessons learned from the murder of Conservative MP Sir David Amess in 2021 regarding security for MPs.\nShe acknowledged Widdecombe's death would be a \"particular concern\" for Reform UK and its leader Nigel Farage, and said she has offered him a meeting with the chair of Royal and VIP Executive Committee (Ravec) - the public body responsible for managing the security of those in public life.\nPosting on X, Farage thanked Mahmood for the offer and said he would meet with Ravec's chair to \"discuss the security of all Reform politicians, including those who are not MPs\".\nAlso speaking in the Commons, Shadow Home Secretary Chris Philp described Widdecombe as a public figure who was \"always formidable, always charming, always entertaining\", while Reform UK's deputy leader Richard Tice said she was \"a colossus\" in public and political life and that whenever she called him, he \"always stood up on my toes\".\nOn Sunday, Devon and Cornwall Police had said there was \"nothing to suggest\" the murder was politically motivated.\nAssistant Chief Constable (ACC) Matt Longman had said officers remained \"open-minded\" about a potential motive and that there was not thought to be any threat to the wider public.\nDevon and Cornwall Police said it believed Widdecombe was attacked on Wednesday at about 12:30 and had since received more than 120 reports of information after making a public appeal.\nOver the coming weeks there would remain a \"heightened\" police presence in the local area, ACC Longman added.\nWiddecombe served as the Conservative MP for Maidstone for 23 years, holding ministerial roles in Sir John Major's government between 1994 and 1997.\nFollowing her departure from the Commons in 2010, Widdecombe appeared on BBC's Strictly Come Dancing that year, and was a runner-up on Celebrity Big Brother eight years later.\nShe joined the Brexit Party in 2019, where she represented South West England as its ME", "translation_ja": "", "vocab": []}, {"title_ja": "Burnham cements Labour leadership with backing of 349 MPs", "title_en": "Burnham cements Labour leadership with backing of 349 MPs", "summary_ja": "The MP for Makerfield is on track to become the prime minister next week after receiving the support of the vast majority of Labour MPs.", "summary_en": "The MP for Makerfield is on track to become the prime minister next week after receiving the support of the vast majority of Labour MPs.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c05y3rj09qqo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Burnham cements Labour leadership with backing of 349 MPs\n- Published\nAndy Burnham has effectively been confirmed as the new Labour leader with 349 of the party's MPs having now nominated him to replace Sir Keir Starmer.\nAfter a second day of nominations, the MP for Makerfield received the support of a further 27 Labour MPs - putting him on track to become prime minister on 20 July, with it now mathematically impossible for a rival to run against him.\nHe still requires the backing of three organisations affiliated to the Labour Party, at least two of which must be trade unions, although this is expected to be a formality.\nThe former mayor of Greater Manchester will field questions from Labour MPs as the only participant in an online hustings on Monday evening.\nIt marks an extraordinary rise to power for a man who returned to Westminster only three weeks ago following his historic by-election win in Makerfield.\nIn a statement on Thursday after receiving the backing of 322 MPs on the first day of nominations, Burnham said support for him had come from across the party and reflected a \"shared belief that Britain needs a new approach to politics\".\n\"That is the circuit breaker I am offering: power out of Westminster, an economy rewired for ordinary people, and good growth in every postcode,\" Burnham said.\nUnder Labour's rules, leadership candidates need 20% of the party's MPs - 81 out of a total of 403 - to nominate them. With 349 officially backing Burnham, no rival candidate can now be nominated.\nBurnham's own by-election victory and heavy Labour losses in May's local elections left Sir Keir facing calls from his own MPs for him to stand aside and allow Burnham to replace him.\nSir Keir quit as Labour leader on the same day Burnham was sworn in as an MP.\nBurnham has twice before run to become the Labour leader, in 2010 and 2015 - losing to Ed Miliband and Jeremy Corbyn respectively.\nThis time round, he has run unopposed and his route to No 10 will not require a vote over the summer among party members and affiliated trade union supporters.\nWes Streeting, Sir Keir's former health secretary, had been seen as a possible challenger, but he endorsed Burnham shortly after the prime minister's resignation.\nFormer Defence Minister Al Carns, who resigned from government following a dispute over the funding plan for the military, was then seen as the most likely remaining challenger to Burnham, but he ruled himself out of contention last Wednesday.\nBurnham has faced calls from some within Labour to offer more details on policies he will look to implement in government.\nThe 56-year-old left Westminster in 2017 to run for the Greater Manchester mayoralty. He was elected three times.\nBut it has meant his opportunities to forge strong relationships with MPs elected since 2017, who make up the bulk of the Parliamentary Labour Party, have been limited.\nHe has also faced accusations of avoiding media scrutiny since he announced his intention to stand to replace Sir Keir. He has not taken questions from journalists after speeches and has so far given an interview only to Andrew Marr on LBC.\nBurnham's approach to social media is also a central part of his team's strategy. The former Greater Manchester mayor frequently posts videos setting out areas of policy, and he has also held an online Q and A session for Reddit users.\nRelated topics\n- Published1 day ago\n \n- Published3 days ago", "translation_ja": "", "vocab": []}, {"title_ja": "UK bans support for Iran's Islamic Revolutionary Guard Corps", "title_en": "UK bans support for Iran's Islamic Revolutionary Guard Corps", "summary_ja": "Shabana Mahmood will use new powers to ban support for the group, which has been linked to death threats and intimidation on British soil.", "summary_en": "Shabana Mahmood will use new powers to ban support for the group, which has been linked to death threats and intimidation on British soil.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cz0jkj7e87go?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "UK bans support for Iran's Islamic Revolutionary Guard Corps\n- Published\nHome Secretary Shabana Mahmood has announced Iran's Islamic Revolutionary Guard Corps (IRGC) will be designated a threat to national security.\nMahmood will use new government powers to ban support for the group, which has been linked to death threats, attacks and intimidation in the UK.\nIn a written statement to Parliament, she set out how support for the IRGC, from expressing a positive opinion to assisting them, will now be an offence punishable by up to 14 years in prison.\nTwo other groups are also being proscribed, the Islamic Movement of Companions of the Right (IMCR), and the volunteer corps of Russia's GRU (foreign military intelligence agency).\nNew powers will be given to police and intelligence agencies to tackle espionage, foreign interference, sabotage and physical attacks from these groups.\nIran's IRGC is believed to have directed seven attacks at UK locations linked to Jewish and Israeli communities, including the antisemitic arson attack on four Hatzola ambulances in Golders Green on March 23, which the IMCR publicly claimed responsibility for.\nThe prime minister promised to fast-track the National Security (State Threats) Act in April this year, and draft regulations for proscription can now be laid before parliament.\nAnnouncing the new powers, Sir Keir Starmer said: \"We will never let Britain be a playground for states who want to spread fear, division and violence on our streets.\n\"We have already taken tough action against the Iranian regime and those linked to it, and against Russian operatives and networks targeting our country.\n\"These new powers will make it easier to prosecute and lock up anyone carrying out their dirty work here in Britain.\"\nIf approved by Parliament later this week, those conducting acts of sabotage including arson on behalf of these groups could face life imprisonment.\nThe change means prosecutors will no longer need to establish a foreign power connection in every case, making it easier and more straightforward to build cases.\nHome Secretary Shabana Mahmood said: \"Iran and Russia are using proxies and thugs to do their dirty work on our shores.\n\"I have rapidly designated three groups so those working for them will be tracked down and put behind bars.\"\nMI5 identified at least 20 potentially lethal Iranian-backed plots against people in the UK in the last year, and the IRGC is central to the Iranian state's operations, which particularly targets the Jewish community and Iranian dissidents.\nThe IRGC was set up after the 1979 revolution to defend the country's new Islamic system, but has since become a powerful arm of the state with a reach beyond Iran's borders and an estimated 190,000 active personnel.\nThe militia has consistently been accused by Western nations of sponsoring terrorism abroad, and has been listed as a terror group by Australia, Canada and the US.\nIn January this year, the European Union also added the IRGC to its terror list, following its reported role in brutal crackdowns on Iranian protesters in Iran the same month.\nThe UK has lagged behind but now argues new powers are required in the face of a rise in state-backed aggression – increasing in scope and complexity with more threats to life and increased use of proxy groups.\nIn a written statement, Home Office minister Angela Eagle said: \"The Islamic Revolutionary Guard Corps is a central component of the Iranian state's security apparatus, answerable directly to Iran's Supreme Leader.\n\"Its role extends far beyond that of a conventional military force. It encompasses intelligence activity, the use of proxy actors, and the projection of influence designed to advance Iranian state objectives.\"\nRelated topics\n- Published16 October 2025\n \n- Published10 July 2025\n \n- Published16 November 2022", "translation_ja": "", "vocab": []}, {"title_ja": "Person killed in ICE-involved shooting in Maine", "title_en": "Person killed in ICE-involved shooting in Maine", "summary_ja": "US Immigration and Customs Enforcement agents were involved in a fatal shooting in Biddeford, according to Maine's House speaker. It comes days after ICE allegedly shot a man in Texas during a traffic stop.", "summary_en": "US Immigration and Customs Enforcement agents were involved in a fatal shooting in Biddeford, according to Maine's House speaker. It comes days after ICE allegedly shot a man in Texas during a traffic stop.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/person-killed-in-ice-involved-shooting-in-maine/a-77941733?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Person killed in ICE-involved shooting in Maine\nJuly 13, 2026One person was killed in a shooting involving United States immigration agents in Maine, the state's top lawmaker said.\n\"This morning a shooting occurred in Biddeford. A person was killed. ICE was involved,\" House Speaker Ryan Fecteau wrote on Facebook.\nBiddeford police declined to comment and referred inquiries to Immigration and Customs Enforcement (ICE), which did not immediately respond to requests for comment.\nThe FBI said it responded immediately to assist at the scene of the shooting but did not offer any additional information.\nWhat we know about the shooting\nSenator Angus King from Maine said Homeland Security Secretary Markwayne Mullin told him the agent opened fire in Biddeford after the man tried to use his vehicle as a weapon against agents who were pursuing him for deportation.\nThe agents involved in the shooting did not have body-worn cameras, King said.\nAn eyewitness to Monday's shooting, Lucas Scott, told local media he heard four gunshots after several ICE agents surrounded a white car.\nThe man shot was a 26-year-old from Colombia according to advocacy groups Maine Immigrants’ Rights Coalition and Presente! They said he was authorized to work in the US and had a Social Security number.\nProject Relief, an immigrant rights group, said in a social media post that one of its community members was killed during an encounter with ICE in Biddeford and that it was in contact with the person's family.\n\"This was a young person whose life was cut short,\" the group said, calling for justice and support for the family and community.\nMaine Governor Janet Mills said she had been briefed on the fatal shooting \"involving Federal law enforcement\" and that state authorities were working with federal authorities to determine what happened.\nAn uptick in Trump's immigration crackdown\nThe reported shooting came days after ICE agents shot a man during a vehicle stop in Texas. Officials later said the man was not the intended target.\nIf an ICE officer delivered the fatal shot, it would mark at least the ninth death, including the killings of Alex Pretti and Renee Good in Minnesota, linked to an encounter with federal immigration officials since President Donald Trump launched an immigration crackdown.\nIt also comes amid a newly intensified anti-immigration push by the Trump administration.\nSince the beginning of June, ICE arrests in Maine have more than quadrupled to around 70 per day in early July, according to\ninternal ICE data shared with Reuters news agency by a source.\nEdited by: Jenipher Camino Gonzalez\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google, so you'll always see our verified news first.", "translation_ja": "", "vocab": []}, {"title_ja": "Gaza Strip: EU conference pledges €900m in donations", "title_en": "Gaza Strip: EU conference pledges €900m in donations", "summary_ja": "The conference in Brussels was attended by Palestinian representatives. The EU's top diplomat said the bloc's support depends on reforms in the Palestinian Authority.", "summary_en": "The conference in Brussels was attended by Palestinian representatives. The EU's top diplomat said the bloc's support depends on reforms in the Palestinian Authority.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/gaza-strip-eu-conference-pledges-€900m-in-donations/a-77940038?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Gaza Strip: EU conference pledges €900m in donations\nJuly 13, 2026The Gaza Strip will receive some €900 million ($1 billion) in donations from Europe, after an EU-backed conference raised the funds for the reconstruction of the embattled enclave.\nWith about a half of its two million residents living in tents due to Israel's war with Palestinian Islamist group Hamas, considered a terrorist organization by the US, the EU and other countries, the funding will first go to providing the Palestinian territory with basic water and sanitation facilities, as well as restoring the Gaza Strip's health and food systems hit hard by the war with Israel.\nThe Team Gaza Initiative will coordinate the efforts to rebuild the enclave.\nThe EU's foreign policy head Kaja Kallas said reforms in the Palestinian Authority are needed for the bloc to continue supporting it.\nPalestinianrepresentatives, as well as representation of the Board of Peace, established by US President Donald Trump, were among the invitees to the conference.\nHow much money is needed to rebuild Gaza?\nAccording to a UN report from May 2026, the recovery and construction works needed in the Gaza Strip are estimated at $71.4 billion (€62.6 billion)\nThe report also says 371,888 homes have been directly affected by the war, which makes three quarters of the enclave's housing stock. 85% of the affected homes have been completely destroyed.\nSome 1.9 million Palestinians — more than 90% of the Strip's population — were displaced by the war between Israel and Hamas, some of them multiple times.\nThe war broke after the Hamas-led terrorist attacks on October 7, 2023, that claimed the lives of some 1,200 Israelis, with 251 people being taken hostage.\nWhat's the situation like in Gaza now?\nMore than 71,000 Palestinians have been killed in the Gaza Strip since October 7, 2023, many of them women and children. Some 450 of them were killed between the ceasefire's announcement and mid-January 2026, the UN report said.\nNearly 70% of the Gaza Strip is still in control of the Israeli army, with the rest still being managed by Hamas, which have so far refused to lay down their arms as agreed in the October 2025 ceasefire deal mediated by the US, Egypt and Qatar.\nThe Board of Peace, a technocratic body led by Bulgarian diplomat Nickolay Mladenov, was established to manage the Gaza Strip's civil matters.\nIs the Gaza war considered genocide?\nIn September 2025, the UN Commission of Inquiry, the organization's investigative body, blamed Israel for committing genocide against Palestinians in Gaza. Several high-profile human rights organizations in Israel and around the world also consider the Israeli army's operations in Gaza as genocide.\nThe International Court of Justice (ICJ) is currently considering a genocide case brought by South Africa in 2023.\nIsrael has repeatedly denied the claim.\nEdited by: Jenipher Camino Gonzalez", "translation_ja": "", "vocab": []}, {"title_ja": "Germany set to curb its Freedom of Information Act", "title_en": "Germany set to curb its Freedom of Information Act", "summary_ja": "The German government wants to amend the Freedom of Information Act. Critics fear the changes will water down the government's obligation to disclose information.", "summary_en": "The German government wants to amend the Freedom of Information Act. Critics fear the changes will water down the government's obligation to disclose information.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-set-to-curb-its-freedom-of-information-act/a-77939695?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Germany set to curb its Freedom of Information Act\nJuly 13, 2026Shortly before the German parliament's summer recess, lawmakers approved a whole series of reforms. \"These reforms are meant to get Germany back on track,\" said Chancellor Friedrich Merz optimistically.\nToward the bottom of the 34-point list of reforms is something that has begun to cause great controversy: the ruling coalition of conservative Christian Democratic Union (CDU)/ Christian Social Union (CSU) and the center-left Social Democratic Party (SPD) wants to significantly alter the Freedom of Information Act (IFG), which has been in effect since 2006. Critics say, the plan is to abolish it altogether.\nThe IFG grants every individual the right to access official information held by federal agencies. This is the law that many organizations, including environmental groups, consumer protection organizations and, not least, journalists, cite to demand that government agencies provide them with data and substantive material quickly and free of charge.\nExceptions apply only to security-related information, such as that held by intelligence agencies, which is, understandably, subject to special protection.\nThe IFG is crucial for journalists and NGOs\nHowever, in the opinion of CDU and CSU, all government information must be treated with exceptional confidentiality in an era of global cyberwarfare and hacker attacks. The government has long intended to significantly amend the regulations.\nNow, the 34-point reform paper states that there is a particular need to protect government data during \"times of highly complex threats, both domestic and foreign.\"\nAccording to the government's plan, this could effectively mean that only \"natural persons\" — not associations or organizations — would have the right to submit requests to government agencies. Currently, requests submitted to, for example, federal ministries are answered either free of charge or for a small fee; now, fees could rise significantly. And the names of employees in government agencies and ministries, among others, could be redacted in the future to protect them \"from hostility and threats.\"\nForeign citizens' rights\nWhat is likely to be even more controversial: the government wants to look into the legality, under current law, of limiting these rights to \"German citizens and EU citizens living in Germany\" — that is, to citizens of the European Union. What's more, information on subjects like critical infrastructure, counterintelligence and counterterrorism should be handled with particular care going forward.\nAs a member of the Parliamentary Oversight Panel overseeing the intelligence services, Konstantin von Notz, lawmaker from the opposition Green Party, is very familiar with handling sensitive information. Yet he has said about the new plans: \"Under the pretext of having to adapt to new security threats, they are fundamentally undermining the legal foundations of government transparency.\" The coalition promised to modernize the state, he said, but this is \"the exact opposite — namely, a drastic step backward from hard-won civil rights.\"\nAn open letter from 110 organizations\nIn an open letter, 110 civil society organizations — including Greenpeace, Transparency International and Amnesty International — have urged the government: \"Stop these plans! Protect the Freedom of Information Act (IFG) and freedom of information in its current form.\" The letter continues: \"Anyone who limits the right to access information to individual cases, subjects it to mandatory justification, excludes organizations and raises fees — without warning — to exorbitant levels is effectively abolishing freedom of information.\"\nMartin Kaiser, a climate expert with the environmental group Greenpeace, told DW: \"If the federal government now wants to curtail the right to information, it will hinder oversight and public participation and reduce public acceptance regarding infrastructure, land use, species conservation and climate protection. This does not build trust; it creates new mistrust.\"\nCriticism has been so fierce that even members of the ruling coalition in the Bundestag now want to reconsider the planned reform. Experts from the Social Democratic Party's Bundestag committees on the Interior, Digital Affairs and Consumer Protection have issued a joint statement declaring: \"Any curtailment of the existing rights of citizens, the press and civil society to access information must not be allowed to proceed.\" It continues: \"The SPD parliamentary group in the Bundestag will not approve any move to abolish the current level of transparency provided by the Freedom of Information Act.\"\nAbout 100,000 information requests in seven years\nAccording to official figures, the existing right to information has been widely exercised. As the Bundestag reported, a total of approximately 105,000 requests were submitted to German authorities between 2015 and 2022. In only a fraction of those cases — about 16,200 — was information pa", "translation_ja": "", "vocab": []}, {"title_ja": "Judge refers Trump's attorneys for potential disciplinary action over IRS lawsuit", "title_en": "Judge refers Trump's attorneys for potential disciplinary action over IRS lawsuit", "summary_ja": "A judge has referred President Trump's lawyers for potential disciplinary action for filing the suit against the IRS that led to the creation of Anti-Weaponization Fund.", "summary_en": "A judge has referred President Trump's lawyers for potential disciplinary action for filing the suit against the IRS that led to the creation of Anti-Weaponization Fund.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/US/judge-refers-trumps-attorneys-potential-disciplinary-action-irs/story?id=134719548", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "LIVE:  ABC News Live", "title_en": "LIVE:  ABC News Live", "summary_ja": "24/7 coverage of breaking news and live events", "summary_en": "24/7 coverage of breaking news and live events", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Federal immigration authorities involved in Maine fatal shooting", "title_en": "Federal immigration authorities involved in Maine fatal shooting", "summary_ja": "An Immigration and Customs Enforcement agent was involved in a shooting Monday morning in Biddeford, Maine, federal immigration authorities said.", "summary_en": "An Immigration and Customs Enforcement agent was involved in a shooting Monday morning in Biddeford, Maine, federal immigration authorities said.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/US/ice-agent-involved-shooting-maine-authorities/story?id=134714502", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Killings continue on Del Monte farm in Kenya, families say, after G4S hired for security", "title_en": "Killings continue on Del Monte farm in Kenya, families say, after G4S hired for security", "summary_ja": "Exclusive: Three men killed in incidents over past year allegedly involving G4S guards, who replaced in-house team after previous deaths Bereaved families and politicians have raised alarm about continued killings on Del Monte’s pineapple farm in Kenya despite the company hiring a British security f", "summary_en": "Exclusive: Three men killed in incidents over past year allegedly involving G4S guards, who replaced in-house team after previous deaths Bereaved families and politicians have raised alarm about continued killings on Del Monte’s pineapple farm in Kenya despite the company hiring a British security f", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/13/del-monte-pineapple-farm-kenya-deaths-g4s", "state_media": false, "category": "政治", "full_text": "Bereaved families and politicians have raised alarm about continued killings on Del Monte’s pineapple farm in Kenya despite the company hiring a British security firm to replace its in-house security team after previous deaths were exposed by the Guardian.\nThe multinational food company appointed G4S to guard the farm, which is estimated to cover at least 40 sq km, the area of a small city, after the Guardian detailed allegations of brutal assaults and killings of people suspected of trespassing on its land. Kenyan police have been working with G4S to guard the site.\nThree men, including two brothers, were killed in separate incidents over the past year allegedly involving G4S guards.\nStephen Marubu Kibandi, 34, was shot in the chest from close range by a police officer working alongside G4S guards last August after they claimed to have been attacked. The victim put his hands up in surrender before being shot, according to a witness.\nHis brother, 27-year-old Haron Kame Kibandi, died in April this year after allegedly being struck on the head by stones thrown by G4S guards and falling from a motorbike. A third man, 31-year-old Michael Muiruri, was killed after being knocked off a motorbike by a G4S pickup truck.\nIn 2023, the Guardian revealed allegations about the killing of four men at the farm over a decade. Security at the farm was reviewed as part of a human rights impact assessment, which found that the farm was causing human rights harms across several areas. In March 2024, Del Monte Kenya outsourced all of the security at the farm to a team of 270 G4S guards.\nAnnouncing the deal, Wayne Cooke, the then acting managing director of Del Monte Kenya, said: “The safety and security of each individual within our company and the surrounding community are our top priority.” Del Monte Kenya appointed a new manager to address its “human rights challenges”.\nThis year, the Kenyan police extended their work with G4S to guard the site, setting up a “critical infrastructure protection unit” to help improve security at the farm.\nCampaigners fear there will be more deaths on Del Monte’s pineapple farm because the involvement of police makes the use of lethal force more difficult to prosecute. G4S denies wrongdoing.\nThe farm in Murang’a county is the largest exporter of Kenyan produce, including to several UK supermarkets, and is worth more than $100m a year. The average monthly salary in the county is about £280 ($380) and pineapple theft has been a problem for decades.\nA Kenyan senator has called for an independent investigation into the violence at the farm.\nStephen Marubu Kibandi\nStephen Marubu Kibandi died instantly when he was shot in the chest on 12 August 2025. A witness said Kibandi was among several men who were being chased by police and G4S guards on the Del Monte farm after resisting arrest. They said he was shot by a police officer while raising his hands in surrender. G4S says the police and guards were being attacked by men wielding machetes who also set fire to a G4S vehicle.\nA copy of his postmortem findings, seen by the Guardian, said Kibandi died from “severe haemorrhage due to perforating chest injury due to single gunshot”. His death is being investigated by the police watchdog, the Independent Police Oversight Authority (IPOA).\nG4S says it has shared footage with the IPOA showing police and its officers being attacked by men throwing stones and wielding machetes before the fatal shot was fired by a police officer. The spokesperson said its video also showed a G4S vehicle being set alight. The company declined to share the footage with the Guardian.\nStephen Nderitu, who witnessed the incident, said his friend had been approaching the police to argue they were doing nothing wrong. He told the Guardian: “There were two policemen and two G4S guards about 50 metres from where we were when I saw one of them point a gun at us and I jumped into the nearby thickets. Marubu held up both his hands and I heard a gunshot and saw him go down.”\nThe incident has been widely condemned and later prompted a protest in which a G4S van was burned. The local MP, Mary Wamaua Waithira, said: “Why shoot someone who has surrendered? He had lifted his hands up. We want the commanding officer for Ngati police station removed.”\nHaron Kame Kibandi\nStephen’s brother, Haron, died on 20 April this year from brain injuries, days after being struck on the head by stones. Before his death, he claimed the stones had been thrown by G4S guards. Haron told medics this had caused him to fall from a moving motorbike being ridden by a friend. He was allegedly beaten, according to an account he gave to medics.\nSimon Mburu, the manager of a health clinic to which Haron was taken, said: “He told me that he was hit by a stone by a G4S guard and when he fell down the person riding the bike continued.” When Haron was transferred to a hospital, he gave the same account. He died four days later. Scans revealed he had a “traumatic head injury” incl", "translation_ja": "", "vocab": []}, {"title_ja": "First patients enrolled in record-breaking Ebola treatment trial in DRC", "title_en": "First patients enrolled in record-breaking Ebola treatment trial in DRC", "summary_ja": "Two drugs are being trialled in the Ituri region in a programme set up just six weeks after the outbreak was declared, with hopes it will reduce mortality rates There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo ", "summary_en": "Two drugs are being trialled in the Ituri region in a programme set up just six weeks after the outbreak was declared, with hopes it will reduce mortality rates There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo ", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/12/record-breaking-ebola-treatment-trial-drc", "state_media": false, "category": "社会", "full_text": "There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo – but there are hopes that could change within months as the first patients are enrolled in a treatment trial.\nIt is a record pace to set up and start this kind of research, scientists said, with patients enrolled just six weeks after the outbreak being declared a public health emergency of international concern by the World Health Organization (WHO) on 17 May.\nNevertheless, in Bunia, the capital of Ituri province, where the virus is raging, people are impatient.\n“I hope these drug trials proceed quickly,” said Neema Haba, a mother of three and banana seller. “Financially, we are being driven to the brink by this outbreak and nothing is going right. We are struggling to provide for our children.”\nAs of 9 July, there had been 1,792 confirmed cases and 625 deaths caused by the Bundibugyo strain of the virus, for which there is no vaccine and no approved treatment. It is still “in the expansion phase”, according to the WHO.\nThe response is reliant on the basic techniques of identifying cases, isolating them for care and tracking and monitoring people they have been in contact with.\nThe latest figures show about 75% of known contacts are being traced, but low trust in authorities and a highly mobile population are hampering efforts. In addition, some frontline workers stopped work this week in protest at a lack of pay.\nThe bodies of Ebola victims are highly contagious, and must be safely buried by properly trained professional teams. Ovide Maliabo, a driver for one of the teams in Rwampara, a mining town in Ituri, said the work was dangerous in the face of community mistrust and he and his colleagues “see no point in risking our lives”.\n“At one point, we narrowly escaped being lynched,” he said. “It’s a shame that we aren’t being financially supported.”\nBahati John, head of the team, said he had lost a tooth after being attacked by local people.\n“Honestly, since we started working on 15 May, with all the insults we’ve had to put up with, we haven’t seen a single penny,” he said. “We are the breadwinners of our families, and our families are suffering.”\nDRC officials said payments had been made but it is unclear whether activities have fully resumed. The closure of the local airport in Bunia was hampering the response, including by impeding the supply of banknotes, they said.\nHopes of turning the tide now rest with scientists searching for effective medicines.\nThe Partners treatment trial has opened with two drugs on its books – remdesivir, and MBP134. Patients will be randomly allocated to receive either drug, a combination of the two, or simply standard, supportive care.\nRemdesivir is an antiviral made by pharma company Gilead Sciences, while MBP134 is a monoclonal antibody developed by Mapp Biopharmaceutical, containing two specially engineered immune proteins that recognise and neutralise the virus.\nBoth are given intravenously – MBP134 as a one-off infusion, and remdesivir as 10 days of intravenous therapy.\n“These two drugs actually have been proven to work against the Bundibugyo virus in animal models,” said Prof Laurens Liesenborghs of the Institute of Tropical Medicine, Antwerp, who is working on the trial in Ituri.\n“They showed great efficacy, but now we need to test it in humans. Basically, what we want to see is if they indeed can lower mortality.”\nBundibugyo typically has a lower death rate than the Zaire strain of Ebola, which has caused most previous outbreaks, but it still kills about one in three of those infected.\nResearchers are watching carefully for any difference in death rates between the groups given experimental drugs and the group receiving standard care. “Any improvement is good,” said Liesenborghs. “But it needs to be statistically detected, so we need to see a substantial drop.”\nIn trials looking at the impact of monoclonal antibodies on Ebola cases caused by the Zaire strain, it lowered death rates from 50% to 35%, he said. “Hopefully we will see something in the order of that magnitude.”\nThe trial’s design allows other potential treatments to be added should they become available. A result is likely to need between 700 and 1,000 patients to be enrolled, Liesenborghs said. “We opened one site, hopefully we’ll open additional sites very quickly, but still then it will take a couple of months, depending on how the outbreak is going, obviously.”\nWHO officials said enough remdesivir and MBP134 had been donated, by Gilead and the US government respectively, for 1,200 patients to be enrolled. The WHO is in discussions to ensure sufficient supplies will be available after the trial, should they prove safe and effective, it said.\nPatients of any age, including pregnant and breastfeeding women, who are often excluded from medical research, can enrol in the trial.\n“We always think of risk-benefit,” says Liesenborghs. “Here the benefit is potentially very hi", "translation_ja": "", "vocab": []}, {"title_ja": "Nigeria says army has killed 300 bandits in north-western state of Zamfara", "title_en": "Nigeria says army has killed 300 bandits in north-western state of Zamfara", "summary_ja": "Vigilantes also took part in the fight that raged all night and the following morning, residents say Nigerian soldiers killed more than 300 members of kidnapping and cattle bandit gangs in the north-western state of Zamfara this week, according to a government official. Government troops targeted th", "summary_en": "Vigilantes also took part in the fight that raged all night and the following morning, residents say Nigerian soldiers killed more than 300 members of kidnapping and cattle bandit gangs in the north-western state of Zamfara this week, according to a government official. Government troops targeted th", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/11/nigeria-army-kills-bandits-north-western-state-zamfara", "state_media": false, "category": "政治", "full_text": "Nigerian soldiers killed more than 300 members of kidnapping and cattle bandit gangs in the north-western state of Zamfara this week, according to a government official.\nGovernment troops targeted the gangs in Gummi district in a two-day operation that “led to the elimination of more than 300 terrorists”, Zamfara’s information commissioner, Mahmud Muhammad Dantawasa, said in a statement.\nGangs made up of cattle rustlers and jihadists have terrorised communities in northern and central Nigeria, where they raid farmers’ land, steal cattle and kidnap people for ransom. They also impose levies on farmers who want to access their own land in protection rackets.\nJihadists and criminal gangs have been cooperating in recent years, according to security analysts, who say their mutual interests align. Criminal gangs have become widespread in impoverished rural Nigeria, while jihadists continue to wage a 17-year insurgency in the north of the country. Both are invested in a weak central government.\nResidents of Gummi said soldiers and local vigilantes had launched a campaign on Wednesday night against about 1,000 bandits who had stolen livestock. “The soldiers and the vigilantes killed more than 300 bandits in the fight which raged all night and the following morning,” Abubakar Muhammad told Agency France-Presse.\nTroops had tried to launch an assault on the bandits’ camp two weeks ago but were outnumbered and were forced to withdraw, residents said.\nThe Zamfara government said the operation had been a significant breakthrough in its fight to restore order to the state.\nNigeria faces a number of security crises, with an Islamist insurgency by Boko Haram and its rival, the Islamic State West Africa Province.\nThe government has killed jihadists in recent months in partnership with the US, which has deployed hundreds of troops to the country to support its fight against Islamists. A joint US-Nigeria operation in May killed the second-in-command of Islamic State and about 200 fighters in a village in north-east Nigeria.\nNigeria also struggles with general lawlessness and banditry, fuelled by poverty. Jihadists and bandits have long used mass kidnappings of elementary-schoolchildren to extract ransom payments and pursue other demands.\nThe army said on Saturday that it had suffered “casualties” during the rescue of more than 40 kidnapped children who were taken by what authorities said were jihadists. The kidnapping had come as a shock because it happened in the south-west of the country, previously thought to be relatively safe.", "translation_ja": "", "vocab": []}, {"title_ja": "Locked exits, burning decor: inside Bangkok’s deadly pub fire", "title_en": "Locked exits, burning decor: inside Bangkok’s deadly pub fire", "summary_ja": "Survivors recount the horror after a deadly blaze engulfed a popular pub on a busy street in Bangkok.", "summary_en": "Survivors recount the horror after a deadly blaze engulfed a popular pub on a busy street in Bangkok.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/13/locked-exits-burning-decor-inside-bangkoks-deadly-pub-fire?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Locked exits, burning decor: inside Bangkok’s deadly pub fire\nLocked exits, burning decor: inside Bangkok’s deadly pub fire\nSurvivors recount the horror after a deadly blaze engulfed a popular pub on a busy street in Bangkok. Police are investigating possible fire safety lapses, including blocked exits and flammable decorative materials, as families search for missing loved ones.\nPublished On 13 Jul 2026", "translation_ja": "", "vocab": []}, {"title_ja": "FIFA World Cup: Five biggest controversies of the 2026 tournament", "title_en": "FIFA World Cup: Five biggest controversies of the 2026 tournament", "summary_ja": "Football&#039;s 2026 World Cup has been full of controversies - Al Jazeera breaks down the five most significant.", "summary_en": "Football&#039;s 2026 World Cup has been full of controversies - Al Jazeera breaks down the five most significant.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/7/13/fifa-world-cup-five-biggest-controversies-of-the-2026-tournament?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "FIFA World Cup: Five biggest controversies of the 2026 tournament\nThe 2026 World Cup has been full of controversies – Al Jazeera breaks down the five most significant.\nThe 2026 World Cup has been mired in several controversies, from political interference to allegations of greed and spinelessness against FIFA as well as officiating disputes around the widely-loathed VAR.\nAl Jazeera breaks down the five biggest controversies of the 2026 football tournament so far.\nRecommended Stories\nlist of 4 items- list 1 of 4England and Argentina renew rivalry: All to know about World Cup semifinal\n- list 2 of 4Will the 2030 World Cup expand to 64 teams? What FIFA’s Infantino says\n- list 3 of 4World Cup Preview: France and Spain clash in all-European blockbuster semi\n- list 4 of 4FIFA World Cup: Which semifinalist has best chance to win the trophy?\nFIFA advises people to ‘chill and relax’ after Somalian referee denied entry to US\nSomali referee Omar Abdulkadir Artan was unable to take part in the World Cup after being denied entry to the United States, despite having a valid visa.\nThe broader immigration policies of the US administration have been widely described as racist and discriminatory, with Washington imposing a sweeping travel ban last year on citizens of 12 countries, including Somalia, and four teams that qualified for the World Cup: Haiti, Iran, Senegal and Ivory Coast.\nAn official in the administration of US President Donald Trump said, without providing any evidence, that Artan was denied entry because of his links to “suspected members of terror organisations”.\nBut Artan is a well-respected referee and was named Confederation of African Football’s men’s official of the year in 2025. FIFA was conspicuously silent in defending Artan, with FIFA President Gianni Infantino saying critics should “chill and relax”.\nAt least Artan, who came home to a hero’s welcome, will be paid in full and will referee the UEFA Super Cup next season.\nBalogun reprieve brings integrity of the tournament into question\nInfantino was also forced to defend FIFA’s disciplinary process after its decision to suspend USA striker Folarin Balogun’s World Cup red-card ban following a direct intervention by Trump, fuelling accusations FIFA had bowed to political pressure.\nInfantino said that FIFA’s judicial bodies had operated “independently and autonomously” and that he had told Trump the Balogun case was subject to an ongoing legal process, after the US president personally urged him to review the case.\nThe affair drew condemnation from European football body UEFA, which said FIFA had “crossed a red line”. Criticism also came from the Royal Belgian Football Association, several national federations, senior football coaches, officials, and politicians. Many argued that FIFA had undermined confidence in its own disciplinary system.\nBelgium, who advanced to the quarterfinals with an emphatic 4-1 victory over the USA in the USA team’s last World Cup game, had challenged Balogun’s eligibility hours before kickoff. But FIFA rejected the appeal and the striker started the match before making little impact as the Americans exited the tournament with barely a whimper.\n“I think they [FIFA] made a really brilliant decision,” Trump told reporters at the Oval office. “I asked for a review. If they would not allow a top player to play I think it [the World Cup] would have had a big stain. I related that feeling.”\nTrump also questioned the quality of refereeing by Brazil’s Raphael Claus, who had sent Balogun off, saying he was “a little bit suspect if you check his past.” He did not elaborate. The Brazilian FA rejected any suggestion regarding the integrity of the referee, while FIFA again failed to fully back their official.\nVAR vexation\nThere have been several rancorous decisions around the use of the much-maligned video assistant referee (VAR) system, perhaps most loudly after Egypt’s dramatic 3-2 World Cup round of 16 defeat by Argentina.\nEgypt appeared on course for one of the biggest upsets of the tournament when they led defending champions Argentina 2-0 with 11 minutes remaining on Tuesday, only to concede three late goals and crash out.\nMuch of the controversy centred on a goal by Egypt’s Mostafa Zico in the 62nd minute that would have doubled his side’s lead. The goal was disallowed after a VAR review identified a foul by an Egyptian player in the build-up.\nCoach Hossam Hassan and captain Mohamed Salah expressed their disappointment after the match, while several former players and television pundits also questioned the officiating.\n“Surely, this is not within VAR’s to review this,” former England goalkeeper Rob Green said on Fox’s broadcast of the match, referring to the foul that led to Zico’s goal being quashed. “It’s a full length of the pitch away.”\nVAR was also a major issue in Argentina’s 3-1 quarterfinal win over Switzerland .\nSwiss forward Breel Embolo was shown a second yellow card for simulation in the 72nd minute, five minutes after te", "translation_ja": "", "vocab": []}, {"title_ja": "Trump administration vows to ‘disable’ International Criminal Court", "title_en": "Trump administration vows to ‘disable’ International Criminal Court", "summary_ja": "US State Department ups pressure campaign on international tribunal, threatening allies who support investigations.", "summary_en": "US State Department ups pressure campaign on international tribunal, threatening allies who support investigations.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/13/trump-administration-vows-to-disable-international-criminal-court?traffic_source=rss", "state_media": false, "category": "経済", "full_text": "Trump administration vows to ‘disable’ International Criminal Court\nUS State Department ups pressure campaign on international tribunal, threatening allies who support investigations.\nWashington, DC – The administration of United States President Donald Trump has escalated its pressure campaign against the International Criminal Court (ICC), with the US State Department vowing “a whole-of-government response to systematically disable” the tribunal’s ability to operate.\nThe State Department “campaign” was announced in a news release on Monday, accompanied by a video statement from US Secretary of State Marco Rubio and an op-ed in the Wall Street Journal.\nRecommended Stories\nlist of 3 items- list 1 of 3The ICC must investigate Israel’s genocidal use of sexual violence\n- list 2 of 3ICC judges sue Trump over sanctions, call measures unlawful\n- list 3 of 3Trump administration renews pressure on International Criminal Court\nIt comes as the Trump administration has already imposed sanctions on ICC officials and rights groups that have provided evidence to the court, amid wider threats to penalise any entities that aid in investigations into the US or its allies, particularly Israel.\nIn his video statement, Rubio upped the rhetorical temperature, accusing the court of “waging a war against our country, not with bullets or missiles, but with statues, compacts, and the force of so-called international law”.\n“Today, it threatens every aspect of our political and legal system,” he said. “If they believe they can deprive us of our sovereignty, we will teach them the full meaning of American resolve.”\nThe announcement included few concrete steps, but listed several “actions under consideration”.\nThey included an appeal to countries that partner with the US military and law enforcement to “reject the ICC’s purported authority to prosecute American officials and servicemen”.\nIt also listed “increased scrutiny of nations that refuse to reject the ICC’s false authority while relying on US assistance”, as well as “increased sanctions” and travel bans for ICC personnel and affiliated organisations.\nThe United States is not a signatory to the Rome Statute, the founding charter that created the court in 2002, and is therefore not subject to its jurisdiction.\nHowever, US citizens can be investigated and potentially prosecuted as part of probes of abuses in countries that are party to the charter, ICC officials have determined.\nFor instance, the ICC has been investigating alleged war crimes in Afghanistan, including alleged abuses committed by US military and intelligence personnel, since 2020, although no US citizens have yet been prosecuted.\nSuccessive US administrations have maintained that US citizens cannot be prosecuted by the court, with the Department of Justice restating the position to ICC President Tomoko Akane in a letter delivered in late June.\nTrump, during his first term as US president, issued an initial round of sanctions in 2020 against ICC officials in response to the Afghanistan investigation.\nThe administration of US President Joe Biden subsequently lifted those sanctions, but left the official US opposition to the probe unchanged.\nTiming unclear\nDespite the Trump administration’s years-long condemnation of the court, William Schabas, a professor of international law at Middlesex University London, called the timing of the announcement “perplexing”.\nHe noted the ICC has not taken any actions related to the US or its allies since Trump took office in January 2025, although the administration may be “speculating on where the court might investigate”.\nThe administration has taken several actions that international law experts have said could eventually be investigated, including during the US-Israel war with Iran, its strikes on alleged drug smuggling boats in the Caribbean and its abduction of Venezuelan leader Nicolas Maduro.\nSchabas also explained that the heightened rhetoric outpaces the relatively limited concrete actions the US can take, beyond levying more sanctions and rallying allies against the ICC.\nNevertheless, he assessed that the administration may be viewing the ICC as in a weakened position as it deals with internal scandals surrounding lead prosecutor Karim Khan.\n“Maybe they’re just feeling they’ll kick it some more, and that’ll do a death blow to it,” he said.\nRaed Jarrar, advocacy director at Washington, DC-based DAWN rights organisation, said the Trump administration’s latest effort “sends the message that the powerful are above the law”.\n“It is not the ICC that Rubio is dismantling brick by brick, but the rules-based international order that grew out of the ashes of World War II,” he said in a statement.", "translation_ja": "", "vocab": []}, {"title_ja": "EU, U.K. hit Russia with joint sanctions over cyber attacks", "title_en": "EU, U.K. hit Russia with joint sanctions over cyber attacks", "summary_ja": "The move comes as Western officials warn Russia has stepped up its \"hybrid\" campaign to destabilise Europe over four years into the war on Ukraine.", "summary_en": "The move comes as Western officials warn Russia has stepped up its \"hybrid\" campaign to destabilise Europe over four years into the war on Ukraine.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/eu-uk-hit-russia-with-joint-sanctions-over-cyber-attacks/article71218775.ece", "state_media": false, "category": "政治", "full_text": "The European Union and Britain targeted Russia on Monday (July 13, 2026) with coordinated sanctions over cyber attacks in Europe, accusing Moscow's FSB intelligence agency over involvement in digital strikes.\nThe move comes as Western officials warn Russia has stepped up its \"hybrid\" campaign to destabilise Europe over four years into the war on Ukraine.\nBrussels said it was imposing sanctions on nine people and four entities, while London said it was adding 24 names to its blacklist.\nThe British government said the sanctions - the first joint cyber package with the EU - \"target the Russian state's persistent and increasingly reckless attempts to sow chaos and division across Europe\".\nAmong those subjected to asset freezes and visa bans were officers of Russia's GRU military intelligence agency, and alleged \"cybercriminals\" working together with the Russian state.\nIn addition, the EU and Britain also said that a recent attempted cyber attack targeting critical infrastructure in Poland, including the power grid, was the latest in a raft of such moves by the FSB's Centre 16 spying hub.\n\"This reckless attack failed but could have caused 500,000 citizens to lose electricity in the depths of winter,\" the British foreign office said.\n\"It is another example of the Russian state's irresponsible attempts to sow chaos across Europe.\"\nFrance's Foreign Minister Jean-Noel Barrot said the Russian ambassador would in coming days over the cyber attacks.\nMr. Barrot said the attacks targeted government ministries, companies, and service operators, with the aim \"either of capturing information or sabotaging operations, for example rail infrastructure, as was the case in Poland\".\nPublished - July 13, 2026 11:15 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Yemen government says attacked Sanaa airport, reviving dormant conflict", "title_en": "Yemen government says attacked Sanaa airport, reviving dormant conflict", "summary_ja": "The government said it had wanted to prevent an Iranian plane from landing in the capital, after failing to convince a Houthi delegation that went to Tehran for the late Iranian Supreme Leader’s funeral to board a Yemenia flight instead.", "summary_en": "The government said it had wanted to prevent an Iranian plane from landing in the capital, after failing to convince a Houthi delegation that went to Tehran for the late Iranian Supreme Leader’s funeral to board a Yemenia flight instead.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/yemen-government-says-attacked-sanaa-airport-reviving-dormant-conflict/article71218767.ece", "state_media": false, "category": "政治", "full_text": "Yemen’s internationally-recognised government said it struck Houthi-controlled Sanaa airport on Monday (July 13, 2026), its biggest flare-up in years with the rebels, who blamed the authorities’ Saudi backers for the attack and threatened retaliation.\nThe government said it had wanted to prevent an Iranian plane from landing in the capital, after failing to convince a Houthi delegation that went to Tehran for the late Iranian Supreme Leader’s funeral to board a Yemenia flight instead.\nHouthi military spokesman Yahya Saree accused Saudi Arabia of “ending the de-escalation phase” and warned that “this aggression will not go unanswered or unpunished”.\nThe latest escalation threatens to unravel a truce that has been holding since 2022 despite expiring, and comes at a time of heightened tensions as the United States and Iran trade attacks impacting the Gulf and traffic in the Strait of Hormuz.\nYemen’s Defence ministry accused the Houthis of “allowing an Iranian plane to violate Yemeni territory; consequently, the airport runway was targeted”.\nPublished - July 13, 2026 11:08 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "West Asia war LIVE: Trump says U.S. is reinstating maritime blockade on Iran", "title_en": "West Asia war LIVE: Trump says U.S. is reinstating maritime blockade on Iran", "summary_ja": "The United States used one-way attack sea drones in combat for the first time to strike the Iranian port of Bandar Abbas", "summary_en": "The United States used one-way attack sea drones in combat for the first time to strike the Iranian port of Bandar Abbas", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/us-iran-war-live-updates-missile-attacks-strait-of-hormuz-donald-trump-mojtaba-khamenei-cenctom-irgc-ceasefire-deal/article71215794.ece", "state_media": false, "category": "政治", "full_text": "Iran’s Revolutionary Guards said they had struck US military targets and bases in Jordan, Bahrain and Kuwait, state media reported on Monday.\nThe official news agency IRNA cited several statements released by the Guards saying they had attacked Prince Hassan Air Base in Jordan, a US military drone command centre in Bahrain and airbases including Ali Al Salem in Kuwait.\nAlso read | Is the U.S.-Iran agreement falling apart?\nU.S. strikes killed one person and wounded four in southwestern Iran, state media reported on Monday.\nThe US military on Sunday (July 12, 2026) said it had launched a new wave of attacks against Iran, after renewed fighting over the Strait of Hormuz saw several of Washington’s Gulf allies targeted by incoming fire.\nGlobal Faultlines podcast | Why Lebanon remains in perpetual crisis.\nFollow here for LIVE updates:", "translation_ja": "", "vocab": []}, {"title_ja": "Man held near Nepal border with Chinese passport, claims to be ex-US Navy personnel", "title_en": "Man held near Nepal border with Chinese passport, claims to be ex-US Navy personnel", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/lucknow/man-held-near-nepal-border-with-chinese-passport-claims-to-be-ex-us-navy-personnel-10785030/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "100 cars, ponies, miniature waterfalls: Inside Yohan Poonawalla’s 7.5-acre Pune mansion", "title_en": "100 cars, ponies, miniature waterfalls: Inside Yohan Poonawalla’s 7.5-acre Pune mansion", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/lifestyle/art-and-culture/inside-yohan-poonawalla-sprawling-7-5-acre-pune-mansion-featuring-100-cars-rolls-roy
