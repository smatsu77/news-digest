onda grip crushes French World Cup dream Reuters", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMioAFBVV95cUxPaWprNTZrUDBUZmtScmswaWV0SHVsbHZVSDhRR0I1aEs3RnZ3Uk96YzdLTkl4TFd0Y2RXRWk1WjJFbWJxb0Z3X1NnWWs1bWMwNTlXTUkxZExjSEFhcHJNVFc3dGpRQnhESzBRWXpRTTZhb3Raa0dyN1czSEFrc3k0ZktOU2VzVlR3a09RcjZRNHlYNnRUcmJCdjNvQUVjTUQ0?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Iran threatens to block more trade routes as US launches fresh strikes", "title_en": "Iran threatens to block more trade routes as US launches fresh strikes", "summary_ja": "US President Donald Trump vowed to strike Iran's bridges and power plants next week if the country does not return to talks.", "summary_en": "US President Donald Trump vowed to strike Iran's bridges and power plants next week if the country does not return to talks.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c9323zgq6wvo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Iran threatens to block more trade routes as US launches fresh strikes\n- Published\nIran has threatened to block further trading routes in the region, as the US launched a fresh wave of strikes on military targets.\nIran's Revolutionary Guards said the Strait of Hormuz would remain shut until the US ended its \"acts of aggression\". They also threatened to close off other regional oil and gas export channels.\nThe warning came as the US military's Central Command (Centcom) said it had carried out drone, air and navy strikes on Iran on Wednesday morning, following another seven-hour operation overnight.\nFresh hostilities between the US and Iran in recent days have served to underscore the strategic importance of the Strait to the global economy.\nThe renewed attacks have also triggered a sharp rise in oil prices, as tanker traffic through the vital shipping route has virtually stalled.\nWednesday morning's strikes \"further degraded Iran's ability to attack commercial shipping in the Strait of Hormuz\", Centcom said in a statement.\nA 90-minute wave was used to target Iran's coastal defences and cruise missile storage and launch sites on Greater Tunb Island, the Centcom officials added.\nOn Tuesday, US President Donald Trump vowed to strike Iran's bridges and power plants next week if the country did not return to talks.\n\"I'll save the energy targets for last, but ultimately we'll hit energy targets,\" Trump said in an interview on Special Report with Bret Baier that aired on Tuesday night.\nThe escalation in rhetoric came after Trump said a 20% toll he had threatened to impose in the Strait of Hormuz would be replaced by \"massive\" trade and investment deals with Gulf states.\nA previous threat by Trump to bomb Iran's civilian infrastructure, which was made in April, drew condemnation at the time from UN human rights chief Volker Türk, who said: \"Under international law, deliberately attacking civilians and civilian infrastructure is a war crime.\"\n- Trump retreat over Hormuz tolls suggests he is struggling to end Iran war - Published15 hours ago\n \n- Trump threatens to bomb bridges and power plants unless Iran resumes talks - Published5 hours ago\n \nA renewed US blockade on Iranian ports was imposed on Tuesday evening, which stops vessels from transiting to and from Iranian ports and coastal areas.\nThe blockade had previously been lifted as part of a deal that was struck by the two countries last month - known as a memorandum of understanding - that aimed to end the months-conflict.\nHowever, a dispute over the strait has become a key point of contention.\nIn response to the renewal of the US blockade, Iran's Revolutionary Guard Corps (IRGC) warned the US that it should \"expect the closure of other oil and gas export routes that serve the interests of the United States and its allies\". It did not elaborate on which routes could be affected.\nMeanwhile, Iran's state-run broadcaster reported that the country's army had carried out separate attacks on US targets in Jordan, Kuwait and Bahrain.\nThe US allies also said they intercepted drones and missiles launched from Iran.\nRelated topics\n- Published17 hours ago\n \n- Published19 hours ago", "translation_ja": "", "vocab": []}, {"title_ja": "Trump retreat over Hormuz tolls suggests he is struggling to end Iran war", "title_en": "Trump retreat over Hormuz tolls suggests he is struggling to end Iran war", "summary_ja": "The abrupt about-face from the US president was the latest twist in a conflict that has now lasted more than four months.", "summary_en": "The abrupt about-face from the US president was the latest twist in a conflict that has now lasted more than four months.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/crele3r8j19o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Trump retreat over Hormuz tolls suggests he is struggling to end Iran war\n- Published\nDonald Trump's latest Iran war demand lasted all of 24 hours and suggests a president searching for unorthodox ways out of a difficult position.\nOn Monday morning, in a social media post announcing the resumption of an American naval blockade on Iranian shipping, he said that all vessels transiting the Strait of Hormuz - including those of US allies - must pay a 20% fee to reimburse the US \"for any and all costs necessary to do the job of providing safety and security to this very volatile section of the world\".\nThe following day, he abandoned that proposal completely, external, offering instead that he would strike \"trade and investment deals\" with America's Gulf allies, implying the US would offer them safe passage through the Strait in return.\nThe abrupt about-face was the latest twist in a conflict that has now lasted more than four months and, despite a month old \"memorandum of understanding\" that secured a temporary ceasefire and set up a framework for negotiations, shows no sign of ending.\nTrump may be reluctant to escalate the war given its continued unpopularity, the likelihood of rising energy prices and the risks associated with American forces and allies once again coming under Iranian attack. He might find the prospect of ending the conflict without reaching an agreement he can claim is better than the one Barack Obama's administration negotiated in 2015 also distasteful, however.\n\"I think the most likely ending is a non-ending,\" Rosemary Kelanic, Director of the Middle East program at Defense Priorities, said. \"This has turned into a war of attrition, and wars of attrition tend to go on for a long, long period of time.\"\nThe US-Iran memorandum of understanding (MOU) - and the hopes that came with it for an end to the war - died at 10:16 EST (15:16 GMT) on Tuesday on Truth Social, when Trump announced a resumption of the US blockade of Iranian shipping, amidst a flurry of new US military strikes on targets across Iran.\nThe Iranians countered by stepping up attacks on US allies and commercial shipping in the region, grinding traffic through the Strait of Hormuz to a near standstill once more.\nAfter nearly a month of on-again, off-again negotiations between the two nations, punctuated by occasional hostilities that tested the definition of a \"ceasefire\", Trump and the Americans appear to be facing the same challenges that had been present through much of the Iran war.\nWhile militarily, the Americans were achieving their objectives, as measured in Iranian ships, planes and targets destroyed and defence capabilities degraded, politically the conflict was far from resolved.\nIran, militarily weakened though it may be, could still deny access to the Strait of Hormuz. And unless the Americans were willing to dramatically escalate their military operations in the region, there was little they could do to stop them.\nTrump's new twist of a 20% fee - possibly a means of making that military commitment more palatable to the American public - wasn't entirely new. He had suggested such an arrangement on several occasions over the course of the war.\nBut just last month, US Secretary of State Marco Rubio had condemned an Iranian plan to charge \"fees\" on shipping through Hormuz.\n\"No country is allowed to charge tolls or fees on an international waterway,\" he said. \"That's existing international law. That's the way it is in international waterways all over the world, and that's the way we expect it here.\"\nTrump's Hormuz U-turn is just the latest evidence of a president who does not appear to have a clear path forward. The memorandum of understanding, which both Americans and Iranians claimed as a victory for their side, was intentionally vague, leaving much up to later negotiation.\nThe document envisioned some role for Iran in overseeing shipping in Hormuz. It read: \"The Islamic Republic of Iran will make arrangements using its best efforts for the safe passage of commercial vessels with no charge.\"\nThis is a role that Iran has been intent on asserting. The MOU also included billions of dollars in promised \"investment\" in Iran and an end to international sanctions.\nAmericans may have believed those sweeteners, accompanied by warnings of the consequences of noncompliance, would be enough to dissuade Iran from attempting to use its geographic advantages to more forcefully assert control over Hormuz. That calculation, at least for the moment, appears incorrect.\n\"The MOU is completely dead,\" said Kelanic. \"All of the things that it stipulated have now been undone.\"\n- Strait of Hormuz 'faultline' exposes weakness of the US-Iran deal - Published19 hours ago\n \nNow Trump, and the Iranians, find themselves in a familiar predicament. The latter are once again facing American military attacks across their territory, underlining their inability to defend their territorial sovereignty. With the reimposed blockade, their oil revenue - a lifeli", "translation_ja": "", "vocab": []}, {"title_ja": "Strait of Hormuz 'faultline' exposes weakness of the US-Iran deal", "title_en": "Strait of Hormuz 'faultline' exposes weakness of the US-Iran deal", "summary_ja": "Control of the waterway has become a key point of contention between the US and Iran, as a ceasefire deal falters.", "summary_en": "Control of the waterway has become a key point of contention between the US and Iran, as a ceasefire deal falters.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cwy0ydn033yo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Strait of Hormuz 'faultline' exposes weakness of the US-Iran deal\n- Published\nThe fragile \"no war, no peace\" situation since the US and Iran signed a tentative deal last month now seems to have tipped into war.\nThis on-again off-again truce could again wobble back into life through the efforts of increasingly exasperated Arab and Pakistani mediators, and the preference of both sides to avoid a return to a drawn out, all-out war.\nBut its biggest fault line is the status of the strategic Strait of Hormuz - and Iran is again making it clear that its control over this vital maritime corridor is a big, bright red line that neither military, economic nor diplomatic pressure can break.\n\"We told you: keep your word or pay the price,\" is how Iran's lead negotiator Mohammad Bagher Ghalibaf recently phrased it on social media, quoting the agreement.\n- Why the Strait of Hormuz matters so much in the Iran war - Published22 hours ago\n \nTehran has found backing for that word in the very vague details of the deal - known as a memorandum of understanding - which was drafted in haste in June.\nIt has been understood differently by both sides from the start.\nIran sees in point five of the 14-point plan a green light, which gives it sway over the management of this critical maritime corridor. Point five reads: \"The Islamic Republic of Iran will make arrangements using its best efforts for the safe passage of commercial vessels.\"\nThe US reads that as saying Tehran has to open this strategic strait to the free flow of global oil and gas supplies, along with other vital commodities, including ingredients to produce fertiliser.\n\"You can drive a truck through those clauses,\" an Arab oil executive working in the region said.\nWhile the new leadership, which emerged in Tehran from weeks of all-out war and waves of US-Israeli assassinations, appears to be aligned on their broad strategic vision for this new chapter of the Islamic Republic, there are clear and growing signs of splits over how to move forward.\n\"Some want to cash in on battlefield gains through diplomacy and some believe the ceasefire came too soon before Iran had inflicted enough pain on the US,\" assesses Robert Malley of the International Crisis Group, who was part of the US delegation that negotiated the landmark 2015 nuclear deal US President Donald Trump pulled out of in his first term.\nRecent Iranian attacks on three vessels including a Qatari-flagged liquefied natural gas tanker, moving through a shipping corridor close to Oman's coastline to the south, were described by a diplomatic source in the region as the work of a \"rogue unit\" within the Islamic Revolutionary Guard Corps (IRGC).\nIn a system where the IRGC now plays a dominant role, Iran's non-negotiable red line is that vessels must now stick to its designated routes.\nLast night, far from the thunder of this escalation, its parliament quietly introduced a new bill to manage the strait called the Strategic Action for the Security and Sustainable Progress of the Strait of Hormuz and the Persian Gulf.\nThat news was posted on X by Ebrahim Azizi, head of the assembly's national security commission, who told us in April that controlling the waterway was Iran's \"inalienable right\".\nWhen asked when Iran would cede control, his reply was short and sharp – \"never.\"\nHe described it as an \"asset to face the enemy\".\nIran's zero trust in the US' promises, fuelled by the repeated eruptions of war or threats during negotiations, have cemented its resolve.\nControl over the strait is seen not just as a bargaining chip in this impasse, it also sees it as its new leverage, a new form of deterrence, as well as an economic lifeline - in case sanctions never get lifted, and its assets worldwide remain frozen.\nBut Tehran's determination to rewrite the rules in the region is also causing tension with its neighbours including Qatar, one of the main mediators in this crisis, as well as Iran's longstanding traditional ally Oman, which has played a role for decades behind the scenes.\nCountries like the United Arab Emirates have made it crystal clear that Iran's plans to play a controlling role, including charging some form of \"service fees\" is unacceptable and sets a dangerous precedent.\nA source informed on the back and forth said Oman had objected to Iran's inclusion of a specific mention in the agreement in that same contested fifth point - that Iran \"will conduct dialogue with the Sultanate of Oman to define the future administration and maritime services\".\nMuscat now finds itself caught between the wishes of Washington, and Tehran wants to maintain, above all else, its longstanding reputation as the region's discreet diplomatic middleman.\n\"Oman has been very patient with the Iranians trying to keep good neighbourly relations,\" Omani analyst, Professor Abdullah Baabood, told the BBC's Newshour programme.\n\"This particular episode has driven Oman to take quite a substantial stand...but we want this conflict to be resolved through dialo", "translation_ja": "", "vocab": []}, {"title_ja": "Starmer says it's the 'end of my political journey' at his final Prime Minister's Questions", "title_en": "Starmer says it's the 'end of my political journey' at his final Prime Minister's Questions", "summary_ja": "MPs on all sides of the House of Commons paid tribute to the departing PM, traded jokes and shared anecdotes.", "summary_en": "MPs on all sides of the House of Commons paid tribute to the departing PM, traded jokes and shared anecdotes.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c5yzynxwk05o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Starmer says it's the 'end of my political journey' at his final Prime Minister's Questions\n- Published\nSir Keir Starmer told MPs it was the \"end of my political journey\" and he was \"proud of everything I have achieved\" at his final Prime Minister's Questions before standing down.\nNormal political hostilities were largely set aside during the 50 minute session, as MPs on all sides paid tribute to the departing PM, traded jokes and shared anecdotes.\nThere were tears from some of Sir Keir's closest allies, with the outgoing PM thanking his staff who he said had been \"prepared to walk through fire for me\".\nAs he left the chamber, he was given a standing ovation by his own MPs, as well as many on the opposition benches, while his family watched on from the gallery.\nChancellor Rachel Reeves - who was at Sir Keir's side on the front bench as usual - appeared close to tears.\nLabour MP Carolyn Harris was also overcome by emotion as she told MPs that \"every day we see his decency and his courage shine through\".\nSir Keir is due to hand over power to Andy Burnham on Monday, after the former Greater Manchester mayor is confirmed as Labour leader at a special Labour conference on Friday.\nConservative leader Kemi Badenoch refrained from attacking the outgoing PM's record, instead praising him for his work on Ukraine and his friendship with the country's president Volodymyr Zelensky.\nBut she did aim some jibes at Labour MPs and their next leader, who was absent from the session as he has been at all the PMQs sessions since he returned to Parliament last month.\nLiberal Democrat leader Sir Ed Davey said Sir Keir had worked with people across the House of Commons and described him as a \"true patriot\".\nWatching on were several guests of the prime minister including campaigners he had met during his time in Downing Street.\nHe addressed some of them directly as he spoke, saying: \"To all those in the gallery whose lives have been changed or improved by this Labour government, and all across the country who struggle to be seen or heard, you're the reason I came into politics.\"\nDespite being forced out by his own MPs just two years after winning a landslide election victory, Sir Keir was met with cheers from the Labour benches as he arrived in the House of Commons.\nAs is often the case for a prime minister's final question session, the tone was gentler and more light-hearted than usual, with plenty of jokes about England's World Cup hopes as well as the by-election in Clacton.\nHowever, it began on a sombre note with Sir Keir paying tribute to former MP Ann Widdecombe.\nHe said it was \"chilling\" that during his time in Parliament three serving or former MPs had been killed.\nBadenoch paid tribute to the former Conservative minister as a woman of \"high principle\" with a \"wicked sense of humour\".\n- Ministers arrive for Starmer's final cabinet meeting - Published5 hours ago\n \n- What we know about Andy Burnham's policies - Published1 day ago\n \nThe Conservative leader used her questions to ask if Burnham should take questions in the House of Commons rather than \"scurrying away for the summer\".\nThe Commons will rise for its recess on Thursday, meaning Burnham is not likely to take questions in Parliament until September.\nBadenoch also warned Labour MPs that changing prime minister was not a \"silver bullet\" and that \"their troubles are only just beginning\".\nThe prime minister did not directly answer when Badenoch asked if he had any advice for his successor, but did promise his \"wholehearted support\".\n\"I will give my support privately if asked for, not publicly when not asked for,\" he added.\nSir Keir also thanked Badenoch for her kindness following the death of his brother and after an arson attack on his family home.\nPrime Minister's Question took place eight hours before the World Cup semi-final between England and Argentina - and references to the match came thick and fast.\nConservative MP Graham Stuart joked that the prime minister had been given the \"red card\" by \"400 dodgy referees\".\nLiberal Democrat MP Will Forster asked Sir Keir if his last act would be to declare a bank holiday if England wins the World Cup.\nThe prime minister replied that he didn't want to \"tempt fate\" and suggested Forster ask him again on Sunday.\nThere were also several references to the by-election in Clacton, triggered by the resignation of Reform UK leader Nigel Farage.\nThe main parties are not taking part in the election, accusing Farage, who re-fighting the constituency, of pulling a stunt, as he stands again in the Essex constituency.\nThe boycott means Farage's opponents are largely either independent or novelty candidates.\nSir Keir suggested people in Clacton should \"put your vote in the bin\".\nLib Dem leader Sir Ed said he could not \"back joke figures with ridiculous policies\" adding: \"Which is why I'm supporting Count Binface.\"\nReform UK MP Danny Kruger hit back at the jibes, arguing that a \"comedian with a dustbin on his head\" was a suitable substitute ", "translation_ja": "", "vocab": []}, {"title_ja": "Three men who raped woman on Brighton beach jailed", "title_en": "Three men who raped woman on Brighton beach jailed", "summary_ja": "The rapists carried out a \"cynical, predatory and callous\" attack, jurors were told.", "summary_en": "The rapists carried out a \"cynical, predatory and callous\" attack, jurors were told.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cyv0vqp04pgo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Three men who raped woman on Brighton beach jailed\n- Published\nThree men who raped a woman on Brighton beach in an \"entirely predatory, callous and contemptuous\" attack have been jailed.\nAsylum seekers Abdulla Ahmadi, Ibrahim Alshafe and Karin Al-Danasurt attacked the woman in the early hours of 4 October.\nThe victim, who jurors heard was \"led into the darkness to be used as a sexual plaything\", said she still heard their laughter when she closed her eyes, adding: \"My skin crawls - no matter how hard I scrub it I still feel dirty.\"\nAhmadi, 26, from Iran, and Alshafe, 26, from Egypt, were each jailed for 21 years. Al-Danasurt, 21, also from Egypt, was convicted of rape as a secondary party for filming the attack and was jailed for 18 years and six months.\nSentencing the three men at Hove Crown Court, Her Honour Judge Christine Henson KC said each of them \"participated in an entirely predatory and callous attack\".\nShe added: \"The impact on your victim was and continues to be devastating. It has had a life changing profound and irrevocable impact on her.\"\nEach of the men, who were living in a Home Office hotel in Horsham at the time of the offence, will also spend a further six years on extended licence, and will serve two thirds of their sentence before they can be considered for parole.\nWarning: Some readers may find the following details distressing.\nThe court previously heard from prosecutor Hanna Llewellyn-Waters KC, who said the three men were \"on the lookout for women that night for sexual purposes\" as they visited bars and nightclubs on Brighton seafront.\nAfter leaving a club, the men crossed paths with the woman, who cannot be identified for legal reasons, at a fast-food restaurant and they all went to the beach.\nJurors heard the woman was \"staggering in the street\" and was \"incapacitated\".\nAlshafe and Ahmadi took her behind a beach hut, where they raped her while Al-Danasurt filmed the ordeal.\nThe trial heard the woman recalled being spat on, kicked and her throat being grabbed during the attack.\nAlshafe and Ahmadi had tried to claim during the trial the encounter was consensual, while Al-Danasurt claimed he was filming to try to help the woman by capturing potential evidence.\nTheir victim said she had regained consciousness lying on the beach and thought she was going to be killed.\nBreaking down in tears, she told the court that every time she closed her eyes she saw \"the filmer's face\" laughing at her.\n'Noises never stop'\nIn a statement read to the court, the woman said: \"If I could do one thing, I would go back to that night and never go out.\n\"All I see when I close my eyes is the man who was filming it. All I can hear is the seagulls and the waves and the laughter in my head.\"\nShe said: \"Sometimes it feels like the noises will never stop.\n\"I ask myself what kind of person would do this, let alone three.\"\nShe continued: \"My skin crawls no matter how hard I scrub it I still feel dirty.\n\"I doubt I will ever be able to visit the beach down there ever again.\n\"They took something from me that no one had a right to do so.\"\nThe court was told the three defendants knew each other and were living at Home Office-approved hotel accommodation for asylum seekers in Lower Beeding, near Horsham, West Sussex.\nAhmadi and Alshafe met on a small boat from France arriving in the UK in June 2025, while Alshafe and Al-Danasurt, who arrived in the UK in October 2024, were roommates at the hotel.\nThe evening before the attack the three got ready at the hotel before getting a bus into Brighton.\nThe jury was told that during the night out, the friends went to a bar and nightclub on the beach where Alshafe chatted to a woman using Google Translate about his hopes to marry a woman and have children and get citizenship in the UK.\nThe prosecution told the court he had been a \"nasty little predator\" that night who had been rejected by several women and was \"on the prowl\" with the co-defendants.\nAfter the attack, the men returned to their hotel by bus and had a barbecue later that evening, the jury heard.\n'Arrogant and entitled'\nJudge Henson said: \"You each treated her with contempt and you each played a role in further degrading her in the most appalling way.\n\"The arrogant and entitled attitude you each displayed that night continued through your trial.\"\nShe also praised the victim, saying: \"I hope that she can now focus on her tremendous bravery that she has demonstrated by contacting police and giving evidence to the jury allowing each of you to be brought to justice.\n\"It is my hope that she can now start to rebuild her life.\"\nSpeaking outside court, Sussex Police Ch Supt Karrie Bohanna also thanked the victim for her bravery, adding: \"It is thanks to her bravery in the face of that trauma that three dangerous, predatory men no longer pose any threat to women and girls in Sussex.\"\nShe added: \"Today's sentence will rightly see these three men face years behind bars.\"\nHome Office minister Alex Norris described the case as \"noth", "translation_ja": "", "vocab": []}, {"title_ja": "Man arrested over threatening to shoot Farage in social media post", "title_en": "Man arrested over threatening to shoot Farage in social media post", "summary_ja": "Met Police says a man in his 20s was held in south London this week on suspicion of sending threatening communications to an MP.", "summary_en": "Met Police says a man in his 20s was held in south London this week on suspicion of sending threatening communications to an MP.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c8r2r76vnd1o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "IT", "full_text": "Man arrested over threatening to shoot Farage in social media post\n- Published\nA man has been arrested over an alleged threat to shoot Reform UK leader Nigel Farage made in a social media post.\nThe arrest relates to a post made on X which was reported to police on 8 May, a day after the local and mayoral elections.\nThe Met Police said a man in his 20s was arrested in south London on Tuesday this week on suspicion of sending threatening communications to a Member of Parliament.\nHe was been bailed pending further inquiries.\nThe arrest came six days after Reform spokesperson Ann Widdecombe was killed at her Devon home.\nThe Parliamentary Liaison and Investigation Team informed Farage of the arrest on Wednesday.\nFarage said: \"This is the first time the police have ever proactively acted on a social media post, and I hope they are looking at the other three or four hundred similar posts from this year alone.\"\nIt came as his party's home affairs spokesperson said a Reform UK government would provide \"round-the-clock protection\" for all MPs.\nZia Yusuf also said Farage \"lives his life under the ever-present threat of mortal danger\" and those who \"question his need for security should stop\".", "translation_ja": "", "vocab": []}, {"title_ja": "Kenya's 'political gangs' fuel election fears", "title_en": "Kenya's 'political gangs' fuel election fears", "summary_ja": "Violent disruptions of political and civic events are raising concerns about the use of hired gangs as Kenya heads toward elections in 2027.", "summary_en": "Violent disruptions of political and civic events are raising concerns about the use of hired gangs as Kenya heads toward elections in 2027.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/kenya-s-political-gangs-fuel-election-fears/a-77970615?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Kenya's 'political gangs' fuel election fears\nJuly 15, 2026For Brian Ongore, a resident of Kenya's capital, Nairobi, seeing groups of young men in public has become a source of anxiety rather than an ordinary part of city life.\n\"Whenever you see a group of youths, you're just in panic because you never know what will happen to you next,\" Ongore told DW. \"Everybody is in constant panic. The general feeling of safety has gone down. It's like you're living in the jungle.\"\nHis concerns echo growing fears among many Kenyans, particularly after violent disruptions at opposition-linked gatherings in the towns of Kisumu and Nyahururu this month.\nSo-called \"goons\" are increasingly being hired, dozens or even hundreds at a time, to intimidate rivals or disrupt public events ahead of the Kenya's 2027 elections. News agency Agence France-Presse (AFP) noted that police often turn a blind eye.\nIn June, a civil society and church forum at Nairobi's All Saints Cathedral was disrupted during discussions on public finance management.\nAccording to a statement published on Monday by Amnesty International Kenya, \"The goons publicly confessed to having been sent by some powerful government officials to carry out the heinous attack.\"\nThe incidents have renewed debate over the growing use of politically linked gangs to disrupt public events ahead of Kenya's August 2027 general election.\nThe AFP news agency reported that \"Kenyan politicians are hiring armed thugs for as little as $4 per day as poverty and ruthless political competition threaten to unleash uncontrollable violence ahead of elections next year.\"\nNairobi businesswoman Priscilla Njoroge urged young Kenyans not to allow themselves to be exploited for political violence. \"I would like to tell the goons who are being misused not to play with the peace we have because violence destroys everything. The losses are much greater,\" she said.\nUniversity student Paul Mwai also questioned the response of the security agencies. \"Yesterday police were seen protecting the goons. I have not seen even a single goon being dealt with decisively by the same government that keeps issuing threats,\" he said.\nRuto responds\nThe growing concern has prompted a response from the government.\nSpeaking at the funeral of Zipporah Kosgey, wife of veteran Kenyan politician Henry Kosgey last month, Kenyan President William Ruto acknowledged the growing presence of political gangs and warned that violence could undermine the democratic process.\n\"These goons are innocent children who are being used by bankrupt politicians. They go around causing chaos, assaulting people and causing destruction,\" Ruto said. \"All the goons should be dealt with firmly, and those who are paying these young people should also be tracked down.\"\nSecurity analyst Byron Adera says the use of political gangs is not new but appears to be becoming more organized in the run-up to Kenya's election, which is scheduled to take place on August 10, 2027.\n\"Political enterprise is propped up by goonism, which is really paid thugs being used for political power,\" he told DW, adding that unemployed young people are particularly vulnerable to recruitment.\nAdera warned that political violence and perceptions of partisan policing could undermine democracy.\n\"You have to ask yourself whether, in the end, it is the will of the people or the will of politicians behind the goons,\" he said.\nolitical economist Sheila Owigo Olang, a governance analyst,says the recent wave of attacks appears more open and organized than in previous election cycles.\n\"The faces of the goons look like they have very strong sponsors because there are no consequences,\" she told DW.\nOlang said attacks have spread beyond campaign rallies to churches and other public spaces, creating fear among women seeking political office.\n\"Women are the biggest voting demographic and when they stay home it leads to illegitimate outcomes,\" she said, adding that she has personally experienced political intimidation. \"I have been a victim.\"\nLessons from 2007\nKenya has experienced election-related violence before. More than 1,000 people were killed following the disputed 2007 presidential election before a power-sharing agreement brokered by former UN Secretary-General Kofi Annan helped end the crisis.\nThe Kofi Annan Foundation warns in its latest Electoral Vulnerability Index that Kenya faces a high risk of election-related violence ahead of the 2027 polls, citing political tensions, economic hardship and public mistrust in institutions among the key drivers.\nAs East Africa's largest economy and one of the region's most influential democracies, Kenya's elections are closely watched across the continent.\nWith just over a year until Kenya's August 2027 general election, analysts say preventing political violence will be essential to ensuring political competition is decided by voters rather than intimidation.\nWhether that happens, Adera says, may determine whether the election reflects \"the will of", "translation_ja": "", "vocab": []}, {"title_ja": "The 10 dark days of Evian", "title_en": "The 10 dark days of Evian", "summary_ja": "In July 1938, an international conference was held in Evian, France, to decide the fate of Jews from Germany and Austria. Almost no one in the world was willing to take them in.", "summary_en": "In July 1938, an international conference was held in Evian, France, to decide the fate of Jews from Germany and Austria. Almost no one in the world was willing to take them in.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/the-10-dark-days-of-evian/a-77966381?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "The 10 dark days of Evian\nJuly 15, 2026From July 6 to 15, 1938, representatives from 32 countries and dozens of humanitarian organizations gathered for a conference in the upscale spa town of Evian on the French side of Lake Geneva. Their goal: to find a way out for approximately half a million Jews from the Third Reich.\nThis was five and a half years after Adolf Hitler's rise to power in Germany and three and a half months after the annexation of Austria. The Nazi regime had not yet begun the systematic process of mass murder — but the situation for Jews had been steadily deteriorating since 1935.\nThe racist Nuremberg Laws, which stripped Jews of their German citizenship, were internationally known — as was the fact that Jews had been excluded from schools, universities, and public life, as well as the fact that Jews who wanted to leave the now \"Greater Germany\" had to leave their property behind.\nAs early as 1933, shortly after the Nazis seized power, the League of Nations — the precursor to the United Nations — appointed the American James McDonald as High Commissioner for Refugees from Germany. He resigned in 1935, despairing at the unwillingness of the world's governments to take the problem seriously.\nEmigration only after plunder\nAs early as 1933, shortly after the Nazis seized power, the League of Nations — the precursor to the United Nations — appointed the American James McDonald as High Commissioner for Refugees from Germany. He resigned in 1935, despairing at the unwillingness of the world's governments to take the problem seriously.\nInitially, under Adolf Hitler, Berlin actively encouraged Jews to leave the country — at the time of the Evian Conference, approximately 200,000 had left Germany. However, the Nazis imposed increasingly stringent financial and administrative restrictions: Jewish people had almost all of their property, real estate, and savings confiscated before they left the country — and they had to present a visa or travel ticket to leave.\nThe Nazis' goal was clear: Jews should leave Germany completely destitute. This was not only because the regime profited from the plunder of Jewish property, but also because poor emigrants would be a greater burden for the receiving country, which was intended to further fuel resentment towards the refugees.\nRoosevelt's initiative\nThe Evian initiative came from US President Franklin D. Roosevelt. His goal was to combine refugees from Germany and Austria into a legal, controlled flow of emigration — and to encourage participating countries to accept refugees according to their population size. No country would be obligated to change its immigration quotas, and no government funds would be spent on financing refugees.\nBut even before the delegates arrived at the luxurious hotel, Washington and London had already reached an agreement: the US had promised not to mention the British Mandate of Palestine as a possible place of refuge. And the United Kingdom, in return, promised not to address unused US immigration quotas.\nSympathy and excuses\nThe meeting was attended not by heads of state, but by lower-ranking diplomats. One after another, the representatives of the countries rose to express their deep sympathy — followed by excuses as to why they could not help. The Western European democracies justified themselves by citing high unemployment and the economic crisis, claiming they had no need for professors, artists, doctors or tradespeople.\nCanada declared that it was only prepared to accept experienced farmers with their own capital. The Australian delegate, Thomas White, said: \"Since we don't have a real race problem, we are not prepared to import one.\" France stated that it was already \"saturated\" with refugees. The Netherlands and Switzerland only wanted to issue transit visas. Some other countries, such as Romania and Poland, even asked Western countries to accept their Jewish populations.\nOnly a few Latin American countries, Mexico and Colombia among them, committed to accepting several hundred Jews annually over the next few years. The Dominican Republic offered to accept up to 100,000 Jews — but due to bureaucratic problems and the outbreak of World War II in September 1939, only a few hundred Jewish people reached the Caribbean nation.\n'A terrible experience'\nThe Evian Conference ended with the creation of the Intergovernmental Refugee Committee (IGC), a completely powerless body. Golda Meir, the future Prime Minister of Israel, attended Evian as an observer in 1938.\nIn her memoirs in 1975, she wrote: \"Sitting there in that magnificent hall and listening to the delegates of 32 countries rise, each in turn, to explain how much they would have liked to take in substantial numbers of refugees and how unfortunate it was that they were not able to do so, was a terrible experience [...].\"\nWhile the media in the German Reich rejoiced, the press in democratic countries reported with a mixture of sympathy and shame. The US magazine Time noted: \"Al", "translation_ja": "", "vocab": []}, {"title_ja": "Iran: Alleged Ahmadinejad plot highlights info war", "title_en": "Iran: Alleged Ahmadinejad plot highlights info war", "summary_ja": "Reports that Israel explored a scenario to effect regime change, involving former Iranian President Mahmoud Ahmadinejad reveal how the Iran war has also become a struggle over narratives and perception.", "summary_en": "Reports that Israel explored a scenario to effect regime change, involving former Iranian President Mahmoud Ahmadinejad reveal how the Iran war has also become a struggle over narratives and perception.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/iran-alleged-ahmadinejad-plot-highlights-info-war/a-77967268?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Iran: Alleged Ahmadinejad plot highlights info war\nJuly 15, 2026Two separate reports, one published recently by the US daily The New York Times and the other by the Israeli daily Haaretz, have reignited debate over Israel's thinking about regime change in Iran.\nThey have also raised questions over the role of ultraconservative former President Mahmoud Ahmadinejad— who served two terms from 2005 to 2013 — in Iranian politics.\nAccording to the reports, Israeli officials allegedly explored installing Ahmadinejad as a possible figurehead in a post-Islamic Republic scenario, with efforts reportedly intensifying during the war and involving secret contacts in Hungary.\nThe reports have attracted attention partly because of their sensational details.\nThey claim that Ahmadinejad was moved to a safe house after his compound was hit by an Israeli air strike on February 28, 2026, and that David Barnea, the former chief of Israel's Mossad intelligence service, personally oversaw part of the contact effort, which reportedly included a meeting in Budapest.\nHaaretz also wrote that the operation involved much more than Ahmadinejad and included infiltration plans inside Iran, contacts with minority groups and that there was also discussion of a broader destabilization strategy.\nIran's former leader denies reports\nThe details have not been independently verified and remain unconfirmed. However, Ahmadinejad's office has reportedly rejected the claims, describing them as \"absurd\" and \"completely false.\"\nBabak Dorbeiki, a London-based political analyst and former official at Iran's Strategic Research Center, told DW that the first task was now to separate three different questions: the accuracy of the reporting itself, Ahmadinejad's real place in Iranian politics today and the political function of publishing such stories.\n\"There is no public and independent evidence that can conclusively confirm or reject the details of this narrative,\" he said. \"So it can neither be accepted without question nor simply dismissed because it has been denied.\"\nDorbeiki argued that Ahmadinejad still had a social base and considerable unmistakable political ambition, but that this should not be confused with real power.\nIn his view, the former president has been pushed away from the core institutions of the Islamic Republic since roughly 2010, including the Office of the Supreme Leader, the Islamic Revolutionary Guard Corps (IRGC), the Guardian Council and much of the conservative camp.\nWho benefits from the narrative?\nAhmadinejad's repeated disqualifications from contesting in recent presidential elections, Dorbeiki said, show that key players calling the shots in Iran have little interest in restoring him to the center of decision-making.\nIn Dorbeiki's reading, the reports should not be understood simply as an attempt to promote Ahmadinejad as a future ruler by Israel. \"Even if we assume the reporting is correct, at most it shows that at one point he was one of the options under consideration, not that he is about to return to power,\" he said.\nFor him, the more revealing question is who benefits from such a narrative. One possibility, he said, is that the Iranian state could use it to reinforce the idea that even a former president is vulnerable to foreign penetration, helping to justify tighter security measures and entrenching a deeper climate of suspicion.\nAnother is that critics of Ahmadinejad could use it to reinforce their argument that his political legacy was always costly for Iran.\nAnd for Israel, Dorbeiki said, the publication of such a story may itself serve an intelligence purpose by signaling that it has reach, access and the ability to generate mistrust and paranoia inside Iran, whether or not every operational detail is correct.\nPart of the wider information war?\nVahid Heroabadi, a former Shiite cleric who lives in Europe and is now a critic of the Islamic Republic, told DW that outside powers looking for regime change usually search for figures with mobilizational capacity.\nBut he did not believe Ahmadinejad fits that role in today's Iran. \"Those who can play a role in the present or future of Iran are people who are connected to the IRGC,\" he said. \"Because Ahmadinejad no longer has that connection and does not have its support, he cannot really act as a decisive political player.\"\nHeroabadi, who said he was once close to Ahmadinejad's administration, argued that even in the event of a collapse, no foreign government wanting to impose regime change would be likely to rely on such a well-known and polarizing populist figure.\nIn his view, Ahmadinejad is not a credible bridge either to the Iranian public or to the security authorities that would matter in case of a transition of power.\nThe reports about the former president are revelatory about the wider information war surrounding Iran, about the narratives intelligence services may want to project and about how outside actors imagine post-Islamic Republic scenarios in Iran, even i", "translation_ja": "", "vocab": []}, {"title_ja": "LIVE:  Senators question acting Attorney General Todd Blanche at confirmation hearing", "title_en": "LIVE:  Senators question acting Attorney General Todd Blanche at confirmation hearing", "summary_ja": "24/7 coverage of breaking news and live events", "summary_en": "24/7 coverage of breaking news and live events", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Blanche faces grilling on DOJ controversies as he seeks confirmation as AG", "title_en": "Blanche faces grilling on DOJ controversies as he seeks confirmation as AG", "summary_ja": "Acting Attorney General Todd Blanche is facing the Senate Judiciary Committee as he seeks confirmation to secure his role on a permanent basis.", "summary_en": "Acting Attorney General Todd Blanche is facing the Senate Judiciary Committee as he seeks confirmation to secure his role on a permanent basis.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/Politics/blanche-face-grilling-doj-controversies-seeks-confirmation-ag/story?id=134746132", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Iran live updates: US launches daytime strikes, IRGC claims targeting of US bases", "title_en": "Iran live updates: US launches daytime strikes, IRGC claims targeting of US bases", "summary_ja": "President Donald Trump announced \"major combat operations\" against Iran on Feb. 28, with massive joint U.S.-Israeli strikes.", "summary_en": "President Donald Trump announced \"major combat operations\" against Iran on Feb. 28, with massive joint U.S.-Israeli strikes.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/International/live-updates/iran-live-updates-kuwait-reports-attacks-after-latest/?id=134704698", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "New US Ebola patient arrives in Germany for treatment", "title_en": "New US Ebola patient arrives in Germany for treatment", "summary_ja": "Aid worker flown to Berlin as Trump administration bars Americans from traveling to US on commercial flights A US national who contracted Ebola in the Democratic Republic of the Congo has arrived in Germany for treatment, the health ministry in Berlin said on Monday, weeks after another American inf", "summary_en": "Aid worker flown to Berlin as Trump administration bars Americans from traveling to US on commercial flights A US national who contracted Ebola in the Democratic Republic of the Congo has arrived in Germany for treatment, the health ministry in Berlin said on Monday, weeks after another American inf", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/14/american-ebola-patient-arrives-germany", "state_media": false, "category": "社会", "full_text": "A US national who contracted Ebola in the Democratic Republic of the Congo has arrived in Germany for treatment, the health ministry in Berlin said on Monday, weeks after another American infected with Ebola in the DRC was treated in Berlin.\nMeanwhile, the Trump administration on Monday said it was blocking American citizens in the DRC from traveling to the US on commercial flights, Reuters reported, citing a White House official.\nThe new American patient landed in Frankfurt overnight and was transferred to the city’s university hospital, according to the German health ministry.\nThe head of the World Health Organization (WHO) said the man was a “humanitarian worker” who had been in Bunia, the capital of the north-eastern Ituri province of the DRC.\nIturi is the center of an Ebola outbreak that the DRC declared in mid-May – its 17th.\nThe WHO had provided the infected man with “clinical care and close monitoring”, The WHO director-general, Tedros Adhanom Ghebreyesus, said on X.\n“The patient has been safely transferred to Germany for continued follow-up care,” he added.\nAn official working for the Christian aid group Samaritan’s Purse confirmed to Reuters that the patient, in his 60s, was a full-time employee of the organization working as a warehouse manager in the DRC.\nThe DRC’s ongoing outbreak is caused by the Bundibugyo strain of the virus – for which there is no vaccine or cure.\nThere have been more than 1,900 confirmed cases in the outbreak and more than 700 confirmed deaths, according to the WHO.\nThe German health ministry said the US patient represented “no danger for the general population or for other patients” in the Frankfurt hospital.\n“The risk of someone infected with Ebola entering Germany is very low,” the ministry said.\nIt added that US authorities had requested help from Germany because of the country’s expertise in treating Ebola cases and the shorter flight time from the DRC to Germany.\nAnother US patient with the virus was quarantined at the end of May along with his family at Berlin’s Charité hospital.\nHe made a recovery after two weeks of treatment.\nThe Trump administration’s barring Americans in the DRC from traveling to the United States on commercial flights is being done under a transportation authority known as Title 49, according to Reuters’ reporting. That will place US citizens in the DRC or those who have recently left on a “do-not-board” list until they have spent at least 21 days in a third country, Reuters reported, citing a White House official.\nAbout two dozen Americans were set to board flights to the United States on Tuesday after having traveled to the DRC, according to the US official quoted by Reuters. Reuters reported that the US state department would support those American citizens and others affected during the waiting period.\nEbola spreads through direct contact with bodily fluids from infected people or animals – and the often fatal viral disease causes symptoms that can include high fever, vomiting and internal and external bleeding.", "translation_ja": "", "vocab": []}, {"title_ja": "Killings continue on Del Monte farm in Kenya, families say, after G4S hired for security", "title_en": "Killings continue on Del Monte farm in Kenya, families say, after G4S hired for security", "summary_ja": "Exclusive: Three men killed in incidents over past year allegedly involving G4S guards, who replaced in-house team after previous deaths Bereaved families and politicians have raised alarm about continued killings on Del Monte’s pineapple farm in Kenya despite the company hiring a British security f", "summary_en": "Exclusive: Three men killed in incidents over past year allegedly involving G4S guards, who replaced in-house team after previous deaths Bereaved families and politicians have raised alarm about continued killings on Del Monte’s pineapple farm in Kenya despite the company hiring a British security f", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/13/del-monte-pineapple-farm-kenya-deaths-g4s", "state_media": false, "category": "政治", "full_text": "Bereaved families and politicians have raised alarm about continued killings on Del Monte’s pineapple farm in Kenya despite the company hiring a British security firm to replace its in-house security team after previous deaths were exposed by the Guardian.\nThe multinational food company appointed G4S to guard the farm, which is estimated to cover at least 40 sq km, the area of a small city, after the Guardian detailed allegations of brutal assaults and killings of people suspected of trespassing on its land. Kenyan police have been working with G4S to guard the site.\nThree men, including two brothers, were killed in separate incidents over the past year allegedly involving G4S guards.\nStephen Marubu Kibandi, 34, was shot in the chest from close range by a police officer working alongside G4S guards last August after they claimed to have been attacked. The victim put his hands up in surrender before being shot, according to a witness.\nHis brother, 27-year-old Haron Kame Kibandi, died in April this year after allegedly being struck on the head by stones thrown by G4S guards and falling from a motorbike. A third man, 31-year-old Michael Muiruri, was killed after being knocked off a motorbike by a G4S pickup truck.\nIn 2023, the Guardian revealed allegations about the killing of four men at the farm over a decade. Security at the farm was reviewed as part of a human rights impact assessment, which found that the farm was causing human rights harms across several areas. In March 2024, Del Monte Kenya outsourced all of the security at the farm to a team of 270 G4S guards.\nAnnouncing the deal, Wayne Cooke, the then acting managing director of Del Monte Kenya, said: “The safety and security of each individual within our company and the surrounding community are our top priority.” Del Monte Kenya appointed a new manager to address its “human rights challenges”.\nThis year, the Kenyan police extended their work with G4S to guard the site, setting up a “critical infrastructure protection unit” to help improve security at the farm.\nCampaigners fear there will be more deaths on Del Monte’s pineapple farm because the involvement of police makes the use of lethal force more difficult to prosecute. G4S denies wrongdoing.\nThe farm in Murang’a county is the largest exporter of Kenyan produce, including to several UK supermarkets, and is worth more than $100m a year. The average monthly salary in the county is about £280 ($380) and pineapple theft has been a problem for decades.\nA Kenyan senator has called for an independent investigation into the violence at the farm.\nStephen Marubu Kibandi\nStephen Marubu Kibandi died instantly when he was shot in the chest on 12 August 2025. A witness said Kibandi was among several men who were being chased by police and G4S guards on the Del Monte farm after resisting arrest. They said he was shot by a police officer while raising his hands in surrender. G4S says the police and guards were being attacked by men wielding machetes who also set fire to a G4S vehicle.\nA copy of his postmortem findings, seen by the Guardian, said Kibandi died from “severe haemorrhage due to perforating chest injury due to single gunshot”. His death is being investigated by the police watchdog, the Independent Police Oversight Authority (IPOA).\nG4S says it has shared footage with the IPOA showing police and its officers being attacked by men throwing stones and wielding machetes before the fatal shot was fired by a police officer. The spokesperson said its video also showed a G4S vehicle being set alight. The company declined to share the footage with the Guardian.\nStephen Nderitu, who witnessed the incident, said his friend had been approaching the police to argue they were doing nothing wrong. He told the Guardian: “There were two policemen and two G4S guards about 50 metres from where we were when I saw one of them point a gun at us and I jumped into the nearby thickets. Marubu held up both his hands and I heard a gunshot and saw him go down.”\nThe incident has been widely condemned and later prompted a protest in which a G4S van was burned. The local MP, Mary Wamaua Waithira, said: “Why shoot someone who has surrendered? He had lifted his hands up. We want the commanding officer for Ngati police station removed.”\nHaron Kame Kibandi\nStephen’s brother, Haron, died on 20 April this year from brain injuries, days after being struck on the head by stones. Before his death, he claimed the stones had been thrown by G4S guards. Haron told medics this had caused him to fall from a moving motorbike being ridden by a friend. He was allegedly beaten, according to an account he gave to medics.\nSimon Mburu, the manager of a health clinic to which Haron was taken, said: “He told me that he was hit by a stone by a G4S guard and when he fell down the person riding the bike continued.” When Haron was transferred to a hospital, he gave the same account. He died four days later. Scans revealed he had a “traumatic head injury” incl", "translation_ja": "", "vocab": []}, {"title_ja": "First patients enrolled in record-breaking Ebola treatment trial in DRC", "title_en": "First patients enrolled in record-breaking Ebola treatment trial in DRC", "summary_ja": "Two drugs are being trialled in the Ituri region in a programme set up just six weeks after the outbreak was declared, with hopes it will reduce mortality rates There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo ", "summary_en": "Two drugs are being trialled in the Ituri region in a programme set up just six weeks after the outbreak was declared, with hopes it will reduce mortality rates There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo ", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/12/record-breaking-ebola-treatment-trial-drc", "state_media": false, "category": "社会", "full_text": "There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo – but there are hopes that could change within months as the first patients are enrolled in a treatment trial.\nIt is a record pace to set up and start this kind of research, scientists said, with patients enrolled just six weeks after the outbreak being declared a public health emergency of international concern by the World Health Organization (WHO) on 17 May.\nNevertheless, in Bunia, the capital of Ituri province, where the virus is raging, people are impatient.\n“I hope these drug trials proceed quickly,” said Neema Haba, a mother of three and banana seller. “Financially, we are being driven to the brink by this outbreak and nothing is going right. We are struggling to provide for our children.”\nAs of 9 July, there had been 1,792 confirmed cases and 625 deaths caused by the Bundibugyo strain of the virus, for which there is no vaccine and no approved treatment. It is still “in the expansion phase”, according to the WHO.\nThe response is reliant on the basic techniques of identifying cases, isolating them for care and tracking and monitoring people they have been in contact with.\nThe latest figures show about 75% of known contacts are being traced, but low trust in authorities and a highly mobile population are hampering efforts. In addition, some frontline workers stopped work this week in protest at a lack of pay.\nThe bodies of Ebola victims are highly contagious, and must be safely buried by properly trained professional teams. Ovide Maliabo, a driver for one of the teams in Rwampara, a mining town in Ituri, said the work was dangerous in the face of community mistrust and he and his colleagues “see no point in risking our lives”.\n“At one point, we narrowly escaped being lynched,” he said. “It’s a shame that we aren’t being financially supported.”\nBahati John, head of the team, said he had lost a tooth after being attacked by local people.\n“Honestly, since we started working on 15 May, with all the insults we’ve had to put up with, we haven’t seen a single penny,” he said. “We are the breadwinners of our families, and our families are suffering.”\nDRC officials said payments had been made but it is unclear whether activities have fully resumed. The closure of the local airport in Bunia was hampering the response, including by impeding the supply of banknotes, they said.\nHopes of turning the tide now rest with scientists searching for effective medicines.\nThe Partners treatment trial has opened with two drugs on its books – remdesivir, and MBP134. Patients will be randomly allocated to receive either drug, a combination of the two, or simply standard, supportive care.\nRemdesivir is an antiviral made by pharma company Gilead Sciences, while MBP134 is a monoclonal antibody developed by Mapp Biopharmaceutical, containing two specially engineered immune proteins that recognise and neutralise the virus.\nBoth are given intravenously – MBP134 as a one-off infusion, and remdesivir as 10 days of intravenous therapy.\n“These two drugs actually have been proven to work against the Bundibugyo virus in animal models,” said Prof Laurens Liesenborghs of the Institute of Tropical Medicine, Antwerp, who is working on the trial in Ituri.\n“They showed great efficacy, but now we need to test it in humans. Basically, what we want to see is if they indeed can lower mortality.”\nBundibugyo typically has a lower death rate than the Zaire strain of Ebola, which has caused most previous outbreaks, but it still kills about one in three of those infected.\nResearchers are watching carefully for any difference in death rates between the groups given experimental drugs and the group receiving standard care. “Any improvement is good,” said Liesenborghs. “But it needs to be statistically detected, so we need to see a substantial drop.”\nIn trials looking at the impact of monoclonal antibodies on Ebola cases caused by the Zaire strain, it lowered death rates from 50% to 35%, he said. “Hopefully we will see something in the order of that magnitude.”\nThe trial’s design allows other potential treatments to be added should they become available. A result is likely to need between 700 and 1,000 patients to be enrolled, Liesenborghs said. “We opened one site, hopefully we’ll open additional sites very quickly, but still then it will take a couple of months, depending on how the outbreak is going, obviously.”\nWHO officials said enough remdesivir and MBP134 had been donated, by Gilead and the US government respectively, for 1,200 patients to be enrolled. The WHO is in discussions to ensure sufficient supplies will be available after the trial, should they prove safe and effective, it said.\nPatients of any age, including pregnant and breastfeeding women, who are often excluded from medical research, can enrol in the trial.\n“We always think of risk-benefit,” says Liesenborghs. “Here the benefit is potentially very hi", "translation_ja": "", "vocab": []}, {"title_ja": "My Twitter, not X", "title_en": "My Twitter, not X", "summary_ja": "As Twitter, then X, marks 20 years since its launch, a journalist journeys through revolutions and wars.", "summary_en": "As Twitter, then X, marks 20 years since its launch, a journalist journeys through revolutions and wars.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/15/my-twitter-not-x?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "My Twitter, not X\nAs Twitter, then X, marks 20 years since its launch, a journalist journeys through revolutions and wars.\nNothing much stays with me from the first days of Twitter, which was publicly launched 20 years ago, on July 15, 2006.\nI had discovered the internet back in 1995 and early on, I started thinking about how to get my voice heard by the world. I created a couple of websites through Angelfire and 8m, but there was no real ecosystem to nurture the idea. It’s like opening a shop to sell a certain product in a remote area – somewhere nobody really knows, at a time when there’s no interest – compared with opening that same shop in a mall, or on a street full of other vendors.\nMySpace was another opening, but the idea was not yet ripe. Facebook came with a spark – and then we got Twitter.\n“It’s like having your own breaking news platform, you’ll set your own agenda,” I remember one of my colleagues at the BBC, where I used to work, saying at the time.\nIt didn’t take me long to sign up. I cannot recall whether I tweeted immediately or not, yet what happened afterwards helped frame my future as an international journalist.\nTwitter’s first defining moment for me was 2009’s Green Revolution in Iran, when I and others followed how the platform shaped the discourse in a way that differed completely from traditional media. We were not new to citizen journalism; a few years earlier, Salam Pax emerged as the first ever famous war blogger, presenting his distinctive view of the US-led invasion of Iraq through his individual blog. A few years later, tens of thousands of Salams have appeared – and I’m one of them.\nGoing through my early timeline, I see that I was tweeting randomly – an earthquake in Japan, an election in Lebanon, an explosion in Somalia, and so on. Then came the Arab Spring. Just as with many in the world, this was the moment that shaped my Twitter presence, and as I got involved in the coverage, I became well-positioned to post and attract followers.\nMy coverage of the Libyan revolution in March 2011 introduced me to many people and gave me a better understanding of what was happening. I was based in Sallum, a village on the Egyptian side of the Libyan border, without a connection of my own. I fed a colleague back in Cairo a sentence at a time over a crackling Thuraya satellite phone, and he typed my words into the account that I could not reach. Its password lived on my friend’s head until days later, when I finally got my hands on a satellite dish.\nTrips to Libya, Egypt, Syria, Somalia – all of it made Twitter part and parcel of my journalistic journey, and it also helped me build a parallel path writing for international outlets including Al-Monitor and The Sunday Times.\nYet still, there was something else that changed my direction. Until 2013, I was a journalist covering stories without specialisation – I used to report from Iran, like I do today, yet it was not my career the way it currently is. But then I became a bureau chief in Tehran and my knowledge began growing – and here, Twitter gave me another layer, widening my network day after day.\nPersonally, that specialisation gave the platform its finest hour for me. I broke developments out of Iran’s nuclear talks with world powers before the news agencies had finished their first draft, filing in Arabic and English within minutes of each other and announcing the agreement itself while other newsrooms were still working on their bulletins.\nThe war against ISIL (ISIS) followed, then a January 2020 morning near Baghdad airport when my sources told me the commander of the Islamic Revolutionary Guard Corps’s Quds Force, Qassem Soleimani, and the deputy chief of Iraq’s Popular Mobilisation Forces, Abu Mahdi al-Muhandis, were in a convoy hit by a US air strike – and I was among the first to say so.\nTwitter was never only a wire service for other people’s wars. I’ve “met” heads of state and celebrities on this platform – and for a moment we felt equals. I have made my scoops there, and I have made my hugest gaffes there, too. You act and you interact and you see the result immediately, backlash or praise. It’s like a daily journal, one that outlives you. I know of many, some friends, some colleagues, some people I only happened to follow, who left our world while their accounts are still there – for us, and for me – to return to for the memory or to get a piece of information.\nIt was also where, on the 100th anniversary of World War I, that I told the story of my great-grandfather, Ali Hashem, who went to the war and never returned; and of my grandfather Hussein, who was three when his father was summoned to the Ottoman army and never saw him again.\nIt was where colleagues at Al Jazeera, stationed in the north of Palestine, went looking for my family’s village on my behalf, for a cemetery nearly in ruins, for a great-grandmother’s grave that has never been found.\nIt became, eventually, the subject of my own academic work too, a master’s the", "translation_ja": "", "vocab": []}, {"title_ja": "Legal challenge says Trump ICC sanctions tread on US citizens’ rights", "title_en": "Legal challenge says Trump ICC sanctions tread on US citizens’ rights", "summary_ja": "Groups charge that sanctions against ICC, Palestinian rights organisations stifle freedom of speech and expression.", "summary_en": "Groups charge that sanctions against ICC, Palestinian rights organisations stifle freedom of speech and expression.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/15/legal-challenge-says-trump-icc-sanctions-tread-on-us-citizens-rights?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "Legal challenge says Trump ICC sanctions tread on US citizens’ rights\nGroups charge that sanctions against ICC, Palestinian rights organisations stifle freedom of speech and expression.\nWashington, DC – A new legal challenge is taking aim at the sanctions imposed by United States President Donald Trump’s administration on the International Criminal Court (ICC), saying they trample on the constitutional rights of US citizens.\nThe lawsuit was filed on Wednesday by the Washington, DC-based DAWN rights organisation and the Taxpayers Alliance Against Genocide (TAAG). It specifically targets sanctions imposed by the Trump administration beginning in February 2025 in response to ICC arrest warrants issued for Israeli Prime Minister Benjamin Netanyahu and former Defence Minister Yoav Gallant.\nRecommended Stories\nlist of 3 items- list 1 of 3A world on trial: How lawyers documenting Israeli abuse pay a price\n- list 2 of 3British lawyers’ body suspends ICC Prosecutor Khan over misconduct claim\n- list 3 of 3The ICC must investigate Israel’s genocidal use of sexual violence\nTrump’s executive order at the time imposed penalties on ICC officials who take part in investigations related to the US and its allies, particularly Israel. Organisations or individuals who supported those investigations are also targeted.\nThe administration has since sanctioned ICC prosecutors and judges, several Palestinian organisations that have provided evidence to The Hague-based court and United Nations Special Rapporteur for occupied Palestinian territory Francesca Albanese.\nThe sanctions under Trump’s executive order “violate Americans’ constitutional right to engage in Palestine-related human rights advocacy”, DAWN and TAAG charged in the lawsuit.\nThat includes “limiting what Americans can say to an international tribunal or to foreign advocates, as well as by limiting their ability to associate with the sanctioned parties”, the groups said.\nThe lawsuit also said the Trump administration’s actions violate the International Emergency Economic Powers Act (IEEPA), passed by the US Congress in 1977, which “bars the president from using sanctions to restrict ‘personal communications’ or the transmission of ‘information or informational materials'”.\nThe filing comes days after the Trump administration promised to escalate its campaign against the ICC, saying it would seek to “dismantle” the world’s top international criminal tribunal, which was founded in 2002.\nIn a video statement and an opinion piece published by The Wall Street Journal, US Secretary of State Marco Rubio pledged “a whole-of-government response” against the court, which he said “threatens every aspect” of the US political and legal system.\nThe US is not a signatory to the ICC’s founding document, the Rome Statute, and is, therefore, not subject to its jurisdiction. The court, however, has maintained that US citizens may be investigated and prosecuted for abuses committed within the territory of members of the court. It has taken the same position towards Israel during its genocidal war against Palestinians in Gaza.\nNo US citizen has been prosecuted by the ICC although the court still has open investigations into abuses committed in Afghanistan during the two-decade deployment of foreign forces that began in the early 2000s, including US military and intelligence personnel.\nRubio said the US was considering several tactics in its approach, including heaping pressure on US allies and aid recipients not to comply with the court. The administration has also promised more sanctions and travel bans.\nThe DAWN and TAAG lawsuit is the latest to challenge the sanctions.\nA federal judge in New York previously sided with two law professors who argued the sanctions stifled their First Amendment rights under the US Constitution, which allows them to advise the ICC prosecutor and his office.\nThe sanctions against Albanese were also briefly lifted after a court order in May but were reimposed upon appeal from the Trump administration.\nSanctioned ICC judges have also filed a lawsuit against the Trump administration.\nIn a statement, Omar Shakir, the executive director of DAWN, said the Trump administration “is using the blunt instrument of economic sanctions not only to punish human rights defenders but to police the political expression of millions of Americans”.\n“The US government has the largest megaphone in the world and it is perfectly capable of pleading its case – or Israel’s,” Joseph Pace, a lawyer representing DAWN and TAAG, said in a statement.\n“What it cannot do is bar Americans from sharing a contrary perspective with the ICC, much less criminalise contact with non-American human rights defenders whose only ‘misdeed’ was calling for justice for US and Israeli crimes.”", "translation_ja": "", "vocab": []}, {"title_ja": "Iraq’s prime minister carries the title, but not the power", "title_en": "Iraq’s prime minister carries the title, but not the power", "summary_ja": "Al-Zaidi’s Washington visit exposed the pressure reshaping Baghdad’s politics, security and economy.", "summary_en": "Al-Zaidi’s Washington visit exposed the pressure reshaping Baghdad’s politics, security and economy.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/opinions/2026/7/15/iraqs-prime-minister-carries-the-title-but-not-the-power?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "Iraq’s prime minister carries the title, but not the power\nAl-Zaidi’s Washington visit exposed the pressure reshaping Baghdad’s politics, security and economy.\nAli al-Zaidi met US President Donald Trump in the Oval Office on Tuesday as Iraq’s prime minister. He carried the title. The power was another matter.\nEleven weeks earlier, after months of paralysis, the Shia alliance which is known as the Coordination Framework had taken just 25 minutes to choose him. That sudden consensus was forged under intense pressure from Washington DC.\nThe United States Treasury had frozen Iraq’s dollar lifeline, the cash shipments that fly from New Jersey to the Central Bank of Iraq. Nouri al-Maliki, a former prime minister, and the top contender to return to the premiership had to abandon his plans because of Washington’s veto.\nAl-Zaidi, a 40-year-old banker with no political base, was the man left standing.His lack of an established political base is part of his usefulness. He owes his position less to Baghdad’s ballot box than to the pressure exerted by Trump’s Treasury.The banker’s own ledger is not clear.\nIn 2024, Iraq’s Central Bank barred al-Zaidi’s own institution, Al-Janoob Islamic Bank, from US-dollar transactions as part of a wider crackdown intended to curb illicit dollar flows to Iran. He was never charged. Neither the bank nor the man is currently sanctioned. But the file exists. Its existence could give Washington another source of leverage should al-Zaidi drag his feet.\nThe real power in Baghdad now sits in one man’s portfolio. Tom Barrack holds three titles at once: ambassador to Turkiye, envoy to Syria, and now envoy to Iraq. His influence rests less on diplomacy than on Washington’s financial leverage over Baghdad. Iraq’s oil revenue sits in an account at the Federal Reserve Bank of New York. In April, Washington blocked a cash shipment of nearly $500m drawn from those revenues and suspended parts of its security cooperation. Oil funds roughly 90 percent of Iraq’s budget. Barrack does not need to threaten military force when the administration he represents can reach directly into the financial system on which the Iraqi state depends.\nWashington’s demand that Iraq bring all armed factions under state control remains far from resolved. Shia Cleric Muqtada al-Sadr dissolved his Saraya al-Salam militia in late May. Other militias such as Asa’ib Ahl al-Haq and Kataib Imam Ali have announced steps towards handing over their weapons or placing them under fuller state control. That is real movement. But Kataib Hezbollah and Harakat al-Nujaba, the two factions most tightly bound to Tehran, have rejected full disarmament. In their own words, their weapons are not for bargaining. Washington has answered in kind. US strikes killed dozens of Iranian-backed Popular Mobilization Forces (PMF) fighters this spring; the Treasury has sanctioned seven militia commanders by name. Baghdad has set September 30 as its disarmament deadline, the same date on which the remaining US forces are expected to leave Iraq. Whether the hardest factions bend by then remains the open question that Washington has yet to answer honestly.\nEven Grand Ayatollah Ali al-Sistani’s authority has limits here, as it always has. Al-Sistani’s 2014 fatwa built the PMF’s founding myth. But his call was for men to defend Iraq under the state’s command, not to form independent militias. The hardline factions never answered to Najaf. They answer to Tehran. al-Sistani’s own representative in Karbala has also pressed publicly for exclusive state control of weapons. His influence remains significant, but
