it has never extended to full control over these factions, and the current standoff is making that reality harder to ignore.\nThe prize Washington actually wants, however, lies underground. Chevron is negotiating an expanded role in Iraq’s oil sector, while other US companies are pursuing contracts in gas, electricity and export infrastructure. Baghdad wants production up from 4.5 million barrels a day to 7 million within three years, though doing so would require a substantially larger OPEC quota. Western Iraq’s gas reserves, largely untapped, could one day elevate the country into a dominant regional energy player and exporter. This is the potential bonanza al-Zaidi is being asked to unlock in exchange for the loyalty Washington is seeking.\nKurdistan’s place in this emerging arrangement is still unclear. Barrack has called the old Baghdad-Erbil federal model outright “Balkanization”, a structure he blames for letting Iran fill the vacuum. Yet the same envoy spent much of June pressing the prime minister of the Kurdish region, Masrour Barzani, to reactivate the Kurdistan parliament and form a new cabinet, not dissolve it. Read together, these positions suggest a clear message: Washington wants a functioning, cooperative Kurdistan region, firmly inside Washington’s orbit, not an autonomous wildcard and not a vassal of Baghdad’s sectarian blocs either.\nStripped of", "translation_ja": "", "vocab": []}, {"title_ja": "U.S. says 90-minute airstrikes target Greater Tunb Island, strategic point in Strait of Hormuz", "title_en": "U.S. says 90-minute airstrikes target Greater Tunb Island, strategic point in Strait of Hormuz", "summary_ja": "U.S. Central Command said the strikes further degraded Iran's ability to attack commercial shipping in the Strait of Hormuz", "summary_en": "U.S. Central Command said the strikes further degraded Iran's ability to attack commercial shipping in the Strait of Hormuz", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/us-airstrikes-iran-greater-tunb-island-strait-of-hormuz/article71226116.ece", "state_media": false, "category": "社会", "full_text": "The U.S. military's Central Command said on Wednesday (July 15, 2026) it launched airstrikes on Greater Tunb Island in the Strait of Hormuz, targeting Iranian defence and missile sites.\nWest Asia War LIVE updates - July 15, 2026\nThe island, seized by Iran since 1971 from what would become the United Arab Emirates, is viewed as a strategic point in the strait.\nCentral Command said it launched a 90-minute attack targeting the island.\n“The strikes further degraded Iran's ability to attack commercial shipping in the Strait of Hormuz,” it said.\nPublished - July 15, 2026 07:33 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Leaving U.K. in better shape: Keir Starmer at final Parliament session as PM", "title_en": "Leaving U.K. in better shape: Keir Starmer at final Parliament session as PM", "summary_ja": "Andy Burnham, the former Mayor of Greater Manchester, is on course to take charge as the new British Prime Minister next week after being endorsed by a resounding 349 Labour MPs in the leadership race", "summary_en": "Andy Burnham, the former Mayor of Greater Manchester, is on course to take charge as the new British Prime Minister next week after being endorsed by a resounding 349 Labour MPs in the leadership race", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/leaving-uk-in-better-shape-keir-starmer-at-final-parliament-session-as-pm/article71225984.ece", "state_media": false, "category": "政治", "full_text": "Keir Starmer wrapped up his final Prime Minister's Questions (PMQs) session in the lower house of the U.K. Parliament on Wednesday (July 15, 2026) with an emotional farewell and standing ovation from the government benches.\nThe 63-year-old Labour MP, who announced his resignation last month and has been serving as caretaker until the party leader is elected, said he was leaving Britain in a better place than he found it and expressed “wholehearted support” for his successor.\nAndy Burnham, the former Mayor of Greater Manchester, is on course to take charge as the new British Prime Minister next week after being endorsed by a resounding 349 Labour MPs in the leadership race.\n“I'm proud to leave this country in a better shape than I found it; I am proud of everything that we have achieved,” Mr. Starmer told MPs in the House of Commons as he concluded PMQs with “goodbye.”\n“Every Prime Minister knows when they take up the torch that the day will come when they have to pass it on. That day has come for me. This is the end of my political journey. In six years, we went from a historic defeat in 2019 to a historic victory in 2024,” he said.\nDuring a largely good-natured final parliamentary clash across the despatch box, Mr. Starmer reflected upon his legacy as someone who had “picked up” the Labour Party from electoral oblivion to win a “landslide” general election in July 2024.\nAlluding to the crucial England World Cup football semi-final fixture against Argentina later on Wednesday (July 15), he said: “For my successor and for the England team, I won't give advice. I will simply give my wholehearted support.\n“Just for the record, I don't care what the score is tonight, as long as we win.” Pressed by the Opposition Conservative Party leader, Kemi Badenoch, the outgoing PM said he would save any words of advice for private interactions with the incoming Labour leader.\n“I will give my wholehearted support to my successor. I want this Labour government to be a success; I want our country to be a success. I shall give my support privately if asked for, not publicly when not asked for,” he said.\nAfter an initial phase of popularity, Mr. Starmer was hit by some controversial decision-making and policy U-turns, which intensified an internal rebellion within the Labour ranks as MPs demanded speedier action on the country's cost-of-living crisis.\nOn June 22, he took to the steps of Downing Street to say that he accepted his party's demands “with good grace” and would resign to “ensure an orderly handover of power.” Mr. Burnham, who returned to the Parliament benches after contesting a by-election in Makerfield last month, emerged as the frontrunner for the top job ever and is all set to be elected as the new Labour leader unopposed after the nominations process formally closes on Thursday (July 16).\nOn Monday (July 13), Mr. Starmer is expected to formally tender his resignation during an audience with King Charles III at Buckingham Palace, followed by Mr. Burnham being invited by the monarch to form the new government.\nPublished - July 15, 2026 07:27 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Sri Lanka always willing to host India-Pakistan sporting events, says Minister", "title_en": "Sri Lanka always willing to host India-Pakistan sporting events, says Minister", "summary_ja": "Cites proximity, Colombo’s “very good relations” with New Delhi and Islamabad", "summary_en": "Cites proximity, Colombo’s “very good relations” with New Delhi and Islamabad", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/sri-lanka-always-willing-to-host-indo-pak-sporting-events-says-minister/article71225836.ece", "state_media": false, "category": "政治", "full_text": "Sri Lanka is “always willing” to host sporting events featuring India and Pakistan, Sports Minister Sunil Kumara Gamage said, pointing to the island’s proximity and Colombo’s strong ties with New Delhi and Islamabad as advantages. “Not just cricket, we are willing to extend our fullest cooperation and support to host any game between India and Pakistan if they make a request. Both countries are our close friends and partners,” he said.\nSpeaking to The Hindu at his office in Colombo, Mr. Gamage further said that Sri Lanka is looking forward to welcoming cricket fans from India to watch the Test series next month. India is scheduled to tour Sri Lanka in August for a Test series, with matches scheduled at the Sinhalese Sports Club (SSC) in Colombo and the Galle International Stadium in the southern coastal district.\n“We saw a large number of Indians travelling to Sri Lanka earlier this year for the [ICC Men’s] T20 World Cup that we co-hosted with India. We hope that there is a similar interest in the Test series too. Sri Lanka offers a lovely environment for sporting events, and as we did last time, we will ensure that very good security arrangements are in place.”\nStill recovering from the economic crash of 2022, Sri Lanka is counting on revenue from the tourism sector, a key foreign exchange earner, to boost its reserves. India tops Sri Lanka’s tourist arrival charts, and authorities observed a spike in Indian tourists in February 2026, just ahead of the India-Pakistan match. Local media reported that hotels in Colombo were fully booked ahead of the much-anticipated game between the sporting rivals.\nWhile promoting the island as a feasible destination for international sporting events, Sri Lanka has also set out to reform cricket administration in the country. In April this year, the Sports Minister appointed a nine-member Transformation Committee for Sri Lanka Cricket (SLC). Its members, including cricketing greats Kumar Sangakkara, Roshan Mahanama and Sidath Wettimuny, apart from business leaders and professionals, have been tasked with “transforming and restructuring” cricket administration, which has for long been marred by political interference, mismanagement, and financial irregularities.\n“We want to chart a proper path forward for the game. A new constitution, a credible election, and stronger structures for cricket at the local level, be it in schools, at the district or provincial level, that is our focus,” Minister Gamage said, adding that improvements in those areas will also lead to better player selection. Women’s cricket is another “key area”. “We have some great players, skills; we see that from time to time. The committee will come out with a comprehensive plan to strengthen women’s cricket too.”\nCoinciding with the committee’s early efforts to reform cricket administration, International Cricket Council Chairman Jay Shah visited Colombo last month and held high-level talks. Following a meeting with President Anura Kumara Dissanayake, Mr. Shah wrote on ‘X’ that discussions focused on increasing opportunities for emerging players and supporting grassroots and youth development programmes. “We also exchanged views on the role Sri Lanka continues to play in hosting major international events,” he said in the post. Describing Mr. Shah’s visit as “very good”, Minister Gamage said: “We want to make sure that the funds Sri Lanka receives from ICC are used efficiently and in a transparent manner to develop the game.”\nSri Lanka is also gearing up for the sixth season of the Lanka Premier League (LPL), scheduled from July 17 to August 8, with five franchises participating. “We are looking forward to that,” Mr. Gamage said.\nMeanwhile, Sri Lanka has also been urging its sportspeople living abroad to play for the country. “Already [Sri Lankan-American gymnast] Tiana Sumanasekera, who formerly represented the U.S. women’s artistic gymnastics team, has agreed to play for Sri Lanka. We are hoping we can import more players to develop sports in our country and motivate aspiring players. Many countries do that already.”\nWhile Sri Lanka is focused on strengthening cricket, the government is simultaneously working on enhancing opportunities for other sports as well. “In fact, we have sought assistance from India in areas of coaching and training. We are exploring the possibilities of bringing down chess grandmasters from India to train our players. We are in discussion with the Indian High Commission in Colombo, and the response so far has been very positive,” the Minister said, adding that “shared histories and culture” made India and Sri Lanka close partners.\n“We hope and look forward to meeting India in the South Asian Games too,” he said, referring to the multi-sport regional event scheduled to be held in Pakistan in March 2027. India is yet to officially confirm participation.\nPublished - July 15, 2026 07:01 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Aster facility in Kullu park: Matter pending before high court, green tribunal adjourns hearing", "title_en": "Aster facility in Kullu park: Matter pending before high court, green tribunal adjourns hearing", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/chandigarh/ngt-adjourns-kullu-nehru-park-mrf-waste-facility-plea-high-court-status-quo-10788192/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Now Jammu University orders audit of all books on its premises", "title_en": "Now Jammu University orders audit of all books on its premises", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/india/jammu-university-order-audit-books-10788178/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "How Didier Deschamps’s elite bunch fell short on big stage – 3 times to Spain", "title_en": "How Didier Deschamps’s elite bunch fell short on big stage – 3 times to Spain", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/sports/football/fifa-world-cup-france-didier-deschamps-spain-kylian-mbappe-semifinal-10788143/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "DeMar DeRozan is open to a Raptors return. Here’s why it (probably) won’t happen - Toronto Star", "title_en": "DeMar DeRozan is open to a Rap , "summary_en": "The company warned residents against taking refuge beneath trees or standing close to electricity poles, power lines and other electrical installations during storms. The post How to avoid electrical hazards during rainy season – Electricity company appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/ssouth-east/895526-how-to-avoid-electrical-hazards-during-rainy-season-electricity-company.html", "state_media": false, "category": "政治", "full_text": "MainPower Electricity Distribution Ltd has urged Enugu residents to prioritise electrical safety during the rainy season to prevent electrocution, accidents and property damage.\nThe company’s Head of Communications, Emeka Ezeh, gave the advice on Monday in Enugu after heavy rainfall, windstorms and flooding affected several parts of the state.\nMr Ezeh advised residents to remain indoors during rainfall or seek safe shelter away from electricity infrastructure to minimise exposure to dangerous electrical hazards.\n“Customers and residents should remain indoors or seek safe shelter during rainfall,” he said.\nHe warned residents against taking refuge beneath trees or standing close to electricity poles, power lines and other electrical installations during storms.\nAccording to him, heavy rainfall and strong winds could topple trees and electricity poles, leaving snapped conductors and exposed installations capable of causing fatal electrocution.\nHe urged residents never to touch electrical appliances, switches, sockets, or fittings with wet hands, as moisture significantly increases the risk of electric shock.\nMr Ezeh stressed that electrical installations in homes and business premises should be properly insulated and regularly maintained to prevent faults and minimise avoidable accidents.\nHe also appealed to parents and guardians to keep children away from electrical installations and other dangerous locations during the rainy season.\n“MainPower encourages them to unplug sensitive electrical appliances during severe thunderstorms to minimise the risk of lightning-induced power surges,” he said.\nMr Ezeh urged customers to report emergencies involving fallen electricity poles, snapped conductors, damaged transformers, or any unsafe electrical installations requiring urgent attention immediately.\n“Customers and residents should call the company’s emergency line,” he said.\nREAD ALSO: TCN sensitises Ebonyi communities on protection of power installations\nHe added that customers could also contact the Quick Response Team through the Customer Call Centre for immediate assistance.\nMr Ezeh reassured customers that MainPower remained committed to protecting lives and ensuring safe, reliable electricity distribution throughout the rainy season.\nHe appealed for customers’ cooperation by observing all electrical safety precautions and promptly reporting faults or hazardous electrical installations to prevent avoidable tragedies.\n(NAN)", "translation_ja": "", "vocab": []}, {"title_ja": "Governor Sani commissions five township roads in Kwoi", "title_en": "Governor Sani commissions five township roads in Kwoi", "summary_ja": "The governor lamented that ‘’for well over two decades, Jaba Local Government Area did not witness the construction of a single completed kilometre of road. The post Governor Sani commissions five township roads in Kwoi appeared first on Premium Times Nigeria .", "summary_en": "The governor lamented that ‘’for well over two decades, Jaba Local Government Area did not witness the construction of a single completed kilometre of road. The post Governor Sani commissions five township roads in Kwoi appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/promoted/895512-governor-sani-commissions-five-township-roads-in-kwoi.html", "state_media": false, "category": "政治", "full_text": "Governor Uba Sani has broken a 20-year old jinx in Jaba local government, with the commissioning of five township roads in Kwoi, the headquarter of the Area Council.\nThe governor recalled that when he performed the ground breaking ceremony last September, he assured that the intervention would not be another promise deferred.\n‘’By the grace of God and through the dedication of our team, we have returned to redeem that pledge. Nothing strengthens the bond between a government and its people more than promises fulfilled,’’ he noted.\nLast Tuesday, Governor Sani commissioned the Audu Tilo Road, Sabon Gari Road, Doctor Sani Road, Hospital Road and Kpop Ham Palace Road, as well as the strategic Kwoi–Gora Road.\nThe governor lamented that ‘’for well over two decades, Jaba Local Government Area did not witness the construction of a single completed kilometre of road.\n‘’It was among the 12 Local Governments that were neglected in terms of road construction. Such imbalance was inconsistent with the principles of fairness, equity and justice upon which enduring development must rest,’’ he argued.\nGovernor Sani noted that his administration is determined to reverse that history, adding that it has ‘’ pursued an infrastructure agenda deliberately designed to ensure that development reaches every part of Kaduna State.’’\n‘’Across our twenty-three Local Government Areas, we have initiated 150 road projects covering more than 1,355 kilometres, with the overwhelming majority already completed,’’ he disclosed.\nMr Sani further said that ‘’these projects represent far more than completed infrastructure; they are enduring symbols of our resolve to ensure that no community is excluded from the dividends of democratic governance.’’\nAccording to him, his administration’s philosophy is that ‘’government must not be defined by geography, politics or identity, but by fairness in the allocation of opportunities and public investment.’’\nGovernor Sani reminded the people that the Kwoi township roads and the Kwoi-Gora road are strategic investments in the economic and social life of Jaba community.\n‘’They will improve mobility within Kwoi, facilitate access to schools and healthcare facilities, strengthen commercial activity, ease transportation for farmers and traders,’’ he noted.\nThe governor also recalled that the Kwoi–Gora Road ‘’was synonymous with hardship, particularly during the rainy season when erosion and poor road conditions disrupted movement, isolated communities, increased transportation costs and hindered access to essential services.’’\n‘’Today, that difficult chapter has been replaced by new opportunities. This road will strengthen social and economic interactions, improve emergency response, facilitate agricultural transportation and open wider prospects for investment across Jaba Local Government Area,’’ he added.", "translation_ja": "", "vocab": []}, {"title_ja": "Request For Expressions Of Interest: Design, organize, and implement Tech Hackathons and Innovative Challenges iDICE Programme", "title_en": "Request For Expressions Of Interest: Design, organize, and implement Tech Hackathons and Innovative Challenges iDICE Programme", "summary_ja": "The primary objective of this consultancy is to design, organize, and implement a minimum of 12 series of (general and female focused) tech hackathons and innovative competitions across the six (6) geo-political regions. Each region shall run two parallel streams The post Request For Expressions Of ", "summary_en": "The primary objective of this consultancy is to design, organize, and implement a minimum of 12 series of (general and female focused) tech hackathons and innovative competitions across the six (6) geo-political regions. Each region shall run two parallel streams The post Request For Expressions Of ", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/promoted/895506-request-for-expressions-of-interest-design-organize-and-implement-tech-hackathons-and-innovative-challenges-idice-programme.html", "state_media": false, "category": "政治", "full_text": "REQUEST FOR EXPRESSIONS OF INTEREST\nDesign, organize, and implement (general and female focused) Tech Hackathons and Innovative Challenges (Manage Competition, Implementation, Seed Capital and Follow up)\nInvestment in Digital and Creative Enterprises (iDICE) Programme\nTechnology and Creative Sector\nFinancing Agreement reference: 2000200005160\nProject ID No.: P-NG-K00-009\nBackground\nThe Federal Government of Nigeria (FGN) has received financing from the African Development Bank (AfDB), AgenceFrançaise de Développement (AFD) and the Islamic Development Bank (IsDB) towards the implementation of the Investment in Digital and Creative Enterprises (iDICE) Programme.\nThe objective of the iDICE Programme is to promote entrepreneurship, boost innovation, create jobs, enhance social development, and achieve economic transformation by fostering growth in the digital technology and creative ecosystem, building on brownfield investments and synergies with ongoing initiatives in Nigeria.\nIn line with implementation arrangements, the iDICEProgramme Coordination Unit (PCU) within the Bank of Industry (BOI) – the Executing Agency for the Programme appointed by the FGN – is seeking to engage the services of a consultant to design, organize, and implement (general and female focused) Tech Hackathons and InnovativeChallenges (Manage Competition, Implementation, Seed Capital and Follow up) under the Investment in Digital and Creative Enterprises (iDICE) Programme.\nObjective\nThe primary objective of this consultancy is to design, organize, and implement a minimum of 12 series of (general and female focused) tech hackathons and innovative competitions across the six (6) geo-political regions. Each region shall run two parallel streams:\n• Stream A – General Innovation Challenges: Technology hackathons and competitions targeting all eligible innovators and start-ups.\n• Stream B – Female Focused Challenges: Targeted hackathons and innovation competitions focused on discovering and nurturing female-led start-ups in thetechnology sector.\nOf the 12 series of (general and female focused) events, a minimum of 5% start-ups shall be start-ups from vulnerable and marginalized groups “such as At Risk Youth, PWDS, Displaced Persons, Youth Not in Employment, Education or Training (NEET Youths)”.\nThe specific goals are:\na) Identify and nurture high-potential technology startupsthrough competitive hackathons and innovation challenges.\nb) Foster innovation and problem-solving by encouraging technology and digital solutions to pressing socio-economic and industry challenges using technology.\nc) Provide seed capital and structured post-event support to enable selected startups to scale and become investment ready.\nd) Create visibility and networking opportunities for emerging tech entrepreneurs by connecting them with investors, mentors, and industry stakeholders.\ne) Strengthen the tech ecosystem by promoting collaboration among hubs, accelerators, universities, and private sector actors.\nf) Discover and nurture female-led startups through targeted hackathons, ensuring equitable access to resources, networks, and funding.\ng) Promote gender equality in entrepreneurship and innovation by addressing socio-economic and industry barriers faced by women.\nh) Strengthen the gender-inclusive tech and creative ecosystem by promoting collaboration among women-focused ESOs, accelerators, universities, and private sector actors.\ni) Document success stories and lessons learned to inform future gender-focused innovation programmes.\nScope of Work\nThe Consultant will be required to carry out the following activities:\nA. Program Design\na) Develop the framework for a minimum of 12 hackathons and competitions, including:\ni. Focus areas and themes aligned with the technologyand digital economy’s needs\nii. Female led technology startups\niii. Competition formats and participation criteria.\niv. Evaluation criteria and judging processes.\nb) Outline strategies to engage key stakeholders, including industry leaders, ESOs, and relevant government agencies.\nc) Establish guidelines for awards and post-event support for winning teams.\nd) Prepare a plan outlining measures to mitigate potential environmental and social impact, including social safeguards, monitoring and reporting requirements.\ne) Embed zero-tolerance SEA-H safeguards in all programme activities. Develop a Social Impact & Safeguarding Plan addressing prevention, safe reporting channels, response protocols, and accountability mechanisms.\nB. Thematic Areas\n1. Digital skills, employability and jobs- exploring skills matching platforms, freelancing and remote work, AI-powered learning and certification;\n2. Agritech; financial inclusion and SME support;\n3. Climate and clean energy;\n4. Digital economy etc.\nSelected startups should have 40% focused on ideation and problem solving; 60% focused on proof of concept.\nC. Event Planning and Coordination\na) Plan and organize a series of tech hackathons and innovative competition", "translation_ja": "", "vocab": []}, {"title_ja": "Iran War Live Updates: U.S. and Iran Exchange Strikes for Fifth Straight Day", "title_en": "Iran War Live Updates: U.S. and Iran Exchange Strikes for Fifth Straight Day", "summary_ja": "The United States launched new attacks against Iranian targets on Wednesday, hours after Iran targeted American military sites in the region. Neither side has shown signs of backing down as they enter a new stage of the war.", "summary_en": "The United States launched new attacks against Iranian targets on Wednesday, hours after Iran targeted American military sites in the region. Neither side has shown signs of backing down as they enter a new stage of the war.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/07/15/world/iran-war-trump-hormuz", "state_media": false, "catego ormuz, that room is now smaller and shrinking further as spare capacity has been deployed, demand has compressed, and inventories have been drawn down", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2160661", "state_media": true, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "The Tragedy of “Westalgia”", "title_en": "The Tragedy of “Westalgia”", "summary_ja": "Some European leaders seem to think that abasing themselves for Donald Trump's pleasure is necessary to save NATO and keep the Western alliance alive. But by so desperately clinging to the good old days of the transatlantic relationship, Europe’s leaders are risking more than just their dignity.", "summary_en": "Some European leaders seem to think that abasing themselves for Donald Trump's pleasure is necessary to save NATO and keep the Western alliance alive. But by so desperately clinging to the good old days of the transatlantic relationship, Europe’s leaders are risking more than just their dignity.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/europe-dangerously-clinging-to-past-ostalgie-and-now-westalgia-by-mark-leonard-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Tragedy of “Westalgia”\n                        Some European leaders seem to think that abasing themselves for Donald Trump's pleasure is necessary to save NATO and keep the Western alliance alive. But by so desperately clinging to the good old days of the transatlantic relationship, Europe’s leaders are risking more than just their dignity.\n                    \n                        BERLIN—European leaders breathed a sigh of relief as US President Donald Trump departed last week’s NATO summit in Ankara, Turkey. Despite a few unseemly moments in which Trump reiterated his desire to seize Greenland and nonsensically ordered a halt to all trade with Spain, the meeting went off without any major catastrophes.\n        https://prosyn.org/DGzFG57", "translation_ja": "", "vocab": []}, {"title_ja": "The West’s Turkey Dilemma", "title_en": "The West’s Turkey Dilemma", "summary_ja": "Few countries better illustrate the difficult trade-off between democratic principles and strategic necessity than Turkey. As the country’s geopolitical and economic importance grows, NATO allies are becoming increasingly willing to overlook President Recep Tayyip Erdoğan’s attacks on democratic ins", "summary_en": "Few countries better illustrate the difficult trade-off between democratic principles and strategic necessity than Turkey. As the country’s geopolitical and economic importance grows, NATO allies are becoming increasingly willing to overlook President Recep Tayyip Erdoğan’s attacks on democratic ins", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/turkey-and-the-limits-of-western-democratic-idealism-by-anne-o-krueger-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The West’s Turkey Dilemma\n                        Few countries better illustrate the difficult trade-off between democratic principles and strategic necessity than Turkey. As the country’s geopolitical and economic importance grows, NATO allies are becoming increasingly willing to overlook President Recep Tayyip Erdoğan’s attacks on democratic institutions.\n                    \n                        WASHINGTON, DC—The rapid rise of China, Russia’s invasion of Ukraine, and the US-Israeli war with Iran have made geopolitical rivalry the main force shaping the global economy. President Donald Trump’s reversal of long-established US policies has compounded that uncertainty, forcing governments and businesses alike to navigate an increasingly complex strategic landscape.\n        https://prosyn.org/uI6bnt9", "translation_ja": "", "vocab": []}, {"title_ja": "How the Tech Lords Hacked the Firm", "title_en": "How the Tech Lords Hacked the Firm", "summary_ja": "A handful of tech oligarchs have figured out how to tap public markets without submitting to shareholder oversight. The recent SpaceX IPO represents the culmination of this process, granting Elon Musk near-total authority and revealing how thoroughly the mechanisms meant to hold corporate leaders ac", "summary_en": "A handful of tech oligarchs have figured out how to tap public markets without submitting to shareholder oversight. The recent SpaceX IPO represents the culmination of this process, granting Elon Musk near-total authority and revealing how thoroughly the mechanisms meant to hold corporate leaders ac", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/onpoint/elon-musk-and-the-rise-of-the-unaccountable-ceo-by-quinn-slobodian-2026-07", "state_media": false, "category": "オピニオン", "full_text": "OnPoint Subscriber Exclusive\nAvailable exclusively to PS subscribers, PS Deep Dives newsletter delivers a weekly expert commentary examining a critical facet of a major global challenge. Each collection runs for several weeks, allowing readers to step back from the daily churn of headlines and gain a deeper understanding of the forces driving the news.\nHow the Tech Lords Hacked the Firm\nA handful of tech oligarchs have figured out how to tap public markets without submitting to shareholder oversight. The recent SpaceX IPO represents the culmination of this process, granting Elon Musk near-total authority and revealing how thoroughly the mechanisms meant to hold corporate leaders accountable have been weakened.\nCAMBRIDGE—One of the most impressive feats of the current generation of tech oligarchs is that they have hacked not just computers or software, but the institutional form of the 20th-century firm itself.", "translation_ja": "", "vocab": []}, {"title_ja": "Surviving extreme heat increasingly boils down to this: access to air conditioning | Mark Wolfe", "title_en": "Surviving extreme heat increasingly boils down to this: access to air conditioning | Mark Wolfe", "summary_ja": "The next great climate divide will be between countries that have the resources to adapt and those that don’t This summer, much of the media’s attention has focused on record temperatures across Europe and the United States. Television coverage has been filled with familiar images: heat maps shaded ", "summary_en": "The next great climate divide will be between countries that have the resources to adapt and those that don’t This summer, much of the media’s attention has focused on record temperatures across Europe and the United States. Television coverage has been filled with familiar images: heat maps shaded ", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/15/air-conditioning-access-extreme-heat", "state_media": false, "category": "オピニオン", "full_text": "This summer, much of the media’s attention has focused on record temperatures across Europe and the United States. Television coverage has been filled with familiar images: heat maps shaded deep red, schools closing, rail lines slowing, wildfires spreading and emergency rooms treating growing numbers of people with heat-related illnesses.\nPublic officials have responded with equally familiar advice: stay indoors, drink plenty of water and, if possible, turn on the air conditioning.\nAcross the world, summer heat could now be deadly unless you can buy your way out. In the United States and Europe, millions of households already struggle to pay their electric bills, and rising temperatures mean they will need to use even more electricity simply to stay safe.\nMeanwhile, in much of the global south, we could see human catastrophes as dangerous heat collides with unreliable electricity, overcrowded housing, limited access to air conditioning, weak public health systems and widespread poverty.\nIn both cases, inequality, within countries and among them, could decide the fate of millions. We know the solutions: help lower-income families afford cooling, invest in resilient infrastructure, and lean into less-costly, more stable clean technologies. The question is whether we have the will.\nExtreme heat is the most deadly form of weather. It kills about 2,000 people a year in the US, and Europe’s heat dome killed more than 1,300 people in less than two weeks this June. Low-income energy assistance to help families pay their home energy bills is a core solution in the US. That is because most households have electricity and cooling systems.\nIn much of the global south, the challenge is fundamentally different. During a recent visit to India, I came away with the impression that government officials understood exactly what needed to be done.\nThey talked about expanding electricity systems, improving housing, increasing access to efficient cooling, strengthening public health planning and protecting vulnerable populations. Their challenge was not a lack of ideas. It was a lack of resources.\nThe Lancet estimated that hundreds of thousands of people already die from heat each year, and the burden is expected to grow most rapidly in south Asia and Africa. The United Nations has warned that extreme heat is widening inequality, slowing economic development and taking a growing human toll. The people facing the greatest risks are often those who have contributed least to global greenhouse gas emissions.\nThe solution is not simply for western countries to ship millions of air conditioners to developing countries. In many of these places, the electric grid could not support them even if every family could afford one.\nThe west should help countries in the global south invest in cheaper, more stable forms of clean and secure energy to build the infrastructure needed to live safely in a warmer climate. Low-income countries cannot build this infrastructure on their own.\nDevelopment banks, international climate funds, private investors and wealthier nations will all need to become partners in financing the next generation of climate adaptation. This should not be viewed as traditional foreign aid. It is an investment in global health, economic stability and human resilience.\nNone of this suggests that wealthy countries have solved their own cooling challenges. They have not. Millions of American and European households struggle every summer with rising electricity bills, and too many families still have to choose between paying the electric bill and keeping their home safe during periods of extreme heat.\nFunding for the primary US program that helps families pay their home energy bills is only sufficient to help about one out of six eligible families. But we have the economic capacity to address that shortfall. Whether we do so is largely a question of political priorities.\nHelping lower-income countries build reliable electricity systems is not simply a humanitarian obligation. It is also a strategic investment. If the United States and Europe fail to become meaningful partners in financing climate adaptation, other countries will fill that vacuum, expanding both their economic influence and their geopolitical ties across much of the developing world.\nClimate policy has long been measured by how much carbon the world can avoid emitting. That will always matter. But over the coming decades, it may also be judged by whether the world’s wealthiest countries were willing to help billions of people in the global south adapt to a hotter planet.\nIn the United States and Europe, access to affordable cooling is increasingly a question of political priorities. In much of the global south, it is a question of resources and, increasingly, survival.\nThe next phase of the climate debate has to be about more than reducing emissions. It also has to be about helping people survive the climate we have already created by investing in reliable electrici", "translation_ja": "", "vocab": []}, {"title_ja": "The Mitch McConnell mystery is solved. But it doesn’t look good for America | Moira Donegan", "title_en": "The Mitch McConnell mystery is solved. But it doesn’t look good for America | Moira Donegan", "summary_ja": "The senator is alive, a key requirement to maintain one’s job in the US Senate Like any good proof-of-life photo, it featured that day’s newspaper. After a nearly month-long disappearance, when it was clear that he had been rushed to the hospital but not clear why or in what condition, Mitch McConne", "summary_en": "The senator is alive, a key requirement to maintain one’s job in the US Senate Like any good proof-of-life photo, it featured that day’s newspaper. After a nearly month-long disappearance, when it was clear that he had been rushed to the hospital but not clear why or in what condition, Mitch McConne", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/15/mitch-mcconnell-hospital-photo-silence", "state_media": false, "category": "オピニオン", "full_text": "Like any good proof-of-life photo, it featured that day’s newspaper. After a nearly month-long disappearance, when it was clear that he had been rushed to the hospital but not clear why or in what condition, Mitch McConnell broke his silence, as they say in the tabloids, by releasing a photograph of himself sitting upright in a hospital bed. He wore a pink button-up shirt, and his vacant, lipless mouth seemed to form something meant to resemble a smile. Beside him was his wife, the comparatively pert former Trump transportation secretary Elaine Chao, her coiffed hair as stiff as the couple’s determination. In a statement, McConnell said that he had been hospitalized after a fall, and was being treated for pneumonia.\nThe picture was meant to put an end to the rampant speculation over whether the senator, aged 84, was dead or not. You would think this would be a simple enough question to answer. If the man himself wasn’t available to clear up the matter, couldn’t someone have held two fingers to the inside of his wrist to check for a pulse, or propped a hand mirror under his nose to see if it fogged? No such luck, apparently. The Kentucky senator was missing for weeks, with no word, his office only releasing vague and repetitive acknowledgments that he had been hospitalized. Public emergency services records indicate that paramedics were called to his Washington address on 14 June, where they administered CPR on an unconscious person who was allegedly suffering a cardiac arrest – one whose identity has been withheld. McConnell had been in a Washington DC area hospital ever since.\nRumors swirled, especially on the Republican side of social media. As McConnell’s office refused to confirm that the senator was awake, the far-right conspiracist influencer and Trump adviser Laura Loomer took it upon herself to speculate, without proof, that McConnell was in a “vegetative state” and “brain dead”.\nThis seems to have sparked something of a panic. Soon after, Republicans who once worked for McConnell on his leadership team made statements claiming that they had spoken to the senator – though they declined to provide proof, or to have him speak for himself. Suffice it to say, this proved unconvincing to many observers. Last week, Kentucky’s Democratic governor, Andy Beshear, published a letter addressed to McConnell, calling on the disappeared elderly senator to release more information about his health. “Kentuckians have grown increasingly concerned about the current state of your health and well-being, and ability to hold office,” he wrote.\nOne almost has to feel gratitude to Lindsey Graham, the South Carolina senator, who had the decency to die out in the open, without inflicting a mystery on the public. In McConnell’s case, the circumstances bordered on absurd. Think of it as Schroedinger’s Republican senator: for a while, sealed in his box of secrecy, the former Senate majority leader was both alive and dead.\nNow that mystery has been resolved. But the episode reflects a grim reality of US politics: both that many of our elected leaders are far past the age of their greatest competence and stamina, and also that they are so completely insulated from the consequences of public opinion that they face no risks for staying in jobs that they’re no longer capable of doing. In other words: many American leaders are so old that it is plausible that they could drop dead at any moment, and so unaccountable that it’s not clear anyone would bother to tell us if they did.\nThink, for a moment, of the peculiarities of Mitch McConnell’s job, which he has now occupied for 41 years. He is among the most powerful men in the country; his actions affect the lives of thousands of people he will never meet; without him, those decisions go unmade, or are made by someone who was not elected. He represents Kentucky’s 4.5 million people and is supposed to be one of their voices in the Senate; without him and his colleague Rand Paul, they have no representation. If you’re anything like me, your own job probably involves much less privilege and much less power, and you spend your days doing things that might be more honorable but are undoubtedly of less consequence. Now ask yourself: could you, with your lesser powers and lesser responsibilities, simply disappear from your job for four weeks without notice or explanation? And when you re-emerged from this abandonment, do you think you could claim that you are entitled to remain in that job, even if you can’t perform it, by the simple virtue of being technically alive?\nThe entitlement is staggering, and so is the reality that McConnell is not even the worst example of what is a thoroughly bipartisan phenomenon. A weak and senescent Dianne Feinstein was wheeled around the Senate in a morbid theater that seemed to border on elder abuse. Joe Biden was so addled and confused in his 2024 debate against Donald Trump that the long-denied reality of his decline finally forced the party to switch out hi", "translation_ja": "", "vocab": []}, {"title_ja": "The World Cup of Calvinball: Fifa’s hasty changes turn refereeing into a free-for-all | Beau Dure", "title_en": "The World Cup of Calvinball: Fifa’s hasty changes turn refereeing into a free-for-all | Beau Dure", "summary_ja": "Match officials are enforcing tweaks to the laws of the game that have hardly been tested. The results? Drama, ‘mistaken identities’ and lots of confusion In the comic strip Calvin and Hobbes, the titular characters occasionally played a game known as Calvinball . The rules were amorphous. At any mo", "summary_en": "Match officials are enforcing tweaks to the laws of the game that have hardly been tested. The results? Drama, ‘mistaken identities’ and lots of confusion In the comic strip Calvin and Hobbes, the titular characters occasionally played a game known as Calvinball . The rules were amorphous. At any mo", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/football/2026/jul/15/world-cup-refereeing-var", "state_media": false, "category": "オピニオン", "full_text": "In the comic strip Calvin and Hobbes, the titular characters occasionally played a game known as Calvinball.\nThe rules were amorphous. At any moment, something like a “30-yard base wicket” may become part of the game. Determining a “winner” was besides the point, as the score for one game was given as “Q to 12.” The fictional, farcical sport entered public consciousness and was even cited by US supreme court justice Ketanji Brown Jackson in a blistering dissent last year.\nIn the first decade or so of Major League Soccer’s existence, Calvinball became a term of derision as the league struggled early with player acquisition and allocation. Salary-cap rules were stringent, except when they weren’t. If, for example, colorful Mexico goalkeeper/forward Jorge Campos wanted to have a Ferrari while he was in Los Angeles, the league could somehow accommodate him. Teen phenom Freddy Adu went into the draft – but with his family insisting that he play for nearby DC United, the league made sure that was where he landed.\nWorld Cups – even those that don’t include an unexpected application of Fifa regulations to rescind a red card ban given to a host country’s star forward, or a Cablegate – often have a whiff of Calvinball. Some incidents are simply byproducts of bringing together so many teams and referees, then sorting out the small details of interpretations and practices that evolve differently in different parts of the world. What may seem an obvious foul to Europeans may elicit a shrug from a referee from elsewhere, and vice versa.\nBut Fifa doesn’t help itself by insisting that the annual changes to the laws of the game should be applied at the World Cup, not after it. Fifa isn’t in full control of the laws – it has half the vote at the International Football Association Board – but it has leeway over when to apply the changes. This year, the laws officially changed on 1 July, but in Ifab’s words, “competitions starting before that date may implement the changes earlier or delay their implementation until no later than the start of the next competition”. The tournament we call the World Cup is technically the final playdown of a tournament that runs all the way back to the beginning of qualification, and that started before 1 July, so there’s no reason why Fifa needs to get its referees to enforce laws that have hardly been tested in any widely broadcast competition.\nSome years, those changes are simple. In 2022, the concept of having five substitutions instead of three was easy to understand. Goalline technology, tested in various competitions before the 2014 World Cup, wasn’t difficult to grasp.\nBut for many viewers, some World Cups are the first glimpses of changes that are truly groundbreaking. VAR first appeared in the 2018 World Cup, well before its implementation in top European competitions. And many changes may seem like minutiae at first glance – until they have dramatic impact on the game.\nAsk Paraguay’s Miguel Almirón. In his team’s opener against the USA, he tumbled to the ground while running alongside defender Tim Ream, and referee Danny Makkelie booked Ream. Until recently, ordinary fouls and yellow cards weren’t subject to review. But in the revised laws, the “mistaken identity” clause has been rewritten to include “when a player is shown a yellow/red card but the offence for which the card was shown was committed by another player of either team”. Replays showed Almirón had fooled the referee with a well-executed flop, so Ream’s yellow was wiped clear and Almirón was booked for simulation. (In the quarter-finals, Switzerland’s Breel Embolo became the next victim of the check. His case was even more impactful on the game: the yellow card, initially awarded to Argentina’s Leandro Paredes and then reversed, was his second, and Embolo’s sending-off left the Swiss with 10 men in a 1-1 match they would lose in extra time.)\nThe “mistaken identity” change was in an Ifab circular summing up actions from the annual meeting held 28 February. Two months later, Ifab held a special meeting and approved a second batch of changes,. Among them was a new sending-off offense: “covering their mouth when communicating with an opponent in a provocative, derisory or inflammatory manner or situation”. Perhaps Almirón wasn’t up to speed, because that’s exactly what he did in Paraguay’s second game, and he was duly sent off, prompting a costly rant from a Paraguayan commentator.\nIn other situations, recent changes have left a lot of room for confused interpretation. A player being substituted must be off the field within 10 seconds of “being shown or, where there is no board, of the referee’s signal for the substitution to take place, except where this is not possible due to safety/security or injury”. That opens the door for players to decide on the spot that they have a nagging calf injury and will have to limp off, then complain if the referee doesn’t buy it.\nUnder the current laws, the referee is charged with allowing p", "translation_ja": "", "vocab": []}, {"title_ja": "China Is Sabotaging the World That Enables Its Rise", "title_en": "China Is Sabotaging the World That Enables Its Rise", "summary_ja": "Beijing’s risky bet against the West.", "summary_en": "Beijing’s risky bet against the West.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/china/china-sabotaging-world-enables-its-rise", "state_media": false, "category": "オピニオン", "full_text": "Following the back-to-back state visits to China in May by U.S. President Donald Trump and Russian President Vladimir Putin, many U.S. and European commentators noted that the summit meetings yielded little of real substance. But from a Chinese perspective, that didn’t matter. What mattered were the visuals, broadcast in the Chinese state media: like the emperors of old, Chinese leader Xi Jinping was receiving tribute missions from the most important foreign potentates. In symbolic terms, the visits reinforced Beijing’s narrative that China has overtaken its rivals and is once again at the center of the world.\nUnderlying this triumphant vision is the Chinese claim that where the Soviets mismanaged socialism and the Americans corrupted capitalism, only China has discovered the formula capable of reconciling state authority with market dynamism and restoring international harmony. But this nationalist story risks obscuring a fundamental historical reality: China’s rise has not happened outside the systems its rivals built, but through Beijing’s skillful exploitation of them. In its early decades, Communist China relied on the Soviet Union to help construct its foundations. And ever since Deng Xiaoping’s “reform and opening” policies connected China to the world economy in the late 1970s, China has used its access to Western markets to forge itself into an economic and military superpower.\nYet Beijing seems strikingly unaware that its continued success depends on the U.S.-led order. In recent years, Beijing has consolidated its control over supply chains and acquired unprecedented leverage over its trade partners. It has also become increasingly brazen in its bid for industrial dominance, brushing off complaints in Europe and the United States that its overproduction is undermining their industries. For example, at the World Economic Forum session in Dalian in June, instead of acknowledging that China relies on the willingness of (mainly Western) countries to continue absorbing the Chinese surplus, Chinese Premier Li Qiang asserted that China is simply more competitive because it invests in innovation. Beijing’s failure to acknowledge, let alone address, its overcapacity problem has driven China’s key trading partners—all of them major Western economies—to the point of exasperation.\nFor now, it may seem that China has the upper hand, having secured a dominant position in a number of key global industries and supply chains. European countries in particular have been weakened by Chinese competition, and the failure of the EU to muster a unified strategy toward Beijing risks eroding its internal economic, and even political, cohesion. But the long-term outcome may be very different from what China’s leaders assume. Growing frustration with China is already prompting the United States and Europe to take stringent countermeasures to protect their industries. Beijing is thus overlooking the defining paradox of its own success: China’s rise remains tied to the openness of the economies it hopes to surpass. Its road to a post-Western order still runs through the West.\nASCENDANCE DEPENDENCE\nA great power’s ambitions are reflected in the way it perceives its place within the world. Since the founding of the People’s Republic of China in 1949, China’s strategic ambition has been to restore the country to what its leaders regard as its rightful place at the center of the international order. In this worldview, Western hegemony represents the principal obstacle to the return of Chinese civilization to its natural centrality and, with it, to the restoration of global harmony.\nYet Beijing did not pursue this objective by rejecting existing international orders outright. Instead, it first exploited them to accelerate China’s rise and then progressively challenged them from within as its own power expanded. Both the Soviet- and the U.S.-led orders were treated as a means to an end and used pragmatically and selectively to maximize political and economic gains even while preserving and widening China’s space for maneuver.\nNowhere has this strategy been more evident than in China’s participation in the Western liberal order. Deng’s “reform and opening” entailed a pragmatic decision to exploit the liberal order for China’s benefit. From the 1990s onward, however, even as Beijing deepened its integration with the world economy, Chinese leaders increasingly came to view American primacy as the principal long-term obstacle to China’s national rejuvenation. They feared that sustained engagement with the West could encourage political liberalization and ultimately undermine the Chinese Communist Party’s monopoly on power.\nBeijing therefore embraced a dual strategy: exploiting the openness of the existing order while gradually eroding its foundation. Under Xi, this tendency became even more explicit. Take the Belt and Road Initiative, the enormous international economic development and infrastructure program launched by Beijing in 2013", "translation_ja": "", "vocab": []}, {"title_ja": "The World Is Giving Up on America", "title_en": "The World Is Giving Up on America", "summary_ja": "This time anti-Americanism is different.", "summary_en": "This time anti-Americanism is different.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/world-giving-america", "state_media": false, "category": "オピニオン", "full_text": "Through much of the first quarter of the twenty-first century, as the United States’ popularity around the world has ebbed and flowed, the country has been able to fall back on a baseline of international support established in the previous century. There have been moments when the United States’ global image declined substantially, such as during the unpopular military interventions of President George W. Bush and the dramatic retrenchment from international engagement of President Donald Trump’s first term. But each time, the country’s reserves of soft power and its long-standing international reputation sustained it, and its foreign approval ratings eventually bounced back.\nSince Trump’s return to office in January 2025, however, cracks are beginning to emerge in those foundations. His trade and immigration policies and his use of U.S. military power have yielded a wave of international disapproval that in its nature and depth has few recent historical parallels. A new Pew Research Center survey of public opinion has found that in many of the 36 countries surveyed, attitudes toward the United States are the most negative they have been since Pew began tracking them in 2002.\nOrdinary citizens are now critical of Trump in ways they were not during his first administration. As was the case during his first term, they believe Trump is breaking with the United States’ history of international engagement and leadership. But much of the world now also believes that Trump’s use of the United States’ substantial hard power is threatening global stability in ways that were not apparent during the first administration. Moreover, during previous ebbs, people in other countries have not tended to question the basic values promoted by the United States, even if they strongly disagreed with specific policies. By contrast, today, the world has grown increasingly pessimistic about the state of American democracy itself. In less than two years of Trump’s second presidency, a growing number of non-Americans have come to believe that the U.S. government does not respect the individual liberties of its own people.\nAs a result, much of the world is losing faith in the United States’ ability to serve as the leader of a liberal international order. And these new reservations, deeper than those of the past, may prove hard to reverse.\nLAND OF THE LESS FREE\nThe worsening health of democracy has become a problem in countries around the world. According to Freedom House’s annual assessment, the average level of global freedom across more than 200 countries and territories has decreased for 20 consecutive years. The decline has been especially steep in the United States. Earlier this year, the research institute V-Dem downgraded the country from a “liberal democracy” to an “electoral democracy,” stating that “democracy in the USA has fallen back to the same level as in 1965,” the year of the Voting Rights Act’s passage.\nAcross the 36 nations surveyed by Pew this year, a minority of respondents said they believed the U.S. government respects the personal freedoms of its people, while a clear majority said it does not. The share of respondents who say the United States respects personal freedoms has dropped by double digits in 12 of 13 countries where Pew also asked this question in 2021, at the start of President Joe Biden’s term. The decline has been particularly sharp in Europe. For instance, five years ago, 61 percent of Swedes said the United States respects individual liberty; today just 27 percent do.\nThis is a striking contrast with the findings of previous surveys. During past moments when anti-American sentiment ran high, people in many foreign countries still thought well of the United States’ commitment to protecting the freedoms of its citizens. In 2008, the last year of Bush’s second term, the United States received mostly positive marks: in 20 of the 23 countries polled, majorities or pluralities said the country respected personal freedoms. Today, by contrast, the share of the public who hold this view has plummeted to all-time lows in 15 countries that Pew has surveyed regularly over the years, including countries that enjoy close relationships with Washington such as Australia, Italy, the Netherlands, Poland, and South Korea.\nMORE FEARED THAN LOVED\nThe dramatic decline in international opinion of America’s democratic commitment would seem to echo international disapproval of specific U.S. policies of the past—declines that were largely temporary and eventually rebounded. After all, during Trump’s first term, foreign publics largely disapproved of what they saw as the United States’ retreat from its previous role as leader of the global order. They were critical of Trump’s decision to withdraw the United States from multilateral treaties and trade pacts. And they opposed the administration’s policies of putting up barriers, whether in the form of restrictive immigration policies or in the form of a wall on the U.S.-Mex", "translation_ja": "", "vocab": []}, {"title_ja": "Putin Will Turn a Cease-Fire Into a Weapon", "title_en": "Putin Will Turn a Cease-Fire Into a Weapon", "summary_ja": "A new use for Russia’s old playbook in Ukraine.", "summary_en": "A new use for Russia’s old playbook in Ukraine.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/russia/putin-will-turn-cease-fire-weapon", "state_media": false, "category": "オピニオン", "full_text": "To recall the last negotiated peace with Russia is to tell a depressing tale. Russia invaded Ukraine in March 2014, annexing Crimea and then moving regular and irregular forces into the Donbas, in the country’s east. After months of war and intense interference in domestic Ukrainian affairs, Moscow signed a series of cease-fire agreements in the Belarusian capital of Minsk in September 2014 and February 2015. Russia retained and militarized the territory it had taken in Ukraine. The Minsk agreements did not solve any core problems, but Europe and the United States were able to live with them—until February 2022, when Russia launched its full-scale invasion of Ukraine.\nThe Minsk process reveals how Putin has often mixed conventional diplomacy with thuggery. Although he has assembled a formidable war machine, Putin aspires to the role of European statesman, as Joseph Stalin did before him and as various Russian tsars did before the 1917 Bolshevik Revolution. Putin sees diplomacy as war by other means, and he used past negotiations over Ukraine to distract and to keep European countries off balance. He hoped to foment political breakdown in Kyiv, a loss of interest on Europe’s part, and a transatlantic relationship sundered by populism. When the desired results of the Minsk agreements did not materialize, Putin once again resorted to war.\nWere Putin to eventually consent to a full or partial cease-fire, his strategy would likely be similar to what it was a decade ago. So far, the Russian leader has stubbornly refused to stop fighting until Ukraine makes substantial concessions: he has insisted that Russia seeks a comprehensive settlement and not a mere suspension of hostilities. But if Putin does agree to a truce, he will approach it as a roundabout way of reaching war aims that cannot be achieved on the battlefield. He would exploit an incomplete peace to incite political instability in Ukraine and prod pro-Russian factions in Europe into advocating business as usual with Moscow. He would hope that by allowing U.S. President Donald Trump to take credit for the cease-fire, he could widen the fissures between the United States and Europe. If Putin found the consequences of his overture disappointing, he could return to battle at any moment, having risked only the breather a cease-fire might afford Ukraine. U.S. and European officials should proceed with great caution in the laudable aim of war termination. A mere halt to the fighting in Ukraine would have little chance of ending the broader conflict. Barring a fundamental change in Putin’s calculus, it may just mark a transition to the next phase of the war.\nDEAD END\nRussia’s political project for Ukraine has failed spectacularly. The Kremlin never mounted the coercive power necessary to transform Ukraine into a vassal, which would have required a complete takeover and long-term occupation. In 2022, Russia invaded a large country—one with a population of over 35 million—with a mere 150,000 soldiers. Its intent at the time was to expose the Ukrainian government as feeble and illegitimate, inspire uprisings among pro-Russian constituencies, and compel the rest of Ukraine to accept a government friendly to Moscow. Four years of brutal war have done the opposite, ensuring a Ukraine hostile to Russia for years, if not generations, to come. Having expended massive amounts of manpower and materiel, Putin has no clear path to military victory. After all his effort, he has maneuvered himself into a dead end.\nTo rescue his fortunes, Putin has options for escalation, although each comes with severe limitations and risks. He could take advantage of Russia’s huge population (some 143 million people) by ordering a major mobilization. But judging by the exodus of Russians amid the partial mobilization in the fall of 2022, such a call-up would be deeply unpopular, especially in Russia’s large cities. Putin, the history buff, cannot have forgotten that a war-weary population egged on by angry soldiers toppled the tsarist government in February 1917. With his own eyes, Putin saw how an unwon war in Afghanistan weakened the Soviet Union in the late 1980s, even if he has sponsored an official rewriting of this war as a heroic venture. In short, Putin cannot ignore the domestic political constraints that stand between him and the waging of a total war.\nThe Russian president could try to bomb Ukraine into surrender. Exploiting Ukraine’s shortages of Patriot interceptor munitions, Russia could further increase its ballistic missile attacks on Ukrainian cities in the coming months and into the winter. Inflicting mass misery to gain the upper hand is a risky bet. It could harden Ukrainians in their resistance to Russia, as it did after Russian soldiers committed countless war crimes in the first few weeks of the 2022 invasion. The same goes for the use of nuclear weapons in Ukraine, which would antagonize China and India, countries that have thrown Russia an economic lifeline. Putin co", "translation_ja": "", "vocab": []}];

"中国国営メディアとして、米国金融機関の動向を無視し、自国市場の成長と魅力を積極的に発信する国益優先の報道姿勢が鮮明である。", "state_media": true}]};
let curCat = "全て";

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function buildFocusHtml(){
  if(!FOCUS)return"";
  const cards=FOCUS.coverages.map(c=>{
    const sc=c.state_media?" state-media":"";
    const sb=c.state_media?` <span style="color:var(--danger);font-size:.65rem">[国営]</span>`:"";
    return `<div class="cov-card${sc}"><div class="cov-header"><span class="cov-region">${esc(c.region)}</span><span class="cov-name">${esc(c.name)}${sb}</span></div><div class="cov-summary">${esc(c.summary_ja)}</div><div class="cov-perspective">${esc(c.perspective_ja)}</div><a class="cov-link" href="${esc(c.link)}" target="_blank" rel="noopener">元記事 →</a></div>`;
  }).join("");
  return `<div class="focus-section"><div class="focus-label">&#127919; 今日の焦点 — 5社の報道比較</div><div class="focus-topic">${esc(FOCUS.topic_ja)}</div><div class="focus-analysis">${esc(FOCUS.analysis_ja)}</div><div class="cov-list">${cards}</div></div>`;
}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  let html=(curCat==="政治"||curCat==="社会")?buildFocusHtml():"";
  if(!arts.length){el.innerHTML=html+'<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  html+=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
  el.innerHTML=html;
}

function setCat(cat){
  curCat=cat;
  history.pushState({view:"list",cat:cat},"","?tab="+encodeURIComponent(cat));
  renderTabs();renderList();
  document.getElementById("list-view").style.display="block";
  document.getElementById("detail-view").style.display="none";
  window.scrollTo(0,0);
}

function showDetailInternal(idx){
  const a=filteredArts()[idx];
  if(!a)return;
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function showDetail(idx){
  history.pushState({view:"detail",cat:curCat,idx:idx},"","?tab="+encodeURIComponent(curCat)+"&art="+idx);
  showDetailInternal(idx);
}

function backToList(){history.back();}

window.addEventListener("popstate",function(e){
  const s=e.state||{view:"list",cat:"全て"};
  curCat=s.cat||"全て";
  renderTabs();
  if(s.view==="detail"){
    showDetailInternal(s.idx);
  }else{
    renderList();
    document.getElementById("list-view").style.display="block";
    document.getElementById("detail-view").style.display="none";
    window.scrollTo(0,0);
  }
});

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}

(function init(){
  const p=new URLSearchParams(location.search);
  const tab=p.get("tab")||"全て";
  curCat=tab;
  history.replaceState({view:"list",cat:tab},"",location.href);
  document.getElementById("footer").textContent="Generated 2026-07-15 15:01 JST";
  renderTabs();renderList();
})();
</script>
</body>
</html>
