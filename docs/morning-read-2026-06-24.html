": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiwgFBVV95cUxORmdjb1p0RTZETDI1XzhnSjJpTnpRSkJuSENLLU5ZQmQ2emZ5QjVLZWhxdS1MQXFIZUk4OVdITVpPdjAxS1E5eUxCWTFIX2NrVEtOUjFmek5NM1REUWR0LUl3ZW83VFhCYlFyTER3ZnlfVEVLYldpWGk2UXQ1Z0h0ekhPalFoTS1yLVB0cjgwOFF1OEdYcDhXVk0xSmJXQ05XM3NKOUZ5Mlo1UkpTaDJjYjExMC1xZ25hTW1BbmNfdS1rUQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "NATO「トランプ懐柔役」、来月の首脳会議前にホワイトハウスを訪問", "title_en": "NATO's 'Trump Whisperer' Visits White House Ahead of Alliance Summit", "summary_ja": "トランプ大統領との関係調整に長けたNATOの高官が、来月開催されるNATO首脳会議を前に緊張緩和を図るためホワイトハウスを訪問した。この訪問は、トランプ氏に同盟の重要性を改めて伝え、首脳会議での混乱を防ぐことを目的としている。トランプ氏の NATO に対するコミットメントへの懸念が依然として残る中、同盟側が積極的な外交的働きかけを行っている形だ。", "summary_en": "A senior NATO official known for his ability to manage relations with President Trump is visiting the White House to ease tensions before next month's NATO summit. The visit aims to reassure Trump of the alliance's value and prevent potential disruptions at the upcoming gathering of member nations. The diplomatic outreach reflects ongoing concerns about Trump's commitment to NATO and his unpredictable stance toward the transatlantic alliance.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMijwFBVV95cUxNWndwOG5wU1FsNDQ4c1pHVkNObzE4Q1Q3dk02c2R6V2dQNS1nVnowLVBhcXVEREFkc0tSUXNxcTdCRlFRQkNwT3ZTVk1iaEtfRVdXaFdrY0s0QmZmQWI4M1Q0SmN6eFFFb19kQ2hoVy1Xd1d4VlJSY2FfaVRYeVoyNzAzTVpvQzBWU1VldjI5OA?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "AI株急落、投資家の利益確定か不安の表れか議論に", "title_en": "AI Stock Slump Sparks Debate: Profit-Taking or Growing Investor Anxiety?", "summary_ja": "AI関連株が大幅に下落し、投資家が単に利益を確定しているのか、それともセクター全体への深刻な懸念を示しているのかについて議論が広がっている。この売りは市場を揺るがし、AIへの投資ブームの持続可能性に疑問を投げかけている。アナリストの間では、これが健全な調整なのか、AI株からの本格的な撤退の始まりなのかで意見が分かれている。", "summary_en": "AI-related stocks have experienced a notable slump, prompting questions about whether investors are simply cashing in gains or signaling deeper concerns about the sector. The selloff has rattled markets and put the sustainability of the AI investment boom under scrutiny. Analysts are divided on whether this represents a healthy correction or the beginning of a broader retreat from AI stocks.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMijwFBVV95cUxPc0hsaTJHSzN3R1pMUkVGZUZncFczQjZMaHh6RzNzS3BFYWs4ZDQ2b3IzcDE2TXo4LVdReE9QSkNMLXY0eDJBR3RGUzZ0Z2ltUTZLUDdKd2ZsaERzVnZFcXlod1hrVTU1V3VQUngtam9CX0FoWWZOUTVtUlVRakhvcEw4Ti1vQ3ZjbmRsak95MA?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "記録的熱波がピークを迎えるフランスで大規模停電発生", "title_en": "Power Outages Strike France as Record-Breaking Heatwave Reaches Peak", "summary_ja": "フランスで記録的な熱波がピークに達し、ブルターニュ地方の約6万8000世帯が停電の影響を受けている。国内の半数以上の地域に赤色の熱波警報が発令され、先週木曜日以降、熱波に関連した水難事故で少なくとも40人が死亡した。猛暑はヨーロッパ全域に広がっており、英国、オランダ、ベルギー、ドイツ、東欧諸国でも今週中に高温が予想されている。", "summary_en": "A record-breaking heatwave is peaking across France, leaving around 68,000 homes in Brittany without power and pushing temperatures as high as 44.3C. More than half of France remains under a red heat alert, and at least 40 people have drowned in heatwave-related incidents since last Thursday. The extreme heat is spreading across western and central Europe, with high temperatures expected in the UK, Netherlands, Belgium, Germany, and eastern European countries throughout the week.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c78y4102n1zo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "議会、初めて戦争権限決議を可決―トランプ大統領のイラン政策に異議", "title_en": "Congress passes war powers measure for first time, breaking with Trump over Iran", "summary_ja": "米上院は50対48の投票でトランプ大統領にイランへの軍事行動を停止するか議会の承認を求めるよう要求する同時決議を可決し、1973年の戦争権限法制定以来、両院が初めてこうした決議を可決した。ただし、この決議は法的拘束力を持たない象徴的なものであり、大統領の署名には送付されない。トランプ氏は決議を「タイミングが悪く無意味」と批判し、ホワイトハウスは4月の停戦合意により撤退すべき敵対行為は存在しないと主張した。", "summary_en": "The US Senate approved a concurrent resolution 50-48 demanding President Trump halt military action against Iran or seek congressional approval, marking the first time both chambers have passed such a measure since the War Powers Resolution of 1973. The resolution is largely symbolic, as it does not carry the force of law and will not be sent to the president for signature. Trump dismissed the vote as 'poorly timed and meaningless,' while a White House official argued the April ceasefire means there are no active hostilities to end.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/ce8j6g3v3r4o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "国連、ホルムズ海峡に取り残された1万1千人の船員を避難へ　ルビオ氏は通行料に反対", "title_en": "UN to Evacuate 11,000 Stranded Sailors from Strait of Hormuz as Rubio Rejects Iran Toll Plans", "summary_ja": "国連の国際海事機関（IMO）は、米国・イスラエルとイランの紛争により湾岸に足止めされた1万1千人以上の船員を大規模に避難させると発表した。イランと米国、オマーンなどの沿岸国が協力して作戦を実施する予定。一方、暫定合意をめぐっては核査察の範囲やイランが主張するホルムズ海峡の通行料問題で米国とイランの対立が続いており、ルビオ国務長官は国際水路への課金は国際法違反だと明言した。", "summary_en": "The UN's International Maritime Organization has announced a large-scale evacuation of over 11,000 sailors stranded in the Gulf following the US-Israel conflict with Iran, secured through cooperation with Iran, Oman, and the US. Meanwhile, disputes persist over the interim peace deal, with the US and Iran clashing on nuclear inspection terms and Iran's proposed maritime fees for Strait of Hormuz passage. US Secretary of State Rubio, on a Gulf tour, firmly stated that charging tolls on the international waterway violates international law.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c24yr796emzo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "北朝鮮兵士が軍事境界線を越え韓国側に侵入、拘束される", "title_en": "North Korean Soldier Detained After Crossing Into South Korea", "summary_ja": "韓国軍は火曜日の夜、軍事境界線の中部区間を越えた北朝鮮兵士1名を拘束したと発表した。韓国の通信社・聯合ニュースは、この兵士が亡命を希望していたとみられると報じている。今回の越境は2026年初のケースとされ、李在明政権発足以来4例目にあたる。", "summary_en": "South Korea's military detained a North Korean soldier overnight on Tuesday after he crossed the inter-Korean border near the central section of the frontier. The soldier is believed to have wished to defect, according to South Korean news agency Yonhap. This is reported to be the first such border crossing of 2026 and only the fourth since the Lee Jae Myung administration took office last June.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/north-korean-soldier-crosses-border-to-south/a-77687834?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "ラダック地方、デリーとの対話をめぐり抗議活動　立法権と行政権の保障求める", "title_en": "Ladakh Protests Demand Credible Dialogue With Delhi Over Legislative Rights", "summary_ja": "インドのヒマラヤ地方ラダックでは、レー頂点団体とカルギル民主同盟の2つの主要政治グループの呼びかけにより、ビジネスが一斉に休業し大規模な抗議活動が行われた。両グループは、5月の会談で合意した官僚機構の管理権限や憲法上の保護に関する内容が、公式な会議録から省かれたとして中央政府を批判している。要求が受け入れられない場合、完全な州昇格と第6付則の適用を求める当初の要求に戻ると警告している。", "summary_en": "Businesses shut down across India's Himalayan region of Ladakh as two major political groups, the Leh Apex Body and Kargil Democratic Alliance, called for protests against the Union government. The groups accuse Delhi of omitting key agreements on bureaucratic authority and constitutional safeguards from official meeting minutes following talks held in May. They have warned that if their demands are not met, they will return to pushing for full statehood and Sixth Schedule status for Ladakh.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/india-news-protests-in-northern-region-ladakh-over-talks-with-delhi/live-77686712?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "中国、禁輸品の密輸容疑で日本人2人を拘束　レアアース絡みか", "title_en": "China Detains Two Japanese Nationals on Smuggling Charges Amid Rare Earth Tensions", "summary_ja": "中国当局は5月、大連市で禁輸品の密輸容疑として日本人2人を相次いで拘束した。日本メディアは、うち1件がレアアース関連製品の輸出未遂に関わる疑いがあると報じている。両国関係は高市早苗首相の台湾有事への軍事介入示唆発言以降悪化しており、中国は日本向けの鉱物輸出規制や文化交流縮小などの措置を相次いで実施している。", "summary_en": "China has detained two Japanese nationals in Dalian on suspicion of smuggling banned goods, with one case potentially involving rare earth material exports. Tokyo confirmed the detentions and pledged to protect its citizens, while Beijing urged Japan to remind its nationals to comply with Chinese law. The arrests come amid heightened Japan-China tensions over rare earths and broader diplomatic friction following Japanese PM Takaichi's comments on Taiwan.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/china-detains-two-japanese-nationals-on-smuggling-charges/a-77687365?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "経済"}, {"title_ja": "米国とイランが核協議の内容について相反する説明", "title_en": "U.S. and Iran Give Conflicting Accounts of Nuclear Talks", "summary_ja": "トランプ大統領は、イランが核施設への「最高水準」の査察に合意したと主張した。しかしイラン側の当局者はこれを否定し、核問題に関する詳細な協議は一切行われていないと述べた。双方の説明が大きく食い違っており、両国間の交渉が依然として不透明な状態にあることが浮き彫りとなっている。", "summary_en": "President Trump claimed Iran had agreed to the 'highest level' of nuclear inspections following recent diplomatic discussions. However, an Iranian official contradicted this account, stating that no detailed discussions on the nuclear issue had taken place. The diverging narratives highlight the fragile and unclear state of ongoing negotiations between the two countries.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/23/world/iran-us-trump-lebanon", "state_media": false, "category": "政治"}, {"title_ja": "スターマー首相が失敗した課題、アンディ・バーナムは克服できるか", "title_en": "Could Andy Burnham Succeed Where Starmer Failed as UK's Next Labour Leader?", "summary_ja": "英国のキア・スターマー首相の後継者として有力視されるアンディ・バーナムは、経済停滞とポピュリズムの台頭という深刻な課題をそのまま引き継ぐことになる。スターマー政権がこれらの問題の解決に苦戦する中、次期指導者にとっても前途は険しいとみられる。分断された国民が新たなリーダーに十分な時間と信頼を与えるかどうかが、今後の焦点となる。", "summary_en": "Andy Burnham is seen as a likely successor to Prime Minister Keir Starmer, who faces mounting pressure amid economic stagnation and rising populism in Britain. The incoming leader would inherit deeply entrenched national challenges that have so far resisted Starmer's attempts at resolution. The central question is whether a divided UK public would grant a new leader the patience needed to deliver meaningful change.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/23/world/europe/uk-burnham-starmer-politics.html", "state_media": false, "category": "政治"}, {"title_ja": "NATO事務総長ルッテ、予測不能なトランプ氏への対応策を携えワシントンへ", "title_en": "NATO Chief Rutte Heads to Washington to Navigate Unpredictable Trump", "summary_ja": "NATO事務総長マルク・ルッテは、予測不能なトランプ政権との関係を管理するためワシントンを訪問する。ルッテの外交スタイルは同盟の結束維持を目指すものだが、NATOの団結を彼に依存する欧州の指導者たちをしばしば苛立たせてきた。大西洋間の緊張が続く中、トランプ氏への対処法が注目されている。", "summary_en": "NATO Secretary General Mark Rutte is traveling to Washington to manage the alliance's relationship with the unpredictable Trump administration. Rutte's diplomatic style, while aimed at keeping the alliance unified, has at times frustrated European leaders who depend on him to hold NATO together. His approach to handling Trump will be closely watched as transatlantic tensions continue to simmer.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/23/world/europe/mark-rutte-nato-trump.html", "state_media": false, "category": "政治"}, {"title_ja": "人質交渉の膠着打開でパレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Ceasefire Deadlock Broken", "summary_ja": "イスラエルは、ガザ地区を二分する軍事地帯を避難民のパレスチナ人が通過することを許可し、北部への帰還が始まった。この動きは、人質解放をめぐる長期にわたる膠着状態が打開されたことを受けたものである。多くのガザ市民が、紛争中に避難を余儀なくされた地域へと徒歩で戻り始めた。", "summary_en": "Israel permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to the northern part of the enclave on foot. The movement came after a prolonged deadlock over hostage releases was resolved. Large numbers of Gazans began streaming back to areas they had been forced to flee during the conflict.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治"}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Property Sector Crisis", "summary_ja": "中国の大手不動産デベロッパーである万科（Vanke）が巨額の損失を報告し、同国の不動産危機が引き続き拡大していることが明らかになった。中国最大級のデベロッパーの一つである万科の経営難は、不動産セクター全体の低迷がさらに深まる可能性への懸念を高めている。中国政府が業界安定化のために介入するかどうかについても、注目が集まっている。", "summary_en": "Leading Chinese property developer Vanke has reported a massive financial loss, signaling that the country's real estate crisis continues to widen. The troubles at Vanke, one of China's largest developers, raise fresh concerns about the depth and spread of the property sector downturn. Observers are now questioning whether the Chinese government will intervene to stabilize the struggling industry.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会"}, {"title_ja": "解放されたイスラエル人人質、10月7日の攻撃による破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "イスラエルの医療当局者によると、ガザから解放された人質の体内には、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。一部の女性は長期間にわたり単独で拘束され、約8か月間を地下トンネルで過ごしたという。この事実は、ガザで拘束されていた人々が受けた深刻な身体的・精神的被害を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack, according to an Israeli medical official. Some of the women had been held in isolation for extended periods, spending approximately eight months confined in underground tunnels. The findings highlight the severe physical and psychological toll endured by those held captive in Gaza.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会"}, {"title_ja": "ケニアのジェンダー暴力危機に光を当てる自伝的舞台作品", "title_en": "Autobiographical Play Shines Light on Kenya's Growing Gender-Based Violence Crisis", "summary_ja": "ケニアの演劇プロデューサー、ガトニ・キムユが自身のDV被害を描いた自伝的舞台『フリー・ミー』が、ナイロビの観客に大きな反響を呼んでいる。フェミサイドやジェンダーに基づく暴力（GBV）の増加を背景に、今月数百人の女性が首都でGBVの国家危機宣言を政府に求めるデモ行進を行った。政府は2025年1月にGBVの法整備などを勧告する報告書を公表したが、具体的な対策はいまだ実施されていない。", "summary_en": "Kenyan theatre producer Gathoni Kimuyu's autobiographical play 'Free Me,' depicting her own experience of domestic abuse, has resonated strongly with Nairobi audiences amid rising femicide and gender-based violence in Kenya. Hundreds of women marched in the capital this month demanding the government declare GBV a national crisis, following a 2025 government report recommending legal reforms including codifying femicide as a distinct offence. Despite the report's recommendations, the government has yet to act, and GBV cases continue to rise.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/24/kenya-play-free-me-gender-based-violence", "state_media": false, "category": "社会"}, {"title_ja": "ケニア保健大臣、法廷侮辱の裁定受け米国エボラ隔離施設の建設中止を命令", "title_en": "Kenyan Minister Halts US Ebola Quarantine Facility Construction After Contempt Ruling", "summary_ja": "ケニアのアデン・ドゥアレ保健大臣は、裁判所の建設停止命令を無視したとして法廷侮辱に問われた後、ライキピア空軍基地における米国主導のエボラ隔離施設の建設を即時全面停止するよう命じた。同施設はコンゴ民主共和国から避難する米国市民の受け入れを目的としており、5月の発表以来、死者3人を出す抗議運動に発展している。現在流行しているブンディブギョ型エボラウイルスにはワクチンも承認済み治療薬もなく、米疾病対策センターは今回の流行が過去最大規模になる可能性があると警告している。", "summary_en": "Kenya's Health Minister Aden Duale ordered an immediate halt to construction of a US-run Ebola quarantine facility at Laikipia air base after being held in contempt of court for ignoring a previous stop-work order. The facility, intended to house US citizens evacuated from the DRC amid a growing Ebola outbreak, has sparked deadly protests, with three people killed since it was announced in May. The current outbreak involves the rare Bundibugyo strain with no vaccine or approved treatment, and the CDC warns it could become the largest Ebola outbreak on record.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/23/kenya-minister-orders-halt-us-ebola-facility", "state_media": false, "category": "政治"}, {"title_ja": "英政府、スーダン大量虐殺防止よりUAEとの関係を優先か――議会委員会で証言へ", "title_en": "UK prioritised UAE ties over preventing Sudan mass atrocities, MPs told", "summary_ja": "イェール大学の米国人人権研究者が英議会委員会で、英政府がUAEや​エチオピアとスーダンのRSF民兵との関係を示す情報を、外交・経済的配慮からUAEの圧力に屈して公表しなかったと証言する予定。英外務省(FCDO)当局者はUAEへの配慮から機密データを自ら公開できず、研究者側に代わりに公表するよう求めていたとされる。また、エル・ファシェルでの少なくとも6万人の民間人死者という推計を「政治的問題」として矮小化しようとした疑いも浮上している。", "summary_en": "A US human rights investigator from Yale University will testify to a UK parliamentary committee that the British government suppressed intelligence linking the UAE and Ethiopia to Sudan's genocidal RSF militia to protect diplomatic and economic relations. FCDO officials allegedly asked the researcher to publicly release sensitive phone data themselves because the UK could not do so due to UAE pressure. A senior FCDO official also reportedly attempted to downplay an estimated 60,000 civilian deaths in El Fasher for political reasons.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/23/uk-ties-uae-mass-atrocities-sudan-mps-select-committee-nathaniel-raymond", "state_media": false, "category": "政治"}, {"title_ja": "独裁国家が台頭する新たな和平調停の担い手", "title_en": "Autocracies Are Replacing Democracies as the World's New Conflict Mediators", "summary_ja": "権威主義体制の国々が国際的な紛争調停において存在感を高め、従来の民主主義国家に取って代わりつつある。こうした独裁国家が仲介する和平合意は、自国の政治的価値観や利益を反映したものとなりやすく、民主主義国家が関与してきた合意とは性質が大きく異なる。西側諸国の外交的影響力が低下する中、和平合意の質と持続性に対する懸念が高まっている。", "summary_en": "Authoritarian regimes are increasingly stepping into the role of international peacemakers, displacing Western democracies in conflict mediation. The deals brokered by these autocracies tend to reflect their own political values and interests, producing agreements that look markedly different from those facilitated by liberal democracies. This shift raises serious questions about the quality and durability of peace settlements in an era of declining Western diplomatic influence.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会"}, {"title_ja": "アジアの同盟国はトランプ氏と緊密な関係を維持するしかない", "title_en": "Asian Allies Have No Choice But to Embrace Donald Trump", "summary_ja": "日本をはじめとするアジア諸国は、中規模国家連合を戦略的代替手段とする構想を事実上断念しつつある。中国の台頭を抑止できるのは米国だけであるという現実認識が、その背景にある。トランプ氏の信頼性への懸念はあるものの、アジアの同盟国はワシントンとの緊密な関係を維持せざるを得ない状況に置かれている。", "summary_en": "Japan and other Asian nations are abandoning hopes of middle-power coalitions as a strategic alternative. They recognize that only the United States possesses the military and geopolitical weight necessary to deter an increasingly assertive China. Despite reservations about Trump's reliability, Asian allies are compelled to maintain close ties with Washington.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会"}, {"title_ja": "ワールドカップで勝つ方法：富裕さより移民受け入れが鍵", "title_en": "How to Win the World Cup: Wealth Helps, but Immigration Helps More", "summary_ja": "研究によると、国の経済力はサッカーの国際競争において有利に働くが、移民への開放性はワールドカップ成功のさらに強力な予測因子であることが示されている。外国生まれの選手を受け入れ、多文化的な代表チームを編成する国ほど、経済規模以上の成績を収める傾向がある。この知見は、多様性と人材の流動性がエリートスポーツにおいて決定的な要因となりうることを浮き彫りにしている。", "summary_en": "Research suggests that national wealth gives countries an advantage in international football, but openness to immigration proves to be an even stronger predictor of World Cup success. Nations that welcome foreign-born players and embrace multicultural squads tend to outperform their purely economic standing. The findings highlight how diversity and talent mobility can be decisive factors in elite sporting competition.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/10/how-to-win-the-world-cup", "state_media": false, "category": "社会"}, {"title_ja": "欧州熱波：スペインからドイツまで前例のない「レッドゾーン」が大陸を席巻", "title_en": "Europe Heatwave: Unprecedented 'Red Zone' Sweeps from Spain to Germany", "summary_ja": "記録的な熱波がヨーロッパ全土を襲い、スペインからドイツにかけて前例のない最高レベルの熱波警報が発令されている。広大な地域にわたる極端な高温は、深刻な公衆衛生上のリスクをもたらしている。各国当局は市民に対して予防措置を取るよう呼びかけており、今回の熱波はその規模と強度において歴史的に異例とされている。", "summary_en": "A severe heatwave is sweeping across Europe, triggering unprecedented red-zone heat alerts from Spain to Germany. The extreme temperatures are affecting a vast swath of the continent, raising serious public health and safety concerns. Authorities across multiple countries are urging citizens to take precautions as the heat event is described as historically unusual in its scale and intensity.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/climate-change/article/2026/06/24/heatwave-from-spain-to-germany-an-unprecedented-red-zone-sweeps-across-europe_6754827_152.html", "state_media": false, "category": "社会"}, {"title_ja": "熱波がフランスの労働者に過酷な環境を強いる――「認識されるためにベストを着続けなければならない」", "title_en": "Heatwave Forces French Workers to Endure Harsh Conditions on the Job", "summary_ja": "フランスを襲った熱波により、屋外や現場で働く労働者が厳しい環境下に置かれている。作業員たちは身元を識別させるため、猛暑の中でもノースリーブのフリースベストなどのユニフォームを着用し続けなければならない状況だ。ル・モンド紙はこの問題を取り上げ、フランス全土で労働者が熱中症リスクにさらされている実態に注目している。", "summary_en": "A heatwave in France is creating difficult working conditions for outdoor and service workers who must remain identifiable by wearing their uniforms, including sleeveless fleece vests, despite the heat. The situation highlights the challenges faced by workers who cannot simply remove their work attire for safety and visibility reasons. The report, published by Le Monde, draws attention to the broader issue of occupational heat stress affecting laborers across the country.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/economy/article/2026/06/24/heatwave-puts-french-workers-in-harsh-conditions-we-have-to-keep-our-sleeveless-fleece-vests-on-so-we-re-recognizable_6754829_19.html", "state_media": false, "category": "社会"}, {"title_ja": "アメリカ一極支配の終焉：避けられない世界秩序の変容", "title_en": "The Unavoidable Rise of a Less American World", "summary_ja": "仏紙ル・モンドは、アメリカの世界的覇権からの脱却が加速しており、政治・経済・文化的な影響力が複数の極へと再分配されつつあると論じている。この移行はもはや遠い将来の話ではなく、国際機関や同盟関係を現実に作り変えつつある過程であると指摘する。なお、ソースページへの技術的なアクセス障害により、記事の全文は取得できなかった。", "summary_en": "Le Monde examines the accelerating shift away from American global dominance, exploring how political, economic, and cultural power is redistributing across multiple poles. The article argues this transition is no longer a distant prospect but an unfolding reality reshaping international institutions and alliances. The full content was unavailable due to a technical access issue with the source page.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/24/the-unavoidable-rise-of-a-less-american-world_6754817_4.html", "state_media": false, "category": "政治"}, {"title_ja": "マムダニ支持候補がイスラエル支持議員を予備選で破る", "title_en": "Mamdani-Backed Candidates Defeat Pro-Israel Incumbents in Congressional Primaries", "summary_ja": "ニューヨーク市長ゾーラン・マムダニが支持する候補者たちが、連邦議会の予備選挙でイスラエル支持団体の後ろ盾を持つ民主党主流派議員を相次いで破る大きな勝利を収めた。この結果は、進歩派勢力が民主党内で外交政策をめぐる影響力を拡大していることを示している。既存の議員たちを挑戦者が次々と退けたことで、党内の政治的地図が大きく塗り替えられつつある。", "summary_en": "Candidates endorsed by New York City Mayor Zohran Mamdani secured significant victories in congressional primary elections, defeating establishment Democrats who had received support from pro-Israel groups. The results mark a notable shift in the Democratic Party's political landscape, with progressive challengers ousting incumbent lawmakers. The wins are seen as a reflection of growing progressive influence within the party on foreign policy issues.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/6/24/mamdani-backed-candidates-defeat-pro-israel-lawmakers-in-primaries?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "米上院、イラン戦争権限決議を可決――トランプへの異例の反発", "title_en": "US Senate Passes Iran War Powers Resolution in Rare Rebuke to Trump", "summary_ja": "米上院は50対48の投票でイラン戦争権限決議を可決し、トランプ大統領にイランへの軍事作戦を停止するか、議会の承認を得るよう求めた。共和党議員4人が党の立場を離れて賛成票を投じ、両院がこの決議を同時に可決したのは戦争権限法の歴史上初めてとなる。ただし専門家は、決議に法的拘束力はなく、政権が別の軍事権限付与の枠組みを利用する可能性があるとして、今回の決議は象徴的なものに留まると指摘している。", "summary_en": "The US Senate voted 50-48 to approve a war powers resolution directing President Trump to halt military operations against Iran or obtain congressional authorization before further action. Four Republicans broke with their party to support the measure, which passed both chambers of Congress for the first time under the War Powers Act. However, experts note the resolution is largely symbolic as it lacks the force of law and the administration may pursue alternative authorizations.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/24/us-senate-approves-iran-war-powers-resolution-what-that-means-for-trump?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "金正恩、核武装海軍の構築を宣言　新型軍艦を就役", "title_en": "North Korea Commissions Warship as Kim Vows Nuclear-Armed Navy", "summary_ja": "北朝鮮の金正恩総書記は、海軍に核兵器を装備し大型艦艇を建造する方針を表明した。この発表は西部の港湾都市・南浦で行われた5000トン級駆逐艦「チェ・ヒョン」の就役式典で行われた。金氏はさらに別の大型駆逐艦「カン・ゴン」を近く就役させ、1万トン級の「戦略艦艇」の建造も開始すると約束した。平壌はこうした海軍増強を、米韓同盟に対する抑止力と位置づけている。", "summary_en": "North Korean leader Kim Jong Un has vowed to equip his navy with nuclear weapons and construct larger warships, announcing the move at the commissioning of the 5,000-tonne destroyer Choe Hyon in Nampho. Kim pledged to soon commission another destroyer and begin building 10,000-tonne-class strategic warships, a step that would narrow the capability gap with South Korea's navy. Pyongyang frames the naval build-up as a deterrent against the United States and South Korea, describing nuclear armament of its fleet as a strategic necessity.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/gallery/2026/6/24/north-korea-commissions-warship-as-kim-eyes-nuclear-navy?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "レバノン「紛争回避セル」をめぐりイスラエル将校が警告、首相はIDF除外か", "title_en": "Israeli Officers Warn Against Lebanon Deconflicting Cell as PM Keeps IDF in Dark", "summary_ja": "イスラエルのネタニヤフ首相が、レバノンに関する新たな「紛争回避セル」の設置についてIDF（イスラエル国防軍）に情報を共有していないと報じられている。上級軍将校らはこの仕組みに強く反対し、「信頼できない」と警告を発している。この状況はイスラエルの安全保障体制内における文民・軍事間の連携と透明性に懸念を生じさせている。", "summary_en": "Israeli Prime Minister Netanyahu is reportedly keeping the IDF uninformed about a new Lebanon 'deconflicting cell' arrangement. Senior military officers have expressed strong opposition to the mechanism, warning that it 'can't be trusted.' The situation has raised concerns about civilian-military coordination and transparency within Israel's security establishment.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMipgJBVV95cUxQRkRQTlFjN19LdlhHbWg2VDRXVDloelFBSDNDLWs1UzdleU5xcnpVUURybDB5Mm1SMlpkN1E2VHpCVzhYWlIwcjJHdDNFOER3eTBnNGFIcDJMR2lpT0doOFZtZUlaWlVHY3ZpMVcyNUJRVzVLeFMzeVhHUmRNTXg5OEp0Mm45QVBsa25HNUxZOXRmcHZfRzBrZUVfUlZfQTJkNXl0RmpoeEV6VzFZZmFHOEVfVTc4QmU1MkpvS1FPUVkyTkpJVUhBekFrbWRRVTVFNzVxb0R2eHc1cm11YjFPOC10THRhdlVmd0pqbko4VGJxLVhCTkNiNkhfLXpIS3hrR3VCWERyWXJDYXM4cW11TTNfSjZqakhxd3BmWm1qcnJWWWJSWmc?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "国連調査委員会：イスラエルがガザの子どもたちをジェノサイドの一環として意図的に標的にしたと結論", "title_en": "UN Inquiry: Israel Deliberately Targeted Gaza Children in Acts of Genocide", "summary_ja": "国連の調査委員会は、イスラエルがジェノサイドの一環としてガザの子どもたちを意図的に標的にしたと結論付けた。この調査結果はイスラエルの新聞ハアレツが報じており、イスラエル軍の行動に対する国際的な批判がさらに高まっている。今回の国連報告書は、戦闘開始以来、国際機関がイスラエルに対して行った最も深刻な公式非難の一つとなった。", "summary_en": "A United Nations inquiry has concluded that Israel deliberately targeted children in Gaza as part of acts of genocide. The findings were reported by Haaretz, an Israeli newspaper, adding significant weight to international scrutiny of Israel's military conduct in the conflict. The UN report marks one of the most severe formal accusations leveled against Israel by an international body since the war began.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi6wFBVV95cUxNVW9PSS1MN0s3Y3RVNGhObXdFQUEtU1JGQWxXYTdrei1ObS1UVHBVczZaNlZwdFB6anJ2bnBCanA5TXptZXZMZ2M2bXgteHl3SWtNangxZVNYY2VIQXRlb0hoZElJQ2VnVWtXWHpyUjA5MXFoNFU0c0RBUXVVRm1tRlFKMDRCR3Z4M2dNdzBSMVlyRUxvbnJYOGR0UkszYXE3eFpkbnczdzBMZ1NxVGx1YUpnNEU0NTF4NFZ6SkxYekhFc1ZtV2M1NmlTUDU5NTZtbkludmItWGdYSjJKQUJ3YXFqVDF0SVh0TDZF?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "イスラエル国防高官、ガザ住民移送計画で緊急会議を招集", "title_en": "Top Israeli Defense Official Calls Urgent Meeting on Gazan Displacement Plan", "summary_ja": "イスラエルの国防高官が、ガザ住民を移送する計画について緊急会議を招集した。この会議は、紛争が続く中での物議を醸す住民移転戦略をめぐる内部協議の高まりを示している。計画の詳細や規模については、まだ公式には十分に明らかにされていない。", "summary_en": "A senior Israeli defense official has convened an urgent meeting to discuss a plan to displace residents of Gaza. The meeting signals growing internal deliberations over a controversial population relocation strategy amid the ongoing conflict. Details of the plan and its scope have not yet been fully disclosed publicly.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMigwJBVV95cUxNZmdROWxCYTNfNlNfYlBkTjExeS1ZS1hoSm1ybS1PMlJ4RnlfNGI2X1Uya3FjNUxEX0xuTzRvSkVHTkg3RjdsSmRQZHppYXJjc0JZUU8yQ1FSZjRXb25IUlhwSzdrWkhlNU5yUDZxN2lCOFhLU25fd3NxbTFkRlZBSWJXNHRWQ1JJOXpnalZNbUZ5QXp2UXdqYlB2clZIazZiSjZGQjUzaTEwMWRxQ0xXVHRQTTJndWQzY2xKeGRpSDJHSkc3eExlRG1KYy1JWXBwbVM4cWRrcmZxWGlLUFBGMDFTeWZnaVNhT1ZQMjBuek15Nnl6VjNIY1ZscGtXU2lZSlJ3?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "国防省ニュースレター更新 – 2026年6月24日", "title_en": "Mindef Newsletter Update – June 24, 2026", "summary_ja": "シンガポール国防省（Mindef）は、2026年6月24日水曜日にストレーツ・タイムズを通じて最新のニュースレターを配信した。このメールはニュースレター形式で送付され、正しく表示されない場合はリンクをクリックするよう案内が掲載された。読者には、追加の無料ニュースレターへの登録や既存の購読管理を行うオプションも提供されている。", "summary_en": "The Singapore Ministry of Defence (Mindef) released its latest newsletter dispatch on Wednesday, June 24, 2026, via The Straits Times. The communication was distributed as an email newsletter, with recipients directed to click a link if the email was not displayed properly. Readers were also offered options to sign up for additional free newsletters or manage their existing subscriptions.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治"}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ・ニュースレター", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "ストレーツ・タイムズがイブニング・アップデートのニュースレター版を配信した。今回提供された抜粋には具体的なニュース記事の内容は含まれておらず、主にニュースレターの書式と購読管理に関する情報のみが記載されていた。詳細な記事内容については、同紙の公式サイトで確認できる。", "summary_en": "The Straits Times published its Evening Update newsletter edition. The excerpt contains limited editorial content, primarily consisting of newsletter formatting and subscription management information. No specific news stories were available in the provided excerpt.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治"}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニング・ブリーフィングは、その日の主要ニュースを読者にお届けする毎日配信のニュースレターです。この号は2026年6月24日水曜日付けです。読者はストレーツ・タイムズのウェブサイトから購読管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a daily newsletter delivering top news highlights to subscribers. This edition is dated Wednesday, June 24, 2026. Readers can manage their subscription or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治"}, {"title_ja": "私のすべて：ノンバイナリーになるための旅", "title_en": "All of Me: A Personal Journey of Becoming Nonbinary", "summary_ja": "ジャカルタ・ポスト紙に掲載されたこのエッセイは、ある個人がノンバイナリーのジェンダーアイデンティティを認識し、受け入れていくまでの過程を描いている。伝統的な二元的性別の枠組みの外で生きることの感情的・社会的な困難が率直に綴られている。自己発見と、より真の自分になるためのプロセスを親密な視点から伝える内容となっている。", "summary_en": "A personal essay published in The Jakarta Post explores one individual's journey of identifying and embracing a nonbinary gender identity. The piece reflects on the emotional and social challenges of navigating gender outside the traditional binary framework. It offers an intimate account of self-discovery and the process of becoming more authentically oneself.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqAFBVV95cUxPdHhRQmxQVEZWS2xlOHNfdlZ6SURkRDFsUWxxRlJ1eVpjaEJEbkp6S2Jrcm14bFFoMUNQRzV3MEd6anI0Y1dRVFlMMTJIbWRqRENEWEp3RlNLVkpRRmZJb3FMRmdUNjF1VlRMcldqNWVDc0VET0thb293ZnBLNWF4eWpqRXJXbzNHRC1rTDI3N2kyZVlCdTRlWE9Pc21Wa0NiQVN4WndiZWU?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ブログ、マレーシアへのコメ50万トン輸出・4億5000万ドル契約を最終調整", "title_en": "Bulog Finalizing $450M Malaysian Deal for 500,000 Tonnes of Indonesian Rice", "summary_ja": "インドネシアの国家物流庁ブログは、マレーシアへコメ50万トンを輸出する4億5000万ドル規模の契約締結に向けた最終調整を進めている。この取引は、東南アジアの隣国間における大規模なコメ貿易として注目される。ブログは交渉の最終段階にあり、契約条件の確定を急いでいる。", "summary_en": "Indonesia's state logistics agency Bulog is in the final stages of securing a $450 million deal to export 500,000 tonnes of rice to Malaysia. The agreement would mark a significant rice trade transaction between the two neighboring Southeast Asian nations. Bulog is working to complete the terms of the bid as negotiations near conclusion.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiwAFBVV95cUxQQ2tIV3BBMDBqa1FVVzRuMGlKMC1Zb0wxWVVoLVJEQTk2azZzZWFONC1oRjJlZG1fOGdMVFVUNUt5Y1ZCZWZOODRhcGFrOTFVVUtZeG1sc1hsdm03TkNPc3Zud3M4YUZLelo2bmViVGFoRzV2dXNNY0lUQWlyS0FmRmpRcFNVQzVrVnV2TmY0dFdiOXdYMXYyUWNIOFdjLWlaNlhwUV8zUXdKeGVnTTc5MmpyU2VQR2dQTENNV013eUk?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "アップル、マック・ミニの一部生産をアジアからヒューストンに移管へ", "title_en": "Apple to Shift Some Mac Mini Production to Houston from Asia", "summary_ja": "アップルは、マック・ミニの一部生産をアジアからテキサス州ヒューストンに移転する計画を進めている。この動きは、アップルがサプライチェーンを多様化し、米国内での製造を拡大しようとする取り組みの一環とみられる。アジアからの輸入品に影響する貿易摩擦や関税圧力への対応策としての側面もあると考えられる。", "summary_en": "Apple is planning to move a portion of its Mac Mini production to Houston, Texas, relocating manufacturing away from Asia. This shift reflects broader efforts by Apple to diversify its supply chain and increase domestic production in the United States. The move could be part of Apple's response to ongoing trade tensions and tariff pressures affecting imports from Asian manufacturing hubs.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMisAFBVV95cUxQME9DYTF5R2ZRUHg4ZWJPQnEwVUlOZzJLZXQwSFViLXYzZ2lOVjJmVjBFMHAyRmRHLXo3S0NtNUJCRXlLcWJRNG9NTEFpYnhxNTVaOTBWSzNBa1dTVG91ckNnQXRDeVhaZ3lSdE5NMmN5MnJkV1pKUExxTkFRZ096Q3hraTR1NDN2SXVKNGs5RXJaNlpqcmxlMktZdHJ4R1NadGpMUDI4bHNhWDJUTzhrWg?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "フランス、コンゴから帰国した患者のエボラウイルス感染を確認", "title_en": "France Confirms First Ebola Case in Patient Returning from Congo", "summary_ja": "フランス保健省は2026年6月24日、コンゴの感染地域で人道支援活動に従事した後に帰国した患者のエボラウイルス感染を確認したと発表した。患者は安定した状態で専門施設に隔離されており、当局は接触者を特定するための疫学調査を進めている。コンゴでのアウトブレイクはワクチンや治療薬が存在しない希少なブンディブギョウイルスによるもので、5月15日の宣言以来、確認感染者数は1,094人、死者は277人に達している。", "summary_en": "France has confirmed an Ebola virus infection in a patient who returned from a humanitarian mission in a Congo transmission zone, the French Ministry of Health announced on June 24, 2026. The patient, in stable condition, has been isolated at a specialized facility, and authorities are conducting an epidemiological investigation to trace contacts. The outbreak in Congo, caused by the rare Bundibugyo strain with no available vaccine or treatment, has recorded 1,094 confirmed cases and 277 deaths since being declared on May 15.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/sci-tech/health/france-confirms-ebola-virus-in-patient-who-worked-in-congo/article71141564.ece", "state_media": false, "category": "社会"}, {"title_ja": "キア・スターマー英首相が辞任、ブレグジット後6人目の首相辞職", "title_en": "Keir Starmer Becomes Sixth UK Prime Minister to Resign Since Brexit", "summary_ja": "英国のキア・スターマー首相は2026年6月22日、ロンドンのダウニング街10番地からのテレビ演説で辞任を発表した。労働党内の数か月にわたる内部混乱が背景にあるとされる。スターマー氏は2024年7月5日に就任し、ブレグジット（英国のEU離脱）以降に任期を全うせずに辞任した6人目の首相となった。次期首相は今後数週間以内に行われる選挙で決定される見通しで、アンディ・バーナム氏が有力候補として浮上している。", "summary_en": "UK Prime Minister Keir Starmer announced his resignation on June 22, 2026, in a televised address from 10 Downing Street, citing months of internal turmoil within the Labour Party. Starmer, who took office on July 5, 2024, becomes the sixth British PM to leave office before completing a full term since the UK's departure from the European Union. The next prime minister will be determined by upcoming elections, with Andy Burnham emerging as a potential contender after winning a parliamentary seat in North West England on June 19, 2026.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/uk-pm-resigns-keir-starmer-leaders-who-have-resigned-full-list-england-united-kingdom/article71132482.ece", "state_media": false, "category": "政治"}, {"title_ja": "イラン、西アジア停戦合意を「米国の敗北宣言」と主張　IAEA核施設査察へ", "title_en": "Iran calls West Asia war deal 'U.S. defeat' as IAEA set to inspect nuclear sites", "summary_ja": "イランの首席交渉官ガリバフ氏は、西アジア戦争を終結させるイスラバード合意について、外部からの圧力ではなくイランの抵抗の成果であり「米国の敗北宣言だ」と述べた。一方、IAEA事務局長グロッシ氏は東京で、イランの核濃縮施設への査察団派遣を確認し、合意の核心であるウランの低濃縮化履行の検証が行われる見通しとなった。またイスラエルとレバノンは、イスラエル軍が占領地の一部をレバノン軍に引き渡す米国主導の試験的提案について協議していることが明らかになった。", "summary_en": "Iran's chief negotiator Mohammad Bagher Ghalibaf declared the Islamabad agreement ending the West Asia war a 'declaration of U.S. defeat,' crediting Iranian resistance rather than outside pressure. Meanwhile, IAEA chief Rafael Grossi confirmed inspectors will visit Iranian nuclear enrichment sites, a key condition of the deal requiring Iran's uranium stockpile to be downblended. Separately, Israel and Lebanon are discussing a U.S.-backed pilot proposal for Israeli forces to transfer some occupied Lebanese territory to the Lebanese military.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-iran-usa-israel-conflict-peace-deal-donald-trump-strait-of-hormuz-updates-june-24-2026/article71140307.ece", "state_media": false, "category": "政治"}, {"title_ja": "国民党主席：両岸対話再開には「一つの中国」現状復帰が鍵", "title_en": "KMT Chief: Returning to 'One China' Status Quo Is Key to Resuming Cross-Strait Talks", "summary_ja": "台湾の国民党（KMT）主席は、北京との両岸対話を再開するためには「一つの中国」の現状に戻ることが不可欠だと述べた。この発言は、共通の枠組みのもとで中国との対話を重視する国民党の伝統的な立場を反映している。この姿勢は、与党・民主進歩党の両岸関係へのアプローチとは対照的である。", "summary_en": "The head of Taiwan's Kuomintang (KMT) party stated that returning to the 'one China' status quo is essential for restarting cross-strait dialogue with Beijing. The KMT leader's remarks reflect the party's traditional stance favoring engagement with China under a shared framework. This position contrasts with the ruling Democratic Progressive Party's approach to cross-strait relations.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5oTXhBLVZ3a1A3YnZSellabldoMlFWeWlZRzFSVjNEZWNBajFIQ19XTFZfVHFUR0RicHBoZzdQcW1rdDVsdFpHSW1CcEhYeWc5U3UzQmJsQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾でMQ-9B「スカイガーディアン」無人機の試験運用が開始", "title_en": "MQ-9B SkyGuardian Drone Testing Underway in Taiwan", "summary_ja": "消息筋によると、台湾でMQ-9B「スカイガーディアン」無人機の試験運用が始まったことが明らかになった。この高高度長時間滞空型の無人航空機は、偵察・監視任務に使用される高性能機体である。台湾は防衛能力の強化を目的として、同無人機の評価試験を進めている。", "summary_en": "Taiwan has begun testing the MQ-9B SkyGuardian drone, according to a source familiar with the matter. The advanced unmanned aerial vehicle is being evaluated as part of Taiwan's efforts to bolster its defense capabilities. The MQ-9B is a high-altitude, long-endurance drone used for reconnaissance and surveillance missions.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTFBZczFqSzVBSHUtN09KbDViLXhJSzdFMms1LTRFSE5RMmc5QXhfSzFXa3c3TjN2MzJjUlpzSC1YRkI1Qm9TNFhwQXBucnY1YWdtdGtxNXU0MA?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾、中国侵攻を想定した即応演習を実施", "title_en": "Taiwan Conducts Quick Response Drill Simulating Chinese Invasion Scenario", "summary_ja": "台湾は、中国による侵攻シナリオを想定した即応軍事演習を実施している。この演習は、島の防衛態勢と迅速な動員能力を試することを目的としている。台湾海峡の緊張が高まる中、こうした訓練は台湾が国防強化のために継続して取り組む取り組みの一環となっている。", "summary_en": "Taiwan is conducting a quick response military drill designed to simulate and prepare for a possible Chinese invasion. The exercise aims to test the island's defensive readiness and rapid mobilization capabilities. Such drills are part of Taiwan's ongoing efforts to strengthen its national defense amid heightened cross-strait tensions.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE44eEhRdDdJZS1JaW5oSThoTmhhaHZBQmZDRmVtallHdkRhVXJBNXdPSnkxcWlPdU5hblhMSGxRcjlYb3pqNjN0ZHFXU09WQ3c0NzdadjRQQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イタマラチー、トランプ氏のブラジル選挙介入を警戒―「ブラジルはベネズエラではない」", "title_en": "Itamaraty Fears Trump Interference in Brazil's Elections, Insists Country Is Not Venezuela", "summary_ja": "ブラジルのルラ政権は、トランプ米大統領がブラジルの選挙に介入する可能性を注視しており、外交官らはその意図が次第に明確になっていると指摘している。トランプ氏はベネズエラのマドゥロ独裁者を拘束した後、G7でブラジルの政治状況を「危険」と発言し、ボルソナロ一家への支持を表明した。ルラ政権内では即座の対応を求める声がある一方、トランプ氏の発言が矛盾しているとして慎重な見極めを求める意見も存在する。", "summary_en": "Brazil's Lula administration is closely monitoring signs of U.S. President Donald Trump's potential interference in Brazil's upcoming elections, with diplomats noting his intentions are becoming increasingly clear. Trump drew attention after capturing Venezuelan dictator Nicolás Maduro, calling Brazil's political situation dangerous at the G7 and voicing support for the Bolsonaro family. While some Lula allies demand an immediate response, others urge caution given Trump's contradictory signals, including his stated personal fondness for Lula.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米当局、逮捕のブラジル人男性をPCCとCVの幹部と主張―ブラジルの判決記録に組織との関連なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC, but Court Records Show No Gang Links", "summary_ja": "米移民税関執行局（ICE）はノースカロライナ州で逮捕したブラジル人フェリペ・リナレス・デ・オリヴェイラ・デル・アキッラについて、ブラジル二大犯罪組織PCCとCVの「司令官」だと主張している。しかし、ブラジルで薬物密売・詐欺・恐喝により有罪判決を受けた際の裁判記録には、両組織への言及は一切ない。同容疑者はブラジルの要請に基づくインターポール手配の対象であり、妻を車内に閉じ込めていたとされる状況でメキシコへの逃亡を図ったところを交通検問で拘束された。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested in the US by ICE, which claims he was a 'commander' of both the PCC and CV criminal organizations. However, Brazilian court records from his prior convictions for drug trafficking, fraud, and extortion contain no mention of either group. He was stopped during a traffic inspection in North Carolina while allegedly holding his wife inside the car and was subject to an Interpol warrant issued at Brazil's request.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ブラジル、G7文書の大半を拒否　「トランプ配慮で骨抜き」と批判", "title_en": "Brazil Breaks With G7 on Key Documents, Citing Trump-Shaped Texts", "summary_ja": "ブラジルはフランス・エビアンで開催されたG7サミット2日目に発表された5つの文書のうち、2つにしか署名しなかった。ブラジル政府は、トランプ米大統領の拒否権を避けるために気候変動やWHOへの言及が削除されたと主張し、国際開発やエボラ出血熱に関する声明を拒否した。一方、がんや麻薬密売に関する文書には賛同し、子どものSNS保護に関する声明も承認する見通しだ。", "summary_en": "Brazil signed only two of five G7 documents released at the Évian summit, arguing the texts were watered down to avoid a U.S. veto under President Trump. Brasília rejected statements on international development and the Ebola outbreak, citing omissions of climate change, the WHO, foreign debt, and hunger. Brazil did back documents on cancer and drug trafficking, with a children's online safety statement also expected to gain its approval.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/brazil-diverges-from-most-g7-documents-says-texts-were-shaped-to-avoid-upsetting-trump.shtml", "state_media": false, "category": "政治"}, {"title_ja": "AON、航空税の見直しと南アフリカの経済的ボイコットを求める", "title_en": "AON Calls for Aviation Tax Review, Economic Boycott of South Africa Over Xenophobia", "summary_ja": "ナイジェリア航空事業者協会（AON）は、過大な課税が複数のナイジェリア航空会社の経営破綻を招いているとして、ティヌブ大統領に航空税・料金を審査する独立委員会の設置を要求した。AON副会長でエア・ピース会長のアレン・オニェマ氏は、ナイジェリア民間航空局（NCAA）が徴収する旅客サービス料5%を持続不可能と批判した。またオニェマ氏は、ナイジェリア人への繰り返す外国人排斥攻撃に対し、南アフリカへの平和的な経済ボイコットをナイジェリア国民に呼びかける一方、南アフリカ系企業への報復には反対した。", "summary_en": "The Airline Operators of Nigeria (AON) has urged President Tinubu to form an independent committee to review aviation taxes and charges, warning that excessive levies have driven multiple Nigerian airlines out of business. AON Vice-President and Air Peace Chairman Allen Onyema specifically criticized the NCAA's five percent passenger service charge as unsustainable. Onyema also called on Nigerians to peacefully boycott South Africa economically in response to recurring xenophobic attacks against Nigerians, while cautioning against targeting South African businesses operating in Nigeria.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/business/business-news/890284-aon-seeks-review-of-aviation-taxes-economic-boycott-of-south-africa.html", "state_media": false, "category": "経済"}, {"title_ja": "ナイジェリア裁判所、ソウォレ被告の保釈回復申請に関する判決を6月30日に予定", "title_en": "Nigerian Court Sets June 30 Ruling on Sowore Bail Restoration Request", "summary_ja": "ナイジェリアの連邦高等裁判所は、活動家オモイェレ・ソウォレ被告の保釈回復申請について6月30日に判決を下す予定と発表した。同被告は6月16日に法廷に出廷しなかったことで保釈が取り消され、月曜日からクジェ矯正施設に収監されている。ティヌブ大統領を犯罪者と呼んだSNS投稿をめぐるサイバー犯罪容疑で起訴されており、アムネスティ・インターナショナルなどの団体が保釈取り消しを表現の自由への脅威として批判している。", "summary_en": "A Federal High Court in Abuja has scheduled a June 30 ruling on activist Omoyele Sowore's application to restore his bail, which was revoked on June 16 after he failed to appear in court. Sowore, publisher of Sahara Reporters, is facing cybercrime charges for social media posts calling President Tinubu a criminal and has been remanded at Kuje Correctional Centre since Monday. The court rejected a defence request to release him to his lawyers pending the ruling, while critics including Amnesty International have condemned the bail revocation as a threat to due process and free expression.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/890280-court-to-rule-on-detained-sowores-request-for-bail-restoration.html", "state_media": false, "category": "政治"}, {"title_ja": "SECがダンゴテ製油所の偽IPO勧誘に対し投資家へ警告", "title_en": "SEC Warns Investors Against Fake Dangote Refinery IPO Scheme", "summary_ja": "ナイジェリア証券取引委員会（SEC）は、ソーシャルメディアや投資プラットフォームで拡散しているダンゴテ石油精製所の株式公開（IPO）を装った詐欺的な勧誘について、申請も承認も行っていないとして投資家に警告を発した。SECは一部の登録資本市場事業者が事前申込を積極的に募っていることを問題視し、これを2025年投資証券法に違反する市場操作と断定した。当局は事業者に対し24時間以内に宣伝資料の削除と集めた資金の返金を命じ、違反した場合は規制上の制裁を科すと警告した。", "summary_en": "Nigeria's Securities and Exchange Commission (SEC) has warned investors against a fraudulent initial public offering (IPO) circulating on social media and investment platforms claiming to represent Dangote Petroleum Refinery, stating no application has been filed with or approved by the regulator. The SEC expressed concern that some registered capital market operators were actively soliciting advance subscriptions for the unauthorized offer, calling it market manipulation that violates the Investments and Securities Act 2025. Operators were ordered to remove promotional materials and refund collected funds within 24 hours, with non-compliance subject to regulatory sanctions.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/business/business-news/890275-sec-warns-investors-against-purported-dangote-refinery-ipo.html", "state_media": false, "category": "政治"}, {"title_ja": "李強首相、モンテネグロ首相と会談―全面的な二国間協力の拡大を表明", "title_en": "Premier Li Qiang Meets Montenegro PM, Pledges Expanded Bilateral Cooperation", "summary_ja": "CGTNによると、中国の李強首相は火曜日に大連でモンテネグロのスパイッチ首相と会談し、貿易・インフラ・グリーンエネルギー・デジタル経済・AIなど幅広い分野での全面的協力拡大に中国が意欲的であると述べたと伝えている。CGTNは、李首相が外交関係樹立20周年を記念しつつ、モンテネグロ産品の輸入拡大や中国企業の投資促進への意欲も示したと報じている。スパイッチ首相はCGTNの報道によれば、中国を重要なパートナーと位置づけ、EU加盟後に中国とEUの実務協力における橋渡し役を担いたいと表明したとされる。", "summary_en": "CGTN reports that Chinese Premier Li Qiang met with Montenegrin Prime Minister Milojko Spajic in Dalian on Tuesday, where Li stated that China is ready to expand all-round cooperation with Montenegro across trade, infrastructure, green energy, digital economy, and AI. CGTN reports that Li emphasized mutual respect and support for each other's core interests, marking the 20th anniversary of diplomatic ties, and expressed willingness to import more Montenegrin products while encouraging Chinese enterprise investment there. Spajic, according to CGTN, described China as an important partner and said Montenegro hopes to serve as a bridge for EU-China cooperation after its EU accession.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-23/Premier-Li-China-to-expand-all-round-cooperation-with-Montenegro-1Odxm3Ka6wU/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "アルツハイマー病：早期サイン、診断、そして現代のケア", "title_en": "Alzheimer's Disease: Early Signs, Diagnosis, and Modern Care Options", "summary_ja": "CGTNは、アルツハイマー病の早期症状である短期記憶の喪失、日常作業の困難、気分の変化が通常の老化と混同されやすく、診断が遅れがちだと伝えている。同局の報道によれば、番組「Health Talk」に出演した神経科医や精神科医は、早期診断が生活の質向上につながるとし、バイオマーカー検査や標的免疫療法などの精密医療が18か月で病気の進行を27〜35%抑制するとされると述べたという。CGTNは、正常な認知機能の低下とアルツハイマー病の境界を理解することが、効果的な介入への第一歩だと位置づけていると報じている。", "summary_en": "CGTN reports that Alzheimer's disease is often underdiagnosed because early symptoms such as short-term memory loss, difficulty with familiar tasks, and mood changes are mistaken for normal aging. CGTN reports that leading neurologists and psychiatrists featured on its Health Talk program say early diagnosis can improve quality of life, and that new precision medicine approaches — including biomarker screenings and targeted immunotherapies — are said to reduce disease progression by 27% to 35% over 18 months. CGTN reports that understanding the boundaries between normal cognitive decline and Alzheimer's is presented as the critical first step toward effective intervention.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-23/Navigating-Alzheimer-s-Early-signs-diagnosis-and-care-1OcYmdsi3ss/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "イラン・米国協議、スイスで60日間ロードマップに合意", "title_en": "Iran-US Talks in Switzerland Yield 60-Day Roadmap for Final Nuclear Deal", "summary_ja": "CGTNは、イランと米国がスイスのビュルゲンシュトックで覚書に基づく初の高級協議を終え、仲介役のパキスタンとカタールが最終合意に向けた60日間のロードマップで合意したと伝えている。CGTNによれば、政治的監督を担う高級委員会と、レバノン停戦遵守を監視するための衝突回避セルの設置も合意されたという。一方、CGTNはイラン代表団が協議中に米国による停戦義務違反を抗議したとも報じており、レバノン情勢が交渉の焦点となっている。", "summary_en": "CGTN reports that the first session of high-level Iran-US talks under their Memorandum of Understanding concluded in Burgenstock, Switzerland, with mediators Pakistan and Qatar stating the parties agreed on a 60-day roadmap toward a final agreement. CGTN reports that a High-Level Committee was established for political oversight and a deconfliction cell created to monitor the Lebanon ceasefire. Iran's Foreign Minister claimed progress including sanctions waivers and asset releases, though CGTN reports that Iran's delegation protested alleged US violations of ceasefire commitments during the talks.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-22/news-1OaWrEvA0Tu/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "経済"}, {"title_ja": "欧州ガス貯蔵量が47%に到達、5年平均を約15ポイント下回る", "title_en": "European Gas Storage Reaches 47%, Nearly 15 Points Below 5-Year Average", "summary_ja": "TASSは、欧州の地下ガス貯蔵施設の充填率が46.97%（514億立方メートル）に達したと伝えており、これは過去5年間の同時期平均を約14.49ポイント下回る水準だとしている。同通信社によると、記録的な熱波による冷房需要の増大でガス注入ペースが鈍化しており、6月の累計注入量は前年同期比18%減となった。ガスプロムは次の暖房シーズン前に欧州の貯蔵量がEUの義務目標である90%どころか70%にも届かない可能性があると予測していると、TASSは報じている。", "summary_en": "TASS reports that European underground gas storage facilities have reached 46.97% capacity, holding 51.4 billion cubic meters of gas — approximately 14.49 percentage points below the five-year average for this date. TASS reports that injection rates have slowed amid extreme summer heat driving electricity demand, with total June injections down 18% year-on-year. Gazprom has forecast that European storage may fail to reach even 70% before the next heating season, well short of the EU's 90% requirement.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2150953", "state_media": true, "category": "社会"}, {"title_ja": "トランプ大統領、ガソリン価格下落鈍化で石油会社を批判し司法省に調査指示", "title_en": "Trump Orders DOJ Probe Into Oil Companies Over Slow Gasoline Price Drops", "summary_ja": "TASSによると、トランプ大統領はガソリン価格が原油価格の下落に見合った形で下がっていないとして大手石油会社を「消費者への搾取」と非難した。同大統領は司法省に即時調査を指示したと伝えられている。一方、アナリストらはホルムズ海峡再開通後も在庫回復に時間がかかるため、価格が紛争前の水準に戻るのは来年半ば以降になるとの見方を示している。", "summary_en": "TASS reports that President Trump expressed frustration that gasoline prices have not fallen in line with declining crude oil costs, accusing major oil companies of 'gouging' customers. Trump states he has instructed the Department of Justice to immediately investigate the matter. Analysts cited by CBS News caution that prices are unlikely to return to pre-conflict levels until mid-to-late next year, as rebuilt inventories will take time following the reopening of the Strait of Hormuz.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2150947", "state_media": true, "category": "社会"}, {"title_ja": "ラブロフ外相「ドルへの信頼低下、世界で認識が拡大し続ける」", "title_en": "Lavrov: Global Loss of Confidence in Dollar Will Keep Growing", "summary_ja": "ロシアのラブロフ外相はプリマコフ・リーディングス・フォーラムで、ドルの評判低下に対する世界的な認識は今後も強まり続けると主張した。TASSの報道によれば、ラブロフ外相はトランプ米大統領自身がイラン資産の凍結解除をしなければドルへの信頼が損なわれると警告した発言を引用し、同じ論理が西側諸国に凍結された他国の資産すべてに当てはまると述べた。この発言は、西側の金融制裁を脱ドル化の要因として位置づけるモスクワの主張の一環とみられる。", "summary_en": "Russian Foreign Minister Sergey Lavrov, speaking at the Primakov Readings forum, claims that global recognition of the dollar's declining reputation will continue to strengthen. TASS reports that Lavrov cited US President Trump's own remarks warning that freezing Iranian assets could undermine confidence in the dollar, arguing the same logic applies to all foreign reserves frozen by Western nations. The statement reflects Moscow's ongoing effort to frame Western financial sanctions as a driver of de-dollarization.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2150943", "state_media": true, "category": "政治"}, {"title_ja": "都市が示す気候変動対策と生活向上の両立", "title_en": "Cities Show How Climate Action Makes Life Better", "summary_ja": "筆者らは、省エネ、再生可能エネルギー、グリーンインフラ、適応策といった都市の気候変動対策が、温室効果ガス削減と同時に光熱費削減・大気質改善・極端な気象からの保護を通じて市民生活を向上させると主張する。14,000以上の都市が加盟する「気候・エネルギーに関する世界首長誓約（GCoM）」では、多くの加盟都市が国家目標を上回る気候目標を掲げている。GCoM・C40・欧州復興開発銀行による新たなパートナーシップは、特に資源不足が深刻な地域での都市の気候プロジェクト拡大を技術・資金両面で支援することを目指す。", "summary_en": "The authors argue that urban climate action—through energy efficiency, renewables, green infrastructure, and adaptation measures—simultaneously reduces emissions and improves residents' daily lives by lowering bills, improving air quality, and protecting against extreme weather. They highlight the Global Covenant of Mayors, which unites over 14,000 cities across 150 countries, many surpassing their national governments' climate ambitions. A new partnership between GCoM, C40, and the EBRD aims to close the technical and financial gaps preventing cities from scaling up these efforts, particularly in underserved regions.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/how-to-support-cities-leaders-in-climate-action-adaptation-by-michael-r-bloomberg-and-teresa-ribera-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "「国際的混乱」という神話", "title_en": "The Myth of Global Chaos", "summary_ja": "筆者は、現在の国際的な混乱は無秩序なカオスではなく、長年にわたって積み重なってきた地政学的変化の帰結であると主張する。米国とイランの外交を例に挙げ、見かけ上の混乱の背後には適応と回復力の一貫した論理が働いていると論じる。現状を安易に「混乱」と片付ける論者たちは、今日の主要な紛争を結びつける根本的なパターンを見落としているという。", "summary_en": "The author argues that today's international turmoil is not random chaos but the culmination of long-developing trends that the international system can no longer contain. Using US-Iran diplomacy as an example, the piece contends that beneath apparent disorder lies a coherent logic of adaptation and resilience. Pundits who lazily label current events as chaos are missing the underlying patterns connecting today's major conflicts.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/geopolitical-conflicts-are-not-chaos-but-rational-processes-playing-out-by-zaki-laidi-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "マイクロファイナンス論争は本質を見失っている", "title_en": "The Microfinance Debate Is Missing the Point", "summary_ja": "筆者は、マイクロファイナンスが「効果があるか否か」という二項対立的な議論は的外れであると主張する。本当に重要なのは、融資がどのように設計・提供・規制されるか、誰が受け取り、何に使われるかという点だ。150兆円規模に成長したこの産業の是非を問うのではなく、その実施方法の改善に議論を集中すべきだと訴えている。", "summary_en": "The author argues that decades of debate over whether microfinance 'works' has been reductive and misses the real issues. What matters is not a simple yes-or-no verdict, but rather how loans are designed, delivered, and regulated, who receives them, and what they are used for. Microfinance has grown into a $1.5 trillion industry serving hundreds of millions of unbanked households, and the focus should shift to improving its implementation rather than debating its existence.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/stop-asking-whether-microfinance-works-by-sophie-sirtaine-and-buhle-goslar-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "意見：ナンシー・メース議員の「トランスマウス」法案、トランスジェニックとトランスジェンダーを混同か", "title_en": "Opinion: Nancy Mace's 'Trans Mice' Bill Confuses Transgender with Transgenic Science", "summary_ja": "コラムニストのアルワ・マフダウィは、共和党のナンシー・メース下院議員がTRANS MICE法案を推進する中で、がん研究に使われる「トランスジェニック」マウスを「トランスジェンダー」マウスと混同し恥をかいたと論じている。筆者は、この出来事がGOPが正当な科学研究を意図的に歪めて文化戦争の論争を作り出す典型例だと主張する。鋭い風刺を交えながら、メース議員の法案は納税者の支出への真の懸念ではなく政治的パフォーマンスに過ぎないと批判している。", "summary_en": "Columnist Arwa Mahdawi argues that Republican congresswoman Nancy Mace embarrassed herself by promoting the TRANS MICE Act, apparently confusing 'transgenic' mice used in cancer research with 'transgender' mice. Mahdawi contends this episode exemplifies how the GOP manufactures culture-war controversies by wilfully misrepresenting legitimate scientific research. The author uses sharp satire to suggest Mace's bill reflects political grandstanding rather than genuine concern about taxpayer spending.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/24/trans-mice-act-congresswoman-nancy-mace", "state_media": false, "category": "オピニオン"}, {"title_ja": "トランプとテイト兄弟の関係が示すもの――つながりではなく価値観の問題", "title_en": "Trump's Alleged Ties to the Tate Brothers Raise Questions About His Values, Not Just His Connections", "summary_ja": "コラムニストのレベッカ・ソルニットは、トランプ政権がルーマニアでの刑事訴追からアンドリュー・テイトらを守るために介入したとされる報道を取り上げ、これは単なる政治的なつながりを超え、女性蔑視的な価値観への支持を示すものだと主張する。ニューヨーカーやニューヨーク・タイムズの調査報道を根拠に、テイト兄弟による性的搾取や強制の疑惑、そしてトランプ一家との社交的な接点を詳述している。ソルニットはエプスタイン問題とも絡めながら、女性を非人間的に扱う人物との親密な関係はトランプの思想的傾向を示すものだと結論づけている。", "summary_en": "Opinion writer Rebecca Solnit argues that the Trump administration's reported intervention to shield Andrew and Tristan Tate from criminal charges in Romania reveals more than mere political connections—it reflects an endorsement of misogynistic values. Drawing on investigations by the New Yorker and New York Times, Solnit outlines the Tates' alleged crimes, including sex trafficking and coercion of women, and their overlapping social circles with Trump and his sons. Solnit contends that Trump's proximity to both Epstein and the Tates suggests a pattern of aligning with men who dehumanize women, making it a question of character and ideology, not just association.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/24/andrew-tate-trump-relationship", "state_media": false, "category": "オピニオン"}, {"title_ja": "AIチャットボットが誤情報を提供した場合、誰が責任を負うのか", "title_en": "Who Is Liable When AI Chatbots Mislead You? Courts Begin to Decide", "summary_ja": "ブルース・シュナイアーとネイサン・サンダースは、AIチャットボットや要約ツールを導入する企業は、人間の従業員や代理人と同様に、そのシステムが生成するコンテンツに対して法的責任を負うべきだと主張する。グーグルに対するドイツの裁判所の判決やエア・カナダのチャットボット訴訟を例に挙げ、企業がAIのミスに対する責任を免れることを許せば、説明責任を持つ人間の専門家を安価なAIに置き換える危険な動機を生むと警告する。著者らは、AIが介在する社会への信頼を確保するためには、適切な責任の所在を明確にすることが不可欠だと結論づけている。", "summary_en": "Bruce Schneier and Nathan Sanders argue that companies deploying AI chatbots and summary tools must be held legally responsible for the outputs those systems produce, just as they would be for human employees or agents. Drawing on a German court ruling against Google and the Air Canada chatbot case, they contend that allowing businesses to disclaim liability for AI errors would create dangerous incentives to replace accountable human professionals with cheaper, unaccountable AI systems. The authors conclude that proper liability allocation is essential for public trust in an increasingly AI-mediated world.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/24/ai-errors-companies-responsibility", "state_media": false, "category": "オピニオン"}, {"title_ja": "新首相、同じ問題：ブレグジットのツケがついに英国に到来", "title_en": "New Prime Minister, Same Problem: Brexit's Bill Finally Arrives for Britain", "summary_ja": "筆者は、労働党の支持率急落とスターマー首相辞任の真因は戦術的失敗ではなく、2016年のEU離脱がもたらした経済的損失がついに顕在化したことにあると主張する。トランプ政権の関税政策が残された緩衝材を奪い去り、英国はEUのような交渉力も内需規模も持ち合わせていない。著者は、英国の軍事力をテコにEUとの大規模な関係強化を図ることが、経済安定と労働党政権維持への唯一の道だと訴える。", "summary_en": "The author argues that Labour's dramatic collapse in support—leading to Keir Starmer's resignation—stems not from tactical missteps but from Brexit's long-deferred economic consequences finally coming due. With Trump's tariff policies eliminating remaining buffers, Britain lacks the market scale and negotiating power of the EU. The author contends that only a bold pursuit of closer EU partnership, trading Britain's military weight for deeper market access, can stabilize both the economy and Labour's political coalition.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-kingdom/new-prime-minister-same-problem", "state_media": false, "category": "オピニオン"}, {"title_ja": "未来の戦争に敗れるアメリカ：ドローンとAIが軍事的優位を侵食する", "title_en": "Losing the War of the Future: How Drones and AI Are Eroding U.S. Military Dominance", "summary_ja": "筆者は、安価なドローンと人工知能によって定義される新たな戦争の時代に、米国が十分な備えを欠いていると主張する。イランとの39日間の仮想紛争を例に挙げ、ステルスや精密誘導兵器での過去の優位とは異なり、これらの新興技術では決定的なアドバンテージを維持できないと指摘する。戦略的衰退を避けるには、軍の官僚的障壁を克服し、民間部門との連携を深め、AIと低コストドローンの活用を急ぐ必要があると訴えている。", "summary_en": "The author argues that the United States is unprepared for a new era of warfare defined by affordable drones and artificial intelligence, as demonstrated by its failure to achieve objectives in a hypothetical 39-day conflict with Iran. Unlike past technological advantages in stealth and precision weapons, the U.S. cannot maintain a decisive edge in these emerging technologies, which are leveling the playing field for smaller adversaries. To avoid strategic decline, the military must overcome bureaucratic inertia, embrace private-sector innovation, and urgently integrate AI and low-cost drone capabilities.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/losing-war-future-paul-scharre", "state_media": false, "category": "オピニオン"}, {"title_ja": "「中国ファースト」が失敗する理由", "title_en": "Why 'China First' Will Fail", "summary_ja": "筆者は、米国が「アメリカファースト」のもとで国際的指導力を後退させる中、中国が代替リーダーとして台頭しようとしているが、北京自身の「中国ファースト」戦略――拘束力ある義務を負わずに影響力を追求する姿勢――がその野望を損なっていると論じる。中国は同盟構築や負担分担を避け、柔軟性と狭い自国利益を優先してきたため、真の超大国としての指導力を発揮できていない。筆者はワシントンと北京の双方が取引的・自国優先的な外交政策を続ければ、同盟国の忠誠心や国際秩序の安定が損なわれると警告する。", "summary_en": "The author argues that as the U.S. retreats from global leadership under 'America First,' China is positioning itself as an alternative leader, but Beijing's own 'China First' strategy—seeking global influence without binding commitments or responsibilities—undermines that ambition. China's record shows it prioritizes flexibility and narrow self-interest over the alliance-building and burden-sharing that true superpower leadership requires. The piece warns that both Washington and Beijing risk weakening global stability and partner loyalty by pursuing transactional, self-interested foreign policies.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/china/why-china-first-will-fail-patricia-kim", "state_media": false, "category": "オピニオン"}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  const sb=document.getElementById("d-state");
  sb.style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-24 12:15 JST";
renderTabs();renderList();
</script>
