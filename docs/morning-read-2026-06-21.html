const DATA = [{"title_ja": "ビエルサ監督「W杯の水分補給ブレークは何も加えず、多くを奪うだけ」", "title_en": "Bielsa: World Cup Hydration Breaks Add Nothing, Only Disrupt the Game", "summary_ja": "ウルグアイ代表監督マルセロ・ビエルサは、ワールドカップにおける水分補給ブレークを批判し、試合の流れとリズムを妨げるだけで実質的な利益はないと主張した。ベテランのアルゼンチン人監督は、この中断が試合に与えるものより奪うものの方が大きいと考えている。同氏の発言は、極暑環境での選手の健康管理を目的として導入された措置をめぐる議論を改めて浮き彫りにしている。", "summary_en": "Uruguay coach Marcelo Bielsa has criticized the use of hydration breaks at the World Cup, arguing they add no real benefit while disrupting the flow and rhythm of matches. The veteran Argentine manager believes the interruptions take more away from the game than they contribute. His comments reflect a broader debate about measures introduced to manage player welfare in extreme heat conditions.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMitAFBVV95cUxOZ0ZEZ3RIUTNIbkw0X1hTRzF6WVdvNjRBOGdCR3ZtZUItcWdIWGI0dDlBY3dfTEJad0FzYWVJZ2JLYkkwVzRjLVBwcEF3UW1hUXFiRzlhUXRuMXpELXF3QVFVZVdIU0xoTVpzbmhqS3VCMnViekg1cVlhNmxXaURHOW5MbnFOOVVtNzhlOFpnZ2FMOGlNVXp4X2U2RC04cFdYM2hYSk1GVDQ3YnRsTnNTbTByUU4?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "キュラソーのGKルーム、エクアドルとの歴史的W杯予選引き分けで輝く", "title_en": "Curacao Goalkeeper Room Shines in Historic World Cup Draw with Ecuador", "summary_ja": "キュラソーはW杯予選でエクアドルと引き分けという歴史的な結果を収め、GKエロイ・ルームが際立った活躍を見せた。この引き分けは、カリブ海の小国キュラソーにとってW杯出場を目指すキャンペーンにおける重要な成果となった。ルームのゴールキーピングが南米の強豪を抑える鍵となった。", "summary_en": "Curacao secured a historic result in World Cup qualifying by drawing with Ecuador, with goalkeeper Eloy Room delivering a standout performance. The draw marks a significant achievement for the small Caribbean nation as they continue their campaign to reach the World Cup. Room's heroics in goal were central to Curacao holding off the South American side.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiswFBVV95cUxQXzJ0QUg3a2xkWV9HaGhLSFRQMjY1czVCSE5abEplNThfNUVEZlVmT3VILWhEa0pnM0t1MFczYTJXY25zUE1QZER2b0NTNVBJUTJGM21ubXpYSTVrMHFONkFYaF9YcUMwOTJsZElPSWhyZ0JNNWJKVEwxMC13Q3lOZU9SVzlzRE55Mm5zakl1eUU1eUFweEJRZkJPS3o3dDJxWDRZMHpINml5aTdWSkhZb1M2QQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ルームの15セーブでキュラソーがW杯予選で歴史的勝ち点を獲得", "title_en": "Room's 15 Saves Help Curacao Earn Historic World Cup Point", "summary_ja": "GKエロイ・ルームが15本のシュートを止める活躍を見せ、キュラソーがワールドカップ予選で歴史的な勝ち点1を獲得した。この結果はカリブ海の小国にとって国際サッカー史上重要なマイルストーンとなった。ルームの卓越したパフォーマンスがチームの守備を支え、歴史的な結果をもたらした。", "summary_en": "Goalkeeper Eloy Room made 15 saves as Curacao secured a historic point in World Cup qualifying. The result marks a significant milestone for the small Caribbean nation in international football. Room's outstanding performance was central to Curacao's defensive effort throughout the match.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMirwFBVV95cUxOaWdfajZCNjh5MF9uOFhuTTdhdndPT0VjMVFaUUNhRU9VeWlWNUFycE1hQ3ZReG5qNkY1OXJmUXFLSEJuLVB1c24yUUJHdFJWek1Tc0VQME9ud3pQazNPc3hYeV81UGdGN3o2QWtYWjNiRHNRNG1fQkZEd3RnQkhDNFBISzBsYzVpTW9aMmlpUjZXanNLVXZ3VExvaDhWZ3pXOThWOUtrV194NjZYZmw4?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "バンス副大統領とイラン当局者がスイスで核協議を開始", "title_en": "Vance and Iranian Officials Meet in Switzerland to Begin Nuclear Talks", "summary_ja": "米国のJDバンス副大統領とイランの当局者がスイスに到着し、イランの核開発プログラムをめぐる交渉を開始した。今回の協議は、イランの核開発問題に対処するための重要な外交的取り組みを示すものである。スイスでの会談は、ワシントンとテヘランの間の対話に向けた重要な一歩となる。", "summary_en": "U.S. Vice President JD Vance and Iranian officials have arrived in Switzerland to begin negotiations over Tehran's nuclear program. The talks represent a significant diplomatic effort to address longstanding concerns about Iran's nuclear ambitions. The meeting in Switzerland marks a notable step toward potential dialogue between Washington and Tehran.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMingFBVV95cUxNNFh5b3dHTzJSUUpQVUtRWDdqTG5SYWtlNHhyNXBuRWZEbHgycFNiZUVkLTJsa3d5NkJiMDVjeDE2LVpEVGJ1YkZURGlpZnc0WlAySkJVcVc2dTJsNHAzNVZQaElzS1BZeVN6TzJDTGFzOV9TZVdZMV9FRHhYNVpsMkV2MjcwNXI0NUtORXlMd2lzTmdlUDl3TWxOblBZQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ポーランド大統領、第二次大戦の悪名高い部隊名を冠したウクライナ軍部隊問題でゼレンスキー氏の勲章を剥奪", "title_en": "Polish President Strips Zelenskyy of Honor Over WWII-Linked Army Unit Name", "summary_ja": "ポーランドのドゥダ大統領は、ウクライナが第二次世界大戦中にポーランド人虐殺を行ったとして悪名高い部隊にちなんで軍部隊を命名したことを受け、ゼレンスキー大統領に授与していた国家勲章を剥奪した。この決定は、ウクライナ蜂起軍の歴史的遺産をめぐるポーランドとウクライナの長年の歴史的摩擦を反映している。両国はロシアのウクライナ侵攻をめぐり緊密な協力関係を維持しているが、今回の措置により外交的緊張が高まっている。", "summary_en": "Polish President Andrzej Duda has stripped Ukrainian President Volodymyr Zelenskyy of a Polish state honor following Ukraine's decision to name a military unit after a World War II group notorious for anti-Polish atrocities. The move reflects longstanding historical tensions between Poland and Ukraine over the legacy of the Ukrainian Insurgent Army, which carried out massacres of ethnic Poles during WWII. The diplomatic friction comes despite the two neighboring countries maintaining close cooperation over Russia's ongoing invasion of Ukraine.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMitAFBVV95cUxNOXgyclBsMTRmSDhBaTRBUWRLWU9OTUV3SS13ckQ0N2VXdTFfN0N5Vmw2aS1aS0dIU2kzMkFmaVc0T0k4aU1JSkUybzlyYXQtMlR0cjhHc2p3VmF2WDVoWkJkYUpLUWYxSmxtZmZyRlJpR3dRbENydjdEWVY3Y20ybWJHaWx5d3QxajZXUkg1eHNQVy1udjRqbklsQUpIU2xYdFJYQXd0VWs4d1ZsSnVMSUlrYzI?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "メローニ首相、トランプ氏の「写真をせがんだ」発言を否定　伊外相が訪米キャンセル", "title_en": "Meloni Rejects Trump's Claim She 'Begged' for Photo as Italy's FM Cancels US Visit", "summary_ja": "イタリアのジョルジャ・メローニ首相は、トランプ前米大統領が「彼女が写真撮影をせがんだ」と主張したことに対し、強く反論した。この発言を受け、イタリアの外相が予定していた訪米をキャンセルする事態に発展した。両者はこれまで良好な関係を維持してきただけに、今回の公開の場での対立は異例とみられている。", "summary_en": "Italian Prime Minister Giorgia Meloni has pushed back against Donald Trump's claim that she begged for a photo opportunity with him. The diplomatic row escalated as Italy's top diplomat cancelled a planned trip to the United States in response to the remarks. The incident marks a rare public rift between Meloni and Trump, who had previously maintained a close political relationship.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiiAFBVV95cUxNWWhVSXE0UWRfVG9QMTluVWstWklCSFF0aU9JaWU4WXNxVnRua1VrZG1SaDI0dDd2THJWMFkwbU5ZZ185YkxRcVJaVzZlTDBvN09vcjBZNDJ1ZUlaQjg5M24wcnRLdENFNVFJUVdpNkk0QXF5ckpzTnZ0RDBzOFZGQzRnTklwVklt?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "米イラン協議がスイスで開始、ホルムズ海峡封鎖をめぐり対立", "title_en": "US-Iran Nuclear Talks Open in Switzerland Amid Strait of Hormuz Dispute", "summary_ja": "米国とイランの当局者がイランの核問題をめぐる外交協議をスイスで開始した。イランはレバノンへのイスラエルの攻撃への対抗措置として、世界的に重要な原油輸送路であるホルムズ海峡を封鎖したと主張した。しかし米国はイランの海峡封鎖の主張を否定した。", "summary_en": "US and Iranian officials have begun diplomatic talks in Switzerland over Iran's nuclear program. Tehran claimed it closed the Strait of Hormuz in response to Israeli attacks in Lebanon, a move that would threaten a critical global oil shipping route. The United States disputed Iran's assertion that the waterway has been shut.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/cwyekkwm1mmo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "ウクライナの攻撃でロシア占領下のクリミアで燃料販売が停止", "title_en": "Ukraine Strikes Halt Fuel Sales in Russian-Occupied Crimea", "summary_ja": "ウクライナ軍がロシア占領下のクリミアにある石油施設を攻撃し、同地域での燃料販売が停止された。占領地への補給路に対するキーウの攻撃により燃料不足がすでに深刻化しており、配給制が敷かれていた。今回の攻撃は、占領地におけるロシアの兵站と資源供給を妨害するウクライナの戦略の一環とみられる。", "summary_en": "Fuel sales have been suspended in Russian-occupied Crimea following Ukrainian strikes on oil facilities in the region. The halt comes after fuel had already been rationed due to ongoing shortages caused by Kyiv's targeted attacks against supply routes in occupied territories. The strikes represent part of Ukraine's broader strategy to disrupt Russian logistics and resource distribution in occupied areas.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/clyx2lk9d15o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "コロンビアの激化する武力紛争、大統領選挙の行方を左右", "title_en": "Colombia's Brutal Internal Conflict Shapes Presidential Election", "summary_ja": "コロンビアでは国内武力紛争が激化しており、それが次期大統領選挙の主要争点となっている。武装集団との対話を支持する左派上院議員が、トランプ前米大統領の支持を受けた新興候補と対決する構図となっている。この選挙は、国内の暴力と不安定な情勢にどう対処するかをめぐる国民の深い分断を映し出している。", "summary_en": "Colombia is experiencing an escalating internal conflict that is becoming a central issue in its upcoming presidential election. A left-wing senator advocating for negotiations with armed gangs is facing off against an outsider candidate who has received an endorsement from Donald Trump. The election reflects deep divisions over how to address the country's ongoing violence and instability.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/cvgqv8q1ndpo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "ストーンヘンジで夏至の日の出を祝う数千人が集結", "title_en": "Thousands Gather at Stonehenge to Celebrate Summer Solstice Sunrise", "summary_ja": "イングランド南西部のストーンヘンジに数千人が集まり、北半球で最も昼が長い夏至の夜明けを祝った。古代の石造建造物は冬至と夏至の太陽の軌道に合わせて建設されており、日の出の瞬間に太陽の光が石の配列と一致した。この年恒例のイベントには世界各地から訪問者が訪れ、先史時代の象徴的なモニュメントを舞台に祝祭が繰り広げられた。", "summary_en": "Thousands of revelers gathered overnight at Stonehenge in southwest England to celebrate the summer solstice, the longest day of the year in the Northern Hemisphere. Crowds watched the sunrise as it aligned with the ancient stone circle, which was constructed to track the sun's path at the solstices. The annual event draws visitors from around the world to the iconic prehistoric monument.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/stonehenge-revelers-ring-in-summer-solstice/a-77643500?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "ドイツ、政治家への侮辱を禁じる法律の廃止を検討", "title_en": "Germany Considers Scrapping Law That Bans Insulting Politicians", "summary_ja": "ドイツでは、政治家への侮辱を禁止する特別法を廃止すべきかどうかをめぐる議論が起きている。この法律は多くの人が不合理とみなす事例を生んでおり、一部の政府関係者は廃止を求めている。一方で、公職者を守るために法律を維持すべきだという意見も根強い。", "summary_en": "Germany is debating whether to abolish a special law that makes it illegal to insult politicians. The law has resulted in cases widely seen as absurd, prompting some government members to call for its repeal. Others argue the law still serves an important purpose in protecting public officials.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-could-scrap-law-banning-insults-against-politicians/a-77630055?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "ウクライナがロシア支配下のクリミアに無人機攻撃、死者も", "title_en": "Ukraine Strikes Russian-Controlled Crimea in Deadly Drone Attack", "summary_ja": "ウクライナはロシアが支配するクリミアに対して無人機攻撃を実施し、大規模な燃料貯蔵施設を直撃して深刻な火災を引き起こした。炎上する様子を捉えた映像はソーシャルメディア上で広く拡散された。モスクワ寄りのクリミア知事は攻撃を受けて、一般向けの燃料販売を停止した。", "summary_en": "Ukraine launched a deadly drone attack targeting Russian-controlled Crimea, striking a major fuel depot and causing significant fires. Footage of the blaze spread widely on social media following the strike. The Moscow-backed governor of Crimea has suspended public fuel sales in response to the attack.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/ukraine-hits-russia-controlled-crimea-in-deadly-drone-attack/a-77642973?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "米国とイランの新たな核協議がスイスで開幕、地域緊張が影を落とす", "title_en": "U.S.-Iran Nuclear Talks Open in Switzerland Amid Regional Tensions", "summary_ja": "JDバンス副大統領が率いるアメリカ代表団がスイスでイランとの新たな協議に臨んでいる。今回の交渉はイランの核開発問題と中東地域の安定化を主要議題としている。しかし、レバノンでの紛争が継続しており、幅広い和平実現や戦略的要衝であるホルムズ海峡の航行維持に向けた外交努力を複雑にしている。", "summary_en": "A new round of negotiations between the United States and Iran has begun in Switzerland, with Vice President JD Vance leading the American delegation. The talks aim to address Iran's nuclear program and broader regional stability. However, ongoing conflict in Lebanon is complicating diplomatic efforts, including attempts to keep the strategically vital Strait of Hormuz open to international shipping.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/21/world/iran-us-trump-lebanon", "state_media": false, "category": "政治"}, {"title_ja": "辞任圧力が高まる中、スターマー英首相が政治的現実を再考", "title_en": "Keir Starmer Weighs Political Future Amid Growing Resignation Pressure", "summary_ja": "英国のキア・スターマー首相は、辞任を求める声が高まる中、自身の政治的立場を見直しているとされる。同氏の盟友はBBCに対し、スターマー氏が「先週と今日の政治的現実の違いを熟考している」と語った。この動きは、同氏の指導力をめぐる深刻な混乱を示している。", "summary_en": "British Prime Minister Keir Starmer is reportedly reassessing his political position as pressure mounts for him to resign. An ally told the BBC on Sunday that Starmer is 'taking the time to think through what the political realities are today compared to last week.' The development signals significant turbulence within his leadership.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/21/world/europe/keir-starmer-andy-burnham-uk.html", "state_media": false, "category": "政治"}, {"title_ja": "ゼレンスキー大統領の第二次大戦パルチザン称賛令、ウクライナ・ポーランド関係に亀裂", "title_en": "Ukraine-Poland Ties Strained After Zelensky Honors WWII Partisans", "summary_ja": "ウクライナのゼレンスキー大統領が第二次世界大戦時のパルチザン戦士を称える大統領令に署名し、ポーランドとの間に深刻な緊張をもたらした。当該パルチザン組織は戦時中にポーランド系住民を虐殺した歴史的経緯があり、ワルシャワ側の反発は強い。この歴史的確執は、ロシアによるウクライナ侵攻下で維持されてきた両国の緊密な同盟関係を揺るがす恐れがある。", "summary_en": "Ukrainian President Volodymyr Zelensky signed a decree honoring World War II partisan fighters, a move that has sharply escalated tensions with Poland. The partisan group in question is historically associated with the massacre of ethnic Poles during the war, making the honor deeply controversial in Warsaw. The dispute threatens to undermine the close alliance between the two neighboring countries, which has been vital during Russia's ongoing invasion of Ukraine.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/21/world/europe/ukraine-poland-alliance-russia.html", "state_media": false, "category": "政治"}, {"title_ja": "人質交渉の膠着打開でパレスチナ人がガザ北部へ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を二分する軍事ゾーンをパレスチナ避難民が通過することを許可し、北部への帰還が始まった。この動きは、人質解放をめぐる交渉の膠着状態が打開されたことを受けたものである。多数の避難民が徒歩で故郷へ向かう姿が見られ、紛争における人道状況に大きな変化が生じている。", "summary_en": "Israel has allowed displaced Palestinians to cross a military zone dividing the Gaza Strip, enabling them to return to northern Gaza on foot. The movement came after a deadlock over hostage releases was resolved. The development marks a significant shift in the conflict's humanitarian situation, allowing large numbers of displaced Gazans to head back to their home areas.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治"}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Property Sector Crisis", "summary_ja": "中国の大手不動産デベロッパー、万科(ヴァンキー)が多額の損失を計上し、同国の不動産危機が一段と拡大していることが浮き彫りとなった。万科の経営悪化は、不動産セクター全体への影響拡大に対する懸念を改めて高めている。中国政府が事態収拾に向けて介入するかどうかについても、注目が集まっている。", "summary_en": "Leading Chinese property developer Vanke has reported a significant financial loss, signaling that the country's real estate crisis continues to widen. The troubles at Vanke raise fresh concerns about the broader health of China's property sector. Questions are mounting over whether the Chinese government will intervene to prevent further contagion across the industry.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会"}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の榴散弾が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による榴散弾が今も残っていたことが明らかになった。イスラエルの医療当局者によると、女性の人質の一部は長期間にわたり単独で拘束され、約8か月間を地下トンネルの中で過ごしたという。この事実は、ガザで拘束されていた人々が受けた深刻な身体的・精神的苦痛を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The findings highlight the severe physical and psychological toll endured by those held captive in Gaza.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会"}, {"title_ja": "世界最大のウルトラマラソン「コムレーズ」に2万人が挑む　南アフリカで感動の祭典", "title_en": "20,000 Runners Unite at World's Largest Ultramarathon, South Africa's Comrades Race", "summary_ja": "毎年6月、南アフリカでは世界最大のウルトラマラソン「コムレーズ・マラソン」が開催され、約2万人のランナーが参加する。レースは国歌斉唱、移民労働者の歌「ショショロザ」、そして映画「炎のランナー」のテーマ曲で幕を開ける感動的な演出で知られる。深刻な人種的不平等を抱える南アフリカにおいて、この日だけはすべての人が汗と感動を共有し、一体感に包まれると伝えられている。", "summary_en": "Every June, approximately 20,000 runners gather in South Africa for the Comrades Marathon, the world's largest ultramarathon. The event begins with a powerful ritual of the national anthem, the migrant workers' song Shosholoza, and the iconic Chariots of Fire theme. For one day, the race is celebrated as a rare moment where South Africa's deep racial inequalities appear to fade amid shared sweat and camaraderie.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/21/comrades-ultramarathon-south-africa", "state_media": false, "category": "社会"}, {"title_ja": "ガーナで歴史的会議、奴隷制賠償に関するグローバル枠組みを採択", "title_en": "Global Reparatory Justice Framework Adopted at Landmark Ghana Conference", "summary_ja": "アフリカとカリブ海諸国の首脳らがガーナの首都アクラに集まり、奴隷制に対する賠償的正義のグローバル枠組みを正式に採択した。19項目のロードマップには、大西洋横断奴隷貿易から利益を得た国々への正式な謝罪要求が含まれている。この会議は、国連が画期的な決議を採択して以来、初めての主要な国際会合となった。", "summary_en": "A global framework for reparatory justice was formally adopted at a landmark conference in Accra, Ghana, bringing together African and Caribbean heads of state and government. The 19-point roadmap includes calls for formal apologies from countries that benefited from the transatlantic slave trade. The gathering marked the first major international meeting following the adoption of a landmark United Nations resolution on the issue.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/news/2026/jun/19/global-framework-reparations-justice-adopted-at-landmark-conference-in-accra-ghana", "state_media": false, "category": "政治"}, {"title_ja": "CDCがコンゴとウガンダのエボラ対応に1億700万ドルの緊急資金を投入", "title_en": "CDC Allocates $107M in Emergency Funds for Ebola Response in DRC and Uganda", "summary_ja": "米疾病対策センター（CDC）は、コンゴ民主共和国とウガンダで続くエボラ出血熱の感染拡大に対応するため、1億700万ドルの緊急資金を投入すると発表した。今回の流行は記録上3番目に大規模なものとなり、感染者数はすでに1,000人を超えているが、当局は世界的なリスクは依然として低いとしている。米国・カナダ・メキシコが共同開催するFIFAワールドカップ期間中であり、世界各地からの訪問者増加を踏まえた迅速な対応が求められている。", "summary_en": "The CDC will deploy $107 million in emergency funding to combat the ongoing Ebola outbreak in the Democratic Republic of the Congo and Uganda. The outbreak, now the third largest on record, has infected more than 1,000 people, though health officials say the global risk remains low. The response comes as the US, Canada, and Mexico co-host the FIFA World Cup, drawing international visitors from affected regions.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/us-news/2026/jun/18/cdc-emergency-ebola-funding", "state_media": false, "category": "社会"}, {"title_ja": "独裁国家が台頭する新たな和平調停者たち", "title_en": "Autocracies Are Displacing Democracies as the World's New Conflict Mediators", "summary_ja": "かつて西側民主主義国や多国間機関が主導してきた紛争調停の役割を、権威主義体制の国々が急速に担うようになっている。こうした独裁国家が仲介する合意は、人権や民主的な説明責任よりも国家主権や体制の安定を優先する傾向があり、従来の和平プロセスとは異なる性格を帯びている。この変化は国際的な平和構築のあり方を根本から変えつつあり、合意の長期的な持続性と正当性に疑問を投げかけている。", "summary_en": "Authoritarian regimes are increasingly stepping into the role of conflict mediators on the world stage, a role once dominated by Western democracies and multilateral institutions. The deals brokered by these autocracies tend to reflect their own political values, often prioritizing state sovereignty and regime stability over human rights or democratic accountability. This shift is reshaping the nature of peace agreements and raising questions about their long-term durability and legitimacy.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会"}, {"title_ja": "アジアの同盟国、トランプ氏との緊密な関係を余儀なくされる", "title_en": "Asian Allies Have No Choice but to Embrace Trump", "summary_ja": "日本をはじめとするアジア諸国は、中国の脅威に対抗するうえで中堅国連合では十分な安全保障を確保できないと認識している。トランプ氏の予測不可能な言動に懸念を抱きつつも、米国の軍事的抑止力は依然として代替不可能な存在だ。そのため、アジアの同盟国は外交的・経済的コストを払ってでもワシントンとの緊密な関係を維持せざるを得ない状況にある。", "summary_en": "Japan and other Asian nations are finding that middle-power coalitions offer little real security against China. Despite misgivings about Donald Trump's unpredictability, these countries recognize that American military deterrence remains irreplaceable in the region. As a result, Asian allies are expected to maintain close ties with Washington, even at diplomatic and economic cost.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会"}, {"title_ja": "ワールドカップ優勝の秘訣：富裕さより移民への開放性が鍵", "title_en": "How to Win the World Cup: Wealth Helps, But Immigration Helps More", "summary_ja": "ワールドカップの成績を分析した研究によると、国の経済力は優れた練習施設やインフラを通じてサッカーの強化に寄与することが示されている。しかし、それ以上に移民に対する開放性が勝利を左右する要因であり、外国生まれの選手を受け入れる国ほど広い人材プールを活用できる。この知見は国際サッカーにおける民族主義的な議論に疑問を呈し、多様性が強いチーム作りに貢献することを示している。", "summary_en": "Research into World Cup success suggests that national wealth gives countries an advantage in football, likely due to better training facilities and infrastructure. However, openness to immigration proves to be an even stronger predictor of success, as countries that welcome foreign-born players can draw on a wider pool of talent. The findings challenge purely nationalist narratives around international football, highlighting the role of demographic diversity in building winning squads.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/10/how-to-win-the-world-cup", "state_media": false, "category": "社会"}, {"title_ja": "記録的熱波の中、フランスが年次音楽祭を強行開催―公共での飲酒も禁止", "title_en": "France Holds Annual Music Festival Amid Record Heatwave and Public Alcohol Ban", "summary_ja": "フランスは激しい熱波が国内を襲う中、年に一度の音楽祭「フェット・ド・ラ・ミュジック」を予定通り開催した。過去最多となる約35県（全国の約3分の1）が最高レベルの熱波警戒情報の対象となった。政府はレッドアラート発令中の県において、公共の場での飲酒を禁止する措置を発表した。", "summary_en": "France proceeded with its annual Fête de la Musique celebration despite a severe heatwave gripping the country. A record 35 departments — approximately one third of France — were placed under the highest heat alert. The government responded by banning public alcohol consumption in all red-alert departments during the event.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/france/article/2026/06/21/france-presses-ahead-with-annual-music-festival-despite-extreme-heat_6754713_7.html", "state_media": false, "category": "政治"}, {"title_ja": "ゴラン高原のイスラエル併合を承認した唯一の世界指導者、トランプ氏", "title_en": "Trump Remains Only World Leader to Recognize Israel's Annexation of the Golan Heights", "summary_ja": "1981年にイスラエルが併合したゴラン高原は、2024年のバッシャール・アル・アサド政権崩壊後、その戦略的重要性がさらに高まっている。ドナルド・トランプ氏は、イスラエルによるゴラン高原の併合を公式に承認した唯一の世界指導者であり続けている。地域の勢力図が塗り替えられる中、この高原をめぐる国際的な注目は依然として続いている。", "summary_en": "The Golan Heights, annexed by Israel in 1981, has grown in strategic significance following the fall of Bashar al-Assad's regime in Syria in 2024. Donald Trump remains the sole world leader to have formally recognized Israel's annexation of the territory. The geopolitical importance of the plateau continues to draw international attention amid the shifting power dynamics in the region.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/21/trump-remains-the-only-world-leader-to-have-recognized-israel-s-annexation-of-the-golan-heights_6754718_4.html", "state_media": false, "category": "経済"}, {"title_ja": "米国、ドイツの薬価を調査開始―欧州との緊張再燃の恐れ", "title_en": "US Launches Drug Price Probe Targeting European Healthcare Systems", "summary_ja": "米国はドイツにおける医薬品価格の調査を開始し、欧州との新たな通商摩擦が懸念されている。トランプ大統領は、欧州各国が医療制度を通じて薬価を規制することで、その負担を米国の消費者に転嫁していると主張している。この動きは、貿易や医療政策をめぐるワシントンと欧州同盟国との対立を深める可能性がある。", "summary_en": "The United States has opened an investigation into pharmaceutical drug pricing in Germany, signaling potential new trade tensions with Europe. President Donald Trump argues that European countries, through their government-regulated healthcare systems, suppress drug prices and effectively shift costs onto American consumers. The move could lead to fresh disputes between Washington and its European allies over trade and healthcare policy.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/economy/article/2026/06/21/us-launches-investigation-into-drug-prices-in-germany-risking-renewed-tensions-with-europe_6754716_19.html", "state_media": false, "category": "経済"}, {"title_ja": "マット・ヘンリー活躍、ニュージーランドが第2テストでイングランドに勝利しシリーズ同点に", "title_en": "Matt Henry Stars as New Zealand Level Series Against England in Second Test", "summary_ja": "ニュージーランドの速球投手マット・ヘンリーが第2イニングでイングランドの打線を圧倒する見事な投球を披露した。この活躍によりニュージーランドは第2テストマッチで勝利を収め、シリーズを1勝1敗の同点に戻した。両チームが並んだことで、シリーズの行方は今後の試合に委ねられる形となった。", "summary_en": "New Zealand pacer Matt Henry delivered a devastating performance in the second innings to dismantle England's batting lineup. His efforts secured a decisive victory for New Zealand in the second Test match, leveling the series between the two sides. The result sets up a thrilling decider as both teams now stand level heading into the remainder of the series.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/6/21/henry-stars-as-new-zealand-wrap-up-victory-against-england-in-second-test?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "米国とイランの代表団がスイスで核交渉を開始", "title_en": "US and Iran Delegations Arrive in Switzerland for Nuclear Talks", "summary_ja": "米国とイランの代表団がスイスに到着し、外交交渉が始まった。今回の協議は、イランの核開発問題をめぐる緊張緩和を目指した外交努力の一環である。スイスでの会談は、両国間における重要な外交的局面となっている。", "summary_en": "Delegations from the United States and Iran have arrived in Switzerland as diplomatic negotiations get underway. The talks represent a renewed effort to address tensions over Iran's nuclear program through direct dialogue. The meeting in Switzerland marks a significant diplomatic moment between the two nations.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/6/21/us-iran-delegations-arrive-as-talks-begin-in-switzerland?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "メッシとアルゼンチン、W杯グループステージでオーストリアと対戦", "title_en": "Messi and Argentina Face Austria in Crucial World Cup Group Stage Match", "summary_ja": "ハットトリックを決めたリオネル・メッシが、アルゼンチンの一員としてオーストリアとのワールドカップ・グループステージの試合に臨む。アルゼンチンにとって、この試合に勝利すれば決勝トーナメント進出に向けて大きく前進することになる。両チームともに次のラウンドへの切符をかけ、重要な一戦に挑む。", "summary_en": "Lionel Messi, coming off a hat-trick performance, returns to action as Argentina take on Austria in a World Cup group stage match. A victory would put Argentina in a strong position to advance to the knockout stages. The match is a key fixture as both teams look to secure their place in the next round.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/6/21/messi-argentina-play-austria-in-world-cup-group-match-all-to-know?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "ネタニヤフ首相、トランプ氏を攻撃する側近を抑制するよう求められる", "title_en": "Netanyahu Urged to Restrain Allies Attacking Trump", "summary_ja": "イスラエル紙ハアレツは、ベンヤミン・ネタニヤフ首相に対し、トランプ前米大統領を攻撃する政治的盟友たちを抑制するよう求めた。ネタニヤフ首相の周辺人物によるトランプ氏への攻撃は、米イスラエル関係に悪影響を与えかねないと指摘している。同紙は首相に対し、自身の政治的サークル内の行動に責任を持つよう促している。", "summary_en": "Haaretz is calling on Israeli Prime Minister Benjamin Netanyahu to rein in his political allies who are targeting former U.S. President Donald Trump. The editorial suggests that attacks on Trump by figures close to Netanyahu are damaging to U.S.-Israel relations. The paper urges Netanyahu to take responsibility for the behavior of those in his political circle.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihgJBVV95cUxQaXlyVmxJaTBjYnlwT0JhWWM1VVl0d2loWmRmdlIzVlJucnNLcVRsR3FLX2JQQ0U4SXRqQjBaeFl4MGZqUGhBZXZ0dGVxUzl0eEQ0VlpHN0V6LW9wWWRmWkhtZFhmaUo4UlRKLWJsdFJtNXdVRDdrX19kSlRfZGJpV3I5eU1PT1NQQUU2cGg0UWNqZUtJUVVIVVlDNm1LcHlRVVZnQm9maGdkbDlrWnJhWktzV3lCVE14Zmt2bHo1eXFEXzFzR21NdGZCVVJEMEdkR0lDSG4tQjhBSGw4OUhoMGFVRzdvQUcyLVN1dGYwSzRzclB6OEZTSGNxTlhnWGoyWmpZM3pR?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "レバノンにおけるイスラエルの存在が米イラン核合意を不可能にするか", "title_en": "Will Israel's Presence in Lebanon Derail a U.S.-Iran Nuclear Deal?", "summary_ja": "イスラエルがレバノンで軍事的プレゼンスを維持し続けることが、米国とイランの外交交渉を複雑化または頓挫させる可能性について懸念が高まっている。イランが支援するヒズボラはレバノン情勢と地域の緊張双方において中心的な要因であり、状況をさらに複雑にしている。ワシントンがイスラエルとの関係を維持しながらテヘランとの合意を追求できるか、専門家の間で疑問の声が上がっている。", "summary_en": "Israel's continued military presence in Lebanon is raising concerns about whether it could complicate or derail ongoing U.S.-Iran diplomatic negotiations. The situation creates a complex geopolitical dynamic, as Iran-backed Hezbollah remains a central factor in both the Lebanon conflict and broader regional tensions. Analysts are questioning whether Washington can simultaneously manage its relationship with Israel and pursue a viable agreement with Tehran.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiigJBVV95cUxNa0ZTTjBKMjViZHp2MDNPUU9MMzJiTEtPM0JHdDFqZER4NVRSWGdKVkMyMDJpUGZqTVlkckt2TVRqUHNpX2R0R1htZkxpUjZEUE1xUGctRGE2c0FnWHAwZjctNmZ5UHdzQzJSdEw1UlhHT3VVXzk3VkhCdm5tcWYwem82amZ1N3MtRnJpLVJjMldfdEdCOVliemdXTVd4RjlGUFQ0QUMwTzRfM3hfeFVLWGJpNVJvY29HR3JzdjRIbThWSk1KVEJlUjhsLWFkRTFuZkhQU0JyZ29IQjRNUTQ3SzhwRTlOYTlTby1KV1h3RDFpdm1UQWtUblVnU2lBM1E4MlJsTTc4aW1EUQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イスラエル軍、レバノン南部の別々の事件で死亡した兵士3人を公表", "title_en": "IDF Identifies Three Israeli Soldiers Killed in Separate Southern Lebanon Incidents", "summary_ja": "イスラエル国防軍（IDF）は、レバノン南部で発生した別々の事件で死亡した兵士3人の氏名を発表した。イスラエル軍が同地域で作戦を継続する中、軍の犠牲者が相次いでいる。各事件の詳しい状況については、現時点で詳細は明らかにされていない。", "summary_en": "The Israel Defense Forces announced the names of three Israeli soldiers killed in separate incidents in Southern Lebanon. The deaths mark continued military casualties as Israeli forces operate in the region. No further details about the specific circumstances of each incident were immediately provided.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiogJBVV95cUxQUEh1WEUwdmdwdzEyM0tXNE5LVUhGNHlDQnM3V3lZRE5MdjduUG5SM0RtQ2VhV2tid2JlVGZZUG5JUHlVbTRJUC11eWxETndwdUpncDVHWUgxeWRDem81cDJRUmMyX1E3aWNyV2ZJdHZ0MGM3bzZDZEpscFA5bllVS194dWluZzdibkxrdGl1LTJPM2VTTFRQWkNFdjVPT2xuc3NCZ1djRlloWmYycTdkSG4xZERDQm1XU0dwaF9qSjRSMUdFNUhleGt1YmsxMW45ckxsUXVNWmVId1oxTDVhMXZabFJobGNlTWpVTTNsSFlOTVlxcndWNzZGR0I0VVRaY0FqUmd4UnFJT1R5OXdPRnVJYWltMVczSGtvOHpLTS1Kdw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "国防省ニュースレター更新 – 2026年6月21日", "title_en": "Mindef Newsletter Update – June 21, 2026", "summary_ja": "シンガポール国防省（Mindef）は2026年6月21日（日曜日）、ストレーツ・タイムズを通じてニュースレターを配信した。このメールは適切に表示されない場合にオンラインで閲覧するよう案内する形式で送付された。読者はストレーツ・タイムズのプラットフォームを通じて追加の無料ニュースレターへの登録や、既存の購読管理を行うよう促されている。", "summary_en": "The Singapore Ministry of Defence (Mindef) issued a newsletter update on Sunday, June 21, 2026, distributed via The Straits Times. The communication was flagged as a formatted email newsletter, with instructions for subscribers to view it properly online. Readers were directed to sign up for additional free newsletters or manage their existing subscriptions through The Straits Times platform.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治"}, {"title_ja": "ストレーツ・タイムズ夕刊ニュースレター配信のお知らせ", "title_en": "Evening Update Newsletter – The Straits Times", "summary_ja": "シンガポールの主要紙ストレーツ・タイムズが夕刊ニュースレター「イブニング・アップデート」を配信した。今回の抜粋には具体的なニュース内容は含まれておらず、主にニュースレターの配信案内として機能している。読者は追加の無料ニュースレターへの登録や既存の購読管理を行うよう案内されている。", "summary_en": "The Straits Times published its Evening Update newsletter on a Thursday afternoon. The brief excerpt contains no substantive news content, serving primarily as a newsletter distribution notice. Readers are directed to sign up for additional free newsletters or manage their existing subscriptions.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治"}, {"title_ja": "モーニングブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズは2024年2月7日にモーニングブリーフィングニュースレターを配信した。このブリーフィングは、その日の主要ニュースをまとめて読者に届けるものである。読者はリンクを通じてニュースレターの購読管理や追加の無料ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times published its Morning Briefing newsletter on February 7, 2024. The briefing provides readers with a curated summary of the day's top news stories. Subscribers can manage their newsletter preferences or sign up for additional free newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治"}, {"title_ja": "インドネシアの学生、高コストな政府事業と燃料価格上昇に抗議", "title_en": "Indonesian Students Protest Costly Government Programs and Fuel Price Hikes", "summary_ja": "インドネシア各地で学生による抗議活動が激化しており、学生らは高額な政府事業と燃料価格の上昇に反対の声を上げている。このデモは、一般市民の生活を圧迫する経済的負担への広範な不満を反映している。今回の抗議活動は、政府が推進する財政・エネルギー政策に対する国民の不満が高まっていることを示している。", "summary_en": "Student demonstrations have intensified across Indonesia, with protesters voicing opposition to expensive government programs and rising fuel prices. The rallies reflect growing public frustration over economic pressures affecting everyday Indonesians. The protests signal broader discontent with current fiscal and energy policies being pursued by the government.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiuwFBVV95cUxPcU1keXg1eG53eWxnMVFXTWNEVDNiSldCLV9ta2RFNUFsVnRzVWFEcHh0bGVQSTFBc3FQWGlsV3ZiYTB0RXhzajFPbXQ0TWVEVjJhZ2tuaFZFeXBQSUs5NHAzVTR0WXRxQk1lZk9lTkhjV3pLTGp6Y2hVdVdVWmJkU3drYlNqUDBfZDA3aWxETDJabGVBM1RPLUtYaDczajg3OHlULXM4LTZWcFRab1R5QXVmbi14VWh4eGlN?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "学生デモへの軍投入、批判を呼ぶ―インドネシア", "title_en": "Military Deployment Against Student Protests Sparks Criticism in Indonesia", "summary_ja": "インドネシア当局が学生抗議活動に対して軍を展開したことが、国内外から強い批判を受けている。批評家たちは、この対応が市民の自由と民主主義的規範を脅かす過剰な措置だと主張している。この出来事は、国内の民間人による抗議活動に対する軍の関与の是非をめぐる議論を再び呼び起こしている。", "summary_en": "Indonesian authorities have drawn sharp criticism for deploying military forces against student protesters. Critics argue the move is a disproportionate response that threatens civil liberties and democratic norms. The incident has reignited debate over the appropriate role of the military in handling domestic civilian unrest.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqgFBVV95cUxOVDUyS0lfTG5hOEhsYzdlYndIcDNpSkxKR2R6cjVESFBIeTlyNWVKYUhlYncyN2ZOdUVzXzN6LUxMZ0FKbVRKU2JXODhyNnlBTGFGZDdFUGFwMFpJUVh6R2Nyb1hvRkRtYkZJd1ZtWFBSVF9yUUtnM1VoV2dmZGFlcUM1Z3pCeU5hblhBYnNDMXhobWtWSHEwbVZFZGNZTktBLWZINm50dUozUQ?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "ブログ、インドネシア産米50万トンのマレーシア向け4億5000万ドル契約を最終調整", "title_en": "Bulog Finalizing $450M Malaysian Deal for 500,000 Tonnes of Indonesian Rice", "summary_ja": "インドネシアの国家物流庁ブログは、マレーシアへ50万トンの米を輸出する4億5000万ドル規模の契約を最終段階で調整している。この取引は東南アジアの隣国間における大規模な貿易案件となる。ブログはマレーシアからの入札に応じるため、必要な手続きを進めている。", "summary_en": "Indonesia's state logistics agency Bulog is in the final stages of securing a $450 million agreement to export 500,000 tonnes of rice to Malaysia. The deal represents a significant trade transaction between the two neighboring Southeast Asian nations. Bulog is working to complete the necessary arrangements to fulfill the Malaysian bid.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiwAFBVV95cUxQQ2tIV3BBMDBqa1FVVzRuMGlKMC1Zb0wxWVVoLVJEQTk2azZzZWFONC1oRjJlZG1fOGdMVFVUNUt5Y1ZCZWZOODRhcGFrOTFVVUtZeG1sc1hsdm03TkNPc3Zud3M4YUZLelo2bmViVGFoRzV2dXNNY0lUQWlyS0FmRmpRcFNVQzVrVnV2TmY0dFdiOXdYMXYyUWNIOFdjLWlaNlhwUV8zUXdKeGVnTTc5MmpyU2VQR2dQTENNV013eUk?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ロンドン・サウソールの刺殺事件、インド人男性を殺人罪で起訴", "title_en": "Indian man charged with murder after fatal stabbing in London's Southall", "summary_ja": "20歳のナフジョット・シンが、ロンドンのサウソールでグルベジ・シンを刺殺した容疑で殺人罪に問われた。殺人罪のほか、傷害罪および凶器所持罪でも起訴されている。シンは先週、この殺害事件に関連して逮捕されていた。", "summary_en": "Navjot Singh, 20, has been charged with murder following the fatal stabbing of Gurbhej Singh in Southall, London. He faces additional charges of grievous bodily harm with intent and possession of an offensive weapon. Singh was arrested last week in connection with the killing.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/indian-man-charged-with-fatal-stabbing-in-londons-southall/article71129292.ece", "state_media": false, "category": "社会"}, {"title_ja": "イラン、レバノン停戦なしに最終核合意交渉に入れないと表明―トランプ氏はホルムズ海峡通行料を警告", "title_en": "Iran Refuses Final Nuclear Deal Talks Without Lebanon Ceasefire, Trump Threatens Hormuz Tolls", "summary_ja": "イランは、レバノンでの戦争が終結しない限り、米国との最終的な核合意交渉には入れないと表明した。トランプ大統領は60日以内に最終合意に至らない場合、ホルムズ海峡を通過する船舶に米国が通行料を課すと脅しをかけ、圧力を強めた。この対立は、イランの地域的利益と核交渉をめぐる外交努力が複雑に絡み合っている現状を浮き彫りにしている。", "summary_en": "Iran has stated it cannot enter final negotiations with the United States on a nuclear deal without a resolution to the ongoing war in Lebanon. President Donald Trump escalated pressure by threatening to impose American tolls on vessels passing through the Strait of Hormuz if a final agreement is not reached within 60 days. The standoff highlights the complex linkage between Iran's regional interests and ongoing diplomatic efforts over its nuclear program.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-iran-us-conflict-israel-lebanon-strikes-strait-of-hormuz-tehran-washington-peace-talks-in-switzerland-live-updates-june-21-2026/article71128366.ece", "state_media": false, "category": "政治"}, {"title_ja": "カタールがスイスでの米・イラン協議開始を確認", "title_en": "Qatar Confirms U.S.-Iran Nuclear Talks Underway in Switzerland", "summary_ja": "カタールは、仲介役として米国とイランの間接協議がスイスで始まったことを確認した。湾岸の同国は、今週初めに両国が署名した覚書に盛り込まれたすべての事項を網羅する包括的かつ永続的な合意につながることへの期待を表明した。この進展は、イランの核開発問題をめぐる長年の緊張の中で重要な外交的一歩とみられている。", "summary_en": "Qatar has confirmed the launch of indirect talks between the United States and Iran in Switzerland, acting in its role as a key mediator. The Gulf state expressed hope that the meetings would lead to a comprehensive and lasting agreement covering all aspects of a Memorandum of Understanding signed by both countries earlier this week. The development marks a significant diplomatic step amid long-standing tensions over Iran's nuclear program.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/iran-us-switzerland-talks-qatar-mediator-obbuergen-high-level-meeting-updates/article71129232.ece", "state_media": false, "category": "社会"}, {"title_ja": "国民党主席、中国が攻撃すれば台湾は反撃すると表明", "title_en": "KMT Chair Says Taiwan Would Fight Back Against Chinese Attack", "summary_ja": "中華民国国民党（KMT）の主席は、中国が台湾を攻撃した場合、台湾は軍事的に反撃すると述べた。この発言は、主要野党が自衛に関して断固たる姿勢を示したものだ。台湾と北京の間で両岸関係の緊張が続く中での発言として注目されている。", "summary_en": "Kuomintang (KMT) party chairperson stated that Taiwan would defend itself militarily if attacked by China. The remarks signal a firm stance on self-defense from the main opposition party. The statement comes amid ongoing cross-strait tensions between Taiwan and Beijing.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE1XNERaOWZNc2lBN2IwTHBiOFFJSVJzOVZQVzNqemNIZGtEQnZVZmNxSlVRSXRCM0V0ZHNFNURoTHlKOGZHVFoyS05Ibi12a29YZWpLUk1tUQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "タイ人労働者、台湾南部のオオバナイトサチ農場に第二の故郷を見つける", "title_en": "Thai Worker Finds Second Home on Water Snowflake Farm in Southern Taiwan", "summary_ja": "台湾南部のオオバナイトサチ（ウォータースノーフレーク）農場で働くタイ人出稼ぎ労働者が、故郷を離れながらも充実した生活を築いている。この特集記事は、農場を第二の故郷として感じるようになった労働者の個人的な歩みを追っている。台湾の農業分野を支える東南アジア系移住労働者の実情に光を当てた内容となっている。", "summary_en": "A Thai migrant worker has built a meaningful life working on a water snowflake farm in southern Taiwan, finding community and purpose far from home. The feature highlights the personal journey of the worker, who has come to regard the farm as a second home. The story sheds light on the experiences of Southeast Asian migrant laborers contributing to Taiwan's agricultural sector.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE9vYmpTWlh0MTBPVVhMbVJQdE40azY5ajNjZDJrOVQ0QkFmb204QWFLc2otMVZLQzdYcTFsNGxkTzVSaWI4UU04YWg1OGUyZ2hlV2pFUlhB?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "頼総統、日本とフィリピンのEEZ懸念を一蹴―中国に主張の根拠なしと主張", "title_en": "Lai Dismisses Japan-Philippines EEZ Concerns, Says China Has No Claim", "summary_ja": "台湾の頼清徳総統は、排他的経済水域（EEZ）をめぐる日本とフィリピンの懸念を退け、中国には当該海域における正当な主張の根拠がないと断言した。この発言は、海域の境界線をめぐる地域的緊張が続く中でのものである。頼総統の声明は、台湾が南シナ海における北京の拡張的な海洋権益主張と距離を置く姿勢を示している。", "summary_en": "Taiwan President Lai Ching-te has dismissed concerns raised by Japan and the Philippines regarding overlapping Exclusive Economic Zones, asserting that China holds no legitimate claim in the disputed waters. Lai's remarks come amid ongoing regional tensions over maritime boundaries in the area. His statements signal Taiwan's position in distancing itself from Beijing's expansive maritime claims in the region.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE9wWTB0QTNnbUhIY1g0bXAzeG43OGJrc2RuTm9KLTJPdmZ1UjZMdlZuQ2VHWm1SM2RjQVBkN0V0WHZxc3ZSdWs1bEItR2VHZENCM2YzYXQzTQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イタマラティ、トランプ介入を警戒も「ブラジルはベネズエラではない」と強調", "title_en": "Itamaraty Fears Trump Interference but Insists Brazil 'Is Not Venezuela'", "summary_ja": "ブラジル外務省は、ドナルド・トランプ米大統領が同国の選挙に干渉する可能性について懸念を認め、関与の兆候を注視していると明らかにした。外交官らはトランプ氏の選挙介入の意図が次第に明確になりつつあると指摘した。一方、匿名の関係者はブラジルの民主主義的基盤はベネズエラとは根本的に異なると強調し、両国を明確に区別した。", "summary_en": "Brazil's Foreign Ministry has acknowledged concerns that Donald Trump may attempt to interfere in the country's upcoming elections, saying the government is monitoring any signs of U.S. involvement. Diplomats indicated that Trump's intent to meddle in the electoral process is becoming increasingly apparent. However, an anonymous official emphasized that Brazil's democratic institutions are far more resilient than those of Venezuela, drawing a clear distinction between the two nations.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米当局「逮捕のブラジル人はCVとPCCの幹部」、しかし有罪判決に両組織との関連なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC Gangs, but Court Records Show No Link", "summary_ja": "米移民・関税執行局（ICE）は月曜日、ブラジル人のフェリペ・リナレス・デ・オリヴェイラ・デル・アキッラを逮捕し、ブラジルの二大犯罪組織CVとPCCの幹部だと主張した。しかしブラジルの裁判記録によると、同氏は麻薬密売、詐欺、恐喝で有罪判決を受けているものの、いずれの事件にも両組織への言及はない。この食い違いは、米当局が提供した情報の正確性に疑問を投げかけている。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested in the United States on Monday by ICE, with U.S. authorities claiming he was a leader of two major Brazilian criminal organizations, the CV and the PCC. However, Brazilian court records show he had prior convictions for drug trafficking, fraud, and extortion, with no mention of either gang. The discrepancy raises questions about the accuracy of information provided by U.S. immigration authorities.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ブラジル、G7文書の大半に署名せず―トランプ配慮で内容が骨抜きと批判", "title_en": "Brazil Breaks With G7, Says Summit Documents Were Shaped to Avoid Upsetting Trump", "summary_ja": "フランス南部エビアンで開催されたG7サミット2日目、ブラジルはフランス議長国が発表した5つの文書のうち2つにしか署名しなかった。ブラジル政府は、気候変動や世界保健機関（WHO）の役割といった重要課題が意図的に省かれており、トランプ大統領の拒否権行使を避けるために文書の内容が調整されたと主張した。この動きは、多国間協力をめぐるトランプ政権への対応をめぐり、G7内部の亀裂が深まっていることを浮き彫りにしている。", "summary_en": "Brazil signed only two of five documents released during the second day of the G7 summit in Évian, France, hosted by the French presidency. The Brazilian government stated that the texts were deliberately shaped to avoid a U.S. veto, leading to the omission of key issues such as climate change and the role of the World Health Organization. The move highlights growing tensions within the G7 over how to accommodate the Trump administration's positions on multilateral cooperation.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/brazil-diverges-from-most-g7-documents-says-texts-were-shaped-to-avoid-upsetting-trump.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ソコトで新たな懸念、武装集団が武器訓練を実施か", "title_en": "Fresh Fears in Sokoto as Bandits Allegedly Undergo Weapons Training", "summary_ja": "ナイジェリアのソコト州で、武装集団が武器訓練を行っているとの報告が浮上し、新たな懸念が広がっている。軍による継続的な掃討作戦にもかかわらず、武装勢力が再編・強化を図っている可能性を示す内容となっている。住民や安全保障の専門家は、この動きが同地域における武装集団による暴力の激化につながることを危惧している。", "summary_en": "New concerns have emerged in Sokoto, Nigeria, after reports that armed bandits are allegedly undergoing weapons training in the region. The claims suggest the criminal groups may be regrouping and strengthening their capabilities despite ongoing military offensives targeting them. Security analysts and residents fear the development could signal an escalation of banditry-related violence in the area.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/889571-fresh-fears-in-sokoto-as-bandits-allegedly-undergo-weapons-training.html", "state_media": false, "category": "政治"}, {"title_ja": "カツィナ州知事、生きたままの家畜輸出禁止と国内食肉加工強化を発表", "title_en": "Katsina Governor Plans to Ban Live Animal Exports, Boost Local Meat Processing", "summary_ja": "ナイジェリアのカツィナ州知事ディコ・ラッダ氏は、生きたままの家畜を輸出する慣行を廃止する計画を発表した。州政府は代わりに地域内での食肉加工能力を強化し、付加価値をつけた上で輸出する方針を目指す。この取り組みはサプライチェーンを州内に留めることで地域経済の活性化を図るものだ。", "summary_en": "Katsina State Governor Dikko Radda has announced plans to halt the export of livestock in its raw, live form. Instead, the state aims to develop local meat processing capacity to add value before export. The move is intended to boost the regional economy by retaining more of the supply chain within Katsina.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/889558-katsina-to-stop-live-animal-exports-radda.html", "state_media": false, "category": "経済"}, {"title_ja": "APC、カノ州連邦選挙区補欠選挙で勝利", "title_en": "APC Wins Kano Federal Constituency Bye-Election", "summary_ja": "ナイジェリアのカノ州で行われたダワキン・クドゥ／ワラワ連邦選挙区の補欠選挙で、与党・全進歩会議（APC）のラビウ・シュアイブ候補が当選を宣言された。今回の勝利により、APCは連邦下院での議席をさらに増やした。結果はプレミアム・タイムズ・ナイジェリアが報じた。", "summary_en": "Rabiu Shuaibu of the All Progressives Congress (APC) has been declared the winner of the Dawakin Kudu/Warawa Federal Constituency bye-election in Kano State, Nigeria. The victory adds another seat to the ruling APC's representation in the House of Representatives. The result was reported by Premium Times Nigeria.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/889555-apc-wins-kano-reps-bye-election.html", "state_media": false, "category": "政治"}, {"title_ja": "バンス副大統領、米イラン協議が早ければ日曜にも開始と表明", "title_en": "Vance Says US-Iran Nuclear Talks Could Start as Early as Sunday in Switzerland", "summary_ja": "中国国営メディアの新華社・CGTNは、バンス米副大統領が米国とイランの直接協議について早ければ日曜日にも開始される可能性があると述べたと報じている。同メディアによれば、トランプ大統領の特使スティーブ・ウィトコフ氏と娘婿のジャレッド・クシュナー氏がすでにスイスに到着したとされる。協議はイランの核開発問題を中心に行われる見通しだという。", "summary_en": "Xinhua/CGTN reports that US Vice President JD Vance stated that direct talks between the United States and Iran could begin as early as Sunday. The state-controlled outlet reports that US presidential envoy Steve Witkoff and Jared Kushner, President Trump's son-in-law, have already arrived in Switzerland ahead of the negotiations. The talks are expected to focus on Iran's nuclear program.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-20/news-1O8s4IRBYQg/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "ナイロビのアーティスト「カーシュ」、廃棄布地で独自の肖像画を制作", "title_en": "Nairobi Artist Kharsh Transforms Discarded Fabric Scraps Into Stunning Portraits", "summary_ja": "新華社／CGTNによると、ナイロビを拠点とするアーティスト、キスウィリ（通称カーシュ）は、サステナビリティとストーリーテリングを軸にした独自の芸術活動を展開しているという。同メディアの報道では、彼の肖像画やイラストはナイロビ各地の仕立て屋や工房、工場から集めた布の切れ端を組み合わせて制作されているとされる。国営メディアは、彼の作品が繊維廃棄物を意義ある芸術へと転換する創造的なアプローチ let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  const sb=document.getElementById("d-state");
  sb.style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-21 13:23 JST";
renderTabs();renderList();
</script>
