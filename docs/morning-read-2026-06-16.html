cs may view as deflecting scrutiny from both governments' own rights records.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2146673", "state_media": true, "category": "経済"}, {"title_ja": "プーチン大統領、電子運送状が貨物追跡に貢献すると表明", "title_en": "Putin Says E-Waybills Will Improve Goods Traceability in Russia", "summary_ja": "ロシア国営メディアTASS/RTは、プーチン大統領が貨物の追跡性向上を目的とした電子運送状の導入を支持したと伝えている。ロシアのニキーチン運輸相は、船が水門を通過する際に積荷の内容が今もなお手書きで台帳に記録されていると指摘したと同メディアは報じている。国営メディアによれば、このプロセスのデジタル化はロシアの貨物追跡インフラ近代化に向けた重要な一歩と見なされているという。", "summary_en": "Russian state media TASS/RT reports that President Putin has backed the introduction of electronic waybills as a measure to improve cargo traceability. Russian Transport Minister Andrey Nikitin reportedly noted that cargo manifests are still recorded by hand in logbooks when vessels pass through gateways. State media reports that digitizing this process is seen as a key step toward modernizing Russia's freight tracking infrastructure.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2146669", "state_media": true, "category": "政治"}, {"title_ja": "EUがロシア人ジャーナリストやブロガーに制裁、作家マルツェフ氏も対象", "title_en": "EU Sanctions Russian Journalists and Bloggers, Including Writer Igor Maltsev", "summary_ja": "国営メディアのTASS・RTによると、欧州連合（EU）は複数のロシア人ジャーナリストやブロガーに対して新たな制裁を科したと伝えている。RT報道によれば、作家のイーゴリ・マルツェフ氏も今回のブラックリストに加えられたとされる。EUはこれらのメディア関係者を親クレムリン的な情報発信と結びついているとみているもようだ。", "summary_en": "TASS/RT reports that the European Union has placed sanctions on a number of Russian journalists and bloggers. State-controlled outlet RT reports that writer Igor Maltsev was among those blacklisted in the latest round of EU measures. The sanctions reportedly target media figures that the EU associates with spreading pro-Kremlin narratives.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2146667", "state_media": true, "category": "政治"}, {"title_ja": "EUがロシア・CIS諸国の80団体・個人を制裁リストに追加", "title_en": "EU Adds 80 Russian and CIS Entities let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  const sb=document.getElementById("d-state");
  sb.style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-16 06:44 JST";
renderTabs();renderList();
</script>
