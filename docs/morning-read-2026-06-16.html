GVZb2w3WEZ2X0xIMnBqY2F6VFFLSlVKVHpTV0lJOFU3?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "「失うものは何もない」とアドフォカート監督、クラサオのW杯初出場に向けて語る", "title_en": "Curacao have nothing to lose on World Cup debut, says coach Advocaat", "summary_ja": "クラサオ代表のディック・アドフォカート監督は、チームが初めてFIFAワールドカップに出場するにあたり、「失うものは何もない」と語った。カリブ海の小国クラサオはアンダードッグとして大会に臨み、監督は選手たちに恐れず戦うよう促している。予選突破だけですでに歴史を作ったクラサオは、サッカー最大の舞台で存在感を示すことを目指している。", "summary_en": "Curacao head coach Dick Advocaat says his team has nothing to lose as they prepare for their first-ever FIFA World Cup appearance. The small Caribbean nation is embracing the occasion as underdogs, with Advocaat encouraging a fearless approach to the tournament. Making history simply by qualifying, Curacao aim to make the most of their debut on football's biggest stage.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiqAFBVV95cUxNOVY0eUg0a1hGLTRETGtGMjFWLXFGX2JnbmNLSHUwUmdvZ3ROcjY5QURrdkUzcE9tR1hGWkg4aFB0bWJQekpVcFRxakZKNnZXRi1ndnhDdjEzMk1UTmhYTDlqdEttR2VKZzU1S1pkVlM4VUp0QmVsZjNHX215enFHS1VLQzJsY2dscDZzSW1DX2tOR2xTQ0JobzVTSVIxWktMTERGM2xPcGw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "日本、テキサスでの激戦でオランダと2-2の引き分け", "title_en": "Japan Battle Back to Draw 2-2 with Netherlands in Texas Thriller", "summary_ja": "日本はテキサスで行われたオランダとの国際親善試合で、2-2の引き分けに持ち込んだ。一時リードを許した日本代表だったが、粘り強く2ゴールを奪い試合を振り出しに戻した。この結果は、日本にとって国際舞台での競争力を示すものとなった。", "summary_en": "Japan fought back to earn a 2-2 draw against the Netherlands in an exciting match held in Texas. The Japanese side showed resilience after going behind, scoring twice to level the contest. The result marks a competitive performance for Japan in the international friendly fixture.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMirAFBVV95cUxPeTVlbFNOb1pQOURjakxWVHVrSzc5N19JaDdZeE5seG5Bd3YyN0VJUmVBNEZFSWczaVRYa1hqOW1pQldiQU5BSDFiRWdJcFBCNDIxcFhiVlRJYTVGUTYwZFZyQmw1cnd4bFlTeEdOYXY5Zm9MQmtjYjVxTlZ5S2tWOE0tNkdUZmJMbmJGWWdPemdWLS1mVjNhVVNwdU5lVDE1RkYzNGx2VEg1ajlz?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ロシアがウクライナに大規模攻撃、11人死亡と宗教的建造物に被害", "title_en": "Russia Launches Massive Barrage on Ukraine, Killing 11 and Damaging Religious Site", "summary_ja": "ロシアはウクライナに対して大規模なミサイル・ドローン攻撃を実施し、少なくとも11人が死亡した。ウクライナ当局によると、攻撃により宗教的な建造物にも被害が生じた。今回の攻撃は、両国間の継続する紛争における最新の激化事例の一つとなっている。", "summary_en": "Russia carried out a large-scale missile and drone attack on Ukraine, resulting in at least 11 deaths. The strikes also caused damage to a religious landmark, according to Ukrainian officials. The barrage represents one of the latest escalations in the ongoing conflict between the two nations.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMinwFBVV95cUxOdWp3RXVfeXJxWmlqVTRDbXU1dDRjX3JxUnU0b0t1Y0VJMVJBOGFHVjBSX1RjQjhma1hjVnNDc2N5b0ZCS1N0SGxRcU5KTnVEM1lzbVA3WkhLZHgxdkkxcWhfVTVuZXY0V1lyM2dHaFkxOVBEN2o4a1dLX1g1dWdxMkJwaGxjbEpDYVVQYW1oN1d5V1FxaE95VWk5RDdOek0?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "米イランが暫定合意、世界株式市場が急騰し原油価格は下落", "title_en": "Global Stocks Surge, Oil Prices Fall as US and Iran Reach Tentative Deal", "summary_ja": "米国とイランが紛争終結に向けた暫定合意に達したことを受け、世界各地の株式市場が大幅に上昇した。中東地域の地政学的リスクの低下を反映し、原油価格は下落した。この合意により、投資家の間で経済の安定化と地域緊張緩和への期待が高まっている。", "summary_en": "Stock markets around the world rallied sharply after the United States and Iran announced a tentative agreement to end their conflict. Oil prices declined in response to the news, reflecting reduced geopolitical risk in the Middle East. The deal has raised investor optimism about economic stability and easing tensions in the region.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMimgFBVV95cUxOeEpBS3hYell3T214YXpEUUJXUmFJSXY5MVA4WFlHaG5XbjNLdnVsQVZLTHYwN3lGS0tMUGdGOG9YSTNZY3hjQklBX0t2NGx1VTRrQUpnTVhjX0NYbmZlSjk5RW13TFpYZXNUVVd6c3JUeVVsTjdta0dKa3l6TklwVjBWSVZHVDc0dnJLR3o5bldSbmlSeGR4bTNn?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "ノルウェー皇太子妃の長男、レイプ罪で懲役4年の判決", "title_en": "Son of Norway's Crown Princess Sentenced to 4 Years for Rape", "summary_ja": "ノルウェーのメッテ＝マリット皇太子妃の長男が、レイプ罪で懲役4年の判決を受けた。この判決はノルウェー王室関係者に関わる重大な司法判断として注目を集めている。被告の王室との関係から、本件は国内外で広く報道された。", "summary_en": "The eldest son of Norway's Crown Princess Mette-Marit has been sentenced to four years in prison for rape. The verdict marks a significant legal outcome involving a member of the Norwegian royal family's extended circle. The case drew widespread media attention due to the high-profile nature of those connected to the accused.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMisAFBVV95cUxPLUdJamZfWjlaYlhzSDVyXzUxUXRwd2dPbU1FVnVvY2dKYlc1SklqRGZfU2ZuNndDUFd4cXNYQlZ6dUVuOXdfZjZBeEdWOTdRVnR1Y2t6T3RjNFFyRHpaVnRFWXRPRi1TQllEUF9SSUZrMjV6eXZtWnRUZTViT0RVcEx5RXZjeGoxdHJXYjdlQmZTbzBnakJFUXFDNmhuX1hya2lXS3VpYk9QNUQxekw1eg?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イラン核合意後も石油・ガス供給の正常化には数カ月かかる可能性、専門家が警告", "title_en": "Oil and Gas Supplies Could Take Months to Normalize After Iran Deal, Experts Say", "summary_ja": "エネルギー専門家らは、イランとの核合意が成立した場合でも、石油・ガスの供給が正常水準に戻るまでには数カ月かかる可能性があると警告している。イラン産石油の輸出が国際市場に再統合されるプロセスは複雑であり、供給回復には時間を要する見通しだ。制裁解除と生産増強が進む移行期間中、市場は引き続き不安定な動きを示す可能性がある。", "summary_en": "Energy experts warn that oil and gas supplies may take several months to return to normal levels even after a potential Iran nuclear deal is reached. The gradual nature of supply recovery reflects the complexities of reintegrating Iranian oil exports into global markets. Markets could see continued volatility during the transition period as sanctions are lifted and production ramps up.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiqwFBVV95cUxPQ01SeVl0b2JpX21nWTRsTXZ2LUotS01rYWdlT3lQTTNEYVlQVFpFWS13OE1tNnNPYlVhOXo3U0ozZjRIX0hEdWZaa1A3dmxqOUZ1YU54aDREX2dCcFpYZFRhdmdrT3k4ZU5BTjJfVWxjR1VQTmhnVXE0QlVJRzZZbjB1anl6OFV5ZS1KZ3I2TlJuM3NjSTJoaVFLeXQxRmtVV2xIQ1NRc3dRTWs?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "イラン戦争終結に向け暫定合意、トランプ大統領が海上封鎖の停止を命令", "title_en": "Tentative Deal Reached to End Iran War as Trump Orders Halt to US Naval Blockade", "summary_ja": "APの報道によると、イランとの戦争を終結させるための暫定合意に達したとされる。トランプ大統領はこの合意の一環として、米海軍による海上封鎖の停止を命じた。交渉は現在も続いており、合意の詳細は引き続き明らかになりつつある。", "summary_en": "A tentative agreement has been reached to bring an end to the war with Iran, according to a report from the Associated Press. President Trump has ordered a stop to the US naval blockade as part of the developing deal. Details of the agreement are still emerging as negotiations continue.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMijwFBVV95cUxQdVZrMms1bUJyekVvUnptMmhBSE9sLUFRT05xSTAyci1SaEdXSUhXTjNLWEt6Ry1qX1k5Z2ROeXZNUkFIYTJsWkFYRzdSWXQ4M294ZHRLcXU2RmJEVzZPNmNwd2ZacWMzVFdJdW5Bb2wybFZpV2g1bTBQY1FaRTBneHgxSVZ2cVkxall4QU9nWQ?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "イランをめぐる戦争終結に向けた合意の可能性：知っておくべきこと", "title_en": "What to Know About a Possible Deal to End the Iran War", "summary_ja": "イランが関与する紛争を終結させる可能性のある合意に向けて、外交的な取り組みが進められている。潜在的な合意は国際社会の注目を集めており、関係各国が解決に向けた条件を検討している。交渉の詳細は現在も進展中であり、中東地域の安定に重大な影響を及ぼす可能性がある。", "summary_en": "Diplomatic efforts are underway to negotiate a potential deal that could bring an end to the ongoing conflict involving Iran. The possible agreement is drawing international attention as key parties weigh the terms and conditions required for a resolution. Details of the negotiations remain developing, with significant implications for regional stability in the Middle East.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMipgFBVV95cUxNZ3k4T0R4Z2dkeGdxZTdVU094cmd6SU9QYkVvcEpyWmNNXzZOT19mQThpeEktSW9XcURhM1dSdk1EVzBTMjZDeXRpZzlrX19JVFVZdC1SYmwxbl9FemlBNnM2bjNRNnpndjdZZUJEQ1Fkb29RMXIwYnkzN3JKcUN4alVLeV9adTRMTk1Rb3NWQ1dEYTU2MGdlSEZjcDNWS21WNDR6QTBB?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "トランプ氏とパキスタン、イランとの核合意が日曜日にも署名可能と表明―テヘランはさらなる時間が必要と示唆", "title_en": "Trump and Pakistan Say Iran Nuclear Deal Could Be Signed Sunday, but Tehran Wants More Time", "summary_ja": "トランプ大統領とパキスタン当局者は、イランとの核合意が早ければ日曜日にも署名できると楽観的な見方を示した。しかしテヘラン側は、合意の最終化にはさらなる時間が必要だとの姿勢を示している。この相反するタイムラインは、イラン核問題をめぐる外交交渉において依然として緊張が続いていることを浮き彫りにしている。", "summary_en": "President Trump and Pakistani officials have expressed optimism that a nuclear deal with Iran could be signed as soon as Sunday. However, Tehran is signaling that more time is needed before any agreement can be finalized. The diverging timelines highlight ongoing tensions in the diplomatic negotiations over Iran's nuclear program.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiogFBVV95cUxOVzF0UGwtZENyQ1lBUXMzLWpRXzU2Vnl4eS1DLTg2MWhUd0oya3llOWFQZ1RqVXlXd3owVEpaV09GelVadWw1c3pSUHAtMHAtS1VXdHhBYnlfbnlIZjZDbjRGTFV4VTk1bFNxZEFzQnk0SlNpaDNrd3Zqc3lFQzRuTXQ5M2oxb214SHA0ZUl6V1h6a2pGSk9jU0o3U0RtYktDRGc?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "スイス国民投票、右派の人口1000万人上限案を否決", "title_en": "Swiss Voters Reject Right-Wing Proposal to Cap Population at 10 Million", "summary_ja": "スイスで実施された国民投票で、人口を1000万人に制限しようとする右派の提案が早期の開票結果により否決されたことが明らかになった。この提案は民族主義的な団体が支持し、移民抑制と人口増加の歯止めを目的としていた。今回の結果は、スイス国民がこのような厳格な人口制限措置を支持しないことを示している。", "summary_en": "Swiss voters have rejected a right-wing initiative that sought to cap the country's population at 10 million people, according to early results. The proposal, backed by nationalist groups, aimed to limit immigration and population growth in Switzerland. The rejection signals that Swiss voters were unwilling to support such restrictive demographic measures.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMipwFBVV95cUxOeG55MTd6Q3NkTlpYMWZKU3RVY01uMXozMDZOQkx1UncyUG5OZmh0UkxrLUtSZkxwMW5oblFySnJ3SzYwaWVlMDhFdUxsWG1xWGhCRGNpT1dEVzFlSW5lVDBCZ2ZjVno2OV9ubnpsNXAyRm1kdHdkemNwWEptREl3T2szeC1HaW1YbkhFS0ZuTHo1TU52c2lVc1ZJVWNTRmo3aHUyWnktNA?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "G7サミット前夜、ジュネーブで抗議者と警察が衝突", "title_en": "Protesters Clash With Police in Geneva Ahead of G7 Summit in France", "summary_ja": "フランスで開催されるG7サミットを前に、スイスのジュネーブで抗議者と警察が衝突した。デモ参加者たちは主要国首脳会議への反対を訴えるため街頭に繰り出した。当局はサミットに向けた警備を強化する中、混乱の収拾に当たった。", "summary_en": "Protesters in Geneva, Switzerland clashed with police ahead of the upcoming G7 summit being held in nearby France. Demonstrators took to the streets to voice opposition ahead of the high-profile gathering of world leaders. Police responded to manage the unrest as security preparations intensified across the region.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMinAFBVV95cUxQeUdrT2xQQmxEV05KTjZnY3JIeC1qRzczWHc4eWhodGpmMUhXdGJoN3F4c1kxVElLbEU5UDB3WlVReFhSa2xseVVfNVRzRHBZamdiNll4Z3ZTMXVBdG5sbUwxeXp2cXVhSEVXeFUzblRVRnAxNjRBQVRKV0JSVVQtUWVuVUk4RHlQZTNLSWszUVNFY3NFcWpMeDdqV3M?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "フォックス、220億ドルでストリーミング大手ロクを買収へ", "title_en": "Fox to Acquire Streaming Pioneer Roku in $22 Billion Deal", "summary_ja": "フォックス・コーポレーションは、ストリーミングプラットフォームのロク（Roku）を約220億ドルで買収すると発表した。この買収により、フォックスはロクの広く普及したストリーミングハードウェアおよびソフトウェアプラットフォームと自社のコンテンツ資産を統合し、ストリーミング分野への大規模な参入を果たすことになる。今回の取引はストリーミング業界の競争環境を大きく塗り替えるとみられている。", "summary_en": "Fox Corporation has announced a deal to acquire streaming platform Roku for approximately $22 billion. The acquisition would mark a major expansion for Fox into the streaming sector, combining its content assets with Roku's widely used streaming hardware and software platform. The deal is expected to significantly reshape the competitive landscape of the streaming industry.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiiwFBVV95cUxQZGx1V0l2bkdiVmlub0dxMzN5R3d4NndWMmxtX2x1TmQ3bXpPZVIzam83cGFmbjRBVmNXRTlXWURlYTRBbDNXNzJ3MzYyTkstd0wzTjE1RlhkUEpnZ1NCeUpiNUpLM3JIaGZBV3VvUTRVLWNlUVRyelAwYjBWYy12d0stcnBKVGVlZUxn?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "米イラン合意発表後、原油価格が下落し株価が上昇", "title_en": "Oil Prices Fall and Shares Jump After US-Iran Deal Announced", "summary_ja": "米国とイランの間で合意が発表されたことを受け、原油価格が下落し、世界の株式市場が上昇した。トランプ大統領は、この合意により戦略的に重要なホルムズ海峡が再開通すると述べた。この動きは、エネルギー市場の不安定要因となっていた中東情勢の緊張緩和につながる可能性を示している。", "summary_en": "Oil prices dropped and global stock markets rallied following the announcement of a deal between the United States and Iran. US President Donald Trump stated that the agreement includes the reopening of the strategically vital Strait of Hormuz waterway. The development signals a potential easing of tensions in the Middle East that had been contributing to energy market volatility.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/c6217106px6o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "ノルウェー皇太子妃の息子、強姦2件で有罪判決・禁固4年", "title_en": "Norwegian Crown Princess's Son Sentenced to 4 Years for Rape", "summary_ja": "ノルウェーの皇太子妃マッテ・マリットの息子、29歳のマリウス・ボルグ・ホイビー氏が強姦2件で有罪となり、禁固4年の判決を受けた。同氏は王室と近しい立場にあるため、この裁判は国内外で大きな注目を集めた。この判決はノルウェー王室にとっても深刻な打撃となっている。", "summary_en": "Marius Borg Høiby, the 29-year-old son of Norway's Crown Princess Mette Marit, has been found guilty on two counts of rape and sentenced to four years in prison. The case drew significant public attention due to Høiby's connection to the Norwegian royal family. The verdict marks a serious legal consequence for a figure closely tied to the Scandinavian monarchy.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/cly9d10l5p4o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "ロシアの攻撃でキーウの歴史的大聖堂が炎上、11人死亡", "title_en": "Russian strikes kill 11 and set historic Kyiv cathedral ablaze", "summary_ja": "ロシアによるキーウへの攻撃で11人が死亡し、歴史的な大聖堂が火災に見舞われた。これに対抗する形で、ウクライナはモスクワ南方のロシア・トゥーラ市にドローン攻撃を行い、3人が死亡した。今回の応酬は、両国間の紛争がさらに激化していることを示している。", "summary_en": "Russian strikes on Kyiv killed 11 people and set a historic cathedral on fire. In a retaliatory move, a Ukrainian drone attack on the Russian city of Tula, south of Moscow, killed three people. The exchange marks another escalation in the ongoing conflict between the two nations.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/c4gy037gjz3o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "ブラジルでロープ未装着のまま橋から飛び降りさせられた女性が死亡", "title_en": "Brazil Woman Dies After Instructors Fail to Attach Rope Before Bridge Jump", "summary_ja": "ブラジルで、ロープジャンプのインストラクターたちが安全ロープを取り付けないまま女性を橋から飛び降りさせ、女性が死亡した。事件を受け、3人の男が逮捕された。この悲劇は、同国における極限スポーツ運営の安全管理に深刻な問題があることを浮き彫りにしている。", "summary_en": "A woman in Brazil died after rope-jumping instructors helped her leap from a bridge without properly attaching the safety cord. Three men have been arrested in connection with the fatal incident. The tragedy highlights serious safety concerns surrounding extreme sports operations in the country.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/c5yz4xelnveo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "米ミュージシャンのオリバー・ツリー、ブラジルのヘリコプター衝突事故で死亡と推定", "title_en": "US Musician Oliver Tree Among Six Presumed Dead in Brazil Helicopter Crash", "summary_ja": "アメリカのシンガーソングライター、オリバー・ツリーが日曜日にブラジルのリオデジャネイロ上空で発生したヘリコプター衝突事故で死亡したと推定されている。この事故では乗客乗員合わせて6名が死亡したとみられる。オリバー・ツリーは独特の音楽スタイルとインターネット上での高い人気で知られていた。", "summary_en": "American singer-songwriter Oliver Tree is among six people presumed dead following a helicopter collision over Rio de Janeiro, Brazil on Sunday. The crash claimed all occupants aboard, according to reports from the BBC. Oliver Tree was known for his eclectic music style and viral internet presence.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/cqj1dd5rgnzo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "韓国スターバックス、「戦車の日」マーケティング批判受けスタッフ向け歴史教育のため一時閉店へ", "title_en": "South Korea Starbucks to Close Stores for Staff History Lesson After 'Tank Day' Backlash", "summary_ja": "韓国のスターバックスは、物議を醸したマーケティングキャンペーンへの批判を受け、スタッフへの歴史教育のため店舗を一時閉鎖することを発表した。同チェーンは、1980年の光州虐殺の記念日に合わせて「戦車の日」と銘打ったプロモーションを実施し、民主化運動への弾圧に軍の戦車が使用された歴史を軽視していると広く非難された。同社は謝罪し、再発防止に向けた措置を講じるとしている。", "summary_en": "South Korea's Starbucks will temporarily shut its stores to give staff a history lesson following public backlash over a controversial marketing campaign. The chain had promoted a 'Tank Day' event coinciding with the anniversary of the 1980 Gwangju massacre, in which military tanks were used against pro-democracy protesters. The promotion was widely condemned as insensitive, prompting the company to apologize and take corrective action.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/ckg4n3pyjg9o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "「イエメンのスパイダーマン」が火山口に転落し死亡", "title_en": "'Spider-Man of Yemen' Dies After Falling Into Volcanic Crater", "summary_ja": "「イエメンのスパイダーマン」として知られるアル・カカ・イブン・アンタル氏が、火山口への転落により死亡した。地元当局によると、同氏は安全装備を一切使用せずに火山口の壁を登ろうとしていた際に転落したという。そのニックネームは、イエメンの険しい地形でのフリークライミングの卓越した技術に由来している。", "summary_en": "Al-Qaqa Ibn Antar, known as the 'Spider-Man of Yemen,' has died after falling into a volcanic crater. Local authorities say he was attempting to scale the crater walls without any safety equipment when the fatal accident occurred. The daring climber had gained his nickname for his remarkable free-climbing abilities across Yemen's rugged terrain.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/c39yvz9w8k3o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "ワールドカップ観戦中に韓国人インフルエンサーへ人種差別的ジェスチャーを行った男性が謝罪", "title_en": "Man Apologises for Making Racist Gesture at Korean Influencer During World Cup Match", "summary_ja": "メキシコで行われたワールドカップの試合中、ある男性が韓国人インフルエンサーに対して人種差別的なジェスチャーをしている姿が撮影された。男性は目尻を引っ張る差別的な行為を行い、その映像が広く拡散された。この事件は強い非難を呼び、スポーツ観戦における人種差別問題について改めて議論を巻き起こしている。", "summary_en": "A man has publicly apologised after being filmed making a racist gesture toward a South Korean influencer during a World Cup match in Mexico. He was caught on camera pulling the corners of his eyes in a derogatory imitation targeting the influencer. The incident sparked widespread condemnation and renewed discussions about racism in sports venues.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/cddly65p76no?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "中国、影響力のある地下教会の指導者2人を拘束", "title_en": "China Detains Two Leaders of Influential Underground Church", "summary_ja": "中国当局は、著名な地下キリスト教会「秋雨聖約教会」の指導者2人と信者30人以上を拘束した。逮捕は日曜礼拝の最中に行われた。同教会はこれまでも、国家公認の宗教団体への登録を拒否したとして当局による取り締まりを受けてきた。", "summary_en": "Chinese authorities detained two leaders and more than 30 members of Early Rain Covenant Church, a prominent underground Christian congregation. The arrests took place midway through a Sunday service. The church has previously faced government crackdowns due to its refusal to register with state-sanctioned religious bodies.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/ce9582vlm83o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "南アフリカのテレビスター「ジャブジャブ」、誘拐と発砲疑惑で逮捕", "title_en": "South African TV Star Jub Jub Arrested Over Alleged Kidnapping and Gunfire Incident", "summary_ja": "南アフリカの人気テレビタレント、モレモ・「ジャブジャブ」・マアロハニェが、交際相手をめぐるトラブルでタクシー運転手を誘拐したとして逮捕された。同氏は運転手を車内に閉じ込め、その方向に向けて発砲したとして告発されている。この事件は著名なテレビスターのファンに衝撃を与えている。", "summary_en": "South African television personality Molemo 'Jub Jub' Maarohanye has been arrested on allegations of kidnapping a taxi driver amid a girlfriend dispute. He is accused of trapping the man inside a vehicle and firing a gun in his direction. The incident has shocked fans of the prominent TV star.", "source": "BBC", "tier": "public", "link": "https://www.bbc.com/news/articles/crelw9xwvr7o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "ベルリン生まれのレバークーゼンFWマザ、ワールドカップでアルジェリア代表を選択", "title_en": "Ibrahim Maza: Berlin-born Leverkusen forward chooses Algeria for World Cup", "summary_ja": "バイエル・レバークーゼンに所属するFWイブラヒム・マザは、ベルリン生まれでありながら、北米で開催されるワールドカップでアルジェリア代表としてプレーすることを選んだ。ドイツ、アルジェリアを含む複数の国籍から代表を選択できる立場にあったマザは、父の出身国を選んだ。彼の決断は、多文化的背景を持つ現代サッカー選手が直面するアイデンティティの問題を浮き彫りにしている。", "summary_en": "Ibrahim 'Ibo' Maza, a Bayer Leverkusen forward born and raised in Berlin, has chosen to represent Algeria at the upcoming World Cup in North America. Despite being eligible to play for Germany, Algeria, or another nation, Maza opted for his father's homeland. His decision highlights the complex identity choices faced by multicultural athletes in modern football.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/ibrahim-maza-algeria-s-multicultural-kid-from-berlin/a-77435644?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "エルニーニョが東南アジアの生活を脅かす", "title_en": "El Niño Threatens Livelihoods Across Southeast Asia", "summary_ja": "エルニーニョ現象による高温・乾燥した気候が東南アジアに広がり、米やパーム油の生産に深刻な影響を与えている。燃料・食料・交通費の上昇により、各家庭の生活費負担が増大している。農業に依存する数百万人の生活基盤が、この気候現象によって大きな脅威にさらされている。", "summary_en": "El Niño is bringing hotter and drier conditions to Southeast Asia, disrupting rice and palm-oil production across the region. Households are facing mounting pressure from rising fuel, food, and transport costs. The climate phenomenon poses a significant threat to the livelihoods of millions who depend on agriculture.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/el-nino-threatens-livelihoods-in-southeast-asia/a-77559356?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "米国・イラン和平合意が署名へ、期待と反発が交錯", "title_en": "US-Iran Peace Deal Set for Signing, Sparking Celebration and Controversy", "summary_ja": "米国とイランの間で和平合意が今週中に署名される予定と報じられ、国際社会から大きな注目を集めている。合意のニュースだけで、外交的前進を歓迎する人々の間に祝賀ムードが広がる一方、両国内では強い反発と政治的対立も生じている。合意が最終的に成立するかどうかはまだ不透明であり、和平への期待が崩れる可能性も残されている。", "summary_en": "A reported peace deal between the United States and Iran is expected to be signed this week, generating significant global attention. The announcement alone has triggered celebrations among those hopeful for diplomatic progress, while also provoking backlash and political infighting on both sides. The outcome remains uncertain, as the hopes for peace could still be derailed before any agreement is finalized.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/us-iran-reported-peace-deal-sparks-both-relief-and-anger/a-77560563?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "イラン戦争：米イラン合意で世界エネルギー危機は近く解消されるか", "title_en": "Iran War: Could a US-Iran Deal Soon Resolve the Global Energy Crisis?", "summary_ja": "米国とイランの間で外交的合意が成立すれば、現在の紛争に終止符が打たれ、戦略的に重要なホルムズ海峡が再開通する可能性がある。これにより、世界的な深刻なエネルギー不足の緩和が期待される。しかし専門家は、船舶輸送の再開やインフラの復旧には数カ月を要するため、原油価格と供給の安定化には時間がかかると警告している。", "summary_en": "A potential diplomatic agreement between the United States and Iran could bring an end to the ongoing conflict and reopen the strategically vital Strait of Hormuz. Such a deal would help ease the severe global energy crunch that has disrupted oil supplies worldwide. However, experts caution that oil prices and supply chains may take several months to fully stabilize as shipping resumes and damaged infrastructure is restored.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/iran-war-will-the-global-energy-crisis-end-soon/a-77554342?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "経済"}, {"title_ja": "ドイツ代表、7対1の勝利に2300万人以上が視聴", "title_en": "23 Million Viewers Watch Germany's 7-1 World Cup Victory Over Curacao", "summary_ja": "ドイツ代表がキュラソーを7対1で下した試合に、2300万人以上の視聴者が集まった。この圧倒的な勝利はドイツサッカーにとって印象的な一幕となった。一方、ドイツのシュタインマイヤー大統領はインドネシアへの公式訪問を開始した。", "summary_en": "Germany's national football team drew an audience of over 23 million viewers with their dominant 7-1 victory over Curacao. The match marked a standout moment for German football as the team showcased strong form. Meanwhile, German President Frank-Walter Steinmeier has begun an official state visit to Indonesia.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-news-23-million-tune-in-for-world-cup-win/live-77557116?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "ホルムズ海峡の機雷：商業航行への危険性と除去方法", "title_en": "Mines in the Strait of Hormuz: How Dangerous Are They for Shipping?", "summary_ja": "ホルムズ海峡に残存する機雷が、この重要な水路の商業航行再開を遅らせている。世界有数の石油輸送路であるこの海峡において、機雷は通過する船舶に深刻なリスクをもたらしている。専門家たちは、これらの兵器の危険性と安全な除去方法について分析を進めている。", "summary_en": "Naval mines remaining in the Strait of Hormuz are delaying the reopening of the critical waterway to commercial shipping. The mines pose significant risks to vessels transiting one of the world's most important oil trade routes. Experts are examining how dangerous these weapons are and what methods can be employed to safely clear them.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/mines-in-the-strait-of-hormuz-how-dangerous-are-they/a-76847658?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "G7首脳がフランスに集結、イランとウクライナの紛争と世界経済に対処", "title_en": "G7 Leaders Convene in France to Address Wars in Iran, Ukraine and Global Economy", "summary_ja": "世界の主要7カ国の首脳がフランスでG7サミットに集結し、イランとウクライナの紛争が議題の中心となっている。米国はイランにおける平和実現を約束し、他のG7首脳たちは慎重ながらも楽観的な見方を示している。サミットでは、国際社会が直面する差し迫った世界経済の課題についても議論が行われる予定だ。", "summary_en": "Leaders of the world's richest nations have gathered in France for the G7 summit, where conflicts in Iran and Ukraine are topping the global agenda. The United States has pledged to pursue peace in Iran, drawing cautious optimism from fellow G7 members. The summit also focuses on pressing global economic challenges facing the international community.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/g7-leaders-gather-to-grapple-with-wars-global-economy/live-77556967?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "地熱エネルギー、米国の家庭向けに拡大の可能性", "title_en": "Geothermal Energy Poised to Scale Up for US Homes", "summary_ja": "地熱技術の進歩と米国における継続的な政治的支援により、クリーンエネルギー産業が大きく成長する条件が整いつつある。地中の熱を利用する地熱システムは、住宅の冷暖房において信頼性の高い低排出の代替手段として注目されている。投資と政策支援が維持されれば、米国の家庭への普及が大幅に進む可能性があると専門家らは見ている。", "summary_en": "Advances in geothermal technology and continued political backing in the United States are creating conditions for the clean energy sector to grow significantly. Geothermal systems, which tap heat from the Earth, offer a reliable and low-emission alternative for residential heating and cooling. Industry experts see a strong opportunity to expand adoption across American households if investment and policy support are maintained.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/the-potential-of-geothermal-energy-for-us-homes/a-77098244?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "モディ首相がスロバキアを訪問、貿易・投資関係の強化を目指す", "title_en": "Modi Visits Slovakia to Boost Trade and Investment Ties", "summary_ja": "インドのナレンドラ・モディ首相がブラティスラバを訪問し、1993年のチェコスロバキア「ビロード離婚」以来、インドの首脳によるスロバキア訪問としては初めてとなった。今回の訪問は、両国間の貿易・投資関係の強化を目的としている。モディ首相の訪問は、インドが中欧諸国との経済的パートナーシップを深めようとする広範な取り組みの一環とみられる。", "summary_en": "Indian Prime Minister Narendra Modi visited Bratislava, marking the first visit by an Indian leader to Slovakia since the country's peaceful split from the Czech Republic in 1993. The visit aims to strengthen bilateral trade and investment relations between India and Slovakia. Modi's trip reflects India's broader effort to deepen economic partnerships with Central European nations.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/india-s-modi-in-slovakia-seeks-to-strengthen-trade-and-investment-ties/a-77553213?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "ホルムズ海峡再開に向けたイラン和平合意に世界の指導者が楽観的姿勢", "title_en": "World Leaders Express Optimism Over Iran Peace Deal to Reopen Strait of Hormuz", "summary_ja": "ホルムズ海峡を国際航行に再開させる可能性のある和平合意のニュースを受け、世界各国の指導者たちが歓迎の意を表明した。国際社会では広く楽観的な見方が広がっているものの、合意の詳細な内容はまだ確認されていない点が多い。ドイチェ・ヴェレは引き続き最新情報を追っている。", "summary_en": "World leaders have welcomed news of a potential peace deal that would reopen the Strait of Hormuz to international shipping. The agreement has drawn broad international optimism, though many key details have yet to be confirmed. Deutsche Welle continues to follow developments as more information becomes available.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/iran-updates-world-leaders-express-optimism-for-peace-deal/live-77552154?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "米国とイランが暫定合意、ホルムズ海峡の開放へ", "title_en": "U.S. and Iran Reach Preliminary Framework, Opening Strait of Hormuz", "summary_ja": "米国とイランは暫定的な枠組み合意に達し、ホルムズ海峡が国際航行に向けて再開される見通しとなった。この合意は世界の市場や地域の緊張緩和に安堵をもたらしているが、最も難しい問題は今後の交渉に先送りされている。専門家らは、核心的な外交課題が未解決のまま残っており、合意の持続性には不透明感が漂うと警告している。", "summary_en": "The United States and Iran have agreed on a preliminary framework deal that is expected to reopen the Strait of Hormuz to international shipping. While the agreement brings significant relief to global markets and regional tensions, it deliberately defers the most contentious issues to future rounds of negotiations. Observers warn that the hardest diplomatic challenges remain unresolved, leaving the durability of the deal uncertain.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/15/world/iran-war-trump-us-deal", "state_media": false, "category": "政治"}, {"title_ja": "ウクライナ、EU加盟交渉を開始へ―長い道のりの第一歩", "title_en": "Ukraine Begins EU Accession Talks Despite Long Road Ahead", "summary_ja": "ウクライナは欧州連合（EU）への加盟に向けた正式な交渉を開始する見通しで、加盟実現への重要な節目を迎える。しかし、加盟プロセスには広範な改革の実施やEU全加盟国の全会一致による承認が必要であり、専門家は道のりの長さと複雑さを指摘している。交渉開始はキーウにとって象徴的かつ政治的な勝利を意味するが、正式加盟の実現にはなお数年を要するとみられる。", "summary_en": "Ukraine is set to formally begin negotiations to join the European Union, marking a significant milestone in its bid for membership. However, officials and analysts caution that the accession process is lengthy and complex, requiring extensive reforms and unanimous approval from all EU member states. The start of talks represents a symbolic and political victory for Kyiv, even as full membership remains years away.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/15/world/europe/ukraine-eu-membership.html", "state_media": false, "category": "政治"}, {"title_ja": "ロシアのミサイル・ドローン攻撃後、キーウの歴史的正教会大聖堂が炎上", "title_en": "Historic Orthodox Cathedral Burns in Kyiv After Russian Missile and Drone Attack", "summary_ja": "ロシアがキーウにミサイルとドローンによる攻撃を行い、ペチェルスク修道院にある歴史的な正教会の大聖堂が火災に見舞われた。この修道院はウクライナとロシア両国の正教徒にとって深く崇敬される聖地である。司教によると、燃える教会から多くの聖なる品々が無事に救出されたという。", "summary_en": "Russia launched a missile and drone attack on Kyiv, causing a historic Orthodox cathedral at the Pechersk monastery to catch fire. The monastery is a deeply revered site for both Ukrainian and Russian Orthodox faiths. A bishop confirmed that many sacred holy items were successfully recovered from the burning church.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/15/world/europe/ukraine-kyiv-russia-attack-orthodox-cathedral.html", "state_media": false, "category": "社会"}, {"title_ja": "ケベック州はいかにして教会を離れ、安楽死の世界的先進地域となったか", "title_en": "How Quebec Became the World Leader in Assisted Dying After Leaving the Church", "summary_ja": "かつて熱心なカトリック社会だったカナダのケベック州は、安楽死に関する教会の禁止令を拒絶し、劇的な文化的変容を遂げた。同州は今や世界における安楽死の先進地域として台頭しており、多くの住民が自らの死に対する自己決定を個人の権利と捉えている。この変化は、過去数十年にわたってケベックの社会的価値観を塗り替えてきた広範な世俗化の流れを反映している。", "summary_en": "Quebec, once a deeply Roman Catholic society, has undergone a dramatic cultural transformation, rejecting the church's prohibition on euthanasia. The province has emerged as a global leader in assisted dying, with residents increasingly viewing control over one's own death as an individual right. This shift reflects a broader secularization that has reshaped Quebec's social values over recent decades.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/15/world/canada/quebec-medically-assisted-dying-catholic.html", "state_media": false, "category": "社会"}, {"title_ja": "英国、16歳未満の子どものソーシャルメディア利用禁止を発表", "title_en": "Britain Plans to Ban Children Under 16 from Social Media", "summary_ja": "英国のキア・スターマー首相は、16歳未満の子どもがソーシャルメディアを利用することを禁止する計画を発表した。この方針は、オーストラリアなど他国が導入した同様の規制に続くもので、未成年者のオンライン保護を目的としている。禁止措置の執行方法や実施の詳細については、今後の法案で明らかにされる見通しだ。", "summary_en": "UK Prime Minister Keir Starmer announced plans to prohibit children under the age of 16 from using social media platforms. The policy follows similar measures enacted in Australia and other countries aimed at protecting young users online. Details of enforcement and implementation are expected to be outlined in upcoming legislation.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/15/world/europe/uk-social-media-children.html", "state_media": false, "category": "政治"}, {"title_ja": "ウクライナ、AIを活用してロシアの危険なドローンを撃墜", "title_en": "How Ukraine Uses AI to Intercept Deadly Russian Drones", "summary_ja": "ウクライナは、ロシアのドローンを迎撃するAI搭載システムを開発し、現代戦における自律型技術の積極的な活用を示している。これらのシステムは、現在進行中の紛争で収集された膨大な実戦データを用いて訓練されている。この技術的進展は、戦場の実情が軍事用AI技術の開発・展開をいかに加速させているかを浮き彫りにしている。", "summary_en": "Ukraine has developed AI-powered interceptor systems to shoot down Russian drones, showcasing the country's rapid embrace of autonomous technologies in modern warfare. These systems are trained on vast amounts of real wartime data collected during the ongoing conflict. The advancement highlights how battlefield conditions are accelerating the development and deployment of military AI applications.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/15/world/europe/ukraine-russia-war-ai.html", "state_media": false, "category": "政治"}, {"title_ja": "終わりなきコロンビアの麻薬戦争の実態", "title_en": "Inside Colombia's Never-Ending Drug War", "summary_ja": "コロンビアで歴史的な和平合意が締結されてから10年が経過した現在も、武装勢力による凄惨な暴力が続いている。これらの組織はジャングルでの従来型戦闘に加え、ドローンを活用した新たな戦術を取り入れて進化している。この紛争の長期化は、コロンビアが永続的な平和と安定を実現する上での深刻な課題を浮き彫りにしている。", "summary_en": "A decade after Colombia's landmark peace deal, armed groups continue to wage deadly violence across the country. These factions have evolved their tactics, combining traditional jungle combat with modern drone warfare. The ongoing conflict highlights the deep challenges Colombia faces in achieving lasting peace and stability.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/15/world/americas/colombia-drug-war-violence-petro.html", "state_media": false, "category": "政治"}, {"title_ja": "ノルウェー皇太子妃の息子、レイプ罪で有罪判決・禁固4年", "title_en": "Son of Norway's Crown Princess Convicted of Rape, Sentenced to 4 Years", "summary_ja": "ノルウェーのメッテ＝マリット皇太子妃の息子、マリウス・ボルグ・ホイビー氏がレイプ罪で有罪判決を受け、禁固4年の刑を言い渡された。裁判は、母親である皇太子妃が性犯罪者ジェフリー・エプスタインとの過去の関係をめぐって批判にさらされる中で行われた。王室の高い知名度もあり、この事件はノルウェー国内で大きな注目を集めている。", "summary_en": "Marius Borg Hoiby, the son of Norway's Crown Princess Mette-Marit, has been convicted of rape and sentenced to four years in prison. The trial unfolded amid separate scrutiny of his mother over her past ties to convicted sex offender Jeffrey Epstein. The case has drawn significant public attention given the royal family's prominence in Norway.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/15/world/europe/marius-borg-hoiby-verdict-norway.html", "state_media": false, "category": "社会"}, {"title_ja": "多くのイラン国民、戦争終結合意に安堵の声", "title_en": "Many Iranians Express Relief Over Agreement to End the War", "summary_ja": "数か月にわたる紛争を経て、イランの一般市民は和平合意のニュースを歓迎し、広く安堵の声が上がっている。一方、反政府勢力はこの合意に失望感を示した。こうした対照的な反応は、戦争の終結をめぐるイラン社会の深い分断を浮き彫りにしている。", "summary_en": "Following months of conflict, ordinary Iranians have welcomed news of a peace agreement, expressing widespread relief. However, opposition groups have voiced disappointment with the deal. The contrasting reactions highlight deep divisions within Iranian society over the resolution of the war.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/15/world/middleeast/iran-reaction-cease-fire-deal.html", "state_media": false, "category": "政治"}, {"title_ja": "スイス、人口1000万人上限の国民投票を否決", "title_en": "Switzerland Votes Down Referendum to Cap Population at 10 Million", "summary_ja": "スイスの有権者は、国内人口を1000万人に制限することを目的とした国民投票を否決した。2000年以降、スイスの居住者数は25%以上増加しており、移民制限を求める声が高まっていた。提案は住宅の手頃さや環境の持続可能性を訴える形で提示されたが、最終的に過半数の支持を得られなかった。", "summary_en": "Swiss voters have rejected a referendum that sought to limit the country's population to 10 million people. The measure was driven by concerns over rapid population growth, as Switzerland's resident population has risen by more than 25% since 2000. Proponents framed the initiative around housing affordability and environmental sustainability, but it ultimately failed to win majority support.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/14/world/europe/switzerland-population-cap-referendum.html", "state_media": false, "category": "社会"}, {"title_ja": "人質合意の膠着打開でパレスチナ人がガザ北部へ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を二分する軍事ゾーンを避難民が通過することを許可し、パレスチナ人がガザ北部へ徒歩で帰還し始めた。この動きは、人質解放をめぐる交渉の行き詰まりが打開されたことを受けて実現した。今回の越境は、ガザ地区における人道状況の重要な進展を示すものとなっている。", "summary_en": "Israel has permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The move came after a breakthrough in negotiations over hostage releases resolved a prolonged impasse. The crossing marks a significant development in the humanitarian situation within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治"}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示唆", "title_en": "China's Vanke Reports Massive Loss, Deepening Real Estate Crisis Fears", "summary_ja": "中国の大手不動産会社・万科（バンケ）が巨額の損失を報告し、同国の不動産危機がさらに広がっていることが鮮明となった。今回の結果は、経営難に陥った他のデベロッパーにとどまらず、中国の不動産セクター全体の安定性に深刻な疑問を投げかけている。市場関係者は、中国政府が事態の悪化を防ぐために介入するかどうかを注視している。", "summary_en": "Chinese property giant Vanke has reported a massive financial loss, signaling that the country's real estate crisis continues to spread beyond earlier troubled developers. The results raise serious questions about the stability of China's broader property sector. Analysts and investors are now watching closely to see whether the Chinese government will intervene to prevent further contagion.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会"}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性は長期間にわたり単独で拘束され、約8か月間を地下トンネルの中で過ごしたという。この事実は、人質たちが置かれていた過酷な身体的・精神的状況を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The disclosures highlight the severe physical and psychological conditions endured by those held captive.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会"}, {"title_ja": "バルト海海底ケーブル切断疑惑、NATOが初の協調対応を実施", "title_en": "NATO Mounts First Coordinated Response to Suspected Baltic Sea Cable Sabotage", "summary_ja": "バルト海でまた別の海底ケーブルが切断され、重要インフラへの意図的な妨害工作とみられるこの事態に対し、NATOが初の協調対応を開始した。西側軍事同盟が海底通信・エネルギーケーブルへの脅威に組織的に対処するのは今回が初めてであり、重大な対応強化を意味する。この事件は、深海インフラが国家または非国家主体による攻撃に対していかに脆弱であるかを改めて浮き彫りにした。", "summary_en": "NATO launched its first coordinated response after another undersea cable was severed in the Baltic Sea, suspected to be part of a deliberate sabotage campaign against critical infrastructure. The alliance's reaction marks a significant escalation in how Western military organizations are addressing threats to vital submarine communication and energy links. The incident highlights growing concerns over the vulnerability of deep-sea infrastructure to state or non-state actors.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/suspected-sabotage-of-deep-sea-cable-triggers-first-nato-led-response-337119ba", "state_media": false, "category": "政治"}, {"title_ja": "ルワンダ支援の反政府勢力、コンゴの避難民集積都市ゴマに侵攻", "title_en": "Rwanda-Backed Rebels Seize Congo's Goma Amid Gunfire and Mass Displacement", "summary_ja": "ルワンダの支援を受けるM23反政府勢力が、コンゴ民主共和国東部の主要都市ゴマに侵攻し、政府軍を制圧した。市内では銃撃戦と砲撃が相次ぎ、住民たちは恐怖に包まれている。国連当局者は、100万人を超える避難民がすでにゴマ市内に集中しており、深刻な人道危機が生じていると警告した。", "summary_en": "Rwanda-backed M23 rebels have entered Goma, a key city in eastern Democratic Republic of Congo, after overrunning Congolese government troops. Residents reported widespread gunfire and shelling as the rebel forces moved into the city. United Nations officials warned that more than one million displaced people are now sheltering inside Goma, raising urgent humanitarian concerns.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/rwanda-backed-rebels-enter-congo-safe-haven-city-aid-hub-09fdccb8", "state_media": false, "category": "社会"}, {"title_ja": "和平合意から8年、コカイン資金の武装集団がコロンビアを揺るがす", "title_en": "Cocaine-Funded Gangs Destabilize Colombia Eight Years After Historic Peace Deal", "summary_ja": "コロンビアでFARCゲリラを武装解除させた歴史的な和平合意から8年が経過したにもかかわらず、コカイン資金で運営される強力な武装集団が依然として市民への攻撃を続けている。政府がFARCの解体後に生じた権力の空白を埋められなかったことが、暴力の温床となっている。専門家らは、国家の不作為によって犯罪組織がかつての紛争地帯に根を張り、不安定化が進んでいると警告している。", "summary_en": "Eight years after Colombia's landmark peace accord sidelined the FARC rebel group, powerful cocaine-funded militias continue to launch attacks against civilians across the country. The ongoing violence reflects the Colombian state's failure to fill the power vacuum left by the dismantled rebel organization. Analysts warn that government inaction has allowed criminal gangs to entrench themselves in former conflict zones, fueling instability.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/cocaine-funded-gangs-shake-colombia-years-after-peace-pact-a45a28da", "state_media": false, "category": "社会"}, {"title_ja": "イタリア、サウジアラビアの次世代戦闘機開発計画参加を支持とメローニ首相が表明", "title_en": "Italy Backs Saudi Arabia Joining UK-Italy-Japan Stealth Fighter Program", "summary_ja": "イタリアのジョルジャ・メローニ首相は、サウジアラビアがグローバル戦闘航空プログラム（GCAP）に参加することを支持すると表明した。GCAPは英国、イタリア、日本の3カ国が共同で進める防衛プロジェクトで、2035年までに超音速能力を持つ新型ステルス戦闘機の実用化を目指している。サウジアラビアが加われば、この多国間防衛計画は大幅に拡大することになる。", "summary_en": "Italian Prime Minister Giorgia Meloni has expressed support for Saudi Arabia joining the Global Combat Air Programme (GCAP), a trilateral defense initiative. The program, already involving the UK, Italy, and Japan, aims to develop a new stealth fighter jet with supersonic capability by 2035. Saudi Arabia's potential inclusion would mark a significant expansion of the multinational defense project.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/italy-supports-saudi-arabia-joining-gcap-fighter-jet-program-pm-meloni-says-bbd9cec1", "state_media": false, "category": "社会"}, {"title_ja": "フーシ派の停戦誓約にもかかわらず、海運各社は紅海ルートに慎重姿勢", "title_en": "Shippers Remain Cautious on Red Sea Routes Despite Houthi Ceasefire Pledge", "summary_ja": "世界大手3社のコンテナ船会社は、フーシ派が船舶への攻撃停止を誓約した後も、引き続き紅海ルートの回避方針を維持している。各社はガザ情勢の不安定さや地域全体の緊張を継続的なリスクの要因として挙げている。安全保障環境が改善されるまで、主要海運各社は喜望峰を回る迂回ルートの利用を続ける見通しだ。", "summary_en": "The world's three largest container shipping operators are maintaining their avoidance of Red Sea routes despite Houthi pledges to halt attacks on vessels. The companies cite ongoing instability in Gaza and broader regional tensions as reasons for continued concern. Until the security situation stabilizes, major shippers are expected to keep using longer alternative routes around the Cape of Good Hope.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/shippers-wary-of-red-sea-routes-despite-houthi-pledge-to-end-targeting-4dde35c2", "state_media": false, "category": "政治"}, {"title_ja": "金正恩、洪水復興に30万人の若者動員——西洋・韓流文化の影響遮断が狙いか", "title_en": "Kim Jong Un Mobilizes 300,000 Young North Koreans to Counter Western Cultural Influence", "summary_ja": "北朝鮮の金正恩総書記は、10代から20代の若者約30万人を「突撃隊」として洪水復興作業に動員していることが明らかになった。この措置は、ハリウッド映画や韓国の K-POPなど外来文化の影響が若者世代に浸透するのを防ぐための戦略とみられている。労働を愛国的義務として美化することで、金総書記は次世代への思想的忠誠心の強化を図っている。", "summary_en": "North Korean leader Kim Jong Un has drafted approximately 300,000 teenagers and young adults into a 'shock brigade' focused on flood reconstruction efforts. The move is widely seen as a strategy to keep the country's youth occupied and insulated from the growing influence of Hollywood films and South Korean K-pop. By glorifying their labor as patriotic duty, Kim aims to reinforce ideological loyalty among a generation increasingly exposed to outside culture.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/kim-jong-un-is-doing-everything-he-can-to-keep-north-koreas-youth-in-line-0866a1de", "state_media": false, "category": "政治"}, {"title_ja": "コロンビア、強制送還受け入れに合意―関税対立が終結", "title_en": "Trump Says Colombia Agrees to Accept Deportees, Ending Tariff Standoff", "summary_ja": "トランプ大統領は、コロンビアが強制送還される移民の受け入れに同意したと発表し、両国間で緊張していた関税をめぐる対立が解消された。トランプ氏は第2期政権の最優先課題として移民取り締まりを掲げており、その姿勢を鮮明にしている。米移民・関税執行局（ICE）は日曜日だけで900人以上を逮捕するなど、強制送還に向けた積極的な取り組みを進めている。", "summary_en": "President Trump announced that Colombia has agreed to accept deported migrants, resolving a brief but intense tariff standoff between the two nations. The agreement comes as Trump has made immigration enforcement a central priority of his second term. Immigration and Customs Enforcement (ICE) conducted more than 900 arrests in a single day on Sunday, signaling an aggressive push on deportations.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/trump-says-colombia-will-face-25-tariffs-amid-fight-over-deportation-flights-e32dc497", "state_media": false, "category": "政治"}, {"title_ja": "世界の学校への暴力的攻撃が40%急増、調査で判明", "title_en": "Violent Attacks on Schools Worldwide Surge 40%, Study Finds", "summary_ja": "教育を攻撃から守る世界連合（GCPEA）の新たな報告書によると、2024年から2025年にかけて教育機関への攻撃が40%急増し、83カ国で8,556件以上の事件が記録された。この期間に少なくとも1万600人の生徒と教職員が殺害、負傷、誘拐、または逮捕された。事件件数が最も多かったのはコロンビア、コンゴ民主共和国、エチオピア、ハイチ、パレスチナ、ウクライナであった。", "summary_en": "A new report by the Global Coalition to Protect Education from Attack (GCPEA) reveals that attacks on educational institutions surged 40% in 2024 and 2025, with over 8,556 recorded incidents across 83 countries. At least 10,600 students and staff were killed, injured, abducted, or arrested during this period. The highest numbers of incidents were recorded in Colombia, the Democratic Republic of the Congo, Ethiopia, Haiti, Palestine, and Ukraine.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/15/global-attacks-killing-abductions-education-pupils-staff-up-40pc-gcpea-study", "state_media": false, "category": "社会"}, {"title_ja": "ロンドン区、シエラレオネのファーストレディが借りていた公営住宅を差し押さえ", "title_en": "London council seizes social housing flat rented by Sierra Leone's first lady", "summary_ja": "ロンドンのサザーク区は、シエラレオネのファーストレディであるファティマ・ジャッベ＝ビオが借りていたウォルワースの2ベッドルームの公営住宅を差し押さえた。彼女は賃貸契約を保持したまま、年の大半をフリータウンの大統領公邸で過ごしていたとされる。この賃貸契約は昨年タイムズ紙が報じ、公営住宅の不正利用として注目を集めていた。", "summary_en": "Southwark Council in London has repossessed a two-bedroom social housing flat in Walworth previously rented by Fatima Jabbe-Bio, the first lady of Sierra Leone. Despite holding the tenancy, she spent much of the year living at the presidential lodge in Freetown. The tenancy had been reported by The Times last year, prompting scrutiny over the misuse of public housing resources.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/society/2026/jun/11/london-council-seizes-social-housing-flat-sierra-leone-first-lady", "state_media": false, "category": "政治"}, {"title_ja": "トランプ政権の入国制限、気候変動被害が最も深刻な国々を標的に", "title_en": "Trump's Immigration Crackdown Targets Nations Most Vulnerable to Climate Disasters", "summary_ja": "英紙ガーディアンの分析により、トランプ政権が入国制限を課している39カ国の大部分が、気候変動による災害で移住を余儀なくされるリスクが最も高い国々であることが明らかになった。トランプ政権が化石燃料の拡大政策を推進する一方で、これらの国々では嵐や洪水、干ばつの深刻化により数百万人が故郷を追われている。専門家は、気候危機を悪化させてきた米国が、その被害を最も受けた人々を締め出すという矛盾を批判している。", "summary_en": "A Guardian analysis finds that most of the 39 countries facing US entry restrictions under the Trump administration are among those most vulnerable to climate-driven displacement. As Trump pushes policies expanding fossil fuel use, millions in these nations are being forced to flee due to worsening storms, floods, and droughts. Critics argue the policy creates a cruel contradiction, shutting out the very people most harmed by the climate crisis the US has helped fuel.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/us-news/2026/jun/10/trump-administration-immigrants-climate-crisis", "state_media": false, "category": "社会"}, {"title_ja": "アマゾンやソニーなど大手企業、DRCの反政府勢力に資金提供する鉱物を調達か　調査報告", "title_en": "Global Brands Likely Sourced Minerals Funding DRC Rebels, Investigation Finds", "summary_ja": "国際NGO「グローバル・ウィットネス」の調査により、アマゾン、エリクソン、ソニーを含む大手企業が、コンゴ民主共和国（DRC）の武装勢力M23が支配する鉱山から産出されたコルタンを調達していた可能性が高いことが明らかになった。コルタンはスマートフォンや電子機器に使用される重要鉱物で、M23は性的暴力や即決処刑、拷問など多くの残虐行為で告発されている。各企業はサプライチェーンを通じて知らぬ間にこの鉱物を取得したとされている。", "summary_en": "A Global Witness investigation found that major companies including Amazon, Ericsson, and Sony likely sourced coltan linked to the M23 militia in the Democratic Republic of the Congo. The mineral, used in smartphones and electronics, was allegedly smuggled from mines occupied by the rebel group, which is accused of sexual violence, summary executions, and torture. The companies are said to have acquired the minerals unknowingly through their supply chains.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/10/coltan-drc-m23-global-witness-investigation", "state_media": false, "category": "経済"}, {"title_ja": "ケニアで米国向けエボラ隔離施設への抗議デモ中に男性が射殺される", "title_en": "Man shot dead by police during protest against US Ebola quarantine facility in Kenya", "summary_ja": "ケニア警察は、ナイロビから約190キロ離れたナニュキで、米国向けエボラ隔離施設の建設計画に反対するデモ隊に発砲し、男性1人が死亡した。抗議活動の主催者パトリック・ワホメ氏がロイター通信に語ったところによると、男性は頭部への銃撃により死亡した。この事件は、米国の隔離施設設置計画に対する地元住民の怒りが高まる中で発生した。", "summary_en": "Kenyan police shot and killed a man during a protest in Nanyuki, approximately 120 miles from Nairobi, against a proposed US Ebola quarantine facility. The victim died from a gunshot wound to the head, according to protest organizer Patrick Wahome, who spoke to Reuters. The incident occurred amid growing anger among local residents over US plans to establish the quarantine center in the region.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/09/man-shot-during-protest-against-proposed-us-ebola-quarantine-facility-in-kenya", "state_media": false, "category": "社会"}, {"title_ja": "米ミュージシャンのオリバー・ツリー（32歳）、ブラジルのヘリコプター墜落事故で死亡", "title_en": "US Musician Oliver Tree, 32, Killed in Helicopter Crash Over Rio de Janeiro", "summary_ja": "アメリカのオルタナティブミュージシャンでインターネット上でも人気を誇るオリバー・ツリーが、ブラジルのリオデジャネイロ上空でヘリコプター2機が衝突する事故により32歳で死亡した。日曜日の朝に発生したこの事故で、2機に搭乗していた6人全員が市西部への墜落により死亡した。ツリーが犠牲者の一人であることは、複数のブラジルメディアが報じている。", "summary_en": "American alternative musician and internet personality Oliver Tree died at age 32 after two helicopters collided over Rio de Janeiro, Brazil on Sunday morning. All six people aboard the two aircraft were killed when they crashed in the city's western zone. Multiple Brazilian media outlets confirmed Tree was among the victims.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/14/musician-oliver-tree-32-killed-in-helicopter-crash-in-brazil", "state_media": false, "category": "IT"}, {"title_ja": "90代の母親、ドミニカ共和国での再審で娘殺害の正義を望む", "title_en": "Mother in her 90s hopes for justice in Dominican Republic retrial over daughter's 2019 murder", "summary_ja": "英国ケンブリッジシャー在住で90代のシャーリー・ファースさんは、今週ドミニカ共和国で始まる再審により、娘の殺害事件がようやく解決されることを願っている。娘のリンゼイ・デ・フェリス氏（64歳）は成功した作家で、2019年12月にドミニカ共和国北西部の自宅近くの浅い墓から遺体が発見された。再審は、殺害に関与した者たちの有罪判決に向けた新たな希望をもたらしている。", "summary_en": "Shirley Firth, a Cambridgeshire mother in her 90s, is hoping a retrial opening this week in the Dominican Republic will finally bring justice for her murdered daughter Lindsay de Feliz. Lindsay, 64, was a successful author whose body was found in a shallow grave near her home in the north-west of the Dominican Republic in December 2019. The retrial offers renewed hope that those responsible for her death will be convicted.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/uk-news/2026/jun/14/mother-hopes-to-get-justice-for-murdered-daughter-in-retrial-in-dominican-republic", "state_media": false, "category": "社会"}, {"title_ja": "ジャマイカのビーチアクセス活動家、海岸の民営化阻止へ提訴", "title_en": "Jamaican Campaigners Head to Court Over Beach Access Rights", "summary_ja": "ジャマイカの活動家たちが、国内海岸線の民営化に対して法的措置を起こした。大型ホテルチェーンへの海岸譲渡が観光客や外部投資家を潤す一方、地元住民の生活や余暇、健康を損なっていると主張している。活動家たちは植民地時代の法律に異議を唱え、ジャマイカ国民が永久に自由かつ無制限にビーチを利用できる権利の確立を求めている。", "summary_en": "Activists in Jamaica are taking legal action to challenge the privatisation of the country's coastline, which they say benefits hotel chains and tourists at the expense of local communities. They are fighting a colonial-era law and demanding permanent, unrestricted public access to beaches. Campaigners argue that ceding shorelines to private investors deprives Jamaicans of beaches they depend on for their livelihoods, leisure, and health.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/news/2026/jun/14/jamaica-beach-access-court-fight-privatisation-coast", "state_media": false, "category": "政治"}, {"title_ja": "ジャマイカの海岸アクセス危機：「自分たちのものを守るために戦わされるべきではない」", "title_en": "Jamaica's Beach Access Crisis: Activists Fight Privatization of Coastal Land", "summary_ja": "ジャマイカの活動家たちは、リゾートや富裕層企業による海岸線の私有化に対抗するため、法廷闘争に乗り出している。セントアン州マミーベイで育ったデヴォン・テイラー氏は、かつて子どもたちが泳ぎ、漁師が地元住民と取引し、職人がアーモンドの木陰で土産物を彫っていた活気ある海辺の暮らしを振り返る。批判者たちはこの観光モデルを「プランテーション観光」と呼び、富裕層に利益を集中させる一方で、地元のジャマイカ人を自国の海岸から締め出していると訴えている。", "summary_en": "Jamaican activists and campaigners are taking to court to challenge the privatization of the island's coastline, arguing that resorts and elite businesses have cut off ordinary citizens from beaches they have historically used freely. Devon Taylor recalls the vibrant community life once centered on Mammee Bay in St Ann, where children swam, fishers traded, and vendors worked under almond trees. Critics describe the prevailing tourism model as 'plantation tourism' that concentrates benefits among the wealthy while displacing local Jamaicans from their own shores.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/news/2026/jun/14/jamaica-beach-access-crisis-plantation-tourism", "state_media": false, "category": "社会"}, {"title_ja": "トランプ大統領、米軍がベネズエラ系ギャング「トレン・デ・アラグア」幹部を殺害と発表", "title_en": "Trump: US Strike Kills Tren de Aragua Gang Leader in Venezuela", "summary_ja": "トランプ大統領は、米軍がベネズエラの犯罪組織「トレン・デ・アラグア」の幹部エクトル・ルステンフォード・ゲレロ・フローレスを標的攻撃で殺害したと発表した。作戦は米国南方軍がベネズエラの協力を得て実施したとされ、トランプ氏は「迅速かつ致死的な攻撃」と表現した。同氏はこの組織を「地球上で最も凶悪なテロ組織の一つ」と称している。", "summary_en": "President Trump announced that the US military killed Hector Rusthenford Guerrero Flores, a leader of the Venezuelan street gang Tren de Aragua, in a targeted strike. Trump stated the operation was carried out by US Southern Command with assistance from Venezuela, describing it as a 'swift and lethal kinetic strike.' He referred to the gang as one of the most dangerous terrorist organizations in the world.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/us-news/2026/jun/12/trump-venezuela-tren-de-aragua-leader-killed", "state_media": false, "category": "政治"}, {"title_ja": "ワールドカップ優勝の秘訣：富よりも移民受け入れが効果的", "title_en": "How to Win the World Cup: Wealth Helps, but Immigration Helps More", "summary_ja": "ワールドカップの成功要因を分析した研究によると、国の経済力は有利に働くものの、移民に対する開放性がより強力な勝利の予測因子であることが示された。移民を積極的に受け入れる国は、より広い人材プールや多様な戦術スタイルから恩恵を受けている。この知見は、国際サッカーの成功をめぐる純粋なナショナリズム的な見方に疑問を投げかけるものだ。", "summary_en": "Research into World Cup success suggests that national wealth gives countries an advantage in football, but openness to immigration proves to be an even stronger predictor of victory. Countries that welcome immigrants benefit from a broader pool of talent, diverse playing styles, and greater athletic depth. The findings challenge purely nationalist narratives around international football success.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/10/how-to-win-the-world-cup", "state_media": false, "category": "社会"}, {"title_ja": "ワールドカップとFIFAは常にスキャンダルと混乱に悩まされてきた", "title_en": "The World Cup and FIFA Have Always Been Plagued by Scandal", "summary_ja": "FIFAワールドカップは、近年の報道を超えた長い論争と混乱の歴史を持っている。大会を運営するFIFA自体も、その存在を通じて汚職、政治的対立、倫理的問題に繰り返し巻き込まれてきた。エコノミスト誌は、スキャンダルが現代特有の異常事態ではなく、世界最大のスポーツイベントに繰り返し見られる特徴であることを検証している。", "summary_en": "The FIFA World Cup has a long history of controversy and strife that extends well beyond recent headlines. FIFA, the governing body that administers the tournament, has itself been repeatedly mired in corruption, political disputes, and ethical failures throughout its existence. The Economist examines how scandal is not a modern aberration but rather a recurring feature of the world's most-watched sporting event.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/10/the-world-cup-has-always-been-beset-by-scandal-and-strife", "state_media": false, "category": "政治"}, {"title_ja": "強権指導者たちがヨーロッパを嫌うのは誤りである", "title_en": "Why Strongmen Are Wrong to Loathe Europe", "summary_ja": "エコノミスト誌は、アメリカ・中国・ロシアの権威主義的指導者たちがヨーロッパの合意形成型政治を軽視するのは誤りだと論じている。合意に基づく政治は非効率に見えても、安定性・正統性・長期的な強靭さをもたらす。一方、強権支配は判断の誤りと制度的脆弱性を生みやすいと指摘する。", "summary_en": "The Economist argues that authoritarian leaders in America, China, and Russia are mistaken in their contempt for Europe's consensus-based political model. Despite being dismissed as weak or inefficient, consensual politics offers stability, legitimacy, and long-term resilience. Strongman rule, by contrast, tends to produce poor decisions and systemic fragility.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/09/why-strongmen-are-wrong-to-loathe-europe", "state_media": false, "category": "政治"}, {"title_ja": "戦争が政治的美学となるとき", "title_en": "When War Becomes a Political Aesthetic", "summary_ja": "エコノミスト誌の防衛担当編集者シャシャンク・ジョシが、なぜ武力紛争が政治文化や映像表現において奇妙な引力を持つのかを考察する。戦争がその軍事的文脈を超え、政治的な美学やレトリックのツールとして利用される現象を分析している。現代の政治言説において武力衝突をロマン化・美学化することの意味と影響について問いを投げかける内容となっている。", "summary_en": "The Economist's defence editor Shashank Joshi explores why conflict exerts a strange and powerful pull on political culture and imagery. The analysis examines how war is increasingly used as an aesthetic and rhetorical tool in politics, beyond its purely military context. The piece raises questions about the implications of romanticizing or aestheticizing armed conflict in modern political discourse.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/08/the-war-room-newsletter-when-war-becomes-a-political-aesthetic", "state_media": false, "category": "政治"}, {"title_ja": "トランプ氏がキューバを救う可能性—実利主義が打開策になるか", "title_en": "Donald Trump Could Be the Man to Save Cuba", "summary_ja": "エコノミスト誌は、キューバの共産主義政権と米国の強硬派双方のイデオロギー的硬直さが、70年にわたってキューバ国民を苦しめてきたと指摘する。トランプ氏の取引重視・非イデオロギー的な外交スタイルが、人道危機を緩和する現実的な合意への扉を開く可能性があると論じる。原則論が繰り返し失敗してきた中で、打算的な取引こそが突破口になり得るという主張だ。", "summary_en": "The Economist argues that decades of rigid ideological stances—from both Cuba's communist government and U.S. hardliners—have prolonged Cuban suffering. It suggests that Trump's transactional, non-ideological approach to foreign policy could open the door to a pragmatic deal that eases Cuba's humanitarian crisis. A cynical bargain, the article implies, may succeed where principled positions have repeatedly failed.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/02/donald-trump-could-be-the-man-to-save-cuba", "state_media": false, "category": "社会"}, {"title_ja": "戦争の性質はいかに変わったか：防衛担当編集者としての8年間を振り返る", "title_en": "How the Character of War Has Changed: Eight Years as Defence Editor", "summary_ja": "英誌エコノミストの防衛担当編集者シャシャンク・ジョシ氏が、8年間の在任期間を通じて戦争の性質がいかに根本的に変化したかを振り返る。テクノロジーや戦術の変容、地政学的ダイナミクスの変化が現代の紛争をどう塗り替えたかを考察する。過去10年間における軍事分野の重要な変化を包括的に分析した内容となっている。", "summary_en": "Shashank Joshi, outgoing defence editor at The Economist, reflects on how warfare has fundamentally evolved over his eight-year tenure. His retrospective examines shifting technologies, tactics, and geopolitical dynamics that have reshaped modern conflict. The analysis offers a sweeping overview of the defining military developments of the past decade.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/02/the-war-room-newsletter-how-the-character-of-war-has-changed", "state_media": false, "category": "政治"}, {"title_ja": "「オオカミが来た」と叫ぶ中道派：ポピュリストへの誤った対抗策", "title_en": "Centrists Crying Wolf: The Wrong Way to Beat Populists", "summary_ja": "中道派の政治家たちは、有権者が切迫性を感じていない問題について脅威を誇張することで、自らの信頼性を損なうリスクを冒している。このアプローチは、中道派がポピュリストを批判する際に槍玉に挙げる「困難な現実の否定」と本質的に変わらない。エコノミスト誌は、困難な問題に正直かつ真摯に向き合うことこそが、ポピュリズムに対抗するより効果的な戦略だと主張している。", "summary_en": "Centrist politicians risk undermining their own credibility by exaggerating threats and crying wolf about problems that voters do not perceive as urgent. This approach mirrors the very denial of hard realities that centrists accuse populists of, ultimately eroding public trust. The Economist argues that honest, direct engagement with difficult issues is a more effective strategy for defeating populist movements.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/05/26/centrists-crying-wolf", "state_media": false, "category": "社会"}, {"title_ja": "パンデミック後にホームスクーリングが急増", "title_en": "Home-Schooling Surges in the Post-Pandemic Era", "summary_ja": "新型コロナウイルスのパンデミックを契機に、子どもを自宅で教育する親が増加している。ロックダウン中に経験した柔軟な学習環境に魅力を感じたり、従来の学校教育に不満を持つ家庭が、ホームスクーリングを長期的な選択肢として採用するケースが広がっている。この動向は教育のあり方を変えつつあり、カリキュラムの基準や社会性の育成をめぐる議論を再び呼び起こしている。", "summary_en": "The covid-19 pandemic has accelerated a growing trend of parents choosing to educate their children at home. Dissatisfied with traditional schooling or inspired by the flexibility experienced during lockdowns, more families are embracing home-schooling as a long-term alternative. This shift is reshaping educational landscapes and prompting renewed debate about curriculum standards and socialization.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/05/21/home-schooling-is-taking-off", "state_media": false, "category": "社会"}, {"title_ja": "孤立するイスラエル：批判者が望むほどではないが、真の友人を遠ざけている", "title_en": "Israel the Lonely: Not as Isolated as Critics Hope, but Alienating True Friends", "summary_ja": "イスラエルは国際的な批判の高まりに直面しているものの、批判者が望むほど外交的に孤立しているわけではない。しかし、長年にわたる真の同盟国との関係を徐々に損なっていることは懸念材料だ。この状況は、友好的な国々でさえイスラエルの政策に対する見方を変えつつあるという憂慮すべき変化を示している。", "summary_en": "Israel faces growing international criticism but has not become as diplomatically isolated as its detractors might wish. However, the country is increasingly straining relationships with some of its most genuine and longstanding allies. The situation signals a troubling shift in how even sympathetic nations are beginning to view Israeli policies.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/05/19/israel-the-lonely", "state_media": false, "category": "社会"}, {"title_ja": "米国の潜水艦優位性に迫る脅威", "title_en": "America's Submarine Dominance Is Under Threat", "summary_ja": "長年にわたり水中戦力での優位性に自信を持っていた米国は、中国の潜水艦技術の急速な進歩に対し、深刻な懸念を抱き始めている。かつて嘲笑の対象だった中国の海軍力は、今や米国の防衛計画立案者たちにとって現実の脅威となっている。この認識の変化は、中国の海軍力増強が加速する中、太平洋における戦略的優位性の維持をめぐる広範な懸念を反映している。", "summary_en": "The United States, long confident in its undersea naval superiority, is facing growing alarm over China's rapid advances in submarine warfare. What was once dismissed with mockery is now being taken seriously by American defense planners. The shift reflects broader concerns about maintaining strategic dominance in the Pacific as China's naval capabilities accelerate.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/05/07/americas-submarine-dominance-is-under-threat", "state_media": false, "category": "社会"}, {"title_ja": "ウェゴビーとマウンジャロが保険適用に、フランスの肥満専門センターに患者殺到の波", "title_en": "French Anti-Obesity Centers Brace for Patient Surge as Wegovy and Mounjaro Win Insurance Coverage", "summary_ja": "フランスでは6月15日からウェゴビーとマウンジャロが社会保障制度による払い戻し対象となり、肥満専門センターへの診察予約が急増している。両薬の保険適用には厳格な条件が設けられており、対象患者は限定される。この措置はフランスが公的医療制度を通じて肥満治療に取り組む上での大きな転換点となっている。", "summary_en": "Specialized anti-obesity centers in France are preparing for a significant influx of patients following the June 15 reimbursement of Wegovy and Mounjaro by French social security. Consultation requests surged in anticipation of the coverage, which comes with strict eligibility conditions. The development marks a major shift in how France addresses obesity treatment through its public health system.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/france/article/2026/06/15/anti-obesity-centers-prepare-for-wave-of-new-patients-as-two-drugs-are-now-covered-by-french-health-insurance_6754507_7.html", "state_media": false, "category": "社会"}, {"title_ja": "G7サミット：欧州諸国、トランプ氏にウクライナ戦争を議題に戻すよう働きかけ", "title_en": "G7 Summit: Europeans Push to Keep Ukraine War on Trump's Agenda", "summary_ja": "フランスで開催されるG7サミットで、欧州首脳らはドナルド・トランプ米大統領にウクライナ戦争への関与を改めて求める方針だ。トランプ氏を刺激しないよう、気候変動対策に関する議論は事実上棚上げされる見通し。同氏はヴェルサイユ宮殿での閉幕晩餐会にも招待されており、外交的な取り込みが図られている。", "summary_en": "European leaders at the G7 summit in France are hoping to redirect Donald Trump's focus toward the ongoing war in Ukraine. To avoid friction with the US president, the summit will largely bypass discussions on climate change. Trump has been invited to a closing dinner at the Château de Versailles as part of diplomatic efforts to engage him.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/15/g7-in-france-europeans-hope-to-put-war-in-ukraine-back-on-trump-s-agenda_6754488_4.html", "state_media": false, "category": "政治"}, {"title_ja": "米イラン、枠組み合意を発表　トランプ氏は通常貿易関係の回復を優先", "title_en": "US and Iran Announce Framework Deal to End Conflict, Focus Shifts to Trade Normalization", "summary_ja": "米国とイランは6月19日にスイスで署名予定の枠組み合意を発表し、両国間の戦闘終結に向けた原則を打ち立てた。合意後には、イランの核開発計画や濃縮ウランの備蓄、米国による制裁解除をめぐる60日間の交渉が行われる予定だ。トランプ大統領はイランとの通常の貿易関係回復を最優先課題として位置づけている。", "summary_en": "The United States and Iran have announced a framework agreement set to be signed on June 19 in Switzerland, laying the groundwork for ending hostilities between the two nations. The deal precedes a 60-day negotiation period covering Iran's nuclear program, enriched uranium stockpiles, and the potential lifting of US sanctions. President Trump has signaled that restoring normal trade relations with Iran is his primary objective.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/15/iran-us-announce-framework-deal-to-end-war_6754486_4.html", "state_media": false, "category": "政治"}, {"title_ja": "フランスの原子力発電所が毎年約60億匹の水生生物を死滅させていると判明", "title_en": "Nearly 6 Billion Aquatic Animals Killed Annually by French Nuclear Plant Cooling Systems", "summary_ja": "フランスの環境NGOは、電力会社EDFの内部文書をもとに、原子力発電所の冷却システムが毎年約60億匹の魚類、甲殻類、クラゲを死滅させていると警告している。冷却水の取水口に水生生物が吸い込まれるこの現象は、河川や沿岸の生態系に深刻な影響を与える可能性があるとされる。一方、EDFは種の存続に影響を及ぼすほどの被害はないとして、NGO側の主張に反論している。", "summary_en": "French NGOs, citing internal documents from utility company EDF, warn that the cooling systems of France's nuclear reactors kill nearly six billion fish, crustaceans, and jellyfish every year. The phenomenon, known as 'entrainment,' occurs when aquatic organisms are drawn into reactor cooling water intakes. EDF disputes the severity of the impact, asserting that the mortality rates do not threaten the survival of affected species.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/article/2026/06/15/nearly-six-billion-fish-crustaceans-and-jellyfish-fall-victim-to-french-nuclear-power-plants-every-year_6754503_114.html", "state_media": false, "category": "政治"}, {"title_ja": "列車から命がけで脱走したロシア人脱走兵、フランスから強制送還の危機", "title_en": "Russian Army Deserter Faces Deportation from France Despite Daring Train Escape", "summary_ja": "22歳のロシア人脱走兵ダニイル・ムハメトフは、走行中の列車から命がけで脱出したにもかかわらず、行政上の障壁によりフランスから強制送還される恐れに直面している。フランス当局はEUの規則に基づき、彼の亡命申請をリトアニアに転送したが、同国はロシア人申請者を迅速に却下することで知られている。この事例は、兵役を逃れるロシア人が直面する厳しい制度的障壁を浮き彫りにしている。", "summary_en": "Daniil Mukhametov, 22, a Russian deserter who escaped a moving train in a high-risk bid for freedom, now faces deportation from France due to administrative obstacles. French authorities are transferring his asylum request to Lithuania under EU rules, a country known for routinely rejecting applications from Russian nationals. His case highlights the harsh bureaucratic barriers faced by Russians fleeing military service.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/15/russian-deserter-risks-deportation-from-france-after-high-risk-escape-from-moving-train_6754498_4.html", "state_media": false, "category": "政治"}, {"title_ja": "スポーツ史家「フットボールは常に左派の政治的課題を体現してきた」", "title_en": "Sports Historian: 'Football Has Always Embodied the Political Stakes of the Left'", "summary_ja": "スポーツ史家でジャーナリストのニコラ・クシス＝マルトフが、フットボールと左翼政治の深い結びつきを探る新著を発表した。本書は重要な歴史的人物と転換点となった出来事を取り上げ、フットボールが長きにわたり進歩的な理念の担い手であったと論じている。クシス＝マルトフは希望という視点からこのスポーツを描き、社会的・政治的変革の広いビジョンの中に位置づけている。", "summary_en": "Sports historian and journalist Nicolas Kssis-Martov has released a new book exploring football's deep ties to left-wing politics. The work highlights key historical figures and pivotal moments to argue that football has long served as a vehicle for progressive ideals. Kssis-Martov presents the sport through a lens of hope, rooting it firmly within a broader vision of social and political change.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/books/article/2026/06/15/nicolas-kssis-martov-sports-historian-football-has-always-embodied-the-political-stakes-of-the-left_6754482_33.html", "state_media": false, "category": "政治"}, {"title_ja": "G7出席前にトランプ氏、フランスワインへの100%関税を再び警告", "title_en": "Trump Threatens 100% Tariff on French Wines Ahead of G7 Visit", "summary_ja": "トランプ大統領はG7サミット出席のためフランスを訪問するにあたり、フランス産ワインおよびスピリッツに100%の関税を課すと改めて警告した。この脅しはフランスのデジタルサービス税に対する報復措置として示されており、米国は同税が米国のテクノロジー企業を不当に標的にしていると主張している。米国はフランス産ワインの最大の輸入国であり、昨年の総輸出市場の21%を占めている。", "summary_en": "President Trump has renewed threats to impose a 100% tariff on French wines and spirits as he prepares to travel to France for the G7 summit. The threat is tied to France's digital services tax, which the U.S. views as unfairly targeting American tech companies. The United States is France's largest wine export market, representing 21% of total French wine and spirits exports last year.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/economy/article/2026/06/15/as-he-is-headed-to-france-for-g7-trump-once-again-threatens-100-tariff-on-french-wines-over-digital-tax_6754508_19.html", "state_media": false, "category": "経済"}, {"title_ja": "スイス国民、極右の人口上限設置案を否決", "title_en": "Swiss voters reject far-right initiative to cap population growth", "summary_ja": "スイスの有権者は、国内人口に上限を設けることを求める極右の国民投票イニシアチブを54.8%の反対多数で否決し、過半数の州もこれに反対した。この提案は、民族主義的なスイス国民党が推進する一連の反移民施策の一環として提出されたものである。否決されたものの、同党は移民問題をスイスの政治論争の中心に置き続ける影響力を改めて示した。", "summary_en": "Swiss voters have rejected a far-right initiative to cap the country's population, with 54.8% voting against the measure and a majority of cantons also opposing it. The proposal was put forward by the nationalist Swiss People's Party as part of a series of anti-immigration efforts. Despite the defeat, the party continues to demonstrate its ability to keep immigration at the forefront of Swiss political debate.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/15/swiss-voters-reject-initiative-to-cap-population-latest-in-a-string-of-far-right-anti-immigration-proposals_6754491_4.html", "state_media": false, "category": "政治"}, {"title_ja": "米国、脅しと制裁でラテンアメリカへの支配を強化", "title_en": "US Tightens Grip on Latin America Through Coercion and Threats", "summary_ja": "トランプ政権は、従来非同盟を維持してきた国々を含むラテンアメリカ諸国の大半に対し、要求への従属を迫ることに成功している。ワシントンは経済制裁やビザ発給停止をちらつかせることで影響力を行使しており、法の支配への配慮はほとんど見られない。この動きは、米国による同地域への支配の大幅な再強化を示している。", "summary_en": "The Trump administration has successfully pressured most Latin American countries, including traditionally non-aligned nations, into compliance with its demands. Washington has deployed threats of economic sanctions and visa withdrawals as leverage, showing little concern for international legal norms. The shift marks a significant reassertion of US dominance over the region.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/15/us-imposes-its-domination-on-part-of-latin-america_6754475_4.html", "state_media": false, "category": "政治"}, {"title_ja": "ウクライナ、兵員不足危機に対応する大規模な軍改革を発表", "title_en": "Ukraine Unveils Major Military Reform to Tackle Staffing Crisis", "summary_ja": "ウクライナは、深刻化する軍の兵員不足問題に対処するため、包括的な改革パッケージを発表した。具体的な措置には、給与の引き上げ、有期契約制度の導入、そして部隊間の異動手続きの簡素化が含まれる。これらの改革は、脱走を抑制し、ロシアとの戦争が続く中で新たな兵士の確保を促進することを目的としている。", "summary_en": "Ukraine has announced a sweeping reform package aimed at addressing its ongoing army staffing crisis. The measures include pay increases, the introduction of fixed-term contracts, and streamlined transfer procedures. The reforms are designed to curb desertions and attract new recruits as the war with Russia continues.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/15/ukraine-announces-new-measures-to-address-army-staffing-crisis_6754497_4.html", "state_media": false, "category": "社会"}, {"title_ja": "ロシアの空爆でキーウの歴史的修道院が炎上、死者も", "title_en": "Historic Kyiv Monastery Set Ablaze in Deadly Russian Air Attack", "summary_ja": "ロシア軍によるキーウへの空爆により、歴史的な修道院が炎上した。この攻撃は文化的・宗教的に重要な施設に深刻な被害をもたらした。今回の攻撃では死傷者も発生しており、ロシアによるウクライナへの軍事作戦がさらにエスカレートしていることを示している。", "summary_en": "A historic monastery in Kyiv was set on fire following a deadly Russian air attack on the Ukrainian capital. The strike caused significant damage to the culturally and religiously significant site. The attack resulted in casualties, marking another escalation in Russia's ongoing military campaign against Ukraine.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/6/15/historic-kyiv-monastery-set-ablaze-in-deadly-russian-air-attack?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "英控訴院、パレスチナ・アクションのテロ組織指定を支持", "title_en": "UK Court Upholds Terror Ban on Palestine Action Group", "summary_ja": "英国の控訴院は、政府がパレスチナ・アクションをテロ組織として指定した決定を支持する判決を下した。同グループは兵器メーカーや軍事施設を標的にした直接行動で知られるプロパレスチナ団体である。この判決により、メンバーや支持者が直面する法的影響や、抗議活動の自由への影響が広く問われることになる。", "summary_en": "Britain's Court of Appeal has ruled in favour of the government's decision to proscribe Palestine Action as a terrorist organisation. The ruling legitimises the ban on the pro-Palestinian direct action group, which has been known for targeting arms manufacturers and military facilities. The decision raises significant questions about civil liberties, the right to protest, and what legal consequences members and supporters of the group may now face.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/15/what-a-uk-courts-backing-of-the-palestine-action-terror-ban-means?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "イスラエル軍、ガザの家族農場で3歳のパレスチナ人男児を射殺", "title_en": "Israeli Forces Kill 3-Year-Old Palestinian Boy and Father on Family Farm in Gaza", "summary_ja": "日曜日、3歳のパレスチナ人男児ライアン・アブ・アルアジーンが、ガザの家族農場で父親に抱かれている最中にイスラエル軍に射殺された。家族の証言によると、父親も同時に銃撃されたという。この事件は、ガザ紛争における民間人犠牲者の増加をさらに浮き彫りにするものとなっている。", "summary_en": "A three-year-old Palestinian boy, Rayan Abu al-Ajeen, was killed by Israeli forces while being carried by his father on their family farm in Gaza on Sunday. According to the family, both the child and his father were shot by Israeli forces. The incident adds to the growing toll of civilian casualties in the ongoing conflict in Gaza.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/15/israeli-forces-kill-three-year-old-palestinian-boy-on-family-farm-in-gaza?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "パキスタン、100日超の紛争後に米国とイランの合意を仲介", "title_en": "Pakistan Mediates US-Iran Agreement After 100 Days of Conflict", "summary_ja": "パキスタンは、100日以上にわたる紛争を経て、米国とイランの間の暫定合意を仲介する上で重要な外交的役割を果たした。シャリフ首相は、合意実現に尽力した同国の陸軍参謀長を公式に称賛した。合意はジュネーブで正式に締結される見通しである。", "summary_en": "Pakistan played a key diplomatic role in brokering a tentative agreement between the United States and Iran following more than 100 days of war. Prime Minister Sharif publicly praised the country's army chief for his efforts in facilitating the deal. The agreement is expected to be finalized in Geneva.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/15/how-pakistan-mediated-a-us-iran-agreement-after-more-than-100-days-of-war?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "コンゴ民主共和国のエボラ出血熱、過去最大の1日感染増で死者178人に", "title_en": "DRC Ebola Outbreak Death Toll Reaches 178 After Record Daily Spike", "summary_ja": "コンゴ民主共和国で、まれなブンディブギョウイルス株によるエボラ出血熱の感染が深刻化している。1日あたりの感染者数が過去最多を記録し、累計確認感染者数は782人に達した。死者数は178人に上り、保健当局は感染拡大の封じ込めに取り組んでいる。", "summary_en": "The Democratic Republic of Congo is experiencing a severe Ebola outbreak caused by the rare Bundibugyo virus strain. The outbreak has recorded a record single-day jump in cases, bringing the total confirmed infections to 782. The death toll has now climbed to 178 as health authorities work to contain the spread.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/15/record-daily-jump-in-drc-ebola-outbreak-takes-death-toll-to-178?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "スペイン対カーボベルデ：2026年FIFAワールドカップ ライブ中継", "title_en": "Spain vs Cape Verde: FIFA World Cup 2026 Live Coverage", "s
