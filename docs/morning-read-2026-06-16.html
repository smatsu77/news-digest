ummary_ja": "アルジャジーラは、2026年FIFAワールドカップのスペイン対カーボベルデの試合をライブ中継している。試合前のビルドアップや両チームのニュース、そしてリアルタイムのテキスト実況が提供される。ファンはリアルタイムで試合の全展開を追うことができる。", "summary_en": "Al Jazeera is providing live coverage of the World Cup 2026 match between Spain and Cape Verde. The coverage includes pre-match build-up, full team news, and a live text commentary stream. Fans can follow all the action as it unfolds in real time.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/liveblog/2026/6/15/spain-vs-cape-verde-live-world-cup-2026?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "専門家「ワールドカップでのエボラリスクは極めて低い」も米国は準備万全", "title_en": "Ebola risk at World Cup 'extremely low' but US remains prepared, experts say", "summary_ja": "専門家たちはワールドカップにおけるエボラ出血熱の感染リスクを「極めて低い」と評価しているが、米国の病院や公衆衛生機関は対応準備を強化している。大規模な国際的イベントであるため、当局は引き続き警戒を維持している。一方、一部の専門家は公衆衛生システムへの既存の負担が、万が一の際の対応に支障をきたす可能性があると警告している。", "summary_en": "US hospitals and public health agencies have bolstered their preparedness measures for Ebola ahead of the World Cup, despite experts assessing the risk of an outbreak as extremely low. Officials are maintaining vigilance given the large international gatherings the tournament attracts. However, some experts caution that existing strains on the public health system could pose challenges if a response were needed.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/6/15/ebola-risk-for-world-cup-is-extremely-low-but-us-is-ready-experts-say?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "ウクライナの攻撃でクリミア住民がパニック、燃料不足と恐怖が広がる", "title_en": "Crimeans Panic Over Fuel Shortages and Fear Amid Ukrainian Attacks on Annexed Peninsula", "summary_ja": "ロシアが併合したクリミア半島でウクライナが攻撃を強化する中、住民の間でパニックが広がっている。燃料不足が深刻化し、住民は同地域を「戦争に囲まれた島」と表現するなど、不安が高まっている。今回の攻撃は、ウクライナがロシア支配地域への圧力を強める上で重要なエスカレーションを示している。", "summary_en": "Residents of Crimea are experiencing growing panic as Ukraine intensifies attacks on the Russian-annexed peninsula. Fuel shortages have emerged alongside widespread fear, with locals describing the region as an 'island surrounded by war.' The strikes mark a significant escalation in Ukraine's efforts to pressure Russian-controlled territory.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/15/island-surrounded-by-war-crimeans-panic-amid-ukrainian-strikes?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "米イラン合意でネタニヤフ首相の「生涯の使命」が失敗に終わったとの見方", "title_en": "Netanyahu's Life Project Failed with US-Iran Deal, analysts say", "summary_ja": "専門家らは、米国とイランの核合意が実現すれば、イランの核開発に反対することを政治的キャリアの柱としてきたイスラエルのネタニヤフ首相にとって歴史的な敗北となると指摘している。ネタニヤフ氏は数十年にわたり、ワシントンに対してイランへの強硬姿勢を取るよう働きかけてきた。米イラン間の外交的合意は、その取り組みを根底から覆し、同首相の戦略的目標に大きな打撃を与えるものとなる。", "summary_en": "Analysts argue that a potential US-Iran nuclear deal would represent a historic defeat for Israeli Prime Minister Benjamin Netanyahu, whose political career has been largely defined by opposing Iran's nuclear ambitions. Netanyahu has spent decades lobbying Washington to take a hardline stance against Tehran, making it a cornerstone of his foreign policy legacy. A diplomatic agreement between the US and Iran would undermine that effort and mark a significant blow to his strategic goals.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/6/15/netanyahus-life-project-failed-with-us-iran?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "イランと米国が暫定合意、イスラエルの対応に不透明感", "title_en": "Iran and US Reach Tentative Deal to End War Amid Israel Uncertainty", "summary_ja": "イランと米国が戦争終結を目指す暫定合意に達したと、アルジャジーラが報じた。しかし、イスラエルがこの合意を遵守するかどうかについては依然として不透明な状況が続いている。この合意は外交上の重要な転換点となる可能性があるが、具体的な詳細や各国の関与については引き続き協議が必要とされている。", "summary_en": "Iran and the United States have agreed to a tentative deal aimed at ending ongoing conflict, according to Al Jazeera. The agreement raises significant questions about its durability, as uncertainty remains over whether Israel will honor the terms. The deal marks a potentially pivotal diplomatic development, though key details and commitments are still being worked out.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/15/iran-us-agree-tentative-deal-to-end-war-your-questions-answered?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "ベン・グビル氏「トランプの合意はイスラエルを拘束しない」、ネタニヤフ首相は沈黙", "title_en": "Ben-Gvir Claims Trump's Gaza Deal Does Not Bind Israel as Netanyahu Stays Silent", "summary_ja": "イスラエルの極右閣僚イタマル・ベン・グビル氏は、トランプ米大統領との間で成立した合意はイスラエルを拘束しないと公言し、合意から距離を置いた。ベンヤミン・ネタニヤフ首相はこの件について沈黙を保っており、政府の統一した立場に疑問符がついている。この発言は、停戦や人質合意の条件をめぐるイスラエル連立政権内の緊張の深まりを浮き彫りにしている。", "summary_en": "Israeli far-right minister Itamar Ben-Gvir publicly declared that the agreement reached with U.S. President Donald Trump does not obligate Israel, distancing himself from the deal. Prime Minister Benjamin Netanyahu has remained silent on the matter, raising questions about the government's unified stance. The statement highlights deepening tensions within Israel's ruling coalition over the terms of any potential ceasefire or hostage agreement.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMinAJBVV95cUxQRktCOGlYRlZYM1EwY2VWQVIyMm1NZjhTckJrUDI3b0V2a2RhcW01Nk5EOWt5RWlKWk5yYmNVWlI1OGpVR2R2X3NVRU9WYTM3NFhfMjJkdjRnZU90S3JVbzVxQXdXWm1VaGh1T2dlRl9CbHBqNl9lUXlTajdRc1hkZ2J3NzFsaTdvekhtNG1UZEdCR1gxanlhUnhvcXY0MEdKYVVlVS1zZzZ5X0tVUFc5TDNTa2JqaDBfaENDRUotamxtcE9rU1YwTDdzNks0TWprVDRxcV9BZ0o1c05sdGNPcGpudVpvdTdaMEI5d2d2SXpkS3dxSmYzWEkweTF1U3ZuckF2SUJPNWpJT240TW91QmpMcTNOWlVJVWlmRg?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イランをめぐりトランプに屈辱を受けたネタニヤフ、中東を火の海にする恐れ", "title_en": "Humiliated by Trump on Iran, Netanyahu May Ignite the Middle East", "summary_ja": "イスラエルのネタニヤフ首相は、イランの核問題をめぐる交渉でトランプ政権に蚊帳の外に置かれ、深刻な屈辱を味わっている。影響力の低下に不満を抱くネタニヤフは、イランへの単独軍事行動を検討する可能性があるとみられている。専門家らは、こうした動きが外交的に重要な時期に中東全域を巻き込む大規模紛争を招く恐れがあると警告している。", "summary_en": "Israeli Prime Minister Netanyahu faces humiliation after being sidelined by Trump in negotiations over Iran's nuclear program. Frustrated by his diminished influence, Netanyahu may consider unilateral military action against Iran, risking a broader regional conflict. Analysts warn that such a move could set the entire Middle East ablaze at a critical diplomatic moment.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMingJBVV95cUxOTF9CVkg2UUtyQUZmUFdGRFJOR1dhcy1nMTZsRWppc1FVM2JwMVEtTEtiTk9NWDAwM1ZhTDEyYWM2M2J3VEVBSTQ3TXpiRVpIODEtM0FidDN6T3Njc0VtUDJCZFBYcFdEeU0ySDg5a3JNVGdwWGFPcnNQVk1FbjRaaXlTQnJZY1hWcERLU29HNnl1WlIxR1Rsb2xmOXJvem9qSWZscmQ5Zi1QZG5BclRFbTRidmFFZWwtNm1DWUY1bENOVlRWUmhOUWlHT3psOTNTM21lNXg2bmJKU3RzUGR2Q29BYnlibXFEWmVPdHBXMzRnM2Frc3JoQ2ozOFNveUtNMHRoWGU4WjR0VWh3QUlfbU5hNUJ0eS1lb1Vjc1dR?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "マクロン大統領が停戦順守を呼びかけ、エルドアン大統領は妨害工作に警告", "title_en": "Macron Urges All Sides to Honor Truce as Erdoğan Warns of Sabotage Risks", "summary_ja": "フランスのマクロン大統領は、紛争に関わるすべての当事者に対し、停戦合意を遵守するよう求めた。一方、トルコのエルドアン大統領は、一部の勢力が停戦を妨害しようとする可能性があると警告を発した。両首脳の発言は、停戦の脆弱性に対する国際社会の懸念と、合意維持に向けた外交努力を反映している。", "summary_en": "French President Macron has called on all parties involved in the conflict to respect the ceasefire agreement. Meanwhile, Turkish President Erdoğan issued a warning that certain actors may attempt to sabotage the truce. The statements reflect international concern over the fragility of the ceasefire and the diplomatic efforts to maintain it.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi7wFBVV95cUxPdFRnYXNjNmxEeVF0SjBsclZic0tZX01VVGNHM1NyaE5yQjNDYnZWSmZwdmxpWU41Nl9XQ1c1TTN5anlDTUd3bkItXzFtSk1iWS1acmRlWnZkcS10RWF4aXQ4X2FabnZpMjZPTWg1NEI2RGNhU05fTFdjWVo5d0NPRnROWFdTVHNGbThOWTQ5cGJEOVh1WGtHYWYxM2ZvSU1FX0h1eFVLTEFPWU1VY3RQOGF5QTdSNEdtNnRKTVduMlZTUU9laXZ6MWZsMTMyN0gzRjQ0dlZMQlZMaUNfbUEtb0t3SnBTNEVaM01fbUFRWQ?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "米国とイランが合意、レバノンでの戦闘即時停止を含む", "title_en": "U.S. and Iran Reach Deal Including Immediate Ceasefire in Lebanon", "summary_ja": "ハアレツの報道によると、米国とイランはレバノンでの戦闘の即時停止を含む合意に達した。この合意はワシントンとテヘランの間における重要な外交的進展であり、レバノンでのヒズボラが関与する紛争に直接的な影響を与えるものとみられる。合意の詳細な条件についてはまだ完全には明らかにされていない。", "summary_en": "The United States and Iran have reached a deal that includes the immediate termination of fighting in Lebanon, according to a report by Haaretz. The agreement marks a significant diplomatic development between Washington and Tehran, with direct implications for the ongoing conflict involving Hezbollah in Lebanon. Details of the broader terms of the deal have not yet been fully disclosed.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMimAJBVV95cUxQS0w4cWVuXzRTSHZwRGFhSE04cUk3X2U3bXRkcDlFMER0dl9reGl0ZjYyeU9yMWpjTmNnZ0RFOVEtTmxEYXlKR0NaaE5PM2FHQ05zLW1xc3RxbnNzUFI0Y2VFSTZmYkp4V3hKZXQzbjJFbmJXTEMxX2pQNzZrTzFfbFJKQVJqZXJwMThGanJfNUR4SGszc0lzM0ZnOXZEQ0JWbzlTdUZKQjBvdFNmVHZVaWNCenIyYktMUUhBeHF2dWZ2OTZYcExzeDUxMU1acEhKSDV3UEtmZXZUSWNCYzJFdXNFdmZqRm1ib0FLNTNuY01MMXBaanhJb1ozM2c4RVZPVzZ2MVdsdmhqSHJEWG5WZDFvVGY5SGNy?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "米イラン核合意に向けた動き、ネタニヤフ首相の敵味方双方が強く非難", "title_en": "Netanyahu Rivals and Allies Condemn Likely U.S.-Iran Nuclear Deal", "summary_ja": "イスラエルの政界では、ネタニヤフ首相の政敵と同盟者の双方が、米国とイランの間で交わされる可能性のある核合意を強く批判している。批判派はこの合意を「最高指導者の完全な勝利」と表現し、イランの核開発を十分に抑制できないと懸念を示している。党派を超えたこの異例の批判は、ワシントンとテヘランの外交的取り決めに対するイスラエルの深い不安を反映している。", "summary_en": "Israeli politicians across the political spectrum, including both rivals and allies of Prime Minister Netanyahu, have strongly criticized a potential U.S.-Iran nuclear agreement. Critics are characterizing the deal as a total victory for the Iranian Supreme Leader, expressing concern that it would fail to sufficiently curb Iran's nuclear ambitions. The rare cross-party condemnation reflects deep Israeli anxiety over the terms of any diplomatic arrangement between Washington and Tehran.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMinwJBVV95cUxOQTYycTZDeGl6UVlia0hVNjFlX2hPRkpsbDY4ZFh6QnFBd0xfMVdjOUxYQzQ3SFE1QlF4ajdfemZKR0xQeXQyZ2dWRzlMeGh1ZHZmUW1zMXliSENnQzhTVWNCV0lTLUhEcUMwcV9ySk12NzhSRWxRT1ppdWRMcjJueVJTdkZPUnd2MzRpRGFKVmdTRnlSVTBJaW5LcXdIdHhjQU5FWjNZbFBhWEFiSzJnYkg1RVpYSjF3VUlQdFplUFNQb0pMMWRnSks1UlNBSHN1dlloc0pzU0tLNkQwRUJrOGVoZnRvYXdYUnpQeHRIVkd1UHlhdGstWndTMk1wR2Z0ZWV6LTBIWURoQkh1eTYxX0VkUWRaNE1ZaEl3ZkFWNA?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "イスラエル医師会の国際医療機関からの資格停止を求める圧力が高まる", "title_en": "Pressure Grows to Suspend Israeli Medical Association From Global Medical Body", "summary_ja": "世界医師会（WMA）に対し、イスラエル医師会の資格を停止するよう求める国際的な圧力が高まっている。ガザ紛争に関連するイスラエルの医療従事者の行動をめぐる懸念が背景にある。国際医療コミュニティの一部は、イスラエル医師会に対する説明責任を求めている。", "summary_en": "There is increasing pressure to suspend the Israeli Medical Association from the World Medical Association, the international governing body for medical ethics and standards. Critics are pushing for the suspension amid ongoing concerns about the conduct of Israeli medical professionals in relation to the conflict in Gaza. The Israeli Medical Association faces scrutiny from international medical communities calling for accountability.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMijwJBVV95cUxNN182cm9DYTdzVFJmaU9hUDlmemVodzRGQnZrSlJfdHpOSWRRaGR6MVdnSGVxZVltQ1g5Y1gtS1JiTFBaWHZrWDJTc0d1UUxQQ19ydWtwYzcwZFBndDZrX2ZpbWQtNHR4XzRueHVFb1FLcG1PMUxnS3dUZjM2RDB5VWtqSjdoT3N3SnhGQVZ3YVJEVzIxWGo0Ujd3Unh1UlVjcmtBanlQcmNBYU9MNUlzRlM3T1ZXS2N5MFZZUzloTk9jMDFkUmtxb1NvQTkwY05YOUVtaVB5RDZ4TXc5MTZLWDU3VWQtcTFQYmhDcGE2aDNhWkxjZXdkWm9wZl9abjdjUGZsUGFMQzdmdkJGOUJn?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "医師は刑務所ではなく病院にいるべきだ：アブ・サフィヤ氏の釈放を求める", "title_en": "Free Dr. Abu Safiya: A Doctor Belongs in a Hospital, Not a Prison Cell", "summary_ja": "イスラエル紙ハーレツは、現在拘束中の医師アブ・サフィヤ氏の釈放を求める論説を掲載した。記事は、医療従事者は患者を治療すべきであり、投獄されるべきではないと主張している。この事件は、紛争下における医療従事者の扱いという broader な問題にも注目を集めている。", "summary_en": "Haaretz is calling for the release of Dr. Abu Safiya, a physician currently held in detention. The opinion piece argues that medical professionals should be treating patients, not imprisoned, and advocates for his immediate freedom. The case has drawn attention to the broader issue of the treatment of healthcare workers amid the ongoing conflict.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiigJBVV95cUxQZnpaMm45SVZqX3QxVG1rUzh5T0lfRmtVcC1iZnd5YTh2WXV0ZHhzeDAySzlHMFRVQkJZU3oxbHVqMHNYa3E1RFZVdmRxdW1tcldXMjBjSWI1Ry0xLWYxbVJNZlhDMXUyclFWeGxGdVJzR2FWNHFkcjA5cFExSkcyclVKRFhDU2xTZFptRF90NE5fYUxxYXNjWjFqWVZpMFJoaFRmZnYxVm82ZlNBcXFOaEpXRnMtYi1xbGEwa2sxMXJmblF1N0FreWxOOG5sVDdMZHV2SGxvY3dRbUNkc3dCdWNjZ1BWRFZ4Zzk1LVl5dDlGMWxISm5YYVlkdXdCbmNrelduU3lISGxKZw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "社説：イスラエル人が「占領」を発見した――今さらながらの気づき", "title_en": "Opinion: Israelis Have Discovered the Occupation", "summary_ja": "ハーレツ紙の論説は、「台所でフォークを発見した」という皮肉な比喩を用い、イスラエル社会の一部がパレスチナ占領の現実をいまになって認識し始めたことを批判的に描写している。筆者は、数十年にわたる軍事統治の道徳的重さと結果について、イスラエル人の間でようやく意識が高まりつつあると指摘する。こうした遅まきながらの覚醒が、イスラエルの将来をめぐる議論に与える意味を問いかけている。", "summary_en": "A Haaretz opinion piece uses the sardonic metaphor of 'finding a fork in the kitchen' to describe Israelis suddenly acknowledging the reality of the occupation, as if it were an obvious object hiding in plain sight. The column critiques the belated awareness among segments of Israeli society regarding the consequences and moral weight of decades of military rule over Palestinians. The author suggests this awakening, however late, carries significance for the ongoing debate about Israel's future direction.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi_gFBVV95cUxQeUpzLXpOY002d0VPY19lU3Y3d0FIamZsc0FLRDVRZ1NfazJjWE8xWkJBNHk3a3pyaW9RODQ0bjhTWnBrS1RQMDVpaGVsZVA3bFFmV2VqVFhkUWtCbDVhb0RJVmYzbkNTT1ZEMm8yb0VDdmp1NW5USExMclpNeWdUNXV3amRmLU55N2Y4TzRkeHNTWmY4Sk9MYjlSZ3RjLWJyT2hFQlF0M3JpZ20wdmdjcFFHQzVXcUl4ZWRGaGZvcUpRcl90LUxRWk1xdk9mYi1nU1FoaDdUcmpRTWJ3RUo2QzlqVWhiMmxVaU14T3JyRTJXMkw2RjZVdzJTT091dw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "トランプ政権との合意を前に、イランが生存戦略から勢力拡大へ転換", "title_en": "Iran Shifts From Survival to Power as Trump Deal Nears", "summary_ja": "トランプ政権とイランの新たな合意が現実味を帯びる中、テヘランは政権存続を優先する守勢的な姿勢から、より積極的な勢力拡大路線へと転換しつつある。イラン指導部は潜在的な合意を、地域的影響力を強化・拡大する好機と捉えているとみられる。アナリストらは、このような戦略的再編が交渉を複雑化させ、中東の勢力均衡に大きな影響を与える可能性があると警告している。", "summary_en": "As prospects of a new Trump administration deal with Iran grow closer, Tehran appears to be transitioning from a defensive posture focused on regime survival to a more assertive, power-projecting stance. The shift suggests Iranian leadership sees a potential agreement as an opportunity to consolidate and expand its regional influence rather than merely avoid collapse. Analysts warn this repositioning could complicate negotiations and reshape the broader Middle East balance of power.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMinAJBVV95cUxNRHRWWjFPLTU2ZUgyd0dWeUdyWmNsR2NPR19rdW1rdll6U3Jjc2lPNnVBTXB4cUVGYkdHTnZDaWhnaWFCWmRtTmNjMHA5NEpmaGhGMHdsUWxvVXFrN0RJN3VIQzZvZmIzQTY0VEZ3RWZKcVpGZ2EtM3VYeHhMVURZWmEwbzNWQ0xLMlM5M3pVSERCWTYwdE85MERYSGc1dHJzU2lVbmgzbWtUZnBhWVJHMkk4ZnduQUFzcEZsb1kzQkRpeENwWnBaV2paZklpZ0MwY243TkhsYnIyZ3lZVHdReFZZLWpUU2FNdlVCQWFBeVJFWnlnNmtjeHJOUWlGZUNYNV9kYTJ4UmJCWG9aSlNsWXhjdE15SWVYb3pBTg?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "トランプ氏、ヒズボラ拠点攻撃後にネタニヤフ首相を「判断力がない」と批判か", "title_en": "Trump Reportedly Said Netanyahu 'Has No Judgment' After Hezbollah Strike", "summary_ja": "米国のドナルド・トランプ前大統領が、イスラエルのベンヤミン・ネタニヤフ首相についてヒズボラの拠点への攻撃後に「判断力がまったくない」と批判したと伝えられている。イスラエル紙ハアレツが報じたこの発言は、両者の公的な同盟関係の裏に深刻な緊張が存在することを示唆している。この批判はイスラエルの軍事的意思決定に対するトランプ氏の広範な不満を反映しているとみられる。", "summary_en": "Former President Donald Trump allegedly criticized Israeli Prime Minister Benjamin Netanyahu, saying he 'has no fucking judgment,' following an Israeli strike on a Hezbollah stronghold. The remarks, reported by Haaretz, suggest significant private tension between Trump and Netanyahu despite their public alliance. The criticism reflects broader frustration over Israeli military decisions in the region.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMimwJBVV95cUxPeEVOTEg5ZEx2ZmptZG96TUJtLVlWY19TSjh6dTFfM0RFZFRRWkZDb2F2Njc2NFp2R3otM0JvdEpURDlDbzJTb29KYkowd255alVnQ0lKd0dJdjNPLWVzZnRUZkpxdUJtZEJ1aTdVaUpmUVBzUkdyRmMyaFFIcEc5OXFOTU12a2syak9tQ21oazY0aW5ZWGJxMTR1WDlCS3k5NUoyenFUb0d4ZWVjUmhKMlVrZ2dJS0VLQnV2Vy1GeE1IaDNSWGNndU03clo2Nkk1MXptMFZ6RkE5WnVWVllUWlRLeFUyRDN1ZThFTFB6SS1NQW5FRUdxbF9xNW05N1lDNHRJdy1QUkdfTG5tazlZM25WVmh3LUhZcUJB?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "プラボウォ大統領のポピュリスト政策がインドネシア市場に「負の連鎖」をもたらす", "title_en": "Prabowo's Populist Policies Drive Indonesia Into Market 'Doom-Loop'", "summary_ja": "プラボウォ・スビアント大統領のポピュリスト的な経済政策が投資家心理を悪化させ、インドネシア市場は自己強化型の悪循環に陥っている。積極的な歳出拡大と構造的な懸念が重なり、通貨安・資本流出・成長鈍化という負の連鎖が生じている。アナリストらは、財政政策の見直しがなければインドネシアは長期的な市場不安定に直面すると警告している。", "summary_en": "Indonesian markets are caught in a self-reinforcing negative cycle as President Prabowo Subianto's populist economic policies weigh on investor confidence. The combination of expansive spending programs and structural concerns has triggered a feedback loop of currency weakness, capital outflows, and slowing growth. Analysts warn that without fiscal adjustments, Indonesia risks a prolonged period of market instability.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxPbXp6bVJIOVg3M01fdWVfcFNhRmRXMFl0b0Nmc1hHcUtnU0Y0RHFINVlERWhOdmxfUGJrZHZKYkR0MDJyaURUckVfRkwzQUtJTDgwZEd4YUd2eXhSOHF4RlRXVXV1a01fSDBtVjNMcUFUUGFOZXgzeUk4R2VWeFJTZmVvTk1fZWZpcVNMMnViZGpIMWkxcFhpYmlrbVdPNTlDeE4zdmFFQ2VzNkZqaHJjdmt6a3hCTExMMEE?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "ザ・ウィークエンダー - ジャカルタ・ポスト週末版", "title_en": "The Weekender - Jakarta Post Weekend Edition", "summary_ja": "ジャカルタ・ポストは週末版「ザ・ウィークエンダー」を発行し、ライフスタイル、文化、レジャーに関する厳選されたコンテンツを読者に提供している。インドネシアの英字紙として、週末に向けた特集記事やニュースを幅広く取り上げている。読者が休日をより充実させるための多彩なトピックが掲載されている。", "summary_en": "The Jakarta Post presents its weekend edition, The Weekender, offering readers a curated selection of lifestyle, culture, and leisure content. The publication provides a weekend-focused perspective on news and features for its English-language readership in Indonesia. The edition covers a range of topics designed to engage readers during their days off.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiTkFVX3lxTE9BS3ZaSldHampmTW5zSVdtYm5jOHFVS25wTktVcW1UV2h6M05xVEl0S1VPY3RYVGVvM1p4NHBFcUdScDFsQk5Mc0F6eUQ5UQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "インドネシア国会、「拙速」との批判を受けながら新警察法を可決", "title_en": "Indonesia's House Passes New Police Law Amid Criticism of Rushed Process", "summary_ja": "インドネシアの国会は新たな警察法を可決したが、審議が拙速だったとして各方面から批判を受けている。批評家たちは、十分な公聴会や法案内容の精査が行われないまま審議が進められたと指摘している。新法はインドネシア国家警察の法的枠組みを大きく変えるものとみられる。", "summary_en": "Indonesia's House of Representatives has passed a new police law, drawing criticism from observers who say the legislation was pushed through too quickly. Critics argue the rushed process did not allow adequate public consultation or scrutiny of the bill's provisions. The new law is expected to reshape the legal framework governing the Indonesian National Police.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqwFBVV95cUxPaHEydFpmcDBWcnIwcVBpWExBWklRZFNYYmVidW9vTzhMUEZnZzdTbU9Cb1dFMmlleFlnajJRdEdhN1g1ZUttSzlTa2xQYzJWX1VUQ1ZvY0MwVXA4SjFPcGZUbEVkVVEtSWRmM3lxZVRBcEdleGVMMUJpaERiVEtxbXVWU1lyNlhnZGE0aHZKQVRPOW5sYl9yVkk4N1BlYmRPVnhkMFRNOXdPTjQ?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "今最大の投資リスクはリスク回避そのものだ", "title_en": "The Biggest Investment Risk Right Now Is Risk Aversion", "summary_ja": "現在の不確実な経済環境において、投資家の過度な慎重姿勢が財務リターンにとって最大の脅威となっている可能性がある。リスクを完全に避けることは、特に市場が変化し続ける中で、機会損失やパフォーマンスの低下につながりかねない。専門家は、長期的な投資成功には戦略的かつ適度なリスクテイクが不可欠だと指摘している。", "summary_en": "In the current uncertain economic climate, excessive caution among investors may itself be the greatest threat to financial returns. Avoiding risk altogether can lead to missed opportunities and underperformance, particularly as markets continue to evolve. Experts suggest that a measured, strategic approach to risk-taking is essential for long-term investment success.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiowFBVV95cUxOQjkwOExNclpfc3V0NjAtQ3JFdmxYTWY2OXctWVBja0JLdktpZUhhSWhzX3FpbmZpSnpYQlJqM3FXNnktemNTd3NOS1BmejZveklUcnVSRkMyaUZwa1E2M2VQRG5YanB4UXJXN1NDZ2hMV3pNYlNpS2NKQlBaY2owdERRZk13OHc1QWZHLUJuSHZGZmRDX1gxc1pfX0ctc2RhU19r?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "スラウェシの古代洞窟壁画、ヨーロッパ中心の先史時代芸術観に終止符", "title_en": "Sulawesi's Ancient Cave Art Challenges Europe's Monopoly on Prehistoric Creativity", "summary_ja": "インドネシアのスラウェシ島で発見された古代洞窟壁画が、先史時代の人類の創造性に関する従来の認識を覆しつつある。これらの発見は、芸術的表現がヨーロッパだけで生まれたとする長年の定説を否定し、東南アジアでも同時期またはそれ以前に独自に発展していた可能性を示している。この発見は、人類の認知・文化的進化に関するヨーロッパ中心主義的な歴史観に再考を迫るものだ。", "summary_en": "Recent discoveries of ancient cave art in Sulawesi, Indonesia, are reshaping our understanding of prehistoric human creativity. The findings suggest that early artistic expression was not exclusive to Europe, as long believed, but emerged independently in Southeast Asia at comparable or even earlier dates. This challenges the long-held Eurocentric narrative of humanity's cognitive and cultural evolution.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMitgFBVV95cUxQdE95UzFpM09BSDdSUV90b0Jxc3BUMHY4azRnRE1DWTZrSVl0QXcxeDJheHFWUFp5WmI4c3UwWU1UWTV1Y2E5czdsTmVxblFvV1V6a1htR2dHUU9VbzB0Q3h1dUlzV09HbkVuaUNGU0JZR2VINmI1RnpKOW1vanhzODBCZEtZWkhVU210SGZmTGw4RkRqUzBhMi1PQl9OVzUweG1mS0xXd3haX0c0VDBCOENEb1NmUQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ブログ、マレーシアへの50万トンのインドネシア産米輸出4億5000万ドル契約を最終調整", "title_en": "Bulog Finalizing $450M Malaysian Deal for 500,000 Tonnes of Indonesian Rice", "summary_ja": "インドネシアの国家物流庁ブログは、マレーシアへ50万トンのコメを供給する4億5000万ドル規模の契約を最終段階で調整している。この取引は、東南アジア主要米生産国であるインドネシアにとって重要な輸出機会となる。ブログは両隣国間の二国間貿易協定の条件をまとめるべく作業を進めている。", "summary_en": "Indonesia's state logistics agency Bulog is in the final stages of a $450 million agreement to supply 500,000 tonnes of rice to Malaysia. The deal represents a significant export opportunity for Indonesia, one of Southeast Asia's major rice-producing nations. Bulog is working to complete the terms of the bilateral trade arrangement between the two neighboring countries.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiwAFBVV95cUxQQ2tIV3BBMDBqa1FVVzRuMGlKMC1Zb0wxWVVoLVJEQTk2azZzZWFONC1oRjJlZG1fOGdMVFVUNUt5Y1ZCZWZOODRhcGFrOTFVVUtZeG1sc1hsdm03TkNPc3Zud3M4YUZLelo2bmViVGFoRzV2dXNNY0lUQWlyS0FmRmpRcFNVQzVrVnV2TmY0dFdiOXdYMXYyUWNIOFdjLWlaNlhwUV8zUXdKeGVnTTc5MmpyU2VQR2dQTENNV013eUk?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "アップル、Mac Miniの一部生産をアジアからヒューストンに移管へ", "title_en": "Apple to Shift Some Mac Mini Production to Houston from Asia", "summary_ja": "アップルは、Mac Miniの一部生産をアジアからテキサス州ヒューストンに移転する計画を進めている。この動きは、同社がサプライチェーンの多様化と米国内生産の拡大を図る取り組みの一環だ。地政学的リスクへの対応や供給網の強靭化を背景に、製造拠点の国内回帰が加速している。", "summary_en": "Apple is planning to move a portion of its Mac Mini production from Asia to Houston, Texas. This shift reflects the company's ongoing efforts to diversify its manufacturing base and increase domestic production in the United States. The move is part of broader industry trends driven by supply chain resilience and geopolitical considerations.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMisAFBVV95cUxQME9DYTF5R2ZRUHg4ZWJPQnEwVUlOZzJLZXQwSFViLXYzZ2lOVjJmVjBFMHAyRmRHLXo3S0NtNUJCRXlLcWJRNG9NTEFpYnhxNTVaOTBWSzNBa1dTVG91ckNnQXRDeVhaZ3lSdE5NMmN5MnJkV1pKUExxTkFRZ096Q3hraTR1NDN2SXVKNGs5RXJaNlpqcmxlMktZdHJ4R1NadGpMUDI4bHNhWDJUTzhrWg?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "なぜユーラシアは待てないのか：現代のための憲章", "title_en": "Why Eurasia Cannot Wait: A Charter for Our Time", "summary_ja": "ジャカルタ・ポスト紙は、現在の国際情勢においてユーラシア地域の協力と統合を急ぐ必要性を訴える論考を掲載した。同記事はユーラシア大陸全体の集団的行動を導く基本的な枠組みや憲章の策定を求めている。地政学的・経済的な圧力が高まる中、各国にとって先送りのコストはますます大きくなっていると強調している。", "summary_en": "The Jakarta Post presents an argument for urgent Eurasian cooperation and integration in the current global climate. The piece calls for a foundational framework or charter to guide collective action across the Eurasian continent. It emphasizes that geopolitical and economic pressures make delay increasingly costly for nations across the region.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMinAFBVV95cUxOcm1yckdSalducXB1dXFhdnZDQ3VXdjZZdXc1TXFpYTBLNGwxSkNXN2tXODlxY1REYUhpSDk4TllaenNWTkVDaEs1cXkyeXZYbWJqdXNKbHdpOXZzdHdDNTJUQ0JVaUQzY2JyeURDMFlYX2tCNG5WcWkzOFlkTjhwMnJzREZRMWZoNnBiYzB3eXlVNGxDcXdsU0UzMnk?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ジャカルタ・ポスト、新機能とアップデートを発表", "title_en": "The Jakarta Post Introduces New Features and Updates", "summary_ja": "ジャカルタ・ポストは、プラットフォームへの新たな追加機能とアップデートを発表した。これらの変更は、読者体験の向上とコンテンツの充実を目的としている。具体的な新機能の詳細については、まだ fully開示されていない。", "summary_en": "The Jakarta Post has announced new additions and updates to its platform. The changes aim to improve the reader experience and expand content offerings. Further details about the specific new features have yet to be fully disclosed.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMic0FVX3lxTFBGUXFLbTlJbmViRFppUG45VFhyck9pYWNDcWVKdGdycXIteTFSRFNrdkxRMzdQT015dmxpb21PQjY2YjRzQndJTjFOdXI3SXROMU5MUk9VejVUSG5xbnRLN1lHd0h4LWpqT3ZMLTJUQ1lWcHM?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "中国経済、第2四半期の序盤に失速", "title_en": "China's Economy Loses Momentum at Start of Q2", "summary_ja": "ジャカルタ・ポスト紙の報道によると、中国経済は第2四半期の開始時点で減速の兆しを見せている。年初を牽引していた成長要因が薄れつつある可能性が示唆されている。この减速が一時的なものか、より広範な構造的課題を反映しているのかについて、アナリストたちは注視している。", "summary_en": "China's economy showed signs of slowing at the beginning of the second quarter, according to a report from The Jakarta Post. The deceleration suggests that growth drivers from earlier in the year may be fading. Analysts are watching closely to assess whether the slowdown is temporary or indicative of broader structural challenges.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMimAFBVV95cUxPcG9PRW9qcnpEci1fdGhnQkVPNnNvMkZKRjVwa24xRGZXUlN0UTNUV0hkcXROcW9iYTZjWkYxbFRRWkJTWkZMeHVkZ3VTUXdhS3NmZ3ZvOWtTWEQtZXQ0NlBGWjQtZUtBdEx0dzRudmh5WDNBa1ZBTDR4ZFBGcHQ0U3pfR3k2WmtwZ1gtNnZiUVlHcVhMYTFySg?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "米イラン和平合意を背景にG7サミット2026がエビアンで開幕", "title_en": "G7 Summit 2026 Opens in Évian Amid US-Iran Peace Deal", "summary_ja": "第52回G7サミットがフランスのエビアン＝レ＝バンで開幕し、各国首脳が重要課題の協議に臨んでいる。今回の首脳会議は、米国とイランの間で歴史的な和平合意が成立した後、地政学的緊張が高まる中で開催されている。この外交的転換を受け、国際的な安全保障の枠組みに関する議論が主要議題となる見通しだ。", "summary_en": "The 52nd G7 Summit has commenced in Évian-les-Bains, France, bringing together world leaders for high-level discussions. The gathering takes place against a backdrop of heightened geopolitical tensions following a landmark peace agreement between the United States and Iran. Key agenda items are expected to reflect the shifting global security landscape shaped by this historic diplomatic development.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/g7-summit-2026-begins-in-evian-key-leaders-countries-dates-and-venue-details/article71104781.ece", "state_media": false, "category": "政治"}, {"title_ja": "イラン外務省、合意後もアメリカへの「深い不信感」残ると警告", "title_en": "Iran Warns of 'Deep Mistrust' in U.S. Despite Nuclear Deal; World Leaders Welcome Agreement", "summary_ja": "イランの外務省は、米国との間で軍事行動の即時かつ恒久的な停止で合意したにもかかわらず、米国に対する深い不信感が依然として残っていると表明した。フランスのマクロン大統領はホルムズ海峡での通行料徴収阻止に全力を尽くすと誓約した。インドのモディ首相をはじめとする各国首脳は、今回の米イラン合意を歓迎した。", "summary_en": "Iran's foreign ministry cautioned that deep mistrust of the United States persists even as a deal was reached agreeing to an immediate and permanent end to military operations. French President Macron pledged to do everything possible to ensure no tolls are imposed on the Strait of Hormuz. Indian Prime Minister Modi and other world leaders welcomed the U.S.-Iran agreement as a step toward regional stability.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/us-israel-iran-war-live-updates-peace-ceasefire-deal-oil-price-hike-donald-trump-mojtaba-khamenei-netanyahu-june-15-2026/article71103253.ece", "state_media": false, "category": "政治"}, {"title_ja": "英国、パレスチナ活動家団体「パレスチナ・アクション」禁止を支持する控訴審で勝訴", "title_en": "Britain Wins Appeal to Uphold Ban on Pro-Palestine Activist Group Palestine Action", "summary_ja": "英国の裁判所は、テロ関連法に基づくパレスチナ・アクションの禁止指定を維持する政府の控訴を認める判決を下した。同団体はイスラエルの最大手防衛企業エルビット・システムズを中心に、英国内のイスラエル関連防衛企業を繰り返し標的にしてきたとして禁止されていた。当初の「禁止は違法」とした判決は今回の控訴審で覆された。", "summary_en": "A British court has ruled in favor of the government's appeal to maintain the proscription of Palestine Action under terrorism laws. The group had been banned after repeatedly targeting Israel-linked defense companies in Britain, with a particular focus on Elbit Systems, Israel's largest defense firm. The original ruling that the ban was unlawful has now been overturned.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/britain-wins-appeal-that-palestine-action-ban-was-unlawful/article71104479.ece", "state_media": false, "category": "社会"}, {"title_ja": "英国犯罪捜査局、ロシアの影の艦隊タンカーを捜索しインド人男性を逮捕", "title_en": "UK Crime Agency Arrests Indian Man in Raid on Russian Shadow Fleet Oil Tanker", "summary_ja": "英国国家犯罪捜査局（NCA）は、ロシアの影の艦隊に属する石油タンカーへの強制捜査を実施し、インド人男性1名を逮捕した。NCAは逮捕の具体的な容疑については明らかにしていない。この作戦は、ロシアの石油制裁回避に使われる影の艦隊を取り締まる西側当局の広範な取り組みの一環とみられる。", "summary_en": "The UK's National Crime Agency (NCA) conducted a raid on a Russian shadow fleet oil tanker and arrested an Indian national. The NCA did not disclose the specific offences for which the individual was arrested. The operation is part of broader efforts by Western authorities to crack down on Russia's shadow fleet used to circumvent oil sanctions.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/uk-crime-agency-arrests-indian-man-in-raid-on-russian-shadow-fleet-oil-tanker/article71104510.ece", "state_media": false, "category": "社会"}, {"title_ja": "レバノン軍、国境沿いの村民に帰還延期を警告", "title_en": "Lebanese Army Urges Border Villagers to Delay Return Amid Israeli Threat Risk", "summary_ja": "レバノン軍は、国境沿いの村の住民に対し、安全上の懸念を理由に帰還を見合わせるよう警告した。軍司令部は公式声明で、住民の安全をイスラエルによる侵害や攻撃のリスクから守るため、展開中の部隊の指示に従うよう強調した。レバノンとイスラエルの国境地帯では依然として緊張が続いており、当局は住民に慎重な対応を求めている。", "summary_en": "The Lebanese Army has warned residents of border villages not to return home yet, citing ongoing security concerns. In an official statement, the army command stressed the importance of following instructions from deployed units to ensure civilian safety. The warning comes amid continued tensions along the Lebanese-Israeli border, with authorities flagging risks from potential Israeli violations and attacks.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/lebanese-army-warns-residents-of-border-villages-to-wait-before-returning/article71104583.ece", "state_media": false, "category": "政治"}, {"title_ja": "パキスタン、米国とイランの和平合意署名式をスイスで主催へ＝シャバズ首相", "title_en": "Pakistan to Host US-Iran Peace Deal Signing Ceremony in Switzerland: PM Shehbaz", "summary_ja": "パキスタンのシャバズ・シャリフ首相は、米国とイランの和平合意の署名式をスイスでパキスタンが主催すると発表した。首相はこの合意を「歴史的な節目」と称え、「3か月と16日間の不断の努力」の末に実現したと述べた。シャリフ首相はこの進展を地域および国際的な安定に向けた新たな夜明けとして歓迎した。", "summary_en": "Pakistani Prime Minister Shehbaz Sharif announced that Pakistan will host the signing ceremony of a peace deal between the United States and Iran in Switzerland. Sharif described the agreement as a 'historic milestone' of peace, crediting 'three months and 16 days of tireless efforts' for achieving the breakthrough. The Prime Minister hailed the development as a new dawn for regional and international stability.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/pakistan-will-host-signing-ceremony-of-peace-deal-between-us-and-iran-in-switzerland-pm-shehbaz/article71104411.ece", "state_media": false, "category": "政治"}, {"title_ja": "ノルウェー石油産業のメンテナンス労働者がストライキを開始", "title_en": "Norway Oil Industry Maintenance Workers Launch Strike Over Labor Dispute", "summary_ja": "ノルウェーエネルギー労働者組合（SAFE）は2026年6月15日月曜日、午前10時より石油サービス労働者154人によるストライキを開始した。さらに6月18日木曜日には追加で224人が争議行動に参加する予定となっている。ストライキはノルウェー石油産業のメンテナンス部門を対象としており、労使交渉の行き詰まりが背景にある。", "summary_en": "The Norwegian Union of Energy Workers (SAFE) initiated a strike among oil service workers on Monday, June 15, 2026, with 154 workers walking off the job at 10:00 am local time. An additional 224 workers are set to join the industrial action on Thursday, June 18, 2026. The strike targets maintenance operations within Norway's oil industry amid ongoing labor negotiations.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/norway-oil-industry-maintenance-workers-launch-strike/article71104377.ece", "state_media": false, "category": "経済"}, {"title_ja": "米国とイランが停戦合意、G7首脳がフランスで会合", "title_en": "G7 Leaders Convene in France Amid U.S.-Iran War Agreement", "summary_ja": "G7首脳は6月15日から17日にかけてフランスで開催される首脳会議に集結し、米国とイランが宣言した戦争終結合意を受けた今後の対応を協議する。首脳会議ではイラン問題に加え、ウクライナでの戦争への対応も主要議題となる。各国首脳はこれらの国際的な危機に対する共通の立場を模索する見通しだ。", "summary_en": "G7 leaders are gathering in France for a June 15-17 summit to discuss next steps following a declared agreement between the United States and Iran to end their conflict. The summit will address multiple pressing global issues, including the ongoing war in Ukraine. World leaders will seek common ground on coordinated responses to both the Iran situation and the Ukraine crisis.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/g7-leaders-meet-in-france-after-us-and-iran-declare-agreement-to-end-war/article71103501.ece", "state_media": false, "category": "政治"}, {"title_ja": "トランプ大統領、米・イラン「恒久的」和平合意を発表――ホルムズ海峡の海上封鎖を解除", "title_en": "Trump Announces 'Permanent' U.S.-Iran Peace Deal, Lifts Naval Blockade in Strait of Hormuz", "summary_ja": "ドナルド・トランプ大統領は、イランとの和平合意が「完了した」と宣言し、両国間の軍事行動に恒久的な終止符が打たれたと述べた。合意の一環として、米国は海上封鎖を解除し、ホルムズ海峡が国際航行に向けて再開通した。この発表は、長年にわたり敵対関係が続いてきた米・イラン関係における重大な転換点となる。", "summary_en": "President Donald Trump declared a peace deal with Iran 'now complete,' marking what he described as a permanent end to military action between the two nations. As part of the agreement, the United States will lift its naval blockade, and the Strait of Hormuz has been reopened to international shipping. The announcement represents a significant shift in U.S.-Iran relations, which have long been marked by hostility and tension.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/us-iran-reach-peace-deal-signing-set-for-friday-pakistan-says/article71102525.ece", "state_media": false, "category": "政治"}, {"title_ja": "英首相が16歳未満のSNS利用禁止を発表、子どものオンライン規制で各国が対応強化", "title_en": "UK PM Announces Social Media Ban for Under-16s Amid Global Push to Protect Children Online", "summary_ja": "英国のスター首相は、子どもの心身の健康や安全への懸念を背景に、16歳未満のソーシャルメディア利用を禁止する方針を発表した。世界各国でも未成年者のSNS利用を制限する法規制の導入や検討が進んでいる。英国はこうした立法措置を講じる国々の仲間入りをし、デジタル空間における子どもの保護強化に向けた国際的な動きが加速している。", "summary_en": "UK Prime Minister has announced plans to ban children under 16 from using social media, reflecting growing concern over its impact on young people's health and safety. Several countries around the world are implementing or considering similar regulations to limit children's access to social media platforms. The move places the UK among a growing list of nations taking legislative action to safeguard minors in the digital space.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/canada-introduces-bill-to-restrict-social-media-access-for-under-16s/article71088338.ece", "state_media": false, "category": "社会"}, {"title_ja": "卒業生に「自分を終わらせろ」と発言した台湾の大学学長が無給休暇を取得", "title_en": "Taiwan University President Takes Unpaid Leave After Telling Graduates to 'End Themselves'", "summary_ja": "台湾のある大学学長が、卒業式で卒業生に「自分を終わらせろ」と発言したことで激しい批判を受け、無給休暇を取得した。この不適切な発言は社会的な怒りを呼び、責任を求める声が相次いだ。大学側は学長の自主的な無給休暇取得以外に、さらなる懲戒処分については現時点で発表していない。", "summary_en": "A university president in Taiwan has taken unpaid leave following public outrage over remarks made during a graduation ceremony in which he told graduates to 'end themselves.' The controversial statement sparked widespread criticism and calls for accountability. The university has yet to announce further disciplinary action beyond the president's voluntary unpaid leave.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE05U1FEVkpLVkRybm1VSGJaUW8tUUp1Q2lLZ0R4UXh4Tmx6Q2dsQks3UzlNdXEzcmxReU9zcUNZbUtXTTY2SGV5VVZSclhob1dZd0RRTWVB?oc=5", "state_media": false, "category": "政治"}, {"title_ja": "台湾産マンゴーがフランス市場に参入、高級流通チャネルを狙う", "title_en": "Taiwan Mangoes Enter French Market, Targeting Premium Channels", "summary_ja": "台湾産マンゴーがフランス市場への参入を果たし、高級小売・流通チャネルを中心に展開されることとなった。これは台湾の農産物輸出戦略における重要な一歩であり、欧州市場で台湾産マンゴーをプレミアム商品として位置づけることを目指している。今回のフランス進出により、欧州の消費者に台湾産熱帯果物の認知度が高まることが期待される。", "summary_en": "Taiwan has successfully introduced its mangoes into the French market, with a focus on premium retail and distribution channels. The move marks a significant step in Taiwan's agricultural export strategy, aiming to position Taiwanese mangoes as a high-end product in Europe. This entry into France is expected to raise the profile of Taiwanese tropical fruits among European consumers.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE5lSTlBT0t6T1Y5RnhoN2VVd1dSUGNKYjF4UW5CU3Rsc3M5SFFvRnBPMGdlX2tHOHJwOUNXWkJfTm9hMXdvQ3B5WW5DVlBZTmkzSm5PRDlR?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "台湾海巡署、太平島制限水域から中国船を退去させる", "title_en": "Taiwan Coast Guard Expels Chinese Vessels from Taiping Island Restricted Waters", "summary_ja": "台湾の海巡署は、太平島（伊図アバ）周辺の制限水域に侵入した中国船舶を退去させた。この事件は、南シナ海における台湾実効支配の地物をめぐる緊張が続いていることを浮き彫りにしている。台湾当局は海上管轄権を行使し、当該船舶を保護水域外へ排除した。", "summary_en": "Taiwan's coast guard has expelled Chinese vessels that entered the restricted waters surrounding Taiping Island (Itu Aba). The incident highlights ongoing tensions over Taiwan-controlled features in the South China Sea. Taiwanese authorities enforced their maritime jurisdiction by removing the vessels from the protected zone.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE1UUWxZaGlVSkRqUVFIT1ZyQ3lkTlhRTnkwQzFCQWFvdXJYWHpWczYyQnZSaFJmLVNYRnNZNW51bmRvLXVOVEtrS2pWVHloOE1SbmFZU2Fzaw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾の最高情報機関、中国に関する情報提供サイトを開設", "title_en": "Taiwan's Top Intelligence Agency Launches PRC Tip-Off Website", "summary_ja": "台湾の主要情報機関は、中国のスパイ活動や影響工作に関する情報を市民が通報できる専用ウェブサイトを開設した。このプラットフォームは、中華人民共和国による台湾を標的とした工作活動に関する情報提供を促進することを目的としている。この措置は、両岸間の安全保障上の脅威や中国の秘密干渉に対する懸念の高まりを反映している。", "summary_en": "Taiwan's leading intelligence agency has launched a dedicated website allowing the public to report suspected Chinese espionage and influence activities. The platform is designed to encourage citizens to submit tips related to People's Republic of China operations targeting Taiwan. The move reflects growing concerns over cross-strait security threats and covert PRC interference.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5rVF9pbzVoSUR0a21uUXZnejN1NzJmX01OQngwMFBEZHVHaXUxX19zRVdZTm1VRWZZZlZKLUpwZ184V3RkS216eHduWnotaEVGZDZ2QmN4aw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾人の過半数が「一つの中国原則」を拒否も反対は減少、世論調査", "title_en": "Majority of Taiwanese Reject 'One China Principle' but Opposition Declines: Poll", "summary_ja": "新たな世論調査によると、台湾人の過半数は依然として台湾が中国の一部であるとする「一つの中国原則」を拒否している。しかし、反対の割合は以前の調査と比べて低下していることが明らかになった。この結果は、両岸関係や台湾の政治的アイデンティティに関する世論の変化を浮き彫りにしている。", "summary_en": "A new poll shows that a majority of Taiwanese people continue to reject the 'one China principle,' which asserts Taiwan is part of China. However, the level of opposition has dropped compared to previous surveys. The findings highlight shifting public sentiment on cross-strait relations and Taiwan's political identity.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE1nTXgwdlFTV0JoRE1nQXFuU1lrMHh3WlVYM3UzX0lySGdkX1RWcWUxbHlJUEpoaXFzRWZfUjBTLUpKUmtJU29PbVljTU9JQTY3dk5nbXRQVQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "中国が観光を武器化する中、蕭副総統が台湾市民にパラオ訪問を呼びかけ", "title_en": "Taiwan VP Hsiao Urges Citizens to Visit Palau Amid China's Tourism Weaponization", "summary_ja": "台湾の蕭美琴副総統は、中国が観光を地政学的手段として利用し続ける中、台湾市民にパラオ訪問を促した。中国は台湾の数少ない外交的同盟国であるパラオへの自国民の渡航を制限し、同国に経済的圧力をかけている。この呼びかけは、中国の圧力に対抗して台湾が外交パートナーを支援しようとする姿勢を示すものだ。", "summary_en": "Taiwanese Vice President Hsiao Bi-khim has encouraged Taiwanese citizens to visit Palau as China continues to use tourism as a geopolitical tool. China has restricted its citizens from traveling to Palau, one of Taiwan's few remaining diplomatic allies, in an effort to economically pressure the island nation. The appeal highlights Taiwan's efforts to support its diplomatic partners against Chinese coercion.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE1Cb2NSZjBmNmFUcTYtaUVIaTFyNncxMU5QeUl1XzFUYkJScHVUcnFrWGlVdDdkdjNtWVdSaEJPeV9pR3U3SWc3Y2h1VmYyb3Z4aVRmOHVyUQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾、調達約束後に中国市場リスクを警告", "title_en": "Taiwan Warns of China Market Risks Following Procurement Pledges", "summary_ja": "台湾は最近の調達約束を受け、中国市場への過度な依存リスクについて警告を発した。当局者は、中国との経済的結びつきの深化が台湾に重大な脆弱性をもたらす可能性への懸念を強調した。この警告は、台湾が貿易関係を多角化しようとする広範な戦略と、継続する両岸緊張を反映している。", "summary_en": "Taiwan has issued warnings about the risks of over-reliance on the Chinese market following recent procurement pledges. Officials highlighted concerns that deepening economic ties with China could expose Taiwan to significant vulnerabilities. The caution reflects ongoing tensions and Taiwan's broader strategy to diversify its trade relationships.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE9tcTN5UVNNcUhITmdpWVpncklLVk9wVFN2a0JpNUZWdWotdEFETXJkZzNxTzluTGtCNXA3c2M4TnQzZXJmbWZKcDlPOU5Wd2xNOF81TXR4bw?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "ベテランマンダポップ歌手・作曲家のデビッド・ウォン、61歳で死去", "title_en": "Veteran Mandopop Singer-Songwriter David Wong Dies at 61", "summary_ja": "ベテランのマンダポップ歌手兼作曲家であるデビッド・ウォン（黄國倫）が61歳で逝去した。ウォンは中国語ポップス界において、歌手・作曲家として多大な貢献をした著名な人物であった。その死はマンダポップ音楽界にとって大きな損失となっている。", "summary_en": "Veteran Mandopop singer-songwriter David Wong has passed away at the age of 61. Wong was a celebrated figure in the Chinese-language pop music industry, known for his contributions as both a performer and songwriter. His death marks a significant loss for the Mandopop music community.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE1tVVotUzZKN21rbDJSWTRPNjAyemJuSXlCRXI2LWxoZ3R3emlxSnk2cVVnNWJubUtEM2ZRZE5qNlgxVHM3c3lyTEhkWkh6VHdFMHpFc0tn?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "KMT幹部が中国フォーラムで「共通の遺産」発言、台湾の陸委会が批判", "title_en": "KMT Official's 'Shared Heritage' Remarks at China Forum Draw Rebuke from Taiwan's MAC", "summary_ja": "中国国民党（KMT）の幹部が中国で開かれたフォーラムで「共通の遺産」を強調する発言を行い、台湾の行政院大陸委員会（陸委会）から批判を受けた。陸委会はこの発言が台湾と中国の区別を曖昧にする恐れがあるとして懸念を示した。今回の出来事は、KMTの両岸交流路線と台湾政府の公式立場との間に依然として緊張関係があることを浮き彫りにしている。", "summary_en": "A Kuomintang official drew criticism from Taiwan's Mainland Affairs Council after making a 'shared heritage' pitch at a forum in China. The MAC rebuked the remarks, signaling concern over messaging that could blur distinctions between Taiwan and China. The incident highlights ongoing tensions between the KMT's cross-strait engagement approach and the government's official stance on Taiwan's separate identity.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5HcXBQM3ZkZEM4RWVKVUJXMnlvNFUxd2FiNEpaYXdzNGEtWEM5aGd6QnlHRFY1YVdYMURhbXBYcGd5YnlqZGZraGxyTFp4bXJtZFEtVzBQdw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "団体、代理店雇用の移民介護士保護強化を訴え", "title_en": "Groups Urge Stronger Protections for Migrant Caregivers in Agency Hiring", "summary_ja": "台湾の擁護団体は、代理店を通じて雇用される移民介護士に対するより強力な保護措置を求めている。現行の代理店雇用制度では、外国人介護労働者が搾取や虐待にさらされやすい状況にあると指摘されている。団体側は、この労働者層に対する公正な待遇と法的保護を確保するため、制度改革を強く求めている。", "summary_en": "Advocacy groups in Taiwan are calling for stronger protections for migrant caregivers hired through agencies. The groups argue that the current agency-based hiring system leaves foreign care workers vulnerable to exploitation and abuse. Reforms are being urged to ensure better oversight, fair treatment, and legal safeguards for this workforce.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE9hZFdWWW9YcEJhNDdmTTlKeTh2d1F0R0Y3ZS02NkZMSlNhLU84NDF3b1FaOEpIVlVSdXFEeWh2Y3NObXZyM3J2dVU2UmxhT25NWVFGTHJR?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ブラジル人牧師、イタリアでペンテコステ派教会を32年間率いる", "title_en": "Brazilian Pastor Has Led a Pentecostal Church in Milan for 32 Years", "summary_ja": "サンパウロ州カンピーナス出身のロセレン・ボエルネル・ファッシオ牧師（57歳）は、32年前にミラノの労働者階級の地区ジャンベッリーノにサバオス教会を設立した。同教会は約1,000人収容のシアターを拠点とし、毎週日曜日に2回の礼拝を行っている。公用語はイタリア語で、信徒の大半は若いイタリア人が占めている。", "summary_en": "Pastor Roselen Boerner Faccio, 57, originally from Campinas, São Paulo, founded Sabaoth Church in Milan's working-class Giambellino district 32 years ago. The Pentecostal evangelical church is housed in a theater that seats around 1,000 people and holds two Sunday services. Conducted entirely in Italian, the congregation draws a predominantly young Italian membership.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/brazilian-pastor-has-led-a-pentecostal-church-in-italy-for-32-years.shtml", "state_media": false, "category": "社会"}, {"title_ja": "主要22カ国、ギャングや詐欺・強盗を理由にブラジルへの渡航注意を勧告", "title_en": "22 Major Economies Warn Travelers About Crime and Gang Violence in Brazil", "summary_ja": "世界の主要30カ国・地域のうち22カ国が、詐欺や武装強盗、組織犯罪などを理由にブラジルへの渡航に注意を呼びかける渡航情報を発出している。一部の国は、犯罪組織間の衝突が発生している特定地域への渡航を特に控えるよう勧告している。こうした警告は、ブラジル各地の治安状況に対する国際社会の広範な懸念を反映している。", "summary_en": "Travel advisories from 22 of the world's 30 largest economies caution citizens about visiting Brazil, citing risks including scams, armed robberies, and organized crime. Some countries go further by discouraging travel to specific regions due to violence and clashes between criminal groups. The warnings reflect widespread international concern over public safety conditions across various parts of Brazil.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/countries-cite-gangs-scams-and-robberies-in-travel-advisories-for-brazil.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米国人アーティスト「ジェリー・ゴゴシアン」、サンパウロの高級ホテルで死亡　享年40歳", "title_en": "American Artist Jerry Gogosian Found Dead at 40 in São Paulo Luxury Hotel", "summary_ja": "ソーシャルメディアで「ジェリー・ゴゴシアン」として知られる米国人アーティスト、ヒルデ・リン・ヘルフェンシュタイン氏（40歳）が、1月31日（日）にサンパウロのローズウッドホテルで死亡しているのが発見された。ホテル側は声明で事実を認め、当局に協力していると述べたが、詳細については明らかにしていない。死亡の経緯についてはまだ公表されていない。", "summary_en": "American artist Hilde Lynn Helphenstein, widely known on social media as Jerry Gogosian, was found dead at age 40 at the Rosewood hotel in São Paulo on Sunday, January 31. The hotel confirmed the incident in an official statement, saying it is cooperating with authorities. No further details regarding the circumstances of her death have been disclosed.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/american-artist-jerry-gogosian-40-found-dead-in-luxury-hotel-in-brazil.shtml", "state_media": false, "category": "IT"}, {"title_ja": "コロンビア大統領決選投票、ブラジルの南米同盟国を失う恐れ", "title_en": "Colombia Runoff Could Cost Brazil a Key South American Ally", "summary_ja": "コロンビアでは6月21日に大統領決選投票が行われ、現職グスタボ・ペトロの盟友である左派のイバン・セペダと、極右の新人候補アベラルド・デ・ラ・エスプリエジャが対決する。右派候補が勝利すれば、ルーラ大統領にとって南米に残る数少ないイデオロギー的同盟国の一つを失うことになり、ブラジルの外交戦略に直接的な影響を及ぼす。この選挙はかつてラテンアメリカを席巻した左派の波が後退しつつある地域的潮流を反映している。", "summary_en": "Colombia is heading to a presidential runoff on June 21 between left-wing candidate Iván Cepeda, an ally of incumbent Gustavo Petro, and far-right newcomer Abelardo de la Espriella. The result carries significant geopolitical weight for Brazil, as a right-wing victory would erode one of President Lula's few remaining ideological partners in South America. The race highlights the broader regional shift away from the left-wing wave that once dominated Latin American politics.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/right-wing-shift-in-colombia-could-eliminate-one-of-brazils-last-allies-in-south-america.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米国、ブラジルの犯罪組織CVとPCCをテロ組織に指定", "title_en": "U.S. Designates Brazil's Comando Vermelho and PCC as Terrorist Organizations", "summary_ja": "米国は、ブラジルの犯罪組織「コマンド・ヴェルメーリョ（CV）」と「プリメイロ・コマンド・ダ・カピタル（PCC）」をテロ組織に正式指定し、6月5日に発効すると発表した。ルビオ国務長官は両組織をブラジルで最も危険な集団と位置づけ、その影響力が中南米全域および米国内にまで及んでいると警告した。この決定は、ブラジルのフラヴィオ・ボルソナロ上院議員がワシントンでトランプ大統領、ルビオ長官、バンス副大統領と会談した直後に下された。", "summary_en": "The United States has officially designated Brazilian criminal groups Comando Vermelho (CV) and Primeiro Comando da Capital (PCC) as terrorist organizations, with the designation taking effect on June 5. Secretary of State Marco Rubio described the groups as the most dangerous in Brazil, warning that their influence extends across Latin America and into the United States. The move follows a visit by Brazilian Senator Flávio Bolsonaro to Washington, where he met with President Trump, Rubio, and Vice President Vance.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/05/us-declares-comando-vermelho-and-pcc-terrorist-organizations.shtml", "state_media": false, "category": "政治"}, {"title_ja": "フラビオ・ボルソナロ、トランプ大統領と会談しPCCとCVのテロ組織指定を要請", "title_en": "Flávio Bolsonaro Meets Trump, Urges US to Label PCC and CV as Terrorist Groups", "summary_ja": "ブラジルの上院議員フラビオ・ボルソナロは5月26日（火）、ホワイトハウスでトランプ米大統領と会談した。会談でボルソナロ氏は、ブラジルの犯罪組織「プリメイロ・コマンド・ダ・カピタル（PCC）」および「コマンド・ベルメーリョ（CV）」をテロ組織として公式に指定するよう米政府に求めた。トランプ大統領はこの要請を現在検討中であると述べたという。", "summary_en": "Brazilian senator Flávio Bolsonaro met with U.S. President Donald Trump at the White House on Tuesday, May 26. During the meeting, Bolsonaro requested that the U.S. government officially designate Brazilian criminal factions Primeiro Comando da Capital (PCC) and Comando Vermelho (CV) as terrorist organizations. Trump indicated the request is currently under review.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/05/flavio-bolsonaro-meets-trump-and-says-he-asked-to-classify-pcc-and-cv-as-terrorist-groups.shtml", "state_media": false, "category": "政治"}, {"title_ja": "抗議運動続くイランでベール未着用・バイク乗車の女性が増加", "title_en": "Women Without Veils and Riding Motorcycles Multiply in Iran Amid Ongoing Unrest", "summary_ja": "イランでは政府の取り締まりが続く中、公共の場でヒジャブ着用義務に反抗する女性が増えている。ある若い女性がベールを着けずにバイクで走り、通りかかった警察官に手を振る場面が象徴的な例として注目された。この動きは、2022年のマフサ・アミニ死亡事件をきっかけに起きた抗議運動以来、拡大し続ける市民的不服従の流れを反映している。", "summary_en": "Despite continued government crackdowns, Iranian women are increasingly defying mandatory hijab laws in public spaces. A striking symbol of this resistance shows a young woman riding a motorcycle without a veil, casually waving at a police officer as she passes. The trend reflects a broader, persistent civil disobedience movement that has grown since the 2022 protests sparked by the death of Mahsa Amini.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/05/as-war-continues-women-without-veils-and-riding-motorcycles-multiply-in-iran.shtml", "state_media": false, "category": "政治"}, {"title_ja": "ルラ大統領、トランプ氏によるアマゾン侵攻を懸念―ブラジルの国境警備強化を訴え", "title_en": "Lula Fears Trump May Target Amazon, Says Brazil Needs Stronger Border Security", "summary_ja": "ブラジルのルイス・イナシオ・ルラ・ダ・シルバ大統領は木曜日、ドナルド・トランプ氏がアマゾン地域に対して何らかの行動を起こす可能性があると懸念を示した。ルラ大統領はこうした脅威に対応するため、ブラジルの国境警備を強化する必要があると訴えた。この発言は、アマゾンの主権と環境政策をめぐるブラジルと米国の間の緊張の高まりを浮き彫りにしている。", "summary_en": "Brazilian President Luiz Inácio Lula da Silva expressed concern on Thursday that Donald Trump could take action against the Amazon rainforest. Lula called for strengthening Brazil's border security in response to the perceived threat. The remarks highlight growing tensions between Brazil and the United States over sovereignty and environmental policy in the Amazon region.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/05/lula-says-he-fears-a-trump-invasion-of-the-amazon-and-claims-brazil-lacks-adequate-security.shtml", "state_media": false, "category": "政治"}, {"title_ja": "83歳のウルグアイ人男性、独裁政権時代の失踪の真相を求めブラジルからモンテビデオへ", "title_en": "Uruguayan Man, 83, Travels from Brazil to March for Answers on Dictatorship Disappearances", "summary_ja": "ブラジル南部のリオグランデ・ド・スル州に住む83歳のウルグアイ人市民オラシオ・ゴイコエチェアは、毎年ウルグアイの首都で開催される「沈黙の行進」に参加するためモンテビデオへ向かった。彼は1977年12月にブエノスアイレスで行方不明になった兄弟グスタボ・ゴイコエチェア・カマーチョの消息を今も探し続けている。「沈黙の行進」は南米の軍事独裁政権による弾圧の犠牲者を追悼するために毎年開催されている。", "summary_en": "Horácio Goicoechea, an 83-year-old Uruguayan citizen living in Rio Grande do Sul, Brazil, traveled to Montevideo to participate in Uruguay's annual March of Silence. He continues to seek answers about his brother, Gustavo Goycoechea Camacho, who disappeared in Buenos Aires in December 1977 during the era of South American military dictatorships. The March of Silence is held annually in Uruguay's capital to commemorate victims of state repression.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/05/uruguayan-travels-from-southern-brazil-to-montevideo-to-march-in-search-of-answers-about-dictatorship-crimes.shtml", "state_media": false, "category": "社会"}, {"title_ja": "制裁と通貨暴落で現金なし経済へ、イランのリアルが2年で265%下落", "title_en": "Sanctions and Currency Collapse Drive Iran's Cash-Free Economy", "summary_ja": "イランは数十年にわたる制裁により国際金融システムからほぼ完全に切り離され、国内取引はデビットカードに大きく依存している。イランの通貨リアルはわずか2年間で265%の価値を失い、2024年5月に1ドル52万リアルだったものが、闇市場では現在190万リアルにまで下落した。公式に近い半公式レートの130万リアルと実勢レートとの大きな乖離は、同国の深刻な金融歪みを浮き彫りにしている。", "summary_en": "Iran's economy operates in near-total isolation from the global financial system due to decades of sanctions, forcing it to rely heavily on debit cards for domestic transactions. The Iranian rial has collapsed dramatically, losing 265% of its value in just two years, with the black market rate now reaching 1.9 million rials per U.S. dollar compared to 520,000 in May 2024. The gap between the semi-official rate of 1.3 million and the real market rate underscores the deep financial distortions gripping the country.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/05/hit-by-sanctions-and-currency-devaluation-irans-economy-runs-on-debit-cards.shtml", "state_media": false, "category": "経済"}, {"title_ja": "少数党幹部交代を受け、ナイジェリア下院が委員会委員長を刷新", "title_en": "Nigeria House Reshuffles Committee Leaders Following Minority Caucus Leadership Changes", "summary_ja": "ナイジェリア下院のアッバス・タジュデン議長は、委員会委員長の刷新を発表した。この人事異動は、下院少数党幹部の最近の交代に伴うものである。新たな少数党体制に合わせて委員会の構成が見直された。", "summary_en": "Speaker Abbas Tajudeen announced a reshuffle of committee leaders in Nigeria's House of Representatives. The changes were prompted by recent shifts in the leadership of the House minority caucus. The reshuffle aligns committee assignments with the new minority caucus structure.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/887853-house-reshuffles-committee-leaders-after-minority-caucus-changes.html", "state_media": false, "category": "社会"}, {"title_ja": "ナイジェリア裁判所、ADCやアコードなど複数政党の登録抹消を命令", "title_en": "Court Orders Deregistration of ADC, Accord and Other Nigerian Political Parties", "summary_ja": "ナイジェリアの裁判所は、アフリカ民主会議（ADC）やアコード党など複数の政党に対し、登録抹消を命じる判決を下した。裁判官は、対象政党がナイジェリア憲法第225条に違反したと指摘した。この判決は、複数の野党および小規模政党にとって大きな法的打撃となる。", "summary_en": "A Nigerian court has ordered the deregistration of the African Democratic Congress (ADC), Accord, and several other political parties. The judge ruled that the affected parties violated Section 225 of the Nigerian Constitution. The decision marks a significant legal blow to multiple opposition and smaller parties in Nigeria.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/headlines/887849-breaking-court-orders-deregistration-of-adc-accord-other-parties.html", "state_media": false, "category": "社会"}, {"title_ja": "アティク、2027年大統領選でアマエチ氏を副大統領候補に指名", "title_en": "Atiku Picks Amaechi as Running Mate for 2027 Presidential Race", "summary_ja": "ナイジェリアの元副大統領アティク・アブバカル氏が、ADC党から2027年大統領選挙に臨むにあたり、ロティミ・アマエチ氏を副大統領候補として選出した。党は、アマエチ氏の選出は党指導者や連立パートナー、若者・女性の利害関係者、全地政学的地域の代表者との広範な協議を経て決定されたと説明した。この発表はナイジェリアの次期総選挙に向けた重要な政治的連携を示すものとなっている。", "summary_en": "Former Nigerian Vice President Atiku Abubakar has selected Rotimi Amaechi as his running mate for the 2027 presidential election under the ADC party. The party stated that Amaechi was chosen following extensive consultations with party leaders, coalition partners, youth and women stakeholders, and representatives from all geopolitical zones. The announcement signals a significant alliance ahead of Nigeria's next general election.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/headlines/887846-2027-atiku-picks-amaechi-as-running-mate.html", "state_media": false, "category": "政治"}, {"title_ja": "ナイジェリア司法長官、テロ容疑者の大規模裁判開始に際し治安対策への真剣な取り組みを強調", "title_en": "Nigeria's AGF Vows Government Taking Insecurity Seriously as Mass Terror Trial Begins", "summary_ja": "ナイジェリアの連邦司法長官（AGF）は、政府が治安問題を最重要課題として取り組んでいると国民に対して保証した。この発言は、テロ容疑者を対象とした新たな大規模裁判が月曜日にアブジャで始まったタイミングで行われた。司法長官の発言は、テロ関連犯罪で起訴された容疑者の訴追に対する政府の継続的なコミットメントを示すものである。", "summary_en": "Nigeria's Attorney General of the Federation (AGF) has assured the public that the government is treating insecurity with the utmost seriousness. The statement came as a new round of mass trials of terrorism suspects commenced in Abuja on Monday. The AGF's remarks signal continued government commitment to prosecuting those accused of terrorism-related offenses.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/887844-government-not-taking-insecurity-with-levity-agf-says.html", "state_media": false, "category": "政治"}, {"title_ja": "ナイジェリア下院、2025年連邦予算の執行期限を9月まで再延長", "title_en": "Nigerian House of Reps Extends 2025 Federal Budget Implementation to September", "summary_ja": "ナイジェリアの代議院は、2025年連邦予算の資本支出部門に関する執行期限を9月まで延長することを承認した。これは国民議会が同予算に対して認めた3度目の延長措置となる。度重なる延長は、アフリカ最大の経済大国における資本プロジェクト支出の遅れに対する懸念を高めている。", "summary_en": "Nigeria's House of Representatives has approved a third extension for the capital expenditure section of the 2025 federal budget, pushing the implementation deadline to September. This marks the latest in a series of extensions granted by the National Assembly to allow more time for budget execution. The repeated extensions raise concerns about the pace of capital project spending in Africa's largest economy.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/887839-reps-extend-2025-federal-budget-implementation-until-september.html", "state_media": false, "category": "経済"}, {"title_ja": "ザンファラ州で兵士が誘拐被害者6人を救出", "title_en": "Soldiers Rescue 6 Kidnap Victims in Zamfara State", "summary_ja": "ナイジェリア北西部のザンファラ州で、軍の作戦により誘拐された6人の被害者が救出された。被害者たちは、軍による継続的な圧力と航空阻止作戦を受け、拘束状態から脱出することに成功した。今回の救出は、治安情勢が不安定な同州で活動するナイジェリア軍にとって重要な成果となった。", "summary_en": "Six kidnap victims have been rescued in Zamfara State, Nigeria, following sustained military operations. The victims managed to escape from captivity after persistent military pressure and air interdiction missions in the region. The rescue marks a notable success for Nigerian armed forces operating in the conflict-prone northwest state.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/nwest/887835-soldiers-rescue-6-kidnap-victims-in-zamfara.html", "state_media": false, "category": "政治"}, {"title_ja": "ファクトチェック：クリス・オヤキロメ師がナイジェリア2027年選挙を予言したか？", "title_en": "Fact Check: Did Pastor Chris Oyakhilome Prophesy About Nigeria's 2027 Election?", "summary_ja": "オンラインで拡散している記事によると、キリスト大使館の創設者クリス・オヤキロメ師が、ナイジェリアの2027年大統領選挙における3人の主要候補者について予言したと主張されている。プレミアム・タイムズがこの主張の真偽を調査した。このファクトチェックは、当該予言が本物かどうかを明らかにすることを目的としている。", "summary_en": "An article circulating online claims that Pastor Chris Oyakhilome, founder of Christ Embassy, recently made a prophecy about three major contenders in Nigeria's 2027 presidential election. Premium Times investigated the claim to determine its authenticity. The fact-check aims to clarify whether the prophecy attributed to the pastor is genuine or fabricated misinformation.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/887830-factcheck-did-pastor-chris-recently-prophesy-about-the-2027-election-what-we-found.html", "state_media": false, "category": "政治"}, {"title_ja": "NBAの汚職対策委員長「ナイジェリアには道徳的覚醒が必要」", "title_en": "Nigeria Needs Moral Reawakening to Defeat Corruption, Says NBA Anti-Corruption Chair", "summary_ja": "ナイジェリア弁護士会（NBA）の汚職対策委員会委員長は、蔓延する汚職に対抗するためにナイジェリア社会の道徳的覚醒が必要だと訴えた。同氏は、汚職がかつての逸脱行為から社会的規範へ、そして秘密裏の取引から公然と称賛される行為へと変質したと警告した。この発言は、ナイジェリア社会における腐敗行為の常態化に対する深刻な懸念を浮き彫りにしている。", "summary_en": "The chairman of the Nigerian Bar Association's anti-corruption committee has called for a moral reawakening in Nigeria to combat widespread corruption. He warned that corruption has shifted from being a social deviance to an accepted norm, and from a hidden act to a publicly celebrated achievement. The statement underscores growing concerns about the normalization of corrupt behavior in Nigerian society.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/ssouth-west/887821-nigeria-needs-moral-reawakening-to-defeat-corruption-nba-anti-corruption-chair.html", "state_media": false, "category": "社会"}, {"title_ja": "NCDMBの石油・ガスパーク、2026年第4四半期に稼働予定", "title_en": "NCDMB Oil and Gas Park Set to Open in Q4 2026", "summary_ja": "ナイジェリアのNCDMB（石油・ガス開発監視局）が整備を進める石油・ガス産業パークが、2026年第4四半期に稼働する見通しとなった。稼働に向けた準備として、同局は施設内に出力2.5メガワットの圧縮天然ガス（CNG）発電設備を導入する計画だ。同パークはナイジェリアのエネルギー分野における現地調達能力の強化に貢献すると期待されている。", "summary_en": "Nigeria's NCDMB oil and gas industrial park is on track to become operational in the fourth quarter of 2026. As part of preparations, the agency plans to install a 2.5-megawatt Compressed Natural Gas power plant at the facility. The park is expected to boost local content development in Nigeria's energy sector.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/promoted/887814-ncdmbs-oil-and-gas-park-to-become-operational-in-q4-2026.html", "state_media": false, "category": "政治"}, {"title_ja": "オスン州でデモ隊が警察署長の配備を要求", "title_en": "Protesters in Osun State Demand Deployment of New Police Commissioner", "summary_ja": "ナイジェリアのオスン州で、市民らが警察署長の配備を求めてデモ行進を行った。このデモは、州政府と警察本部の間で治安問題の対応をめぐる緊張が高まる中で発生した。州内の法執行機関に対する住民の懸念が増していることが浮き彫りとなった。", "summary_en": "Demonstrators took to the streets in Osun State, Nigeria, calling for the deployment of a police commissioner to the region. The protest reflects escalating tensions between the Osun State Government and the local police command over how security matters are being handled. The demonstration underscores growing public concern about law enforcement accountability in the state.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/regional/ssouth-west/887811-protesters-demonstrate-in-osun-seek-deployment-of-police-commissioner.html", "state_media": false, "category": "政治"}, {"title_ja": "EUの気候監視機関、2026年5月が世界で観測史上2番目に暑い5月と報告", "title_en": "EU Climate Monitor: May 2026 Was Second-Warmest May on Record Globally", "summary_ja": "新華社およびCGTNによると、欧州連合（EU）の気候変動監視機関「コペルニクス気候変動サービス」は、2026年5月が世界の観測史上2番目に暑い5月だったと報告した。同機関はまた、西ヨーロッパでは異例に早い熱波が発生したとしている。この発表は水曜日に行われ、EUの公式気候追跡機関の調査結果として伝えられている。", "summary_en": "Xinhua/CGTN reports that May 2026 ranked as the world's second-warmest May ever recorded, according to the European Union's Copernicus Climate Change Service. The EU climate monitoring body reports that Western Europe experienced an unusually early heatwave during the month. The announcement was made on Wednesday, with the findings attributed to the EU's official climate tracking service.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-11/EU-climate-monitor-reports-second-warmest-May-globally-1NRoU6yzBGU/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "ニューヨーク・ニックス、53年ぶりのNBAチャンピオンに輝く", "title_en": "New York Knicks Win First NBA Championship in 53 Years", "summary_ja": "国営メディアの新華社／CGTNは、ニューヨーク・ニックスが劇的な逆転勝利を収め、53年ぶりのNBA優勝を果たしたと報じている。同メディアによれば、ニックスが最後に優勝したのは1973年であり、フランチャイズにとって歴史的な瞬間だとしている。詳細については独立した情報源による確認が取れていない。", "summary_en": "Xinhua/CGTN reports that the New York Knicks have completed a dramatic comeback to claim their first NBA championship in 53 years. The state-controlled outlet reports this as a historic moment for the franchise, which last won the title in 1973. Independent verification of match details has not been confirmed at time of publication.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-14/New-York-Knicks-complete-comeback-to-win-first-NBA-title-in-53-years-1NXRKaD83OE/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "中国の研究、高緯度地帯の永久凍土に対する山火事の影響を調査", "title_en": "Chinese Study Examines Wildfire Effects on High-Latitude Permafrost", "summary_ja": "新華社／CGTNによると、中国の研究者らが高緯度地域における永久凍土への山火事の影響を明らかにする研究を実施したと報じている。同国営メディアは、この研究成果が火災攪乱による凍土状態への影響解明に貢献するとしている。ただし、研究の規模や結論については独立した検証が現時点では行われていない。", "summary_en": "Xinhua/CGTN reports that Chinese researchers have conducted a study revealing the impacts of wildfires on permafrost in high-latitude regions. The state-controlled outlet reports that the findings shed light on how fire disturbances affect frozen ground conditions in these sensitive ecosystems. No further details from the original source are available to independently verify the scope or conclusions of the research.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-12/Chinese-study-reveals-wildfire-impacts-on-high-latitude-permafrost-1NUOSKNXQyY/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "人口300万人のウルグアイがサッカー大国になった理由", "title_en": "How Uruguay Became a Football Powerhouse Despite Its Small Population", "summary_ja": "新華社／CGTNは、人口わずか300万人のウルグアイが国際サッカーで並外れた成功を収めてきたと報じている。同メディアによると、同国はその規模に不釣り合いなほど多くの世界クラスの選手とタイトルを輩出してきたという。新華社／CGTNは、草の根レベルの育成、熱狂的なサッカー文化、そして強固な制度的支援が、この小さな南米の国がスポーツ界で大きな存在感を示す原動力になっていると報じている。", "summary_en": "Xinhua/CGTN reports that Uruguay, a nation of just 3 million people, has achieved extraordinary success in international football. The state-affiliated outlet reports that the country has produced a disproportionate number of world-class players and titles relative to its size. Xinhua/CGTN reports that factors such as grassroots development, passionate football culture, and strong institutional support are credited with driving the small South American nation's outsized global impact on the sport.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://newsus.cgtn.com/news/2026-06-13/How-Uruguay-with-3-million-people-became-a-football-powerhouse-1NVplmVihwY/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "メキシコシティでワールドカップファンが中南米最大のスタジアムに集結", "title_en": "World Cup Fans Gather at Latin America's Largest Stadium in Mexico City", "summary_ja": "新華社・CGTNによると、メキシコシティでワールドカップのファンたちが中南米最大のスタジアムに続々と集まっているとのこと。国営メディアは、同スタジアムがサッカーの祭典を祝うサポーターの主要な集合場所となっていると報じている。詳細については独立した検証は行われていない。", "summary_en": "Xinhua/CGTN reports that World Cup fans in Mexico City have been flocking to Latin America's largest stadium amid the tournament's excitement. State media reports that the venue has become a major gathering point for supporters celebrating the global football event. The reports suggest significant crowd turnout, though independent verification of the details has not been confirmed.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://newsus.cgtn.com/news/2026-06-12/World-Cup-fans-in-Mexico-City-flock-to-Latin-America-s-largest-stadium-1NUitwCj1cc/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "新華社報道：グローバルサウスは人権を異なる視点で捉えると主張", "title_en": "Global South Offers Alternative View on Human Rights, Xinhua Reports", "summary_ja": "新華社・CGTNは、グローバルサウスの国々が西側諸国とは根本的に異なる視点で人権を捉えていると報じている。同国営メディアは、発展途上国が西側の強調する個人の市民的・政治的権利よりも、集団的権利や経済発展、主権を優先すると主張している。新華社はこの立場を欠陥ではなく正当な代替的枠組みとして位置づけ、西側の人権モデルが普遍的基準とみなされるべきではないと示唆している。", "summary_en": "Xinhua/CGTN reports that countries in the Global South perceive human rights through a fundamentally different lens than Western nations. The state outlet claims that developing nations prioritize collective rights, economic development, and sovereignty over individually focused civil and political rights emphasized by Western governments. Xinhua frames this as a legitimate alternative framework rather than a deficit, suggesting the Western human rights model should not be treated as a universal standard.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-13/What-are-human-rights-Global-South-sees-them-through-a-different-lens-1NVjCFebxm0/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "ネタニヤフ首相のイラン攻撃、イスラエルの政治地図を塗り替えるとCGTNが報道", "title_en": "Netanyahu's Iran Conflict Reshapes Israel's Political Landscape", "summary_ja": "CGTNは、イスラエルのネタニヤフ首相によるイランへの軍事作戦がイスラエル国内の政治的断層線を塗り替えつつあると伝えている。同メディアは、この紛争が国内の連立関係や野党の力学に長期的な影響を与える形で再編をもたらしていると主張している。CGTNはこれをネタニヤフ首相の戦時における意思決定が引き起こした重大な政治的再編として位置づけている。", "summary_en": "CGTN reports that Israeli Prime Minister Netanyahu's military campaign against Iran is redrawing political fault lines within Israel. The state outlet claims the conflict is reshaping domestic alliances and opposition dynamics in ways that could have lasting consequences for Israeli politics. CGTN presents this as a significant realignment driven by Netanyahu's wartime decision-making.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-13/How-Netanyahu-s-war-on-Iran-redraws-Israel-s-political-fault-lines-1NVih0n8V6U/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "ナイジェリア、2025年に1万3000人以上の武装勢力を排除とティヌブ大統領が主張", "title_en": "Nigeria Claims Military Killed Over 13,000 Insurgents in 2025, Per President Tinubu", "summary_ja": "国営メディアのXinhua/CGTNによると、ナイジェリアのボラ・アフマド・ティヌブ大統領は金曜日、同国軍が過去1年間で1万3000人以上の武装勢力を「排除」したと発表したと伝えている。この数字は独立した機関による検証はされていない。ティヌブ大統領はこの成果を、武装勢力との戦いにおける前進の証拠として示した。", "summary_en": "Xinhua/CGTN, a state-controlled outlet, reports that Nigerian President Bola Ahmed Tinubu announced on Friday that the country's military has 'neutralized' more than 13,000 insurgents over the past year. The claim has not been independently verified. Tinubu presented the figure as a sign of progress in Nigeria's ongoing fight against armed groups.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://newsaf.cgtn.com/news/2026-06-14/Nigeria-killed-13-000-terrorists-in-2025-President-Tinubu-claims-1NYc3tM5lKg/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "上海映画祭「AIバックロット」企画：オープンソース形式で映像制作におけるAIの可能性と限界を探る", "title_en": "Shanghai Film Festival's AI Backlot: Open-Source Challenge Reveals What AI Can and Cannot Do in Filmmaking", "summary_ja": "新華社・CGTNによると、上海国際映画祭はすべてのプロンプトとワークフローを公開する「AIバックロット」チャレンジを実施したと報じられている。同メディアの報道では、この取り組みは映画制作におけるAIツールの能力と限界を明らかにすることを目的としていたとされる。情報源によれば、オープンソース形式を採用することで、AI映像制作の現状とその境界線が持つ意義について教訓を引き出すことが意図されていたという。", "summary_en": "Xinhua/CGTN reports that the Shanghai International Film Festival launched an 'AI Backlot' challenge that made all prompts and workflows publicly accessible. The state outlet reports that the initiative aimed to showcase the capabilities and limitations of AI tools in film production. According to the source, the open-source format was intended to draw lessons about where AI-assisted filmmaking stands today and why its boundaries are significant.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-14/Can-and-can-t-Lessons-from-an-open-source-AI-filmmaking-event-1NYtuYqHIIw/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "IT"}, {"title_ja": "フィリピン地震、海底が最大2メートル隆起しサンゴ礁露出", "title_en": "Philippine Earthquake Raises Seabed Up to 2 Meters, Exposing Coral", "summary_ja": "新華社／CGTNによると、フィリピンで発生した強い地震により少なくとも61人が死亡し、海底が最大2メートル隆起したと伝えられている。フィリピン環境省は、この地殻変動によってサンゴ礁が海面上に露出し、海洋生物に被害が生じたと報告している。海底隆起による生態系への全体的な影響については、現在も調査が続けられているとされる。", "summary_en": "Xinhua/CGTN reports that a powerful earthquake in the Philippines, which killed at least 61 people, raised the seabed by as much as 2 meters. The Philippine environment department states that the seismic event exposed coral reefs and caused harm to marine life. The full ecological impact of the underwater displacement is still being assessed.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-15/Deadly-Philippine-earthquake-raised-seabed-by-up-to-2-meters-1NZmdrq1LFu/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "トルコ外相、モスクワでプーチン大統領およびラブロフ外相と会談へ", "title_en": "Turkey's Foreign Minister Fidan to Meet Putin and Lavrov in Moscow", "summary_ja": "ロシア国営メディアTASS/RTは、トルコのハカン・フィダン外相がモスクワを訪問し、プーチン大統領およびラブロフ外相と会談する予定だと報じている。トルコ外務省筋の情報として同メディアが伝えたところによれば、フィダン外相はロシアの他の高官とも会談を行う見通しだという。この訪問は、トルコとロシアの間で高レベルの外交的関与が継続していることを示している。", "summary_en": "State media TASS/RT reports that Turkish Foreign Minister Hakan Fidan is set to travel to Moscow for meetings with Russian President Vladimir Putin and Foreign Minister Sergey Lavrov. The Turkish Foreign Ministry source cited by state media reports that Fidan will also hold talks with other senior Russian officials. The visit signals continued high-level diplomatic engagement between Turkey and Russia.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2146685", "state_media": true, "category": "政治"}, {"title_ja": "ラブロフ外相、ドイツ当局をゲッベルスになぞらえゼレンスキー氏を批判", "title_en": "Lavrov Compares German Officials to Goebbels, Criticizes Zelensky's Posturing", "summary_ja": "ロシア国営メディアTASS/RTによると、ロシアのラブロフ外相はドイツ当局者の発言がナチスの宣伝相ゲッベルスを想起させると非難し、歴史問題やウクライナ情勢に関するドイツの姿勢を批判したと伝えている。同外相はこうした状況を受け、ロシアはドイツに対して「より強硬な立場をとる必要がある」と主張したとされる。また、ロシア国営メディアはラブロフ氏がゼレンスキー大統領の発言を単なるパフォーマンスとして退けたとも報じている。", "summary_en": "Russian state media TASS/RT reports that Foreign Minister Sergei Lavrov accused German officials of adopting rhetoric reminiscent of Nazi propagandist Goebbels on historical issues and regarding the war in Ukraine. Lavrov claims this alleged rhetoric requires Russia 'to take a tougher stance' against Germany. Russian state media also reports Lavrov dismissed Ukrainian President Zelensky's statements as performative posturing.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2146683", "state_media": true, "category": "政治"}, {"title_ja": "ロシア情報長官「アルメニアとの良好な関係維持が重要」", "title_en": "Russia's Intel Chief Says Maintaining Good Relations with Armenia Remains Important", "summary_ja": "タス通信・RTによると、ロシア対外情報庁のナルイシキン長官は、ロシアがアルメニアとの良好な関係維持を重要視していると述べたと伝えられている。国営メディアは、同長官がエレバンとの協力関係発展の重要性を強調したと報じている。この発言は、アルメニアが欧米パートナーとの関与を強める中で、ロシアとアルメニアの関係が緊張している状況下でなされたものである。", "summary_en": "TASS/RT reports that Russian Foreign Intelligence Service Director Sergey Naryshkin stated that Russia considers it important to maintain good relations with Armenia. State media reports that Naryshkin emphasized the significance of developing cooperation with Yerevan. The remarks come amid strained Russia-Armenia ties following Yerevan's growing engagement with Western partners.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2146677", "state_media": true, "category": "経済"}, {"title_ja": "ロシア外務省、5月にウクライナのドローン攻撃で800人以上が負傷と主張", "title_en": "Russia Claims Over 800 Citizens Wounded by Ukrainian Drone Attacks in May", "summary_ja": "ロシア国営メディアのTASS・RTによると、ロシア外務省のロジオン・ミロシュニク大使は、5月中にウクライナのドローン攻撃によって800人以上のロシア市民が負傷したと主張した。同外交官はドローンが最も致死性の高い兵器となり、民間人の死傷者の大半を占めているとしている。これらの数字および主張はロシア政府当局者によるものであり、独立した機関による検証は行われていない。", "summary_en": "Russian state media TASS/RT reports that over 800 Russian citizens were wounded by Ukrainian drone attacks in May, according to Russian Foreign Ministry Ambassador-at-Large Rodion Miroshnik. The diplomat claims that drones have become the deadliest weapon, allegedly accounting for the majority of civilian casualties. These figures and characterizations originate from a Russian government official and have not been independently verified.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2146675", "state_media": true, "category": "政治"}, {"title_ja": "ロシア・ベラルーシの貿易・経済協力が過去最高水準に達する見通し、ベラルーシ閣僚が表明", "title_en": "Russia-Belarus Trade and Economic Cooperation Expected to Hit Record Levels, Minister Says", "summary_ja": "国営メディアのTASS・RTによると、ベラルーシの閣僚はロシアとベラルーシ間の貿易・経済協力が過去最高水準に達する見通しであると述べたと報じている。また、両国の外務省が特定の国々における人権状況に関する第3回年次共同報告書を作成したとも伝えており、両政府自身の人権問題から目をそらす意図があるとの批判も予想される。", "summary_en": "State media TASS/RT reports that trade and economic cooperation between Russia and Belarus is projected to reach record levels, according to a Belarusian minister. The outlet also reports that the foreign ministries of both countries have jointly prepared their third annual report on the human rights situation in select countries, a move that criti
