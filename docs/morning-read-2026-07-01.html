surrounding the competition.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMimAFBVV95cUxNalU3RjllXzk1UW9rVUR6eVQxcFhNSlI5V1NtbWJDaG5vR3BJLURYVmU4b3FpZW1heDMyVlVhOU1xbmdDVlNBeUVkWWxtcTZaX2VrQThpb0NqTUFCRUVHdktZLWlfb2xVd2ptVnhjejhCNHdtR0FwbW1aUmZ0bXRwZHJhTm9sZlVRRTFKbF9PZGFiQnVaSVBXVg?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ氏、大統領復帰初年度に暗号資産で10億ドル超を稼ぐ", "title_en": "Trump Earned Over $1 Billion from Crypto in First Year Back in Office", "summary_ja": "ドナルド・トランプ大統領は、ホワイトハウスに復帰した最初の1年間で、暗号資産関連の収入として10億ドル（約1500億円）以上を得たことが明らかになった。この金額は、不動産事業やトランプブランドの時計などの商品販売による収益を大幅に上回るものである。この事実は、デジタル資産がトランプ氏の個人的なビジネス帝国においていかに重要な役割を果たしているかを浮き彫りにしている。", "summary_en": "President Donald Trump generated more than $1 billion in cryptocurrency-related income during his first year back in the White House. This crypto revenue significantly surpasses his earnings from traditional business ventures, including real estate and Trump-branded merchandise such as watches. The figures highlight the growing financial role that digital assets play in Trump's personal business empire.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cvgmv98ez3zo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "メキシコシティのワールドカップ祝賀行事で3人死亡", "title_en": "Three Killed During Mexico City World Cup Celebrations", "summary_ja": "メキシコ代表がエクアドルを破った後、メキシコシティで行われたワールドカップ祝賀行事で3人が死亡した。100万人以上のファンが勝利を祝うために首都の街頭に繰り出した。大規模な祝賀ムードの中、巨大な群衆により悲劇的な事態が発生した。", "summary_en": "Three people died during massive World Cup celebrations in Mexico City after the national team defeated Ecuador. More than one million fans flooded the streets of the capital to mark the victory. The festivities, while largely jubilant, turned fatal amid the enormous crowds.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cx2xjwj8p39o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米最高裁、出生地主義による市民権を支持―トランプ政権に打撃", "title_en": "US Supreme Court Upholds Birthright Citizenship, Delivering Blow to Trump", "summary_ja": "米連邦最高裁判所は、出生地主義に基づく市民権を支持する判決を下し、トランプ大統領の移民政策に大きな打撃を与えた。この判決により、両親の移民ステータスに関わらず、米国内で生まれた子どもは米国市民権を得る権利があることが改めて確認された。市民的自由団体はこの判決を移民コミュニティにとっての重要な勝利として歓迎している。", "summary_en": "The US Supreme Court has upheld birthright citizenship, dealing a significant setback to President Donald Trump's immigration agenda. The ruling affirms that children born on US soil are entitled to American citizenship regardless of their parents' immigration status. Civil rights groups have welcomed the decision as a major victory for immigrant communities.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cgmepnx1wzzo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カナダ、2027年のユーロビジョン・ソング・コンテストに参加へ", "title_en": "Canada to Join Eurovision Song Contest in 2027", "summary_ja": "カナダが2027年のユーロビジョン・ソング・コンテストに新たな非ヨーロッパ参加国として加わることが決定した。カナダの財務大臣はこの決定を発表し、外交的緊張が高まる中、カナダが世界の舞台で存在感を示す機会になると強調した。この参加は文化的な意義にとどまらず、外交的なメッセージとしての側面も持つと見られている。", "summary_en": "Canada has been confirmed as a new non-European participant in the Eurovision Song Contest, set to compete in 2027. The country's finance minister announced the decision, describing it as a platform for Canada to showcase itself on the world stage. The move comes amid a period of heightened diplomatic tensions, adding a symbolic dimension to the cultural participation.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/canada-to-compete-in-2027-eurovision-song-contest/a-77787878?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "2026年W杯で「水分補給ブレイク」が物議を醸す", "title_en": "Hydration Breaks Spark Controversy at the 2026 World Cup", "summary_ja": "2026年ワールドカップで導入された義務的な水分補給ブレイクが、大会最大の論争テーマの一つとなっている。スタンドのファンやピッチ上の選手、監督たちの間で賛否両論が巻き起こり、試合の流れを妨げるとの批判も根強い。この議論はスタジアムの外にも広がり、猛暑下でのサッカーのあり方について幅広い議論を呼んでいる。", "summary_en": "Mandatory hydration breaks introduced at the 2026 World Cup have become one of the tournament's most debated topics. The pauses have drawn strong reactions from fans, players, and coaches alike, dividing opinion on whether they enhance player safety or disrupt the flow of the game. The controversy has extended well beyond the stadium, fueling broader discussions about how football should adapt to extreme heat conditions.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/hydration-breaks-the-most-controversial-issue-at-the-world-cup/a-77783435?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "スーダンRSF、エル・ファシェルでの人道に対する罪で告発", "title_en": "RSF Accused of Ethnic Cleansing and Crimes Against Humanity in Sudan's El-Fasher", "summary_ja": "国際人権団体アムネスティ・インターナショナルは、スーダンの准軍事組織「即応支援部隊（RSF）」がエル・ファシェル市への攻撃において民族浄化と人道に対する罪を犯したと告発した。この告発は、RSFとスーダン軍の間で続く内戦を背景に行われたものである。エル・ファシェルは北ダルフール州に位置し、同地域でRSFの支配下に置かれていない数少ない主要都市の一つであった。", "summary_en": "Amnesty International has accused Sudan's Rapid Support Forces (RSF) militia of committing ethnic cleansing and crimes against humanity during its assault on the city of el-Fasher. The allegations arise in the context of Sudan's ongoing civil war between the RSF and the Sudanese military. El-Fasher, located in North Darfur, has been one of the last major cities in the region not under RSF control.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/sudan-s-rsf-accused-of-crimes-against-humanity-in-el-fasher/a-77781532?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "戦争がウクライナの妊婦たちに与える深刻な影響", "title_en": "How War Is Taking a Heavy Toll on Ukraine's Pregnant Women", "summary_ja": "ウクライナでは、戦争による爆撃や停電、避難といった過酷な状況が重なり、妊婦たちの不安やストレスが著しく増大している。それでも多くの女性たちは困難に屈せず、強い意志で妊娠を続けている。ある女性は「新しい命を生み出さなければならない」と語り、その揺るぎない決意を示した。", "summary_en": "Pregnant women in Ukraine face compounding hardships as the ongoing war brings bombings, widespread blackouts, and forced displacement, all of which intensify maternal anxiety and stress. Despite these severe challenges, many women continue to carry their pregnancies, demonstrating remarkable resilience. One woman captured the prevailing spirit, saying, 'We must bring new life.'", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/01/world/europe/ukraine-war-pregnant-women-hospitals.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震、米国から強制送還された移民が行方不明・死亡か", "title_en": "Venezuela Earthquake: U.S. Deportees Among Missing and Dead", "summary_ja": "ベネズエラで強い地震が発生した当日、米国から146人のベネズエラ人が強制送還されており、その多くが死亡または行方不明となっている恐れがある。送還のタイミングと災害が重なったことで、帰国者たちの安否に深刻な懸念が高まっている。当局や家族は、被災地における強制送還者の行方を懸命に確認しようとしている。", "summary_en": "A powerful earthquake struck Venezuela on the same day 146 Venezuelan nationals were deported from the United States, leaving many of them feared dead or missing. The timing of the deportation flight has raised urgent concerns about the fate of those returned, as rescue efforts continue amid the disaster. Families and officials are struggling to account for the whereabouts of the deportees in the aftermath of the deadly tremors.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/01/world/americas/venezuela-earthquakes-deportees-us-deaths.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "相互攻撃の後、米国とイランが外交に向けて動き出す", "title_en": "U.S. and Iran Move Toward Diplomacy After Exchange of Attacks", "summary_ja": "米国とイランは、一連の攻撃の応酬を経て、外交的な雪解けの兆しを見せている。両国の交渉担当者はカタールで協議を開始し、打開策を模索している。石油価格は緊張緩和を受けて落ち着きを取り戻し、船主らもホルムズ海峡への航路を再開させ、エネルギー供給の流れが回復しつつある。", "summary_en": "The United States and Iran are showing signs of a diplomatic thaw following a period of mutual attacks. Negotiators have convened in Qatar to explore a path forward, and oil markets are responding positively to the easing tensions. Shipowners are once again routing vessels through the Strait of Hormuz, helping to restore critical energy flows.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/01/world/middleeast/us-iran-diplomacy-qatar.html", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "人質交渉の膠着打開でパレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルはガザ地区を二分する軍事ゾーンを越えることを避難民のパレスチナ人に許可し、北ガザへの徒歩での帰還が始まった。この動きは、人質解放をめぐる交渉の行き詰まりが打開されたことを受けたものである。今回の展開は、ガザ地区内の人道状況における重要な転換点となっている。", "summary_en": "Israel has permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The movement came after a breakthrough in negotiations over hostage releases resolved a prolonged standoff. The development marks a significant shift in the humanitarian situation within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の拡大を示唆", "title_en": "China's Vanke Reports Massive Loss, Deepening Real Estate Crisis Concerns", "summary_ja": "中国の大手不動産デベロッパーである万科（ヴァンキー）が多額の損失を報告し、同国の不動産危機がさらに拡大している可能性が示された。中国最大級のデベロッパーの一つである万科の経営難は、不動産セクター全体の深刻な問題を浮き彫りにしている。中国政府が事態収拾のために介入するかどうか、市場関係者は固唾をのんで見守っている。", "summary_en": "Leading Chinese property developer Vanke has reported a significant financial loss, signaling that the country's real estate crisis may be spreading further. The troubles at Vanke, one of China's largest developers, raise serious questions about the depth of the sector's difficulties. Observers are now watching closely to see whether the Chinese government will intervene to stabilize the situation.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性は長期間にわたり単独で拘束され、約8か月をトンネル内で過ごしたという。この事実は、人質たちが受けた深刻な身体的・精神的被害を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in tunnels. The findings highlight the severe physical and psychological toll endured by those held captive.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アムネスティ、スーダンRSFがエル・ファシェルで人道に対する罪を犯したと告発", "title_en": "Sudan's RSF Committed Crimes Against Humanity in El Fasher, Amnesty International Says", "summary_ja": "国際人権団体アムネスティ・インターナショナルは、スーダンの準軍事組織「即応支援部隊（RSF）」がエル・ファシェル制圧中に人道に対する罪と民族浄化を行ったと告発した。報告書によると、殺害、拷問、レイプ、奴隷化、性的奴隷化など、民間人に対する広範かつ組織的な攻撃が行われたとされる。この報告書は水曜日に公式に発表された。", "summary_en": "Amnesty International has accused Sudan's Rapid Support Forces (RSF) of committing crimes against humanity and ethnic cleansing during their seizure of El Fasher. The report details widespread and systematic atrocities against civilians, including murder, torture, rape, enslavement, and sexual slavery. The findings were released in a formal report by the human rights organization on Wednesday.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/01/sudan-rsf-rapid-support-forces-crimes-against-humanity-el-fasher-amnesty-ethnic-cleansing", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ニジェール軍事政権がLGBTQ+住民を一斉摘発、「魔女狩り」との批判も", "title_en": "Niger military regime launches crackdown on LGBTQ+ people amid new penal code", "summary_ja": "ニジェールの軍事政権は今年施行された新刑法に基づき、同性愛を理由に少なくとも40人を逮捕した。高官を含む16人の男性が国内各地で収監されており、活動家たちはこの状況を「魔女狩り」と非難している。PrEP薬へのアクセスが失われることで、HIV・エイズの再拡大が懸念されると専門家は警告している。", "summary_en": "Niger's military regime has arrested at least 40 people for homosexuality following the introduction of a new penal code earlier this year. Sixteen men, including high-ranking military officials, have been imprisoned across the country in what activists describe as a witch-hunt. Health experts warn the crackdown could fuel an HIV/Aids resurgence as those affected lose access to PrEP drugs.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/01/witch-hunt-in-niger-as-military-regime-rounds-up-lgbtq-population", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "外国人排斥デモ激化、南アフリカで移民が安全求め避難", "title_en": "Immigrants Flee South Africa Amid Anti-Foreigner Violence and Protests", "summary_ja": "南アフリカ全土で大規模な反移民抗議活動が展開され、ダーバンでは2,000人以上がデモ行進を行い、不法移民に対する「退去期限」が過ぎた。数週間にわたる外国人排斥運動により、少なくとも4人が死亡し、数万人が安全を求めて避難を余儀なくされている。ダーバンの街は緊張に包まれ、商店は軒並みシャッターを閉め、普段より静まり返った様子だった。", "summary_en": "Mass anti-immigration protests swept across South Africa, with over 2,000 demonstrators marching through Durban as a self-imposed deadline for undocumented migrants to leave the country passed. The weeks-long campaign against foreigners has left at least four people dead and tens of thousands displaced. Streets in Durban were unusually quiet and businesses shuttered as residents braced for potential violence.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/30/they-will-attack-me-if-i-stay-immigrants-in-south-africa-flee-for-safety-amid-violence-and-anti-foreigner-protests", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "同盟国がアメリカを脅す方法を学ぶ：台湾の半導体産業はトランプを動かせるか", "title_en": "Allies Learn How to Bully America: Can Taiwan's Chip Industry Strong-Arm Trump?", "summary_ja": "トランプ政権が強硬な通商政策を推進する中、一部の同盟国は対抗できる交渉力を模索している。世界最先端の半導体製造を担う台湾は、アメリカの技術サプライチェーンに不可欠な存在として、米国の圧力に抵抗できる立場にある可能性がある。エコノミスト誌は、半導体産業の優位性が台湾にワシントンに対する異例の外交・経済的影響力をもたらし得るかを分析している。", "summary_en": "As Donald Trump pursues an aggressive trade agenda, some American allies are discovering leverage they can use in return. Taiwan, home to the world's most critical semiconductor manufacturing, may be uniquely positioned to resist U.S. pressure by making itself indispensable to American technology supply chains. The Economist examines how chipmaking power could give Taipei unusual diplomatic and economic clout against Washington.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/30/allies-learn-how-to-bully-america", "state_media": false, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大学生の学力、想像以上に低下―小学生レベルのテスト結果も", "title_en": "Students Are Performing Worse Than Expected, Some Testing at Grade-School Level", "summary_ja": "新たな報告書によると、大学や大学院に在籍する一部の学生が、10歳児と同程度の学力しか示していないことが明らかになった。この結果は、教育水準と学生の学習準備状況が従来の認識以上に深刻に低下していることを示唆している。高等教育機関の入学者に何を期待できるかという問題が、改めて緊急の課題として浮上している。", "summary_en": "A new report highlights a concerning trend in higher education, where some college and university students are performing at academic levels comparable to ten-year-olds. The findings suggest that educational standards and student preparedness may be declining more severely than previously acknowledged. This raises urgent questions about the quality of schooling systems and what institutions of higher learning can realistically expect from incoming students.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "権威主義国家が台頭する国際紛争調停の新潮流", "title_en": "Autocracies Are Reshaping Global Conflict Mediation", "summary_ja": "権威主義体制の国家が国際的な紛争調停役として存在感を増しており、従来の欧米主導による仲介の枠組みを塗り替えつつある。こうした国家が主導する和平合意は、民主主義的規範や人権よりも体制の安定や維持を優先する傾向が強い。この変化は、世界における紛争解決の性質と条件を根本から変えつつある。", "summary_en": "Authoritarian states are increasingly stepping into the role of international peacemakers, displacing traditional Western-led mediation efforts. The deals brokered by these autocracies tend to reflect their own political values and interests, often prioritizing stability and regime survival over democratic norms or human rights. This shift is fundamentally altering the nature and terms of conflict resolution on the world stage.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "RN、暴力で有罪の極右活動家にEU議会資金を流用か", "title_en": "RN Funnels EU Parliament Funds to Far-Right Ally Convicted of Violence", "summary_ja": "フランスの極右政党「国民連合（RN）」の欧州議会会派が、暴力行為で有罪判決を受けた極右活動家マチュー・バラヴォワンに対し、EU議会の資金から報酬を支払っていたことが明らかになった。この問題はRNによる欧州議会資金の流用疑惑をめぐる司法当局の調査が進む中で浮上した。今回の報道は、RNと急進的な極右ネットワークとの財政的なつながりに対する懸念をあらためて高めている。", "summary_en": "The Rassemblement National's group in the European Parliament has been paying Mathieu Balavoine, a convicted far-right figure with a history of violence, for unspecified services. The revelations add to mounting judicial scrutiny facing the French far-right party over its use of European Parliament funds. The case raises fresh concerns about RN's financial ties to radical extremist networks.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/les-decodeurs/article/2026/07/01/rn-continues-to-enrich-far-right-allies-through-eu-parliament-funds_6755043_8.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モナコ爆発：ウクライナ出身の富豪、不透明なビジネス取引が焦点に", "title_en": "Monaco Explosion Targets Ukrainian-Born Oligarch With Murky Business Ties", "summary_ja": "ウクライナ出身の富豪ヴァディム・イェルモラエフ氏が月曜日、モナコで手製爆発物による攻撃を受けた。同氏はウクライナ国籍を放棄していたにもかかわらず、出身国と関連するビジネス活動を継続していた。この事件により、同氏の不透明な取引関係が改めて注目を集めている。", "summary_en": "Vadym Yermolaiev, a wealthy businessman of Ukrainian origin, was targeted by a homemade explosive device in Monaco on Monday. Despite having renounced his Ukrainian nationality, Yermolaiev maintained business activities linked to Ukraine. The attack has drawn attention to his shadowy financial dealings, as reported by Le Monde.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/07/01/explosion-in-monaco-targets-ukrainian-oligarch-vadim-ermolaev_6755024_4.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "フランス、今週末から今年3度目の熱波か", "title_en": "France Braces for Potential Third Heatwave Starting This Weekend", "summary_ja": "フランスでは今週末から今年3度目の熱波が到来する可能性があると、ル・モンド紙が報じた。気温は水曜日と木曜日に一時的に低下するものの、金曜日には特に南部を中心に再び上昇する見込みだ。今回の熱波の持続期間や強度、影響範囲については現時点ではまだ不確実な部分が多いとされている。", "summary_en": "France is expected to experience its third heatwave of the year beginning this weekend, according to Le Monde. Temperatures will temporarily fall on Wednesday and Thursday before climbing again on Friday, particularly across the southern half of the country. Meteorologists note that the exact duration, intensity, and geographic scope of the event remain uncertain at this time.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/article/2026/06/30/france-will-likely-face-third-heatwave-of-the-year-this-weekend-and-next-week_6755023_114.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国の詐欺被害者の4人に3人が精神的健康への悪影響を報告、ギャラップ調査", "title_en": "Nearly 3 in 4 US Scam Victims Report Mental Health Harm, Gallup Poll Finds", "summary_ja": "ギャラップが実施した新たな調査によると、2025年に詐欺被害を受けた米国人の約4分の3が、精神的健康への悪影響を経験したと回答した。米国における詐欺の経済的被害総額は680億ドルに上ると推計されている。この調査結果は、詐欺による被害が金銭的損失にとどまらず、被害者の心理的健康にも深刻な影響を与えていることを浮き彫りにしている。", "summary_en": "A new Gallup survey reveals that nearly three in four Americans who fell victim to scams in 2025 reported suffering mental health consequences as a result. The financial toll of scams in the United States was estimated at a staggering $68 billion. The findings highlight that the damage from fraud extends well beyond monetary loss, deeply affecting victims' psychological wellbeing.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/1/scams-cost-us-victims-68bn-in-2025-harm-to-mental-health-poll-finds?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ヘンリー・ノワク殺人事件、英国警察官2人が非行調査の対象に", "title_en": "Two UK Police Officers Under Misconduct Probe in Henry Nowak Murder Case", "summary_ja": "英国で、ヘンリー・ノワク殺人事件に関連して警察官2人が非行調査を受けている。独立警察行為監察局（IOPC）は、当該警察官らの行動に人種や宗教が影響を与えたかどうかを調査している。この調査は、英国の法執行機関における潜在的な偏見への継続的な監視を反映している。", "summary_en": "Two UK police officers are facing a misconduct investigation connected to the murder case of Henry Nowak. The Independent Office for Police Conduct (IOPC) is examining whether race or religion influenced any of the officers' actions. The probe reflects ongoing scrutiny of potential bias within British law enforcement.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/1/two-uk-police-officers-face-misconduct-probe-in-henry-nowak-murder-case?traffic_source=rss", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ氏、返り咲き1年目に暗号資産事業で14億ドル超を獲得", "title_en": "Trump Earned $1.4 Billion from Crypto Ventures in First Year Back in Office", "summary_ja": "ドナルド・トランプ大統領の2025年財務開示書類により、ホワイトハウス復帰後の1年間で暗号資産関連事業から14億ドル（約2100億円）以上の収入を得ていたことが明らかになった。この巨額の利益は、トランプ氏が米国の金融・暗号資産政策の形成に関与する立場にあることから、利益相反の懸念を改めて浮上させている。開示内容は、同氏の暗号資産ビジネスへの深い関与を示すものとして注目を集めている。", "summary_en": "President Donald Trump's 2025 financial disclosure reveals he earned more than $1.4 billion in income from cryptocurrency ventures during his first year back in the White House. The disclosure highlights the significant financial gains Trump has made through his crypto-related business activities. The figures raise renewed questions about potential conflicts of interest given Trump's role in shaping U.S. financial and crypto policy.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/1/trump-made-1-4b-from-crypto-ventures-in-first-year-back-in-office?traffic_source=rss", "state_media": false, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イスラエル批判派がコロラド州民主党予備選で大番狂わせの勝利", "title_en": "Israel Critic Wins Major Upset in Colorado Democratic Primary", "summary_ja": "イスラエルに批判的な進歩派候補がコロラド州の民主党予備選で大番狂わせの勝利を収め、党内での進歩派の勢力拡大を示した。この結果は、特にイスラエル関連の外交政策をめぐり、民主党内で進歩派の影響力が増していることを反映している。今回の勝利は、今後の選挙に向けた政治的地殻変動の表れとして注目されている。", "summary_en": "A progressive candidate critical of Israel won a significant upset victory in Colorado's Democratic primary, reflecting a broader progressive wave within the party. The result signals growing influence of the progressive wing of the Democratic Party, particularly on foreign policy issues related to Israel. The outcome is seen as a notable shift in the political landscape heading into future elections.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiiwJBVV95cUxQM3R2MVRzRGRLMmpHRlV0QTJNVjZtaEhUd1pyNUphU3ktdEtMY0lweTliSlloNnJ5QUJ4MHJWYkpwR2RXZ3ZnR3FzZzJjWHVYM19vN25YYk4wOHhia1lLUERYZFVtRURKYkdpbHlFdW1URV9mQXdEVHRIUF83S3BiQ0oteUVtaUp1OVFDbFViZUJQUjNxQzVtQkp2UVFuNFVGd21ORURWXy01RG8yMDRBWVhoVGQ0NVVIZHBHQVpDMmZidWFWaWdMSi1QbmtPYndkZ1RpNXpYaFZISkxoaFhzRXNJckxqQ2hlSUM3TjVHTUR5bnpuSWU2Nm82c1d0Q3N3ckJ1ZlNCdW8tY2s?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ネタニヤフ首相がトランプとトルコを挑発：イスラエルがアルメニア人虐殺を認定した理由", "title_en": "Netanyahu Trolls Trump and Turkey: Why Israel Recognized the Armenian Genocide", "summary_ja": "イスラエルがアルメニア人虐殺を公式に認定し、アナリストたちはこの動きがトルコとトランプ政権下の米国への政治的挑発と見ている。イスラエルはこれまでアンカラとの関係維持を優先し、長年にわたって認定を避けてきた。ハアレツの分析によれば、ネタニヤフ首相はトルコとの緊張が続く中、またワシントンへの反抗のシグナルとしてこの決定を戦略的に利用したとされる。", "summary_en": "Israel officially recognized the Armenian genocide in a move analysts describe as a political provocation aimed at both Turkey and the United States under Trump. The decision marks a significant shift in Israeli foreign policy, which had long avoided the recognition to preserve ties with Ankara. Haaretz analysis suggests Netanyahu used the move strategically amid ongoing tensions with Turkey and as a signal of defiance toward Washington.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMimgJBVV95cUxOOUpBam95OTY0THdwOUNnaHVNWlI5dndPR0VGaWRRZ0gxU3pKSE9QSWdIWHhQRlJyb2J1YlZnMWdEUEpzYTlZVHphY2hVVm4wazJ2UFBxbWhkbU5pampkR1djbVNqY0NQTlE2cGZxbWk4RFZUTENrWldUcGcwUWhaejExZUhnWlg2TDJXeDB6MS0xN0lYZ1ExR2pod0pvSFgxZW14Y0dLdjBfVVR0ZnA1aHBBOE93ZXpoZ041R0tfVkJ6RHh5cVF0c09HbU9WT3EwaWlBSUNfanhqMHJkTDZHVXFKcE9LRGNrRXFFNkhwdkxhWmZrVnIxY0tIa0pEMHYzZUU4YTlCOHpmcVJYcWJ2SThjNHR0dDhGdmc?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イスラエル2026年選挙世論調査追跡：最新予測", "title_en": "Israel 2026 Election Poll Tracker: Latest Projections", "summary_ja": "ハアレツ紙はイスラエルの2026年選挙に向けた最新の世論調査データを追跡している。このトラッカーは複数の調査結果を集約し、主要政党の議席配分や連立の可能性を予測している。最新の調査数値は、イスラエルの安全保障および政治情勢の変化を受けた有権者の意識の動向を反映している。", "summary_en": "Haaretz is tracking the latest polling data ahead of Israel's anticipated 2026 elections. The tracker aggregates survey results to project potential seat distributions and coalition possibilities among major political parties. Updated polling figures reflect shifting public sentiment amid ongoing security and political developments in Israel.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi_AFBVV95cUxPVUo4RFA4OEd0dE55NzBCQnByUHNCd0JxSmNCU0NYSTc5QXNudFlsMlFzNFMxYVVZQTR0c1pHRkRvVndYZ0ltQWxzNUVuTWJveGxuR1ZvQXVvTkJWLVpqVEVzRjByVHpvR0pWM1lMNjh1dmotQ0FhdE0yVzZ4YkVUUXpUeDhkQ0M1TzZpaFdpejVQQWVUYXhoRzZCRVdLRTVsamptWGVMM1FQVVVyMVlLUkVqeXNXWnd6TTR3MlZIa0oxWDdKV0RPQzBJMmVJVVA3bDd5bDNnUzdXVENLdmJGN0laeDZ0dGFxZUZBbGhSZjJDMWZoQnNGNmo2MDY?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国防省からのニュース更新", "title_en": "Mindef News Update", "summary_ja": "シンガポール国防省（Mindef）は、ストレーツ・タイムズを通じて最新情報を発表した。このお知らせは2026年7月1日水曜日にニュースレター形式で配信された。読者はストレーツ・タイムズのプラットフォームを通じて購読管理や追加ニュースレターへの登録が案内されている。", "summary_en": "The Singapore Ministry of Defence (Mindef) released an update as reported by The Straits Times. The notice was distributed via newsletter on Wednesday, July 1, 2026. Readers were directed to manage their subscriptions or sign up for additional newsletters through The Straits Times platform.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イブニングアップデート – ストレーツ・タイムズニュースレター", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "ストレーツ・タイムズは2026年7月1日（水）にイブニングアップデートニュースレターを発行した。メールが正しく表示されない場合はオンラインで閲覧できるリンクが案内されている。読者は追加の無料ニュースレターへの登録や購読管理も行うことができる。", "summary_en": "The Straits Times published its Evening Update newsletter on Wednesday, July 1, 2026. The edition was distributed via email to subscribers, with options to view the full content online if the email did not display properly. Readers were also invited to sign up for additional free newsletters and manage their subscriptions.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ストレーツ・タイムズ モーニングブリーフィング – 2026年7月1日（水）", "title_en": "The Straits Times Morning Briefing – Wednesday, July 1, 2026", "summary_ja": "ストレーツ・タイムズは2026年7月1日水曜日付けのモーニングブリーフィングニュースレターを配信した。このブリーフィングは、読者に主要なニュースをまとめて届ける毎日のメール配信サービスである。購読者は同紙のウェブサイトを通じて、ニュースレターの設定変更や追加の無料ニュースレターへの登録が可能となっている。", "summary_en": "The Straits Times published its Morning Briefing newsletter on Wednesday, July 1, 2026. The briefing is a curated daily email digest offering readers key news updates. Subscribers can manage their newsletter preferences or sign up for additional free newsletters through the publication's website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "インドネシア前教育相ナディエム、クロームブック汚職事件で懲役10年の判決", "title_en": "Former Indonesian Education Minister Nadiem Makarim Sentenced to 10 Years in Chromebook Corruption Case", "summary_ja": "インドネシアの前教育相ナディエム・マカリム氏が、クロームブック調達に関わる汚職事件で懲役10年の判決を受けた。この事件は、教育目的で行われた政府によるクロームブック購入における不正疑惑をめぐるものである。今回の判決は、インドネシアが公共調達における汚職撲滅に向けた取り組みを続ける中での重要な節目となった。", "summary_en": "Former Indonesian Education Minister Nadiem Makarim has been sentenced to 10 years in prison in connection with a corruption case involving the procurement of Chromebooks. The case centers on alleged irregularities in the government's purchase of Chromebook laptops for educational purposes. The verdict marks a significant development in Indonesia's ongoing efforts to combat corruption in public procurement.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMivgFBVV95cUxOQVBXd2RnQTdQMS1UWUZmV1liTGMzbXN5TXNXdEZBTi11QVJMOEhuSEg1YWR4R0NvejRIRUstUW1kNzdFRkVJYXVXU1VTS2lPUmRiUjdnTURiakdicFhwUW8wYmV4UHUtOEh1aWJpNndqUVpqOWZTbmhwMXRUWmI0aDRHdUE0dE9xMXJjbFNwM3Foem4tNHNVa2Y3b3BTd0VJaXJrM0M5N3BCbkNoMkZEZVJLTEQ1bkdYc2xoNm93?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "持続可能性の建前と経済の現実：両立は可能か？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、途上国が直面する持続可能性目標と経済的圧力の間の高まる緊張を検証している。野心的な環境目標と経済成長・開発の緊急ニーズを両立させることが可能かどうかを問いかけている。グリーン公約と現実的な財政事情のバランスをとるための道筋についても考察している。", "summary_en": "The Jakarta Post examines the growing tension between sustainability goals and economic pressures facing developing nations. The article questions whether ambitious environmental rhetoric can be reconciled with the urgent need for economic growth and development. It explores potential pathways to balance green commitments with practical financial realities.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コモド島への観光客が増加傾向", "title_en": "Tourist Visits to Komodo Island on the Rise", "summary_ja": "世界的に有名なコモドオオトカゲが生息するコモド島で、観光客の訪問数が増加している。インドネシアの独自の野生生物や自然の名所への関心の高まりが、この傾向を後押ししている。当局は島の繊細な生態系を保護するため、状況を注意深く監視している。", "summary_en": "Komodo Island, home to the world-famous Komodo dragons, is experiencing a surge in tourist arrivals. The increase in visitors highlights growing interest in Indonesia's unique wildlife and natural attractions. Authorities are monitoring the situation to ensure the preservation of the island's fragile ecosystem.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikwFBVV95cUxOQnVENlpVakhEVnVrUXdKUzdjUVljNjJzQ2pMRnliQTB5Wm4xV01fdEx3Y3JwaWcxc3Z3SUM2U1MyLU9fNHV6MFJ6MTRmN2E1NTBMZlZKU3d0NGZ2VU0yUVBEZzF4NG4xdTE2NmFXVDQ3TDYyMHRQQ1FaeVhDaVFmWkE1ZmpWOHhiNmxRd0NmbnpSdlk?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ・ラグアイラで2度の自然災害を生き延びた男性、二度と戻らないと誓う", "title_en": "Venezuelan Merchant Survives Two Natural Disasters in La Guaira, Vows Never to Return", "summary_ja": "46歳のベネズエラ人商人グリアン・セラーノ氏は、ベネズエラのラグアイラで相次いで発生した2つの自然災害で負傷し、現在回復中である。息子と母親とともに災害を乗り越えたが、左目周辺や全身に打撲傷を負った。この壮絶な体験を経て、セラーノ氏は災害が多発するこの地域には二度と戻らないと固く誓っている。", "summary_en": "Grian Serrano, a 46-year-old Venezuelan merchant, is recovering from injuries sustained during two consecutive natural disasters in La Guaira, Venezuela. He endured the ordeal alongside his son and mother, leaving him bruised around his left eye and across much of his body. The traumatic experience has led Serrano to vow that he will never return to the disaster-prone region.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/man-who-survived-two-natural-disasters-in-venezuelas-la-guaira-vows-to-never-return/article71169222.ece", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ホルムズ海峡でイランが「レッドライン」を設定", "title_en": "Iran Asserts Red Lines in the Strait of Hormuz", "summary_ja": "イランは、ペルシャ湾とアラビア海をオマーン湾経由で結ぶ重要なエネルギー・経済の要衝であるホルムズ海峡に関し、明確な「レッドライン」を設定した。同海峡はこれまで国際航行に開放されてきたが、緊張の高まりにより今後の通行の安定性に懸念が生じている。イランの強硬姿勢は、その限界線が侵犯された場合に世界のエネルギー供給に深刻な影響を与える可能性を示唆している。", "summary_en": "Iran has drawn firm boundaries regarding the Strait of Hormuz, a vital energy and economic chokepoint linking the Persian Gulf to the Arabian Sea via the Gulf of Oman. The strait has historically been open to international shipping, but tensions have raised concerns over its continued accessibility. Iran's posturing signals potential consequences for global energy flows if its stated limits are crossed.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/in-the-strait-of-hormuz-iran-draws-its-red-lines/article71169536.ece", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラン、ホルムズ海峡の通行管理権を維持すると主張", "title_en": "Iran insists on retaining control over Strait of Hormuz passage under new agreement", "summary_ja": "イランは、世界有数の重要な石油輸送路であるホルムズ海峡における船舶通行の管理権を主張している。イランの高官筋によると、テヘランは最近の合意の文言が、どの船舶が通過できるか、またどの航路を通るかを決定する権限をイランに与えていると解釈しているという。この姿勢は、世界で最も戦略的に重要な水路の一つにおけるイランの影響力が依然として強いことを示している。", "summary_en": "Iran is asserting its right to control ship traffic through the Strait of Hormuz, a critical global oil shipping lane. Senior Iranian sources indicate that Tehran believes the wording of a recent agreement permits it to determine which vessels may pass and which routes they must take. The stance signals continued Iranian leverage over one of the world's most strategically important waterways.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/us-iran-deal-strikes-live-updates-july-1-2026-trump-israel-west-asia-war/article71168436.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国民党主席：「一つの中国」の現状回帰が両岸対話再開の鍵", "title_en": "KMT Head: Returning to 'One China' Status Quo Key to Restarting Cross-Strait Talks", "summary_ja": "台湾の中国国民党（KMT）主席は、北京との両岸対話を再開するためには「一つの中国」という現状に戻ることが不可欠だと述べた。国民党主席はこの枠組みを認めることが交渉再開の前提条件になると強調した。この発言は、1992年コンセンサスに基づき中国大陸との関与を支持する国民党の長年の立場を反映している。", "summary_en": "The chairman of Taiwan's Kuomintang (KMT) party has stated that returning to the 'one China' status quo is essential for resuming cross-strait dialogue with Beijing. The KMT leader emphasized that acknowledging this framework would be a prerequisite for restarting negotiations between Taiwan and China. The statement reflects the KMT's long-standing position favoring engagement with mainland China based on the 1992 Consensus.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5oTXhBLVZ3a1A3YnZSellabldoMlFWeWlZRzFSVjNEZWNBajFIQ19XTFZfVHFUR0RicHBoZzdQcW1rdDVsdFpHSW1CcEhYeWc5U3UzQmJsQQ?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ヤンキース、台湾人投手有望株と100万ドルで契約", "title_en": "Yankees Sign Taiwanese Pitching Prospect for $1 Million", "summary_ja": "ニューヨーク・ヤンキースが台湾人の投手有望株と100万ドルの契約を結んだ。この契約はMLBが台湾の野球人材の発掘・育成に引き続き注目していることを示している。選手の詳細なプロフィールや育成スケジュールについては、現時点では明らかにされていない。", "summary_en": "The New York Yankees have signed a Taiwanese pitching prospect to a deal worth US$1 million. The signing reflects continued MLB interest in developing baseball talent from Taiwan. Details about the player's profile and projected development timeline were not disclosed in the initial report.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVEFVX3lxTE51blNPT0lEWlJOVEloZm9BdDd5NnB0LWRlbVVhRXJuV0JReE51cDQ2bUxzY0N5cy15MmxtU0xYRWt0U2xYWWZkcFEyZ2FZZUVyYnIyVA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "韓国瑜、米下院議長と会談し二重課税軽減法案への支持を求める", "title_en": "Han Kuo-yu Meets U.S. House Speaker to Push Double-Tax Relief Bill", "summary_ja": "台湾の立法院長・韓国瑜氏は米国下院議長と会談し、二重課税軽減法案への支持を求めた。この会談は、台湾が米国との経済・立法面での関係強化に継続的に取り組んでいることを示している。同法案は、台米間で活動する個人や企業の税負担を軽減することを目的としている。", "summary_en": "Taiwan's Legislative Yuan President Han Kuo-yu met with U.S. House Speaker to seek support for a double taxation relief bill. The meeting highlights Taiwan's ongoing efforts to strengthen economic and legislative ties with the United States. The proposed bill aims to alleviate the tax burden on individuals and businesses operating between Taiwan and the U.S.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE1ncFVpRW9rcjllSmRfektFNlZjdWY5dEIxTzBFclNQd0lveXNQMmJjYTVtbWhFWEZrc0YyYnlKX1RFbHQ4R3hLVURsdHdxSzc0TlVQMVJ3UQ?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラのラグアイラ港、地震後に野外遺体安置所と化す", "title_en": "Venezuela's La Guaira Port Becomes Open-Air Morgue After Deadly Earthquakes", "summary_ja": "先週発生した地震の後、ベネズエラの港湾都市ラグアイラの港が野外遺体安置所と化している。沿岸部の瓦礫から収容された遺体は国営港湾施設ボリプエルトに運ばれ、30度を超える気温の下、黒いビニール袋に覆われたまま様々な腐敗段階で放置されている。現地を取材した記者によると、現場には少なくとも200体の遺体があると推定された。", "summary_en": "The port of La Guaira, Venezuela, has been converted into an open-air morgue following last week's devastating earthquakes. Bodies recovered from the rubble of the coastal municipality are being stored at Bolipuerto, the state-owned port facility, covered in black bags under temperatures exceeding 30°C and in varying stages of decomposition. A reporter on the scene estimated at least 200 bodies were present at the site.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/port-of-la-guaira-venezuela-turns-into-open-air-morgue-after-earthquakes.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "キューバ人が家を売りアマゾン経由でブラジルへ、難民申請が急増", "title_en": "Cubans Sell Homes to Fund Amazon Journey, Seek Refuge in Brazil in Record Numbers", "summary_ja": "キューバ人移民がブラジルを避難先として選ぶケースが急増しており、アマパー州オイアポッケを経由する流入は過去3年で拡大し、2025年にピークを迎えた。移民たちはスリナムやフランス領ギアナを出発し、飛行機・バン・船・バスを乗り継ぐ過酷な旅を経てブラジルに到達する。2025年にはオイアポッケだけで少なくとも8,400人が入国し、年間を通じて41,900人が難民申請を行い、ベネズエラ人の約2倍に達した。", "summary_en": "Cuban migrants are increasingly choosing Brazil as a refuge destination, with flows through Oiapoque, Amapá, surging over the past three years and peaking in 2025. The arduous journey spans multiple countries and transport modes, passing through Suriname and French Guiana via flights, vans, boats, and buses. In 2025, at least 8,400 Cubans entered through Oiapoque, and 41,900 requested refuge in Brazil throughout the year—nearly twice the number of Venezuelan applicants at 21,200.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/cubans-sell-homes-take-amazon-journey-by-air-land-and-water-and-seek-to-stay-in-brazil.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コロンビアで極右が勝利、ブラジルは南米で「左派の孤島」に", "title_en": "Far Right Win in Colombia Leaves Brazil as Left-Wing Island in South America", "summary_ja": "コロンビアでの極右勝利により、南米全体で保守化の波が一段と強まり、ブラジルのルラ大統領は総選挙4か月前に地域内で孤立する状況となった。2022年のルラ当選時には南米主要国の多くが左派政権だったが、今やその構図は劇的に逆転している。コロンビア、アルゼンチン、チリ、ペルー、ボリビアなどが現在、右派または極右政権の下にある。", "summary_en": "A far-right victory in Colombia has deepened a conservative shift across South America, politically isolating Brazilian President Lula just four months before Brazil's own elections. When Lula was elected in 2022, most major South American nations were governed by left-leaning leaders, but that alignment has now dramatically reversed. Countries including Colombia, Argentina, Chile, Peru, and Bolivia are now led by right-wing or far-right governments.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/with-far-right-in-colombia-brazil-is-a-left-wing-island-in-south-america.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ナイジェリアの州警察構想：草の根基盤の整備が急務", "title_en": "State Police in Nigeria: Building a Grassroots Foundation", "summary_ja": "ナイジェリアにおける州警察の導入推進は、憲法議論の周辺的な話題から主流の政策課題へと発展しており、中央集権的な国家警察が過負荷状態にあり地域の脅威に対応しきれないとの広範な認識が背景にある。北西部の山賊行為からミドルベルト地帯の民族間暴力まで、地域ごとに安全保障上の課題は大きく異なっており、地域密着型の治安維持機構の必要性が浮き彫りになっている。コラムニストのボルティフェ・オルワデレ氏は、州警察が機能するためには強固な草の根組織的基盤が不可欠だと主張している。", "summary_en": "Nigeria's push for state-level police forces has moved from constitutional debate fringe to mainstream policy, driven by widespread perception that the centralized national police is overstretched and ill-equipped to address region-specific threats. Security challenges vary dramatically across the country, from banditry in the North-West to communal violence in the Middle Belt, underscoring the need for locally responsive law enforcement. Columnist Bolutife Oluwadele argues that for state police to succeed, it must be anchored in a strong grassroots organizational backbone.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/opinion/892111-state-police-in-need-of-a-grassroots-backbone-by-bolutife-oluwadele.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "APC、異議申し立てを受けベヌエ州予備選の結果を覆しスースワムらを落選", "title_en": "APC Overturns Benue Primaries, Drops Suswam and Others Following Appeals", "summary_ja": "ナイジェリアの与党APCは、異議申し立てを受けてベヌエ州の複数の予備選挙結果を無効とした。この決定により、元知事ガブリエル・スースワムを含む有力候補者らが資格を失った。今回の変更は、ハイアシンス・アリア知事派と連邦政府長官ジョージ・アクメ派の間の政治的勢力図を塗り替えつつある。", "summary_en": "Nigeria's ruling APC party has overturned several primary election results in Benue State following appeals. The reversals have dropped prominent figures including former Governor Gabriel Suswam from candidacy. The changes are reshaping the political balance between the camps of Governor Hyacinth Alia and SGF George Akume.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/892093-apc-overturns-many-benue-primaries-drops-suswam-others-after-appeals.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ナイジェリアの治安問題：武力ではなく対話による解決を", "title_en": "Insecurity in Nigeria: Dialogue Over Military Force as the Possible Way Out", "summary_ja": "コラムニストのエリック・テニオラ氏は、誘拐や武装反乱などナイジェリアの治安上の課題が政治的動機によるものであれば、解決策も軍事的手段ではなく政治的アプローチであるべきだと主張している。同氏はウィンストン・チャーチル元英首相の「戦うよりも話し合う方が常に優れている」という名言を引用し、対話の重要性を強調した。ナイジェリアの指導者たちに対し、武力行使よりも交渉と政治的関与を優先するよう訴えている。", "summary_en": "Columnist Eric Teniola argues that if Nigeria's security challenges—including kidnapping and insurgency—are politically motivated, then the solutions must also be political rather than purely military. He advocates for dialogue as the primary tool to address these crises, citing Winston Churchill's famous maxim that 'to jaw-jaw is always better than to war-war.' The piece calls on Nigerian leaders to prioritize negotiation and political engagement over armed responses.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/opinion/892101-insecurity-the-possible-way-out-by-eric-teniola.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アフリカCDCとWHOがエボラ対応支援の共同プラットフォームを発足", "title_en": "Africa CDC and WHO Launch Joint Platform to Support Ebola Response in Africa", "summary_ja": "新華社・CGTNによると、アフリカ疾病予防管理センター（アフリカCDC）、世界保健機関（WHO）、およびウガンダ政府が、大陸規模の合同インシデント管理支援チーム（IMST）を正式に発足させたと報じている。同メディアは、このプラットフォームが進行中のエボラ出血熱の流行を受け、大陸全体の保健緊急対応能力を強化することを目的としていると伝えている。国営メディアの報道によれば、この取り組みはアフリカにおける感染症緊急対応能力の向上を目指す多国間協調の一環とされている。", "summary_en": "Xinhua/CGTN reports that the Africa Centers for Disease Control and Prevention (Africa CDC), the World Health Organization (WHO), and the Ugandan government have officially launched the Joint Continental Incident Management Support Team (IMST). The state-affiliated outlet reports that the platform is intended to bolster continental health emergency capabilities amid an ongoing Ebola outbreak. According to the source, the initiative represents a coordinated multilateral effort to strengthen Africa's capacity to respond to disease emergencies.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-29/Africa-CDC-WHO-launch-a-platform-to-support-Africa-s-Ebola-response-1OmBKooKewU/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国企業はいかにして欧州消費者向けにデザインを行っているか", "title_en": "How Chinese Companies Are Designing Products for European Consumers", "summary_ja": "新華社・CGTNによると、中国企業は欧州消費者の好みや基準に合わせた製品デザインをますます重視しているという。同メディアは、この動きが欧州市場でのプレゼンス拡大を目指す中国企業の現地化戦略の一環であると伝えている。CGTNの報道では、デザインの美観や機能性、欧州の規制への適合など幅広い面での対応が進められているとされる。", "summary_en": "Xinhua/CGTN reports that Chinese companies are increasingly tailoring their product designs to meet the preferences and standards of European consumers. State media reports that this trend reflects a broader push by Chinese firms to expand their footprint in European markets through localized strategies. According to CGTN, these efforts include adapting aesthetics, functionality, and compliance standards to align with European tastes and regulations.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-30/How-Chinese-companies-are-designing-for-European-consumers-1OoFnYS2Oqs/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "パキスタンとバーレーンの外相が電話会談", "title_en": "Pakistani and Bahraini Foreign Ministers Hold Phone Conversation", "summary_ja": "新華社・CGTNによると、パキスタンとバーレーンの外相が電話会談を行ったと報じられているが、会談の具体的な内容は明らかにされていない。同メディアは、今回の通話が両国間の継続的な外交的関与の一環として行われたと伝えている。会談の詳細や成果については独立した確認が取れていない。", "summary_en": "Xinhua/CGTN reports that the foreign ministers of Pakistan and Bahrain held a phone conversation, though specific details of the discussion were not disclosed in the excerpt. State media reports that the call took place as part of ongoing diplomatic engagement between the two countries. The nature and outcomes of the conversation have not been independently verified.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-28/news-1Olg1Ew3gR2/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ラブロフ外相：ロシアは公平性原則に基づくICRC強化を支持", "title_en": "Lavrov: Russia backs stronger ICRC grounded in impartiality principles", "summary_ja": "ロシア国営メディアのTASS・RTによれば、ラブロフ外相は赤十字国際委員会（ICRC）を公平性の原則に基づいて強化することをロシアが支持すると表明したと伝えている。同外相はICRCの指導部が数十年にわたりこれらの原則を堅持しようと努めてきたことを評価したと、国営メディアは報じている。この発言は、ウクライナでの行動をめぐる国際的な批判が続く中でのものとして伝えられている。", "summary_en": "Russian state media TASS/RT reports that Foreign Minister Sergei Lavrov has stated Russia supports strengthening the International Committee of the Red Cross based on the principles of impartiality. The outlet reports that Lavrov praised the ICRC leadership for consistently striving to uphold these principles over many decades. Russian state media frames this as Moscow's commitment to humanitarian norms amid ongoing international scrutiny of its conduct in Ukraine.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2153971", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシアの燃料・エネルギー部門のGDP比率が13%に低下、ノワク副首相が発言", "title_en": "Russia's Fuel and Energy Sector Share in GDP Falls to 13%, Novak Says", "summary_ja": "ロシア国営メディアのTASS・RTによると、ノワク副首相はロシアの燃料・エネルギー部門がGDPに占める割合が13%に低下したと述べたと伝えている。同メディアはまた、GDP構造における輸出比率が約3分の1に減少したとノワク氏が指摘したと報じている。西側の制裁が続く中、ロシア当局はこうした数字を経済の多様化の証拠として位置づけているとみられる。", "summary_en": "Russian state media TASS/RT reports that Deputy Prime Minister Novak stated the fuel and energy sector's share of Russia's GDP has declined to 13%. State media further reports that the export share within the GDP structure has fallen by nearly threefold, according to Novak. These figures, as reported by state-controlled outlets, suggest Moscow is framing the shift as evidence of economic diversification amid ongoing Western sanctions.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2153969", "state_media": true, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "プーチン大統領、安全保障会議でロシア最西端地域の発展を協議", "title_en": "Putin Holds Security Council Meeting on Development of Russia's Westernmost Region", "summary_ja": "国営メディアTASS・RTによると、プーチン大統領はロシア安全保障会議のメンバーと会合を開き、最西端の飛び地カリーニングラードの発展について協議したと伝えている。同メディアは、複数の当局者が会議で報告を行う予定だったと報じている。クレムリンは協議の具体的な議題については詳細を公表していない。", "summary_en": "TASS/RT reports that Putin convened a meeting with Russian Security Council members to discuss the development of Russia's westernmost region, Kaliningrad. State media reports that several officials were expected to deliver reports during the session. The Kremlin has not disclosed further details about the specific agenda items discussed.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2153965", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "子どもたちの健康を左右するデジタルの選択", "title_en": "The Digital Choices Shaping our Children's Health", "summary_ja": "著者らは、ソーシャルメディア・ゲーム・AIなどのデジタル環境が、不安、うつ、睡眠障害、オンライン性的搾取など子どもの健康に深刻なリスクをもたらしていると主張する。学習やつながりにおけるデジタルツールの恩恵を認めつつも、政府とプラットフォーム企業は段階的な調整を超えた抜本的対策を講じる必要があると訴える。複数の国における年齢制限法に見られる世界的なコンセンサスの高まりが、より強固なガバナンスと「設計段階からの安全確保」の必要性を示している。", "summary_en": "The authors argue that digital environments—including social media, gaming, and AI—pose serious public health risks for children, including anxiety, depression, sleep disruption, and online exploitation. While acknowledging the benefits of digital tools for learning and connection, they contend that governments and platforms must take urgent, systemic action beyond incremental fixes. A growing global consensus, reflected in age-restriction laws across multiple countries, underscores the need for stronger governance and safety-by-design principles.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/children-must-come-first-in-digital-safety-policies-by-emmanuel-macron-and-tedros-adhanom-ghebreyesus-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Digital Choices Shaping our Children’s Health\nandPARIS/GENEVA— From social media and online gaming to generative AI systems, digital environments are powerful determinants of people’s health. That is especially true of children and young people. Around the world, childhood is being reprogrammed by digital technologies that shape how young people learn, play, and connect.\nOur task is not to celebrate or condemn technology. It is to face a simple truth: our digital environment not only promises far-reaching benefits but also poses grave risks for children’s health and development. Our responsibility is to maximize the first while preventing the second. It is not too late to act, but it is too late for merely incremental adjustments.\nDigital tools can expand opportunity by supporting learning, communication, and access to health services, especially for children in remote or crisis-affected settings. For many young people, online spaces also offer creativity, community, and belonging, particularly for those facing exclusion offline.\nBut these benefits are not guaranteed; they depend heavily on who has access, how technologies are designed, and whose interests they serve.\nGovernments are increasingly recognizing that protecting children online is a public-health imperative. Australia has implemented the world’s first requirement that social-media platforms prevent children under 16 from holding accounts, while France is advancing legislation to prohibit access to social media for those under 15. Indonesia has banned access for children under 16, Spain has announced plans to do so, and Ireland is working with European Union partners to develop age restrictions and age-assurance systems focused on protecting under-16s.\nThe United Kingdom, too, recently announced plans to ban social-media platforms from offering services to under-16s, alongside additional safeguards like restrictions on livestreaming and contacts from strangers. And Canada has introduced legislation to restrict access to social media for children under 16 while requiring stronger safety-by-design protections and accountability from platforms.\nPS Quarterly: The Declaration Heard Around the World, is here.\nIn this issue of PS Quarterly—available exclusively to Premium subscribers—Danielle Allen, Sarah M.S. Pearsall, Steve Pincus, and other leading thinkers examine the impact, limitations, and legacy of America’s founding document, and consider where US democracy is headed 250 years later.\nTogether, these measures reflect a growing global consensus that digital environments require effective governance, age-appropriate design, and stronger safeguards to protect child health. The World Health Organization is supporting this by strengthening the research needed to develop a clearer understanding of the impact of today’s and tomorrow’s technologies, providing technical advice to countries, and promoting safe, equitable digital health environments.\nSolutions are needed because digital environments are not neutral. How they are designed, governed, and monetized shapes many aspects of our lives, not least our health.\nFor example, repeated exposure to stereotyped, sexualized, violent, or discriminatory content shapes how children understand themselves and the world around them. Algorithms increasingly filter health information to increase attention rather than accuracy, allowing misleading claims to spread. The collection and use of personal data, particularly for profiling and targeted marketing, raise concerns about privacy, manipulation, and well-being.\nCurrent evidence associates excessive digital exposure with problems such as anxiety, depression, poor sleep, increased aggression, and, in more severe cases, suicidality, especially among vulnerable adolescents. Digital marketing on platforms may expose people to promotion of harmful products, such as tobacco, alcohol, and gambling platforms.\nSocial media, gaming, and AI use can deepen loneliness and displace offline relationships. Prolonged use contributes to sedentary behavior and reduced sleep, which are known risk factors for noncommunicable diseases.\nOnline sexual exploitation and abuse are also increasing globally, alongside a sharp rise in child sexual abuse material, AI-generated abuse imagery, and deepfake sexual or bullying content. These have profound and lasting consequences for mental health, trust, and safety.\nCommercial practices increase all these risks. Many platforms are designed to maximize engagement, without adequate protection from exposure to harmful content or features to protect children’s physical and mental health.\nReducing exposure to illegal or extreme and graphic content is essential. But children’s well-being requires more than the absence of harm. It depends on stable relationships, appropriate boundaries, physical activity, and opportunities for real-world social connection. Risks multiply when digital environments disrupt—rather than support—healthy development.\nGene", "translation_ja": "子どもたちの健康を左右するデジタルの選択\n\nパリ／ジュネーブ発――ソーシャルメディアやオンラインゲームから生成AIシステムに至るまで、デジタル環境は人々の健康を大きく左右する要因となっている。これは特に子どもや若者にとって顕著である。世界各地で、子ども時代はデジタル技術によって再プログラムされており、若者の学び方、遊び方、つながり方が変容しつつある。\n\n私たちの課題は、技術を礼賛することでも断罪することでもない。シンプルな事実に向き合うことだ。デジタル環境は広範な恩恵をもたらす可能性を秘める一方で、子どもの健康と発達に深刻なリスクをもたらす。私たちの責任は、前者を最大化しながら後者を防ぐことにある。行動するには遅くないが、漸進的な調整だけで済ませるには、すでに手遅れである。\n\nデジタルツールは、学習・コミュニケーション・医療サービスへのアクセスを支援することで機会を広げ得る。特に、遠隔地や危機的状況に置かれた子どもたちにとってはなおさらだ。多くの若者にとって、オンライン空間は創造性やコミュニティ、帰属意識を提供する場でもある。とりわけ、オフラインで疎外を経験している若者にとっては重要な場となっている。\n\nしかし、こうした恩恵は保証されたものではない。誰がアクセスできるか、技術がどのように設計されているか、誰の利益のために機能しているかによって、大きく異なる。\n\n各国政府は、子どものオンライン保護を公衆衛生上の必須課題として認識するようになっている。オーストラリアは世界で初めて、ソーシャルメディアプラットフォームに対して16歳未満のアカウント開設を禁止する規制を導入した。フランスは15歳未満のソーシャルメディア利用を禁止する法整備を進めており、インドネシアは16歳未満のアクセスを禁止した。スペインも同様の措置を発表し、アイルランドはEUパートナーと連携して16歳未満の保護を目的とした年齢制限・年齢確認システムの構築に取り組んでいる。\n\n英国もまた最近、16歳未満へのソーシャルメディアサービス提供禁止計画を発表し、ライブ配信の制限や見知らぬ人からの接触禁止などの追加的な安全措置も盛り込んでいる。カナダも16歳未満のソーシャルメディアアクセスを制限する法案を提出し、プラットフォームに対してより強固な「設計段階からの安全確保」と説明責任を求めている。\n\nこれらの措置は総じて、デジタル環境には実効性のあるガバナンス、年齢に適したデザイン、子どもの健康を守るための強化された安全策が必要だという世界的なコンセンサスの高まりを反映している。世界保健機関（WHO）は、現在および将来の技術がもたらす影響をより明確に理解するための研究を強化し、各国への技術的助言を提供し、安全で公平なデジタル健康環境の推進を支援することでこれに貢献している。\n\n解決策が求められるのは、デジタル環境が中立ではないからだ。その設計、ガバナンス、収益化の方法が、私たちの生活の多くの側面、とりわけ健康を形作っている。\n\n例えば、固定観念的・性的・暴力的・差別的なコンテンツに繰り返しさらされることは、子どもたちの自己認識や世界観の形成に影響を及ぼす。アルゴリズムはますます、正確さよりも注目度を高める方向で健康情報をフィルタリングするようになっており、誤った情報が拡散しやすい状況を生んでいる。個人データの収集・利用、特にプロファイリングやターゲット型マーケティングへの活用は、プライバシー・操作・ウェルビーイングに関する懸念を引き起こしている。\n\n現在の証拠によれば、デジタルへの過度な接触は不安、うつ、睡眠障害、攻撃性の増加と関連しており、より深刻なケースでは、特に脆弱な青少年において自殺念慮との関連も指摘されている。プラットフォーム上のデジタルマーケティングは、たばこ・アルコール・ギャンブルといった有害製品のプロモーションにさらされるリスクを高める可能性がある。\n\nソーシャルメディア・ゲーム・AIの利用は、孤独を深め、オフラインの人間関係を損なうことがある。長時間の使用は、非感染性疾患の既知のリスク要因である運動不足と睡眠不足を招く。\n\nオンラインにおける性的搾取と虐待も世界的に増加しており、児童性的虐待素材の急増や、AIが生成する虐待画像、性的または嫌がらせを目的としたディープフェイクコンテンツの台頭が見られる。これらは、精神的健康・信頼・安全に対して深刻かつ長期的な影響をもたらす。\n\n商業的慣行はこれらのリスクをさらに高める。多くのプラットフォームはエンゲージメントを最大化するよう設計されており、有害コンテンツへの露出から子どもを守る適切な保護措置や、子どもの心身の健康を守る機能が不十分なままだ。\n\n違法または過激かつ露骨なコンテンツへの露出を減らすことは不可欠である。しかし、子どものウェルビーイングは、害の不在だけでは実現しない。安定した人間関係、適切な境界線、身体活動、そして現実世界での社会的つながりの機会が必要だ。デジタル環境が健全な発達を支援するのではなく、それを妨げるとき、リスクは複合的に増大する。", "vocab": [{"word": "determinants", "definition": "「決定要因」を意味し、ある結果や状態を引き起こす原因となる要素を指す。「social determinants of health（健康の社会的決定要因）」のように公衆衛生分野で頻繁に使われる専門用語。"}, {"word": "incremental", "definition": "「漸進的な」「段階的な」を意味し、急激な変化ではなく少しずつ積み重ねる変化を表す形容詞。政策や改革の議論で「incremental adjustments（漸進的調整）」のように用いられる。"}, {"word": "monetized", "definition": "「収益化された」を意味し、サービスやコンテンツ、データなどから金銭的利益を生み出す仕組みに変えることを指す。デジタル経済やプラットフォームビジネスの文脈でよく使われる。"}, {"word": "suicidality", "definition": "「自殺念慮・自殺リスク」を意味する精神医学・公衆衛生分野の専門用語で、自殺を考えたり企図したりする傾向や状態全般を指す。"}, {"word": "profiling", "definition": "「プロファイリング」とは、個人データを収集・分析して特定の人物像や行動パターンを作成することを指す。デジタル・プライバシーの文脈では、ターゲット広告や行動追跡に利用されることへの懸念を含む。"}, {"word": "deepfake", "definition": "AIを用いて実在の人物の顔や音声を偽造した動画・画像を指す新造語。性的ハラスメントやなりすましなど悪用事例が社会問題となっており、デジタル安全の文脈で重要な語。"}, {"word": "safeguards", "definition": "「安全策」「保護措置」を意味し、危険や悪用を防ぐために設けられる規則・仕組み・装置を指す。法律・政策・技術設計の文脈で広く使われる語。"}]}, {"title_ja": "寡頭制の古代的起源：古典ギリシャから現代アメリカへの教訓", "title_en": "Oligarchy's Ancient Origins: Lessons from Classical Greece for Modern America", "summary_ja": "筆者は古代ギリシャにおける民主主義と寡頭制の激しい闘争を検証し、寡頭制政権が不人気にもかかわらず巧みに設計された政治制度によって存続してきた経緯をたどる。古典期アテナイの歴史的事例を引きながら、アメリカ人は自国の制度がいかに現代的な寡頭支配を可能にしているかを考えるべきだと主張する。この論説は三十人僭主やクリティアスといった人物の物語を通じて、少数エリートによる支配と民衆民主主義の間の普遍的な緊張関係を浮き彫りにしている。", "summary_en": "The author examines the bitter struggle between democracy and oligarchy in ancient Greece, tracing how oligarchic regimes survived despite their unpopularity through skillfully designed political institutions. Drawing on historical examples from classical Athens, the piece argues that Americans should reflect on how their own institutions may be enabling a modern form of oligarchic rule. The opinion piece uses the story of the Thirty Tyrants and figures like Critias to illuminate timeless tensions between elite minority rule and popular democracy.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/onpoint/ancient-greece-oligarchy-bitter-struggle-with-democracy-by-matt-simonton-2026-07", "state_media": false, "category": "オピニオン", "full_text": "OnPoint Subscriber Exclusive\nDeep Dives are collections of long-form commentaries that give readers a comprehensive understanding of critical issues, challenges, and trends shaping our world.\nOligarchy’s Ancient Origins\nThe struggle between democracy and oligarchy in classical Greece was bitter, with oligarchies relying on skillfully designed political institutions to shore up unpopular regimes. As concerns grow over the “rule of the few” in the United States, Americans should consider how their own institutions are doing oligarchs’ work for them.\nPRINCETON—In the autumn of 403 BCE, democracy triumphed in Athens. It was a hard-fought victory. The 27-year conflict with Sparta known as the Peloponnesian War had ended the previous year with the besieged Athenians capitulating. An authoritarian regime called the Thirty then took control of the city and, despite their claims of “virtue” and “justice,” soon executed more than 1,500 people.\nThis paroxysm of violence inspired a democratic resistance movement, comprised in part of working-class resident foreigners and slaves. After nearly a year of civil war, the rebels had won—a remarkable moment of democratic restoration that still resonates today. To celebrate, they offered a sacrifice on the Acropolis to the city’s patron goddess, Athena.\nBut far from the festivities, a very different kind of commemoration was taking place. Remnants of the Thirty were setting up a monument to their fallen leader, Critias. An older relative of the philosopher Plato, Critias was an intellectual, poet, and political theorist who virulently opposed the city’s democracy. He had spearheaded the Thirty until his death in battle earlier that year.\nTo pay tribute to Critias and the entire anti-democratic movement, his fellow partisans erected an elaborate marble gravestone. A carved relief showed a fierce young woman brandishing a torch and setting another woman on fire, with the epitaph: “This is the memorial of good men, who for a brief time restrained the hubris of the cursed Athenian people.” According to an ancient Greek commentator, the woman holding the torch is Oligarchy personified. Her victim is Democracy.\nDemocracy’s Nemesis\nNo trace of Critias’ gravestone survives, and the only reference to it is in the marginal note of a manuscript. Some scholars have understandably doubted its existence. Surely, they argue, such a subversive object would have been built in secret, raising the question of how anyone could have recorded its content. Perhaps it is a bit of ancient fan fiction.\nStill, real or invented, the monument encapsulates a major political phenomenon of classical Greece: oligarchy, or “the rule of the few.” Oligarchs viewed themselves as a rarefied minority set apart by their breeding, wealth, manners, and superior education, which rendered them fit to rule. They were, in a word, the “good” of Critias’ epitaph, as opposed to the unwashed majority—the demos—who lacked the training and discernment necessary for politics, and whose misplaced priorities could result only in hubris. It was the duty of every right-thinking member of the elite to hold back the tide of ignorance by whatever means necessary. (In ancient sources, the demos is often compared to a rushing river or inundating wave; the torch imagery of the tombstone, opposing fire to water, may therefore be deliberate.)\nIf the oligarchic sentiment embodied in Critias’ monument seems extreme, that is because it reflects the bitterness of the struggle between democracy and oligarchy in classical Greece. It is well known that, beginning in the fifth century BCE, Greek thinkers devised a simple yet ingenious method for classifying constitutional types based on number. States could be ruled by the one (tyranny), the few (oligarchy), or the many (democracy). What is less understood is that democracy and oligarchy quickly became the two most common—and most violently opposed—forms.\nWriting in the fourth century BCE, Aristotle observed in The Politics that “most constitutions are either democratic or oligarchic.” It would not be an exaggeration to say that the choice between the two nearly tore the Greek world apart. Columbia University historian John Ma, in his recent history of the ancient Greek polis, refers to the period between about 460 and 360 BCE as a “Hundred Years’ War” between democracy and oligarchy. Much more than tyranny, oligarchy was the great nemesis of popular government.\nBut oligarchy, no matter how ubiquitous, never had widespread appeal. Oligarchs were not a political “party” who alternated with democrats through peaceful transfers of power. Most constitutional changes were the result of a coup d’état. That was true even for the establishment of democracies. But whereas democracies, almost by definition, enjoyed the support of a majority of citizens, oligarchies often managed to persist in spite of their unpopularity.\nThe Rules of the Few\nAncient Greek oligarchies are a case study in how skillfully design", "translation_ja": "寡頭制の古代的起源\n\n古典ギリシャにおける民主主義と寡頭制の闘争は熾烈を極め、寡頭制政権は不人気な体制を維持するために巧みに設計された政治制度に頼っていた。アメリカで「少数者による支配」への懸念が高まる中、アメリカ人は自国の制度がいかに寡頭支配者たちのために機能しているかを考えるべきだろう。\n\nプリンストン発——紀元前403年の秋、アテナイで民主主義が勝利を収めた。それは苦難の末の勝利だった。ペロポネソス戦争として知られる27年にわたるスパルタとの争いが前年に終結し、包囲されたアテナイ人は降伏を余儀なくされた。その後、「三十人僭主」と呼ばれる権威主義的政権が都市を掌握し、「徳」と「正義」を標榜しながらも、やがて1,500人以上を処刑した。\n\nこの暴力の嵐は民主主義的抵抗運動を生み出した。その運動には、労働者階級の外国人居住者や奴隷も加わっていた。約1年にわたる内戦の末、反乱軍は勝利を収めた——今日にも響き渡る、驚くべき民主主義の復活の瞬間だった。祝いのために、人々はアクロポリスで都市の守護女神アテナに供物を捧げた。\n\nしかし祝典から遠く離れた場所では、まったく異なる種類の追悼が行われていた。三十人僭主の残党が、倒れた指導者クリティアスの記念碑を建立しようとしていたのだ。哲学者プラトンの年長の親族であるクリティアスは、知識人であり詩人であり政治理論家でもあり、都市の民主主義に激しく反対していた。彼はその年の初め、戦闘で命を落とすまで三十人僭主を率いていた。\n\nクリティアスと反民主主義運動全体を称えるため、仲間の支持者たちは精巧な大理石の墓碑を建てた。浮き彫りの彫刻には、松明を手にした激しい表情の若い女性が別の女性に火を放つ場面が描かれ、碑文にはこう記されていた。「これは善人たちの記念碑である。彼らは短い期間、呪われたアテナイ人民の横暴を抑制した。」古代ギリシャの注釈者によれば、松明を持つ女性は擬人化された「寡頭制」である。その犠牲者は「民主主義」だ。\n\n民主主義の天敵\n\nクリティアスの墓碑の痕跡は現存せず、それに言及する唯一の記録は写本の欄外注記のみである。一部の学者がその存在を疑うのも無理はない。彼らの主張によれば、そのような反体制的な物体は秘密裏に建てられたはずであり、どのようにしてその内容が記録されたのかという疑問が生じる。おそらくそれは古代のファンフィクションの一種なのかもしれない。\n\nそれでも、実在か否かにかかわらず、この記念碑は古典ギリシャの主要な政治現象、すなわち「寡頭制」（少数者による支配）を象徴している。寡頭制支持者たちは自らを、血統・富・礼儀・高度な教育によって一般人と区別された、統治にふさわしい少数の精鋭と見なしていた。彼らは一言で言えば、クリティアスの碑文にある「善人」であり、政治に必要な訓練と識見を欠き、その的外れな優先事項が横暴しかもたらさない「民衆（デモス）」——洗練されていない多数派——とは対照的な存在だった。エリートのあらゆる正しい考えを持つ構成員には、あらゆる手段を尽くして無知の波を押しとどめる義務があった。（古代の資料では、デモスはしばしば激流や氾濫する波に例えられる。墓碑の松明のイメージが火と水を対比させているのは、それゆえ意図的なものかもしれない。）\n\nクリティアスの記念碑に体現された寡頭制的感情が極端に見えるとすれば、それは古典ギリシャにおける民主主義と寡頭制の闘争の激しさを反映しているからだ。紀元前5世紀以降、ギリシャの思想家たちが数に基づく単純かつ独創的な憲法類型の分類法を考案したことはよく知られている。国家は一人（僭主制）、少数（寡頭制）、または多数（民主制）によって統治されうる。あまり理解されていないのは、民主主義と寡頭制が急速に最も一般的な——そして最も激しく対立する——二つの形態となったという事実だ。\n\n紀元前4世紀に著述したアリストテレスは『政治学』の中で、「ほとんどの憲法は民主制か寡頭制のどちらかだ」と述べている。この二つの間の選択がギリシャ世界をほぼ引き裂いたと言っても過言ではないだろう。コロンビア大学の歴史家ジョン・マは、古代ギリシャのポリスに関する最近の著書の中で、紀元前460年頃から360年頃の時期を民主主義と寡頭制の間の「百年戦争」と呼んでいる。僭主制よりもはるかに、寡頭制こそが民衆政府の大いなる天敵だった。\n\nしかし寡頭制は、いかに遍在していたとしても、広範な支持を得ることはなかった。寡頭制支持者たちは平和的な政権交代を経て民主派と交互に権力を握る政治「党派」ではなかった。ほとんどの憲法上の変化はクーデターの結果だった。それは民主主義の確立においても同様だった。しかし、民主主義はほぼ定義上、市民の過半数の支持を享受していたのに対し、寡頭制は不人気であるにもかかわらず存続することが多かった。\n\n少数者の支配の規則\n\n古代ギリシャの寡頭制は、巧みに設計された政治制度がいかに……（本文はここで終了）", "vocab": [{"word": "paroxysm", "definition": "（感情や暴力などの）突発的で激しい爆発・発作を意味する。「a paroxysm of violence（暴力の爆発）」のように、突然かつ激烈な出来事を描写する際に用いられる上級語彙。"}, {"word": "oligarchy", "definition": "少数の権力者・特権階級による支配体制を指す政治用語。ギリシャ語の「oligos（少ない）」と「arkhein（支配する）」に由来し、現代政治論でも頻繁に使われる。"}, {"word": "epitaph", "definition": "墓碑銘、すなわち墓石に刻まれた故人を追悼する短い文句や碑文を指す。比喩的に、何かの終焉を象徴する言葉としても用いられる。"}, {"word": "ubiquitous", "definition": "至る所に存在する・遍在するという意味の形容詞。「no matter how ubiquitous（いかに遍在していたとしても）」のように、何かが非常に広く普及している状態を表す。"}, {"word": "hubris", "definition": "傲慢さ・過度な自信・思い上がりを意味するギリシャ語由来の語。特に権力者や成功者が分を超えた行動をとることへの警告として古典文学や現代の論説でよく使われる。"}, {"word": "coup d'état", "definition": "フランス語由来の表現で、武力や非合法な手段による突然の政府転覆・政権奪取を指す。政治・国際関係の文脈で広く使われる専門的表現。"}, {"word": "encapsulates", "definition": "何かの本質や内容を簡潔にまとめる・凝縮して表すという意味の動詞。「encapsulates a major political phenomenon（主要な政治現象を象徴する）」のように論説文で頻用される。"}]}, {"title_ja": "モディはいかにしてインドを作り変えたか", "title_en": "How Modi Has Remade India", "summary_ja": "ナレンドラ・モディは6月10日、ジャワハルラール・ネルーの在職4,398日という記録を超え、インド史上最長の連続在任を果たした民選首相となった。筆者は、モディがネルーとインディラ・ガンディーと並び、独立後のインドで最も影響力のある3人の指導者の一人であると論じている。彼の遺産は、かつての指導者たちと同様に、インドの将来の方向性を規定するものとなるだろう。", "summary_en": "Narendra Modi became India's longest continuously-serving elected prime minister on June 10, surpassing Jawaharlal Nehru's record of 4,398 days in office. The author argues that Modi ranks alongside Nehru and Indira Gandhi as one of India's three most influential post-independence leaders. His legacy, like theirs, is seen as defining India's future trajectory.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/modi-12-year-record-includes-economic-successes-and-democratic-failures-by-shashi-tharoor-2026-06", "state_media": false, "category": "オピニオン", "full_text": "How Modi Has Remade India\nNEW DELHI—On June 10, Narendra Modi became the country’s longest continuously-serving elected prime minister, overtaking India’s independence-era hero, Jawaharlal Nehru, who served 4,398 days in office following the first general elections. While Nehru led India for five years before those first elections, and Indira Gandhi served longer overall, but not continuously, Modi undoubtedly ranks alongside them as one of India’s three most influential post-independence leaders. Modi’s legacy, like theirs, will define India’s path.", "translation_ja": "インドの再構築者・モディ\n\nニューデリー発――6月10日、ナレンドラ・モディは同国の最長連続在任民選首相となり、初回総選挙後に4,398日間在職したインド独立期の英雄ジャワハルラール・ネルーを超えた。ネルーは最初の総選挙前にも5年間インドを率い、インディラ・ガンディーは通算在任期間ではより長く首相を務めたが、連続在任ではなかった。それでもモディは、この二人と並び、独立後のインドで最も影響力のある三人の指導者の一人として疑いなく位置づけられる。モディの遺産は、彼らのそれと同様に、インドの進む道を規定していくことになるだろう。", "vocab": [{"word": "continuously-serving", "definition": "「継続して在任している」という意味の複合形容詞。政治的文脈で途切れなく職務を遂行している状態を指す。"}, {"word": "overtaking", "definition": "「追い越す・凌駕する」という意味の動詞。記録や地位などで他者を上回る際に用いられる。"}, {"word": "independence-era", "definition": "「独立期の」を意味する複合形容詞で、国家が独立を達成した時代に関連する人物や出来事を指す歴史的表現。"}, {"word": "undoubtedly", "definition": "「疑いなく・明らかに」を意味する副詞。主張や事実に強い確信を添える際に使われる、やや格式のある表現。"}, {"word": "legacy", "definition": "「遺産・功績」を意味する名詞。個人が後世に残す影響や業績、とりわけ政治家や歴史的人物の評価文脈で頻出する語。"}, {"word": "post-independence", "definition": "「独立後の」を意味する複合形容詞。国家の独立達成以降の時代や状況を指す歴史・政治用語。"}]}, {"title_ja": "USMNTのW杯挑戦は「注目経済」における通貨だ", "title_en": "USMNT's World Cup Run Is a Battle for Attention in a Distracted Nation", "summary_ja": "筆者は、ポチェッティーノ監督の最大の課題は戦術面だけでなく、気が散りやすいアメリカの大衆の関心をいかに掴み続けるかという文化的な戦いだと主張する。ネーションズリーグでの失敗を経てチームの闘争心を再構築し、グループステージを首位通過したものの、トルコ戦の敗北が勢いに水を差した。USMNTは勝ち続けることで十分な「記憶に残る瞬間」を積み上げなければ、国民の視線を繋ぎ止めることはできないと論じている。", "summary_en": "The author argues that Mauricio Pochettino's primary challenge coaching the US men's national team is not just tactical but cultural: capturing and holding the attention of a distraction-prone American public. After early stumbles, Pochettino rebuilt team intensity and achieved group-stage success, but a loss to Turkey threatened momentum. The piece contends that the USMNT must keep winning to accumulate enough memorable moments to matter in the broader attention economy.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/football/2026/jul/01/usmnt-bosnia-herzegovina-soccer-popularity", "state_media": false, "category": "オピニオン", "full_text": "It took Mauricio Pochettino a little while to understand that he had accepted an innately vibes-based job.\nIf club soccer boils down to managers exerting control and fitting their players into an intricate system, buttressed by cutting-edge tactics, ultra-modern analytics and first-in-class sports science, international soccer demands a different job entirely. And it tends to take long-time club coaches who are managing in the international game for the first time a bit to catch on to the difference.\nNamely, that their new job description boils down to finding a simple tactical setup that fits a plurality of their best players, working out who plays well together and keeping their charges happy and healthy. Also: feisty.\nIn the US men’s national team job, however, there is a second priority: keeping the country interested.\nOn the first count, Pochettino diagnosed the vibes deficiency in the USMNT about six months into the job. That’s when the US faceplanted in the 2025 Nations League finals with a pair of losses to Panama and Canada.\nPochettino’s predecessor, Gregg Berhalter, had been told the year before by his senior players on the way to a humiliating group-stage exit at the 2024 Copa América that they desired more intensity from their coach. Berhalter would later admit that he’d let his squads get stale and relied on the same players too much, even when they weren’t performing.\nWhat Pochettino surmised after the Nations League was that he had to push his players to rediscover that intensity within themselves.\n“Being honest, maybe we didn’t feel or see [how] difficult the process [would be] … We were so naive,” Pochettino told reporters last week. “We misjudged the situation. It was worse than we really believed. … When we arrived here, we received a big bang, punch, and we were knocked out for a while. We said: ‘What the fuck?’”\nSo he spent the last year deconstructing and rebuilding a team that wound up being largely the same, but with its stars reawakened to the possibility of losing their places. And with everyone involved reenergized with an unrelenting eagerness “to fight”, as Pochettino likes to call it. Only then could he set about molding his players into a collective that could play Pochettino Soccer: pressing high and hard, haring forward in quick transitions, suffocating opponents with their energy, with their fight.\nWhich brings us back to the other task: the country.\nWe are a distractible people in a nation with endless stimuli, pinging between potential dopamine hits available absolutely everywhere you look. No culture in history has created so much content – never mind that most of it is dross. And without an inbuilt fixation on this team, the way the national elevens of so many other nations can count on, they must win the race for relevance anew every day.\nSure enough, their group-stage wins over Paraguay and Australia generated lots of excitement and energy. And then came the 3-2 loss to Turkey, which, meaningless though it may have been, let some air out of that balloon.\nPochettino, for his part, got cranky about the faintest hint that his judgment in resting almost all his starters for the final group-stage game might be questioned. He got a little tetchy, as he sometimes will. “I think it’s all positive, and I am so positive, and I am happy,” Pochettino said to the media. “Maybe I am not showing because your questions are a little bit weird.”\n“No one congratulated us for finishing first in a very difficult group,” the Argentinian added, in comments he apologized for on Tuesday. “That is a little bit sad. I need to [remind] you and everyone that we won the group. You guys, we won.”\nThe players, meanwhile, didn’t think their velocity in this tournament had been arrested, either. And in the playing sense, that may very well be true. But all of this misses the point. The primary battle is for hearts and minds, and the trick is to create memories that cut through all the other stuff – like Mexican duck mascots, hopping Dutchmen, Croatian wedding crashers and kings and queens dancing in locker rooms.\nThat’s what’s at stake against Bosnia and Herzegovina on Wednesday. Progress to the next round, sure. And, certainly, the chance for this generation to live up to the potential we long suspected it harbored. Above all, the USMNT are in a contest for currency in the attention economy.\nBecause if the US are expelled from this World Cup on Wednesday, they won’t have crafted enough moments to really make this tournament count. One day, Brad Pitt and Leonardo DiCaprio and a raft of other A-listers are at your games, and the next, everyone may just move on. Their new bandwagon fans will forget and start paying attention to something else. The Americans have to keep playing to leave any kind of legacy, to hold the nation’s gaze a while longer.\nWhat made the 1994 World Cup transformational for the domestic game was less that the US made the knockout stage for the first time in 64 years but that they ", "translation_ja": "モーリシオ・ポチェッティーノが、自分が本質的に「雰囲気重視」の仕事を引き受けたのだと理解するまでには、少し時間がかかった。\n\nクラブサッカーが突き詰めれば、監督が選手をコントロールし、最先端の戦術、超近代的なアナリティクス、一流のスポーツ科学に支えられた緻密なシステムに選手をはめ込む作業であるとすれば、国際サッカーはまったく異なる仕事を要求する。そして、長年クラブチームを指揮してきた監督が初めて代表チームを率いる場合、その違いに気づくまでに少し時間がかかる傾向がある。\n\n具体的に言えば、新しい職務内容は、多くの優秀な選手にフィットするシンプルな戦術を見つけ、誰が一緒にプレーすると相性が良いかを見極め、選手たちを幸せで健康な状態に保つことに集約される。そして、闘争心を持たせることも。\n\nしかし、アメリカ男子代表（USMNT）の監督職には、もう一つの優先事項がある。それは、国民の関心を繋ぎ止めることだ。\n\n第一の課題については、ポチェッティーノは就任から約6ヶ月でUSMNTの「雰囲気の欠如」を診断した。それは、アメリカが2025年ネーションズリーグ決勝でパナマとカナダに連敗して惨敗を喫したときのことだった。\n\nポチェッティーノの前任者グレッグ・ベルハルターは、2024年コパ・アメリカでグループステージという屈辱的な敗退を喫する途中、ベテラン選手たちから「もっと強度を上げてほしい」と訴えられていた。ベルハルターはその後、チームを停滞させ、パフォーマンスが出ていない時でも同じ選手を使い続けすぎたと認めた。\n\nネーションズリーグを経てポチェッティーノが悟ったのは、選手たちが自らの内側に潜む闘争心を再発見するよう促さなければならないということだった。\n\n「正直に言えば、このプロセスがいかに困難なものかを、私たちは感じることも見通すこともできていなかったかもしれない……私たちは非常に甘かった。状況を見誤っていた。実際よりもずっとひどい状況だった……ここに来たとき、私たちは大きな衝撃を受け、殴られて、しばらく茫然としていた。『何てことだ』と思った」とポチェッティーノは先週、報道陣に語った。\n\nそこで彼は、この1年間かけてチームを解体・再構築した。結果として、メンバーはほぼ同じだったが、スター選手たちは自分のポジションを失う可能性に再び目を覚まされた。そして関係者全員が、ポチェッティーノの言葉を借りれば「戦う」ことへの止むことのない熱意で再び活力を取り戻した。そうして初めて彼は、選手たちをポチェッティーノ・サッカーと呼べる集合体へと形成し始めることができた。高く激しいプレス、素早いトランジション、エネルギーと闘争心で相手を窒息させるサッカーだ。\n\nそして話は再び、もう一つの課題——国民——へと戻る。\n\n私たちは気が散りやすい民族であり、至るところにあふれる刺激に満ちた国に生きている。絶対にどこかしこに目を向ければドーパミンの刺激を求めてスマホを弾き続けている。歴史上、これほど多くのコンテンツを生み出した文化はない——その大半がガラクタであることは言うまでもない。そして、他の多くの国の代表チームが当然のように持っているような、このチームへの生来の執着心なしに、彼らは毎日新たに「存在感」を勝ち取る競争を繰り広げなければならない。\n\n案の定、パラグアイとオーストラリアに対するグループステージでの勝利は多くの興奮とエネルギーを生み出した。そしてトルコに3-2で敗れ、それがどれほど意味のないものであったとしても、その風船から少し空気が抜けた。\n\nポチェッティーノはといえば、グループステージ
