最終戦でほぼ全スターターを温存した判断に疑問の余地があるというわずかなヒントにも不機嫌になった。彼はやや苛立った様子を見せた。「すべてがポジティブだと思うし、私は非常にポジティブで、幸せだ」とポチェッティーノはメディアに語った。「あなたたちの質問が少し奇妙だから、それが表れていないだけかもしれない」\n\n「非常に難しいグループで首位通過したことを誰も祝福してくれなかった」とアルゼンチン人監督は付け加えた（この発言については火曜日に謝罪した）。「それは少し悲しい。あなたたちに、そして全員に思い出させなければならない。私たちはグループを制したんだ。みんな、私たちは制したんだ」\n\n一方、選手たちも、このトーナメントでの自分たちの勢いが止まったとは思っていなかった。プレーの面では、それはおそらく本当のことかもしれない。しかし、こうした議論はすべて的外れだ。主な戦いは心と気持ちを掴むことにあり、その秘訣は——メキシコのアヒルのマスコット、ジャンプするオランダ人、クロアチアの結婚式に乱入者、ロッカールームで踊る王と女王のように——他のすべての雑音を切り抜けるような記憶を作り出すことなのだ。\n\nそれこそが水曜日のボスニア・ヘルツェゴビナ戦で賭けられているものだ。次のラウンドへの進出はもちろん。そして確かに、私たちが長い間秘めていると感じていた潜在能力に、この世代が応えるチャンスでもある。何よりも、USMNTは注目経済における通貨を巡る争いを繰り広げている。\n\nなぜなら、もしアメリカが水曜日にこのW杯から姿を消すならば、このトーナメントを本当に意義あるものにするほど十分な瞬間を作り出せなかったことになるからだ。ある日はブラッド・ピットやレオナルド・ディカプリオや多数のAリスト有名人が試合に駆けつけ、次の瞬間には誰もが先へ進んでしまうかもしれない。新たに生まれた便乗ファンたちは忘れ去り、別の何かに注目し始めるだろう。アメリカは何らかの遺産を残し、国民の視線をもう少し長く引き留めるために、プレーし続けなければならない。\n\n1994年ワールドカップが国内サッカーにとって変革的だったのは、64年ぶりにアメリカが決勝トーナメントに進出したからというよりも、むしろ——", "vocab": [{"word": "innately", "definition": "「生来、本質的に」という意味の副詞。ある性質が生まれつきそのものに備わっていることを表す。例：innately vibes-based job（本質的に雰囲気重視の仕事）。"}, {"word": "plurality", "definition": "「多数、複数」という意味で、必ずしも過半数ではないが最も多い数・割合を指す。「a plurality of players」は「多くの選手」というニュアンス。"}, {"word": "faceplanted", "definition": "「顔面から転ぶ」が転じて「惨敗する、大失敗する」という意味の口語的・慣用的表現。スポーツや競争での完全な失敗を生き生きと描写する。"}, {"word": "dross", "definition": "「くず、役に立たないもの」という意味で、金属精錬時のカスから転じた言葉。価値のないコンテンツや情報の総体を軽蔑的に指す際に使われる。"}, {"word": "tetchy", "definition": "「短気な、ちょっとしたことで苛立つ」という意味の形容詞。主にイギリス英語で使われ、些細なことに対して神経質になって機嫌が悪い様子を表す。"}, {"word": "attention economy", "definition": "「注目経済」を指す経済・メディア用語。人間の注目・関心が希少資源とみなされ、それを巡って企業やコンテンツが競争する現代のメディア環境の概念。"}, {"word": "bandwagon fans", "definition": "「便乗ファン」を意味する慣用表現。チームが勝っているときや話題の時だけ応援し、長年の忠実なサポーターとは対照的に熱意が持続しないファン層を指す。"}]}, {"title_ja": "進歩派の予備選勝利に企業寄り民主党員が動揺", "title_en": "Progressive Primary Wins Have Corporate Democrats Panicking", "summary_ja": "著者ノーマン・ソロモンは、民主社会主義者の候補者たちがニューヨーク市などの強固な民主党地盤で予備選を勝ち抜いており、党内の企業寄り主流派に動揺が広がっていると論じる。元DNC議長のジェイミー・ハリソンやジェームズ・カービルといった大物民主党員がロビイスト経歴を持ちながら進歩派を党から排除しようとしているのは偽善的だとソロモンは指摘する。この対立は、草の根エネルギーを持つ左派と、有権者の感覚からかけ離れた企業寄りの党機構との衝突として描かれている。", "summary_en": "Author Norman Solomon argues that democratic socialist candidates are winning Democratic primaries in deep-blue districts, causing panic among corporate-aligned party establishment figures like Jaime Harrison and James Carville. Solomon contends that these establishment Democrats, many with lobbyist backgrounds representing major corporations, are hypocritically trying to push progressives out of the party. He frames the conflict as one between genuine grassroots energy on the left and a corporate-friendly Democratic machine increasingly out of step with voters.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/01/democratic-socialists-versus-corporate-democrats", "state_media": false, "category": "オピニオン", "full_text": "A recent chair of the Democratic National Committee apparently wants democratic socialists to get out of his party. “If you hate the Democratic Party, then please don’t run for our nomination,” Jaime Harrison tweeted on election day last week, shortly before results showed that three of those socialists had won Democratic primaries for Congress in deep-blue New York City. He didn’t identify his targets, but the implication was clear.\nHarrison’s call for self-expulsion was the bizarre opposite of a welcome mat: “Don’t use our resources. Don’t rely on our volunteers. Don’t use our infrastructure. Don’t ask Democrats to invest their time, money, and energy in your campaign.” The tweet turned reality on its head. Socialist candidates have been winning because they inspired multitudes of people to volunteer and provide what’s needed to win.\nThe little tirade from Harrison attracted a lot of attention, with more than 5m views on X. What’s widely known about him is that he served as Joe Biden’s DNC chair for four years after running for the Senate from South Carolina in 2020, when he raised a record $130m and lost to Republican senator Lindsey Graham by 10 points. But little-known information about Harrison puts his evident broadside against socialists in context.\nBetween 2008 and 2016, when Harrison worked as a lobbyist for the powerhouse firm the Podesta Group, he represented scores of huge corporations. They included Bank of America, Berkshire Hathaway, Boeing, BP, General Motors, Google, Lockheed Martin, Merck, Oracle, United Technologies, Wal-Mart and Wells Fargo. He also lobbied for trade associations like the American Coalition for Clean Coal Electricity and the National Mining Association.\nHarrison is an archetype of the political operatives telling democratic socialists to leave the Democratic party. If they followed such advice, the new mayors of New York and Seattle would no longer be Democrats. Nor would the next mayor of Washington DC, or the member of the Los Angeles city council now in a runoff for LA mayor.\nMany prominent mainline Democrats are suddenly insisting that their party’s big tent should get smaller. One of them, James Carville, declared last week that the socialist Darializa Avila Chevalier, who won the Democratic primary in New York’s 13th congressional district, “is not a Democrat” and House Democrats “should not seat her in the caucus”.\nCarville’s political insights are notable in a pair of essays for the New York Times. One came in October 2024, when he wrote about Kamala Harris’s campaign against Donald Trump: “Harris will be elected the next president of the United States. Of this, I am certain.” A few months later – amid assaults on immigrants, attacks on civil liberties and much more by the new Trump administration – Carville wrote a piece “calling for a strategic political retreat”. His strategy? “It’s time for Democrats to embark on the most daring political maneuver in the history of our party: roll over and play dead. Allow the Republicans to crumble beneath their own weight and make the American people miss us.”\nAfter gaining fame as the campaign manager for Bill Clinton’s 1992 presidential victory, Carville served as a consultant overseas for corporate and conservative candidates from Greece to Latin America. He and Harrison are just two of the eminent Democrats now publicly melting down about the left’s advances in this year’s primaries. The surge of voter support for strong progressives is a shock to seasoned lobbyists and political consultants for corporate America along with Democratic politicians who serve it.\nA major factor is the drastic shift away from public support for Israel during the last two years, now showing up on ballots. Mainstream Democrats have been knocked out of their denial comfort zone. Even though it has lately become expedient to distance oneself from Aipac, the main pro-Israel lobby group, most Democrats in Congress (along with Republicans) remain closely aligned with Israel – despite the genocide in Gaza.\nThe Democratic leaders representative Hakeem Jeffries and senator Chuck Schumer have always been stalwart advocates for Israel. Each has received more than $1.7m in campaign contributions from pro-Israel groups. Steadfast allegiance to Israel is one of the key reasons for their mutual antagonism with the left.\nLess obvious than the clashes between the surging left and the party’s establishment are the new divisions within that establishment on how to handle the socialist barbarians at the gate. The spectrum of reaction ranges from Carville’s open hostility toward strong progressives to the DNC chair Ken Martin’s congratulations to each primary winner, regardless of ideology.\nOn election night, Martin put out a statement praising the socialist who won the Democratic race for an open seat: “Claire Valdez has devoted her career to serving New Yorkers and making life better for her neighbors. As a union organizer and New York State assemblymember, s", "translation_ja": "民主党全国委員会（DNC）の元委員長が、民主社会主義者に対して党から出て行くよう求めているようだ。「もし民主党が嫌いなら、我々の候補者指名を求めて立候補しないでほしい」とジェイミー・ハリソンは先週の選挙当日にXへ投稿した。その直後、ニューヨーク市の強固な民主党地盤で社会主義者3人が連邦議会の民主党予備選に勝利したという結果が明らかになった。ハリソンは名指しこそしなかったが、示唆する相手は明らかだった。\n\nハリソンの「自発的退場」要求は、歓迎とは正反対の奇妙な言動だった。「我々のリソースを使うな。我々のボランティアを頼るな。我々のインフラを使うな。民主党員に時間や金や労力を自分のキャンペーンに注ぎ込むよう求めるな」。この投稿は現実をまったく逆に描いていた。社会主義者候補たちが勝利できたのは、大勢の人々を鼓舞してボランティアや必要な資源を集めたからにほかならない。\n\nハリソンのこの小言はX上で500万回以上閲覧されるなど、大きな注目を集めた。広く知られているのは、彼が2020年にサウスカロライナ州上院議員選に出馬し、記録的な1億3000万ドルを集めながら共和党のリンジー・グラハム上院議員に10ポイント差で敗れた後、4年間ジョー・バイデン政権下でDNC委員長を務めたという経歴だ。だが、あまり知られていない経歴が、彼が社会主義者に向けて放ったとみられる批判に文脈を与えている。\n\n2008年から2016年にかけて、ハリソンは大手ロビイスト事務所「ポデスタ・グループ」でロビイストとして働き、数十もの大企業を代表した。その顧客にはバンク・オブ・アメリカ、バークシャー・ハサウェイ、ボーイング、BP、ゼネラルモーターズ、グーグル、ロッキード・マーティン、メルク、オラクル、ユナイテッド・テクノロジーズ、ウォルマート、ウェルズ・ファーゴなどが含まれる。また、米国クリーン石炭電力連合や全国鉱山協会といった業界団体のためにもロビー活動を行った。\n\nハリソンは、民主社会主義者に民主党を去るよう促す政治オペレーターの典型だ。もし彼らの言葉に従えば、ニューヨーク市とシアトルの新市長はもはや民主党員ではなくなる。ワシントンDCの次期市長も、現在ロサンゼルス市長選の決選投票に臨んでいるLA市議会議員も同様だ。\n\n多くの著名な主流民主党員が突然、「大きな天幕」を小さくすべきだと主張し始めている。その一人、ジェームズ・カービルは先週、ニューヨーク第13選挙区の民主党予備選で勝利した社会主義者のダリアリザ・アビラ・シュバリエについて「彼女は民主党員ではない」と断言し、下院民主党は「彼女を院内会派に迎えるべきではない」と述べた。\n\nカービルの政治的洞察は、ニューヨーク・タイムズに寄稿した二本の論考において際立って示されている。一本は2024年10月のもので、彼はカマラ・ハリスのドナルド・トランプへの選挙戦についてこう書いた。「ハリスは次期大統領として選出される。これは確信している」。数か月後、移民への攻撃や市民的自由への侵害など新トランプ政権による様々な問題が噴出する中で、カービルは「戦略的撤退」を呼びかける論考を書いた。その戦略とは何か。「今こそ民主党は党史上最も大胆な政治的戦術を実行する時だ。つまり、寝転んで死んだふりをすることだ。共和党が自らの重みで崩壊するのを待ち、アメリカ国民に民主党を恋しく思わせるのだ」。\n\n1992年のビル・クリントン大統領選キャンペーンのマネージャーとして名声を博した後、カービルはギリシャからラテンアメリカに至るまで、企業寄りや保守系の候補者の海外コンサルタントを務めた。彼とハリソンは、今年の予備選での左派の躍進について公然と動揺を示している著名民主党員のうちの二人にすぎない。強い進歩派への有権者支持の急増は、企業アメリカのロビイストや政治コンサルタント、そしてそれに仕える民主党政治家たちにとって衝撃となっている。\n\n大きな要因の一つは、この2年間でイスラエルへの世論の支持が急激に低下し、それが今や投票結果に反映されていることだ。主流派民主党員はそれまでの現実否定の安全地帯から引き剥がされている。最近は親イスラエルロビー団体AIPACから距離を置くことが都合よく見えていても、議会の民主党員の大多数（共和党員とともに）は、ガザでの虐殺にもかかわらず、依然としてイスラエルと緊密な関係を保っている。\n\n民主党指導者のハキーム・ジェフリーズ下院議員とチャック・シューマー上院議員は、常に一貫したイスラエル支持者だった。それぞれが親イスラエル団体から170万ドル超の選挙資金提供を受けている。イスラエルへの揺るぎない忠誠心が、彼らと左派との相互反目の主要な理由の一つだ。\n\n急進左派と党内主流派との衝突ほど明白ではないが、主流派内部でも社会主義者という「門前の野蛮人」をいかに扱うかをめぐって新たな分断が生まれている。反応のスペクトルはカービルの強い進歩派への露骨な敵意から、現DNC委員長ケン・マーティンのイデオロギーを問わず各予備選勝者への祝辞まで幅広い。\n\n選挙当夜、マーティンは空席となった議席の民主党予備選で勝利した社会主義者を称える声明を発表した。「クレア・バルデスはニューヨーク市民に奉仕し、地域の人々の生活をより良くすることにキャリアを捧げてきました。労働組合のオーガナイザー、そしてニューヨーク州議会議員として……」", "vocab": [{"word": "broadside", "definition": "激しい批判・攻撃を意味する。元は船の側面一斉射撃を指す軍事用語だが、転じて言論による猛烈な攻撃を表す。"}, {"word": "archetype", "definition": "典型・原型を意味する。ある種類の人物や物事の最も代表的な例を指す際に使われる。"}, {"word": "expedient", "definition": "（倫理的正しさよりも）都合がよい・便宜的であることを意味する。主に政治的文脈で、原則よりも利便性を優先する態度を表す際に使われる。"}, {"word": "stalwart", "definition": "忠実で揺るぎない支持者・強力な味方を意味する形容詞または名詞。長年にわたって一貫した立場をとる人物に使われることが多い。"}, {"word": "maneuver", "definition": "（軍事・政治・ビジネスなどで）巧みな策略や機動的な行動を意味する。ここでは政治的な戦術的行動として使われている。"}, {"word": "antagonism", "definition": "敵対・対立関係を意味する。単なる意見の相違を超えた積極的な反目や敵意を表す上級語彙。"}, {"word": "tirade", "definition": "激しい非難や怒りの言葉の連続を意味する。特定の対象に向けられた長々とした攻撃的発言を指す。"}]}, {"title_ja": "右派のZ世代女性たちがトランスジェンダー排除の最高裁判決を歓迎する背景", "title_en": "Right-Wing Gen Z Women Are a Driving Force Behind the Anti-Trans Movement", "summary_ja": "質的社会学者である著者らは、保守派のZ世代女性がMAGAムーブメントにおいて見過ごされがちながらも重要な勢力であると主張する。彼女たちはフェミニズムの言語を取り込み、トランスジェンダー規制を「女性の権利の擁護」として再定義することで、反トランスジェンダー的な共和党の議題をトレンディかつ進歩的に見せる役割を担っている。しかし実際には、自称フェミニストの大多数はトランスジェンダーの権利を強く支持しているというデータがある。", "summary_en": "The authors, qualitative sociologists, argue that conservative Gen Z women are an underappreciated but consequential force within the MAGA movement, particularly in advancing anti-transgender legislation. These young women have reframed their activism using feminist language, positioning themselves as defenders of Title IX rather than opponents of it. This strategy makes the broader Republican anti-trans agenda appear modern, popular, and even feminist, despite national data showing most self-identified feminists strongly support transgender rights.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/01/rightwing-gen-z-women-supreme-court", "state_media": false, "category": "オピニオン", "full_text": "On the steps of the US supreme court on Tuesday, a group of women celebrated. They cheered and held up signs with phrases like “Girls’ Sports for Girls Only” and “Truth, Fairness, Biological Reality”. Penny Young Nance, the CEO of Concerned Women for America, told the gathering that after a decade of these conservative women’s activism: “The court agrees with us that a man cannot be a woman”.\n“The decision will affect the law across the country,” she said. “We will have a better opportunity to protect young women.”\nThe court’s decision upheld state restrictions on transgender students’ sports participation. The ruling falls in line with the broader Republican agenda to strip transgender people, especially youth, of rights.\nBehind every state law that restricts the sports participation of transgender athletes, young women have been among the most vocal and visible supporters. The Scotus ruling is just the latest sign that gen Z women are emerging as a powerful force within the Maga movement.\nAs qualitative sociologists, we have spent the better part of a decade studying conservative women’s activism. What we have found challenges the prevailing media narrative that the defining story of the gen Z right is the red-pilled young man.\nGen Z conservative women may be fewer in numbers than their male counterparts, but they are no less consequential, even if they are often reduced to coverage on their fashion or dismissed as tradwives nursing antifeminist grievances.\nInstead, we’ve observed how young women are at the heart of the Maga movement: organizing at state and national legislatures, building social media followings, staffing rightwing advocacy groups, and enacting real gains for the Republican party.\nBack in 2020, when Idaho became the first state to ban transgender girls from school sports, the ACLU took the state to court, arguing that excluding these students violated Title IX, the federal civil rights law that for decades had guaranteed women’s equal participation in college sports. That case, Little v Hecox, was one of two the court ruled on this week (the other was West Virginia v BPJ).\nSince then, young rightwing women have effectively mobilized against the ACLU claims, helping to pass laws similar to Idaho’s in more than two dozen states by insisting that conservatives are in fact Title IX’s true defenders. Their activism is a marked change from the past.\nIn the 1970s, antifeminist doyenne Phyllis Schlafly rallied conservative women against Title IX. “This rule is not only unfair but ridiculous because men like to play sports far more than women do,” she stated. Her opposition rested upon what she believed were women’s fundamental differences from men.\nYoung conservative women activists today still invoke what they believe are women’s innate differences from men, but now they do so using the language of feminism. In the process, they upend the traditional labels of antifeminist conservative and pro-feminist liberal entirely. In fact, the feminism that Schlafly and her peers hotly opposed has become the foundation for young conservative women’s activism.\nAt state legislatures, in social media posts, and on national bus tours, young conservative women have embraced popular feminist ideas and slogans. Their activism aligns with what is often referred to as “terf” (trans exclusionary radical feminist) ideology, rooted in the second-wave movement as key feminists made it their mission to weed out trans women from feminist collectives.\nConservatives have been more than happy to acknowledge feminists who share their views when it comes to trans people, in order to make the position appear popular and nonpartisan. The problem is that, while there are some liberal feminist organizations and individuals in the US who have supported the Republican-led anti-trans agenda, there is no broad feminist movement in the US opposing transgender people. National data, in fact, suggest the vast majority of self-identified feminists strongly support transgender rights across multiple measures.\nAnd this is where conservative gen Z women play a key role. In stark contrast with the image that the Republican movement is led by stuffy, old, white men, these young women make the broader Maga movement seem trendy, modern and even, well, feminist.\nThey take for granted the ubiquity of messaging surrounding “women’s empowerment” and insist the feminist label can apply to their views, too. Caitlyn, an activist on her South Carolina college campus, said: “If identifying as feminist is you believe that men and women are different but still should be equal in law, to that I say of course.”\nIn fact, in our interviews with activists, young women repeatedly reference their commitment to protecting the gains of the feminist movement of decades past. Like Olivia, a 24-year-old budding social media influencer in California who works for a rightwing lobby organization. As with many other conservative gen Z women, she first got involved with ", "translation_ja": "火曜日、米連邦最高裁判所の階段の上で、一群の女性たちが祝賀していた。彼女たちは「女子スポーツは女子のためだけに」「真実、公平性、生物学的現実」といったフレーズを掲げたプラカードを手に歓声を上げた。保守系女性団体「コンサーンド・ウィメン・フォー・アメリカ」のCEO、ペニー・ヤング・ナンスは集まった人々に向かって、10年にわたる保守系女性たちの活動の末にこう語った。「裁判所は、男性が女性になることはできないという私たちの主張に同意したのです」。\n\n「この判決は全国の法律に影響を与えるでしょう」と彼女は述べた。「若い女性たちを守る機会がより広がります」。\n\n最高裁の判決は、トランスジェンダーの生徒のスポーツ参加を制限する州法を支持するものだった。この判決は、トランスジェンダーの人々、特に若者から権利を剥奪しようとする共和党の広範な議題と一致している。\n\nトランスジェンダーアスリートのスポーツ参加を制限するすべての州法の背後には、若い女性たちが最も声高で目立つ支持者の一部として存在してきた。最高裁の今回の判決は、Z世代の女性たちがMAGAムーブメント内で強力な勢力として台頭しつつあることを示す最新の兆候に過ぎない。\n\n質的社会学者として、私たちはほぼ10年間にわたり保守系女性の活動を研究してきた。私たちが見出したことは、Z世代の右派を象徴する存在は「レッドピルされた若い男性」であるという主流メディアの支配的な物語に異議を唱えるものだ。\n\nZ世代の保守系女性は男性の同志に比べて数は少ないかもしれないが、その影響力は決して小さくない。たとえ彼女たちがしばしばファッションの話題に矮小化されたり、反フェミニスト的な不満を抱える「トラッドワイフ」として一蹴されたりするとしても。\n\nそれとは対照的に、私たちは若い女性たちがMAGAムーブメントの中心にいることを観察してきた。州議会や連邦議会で組織化し、ソーシャルメディアのフォロワーを獲得し、右派の擁護団体でスタッフとして働き、共和党に対して実質的な成果をもたらしているのだ。\n\n2020年、アイダホ州が学校スポーツへのトランスジェンダー女子の参加を禁じる最初の州となったとき、ACLUは州を相手取り訴訟を起こした。こうした生徒を排除することは、数十年にわたって女性の大学スポーツへの平等な参加を保障してきた連邦公民権法「タイトルIX」に違反すると主張したのだ。その訴訟「リトル対ヘコックス」は、今週最高裁が判決を下した2件のうちの1件であった（もう1件は「ウェストバージニア州対BPJ」）。\n\nそれ以来、若い右派の女性たちはACLUの主張に対して効果的に動員され、「保守派こそタイトルIXの真の擁護者である」と主張することで、アイダホ州と同様の法律を20以上の州で成立させることを助けてきた。彼女たちの活動は過去のそれとは大きく異なる。\n\n1970年代、反フェミニズムの重鎮フィリス・シュラフリーは保守系女性たちをタイトルIXへの反対運動に結集させた。「この規則は不公平なだけでなく馬鹿げている。なぜなら男性は女性よりずっとスポーツが好きだからだ」と彼女は述べた。彼女の反対は、女性が男性とは根本的に異なるという信念に基づいていた。\n\n今日の若い保守系女性活動家たちも、男女の生得的な違いを主張する点では同じだが、今ではフェミニズムの言語を使ってそれを行う。その過程で、「反フェミニストの保守派」と「フェミニストの進歩派」という従来のレッテルを完全にひっくり返してしまう。実際、シュラフリーらが激しく反対したフェミニズムが、今や若い保守系女性活動家たちの活動の基盤となっているのだ。\n\n州議会の場で、ソーシャルメディアの投稿で、そして全国バスツアーの中で、若い保守系女性たちはフェミニズムの人気ある考え方やスローガンを取り込んできた。彼女たちの活動は、第二波フェミニズム運動の一部の主要人物がトランス女性をフェミニストの集団から排除しようとしたことを起源とする「TERF（トランス排除的ラジカルフェミニスト）」のイデオロギーと一致している。\n\n保守派は、この立場を人気があり党派を超えたものに見せるために、トランスジェンダーに関して自分たちと見解を共有するフェミニストを喜んで認めてきた。問題は、米国にも共和党主導の反トランスジェンダー議題を支持するリベラルなフェミニスト団体や個人が一部存在するものの、トランスジェンダーに反対する広範なフェミニスト運動は米国には存在しないという点だ。実際、全国的なデータは、自称フェミニストの大多数が複数の指標でトランスジェンダーの権利を強く支持していることを示している。\n\nそして、ここにこそZ世代の保守系女性たちが重要な役割を果たす理由がある。共和党運動を率いているのは堅苦しい老齢の白人男性だというイメージとは対照的に、こうした若い女性たちはMAGAムーブメント全体をトレンディで、現代的で、そしてまるでフェミニズム的にさえ見せるのだ。\n\n彼女たちは「女性のエンパワーメント」に関するメッセージが至る所にあることを当たり前のこととして受け入れ、フェミニストというレッテルが自分たちの見解にも適用できると主張する。サウスカロライナ州の大学キャンパスで活動するキャイトリンはこう述べた。「もしフェミニストであるということが、男女は異なるが法律上は平等であるべきだと信じることを意味するなら、もちろんそれは私にも当てはまります」。\n\n実際、活動家へのインタビューの中で、若い女性たちは繰り返し、過去数十年のフェミニスト運動が勝ち取った成果を守るという自分たちのコミットメントについて語った。例えばカリフォルニア州に住む24歳の新進ソーシャルメディアインフルエンサーのオリビアもその一人で、彼女は右派のロビー団体に勤めている。他の多くの保守系Z世代女性と同様に、彼女が活動に関わるようになったのは……", "vocab": [{"word": "qualitative sociologists", "definition": "質的社会学者。統計などの数値データではなく、インタビューや観察などを通じて社会現象を深く理解しようとする社会学者を指す。"}, {"word": "red-pilled", "definition": "映画『マトリックス』の赤いカプセルに由来するインターネットスラングで、主に右派・陰謀論的な思想に目覚めたことを指す表現。"}, {"word": "tradwives", "definition": "「トラッドワイフ（traditional wife）」の略で、専業主婦や伝統的な性別役割を積極的に選択・推奨する女性を指すインターネット用語。"}, {"word": "mobilized", "definition": "動員された、組織化されて行動に移った、という意味。政治・社会運動において人々を特定の目的のために結集させることを表す。"}, {"word": "antifeminist doyenne", "definition": "反フェミニズムの重鎮・第一人者を指す表現。'doyenne'はある分野で最も経験豊富で権威ある女性を意味するフランス語由来の語。"}, {"word": "nonpartisan", "definition": "党派に偏らない、超党派の、という意味の形容詞。特定の政党や政治的立場に属さないことを強調する際に使われる。"}, {"word": "ubiquity", "definition": "至る所に存在すること、遍在。あるものやメッセージが社会のあらゆる場所に広まっている状態を表す名詞。"}]}, {"title_ja": "枢軸より危険：米国の敵対国が形成する非公式同盟の脅威", "title_en": "Worse Than an Axis: The Dangerous Informal Alliance of US Adversaries", "summary_ja": "筆者は、中国・ロシア・イラン・北朝鮮が正式な同盟を結ばないまでも、二国間ベースの軍事・技術協力ネットワークを構築しており、それが従来の枢軸よりも危険な可能性があると主張する。この非公式な連携は2022年のロシアによるウクライナ侵攻を機に加速し、武器供与・ドローン共同生産・兵士派遣といった具体的な戦略的成果をもたらしている。筆者はワシントンがこの緩やかながらも増大する能力を持つネットワークを真剣に受け止める必要があると訴える。", "summary_en": "The author argues that China, Russia, Iran, and North Korea have formed a flexible, bilateral network of military and technological cooperation that, while lacking a formal alliance structure, may be more dangerous than a traditional axis. This informal alignment accelerated after Russia's 2022 invasion of Ukraine and has produced concrete strategic effects including weapons transfers, drone production, and troop deployments. The author contends Washington must take this looser but increasingly capable network seriously, even if it cannot fully break it apart.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/china/worse-axis", "state_media": false, "category": "オピニオン", "full_text": "If actions speak louder than words, the four major adversaries of the United States have sent a very clear message over the past few months. In June, Chinese leader Xi Jinping took his first international trip of 2026 to North Korea, where he and North Korean leader Kim Jong Un agreed to expand their cooperation with no mention of denuclearization. Xi’s trip took place just weeks after Russian President Vladimir Putin made his 25th official visit to China, where he and Xi signed 20 different agreements spanning trade, technology, and economic cooperation. Meanwhile, news reports emerged detailing how Beijing and Moscow have provided indirect support to Iran in its war with Israel and the United States, including satellite imagery of U.S. forces in the region, missile propellant, and advanced drones. These four countries—China, Iran, North Korea, and Russia—don’t have a formal alliance but are increasingly aligning and supporting one another in ways that are materially changing the balance of power and challenging the United States and its allies.\nSkeptics argue that this alignment remains shallow, divided by competing interests and mutual suspicion. In this perspective, it is nothing like the feared Axis powers during World War II because it lacks any formal commitments or aggressive public rhetoric. The U.S. intelligence community even makes a version of this argument in its 2026 Annual Threat Assessment, concluding that these relationships are “limited and primarily bilateral” and that the concept of “adversary alignment” risks overstating the depth of current cooperation.\nBut the absence of a formal bloc does not mean the cooperation is weak. In fact, bilateralism may be precisely what makes it effective. These four states have cooperated on military integration, technological transfers, and mutual learning in a way that exceeds that of most previous authoritarian partnerships. The bilateral arrangements among Washington’s adversaries today can be negotiated faster, are easier to conceal or deny, and are more readily tailored to each pair’s immediate strategic needs than traditional, formal authoritarian alliances. Indeed, history suggests that authoritarian alliances have often proved brittle and unreliable when formalized, particularly when they involve more than two countries. What is emerging among these four powers may be more flexible, and in some respects more dangerous.\nWashington’s challenge, then, is not to determine whether a new authoritarian axis has emerged. It has not. The more important question is whether a looser but ever more capable network of military, technological, and political cooperation can generate strategic effects comparable to or even exceeding that of a formal alliance. Increasingly, the answer appears to be yes. The United States will not be able to break apart this alignment. But by understanding its structure and taking it seriously, Washington may still be able to limit its effectiveness.\nTRANSACTIONAL TODAY, STRATEGIC TOMORROW\nChina, Iran, North Korea, and Russia have long shared an adversarial relationship with the United States, but only since 2022 have they developed something approaching meaningful cooperation. The principal catalyst was Russia’s full-scale invasion of Ukraine that year, after which Moscow faced severe sanctions and the rapid depletion of key weapons stocks. As Russia needed more external military support, it became far more willing to exchange its advanced military technology and operational expertise in order to get it.\nNorth Korea, for example, initially withheld meaningful support after Russia’s invasion, but by 2023 it had become one of Moscow’s most important wartime suppliers, providing millions of rounds of artillery ammunition, ballistic missiles, and other military materiel. In return, Russia gave North Korea assistance with military modernization, including of satellites and air defense, as well as deepening economic ties. This relationship began as purely transactional but has gone on to become both deeper and more strategic. In 2024, for instance, the two countries signed a mutual defense treaty, and Kim subsequently dispatched more than 12,000 troops to support Russian military operations in the first large-scale deployment of North Korean combat personnel abroad.\nIran similarly emerged as a critical wartime partner for Russia. At first, Tehran supplied Moscow with large numbers of one-way attack drones, including the Shahed systems that have been used extensively against Ukrainian infrastructure. It then expanded its support to include ballistic missiles, technical expertise, and trainers. The relationship has since evolved into joint defense production, with Russia and Iran cooperating to finance and manufacture Iranian-designed drones in the Alabuga special economic zone in Russia.\nChina has stopped short of directly providing arms to Russia, but its support has been indispensable to Moscow’s war effort. U.S. officials have said t", "translation_ja": "行動は言葉よりも雄弁であるとするならば、米国の4大敵対国はここ数カ月の間に極めて明確なメッセージを発信してきた。2026年6月、中国の習近平国家主席は同年初の外遊先として北朝鮮を訪問し、金正恩総書記と非核化への言及なしに協力拡大で合意した。この訪問は、ロシアのウラジーミル・プーチン大統領が中国への25回目の公式訪問を行い、習近平と貿易・技術・経済協力にまたがる20本の協定に署名してからわずか数週間後のことだった。一方、北京とモスクワがイスラエルおよび米国との戦争におけるイランへの間接支援として、地域内の米軍の衛星画像、ミサイル推進剤、高性能ドローンを提供していたと報じる報道も相次いだ。中国、イラン、北朝鮮、ロシアの4カ国は正式な同盟を結んでいないものの、互いに連携・支援し合う動きを強めており、それは力のバランスを実質的に変化させ、米国とその同盟国に挑戦しつつある。\n\n懐疑論者は、この連携は競合する利益や相互不信によって依然として浅いものにとどまっていると主張する。この見方によれば、正式なコミットメントも攻撃的な公の発言もないため、第二次世界大戦時に恐れられた枢軸国とはほど遠いというわけだ。米国の情報コミュニティも2026年版年次脅威評価において、こうした関係は「限定的かつ主として二国間」であり、「敵対国の連携」という概念は現在の協力の深さを誇張するリスクがあると結論づける形で、ある種この議論の一端を担っている。\n\nしかし、正式な枢軸が存在しないことは、協力が弱いことを意味しない。実のところ、二国間主義こそがその効果を高めている可能性がある。これら4カ国は、軍事統合・技術移転・相互学習において、過去のほとんどの権威主義的パートナーシップを上回る形で協力してきた。今日のワシントンの敵対国間における二国間取り決めは、従来の正式な権威主義的同盟よりも交渉が迅速で、隠蔽や否定が容易であり、それぞれの即時的な戦略ニーズに合わせて柔軟に調整しやすい。実際、歴史は権威主義的同盟が正式化された際にはしばしば脆弱で頼りにならないことを示してきた。特に3カ国以上が関与する場合はなおさらだ。この4カ国の間に生まれつつあるものは、より柔軟であり、ある意味でより危険かもしれない。\n\nワシントンの課題は、新たな権威主義的枢軸が出現したかどうかを見極めることではない。そのような枢軸は出現していない。より重要な問いは、より緩やかでありながらも増大する能力を持つ軍事・技術・政治協力のネットワークが、正式な同盟に匹敵するか、場合によってはそれを上回る戦略的効果を生み出せるかどうかだ。その答えはますます「イエス」のように見える。米国はこの連携を解体することはできないだろう。しかし、その構造を理解し真剣に受け止めることで、ワシントンはその有効性を制限できるかもしれない。\n\n■今日の取引的関係、明日の戦略的関係へ\n\n中国、イラン、北朝鮮、ロシアは長らく米国との敵対的関係を共有してきたが、意味のある協力関係に近いものを発展させたのは2022年以降のことに過ぎない。その主な触媒となったのは、同年のロシアによるウクライナへの全面侵攻であり、その後モスクワは厳しい制裁と主要兵器在庫の急速な枯渇に直面した。ロシアは外部からの軍事支援をより必要とするようになるにつれ、それを得るための代償として高度な軍事技術と実戦経験を交換することに、はるかに積極的になっていった。\n\n北朝鮮は例えば、ロシアの侵攻後当初は実質的な支援を控えていたが、2023年までにはモスクワの最も重要な戦時供給国の一つとなり、数百万発の砲弾、弾道ミサイル、その他の軍事物資を提供した。見返りとして、ロシアは北朝鮮に衛星や防空を含む軍事近代化への支援と、深化する経済的結びつきを与えた。この関係は純粋に取引的なものとして始まったが、それ以降、より深く戦略的なものへと発展してきた。例えば2024年には両国が相互防衛条約に署名し、金正恩はその後、北朝鮮の戦闘員の大規模な海外派遣として初となる1万2000人以上の兵士をロシアの軍事作戦支援のために送り込んだ。\n\nイランも同様にロシアの重要な戦時パートナーとして台頭した。当初、テヘランはモスクワにウクライナのインフラに対して広範に使用されているシャヘッドを含む一方向攻撃ドローンを大量に供給した。その後、弾道ミサイル、技術的専門知識、および訓練要員へと支援を拡大させた。この関係はその後、ロシアとイランがロシアのアラブガ特別経済区においてイラン設計のドローンを共同で資金調達・製造するという防衛共同生産へと発展した。\n\n中国はロシアへの直接的な兵器供与は控えているものの、その支援はモスクワの戦争遂行にとって不可欠なものとなっている。米国当局者によれば——", "vocab": [{"word": "bilateralism", "definition": "二国間主義。複数国間の多国間枠組みではなく、二国間の取り決めや協定を優先するアプローチを指す。外交・国際関係の文脈で頻繁に使われる専門用語。"}, {"word": "denuclearization", "definition": "非核化。核兵器の廃棄や核開発計画の放棄を指す政治・外交用語で、特に北朝鮮問題の文脈で多用される。"}, {"word": "materiel", "definition": "軍事物資・兵器・装備品の総称。personnel（人員）と対比して使われる軍事専門用語で、武器・弾薬・車両などを含む。"}, {"word": "brittle", "definition": "脆い、もろい。物理的な意味だけでなく、同盟や関係が内部的な亀裂により容易に崩壊しやすい状態を表す比喩的表現として使われる。"}, {"word": "transactional", "definition": "取引的な。イデオロギーや価値観ではなく、具体的な利益や見返りの交換に基づく関係を描写する際に用いられる形容詞。"}, {"word": "indispensable", "definition": "不可欠な、欠くことのできない。ある要素がなければ全体が成立しないほど重要であることを強調する上級語彙。"}, {"word": "catalyst", "definition": "触媒、きっかけ。化学用語から転じて、ある変化や発展を引き起こす決定的な出来事や要因を指す比喩的表現。"}]}, {"title_ja": "極端な気象現象が米中競争を根底から覆す", "title_en": "Extreme Weather Will Upend U.S.-China Competition", "summary_ja": "筆者は、気候変動に伴う極端な気象現象が、米中間の地政学的・経済的競争の行方を左右しうる見過ごされた要因であると主張する。両国とも深刻な気候リスクに直面しているが、中国はスポンジシティや強靭な送電網、国家政策枠組みなど、適応策への投資で米国を大きく上回っている。筆者は、米国が経済的基盤を極端な気象から守る取り組みを強化しなければ、国際競争力はますます損なわれると警告する。", "summary_en": "The author argues that climate-related extreme weather is an underappreciated factor that could determine the outcome of U.S.-China geopolitical and economic competition. Both nations face severe climate risks, but China is investing far more in adaptation measures—including sponge cities, resilient grids, and national policy frameworks—than the United States. The author warns that if the U.S. fails to protect its economic foundations from extreme weather, its global competitiveness will increasingly suffer.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/china/extreme-weather-will-upend-us-china-competition", "state_media": false, "category": "オピニオン", "full_text": "Climate change looms in the background of the contest between China and the United States. It is the underappreciated factor that could determine who wins the race to develop frontier technologies, gain economic advantages, and secure influence across the world. And as global temperatures continue to climb, its role will become harder to ignore—because the two countries, the world’s largest emitters of carbon dioxide, both face great risks from climate-related extreme weather.\nExtreme weather threatens the physical foundations of Chinese and U.S. economic and technological power. It can degrade critical systems such as those that convey electricity and water. It can obstruct the transportation networks and break the supply chains on which industry relies. It can destroy housing and businesses, pushing communities into economic downturns as people leave and stores shutter. It can constrict insurance markets as the affordability and availability of property coverage decline. And it can dampen labor productivity and force governments to divert resources to manage public health crises. According to the 2026 Climate Risk Index produced by the nonprofit Germanwatch, China and the United States ranked among the top 20 countries that suffered the largest economic and human tolls from extreme weather between 1995 and 2024. These weather events will only intensify as the planet warms. XDI, a firm that performs climate-risk analysis, has projected that by 2050, the world’s 100 subnational jurisdictions most exposed to climate disruption will include 29 Chinese provinces and 18 U.S. states.\nHow well China and the United States prepare for extreme weather will shape their future economic prospects. The harms of climate-related disasters can be mitigated with managed retreat of people and infrastructure from severely threatened areas, ambitious engineering projects to protect financial centers, robust early warning systems, and other forms of adaptation. According to a World Resources Institute study, every dollar invested in climate adaptation and resilience can generate more than $10.50 in benefits over ten years. Today, China is investing far more than the United States in these kinds of measures. If the United States does not do more to protect the sources of its national power from the extreme weather to come, its economic competitiveness could suffer ever more severe blows.\nA STEP AHEAD\nBeijing has been integrating adaptation into its policy planning for more than a decade, releasing its first National Strategy for Climate Adaptation in 2013. Since then, China has gradually built up programs for climate monitoring and early warning, disaster prevention, natural ecosystem resilience, and climate-proofing infrastructure, agriculture, urban development, and public health systems. These efforts involve regional planning—nearly all provinces in China have climate adaptation plans—and at least 17 central government departments and agencies, with goals set through 2035. In 2024 alone, the national government issued around 100 policy documents related to climate adaptation. At the 2025 UN Climate Summit, Chinese leader Xi Jinping committed to making China “a climate-adaptive society” by 2035. China’s 15th Five-Year Plan, adopted earlier this year, similarly calls for a stronger national climate adaptation framework, better risk assessment in vulnerable sectors and regions, and greater capacity to respond to extreme weather.\nBeijing is backing up its pledges with significant investment. To reduce flood risk in urban areas, for example, China has carried out 90 “sponge city” pilot projects and demonstrations since 2015, using permeable pavement, wetlands, rain gardens, green roofs, and upgraded drainage systems to more effectively absorb rainfall. Between 2021 and 2025, the initiative received about $8.5 billion in central government funding and mobilized roughly $23 billion in total investment—around the same amount of money as the insurance payouts after the 2025 Los Angeles wildfires. China has also launched 67 pilot projects that explore additional solutions, including resilient power grids that better coordinate energy supply, demand, and storage; coastal wetlands that act as natural buffers against storms, flooding, and sea-level rise; “cool city” design to reduce heat exposure; and farming practices adapted to heat, drought, and shifting rainfall. The country’s investment in disaster prevention and emergency management increased by an average annual rate of almost nine percent between 2019 and 2023.\nThe harms of climate-related disasters can be mitigated.\nMuch of China’s spending is geared toward preparing the country’s infrastructure to withstand extreme weather. Over the next five years, State Grid, China’s dominant power-grid company, plans to invest roughly $570 billion on upgrades to enable the national grid to better manage electricity-supply fluctuations, to expand local backup power through microgrids, and to ", "translation_ja": "気候変動は、中国と米国の争いの背景に大きくのしかかっている。それは、フロンティア技術の開発競争、経済的優位の獲得、世界各地への影響力確保において、どちらが勝利するかを左右しうる、見過ごされた要因である。そして地球の気温が上昇し続けるにつれ、その役割はますます無視しがたくなっていく。世界最大の二酸化炭素排出国である両国は、気候に起因する極端な気象現象から多大なリスクを受けているからだ。\n\n極端な気象現象は、中米両国の経済的・技術的力の物理的基盤を脅かす。電力や水を供給する重要なインフラを劣化させ、産業が依存する輸送ネットワークを妨害し、サプライチェーンを断ち切ることがある。住宅や企業を破壊し、人々が去り店舗が閉まることで、地域社会を経済的低迷へと追い込む。不動産保険の手頃さと入手可能性が低下するにつれ、保険市場を縮小させることもある。さらに、労働生産性を低下させ、政府が公衆衛生危機の管理に資源を振り向けることを余儀なくさせる。非営利団体ジャーマンウォッチが作成した「2026年気候リスク指数」によれば、1995年から2024年の間に極端な気象によって最大の経済的・人的打撃を受けた国のトップ20に、中国と米国はともにランクインしている。地球温暖化が進むにつれ、こうした気象現象はさらに激化するだろう。気候リスク分析を手がける企業XDIは、2050年までに気候変動の混乱にさらされる世界の上位100のサブナショナル管轄区域には、中国の29省と米国の18州が含まれると予測している。\n\n中国と米国がどれだけ極端な気象に備えるかが、両国の将来の経済的見通しを左右する。気候関連災害の被害は、深刻な脅威にさらされた地域からの人々とインフラの計画的撤退、金融センターを守るための大規模な土木工事、強固な早期警戒システム、その他の適応策によって軽減できる。世界資源研究所の調査によれば、気候適応・強靭化への1ドルの投資は、10年間で10.50ドル以上の便益をもたらしうるという。現在、中国はこうした対策に米国よりもはるかに多くの投資を行っている。米国が国家的な力の源泉を今後の極端な気象から守るためにさらなる取り組みを行わなければ、その経済競争力はますます深刻な打撃を受けるおそれがある。\n\n【先行する中国】\n\n北京は10年以上にわたり、政策立案に適応策を組み込んできており、2013年に最初の「国家気候変動適応戦略」を発表した。それ以来、中国は気候モニタリングと早期警戒、防災、自然生態系の強靭化、インフラ・農業・都市開発・公衆衛生システムの気候耐性強化に向けたプログラムを着実に構築してきた。これらの取り組みは地域計画を伴い、中国のほぼすべての省が気候適応計画を持ち、少なくとも17の中央政府部門・機関が関与し、2035年までの目標が設定されている。2024年だけでも、中央政府は気候適応に関連する政策文書を約100件発出した。2025年の国連気候サミットでは、習近平国家主席が2035年までに中国を「気候適応型社会」にすると約束した。今年採択された中国の第15次五カ年計画も同様に、より強固な国家気候適応枠組み、脆弱なセクターと地域におけるリスク評価の改善、そして極端な気象への対応能力の強化を求めている。\n\n北京は誓約を重大な投資で裏打ちしている。たとえば都市部の洪水リスクを低減するために、中国は2015年以降、90の「スポンジシティ」パイロットプロジェクトとデモンストレーションを実施しており、透水性舗装、湿地、雨庭、グリーンルーフ、排水システムの改良を活用して降雨をより効果的に吸収している。2021年から2025年の間に、この取り組みは約85億ドルの中央政府資金を受け、総投資額は約230億ドルに上る。これは2025年のロサンゼルス山火事後の保険支払い総額とほぼ同額だ。中国はまた、エネルギーの供給・需要・貯蔵をより適切に調整する強靭な電力網、嵐・洪水・海面上昇に対する自然の緩衝材として機能する沿岸湿地、熱暴露を軽減する「クールシティ」設計、熱・干ばつ・降雨パターンの変化に適応した農業慣行など、追加的な解決策を探る67のパイロットプロジェクトも立ち上げた。防災・緊急管理への同国の投資は、2019年から2023年の間に年平均約9%の割合で増加した。\n\n気候関連災害の被害は軽減できる。\n\n中国の支出の多くは、インフラを極端な気象に耐えられるよう準備することに向けられている。中国の主要電力網会社である国家電網公司（ステート・グリッド）は、今後5年間に約5700億ドルを投資し、電力供給の変動をより適切に管理できるよう国家送電網を改良し、マイクログリッドを通じた地域バックアップ電力を拡充する計画だ。", "vocab": [{"word": "managed retreat", "definition": "気候変動や自然災害のリスクが高い地域から、人々やインフラを計画的に移動・撤退させる政策手法。都市・環境政策の分野で使われる専門用語。"}, {"word": "subnational", "definition": "国家レベル以下の、州・省・地方自治体などの行政単位を指す形容詞。国際政治や地理学の文脈でよく用いられる。"}, {"word": "constrict", "definition": "（市場や活動などを）縮小させる・制限するという意味の動詞。物理的に絞り込む意味から派生した比喩的用法。"}, {"word": "resilience", "definition": "困難や障害、災害などに対して回復・適応する能力を指す名詞。インフラや生態系、経済システムの文脈で広く使われる。"}, {"word": "permeable", "definition": "液体や気体が通過できる性質を表す形容詞。ここでは雨水を地面に浸透させる舗装材を指す土木・環境工学の専門用語。"}, {"word": "frontier technologies", "definition": "最先端・最前線の技術を指す表現。AIや量子コンピューティングなど、まだ開発途上にある革新的技術分野を指すことが多い。"}, {"word": "upend", "definition": "何かをひっくり返す・根底から覆すという意味の動詞。既存の秩序や状況を劇的に変えるという文脈で比喩的に使われる。"}]}, {"title_ja": "欧州は独自の道を歩む：新たな戦略的自律性の台頭", "title_en": "Europe Goes Its Own Way: A New Strategic Autonomy Emerges", "summary_ja": "筆者は、トランプ政権が欧州を軽視しているにもかかわらず、欧州大陸は深刻な戦略的変革を遂げつつあると主張する。ロシアへの脅威認識と米国への不信感を背景に、欧州各国は防衛費を大幅に増加させ、徴兵制の再導入を検討し、独自のグランドストラテジーを構築しつつある。この変化は、より自立した欧州がワシントンの優先事項に自動的に従う時代の終わりを意味する。", "summary_en": "The author argues that despite the Trump administration's dismissive attitude toward Europe, the continent is undergoing a profound strategic transformation. Driven by fear of Russia and disillusionment with U.S. reliability, Europeans are now investing heavily in defense, reconsidering conscription, and forging an independent grand strategy. This shift means a more self-sufficient Europe will no longer automatically align with Washington's priorities.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/europe/europe-goes-its-own-way", "state_media": false, "category": "オピニオン", "full_text": "Europeans have been humiliated, disparaged, and sidelined since U.S. President Donald Trump returned to office in 2025. Indeed, it is no exaggeration to say that Europe has become the president’s favorite punching bag. The continent is, his administration believes, militarily emaciated, economically irrelevant, politically unfit, and culturally doomed to civilizational erasure. Trump’s attempt to coerce Denmark into relinquishing Greenland in 2025 was symbolic of the administration’s dismissive attitude.\nSo set is Washington in its beliefs about Europe, however, that it has overlooked the profound changes that are taking place. For the first time in decades, Europeans recognize the dangers that surround them. They are, accordingly, willing to invest in military resources and serve in their countries’ armed forces. From these shifts a new grand strategy is slowly being forged, which signals a new European geopolitical and strategic trajectory. Europe has come to recognize that its old paradigm—wealth without military strength, influence without sacrifice, and protection without obligation—is no longer sustainable. To dismiss Europe as permanently irrelevant is to ignore the scale and depth of the changes that are now underway. For decades, European countries reflexively aligned themselves with Washington’s priorities. They were even willing to send their soldiers to fight in U.S.-led wars that many of their publics—and at times their governments—regarded as misguided, peripheral, or strategically costly. A Europe that invests seriously in its own defense will no longer do that—and Washington had better get ready.\nEUROPE AWAKENS\nAfter decades of complacency, Europeans have awakened to the reality that they live in a dangerous world. According to polling conducted for the European Commission, 77 percent of Europeans think that Russia’s war in Ukraine represents a direct threat to Europe’s survival. Concern is strongest in eastern and northern Europe, but 59 percent of respondents in Germany, 50 percent in France, and 49 percent in the United Kingdom also consider Russia the greatest threat to their country’s national security. These are Europe’s largest and most powerful states. The Russian threat is thus no longer a concern confined to Europe’s periphery. It has moved to the heart of the continent.\nThis sense of insecurity is increased by the fact that many Europeans now realize that they can no longer rely on the United States. According to a YouGov poll commissioned by the European Council on Foreign Relations in May, only 11 percent of Europeans across the 15 surveyed countries (Austria, Bulgaria, Denmark, Estonia, France, Germany, Hungary, Italy, the Netherlands, Poland, Portugal, Spain, Sweden, Switzerland, and the United Kingdom) viewed the United States as an ally—down sharply from 16 percent six months earlier and 22 percent in November 2024. While confidence in the United States has been steadily declining in most surveyed countries, it is a more recent development in Hungary and Poland. Majorities in every country surveyed expressed doubt that the United States would come to their defense in the event of an attack, while 25 percent of respondents now see the United States as either a rival or an adversary.\nGiven the Russian threat and U.S. unreliability, many Europeans now support military buildups. Majorities in Denmark, Estonia, France, Germany, Poland, Portugal, and the United Kingdom favor increasing national defense expenditures. Italy is the only country where a clear majority remains opposed. Remarkably, across the 15 countries surveyed, 47 percent of respondents now support collective EU borrowing to finance defense initiatives, with 59 percent in favor in Portugal, 56 percent in Denmark, and 55 percent in the Netherlands. Until very recently, this idea was politically unthinkable. Equally striking, majorities now also favor cutting Europe’s dependence on U.S. military hardware and turning instead to European alternatives. Support for buying European is especially pronounced in Denmark, the Netherlands, and Sweden.\nFinally, majorities in France, Germany, and Poland now support reinstating mandatory military service, which is already in place in countries such as Denmark, Estonia, and Switzerland. Poland and Germany ended compulsory conscription in 2010 and 2011, respectively, whereas France phased out mandatory military service in the late 1990s. Over the past 30 years, support for conscription in many European countries had become a minority position. Today, it is becoming increasingly mainstream.\nGOING IT ALONE\nEuropean defense spending is going through the roof. In 2024, the 27 EU member states spent approximately $402 billion on defense, far surpassing Russia’s military outlays of $160 billion. Germany has taken a leading role, and Berlin now accounts for roughly a quarter of total EU defense spending, making it the world’s fourth-largest military spender. It is on track to spend $172 bi", "translation_ja": "欧州は、2025年に米国のドナルド・トランプ大統領が政権に復帰して以来、屈辱を与えられ、軽蔑され、蚊帳の外に置かれてきた。実際、欧州が大統領のお気に入りのサンドバッグになっていると言っても過言ではない。同政権は、欧州大陸が軍事的に衰弱し、経済的に無意味で、政治的に機能不全に陥り、文明の消滅という文化的な運命を辿っていると信じている。2025年にトランプ政権がデンマークにグリーンランドを引き渡すよう強制しようとした試みは、同政権の欧州に対する軽蔑的な態度を象徴するものだった。\n\nしかしワシントンは、その信念にあまりにも固執するあまり、欧州で起きている深刻な変化を見落としている。欧州人は数十年ぶりに、自分たちを取り巻く危機を認識するようになった。それに応じて、軍事資源への投資や自国の軍隊への従軍を厭わない姿勢が生まれている。こうした変化から、新たなグランドストラテジーが徐々に形成されており、欧州の地政学的・戦略的な軌道が新たな方向へと向かっていることを示している。欧州は、軍事力なき繁栄、犠牲なき影響力、義務なき保護というかつてのパラダイムが、もはや持続不可能であることを認識するに至った。欧州を永遠に無意味な存在として切り捨てることは、現在進行中の変化の規模と深さを無視することに他ならない。数十年にわたり、欧州各国はワシントンの優先事項に反射的に従ってきた。多くの国民が、時には政府でさえも、誤った方向性で周辺的かつ戦略的に高くつくと見なした米国主導の戦争に兵士を送り込むことさえいとわなかった。自国の防衛に真剣に投資する欧州は、もはやそのようなことはしないだろう——ワシントンはその覚悟をしておいた方がいい。\n\n欧州の目覚め\n\n数十年にわたる慢心の後、欧州人は自分たちが危険な世界に生きているという現実に目覚めた。欧州委員会のために実施された世論調査によると、欧州人の77パーセントが、ロシアのウクライナ戦争は欧州の存続に対する直接的な脅威であると考えている。懸念は東欧・北欧で最も強いが、ドイツでは59パーセント、フランスでは50パーセント、英国では49パーセントの回答者が、ロシアを自国の安全保障に対する最大の脅威と見なしている。これらは欧州で最も大きく、最も強力な国々だ。ロシアの脅威はもはや欧州周辺部だけの懸念ではなく、大陸の中心部へと移動してきているのだ。\n\nこうした不安感は、多くの欧州人が米国にもはや頼れないと気づいていることでさらに増している。欧州外交問題評議会の委託を受けてYouGovが5月に実施した世論調査によると、調査対象の15カ国（オーストリア、ブルガリア、デンマーク、エストニア、フランス、ドイツ、ハンガリー、イタリア、オランダ、ポーランド、ポルトガル、スペイン、スウェーデン、スイス、英国）全体で、米国を同盟国と見る欧州人はわずか11パーセントにとどまり、6カ月前の16パーセント、2024年11月の22パーセントから急落した。米国への信頼は調査対象のほとんどの国で着実に低下しているが、ハンガリーとポーランドではより最近の動向だ。調査対象国すべてで、過半数の回答者が、攻撃を受けた場合に米国が防衛に来るとは思わないと答えた一方、25パーセントが米国をライバルまたは敵対国と見なすようになっている。\n\nロシアの脅威と米国の信頼性の低下を受けて、多くの欧州人が軍事力増強を支持するようになった。デンマーク、エストニア、フランス、ドイツ、ポーランド、ポルトガル、英国では、国防費の増額を支持する人が過半数を占めている。明確な過半数が依然として反対しているのはイタリアだけだ。注目すべきは、調査対象の15カ国全体で、47パーセントの回答者が防衛構想の資金調達のためのEUの共同借入を支持しており、ポルトガルで59パーセント、デンマークで56パーセント、オランダで55パーセントが賛成していることだ。ごく最近まで、このアイデアは政治的にあり得ないと思われていた。同様に注目すべき点として、今や過半数が欧州の米国製軍事装備への依存を断ち切り、欧州製の代替品に転換することを支持している。欧州製品購入への支持は、デンマーク、オランダ、スウェーデンで特に顕著だ。\n\n最後に、フランス、ドイツ、ポーランドでは、義務的兵役の復活を支持する人が過半数を占めるようになった。デンマーク、エストニア、スイスのような国々ではすでに導入されている。ポーランドとドイツはそれぞれ2010年と2011年に徴兵制を廃止し、フランスは1990年代後半に義務的兵役を段階的に廃止した。過去30年間、多くの欧州諸国で徴兵制への支持は少数派の立場だったが、今日ではますます主流になりつつある。\n\n単独行動へ\n\n欧州の防衛費は急増している。2024年、EU加盟27カ国は防衛費に約4020億ドルを費やし、ロシアの軍事支出1600億ドルをはるかに上回った。ドイツが主導的な役割を果たしており、ベルリンはEU全体の防衛費の約4分の1を占め、世界第4位の軍事支出国となっている。同国は1720億ドルを支出する軌道に乗っており——", "vocab": [{"word": "emaciated", "definition": "極度に衰弱した、やせ細った状態を意味する形容詞。ここでは軍事力が著しく弱体化した欧州の状態を比喩的に表現している。"}, {"word": "coerce", "definition": "強制する、脅迫して従わせるという意味の動詞。権力や圧力を用いて相手に特定の行動を強いる際に用いられる。"}, {"word": "complacency", "definition": "現状に満足して危機感を持たない慢心・油断を意味する名詞。長期的な安定が危機意識の欠如につながる文脈で使われることが多い。"}, {"word": "conscription", "definition": "国家が国民を強制的に軍隊に徴集する徴兵制を指す名詞。mandatory military serviceと同義で、安全保障政策の文脈で頻出する専門用語。"}, {"word": "paradigm", "definition": "特定の分野や時代における支配的な考え方・枠組み・モデルを意味する名詞。ここでは欧州の安全保障における従来の戦略的前提を指している。"}, {"word": "geopolitical", "definition": "地理的条件と政治・国際関係の関係を扱う地政学的という形容詞。国際関係や外交・安全保障の文脈で広く用いられる上級語彙。"}, {"word": "disparaged", "definition": "軽蔑する、見下すという意味のdisparagéの過去形・過去分詞。人や集団の価値・重要性を否定的に評価する際に使われるフォーマルな表現。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-07-01 12:37 JST";
renderTabs();renderList();
</script>
