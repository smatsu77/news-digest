FvS2gybVlDcWFqNzlJUk16QnFtUnVEMkFpY1hMcFJlNW42V2JHSGZ0Q1FpNWFycnR0YW9Xdy1lVVQ2Vm53V1liVDd2ZlRpWkdIMjQ4OW1LOWxfLWdmcUc1ck5VZlViSmdydGxtdllHUGpvckllVDZSLXpQcjlveVZNeEVQQTBiMzVVeW0wVjlLeGRCTjczd3B5NFQ2TUpMbGtBZHNHcUdNOXNtSG1uVFNLWHc?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ介入でFIFAが米国ストライカー・バログンのベルギー戦出場を承認", "title_en": "FIFA Clears US Striker Balogun to Play Against Belgium After Trump Intervention", "summary_ja": "FIFAは、ドナルド・トランプ大統領の介入を経て、米国代表ストライカーのフォラリン・バログンのワールドカップ・ベルギー戦出場を承認した。この決定は資格をめぐる論争を巻き起こし、大きな物議を醸している。バログンは重要な一戦で米国代表としてプレーすることが可能となった。", "summary_en": "FIFA has cleared United States striker Folarin Balogun to face Belgium at the World Cup following a controversial intervention by President Donald Trump. The decision has sparked a storm of controversy surrounding the eligibility dispute. The ruling allows Balogun to represent the US national team in the high-stakes match.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiwgFBVV95cUxPSDZpdVMzaWc5LVM4cEp5V0dFWlZCeUlhMEFLUDJxaE1rTmFkdGM1TVNUdDNsSXBPVlUwNDdqM3VMLXY2RDR2aUdIcG9DNlpBRm03LXc2WGdZemtqRWVPSDhUWGNEZ0F6Z2NLYzF2UEphU1I2SUtKaWIwT2lGMEY2V1N4czExb3VBVWxObThYQktFMU0xeWxvaWp3Vm5MSmU2Yk42czk4Z0k1MXVVSGpYNnJ5cWdJRUg0T1BhYnBjZGJaUQ?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "迎撃ミサイル不足をウクライナが警告、キーウ地域で21人死亡", "title_en": "Ukraine warns of interceptor missile shortage as 21 killed in Kyiv region", "summary_ja": "ウクライナ空軍は、迎撃ミサイルの「深刻な不足」により、ロシアがキーウに発射した23発の弾道ミサイルを1発も撃墜できなかったと発表した。この大規模攻撃で首都および周辺地域で少なくとも21人が死亡した。ゼレンスキー大統領はアンカラで開かれるNATO首脳会議を前に、同盟国に防空システムの緊急支援を求めた。", "summary_en": "Ukraine's Air Force confirmed a 'serious shortage' of interceptor missiles left all 23 Russian ballistic missiles undefended during a massive overnight attack on Kyiv, killing at least 21 people across the capital and surrounding region. President Zelensky appealed to NATO allies ahead of the Ankara summit for urgent air defense support, warning that Russia will keep targeting residential buildings as long as Patriot missiles remain in allied stockpiles. The attack involved 68 missiles and 351 drones, causing widespread destruction including the partial collapse of three apartment blocks.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cewqqnd7zdwo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Ukraine warns of interceptor missile shortage as 21 killed in Kyiv region\n- Published\nThe Ukrainian Air Force says a \"serious shortage\" of interceptor missiles meant none of the 23 ballistic missiles fired by Russia at Kyiv on Sunday night were shot down.\nAt least 15 people were killed in the second large-scale Russian attack on the Ukrainian capital in a week, officials said. Six more were killed in the wider Kyiv region.\nUkrainian President Volodymyr Zelensky has appealed for allies to take \"strong decisions\" at this week's Nato summit to provide Kyiv with air defences.\nAfter the strikes, he said the Ukrainian military had been successful in intercepting cruise missiles and drones – but not ballistic missiles.\nSunday's \"massive Russian attack\" consisted of 68 missiles and 351 strike drones, he said in a post on X. The air force shot down or suppressed 37 missiles and 326 drones, it said.\nZelensky warned that Moscow would continue to hit residential buildings as long as defensive Patriot missiles \"remain in our allies' stockpiles\".\nIt was another frightening night for people in the capital, with loud explosions and the boom of Ukraine's air defences in action.\nWidespread destruction was visible on Monday morning. Three large blocks of flats in the city have partially collapsed, some were hit directly by missiles.\nHelicopters have been shuttling back and forth in the sky, carrying water from the river to douse fires in the city.\nUkraine's State Emergency Service said 56 people were injured in the capital, including seven children, with Zelensky saying there were 16 injuries in the wider region.\nAt the site of one missile strike, in the Podilskyi district of Kyiv, rescue teams have been working in the ruins of an apartment block with a big hole blown through its middle.\nSpecialists have been using sniffer dogs to try to find the missing among the wreckage as cranes lift giant slabs of concrete from collapsed flats, sending bricks crashing to the ground.\nA woman, crying on a bench, was too distraught to talk but a team helping her said two of her relatives were buried in the rubble.\nThe BBC spoke to residents who have lost everything, as they queued to register their loss with the police.\nOne woman, whose flat was on the eighth floor that has now vanished, began to speak only to have to turn away as she sobbed. People here are already drained by four punishing years of this war, and now the aerial attacks are getting worse.\n\"After the first blast, nearby, the glass shattered and hit us, almost on our heads. Then everything was shaking,\" another woman, Olena, said.\nShe admitted she did not go to the bomb shelter when the sirens wailed because she was exhausted and wanted to sleep before work.\n\"I feel like I have calmed down, but I am still trembling all over.\"\nOlena had a question of her own about the fact that Ukraine did not manage to stop a single ballistic missile this time.\n\"The missiles hit our houses, and that's terrible. Really scary. It seems we have nothing to intercept them with. So where are our partners? What's happening? That's my question,\" she said.\nHours before the latest strikes, Zelensky had warned that Moscow was preparing a second \"massive strike\" on Kyiv following its attacks on Thursday that killed 30 people.\nUkraine accused Moscow of deliberately attacking civilian areas in that attack. Russia said it had targeted military and energy bases in retaliation for recent Ukrainian strikes on power stations and energy facilities in Russian territory.\nKyiv has kept up its drone attacks on critical Russian energy facilities, with power being cut off temporarily in the city of Sevastopol in Russian-occupied Crimea.\nRussia's Ministry of Defence said Kyiv had launched 625 long-range strike drones and that its forces had shot down 613 of them.\n- Putin makes rare admission of fuel shortages caused by Ukrainian strikes - Published6 days ago\n \n- Why Ukrainian strikes on annexed Crimea are a blow to Putin - Published8 hours ago\n \nSeveral reports suggest Zelensky will meet US President Donald Trump on the sidelines of the Nato summit, which begins in Ankara in Turkey on Tuesday.\nIn his post on X on Monday, Zelensky said it was \"critically important\" that the US and Ukraine's European partners come to the summit \"with strong decisions in support of our air defense, and thus the protection of ordinary people's lives\".\n\"The United States and Europe have enough power to stop this terror,\" he said.\nPresident of the EU Commission Ursula von der Leyen said Ukraine's \"urgent\" need for more air defence would be discussed at the summit.\nRussia launched its full-scale invasion of Ukraine in February 2022, and currently controls approximately one-fifth of Ukrainian territory.\nRelated topics\n- Published3 days ago\n \n- Published2 days ago\n \n- Published4 days ago", "translation_ja": "ウクライナ、迎撃ミサイル不足を警告――キーウ地域で21人死亡\n\nウクライナ空軍は、迎撃ミサイルの「深刻な不足」により、日曜夜にロシアがキーウに向けて発射した23発の弾道ミサイルを1発も撃墜できなかったと発表した。\n\n当局によると、1週間のうちロシアがウクライナの首都に対して行った2度目の大規模攻撃で、少なくとも15人が死亡した。キーウ州全体ではさらに6人が死亡した。\n\nウクライナのウォロディミル・ゼレンスキー大統領は、今週開催されるNATO首脳会議において、キーウへの防空システム供与に向けた「強い決断」を同盟国に下すよう訴えた。\n\n攻撃を受けてゼレンスキー大統領は、ウクライナ軍が巡航ミサイルとドローンの迎撃には成功したが、弾道ミサイルの迎撃には失敗したと述べた。\n\n同大統領はX（旧ツイッター）への投稿で、日曜の「大規模なロシアの攻撃」はミサイル68発とドローン351機で構成されていたと説明した。空軍はミサイル37発とドローン326機を撃墜または無力化したと発表した。\n\nゼレンスキー大統領は、防衛用パトリオットミサイルが「同盟国の備蓄の中に留まり続ける限り」、モスクワは住宅地への攻撃を続けるだろうと警告した。\n\n首都では大きな爆発音とウクライナ防空システムの作動音が響き渡り、市民にとってまた恐怖の夜となった。\n\n月曜日の朝には広範囲にわたる破壊の痕跡が確認された。市内の3棟の大型集合住宅が一部崩壊し、ミサイルが直撃したものもあった。\n\nヘリコプターが空を往復し、川から水を汲んで市内の火災を消火した。\n\nウクライナ国家緊急事態局によると、首都では56人が負傷し、うち7人は子どもだった。ゼレンスキー大統領は、周辺地域でも16人が負傷したと述べた。\n\nキーウのポジルスキー地区にあるミサイル着弾現場では、中央部に大きな穴が開いたアパートの廃墟で救助隊が作業を続けた。\n\n専門家が捜索犬を使って瓦礫の中から行方不明者を探す中、クレーンが巨大なコンクリートの板を持ち上げ、レンガが地面に崩れ落ちた。\n\nベンチで泣き崩れていた女性は、あまりの悲しみに言葉を発することができなかったが、支援チームによると、2人の親族が瓦礫の下に埋まっているという。\n\nBBCは、すべてを失った住民たちが警察に被害を届け出るための列に並ぶ中、取材を行った。\n\n8階にあった自分の部屋が今や消え去ってしまったという女性は話し始めたものの、すすり泣きながら顔を背けなければならなかった。ここに住む人々は4年間にわたる過酷な戦争にすでに疲弊しており、今や空からの攻撃はさらに激しさを増している。\n\n「最初の爆発の後、近くのガラスが割れて飛んできて、もう少しで頭に当たるところだった。それからすべてが揺れていた」と、オレナさんという別の女性は語った。\n\n彼女は、仕事前に眠りたくて疲れていたため、サイレンが鳴っても防空壕に行かなかったと認めた。\n\n「落ち着いたような気がするけれど、体がまだ震えている。」\n\nオレナさんは、今回ウクライナが弾道ミサイルを1発も阻止できなかったことについて、自らも問いかけた。\n\n「ミサイルが私たちの家に直撃した。それはひどいこと。本当に怖い。迎撃するものが何もないみたい。では、パートナーたちはどこにいるの？何が起きているの？それが私の問いです」と彼女は言った。\n\n最新の攻撃が始まる数時間前、ゼレンスキー大統領はモスクワがキーウへの2度目の「大規模攻撃」を準備していると警告していた。それ以前の木曜日の攻撃では30人が死亡していた。\n\nウクライナはモスクワが意図的に民間地域を攻撃したと非難した。ロシアはウクライナによるロシア領内の発電所やエネルギー施設への攻撃に対する報復として、軍事・エネルギー拠点を標的にしたと主張した。\n\nキーウはロシアの重要エネルギー施設へのドローン攻撃を継続しており、ロシアが占領するクリミアのセバストポリ市では一時的に電力が遮断された。\n\nロシア国防省は、キーウが長距離攻撃ドローン625機を発射し、ロシア軍がそのうち613機を撃墜したと発表した。\n\n複数の報道によると、ゼレンスキー大統領は火曜日にトルコのアンカラで始まるNATO首脳会議の傍らで、米国のドナルド・トランプ大統領と会談する見通しだという。\n\nゼレンスキー大統領は月曜日のX投稿で、米国とヨーロッパのパートナーが首脳会議に「防空支援に向けた強い決断を持って」臨むことが「極めて重要だ」と述べた。\n\n「米国とヨーロッパは、このテロを止める十分な力を持っている」と彼は語った。\n\nEU委員会のウルズラ・フォン・デア・ライエン委員長は、ウクライナの「緊急」の防空強化ニーズについて首脳会議で議論すると述べた。\n\nロシアは2022年2月にウクライナへの全面侵攻を開始し、現在ウクライナ領土の約5分の1を支配している。", "vocab": [{"word": "interceptor", "definition": "迎撃するための兵器や航空機を指す軍事用語。「interceptor missile（迎撃ミサイル）」のように、敵の飛来物を途中で捕捉・破壊するために使用される。"}, {"word": "ballistic missile", "definition": "弾道ミサイルのこと。発射後に放物線を描く弾道を飛行し、高速で目標に到達するミサイルで、巡航ミサイルよりも迎撃が困難とされる。"}, {"word": "stockpile", "definition": "物資や武器などを大量に蓄積・備蓄したものを指す名詞。「remain in allies' stockpiles（同盟国の備蓄の中に残る）」のように使われ、軍事・経済文脈でよく用いられる。"}, {"word": "suppressed", "definition": "軍事文脈では、敵の兵器や攻撃を「無力化・制圧した」ことを意味する。完全に破壊しなくても機能を妨害した場合にも使われる。"}, {"word": "distraught", "definition": "深い悲しみや苦しみで取り乱した状態を表す形容詞。「too distraught to talk（あまりに取り乱して話せない）」のように、感情的に極度に動揺した様子を示す。"}, {"word": "full-scale invasion", "definition": "「全面侵攻」を意味する表現。部分的な軍事行動と区別し、国家の総力を挙げた大規模な侵略行為を指す国際政治・安全保障上の重要な用語。"}, {"word": "sidelines", "definition": "外交・国際会議の文脈で「傍ら・周辺」を意味し、「on the sidelines of the summit（首脳会議の傍らで）」のように、公式日程外で行われる非公式会談を指す慣用表現。"}]}, {"title_ja": "テヘランに大群衆、ハメネイ師の葬列が行われる", "title_en": "Massive Crowds Gather in Tehran for Khamenei's Funeral Procession", "summary_ja": "イランの最高指導者アリー・ハメネイー師の葬列が行われ、テヘランの街頭に数万人以上の市民が集まった。ハメネイー師は2月28日のイスラエルによる空爆で死亡した。米国とイスラエルへの報復を求める声が高まる中、葬儀は木曜日のマシュハドでの埋葬まで続けられる予定だ。", "summary_en": "Enormous crowds filled the streets of Tehran for the funeral procession of Iran's Supreme Leader Ayatollah Ali Khamenei, who was killed in an Israeli airstrike on February 28. The procession passed through central Tehran amid calls for vengeance against the US and Israel, whose leaders ordered the joint attack that triggered the war. Funeral ceremonies will continue through Thursday, when Khamenei will be buried in Mashhad.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cdejj44kl70o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Huge crowds fill Tehran streets for Khamenei's funeral procession\n- Published\nHuge crowds have lined the streets of Tehran for the funeral procession of Iran's late supreme leader, Ayatollah Ali Khamenei, who was killed on the first day of the war with the US and Israel.\nFootage from Iranian state TV showed many tens of thousands of mourners gathered to watch Khamenei's flag-draped coffin being transported by a lorry along a 10km (6-mile) route that passed through the capital's landmark Enghelab Square.\nThe procession took place after his body lay in state for two days at Tehran's Grand Mosalla mosque.\nThree of Khamenei's sons prayed beside his coffin there on Sunday. But Mojtaba, the son who succeeded him as supreme leader, did not make an appearance.\nHe has not been seen in public since reporting being seriously wounded in the same Israeli air strike in Tehran on 28 February that killed his father and his wife.\n- Iran's supreme leader absent as senior officials attend ayatollah's funeral - Published20 hours ago\n \n- How Iran's new regime is very different to what came before - Published1 day ago\n \nKhamenei's funeral procession wended its way slowly through central Tehran, from Imam Hossein Square in the east to Azadi Square in the west, on the last of three days of public mourning in the capital.\nState media reported that millions of mourners filled the main boulevards connecting the squares and crowding around the black lorry that carried the coffin of the late supreme leader and four family members.\nMany people were waving Iranian flags and red banners symbolising vengeance.\nThere were also placards saying \"We must rise\" and others calling for the death of US President Donald Trump, who along with Israel's Prime Minister Benjamin Netanyahu ordered a joint attack on Iran four months ago that triggered a war in which thousands were killed.\nMourners were also seen throwing stones at a billboard displaying Trump's face that was hung from a bridge. \"The US killed our father. We won't let you go!\" it read.\nFormer president Mahmoud Ahmadinejad was seen at the procession, local media reported. It appeared to be his first major public appearance since the start of the war, when three of his bodyguards were reportedly killed in a strike near his home.\nIran's current president, Masoud Pezeshkian, was also filmed walking among a group of mourners on a Tehran street.\nEarlier, he wrote on X that Khamenei had taught everyone in Iran that the country's \"greatest asset\" was \"its people and their unity\". He promised that Iranians would \"continue the path of Iran's honour, progress, and glory\".\nIsraeli Defence Minister Israel Katz said Khamenei was \"eliminated by Israel\" because he had threatened its existence. \"Any Iranian leader who will again try to pursue plans to destroy Israel will be killed as well,\" he added.\nThe funeral ceremonies are taking place less than three weeks after Iran and the US signed a preliminary agreement to end the war and reopen the crucial Strait of Hormuz waterway, through which 20% of global oil and gas shipments pass.\nThe two countries also gave themselves two months to reach a final deal that covers Iran's nuclear programme, US sanctions and a permanent truce.\nMediator Qatar said Iranian and US negotiators made \"positive progress\" at indirect talks in Doha last week following a four-day exchange of strikes and that their next meeting would be scheduled after the conclusion of the events for Khamenei.\nOn Tuesday, there will be a funeral procession and prayers in the central city of Qom, the centre of Iran's Shia Muslim clerical establishment.\nThe ceremonies will then move to the Iraqi shrine cities of Karbala and Najaf on Wednesday.\nThey will end on Thursday, when Khamenei will be buried at the Imam Reza shrine in his home city of Mashhad, in north-eastern Iran.", "translation_ja": "イランの故最高指導者、アヤトラ・アリー・ハメネイーの葬列が行われ、テヘランの街頭に大勢の群衆が集まった。ハメネイー師は米国とイスラエルとの戦争初日に死亡した。\n\nイランの国営テレビの映像には、数万人にのぼる弔問者が、イランの旗で覆われたハメネイー師の棺を乗せたトラックが首都の名所エンゲラーブ広場を通過する約10キロのルートを見届けようと集まった様子が映し出された。\n\n葬列は、ハメネイー師の遺体がテヘランのグランド・モサッラーモスクで2日間安置された後に行われた。\n\nハメネイー師の息子3人が日曜日にモスクで棺のそばで祈りを捧げた。しかし、後継の最高指導者となった息子のモジュタバーは姿を見せなかった。彼は、2月28日にテヘランで行われたイスラエルの空爆で父親と妻が死亡した同じ爆撃で重傷を負ったと報道されて以来、公の場に姿を現していない。\n\nハメネイー師の葬列は、首都での3日間の公式追悼の最終日に、東部のイマーム・ホセイン広場から西部のアザーディー広場まで、テヘラン中心部をゆっくりと進んだ。\n\n国営メディアは、故最高指導者と4人の家族の棺を乗せた黒いトラックの周囲や、広場を結ぶ主要大通りに数百万人の弔問者が集まったと伝えた。\n\n多くの人々がイランの国旗や、復讐を象徴する赤い旗を振っていた。また、「立ち上がれ」と書かれたプラカードや、4か月前にイランへの共同攻撃を命じ、数千人が死亡する戦争を引き起こした米国のドナルド・トランプ大統領とイスラエルのベンヤミン・ネタニヤフ首相の死を求めるプラカードも見られた。\n\n弔問者たちは橋に掲げられたトランプ大統領の顔が写ったビルボードに向かって石を投げる様子も見られた。「米国が我々の父を殺した。許さない！」と書かれていた。\n\n地元メディアによると、マフムード・アフマディーネジャード元大統領も葬列に姿を見せた。これは、彼の護衛3人が自宅近くの空爆で死亡したと伝えられた戦争開始以来、初めての主要な公の場への登場とみられる。\n\n現職大統領のマスウード・ペゼシュキアンも、テヘランの路上で弔問者の集団の中を歩く様子が撮影された。\n\n彼は以前、X（旧ツイッター）に、ハメネイー師はイラン国民全員に、同国の「最大の財産」は「国民とその団結」であると教えてくれたと投稿した。また、イラン国民は「イランの名誉、発展、そして栄光の道を歩み続ける」と約束した。\n\nイスラエルのイスラエル・カッツ国防相は、ハメネイー師がイスラエルの存在を脅かしたため「イスラエルに排除された」と述べた。「イランの指導者が再びイスラエル破壊の計画を追求しようとすれば、同様に殺されるだろう」と付け加えた。\n\n葬儀の式典は、イランと米国が戦争を終結させ、世界の石油・ガス輸送量の20%が通過するホルムズ海峡を再開するための暫定合意に署名してから3週間も経たないうちに行われている。\n\n両国はまた、イランの核プログラム、米国の制裁、永続的な停戦を含む最終合意に向けて2か月の期限を設けた。\n\n仲介国のカタールは、4日間の交互攻撃の後、先週ドーハで行われた間接協議でイランと米国の交渉担当者が「前向きな進展」を遂げ、次回の会合はハメネイー師の諸行事が終了した後に予定されると述べた。\n\n火曜日には、イランのシーア派イスラム聖職者制度の中心地である中部の都市コムで葬列と祈りが行われる。\n\n式典はその後、水曜日にイラクの聖地カルバラーとナジャフへと移る。\n\n木曜日、ハメネイー師は故郷である北東部のマシュハドにあるイマーム・レザー廟に埋葬され、式典は幕を閉じる。", "vocab": [{"word": "procession", "definition": "行列、行進のこと。特に儀式や葬儀などの際に人々や乗り物が整然と進む様子を指す。"}, {"word": "lay in state", "definition": "遺体を公衆の弔問のために安置すること。国家的または宗教的に重要な人物の葬儀の際に用いられる慣用表現。"}, {"word": "vengeance", "definition": "復讐、報復のこと。不正や損害に対して仕返しをしようとする強い意志を指し、しばしば感情的・政治的文脈で使われる。"}, {"word": "preliminary", "definition": "予備的な、暫定的なという意味の形容詞。正式・最終的な合意や行動に先立つ準備段階のものを指す。"}, {"word": "mediator", "definition": "仲介者、調停者のこと。対立する二者の間に立ち、交渉や合意形成を促進する役割を担う人物または国家を指す。"}, {"word": "eliminated", "definition": "排除された、除去されたという意味。政治・軍事的文脈では、標的となった人物を殺害したことを婉曲的に表現する際に用いられる。"}, {"word": "wended", "definition": "「wend one's way」の過去形で、ゆっくりと曲がりくねりながら進むという意味。文語的・文学的な表現で、特定のルートを辿る動きを描写する。"}]}, {"title_ja": "南フランスで山火事、1万人以上が避難を強いられる", "title_en": "Wildfire in Southern France Forces Evacuation of 10,000 People", "summary_ja": "フランス南部ペルピニャン近郊で発生した大規模な山火事により、ピレネー山脈麓の十数か村から1万人以上が避難を余儀なくされ、少なくとも4,600ヘクタールが焼失した。初夏の熱波と強風が火勢を拡大させており、ツール・ド・フランス自転車レースにも影響が出ている。EUは支援のために4機の航空機を派遣し、フランス南西部やスペイン、ポルトガルでは引き続き危険な高温が続く見通しだ。", "summary_en": "A massive wildfire near Perpignan in southern France has forced over 10,000 people to evacuate more than a dozen towns in the Pyrenees foothills, burning at least 4,600 hectares. The blaze, fanned by strong winds amid an early summer heatwave, has also disrupted the Tour de France cycling race. The EU has dispatched four aircraft to assist, while temperatures are forecast to remain dangerously high across southwest France, Spain, and Portugal.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/crlwweye9glo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Wildfire in southern France forces evacuation of 10,000 people\n- Published\nA wildfire has forced the evacuation of thousands of people in southern France as the country grapples with the impacts of an early summer heatwave that scorched much of Europe.\nMore than 10,000 people have been ordered to leave more than a dozen small towns and villages in the foothills of the French Pyrenees, near the border with Spain.\nThe fire, located in Trévillach near Perpignan, has burned at least 4,600 hectares (11,366 acres), local prefect Pierre Regnault de la Mothe said in a post on X.\n\"This morning conditions are deteriorating again,\" Interior Minister Laurent Nunez cautioned on French TV station TF1. \"Today the battle resumes.\"\nAuthorities have warned that strong winds could further fan the wildfire.\n\"It came within 300 metres (984ft) of the houses. We were shocked by how fast it spread, it was staggering – bordering on panic,\" Patrice, from Trévillach, told the AFP news agency.\nTour de France spectators have been urged to stay away from the conclusion of the third stage of the cycling race on Monday to allow access for emergency vehicles to the area.\nThe third stage, which is 195.9km (121 miles) long, begins in the Spanish city of Granollers and concludes in Les Angles, located in the Pyrénées-Orientales region of France.\nTour organisers have asked fans and unessential personnel to stay away from the final 40km and said that a motorcade of team vehicles that follows will now be kept to a minimum.\n\"An exceptional fire calls for exceptional measures for the Tour,\" said race director Christian Prudhomme. \"We invite the public not to come to the edge of the race or to the finish site.\"\nEuropean Commission President Ursula von der Leyen announced that the EU would send four aircraft based in Cyprus and Sweden to help with emergency efforts.\nThe fires have also affected neighbouring Spain where more than 2,200 hectares in the natural reserve of Les Gavarres have been destroyed.\nCatalan authorities said late on Saturday that the blaze was stable and would be completely extinguished during the week, according to Reuters.\nSouth of Catalonia, in the eastern Castellon province, 500 people were evacuated after a wildfire entered the Sierra de Espadan national park.\nTemperatures could once again reach 40C in south-west France this week and have already exceeded 40C in parts of Portugal and Spain.\n\"Although this heatwave is unlikely to break records in the way June's did, it will still be exceptional for the time of year,\" said BBC Weather Lead Forecaster Matt Taylor.\n\"With the heat expected to persist into next week and little widespread rain forecast, the risk of further wildfires will remain elevated.\"\nDuring June's record-breaking heatwave, which saw temperatures of 42C in some areas, France saw its hottest day ever on average country-wide on 24 June.\nAt least 2,025 excess deaths were recorded in France, 1,222 in Belgium and about 480 in the Netherlands during the heatwave.\nClimate change is driving up temperatures around the world - but particularly in Europe. It is the fastest warming continent, heating up twice as fast as the global average, according to the Copernicus climate service.\nThis is causing increased summer heatwaves, greater pressure on Europe's water supply, and more intense wildfires.\n- Published7 hours ago", "translation_ja": "南フランスで山火事、1万人以上が避難を強いられる\n\nフランス南部で山火事が発生し、ヨーロッパの広い地域を焼き焦がした初夏の熱波の影響と格闘するなか、数千人が避難を強いられた。\n\nスペインとの国境に近いフランス・ピレネー山脈の麓に広がる十数か所の小さな町や村から、1万人以上に避難命令が出された。\n\nペルピニャン近郊のトレビヤックで発生したこの火災は、地元の県知事ピエール・レニョー・ド・ラ・モートがXへの投稿で明らかにしたところによると、少なくとも4,600ヘクタール（1万1,366エーカー）を焼いた。\n\n「今朝、再び状況が悪化しています」と内務大臣ローラン・ニュネスはフランスのテレビ局TF1で警告した。「今日、また戦いが再開します。」\n\n当局は、強風が山火事をさらに拡大させる恐れがあると警告している。\n\n「火は民家の300メートル（984フィート）以内にまで迫ってきました。その広がりの速さに衝撃を受けました。驚異的で、パニックに近い状態でした」とトレビヤック在住のパトリスはAFP通信に語った。\n\nツール・ド・フランスの観戦者たちは、緊急車両が現場に入れるよう、月曜日に行われる第3ステージのゴール付近に近づかないよう呼びかけられた。\n\n全長195.9キロメートル（121マイル）の第3ステージは、スペインの都市グラノリェルスをスタートし、フランスのピレネー＝オリアンタル県に位置するレザングルがゴールとなっている。\n\nレース主催者は、ファンおよび不要な関係者にゴール前40キロメートルへの立ち入りを控えるよう求め、後続するチーム車両の車列を最小限にすると発表した。\n\n「例外的な火災は、ツールにも例外的な対応を求めます」とレースディレクターのクリスチャン・プリュドムは述べた。「コース沿いやゴール地点への来場をお控えいただくよう、一般の方々にお願いします。」\n\n欧州委員会のウルズラ・フォン・デア・ライエン委員長は、EUがキプロスとスウェーデンに拠点を置く4機の航空機を緊急支援のために派遣すると発表した。\n\nこの火災は隣国スペインにも影響を及ぼしており、レス・ガバレス自然保護区では2,200ヘクタール以上が焼失した。\n\nカタルーニャ自治州当局はロイター通信によると、土曜日の夜遅くに火勢が安定し、今週中に完全に鎮火する見込みだと発表した。\n\nカタルーニャの南、東部カステジョン県では、山火事がシエラ・デ・エスパダン国立公園に入り込んだため、500人が避難した。\n\n今週、フランス南西部では再び気温が40度に達する可能性があり、ポルトガルとスペインの一部ではすでに40度を超えている。\n\n「今回の熱波は6月のように記録を塗り替える可能性は低いものの、それでもこの時期としては例外的なものになるでしょう」とBBCウェザーの主任気象予報士マット・テイラーは述べた。\n\n「熱波は来週まで続く見込みで、広範囲にわたる降雨の予報もほとんどないため、山火事のリスクは引き続き高い状態が続くでしょう。」\n\n一部地域で42度を記録した6月の記録的な熱波の際、フランスでは6月24日に国全体の平均気温として史上最高の日を記録した。\n\nその熱波の間、フランスでは少なくとも2,025人、ベルギーでは1,222人、オランダでは約480人の超過死亡が記録された。\n\n気候変動は世界中で気温を押し上げているが、特にヨーロッパでその影響が顕著だ。コペルニクス気候変動サービスによると、ヨーロッパは世界で最も急速に温暖化が進んでいる大陸であり、世界平均の2倍の速さで気温が上昇している。\n\nこれにより、夏の熱波の頻度増加、ヨーロッパの水供給への圧迫の増大、そしてより激しい山火事が引き起こされている。", "vocab": [{"word": "heatwave", "definition": "異常な高温が数日以上続く気象現象を指す。気候・環境報道でよく使われる専門的表現。"}, {"word": "prefect", "definition": "フランスなどの国において、中央政府が地方に派遣する行政長官（県知事）を指す。ヨーロッパの行政制度を扱う文脈で使われる。"}, {"word": "motorcade", "definition": "要人や関係者を護衛・随行する複数の自動車の隊列のこと。イベントや政治的な文脈でよく用いられる語。"}, {"word": "foothills", "definition": "大きな山脈の麓に広がる比較的低い丘陵地帯を指す地理的用語。"}, {"word": "excess deaths", "definition": "通常の死亡率と比較して、特定の期間に生じた死亡者数の超過分を指す統計・医療用語。熱波や感染症の影響を評価する際に使われる。"}, {"word": "deteriorating", "definition": "状況や条件が悪化していることを表す動詞deteriorateの進行形。医療・気象・経済など幅広い文脈で使われるフォーマルな語。"}, {"word": "dispatched", "definition": "人員や物資を特定の目的のために派遣・送り出すことを意味する動詞dispatchの過去形。軍事・緊急対応・ビジネス文書でよく使われる。"}]}, {"title_ja": "バッキンガム宮殿、ヘンリー王子の宿泊を拒否――双方の主張が真っ向から対立", "title_en": "Buckingham Palace Denies Prince Harry's Team Claim He Accepted Invitation to Stay", "summary_ja": "バッキンガム宮殿とヘンリー王子の広報チームは、王子が今週のロンドン訪問中に宮殿に宿泊する招待を受け入れたかどうかについて、互いに矛盾する声明を発表した。宮殿側は王子が期限内に確認しなかったと主張し、王子側は正式に受け入れた招待が土壇場で撤回されたと反論している。この対立は両陣営の深い不信感を露わにし、チャールズ国王との会談にも影を落とす可能性がある。", "summary_en": "Buckingham Palace and Prince Harry's team have issued contradictory statements over whether the Duke of Sussex was offered and accepted accommodation at the palace during his UK visit this week. The palace says Harry failed to confirm in time and was informed Saturday evening he could not stay, while Harry's spokesperson says an accepted offer was 'withdrawn' at the last moment. The dispute highlights deep distrust between the two camps and could complicate an expected meeting with King Charles.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c77yykl87yno?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Buckingham Palace says Prince Harry will not stay at palace\n- Published\nBuckingham Palace says Prince Harry will not be staying at the palace during his visit to London this week, despite his team announcing this morning that he had accepted an invitation to do so.\nRoyal sources said the duke had not responded in time to the offer of accommodation at a royal residence and that Prince Harry was informed on Saturday evening that he would not be able to stay at Buckingham Palace.\nIt's a chaotic start to a week in which the Duke of Sussex will support his charities in the UK.\nA spokesperson for Prince Harry said despite their earlier statement they understood that the offer to stay at the palace had been \"withdrawn\" - a decision they described as \"disappointing\".\nIn Buckingham Palace's version of events, there was an offer of accommodation for Prince Harry, but the Sussex team had failed to confirm whether it would accept and had then formally declined the invitation on Saturday.\nAccording to Buckingham Palace, the duke's team had later that same day changed their position and had accepted the offer to stay - but by then it was too late to make arrangements and to provide staffing.\nThe palace said Prince Harry was told on Saturday evening that he could not stay and that he was aware of the decision.\nThere were also concerns from the palace about the duke staying when a court result about his claims against Associated Newspapers was being published on Tuesday.\nThere were worries about the optics for the King, who has a position of neutrality, if Prince Harry delivered a controversial response to the high-profile court case while staying at the symbolic HQ of the monarchy.\nIn response, a spokesman for the Duke of Sussex described the situation differently, claiming Buckingham Palace had withdrawn an offer that had been formally accepted.\nIt appears this was only about a stay of one night - and the question was raised as to whether the Palace could not accommodate one person for one night?\nThe Sussex version of events said that the timing of the court case result was already known last week and rejected it as being a factor.\n\"It is therefore unclear why, having formally accepted the accommodation offer, it has now been withdrawn at the last moment,\" said the spokesman for the Duke of Sussex.\nThis acrimonious war of words is a row that shows how much distrust and poor communication exists between the two camps - the Sussex team and Buckingham Palace.\nBoth sides are putting out contradictory versions of the invitation to stay at the palace - with no sign of either side accepting the other's account.\nThis could make a meeting between King Charles and Prince Harry, which had been expected this week, even more complicated.\nPrince Harry is still set to carry out his engagements this week, with an expectation that he will be in the UK on Monday, ahead of his first event in London on Tuesday.\nPrince Harry's trip: How the briefings have changed so far\n27 June: Prince Harry, Meghan and their children planned to come to the UK, and expected to stay in a royal residence\n28 June: Because of security fears, Prince Harry reconsidered plans to bring his family\n29 June: Prince Harry still hoped security problems could be overcome to bring Meghan and children\n2 July: Court sources said that the result of Prince Harry's case against Associated Newspapers will be 7 July, the first day of the visit\n4 July: Meghan and children will not come to the start of the trip to the UK in London, but might come to latter part of the week.\nPrince Harry is said to have initially rejected and then accepted accommodation at Buckingham Palace. The Palace said he had been told it was too late and could not stay\n6 July: The Sussexes' team said Prince Harry had accepted an invitation to stay at Buckingham Palace. Buckingham Palace rejected this and said he had already been informed that it wasn't possible to stay\n7 July: Prince Harry's visit due to start in London\nPrince Harry is travelling to the UK to promote the Invictus Games, which will be held in Birmingham next year, and charity events.\nIt was already understood that the prince would not be accompanied by his wife Meghan and their two children, Archie and Lilibet, during the visit to London, after it was confirmed that the family would not be provided with taxpayer-funded police security.\nBut it is possible that they may join Prince Harry in Birmingham to promote the Invictus Games later in the week.\nIt is unclear whether a meeting between King Charles and his two grandchildren, aged seven and five - who he has not seen in person for four years - will take place under the revised schedule.\nDuring his visit to Birmingham, Prince Harry is expected to visit the city's children's hospital and Birmingham's National Exhibition Centre, which will be hosting the Invictus Games - held for injured military personnel.\nThere had been reports that the latter part of the trip would also include a visit to Altho", "translation_ja": "バッキンガム宮殿、ヘンリー王子が宮殿に宿泊しないと発表\n\nバッキンガム宮殿は、ヘンリー王子が今週のロンドン訪問中に宮殿に宿泊しないと発表した。これは、王子のチームが今朝、招待を受け入れたと発表したにもかかわらずのことである。\n\n王室関係者によると、サセックス公爵は王室の居住施設への宿泊の申し出に対して期限内に回答せず、土曜日の夜にバッキンガム宮殿には宿泊できないと伝えられたという。\n\nこれは、サセックス公爵が英国内で自身の慈善活動を支援する今週の幕開けとして、混乱した始まりとなった。\n\nヘンリー王子のスポークスパーソンは、先ほどの声明にもかかわらず、宮殿への宿泊の申し出が「撤回」されたと理解しており、その決定は「失望させるものだ」と述べた。\n\nバッキンガム宮殿の説明によれば、ヘンリー王子に対して宿泊の申し出はあったが、サセックスチームがそれを受け入れるかどうかの確認を怠り、その後土曜日に正式に招待を断ったという。\n\nバッキンガム宮殿によれば、公爵のチームはその同じ日の後になって立場を変え、宿泊の申し出を受け入れたが、その時点ではすでに手配やスタッフの確保をするには遅すぎたとされる。\n\n宮殿は、ヘンリー王子が土曜日の夜に宿泊できないと伝えられ、その決定を認識していたと述べた。\n\nまた、火曜日にアソシエイテッド・ニュースペーパーズに対する王子の訴訟の結果が公表される予定であることから、王子が宮殿に滞在することへの懸念も宮殿側にあった。\n\n中立の立場を維持しているチャールズ国王にとって、ヘンリー王子が君主制の象徴的な本拠地に滞在しながら注目度の高い裁判への物議を醸す反応を示した場合の印象（オプティクス）について、宮殿側は憂慮していた。\n\nこれに対し、サセックス公爵のスポークスパーソンは状況を異なる形で説明し、正式に受け入れられた申し出をバッキンガム宮殿が撤回したと主張した。\n\nこれは一泊の滞在に関することに過ぎず、宮殿が一人を一晩泊めることができないのかという疑問が呈された。\n\nサセックス側の説明によれば、裁判結果の時期は先週すでに知られており、それが撤回の要因であるとする見方を否定した。\n\n「したがって、宿泊の申し出を正式に受け入れたにもかかわらず、なぜ土壇場でそれが撤回されたのかが不明である」と、サセックス公爵のスポークスパーソンは述べた。\n\nこの険悪な言葉の応酬は、サセックスチームとバッキンガム宮殿の両陣営の間に、いかに大きな不信感とコミュニケーション不足が存在するかを示す口論である。\n\n双方は宮殿への宿泊招待について矛盾した説明を発表しており、どちらの側も相手の説明を認める気配はない。\n\nこれにより、今週予定されていたチャールズ国王とヘンリー王子の会談はさらに複雑なものになる可能性がある。\n\nヘンリー王子は今週の公務を予定通りこなす見込みで、月曜日に英国入りし、火曜日にロンドンで最初のイベントに臨むことが期待されている。\n\nヘンリー王子の訪問：これまでのブリーフィングの経緯\n\n6月27日：ヘンリー王子、メーガン妃、そして子供たちが英国を訪問する計画があり、王室の居住施設に滞在する予定だった。\n6月28日：警備上の懸念から、ヘンリー王子は家族を連れてくる計画を再考した。\n6月29日：ヘンリー王子は、メーガン妃と子供たちを連れて来られるよう警備問題が解決されることをまだ望んでいた。\n7月2日：裁判所の関係者によると、ヘンリー王子のアソシエイテッド・ニュースペーパーズに対する訴訟の結果は、訪問初日となる7月7日に出ると伝えられた。\n7月4日：メーガン妃と子供たちはロンドンでの訪問開始には同行しないが、今週後半に合流する可能性がある。\nヘンリー王子は当初、バッキンガム宮殿への宿泊を断り、その後受け入れたとされる。宮殿側は、宿泊は不可能だと伝えたと述べた。\n7月6日：サセックス側のチームは、ヘンリー王子がバッキンガム宮殿への宿泊招待を受け入れたと発表。バッキンガム宮殿はこれを否定し、すでに宿泊不可と伝えていたと述べた。\n7月7日：ヘンリー王子のロンドン訪問が開始予定。\n\nヘンリー王子は、来年バーミンガムで開催されるインビクタス・ゲームズのPRおよび慈善イベントのために英国を訪問している。\n\n王子の妻メーガン妃と二人の子供たちは、納税者が資金を提供する警察の警備が提供されないことが確認されたため、ロンドン訪問に同行しないことはすでに了解されていた。\n\nただし、今週後半にバーミンガムでインビクタス・ゲームズのPRのためにヘンリー王子に合流する可能性はある。\n\nチャールズ国王が4年間直接会っていない7歳と5歳の二人の孫との面会が、変更されたスケジュールの中で実現するかどうかは不明である。\n\nバーミンガム訪問中、ヘンリー王子は同市の小児病院と、負傷した軍人のために開催されるインビクタス・ゲームズの会場となるバーミンガム国立展示センター（NEC）を訪問する予定だ。\n\n後半の訪問には、アルソー（記事未完）への訪問も含まれるとの報道もあった。", "vocab": [{"word": "optics", "definition": "（政治・外交の文脈で）ある行動や状況が外部からどのように見えるか、その印象や見栄えのこと。「世間体」や「印象管理」に近いニュアンスで使われる比喩的表現。"}, {"word": "neutrality", "definition": "中立性、中立の立場のこと。政治的・外交的な議論において、どちらの側にも肩入れしない姿勢を指す。"}, {"word": "acrimonious", "definition": "（言葉や態度が）辛辣で険悪な様子を表す形容詞。特に長期化した対立や言い争いの場面で用いられる上級語彙。"}, {"word": "contradictory", "definition": "互いに矛盾している、相反するという意味の形容詞。二つの主張や陳述が両立しない状況を表す際に使われる。"}, {"word": "accommodate", "definition": "（人を）宿泊させる、収容するという意味の動詞。ここでは物理的な宿泊の提供を指すが、広義では「要求に応じる」という意味でも使われる。"}, {"word": "high-profile", "definition": "社会的注目度が高い、世間の耳目を集めるという意味の形容詞。著名人や重大事件に関連する文脈で頻繁に使われる複合語。"}, {"word": "staffing", "definition": "必要な人員・スタッフを手配・配置することを指す名詞。組織運営やイベント管理の文脈でよく使われる専門的表現。"}]}, {"title_ja": "ピザ・エクスプレス、アンドルー王子のウォーキング店訪問主張を内部調査していたと判明", "title_en": "Pizza Express conducted internal inquiry into Prince Andrew's Woking alibi claim", "summary_ja": "ピザ・エクスプレスは2019年、アンドルー王子が2001年3月10日にサリー州ウォーキング店を訪問したという主張を内部調査していたことが、BBCニュースナイトの取材で明らかになった。調査の結果、訪問を裏付ける証拠も否定する証拠も見つからなかった。ロンドン警視庁は、同日に王室護衛官が王子に同行していたかどうかについて「確認も否定もしない」と回答し、国家安全保障上の理由を挙げた。", "summary_en": "Pizza Express launched an internal investigation in 2019 into whether Prince Andrew visited its Woking branch on 10 March 2001, the date Virginia Giuffre alleged he sexually abused her. The inquiry found no evidence either confirming or denying his presence, and BBC Newsnight's own research also found no witness records of him being there. The Metropolitan Police refused to confirm or deny whether royal protection officers accompanied him that night, citing national security.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c1my27lyjx9o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "経済", "full_text": "Pizza Express held inquiry into Andrew's Woking claim\n- Published\nPizza Express held an internal inquiry into whether Andrew Mountbatten Windsor had visited its restaurant in Woking, BBC Newsnight has learned.\nThe former prince claimed in his infamous 2019 Newsnight interview that he had been at the branch in Surrey on the day he was alleged to have slept with Virginia Giuffre, one of late sex offender Jeffrey Epstein's victims.\nBBC Newsnight has now discovered the pizza chain investigated the claim and found no evidence that he had, or had not, been there. Our research has also found no record of anyone seeing him there on the night in 2001.\nMountbatten-Windsor did not respond to a request for comment but he has strenuously denied any wrongdoing.\nNewsnight has revisited the 2019 interview in light of the Epstein files, and Mountbatten-Windsor's arrest in February on suspicion of misconduct in public office by Thames Valley Police. He was subsequently released under investigation.\nGiuffre alleged she was forced to have sex with Mountbatten-Windsor three times, including when she was aged 17.\nOne of these was alleged to have taken place on 10 March 2001, when Giuffre said she had dined with him, danced with him at a nightclub and gone on to have sex with him at the house of Ghislaine Maxwell, a friend of the then-prince, in Belgravia, central London.\nIn his Newsnight interview, Mountbatten-Windsor said he had instead taken his daughter Princess Beatrice to a party at a Pizza Express in Woking at \"4pm or 5pm in the afternoon\" on that day before spending the night at home.\nThe vast majority of the interview was broadcast, but a small amount of material was not included because of time constraints.\nThis included Mountbatten-Windsor talking in more detail about Pizza Express, including a claim that his staff had looked at a diary to find out more information.\n\"I'd taken Beatrice to a Pizza Express in Woking,\" he said in the interview.\n\"This has all been worked out by my staff, who've looked at the diary and everything else.\n\"The duchess [Sarah Ferguson] was away, I think, United States somewhere. And we had a very simple rule: at that stage, the children had one or other of us for all, most of the, well, as often as we could manage.\n\"So if one of us was out, the other one was in. And then occasionally they would have both of us and on this particular occasion, she was away and I was at home.\"\nMountbatten-Windsor's mention of Pizza Express in the interview made headlines worldwide in 2019, with some newspapers labelling it an \"alibi\".\nPizza Express searched for records of visit\nNewsnight has now been told that in 2019, the senior management team of Pizza Express looked into the plausibility of Mountbatten-Windsor's claim because they believed it was a matter of public interest.\nBosses held an internal inquiry that involved looking for records from that time period, none of which could be found, and trying to talk to past members of staff and local management.\nThe manager of the Woking branch in 2001 had since left the business so could not be spoken to, it is understood.\nFollowing its internal inquiry, the chain concluded it had found no evidence to suggest Mountbatten-Windsor had visited and was telling the truth, and nothing to suggest he was not.\nNewsnight has made extensive inquiries to see if there is any record of a customer or staff member having seen him at the Pizza Express restaurant, but has found no evidence of him being there.\nCalls for Met transparency\nOne of the routes we tried was submitting a Freedom of Information request to the Metropolitan Police, asking if any royal protection officers accompanied the former prince to the Woking branch 25 years ago.\nIn response, the force said it could \"neither confirm nor deny\" whether it holds this information, citing \"national security\" among other reasons.\n\"Confirming or denying that information is held would reveal whether protection had been afforded to a specific individual other than the King and the prime minister,\" the Met said in reply to us.\nThis is despite Scotland Yard previously referring to Mountbatten-Windsor's close protection officers, including in a press statement issued in February.\nThe Met's response has drawn criticism from Liberal Democrat leader Sir Ed Davey.\n\"Of course the police are rightly very careful about giving any information about who they give special protection to,\" he told the BBC.\n\"I completely understand that and it's right. But too often we see these types of 'neither confirm nor deny' answers where there really isn't a legitimate security reason – and I think that's what's happening here.\"\nHe called for an \"exception\" to be made by the force to reveal the information.\n\"I really can't see how revealing that Andrew had police protection 25 years ago would play into the hands of terrorists as the Met claims,\" he added.\nGiuffre died by suicide in April 2025 aged 41.\nMountbatten-Windsor's military titles and royal patronag", "translation_ja": "ピザ・エクスプレス、アンドルー王子のウォーキング訪問主張を内部調査\n\nピザ・エクスプレスが、アンドルー・マウントバッテン＝ウィンザー氏のサリー州ウォーキング店訪問に関する主張について内部調査を実施していたことが、BBCニュースナイトの取材で明らかになった。\n\n元王子は2019年の悪名高いニュースナイトインタビューにおいて、故性犯罪者ジェフリー・エプスタインの被害者の一人であるバージニア・ジュフリー氏と性的関係を持ったとされる当日、サリー州のウォーキング支店に滞在していたと主張していた。\n\nBBCニュースナイトはこのほど、同ピザチェーンがこの主張を調査し、王子が訪問した証拠も、訪問しなかった証拠も見つからなかったことを突き止めた。また本紙の調査でも、2001年の当夜に同店で王子を目撃したという記録は見当たらなかった。\n\nマウントバッテン＝ウィンザー氏はコメントの求めに応じなかったが、これまでいかなる不正行為も強く否定している。\n\nニュースナイトは、エプスタイン関連文書の公開と、テムズバレー警察が2月に公務上の不正行為の疑いでマウントバッテン＝ウィンザー氏を逮捕した件を受け、2019年のインタビューを改めて検証した。王子はその後、捜査継続のまま釈放されている。\n\nジュフリー氏は、マウントバッテン＝ウィンザー氏から3度にわたって性的行為を強要されたと主張しており、そのうちの1回は彼女が17歳のときだったとしている。\n\nそのうちの1回は2001年3月10日に行われたとされ、ジュフリー氏によれば、当日は王子と食事をし、ナイトクラブでダンスをした後、ロンドン中心部のベルグラビアにある当時の王子の友人グレレーン・マクスウェルの自宅で性的関係を持ったという。\n\nニュースナイトのインタビューにおいてマウントバッテン＝ウィンザー氏は、その日の「午後4時か5時ごろ」に娘のベアトリス王女をウォーキングのピザ・エクスプレスでのパーティーに連れて行き、その後自宅で夜を過ごしたと述べていた。\n\nインタビューのほぼ全編が放送されたが、時間の都合上、一部の映像は放送されなかった。\n\nその未放送部分には、マウントバッテン＝ウィンザー氏がピザ・エクスプレスについてさらに詳しく語った場面が含まれており、スタッフが日記を調べて詳細を確認したという発言もあった。\n\n「私はベアトリスをウォーキングのピザ・エクスプレスに連れて行きました」と彼はインタビューで述べている。\n\n「これはすべて、スタッフが日記などを調べて割り出したことです。\n\n公爵夫人（サラ・ファーガソン）は確か米国にいたと思います。当時、私たちにはシンプルなルールがありました。子どもたちにはできる限り、どちらか一方の親がついていること。\n\nつまり、一方が外出していれば、もう一方が家にいる。たまに二人ともいることもあったのですが、この日は妻が不在で、私が自宅にいました」\n\nインタビューでのマウントバッテン＝ウィンザー氏のピザ・エクスプレスに関する発言は2019年に世界中で大きな話題となり、一部の新聞は「アリバイ」と表現した。\n\nピザ・エクスプレスによる訪問記録の調査\n\nニュースナイトはこのほど、ピザ・エクスプレスのシニアマネジメントチームが2019年、マウントバッテン＝ウィンザー氏の主張の信憑性を公益的観点から調査したことを把握した。\n\n経営幹部は内部調査を行い、当時の記録の捜索を試みたが、何も見つからなかった。また、かつての従業員や地元の管理職への聞き取りも試みた。\n\n2001年当時のウォーキング店のマネージャーはすでに退職しており、話を聞くことはできなかったと伝えられている。\n\n内部調査の結果、チェーン側はマウントバッテン＝ウィンザー氏が訪問して真実を話しているという証拠も、訪問していないという証拠も見つからなかったと結論づけた。\n\nニュースナイトも、ウォーキングのピザ・エクスプレスに王子がいたことを証言する顧客やスタッフの記録を見つけるべく幅広い調査を行ったが、訪問を示す証拠は得られなかった。\n\nロンドン警視庁の透明性への批判\n\n調査のひとつとして、ニュースナイトはロンドン警視庁に情報公開請求を行い、25年前にウォーキングの同店舗に王室護衛官が元王子に同行したかどうかを照会した。\n\nこれに対し警視庁は、「国家安全保障」などを理由として、「当該情報を保有しているかどうかを確認することも否定することもできない」と回答した。\n\n「確認または否定することにより、国王および首相以外の特定の個人に護衛が提供されたかどうかが明らかになる」と警視庁は回答の中で述べた。\n\nこれは、スコットランドヤードが以前、2月の声明を含む公式発表においてマウントバッテン＝ウィンザー氏の護衛担当官に言及していたことと矛盾している。\n\n警視庁の対応は、自由民主党党首のエド・デイビー卿からも批判を受けた。\n\n「もちろん、警察が特別な保護を提供している人物に関する情報の提供に慎重であることは正当だと理解しています」とデイビー卿はBBCに語った。\n\n「それは完全に理解できますし、正しいことです。しかし、正当な安全保障上の理由がないにもかかわらず、こうした『確認も否定もしない』という回答がしばしば見られるのは問題で、今回もまさにそのケースだと思います」\n\n同氏は、この情報を開示するための「例外措置」を警視庁に求めた。\n\n「アンドルー王子が25年前に警察の護衛を受けていたことを明かすことが、警視庁の主張するようにテロリストの利益になるとは、到底考えられません」と付け加えた。\n\nジュフリー氏は2025年4月、41歳で自ら命を絶った。\n\nマウントバッテン＝ウィンザー氏の軍の称号および王室のパトロン職は（記事はここで終了）", "vocab": [{"word": "plausibility", "definition": "もっともらしさ、信憑性。ある主張や説明がどの程度信じられるかを示す名詞。「the plausibility of his claim（彼の主張の信憑性）」のように使う。"}, {"word": "strenuously", "definition": "強力に、精力的に。特に否定や抗議を力強く行う際に使われる副詞。「strenuously denied（強く否定した）」という形でよく用いられる。"}, {"word": "misconduct", "definition": "不正行為、職権乱用。職務上の不適切な行動や倫理違反を指す名詞で、法的・公式な文脈でよく使われる。"}, {"word": "patronage", "definition": "後援、パトロン職。有力者や組織が団体・活動などを公式に支持・支援する関係を指す名詞。王室の文脈では慈善団体などへの公式支持を意味する。"}, {"word": "transparency", "definition": "透明性。情報や意思決定のプロセスが公開・開示されている状態を指す名詞。政治や行政の文脈で頻繁に用いられる。"}, {"word": "alibi", "definition": "アリバイ。犯罪や疑惑のある出来事の際に、別の場所にいたことを証明する証拠や証言を指す名詞。法律・報道の文脈で使われる。"}, {"word": "constraints", "definition": "制約、制限。何かを行う上での障害や限界となる条件を指す名詞。「time constraints（時間的制約）」という形でよく使われる。"}]}, {"title_ja": "ジャーナリスト、ライラ・マッキーのパートナー、未解決の殺害が犯人に一生つきまとうことを望む", "title_en": "Lyra McKee's partner hopes journalist's unsolved murder haunts her killer", "summary_ja": "ジャーナリストのライラ・マッキーのパートナー、サラ・キャニングは、金曜日に3人の男性がマッキー殺害について無罪判決を受けた後、心境を語った。マッキーは2019年4月18日、ロンドンデリーでの暴動中に反体制的な共和主義者の銃撃手によって射殺され、後に新IRAが犯行声明を出した。キャニングは判決が「ひどいもの」だったと述べ、正義が実現されるかどうか疑念を示しつつ、自身は銃撃手の身元を知っていると語った。", "summary_en": "Sara Canning, partner of journalist Lyra McKee, has spoken out after three men were found not guilty of McKee's murder on Friday. McKee was shot dead by a dissident republican gunman during riots in Londonderry on 18 April 2019, with the New IRA later claiming responsibility. Canning said the verdicts were 'gutting' and expressed doubt that justice would ever be served, while stating she knows the identity of the gunman.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cy5vvydg0eqo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Partner of journalist Lyra McKee hopes her death haunts her killer\n- Published\nThe partner of journalist Lyra McKee has said she hopes her death \"haunts\" her killer's \"every waking minute\".\nLyra McKee was shot and killed when a dissident republican gunman opened fire during rioting in Londonderry on 18 April 2019.\nOn Friday three men, Paul McIntyre, Peter Cavanagh and Jordan Devine, were found not guilty of her murder.\nSara Canning, Lyra's partner at the time of her killing, described the gunman as \"pathetic\", adding they were \"showing off for the cameras\" on the night she was fatally shot.\n\"You've never contributed one thing to this world. What you did that night was pathetic,\" she said.\n\"I hope you can't sleep at night… I hope it haunts your every waking minute.\"\nOn the night Lyra was killed an MTV crew were filming a documentary in Derry.\nHowever, the MTV camera crew had left the scene before the shooting took place.\nDuring the trial, in footage played in court, TV presenter Reggie Yates could be heard saying: \"If people are saying we're inciting it, then maybe we should call it a night.\"\nSara said the killer was \"showing off for Reggie Yates - that's really pathetic\".\n\"It was showing off for cameras, it wasn't to free Ireland, it wasn't to make the life of people in Creggan and Derry and Ireland better.\"\nLyra died after being hit by a bullet as she stood close to police vehicles while watching the disturbances in the Creggan area of Derry.\nEarlier, a police operation targeting dissident republican activity had been carried out nearby. Crowds had gathered and disorder followed after with petrol bombs being thrown at police and stolen vehicles set alight.\nFour gunshots were fired in the direction of police by a masked man. Lyra was shot and killed by a single bullet to the head.\nThe New IRA, a dissident republican group, later said it carried out the killing.\n'I know who the gunman is'\nLyra's former partner told BBC News NI she knows who the gunman is and knows \"what he looks like\".\nShe added: \"I don't possess the hate and the evil in me to hurt people the way that you do.\"\nFriday's not guilty verdicts have been \"gutting\", said Sara.\nIt is difficult now, she added, to believe there will ever be justice for Lyra.\nThat, she said, would require someone to have \"a massive change of heart or we find some really compelling evidence\".\nFriday's verdicts brought to an end a trial that lasted almost two years and more than seven years after Lyra was shot dead.\nIn total, nine men faced a total of 52 charges, including rioting, all of which they denied. One defendant has since died.\nNone of the men charged with murder was accused of firing the fatal shot which killed the 29-year-old journalist.\nThe prosecution's case was that they accompanied a lone gunman to a firing point on the night Lyra was killed, and encouraged or assisted him.\nAt the end of Friday's hearing, the judge Mrs Justice Smyth said the outcome of the trial would bring \"little, if any, comfort or relief\" to the family and friends of Lyra.\nShe added: \"Lyra McKee was murdered in an act of senseless violence.\"\nSara said the trial had been a difficult process.\n\"You have two years where you're just so hopeful, and then it's completely dashed and taken away,\" she said.\n\"I understand why the judge made the decision she made,\" she said, adding \"I don't feel like we were warned enough about the possibility that our chances would be nil.\"\nThe system, she said, has let Lyra down.\nFollowing the verdicts the Public Prosecution Service (PPS) said it was \"satisfied that our legal test for prosecution was met and that it was in the public interest to bring the case\".\n\"The case successfully overcame a number of robust legal challenges during the proceedings.\"\nThe PPS said it recognised the \"acquittals will be deeply disappointing to Lyra's family and loved ones\".\nA spokesperson for the Police Service of Northern Ireland (PSNI) said: \"In line with the not guilty verdicts, we will now take time to consider the implications and determine our next steps.\n\"Our thoughts at this time remain with Lyra's family and friends.\"\nWho was Lyra McKee?\nLyra was a journalist and campaigner from Belfast who had only recently moved to Derry.\nSeen by many as a rising star, she had written for many publications, including Buzzfeed, Private Eye, the Atlantic and Mosaic Science.\nShe was named Sky News young journalist of the year in 2006 and Forbes Magazine named her as one of their \"30 under 30\" in media in Europe in 2016.\nThat same year, she wrote of being \"a ceasefire baby\" and of being part of the \"Good Friday Agreement generation\".\nHer killing came 21 years after the Good Friday peace agreement was signed in Northern Ireland.\n- Published2 days ago\n \n- Published2 days ago\n \n- Published19 April 2019", "translation_ja": "ジャーナリスト、ライラ・マッキーのパートナー、彼女の死が殺害者に「毎日つきまとう」ことを望む\n\nジャーナリストのライラ・マッキーのパートナーは、彼女の死が殺害者の「目覚めているすべての瞬間につきまとう」ことを望むと語った。\n\nライラ・マッキーは、2019年4月18日にロンドンデリーで暴動が起きた際、反体制的な共和主義者の銃撃手が発砲し、射殺された。\n\n金曜日、ポール・マッキンタイア、ピーター・キャバナー、ジョーダン・ディバインの3人は、彼女の殺害について無罪と判断された。\n\nライラの当時のパートナーだったサラ・キャニングは、銃撃手を「哀れ」と表現し、彼女が致命傷を負った夜、彼らは「カメラの前で見栄を張っていた」と付け加えた。\n\n「あなたはこの世に何一つ貢献していない。あの夜あなたがしたことは哀れだった」と彼女は語った。\n\n「あなたが夜も眠れないことを願う……それがあなたの目覚めているすべての瞬間につきまとうことを願う。」\n\nライラが殺された夜、MTVのクルーがデリーでドキュメンタリーを撮影していた。\n\nしかし、MTVのカメラクルーは銃撃が起きる前に現場を離れていた。\n\n裁判中、法廷で上映された映像の中で、テレビ司会者のレジー・イェーツが「もし私たちが煽っていると言われているなら、今夜はやめた方がいいかもしれない」と話す声が聞こえた。\n\nサラは、犯人は「レジー・イェーツのためにカメラに向かって見栄を張っていた——それは本当に哀れだ」と述べた。\n\n「それはカメラへの見栄だった。アイルランドを自由にするためでも、クレガンやデリーやアイルランドの人々の生活を良くするためでもなかった。」\n\nライラは、デリーのクレガン地区での騒乱を見物しながら警察車両の近くに立っていたところ、弾丸が当たり死亡した。\n\nその前には、反体制的な共和主義者の活動を標的にした警察の作戦が近くで行われていた。群衆が集まり、その後警察に火炎瓶が投げられ、盗まれた車両が放火されるなどの混乱が起きた。\n\n覆面をした男が警察の方向に4発の銃弾を発射した。ライラは頭部に1発の弾丸を受け死亡した。\n\n反体制的な共和主義者グループである新IRAが後に、この殺害を実行したと表明した。\n\n「私は銃撃手が誰か知っている」\n\nライラの元パートナーはBBC News NIに対し、銃撃手が誰であるかを知っており、「その人物の顔も知っている」と語った。\n\n彼女はこう付け加えた。「私はあなたのように人を傷つけるほどの憎しみや邪悪さを持ち合わせていない。」\n\n金曜日の無罪判決は「ひどいもの」だったとサラは言った。\n\n今となっては、ライラに対する正義が実現されることを信じるのが難しくなったと彼女は付け加えた。\n\nそのためには、誰かが「大きく心を改めるか、非常に説得力のある証拠が見つかる」必要があると彼女は述べた。\n\n金曜日の評決は、約2年にわたる裁判に終止符を打ち、ライラが射殺されてから7年以上が経過していた。\n\n合計9人の男性が暴動を含む合計52の罪に問われ、いずれも否認していた。被告のうち1人はその後死亡した。\n\n殺人罪で起訴された男性の中に、29歳のジャーナリストを死亡させた銃弾を実際に発射したとされる人物はいなかった。\n\n検察側の主張は、彼らがその夜、単独の銃撃手とともに発砲地点へと移動し、彼を励ましまたは補助したというものだった。\n\n金曜日の審理の最後に、スマイス判事夫人は裁判の結果がライラの家族や友人に「ほとんど、あるいは全く」慰めや安堵をもたらさないだろうと述べた。\n\n彼女はこう付け加えた。「ライラ・マッキーは無意味な暴力行為によって殺害された。」\n\nサラは裁判が困難なプロセスだったと語った。\n\n「2年間、ただただ希望を持ち続け、そしてそれが完全に打ち砕かれ奪われる」と彼女は言った。\n\n「判事がなぜその決断を下したかは理解できる」と述べ、「私たちの勝ち目がゼロになる可能性について、十分な警告がなかったと感じる」と付け加えた。\n\nこのシステムはライラを見捨てた、と彼女は言った。\n\n判決を受けて、公訴局（PPS）は「訴追のための法的基準が満たされており、事件を起訴することが公益に適っていると確信していた」と述べた。\n\n「この事件は、訴訟手続き中に数々の厳格な法的異議申し立てを乗り越えた。」\n\nPPSは、「無罪判決はライラの家族と愛する人々にとって深く失望させるものであることを認識している」と述べた。\n\n北アイルランド警察（PSNI）の広報担当者は次のように述べた。「無罪判決に基づき、今後の影響を検討し、次のステップを決定するための時間を取る。現時点での思いは、ライラの家族と友人のそばにある。」\n\nライラ・マッキーとはどんな人物か？\n\nライラはベルファスト出身のジャーナリスト兼活動家で、最近デリーに引っ越してきたばかりだった。\n\n多くの人から将来有望な人物と見なされており、BuzzFeed、プライベート・アイ、アトランティック、モザイク・サイエンスなど多くの媒体に寄稿していた。\n\n彼女は2006年にスカイニュースの年間若手ジャーナリスト賞を受賞し、2016年にはフォーブス誌のヨーロッパにおける「30 Under 30」メディア部門に選ばれた。\n\n同年、彼女は「停戦世代の子」であることや、「グッドフライデー合意世代」の一員であることについて書き記した。\n\n彼女の殺害は、北アイルランドでグッドフライデー和平合意が調印されてから21年後のことだった。", "vocab": [{"word": "dissident", "definition": "反体制的な、という意味の形容詞。政府や権力に反対する人や組織を指す際に使われる。例：dissident republican（反体制的な共和主義者）。"}, {"word": "acquittal", "definition": "無罪判決、無罪放免を意味する法律用語。裁判で被告が有罪でないと判断された場合に使われる名詞。"}, {"word": "inciting", "definition": "扇動する、煽動するという意味の動詞inciteの現在分詞形。人々を暴力や違法行為に駆り立てる行為を指す。"}, {"word": "compelling", "definition": "非常に説得力のある、強力な、という意味の形容詞。証拠や議論が非常に強力で否定しにくい場合に使われる。"}, {"word": "rioting", "definition": "暴動、騒乱を意味する名詞・動詞。集団が秩序を乱し、暴力的な行動を取る状態を指す法律・ニュース用語。"}, {"word": "prosecution", "definition": "訴追、起訴を意味する法律用語。刑事裁判において被告を告発・起訴する側（検察側）を指すこともある。"}, {"word": "senseless", "definition": "無意味な、分別のないという意味の形容詞。特に理由や正当性が全くない暴力や行為を形容する際によく使われる。"}]}, {"title_ja": "なぜ多くの移民がドイツを再び離れるのか", "title_en": "Why Many Immigrants Choose to Leave Germany", "summary_ja": "ドイツの雇用研究所（IAB）の新たな調査によると、移民がドイツを離れる主な理由は、官僚主義的な障壁、海外に残る家族、言語の壁、差別などが複合的に絡み合っていることが明らかになった。離国者の40%は母国へ帰還せず、スペインやスイスなど他の国へ移住している。専門家たちは、語学支援の充実、行政手続きの効率化、外国資格の承認改善が人材定着の鍵だと指摘している。", "summary_en": "A new study by Germany's Institute for Employment Research (IAB) reveals that immigrants leave Germany due to a combination of factors including bureaucratic hurdles, family ties abroad, language barriers, and discrimination. Younger immigrants with foreign partners and strong English skills are most likely to emigrate, with 40% moving to other countries rather than returning home. Experts say improvements in language support, administrative efficiency, and qualification recognition are key to retaining skilled workers.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/why-many-immigrants-leave-germany-again/a-77853162?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "経済", "full_text": "Why many immigrants leave Germany again\nJuly 6, 2026\"Anyone who wants to shape immigration successfully must also understand emigration,\" said Laura Goßner of the Institute for Employment Research (IAB) at a press conference in Berlin.\nThe organization conducted an online survey of people aged 18 to 65 who had immigrated to Germany before April 2025, asking them why they had left the country again and which factors had influenced their decision.\nThe researchers found that emigration is not driven by any single factor. Family-related reasons, in particular, play a major role. Experiences of discrimination were also cited.\nMany of the contributing factors, such as bureaucracy, housing, and language acquisition, can be influenced by public policy.\nWho is most likely to leave Germany again?\n\"On average, emigrants are younger. They have spent less time in Germany and are more likely to have partners and children living abroad. They are also less likely to be proficient in German but more likely to have a good command of English,\" explained IAB expert Theresa Koch.\nWhile 60% of emigrants return to their home countries, 40% move on to other destinations. The most popular destinations are Spain, Switzerland, Italy, and Croatia.\n\"We are competing with other European countries for skilled workers,\" said Yuliya Kosyakova, Head of the Research Department on Migration, Integration and International Labour Market Research at the Institute for Employment Research.\nBureaucracy is one of the main drivers of emigration\nEmigrants criticize well-known things about Germany: lengthy processing times for naturalization applications, residence permits, visas, and the recognition of foreign qualifications. They often face long waits for responses from the authorities. High administrative fees are another common source of frustration. A further point of criticism is the lack of support for career development, whether from job centers, local authorities, or employers.\nAll of this makes long-term planning, access to employment, and a sense of belonging in Germany more difficult, says Laura Goßner. Administrative procedures influence \"how immigrants assess their future in Germany. When procedures are perceived as lengthy, confusing, or difficult to access, this can affect people's prospects of staying,\" the IAB expert explains. \"We find that immigrants who view such procedures more negatively, on average, less likely to feel welcome in Germany.\"\nLanguage remains key to success in the German labor market\nTilman Frank is the Chairman of the Federal Association for International Skilled Labor Recruitment (Bundesverband internationale Fachkräftegewinnung e.V.) is also the Managing Director of TalentOrange GmbH, a company that has recruited and supported thousands of nurses, childcare workers, and physiotherapists for positions in Germany. Frank tells DW that he knows why many people decide to pack their bags again after only a short time in the country: language is the key to finding one's way in Germany, particularly in the labor market, he explains.\n\"It becomes problematic when the path to Germany is flawed from the outset - when language acquisition is not adequately supported. If these elements are not in place, the likelihood that these people will return home is relatively high. However,for people who are sufficiently prepared for life in Germany, retention rates are very high,\" Frank says.\nElderly care workers are still in demand — but is the training a good fit?\nAccording to Frank, people from Kenya, India, and Vietnam are currently making particularly strong efforts to establish themselves in Germany. Kenya's labor ministry actively encourages young unemployed people to seek opportunities abroad. In India and Vietnam, many parents see vocational training opportunities in Germany as highly attractive for their children. Demand for skilled labor from abroad remains especially strong inelderly care.\nTilman Frank is therefore calling on the German government to support German-language instruction in migrants' countries of origin. \"Attempts to come to Germany without any knowledge of German are not sustainable in the long run. International degree programs taught in English are a good example — people hope this will enable them to work in Germany. But it doesn't.\"\nOne reason for emigration may also be that immigrants are not employed in roles that match their qualifications: \"For example, people trained in acute hospital care in their home countries may end up working in nursing homes providing basic care in Germany, without this having been clearly communicated to them in advance,\" Frank explains.\nA new approach: 'Work and Stay' agencies\nFrank, says that policymakers now also recognize that international skilled workers must not only come to Germany, but stay as well. His conclusion is that Germany offers a mix of strengths and shortcomings.\n\"The Federal Employment Agency has introduced a centralized system that is faster and more rel", "translation_ja": "なぜ多くの移民がドイツを再び離れるのか\n\n2026年7月6日　「移民政策を成功させたいなら、移住先から去っていく側の実態も理解しなければならない」——ベルリンで開かれた記者会見で、雇用研究所（IAB）のラウラ・ゴスナー氏はこう述べた。\n\n同研究所は、2025年4月以前にドイツへ移住し、その後再び国外へ出た18歳から65歳の人々を対象に、なぜドイツを離れたのか、またどのような要因がその決断に影響したのかを問うオンライン調査を実施した。\n\n研究者たちは、離国の原因は単一の要因によるものではないと結論付けた。とりわけ家族に関する事情が大きな役割を果たしており、差別を経験したことも理由として挙げられた。\n\n官僚主義、住宅事情、語学習得といった要因の多くは、公共政策によって改善できるものだという。\n\n■ドイツを再び去りやすいのはどんな人か？\n\n「平均的に見て、離国者は年齢が若く、ドイツでの滞在期間が短い傾向にあります。また、海外にパートナーや子供がいる可能性が高く、ドイツ語の習熟度は低い一方で英語は得意なケースが多い」と、IABの専門家テレサ・コッホ氏は説明する。\n\n離国者の60%は母国へ帰還するが、残りの40%はほかの国へ移住する。最も人気の高い移住先はスペイン、スイス、イタリア、クロアチアだ。\n\n「私たちは、熟練労働者をめぐって他のヨーロッパ諸国と競い合っています」と語るのは、雇用研究所の移民・統合・国際労働市場研究部門の部長、ユリヤ・コシャコワ氏だ。\n\n■官僚主義が離国の主要因のひとつに\n\n離国者たちが批判するのは、ドイツに関してよく知られた問題点だ。帰化申請、在留許可、ビザ、外国資格の認定といった手続きにかかる長い処理時間、当局からの回答を長期間待たされること、高額な行政手数料、そしてジョブセンターや地方当局、雇用主によるキャリア支援の不足などが挙げられている。\n\nこうした問題のすべてが、長期的な計画の立案、就職機会へのアクセス、そしてドイツ社会への帰属意識を難しくしていると、ラウラ・ゴスナー氏は言う。行政手続きは「移民が自分のドイツでの将来をどう評価するかに影響を与えます。手続きが長く、複雑で、利用しにくいと感じられると、定住の見通しに影響を及ぼすことがあります」とIABの専門家は説明する。「こうした手続きをよりネガティブに捉えている移民は、平均的に見て、ドイツで歓迎されていると感じにくい傾向があることがわかっています」\n\n■ドイツの労働市場で成功するにはやはり語学力が鍵\n\nティルマン・フランク氏は、国際的な熟練労働者採用連邦協会（Bundesverband internationale Fachkräftegewinnung e.V.）の会長を務めるとともに、TalentOrange GmbHの代表取締役でもある。同社はこれまでに何千人もの看護師、保育士、理学療法士をドイツの職場へ採用・支援してきた。フランク氏はDWに対し、なぜ多くの人々がわずかな期間でドイツを離れる決断をするのかを知っていると語る。ドイツで、とりわけ労働市場において自分の居場所を見つけるためには、言語が鍵となるのだという。\n\n「ドイツへの道筋がはじめから不完全な場合——つまり語学習得が十分にサポートされていない場合——に問題が生じます。こうした要素が整っていなければ、その人たちが帰国する可能性はかなり高くなります。しかし、ドイツでの生活に十分な準備ができている人たちの定着率は非常に高い」とフランク氏は語る。\n\n■介護分野では依然として需要があるが、訓練内容は適切か？\n\nフランク氏によれば、現在ケニア、インド、ベトナム出身の人々が特に積極的にドイツへの定着を目指しているという。ケニアの労働省は若い失業者に海外での機会を積極的に促しており、インドやベトナムでは多くの親がドイツでの職業訓練の機会を子供にとって非常に魅力的なものと見ている。海外からの熟練労働者に対する需要は、特に介護分野で引き続き強い。\n\nそのためフランク氏は、ドイツ政府に対して移民の出身国でのドイツ語教育を支援するよう求めている。「ドイツ語の知識なしにドイツへ来ようとする試みは、長期的に見て持続可能ではありません。英語で教えられる国際的な学位プログラムはその好例で、それによってドイツで働けると期待する人もいますが、実際にはそうはなりません」\n\n離国の理由のひとつとして、移民が自分の資格に見合った職に就けていないことも挙げられる。「たとえば、母国で急性期病院の医療に従事するための訓練を受けた人が、ドイツでは基礎的なケアを提供する老人ホームで働くことになるケースがあります。しかも、そのことが事前に明確に説明されていないことも多い」とフランク氏は説明する。\n\n■新しいアプローチ：「ワーク・アンド・ステイ」機関\n\nフランク氏は、政策立案者たちも今や、国際的な熟練労働者をドイツへ呼び込むだけでなく、定着させることが不可欠だと認識し始めていると言う。彼の結論として、ドイツには強みと課題が混在しているという。\n\n「連邦雇用庁は、より迅速かつ信頼性の高い一元的なシステムを導入しました——」（記事はここで途切れています）", "vocab": [{"word": "naturalization", "definition": "帰化、すなわち外国籍の人が正式な手続きを経てある国の国籍を取得するプロセスを指す。移民政策や法律の文脈で頻繁に使われる専門用語。"}, {"word": "bureaucracy", "definition": "官僚制度、または煩雑な行政手続きを指す。しばしば非効率や過度な形式主義を批判的に表現する際にも用いられる。"}, {"word": "retention", "definition": "（人材の）定着・維持を意味し、特に従業員や移民が組織や国に留まり続けることを指す人事・政策分野の重要な概念。"}, {"word": "proficient", "definition": "ある技能や言語において高い習熟度・熟達度を持っていることを表す形容詞。'proficient in German'のように使われ、単なる基礎知識を超えた実用的な能力を示す。"}, {"word": "qualification recognition", "definition": "外国で取得した学位や資格を移住先の国が正式に認定するプロセスを指す複合語。移民の就労機会に直接影響する重要な政策課題。"}, {"word": "vocational training", "definition": "特定の職業や技能習得を目的とした実践的な訓練・教育を指す。アカデミックな大学教育とは区別され、ドイツの職業訓練制度（デュアルシステム）の文脈でよく登場する語。"}, {"word": "emigration", "definition": "自国や居住国から別の国へ永続的または長期的に移り住む行為を指す。入国側の視点を表す'immigration'と対をなす語。"}]}, {"title_ja": "エルニーニョ2026：アフリカは迫りくる気候危機に備えられているか？", "title_en": "El Niño 2026: Is Africa Prepared for the Coming Climate Crisis?", "summary_ja": "国連食糧農業機関（FAO）と世界食糧計画（WFP）は、エルニーニョ現象の再来から22か国の880万人を守るため、2億ドル以上の資金援助を訴えた。アフリカでは地域により干ばつや洪水など異なる影響が予測されており、南部では深刻な旱魃が懸念される。専門家たちは、地球温暖化や国際支援の削減が重なり、2026年の見通しは特に憂慮すべき状況だと警告している。", "summary_en": "The FAO and WFP have appealed for over $200 million to protect 8.8 million people across 22 high-risk countries from the returning El Niño weather pattern. Africa faces varied impacts, with southern regions at risk of drought and eastern regions facing potential flooding. Experts warn that the crisis is compounded by global warming, geopolitical instability, and cuts in international aid.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/el-nino-is-africa-ready-for-the-perfect-storm/a-77826694?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "El Nino: Is Africa ready?\nJuly 6, 2026The United Nations Food and Agriculture Organization (FAO) and the World Food Programme (WFP) have appealed for over $200 million in funds to help protect 8.8 million people across 22 high-risk countries from the looming return the destructive El Nino weather pattern.\nThe support would include cash transfers, climate-resilient seeds, livestock protection and flood control measures, as extreme weather patterns affect much of the world already.\n\"El Nino conditions have developed in the tropical Pacific, and are forecast to strengthen rapidly over the coming months, increasing the likelihood of extreme weather events in many parts of the world,\" the World Meteorological Organization (WMO) has warned.\nIn Africa, the countries listed as most at risk include Cameroon, Ethiopia, Kenya, Madagascar, Malawi, Mozambique, Nigeria, Somalia, South Sudan, Sudan, Uganda and Zimbabwe.\nEl Nino: What it means for Africa\nEl Nino is a naturally occurring warming of sea surface temperatures in the central and eastern Pacific Ocean, which usually happens every two to seven years.\nIt can last between nine and 12 months and, in some regions, El Nino can bring hotter and drier conditions, while in others, it can increase rainfall and flooding.\n\"For Africa, it's not one climate story. It's actually going to be a much more varied impact,\" says Kgaugelo Mkumbeni, a research officer in the Climate Risk and Human Security Project at the Institute for Security Studies in Pretoria, South Africa.\nSouthern Africa has in the past experienced \"hotter and much drier conditions\" during previous El Nino events, she explains, which raises the risk of \"drought, water shortages and general food insecurity.\"\nThe situation in Eastern Africa, however, is more complex, as El Nino can have different effects depending on the season.\nGlobal warming: from bad to worse\nBhargabi Bharadwaj, a research associate at Chatham House's Environment and Society Centre, says that \"El Nino reshapes rainfall and temperature patterns around the world, though its impacts can vary depending on the region and which season it hits.\"\n\"Some areas will face drier conditions, which increases risk of drought and wildfire occurrence, whereas other parts of the world will have wetter conditions and face likelihood of storms and flooding,\" Bharadwaj stresses.\nScientists like Bharadwaj believe climate change does not directly cause El Nino but that it can make its effects more severe.\n\"We're working with warmer baseline temperatures of around 1.4 degrees higher than pre-industrial levels. This means that when an El Nino event does occur, then there are more extreme outcomes,\" Bharadwaj told DW.\nSome experts are also concerned about the possibility of a very strong — or \"super\" — El Nino this year,\"when your average temperature difference is around two degrees higher, or at least forecast to be two degrees higher,\" she adds.\nActing before disaster strikes\nThe real challenge is whether governments and aid agencies can act quickly enough, as \"science is ahead of policy,\" Bharadwaj says.\nIn northern Kenya, Abdikadir Aden Hassan, founder of Garissa Million Trees, said the danger is not only the possibility of heavy rains and subsequent floods, but the fact that they may come after months of drought.\n\"We are in a dry spell and are headed toward drought in August and September,\" he told DW. \"Then in October, November and December, we are expected to have the short rains. People may be coming out of drought and then going straight into flash floods. That means their livelihoods will be affected for a second time,\" Hassan explains.\nWith lives and livelihoods at stake, experts argue that Africa's climate preparedness cannot be left to environment ministries alone.\n\"It has to be embedded within agriculture, within health, within water, within energy, education and social protection,\" Mkumbeni told DW.\nClimate-linked displacement\nConflicts, high energy costs, debt pressures, fertilizer disruptions and cuts in international aid are already weakening the ability of many countries to respond to external shocks. Bharadwaj believes that this makes the forecast for 2026 particularly worrying.\n\"The concern isn't just El Nino. It's that it's occurring at a time when the global system is already quite fragile. A lot of the vulnerable populations are living in regions that are highly impacted by import costs but also high debt,\" she told DW.\nAimee-Noel Mbiyozo, a senior researcher at the Institute for Security Studies, highlights that climate-related events are already forcing people to leave their homes.\n\"Cyclones and flooding have been by far and away the biggest pushers of mass displacement in Africa. Drought has as well, but drought tends to do it a little bit more slowly,\" she highlights.\n\"People don't want to leave home. Most people want to stay where they are.\"\nCities on the frontline of climate crises\nDrought and desertification are driving people increasingly ", "translation_ja": "エルニーニョ：アフリカは「完璧な嵐」に備えられているか？\n\n2026年7月6日\n\n国連食糧農業機関（FAO）と世界食糧計画（WFP）は、破壊的なエルニーニョ現象の再来から22か国の高リスク地域に暮らす880万人を守るため、2億ドル以上の資金援助を訴えた。現金給付、気候変動に強い種子、家畜の保護、洪水対策などの支援が含まれ、すでに世界各地で異常気象が猛威を振るっている。\n\n世界気象機関（WMO）は「熱帯太平洋でエルニーニョ現象が発生しており、今後数か月でさらに急速に強まり、世界各地で異常気象が発生する可能性が高まると予測されている」と警告している。\n\nアフリカでは、カメルーン、エチオピア、ケニア、マダガスカル、マラウイ、モザンビーク、ナイジェリア、ソマリア、南スーダン、スーダン、ウガンダ、ジンバブエが特にリスクの高い国として挙げられている。\n\nエルニーニョがアフリカにとって何を意味するか\n\nエルニーニョとは、中部・東部太平洋の海面水温が自然に上昇する現象で、通常2〜7年ごとに発生する。持続期間は9か月から12か月で、地域によって高温・乾燥をもたらす場合もあれば、降雨量の増加や洪水を引き起こす場合もある。\n\n南アフリカのプレトリアにある安全保障研究所の「気候リスクと人間の安全保障プロジェクト」の研究員、クガウゲロ・ムクベニ氏は「アフリカにとって、これは一つの気候の話ではありません。実際には、より多様な影響が生じるでしょう」と語る。\n\n同氏は、南部アフリカではこれまでのエルニーニョ現象において「より高温で非常に乾燥した状況」が経験されており、「干ばつ、水不足、そして食料不安全」のリスクが高まると説明する。\n\n一方、東アフリカの状況はより複雑で、エルニーニョの影響は季節によって異なる。\n\n地球温暖化：さらに悪化する状況\n\nチャタムハウスの「環境と社会センター」の研究員、バルガビ・バラドワジ氏は「エルニーニョは世界中の降雨パターンや気温パターンを変化させるが、その影響は地域や、どの季節に発生するかによって異なる」と述べる。\n\n「一部の地域では乾燥した状況となり、干ばつや山火事のリスクが高まります。一方、世界の別の地域では降水量が増え、嵐や洪水の可能性が高まります」とバラドワジ氏は強調する。\n\nバラドワジ氏のような科学者たちは、気候変動がエルニーニョを直接引き起こすわけではないが、その影響をより深刻にし得ると考えている。\n\n「私たちは産業革命以前の水準より約1.4度高いという、より暖かい基準気温のもとで生活しています。つまり、エルニーニョ現象が発生した際に、より極端な結果が生じるということです」とバラドワジ氏はDWに語った。\n\n一部の専門家は今年、「平均気温差がおよそ2度高く、少なくとも2度高くなると予測される」非常に強い「スーパー」エルニーニョの可能性についても懸念している、と同氏は付け加えた。\n\n災害が起きる前に行動する\n\n「科学は政策より先を行っている」とバラドワジ氏は言い、政府や援助機関が十分に迅速に行動できるかどうかが真の課題だと指摘する。\n\nケニア北部では、「ガリッサ百万本の木」の創設者、アブディカディル・アデン・ハッサン氏が、危険は大雨とその後の洪水の可能性だけでなく、数か月の干ばつの後に訪れる可能性があるという事実にあると述べた。\n\n「私たちは今、乾期にあり、8月と9月には干ばつに向かっています」とハッサン氏はDWに語った。「そして10月、11月、12月には短期雨季が来ると予想されています。人々は干ばつから抜け出したばかりで、そのまま鉄砲水に直面することになるかもしれません。つまり、生計が二度目の打撃を受けることになります」と同氏は説明する。\n\n命と生計がかかっている中、専門家たちはアフリカの気候への備えを環境省だけに任せておくことはできないと主張する。\n\n「農業、保健、水、エネルギー、教育、社会的保護の中に組み込まれなければなりません」とムクベニ氏はDWに語った。\n\n気候に起因する移住\n\n紛争、高いエネルギーコスト、債務の圧迫、肥料供給の混乱、そして国際援助の削減が、多くの国が外部からの衝撃に対応する能力をすでに弱めている。バラドワジ氏は、これが2026年の見通しを特に憂慮すべきものにしていると考える。\n\n「懸念されるのはエルニーニョだけではありません。世界のシステムがすでに非常に脆弱な時期に発生しているということです。多くの脆弱な人々が、輸入コストや高い債務によって大きな打撃を受けている地域に暮らしています」と同氏はDWに語った。\n\n安全保障研究所の上級研究員、エメ＝ノエル・ムビヨゾ氏は、気候関連の出来事がすでに人々の故郷からの離散を強いていることを強調する。\n\n「サイクロンと洪水が、アフリカにおける大規模な移住の最大の要因となっています。干ばつもそうですが、干ばつはやや緩やかに進む傾向があります」と同氏は指摘する。\n\n「人々は故郷を離れたくありません。ほとんどの人は今いる場所に留まりたいのです。」\n\n気候危機の最前線に立つ都市\n\n干ばつと砂漠化が人々をますます……", "vocab": [{"word": "desertification", "definition": "砂漠化。乾燥・過放牧・森林伐採などにより、土地が砂漠へと変化していく過程を指す環境・地理学用語。"}, {"word": "looming", "definition": "（危険・問題などが）迫り来る、差し迫っている様子を表す形容詞的用法。脅威が近づいていることを強調する際に使われる。"}, {"word": "climate-resilient", "definition": "気候変動への耐性を持つ、気候に強い。農業・インフラ・政策などが気候の変動に対して適応できる能力を備えていることを指す複合形容詞。"}, {"word": "compounded", "definition": "（問題・困難などが）さらに悪化した、複合的に重なった状態を指す。複数の要因が重なり合って状況を悪化させる場合に使われる動詞の過去分詞形。"}, {"word": "baseline", "definition": "基準値・基準線。比較の出発点となる標準的な数値や状態を指し、科学・統計・経済分野で広く使われる専門用語。"}, {"word": "displacement", "definition": "（人々の）移住・離散・強制退去。特に紛争・災害・気候変動などにより人々が住み慣れた場所を離れることを指す社会・人道支援分野の重要用語。"}, {"word": "fragile", "definition": "脆弱な、壊れやすい。ここでは国際的な政治・経済システムが不安定で崩壊しやすい状態にあることを表す比喩的な用法。"}]}, {"title_ja": "南ヨーロッパで山火事が猛威、大規模避難とツール・ド・フランスにも影響", "title_en": "Wildfires Rage Across Southern Europe, Forcing Evacuations and Disrupting Tour de France", "summary_ja": "ポルトガル、スペイン、フランス、ギリシャなどで山火事が広がり、2万ヘクタール以上が焼失、各地で大規模な避難が行われている。フランスではピレネー山脈での火災を受け、ツール・ド・フランスの第3ステージが観客なしで実施されることとなった。科学者たちは、こうした極端な気象現象の激化は化石燃料の燃焼による気候変動が原因だと指摘している。", "summary_en": "Wildfires have devastated over 20,000 hectares across Portugal, Spain, France, and Greece, forcing mass evacuations following deadly heat waves in May and June. In France, authorities banned spectators from a Tour de France stage through the Pyrenees due to fire danger. Scientists attribute the increasing severity of such extreme weather events to climate change driven by fossil fuel combustion.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/firefighters-battle-wildfires-across-southern-europe/a-77851007?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Firefighters battle wildfires across southern Europe\nJuly 6, 2026Wildfires across Portugal, Spain, France, Greece and other countries have forced mass evacuations and threatened the Tour de France.\nThe fires, which have already devastated more than 20,000 hectares (50,000 acres) of land, come as the region has just come out of major heat waves in May and June that have been blamed for thousands of deaths.\nFrench authorities ban spectators at Tour de France stage\nIn southwestern France, 10,500 people were told to evacuate their homes near Perpignan amid a wildfire in the Pyrenees that has ravaged more than 4,600 hectares.\nMonday's third stage of the Tour de France cycle race through the Pyrenees is to take part without spectators amid the threat of fire, authorities said.\nOnly riders and their team vehicles will be allowed on the 196-kilometer (122-mile) stage crossing from Spain into France.\nRegional prefect Pierre Regnault de la Mothe told reporters: \"I regret having to say this: It will be, in France at least, a stage of the Tour de France without spectators.\"\nAnother fire in a mountainous district of the southeastern Drome department is being combated by hundreds of firefighters.\nSpain, Greece and Portugal see major blazes\nIn the northeastern Girona region of Spain, a wildfire that erupted on Friday and threatened the tourist beaches of the Costa Brava has burnt out nearly 2,200 hectares (5,400 acres) of land and was still not under control on Monday.\nTemperatures in the country have risen to more than 40 degrees Celsius (104 degrees Fahrenheit) in some parts of the country, fueling fears of new blazes.\nIn Greece, a forest fire set alight two factories in Thessaloniki in the north of the country, with authorities to evacuating the surrounding area and issuing warnings to residents to keep windows closed.\nIn Portugal, a wildfire that devastated some 13,000 hectares of forest and scrub land in a northern district has reportedly been brought under control. Four regions in the country still remained on a heat alert on Monday.\nScientists agree that the burning of fossil fuels by humans is changing the climate in such a way that heat waves and other extreme weather phenomena are much more likely and severe, thus increasing the risk of both wildfires and flooding.\nEdited by: Zac Crellin\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google by clicking here and hitting the \"star\" or \"preferred\" button, so you'll always see our verified news first.", "translation_ja": "南ヨーロッパ全域で消防士たちが山火事と闘う\n\n2026年7月6日／ポルトガル、スペイン、フランス、ギリシャなどの山火事により大規模な避難が強いられ、ツール・ド・フランスにも脅威が及んでいる。\n\nすでに2万ヘクタール（5万エーカー）以上の土地を焼き尽くしたこれらの火災は、5月・6月に発生し数千人の死者をもたらしたとされる大規模熱波が落ち着いた直後に起きた。\n\n■フランス当局、ツール・ド・フランスのステージへの観客を禁止\n\nフランス南西部では、ピレネー山脈で発生した山火事がすでに4,600ヘクタール以上を焼き、ペルピニャン近郊の住民1万500人に避難命令が出された。\n\n月曜日に予定されているツール・ド・フランスのピレネー越え第3ステージは、火災の脅威のため観客なしで行われることになったと当局は発表した。\n\nスペインからフランスへと越境する196キロメートル（122マイル）のこのステージに入れるのは、選手とチームスタッフの車両のみとなる。\n\n地域担当の知事ピエール・レニョー・ド・ラ・モットは記者団に対し「こう言わなければならないのは残念ですが、フランス国内においては、今回のツール・ド・フランスのステージは観客なしとなります」と語った。\n\nフランス南東部のドローム県の山岳地帯でも別の火災が発生しており、数百人の消防士が対応にあたっている。\n\n■スペイン、ギリシャ、ポルトガルでも大規模な火災\n\nスペイン北東部のジローナ地方では、金曜日に発生しコスタ・ブラバの観光ビーチを脅かした山火事が約2,200ヘクタール（5,400エーカー）を焼き、月曜日時点でもまだ鎮火していない。\n\n国内の一部地域では気温が摂氏40度（華氏104度）を超え、新たな火災発生への懸念が高まっている。\n\nギリシャでは、北部テッサロニキで森林火災が工場2棟に延焼し、当局は周辺地域の住民に避難を呼びかけるとともに、窓を閉めるよう警告を発した。\n\nポルトガルでは、北部地区の森林と低木地帯を合わせて約1万3,000ヘクタールを焼いた山火事がようやく鎮火したと伝えられている。月曜日時点でも国内4つの地域が熱波警報下に置かれている。\n\n科学者たちは、人類による化石燃料の燃焼が気候を変化させ、熱波やその他の異常気象現象をはるかに起きやすく、かつ深刻なものにしており、山火事や洪水のリスクが増大していると一致して指摘している。\n\n編集：ザック・クレリン", "vocab": [{"word": "devastated", "definition": "「壊滅させた、甚大な被害を与えた」という意味の動詞。自然災害や戦争などが地域や社会に取り返しのつかないほどの損害をもたらす場合に使われる。"}, {"word": "ravaged", "definition": "「荒廃させた、略奪・破壊した」という意味の動詞。火災や嵐などが広範囲にわたって激しく破壊する様子を表す強い表現。"}, {"word": "evacuate", "definition": "「避難させる、退去させる」という意味の動詞。危険な場所から人々を組織的に安全な場所へ移動させる行為を指す。"}, {"word": "prefect", "definition": "「知事、長官」という意味の名詞。フランスなどの行政制度において、国が任命する地域の最高行政責任者を指す。"}, {"word": "phenomena", "definition": "「現象」を意味するphenomenonの複数形。科学的・社会的文脈で観察・研究される出来事や事象を指す学術的な語。"}, {"word": "fueling", "definition": "「（懸念・議論などを）煽る、助長する」という意味の比喩的表現。燃料が火を燃やすイメージから転じて、ある状況をさらに悪化・促進させることを表す。"}, {"word": "combated", "definition": "「戦った、対処した」という意味の動詞combatの過去形。問題や危険に対して積極的に闘う、または抑制しようとする行為を表すやや格式ある表現。"}]}, {"title_ja": "バローガンの出場停止処分が保留に——米国代表がW杯ラウンド16でベルギーと対戦", "title_en": "USMNT to Face Belgium in World Cup Round of 16 After Balogun's Red Card Ban Suspended", "summary_ja": "FIFAがフォラリン・バローガンの1試合出場停止処分を1年間の執行猶予付きで保留したため、米国男子代表はバローガンを起用した状態でベルギーとのW杯ラウンド16に臨む。この決定に対し、ベルギーサッカー協会とUEFAは「前例のない、理解不能な決断」と強く批判した。試合は月曜日午後8時（東部時間）、シアトルスタジアムで行われる。", "summary_en": "The U.S. men's national team will face Belgium in the World Cup round of 16 on Monday after FIFA suspended Folarin Balogun's one-game ban, placing it on probation for one year instead. The decision drew sharp criticism from Belgium's football association and UEFA, who called it 'unprecedented' and 'incomprehensible.' The match is scheduled for 8 p.m. ET at Seattle Stadium.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/GMA/Culture/usmnt-set-showdown-belgium-world-cup-round-16/story?id=134450328", "state_media": false, "category": "社会", "full_text": "USMNT set for showdown against Belgium in World Cup round of 16 match\nThe U.S. men's national team is set to face Belgium on Monday night in the World Cup round of 16 with star striker Folarin Balogun eligible to play after his one-game suspension was put on hold by FIFA.\nBalogun was given a red card during the July 1 game against Bosnia-Herzegovina after the U.S. player clashed with an opposing player's foot in the second half. The penalty automatically landed Balogun a one-game suspension. FIFA told ABC News at the time that the call was final and not able to be overturned or appealed.\nFIFA said on Sunday that \"the implementation of the match suspension is suspended for a probationary period of one year.\"\nThe football governing body added that if Balogun \"commits another infringement of a similar nature and gravity during the probationary period, the suspension shall be revoked and the sanction enforced without prejudice to any additional sanction imposed for the new infringement.\"\nThe Royal Belgium Football Association (RBFA) released a statement Sunday that said in part that it was \"astonished\" by FIFA's decision to allow Balogun to play in Monday's match against them.\n\"In order to safeguard the legitimate rights of all participating teams and to protect the fundamental principles of fair play in our sport, both at this FIFA World Cup and at future editions of the tournament, the RBFA is investigating all potential options,\" the RBFA statement further said.\nEuropean soccer's governing body, UEFA, said in a statement on Monday that a red card suspension is \"a principle embedded in regulations, which cannot be made subject to exceptions, let alone in the middle of a tournament where several other players have been in the same situation and regularly served their suspension.\"\n\"We express our disbelief at such an unprecedented, incomprehensible and unjustifiable decision,\" UEFA said.\nUSMNT head coach Mauricio Pochettino told reporters after last week's match, which the U.S. won 2-0, that Balogun was \"sad\" and \"disappointed\" about the call and that the clash was not intentional, according to ESPN.\nThe USMNT's victory was their first in the World Cup round of 32 since 2002 and only their second knockout round victory in program history.\nThe American men's best result at the World Cup was a third-place finish at the inaugural tournament all the way in 1930.\nThe U.S. team has been impressive in the 2026 tournament so far, finishing the group stage with a 2-1 record, with wins over Paraguay and Australia before a loss to Turkey, which occurred once the team had already secured a spot in the next round.\nBelgium, meanwhile, finished at the top of their group with one win and two draws and advanced from the round of 32 with a 3-2 win over Senegal.\nThe U.S. and Belgium are set to face off Monday at 8 p.m. ET from Seattle Stadium.\nABC News' Kelly McCarthy and Joe Simonetti contributed to this report.", "translation_ja": "米国男子代表、月曜夜のW杯ラウンド16でベルギーと激突\n\n米国男子サッカー代表（USMNT）は、月曜の夜にW杯ラウンド16でベルギーと対戦する予定だ。FIFAがスター・ストライカー、フォラリン・バローガンの1試合出場停止処分を保留したことで、バローガンの出場が可能となった。\n\nバローガンは7月1日のボスニア・ヘルツェゴビナ戦の後半、相手選手の足と接触したとして退場処分（レッドカード）を受けた。この処分により、バローガンは自動的に1試合の出場停止となった。FIFAは当初、ABCニュースに対し、この判定は最終的なものであり、覆したり上訴したりすることはできないと伝えていた。\n\nしかしFIFAは日曜日、「試合出場停止の執行は1年間の執行猶予期間中、停止される」と発表した。\n\nサッカーの統括団体はさらに、バローガンが「執行猶予期間中に同様の性質および重大性を持つ違反を再度犯した場合、執行猶予は取り消され、新たな違反に対して科されるいかなる追加処分にも関わらず、当該制裁が執行される」と付け加えた。\n\nベルギー王立サッカー協会（RBFA）は日曜日に声明を発表し、FIFAが月曜日の対戦相手であるベルギー戦へのバローガン出場を認めた決定に「驚愕している」と述べた。\n\n「すべての参加チームの正当な権利を守り、このFIFAワールドカップおよび将来の大会においてスポーツの公正競技（フェアプレー）の基本原則を保護するため、RBFAはあらゆる選択肢を検討している」と声明はさらに述べた。\n\n欧州サッカーの統括団体UEFAは月曜日の声明で、レッドカードによる出場停止は「規則に組み込まれた原則であり、例外の対象にすることはできない。ましてや、他にも同様の状況で出場停止処分を受け入れてきた選手が複数いる大会の最中においては、なおさらそうであるべきだ」と述べた。\n\n「このような前例のない、理解不能かつ正当化できない決定に対し、我々は深い困惑を表明する」とUEFAは述べた。\n\nUSTMTのマウリシオ・ポチェッティーノ監督は先週の試合（米国が2-0で勝利）後、記者たちに対し、バローガンはその判定について「悲しんでおり」「失望していた」と述べ、接触は意図的なものではなかったとESPNに語ったと伝えられた。\n\nUSTMTの今回の勝利は、2002年以来初めてとなるW杯ラウンド32（グループステージ後の最初のノックアウトラウンド）での勝利であり、プログラム史上わずか2度目のノックアウトラウンド勝利となった。\n\n米国男子代表のワールドカップにおける最高成績は、1930年に開催された第1回大会での3位入賞だった。\n\n米国代表は2026年大会でここまで好調で、グループステージを2勝1敗で突破した。パラグアイとオーストラリアに勝利した後、トルコに敗れたが、その時点ですでに次ラウンド進出を確定させていた。\n\n一方、ベルギーは1勝2分けでグループ首位を通過し、ラウンド32ではセネガルを3-2で下して勝ち上がった。\n\n米国とベルギーは月曜日の午後8時（東部時間）、シアトルスタジアムで対戦する予定だ。\n\nABCニュースのケリー・マッカーシーとジョー・シモネッティがこの記事に貢
