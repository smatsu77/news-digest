献した。", "vocab": [{"word": "probationary", "definition": "「試用期間の」「執行猶予の」という意味の形容詞。ある条件のもとで一定期間、処罰や制限の執行を猶予する状況を指す。法律やスポーツの規則においてよく使われる。"}, {"word": "infringement", "definition": "「違反」「侵害」を意味する名詞。規則、法律、または権利などを破ることを指し、スポーツや法律の文脈で頻繁に用いられる。"}, {"word": "unprecedented", "definition": "「前例のない」「今まで起きたことがない」を意味する形容詞。過去に同様の事例が存在しないほど異例であることを強調する際に使われる高度な語彙。"}, {"word": "incomprehensible", "definition": "「理解不能な」「把握しがたい」を意味する形容詞。論理的または感情的に受け入れがたく、理解できないほど不可解な事柄に対して用いられる。"}, {"word": "astonished", "definition": "「驚愕した」「非常に驚いた」を意味する形容詞。単なる「驚き（surprised）」よりも強い感情的衝撃を伴う状態を表す表現。"}, {"word": "showdown", "definition": "「対決」「決着をつける戦い」を意味するインフォーマルな名詞。スポーツや交渉など、勝敗や優劣が決まる重要な場面を劇的に表現する際に使われるイディオム的表現。"}, {"word": "safeguard", "definition": "「守る」「保護する」を意味する動詞または名詞。権利や利益、安全などを脅威から積極的に守ることを指し、法律・外交・スポーツの文脈でよく使われる。"}]}, {"title_ja": "ABCニュースライブ：24時間365日のニュース速報と生中継", "title_en": "ABC News Live: 24/7 Breaking News and Live Event Coverage", "summary_ja": "ABCニュースライブは、ニュース速報や生イベントを24時間体制で継続的に配信しています。国内外の主要ニュースをリアルタイムで報道し、最新情報を随時お届けします。ABCニュースの記者や特派員が最新ニュースを迅速に伝えます。", "summary_en": "ABC News Live provides continuous around-the-clock coverage of breaking news and live events. The stream delivers real-time reporting on major domestic and international stories as they develop. Viewers can access up-to-the-minute updates on the latest news from ABC News journalists and correspondents.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "チャーリー・カーク暗殺事件、容疑者の予備審問が開始", "title_en": "Preliminary Hearing Begins for Suspect in Charlie Kirk Assassination", "summary_ja": "ユタ州で23歳のタイラー・ジェームズ・ロビンソンを保守派活動家チャーリー・カーク暗殺の疑いで裁判にかけるのに十分な証拠があるかを判断する予備審問が月曜日に始まった。検察側は死刑を求刑する方針で、2025年9月の射殺事件前にロビンソンが残したとされる書面による自白を含む大量の証拠を持つと主張している。カーク家は審問に出席したが、悲しみの中でプライバシーへの配慮を求めた。", "summary_en": "A preliminary hearing began Monday in Utah to determine whether enough evidence exists to send Tyler James Robinson, 23, to trial for the alleged assassination of conservative activist Charlie Kirk. Prosecutors, who plan to seek the death penalty, say they have extensive evidence including an alleged written confession left by Robinson before the September 2025 shooting. Kirk's family attended the hearing but requested privacy as they grieve.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/US/prosecutors-present-evidence-charlie-kirks-alleged-assassin-tyler/story?id=134501574", "state_media": false, "category": "政治", "full_text": "Prosecutors to present evidence against Charlie Kirk's alleged assassin, Tyler Robinson\nProsecutors said they will seek the death penalty against Tyler Robinson.\nA crucial court hearing is expected to get underway on Monday to determine whether prosecutors have enough evidence to warrant a murder trial for the alleged assassin of conservative activist Charlie Kirk.\nUtah prosecutors have said they have a mountain of evidence against the suspect, 23-year-old Tyler James Robinson, and plan to seek the death penalty.\nThe state is expected to begin presenting its evidence on Monday at a preliminary hearing in the 4th District Court in Provo, Utah. The hearing is expected to last up to five days.\nKirk's widow, Erika Kirk, and his parents, Robert and Kathryn Kirk, are expected to attend the suspect's preliminary hearing, according to The Associated Press.\nThe Kirk family released a statement Monday morning, saying, \"Charlie was a beloved husband, son, brother, friend, and father.\"\n\"Every court proceeding serves as a painful reminder of his death and the loss that has irrevocably impacted our lives and the lives of his children,\" the family said. \"We remain deeply grateful for the support, prayers, and kindness we have received. This outpouring has sustained us during the darkest days of our lives.\"\nThe family said it will not be commenting further on the case: \"We ask for continued privacy as we navigate this process and immense grief.\"\nDistrict Judge Tony Graf will weigh the evidence presented by prosecutors and decide if there is enough to hold Robinson over for trial and whether prosecutors can proceed in seeking the death penalty.\nProsecutors need only to demonstrate that there are reasonable grounds to warrant a trial for Robinson. If Graf orders Robinson to proceed to trial, prosecutors must then prove beyond a reasonable doubt at a trial that the defendant is guilty of killing the 31-year-old Kirk.\nRobinson has been charged with aggravated murder, felony discharge of a firearm causing serious bodily injury, obstruction of justice, two counts of witness tampering and commission of a violent offense in the presence of a child.\nRobinson has yet to enter a plea to the charges, and his attorneys have not issued any statements on his guilt or innocence.\nThe fatal shooting of Kirk, who was the founder of the conservative youth movement Turning Point USA and a strong ally of President Donald Trump, occurred in September 2025 at an outdoor rally at Utah Valley University in Orem, Utah.\nOn Sept. 10, 2025, Kirk was holding the first stop of his \"The American Comeback Tour,\" which invited students on college campuses to debate hot-button issues. He was at an amphitheater on the campus of Utah Valley University taking a question about gun violence in America when a single shot rang out from a distance away, hitting him in the left side of his neck.\nKirk's security team immediately carried him to a vehicle and rushed him to a hospital, where he was pronounced dead.\nPolice investigators have said the shot that killed Kirk was fired from the rooftop of a building about 200 feet from where Kirk was speaking.\nRobinson allegedly fled the scene on foot, prompting a massive manhunt. He surrendered to authorities on the night of Sept. 11, 2025, after his father contacted law enforcement officials and told them he recognized his son in photographs of the suspect released by authorities, officials said.\nAccording to court documents, Robinson allegedly confessed in a note left for his roommate, who was also his romantic partner, that read, \"I had the opportunity to take out Charlie Kirk and I’m going to take it.\"\nOn the day of the shooting, Robinson allegedly sent his boyfriend a text message that said, \"Drop what you are doing, look under my keyboard,\" Utah County Attorney Jeff Gray said at a news conference following Robinson's arrest.\nRobinson's boyfriend told police that he found a handwritten letter under the keyboard, according to Gray, who said the note read in part, \"If you are reading this per my text, then I am so sorry. I left the house this morning on a mission, and set an auto text.\"\nGray said Robinson allegedly sent another message to his boyfriend, in which he allegedly said of Kirk, \"I had enough of his hatred. Some hate can't be negotiated out.\"", "translation_ja": "チャーリー・カークの暗殺者とされる人物に対し、検察が証拠を提示へ\n\n検察は、タイラー・ロビンソンに対して死刑を求刑する方針を示した。\n\n保守派活動家チャーリー・カークの殺害疑惑をめぐり、検察に殺人裁判を起こすのに十分な証拠があるかどうかを判断するための重要な公判期日が月曜日に開始される予定だ。\n\nユタ州検察は、容疑者である23歳のタイラー・ジェームズ・ロビンソンに対して「山のような証拠」を持っており、死刑を求刑する計画だと述べている。\n\n州側は月曜日、ユタ州プロボにある第4地区裁判所での予備審問において証拠の提示を開始する予定で、審問は最長5日間にわたる見込みだ。\n\nカークの未亡人エリカ・カーク、および両親のロバートとキャサリン・カークが、容疑者の予備審問に出席する予定だとAP通信が伝えた。\n\nカーク家は月曜日の朝、声明を発表し、「チャーリーは愛される夫であり、息子であり、兄弟であり、友人であり、父親でした」と述べた。\n\n「裁判手続きのたびに、彼の死と、私たちや子どもたちの人生に取り返しのつかない影響を与えたその喪失を、痛切に思い起こさせられます」と家族は語った。「私たちは、いただいたご支援、お祈り、そして温かいお心遣いに深く感謝しております。この温かいご支援が、人生で最も暗い日々を乗り越える力となっています。」\n\n家族は今後、この事件についてのコメントを控えるとし、「私たちがこの過程と計り知れない悲しみを乗り越えていく中で、引き続きプライバシーへのご配慮をお願いいたします」と述べた。\n\nトニー・グラフ地区判事は、検察側が提示した証拠を検討し、ロビンソンを裁判にかけるのに十分かどうか、また検察が死刑を求める手続きを進めてよいかどうかを判断する。\n\n検察は、ロビンソンを裁判にかけるための合理的な根拠があることを示せばよい。グラフ判事がロビンソンの裁判移送を命じた場合、検察は裁判において、被告が31歳のカークを殺害したことに合理的な疑いを超えた証明をしなければならない。\n\nロビンソンは、加重殺人、死傷事故を伴う銃器の不法発射、司法妨害、証人威迫2件、および子どもの前での暴力行為の罪で起訴されている。\n\nロビンソンはまだ起訴事実への答弁を行っておらず、弁護人も彼の有罪または無罪に関するいかなる声明も発表していない。\n\nカークは保守系青年運動「ターニング・ポイントUSA」の創設者で、ドナルド・トランプ大統領の強力な支持者だった。その致命的な銃撃事件は2025年9月、ユタ州オレムにあるユタ・バレー大学での野外集会中に発生した。\n\n2025年9月10日、カークは大学キャンパスを巡る「アメリカン・カムバック・ツアー」の最初の場所として、学生たちに議論を呼ぶ問題について討論するよう呼びかけていた。ユタ・バレー大学キャンパスの円形劇場でアメリカの銃暴力に関する質問を受けていたところ、離れた場所から一発の銃声が響き、銃弾が彼の首の左側に命中した。\n\nカークの警護チームは直ちに彼を車両に運び込み、病院へ急行したが、病院で死亡が確認された。\n\n捜査当局によると、カークを殺害した銃弾は、彼が演説していた場所から約60メートル離れた建物の屋上から発射されたという。\n\nロビンソンは徒歩で現場から逃走したとされ、大規模な捜索活動が展開された。彼の父親が当局に連絡し、当局が公開した容疑者の写真の中に息子を認識したと伝えた後、2025年9月11日の夜に当局に自首した。\n\n裁判所文書によると、ロビンソンはルームメイトでもあった交際相手に宛てた書き置きの中で、「チャーリー・カークを排除する機会があるので、それを実行するつもりだ」と自白したとされている。\n\n射殺当日、ロビンソンはボーイフレンドに「今すぐやっていることをやめて、キーボードの下を見て」というテキストメッセージを送ったとされると、ユタ郡検事のジェフ・グレイは逮捕後の記者会見で述べた。\n\nロビンソンのボーイフレンドは警察に対し、キーボードの下に手書きの手紙を見つけたと話したとグレイは語り、その手紙にはこう書かれていたと述べた。「私のテキスト通りにこれを読んでいるなら、本当にごめんなさい。今朝、ある使命を帯びて家を出て、自動送信メッセージを設定しました。」\n\nグレイによると、ロビンソンはボーイフレンドに別のメッセージも送り、カークについて「彼の憎悪にはもう十分だ。交渉によって解消できない憎しみもある」と述べたとされている。", "vocab": [{"word": "preliminary hearing", "definition": "予備審問。裁判を正式に開始するに足りる証拠があるかを判断するために行われる事前の法的手続き。刑事訴訟において重要な段階を指す。"}, {"word": "aggravated murder", "definition": "加重殺人。特別に悪質な状況（計画性や残虐性など）を伴う殺人罪で、通常の殺人より重い罪として扱われる法律用語。"}, {"word": "witness tampering", "definition": "証人威迫・証人買収。証人に対して証言を変えさせたり、証言を妨害したりする行為で、司法妨害の一形態として刑事罰の対象となる。"}, {"word": "irrevocably", "definition": "取り返しのつかない形で、という意味の副詞。元の状態に戻すことが不可能なほど永続的・根本的に影響を受けたことを強調する際に使われる。"}, {"word": "manhunt", "definition": "逃走した容疑者や犯罪者を捕まえるために行われる大規模な捜索活動。警察や当局が組織的に行う追跡作戦を指す。"}, {"word": "obstruction of justice", "definition": "司法妨害。捜査や裁判の進行を意図的に妨げる行為。証拠の隠滅や証人への圧力なども含む刑事罪。"}, {"word": "hot-button", "definition": "強い感情的反応や論争を引き起こしやすい問題や話題を指す慣用表現。政治・社会的に議論を呼ぶテーマに対して使われる。"}]}, {"title_ja": "エジプトでビザンツ時代の都市と古代墓群が発見される", "title_en": "Archaeologists Uncover Well-Preserved Byzantine City and Ancient Tombs in Egypt", "summary_ja": "エジプトの考古学者たちが、西部砂漠のダフラ・オアシスで4世紀のビザンツ時代の都市を良好な保存状態で発見した。バシリカ式教会、住宅区、見張り塔のほか、金貨や日常生活の記録が刻まれた陶器片などの遺物が出土した。また、アレクサンドリア近郊のマリーナ・エル・アラメインでは18基の古代墓が発見され、花崗岩の石棺や石膏製スフィンクス像、死者の口に納められた金片なども見つかった。", "summary_en": "Archaeologists in Egypt have discovered a well-preserved fourth-century Byzantine city in the Dakhla oasis of the western desert, featuring a basilica, residential quarters, watchtowers, and artifacts including gold coins and pottery inscribed with daily-life details. Separately, 18 ancient tombs were uncovered at Marina el-Alamein near Alexandria, yielding a granite sarcophagus, a plaster sphinx statue, and gold pieces placed in the mouths of the deceased. Both discoveries offer significant insights into urban life, funerary practices, and commerce during the Byzantine and Greco-Roman periods in Egypt.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/04/archaeologists-uncover-ancient-byzantine-city-in-egypts-western-desert", "state_media": false, "category": "経済", "full_text": "Archaeologists in Egypt have uncovered a well-preserved Byzantine-era city in the western desert.\nThe fourth-century quarters had residential and religious structures, including a basilica-style church in the Dakhla oasis. Archaeologists also found coins, pottery fragments and tools.\nSeparately, 18 ancient tombs were discovered at Marina el-Alamein, near Alexandria, which includes rock-cut and limestone tombs, pottery and a granite sarcophagus.\nThe tourism and antiquities ministry said the first discovery reveals details of daily life, urban development and economic activities when Egypt was part of the Byzantine empire.\nThe unearthed quarters included north-south thoroughfares intersected by east-west streets, forming open squares and public spaces, said Hisham el-Leithy, secretary general of the supreme council of antiquities.\nA basilica dating back to the mid-fourth century stands at the settlement’s head, overlooking its main streets, along with remains of two watchtowers to safeguard the outskirts, according to Mahmoud Massoud, who chairs the archaeological mission.\nThe oasis, located in Egypt’s western province of New Valley, is on Unesco’s tentative list, a step away from being added to the agency’s world heritage list.\nA heavily fortified structure with thick defensive walls, and many houses consisting of reception halls and vaulted roofs, were found in the area, Massoud added.\nAmong them were the house of Tisous, a church deacon, which dates to the second half of the fourth century. Archaeologists believe it served as a house church before the construction of the city’s basilica.\nArchaeologists also uncovered bread ovens, kitchens, grinding tools and bronze coins bearing portraits of Byzantine emperors, Latin inscriptions and Christian symbols.\nA group of gold coins unearthed dated to the reign of Roman emperor Constantius II, who ruled between 337 and 361, the ministry statement said.\nDiaa Zahran, head of the Islamic, Coptic and Jewish antiquities department, said they found a collection of about 200 pottery fragments which would have been used as writing material. The fragments, known as ostraca, have inscriptions detailing commercial transactions, correspondence and other details of daily life, according to Zahran.\nArchaeologists also found ancient tombs in the Marina el-Alamein archaeological site, which is about 62 miles (100km) west of the Mediterranean city of Alexandria.\nThe findings included 11 rock-cut tombs with an average depth of eight metres, and seven surface limestone-built tombs, the ministry said. It has brought the total tombs found at the site to 48.\nIn the site, archaeologists found pottery vessels, amphorae, lamps, plates, altars and limestone basins.\nThe mission chief, Eman Abdel-Khaliq, said they found a 2.5-metre-long granite sarcophagus, with skeleton remains that were being studied. Close to the sarcophagus, they found the remains of a plaster sphinx statue, she said.\nFour gold pieces were placed inside the mouths of some of the deceased, known as “the golden tongue”, which had been a practice associated with funerary beliefs of that era, Abdel-Khaliq said.\nMarina el-Alamein is an archaeological site close to the city of Alamein on Egypt’s northern coast, unearthed in 1986. Archaeologists believe the site was the ancient Greco-Roman port city of Leukaspis on the Mediterranean, which was built in the second century and thrived until the fourth century.", "translation_ja": "エジプトの考古学者たちが、西部砂漠でビザンツ時代の都市を良好な保存状態で発見した。\n\n4世紀の街区には住居や宗教的建造物が含まれており、ダフラ・オアシスにはバシリカ式の教会もあった。考古学者たちはコイン、陶器の破片、道具なども発見した。\n\n別の調査では、アレクサンドリア近郊のマリーナ・エル・アラメインで18基の古代墓が発掘され、岩窟墓や石灰岩製墓、陶器、花崗岩の石棺が含まれていた。\n\n観光・文化財省は、最初の発見によって、エジプトがビザンツ帝国の一部であった時代の日常生活、都市発展、経済活動の詳細が明らかになると述べた。\n\n最高遺物評議会事務局長のヒシャム・エル・レイシー氏によると、発掘された街区には南北方向の大通りと東西方向の街路が交差し、広場や公共空間が形成されていた。\n\n考古学ミッションを率いるマフムード・マスード氏は、4世紀半ばに遡るバシリカが集落の先頭に立ち、主要な街路を見下ろす位置にあり、周辺を守る2基の見張り塔の跡も残っていると語った。\n\nオアシスはエジプト西部のニューバレー県に位置し、ユネスコの暫定リストに登録されており、同機関の世界遺産リストへの追加まであと一歩のところにある。\n\n厚い防御壁を持つ強固な要塞構造物や、応接間とアーチ型天井を備えた多くの住宅も発見されたとマスード氏は付け加えた。\n\nその中には、教会助祭ティスス（Tisous）の家屋があり、4世紀後半に遡るとされる。考古学者たちは、この家屋が都市のバシリカ建設以前は家庭教会として機能していたと考えている。\n\nまた、パン焼き窯、台所、製粉道具、ビザンツ皇帝の肖像やラテン語の碑文、キリスト教のシンボルが刻まれた青銅貨幣も発見された。\n\n出土した金貨の一群は、337年から361年にかけて統治したローマ皇帝コンスタンティウス2世の治世に遡るものだと、文化財省の声明は述べた。\n\nイスラム・コプト・ユダヤ文化財部門長のディア・ザフラン氏は、文字を書く材料として使われていたとみられる約200点の陶器片（オストラカとして知られる）が発見されたと述べた。ザフラン氏によると、これらの破片には商取引、文書のやり取り、その他の日常生活の詳細を記した碑文が刻まれているという。\n\nまた、地中海の都市アレクサンドリアの西約100キロメートル（約62マイル）に位置するマリーナ・エル・アラメイン遺跡でも古代墓が発見された。\n\n発見物には、平均深さ8メートルの岩窟墓11基と、地上に建てられた石灰岩製墓7基が含まれており、同遺跡で発見された墓の総数は48基となった。\n\n遺跡では、陶器の器、アンフォラ（両手付き壺）、ランプ、皿、祭壇、石灰岩の水盤なども見つかった。\n\nミッション責任者のエマン・アブデル・ハリク氏は、長さ2.5メートルの花崗岩の石棺が発見され、内部に残っていた人骨が調査中だと述べた。石棺の近くには石膏製のスフィンクス像の遺物も見つかったという。\n\nアブデル・ハリク氏によると、死者の一部の口の中に金片4枚が納められており、「黄金の舌」として知られるこの慣習は、当時の埋葬信仰に関連した行為だったという。\n\nマリーナ・エル・アラメインは、エジプト北岸の都市アラメイン近くに位置する遺跡で、1986年に発掘が始まった。考古学者たちはこの遺跡が、2世紀に建設されて4世紀まで栄えた地中海沿岸の古代ギリシャ・ローマ時代の港湾都市レウカスピスであったと考えている。", "vocab": [{"word": "basilica", "definition": "初期キリスト教やローマ時代に建てられた長方形の大型公共建築物、または教会堂様式のこと。建築・歴史・宗教の文脈で頻繁に使われる専門用語。"}, {"word": "ostraca", "definition": "古代において文字を書く素材として使用された陶器や石灰岩の破片のこと（単数形：ostrakon）。考古学・古代史の文脈で用いられる学術的専門用語。"}, {"word": "sarcophagus", "definition": "石などで作られた棺または石棺を指す考古学・歴史用語。古代エジプトやギリシャ・ローマ文化の埋葬遺物を説明する際に使われる。"}, {"word": "amphorae", "definition": "古代ギリシャやローマで液体や食料の保存・輸送に使われた両側に取っ手のある大型陶製容器（単数形：amphora）。考古学的文脈で用いられる専門用語。"}, {"word": "tentative list", "definition": "ユネスコ世界遺産への登録を検討している候補地を示す暫定リストのこと。国際機関や外交・文化遺産保護の文脈で使われる専門的表現。"}, {"word": "funerary", "definition": "埋葬や葬儀に関連することを意味する形容詞。考古学・人類学・歴史学の文脈で使われる専門的語彙で、日常会話にはほとんど登場しない。"}, {"word": "thoroughfares", "definition": "人や車が通行できる主要な道路や大通りを指す名詞。都市計画・歴史・建築の文脈でよく使われるやや上級の語彙。"}]}, {"title_ja": "「状況は壊滅的だ」——ドローン攻撃にさらされるスーダンの都市で働く援助関係者たちの証言", "title_en": "Aid Workers Describe Worsening Drone Strikes on Sudan's El Obeid City", "summary_ja": "スーダンの都市エル・オベイドでは、準軍事組織「即応支援部隊（RSF）」によるドローン攻撃が激化し、病院や燃料補給所、発電所などの重要インフラが次々と破壊され、多数の死傷者が出ている。国連や人権団体は、昨年エル・ファシェルで起きた虐殺の再来を懸念し、地上攻撃が差し迫っていると警告している。国連人権高等弁務官は各国首脳に対し、人道的惨事を防ぐための緊急行動を強く求めた。", "summary_en": "The Sudanese city of El Obeid is facing intensifying drone attacks by the paramilitary Rapid Support Forces (RSF), killing dozens and destroying critical infrastructure including hospitals, fuel stations, and a power station. Aid workers and international observers warn of an imminent ground offensive and fear a repeat of the atrocities seen in El Fasher. The UN and human rights organizations have issued urgent calls for world leaders to intervene and prevent further mass atrocities.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/04/el-obeid-aid-workers-sudan-war-drone-strikes", "state_media": false, "category": "政治", "full_text": "Fatima has lost count of the number of drone attacks on the besieged city of El Obeid in Sudan, but said the attacks this past weekend were the most violent so far.\nThe drones hit schools and fuel stations, killing more than 20 people, including students, she said. “Over the past few months, seeing 40 or 45 drones is the norm. You can literally count them,” said the aid volunteer, whose name has been changed for fear of retribution.\nEl Obeid, a city of half a million people, is a key battleground in the war between the Sudanese Armed Forces (SAF) and the paramilitary Rapid Support Forces (RSF). Attacks mounted by the RSF have prompted the UN and other agencies to warn of the risk of atrocities.\nLocated between RSF-held areas in the western Darfur region and army-controlled regions in the east, El Obeid has suffered repeated drone strikes on its infrastructure. The army is fighting to stop the paramilitary group setting up another blockade after a siege in February last year.\nAt least 45 people were killed and 41 injured in 15 drone strikes in the city and surrounding areas from 6 June to 28 June, according to the UN human rights office. There are growing fears of a repeat of the massacre in the city of El Fasher last year, when RSF fighters went on a rampage after capturing the city at the end of an 18-month siege.\nAmnesty International released a report on Wednesday saying the RSF had committed ethnic cleansing and crimes against humanity in its campaign to capture El Fasher. An independent fact-finding mission for the UN had already said the RSF’s seizure of the city showed the “hallmarks of genocide” against non-Arab communities.\nOn Friday, Volker Türk, the UN high commissioner for human rights, addressed delegates in Geneva during an urgent debate of the UN human rights council called by the UK and backed by Germany, Ireland, Norway and the Netherlands.\nHe said: “The signs from El Obeid are clear and unmistakable: another human rights catastrophe is unfolding in Sudan.\n“This is not a drill. It is a red alert that needs to land on the desks of heads of state and government around the world. Their phones should be running hot in the coming days and weeks, with ideas on how to prevent atrocity crimes in El Obeid and in other places in Kordofan.”\nEl Obeid hosts an SAF infantry division and an airbase, in addition to about 100,000 refugees displaced by violence.\nExperts have highlighted significant concentrations of RSF troops around the city and warn of an imminent ground offensive. A report released on Monday by the Yale Humanitarian Research Lab found damage to electricity generation, fuel storage facilities and the main market that was “consistent with intentional bombardment of civilian infrastructure necessary for the sustainment of life”.\nThe report also noted an increase of more than 700 temporary structures at internally displaced persons camps in El Obeid in one month that was “consistent with a recent influx of highly vulnerable civilian populations to the city”.\nIt said the SAF has constructed about 30 miles (50km) of defensive positions – suggesting it expected a siege.\nNohad Eltayeb, a senior research assistant at the Acled conflict monitoring group, said it had recorded 27 drone strikes last month around El Obeid, the highest monthly total since the start of the conflict in 2023.\nIn a audio diary for the Avaaz human rights advocacy group, Fatima spoke of living life on the edge because of drone attacks on hospitals, fuel stations and other facilities. An attack last week struck the city’s main power station, causing blackouts in most of the city, she said. Drones have also hit people gathering to share Starlink internet connections when telecommunications networks are down, she added.\n“I cannot begin to describe how terrible the situation is right now,” Fatima said. “Even the way people talk at funerals is different. Instead of praying for the deceased, they would be talking about how they died.”\nAccording to Fatima, merchants have increased prices, saying their goods are targeted by drones on the way to El Obeid from other parts of the country or simply looted.\nAhlam, a humanitarian worker whose name has also been changed, said residents had become accustomed to pain, loss and fear from constant drone attacks. “In just the past two weeks, nearly every essential service and piece of critical infrastructure has been hit,” she said.\nShe added that some people had considered leaving the city, but attacks on fuel stations had driven up prices, making transport much more expensive. She fears devastating consequences if the conflict escalates, noting the already huge number of displaced people in the city.\nWill Davies, Sudan director at Avaaz, said the drone attacks had created an “extremely dire” situation in El Obeid. He said the city lacked the ethnic dynamics that were a factor in the El Fasher killings and there was unlikely to be a major ground offensive because “the evidence isn’t there in te", "translation_ja": "ファティマはスーダンの包囲された都市エル・オベイドへのドローン攻撃の回数を数えるのをとうの昔にやめてしまったが、この週末の攻撃はこれまでで最も激しいものだったと語った。\n\nドローンは学校や燃料補給所を直撃し、生徒を含む20人以上が死亡したという。「ここ数か月、40機や45機のドローンを目にするのは普通のことです。文字通り数えられるほどです」と、報復を恐れて名前を変えているこの援助ボランティアは語った。\n\n人口50万人の都市エル・オベイドは、スーダン国軍（SAF）と準軍事組織「即応支援部隊（RSF）」の間で繰り広げられる戦争の重要な戦場となっている。RSFによる攻撃を受けて、国連や他の機関は残虐行為のリスクについて警告を発している。\n\n西部のダルフール地方にあるRSF支配地域と東部の国軍支配地域の間に位置するエル・オベイドは、インフラへのドローン攻撃を繰り返し受けてきた。国軍は、昨年2月の包囲に続いて準軍事組織が新たな封鎖を敷くのを阻止しようと戦っている。\n\n国連人権事務所によると、6月6日から6月28日にかけて同市およびその周辺地域で15回のドローン攻撃があり、少なくとも45人が死亡、41人が負傷した。昨年RSF戦闘員が18か月に及ぶ包囲の末に都市を制圧した後に暴れ回り、大虐殺が起きたエル・ファシェルの悲劇が繰り返されることへの懸念が高まっている。\n\nアムネスティ・インターナショナルは水曜日、RSFがエル・ファシェル制圧作戦において民族浄化と人道に対する罪を犯したとする報告書を公表した。国連の独立した事実調査団はすでに、RSFによる同市掌握が非アラブ系コミュニティに対する「ジェノサイドの特徴」を示していると述べていた。\n\n金曜日、国連人権高等弁務官のフォルカー・テュルク氏は、英国が提唱しドイツ、アイルランド、ノルウェー、オランダが支持して開かれた国連人権理事会の緊急討論においてジュネーブの代表団に向けて演説した。\n\n同氏はこう述べた。「エル・オベイドからのサインは明確で疑いの余地がありません。スーダンでまた新たな人権の惨事が進行しています。\n\n「これは訓練ではありません。世界中の国家・政府首脳の机上に届かなければならない赤色警報です。エル・オベイドやコルドファンの他の地域における残虐犯罪を防ぐためのアイデアを携えて、彼らの電話はこれからの数日、数週間で熱くなるべきです。」\n\nエル・オベイドにはSAFの歩兵師団と空軍基地があり、さらに暴力によって避難した約10万人の難民が暮らしている。\n\n専門家たちは市周辺でのRSF部隊の著しい集結を指摘し、地上攻撃が差し迫っていると警告している。月曜日にイェール大学人道研究ラボが公表した報告書は、発電設備・燃料貯蔵施設・中央市場への被害が「生命維持に必要な民間インフラへの意図的な爆撃と一致している」と指摘した。\n\nまた同報告書は、エル・オベイドの国内避難民キャンプにおいて1か月で仮設構造物が700以上増加しており、それは「非常に脆弱な民間人が最近大量に流入したことと一致している」と述べた。\n\nさらに、SAFが約50キロ（30マイル）にわたる防衛陣地を構築していることも記されており、包囲戦を想定していたことがうかがえる。\n\nACLED（武力紛争・事件データプロジェクト）のシニア調査アシスタント、ノハド・エルタイェブ氏は、同団体が先月エル・オベイド周辺で27件のドローン攻撃を記録したと述べた。これは2023年の紛争開始以来、月間最多記録である。\n\n人権擁護団体アヴァーズ向けの音声日記の中で、ファティマは病院・燃料補給所・その他の施設へのドローン攻撃によって綱渡りのような生活を送っていると語った。先週の攻撃では市の主要な発電所が直撃され、市の大半が停電に陥ったという。通信ネットワークが遮断されている間、スターリンクのインターネット接続を共有するために集まった人々もドローンに狙われたと彼女は付け加えた。\n\n「今の状況がいかに壊滅的か、言葉では言い表せません」とファティマは言った。「葬儀での人々の話し方さえも変わってしまいました。故人のために祈る代わりに、どのように亡くなったかを話し合っているのです。」\n\nファティマによれば、商人たちは値段を引き上げており、その理由として、国内の他の地域からエル・オベイドへ向かう途中で商品がドローンに狙われたり、略奪されたりすると言っているという。\n\n名前を変えている人道支援ワーカーのアフラムは、住民たちが絶え間ないドローン攻撃による痛み、喪失、恐怖に慣れてしまったと語った。「ここ2週間だけで、ほぼすべての必須サービスと重要インフラが攻撃を受けました」と彼女は述べた。\n\n彼女はまた、街を離れることを検討している人もいるが、燃料補給所への攻撃が価格を押し上げ、交通費が大幅に高くなっていると語った。すでに市内に膨大な数の避難民がいることを踏まえ、紛争がさらにエスカレートした場合の壊滅的な結果を彼女は恐れている。\n\nアヴァーズのスーダン担当ディレクター、ウィル・デイヴィス氏は、ドローン攻撃によってエル・オベイドの状況は「極めて深刻」になっていると述べた。同市にはエル・ファシェルの殺戮の一因となった民族的な力学が欠けており、「証拠がない」ため大規模な地上攻撃は起きにくいと彼は語った（原文ここで途切れ）。", "vocab": [{"word": "besieged", "definition": "「包囲された」という意味の形容詞。軍事的・比喩的に四方を取り囲まれ、孤立させられた状態を指す。"}, {"word": "paramilitary", "definition": "「準軍事組織の」という意味の形容詞・名詞。正規軍に準じた組織や機能を持つが、国家の正式な軍隊ではない武装集団を指す。"}, {"word": "atrocities", "definition": "「残虐行為」「蛮行」を意味する名詞（複数形）。戦時中などに行われる非常に残酷で非人道的な行為を指す。"}, {"word": "ethnic cleansing", "definition": "「民族浄化」を意味する名詞句。特定の民族・宗教集団を強制追放や虐殺によって特定地域から排除しようとする行為を指す。"}, {"word": "hallmarks", "definition": "「特徴」「証拠」を意味する名詞（複数形）。ある物事が特定のカテゴリーや性質に属することを示す顕著な特徴を指す。"}, {"word": "sustainment", "definition": "「維持」「持続」を意味する名詞。特に軍事・人道的文脈で、生命や活動を継続させるために必要な補給・支援を指す。"}, {"word": "imminent", "definition": "「差し迫った」「今にも起こりそうな」を意味する形容詞。危険や出来事がごく近い将来に起こることが確実または非常に可能性が高い状況を表す。"}]}, {"title_ja": "英国、女性・女児向け海外教育プログラムをわずか2年で廃止", "title_en": "UK axes £45m overseas education programme for women and girls after just two years", "summary_ja": "英国政府は、アフリカ・アジア・中東全域で100万人の女児の就学継続を目指す4500万ポンド規模のSHEFEプログラムを、開始からわずか2年で廃止した。批判者たちは、この決定が英国政府の女性・女児への支援公約と矛盾すると訴えている。ユニセフは、国際的な教育援助の削減により、年内に600万人以上の子どもたちが就学できなくなるリスクがあると警告している。", "summary_en": "The UK government has cancelled the SHEFE programme, a £45m initiative designed to keep 1 million girls in school across Africa, Asia and the Middle East, just two years after its launch. Critics say the axing, driven by cuts to the UK aid budget, contradicts the government's stated commitment to women and girls globally. The move comes amid broader reductions to international education funding, with Unicef warning that 6 million more children risk being out of school by year's end.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/04/overseas-education-project-for-women-and-girls-axed-by-uk-after-two-years", "state_media": false, "category": "政治", "full_text": "A leading higher education programme, aimed at keeping 1 million girls in school across Africa, Asia and the Middle East, has been axed by the British government just two years after it was announced.\nThe scheme, Strengthening higher education for female empowerment (SHEFE), which was unveiled with some fanfare two years ago by the outgoing Conservative government, had a £45m budget to increase access to higher education for 1 million students worldwide. It has now had its tender withdrawn, the Foreign, Commonwealth and Development Office (FCDO) said.\nIn May, Yvette Cooper, the foreign secretary, stressed her commitment to women and girls, declaring they were a priority at the FCDO and that she was “determined to work across borders to ensure women’s safety is a worldwide priority”.\nBambos Charalambous, the Labour MP who chairs the all-party parliamentary group on global education, said he was concerned. “I’m alarmed that a flagship higher education programme designed to empower women and girls and help them achieve their potential appears to have been scrapped because of the aid cuts,” he said.\n“FCDO has acknowledged how such partnerships can transform lives, while also benefiting institutions here at home. It is vital to start thinking now about how to build back from the aid cuts to save similar projects.”\nThe programme was designed in part because girls who benefit from higher education are up to six times less likely to marry as children and are less likely to experience violence from a partner. Women who have advanced levels of learning also increase their earnings.\nPeople working in the international development and education sectors claimed the move to axe SHEFE was the latest decision to severely undermine the UK’s professed commitment to women and girls.\nThe Home Office has blocked new study visas for applicants from Afghanistan, Sudan, Myanmar and Cameroon, meaning many women whose opportunities to study in their own countries were restricted will miss out on life-changing opportunities. British universities earn large amounts of money from foreign students, who pay much higher fees than UK-born students.\nJoseph Nhan-O’Reilly, co-founder of the International Parliamentary Network for Education, said: “The government talks up its commitment to women and girls but at every turn it denies the world’s most marginalised girls the thing that everyone agrees has the biggest impact on their lives and that of their communities: access to higher education.”\nEarlier this year, the FCDO announced it was cancelling the tender for its planned Education for All programme in South Sudan, Nhan-O’Reilly said. The £150m scheme had been designed to support the education of girls and children with disabilities in one of the world’s poorest countries, with one of the highest rates of children out of education and the world’s fourth-lowest literacy rate.\nLast year, Charalambous wrote in the Independent that a UK programme in the Democratic Republic of the Congo, which had seen tens of thousands of girls going to school for the first time, was being abandoned. Educational work was also cut in Ethiopia, Sierra Leone, Nigeria and Zimbabwe, and the FCDO Girls’ Education Department lost 51% of its funding.\nA spokesperson at Bond, a UK network for organisations working in international development and humanitarian aid, said: “Any cuts to programmes that support women and girls, including through education, threaten to reverse hard-won progress on ending gender-based violence and exploitation, and advancing gender equality worldwide.\n“Last year, polling by More in Common found the majority of the UK public wanted programmes that protect women and girls’ safety to be shielded from cuts to the UK aid budget. We urge the foreign secretary to uphold her commitment to prioritising the safety, human rights and economic opportunity of women and girls around the world.”\nAccording to analysis by Unicef, international aid to education is projected to fall by $3.2bn (£2.4bn) by 2026 – a 24% drop. It estimated that 6 million more children risk being out of school by the end of the year, with 30% of them in humanitarian settings. This is equivalent to emptying every primary school in Germany and Italy combined.\nThe UK had previously been one of the champions of global education, said Nhan-O’Reilly, and the cuts announced last year closely followed those in the US. “These cuts can’t be seen on their own; they’ve set the tone and influenced the posture and level of commitment from many other donors,” he said.\nThe prime minister, Keir Starmer, announced last year that the UK aid budget would be cut from 0.5% of gross national income to 0.3% in 2027, its lowest level since records began. The UN target is for countries to give 0.7%, something the Conservative former prime minister David Cameron pledged to do in 2012 despite protests from his own party.\nThe cut in 2025 was a reversal of Labour manifesto pledges and led to the resignation of Ann", "translation_ja": "アフリカ、アジア、中東全域で100万人の女児の就学継続を目的とした主要な高等教育プログラムが、発表からわずか2年で英国政府によって廃止された。\n\n「女性のエンパワーメントのための高等教育強化（SHEFE）」と呼ばれるこの制度は、2年前に当時の保守党政権によって華々しく発表され、世界100万人の学生の高等教育へのアクセス拡大に向けて4500万ポンドの予算が組まれていた。しかし、外務・英連邦・開発省（FCDO）によると、入札が取り下げられたという。\n\n5月、外務大臣のイヴェット・クーパー氏は女性と女児への取り組みを強調し、FCDOにおいて最優先事項であると宣言したうえで、「女性の安全を世界的な優先課題とするため、国境を越えて取り組む決意がある」と述べていた。\n\n全党議会グループ（グローバル教育）の議長を務める労働党議員バンボス・カラランブス氏は懸念を示した。「女性と女児に力を与え、その潜在能力を発揮させるために設計された看板的な高等教育プログラムが、援助削減によって廃止されたように見えることに衝撃を受けています」と述べた。\n\n「FCDOはこのようなパートナーシップがいかに人々の人生を変え、国内の機関にも恩恵をもたらすかを認めてきました。援助削減から立て直し、同様のプロジェクトを守るための方策を今すぐ考え始めることが不可欠です。」\n\nこのプログラムは、高等教育を受けた女子が児童婚をする可能性が最大6倍低くなり、パートナーからの暴力を受けにくくなるという知見を背景に設計された。高度な教育を受けた女性は収入も増加する。\n\n国際開発・教育分野の関係者たちは、SHEFEの廃止は、女性と女児への英国の公約を著しく損なう一連の決定の最新例だと主張している。\n\n内務省はアフガニスタン、スーダン、ミャンマー、カメルーンからの新規留学ビザ申請を停止しており、自国での就学機会が制限されていた多くの女性が、人生を変えるような機会を逃すことになっている。英国の大学は留学生から多額の収入を得ており、留学生は英国生まれの学生よりはるかに高い学費を支払っている。\n\n国際議会教育ネットワークの共同創設者ジョセフ・ナン＝オライリー氏は次のように述べた。「政府は女性と女児への取り組みを声高に語りますが、あらゆる場面で、世界で最も疎外された女子たちから、誰もがその人生とコミュニティに最大の影響を与えると認める唯一のもの、すなわち高等教育へのアクセスを奪い続けています。」\n\n今年初め、FCDOは南スーダンにおける「すべての人のための教育」プログラムの入札取り消しを発表したとナン＝オライリー氏は言う。1億5000万ポンド規模のこの制度は、世界最貧国のひとつであり、学齢期の子どもの就学率が極めて低く、識字率が世界で4番目に低い南スーダンにおいて、女子および障害のある子どもたちの教育支援を目的としていた。\n\n昨年、カラランブス氏はインディペンデント紙への寄稿の中で、コンゴ民主共和国で何万人もの女子が初めて学校に通えるようになった英国のプログラムが廃止されようとしていると訴えた。教育関連の活動はエチオピア、シエラレオネ、ナイジェリア、ジンバブエでも削減され、FCDOの女子教育部門は予算の51%を失った。\n\n国際開発・人道支援分野で活動する英国の組織ネットワークであるBondのスポークスパーソンは次のように述べた。「教育を含め、女性と女児を支援するプログラムへのいかなる削減も、ジェンダーに基づく暴力や搾取の撲滅、そして世界規模での男女平等推進において積み重ねてきた成果を逆行させる恐れがあります。」\n\n「昨年のMore in Commonによる調査では、英国国民の大多数が、女性と女児の安全を守るプログラムを英国援助予算の削減から守ってほしいと望んでいることが示されました。私たちは外務大臣に対し、世界の女性と女児の安全、人権、経済的機会を優先するという公約を守るよう強く求めます。」\n\nユニセフの分析によると、国際的な教育援助は2026年までに32億ドル（約24億ポンド）、率にして24%減少する見通しだ。年内に600万人以上の子どもたちが就学できなくなるリスクがあり、そのうち30%が人道的危機の状況にあると推計される。これはドイツとイタリアの全小学校を合わせた規模の子どもたちが教育から締め出されることに相当する。\n\n英国はかつてグローバル教育の牽引役のひとつだったとナン＝オライリー氏は述べ、昨年発表された削減は米国の削減に続く形となったと指摘した。「これらの削減は単独で見ることはできません。多くの他のドナーの姿勢や支援水準に対し、基調を設定し影響を与えてきたのです。」\n\n首相のキア・スターマー氏は昨年、英国の援助予算を国民総所得の0.5%から2027年までに0.3%に削減すると発表した。これは記録が残る中で最低の水準となる。国連の目標は各国が0.7%を拠出することであり、保守党の元首相デービッド・キャメロン氏は2012年に党内の反対を押し切ってこれを公約していた。\n\n2025年のこの削減は労働党のマニフェストの公約を覆すものであり、アン（氏の辞任につながった）。", "vocab": [{"word": "fanfare", "definition": "大々的な宣伝や華々しい発表を意味する名詞。特に重要な出来事を大げさに告知する際に使われる表現。"}, {"word": "tender", "definition": "政府や企業が業者に対して仕事の入札を募ること、またはその入札書類を指すビジネス・行政用語。「withdraw a tender（入札を取り下げる）」のように使われる。"}, {"word": "professed", "definition": "表向きに主張された・公言されたという意味の形容詞で、実態と異なる可能性を示唆するニュアンスが含まれる。「professed commitment（公言された公約）」のように使われる。"}, {"word": "marginalised", "definition": "社会的・経済的に周縁化された、主流から排除された状態を表す形容詞。社会科学や国際開発の文脈で頻繁に用いられる。"}, {"word": "humanitarian", "definition": "人道的な、または人道支援に関連するという意味の形容詞・名詞。「humanitarian settings（人道的危機の状況）」のように国際援助の文脈で使われる専門用語。"}, {"word": "empowerment", "definition": "個人や集団が自律性・権限・能力を高めることを意味する名詞。特にジェンダー・国際開発の文脈で「女性のエンパワーメント」として使われる重要語。"}, {"word": "literacy", "definition": "読み書きの能力・識字率を意味する名詞。「literacy rate（識字率）」の形で教育・開発分野の議論で頻出する技術的用語。"}]}, {"title_ja": "イスラエルのドローン攻撃でレバノンで少なくとも4人死亡、停戦中も攻撃継続", "title_en": "Israeli drone strike kills four in Lebanon amid ceasefire violations", "summary_ja": "イスラエルのドローンがレバノン南部で車両を攻撃し、校長、その母親、家事労働者、シリア人市民の少なくとも4人が死亡した。この攻撃は、米国とイランが仲介した停戦合意（6月21日発効）にもかかわらず発生した。イスラエルはヒズボラの拠点を標的にしていると主張する一方、双方は停戦違反で互いを非難している。", "summary_en": "An Israeli drone struck a vehicle in southern Lebanon, killing at least four people including a school principal, her mother, a domestic worker, and a Syrian national. The attack occurred despite a ceasefire agreement that took effect on June 21, brokered as part of a broader US-Iran deal to end regional conflict. Israel says it continues to target Hezbollah sites, while both sides accuse each other of violations.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/6/israeli-attack-on-vehicle-in-lebanon-kills-at-least-four?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Israeli attack on vehicle in Lebanon kills at least four\nIsrael has continued to launch strikes on targets in southern Lebanon despite a US-brokered ceasefire agreement signed two weeks ago.\nAn Israeli attack on a vehicle in southern Lebanon has killed at least four people, according to Lebanese state media.\nThe official National News Agency (NNA) said on Monday that a school principal, her mother, a foreign domestic worker and a Syrian citizen were killed when an Israeli drone targeted the car they were travelling in as they returned from checking on their family home in Nabatieh al-Fawqa.\nRecommended Stories\nlist of 3 items- list 1 of 3The Lebanon-Israel agreement is paving the way for the next war\n- list 2 of 3‘Will not leave’: Is Israel killing the US-Iran MoU by staying in Lebanon?\n- list 3 of 3Psychological toll mounts as Lebanese villages erased by Israel’s war\nIsrael has continued to launch intermittent strikes on southern Lebanon, particularly in the Nabatieh area, despite a two-week-old ceasefire agreement, saying it is targeting Hezbollah sites and fighters. Both sides have accused each other of violations.\nAn agreement signed by the United States and Iran on ending the regional war last month also established a ceasefire in Lebanon, which began on June 21.\nHezbollah joined the US-Israel war with Iran on March 2 by firing rockets at Israel to avenge the killing of Iran’s Supreme Leader Ali Khamenei.\nLebanese authorities said Israeli attacks since then have killed at least 4,300 people.\nAccording to the United Nations, more than 640,000 displaced people have returned home in Lebanon since June 22, after authorities said the conflict had displaced more than one million.", "translation_ja": "イスラエルのレバノン南部での車両攻撃、少なくとも4人死亡\n\nイスラエルは、米国が仲介した停戦合意が締結されてから2週間が経過した現在も、レバノン南部の標的への攻撃を続けている。\n\nレバノン国営メディアによると、イスラエルによる車両への攻撃でレバノン南部において少なくとも4人が死亡した。\n\n公式通信社NNA（国家通信社）は月曜日、ある学校の校長とその母親、外国人家事労働者、そしてシリア人市民の1人が、ナバティエ・アル・ファウカーにある家族の家の様子を確認して帰宅途中に乗っていた車がイスラエルのドローンに狙われ死亡したと伝えた。\n\nイスラエルはヒズボラの拠点や戦闘員を標的にしていると主張しながらも、2週間前に締結された停戦合意にもかかわらず、レバノン南部、特にナバティエ地区への散発的な攻撃を続けている。双方は互いに停戦違反を非難している。\n\n先月、米国とイランが署名した地域戦争終結に関する合意により、レバノンでの停戦も確立され、6月21日に発効した。\n\nヒズボラは3月2日、イランの最高指導者アリー・ハメネイー師の殺害への報復としてイスラエルにロケット弾を発射し、米国・イスラエルとイランの戦争に参戦した。\n\nレバノン当局によると、それ以来イスラエルの攻撃によって少なくとも4,300人が死亡したとされている。\n\n国連によると、当局が紛争によって100万人以上が避難を余儀なくされたと発表して以降、6月22日以降にレバノンで64万人以上の避難民が帰還したという。", "vocab": [{"word": "intermittent", "definition": "断続的な、不定期に繰り返されるという意味。「intermittent strikes（断続的な攻撃）」のように、一定の間隔ではなく時々発生する事象を表す形容詞。"}, {"word": "brokered", "definition": "（合意や取引などを）仲介・斡旋したという意味の形容詞・動詞の過去形。「US-brokered ceasefire（米国が仲介した停戦）」のように外交文脈で頻繁に使用される。"}, {"word": "ceasefire", "definition": "停戦を意味する名詞で、武力衝突の当事者間で戦闘行為を一時停止することに合意した状態を指す。国際政治・軍事報道で頻出する専門用語。"}, {"word": "avenge", "definition": "（被害や侮辱に対して）復讐する、仇を討つという意味の動詞。「to avenge the killing（殺害の報復をする）」のように、意図的な報復行為を表す際に用いられる。"}, {"word": "domestic worker", "definition": "家事労働者を指す名詞句で、家庭内で雇用され清掃・調理・育児などを行う労働者のこと。移住労働者の権利問題などの文脈でよく使われる表現。"}, {"word": "displaced", "definition": "（戦争・災害などによって）住む場所を追われた、避難を強いられたという意味の形容詞。「displaced people（避難民）」として人道・難民問題の報道で広く使われる。"}]}, {"title_ja": "米国のイスラエルへの軍事支援を法制化することの危険性", "title_en": "The Dangers of Permanently Embedding US Military Aid to Israel in Law", "summary_ja": "トム・コットン上院議員と親イスラエル派の同盟議員たちは、米国のイスラエルへの軍事支援を国防総省の制度的枠組みに組み込む立法を推進しており、将来の指導者がこの政策を見直すことを困難にしようとしている。この動きは、380億ドルの10年間にわたる米イスラエル軍事支援覚書が2028年に失効に近づく中で起きている。批評家たちは、この戦略が必ず通過しなければならない国防予算法案に条項を埋め込むことで、民主的な審議を意図的に回避するものだと主張している。", "summary_en": "US Senator Tom Cotton and pro-Israel allies are pushing legislation that would institutionalize US military aid to Israel within the Pentagon's framework, making it harder for future leaders to reconsider the policy. This effort comes as the 10-year, $38 billion US-Israel military aid memorandum nears expiration in 2028 and American public opinion on Israel grows increasingly critical. Critics argue the strategy deliberately bypasses democratic deliberation by embedding provisions in must-pass defense bills.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/opinions/2026/7/6/the-pitfalls-of-institutionalising-us-military-aid-to-israel?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "The pitfalls of institutionalising US military aid to Israel\nShielding US commitments to Israel from congressional scrutiny would be harmful for both countries.\nUS Senator Tom Cotton and pro-Israel allies are pursuing problematic legislation that has largely gone under the radar of most mainstream media. If passed, these bills and amendments would embed the US-Israel security relationship more deeply within the Pentagon’s institutional framework, making it substantially harder for future presidents and Congresses to reconsider one of America’s most consequential foreign policy commitments.\nThis comes at a crucial time. The 10-year Memorandum of Understanding between the US and Israel which grants the latter $38bn in military aid is expiring in 2028. At this time, Washington should be discussing whether the arrangement continues to serve American interests, whether future aid should carry conditions, and whether the transformed Middle East warrants a different approach. Instead, Senate Republicans are building a legislative architecture that could preclude any change in policy.\nTheir strategy is trying to bypass the traditional foreign aid and military cooperation process by embedding amendments in large budget bills that have to pass. For example, a section of the National Defense Authorization Act (NDAA) for fiscal year 2027 would establish permanent integration of Israeli technology into US military research, procurement and manufacturing.\nSenator Cotton’s companion legislation, which is embedded into an intelligence authorisation bill, requires the president to expand US-Israeli intelligence cooperation on a list of subjects. It also restricts presidential authority to pause or limit intelligence-sharing. If these bills are passed with the amendments proposed by Cotton and his allies, foreign policy flexibility would give way to statutory permanence.\nSupporters present these initiatives as routine improvements to an indispensable alliance. Their timing suggests otherwise. For decades, unconditional military aid to Israel attracted little opposition in Washington. That bipartisan consensus has begun to fracture.\nThe war in Gaza has produced unprecedented civilian destruction, repeated humanitarian crises, allegations of violations of international humanitarian law and growing diplomatic isolation for Israel. American opinion has shifted accordingly.\nBy October 2025, the Pew Research Center found that 33 percent of Americans believed the United States was providing too much military support to Israel; 23 percent thought it was “about right”; 8 percent thought it was not enough. A June 2026 survey by Quinnipiac University found that 48 percent of Americans thought their government was supporting Israel “too much”.\nNegative views of Israel among Americans have also spiked. The latest Pew Research poll shows 60 percent of Americans holding unfavourable views of Israel, up from 53 percent last year.\nWithin Congress, lawmakers who once treated military assistance as politically untouchable increasingly advocate conditions, restrictions or reductions.\nIt is precisely because the politics are changing that the legislative strategy has shifted from defending aid on its merits to redesigning the process by which it is approved. By embedding permanent cooperation mechanisms and statutory limits on presidential discretion inside the annual defence authorisation bill—a measure Congress cannot realistically allow to fail—Republicans raise the political cost of challenging unconditional assistance.\nLegislators are forced into an impossible choice: accept provisions they oppose or risk accusations of undermining national security. Procedural necessity quietly replaces democratic deliberation. This is not simply legislative craftsmanship. It is entrenchment by design.\nThe constitutional implications extend well beyond Israel. Congressional authority over appropriations exists to ensure that foreign policy remains accountable to elected representatives. Alliances evolve, governments change, and strategic interests shift. Military assistance and cooperation should therefore remain subject to periodic review, rather than becoming embedded in bureaucratic structures that future lawmakers struggle to alter.\nYet in recent years, nearly every proposal to condition military aid, strengthen human rights reporting, tighten oversight of weapons transfers or increase transparency over the use of American arms has failed in the face of overwhelming Republican opposition. Rather than defend unconditional aid through persuasion, the party increasingly seeks to minimise opportunities for meaningful debate.\nThe strategy also aligns closely with the long-standing objective of Israeli Prime Minister Benjamin Netanyahu and successive Israeli governments: to make American support as independent as possible from shifts in American politics. Institutionalising support before demographic and electoral change reshapes Congress has become critical", "translation_ja": "米国のイスラエルへの軍事支援を制度化することの落とし穴\n\n米国のイスラエルへのコミットメントを議会の監視から切り離すことは、両国にとって有害である。\n\nトム・コットン上院議員と親イスラエル派の同盟議員たちは、主流メディアのレーダーからほぼ外れた場所で、問題をはらんだ立法を推進している。これらの法案や修正案が可決されれば、米国とイスラエルの安全保障関係は国防総省の制度的枠組みにより深く組み込まれ、将来の大統領や議会がアメリカの最も重大な外交政策上のコミットメントの一つを再考することが著しく困難になる。\n\nこれは極めて重要な時期に起きている。イスラエルに対して380億ドルの軍事支援を付与する米国とイスラエルの10年間の覚書（MOU）は2028年に失効する。この時期にこそ、ワシントンはこの取り決めが引き続きアメリカの利益に資するかどうか、将来の支援に条件を設けるべきかどうか、そして変容した中東が異なるアプローチを必要としているかどうかについて議論すべきだ。ところが代わりに、上院共和党員たちはいかなる政策変更をも事実上封じ込めかねない立法的枠組みを構築しようとしている。\n\n彼らの戦略は、通過が義務付けられている大型予算法案に修正条項を埋め込むことで、従来の対外援助・軍事協力プロセスを回避しようとするものだ。たとえば、2027会計年度の国防権限法（NDAA）のある条項は、イスラエルの技術を米軍の研究、調達、製造に恒久的に統合することを定めるものとなっている。\n\nコットン議員の対応立法は情報権限付与法案に埋め込まれており、大統領に対して特定のテーマに関する米イスラエル間の情報共有協力を拡大することを求めるとともに、情報共有を一時停止または制限する大統領の権限を制約する内容となっている。コットン議員とその同盟議員が提案するこれらの修正条項が可決されれば、外交政策上の柔軟性は法定の恒久性に取って代わられることになる。\n\n支持者たちはこれらの取り組みを、不可欠な同盟関係に対する日常的な改善として提示している。しかし、そのタイミングは別の意図を示唆している。数十年にわたり、イスラエルへの無条件の軍事支援はワシントンでほとんど反対を受けることがなかった。そのような超党派的合意は崩れ始めている。\n\nガザでの戦争は、前例のない規模の市民の犠牲、繰り返される人道的危機、国際人道法違反の疑惑、そしてイスラエルに対する外交的孤立の深まりをもたらした。アメリカ世論もそれに応じて変化している。\n\n2025年10月、ピュー・リサーチ・センターは、アメリカ人の33パーセントが米国はイスラエルに対して過剰な軍事支援を行っていると考えており、23パーセントが「適切な水準」、8パーセントが「不十分」と答えたことを明らかにした。2026年6月のクイニピアック大学による調査では、アメリカ人の48パーセントが自国政府はイスラエルを「支援しすぎている」と考えていることが分かった。\n\nアメリカ人のイスラエルに対する否定的な見方も急増している。ピュー・リサーチの最新の世論調査によれば、アメリカ人の60パーセントがイスラエルに対して好意的でない見方を持っており、これは昨年の53パーセントから上昇している。\n\n議会内でも、かつて軍事支援を政治的に手の届かない問題として扱っていた議員たちが、条件の付与、制限、あるいは削減を主張するケースが増えている。\n\nまさに政治的状況が変化しているからこそ、立法戦略は支援をその価値によって守ることから、支援が承認されるプロセスを再設計することへとシフトしてきた。恒久的な協力メカニズムと大統領裁量に対する法的制限を、議会が現実的に否決することのできない年次国防権限法の中に埋め込むことで、共和党は無条件支援に異議を唱えるための政治的コストを引き上げようとしている。\n\n議員たちは不可能な選択を迫られる。自らが反対する条項を受け入れるか、国家安全保障を損なっているという非難のリスクを冒すか、だ。手続き上の必要性が、民主的な審議をひっそりと置き換えていく。これは単なる立法の巧みさではない。設計による制度化だ。\n\nこの憲法上の含意はイスラエル問題をはるかに超えたところに及ぶ。歳出に関する議会の権限は、外交政策が選挙で選ばれた代表者に対して説明責任を果たし続けることを保証するために存在する。同盟関係は進化し、政府は交代し、戦略的利益は変化する。軍事支援と協力は、したがって、将来の議員が変更するのに苦労するような官僚的な構造に埋め込まれるのではなく、定期的な見直しに服すべきだ。\n\nしかし近年、軍事支援に条件を付ける、人権報告を強化する、武器移転に対する監視を強化する、あるいはアメリカの兵器の使用に関する透明性を高めるというほぼすべての提案が、圧倒的な共和党の反対に直面して失敗に終わっている。無条件支援を説得によって守る代わりに、党は意義ある議論の機会を最小化しようとすることが増えている。\n\nこの戦略はまた、アメリカの支援をアメリカの政治の変動から可能な限り独立したものにするというベンヤミン・ネタニヤフ首相と歴代イスラエル政府の長年の目標とも緊密に一致している。人口動態と選挙の変化が議会を再形成する前に支援を制度化することが、不可欠となっている。", "vocab": [{"word": "institutionalising", "definition": "（政策や慣行を）制度的な枠組みに組み込み、恒久的・公式なものにすること。政治・行政の文脈で、特定の取り決めを変更しにくい構造に定着させる際に用いられる。"}, {"word": "entrenchment", "definition": "立場や制度がより強固に固定化され、変更や除去が困難になること。政治的文脈では、権力や政策が既成事実として深く根付いた状態を指す。"}, {"word": "memorandum of understanding", "definition": "二者間の合意事項を文書化した覚書（MOU）。法的拘束力は条約ほど強くないが、政府間の協力関係の枠組みを定める際に広く使われる外交・行政用語。"}, {"word": "statutory permanence", "definition": "法律（statute）によって定められた恒久性のこと。行政命令や慣行と異なり、議会の立法によって固定された状態であり、変更には改めて立法措置が必要となることを意味する。"}, {"word": "appropriations", "definition": "議会が特定の目的のために政府支出を公式に承認・割り当てる行為、またはその資金のこと。米国憲法上、議会が持つ重要な権限の一つであり、外交政策の民主的統制の手段となる。"}, {"word": "bipartisan", "definition": "二大政党（民主党と共和党）双方の支持を得た、または両党が協力して行う状態を指す政治用語。党派を超えた合意や協力関係を表す際に使われる。"}, {"word": "preclude", "definition": "ある行動や結果が起こる可能性を事前に排除・阻止すること。法的・政策的文脈で、特定の選択肢を封じてしまうような措置を述べる際に用いられるフォーマルな語。"}]}, {"title_ja": "バーナムの首相就任でパランティアの3億3000万ポンドNHS契約に暗雲", "title_en": "Burnham's Rise Could Threaten Palantir's £330m NHS Contract and UK Government Ties", "summary_ja": "労働党党首として7月17日にも就任が見込まれるアンディ・バーナムが、パランティア・テクノロジーズへの政府契約を見直す意向と報じられている。前任のスターマー政権が米国AI企業を積極的に誘致したのとは対照的に、バーナムの顧問たちは英国企業を優先するAI戦略を策定中だ。バーナムが市長を務めたグレーター・マンチェスターはパランティアに一切契約を与えず、地域のNHS機関も独自の分析インフラを構築してきた。", "summary_en": "Andy Burnham, set to become UK Labour leader as early as July 17, is reported to be considering blocking Palantir Technologies from government contracts, including a £330m NHS deal. Unlike his predecessor Keir Starmer, who actively courted US AI firms, Burnham's advisers are developing an AI strategy prioritising British companies. His Greater Manchester administration never awarded Palantir a contract, and local NHS bodies built their own analytics systems instead.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/6/from-manchester-to-downing-street-what-burnham-could-mean-for-palantir?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "From Manchester to Downing Street: What Burnham could mean for Palantir\nA 330 million pound NHS contract – and Palantir’s wider role in UK government – hangs on Andy Burnham’s next move.\nLondon, United Kingdom – Should Andy Burnham enter Downing Street as early as July 17, if he is confirmed unopposed as Labour leader, one of his most consequential early decisions will have nothing to do with defence spending, immigration, or the economy.\nIt will concern a seven-year 330-million-pound ($440m) contract between NHS England and Palantir Technologies, a leading defence and intelligence software firm in the United States that received no contracts from Burnham’s Greater Manchester administration during his nine years as mayor.\nRecommended Stories\nlist of 4 items- list 1 of 4Starmer couldn’t master the media. Can Burnham?\n- list 2 of 4UK’s likely next leader Andy Burnham vows to fully fund defence plans\n- list 3 of 4Varoufakis on Palantir, AI warfare, and the rise of tech lordism\n- list 4 of 4‘Potential security risk’: Unpacking the UK’s trust issues with Palantir\nThe ramifications of such a decision could extend well beyond the NHS.\nMedia reports surfaced last week that Burnham is minded to hold that line with Palantir across all of the UK government when he arrives in Downing Street.\nWhen approached by Al Jazeera, an Andy Burnham spokesperson said: “We’re not going to comment on individual government procurement contracts or companies and there are legal processes that must be followed.\n“However, in general, Andy’s guiding principles on procurement are that we need to be getting value for money for the taxpayer and that we need to be safeguarding people’s data and British interests.”\nFor a company that has spent six years embedding itself across several public sector entities – the NHS, the Ministry of Defence, the Home Office, the Financial Conduct Authority – that posture is a real shift from the outgoing Labour administration led by Keir Starmer.\nStarmer’s government actively courted US-based AI companies championed by the former UK ambassador to Washington, Peter Mandelson.\nAccording to the Financial Times, which cited people briefed on the discussions, Burnham’s advisers, including former tech minister Josh Simons, are working with researchers Antonio Weiss and Martha Dacombe on a new AI strategy prioritising British companies and workers.\nThe story of how we got here runs through Manchester.\nThe Manchester precedent\nBurnham served as Mayor of Greater Manchester from 2017 until June, when he returned to Westminster via the Makerfield by-election.\nUnder his leadership, the Greater Manchester Combined Authority issued no contracts to Palantir. Greater Manchester Police has separately confirmed it did not have a Palantir contract in the past five years.\nThe more instructive precedent, though, is in the NHS – an institution Burnham has no direct mayoral authority over, but shaped politically through Greater Manchester’s landmark health devolution settlement.\nRather than adopt the NHS England-mandated Federated Data Platform, built on Palantir’s Foundry software, Greater Manchester’s NHS leaders spent six years building their own analytics infrastructure instead. That became a proof of concept, which allies now cite nationally: effective NHS data management, they argue, does not require Palantir.\nIn May, Al Jazeera spoke to the Good Law Project about its concerns that Palantir was a “potential security risk”.\nSome campaigners have interpreted recent political signalling from Burnham’s camp as supportive of their position, although a Good Law Project spokesperson said it has had no direct contact with him or his team.\nThe political context\nIn his first major speech since returning to Westminster as an MP, Burnham said he wanted social value to weigh more heavily in government procurement decisions. The reasoning, according to those close to him, is as much political as ethical.\nReports have described concern within his camp that “unfettered tech boosterism” risks alienating voters already uneasy about how much of the state now runs on American software.\nUnderneath that concern sits a more specific worry: that a company built to serve defence and intelligence clients does not necessarily share the values of an institution built to treat patients.\n“A defence company has inherently different values than a healthcare organisation like the NHS,” said Duncan McCann, Technology and Data Lead at the Good Law Project, which has led legal action seeking greater transparency over the contract. “That’s where I think this concern was created.”\nPalantir is not unique in this respect. Its origins in US defence and intelligence contracting are shared, to varying degrees, by most of the US AI firms now supplying British government departments – a lineage that, for critics like McCann, taints the whole category rather than one company alone.\nWhat’s next?\nThe NHS contract is the most visible, but it is unlikely to be the only one ", "translation_ja": "マンチェスターからダウニング街へ：バーナムはパランティアにとって何を意味するか\n\n3億3000万ポンドのNHS契約と、英国政府全体におけるパランティアの役割が、アンディ・バーナムの次の決断にかかっている。\n\nロンドン、英国 ― アンディ・バーナムが労働党党首として無投票で確定すれば、早ければ7月17日にもダウニング街（首相官邸）入りとなる。その場合、彼が最初に下す最も重大な決断の一つは、防衛費や移民政策、あるいは経済とは無関係なものになるだろう。\n\nそれは、NHS（英国国民保健サービス）イングランドと、米国の大手防衛・情報ソフトウェア企業パランティア・テクノロジーズとの間で結ばれた、7年間・3億3000万ポンド（約4億4000万ドル）の契約に関するものだ。パランティアは、バーナムが9年間市長を務めたグレーター・マンチェスター行政府からは一切の契約を受けていない。\n\nこうした決断がもたらす影響は、NHSをはるかに超えた広がりを持つ可能性がある。\n\n先週、バーナムがダウニング街に入った際に、英国政府全体にわたってパランティアに対してその姿勢を維持する意向であるとメディアが報道した。\n\nアル・ジャジーラがアンディ・バーナムの広報担当者に問い合わせたところ、次のような回答があった。「個別の政府調達契約や企業についてはコメントしません。また、遵守すべき法的手続きがあります。ただし、一般論として言えば、調達に関するアンディの基本原則は、納税者にとっての費用対効果を確保すること、そして国民のデータと英国の利益を守ることです。」\n\nNHS、国防省、内務省、金融行為監督機構など複数の公共部門に6年をかけて根を張ってきた企業にとって、この姿勢はキア・スターマーが率いていた労働党政権からの明らかな転換を意味する。\n\nスターマー政権は、元駐米英国大使ピーター・マンデルソンが推進した米国系AI企業の誘致に積極的だった。\n\nフィナンシャル・タイムズが、協議内容を知る関係者の話として報じたところによると、バーナムの顧問団——元テクノロジー担当大臣のジョシュ・サイモンズを含む——は、研究者のアントニオ・ワイスとマーサ・ダコームとともに、英国企業と労働者を優先した新たなAI戦略の策定に取り組んでいる。\n\nここに至るまでの経緯は、マンチェスターを通じて理解できる。\n\nマンチェスターの先例\n\nバーナムは2017年からグレーター・マンチェスターの市長を務め、今年6月にメーカーフィールドの補欠選挙を経てウェストミンスターに復帰した。\n\n彼の市長在任期間中、グレーター・マンチェスター連合行政府はパランティアに対して一切の契約を発注しなかった。グレーター・マンチェスター警察も、過去5年間にパランティアとの契約はなかったと別途確認している。\n\nしかし、より示唆に富む先例はNHSにある。バーナムが市長として直接の権限を持たなかった機関だが、グレーター・マンチェスターの歴史的な医療分権協定を通じて政治的な影響力を行使してきた。\n\nNHSイングランドが義務付けるパランティアの「Foundry」ソフトウェアを基盤とした連邦データプラットフォームを採用する代わりに、グレーター・マンチェスターのNHS幹部たちは6年をかけて独自の分析インフラを構築した。それが一つの概念実証となり、支持者たちは今や全国規模でこう主張している。効果的なNHSデータ管理にパランティアは必要ないのだ、と。\n\n5月、アル・ジャジーラはパランティアが「潜在的な安全保障上のリスク」であるとの懸念について、「グッド・ロー・プロジェクト」に取材した。\n\n一部の活動家たちは、バーナム陣営から発せられた最近の政治的シグナルを自分たちの主張への支持と解釈しているが、グッド・ロー・プロジェクトの広報担当者は、バーナム本人やその陣営との直接の接触はないと述べた。\n\n政治的背景\n\nバーナムはウェストミンスターにMP（国会議員）として復帰して以来初となる主要な演説の中で、政府調達の判断においてソーシャルバリュー（社会的価値）をより重視したいと語った。彼の周辺によれば、その理由は倫理的なものと同様に政治的なものでもある。\n\n報道によれば、バーナム陣営では、「際限のないテック礼賛主義」が、どれほど多くの国家機能が米国製ソフトウェアに依存しているかについてすでに不安を抱える有権者をさらに遠ざけるリスクがあると懸念されているという。\n\nその懸念の根底にあるのは、より具体的な問題意識だ。防衛・情報クライアントに奉仕するために設計された企業は、患者を治療するために設立された機関の価値観と必ずしも一致しないのではないか、というものだ。\n\n「防衛企業は本質的に、NHSのような医療機関とは異なる価値観を持っている」と、パランティアとの契約の透明性を求める法的措置を主導してきたグッド・ロー・プロジェクトのテクノロジー・データ責任者、ダンカン・マッキャンは語った。「そこに懸念が生まれた根本があると思います。」\n\nパランティアがこの点でとりわけ特殊というわけではない。米国の防衛・情報機関向け契約に起源を持つという点は、現在英国の政府機関に納入している米国AI企業のほとんどに多かれ少なかれ共通する。マッキャンのような批判者にとって、その系譜は特定の一社ではなく、カテゴリー全体を汚染するものだ。\n\n今後の展開\n\nNHS契約は最も目立つ事例だが、おそらくそれだけにとどまらないだろう。", "vocab": [{"word": "procurement", "definition": "調達。政府や企業が物品やサービスを契約・購入するプロセスを指す。「government procurement（政府調達）」の形でよく使われる専門用語。"}, {"word": "devolution", "definition": "権限委譲。中央政府から地方政府や地域機関へと権限・権力を移譲すること。英国政治で特に使われる重要な政治用語。"}, {"word": "boosterism", "definition": "熱狂的な推進・礼賛主義。特定の産業や概念を過度に積極的に支持・宣伝する姿勢を批判的に表現する言葉。"}, {"word": "ramifications", "definition": "波及効果、影響。ある決断や出来事が引き起こす複雑かつ広範囲にわたる結果や影響を指す。"}, {"word": "lineage", "definition": "起源、系譜。ここでは企業や技術の歴史的な出自・バックグラウンドを指し、単なる「出身」を超えて価値観の継承を含意する。"}, {"word": "proof of concept", "definition": "概念実証。あるアイデアや手法が実際に機能することを小規模で証明する取り組みや成果を指す技術・ビジネス用語。"}, {"word": "unfettered", "definition": "束縛されていない、制限のない。法的・倫理的な制約なしに自由に行動できる状態を表す形容詞で、しばしば批判的なニュアンスを帯びる。"}]}, {"title_ja": "スリランカ・ネゴンボ刑務所暴動で少なくとも26人死亡", "title_en": "At least 26 killed in deadly prison riots at Sri Lanka's Negombo jail", "summary_ja": "スリランカのネゴンボ刑務所で受刑者同士の衝突が激化し、刑務官7人を含む少なくとも26人が死亡、100人以上が負傷した。暴動は日曜日に始まり、月曜日には受刑者が脱走を試みるなど事態が拡大した。司法大臣は責任を認め、当局はライバルギャングの分離と受刑者の移送を進めている。", "summary_en": "A violent clash among inmates at Negombo prison in Sri Lanka left at least 26 people dead, including seven prison officers, and over 100 injured. The unrest began Sunday and escalated Monday when prisoners attempted a breakout and were reportedly armed with seized firearms. Sri Lanka's Justice Minister accepted responsibility, and authorities are working to separate rival gangs and transfer inmates to other facilities.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/violent-clashes-at-negombo-sri-lanka-prison-death-toll-injuries/article71188546.ece", "state_media": false, "category": "政治", "full_text": "At least 26 persons, including seven prison officers, were killed in a Sri Lankan prison on Monday after a clash among inmates escalated into deadly violence. Over 100 persons were injured.\nTensions began on Sunday as groups of inmates reportedly attacked each other, killing two persons, and prompting authorities to deploy military personnel around the premises of the prison in Negombo, around 30 km from capital Colombo. The clashes escalated on Monday even as some inmates gathered on the rooftop to protest, demanding their immediate release.\nPrison spokesman Chaminda Gajanayake told reporters that some prisoners rushed towards the main gate and attempted a breakout, but authorities managed to hold them back. Residents of the area told local media that gunshots could be heard outside, suggesting that prisoners had likely seized firearms from prison guards earlier.\nSri Lanka’s Justice Minister Harshana Nanayakkara has expressed “profound shock and grief” at the loss of human lives. “Whether they were inmates, or associated with the underworld, is not relevant to us at this moment,” Mr. Nanayakkara told reporters, adding that he took responsibility for the shocking incident. Authorities are working to separate rival gangs in the prison that are suspected to have triggered Monday’s deadly violence, officials said. Meanwhile, authorities have decided to transfer some inmates from Negombo prison to other facilities, officials said.\nPrisons in India continue to be overcrowded by undertrials | Data\nMonday’s prison riots come six years after a deadly riot at the Mahara prison, north of Colombo, during the height of the pandemic in 2020, in which as many as 11 inmates were killed. The incident put the spotlight on dire conditions in Sri Lanka’s prisons at the time. Rights defenders said the prisons were accommodating thrice their intended capacity, resulting in severe overcrowding and lack of facilities during the pandemic. Sri Lanka witnessed another deadly riot in Colombo’s Welikada prison in 2012, when police shot dead 27 inmates.\nPublished - July 06, 2026 02:11 pm IST", "translation_ja": "スリランカのネゴンボにある刑務所で月曜日、受刑者間の衝突が致命的な暴力へと発展し、刑務官7人を含む少なくとも26人が死亡した。100人以上が負傷している。\n\n緊張は日曜日から始まり、受刑者グループが互いに攻撃し合い2人が死亡したと伝えられており、当局はコロンボから約30キロ離れたネゴンボの刑務所周辺に軍の人員を配置することを余儀なくされた。月曜日には、一部の受刑者が屋上に集まり即時釈放を要求して抗議活動を行う中、衝突はさらに激化した。\n\n刑務所広報担当のチャミンダ・ガジャナヤケ氏は記者団に対し、一部の受刑者が正門に向かって突進し脱走を試みたが、当局はこれを食い止めることができたと述べた。地域住民は地元メディアに対し、外から銃声が聞こえたと証言しており、受刑者が以前に刑務官から銃器を奪っていた可能性が示唆されている。\n\nスリランカのハルシャナ・ナナヤッカラ司法大臣は、人命が失われたことに「深い衝撃と悲しみ」を表明した。「彼らが受刑者であるか、あるいは犯罪組織と関係があるかどうかは、この瞬間においては私たちにとって重要ではありません」とナナヤッカラ大臣は記者団に語り、この衝撃的な事件に対して自らが責任を負うと付け加えた。当局は、月曜日の致命的な暴力を引き起こしたとみられるライバルギャングを刑務所内で分離する作業を進めていると関係者は述べた。一方、当局はネゴンボ刑務所から他の施設へ一部の受刑者を移送することを決定したと関係者は述べた。\n\n月曜日の刑務所暴動は、2020年のパンデミックが最も深刻だった時期にコロンボ北部のマハラ刑務所で発生した死者11人に及ぶ致命的な暴動から6年後に起きた。この事件は当時、スリランカの刑務所における劣悪な環境に注目を集めた。人権擁護者たちは、パンデミック中に刑務所が収容能力の3倍の受刑者を抱え、深刻な過密状態と設備不足をもたらしていると指摘した。スリランカでは2012年にもコロンボのウェリカダ刑務所で別の致命的な暴動が発生し、警察が受刑者27人を射殺している。", "vocab": [{"word": "escalated", "definition": "（事態・紛争などが）段階的に悪化・拡大すること。ニュースや外交の文脈で頻繁に使われる上級表現。"}, {"word": "breakout", "definition": "刑務所などからの脱走・脱出を指す名詞。セキュリティや犯罪報道でよく使われる専門的表現。"}, {"word": "profound", "definition": "「深い・重大な」という意味の形容詞で、感情や影響の深刻さを強調する際に用いられるフォーマルな語。"}, {"word": "premises", "definition": "建物およびその敷地・構内全体を指す名詞（複数形で使用）。法律・ビジネス文書でよく登場する専門用語。"}, {"word": "accommodating", "definition": "ここでは「収容する」という意味で使われており、施設が人や物を受け入れる能力を示す動詞の分詞形。"}, {"word": "dire", "definition": "「非常に深刻な・悲惨な」という意味の形容詞。状況の極端な悪さを強調するフォーマルな表現で、ニュース記事で頻出。"}, {"word": "underworld", "definition": "組織犯罪や犯罪社会全体を指す表現。「犯罪の世界」という意味で使われるイディオム的な語。"}]}, {"title_ja": "ハマス、ガザ政府を解散し国連支持の技術委員会に権限移譲へ", "title_en": "Hamas dissolves Gaza government to hand power to UN-backed technical committee", "summary_ja": "ハマスは2026年7月6日、米国が仲介した停戦合意の一環として、ガザの政府を解散し、国連が支持する技術委員会に権限を移譲すると発表した。ただし武装解除や治安権限の引き渡しについては明言せず、イスラエルはこの発表を無意味だと一蹴した。新設された「平和委員会（Board of Peace）」は、約束ではなく行動で評価すると述べた。", "summary_en": "Hamas announced on July 6, 2026, that it has dissolved its government in Gaza and will transfer authority to a UN-backed technocratic committee as part of a US-brokered ceasefire deal. The group did not confirm whether it would disarm or cede security control, and Israel dismissed the move as meaningless. The newly formed Board of Peace said it would judge the announcement by actions rather than promises.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/hamas-dissolves-its-government-in-gaza-to-transfer-power-to-un-backed-committee/article71189994.ece", "state_media": false, "category": "政治", "full_text": "The Hamas militant group said on Monday (July 6, 2026) it had dissolved its government in Gaza and is preparing to transfer power to a technical committee backed by the United Nations as part of a US-brokered ceasefire deal.\nHamas did not say whether it planned to take the crucial step of disarming or handing over security to an international force but described its decision as evidence of its commitment to Gaza’s reconstruction after years of war.\nIt was unclear if the move, announced by a lower-level official, would lead to any meaningful change on the ground.\nThe Board of Peace, the new entity led by President Donald Trump with the mandate of governing and rebuilding Gaza, said it was aware of the Hamas announcement but said it would assess the impact based on “actions, not promises.” The board stressed in a statement on X that the technocratic committee must control all weapons in Gaza, as laid out in the ceasefire agreement.\nAt a news conference Monday (July 6, 2026), Ismail al-Thawabta, general director of the Hamas-run Government Media Office, said “only technical and professional staff” would remain in their positions to run the Palestinian enclave’s day-to-day affairs.\n“All employees working in service provision are state employees’ and are fully prepared to work under the National Committee for the Administration of Gaza,” al-Thawabta said during a press conference in the courtyard of Al-Aqsa Hospital in Deir al-Balah. Hamas spokesperson Hazem Qassem called it “a positive step forward on the path to implement the ceasefire deal.”\nIsrael dismissed the announcement as irrelevant. “The alleged resignation of the Hamas government, where all of the Hamas members stay in their positions, is a spin that has no significance,” an Israeli official said, speaking on condition of anonymity because they were not authorised to speak to the media.\nThe committee of technocrats, which is based in Cairo, is chaired by Ali Shaath, a Gaza-born engineer and former official with the Palestinian Authority. It has a mandate to restore essential services and oversee civilian affairs under the supervision of the UN and the Board of Peace.\nNine months after the ceasefire was signed, negotiations between Israel and Hamas remain largely deadlocked over the implementation of its second phase, including the disarmament of Hamas and the reconstruction of Gaza.\nHamas has insisted on implementing the first phase before moving to discuss its weapons.\nThe October 7, 2023, attack by Hamas-led militants that sparked the war killed some 1,200 people in Israel and saw 251 others taken hostage. Israel’s retaliatory offensive in Gaza has killed 73,098 Palestinians, according to Gaza’s Health Ministry.\nThe ministry, part of the Hamas-led government, is staffed by medical professionals and maintains detailed records viewed as generally reliable by UN agencies and independent experts. It does not distinguish between civilians and militants but says women and children make up around half of all fatalities.\nIsraeli strikes have lessened considerably since the ceasefire took effect on October 10, but they continue almost daily. Israel’s military says it targets Hamas and other militants, often asserting they were planning attacks.\nOn Monday (July 6, 2026), Israeli strikes killed at least five people in Gaza, including three in Khan Younis in the south and two in an apartment in Gaza City, health officials said.\nThe Israeli military said it targeted a Hamas operative in the Gaza City strike and a militant from the Palestinian Islamic Jihad in the attacks in Khan Younis.\nMilitants have carried out shooting attacks against Israeli troops in Gaza, and five Israeli soldiers have been killed since the ceasefire.\nPublished - July 06, 2026 08:04 pm IST", "translation_ja": "ハマスの武装組織は月曜日（2026年7月6日）、米国が仲介した停戦合意の一環として、ガザにおける自らの政府を解散し、国連が支持する技術委員会への権限移譲の準備を進めていると発表した。\n\nハマスは武装解除を行うか、あるいは国際部隊に治安権限を引き渡すかという重要な手順を踏む計画があるかどうかについては明らかにしなかったが、今回の決定を長年の戦争を経たガザ復興への取り組みの証だと説明した。\n\n比較的下位の当局者によって発表されたこの動きが、現地で実質的な変化をもたらすかどうかは不明だ。\n\nドナルド・トランプ大統領が主導し、ガザの統治と復興を使命とする新機関「平和委員会（Board of Peace）」は、ハマスの発表を把握しているとしながらも、「約束ではなく行動」に基づいて影響を評価すると述べた。同委員会はX上の声明で、停戦合意に定められている通り、テクノクラート委員会がガザ内のすべての武器を管理しなければならないと強調した。\n\n月曜日（2026年7月6日）の記者会見で、ハマス運営の政府メディア局のイスマイル・アル・サワブタ局長は、「技術的・専門的なスタッフのみ」がパレスチナ自治区の日常業務を担うため職務を継続すると述べた。\n\n「行政サービスに従事するすべての職員は国家公務員であり、ガザ行政国民委員会の下で勤務する準備が十分に整っている」と、アル・サワブタ氏はデイル・アル・バラハのアル・アクサ病院の中庭で行われた記者会見で語った。ハマスの報道官ハゼム・カセム氏はこれを「停戦合意の履行に向けた前向きな一歩」と評した。\n\nイスラエルはこの発表を無関係なものとして退けた。「ハマスのメンバー全員が職に留まったまま行われるハマス政府のいわゆる辞任は、意味のないスピンだ」とイスラエルの当局者は述べた。この当局者は、メディアへの発言を公式に認められていないとして匿名を条件に話した。\n\nカイロを拠点とするテクノクラートの委員会は、ガザ出身のエンジニアでパレスチナ自治政府の元当局者であるアリー・シャアスが委員長を務める。同委員会は、国連および平和委員会の監督下でガザの基本サービスの回復と民政の監督を使命としている。\n\n停戦合意が署名されてから9か月が経過したにもかかわらず、イスラエルとハマスの間の交渉は、ハマスの武装解除やガザの復興を含む合意の第2段階の履行をめぐり、依然として大部分で行き詰まったままだ。\n\nハマスは、第2段階の武器問題について議論する前に、第1段階を履行することを主張している。\n\n2023年10月7日のハマス主導の武装勢力による攻撃は戦争の引き金となり、イスラエルで約1,200人が死亡し、251人が人質として連行された。ガザ保健省によれば、イスラエルの報復攻撃によるガザでの死者は73,098人に達している。\n\nハマス主導の政府の一部である同省は医療専門家によって運営されており、詳細な記録を保持しているとして国連機関や独立した専門家からおおむね信頼性があると見なされている。同省は民間人と戦闘員を区別していないが、女性と子どもが死者全体の約半数を占めると述べている。\n\n停戦発効後（10月10日）、イスラエルによる攻撃はかなり減少しているものの、ほぼ毎日続いている。イスラエル軍は、攻撃計画を準備中だったと主張することが多く、ハマスなどの武装勢力を標的にしていると述べている。\n\n月曜日（2026年7月6日）、イスラエルの空爆によりガザで少なくとも5人が死亡した。南部のハン・ユニスで3人、ガザ市のアパートで2人が死亡したと保健当局者は述べた。\n\nイスラエル軍は、ガザ市への攻撃ではハマスの工作員を、ハン・ユニスへの攻撃ではパレスチナ・イスラム聖戦の武装勢力員を標的にしたと述べた。\n\n武装勢力はガザでイスラエル軍に対する銃撃攻撃を行っており、停戦以降5人のイスラエル兵が死亡している。", "vocab": [{"word": "technocratic", "definition": "テクノクラート（技術専門家）による統治・運営に関する形容詞。政治家ではなく、専門的知識を持つ技術者や専門家が政策決定や行政を担う体制を指す。"}, {"word": "brokered", "definition": "「仲介された」という意味の形容詞（brokerの過去分詞）。第三者が当事者間の交渉や合意を仲立ちして成立させた際に使われる表現で、外交・ビジネス文書で頻出する。"}, {"word": "deadlocked", "definition": "「行き詰まった」「膠着状態にある」という意味の形容詞。交渉や議論が双方の主張の対立により進展しない状況を表し、政治・外交報道でよく用いられる。"}, {"word": "operative", "definition": "諜報・軍事・政治の文脈で「工作員」「活動員」を意味する名詞。秘密裏に活動する組織の構成員を指すことが多い。"}, {"word": "enclave", "definition": "「飛び地」「囲まれた地域」を意味する名詞。地理的・政治的に周囲と区別される特定の地域や集団の居住区を指し、国際報道で頻繁に使われる専門用語。"}, {"word": "anonymity", "definition": "「匿名性」「匿名であること」を意味する名詞。報道において情報源が身元を明かさない条件で取材に応じる際の表現「on condition of anonymity（匿名を条件に）」としてよく登場する。"}]}, {"title_ja": "モディ首相、「東方行動政策」強化へインドネシア訪問開始", "title_en": "PM Modi Arrives in Indonesia to Boost Act East Policy on Three-Nation Tour", "summary_ja": "インドのナレンドラ・モディ首相は2026年7月6日、インドネシア、オーストラリア、ニュージーランドの3か国歴訪の第一弾としてジャカルタに到着した。インドネシアのプラボウォ・スビアント大統領が自ら空港でモディ首相を出迎え、両国の緊密な関係を示した。今回の訪問はインドの「東方行動政策」やMAHASAGARビジョン、自由で開かれたインド太平洋への関与を強化することを目的としている。", "summary_en": "Indian Prime Minister Narendra Modi arrived in Jakarta on July 6, 2026, beginning a three-nation tour covering Indonesia, Australia, and New Zealand. Indonesian President Prabowo Subianto personally received Modi at the airport, reflecting the strong bilateral ties elevated to a Comprehensive Strategic Partnership in 2018. The visit aims to strengthen India's Act East Policy, MAHASAGAR Vision, and commitment to a free and open Indo-Pacific.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/national/pm-modi-indonesia-bilateral-visit-july-6-2026/article71189358.ece", "state_media": false, "category": "政治", "full_text": "Prime Minister Narendra Modi on Monday (July 6, 2026) arrived in Indonesia on the first leg of his three-nation tour, aimed at further strengthening India’s Act East Policy, MAHASAGAR Vision and its commitment to a free, open and inclusive Indo-Pacific.\nIn a special gesture, Mr. Modi was received at the airport by Indonesian President Prabowo Subianto. In addition, four ministers were also present to receive the Prime Minister, who was accorded a traditional ceremonial welcome and a Guard of Honour.\nVisit to Indonesia, Australia, New Zealand will further strengthen India’s Act East Policy: PM\n“Landed in Jakarta. I’m touched by President Prabowo Subianto’s gesture of welcoming me at the airport,” Mr. Modi said in a social media post.\nThis is PM Modi’s first bilateral visit to Indonesia since the elevation of ties to a Comprehensive Strategic Partnership in 2018.\n“In 2018, we elevated our relations to a Comprehensive Strategic Partnership, which has benefitted our people,” Mr. Modi said.\nMr. Modi said he will hold discussions with President Subianto “aimed at adding even more momentum to this partnership across diverse sectors.”\n“President Prabowo and I will visit the Prambanan Temple complex in Yogyakarta. This will ensure closer cultural linkages between our nations. While in Indonesia, I also look forward to interacting with the Indian community,” he added.\nThe centuries-old temple, located approximately 17 km northeast of Yogyakarta city, is considered Indonesia’s largest Hindu temple.\nAhead of his departure from Delhi, Mr. Modi said his visit to Indonesia, Australia and New Zealand will further strengthen India’s Act East Policy, MAHASAGAR Vision as well as “our outlook towards a free and open Indo-Pacific.”\nMAHASAGAR, or Mutual and Holistic Advancement for Security Across the Regions, is India’s vision of security and growth for all regions.\nMr. Modi’s visit comes after President Prabowo’s State visit to India as the chief guest at the Republic Day celebrations in January 2025.\n“India and Indonesia share strong civilisational and people-to-people ties, and my visit will further deepen all aspects of our multifaceted partnership,” he said.\nFrom Indonesia, Mr. Modi will travel to Melbourne at the invitation of Australian Prime Minister Anthony Albanese. The final leg of the tour will take him to Auckland at the invitation of New Zealand Prime Minister Christopher Luxon.\nPublished - July 06, 2026 06:20 pm IST", "translation_ja": "ナレンドラ・モディ首相は月曜日（2026年7月6日）、インドの「東方行動政策」、MAHASAGARビジョン、そして自由で開かれた包括的なインド太平洋への関与をさらに強化することを目的とした3か国歴訪の第一弾として、インドネシアに到着した。\n\n特別な歓迎の表れとして、モディ首相はインドネシアのプラボウォ・スビアント大統領に空港で出迎えられた。さらに4人の閣僚も首相の出迎えに同席し、伝統的な儀式による歓迎と儀仗兵による栄誉礼が行われた。\n\nモディ首相はインドネシア、オーストラリア、ニュージーランドへの訪問がインドの東方行動政策をさらに強化するとした。\n\n「ジャカルタに到着しました。プラボウォ・スビアント大統領が空港まで出迎えてくださったことに感激しています」とモディ首相はソーシャルメディアへの投稿で述べた。\n\n今回のモディ首相のインドネシア二国間訪問は、2018年に両国関係が「包括的戦略的パートナーシップ」に格上げされて以来、初めてのものとなる。\n\n「2018年に私たちは関係を包括的戦略的パートナーシップに格上げし、それが両国の人々に恩恵をもたらしてきました」とモディ首相は述べた。\n\nモディ首相は、スビアント大統領との会談について「多様な分野でこのパートナーシップにさらなる勢いをもたらすことを目指したもの」になると語った。\n\n「プラボウォ大統領と私は、ジョグジャカルタのプランバナン寺院群を訪問します。これにより両国間の文化的つながりがより緊密になるでしょう。インドネシア滞在中、インド系コミュニティとの交流も楽しみにしています」と付け加えた。\n\nジョグジャカルタ市街から北東に約17キロメートルに位置するこの数百年の歴史を持つ寺院は、インドネシア最大のヒンドゥー寺院とされている。\n\nデリー出発前にモディ首相は、インドネシア、オーストラリア、ニュージーランドへの訪問が、インドの「東方行動政策」、MAHASAGARビジョン、そして「自由で開かれたインド太平洋に対する我々の展望」をさらに強化するものになると述べていた。\n\nMAHASAGAR（Mutual and Holistic Advancement for Security Across the Regions＝地域全体にわたる安全保障の相互的・包括的推進）は、すべての地域の安全保障と成長を目指すインドのビジョンである。\n\nモディ首相の今回の訪問は、2025年1月の共和国記念日式典に主賓として招待されたプラボウォ大統領のインド国賓訪問に続くものだ。\n\n「インドとインドネシアは強固な文明的・人的交流の絆を共有しており、今回の訪問によって多面的なパートナーシップのあらゆる側面がさらに深まるでしょう」とモディ首相は述べた。\n\nインドネシアを離れた後、モディ首相はオーストラリアのアンソニー・アルバニージー首相の招待を受けてメルボルンへ向かう。歴訪の最終行程では、ニュージーランドのクリストファー・ラクソン首相の招待を受けてオークランドを訪問する予定だ。\n\n公開：2026年7月6日午後6時20分（IST）", "vocab": [{"word": "bilateral", "definition": "二国間の、という意味の形容詞。外交や貿易など、二つの国が関与する関係や交渉を表す際に使われる専門用語。"}, {"word": "Comprehensive Strategic Partnership", "definition": "「包括的戦略的パートナーシップ」を意味する外交用語で、政治・経済・安全保障など幅広い分野での最上位レベルの二国間協力関係を指す。"}, {"word": "civilisational", "definition": "「文明的な」「文明に関する」を意味する形容詞で、長い歴史的・文化的背景を持つ関係性を表す際に用いられる高度な語彙。"}, {"word": "momentum", "definition": "「勢い」「推進力」を意味し、物事が前進する力や速度が増している状態を表す。政治・外交文脈では政策の進展の加速を指すことが多い。"}, {"word": "accorded", "definition": "「与えられた」「授けられた」を意味するaccordの過去分詞形。格式ある場で特別な名誉や待遇が公式に与えられる場面で使われる。"}, {"word": "multifaceted", "definition": "「多面的な」「多角的な」を意味する形容詞で、複数の異なる側面や要素を持つ複雑な関係・問題を表す際に用いられる上級語彙。"}, {"word": "holistic", "definition": "「全体論的な」「包括的な」を意味し、個々の要素を分けて考えるのではなく全体を一体として捉えるアプローチを指す。政策や医療の文脈でよく使われる。"}]}, {"title_ja": "カルナータカ州の主要ダム、34%の降雨不足で貯水量が半分以下に", "title_en": "Karnataka reservoirs below half capacity as monsoon rainfall runs 34% below average", "summary_ja": "カルナータカ州の主要14ダムの総貯水容量895.65 TMCに対し、現在の貯水量はわずか212.9 TMCにとどまり、昨年同時期の595.3 TMCの半分にも満たない。6月1日以降の降雨量は平均を34%下回っており、ベンガルール市などへの水供給を担うクリシュナラジャサーガルダムやカビニダムの貯水率が特に深刻な状況となっている。今週末までに降雨の改善が見込まれている。", "summary_en": "Major reservoirs in Karnataka hold only 212.9 TMC of water against a gross capacity of 895.65 TMC, less than half the 595.3 TMC stored at the same time last year. A 34% rainfall deficit since June 1 has left key dams like Krishnarajasagar and Kabini critically low, threatening water supply for Bengaluru and surrounding areas. Forecasts suggest improved rainfall before the end of the week.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/bangalore/karnataka-reservoir-levels-monsoon-rainfall-deficit-dam-storage-10774321/", "state_media": false, "category": "社会", "full_text": "Stay updated with the latest - Click here to follow us on Instagram\nMore than a month after the onset of the southwest Monsoon, reservoirs in Karnataka are yet to receive good inflows. None of the major dams have half the water storage they had at the same time last year.\nData from the Karnataka State Natural Disaster Monitoring Centre showed that while the gross capacity of 14 major reservoirs in the state is 895.65 TMC, the water level as of Monday was 212.9 TMC. During the same period last year, storage in the dams was 595.3 TMC.\nWhile inflows to reservoirs such as Linganamakki and Ghataprabha have increased due to heavy rain in the Malnad and coastal regions, the situation remains grim for other reservoirs in the state. For instance, the current storage of the 49.45 TMC Krishnarajasagar dam built across the Cauvery river is 11.49 TMC—23 per cent of the total capacity. Similarly, the Kabini dam—built across a tributary of the Cauvery—has 6.74 TMC of water against the full storage level of 19.52 TMC. These two dams are key water providers for Bengaluru and surrounding regions and were almost full during the same period last year.\nIn northern Karnataka, water inflow to major reservoirs across the Krishna—Almatti and Narayanapura—remains low. The Narayanapura dam, which is downstream of Almatti, had zero inflow as of Monday, while inflow for Almatti was around 1,000 cusecs. Inflow is expected to improve in the coming days due to good showers in catchment areas.\nOverall rainfall of 165 mm\nIn terms of rainfall, the state has recorded a deficit of 34 per cent during the monsoon season starting June 1. Compared to an average of 249 mm for the period, the overall rainfall was 165 mm.\nMalnad districts, which form the catchment area for most rivers originating in the state, have received about half the average rainfall during the period. Against a normal of 483 mm for the districts, rainfall received was 263 mm.\nForecasts indicate that a good spell of rain is likely before the end of the week.\nStay updated with the latest - Click here to follow us on Instagram", "translation_ja": "南西モンスーンの到来から1か月以上が経過したにもかかわらず、カルナータカ州の貯水池はいまだ十分な流入を受けていない。州内の主要ダムの貯水量は、いずれも昨年同時期の半分にも達していない。\n\nカルナータカ州自然災害監視センターのデータによると、州内14か所の主要貯水池の総容量は895.65 TMCであるのに対し、月曜日時点の水位は212.9 TMCにとどまった。昨年同時期のダム貯水量は595.3 TMCだった。\n\nマルナードや沿岸地域での大雨により、リンガナマッキダムやガタプラバダムへの流入は増加しているものの、他の貯水池の状況は依然として厳しい。たとえば、カーヴェリ川に建設されたクリシュナラジャサーガルダム（総容量49.45 TMC）の現在の貯水量は11.49 TMCで、総容量の23%にすぎない。同様に、カーヴェリ川の支流に建設されたカビニダムの貯水量は6.74 TMCで、満水時の19.52 TMCを大きく下回っている。この2つのダムはベンガルールおよび周辺地域への主要な水供給源であり、昨年同時期にはほぼ満水状態だった。\n\nカルナータカ州北部では、クリシュナ川沿いの主要貯水池であるアルマッティとナラヤナプーラへの流入量も低い水準にとどまっている。アルマッティの下流に位置するナラヤナプーラダムへの流入量は月曜日時点でゼロだった一方、アルマッティへの流入量は約1,000キュセックだった。集水域での好雨により、今後数日で流入量の改善が見込まれている。\n\n【降雨量は合計165mm】\n\n降雨量については、6月1日の開始以来、州全体でモンスーン期間中の降雨量が34%の不足となっている。同期間の平均249mmに対し、実際の降雨量は165mmにとどまった。\n\n州内のほとんどの河川の源流となっている集水域を形成するマルナード地方では、同期間の平均降雨量の約半分しか雨が降っていない。平均483mmに対し、実際の降雨量は263mmだった。\n\n予報によると、今週末までに好天候による降雨が見込まれている。", "vocab": [{"word": "inflows", "definition": "河川や雨水などがダムや貯水池に流れ込む水量のこと。水資源管理の文脈で頻繁に使われる技術用語。"}, {"word": "gross capacity", "definition": "ダムや貯水池が保持できる水の最大総量を指す専門用語。'gross'は「総計の・控除前の」という意味で、ここでは理論上の最大容量を表す。"}, {"word": "catchment area", "definition": "雨水が集まり河川や貯水池へと流れ込む地理的な集水域・流域を指す地理・水文学用語。"}, {"word": "cusecs", "definition": "水の流量を表す単位で、「1秒あたりの立方フィート（cubic feet per second）」の略称。河川工学や水資源管理で用いられる専門用語。"}, {"word": "deficit", "definition": "期待値や平均値に対する不足量・欠乏量を表す語。ここでは降雨量が平均を下回っている割合を示すために使われている。"}, {"word": "tributary", "definition": "本流（主要な川）に流れ込む支流のことを指す地理・水文学用語。'a tributary of the Cauvery'は「カーヴェリ川の支流」を意味する。"}, {"word": "grim", "definition": "状況が深刻・厳しく、希望が持てないさまを表す形容詞。'the situation remains grim'は「状況は依然として厳しい」という意味の慣用的表現。"}]}, {"title_ja": "腰痛と乳がん：若い女性が見逃してはいけない症状", "title_en": "Back Pain as a Breast Cancer Warning Sign: What Young Women Should Know", "summary_ja": "持続的な腰痛をきっかけにステージ4の乳がんと診断された27歳女性に関するSNS投稿が話題となり、専門家たちが乳がんの症状は乳房のしこりだけにとどまらない場合があると警鐘を鳴らしている。若い成人の腰痛の多くは生活習慣に起因するものの、数週間続く痛みや悪化する痛みは注意が必要だと専門家は指摘する。早期発見と乳房への意識向上が依然として重要であり、若い女性の乳がん診断数も増加している。", "summary_en": "A viral social media post about a 27-year-old woman diagnosed with stage four breast cancer—first flagged by persistent back pain—has prompted experts to warn that breast cancer symptoms can extend beyond a breast lump. Specialists note that while most back pain in young adults stems from lifestyle factors, prolonged or worsening pain should not be dismissed. Early detection and breast awareness remain critical, as younger women are increasingly being diagnosed with breast cancer.", "source": "Indian Expr
