 … and maybe also to the general public.\nThink of these systems as automated speed cameras, but on steroids. Only they’ll enforce not just speed limits, but any other rule you can imagine. And you won’t receive a ticket weeks later by mail; you’ll be informed about and fined for your violation immediately.\nThese systems will combine powerful AI, public and private surveillance via real-time facial recognition technology and digital tracking, mass databases and highly personalized enforcement. If deployed at scale, they will have profound chilling effects not just on personal freedoms, but democracy and social progress itself.\nChina has been developing its surveillance infrastructure for years. The country has over 600 million surveillance cameras, increasingly powered by AI and facial recognition to enforce legal and social rules. Take the case of Lao Duan, a Chinese citizen blacklisted by the system after he lost his job and was unable to repay a series of loans. When he visited Beijing, the city’s AI surveillance system identified him by his face at a major intersection and displayed his face, name, and citizen ID number on a large electronic billboard nearby with a message that he was an untrustworthy person. Similar systems are now being deployed across China and integrated with its infamous online monitoring, censorship, and social credit systems.\nAI surveillance is now being experimented with in North America, South America, Europe, Asia and Africa. According to a new report, the US Department of Homeland Security is rapidly increasing its use of AI-based surveillance, including facial recognition and the monitoring of social media accounts, to keep tabs on immigrants, dissidents, journalists, legal observers and protesters. While the systems are ostensibly used to maintain security and public safety, the real aim is often social control. Larry Ellison, CEO of Oracle – a powerful tech giant that works closely with the Trump administration – has said: “Citizens will be on their best behavior because we’re constantly recording and reporting.” The chilling effects are the point.\nAI surveillance raises a range of public policy challenges: technical biases, unauditable systems, and inflexible automated law and social rule enforcement that can promote discrimination and undermine transparency, accountability and the rule of law. But we believe the most urgent and long-term impact will be its broader chilling effects.\nIn a new book, Chilling Effects: Repression, Conformity, and Power in the Digital Age, Jon Penney explains how surveillance, technology and power can be weaponized to influence behavior at scale. Surveillance, personalization, uncertainty and authority are all key mechanisms to increase the scale and impact of chilling effects. They cause people to self-censor their words and actions, to become more conformist and compliant and thus easier to manage and control. And the effects are additive: the more mechanisms employed, and the more powerful the form, the greater the chill.\nComputerization has long allowed data collectors to track our locations, collect lists of whom we communicate with, and monitor our spending habits – unless we use cash. What’s new is an unprecedented fusion of each of these mechanisms, persistent and unrelenting. AI brings an analytical ability to spy on the contents of our communications, and to answer sophisticated questions about our whereabouts and activities: actions that previously required human analysts are now automated. The result will be a kind of supercharged societal level of chilling effects where fear, self-censorship and groupthink reign, and dissent, creativity and innovation become increasingly rare.\nIn this atmosphere of fear and conformity, risky ideas, social activism and self-reinvention – especially by disfavored groups and targeted populations – are also chilled. This will have long-term effects on social progress.\nConsider the relatively recent societal normalization of same-sex relationships and the recreational use of marijuana. Over the decades, those ideas slowly progressed from being both immoral and illegal, to moral but still illegal, and finally to both moral and legal. But in order for any of that to happen, there had to be a counterculture that was able to experiment and eventually demonstrate to the world that morality could change over time. To the extent that AI surveillance chills this sort of experimentation in public or in private, social progress becomes impossible.\nThere are no real historical precursors to this; these technologies are too new. Even the most notori", "translation_ja": "近い将来、AI搭載の監視システムは、公共の場における私たちのあらゆる行動、そしてプライベートな場における多くの行動を追跡できるようになるだろう。そして、万引き、ポイ捨て、無断横断など、何か問題のあることをすれば――システムはそれを検知し、記録し、公式な政府の記録と紐付け、その事実を本人に通知し、関係当局にリアルタイムのアラートを送信する……そしておそらく一般市民にも知らせるだろう。\n\nこれらのシステムは、ステロイド剤を打ったような自動スピードカメラだと思ってほしい。ただし、速度制限だけでなく、想像できるあらゆるルールを執行する。しかも、数週間後に郵便で罰則通知が届くのではなく、違反した瞬間に通知を受け、即座に罰金が科される。\n\nこれらのシステムは、強力なAI、リアルタイムの顔認識技術とデジタル追跡による公私の監視、大規模データベース、そして高度にパーソナライズされた執行を組み合わせたものだ。大規模に展開されれば、個人の自由だけでなく、民主主義と社会進歩そのものに対して、深刻な萎縮効果をもたらすだろう。\n\n中国は長年にわたり、監視インフラの整備を進めてきた。同国には6億台を超える監視カメラがあり、法律的・社会的ルールを執行するために、AIと顔認識技術の活用が急速に進んでいる。老段（ラオ・ドゥアン）というある中国市民の事例を見てみよう。彼は職を失い、複数のローンを返済できなくなった後、このシステムによってブラックリストに登録された。北京を訪れた際、市のAI監視システムが主要な交差点で彼の顔を認識し、近くの大型電光掲示板に彼の顔写真、氏名、市民ID番号を「信用できない人物」というメッセージとともに表示した。同様のシステムは現在、中国全土に展開されており、悪名高いオンライン監視、検閲、社会信用システムとも統合されつつある。\n\nAI監視は現在、北米、南米、欧州、アジア、アフリカで実験的に導入されている。新たな報告書によると、米国国土安全保障省は、移民、反体制派、ジャーナリスト、法的オブザーバー、抗議者を監視するために、顔認識やソーシャルメディアアカウントの監視を含むAIベースの監視の活用を急速に拡大しているという。こうしたシステムは表向きは治安維持と公共安全のために使用されるとされるが、その真の目的はしばしば社会統制にある。トランプ政権と緊密に連携する強力なテクノロジー大手オラクルのCEO、ラリー・エリソンはこう述べている。「私たちは常に記録・報告しているので、市民は最良の行動をとるようになるでしょう。」萎縮効果こそが目的なのだ。\n\nAI監視は、技術的なバイアス、監査不能なシステム、差別を促進し透明性・説明責任・法の支配を損なう硬直した自動執行など、幅広い公共政策上の課題を提起する。しかし私たちは、最も緊急かつ長期的な影響は、その広範な萎縮効果にあると考える。\n\n新著『萎縮効果：デジタル時代における抑圧、同調、そして権力（Chilling Effects: Repression, Conformity, and Power in the Digital Age）』の中で、ジョン・ペニーは、監視、テクノロジー、権力がいかに大規模な行動への影響力を行使するために武器化されうるかを解説している。監視、パーソナライゼーション、不確実性、権威はいずれも、萎縮効果の規模と影響を拡大させる主要なメカニズムだ。これらは人々に言動の自己検閲を促し、より同調的・従順にさせ、管理・統制しやすくする。そして効果は累積的だ。用いるメカニズムが多ければ多いほど、またその形態が強力であればあるほど、萎縮はより深まる。\n\nコンピュータ化は長い間、データ収集者が私たちの位置情報を追跡し、通信相手のリストを収集し、現金を使わない限り消費行動を監視することを可能にしてきた。新しいのは、これら各メカニズムの前例のない融合が、持続的かつ絶え間なく行われることだ。AIは通信内容を監視し、私たちの居場所や行動について高度な質問に答える分析能力をもたらす。かつて人間のアナリストが必要としていた作業が、今や自動化されている。その結果、恐怖、自己検閲、集団思考が支配し、反体制的意見、創造性、革新がますます稀になるという、社会全体規模での超強化された萎縮効果がもたらされるだろう。\n\nこの恐怖と同調の雰囲気の中では、危険な思想、社会的活動主義、自己変革――特に不遇なグループや標的にされた集団によるもの――も萎縮させられる。これは社会進歩に長期的な影響をもたらすだろう。\n\n同性愛関係の比較的最近の社会的正常化と、娯楽目的での大麻使用の例を考えてみよう。数十年をかけて、これらの考えは「不道徳かつ違法」から「道徳的だが依然として違法」、そして最終的に「道徳的かつ合法」へと徐々に進歩してきた。しかしそのいずれかが実現するためには、実験を行い、時間をかけて道徳観が変わりうることを世界に示すことができたカウンターカルチャーの存在が不可欠だった。AI監視がこの種の実験を公的にも私的にも萎縮させる限りにおいて、社会進歩は不可能になる。\n\nこれに真に匹敵する歴史的先例は存在しない。これらのテクノロジーはあまりにも新しいからだ。最も悪名高い監視国家でさえ……", "vocab": [{"word": "chilling effects", "definition": "萎縮効果。監視や規制の脅威によって、人々が本来合法的な言動や表現を自主規制してしまう現象を指す法律・社会学の専門用語。"}, {"word": "supercharged", "definition": "（比喩的に）超強化された、劇的に増強されたという意味。元は機械のスーパーチャージャーに由来し、何かの能力や規模が通常をはるかに超えて強化された状態を表す。"}, {"word": "dissent", "definition": "反体制的意見、異議。支配的な権力や多数派の意見に対して異を唱えること。政治・社会文脈でよく使われる重要語。"}, {"word": "ostensibly", "definition": "表向きは、名目上は、という意味の副詞。実態とは異なる建前や口実を示す際に使われ、「実際には違うが～のように見せかけて」というニュアンスを持つ。"}, {"word": "conformist", "definition": "同調主義的な（人）。社会的規範や多数派の意見・行動に従順に合わせる傾向を持つ人や態度を指す。individualistの対義語的な概念。"}, {"word": "counterculture", "definition": "カウンターカルチャー、反体制文化。主流の社会的価値観や規範に反発・挑戦する文化的ムーブメントや集団を指す。1960年代のヒッピー運動などが代表例。"}, {"word": "unauditable", "definition": "監査不能な、検証できないという意味の形容語。システムや組織の意思決定プロセスが外部から検証・確認できない状態を指し、AI・テクノロジー政策の文脈で使われる技術的・法律的用語。"}]}, {"title_ja": "トランプは米国民主主義への脅威だが、抵抗は機能している＝ケネス・ロス", "title_en": "Trump Threatens US Democracy, But Resistance Is Working, Says Kenneth Roth", "summary_ja": "ケネス・ロスは、トランプが独裁者の手法で民主主義を脅かしているものの、司法・メディア・大学・市民社会・市民による抵抗が有効に機能していると論じる。共和党議会や一部メディアオーナーの妥協は批判しつつも、権力分立の仕組みは概ね維持されていると結論づける。「ノー・キングス」抗議運動や300件超の訴訟が、権力集中への歯止めとなっていると指摘する。", "summary_en": "Kenneth Roth argues that while Trump poses a serious threat to American democracy by pursuing an autocrat's playbook, significant resistance from courts, media, universities, civil society, and the public is proving effective. He acknowledges failures, particularly from a Republican Congress and compromised media owners, but concludes that checks and balances are largely holding. The 'No Kings' protests and hundreds of lawsuits signal that Trump's efforts to consolidate power are being meaningfully challenged.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/06/trump-administration-democracy-resistance", "state_media": false, "category": "オピニオン", "full_text": "How do we commemorate America’s democracy as Donald Trump undermines it? By embracing his opposition. The United States was founded by breaking from a monarchy. Trump wants to become king. An imperfect yet powerful system of checks and balances is being deployed to prevent him. The resistance is worth celebrating.\nThis is hardly the first challenge to US democracy. The early nation had no rights for Black people and no vote for women. It survived Jim Crow, the McCarthy era, and the “war on terror”. Yet there is no denying the seriousness of the threat posed by Trump.\nHe is trying to implement the classic autocrat’s playbook by chipping away at the restraints on executive authority. He has made dangerous inroads, but in most cases, the opposition has been significant. A struggle is under way, and the prospects for his success are dimming.\nThe Republican-led Congress has been most disappointing. It has largely swallowed Trump’s excesses because its Republican members fear him mounting a primary challenge against anyone who resists him. Bowing to his will, they enacted his “big beautiful bill” to cut taxes for the rich and healthcare for the working class. They discovered their backbones only recently to oppose funding for his ballroom, a slush fund for his cronies, and his proposal for voter suppression.\nThe courts have a better, if mixed, record. More than 300 lawsuits have contested Trump administration actions, many of them at least temporarily successful. The supreme court has handed Trump victories on campaign finance, immigrant deportation, racial gerrymandering and executive power over most independent agencies. It has also largely placed the president above the rule of law. But even the court with its presumptive 6-3 pro-Trump majority blocked his efforts to impose tariffs, limit mail-in voting, remove a member of the Federal Reserve board, and restrict birthright citizenship.\nOutside government, the media remains strong, despite Trump’s efforts through libel suits and regulatory oversight to restrain it. For example, his pressure on the corporate owners of CBS News, who needed government permission for a merger, was followed by the appointment of a controversial editor-in-chief who seems to have inserted herself in ways that are friendly to the administration. She has now overseen the exodus of a major part of the storied 60 Minutes staff. Worryingly, the same owner is now taking over CNN.\nThe billionaire Jeff Bezos was once viewed as a savior of the Washington Post. He easily could have afforded to run it even at a loss as a quasi-charitable public service. But seemingly worried about antagonizing the Trump administration to the detriment of his major business interests, he fired much of the Post’s international staff and lost columnists and its political cartoonist to perceived editorial interference.\nYet significant independent voices remain, showing the importance of ownership by people whose financial interests are not as vulnerable to Trump’s meddling (the Sulzbergers for the New York Times) or by not-for-profits with no external business interests (the Guardian). Social media platforms, even Elon Musk’s X, remain venues for endless exposés and criticism of Trump’s excesses. So do proliferating podcasts.\nUniversities, a vital source of expertise for monitoring and challenging government action, have largely weathered the storm. Trump has tried to rein them in, especially by withholding government grants for science and medical research. That has created financial hardship and hurt American innovation, but only a handful of universities cut deals with the administration, most disturbingly Columbia. Harvard sued the administration, and no university joined a Trump-proposed compact that would have given them preferential access to government funding in return for permitting greater government intrusion on university independence and academic freedom.\nSeveral major law firms struck deals after Trump threatened to bar them from dealing with government agencies. Yet they were pilloried for agreeing to provide millions of dollars worth of pro bono services for causes of Trump’s choosing. Other law firms fought back successfully – and brought some of the lawsuits against the administration. They have reportedly benefited from clients who prefer lawyers who stand up, rather than capitulate, to the administration.\nCivil society remains threatened but largely untouched. Groups such as the ACLU have taken the lead in many lawsuits. Others such as Human Rights Watch are strong critics of Trump’s foreign policy. Trump brought concocted criminal charges against the Southern Poverty Law Center, and organizations that depend on government funding are self-censoring, but the cacophony of voices from all political views remains impressive.\nThe public has taken to the streets to show its displeasure. The nationwide “No Kings” protests showed the depth and breath of discontent with Trump’s monarchical inclinations.", "translation_ja": "トランプがアメリカの民主主義を損なう中、どのようにその民主主義を称えるべきか。答えは、抵抗勢力を支持することだ。アメリカは君主制からの決別によって建国された。トランプは王になろうとしている。不完全ではあるが強力な権力分立の仕組みが、それを阻止するために機能している。この抵抗こそ称えるに値する。\n\nアメリカ民主主義への挑戦はこれが初めてではない。建国当初、黒人には権利がなく、女性には選挙権がなかった。ジム・クロウ法の時代、マッカーシズムの時代、「テロとの戦い」の時代も乗り越えてきた。しかし、トランプが突きつける脅威の深刻さは否定できない。\n\n彼は行政権力への制約を少しずつ切り崩すという、典型的な独裁者の手法を実行しようとしている。危険な侵食は進んでいるが、大半の場面で反対の声は大きく、闘いは続いており、彼が成功する見込みは薄れつつある。\n\n最も失望させられるのは共和党が主導する議会だ。共和党議員たちはトランプの度を超えた行動をほぼ黙認してきた。反抗すれば予備選挙で対抗馬を立てられることを恐れているからだ。その意向に従い、富裕層への減税と労働者階級の医療削減を盛り込んだ「大きくて美しい法案」を成立させた。議員たちがようやく背骨を取り戻したのは最近になってからで、トランプの宴会場への資金提供、側近への利益誘導のための裏金、有権者抑圧の提案に反対するに至った。\n\n裁判所の実績はより良好だが、まだらではある。300件を超える訴訟がトランプ政権の行動に異議を唱え、その多くは少なくとも一時的に成功を収めた。最高裁は選挙資金、移民の強制送還、人種的ゲリマンダリング、独立機関に対する行政権力に関してトランプに勝利をもたらした。また、大統領を法の支配の上に置く判断も下している。それでも、推定6対3のトランプ寄り多数派を擁する最高裁でさえ、関税の発動、郵便投票の制限、連邦準備制度理事会理事の解任、出生地主義的市民権の制限といった試みを阻止した。\n\n政府の外では、メディアは依然として強力だ。トランプが名誉毀損訴訟や規制上の監督を通じて抑圧しようとしているにもかかわらず。たとえば政府の合併許可を必要としていたCBSニュースの企業オーナーへの圧力の後、物議を醸す編集長が任命され、政権に友好的な形で介入しているように見える。彼女はいま、名高い「60ミニッツ」スタッフの大量退職を監督することになった。憂慮すべきことに、同じオーナーが今度はCNNを買収しようとしている。\n\n億万長者のジェフ・ベゾスはかつてワシントン・ポストの救世主とみなされていた。彼は赤字覚悟で半ば慈善的な公共サービスとして同紙を運営する余裕が十分にあったはずだ。しかし、主要なビジネス上の利益を損なわれることを恐れ、トランプ政権を刺激するまいとしたようで、ポストの国際スタッフの大半を解雇し、編集への干渉と受け取られる事態によってコラムニストや政治漫画家を失った。\n\nしかし、依然として重要な独立した声は残っている。それはトランプの干渉に対して財務的利益がそれほど脆弱でない人々（ニューヨーク・タイムズのサルツバーガー家）、または外部のビジネス上の利害を持たない非営利組織（ガーディアン）によるオーナーシップの重要性を示している。ソーシャルメディアプラットフォームは、イーロン・マスクのXでさえ、トランプの度を超えた行動に関する無数の暴露や批判の場であり続けている。増殖するポッドキャストも同様だ。\n\n政府の行動を監視・批判するための重要な専門知識の源である大学は、おおむねこの嵐を乗り越えてきた。トランプは特に科学・医学研究への政府助成金を差し止めることで、大学を統制しようとした。それは財政的な打撃をもたらしアメリカのイノベーションを傷つけたが、政権と取引したのはごく一部の大学にとどまり、最も憂慮すべきはコロンビア大学だった。ハーバード大学は政権を提訴し、どの大学もトランプが提案したコンパクト（大学の独立性や学問の自由への政府介入を認める代わりに政府資金への優遇アクセスを得る取り決め）には参加しなかった。\n\n複数の大手法律事務所は、トランプが政府機関との取引を禁じると脅した後に取引を結んだ。しかし、トランプが指定する大義のために数百万ドル相当の無償法律サービスを提供することに同意したとして、厳しく批判された。他の法律事務所は反撃して成功を収め、政権に対する訴訟のいくつかを提起した。政権に屈服するのではなく立ち向かう弁護士を好む依頼人から恩恵を受けていると伝えられている。\n\n市民社会は依然として脅威にさらされているが、大部分は手つかずだ。ACLUのような団体が多くの訴訟を主導している。ヒューマン・ライツ・ウォッチのような団体はトランプの外交政策を強く批判している。トランプは南部貧困法律センターに対して虚偽の刑事告発を行い、政府資金に依存する団体は自己検閲を行っているが、あらゆる政治的立場からの多様な声の喧騒は依然として印象的だ。\n\n市民は街頭に出て不満を示した。全国的な「ノー・キングス」抗議運動は、トランプの君主的な傾向への不満の深さと広がりを示した。", "vocab": [{"word": "autocrat", "definition": "独裁者。民主的な制約を無視して絶対的な権力を行使する支配者を指す。"}, {"word": "gerrymandering", "definition": "ゲリマンダリング。特定の政党や集団に有利になるよう選挙区の境界を恣意的に引き直す行為。"}, {"word": "slush fund", "definition": "裏金・秘密資金。不正または不透明な目的のために密かに蓄えられた資金を指す慣用表現。"}, {"word": "pilloried", "definition": "公衆の面前で厳しく批判・非難される意。もともとは「さらし台にかける」という意味の動詞の過去形。"}, {"word": "cacophony", "definition": "不協和音、喧騒。多くの異なる声や意見が同時に響き合う騒がしい状態を比喩的に表す語。"}, {"word": "capitulate", "definition": "降伏する、屈服する。圧力や要求に対して抵抗をやめて従うことを意味する動詞。"}, {"word": "pro bono", "definition": "無償で（法律サービスなどを）提供することを指すラテン語由来の表現。主に弁護士が報酬なしに公益のために行う法律サービスに用いる。"}]}, {"title_ja": "トランプ氏のW杯介入、米国サッカーに利益よりも害をもたらす", "title_en": "Trump's World Cup Interference Harms US Soccer's Credibility More Than It Helps", "summary_ja": "著者は、トランプ大統領がFIFAのインファンティーノ会長に電話をかけ、フォラリン・バロガンの出場停止処分を撤回させたことは、ワールドカップにおける前例のない有害な政治介入だと主張する。米国のファンはバロガン復帰を歓迎するかもしれないが、この決定は米国が勝ち進んだ場合に不当な優遇という疑念を生じさせると論じている。記事はFIFAの過去の腐敗した取引と現状を比較し、トランプ氏の介入が米国サッカーの苦労して得た信頼性を損なうと警告する。", "summary_en": "The author argues that Donald Trump's phone calls to FIFA president Infantino, which resulted in Folarin Balogun's one-match suspension being lifted, represent an unprecedented and damaging political intervention in the 2026 World Cup. While US fans may welcome Balogun's reinstatement, the author contends this move taints any potential US victory with the perception of unfair advantage. The piece draws a parallel to corrupt FIFA dealings of the past and warns that Trump's meddling ultimately undermines American soccer's hard-won credibility on the world stage.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/football/2026/jul/06/donald-trump-folarin-balogun-world-cup-usmnt-intervention", "state_media": false, "category": "オピニオン", "full_text": "The story of Garrincha’s red card in the 1962 World Cup is the stuff of legend. The Brazilian great was sent off in the semi-finals for lashing out at an opponent, but back then, Fifa had no automatic one-match suspension in place. So a disciplinary committee convened the next day to decide his fate for the final.\nAs the story goes, the assistant referee who had the best view of the offense was paid off and disappeared, and the president of Chile, the tournament’s host, put in a call to Fifa, urging them to decide against any additional suspension. He did so for the sake of keeping one of the tournament’s most entertaining players on the field. Garrincha emerged scot-free, and Brazil won their second World Cup days later.\nIt’s the type of far-fetched tale that seems ancient, but Sunday brought the type of news that makes one realize that we’re not so far removed from those days. Ahead of the US men’s national team’s last-16 match against Belgium, Donald Trump had put in a series of phone calls to Gianni Infantino, as the US Soccer Federation sought ways to suspend the one-match ban issued to US striker Folarin Balogun.\nBalogun was sent off during the USMNT’s 2-0 victory over Bosnia and Herzegovina on Wednesday, having inadvertently stomped on the ankle of an opponent while vying for possession. The red card was dubious and it has been relitigated to death, with the general consensus that the US were hard done by the call, which was made after video review. Balogun, US head coach Mauricio Pochettino and a chorus of others expressed anger and disappointment at the sending off, but seemed to accept the suspension. US fans were outraged but many eventually resigned themselves to facing Belgium on Monday without their first-choice striker.\nWhich is right around the time Trump inserted himself in the situation. US Soccer had been doing its own lobbying and in short order, Balogun’s one-match ban was suspended until after the tournament. Fifa had done the same with a handful of players (including Cristiano Ronaldo) who had earned suspensions prior to the tournament but doing so during the World Cup itself is without precedent.\nWhat’s followed has been a mix of elation and outrage. Many US fans are understandably pleased by the development, as is Pochettino, who said as much on Sunday. Belgium head coach Rudi Garcia was incensed, telling reporters that he was unaware that April Fools’ Day falls in July. The Belgian federation says it is reviewing its legal options.\nFifa, of course, has its own explanation, though it doesn’t offer much insight. It simply points to the article in its bylaws that allows for this decision. Fifa officials took a similar approach when asked by multiple media outlets about Trump’s alleged phone calls, insisting that the very nature of its disciplinary process makes it impossible for that type of intervention to sway a decision.\nAsking any of us to believe that Fifa is not influenced by Trump is an absurdity. It is tantamount to asking us to believe that Trump was awarded its “peace prize” on merit alone. Infantino’s relationship with Trump has long been a cozy one, a mutually beneficial symbiosis where Trump gets the type of sycophantic praise and attention he thrives on and Infantino gets the keys to the biggest commercial market in the world for Fifa’s cash cow.\nWhat Trump does not realize – or perhaps he simply doesn’t care – is that he has done the whole of American soccer no favors by putting his thumb on the scales.\nThe USMNT have arrived at their current station in the tournament on their own merits, riding three exceptional performances and one bang average one to the last 16. Balogun has been arguably the US’s best player throughout that run.\nYet even without the Monaco striker, there was no shortage of pundits and oddsmakers pegging the US as likely to win against Belgium. The perception that the US have been handed an unfair advantage here – they have, to be clear – taints their potential advancement. This is true in the States but much more so globally, where Trump has become the latest in a long line of ugly Americans who are perceived, fairly or unfairly, to have expected preferential treatment.\nIt is unfortunate, too, for the American public, many of whom have raged against the assertion that their home country is a footballing backwater or that they lag well behind other nations in terms of talent and prestige. The US have done tremendously at this World Cup to prove that notion a farce, but a win on Monday may well be perceived as one engineered by Fifa.\nNorway head coach Ståle Solbakken seems to agree with the notion that a victory would carry an asterisk.\n“I think that’s a big mistake by Fifa,” he told reporters after his side’s shock 2-0 victory over Brazil on Sunday. “Bad, bad, bad, bad, bad decision. I feel sorry for the United States, because even if they win, the game will always have this bad thing about it. Not good for the sport. Bad decision by Fifa.”\nTrump’s i", "translation_ja": "1962年ワールドカップにおけるガリンシャのレッドカードの話は、伝説として語り継がれている。ブラジルの偉大な選手は準決勝で相手選手に暴力を振るって退場となったが、当時のFIFAには自動的な1試合出場停止処分が設けられていなかった。そのため、翌日に規律委員会が招集され、決勝戦に向けての処遇が審議された。\n\n伝えられるところによると、最も近い位置で反則を目撃した副審は買収されて姿を消し、開催国チリの大統領がFIFAに電話をかけ、追加の出場停止処分を下さないよう求めた。トーナメント最大のエンターテイナーをピッチに立たせ続けるためである。ガリンシャは処分を免れ、ブラジルは数日後に2度目のワールドカップ優勝を果たした。\n\nこれは荒唐無稽な昔話のように思えるが、日曜日のニュースは、私たちがその時代からそれほど遠く離れていないことを思い知らせるものだった。米国男子代表チームのベスト16・ベルギー戦を前に、ドナルド・トランプはジャンニ・インファンティーノに数回の電話をかけており、米国サッカー連盟は米国代表FWフォラリン・バロガンに科された1試合出場停止処分を停止させる方法を模索していた。\n\nバロガンはボスニア・ヘルツェゴビナとの試合でアメリカが2対0で勝利した際に退場となった。ボールの競り合い中に意図せず相手選手の足首を踏みつけてしまったのだ。このレッドカードは疑問視されており、ビデオ判定を経て下されたその判定についてはさんざん議論が繰り返されてきた。大方の見解は、米国が不当な判定を受けたというものだ。バロガン、米国代表のマウリシオ・ポチェッティーノ監督、そして多くの関係者が退場処分への怒りと失望を表明したが、出場停止は受け入れるしかないという姿勢を見せていた。米国のファンたちも憤慨していたが、多くはやがて、月曜日のベルギー戦を第一候補のストライカーなしで戦う現実を受け入れていた。\n\nまさにそのタイミングで、トランプが介入した。米国サッカー連盟も独自のロビー活動を続けており、やがてバロガンの1試合出場停止はトーナメント終了後まで保留されることになった。FIFAは大会前に出場停止処分を受けた数人の選手（クリスティアーノ・ロナウドを含む）に対して同様の措置を講じたことがあるが、ワールドカップ開催中にこうした対応が取られたのは前例がない。\n\nその後は、歓喜と憤慨が入り混じる展開となった。多くの米国ファンがこの展開を歓迎しているのは当然で、ポチェッティーノも日曜日にそう述べた。一方、ベルギー代表のルディ・ガルシア監督は激怒し、報道陣に対して「4月1日はいつから7月になったんだ」と語った。ベルギーサッカー連盟は法的な選択肢を検討中だという。\n\nもちろん、FIFAは独自の説明をしているが、それは大した根拠を示すものではない。単に、この決定を可能にする規則が定款に存在することを指摘しているに過ぎない。FIFA役員は、複数のメディアからトランプの電話疑惑について問われた際も同様の姿勢を取り、その規律プロセスの性質上、そのような介入が決定に影響を与えることは不可能だと主張した。\n\nFIFAがトランプの影響を受けていないと信じてほしいというのは、まったくもって馬鹿げた話だ。トランプがFIFAの「平和賞」を功績によって授与されたと信じてほしいと言うに等しい。インファンティーノとトランプの関係は長きにわたって親密であり、トランプが愛してやまない賛辞と注目をインファンティーノが提供し、その見返りにインファンティーノはFIFAの金のなる木を世界最大の商業市場に送り込む鍵を手にするという、相互に利益をもたらす共生関係にある。\n\nトランプが気づいていないこと——あるいは単に気にかけていないのかもしれないが——は、彼が秤に親指を乗せることで、アメリカサッカー全体に何ら利益をもたらしていないということだ。\n\n米国男子代表は、3つの際立ったパフォーマンスと1つの平凡な試合を経て、自力でベスト16にたどり着いた。バロガンは、その過程で米国の最優秀選手と言っても差し支えないほどの活躍を見せている。\n\nにもかかわらず、モナコ所属のストライカー不在であっても、米国がベルギーに勝利する可能性が高いと見る評論家やオッズメーカーは少なくなかった。米国が不当な優遇を受けたという認識——これは事実である——は、仮に米国が勝ち進んだとしても、その価値に疑念の影を落とす。このことは米国内でも当てはまるが、世界的に見ればさらに深刻だ。トランプは、不当にも、あるいは正当にも、優遇待遇を期待してきた「醜いアメリカ人」の長い系譜に連なる最新の一人として世界から見られている。\n\nまた、アメリカの一般市民にとっても残念なことだ。多くの米国民は、自国がサッカーの後進国だとか、才能や実績において他国に大きく遅れを取っているという主張に対して憤慨してきた。米国はこのワールドカップでその考えが戯言であることを見事に証明してきたが、月曜日の勝利は、FIFAによって演出されたものとして受け取られかねない。\n\nノルウェーのスタレ・ソルバッケン監督も、勝利にはアスタリスク（注釈付き）が付いてしまうという考えに同意しているようだ。\n\n「FIFAの大きな誤りだと思う」と彼は日曜日、自国チームがブラジルに2対0という衝撃的な勝利を収めた後、報道陣に語った。「ひどい、ひどい、ひどい決断だ。米国が気の毒でならない。なぜなら仮に彼らが勝ったとしても、この試合には常に汚点が残るからだ。スポーツにとって良いことではない。FIFAの悪い決断だ。」\n\nトランプの……", "vocab": [{"word": "scot-free", "definition": "「罰を受けずに済む、無傷で逃れる」という意味のイディオム。'emerge scot-free'で「お咎めなしで逃れる」という用法が一般的。"}, {"word": "incensed", "definition": "「激怒した、憤慨した」を意味する形容詞。angryよりも強い怒りを表し、フォーマルな文章やジャーナリズムでよく使われる。"}, {"word": "symbiosis", "definition": "本来は生物学で「共生」を意味するが、転じて二者が互いに利益を得る関係を表す比喩的表現として使われる。"}, {"word": "sycophantic", "definition": "「おべっかを使う、ごまをする」という意味の形容詞。権力者に媚びへつらう行為を批判的に描写する際に用いられる。"}, {"word": "tantamount", "definition": "「〜に等しい、〜も同然の」という意味の形容詞。'be tantamount to'の形で、ある行為や状況が別のものと実質的に同じであることを示す。"}, {"word": "litigated", "definition": "本来は「訴訟で争われた」を意味するが、'relitigated'の形で「再び徹底的に議論・検証された」という比喩的な意味で使われる。"}, {"word": "asterisk", "definition": "本来は記号「*」を指すが、スポーツの文脈では「条件付きの、公正さに疑問符が付く」という意味の比喩として使われる慣用表現。"}]}, {"title_ja": "信頼なくして大西洋同盟は存続できない", "title_en": "The Transatlantic Alliance Can't Survive Without Trust", "summary_ja": "筆者は、欧州がNATOの防衛費目標をようやく達成しつつあり、より有能な軍事パートナーになりつつある一方で、トランプ政権の一方的な行動——主要な意思決定から同盟国を排除し、ウクライナでロシア寄りの和平条件を追求し、グリーンランドをめぐって関税を脅しに使う——が同盟内に深刻な信頼の危機をもたらしていると論じる。こうした同盟の結束の崩壊は、欧州が最も価値あるパートナーになろうとしている時期に、欧州を遠ざけるリスクをはらんでいる。筆者の核心的な主張は、ワシントンが大西洋横断の信頼へのダメージを修復しなければ、最も重要な戦略的同盟を失いかねないというものだ。", "summary_en": "The author argues that while Europe is finally meeting NATO defense spending targets and becoming a more capable military partner, the Trump administration's unilateral behavior—excluding allies from key decisions, pursuing Russia-friendly peace terms in Ukraine, and threatening tariffs over Greenland—has created a dangerous crisis of trust. This erosion of allied solidarity risks pushing Europe away precisely when it is becoming most valuable as a partner. The central argument is that Washington must repair the damage to transatlantic trust or risk losing its most important strategic alliance.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/nato-transatlantic-alliance-cant-survive-without-trust", "state_media": false, "category": "オピニオン", "full_text": "For over a decade, U.S. President Donald Trump has accused Washington’s European allies of free-riding on American security guarantees. He has been criticizing NATO members that do not pay “their fair share” since launching his first presidential campaign in 2015. He threatened to pull out of the alliance after winning office, and then again when running for president in 2024. Just a few weeks ago, at a NATO meeting, U.S. Secretary of Defense Pete Hegseth announced a six-month review of the American military presence in Europe and declared that Washington’s payment of its annual NATO dues would be “contingent on other countries’ meeting their defense spending targets.” And at this month’s NATO summit in Turkey, the Trump administration’s threats to stop supporting Europe will surely hang over the proceedings.\nThe United States has suggested it might cut back its contributions to European security on many occasions since the end of the Cold War, but it has always come to the continent’s defense when required. When Europe proved unable to manage the war that broke out in Bosnia and Herzegovina in 1992, the United States intervened, paving the way for negotiations that ended the conflict. And even though Washington showed little appetite for coordinating a response to Russia’s annexation of Crimea in 2014, handing the diplomatic reins to France and Germany, the U.S. government stepped up after Russia’s full-scale invasion in 2022, offering strategic leadership and providing the bulk of NATO members’ military support to Ukraine. Throughout this time, the United States has pushed Europe to shoulder a greater share of NATO’s defense burden. But Europeans, confident that Washington would continue to support them when it counted, did not take this message as seriously as they should have.\nThe Trump administration has now challenged Europe’s sense of safety. It has downplayed U.S. interests in Ukraine, excluded European countries from talks to end the war there and from American deliberations to start a war with Iran, and eschewed formal processes to coordinate withdrawals of U.S. conventional forces from Europe. Unsure of the United States’ reliability and worried about facing Russian aggression alone, Europe has begun gathering the necessary resources to become a capable military power. The irony is that just as Europe becomes the kind of partner the United States should want on its side, Washington’s behavior has created a crisis of trust within the alliance. Now, if Washington cannot repair the damage it has done, it risks losing this ever more valuable ally altogether.\nESTRANGED PARTNERS\nOn paper, the transatlantic alliance is stronger and more balanced than ever. Almost all NATO members have met or exceeded the alliance’s defense spending target of two percent of GDP as of 2025, with spending increasing by 20 percent between 2024 and 2025. European allies and Canada now account for 40 percent of NATO’s total defense spending, up from 30 percent in 2020. If Europeans meet NATO’s 2035 targets, they would be spending more than $800 billion, a significant increase from Europe’s estimated total spending of $574 billion in 2025 and almost on par with the United States’ spending in 2025. In effect, the continent is beginning to do precisely what successive U.S. administrations have demanded for decades: assume greater responsibility for its own defense and thus enable Washington to focus resources elsewhere.\nYet a prolonged crisis of trust could erase any benefits Europe’s new defense commitments bring to the alliance. European leaders are increasingly frustrated with the United States’ lack of consultation with its allies. Washington, for instance, did not discuss its plans with European leaders before attacking Iran, and European governments have distanced themselves from the subsequent war as a result. In 2003, by contrast, several European governments opposed the U.S. invasion of Iraq but still offered limited support because of a sense of allied solidarity. They participated in NATO consultations and shared intelligence. Today, European governments are far more reluctant to engage at all. Some have even restricted U.S. military access to their airspace or bases for operations linked to Iran.\nThis wariness of the United States has been building for months. In Ukraine, rather than clearly representing collective allied interests in the diplomatic process to end the war, Washington has presented itself as a mediator between Russia and NATO. This was most apparent in Trump’s 28-point peace plan, leaked in November 2025, that heavily favored Russian interests, causing consternation in European capitals. Meanwhile, his public threats to seize Greenland have been met with outright hostility. In January, when Washington threatened to impose tariffs on European countries that opposed Trump’s ambition to acquire the territory, the European Union started to consider retaliatory economic measures whose use against an ally w", "translation_ja": "大西洋同盟は信頼なしには存続できない\n\n10年以上にわたり、米国のドナルド・トランプ大統領はワシントンの欧州同盟国がアメリカの安全保障上の保証に「ただ乗り」していると非難してきた。彼は2015年に最初の大統領選挙運動を開始して以来、「相応の負担」を支払っていないNATO加盟国を批判し続けている。トランプは就任後に同盟から脱退すると脅し、2024年の大統領選への出馬時にも再び同様の脅しをかけた。ほんの数週間前、NATOの会合で米国のピート・ヘグセス国防長官は欧州における米軍プレゼンスの6カ月間の見直しを発表し、米国の年次NATO拠出金の支払いは「他国が防衛費目標を達成することを条件とする」と宣言した。そして今月トルコで開催されるNATOサミットでも、欧州への支援を停止するというトランプ政権の脅しが影を落とすことは間違いない。\n\n冷戦終結以来、米国は欧州の安全保障への貢献を削減するかもしれないと示唆する機会は何度もあったが、必要とされた際には常に欧州の防衛に踏み出してきた。1992年にボスニア・ヘルツェゴビナで勃発した戦争を欧州が単独では収拾できないと判明すると、米国は介入し、紛争を終結させた交渉への道を切り開いた。また、ワシントンが2014年のロシアによるクリミア併合への対応を調整することにほとんど乗り気でなく、フランスとドイツに外交の主導権を委ねた際も、米国政府は2022年のロシアによる全面侵攻後に奮起し、戦略的リーダーシップを提供するとともにNATO加盟国によるウクライナへの軍事支援の大部分を担った。この間を通じて、米国は欧州にNATOの防衛負担のより大きな部分を担うよう求め続けた。しかし欧州諸国は、いざとなればワシントンが引き続き自分たちを支援してくれるという確信から、このメッセージを本来あるべきほど真剣に受け止めてこなかった。\n\nトランプ政権は今、欧州の安心感に挑戦状を叩きつけている。政権はウクライナにおける米国の利益を軽視し、そこでの戦争を終わらせる交渉から欧州諸国を排除し、イランとの戦争を始めるという米国の審議からも欧州を除外し、欧州からの米国通常戦力撤退を調整する公式プロセスを避けてきた。米国の信頼性に不安を覚え、ロシアの侵略に単独で直面することを懸念した欧州は、有能な軍事大国となるために必要なリソースを集め始めた。皮肉なことに、欧州が米国にとって望ましいパートナーになりつつあるまさにその時に、ワシントンの行動が同盟内に信頼の危機をもたらしてしまった。今やワシントンが引き起こしたダメージを修復できなければ、ますます価値を増しているこの同盟国を完全に失うリスクを冒すことになる。\n\n疎遠になったパートナーたち\n\n書類上、大西洋横断の同盟はかつてないほど強固でバランスが取れている。2025年時点でほぼすべてのNATO加盟国がGDP比2パーセントという同盟の防衛費目標を達成または超過しており、防衛費は2024年から2025年の間に20パーセント増加した。欧州同盟国とカナダは今やNATOの防衛費総額の40パーセントを占めており、2020年の30パーセントから上昇している。欧州がNATOの2035年目標を達成すれば、8000億ドルを超える支出となり、2025年の欧州の推定総支出5740億ドルから大幅に増加し、2025年の米国の支出とほぼ肩を並べることになる。実質的に、欧州大陸は歴代の米国政権が何十年もの間要求してきたことを始めようとしている。すなわち、自国防衛により大きな責任を負い、それによってワシントンが他の場所にリソースを集中できるようにするということだ。\n\nしかし、長引く信頼の危機は、欧州の新たな防衛コミットメントが同盟にもたらすあらゆる恩恵を台無しにしかねない。欧州の指導者たちは、米国が同盟国と協議しないことへの不満を募らせている。例えばワシントンは、イランへの攻撃を実行する前に欧州の指導者たちと計画を協議せず、その結果として欧州各国政府はその後の戦争から距離を置くことになった。対照的に2003年には、複数の欧州政府がイラクへの米国の侵攻に反対しながらも、同盟連帯の精神から限定的な支援を提供した。NATOの協議に参加し、情報を共有した。今日、欧州各国政府はそもそも関与すること自体にはるかに消極的だ。一部の国はイランに関連する作戦のための米軍の自国領空や基地へのアクセスを制限さえしている。\n\nこうした米国への警戒感はここ数カ月で高まってきた。ウクライナ問題では、ワシントンは戦争を終結させる外交プロセスにおいて同盟国の集合的な利益を明確に代表するのではなく、ロシアとNATOの間の仲介者として自らを位置付けてきた。このことが最も顕著に表れたのが、2025年11月に流出したトランプの28項目からなる和平案であり、ロシアの利益を大きく優先する内容が欧州各国首都に動揺をもたらした。一方、グリーンランドを取得するというトランプの野心に反対する欧州諸国に関税を課すという公の脅しは、露骨な敵意をもって受け止められた。1月には、ワシントンがトランプの領土取得の野心に反対する欧州諸国に関税を課すと脅したことを受け、欧州連合は同盟国に対して用いることがかつて考えられなかった報復的経済措置の検討を開始した。", "vocab": [{"word": "free-riding", "definition": "「ただ乗り」を意味するイディオム表現で、他者の努力や費用負担に便乗しながら自らは相応の貢献をしないことを指す。国際関係論や経済学で頻出する概念。"}, {"word": "eschewed", "definition": "「意図的に避けた・差し控えた」を意味する動詞 eschew の過去形。フォーマルな文脈で用いられる高度な語彙で、単に avoid と言うよりも強い意志的な回避のニュアンスを持つ。"}, {"word": "consternation", "definition": "「驚愕・狼狽・動揺」を意味する名詞。予期せぬ出来事や衝撃的なニュースを受けて生じる深い不安や困惑の感情を表し、外交・政治文書で頻繁に使われる。"}, {"word": "contingent on", "definition": "「〜を条件とする・〜次第である」を意味するフレーズ。ある事柄の実現が別の条件の成否に依存していることを表す表現で、法律・外交・ビジネス文書で広く使われる。"}, {"word": "retaliatory", "definition": "「報復的な・仕返しの」を意味する形容詞。相手の行動に対する対抗措置や制裁を形容する際に用いられ、外交や貿易摩擦の文脈で特によく登場する語。"}, {"word": "paving the way", "definition": "「〜への道を切り開く・〜を可能にする」を意味するイディオム表現。ある出来事や行動が後続のより重要な出来事の実現を促進・可能にすることを比喩的に表す。"}, {"word": "estranged", "definition": "「疎遠になった・仲たがいした」を意味する形容詞。かつて親密だった関係が冷え込み、距離や不信感が生じた状態を表す語で、外交や人間関係の文脈で使われる。"}]}, {"title_ja": "AIインフラ構築の新たな道：国家的野心と地域の正統性をどう橋渡しするか", "title_en": "A Better Way to Build AI Infrastructure: Bridging National Ambition and Local Legitimacy", "summary_ja": "筆者は、米国がAIインフラ整備における連邦政府の野心と地域の統治現実を調整する制度モデルを構築しなければならないと主張する。ニューヨーク州カユガ湖畔での大規模データセンター計画に当事者として関わった経験を踏まえ、許認可プロセスを一度限りの同意取り付けではなく、継続的な信頼関係構築へと転換すべきだと訴える。この転換に失敗すれば、民主的な合意なしにインフラを整備できる中国などのライバル国に対して、米国は重要な戦略的優位を失うリスクがあると警告する。", "summary_en": "The author argues that the United States must develop an institutional model that reconciles federal AI infrastructure ambitions with local governance realities, rather than steamrolling community opposition or ceding ground indefinitely. Drawing on personal experience with a proposed data center near Cayuga Lake, the author contends that permitting must evolve into a sustained relationship built on trust rather than a single moment of contested consent. Failure to do so risks strategic disadvantage relative to rivals like China who build infrastructure without democratic accountability.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/better-way-build-ai", "state_media": false, "category": "オピニオン", "full_text": "As the United States races to build the infrastructure required for artificial intelligence, it faces a constraint: legitimacy at the local level. Data centers, transmission lines, and energy-intensive computing facilities have become strategic assets, central to economic competitiveness and national power. Yet they must be sited, permitted, and sustained in communities whose priorities do not always align with national ambitions. The result is a widening gap between federal technological strategy and the local governance structures responsible for implementing it.\nThis tension between national ambition and local authority is not universal. In China, for example, large-scale digital infrastructure is planned, permitted, and constructed through nationally coordinated processes that subordinate local opposition to state priorities. The Chinese Communist Party treats data centers, transmission corridors, and energy projects as instruments of national strategy rather than negotiated outcomes. That model carries its own political and social risks, concentrating burdens on communities that lack the freedom to contest projects or the legal and political mechanisms to hold planners accountable. But it confers strategic advantage: speed, scale, and predictability.\nThe United States, by contrast, must pursue comparable ambitions within a decentralized system that grants local governments veto power. If the country is serious about leading in artificial intelligence, it will need an institutional model that connects national ambition with local legitimacy. Without such a model, the physical foundations of AI leadership will continue to be contested one community at a time—and each new data center risks becoming another battleground in a broader struggle over how technological progress is governed. The pattern is increasingly familiar: a company proposes a facility, a community mobilizes in opposition, and the debate devolves into mistrust, rumor, and hardened positions. The outcome is not simply delay but a loss of confidence on both sides that makes compromise increasingly difficult.\nThe challenge for democratic institutions is not to imitate China but to adapt fast enough to sustain technological leadership. That requires treating local buy-in as an asset rather than a hurdle. U.S. regulators and developers must transform permitting from a single moment of consent into a sustained relationship. If they fail to make this shift, the United States risks a future in which projects stall in litigation, local resistance hardens into permanent opposition, and the country cedes an important strategic advantage to rivals willing to build without the public’s consent.\nTHE VIEW FROM CAYUGA\nI have observed this debate not as a detached analyst but as a resident of Lansing, New York, where the energy and digital infrastructure company TeraWulf is seeking to develop a large data center campus supporting next-generation AI computing on the site of a retired coal plant. The proposal has drawn passionate support and opposition from local residents and officials.\nLike many in the community, I value Cayuga Lake not as an abstraction but as something irreplaceable that we have a duty to protect. At the same time, the region’s economic realities are difficult to ignore: a shrinking tax base, aging infrastructure, and rising public costs that have strained local government for years.\nAs both a resident who would live with the project’s consequences and a tech policy scholar who studies the governance of digital infrastructure and has a background in environmental impact, I offered to conduct an independent assessment of the project’s likely effects on water use, power demand, employment, and the local tax base. (The company agreed and compensated me for the time required to conduct the analysis. It had no role in determining the scope of the study, conducting the research, interpreting the findings, or drafting the report, and it exercised no editorial control over the final product.) I found that the engineering, on its own terms, was sound. The proposed closed-loop cooling system would largely eliminate operational water withdrawals from Cayuga Lake, replacing the retired coal plant’s once water-intensive operations. Similarly, although the data center campus’s electricity demand would be substantial, the site already has considerable transmission infrastructure and is located within a regional grid in which electricity generation is predominantly carbon free and sizable surplus capacity exists.\nRegulators and developers must treat local buy-in as an asset rather than a hurdle.\nMuch of the opposition ran on misinformation and the conflation of project-specific issues with broader anxieties. Some concerns reflected a general apprehension about AI, corporate power, and environmental change that extended beyond the project itself. Questions about surveillance, workers being displaced by AI, and environmental harm became intertwined with d", "translation_ja": "米国がAI（人工知能）に必要なインフラの整備を急ぐ中、ある制約に直面している。それは地域レベルでの正統性（レジティマシー）の問題だ。データセンター、送電線、エネルギー集約型の計算施設は戦略的資産となり、経済競争力と国家的パワーの中枢を担っている。しかし、それらの施設は、国家の野心と必ずしも一致しない優先事項を持つコミュニティにおいて、立地選定・許認可・維持管理が行われなければならない。その結果、連邦政府の技術戦略と、その実施を担う地方統治構造との間に、広がり続けるギャップが生じている。\n\nこの国家的野心と地方の権限をめぐる緊張は、普遍的なものではない。たとえば中国では、大規模なデジタルインフラが、地方の反対を国家の優先事項に従属させる全国的に調整されたプロセスを通じて計画・許可・建設される。中国共産党はデータセンター、送電回廊、エネルギープロジェクトを、交渉によって決まる結果ではなく、国家戦略の手段として扱う。そのモデルにはそれ自体の政治的・社会的リスクが伴う。プロジェクトに異議を唱える自由も、計画者に責任を取らせる法的・政治的メカニズムも持たないコミュニティに負担が集中するのだ。しかし、そのモデルは戦略的優位をもたらす——速度、規模、予測可能性だ。\n\n対照的に米国は、地方政府に拒否権を付与する分散化されたシステムの中で、同等の野心を追求しなければならない。AI分野でのリーダーシップを真剣に目指すなら、国家的野心と地域の正統性を結びつける制度モデルが必要になる。そのようなモデルなしでは、AIリーダーシップの物的基盤はコミュニティごとに争われ続け、新たなデータセンターはいずれも、技術的進歩がいかに統治されるべきかをめぐるより大きな争いの戦場となるリスクがある。このパターンはますます見慣れたものになってきた。企業が施設を提案し、コミュニティが反対運動を起こし、議論は不信感・噂・硬直した立場へと堕落する。その結果は単なる遅延だけではなく、双方における信頼の喪失であり、それが妥協をますます困難にする。\n\n民主主義的制度にとっての課題は、中国を模倣することではなく、技術的リーダーシップを維持するのに十分なスピードで適応することだ。そのためには、地域の賛同を障害としてではなく資産として扱う必要がある。米国の規制当局と開発業者は、許認可を一度限りの同意の瞬間から、持続的な関係へと変革しなければならない。この転換を果たせなければ、プロジェクトは訴訟で停滞し、地域の抵抗は永続的な反対へと硬化し、国民の同意なしに建設しようとするライバルに重要な戦略的優位を譲り渡すという未来を、米国は迎えることになる。\n\n【カユガからの視点】\n\n私はこの議論を、無関係な分析者としてではなく、ニューヨーク州ランシングの住民として観察してきた。エネルギー・デジタルインフラ企業のテラウルフが、廃止された石炭発電所の跡地に、次世代AI計算を支える大規模データセンターキャンパスの開発を求めている地域だ。この提案は、地域住民と行政関係者から熱烈な支持と反対の両方を引き出してきた。\n\nこのコミュニティの多くの人々と同様、私もカユガ湖を抽象的な概念としてではなく、私たちが守る義務を持つ、かけがえのものとして大切にしている。同時に、この地域の経済的現実も無視できない。縮小する税基盤、老朽化するインフラ、地方行政を長年にわたって圧迫してきた増大する公共コストだ。\n\nプロジェクトの影響を直接受けながら生活する住民として、また、デジタルインフラのガバナンスを研究し環境影響評価の背景を持つテクノロジー政策研究者として、私はプロジェクトが水使用、電力需要、雇用、地方税収に与える影響の独立した評価を実施することを申し出た。（同社はこれに同意し、分析の実施に必要な時間に対して私に報酬を支払った。同社は調査範囲の決定、調査の実施、調査結果の解釈、報告書の起草において何ら関与せず、最終成果物に対する編集上のコントロールも一切行使しなかった。）私の調査結果では、エンジニアリングはそれ自体の観点からは健全であることがわかった。提案された密閉循環冷却システムは、カユガ湖からの運用上の取水をほぼ完全に排除し、廃止された石炭発電所がかつて行っていた水集約型の操業を置き換えるものだ。同様に、データセンターキャンパスの電力需要は相当なものになるが、当該サイトにはすでにかなりの送電インフラがあり、電力発電が主に炭素フリーで相当な余剰容量が存在する地域グリッド内に立地している。\n\n規制当局と開発業者は、地域の賛同を障害ではなく資産として扱わなければならない。\n\n反対意見の多くは誤った情報と、プロジェクト固有の問題をより広い不安と混同したものに基づいていた。一部の懸念は、プロジェクト自体を超えた、AIや企業権力、環境変化に対する一般的な不安を反映していた。監視、AIによる労働者の置き換え、環境被害に関する疑問が、プロジェクト固有の議論と絡み合っていった。", "vocab": [{"word": "legitimacy", "definition": "正統性・正当性を意味する名詞。政治・社会的文脈で、権力や決定が広く受け入れられ、認められている状態を指す。"}, {"word": "subordinate", "definition": "動詞として使う場合、あるものを別のものより低い地位に置く・従属させることを意味する。本文では地方の反対意見を国家の優先事項に従わせる文脈で使用されている。"}, {"word": "decentralized", "definition": "権限や機能が中央ではなく複数の地方に分散している状態を表す形容詞。統治・組織構造の文脈で頻出する上級語彙。"}, {"word": "permitting", "definition": "インフラや建設プロジェクトに対して当局が許可・認可を付与するプロセスを指す名詞。規制・政策の文脈で使われる専門的表現。"}, {"word": "conflation", "definition": "異なる概念や問題を誤って同一視・混同すること。本文では環境問題への不安とプロジェクト固有の議題が混同された状況を説明するために使われている。"}, {"word": "apprehension", "definition": "不安・懸念・心配を意味する名詞。単純な「worry」より改まった文体で使われる上級語彙で、TOEIC高得点向け試験にも頻出する。"}, {"word": "cedes", "definition": "動詞「cede」の三人称単数形で、権利・権限・領土などを相手に譲り渡す・手放すことを意味する。国際政治や競争の文脈でよく用いられる。"}]}, {"title_ja": "軍と共和国：アメリカにおける文民統制の本質", "title_en": "The Military and the Republic: Civil-Military Relations in America", "summary_ja": "筆者は、健全な文民軍事関係がアメリカ民主主義の根幹であると主張し、軍を国内の政治的に論争的な任務に使用する誘惑に警鐘を鳴らす。ジョージ・ワシントンが文民権力に従い続けた先例を引きながら、軍への過度な依存が共和制統治を損なうリスクを指摘する。また、アメリカという実験を維持するために、文民機関と軍の双方が継続的な改善を追求すべきだと訴えている。", "summary_en": "The author argues that healthy civil-military relations are foundational to American democracy, warning against the temptation to use the military for politically contentious domestic missions. Drawing on George Washington's example of deferring to civilian authority, the piece cautions that over-reliance on military solutions risks undermining republican governance. The author calls for continuous improvement in both civilian institutions and the military itself to sustain the American experiment.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/military-and-republic-charles-q-brown", "state_media": false, "category": "オピニオン", "full_text": "Celebrations of America’s founding and reflections on its ideals often overlook the central role of civil-military relations. This is a mistake. In the Declaration of Independence, a chief complaint was that King George III “affected to render the Military independent of and superior to the Civil power.” George Washington himself worried about this abuse of power and went to great pains to avoid it in his own career. Throughout the Revolutionary War, he constantly deferred to the Continental Congress despite its calamitous delays and erratic instructions, because he recognized that his authority over the Continental Army flowed from the people’s representatives. Given his immense personal popularity, he was often encouraged to redress this or that political dysfunction, but he knew that the republic would suffer in the long run if the military were to become an instrument of the commander’s will rather than of the people’s elected leaders.\nThe United States has not recently had leaders of Washington’s popularity, but in other ways the present moment recalls the era that followed the country’s founding. Today, as it was then, there is gridlock in the civilian political system. Similarly, Americans today hold the military in high regard compared with civilian branches of government. When the public is confronted with a problem that seems too big for the civilian branches to solve, the reflex is to ask the military to handle it. Both Presidents Donald Trump and Joe Biden, for instance, looked to the military to play a leading role in responding to the COVID-19 pandemic.\nThe temptation for mission creep is understandable: the U.S. military is the most advanced in the world, with a budget two to three times that of its nearest competitor. As the recent capture of Venezuelan dictator Nicolàs Maduro demonstrated, U.S. service members can do things no other military in the world can do. And in the face of a genuine national disaster, the public will readily embrace the military’s help; during the Great Depression, for instance, President Herbert Hoover directed the military to set up relief camps and President Franklin Roosevelt ordered it to establish the Civilian Conservation Corps, which put unemployed men to work to develop public land.\nBut when presidents use the armed forces for more politically contentious missions, such as addressing domestic crime in cities, the work of the military becomes more fraught. Resorting to a military solution rather than fixing the underlying incapacity or dysfunction in civilian institutions diverts the military from focusing on its primary combat mission. And, as Washington knew, it is not the military’s job to save the republic from political impasses. Indeed, if you ask too much of the military, you risk the entire enterprise.\nTHE AMERICAN INHERITANCE\nA quarter millennium after the first Americans rejected monarchy, representative democracy remains an “experiment entrusted to the hands of the American people,” as Washington said in his first inaugural address. It has been tenderly handed down from generation to generation, and it has been bitterly contested. The Civil War was only the greatest test of whether this experiment could survive its divisions, as the United States has faced disagreements throughout its history, including in the agrarian discontent of the 1890s, the depression and isolationism of the 1930s, the progress and tumult of the 1960s, and the political polarization of recent years.\nIn each chapter, the best political leaders found inspiration to overcome political divisions in the ideals that prompted the first patriots. These leaders held dear the self-evident truths “that all men are created equal [and] endowed by their Creator with certain unalienable Rights.” Of course, those ideals, so well articulated by the founders, were not so well practiced by them. Thomas Jefferson held the pen for the stirringly universal Declaration of Independence, yet he also held people in bondage. Washington, the indispensable man, considered the institution of slavery to be indispensable to the nation’s prosperity (at least initially). All the founders left women out of the equation entirely. But the American experiment strengthens each time its leaders recognize that the founders’ project to create a more perfect union is an enduring one—one to be passed down to every generation.\nThe ideal was better than the reality 250 years ago, and so it is today. For every American institution, including the military, this project of continuous improvement takes concerted effort and is not easy. Indeed, despite its advantages, the U.S. military today must stay humble and learn the lessons of the wars in Ukraine and Iran, including questioning traditional assumptions of U.S. air supremacy. To maintain professionalism in its all-volunteer force, the military must also find new ways to remain connected to American society and to persuade capable young men and women from all walks of li", "translation_ja": "アメリカの建国を祝い、その理想を振り返る機会において、文民軍事関係の中心的な役割はしばしば見過ごされる。これは誤りである。独立宣言の中で、国王ジョージ三世への主要な不満の一つは、彼が「軍を文民権力から独立させ、それより優位に置こうとした」ことであった。ジョージ・ワシントン自身もこの権力の濫用を憂慮し、自らのキャリアにおいてそれを避けるために多大な努力を払った。独立戦争を通じて、彼は大陸会議の壊滅的な遅延や場当たり的な指示にもかかわらず、常に同会議に従い続けた。それは、大陸軍に対する自らの権威が人民の代表者から生じていることを認識していたからである。絶大な個人的人気を誇っていた彼は、さまざまな政治的機能不全を是正するよう繰り返し促されたが、軍が指揮官の意志の道具となり、人民の選出した指導者の道具でなくなれば、長期的に共和国は損なわれると知っていた。\n\n近年、アメリカはワシントンほどの人気を持つ指導者を持っていないが、別の意味で現在の状況は建国後の時代を想起させる。当時と同様に、今日も文民政治システムは機能不全に陥っている。同様に、今日のアメリカ人は政府の文民部門と比較して軍を高く評価している。解決困難に思える問題に直面したとき、人々の反射的な反応は軍に対処を求めることである。たとえばドナルド・トランプ前大統領とジョー・バイデン前大統領はいずれも、新型コロナウイルス感染症のパンデミック対応において軍が主導的役割を果たすことを求めた。\n\n任務の拡大への誘惑は理解できる。アメリカ軍は世界で最も高度な軍隊であり、その予算は最も近い競合国の二〜三倍に達する。最近のベネズエラの独裁者ニコラス・マドゥロの拘束が示したように、アメリカの軍人は世界のどの軍隊にもできないことを成し遂げることができる。そして真の国家的災害に直面したとき、国民は軍の支援を容易に受け入れる。たとえば大恐慌の時代、ハーバート・フーバー大統領は軍に救済キャンプの設置を命じ、フランクリン・ルーズベルト大統領は失業者に公有地の整備作業をさせる市民保全部隊（CCC）の設立を命じた。\n\nしかし、大統領が都市部の国内犯罪への対処といった政治的に論争の多い任務のために軍を使用する場合、軍の活動はより複雑な様相を呈する。民間機関の根本的な非効率や機能不全を修復するのではなく軍事的解決に頼ることは、軍が本来の戦闘任務に集中することを妨げる。そして、ワシントンが知っていたように、政治的行き詰まりから共和国を救うことは軍の仕事ではない。軍に過大な要求をすれば、その企て全体を危険にさらすことになる。\n\n【アメリカの遺産】\n\n最初のアメリカ人が君主制を拒絶してから四分の一千年が経った今も、代表制民主主義はワシントンが最初の就任演説で語ったように「アメリカ国民の手に委ねられた実験」であり続けている。それは世代から世代へと大切に受け継がれ、激しく争われてきた。南北戦争は、この実験が分裂を乗り越えて生き残れるかどうかの最大の試練に過ぎず、アメリカは一八九〇年代の農業不満、一九三〇年代の恐慌と孤立主義、一九六〇年代の進歩と混乱、そして近年の政治的分極化など、歴史を通じて幾多の対立に直面してきた。\n\nそのどの時代においても、最良の政治指導者たちは最初の愛国者たちを突き動かした理想の中に、政治的分裂を乗り越える霊感を見出した。彼らは「すべての人は平等に造られ、創造主によって一定の奪い得ない権利を与えられている」という自明の真理を大切にした。もちろん、建国者たちによってあれほど雄弁に語られたその理想は、彼ら自身によって十分に実践されたわけではない。トーマス・ジェファーソンは感動的なほど普遍的な独立宣言の起草者でありながら、人々を隷属させてもいた。欠かせない人物であるワシントンは（少なくとも当初は）奴隷制度を国の繁栄に不可欠な制度とみなしていた。建国者たちは全員、女性を計算から除外していた。しかし、建国者たちが「より完全な連邦を形成する」という計画は現在も続いており、すべての世代に引き継がれるべきものであると指導者たちが認識するたびに、アメリカという実験は強化される。\n\n二百五十年前も理想は現実より優れており、今日もそれは変わらない。軍を含むすべてのアメリカの機関にとって、この継続的な改善というプロジェクトは一致した努力を要し、容易ではない。実際、その優位性にもかかわらず、今日のアメリカ軍はウクライナとイランでの戦争から教訓を学ぶために謙虚であり続けなければならず、アメリカの制空権に関する従来の仮定に疑問を呈することも含まれる。オール・ボランティア制の軍隊の専門性を維持するためには、アメリカ社会との結びつきを保ち、あらゆる階層の有能な若い男女を説得する新たな方法を見つけなければならない。", "vocab": [{"word": "calamitous", "definition": "「壊滅的な、悲惨な」という意味の形容詞。重大な損害や失敗をもたらす状況を描写する際に用いられる格式ある語。"}, {"word": "mission creep", "definition": "「任務の漸進的拡大」を意味する慣用表現。当初の目的を超えて軍や組織の役割・活動範囲が徐々に拡大していく現象を指す。"}, {"word": "fraught", "definition": "「（困難・危険などを）はらんだ、複雑で問題の多い」という意味の形容詞。通例 'fraught with' の形で使われるが、単独で「緊張をはらんだ」の意味でも用いられる。"}, {"word": "agrarian", "definition": "「農業の、農地に関する」という意味の形容詞。農業政策や農村社会に関連する政治・経済的文脈で使われる専門的語彙。"}, {"word": "polarization", "definition": "「分極化」を意味する名詞。社会や政治において意見や立場が対立する二極に分かれていく現象を指し、現代の政治言説で頻出する語。"}, {"word": "indispensable", "definition": "「不可欠な、なくてはならない」という意味の形容詞。ある人物や物が特定の目的・状況において絶対に必要であることを強調する際に用いる。"}, {"word": "concerted", "definition": "「協調した、一致団結した」という意味の形容詞。複数の関係者が共通の目標に向けて組織的・計画的に努力する様子を表す。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}
