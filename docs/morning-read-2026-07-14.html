0SW5CSFA1elNTaXFqeFpMbjdiRGF3?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Grupo Globo is preparing initiatives for its centennial year - O GLOBO", "title_en": "Grupo Globo is preparing initiatives for its centennial year - O GLOBO", "summary_ja": "Grupo Globo is preparing initiatives for its centennial year O GLOBO", "summary_en": "Grupo Globo is preparing initiatives for its centennial year O GLOBO", "source": "O Globo", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxPMVZRN2RsM0EtZWt6dlpuR0tvNElsSkhsaDdsd0lYalpqS285YlBna1RjbUdxWkFZOXotLWxJV3ZUczBZMGVPeUl0X0FLYXZXYy1ILTBqN3E1XzJVVTFrUXo0Y29RamNyanhVcUF6U2ZpUEdITV9ubk1oMF82c3FjM2ljZUZVbmZ0UG5sY0hkRTNvNGVqTnpuNlR2N21sYUZybkJHeVBHUkF2MUlUSFlpREtOQTFXaVJVUmfSAcgBQVVfeXFMUDJCRm16ZDU5bjViV21mdm1KMzJ5c3JnVjBEcVpJUGF2b0tnZ1JkRGhVVDVYM1pyMFNKQUNIdDVGQWRkTjNhR0dSai1kQS1nLVFwUFlDYm1aMjFaNEx2Y1YzWjVRWlNfN3lPWC1ERF9ZcVFhOFpTY3VVX0w2bmNyR2Rick9VLXRDemFydWFXOHhaSFhLai1PSmdfUlhDT0NiY0Z0TGJFUGZxLVhDdmxmZ25hcHl0T3dhWm9VeHZaWTRPa252QVNQdkM?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Aliko Dangote: Africa’s industrialist-in-chief, By Wale Osofisan", "title_en": "Aliko Dangote: Africa’s industrialist-in-chief, By Wale Osofisan", "summary_ja": "Africa does not need to wait for its moment. It can build it. Dangote’s story shows what becomes possible when ambition meets execution and when vision is backed by the courage to invest at scale. If one man can shift the industrial balance of an entire region, imagine what ten could do. Africa’s ne", "summary_en": "Africa does not need to wait for its moment. It can build it. Dangote’s story shows what becomes possible when ambition meets execution and when vision is backed by the courage to invest at scale. If one man can shift the industrial balance of an entire region, imagine what ten could do. Africa’s ne", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/opinion/895271-aliko-dangote-africas-industrialist-in-chief-by-wale-osofisan.html", "state_media": false, "category": "経済", "full_text": "Africa does not need to wait for its moment. It can build it. Dangote’s story shows what becomes possible when ambition meets execution and when vision is backed by the courage to invest at scale. If one man can shift the industrial balance of an entire region, imagine what ten could do. Africa’s next chapter will be written by those who choose to build, and Dangote has shown the continent exactly where that path begins.\nAliko Dangote’s rise from a trader from Kano to the builder of some of Africa’s most important industrial assets marks a defining moment in the continent’s economic journey. His refinery in Lekki, Lagos, and his plan to establish a similar facility in Kenya signal a broad shift in Africa’s development path – one shaped by productive capacity, long term investment, and the steady growth of human capital.\nDangote’s vision, and the scale at which he has pursued it, is changing how Africa engages with the global economy. It is also influencing how countries on the continent absorb external shocks, strengthen domestic stability, and position themselves within increasingly complex supply chains.\nA Refinery That Repositioned Nigeria\nThe Dangote Refinery in Lagos is the largest single train refinery in the world, yet its importance goes far beyond its size. It has become a strategic buffer at a time when global supply chains are under strain, especially with the crisis in the Strait of Hormuz disrupting energy flows. Nigeria, long vulnerable to swings in global markets, now has a domestic anchor that shields it from sudden disruptions. Its international reach is equally striking. Recent reports show that the refinery has overtaken the United States in supplying jet fuel to Europe. This development marks a shift in Africa’s place within global industrial flows. Instead of exporting crude and importing refined products, Nigeria is now supplying refined value to major markets. The implications for economic stability, trade, and national confidence are profound and long lasting.\nKenya and East Africa: The Next Industrial Frontier\nDangote’s intention to build a refinery in Kenya represents a significant continental milestone. A facility of that scale would serve the East African market and deepen regional integration. It would support aviation hubs in Nairobi, Kampala, Addis Ababa, Kigali, and Dar es Salaam, while providing a reliable supply of refined products for manufacturing, logistics, and agriculture.\nSuch an investment would strengthen the promise of the African Continental Free Trade Area by creating industrial corridors that link regions through production rather than consumption. It would also expand skilled employment and technical expertise across East Africa. This is the kind of long-term capital that anchors economies and reduces exposure to global volatility.\nA Political Economy Shift Taking Shape\nAcross Africa, there is a growing recognition that sustainable development depends on productive capacity. Industrialisation, investment, and human capital development are central to this emerging consensus. Dangote’s work shows how these elements can reinforce one another to strengthen national and regional economies.\n- His investments highlight three essential pillars:\n- Industrial capacity that turns raw materials into refined products at scale;\n- Long term capital that builds assets supporting economic stability and regional trade;\n- Human capital that trains engineers, technicians, and managers who drive industrial growth.\nThis approach reflects a wider argument that Africa’s future rests on building and producing, and on strengthening internal capability.\nIf Africa had 10 industrialists with Dangote’s vision and commitment, the continent’s economic landscape would be transformed. Multiple refineries would serve regional markets. Steel and cement plants would support construction and infrastructure. Fertiliser complexes would boost agriculture. Petrochemical hubs would support and supply global markets. Integrated logistics networks would lower the cost of intra-Africa trade.The outcome would be millions of skilled jobs, stronger regional economies, and a more confident Africa able to shape its own development path. This is the scale of ambition that can shift the continent’s position in the global economy.\nThe Dangote Foundation: A Social Commitment\nAlongside his industrial ventures, Dangote has built one of Africa’s most active philanthropic institutions. The Dangote Foundation supports nutrition programmes, health interventions, disaster relief, and education initiatives across the continent. This blend of industrial ambition and social commitment reflects a model of development that is both economically productive and socially grounded. It shows that industrial growth and humanitarian support can reinforce each other, strengthening communities, while building national capacity.\nAliko Dangote’s refinery in Lagos, his planned refinery in Kenya, and his wider industrial footprint represent", "translation_ja": "", "vocab": []}, {"title_ja": "University of Abuja, SCRiH sign agreement to establish national agricultural laboratory", "title_en": "University of Abuja, SCRiH sign agreement to establish national agricultural laboratory", "summary_ja": "When completed, the laboratory is expected to serve as a national hub for agricultural research and innovation, supporting advances in food safety, biotechnology, biosecurity and environmental monitoring. The post University of Abuja, SCRiH sign agreement to establish national agricultural laborator", "summary_en": "When completed, the laboratory is expected to serve as a national hub for agricultural research and innovation, supporting advances in food safety, biotechnology, biosecurity and environmental monitoring. The post University of Abuja, SCRiH sign agreement to establish national agricultural laborator", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/895282-university-of-abuja-scrih-sign-agreement-to-establish-national-agricultural-laboratory.html", "state_media": false, "category": "IT", "full_text": "The Supply Chain Research and Innovation Hub (SCRiH) and the University of Abuja have signed a lease agreement for the establishment of the National Agricultural Reference Laboratory and Centre of Excellence (NARL-CE).\nThe project is aimed at strengthening Nigeria’s agricultural research, food safety and scientific infrastructure.\nThe agreement marks the commencement of the project’s implementation following the Memorandum of Understanding signed by both organisations in 2025. It provides the legal framework for the next phase of the initiative, including detailed design, site preparation and construction of the facility.\nWhen completed, the laboratory is expected to serve as a national hub for agricultural research and innovation, supporting advances in food safety, biotechnology, biosecurity and environmental monitoring.\nSpeaking during the signing ceremony, SCRiH founder Adebayo Adeleke said the agreement signified the transition of the project from the planning stage to implementation.\n“Our vision is to build a national institution where science, innovation and education come together to advance food security, strengthen agricultural competitiveness and support sustainable development across Africa,” Mr Adeleke said.\nAccording to the project partners, the National Agricultural Reference Laboratory and Centre of Excellence will provide advanced laboratory facilities for agricultural science while supporting scientific research, workforce development and collaboration among universities, government agencies, industry and international partners.\nThe facility is also expected to train the next generation of scientists and researchers and promote innovation in Nigeria’s agricultural sector.\nThe project is being implemented in partnership with the University of Abuja under the leadership of the Vice-Chancellor, Babatunde Fawehinmi, a Professor.\nREAD ALSO: University of Abuja dismisses claims of NELFUND loans mismanagement\nDelivery of the project will involve a consortium of Nigerian and international organisations with expertise in laboratory planning, scientific infrastructure and engineering.\nSpacecube Construction Limited will lead the architectural design and construction of the facility, while Gobiosis International (Pty) Ltd and EMERA Consultants Ltd will oversee laboratory infrastructure implementation in collaboration with global technology partners, including Siemens, Köttermann GmbH of Germany and H. Ludi + Co. AG of Switzerland.\nThe promoters say the initiative is expected to strengthen Nigeria’s scientific capacity, enhance agricultural productivity and support evidence-based research that contributes to improved food security and sustainable development.", "translation_ja": "", "vocab": []}, {"title_ja": "Sudanese court sentences RSF chief Hemedti to death", "title_en": "Sudanese court sentences RSF chief Hemedti to death", "summary_ja": "This is the first legal conviction of the paramilitary group since the civil war broke out in 2023. The post Sudanese court sentences RSF chief Hemedti to death appeared first on Premium Times Nigeria .", "summary_en": "This is the first legal conviction of the paramilitary group since the civil war broke out in 2023. The post Sudanese court sentences RSF chief Hemedti to death appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/foreign/africa/895273-sudanese-court-sentences-rsf-chief-hemedti-to-death.html", "state_media": false, "category": "政治", "full_text": "A Sudanese court has sentenced the leader of the Rapid Support Forces (RSF), Mohamed Dagalo, known as Hemedti, to death over atrocities committed in West Darfur.\nThe court in Port Sudan convicted and sentenced him for war crimes, crimes against humanity and genocide in absentia.\nMr Dagalo was on Monday sentenced to death in absentia alongside five other RSF members for the same crime. Those sentenced include Hemedti’s brother and deputy, Abdelrahim Dagalo, another brother, Al-Qoni Dagalo, and the RSF’s West Darfur commander, Abdul Rahman Barkallah.\nAl Jazeera reports that the court also ordered the confiscation of all RSF assets and the issuance of Interpol Red Notices for the arrest and extradition of those convicted.\nThis is the first legal conviction of leaders of the paramilitary group since the civil war broke out in 2023.\nThe trial focused primarily on the RSF’s actions in el-Geneina, the regional capital where some of the most heinous atrocities in West Darfur were allegedly carried out.\nThis includes the killing of thousands of civilians, mostly members of the Massalit ethnic community, sexual violence, looting and the forced displacement of many.\nAlthough Sudan has had a long history of violence, the current civil war broke out due to a vicious struggle for power between the Sudanese army, led by Abdel Fattah al-Burhan, and a powerful paramilitary RSF led by Hemedti.\nThe main points of discord were over plans to integrate the RSF into the Sudanese army and who would control the new force, as both leaders desperately wanted to hold onto their positions. The war broke out in Khartoum and eventually spread to other parts of the country.\nThe war led to famine and genocide in the western Darfur region captured by the RSF. More than 150,000 people have died in the conflict across the country, and about 12 million have fled their homes. #\nREAD ALSO: Ghana’s Tarkwa negotiations are testing Africa’s new mining bargain\nThe United Nations identified Sudan as the country with the world’s largest health and humanitarian crisis. The body, alongside other rights organisations, has accused the RSF of ethnically targeted attacks against the Masalit population in West Darfur. The International Criminal Court’s deputy chief prosecutor also previously stated there was “concrete evidence” linking RSF leaders to war crimes. The paramilitary body has, however, previously rejected these allegations.\nThe Sudan Founding Alliance, which includes the RSF, has also described the Sudan court proceedings as a “sham trial” that “does not even deserve a comment.”\nThe paramilitary group has yet to comment on the conviction.\nMeanwhile, Hemedti’s whereabouts remain unknown.", "translation_ja": "", "vocab": []}, {"title_ja": "Ann Widdecombe Was Killed in ‘Targeted Attack,’ UK Police Say", "title_en": "Ann Widdecombe Was Killed in ‘Targeted Attack,’ UK Police Say", "summary_ja": "Counterterrorism police said that they were continuing to interview a 28-year-old man accused of killing Ann Widdecombe.", "summary_en": "Counterterrorism police said that they were continuing to interview a 28-year-old man accused of killing Ann Widdecombe.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/14/world/europe/ann-widdecombe-targeted-attack.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "U.S. and Iran Reignite War Over Strait of Hormuz", "title_en": "U.S. and Iran Reignite War Over Strait of Hormuz", "summary_ja": "The two countries slid back to open war over the waterway, as the U.S. planned to reinstate a blockade on Iranian ports on Tuesday. Iran said it had attacked two tankers and fired at U.S. military sites.", "summary_en": "The two countries slid back to open war over the waterway, as the U.S. planned to reinstate a blockade on Iranian ports on Tuesday. Iran said it had attacked two tankers and fired at U.S. military sites.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/07/14/world  RTS down 0.97%", "summary_ja": "The MOEX Index ticked up to 2,167.7 points, while the RTS Index shed to 881.22 points", "summary_en": "The MOEX Index ticked up to 2,167.7 points, while the RTS Index shed to 881.22 points", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2160219", "state_media": true, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Moldova's involvement in Ukraine conflict escalates it further — expert", "title_en": "Moldova's involvement in Ukraine conflict escalates it further — expert", "summary_ja": "The actions of the President of Moldova and the government, aimed at supporting Ukraine, can be perceived as part of a broader strategy developed by EU intelligence services and MI6, Dmitry Sorokin said", "summary_en": "The actions of the President of Moldova and the government, aimed at supporting Ukraine, can be perceived as part of a broader strategy developed by EU intelligence services and MI6, Dmitry Sorokin said", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2160217", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Russia extremely concerned about new round of hostilities involving Iran — MFA", "title_en": "Russia extremely concerned about new round of hostilities involving Iran — MFA", "summary_ja": "Dmitry Lyubinsky reaffirmed its call for the resumption of dialogue to foster a lasting peace and stability in the region", "summary_en": "Dmitry Lyubinsky reaffirmed its call for the resumption of dialogue to foster a lasting peace and stability in the region", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2160215", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "The Purpose of Development Cooperation Is to Be Unnecessary", "title_en": "The Purpose of Development Cooperation Is to Be Unnecessary", "summary_ja": "The original promise of development cooperation was to help countries overcome poverty, build productive economies, and reduce their dependence on external resources. That has not happened, and ongoing reviews of development cooperation, which focus on donor countries' needs and priorities, are unli", "summary_en": "The original promise of development cooperation was to help countries overcome poverty, build productive economies, and reduce their dependence on external resources. That has not happened, and ongoing reviews of development cooperation, which focus on donor countries' needs and priorities, are unli", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/oecd-dac-reviews-miss-the-point-of-development-cooperation-by-vitalice-meja-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Purpose of Development Cooperation Is to Be Unnecessary\nVitalice MejaThe original promise of development cooperation was to help countries overcome poverty, build productive economies, and reduce their dependence on external resources. That has not happened, and ongoing reviews of development cooperation, which focus on donor countries' needs and priorities, are unlikely to change this.\nNAIROBI—In an increasingly unstable geopolitical environment, governments across the developed economies of the OECD are rethinking their spending priorities. As they direct more funds toward defense, industrial competitiveness, and energy security, they are seeking offsetting expenditure cuts—and, in many cases, the axe is falling on development financing. In fact, members of the OECD’s Development Assistance Committee (DAC) are currently conducting reviews of their development-cooperation strategies and external-financing priorities.\nThis is not altogether bad news: development cooperation was long in need of a reassessment. But the reviews so far are focusing on the wrong thing. They want to adapt development cooperation to donors’ changing geopolitical, security, and commercial needs and objectives. What is really needed is an examination of the system’s ability to support the structural transformation required to reduce developing countries’ dependence on foreign aid. In other words, instead of simply asking how development cooperation should be financed, OECD governments should be asking what it should achieve.\nDevelopment cooperation has produced important progress, especially in health, education, humanitarian response, and public-sector capacity. But its original promise was not to support individual projects or deliver incremental social gains; it was to help countries overcome poverty, build productive economies, and gradually reduce their dependence on external resources. Yet after decades of effort, many developing countries are still grappling with persistent poverty, limited industrial capacity, rising debt burdens, and dependence on commodity exports and external finance.\nSince the turn of the century, efforts to improve aid effectiveness—embodied by the 2002 Monterrey Consensus on Financing for Development, the 2005 Paris Declaration on Aid Effectiveness, the 2008 Accra Agenda for Action, and the 2011 Busan Partnership for Effective Development Co-operation—centered on how developing countries should change. Development partners thus emphasized principles like country ownership, transparency, and mutual accountability. While developing countries were expected to strengthen country systems, improve institutions, and demonstrate visible results, less attention was paid to the incentives shaping donor behavior.\nThis approach clearly failed to translate progress on social development into economic transformation. But adapting development cooperation to suit donors’ new geopolitical realities—the approach the DAC members’ reviews are taking—will do no better. It also fails to address the incentives shaping donor behavior, let alone the fundamental question of whether cooperation is helping to overcome dependency.\nMigration offers an illustration of the reframing that is needed. In recent years, migration has become central to cooperation between many European governments and African countries, with development financing, diplomatic engagement, and partnership frameworks being linked to border management, return and readmission agreements, anti-smuggling initiatives, and migration containment.\nPS Quarterly: The Declaration Heard Around the World, is here.\nIn this issue of PS Quarterly—available exclusively to Premium subscribers—Danielle Allen, Sarah M.S. Pearsall, Steve Pincus, and other leading thinkers examine the impact, limitations, and legacy of America’s founding document, and consider where US democracy is headed 250 years later.\nSubscribe to PS Premium\nSuch arrangements work for donor governments, for which migration has become a major domestic political issue. In fact, donor governments measure the success of such arrangements almost entirely by the reduction in migration pressures they face, with little, if any, regard for the impact on developing economies. This should be recognized for what it is: the use of development policy as a security tool.\nMobility can be a powerful driver of development. Workers who leave often send back remittances—the largest source of external financing for developing countries—and return with newly acquired expertise, connections, or resources. More broadly, cross-border flows of goods, money, technology, and people, as well as participation in international networks, are vital to productivity, human-capital development, and entrepreneurship.\nHarnessing this potential should be a central objective of migration arrangements and development cooperation more broadly. Instead of merely financing the containment of migration, European and other donors must work with their d", "translation_ja": "", "vocab": []}, {"title_ja": "Oil Shocks Are No Longer So Shocking", "title_en": "Oil Shocks Are No Longer So Shocking", "summary_ja": "Despite this year's US/Israeli-Iran war causing the largest-ever disruption to global oil supplies, the shocks of the 1970s had a greater impact. Because oil has been used as a weapon for so long, markets, policymakers, and strategists have adapted.", "summary_en": "Despite this year's US/Israeli-Iran war causing the largest-ever disruption to global oil supplies, the shocks of the 1970s had a greater impact. Because oil has been used as a weapon for so long, markets, policymakers, and strategists have adapted.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/oil-weapon-why-shocks-since-1970s-have-been-less-severe-by-nouriel-roubini-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Oil Shocks Are No Longer So Shocking\n                        Despite this year's US/Israeli-Iran war causing the largest-ever disruption to global oil supplies, the shocks of the 1970s had a greater impact. Because oil has been used as a weapon for so long, markets, policymakers, and strategists have adapted.\n                    \n                        NEW YORK—The Persian Gulf is in an unstable disequilibrium. There has been no lasting deal to reopen the Strait of Hormuz, because the United States and Iran remain far apart in their demands, with the Iranians holding more leverage than President Donald Trump ahead of the US midterm elections this November. In the absence of a full deal, renewed skirmishing was highly likely, reflected in the growing risk of a return to full-blown warfare.\n        https://prosyn.org/WGk3xuo", "translation_ja": "", "vocab": []}, {"title_ja": "The Mother of All Economic Shocks Is Chinese Mercantilism", "title_en": "The Mother of All Economic Shocks Is Chinese Mercantilism", "summary_ja": "Because analysts tend to put the United States at the center of the global economic story, they have overlooked the single most important force of the past 50 years. But it will be obvious to later generations that Chinese mercantilism has been more globally consequential than any other economic sho", "summary_en": "Because analysts tend to put the United States at the center of the global economic story, they have overlooked the single most important force of the past 50 years. But it will be obvious to later generations that Chinese mercantilism has been more globally consequential than any other economic sho", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/chinese-mercantilism-mother-of-all-global-shocks-by-arvind-subramanian-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Mother of All Economic Shocks Is Chinese Mercantilism\n                        Because analysts tend to put the United States at the center of the global economic story, they have overlooked the single most important force of the past 50 years. But it will be obvious to later generations that Chinese mercantilism has been more globally consequential than any other economic shock or policy choice.\n                    \n                        WASHINGTON, DC—In the long sweep of history, China’s economic performance over the past 50 years will obviously stand out for the sheer scale and pace of quality-of-life improvements within that country. But China’s impact on the rest of the world has still been underappreciated.\n        https://prosyn.org/12LalEg", "translation_ja": "", "vocab": []}, {"title_ja": "The truth about Pete Hegseth's strange campaign against beards | Arwa Mahdawi", "title_en": "The truth about Pete Hegseth's strange campaign against beards | Arwa Mahdawi", "summary_ja": "His facial hair fixation might seem perplexing – but it is part of an aestheticisation of politics that is central to the Trump project The year is 2018 and Pete Hegseth has just come back from his summer holidays. Hegseth, who is still just a Fox News host, not a defense secretary keen on ordering ", "summary_en": "His facial hair fixation might seem perplexing – but it is part of an aestheticisation of politics that is central to the Trump project The year is 2018 and Pete Hegseth has just come back from his summer holidays. Hegseth, who is still just a Fox News host, not a defense secretary keen on ordering ", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/14/the-truth-about-pete-hegseths-strange-campaign-against-beards", "state_media": false, "category": "オピニオン", "full_text": "The year is 2018 and Pete Hegseth has just come back from his summer holidays. Hegseth, who is still just a Fox News host, not a defense secretary keen on ordering possible war crimes, has grown a nice little beard during his time off. He is hoping his bosses at Fox might let him keep the facial hair, even if it’s just the moustache. He seems to think it makes him look quite dapper. Alas, some of his viewers disagree.\nA woman called Patti writes in to Fox & Friends urging him to get that “fur” off his face. A viewer called Mary bemoans the fact that “all American cute” Pete now looks “awful”. People on the internet joke that he looks like a duck hunter. And then a final humiliation: Hegseth’s co-hosts cackle as his vacation beard is lopped off by a barber live on daytime TV. “A man without a beard is like a lion without a mane,” a Fox fan called Michael commiserates. “That’s how I feel!” Hegseth wails.\nSpeaking in my capacity as an armchair psychologist, I believe this demeaning de-maning may have left an indelible mark on poor Petey’s soul – and explains his obsession with other men’s facial hair. Since he can’t have a beard himself, he seems determined to ensure that no one under him gets a chance to either. The defense secretary, who now sports cheeks as bare as a baby’s buttocks, is on a mission to root out every stray follicle in the US military.\n“No more beards, long hair, superficial individual expression”, the secretary of the newly renamed “Department of War” declared in a speech to military commanders at Quantico, Virginia, in September. “We’re going to cut our hair, shave our beards and adhere to standards … No more beardos.” And it’s not just beardos Hegseth wants to ban. Our brave warrior also told military commanders it was “tiring” having to look at “fat troops”.\nDid Hegseth’s men whip out their razors and lop their locks stat? Apparently not. According to a recent CNN report, the Pentagon chief had a bit of a meltdown after boarding a navy ship and noticing multiple sailors with beards. Per CNN: “Hegseth left the ship wondering if the Pentagon rank-and-file paid attention to his beard policy and other policy changes he has made to the workforce.”\nDon’t worry Pete. Your underlings may not value your facial hair fixation, but I’m sure big boss Donald Trump appreciates where you’re coming from. Trump, as we all know, has a very particular aesthetic he wants everyone in his orbit to adhere to. Over the years we’ve seen the rise of Mar-a-Lago face, as Maga elites plump their lips with filler, zap their wrinkles, and manipulate their faces into eerily identical meat-masks that signal allegiance to their dear leader. Can’t have any of that “superficial individual expression” if you want to get ahead in Trumpland: you’ve got to look the part. Kind of like a cult.\nTrump seems fairly relaxed about beards (although he has urged his son Donald Jr to get rid of his) but he does get worked up about skin. He once referred to himself as a “skin man” and reportedly rejected Nikki Haley for the role of secretary of state because he didn’t like her complexion. According to a 2022 book, The Divider, by journalists Peter Baker and Susan Glasser, Trump told then-chief of staff John Kelly the reason Haley was a no-go “was the blotch marks on her cheeks”. Trump added: “She’s got that complexion problem. It doesn’t look good.”\nTrump is also famously particular about clothes. There have been claims the president wants his female staff “to dress like women” (whatever that means) and has specific tie preferences for the men. He’s also sent his minions shoes to wear without asking their size. And they all seem too terrified about putting the wrong foot forward to shun the gifts: Marco Rubio has been photographed clomping around in shoes that are far too big for him.\n“The logical outcome of fascism is an aestheticisation of political life,” Walter Benjamin wrote in his famous essay The Work of Art in the Age of Mechanical Reproduction. You can argue over the F-word all you like but from the red-and-white Maga hats to the new White House ballroom to the identical Mar-a-Lago faces, Trump has turned politics into a highly branded spectacle. And unqualified deputies such as Hegseth, more at home in TV studios than situation rooms, are following in his footsteps. Hegseth may be too incompetent to end the Iran war, but nobody is going to stop his crusade against stubble.\nArwa Mahdawi is a Guardian columnist", "translation_ja": "", "vocab": []}, {"title_ja": "Lindsey Graham’s hawkish ideology leaves a legacy of destruction | Moustafa Bayoumi", "title_en": "Lindsey Graham’s hawkish ideology leaves a legacy of destruction | Moustafa Bayoumi", "summary_ja": "Mourn him if you wish, but let’s be honest about what he promoted. The longer this thinking lives on, the more peril we will all face The sudden death over the weekend of the South Carolina senator Lindsey Graham is predictably inspiring a slew of tributes to the four-term Republican senator. Donald", "summary_en": "Mourn him if you wish, but let’s be honest about what he promoted. The longer this thinking lives on, the more peril we will all face The sudden death over the weekend of the South Carolina senator Lindsey Graham is predictably inspiring a slew of tributes to the four-term Republican senator. Donald", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/14/lindsey-graham-ideology-legacy", "state_media": false, "category": "オピニオン", "full_text": "The sudden death over the weekend of the South Carolina senator Lindsey Graham is predictably inspiring a slew of tributes to the four-term Republican senator. Donald Trump has already ordered flags be flown at half-staff until Saturday, and Republican politicians across the country are fondly recalling Graham. But so too are the Democrats. Senator Dick Durbin of Illinois honored Graham, calling him “a fierce Republican partisan one day and a key bipartisan ally the next”. Senator Adam Schiff of California lauded Graham’s “sense of humor and how he deployed it to move his policy positions forward”.\nThrough this thick, bipartisan forest of remembrances, however, lies Graham’s concrete legacy. Death has a way of extinguishing uncomfortable truths, but it’s important that we don’t forget who Graham was, what he exactly stood for, and what damage he has done over his political career.\nNowhere has Graham’s legacy been more consequential than in his constant push for a hawkish US foreign policy and his uncritical devotion to Israel at every turn. The Wall Street Journal described Graham as someone having “outsize influence on U.S. foreign policy”. And Aipac, the US’s pro-Israel lobby (as the Pac describes itself on Twitter/X), posted an encomium to Graham, called him “a great friend and true champion of the U.S.-Israel relationship”. (According to the non-partisan website Open Secrets, which tracks money in politics, Graham received more than $400,000 from Aipac, his largest donation by an organization, in 2025-2026 alone.)\nGraham’s unceasing desire to project American power across the world didn’t begin with the second Trump administration. Before he was elected to the Senate, Graham, who was then a member of Congress, was already pushing for the US to go to war in Iraq. “We’re looking at going after Saddam Hussein,” Graham said in March 2002, “not to contain him, but to replace him.” The US did invade Iraq, but it happened a year later.\nThe multiple failures of the Iraq invasion, including the lie that Iraq’s Saddam Hussein had chemical weapons, didn’t stop Graham from supporting the war long after its true face became clear, or from counseling more war. In a speech to the Halifax International Security Forum in 2010, he promoted attacking Iraq’s neighbor, Iran, to “neuter” it, words that sound almost like Trump’s foreign policy today.\n“Instead of a surgical strike on their nuclear infrastructure, I think we’re to the point now that you have to really neuter the [Iranian] regime’s ability to wage war against us and our allies,” he said. “And that’s a different military scenario. It’s not a ground invasion but it certainly destroys the ability of the regime to strike back.”\nBy 2015, he was sitting with his friends Senator John McCain and former senator Joseph Lieberman, publicly denouncing Obama’s recently concluded Iran nuclear deal.\nIn 2017, Graham was a prime backer in the push to move the US embassy in Israel from Tel Aviv to Jerusalem, calling Jerusalem “the undeniable capital of Israel”. His support for Israel over the years has been so complete that the Israeli prime minister, Benjamin Netanyahu, is reportedly considering flying to the United States to attend Graham’s funeral.\nGraham’s support for limits on Palestinian sovereignty were constant throughout his career but became even more evident after the Hamas attacks of 2023 and Israel’s most recent, and most devastating, war on Gaza began. “Give Israel what they need to fight the war they can’t afford to lose,” he said at a Senate appropriations subcommittee hearing. “This is Hiroshima and Nagasaki on steroids.”\nOn another occasion, he was asked if Israel’s war in Gaza, which was “killing children, killing mothers, killing families who are not militants”, aligned with “Christian values”. Graham responded with “I don’t buy that at all,” adding that Israel ought to “flatten Gaza”.\nWhen Norway’s $2tn sovereign wealth fund decided to divest from the US company Caterpillar over ethical concerns (Caterpillar’s machines are routinely used by Israel to enforce its occupation of Palestinian land), Graham responded by publicly threatening Norway with trade tariffs and visa travel restrictions on Norwegian fund executives.\nWeeks earlier, he had issued another not-so-veiled threat against the well-known Swedish activist Greta Thunberg, who had joined a humanitarian mission to deliver aid to Gaza by the sea. “Hope Greta and her friends can swim!” he posted on X.\nHe wanted the US to get directly involved militarily in Israel’s attacks in Lebanon. “I would like the United States to participate in military operations, in the aerial side, against Hezbollah, if that’s what it takes to knock them out,” he told the Times of Israel in 2025. “I want our fingerprints on that.”\nBeyond the Middle East, he also lobbied fellow senators on the US attacking Colombia, as reported by Drop Site News. “We’re not going to sit on the sidelines and watch boats full of drugs come to our co", "translation_ja": "", "vocab": []}, {"title_ja": "Lorenzo Salgado Araujo is dead. How long will ICE be allowed to hide its face? | Jamil Smith", "title_en": "Lorenzo Salgado Araujo is dead. How long will ICE be allowed to hide its face? | Jamil Smith", "summary_ja": "A government that demands instant obedience while concealing its identity cannot expect trust – or escape responsibility for the consequences There are videos that do more than document a story. They alter the way we understand it. Ronaldo Salgado spent 7 July searching for his father. At the scene ", "summary_en": "A government that demands instant obedience while concealing its identity cannot expect trust – or escape responsibility for the consequences There are videos that do more than document a story. They alter the way we understand it. Ronaldo Salgado spent 7 July searching for his father. At the scene ", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/14/lorenzo-salgado-araujo-ice", "state_media": false, "category": "オピニオン", "full_text": "There are videos that do more than document a story. They alter the way we understand it.\nRonaldo Salgado spent 7 July searching for his father. At the scene of a shooting in Houston’s East End, he found his father’s work van behind police tape. Later, he saw a video online: a man had been shot in the street. Ronaldo could not identify him by sight. He recognized Lorenzo Salgado Araujo by his voice, crying for help.\nThe video of Ronaldo recounting that realization – and collapsing into grief – has not left me. That sound is all too familiar. It is evidence of what government power has produced.\nWe were warned. Shortly after federal immigration officers killed Renée Good and Alex Pretti, Senator Jon Ossoff asked why “roving gangs of masked men” were “demanding papers, dragging people from their cars, and shooting people to death”. A federal court ordered immigration agents in Chicago to wear body cameras, while state and local lawmakers pursued measures requiring agents to unmask and identify themselves. Yet Trump later signed a $70bn immigration-enforcement bill funding ICE and border patrol through 2029 without requiring agents to unmask or wear body cameras. Less than a month later, after Salgado Araujo’s killing, representative Sylvia Garcia says ICE’s acting director promised to equip all field officers with body cameras by the end of July.\nWe know the cost, but the Trump administration has at last conceded the principle: transparency is necessary.\nSalgado Araujo, 52, was a husband and the father of three American sons. He spent 35 years in the United States. He built homes, ran a construction business and put his children through college. A year and a half before his death, he submitted fingerprints while seeking permission to work legally, his son said. He was still waiting for one arm of the government to answer when another killed him.\nHe was driving his crew to a job when ICE agents in unmarked vehicles mistook him for someone else. They wore no body cameras. The DHS says he rammed an ICE vehicle and tried to run over an agent, who fired in self-defense. At least two of the surviving passengers dispute that account, saying no agent stood in front of the van and that the shots came through its passenger side. No released footage supports the government’s version.\nWhatever investigators establish about every disputed second, the encounter has exposed something larger. For years, the laziest response to police violence has been that the dead would still be alive had they simply obeyed.\nThat argument was always inadequate. Here, it nearly collapses altogether, because obedience requires recognition.\nSalgado Araujo’s family had discussed what to do if ICE detained him: sign nothing, remain calm and work through lawyers. He was prepared. But his son believes that when armed men in unmarked vehicles pursued him, his father feared they were criminals trying to steal the tools with which he earned his living.\nUniforms, visible names, marked vehicles and cameras are not cosmetic. They are how democratic governments distinguish lawful authority from armed strangers exercising force.\nA government that conceals its identity cannot demand perfect recognition from frightened civilians. ICE mistook Lorenzo Salgado Araujo for another man. He was expected to identify ICE instantly. Only one side was allowed to make an error.\nNo official told the family Lorenzo had died; Ronaldo learned it from social media, then called his mother so she would not learn it the same way. The three men who contradict ICE’s version – including Lorenzo’s brother – were detained. Interviewed separately, their attorney says, they gave consistent accounts. Houston’s district attorney says federal authorities have denied him access to the van.\nThe Trumpian caricature imagines undocumented immigrants as hidden threats. Salgado Araujo was not hiding. He built houses, ran a company, raised sons and voluntarily gave the government his fingerprints. He lived a public and recognizable American life.\nHe died in Magnolia Park, which has anchored Mexican American life in Houston for a century. Residents had learned to watch for unmarked cars before one stopped Lorenzo’s van. His death did not introduce fear there. It confirmed it. Hundreds gathered there on Saturday to mourn him and resist a familiar cycle in which state silence follows state violence.\nSalgado Araujo’s death was at least the 10th fatal shooting involving federal immigration officers since Donald Trump returned to office. The day after an ICE agent killed Good in Minneapolis, the former acting ICE director John Sandweg called the rise in shootings a direct byproduct of the administration’s shift toward arrests on public streets. Six months later, less than a week after Salgado Araujo was killed, an ICE officer fatally shot a 26-year-old Colombian man in Biddeford, Maine. The facts of that shooting are still emerging, but the pattern is clear.\nThe news cycle will move on. Ronaldo Salga", "translation_ja": "", "vocab": []}, {"title_ja": "Putin Will Turn a Cease-Fire Into a Weapon", "title_en": "Putin Will Turn a Cease-Fire Into a Weapon", "summary_ja": "A new use for Russia’s old playbook in Ukraine.", "summary_en": "A new use for Russia’s old playbook in Ukraine.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/russia/putin-will-turn-cease-fire-weapon", "state_media": false, "category": "オピニオン", "full_text": "To recall the last negotiated peace with Russia is to tell a depressing tale. Russia invaded Ukraine in March 2014, annexing Crimea and then moving regular and irregular forces into the Donbas, in the country’s east. After months of war and intense interference in domestic Ukrainian affairs, Moscow signed a series of cease-fire agreements in the Belarusian capital of Minsk in September 2014 and February 2015. Russia retained and militarized the territory it had taken in Ukraine. The Minsk agreements did not solve any core problems, but Europe and the United States were able to live with them—until February 2022, when Russia launched its full-scale invasion of Ukraine.\nThe Minsk process reveals how Putin has often mixed conventional diplomacy with thuggery. Although he has assembled a formidable war machine, Putin aspires to the role of European statesman, as Joseph Stalin did before him and as various Russian tsars did before the 1917 Bolshevik Revolution. Putin sees diplomacy as war by other means, and he used past negotiations over Ukraine to distract and to keep European countries off balance. He hoped to foment political breakdown in Kyiv, a loss of interest on Europe’s part, and a transatlantic relationship sundered by populism. When the desired results of the Minsk agreements did not materialize, Putin once again resorted to war.\nWere Putin to eventually consent to a full or partial cease-fire, his strategy would likely be similar to what it was a decade ago. So far, the Russian leader has stubbornly refused to stop fighting until Ukraine makes substantial concessions: he has insisted that Russia seeks a comprehensive settlement and not a mere suspension of hostilities. But if Putin does agree to a truce, he will approach it as a roundabout way of reaching war aims that cannot be achieved on the battlefield. He would exploit an incomplete peace to incite political instability in Ukraine and prod pro-Russian factions in Europe into advocating business as usual with Moscow. He would hope that by allowing U.S. President Donald Trump to take credit for the cease-fire, he could widen the fissures between the United States and Europe. If Putin found the consequences of his overture disappointing, he could return to battle at any moment, having risked only the breather a cease-fire might afford Ukraine. U.S. and European officials should proceed with great caution in the laudable aim of war termination. A mere halt to the fighting in Ukraine would have little chance of ending the broader conflict. Barring a fundamental change in Putin’s calculus, it may just mark a transition to the next phase of the war.\nDEAD END\nRussia’s political project for Ukraine has failed spectacularly. The Kremlin never mounted the coercive power necessary to transform Ukraine into a vassal, which would have required a complete takeover and long-term occupation. In 2022, Russia invaded a large country—one with a population of over 35 million—with a mere 150,000 soldiers. Its intent at the time was to expose the Ukrainian government as feeble and illegitimate, inspire uprisings among pro-Russian constituencies, and compel the rest of Ukraine to accept a government friendly to Moscow. Four years of brutal war have done the opposite, ensuring a Ukraine hostile to Russia for years, if not generations, to come. Having expended massive amounts of manpower and materiel, Putin has no clear path to military victory. After all his effort, he has maneuvered himself into a dead end.\nTo rescue his fortunes, Putin has options for escalation, although each comes with severe limitations and risks. He could take advantage of Russia’s huge population (some 143 million people) by ordering a major mobilization. But judging by the exodus of Russians amid the partial mobilization in the fall of 2022, such a call-up would be deeply unpopular, especially in Russia’s large cities. Putin, the history buff, cannot have forgotten that a war-weary population egged on by angry soldiers toppled the tsarist government in February 1917. With his own eyes, Putin saw how an unwon war in Afghanistan weakened the Soviet Union in the late 1980s, even if he has sponsored an official rewriting of this war as a heroic venture. In short, Putin cannot ignore the domestic political constraints that stand between him and the waging of a total war.\nThe Russian president could try to bomb Ukraine into surrender. Exploiting Ukraine’s shortages of Patriot interceptor munitions, Russia could further increase its ballistic missile attacks on Ukrainian cities in the coming months and into the winter. Inflicting mass misery to gain the upper hand is a risky bet. It could harden Ukrainians in their resistance to Russia, as it did after Russian soldiers committed countless war crimes in the first few weeks of the 2022 invasion. The same goes for the use of nuclear weapons in Ukraine, which would antagonize China and India, countries that have thrown Russia an economic lifeline. Putin co", "translation_ja": "", "vocab": []}, {"title_ja": "How China Is Winning Friends and Influencing People", "title_en": "How China Is Winning Friends and Influencing People", "summary_ja": "Private companies are making Beijing look good in the developing world.", "summary_en": "Private companies are making Beijing look good in the developing world.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/china/how-china-winning-friends-and-influencing-people", "state_media": false, "category": "オピニオン", "full_text": "On the traffic-snarled streets of Hanoi, taxi drivers taking a break between rides watch Chinese microdramas—feature-length stories divided into addictive 90-second clips—on their phones. Some commuters zip past on Chinese-made Yadea scooters, while others sit comfortably removed from the noise, dust, and tropical heat in any one of half a dozen new Chinese electric vehicle brands. At home, teenagers message each other on Zalo, a Vietnamese app similar to China’s WeChat (and whose parent company counts WeChat maker Tencent as a major foreign investor), or shop on the Alibaba-run Lazada e-commerce platform.\nWhat is happening in Vietnam is occurring across the developing world. Chinese brands and products are becoming as common today as American brands such as Levi’s, Marlboro, and McDonald’s were in the 1980s and 1990s. In South Africa, Hisense televisions, washing machines, and other appliances are top sellers; in Brazil, the electronics pioneer Xiaomi has become a household name, while the newly arrived milk tea and ice cream chain Mixue is drawing large crowds and is set to massively expand its presence in the country. The United States and the brands associated with it today, such as Apple and Tesla, still carry enormous prestige. But most American products are out of the reach of ordinary consumers. China is becoming the country that provides the goods and services that are part of people’s daily lives.\nThe omnipresence of Chinese products is expanding the country’s influence in ways Beijing could only dream of. Many people in the developing world, especially young people, are increasingly associating China with modernity and progress. But this ubiquity is not the result of a strategic calculation made by officials in Beijing. Rather, it is driven by private companies seeking profits. The brutal competition that Chinese firms confront in their domestic market is pushing them to aggressively enter Africa, Asia, and Latin America, where they have moved quickly to localize their offerings and embed themselves in everyday activities. Companies trying to survive the effects of China’s growth model at home are giving the country the kind of positive association abroad that Beijing has been unable to generate from its own top-down efforts.\nThis success, however, has not made China’s economic model healthy or benign. The excessive competition that Chinese firms face erodes their profits and weakens the foundations for long-term innovation. Chinese firms are building a global reputation for making everyday life cheaper, easier, and smoother. Yet the domestic pressures that make Chinese firms so aggressive abroad are also limiting their ability to make China the truly innovative superpower that Beijing aspires to be.\nCHINA, CHINA, EVERYWHERE\nChinese officials have struggled for years to shape foreign perceptions of their country. State media, propaganda, cultural exchanges, and language programs have failed to reach large international audiences. Beijing tried to promote Chinese language and culture through its Confucius Institutes at universities in Australia, Europe, and North America; in the past decade, however, most of these have been shuttered over concerns about academic freedom and a lack of transparency. More coercive tactics, including pressuring critics and censoring dissenting views overseas, have backfired. In 2025, Chinese pressure forced organizers to suspend the IndieChina Film Festival in New York, drawing attention to the long arm of Beijing’s censorship apparatus.\nChina’s private entrepreneurs, however, are developing the country’s brand through commerce. In 2025, China exported roughly $1.6 trillion worth of goods to developing economies, about 50 percent more than it sold to the United States and western Europe combined. Private firms accounted for nearly 60 percent of China’s total foreign trade. In areas as varied as appliances, apps, cars, roads, ports, and phones, Chinese brands are increasingly everywhere in the developing world.\nChinese companies have not succeeded simply because they are dumping their surplus product.\nAs Chinese companies expand, the country is becoming associated with things that make daily life easier. When a country’s products, services, and infrastructure become ubiquitous, they begin to shape how people imagine competence, modernity, and possibility. That was true for more than half a century during which American products dominated. It is increasingly true today, as Chinese brands become the default option for billions of consumers.\nThe changes can be felt on the ground. In 2015, one of us (Olander) asked a group of teenagers in Abidjan, the largest city in Côte d’Ivoire, how they felt about China’s presence in Africa. After discussing it among themselves, one of them held up his phone and laughingly said in French, “China is great!” He wasn’t talking about the country’s politics. His impression of China was based on the Chinese phones and Chinese apps that shape", "translation_ja": "", "vocab": []}, {"title_ja": "America and Iran’s Strange Moment of Opportunity", "title_en": "America and Iran’s Strange Moment of Opportunity", "summary_ja": "How a deadlocked conflict can pave the way for peace.", "summary_en": "How a deadlocked conflict can pave the way for peace.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/america-and-irans-strange-moment-opportunity", "state_media": false, "category": "オピニオン", "full_text": "The U.S.-Iranian relationship is worse than ever before. Over the last four months, the American and Israeli militaries have waged full-scale war against the Islamic Republic, including by assassinating much of its political and military leadership. Iran has retaliated by attacking U.S. military bases, infrastructure in Gulf Arab states, and Israel. The two sides struck a cease-fire deal in early April, and in June they signed a memorandum of understanding designed to end the conflict. But those deals have, so far, failed; Iran and the United States have continued to exchange fire. They remain far apart on core disputes, including those related to Iran’s nuclear program, the Strait of Hormuz, and sanctions relief. As a result, many analysts are skeptical that the parties can eventually achieve a permanent deal.\nThe increasingly sharp hostilities since the memorandum came into effect demonstrate that this skepticism is well-founded. Rather than marking a new chapter in U.S.-Iranian relations, the two sides remain mired in the old. They are trading accusations that the other is operating bad faith and claiming that each is breaching the agreement they reached in April. They are engaging t how much these two nemeses can achieve via engagement. But both sides may eventually arrive, through sheer exhaustion, at the same reluctant conclusion: the old playbook has failed. Change will still be difficult, but it is imaginable.\nMAXIMUM FAILURE\nThe 2015 Joint Comprehensive Plan of Action was the last serious attempt to stabilize and reset U.S.-Iranian relations. Formally, it was a narrow deal. Iran pledged to restrict its nuclear program and accept increased international inspections. In exchange, the United States offered limited sanctions relief. But politically, the JCPOA was a larger wager. If the status of Iran’s nuclear program could be solved, officials thought, perhaps Tehran and Washington could address other issues, such as Iran’s support for regional militias like Hezbollah in Lebanon and the Houthis in Yemen. Eventually, the two sides might even be able to establish a normal diplomatic relationship.\nBut this proposition was never properly tested. By the time the JCPOA was implemented, in January 2016, negotiators on both sides had reached their limits. Almost immediately after the deal went into force, it came under intense domestic pressure in both countries. In the United States, Republicans roundly rejected it, as did some Democrats, for being too accommodating toward Iran. In Tehran, President Hassan Rouhani and Foreign Minister Mohammad Javad Zarif had to defend the agreement against critics who saw compromise with the United States as at best deeply naive and at worst outright treasonous. Neither group had the diplomatic stamina or the political space to address other points of tension in the bilateral relationship. And when President Donald Trump won office in late 2016, any remaining opportunity vanished. Trump had derided the JCPOA as the “", "translation_ja": "", "vocab": []}];

let curCat = "全て";

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function buildFocusHtml(){
  if(!FOCUS)return"";
  const cards=FOCUS.coverages.map(c=>{
    const sc=c.state_media?" state-media":"";
    const sb=c.state_media?` <span style="color:var(--danger);font-size:.65rem">[国営]</span>`:"";
    return `<div class="cov-card${sc}"><div class="cov-header"><span class="cov-region">${esc(c.region)}</span><span class="cov-name">${esc(c.name)}${sb}</span></div><div class="cov-summary">${esc(c.summary_ja)}</div><div class="cov-perspective">${esc(c.perspective_ja)}</div><a class="cov-link" href="${esc(c.link)}" target="_blank" rel="noopener">元記事 →</a></div>`;
  }).join("");
  return `<div class="focus-section"><div class="focus-label">&#127919; 今日の焦点 — 5社の報道比較</div><div class="focus-topic">${esc(FOCUS.topic_ja)}</div><div class="focus-analysis">${esc(FOCUS.analysis_ja)}</div><div class="cov-list">${cards}</div></div>`;
}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  let html=(curCat==="政治"||curCat==="社会")?buildFocusHtml():"";
  if(!arts.length){el.innerHTML=html+'<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  html+=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
  el.innerHTML=html;
}

function setCat(cat){
  curCat=cat;
  history.pushState({view:"list",cat:cat},"","?tab="+encodeURIComponent(cat));
  renderTabs();renderList();
  document.getElementById("list-view").style.display="block";
  document.getElementById("detail-view").style.display="none";
  window.scrollTo(0,0);
}

function showDetailInternal(idx){
  const a=filteredArts()[idx];
  if(!a)return;
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function showDetail(idx){
  history.pushState({view:"detail",cat:curCat,idx:idx},"","?tab="+encodeURIComponent(curCat)+"&art="+idx);
  showDetailInternal(idx);
}

function backToList(){history.back();}

window.addEventListener("popstate",function(e){
  const s=e.state||{view:"list",cat:"全て"};
  curCat=s.cat||"全て";
  renderTabs();
  if(s.view==="detail"){
    showDetailInternal(s.idx);
  }else{
    renderList();
    document.getElementById("list-view").style.display="block";
    document.getElementById("detail-view").style.display="none";
    window.scrollTo(0,0);
  }
});

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}

(function init(){
  const p=new URLSearchParams(location.search);
  const tab=p.get("tab")||"全て";
  curCat=tab;
  history.replaceState({view:"list",cat:tab},"",location.href);
  document.getElementById("footer").textContent="Generated 2026-07-14 17:10 JST";
  renderTabs();renderList();
})();
</script>
</body>
</html>
