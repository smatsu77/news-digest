hat one of Lutnick's firms had made plans in 2013 to go into business with another figure linked to Epstein, the then-Prince Andrew, by commercially exploiting the contacts the former UK trade envoy had made.\n\"What it involved was a loan to Andrew Mountbatten-Windsor of £1m... to basically buy a prince,\" he tells File on 4 Investigates.\nSearching 3.5 million documents\n\"I was completely shocked,\" says Andriesz, describing the moment when he discovered his own name in the Epstein files - a massive collection of documents, photos, video and emails relating to the notorious sex offender, released by the US government in the past year.\nThe specific files in which Andriesz appeared related to interviews he had given to the FBI while in dispute with his former employer, BGC Partners - a financial brokerage firm, part of Lutnick's Cantor Fitzgerald group.\nIn 2016, Andriesz had raised concerns internally about accounting irregularities at the firm. He was sacked in 2017, but some of his allegations later led to BGC being ordered to pay a $3m (£2.24m) penalty by the US derivatives regulator for \"numerous supervision, reporting, and record-keeping violations\".\nBGC told us that Andriesz's allegations lacked credibility and were \"categorically false\". It said the claims had been investigated by authorities in several jurisdictions which, according to BGC, had not substantiated the allegations.\nAndriesz spoke to the FBI about BGC, and about the firm's ultimate boss, Lutnick, in 2020-21 - after Epstein had killed himself in jail while awaiting trial on sex trafficking charges.\nThe Epstein files show Andriesz alleged that Lutnick had had undeclared business ties with Epstein. The FBI did not investigate these accusations.\nAndriesz tells the BBC he was disappointed that few had seemed interested in what he had discovered: \"I'm exposing Howard Lutnick's relationship, financial links, with Jeffrey Epstein, and there's no interest.\"\nIn 2025, Lutnick was appointed US commerce secretary, at which point he sold his shares in Cantor Fitzgerald and passed control of the firm to his sons.\nOn a podcast later that year, he claimed he had only ever met Epstein once, 20 years earlier, when they had been neighbours in Manhattan, and that he had found his behaviour \"gross\".\nHowever, with the Epstein files' release, inconsistencies began to appear in this version of events. A photo showed Lutnick with Epstein on the sex offender's Caribbean island, Little St James, in December 2012.\nFour years earlier in Florida, Epstein had been sent to prison for two charges of soliciting prostitution - including one with a minor.\nAndriesz suspected there was yet more to find in the Epstein files that could back up his claims - if only people knew where to look in the 3.5 million pages of documents.\n\"Everyone was searching 'Lutnick',\" he says. He knew, though, that Cantor Fitzgerald executives preferred to use initials rather than full names in their emails.\nAndriesz searched for \"HWL\" (Howard William Lutnick) and found emails sent to and from Epstein in 2018. Epstein had talked directly to Lutnick about a digital advertising company called Adfin, in which he and Lutnick's firm, Cantor Fitzgerald, had both invested.\nAndriesz spotted correspondence, external where Epstein had directly asked the HWL account: \"what do you think the prospects for adfin are?\"\nLutnick responded: \"Producing revenue finally. This is their year. Next 12 months they need to become economically self-sufficient.\"\nAndriesz then shared this information with US politicians on the House Oversight Committee, the US Congress's main investigatory committee.\nLutnick agreed to appear before the committee in an off-camera hearing in May.\nHe has not been accused of any wrongdoing in connection with Epstein, and he told the committee: \"I unequivocally condemn the conduct attributed to Jeffrey Epstein and everyone who participated in his illegal activities. The survivors of his crimes deserve our respect and su", "translation_ja": "", "vocab": []}, {"title_ja": "Israeli strike on police post in north Gaza kills seven, officials say", "title_en": "Israeli strike on police post in north Gaza kills seven, officials say", "summary_ja": "A senior officer in the Hamas-run police force was among those killed in the strike, which Israel's military says targeted \"terrorists\".", "summary_en": "A senior officer in the Hamas-run police force was among those killed in the strike, which Israel's military says targeted \"terrorists\".", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cqj1jqeyl5ro?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Israeli strike on police post in north Gaza kills seven, officials say\n- Published\nAn Israeli air strike on a post belonging to Gaza's Hamas-run police force has killed at least seven people, including a senior officer, health and police officials say.\nWitnesses told the BBC that an Israeli drone fired four missiles at the post near a busy market in the Jabalia area of northern Gaza.\nThe Palestinian territory's Hamas-run interior ministry said the head of the local police station, Col Mohammed Marwan Salem, and several other officers were among those killed in what it condemned as a \"massacre\".\nAn Israeli military official confirmed it had carried out a strike in the area and said it had targeted \"terrorists\".\nAnother two people were reportedly killed by Israeli fire in southern Gaza on Tuesday.\nAn air strike killed a man and injured three other people in the Khan Younis area, medics told Reuters news agency.\nThe Israeli military said it struck a Hamas operative.\nIn nearby Rafah, a 10-year-old boy named Muataz Abu Shaar was killed by Israeli gunfire, according to the medics.\nThe Israeli military has not yet commented on that incident.\nBoth Israel and Hamas have accused each other of near-daily violations of the ceasefire that took effect in the Palestinian territory last October.\nGaza's Hamas-run health ministry has said at least 1,110 people have been killed by Israeli fire since then, while the Israeli military has said four of its soldiers have been killed in Palestinian attacks.\nThe war was triggered by the Hamas-led attack on southern Israel on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage.\nIsrael responded to the attack by launching a military campaign in Gaza, during which more than 73,230 people have been killed, according to the territory's health ministry.\nRelated topics\n- Published7 days ago", "translation_ja": "", "vocab": []}, {"title_ja": "Diamond giant De Beers halts work at flagship South African mine as demand plummets", "title_en": "Diamond giant De Beers halts work at flagship South African mine as demand plummets", "summary_ja": "Production will stop for two years at the mine which employs more than 4,000 people.", "summary_en": "Production will stop for two years at the mine which employs more than 4,000 people.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cjrgr7lr1ejo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Diamond giant De Beers halts work at flagship South African mine as demand plummets\n- Published\nMining giant De Beers is suspending production at South Africa's biggest diamond mine for two years, as changing consumer habits continue to shrink profits.\nPrices across the industry have fallen because fewer people are buying diamonds than in the past, especially in China, and there is stiff competition from much cheaper lab-grown gems.\nAnnouncing its decision to close the Venetia mine, De Beers said it needed to cut costs and streamline operations given the depressed state of the world diamond market.\nThe Venetia mine, in the far north of South Africa, accounts for more than 40% of the country's diamond production and employs more than 4,000 people.\nWorkers' unions have previously warned against job losses in South Africa's mining sector, which employs almost half a million people, external and accounts for more than 4% of national GDP, external.\nDe Beers is majority-owned by Anglo American, which is reportedly trying to sell it and shift focus to the growing copper market, external fuelled by the recent AI boom.\nAt the Venetia mine, De Beers has pledged to use those two years of downtime to make infrastructure more \"efficient\" with increased \"capacity\", external, ready to reopen production once market conditions improve.\nDe Beers famously launched the advertising tagline \"A Diamond is Forever\" in 1947, seeking to cement the idea that a diamond ring was an essential part of getting married, and later inspiring a James Bond novel and the song recorded by Shirley Bassey for the film franchise.\nBut consumer habits have since changed and times are now tough across the industry, which has seen the International Diamond Consultants' rough diamond price index almost halve since 2022.\nLab-grown diamonds have gained in popularity in recent years, as consumers voice ethical concerns about miners' pay and working conditions as well as environmental damage.\nYet De Beers and other established firms have cashed in on those industry changes too, producing their own lab-grown versions at a snip of the price one would pay for natural diamonds.\nDe Beers is not the first large producer to scale down operations in recent years, but it does occupy a particular place in the public imagination owing to its long history dating back to 1871.\nIts founder was Cecil Rhodes, the English colonist whose forces dispossessed indigenous Africans of their land and denied them basic rights.\nHe became a millionaire in the process and justified their disenfranchisement and racial segregation, external to Cape Town's Parliament several years later, saying \"the natives are children... they are just emerging from barbarism, external\".\nHis legacy in southern Africa has become a lightning rod for discussions about \"decolonising\" institutions which continue to bear his name.\nThis includes universities that have statues of him and scholarships founded on his enormous wealth - like the UK's University of Oxford, whose past Rhodes Scholars, external include ex-US President Bill Clinton and former Australian Prime Minister Malcolm Turnbull.\nYou may also be interested in:\n- World's second-largest diamond found in Botswana - Published22 August 2024\n \n- Botswana 'on the verge of zero tariff deal with US on diamonds', president tells BBC - Published3 October 2025\n \n- Billion-year-old black diamond sold for £3.16m - Published10 February 2022\n \n- Why is Cecil Rhodes such a controversial figure? - Published1 April 2015\n \nGo to BBCAfrica.com, external for more news from the African continent.\nFollow us on Twitter @BBCAfrica, external, on Facebook at BBC Africa, external or on Instagram at bbcafrica, external", "translation_ja": "", "vocab": []}, {"title_ja": "Wildfires burn in parts of UK as fire chiefs warn of extreme pressure", "title_en": "Wildfires burn in parts of UK as fire chiefs warn of extreme pressure", "summary_ja": "Major incidents were declared in North Wales and in Glossop, Derbyshire in the Peak District on Sunday.", "summary_en": "Major incidents were declared in North Wales and in Glossop, Derbyshire in the Peak District on Sunday.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cwyey14r4wzo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Wildfires burn in parts of UK as fire chiefs warn of extreme pressure\n- Published\nWildfires continue to burn in parts of the UK as firefighters face \"extreme pressure\" due to the prolonged heatwave, the chair of the National Fire Chiefs Council (NFCC) has warned.\nPhil Garrigan told BBC Breakfast that the dry weather increased the risk of uncontrollable fires and said: \"There's no real respite... There doesn't seem to be any rain forecast and that becomes problematic\".\nAround 19 fires remain active across the country, he added.\nMajor incidents were declared in Conwy, north Wales, and in Glossop, Derbyshire, on Sunday, with firefighters still tackling the flames on Tuesday.\nWildfires over the weekend also affected Hampshire, Durham, West Sussex, East Sussex, Devon and Somerset.\nIn Wales, the major incident declared over the Conwy wildfire has now been brought under control, according to North Wales Fire and Rescue Service assistant chief fire officer Justin Evans.\nBut firefighters are still tackling several active blazes, including in Braichmelyn forestry near Bethesda and the Rhinogydd mountain range near Harlech.\n- No significant rain forecast for at least a week as UK heatwave continues - Published17 hours ago\n \nFarmer Gareth Wyn Jones, whose land borders the Conwy Mountain, said he had \"never seen anything of that scale\".\n\"It was unreal,\" he said, adding that while ponies grazing on the mountain had escaped, he feared for a neighbour's pigs as flames swept through surrounding land.\n\"The biggest worry was that they were going to suffocate in the smoke, but the smoke did carry over them,\" he said, confirming the animals had survived.\nElsewhere, firefighters remain at the scene of a major moorland fire at Tintwistle Moor near Dovestone Reservoir in the Peak District.\nAround 30 to 40 firefighters are continuing to tackle the blaze, which began on 24 June and has burned around 260 hectares (642 acres) of moorland and woodland.\nGreater Manchester Fire and Rescue Service senior fire chief Ben Levy warned crews faced \"a very challenging and gruelling day ahead\" as high temperatures, strong winds and dry conditions continued to fuel the fire.\nHe urged people to take extra care in the countryside to reduce the risk of further wildfires.\nShania Care-Slede, 20, from Hyde, was arrested earlier this week on suspicion of arson related to the Dovestone fire.\nShe was charged with aggravated arson, reckless endangerment of life and dangerous driving, Greater Manchester Police said on Tuesday.\nIn Dorset, firefighters spent the night at the scene of a wildfire on heathland.\nSmoke was reported at Agglestone, near Studland, at about 17:00 BST on Monday, with crews from seven stations tackling the blaze until 20:00. Relief teams are expected to remain throughout Tuesday.\nNatural England, is warning of a \"very high\" or \"exceptional\" risk of fires across much of England - as well as Wales - over the next few days.\nDry weather does not, on its own, cause wildfires - there needs to be a source of ignition too, such as a spark from a barbecue or a discarded cigarette.\nHowever, dry conditions remove moisture from vegetation, making it more able to burn and act as fuel for blazes to take hold and spread.\nThe conditions the UK is experiencing so far this summer mirror the warnings given by climate scientists that human-induced climate change would lead to more frequent and intense heatwaves, as well as potential summer droughts.\nAdditional reporting: Angharad Thomas\nRelated topics\n- Published1 day ago\n \n- Published1 day ago", "translation_ja": "", "vocab": []}, {"title_ja": "MPs expected to approve long-delayed Hillsborough Law", "title_en": "MPs expected to approve long-delayed Hillsborough Law", "summary_ja": "The legislation has returned to the Commons in Sir Keir Starmer's final days as prime minister.", "summary_en": "The legislation has returned to the Commons in Sir Keir Starmer's final days as prime minister.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c9q2qwnvd75o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "MPs expected to approve long-delayed Hillsborough Law\n- Published\nMPs are expected to approve the long-delayed Hillsborough Law later, in a bid to prevent cover-ups linked to failures of the state.\nThe legislation would impose a duty on public authorities and officials to tell the truth and proactively co-operate with official investigations and inquiries.\nIt has been delayed by wrangling over how the duty applies to the intelligence services, with ministers recently breaking the deadlock with further changes.\nThe bill's approval by MPs in Sir Keir Starmer's final days as prime minister would enable him to present it as part of his legacy in No 10.\n- Bill for Hillsborough Law set to be approved by MPs - Published1 day ago\n \n- Deliver Hillsborough law in full, MPs tell PM - Published28 April\n \n- Hillsborough fans unlawfully killed - Published26 April 2016\n \nAndy Burnham, Sir Keir's expected successor, said the debate will be a \"deeply moving moment\". Both men are expected to speak in the Commons later.\nThe proposed law takes its name from the 1989 Hillsborough disaster, which claimed 97 lives after a crush during the FA Cup semi-final between Liverpool and Nottingham Forest at Sheffield Wednesday's ground.\nPolice leaders were found to have spread false narratives about the disaster, blaming Liverpool fans, and withheld evidence of their own failings.\nThe legislation, which also commits to providing legal aid for victims of disasters or state-related deaths, was a pledge in Labour's 2024 general election manifesto. It is formally known as the Public Office (Accountability) Bill.\nSir Keir had promised to pass the bill by 15 April 2025, to mark the 36th anniversary of the Hillsborough disaster.\nBut this deadline was missed and the government abandoned a final debate in January following a backlash from campaigners and some Labour MPs.\nThis came after a government amendment would have made co-operation with inquiries by intelligence officers subject to the approval of the head of their service.\nBereaved families said MI5 and MI6 officers should be fully subject to the proposed law and pointed to a series of cases where MI5 has provided false information, including the 2017 Manchester Arena bombing.\nThe government has now tabled amendments to the bill, with Justice Minister Catherine Atkinson saying they had listened to experts, campaigners, MPs and peers.\nAtkinson said the amendments would ensure the duty of candour \"applies to all individual intelligence officers while establishing secure procedures for the disclosure of sensitive information\".\nAtkinson told the Commons that intelligence employees who receive a request for protected information would be required to send it to the head of their organisation and not directly to an inquiry or investigation.\nThe head of the intelligence organisation would then be responsible for sharing the information with public investigators.\nConservative shadow justice secretary Nick Timothy said he believed everyone agreed on the need for accountability but described the late introduction of the amendments as a \"shambles\".\nHe said the government had made \"contradictory promises\" to the campaigners for this law and to the intelligence agencies, adding ministers \"now pretend there's no problem\".\nTimothy said Sir Keir was \"desperate for a legacy and to claim the credit\" before Burnham takes over, adding: \"The government has watered down the protections specifically proposed back in January for MI5, MI6 and GCHQ.\"\nThe amendments are being considered during the bill's report stage ahead of it being approved at third reading on Tuesday.\nThe bill will then proceed to the House of Lords where it could be changed further, including by any peers concerned over the impact of the bill on national security.\nOn Tuesday, Downing Street said the government wants the law to be on the statute book by April next year, in time for the next anniversary.\nAhead of the debate, Sir Keir said the \"landmark law\" was \"a tribute to the incredible families and campaigners who have spent decades and decades fighting to get justice for their loved ones\".\n\"They suffered unimaginable grief and never gave up. If it wasn't for their dedication the Hillsborough Law would never have happened,\" he added.\nDuring the debate on the bill in November last year, Sir Keir also highlighted that Hillsborough was not an isolated example of a state cover-up.\nHe raised failings connected to other scandals including the Grenfell Tower fire, infected blood and grooming gangs.\nBurnham, who is on course to replace Sir Keir as prime minister on 20 July, said the Hillsborough families have \"shown extraordinary courage\" and they are \"helping to reshape the relationship between the public and the state for generations to come\".\nThe Labour MP for Makerfield also said he believes there is a need to \"build a Britain where every community is treated with equal respect and where, in the face of injustice, nobody walks alone\".\nHillsborough ", "translation_ja": "", "vocab": []}, {"title_ja": "Man who staged wife's suicide jailed for  murder", "title_en": "Man who staged wife's suicide jailed for  murder", "summary_ja": "The couple's daughter tells the court her father is a \"jealous, conniving, narcissistic villain\".", "summary_en": "The couple's daughter tells the court her father is a \"jealous, conniving, narcissistic villain\".", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c8626147e6no?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Man who staged wife's suicide jailed for murder\n- Published\nA man has been jailed for life after being found guilty of the rape and murder of his estranged wife and staging a scene to make her death look like suicide.\nMichael Thompson, 56, from Northampton, refused to enter Nottingham Crown Court for his sentencing earlier.\nOn Wednesday he was found to have killed Kimberley Thompson, 43, at their home in Pinewood Road, Northampton, last August.\nJudge Nirmal Shant KC sentenced Thompson to a minimum term of 33 years and said he showed an \"ultimate act of cowardice and contempt\" by not turning up in court.\nThe couple had been married for 19 years, had two children, were separated and divorce proceedings had been initiated at the time of the killing.\nKimberley was a keen basketball player and coach, who was part of Northampton Basketball Club.\nMartin Spencer, from the club, said she was \"dedicated\" to the sport, was \"so positive\" and \"encouraged other children to do their best in the game and to develop their talent\".\nThompson was also found guilty at Nottingham Crown Court of two counts of perverting the course of justice.\nThe court heard how he subjected Kimberley to years of domestic abuse, including controlling, coercive behaviour, and physical violence and made hundreds of hours of recordings of her before he suffocated her at their home sometime between midnight and 03:30 BST on 9 August.\nMore from Northamptonshire\nDuring the six-week trial Thompson claimed they had consensual sex before he later found his wife lifeless and surrounded by tablets and alcohol bottles.\nKimberley's family and friends told police they did not believe she had taken her own life, and they described a history of domestic abuse, leading detectives to launch a murder investigation.\nA post-mortem examination found no alcohol in her system and only low levels of caffeine, paracetamol and codeine.\nAt sentencing Shant said: \"You have shown no remorse.\n\"Throughout the course of the trial you sat in the dock shaking your head and making audible noises of dissent.\n\"And in the ultimate act of cowardice and contempt, you have refused to come into court to hear from the family of the grief you have caused.\"\n'Pathetic, unloved man'\nThe couple's daughter, Athena, who appeared via video-link from the US, told the court her father was a \"jealous, conniving, narcissistic villain\".\n\"How could you do such an evil, selfish, malicious thing?\n\"You couldn't stand the fact she had so many people who cared about her.\n\"No amount of years rotting in prison will ever amount to what you deserve, because you deserve no life.\n\"You are a pathetic, unloved man.\n\"The day you killed my mother, you killed me too. I feel I will never be happy again.\n\"A dad is supposed to protect their daughter from pain, instead you caused the worst pain of my life.\n\"I will not let you defeat me, I will show up for her, my mum, and I will continue to make her proud.\"\nJurors were told Thompson was aware his wife had started a new relationship and was planning to move out, and she had requested about £65,000 as part of a divorce settlement.\nProsecutor Miranda Moore KC told the jury posts Kimberley shared on Facebook and Snapchat in the early hours of that morning saying she had \"drank too much\" raised suspicion among her friends and family because it had a spelling error and was not written in the way she wrote.\nShant said Thompson had made a \"concerted attempt to conceal\" what he had done, and \"set about creating a false scene to fool the police\".\n\"You were literally trying to get away with murder.\n\"The evidence makes it clear you pretended to do CPR and you feigned distress on the phone to the emergency services.\n\"You also took her from her family, friends and colleagues – a woman who was accomplished, valued and loved.\n\"She adored her children and she adored the fact she was about to start a new life.\"\nDet Ch Insp Torie Harrison, from the East Midlands Special Operations Unit, said Kimberley faced about two decades of domestic abuse.\nShe paid tribute to her friends and family for \"the grace they have shown throughout our investigation and particularly over the last six weeks\".\n\"The level of abuse Kim was subjected to was horrific, and I want to take this opportunity to say to anyone who may be living a similar life that help is available.\"\nEmma Cornell, from the Crown Prosecution Service, also said the trial exposed Thompson's \"cowardice and lies\" after subjecting Kimberley to \"sustained abuse\".\nShe hoped the sentence would \"provide some measure of justice\".\nDo you have a story suggestion for Northamptonshire? Contact us below.\nGet in touch\nYour Voice\nFollow Northamptonshire news on BBC Sounds, Facebook, external, Instagram, external and X, external.\nRelated topics\n- Published6 days ago\n \n- Published27 May\n \n- Published1 July\n \n- Published25 September 2025", "translation_ja": "", "vocab": []}, {"title_ja": "US-Iraq relations: Can Iran-allied militias be disarmed?", "title_en": "US-Iraq relations: Can Iran-allied militias be disarmed?", "summary_ja": "When Donald Trump meets Iraq's new PM today, they are likely to discuss disarming Iran's allies in Iraq. Some have already pledged to give up their guns. But is that likely? And will it influence the US-Iran war?", "summary_en": "When Donald Trump meets Iraq's new PM today, they are likely to discuss disarming Iran's allies in Iraq. Some have already pledged to give up their guns. But is that likely? And will it influence the US-Iran war?", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/us-iraq-relations-can-iran-allied-militias-be-disarmed/a-77956078?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "US-Iraq relations: Can Iran-allied militias be disarmed?\nJuly 14, 2026When Iraq's new Prime Minister Ali al-Zaidi has talks in the White House on Tuesday, it is highly likely he'll discuss more than one uncomfortable topic. On the table is what is potentially the most uncomfortable subject of all, given the US-Iran war: the role that Iran-affiliated paramilitaries play in Iraq.\nMost of the paramilitaries, often grouped together as the Popular Mobilization Front, or PMF, were first formed in 2014 when religious leaders called upon able-bodied men to fight the extremist group known as the \"Islamic State.\" They now number around 240,000 fighters and have an annual budget of about $3.5 billion (€3 billion).\nSome — but not all — PMF factions are considered part of Iran's so-called \"Axis of Resistance,\" which also includes Hezbollah in Lebanon, the Houthis in Yemen and Hamas in Gaza. During the ongoing conflict between Iran and the US, certain PMF groups are thought to be behind attacks on US bases in Iraq, Kuwait and Jordan.\nWhich is why the US wants to see them disarmed.\nUS Secretary of State Marco Rubio addressed the issue while in the United Arab Emirates last month.\n\"You can't have the end of hostilities and conflicts in the region as long as Iranian proxies are launching missiles and drones from Iraq and are participating in terrorism,\" Rubio told reporters.\nPressuring Iraq, withholding oil revenues\nOver the past year, the US has increased pressure on the Iraqi government to tackle this issue, including by designating several more PMF factions \"foreign terrorist organizations,\" imposing sanctions on businesses associated with the PMF, threatening to block Iraq's oil revenues via US banks, and by withholding foreign currency shipments.\nThe Iraqi government has responded by saying that, by the end of September, all arms should be brought under the control of the state and that any groups that don't agree will be prosecuted.\nIn late May, influential cleric Muqtada al-Sadr ordered his armed faction, Saraya al-Salam (in English, peace brigades), to hand over weapons to the state. Around a week later, the Iraqi government said it had received information on personnel, weapons and equipment.\nIn early June, two other Iraqi paramilitaries — Asaib Ahl al-Haq (in English, league of the righteous) and Kataib Imam Ali (the Imam Ali brigades) — also agreed to end organizational ties to the PMF and to eventually transfer weapons and personnel to the state.\nBut just as quickly as the announcements came, so did the doubts.\nAsaib Ahl al-Haq, or AAH, has been active since 2006 and was well known for attacking US troops occupying Iraq after their 2003 invasion of the country. Even after most American soldiers left the country, AAH retained a reputation for criminal activities, including theft, violence, kidnappings and murder. AAH and its proxies, which often go by another name, have also been accused of targeting US bases and US allies inside Iraq, during the current US-Iran war.\nThis promise to disarm means \"moving what you hold in your right hand to your left,\" sources close to the PMF told London-based, pan-Arab newspaper Asharq Al-Awsat.\nIt made sense for the groups to give their weapons to the state because they virtually are the state, other commentators argued. Some described the move as \"rebranding.\"\nFrom violence to politics\nMany PMF groups also have political representation and altogether their parties in the Iraqi parliament currently hold a majority.\n\"After last year's parliamentary elections, the militias' political wings hold a quarter of the seats in parliament, control ministries, influence the judiciary and command significant economic resources,\" analyst Omar al-Nidawi wrote for Washington-based think tank, the Stimson Center, in June. The new prime minister \"serves at the pleasure of these powerful militia-aligned groups,\" he added.\nSo if it happens at all, that makes any disarmament very difficult to monitor, al-Nidawi, who is director of programs at the Enabling Peace in Iraq Center, told DW.\n\"In a complex environment like Iraq, where the state's weak, you ideally require external observers to be able to verify that … weapons are not simply going from warehouse A to warehouse B, both of which are under the control of the same group,\" al-Nidawi argues.\nIn some ways that criticism is valid, agreed Sajad Jiyad, an Iraqi political analyst and fellow at the Washington-based Century International think tank.\nBut in other ways, AAH has been changing for a while, Jiyad told DW. They have seen real political success and want to focus on that.\n\"They [AAH] believe they can increase their influence and their power by being fully involved in politics and less involved in what was previously the resistance agenda,\" Jiyad says.\nAAH was never the PMF group closest to Iran anyway, the Iraqi analyst points out. Other PMF members that are closer, like Kataib Hezbollah, have vowed not to give up their weapons or their \"resis", "translation_ja": "", "vocab": []}, {"title_ja": "Iranian newspaper threatens Chancellor Merz with 'retaliation'", "title_en": "Iranian newspaper threatens Chancellor Merz with 'retaliation'", "summary_ja": "A major Iranian newspaper has published a threat of \"retaliation\" against German Chancellor Friedrich Merz. Politicians have expressed concern, and the German government has issued a cautious response.", "summary_en": "A major Iranian newspaper has published a threat of \"retaliation\" against German Chancellor Friedrich Merz. Politicians have expressed concern, and the German government has issued a cautious response.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/iranian-newspaper-threatens-chancellor-merz-with-retaliation/a-77958683?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Iranian newspaper threatens Chancellor Merz\nJuly 14, 2026Last Saturday, Teheran's ultra-conservative newspaper Hamshahri published images of thirteen Western politicians \"wanted\" for the death of former Revolutionary Leader Ali Khamenei, along with a statement claiming the politicians would pay the ultimate price. Among the politicians was German Chancellor Friedrich Merz (CDU).\nIn addition to Merz, it also featured US President Donald Trump, Israeli Prime Minister Benjamin Netanyahu, French President Emmanuel Macron and Italian Prime Minister Giorgia Meloni, among others. In the images, all of them are wearing orange prison uniforms, as are common in US prisons.\nSince late February, many European countries have supported the US and Israeli attacks on Iran, for example, by giving them permission to fly through their airspace.\nMerz in early March: 'The mullah regime is coming to an end'\nAfter US and Israeli attacks on Iran began in early March, Merz said that the German government shared the relief felt by many Iranians that this regime was now coming to an end. He went on to say: \"We share the interest of the United States and Israel in seeing an end to this regime's terror and its dangerous nuclear and ballistic armament.\" Thus far, however, the regime remains in power.\nRevolutionary Leader Ali Khamenei was killed at the very start of the attack. His son, Mojtaba Khamenei, is now his successor. In a written statement, Mojtaba Khamenei announced \"retaliation\" for his father's death.\nSaturday's online article in the widely read newspaper stated: \"Retaliation is inevitable. The criminals will take their wish for a peaceful death to the grave.\" It was not included in the Sunday print edition of Hamshahri, and it was deleted from the website by the beginning of the week.\nGovernment Officials say attacks by Iran should be expected\nEven so, German government officials as well as the opposition environmentalist Green Party, expressed concern. Marc Henrichmann, the chairman of the Bundestag oversight committee responsible for monitoring Germany's intelligence agencies, said: \"We have to assume that Iran's intelligence services are planning attacks in Europe as well.\" German security agencies are particularly concerned about what are known as \"disposable agents,\" or individuals who are only recruited to carry out a single attack.\nSebastian Fiedler, spokesperson for domestic policy for the parliamentary group of the center-left Social Democratic Party (SPD), expressed similar concerns. He told the newspaper Die Welt that he saw a high threat level, and that current events reinforced this assessment. He explained that the current situation is likely to \"stir up extremist groups and mobilize lone actors.\" However, many politicians also added that the chancellor is already under extremely tight security and that increased security measures for Friedrich Merz are not necessary at this time.\nThe vice president of the Bundestag, Green Party politician Omid Nouripour, was born in Iran. He told DW: \"In Germany, we have had many past experiences with state-sponsored terrorism exported by Iran. The newspaper would not have been able to get the death threat past the censors if the regime hadn't wanted it. So we have to take this seriously. When a regime targets our head of government, that is hostile behavior and should be treated as such.\"\nAs for the German government, its response has been very reserved. At Monday's routine press conference, Deputy Spokesperson Steffen Meyer said only that they had taken note of the death threat and declined to comment further.\nAuthorities estimate some 180 potentially dangerous individuals in Germany\nOne thing is clear, however, security experts are not prepared to rule out the possibility of Iranian terrorist activities in Germany.\nAuthorities estimate that there are around 180 individuals in Germany who are active either on behalf of the powerful Iranian Revolutionary Guards or for the Iranian intelligence service. In response to an inquiry from the online portal Euractiv, the Federal Office for the Protection of the Constitution stated as early as May that the Iranian intelligence service has long been prepared to resort to actions tantamount to state terrorism. According to the agency, \"These include everything from threats against specific individuals to intelligence gathering aimed at planning potential attacks.\"\nThe Office for the Protection of the Constitution, Germany's domestig intelligence agency, further stated that the Iranian security apparatus has been significantly weakened by the ongoing attacks in Iran. However, there are fears that Tehran could redirect its activities abroad once pressure on the regime eases — for example, after an official end to the war.\nThis article was originally published in German.", "translation_ja": "", "vocab": []}, {"title_ja": "Ebola outbreak much larger than official figures, WHO says", "title_en": "Ebola outbreak much larger than official figures, WHO says", "summary_ja": "The outbreak, which has infected almost 2,000 people and killed over 700, could be at least two to four times larger than official figures, the UN health agency warned. The current outbreak is in the DRC and Uganda.", "summary_en": "The outbreak, which has infected almost 2,000 people and killed over 700, could be at least two to four times larger than official figures, the UN health agency warned. The current outbreak is in the DRC and Uganda.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/ebola-outbreak-much-larger-than-official-figures-who-says/a-77951823?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Ebola outbreak much larger than official figures, WHO says\nJuly 14, 2026The World Health Organization on Tuesday said the ongoing outbreak of the Ebola virus in Africa is much larger than official figures suggest. The WHO is the UN's health agency.\nThe current outbreak is concentrated in the Democratic Republic of Congo, with 20 confirmed cases having been detected in neighboring Uganda. So far, the virus has infected almost 2,000 people and killed over 700, according to official figures.\nWHO faces funding shortfall amid battle to contain virus\n\"The scale of the outbreak is at least two to four times the number of cases that we have found,\" WHO emergencies director Chikwe Ihekweazu said during a media briefing in Geneva. Many of the cases are unrecorded.\nIhekwazu said the WHO received less than half of the $115 million (around €100 million) needed in the first six months to combat the ongoing outbreak.\n\"This outbreak requires resources that match the scale of the challenges that we are facing. And this is not a burden DRC can be allowed to carry alone,\" Ihekweazu.\nIhekweazu had just come back from a week-long visit to the DR Congo. The outbreak there is concentrated in Ituri Province in the northeast and the neighboring North Kivu and South Kivu provinces.\nThe WHO official said the spread of the virus in the affected regions \"continues to outpace response efforts by the national authorities, international partners, including WHO, and the communities most affected.\"\n\"Perhaps the most alarming finding is that many newly reported cases are individuals who died in their communities, without ever reaching a health facility and receiving care,\" Ihekweazu said.\nHe said that survival rates are higher for infected people who go to the hospital and the WHO is working to fight myths that hospital treatment for the virus is ineffective. Patients in the hospital are highly isolated, given intravenous (IV) fluids to stop dehydration and oxygen to support breathing.\nUS tightens travels rules for citizens in DR Congo\nThe Bundibugyo strain of the Ebola virus was first discovered in Uganda. There is no cure or vaccine for the virus, which is often deadly.\nCountries around the world are implementing travel rules to prevent the virus from entering their borders.\nThe US on Monday said US citizens in the DR Congo would not be able to return home on commercial flights and would need to spend at least 21 days in a third country. Non-citizens who recently went to the DRC, Uganda or South Sudan would not be allowed to travel to the US at all, Reuters reported, citing a White House official.\nEdited by: Rana Taha\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google, so you'll always see our verified news first.", "translation_ja": "", "vocab": []}, {"title_ja": "ICE to temporarily halt conducting vehicle stops, sources say", "title_en": "ICE to temporarily halt conducting vehicle stops, sources say", "summary_ja": "U.S. Immigration and Customs Enforcement has been ordered to temporarily stop conducting vehicle stops.", "summary_en": "U.S. Immigration and Customs Enforcement has been ordered to temporarily stop conducting vehicle stops.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/US/ice-temporarily-stop-conducting-vehicle-stops-sources/story?id=134751678", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "LIVE:  ABC News Live", "title_en": "LIVE:  ABC News Live", "summary_ja": "24/7 coverage of breaking news and live events", "summary_en": "24/7 coverage of breaking news and live events", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Iran live updates: Iran fires at Bahrain, Jordan after US strikes, officials say", "title_en": "Iran live updates: Iran fires at Bahrain, Jordan after US strikes, officials say", "summary_ja": "President Donald Trump announced \"major combat operations\" against Iran on Feb. 28, with massive joint U.S.-Israeli strikes.", "summary_en": "President Donald Trump announced \"major combat operations\" against Iran on Feb. 28, with massive joint U.S.-Israeli strikes.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/International/live-updates/iran-live-updates-kuwait-reports-attacks-after-latest/?id=134704698", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "New US Ebola patient arrives in Germany for treatment", "title_en": "New US Ebola patient arrives in Germany for treatment", "summary_ja": "Aid worker flown to Berlin as Trump administration bars Americans from traveling to US on commercial flights A US national who contracted Ebola in the Democratic Republic of the Congo has arrived in Germany for treatment, the health ministry in Berlin said on Monday, weeks after another American inf", "summary_en": "Aid worker flown to Berlin as Trump administration bars Americans from traveling to US on commercial flights A US national who contracted Ebola in the Democratic Republic of the Congo has arrived in Germany for treatment, the health ministry in Berlin said on Monday, weeks after another American inf", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/14/american-ebola-patient-arrives-germany", "state_media": false, "category": "社会", "full_text": "A US national who contracted Ebola in the Democratic Republic of the Congo has arrived in Germany for treatment, the health ministry in Berlin said on Monday, weeks after another American infected with Ebola in the DRC was treated in Berlin.\nMeanwhile, the Trump administration on Monday said it was blocking American citizens in the DRC from traveling to the US on commercial flights, Reuters reported, citing a White House official.\nThe new American patient landed in Frankfurt overnight and was transferred to the city’s university hospital, according to the German health ministry.\nThe head of the World Health Organization (WHO) said the man was a “humanitarian worker” who had been in Bunia, the capital of the north-eastern Ituri province of the DRC.\nIturi is the center of an Ebola outbreak that the DRC declared in mid-May – its 17th.\nThe WHO had provided the infected man with “clinical care and close monitoring”, The WHO director-general, Tedros Adhanom Ghebreyesus, said on X.\n“The patient has been safely transferred to Germany for continued follow-up care,” he added.\nAn official working for the Christian aid group Samaritan’s Purse confirmed to Reuters that the patient, in his 60s, was a full-time employee of the organization working as a warehouse manager in the DRC.\nThe DRC’s ongoing outbreak is caused by the Bundibugyo strain of the virus – for which there is no vaccine or cure.\nThere have been more than 1,900 confirmed cases in the outbreak and more than 700 confirmed deaths, according to the WHO.\nThe German health ministry said the US patient represented “no danger for the general population or for other patients” in the Frankfurt hospital.\n“The risk of someone infected with Ebola entering Germany is very low,” the ministry said.\nIt added that US authorities had requested help from Germany because of the country’s expertise in treating Ebola cases and the shorter flight time from the DRC to Germany.\nAnother US patient with the virus was quarantined at the end of May along with his family at Berlin’s Charité hospital.\nHe made a recovery after two weeks of treatment.\nThe Trump administration’s barring Americans in the DRC from traveling to the United States on commercial flights is being done under a transportation authority known as Title 49, according to Reuters’ reporting. That will place US citizens in the DRC or those who have recently left on a “do-not-board” list until they have spent at least 21 days in a third country, Reuters reported, citing a White House official.\nAbout two dozen Americans were set to board flights to the United States on Tuesday after having traveled to the DRC, according to the US official quoted by Reuters. Reuters reported that the US state department would support those American citizens and others affected during the waiting period.\nEbola spreads through direct contact with bodily fluids from infected people or animals – and the often fatal viral disease causes symptoms that can include high fever, vomiting and internal and external bleeding.", "translation_ja": "", "vocab": []}, {"title_ja": "Killings continue on Del Monte farm in Kenya, families say, after G4S hired for security", "title_en": "Killings continue on Del Monte farm in Kenya, families say, after G4S hired for security", "summary_ja": "Exclusive: Three men killed in incidents over past year allegedly involving G4S guards, who replaced in-house team after previous deaths Bereaved families and politicians have raised alarm about continued killings on Del Monte’s pineapple farm in Kenya despite the company hiring a British security f", "summary_en": "Exclusive: Three men killed in incidents over past year allegedly involving G4S guards, who replaced in-house team after previous deaths Bereaved families and politicians have raised alarm about continued killings on Del Monte’s pineapple farm in Kenya despite the company hiring a British security f", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/13/del-monte-pineapple-farm-kenya-deaths-g4s", "state_media": false, "category": "政治", "full_text": "Bereaved families and politicians have raised alarm about continued killings on Del Monte’s pineapple farm in Kenya despite the company hiring a British security firm to replace its in-house security team after previous deaths were exposed by the Guardian.\nThe multinational food company appointed G4S to guard the farm, which is estimated to cover at least 40 sq km, the area of a small city, after the Guardian detailed allegations of brutal assaults and killings of people suspected of trespassing on its land. Kenyan police have been working with G4S to guard the site.\nThree men, including two brothers, were killed in separate incidents over the past year allegedly involving G4S guards.\nStephen Marubu Kibandi, 34, was shot in the chest from close range by a police officer working alongside G4S guards last August after they claimed to have been attacked. The victim put his hands up in surrender before being shot, according to a witness.\nHis brother, 27-year-old Haron Kame Kibandi, died in April this year after allegedly being struck on the head by stones thrown by G4S guards and falling from a motorbike. A third man, 31-year-old Michael Muiruri, was killed after being knocked off a motorbike by a G4S pickup truck.\nIn 2023, the Guardian revealed allegations about the killing of four men at the farm over a decade. Security at the farm was reviewed as part of a human rights impact assessment, which found that the farm was causing human rights harms across several areas. In March 2024, Del Monte Kenya outsourced all of the security at the farm to a team of 270 G4S guards.\nAnnouncing the deal, Wayne Cooke, the then acting managing director of Del Monte Kenya, said: “The safety and security of each individual within our company and the surrounding community are our top priority.” Del Monte Kenya appointed a new manager to address its “human rights challenges”.\nThis year, the Kenyan police extended their work with G4S to guard the site, setting up a “critical infrastructure protection unit” to help improve security at the farm.\nCampaigners fear there will be more deaths on Del Monte’s pineapple farm because the involvement of police makes the use of lethal force more difficult to prosecute. G4S denies wrongdoing.\nThe farm in Murang’a county is the largest exporter of Kenyan produce, including to several UK supermarkets, and is worth more than $100m a year. The average monthly salary in the county is about £280 ($380) and pineapple theft has been a problem for decades.\nA Kenyan senator has called for an independent investigation into the violence at the farm.\nStephen Marubu Kibandi\nStephen Marubu Kibandi died instantly when he was shot in the chest on 12 August 2025. A witness said Kibandi was among several men who were being chased by police and G4S guards on the Del Monte farm after resisting arrest. They said he was shot by a police officer while raising his hands in surrender. G4S says the police and guards were being attacked by men wielding machetes who also set fire to a G4S vehicle.\nA copy of his postmortem findings, seen by the Guardian, said Kibandi died from “severe haemorrhage due to perforating chest injury due to single gunshot”. His death is being investigated by the police watchdog, the Independent Police Oversight Authority (IPOA).\nG4S says it has shared footage with the IPOA showing police and its officers being attacked by men throwing stones and wielding machetes before the fatal shot was fired by a police officer. The spokesperson said its video also showed a G4S vehicle being set alight. The company declined to share the footage with the Guardian.\nStephen Nderitu, who witnessed the incident, said his friend had been approaching the police to argue they were doing nothing wrong. He told the Guardian: “There were two policemen and two G4S guards about 50 metres from where we were when I saw one of them point a gun at us and I jumped into the nearby thickets. Marubu held up both his hands and I heard a gunshot and saw him go down.”\nThe incident has been widely condemned and later prompted a protest in which a G4S van was burned. The local MP, Mary Wamaua Waithira, said: “Why shoot someone who has surrendered? He had lifted his hands up. We want the commanding officer for Ngati police station removed.”\nHaron Kame Kibandi\nStephen’s brother, Haron, died on 20 April this year from brain injuries, days after being struck on the head by stones. Before his death, he claimed the stones had been thrown by G4S guards. Haron told medics this had caused him to fall from a moving motorbike being ridden by a friend. He was allegedly beaten, according to an account he gave to medics.\nSimon Mburu, the manager of a health clinic to which Haron was taken, said: “He told me that he was hit by a stone by a G4S guard and when he fell down the person riding the bike continued.” When Haron was transferred to a hospital, he gave the same account. He died four days later. Scans revealed he had a “traumatic head injury” incl", "translation_ja": "", "vocab": []}, {"title_ja": "First patients enrolled in record-breaking Ebola treatment trial in DRC", "title_en": "First patients enrolled in record-breaking Ebola treatment trial in DRC", "summary_ja": "Two drugs are being trialled in the Ituri region in a programme set up just six weeks after the outbreak was declared, with hopes it will reduce mortality rates There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo ", "summary_en": "Two drugs are being trialled in the Ituri region in a programme set up just six weeks after the outbreak was declared, with hopes it will reduce mortality rates There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo ", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/12/record-breaking-ebola-treatment-trial-drc", "state_media": false, "category": "社会", "full_text": "There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo – but there are hopes that could change within months as the first patients are enrolled in a treatment trial.\nIt is a record pace to set up and start this kind of research, scientists said, with patients enrolled just six weeks after the outbreak being declared a public health emergency of international concern by the World Health Organization (WHO) on 17 May.\nNevertheless, in Bunia, the capital of Ituri province, where the virus is raging, people are impatient.\n“I hope these drug trials proceed quickly,” said Neema Haba, a mother of three and banana seller. “Financially, we are being driven to the brink by this outbreak and nothing is going right. We are struggling to provide for our children.”\nAs of 9 July, there had been 1,792 confirmed cases and 625 deaths caused by the Bundibugyo strain of the virus, for which there is no vaccine and no approved treatment. It is still “in the expansion phase”, according to the WHO.\nThe response is reliant on the basic techniques of identifying cases, isolating them for care and tracking and monitoring people they have been in contact with.\nThe latest figures show about 75% of known contacts are being traced, but low trust in authorities and a highly mobile population are hampering efforts. In addition, some frontline workers stopped work this week in protest at a lack of pay.\nThe bodies of Ebola victims are highly contagious, and must be safely buried by properly trained professional teams. Ovide Maliabo, a driver for one of the teams in Rwampara, a mining town in Ituri, said the work was dangerous in the face of community mistrust and he and his colleagues “see no point in risking our lives”.\n“At one point, we narrowly escaped being lynched,” he said. “It’s a shame that we aren’t being financially supported.”\nBahati John, head of the team, said he had lost a tooth after being attacked by local people.\n“Honestly, since we started working on 15 May, with all the insults we’ve had to put up with, we haven’t seen a single penny,” he said. “We are the breadwinners of our families, and our families are suffering.”\nDRC officials said payments had been made but it is unclear whether activities have fully resumed. The closure of the local airport in Bunia was hampering the response, including by impeding the supply of banknotes, they said.\nHopes of turning the tide now rest with scientists searching for effective medicines.\nThe Partners treatment trial has opened with two drugs on its books – remdesivir, and MBP134. Patients will be randomly allocated to receive either drug, a combination of the two, or simply standard, supportive care.\nRemdesivir is an antiviral made by pharma company Gilead Sciences, while MBP134 is a monoclonal antibody developed by Mapp Biopharmaceutical, containing two specially engineered immune proteins that recognise and neutralise the virus.\nBoth are given intravenously – MBP134 as a one-off infusion, and remdesivir as 10 days of intravenous therapy.\n“These two drugs actually have been proven to work against the Bundibugyo virus in animal models,” said Prof Laurens Liesenborghs of the Institute of Tropical Medicine, Antwerp, who is working on the trial in Ituri.\n“They showed great efficacy, but now we need to test it in humans. Basically, what we want to see is if they indeed can lower mortality.”\nBundibugyo typically has a lower death rate than the Zaire strain of Ebola, which has caused most previous outbreaks, but it still kills about one in three of those infected.\nResearchers are watching carefully for any difference in death rates between the groups given experimental drugs and the group receiving standard care. “Any improvement is good,” said Liesenborghs. “But it needs to be statistically detected, so we need to see a substantial drop.”\nIn trials looking at the impact of monoclonal antibodies on Ebola cases caused by the Zaire strain, it lowered death rates from 50% to 35%, he said. “Hopefully we will see something in the order of that magnitude.”\nThe trial’s design allows other potential treatments to be added should they become available. A result is likely to need between 700 and 1,000 patients to be enrolled, Liesenborghs said. “We opened one site, hopefully we’ll open additional sites very quickly, but still then it will take a couple of months, depending on how the outbreak is going, obviously.”\nWHO officials said enough remdesivir and MBP134 had been donated, by Gilead and the US government respectively, for 1,200 patients to be enrolled. The WHO is in discussions to ensure sufficient supplies will be available after the trial, should they prove safe and effective, it said.\nPatients of any age, including pregnant and breastfeeding women, who are often excluded from medical research, can enrol in the trial.\n“We always think of risk-benefit,” says Liesenborghs. “Here the benefit is potentially very hi", "translation_ja": "", "vocab": []}, {"title_ja": "Mexico begins legal action in US over deaths of its citizens in ICE custody", "title_en": "Mexico begins legal action in US over deaths of its citizens in ICE custody", "summary_ja": "Mexico files complaints and sends cease-and-desist letters over the deaths of 17 nationals in ICE custody or raids.", "summary_en": "Mexico files complaints and sends cease-and-desist letters over the deaths of 17 nationals in ICE custody or raids.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/14/mexico-begins-legal-action-in-us-over-deaths-of-its-citizens-in-ice-custody?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Mexico begins legal action in US over deaths of its citizens in ICE custody\nMexico files complaints and sends cease-and-desist letters over the deaths of 17 nationals in ICE custody or raids.\nMexico has begun filing complaints with state prosecutors in the United States over the deaths of Mexican citizens in immigration detention and during enforcement operations, marking its strongest response yet to deaths linked to US President Donald Trump’s immigration crackdown.\nThe Ministry of Foreign Affairs announced the move in a statement on Tuesday after Mexico said 17 of its citizens have died during US immigration enforcement operations or while in custody since Trump returned to office in January last year.\nRecommended Stories\nlist of 4 items- list 1 of 4Meet the Cubans stuck in Mexico under Donald Trump’s deportation campaign\n- list 2 of 4Nine deaths tied to Trump’s immigration enforcement operations in US\n- list 3 of 4Mexico’s Sheinbaum announces criminal charges request in US over ICE deaths\n- list 4 of 4Mexico files criminal complaints over migrant deaths during ICE operations\nThe Mexican government has also sent cease-and-desist letters to detention centres where Mexican nationals have died. The first was sent to the Adelanto detention centre in California, where four Mexican citizens have died.\nMexico said the letters call for an end to practices that may have contributed to the deaths, including delays in medical care and detention policies it says fall short of medical and prison standards.\nThe government also plans to file a complaint with the US Department of Justice through the Mexican embassy while its consular network is helping bring cases to state prosecutors.\nMexican Foreign Minister Roberto Velasco Alvarez has also written to United Nations High Commissioner for Human Rights Volker Turk, asking his office to seek information from US authorities and look into whether the deaths are consistent with Washington’s international obligations.\nThe steps follow measures announced last week by President Claudia Sheinbaum, days after a US Immigration and Customs Enforcement (ICE) agent shot and killed Mexican citizen Lorenzo Salgado Araujo during a raid in Houston, Texas, on 7 July.\nSpeaking on Monday, Sheinbaum said the issue went beyond the government and called on all Mexicans to show solidarity with their fellow citizens living in the US. While she said Mexico was not seeking a confrontation with Washington, it could not remain silent.\n“We must raise our voices when there are human rights violations against our fellow citizens,” she said.", "translation_ja": "", "vocab": []}, {"title_ja": "Israeli attack on north Gaza police station kills eight", "title_en": "Israeli attack on north Gaza police station kills eight", "summary_ja": "Gaza&#039;s interior ministry denounces &#039;horrific massacre&#039; that killed station chief, other police personnel and a civilian.", "summary_en": "Gaza&#039;s interior ministry denounces &#039;horrific massacre&#039; that killed station chief, other police personnel and a civilian.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/14/israeli-attack-on-north-gaza-police-station-kills-eight?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Israeli attack on north Gaza police station kills eight\nGaza’s interior ministry denounces ‘horrific massacre’ that killed station chief, other police personnel and civilian.\nAn Israeli drone attack has targeted a police station in northern Gaza’s Jabalia camp, killing at least eight people, according to local officials.\nThe attack took place Tuesday afternoon in al-Faluja in western Jabalia, said Al Jazeera’s Hani Mahmoud, reporting from Gaza City.\nRecommended Stories\nlist of 3 items- list 1 of 3What is the EU’s plan to cut trade with illegal Israeli settlements?\n- list 2 of 3Israel bans Jerusalem’s grand mufti from Al-Aqsa Mosque for one week\n- list 3 of 3Andy Burnham apology for Labour stance on Gaza: Is UK’s position shifting?\nAmong those killed were at least six police personnel, including the station’s director, according to Gaza’s Interior Ministry.\nA civilian was also killed, the ministry said. It called the attack a “horrific massacre against officers and members of the police force”.\nAFP cited Gaza’s Palestinian Civil Defence as saying a total of eight people were killed in the attack, including a female officer, with their bodies transferred to al-Shifa Hospital.\n“Their job was to maintain some sort of law and order and organisation in an area that is known as a marketplace in the middle of a displacement camp,” Al Jazeera’s Mahmoud said.\nThe Jabalia attack is the latest in a near-daily litany of deadly Israeli strikes in Gaza that have continued regularly despite a “ceasefire” agreed last October.\nIsraeli gunfire kills 10-year-old child\nEarlier today, an Israeli air strike in southern Gaza’s Khan Younis area killed one man and injured three others, including a child and a woman, reported the Palestinian Wafa news agency. Separately, another man died of wounds sustained from Israeli gunfire two days earlier in the same area, said Wafa.\nMeanwhile, Israeli gunfire killed a child in Khan Younis’s al-Mawasi area, reported Wafa, bringing today’s total death toll in the enclave to 11.\nThe child – aged 10 – was hit by heavy machinegun fire and died before his relatives could rush him to the hospital, Mahmoud said.\nHe was “critically injured and bleeding”, Mahmoud said.\n“By the time his relatives picked him up and brought him to Nasser Hospital, he was already dead. Just another child, another grieving family, another reminder of the human cost of the ongoing genocidal act.”\nIsrael’s war on Gaza since October 7, 2023 has killed at least 73,233 people and injured 173,707, according to a Health Ministry statement released earlier on Tuesday. At least 1,110 of those victims have been killed since the October truce took effect, said the ministry.", "translation_ja": "", "vocab": []}, {"title_ja": "France vs Spain LIVE: FIFA World Cup 2026 semifinal", "title_en": "France vs Spain LIVE: FIFA World Cup 2026 semifinal", "summary_ja": "Live coverage and text updates as France play Spain in a semifinal clash between the two tournament favourites.", "summary_en": "Live coverage and text updates as France play Spain in a semifinal clash between the two tournament favourites.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/liveblog/2026/7/14/france-vs-spain-live-fifa-world-cup-2026-semifinal?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Live MatchLive Match, \nFrance vs Spain LIVE: FIFA World Cup 2026 semifinal\nPublished On 14 Jul 2026 15:30 GMT\n- France face Spain in a blockbuster semifinal, with Argentina or England awaiting in the final.\n- The match at the Dallas Stadium kicks off at 2pm (19:00 GMT).", "translation_ja": "", "vocab": []}, {"title_ja": "Nasa's Anil Menon, two Russians blast off for 8-month International Space Station mission", "title_en": "Nasa's Anil Menon, two Russians blast off for 8-month International Space Station mission", "summary_ja": "Mr. Menon will \"conduct scientific research and technology demonstrations aimed at advancing human space exploration and benefiting life on Earth,\" according to NASA", "summary_en": "Mr. Menon will \"conduct scientific research and technology demonstrations aimed at advancing human space exploration and benefiting life on Earth,\" according to NASA", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/sci-tech/science/nasas-anil-menon-two-russians-blast-off-for-8-month-international-space-station-mission/article71222648.ece", "state_media": false, "category": "IT", "full_text": "NASA astronaut Anil Menon and two Russian cosmonauts on Tuesday (July 14, 2026) lifted off onboard a Soyuz MS-29 spacecraft from Kazakhstan on an eight-month mission to the International Space Station.\nThe Roscosmos spacecraft carrying Mr. Menon and Russian cosmonauts Pyotr Dubrov and Anna Kikina lifted off from the Baikonur cosmodrome at 8:17 pm IST.\nAfter a two-orbit, three-hour trip to the station, the spacecraft will automatically dock at 11:56 p.m. IST to the Prichal module.\nThis marks Mr. Menon's first spaceflight and the second flight for the Russian cosmonauts, according to NASA.\nMr. Menon’s family members, including astronaut wife Anna Wilhelm, and NASA Administrator Jared Isaacman, were at the Baikonur cosmodrome for the spaceflight.\nOnce aboard, the trio will join NASA astronauts Jessica Meir, Jack Hathaway, and Chris Williams, European Space Agency astronaut Sophie Adenot, and Roscosmos cosmonauts Sergey Kud-Sverchkov, Sergei Mikaev, and Andrey Fedyaev.\nMr. Menon, Mr. Dubrov and Ms. Kikina's mission will last about eight months, and they are scheduled to return to Earth in April 2027.\nMr. Menon will \"conduct scientific research and technology demonstrations aimed at advancing human space exploration and benefiting life on Earth,\" according to NASA.\nYelena Remizova, head of Russia's agency for international humanitarian cooperation Rossotrudnichestvo, earlier told state-run TASS news agency that the rocket will carry with it drawings made by Indian schoolchildren.\n\"These are the works of the winners of the 'First Forever' competition, dedicated to the 65th anniversary of the flight of the first Earth astronaut, Yury Gagarin, and cooperation between Russia and India in the field of space exploration,\" she said.\nWhile on board the ISS, Mr. Menon will conduct a series of experiments to study the physiological toll of long-duration spaceflight and examine how microgravity affects blood flow, vein structure, and blood composition in astronauts.\nHe will also help test technologies for producing intravenous fluids using the station’s potable water system. Such capabilities could become critical during deep-space missions where medical supplies are limited.\nMenon will continue research to refine in-space production of semiconductor crystals to enable the large-scale manufacturing of components needed for high-performance computers, artificial intelligence, and improved medical devices. He will also perform ultrasound investigations using augmented reality and artificial intelligence methods that could eliminate the need for medical support from Earth on future space missions.\nPublished - July 14, 2026 10:14 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Iran slams U.K. plan to ban support for Revolutionary Guards", "title_en": "Iran slams U.K. plan to ban support for Revolutionary Guards", "summary_ja": "The new legislation gives the British government \"proscription-like\" powers to designate foreign state proxies deemed a threat to Britain's national security.", "summary_en": "The new legislation gives the British government \"proscription-like\" powers to designate foreign state proxies deemed a threat to Britain's national security.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/iran-slams-uk-plan-to-ban-support-for-revolutionary-guards/article71222497.ece", "state_media": false, "category": "政治", "full_text": "Iran slammed on Tuesday (July 14, 2026) a British plan to ban support for the Islamic Revolutionary Guard Corps, alongside an Iran-linked group accused of a series of attacks against the Jewish community.\nThe Foreign Ministry \"condemns the hostile act of the British government... as unjustified, irresponsible and contrary to the fundamental principles and rules of international law\", it said in a statement.\nBritish Prime Minister Keir Starmer had said on Monday (July 13, 2026) that \"anyone found supporting or assisting these groups will now face up to 14 years in prison\".\nThe proposed law is to be presented to Parliament this week.\nThe banned groups would also include proxies and volunteers of Russia's GRU military intelligence agency, and the Islamic Movement of Companions of the Right, an Iran-linked group which has claimed attacks on Jewish properties in London.\nThe new legislation gives the British government \"proscription-like\" powers to designate foreign state proxies deemed a threat to Britain's national security.\n\"The move will step up the government's ability to counter state threats linked to foreign powers including espionage, foreign interference in our democracy, sabotage and physical attacks,\" the Home Office said in a statement.\nThe announcement comes after several antisemitic attacks struck the British capital earlier this year, including a spate of arson attacks on synagogues, community ambulances and other Jewish sites.\nThe proposed law also follows a case earlier this month in which a London court jailed two people for a knife attack it said was carried out at Iran's behest.\nThe two Romanian nationals were convicted of the 2024 stabbing of Pouria Zeraati, a news presenter for Persian-language outlet Iran International.\nIran summoned the British ambassador to Tehran to protest what it called the \"baseless accusations\".\nPublished - July 14, 2026 09:40 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "West Asia war LIVE: Trump backs away from Strait of Hormuz tolls, calls for trade deals with Gulf countries", "title_en": "West Asia war LIVE: Trump backs away from Strait of Hormuz tolls, calls for trade deals with Gulf countries", "summary_ja": "Trump announced that the Strait of Hormuz is open to all ship traffic except for Iran", "summary_en": "Trump announced that the Strait of Hormuz is open to all ship traffic except for Iran", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-conflict-iran-us-war-washington-strikes-tehran-donald-trump-peace-deal-strait-of-hormuz-live-updates-july-14-2026/article71219702.ece", "state_media": false, "category": "政治", "full_text": "U.S. President Donald Trump said on Tuesday (July 14, 2026) that trade and investment deals with the Gulf states will replace the 20% fee for ships to pass through the Strait of Hormuz that he had proposed a day earlier.\nAlso read | Why Iran insists on controlling the Strait of Hormuz\nLebanon and Israel are holding new negotiations under U.S. auspices in Rome on Tuesday (July 14, 2026), against the backdrop of a regional escalation between Washington and Tehran.\nBut Hezbollah rejects the agreement, which calls for the group’s disarmament and whose implementation is set to begin with Israeli withdrawal from two “pilot zones” in southern Lebanon.\nAlso read | It’s not over: fresh attacks and a crumbling ceasefire\nAn Indian crew member was killed on Tuesday (July 14, 2026) while eight others, including six Indians, sustained injuries in an Iranian strike on UAE shipping tankers in the Strait of Hormuz close to Oman, in a major escalation of the conflict in West Asia.\n(With inputs from agencies)\nFollow the LIVE updates here:", "translation_ja": "", "vocab": []}, {"title_ja": "Nagaland man living in Pune held by ANTF in cocaine supply chain probe", "title_en": "Nagaland man living in Pune held by ANTF in cocaine supply chain probe", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/pune/nagaland-man-pune-h
