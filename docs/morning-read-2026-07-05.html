ion. I’m glad he is feeling better, but his disregard for his constituents is a prime example of just how sick American democracy is.\nAfter implementing a Muslim ban, Stephen Miller is now mulling a ‘pregnancy ban’\nMaga is melting down after the US supreme court upheld birthright citizenship, which Trump has been trying to dismantle as par", "translation_ja": "姿を消していた議員の謎がついに解けた。約4カ月前、共和党のトム・キーン・ジュニアが公の場から忽然と姿を消した。彼は100票以上の採決を欠席しながらも、納税者が負担する年収17万4,000ドルの給与と充実した福利厚生を受け続けた。欠席の理由として示されたのは、4月下旬に事務所が出した「個人的な健康上の問題に対処している」という謎めいた声明だけだった。キーンの父で元ニュージャージー州知事のトム・キーン・シニアは5月、CNNのインタビューで息子が一時的な病気と闘っており、間もなく職務に復帰すると語った。\n\n今週、キーンはようやく姿を現し、うつ病の入院治療のために不在にしていたことを明かした。なぜもっと早く公表しなかったのか。キーンは「生来、プライベートを大切にする人間だ」と述べた。それは結構なことだが、そういう人は公職という仕事を選ばない方がいいのではないだろうか。\n\nうつ病は日常生活を著しく困難にする病であり、苦しんでいる人には当然ながら共感を示すべきだ。しかしアレクサンドリア・オカシオ＝コルテス下院議員がインタビューで述べたように、「欠席の期間が長期にわたる場合、選挙区民への説明責任という観点から、私たちには何らかの義務があるのではないか、という正当な議論がある」。\n\nさらに正当な議論があるとすれば、キーンが筋金入りの偽善者であるという点だ。彼はその政治生命を、一般のアメリカ人が個人的な危機に対処するための時間と手段——彼自身が今回享受したもの——を得られないようにすることに費やしてきた。4カ月間の有給休暇を取れる人がすべてではない。アメリカはOECD加盟国の中で唯一、国家レベルの有給休暇制度を持たない国だ。精神的な理由による有給休暇を設ける雇用主や、有給休暇給付を提供する州もあるが、大多数のアメリカ人は自力で何とかするしかない。2024年の労働省のファクトシートによると、「主に女性や有色人種が占める最低賃金労働者のうち、95%が有給家族休暇を利用できず、90%が短期障害休暇を利用できない」という。\n\nなぜアメリカはこうなのか。それはキーンのような立法者がいるからだ。マザー・ジョーンズ誌は、この「ネポベイビー（縁故採用の二世）」が「ニュージャージー州の歴史的な有給病気休暇法——ニュージャージー州の労働者に年間5日間の有給病気休暇を義務付けるもの——に反対票を投じた」と指摘する。「彼はまた、ニュージャージー州の『医療費サプライズ請求禁止法』や、2008年と2018年の育児休暇法2件にも反対票を投じた。」さらにキーンはトランプの「大きく美しい法案」を支持した。この法案はメディケイドとメアケアを大幅に削減し、障害を持つ人々の生活をより困難にするものだ。要するにキーンは、富裕層のための減税のために、最も脆弱なアメリカ人が苦しむよう投票してきたのだ。\n\n公平に言えば、キーンは激しい偽善者である唯一の政治家では決してない。特に共和党員にとって、それはほとんど職務要件のようなものだ。中絶がいかに悪であるかを大声で主張しながら、自分の愛人が必要になった途端に態度を翻す共和党男性議員が少なくない。たとえば2017年、ペンシルベニア州のティム・マーフィーは、不倫相手の女性に中絶を迫ったとされる疑惑が浮上した後、議会を辞職した。翌年、ドナルド・トランプの有力な資金調達者エリオット・ブロイディは、交際していた「プレイボーイ」のプレイメイトに160万ドルを支払っていたことが明らかになり、共和党全国委員会を辞任した。ブロイディはその女性を妊娠させ、彼女は中絶を選んだ。元フットボールスターで2022年にジョージア州の共和党上院議員候補として落選したハーシェル・ウォーカーも、中絶費用を負担したと訴えられている。ウォーカーは疑惑を否定したが、その女性を知らないとも述べた。後に判明したのは、彼女がウォーカーの子どもの一人の母親であったという事実だ。ちなみにウォーカーは現在、バハマ駐在アメリカ大使を務めている。\n\n共和党の偽善について延々と挙げていくこともできるが、それを指摘することにたいして意味はないのではないだろうか。あなたも私も、彼らが卑劣な偽善者であることは知っている。しかし彼らの支持基盤はそれを気にしない。実際、共和党員は自分たちの矛盾や嘘や腐敗を恥じるどころか、むしろ喜んでいる。自分たちには一つのルールが、一般大衆には別のルールがあるという現実を、彼らは大いに楽しんでいるようだ。トランプは「憲法は大統領として自分がやりたいことを何でもやる権利を与えている」とさえ発言している。彼の取り巻きの多くも、自分たちには好き勝手にやる権利があると信じているようだ。\n\nだからこそ、うつ病の治療を通じてキーンが改心し、より共感力のある人間になったのではないかという期待を、私はほとんど持てない。実際、失った時間を取り戻すための懸命な仕事をするどころか、彼のスケジュールは再選に向けた自己都合の資金調達イベントで埋め尽くされている。彼の体調が回復したことは喜ばしい。しかし選挙区民への彼の無関心は、アメリカ民主主義がいかに病んでいるかを示す典型的な例だ。\n\nムスリム入国禁止令を施行した後、スティーブン・ミラーは今度は「妊娠禁止令」を検討している\nMAGAは、トランプが解体しようとしてきた出生地主義市民権を連邦最高裁が支持したことで大混乱に陥っている。", "vocab": [{"word": "cryptic", "definition": "意味が不明瞭で謎めいた様子を表す形容詞。「a cryptic statement（謎めいた声明）」のように、意図的にわかりにくく書かれた文や発言に使われる。"}, {"word": "debilitating", "definition": "身体や精神を著しく衰弱させる、機能を損なうという意味の形容詞。病気や状況が人の能力を大きく低下させる場合に用いられる。"}, {"word": "hypocrite", "definition": "自分の言動と行動が矛盾している人、つまり偽善者を指す名詞。信念や道徳を口では説きながら実際には異なる行動をとる人物に使われる。"}, {"word": "nepo baby", "definition": "「nepotism（縁故主義）」と「baby」を組み合わせた現代的なスラングで、親や家族のコネや影響力によってキャリアの機会を得た人物を指す。"}, {"word": "craven", "definition": "極めて臆病で卑怯な、または道徳的に情けないという意味の形容詞。「craven hypocrites（卑劣な偽善者）」のように軽蔑的なニュアンスを持つ。"}, {"word": "road-to-Damascus moment", "definition": "聖書の使徒パウロがダマスカスへの道で突然改心した故事に由来するイディオムで、劇的な心変わりや突然の悟りを意味する。"}, {"word": "hoi polloi", "definition": "ギリシャ語由来の表現で「一般大衆」「庶民」を意味する。エリートや権力者と対比して、普通の市民層を指す際にやや皮肉的に使われる。"}]}, {"title_ja": "軍と共和国：アメリカ民主主義における文民統制の重要性", "title_en": "The Military and the Republic: Civil-Military Relations in American Democracy", "summary_ja": "著者は、健全な文民・軍事関係がアメリカ民主主義の根幹をなすと主張し、国内の政治問題を軍事力で解決しようとする誘惑が高まっていることに警鐘を鳴らす。ジョージ・ワシントンが文民権力への服従を徹底した先例を引きながら、軍を政治的に論争的な任務に過度に利用することは、民主主義制度と軍の戦闘即応性の両方を損なうと論じる。著者はアメリカの理想の継続的な改善を求めつつ、軍は選出された文民指導者の統制下に置かれるべきだと訴える。", "summary_en": "The author argues that healthy civil-military relations are foundational to American democracy, warning against the growing temptation to rely on the military to solve domestic political problems. Drawing on George Washington's deliberate deference to civilian authority, the piece contends that overusing the military for politically contentious missions undermines both democratic institutions and military readiness. The author calls for continuous improvement of American ideals while keeping the military subordinate to elected civilian leadership.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/military-and-republic-charles-q-brown", "state_media": false, "category": "オピニオン", "full_text": "Celebrations of America’s founding and reflections on its ideals often overlook the central role of civil-military relations. This is a mistake. In the Declaration of Independence, a chief complaint was that King George III “affected to render the Military independent of and superior to the Civil power.” George Washington himself worried about this abuse of power and went to great pains to avoid it in his own career. Throughout the Revolutionary War, he constantly deferred to the Continental Congress despite its calamitous delays and erratic instructions, because he recognized that his authority over the Continental Army flowed from the people’s representatives. Given his immense personal popularity, he was often encouraged to redress this or that political dysfunction, but he knew that the republic would suffer in the long run if the military were to become an instrument of the commander’s will rather than of the people’s elected leaders.\nThe United States has not recently had leaders of Washington’s popularity, but in other ways the present moment recalls the era that followed the country’s founding. Today, as it was then, there is gridlock in the civilian political system. Similarly, Americans today hold the military in high regard compared with civilian branches of government. When the public is confronted with a problem that seems too big for the civilian branches to solve, the reflex is to ask the military to handle it. Both Presidents Donald Trump and Joe Biden, for instance, looked to the military to play a leading role in responding to the COVID-19 pandemic.\nThe temptation for mission creep is understandable: the U.S. military is the most advanced in the world, with a budget two to three times that of its nearest competitor. As the recent capture of Venezuelan dictator Nicolàs Maduro demonstrated, U.S. service members can do things no other military in the world can do. And in the face of a genuine national disaster, the public will readily embrace the military’s help; during the Great Depression, for instance, President Herbert Hoover directed the military to set up relief camps and President Franklin Roosevelt ordered it to establish the Civilian Conservation Corps, which put unemployed men to work to develop public land.\nBut when presidents use the armed forces for more politically contentious missions, such as addressing domestic crime in cities, the work of the military becomes more fraught. Resorting to a military solution rather than fixing the underlying incapacity or dysfunction in civilian institutions diverts the military from focusing on its primary combat mission. And, as Washington knew, it is not the military’s job to save the republic from political impasses. Indeed, if you ask too much of the military, you risk the entire enterprise.\nTHE AMERICAN INHERITANCE\nA quarter millennium after the first Americans rejected monarchy, representative democracy remains an “experiment entrusted to the hands of the American people,” as Washington said in his first inaugural address. It has been tenderly handed down from generation to generation, and it has been bitterly contested. The Civil War was only the greatest test of whether this experiment could survive its divisions, as the United States has faced disagreements throughout its history, including in the agrarian discontent of the 1890s, the depression and isolationism of the 1930s, the progress and tumult of the 1960s, and the political polarization of recent years.\nIn each chapter, the best political leaders found inspiration to overcome political divisions in the ideals that prompted the first patriots. These leaders held dear the self-evident truths “that all men are created equal [and] endowed by their Creator with certain unalienable Rights.” Of course, those ideals, so well articulated by the founders, were not so well practiced by them. Thomas Jefferson held the pen for the stirringly universal Declaration of Independence, yet he also held people in bondage. Washington, the indispensable man, considered the institution of slavery to be indispensable to the nation’s prosperity (at least initially). All the founders left women out of the equation entirely. But the American experiment strengthens each time its leaders recognize that the founders’ project to create a more perfect union is an enduring one—one to be passed down to every generation.\nThe ideal was better than the reality 250 years ago, and so it is today. For every American institution, including the military, this project of continuous improvement takes concerted effort and is not easy. Indeed, despite its advantages, the U.S. military today must stay humble and learn the lessons of the wars in Ukraine and Iran, including questioning traditional assumptions of U.S. air supremacy. To maintain professionalism in its all-volunteer force, the military must also find new ways to remain connected to American society and to persuade capable young men and women from all walks of li", "translation_ja": "アメリカの建国を祝い、その理想を振り返る際、文民・軍事関係の中心的な役割はしばしば見過ごされる。これは誤りである。独立宣言の中で主要な不満の一つは、ジョージ三世が「軍を文民権力から独立させ、文民権力よりも優位に置こうとした」ことであった。ジョージ・ワシントン自身もこの権力の乱用を憂慮し、自らの経歴においてそれを回避するために多大な努力を払った。独立戦争を通じて、彼は大陸会議の壊滅的な遅延や一貫性のない指示にもかかわらず、常に大陸会議に従った。それは、大陸軍に対する自身の権限が人民の代表者から流れ出るものであると認識していたからである。彼は圧倒的な個人的人気を誇り、さまざまな政治的機能不全を是正するよう促されることも多かったが、軍が人民の選出した指導者の意志ではなく、司令官個人の意志の道具となるならば、共和国は長期的に損害を受けると知っていた。\n\nアメリカは近年、ワシントンほどの人気を持つ指導者を持っていないが、別の意味で現在の状況は建国後の時代を思い起こさせる。今日も当時と同様に、文民政治システムには機能不全が生じている。同様に、今日のアメリカ人は政府の文民部門と比較して軍を高く評価している。文民部門では解決できないほど大きな問題に直面したとき、人々は反射的に軍に対処を求める。たとえば、ドナルド・トランプとジョー・バイデン両大統領は、新型コロナウイルス感染症のパンデミックへの対応において軍が主導的な役割を果たすことを求めた。\n\nミッション・クリープへの誘惑は理解できる。アメリカ軍は世界最高水準であり、その予算は最も近い競争相手の二倍から三倍に達する。最近のベネズエラの独裁者ニコラス・マドゥロの拘束が示したように、アメリカの軍人は世界のどの軍隊にもできないことを成し遂げることができる。また、真の国家的災害に直面したとき、国民は軍の支援を容易に受け入れる。たとえば大恐慌の際、ハーバート・フーバー大統領は軍に救済キャンプの設置を命じ、フランクリン・ルーズベルト大統領は失業者を公有地の開発に従事させる市民保全部隊の設立を軍に命じた。\n\nしかし、大統領が都市部の国内犯罪への対処など、より政治的に論争的な任務に軍を使用する場合、軍の活動はより複雑な問題をはらむ。軍事的解決に頼ることで、文民機関の根本的な機能不全や能力不足を修正する代わりに、軍は主要な戦闘任務への集中から遠ざけられる。そしてワシントンが知っていたように、政治的行き詰まりから共和国を救うのは軍の仕事ではない。実際、軍に過大な要求をすれば、その企て全体を危険にさらすことになる。\n\nアメリカの遺産\n\n最初のアメリカ人が君主制を拒絶してから四分の一千年が経った今も、代議制民主主義はワシントンが最初の就任演説で述べたように「アメリカ国民の手に委ねられた実験」であり続けている。それは世代から世代へと大切に受け継がれてきたが、また激しく争われてもきた。南北戦争は、この実験が分裂を乗り越えて生き残れるかどうかの最大の試練に過ぎず、アメリカは1890年代の農業不満、1930年代の恐慌と孤立主義、1960年代の進歩と混乱、そして近年の政治的分極化など、歴史を通じて多くの対立に直面してきた。\n\nそれぞれの章において、最良の政治指導者たちは最初の愛国者たちを突き動かした理想の中に、政治的分断を乗り越えるインスピレーションを見出した。これらの指導者たちは「すべての人は平等に創られ、創造主によって一定の譲ることのできない権利を与えられている」という自明の真理を大切にした。もちろん、建国者たちがこれほど見事に表現したその理想は、彼ら自身によって十分に実践されたわけではない。トーマス・ジェファーソンは感動的に普遍的な独立宣言を起草したペンを握りながら、人々を奴隷として保有してもいた。「なくてはならない人物」ワシントンは、少なくとも当初は奴隷制度を国家の繁栄にとって不可欠な制度と見なしていた。建国者たちは皆、女性を完全に方程式の外に置いた。しかし、アメリカの実験は、指導者たちが建国者たちの「より完全な連邦を形成する」という計画が世代から世代へと受け継がれるべき永続的なものであると認識するたびに強化される。\n\n理想は250年前も現実よりも優れていたし、今日も同様である。軍を含むすべてのアメリカの機関にとって、この継続的改善のプロジェクトは集中的な努力を要し、容易ではない。実際、その優位性にもかかわらず、今日のアメリカ軍はウクライナとイランでの戦争の教訓に謙虚に学び、アメリカの航空優勢に関する従来の前提を問い直さなければならない。志願制の軍隊における専門性を維持するために、軍はまた、アメリカ社会との結びつきを保ち、あらゆる階層の有能な若い男女を説得する新たな方法を見つけなければならない。", "vocab": [{"word": "mission creep", "definition": "本来の目的や任務の範囲を超えて軍や組織の関与が徐々に拡大していく現象を指す慣用表現。特に軍事・政策の文脈で使われる。"}, {"word": "calamitous", "definition": "「壊滅的な、惨憺たる」を意味する形容詞で、深刻な損害や失敗をもたらす状況を表す。formalな文章や歴史的記述で用いられることが多い。"}, {"word": "fraught", "definition": "「（問題・危険・困難などを）はらんだ、緊張に満ちた」を意味する形容詞。'fraught with risk'（リスクをはらんだ）のように前置詞withを伴うことが多い。"}, {"word": "deferred", "definition": "動詞deferの過去形で、「（権威や意見に）従う、敬意を示して従う」という意味。'defer to'の形で目上の存在や制度への服従を表す上級語彙。"}, {"word": "polarization", "definition": "社会や政治において意見・立場が対立する二極に分かれていく現象を指す名詞。近年の政治言説で頻出する重要な学術・報道用語。"}, {"word": "unalienable", "definition": "「譲渡不能の、奪うことのできない」を意味する法律・政治的な形容詞。独立宣言などの歴史的文書に登場し、'inalienable'とも表記される。"}, {"word": "professionalism", "definition": "「専門職としての高い倫理観・技術・規律」を指す名詞。軍や職業集団における行動規範や能力水準の高さを表すTOEIC上級語彙。"}]}, {"title_ja": "トゥキュディデスの誤読：権力、傲慢、そしてメロス対話の真の教訓", "title_en": "Misreading Thucydides: Power, Hubris, and the True Lessons of the Melian Dialogue", "summary_ja": "筆者は、トランプ政権の高官やニーアル・ファーガソンらの論者が、メロス対話を「力こそ正義」の証拠として引用することで、トゥキュディデスを根本的に誤読していると主張する。『ペロポネソス戦争史』を丁寧に読めば正反対の教訓が浮かび上がる。すなわち、メロス破壊後のアテナイの傲慢さと増長が、シチリア遠征の大惨事と最終的な敗北を招いたという事実だ。「トゥキュディデスの罠」の真の意味は覇権国と新興国の衝突ではなく、抑制なき野心が強者自身を滅ぼすという警告にある。", "summary_en": "The author argues that Trump administration officials and commentators like Niall Ferguson fundamentally misread Thucydides by citing the Melian Dialogue as endorsement of raw power politics. A careful reading of The Peloponnesian War reveals the opposite lesson: Athenian arrogance and hubris after Melos led directly to the catastrophic Sicilian expedition and ultimate defeat. The true 'Thucydides trap' is not about rising powers clashing, but about how unchecked ambition and pride bring about the downfall of the strong.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/strong-do-what-they-can-and-suffer-what-they-must", "state_media": false, "category": "オピニオン", "full_text": "It seems to many these days that the world is a jungle beholden only to one law. Since returning to office in 2025, U.S. President Donald Trump has not only made a spectacle of American power—by striking alleged drug smugglers in the Caribbean, kidnapping Venezuelan President Nicolás Maduro, bombing Iran, and even threatening the sovereignty of allies—he has also made a principle out of it. Trump described Maduro’s capture as a vindication of the “iron laws that have always determined global power.” In a similar vein, White House Deputy Chief of Staff Stephen Miller asserted in January that the world is “governed by force” and “governed by power” and that “these are the iron laws of the world since the beginning of time.” Observers heard in these blunt statements echoes of Thucydides, the ancient Athenian aristocrat often considered the first proponent of the cold-blooded doctrine of realism. The Peloponnesian War, his magisterial opus on Athens’ doomed decades-long conflict with Sparta in the fifth century BC, includes the famous line, “The strong do what they can and the weak suffer what they must.”\nThat well-known line comes from an important section of the text known as the Melian Dialogue, in which representatives of Athens browbeat emissaries from the island of Melos. After the Athenians fail to persuade the Melians to accept unconditional surrender, they kill all the island’s men and enslave its women and children. Thucydides’s Melos passage has long been cited as proof that little governs the world beyond strength and its exercise—and as evidence that the brilliant Athenian general, historian, and philosopher himself believed that. Generations of students of international relations have been assigned these decontextualized snippets from his vast work and instructed that this was indeed Thucydides’s lesson. Today, a cottage industry of commentators now celebrate (or bemoan) what is described as a Thucydidean turn in American foreign policy. In “How Trump Won Davos,” an essay published in January, the historian Niall Ferguson explicitly invoked the Melian Dialogue to tout the triumph of Trump as a realist in the mode of Thucydides and asserted that, at Melos, “the realists won an emphatic victory.”\nBut that understanding of both the dialogue and its author gets his meaning fundamentally backward. Thucydides repeatedly refers to, but never endorses, the idea that the strong have the freedom to do what they want: to the contrary, a careful reading of The Peloponnesian War suggests a rather different view. Among the principal lessons to learn from Thucydides is that the ambition of the strong can lead to their own undoing. Right after Thucydides reports the fateful words of the Athenian envoys and the subsequent destruction of Melos, he describes at great length the disastrous campaign Athens pursued in Sicily—an effort that eventually led to Athenian defeat and Spartan victory. In this light, the Melian Dialogue is not proof of the great virtue of strength in international relations but an illustration of pride before the fall.\nThe political scientist Graham Allison famously coined the term “Thucydides trap” to refer to the dynamic inherent in The Peloponnesian War, of how the tensions between a rising power and an existing power will invariably bubble over into conflict. The real Thucydides trap, however, is different. The crucial lesson of the book is not to sketch how Athens and Sparta found themselves sleepwalking into a war that neither side wanted or understood. As Thucydides elaborately elucidates, both went into the conflict with eyes wide open. Moreover, in his view, the start of that war was hardly a trap. Thucydides supported the commencement of hostilities and the careful strategy of Pericles, the Athenian leader who rallied the public behind his demand for war with Sparta. The true catastrophe, and the real trap, occurred many years later, when Athens abandoned Pericles’s prudence and became recklessly ambitious, most grimly demonstrated by the misguided bid to conquer Sicily.\nThe central tragedy of The Peloponnesian War is the story of growing Athenian arrogance and hubris and its fateful consequences. Modern-day Athenians, trumpeting the virtue of strength, would do well to heed Thucydides’s warnings if they don’t want to court their own disasters.\nTRUTH IN THE TALE\nThe Melian Dialogue indeed offers vital lessons, but only if it is understood in the context of The Peloponnesian War as the book was written. That requires familiarity not with a few selected sentences but with the content of the entire work—and with Thucydides’s brilliant, precise, and overarching method. In his estimation, the 27-year conflict (431–404 BC) between Athens and Sparta unfolded in three distinct phases: an initial ten years of direct conflict, an uneasy seven-year interregnum of constant skirmishes and jockeying for position, and then another ten years of war before Athens’s unconditional surrender. Thucydides ", "translation_ja": "今日、世界はただ一つの法則に支配されるジャングルだと感じる人が多い。2025年に再び就任したドナルド・トランプ米大統領は、カリブ海での麻薬密輸業者への攻撃、ベネズエラのニコラス・マドゥロ大統領の拉致、イランへの爆撃、さらには同盟国の主権への脅しといった形でアメリカの力を誇示するのみならず、そこから一つの原則を導き出している。トランプはマドゥロ拘束を「世界の力の均衡を常に決定してきた鉄の法則」の正当性の証明だと表現した。同様に、ホワイトハウスの副首席補佐官スティーブン・ミラーも1月に、世界は「力によって統治され」「権力によって統治され」、「これらは太古の昔からの世界の鉄の法則だ」と主張した。こうした率直な発言を聞いた観察者たちは、古代アテナイの貴族で冷徹なリアリズムの最初の提唱者とも呼ばれるトゥキュディデスの言葉を思い起こした。スパルタとの数十年にわたる悲劇的な戦争を描いた彼の傑作『ペロポネソス戦争史』には、かの有名な一節がある。「強者はできることをし、弱者は甘受しなければならないことを甘受する。」\n\nこの有名な一節は、「メロス対話」として知られる重要な箇所に登場する。そこではアテナイの使者がメロス島の代表者たちを恫喝する場面が描かれている。アテナイ側が無条件降伏の受け入れをメロス側に説得することに失敗すると、島の男たちを皆殺しにし、女性と子供を奴隷にしてしまう。トゥキュディデスのメロスの記述は長い間、力とその行使以外には世界を律するものは何もないことの証拠として、また輝かしいアテナイの将軍・歴史家・哲学者であった彼自身もそう信じていた証拠として引用されてきた。国際関係論を学ぶ幾世代もの学生が、彼の膨大な著作から文脈を無視して切り取られたこれらの断片を課題として与えられ、これこそがトゥキュディデスの教訓だと教えられてきた。今日では、アメリカの対外政策におけるいわゆる「トゥキュディデス的転回」を称賛する（あるいは嘆く）論者の一大産業が形成されている。歴史家ニーアル・ファーガソンは1月に発表した論考「トランプはいかにしてダボスに勝ったか」の中で、メロス対話を明示的に援用し、トゥキュディデス流のリアリストとしてのトランプの勝利を称え、「メロスではリアリストたちが圧倒的な勝利を収めた」と断言した。\n\nしかし、対話とその著者の意図に対するそのような理解は、彼の真意を根本的に逆転させている。トゥキュディデスは、強者が望むことを自由に行えるという考えを繰り返し言及しているが、決して支持してはいない。それどころか、『ペロポネソス戦争史』を丁寧に読めば、かなり異なる見解が浮かび上がってくる。トゥキュディデスから学ぶべき主要な教訓の一つは、強者の野心がその強者自身の破滅を招きうるということだ。トゥキュディデスは、アテナイの使者たちの運命的な言葉とそれに続くメロスの破壊を記述した直後に、アテナイがシチリアで追い求めた悲惨な遠征を詳細に描いている。その遠征が最終的にアテナイの敗北とスパルタの勝利をもたらしたのだ。この文脈において、メロス対話は国際関係における強さの美徳の証明ではなく、「驕れる者は久しからず」の実例なのである。\n\n政治学者グレアム・アリソンは、「トゥキュディデスの罠」という言葉を生み出したことで有名だ。この言葉は、『ペロポネソス戦争史』に内在するダイナミクス、すなわち台頭する大国と既存の大国の間の緊張が必然的に衝突へと発展するという動態を指す。しかし、本当の「トゥキュディデスの罠」は異なるものだ。この書物の決定的な教訓は、アテナイとスパルタがどちらも望まず、理解もしていなかった戦争に夢遊病者のように引き込まれていった経緯を描くことではない。トゥキュディデスが詳細に解き明かしているように、両者はともに目を見開いた状態でその紛争に突入した。さらに彼の見解によれば、その戦争の始まりは罠などではなかった。トゥキュディデスは戦端の開始と、スパルタとの戦争を求める要求の後ろに市民を結集させたアテナイの指導者ペリクレスの慎重な戦略を支持していた。真の大惨事、そして真の罠は、多くの年月が経った後、アテナイがペリクレスの慎重さを捨て去り、無謀な野心に走ったときに訪れた。その最も痛ましい表れが、シチリア征服という誤った試みだった。\n\n『ペロポネソス戦争史』の中心的な悲劇は、アテナイの傲慢と高慢の高まりとその運命的な結末の物語だ。強さの美徳を喧伝する現代のアテナイ人たちは、自らの災難を招きたくなければ、トゥキュディデスの警告に耳を傾けるべきだろう。\n\n【物語の中の真実】\n\nメロス対話は確かに重要な教訓を提供しているが、それは『ペロポネソス戦争史』という書物の文脈の中で理解される場合に限られる。そのためには、いくつかの選ばれた文章への親しみではなく、著作全体の内容と、トゥキュディデスの卓越した、精緻で包括的な手法への精通が必要だ。彼の評価によれば、アテナイとスパルタの間の27年間の紛争（紀元前431年〜404年）は三つの明確な段階で展開した。最初の10年間の直接的な衝突、絶え間ない小競り合いと主導権争いが続く不安定な7年間の中断期、そしてアテナイの無条件降伏までのさらなる10年間の戦争である。", "vocab": [{"word": "browbeat", "definition": "脅したり圧力をかけたりして相手を服従させること。「browbeat emissaries」で「使者たちを恫喝する」という意味。権力を持つ側が弱い立場の相手を言葉や態度で威圧する際に使われる。"}, {"word": "decontextualized", "definition": "本来の文脈や背景から切り離された状態を意味する形容詞。「decontextualized snippets」で「文脈を無視して切り取られた断片」を指し、引用や解釈が原典の意図を歪めるリスクを示す際に用いられる。"}, {"word": "hubris", "definition": "特に権力者が持つ過度な傲慢さや自惚れを指すギリシャ語由来の言葉。古典文学・政治評論で頻出し、傲慢さが破滅を招くという悲劇的パターンを示す文脈でよく使われる。"}, {"word": "interregnum", "definition": "二つの統治期間や重要な局面の間の空白期・過渡期を指すラテン語由来の語。ここでは戦争の二つの主要段階の間の不安定な7年間の休戦・小競り合いの時期を表している。"}, {"word": "magisterial", "definition": "権威があり、包括的で卓越した質を持つことを表す形容詞。「magisterial opus」で「傑作・大著」を意味し、学術的・文学的な偉業を高く評価する文脈で使われる。"}, {"word": "elucidates", "definition": "複雑な事柄を明確に説明・解明することを意味する動詞。「elaborately elucidates」で「詳細に解き明かす」という意味になり、学術的な分析や論証の文脈で用いられる。"}, {"word": "recklessly", "definition": "結果を考慮せず無謀に行動する様子を表す副詞。「became recklessly ambitious」で「無謀な野心に駆られるようになった」を意味し、判断力を欠いた大胆な行動を批判的に描写する際に使われる。"}]}, {"title_ja": "ハマスの終焉：なぜこの組織は再起不能なのか", "title_en": "The End of Hamas: Why the Group Is Beyond Recovery", "summary_ja": "筆者は、主流の分析家の見解に反し、ハマスはイスラエルとの2年間の戦争によって再起不能なほど壊滅的な打撃を受けたと主張する。その根拠として、幹部指導層の全滅、イランからの資金援助の途絶、そしてガザ市民からの支持喪失を挙げている。また、ハマスとイスラエルの双方が、それぞれの政治的思惑からハマスの健在という神話を意図的に維持していると論じている。", "summary_en": "The author argues, contrary to mainstream analyst consensus, that Hamas has been devastated beyond recovery by two years of war with Israel, citing the elimination of its entire leadership tier, collapse of its Iran-backed funding, and loss of public support among Gazans. The piece contends that both Hamas and Israel are cynically perpetuating the myth of Hamas's continued strength—Hamas to avoid admitting defeat, and Israel to justify ongoing military operations while evading hard questions about Palestinian governance. The author concludes that Hamas lacks the capacity to actually rule Gaza and is mired in political paralysis and financial ruin.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/palestinian-territories/end-hamas", "state_media": false, "category": "オピニオン", "full_text": "The consensus among analysts is that Hamas is down, but hardly out. The group may be badly battered, but it has been around since 1987, and in that time, it has been repeatedly attacked by Israel and has always grown back. The conditions that gave rise to the organization—occupation, dispossession, and humiliation at the hands of Israel—are as severe as ever. And in the Gaza Strip, there is no comprehensive alternative to Hamas’s governance. Even in its weakened state, the group has institutional memory, administrative infrastructure, and coercive capacity that its competitors cannot match.\nBut in truth, Hamas’s two-year war with Israel has decimated the organization beyond the point of recovery. It may still be more powerful than other groups in Gaza. But Israel’s bombing campaigns and invasion have cost Hamas essential military infrastructure, torn apart its leadership, and cut it off from its patrons. As a result, the organization lacks the power to actually rule Gaza. It is suffering from political paralysis and facing financial disaster in the enclave. Finally, it has lost public support: many Gazans blame the group for starting a war that has resulted in the destruction or damage of 90 percent of the homes in the Gaza Strip and the deaths of roughly four percent of the prewar population.\nDespite these facts, officials on both sides of Gaza’s yellow line have embraced the idea that Hamas is alive and well. Members of Hamas perpetuate this farce for an obvious reason: they do not want to admit that they lost. But Israel is also pretending that its nemesis remains strong so it can justify its continuing military operations—and avoid having to answer difficult questions about the future of Palestinians.\nUNAUTHORIZED OBITUARY\nSince Hamas attacked Israel on October 7, 2023, Israel has killed an entire echelon of Hamas leaders. This includes its former top officials: Yahya Sinwar, Ismail Haniyeh, Mohammed Deif, and Mohammed Sinwar. In May of this year, Israeli forces assassinated Izz al-Din al-Haddad, the head of Hamas’s military wing, at a residence, along with some of his family. Eleven days later, it killed Haddad’s replacement, Mohammed Odeh, along with his wife and two of his children. Today, only one Hamas commander who held a senior position before October 7 is left standing: Imad Aqel. Israel has also taken out hundreds of midlevel commanders. What it has done, in other words, goes beyond a mere decapitation strategy. It has removed Hamas’s entire nervous system.\nIsrael has also rendered Hamas incapable of regeneration. The fact that Haddad and Odeh were killed in their homes, with their families, indicates that the safe houses, tunnels, and countersurveillance architecture that once made Hamas’s senior leadership elusive are now gone. So are its overseas outposts. In the last three years, Israel has killed (or tried to kill) Hamas officials in Iran, Lebanon, and Qatar.\nIt is therefore little wonder that Hamas is experiencing a leadership crisis. Since Yahya Sinwar was killed, in October 2024, the group has been unable to decide who should take the helm of its political bureau. Hamas’s Shura Council, made up of 50 to 80 members, was supposed to elect a new leader in early 2025, but it could not meet and vote because of Israel’s ongoing bombardment. When a vote was finally held in February 2026, it did not produce a winner. For now, the group is run by a five-man council that has been hamstrung by infighting.\nThe relationship between Iran and Hamas is effectively over.\nHamas has settled on two leadership candidates: Khalil al-Hayya and Khaled Mashal. Each has a very different agenda. Hayya and his supporters favor close ties with Iran and continued armed confrontation, whereas Mashal and his backers want more sponsorship from Sunni states and more pragmatic negotiations with Israel. Of course, many healthy organizations have factional disagreements that they negotiate and resolve. But these divisions have instead resulted in deadlock. When the United States and Israel began bombing Iran on February 28 of this year, for example, Hamas could not agree on a statement or a response. It thus remained silent for three weeks. When it spoke, it sent conflicting signals. The group’s political leadership in Qatar called on Iran to “avoid targeting neighboring countries,” whereas the group’s military spokesman in Gaza put out a statement with a markedly different tone that praised Tehran’s war efforts.\nHamas’s political crisis is more than just internal. Since October 7, the group has lost external support. For decades, Hamas was an integral part of the so-called axis of resistance—Iran’s network of partners across the Middle East. This partnership was never seamless, in part because Hamas is a Sunni Islamist movement embedded in a Shiite-led alliance. But it was functional. Iran provided Hamas with weapons, training, and funding to the tune of $100 million annually. Hamas, in return, allowed Iran to indirectly ", "translation_ja": "アナリストたちの間での共通見解は、ハマスは打撃を受けてはいるものの、壊滅には程遠いというものだ。同組織はひどく傷ついているかもしれないが、1987年の創設以来、イスラエルから繰り返し攻撃を受けながらも常に復活を遂げてきた。この組織を生み出した条件——占領、土地の収奪、そしてイスラエルによる屈辱——は依然として深刻なままだ。そしてガザ地区には、ハマスの統治に代わる包括的な選択肢が存在しない。弱体化した状態でさえ、ハマスは組織としての記憶、行政インフラ、そして強制力を有しており、競合する組織はそれに匹敵できない。\n\nしかし実際のところ、ハマスとイスラエルの2年間にわたる戦争は、この組織を回復不可能な地点まで壊滅させた。ハマスはガザの他の組織よりも依然として強力かもしれない。しかしイスラエルの爆撃作戦と地上侵攻により、ハマスは重要な軍事インフラを失い、指導部は崩壊し、支援者たちとの関係も断ち切られた。その結果、この組織はガザを実際に統治する力を持たない。政治的な麻痺状態に陥り、深刻な財政危機に直面している。さらに、民衆の支持も失った。多くのガザ市民が、ガザ地区の住宅の90パーセントが破壊または損傷し、戦前の人口の約4パーセントが死亡するに至った戦争を始めたとして、ハマスを非難している。\n\nこうした事実にもかかわらず、ガザの黄色いラインの両側にいる当局者たちは、ハマスが健在であるという考えを支持している。ハマスのメンバーがこの茶番を続けるのは明白な理由がある。彼らは敗北を認めたくないのだ。しかしイスラエルもまた、継続的な軍事作戦を正当化し、パレスチナ人の将来についての難しい問いに答えることを避けるために、宿敵が依然として強力だという見せかけを維持している。\n\n【公認されていない追悼記事】\n\nハマスが2023年10月7日にイスラエルを攻撃して以来、イスラエルはハマスの指導者の一層全体を抹殺してきた。これには最高幹部たちが含まれる——ヤヒヤ・シンワル、イスマイル・ハニヤ、モハメド・デイフ、そしてモハメド・シンワルだ。今年5月、イスラエル軍はハマス軍事部門の長イッズ・アル-ディン・アル-ハッダドを、一部の家族とともに住居において暗殺した。その11日後には、ハッダドの後継者モハメド・オデを、妻と2人の子供とともに殺害した。現在、10月7日以前に上級職を占めていたハマスの司令官で生き残っているのは、イマド・アケルただ一人だ。イスラエルはまた、数百人の中堅司令官も排除してきた。つまりイスラエルが行ったことは、単なる「首切り戦略」を超えている。ハマスの神経系全体を除去したのだ。\n\nイスラエルはさらに、ハマスが再生する能力をも失わせた。ハッダドとオデが家族とともに自宅で殺害されたという事実は、かつてハマスの上級幹部を捉えがたい存在にしていたセーフハウス、トンネル、そして監視回避のための仕組みがもはや存在しないことを示している。海外の拠点も同様に失われた。過去3年間で、イスラエルはイラン、レバノン、カタールでハマスの幹部を殺害した（あるいは殺害しようとした）。\n\nしたがって、ハマスが指導部の危機を経験していることは驚くべきことではない。2024年10月にヤヒヤ・シンワルが殺害されて以来、ハマスは政治局の新たな指導者を誰にするか決定できないままでいる。50人から80人のメンバーで構成されるハマスのシュラ評議会は、2025年初頭に新たな指導者を選出する予定だったが、イスラエルによる継続的な爆撃のために会合を開いて投票を行うことができなかった。2026年2月にようやく投票が行われたが、勝者は生まれなかった。現在、同組織は内部対立に悩まされる5人評議会によって運営されている。\n\nイランとハマスの関係は事実上終わった。\n\nハマスは2人の指導者候補に絞り込んだ——ハリル・アル-ハイヤとハレド・マシャルだ。それぞれが大きく異なる方針を持っている。ハイヤとその支持者たちはイランとの緊密な関係と武装対立の継続を支持する一方、マシャルとその支持者たちはスンニ派諸国からの後援とイスラエルとのより実務的な交渉を望んでいる。もちろん、健全な組織の多くは派閥間の意見の相違を交渉・解決している。しかしこれらの分裂は、代わりに行き詰まりをもたらした。たとえば今年2月28日に米国とイスラエルがイランへの爆撃を開始した際、ハマスは声明や対応について合意できなかった。そのため3週間沈黙を守った。ようやく発言した際も、相反するシグナルを発した。カタールのハマス政治指導部はイランに「隣国を標的にすることを避けるよう」求めたが、ガザのハマス軍事報道官は著しく異なるトーンの声明を出し、テヘランの戦争努力を称えた。\n\nハマスの政治的危機は内部だけにとどまらない。10月7日以降、この組織は外部からの支援も失った。数十年にわたり、ハマスはいわゆる「抵抗の枢軸」——中東全域にわたるイランのパートナーネットワーク——の不可欠な一部だった。ハマスがシーア派主導の同盟に組み込まれたスンニ派イスラム主義運動であるため、この partnership は決して円滑ではなかったが、機能はしていた。イランはハマスに年間1億ドル規模の武器、訓練、資金を提供していた。ハマスはその代わりに、イランが間接的に——", "vocab": [{"word": "decapitation strategy", "definition": "「首切り戦略」という軍事・政治用語で、組織の上層部（指導者）を標的に排除することで組織全体を機能不全に陥らせる戦略を指す。"}, {"word": "coercive capacity", "definition": "「強制力」または「強制能力」を意味し、ある組織や国家が従わない者に対して力や罰則を用いて服従させる能力のこと。政治学や安全保障論でよく使われる専門用語。"}, {"word": "countersurveillance", "definition": "「監視回避」または「対監視」を意味し、敵の監視・追跡活動を検知・妨害・無効化するための措置や技術を指す情報・安全保障分野の専門用語。"}, {"word": "decimated", "definition": "「壊滅的な打撃を受けた」という意味で、元来はローマ軍の10分の1を処刑する慣行に由来するが、現代では組織や集団が甚大な損失を被った状態を表すのに広く用いられる。"}, {"word": "hamstrung", "definition": "「行動を妨げられた」「無力化された」という意味のイディオム表現で、内部対立や制約によって組織や個人が効果的に機能できない状態を表す。"}, {"word": "echelon", "definition": "「階層」または「幹部層」を意味するフランス語由来の語で、組織や軍隊における特定の階級・ランクの集団を指し、ビジネスや軍事・政治の文脈で頻出する上級語彙。"}, {"word": "pragmatic", "definition": "「実用主義的な」「現実的な」を意味し、理念やイデオロギーよりも実際の結果や実現可能性を重視するアプローチや姿勢を表す形容詞。政治・外交分野で頻繁に使用される。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-07-05 10:46 JST";
renderTabs();renderList();
</script>
