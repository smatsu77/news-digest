ampaign=rss", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "超大型台風バビ接近でグアムが避難命令", "title_en": "Evacuations Underway in Guam as Super Typhoon Bavi Approaches", "summary_ja": "超大型台風バビがグアムに接近しており、島全体で強制避難命令が発令されています。この台風は月曜日に上陸する際、時速160マイル（約257キロ）を超える暴風と、約11メートルの高波をもたらすと予測されています。当局は壊滅的な被害を想定し、住民に対して直ちに避難するよう呼びかけています。", "summary_en": "Super Typhoon Bavi is bearing down on Guam, prompting mandatory evacuations across the island. The storm is expected to bring destructive winds exceeding 160mph and waves reaching nearly 11 meters when it makes landfall on Monday. Residents are urged to seek shelter immediately as authorities prepare for a potentially catastrophic impact.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cr7xpgx50jxo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イランでバハイ教徒への弾圧が激化、拘束や拷問の報告相次ぐ", "title_en": "Iran Intensifies Crackdown on Persecuted Baha'i Community", "summary_ja": "イランで宗教的少数派であるバハイ教徒への迫害が深刻化しており、逮捕、拷問、模擬処刑などの事例が報告されている。イラン政権は紛争継続を背景にあらゆる反体制派への締め付けを強めており、以前から迫害を受けてきたバハイ教徒の状況はさらに悪化している。人権擁護団体は、同コミュニティが置かれた環境は近年で最も厳しい水準に達していると警告している。", "summary_en": "Iran's Baha'i religious minority is facing an intensifying crackdown, with reports of arrests, torture, and mock executions. The Iranian regime has broadened its suppression of dissidents amid ongoing conflict, and the Baha'i community — long a target of state persecution — is experiencing a marked deterioration in its situation. Human rights advocates warn that conditions for this minority group are now worse than they have been in years.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/iran-pressure-on-persecuted-baha-i-community-intensifies/a-77824095?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ハメネイ師の葬儀2日目、イラン高官らが参列", "title_en": "Top Iranian Officials Gather for Day 2 of Khamenei's Funeral", "summary_ja": "日曜日、イランの高官らがアヤトッラー・アリー・ハメネイ師の葬儀2日目に参列した。ハメネイ師の息子3人が数か月ぶりに公の場に姿を現した。一方、父の後継として最高指導者に就任したモジュタバー・ハメネイ氏の姿は見られなかった。", "summary_en": "Senior Iranian officials attended the second day of Ayatollah Ali Khamenei's funeral on Sunday. Three of Khamenei's sons made rare public appearances after months out of the spotlight. Notably absent was Mojtaba Khamenei, the son who succeeded his father as Iran's supreme leader.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/top-iranian-officials-attend-day-2-of-ali-khamenei-s-funeral/a-77836567?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "インドのパスポート、世界パスポート指数で1ランク下落", "title_en": "Indian Passport Drops One Spot in Global Passport Index", "summary_ja": "最新の世界パスポート指数において、インドのパスポートが昨年より1つ順位を下げた。この下落は、インドのパスポート保有者が利用できるビザなし渡航またはアライバルビザの変化を反映している。ドイチェ・ヴェレは引き続きこの動向を追っている。", "summary_en": "India's passport has fallen one position in the latest Global Passport Index ranking. The slip reflects changes in visa-free or visa-on-arrival access available to Indian passport holders compared to the previous year. Deutsche Welle is continuing to follow developments related to the updated rankings.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/india-news-indian-passport-slips-one-spot-in-global-ranking/live-77836287?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラの公営住宅、地震前から長年にわたり警告されていた脆弱性", "title_en": "Years of Warnings About Venezuela's Public Housing Preceded Deadly Earthquakes", "summary_ja": "ベネズエラの公営住宅が地震に対して危険なほど脆弱であると、住民や建設専門家、地震学者たちは長年にわたり警告を発していた。しかし、そうした繰り返しの警告にもかかわらず、構造上のリスクは十分に対処されなかった。地震が発生した際、無視され続けた警告の結果が悲劇的な形で現実となった。", "summary_en": "Residents, construction experts, and seismologists had long warned that Venezuela's public housing was dangerously vulnerable to earthquakes. Despite repeated alerts over many years, the structural risks were not adequately addressed. When earthquakes struck, the feared consequences of those ignored warnings became tragically apparent.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/05/world/americas/venezuela-earthquake-la-guaira-building-collapse-government.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラン最高指導者ハメネイ師の葬儀で「復讐」を叫ぶ声", "title_en": "Mourners Chant 'Revenge' at Funeral Prayers for Iran's Slain Supreme Leader Khamenei", "summary_ja": "イランの最高指導者アリー・ハメネイ師が殺害されたことを受け、2日目の公式追悼が行われ、数千人の参列者が「復讐」を求めて叫んだ。後継者とされる息子のモジュタバー・ハメネイ氏は依然として公の場に姿を現していない。長年にわたり権力を握ってきた最高指導者の死により、イランは深刻な政治的混乱に陥っている。", "summary_en": "Thousands of mourners gathered for a second day of public mourning following the killing of Iranian Supreme Leader Ayatollah Ali Khamenei, chanting calls for revenge. His son and designated successor, Mojtaba Khamenei, had yet to make a public appearance amid the ongoing ceremonies. The death of the longtime supreme leader has plunged Iran into a period of deep political uncertainty.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/05/world/middleeast/iran-funeral-supreme-leader.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ氏が习近平氏に働きかけ、宗教弾圧で拘束された牧師を中国が釈放", "title_en": "China Frees Pastor Detained in Religious Crackdown After Trump's Appeal to Xi", "summary_ja": "中国当局は、宗教弾圧の一環として拘束されていたエズラ・金明日牧師を釈放した。トランプ大統領が北京訪問中に習近平国家主席へ直接働きかけてから約2か月後の釈放となった。今回の動きは、トランプ政権の圧力を受けた北京側の外交的なジェスチャーと見られている。", "summary_en": "China has released Pastor Ezra Jin Mingri, who had been detained as part of a crackdown on religion. His release came nearly two months after President Trump raised his case directly with Chinese leader Xi Jinping during a visit to Beijing. The development is seen as a diplomatic gesture by Beijing following pressure from the Trump administration.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/05/world/asia/ezra-jin-mingri-china-christian-xi-trump.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "人質合意の進展でパレスチナ人がガザ北部へ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルはガザを二分する軍事区域の通過を許可し、避難していたパレスチナ人が北部へ徒歩で帰還し始めた。この動きは、人質解放をめぐる膠着状態が打開されたことを受けて実現した。多くの市民が紛争中に避難を強いられた地域へと戻り始めている。", "summary_en": "Israel permitted displaced Palestinians to cross a military zone dividing Gaza, allowing them to return to the northern part of the enclave on foot. The move came after a standoff over hostage releases was resolved. Thousands of Gazans began streaming back to areas they had been forced to flee during the conflict.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を報告、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Property Sector Crisis", "summary_ja": "中国の大手不動産デベロッパー、万科（Vanke）が巨額の損失を報告し、同国の不動産危機が引き続き拡大していることが浮き彫りとなった。万科の経営難は、不動産不況の深刻さと中国政府が救済に乗り出すかどうかについて重大な疑問を提起している。この事態は、中国経済全体の健全性に対する懸念をさらに高めている。", "summary_en": "Leading Chinese property developer Vanke has reported a massive financial loss, signaling that the country's real estate crisis continues to spread. The troubles at Vanke raise serious questions about the depth of China's property downturn and whether state intervention will be necessary. The situation adds to growing concerns about the broader health of China's economy.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残ったまま", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Their Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性は長期間にわたり単独で拘束され、約8か月間を地下トンネルの中で過ごしたという。この事実は、人質たちが拘束中に受けた深刻な身体的・精神的苦痛を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were discovered to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The findings underscore the severe physical and psychological toll endured by the hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "エジプト西部砂漠でビザンチン時代の古代都市を発掘", "title_en": "Archaeologists Uncover Well-Preserved Byzantine City in Egypt's Western Desert", "summary_ja": "考古学者たちがエジプト西部砂漠のダクラ・オアシスで、保存状態の良い4世紀のビザンチン時代の都市を発見した。遺跡にはバジリカ様式の教会を含む住居跡や宗教的建造物が含まれており、当時の日常生活や都市発展の様子を詳しく伝えている。また、硬貨や陶器の破片、道具なども出土し、この都市の経済活動についての貴重な手がかりが得られた。", "summary_en": "Archaeologists have discovered a well-preserved fourth-century Byzantine city in Egypt's Dakhla oasis in the western desert. The site includes residential and religious structures, notably a basilica-style church, offering rare insights into daily life and urban development of the era. Coins, pottery fragments, and tools were also recovered, shedding light on the city's economic activities.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/04/archaeologists-uncover-ancient-byzantine-city-in-egypts-western-desert", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "スーダンのエル・オベイドで激化するドローン攻撃、援助関係者が惨状を証言", "title_en": "Aid Workers Describe Dire Conditions in Sudan's El Obeid Under Relentless Drone Strikes", "summary_ja": "スーダンの都市エル・オベイドは、国軍と準軍事組織RSFの戦闘における重要な戦場となっており、ドローン攻撃が近週さらに激化している。先週末には過去最大規模の攻撃があり、学校や燃料スタンドが標的となって学生を含む20人以上が死亡した。現地の援助ボランティアは、一度に40〜45機のドローンを目撃することが日常となっていると述べ、包囲された都市の深刻な実態を伝えている。", "summary_en": "The Sudanese city of El Obeid has become a key battleground in the ongoing war between Sudan's armed forces and the paramilitary RSF, with drone attacks intensifying in recent weeks. This past weekend saw the most violent strikes yet, hitting schools and fuel stations and killing more than 20 people, including students. Aid volunteers on the ground describe seeing 40 to 45 drones at a time as routine, painting a picture of a city under siege.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/04/el-obeid-aid-workers-sudan-war-drone-strikes", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "英国、女性・女児向け海外教育プログラムをわずか2年で廃止", "title_en": "UK axes £45m overseas education programme for women and girls after two years", "summary_ja": "英国政府は、アフリカ・アジア・中東で100万人の女子生徒の就学継続を目指す「女性エンパワーメントのための高等教育強化（SHEFE）」プログラムを、発表からわずか2年で廃止した。同プログラムは4500万ポンドの予算を持ち、世界中の100万人の学生の高等教育へのアクセス拡大を目的としていた。廃止は英国政府による対外援助削減の一環として行われた。", "summary_en": "The UK government has cancelled the Strengthening Higher Education for Female Empowerment (SHEFE) programme, just two years after it was announced with a £45 million budget. The initiative aimed to keep one million girls in school across Africa, Asia and the Middle East. The cancellation comes as part of broader British foreign aid cuts.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/04/overseas-education-project-for-women-and-girls-axed-by-uk-after-two-years", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国の関与縮小を受け、NATOは東欧防衛戦略を再考", "title_en": "NATO Weighs Eastern Europe Defense Plans as US Reduces Commitment", "summary_ja": "米国が NATO への関与を縮小する兆しを見せる中、NATO は東欧防衛戦略の見直しを迫られている。かつて同地域を戦火で焼き尽くしたドイツの戦車が再び東欧に展開されるなど、ドイツの役割が増大している。欧州の同盟国は、米国の全面的な支援なしにロシアへの抑止力を維持できるかどうか懸念を強めている。", "summary_en": "NATO is reassessing its strategy for defending Eastern Europe amid signs that the United States is scaling back its involvement in the alliance. Germany is playing an increasingly central role, with German tanks being deployed to a region they once devastated during World War II. The shift reflects broader concerns among European allies about maintaining deterrence against Russia without full American backing.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/07/02/nato-ponders-how-to-defend-eastern-europe-as-america-pulls-back", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "同盟国がアメリカに圧力をかける方法を学ぶ", "title_en": "Allies Learn How to Bully America Over Trade", "summary_ja": "トランプ大統領が強硬な通商政策を進める中、一部の同盟国は経済的な影響力を活用して対抗する手段を模索している。世界最先端の半導体製造を担う台湾は、アメリカからの圧力に抵抗できる独自の立場にある可能性がある。半導体分野における台湾の圧倒的な優位性は、ワシントンとの交渉において稀有な交渉力をもたらしている。", "summary_en": "As Donald Trump pursues aggressive trade policies, some US allies are discovering ways to push back using economic leverage. Taiwan, home to the world's most advanced semiconductor manufacturing, may be uniquely positioned to resist American pressure. The island's dominance in chipmaking gives it rare bargaining power in negotiations with Washington.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/30/allies-learn-how-to-bully-america", "state_media": false, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大学生の学力は思っているより低い", "title_en": "Students are doing worse than you think", "summary_ja": "新たな分析により、大学生の学業成績が広く認識されているよりも大幅に低いことが明らかになった。高等教育機関に通う一部の学生が、10歳児と同程度の学力テスト結果を示している。この調査結果は、教育水準や大学の学位の真の価値について深刻な懸念を提起している。", "summary_en": "A new analysis reveals that academic performance among college and university students is significantly lower than widely assumed. Some students at higher education institutions are testing at levels comparable to ten-year-old children. The findings raise serious concerns about educational standards and the true value of a university degree.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ大統領、独立250周年記念式典を自己賛美の場に―「共産主義者」攻撃も", "title_en": "Trump Turns 250th Independence Day Into Self-Celebration, Attacks 'Communists'", "summary_ja": "ドナルド・トランプ大統領は、熱波と雷雨の影響で1時間以上遅延したアメリカ独立250周年記念式典で、雨の中スピーチを行った。トランプ氏はこの機会を自身の功績を称える場として活用し、政治的反対勢力を「共産主義者」と呼んで攻撃した。同氏は「アメリカは復活した」と宣言したが、式典は混乱した雰囲気の中で進行した。", "summary_en": "President Donald Trump delivered a rain-soaked speech at a chaotic Fourth of July celebration marking 250 years of American independence, delayed over an hour due to a heatwave and thunderstorms. Trump used the occasion largely to glorify himself and attack political opponents he labeled 'communists.' He declared that 'America is back' in remarks that critics noted centered more on his own political narrative than on the nation's founding.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/07/05/250-years-of-american-independence-trump-praises-us-and-attacks-communists-at-chaotic-celebration_6755164_4.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アメリカ独立革命におけるフランスの役割：独立250周年を振り返る", "title_en": "France's Role in the American Revolution: A 250th Anniversary Retrospective", "summary_ja": "7月4日にアメリカが独立250周年を祝う中、アメリカ独立革命におけるフランスの重要な貢献が改めて注目されている。フランスは軍事・財政・外交の各面で支援を提供し、13植民地がイギリスに勝利する上で不可欠な役割を果たした。両国のこの歴史的な連帯は、大西洋を越えた関係の礎として今日も語り継がれている。", "summary_en": "As Americans celebrate the 250th anniversary of their independence on July 4, the significant contributions of France to the American Revolution are being highlighted. France provided crucial military, financial, and diplomatic support that helped the thirteen colonies defeat Britain. The partnership between the two nations remains a foundational chapter in the history of transatlantic relations.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/videos/video/2026/07/04/what-role-did-france-play-in-the-american-revolution_6755152_108.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "フランス、パラグアイに1-0勝利でW杯準々決勝へ進出", "title_en": "France beats Paraguay 1-0, advances to World Cup quarter-finals", "summary_ja": "フランスはパラグアイを1-0で下し、ワールドカップ準々決勝への進出を決めた。決勝点はキリアン・ムバッペがPKを確実に決めたものだった。次戦でフランスはモロッコと準々決勝で対戦する。", "summary_en": "France secured a narrow 1-0 victory over Paraguay to advance to the World Cup quarter-finals. Kylian Mbappé converted a penalty to provide the decisive goal for Les Bleus. France will next face Morocco in the quarter-finals.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/sports/article/2026/07/05/france-beats-paraguay-1-0-advances-to-world-cup-quarter-finals_6755158_9.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "南アフリカで外国人嫌悪がオンラインで拡散した経緯", "title_en": "How Xenophobia Went Viral in South Africa", "summary_ja": "組織的なオンラインキャンペーンが、南アフリカにおける最新の外国人排斥感情の波を煽り、ソーシャルメディア上で反移民的な敵意を拡散させている。このキャンペーンは既存の社会的緊張を増幅させ、国内に住む外国人を標的にしている。アルジャジーラは、この反発を支えるデジタル的な仕組みと現実世界への影響を調査した。", "summary_en": "A coordinated online campaign has been fueling South Africa's latest wave of xenophobic sentiment, spreading anti-immigrant hostility across social media platforms. The campaign has amplified existing tensions, targeting foreign nationals living in the country. Al Jazeera investigates the digital infrastructure behind the backlash and its real-world consequences.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/the-listening-post/2026/7/5/how-xenophobia-went-viral-in-south-africa?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "FIFAワールドカップ ベスト16：ブラジル対ノルウェー、メキシコ対イングランドが激突", "title_en": "FIFA World Cup Round of 16: Brazil vs Norway, Mexico vs England Headline Knockout Stage", "summary_ja": "FIFAワールドカップのベスト16が開幕し、ブラジル対ノルウェー、メキシコ対イングランドなど注目の対戦カードが並んでいる。アルジャジーラはトーナメント表、試合スケジュール、専門家による予想を詳しく伝えている。決勝トーナメントが白熱する中、最新情報に注目が集まっている。", "summary_en": "The FIFA World Cup round of 16 is underway, featuring high-profile matchups including Brazil against Norway and Mexico facing England. Al Jazeera provides the full bracket, schedule, and expert predictions for the knockout stage. Fans can follow the latest news and updates as the tournament heats up.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/7/5/fifa-world-cup-round-of-16-bracket-schedule-predictions-latest-news?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国、地下教会の牧師を数カ月の拘留後に釈放", "title_en": "China Releases Underground Church Pastor Ezra Jin After Months in Detention", "summary_ja": "北京の「シオン教会」創設者である金明日（エズラ・ジン）牧師が、中国で数カ月間拘留された後、米国に到着した。家族が釈放と渡航を確認した。今回の事件は、中国における非公認宗教団体への扱いをめぐる国際的な懸念を改めて浮き彫りにした。", "summary_en": "Ezra Jin, founder of Beijing's Zion Church, has arrived in the United States after being detained in China for several months. His family confirmed his release and safe arrival in the US. The case drew international attention as part of broader concerns over China's treatment of unofficial religious communities.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/5/china-releases-underground-church-pastor-after-months-in-detention?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "新説：最小の人類「フローレス原人」は狩人ではなくトカゲの食べ残しを漁る腐肉食者だった", "title_en": "New Theory: Ancient Tiny Human Was a Scavenger, Not a Hunter", "summary_ja": "これまでの定説に異を唱える新たな研究が、既知の中で最も小さな人類種であるホモ・フローレシエンシスについて発表された。研究者らは、この古代の人類が狩猟ではなく、トカゲなどの動物の食べ残しを漁ることで生き延びていた可能性を示唆している。この発見は、小柄な人類の近縁種における食生活と生存戦略の理解を大きく塗り替えるものだ。", "summary_en": "A new theory challenges previous assumptions about Homo floresiensis, the smallest known human species. Researchers now suggest this ancient hominin survived not by hunting but by scavenging leftover lizard remains. The findings reshape our understanding of the dietary habits and survival strategies of this diminutive human relative.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihgJBVV95cUxQNGNyZ3dDUkc5djF6cDJqMldsbWo3VkcyRFl4S0t1bS13WWtoLVgxUHhIZV9MUXR3NmNyTVlNeGpQZGMwc3dmbGRkZHRkWmNZZ0Y1V2R3Q2FpZUd2dUVlc0RkUF90Ym5OVmJMRVNsWU9mTjkzS25DVWE2UFNyLTdyZTQ0dUZKcU1EUGFnOFFLaUc4TGN5eHdqRDMyTGVaWkcxdURnbzRQUGc0dFhreGRLazBJaERWdlRueEtBS0ZjYXk5bGtDdF9UTzFZelotcVVzSGt2N2VUVURaaXJjSUdfQ1kzTHM1amFxVUprazdIb1RLcmF0endHZzZlVm10UnRCZlFKVm13?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イスラエルの学生は10歳児より学力が低いのか？教育水準低下に警鐘", "title_en": "Are Israeli Students Really Falling Behind 10-Year-Olds in Basic Knowledge?", "summary_ja": "イスラエルの新聞ハアレツが、同国の学生の学力低下に関する厳しい問題提起を行った。一部の学生が10歳児に期待される基礎知識すら習得できていない実態が指摘されている。記事はイスラエルの教育カリキュラムや指導方法の有効性に疑問を呈し、教育制度の見直しを訴えている。", "summary_en": "A Haaretz report raises sharp questions about the academic performance of Israeli students, suggesting some struggle with knowledge expected of children a decade younger. The piece examines potential causes behind declining educational standards in Israel. It calls into question the effectiveness of the current Israeli school curriculum and teaching methods.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi8gFBVV95cUxNUDZvR21EMjh5UF8zbTQ0cV93cEk3QkVwbkloRjk5S3lCakZIZ2FtbUdKRFJjZl93M3FJY2lQQ19KOFYxb3hCcTI0RVJ3TjhOVV9xeEo5ckdMNkQyQ0hFV2hxeHFrQ0VKRUNaOWNGdmZVOTRsdWtxUVM0UXZpYURUbHpNVkZyNVVGRE9nUm50ejBWT2NEekdNMm1yQWdBRk1QWHA1LWdtUGUtb0N1ZHlFVkJFUlpRVWhYZ2N2Z1NTbm1kQjJlUFZ2OVFJaXBXMWo1Yi1BM0Rna3BydXBTd0ZkcUJWSHhQMXZUVDIycWVrdVZpZw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ガザ病院長がイスラエルで拘束、命の危険にさらされていると弁護士が警告", "title_en": "Gaza Hospital Director Jailed in Israel Faces Life-Threatening Danger, Lawyer Warns", "summary_ja": "イスラエルに拘束されているガザの病院長が、命の危険にさらされていると弁護士が訴えている。この事態は、紛争が続く中での医療従事者の扱いに関して深刻な懸念を呼び起こしている。法律代理人は、危険な状況に対処するための緊急介入を求めている。", "summary_en": "The director of a Gaza hospital who is imprisoned in Israel is facing life-threatening conditions, according to his lawyer. The case raises serious concerns about the treatment of detained medical personnel amid the ongoing conflict. Legal representatives are calling for urgent intervention to address the dangerous situation.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihgJBVV95cUxNYkhuUEhhVXVraVRWbzhfc3RjeWVGTWNFZmRfMHlQN0hoYm9xWWJqYjlOR29QR2k3cmROclFxUkNUMkVQeXB3TV9IV0VYV0ZnWG95RnVOM1FrWm14elQyeFFJNDVkSUZEbVBBMmpkam5mUVNFZzdNUWh4S29BdmRuRXFsZjFUWjRUYmdjVjBwbzRKaGo5X3AtcnozdDc2bXlSaDNuR0huUVlEcE9raTVEbVh4TFA1SnJpZjZKN3ZTUTdNTS1WX3Qzb0N3TVJ6cjg4SndOdG5KZ3ZpeDJjOVpfVUhmN1Jma0N2RGVCVnUxRkpQMXVoUEVPRmVBVFFFU3FncHAtODVR?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "シンガポール国防省からのお知らせ", "title_en": "Singapore Mindef Update", "summary_ja": "シンガポール国防省（Mindef）は2026年7月5日付けで通知を発出した。この連絡はストレーツ・タイムズのニュースレタープラットフォームを通じて配信された。提供された抜粋からは、これ以上の具体的な内容は確認できなかった。", "summary_en": "The Singapore Ministry of Defence (Mindef) issued a notice dated July 5, 2026. The communication was distributed via The Straits Times newsletter platform. No further substantive details were available from the excerpt provided.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ・ニュースレター", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "ストレーツ・タイムズは2026年7月5日夜、イブニング・アップデート・ニュースレターを配信した。この briefingはその日の主要ニュースをまとめて購読者にお届けするものである。読者は提供されたリンクから購読管理や追加の無料ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times published its Evening Update newsletter on the evening of July 5, 2026. The briefing compiles key news stories of the day for subscribers. Readers can manage their subscription or sign up for additional free newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニング・ブリーフィングは、その日のトップニュースを読者にお届けする日刊ニュースレターです。今回の配信は2026年7月5日（日曜日）付けとなっています。読者はリンクを通じて購読の管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a daily newsletter digest delivering top news stories to subscribers. This edition is dated Sunday, July 5, 2026. Readers can manage their subscription or sign up for additional free newsletters via the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "スラウェシの古代洞窟壁画、欧州中心の先史時代観に終止符", "title_en": "Sulawesi's Ancient Cave Art Challenges Europe's Monopoly on Prehistoric Creativity", "summary_ja": "インドネシアのスラウェシ島で発見された古代洞窟壁画が、先史時代の人類の創造性に関する従来の認識を塗り替えつつある。芸術的表現の起源はヨーロッパに限られるという長年の定説が覆され、東南アジアでも数万年前に独自の芸術文化が栄えていたことが示された。この発見は、先史時代の芸術と人類の認知進化の研究におけるヨーロッパ中心主義的な見方に根本的な疑問を投げかけている。", "summary_en": "Recent discoveries of ancient cave art in Sulawesi, Indonesia, are reshaping our understanding of prehistoric human creativity. The findings suggest that early artistic expression was not exclusive to Europe, as long assumed, but flourished independently in Southeast Asia thousands of years ago. This challenges the Eurocentric narrative that had long dominated the study of prehistoric art and human cognitive evolution.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMitgFBVV95cUxQdE95UzFpM09BSDdSUV90b0Jxc3BUMHY4azRnRE1DWTZrSVl0QXcxeDJheHFWUFp5WmI4c3UwWU1UWTV1Y2E5czdsTmVxblFvV1V6a1htR2dHUU9VbzB0Q3h1dUlzV09HbkVuaUNGU0JZR2VINmI1RnpKOW1vanhzODBCZEtZWkhVU210SGZmTGw4RkRqUzBhMi1PQl9OVzUweG1mS0xXd3haX0c0VDBCOENEb1NmUQ?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アップル、一部のMac Mini生産をアジアからヒューストンに移管へ", "title_en": "Apple to Shift Some Mac Mini Production to Houston from Asia", "summary_ja": "アップルは、Mac Miniの一部生産をアジアから米国テキサス州ヒューストンに移管する計画を進めている。これは、同社が製造拠点の一部を米国内に回帰させる取り組みの重要な一歩となる。この動きは、地政学的リスクや貿易圧力を背景に、テクノロジー企業がサプライチェーン戦略を見直す広範なトレンドを反映している。", "summary_en": "Apple is planning to move a portion of its Mac Mini production from Asia to Houston, Texas. This marks a significant step in the company's effort to bring some manufacturing back to the United States. The shift reflects broader trends of tech companies reconsidering their supply chain strategies amid geopolitical and trade pressures.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMisAFBVV95cUxQME9DYTF5R2ZRUHg4ZWJPQnEwVUlOZzJLZXQwSFViLXYzZ2lOVjJmVjBFMHAyRmRHLXo3S0NtNUJCRXlLcWJRNG9NTEFpYnhxNTVaOTBWSzNBa1dTVG91ckNnQXRDeVhaZ3lSdE5NMmN5MnJkV1pKUExxTkFRZ096Q3hraTR1NDN2SXVKNGs5RXJaNlpqcmxlMktZdHJ4R1NadGpMUDI4bHNhWDJUTzhrWg?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ユーラシアは待てない：現代のための憲章", "title_en": "Why Eurasia Cannot Wait: A Charter for Our Time", "summary_ja": "ジャカルタ・ポスト紙は、現在の国際情勢においてユーラシアの協力と統治の枠組み構築が急務であると主張する論説を掲載した。この記事は、ユーラシア大陸全体が直面する共通の課題に対応するための憲章の策定を訴えている。こうした枠組みの構築を遅らせることは、地域に重大な地政学的・経済的影響をもたらす可能性があると強調している。", "summary_en": "The Jakarta Post presents an argument for urgent Eurasian cooperation and governance in the current global climate. The piece calls for a defining charter that addresses the shared challenges facing nations across the Eurasian continent. It emphasizes that delays in establishing such a framework could have significant geopolitical and economic consequences for the region.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMinAFBVV95cUxOcm1yckdSalducXB1dXFhdnZDQ3VXdjZZdXc1TXFpYTBLNGwxSkNXN2tXODlxY1REYUhpSDk4TllaenNWTkVDaEs1cXkyeXZYbWJqdXNKbHdpOXZzdHdDNTJUQ0JVaUQzY2JyeURDMFlYX2tCNG5WcWkzOFlkTjhwMnJzREZRMWZoNnBiYzB3eXlVNGxDcXdsU0UzMnk?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "「フムストレイル」で目撃されたイスラエル兵に対し、人権団体がインドで戦争犯罪告訴", "title_en": "Rights Group Files War Crimes Complaint in India Against Israeli Soldier Found on 'Hummus Trail'", "summary_ja": "人権団体がインド当局に対し、イスラエル兵エイタン・ギルボアの戦争犯罪に関する告訴状を提出した。ギルボアは親パレスチナ活動家らによってヒマーチャル・プラデーシュ州のオールドマナリとゴンドラ村で発見された。これらの場所はイスラエル人旅行者に人気の「フムストレイル」沿いの観光地であり、ギルボアは告訴後にインドから逃亡したとされる。", "summary_en": "A human rights organisation has filed a war crimes complaint in India against Israeli soldier Eitan Gilboa, who was traced by pro-Palestinian activists and the Human Rights Foundation in Old Manali and Gondla Village in Himachal Pradesh. These locations are popular stops along the so-called 'Hummus Trail,' a route frequently travelled by Israeli tourists in India. Gilboa has since fled the country following the complaint filed with Indian authorities.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/eitan-gilboa-israeli-soldier-spotted-along-india-hummus-trail/article71185358.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米司法省、アダニ収賄事件を取り下げ―「世界の警察」役割が外交摩擦招くと説明", "title_en": "U.S. DoJ Drops Adani Bribery Case, Cites Risks of Acting as 'World Police'", "summary_ja": "米司法省は、2024年にガウタム・アダニ、サガル・アダニおよび関係者に対して提起した収賄・証券詐欺の訴追を取り下げる方針を示した。司法省は米連邦地裁に提出した説明の中で、米国が「世界の警察」として過度に域外執行を行うことは外交上の摩擦を招く恐れがあると指摘した。アダニ氏はインドを代表する財界人であり、この訴訟は国際的に広く注目を集めていた。", "summary_en": "The U.S. Department of Justice is dropping bribery and securities fraud charges filed in 2024 against Gautam Adani, Sagar Adani, and their associates. In a limited explanation submitted to a U.S. district court, the DoJ warned that aggressive extraterritorial enforcement actions risk causing diplomatic strife. The case had drawn significant international attention given Adani's prominence as one of India's leading business figures.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/business/Industry/us-doj-says-adani-case-should-never-have-been-brought-urges-judge-to-drop-charges-permanently/article71183562.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "チャーリー・カーク殺害容疑者の予備審問が開始", "title_en": "Preliminary Hearing Begins in Case of Man Accused of Killing Charlie Kirk", "summary_ja": "2026年7月6日月曜日より、ユタ州の法廷でタイラー・ロビンソン被告に対する5日間の予備審問が始まる。検察側はチャーリー・カーク氏殺害に関する証拠を提示する予定で、カーク氏の家族が初めて被告と同じ法廷に立ち会う。この審問は注目を集める本裁判に向けた重要な初期段階となる。", "summary_en": "A five-day preliminary hearing is set to begin Monday, July 6, 2026, in Utah, where prosecutors will present their case against Tyler Robinson, accused of killing Charlie Kirk. It marks the first time members of Kirk's family will be present in the courtroom alongside the defendant. The hearing represents a significant early step in the legal proceedings surrounding the high-profile case.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/prosecutors-to-lay-out-their-case-against-the-man-accused-of-killing-charlie-kirk/article71185187.ece", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "インドネシア人介護士が弁当店でも「二重労働」、権利侵害の懸念高まる", "title_en": "Indonesian Caregiver's 'Double Duties' at Lunchbox Shop Spark Rights Concerns", "summary_ja": "台湾で働くインドネシア人介護士が、契約上の介護業務に加えて弁当店での労働も強いられていたことが明らかになり、労働権侵害への懸念が高まっている。このケースは、雇用主から不正な業務を強要されやすい移民介護労働者の脆弱な立場を浮き彫りにしている。支援団体は、外国人介護士を搾取から守る規制の強化と徹底した取り締まりを求めている。", "summary_en": "An Indonesian caregiver in Taiwan has been found performing additional work duties at a lunchbox shop beyond her contracted caregiving role, raising serious labor rights concerns. The case highlights the vulnerability of migrant care workers who may be coerced into unauthorized work by employers. Advocacy groups are calling for stronger enforcement of regulations protecting foreign caregivers from exploitation.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE1TTWhXZ04zRktQdk1LWHBaOExWOTdZcG5ZN3M0TVdGMDRibkJtYnptaUJVeUFOd2R6ZXczU0pvTVhSNWNtU2YzMEx3UkRjbVJZekJHdjNB?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "香港の反体制活動家・林栄基氏が台北で70歳で死去", "title_en": "Hong Kong Dissident Lam Wing-kee Dies at 70 in Taipei", "summary_ja": "香港の著名な反体制活動家で書店主の林栄基氏が、台湾の台北市で70歳で死去した。同氏は2015年に中国本土当局に拘束された香港書店主5人の一人として知られ、釈放後は北京を強く批判し続けた。林氏は2019年から台湾に移住し、香港の自由と民主主義のために活動を続けていた。", "summary_en": "Lam Wing-kee, a prominent Hong Kong dissident and bookseller known for defying Chinese authorities, has died at the age of 70 in Taipei, Taiwan. He was one of the five Hong Kong booksellers who were detained by mainland Chinese authorities in 2015 and later became a vocal critic of Beijing after his release. Lam had been living in Taiwan since 2019, where he continued to advocate for Hong Kong's freedoms and democracy.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE91ekNvRWVlNElqaHE1ckdsT0VZS2JLNDd3TGYzUHZfZURiV2ltOXBTQWxsSklTNlpNQzJURkM0TGM3SkRFOEZhRl9TX3R0cm5Id3oxRTBlcw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台湾と中国、両岸経済依存度をめぐり対立", "title_en": "Taiwan and China Clash Over Cross-Strait Economic Dependence", "summary_ja": "台湾と中国は、両岸間の経済的依存度をめぐって対立を深めている。この争いは、台湾海峡を挟んだ貿易・金融関係に関する緊張を反映している。両政府は経済関係の性質とその影響について異なる見解を持っているとみられる。", "summary_en": "Taiwan and China have entered into a dispute over the degree of economic dependence between the two sides. The disagreement reflects ongoing tensions regarding trade and financial ties across the Taiwan Strait. Both governments appear to hold differing views on the nature and implications of their economic relationship.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE9QWXlxOHZiVUhIbDBrVnZYc3hTblgxRlZJcTlLSVNQaktiRE1Fd0xCQ29kVWVweXFMMnNKajZjclJXUFBBOWxnbXlGb3VBd3d1UVZtU3h1aw?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震：ブラジル在住男性、瓦礫に埋まった父の捜索支援を呼びかけ", "title_en": "Brazilian-Based Venezuelan's Family Seeks Help to Find Father Buried in Earthquake Rubble", "summary_ja": "ブラジルに約20年間在住するベネズエラ人のフェリックス・トバル氏（70歳）の家族が、地震発生時に同氏がいたラ・グアイラ州プラヤ・グランデのパン屋「ラ・アルメンドリーナ」の瓦礫を掘り起こすため、ボランティア向けの道具の寄付を募っている。トバル氏はブラジルと母国ベネズエラを行き来しながら生活していた。家族は救助活動を調整しながら、瓦礫の中からの発見を待ち続けている。", "summary_en": "The family of 70-year-old Félix Tovar, a Venezuelan who has lived in Brazil for nearly 20 years, is collecting donations of tools to aid volunteers searching for him in the rubble of La Almendrina Bakery in Playa Grande, La Guaira. Tovar was inside the bakery when earthquakes struck Venezuela. The family is coordinating rescue efforts as volunteers attempt to dig through the debris to find him.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/brazilian-mobilizes-help-to-find-father-buried-under-rubble-in-venezuela.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ、米国送還者が死亡した被災地へのアクセスを遮断", "title_en": "Venezuela Blocks Access to Site Where U.S. Deportees Died in Earthquake", "summary_ja": "ベネズエラ政府は、先週発生した地震で壊滅的な被害を受けた沿岸地域ラ・グアイラへのアクセスを遮断した。同地域では米国から強制送還された移民も死亡したとされている。47歳のジェイソン・ラムスは、行方不明の弟を探して国境州タチラからラ・グアイラまでベネズエラ全土を横断した。この災害は、米国のベネズエラへの強制送還をめぐる国際的な懸念が高まる中で注目を集めている。", "summary_en": "Venezuela has blocked access to La Guaira, the coastal region devastated by last week's earthquakes, where a number of U.S. deportees perished. Yeison Lamus, 47, traveled across the country from the border state of Táchira to La Guaira in a desperate search for his missing brother. The disaster has drawn international attention amid ongoing concerns over U.S. deportation flights to Venezuela.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/venezuela-blocks-access-to-site-where-us-deportees-died.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "地震が追い打ち、ベネズエラの移住危機がさらに深刻化", "title_en": "Venezuela's Migration Crisis Worsens as Earthquakes Displace Thousands More", "summary_ja": "少なくとも10年間続くベネズエラの強制移住危機が、約1週間前に発生した地震によって新たな局面を迎えている。この地震により、すでに国外へ脱出していた数百万人に加え、国内避難民も急増している。重なる危機は、深刻な人道的問題を抱えるベネズエラにさらなる負担をもたらしている。", "summary_en": "Venezuela's decade-long forced migration crisis has entered a new phase following earthquakes that struck the country nearly a week ago. The disasters have created a growing wave of internally displaced people on top of the millions who had already fled the nation. The compounding crises are putting additional strain on a country already struggling with severe humanitarian challenges.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/venezuelas-longstanding-migration-crisis-deepens-after-earthquakes.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "オンド州学校事件から学ぶ：ナイジェリアにおける青少年の行動問題を考える", "title_en": "Lessons from the Ondo School Incident: Addressing Youth Behavior in Nigeria", "summary_ja": "ブコラデレミ・ラディグボルによるコラムは、ナイジェリアのオンド州で起きた学校での事件を受け、社会全体に自省を促している。著者は、怒りや批判に終始するのではなく、家庭・学校・社会が一体となって子どもたちの育成に責任を持つべきだと主張する。若者の未来は教室での教育だけでなく、家庭や社会で示される価値観によっても形成されると訴えている。", "summary_en": "A commentary by Bukoladeremi Ladigbolu reflects on a school incident in Ondo State, Nigeria, urging society to move beyond outrage toward meaningful reflection. The author argues that shaping young people's behavior requires responsibility from homes, schools, and broader society alike. The piece emphasizes that the future depends not only on formal education but also on the values modeled and reinforced in everyday life.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/opinion/893042-curbing-youthful-exuberance-lessons-from-the-ondo-school-incident-by-bukoladeremi-ladigbolu.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ナイジェリア・ニジェール州の地方自治体、暴力激化で夜間外出禁止令を発令", "title_en": "Curfew Imposed After Mob Targets Herders at Hospital in Niger State LGA", "summary_ja": "ニジェール州の地方自治体において暴力が激化し、当局は夜間外出禁止令を発令した。群衆がカガラ総合病院に乱入し、入院中の牧畜民に報復攻撃を加えようとする事態が発生した。当局は更なる流血を防ぐため、迅速に対応を迫られた。", "summary_en": "Local authorities have imposed a curfew in a Niger State local government area following escalating violence between communities. A mob attempted to storm Kagara General Hospital to carry out a retaliatory attack on herders who were receiving medical treatment there. The tense standoff prompted officials to act swiftly to prevent further bloodshed.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/893046-curfew-imposed-as-fighting-escalates-in-niger-lga.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ナイジェリア政府、2023年以降に保健医療従事者3万7000人を採用", "title_en": "Nigeria Recruits 37,000 Health Workers Since 2023, Official Says", "summary_ja": "ナイジェリア連邦政府は2023年以降、3万7000人の保健医療従事者を採用したと当局者が発表した。また、改訂版の基礎医療提供基金（BHCPF 2.0）の下での進展も強調され、同基金は全国の一次医療サービス向上の主要な推進力と位置づけられている。", "summary_en": "The Nigerian federal government has recruited 37,000 health workers since 2023, according to an official statement. Progress was also highlighted under the revised Basic Health Care Provision Fund (BHCPF 2.0), which is credited as a key driver of improved primary healthcare delivery across the country.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/health/health-news/893038-fg-has-recruited-37000-health-workers-since-2023-official.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "午前3時から現場取材：ハメネイ師の葬儀を報道", "title_en": "On the Ground from 3 A.M.: Reporting from Khamenei's Funeral", "summary_ja": "新華社・CGTNによると、記者たちは午前3時から現場に入り、イランの最高指導者アリー・ハメネイ師の葬儀を取材したと伝えている。国営メディアの報道では、葬儀には大勢の追悼者が集まったとされている。新華社・CGTNは、今回の葬儀が広範な現地メディア報道を伴う重要な国家行事であったと報じている。", "summary_en": "Xinhua/CGTN reports that journalists were on the ground from 3 A.M. to cover the funeral of Iran's Supreme Leader Ali Khamenei. State media reports that the event drew massive crowds of mourners gathering to pay their respects. Xinhua/CGTN reports that the funeral was a significant state occasion with extensive on-site media coverage.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-04/On-the-Ground-from-3-A-M-Reporting-from-Khamenei-s-Funeral-1OvDFOkrxwk/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震から1週間以上、救助隊が瓦礫の中で捜索続ける", "title_en": "Rescuers Search Rubble Over a Week After Venezuela Earthquakes", "summary_ja": "中国国営メディアの新華社・CGTNは、ベネズエラを襲った大地震から1週間以上が経過した現在も、ラ・グアイラの瓦礫の中で救助隊と家族が行方不明者の捜索を続けていると伝えている。同メディアの報道によれば、長期間が経過した後も懸命な捜索活動が続けられているという。最新の死傷者数や生存者に関する詳細は報告されていない。", "summary_en": "Xinhua/CGTN reports that rescue teams and family members are continuing efforts to find survivors in the rubble of La Guaira, Venezuela, more than a week after devastating earthquakes struck the region. The state-controlled outlet reports that the search remains ongoing despite the extended time elapsed since the disaster. No updated casualty figures or survivor details were provided in the report.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://newsus.cgtn.com/news/2026-07-03/Rescuers-search-rubble-more-than-a-week-after-Venezuela-earthquakes--1OsJWDND2Cc/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "外国メディア、習近平・中国共産党創立記念演説に見解示す", "title_en": "Foreign Media React to Xi Jinping's Speech Marking CPC Anniversary", "summary_ja": "新華社・CGTNによると、習近平国家主席が中国共産党創立記念日に行った演説に対し、複数の外国メディアが見解を示したと伝えている。国営メディアは、国際的な報道が演説の主要テーマに注目したと報じているが、取り上げられた外国の反応の選定や構成は北京の編集方針を反映している可能性がある。今回の情報源が国家管理下のメディアであることから、報じられた外国の見解が包括的・独立的な評価であるかどうかには注意が必要だ。", "summary_en": "Xinhua/CGTN reports that foreign media outlets shared commentary on Xi Jinping's speech delivered for the Chinese Communist Party's anniversary. State media reports that international coverage highlighted key themes from the address, though the framing and selection of foreign reactions reflect Beijing's editorial perspective. The sourcing from state-controlled outlets warrants caution in treating the reported foreign views as a comprehensive or independent assessment.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-02/Foreign-media-share-views-on-Xi-Jinping-s-speech-for-CPC-anniversary-1OrVmJjUP2E/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア軍、チェルニヒウ州のガス配給施設を攻撃と主張", "title_en": "Russian Forces Claim Strike on Gas Distribution Station in Chernihiv Region", "summary_ja": "ロシア国営メディアTASS/RTは、ロシア軍がウクライナのチェルニヒウ州にあるガス配給施設を破壊したと報じている。同メディアによれば、攻撃はゲラン2シーカードローンを使用して行われたとされる。この情報はロシア国家管理下のメディアによるものであり、独立した検証は行われていない。", "summary_en": "Russian state media TASS/RT reports that Russian forces destroyed a gas distribution station in Ukraine's Chernihiv Region. The outlet claims the attack on the Hazoprovidne facility was carried out using a Geran-2 Seeker drone. This report originates from state-controlled media and has not been independently verified.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/defense/2155835", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア軍、チェルニヒウ州でウクライナ軍の貨物列車を破壊と主張", "title_en": "Russia Claims Destruction of Ukrainian Army Cargo Train in Chernigov Region", "summary_ja": "ロシア国営メディアTASS/RTは、ロシア軍がチェルニヒウ州でウクライナ軍の貨物列車を破壊したと報じている。ロシア国防省によると、この攻撃はゲラン2シーカー無人航空機を使用して実施されたという。これらの主張は国営メディアによるものであり、独立した機関による検証は行われていない。", "summary_en": "Russian state media TASS/RT reports that Russian forces destroyed a Ukrainian army cargo train in the Chernigov Region. The Russian Ministry of Defense claims the attack was carried out using a Geran-2 Seeker unmanned aerial vehicle. As state-controlled media, these claims have not been independently verified.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/defense/2155833", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コンゴ民主共和国のエボラ死者数が490人超に", "title_en": "Ebola Death Toll in DR Congo Surpasses 490, Authorities Report", "summary_ja": "タス通信・RTによると、コンゴ民主共和国当局はエボラ出血熱による死者数が490人を超えたと報告しているという。同メディアは、過去1日だけで26件の新たな症例が集計に加えられたと伝えており、感染拡大が続いている可能性を示している。当局はウイルスの封じ込めに向けた対応を急いでいる。", "summary_en": "TASS/RT reports that the Ebola death toll in the Democratic Republic of Congo has exceeded 490, according to local authorities. State media reports that 26 new cases were added to the tally within a single day, suggesting the outbreak continues to accelerate. The situation remains a serious public health concern as officials work to contain the spread of the virus.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2155831", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "今日の巨大テクノロジー株は本当に安全か？", "title_en": "How Safe Are Today's Blockbuster Tech Stocks?", "summary_ja": "著者は、現在の大型テクノロジー株や大規模IPOに潜むリスクを、過去の技術革新ブームと崩壊の歴史的類似例を用いて検証する。特に警戒すべき事例として、1987年のNTT（日本電信電話）のIPO後に起きた出来事との類似が挙げられている。AIや宇宙旅行などの革新的技術への投資家に対し、歴史が冷静な教訓を提供していると論じる。", "summary_en": "The author examines the risks surrounding today's major technology stocks and mega-IPOs by drawing historical analogies to past technological booms and busts. A particularly cautionary parallel is drawn to the aftermath of Nippon Telegraph and Telephone's 1987 IPO. The piece suggests that while no analogy is perfect, history offers sobering lessons for investors in AI and other radical new technologies.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/japan-ntt-ipo-sobering-analogy-for-tech-stocks-today-by-barry-eichengreen-2026-07", "state_media": false, "category": "オピニオン", "full_text": "How Safe Are Today’s Blockbuster Tech Stocks?\nToday’s wave of mega-IPOs has unleashed a wave of analogies to past booms. While no analogy is perfect, an especially apposite—and sobering—case may be what followed Nippon Telegraph and Telephone’s IPO in February 1987.\nDARTMOUTH, UK—Questions about the financial implications of radical new technologies—AI, space travel, and their associated infrastructures, to pick a few—have led to a veritable analogy-fest. Is this a replay of the railway boom of the 1870s, which came to grief in the 1880s? A repeat of the electrification boom of the 1890s, which unfolded smoothly but took three decades to play out?", "translation_ja": "今日の巨大テクノロジー株は本当に安全か？\n\nAI、宇宙旅行、そしてそれらに関連するインフラといった急進的な新技術の金融的影響をめぐる問いは、まさに類似例の祭典とも言える状況を生み出している。これは1870年代の鉄道ブームの再来なのか――そのブームは1880年代に破綻した。あるいは1890年代の電化ブームの繰り返しなのか――そちらは順調に進展したものの、展開するまでに30年を要した。\n\n今日の大型IPOの波は、過去のブームへの類似論の波を解き放った。いかなる類似も完璧ではないが、特に適切であり、かつ冷静にさせられる事例は、1987年2月の日本電信電話（NTT）のIPOの後に何が起きたかというものかもしれない。\n\n英国・ダートマス発――急進的な新技術――AI、宇宙旅行、そしてそれらに関連するインフラを例として挙げるならば――の金融的影響をめぐる問いは、まさに類似例の祭典とも言える状況を生み出している。これは1870年代の鉄道ブームの再来なのか、そのブームは1880年代に破綻した。あるいは1890年代の電化ブームの繰り返しなのか、そちらは順調に展開したが結実するまでに30年を要した。", "vocab": [{"word": "mega-IPO", "definition": "超大型の新規株式公開のこと。IPOはInitial Public Offeringの略で、企業が初めて株式を一般に公開・上場すること。「mega」は規模の巨大さを強調する接頭語。"}, {"word": "apposite", "definition": "「非常に適切な、ぴったり当てはまる」という意味の形式ばった形容詞。特定の状況や議論に対して例や表現が的確に合致していることを示す際に用いられる。"}, {"word": "sobering", "definition": "「冷静にさせる、真剣に考えさせる」という意味。浮かれた気分や楽観的な見通しを現実的・慎重な思考へと引き戻す効果を持つ情報や出来事を形容する際に使われる。"}, {"word": "analogy-fest", "definition": "「類似例の祭典・乱発」を意味する造語的表現。ある現象を説明するために多くの人々が競うように歴史的類似例を持ち出す状況を皮肉を込めて表したイディオム的複合語。"}, {"word": "came to grief", "definition": "「失敗に終わる、破綻する」という意味のイディオム。計画や取り組みが深刻な問題や崩壊に至ることを表し、特に経済・金融の文脈で用いられることが多い。"}, {"word": "infrastructure", "definition": "「インフラ、基盤設備」を意味し、経済活動や社会機能を支える基本的な施設・システム（通信網、電力網、交通網など）の総称。テクノロジー分野ではデータセンターやネットワーク設備を指すこともある。"}]}, {"title_ja": "ヨーロッパのAI「ドルチェ・ヴィータ」？余暇重視文化が意外な強みになるか", "title_en": "Europe's AI Dolce Vita? Leisure Culture May Be a Surprising Advantage", "summary_ja": "筆者は、ヨーロッパがAI競争において分断された資本市場・高エネルギーコスト・高齢化する福祉国家・低成長など多くの構造的不利を抱える一方、労働よりも余暇を重視する文化的特性が逆説的な強みになり得ると主張する。AI主導の豊かさの時代において、生活の質を重んじるヨーロッパのモデルは、人間の労働が減少する社会のあり方を示す先駆的な例となる可能性がある。一見弱点に見えるものが最終的に優位性となるという逆張りの視点が示されている。", "summary_en": "The author argues that while Europe faces significant structural disadvantages in the AI race—including fragmented capital markets, high energy costs, aging welfare states, and slow growth—its cultural emphasis on leisure over work may paradoxically become a strength. In an era of AI-driven abundance, Europe's model of valuing quality of life could position it as a leading example of how societies can thrive with less human labor. The piece presents a contrarian view that what looks like weakness may ultimately prove to be an advantage.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/ai-could-give-europe-unexpected-competitive-edge-by-kenneth-rogoff-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Europe’s AI Dolce Vita?\nGlacial growth, aging welfare states, and a shortage of centrist leaders suggest Europe faces a major debt crisis in the years ahead. But its emphasis on leisure over work could become a decisive advantage, positioning the continent as the leading model for thriving in an age of AI-driven abundance.\nPARIS—In many respects, the European Union appears likely to become one of the AI revolution’s biggest losers, with China and the United States leaving its economies in the dust. Even if European energy policies were not already making a massive data-center buildout prohibitively expensive, its fragmented capital markets would make raising the necessary financing extraordinarily difficult.", "translation_ja": "ヨーロッパのAI「ドルチェ・ヴィータ」？\n\nヨーロッパ連合（EU）は、多くの点においてAI革命の最大の敗者の一つとなる可能性が高く、中国とアメリカがその経済を大きく引き離すだろう。ヨーロッパのエネルギー政策がすでに大規模なデータセンター建設を法外なコストにしていなかったとしても、分断された資本市場が必要な資金調達を極めて困難なものにしているだろう。\n\n緩慢な成長、高齢化する福祉国家、そして中道派リーダーの不足は、ヨーロッパが今後数年間に深刻な債務危機に直面することを示唆している。しかし、労働よりも余暇を重視するその姿勢は、決定的な優位性となり得る。AIが駆動する豊かさの時代において繁栄するための先駆的モデルとして、この大陸を位置づける可能性があるのだ。\n\n【パリ発】多くの点で、EUはAI革命の最大の敗者の一つとなりそうであり、中国と米国がその経済を大きく追い越していくだろう。ヨーロッパのエネルギー政策がすでに大規模なデータセンターの建設を法外なほど高価なものにしていなかったとしても、分断された資本市場が必要な資金調達を著しく困難にしているだろう。", "vocab": [{"word": "glacial", "definition": "「氷河のような」という意味で、比喩的に「非常に遅い・緩慢な」ことを表す。'glacial growth'（極めて緩慢な成長）のように経済や進行の遅さを強調する際に使われる上級表現。"}, {"word": "fragmented", "definition": "「断片化した・分断された」という意味。統一されずバラバラな状態を指し、'fragmented capital markets'（分断された資本市場）のように金融・政策分野で頻出する。"}, {"word": "prohibitively", "definition": "「法外に・ほぼ不可能なほど」という意味の副詞。'prohibitively expensive'（法外に高価で現実的でない）のように、コストや障壁が実質的に参入を妨げるほど高い場合に使われる。"}, {"word": "dolce vita", "definition": "イタリア語由来の表現で「甘い生活・優雅な暮らし」を意味する。享楽的・悠々自適なライフスタイルを指す文化的・文学的な慣用句として英語でも使われる。"}, {"word": "centrist", "definition": "「中道派の」という意味の形容詞・名詞。政治的に極端に左右に偏らず穏健な立場をとる人物や政党を指し、政治分析の文脈で頻出する語。"}, {"word": "buildout", "definition": "「大規模な整備・構築・拡張」を意味するビジネス・技術用語。インフラや施設を大規模に新設・拡充する過程を指し、'data-center buildout'（データセンターの大規模整備）のように使われる。"}]}, {"title_ja": "プーチンのエスカレーションリスク", "title_en": "The Putin Escalation Risk", "summary_ja": "筆者は、ウクライナによるクリミアやロシア本土への攻撃、経済的圧迫、前線での苦戦により、プーチンがますます追い詰められていると論じる。こうした窮地が、プーチンを対西側諸国に向けた劇的なエスカレーションへと駆り立てるリスクを高めている。圧力が積み重なるほど、局面を一変させる危険な行動への誘惑が強まると警告する。", "summary_en": "The author argues that Putin, facing mounting pressure from Ukrainian strikes on Crimea and Russian territory, economic strain, and frontline setbacks, is increasingly cornered. This predicament raises the risk that Putin may attempt a dramatic, game-changing escalation against the West to escape his situation. The piece warns that the more pressure accumulates, the stronger Putin's temptation to make a dangerous, destabilizing move becomes.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/putin-escalation-risk-failing-ukraine-war-could-lead-to-rash-behavior-by-ian-bremmer-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Putin Escalation Risk\n                        If Ukraine can continue to disrupt Crimea, strike more targets in the heart of Russia, frustrate Russia’s frontline forces, and pile more pressure on Russia’s hobbled economy, President Vladimir Putin will feel increasingly cornered. The temptation to escape his predicament through a game-changing attack will grow stronger.\n                    \n                        NEW YORK—With Russia under pressure on multiple fronts, President Vladimir Putin finds himself in a tighter spot than at any other moment of his quarter-century in power. Putin remains firmly in charge of the Kremlin, but there is a growing risk that he will try to escape his current predicament by escalating his conflict with the West.\n        https://prosyn.org/sEAQlcI", "translation_ja": "プーチンのエスカレーションリスク\n\nウクライナがクリミアへの妨害活動を続け、ロシア中枢部のより多くの標的を攻撃し、前線でのロシア軍を翻弄し、疲弊したロシア経済にさらなる圧力をかけることができれば、ウラジーミル・プーチン大統領はますます追い詰められた状況に置かれることになる。局面を一変させる攻撃によってこの窮地を脱しようとする誘惑は、さらに強まっていくだろう。\n\nニューヨーク発――複数の戦線で圧力にさらされるロシアの下、ウラジーミル・プーチン大統領は四半世紀に及ぶ権力の座において、これまでにない苦境に立たされている。プーチンはクレムリンの支配権を依然として確固として握っているが、現在の窮地を脱するために対西側との紛争をエスカレートさせようとするリスクが高まりつつある。", "vocab": [{"word": "predicament", "definition": "苦境、窮地を意味する名詞。解決が難しい困難な状況に陥っていることを指す。例：「escape his predicament（窮地を脱する）」のように使われる。"}, {"word": "escalating", "definition": "「段階的に拡大・激化させる」という意味の動詞escalateの現在分詞形。紛争や緊張が徐々に高まる文脈でよく使われるフォーマルな表現。"}, {"word": "hobbled", "definition": "「足かせをはめられた、機能を著しく制限された」という意味の形容詞的用法。ここでは経済が深刻なダメージを受けて弱体化している状態を表す。"}, {"word": "frustrate", "definition": "「妨げる、挫折させる」という意味の動詞。ここでは敵の軍事行動や計画を阻止・翻弄するという文脈で使われている。"}, {"word": "game-changing", "definition": "「局面を一変させる、ゲームチェンジャーとなる」という複合形容詞。状況や競争の流れを根本的に変えるほどの重大な影響を持つことを指す慣用的表現。"}, {"word": "cornered", "definition": "「追い詰められた」という意味の形容詞。逃げ場のない状況に置かれ、危険な選択を迫られている状態を比喩的に表す。"}]}, {"title_ja": "250年前のように、アメリカ人は新たな独裁者から独立を宣言しなければならない", "title_en": "Americans Must Declare Independence From a New Tyrant, as They Did 250 Years Ago", "summary_ja": "オピニオン寄稿者クレア・フィンケルスタインは、独立宣言がジョージ三世に対して列挙した不満—特に市民生活の軍事化と司法への攻撃—が、今日のトランプ政権の行動と驚くほど類似していると主張する。彼女は、連邦軍の展開、国防総省弁護士への圧力、そして反乱鎮圧法の潜在的な発動を、植民地時代の英国の越権行為と重ね合わせる。フィンケルスタインはこうした動きが民主主義と法の支配への脅威であると警告し、アメリカ人は先人がしたように「新たな専制」に抵抗する必要があるかもしれないと示唆する。", "summary_en": "Opinion writer Claire Finkelstein argues that the grievances listed in the Declaration of Independence against King George III—particularly the militarization of civilian life and attacks on the judiciary—mirror actions taken by the Trump administration today. She draws parallels between British colonial overreach and Trump's deployment of federal troops, pressure on Pentagon lawyers, and potential use of the Insurrection Act. Finkelstein warns that these developments represent a threat to democracy and the rule of law, suggesting Americans may need to resist this 'new tyranny' as their forebears did.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/05/declaration-of-independence-trump", "state_media": false, "category": "オピニオン", "full_text": "As the United States marks the 250th anniversary of the Declaration of Independence, marking the official birth of the new nation, it is worth remembering some of the reasons the document offers as just cause for making war on the British monarchy.\n“No taxation without representation” is the slogan that is best known as the core complaint of the colonists, a reference to the colonists’ objections to the 1765 Stamp Act and a series of taxes levied by the British crown thereafter over which Americans had no means of objecting in parliament. But such taxes were not the only provocation to war.\nAnother significant objection to the crown’s control over the colonies was its insertion of military troops into civilian life. The Declaration details the fact that King George had sent British officers to harass the people; that he had kept standing armies among the people during peacetime without the consent of colonial legislatures; that he had attempted to place the military in control of civilian governments; that he had forced civilians to house British officers (“quartering”) in their own homes; that he had forced Americans taken prisoner to take up arms against their own countrymen; and finally that he had provoked domestic insurrections among the people and even incited Native Americans against the colonists.\nThis list of complaints is striking in light of events of the present day. Substitute ICE and Customs and Border Protection (CBP) for the British officers sent to harass the people; substitute federalization and deployment of the national guard and the marines to US cities in 2025 for keeping standing armies; substitute using federal troops over the objections of Democratic governors; and substitute portraying protests in Portland in 2020 and Minnesota in 2026 as violent civil unrest warranting federal force, and the pictures are dismayingly similar.\nGiven the oath members of the US military swear to defend the constitution upon enlistment, and their general adherence to that oath, the campaign critics say presses federal troops into service against political opposition and weakens checks and balances has not been entirely smooth sailing for Donald Trump.\nIt has required the removal of top Pentagon lawyers and internal pressure against those who voice objections to the Department of Defense’s policies. Slowly but surely, this pressure campaign has been working to undermine integrity in the services and encourage or compel compliance with legally questionable policies, such as the strikes on drug boats in the Caribbean and eastern Pacific.\nUltimately, current expansive interpretations of commander-in-chief authority increase the likelihood of military compliance with presidential directives, even in domestic deployments where such compliance might be least expected.\nUsing the military to undermine traditional civilian modes of governance, the signatories to the Declaration remind us, is one of the preferred tools of dictators. If the military can be brought along, the president’s ability to eliminate other checks and balances is greatly facilitated. This is also the path to undermining the rule of law.\nThe signatories to the Declaration also point to King George’s attack on another branch of government, namely the judiciary. Among other things, courts have the power to issue rulings that rein in the military, and thus controlling the judges is a critical part of the effort to concentrate the power of the executive.\nSurprisingly, the US supreme court did not come through for Trump in its December decision regarding federalization of the Illinois national guard. Much to Trump’s dismay, the court found that the administration violated the law in deploying the state’s guard troops in Chicago to control civil unrest, exceeding its authority under 10 USC §12406, the statute used to deploy federal troops.\nTrump v Illinois was likely only a temporary setback for the administration, given the other options at its disposal for domestic deployments. In particular, Trump could invoke the Insurrection Act, an amalgam of statutes of longstanding concern to civil rights groups who have warned it may be an unassailable assertion of presidential might.\nOthers, the present author included, take a more tempered view of its authority, but it is generally agreed to be more supportive of a president’s ability to federalize and deploy troops over the objections of state governors than any other source of law.\nWhy Trump stopped short of using the Insurrection Act after the Illinois ruling is anybody’s guess. One danger is that he could be saving it for a break-glass moment when there is an urgent need to influence politics, such as midterms. His threats to make use of it are surely to be taken seriously.\nPreparing for military involvement in the midterms\nThe idea that a president might use federal troops to influence domestic elections may seem far-fetched, but it is not. When Trump lost the 2020 election, he entertained a plan, a", "translation_ja": "アメリカが独立宣言250周年を迎えるにあたり、この文書が英国君主制に対する正当な開戦理由として挙げたいくつかの理由を振り返ることは意義深い。\n\n「代表なくして課税なし」というスローガンは、植民地住民の中心的な不満として最もよく知られており、1765年の印紙法とその後に英国王室が課した一連の税金——アメリカ人が議会で異議を唱える手段を持たなかった税金——に対する植民地住民の異議申し立てを指している。しかし、そうした税金だけが開戦の引き金ではなかった。\n\n王室による植民地支配に対するもう一つの重大な異議は、軍隊を市民生活に介入させたことだった。独立宣言は、ジョージ王が人民を嫌がらせするために英国将校を送り込んだこと、植民地議会の同意なしに平和時においても常備軍を人々の間に駐留させたこと、軍を市民政府の支配下に置こうとしたこと、市民に英国将校を自宅に強制的に宿泊させた（「強制宿営」）こと、捕虜にしたアメリカ人を同胞に銃を向けさせるよう強制したこと、そして最後に、人民の間に国内反乱を煽り、ネイティブ・アメリカンをさえ植民地住民に対して扇動したことを詳述している。\n\nこの不満リストは、現在の出来事に照らし合わせてみると、驚くほど示唆に富んでいる。人民を嫌がらせするために送り込まれた英国将校の代わりに移民・関税執行局（ICE）と税関・国境警備局（CBP）を当てはめてみよう。常備軍の駐留の代わりに、2025年の米国都市への州兵と海兵隊の連邦動員を当てはめてみよう。民主党知事の反対を押し切って連邦軍を使用したことを当てはめ、2020年のポートランドや2026年のミネソタにおける抗議活動を連邦軍力を正当化する暴力的な市民的混乱として描写したことを当てはめてみると、その絵は暗澹たるほど似通っている。\n\n入隊時に憲法を守ると宣誓した米軍将兵たちと、その宣誓への全般的な遵守を考えると、批評家たちが言うところの——連邦軍を政治的反対勢力に対して動員し、抑制と均衡を弱めようとする——キャンペーンは、ドナルド・トランプにとって必ずしも順調には進んでいない。\n\nそれは、国防総省のトップ弁護士たちの更迭と、国防省の政策への異議を唱える者への内部圧力を必要としてきた。徐々にではあるが、この圧力キャンペーンは軍の誠実さを損ない、カリブ海と東太平洋での麻薬密輸船への攻撃のような法的に疑わしい政策への服従を奨励または強制する形で機能し始めている。\n\n最終的には、現在の拡大解釈された最高司令官権限により、軍は大統領の指令に従う可能性が高まっており、こうした服従が最も期待されにくい国内展開においてさえもそれは当てはまる。\n\n軍を使って伝統的な文民統治形態を弱体化させることは、独立宣言の署名者たちが思い起こさせてくれるように、独裁者たちが好んで使う手段の一つだ。もし軍を従わせることができれば、大統領が他の抑制と均衡を排除する能力は大幅に向上する。これはまた、法の支配を損なう道でもある。\n\n独立宣言の署名者たちはまた、ジョージ王がもう一つの政府機関、すなわち司法府を攻撃したことも指摘している。とりわけ、裁判所には軍を抑制する判決を下す権限があるため、裁判官を支配することは行政権力を集中させる取り組みの重要な一部となっている。\n\n驚くべきことに、連邦最高裁判所はイリノイ州兵の連邦化に関する12月の判決でトランプに味方しなかった。トランプの落胆をよそに、裁判所は、シカゴで市民的混乱を抑制するためにイリノイ州の州兵を展開したことが、連邦軍展開に使用された法律である連邦法典第10編第12406条に基づく権限を逸脱し、違法であると判断した。\n\nトランプ対イリノイ州訴訟は、国内展開に利用できる他の選択肢を考えると、政権にとっておそらく一時的な後退に過ぎないだろう。特に、トランプは反乱鎮圧法を発動することができる。これは、大統領権力の攻撃できない行使になり得ると警告してきた公民権団体が長年懸念してきた複数の法律の集合体だ。\n\n本稿の著者を含む他の論者は、その権限についてより節度ある見方をしているが、州知事の反対を押し切って連邦軍を動員・展開する大統領の能力を他のいかなる法源よりも支持するものであることは、一般的に認められている。\n\nなぜトランプがイリノイ州判決の後に反乱鎮圧法の使用を控えたのかは、誰にも分からない。一つの危険性は、中間選挙など政治に影響を与える緊急の必要性が生じた際の「非常手段」として温存している可能性があることだ。これを利用するという脅しは、確実に真剣に受け止めるべきだ。\n\n中間選挙への軍事介入に向けた準備\n\n大統領が連邦軍を使って国内選挙に影響を与えるかもしれないという考えは、突飛に思えるかもしれないが、あながちそうでもない。トランプが2020年の選挙で敗北した際、彼はある計画を検討していた——", "vocab": [{"word": "federalization", "definition": "連邦化。州の組織や機関（州兵など）を連邦政府の指揮下に置くこと。政治・軍事的文脈で使われる専門用語。"}, {"word": "quartering", "definition": "強制宿営。市民が軍の兵士や将校を自宅に強制的に宿泊させること。米国独立宣言や合衆国憲法修正第3条でも言及される歴史的・法律的用語。"}, {"word": "amalgam", "definition": "混合物、寄せ集め。複数の異なる要素や法律が組み合わさったものを指す。ここでは反乱鎮圧法が複数の法律を統合したものであることを示す。"}, {"word": "insurrection", "definition": "反乱、蜂起。政府や権力に対する武力による反抗や暴動を指す政治・法律用語。'Insurrection Act'（反乱鎮圧法）として重要な文脈で使われる。"}, {"word": "checks and balances", "definition": "抑制と均衡。政府の三権（立法・行政・司法）が互いの権力を制限し合う民主主義の基本原則を指す慣用表現。"}, {"word": "far-fetched", "definition": "こじつけの、非現実的な。ある考えや主張が信じがたいほど不自然または無理があることを表す形容詞的慣用表現。"}, {"word": "dismayingly", "definition": "暗澹たることに、愕然とするほど。強い失望や懸念を伴う形で何かが類似・発生していることを強調する副詞。"}]}, {"title_ja": "世界指導者たちの不道徳は伝染する――教皇の存在がせめてもの救い", "title_en": "World Leaders' Immorality Is Contagious — But Pope Leo Offers a Moral Alternative", "summary_ja": "コラムニストのサイモン・ティスドールは、トランプ、プーチン、ネタニヤフの3人が基本的な道徳規範を理解・遵守できないという共通点を持ち、その不道徳な行動が世界規模で倫理崩壊を「正常化」しつつあると論じる。国際法やリベラルな諸原則もこうした指導者たちの圧力によって形骸化が進んでいると指摘する。その一方で、教皇レオが「暴君に荒らされた世界」を公然と批判し、正戦論を厳格化することで道徳的指導力を示しつつあると評価する。", "summary_en": "Opinion columnist Simon Tisdall argues that Trump, Putin, and Netanyahu share a fundamental inability to distinguish right from wrong, and that their immoral conduct in public office is normalizing ethical collapse worldwide. He contends that international law and liberal principles are eroding under their influence. He finds a rare counterpoint in Pope Leo, who has openly condemned tyrants and is working to tighten just-war theory to resist the misuse of religion to justify aggression.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/05/world-leaders-immorality-pope-leo-war-criminals-corporations-catholic-church", "state_media": false, "category": "オピニオン", "full_text": "What do Donald Trump, Vladimir Putin and Benjamin Netanyahu have in common? Answer: a chronic inability to tell right from wrong. The three leaders currently causing the most harm in the world share a predilection for violence, a chilling lack of compassion, and extraordinary self-regard mixed with paranoia. Yet the characteristic linking them most closely is their rejection of – or failure to grasp – basic moral standards. Worse, these men typically behave, in their public lives at least, in ways that are fundamentally immoral. And that’s a problem for everyone. Their moral malaise is contagious.\nIdeas about what, in absolute terms, constitutes right and wrong are always contentious, as moral philosophers from Aristotle to Kant have shown. Pope Leo, leader of the world’s Catholics, warned recently that “we are living in a time when it is becoming difficult even to recognise what is truly good for everyone”. Yet most people, most of the time, observe a personal moral code held in common with others. There is broad agreement, for example, that it’s wrong to kill, steal, cheat and lie. In an ostensibly secular age, 76% of people worldwide identified with a religion in 2020 – a potent expression of individual and collective morality.\nPutin’s Russia deliberately fires missiles at Ukraine, randomly murdering civilians. In most people’s book, that’s immoral. Netanyahu’s Israel is still committing genocide by targeting Gaza’s children, the UN says. That’s immoral, too. And the defining immorality of the Trump regime knows no bounds. The US vice-president, JD Vance, claimed last week that the Watergate scandal that shattered Richard Nixon’s presidency would not be a big deal today. Nixon conspired to subvert the US constitution, acted criminally and lied to the American people. But as Vance’s remarks implied, such behaviour is par for the course these days.\nThe normalisation of immoral conduct in public office may be Trump’s lasting legacy. Abroad, it ranges from extrajudicial killings in the Caribbean, to the betrayal of Ukrainian and European allies, to kowtowing to Beijing’s human rights abusers. The mass killing of primary school children in Minab at the start of the unlawful US-Israel war on Iran was militarily inept and morally unforgivable. Yet this atrocity is not so much covered up as arrogantly ignored. At home, Trump’s name is synonymous with crypto-greed, rank corruption and sleaze. But his shameless message is clear: all this is normal now.\nInternational law upholds, in theory, a separate, impersonal moral code. Yet its constraints are routinely bypassed, its indictments flouted. Other categories of moral imperative, such as a binding sense of civic duty and societal responsibility, are also eroding in a polarised age. Jeremy Bentham’s utilitarian idea that what is moral is determined by how much it enhances the general wellbeing has scant relevance today. In a contemporary political wasteland dominated by billionaires, war criminals, mega-corporations, AI and arms salesmen, the greater happiness of ordinary folk barely computes.\nPrinciples that modern progressives and liberals had thought immutable, such as tolerance and equal rights, are undermined by unprincipled far-right nationalist-populist reactionaries. Elected western politicians who appease autocrats, excuse the inexcusable and criminalise their opponents as terrorists fuel this invidious moral collapse. Yet the fault is shared. Potentially complicit, too, is every citizen, high or low, who fails to speak out.\nWhere may moral leadership be found in these shiftless times? Pope Leo, for one, is seeking a way out of the swamp. Speaking in April, he decried “a world ravaged by a handful of tyrants”, leaving little doubt in Washington, Moscow and Jerusalem who he meant. He has repeatedly deplored the evils of war-making and concomitant failures to fund the global fight against poverty, ignorance and disease. And he has fiercely condemned Vance and the US defence secretary, Pete Hegseth, who claim divine justification for acts of aggression. “Woe to those who manipulate religion and the very name of God for their own military, economic and political gain, dragging that which is sacred into darkness and filth,” Leo declared.\nLeo is not just talk. He has a plan. Presiding over a “consistory” – a rare gathering of all the Catholic church’s cardinals – in Rome last weekend, he sought to tighten up the just-war theory of St Augustine and St Thomas Aquinas that is frequently hijacked to legitimise so-called preventive wars of choice. Leo argues war is only morally justified for “proportional self-defence”, and only after all peaceful options are exhausted. “War is never worthy of humanity, and it is never blessed by God,” he told the cardinals. “War is not merely a conflict between states”, but originates in “a culture of power”. The world must “rebuild a culture of cooperation”.\nThis struggle for the soul of today’s newly adversarial world order has dra", "translation_ja": "ドナルド・トランプ、ウラジーミル・プーチン、ベンヤミン・ネタニヤフには何が共通しているのか。答えは、善悪を判断できないという慢性的な無能さである。現在世界で最も大きな害をもたらしているこの3人の指導者は、暴力への偏愛、背筋も凍るような思いやりの欠如、そして妄想と混じり合った並外れた自己陶酔という特性を共有している。しかし、彼らを最も強く結びつけている特徴は、基本的な道徳規範の拒絶、あるいはそれを理解できないことである。さらに悪いことに、少なくとも公的な生活においては、これらの人物は根本的に非道徳的な行動をとることが常態化している。そしてそれは、すべての人にとっての問題である。彼らの道徳的な病は伝染するのだ。\n\n絶対的な意味で何が善で何が悪かという問いは、アリストテレスからカントに至る道徳哲学者たちが示してきたように、常に論争を伴う。世界のカトリック信者の指導者である教皇レオは先ごろ、「すべての人にとって真に善いものを認識することさえ難しい時代に生きている」と警告した。それでも大多数の人々は、ほとんどの場面で、他者と共有する個人的な道徳規範を守っている。たとえば、殺すこと、盗むこと、欺くこと、嘘をつくことが悪であるという点については広く合意がある。表向きは世俗化が進んだ時代であるにもかかわらず、2020年には世界人口の76%が何らかの宗教と結びついていた――個人と集団の道徳の力強い表れである。\n\nプーチンのロシアはウクライナにミサイルを意図的に撃ち込み、無差別に市民を殺害している。大多数の人の基準では、これは非道徳的である。ネタニヤフのイスラエルは依然としてガザの子どもたちを標的にすることで大量虐殺を続けていると国連は指摘している。これもまた非道徳的だ。そしてトランプ政権の非道徳性の定義は際限がない。米国副大統領のJDヴァンスは先週、リチャード・ニクソンの大統領職を粉砕したウォーターゲート事件は今日では大したことではないだろうと発言した。ニクソンは米国憲法を破壊しようと共謀し、犯罪行為を行い、国民に嘘をついた。しかしヴァンスの発言が示唆するように、そうした行動は今や当たり前のことになっている。\n\n公職における非道徳的行為の正常化こそ、トランプの永続的な遺産となりうる。対外的には、カリブ海での超法規的殺害から、ウクライナおよび欧州の同盟国への裏切り、北京の人権侵害者への媚び諂いまで、その範囲は広がっている。違法な米・イスラエルによるイランへの攻撃の発端となったミナブでの小学生の大量殺害は、軍事的にも無能であり、道徳的にも許しがたいものだった。それでもこの残虐行為は隠蔽されるどころか、傲慢に無視されている。国内では、トランプの名は暗号資産による強欲、露骨な腐敗、醜聞と同義になっている。だが彼の恥知らずなメッセージは明確だ――これらすべてが今や「普通」なのだと。\n\n国際法は理論上、独立した非人格的な道徳規範を支持している。しかしその制約はルーティン的に回避され、訴追状は無視される。市民的義務や社会的責任という道徳的命令の別カテゴリーも、分極化した時代の中で侵食されつつある。道徳とは一般的幸福をどれだけ高めるかによって決まるというジェレミー・ベンサムの功利主義的思想は、今日ではほとんど意味をなさない。億万長者、戦争犯罪人、巨大企業、AI、武器商人に支配された現代の政治的荒野では、一般市民のより大きな幸福などほとんど計算に入れられない。\n\n寛容や平等権など、現代の進歩主義者やリベラル派が不変と思っていた原則は、無原則な極右の国家主義的ポピュリスト反動勢力によって掘り崩されている。独裁者に融和し、許しがたいことを容認し、反対者をテロリストとして犯罪視する欧米の選挙で選ばれた政治家たちが、この有害な道徳崩壊を煽っている。しかし責任は共有されている。声を上げることを怠るすべての市民も、地位の高低を問わず、潜在的に共犯となりうる。\n\nこのような頼りない時代に、道徳的指導力はどこに求めることができるのか。教皇レオはその一人として、この泥沼からの出口を模索している。4月の発言では「一握りの暴君に荒らされた世界」を嘆き、ワシントン、モスクワ、エルサレムへの言及であることに疑いの余地を残さなかった。彼は戦争行為の悪と、貧困・無知・疾病との世界的な闘いに資金を充てることへの失敗を繰り返し非難してきた。また、侵略行為に神の正当性を主張するヴァンスや米国防長官のピート・ヘグセスを激しく糾弾した。「自らの軍事的・経済的・政治的利益のために宗教や神の御名を利用し、神聖なものを闇と汚辱の中に引きずり込む者たちに禍いあれ」とレオは宣言した。\n\nレオは言葉だけではない。彼には計画がある。先週末、ローマで「コンシストリー」――全カトリック教会の枢機卿が集まる稀な会合――を主宰した彼は、いわゆる予防的な選択戦争を正当化するために頻繁に流用される聖アウグスティヌスと聖トマス・アクィナスの正戦論の厳格化を図った。レオは、戦争が道徳的に正当化されるのは「均衡のとれた自衛」のためのみであり、かつすべての平和的選択肢が尽くされた後に限られると主張する。「戦争は決して人間の尊厳にふさわしいものではなく、神に祝福されることもない」と彼は枢機卿たちに語った。「戦争は単なる国家間の紛争ではなく」、「権力の文化」から生じるものであり、世界は「協調の文化を再建しなければならない」と訴えた。\n\n今日の新たに対立的となった世界秩序の魂をめぐるこの闘いは、劇的な様相を呈してきた――", "vocab": [{"word": "predilection", "definition": "「好み、偏愛」を意味する名詞。特定のものや行為に対して強い傾向や嗜好を持つことを指す。例：a predilection for violence（暴力への偏愛）。"}, {"word": "concomitant", "definition": "「付随する、同時に起こる」を意味する形容詞・名詞。ある出来事や状況に伴って生じる付随的な要素を表す。"}, {"word": "utilitarian", "definition": "「功利主義的な」を意味する形容詞。道徳の基準を結果として生まれる最大多数の最大幸福に置くベンサムらの哲学的立場に関連する語。"}, {"word": "invidious", "definition": "「不公平な、不快感を引き起こす、反感を買いやすい」を意味する形容詞。不公正または不快な比較や状況を描写する際に使われる。"}, {"word": "appease", "definition": "「なだめる、懐柔する、融和する」を意味する動詞。要求を満たすことで対立を避けようとする行為を指すが、多くの場合批判的なニュアンスを伴う。"}, {"word": "consistory", "definition": "「コンシストリー（枢機卿会議）」を意味する名詞。カトリック教会において教皇が全枢機卿を招集して開く公式の会議を指す専門用語。"}, {"word": "extrajudicial", "definition": "「法的手続きによらない、超法規的な」を意味する形容詞。正式な司法手続きを経ずに行われる行為、特に殺害や拘束などを指す。"}]}, {"title_ja": "トム・キーン議員、他者への有給病気休暇に反対票を投じた後、自身は数カ月の有給休暇を取得", "title_en": "Tom Kean Took Months of Paid Sick Leave After Voting Against It for Others", "summary_ja": "共和党のトム・キーン・ジュニア下院議員は、うつ病の入院治療を理由に約4カ月間の有給休暇を取得したが、その間、選挙区民への説明はほとんどなかった。コラムニストのアルワ・マフダウィは、キーン議員がニュージャージー州の有給病気休暇法や育児休暇法に反対票を投じてきた事実を挙げ、彼の偽善を厳しく批判する。筆者はこの事例を、共和党員に蔓延する偽善体質とアメリカ民主主義の機能不全の象徴として論じている。", "summary_en": "Republican Congressman Tom Kean Jr. took nearly four months of fully paid leave for inpatient depression treatment, while his office offered no explanation to constituents. The author argues this exposes Kean's hypocrisy, as he repeatedly voted against paid sick leave and family leave policies for ordinary Americans. Columnist Arwa Mahdawi uses this case to illustrate broader Republican hypocrisy and the deteriorating state of American democracy.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/04/tom-kean-jr-sick-leave-mental-health-depression", "state_media": false, "category": "オピニオン", "full_text": "The mystery of the missing congressman has finally been solved. Almost four months ago Tom Kean Jr, a Republican, vanished from public view. He missed more than 100 votes, all while continuing to collect his full taxpayer-funded salary of $174,000 along with excellent benefits. The only explanation given for his absence was a cryptic statement from his office in late April saying he was dealing with a “personal health matter”. Kean’s father, former New Jersey governor Tom Kean Sr, further told CNN in May that his son was battling a temporary illness and would be back to work soon.\nThis week, Kean finally resurfaced and explained that he’d been absent due to inpatient treatment for depression. Why hadn’t he said anything about this earlier? Kean said he was “private person by nature”. Which is great, but maybe don’t choose a job in public service in that case.\nDepression can be debilitating, and empathy should obviously be extended to anyone suffering from it. However, as Congresswoman Alexandria Ocasio-Cortez said in an interview: “There’s a valid discussion here about when it comes to the volume of an absence, what is our responsibility to our constituents in communicating around that?”\nThere’s also a valid discussion here about how Kean is a massive hypocrite who has devoted his life to ensuring normal Americans are not afforded the same sort of time and resources to deal with a personal crisis that he has just enjoyed. Not everyone gets to take four months of paid leave when they need it: the US is the only OECD country without a national paid leave policy. Some employers will offer paid time off for mental health reasons, and various states offer paid leave benefits, but a majority of Americans have to figure it out on their own. According to a 2024 Department of Labor fact sheet, “among the lowest wage workers, who are predominately women and workers of color, 95% have no access to paid family leave and 90% lack access to short-term disability leave.”\nWhy is the US like this? Because of lawmakers like Kean. Mother Jones notes that the nepo baby “voted against New Jersey’s historic Earned Sick Leave Act, which mandates 5 paid sick leave days per year for New Jersey workers. He also voted against New Jersey’s No Surprise Medical Bills act and two of its paid family leave laws, in 2008 and 2018.” Kean also supported Trump’s “big, beautiful bill”, which makes devastating cuts to Medicaid and Medicare, and will make life a lot harder for people with disabilities. Kean, in short, voted to ensure the most vulnerable people in the US suffer, all so the rich can get more tax cuts.\nKean, to be fair, is far from the only politician to be a raging hypocrite. It’s basically a job requirement, particularly for Republicans. There are a number of Republican men who make a big song and dance about how evil abortion is, but quickly change their tune when their mistress needs one. In 2017, for example, Tim Murphy of Pennsylvania resigned from Congress after claims he pressured a woman he was having an extramarital affair with to have an abortion. The following year, Elliott Broidy, a top fundraiser for Donald Trump, resigned from the Republican National Committee after it was revealed that he paid $1.6m to a Playboy Playmate he had had an affair with. Broidy got the woman pregnant and she decided to have an abortion. Herschel Walker, a former football star who unsuccessfully ran as a Republican for a US Senate seat in Georgia in 2022, has also been accused of paying for an abortion. Walker denied the claim but also said he didn’t know the woman. It later transpired she was the mother of one of his children. Walker, by the way, is now United States ambassador to the Bahamas.\nI could go on and on about Republican hypocrisy, but there’s not really much value in pointing it out, is there? You know they’re craven hypocrites, I know they’re craven hypocrites, but their voting base doesn’t care. Indeed, far from being ashamed of their inconsistencies and lies and corruption, Republicans revel in it. They seem to take great pleasure in the fact that there is one set of rules for them and another set of rules for the hoi polloi. Trump has even said he believes the constitution gives him “the right to do whatever I want as president”. Many of his minions seem to believe they also have the right to do whatever they like.\nWhich is why I don’t feel much hope that Kean might have had some road-to-Damascus moment from his treatment for depression, and become a more empathetic human. Indeed, instead of hard work to make up for lost time, his calendar is full of self-serving fundraisers for his re-elect
