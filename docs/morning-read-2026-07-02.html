, "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カナダの11歳少年、顔にコウモリ　狂犬病で死亡", "title_en": "Canadian Boy, 11, Dies of Rabies After Finding Bat on His Face", "summary_ja": "カナダで11歳の少年が、顔の上にコウモリがいる状態で目を覚ました後、狂犬病により死亡した。カナダでは狂犬病の人への感染は非常にまれで、1924年以降の死者数はわずか28人にとどまっている。保健当局は、コウモリや狂犬病の疑いがある動物に接触した場合は、直ちに医療機関を受診するよう呼びかけている。", "summary_en": "An 11-year-old boy in Canada has died from rabies after waking up to find a bat on his face. The case highlights the dangers of bat exposure, as rabies infections remain rare in Canada with only 28 human deaths recorded since 1924. Health officials are urging the public to seek immediate medical attention if they come into contact with a bat or other potentially rabid animal.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c982m1m95q9o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "バチカン、無断で司教を叙階したSSPXを破門処分に", "title_en": "Vatican Excommunicates SSPX Bishops Over Unauthorized Consecrations", "summary_ja": "バチカンは、超伝統主義カトリック団体「聖ピオ十世会（SSPX）」の指導者らに対し、破門を含む厳しい懲戒処分を科した。同団体が教皇の承認を得ずに司教を叙階したことが今回の措置の原因となった。この決定は、聖座と教会内の伝統主義派との間に続く緊張関係を改めて浮き彫りにしている。", "summary_en": "The Vatican has imposed severe disciplinary measures, including excommunication, on leaders of the Society of Saint Pius X (SSPX), an ultratraditionalist Catholic group. The action was taken after the group consecrated bishops without obtaining consent from the Pope. The move reflects ongoing tensions between the Holy See and traditionalist factions within the Catholic Church.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/vatican-excommunicates-rebel-sspx-bishops/a-77798543?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ドイツ検察、ノルドストリーム爆破事件でウクライナ人容疑者を起訴", "title_en": "German Prosecutors Charge Ukrainian Suspect in Nord Stream Pipeline Sabotage", "summary_ja": "ドイツの検察当局は、2022年にバルト海のノルドストリームガスパイプラインを破壊したとされるウクライナ国籍の容疑者を正式に起訴した。捜査当局は、容疑者がウクライナの国家当局の命令に基づいて行動したと見ている。この起訴は、近年のヨーロッパにおける最も重大なインフラ破壊事件の一つに関する重要な進展となる。", "summary_en": "German prosecutors have officially charged a Ukrainian national in connection with the 2022 sabotage of the Nord Stream Baltic Sea gas pipelines. Investigators believe the suspect acted under orders from Ukrainian state authorities. The charges mark a significant development in one of the most consequential acts of infrastructure sabotage in recent European history.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/nord-stream-blast-ordered-by-ukraine-say-german-prosecutors/a-77798230?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ドイツ連立政権、経済成長促進に向けた改革パッケージで合意", "title_en": "Germany's Coalition Agrees Economic Growth Reform Package", "summary_ja": "フリードリヒ・メルツ首相は、連立政権が経済成長を促進するための改革パッケージを承認したと発表した。政府に対して具体的な経済成果を求める圧力が高まる中での合意となる。また、子どもに似た性人形の犯罪化に対する異議申し立てを、ドイツの最高裁判所が退けたことも報じられた。", "summary_en": "Chancellor Friedrich Merz announced that his coalition government has approved a reform package aimed at boosting economic growth in Germany. The agreement comes amid increasing pressure on the government to deliver tangible economic results. Separately, a top German court has rejected legal complaints against the criminalization of childlike sex dolls.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-news-coalition-agrees-package-to-boost-growth/live-77795988?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシアがキーウに大規模攻撃、少なくとも18人死亡", "title_en": "Russia Launches Deadly Massive Strike on Kyiv, Killing at Least 18", "summary_ja": "ロシアがウクライナの首都キーウに大規模なミサイル・ドローン攻撃を実施し、地元当局によると少なくとも18人が死亡した。ウクライナのゼレンスキー大統領はモスクワが大規模攻撃を計画していると事前に警告していた。この攻撃は、ウクライナ軍がロシア領内へのより深い越境作戦を展開している最中に行われた。", "summary_en": "Russia carried out a large-scale missile and drone attack on Ukraine's capital Kyiv, killing at least 18 people according to local authorities. Ukrainian President Volodymyr Zelensky had previously warned that Moscow was planning a massive strike. The attack comes as Ukrainian forces have been conducting deeper cross-border operations into Russian territory.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/07/02/world/ukraine-kyiv-russia-attack", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "世界最大のスタジアムは世界経済を映す鏡か？", "title_en": "Can the World's Largest Stadium Explain the Global Economy?", "summary_ja": "ベトナムは高い経済成長率と輸出の急増により、アジアで最も野心的な国の一つとして注目されている。しかし、こうした輝かしい数字の裏には、国民の深い不満が潜んでいる。同国の状況は、世界経済が抱える構造的な矛盾を読み解くための重要な視点を提供している。", "summary_en": "Vietnam's impressive economic growth rates and surging exports present an optimistic picture of one of Asia's most ambitious nations. However, beneath these headline figures lie deep frustrations among the Vietnamese people. The country's experience offers a lens through which to examine broader tensions in the global economy.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/02/world/asia/vietnam-stadium-corporate-inequality.html", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国はイランがイデオロギーを投資と交換する可能性を示唆、しかし歴史は別の結果を示す", "title_en": "U.S. Believes Iran May Trade Ideology for Investment, But History Suggests Otherwise", "summary_ja": "米国の高官らは、イランが対米姿勢を変えれば多大な経済的恩恵を受けられると示唆している。しかしイランの指導部はこれまで、こうした取引的な提案をイデオロギー的信念を優先する形で拒否してきた。歴史的な前例を踏まえると、今回の働きかけが異なる結果をもたらすかどうかには疑問が残る。", "summary_en": "Senior U.S. officials have suggested Iran could receive significant economic rewards if it changes its stance toward the United States. However, Iran's leadership has historically rejected such transactional bargains, prioritizing ideological commitments over financial incentives. Analysts and historical precedent cast doubt on whether the current overture will yield a different outcome.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/02/world/middleeast/us-iran-negotiations-economy-opening-up.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "人質合意の行き詰まり打開でパレスチナ人がガザ北部へ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルはガザ地区を二分する軍事ゾーンの通過を避難民のパレスチナ人に許可し、北部への徒歩での帰還が始まった。この動きは、人質解放交渉における長期的な行き詰まりが打開されたことを受けて実現した。今回の展開は、ガザ地区内の人道状況における重要な転換点となっている。", "summary_en": "Israel has permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The movement came after a breakthrough in negotiations over hostage releases resolved a prolonged impasse. The development marks a significant shift in the humanitarian situation within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Property Sector Crisis", "summary_ja": "中国大手不動産デベロッパーの万科（ヴァンキー）が巨額の損失を報告し、同国の不動産危機が引き続き拡大していることが浮き彫りになった。万科の経営難は、不動産不況の深刻さと中国政府が救済に乗り出すかどうかについて重大な疑問を提起している。この動向は、中国経済にとって最も重要なセクターの一つにおけるシステミックリスクへの懸念をさらに高めている。", "summary_en": "Leading Chinese property developer Vanke has reported a massive financial loss, signaling that the country's real estate crisis continues to spread. The troubles at Vanke raise serious questions about the depth of China's property downturn and whether state intervention will be necessary. The development adds to concerns about systemic risks in one of China's most critical economic sectors.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による破片が依然として残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性は長期間にわたり単独で拘束され、約8か月をトンネル内で過ごしたという。この事実は、人質たちが拘束中に受けた深刻な身体的・精神的苦痛を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were discovered to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in tunnels. The findings highlight the severe physical and psychological toll endured by the hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コートジボワールの洪水で59人死亡、西アフリカ各地で豪雨被害が拡大", "title_en": "Côte d'Ivoire Floods Kill 59 as West Africa Faces Deadly Rainy Season", "summary_ja": "コートジボワールでは5月以降の洪水により少なくとも59人が死亡したと、同国の情報通信大臣がアビジャンでの閣議で報告した。5月から7月にかけての雨季には救助隊が引き続き行方不明者を捜索しており、死者数はさらに増える恐れがある。隣国でもガーナで13人が死亡したほか、ベナン、トーゴ、ナイジェリアでも洪水被害が相次いでいる。", "summary_en": "Floods in Côte d'Ivoire have killed at least 59 people since May, according to the country's communication minister, who warned the death toll could rise further as rescue teams continue searching for victims. The deadly rainy season, which runs from May to July, has also struck neighboring countries, with Ghana reporting 13 deaths and floods affecting Benin, Togo, and Nigeria. Authorities fear conditions will worsen before the season ends.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/02/cote-d-ivoire-floods-dead-west-africa-rains", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "エボラの野生動物起源の解明が次の大規模流行防止に不可欠", "title_en": "Understanding Ebola's Wildlife Origins Is Key to Preventing Future Outbreaks", "summary_ja": "コンゴ民主共和国では、現在1,250件以上の感染例と少なくとも362人の死者を出すブンディブギョウイルスによるエボラ出血熱の流行が続いている。科学者たちは、こうしたウイルスの野生動物における起源を特定しなければ、人間への感染リスクが繰り返されると警告する。さらに、感染を恐れたコミュニティによる野生動物への報復的な殺傷という不必要な被害も懸念されている。", "summary_en": "The Bundibugyo virus, responsible for the current Ebola outbreak in the Democratic Republic of the Congo with over 1,250 cases and at least 362 deaths, remains dangerously under the radar. Scientists warn that without identifying the wildlife source of such viruses, humans remain at risk of repeated outbreaks. Additionally, wildlife may face unnecessary retaliatory killings from communities fearful of infection.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/environment/2026/jul/02/understanding-ebola-wildlife-origins-crucial-preventing-next-big-outbreak", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アムネスティ、スーダンRSFがエル・ファシェルで人道に対する罪を犯したと告発", "title_en": "Sudan's RSF Committed Crimes Against Humanity in El Fasher, Amnesty International Says", "summary_ja": "国際人権団体アムネスティ・インターナショナルは、スーダンの準軍事組織「即応支援部隊（RSF）」がエル・ファシェル制圧作戦において人道に対する罪および民族浄化を行ったと告発した。報告書によると、殺害、拷問、レイプ、奴隷化、性的奴隷化など広範かつ組織的な市民への攻撃が行われたとしている。この報告書は水曜日に公表された。", "summary_en": "Amnesty International has accused Sudan's Rapid Support Forces (RSF) of committing crimes against humanity and ethnic cleansing during their campaign to capture El Fasher. The report details widespread and systematic atrocities against civilians, including murder, torture, rape, enslavement, and sexual slavery. The findings were released in a report by the human rights organization on Wednesday.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/01/sudan-rsf-rapid-support-forces-crimes-against-humanity-el-fasher-amnesty-ethnic-cleansing", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "同盟国がアメリカを脅す術を学ぶ：台湾の半導体産業はトランプ氏を動かせるか", "title_en": "Allies Learn How to Bully America: Can Taiwan's Chip Industry Strong-Arm Trump?", "summary_ja": "トランプ米大統領が強硬な貿易・外交政策を推進する中、一部の同盟国は経済的leverage（影響力）を使って対抗する方法を模索している。世界最先端の半導体製造拠点を擁する台湾は、米国がその半導体に深く依存していることから、特に強い交渉力を持ち得る。台北がその技術的優位性をワシントンへの政治的影響力に転換する意志と戦略を持てるかどうかが焦点となっている。", "summary_en": "As Donald Trump pursues an aggressive trade and foreign policy agenda, some US allies are exploring how to use economic leverage to push back. Taiwan, home to the world's most advanced semiconductor manufacturing, may hold particular sway given America's deep dependence on its chips. The question is whether Taipei has the will and strategy to convert that technological advantage into political influence over Washington.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/30/allies-learn-how-to-bully-america", "state_media": false, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大学生の学力は想像以上に低下している", "title_en": "Students are doing worse than you think", "summary_ja": "新たな分析により、大学生の学業成績が一般的に考えられているよりも大幅に低いことが明らかになった。一部の高等教育機関の学生は、10歳児と同程度の学力テストの結果しか示せていない。この調査結果は、現代における教育水準や学位の価値について深刻な疑問を投げかけている。", "summary_en": "A new analysis reveals that academic performance among college and university students is significantly lower than commonly assumed. Some higher education students are testing at levels comparable to ten-year-old children. The findings raise serious questions about educational standards and the value of degrees in the modern era.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "独裁国家が台頭する新たな和平仲介者たち", "title_en": "Autocracies Are Becoming the World's New Conflict Mediators", "summary_ja": "権威主義的な体制が国際的な紛争調停において存在感を高め、欧米主導の和平プロセスに取って代わりつつある。こうした独裁国家が仲介する合意は、人権や説明責任よりも安定を優先する傾向があり、民主主義国家が主導してきた和平とは性質が大きく異なる。この変化は、国際的な和平構築の将来と、それを支える規範のあり方に深刻な疑問を投げかけている。", "summary_en": "Authoritarian regimes are increasingly stepping into the role of conflict mediators, displacing Western-led peace efforts. The deals brokered by these autocracies tend to look markedly different from those negotiated by liberal democracies, often prioritizing stability over human rights and accountability. This shift raises serious questions about the future of international peacemaking and the norms that govern it.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "新たな急進左派がアメリカ民主党を揺るがす", "title_en": "New Radical Left Wave Disrupts Democratic Party Primaries", "summary_ja": "11月の中間選挙に向けた民主党予備選挙で、エリート層や社会的不平等、対イスラエル軍事支援を批判する新世代の進歩派候補者たちが台頭している。こうした候補者たちは民主党の既成勢力に対して真っ向から挑戦状を叩きつけており、党内での存在感を急速に高めている。彼らの躍進は、民主党内におけるイデオロギー的な地殻変動を示すものとして注目されている。", "summary_en": "A new generation of progressive candidates is challenging the Democratic establishment in primaries ahead of the November midterm elections. These candidates are united by criticism of elite power structures, social injustice, and U.S. military support for Israel. Their rise signals a significant ideological shift within the Democratic Party.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/07/02/a-new-radical-left-is-shaking-up-the-democratic-party_6755072_4.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "フランス大統領選の日程、メーデー翌日の決選投票に疑問の声", "title_en": "French Presidential Election Dates Spark Debate Over Labor Day Proximity", "summary_ja": "フランスは次期大統領選挙の第1回投票を2027年4月18日、決選投票を5月2日に設定した。決選投票の日程がフランスで象徴的な意味を持つメーデー（労働者の日）の翌日にあたることから、各方面で議論を呼んでいる。この日程の選択が投票率や政治的な力学に影響を与える可能性を懸念する声が上がっている。", "summary_en": "France has set the first round of its next presidential election for April 18, 2027, with the runoff scheduled for May 2. The timing has drawn scrutiny as the second round falls just one day after Labor Day, a date carrying significant symbolic weight in France. Critics and observers are questioning whether the proximity to the workers' holiday could influence voter turnout and political dynamics.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/politics/article/2026/07/02/choice-of-french-presidential-election-dates-raises-questions_6755069_5.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア、キーウ史上最大規模の攻撃で少なくとも13人死亡", "title_en": "Russia Launches Largest-Ever Attack on Kyiv, Killing at Least 13", "summary_ja": "ロシアがキーウに対して過去最大規模の空爆を実施し、少なくとも13人が死亡した。ウクライナ当局は、民間人や住宅地域が意図的に標的にされたと強く非難している。ロシアは木曜日、キーウへの軍事的圧力をさらに強化すると宣言した。", "summary_en": "Russia carried out what Ukrainian authorities have described as the largest aerial attack ever on Kyiv, killing at least 13 people. The strike deliberately targeted civilians and residential areas, drawing strong condemnation from Ukrainian officials. On Thursday, Russia vowed to further increase military pressure on the Ukrainian capital.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/07/02/russian-strikes-on-kyiv-kill-at-least-nine-overnight_6755068_4.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "バチカン、無許可の司教叙階を巡り反抗的カトリック団体のメンバーを追放", "title_en": "Vatican Expels Members of Rebel Catholic Group Over Unauthorized Bishop Ordination", "summary_ja": "バチカンは、無許可で司教の叙階を行った反抗的なカトリック団体のメンバーを追放した。ローマ教皇庁は、司教叙階の承認はローマ教皇のみが持つ権限であると改めて強調し、この規則はイエスの最初の弟子たちに遡る使徒継承を守るためのものだと説明した。今回の措置は、教皇の権威に挑戦する分派組織に対するバチカンの断固たる姿勢を示すものだ。", "summary_en": "The Vatican has expelled members of a dissident Catholic group after they conducted an unauthorized bishop consecration. The Holy See reaffirmed that only the Pope holds the authority to approve such consecrations, a rule designed to protect the Church's apostolic succession tracing back to Jesus's original disciples. The move underscores the Vatican's firm stance against breakaway factions that challenge papal authority.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/2/breakaway-catholic-group-condemned-sacraments-deemed-illicit-by-vatican?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "フィリピンのタール火山が噴火、火山灰と水蒸気が1,200メートルに達する", "title_en": "Philippines' Taal Volcano Erupts, Shooting Ash and Steam 1,200 Metres High", "summary_ja": "フィリピンのタール火山が噴火し、火山灰と水蒸気の噴煙が約1,200メートルの高さに達した。この噴火は周辺地域の住民や航空交通に影響を与える可能性がある。タール火山はフィリピンで最も活発かつ危険な火山の一つであり、当局が状況を注視している。", "summary_en": "Taal Volcano in the Philippines has erupted, blasting a column of ash and steam approximately 1,200 metres into the air. The eruption poses potential risks to surrounding communities and air travel in the region. Authorities are monitoring the situation as Taal is one of the country's most active and historically destructive volcanoes.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/2/philippines-volcano-erupts-blasting-plumes-of-ash-and-steam?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ドイツ連立政権、税制・年金改革の包括的パッケージで合意", "title_en": "German Coalition Agrees on Major Tax and Pension Reform Package to Revive Economy", "summary_ja": "ドイツの連立政権は、税制と年金制度を対象とした大規模な改革パッケージで合意に達した。この発表は、国内で極右勢力の支持が高まる中、首相への政治的圧力が強まっている状況下で行われた。一連の改革は、低迷するドイツ経済を立て直し、政府への国民の信頼を回復することを目的としている。", "summary_en": "Germany's ruling coalition has reached a breakthrough agreement on a sweeping reform package targeting tax and pension systems. The announcement comes as Chancellor faces mounting pressure amid a surge in far-right political support across the country. The reforms are aimed at reviving Germany's struggling economy and restoring public confidence in the government.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/2/german-coalition-agrees-on-sweeping-reform-package-in-key-breakthrough?traffic_source=rss", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イスラエルとアメリカ、パレスチナが領有権を主張する土地にエルサレム大使館建設を推進", "title_en": "Israel and U.S. Advance Jerusalem Embassy Plan on Palestinian-Claimed Land", "summary_ja": "イスラエルと米国は、パレスチナ側が領有権を主張する土地に米国の恒久的なエルサレム大使館を建設する計画を進めている。この動きは、イスラエル・パレスチナ双方が自国の首都と位置づける同市をめぐる米国の政策転換を象徴するものだ。国際社会からの強い批判を招くとともに、二国家解決に向けた交渉をさらに困難にするとみられている。", "summary_en": "Israel and the United States are moving forward with plans for a permanent U.S. embassy in Jerusalem, situated on land that Palestinians claim as their own. The development marks a continued shift in U.S. policy regarding the disputed city, which both Israelis and Palestinians consider central to their national aspirations. The move is expected to draw sharp international criticism and further complicate prospects for a two-state solution.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMijwJBVV95cUxNVE42X1lJLWtPQWdyOXN6UEFVX0VlLV9zSnQwbm1TZnJpWTJrYmhPN2lzY3RUNTVLRmtnenU1emVYMm9GUjl4ZmxneTJPdzJvZmcyUGV2REFTMm02bTVGUHZaZUI1QXV2bHpkb0Z0d0tQUUhIbzhCZDFfallaUkx6cF9tOFJfaDFGU3RmbEI1MFBxTGRqVmtCRnJtV0JQZ2tYeFFFX3B3UzhtcXJ6UjAtQWUyRTZZalotcEdRU3M1UUExODFPWEttVnFrZk9JU01laDc5TkFoWExFNldRX3VlRDZJZmZMRTZXektoejJ5V1Y5aXBFRndvRksxdHNSUmdmUWFFSGkxUzN6RnQ3M2dF?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ハアレツ、新支局長とワシントン特派員を任命し米国での存在感を拡大", "title_en": "Haaretz Expands U.S. Presence With New Bureau Chief and Washington Correspondent", "summary_ja": "イスラエルの新聞ハアレツは、新たな支局長とワシントン特派員を任命し、米国での報道体制を強化する。この拡張は、米国の政治や時事問題に関する取材をより深化させるという同紙の方針を示している。イスラエルおよび国際的な読者の間で、米国ニュースへの関心が高まっていることを反映した動きといえる。", "summary_en": "Israeli newspaper Haaretz is strengthening its American coverage by appointing a new bureau chief and Washington correspondent. The expansion signals the publication's commitment to deepening its reporting on U.S. affairs and politics. This move reflects growing interest among Israeli and international readers in American news coverage from an Israeli perspective.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi-gFBVV95cUxPRTBHOXhCbGN2S09hTlhnRUxDcU5wOHA1N2pidmJ4cl9NaVJ2OWZHZ0tMZVk4TXBVaVZ2dVV1bm82ZEJ2SkFENjhBV2dUUEI0X3JNdEhyTlBNWnFvNWQwLUxtSWI1ckNoMGI0SzhWZXA5eEx0RVRTNUsyX2llZWlEOHlaQmV3a2tRZUJRUi05RVFPWmtndEVLTHpjSGV2d1oyUTZHZWpfR1hUV1FNUVN2SzF4WF9mdGp3ZzVaMkpsR1k2OEVPRWQ0Y0s0ZGlqckNtSHhuZFlLSHZsSnQweUcxMHBOd3ZfQTZaUExuZW5sR25kOC15bkEtSXZR?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イスラエル批判派がコロラド州民主党予備選で大番狂わせ", "title_en": "Israel Critic Wins Major Upset in Colorado Democratic Primary", "summary_ja": "イスラエルに批判的な進歩派候補がコロラド州の民主党予備選で大きな番狂わせを演じ、勝利を収めた。この結果は、民主党内で中東政策をめぐる進歩派の影響力が拡大していることを示している。今回の結果は、本選挙に向けた政治的地図の変化を示す重要な動きとして注目されている。", "summary_en": "A progressive candidate critical of Israel has won a significant upset victory in Colorado's Democratic primary, reflecting a broader progressive wave within the party. The result signals growing influence of progressive voices on U.S. Middle East policy within Democratic ranks. The outcome is seen as a notable shift in the political landscape ahead of the general election.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiiwJBVV95cUxQM3R2MVRzRGRLMmpHRlV0QTJNVjZtaEhUd1pyNUphU3ktdEtMY0lweTliSlloNnJ5QUJ4MHJWYkpwR2RXZ3ZnR3FzZzJjWHVYM19vN25YYk4wOHhia1lLUERYZFVtRURKYkdpbHlFdW1URV9mQXdEVHRIUF83S3BiQ0oteUVtaUp1OVFDbFViZUJQUjNxQzVtQkp2UVFuNFVGd21ORURWXy01RG8yMDRBWVhoVGQ0NVVIZHBHQVpDMmZidWFWaWdMSi1QbmtPYndkZ1RpNXpYaFZISkxoaFhzRXNJckxqQ2hlSUM3TjVHTUR5bnpuSWU2Nm82c1d0Q3N3ckJ1ZlNCdW8tY2s?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "シンガポール国防省（Mindef）からの最新情報", "title_en": "Singapore Mindef News Update", "summary_ja": "シンガポール国防省（Mindef）は、ストレーツ・タイムズを通じて公式アップデートを発表した。この通知は2026年7月2日木曜日に掲載された。提供された抜粋には詳細な内容は含まれていない。", "summary_en": "The Singapore Ministry of Defence (Mindef) has released an official update as reported by The Straits Times. The notice was published on Thursday, July 2, 2026. Further details were not available in the provided excerpt.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イブニングアップデート – ストレーツ・タイムズ", "title_en": "Evening Update – The Straits Times", "summary_ja": "ストレーツ・タイムズは2026年7月2日木曜日にイブニングアップデートニュースレターを配信した。この briefingでは、その日の主要ニュースが読者向けに厳選してまとめられている。読者はリンクを通じて購読の管理や追加の無料ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times published its Evening Update newsletter on Thursday, July 2, 2026. The briefing provides subscribers with a curated summary of the day's top news stories. Readers can manage their subscription or sign up for additional free newsletters via the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モーニングブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズは2026年7月2日付けのモーニングブリーフィングニュースレターを配信した。このブリーフィングは、その日の主要ニュースを厳選してまとめたものである。読者はウェブサイトを通じてニュースレターの購読設定を管理したり、他の無料ニュースレターに登録したりすることができる。", "summary_en": "The Straits Times published its Morning Briefing newsletter on July 2, 2026. The briefing provides readers with a curated summary of the day's top news stories. Subscribers can manage their newsletter preferences or sign up for additional free newsletters through the publication's website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "元インドネシア教育相ナディエム、クロームブック汚職事件で懲役10年の判決", "title_en": "Former Indonesian Education Minister Nadiem Makarim Sentenced to 10 Years in Chromebook Corruption Case", "summary_ja": "インドネシアの元教育大臣ナディエム・マカリム氏が、クロームブック調達に関わる汚職事件で懲役10年の判決を受けた。この事件は、全国の学校へのノートパソコン配布プログラムにおける不正行為に関するものとされている。現職閣僚経験者が関与した重大汚職事件として、インドネシア国内で大きな注目を集めている。", "summary_en": "Former Indonesian Education Minister Nadiem Makarim has been sentenced to 10 years in prison in connection with a corruption case involving the procurement of Chromebooks. The case centers on alleged irregularities in a government program to distribute laptops to schools across Indonesia. The verdict marks a significant development in one of Indonesia's high-profile corruption cases involving a prominent cabinet minister.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMivgFBVV95cUxOQVBXd2RnQTdQMS1UWUZmV1liTGMzbXN5TXNXdEZBTi11QVJMOEhuSEg1YWR4R0NvejRIRUstUW1kNzdFRkVJYXVXU1VTS2lPUmRiUjdnTURiakdicFhwUW8wYmV4UHUtOEh1aWJpNndqUVpqOWZTbmhwMXRUWmI0aDRHdUE0dE9xMXJjbFNwM3Foem4tNHNVa2Y3b3BTd0VJaXJrM0M5N3BCbkNoMkZEZVJLTEQ1bkdYc2xoNm93?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "持続可能性の修辞と経済的現実：両立は可能か？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、企業や政府が直面する持続可能性へのコミットメントと経済的圧力の間の高まる緊張を検証している。環境に関する野心的な言説が、経済成長と開発ニーズの厳しい現実と調和できるかどうかを問いかけている。環境公約と現実的な財政的制約の溝を埋めるための潜在的な道筋についても考察している。", "summary_en": "The Jakarta Post examines the growing tension between sustainability commitments and economic pressures facing businesses and governments. The article questions whether ambitious environmental rhetoric can be reconciled with the hard realities of economic growth and development needs. It explores potential pathways to bridge the gap between green pledges and practical financial constraints.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コモド島への観光客が増加", "title_en": "Tourist Visits to Komodo Island on the Rise", "summary_ja": "世界的に有名なコモドオオトカゲが生息するコモド島で、観光客数が増加している。この傾向はインドネシアの独自の自然遺産への関心の高まりを示している。当局や自然保護活動家は、観光振興と野生生物・生態系保護のバランスを保つため、この動向を注視している。", "summary_en": "Komodo Island, home to the world-famous Komodo dragons, is experiencing a surge in tourist arrivals. The increase in visitors highlights growing interest in Indonesia's unique natural heritage site. Authorities and conservationists are monitoring the trend to balance tourism growth with wildlife and ecosystem protection.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikwFBVV95cUxOQnVENlpVakhEVnVrUXdKUzdjUVljNjJzQ2pMRnliQTB5Wm4xV01fdEx3Y3JwaWcxc3Z3SUM2U1MyLU9fNHV6MFJ6MTRmN2E1NTBMZlZKU3d0NGZ2VU0yUVBEZzF4NG4xdTE2NmFXVDQ3TDYyMHRQQ1FaeVhDaVFmWkE1ZmpWOHhiNmxRd0NmbnpSdlk?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カタールから贈られた新エアフォースワンにトランプ大統領が初搭乗", "title_en": "Trump Takes First Flight on Qatar-Gifted Presidential Jet", "summary_ja": "ドナルド・トランプ米大統領は、カタールから贈られた豪華なボーイング747に初めて搭乗した。トランプ大統領はこの航空機に興奮を示し、「米国ならこれほどの費用をかけることはしないだろう」と述べ、その豪華さを称賛した。外国からの贈り物に関する憲法上・倫理上の懸念から、この受け入れには批判の声も上がっている。", "summary_en": "U.S. President Donald Trump took his first flight aboard a luxury Boeing 747 gifted by Qatar to serve as Air Force One. Trump expressed excitement about the aircraft, praising its opulence and noting that the U.S. would not spend the amount of money Qatar invested in the plane. The acceptance of the jet has drawn scrutiny over potential constitutional and ethical concerns regarding foreign gifts to the president.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/exciteddonald-trump-takes-first-flight-on-qatar-gifted-air-force-one/article71173852.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラン、ホルムズ海峡でタンカーに自国指定航路の遵守を警告", "title_en": "Iran Warns Oil Tankers to Follow Its Routes in Strait of Hormuz or Face Action", "summary_ja": "イランはホルムズ海峡を航行する石油タンカーに対し、イランが指定する航路に従わなければ行動を取ると警告を発した。またテヘランは、同海峡上空における米軍戦闘機の継続的な存在を非難し、この重要な水路における不安定化要因だと主張した。この警告は、世界の石油供給にとって戦略的に極めて重要な航路における緊張をさらに高めるものとなっている。", "summary_en": "Iran has issued a warning to oil tankers traversing the Strait of Hormuz, demanding they comply with Iranian-designated routes or risk facing consequences. Tehran also condemned the continued presence of U.S. fighter jets over the strait, calling it a source of insecurity in the critical waterway. The warning heightens tensions in one of the world's most strategically vital shipping lanes for global oil supply.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/us-iran-deal-strikes-live-updates-july-2-2026-trump-israel-west-asia-war/article71172891.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国とイランがドーハで「非常に良い」会談、連絡チャンネル設置で合意", "title_en": "U.S. and Iran Hold 'Very Good' Talks in Doha, Agree to Establish Communication Channel", "summary_ja": "米国とイランはカタールのドーハで外交会談を行い、トランプ大統領はこれを「非常に良い」会談と評価した。イラン側の代表団長は、翌日までに正式な連絡チャンネルを設置することで双方が合意したと確認した。この会談は、西アジアの緊張が続く中での注目すべき外交的進展とみられる。", "summary_en": "The United States and Iran held diplomatic meetings in Doha that President Trump described as 'very good.' The Iranian delegation chief confirmed that both sides agreed to establish a formal communication channel by the following day. The talks mark a notable diplomatic development amid ongoing tensions in West Asia.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/us-iran-deal-strikes-live-updates-july-1-2026-trump-israel-west-asia-war/article71168436.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "頼清徳総統：中国の民族統一法に対抗するには国際的支持が不可欠", "title_en": "Lai: International Support Essential to Counter China's Ethnic Unity Law", "summary_ja": "台湾の頼清徳総統は、中国が台湾への行動を正当化するために利用しうる「民族統一法」に対抗するため、国際社会の支持が極めて重要だと強調した。頼総統は、中国からの圧力が高まる中、国際社会に台湾との連帯を呼びかけた。この発言は、潜在的な中国の威圧を抑止するために国際的な連携を活用するという台湾の戦略を浮き彫りにしている。", "summary_en": "Taiwan's President Lai Ching-te has emphasized that international support is critical in countering China's ethnic unity law, which Beijing could use to justify actions against Taiwan. Lai called on the global community to stand with Taiwan as it faces increasing pressure from China. The remarks highlight Taiwan's strategy of leveraging international alliances to deter potential Chinese aggression.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTFBfVVRha3RQbFdNM3hVT3VhU21OUjhOMzR0LTJQX1VHU2dGQkF6c2VaVVR1eGkzcTE3ZWpiSGNfYV9fSjlWYnk1dzNmQ3FsZldacU5hcVRqTQ?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ヤンキース、台湾人投手有望株と100万ドルで契約", "title_en": "Yankees Sign Taiwanese Pitching Prospect for $1 Million", "summary_ja": "ニューヨーク・ヤンキースが台湾人の投手有望株と総額100万米ドルの契約を結んだ。今回の契約は、MLBが台湾の野球人材の発掘・育成に引き続き注目していることを示している。投手の詳細な経歴や入団時期については、まだ明らかにされていない。", "summary_en": "The New York Yankees have signed a Taiwanese pitching prospect to a deal worth US$1 million. The signing highlights continued MLB interest in developing baseball talent from Taiwan. Details about the pitcher's background and timeline for joining the organization have not yet been fully disclosed.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVEFVX3lxTE51blNPT0lEWlJOVEloZm9BdDd5NnB0LWRlbVVhRXJuV0JReE51cDQ2bUxzY0N5cy15MmxtU0xYRWt0U2xYWWZkcFEyZ2FZZUVyYnIyVA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台湾立法院長の韓国瑜、米下院議長と会談し二重課税解消法案への支持求める", "title_en": "Taiwan Legislative Chief Han Kuo-yu Meets U.S. House Speaker to Push Double-Tax Relief Bill", "summary_ja": "台湾の立法院長・韓国瑜氏は米国下院議長と会談し、二重課税解消法案への支持を要請した。この会談は、台米間の経済・立法分野における関係強化に向けた継続的な取り組みを示すものだ。二国間の二重課税解消協定が実現すれば、両国で活動する企業や個人にとって大きな恩恵となる。", "summary_en": "Taiwan's Legislative Yuan President Han Kuo-yu held a meeting with U.S. House Speaker to seek support for a double-taxation relief bill. The meeting underscores ongoing efforts to strengthen economic and legislative ties between Taiwan and the United States. A bilateral tax relief agreement would benefit businesses and individuals operating across both countries.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE1ncFVpRW9rcjllSmRfektFNlZjdWY5dEIxTzBFclNQd0lveXNQMmJjYTVtbWhFWEZrc0YyYnlKX1RFbHQ4R3hLVURsdHdxSzc0TlVQMVJ3UQ?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "地震でベネズエラの移民危機が深刻化、国内避難民が急増", "title_en": "Venezuela's Migration Crisis Worsens as Earthquakes Trigger Internal Displacement", "summary_ja": "少なくとも10年にわたりベネズエラを苦しめてきた強制移住の危機が、約1週間前に同国を襲った地震により新たな局面を迎えた。この災害により国内避難民が急増し、既に深刻な人道的状況がさらに悪化している。長年の経済的・政治的要因による移住問題に、地震による国内避難という新たな課題が加わった形となっている。", "summary_en": "Venezuela's decade-long forced migration crisis has entered a new phase following earthquakes that struck the country nearly a week ago. The disaster has created a growing wave of internally displaced people, compounding an already severe humanitarian situation. The crisis now combines longstanding economic and political displacement with fresh earthquake-driven displacement within the country's borders.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/venezuelas-longstanding-migration-crisis-deepens-after-earthquakes.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ブラジル海軍、ベネズエラ地震の震源地に手術室を備えた野戦病院を開設", "title_en": "Brazil Deploys Navy Mobile Hospital With Surgical Center at Venezuela Earthquake Epicenter", "summary_ja": "ブラジル海軍は、地震による人道危機の震源地となっているベネズエラのラ・グアイラに、手術センターを備えた移動式野戦病院の運営を開始した。フォーリャ・デ・サンパウロの記者が初日の活動を取材し、地元住民がブラジル国旗を掲げたテントに恐る恐る近づく様子を伝えた。今回の展開は、ベネズエラの危機に対するブラジルの重要な人道支援活動とみられている。", "summary_en": "The Brazilian Navy has launched operations of a mobile hospital, including a surgical center, in La Guaira, Venezuela, the area hardest hit by a recent humanitarian crisis caused by earthquakes. A Folha de S.Paulo reporter documented the facility's first day, noting that local residents were initially approaching the Brazilian-flagged tents with caution. The deployment marks a significant humanitarian effort by Brazil to provide medical aid amid Venezuela's ongoing crisis.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/07/brazil-operates-hospital-with-surgical-center-at-the-epicenter-of-venezuelas-crisis.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラのラグアイラ港、地震後に野外遺体安置所と化す", "title_en": "Venezuela's Port of La Guaira Becomes Open-Air Morgue After Deadly Earthquakes", "summary_ja": "先週発生した大地震を受け、ベネズエラの港湾都市ラグアイラの港が野外遺体安置所と化している。沿岸部の瓦礫から収容された遺体は国営港湾施設ボリプエルトに運ばれ、気温30度を超える環境の中、黒いビニール袋に覆われたまま様々な腐敗段階で放置されている。現場を訪れた記者の推計では、少なくとも200体の遺体が安置されていた。", "summary_en": "The port of La Guaira, Venezuela has been converted into an open-air morgue following last week's devastating earthquakes. Bodies recovered from rubble in the coastal municipality are being stored at the state-owned Bolipuerto facility, covered in black bags under temperatures exceeding 30°C and in various stages of decomposition. Reporters on the scene estimated at least 200 bodies were present at the site.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/port-of-la-guaira-venezuela-turns-into-open-air-morgue-after-earthquakes.shtml", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ガバジアビアラ・アデイェミ疑惑：政府が否認した機関の物議を醸す「長官」が潜伏先から発言", "title_en": "Gbajabiamila/Adeyemi Scandal: Disavowed Agency 'DG' Denies Wrongdoing, Calls Govt Response a 'Defence Mechanism'", "summary_ja": "政府が関与を否定した機関の物議を醸す長官、アデイェミ氏が潜伏先からプレミアム・タイムズ紙に対して不正行為を否定した。同氏は、自身に対する政府の対応は正当な監督ではなく「防衛的措置」に過ぎないと主張した。この疑惑はガバジアビアラ下院議長も関係しており、問題の機関とその指導部に大きな注目が集まっている。", "summary_en": "The controversial director-general of a government-disowned agency, Mr. Adeyemi, has spoken to Premium Times from hiding, denying any wrongdoing in the scandal involving Speaker Gbajabiamila. Adeyemi claimed that the government's actions against him amounted to a 'defence mechanism' rather than legitimate oversight. The scandal has drawn significant attention to the agency and its disputed leadership.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/892425-gbajabiamila-adeyemi-scandal-controversial-dg-of-govt-disowned-agency-speaks-from-hiding.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ナイジェリア・ニジェール州の土地紛争で死者18人に", "title_en": "Death Toll Rises to 18 in Niger State Land Dispute", "summary_ja": "ナイジェリア・ニジェール州ゴドロ村で、二つのコミュニティ間の土地紛争により少なくとも18人が死亡した。当初は2人の死者が報告されていたが、その後死者数は大幅に増加した。この紛争は、両コミュニティ間で長年続く領土をめぐる対立が原因とされている。", "summary_en": "A deadly land dispute between two communities in Godoro village, Niger State, Nigeria has claimed at least 18 lives. The crisis, which was initially reported to have caused two deaths, has escalated significantly. The conflict stems from a longstanding territorial disagreement between the two local communities.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/892421-death-toll-climbs-to-18-in-niger-land-dispute.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "偽造裁判中の弁護士オゼコメ氏、英国への6週間の医療渡航を裁判所が許可", "title_en": "Court Grants Lawyer Mike Ozekhome Six-Week Medical Trip to UK Amid Forgery Trial", "summary_ja": "ナイジェリアの裁判所は、著名な弁護士マイク・オゼコメ氏に対し、英国への6週間の医療目的の渡航を許可した。検察側はこの申請に異議を唱えなかった。偽造・なりすまし裁判は9月28日まで延期された。", "summary_en": "A Nigerian court has granted prominent lawyer Mike Ozekhome permission to travel to the United Kingdom for a six-week medical trip. The prosecution did not oppose the request. The forgery and impersonation trial has been adjourned until 28 September.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/892414-forgery-trial-court-grants-mike-ozekhome-permission-for-six-week-medical-trip-to-uk.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国がベネズエラへの連帯を示すと国営メディアが報道", "title_en": "China Shows Solidarity with Venezuela, State Media Reports", "summary_ja": "中国国営メディアの新華社・CGTNは、中国がベネズエラへの支持と連帯を示したと報じている。国営メディアはこれを両国の結束として位置づけているが、具体的な主張の独立した検証は限られている。この報道は、ベネズエラとの関係をめぐる北京の外交的メッセージを反映したものとみられる。", "summary_en": "Xinhua/CGTN reports that China has expressed support and solidarity with Venezuela. State media frames this as a coming-together of the two nations, though independent verification of specific claims is limited. The report reflects Beijing's broader diplomatic messaging around its relationship with Caracas.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://newsus.cgtn.com/news/2026-07-02/China-comes-together-for-Venezuela-1OrrMdsJ332/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国とイランが平和合意と海運再開に向けた実務協議に入ったと報道", "title_en": "US and Iran Enter Technical Talks Aimed at Peace Deal and Shipping Restart", "summary_ja": "国営メディアの新華社・CGTNは、米国とイランが平和合意の実現に向けた実務レベルの協議に入ったと報じている。同報道によれば、協議では海運の正常化再開も議題に含まれるとされているが、独立した情報源による確認は得られていない。合意の内容や時期については、独自に検証されていない。", "summary_en": "Xinhua/CGTN reports that the United States and Iran have entered into technical-level negotiations in pursuit of a peace agreement. The state-controlled outlet reports that the talks also aim to restore normal shipping operations, though independent verification of the talks' scope and progress remains unavailable. The nature and timeline of any potential deal have not been independently confirmed.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-01/news-1OqormjSEh2/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "欧州の熱波が冷却技術の需要を急増させる", "title_en": "Europe's Heatwave Fuels Surge in Demand for Cooling Technology", "summary_ja": "新華社・CGTNによると、欧州全土で熱波が激化しており、エアコンやヒートポンプなどの冷却技術への需要が大幅に高まっているという。同国営メディアは、極端な高温が消費者と各国政府に最新の冷却ソリューションを急速に求めさせていると伝えている。新華社・CGTNはこの動向を、欧州が直面する気候変動の深刻化を示すものとして報じている。", "summary_en": "Xinhua/CGTN reports that intensifying heatwaves across Europe are driving a significant rise in demand for cooling technologies, including air conditioning and heat pumps. State media reports that the extreme temperatures are pushing consumers and governments to seek modern cooling solutions at an accelerating pace. Xinhua/CGTN frames this trend as evidence of growing climate challenges facing the continent.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-29/How-Europe-s-heatwave-is-driving-demand-for-cooling-technology-1OmDdWzGHSw/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "最大6800万バレルのイラン産原油が行き先不明のまま洋上に滞留", "title_en": "Up to 68 Million Barrels of Iranian Oil Floating at Sea With No Clear Destination", "summary_ja": "国営メディアのTASS/RTは、ブルームバーグの報道を引用し、最大6800万バレルのイラン産原油が現在洋上の船舶に滞留していると伝えている。同メディアによれば、これらの貨物の90%以上が明確な目的地を持たない状態にあるという。この報告は、国際制裁が続く中でイラン産原油の輸出が依然として深刻な課題に直面していることを浮き彫りにしている。", "summary_en": "TASS/RT reports that up to 68 million barrels of Iranian oil are currently held on vessels at sea, according to Bloomberg. State-controlled media further relays that more than 90% of this cargo lacks a clear destination, suggesting significant uncertainty in Iranian oil distribution. The report highlights continued challenges surrounding Iranian oil exports amid ongoing international sanctions.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2154473", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ラブロフ外相、日本にはロシアとの協力支持者がまだいると主張", "title_en": "Lavrov Claims Japan Still Has Supporters of Russia Cooperation", "summary_ja": "ロシア国営メディアTASS/RTによると、ラブロフ外相は日本にはロシアとの協力を支持する人々がまだ存在すると述べたと報じている。同外相のメッセージは、東京のロシア大使館で開催された展覧会の開幕式で読み上げられた。ロシア国営メディアはこれを、外交的緊張が続く中でも二国間関係への関心が残っている証しとして伝えている。", "summary_en": "Russian state media TASS/RT reports that Foreign Minister Sergei Lavrov believes supporters of cooperation with Russia still exist in Japan. Lavrov's message was delivered at the opening ceremony of an exhibition held at the Russian Embassy in Tokyo. Russian state media frames this as a sign of continued interest in bilateral relations despite current diplomatic tensions.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2154471", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "南オセチア・アブハジア・ロシア、グルジアのNATO統合加速に懸念表明", "title_en": "South Ossetia, Abkhazia & Russia Raise Concerns Over Georgia's NATO Integration Push", "summary_ja": "TASS・RTによると、ジュネーブの国連万国宮殿で7月1日、南コーカサスの安全保障と安定に関するジュネーブ国際協議の第67回会合が閉幕した。同メディアは、南オセチア、アブハジア、ロシアがグルジアのNATO統合の加速に懸念を示したと伝えている。会議では南コーカサス地域の安全保障と安定に関する幅広い問題が議論されたとされる。", "summary_en": "TASS/RT reports that the 67th round of the Geneva International Discussions on Security and Stability in the South Caucasus concluded on July 1 at the UN Palace of Nations in Geneva. State media reports that South Ossetia, Abkhazia, and Russia voiced concern over what they describe as Georgia's accelerating integration with NATO. The outlet claims the discussions addressed broader security and stability issues in the South Caucasus region.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2154467", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アゼルバイジャンに訪れる民主主義への転換点", "title_en": "A Democratic Opening for Azerbaijan", "summary_ja": "著者は、2026年6月にパシニャン首相が明確な親欧米路線を掲げて勝利したアルメニアの議会選挙が、南コーカサスに新たな地政学的ダイナミクスをもたらすと主張する。このロシアの影響力からの脱却により、隣国アゼルバイジャンは米国・欧州との戦略的パートナーシップを深める好機を得た。しかし著者は、適切な条件が整わなければ、こうした西側諸国との連携がアゼルバイジャン国民に真の恩恵をもたらさない可能性があると警告している。", "summary_en": "The author argues that Armenia's June 2026 parliamentary election, won by Pashinyan on a clear pro-Western foreign policy platform, creates a new geopolitical dynamic in the South Caucasus. This shift away from Russian influence positions neighboring Azerbaijan to deepen strategic partnerships with the US and Europe. However, the author cautions that without proper conditions, such Western partnerships may fail to meaningfully benefit ordinary Azerbaijanis.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/armenia-election-and-strategic-partnerships-with-west-create-opportunities-for-democratization-in-azerbaijan-by-ali-karimli-2026-07", "state_media": false, "category": "オピニオン", "full_text": "A Democratic Opening for Azerbaijan\n                        With Armenia's recent elections likely to usher in an era of greater stability—and less Russian influence—in the South Caucasus, neighboring Azerbaijan is well-positioned to deepen cooperation with the US and Europe. But without appropriate conditions, new strategic partnerships with the West could fail to deliver for Azerbaijanis.\n                    \n                        BAKU—Prior to his party’s victory in the June 2026 parliamentary election, Prime Minister Nikol Pashinyan had already led Armenia for eight years. But in neither of the two previous elections (2018 and 2021) did he campaign on a foreign-policy platform as clear—or as infuriating to Russia—as he did this time around.\n        https://prosyn.org/o9mpwm0", "translation_ja": "アゼルバイジャンに訪れる民主主義への転換点\n\nアルメニアの最近の選挙が南コーカサスにおける安定の時代—そしてロシアの影響力の後退—をもたらす可能性が高まる中、隣国アゼルバイジャンは米国および欧州との協力関係を深める好位置につけている。しかし、適切な条件が伴わなければ、西側諸国との新たな戦略的パートナーシップはアゼルバイジャン国民に恩恵をもたらさないまま終わりかねない。\n\nバクー発―2026年6月の議会選挙で党が勝利を収める以前から、ニコル・パシニャン首相はすでに8年間アルメニアを率いてきた。しかし過去2回の選挙（2018年と2021年）のいずれにおいても、今回ほど明確な—そしてロシアをこれほど苛立たせる—外交政策の公約を掲げて選挙戦に臨んだことはなかった。", "vocab": [{"word": "usher in", "definition": "新たな時代や状況を「導き入れる・到来させる」という意味のイディオム。変化や新時代の始まりを表す際に用いられる。"}, {"word": "geopolitical", "definition": "地理的条件が政治・国際関係に与える影響に関する「地政学的な」という形容詞。国際ニュースや外交文脈で頻出する専門用語。"}, {"word": "parliamentary", "definition": "議会に関係する「議会の・議院内閣制の」という形容詞。政治制度や選挙の文脈で使われる重要な語。"}, {"word": "infuriating", "definition": "人を激しく怒らせる・憤慨させるという意味の形容詞。単なる不満ではなく強い怒りを引き起こすニュアンスを持つ。"}, {"word": "strategic partnerships", "definition": "共通の利益や目標に基づいて構築される「戦略的パートナーシップ」。外交・ビジネス・安全保障の文脈で頻繁に使われる複合名詞。"}, {"word": "platform", "definition": "政党や候補者が選挙で掲げる「政策綱領・公約」という意味の政治用語。選挙運動の文脈で特によく使われる。"}]}, {"title_ja": "欧州経済の誤った測り方", "title_en": "The Mismeasure of Europe's Economy", "summary_ja": "著者は、欧州と米国の生産性格差をめぐる議論は本質的な問題を見逃していると主張する。両経済圏は全く異なるメカニズムで富を生み出しており、欧州は蓄積された資産に依存し、米国は新たな資産の継続的な創出に頼っている。この盲点が、蓄積された遺産を新たな成長に転換するという欧州の真の課題を見えにくくしている。", "summary_en": "The author argues that the debate over Europe's productivity gap with the US misses the fundamental point: the two economies create wealth through entirely different mechanisms. Europe derives wealth from accumulated assets and inheritance, while the US continuously creates new assets. This blind spot in conventional economic measurement obscures Europe's real challenge of converting its existing wealth into new growth.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/real-reason-europe-appears-less-productive-than-america-by-sami-mahroum-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Mismeasure of Europe’s Economy\n                        While Nobel laureate economists Paul Krugman and Philippe Aghion disagree over how to measure Europe’s productivity gap with the United States, both overlook the value of its accumulated assets. That blind spot obscures the real story: Europe is living off a remarkable inheritance it has yet to convert into new growth.\n                    \n                        DUBAI—The debate over European competitiveness has long focused on the widening gap with the United States. But that is the wrong question. What matters is not whether the gap is widening, but the fundamentally different mechanisms through which each economy creates wealth: Europe derives much of its wealth from accumulated assets; the US relies on the continual creation of new ones.\n        https://prosyn.org/zsfkkQx", "translation_ja": "欧州経済の誤った測り方\n\nノーベル賞受賞経済学者のポール・クルーグマンとフィリップ・アギヨンは、欧州と米国の生産性格差の測定方法をめぐって意見が対立しているが、両者ともに欧州が蓄積してきた資産の価値を見落としている。この盲点こそが、真の実態を覆い隠している。欧州は、いまだ新たな成長へと転換できていない驚くべき「遺産」を食いつぶして生きているのだ。\n\nドバイ発――欧州の競争力をめぐる議論は長らく、米国との拡大する格差に焦点を当ててきた。しかし、それは問いかけの立て方が間違っている。重要なのは格差が拡大しているかどうかではなく、それぞれの経済が富を生み出す根本的に異なるメカニズムにある。欧州はその富の大部分を蓄積された資産から引き出しており、米国は新たな資産の継続的な創出に依存している。", "vocab": [{"word": "mismeasure", "definition": "誤って測定すること、または不正確な評価を行うこと。名詞・動詞両方で使われ、経済や社会指標の文脈で「測定の誤り」を指す場合が多い。"}, {"word": "productivity gap", "definition": "生産性格差のこと。二国間または二地域間における単位労働あたりの生産量の差異を指す経済用語。"}, {"word": "accumulated assets", "definition": "長期にわたって蓄積された資産のこと。インフラ、文化的資本、不動産など有形・無形の蓄積財を広く指す。"}, {"word": "blind spot", "definition": "「盲点」を意味し、気づかれていない弱点や見落とされている重要な点を指す慣用表現。分析や議論の欠落部分に使われる。"}, {"word": "competitiveness", "definition": "競争力のこと。国や企業が市場において他者と比較してどれだけ効率的・効果的に競争できるかを示す概念。"}, {"word": "inheritance", "definition": "本来は「遺産・相続財産」を意味するが、経済の文脈では過去の世代から引き継いだ有形・無形の資産や制度的蓄積を比喩的に指す。"}]}, {"title_ja": "NATOは防衛市場を必要としている", "title_en": "NATO Needs a Defense Market to Build Military-Industrial Capacity", "summary_ja": "著者は、NATO加盟国が真の軍事力を強化するためには、防衛費の増額や調達改善にとどまらず、より根本的な変革が必要だと主張する。第二次世界大戦中にカナダが成し遂げた驚異的な軍事産業の変革を模範として挙げ、産業能力の拡大には統合的なアプローチが不可欠だと論じる。NATOの統一防衛市場の創設が、政治的コミットメントを実質的な軍事力へと転換する鍵であると提唱している。", "summary_en": "The author argues that NATO members must go beyond increasing defense spending and improving procurement to truly strengthen their military capabilities. Drawing on Canada's remarkable World War II industrial transformation as a model, the piece contends that expanding industrial capacity requires a fundamentally different, more integrated approach. A unified NATO defense market is proposed as the key mechanism to convert political commitment into real military power.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/nato-defense-market-is-necessary-for-the-development-of-industrial-capacity-by-fiona-e-murray-and-robert-murray-2-2026-07", "state_media": false, "category": "オピニオン", "full_text": "NATO Needs a Defense Market\nandTo convert NATO members' resources into military capabilities, setting defense as a strategic priority, increasing spending, and improving procurement systems are all steps in the right direction. But member countries will need to expand their industrial capacity—and that requires much more.\nBOSTON—When World War II began in 1939, Canada had almost no meaningful military industry. Six years later, Canadian factories had produced thousands of aircraft, hundreds of naval vessels, and more than 800,000 military vehicles. A country of just 11 million people had become a military-industrial powerhouse.", "translation_ja": "NATOは防衛市場を必要としている\n\n NATO加盟国のリソースを軍事力へと転換するために、防衛を戦略的優先事項として設定し、支出を増やし、調達システムを改善することは、いずれも正しい方向への一歩である。しかし加盟国は産業能力を拡大する必要があり、そのためにはさらに多くのことが求められる。\n\nボストン発――1939年に第二次世界大戦が始まったとき、カナダにはほとんど意味のある軍事産業が存在しなかった。それから6年後、カナダの工場は数千機の航空機、数百隻の艦艇、そして80万台以上の軍用車両を生産していた。人口わずか1100万人の国が、軍事産業の大国へと変貌を遂げたのである。", "vocab": [{"word": "procurement", "definition": "調達。政府や軍が物資・サービスを公式な手続きを経て購入・確保するプロセスを指す専門用語。防衛・ビジネス文脈で頻出。"}, {"word": "military-industrial", "definition": "軍事産業の（複合形容詞）。軍事力の維持・拡大を支える産業基盤と軍・政府との関係を表す際に使われる政治・経済用語。"}, {"word": "powerhouse", "definition": "強力な力や影響力を持つ国・組織・人物を指す比喩的表現。「経済大国」「産業の雄」などと訳されることが多い。"}, {"word": "convert", "definition": "（資源・能力などを）別の形や目的へと転換・変換する。ここでは政治的・財政的リソースを実質的な軍事力へ変えることを意味する。"}, {"word": "industrial capacity", "definition": "産業能力・生産能力。一国の産業が製品を生産できる最大規模や潜在力を指す経済・安全保障上の重要概念。"}]}, {"title_ja": "アメリカ建国250周年を祝おう――それでも、次の250年への希望を胸に", "title_en": "Let Us Celebrate America's 250th Birthday — and Hope for Another 250 Years", "summary_ja": "著者フランシン・プローズは、2026年7月4日に迎えるアメリカ建国250周年は祝うに値するとしながらも、トランプ政権による報道の自由・言論の自由・選挙権など民主主義的自由の組織的な侵食によって、その喜びが影を潜めていると論じる。1976年の建国200周年当時の希望に満ちた雰囲気と、1月6日の議会襲撃を彷彿とさせる現在の権威主義的な政治風土を対比させている。それでも彼女は、民主主義が直面する脅威を正直に認識しながらも、その存続への希望を掲げた記念式典を求めている。", "summary_en": "Author Francine Prose argues that while America's 250th birthday on July 4, 2026 deserves celebration, the occasion is overshadowed by the Trump administration's systematic erosion of democratic freedoms including press freedom, free speech, and voting rights. She contrasts the hopeful atmosphere of the 1976 bicentennial with today's troubling political climate, marked by authoritarian tendencies and rhetoric reminiscent of January 6. Despite her concerns, Prose calls for a commemoration that honestly acknowledges democracy's current threats while still toasting to hope for its survival.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/02/us-anniversary-250", "state_media": false, "category": "オピニオン", "full_text": "One reason to celebrate America’s national big birthday – our 250th on the Fourth of July – is to honor the unusual longevity of our democratic experiment. Democracies rarely last, but ours has. Even if we know its flawed history – the land grab and slaughter of the indigenous population; slavery; enduring racial, gender and economic inequalities – it’s hard to fault the admirable, high-minded idealism of the Bill of Rights and the US constitution.\nI’m all for celebrating democracy. The bicentennial was fun. I lived outside a small rural town where there was a parade, a fife and drum corps, tricornered hats, flags and fireworks. Then president Gerald Ford had sponsored civil rights legislation. Roe v Wade was three years old. There were brilliant and honorable judges serving on the US supreme court. The Vietnam war had ended. Obviously there were problems: our growing military presence in Central America, the bankrupting and colonization of American inner cities, growing disparities. Even so, there was a hope in the air, a sense that things might be looking up.\nBut I’m a little unsure of how the birthday party will go on 4 July 2026, when Donald Trump and his minions celebrate the 250th anniversary of a democracy they have rapidly and intentionally made less democratic. Week by week, law after law, ruling after ruling, we’ve watched many of our constitutional freedoms – the cornerstones on which is democracy is built – compromised, eroded or obliterated.\nFreedom of the press has given way to censorship and the installation of biased political operatives in place of investigative journalists. Our freedom of speech has been diminished with every political protester who has been silenced, assaulted, arrested and in some cases deported.\nOur legal guarantees – habeas corpus, the right to a fair and speedy trial – are rapidly disappearing in the rear-view mirror. And the schemes to redraw election maps have threatened to scrap the most basic element of a democratic system: the right to vote in a fair election.\nAfter a certain age, we may all feel a slight anxiety about an approaching birthday, but only the senior citizen in the White House has responded with an accelerating storm of tweets and messages steeped in hostility, aggression, vituperation, grandiosity and claims without a minimal relation to the truth.\nPlans for a patriotic concert fell through when number of musicians declined the gig. In its stead, Trump has floated the idea of a Maga rally, hardly the sort of event that will reflect a unified nation, and the spirit of inclusiveness and mutual tolerance to which we have aspired.\nWe can expect an emphasis on the military, shows of force that are a far cry from the high school drum corps that swung down Main Street 50 years ago. Soldiers marching in lockstep beneath screaming fighter planes are familiar features of the public face of an autocracy.\nWeirdest of all was the UFC cage fight on the White House south lawn. It’s painful and embarrassing to imagine the ghosts of Thomas Jefferson and Benjamin Franklin joining tens of thousands of Americans watching fighters punching, kicking and wrestling inside an octagonal enclosure.\nPerhaps what’s most alarming is that some have heard, in Donald Trump’s pre-birthday rhetoric, echoes of the speech that preceded the January 6 insurrection.\nI like summer holidays: fireworks, barbecue, back-yard gatherings. And I’ll be glad to celebrate the fact that our country has survived any number of threats from within and without, though none exactly like the dangers we face now. Surely it’s possible to enjoy the occasion and still be mindful of the ways in which the democracy we are honoring is being dismantled.\nThe ideal would be to combine the merriment – the speeches, the parades, the music – with a true commemoration of the reasons why we fought to overthrow a monarchy and why a nation of immigrants came here to find peace, security and the promise of better lives.\nLet the people addressing the crowds – the small-town and big-city mayors, the political, religious and community leaders – pause a moment to read aloud the Bill of Rights, to remind us of what the constitution says, what it advises and promises.\nMaybe some brave speaker will risk being a buzzkill and remind the crowds that we are waging an extremely costly and senseless war, holding tens of thousands in detention centers, much like concentration camps; we are advancing programs and policies that are hardly the expression of the democratic ideal. And let’s emphasize our hopes that in another half-century we’ll still actually have a democracy that has not just endured but triumphed.\nWithout losing our sense of the moment, let’s raise a toast to another 250 years. Let’s cheer for a future in which the antidemocratic forces and authoritarian tendencies subside and we can come closer to the dream of what – in the best-case scenario – a democracy can provide for its citizens, one and all.\nLet’s wish a rousing hap", "translation_ja": "アメリカの建国記念日という大きな節目――7月4日に迎える250周年――を祝う理由のひとつは、私たちの民主主義的実験が異例なほど長く続いてきたことを称えるためだ。民主主義はめったに長続きしないが、アメリカのそれは続いてきた。先住民族の土地収奪と虐殺、奴隷制度、人種・ジェンダー・経済的な不平等が今も続くという欠陥だらけの歴史を知っていたとしても、権利章典と合衆国憲法に込められた崇高な理想主義を称えることに異議を唱えるのは難しい。\n\n私は民主主義を祝うことに大賛成だ。建国200周年は楽しかった。私は小さな田舎町の郊外に住んでいて、パレードがあり、フィフェ（横笛）とドラムの楽団があり、三角帽子があり、旗と花火があった。当時の大統領ジェラルド・フォードは公民権法案を支持していた。ロー対ウェイド判決はまだ3年しか経っていなかった。優秀で誠実な判事たちが連邦最高裁判所で職務に就いていた。ベトナム戦争は終結していた。もちろん問題もあった。中央アメリカへの軍事的関与の拡大、アメリカの都市部の荒廃と植民地化、広がる格差。それでも空気の中に希望があり、物事が好転するかもしれないという感覚があった。\n\nしかし、2026年7月4日の誕生日パーティーがどうなるか、私は少し不安を感じている。ドナルド・トランプとその取り巻きたちが、自分たちが急速かつ意図的に非民主的にしてきた民主主義の250周年を祝うのだから。週を追うごとに、法律の一つひとつ、判決の一つひとつが積み重なり、私たちは民主主義を支える礎石である多くの憲法上の自由が妥協させられ、侵食され、あるいは消し去られていくのを目の当たりにしてきた。\n\n報道の自由は検閲に取って代わられ、調査報道記者の代わりに偏った政治的工作員が据えられた。政治的な抗議者が沈黙させられ、暴行を受け、逮捕され、場合によっては国外追放されるたびに、私たちの言論の自由は縮小されてきた。\n\n人身保護令状、公正かつ迅速な裁判を受ける権利といった法的保障は、急速にバックミラーの中に消えていこうとしている。そして選挙区割りを変更する計画は、民主主義制度の最も基本的な要素である「公正な選挙での投票権」を廃棄しようと脅かしている。\n\nある年齢を過ぎると、近づいてくる誕生日に多少の不安を感じることは誰にでもあるだろう。しかし、ホワイトハウスに住む高齢の入居者だけが、敵意・攻撃性・罵倒・誇大妄想、そして事実との最低限の関係すらない主張に満ちたツイートやメッセージの嵐を加速させることで反応している。\n\n愛国的なコンサートの計画は、多くのミュージシャンが出演を断ったことで頓挫した。その代わりにトランプが浮かべたのはMAGAラリーという案だが、それは一致団結した国家と、私たちが目指してきた包摂性と相互寛容の精神を反映するような催しとはとても言えない。\n\n軍事力の誇示が前面に出ることが予想される。50年前にメインストリートを行進した高校のドラム隊とは程遠い、力の誇示だ。戦闘機が上空を轟音で飛び交う中、整然と行進する兵士たちは、独裁政治の公的な顔としておなじみの光景だ。\n\n最も奇妙だったのは、ホワイトハウスの南庭で開かれたUFCの格闘試合だ。トーマス・ジェファーソンとベンジャミン・フランクリンの亡霊が、何万人ものアメリカ人とともに八角形の囲いの中で選手たちが殴り合い、蹴り合い、取っ組み合う様子を見守っている姿を想像すると、痛ましく恥ずかしい気持ちになる。\n\nおそらく最も憂慮すべきことは、一部の人々がドナルド・トランプの誕生日前の言説の中に、1月6日の議会襲撃に先立つ演説のこだまを聞いているという事実だ。\n\n私は夏の祝日が好きだ。花火、バーベキュー、庭での集まり。そして、内外からのさまざまな脅威を乗り越えてこの国が生き延びてきたことを喜んで祝いたい――ただし、今私たちが直面している危険は、これまでとまったく異なる種類のものだが。この祭典を楽しみながら、私たちが讃えようとしている民主主義が解体されつつある現実を心に留めることは、きっと可能なはずだ。\n\n理想を言えば、祝賀の雰囲気――演説、パレード、音楽――を、なぜ私たちが君主制を打倒するために戦ったのか、そしてなぜ移民たちの国である私たちがここに平和と安全、そしてより良い生活への約束を求めてやってきたのかを真に追悼することと組み合わせるべきだろう。\n\n群衆に語りかける人々――小さな町や大都市の市長、政治的・宗教的・地域的指導者たち――には、少しの間立ち止まって権利章典を声に出して読み、憲法が何を語り、何を助言し、何を約束しているかを私たちに思い起こさせてほしい。\n\nもしかしたら、勇気ある語り手が、場を白けさせるリスクを冒して、私たちが非常にコストの高い、無意味な戦争を続けていること、何万人もの人々を強制収容所に似た収容施設に拘束していること、私たちが推進している政策や施策が民主主義の理想の表れとはとても言えないことを群衆に思い起こさせてくれるかもしれない。そして、50年後にも私たちが実際に、ただ耐えるだけでなく勝利を収めた民主主義を持っているという希望を強調しよう。\n\n今この瞬間の感覚を失うことなく、次の250年に向けてグラスを掲げよう。反民主主義的な勢力と権威主義的な傾向が後退し、最良のシナリオにおいて民主主義がすべての市民一人ひとりに提供できる夢に、私たちがより近づける未来に向かって歓呼の声を上げよう。\n\n心からのお祝いを叫ぼう――", "vocab": [{"word": "vituperation", "definition": "激しい非難や罵倒を意味する名詞。口頭または文書による攻撃的で侮辱的な言葉を指す。例：「His speech was filled with vituperation against his opponents.（彼の演説は対立者への激しい罵倒に満ちていた）」"}, {"word": "habeas corpus", "definition": "ラテン語由来の法律用語で「人身保護令状」を意味し、不当な拘禁から個人を守る憲法上の権利を指す。「You shall have the body（その身体を持ってこい）」を語源とし、裁判所が拘禁の合法性を審査することを求める。"}, {"word": "grandiosity", "definition": "自己の重要性や能力を誇大に見せようとする傾向や態度を意味する名詞。しばしば自己陶酔的な人物の言動を描写する際に使われる。"}, {"word": "vituperation", "definition": "激しい口頭または文書による非難・罵倒を表す名詞。政治的文脈では指導者の攻撃的で侮辱的な言説を指すことが多い。"}, {"word": "insurrection", "definition": "政府や権力に対する武装した反乱・暴動を意味する名詞。2021年1月6日のアメリカ議会襲撃事件を指す文脈でしばしば用いられる。"}, {"word": "commemoration", "definition": "重要な出来事や人物を記念・追悼するための式典や行為を意味する名詞。単なる「お祝い（celebration）」よりも、歴史的意義を深く反省・記憶する含意がある。"}, {"word": "obliterated", "definition": "完全に消し去られた・跡形もなく破壊されたことを意味する動詞obliterateの過去分詞形。権利や制度が完全に廃止・抹消されるという文脈で使われる。"}]}, {"title_ja": "トランプ政権は中世の宮廷か――21世紀の民主主義を脅かす権力集中", "title_en": "Trump's Presidency Resembles a Medieval Court, Threatening U.S. Constitutional Order", "summary_ja": "ガーディアン紙の社説は、トランプ大統領が大統領職を個人的な利益と無制限の権力の源泉として扱っており、その政権は近代民主主義政府ではなく封建的な宮廷に近いと論じている。就任以来20億ドルに上る個人収益や、行政府の権限を拡大する一連の最高裁判決を例に挙げ、三権分立の形骸化を批判する。社説は最終的に、最高裁改革と憲法上の抑制・均衡の回復に向けた議論の必要性を訴えている。", "summary_en": "The Guardian's editorial argues that Trump treats the presidency as a source of personal enrichment and unlimited power, likening his administration to a feudal court rather than a modern democratic government. The piece highlights $2 billion in personal earnings since returning to office and a series of Supreme Court rulings that have largely expanded executive power at the expense of independent institutions. The editorial concludes that the erosion of checks and balances demands urgent debate about Supreme Court reform and reasserting constitutional constraints.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/01/the-guardian-view-on-trumps-wealth-and-power-a-medieval-court-wreaks-havoc-in-the-21st-century", "state_media": false, "category": "オピニオン", "full_text": "Donald Trump is not known for his reverence for the US constitution. But in his second term, he is doubling down on his claim from the first: that the text grants him “the right to do whatever I want as president”.\nThis is, to put it mildly, an extremely unusual interpretation of article 2. But it is the thread that draws together the headlines dominating recent days: a spate of supreme court rulings, mostly to his benefit, and the revelation that he has raked in $2bn since returning to office, half of it from cryptocurrencies.\nThe 927-page document released on Tuesday by the US Office of Government Ethics sets out a dizzying array of income – not only from golf courses and Trump-branded bibles, but also from crypto, which he has relentlessly promoted, and lucrative overseas deals. Tribute flows from foreign nations. On Wednesday he took his first flight on the Boeing 747 gifted by Qatar.\nThe White House claim that there’s no conflict of interest over his enrichment is the corollary of his belief that there is no significant distinction between Trump the 47th president and Trump the man. Max Weber wrote that the bureaucracy of the modern state “segregates official activity … from the sphere of private life”, with relationships administered according to rules rather than “individual privileges and bestowal of favour”, while “office holding is not a source to be exploited for rents or emoluments, as was normally the case during the Middle Ages”. Mr Trump has turned the clock back, reinventing the modern executive as a feudal court.\nThe supreme court sometimes rejects his maximalism, but far too rarely, and often when it affects Wall Street – as with tariffs or, this week, in rebuffing Mr Trump’s attempt to fire Lisa Cook as a Federal Reserve governor without cause. Its rejection of his challenge to birthright citizenship was necessary and welcome, but a very low bar to clear.\nThe court was right to defend the Fed; that makes it all the harder to justify giving the president sweeping control to fire the heads of formerly independent agencies at will, overturning a 1935 ruling. Authorising the administration’s ending of temporary protected status (TPS) for migrants is a terrible blow to tens of thousands of Haitians and Syrians, and beyond them, the 1.3 million people who could face deportation to countries that the US recognises as unsafe. But the broader implications are also alarming. The question for the supreme court was not whether the executive can ever terminate TPS, but whether it can be challenged when it fails to do so as required in law. The majority found against the right to recourse to the courts when the executive overreaches.\nCarefully separated powers are being reintegrated, as legislation is ignored and the judiciary falls in line. As Justice Ketanji Brown Jackson wrote last year of the court’s recent tendencies: “This Administration always wins.” The case for supreme court reform is growing – thanks primarily to the actions of the court itself. These arguments deserve to be heard.\nWhat really distinguishes Mr Trump’s court of fiat and favourites from its historical precedents is its sheer reach and impact, as evinced by the illegal Iran war. Important constraints of course remain, and must be defended. But as the US celebrates 250 years of independence under a president who wields more power than any monarch, it must ask itself how to reassert the checks he has destroyed.\n- \n  Do you have an opinion on the issues raised in this article? If you would like to submit a response of up to 300 words by email to be considered for publication in our letters section, please click here.", "translation_ja": "ドナルド・トランプは米国憲法への敬意で知られる人物ではない。しかし第2期政権において、彼は第1期から主張し続けてきた「憲法の条文が大統領として何でもする権利を自分に与えている」という持論をさらに強めている。\n\nこれは控えめに言っても、第2条の極めて異例な解釈である。しかしこの解釈こそが、近日のニュースを席巻している一連の出来事をつなぐ糸となっている。すなわち、多くがトランプに有利な最高裁の一連の判決と、彼が政権復帰以来20億ドルを手にしたという暴露――その半分は暗号通貨から――である。\n\n米国政府倫理局が火曜日に公開した927ページにわたる文書は、めくるめくような収入源の一覧を示している。ゴルフコースやトランプブランドの聖書だけでなく、彼が精力的に推進してきた暗号通貨や、利益の大きな海外取引も含まれる。外国からの貢ぎ物も流れ込んでいる。水曜日には、カタールから贈られたボーイング747に初めて搭乗した。\n\n彼の致富について利益相反はないというホワイトハウスの主張は、第47代大統領としてのトランプと人間としてのトランプの間に本質的な区別はないという彼自身の信念の帰結である。マックス・ウェーバーは、近代国家の官僚制は「公的な活動を……私的生活の領域から切り離し」、関係を個人的な特権や恩恵の付与ではなく規則に従って管理し、「中世において通常そうであったように、官職が地代や報酬のために搾取される源泉とはならない」と書いた。トランプ氏は時計の針を逆戻りさせ、近代的な行政府を封建的な宮廷として再発明している。\n\n最高裁は時にトランプの最大主義を退けるが、それはあまりにもまれであり、多くの場合ウォール街に影響する問題においてのみである――関税問題や、今週、トランプ氏が正当な理由なく連邦準備制度理事会の理事リサ・クックを解任しようとした試みを退けた件がそれにあたる。出生地主義に基づく市民権に対する彼の異議申し立てを退けたことは必要かつ歓迎すべきことだったが、乗り越えるべきハードルとしては非常に低いものだった。\n\n最高裁が連邦準備制度を守ったことは正しかった。だからこそ、1935年の判決を覆し、大統領がかつては独立していた機関の長を自由に解任できる広範な権限を与えることを正当化するのはなおさら難しい。移民への一時的保護資格（TPS）の廃止を認可したことは、数万人のハイチ人とシリア人に、そしてさらにその先にいる、米国が危険と認める国々への強制送還に直面しうる130万人の人々に対する甚大な打撃である。しかし、より広範な含意もまた憂慮すべきものである。最高裁に問われていたのは、行政府がTPSを終了できるかどうかではなく、法律の定める手続きを踏まずにそうした場合に司法審査を求めることができるかどうかという点だった。多数意見は、行政府が権限を逸脱した際に司法に訴える権利を認めなかった。\n\n慎重に分立されていた権力は再統合されつつあり、法律は無視され、司法は服従しつつある。最高裁判事ケタンジ・ブラウン・ジャクソンが昨年の法廷の最近の傾向について書いたように、「この政権は常に勝つ」のである。最高裁改革の論拠は高まっている――それは主として最高裁自身の行動によるものだ。これらの議論は耳を傾けられるべきである。\n\nトランプ氏の勅令と寵臣による宮廷が歴史的な先例と本当に異なる点は、その絶大な影響力と射程距離であり、違法なイランとの戦争がそれを示している。もちろん重要な制約は残存しており、それらは守られなければならない。しかし建国250周年を祝う米国は、かつてのいかなる君主よりも大きな権力を振るう大統領のもとで、自ら破壊された抑制・均衡をいかに取り戻すかを問い直さなければならない。", "vocab": [{"word": "maximalism", "definition": "最大限主義。ここでは政治的・法的な要求を極限まで押し広げようとするトランプの姿勢を指す。「maximal（最大限の）」の名詞形で、交渉や政策において妥協なく最大限を求める立場を表す。"}, {"word": "emoluments", "definition": "職務上の報酬・利益。公職や役職に就くことで得られる給与や利益を指す法律・フォーマルな語。米国憲法の「エモルメント条項」でも使われる重要な法的用語。"}, {"word": "corollary", "definition": "当然の帰結・系論。ある命題や状況から自然に導かれる結論を意味する語。数学や論理学由来だが、論説文でも論理的な結果関係を示す際に用いられる。"}, {"word": "bestowal", "definition": "授与・付与。何かを贈り与える行為を指すやや格式ある名詞。ここでは個人的な恩恵を気まぐれに与えることを指し、近代官僚制と対比される中世的な権力行使を描写するために使われている。"}, {"word": "recourse", "definition": "頼ること・訴える手段。困難な状況で助けや解決策を求める行為を指す。法律文脈では「司法に訴える権利（recourse to the courts）」として使われ、救済手段を意味する重要な法律用語。"}, {"word": "evinced", "definition": "明示した・証明した（evince の過去形）。ある事実や特性を明らかに示すことを意味するフォーマルな動詞。日常会話ではほとんど使われないが、論説・学術文章で証拠を示す文脈で用いられる。"}, {"word": "fiat", "definition": "勅令・独断的命令。権威者が審議や同意なしに一方的に下す命令を指すラテン語由来の語。「court of fiat」は独断と命令で動く宮廷を意味し、民主的手続きの欠如を批判する文脈で使われている。"}]}, {"title_ja": "トランプは数十億ドルを手にしたが、愛も尊敬も買えない――真のトランプ的悲劇", "title_en": "Trump Has Billions But Can't Buy Love or Respect, a Truly Trumpian Tragedy", "summary_ja": "コラムニストのエマ・ブロックスは、トランプが2025年に22億ドル以上の収益を上げた一方で、その富の多くは暗号資産企業やメディアとの和解など政治的影響力を通じて得られたものだと論じる。しかし、彼の支持率は39%に低迷し、リンカーン記念館の反射池に藻が繁殖する失態や不人気な国家フェアなど、小さな失敗が続いている。ブロックスはこれを寓話的な皮肉として描く――トランプはついに富を手にしたが、かつてないほど嘲笑され、尊敬を失っているというのだ。", "summary_en": "Columnist Emma Brockes argues that while Trump has amassed over $2.2 billion in revenue in 2025—largely through politically influenced deals involving crypto firms and media settlements—this wealth has come at the cost of public admiration. She contends that Trump's lifelong twin desires for money and universal praise are now in direct conflict, as his approval rating sits at 39% and his presidency is marked by petty failures like algae in the Lincoln Memorial pool and a poorly attended national fair. Brockes frames this as a fable-like moral irony: Trump finally has the wealth he always craved, but is more mocked and disrespected than ever.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/01/donald-trump-billions-of-dollars-reflecting-pool-washington-dc-algae-state-fair", "state_media": false, "category": "オピニオン", "full_text": "From certain angles, it might appear as if President Trump is having a tough month. He messed up the renovation of the Lincoln Memorial reflecting pool, which he blamed on acts of vandalism no one has been able to stand up. The supreme court rejected both his bid to appeal against the $5m (£3.8m) civil judgment against him for defaming and sexually abusing E Jean Carroll, and his executive order to end birthright citizenship. And the war with Iran keeps rumbling on. And yet, after Trump’s mandatory financial disclosure report was released on Tuesday, headlines drew attention to the fact the president made more than $2.2bn in revenue in 2025 – more than three times what he pulled in the year before his inauguration. Contrary to appearances, perhaps everything is going exactly to plan.\nIt is always a question with Trump as to how much the wealth he has accrued in his second term in office is the spoils of strategy rather than the lucky result of his scattergun but industrial-scale hustle. Looking at the numbers in his financial report, one is reminded that before he became president, Trump piloted a series of failed businesses – six of which declared bankruptcy – and gave every indication of being a lousy businessman. It’s often pointed out that if Trump had simply invested the vast inheritance left to him by Fred Trump, his father, in a standard tracker fund, he would’ve made more money than through his lacklustre business career, and there’s nothing to suggest this was likely to change.\nThat was before his second presidency, of course. Now he and his children are sitting on top of a huge fortune, large parts of which seem to have come from sources with interests in sucking up to the president. As the New York Times points out, a large chunk of Trump’s $2.2bn windfall last year came from an investment firm with ties to the United Arab Emirates, which bought an almost 50% stake in his crypto company, World Liberty Financial, and which is part of an industry over which Trump has policy-making and regulatory influence.\nSimilarly, the report registers the smaller but still significant revenue streams generated by Trump’s side hustle in defamation and other lawsuits, including settlements with ABC ($16m), Meta ($24.5m) and Paramount ($16m) – legal proceedings which, it seems fair to assume, these media and tech companies may have had more appetite for fighting had the plaintiff not been the president of the United States with vast influence over their industries.\nAll of which leaves Trump in the strange position of, on the one hand, getting the thing he has always desperately wanted in life – genuine, unimaginable wealth – at a cost of the other thing he has always desperately wanted in life, universal admiration and applause. This trade-off is so morally neat it might’ve come from a fable, but that is where the US president currently finds himself. Rich but mocked; successful, if you look at his income, but an absolute turkey of a leader with a 39% approval rating and an image so tarnished that even Giorgia Meloni, the unpopular rightwing leader of Italy and former absolute lickspittle to Trump, has felt emboldened to have a crack.\nAs with most petulant personalities, it’s likely to be the small failures that niggle most with Trump. While his famous deal-making abilities continue to field poor results in the Middle East, the president seems to have turned himself inside out trying to explain away the algae currently blooming in the Lincoln Memorial reflecting pool. It’s a tiny, irrelevant failure as these things go, but with optics so bad, so glaringly unmissable even to those with no interest in Iran – here is a man who can’t even keep the nation’s pond clean – he’s had to drum up endless wild stories to excuse it.\nLikewise, Trump’s predictably terrible oversight of something called the Great American State Fair. You’ve probably not even heard of it, despite the fact it is going on right now on the National Mall in Washington DC, and has been advertised by the White House as a 16-day extravaganza to mark the country’s 250th birthday with “a world-class exposition”. Or, as it turns out, with an empty food hall, unpeopled exhibitions and television’s Dr Oz addressing a half-empty field in a setup that looks dodgier than that so-bad-it-became-an-instant-classic Willy Wonka experience in Glasgow.\nIt’s Trump’s reverse Midas touch, of course, which wrecks everything he touches outside his family’s crypto holdings and which, as support for him wanes even in his former strongholds, must be tearing his ego, divided as it is between the primary motivations of money and praise, clean in two. If only he were a character from fiction – an Elizabethan tragedy, say, or an episode of Captain Underpants – it would be fascinating and grimly hilarious to watch this play out.\n- \n  Emma Brockes is a Guardian columnist", "translation_ja": "ある角度から見ると、トランプ大統領が苦しい一か月を過ごしているように映るかもしれない。彼はリンカーン記念館の反射池の改修工事を台無しにし、誰も証明できない破壊行為のせいにした。最高裁判所は、Eジーン・キャロルへの名誉毀損と性的虐待に対する500万ドルの民事判決への上訴申立て、および出生地主義的市民権を廃止する大統領令の両方を退けた。イランとの戦争はくすぶり続けている。それでも、トランプの義務的な財務開示報告書が火曜日に公開されると、見出しは2025年に大統領が22億ドル以上の収益を上げたという事実に注目した――就任前年の3倍以上だ。見た目とは裏腹に、すべては計画通りに進んでいるのかもしれない。\n\nトランプの場合、彼が二期目の在任中に蓄積した富が、戦略の成果なのか、それとも乱射的だが産業的規模の売込みの幸運な結果なのかは、常に疑問の余地がある。財務報告書の数字を見ると、トランプが大統領になる前に一連の失敗したビジネスを手掛け——そのうち6件は破産申告している——そして自分がひどい実業家であることを示す一切の兆候を見せていたことが思い起こされる。もしトランプが父フレッド・トランプから受け継いだ莫大な遺産を標準的なインデックスファンドに投資していれば、精彩を欠くビジネスキャリアを通じて得た以上の利益を上げていたはずだとよく言われており、これが変わりそうな兆しは何もなかった。\n\nもちろん、それは二期目の大統領就任前の話だ。今や彼と子供たちは巨大な財産の上に座っており、その大部分は大統領に取り入ることに利益を見出す人々からもたらされているようだ。ニューヨーク・タイムズが指摘するように、トランプの22億ドルの棚ぼた的収入の大部分は、アラブ首長国連邦と繋がりを持つ投資会社から来ており、同社は彼の暗号資産企業「ワールド・リバティ・ファイナンシャル」のほぼ50%の株式を購入した。これはトランプが政策立案と規制上の影響力を持つ業界だ。\n\n同様に、報告書にはトランプの副業として名誉毀損やその他の訴訟から生み出された、それほど大きくはないが依然として注目すべき収益源も記録されている。ABC（1600万ドル）、メタ（2450万ドル）、パラマウント（1600万ドル）との和解がそれだ——これらの法的手続きについては、原告が自社の産業に対して絶大な影響力を持つ米国大統領でなければ、これらのメディアやテクノロジー企業がより積極的に争う意欲を示していたと推測するのが公平であろう。\n\nこれらすべてが、トランプを奇妙な立場に置いている。一方では、生涯ずっと切望してきたもの——真の
