、想像を絶するほどの富——をついに手にした。しかしそのコストとして、やはり生涯ずっと切望してきたもう一つのもの——普遍的な称賛と拍手——を失っている。このトレードオフは道徳的にあまりにも整然としており、まるで寓話から飛び出してきたかのようだが、それが米国大統領が今いる場所だ。富裕だが嘲笑され、収入を見れば成功しているが、39%の支持率を持つ絶対的な失敗の指導者であり、そのイメージはあまりにも傷ついているため、かつてトランプへの絶対的な追従者だったイタリアの不人気な右翼指導者ジョルジャ・メローニでさえ、批判する勇気を持つようになっている。\n\nほとんどのわがままな性格の持ち主と同様に、トランプを最も悩ませるのは小さな失敗である可能性が高い。有名な取引成立能力が中東で引き続き不振な結果をもたらす一方で、大統領はリンカーン記念館の反射池で現在繁殖している藻を言い訳するために、自分を内側から外側へとひっくり返しているようだ。これは大したことのない、無関係な失敗だが、その見た目の悪さは——イランに全く興味のない人々にさえも明らかに見えるほど——こんなにも目立つ。ここに国の池さえ清潔に保てない男がいるのだ。彼はこれを言い訳するために、果てしない荒唐無稽な話を作り上げなければならなかった。\n\n同様に、「グレート・アメリカン・ステート・フェア」と呼ばれるものに対するトランプの予測通りに惨憺たる監督ぶりもそうだ。おそらくあなたはそれについて聞いたことすらないだろう。それにもかかわらず、それはワシントンDCのナショナル・モールで今まさに開催されており、ホワイトハウスからは建国250周年を祝う「世界クラスの博覧会」として16日間の大イベントだと宣伝されていた。あるいは、実際のところは、空っぽの食堂、人もまばらな展示、そしてテレビのドクター・オズが半分しか埋まっていない野外会場で演説するという、グラスゴーのあまりの酷さに即座に古典となったウィリー・ウォンカ体験より怪しげな設営のイベントだったのだが。\n\nこれはトランプの逆ミダス的な接触だ。もちろん、家族の暗号資産保有以外の彼が手を触れるすべてのものを台無しにするのだ。かつての牙城でさえも支持が薄れる中、金と称賛という二つの主要な動機の間で引き裂かれている彼のエゴを、文字通り真っ二つに引き裂いているに違いない。もし彼がフィクションの登場人物——たとえばエリザベス朝の悲劇の主人公か、あるいは「キャプテン・アンダーパンツ」のエピソードの主役——だったなら、この展開を見守ることはなんとも面白く、薄ら寒いほど滑稽だろうに。\n\n——エマ・ブロックスはガーディアン紙のコラムニスト", "vocab": [{"word": "scattergun", "definition": "「散弾銃式の」という意味の形容詞で、無差別に広範囲にアプローチする様子を表す慣用表現。ここではトランプのビジネス手法が無節操かつ手当たり次第であることを示している。"}, {"word": "lacklustre", "definition": "「精彩を欠く」「冴えない」という意味の形容詞（英国式綴り）。期待外れで活気がなく、印象に残らない成果やパフォーマンスを表す際に使われる。"}, {"word": "lickspittle", "definition": "「へつらい者」「おべっか使い」を意味する軽蔑的な名詞。権力者に対して卑屈に媚びへつらう人物を指す強い侮蔑表現。"}, {"word": "accrued", "definition": "「蓄積した」「積み上げた」という意味の動詞（accrue）の過去分詞形。主に時間の経過とともに資産や利子などが徐々に増加・蓄積されることを指す金融・法律用語。"}, {"word": "petulant", "definition": "「わがままな」「すぐ怒る」「不機嫌な」を意味する形容詞。些細なことで子供っぽく怒ったり拗ねたりする性格や態度を描写する際に用いられる。"}, {"word": "emboldened", "definition": "「大胆にさせられた」「勇気づけられた」という意味の形容詞・過去分詞。外部の状況変化によって、以前はためらっていた行動を取る気持ちになったことを表す。"}, {"word": "windfall", "definition": "「棚ぼた式の利益」「思いがけない大金」を意味する名詞。努力や計画なしに偶然または有利な状況から得られた予期せぬ収入や利益を指す慣用表現。"}]}, {"title_ja": "ハマスの終焉：なぜこの組織は回復不能なのか", "title_en": "The End of Hamas: Why the Group Is Beyond Recovery", "summary_ja": "筆者は、一般的な分析とは異なり、ハマスはイスラエルとの2年間の戦争によって回復不能なほど壊滅的な打撃を受けたと主張する。その根拠として、指導部の全階層にわたる系統的な排除、イラン主導の資金・支援ネットワークの崩壊、そしてガザ市民からの支持の喪失が挙げられる。筆者は、ハマスとイスラエルの双方が、それぞれの思惑からハマスが依然として存続しているという虚構を維持しようとしていると論じる。", "summary_en": "The author argues, contrary to prevailing consensus, that Hamas has been decimated beyond recovery by two years of Israeli military operations. Key evidence includes the systematic elimination of its entire leadership hierarchy, the collapse of its Iran-backed funding and support network, and a severe loss of public legitimacy among Gazans. The author contends that both Hamas and Israel have a shared interest in perpetuating the myth that the group remains viable.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/palestinian-territories/end-hamas", "state_media": false, "category": "オピニオン", "full_text": "The consensus among analysts is that Hamas is down, but hardly out. The group may be badly battered, but it has been around since 1987, and in that time, it has been repeatedly attacked by Israel and has always grown back. The conditions that gave rise to the organization—occupation, dispossession, and humiliation at the hands of Israel—are as severe as ever. And in the Gaza Strip, there is no comprehensive alternative to Hamas’s governance. Even in its weakened state, the group has institutional memory, administrative infrastructure, and coercive capacity that its competitors cannot match.\nBut in truth, Hamas’s two-year war with Israel has decimated the organization beyond the point of recovery. It may still be more powerful than other groups in Gaza. But Israel’s bombing campaigns and invasion have cost Hamas essential military infrastructure, torn apart its leadership, and cut it off from its patrons. As a result, the organization lacks the power to actually rule Gaza. It is suffering from political paralysis and facing financial disaster in the enclave. Finally, it has lost public support: many Gazans blame the group for starting a war that has resulted in the destruction or damage of 90 percent of the homes in the Gaza Strip and the deaths of roughly four percent of the prewar population.\nDespite these facts, officials on both sides of Gaza’s yellow line have embraced the idea that Hamas is alive and well. Members of Hamas perpetuate this farce for an obvious reason: they do not want to admit that they lost. But Israel is also pretending that its nemesis remains strong so it can justify its continuing military operations—and avoid having to answer difficult questions about the future of Palestinians.\nUNAUTHORIZED OBITUARY\nSince Hamas attacked Israel on October 7, 2023, Israel has killed an entire echelon of Hamas leaders. This includes its former top officials: Yahya Sinwar, Ismail Haniyeh, Mohammed Deif, and Mohammed Sinwar. In May of this year, Israeli forces assassinated Izz al-Din al-Haddad, the head of Hamas’s military wing, at a residence, along with some of his family. Eleven days later, it killed Haddad’s replacement, Mohammed Odeh, along with his wife and two of his children. Today, only one Hamas commander who held a senior position before October 7 is left standing: Imad Aqel. Israel has also taken out hundreds of midlevel commanders. What it has done, in other words, goes beyond a mere decapitation strategy. It has removed Hamas’s entire nervous system.\nIsrael has also rendered Hamas incapable of regeneration. The fact that Haddad and Odeh were killed in their homes, with their families, indicates that the safe houses, tunnels, and countersurveillance architecture that once made Hamas’s senior leadership elusive are now gone. So are its overseas outposts. In the last three years, Israel has killed (or tried to kill) Hamas officials in Iran, Lebanon, and Qatar.\nIt is therefore little wonder that Hamas is experiencing a leadership crisis. Since Yahya Sinwar was killed, in October 2024, the group has been unable to decide who should take the helm of its political bureau. Hamas’s Shura Council, made up of 50 to 80 members, was supposed to elect a new leader in early 2025, but it could not meet and vote because of Israel’s ongoing bombardment. When a vote was finally held in February 2026, it did not produce a winner. For now, the group is run by a five-man council that has been hamstrung by infighting.\nThe relationship between Iran and Hamas is effectively over.\nHamas has settled on two leadership candidates: Khalil al-Hayya and Khaled Mashal. Each has a very different agenda. Hayya and his supporters favor close ties with Iran and continued armed confrontation, whereas Mashal and his backers want more sponsorship from Sunni states and more pragmatic negotiations with Israel. Of course, many healthy organizations have factional disagreements that they negotiate and resolve. But these divisions have instead resulted in deadlock. When the United States and Israel began bombing Iran on February 28 of this year, for example, Hamas could not agree on a statement or a response. It thus remained silent for three weeks. When it spoke, it sent conflicting signals. The group’s political leadership in Qatar called on Iran to “avoid targeting neighboring countries,” whereas the group’s military spokesman in Gaza put out a statement with a markedly different tone that praised Tehran’s war efforts.\nHamas’s political crisis is more than just internal. Since October 7, the group has lost external support. For decades, Hamas was an integral part of the so-called axis of resistance—Iran’s network of partners across the Middle East. This partnership was never seamless, in part because Hamas is a Sunni Islamist movement embedded in a Shiite-led alliance. But it was functional. Iran provided Hamas with weapons, training, and funding to the tune of $100 million annually. Hamas, in return, allowed Iran to indirectly ", "translation_ja": "アナリストの間での共通見解は、ハマスは打撃を受けてはいるが、壊滅には程遠いというものだ。同組織はひどく消耗しているかもしれないが、1987年から活動を続けており、その間イスラエルから繰り返し攻撃を受けながらも常に復活を遂げてきた。組織の誕生をもたらした条件——イスラエルによる占領、土地の収奪、そして屈辱——は依然として深刻なままだ。そしてガザ地区には、ハマスの統治に代わる包括的な選択肢が存在しない。弱体化した状態にあっても、同組織は競合勢力が到底及ばない組織的記憶、行政インフラ、そして強制力を保持している。\n\nしかし実際のところ、ハマスとイスラエルの2年間にわたる戦争は、同組織を回復不能な地点まで壊滅させた。ハマスはガザの他の勢力よりも依然として強力かもしれない。だがイスラエルの爆撃作戦と地上侵攻によって、ハマスは不可欠な軍事インフラを失い、指導部は四分五裂となり、支援者たちとの関係が断ち切られた。その結果、同組織はガザを実効支配する力を持っていない。政治的麻痺に陥り、財政的破綻に直面している。さらに、民衆の支持も失った。多くのガザ市民が、ガザ地区の住宅の90パーセントを破壊または損傷させ、戦前の人口の約4パーセントの死者を生んだ戦争を始めた責任を同組織に帰しているのだ。\n\nこれらの事実にもかかわらず、ガザの「黄色い境界線」の両側にいる当局者たちは、ハマスが依然として健在であるという考えを抱き続けている。ハマスのメンバーがこの茶番を維持するのは明白な理由からだ——彼らは自分たちが負けたと認めたくないのである。しかしイスラエルもまた、継続的な軍事作戦を正当化し、パレスチナ人の将来について難しい問いに答えることを避けるために、宿敵が依然として強力であるという見せかけを続けている。\n\n■ 無許可の死亡記事\n\nハマスが2023年10月7日にイスラエルを攻撃して以来、イスラエルはハマスの指導者を丸ごと一世代にわたって殺害してきた。これにはかつての最高幹部——ヤヒヤ・シンワール、イスマイル・ハニヤ、モハンマド・デイフ、モハンマド・シンワール——が含まれる。今年5月、イスラエル軍はハマスの軍事部門長イッズ・アルディン・アル・ハッダードを一部の家族とともに住居で暗殺した。その11日後には、ハッダードの後継者モハンマド・オデを妻と2人の子供とともに殺害した。現在、10月7日以前に上級職に就いていたハマスの司令官でまだ生存しているのは、イマード・アケルただ1人だ。イスラエルはまた、数百人の中間管理職司令官も排除した。つまりイスラエルが行ったことは、単なる「首切り戦略」を超えている。ハマスの神経系全体を取り除いたのだ。\n\nイスラエルはまた、ハマスの再生能力をも奪った。ハッダードとオデが家族とともに自宅で殺されたという事実は、かつてハマスの上級指導部を捕捉困難にしていたセーフハウス、トンネル、そして監視対策の仕組みが今や消え去ったことを示している。海外の拠点も同様だ。過去3年間で、イスラエルはイラン、レバノン、カタールのハマス幹部を殺害（あるいは殺害を試みて）きた。\n\nこうした状況を踏まえれば、ハマスが指導部の危機に陥っているのも不思議ではない。2024年10月にヤヒヤ・シンワールが殺害されて以来、同組織は政治局の新指導者を誰にすべきか決められずにいる。50人から80人のメンバーで構成されるハマスのシューラ評議会は、2025年初頭に新指導者を選出するはずだったが、イスラエルの継続的な爆撃によって会合と投票が行えなかった。2026年2月にようやく投票が実施されたが、勝者は生まれなかった。現在、同組織は内部抗争に縛られた5人の評議会によって運営されている。\n\nイランとハマスの関係は事実上終わった。\n\nハマスは2人の指導者候補に絞り込んでいる。ハリル・アル・ハイヤとハーレド・マシャールだ。両者の方針は大きく異なる。ハイヤとその支持者はイランとの緊密な関係と武装対決路線を支持するのに対し、マシャールとその支持者はスンニ派諸国からの支援拡大とイスラエルとのより実用的な交渉を望んでいる。もちろん、健全な組織の多くは派閥間の意見の相違を交渉によって解決している。しかしこれらの分裂は解決の代わりに行き詰まりをもたらしている。たとえば今年2月28日に米国とイスラエルがイランへの爆撃を開始した際、ハマスは声明や対応について合意できなかった。その結果、3週間にわたって沈黙を守ることになった。ようやく発言した際も、矛盾したシグナルを発した。カタールにいるハマスの政治指導部はイランに対して「隣国への攻撃を避けるよう」呼びかけたが、ガザにいるハマスの軍事報道官は著しく異なるトーンの声明を出し、テヘランの戦争努力を称賛した。\n\nハマスの政治危機は内部だけの問題ではない。10月7日以降、同組織は外部からの支援を失った。数十年にわたり、ハマスはいわゆる「抵抗の枢軸」——中東全域にわたるイランのパートナーネットワーク——の不可欠な一員だった。このパートナーシップは、ハマスがシーア派主導の連合に組み込まれたスンニ派イスラム主義運動であるという事情もあり、決して円滑ではなかった。しかし機能はしていた。イランはハマスに年間1億ドル規模の武器、訓練、資金を提供した。ハマスはその見返りとして、イランが間接的に……", "vocab": [{"word": "decapitation strategy", "definition": "組織の上位指導者を標的にして排除する軍事・安全保障上の戦略のこと。直訳は「首切り戦略」で、敵組織の機能不全を狙う。"}, {"word": "coercive capacity", "definition": "強制力・強圧的な能力のことで、組織が服従や秩序を物理的・政治的圧力によって維持する力を指す。"}, {"word": "countersurveillance", "definition": "監視や追跡を察知・回避するための対策や手段のこと。諜報・軍事の文脈で用いられる専門用語。"}, {"word": "enclave", "definition": "周囲を他の領域や勢力に囲まれた、地理的・政治的に孤立した地域や集団を指す。ここではガザ地区を意味する。"}, {"word": "hamstrung", "definition": "行動や機能を著しく制限・妨害された状態を表す形容詞。組織や個人が有効に機能できない状況に使われる慣用表現。"}, {"word": "axis of resistance", "definition": "イランを中心とした中東の反米・反イスラエル勢力の連合体を指す政治的・外交的用語。ヒズボラやハマスなどが含まれる。"}, {"word": "decimated", "definition": "元来は10人に1人を殺す意から転じて、集団や組織が壊滅的な打撃を受けて大幅に弱体化・縮小された状態を表す。"}]}, {"title_ja": "トランプ政権のコンゴ和平合意はなぜ崩壊しつつあるのか", "title_en": "Why Trump's Congo Peace Deal Is Falling Apart", "summary_ja": "筆者は、トランプ政権がコンゴ民主共和国に対してとる取引優先のアプローチ——詳細な紛争解決より迅速な合意形成と鉱物資源へのアクセスを重視する姿勢——が、すでに崩れかけている脆弱な和平しか生み出していないと論じる。コンゴとルワンダの数十年にわたる紛争の仲介において一定の進展はあったものの、困難な詳細を先送りし権威主義的指導者を優遇する傾向が、和平プロセスの崩壊、米国の採掘事業の失敗、そしてコンゴの権威主義化の加速を招くリスクがある。より実質的で人権を重視した戦略をとらない限り、ワシントンのコンゴ政策はあらゆる面で失敗に終わると筆者は主張する。", "summary_en": "The author argues that the Trump administration's transactional approach to the Democratic Republic of Congo—prioritizing quick dealmaking and mineral access over detailed conflict resolution—has produced a fragile peace that is already unraveling. Despite some early progress in mediating the decades-long conflict between Congo and Rwanda, the administration's tendency to defer difficult details and favor authoritarian leaders over democratic principles risks collapsing the peace process, undermining U.S. mining ambitions, and accelerating Congo's authoritarian drift. The piece contends that without a more substantive and rights-conscious strategy, Washington's Congo gambit will likely fail on all fronts.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/democratic-republic-congo/why-trumps-congo-deal-falling-apart", "state_media": false, "category": "オピニオン", "full_text": "When the presidents of the Democratic Republic of the Congo and Rwanda met in Washington, D.C., in early December 2025, for a ceremony sealing the peace deal that ended four years of fighting, it was meant to showcase U.S. President Donald Trump’s ability to settle even the most intractable conflicts. Trump blanketed the signing event with his trademark hyperbole: “Look at how they love each other,” he marveled about the two presidents. But Congo’s Felix Tshisekedi and Rwanda’s Paul Kagame refused to shake hands. Rwandan troops were already massing in South Kivu Province to launch a major new offensive. Within days, the South Kivu town of Uvira—the last urban center north of the resource-rich Katanga region, 150 miles to the south—had fallen to the Rwanda-backed M23 rebel group.\nThe Trump administration’s approach to Congo has offered a test case for its new Africa strategy—a transactional one that prioritizes dealmaking, trades political support for natural resource deals, and threatens foreign governments with sanctions or the withholding of U.S. foreign assistance. Over the past 18 months, Washington has taken on a prominence in Congo not seen since the Cold War. It has sought to mediate the conflict in eastern Congo; supported U.S. companies seeking access to the country’s substantial cobalt, copper, and lithium reserves; and helped build one of the largest economic corridors on the continent. The Trump administration is betting it can use its economic and political leverage to wrest control of Congolese critical minerals while gaining prestige by imposing peace in the east.\nWashington has made some progress toward both of these aims. But its handling of Congo is also a demonstration of the limits of Trump’s transactional method. His administration’s reliance on swift, broad agreements that postpone haggling over tough details will make it harder to achieve its long-term goals of establishing lasting regional stability and disrupting China’s dominance over critical minerals supply chains. Most worryingly, an “America first” policy is likely to favor close relations with Congolese political leaders over democracy and human rights, an approach that could end up destabilizing the country. Unless the administration adjusts its approach, the peace process in eastern Congo is at risk of collapse, U.S. mining ventures could amount to little, and the Congolese president could accelerate his authoritarian turn.\nPEACE DIVIDEND?\nConflict in eastern Congo stretches back 30 years. Over the course of many rounds of fighting involving different permutations of antagonists, the main axis of violence has been between the governments in Kinshasa and Kigali. The Rwandan army invaded for the first time in 1996, in pursuit of armed groups that helped perpetrate the Rwandan genocide two years prior; since then, the Rwandan government has backed four rebellions in the area. It cites the threat of Congo-based Rwandan rebels (which, in fact, has declined dramatically since 1996), but its motivations also include the establishment of a buffer zone, the extraction of natural resources, and the need to manage potential challenges by its own army and justify suppression of domestic dissent.\nIn late 2021, the M23 rebel group, which had been largely dormant since its defeat in 2013, began a new series of attacks in eastern Congo. The ensuing war has displaced several million people. The East African Community, an eight-country intergovernmental organization promoting regional integration, attempted to broker talks between Congolese belligerents and deployed an intervention force; the Angolan government hosted talks between Congo and Rwanda on behalf of the African Union; and the Southern African Development Community sent troops to back the Congolese army. All these initiatives failed, stymied by the dysfunction of the Congolese army and the recalcitrance of the Congolese and Rwandan governments. The European Union, meanwhile, has been unable to find consensus to implement broad-ranging sanctions or other measures against Rwanda, largely due to some members’ eagerness to maintain good relations with Kagame.\nIt seemed that Trump’s reelection, in late 2024, might exacerbate the fighting. Goma, the capital of North Kivu Province, fell to M23 rebels just a week after Trump’s second term began, and most observers suspected that Rwanda and the M23 had timed the assault to take advantage of the interregnum, when key administration officials would not yet be in place to enable a quick and decisive reaction. With a push from career diplomats (and after an M23 advance on a U.S.-owned tin mine), however, the Trump administration began to intervene, sanctioning a key adviser to Kagame in February 2025 and naming Massad Boulos, the father-in-law of Trump’s daughter Tiffany, as his senior adviser for Africa in April. A fluent French speaker with business experience in Nigeria, Boulos quickly organized talks between the Congolese and Rwandan govern", "translation_ja": "コンゴ民主共和国のフェリックス・チセケディ大統領とルワンダのポール・カガメ大統領が、4年間の戦闘に終止符を打つ和平合意を締結する式典のために2025年12月初旬にワシントンD.C.で会談したとき、それはドナルド・トランプ米大統領が最も根深い紛争でさえ解決できる能力を誇示するための場となるはずだった。トランプは署名式典をお得意の誇張表現で彩り、「二人がいかに愛し合っているか見てみろ」と感嘆した。しかしコンゴのチセケディとルワンダのカガメは握手を拒んだ。ルワンダ軍はすでに南キブ州に集結し、大規模な新たな攻勢を開始しようとしていた。数日のうちに、南キブの町ウビラ——資源豊富なカタンガ地方の150マイル北に位置する最後の都市中心部——が、ルワンダの支援を受けるM23反政府武装勢力の手に落ちた。\n\nトランプ政権のコンゴへのアプローチは、その新たなアフリカ戦略——取引を優先し、政治的支持を天然資源取引と交換し、外国政府を制裁や米国の対外援助停止で脅す取引主義的な戦略——の試金石となってきた。過去18か月にわたり、ワシントンは冷戦以来見られなかったほどの存在感をコンゴで示してきた。東部コンゴの紛争を仲介しようとし、コンゴの豊富なコバルト・銅・リチウム資源へのアクセスを求める米国企業を支援し、アフリカ大陸最大級の経済回廊の構築を助けてきた。トランプ政権は、経済的・政治的影響力を駆使してコンゴの重要鉱物の支配権を奪取しつつ、東部への平和を押しつけることで威信を高められると賭けている。\n\nワシントンはこれら両方の目標に向けてある程度の前進を果たした。しかしコンゴへの対応は、トランプの取引主義的手法の限界をも示している。困難な詳細の交渉を先送りにした迅速かつ包括的な合意に頼る同政権のやり方は、永続的な地域安定の確立と重要鉱物サプライチェーンにおける中国の支配の打破という長期的目標の達成をより困難にするだろう。最も懸念されるのは、「アメリカ・ファースト」政策が民主主義や人権よりもコンゴの政治指導者との緊密な関係を優先しがちであり、その結果、同国を不安定化させかねないという点だ。政権がアプローチを修正しない限り、東部コンゴの和平プロセスは崩壊の危機に瀕し、米国の採掘事業は実を結ばず、コンゴ大統領は権威主義への転換を加速させる恐れがある。\n\n【和平の配当？】\n\n東部コンゴの紛争は30年前に遡る。異なる敵対関係の組み合わせによる幾多の戦闘を経て、暴力の主軸はキンシャサとキガリの両政府間にあり続けてきた。ルワンダ軍は1996年に初めて侵攻したが、その目的はその2年前のルワンダ虐殺の実行を助けた武装勢力の追撃だった。それ以来、ルワンダ政府は同地域における4つの反乱を支援してきた。ルワンダはコンゴを拠点とするルワンダ反政府勢力の脅威（実際には1996年以降劇的に低下している）を理由に挙げているが、その動機には緩衝地帯の設定、天然資源の採掘、自国軍内の潜在的な挑戦の管理、そして国内の反体制派の弾圧の正当化も含まれている。\n\n2021年末、2013年の敗北以来ほぼ休眠状態にあったM23反政府武装勢力が東部コンゴで新たな攻撃を開始した。それ以降の戦争によって数百万人が避難を余儀なくされた。8か国からなる地域統合推進の政府間機関である東アフリカ共同体（EAC）はコンゴの交戦勢力間の交渉仲介を試み、介入部隊を派遣した。アンゴラ政府はアフリカ連合を代表してコンゴとルワンダの間の交渉を主催した。南部アフリカ開発共同体（SADC）はコンゴ軍を支援するために部隊を派遣した。これらの試みはすべて、コンゴ軍の機能不全とコンゴ・ルワンダ両政府の頑固な姿勢によって阻まれ、失敗に終わった。一方、欧州連合はルワンダに対する広範な制裁やその他の措置の実施について合意を見出せずにいる。これは主に、一部の加盟国がカガメとの良好な関係を維持することに強い関心を持っているためだ。\n\n2024年末のトランプの再選は、戦闘をさらに激化させるのではないかと懸念された。北キブ州の州都ゴマは、トランプの2期目が始まったわずか1週間後にM23の反政府勢力の手に落ちた。ほとんどの観測筋は、ルワンダとM23が、政権移行期——主要な政権幹部がまだ就任しておらず、迅速かつ決定的な対応を可能にする体制が整っていない時期——を利用してこの攻撃のタイミングを合わせたと疑っていた。しかし、キャリア外交官の後押しを受けて（また米国系スズ鉱山へのM23の進軍を契機に）、トランプ政権は介入を開始し、2025年2月にカガメの側近に制裁を科した。そして4月には、トランプの娘ティファニーの義父であるマッサド・ブーロスをアフリカ担当上級顧問に任命した。ナイジェリアでのビジネス経験を持ち、流暢なフランス語話者であるブーロスは、直ちにコンゴとルワンダ両政府の間の交渉を組織した。", "vocab": [{"word": "intractable", "definition": "（問題や紛争などが）解決困難な、手に負えない、という意味の形容詞。長期化した複雑な問題に対して使われる上級語彙。"}, {"word": "transactional", "definition": "取引に基づく、利害得失を優先する、という意味の形容詞。政治や外交において、理念や価値観より実利的な取引を重視するアプローチを指す際に用いられる。"}, {"word": "recalcitrance", "definition": "頑固に従わないこと、強情さ、という意味の名詞。特に交渉や要求に対して頑なに抵抗する態度を表す上級語彙。"}, {"word": "interregnum", "definition": "政権の空白期間、統治の継続性が断絶した移行期間、という意味の名詞。ラテン語起源の格式ある語彙で、政治的移行期に用いられる。"}, {"word": "belligerents", "definition": "交戦勢力、戦争当事者、という意味の名詞（複数形）。正式な武力衝突に参加している国家や集団を指す外交・国際法上の用語。"}, {"word": "hyperbole", "definition": "誇張表現、大げさな言い回し、という意味の名詞。修辞技法のひとつで、効果を狙って事実を誇張して表現することを指す。"}, {"word": "authoritarian", "definition": "権威主義的な、独裁的な、という意味の形容詞。個人や集団への権力集中を特徴とする政治体制や指導者の姿勢を表す際に使われる重要な政治用語。"}]}, {"title_ja": "米イスラエル同盟を救う方法", "title_en": "How to Save the U.S.-Israeli Alliance", "summary_ja": "著者らは、米国とイスラエルが2015年のJCPOA交渉前と同じ過ちを繰り返し、イランとの核交渉において目標の調整に失敗していると主張する。新たな米イラン覚書はイランの核開発・ミサイル・代理勢力問題を解決せずにテヘランを利するリスクがあると論じる。両国はイランとの合意の許容条件について二国間で取り決めを結び、外交が失敗した場合の対応を調整すべきだと訴えている。", "summary_en": "The authors argue that the U.S. and Israel are repeating the same mistake made before the 2015 JCPOA by failing to coordinate their objectives in nuclear negotiations with Iran. They contend that a new U.S.-Iranian memorandum of understanding risks strengthening Tehran without resolving core issues like Iran's nuclear program, missile buildup, and proxy support. The authors urge both countries to forge a bilateral agreement on acceptable terms for an Iran deal and coordinate contingency responses if diplomacy fails.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/israel/how-save-us-israeli-alliance", "state_media": false, "category": "オピニオン", "full_text": "In 2015, as the United States negotiated the Joint Comprehensive Plan of Action (JCPOA) with Iran—an agreement Israel was not a party to—we argued in Foreign Affairs that Israel and the United States should pursue a parallel agreement to ensure that any U.S.-Iranian deal would be durable and aligned with Israeli interests. Israel and the United States shared the same goal—preventing Iran from acquiring nuclear weapons—but differed over threat perceptions, historical trauma, timing, and tolerance for alternatives to diplomacy, such as sanctions, covert action, and airstrikes. A parallel agreement would help create a unified front and coordinate responses if Iran crossed any redlines.\nIn the end, however, Israel and the United States never made a pact of their own. The consequences were severe. The JCPOA became a source of friction between the U.S. and Israeli governments and created the sense among people in Israel and Gulf Arab countries that the United States had discounted their security. It was politically vulnerable from the moment it was signed.\nThe deal temporarily restricted parts of Iran’s nuclear program, but it did not stop Tehran’s ballistic missile buildup or its support for proxies. Key provisions were set to expire after just a few years. And Israel and the United States never jointly prepared for the possibility that Iran would stop complying with it, which Tehran eventually did after the United States unilaterally withdrew from the deal in 2018. Altogether, the lack of Israeli buy-in around the JCPOA created the conditions that put Iran, Israel, and the United States on a collision course a decade later.\nIn many ways, the current moment resembles the lead-up to the 2015 nuclear deal. Once again, Tehran and Washington are engaged in nuclear talks. And once again, the United States is at risk of offering Iran great relief in exchange for relatively little—much to the chagrin of Israel and certain Gulf countries. The U.S.-Iranian memorandum of understanding reopens the Strait of Hormuz, stabilizes energy markets, suspends the war for another 60 days, and creates a diplomatic channel to keep negotiating. Yet it does not resolve the core disagreements that produced the crisis in the first place: Iran’s nuclear ambitions, missile programs, and support for proxies. The negotiations could thus freeze the battlefield while strengthening Tehran’s hand. The memorandum, after all, grants Iran the time, money, and legitimacy needed to reconstitute while deferring real resolution for another day.\nIsrael and the United States must therefore do now what they failed to do in 2015: get on the same page. That means they need to forge their own deal about what an acceptable nuclear agreement would look like and coordinate their responses, should negotiations with Iran fail to produce an agreement. Otherwise, the blood, treasure, and prestige both countries have spent fighting Iran and its proxies might all be for naught.\nBAD COP, RELUCTANT COP\nFrom the start, Israel and the United States have had different Iran war aims. For Israel, the Iranian threat is existential. The country will not accept an Iran that has nuclear capabilities, a shield of ballistic missiles, and a regional ring of fire controlled by a regime that openly calls for Israel’s destruction. Israel’s war against Iran was meant defensively, to prevent a repeat of the slaughter on October 7, 2023, when Hamas killed 1,200 people in Israel and took 200 more hostage, or even a repeat of the Holocaust in Europe in the early 1940s. In Israel’s view, the only way to guarantee its safety was to replace the Iranian regime with a government that was not hostile to Israel and would give up Iran’s nuclear ambitions as well as its efforts to destabilize the region. After the Iranian regime was weakened by U.S.-Israeli strikes in June 2025 and by mass protests in January 2026, many Israeli leaders concluded that a deeper political transformation in Tehran was possible. By the time the U.S.-Israeli strikes on Iran began in late February, Israel’s goal for the war was regime change, even if the government did not say so publicly.\nWashington took a less audacious approach to the war and never committed the resources that it would take to foment regime change. Although Israel was willing to absorb the economic burden of a prolonged Gulf war, the Trump administration was not. Washington also made a series of errors that made victory unreachable. The Trump administration failed to plan for the closure of the Strait of Hormuz and never developed an adequate response to Iranian threats against critical infrastructure in the Gulf. It failed to communicate to ordinary Americans the war’s objectives and the amount of resources it would take to achieve them. Finally, the administration failed to recognize that Lebanon could be used as a central means of pressure against Tehran, treating it instead as a separate issue. By restraining Israel’s response to Hezbollah, the Uni", "translation_ja": "2015年、米国がイランと共同包括的行動計画（JCPOA）を交渉していた際——イスラエルはその当事国ではなかった——我々は『フォーリン・アフェアーズ』誌上で、いかなる米イラン合意も持続可能でイスラエルの利益に沿ったものとなるよう、イスラエルと米国は並行合意を追求すべきだと主張した。イスラエルと米国はイランの核兵器取得阻止という同じ目標を共有していたが、脅威認識、歴史的トラウマ、タイミング、そして制裁・秘密工作・空爆といった外交以外の手段への許容度において見解が異なっていた。並行合意によって統一戦線を形成し、イランがレッドラインを越えた場合の対応を調整することができたはずだ。\n\nしかし結局、イスラエルと米国が独自の協定を結ぶことはなかった。その結果は深刻だった。JCPOAは米国とイスラエル両政府の間の摩擦の源となり、イスラエルやアラブ湾岸諸国の人々の間に、米国が自分たちの安全保障を軽視したという感覚を生み出した。この合意は署名された瞬間から政治的に脆弱なものだった。\n\nこの合意はイランの核開発計画の一部を一時的に制限したが、テヘランの弾道ミサイル増強や代理勢力への支援を止めることはできなかった。主要条項はわずか数年後に失効する設計になっていた。そしてイスラエルと米国は、イランが合意を遵守しなくなる可能性に備えて共同で準備することもなかった——テヘランは最終的に、2018年に米国が一方的に合意から離脱した後、実際に遵守をやめた。総じて、JCPOAをめぐるイスラエルの同意の欠如が、10年後にイラン・イスラエル・米国を衝突コースに乗せる条件を作り出したのだ。\n\n現在の状況は、2015年の核合意に至る直前の状況と多くの点で似ている。再びテヘランとワシントンが核交渉に臨んでいる。そして再び、米国はイランに大きな恩恵を与える代わりに比較的少ししか得ないリスクを犯しており、それはイスラエルや一部の湾岸諸国を大いに憤慨させている。米イラン覚書はホルムズ海峡を再開し、エネルギー市場を安定させ、さらに60日間の停戦を実現し、交渉を継続する外交チャンネルを設けている。しかしそれは、危機を生み出した核心的な不一致——イランの核野望、ミサイル計画、代理勢力支援——を解決するものではない。交渉は戦場を凍結しながらテヘランの立場を強化する可能性がある。覚書はイランに、本当の解決をまた別の日に先送りしながら、再建に必要な時間・資金・正当性を与えるからだ。\n\nそれゆえイスラエルと米国は、2015年に失敗したことを今こそ実行しなければならない——すなわち同じ方向を向くことだ。それは、許容できる核合意がどのようなものであるかについて独自の協定を結び、イランとの交渉が合意に至らなかった場合の対応を調整することを意味する。そうしなければ、両国がイランとその代理勢力と戦うために費やした血・財・威信がすべて無駄になりかねない。\n\n【強硬派と消極的な仲裁者】\n\n当初から、イスラエルと米国はイランに対する戦争目標が異なっていた。イスラエルにとって、イランの脅威は実存的なものだ。イスラエルは、核能力を持ち、弾道ミサイルの盾を備え、公然とイスラエルの破壊を叫ぶ政権が制御する地域的な火の輪に囲まれたイランを受け入れることはできない。イスラエルのイランに対する戦争は防衛的な意味を持っていた——2023年10月7日にハマスがイスラエルで1,200人を殺害し200人以上を人質に取った虐殺の再発を、あるいは1940年代初頭のヨーロッパにおけるホロコーストの再来を防ぐためだ。イスラエルの見解では、安全を保証する唯一の方法は、イランのイスラエルに敵対しない政権に替え、その政権がイランの核野望と地域不安定化の試みを放棄することだった。イラン政権が2025年6月の米イスラエルの攻撃と2026年1月の大規模抗議によって弱体化した後、多くのイスラエル指導者はテヘランにおけるより深い政治的変革が可能だと結論づけた。2月下旬に米イスラエルの対イラン攻撃が始まる頃には、政府が公言しなかったとしても、この戦争におけるイスラエルの目標は政権交代となっていた。\n\nワシントンはより慎重なアプローチをとり、政権交代を促すために必要な資源を投入することはなかった。イスラエルは長期にわたる湾岸戦争の経済的負担を受け入れる用意があったが、トランプ政権にはその意思がなかった。ワシントンはまた、勝利を不可能にする一連の過ちを犯した。トランプ政権はホルムズ海峡の閉鎖に備えた計画を持たず、湾岸の重要インフラに対するイランの脅威に対する十分な対応策を構築しなかった。戦争の目標と達成に必要な資源量について、一般のアメリカ人に対して伝えることを怠った。最終的に政権は、レバノンがテヘランへの圧力の中心的な手段として使えることを認識できず、代わりにそれを別個の問題として扱った。ヒズボラへのイスラエルの対応を抑制することで、米国は……", "vocab": [{"word": "chagrin", "definition": "悔しさ、憤慨。期待が裏切られたときの失望や怒りの感情を指す。「much to the chagrin of Israel」で「イスラエルを大いに憤慨させることに」という意味。"}, {"word": "memorandum of understanding", "definition": "覚書（MOU）。法的拘束力のない形式で当事者間の合意事項を文書化した外交・ビジネス文書。国際交渉の場でよく使われる専門用語。"}, {"word": "reconstitute", "definition": "再建する、再構成する。ここではイランが弱体化した軍事・政治力を回復・立て直すことを指す。政策・安全保障分野で頻出する動詞。"}, {"word": "proxy", "definition": "代理勢力。ここでは国家が直接関与せずに自国の利益のために戦わせる武装集団を指す。国際安全保障・地政学の文脈で多用される語。"}, {"word": "foment", "definition": "（反乱・変革などを）扇動する、煽る。否定的なニュアンスを持つことが多く、ここでは政権交代を意図的に引き起こす行為を指す。"}, {"word": "redline", "definition": "越えてはならない一線、限界点。外交・安全保障分野で、これを超えれば強力な対抗措置が発動される条件を示す際に使われるイディオム。"}, {"word": "audacious", "definition": "大胆な、果敢な。リスクを厭わない野心的な行動や計画を形容する語で、ここではイスラエルの政権交代という野心的な戦争目標を指す。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-07-02 11:57 JST";
renderTabs();renderList();
