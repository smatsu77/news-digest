送還からの保護と就労許可を与えるが、永住権への道は開かない。\n\nしかし、環境悪化、不平等の拡大、（米国自身によるものも含む）軍事的脅威が続く中、歴代政権はこれらの指定を毎年更新し続けてきた。ハイチのTPSは2010年の大地震以来15年間、エルサルバドルは25年間、ソマリアは35年以上にわたって更新されてきた。\n\nその結果、人々はここで生活を築き、子どもたちを育てた。ある裁判官が指摘したように、イエメン人のTPS保持者たちはニューヨークのボデガ（小規模食料雑貨店）の半数を経営している。\n\nところがトランプ前政権の国土安全保障長官クリスティ・ノエムは、13か国のTPSを廃止しようとした。\n\n下級裁判所の裁判官たちはこれらの廃止に対して異議を唱え、保護の法的根拠とは無関係の理由によるものだと主張した。\n\nハイチ人のTPSが失効する直前の2月、アナ・レイエス判事は、行政府がTPSを更新するかどうかについて裁量権を持つとしても、それは無制限ではないと主張した。当局者は、人々を死の危険にさらさないための手続きを踏む必要があるというのだ。\n\n彼女は、政権が示した動機は人種的敵意であると主張し、85ページにわたる痛烈な判決文の中に、ノエムが大統領に対し「殺人者、寄生虫、社会保障タダ乗り野郎どもで我が国を氾濫させているすべての国への渡航禁止」を推奨するソーシャルメディア投稿のスクリーンショットを証拠として含めた。\n\n米国政府がハイチ人にとってハイチへの帰国は安全だと主張する一方で、レイエス判事は、米国自身が「犯罪、テロ、誘拐、不安定な情勢、医療の限界」を理由にハイチに「レベル4：渡航中止勧告」を維持していると指摘した。\n\nしかし今週、最高裁は6対3の判決においてTPSは行政の裁量で決定できるものであり、司法がそれを阻止することはできないと判断した。\n\nサミュエル・アリート判事はさらに踏み込んで、ハイチ移民についてのトランプ大統領の発言——彼らが犬を食べるという根拠のない虚偽の主張や、移民が国の「血を汚染している」という発言——は「明らかに人種的」ではなく、「人種に中立な理由に基づく可能性のある政策的見解を表明したもの」だと記した。\n\nこの判決により、米経済に290億ドル以上貢献し、約80億ドルの税金を納め、公的扶助を受ける資格がないにもかかわらず社会制度に支払い続けてきた私たちの隣人たちが、拡大し続ける営利目的の大規模強制送還体制にさらされることになった。\n\n彼らは、公然と彼らを憎み、国内で最も影響力ある発言台から彼らを中傷する人々の政治的気まぐれに翻弄されている。\n\nそして、不可能な選択を迫られる深淵の縁に立たされているのは、彼らだけではない。\n\nTPSへの攻撃は、庇護制度の完全な崩壊と同時に進行している。\n\n同日に下された別の6対3の判決では、最高裁はトランプ政権がメキシコ国境で庇護申請中の人々の入国を阻止することを認めた。\n\n一方、国内では、正当な申請理由を持つ庇護希望者の審査が「打ち切られ」、審理なしに国外退去が命じられたり、申請審査のために第三国へ送還されたりするケースが相次いでいる。\n\n永住権への道も狭まっている。グリーンカードを申請するために出身国へ一時帰国することを求める新たな不合理な政策や、パレスチナ支持を表明した人々の永住権取得を困難にする措置が導入されている。\n\n渡航禁止措置により、仮に人々が帰国したとしても——多くの場合、在留資格調整の要件となっている——米国に戻ることができなくなる。\n\n一部の試算では、合法的移民数が30〜55％減少すると予測されており——", "vocab": [{"word": "non-refoulement", "definition": "国際法上の原則で、国家が人を迫害・死・拷問などの危険にさらされる国へ強制送還することを禁じるもの。難民法・人権法の基本概念。"}, {"word": "animus", "definition": "特定の人物や集団に対する強い敵意や悪意のこと。法的文脈では、差別的な動機や意図を指すために用いられる。"}, {"word": "pretermitting", "definition": "法的手続きを省略または打ち切ること。ここでは庇護申請者の審理を正式な審問なしに終了させる行為を指す。"}, {"word": "belligerence", "definition": "好戦的な態度や行動、または武力行使による攻撃性を意味する名詞。国際関係の文脈で軍事的脅威や挑発を表すために使われる。"}, {"word": "decimation", "definition": "もともとは十分の一を破壊するという意味だが、現代英語では制度・組織・集団が壊滅的な打撃を受けることを指す。"}, {"word": "unbounded", "definition": "制限や限界がない状態を意味する形容詞。法的文脈では、行政裁量が無制限であるかどうかという論点で使われる。"}, {"word": "slander", "definition": "口頭による名誉毀損、または根拠なく虚偽の悪い情報を広めること。ここでは移民に対する差別的な虚偽発言を指す。"}]}, {"title_ja": "ウォーターゲート事件の矮小化はレーガンからヴァンスまで続く共和党の伝統", "title_en": "Minimizing Watergate Is a Long Republican Tradition, From Reagan to Vance", "summary_ja": "歴史家リック・パールスタインは、JDヴァンスが最近ウォーターゲート事件を「ディープステートによる政権転覆」と一蹴したことは新たな堕落ではなく、数十年にわたる共和党の伝統であると主張する。彼はこのパターンを1973年のロナルド・レーガンによるニクソン擁護からパット・ブキャナン、そして現代のMAGA界隈に影響を与えた修正主義的書籍群にまで辿る。パールスタインは、ウォーターゲート時代の罪から仲間の共和党員を免罪する政治的能力が、歴史的に保守派の権力への道となってきたと論じている。", "summary_en": "Historian Rick Perlstein argues that JD Vance's recent dismissal of Watergate as a 'deep state' takedown is not a new low but a decades-long Republican tradition. He traces this pattern from Ronald Reagan's 1973 defense of Nixon's conspirators to Pat Buchanan, and through a stream of revisionist books that influenced today's MAGA circles. Perlstein contends that the political ability to absolve fellow Republicans of Watergate-era sins has historically been a path to conservative power.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/28/reagan-jd-vance-nixon-watergate-republicans", "state_media": false, "category": "オピニオン", "full_text": "When JD Vance spoke at the Richard M Nixon presidential library last week about his new book on his journey from atheism to an allegedly devout Catholicism, he raised eyebrows by minimizing Watergate. “The idea that it [took] down a presidency is crazy,” he said. He said it was the “deep state that took down Richard Nixon”– not the 37th president’s implication in serious crimes.\nCommentators were shocked. Did the vice-president not know that the investigation proved Nixon directed a conspiracy to bribe the men who broke into the Democratic party headquarters to lie in court from a secret, illegal slush fund?\nThat, when the president’s lawyer John Dean tried to warn him away from the attempt by suggesting it would take a million dollars that they would have to launder – “this is the sort of thing mafia people can do” – Nixon reassured him that the mafia had nothing on him: “You could get it in cash. I know where it could be gotten.”\nVance’s blithe avowal was said by commenters in my country to represent a new low in Republican cynicism. Was this the sort of thing they now think presidents should get away with?\nMy fellow Americans: you have memories like goldfish. Republicans have always said that – ever since Nixon’s first speech on Watergate in April 1973 about the botched burglary that set the scandal in motion 10 months earlier, when a prominent ally said it was just a prank at a press conference the next day, that the break-in was part of the “usual atmosphere of campaigning”, and the culprits were “not criminals at heart”.\nThat Republican ally was the governor of California, Ronald Reagan, speaking at a reception for a visiting group of schoolchildren. The media mocked him. The New York Times columnist Tom Wicker was enraged at how an “exponent of law and order” had surrendered to the philosophy that “[s]afeguards that ‘we’ support and revere in ordinary times must be suspended or limited for the duration – but only for ‘them’. ‘We’ will not be safe until ‘we’ crack down on ‘them’, occasionally by adopting their tactics.”\nReagan did not listen. After it was revealed that Nixon secretly taped many of the people he met, he called the investigation a “witch-hunt” and a “lynching”. After Nixon gave a speech insisting there wasn’t even anything to cover up, only 25% of Americans believed him. But Reagan called it “the voice of reason”.\nAt that, Reagan’s own anguished political aides had enough. They leaked to columnists their anguish that efforts to promote him for the presidency as “the successful architect of clean, frugal government, free of scandal” were being stymied by their boss’s insistence in treating the conspirators as “no worse than double parkers”. But they were wrong.\nIn my 2014 book, The Invisible Bridge: The Fall of Nixon and the Rise of Reagan, I demonstrate it was precisely Reagan’s ability to rhetorically absolve his fellow Republicans of sin, in supporting the Nixon of Watergate, that made him so attractive to the conservative rank and file as a party standard bearer – so much so that he came shockingly close to defeating incumbent Gerald Ford for the party’s presidential nomination in 1976.\nAnd that same mystic ability to affirm Americans’ sense of their own unimpeachable innocence, even if they had supported crimes – such as Watergate or Vietnam – eventually made him president.\nReagan was hardly the only figure to rise in the Republican firmament this way. One Nixon White House aide, Pat Buchanan, testified to the Senate investigating committee that its very investigation was merely politics by other means: the liberal Washington establishment working to steal back the White House after Nixon won it fair and square with his 1972 landslide.\nHe was rewarded for his candor with a widely syndicated column, becoming such a conservative hero that in 1992 he made a shockingly strong showing as a candidate in the 1992 New Hampshire primary against George HW Bush – himself something of a professional Watergate minimizer in his role back then as RNC chair.\nA steady stream of books spin conspiracies that anyone but the president’s men were behind it: that it was the CIA (Jim Hougan, Secret Agenda, 1984); or a Silent Coup (Len Colodny and Robert Gettlin, 1992) executed by Dean himself to hide a prostitution ring run by his wife, or The Secret Plot to Make Ted Kennedy President (Geoff Shepard, former Nixon White House aide, 2008).\nShepard then published two more tomes elaborating his version of the plot, in 2015 and 2021, then wrapped them up in a 2024 documentary that’s proven highly influential in the young Maga circles in which JD Vance moves.\nA book called It Didn’t Start With Watergate, in 1977, dubiously elevated a number of peccadilloes from past Democratic presidents to a Nixonian level of equivalency, and even claimed Democratic party foreknowledge – and indifference – to the 1972 burglary.\nIt proved so influential that the phrase “everyone did it, Nixon got caught” became an American commo", "translation_ja": "JDヴァンスが先週、無神論から表向き敬虔なカトリシズムへの歩みを綴った新著について講演するためリチャード・M・ニクソン大統領図書館を訪れた際、ウォーターゲート事件を矮小化する発言をして人々の眉をひそめさせた。「それが（大統領を）失脚させたという考えは馬鹿げている」と彼は述べた。さらに「深い国家（ディープステート）がリチャード・ニクソンを失脚させた」のであり、第37代大統領が重大な犯罪に関与していたからではないと言った。\n\nコメンテーターたちは衝撃を受けた。副大統領は、民主党本部に侵入した男たちに対して、違法な秘密資金から賄賂を渡して法廷で偽証させるよう指示したことをニクソンが主導した陰謀が、捜査によって証明されたことを知らないのだろうか？\n\n大統領の弁護士ジョン・ディーンが、百万ドルを必要とし、それを洗浄しなければならないと指摘して（「これはマフィアがやるようなことだ」）ニクソンを思いとどまらせようとした際、ニクソンはディーンを安心させた。マフィアも自分には及ばない、と。「現金で手に入れられる。どこで手に入れられるか知っている」と。\n\nヴァンスのあっけらかんとした発言は、アメリカのコメンテーターたちから、共和党の偽善の新たな底辺を示すものと言われた。これが今の共和党が大統領に逃げおおせて欲しいと考えることなのか、と。\n\nアメリカの皆さん、あなた方の記憶は金魚並みだ。共和党員はずっとそう言い続けてきた——1973年4月にニクソンがウォーターゲートに関する最初の演説を行って以来ずっと。その10ヶ月前に起きた、スキャンダルの発端となった侵入事件について、翌日の記者会見で著名な盟友がそれはただの悪ふざけであり、この侵入は「通常の選挙運動の雰囲気」の一部であり、犯人たちは「根っからの犯罪者ではない」と述べた。\n\nその共和党の盟友とは、訪問してきた学生グループのための懇親会で発言したカリフォルニア州知事ロナルド・レーガンである。メディアは彼を嘲笑した。ニューヨーク・タイムズのコラムニスト、トム・ウィッカーは、「法と秩序」の提唱者が「『我々』が平時に支持し崇める保護措置は、期間中は停止または制限されなければならない——しかしそれは『彼ら』に対してだけだ。『彼ら』の戦術を時に採用することで『彼ら』を締め付けるまで、『我々』は安全ではない」という哲学に屈したことに激怒した。\n\nレーガンは聞く耳を持たなかった。ニクソンが多くの面会者を秘密録音していたことが明らかになると、レーガンは捜査を「魔女狩り」および「リンチ」と呼んだ。ニクソンが隠蔽すべきことは何もないと主張する演説を行った後、信じたアメリカ人はわずか25%だった。しかしレーガンはそれを「理性の声」と呼んだ。\n\nこれには、レーガン自身の苦悩する政治スタッフも堪忍袋の緒が切れた。彼らはコラムニストたちに、ボスが共謀者たちを「駐車違反程度のもの」として扱い続けることで、レーガンを「スキャンダルのない、清廉で倹約的な政府の成功した立役者」として大統領候補に売り込む努力が妨げられているという苦悩をリークした。しかし彼らは間違っていた。\n\n私の2014年の著書『インビジブル・ブリッジ：ニクソンの没落とレーガンの台頭』で、私はまさにレーガンがウォーターゲートのニクソンを支持したことで仲間の共和党員を弁舌によって罪から免罪する能力こそが、保守的な党の一般党員にとって彼を党の旗手として非常に魅力的にした、と論証している——あまりにも魅力的であったため、彼は1976年の大統領候補指名争いで現職のジェラルド・フォードを破ることに驚くほど肉薄した。\n\nそして、自分たちがウォーターゲートやベトナムのような犯罪を支持していたとしても、アメリカ人の自己の非の打ち所のない無実さという感覚を肯定する同じ神秘的な能力が、最終的に彼を大統領にした。\n\nレーガンはこのような形で共和党の星座の中で台頭した唯一の人物ではなかった。あるニクソン政権補佐官、パット・ブキャナンは、上院の調査委員会で証言し、その捜査自体はただの別の手段による政治にすぎず、ニクソンが1972年の地滑り的勝利で公正に勝ち取った政権を奪い返そうとするワシントンのリベラルな既成権力の策謀だと述べた。\n\n彼はその率直さに対して広く配信されるコラムという報酬を得て保守派の英雄となり、1992年にはジョージ・H・W・ブッシュに対するニューハンプシャー州予備選挙に候補者として出馬して驚くほど健闘した——ブッシュ自身、当時の共和党全国委員会委員長としての役割においてウォーターゲートのプロ級の矮小化者であったが。\n\n絶え間なく続く一連の書籍が、大統領の部下たち以外の誰かが事件の背後にいたという陰謀論を展開している。CIA説（ジム・ハウガン『秘密の計画』、1984年）、ディーン自身が妻の売春組織を隠蔽するために実行した「静かなクーデター」説（レン・コロドニーとロバート・ゲトリン、1992年）、「テッド・ケネディを大統領にする秘密の計画」（ジオフ・シェパード、元ニクソン政権補佐官、2008年）などだ。\n\nシェパードはその後さらに二冊の著書で自らの陰謀論を精緻化し（2015年と2021年）、それらを2024年のドキュメンタリーにまとめた。このドキュメンタリーはJDヴァンスが活動する若いMAGAの界隈で大きな影響力を持っていることが明らかになっている。\n\n1977年の『ウォーターゲートから始まったのではない』という本は、過去の民主党大統領からの数々の些細な不正行為を疑わしい形でニクソン並みの水準に引き上げ、1972年の侵入に対する民主党の事前知識と無関心まで主張した。\n\nこの本は非常に影響力を持ち、「誰もがやっていた、ニクソンだけが捕まった」というフレーズがアメリカの一般的な……（原文ここで切断）", "vocab": [{"word": "blithe", "definition": "「のんきな、無頓着な」という意味の形容詞。深刻な問題を軽率に扱う態度を表す際に使われる。例：blithe avowal（無頓着な公言）。"}, {"word": "minimizing", "definition": "ここでは「（犯罪や問題を）過小評価する、矮小化する」という意味で使われている。政治的文脈でスキャンダルの深刻さを軽視する行為を指す。"}, {"word": "slush fund", "definition": "「秘密資金、裏金」を意味する慣用句。不正な目的のために秘密裏に蓄えられた資金のことで、政治スキャンダルの文脈でよく使われる。"}, {"word": "implication", "definition": "「関与、巻き込まれること」という意味。犯罪や不正行為への関わりを示す際に使われる法律・政治的な語。"}, {"word": "rank and file", "definition": "「一般党員、一般構成員」を意味する慣用表現。指導層ではなく組織の一般メンバーを指す際に使われる。"}, {"word": "peccadillo", "definition": "「些細な過ち、軽微な罪」を意味する名詞。重大な犯罪と対比して、取るに足らない不正行為を表す際に使われる。"}, {"word": "revisionist", "definition": "「修正主義的な」という意味の形容詞。歴史的事実を都合よく書き換えようとする解釈や立場を批判的に表す際に使われる。"}]}, {"title_ja": "欧州は独自の道を歩む――新たな戦略的自立の台頭", "title_en": "Europe Goes Its Own Way: A New Strategic Independence Emerges", "summary_ja": "筆者は、トランプ政権が欧州を軽視しているにもかかわらず、欧州はロシアの脅威と米国への信頼喪失を背景に深刻な戦略的覚醒を遂げつつあると論じる。欧州市民は防衛費増額や徴兵制の復活を支持し始め、戦略的自立を志向している。筆者はワシントンに対し、自立した欧州はもはや米国の外交政策に盲目的に従わないだろうと警告する。", "summary_en": "The author argues that despite the Trump administration's dismissive treatment of Europe, the continent is undergoing a profound strategic awakening driven by the Russian threat and growing distrust of U.S. reliability. Europeans are increasingly willing to invest in defense, support conscription, and pursue strategic autonomy. The author warns Washington that a more self-reliant Europe will no longer reflexively follow American foreign policy priorities.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/europe/europe-goes-its-own-way", "state_media": false, "category": "オピニオン", "full_text": "Europeans have been humiliated, disparaged, and sidelined since U.S. President Donald Trump returned to office in 2025. Indeed, it is no exaggeration to say that Europe has become the president’s favorite punching bag. The continent is, his administration believes, militarily emaciated, economically irrelevant, politically unfit, and culturally doomed to civilizational erasure. Trump’s attempt to coerce Denmark into relinquishing Greenland in 2025 was symbolic of the administration’s dismissive attitude.\nSo set is Washington in its beliefs about Europe, however, that it has overlooked the profound changes that are taking place. For the first time in decades, Europeans recognize the dangers that surround them. They are, accordingly, willing to invest in military resources and serve in their countries’ armed forces. From these shifts a new grand strategy is slowly being forged, which signals a new European geopolitical and strategic trajectory. Europe has come to recognize that its old paradigm—wealth without military strength, influence without sacrifice, and protection without obligation—is no longer sustainable. To dismiss Europe as permanently irrelevant is to ignore the scale and depth of the changes that are now underway. For decades, European countries reflexively aligned themselves with Washington’s priorities. They were even willing to send their soldiers to fight in U.S.-led wars that many of their publics—and at times their governments—regarded as misguided, peripheral, or strategically costly. A Europe that invests seriously in its own defense will no longer do that—and Washington had better get ready.\nEUROPE AWAKENS\nAfter decades of complacency, Europeans have awakened to the reality that they live in a dangerous world. According to polling conducted for the European Commission, 77 percent of Europeans think that Russia’s war in Ukraine represents a direct threat to Europe’s survival. Concern is strongest in eastern and northern Europe, but 59 percent of respondents in Germany, 50 percent in France, and 49 percent in the United Kingdom also consider Russia the greatest threat to their country’s national security. These are Europe’s largest and most powerful states. The Russian threat is thus no longer a concern confined to Europe’s periphery. It has moved to the heart of the continent.\nThis sense of insecurity is increased by the fact that many Europeans now realize that they can no longer rely on the United States. According to a YouGov poll commissioned by the European Council on Foreign Relations in May, only 11 percent of Europeans across the 15 surveyed countries (Austria, Bulgaria, Denmark, Estonia, France, Germany, Hungary, Italy, the Netherlands, Poland, Portugal, Spain, Sweden, Switzerland, and the United Kingdom) viewed the United States as an ally—down sharply from 16 percent six months earlier and 22 percent in November 2024. While confidence in the United States has been steadily declining in most surveyed countries, it is a more recent development in Hungary and Poland. Majorities in every country surveyed expressed doubt that the United States would come to their defense in the event of an attack, while 25 percent of respondents now see the United States as either a rival or an adversary.\nGiven the Russian threat and U.S. unreliability, many Europeans now support military buildups. Majorities in Denmark, Estonia, France, Germany, Poland, Portugal, and the United Kingdom favor increasing national defense expenditures. Italy is the only country where a clear majority remains opposed. Remarkably, across the 15 countries surveyed, 47 percent of respondents now support collective EU borrowing to finance defense initiatives, with 59 percent in favor in Portugal, 56 percent in Denmark, and 55 percent in the Netherlands. Until very recently, this idea was politically unthinkable. Equally striking, majorities now also favor cutting Europe’s dependence on U.S. military hardware and turning instead to European alternatives. Support for buying European is especially pronounced in Denmark, the Netherlands, and Sweden.\nFinally, majorities in France, Germany, and Poland now support reinstating mandatory military service, which is already in place in countries such as Denmark, Estonia, and Switzerland. Poland and Germany ended compulsory conscription in 2010 and 2011, respectively, whereas France phased out mandatory military service in the late 1990s. Over the past 30 years, support for conscription in many European countries had become a minority position. Today, it is becoming increasingly mainstream.\nGOING IT ALONE\nEuropean defense spending is going through the roof. In 2024, the 27 EU member states spent approximately $402 billion on defense, far surpassing Russia’s military outlays of $160 billion. Germany has taken a leading role, and Berlin now accounts for roughly a quarter of total EU defense spending, making it the world’s fourth-largest military spender. It is on track to spend $172 bi", "translation_ja": "欧州は独自の道を歩む\n\nドナルド・トランプ米大統領が2025年に再び政権に就いて以来、欧州は屈辱を与えられ、蔑まれ、脇に追いやられてきた。欧州が大統領のお気に入りのサンドバッグになっていると言っても、決して過言ではない。同政権は、欧州大陸は軍事的に衰弱し、経済的に無関係であり、政治的に不適格で、文化的には文明の消滅という運命にあると信じている。2025年にトランプ政権がデンマークにグリーンランドを割譲するよう圧力をかけようとしたことは、この政権の欧州に対する軽蔑的な姿勢を象徴するものだった。\n\nしかしワシントンは欧州に対する固定観念にとらわれるあまり、いま起きている深刻な変化を見落としている。欧州人は数十年ぶりに、自分たちを取り巻く危険を認識するようになった。そしてそれに応じて、軍事資源への投資や自国軍への入隊を受け入れようとしている。こうした変化から新たな大戦略がゆっくりと形成されつつあり、それは欧州の新たな地政学的・戦略的方向性を示している。欧州は今や、旧来のパラダイム――軍事力なき繁栄、犠牲なき影響力、義務なき庇護――がもはや持続不可能であることを認識するに至った。欧州を永遠に無関係な存在と切り捨てることは、現在進行中の変化の規模と深さを無視することに等しい。数十年にわたり、欧州諸国はワシントンの優先事項に反射的に従ってきた。自国の国民の多くが――そして時には自国の政府でさえも――誤った判断によるもの、あるいは周辺的で戦略的にコストが高いと見なした米国主導の戦争に、兵士を送り込むことさえいとわなかった。自国の防衛に真剣に投資する欧州は、もはやそのようなことはしない――ワシントンはその覚悟をしておいた方がいい。\n\n欧州の覚醒\n\n数十年にわたる油断の後、欧州人は自分たちが危険な世界に生きているという現実に目覚めた。欧州委員会のために実施された世論調査によれば、欧州人の77パーセントが、ロシアのウクライナ侵攻は欧州の存続に対する直接の脅威だと考えている。懸念は東欧と北欧で最も強いが、ドイツでは回答者の59パーセント、フランスでは50パーセント、英国では49パーセントも、ロシアを自国の国家安全保障に対する最大の脅威と見なしている。これらは欧州で最も大きく強力な国家である。つまりロシアの脅威は、もはや欧州の周縁部に限られた懸念ではなくなった。それは大陸の中心部へと移動してきているのだ。\n\nこうした不安感は、多くの欧州人が米国にもはや頼れないと気づき始めたことでさらに高まっている。欧州外交問題評議会の委託を受けてユーガブが5月に実施した世論調査によると、調査対象となった15か国（オーストリア、ブルガリア、デンマーク、エストニア、フランス、ドイツ、ハンガリー、イタリア、オランダ、ポーランド、ポルトガル、スペイン、スウェーデン、スイス、英国）の欧州人のうち、米国を同盟国と見なしているのはわずか11パーセントにとどまった。これは半年前の16パーセント、2024年11月の22パーセントから急落した数字である。米国への信頼は調査対象国のほとんどで着実に低下しているが、ハンガリーとポーランドではより最近の傾向だ。調査対象国すべてで、攻撃を受けた場合に米国が防衛に来てくれると思うかどうかについて過半数が疑問を呈しており、25パーセントの回答者が米国をライバルまたは敵対国と見なすようになっている。\n\nロシアの脅威と米国の信頼性低下を踏まえ、多くの欧州人が今や軍備増強を支持している。デンマーク、エストニア、フランス、ドイツ、ポーランド、ポルトガル、英国では、国防費増額を支持する人が過半数を占めている。明確な過半数が依然として反対しているのはイタリアだけだ。注目すべきことに、調査対象の15か国全体で、47パーセントの回答者が防衛関連事業への資金調達のためにEUが共同借り入れを行うことを支持しており、ポルトガルでは59パーセント、デンマークでは56パーセント、オランダでは55パーセントが賛成している。ついごく最近まで、この考えは政治的に考えられないものだった。同様に注目に値するのは、フランス、ドイツ、ポーランドで過半数が強制的な兵役義務の復活を支持するようになったことだ。デンマーク、エストニア、スイスなどではすでに導入されている。ポーランドとドイツはそれぞれ2010年と2011年に徴兵制を廃止し、フランスは1990年代後半に段階的に廃止した。過去30年間、多くの欧州諸国で徴兵制への支持は少数派の立場にあった。今日、それは次第に主流になりつつある。\n\n独自路線を歩む\n\n欧州の防衛支出は急増している。2024年、EU加盟27か国の防衛費は合計で約4020億ドルに達し、ロシアの軍事支出1600億ドルをはるかに上回った。ドイツは主導的な役割を担い、ベルリンは現在EU全体の防衛費の約4分の1を占め、世界第4位の軍事費支出国となっている。同国は1720億ドルを支出する軌道に乗っており――", "vocab": [{"word": "emaciated", "definition": "極度に衰弱した、やせ細った状態を意味する。ここでは軍事力が著しく弱体化していることを比喩的に表現している。"}, {"word": "coerce", "definition": "強制する、威圧して従わせるという意味の動詞。力や脅迫を用いて相手に何かをさせようとする行為を指す。"}, {"word": "complacency", "definition": "自己満足、現状への無批判な満足感を意味する名詞。危機感や危険への警戒を欠いた状態を指す。"}, {"word": "paradigm", "definition": "特定の分野や時代における支配的な考え方や枠組みを意味する。ここでは欧州が長年依拠してきた安全保障上の基本的な考え方を指す。"}, {"word": "conscription", "definition": "徴兵制、国家が市民に対して軍務を義務付ける制度を意味する名詞。mandatory military serviceと同義で使われている。"}, {"word": "geopolitical", "definition": "地政学的という意味の形容詞で、地理的条件が政治・外交・軍事戦略に与える影響に関連することを表す専門用語。"}, {"word": "reflexively", "definition": "反射的に、考えることなく自動的にという意味の副詞。深く検討せずに習慣的・本能的に行動する様子を表す。"}]}, {"title_ja": "アフリカのドローン戦争で勝っているのは誰か？非国家武装勢力が国家を凌駕しつつある", "title_en": "Who Is Winning Africa's Drone Wars? Nonstate Actors Gain Edge Over States", "summary_ja": "筆者は、アフリカの武装非国家勢力が低コストのドローンを国家軍よりも効果的に運用するようになり、かつて国家が持っていた制空優位が崩れつつあると主張する。ドローンはリビアやエチオピアでは国家にとって決定的な兵器だったが、サヘル地帯などの反乱勢力は安価な市販技術を急速に取り入れ、より強大な部隊を攻撃している。筆者は、アフリカ各国政府は外国の供給者に頼るのではなく、独自のドローン能力を開発し、不正規戦に適した軍隊を構築すべきだと訴える。", "summary_en": "The author argues that armed nonstate groups in Africa are now deploying low-cost drones more effectively than state militaries, eroding the air dominance governments once held. While drones proved decisive for states in Libya and Ethiopia, insurgents across the Sahel and beyond have rapidly adopted cheap, commercially available drone technology to strike superior forces. The author contends African governments must develop indigenous drone capabilities and restructure their militaries for irregular warfare rather than relying on foreign suppliers.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/somalia/who-winning-africas-drone-wars", "state_media": false, "category": "オピニオン", "full_text": "On June 22, 2025, fiber-optic first-person-view drones operated by the Azawad Liberation Front (FLA), a Tuareg rebel group, slammed into a convoy of Russian Africa Corps and Malian armed forces vehicles in northern Mali. Footage shows the drones striking two trucks, then cuts to fighters posing beside the wreckage. The significance was unmistakable: a little over a year after fiber-optic drones first appeared in Ukraine, a rebel group with scant resources had deployed the cutting-edge technology to humiliate two comparatively superior state actors.\nA decade earlier, the use of armed drones in African airspace looked very different. In 2011, the United States conducted the first drone strike on the continent, targeting senior leaders of the Somali Islamist group al-Shabab. At the time, Washington held a near monopoly in drone capability: only the world’s most advanced militaries had the access and technical expertise to employ the $20 million Predator drone used in the attack. That monopoly has since collapsed. Over the past decade, at least 37 African militaries have acquired drones of varying sophistication and cost.\nDrones have allowed African states’ small, lightly equipped forces to extend their reach across vast territories where state authority is contested. But over the last four years, armed nonstate actors in more than a dozen countries have begun to acquire and experiment with drones of their own, using them to enable ground operations, drop mortars, and conduct suicide attacks. They are now deploying these small uncrewed systems, many of which can be assembled from widely available and inexpensive parts, more effectively than states, who continue to rely on foreign governments for supply. In doing so, they have demonstrated that the gap between less-resourced and better-resourced adversaries has narrowed since the dawn of the drone wars, threatening the air dominance once enjoyed by states across the world.\nAfrican governments cannot hope to regain the military advantage by employing the strategies of a decade ago. Nor can they rely on foreign governments that have other incentives to provide them with the necessary firepower. Instead, they must learn to develop their own drones and integrate them into militaries built specifically for the irregular warfare required to defeat the insurgents that threaten them.\nAIR TRAFFIC CONTROL\nAfrica’s drone race began in Libya and Ethiopia. During its second civil war, which officially lasted from 2014 to 2020, Libya became the world’s most active drone battlefield. The country’s relatively open terrain, along with extensive weapons supply lines from external state actors, turned the war into a testing ground for emerging technology. The Tripoli-based Government of National Accord and the Benghazi-based Libyan National Army exchanged thousands of drone strikes, culminating in the 2020 battle for Tripoli. During the battle, Bayraktar TB2 drones supplied to the GNA by Turkey loitered just beyond the range of the LNA’s Russian-supplied air defenses and provided critical air support to GNA forces as they beat back an LNA attack on the capital. The failure of the LNA offensive ultimately led to the 2020 cease-fire that ended hostilities.\nDrones played an even more consequential role in Ethiopia’s 2020–22 conflict with the rebel Tigray Defense Forces (TDF). By late 2021, a TDF offensive had advanced to within 65 miles of Addis Ababa, the country’s capital and seat of the African Union. Desperate, Ethiopian Prime Minister Abiy Ahmed turned to Iran, Turkey, and the United Arab Emirates for drones, which inflicted heavy casualties, targeted the TDF’s vulnerable communications and supply lines, and turned the imminent collapse of the government into a sweeping defeat for the TDF. As a former Tigrayan officer involved in the offensive later told The Economist, “We could have captured Addis easily . . . . It was those fucking drones . . . . We had no way of shooting them down.”\nThe outcome of the Libyan and Ethiopian conflicts turned on a small number of capable drones, employed alongside capable infantry and mechanized forces. The GNA and the Ethiopian armed forces’ access to superior drone technology allowed them to repel an exposed, invading adversary whose forces were concentrated. Other states took notice.\nWE’RE NOT IN ADDIS ANYMORE\nIn the years since, dozens of countries across Africa, seduced by the idea of affordable access to the air, have acquired long-endurance drones to deal with their adversaries, regardless of whether those adversaries used the same tactics as the LNA or the TDF.\nToday, the most significant threat facing African governments is a different type of insurgency: militant groups expanding their reach across the Sahel, the Lake Chad Basin, and Somalia. After a wave of military coups between 2020 and 2023 led to the expulsion of French, U.S., and UN forces, juntas in Mali, Burkina Faso, and Niger turned to Turkish Bayraktar and Akinci drones to re", "translation_ja": "2025年6月22日、トゥアレグ反政府勢力であるアザワド解放戦線（FLA）が操縦する光ファイバー式一人称視点（FPV）ドローンが、マリ北部でロシア・アフリカ軍団とマリ軍の車列に突っ込んだ。映像には、ドローンが2台のトラックに命中する様子と、その後に戦闘員たちが残骸のそばでポーズをとる場面が映っていた。この出来事の意義は明白だった。光ファイバードローンがウクライナで初めて登場してからわずか1年余りで、乏しいリソースしか持たない反政府勢力が、この最先端技術を用いて、自分たちよりはるかに優勢な2つの国家勢力に恥をかかせたのである。\n\n10年前、アフリカの空域における武装ドローンの使用はまったく異なる様相を呈していた。2011年、米国はアフリカ大陸で初のドローン攻撃を実施し、ソマリアのイスラム主義組織アル・シャバブの幹部を標的にした。当時、ワシントンはドローン能力においてほぼ独占的地位を誇っていた。この攻撃に使用された2000万ドルのプレデター・ドローンを運用できたのは、世界で最も高度な軍隊だけだった。しかし、その独占状態はすでに崩壊している。過去10年間で、少なくとも37のアフリカ諸国の軍隊が、洗練度やコストの異なるドローンを取得した。\n\nドローンによって、アフリカ諸国の小規模で軽装備の部隊は、国家の権威が及びにくい広大な領土にまで展開力を拡大することができた。しかし過去4年間で、十数カ国の武装非国家勢力がドローンを独自に取得・実験し始め、地上作戦の支援、迫撃砲の投下、自爆攻撃などに活用している。こうした勢力は今や、市販の安価な部品から組み立て可能な小型無人機システムを、国家よりも効果的に運用している。一方、国家は依然として外国政府からの供給に頼り続けている。これにより、リソースの乏しい勢力とより豊富な資源を持つ敵対者との差は、ドローン戦争の夜明け以来縮まっており、かつて世界各地の国家が享受していた制空優位を脅かしている。\n\nアフリカ各国政府は、10年前の戦略を踏襲することで軍事的優位を取り戻すことはできない。また、必要な火力を提供するうえで別の思惑を持つ外国政府に頼ることもできない。代わりに、独自のドローンを開発し、自国を脅かす反乱勢力を打倒するために必要な不正規戦に特化した軍隊にそれを統合することを学ばなければならない。\n\n【制空権の管理】\n\nアフリカのドローン競争はリビアとエチオピアで始まった。2014年から2020年まで続いた第二次内戦において、リビアは世界で最も活発なドローン戦場となった。比較的開けた地形と、外部の国家勢力からの広範な武器供給ルートが重なり、この紛争は新興技術の試験場となった。トリポリを拠点とする国民合意政府（GNA）とベンガジを拠点とするリビア国民軍（LNA）がドローン攻撃を幾千回と応酬し、その頂点が2020年のトリポリ攻防戦だった。この戦いで、トルコがGNAに供与したバイラクタルTB2ドローンは、LNAのロシア製防空システムの射程外で旋回し、LNAが首都への攻撃を仕掛ける中でGNA軍に重要な航空支援を提供した。LNA攻勢の失敗は最終的に、戦闘を終結させた2020年の停戦につながった。\n\nドローンはエチオピアの2020〜2022年の内戦においてさらに決定的な役割を果たした。2021年末までに、ティグライ防衛軍（TDF）の攻勢はアフリカ連合の本拠地でもある首都アディスアベバから65マイル以内にまで迫っていた。追い詰められたエチオピアのアビイ・アハメド首相はイラン、トルコ、アラブ首長国連邦にドローンを求めた。これらのドローンはTDFに甚大な損害を与え、脆弱な通信線と補給線を標的にし、政府の崩壊寸前の状況をTDFへの完勝へと逆転させた。後にエコノミスト誌に語ったティグライ側の元将校は、「アディスは楽に落とせたはずだ……あのくそドローンのせいだ……撃墜する手段がなかった」と述べた。\n\nリビアとエチオピアの紛争の帰結は、有能な歩兵・機甲部隊と並んで投入された少数の高性能ドローンにかかっていた。GNAとエチオピア軍が優れたドローン技術を持っていたことで、集結した状態で侵攻してきた無防備な敵を撃退できた。他の国々もこれに注目した。\n\n【アディスとは勝手が違う】\n\nその後数年間で、アフリカ各国の何十もの国が、手頃な価格で制空アクセスを得られるという魅力に引き寄せられ、敵対勢力に対処するための長時間滞空型ドローンを取得してきた。しかしその敵が、LNAやTDFと同じ戦術をとるかどうかにかかわらずである。\n\n今日、アフリカ各国政府が直面する最大の脅威は別の種類の反乱だ。サヘル地帯、チャド湖盆地、ソマリアへと勢力を拡大する過激派組織である。2020年から2023年にかけての軍事クーデターの波によってフランス、米国、国連の部隊が追放された後、マリ、ブルキナファソ、ニジェールの軍事政権はトルコのバイラクタルおよびアクンジドローンに頼り始めた――", "vocab": [{"word": "fiber-optic", "definition": "光ファイバーを用いた（技術・通信）。ここでは、電波妨害に強い光ファイバーケーブルで制御するドローンを指す軍事技術用語として使われている。"}, {"word": "monopoly", "definition": "独占、独占権。特定の主体が市場や能力を単独で支配している状態を指し、ここでは米国がドローン技術を独占していた状況を表す。"}, {"word": "nonstate actors", "definition": "非国家主体。国家ではない組織や集団（反政府武装勢力、テロ組織など）を指す国際関係・安全保障分野の専門用語。"}, {"word": "loitered", "definition": "（軍事文脈で）滞空した、旋回し続けた。ドローンや航空機が特定の空域に長時間留まることを表し、「loitering munition（徘徊型弾薬）」などの複合語でも使われる。"}, {"word": "insurgents", "definition": "反乱勢力、武装反政府勢力。正規の政府や権力に対して武装蜂起する集団を指す政治・軍事用語で、「terrorism（テロリズム）」や「rebels（反政府勢力）」と区別して使われることもある。"}, {"word": "irregular warfare", "definition": "不正規戦。通常の正規軍同士の戦闘ではなく、ゲリラ戦や反乱鎮圧など非対称的な戦闘形態を指す軍事専門用語。"}, {"word": "seduced", "definition": "（比喩的に）魅了された、誘惑された。本来は「誘惑する」という意味だが、ここでは各国がドローンの魅力に引き寄せられた様子を表すイディオム的な用法。"}]}, {"title_ja": "イランは戦争に勝っていない：中東紛争の包括的評価", "title_en": "Iran Didn't Win the War: A Broader Assessment of the Middle East Conflict", "summary_ja": "筆者は、イランとの停戦合意をワシントンが批判しているにもかかわらず、3年間にわたる地域紛争全体を見れば、米国とイスラエルは戦略的に優位な立場に立ち、イランは大幅に弱体化したと主張する。イランの代理勢力ネットワークはほぼ壊滅し、軍事・核インフラも破壊され、地域的影響力は著しく低下した。筆者は、核交渉における新たな交渉力を含むこの戦争の結果は、外交政策の失敗ではなく、イランの脅威を封じ込めるための長期的成功を意味し得ると論じている。", "summary_en": "The author argues that despite Washington's criticism of the Iran cease-fire deal, the broader three-year regional conflict has left the United States and Israel in a stronger strategic position while significantly weakening Iran. Iran's proxy network is largely destroyed, its military and nuclear infrastructure decimated, and its regional influence severely curtailed. The author contends that the war's outcome, including new leverage for nuclear talks, could represent a long-term success in containing Iranian threats rather than a foreign policy failure.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/iran/iran-didnt-win-war", "state_media": false, "category": "オピニオン", "full_text": "Much of Washington has greeted the Iran cease-fire deal with scorn. After more than three months of war, the United States and Israel failed to achieve many of their objectives, which included overthrowing the regime in Tehran and ending a potential Iranian nuclear threat.\nBut when viewed from a broader perspective, the outcome looks different. The almost three-year-long regional conflict that started with Hamas’s attack on Israel in October 2023 and culminated in Operation Epic Fury this spring has put the United States and its partners in a far stronger position in the Middle East and left Iran much weaker. Iran’s proxy network of militant groups is largely in ruins; Syrian President Bashar al-Assad, one of Iran’s key partners, is gone; Tehran has been mostly ignored by its supposed allies in Beijing and Moscow; and Iran’s conventional forces, and much of its defense and nuclear industrial base, have been decimated. Iran’s sole victory from the latest round of conflict has come from its ability to close the Strait of Hormuz and cause economic damage across the world. But closing the strait also harms Iran itself, and the impact of a closure is likely to weaken over time as countries seek alternative suppliers, substitutes for oil, and new shipping routes to avoid the strait.\nThis is not to say that the war was perfectly executed or that it has gone according to plan. But the cumulative effect of three years’ worth of efforts to defang a dangerous and threatening regime in Iran has left the United States in a strong position to solidify its gains. The memorandum of understanding to end the war opens the door to direct U.S.-Iranian talks, which could further stabilize the region. The memorandum’s limits on Iran’s nuclear program are vague for now, but the United States’ ability to wield economic sanctions and credibly threaten more bombing gives it the leverage to achieve permanent limits on Iranian enrichment. Rather than a foreign policy failure, the war could be the final piece of a successful effort to contain Tehran’s regional threats and achieve a long-term cease-fire.\nTHE BIG PICTURE\nThe military campaign that the United States and Israel launched on February 28 cannot be viewed in isolation. In its legal justification for the operation, released on April 21, the Department of State explained: “Epic Fury is only the latest round of an ongoing international armed conflict with Iran.” That conflict began with the 2023 Hamas attack on Israel, and continued across the region in both the Biden and the Trump administrations. It included Israeli ground combat in Gaza and Lebanon; the toppling of Assad; U.S. and European navies fighting air and sea battles with the Houthis in and around the Red Sea; and Iranian air and missile strikes against Israel, the United States, and Gulf Arab partners.\nViewed as a campaign in an ongoing conflict, the most recent round of fighting with Iran was all but inevitable. After the United States and Israel had bombed Fordow and other nuclear sites during the 12-day war in June 2025, the Trump administration called off additional Israeli airstrikes, signaling that Washington sought a comprehensive settlement with Tehran to end the cycle of violence and limit its nuclear program. The administration then held another round of nuclear talks with Iran in February to get Tehran to limit enrichment and to probe if, in doing so, Iran would also moderate its aggressive approach to the region. Although Iran made some concessions—according to leaked reports, Iran agreed to temporarily halt enrichment—American negotiators concluded that Iran was unwilling to abandon its larger nuclear ambitions and thus its quest for regional hegemony.\nThe war destroyed much of Iran’s remaining military capabilities.\nIran’s actions after the 12-day war reinforced the perception that it was insistent on maintaining its regional dominance. Tehran rapidly deployed new long-range ballistic missiles, which the Israelis understood as providing a shield for Iran’s nuclear program. In January, the Iranian regime brutally suppressed a nationwide popular uprising. The Islamic regime thus showed it was not changing, which meant that the United States and Israel were dealing with the same foe that had started the war in 2023 via its proxies and which would inevitably incite more conflict.\nThe only question for Washington was whether it made more sense to strike sooner or later. The Trump administration and Israel decided that it was better to attack while Iran was still relatively weak from the 12-day war and the popular uprising than to wait until it had regained control and rebuilt missile stocks. The problem with the decision to attack on February 28 was not the timing. The problem was with the overly ambitious belief that the administration could achieve a total victory similar to what it had done in Venezuela and with its lack of preparation for obvious countermoves. The administration ignored decades of U.S. mi", "translation_ja": "イランは戦争に勝っていない\n\nワシントンの多くは、イランとの停戦合意を軽蔑的に受け止めている。3か月以上にわたる戦争の末、米国とイスラエルはテヘランの政権打倒やイランの潜在的な核の脅威終結など、多くの目標を達成できなかった。\n\nしかし、より広い視点から見れば、結果は異なって見える。2023年10月のハマスによるイスラエル攻撃に端を発し、今春の「オペレーション・エピック・フューリー」で頂点に達した約3年間の地域紛争は、米国とそのパートナーを中東においてはるかに強い立場に置き、イランを大幅に弱体化させた。イランの武装勢力による代理ネットワークはほぼ壊滅し、イランの主要なパートナーであるシリアのバッシャール・アル＝アサド大統領は政権を失い、テヘランは北京とモスクワの「同盟国」にほぼ無視され、イランの通常戦力と防衛・核産業基盤の大部分は壊滅状態となった。最新の紛争からイランが得た唯一の勝利は、ホルムズ海峡を封鎖し世界規模の経済的損害を引き起こした能力にある。しかし、海峡の封鎖はイラン自身にも打撃を与えており、各国が代替供給源、石油の代替品、海峡を迂回する新たな航路を模索するにつれ、封鎖の影響は時間とともに弱まっていく可能性が高い。\n\nこれは、戦争が完璧に遂行されたとか、計画通りに進んだと言いたいわけではない。しかし、危険で脅威的なイランの政権を無力化するための3年間にわたる取り組みの累積的効果は、米国を成果を固めるうえで有利な立場に置いている。戦争終結に向けた了解覚書は米国とイランの直接交渉への扉を開き、地域のさらなる安定化につながり得る。覚書に盛り込まれたイランの核プログラムへの制限は今のところ曖昧だが、米国が経済制裁を行使し、さらなる爆撃を信頼性をもって威嚇する能力があることで、イランのウラン濃縮に恒久的な制限を課すための交渉力を持っている。外交政策の失敗どころか、この戦争はテヘランの地域的脅威を封じ込め、長期的な停戦を実現するための取り組みの、最後のピースとなり得る。\n\n大局的視点\n\n米国とイスラエルが2月28日に開始した軍事作戦は、単独では評価できない。4月21日に公表された作戦の法的根拠の中で、国務省は次のように説明した。「エピック・フューリーは、イランとの継続中の国際武力紛争における最新の局面に過ぎない。」この紛争は2023年のハマスによるイスラエル攻撃から始まり、バイデン政権とトランプ政権の両政権にまたがってこの地域全体で継続した。その内容には、ガザとレバノンにおけるイスラエルの地上戦、アサドの打倒、紅海周辺でのフーシ派との海空戦闘、そしてイスラエル、米国、湾岸アラブ諸国を標的としたイランの航空・ミサイル攻撃が含まれる。\n\n進行中の紛争における一連の作戦として見れば、イランとの最新の戦闘はほぼ不可避であった。米国とイスラエルが2025年6月の12日間の戦争でフォルドウや他の核施設を爆撃した後、トランプ政権はイスラエルによる追加空爆を中止させ、ワシントンがテヘランとの包括的な和解を求め、暴力の連鎖を断ち切り核プログラムを制限しようとしているシグナルを発した。政権はその後2月にイランとの核交渉を再開し、テヘランに濃縮制限を求めるとともに、そうすることでイランが地域に対する攻撃的姿勢を緩和するかどうかを探った。イランはいくつかの譲歩をしたものの——漏洩した報告によれば、イランは濃縮の一時停止に合意したという——米国の交渉担当者は、イランがより大きな核野心、つまり地域覇権の追求を放棄する意思がないと結論づけた。\n\nこの戦争によりイランの残存軍事力の大部分が破壊された。\n\n12日間の戦争後のイランの行動は、地域支配に固執しているという認識を強めた。テヘランは新型長距離弾道ミサイルを急速に配備し、イスラエル側はこれをイランの核プログラムを守るための盾と理解した。1月には、イランの政権が全国的な民衆蜂起を残忍に弾圧した。こうしてイスラム政権は変わっていないことを示し、それは米国とイスラエルが、2023年に代理勢力を通じて戦争を始めたのと同じ敵、必然的にさらなる紛争を煽り続ける敵を相手にしていることを意味した。\n\nワシントンにとっての唯一の問題は、早期に攻撃する方が理にかなうか、それとも後に攻撃する方が理にかなうかであった。トランプ政権とイスラエルは、イランが12日間の戦争と民衆蜂起によってまだ比較的弱体化している間に攻撃する方が、イランが体制を立て直しミサイル備蓄を再建するまで待つよりも得策と判断した。2月28日の攻撃開始の決断に問題があったとすれば、それはタイミングではない。問題は、ベネズエラで達成したような完全勝利を実現できるという過度に野心的な信念と、明白な反撃への備えの欠如にあった。政権は数十年にわたる米国の軍事的知見を無視した……", "vocab": [{"word": "decimated", "definition": "「壊滅させられた」という意味。元来は10分の1を失うことを指したが、現代では組織や能力が大幅に破壊・削減された状態を表す強調表現として使われる。"}, {"word": "hegemony", "definition": "「覇権」を意味する政治・外交用語。特定の国家や勢力が他国・他地域に対して支配的な影響力や権威を持つ状態を指す。"}, {"word": "memorandum of understanding", "definition": "「了解覚書（MOU）」と訳される外交・法律用語で、当事者間の合意事項を文書化したもの。法的拘束力は正式な条約より弱いが、交渉の基盤として機能する。"}, {"word": "proxy network", "definition": "「代理勢力ネットワーク」を意味し、主体国が直接関与せずに他国の武装集団や組織を通じて影響力を行使する仕組みを指す国際政治用語。"}, {"word": "credibly threaten", "definition": "「信頼性をもって脅す」という意味の外交・安全保障上の表現で、相手に脅しが実行される可能性を信じさせるだけの実力や意志があることを示すこと。"}, {"word": "enrichment", "definition": "核文脈では「ウラン濃縮」を指す専門用語。天然ウランの特定同位体の濃度を高める工程で、原子力発電や核兵器開発に関連して頻繁に使われる。"}, {"word": "defang", "definition": "「牙を抜く」という比喩的表現で、危険な相手や組織の攻撃力・脅威を取り除き無害化することを意味する慣用的な政治・外交用語。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-29 15:20 JST";
renderTabs();renderList();
</script>
