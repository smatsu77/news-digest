 (UAE), Qatar, Kuwait, Oman and Bahrain all said they had responded to missiles and drones from Iran.\nThe BBC has approached US Central Command for comment on the attack in Jordan.\nQatar, a mediator in ceasefire talks, had not been attacked since April, while the UAE had not been attacked since May.\nThe renewed fire has put in jeopardy an interim ceasefire agreement signed last month, which aimed to reopen the Strait and eventually bring a permanent end to the conflict.\nEarlier this week, US President Donald Trump declared the Iranian attacks meant the ceasefire was over, while Iran's Foreign Minister Abbas Araghchi accused the US of violating the deal.\nHowever, Trump said talks would still continue and mediators were trying to revive the process.\nUS media reported that Iran told American officials attacks on tankers earlier this week were a mistake and blamed a rogue internal group.\nThe latest hostilities were sparked after the IRGC said it had fired a naval cruise missile at a vessel that was attempting to sail along an unapproved route.\nUS Central Command (Centcom) said the IRGC \"blatantly attacked\" a Cyprus-flagged vessel which was \"unable to continue its journey\" due to damage to the engine room.\nA crew member from the MV GFS Galaxy ship was missing, it added.\nThe UK's Maritime Trade Operations (UKMTO) said it had been informed by military authorities that the crew of the vessel were forced to abandon ship and were in a lifeboat.\n\"Iran was provided yet another opportunity to demonstrate adherence to the Memorandum of Understanding after being held accountable for earlier attacks on commercial vessels but has again failed,\" Centcom wrote on X.\nIt said US strikes hit 140 Iranian military targets, including missile and drone sites, communication networks, and coastal surveillance locations.\nThe statement was shared by US Secretary of Defense Pete Hegseth, who wrote: \"Iran made a poor choice. Now they pay.\"\nThe IRGC said the US had targeted \"a number of coastal bases and telecommunications towers on the southern coast\".\nIn response, Iran said its \"first phase\" of retaliation included strikes on the Prince Hassan Air Base in Jordan, saying it had destroyed the base's command and control centre and MQ9 drone hangars.\nOn Sunday, US Central Command reiterated the Strait was open, warning the US military was in position to make sure it stayed free-flowing.\nEarlier Iran's parliamentary speaker Mohammad Bagher Ghalibaf, who is also the country's chief negotiator with the US, wrote on X that the \"era of one-sided deals is OVER\".\nHe went on: \"We told you: keep your word or pay the price. Reality is knocking.\"\nRelated topics\n- Published7 days ago\n \n- Published4 days ago", "translation_ja": "", "vocab": []}, {"title_ja": "US senator and close Trump ally Lindsey Graham dies after 'brief and sudden illness'", "title_en": "US senator and close Trump ally Lindsey Graham dies after 'brief and sudden illness'", "summary_ja": "Donald Trump paid tribute to the 71-year-old South Carolina senator, calling him a \"true American patriot\" who will be \"greatly missed\".", "summary_en": "Donald Trump paid tribute to the 71-year-old South Carolina senator, calling him a \"true American patriot\" who will be \"greatly missed\".", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cvgj25j6nmeo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "US senator and close Trump ally Lindsey Graham dies after 'brief and sudden illness'\n- Published\nRepublican Senator Lindsey Graham, a close ally of US President Donald Trump, has died at the age of 71. He died on Saturday evening following a \"brief and sudden illness\", according to his office.\nElected to the Senate in 2002, the South Carolina politician was one of Washington's most influential voices on foreign policy, often pushing for US military intervention overseas.\nDonald Trump said Graham was a \"true American Patriot\" who would be \"greatly missed\".\nGraham had just returned from Kyiv, where he met Ukrainian President Volodymyr Zelensky on Friday. There were no known health concerns ahead of his trip.\nTrump told NBC News that he had spoken with Graham hours before his death and the senator \"sounded great\" but a little tired.\n\"He was a tough cookie in many ways,\" Trump told NBC on Sunday. \"If he wanted to get something, if he thought he was right and he had people against him, he could be very tough, actually. But he was a good person.\"\nAccording to US media, emergency personnel responded to reports of a cardiac arrest at a house owned by Graham in Washington DC on Saturday night.\nGraham was previously a vocal critic of Donald Trump, calling him a \"race-baiting, xenophobic, religious bigot\" in 2015. The next year, ahead of the 2016 presidential election, he said: \"If we nominate Trump, we will get destroyed... and we will deserve it.\"\nAfter the US Capitol riots in 2021, Graham told the Senate: \"Trump and I, we've had a hell of a journey. I hate it to end this way.\n\"All I can say is a count me out. Enough is enough.\"\nBut over time his tone towards the president softened.\nHe voted against convicting Trump in the 2021 impeachment trial, and supported his election in 2024.\nGraham cited Trump's record on the US southern border, the killing of Iran's powerful military commander Qasem Soleimani and the appointment of conservative judges.\n\"There is a dark side to Donald Trump... and he was a very good president. But I am sticking with him because I saw what he did,\" Graham told the BBC in 2023.\nGraham was known for his interventionist stance on foreign policy, including strong support for Israel and the war in Iran.\nHe told CBS last month that the US would \"obliterate\" Iran if the country did not submit to US control of the Strait of Hormuz. It was one of his last televised interviews.\nIsrael's Prime Minister Benjamin Netanyahu said on Sunday that \"Lindsey understood that the security of Israel and America are inseparable\".\nIsrael lost \"one of its greatest friends\", he added.\nGraham also voted in favour of military action against Iraq in the wake of the September 11 attacks in 2001 and was opposed to the withdrawal of US troops from Afghanistan in 2021, describing it as a \"sad and dangerous event for US national security\".\n\"Jihadists all over the world are celebrating,\" he added. \"America will be seen as weak.\"\nThe senator was also a stalwart supporter of arming Kyiv and applying sanctions against Moscow. Zelensky said in a post on X, external that he was \"deeply saddened\" by his death.\n\"America and the world have lost a determined leader,\" he added.\nSouth Carolina Governor Henry McMaster now has the power to appoint a temporary replacement for Graham until the end of his current term in January.\nHis successor will be chosen in November's midterm elections.\nBefore Graham's death, Republicans held a 53-47 majority over Democrats in the Senate. Both parties are fighting for Senate control in November.\nThe death comes as another Republican senator has been hospitalised for weeks with an unknown medical condition. Aides to Kentucky Senator Mitch McConnell have released few details about his condition.\nRelated topics\n- Published29 May 2023\n \n- Published28 February 2025", "translation_ja": "", "vocab": []}, {"title_ja": "Badly burned British couple rescued from ravine during Spain wildfires, reports say", "title_en": "Badly burned British couple rescued from ravine during Spain wildfires, reports say", "summary_ja": "The unnamed pair were found semi-conscious with 40% burns after being trapped by the blazes raging through Almeria province, local media reports.", "summary_en": "The unnamed pair were found semi-conscious with 40% burns after being trapped by the blazes raging through Almeria province, local media reports.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cx2x7441762o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Badly burned British couple rescued from ravine during Spain wildfires, reports say\n- Published\nA British couple have been found down a ravine, badly burned and semi-conscious, after being caught up in the deadly wildfires that tore through Spain's Almeria province, local media is reporting.\nThe pair are thought to have been out hiking when they were caught up in the blaze, which spread rapidly through the province on Thursday. They were evacuated and taken to hospital where they are in intensive care.\nThe fire, which has now been contained, claimed the lives of 12 people, including four believed to be Britons, and burned through about 7,000 hectares (17,300 acres) of land, authorities said.\nThe identities of those killed have not yet been officially confirmed.\nThe couple were discovered by Civil Guard officers searching for survivors near the worst-hit village of Bedar in the early hours of Friday morning.\nOne of the rescuers, Sergeant Pedro Barre, said they heard distant cries for help.\n\"As you gain more experience, something inside you tells you, 'Look again, try one more time,'\" he told Spain's TVE state broadcaster.\nThe rescue team followed the sound and climbed down a hillside. They found the couple in critical condition, semi-conscious and with severe burns covering 40% of their bodies.\n\"Being able to call out in the condition they were in was a titanic effort,\" said Rafael Zea, another of the officers involved in the operation.\n\"We'll never forget that look of surprise and emotion on their faces,\" Barre added.\nOn Sunday, Andalusia's regional government head, Juan Manuel Moreno Bonilla, said that more favourable conditions had seen firefighters get the blaze under control, and that the overall alert had been downgraded.\nAbout 600 of the nearly 1,500 people evacuated from the fire zone in Almería province were told they could return, regional emergency chief Antonio Sanz said.\nDozens gathered at a roundabout beneath the village of Bédar, hoping to be allowed back to their homes, many with no idea if their properties had survived.\nAmong those waiting anxiously were Mike and Belinda Lithgoe from Cornwall, who have a holiday property nearby.\nSince the fires, they have slept in their camper van alongside their dog, Rocket.\nThe couple said they would be allowed to check on their home during a one hour window later on Sunday, and were \"hopeful\" that their house would still be standing, because the smoke was on the other side of the mountain as they were fleeing.\n\"It's impossible to know,\" said Mike. \"You hope it will have gone down the ravine and round rather than up through the village.\"\nAlso waiting nearby was Emma Mitchell and her husband.\nEmma challenged an earlier statement by local authorities that some of those killed had not taken a designated evacuation route.\n\"We've lived here for three years full time and there has never been information that you should take this road if there is a fire, never.\"\nAnd Thomas-Wolf Verdonckt, the son of a Belgian man who died in the wildfire also disputed authorities' claims that he and other victims ignored official advice to shelter in place.\nHe told Reuters that he spoke to his father, 63-year-old businessman Stanislas Verdonckt, by phone on Thursday evening as the fire advanced on Bédar.\nThe emergency services gave them \"no official warning\" or evacuation commands, he said.\n\"There was no warning, they were not aware of a fire, and by the time they were - because they saw the fire themselves - it was already too late,\" he said.\nHis father and others attempted to take the main road - a designated evacuation route - but found it was not possible to access and took a different trail.\n\"It was out of their hands,\" he said, \"it's not fair on them that they are [blamed] when it was not their choice to begin with.\"\nLocal officials have said previously said they did not issue an alert on Thursday night because it may have reached people beyond the affected area and could have complicated evacuations.\nAuthorities have also said police went door-to-door or telephoned residents with instructions on how to shelter or evacuate safely.\nBédar Mayor Angel Collado told reporters on Saturday that he had urged the group, including Stanislas Verdonckt, to shelter in place.\nThe Andalusian regional government and the Spanish Civil Guard police did not immediately respond to requests for comment.\nEmma Mitchell also condemned the decision not to send a text message to all phones in the area.\n\"I think they should have done the mobile alert, as they do for earthquakes. I know they said that it was too technical and complex… but the reality is, out here in Bédar, there are very few officials.\"\nShe said the local policeman and firefighters had been magnificent in their individual efforts, visiting dozens of people as the fire took hold.\nA sustained heatwave with temperatures of around 40C (104F) has caused wildfires across southern Europe this summer, particularly in France, Portugal and Spai", "translation_ja": "", "vocab": []}, {"title_ja": "Police say no suggestion of political motive in Widdecombe killing after new arrest", "title_en": "Police say no suggestion of political motive in Widdecombe killing after new arrest", "summary_ja": "Police say they are not looking for anyone else after a 28-year-old man was arrested in Rotherham, South Yorkshire.", "summary_en": "Police say they are not looking for anyone else after a 28-year-old man was arrested in Rotherham, South Yorkshire.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c8628q3eqdeo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Police say no suggestion of political motive in Widdecombe killing after new arrest\n- Published\nPolice investigating the alleged murder of Ann Widdecombe say there is \"nothing to suggest it was politically motivated\".\nDevon and Cornwall Police added they are not looking for anyone else in connection with her death, following the arrest of a 28-year-old white British man in Rotherham, South Yorkshire, on Saturday.\nThe former MP and MEP, 78, was found dead on Thursday at her home in Haytor, Devon, having sustained serious injuries. Police believe she had been attacked almost 24 hours earlier.\nAssistant Chief Constable Matt Longman said officers remained \"open-minded\" about a potential motive and that there was not thought to be any threat to the wider public.\n- Ann Widdecombe murder probe: What we know so far - Published4 hours ago\n \nThe arrest was carried out shortly after 21:00 BST on Saturday, approximately 270 miles (430km) from Widdecombe's home, by officers at Counter Terrorism Police North East and South Yorkshire Police on behalf of the force.\nThere is no information to suggest the attack on Widdecombe was terrorism-related, Longman told reporters on Sunday.\nThe family of the former Conservative minister, and later Reform UK spokesperson, have been informed of the updates and are being supported by specialist officers.\nDevon and Cornwall Police has received more than 120 reports of information after making a public appeal, and Longman asked anyone who had not yet come forward to do so \"as a priority\".\nHe reiterated calls asking people not to speculate, especially about a potential motive, saying this was \"unhelpful\" for the investigation and \"distressing\" to Widdecombe's relatives.\nLongman said a \"heightened\" police presence would remain in the area over the coming weeks.\nChief Constable James Vaughan said Devon and Cornwall Police had \"mounted an extraordinary response to a horrific murder of a very prominent public figure\" and shown \"British policing at its very best\".\nHe said the investigation had been running at \"lightning pace\" over the past 48 hours, adding: \"I am really pleased that we have a suspect firmly in custody.\"\nWiddecombe served as the Conservative MP for Maidstone for 23 years, holding ministerial roles in John Major's government between 1994 and 1997.\nFollowing her departure from the Commons in 2010, Widdecombe appeared on BBC's Strictly Come Dancing that year, and was a runner-up on Celebrity Big Brother eight years later.\nShe joined the Brexit Party in 2019 where she represented South West England as its MEP from 2019 to 2020.\nNews of Widdecombe's death was first released by her management agency on Friday morning.\nLater that day, Devon and Cornwall Police issued a statement saying they had launched a murder investigation. On Friday evening they said they had arrested a 26-year-old white British man. He was released the following day and the force said he was no longer part of the investigation.\nThe second arrest of the 28-year-old man took place later on Saturday.\nThere has been an outpouring of shock and grief from across the political divide following the news of her death.\nPrime Minister Sir Keir Starmer paid tribute to Widdecombe, describing her death as a \"significant loss\" as he called on people to \"rise above\" political differences.\n\"My heart is breaking for her family,\" said Conservative leader Kemi Badenoch, describing Widdecombe as a \"very fun and feisty woman\".\nReform UK leader Nigel Farage, who visited Dartmoor to pay his respects to Widdecombe, described her as a \"remarkable individual\" and \"the fiercest defender of free speech\".\n\"She was an extraordinary lady,\" shadow chancellor Mel Stride, MP for Central Devon - Widdecombe's constituency - told BBC One's Sunday with Laura Kuenssberg programme.\n\"I was always struck both by the fact she had real true conviction, strong personality, yet she had that twinkle in her eye, that enormous energy and that great sense of humour,\" he said, describing the combination as \"quite rare\" and \"rather special\".\nPeter Horrell, her personal driver of 10 years, was among those who lay flowers outside her home.\nHe said Widdecombe had \"never mentioned any fear\" for her safety and loved living in the tiny village she had made her home.\nRelated topics\n- Published6 hours ago\n \n- Published12 hours ago", "translation_ja": "", "vocab": []}, {"title_ja": "Badly burned British couple rescued from ravine during Spain wildfires, reports say", "title_en": "Badly burned British couple rescued from ravine during Spain wildfires, reports say", "summary_ja": "The unnamed pair were found semi-conscious with 40% burns after being trapped by the blazes raging through Almeria province, local media reports.", "summary_en": "The unnamed pair were found semi-conscious with 40% burns after being trapped by the blazes raging through Almeria province, local media reports.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cx2x7441762o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Badly burned British couple rescued from ravine during Spain wildfires, reports say\n- Published\nA British couple have been found down a ravine, badly burned and semi-conscious, after being caught up in the deadly wildfires that tore through Spain's Almeria province, local media is reporting.\nThe pair are thought to have been out hiking when they were caught up in the blaze, which spread rapidly through the province on Thursday. They were evacuated and taken to hospital where they are in intensive care.\nThe fire, which has now been contained, claimed the lives of 12 people, including four believed to be Britons, and burned through about 7,000 hectares (17,300 acres) of land, authorities said.\nThe identities of those killed have not yet been officially confirmed.\nThe couple were discovered by Civil Guard officers searching for survivors near the worst-hit village of Bedar in the early hours of Friday morning.\nOne of the rescuers, Sergeant Pedro Barre, said they heard distant cries for help.\n\"As you gain more experience, something inside you tells you, 'Look again, try one more time,'\" he told Spain's TVE state broadcaster.\nThe rescue team followed the sound and climbed down a hillside. They found the couple in critical condition, semi-conscious and with severe burns covering 40% of their bodies.\n\"Being able to call out in the condition they were in was a titanic effort,\" said Rafael Zea, another of the officers involved in the operation.\n\"We'll never forget that look of surprise and emotion on their faces,\" Barre added.\nOn Sunday, Andalusia's regional government head, Juan Manuel Moreno Bonilla, said that more favourable conditions had seen firefighters get the blaze under control, and that the overall alert had been downgraded.\nAbout 600 of the nearly 1,500 people evacuated from the fire zone in Almería province were told they could return, regional emergency chief Antonio Sanz said.\nDozens gathered at a roundabout beneath the village of Bédar, hoping to be allowed back to their homes, many with no idea if their properties had survived.\nAmong those waiting anxiously were Mike and Belinda Lithgoe from Cornwall, who have a holiday property nearby.\nSince the fires, they have slept in their camper van alongside their dog, Rocket.\nThe couple said they would be allowed to check on their home during a one hour window later on Sunday, and were \"hopeful\" that their house would still be standing, because the smoke was on the other side of the mountain as they were fleeing.\n\"It's impossible to know,\" said Mike. \"You hope it will have gone down the ravine and round rather than up through the village.\"\nAlso waiting nearby was Emma Mitchell and her husband.\nEmma challenged an earlier statement by local authorities that some of those killed had not taken a designated evacuation route.\n\"We've lived here for three years full time and there has never been information that you should take this road if there is a fire, never.\"\nAnd Thomas-Wolf Verdonckt, the son of a Belgian man who died in the wildfire also disputed authorities' claims that he and other victims ignored official advice to shelter in place.\nHe told Reuters that he spoke to his father, 63-year-old businessman Stanislas Verdonckt, by phone on Thursday evening as the fire advanced on Bédar.\nThe emergency services gave them \"no official warning\" or evacuation commands, he said.\n\"There was no warning, they were not aware of a fire, and by the time they were - because they saw the fire themselves - it was already too late,\" he said.\nHis father and others attempted to take the main road - a designated evacuation route - but found it was not possible to access and took a different trail.\n\"It was out of their hands,\" he said, \"it's not fair on them that they are [blamed] when it was not their choice to begin with.\"\nLocal officials have said previously said they did not issue an alert on Thursday night because it may have reached people beyond the affected area and could have complicated evacuations.\nAuthorities have also said police went door-to-door or telephoned residents with instructions on how to shelter or evacuate safely.\nBédar Mayor Angel Collado told reporters on Saturday that he had urged the group, including Stanislas Verdonckt, to shelter in place.\nThe Andalusian regional government and the Spanish Civil Guard police did not immediately respond to requests for comment.\nEmma Mitchell also condemned the decision not to send a text message to all phones in the area.\n\"I think they should have done the mobile alert, as they do for earthquakes. I know they said that it was too technical and complex… but the reality is, out here in Bédar, there are very few officials.\"\nShe said the local policeman and firefighters had been magnificent in their individual efforts, visiting dozens of people as the fire took hold.\nA sustained heatwave with temperatures of around 40C (104F) has caused wildfires across southern Europe this summer, particularly in France, Portugal and Spai", "translation_ja": "", "vocab": []}, {"title_ja": "Tuchel angry at 'lucky' England - but Bellingham defends players", "title_en": "Tuchel angry at 'lucky' England - but Bellingham defends players", "summary_ja": "England boss Thomas Tuchel is praised by some for saying his players \"got lucky\" in World Cup quarter-final win over Norway - but match-winner Jude Bellingham disagrees.", "summary_en": "England boss Thomas Tuchel is praised by some for saying his players \"got lucky\" in World Cup quarter-final win over Norway - but match-winner Jude Bellingham disagrees.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/sport/football/articles/ckg474ekv58o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Tuchel angry at 'lucky' England - but Bellingham defends players\n- Published\nAfter reaching the stage as hosts in 1966, and then in Italy and Russia in 1990 and 2018, England have another World Cup semi-final to look forward to.\nWhen French referee Clement Turpin signalled the end of an incident-filled 2-1 quarter-final win in Miami, Thomas Tuchel's exhausted players sank to their knees in celebration after being taken to extra time by Norway.\nEngland's fans danced in the stands, two-goal Jude Bellingham accidentally clashed heads with goalkeeper Jordan Pickford during the on-pitch celebrations, while captain Harry Kane lined up with his team-mates to acknowledge the thousands of supporters who had made the long journey to Florida.\nYet Tuchel was far from impressed.\n\"We got lucky,\" he said after a game that saw Norway take the lead, miss a great chance to make it 2-0, have a goal disallowed and also hit the bar.\n\"We made life very, very difficult for ourselves. The result is fantastic. We are in the last four. It's amazing but [I am] not happy with the performance - in every sense.\n\"We made life difficult for us in the way we played and how we played - sloppy, a lot of technical mistakes, not fast enough, not repetitive enough.\"\nTuchel suggested one thing had helped England advance.\n\"This is pure mentality,\" he said.\nWhen asked about his manager's comments and criticism of the performance, Bellingham - who struck in the 47th and 93rd minutes - replied: \"Yeah well, whatever.\n\"It's difficult out there, it's a tough shift. All the players have put in a tough shift. My thoughts and appreciation goes to the players out there who put in a great shift.\"\nEngland have struggled to set this World Cup alight since overcoming Croatia 4-2 in their first group game.\nThey were held by Ghana, did enough to get past Panama 2-0, fell behind to DR Congo before advancing, and dug deep to see off Mexico 3-2 with 10 men.\nAnd Tuchel said that while he \"loves\" the team, he also expects much more from them.\n\"[There is] no disconnect from me to my team,\" he said.\n\"With my heart, I am fully in love with my players and my team, but we can play better, there are a lot of things to do better.\"\nWill they need to?\nWill character and mentality be enough as England look to win the World Cup for only the second time - or do they need to improve with a semi-final against Argentina next?\n- 'Animals', Hand of God and Beckham - Argentina and England's World Cup rivalry - Published5 hours ago\n \n- 'He has dragged them through all tournament' - England player ratings - Published16 hours ago\n \n- Bellingham reaching heights of World Cup legends with Messi next - Published11 hours ago\n \n'Maybe he doesn't know what it's like'\nEngland had to endure hot and humid conditions in Miami in getting past Norway but they have little recovery time before Wednesday's semi-final in Atlanta.\nThey were pushed all the way by Norway in a gruelling game that lasted 122 minutes.\n\"Maybe he [Tuchel] doesn't know what it's like to play in those conditions against Erling Haaland, Martin Odegaard, Antonio Nusa and Alexander Sorloth,\" added Bellingham, who is averaging a goal a game at this World Cup after his double took his tally to six.\n\"They're not an easy team to play against. I can't speak highly enough of the lads.\n\"You can't win every game popping the ball and making 1,000 passes, sometimes you have to win dirty and we did that today.\"\nTuchel's post-match comments, however, were praised by several former England players.\n\"Over the years, we might have had someone come out and say that we stuck together and we were brilliant,\" former England captain Alan Shearer told BBC Sport.\n\"You have to give him [Tuchel] credit for doing it - he was having none of that.\"\nWayne Rooney, who scored 53 goals in 120 England appearances between 2003-2018, said England's German boss was \"spot on in terms of the mentality\".\nRooney said the team showed character as Ezri Konsa went off injured and Declan Rice, who had been a doubt due to injury in the days before the game, was replaced at the start of the second half.\n\"The character of the players has got them through that game because for large parts Norway were the better team,\" added Rooney.\nMeanwhile, former England defender Matt Upson told BBC Sport: \"It felt that [with] 25 minutes left before the end of the 90, Norway were going to win this game.\"\n- Did ball hit spidercam before England goal? Snicko says not - Norway unsure - Published13 hours ago\n \n'I expect England to start semi-final differently'\nEngland have had to rely on individual performances to dig themselves out of trouble in their run to the last four.\nBellingham and Kane combined to break down Panama in the group stage before Kane's late double turned it around after England had fallen behind in the last-32 win over DR Congo in Atlanta, where they will return for next week's semi-final.\nOn Saturday, it was Bellingham who got England out of trouble after Norway had taken the", "translation_ja": "", "vocab": []}, {"title_ja": "EU defense remains heavily reliant on the United States", "title_en": "EU defense remains heavily reliant on the United States", "summary_ja": "There are many obstacles as EU governments seek to reduce their dependence on the US. DW looks at the European Unions's attempts to develop counterparts to Patriot and Tomahawk missiles, F-35 jets, and Starlink internet.", "summary_en": "There are many obstacles as EU governments seek to reduce their dependence on the US. DW looks at the European Unions's attempts to develop counterparts to Patriot and Tomahawk missiles, F-35 jets, and Starlink internet.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/eu-defense-remains-heavily-reliant-on-the-united-states/a-77917972?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "EU defense remains heavily reliant on the United States\nJuly 12, 2026EU militaries continue to rely heavily on US weaponry. This was again evident at July's NATO summit in Turkey's capital, Ankara, which also included the high-level Defense Industry Forum, at which US companies were able to secure lucrative contracts.\nIt was also decided that European governments would play a bigger role in producing and maintaining the missiles that are so crucial to the continent's defense. Lockheed Martin and Rheinmetall signed a memorandum of understanding to jointly produce ATACMS missiles in Germany. This is one step towards increasing stockpiles without upsetting the United States, but in the long term Europe is aiming for greater independence.\nPatriot air and missile defense systems best symbolize the dependence of European NATO members on the United States. For decades, the missiles have been used in NATO countries, and more recently they have been used to protect strategically important targets in Ukraine.\nEuropean governments have opted to develop several systems to decrease dependence on Patriots. France and Italy have created the SAMP/T NG system to intercept threats at high altitudes. The new generation will be capable of detecting ballistic missiles thanks to additional sensors. The first units are scheduled to be available from 2027.\nThe IRIS-T, developed by the German company Diehl, is one of the systems intended for medium-range defense. It is already in use in Ukraine, operating at a maximum range of 40 kilometers (approx. 25 miles) and altitude of 20 kilometers. The IRIS-T SLX, which is slated to be available from 2029, will have a range of 80 kilometers at an altitude of 30 kilometers.\nThough European governments cannot replace the US Patriots yet, in the long term they hopes to be able to use EU systems to protect the bloc's airspace, for example from Russia.\nGermany to buy more Tomahawks from US\nEuropean governments are not only considering defense. When European militaries plan deep precision strikes behind enemy lines, they currently also rely on US systems, such as Tomahawk cruise missiles.\nAs became clear at the NATO summit, Germany is banking on precisely this solution in the short term. The German government has brokered a memorandum of understanding with Washington regarding the purchase of Tomahawk cruise missiles and ground-based Typhoon launch systems. German Chancellor Friedrich Merz said that it would \"close an important strategic gap in our defenses.\" But once again, it highlighted the fact that Europe will continue to depend on the US so long as European systems remain in development.\nThe European Long-Range Strike Approach (ELSA) is an international project, involving six governments, including France, Germany and Britain, to develop a conventional ground-launched missile system. Apart from the Euro Multi Missile Launcher, several highly complex cruise missiles, as well as more affordable long-range drones with a range of 500 to 2,000 kilometers are being developed.\nThough efforts toward interim solutions are underway, true independence on the battlefield is not expected to be achieved until the 2030s.\nOptimism for DECODER\nWhen it comes to the \"kill chain,\" a military concept that identifies the structure of an attack, which comprises the identification of a target, dispatching forces to it, initiating an attack and destroying the target, the EU is also dependent on the US. Without a joint self-sufficient network of sensors, satellite reconnaissance and command structures, European missiles will not be able to identify targets on their own.\nIn the Russia-Ukraine war, drones are being employed on an unprecedented scale. They are shaping the situation on the front as well as deep behind enemy lines.\nThe Drone and Counter Drone European Resolve (DECODER) aims to equip EU militaries with drones and counterdrone systems to help make them less dependent on the US.\nAt the moment, much of the development in this area is taking place at the national level. German defense companies and startups producing drones have benefited from the Ukraine war, as well as new contracts with the Bundeswehr. The DECODER project could help to align national developments on a European scale. All of the European Union's 26 member states are currently involved, alongside Norway and Ukraine, whose experience is considered to be crucial.\nThe European Commission has estimated that DECODER, which at the moment is not a fully developed program but a framework, will need investment ranging from €3.5 billion to €5 billion ($4-5.7 billion) by 2033.\nIRIS²: Europe's answer to Starlink\nStarlink, a US telecoms subsidiary that provides broadband Internet service around the world, has been essential on the battlefields of Ukraine. The bloc is currently developing IRIS² so that it has its own multi-orbit satellite service. It will comprise 290 satellites that will be used for defense purposes as well as to enable secure communicat", "translation_ja": "", "vocab": []}, {"title_ja": "Germany's Ruhr Valley is on brink of financial collapse", "title_en": "Germany's Ruhr Valley is on brink of financial collapse", "summary_ja": "With tax revenues down and social spending up, more and more cities and towns in the Ruhrgebiet are struggling to make ends meet. One city that is particularly deep in the red is Oberhausen.", "summary_en": "With tax revenues down and social spending up, more and more cities and towns in the Ruhrgebiet are struggling to make ends meet. One city that is particularly deep in the red is Oberhausen.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-s-ruhr-valley-is-on-brink-of-financial-collapse/a-77905338?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Germany's Ruhr Valley is on brink of financial collapse\nJuly 12, 2026The Centro mall is the one place the city of Oberhausen is famous for nowadays. The shopping and entertainment center, with its 250 stores and restaurants, sits next to a marina with a promenade and right by Germany's largest Sea Life Aquarium.\nThe complex was built in the mid-1990s on a site where 32,000 people had previously worked in the steel industry, which was once a cornerstone of Europe's manufacturing base.\n\"Thanks to the Centro, we've created almost as many jobs again, but they're all in the service sector, where people don't earn as much,\" Oberhausen City Treasurer Apostolos Tsalastras said.\nDemise of the Ruhr region\nThe average income in the city is now among the lowest in Germany: \"The gross domestic product we generate here is also one of the lowest nationwide,\" the treasurer admits.\nThe Ruhr Valley, in the western state of North Rhine-Westphalia, was shaped by the 19th-century coal-powered industrial revolution, which became vital for Germany's armament production in the two World Wars. After the wars factories were first dismantled and then rebuilt to fuel what was called Germany's economic miracle in the 1950s. A serious crisis began in the 1970s, when inflation and overcapacity saw raw steel production plummet, leading to plant closures and structural unemployment in the region.\nThere are some remnants of the steel industry in Oberhausen, including a company that builds turbines for ships and power plants. But all of that is small-scale compared to the what it used to be, Tsalastras tells DW.\nThe structural economic problems since the decline of the coal and steel industries have been taking their toll for a long time. \"We have no reserves, no capital investments we can liquidate, no assets we can sell, and so on,\" Tsalastras said. \"We've been saving for 40 years; we've already sold everything: We have nothing left.\"\nOberhausen ranks among the cities with the highest debt in Germany. \"We are in a truly dire situation,\" Mayor Thorsten Berg, of the center-left Social Democrats (SPD), told DW.\n\"The major burdens we face are payments to youth welfare and long-term care,\" Berg said. \"The municipalities are expected to pay, but we don't get the money to do so. That's the flaw in the reasoning.\"\nWeak economy, lower revenue\nIn Germany, decisions made at the federal and state levels force municipalities to, for example, pay the housing costs for welfare recipients or provide social assistance for people with disabilities. In Oberhausen, 50% of expenditures are earmarked for social services.\nThe costs of long-term care are rising because older people increasingly cannot afford to pay for nursing home care and the city has to step in.\nExpenditures for youth welfare have also risen sharply as children and adolescents are increasingly having to be removed from their families because either they or the parents are struggling — often with mental health issues. Oberhausen's treasurer notes that the COVID-19 pandemic has left its mark, but the impact of social media is particularly concerning.\nMunicipalities feel helpless\nMunicipalities' largest sources of revenue are the trade tax and the property tax on land and real estate. Added to this is a 15% share of income tax. However, the economic crisis, which has gripped Germany for seven years now, has hit tax revenues.\nTsalastras has been in charge of Oberhauseny's finances since 2010. \"We currently have an annual budget of €1.2 billion, and our revenue falls short by about €100 million,\" the economist reports from his office in City Hall. By the end of 2025, Oberhausen had accumulated €2 billion in debt. A cash injection from the state government of North Rhine-Westphalia brought it down to €800 million.\nCultural programs have long been subject to budget cuts. The renowned theater in Oberhausen has to make do with less money every year. Out of necessity, the building's urgently needed renovation is now being carried out while the theater remains open. In the meantime, audience members are required to sit on the stage.\nParking fees have been increased by 50%, and there are more traffic checks to collect fines.\nThe city administration is also expected to make further cuts, with 5% of jobs set to be scrapped. This will likely result in longer wait times for citizens at government offices.\n\"Local citizens find this absolutely dreadful, but they know we have no other choice,\" Tsalastras said.\nCuts to culture and services\nHow long can Oberhausen continue without making more significant cuts to services? This is the question that a growing number of mayors in Germany are asking themselves as expenditures now exceed revenues in nearly all municipalities.\nMore and more of Germany's roughly 10,700 municipalities are in debt. By 2025, local governments in Germany had collectively taken on nearly €30 billion ($34 billion) in new debt — a historic record. The existing mountain of debt has now grown to ", "translation_ja": "", "vocab": []}, {"title_ja": "Germany news: Neuschwanstein killer fights extradition to US", "title_en": "Germany news: Neuschwanstein killer fights extradition to US", "summary_ja": "A man who murdered a woman at Neuschwanstein Castle says he fears execution in the US. Germany has been hit by another heat wave, though no records are likely to be broken this time, forecasters say. DW has more.", "summary_en": "A man who murdered a woman at Neuschwanstein Castle says he fears execution in the US. Germany has been hit by another heat wave, though no records are likely to be broken this time, forecasters say. DW has more.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-news-neuschwanstein-killer-fights-extradition-to-us/live-77913703?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Germany news: Neuschwanstein killer fights extradition to US\nPublished July 11, 2026last updated July 12, 2026What you need to know\n- A US man who carried out a murder at the famous Neuschwanstein Castle says he fears the death penalty if he is extradited\n- Some 100 people died from drowning in Germany in June\n- A study says 25 to 30% fewer people would die on German motorways if a 130 km (81 miles) per hour speed limit were introduced\n- Temperatures in some parts of Germany are forecast to soar to 38 degrees Celsius (100.4 F) in the course of the week\n- The far-right Alternative for Germany (AfD) has presented a 100-day plan outlining its intended actions if it wins power in the state of Saxony-Anhalt in September\nDW brings you the top stories from and about Germany on Saturday, July 11, and Sunday, July 12.\nTired of missing our real-time updates? Click here to add us as a Preferred Source on Google. Then tap the \"Star\" or \"Preferred\" to keep DW News at the top of your feed.\nSteinmeier praises coalition for agreeing 'substantial' reforms\nGermany's President Frank-Walter Steinmeier has welcomed the major reforms agreed by the governing coalition, as the country struggles with low economic growth and intense rivalry from China.\n\"I do think the federal government has presented a substantial package,\" Steinmeier told public broadcaster ZDF on Sunday.\nHe was referring to a package of measures to boost healthcare, pensions, tax and welfare, passed by Chancellor Friedrich Merz's coalition earlier this month.\nSteinmeier also reacted to criticism that the reforms didn't offer enough financial support, telling ZDF: \"The primary goal of structural reforms is not to put more money in people's pockets, but rather to stabilize benefit systems.\"\nHe said he hoped the agreement would mean an end to the infighting between Merz's conservative alliance and the center-left Social Democrats, who have governed together since May 2025.\n\"We could be currently witnessing a new phase ... [where] the self-imposed deadlock within the coalition has been lifted and resolved,\" he said.\nThe reforms include tax relief for those on low and middle incomes, financed by changes to the wealth tax for high earners.\nThe government also agreed on labor market changes, including allowing employers to offer more fixed-term contracts and to terminate permanent contracts with high earners more easily.\nSteinmeier said that patience and perseverance was now needed to implement the reforms, which still need parliamentary approval.\n\"Without regaining economic growth, we will not win respect or restore trust,\" he added.\nIN DEPTH: Ruhr Valley in danger of economic collapse\nOnce a region that fueled industry in Germany and beyond, in the past decades the Ruhr area has struggled to redefine itself after the virtual demise of coal mining and a dramatic reduction in steel production.\nDW takes a look at the financial plight it is now facing in this article:Germany's Ruhr Valley is on brink of financial collapse\nMotorway speed limit would greatly reduce deaths — study\nIf a speed limit were introduced on Germany's motorways, it could considerably reduce accident deaths there, a study has shown.\n\"With a maximum speed of 130 kilometers (81 miles) per hour, there would be 25-30% fewer fatalities on the Autobahn,\" said researcher Siegfried Brockmann from the Björn Steiger Foundation, which carried out the study.\nBrockmann said that corresponded to some 70-90 people, with 292 killed in motorway accidents in 2025 from a figure of more than 2,800 on all roads.\nCurrently, there is no general speed limit on German motorways, though there are often restrictions for certain sections.\nHowever, studies have shown that a majority of people in Germany are in favor of having one, even though the Transport Ministry has so far rejected the idea.\nAdvocates of a speed limit of 130 kmh on the Autobahn and 80 kmh on other roads also point to the environmental benefits, with the Environment Ministry saying this would cut 2.7% of greenhouse emissions from road transport.\nRailway improvements will take time — transport minister\nTransport Minister Patrick Schnieder has warned that improving the reliability of train services will be a gradual process, while praising thenew CEO of railway operator Deutsche Bahn (DB), Evelyn Palla, for her approach.\n\"We will only achieve the big progress needed in reliability and punctuality step by step,\" he told the German news agency DPA.\n\"It is completely illusory to think that the railway world will be back in order in two years,\" he said, speaking of a \"decade of modernization.\"\n\"For years and decades, too little has been invested in all transport forms, particularly rail,\" he said, while stressing that DB had to play a role by improving its procedures.\nTrain punctuality in focus\nA new railway strategy paper sets the goal of having at least 70% of long-distance trains arriving at their destinations without notable delays. In June, just 52.6% were on tim", "translation_ja": "", "vocab": []}, {"title_ja": "'Lindsey Graham was irreplaceable': South Carolina Sen. Tim Scott", "title_en": "'Lindsey Graham was irreplaceable': South Carolina Sen. Tim Scott", "summary_ja": "South Carolina Republican Sen. Tim Scott was emotional when reminiscing about Sen. Lindsey Graham after his sudden passing, saying \"Lindsey Graham was irreplaceable.\"", "summary_en": "South Carolina Republican Sen. Tim Scott was emotional when reminiscing about Sen. Lindsey Graham after his sudden passing, saying \"Lindsey Graham was irreplaceable.\"", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/Politics/lindsey-graham-irreplaceable-south-carolina-sen-tim-scott/story?id=134689712", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "LIVE:  ABC News Live", "title_en": "LIVE:  ABC News Live", "summary_ja": "24/7 coverage of breaking news and live events", "summary_en": "24/7 coverage of breaking news and live events", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Iran 'not living up to memo of understanding, Waltz says after latest US strikes", "title_en": "Iran 'not living up to memo of understanding, Waltz says after latest US strikes", "summary_ja": "UN Ambassador Mike Waltz joined \"This Week\" the morning after U.S. strikes on Iran in retaliation for striking a vessel in the Strait of Hormuz.", "summary_en": "UN Ambassador Mike Waltz joined \"This Week\" the morning after U.S. strikes on Iran in retaliation for striking a vessel in the Strait of Hormuz.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/Politics/waltz-ceasefire-broken-after-us-iran-trade-fire/story?id=134689507", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "First patients enrolled in record-breaking Ebola treatment trial in DRC", "title_en": "First patients enrolled in record-breaking Ebola treatment trial in DRC", "summary_ja": "Two drugs are being trialled in the Ituri region in a programme set up just six weeks after the outbreak was declared, with hopes it will reduce mortality rates There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo ", "summary_en": "Two drugs are being trialled in the Ituri region in a programme set up just six weeks after the outbreak was declared, with hopes it will reduce mortality rates There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo ", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/12/record-breaking-ebola-treatment-trial-drc", "state_media": false, "category": "社会", "full_text": "There is no approved drug to help the medical teams scrabbling to save lives in the Ebola outbreak in the Democratic Republic of the Congo – but there are hopes that could change within months as the first patients are enrolled in a treatment trial.\nIt is a record pace to set up and start this kind of research, scientists said, with patients enrolled just six weeks after the outbreak being declared a public health emergency of international concern by the World Health Organization (WHO) on 17 May.\nNevertheless, in Bunia, the capital of Ituri province, where the virus is raging, people are impatient.\n“I hope these drug trials proceed quickly,” said Neema Haba, a mother of three and banana seller. “Financially, we are being driven to the brink by this outbreak and nothing is going right. We are struggling to provide for our children.”\nAs of 9 July, there had been 1,792 confirmed cases and 625 deaths caused by the Bundibugyo strain of the virus, for which there is no vaccine and no approved treatment. It is still “in the expansion phase”, according to the WHO.\nThe response is reliant on the basic techniques of identifying cases, isolating them for care and tracking and monitoring people they have been in contact with.\nThe latest figures show about 75% of known contacts are being traced, but low trust in authorities and a highly mobile population are hampering efforts. In addition, some frontline workers stopped work this week in protest at a lack of pay.\nThe bodies of Ebola victims are highly contagious, and must be safely buried by properly trained professional teams. Ovide Maliabo, a driver for one of the teams in Rwampara, a mining town in Ituri, said the work was dangerous in the face of community mistrust and he and his colleagues “see no point in risking our lives”.\n“At one point, we narrowly escaped being lynched,” he said. “It’s a shame that we aren’t being financially supported.”\nBahati John, head of the team, said he had lost a tooth after being attacked by local people.\n“Honestly, since we started working on 15 May, with all the insults we’ve had to put up with, we haven’t seen a single penny,” he said. “We are the breadwinners of our families, and our families are suffering.”\nDRC officials said payments had been made but it is unclear whether activities have fully resumed. The closure of the local airport in Bunia was hampering the response, including by impeding the supply of banknotes, they said.\nHopes of turning the tide now rest with scientists searching for effective medicines.\nThe Partners treatment trial has opened with two drugs on its books – remdesivir, and MBP134. Patients will be randomly allocated to receive either drug, a combination of the two, or simply standard, supportive care.\nRemdesivir is an antiviral made by pharma company Gilead Sciences, while MBP134 is a monoclonal antibody developed by Mapp Biopharmaceutical, containing two specially engineered immune proteins that recognise and neutralise the virus.\nBoth are given intravenously – MBP134 as a one-off infusion, and remdesivir as 10 days of intravenous therapy.\n“These two drugs actually have been proven to work against the Bundibugyo virus in animal models,” said Prof Laurens Liesenborghs of the Institute of Tropical Medicine, Antwerp, who is working on the trial in Ituri.\n“They showed great efficacy, but now we need to test it in humans. Basically, what we want to see is if they indeed can lower mortality.”\nBundibugyo typically has a lower death rate than the Zaire strain of Ebola, which has caused most previous outbreaks, but it still kills about one in three of those infected.\nResearchers are watching carefully for any difference in death rates between the groups given experimental drugs and the group receiving standard care. “Any improvement is good,” said Liesenborghs. “But it needs to be statistically detected, so we need to see a substantial drop.”\nIn trials looking at the impact of monoclonal antibodies on Ebola cases caused by the Zaire strain, it lowered death rates from 50% to 35%, he said. “Hopefully we will see something in the order of that magnitude.”\nThe trial’s design allows other potential treatments to be added should they become available. A result is likely to need between 700 and 1,000 patients to be enrolled, Liesenborghs said. “We opened one site, hopefully we’ll open additional sites very quickly, but still then it will take a couple of months, depending on how the outbreak is going, obviously.”\nWHO officials said enough remdesivir and MBP134 had been donated, by Gilead and the US government respectively, for 1,200 patients to be enrolled. The WHO is in discussions to ensure sufficient supplies will be available after the trial, should they prove safe and effective, it said.\nPatients of any age, including pregnant and breastfeeding women, who are often excluded from medical research, can enrol in the trial.\n“We always think of risk-benefit,” says Liesenborghs. “Here the benefit is potentially very hi", "translation_ja": "", "vocab": []}, {"title_ja": "Nigeria says army has killed 300 bandits in north-western state of Zamfara", "title_en": "Nigeria says army has killed 300 bandits in north-western state of Zamfara", "summary_ja": "Vigilantes also took part in the fight that raged all night and the following morning, residents say Nigerian soldiers killed more than 300 members of kidnapping and cattle bandit gangs in the north-western state of Zamfara this week, according to a government official. Government troops targeted th", "summary_en": "Vigilantes also took part in the fight that raged all night and the following morning, residents say Nigerian soldiers killed more than 300 members of kidnapping and cattle bandit gangs in the north-western state of Zamfara this week, according to a government official. Government troops targeted th", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/11/nigeria-army-kills-bandits-north-western-state-zamfara", "state_media": false, "category": "政治", "full_text": "Nigerian soldiers killed more than 300 members of kidnapping and cattle bandit gangs in the north-western state of Zamfara this week, according to a government official.\nGovernment troops targeted the gangs in Gummi district in a two-day operation that “led to the elimination of more than 300 terrorists”, Zamfara’s information commissioner, Mahmud Muhammad Dantawasa, said in a statement.\nGangs made up of cattle rustlers and jihadists have terrorised communities in northern and central Nigeria, where they raid farmers’ land, steal cattle and kidnap people for ransom. They also impose levies on farmers who want to access their own land in protection rackets.\nJihadists and criminal gangs have been cooperating in recent years, according to security analysts, who say their mutual interests align. Criminal gangs have become widespread in impoverished rural Nigeria, while jihadists continue to wage a 17-year insurgency in the north of the country. Both are invested in a weak central government.\nResidents of Gummi said soldiers and local vigilantes had launched a campaign on Wednesday night against about 1,000 bandits who had stolen livestock. “The soldiers and the vigilantes killed more than 300 bandits in the fight which raged all night and the following morning,” Abubakar Muhammad told Agency France-Presse.\nTroops had tried to launch an assault on the bandits’ camp two weeks ago but were outnumbered and were forced to withdraw, residents said.\nThe Zamfara government said the operation had been a significant breakthrough in its fight to restore order to the state.\nNigeria faces a number of security crises, with an Islamist insurgency by Boko Haram and its rival, the Islamic State West Africa Province.\nThe government has killed jihadists in recent months in partnership with the US, which has deployed hundreds of troops to the country to support its fight against Islamists. A joint US-Nigeria operation in May killed the second-in-command of Islamic State and about 200 fighters in a village in north-east Nigeria.\nNigeria also struggles with general lawlessness and banditry, fuelled by poverty. Jihadists and bandits have long used mass kidnappings of elementary-schoolchildren to extract ransom payments and pursue other demands.\nThe army said on Saturday that it had suffered “casualties” during the rescue of more than 40 kidnapped children who were taken by what authorities said were jihadists. The kidnapping had come as a shock because it happened in the south-west of the country, previously thought to be relatively safe.", "translation_ja": "", "vocab": []}, {"title_ja": "Developing countries spend more repaying foreign debt than on education, UN reveals", "title_en": "Developing countries spend more repaying foreign debt than on education, UN reveals", "summary_ja": "Unesco report shows children lost out to servicing debt in 113 countries, with 18 spending five times more on loans Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up ", "summary_en": "Unesco report shows children lost out to servicing debt in 113 countries, with 18 spending five times more on loans Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up ", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/10/developing-countries-spend-more-foreign-debt-education-aid-cuts-unesco", "state_media": false, "category": "社会", "full_text": "Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up to 30%.\nMore was spent on servicing foreign debt than on education in 113 developing countries in 2025, according to research by the UN’s culture and education agency, Unesco. In sub-Saharan Africa, countries spent 3.6 times more on debt than education.\nThe situation is likely to be exacerbated by funding cuts, the agency warned. Low- and lower-middle-income countries have already lost 21% of the aid to education they were receiving in 2023 and could lose up to 30% by 2027. Some countries – including Afghanistan, Mali, Niger and Liberia – have already lost more than 40% in three years.\nMin Jeong Kim, director of Unesco’s education division, said: “Current approaches really keep the countries trapped in a cycle of austerity, underinvestment and stalled development.\n“This is really weakening countries’ stances on economic growth, eroding domestic revenue mobilisation and ultimately also diminishing their ability to handle their debt over time.”\nEighteen of the most indebted countries spent five times the amount they did on education on debt – and up to 16 times more in the case of Sri Lanka.\nAccording to the UK-based campaign group Debt Justice, repayments by poorer countries hit a 35-year high last year, with 56 countries spending almost a fifth of their total revenue on servicing loans.\nTim Jones, policy director at Debt Justice, said: “Countries’ debt payments have ballooned following a series of shocks from Covid, energy price and interest rate rises and climate disasters.\n“In the worst-affected [countries], this is leading to cuts in spending on essential services such as health and education.”\nThe situation has been made worse by aid cuts made by the US and Europe, which saw funding to education drop by $600m (£470m) in 2024, the last recorded figures, and is expected to have fallen further in 2025.\nThe combined impact of aid cuts and public spending being redirected to debt servicing has meant disruption to education systems, with schools often not receiving sufficient funds to operate and teachers not being paid.\nIn the long term, there is concern that weakened education systems affect indebted countries’ ability to develop their economies and better equip themselves to handle debt burdens in the future.\nUnesco said there needed to be a change to how debt relief was structured, shifting away from short-term relief to long-term arrangements that allowed countries to continue funding public services.\nJones said that another key factor in changing debt relief was ensuring that private lenders, often based in Britain and the US, were not able to block agreements to extract more profit for themselves, as they recently did with Ethiopia.\n“The UK needs to use its presidency of the G20 in 2027 to get major changes to the debt-relief process, including more debt cancellation and a faster process,” he said. “Central to this is incorporating the process into English law, so that private creditors can no longer disrupt and hold out from the debt relief.”", "translation_ja": "", "vocab": []}, {"title_ja": "Syrian parliament convenes for first time following al-Assad’s overthrow", "title_en": "Syrian parliament convenes for first time following al-Assad’s overthrow", "summary_ja": "President Ahmed Al-Sharaa stresses that improving the economy and strengthening public services are key priorities.", "summary_en": "President Ahmed Al-Sharaa stresses that improving the economy and strengthening public services are key priorities.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/12/syrian-parliament-convenes-for-first-time-following-al-assads-overthrow?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "Syrian parliament convenes for first time following al-Assad’s overthrow\nPresident Ahmed al-Sharaa says improving the economy and strengthening public services are key priorities.\nSyria’s president has called on lawmakers to put “national interest above all” as the newly appointed transitional parliament convenes for its inaugural session.\nMembers of the parliament took the constitutional oath in Damascus on Sunday, more than 18 months after longtime authoritarian ruler Bashar al-Assad was toppled by rebels led by Ahmed al-Sharaa, who is now Syria’s president.\nRecommended Stories\nlist of 3 items- list 1 of 3Syria says one killed, 36 wounded after Damascus blasts during Macron visit\n- list 2 of 3Syria in tough balancing act as it tightens security after Damascus blasts\n- list 3 of 3Chemical weapons watchdog restores Syria’s voting rights, citing progress\n“I urge you to make this assembly a model of responsibility and competence, and to help foster a culture of dialogue, the rule of law and respect for institutions,” al-Sharaa said.\nThe main role of the parliament, called the People’s Assembly, will be to draft a new constitution and lay the foundations for democracy after decades of oppressive rule under the al-Assad family that culminated in a 14-year civil war that killed more than half a million people.\nThe 43-year-old al-Sharaa has pledged to usher in a new era for Syria, which remains in a dire economic state after years of conflict and political isolation. The country’s challenges have been compounded by periods of political and sectarian tension following al-Assad’s overthrow.\nAl-Sharaa stressed that improving the economy, strengthening public services and attracting international investment were key priorities for parliament.\n“Syria is writing a glorious history that reflects its heroism, and we face the responsibility of building both the nation and the individual,” he said.\nThe chamber has 210 seats. Two-thirds of lawmakers were chosen last year by regional electoral colleges, while al-Sharaa appointed the remaining 70 members of parliament at the beginning of the month.\nOfficials say nationwide elections were not feasible because of the complex logistical challenges created by years of conflict, including inaccurate population records.\nClaudio Cordone, the deputy United Nations special envoy for Syria, called the parliament’s first session “a key milestone in the country’s political transition”, adding that the international community “will follow its work closely and stand ready to support” it.", "translation_ja": "", "vocab": []}, {"title_ja": "Meet the Cubans stuck in Mexico under Donald Trump’s deportation campaign", "title_en": "Meet the Cubans stuck in Mexico under Donald Trump’s deportation campaign", "summary_ja": "Cuba has often refused to accept deportations from the US. Where does that leave Cuban deportees under Trump?", "summary_en": "Cuba has often refused to accept deportations from the US. Where does that leave Cuban deportees under Trump?", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/features/longform/2026/7/12/meet-the-cubans-stuck-in-mexico-under-donald-trumps-deportation-campaign?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Palenque, Mexico – In a gloomy house tucked in a dead-end street in southern Mexico, three Cuban men wait out their days watching Hollywood movies, playing dominoes and pooling their change to buy food.\nRicardo Scull Delgado, Ernesto Perez Chapman and Lazaro Diaz Garcia have been stuck there since December.\nAll three are in their 70s. All three arrived in the United States in 1980, as part of an exodus of refugees fleeing hardship and repression in Cuba.\nAnd all three were expelled from the country last year as part of President Donald Trump's push for mass deportation.\nThey were piled onto a bus in Arizona and driven south for three days straight until they reached Palenque, a town close to Mexico's border with Guatemala.\n“When we arrived in Palenque, it was pouring with rain, and they just kicked us out of the bus onto the curb,” Scull Delgado, 71, said. “The cruelty was unbelievable, so inhumane.\"\nOf all the deportees sent to Mexico, Cubans represent the largest third-country population. More than 4,000 Cuban citizens have been deported from the US to Mexico since Trump took office for a second term.\nBut that mass expulsion signals a reversal in US policy. After decades of sheltering Cubans in exile, critics say the US is now leaving them in limbo abroad, with no means of supporting themselves.\n“Our deportation wasn't legal,” said Scull Delgado. “But this Trump guy thinks he can do whatever he wants and has an agreement with the Mexican government.”\n“They’ve taken everything away from me, for all the years I was working. Everything.”\n'Like we were dogs'\nFor Scull Delgado, life in the US began with the famous Mariel boatlift, a 1980 exodus that saw some 125,000 Cubans pile onto small, rickety boats and sail across the Florida Strait.\nMany were fleeing political persecution. Others had grown desperate as a result of the island's economic strife. Scull Delgado said he joined the boatlift to escape service in Cuba's army.\nBut even though the \"marielitos\" arrived in the US without formal paperwork, Washington agreed to accept them. The US, after all, had long opposed the island's communist leadership.\n\"We will continue to provide an open heart and open arms to refugees seeking freedom from communist domination and from economic deprivation,\" US President Jimmy Carter said at the time.\nOver the following decades, Scull Delgado settled in California and got married to a US citizen. He had three children and four grandchildren. But he also got a criminal record.\n\"I committed a crime in the '90s,\" he said, describing it as \"a slip-up\" for which he did time in prison.\n\"After I got out, I didn’t get into any more problems,\" Scull Delgado added. He just had to \"show up every year to sign in\" at US immigration offices. \"That’s where they picked me up.\"\nImmigration agents arrested him while he was signing in at the office. After nearly 46 years in the US, he was one month away from retirement — one month away from enjoying \"the benefits I earned through my work\".\n\"I do feel betrayed by Trump because he took everything away from me after I’d spent my whole life in that country,\" Scull Delgado said.\nBy November, he had been transported to Mexico, away from his home and his family.\nAnother Cuban national, 48-year-old Orlando Martinez Mendoza, was also deported in 2025.\nHe migrated from Cuba to the US in 2015, arriving by boat. But he said immigration authorities grabbed him at a court hearing in Tennessee, where he had appeared for a speeding charge.\nHe described being transported to three different detention centres over the course of two months in Tennessee. He was then transported out of state, to a holding facility set up in the Louisiana State Penitentiary, also known as Angola.\nMartinez Mendoza remembers the transfer being staged for media purposes.\n\"They selected a group of us migrants, saying we were the biggest criminals in the country,\" he said. \"They took us to Angola prison in a bus with police in front and back, stopping traffic with sirens, and TV cameras rolling.\"\nEventually, he too was sent to Arizona and, from there, to Palenque. He said his bus came to a stop right in front of the offices for the Mexican Commission for Refugee Assistance, or COMAR.\nImmigration officials, he said, \"dumped us right in front of COMAR like we were dogs\".\nThe US Department of Homeland Security, which oversees federal immigration enforcement, did not reply to a request for comment for this story.\nIt has, however, featured Martinez Mendoza on a website of its immigration-related arrests, highlighting his conviction for selling cocaine in 2018. He was subject to a deportation order after serving two years in prison.\n'A clear violation'\nCuba has a history of rejecting deportees from the US, given the tense relations between the two countries. The US has accused Cuba of abuses, and Cuba has accused the US of meddling in its affairs.\nSince 1962, the US has also imposed a trade embargo on Cuba, largely prohibiting trade and travel ", "translation_ja": "", "vocab": []}, {"title_ja": "Israeli forces kill five Palestinians in latest attacks on Gaza", "title_en": "Israeli forces kill five Palestinians in latest attacks on Gaza", "summary_ja": "Since a US-brokered ceasefire in October, Israeli attacks have killed at least 1,098 Palestinians in Gaza.", "summary_en": "Since a US-brokered ceasefire in October, Israeli attacks have killed at least 1,098 Palestinians in Gaza.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/12/israeli-forces-kill-five-palestinians-in-latest-attacks-on-gaza?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Israeli forces kill five Palestinians in latest attacks on Gaza\nSince a US-brokered truce in October, Israeli attacks have killed more than 1,098 Palestinians in Gaza.\nAn Israeli drone attack and gunfire in Gaza have killed at least five people, including a nine-year-old girl, according to Gaza’s Health Ministry.\nTala Abu Matar died when Israeli gunfire targeted an encampment on the eastern side of the Al-Bureij refugee camp in central Gaza, medics said.\nRecommended Stories\nlist of 4 items- list 1 of 4UN discusses prevention of genocide: Six times it failed to do just that\n- list 2 of 4Palestine weekly: One thousand days of genocide in Gaza\n- list 3 of 4Childhood on hold: How Gaza’s children spend a summer without play\n- list 4 of 4Palestinian legislative elections set for November 28\nAlso on Sunday, a drone attack on a blacksmith’s shop in the Sabra neighbourhood of Gaza City killed at least four Palestinians and wounded another, according to officials at al-Shifa hospital where the casualties were taken.\nThe Israeli military acknowledged striking the area, saying without elaborating that it targeted “terrorist infrastructure”.\nFollowing shooting on Friday, a Palestinian man died of wounds sustained from Israeli fire near Al-Bureij camp, said a health official. Another Palestinian succumbed to injuries from an Israeli drone strike east of Khan Younis in southern Gaza.\nThe continued attacks in Gaza are in violation of the ceasefire agreed last October by Israel and Hamas. While fighting on the ground has mostly stopped since then, Israel has continued carrying out air strikes in Gaza, killing at least 1,098 Palestinians and wounding 3,535 during the so-called ceasefire, health ministry data shows.\nSince October, Israel has expanded its control over the enclave beyond the so-called “Yellow Line”, which demarcates territory occupied by Israel from the rest of Gaza under the ceasefire agreement. Last week, Gaza’s Government Media Office said Israeli forces now control about 80 percent of Gaza.\nThe latest violence comes as Hamas leaders visited Cairo for further talks on implementing the second phase of US President Donald Trump’s Gaza peace plan.\nThe discussions include Hamas disarmament and Israeli army withdrawals, according to sources close to the talks, who said no breakthrough has been achieved.\nSince the beginning of Israel’s genocidal war on Gaza in October 2023, the health ministry said at least 73,118 Palestinians have been killed.", "translation_ja": "", "vocab": []}, {"title_ja": "Nine-year-old girl among five killed in Israeli fire and airstrikes in Gaza", "title_en": "Nine-year-old girl among five killed in Israeli fire and airstrikes in Gaza", "summary_ja": "The Israeli military acknowledged striking Sabra neighbourhood area in Gaza, saying it targeted “terrorist infrastructure”, without elaborating", "summary_en": "The Israeli military acknowledged striking Sabra neighbourhood area in Gaza, saying it targeted “terrorist infrastructure”, without elaborating", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/several-dead-in-israeli-fire-and-airstrikes-in-gaza/article71214695.ece", "state_media": false, "category": "政治", "full_text": "Israeli fire in Gaza on Sunday (July 12, 2026) killed at least five Palestinians, including a 9-year-old girl, and wounded others, according to local health officials.\nA drone strike on a blacksmith shop in Gaza City’s Sabra neighbourhood killed at least four Palestinians and wounded another, according to officials at Shifa hospital, where the casualties were taken.\nThe Israeli military acknowledged striking the area, saying it targeted “terrorist infrastructure”, without elaborating.\nPalestinians received an evacuation order from the military following the first strikes. Roughly an hour later, intense airstrikes targeted the same blacksmith shop.\nAlso on Sunday (July 12, 2026), Israeli gunfire killed 9-year-old Tala Abu Matar in a displacement camp in central Gaza, according to officials at the Health Ministry. The Israeli military said it was unaware of such an incident.\nIsraeli strikes have lessened considerably since a ceasefire took effect on October 10, but they continue almost daily. Israel’s military says it targets Hamas and other militants, often asserting they were planning attacks. The strikes have also killed many civilians.\nAt least 1,098 Palestinians, including at least 260 children, have been killed since the ceasefire, according to Gaza’s Health Ministry. Five Israeli soldiers have been killed in that time.\nThe October 7, 2023, attack by Hamas-led militants that sparked the war killed some 1,200 people in Israel and saw 251 others taken hostage.\nIsrael’s retaliatory offensive has killed 73,221 Palestinians, according to the Health Ministry, which is part of the Hamas-led government and is staffed by medical professionals who maintain detailed records viewed as generally reliable by United Nations agencies and independent experts.\nIt does not distinguish between civilians and militants but says women and children make up around half of all deaths.\nNegotiations between Israel and Hamas remain largely deadlocked over the implementation of the ceasefire’s second phase, including the disarmament of Hamas and the reconstruction of Gaza.\nMost of the population of over 2 million people remains displaced, with many living in crowded tent camps with little or no basic services or in the ruins of buildings\nPublished - July 12, 2026 09:38 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Ukrainian Prime Minister steps down as Zelenskyy announces government reshuffle", "title_en": "Ukrainian Prime Minister steps down as Zelenskyy announces government reshuffle", "summary_ja": "“I remain ready to serve the Ukrainian state and carry out every task aimed at strengthening Ukraine's position, defending our national interests and bringing a just peace closer,” Ukrainian Prime Minister Yulia Svyrydenko said", "summary_en": "“I remain ready to serve the Ukrainian state and carry out every task aimed at strengthening Ukraine's position, defending our national interests and bringing a just peace closer,” Ukrainian Prime Minister Yulia Svyrydenko said", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/ukrainian-prime-minister-steps-down-as-zelenskyy-announces-government-reshuffle/article71214645.ece", "state_media": false, "category": "政治", "full_text": "Ukrainian Prime Minister Yulia Svyrydenko stepped down on Sunday (July 12, 2026) as President Volody
