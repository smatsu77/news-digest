myr Zelenskyy announced fresh changes to Ukraine's government.\nIn a statement on social media, Ms. Svyrydenko said she was “proud to have had the honour of leading the government during one of the most difficult periods in Ukraine's modern history.” She also said she had discussed “next steps” with Mr. Zelenskyy, but did not provide further details.\n“I remain ready to serve the Ukrainian state and carry out every task aimed at strengthening Ukraine's position, defending our national interests and bringing a just peace closer,” she said.\nMs. Svyrydenko, Ukraine's former Economy Minister, was named Prime Minister in July 2025 at the age of 39 after playing a lead role in securing a mineral agreement between Ukraine and the U.S., seen as an important way of tying U.S. interests to Ukraine's security.\nMr. Zelenskyy announced her resignation in a post saying that Ukraine was “changing its political strategy.” He also said he had offered Ms. Svyrydenko the opportunity to lead “a new, important area” in Ukraine's relations with a key international partner.\nAlso Read | Bad for both: On the Russia-Ukraine conflict\n“Each priority area of foreign policy will be assigned to a specific person with substantial experience who is capable of implementing what we agree on at the leaders' level and what the Ukrainian people expect,” Mr. Zelenskyy said, describing the impending reshuffle. The Ukrainian leader also said there would be changes among the top ranks of Ukraine's law enforcement agencies.\nUkraine continues strikes against Russian oil sites\nElsewhere, a Ukrainian attack in southwest Russia killed one person and wounded three more, local officials said Sunday, as Kyiv's forces continued to bombard Russia's oil facilities.\nThe head of Russia's Samara region, Gov. Vyacheslav Fedorishchev, said that a child was among the injured. He also said that residential homes and apartment buildings were damaged in the strike, as well as an unspecified “industrial site.” Russian media outlets reported that the attack's target was the region's Syzran Oil Refinery, with many sharing images that appeared to show plumes of black smoke rising over the site. The refinery, which is owned by oil and gas giant Rosneft and sits some 800 kilometres (500 miles) east of the border, has been a repeated target for Kyiv's forces.\nMeanwhile, the governor of Russia's Rostov region, Yuri Slyusar, said that a tanker had been damaged in a drone attack in the Azov-Black Sea maritime canal. The tanker was empty, and there is no threat of an oil spill, Slyusar said.\nUkraine's drone strikes on oil refineries and other infrastructure across Russia have triggered a widespread fuel crisis, with gasoline shortages and rationing in multiple regions and motorists waiting for hours to fill their tanks. Moscow has responded by intensifying its bombardment of Kyiv and other cities, exposing Ukraine's vulnerability to ballistic missile strikes.\nUkrainian President Volodymyr Zelenskyy has described the strikes on Russia's energy infrastructure as part of Kyiv's campaign of “long-range sanctions” carried out in response to Moscow's refusal to halt its four-year invasion of its neighbour.\nMeanwhile, Russia's Ministry of Defence said Sunday (July 12, 2026) that it had attacked the ports of Odesa and Chornomorsk in Ukraine's Odesa region. Ukrainian officials have not yet commented on the claims.\nPublished - July 12, 2026 09:25 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Qatar’s former ruler Sheikh Hamad bin Khalifa Al Thani dies at 74", "title_en": "Qatar’s former ruler Sheikh Hamad bin Khalifa Al Thani dies at 74", "summary_ja": "India declares one-day national mourning on the demise of His Highness Sheikh Hamad bin Khalifa Al-Thani, Father Amir of the State of Qatar", "summary_en": "India declares one-day national mourning on the demise of His Highness Sheikh Hamad bin Khalifa Al-Thani, Father Amir of the State of Qatar", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/qatars-former-ruler-sheikh-hamad-bin-khalifa-al-thani-has-died-at-age-74-state-news-agency-says/article71213310.ece", "state_media": false, "category": "社会", "full_text": "Qatar’s government on Sunday (July 12, 2026) announced the death of former leader Sheikh Hamad bin Khalifa Al Thani, who led the country from 1995 to 2013. He was 74, according to a government website.\n“With hearts steadfast in faith in God’s decree and destiny, the Bureau of the Emir mourns the great loss to the nation of the late — may God have mercy on him — His Highness the Father Amir Sheikh Hamad bin Khalifa Al Thani,” read a statement published by the emir’s office on social media.\nThe former leader was seen as one of the key architects of modern Qatar and led the country during a period of rapid economic growth.\nSheikh Hamad took power in June 1995, overthrowing his father in a bloodless coup while the latter was abroad.\nQatar’s political reach today stretches from North Africa to Afghanistan, and it hosted the 2022 FIFA World Cup, the world’s most-watched soccer event. Sheikh Hamad, though long out of power, received thunderous applause from Qataris attending its opening match.\nBut Qatar’s rise under Sheikh Hamad also rankled regional and Western allies with its independent-minded policymaking, including its close ties to Shiite powerhouse Iran, the Palestinian militant Hamas group and Egypt’s outlawed Muslim Brotherhood.\nAl Jazeera’s blunt reporting, though a much-praised departure from the traditionally deferential habits of Arab media, was also criticised and accused of slanting coverage to suit the views of Qatar’s rulers.\n“The future lies ahead of you, the children of this homeland, as you usher into a new era where young leadership hoists the banner,” Sheikh Hamad said as he announced his abdication and the carefully crafted transition to his son, the British-educated crown prince Sheikh Tamim bin Hamad Al Thani, who was then 33.\nThe peaceful, voluntary transfer of power was rare in a region where such change usually results from death or overthrow. Sheikh Hamad himself seized control after deposing his father, Sheikh Khalifa, in a bloodless palace coup in 1995.\nHis abdication was seen as Qatar’s attempt to stay ahead of Arab Spring-inspired calls for reforms and leadership more attuned to the region’s large and powerful young population. Qatar, a peninsula half the size of New Jersey, is believed to have around 300,000 citizens.\nAt the time, Sheikh Hamad was also thought to have been in poor health for years. In December 2015, Qatari officials said he was flown to Switzerland for surgery after breaking a leg while on holiday.\nPM Modi condoles demise of a ‘visionary leader’\nPrime Minister Narendra Modi expressed grief over the passing away of Sheikh Hamad bin Khalifa Al Thani, and described him as a visionary leader who led the Gulf country to great levels of development and prosperity.\nMr. Modi said India remembers the late leader as a “true friend”. “We deeply mourn the passing of Father Amir of State of Qatar, HH Sheikh Hamad bin Khalifa Al Thani. A visionary leader who led Qatar to great levels of development and prosperity, we remember him also as a true friend whom I had the honour of meeting during my last visit to Qatar in February 2024,” he said in a post on X.\nThe Prime Minister conveyed his sincere condolences to the Amir of Qatar, Sheikh Tamim bin Hamad Al Thani and the entire royal family and people of Qatar for the demise of the former ruler of Qatar. “May the departed soul rest in eternal peace,” he said.\nIndia declares one-day national mourning on the demise of His Highness Sheikh Hamad bin Khalifa Al-Thani, Father Amir of the State of Qatar\nTransforming Qatar’s outlook and roadmap\nSheikh Hamad attended Britain’s military academy, Sandhurst, and became commander of Qatar’s armed forces and defense minister. He was named crown prince in the late 1970s and gradually broadened his duties to include planning for Qatar’s vast oil and gas reserves.\nAfter seizing power from his father, who then lived in exile for nearly a decade, Sheikh Hamad quickly moved to open an inward-looking nation to outside influences, epitomized by Al Jazeera, which became a major force in global media.\nIts reporting not only angered other Arab leaders, sometimes to the point of diplomatic rupture, it also riled Washington. Al Jazeera aired statements from the terror network al-Qaida, even as Qatar hosted one of the key Pentagon logistical hubs following the September 11, 2001, attacks and the U.S.-led invasions of Afghanistan and Iraq.\nSheikh Hamad, meanwhile, aggressively sought international prestige through sports, an effort crowned by Qatar’s successful bid to host the World Cup, though marred by accusations that it used its huge wealth to woo poor countries’ support.\nQatar’s brand is also prominent across the sporting world from sponsorship deals with the Spanish football giant Barcelona to a majority stake in the football club Paris Saint-Germain.\nSheikh Hamad also pushed Qatar Airways to expand into a major international carrier, trying to rival neighboring carrier Emirates. The country’s internatio", "translation_ja": "", "vocab": []}, {"title_ja": "Speeding Mercedes hits two outside Sector 26 nightclub, driver flees", "title_en": "Speeding Mercedes hits two outside Sector 26 nightclub, driver flees", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/chandigarh/speeding-mercedes-hits-two-sector-26-nightclub-driver-10783392/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Moshi collapse: Probe begins into deaths of 9 workers", "title_en": "Moshi collapse: Probe begins into deaths of 9 workers", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://india VTFrUXo0Y29RamNyanhVcUF6U2ZpUEdITV9ubk1oMF82c3FjM2ljZUZVbmZ0UG5sY0hkRTNvNGVqTnpuNlR2N21sYUZybkJHeVBHUkF2MUlUSFlpREtOQTFXaVJVUmfSAcgBQVVfeXFMUDJCRm16ZDU5bjViV21mdm1KMzJ5c3JnVjBEcVpJUGF2b0tnZ1JkRGhVVDVYM1pyMFNKQUNIdDVGQWRkTjNhR0dSai1kQS1nLVFwUFlDYm1aMjFaNEx2Y1YzWjVRWlNfN3lPWC1ERF9ZcVFhOFpTY3VVX0w2bmNyR2Rick9VLXRDemFydWFXOHhaSFhLai1PSmdfUlhDT0NiY0Z0TGJFUGZxLVhDdmxmZ25hcHl0T3dhWm9VeHZaWTRPa252QVNQdkM?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Police confirm killing of notorious Zamfara bandit, Sani Yellow", "title_en": "Police confirm killing of notorious Zamfara bandit, Sani Yellow", "summary_ja": "The Zamfara State Police Command has confirmed the killing of notorious bandit commander Kachalla Sani Yellow in Anka Local Government Area, but says it did not carry out the operation, leaving conflicting accounts over the circumstances surrounding his death unresolved. The post Police confirm kill", "summary_en": "The Zamfara State Police Command has confirmed the killing of notorious bandit commander Kachalla Sani Yellow in Anka Local Government Area, but says it did not carry out the operation, leaving conflicting accounts over the circumstances surrounding his death unresolved. The post Police confirm kill", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/894798-police-confirm-killing-of-notorious-zamfara-bandit-sani-yellow.html", "state_media": false, "category": "政治", "full_text": "The police have confirmed the killing of notorious bandit, Kachalla Sani Yellow, one of the most notorious armed group leaders operating in Zamfara State, but said they did not participate in the operation that led to his death.\nThe state command’s spokesperson, Yazid Abubakar, confirmed the development to PREMIUM TIMES on Sunday, saying the police could only verify Mr Yellow’s death and not the circumstances surrounding the operation.\n“We have confirmed the killing, but it’s not our operation that conducted the operation,” Mr Abubakar said in a telephone interview.\nHe said the outlaw was killed on Saturday in Anka Local Government Area of Zamfara State, but declined to provide further operational details because the police were not involved.\n“Yesterday in Anka Local Government. That is all what I know,” he said.\nWhen asked whether any weapons were recovered from the scene, the police spokesperson said the command had no information.\n“I told you in the first speech that we are not the ones who conducted the operation. Whatever was recovered there, we are not in the picture.”\nMr Abubakar authorised PREMIUM TIMES to quote him strictly on the confirmation of the bandit’s death.\nConflicting accounts\nAlthough the police have confirmed that Mr Yellow is dead, conflicting accounts have emerged regarding how he was killed.\nSome media reports claimed he was killed by hunters and members of the Civilian Joint Task Force after they repelled a bandit attack in Anka Local Government Area.\nPRNigeria, citing unnamed security and community sources, reported that the operation was an intelligence ambush carried out by hybrid security forces comprising local volunteers and reformed former Boko Haram fighters working alongside security agencies in some operational areas.\nAccording to the report, the operatives tracked the bandit leader through community intelligence and intercepted him while he was allegedly visiting a local market to collect proceeds from rustled livestock and negotiate ransom payments.\nAnother account, published by SaharaReporters and attributed to security sources, claimed the notorious commander may have been ambushed at Dan Jibga Market by armed men believed to be loyal to rival bandit leader Dogo Gide.\nThe report, however, also cited a separate version attributing his death to an ongoing joint security offensive in Anka.\nPREMIUM TIMES could not independently verify any of these competing accounts as of the time of filing this report.\nA feared bandit\nFor years, security agencies, residents and conflict researchers have identified Mr Yellow as one of the most influential bandit commanders operating across Anka, Bukkuyum and Maru local government areas of Zamfara State.\nHe was widely accused by security agencies and community sources of coordinating attacks on rural communities, organising kidnappings for ransom, rustling livestock and leading violent raids that displaced thousands of residents across Zamfara and neighbouring parts of Nigeria’s North-west.\nAccording to security and community sources cited by PRNigeria, the bandit leader also maintained an extensive criminal network involved in extortion and the enforcement of illegal levies in communities under the control of armed groups.\nThe publication further quoted community sources alleging that Mr Yellow ordered members of his gang to sexually assault some female captives whose families were unable to pay ransom. PREMIUM TIMES has not independently verified these allegations.\nPRNigeria also reported that Mr Yellow was believed to be related to the late Kachalla Yellow Danbokolo, another notorious bandit commander reportedly killed in 2025 during a major security operation.\nSecurity implications\nThe death of Sani Yellow marks the latest reported elimination of a high-profile bandit commander as security forces and local volunteer groups intensify offensives against armed criminal networks operating across the North-west.\nSecurity analysts have consistently warned, however, that the killing of prominent commanders can trigger retaliatory attacks or succession struggles among rival armed groups seeking to take over their territories and criminal networks.\nPRNigeria, quoting an anonymous defence intelligence source, reported that security agencies had heightened surveillance and reinforced deployments across vulnerable communities to forestall possible reprisals by members of Mr Yellow’s gang.\nThe Zamfara Police Command did not comment on any additional security measures when contacted by PREMIUM TIMES.\nREAD ALSO: Lawal commends troops for successful operations against bandits across Zamfara\nGraphic videos circulate online\nFollowing reports of Mr Yellow’s death, videos and photographs purportedly showing his lifeless body being dragged behind a motorcycle circulated widely on social media.\nPREMIUM TIMES has not independently verified the authenticity of the footage or the circumstances under which it was recorded.\nThe newspaper is not publishing the gra", "translation_ja": "", "vocab": []}, {"title_ja": "Suspected herders kill scores in Benue, weeks after MACBAN chief’s murder", "title_en": "Suspected herders kill scores in Benue, weeks after MACBAN chief’s murder", "summary_ja": "Governor Hyacinth Alia has ordered security agencies to hunt down the perpetrators of the attacks in Otukpo Local Government Area. The post Suspected herders kill scores in Benue, weeks after MACBAN chief&#8217;s murder appeared first on Premium Times Nigeria .", "summary_en": "Governor Hyacinth Alia has ordered security agencies to hunt down the perpetrators of the attacks in Otukpo Local Government Area. The post Suspected herders kill scores in Benue, weeks after MACBAN chief&#8217;s murder appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/headlines/894790-suspected-herders-kill-scores-in-benue-weeks-after-macban-chiefs-murder.html", "state_media": false, "category": "政治", "full_text": "Several people have been killed in fresh attacks by suspected armed herdsmen on communities in Otukpo Local Government Area of Benue State, weeks after the killing of the state chairman of the Miyetti Allah Cattle Breeders Association of Nigeria (MACBAN), Ardo Risku.\nLocal media organisations, including Idoma Television, reported that the attacks began on Saturday when suspected herders invaded Akpachi village in Ugboju community, killing two residents and injuring several others.\nThe attackers reportedly struck again in the early hours of Sunday, invading Otukpo-Nobi, where at least eight more people were killed, according to the local media outlet.\nThe casualty figure could not be independently verified by PREMIUM TIMES as of the time of filing this report.\nThe latest attacks reportedly triggered protests in Otukpo, where angry youths marched to the palace of the Och’Idoma, demanding urgent intervention from the government and security agencies to halt the recurring violence in Benue South.\nGovernor reacts\nReacting to the attacks, Governor Hyacinth Alia condemned the killings, describing them as “a barbaric and inhuman assault on the sanctity of life and the collective soul of the people of Benue State.”\nIn a statement issued on Sunday by his Chief Press Secretary, Tersoo Kula, the governor said the attacks occurred between 3 a.m. and 4 a.m. when suspected armed herdsmen invaded Akpachi village while residents were asleep.\nHe said the assailants killed scores of people and left many others with varying degrees of injuries.\n“These acts of mindless bloodshed are a direct attempt to sabotage the progress of our state,” Mr Alia said.\n“My government stands firmly with you, and we will not allow our communities to be turned into killing fields.”\nThe governor directed security agencies to intensify surveillance and patrols across the affected communities and border areas, to work with neighbouring states, and to ensure that those responsible are arrested and prosecuted.\nHe also urged residents to support security agencies with credible intelligence.\n“We urge every citizen to cooperate with the police and military by providing timely and credible intelligence. Security is a collective responsibility, and your information is a vital tool in our defence,” he said.\nFears of reprisal\nThe attacks have renewed fears of escalating violence in Benue South, with many residents linking them to the killing of the Benue State MACBAN chairman, Alhaji Ardo Risku Mohammed.\nPREMIUM TIMES reported that Mr Risku and his associate, Yakubu Isa, were ambushed and killed on 26 June around Okwudu in Otukpo Local Government Area while returning from a peace meeting convened by authorities in Ohimini Local Government Area.\nThe killing drew widespread condemnation, with Amnesty International describing it as “appalling that attending a peace meeting had turned out to be a death trap” and calling for a prompt, transparent and impartial investigation.\nGovernor Alia also condemned the murder, describing it as “a calculated attempt to undermine the peace and reconciliation efforts” of his administration, and directed security agencies to identify and prosecute those responsible.\nREAD ALSO: Herders kill 15 in Benue days after MACBAN chairmans murder\nDays later, the Benue State Police Command announced the arrest of 10 suspects in connection with the killing of the MACBAN chairman.\nAlthough security agencies have not linked the latest attacks to Mr Risku’s killing, residents of the affected communities fear they may be reprisal attacks, given the timing and the heightened tensions that followed the murder.\nThe police had yet to issue an official statement on the latest attacks as of the time of filing this report.", "translation_ja": "", "vocab": []}, {"title_ja": "Why we won’t challenge Ekiti governorship election result at tribunal – ADC", "title_en": "Why we won’t challenge Ekiti governorship election result at tribunal – ADC", "summary_ja": "ADC said that though it has reservations about some aspects of the election, challenging its outcome would not serve the greater interest of its members, supporters, and the people of Ekiti State. The post Why we won&#8217;t challenge Ekiti governorship election result at tribunal &#8211; ADC appear", "summary_en": "ADC said that though it has reservations about some aspects of the election, challenging its outcome would not serve the greater interest of its members, supporters, and the people of Ekiti State. The post Why we won&#8217;t challenge Ekiti governorship election result at tribunal &#8211; ADC appear", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/894791-why-we-wont-challenge-ekiti-governorship-election-result-at-tribunal-adc.html", "state_media": false, "category": "政治", "full_text": "African Democratic Congress, ADC, in Ekiti State, has said it will not challenge the outcome of the 20 June governorship election at the Election Petition Tribunal.\nThe party instead opted for ”constructive engagement” and grassroots repositioning ahead of the 2027 general elections.\nThe decision was contained in a communiqué issued at the end of the expanded State Executive Council (SEC), held in Ado Ekiti on Saturday, and presided over by the party’s state chairman, Bamidele Ekunola.\nAccording to the communiqué signed by the State Publicity Secretary, Olugboyega Aribisogan, ADC said that litigation would not serve the greater interests of its members, supporters, and the people of Ekiti State.\n“While we may have reservations about aspects of the electoral process, the party chooses the path of constructive engagement over protracted litigation,” the communique read.\nThe Independent National Electoral Commission (INEC) declared the incumbent governor, Biodun Oyebanji of the All Progressives Congress (APC), as the winner of the election.\nMr Oyebanji polled 319,231 votes to defeat his closest rival, Wole Oluyede of the Peoples Democratic Party (PDP), who scored 40,543 votes, and Oluwadare Bejide of the ADC, who got 12,872 votes, to come third.\nThe SEC directed all its organs to immediately shift focus to reconciliation, grassroots mobilisation, and strengthening of ADC structures across the 177 wards in the state.\nIt resolved to constitute a State Repositioning and Restructuring Committee to develop a roadmap for grassroots reactivation, candidate identification, selection and training of party agents, and election preparedness for 2027.\nSEC also mandated the State Ad-hoc Committee on Reconciliation and Mobilisation to continue engaging aggrieved members and factions to heal divisions, stating that it is “one indivisible family committed to internal democracy and collective progress.”\nIt directed LGAs and Ward Executives to begin “immediate and aggressive” membership mobilisation targeting youths, women, and professionals, through door-to-door campaigns, town hall meetings, and stakeholder engagements.\nIt reaffirmed its commitment to discipline, directing the State Anti-Party and Disciplinary Committee to investigate all cases of anti-party activities, impersonation, and conduct that could bring the party into disrepute.\nREAD ALSO: It’s Official: INEC declares APC’s Oyebanji winner of Ekiti governorship election\nIn line with a National Working Committee directive, the SEC directed the State Working Committee to set up the Ekiti State Atiku/Amaechi Campaign Mobilisation Committee.\nThe committee, when formed, would mobilise grassroots support for the Atiku/Amaechi presidential candidacy and all National and State Assembly candidates, and coordinate voter education across the 16 LGAs.\n“The ADC remains committed to providing credible opposition and alternative leadership for Ekiti State. We will continue to hold the government accountable and work to ensure that the interests of the Ekiti people are protected,” the communique added.", "translation_ja": "", "vocab": []}, {"title_ja": "Residents of Spanish Towns Caught in Fierce Blazes Recount Harrowing Escapes", "title_en": "Residents of Spanish Towns Caught in Fierce Blazes Recount Harrowing Escapes", "summary_ja": "Many say communication was chaotic and even nonexistent as flames tore through the area, taking 12 lives in one of the deadliest wildfires on record in Spain.", "summary_en": "Many say communication was chaotic and even nonexist ra this week, a state official said Friday.", "summary_en": "Nigerian troops killed over 300 members of kidnapping and cattle rustling gangs in the northwestern state of Zamfara this week, a state official said Friday.", "source": "CGTN", "tier": "state", "link": "https://newsaf.cgtn.com/news/2026-07-11/Nigerian-troops-kill-over-300-terrorists-in-Zamfara-state--1OGYVLpiVEc/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Top court sentences South Korea ex-president Yoon to 7 years in jail", "title_en": "Top court sentences South Korea ex-president Yoon to 7 years in jail", "summary_ja": "Top court sentences South Korea ex-president Yoon to 7 years in jail", "summary_en": "Top court sentences South Korea ex-president Yoon to 7 years in jail", "source": "CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-09/news-1ODrpFttVHG/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Footage of mosque destroyed in US strike that killed Khamenei released", "title_en": "Footage of mosque destroyed in US strike that killed Khamenei released", "summary_ja": "Footage of mosque destroyed in US strike that killed Khamenei released", "summary_en": "Footage of mosque destroyed in US strike that killed Khamenei released", "source": "CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-07-09/Footage-of-mosque-destroyed-in-US-strike-that-killed-Khamenei-released-1ODzQZzA1SU/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Iran agreed to ‘perfect deal’ for US before attacking ship — Trump", "title_en": "Iran agreed to ‘perfect deal’ for US before attacking ship — Trump", "summary_ja": "US President did not mention any details of the deal he was talking about but claimed that the United States bombed the hell out of them last night", "summary_en": "US President did not mention any details of the deal he was talking about but claimed that the United States bombed the hell out of them last night", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2159183", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Strait of Hormuz to remain closed until situation normalizes — PSGA", "title_en": "Strait of Hormuz to remain closed until situation normalizes — PSGA", "summary_ja": "Once stability and calm are restored, all applications will be reviewed according to the established schedule and the necessary permits will be issued", "summary_en": "Once stability and calm are restored, all applications will be reviewed according to the established schedule and the necessary permits will be issued", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2159181", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Russian diplomat slams West’s manipulation around high representative for BiH", "title_en": "Russian diplomat slams West’s manipulation around high representative for BiH", "summary_ja": "Russia’s warnings on this matter were ignored, Russia Foreign Ministry Spokeswoman Maria Zakharova told", "summary_en": "Russia’s warnings on this matter were ignored, Russia Foreign Ministry Spokeswoman Maria Zakharova told", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2159173", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "The Israel-Lebanon Recipe for Never-Ending War", "title_en": "The Israel-Lebanon Recipe for Never-Ending War", "summary_ja": "Lebanon’s political circumstances, together with Iran’s strengthened regional position, make Hezbollah’s complete disarmament highly unlikely. By conditioning Israel’s withdrawal from Lebanon on this outcome—but with no provisions about cutting Hezbollah’s Iranian lifeline—the new framework agreemen", "summary_en": "Lebanon’s political circumstances, together with Iran’s strengthened regional position, make Hezbollah’s complete disarmament highly unlikely. By conditioning Israel’s withdrawal from Lebanon on this outcome—but with no provisions about cutting Hezbollah’s Iranian lifeline—the new framework agreemen", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/new-framework-agreement-will-keep-israel-in-lebanon-indefinitely-by-shlomo-ben-ami-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Israel-Lebanon Recipe for Never-Ending War\nLebanon’s political circumstances, together with Iran’s strengthened regional position, make Hezbollah’s complete disarmament highly unlikely. By conditioning Israel’s withdrawal from Lebanon on this outcome—but with no provisions about cutting Hezbollah’s Iranian lifeline—the new framework agreement is dead on arrival.\nTEL AVIV—Late last month, Lebanon and Israel signed a framework agreement with the United States that Lebanon’s chief negotiator, Nada Hamadeh Moawad, described as a “first step on the road to restoring Lebanese sovereignty and territorial integrity.” But, as the agreement implicitly acknowledges, Israel is not the only threat to Lebanon’s sovereignty. The departure of the Israel Defense Forces from southern Lebanon hinges on the “verified disarmament” of Iran’s proxy, Hezbollah.", "translation_ja": "", "vocab": []}, {"title_ja": "Why This Energy Shock Is Different", "title_en": "Why This Energy Shock Is Different", "summary_ja": "Unlike recent energy crises, today’s geopolitical shock is destroying supply rather than rerouting it, exposing the limits of the standard policy toolkit. Governments can mitigate its impact on those most exposed, but only if fiscal and monetary policy work in concert.", "summary_en": "Unlike recent energy crises, today’s geopolitical shock is destroying supply rather than rerouting it, exposing the limits of the standard policy toolkit. Governments can mitigate its impact on those most exposed, but only if fiscal and monetary policy work in concert.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/iran-war-energy-shock-requires-new-policy-toolkit-by-gene-frieda-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Why This Energy Shock Is Different\nCANNES—The Gulf ceasefire lasted barely three weeks. After Iranian attacks on three commercial ships in the Strait of Hormuz, the United States struck more than 80 targets, revoked Iran’s oil-sanctions waiver, and declared the memorandum of understanding “over.” Yet the market response was telling: Brent crude rose to around $79 per barrel—a meaningful jump, but far below April’s $120 peak, when the strait was closed outright. That gap between renewed war and restrained prices confronts policymakers with a key question: Is this the road back to blockade, or a violent renegotiation of the terms of passage?", "translation_ja": "", "vocab": []}, {"title_ja": "China’s Erasure of Tibet Is Accelerating", "title_en": "China’s Erasure of Tibet Is Accelerating", "summary_ja": "In recent years, the international community has stood idly by while China has systematically eradicated Tibetan culture and identity. With the authorities stepping up their assimilation efforts, Asia risks not only losing one of its oldest civilizations, but also facing a China that is bigger, bold", "summary_en": "In recent years, the international community has stood idly by while China has systematically eradicated Tibetan culture and identity. With the authorities stepping up their assimilation efforts, Asia risks not only losing one of its oldest civilizations, but also facing a China that is bigger, bold", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/china-erasing-tibet-culture-and-identity-to-strengthen-its-strategic-position-by-brahma-chellaney-2026-07", "state_media": false, "category": "オピニオン", "full_text": "China’s Erasure of Tibet Is Accelerating\n                        In recent years, the international community has stood idly by while China has systematically eradicated Tibetan culture and identity. With the authorities stepping up their assimilation efforts, Asia risks not only losing one of its oldest civilizations, but also facing a China that is bigger, bolder, and more powerful than ever.\n                    \n                        NEW YORK—The self-immolation of exiled Tibetan activist Lobga Rangzen outside United Nations headquarters in New York on July 2 was not an expression of personal despair. It was a desperate attempt to jolt the world out of its growing indifference to one of the most important international issues of our time: Tibet’s systematic erasure.\n        https://prosyn.org/4UhVJEN", "translation_ja": "", "vocab": []}, {"title_ja": "Platner’s collapse doesn’t mean we should reject outsiders in politics | Bhaskar Sunkara", "title_en": "Platner’s collapse doesn’t mean we should reject outsiders in politics | Bhaskar Sunkara", "summary_ja": "We don’t need fewer amateurs running for office. We need far more of them, recruited seriously Graham Platner is out of the Maine Senate race , burdened by controversies that include a troubling rape accusation , which he denies. His departure is no doubt a good thing that will make it easier for De", "summary_en": "We don’t need fewer amateurs running for office. We need far more of them, recruited seriously Graham Platner is out of the Maine Senate race , burdened by controversies that include a troubling rape accusation , which he denies. His departure is no doubt a good thing that will make it easier for De", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/12/graham-platner-political-outsiders", "state_media": false, "category": "オピニオン", "full_text": "Graham Platner is out of the Maine Senate race, burdened by controversies that include a troubling rape accusation, which he denies. His departure is no doubt a good thing that will make it easier for Democrats to win back the Senate.\nBut progressives should pay attention to the discussion around Platner. His collapse is being turned into something larger, supposed proof that people from outside politics have no business being in it.\n“Say what you will, but the establishment vets candidates,” the Center for American Progress president, Neera Tanden, wrote as the allegations broke. The Atlantic mocked the “beer test” that elevated Platner and noted that the movement behind him prized “an intensity of commitment” over “a mastery of policy detail”. The implicit message is that governing is a job for professionals, and that the amateurs should sit back down.\nThe establishment vets candidates, we are told. And yet Bill Clinton was vetted. So were Andrew Cuomo and Eric Swalwell. The professional class produces its own share of predators and grifters, and plenty of them slip through into elected office anyway.\nThe most important vetting that goes on in electoral races screens for something else: whether a candidate can largely self-finance a race, or has friends who can; whether they come out of the right alumni networks, know the right donors, and strike the right lobbyists as non-threatening.\nThat filter is at least part of the reason why our politics looks the way it does. The Democratic party does not run so many lawyers because voters are clamoring for them but because a serious campaign takes cash and connections that a warehouse worker or a nurse doesn’t have. Fewer than one in 50 members of Congress came up in a working-class job. Barely 2% of Democratic candidates worked exclusively in blue-collar jobs before running, and the figure stays under 6% even if you throw in teachers and nurses.\nHowever, those are the types of candidates that voters want to see in office. A study by the Center for Working Class Politics found that working-class voters preferred working-class candidates, such as construction workers and teachers, and ranked lawyers near the very bottom, above only corporate executives. On average, the study found that working-class voters give a five- to six-point boost to candidates with a working-class background compared with other candidates. Ordinary people keep asking for candidates who sound like them, but in response Democrats keep sending them candidates who sound like they’ve wanted to be president since they were in middle school.\nThat is the appetite Platner met. Despite his complicated relationship to the working-class story he told, he connected because he talked like a normal person and because he said the party had failed the people it claims to speak for. You can hear the same thing from Dan Osborn, a trade unionist and industrial mechanic who first ran as an independent Senate candidate in deep-red Nebraska, where he outran Kamala Harris by 14 percentage points in 2024. “The Senate is a country club of millionaires that work for billionaires,” he told his crowds.\nThe problem was never that voters will not back outsiders but that the structure of US politics makes it so hard for them to compete at the highest levels.\nThe lesson of Maine is not that we need fewer amateurs. We need far more of them, recruited seriously, through class-rooted organizations. This is old wisdom on the left. Workers’ parties were built on the idea that working-class people had distinct interests and needed to be represented by their own.\nGermany’s Social Democrats were led for decades by August Bebel, a carpenter. Brazil’s Workers’ party was led by a metalworker with almost no formal schooling. During the New Deal, the CIO union federation started the country’s first political action committee to get workers into Congress. Today, only a handful of groups, such as New Jersey’s state AFL-CIO, Osborn’s own Working Class Heroes Fund, and local Democratic Socialists of America chapters make any effort at working-class candidate recruitment.\nWithout countervailing efforts, we’ll be stuck with a politics staffed entirely by the credentialed – people less likely to recognize and govern in the interests of workers.\nPlatner’s demons are his own. But his fall should not be conscripted into an argument that people without law degrees ought to leave politics to our betters. The professionals running the Democratic party have had a long turn at the wheel. They lost workers and lost the country’s trust. We deserve a different kind of politics, and a different kind of politician.\n- \n  Bhaskar Sunkara is a Guardian US columnist. He is the president of the Nation, the founding editor of Jacobin, and the author of The Socialist Manifesto: The Case for Radical Politics in an Era of Extreme Inequality", "translation_ja": "", "vocab": []}, {"title_ja": "How to plan for an election that leaders are trying to subvert", "title_en": "How to plan for an election that leaders are trying to subvert", "summary_ja": "The White House is working to change electoral rules in its favor. Protectors of democracy must have a counterplan The second Trump administration is systematically eroding the institutional foundations of competitive elections without formally abolishing them. They have a plan to achieve what schol", "summary_en": "The White House is working to change electoral rules in its favor. Protectors of democracy must have a counterplan The second Trump administration is systematically eroding the institutional foundations of competitive elections without formally abolishing them. They have a plan to achieve what schol", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/12/trump-election-subversion", "state_media": false, "category": "オピニオン", "full_text": "The second Trump administration is systematically eroding the institutional foundations of competitive elections without formally abolishing them. They have a plan to achieve what scholars of democratic backsliding call “electoral subversion”: changing electoral rules in their favor. Protectors of democracy must have a counter-plan of their own.\nThe White House’s approach to electoral subversion has multiple fronts. The administration has rewarded those who used violence to disrupt the last transfer of power, disabled the federal agencies charged with protecting election integrity, moved to extend executive control over voter registration, and threatened to withhold terrorism prevention funding from states who do not change their voting rules.\nDonald Trump continues to claim without proof that the election system is rigged. This discrediting allows officials to justify changing rules to subvert how free and fair the elections will be. In this effort, the federal government has allies. Allied state legislatures have moved to give themselves greater control over election certification. This erodes the independence of electoral monitoring.\nThe logic of each move is the same: to narrow the field of who votes, who counts and who wins. The president’s own words confirmed what the policy record already showed. In January 2026, he told Reuters: “When you think of it, we shouldn’t even have an election.”\nThese are not isolated incidents or careless words. They point toward a coherent plan for electoral subversion.\nElectoral subversion is common among illiberal presidents who begin to lose electoral competitiveness. Presidents who respect democracy confront electoral decline by adjusting public policies to try to align them with the preferences of the electorate. Illiberal presidents confront electoral decline by adjusting electoral rules. This administration and its allies seem to be mostly choosing the latter.\nThere are clear and specific actions that democracy protectors can take between now and then to prevent further authoritarian consolidation.\nCommunity organizations must not slow down in their efforts to register and educate millions of voters. This work is critical to ensuring community members’ voices are heard. And high turnout can make it harder for saboteurs to claim that results don’t reflect the will of the people. The recent Hungarian election – in which the autocrat Viktor Orbán quickly accepted his defeat in a very high turnout election – bears this out.\nOne key to this civic engagement work is fighting the tendency of voters to abstain. An intentional side effect of electoral subversion is to convince voters that the system is so rigged that they should not even bother to show up to vote.\nThe result is that opponents of free and fair elections are disproportionately the ones voting. Fighting the tendency of voters to stay home is thus crucial. This is one reason why Orbán’s efforts to subvert the election failed. The voting surge drove an undeniable victory for those invested in democracy.\nIn addition, there will be large numbers of legal observers and litigators on hand this fall. This will be critical for ensuring eyes and ears – and capable legal talent – if there are shenanigans at poll sites. In Venezuela, María Corina Machado’s recent electoral strategy to defeat Maduro involved maximizing the number of polling centers with election watchers. While Maduro ultimately declared victory, the opposition built sufficient infrastructure to make it widely known in and outside the country that the result was fraudulent.\nCompared with many other cases of democratic backsliding, the United States legal system remains relatively strong, which is an asset. But US pro-democracy groups must prepare for the guardrails not to hold, given the administration’s unprecedented measures and the judicial system’s mixed record in cases where the executive seeks to expand the scope of its authority. That means building people power and novel coalitions across civil society. And it will require several important steps.\nFirst, pro-democracy groups must begin scenario planning and training early. Response plans need to be based on local threats, which may be different across localities. Well-designed training and community education about these threats can also help inoculate communities against a potential dip in turnout by reinforcing a sense of people’s agency. Moreover, since many of the risks may materialize before election day, it is not sufficient to focus on business-as-usual election activities and then turn to protecting the election on election day.\nSecond, civil society must prepare for “red line” moments, when the administration flouts the democratic process. The people of Minnesota demonstrated the power of this kind of response when thousands of federal agents were deployed there. Community, labor, and faith organizations ensured the response was firm but also non-violent. They organized a citywide general", "translation_ja": "", "vocab": []}, {"title_ja": "Stephen Miller is outraged over birthright citizenship. His arguments are nonsense | Sidney Blumenthal", "title_en": "Stephen Miller is outraged over birthright citizenship. His arguments are nonsense | Sidney Blumenthal", "summary_ja": "Trump’s immigration architect calls the supreme court’s decision ‘outrageous’ as he pushes for policy rooted in genetics, not law Neither of the supreme court majority opinions in Trump v Barbara , the 5-4 decision upholding the constitutionality of birthright citizenship, mention the true architect", "summary_en": "Trump’s immigration architect calls the supreme court’s decision ‘outrageous’ as he pushes for policy rooted in genetics, not law Neither of the supreme court majority opinions in Trump v Barbara , the 5-4 decision upholding the constitutionality of birthright citizenship, mention the true architect", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/12/stephen-miller-birthright-citizenship-arguments", "state_media": false, "category": "オピニオン", "full_text": "Neither of the supreme court majority opinions in Trump v Barbara, the 5-4 decision upholding the constitutionality of birthright citizenship, mention the true architect of the case. Donald Trump’s Executive Order 14160, which would deny citizenship to children born on American soil if their parents are undocumented immigrants or on temporary visas, is extensively noted, but not the man responsible for it. The omission of Stephen Miller is like Dracula without Dracula.\nThe vampire identified is chief justice Roger B Taney, author of the Dred Scott decision of 1857, though his notorious statement at the heart of his ruling went uncited: that the framers believed that Black people “had no rights which the white man was bound to respect”, that they were excluded from the Declaration of Independence’s principle that “all men are created equal” because of racial inferiority “too clear for dispute,” and that rendered them no different from “an ordinary article of merchandise and traffic.”\nRoberts refers to Taney’s opinion as “odious,” making citizenship an exclusionary question of race and blood, even for emancipated Black people then. “For them, blood, not soil, was made the rule,” writes Roberts.\nIn her opinion, Jackson underscores that the Trump administration and its apologists – justices Clarence Thomas and Samuel Alito – seek to reinstate the Taney notion of “blood” as the basis of citizenship. “Of course,” she writes, “the ultimate irony is that for all the talk about the detestable Dred Scott decision, the Government and the principal dissent propose a return to its core tenet … It is that odious conclusion that the Citizenship Clause plainly rejects, as the Court explains. I add only that the Fourteenth Amendment’s universalist aims should forever be the death knell for this kind of claim–one that seeks to make bloodline the marker of birthright. The America that was reborn from the rubble of the Civil War simply does not countenance that inequitable result.”\nStephen Miller was aroused to a fury at the court’s rebuke of the order. He posted on X: “One of the most destructive and outrageous decisions in the long history of the Supreme Court. American citizenship is not the birthright of the world. It belongs only and solely to Americans. No provision of the Constitution can be read to require our national self-obliteration.”\nTrump’s deputy chief of staff has been the chief proponent and enforcer of Trump’s worldview on immigration. Trump has repeatedly stated about immigrants that they are “poisoning the blood of our country”. Miller has elevated this principle of “blood” as the great replacement theory of inferior peoples overwhelming “civilization”. “If you import the Third World, you become the Third World,” he has said frequently. The concept is precisely the pseudo-scientific premise of “blood poisoning” (Blutvergiftung) at the core of Hitler’s race theory in Mein Kampf: “All the great civilizations of the past decayed because the originally creative race died out, as a result of poisoning of the blood.”\nMiller has sought to shift American national identity from a constitutional matter rooted in law to one based on genetic inheritance. His theory dictates his policies. He has driven the strategies of aggressive mass deportations and harsh ICE tactics, restrictive immigration, and voter suppression schemes on the disproven assertion of mass illegal voting by undocumented immigrants. Miller helped draft Trump’s so-called “Save Act” to limit voter participation by requiring proof of US citizenship through often costly documents, in effect a new poll tax, a ploy which is paralyzing the Republican Congress. Miller tweeted on 24 June: “Change the voters, change the country.”\nEnraged by the rejection of his attempt to overturn birthright citizenship as the capstone of his immigration ideology, Miller told Fox News: “We have people from all over the world from third world nations, nations that on their own would have never invented the wheel let alone modern technology, let alone medicine, let alone air travel, and they can just come into the country, have a baby, and then that baby is automatically a citizen? The baby can sit on a jury when they turn 18?”\nIf Miller were to give these statements as answers in a test for naturalization he would flunk. Wherever the wheel was invented, it was not in the US, 250th anniversary or not, but likely Mesopotamia in 4200-4000 BC, which Miller would call the Third World but was the cradle of civilization.\nDespite Miller’s boast of scientific superiority, the Trump administration’s fundamental contempt for science refutes Miller’s conceit – more than 10,000 scientists and medical researchers with PhDs have left the federal government and about 25,000 additional scientists and technical personnel have been fired or displaced in Trump’s first year alone, some of whom are immigrants. Trump has terminated or frozen more than 7,800 research grants.\nAs for modern technology, i", "translation_ja": "", "vocab": []}, {"title_ja": "How to Win the Defense Innovation Contest", "title_en": "How to Win the Defense Innovation Contest", "summary_ja": "America and its allies must pool their efforts.", "summary_en": "America and its allies must pool their efforts.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/how-win-defense-innovation-contest", "state_media": false, "category": "オピニオン", "full_text": "Washington’s alliances are under immense strain. Many allies and partners are subject to increased threats from great-power adversaries, and they are coming to doubt whether they can rely on the United States. The response to these pressures is to rearm. Like the United States itself, U.S. partners across Asia, Europe, and elsewhere are building up their defense industrial and technological bases to improve their ability to project power, deter enemies, and prevail in a protracted conflict.\nThe problem is that both the United States and its partners have treated their defense buildups primarily as domestic projects when what they need, in fact, is to pool their resources more effectively. The war with Iran demonstrates the risks of a siloed approach: American legacy platforms—stealth fighters, guided missile destroyers, and aircraft carriers—delivered potent attacks but could not eliminate Iran’s military threat. The conflict rapidly depleted U.S. stockpiles of high-end, long-range strike munitions and air defense interceptors, while U.S. bases, Gulf infrastructure, and shipping through the Strait of Hormuz proved vulnerable to cheap and plentiful Iranian missiles and drones. It was just the latest illustration that no single country, not even one as powerful as the United States, can by itself produce drones, ships, and critical munitions on a sufficient scale or develop a defense industrial base that is innovative and adaptable enough to prevail in a protracted, high-intensity conflict or to deter capable adversaries.\nThis is especially true at a time when the adversaries of the United States and its allies are themselves pursuing deeper defense industrial and technological cooperation. During the war in Ukraine, Iran has shared drone technology with Russia, and North Korea has provided munitions and troops. China, which is engaged in its own massive military modernization and industrial scaling projects, has offered Russia dual-use components and economic relief. Moscow, in return, is transferring advanced weapons, know-how, and intelligence to its partners.\nThe United States and a trusted circle of allies and partners—including NATO members; other U.S. treaty allies such as Australia, Japan, and South Korea; and capable partners such as Brazil, India, Israel, and Taiwan—are the world’s leaders in scientific and technological development. As such, they should be able to counter their rivals’ increasingly unified front. But their strengths will go underutilized or misallocated unless they more closely align their efforts. The traditional model of government-to-government cooperation—formal mechanisms including the United States’ foreign military sales program, bilateral coproduction agreements, and NATO procurement processes—remains useful but is inadequate. This system allows too many opportunities for politics to derail progress, and it moves too slowly to keep pace with a battlefield where technological change happens in weeks rather than years.\nThe real momentum for effective and durable cooperation among U.S. allies and partners lies among the private companies and research institutions in which many of the technological innovations that yield cutting-edge military capabilities occur. To maximize the benefits of defense and technological collaboration, the U.S. government and its partners must pair national efforts with transnational ones: pooling allied capital, technical know-how, production capacity, and supply chains through networks of firms, universities, investors, and governments. Building these networks will not only make it possible to innovate more quickly and produce at scale. It will also reinforce the United States’ increasingly uneasy alliances and partnerships, providing durable connections that can withstand a transactional and turbulent world.\nPRIVATE-SECTOR POTENTIAL\nThe United States and its partners are ramping up their defense production capacity and advancing defense innovation. New technologies that originated in the commercial sector, including outer space–based sensors, artificial intelligence, and autonomous systems, have transformed the battlefield in the past five years. The speed with which new technologies are developed and adopted has picked up, too, as demonstrated by the fast-paced innovation in drone technology in Ukraine. Countries are adjusting their innovation processes accordingly. The U.S. military, for instance, has acquired a drone system called LUCAS that is a copy of the Iranian Shahed drone. Last year, the Pentagon launched an ambitious acquisition program designed to make the adoption of new technologies faster and easier, and earlier this year, Secretary of Defense Pete Hegseth announced an aggressive strategy to integrate AI across the department. U.S. allies such as Germany and Japan and partners such as India, meanwhile, have streamlined their innovation structures and processes to better harness commercial technologies.\nBut current efforts prioritize", "translation_ja": "", "vocab": []}, {"title_ja": "Iran Is Losing Iraq", "title_en": "Iran Is Losing Iraq", "summary_ja": "Baghdad goes its own way.", "summary_en": "Baghdad goes its own way.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/iran/iran-losing-iraq", "state_media": false, "category": "オピニオン", "full_text": "Whenever the Iran war comes to an end, the Islamic Republic is likely to emerge in a stronger position. Should the terms of a June memorandum of understanding be met, Western governments would lift many sanctions on Tehran and the country would gradually be reintegrated into the global economy. Iranian control of the Strait of Hormuz, once an open waterway, might be formalized through some kind of joint tolling system. And Iran might be free to reconstitute its ballistic missiles and drone capabilities, weapons that proved very useful in the most recent months of fighting.\nBut at least in one area, the war has left Iran notably weaker: Iraq. Ever since the toppling of the Iraqi dictator Saddam Hussein in 2003, Iran has been able to exercise a great deal of influence over its western neighbor. It has embedded itself within Iraq’s Shiite political establishment, mediating between rival factions, shaping successive governments, and using Iraq to gain hard cash through smuggling and currency exchange networks. Iran supported many of the Iraqi paramilitary groups that helped defeat the Islamic State, also known as ISIS, in 2017. Iraqis still grew to resent Iran’s overweening influence in their country, not least because of the involvement of Iranian-backed militias in a brutal crackdown on anticorruption protesters in 2019 and 2020. Now, the tumult of recent months has further tilted Iraqis against Iran’s desire to make their country a staging ground of resistance to the United States and Israel. Leaders of political parties and militia groups that once hewed close to Tehran are pulling away.\nIn early June, fighters from Saraya al-Salam, a militia loyal to the Iraqi Shiite cleric Muqtada al-Sadr, gathered in the city of Samarra to hand over their weapons to the Iraqi government. That disarmament marked the group’s withdrawal from the Popular Mobilization Forces, a powerful umbrella coalition of mostly Shiite militias that exists at once inside and outside the Iraqi state. Saraya al-Salam’s thousands of fighters were the first to pull out of the alliance, and they have not been the last: Asaib Ahl al-Haq, a powerful Iranian-backed militia, announced that it, too, would leave the PMF.\nSeveral prominent Iranian-backed militias remain doggedly committed to advancing Tehran’s interests in Iraq and the wider region. But the splintering of the PMF is a real blow to Iran. The so-called axis of resistance, Iran’s network of proxies across the region, has been badly damaged since Hamas’s October 7, 2023, attacks on Israel and Israel’s subsequent campaigns in Gaza and Lebanon. But in Iraq, the Iranian-aligned militias had largely stayed out of the fight and maintained their strength and standing. That position is now unraveling; Iran’s allied militias are being pushed toward the margins of Iraqi politics. And as Tehran’s hold loosens, Iraq glimpses a tantalizing future—one in which it might set its own path, free from the direction of the Islamic Republic.\nMONOPOLY ON VIOLENCE\nBefore Israeli and U.S. forces attacked Iran in February, the Iraqi government pursued a determined, albeit increasingly strained policy: to balance between Washington and Tehran, maintaining ties with both while staying out of their confrontations. The fighting that followed the launch of Operation Epic Fury, however, made that posture impossible. Iraq became a theater of operations as Iran and Iranian-backed forces struck U.S. positions inside the country; diplomatic missions belonging to the United Arab Emirates and the United States; and Iraqi security, energy, and civilian infrastructure, particularly in the autonomous region of Iraqi Kurdistan. They also carried out strikes from Iraqi soil against targets in nearby Gulf countries. The United States retaliated against the Iranian-backed militias in Iraq, with the Iraqi government watching like a bystander. Baghdad was finally forced to face a question it had long avoided: Who controls the use of force within Iraq’s borders?\nOver the past decade, Iraq had allowed Iranian-aligned groups to take over many functions of the state. The PMF was formally integrated into Iraq’s defense system in 2016. On paper, it is meant to report to the Iraqi prime minister, the country’s commander in chief. In practice, those factions retained their own chains of command and loyalties, often to Tehran. The Baghdad government allowed the militias to claim the resources of the Iraqi state and the legitimacy of being the state’s representatives even as those very militias denied the state the monopoly on force that would make it sovereign.\nA newly formed government under Prime Minister Ali al-Zaidi, whose selection in May was endorsed by U.S. President Donald Trump, has made disarming the militias a priority. It has been able to encourage PMF actors to leave the coalition and integrate with the state. If these efforts gather further momentum, Baghdad may be able to rein in the Iranian-aligned militias and assert greater", "translation_ja": "", "vocab": []}, {"title_ja": "How to Save the UN From Irrelevance", "title_en": "How to Save the UN From Irrelevance", "summary_ja": "Ending the peacekeeper’s paralysis.", "summary_en": "Ending the peacekeeper’s paralysis.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/ukraine/how-save-irrelevance", "state_media": false, "category": "オピニオン", "full_text": "In early September 2022, in the no man’s land between the military frontlines of Ukraine and Russia, I had a decision to make: press on under fire, to establish a team of International Atomic Energy Agency safety experts at Europe’s largest nuclear power plant, or turn around. It had taken weeks of diplomacy to get this far; we decided to push on. Our armored vehicles zigzagged to avoid land mines, jostling the IAEA symbol on our jackets—a spinning atom surrounded by the two olive branches that the organization shares with the UN. As we drove past bombed buildings, burned-out cars, and families fleeing westward toward safer parts of Ukraine and its bordering countries, talk turned to whether Europe would have enough gas reserves for the winter.\nThe line between conflict and international consequences is thinning. Wars are displacing a record number of people and upending global trade and energy networks. The integrated global economy built after the Cold War, in which goods, capital, and technology flow relatively freely across borders, is fraying. The traditional separation of trade, security, development, and environmental concerns has become increasingly artificial. Cyber vulnerabilities, too, are expanding beyond mere technical concerns to affect vital infrastructure, energy grids, elections, and banking systems. As diplomatic standoffs and military conflicts disrupt supply chains, countries are moving to decouple.\nThe return of war to Europe has reshaped security perceptions and strategic calculations across the continent. In the Middle East, cycles of confrontation are generating consequences that extend well beyond the region, contributing to political divisions and disrupting energy markets, trade routes, food prices, and confidence in the world economy. In Asia, competition now spans military, economic, technological, and maritime domains. In Africa, demographic growth and economic potential run up against unequal access to finance and uneven institutional capacity. In Latin America and elsewhere, more sophisticated transnational criminal networks are exploiting global markets, financial systems, ports, logistics chains, and governance gaps. In this system, the consequences of failure travel faster and wider than ever before.\nMeanwhile, multilateralism and international law and norms, which reduce the chances of catastrophic errors, provide stability, and offer shared solutions to shared problems, have come under strain as they struggle to adjust to these structural shifts. Most of the nuclear arms reduction and control treaties forged during the Cold War, such as the New Strategic Arms Reduction Treaty and the Intermediate-Range Nuclear Forces Treaty, are dead or weakened. Major nuclear arsenals are modernizing and expanding, rather than getting smaller, and the channels of communication that reduce the risk of miscalculation between powerful states have eroded. In some countries that have upheld their legal obligations to not develop nuclear weapons, debates have emerged over the merits of pursuing them.\nToday, we are at greater risk of a major conflagration, including a nuclear one, than at any time since World War II. As the generations that experienced the horrors of two world wars and built the frameworks to prevent a third disappear, so does the memory of the consequences of unchecked global rivalry. The United Nations—which, despite its shortcomings, has in the past 80 years facilitated shared responses to common threats, supported decolonization, and helped prevent World War III—has been so weakened that some commentators suggest that it is heading the way of the League of Nations. Just when the world needs it most in the quest for peace, the UN is absent, including from the war in Ukraine; the confrontation involving the United States, Israel, and Iran; and regional conflicts in Asia and Africa.\nThe UN cannot be expected to prevent or end every war, but working toward that end is its core task. It can again become a capable, impartial, and present broker for peace. Failing to be in the room where it happens creates disillusionment and puts the UN on a path to irrelevance. Institutions that cannot explain where they add value become vulnerable to indifference, and indifference in the current climate is not a passive condition—it is actively eroding the UN’s finances and political will. The UN has a liquidity crisis, which, at its core, is a crisis of confidence in the institution by its member states.\nThe most immediate action that the international community can take to address this crisis of confidence is in its choice of the next secretary-general, for which I am contending. History suggests that a more active secretary-general, who goes into the field to prevent conflict and who is present at tables where diplomatic solutions are negotiated, can be effective, even in a deeply divided world.\nNATIONS FOR PEACE\nThe United Nations should focus on reducing the conditions that produce crises", "translation_ja": "", "vocab": []}];

    return `<div class="cov-card${sc}"><div class="cov-header"><span class="cov-region">${esc(c.region)}</span><span class="cov-name">${esc(c.name)}${sb}</span></div><div class="cov-summary">${esc(c.summary_ja)}</div><div class="cov-perspective">${esc(c.perspective_ja)}</div><a class="cov-link" href="${esc(c.link)}" target="_blank" rel="noopener">元記事 →</a></div>`;
  }).join("");
  return `<div class="focus-section"><div class="focus-label">&#127919; 今日の焦点 — 5社の報道比較</div><div class="focus-topic">${esc(FOCUS.topic_ja)}</div><div class="focus-analysis">${esc(FOCUS.analysis_ja)}</div><div class="cov-list">${cards}</div></div>`;
}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  let html=(curCat==="政治"||curCat==="社会")?buildFocusHtml():"";
  if(!arts.length){el.innerHTML=html+'<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  html+=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
  el.innerHTML=html;
}

function setCat(cat){
  curCat=cat;
  history.pushState({view:"list",cat:cat},"","?tab="+encodeURIComponent(cat));
  renderTabs();renderList();
  document.getElementById("list-view").style.display="block";
  document.getElementById("detail-view").style.display="none";
  window.scrollTo(0,0);
}

function showDetailInternal(idx){
  const a=filteredArts()[idx];
  if(!a)return;
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function showDetail(idx){
  history.pushState({view:"detail",cat:curCat,idx:idx},"","?tab="+encodeURIComponent(curCat)+"&art="+idx);
  showDetailInternal(idx);
}

function backToList(){history.back();}

window.addEventListener("popstate",function(e){
  const s=e.state||{view:"list",cat:"全て"};
  curCat=s.cat||"全て";
  renderTabs();
  if(s.view==="detail"){
    showDetailInternal(s.idx);
  }else{
    renderList();
    document.getElementById("list-view").style.display="block";
    document.getElementById("detail-view").style.display="none";
    window.scrollTo(0,0);
  }
});

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}

(function init(){
  const p=new URLSearchParams(location.search);
  const tab=p.get("tab")||"全て";
  curCat=tab;
  history.replaceState({view:"list",cat:tab},"",location.href);
  document.getElementById("footer").textContent="Generated 2026-07-12 16:30 JST";
  renderTabs();renderList();
})();
</script>
</body>
</html>
