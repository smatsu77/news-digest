const DATA = [{"title_ja": "イランのW杯進出、エジプト戦ドローで終盤ゴール取り消され不透明に", "title_en": "Iran's World Cup hopes in limbo after late goal ruled out in draw with Egypt", "summary_ja": "イランはエジプトとの試合で終盤に挙げたゴールが取り消され、引き分けに終わったことでワールドカップ出場権獲得の行方が不透明なままとなった。このゴール取り消しが響き、イランは勝利による突破確定のチャンスを逃した。イランの次のラウンド進出は、同グループの他の試合結果次第となっている。", "summary_en": "Iran were left waiting to learn their World Cup qualification fate after a late goal was disallowed during a draw against Egypt. The ruled-out goal proved costly as Iran failed to secure the victory that could have confirmed their progress. The result leaves Iran's advancement uncertain, pending other results in their qualifying group.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMivwFBVV95cUxPUlowZDA3blZ2WnY5eGhiUjFvZWtFeUpFMEoxQTNLcnJYcmREWEppOFdIVGFoNGRTeWstbHpmY21OQTg5QU0wWVdydXFFc0pUY3BDZFVwTWs5UnJ5R3ZrWG5JWENuNFZ0bnVOTlFVNkNlYm1fX19hcFVnVV9rMUFFeWFjaC0tdFRQbVNfMVc5M0VfRnlUbUVaMEdZUzNvTHlFM2tQZkFWUmhJRjhxLXdoX1dmTjFUWnd2WFhzMWRfdw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ワールドカップファン、StubHubの直前チケットキャンセルに困惑", "title_en": "World Cup Fans Frustrated by Last-Minute StubHub Ticket Cancellations", "summary_ja": "二次流通チケットプラットフォームのStubHubで直前のキャンセルが相次ぎ、ワールドカップのファンが強い不満を示している。キャンセルの影響を受けたファンたちは代替チケットを急いで探すか、楽しみにしていた試合を諦めざるを得ない状況に追い込まれている。今回の事態は、大規模スポーツイベントにおけるサードパーティーのチケット転売プラットフォームの信頼性に疑問を投げかけている。", "summary_en": "World Cup fans are expressing frustration after experiencing last-minute ticket cancellations through the secondary ticketing platform StubHub. The cancellations have left supporters scrambling to find alternative tickets or facing the prospect of missing highly anticipated matches. The incident has raised concerns about the reliability of third-party ticket resale platforms for major sporting events.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiwAFBVV95cUxPQmk3Mlo2Tkh4TlhQai1MYU5wVC1ra1ROQ3E1OV90aVhCTnVOYmpiMlhSdVJaSlZVRExzbHNndXdONWp3azVrSmVJY0ZiSEZlbG9hTndmZWZVLWxTOFN1RDRWWlJGcHV4X2NwOF9YTUlIQllwTGNaQmhObVJYeGQzZHc4MEl2MHpEZktWY0JLYy1JaTZIaTNfZGg5S0RHV1hPS3A1aHJ5UTJ3cFI1cGFIUDFvRnd0R3J5X1Z1UEFnVGE?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "米司法省、ワールドカップを違法配信した約400サイトを押収と発表", "title_en": "US Seizes Nearly 400 Websites Illegally Streaming World Cup, DOJ Says", "summary_ja": "米国司法省は、ワールドカップの試合を無断で違法配信していた約400のウェブサイトを押収したと発表した。この措置は、大会の独占放映権を持つ正規放送局の知的財産権を保護するために実施された。今回の取り締まりは、違法スポーツ配信に対する過去最大規模の組織的な法執行活動の一つとなっている。", "summary_en": "The U.S. Department of Justice announced the seizure of nearly 400 websites that were illegally streaming World Cup matches without authorization. The action was taken to protect the intellectual property rights of legitimate broadcasters holding exclusive rights to the tournament. The crackdown represents one of the largest coordinated enforcement actions against illegal sports streaming in recent history.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMi0wFBVV95cUxORkhZSmtYTnYxWENzUUxHaGl4VzlValhsalRtdFNBUmQxMnhOODh2a3JfUG5FUnduc2tmYi1mWGhEdGwtYVZQdmF6bUpGZ0xwa0NjdE9aeFAyZnpZLVZ3cWZRZGtLVWduX0ZIMjl2akgxM1Z6VjBLWG9ZSzJOOUJOSDdJVlZnMVNmZlhxTU14R0ZjdjNRMlhSY05ROHU3SHFVUUxhTmdlRldJR3F6am1hN3pGUDFYdFVhQmF1RDkyZHh4bkt5cU1TV045V1VWUjlLSWNn?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "テキサス州、公立学校で聖書の物語を必修読書教材として承認", "title_en": "Texas Approves Bible Stories as Required Reading in Public Schools", "summary_ja": "テキサス州は公立学校において、聖書の物語を必修の読書教材として正式に承認した。この決定は同州の教育カリキュラムに宗教的テキストを組み込む重大な方針転換を意味する。政教分離を支持する団体からの法的異議申し立てが予想されている。", "summary_en": "Texas has officially approved Bible stories as required reading material in its public schools. The decision marks a significant shift in the state's educational curriculum, integrating religious texts into standard classroom instruction. The move is expected to draw legal challenges from groups advocating for the separation of church and state.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiqAFBVV95cUxNWGFCSW9sZXpCOFRvaUZhMXcyVEd3Y012dm51QVpJSjU2LWlacW1fQXJmcDNDSHkzN2hyRGp3YklvQTFITUFRSnEyVTM1RlB2Y1dJVWxnT0g4Q1BMdTFfYWJjSTBZbWYyQ1d3cjN1dnlIdlA1Y2R1bjBsQ3VpOVRIbS1pdFlGRHdKWDdwc1gwMVdpekpWQVZ5bWxfX2ZKMU5UY3hHcDMyN2c?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "最高裁、トランプ政権の厳格な亡命政策復活を容認", "title_en": "Supreme Court Allows Trump Administration to Revive Restrictive Asylum Policy", "summary_ja": "米連邦最高裁判所は、トランプ政権が国境での庇護申請者に対する厳しい亡命政策を復活させる道を開いた。この判断により、政権は亡命資格を制限する措置を進めることが可能となり、ホワイトハウスにとって重要な法的勝利となった。同政策はこれまで法的異議申し立てにより実施が阻まれていた。", "summary_en": "The U.S. Supreme Court has cleared the way for the Trump administration to reinstate a restrictive asylum policy for migrants seeking protection at the border. The ruling allows the administration to move forward with measures that limit asylum eligibility, representing a significant legal victory for the White House. The policy had previously faced legal challenges that had blocked its implementation.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMilgFBVV95cUxOdWxXMy1BZ3d6OTdfeHNlWHhMLTl2azFpZVBkNG5OQXJZdklWSDN6SndmYUZhZE9SeGZ2M3VWOXZHUUFxZTJKY05xbm9UWFNsc0p0Y1h1UnpuYjB3VDlfWVFfWkJlcjlfcXhGY2JhMlJGc05rSFVLN1RpT3ppR2FrbmJsaFMzUDB0TWNJZmhURlZxTzloUlE?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ベネズエラの強震について知っておくべきこと", "title_en": "Key Facts About Venezuela's Powerful Earthquakes", "summary_ja": "ベネズエラで強力な地震が相次いで発生し、地域の地震活動に対する懸念が高まっている。同国は活断層上に位置しており、大きな揺れが起きやすい環境にある。当局と住民は被害状況を評価しながら、地震の動向を注視している。", "summary_en": "Venezuela has experienced a series of powerful earthquakes, raising concerns about seismic activity in the region. The country sits along active fault lines that make it vulnerable to significant tremors. Authorities and residents are assessing damage and monitoring ongoing seismic developments.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMinwFBVV95cUxPc0sxNlk4eExrc1BtZ0M1ZW1ocUJlSUxWdXdhTmhQdjNqRVFJYmdkdlJBUGttZHd5VzJNcGR2UkFHQVh1REs2N2tnWHowMVlqVzlBd3gydlNMRzFqSlQ2U1I2LU01WVVlM2ltRUpZNnNYc0lZSVl2aHVwd2Y4bDdVTWpRbkZZUktQclAtUHM2QUhpNDVlWFZtR2ZQUFZOYzQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "米軍、ホルムズ海峡での貨物船攻撃を受けてイランを空爆", "title_en": "US Strikes Iranian Targets After Drone Attack on Cargo Ship in Strait of Hormuz", "summary_ja": "米軍は木曜日にイランがホルムズ海峡でシンガポール船籍の貨物船「エバー・ラブリー」を無人機で攻撃したことを受け、イランのミサイル貯蔵施設や沿岸レーダー施設を空爆した。イランも対抗措置として米軍関連施設を攻撃し、6月17日に結ばれた停戦合意を米国が破ったと非難した。この緊張激化により脆弱な停戦への懸念が高まり、国連による船員救出計画も中断を余儀なくされた。", "summary_en": "The US military struck Iranian missile storage facilities and coastal radar positions after Iran attacked the Ever Lovely, a Singapore-flagged cargo ship, in the Strait of Hormuz on Thursday. Iran retaliated by striking targets linked to American forces, accusing the US of violating their June 17 ceasefire agreement. The escalation has raised fears for the fragile truce and disrupted a planned UN evacuation of sailors in the region.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/ckg590wqxwpo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "ベネズエラ地震で920人死亡、国際救助隊が続々到着", "title_en": "Venezuela Earthquakes Kill 920 as International Rescue Teams Race to Find Survivors", "summary_ja": "水曜日にベネズエラで2つの強い地震が数秒以内に連続発生し、マグニチュード7.5を記録した2度目の地震により、少なくとも920人が死亡、3,360人以上が負傷した。首都カラカス北部のラ・グアイラ州が最も大きな被害を受け、数百棟の建物が倒壊、少なくとも172人が依然として瓦礫の下に取り残されている。国連は39の捜索救助チームを含む約2,000人の国際救助要員を派遣しており、米国、英国、メキシコ、スイスなども支援に加わっている。", "summary_en": "Two powerful earthquakes struck Venezuela within seconds of each other on Wednesday, with the second registering a magnitude of 7.5, killing at least 920 people and injuring over 3,360. The hardest-hit region is La Guaira, north of the capital Caracas, where hundreds of buildings have been destroyed and at least 172 people remain trapped. Nearly 2,000 international rescue workers from countries including the US, UK, Mexico, and Switzerland have deployed, with the UN coordinating 39 search-and-rescue teams amid warnings that the death toll is likely to rise.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c39y79g7gzko?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "ベネズエラ地震で娘をかばい母親死亡、少なくとも920人が犠牲に", "title_en": "Mother Dies Shielding Daughter During Venezuela Earthquakes That Killed at Least 920", "summary_ja": "カラカス近郊を襲った二度の大地震で、サッカー選手エクトル・ベジョの妻アンドレアさんが幼い娘をかばって亡くなった。この地震では少なくとも920人が死亡、3,000人以上が負傷しており、救助隊員が今も瓦礫の中で生存者を捜索している。若手サッカー選手2人や元ミス・ベネズエラ、ジゼル・レジェスの母親も犠牲となるなど、被害は各界に及んでいる。", "summary_en": "A Venezuelan woman identified as Andrea, wife of footballer Héctor Bello, died protecting her toddler daughter during powerful twin earthquakes near Caracas. The disasters have killed at least 920 people and injured more than 3,000, with rescuers still searching rubble for survivors. Among the other victims are two young footballers and the mother of former Miss Venezuela Giselle Reyes, who died of a heart attack triggered by the quakes.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c0jydyz8z6jo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "徴兵対象年齢のウクライナ人男性、EUの一時的保護を失う可能性", "title_en": "Military-Age Ukrainian Men Could Lose EU Temporary Protection Status", "summary_ja": "欧州委員会は、新たにEUに入域する徴兵対象年齢（主に23〜60歳）のウクライナ人男性を、自動的な一時的保護の対象から除外する提案を行った。ウクライナが自国市民に軍の義務を課す必要性を尊重したものであり、EU加盟国の過半数の承認が必要となる。この変更はすでにEU域内に滞在するウクライナ人には適用されない。", "summary_en": "The European Commission has proposed that newly arriving Ukrainian men of military age—generally those between 23 and 60—be excluded from automatic temporary protection in the EU, citing Ukraine's legitimate need to enforce military obligations. As of March 31, 2026, some 4.33 million Ukrainians held temporary protection status across the EU, with over a quarter being adult males. The proposal must be approved by a majority of EU member states before taking effect, and does not apply to Ukrainians already residing in the bloc.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/military-age-ukrainian-men-could-lose-eu-protection/a-77729285?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "欧州の熱波が東へ移動、ドイツでは42°C迫る記録的高温", "title_en": "Europe Heat Wave Moves East as Germany Nears 42°C Record", "summary_ja": "西欧を覆う強力な「熱ドーム」が中欧とバルカン半島へ移動しつつあり、ドイツでは金曜日にザールブリュッケンで暫定的な史上最高気温41.3°Cを記録した後、土曜日には42°Cに達する可能性が予報されている。チェコとハンガリーは最高レベルの警戒態勢を敷き、気温が40°Cに達する見込みだ。世界天気アトリビューショングループの科学者らは、今回のような極端な熱波は人為的な気候変動がなければ事実上あり得なかったと指摘し、20年前と比べて最大200倍起こりやすくなっていると警告している。", "summary_en": "A powerful heat dome over Western Europe is shifting toward Central Europe and the Balkans, with Germany forecast to reach 42°C on Saturday after recording a provisional all-time high of 41.3°C in Saarbrücken on Friday. Countries including the Czech Republic, Hungary, and Serbia are on high alert as temperatures could hit 40°C. Scientists from the World Weather Attribution group say such extreme heat would have been virtually impossible without man-made climate change, and is now up to 200 times more likely than two decades ago.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/europe-faces-scorching-weekend-as-heat-wave-moves-east/live-77663026?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "モディ首相がセーシェル訪問、インドがアイルランドに歴史的T20敗北、日本の高市首相もインドへ", "title_en": "Modi Visits Seychelles, India Loses Historic T20 to Ireland, Japan PM Plans India Trip", "summary_ja": "インドのナレンドラ・モディ首相は、外交関係樹立50周年を迎えるセーシェルへの2日間の公式訪問に出発し、両国関係の強化を図る。インド男子クリケット代表はベルファストでアイルランドに34ラン差で敗れ、T20形式で初の歴史的敗北を喫した。また、日本の高市早苗首相が7月1日から3日にかけてニューデリーを訪問し、第16回日印年次首脳会談に臨む予定だ。", "summary_en": "Indian Prime Minister Narendra Modi has departed for a two-day state visit to Seychelles to strengthen bilateral ties marking 50 years of diplomatic relations. India's men's cricket team suffered a historic first-ever T20 defeat to Ireland in Belfast, losing by 34 runs. Japan's Prime Minister Sanae Takaichi is also set to visit New Delhi on July 1-3 for the 16th India-Japan Annual Summit.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/india-news-pm-modi-embarks-on-two-day-seychelles-visit/live-77732253?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "経済"}, {"title_ja": "命がけでエボラ封じ込めに挑むコンゴの志願者たち、地域住民の反発にも直面", "title_en": "Congo Ebola Volunteers Risk Lives and Community Hostility to Contain Outbreak", "summary_ja": "コンゴ民主共和国で安全な埋葬作業を担う最前線の志願者たちは、史上最悪となる可能性があるエボラ出血熱の流行を封じ込める上で不可欠な存在だ。彼らはウイルス感染のリスクだけでなく、恐怖に駆られた地域住民からの怒りや暴力にもさらされている。専門家たちは、こうした志願者たちの危険な活動なしに感染拡大を防ぐことは極めて困難だと警告している。", "summary_en": "Frontline Congolese workers performing safe burials are critical to containing what experts warn could become the deadliest Ebola outbreak in history. These volunteers face a dual threat: the risk of contracting the deadly virus and violent hostility from frightened local communities. Their dangerous work remains essential to preventing the disease from spreading further across the Democratic Republic of Congo.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/27/world/africa/ebola-outbreak-congo-volunteers-burials-backlash.html", "state_media": false, "category": "社会"}, {"title_ja": "メキシコ当局者らがトランプ政権の情報提供者に", "title_en": "Mexican Officials Secretly Cooperating as Informants for Trump Administration", "summary_ja": "クラウディア・シェインバウム大統領がメキシコの政治家に対する米国の捜査に反発する中、一部のメキシコ政治家がトランプ政権に情報を提供する協力者となっていることが明らかになった。シェインバウム大統領は米国による捜査に公式に反対姿勢を示しているが、一部当局者は米当局との協力を選択している。この動きは、ワシントンからの圧力への対応をめぐるメキシコ政界内部の亀裂を浮き彫りにしている。", "summary_en": "Some Mexican politicians have begun cooperating with U.S. investigations by providing information to the Trump administration, despite pushback from President Claudia Sheinbaum. Sheinbaum has publicly opposed U.S. probes into Mexican political figures, but certain officials are now choosing to work with American authorities. The development signals a growing rift within Mexico's political establishment over how to handle pressure from Washington.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/27/world/americas/mexican-officials-us-informants.html", "state_media": false, "category": "政治"}, {"title_ja": "ベネズエラ、地震で経済回復に暗雲――米国の支援に期待高まる", "title_en": "Venezuela's Economic Recovery Derailed by Devastating Earthquakes", "summary_ja": "数十年にわたる失政ですでに疲弊していたベネズエラで、地震が発生し、わずかな経済回復の兆しも打ち砕かれた。この災害を受け、米国がベネズエラ支援においてどのような役割を果たすかについて、国際社会の期待と関心が高まっている。同国は政治的・経済的な混乱の長期的影響と今なお格闘しており、今回の震災はその脆弱性をさらに露わにした。", "summary_en": "Venezuela, already weakened by decades of mismanagement, has suffered a further blow as earthquakes have disrupted its fragile economic recovery. The disasters have raised urgent questions about what role the United States might play in providing humanitarian and economic assistance to the struggling nation. The situation highlights the compounding vulnerabilities facing a country still grappling with the long-term consequences of political and economic misrule.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/27/world/americas/venezuelas-economy-earthquake.html", "state_media": false, "category": "経済"}, {"title_ja": "人質合意の膠着打開でパレスチナ人がガザ北部へ徒歩帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルは、ガザ地区を分断する軍事ゾーンをパレスチナ避難民が通過することを許可し、北部ガザへの徒歩帰還が始まった。この動きは、人質解放をめぐる交渉の行き詰まりが打開されたことを受けたものである。今回の展開は、ガザ封鎖地域内における移動制限の大きな転換点となる。", "summary_en": "Israel has permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The move came after a standoff over hostage releases was resolved. The development marks a significant shift in movement restrictions within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治"}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の拡大を示唆", "title_en": "China's Vanke Reports Massive Loss, Deepening Real Estate Crisis Fears", "summary_ja": "中国の大手不動産デベロッパー、万科が巨額の損失を報告し、同国の不動産危機がさらに拡大している可能性が浮き彫りとなった。中国を代表するデベロッパーの一つである万科の経営難は、不動産セクター全体の低迷の深刻さを改めて示すものとなっている。市場関係者や投資家は、中国当局が事態を収拾するために介入するかどうかを固唾をのんで見守っている。", "summary_en": "Leading Chinese property developer Vanke has reported a massive financial loss, signaling that the country's real estate crisis may be spreading further. The troubles at Vanke, one of China's largest and most prominent developers, are raising serious questions about the depth and breadth of the ongoing property sector downturn. Observers are now watching closely to see whether the Chinese state will intervene to stabilize the situation.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会"}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃によるとみられる破片が依然として残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性人質は長期間にわたり単独で拘束され、約8か月間を地下トンネルの中で過ごしたという。今回の発表は、人質たちが拘束中に置かれていた過酷な身体的・精神的状況を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in underground tunnels. The disclosures highlight the severe physical and psychological conditions endured by hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会"}, {"title_ja": "カーボベルデ、W杯初出場で旋風——英国在住の diaspora コミュニティに感動の波", "title_en": "Cape Verde's World Cup debut electrifies UK diaspora community", "summary_ja": "アフリカの島国カーボベルデが初出場のワールドカップでスペインおよびウルグアイと引き分け、歴史的な快進撃を続けている。英国在住のカーボベルデ系コミュニティは「勝率1%でも、信念は99%」をスローガンに団結し、国全体が祝福ムードに包まれている。ベテランGKのヴォジーニャは一躍世界的な注目を集め、コミュニティの人々はサッカーを超えた文化や芸術への関心が高まることへの期待も口にしている。", "summary_en": "Cape Verde, one of the smallest nations at the tournament, is making history at their first ever World Cup, drawing with both Spain and Uruguay. The team's stunning run has galvanised the small Cape Verdean diaspora in the UK, with fans rallying around the slogan 'They gave us 1% chance, but we had 99% faith.' Veteran goalkeeper Vozinha has become a global sensation, while community members hope the spotlight leads to broader appreciation of Cape Verdean culture and talent beyond football.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/26/cape-verde-world-cup-run-delights-diaspora-community-uk", "state_media": false, "category": "政治"}, {"title_ja": "コンゴ民主共和国でエボラ感染者約300人の行方不明、感染拡大が深刻化", "title_en": "Nearly 300 Ebola Patients Unaccounted for in DR Congo as Outbreak Grows", "summary_ja": "アフリカCDCのカセヤ事務局長によると、コンゴ民主共和国でエボラ陽性と判定された約300人の所在が不明となっており、紛争による人道危機で100万人超が暮らすキャンプへの医療従事者のアクセスが遮断されている。WHOがランセット誌に発表した予測では、9月中旬までに約8,210人が感染し1,420人が死亡する見込みで、南スーダンへの拡大確率は70%とされている。国際社会が約束した9億1,000万ドルのうち実際に供給されたのは約13%にとどまり、エボラ治療センターの病床占有率はすでに95%に達している。", "summary_en": "Almost 300 people who tested positive for Ebola in the Democratic Republic of the Congo are unaccounted for, according to Africa CDC chief Dr Jean Kaseya, who cited conflict-driven displacement blocking health worker access to over one million camp residents. WHO projections published in the Lancet estimate around 8,210 cases and 1,420 deaths by mid-September, with a 70% chance of the outbreak spreading to South Sudan. Only 13% of the $910 million pledged by international donors has been delivered, while bed occupancy in Ebola treatment centres has reached 95%.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc", "state_media": false, "category": "社会"}, {"title_ja": "ソマリア政府をSNSで批判した女性に禁固3年の判決、国内外で非難の声", "title_en": "Somali woman jailed three years for criticising government on social media", "summary_ja": "ソマリアの27歳の看護学卒業生サディア・モアリム・アリ氏が、フェイスブックとTikTokで連邦政府の失業問題や燃料価格高騰、汚職などを批判したとして、6月25日に禁固3年の判決を受けた。元大統領シャリフ・シェイク・アフメド氏や元首相ハッサン・アリ・ハイレ氏をはじめ、人権団体も「根本的に不当な判決」として即時釈放を求めている。1歳の娘を持つ一家の主要な稼ぎ手であるアリ氏は、拘留中に拷問や性的脅迫を受けたと訴えており、弁護側は判決を不服として控訴する方針を示している。", "summary_en": "Sadia Moalim Ali, a 27-year-old nursing graduate and rickshaw driver in Somalia, was sentenced to three years in prison on 25 June for criticising the federal government on Facebook and TikTok over unemployment, fuel prices, and alleged corruption. The ruling was condemned as 'fundamentally unjust' by former Somali president Sharif Sheikh Ahmed, ex-prime minister Hassan Ali Khaire, and human rights organisations who called for her immediate release. Ali, who has a one-year-old daughter and has been in custody since April, also alleges she was subjected to torture and threats of rape while detained.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/26/woman-sadia-moalim-ali-three-year-jail-sentence-somalia-online-comments-governement", "state_media": false, "category": "政治"}, {"title_ja": "大学生の学力は思っているよりずっと低い", "title_en": "Students are doing worse than you think", "summary_ja": "新たな分析により、大学生の学業成績が一般的に考えられているよりも大幅に低いことが明らかになった。高等教育機関に通う一部の学生は、10歳の子どもと同程度の学力テストの結果しか示していない。この調査結果は、教育水準と高等教育機関が提供する実質的な価値に対する深刻な懸念を呼び起こしている。", "summary_en": "A new analysis reveals that academic performance among college and university students is significantly lower than widely assumed. Some students at higher education institutions are testing at levels no better than ten-year-old children. The findings raise serious concerns about educational standards and the actual value being delivered by post-secondary institutions.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会"}, {"title_ja": "独裁国家が台頭する新たな和平調停の世界", "title_en": "Autocracies Are Becoming the World's New Conflict Mediators", "summary_ja": "かつて西側民主主義国や国際機関が担ってきた紛争調停の役割を、権威主義国家が急速に担うようになっている。こうした独裁的な調停者が仲介する合意は、自国の政治的価値観や利益を色濃く反映しており、民主主義国家が主導してきた従来の和平合意とは大きく異なる性格を持つ。この変化は、国際外交の今後の在り方や、成立する和平協定の持続可能性について重大な問いを投げかけている。", "summary_en": "Authoritarian states are increasingly taking on the role of peacemaker in global conflicts, a function traditionally held by Western democracies and international institutions. The deals brokered by these autocratic mediators tend to reflect their own political values and interests, resulting in agreements that look markedly different from those championed by liberal democracies. This shift raises significant questions about the future shape of international diplomacy and the durability of the peace settlements being reached.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会"}, {"title_ja": "アジアの同盟国、トランプ氏と距離を置けない現実", "title_en": "Asian Allies Have No Choice But to Embrace Trump", "summary_ja": "日本をはじめとするアジア諸国は、中国への抑止力として中堅国連合では不十分であることを認識しており、トランプ政権下でも米国との緊密な関係を維持せざるを得ない状況にある。トランプ氏の予測不可能な言動への懸念はあるものの、米国が提供する軍事・戦略的な重みは他に代替できない。そのため、アジアの同盟国は他の外交的選択肢よりも対米同盟を最優先せざるを得ないと見られている。", "summary_en": "Japan and other Asian nations are finding that middle-power coalitions offer insufficient deterrence against China, leaving them with little alternative but to maintain close ties with the United States under Donald Trump. Despite concerns about Trump's unpredictability, the military and strategic weight only Washington can provide makes distancing from America too risky. Asian allies are therefore expected to prioritize the US alliance above other diplomatic options.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会"}, {"title_ja": "ワグネル撤退から1年、ロシアの「アフリカ軍団」はマリで苦戦", "title_en": "One Year On, Russia's Africa Corps Struggles to Fill Wagner's Shoes in Mali", "summary_ja": "ワグネル・グループの後継としてマリに展開したロシアの「アフリカ軍団」は、1年を経ても前任組織と同等の影響力と作戦能力を発揮できずにいる。ワグネルが長年かけて築いた現地との関係や運用ノウハウの継承が難航しており、能力面での空白が浮き彫りになっている。マリの治安状況は依然として不安定なまま、ロシアの後継部隊は複雑な武装勢力との戦いへの適応に苦慮している。", "summary_en": "One year after replacing the Wagner Group in Mali, Russia's Africa Corps is facing significant difficulties establishing the same level of influence and operational effectiveness. The transition has exposed gaps in capability and local relationships that Wagner had built over years of presence in the Sahel region. Mali's security situation remains fragile as the Russian successor force struggles to adapt to the complex insurgency landscape.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/le-monde-africa/article/2026/06/27/one-year-after-replacing-wagner-russia-s-africa-corps-struggles-in-mali_6754922_124.html", "state_media": false, "category": "社会"}, {"title_ja": "レバノンとイスラエル、ワシントンで「永続的な平和と安全」に向けた枠組み合意に署名", "title_en": "Lebanon and Israel Sign Framework Agreement for Lasting Peace and Security in Washington", "summary_ja": "レバノンとイスラエルは、両国間の永続的な平和と安全の確立を目的とした枠組み合意にワシントンで署名した。この合意は、隣国同士の関係における重要な外交的節目となる。合意の実施の詳細やスケジュールについては、今後さらに明らかにされる見通しだ。", "summary_en": "Lebanon and Israel have signed a framework agreement in Washington aimed at establishing lasting peace and security between the two countries. The deal marks a significant diplomatic milestone in relations between the neighboring nations. Details of the agreement's implementation and timeline remain to be fully outlined.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/27/lebanon-and-israel-sign-framework-agreement-in-washington-for-lasting-peace-and-security_6754926_4.html", "state_media": false, "category": "社会"}, {"title_ja": "パリ北郊外で熱波への不満高まる「鎧戸さえあれば、こんなに苦しまなかった」", "title_en": "Heatwave Fuels Frustration in Paris's Northern Suburbs Over Lack of Shutters", "summary_ja": "熱波がパリ北部郊外を襲う中、住民たちは遮熱対策が不十分な住環境への不満を募らせている。鎧戸などの簡単な設備があれば苦しみを大幅に軽減できたと多くの住民が訴えており、低コストの対策が講じられなかったことへの怒りが広がっている。この問題は、パリ首都圏における豊かな地域と貧しい地域の間に存在する住宅環境の格差を改めて浮き彫りにしている。", "summary_en": "Residents of Paris's northern suburbs are expressing frustration as a heatwave exposes inadequate housing conditions, particularly the absence of shutters or proper sun shielding. Many residents argue that simple, low-cost measures such as installing shutters could have significantly reduced their suffering. The situation highlights longstanding inequalities in housing quality between wealthier and poorer areas of the French capital.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/france/article/2026/06/26/heatwave-fuels-frustration-in-paris-s-northern-suburbs-if-they-d-just-given-us-shutters-we-wouldn-t-be-suffering-like-this_6754913_7.html", "state_media": false, "category": "社会"}, {"title_ja": "ベネズエラ地震：72時間の救助タイムリミット迫る中、生存者の捜索続く", "title_en": "Venezuelans Race to Find Survivors as 72-Hour Window Closes After Twin Earthquakes", "summary_ja": "水曜日にマグニチュード7.2と7.5の二度の大地震がベネズエラを襲い、少なくとも920人が死亡、5万1000人以上が行方不明となっている。生存者発見の可能性が高い「72時間の壁」が迫る中、被災者たちは素手でがれきを掘り起こすなど懸命の捜索を続けているが、政府の救助チームの姿は少ないと報告されている。メキシコや米国など各国から860人以上のボランティアが現地入りしており、当局は混乱を防ぐため被災地への立ち入りを制限している。", "summary_en": "Two powerful earthquakes of magnitude 7.2 and 7.5 struck Venezuela on Wednesday, killing at least 920 people and leaving more than 51,000 missing. Rescuers and desperate residents are digging through rubble by hand as the critical 72-hour survival window nears its end, with reports of few government rescue teams visible in the hardest-hit coastal area of La Guaira. Over 860 international volunteers from multiple countries have arrived to assist, while authorities have restricted access to the disaster zone and militarized the area.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/27/venezuelans-dig-for-earthquake-survivors-as-72-hour-rescue-window-nears-end?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "2026年W杯16日目：スペイン、エジプト、カーボベルデがベスト32進出", "title_en": "World Cup 2026 Day 16: Spain, Egypt, Cape Verde Advance to Round of 32", "summary_ja": "北米で開催されているFIFAワールドカップ2026の16日目、スペイン、エジプト、カーボベルデの3カ国がベスト32への進出を決めた。各試合では白熱したプレーが繰り広げられ、3カ国がそれぞれ力強いパフォーマンスを見せた。最新のハイライト映像や選手・監督のコメント、次戦のプレビューも公開されている。", "summary_en": "On Day 16 of the FIFA World Cup 2026 hosted in North America, Spain, Egypt, and Cape Verde secured their places in the Round of 32. The matches featured dramatic highlights and strong performances from all three advancing nations. Fans can watch the latest match highlights, reactions, and previews from the tournament.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/2026/6/27/video-world-cup-2026-highlights?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "スーツケースに遺体で発見された10代少女の殺害容疑、タイ警察がオーストラリア人男を逮捕", "title_en": "Thai Police Arrest Australian Man Suspected of Murdering Teen Whose Body Was Found in Suitcase", "summary_ja": "タイ警察は金曜日、バンコクのスワンナプーム国際空港でパースへの帰国便に搭乗しようとしていたオーストラリア国籍のサイモン・カーマン容疑者（46歳）を逮捕した。17歳の少女がパタヤ近郊の線路脇にスーツケースに入れられた状態で遺体となって発見された事件に関与した疑いが持たれている。カーマン容疑者は殺害を否定しているが、殺人、死体遺棄、未成年者わいせつ目的略取などの容疑で取り調べを受けている。", "summary_en": "Thai police arrested Australian national Simon Carman, 46, at Bangkok's Suvarnabhumi Airport on Friday as he attempted to board a flight to Perth. He is suspected of murdering a 17-year-old girl whose body was found naked inside a suitcase dumped near a railway line close to Pattaya. Carman denies the killing and faces charges including murder, concealing a body, and taking a minor for an indecent purpose.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/27/thai-police-arrest-australian-over-killing-of-teenager-found-in-suitcase?traffic_source=rss", "state_media": false, "category": "社会"}, {"title_ja": "シアトルで開催予定のエジプト対イラン「プライドマッチ」にアラブ世界が激怒", "title_en": "Arab World Outrage Over Egypt–Iran 'Pride Match' Scheduled in Seattle", "summary_ja": "エジプトとイランのサッカー試合がプライド月間中にシアトルで開催される予定であることを受け、アラブ世界で強い反発が起きている。アラブ・ムスリムコミュニティからは、LGBTの象徴を受け入れることを強いられているのかという批判の声が上がっている。この論争は、プライドイベントが盛んな都市で国際スポーツ大会を開催する際の文化的・宗教的緊張を浮き彫りにしている。", "summary_en": "The Arab world has erupted in anger over an upcoming soccer match between Egypt and Iran set to be played in Seattle during Pride month, with many viewing the venue and timing as an implicit endorsement of LGBT values. Critics from Arab and Muslim communities questioned whether they were expected to embrace LGBT symbolism to attend or support the game. The controversy highlights cultural and religious tensions surrounding international sporting events held in cities with prominent Pride celebrations.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihAJBVV95cUxOSE92Vmt4b19DYkE4TFFuTzBQbjdpbTczRHlWemtXNDVHSEFPcFBJdlpPejZwV2ZSaTYzNXFoeG1wUXp4RlRaUFdrdk5ZRW5qcW8yZ1QtZG1XcTdpT2JUazN5c2pxaEJvaGN1TmpYUFdmakcwSFVGcVc0VDNLN2xpc2p0b1VDTnM5Tm8xQkRnT3QzdWZZS2FYSlQ1NEVEVU5aWF9vY05rTkhCNGFHWU9FUU5IMG9PTzdBclhnR2VtZ1RSZlJyc3BlclBzcmM1NTUtZUJKcVhDczBPSXBudXJReDItS0ZYX0czUUhTSHVZVlQxV3EyaFRLRC1MWXpVdDFvOXZGWA?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "機密解除文書がイスラエル「史上最大の作戦」の詳細を明かす", "title_en": "Declassified Records Reveal Details of Israel's 'Boldest Operation Ever'", "summary_ja": "新たに機密解除された文書により、イスラエルが内部で「史上最も大胆な作戦」と称した極秘任務の詳細が明らかになった。文書には、作戦の立案・実行・意思決定に関するこれまで知られていなかった情報が含まれている。今回の機密解除は、イスラエルの国家機密公開における重要な節目となる。", "summary_en": "Newly declassified records have shed light on one of Israel's most audacious covert or military operations, described internally as the 'boldest operation ever.' The documents provide previously unknown details about the planning, execution, and decision-making behind the mission. The release marks a significant moment in the declassification of Israeli state secrets.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiqwJBVV95cUxOd0JPVFc0aEhIWWxRVVl1SjhlSktYNjlrN2t6TjNDNUxKUzBIUm45OEtHQXhhWGZFQ3RSZnNtSEpxWkFlSzg5RUlGZTVBaGpaWFg1SzBFM0J2dG9TTDVRTTdqdi0tRHJTc095aFkxUmxfOFVhaE5FN2dsQXBEdmxPb0wtNVFBc2phYWh5YmJqd19OcmFaTzhUSERWTHlzZXl6MnZUdHRHa3kwUUN0NFU0RkFVM3pDblpENFhhcTJtcDJIRVBUaEw1VkZQV0d5c19sVjkyY1dNaHY0WTRLOHY0bXFXbUo3NGxqdFB4Y1g0Q3BYaXBmdTVQMzNxVENnQ2ozVEk2bFFkZVZkWkp2a2IwV1NuUDNMQldPZmVIYzFKaWxlTVNtWHEzbEp5TQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "「フラッグゲート」：イスラエル、分離主義者のジェノサイド否定論者招待で波紋", "title_en": "FlagGate: How Israel Sparked Controversy by Hosting a Separatist Genocide Denier", "summary_ja": "イスラエルは、分離主義的立場を持ちジェノサイドを否定することで知られる人物を招待したことで、外交的な嵐の中心に立たされた。「フラッグゲート」と呼ばれるこの騒動は大きな反発を招き、イスラエルの外交的判断に疑問を投げかけた。この論争は、ジェノサイド認定をめぐる問題の敏感さと、こうした要人招待がもたらす政治的影響を浮き彫りにしている。", "summary_en": "Israel found itself at the center of a diplomatic storm after hosting a figure known for both separatist views and denying genocide. The incident, dubbed 'FlagGate,' triggered significant backlash and raised questions about Israel's diplomatic judgment. The controversy highlights the sensitivities surrounding genocide recognition and the political consequences of such high-profile hosting decisions.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMilwJBVV95cUxPZW5XSWthdTJPbTkwUkprdEMxSmQ2RnQweW5iTDVyWnV5OHFMZ0QxcXRMLUNMRGhXdEFGVWNLaVQxeUp4SUk5ZlM0SlVQcXlZSXpEc2FsNGFDdEJCZjg0bG9sZ215Y1MtMHpteTFPb0hUZndfYmFFUUJib05FdmRIWGR6T19qclgzZkNNY3RGR2k2UEpEbmVaLVVZYm9sYkg2NDJGazItVGF5aDZINTdOSHMtZlBLVXBOZEU5bGNtcm9XN2djbGtubzh5V1NYWUN1N19rZ1V3dk9TTFllRVdtUWdMVElFaGJ3WWdjMVZwMjQ4SGJkZmd4elU3NTRuR2tYVUtPZ2szUEgtWUUyWTRxMm5UZ1BfTnM?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "国防省ニュースレター更新 – 2026年6月27日", "title_en": "Mindef Newsletter Update – June 27, 2026", "summary_ja": "シンガポール国防省（Mindef）は、2026年6月27日（土）付けのニュースレターを配信した。この通知はストレーツ・タイムズのメールニュースレタープラットフォームを通じて送信された。読者はストレーツ・タイムズのウェブサイトから購読管理や追加の無料ニュースレターへの登録が可能とされている。", "summary_en": "The Singapore Ministry of Defence (Mindef) released a newsletter update dated Saturday, June 27, 2026. The communication was distributed via The Straits Times email newsletter platform. Readers were directed to manage their subscriptions or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治"}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ・ニュースレター", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "ストレーツ・タイムズは、その日の主要ニュースをまとめたイブニング・アップデート・ニュースレターを読者に配信しています。デジタル形式で提供されており、購読管理や追加の無料ニュースレターへの登録も可能です。今回の抜粋には具体的なニュース内容は含まれていませんでした。", "summary_en": "The Straits Times publishes its Evening Update newsletter, delivering a curated summary of the day's top stories to subscribers. The edition is distributed digitally, with options for readers to manage their subscriptions or sign up for additional free newsletters. No specific news content was included in the available excerpt.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治"}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニング・ブリーフィングは、定期的に購読者へ配信されるニュースレターです。この版は2026年6月27日（土曜日）付の配信とみられます。読者はストレーツ・タイムズのウェブサイトから購読管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a regular newsletter delivered to subscribers. This edition appears to reference a Saturday publication dated June 27, 2026. Readers can manage their subscription or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治"}, {"title_ja": "持続可能性の掛け声と経済の現実：両立は可能か？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、持続可能性への誓約と途上国が直面する経済的圧力の間に高まる緊張を検証する。各国政府や企業がグリーン政策を推進する一方、化石燃料や伝統的産業からの移行コストは困難な問題を提起している。環境目標と経済成長の真の両立が実現可能かどうか、それとも理想論にとどまるのかを論じている。", "summary_en": "The Jakarta Post examines the growing tension between sustainability pledges and economic pressures facing developing nations. As governments and corporations champion green agendas, the practical costs of transitioning away from fossil fuels and traditional industries raise difficult questions. The article explores whether genuine reconciliation between environmental goals and economic growth is achievable or remains aspirational rhetoric.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "コモド島への観光客が増加傾向に", "title_en": "Tourist Visits to Komodo Island on the Rise", "summary_ja": "世界的に有名なコモドオオトカゲの生息地であるコモド島で、観光客数の顕著な増加が見られている。ユネスコ世界遺産にも登録されているこの島への関心の高まりは、インドネシア観光業全体の回復を反映している。当局や自然保護団体は、観光客の急増が島固有の生態系に悪影響を及ぼさないよう監視を続けている。", "summary_en": "Komodo Island, home to the world-famous Komodo dragons, is experiencing a notable increase in tourist arrivals. The growing interest in this UNESCO World Heritage Site reflects a broader rebound in Indonesia's tourism sector. Authorities and conservationists are monitoring the surge to ensure that the influx of visitors does not negatively impact the island's unique ecosystem.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikwFBVV95cUxOQnVENlpVakhEVnVrUXdKUzdjUVljNjJzQ2pMRnliQTB5Wm4xV01fdEx3Y3JwaWcxc3Z3SUM2U1MyLU9fNHV6MFJ6MTRmN2E1NTBMZlZKU3d0NGZ2VU0yUVBEZzF4NG4xdTE2NmFXVDQ3TDYyMHRQQ1FaeVhDaVFmWkE1ZmpWOHhiNmxRd0NmbnpSdlk?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "スラウェシの古代洞窟壁画、欧州中心の先史時代芸術観を覆す", "title_en": "Sulawesi's Ancient Cave Art Challenges Europe's Monopoly on Prehistoric Creativity", "summary_ja": "インドネシアのスラウェシ島で発見された古代洞窟壁画が、先史時代の人類の創造性に関する従来の認識を大きく塗り替えつつある。芸術的表現の起源は欧州に限らず、東南アジアでも独自に発展していたことが示唆されており、長年にわたる欧州中心主義的な先史時代芸術の解釈に疑問が投げかけられている。この発見は、人類の認知進化の歴史を再考する重要な手がかりとなっている。", "summary_en": "Recent discoveries of ancient cave art in Sulawesi, Indonesia, are reshaping our understanding of prehistoric human creativity. The findings suggest that early artistic expression was not exclusive to Europe, as long believed, but also flourished independently in Southeast Asia. This challenges the Eurocentric narrative that had long dominated the study of prehistoric art and human cognitive evolution.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMitgFBVV95cUxQdE95UzFpM09BSDdSUV90b0Jxc3BUMHY4azRnRE1DWTZrSVl0QXcxeDJheHFWUFp5WmI4c3UwWU1UWTV1Y2E5czdsTmVxblFvV1V6a1htR2dHUU9VbzB0Q3h1dUlzV09HbkVuaUNGU0JZR2VINmI1RnpKOW1vanhzODBCZEtZWkhVU210SGZmTGw4RkRqUzBhMi1PQl9OVzUweG1mS0xXd3haX0c0VDBCOENEb1NmUQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "パキスタンが米イラン合意を仲介、シャハバズ首相が「平和の担い手」と宣言", "title_en": "Pakistan Claims 'Peacemaker' Role After Mediating U.S.-Iran Deal: Shehbaz Sharif", "summary_ja": "パキスタンのシャハバズ・シャリフ首相は、米国とイランの協議を仲介した成果として、パキスタンが世界的な「平和の担い手」として台頭したと述べた。カタールとパキスタンが仲介したスイスでの会談を経て、両国は60日以内に最終合意を目指すロードマップで合意した。シャリフ首相はまた、根拠を示さないままインドがパキスタンの安定を損なう「代理勢力」を使っていると非難した。", "summary_en": "Pakistani Prime Minister Shehbaz Sharif declared Pakistan a global 'peacemaker' following its role in mediating talks between the U.S. and Iran, which resulted in a roadmap for a final agreement within 60 days. The high-level negotiations, also facilitated by Qatar, were held in Switzerland under the Islamabad Memorandum of Understanding signed on June 18. Sharif also accused India, without evidence, of using proxies to destabilize Pakistan.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/pakistan-emerged-as-peacemaker-after-mediating-iran-us-deal-shehbaz-sharif/article71153893.ece", "state_media": false, "category": "政治"}, {"title_ja": "中国とバングラデシュ、テスタ川開発プロジェクトで協議", "title_en": "China and Bangladesh in Talks Over Teesta River Development Project", "summary_ja": "バングラデシュのタリク・ラーマン首相は6月24〜26日の北京訪問で、習近平国家主席や李強首相らと会談し、テスタ川総合管理・復元プロジェクトの推進について中国側から確約を得た。このプロジェクトは2016年に締結された覚書を基盤とし、2025年1月に延長協定が署名され、大規模な浚渫・土地造成・堤防建設・インフラ整備を計画している。一方、インドが上流で行う取水によって冬季の農業用水が不足するとバングラデシュは主張しており、長年の水資源をめぐる緊張を背景にプロジェクトへの関心が高まっている。", "summary_en": "Bangladesh PM Tarique Rahman received assurances from Chinese leaders, including President Xi Jinping and Premier Li Qiang, on advancing the Teesta River Comprehensive Management and Restoration Project during a June 24-26 visit to Beijing. The project, rooted in a 2016 MoU revived in January 2025, envisions large-scale dredging, land reclamation, embankment construction, and infrastructure development along the Teesta inside Bangladesh. The initiative comes amid long-standing tensions over India's upstream water use, which Bangladesh says reduces the Teesta to a trickle during critical winter irrigation seasons.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/explained-china-bangladesh-in-talks-over-teesta-project/article71153763.ece", "state_media": false, "category": "社会"}, {"title_ja": "イラン製ドローンがイラク・エルビル近郊のクルド人キャンプとバーレーンを標的に、停戦が危機に", "title_en": "US-Iran tensions escalate as drones target Erbil Kurdish camp and Bahrain amid fragile ceasefire", "summary_ja": "2026年6月27日、イラク北部エルビル近郊のイラン系クルド人反体制派のキャンプに爆発物搭載ドローンが着弾したが、キャンプはすでに避難済みで死傷者は報告されていない。バーレーンもイランによるドローン攻撃を受けたと非難する一方、イランは米軍が自国南岸を空爆したことへの報復として米軍関連施設を攻撃したと主張した。米国がイランによる貨物船攻撃を非難したことを発端に米イラン間の軍事的応酬が激化しており、西アジア紛争をめぐる脆弱な停戦が揺らいでいる。", "summary_en": "An explosive drone struck an Iranian Kurdish opposition camp north of Iraq's Erbil on June 27, 2026, though no casualties were reported as the camp had been evacuated. Bahrain accused Iran of launching a separate drone attack on the island nation, while Iran claimed it struck targets linked to U.S. forces in retaliation for American airstrikes on its southern coast. The exchanges follow Washington's accusation that Tehran attacked a cargo ship, threatening a fragile ceasefire in the West Asia conflict.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-iran-us-conflict-washington-tehran-ceasefire-strait-of-hormuz-israel-lebanon-peace-deal-live-updates-june-27-2026/article71153161.ece", "state_media": false, "category": "政治"}, {"title_ja": "国民党党首：両岸対話再開には「一つの中国」現状維持への回帰が不可欠", "title_en": "KMT Head: Returning to 'One China' Status Quo Is Key to Restarting Cross-Strait Talks", "summary_ja": "台湾の中国国民党（KMT）の党首は、北京との両岸対話を再開するためには「一つの中国」の現状維持に戻ることが不可欠だと述べた。国民党は歴史的に、交渉の基盤として「一つの中国」の枠組みを支える1992年合意を支持してきた。この立場は、同合意を拒否し両岸協議が停滞している与党・民主進歩党の姿勢と対立している。", "summary_en": "The leader of Taiwan's Kuomintang (KMT) party has stated that returning to the 'one China' status quo is essential for resuming cross-strait dialogue with Beijing. The KMT has historically supported the 1992 Consensus, which underpins the 'one China' framework, as a basis for negotiations. This position contrasts with the ruling Democratic Progressive Party's stance, which rejects the consensus and has seen cross-strait talks stall.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5oTXhBLVZ3a1A3YnZSellabldoMlFWeWlZRzFSVjNEZWNBajFIQ19XTFZfVHFUR0RicHBoZzdQcW1rdDVsdFpHSW1CcEhYeWc5U3UzQmJsQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ヤンキース、台湾人投手有望株と100万ドルで契約", "title_en": "Yankees Sign Taiwanese Pitching Prospect for US$1 Million", "summary_ja": "ニューヨーク・ヤンキースが台湾人の投手有望株と100万ドルの契約を結んだ。この契約は、メジャーリーグ球団が台湾の野球人材に引き続き強い関心を持っていることを示している。投手の詳細な経歴や育成計画については報道では明らかにされていない。", "summary_en": "The New York Yankees have signed a Taiwanese pitching prospect to a deal worth US$1 million. The signing highlights continued interest from Major League Baseball organizations in developing talent from Taiwan. Details about the pitcher's background and projected development timeline were not specified in the report.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVEFVX3lxTE51blNPT0lEWlJOVEloZm9BdDd5NnB0LWRlbVVhRXJuV0JReE51cDQ2bUxzY0N5cy15MmxtU0xYRWt0U2xYWWZkcFEyZ2FZZUVyYnIyVA?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾の通商代表が職場いじめに関与、行政院が認定", "title_en": "Taiwan Trade Representative Found Guilty of Workplace Bullying, Cabinet Says", "summary_ja": "台湾の行政院は、通商代表が職場いじめを行っていたことを公式に認めた。調査の結果、当該当局者が部下に対して不適切な行為を行っていたことが確認された。政府はこの問題を深刻に受け止め、適切な措置を講じる方針を示している。", "summary_en": "Taiwan's Cabinet has confirmed that a trade representative engaged in workplace bullying. The announcement follows an investigation into the official's conduct toward subordinates. The government has indicated it is taking the matter seriously and appropriate action will be pursued.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE1FbllvcGNycS14YmhTVlkzdzN3UGtjZ3VSZFh3amJzTllvS1NYbWJqYTcydjk2ZzVzWkFxa0xKWlRhUkR0N3lzcExLbDZfQ2VWUEdOcGxJRQ?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "コロンビア極右勝利でブラジルは南米で孤立した左派の「孤島」に", "title_en": "Far-Right Win in Colombia Leaves Brazil Isolated as South America's Last Left-Wing Stronghold", "summary_ja": "コロンビアでの極右勝利により、南米全体で保守化の波が加速し、ブラジルのルラ大統領は選挙まで4カ月を残して地域内で政治的に孤立した。2022年にはアルゼンチンやチリなど多くの国が左派政権だったが、今や右派・極右政権が大半を占める。次期大統領エスプリエリャ氏はミレイ氏やトランプ氏らに祝福され、米国との関係正常化やペトロ前大統領の引き渡しにも前向きな姿勢を示している。", "summary_en": "The far right's victory in Colombia has deepened a conservative shift across South America, leaving Brazilian President Lula politically isolated just four months before Brazil's own elections. Where leftist governments once dominated the region in 2022, countries including Colombia, Argentina, Chile, and Peru are now led by right-wing or far-right leaders. Colombia's president-elect Abelardo de la Espriella, celebrated by Milei, Trump, and Fujimori, has pledged to restore U.S. ties and even extradite former president Gustavo Petro if Washington requests it.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/with-far-right-in-colombia-brazil-is-a-left-wing-island-in-south-america.shtml", "state_media": false, "category": "政治"}, {"title_ja": "イタマラティ、トランプ介入を警戒——「ブラジルはベネズエラではない」", "title_en": "Itamaraty Fears Trump Interference but Insists Brazil Is Not Venezuela", "summary_ja": "ブラジルのルラ政権は、トランプ米大統領がブラジルの選挙に介入する兆候を注視しており、外交筋はその関与が次第に明確になっていると指摘している。トランプ氏はG7でブラジルの政治状況を「危険」と呼び、ボルソナロ一家を支持する発言を行った。ルラ政権内では即時対応を求める声がある一方、トランプ氏の発言は矛盾しており慎重な見極めが必要だとする意見も存在する。", "summary_en": "Brazil's Lula administration is closely monitoring signs of U.S. President Donald Trump's potential interference in Brazil's upcoming elections, with diplomats noting his involvement is becoming increasingly apparent. Trump drew attention by capturing Venezuelan dictator Maduro, calling Brazil's political situation dangerous at the G7, and openly supporting the Bolsonaro family. While some Lula allies demand an immediate response, others urge caution, noting Trump's signals remain contradictory.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米当局、逮捕のブラジル人男性をCVとPCCの幹部と主張―ブラジルの判決には組織との関連なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC, but Court Records Show No Gang Ties", "summary_ja": "米移民税関執行局（ICE）はノースカロライナ州でブラジル人男性フェリペ・リナレス・デ・オリベイラ・デル・アクイラを逮捕し、米国土安全保障省は同氏をブラジルの大規模犯罪組織PCCとCVの「司令官」と称した。しかし、ブラジルでの麻薬密売・詐欺・恐喝に関する過去の有罪判決には、いずれの組織との関連も記載されていない。両組織は先月米政府によりテロ組織に指定されており、米当局の主張の正確性に疑問が生じている。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested by ICE in North Carolina, with US authorities calling him a 'commander' of both the PCC and CV criminal organizations. However, Brazilian court records from his prior convictions for drug trafficking, fraud, and extortion make no mention of ties to either group. The discrepancy raises questions about the accuracy of US government claims, as both organizations were recently designated terrorist groups by Washington.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治"}, {"title_ja": "アブジャの病院、切開不要の最新レーザー前立腺治療を導入―手術当日に退院可能", "title_en": "Abuja Hospital Introduces Laser Prostate Treatment With No Incisions, Same-Day Discharge", "summary_ja": "ナイジェリアの首都アブジャにあるエレオス専門病院が、チュリウムファイバーレーザーによる前立腺核出術（ThuFLEP）の提供を開始した。この手術は切開を必要とせず、出血もほとんどなく、患者は手術当日または翌日に退院できる。同病院はすでに30人以上の患者に対してこの技術を用いた手術を成功させており、勃起機能への影響もないとされている。", "summary_en": "Eleos Specialist Hospital in Abuja has begun offering Thulium Fiber Laser Enucleation of the Prostate (ThuFLEP), a minimally invasive procedure that removes enlarged prostates without surgical cuts or significant blood loss. Patients can go home the same day or the day after the procedure, and the technique carries no risk of erectile dysfunction. The hospital reports successfully treating over 30 patients so far using the technology.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/promoted/891071-abuja-hospital-now-offers-new-laser-prostate-treatment-with-no-surgical-cuts-patients-go-home-same-day.html", "state_media": false, "category": "社会"}, {"title_ja": "専門家が警告：女性は甲状腺疾患のリスクが男性より大幅に高い", "title_en": "Women Face Far Higher Risk of Thyroid Disorders, Expert Warns", "summary_ja": "生殖内分泌専門医のオラダポ・アシル氏によると、ナイジェリアの研究では女性と男性の甲状腺疾患比率が最大98対1に達するなど、女性は男性に比べて甲状腺疾患を発症するリスクが著しく高い。体重変化や疲労感、気分の変動といった症状がストレスや更年期障害と混同されやすく、診断が遅れるケースが多いという。同氏は35歳以上の女性や妊婦、家族歴のある人に定期的な甲状腺検査を推奨し、早期発見が不妊や流産などの深刻な合併症を防ぐ上で重要だと強調した。", "summary_en": "Reproductive endocrinologist Oladapo Ashiru says women are significantly more likely than men to develop thyroid disorders, with Nigerian studies reporting female-to-male ratios as high as 98:1. Common symptoms such as weight changes, fatigue, and mood shifts are often mistaken for stress or menopause, leading to late diagnosis. He recommends routine thyroid screening for women aged 35 and above, pregnant women, and those with a family history of the condition, noting that early detection can prevent serious complications including infertility and pregnancy loss.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/health/health-news/891062-pt-health-watch-why-women-face-higher-risk-of-thyroid-disorders-expert.html", "state_media": false, "category": "社会"}, {"title_ja": "ナイジェリアの優秀なジャーナリストが相次いで離職——低賃金だけが原因ではない", "title_en": "Nigeria's Top Journalists Are Quitting — Low Pay Is Just Part of the Problem", "summary_ja": "ナイジェリアで優秀なジャーナリストの大量離職が深刻化しており、調査対象となった元記者の64%が主な離職理由として低賃金を挙げた。特に北部のラジオ局では月収が国家最低賃金を大きく下回るケースも多く、18〜34歳の若手記者の約67%が就職から5年以内に離職している。アフリカ最大の民主主義国家で権力を監視すべきジャーナリズムの担い手が失われつつある実態が明らかになった。", "summary_en": "Nigeria's most talented journalists are leaving the profession in large numbers, with 64% of surveyed former practitioners citing low remuneration as their primary reason for departure. Many full-time journalists earn below the national minimum wage of N70,000, with some broadcast journalists in northern Nigeria taking home as little as N30,000 per month. The exodus is stripping Africa's largest democracy of critical accountability journalism at a time when it is needed most.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/891025-nigerias-best-journalists-are-leaving-and-remuneration-is-not-the-only-problem.html", "state_media": false, "category": "社会"}, {"title_ja": "フォン・デア・ライエン欧州委員長、7月2日にアルメニアを訪問予定", "title_en": "Von der Leyen to Visit Armenia on July 2", "summary_ja": "CGTNはロイターを引用し、欧州委員会のウルズラ・フォン・デア・ライエン委員長が7月2日にアルメニアを訪問する予定だと伝えた。この訪問は2026年6月26日に発表されたが、訪問の目的や詳細な日程については報道されていない。", "summary_en": "CGTN reports that European Commission President Ursula von der Leyen is scheduled to visit Armenia on July 2, citing Reuters. The visit was announced on June 26, 2026, though further details about the agenda or purpose of the trip were not provided in the report.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-26/news-1Oid1QECmT6/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "豪州、未成年SNS禁止法の強化を表明――効果は限定的との研究結果も", "title_en": "Australia vows to strengthen child social media ban as study shows little impact on teen usage", "summary_ja": "CGTNによると、オーストラリアのアルバニージー首相は、16歳未満を対象としたSNS利用禁止法を可能な限り強固なものにする意向を示した。一方、英医学誌BMJに掲載された新たな研究では、禁止法施行から3か月後も12〜15歳の85%がSNSを使い続けていたと報じられている。CGTNによれば、未成年ユーザーの3分の2は年齢を虚偽申告するか、16歳以上と判定されたセルフィーを提出することで規制を回避しており、eSafety委員会は複数のプラットフォームに対する法的措置を準備中だという。", "summary_en": "CGTN reports that Australian Prime Minister Anthony Albanese pledged to reinforce the country's social media ban for under-16s, despite a new British Medical Journal study finding that 85% of 12-to-15-year-olds were still using social media three months after the law took effect. CGTN reports that two-thirds of underage users bypassed the ban by falsely declaring their age or submitting selfies accepted as proof of being over 16. The eSafety Commission is reportedly preparing legal action against multiple platforms, which face fines of up to 49.5 million Australian dollars for systematically failing to uphold the ban.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-26/Australia-to-strengthen-child-social-media-ban-despite-limited-impact-1OhWmRkEJXy/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "ジンバブエ人作家スー・ニャティの自費出版小説がNetflixの大ヒット作に", "title_en": "Zimbabwean Author Sue Nyathi on Her Self-Published Novel Becoming a Netflix Hit", "summary_ja": "CGTNによると、スー・ニャティが2012年に自費出版した処女作「The Polygamist」は、Netflix配信開始からわずか数週間でアフリカ、カリブ海地域、欧州の一部でトレンド入りし、非英語シリーズの中で最も視聴された作品の一つになったという。CGTNは、ニャティが長年にわたって出版社を見つけられずにいたが、執筆から14年後の2024年にNetflixが参画したと伝えている。CGTNはさらに、このような成功はアフリカ人作家が創作の主導権を保持しながらグローバルな映像作品を牽引する広範なトレンドの一部であると報じている。", "summary_en": "CGTN reports that Sue Nyathi's self-published 2012 debut novel 'The Polygamist' became one of Netflix's most-watched non-English series within weeks of its June release, trending across Africa, the Caribbean, and parts of Europe. CGTN reports that Nyathi spent years unable to find a publisher before Netflix came on board in 2024, fourteen years after she first wrote the story. The adaptation is part of a broader pattern, CGTN reports, of African authors retaining creative control and driving major global screen productions, with similar successes from Nigerian and South African authors also reaching top Netflix charts.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://newsaf.cgtn.com/news/2026-06-24/-The-Polygamist-author-unpacks-Netflix-sensation-1Of2Y0O6eR2/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "第4回ユーラシア安全保障に関するミンスク会議、11月3〜4日に開催予定とロシア外務省", "title_en": "4th Minsk Conference on Eurasian Security Scheduled for November 3-4, Russian MFA Says", "summary_ja": "TASSによると、ロシア外務省のアレクサンドル・トロフィモフ大使は、第4回ユーラシア安全保障ミンスク会議が11月3〜4日に開催されると述べたと同通信は伝えている。同通信によれば、このフォーラムは2023年からルカシェンコ大統領の主導のもとベラルーシが主催しており、議題の設定権はベラルーシ側が持つとされる。トロフィモフ氏はこの会議が政府関係者や学者、専門家らを集めるユーラシア安全保障の重要な議論の場であると主張したとTASSは報じている。", "summary_en": "TASS reports that the 4th Minsk Conference on Eurasian Security is set to take place on November 3-4, according to Russian Foreign Ministry Ambassador-at-Large Alexander Trofimov. TASS reports that the forum has been organized by Belarus since 2023 at the initiative of President Alexander Lukashenko, with the Belarusian side retaining control over the agenda. Trofimov claims the conference serves as a key platform bringing together government officials, scholars, and experts to discuss Eurasian security issues.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2152319", "state_media": true, "category": "社会"}, {"title_ja": "2026年W杯ラウンド32進出の28チームが決定", "title_en": "28 Teams Advance to 2026 World Cup Round of 32", "summary_ja": "TASSは、2026年FIFA W杯において48チーム中28チームがラウンド32への進出を確定したと伝えている。ブラジル、ドイツ、フランス、アルゼンチン、米国などが名を連ねているという。同メディアによれば、ドイツ対パラグアイ、フランス対スウェーデンなど9試合の対戦カードがすでに決定しており、今大会は従来の32チームから48チームへと拡大された初めてのW杯となる。", "summary_en": "TASS reports that 28 of the 48 teams have secured spots in the Round of 32 at the 2026 FIFA World Cup, including Brazil, Germany, France, Argentina, and the US. The state outlet reports that nine first-round knockout matchups have been confirmed, including Germany vs. Paraguay and France vs. Sweden. The 2026 tournament, co-hosted by Canada, Mexico, and the United States, marks the first World Cup to feature an expanded 48-team format.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/sports/2152317", "state_media": true, "category": "社会"}, {"title_ja": "エジプトとイランが2026年W杯グループステージで1-1の引き分け", "title_en": "Egypt and Iran Draw 1-1 in 2026 World Cup Group Stage", "summary_ja": "TASSによると、2026年FIFAワールドカップのグループGにおいて、エジプトとイランがシアトルで対戦し、1-1の引き分けに終わった。TASSによれば、エジプトは勝ち点5でグループ2位となったが、得失点差でベルギーに及ばず、イランは勝ち点3で3位に留まり、決勝トーナメント進出の可能性を残した。今大会はカナダ、メキシコ、米国の3か国共催で、初めて48チームが参加する形式で開催されている。", "summary_en": "TASS reports that Egypt and Iran played to a 1-1 draw in a Group G match at the 2026 FIFA World Cup in Seattle. TASS reports that Egypt finished second in the group with five points, narrowly behind Belgium on goal difference, while Iran retained a chance of advancing with three points. The 2026 World Cup, co-hosted by Canada, Mexico, and the United States, is the first to feature 48 teams.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/sports/2152315", "state_media": true, "category": "社会"}, {"title_ja": "欧州エネルギー単一市場は本当に良いアイデアか？", "title_en": "Is a European Single Market for Energy Such a Good Idea?", "summary_ja": "筆者は、最近のエネルギー供給混乱により、気候変動対策とエネルギー安全保障の両面から欧州が化石燃料を段階的に廃止する必要性が改めて示されたと主張する。しかしそれ以上に重要な課題として、今世紀に入り低下し続ける欧州のGDP世界シェアを回復するためにエネルギーコストを引き下げる必要性を指摘する。そのうえで、欧州エネルギー単一市場がその目標達成に適切な手段であるかどうかに疑問を呈している。", "summary_en": "The author argues that recent energy supply disruptions reinforce the need for Europe to phase out fossil fuels for both climate and security reasons. Beyond this obvious takeaway, the author contends that Europe's deeper challenge is reducing energy costs to reverse its declining share of global GDP. The piece questions whether a European single market for energy is the right mechanism to achieve that goal.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/european-energy-single-market-political-risks-vs-economic-rewards-by-brigitte-granville-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "中国のリバランス失敗：個人消費の低迷が続く", "title_en": "China's Failed Rebalancing: Domestic Consumption Remains Stubbornly Low", "summary_ja": "筆者は、中国が約20年間取り組んできた投資・輸出依存型経済から個人消費主導型への転換（リバランス）が根本的に失敗したと主張している。GDPに占める家計消費の割合は依然として低水準にとどまり、内需拡大を約束してきた当局の信頼性は失われつつある。こうした旧来の成長モデルへの依存継続は、中国経済のみならず世界経済にとっても深刻な問題を提起している。", "summary_en": "The author argues that China's two-decade effort to rebalance its economy away from investment- and export-led growth toward domestic consumption has fundamentally failed. Household consumption as a share of GDP remains persistently low, eroding the credibility of officials' pledges to boost domestic demand. This continued reliance on outdated growth drivers raises serious concerns for both China's economic future and the broader global economy.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/chinese-economy-consumer-led-rebalancing-has-failed-by-stephen-s-roach-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "「健全なポピュリズム」の可能性", "title_en": "Crowning a Healthy Populism", "summary_ja": "筆者は、ハンガリーやアルバニアなど中東欧での最近の政治的動員は、MAGAが掲げる攻撃的な民族ナショナリズムとは異なる、より複雑なポピュリズムの形態を示していると主張する。21世紀の政治を専制的な民族ナショナリズムの反動として捉える通説に異議を唱え、郷愁や民衆の反乱が民主主義擁護の原動力にもなり得ると論じている。こうした動きは、新たな健全なポピュリズムの政治モデルとなる可能性を示唆している。", "summary_en": "The author argues that recent political mobilizations in Hungary, Albania, and Central and Eastern Europe represent a more nuanced form of populism distinct from the aggressive ethnonationalism of MAGA. While conventional wisdom frames 21st-century politics as an autocratic ethnonationalist backlash against liberal democracy, the author contends that nostalgia and popular revolt can also fuel pro-democracy resistance movements. These developments suggest a potential model for a healthier, alternative form of populist politics.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/hungary-albania-rejecting-maga-international-by-harold-james-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "元スーパー従業員が告発：食品廃棄の裏に潜む低賃金労働の実態", "title_en": "Opinion: A Former Supermarket Worker Exposes the Shocking Scale of Grocery Store Food Waste", "summary_ja": "元スーパーマーケットのレジ係アン・ラーソンは、食料品店が「棚を豊かに見せる」ために意図的に食品を過剰陳列し、毎日大量の食べられる食品を廃棄していると主張する。彼女はこの浪費的なビジネスモデルが、食品を扱う労働者への低賃金と密接に関連していると指摘し、クローガーの従業員の約4分の3が食費にも事欠く状況にあると報告している。ラーソンは、企業が生活賃金の支払いを義務付けられれば、食品廃棄を正当化するビジネスモデル自体を見直さざるを得なくなると訴えている。", "summary_en": "Ann Larson, a former supermarket cashier, argues that grocery stores deliberately overstock shelves and rotisserie cases to create an appearance of abundance, resulting in massive daily food waste. She contends this wasteful business model is directly linked to poverty-level wages paid to retail and food industry workers, many of whom struggle to afford the very food they handle. Larson calls for connecting labor conditions to food waste, arguing that forcing employers to pay living wages would compel them to rethink practices that discard edible food while their own employees go hungry.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/26/rotisserie-chickens-in-the-trash-i-worked-in-a-supermarket-and-saw-shocking-food-waste-every-day", "state_media": false, "category": "オピニオン"}, {"title_ja": "カールソンとグリーンはなぜ共和党を離党したのか：「アメリカ・ファースト」対MAGAの断層", "title_en": "Why Carlson and Greene Left the GOP: 'America First' vs MAGA Explained", "summary_ja": "歴史家のジェフリー・カバサービスは、タッカー・カールソンとマージョリー・テイラー・グリーンの共和党離党が、「アメリカ・ファースト」孤立主義とトランプのMAGA運動という二つのイデオロギーの深い亀裂を反映していると論じる。両派はポピュリスト的ナショナリズムを共有しつつも外交政策で鋭く対立しており、カールソンらはイランへの軍事行動を反介入主義の裏切りと見なす一方、MAGAは真の孤立主義ではなく帝国主義的ノスタルジアに根ざしているとカバサービスは指摘する。この亀裂は中間選挙以降の共和党の選挙戦略に深刻な打撃を与えかねないと警告している。", "summary_en": "Historian Geoffrey Kabaservice argues that Tucker Carlson and Marjorie Taylor Greene's departure from the Republican Party reflects a deep ideological split between 'America First' isolationists and Trump's MAGA movement. While both factions share populist nationalism, they diverge sharply on foreign policy: Carlson and Greene oppose Trump's war with Iran as a betrayal of anti-interventionist principles, while Trump's MAGA worldview is rooted in imperial nostalgia rather than true isolationism. Kabaservice contends this rift could meaningfully damage Republican electoral prospects in the midterms and beyond.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/26/tucker-carlson-marjorie-taylor-greene-republican-split", "state_media": false, "category": "オピニオン"}, {"title_ja": "意見：右派の文化戦争がMLBに波及――ジャイアンツのプライドナイト論争をめぐって", "title_en": "Opinion: The Right's Culture Wars Come to MLB Over Giants' Pride Night Controversy", "summary_ja": "スポーツジャーナリストのハワード・ブライアント氏は、トランプ政権の司法省がサンフランシスコ・ジャイアンツのプライドナイト論争に介入したのは、キリスト教的価値観の擁護を口実にした文化戦争戦略の一環だと主張する。ブライアント氏はジャイアンツの経営陣、特にバスター・ポージーと球団オーナーのチャールズ・ジョンソンが、チームの歴史的なLGBTQ+コミュニティとの絆を臆病にも裏切ったと批判する。また今回の騒動を、国防総省の多様性攻撃や司法省による政敵への嫌がらせと並ぶ、白人キリスト教徒男性の覇権回復を目指す組織的な動きの一部として位置づけている。", "summary_en": "Sports journalist Howard Bryant argues that the Trump administration's DOJ intervention in the San Francisco Giants' Pride Night controversy is part of a broader culture war strategy, using Christian players' protests against rainbow caps as a pretext for ideological combat. Bryant contends the Giants' leadership, particularly Buster Posey and owner Charles Johnson, cowardly betrayed the team's historic connection to San Francisco's LGBTQ+ community rather than standing firm. He frames the episode alongside Hegseth's attacks on military diversity and DOJ harassment of political opponents as a coordinated effort to assert white, Christian, heterosexual male dominance.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/sport/2026/jun/26/san-francisco-giants-pride-night-mlb-culture-wars", "state_media": false, "category": "オピニオン"}, {"title_ja": "アフリカのドローン戦争で勝っているのは誰か？", "title_en": "Who Is Winning Africa's Drone Wars?", "summary_ja": "筆者は、アフリカ各地の非国家武装勢力が安価な手製ドローンを国家軍よりも効果的に運用するようになり、政府が享受してきた制空権が揺らいでいると論じる。マリ、リビア、エチオピアの紛争を例に挙げ、外国から供与されたドローン技術への依存ではもはや反乱勢力に対抗できないと指摘する。そのうえで、アフリカ諸国政府が優位を取り戻すには、自国でドローンを開発し、不正規戦に対応した軍組織を構築する必要があると結論づけている。", "summary_en": "The author argues that armed nonstate actors across Africa are now deploying cheap, improvised drones more effectively than state militaries, eroding the air dominance that governments once enjoyed. Drawing on conflicts in Mali, Libya, and Ethiopia, the piece contends that African states can no longer rely on foreign-supplied drone technology to defeat insurgencies. The author concludes that governments must develop indigenous drone capabilities and restructure their militaries for irregular warfare to regain the advantage.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/somalia/who-winning-africas-drone-wars", "state_media": false, "category": "オピニオン"}, {"title_ja": "「イランは戦争に勝っていない」――米国・イスラエルの軍事作戦の戦略的成果を擁護する", "title_en": "Iran Didn't Win the War: A Defense of the US-Israel Campaign's Strategic Outcome", "summary_ja": "筆者は、政権転覆といった最大目標の達成には失敗したものの、米国・イスラエルによる対イラン軍事作戦はイランのプロキシネットワークを壊滅させ、通常戦力と核関連施設を大幅に弱体化させたと主張する。戦略的な見誤りや不完全な作戦遂行を認めつつも、約3年間にわたる地域紛争の累積効果により、米国はイランの核野心と地域覇権を交渉で抑制できる有利な立場にあると論じる。停戦覚書は曖昧な点を残すが、軍事・経済的な圧力を背景とした直接外交への扉を開くものだと評価している。", "summary_en": "The author argues that despite failing to achieve maximalist goals like regime change, the US-Israel military campaign against Iran has left Tehran significantly weakened, with its proxy network dismantled, conventional forces decimated, and nuclear program constrained. While acknowledging strategic miscalculations and imperfect execution, the author contends that the cumulative three-year regional conflict has positioned the United States favorably to negotiate lasting limits on Iranian nuclear ambitions and regional influence. The ceasefire memorandum, though vague, opens a door to direct diplomacy backed by credible military and economic leverage.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/iran/iran-didnt-win-war", "state_media": false, "category": "オピニオン"}, {"title_ja": "新首相、同じ問題：ブレグジットのツケがついに英国に到来", "title_en": "New PM, Same Problem: Brexit's Bill Finally Arrives for Britain", "summary_ja": "筆者は、スターマー労働党政権の支持率急落とその辞任表明は戦術的失敗ではなく、2016年のEU離脱がもたらした経済的な「先送り」のツケが今まさに到来していることが本質的原因だと論じる。トランプ政権の関税攻勢により残された緩衝材も失われ、英国はEUが持つ規模の経済を欠いたまま世界的な経済ショックにさらされている。著者は、英国の軍事力とEUの市場アクセスを交換する形での大型協定が唯一の現実的活路であり、必要なのは政治的意志だと主張する。", "summary_en": "The author argues that Labour's political collapse under Keir Starmer—who announced his resignation after trailing Nigel Farage's Reform UK by nearly ten points—stems not from tactical errors but from Brexit's long-deferred economic consequences finally coming due. With Trump's tariff policies eliminating remaining buffers, Britain lacks the internal market scale to absorb global shocks that EU membership once cushioned. The author contends that closer partnership with the EU, leveraging Britain's military power in exchange for market access, is both the economic necessity and the political lifeline Labour's successor must pursue.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-kingdom/new-prime-minister-same-problem", "state_media": false, "category": "オピニオン"}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  const sb=document.getElementById("d-state");
  sb.style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-27 10:02 JST";
renderTabs();renderList();
