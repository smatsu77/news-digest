e than any other. Disproportionately people of color and immigrants, employees who work on farms and ranches and transport goods earn low wages and have high rates of food insecurity. Retail workers are also shamefully underpaid. A 2022 report by the Economic Roundtable showed that about three-quarters of workers at Kroger, the second-largest grocery company, struggled to keep food on the table. Things have not improved in recent years. Since 2024, grocery worker wages have fallen fifteen percent when adjusted for inflation.\nOn the job, signs of employee hunger were hard to miss. One colleague told me that, at her previous job, she had marked down the price of some nearly expired ground beef that was about to be thrown in the trash. She had wanted to take the meat home to her family. But when managers found out what she did, they fired her. Another coworker admitted to spending her days off at the plasma clinic to earn money for groceries.\nIt’s time that we make the connection between labor conditions in the retail industry and food waste in stores. Companies that don’t pay a living wage can use the money they save to over-stock shelves. This appearance of abundance disguises the troubling reality that lush displays are purchased at the cost of workers’ insecurity. If employers were forced to raise pay and improve conditions, they would have to rethink a business model that justifies food waste. I haven’t worked in a store for years. But every time I shop for groceries, I can’t help but think of the work", "translation_ja": "ほとんどのスーパーマーケットの買い物客にとって、ロティサリーチキンは食欲をそそる手軽な夕食の選択肢に映る。しかし私がスーパーのロティサリーケースの前を通るたびに思い浮かぶのは、ゴミ箱に積み上げられたチキンの死骸、かつて輝いていた肉汁がねっとりしたゼリー状に固まっていく光景だ。\n\nすべては私がチェーンスーパーのレジ係として働いていたときに始まった。ある日、買い物客には見えない舞台裏の秘密について同僚と話していると、デリ部門の従業員がこう言った。「昨夜、16羽ほど捨てましたよ」。彼が説明するには、マネージャーたちはロティサリーチキンのケースを常に満杯にしておきたがっているという。満杯のケースは食欲をそそるが、半分空のケースは寂しく見えるからだ。ケースを満杯に保つことは一日中続く作業だった。従業員たちは夜明け前に出勤し、何十羽もの鳥に味付けをして焼いた。（ある従業員はオーブンにチキンを入れる際に腕をやけどし、まもなく辞めてしまった。）\n\n味付けと焼き作業は一日中続いた。ケースからチキンがなくなるたびに、従業員が補充した。そして閉店時間になると、残ったチキンはすべてゴミ箱へ捨てられた。\n\n会話に加わったパン売り場の従業員は、毎晩1〜2台分のカートに積まれた焼きたてのパンが捨てられることへの苛立ちを語った。なぜ売れる量以上のパンを作るのかと尋ねると、「棚を満杯に見せるためですよ！」と彼は言った。ロティサリーチキンと同じ戦略が、店全体に適用されていたのだ。\n\nレジの仕事を辞めた後、私はスーパーマーケット業界について調査し、自分の仕事をテーマにした本を書いた。私の店が例外ではないことがわかった。米国では、消費を目的として生産された食品の最大40パーセントが食べられずに終わる。これが、食品が埋め立てゴミの最大の要因となり、温室効果ガス排出量の最大10パーセントを占める理由の一つだ。\n\n食品ロスはサプライチェーン全体で発生する。農場での不適切な取り扱いから、輸送・保管中にげっ歯類や昆虫に触れる場合まで様々だ。しかし米農務省（USDA）のある調査によれば、スーパーマーケットは主要な原因の一つだ。毎年、廃棄物の約31パーセント——1330億ポンド——が、食品が店舗に届いた後に発生している。その理由の一つは、まさに私が仕事で目撃したことだ。店舗は過剰に仕入れ、売れ残りをすべて捨てる。\n\n買い物客はへこんだ箱や傷のある農産物を嫌うため、廃棄物には食べられるが見た目が悪い食品も多く含まれる。私の店の青果部門の同僚は廃棄の実態にひどく心を痛め、記録を始めた。彼女は箱入りのサラダ菜で山盛りになった大型のショッピングカートの写真を送ってくれた。別のカートには何十個もの生ベリーの容器が入っていた。「毎日1〜2台分を捨てています」と彼女は言った。賞味期限の約2日前に食品を廃棄するのがポリシーだと説明してくれた。\n\n私は、なぜ店が売れ残った食品を寄付しないのか疑問に思った。フードバンクなら喜んで受け取るはずだ。しかし調査してみると、寄付するには商品を店外に搬出するための新たなサプライチェーンが必要となり、多大なコストがかかることがわかった。実際のところ、食品を捨てる方が、与えるよりも費用がかからないことが多いのだ。小売企業は人々を食べさせるためではなく、金を稼ぐために存在している。\n\nスーパーマーケットにおける食品廃棄は、コロナ禍よりも多くのアメリカ人が今日飢えており、私たちの70パーセントが基本的なニーズを満たすことに苦労しているという現実を考えると、特に衝撃的だ。賃金が低く物価が高い中では、食料棚を満たし続けることは不可能だ。\n\n食品廃棄は、より広い経済的潮流とも結びついている。食品産業は他のどの産業よりも多くの人を雇用している。農場や牧場で働き物資を輸送する従業員は、不釣り合いなほど有色人種や移民が多く、低賃金で食料不安の割合が高い。小売労働者もまた、恥ずかしいほど低賃金だ。エコノミック・ラウンドテーブルの2022年の報告書によると、米国第2位の食料品会社クローガーの従業員の約4分の3が、食料を十分に確保することに苦労していた。近年、状況は改善されていない。2024年以降、インフレ調整後の食料品労働者の賃金は15パーセント低下している。\n\n職場では、従業員が食料に困っているサインを見逃すことは難しかった。ある同僚は、以前の職場で、廃棄される直前のほぼ期限切れの牛ひき肉の値段を下げたと教えてくれた。その肉を家族のために持ち帰りたかったのだ。しかしマネージャーが知ると、彼女はクビになった。別の同僚は、食料代を稼ぐために休日を血漿クリニックで過ごしていると打ち明けた。\n\n今こそ、小売業界の労働条件と店舗での食品廃棄の関連性を結びつけて考えるべき時だ。生活賃金を払わない企業は、節約した資金を使って棚を過剰に在庫することができる。この「豊かさの演出」は、華やかな陳列が労働者の不安定な生活を犠牲にして成り立っているという不都合な現実を覆い隠している。雇用主が賃金を上げ条件を改善することを強制されれば、食品廃棄を正当化するビジネスモデルを見直さざるを得なくなるだろう。私が店で働かなくなって何年も経つ。しかし食料品を買いに行くたびに、あの仕事のことを思わずにはいられない。", "vocab": [{"word": "congealing", "definition": "（液体が）固まる、凝固するという意味。特に冷えて粘度が増し固体状になる過程を指す。"}, {"word": "outlier", "definition": "統計や一般的な集団から著しく外れた例外的な事例や存在を指す。ここでは「典型的でない例外的な店」という意味で使われている。"}, {"word": "overstocking", "definition": "必要以上に在庫を抱えること、過剰仕入れ。小売業で需要を上回る量を陳列・保管することを指す。"}, {"word": "unblemished", "definition": "傷や汚れが全くない、完璧な状態であること。農産物などの外観の欠点がないことを表す際に使われる。"}, {"word": "indefensible", "definition": "正当化できない、弁護の余地がないという意味。道徳的・論理的に擁護しようのない行為や状況を批判する際に用いられる。"}, {"word": "disproportionately", "definition": "釣り合いを超えた割合で、不均衡に。ある集団が全体の割合に比べて過度に影響を受けている状況を表す副詞。"}, {"word": "food insecurity", "definition": "食料不安定性。十分な量・質の食料を安定的に得られない状態を指す社会・政策分野の専門用語。"}]}, {"title_ja": "アフリカのドローン戦争で勝っているのは誰か？", "title_en": "Who Is Winning Africa's Drone Wars?", "summary_ja": "筆者は、アフリカ各地の非国家武装勢力が低コストのドローンを国家軍よりも効果的に運用するようになり、各国政府がかつて享有していた航空優勢が崩れつつあると主張する。リビア、エチオピア、マリなどの紛争事例を踏まえ、アフリカ諸国は外国の供給国や旧来の戦略にもはや依存できないと論じる。その代わりに、各国政府は独自のドローン能力を開発し、反乱鎮圧に適した軍事体制を構築しなければならないと訴えている。", "summary_en": "The author argues that armed nonstate actors across Africa are now deploying low-cost drones more effectively than state militaries, eroding the air dominance governments once held. Drawing on conflicts in Libya, Ethiopia, Mali, and beyond, the piece contends that African states can no longer rely on foreign suppliers or outdated strategies to counter insurgents. Instead, governments must develop indigenous drone capabilities and restructure their militaries for irregular warfare.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/somalia/who-winning-africas-drone-wars", "state_media": false, "category": "オピニオン", "full_text": "On June 22, 2025, fiber-optic first-person-view drones operated by the Azawad Liberation Front (FLA), a Tuareg rebel group, slammed into a convoy of Russian Africa Corps and Malian armed forces vehicles in northern Mali. Footage shows the drones striking two trucks, then cuts to fighters posing beside the wreckage. The significance was unmistakable: a little over a year after fiber-optic drones first appeared in Ukraine, a rebel group with scant resources had deployed the cutting-edge technology to humiliate two comparatively superior state actors.\nA decade earlier, the use of armed drones in African airspace looked very different. In 2011, the United States conducted the first drone strike on the continent, targeting senior leaders of the Somali Islamist group al-Shabab. At the time, Washington held a near monopoly in drone capability: only the world’s most advanced militaries had the access and technical expertise to employ the $20 million Predator drone used in the attack. That monopoly has since collapsed. Over the past decade, at least 37 African militaries have acquired drones of varying sophistication and cost.\nDrones have allowed African states’ small, lightly equipped forces to extend their reach across vast territories where state authority is contested. But over the last four years, armed nonstate actors in more than a dozen countries have begun to acquire and experiment with drones of their own, using them to enable ground operations, drop mortars, and conduct suicide attacks. They are now deploying these small uncrewed systems, many of which can be assembled from widely available and inexpensive parts, more effectively than states, who continue to rely on foreign governments for supply. In doing so, they have demonstrated that the gap between less-resourced and better-resourced adversaries has narrowed since the dawn of the drone wars, threatening the air dominance once enjoyed by states across the world.\nAfrican governments cannot hope to regain the military advantage by employing the strategies of a decade ago. Nor can they rely on foreign governments that have other incentives to provide them with the necessary firepower. Instead, they must learn to develop their own drones and integrate them into militaries built specifically for the irregular warfare required to defeat the insurgents that threaten them.\nAIR TRAFFIC CONTROL\nAfrica’s drone race began in Libya and Ethiopia. During its second civil war, which officially lasted from 2014 to 2020, Libya became the world’s most active drone battlefield. The country’s relatively open terrain, along with extensive weapons supply lines from external state actors, turned the war into a testing ground for emerging technology. The Tripoli-based Government of National Accord and the Benghazi-based Libyan National Army exchanged thousands of drone strikes, culminating in the 2020 battle for Tripoli. During the battle, Bayraktar TB2 drones supplied to the GNA by Turkey loitered just beyond the range of the LNA’s Russian-supplied air defenses and provided critical air support to GNA forces as they beat back an LNA attack on the capital. The failure of the LNA offensive ultimately led to the 2020 cease-fire that ended hostilities.\nDrones played an even more consequential role in Ethiopia’s 2020–22 conflict with the rebel Tigray Defense Forces (TDF). By late 2021, a TDF offensive had advanced to within 65 miles of Addis Ababa, the country’s capital and seat of the African Union. Desperate, Ethiopian Prime Minister Abiy Ahmed turned to Iran, Turkey, and the United Arab Emirates for drones, which inflicted heavy casualties, targeted the TDF’s vulnerable communications and supply lines, and turned the imminent collapse of the government into a sweeping defeat for the TDF. As a former Tigrayan officer involved in the offensive later told The Economist, “We could have captured Addis easily . . . . It was those fucking drones . . . . We had no way of shooting them down.”\nThe outcome of the Libyan and Ethiopian conflicts turned on a small number of capable drones, employed alongside capable infantry and mechanized forces. The GNA and the Ethiopian armed forces’ access to superior drone technology allowed them to repel an exposed, invading adversary whose forces were concentrated. Other states took notice.\nWE’RE NOT IN ADDIS ANYMORE\nIn the years since, dozens of countries across Africa, seduced by the idea of affordable access to the air, have acquired long-endurance drones to deal with their adversaries, regardless of whether those adversaries used the same tactics as the LNA or the TDF.\nToday, the most significant threat facing African governments is a different type of insurgency: militant groups expanding their reach across the Sahel, the Lake Chad Basin, and Somalia. After a wave of military coups between 2020 and 2023 led to the expulsion of French, U.S., and UN forces, juntas in Mali, Burkina Faso, and Niger turned to Turkish Bayraktar and Akinci drones to re", "translation_ja": "2025年6月22日、トゥアレグ系反政府勢力「アザワド解放戦線（FLA）」が操作する光ファイバー式一人称視点（FPV）ドローンが、マリ北部でロシア・アフリカ軍団とマリ軍の車列に突撃した。映像には2台のトラックにドローンが命中する場面が映し出され、その後、戦闘員たちが残骸の傍らでポーズを取る様子へと切り替わる。その意義は明白だった。光ファイバー式ドローンがウクライナに初めて登場してからわずか1年余り、乏しい資源しか持たない反政府勢力が最先端技術を駆使し、はるかに優勢な2つの国家主体を屈辱的に打ち破ったのである。\n\n10年前、アフリカの空域における武装ドローンの使用はまったく異なる様相を呈していた。2011年、米国はソマリアのイスラム主義組織アル・シャバブの幹部を標的に、アフリカ大陸で初めてドローン攻撃を実施した。当時、ワシントンはドローン能力においてほぼ独占的地位を占めており、攻撃に使用された2000万ドルのプレデター・ドローンを運用できるのは、世界で最も高度な軍事力を持つ国家に限られていた。しかしその独占は崩れた。過去10年間で、少なくとも37のアフリカの軍が、様々な水準と価格帯のドローンを取得している。\n\nドローンは、アフリカ諸国の小規模で軽装備の部隊が、国家権力の及ばない広大な領域にその存在感を広げることを可能にした。しかし過去4年間で、12カ国以上の武装非国家主体がドローンを独自に取得・実験し始め、地上作戦の支援、迫撃砲の投下、自爆攻撃に活用するようになった。今や彼らは、市販の安価な部品から組み立て可能なこれら小型の無人機システムを、外国政府からの供給に依存し続ける国家よりも効果的に運用している。それによって彼らは、資源の乏しい勢力と豊富な資源を持つ敵対勢力との格差が、ドローン戦争の黎明期以来縮小したことを証明し、かつて世界各地の国家が享受していた航空優勢を脅かしている。\n\nアフリカの各国政府は、10年前の戦略を踏襲することで軍事的優位を取り戻すことはできない。また、必要な火力を提供するうえで別の思惑を持つ外国政府に頼ることもできない。その代わりに、独自のドローン開発を進め、自国を脅かす反乱勢力を打倒するために必要な非正規戦に特化した軍に統合していかなければならない。\n\n【航空管制】\n\nアフリカのドローン競争は、リビアとエチオピアで幕を開けた。2014年から2020年まで公式に続いた第二次内戦において、リビアは世界で最も活発なドローン戦場となった。比較的開けた地形と、外部の国家主体からの大規模な武器供給ルートにより、この戦争は新興技術の実験場と化した。トリポリに拠点を置く国民合意政府（GNA）とベンガジに拠点を置くリビア国民軍（LNA）は数千回ものドローン攻撃を応酬し、2020年のトリポリ攻防戦で頂点を迎えた。この戦闘において、トルコがGNAに供給したバイラクタルTB2ドローンがLNAのロシア製防空網の射程外で旋回し続け、GNA軍がLNAの首都攻撃を撃退する際に不可欠な航空支援を提供した。LNA攻勢の失敗は最終的に、2020年の停戦と敵対行為の終結へとつながった。\n\nドローンはさらに決定的な役割を、エチオピアの2020～22年のティグライ防衛軍（TDF）との紛争で果たした。2021年末までにTDFの攻勢はアフリカ連合の本部所在地であり同国の首都でもあるアディスアベバから65マイル以内に迫っていた。窮地に立たされたエチオピアのアビィ・アハメド首相はイラン、トルコ、アラブ首長国連邦にドローンを求め、それらが甚大な被害をTDFに与え、脆弱な通信路と補給路を標的にして、政府の崩壊寸前の状況をTDFの壊滅的敗北へと逆転させた。後に『エコノミスト』誌に語った攻勢に関与した元ティグライ将校の言葉を借りれば、「我々はアディスを容易に陥落できたはずだ……。あのくそったれドローンのせいだ……。撃墜する手段がなかった」ということだった。\n\nリビアとエチオピアの紛争の帰趨は、有能な歩兵・機甲部隊と組み合わされた少数の高性能ドローンによって決した。GNAとエチオピア軍が優れたドローン技術を利用できたことにより、部隊を集中させて侵攻してきた露出した敵対勢力を撃退することができた。他の国家もこの教訓を注視した。\n\n【もはやアディスではない】\n\nその後の数年間で、「手頃な価格で空へのアクセスを」という考えに魅了されたアフリカの数十カ国が、敵対勢力に対処するために長時間滞空型ドローンを取得した。それらの敵対勢力がLNAやTDFと同じ戦術をとっているかどうかに関わらず、である。\n\n今日、アフリカ各国政府が直面する最も深刻な脅威は、異なるタイプの反乱である。すなわち、サヘル地域、チャド湖盆地、ソマリアに勢力を拡大する武装組織だ。2020年から2023年にかけての軍事クーデターの波によりフランス、米国、国連の部隊が追放された後、マリ、ブルキナファソ、ニジェールの軍事政権はトルコのバイラクタル及びアクンジ・ドローンに頼って再び……", "vocab": [{"word": "fiber-optic", "definition": "光ファイバーを使用した（形容詞）。ここでは光ファイバーケーブルで制御するドローンを指し、電波妨害に強い最先端技術として文脈で使われている。"}, {"word": "monopoly", "definition": "独占・専売（名詞）。特定の国や組織が技術や市場を単独で支配している状態を指し、政治・経済・軍事の文脈でよく使われる上級語彙。"}, {"word": "insurgents", "definition": "反乱者・武装反政府勢力（名詞）。政府や既存の権力に対して武力で抵抗する集団を指す軍事・政治用語で、TOEICや国際ニュースでは重要語彙。"}, {"word": "loitered", "definition": "（ここでは軍事的文脈で）上空に滞留した・旋回し続けた（動詞loiterの過去形）。通常は「うろつく」の意だが、軍事用語では無人機が目標上空を徘徊する戦術を表す。"}, {"word": "mechanized", "definition": "機械化された（形容詞）。軍事文脈では装甲車両や機械化歩兵部隊を指し、近代的な陸上戦力の編成を表す専門用語。"}, {"word": "cessation", "definition": "停止・終止（名詞）。「cessation of hostilities（敵対行為の停止）」のように国際法・外交文書でよく使われる上級語彙で、日常英語ではほとんど用いられない。"}, {"word": "junta", "definition": "軍事政権・フンタ（名詞）。クーデターにより権力を掌握した軍の集団統治体制を指す政治用語で、ラテン語・スペイン語由来の外来語として英語に定着している。"}]}, {"title_ja": "イランは戦争に勝っていない：中東停戦の広い視点からの評価", "title_en": "Iran Didn't Win the War: A Broader View of the Middle East Cease-Fire", "summary_ja": "筆者は、米国とイスラエルによるイランとの停戦合意が批判を受けているにもかかわらず、3年間にわたる地域紛争全体を俯瞰すれば、米国の戦略的立場は大幅に強化され、イランは著しく弱体化したと主張する。イランの代理勢力ネットワークは壊滅し、軍事力は大きく損なわれており、覚書は外交的前進への道を開くものだと筆者は論じる。この戦争は失敗ではなく、イランの地域覇権を封じ込める取り組みの最終段階となりうると結論づけている。", "summary_en": "The author argues that despite criticism of the U.S.-Israel cease-fire deal with Iran, the broader three-year regional conflict has left the United States in a strategically stronger position while significantly weakening Iran. Iran's proxy network is in ruins, its military capabilities are decimated, and the memorandum of understanding opens the door for further diplomatic gains. The author contends that rather than a failure, the war may represent the final step in successfully containing Iran's regional ambitions.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/iran/iran-didnt-win-war", "state_media": false, "category": "オピニオン", "full_text": "Much of Washington has greeted the Iran cease-fire deal with scorn. After more than three months of war, the United States and Israel failed to achieve many of their objectives, which included overthrowing the regime in Tehran and ending a potential Iranian nuclear threat.\nBut when viewed from a broader perspective, the outcome looks different. The almost three-year-long regional conflict that started with Hamas’s attack on Israel in October 2023 and culminated in Operation Epic Fury this spring has put the United States and its partners in a far stronger position in the Middle East and left Iran much weaker. Iran’s proxy network of militant groups is largely in ruins; Syrian President Bashar al-Assad, one of Iran’s key partners, is gone; Tehran has been mostly ignored by its supposed allies in Beijing and Moscow; and Iran’s conventional forces, and much of its defense and nuclear industrial base, have been decimated. Iran’s sole victory from the latest round of conflict has come from its ability to close the Strait of Hormuz and cause economic damage across the world. But closing the strait also harms Iran itself, and the impact of a closure is likely to weaken over time as countries seek alternative suppliers, substitutes for oil, and new shipping routes to avoid the strait.\nThis is not to say that the war was perfectly executed or that it has gone according to plan. But the cumulative effect of three years’ worth of efforts to defang a dangerous and threatening regime in Iran has left the United States in a strong position to solidify its gains. The memorandum of understanding to end the war opens the door to direct U.S.-Iranian talks, which could further stabilize the region. The memorandum’s limits on Iran’s nuclear program are vague for now, but the United States’ ability to wield economic sanctions and credibly threaten more bombing gives it the leverage to achieve permanent limits on Iranian enrichment. Rather than a foreign policy failure, the war could be the final piece of a successful effort to contain Tehran’s regional threats and achieve a long-term cease-fire.\nTHE BIG PICTURE\nThe military campaign that the United States and Israel launched on February 28 cannot be viewed in isolation. In its legal justification for the operation, released on April 21, the Department of State explained: “Epic Fury is only the latest round of an ongoing international armed conflict with Iran.” That conflict began with the 2023 Hamas attack on Israel, and continued across the region in both the Biden and the Trump administrations. It included Israeli ground combat in Gaza and Lebanon; the toppling of Assad; U.S. and European navies fighting air and sea battles with the Houthis in and around the Red Sea; and Iranian air and missile strikes against Israel, the United States, and Gulf Arab partners.\nViewed as a campaign in an ongoing conflict, the most recent round of fighting with Iran was all but inevitable. After the United States and Israel had bombed Fordow and other nuclear sites during the 12-day war in June 2025, the Trump administration called off additional Israeli airstrikes, signaling that Washington sought a comprehensive settlement with Tehran to end the cycle of violence and limit its nuclear program. The administration then held another round of nuclear talks with Iran in February to get Tehran to limit enrichment and to probe if, in doing so, Iran would also moderate its aggressive approach to the region. Although Iran made some concessions—according to leaked reports, Iran agreed to temporarily halt enrichment—American negotiators concluded that Iran was unwilling to abandon its larger nuclear ambitions and thus its quest for regional hegemony.\nThe war destroyed much of Iran’s remaining military capabilities.\nIran’s actions after the 12-day war reinforced the perception that it was insistent on maintaining its regional dominance. Tehran rapidly deployed new long-range ballistic missiles, which the Israelis understood as providing a shield for Iran’s nuclear program. In January, the Iranian regime brutally suppressed a nationwide popular uprising. The Islamic regime thus showed it was not changing, which meant that the United States and Israel were dealing with the same foe that had started the war in 2023 via its proxies and which would inevitably incite more conflict.\nThe only question for Washington was whether it made more sense to strike sooner or later. The Trump administration and Israel decided that it was better to attack while Iran was still relatively weak from the 12-day war and the popular uprising than to wait until it had regained control and rebuilt missile stocks. The problem with the decision to attack on February 28 was not the timing. The problem was with the overly ambitious belief that the administration could achieve a total victory similar to what it had done in Venezuela and with its lack of preparation for obvious countermoves. The administration ignored decades of U.S. mi", "translation_ja": "イランは戦争に勝っていない\n\nワシントンの多くは、イランとの停戦合意を軽蔑をもって迎えた。3か月以上に及ぶ戦争の末、米国とイスラエルはテヘランの政権打倒やイランの核の脅威の終結など、目標の多くを達成できなかった。\n\nしかし、より広い視点から見れば、結果は異なる様相を呈する。2023年10月のハマスによるイスラエル攻撃に始まり、今春の「作戦エピック・フューリー」で頂点に達したほぼ3年間の地域紛争は、米国とその同盟国を中東においてはるかに強い立場に置き、イランを大きく弱体化させた。イランの代理武装勢力のネットワークはほぼ壊滅し、イランの重要なパートナーであったシリアのバッシャール・アル＝アサド大統領は失脚した。テヘランは北京とモスクワという名目上の同盟国にほぼ無視され、イランの通常戦力と防衛・核産業基盤の大部分は壊滅した。最新の紛争でイランが収めた唯一の勝利は、ホルムズ海峡を封鎖して世界経済に打撃を与えられたことである。しかし、海峡の封鎖はイラン自身にも害をもたらし、各国が代替供給源、石油の代替品、海峡を回避する新たな輸送ルートを模索するにつれて、封鎖の影響は時間とともに薄れていく可能性が高い。\n\nこれは、戦争が完璧に遂行されたとか、計画通りに進んだということを意味するわけではない。しかし、危険かつ脅威的なイランの政権を無力化するために3年間積み重ねてきた努力の累積的効果により、米国は得た成果を確固たるものにする強い立場にある。戦争終結のための覚書は、米国とイランの直接交渉への扉を開き、地域のさらなる安定化につながる可能性がある。覚書におけるイランの核プログラムへの制限は現時点では曖昧だが、経済制裁を行使し、さらなる爆撃を信頼性をもって威嚇する米国の能力は、イランのウラン濃縮に永続的な制限を課するための交渉力を与えている。この戦争は外交政策の失敗などではなく、テヘランの地域的脅威を封じ込め、長期的な停戦を実現するための成功した取り組みの最後のピースとなりうる。\n\n大局的な視点\n\n米国とイスラエルが2月28日に開始した軍事作戦は、孤立した出来事として見ることはできない。4月21日に公表された国務省の法的根拠書では、次のように説明されている。「エピック・フューリーは、イランとの継続中の国際武力紛争における最新の局面に過ぎない。」この紛争は2023年のハマスによるイスラエル攻撃に始まり、バイデン政権とトランプ政権の両政権にまたがって地域全体で継続してきた。その内容は、ガザとレバノンにおけるイスラエルの地上作戦、アサドの打倒、紅海とその周辺でのフーシ派との航空・海上戦闘における米国・欧州海軍の関与、そしてイランによるイスラエル、米国、湾岸アラブ諸国に対する航空・ミサイル攻撃などを含む。\n\n一連の紛争における一つの作戦として見るならば、イランとの最新の戦闘はほぼ避けられないものだった。2025年6月の12日間戦争で米国とイスラエルがフォルドゥや他の核施設を爆撃した後、トランプ政権はイスラエルによる追加空爆を取りやめ、ワシントンがテヘランとの包括的和解を求め、暴力の連鎖を断ち切りイランの核プログラムを制限する意向を示した。その後、政権はイランとの核交渉の新たな局面を2月に開き、テヘランにウラン濃縮の制限を求めるとともに、そうすることでイランが地域における攻撃的な姿勢を和らげるか否かを探った。リーク情報によれば、イランは濃縮の一時停止に同意するなど一定の譲歩を示したものの、米国側の交渉担当者はイランがより大きな核野心、ひいては地域覇権の追求を放棄する意志がないと結論づけた。\n\nこの戦争はイランに残存していた軍事力の大部分を破壊した。\n\n12日間戦争後のイランの行動は、地域的優位を維持しようとするその強い意志という認識を強化した。テヘランは新型長距離弾道ミサイルを急速に配備し、イスラエルはこれをイランの核プログラムへの盾を提供するものと受け止めた。1月には、イランの政権が全国規模の民衆蜂起を残忍に鎮圧した。イスラム政権はこうして変化を示さず、つまり米国とイスラエルは2023年に代理勢力を通じて戦争を始めた同じ敵と向き合っており、その敵は必ずやさらなる紛争を引き起こすことを示した。\n\nワシントンにとっての唯一の問いは、早期に攻撃する方が有利か、それとも後に攻撃する方が有利か、という点だった。トランプ政権とイスラエルは、イランが12日間戦争と民衆蜂起からまだ回復しきっていない間に攻撃する方が、支配を取り戻しミサイルを再備蓄するまで待つよりも賢明だと判断した。2月28日の攻撃開始の決断の問題は、そのタイミングにあったのではない。問題は、ベネズエラで達成したような完全勝利が実現できるという過度に野心的な信念と、明らかな対抗手段への備えの欠如にあった。政権は数十年にわたる米軍の教訓を無視した。", "vocab": [{"word": "decimated", "definition": "「壊滅させられた」という意味で、軍事力や組織が大幅に破壊・削減された状態を指す。元来はローマ軍で10人に1人を処刑する罰則を指したが、現代では甚大な損害を意味する。"}, {"word": "hegemony", "definition": "「覇権」を意味し、特定の国家や集団が地域・国際社会において他を支配・主導する優位な力や影響力のこと。政治・外交文脈で頻繁に用いられる上級語彙。"}, {"word": "memorandum of understanding", "definition": "「覚書」を指す法律・外交用語で、当事者間の合意内容を文書化したものだが、正式な条約ほど法的拘束力を持たない場合が多い。略称はMOU。"}, {"word": "enrichment", "definition": "核文脈では「ウラン濃縮」を指し、核兵器や原子炉の燃料に使用するためにウランの同位体比率を高めるプロセスのこと。核不拡散交渉における重要な技術用語。"}, {"word": "credibly", "definition": "「信頼性をもって」「説得力をもって」という意味の副詞。外交・安全保障の文脈では、威嚇や約束が相手に本気と受け取られることを指し、抑止力の議論で頻出する。"}, {"word": "countermoves", "definition": "「対抗手段」「反撃策」を意味し、相手の行動に対して取られる戦略的・戦術的な反応のこと。軍事・政治・チェスなどの文脈で使われる複合名詞。"}, {"word": "proxy network", "definition": "「代理勢力のネットワーク」を指す表現で、ある国家が直接介入せずに影響力を行使するために支援・活用する武装集団や組織の総体を意味する。中東政治の文脈で頻出する専門的表現。"}]}, {"title_ja": "New Prime Minister, Same Problem", "title_en": "New Prime Minister, Same Problem", "summary_ja": "Why the consequences of Brexit can no longer be avoided.", "summary_en": "Why the consequences of Brexit can no longer be avoided.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-kingdom/new-prime-minister-same-problem", "state_media": false, "category": "オピニオン", "full_text": "When British Prime Minister Keir Starmer led the Labour Party to a landslide victory in July 2024, he hailed the result as the end of 14 years of misrule by the Conservative Party and the beginning of a long period of stable, technocratic government. Starmer, the cautious former director of public prosecutions, drew a deliberate contrast to Conservative Prime Minister Boris Johnson’s illegal parties during the COVID-19 lockdown and the financial meltdown triggered by Johnson’s successor, Liz Truss, by promising a return to seriousness, and his chancellor of the Exchequer, Rachel Reeves, vowed to pair fiscal responsibility with a more active state. The exhausted electorate gave Labour a modest 33.7 percent of the vote, which translated to 411 out of 650 seats in the House of Commons because of the way votes were distributed. It was no ringing endorsement—immediately dubbed a “loveless landslide”—but it was more than enough to earn Starmer the benefit of the doubt.\nAlmost two years later, voters’ doubt has hardened into something closer to contempt. Labour has been trailing Nigel Farage’s insurgent Reform UK party in most national polls by almost ten points, a sharp contrast to the 2024 election, when Reform’s share of the vote was nearly 20 points below Labour’s. On June 22, his position no longer tenable, Starmer bowed to the inevitable and announced that he will step down as soon as Labour chooses his successor. His all but inevitable successor is Andy Burnham, the popular former mayor of Greater Manchester who joined Parliament after winning a by-election in Makerfield on June 18 with nearly 55 percent of the vote.\nMost explanations for Labour’s troubles focus on tactical errors: Starmer’s communication failures, Reeves’ overly strict fiscal rules, a cut in 2024 to pensioners’ winter fuel payments, and a tax on family farms imposed in 2025. All are real, but they are symptoms, not causes. The deeper story is that Brexit, the defining political event of modern British history, is finally presenting its bill, and Labour happens to be in office as it arrives. For a decade, the United Kingdom managed to defer a full reckoning with its vote to leave the European Union in June 2016. Starmer’s strategy depended on neutralizing Brexit as a live political issue, defusing it so that it could neither rally his opponents nor split his own coalition. This meant ruling out a customs union or membership in the single market and dressing up modest regulatory cooperation with the EU as the limit of his ambition.\nElectorally, that strategy worked. It cost nothing in the short term, and in the comparatively forgiving conditions of 2024, the British economy could underperform its peers but avoid an acute crisis. That environment no longer exists. U.S. President Donald Trump’s return to the White House, his weaponization of tariffs, and the breakdown of the rules-based trading order have exposed a British economy with no shock absorbers left. The EU, for all its dysfunctions, has a huge internal market and the scale to negotiate with the great powers as more than a supplicant. The United Kingdom does not.\nThe best way now for the United Kingdom to weather the global storm—and the best way for Labour to keep its coalition from falling apart—is to pursue closer partnership with the EU. There is reason to think a grand bargain is possible. The British economy needs access to European markets, and Europe needs Britain’s military power. What is needed is a final, elusive ingredient: political will.\nWHAT HAS GONE\nTo understand why the United Kingdom is suffering more than its continental neighbors from recent economic shocks, it helps to recall what EU membership provided. The single market gave British firms barrier-free access to 450 million consumers and made the United Kingdom a magnet for foreign investment seeking a foothold in Europe. The customs union spared British exports the rules-of-origin checks, sanitary inspections, and paperwork that now burden shipments across the English Channel. Rules that allowed EU firms to operate anywhere in the bloc—a privilege known as passporting—made the City of London the continent’s de facto financial center, and coordinated regulation gave the United Kingdom a seat at the table when European standards were written. None of this required the United Kingdom to give up its currency, central bank, fiscal policy, or army. The opt-outs British Prime Minister John Major negotiated at Maastricht in the early 1990s gave the country most of the upside of integration with little of the supranational constraint. This was a deal the rest of Europe tolerated because the United Kingdom brought military weight, financial expertise, and a counterweight to Franco-German dominance.\nThe decision to leave that arrangement was, as Mark Blyth and I argued in Foreign Affairs two years ago, a colossal economic own goal. The introduction of nontariff barriers raised the cost of trading with Europe by an amount ", "translation_ja": "", "vocab": []}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-27 15:11 JST";
renderTabs();renderList();
</script>
