k on Cargo Ship", "summary_ja": "米国は、地域内の貨物船への攻撃を受け、イランに関連する標的への攻撃を実施した。イランは関与を否定し、米国が両国間の合意に違反したと非難した。テヘランは、米国の行動への報復として、米軍に関連する標的への攻撃を行ったと表明した。", "summary_en": "The United States carried out strikes against Iran following an attack on a cargo ship in the region. Iran denied responsibility and accused the US of violating an existing agreement between the two countries. Tehran stated it launched retaliatory strikes against targets linked to American forces in response to the US action.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/ckg590wqxwpo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ローマでイタリアの象徴ベスパ誕生80周年を祝う大規模イベント", "title_en": "Rome Celebrates 80 Years of Italy's Iconic Vespa Scooter", "summary_ja": "数千人のベスパライダーがローマの街頭に集結し、イタリアを代表するスクーター「ベスパ」の誕生80周年を祝った。「スズメバチ」を意味するベスパは、第二次世界大戦後のイタリア復興の象徴として広く親しまれてきた。記念イベントでは、ライダーたちが首都ローマの街を一斉に走り抜けるパレードが行われた。", "summary_en": "Thousands of Vespa riders gathered in Rome to celebrate the 80th anniversary of the iconic Italian scooter. The Vespa, whose name means 'wasp' in Italian, became a powerful symbol of Italy's postwar reconstruction and cultural identity. The milestone was marked with a mass ride through the streets of the Italian capital.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/rome-celebrates-80-years-of-italy-s-iconic-vespa-scooter/a-77735061?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国、AnthropicのAIモデル「Mythos 5」の限定公開を承認", "title_en": "US Grants Limited Access to Anthropic's Mythos 5 AI Model", "summary_ja": "米国政府は、AnthropicのAIモデル「Mythos 5」の限定的な公開を承認し、一部の米国企業のみにアクセスを制限することを決定した。どの企業が選定されるかの基準は、現時点では明らかにされていない。この措置は、高度なAI技術の流通を管理しようとする米国の取り組みを反映している。", "summary_en": "The United States government has approved a partial release of Anthropic's Mythos 5 AI model, restricting access to a select group of American companies. The criteria for selecting which firms will gain access has not yet been made public. The move reflects ongoing efforts to manage the distribution of advanced AI technologies within the US.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/us-allows-partial-release-of-anthropic-s-mythos-ai-model/a-77732252?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "欧州熱波でドイツが猛暑に見舞われ、政治改革をめぐり意見対立", "title_en": "Germany Swelters in European Heatwave as Political Reforms Spark Debate", "summary_ja": "欧州全土を襲う熱波の影響で、ドイツでは記録的な高温が続いており、土曜日にはさらなる記録更新が見込まれている。一方、国内では政治改革をめぐって政治家間の対立が深まり、政策の方向性について激しい議論が交わされている。また、ドイツの産業界は国営鉄道会社ドイツ鉄道（DB）を名指しし、数十億ユーロに上る経済損失の責任を追及している。", "summary_en": "Germany is experiencing record-breaking temperatures as a major European heatwave intensifies, with new heat records expected on Saturday. Political divisions have deepened over proposed reforms, with lawmakers clashing over the direction of policy changes. Meanwhile, German industry is pointing the finger at national rail operator Deutsche Bahn, holding it responsible for billions of euros in economic losses.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-news-heat-soars-as-political-reforms-split-opinion/live-77733670?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "エボラ封じ込めに命を懸けるボランティア、コンゴで地域の反発にも直面", "title_en": "Volunteers Risk Lives and Community Anger to Stop Congo's Deadly Ebola Outbreak", "summary_ja": "コンゴの最前線で安全な埋葬作業を行うボランティアたちは、過去最悪となる恐れがあるエボラ出血熱の流行を封じ込めるうえで不可欠な存在だ。彼らは感染リスクにさらされるだけでなく、支援しようとしている地域住民からの怒りや恐怖にも直面している。こうした危険で時に歓迎されない活動が、感染拡大を防ぐための数少ない重要な手段となっている。", "summary_en": "Congolese frontline workers conducting safe burials are critical to containing what experts warn could become the worst Ebola outbreak in history. These volunteers face not only the constant risk of infection but also hostility and fear from the very communities they are trying to protect. Their dangerous and often unwelcome work remains one of the few key tools available to halt the disease's spread.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/27/world/africa/ebola-outbreak-congo-volunteers-burials-backlash.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ連続地震で900人超死亡、救助隊が生存者捜索に全力", "title_en": "Rescuers Race to Find Survivors After Twin Earthquakes Kill Over 900 in Venezuela", "summary_ja": "ベネズエラ北部を襲った2度の地震により、900人以上が死亡し、多くの人々が瓦礫の下に取り残された。土曜日には国際救助チームが現地の捜索活動に加わり、生存者発見のための重要な時間との戦いが続いている。被災地では大規模な緊急救援活動が展開されている。", "summary_en": "Twin earthquakes struck northern Venezuela, killing more than 900 people and leaving many others trapped under rubble. International rescue teams joined local efforts on Saturday as the critical window for finding survivors alive continued to narrow. The disaster has prompted a large-scale emergency response across the affected region.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/27/world/venezuela-earthquake", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "メキシコ当局者がトランプ政権の情報提供者に、シェインバウム大統領は反発", "title_en": "Mexican Officials Turn Informants for Trump Administration Amid Tensions with Sheinbaum", "summary_ja": "クラウディア・シェインバウム・メキシコ大統領がメキシコ人政治家への米国の調査に抵抗する中、一部のメキシコ人政治家がトランプ政権に協力する情報提供者となっていることが明らかになった。この動きはメキシコ国内の政治的亀裂を浮き彫りにし、ワシントンからの圧力にどう対応するかをめぐって意見が分かれていることを示している。この状況はメキシコの主権と米国の影響力の範囲について重大な疑問を投げかけている。", "summary_en": "Some Mexican politicians are now cooperating with U.S. investigators as informants for the Trump administration, despite President Claudia Sheinbaum's efforts to push back against American investigations into Mexican officials. The development signals a growing rift within Mexico's political landscape over how to handle pressure from Washington. The trend raises significant questions about sovereignty and the extent of U.S. influence over Mexican domestic politics.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/27/world/americas/mexican-officials-us-informants.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ガザ北部へ徒歩で帰還するパレスチナ人、人質交渉の膠着打開で実現", "title_en": "Palestinians Stream Back to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルはガザを二分する軍事地帯を越えて、避難していたパレスチナ人が北部へ帰還することを許可した。この措置は、人質解放をめぐる交渉の膠着状態が打開されたことを受けて実現した。多数のガザ市民が徒歩でその軍事回廊を通過した。", "summary_en": "Israel permitted displaced Palestinians to cross a military zone dividing Gaza, allowing them to return to the northern part of the enclave. The move came after a deadlock over hostage releases was resolved. Large numbers of Gazans made the journey on foot through the military corridor.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss Amid Deepening Property Crisis", "summary_ja": "中国の大手不動産デベロッパーである万科（Vanke）が多大な損失を計上し、同国の不動産危機が一段と深刻化していることが浮き彫りになった。この事態は、不動産セクターの低迷が中国経済全体にどこまで波及するかについて、新たな懸念を呼び起こしている。中国政府が事態の安定化に向けて介入するかどうかが、今後の焦点となっている。", "summary_en": "Leading Chinese property developer Vanke has reported a significant financial loss, signaling that the country's real estate crisis continues to worsen. The troubled developer's situation raises fresh concerns about how far the property sector downturn may spread across China's broader economy. Observers are now questioning whether the Chinese government will intervene to stabilize the situation.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の弾片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still Embedded From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による弾片が依然として残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性は長期間単独で拘束され、8か月間地下トンネルに閉じ込められていたという。この事実は、人質たちが受けた深刻な身体的・精神的被害を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent eight months confined in underground tunnels. The findings highlight the severe physical and psychological toll endured by those held captive.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カーボベルデのW杯躍進、英国在住の移民コミュニティに喜びと誇り", "title_en": "Cape Verde's World Cup Run Delights UK Diaspora Community", "summary_ja": "カーボベルデ代表がワールドカップでスペインやウルグアイと引き分けるなど健闘を見せ、英国在住のカーボベルデ系移民コミュニティに大きな誇りをもたらしている。13歳のローリンさんは「世界中で自分たちの国が注目されることが信じられないほど誇らしい」と語った。今大会を通じて、これまで地図上でも見つけにくかったこの小さな島国が、初めて世界の舞台で脚光を浴びている。", "summary_en": "Cape Verde's strong performance at the World Cup, including hard-fought draws against Spain and Uruguay, has brought immense pride to the Cape Verdean diaspora in the UK. Community members, including 13-year-old Lauryn, say the tournament has put the tiny African island nation on the global map in a way they have never seen before. The team's displays of talent and skill have sparked widespread conversations about Cape Verde around the world.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/26/cape-verde-world-cup-run-delights-diaspora-community-uk", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コンゴ民主共和国でエボラ感染者約300人の行方不明、大規模な市中感染を懸念", "title_en": "Nearly 300 Ebola patients unaccounted for in DR Congo amid fears of mass community spread", "summary_ja": "コンゴ民主共和国でエボラ出血熱の陽性反応が出た約300人の行方が分からなくなっており、広範な市中感染への懸念が高まっている。アフリカCDCのジャン・カセヤ事務局長は、紛争地帯のキャンプで100万人以上が生活しており、医療従事者がアクセスできない状況にあると警告した。モデリング予測によれば、今年9月までにDRCで数千人規模の死者が出る可能性があるという。", "summary_en": "Almost 300 people who tested positive for Ebola in the Democratic Republic of Congo have gone missing, raising fears of widespread community transmission. The Africa CDC director general warned that over one million people are living in conflict-zone camps where health workers cannot gain access. Modelling suggests the outbreak could claim thousands of lives in the DRC by September.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ソマリア人女性、SNSで政府批判し3年の禁固刑――元大統領らも非難", "title_en": "Somali Woman Jailed 3 Years for Criticizing Government on Social Media", "summary_ja": "ソマリアの27歳の看護学卒業生サディア・モアリム・アリ氏は、SNSへの投稿で政府機関を侮辱したとして6月25日に禁固3年の判決を受けた。この判決は元大統領や元首相、人権団体から「根本的に不当」と即座に非難された。事件はソマリア国内外で大きな怒りと注目を集めている。", "summary_en": "Sadia Moalim Ali, a 27-year-old nursing graduate and rickshaw driver in Somalia, was sentenced to three years in prison on June 25 for insulting government institutions in social media posts. The verdict was immediately condemned as 'fundamentally unjust' by former presidents, prime ministers, and human rights organizations. The case has sparked widespread public outrage both within Somalia and internationally.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/26/woman-sadia-moalim-ali-three-year-jail-sentence-somalia-online-comments-governement", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大学生の学力、小学生並みの水準に低下か", "title_en": "College Students Performing at Elementary School Level, Studies Show", "summary_ja": "新たな調査により、大学・短大生の学力が一般的に考えられているよりも大幅に低下していることが明らかになった。一部の高等教育在学生が10歳児相当の学力しか示していないという結果が、教育水準に対する深刻な懸念を呼んでいる。この調査結果は、高等教育への進学率と実際の学力達成度の間に憂慮すべき乖離があることを示唆している。", "summary_en": "A new report reveals that academic performance among college and university students is significantly worse than commonly assumed. Some higher education students are testing at levels equivalent to ten-year-olds, raising serious concerns about educational standards. The findings suggest a troubling gap between enrollment in higher education and actual academic achievement.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "権威主義国家が台頭する新たな紛争調停勢力", "title_en": "Autocracies Are Becoming the World's New Conflict Mediators", "summary_ja": "かつて西側民主主義国が担っていた国際紛争の調停役として、権威主義的な体制の国々が存在感を増している。これらの国々が仲介する和平合意は、民主主義国が関与したものとは構造や内容が大きく異なる傾向がある。こうした変化は、締結される合意の長期的な持続性と公正性に対して深刻な疑問を投げかけている。", "summary_en": "Authoritarian regimes are increasingly stepping into the role of international peacemakers, traditionally held by Western democracies. The deals brokered by these autocracies tend to look markedly different in structure and outcome from those negotiated by liberal democracies. This shift raises serious questions about the long-term durability and fairness of the agreements being reached.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アジアの同盟国、トランプ氏との緊密関係を余儀なくされる", "title_en": "Asian Allies Have No Choice but to Embrace Trump", "summary_ja": "日本をはじめとするアジア諸国は、中国の脅威に対抗するため独自の「中堅国連合」を形成する可能性は低いと分析されている。トランプ氏の予測不可能な外交姿勢に懸念を抱きつつも、中国を抑止できるのは米国のみという現実がアジア各国の判断を左右している。その結果、たとえ困難なトランプ政権下であっても、アジアの同盟国は対米関係を最優先に維持する見通しだ。", "summary_en": "Japan and other Asian nations are unlikely to form independent middle-power coalitions to counter China's growing influence. Despite misgivings about Donald Trump's unpredictability, these countries recognize that only the United States possesses the military and strategic weight needed to deter Beijing. As a result, Asian allies are expected to maintain close ties with Washington even under a difficult Trump administration.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "留まるか去るか：スロビャンスクとクラマトルスクの市民たちの選択", "title_en": "Life on Hold: Residents of Sloviansk and Kramatorsk Choose to Stay or Flee", "summary_ja": "ロシア軍が約80%を占領するウクライナ東部ドンバス地方で、スロビャンスクとクラマトルスクの両市はウクライナ防衛体制の要となっている。住民たちは安全な地域へ避難するか、前線近くに留まり生き延びるかという過酷な選択を迫られている。本稿はドンバスの消耗戦をテーマにしたシリーズ第2弾として、残留を選んだ市民たちの日常を伝える。", "summary_en": "In the Donbas region of eastern Ukraine, where Russian forces occupy roughly 80% of the territory, the cities of Sloviansk and Kramatorsk have become key pillars of Ukraine's defensive line. Residents face an agonizing choice: evacuate to safer parts of the country or remain and endure the hardships of life near the front. This report, the second in a series on the war of attrition in Donbas, documents the daily realities of those who stay behind.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/27/in-ukraine-those-who-leave-and-those-who-stay-life-on-hold-in-sloviansk-and-kramatorsk_6754929_4.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "デンベレがハットトリック、フランスがノルウェーに4-1で快勝―2026年W杯", "title_en": "Dembélé Delivers Hat Trick as France Routs Norway 4-1 at 2026 World Cup", "summary_ja": "ウスマン・デンベレは2026年ワールドカップのフランス対ノルウェー戦でハットトリックを達成し、マン・オブ・ザ・マッチに選ばれた。フランスは4-1で快勝し、デンベレは長らく待ち望まれていたフランス代表での本格的なブレイクスルーをついに果たした。この活躍により、これまでの批判を封じ込め、トーナメントでの存在感を示した。", "summary_en": "Ousmane Dembélé scored a hat trick and was named man of the match as France defeated Norway 4-1 on Friday at the 2026 World Cup. The performance marks a long-awaited breakthrough for Dembélé with the French national team, effectively silencing his critics. The result places France in a strong position as the tournament progresses.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/sports/article/2026/06/27/dembele-shines-at-world-cup-silencing-critics_6754927_9.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ワグネルの後継「アフリカ軍団」、マリ安定化に苦戦―発足1年", "title_en": "One Year On, Russia's Africa Corps Struggles to Stabilize Mali", "summary_ja": "ワグネルの後継組織としてマリに展開したロシアの「アフリカ軍団」が、活動開始から1年を経ても治安維持に苦戦している。4月下旬、ジハード主義武装勢力とトゥアレグ系分離独立派が複数地域で同時多発的な攻撃を行い、軍事政権に衝撃を与えた。こうした状況は、サヘル地域においてワグネルの代替としてのロシア民間軍事組織の有効性に疑問を投げかけている。", "summary_en": "One year after replacing the Wagner Group in Mali, Russia's Africa Corps is facing significant challenges in maintaining security. Coordinated attacks by jihadist groups and Tuareg separatists across multiple regions have rattled the country's ruling military junta in late April. The situation raises questions about the effectiveness of the Russian mercenary force as a substitute for Wagner's operations in the Sahel.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/le-monde-africa/article/2026/06/27/one-year-after-replacing-wagner-russia-s-africa-corps-struggles-in-mali_6754922_124.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "英国でパトカー追跡中に武装警官を乗せようとしたドライバーの映像が拡散", "title_en": "UK Bodycam Video Goes Viral After Driver Offers Armed Officer a Lift During Police Chase", "summary_ja": "英国で、警察の追跡中に異色の場面を捉えたボディカム映像がSNS上で拡散している。徒歩で容疑者を追っていた武装警官に、たまたま通りかかったバンの運転手が「乗りますか？」と声をかける場面が映っていた。ユーモラスな映像はSNSで広く注目を集め、多くの視聴者を和ませている。", "summary_en": "Bodycam footage from the United Kingdom has gone viral after capturing an unusual moment during a police pursuit. A van driver spotted an armed officer on foot and offered him a ride to help catch a fleeing suspect. The lighthearted clip has attracted widespread attention and amused viewers across social media.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/6/27/bodycam-shows-driver-offering-armed-police-a-lift-mid-chase?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ビエルサ監督退任、ウルグアイがW杯で衝撃の敗退", "title_en": "Bielsa's 'Toxic' Tenure Ends in Disaster as Uruguay Crash Out of World Cup", "summary_ja": "ウルグアイ代表は今回のワールドカップで衝撃的な敗退を喫し、アルゼンチン人監督マルセロ・ビエルサが退任することになった。自らを「毒性の強い完璧主義者」と称してきたビエルサ監督だが、その任期は「何も良いものを残さなかった」と批判されている。輝かしい指導者としての名声にもかかわらず、ウルグアイでの挑戦は失敗に終わったとの見方が広がっている。", "summary_en": "Uruguay have suffered a shocking World Cup elimination, with outgoing coach Marcelo Bielsa leaving behind what critics describe as 'nothing good.' The Argentinian manager, who has previously called himself a 'toxic perfectionist,' departs amid widespread disappointment. His tenure with Uruguay is now seen as a failed experiment despite his storied reputation in football.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/6/27/toxic-bielsa-leaves-nothing-good-behind-in-uruguay-shock-world-cup-exit?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カーボベルデ、W杯決勝トーナメント進出の最小国として歴史を樹立", "title_en": "Cape Verde Make History as Smallest Nation to Reach World Cup Round of 32", "summary_ja": "カーボベルデは2026年FIFA ワールドカップにおいて、史上最も人口の少ない国としてノックアウトステージ進出という歴史的偉業を達成した。人口60万人未満のこの島国は、ラウンド32でリオネル・メッシ率いるアルゼンチンと対戦する。その驚異的な快進撃は世界中の注目を集め、大会最大のアンダードッグストーリーの一つとなっている。", "summary_en": "Cape Verde have broken a historic record by becoming the smallest nation ever to advance to the knockout stage of the FIFA World Cup at the 2026 edition. The island nation, with a population of under 600,000, will now face Lionel Messi's Argentina in the last 32. Their remarkable run has captured global attention and stands as one of the tournament's greatest underdog stories.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/sports/2026/6/27/cape-verde-break-record-as-smallest-nation-to-reach-world-cup-knockouts?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "シアトルでのエジプト対イラン「プライドマッチ」にアラブ世界が反発", "title_en": "Arab World Reacts to Egypt–Iran 'Pride Match' Scheduled in Seattle", "summary_ja": "プライド月間中にシアトルで予定されているエジプトとイランのサッカー試合が、アラブ世界全体で激しい反発を引き起こしている。イスラム教徒が多数を占める国々の批判者たちは、自国代表チームがLGBTプライドイベントと結び付けられることに強い反対意見を表明した。この論争は、プライド行事が盛んな都市で開催される国際スポーツイベントをめぐる文化的・宗教的緊張を浮き彫りにしている。", "summary_en": "An upcoming soccer match between Egypt and Iran scheduled to take place in Seattle during Pride Month has sparked outrage across the Arab world. Critics from Muslim-majority countries expressed strong objection to the association of their national teams with LGBT Pride events. The controversy highlights cultural and religious tensions surrounding international sporting events held in cities with prominent Pride celebrations.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihAJBVV95cUxOSE92Vmt4b19DYkE4TFFuTzBQbjdpbTczRHlWemtXNDVHSEFPcFBJdlpPejZwV2ZSaTYzNXFoeG1wUXp4RlRaUFdrdk5ZRW5qcW8yZ1QtZG1XcTdpT2JUazN5c2pxaEJvaGN1TmpYUFdmakcwSFVGcVc0VDNLN2xpc2p0b1VDTnM5Tm8xQkRnT3QzdWZZS2FYSlQ1NEVEVU5aWF9vY05rTkhCNGFHWU9FUU5IMG9PTzdBclhnR2VtZ1RSZlJyc3BlclBzcmM1NTUtZUJKcVhDczBPSXBudXJReDItS0ZYX0czUUhTSHVZVlQxV3EyaFRLRC1MWXpVdDFvOXZGWA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ヒズボラ武装解除が完了するまでイスラエルはレバノンから撤退せず、合意内容が明らかに", "title_en": "Israel Will Withdraw from Lebanon Only After Hezbollah Is Disarmed, Deal States", "summary_ja": "イスラエルがレバノンから軍を撤退させる条件として、ヒズボラの武装解除が必要と定めた合意内容が明らかになった。この合意はイスラエルの撤退に先立ち、武装解除を前提条件として設定している。イスラエルはヒズボラに対する軍事作戦を終結させる前に、安全保障の確約を求めている姿勢を示している。", "summary_en": "A deal reportedly stipulates that Israel will not withdraw its forces from Lebanon until Hezbollah has been disarmed. The agreement sets disarmament as a precondition for any Israeli military pullout from Lebanese territory. The terms reflect Israel's demand for security guarantees before concluding its military campaign against Hezbollah.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMinAJBVV95cUxNdnBsT0FSajRJa3FGY0RyX2pVZEZ6NVVLN0JDWDdPUGFoTnFlU21PMEtLXzVNd1dkRTd1Y2tLZ2VhbXlxZEJvc0VyM0VrUjk1Nm5JWjVzenZFLVZWS1FuZ0M2Z25OeWtoMmtSS1hRaU5xd0ZuakF3cms1YXlIdGlkLUpvRkw5OW1WUkswM0xYRzhNSzh6LXlHOU94Sm1sTTNyNmt2SlhLdENsdEFsS0NyaEJpNUQ4VmFEZnB5YUxpV0h3UHNaYWFqYzlhbmZyVkdCT3FIWWxLSkJoczBKc2xadWlReXN6aUxPMWt2ejZ6bnJ6QkVxZTZWNVltUnl0dVR0d0d4MHVtaU82M3RoTXdXbG1FTXBzSVlmYjlycA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "入植者がパレスチナ人の家屋に放火を試みるも、激しい抵抗に遭う", "title_en": "Settlers Attempted to Torch Palestinian Homes, Met Fierce Resistance", "summary_ja": "イスラエルの入植者がヨルダン川西岸のパレスチナ人集落で家屋への放火を試みたと、ハアレツ紙が報じた。しかし、標的とされた村は他の集落とは異なり、激しい抵抗でこの攻撃を退けた。この事件は、占領下のヨルダン川西岸における入植者による暴力と緊張の高まりを改めて浮き彫りにしている。", "summary_en": "Israeli settlers attempted to set fire to Palestinian homes in a West Bank village, according to a report by Haaretz. The targeted village, however, resisted the attack in a way that distinguished it from other communities that have faced similar settler violence. The incident highlights ongoing tensions and settler aggression in the occupied West Bank.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMirgJBVV95cUxOdC0zSnZJUDFyNjE3amYtMkdXM3ZJamhRM3FBa19nRlowcHFvMC1PWExDWFZnOWhTRnhTc010MVFocHhPZTdsS1pRSHh0RnFKcmRwVDhOeGhWMUI1cDJ2NEw2c2VUenhSTkVJeUtpeE9zNUYxZ3hKMy1HdDFLc3FHd1hGVnVBZG5vZndlRWE2TDE5dmZ1eXVtekVud0lNUlVveldLUFBkb29ram9HT0ZqZVI0WklqMXFtbzM0MmtnS1Y2dTFQd3lwVXdqd2lWdnF3SXRHeTBUYjdjSmRQWU9fdGc4UXU2WmVQOVV4QXpEZ0twc2tMb0tyZG5reXh2YzlpYTJ4S1lwX2pxTkdJbjJXdTg1aVdmSnprWnlWSjlCcl9QTEpjWE1sQ3VucEZCZw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国防省（Mindef）ニュースレター更新 – 2026年6月27日", "title_en": "Mindef Newsletter Update – June 27, 2026", "summary_ja": "シンガポール国防省（Mindef）は2026年6月27日（土）、ストレーツ・タイムズを通じてニュースレターを配信した。この通知は定期購読者向けのメール配信の一環とみられる。読者はストレーツ・タイムズのプラットフォームを通じて、購読管理や追加の無料ニュースレターへの登録を案内された。", "summary_en": "The Singapore Ministry of Defence (Mindef) issued a newsletter update on Saturday, June 27, 2026, distributed via The Straits Times. The communication appears to be a standard subscription-based email briefing. Readers were directed to manage their subscriptions or sign up for additional free newsletters through The Straits Times platform.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ・ニュースレター", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "ストレーツ・タイムズは、その日の主要ニュースをまとめたイブニング・アップデート・ニュースレターを配信している。このニュースレターは、同紙が提供する無料メールマガジンシリーズの一つである。読者は公式の購読管理ページからニュースレターの設定を変更することができる。", "summary_en": "The Straits Times publishes its Evening Update newsletter, delivering a curated summary of the day's top stories to subscribers. The edition is part of the publication's suite of free newsletters available to readers. Subscribers can manage their newsletter preferences through the official Straits Times subscription portal.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズは2026年6月27日付のモーニング・ブリーフィング・ニュースレターを配信した。このブリーフィングは、読者に主要ニュースをまとめた日刊ダイジェストを提供するものである。読者はストレーツ・タイムズのウェブサイトから購読管理や追加の無料ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times published its Morning Briefing newsletter on June 27, 2026. The briefing serves as a daily news digest for subscribers, offering curated updates on top stories. Readers can manage their subscription or sign up for additional free newsletters through The Straits Times website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "持続可能性の rhetoric vs. 経済的現実：両立は可能か？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、途上国が直面する持続可能性へのコミットメントと経済的圧力の間の緊張の高まりを検証している。野心的な環境目標と経済成長・貧困削減という喫緊の課題を真に両立させられるかどうかを問いかけている。環境公約と実際の政策実施のギャップを埋める可能性についても探っている。", "summary_en": "The Jakarta Post examines the growing tension between sustainability commitments and economic pressures facing developing nations. The article questions whether countries can genuinely reconcile ambitious environmental rhetoric with the immediate demands of economic growth and poverty reduction. It explores potential pathways to bridge the gap between green pledges and practical policy implementation.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コモド島への観光客が増加", "title_en": "Tourist Visits to Komodo Island on the Rise", "summary_ja": "世界的に有名なコモドオオトカゲの生息地であるコモド島への観光客数が増加している。この傾向はインドネシアの自然遺産への関心の高まりを示している。当局や自然保護活動家たちは、島固有の生態系を守るためにこの動向を注視している。", "summary_en": "Komodo Island, home to the world-famous Komodo dragons, is experiencing an increase in tourist arrivals. The uptick in visitors highlights growing interest in Indonesia's natural heritage sites. Authorities and conservationists are monitoring the trend to ensure the island's unique ecosystem remains protected.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikwFBVV95cUxOQnVENlpVakhEVnVrUXdKUzdjUVljNjJzQ2pMRnliQTB5Wm4xV01fdEx3Y3JwaWcxc3Z3SUM2U1MyLU9fNHV6MFJ6MTRmN2E1NTBMZlZKU3d0NGZ2VU0yUVBEZzF4NG4xdTE2NmFXVDQ3TDYyMHRQQ1FaeVhDaVFmWkE1ZmpWOHhiNmxRd0NmbnpSdlk?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ジャカルタ、「ディープステート」と対峙する", "title_en": "Jakarta Confronts the Deep State", "summary_ja": "ジャカルタ・ポスト紙は、「ディープステート」という概念がジャカルタの政治情勢においてどのように現れているかを検証している。根深い官僚・軍事的利益が水面下で統治を形成している可能性を探る内容となっている。この問題はインドネシアの民主主義的制度における透明性と説明責任に疑問を投げかけている。", "summary_en": "The Jakarta Post examines the concept of the 'deep state' as it manifests in Jakarta's political landscape. The article explores how entrenched bureaucratic and military interests may be shaping governance behind the scenes. This raises questions about transparency and accountability in Indonesia's democratic institutions.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihAFBVV95cUxPWnN5Vjh2ZnRIZFFURUdUSWhoMVJIOHliTVo0VW9MTDI1SVktcGg1T1AyS3hHX21KU0NTbjg4U25TWHE1a2lGRlFPblp6WUJWaFdkcldsVXhpc0xfeE1pSTRjeHBNMTVVelF1c0JIRlFrSU5MT19pc29MYUFVbXR3VnhxNWM?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ゴムボートで韓国に脱出した中国人活動家、カナダに到着", "title_en": "Chinese Dissident Who Fled by Dinghy to South Korea Arrives in Canada", "summary_ja": "中国人活動家の董光平氏が、波乱に満ちた逃亡の末にカナダへ到着したことが友人の証言により明らかになった。同氏は5月、韓国西部の島沖で全長3.3メートルの小型ゴムボートに乗っているところを韓国沿岸警備隊に発見・拘束され、出入国管理法違反の疑いをかけられていた。その後の経緯を経て、同氏は無事カナダへの入国を果たした。", "summary_en": "Chinese dissident Dong Guangping has arrived in Canada after a dramatic escape attempt in which he was found aboard a small 3.3-meter inflatable boat near a western South Korean island in May. He had been detained by South Korea's coast guard for allegedly violating immigration law following his daring sea crossing. His safe arrival in Canada was confirmed by a friend, marking the end of a perilous journey for the activist.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/chinese-dissident-who-fled-by-dinghy-to-south-korea-arrives-in-canada-his-friend-says/article71154807.ece", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イランと米国が相互攻撃、テヘランは和平合意違反と非難", "title_en": "Iran and U.S. Trade Strikes as Tehran Accuses Washington of Violating Peace Deal", "summary_ja": "イランは、米軍がイラン南部沿岸を空爆したことを受け、米国が和平合意に違反したと非難した。報復として、イランは中東地域における米軍関連施設を標的に攻撃を実施した。この相互攻撃により、西アジア全域での緊張が大幅に高まっている。", "summary_en": "Iran has accused the United States of violating a peace agreement after U.S. airstrikes targeted Iran's southern coast. In retaliation, Iran launched strikes against targets linked to U.S. forces in the region. The exchange of fire marks a significant escalation in tensions across West Asia.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-iran-us-conflict-washington-tehran-ceasefire-strait-of-hormuz-israel-lebanon-peace-deal-live-updates-june-27-2026/article71153161.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アフガニスタン北東部でM6.1の地震、デリーでも揺れ観測", "title_en": "6.1-Magnitude Earthquake Strikes Northeastern Afghanistan, Tremors Felt in Delhi", "summary_ja": "アフガニスタン北東部でマグニチュード6.1の地震が発生し、インドの首都ニューデリーを含む広範囲に揺れが伝わった。震源地はヒンドゥークシュ山脈周辺の地震活動が活発な地域とみられる。報道時点では、死傷者や建物被害に関する詳細な情報は明らかになっていない。", "summary_en": "A 6.1-magnitude earthquake struck northeastern Afghanistan, sending tremors across a wide region including the Indian capital New Delhi. The quake was reported by The Hindu and follows a pattern of seismic activity in the tectonically active Hindu Kush region. No immediate details on casualties or structural damage were available at the time of reporting.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/earthquake-jolts-northeastern-afghanistan/article71154818.ece", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国民党主席：「一つの中国」の現状回復が両岸対話再開の鍵", "title_en": "KMT Head: Returning to 'One China' Status Quo Is Key to Restarting Cross-Strait Talks", "summary_ja": "台湾の最大野党・中国国民党（KMT）の主席は、北京との対話を再開するためには「一つの中国」の現状に戻ることが不可欠だと述べた。国民党主席はこの枠組みの承認が両岸交渉再開の前提条件になると強調した。この立場は、「一つの中国」原則を拒否する与党・民主進歩党の方針とは対照的である。", "summary_en": "The chairman of Taiwan's main opposition party, the Kuomintang (KMT), has stated that returning to the 'one China' status quo is essential for resuming dialogue with Beijing. The KMT leader emphasized that acknowledging this framework would be a prerequisite for restarting cross-strait negotiations. This stance contrasts with the ruling Democratic Progressive Party's position, which rejects the 'one China' principle.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5oTXhBLVZ3a1A3YnZSellabldoMlFWeWlZRzFSVjNEZWNBajFIQ19XTFZfVHFUR0RicHBoZzdQcW1rdDVsdFpHSW1CcEhYeWc5U3UzQmJsQQ?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国の検疫演習を受け、頼清徳総統が海上レジリエンス強化を指示", "title_en": "Lai Orders Stronger Maritime Resilience After China Quarantine Drill", "summary_ja": "台湾の頼清徳総統は、中国が台湾周辺で封鎖を想定した検疫演習を実施したことを受け、海上レジリエンスの強化を指示した。この演習は台湾の海上封鎖に対する脆弱性への懸念を高め、台湾当局に対応策の検討を促した。当局は現在、封鎖シナリオにおける海上交通路と重要な補給路の維持能力を強化するための取り組みを進めている。", "summary_en": "Taiwan President Lai Ching-te has ordered measures to strengthen maritime resilience following a Chinese military drill simulating a quarantine blockade around Taiwan. The directive comes in response to China's provocative exercise, which raised concerns about Taiwan's vulnerability to naval encirclement. Authorities are now working to bolster Taiwan's ability to maintain sea lanes and critical supply routes under potential blockade scenarios.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTFBiUFZmalZQaExMV2tDbkpfbVR1amE2X1A5aV9jVFdMU0JFM0ZIRmlnMjNyTzh4TUhTcWJETlhGTUtwUXZCRVpkUmZUTTMwaVY1NkV3ejllbw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ヤンキース、台湾人投手有望株と100万ドルで契約", "title_en": "Yankees Sign Taiwanese Pitching Prospect for $1 Million", "summary_ja": "ニューヨーク・ヤンキースが台湾人の投手有望株と100万ドルの契約を締結した。この契約は、MLBが台湾の野球人材の発掘・育成に引き続き注目していることを示している。投手の詳細な経歴や育成スケジュールについては、まだ完全には公表されていない。", "summary_en": "The New York Yankees have signed a Taiwanese pitching prospect to a deal worth US$1 million. The signing reflects continued MLB interest in developing baseball talent from Taiwan. Details about the pitcher's background and development timeline have not yet been fully disclosed.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVEFVX3lxTE51blNPT0lEWlJOVEloZm9BdDd5NnB0LWRlbVVhRXJuV0JReE51cDQ2bUxzY0N5cy15MmxtU0xYRWt0U2xYWWZkcFEyZ2FZZUVyYnIyVA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コロンビアの極右勝利でブラジルは南米唯一の左派大国に孤立", "title_en": "Far Right Win in Colombia Leaves Brazil as South America's Last Major Left-Wing Government", "summary_ja": "コロンビアでの極右勝利により、南米全体で保守化の波が加速し、ブラジルのルラ大統領は自国の選挙まで4か月を残す中、地域内でますます孤立した立場に置かれている。ルラが当選した2022年には南米の主要国の多くが左派政権だったが、現在はコロンビア、アルゼンチン、チリ、ペルー、ボリビア、エクアドル、パラグアイが右派または極右政権となっている。この劇的な地域情勢の変化は、2026年のブラジル選挙に向けて厳しい政治的背景を形成している。", "summary_en": "The far-right victory in Colombia has deepened a conservative wave across South America, leaving Brazilian President Lula increasingly isolated in the region just four months before Brazil's own elections. When Lula was elected in 2022, most major South American nations leaned left, but today countries including Colombia, Argentina, Chile, Peru, Bolivia, Ecuador, and Paraguay are governed by right-wing or far-right leaders. The dramatic regional shift sets a challenging political backdrop as Brazil approaches its 2026 electoral contest.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/with-far-right-in-colombia-brazil-is-a-left-wing-island-in-south-america.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イタマラチー、トランプ氏の干渉を懸念も「ブラジルはベネズエラではない」と強調", "title_en": "Itamaraty Fears Trump Interference but Says Brazil 'Is Not Venezuela'", "summary_ja": "ブラジルのルラ政権は、トランプ米大統領がブラジルの選挙に干渉する可能性について懸念を認め、動向を注視していると明らかにした。ブラジル外交官らはトランプ氏の選挙介入の意図が次第に明確になっていると指摘している。一方、匿名の外交筋は「ブラジルはベネズエラではない」と述べ、民主主義制度への自信を示した。", "summary_en": "Brazil's Lula administration has acknowledged concerns over potential U.S. President Donald Trump interfering in Brazil's upcoming elections. Brazilian diplomats say Trump's intent to meddle in the electoral process is becoming increasingly apparent, though officials are monitoring the situation carefully. An anonymous diplomatic source emphasized that Brazil's democratic institutions distinguish it from Venezuela, signaling confidence in the country's resilience.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米当局「逮捕のブラジル人はCVとPCCの幹部」、だが有罪判決に組織との関連なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC, but Court Records Show No Gang Links", "summary_ja": "米移民・関税執行局（ICE）は月曜日、ブラジル人のフェリペ・リナレス・デ・オリベイラ・デル・アキッラ容疑者を逮捕し、ブラジルの犯罪組織CVおよびPCCの幹部だと主張した。しかし、ブラジルでの薬物密売・詐欺・恐喝に関する過去の有罪判決には、いずれの組織名も記載されていない。この食い違いは、米当局の説明の正確性に疑問を投げかけている。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested in the United States on Monday by ICE, with U.S. authorities alleging he was a leader of Brazilian criminal organizations CV and PCC. However, his prior convictions in Brazil for drug trafficking, fraud, and extortion contain no mention of either gang. The discrepancy raises questions about the accuracy of the U.S. government's characterization of the case.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "NDLEAがエヌグ州で違法薬物929.5kgを押収、53件の有罪判決を獲得", "title_en": "NDLEA Seizes 929.5kg of Illicit Drugs, Secures 53 Convictions in Enugu State", "summary_ja": "ナイジェリア麻薬取締局（NDLEA）は、エヌグ州で違法薬物929.5キログラムを押収し、53件の有罪判決を獲得した。この取り組みは、同地域における麻薬密売撲滅に向けた継続的な努力を示すものである。エヌグ州知事は、経済成長には勤勉な若者が不可欠であると強調し、若者を薬物から守ることの重要性を訴えた。", "summary_en": "Nigeria's National Drug Law Enforcement Agency (NDLEA) has seized 929.5 kilograms of illicit drugs and secured 53 convictions in Enugu State. The operation highlights ongoing efforts to combat drug trafficking in the region. Enugu's governor emphasized that economic growth depends on hardworking youth, underscoring the importance of keeping young people free from substance abuse.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/891131-ndlea-seizes-929-5kg-illicit-drugs-secures-53-convictions-in-enugu.html", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "NAPTIPがエボニー州で子ども64人を救出、他はガーナやリビアに人身売買", "title_en": "NAPTIP Rescues 64 Children in Ebonyi, Others Trafficked to Ghana and Libya", "summary_ja": "ナイジェリアの人身売買禁止機関（NAPTIP）は、エボニー州で子ども64人を救出したと発表した。一方、他の被害者はガーナやリビアに人身売買されたとされている。同機関はエボニー州の家主や家主協会に対し、人身売買対策として入居希望者にBVN（銀行確認番号）、NIN（国民識別番号）、職場IDの提出を義務付けるよう呼びかけた。", "summary_en": "Nigeria's National Agency for the Prohibition of Trafficking in Persons (NAPTIP) announced the rescue of 64 children in Ebonyi State, while others were reported to have been trafficked to Ghana and Libya. The agency called on landlords and landlords' associations in Ebonyi to require prospective tenants to submit BVN, NIN, and workplace ID cards as a measure to combat human trafficking. The initiative aims to increase accountability and make it harder for traffickers to operate undetected in residential areas.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/891128-ebonyi-we-rescued-64-children-others-trafficked-to-ghana-libya-naptip.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "SSS、2年間不当拘禁の牧畜民を釈放し300万ナイラの補償金を支払う", "title_en": "SSS Releases Herder Wrongfully Detained for Two Years, Pays N3 Million Compensation", "summary_ja": "ナイジェリアの国家安全保障局（SSS）は、2年間不当に拘禁されていたイドリス氏を釈放した。SSSは同氏の事例を徹底的に再審査した結果、釈放を決定したと説明している。また、不当拘禁に対する補償として300万ナイラが支払われた。", "summary_en": "Nigeria's State Security Service (SSS) has released a herder identified as Mr. Idris after he was wrongfully detained for two years. The agency cited a thorough review of his case as the reason for his release. Mr. Idris was also awarded three million naira in compensation for his unlawful detention.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/891127-sss-releases-herder-wrongfully-detained-for-two-years-gives-n3-million-compensation.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "フォンデアライエン委員長、7月にアルメニア訪問予定", "title_en": "Von der Leyen to Visit Armenia in July", "summary_ja": "新華社・CGTNによると、欧州委員会のウルズラ・フォンデアライエン委員長が7月にアルメニアを訪問する予定だと報じられている。同国営メディアは、この訪問がEUとアルメニアの関係や南コーカサス地域の情勢を議題とする見通しだと伝えている。具体的な日程や詳細な議題については、今のところ明らかにされていない。", "summary_en": "Xinhua/CGTN reports that European Commission President Ursula von der Leyen is scheduled to visit Armenia in July. State media reports that the visit is expected to address EU-Armenia relations and regional developments in the South Caucasus. No further details regarding the agenda or specific dates have been provided in the state-controlled report.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-26/news-1Oid1QECmT6/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "豪首相、効果限定的でも子どものSNS禁止強化を表明", "title_en": "Australia PM vows to strengthen child social media ban despite limited impact", "summary_ja": "新華社／CGTNによると、オーストラリアのアンソニー・アルバニージー首相は金曜日、子どもを対象としたソーシャルメディア禁止措置を可能な限り強化したい意向を示したと伝えている。同メディアは、既存の禁止措置の効果が限定的とされる中でもこの方針が維持されていると報じている。具体的な強化策や実施時期については詳細が明らかにされていない。", "summary_en": "Xinhua/CGTN reports that Australian Prime Minister stated on Friday his intention to make the country's social media ban for children as strong as possible. The state-controlled outlet reports that this commitment comes despite indications the existing ban has had limited impact. No further details were provided regarding specific measures or timelines for strengthening the policy.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-26/Australia-to-strengthen-child-social-media-ban-despite-limited-impact-1OhWmRkEJXy/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ネットフリックス人気作『ザ・ポリガミスト』原作者スー・ニャティが世界的ヒットを語る", "title_en": "Netflix Hit 'The Polygamist' Author Sue Nyathi on the Show's Global Success", "summary_ja": "スー・ニャティが2012年に発表したデビュー小説『ザ・ポリガミスト』を原作としたネットフリックスの映像化作品が、6月の配信開始以降、非英語シリーズとして最も視聴された作品の一つとなった。新華社およびCGTNは、同作品がアフリカ、カリブ海地域、ヨーロッパの一部でトレンド入りを果たしたと伝えている。同メディアはニャティ氏へのインタビューを通じ、作品の文化的な共鳴と国際的な人気の背景を紹介している。", "summary_en": "Sue Nyathi's debut novel 'The Polygamist,' originally published in 2012, has been adapted into one of Netflix's most-watched non-English series since its June release. Xinhua/CGTN reports that the show trended across Africa, the Caribbean, and parts of Europe in the weeks following its debut. The state outlet features Nyathi unpacking the cultural resonance and international appeal behind the adaptation's unexpected global sensation.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://newsaf.cgtn.com/news/2026-06-24/-The-Polygamist-author-unpacks-Netflix-sensation-1Of2Y0O6eR2/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア専門家、攻撃型UAV産業が核産業に匹敵すると主張", "title_en": "Russian Expert Claims Strike UAV Industry Now Rivals Nuclear Sector in Strategic Importance", "summary_ja": "ロシア国営メディアTASS/RTは、専門家のドミトリー・クジャーキン氏がロシアの攻撃型ドローン産業の重要性が核産業に匹敵するレベルに達したと主張していると報じている。クジャーキン氏はまた、現代戦争へのUAV統合が過去の紛争から根本的な転換をもたらしていると述べたとされる。これらの主張は国家管理下のメディアによるものであり、慎重に評価する必要がある。", "summary_en": "Russian state media TASS/RT reports that expert Dmitry Kuzyakin claims Russia has successfully built a strike drone industry comparable in significance to its nuclear industry. Kuzyakin reportedly argues that the integration of UAVs into modern warfare represents a fundamental shift from previous conflicts. These claims originate from state-controlled media and should be assessed accordingly.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/defense/2152437", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア外務省「西側の圧力でロシアとパートナー諸国の結束が強まる」", "title_en": "Russia Claims Western Pressure Is Driving It Closer to Partner Nations", "summary_ja": "ロシア外務省の大使級高官アレクサンドル・トロフィモフ氏は、西側からの圧力によりロシアとパートナー諸国の関係が緊密化していると国営メディアを通じて主張した。ロシア外務省は、多極世界における新たな影響力の中心の台頭は客観的なプロセスであるとの見解を示している。これらは国家管理下のメディアによる報道であり、独立した検証はされていない。", "summary_en": "Russia's Foreign Ministry Ambassador-at-Large Alexander Trofimov reports that Russia and its partners are drawing closer together as a result of Western pressure. The Russian MFA reports that the rise of new centers of influence in a multipolar world is, in its view, an objective and inevitable process. State media RT and TASS report that Moscow frames this realignment as a natural geopolitical shift rather than isolation.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2152435", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア外務省「ユーラシアの安全保障体制構築には長期間を要する」", "title_en": "Russia Says Building Eurasian Security Architecture Will Be a Long Process", "summary_ja": "ロシア国営メディアTASS/RTは、ロシア外務省の特命全権大使アレクサンドル・トロフィモフ氏の発言として、ユーラシアにおける新たな安全保障体制の構築には長い時間がかかると伝えている。同メディアによると、トロフィモフ氏は多極化する世界の新たな現実に対応するため、相互作用のシステムを適応させる必要性をロシアが認識したと述べたという。これはロシアが西側主導の枠組みに代わる地域安全保障体制の再構築を推進する姿勢の一環として報じられている。", "summary_en": "Russian state media TASS/RT reports that building a new security architecture in Eurasia will be a lengthy process, according to Russian Foreign Ministry Ambassador-at-Large Alexander Trofimov. The outlet reports that Trofimov stated Russia recognized the need to adapt its interaction systems to the realities of a multipolar world. Russian state media frames this as part of Moscow's broader effort to reshape regional security arrangements outside Western-led frameworks.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/world/2152433", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "欧州エネルギー単一市場は本当に良いアイデアなのか？", "title_en": "Is a European Single Market for Energy Such a Good Idea?", "summary_ja": "筆者は、欧州のエネルギー供給混乱が化石燃料からの脱却の必要性を改めて示していると主張する。気候変動対策と安全保障強化という明白な理由に加え、欧州は今世紀における世界GDPシェアの急激な低下に対処するためにエネルギーコストを削減しなければならないと論じる。欧州エネルギー単一市場はその解決策として提示されているが、筆者はその是非を慎重に検討している。", "summary_en": "The author argues that Europe's ongoing energy supply disruptions underscore the urgent need to phase out fossil fuels for both climate and security reasons. Beyond this obvious conclusion, the author contends that Europe must also focus on reducing energy costs to reverse its declining share of global GDP. A European single market for energy is presented as a potential, though not unambiguous, solution to this challenge.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/european-energy-single-market-political-risks-vs-economic-rewards-by-brigitte-granville-2026-06", "state_media": false, "category": "オピニオン", "full_text": "Is a European Single Market for Energy Such a Good Idea?\nLONDON—Whatever happens with the US-Iran peace process and global energy prices, the strategic implications of this year’s supply disruptions are already clear. The crisis is further confirmation of the need to phase out fossil fuels, both to mitigate climate change and to strengthen energy security. But for Europe, which remains heavily dependent on imported energy, some less obvious implications may ultimately prove more consequential. To address the precipitous decline in its share of global GDP this century, Europe must lower its energy costs.", "translation_ja": "欧州エネルギー単一市場は本当に良いアイデアなのか？\n\nロンドン発―米国とイランの和平プロセスや世界のエネルギー価格がどうなろうとも、今年の供給混乱がもたらす戦略的な意味合いはすでに明らかだ。この危機は、気候変動の緩和とエネルギー安全保障の強化という両面から、化石燃料を段階的に廃止する必要性をさらに裏付けるものである。しかし、依然として輸入エネルギーへの依存度が高い欧州にとっては、一見目立たない含意が最終的にはより重大な結果をもたらすかもしれない。今世紀における世界GDP比率の急激な低下に対処するため、欧州はエネルギーコストを引き下げなければならない。", "vocab": [{"word": "precipitous", "definition": "「急激な、険しい」という意味の形容詞。数値や状況が急速に悪化・低下する様子を表す際に用いられる上級語彙。"}, {"word": "phase out", "definition": "「段階的に廃止する・撤廃する」という意味の句動詞。政策やシステムを徐々に終了させるプロセスを指す。"}, {"word": "mitigate", "definition": "「緩和する、軽減する」という意味の動詞。悪影響やリスクを和らげる行為を表し、環境・政策分野で頻出する技術的表現。"}, {"word": "consequential", "definition": "「重大な結果をもたらす、重要な」という意味の形容詞。単なる「重要な（important）」より格式が高く、影響の大きさを強調する。"}, {"word": "strategic implications", "definition": "「戦略的な意味合い・示唆」という意味の名詞句。ある出来事が長期的・広範囲な戦略に与える影響を論じる際に使われる専門的表現。"}, {"word": "dependent on", "definition": "「〜に依存している」という意味の形容詞句。エネルギーや経済の文脈で、外部資源への構造的な頼りを示すフォーマルな表現。"}]}, {"title_ja": "中国の経済再均衡の失敗：個人消費は依然として低迷", "title_en": "China's Failed Rebalancing: Domestic Consumption Remains Stubbornly Low", "summary_ja": "筆者は、中国が投資・輸出主導の成長から個人消費主導の成長へと経済を再均衡させる試みが、約20年にわたって根本的に失敗してきたと主張している。中国当局は国内需要の喚起を繰り返し約束してきたが、GDPに占める家計消費の割合は依然として低いままだ。この失敗は、時代遅れの成長モデルへの過度な依存が続くことを意味し、中国および世界経済にとって深刻な問題を提起している。", "summary_en": "The author argues that China's efforts to rebalance its economy away from investment- and export-led growth toward domestic consumption have fundamentally failed over nearly two decades. Despite repeated promises by Chinese officials to boost household demand, the consumption share of GDP remains persistently low. This failure raises serious concerns about China's continued over-reliance on outdated growth drivers and its implications for the global economy.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/chinese-economy-consumer-led-rebalancing-has-failed-by-stephen-s-roach-2026-06", "state_media": false, "category": "オピニオン", "full_text": "China’s Failed Rebalancing\nWhen China’s leaders first acknowledged the need to rebalance the economy nearly two decades ago, it seemed like a matter of when, not if. But with the household consumption share of Chinese GDP remaining stubbornly low, officials’ promises to boost domestic demand have lost all credibility.\nNEW HAVEN—China’s efforts to rebalance its economy have been an abject failure. Nearly two decades after former Premier Wen Jiabao bemoaned the Chinese economy’s excessive dependence on investment- and export-led growth, the problem has gone from bad to worse. The lack of meaningful consumer-led rebalancing implies increased reliance on these time-worn sources of economic activity, raising critical questions for China and the rest of the world.", "translation_ja": "中国の経済再均衡の失敗\n\n中国の指導者たちが約20年前に経済の再均衡の必要性を初めて認識したとき、それは「実現するかどうか」ではなく「いつ実現するか」の問題のように思われた。しかし、中国のGDPに占める家計消費の割合が頑固なほど低いままであり続けるなか、国内需要を押し上げるという当局の約束はすっかり信頼性を失ってしまった。\n\nニューヘイブン発―中国の経済再均衡への取り組みは完全な失敗に終わった。温家宝元首相が中国経済の投資・輸出主導の成長への過度な依存を嘆いてから約20年が経つが、問題は改善されるどころか悪化の一途をたどっている。消費者主導の実質的な再均衡が実現していないことは、こうした使い古された経済活動の源泉への依存がさらに高まることを意味しており、中国と世界にとって重大な問題を提起している。", "vocab": [{"word": "rebalancing", "definition": "経済構造の比重を調整・再編すること。ここでは投資・輸出依存から消費主導へと経済の重心を移すことを指す。"}, {"word": "abject", "definition": "（失敗などが）惨めなほど完全である、徹底的であるという意味の強調表現。'abject failure'で「完全な失敗」「惨敗」を意味する。"}, {"word": "bemoaned", "definition": "bemoaneはbemoanの過去形で、何かを公に嘆き悲しむ、不満を述べることを意味する。やや文語的なニュアンスを持つ。"}, {"word": "time-worn", "definition": "長年の使用や繰り返しによって古くなった、陳腐化したという意味の形容詞。ここでは「使い古された」成長モデルを批判的に表現している。"}, {"word": "credibility", "definition": "信頼性、信憑性を意味する名詞。政策や発言が信用に値するかどうかを示す概念で、政治・経済文脈で頻出する。"}, {"word": "stubbornly", "definition": "頑固に、なかなか変わらないほどに、という意味の副詞。統計や指標が改善を拒んで低迷し続ける様子を表す際に使われる。"}]}, {"title_ja": "健全なポピュリズムの台頭", "title_en": "Crowning a Healthy Populism", "summary_ja": "著者は、ハンガリーやアルバニアなど中東欧における最近の政治的動員は、MAGA的な攻撃的民族ナショナリズムとは異なる、より複雑なポピュリズムの形態であると主張する。21世紀の政治が独裁的な民族ナショナリズムの反動によって動かされているという通説に対し、著者は郷愁や民衆の反乱が民主主義擁護運動にもつながり得ると指摘する。こうした動きは、新たな「健全なポピュリズム」のモデルを示す可能性があるという。", "summary_en": "The author argues that recent political mobilizations in Hungary, Albania, and Central and Eastern Europe represent a more nuanced form of populism distinct from MAGA-style ethnonationalism. While conventional wisdom frames 21st-century politics as driven by autocratic ethnonationalist backlash, the author suggests that nostalgia and popular revolt can also fuel pro-democracy resistance movements. These developments may point toward a new, healthier model of populist politics.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/hungary-albania-rejecting-maga-international-by-harold-james-2026-06", "state_media": false, "category": "オピニオン", "full_text": "Crowning a Healthy Populism\nAlthough recent political mobilizations in Hungary, Albania, and other parts of Central and Eastern Europe could be described as populist and nationalist, they have little in common with the aggressive ethnonationalism that MAGA professes. Could they be a model for a new form of politics?\nPRINCETON—Conventional wisdom has it that an autocratic ethnonationalist backlash against global capitalism and liberal democracy is driving 21st-century politics. Yet recent developments have shown the political revolt to be more nuanced. In an era of rapid technological and economic change, people invariably look to the past. But nostalgia can inspire both ethnonationalists and those seeking to resist autocracy.", "translation_ja": "健全なポピュリズムの台頭\n\nハンガリー、アルバニア、その他の中東欧における最近の政治的動員はポピュリスト的・ナショナリスト的と形容できるかもしれないが、MAGAが標榜する攻撃的な民族ナショナリズムとはほとんど共通点がない。これらは新たな政治の形のモデルとなり得るのだろうか？\n\nプリンストン発――独裁的な民族ナショナリズムによるグローバル資本主義と自由民主主義への反動が21世紀の政治を動かしているというのが通説だ。しかし、最近の動向はその政治的反乱がより複雑な様相を呈していることを示している。急速な技術的・経済的変化の時代において、人々は必然的に過去に目を向ける。しかし、郷愁は民族ナショナリストをも、独裁に抵抗しようとする人々をも鼓舞し得るのである。", "vocab": [{"word": "ethnonationalism", "definition": "民族ナショナリズム。特定の民族的アイデンティティに基づいて国家や政治運動を定義しようとする思想・運動を指す。"}, {"word": "mobilization", "definition": "動員。政治的・社会的目的のために人々や資源を組織・結集させる行為を指し、政治文脈で頻繁に使われる上級語彙。"}, {"word": "autocratic", "definition": "独裁的な。一人の指導者や権力者が絶対的な権限を持つ統治形態を形容する語。"}, {"word": "nuanced", "definition": "微妙なニュアンスのある、複雑な。単純に割り切れない繊細な差異や複雑さを持つ状態を表す形容詞。"}, {"word": "nostalgia", "definition": "郷愁、ノスタルジア。過去の時代や状況への感傷的な懐かしさを指し、政治分析においても重要な概念として使われる。"}, {"word": "profess", "definition": "公言する、標榜する。ある信念や立場を公に表明・主張することを意味する動詞で、やや改まった文脈で使われる。"}]}, {"title_ja": "ミシェル・オバマを嘲笑したUFC選手「あれは褒め言葉だった」と主張", "title_en": "UFC Fighter's Mockery of Michelle Obama Reflects Mainstream Misogynoir", "summary_ja": "UFC選手ジョシュ・ホキットがホワイトハウスの芝生で開催されたイベントでミシェル・オバマを「男だ」と発言し、後に「褒め言葉のつもりだった」と弁明した。コラムニストのアーワ・マフダウィは、この発言が単なる愚かな失言ではなく、トランプ政権下で人種差別的ミソジニーが主流化している証拠だと論じる。さらにセリーナ・ウィリアムズやブリトニー・グライナー、シンシア・エリヴォらを例に挙げ、社会が黒人女性を男性化する広範なパターンと結びつけている。", "summary_en": "At a UFC event on the White House lawn, heavyweight fighter Josh Hokit falsely claimed Michelle Obama is a man, later defending it as a 'compliment.' Columnist Arwa Mahdawi argues the incident is not merely a stupid remark but reflects the mainstreaming of racist misogyny under the Trump administration. She connects it to a broader pattern of society masculinizing Black women, citing Serena Williams, Brittney Griner, and Cynthia Erivo as further examples.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/27/josh-hokit-michelle-obama-remark", "state_media": false, "category": "オピニオン", "full_text": "Michelle Obama should feel honoured, apparently.\nDo you know what the greatest compliment you can give a woman is? It’s not telling her she’s smart or kind or funny. No, it’s calling her a man. After all, what could be better than being a man?\nThese words of wisdom are brought to you by, you guessed it, a man. At last week’s UFC event on the White House lawn, the heavyweight fighter Josh Hokit yelled into the microphone: “Michelle Obama is a man. Am I right, America?”\nHis outburst drew mixed reactions. The crowd was largely quiet, but there were some laughs and boos. CNN reported that “in a brief moment captured on camera, Donald Trump … appeared to show a half-smile seconds after the false remark, which has previously circulated online”.\nThis week, Hokit decided to explain himself. It turns out he wasn’t engaging in “misogynoir”, Moya Bailey’s term for the anti-Black, racist misogyny that Black women experience. Not at all. During an appearance on The Ariel Helwani Show, Hokit said he thought he was giving the former first lady “a compliment”. The silly woman should have been grateful! Hokit explained: “Michelle Obama being a man, that’s like, uh, she knows how to deal with adversity, know, she knows how to work hard like a man. You know, when the times get tough, you know, the tough keep going.”\nI’m sure Hokit has suffered a few head injuries during his fighting career, but it seems even he might have realised how ridiculous that sounded. After host Ariel Helwani pushed back on this excuse, asking why Hokit had even brought Obama up, the fighter pivoted to talking about free speech.\n“I thought it was a perfect opportunity to, you know, show the world how great this country is with the freedom of speech. You know you go somewhere [else in the world], and you say something like that, and you die.” He went on: “There’s a certain side that pokes at another side, and there’s no outrage there, and so I thought it was a perfect time to take a jab.” Anyway, Hokit added, he said what he said, and he doesn’t regret it.\nLet’s not write off this incident as just another stupid man saying yet another stupid thing in a country that seems to grow stupider by the day. The fact that the president has so far refused to denounce Hokit’s comments shows the extent to which misogyny and racism have been mainstreamed by the White House. Why would anyone expect Trump to condemn Hokit’s comments when he built his entire political career from othering the Obamas and spreading racist conspiracy theories that Barack Obama was not born in the US? Why would anyone expect Trump to denounce Hokit when he himself posted (then later deleted) a video depicting Barack and Michelle Obama as apes earlier this year?\nThe UFC CEO, Dana White, I should note, has condemned Hokit’s comment. White, a close Trump ally, told Time: “I understand that the Obamas are public figures, but I’m completely against saying nasty and false things about people’s families.” He added, “Everyone knows my position on free speech, but I hate this kind of nonsense.”\nWhite’s statement was better than nothing, but it still falls short. This wasn’t just a nasty jab at a public figure; it was an example of the way in which society masculinises Black women. Serena Williams, for example, has addressed online conspiracy theories that she was born a man. So has the basketball player Brittney Griner. Recently, the Wicked actor Cynthia Erivo said she felt her “humanity had been bastardized” after the internet joked she was her co-star Ariana Grande’s “bodyguard”, following an incident in which Erivo helped fend off a fan who was trying to grab Grande.\n“I think that we haven’t really come to terms with the insidious nature of how we view Black women,” Erivo told Variety. “[T]here was this assumption that I was bigger than my co-star and so I had to be controlling or protecting, and that was my role. I would hazard a guess that it would not have been the same had it been the other way around.”\nTo paraphrase Hokit, I think this is a perfect opportunity to show the world how great the US is when it comes to freedom of speech. So let me say that Donald Trump is not the big, strong man he thinks he is. He is weak and pathetic; his only legacy will be corruption and mass immiseration. Am I right, America?\nWhy did Jimmy Fallon platform Conor McGregor?\nIn 2024, a jury in an Irish civil court found McGregor, a champion fighter, liable in a civil rape case brought by a brave woman called Nikita Hand. A year later, he lost an appeal trying to overturn the jury’s order. Still, while the courts may not have rehabilitated him, the media are helpfully whitewashing his image. McGregor appeared on The Tonight Show this week ahead of his 11 July fight in Las Vegas, his first in about five years. Fallon was all chummy-chummy with McGregor, saying the pair should go out for drinks and pointedly making zero mention of all the controversies surrounding McGregor. Fallon, to jog your memory, is the guy ", "translation_ja": "ミシェル・オバマは光栄に思うべきらしい。\n\n女性に贈れる最大の褒め言葉とは何か、ご存知だろうか？それは彼女が賢いとか、優しいとか、面白いと言うことではない。そう、男と呼ぶことだ。男であることより素晴らしいことなど何があるというのか？\n\nこの金言をもたらしてくれたのは、お察しの通り、男だ。先週ホワイトハウスの芝生で開催されたUFCイベントで、ヘビー級選手のジョシュ・ホキットはマイクに向かってこう叫んだ。「ミシェル・オバマは男だ。そうだろ、アメリカ？」\n\nこの発言は賛否両論を呼んだ。観客の大半は静まり返っていたが、笑い声とブーイングも一部から上がった。CNNは「カメラに捉えられた一瞬、ドナルド・トランプは……この虚偽の発言の直後、薄笑いを浮かべているように見えた」と報じた。この発言はかつてもオンライン上で流布したことがある。\n\n今週、ホキットは自らの発言を釈明することにした。彼は「ミソジノワール」――モヤ・ベイリーが提唱した、黒人女性が経験する反黒人的かつ人種差別的なミソジニーを指す言葉――には関与していないという。まったく違うというのだ。アリエル・ヘルワーニ・ショーへの出演で、ホキットは元ファーストレディへの「褒め言葉」のつもりだったと語った。彼女は感謝すべきだったというわけだ！ホキットはこう説明した。「ミシェル・オバマが男だっていうのは、つまり、彼女は逆境への向き合い方を知っている、男のように懸命に働くことを知っている、ってことですよ。厳しい時代にも、タフな人間は前へ進み続けるっていう」\n\nホキットはファイターとしてのキャリアで何度か頭部に打撃を受けているだろうが、さすがに自分でもその言い訳がいかに馬鹿げているか気づいたようだ。ホスト役のアリエル・ヘルワーニがなぜそもそもオバマ氏の話を持ち出したのかと問い詰めると、ホキットは言論の自由の話に切り替えた。\n\n「この国が言論の自由においていかに素晴らしいかを世界に示す絶好の機会だと思ったんです。他の国に行ってあんなことを言ったら、死にますよ」。さらに彼はこう続けた。「ある側がもう一方の側をからかっても怒る人がいない、だから絶好のタイミングだと思った」。いずれにせよ、ホキットは言った言葉に後悔はないと付け加えた。\n\nこの出来事を、愚かさを日々更新しているように見えるこの国で、また愚かな男がまた愚かなことを言っただけだと片づけてはいけない。大統領がホキットの発言をいまだに非難しないという事実は、ホワイトハウスによって人種差別とミソジニーがいかに主流化されているかを示している。トランプがホキットの発言を非難するなどと、誰が期待できるだろうか。彼はオバマ一家を「よそ者」扱いし、バラク・オバマが米国生まれでないという人種差別的な陰謀論を広めることで政治キャリア全体を築いてきた人物だ。トランプ自身が今年、バラクとミシェル・オバマを類人猿に見立てた動画を投稿（後に削除）したというのに、なぜ彼がホキットを非難するなどと期待できるだろうか？\n\nUFCのCEOであるダナ・ホワイトは、ホキットの発言を非難したことは記しておくべきだろう。トランプの盟友でもあるホワイトはタイム誌にこう語った。「オバマ夫妻は公人だと理解しているが、人の家族について不快で虚偽なことを言うことには断固として反対だ」。また「言論の自由に関する私のスタンスは皆知っているが、こういうナンセンスは嫌いだ」とも述べた。\n\nホワイトの声明は何もないよりはましだが、それでも不十分だ。これは単に公人への意地悪な一撃ではなく、社会が黒人女性を男性化するやり方の一例だ。例えばセリーナ・ウィリアムズは、彼女が男として生まれたというオンライン上の陰謀論に言及したことがある。バスケットボール選手のブリトニー・グライナーも同様だ。最近では、映画『ウィキッド』の俳優シンシア・エリヴォが、ファンが共演者のアリアナ・グランデをつかもうとした際にエリヴォが撃退したことを受け、ネット上で彼女がグランデの「ボディーガード」だとからかわれたことについて、「自分の人間性が歪められた」と感じたと語った。\n\n「黒人女性の見方がいかに陰険であるか、私たちはまだ向き合えていないと思う」とエリヴォはバラエティ誌に語った。「私が共演者より体格が大きいという思い込みがあり、だから私が主導したり守ったりするのが当然という役割を与えられた。逆の立場だったら同じことにはならなかったと断言できる」\n\nホキットの言葉を言い換えれば、これは米国が言論の自由においていかに素晴らしいかを世界に示す絶好の機会だと思う。だから言わせてもらう。ドナルド・トランプは自分が思い描くような偉大で強い男ではない。彼は弱く、哀れだ。その遺産は腐敗と大衆の塗炭の苦しみだけだろう。そうだろ、アメリカ？\n\n■なぜジミー・ファロンはコナー・マクレガーを番組に呼んだのか？\n\n2024年、アイルランドの民事裁判の陪審員は、チャンピオン選手のマクレガーに対し、勇敢な女性ニキータ・ハンドが起こした民事強姦訴訟で責任があるとの評決を下した。1年後、彼は陪審員の命令を覆そうとした控訴でも敗訴した。それでも、裁判所が彼の名誉を回復しなかった一方で、メディアは彼のイメージを白塗りするのに着実に貢献している。マクレガーは今週、約5年ぶりとなる7月11日のラスベガスでの試合を前に『ザ・トゥナイト・ショー』に出演した。ファロンはマクレガーと打ち解けた様子で、二人で飲みに行こうと誘い、マクレガーを取り巻く数々のスキャンダルには一切触れなかった。念のため申し添えると、ファロンとはかつて……", "vocab": [{"word": "misogynoir", "definition": "黒人女性が経験する、人種差別と性差別が交差した特定の形の憎悪・偏見を指す造語。学者モヤ・ベイリーが提唱した概念で、本文では黒人女性を標的にした侮辱的発言の文脈で使われている。"}, {"word": "mainstreamed", "definition": "本来は周辺的・異端的とみなされていた考えや行動が社会の主流・一般的なものとして受け入れられるようになること。本文では人種差別やミソジニーが政権によって正常化されているという批判的な文脈で用いられている。"}, {"word": "othering", "definition": "特定の個人や集団を「異質な他者」として扱い、排除・周縁化する行為や言説のこと。社会学・批判理論でよく使われる用語で、本文ではオバマ一家を米国社会から排除しようとするトランプの政治姿勢を指している。"}, {"word": "masculinises", "definition": "女性に対して男性的な特徴や役割を押しつけること。本文では、社会が黒人女性を「男性的」とみなす偏見を説明する文脈で使われている（アメリカ英語表記はmasculinizes）。"}, {"word": "immiseration", "definition": "大衆を極度の貧困や苦境に追い込むこと。もともとマルクス経済学の用語で、資本主義による労働者階級の窮乏化を指すが、ここでは政治的・社会的な大衆の苦しみを意味する強い表現として使われている。"}, {"word": "whitewashing", "definition": "不都合な事実や問題行動を覆い隠し、表面的に無害・好意的に見せること。本文ではメディアがマクレガーの不祥事を無視してイメージを修復しようとしていると批判する文脈で使われている。"}, {"word": "pivoted", "definition": "議論や話題を突然別の方向に転換すること。ビジネスや政治の文脈でよく使われる表現で、本文ではホキットが批判をかわすために話題を言論の自由へとすり替えた行動を指している。"}]}, {"title_ja": "アメリカの本当の危機：リンカーン記念館の反射池をめぐる茶番劇", "title_en": "America's Real Crisis: The Lincoln Memorial Reflecting Pool Debacle", "summary_ja": "ユーモア作家のデイヴ・シリングは、トランプ政権がリンカーン記念館の反射池改修に異常なほどの関心を向けていることを風刺し、これが政権の虚栄心に満ちたインフラ事業の典型だと論じる。藻が繁殖し荒れ果てた池の状態をサボタージュのせいにする政権の主張を嘲笑しつつ、よどんだ池を民主主義の腐敗そのものの比喩として用いる。手頃な住宅政策や投票権よりも見せかけの事業を優先するこうした姿勢は、現実が歪んだ鏡像のように映る不条理な統治の縮図だとシリングは訴える。", "summary_en": "Humorist Dave Schilling satirizes the Trump administration's fixation on renovating the Lincoln Memorial reflecting pool, arguing it exemplifies a broader pattern of vanity infrastructure projects prone to failure and blame-shifting. He mocks the administration's claim that saboteurs caused the pool's algae-ridden, deteriorating state, and uses the stagnant pool as a metaphor for American democracy itself. Schilling suggests the prioritization of such spectacle over substantive policy—like affordable housing or voting rights—reflects a surreal, mirror-universe version of governance.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/27/american-democracy-washington-dc-reflecting-pool", "state_media": false, "category": "オピニオン", "full_text": "When you hear the word “pool” in these sun-baked days of summer, you might think of taking a cheeky dip in the water to cool off the skin that is conspicuously peeling off your haggard body. Everyone (except me) loves a pool. Donald Trump really loves a pool, but not the kind you can swim in. Or stand too close to. Or enjoy at all, really.\nThe state of the Lincoln Memorial reflecting pool rehabilitation effort has become the primary crisis affecting the United States. That is, if you ask the current administration. Limiting the right to vote is running a close second in the World Cup of Political Football, but it’s the reflecting pool that is attracting the most fervent attention. As emergencies go, it’s as thrilling as watching a really large body of still water in the middle of a park. The paint is peeling and it’s full of green algae.\nWhile the inability to keep the pool from looking like a stagnant lake in the Ozarks carries some pretty serious environmental omens about the perilousness of our global water supply, the site itself is not exactly a massive national emergency. I’m more concerned with my Apple Watch beeping about my heart rate after a third martini than I am an artificial lake that … shows you a reversed version of the thing you’re standing in front of. Yup, there it is. That building. Again. But upside down. Brilliant.\nThe reflecting pool is just another pointless infrastructure project in a long line of pointless infrastructure projects that have come to define the blockbuster sequel to Trump 1.0. The White House ballroom, the Kennedy Center, the comically large arch designed to give Europe serious concrete envy. The politics pages of the news are starting to look more like Architectural Digest, which, quite frankly, is more fun to read usually. Except: every single one of these projects seems doomed to failure. The projects barely limp along as more than the governmental equivalent of a grandpa’s bucket list. Trump’s name is off the Kennedy Center. The ballroom is mired in litigation and political wrangling. The reflecting pool is a mess. It’s a parade of no-bid contracts, outlandish promises and unchecked vanity. Naturally, all these problems have to be someone else’s fault.\nAccording to Trump, the reason the reflecting pool looks like a runny plate of mushy peas full of dead ducks is because vandals cut into the hard surface at the bottom of the pool under cover of darkness. Several people were said to have been arrested for the alleged act, though the details are thin. .\nI don’t know if it “reflects” (sorry, I had to) well on the work of Atlantic Industrial Coatings if you can cut large gashes into the pool with some kind of small tool. Or maybe it was actually something more substantial, like a machete or the sword from Final Fantasy VII. I’m sure a pack of people wandering a national monument with massive blades in the middle of the night would avoid detection. Stealth is, of course, one of the primary attributes of the leftist agenda. It should also be said that Trump alleged the vandals dumped fertilizer into the pool, so add that to the midnight packing list. Might as well hire a 20-mule team to lug all that gear.\nIn response to the ongoing threat of possibly imaginary liberal ninja warriors carrying bags of manure, the government has erected a fence around the pool to keep out agitators, though the administration states that fencing was always meant to go up prior to Fourth of July festivities. It’s just apparently going up sooner to keep the pool secure. Nothing screams “beautification project” quite like a big fence. The Louvre should put up some chain-link around their artworks while we’re at it.\nNational monuments and historical landmarks are usually created for the sake of the public’s enjoyment. I might not personally see much use in staring at my own reflection, but I can see the appeal for some. Specifically Trump, who probably can’t help but take a gander at his own face staring back at him. It might be a dream he’s had more than once. There I am. Look at me. I’m so me, it’s outrageous how very me I can be. Perhaps we should just replace the pool with a large bit of mirrored glass. Pretty much the same thing, but with less bacteria fermenting. Just don’t stand too close to it at midday.\nSometimes, it feels like America is a Star Trek-style mirror universe where everything is backwards, nothing quite looks correct and everyone is sporting a goatee (metaphorically speaking). I think I’ve gotten to the point where everything not making sense has come around to making total sense. The paradox of delaying an affordable housing bill to prioritize a restrictive voting bill no one wants. The aching metaphors of the stagnant, murky pool meant to memorialize democratic progress. Is this a perverted alternate dimension reflecting back at us or just another day in soul-crushing reality?\n- \n  Dave Schilling is a Los Angeles-based writer and humorist", "translation_ja": "この太陽が照りつける夏の日々に「プール」という言葉を聞けば、ぼろぼろに皮が剥けた身体を冷やすために水にちゃぷんと浸かることを思い浮かべるかもしれない。誰もが（私を除いて）プールが大好きだ。ドナルド・トランプもプールが大好きだが、泳げるようなプールではない。近づいてもいけないし、楽しめるものでもない、そういうプールだ。\n\nリンカーン記念館の反射池の改修工事の状況は、アメリカを襲っている最大の危機となっている——少なくとも現政権に言わせればそうだ。投票権の制限がこの「政治的フットボールのワールドカップ」で僅差の2位につけているが、最も熱狂的な注目を集めているのは反射池のほうだ。緊急事態としての興奮度で言えば、公園の真ん中にある広大な静水を眺めているようなものだ。塗料が剥がれ、緑色の藻が繁殖している。\n\nこの池がオザーク山地の淀んだ湖のような見た目になってしまっていることは、世界の水資源の危うさについてかなり深刻な環境的前兆を含んでいるかもしれないが、この場所自体が巨大な国家的緊急事態というわけではない。3杯目のマティーニを飲んだ後に心拍数についてApple Watchが鳴らす警告のほうが、目の前に立っているものの逆さまの姿を映し出すだけの人工湖よりもよほど気になる。そう、あそこにある。あの建物だ。また出た。でも逆さまに。素晴らしい。\n\n反射池は、トランプ1.0の大型続編を象徴する意味のないインフラ事業の長い行列に連なる、またひとつの無意味な事業に過ぎない。ホワイトハウスの大広間、ケネディセンター、ヨーロッパに深刻なコンクリート嫉妬を起こすべく設計されたコミカルなほど巨大な凱旋門。ニュースの政治面はまるで建築ダイジェスト誌のようになってきており、正直なところ普段ならそちらのほうが読んでいて楽しい。ただし問題がある——これらの事業はことごとく失敗に向かって進んでいるように見える。どれも、政府版のおじいさんのバケツリストとでも言うべきものとしてほとんど機能していない。トランプの名前はケネディセンターから外された。大広間は訴訟と政治的駆け引きの泥沼にはまっている。反射池はぐちゃぐちゃだ。無競争契約、荒唐無稽な約束、野放しの虚栄心のパレードだ。当然のことながら、これらの問題はすべて誰か他の人間のせいでなければならない。\n\nトランプによれば、反射池が死んだアヒルの浮かぶ柔らかいマッシュピーの皿のような見た目になっているのは、暗闇に紛れて何者かが池の底の硬い表面に切り込みを入れたからだという。この行為を行ったとされる複数の人物が逮捕されたと伝えられているが、詳細は乏しい。\n\nある種の小道具で池に大きな傷をつけられるとしたら、それがアトランティック・インダストリアル・コーティングズの仕事を「反映」（失礼、言わずにはいられなかった）しているとは言えないだろう。あるいは、マチェーテやファイナルファンタジーVIIの剣のような、もっと大型のものだったのかもしれない。国定記念物を真夜中に巨大な刃物を携えて歩き回る一団が、発見を免れるというわけだ。ステルス性は、もちろん、左派のアジェンダの主要な特性のひとつだ。また、トランプは破壊工作者たちが池に肥料を投げ込んだとも主張しているため、その真夜中の荷物リストにそれも加えるとしよう。その機材をすべて運ぶために、20頭立てのラバの隊列でも雇えばいい。\n\nおそらく想像上の存在である自由主義的な忍者戦士たちが肥料袋を運んでいるという継続的な脅威に応じて、政府は煽動者を排除するために池の周囲にフェンスを設置した。もっとも政権側は、フェンスは7月4日の祝典に先立ってもともと設置する予定だったと述べており、池を守るために少し早まっただけだとしている。「美化事業」と言えばやはり大きなフェンスほど似つかわしいものはない。ルーブル美術館も作品の周りにチェーンリンクフェンスを張ってみてはどうだろう。\n\n国定記念物や歴史的建造物は通常、一般市民の楽しみのために作られる。自分自身の反射を眺めることに個人的にはあまり意味を感じないが、一部の人には魅力があることはわかる。具体的に言えば、自分の顔が映り込んでいるのを思わず見つめずにはいられないトランプにとってはそうだろう。それは彼が何度も見た夢かもしれない。あそこにいる。私を見ろ。私がこれほどまでに私であることは、どれほど私でいられるかを考えると驚くべきことだ。いっそ池を大きな鏡ガラスに替えてしまったらどうだろう。ほぼ同じことだが、細菌の発酵はない。ただし、真昼に近づきすぎないように。\n\n時々、アメリカはスタートレック式の鏡の宇宙のように感じられる——すべてが逆さまで、何もまともに見えず、全員が（比喩的な意味で）ヤギひげを生やしている。すべてが意味をなさないことが、ついにはすべてが意味をなすほどになってきた気がする。手頃な住宅法案を後回しにして誰も望んでいない投票制限法案を優先させるというパラドックス。民主主義の前進を記念するはずの、淀んだ濁った池という痛切なメタファー。これは歪んだ異次元が私たちに反射しているのか、それとも魂を押しつぶすような現実のまたの一日に過ぎないのか？\n\n―デイヴ・シリングはロサンゼルス在住のライター兼ユーモア作家", "vocab": [{"word": "fervent", "definition": "「熱烈な、激しい」という意味の形容詞。強い感情や熱意をもって何かに取り組む様子を表し、ここでは政権の反射池への過剰なほどの関心を皮肉って使われている。"}, {"word": "stagnant", "definition": "「よどんだ、停滞した」という意味の形容詞。水が流れずに腐敗している状態や、進展のない状況を表す。この記事では文字通りの池の状態と民主主義の停滞を二重に意味している。"}, {"word": "mired", "definition": "「泥沼にはまった、行き詰まった」という意味で使われる動詞の過去分詞形。困難な状況や問題から抜け出せない状態を比喩的に表現する際に用いられる。"}, {"word": "outlandish", "definition": "「奇妙な、突拍子もない」という意味の形容詞。常識を超えて異様であったり、非現実的なほど大げさな物事を指すときに使われる。"}, {"word": "alleged", "definition": "「申し立てられた、疑惑の」という意味の形容詞。事実として証明されてはいないが、主張・申告されている行為や状況を指す際に、特にジャーナリズムや法律文脈で使われる。"}, {"word": "agitator", "definition": "「扇動者、煽動家」という意味の名詞。政治的・社会的な不満を煽り立て、騒動を引き起こそうとする人物を指す。"}, {"word": "perverted", "definition": "「歪んだ、倒錯した」という意味の形容詞。本来の目的や価値から著しく逸脱し、正常でない状態に変質していることを表す。"}]}, {"title_ja": "ゴミ箱に捨てられるロティサリーチキン：スーパーマーケットで働いて毎日目撃した衝撃的な食品廃棄", "title_en": "Rotisserie Chickens in the Trash: A Supermarket Worker Exposes Daily Food Waste", "summary_ja": "元スーパーマーケットのレジ係アン・ラーソンは、常に棚を満杯に見せるというビジネスモデルが大量の食品廃棄を生み出しており、米国内で飢えや貧困が拡大している現状に照らせば許しがたいと主張する。彼女は小売・食品業界の低賃金と、企業が過剰在庫に費やす資金との間に直接的な関連があると指摘する。著者は、企業に生活賃金の支払いを強制することで、「豊かさの演出」に依存したビジネスモデルの見直しを迫ることができると訴えている。", "summary_en": "Former supermarket cashier Ann Larson argues that systemic food waste in grocery stores — driven by a business model that demands fully stocked shelves at all times — is morally indefensible given rising hunger and poverty in the US. She draws a direct link between low wages paid to retail and food-industry workers and the corporate savings that fund wasteful overstocking. The author contends that forcing companies to pay living wages would compel them to abandon a business model built on the illusion of abundance.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/26/rotisserie-chickens-in-the-trash-i-worked-in-a-supermarket-and-saw-shocking-food-waste-every-day", "state_media": false, "category": "オピニオン", "full_text": "To most grocery shoppers, rotisserie chickens look like a mouth-watering and easy option for dinner. But whenever I pass by the rotisserie case in a supermarket, I see chicken carcasses piled up in the trash, their once glistening juices congealing into a slimy jelly.\n It all started when I was working as a cashier in a chain supermarket. One day, I was chatting with a colleague about the behind-the-scenes secrets that shoppers didn’t see. The deli employee said, “Last night we tossed out about sixteen birds.” He explained that managers wanted the rotisserie chicken case to be full at all times because a full case looked appetizing, while a half empty one looked sad. Keeping the case full was an all-day affair. Workers arrived before dawn to season and roast dozens of birds. (One employee burned his arm while maneuvering chickens into the oven. He quit soon after.)\nThe seasoning and roasting continued throughout the day. As birds disappeared from the display case, workers replaced them. Finally, the store closed, and the leftover chickens were thrown out.\nJoining the conversation, a bakery employee told me that he was frustrated that between one and two cartloads of fresh bread were tossed out every night. I asked him why the bakery produced more bread than it could sell. “To make the shelves look full!” he said. It turned out that the rotisserie chicken strategy applied across the store.\nAfter I left my cashier position, I researched the supermarket industry to write a book about my job. I discovered that my store was not an outlier. In the US, up to 40 percent of food produced for consumption goes uneaten, which is one reason food is the largest contributor to landfills and accounts for up to 10 percent of greenhouse gas emissions.\nFood loss occurs all along the supply chain, from farms, where food is mishandled, to transportation and storage, where it may come into contact with rodents or insects. But according to one USDA study, the supermarket is a major culprit. Each year, about 31 percent of waste—or 133 billion pounds—occurs after food has already reached stores. One reason is exactly what I had observed on the job. Stores over-stock and then toss out anything that doesn’t sell.\nSince shoppers prefer undented boxes and unblemished produce, waste often includes edible but imperfect food. A colleague in the produce department at my store had become so disturbed by waste that she started documenting it. She sent me photos of large shopping carts brimming with boxed salad greens. Another cart contained dozens of containers of fresh berries. “We throw out between one and two carts every day,” she said. She explained that it was policy to toss food in the trash about two days before the expiration date.\nI wondered why stores didn’t just donate unsold food. Surely food banks would line up to take the items. I learned that donations would require a costly new supply chain to move products out of stores. The fact is that it is often less expensive to throw food out than to give it away. Retail companies are in the business of making money, not feeding people.\nFood waste at the supermarket is especially disturbing given that more Americans are hungry today than during the pandemic, and 70 percent of us are struggling to afford basic needs. It’s impossible to keep the cupboard stocked when wages are low and prices are high.\nFood waste is connected to broader economic trends. The food industry employs more peopl
