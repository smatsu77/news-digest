dia": false, "category": "社会"}, {"title_ja": "ワールドカップが史上最多観客動員記録を樹立、1994年の記録を更新", "title_en": "World Cup Sets All-Time Attendance Record, Surpassing 1994 Mark", "summary_ja": "FIFAワールドカップが、1994年に米国で開催された大会で記録された史上最多観客動員数を塗り替えた。この快挙は、世界的なサッカー熱の高まりと、近年導入された大会フォーマットの拡大を反映している。ロイター通信が、大会継続中における記録更新を報じた。", "summary_en": "The FIFA World Cup has broken the all-time attendance record, surpassing the previous mark set in the United States in 1994. The milestone reflects strong global interest in the tournament and the expanded format introduced in recent editions. Reuters reported the record-breaking figures as the competition continues to draw massive crowds.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMisgFBVV95cUxQa0NzZGZyMDRIeWtVd1ltMFNhdFRyeEVjNWxVb0ZTLXBHZ2JUNG9TQVEzeFY3MnlpMExoVUhUdmVBUWpoS0NBTGlvRmFiOGxvaW90dEJ6UWJkeDNZUjhWQjZQUjNfVU1oRHNOMWpQdlJnUVluOWVUWTlPc1l5TGpYUnduQlFSVGZ6V3NLUEVyOGhnbUFRUkl6VG9TLXQtaTluQ3ZodWFsOU1yUnM4aEZKSUZ3?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "最高裁、トランプ政権の厳格な亡命申請制限政策の復活を承認", "title_en": "Supreme Court Allows Trump Administration to Revive Restrictive Asylum Policy", "summary_ja": "米連邦最高裁判所は、トランプ政権が以前阻止されていた厳格な亡命申請制限政策を復活させる道を開いた。この決定により、政権は米国国境での亡命申請者の保護申請を制限できるようになる。今回の判断は移民執行政策に重大な転換をもたらし、数千人の移民に影響を与える可能性がある。", "summary_en": "The U.S. Supreme Court has cleared the way for the Trump administration to reinstate a restrictive asylum policy that had previously been blocked. The decision allows the administration to limit asylum seekers' ability to request protection at the U.S. border. The ruling marks a significant shift in immigration enforcement policy with potential impact on thousands of migrants.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMilgFBVV95cUxOdWxXMy1BZ3d6OTdfeHNlWHhMLTl2azFpZVBkNG5OQXJZdklWSDN6SndmYUZhZE9SeGZ2M3VWOXZHUUFxZTJKY05xbm9UWFNsc0p0Y1h1UnpuYjB3VDlfWVFfWkJlcjlfcXhGY2JhMlJGc05rSFVLN1RpT3ppR2FrbmJsaFMzUDB0TWNJZmhURlZxTzloUlE?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "裁判官、看護など分野の大学院生ローン制限するトランプ計画を阻止", "title_en": "Judge Blocks Trump Plan to Limit Graduate Student Loans in Nursing and Other Fields", "summary_ja": "連邦裁判官は、看護を含む複数の分野における大学院生向け連邦学生ローンを制限しようとするトランプ政権の計画を差し止めた。批判者らは、この計画が医療などの重要分野における高度教育へのアクセスを妨げると主張していた。今回の判決は、連邦学生ローン制度の見直しを図るトランプ政権にとって法的な打撃となった。", "summary_en": "A federal judge has blocked a Trump administration plan that would have restricted graduate student loans for fields including nursing. The ruling prevents limits that critics argued would have hampered access to advanced education in critical healthcare and other professional disciplines. The decision represents a legal setback for the administration's efforts to reshape federal student loan programs.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMitAFBVV95cUxOOU1kT21laktoN1N4SUNxd2xWcWMwY3FSVmVucTJJQ05WWEhDZ1dNYkpzR2FwMlRzWWwzTnRIZnladVE4UjV0ZDgyMHp1eno1dzJMbjRyZlF2MUMxMjE1eXJhQ19kT3BjZ0MxUzk5dDVYQ3pURFRyNmM4dXdkOU93RlRLeTBfM1F1TTFtNzRlTDNwZ1gzZHp1bFU0ZmU4SjJmeG1jUndVc0xGSUhwZHZrWk13UzQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "最高裁、トランプ政権によるハイチ人・シリア人への法的保護終了を容認", "title_en": "Supreme Court Allows Trump Administration to End TPS Protections for Haitians and Syrians", "summary_ja": "米連邦最高裁判所は、トランプ政権がハイチ人およびシリア人移民数十万人に対する一時的保護資格（TPS）を終了することを認める判断を下した。TPSは母国の危険な状況を理由に対象者を強制送還から保護してきたが、今回の判決によりその法的根拠が失われることになる。この裁定はトランプ政権の移民取り締まり強化方針にとって重要な勝利となる。", "summary_en": "The U.S. Supreme Court has ruled in favor of the Trump administration, permitting it to terminate Temporary Protected Status (TPS) for hundreds of thousands of Haitian and Syrian immigrants. The decision clears a legal path for the administration to strip deportation protections from these groups, who had been shielded due to unsafe conditions in their home countries. The ruling represents a significant victory for the administration's immigration enforcement agenda.", "source": "AP", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMiowFBVV95cUxPTFZFZDU5c1hnMWFhOTcxa196M1NaZ09RU3lNOWxOQm56ekRKNkhYX19OSDhuNWxoejI0TDV1eWtuWlR5Z3JYZHRRWU9pcENHTlRrajdYSDZvNkNtMVZnc1E1TXNkbk10UUZIUWM4THBfd3pRNlBoUUVCRTZxVDlfaW45RmxrVUtLb0w3NG9IVEQwSEZLQVBubEZ6LXRnWnNUTjZF?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "地震がベネズエラに壊滅的打撃――政治的混乱の最中に", "title_en": "Earthquake Delivers Devastating Blow to Venezuela Amid Political Uncertainty", "summary_ja": "強力な双子地震がベネズエラを襲い、6か月前に米国当局に逮捕された元大統領マドゥロ失脚後の混乱に追い打ちをかけた。暫定大統領デルシー・ロドリゲスは非常事態を宣言し、マドゥロ時代の方針を転換して米国や複数の右派政権からの支援を受け入れた。長年の行政の失敗と軍による省庁支配により、ベネズエラのインフラは老朽化しており、災害対応能力の低さが深刻な課題となっている。", "summary_en": "A powerful twin earthquake has struck Venezuela, compounding the difficulties of a country already in turmoil following the arrest of former president Nicolás Maduro by US forces six months ago. Interim president Delcy Rodríguez declared a state of emergency and, in a notable break from Maduro-era policy, welcomed aid from the United States and several right-wing governments. Years of mismanagement, military control of key ministries, and crumbling infrastructure have left Venezuela poorly equipped to handle the disaster.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c3vynpw7rk4o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "大地震2回でベネズエラ沿岸部に甚大な被害、空撮映像が惨状を捉える", "title_en": "Aerial footage reveals widespread destruction in coastal Venezuela after two major earthquakes", "summary_ja": "水曜日にベネズエラで大地震が2回発生し、首都カラカスの北に位置する沿岸都市ラグアイラに深刻な被害をもたらした。空撮映像では、市内各所で複数階建ての建物が倒壊している様子が確認されている。緊急対応チームが被災地域の被害状況の把握を進めている。", "summary_en": "Two major earthquakes struck Venezuela on Wednesday, causing significant destruction in the coastal city of La Guaira. Aerial footage has captured the collapse of multi-storey buildings across the city, which lies north of the capital Caracas. The scale of the damage is becoming clearer as emergency teams assess the affected areas.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/videos/c75y1kd16qdo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会"}, {"title_ja": "ホルムズ海峡で貨物船が攻撃を受け、国連が船員避難計画を一時停止", "title_en": "UN Pauses Hormuz Evacuation Plan After Cargo Ship Hit by Projectile", "summary_ja": "国連の国際海事機関（IMO）は、シンガポール船籍の貨物船「エバー・ラブリー」が正体不明の飛翔体に被弾したことを受け、ホルムズ海峡で足止めされている1万1000人以上の船員の避難計画を一時停止した。米当局者はこの攻撃がイランによるものだと述べており、イランはIMO指定ルートを使用する船舶に対して安全を保証しないと事前に警告していた。IMO長官は、安全の保証と航行の明確性が確保されるまで計画を停止すると発表した。", "summary_en": "The UN's International Maritime Organization has suspended its evacuation plan for over 11,000 stranded sailors in the Strait of Hormuz after a Singapore-flagged cargo ship, the Ever Lovely, was struck by an unknown projectile. US officials attributed the attack to Iran, which had warned that vessels using IMO-designated routes without coordinating with Tehran would face danger. The IMO chief said the pause would continue until safety guarantees and navigational clarity could be secured.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cjwg9np904qo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治"}, {"title_ja": "米最高裁がバイエルに有利な判決　除草剤ラウンドアップ訴訟で大きな転換点", "title_en": "US Supreme Court Hands Bayer Major Victory in Roundup Cancer Lawsuit Battle", "summary_ja": "米最高裁判所は7対2の多数決で、ラウンドアップの発がんリスク警告表示をめぐる訴訟において、原告が州裁判所でバイエルを訴えることはできないと判断した。連邦規制当局が警告表示を義務付けていない以上、各州が独自に企業に警告追加を強制することはできないとした。バイエルは2018年のモンサント買収以来約1兆6000億円を支払ってきたが、今回の判決により残存する訴訟の早期解決に向けた交渉が有利になるとみられている。", "summary_en": "The US Supreme Court ruled 7-2 that plaintiffs cannot sue Bayer in state courts over missing cancer warnings on its Roundup weedkiller, since federal regulators do not require such warnings. The decision is a significant win for Bayer, which inherited tens of thousands of lawsuits after acquiring Monsanto in 2018 and has already paid around $11 billion to settle roughly 100,000 cases. While the ruling blocks a key category of claims, thousands of other lawsuits alleging negligence, misleading marketing, and product defects remain active.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/bayer-why-so-many-roundup-weedkiller-lawsuits/a-77717842?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治"}, {"title_ja": "バロチスタンの活動家マフラング・バローチに終身刑、不安定化を懸念する声", "title_en": "Balochistan Activist Mahrang Baloch Sentenced to Life in Prison, Sparking Fears of Unrest", "summary_ja": "パキスタンの反テロ裁判所は2026年6月25日、2024年のグワダル抗議活動中に起きた准軍事兵士殺害をめぐり、人権活動家マフラング・バローチと同僚のシブガトゥッラー・シャージに終身刑を言い渡した。バローチはバロチスタン統一委員会（BYC）の指導者として強制失踪問題を訴えてきた人物で、容疑を否認し控訴する方針。人権団体は今回の判決が非暴力的な政治的異議申し立てをさらに抑圧し、武装抵抗への支持拡大につながりかねないと警告している。", "summary_en": "A Pakistani anti-terrorism court sentenced civil rights activist Mahrang Baloch and fellow activist Sibghatullah Shahji to life imprisonment on June 25, 2026, over the killing of a paramilitary soldier during a 2024 protest in Gwadar. Baloch, a prominent campaigner against enforced disappearances and leader of the Balochistan Unity Committee, denies the charges and plans to appeal. Rights groups warn the verdict could further suppress nonviolent political dissent and push more people in the restive province toward armed resistance.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/balochistan-activist-s-life-sentence-raises-fear-of-unrest/a-77721686?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "インド最新情報：カタール爆発死亡者の遺体帰還、アーシュラー祭、西ベンガルの給食論争", "title_en": "India Roundup: Qatar Gas Blast Victims Repatriated, Ashura Observed, Egg Row in West Bengal", "summary_ja": "カタールのラスラファン工業地区で起きたガス爆発により死亡した4人のインド人の遺体が本国に送還された。インド全土のムスリムがアーシュラーを祝う中、モディ首相はイマーム・フサインの犠牲を称えるメッセージを発表した。また、西ベンガル州のBJP政権が学校給食から卵を外して菜食主義メニューに変更する計画を示したことで政治的論争が巻き起こり、「ゴキブリ」抗議運動の創設者はBJP党員が記者を暴行したと訴えている。", "summary_en": "The bodies of four Indian nationals killed in Qatar's Ras Laffan gas explosion have been repatriated to India. Indian Muslims observed Ashura while Prime Minister Modi paid tribute to Imam Hussain's sacrifice. Meanwhile, West Bengal's BJP government sparked controversy by planning to replace eggs with vegetarian items in school midday meals, and the 'Cockroach' protest movement alleged BJP workers assaulted journalists at a New Delhi demonstration.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/india-news-bodies-of-four-indians-killed-in-qatar-gas-blast-repatriated/live-77716985?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会"}, {"title_ja": "ベネズエラ地震の死者235人に、米墨など国際救助隊が捜索活動に参加", "title_en": "Venezuela Earthquake Death Toll Rises to 235 as International Rescuers Join Search", "summary_ja": "ベネズエラを襲った2度の強い地震により、少なくとも235人が死亡し、数千人が負傷した。アメリカやメキシコなどの国際救助隊が現地に派遣され、がれきの下に取り残された生存者の捜索活動に加わっている。依然として数百人が行方不明または救出を待っており、被災地での復旧作業が急ピッチで進められている。", "summary_en": "Two powerful earthquakes struck Venezuela, killing at least 235 people and injuring thousands more. International rescue teams from the United States and Mexico joined the urgent search for survivors still trapped under rubble. Hundreds of people remain missing as recovery efforts intensify across the affected regions.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/26/world/venezuela-earthquake", "state_media": false, "category": "社会"}, {"title_ja": "イラン、貨物船攻撃の翌日にホルムズ海峡の管轄権を主張", "title_en": "Iran Asserts Authority Over Strait of Hormuz After Attacking Cargo Ship", "summary_ja": "イランは、オマーン沿岸付近を航行するコンテナ船に攻撃を加えた翌日、ホルムズ海峡の通行を管理する権利を主張する声明を発表した。この動きは、世界有数の重要な海上輸送路に対する支配権を強化しようとするイランの意図を示している。今回の事態により、ペルシャ湾における航行の自由と地域の安全保障への懸念が改めて高まっている。", "summary_en": "Iran issued a statement asserting its right to control traffic in the Strait of Hormuz, one day after firing on a container ship traveling near Oman's coast. The move signals Iran's intention to exert greater control over one of the world's most critical shipping lanes. The incident raises fresh concerns about freedom of navigation and regional security in the Persian Gulf.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/26/world/middleeast/strait-of-hormuz-iran-attack.html", "state_media": false, "category": "社会"}, {"title_ja": "3ヶ月の戦争が湾岸諸国の防衛・経済戦略を根本から変える", "title_en": "Three Months of War Reshape Gulf Arab Defense and Economic Strategies", "summary_ja": "米国とイランの合意交渉が自国の安全を脅かすと懸念する湾岸アラブ諸国は、防衛戦略・経済政策・貿易ルートの抜本的な見直しを迫られている。3ヶ月にわたる紛争を契機に、湾岸諸国は米国の安全保障への依存を減らすべく地域的な再編を加速させている。各国は新たなパートナーシップを構築し、急変する地政学的環境に対応するため重要な貿易インフラの再構築を進めている。", "summary_en": "Gulf Arab countries are fundamentally restructuring their defense strategies, economies, and trade routes in response to a potential U.S.-Iran deal they fear leaves them exposed. The three-month conflict has accelerated a regional realignment as Gulf states seek to reduce dependence on American security guarantees. Nations across the Gulf are forging new partnerships and rerouting critical trade infrastructure to adapt to a rapidly shifting geopolitical landscape.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/26/world/middleeast/gulf-changed-forever-iran-war.html", "state_media": false, "category": "経済"}, {"title_ja": "人質交渉の膠着打開でパレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルはガザ地区を二分する軍事区域の通過を避難民に許可し、パレスチナ人が北ガザへ徒歩で帰還し始めた。この動きは、これまで膠着していた人質解放をめぐる交渉が突破口を開いたことを受けたものである。今回の展開は、ガザ地区内の人道状況における重大な転換点となる。", "summary_en": "Israel has permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The movement follows a breakthrough in negotiations over hostage releases, which had previously stalled the process. The development marks a significant shift in the humanitarian situation within the enclave.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治"}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss, Deepening Property Sector Crisis", "summary_ja": "中国の大手不動産デベロッパーである万科（バンケ）が巨額の損失を報告し、同国の不動産危機が引き続き拡大していることが浮き彫りになった。万科の経営難は、中国不動産市場全体の先行きに対する懸念を新たに高めている。中国政府が事態悪化を防ぐために介入するかどうかに、市場関係者の注目が集まっている。", "summary_en": "Leading Chinese property developer Vanke has reported a massive financial loss, signaling that the country's real estate crisis continues to spread. The troubles at Vanke raise fresh concerns about the broader health of China's property market. Analysts and investors are now watching closely to see whether the Chinese government will intervene to prevent further deterioration.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会"}, {"title_ja": "解放されたイスラエル人人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "ガザから解放されたイスラエル人人質の体内に、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。イスラエルの医療当局者によると、一部の女性は長期間にわたり単独で拘束され、約8カ月をトンネル内で過ごしたという。これらの事実は、人質たちが拘束中に受けた深刻な身体的・精神的被害を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack. An Israeli medical official revealed that some of the women were held in isolation for extended periods and spent approximately eight months confined in tunnels. The disclosures highlight the severe physical and psychological toll endured by the hostages during their captivity.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会"}, {"title_ja": "コンゴ民主共和国でエボラ陽性者約300人の行方不明が判明", "title_en": "Nearly 300 Ebola-Positive People Unaccounted For in DR Congo Outbreak", "summary_ja": "アフリカCDCのジャン・カセヤ事務局長は、コンゴ民主共和国でエボラウイルス陽性と確認された約300人の所在が不明であり、100万人以上の避難民が医療従事者の立ち入れないキャンプで生活していると警告した。世界保健機関（WHO）がランセット誌に発表した予測では、9月中旬までに約8,210人が感染し1,420人が死亡するとされ、南スーダンへの感染拡大の可能性も70%と試算されている。治療センターの病床占有率はすでに95%に達しており、国際社会からの資金援助は誓約額の13%しか実際に供給されていない。", "summary_en": "Africa CDC director general Dr Jean Kaseya warned that nearly 300 people who tested positive for Ebola in the Democratic Republic of Congo are unaccounted for, with over one million displaced people living in camps inaccessible to health workers. WHO projections published in the Lancet forecast up to 8,210 cases and 1,420 deaths by mid-September, with a 70% chance the outbreak spreads to South Sudan. Only 13% of pledged international funding has been delivered, while bed occupancy in treatment centres has reached 95% and the outbreak has not yet peaked.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc", "state_media": false, "category": "社会"}, {"title_ja": "ソマリア政府をSNSで批判した女性に禁錮3年の判決、国内外で怒りの声", "title_en": "Somali woman jailed three years for criticising government on social media amid outrage", "summary_ja": "27歳の看護学卒業生サディア・モアリム・アリ氏が、フェイスブックとTikTokでソマリア連邦政府の失業問題や汚職を批判したとして、6月25日にバナーディル地域裁判所から禁錮3年の判決を受けた。元大統領シャリフ・シェイフ・アフメド氏や元首相ハサン・アリ・ハイレ氏らが「根本的に不当」と判決を強く非難し、即時釈放を求める声が上がっている。1歳の娘を持つアリ氏は拘留中に拷問を受けたと訴えており、弁護側は判決を不服として控訴する方針を示している。", "summary_en": "Sadia Moalim Ali, a 27-year-old nursing graduate and rickshaw driver, was sentenced to three years in prison by a Banaadir Regional Court on 25 June for criticising Somalia's federal government on Facebook and TikTok over unemployment, fuel prices, and alleged corruption. The ruling has been condemned as 'fundamentally unjust' by former Somali president Sharif Sheikh Ahmed, ex-prime minister Hassan Ali Khaire, and human rights organisations. Ali, who has a one-year-old daughter and says she was tortured in custody, plans to appeal the conviction.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/26/woman-sadia-moalim-ali-three-year-jail-sentence-somalia-online-comments-governement", "state_media": false, "category": "政治"}, {"title_ja": "ジンバブエ上院、大統領任期を2030年まで延長する憲法改正を可決", "title_en": "Zimbabwe Senate Approves Constitutional Changes to Extend Mnangagwa's Rule to 2030", "summary_ja": "ジンバブエ上院は賛成75、反対4で、大統領任期を5年から7年に延長し、ムナンガグワ大統領の在任を2030年まで認める憲法改正案を可決した。同改正案はさらに直接大統領選挙を廃止し、議会による大統領指名制度に移行する内容も含み、野党勢力は「憲法クーデター」と強く非難している。協議プロセス中に反対派が当局による嫌がらせや暴行を受けたと訴える一方、政府は改正が安定と政策継続性をもたらすと主張している。", "summary_en": "Zimbabwe's senate voted 75-4 to approve constitutional amendments that would extend presidential terms from five to seven years, allowing President Emmerson Mnangagwa to remain in office until 2030. The bill also replaces direct presidential elections with parliamentary appointment of the president, prompting opposition figures to condemn the changes as a 'constitutional coup.' Critics report harassment and physical assaults by state agents during the consultation process, while the government insists the reforms promote stability and received overwhelming public support.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/25/constitutional-coup-zimbabwe-senate-approves-presidential-term", "state_media": false, "category": "政治"}, {"title_ja": "大学生の学力は思っているより低い", "title_en": "Students are doing worse than you think", "summary_ja": "新たな調査により、大学や大学院に通う学生の学力が一般的に考えられているよりも大幅に低いことが明らかになった。高等教育機関に在籍する一部の学生は、10歳児と同等の学力しか持っていないことがテストで示された。この結果は、教育水準や大学の学位の真の価値について深刻な疑問を投げかけている。", "summary_en": "A new analysis reveals that academic performance among college and university students is significantly lower than commonly assumed. Some students at higher education institutions are testing at the same level as ten-year-old children. The findings raise serious questions about educational standards and the true value of a university degree.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会"}, {"title_ja": "権威主義国家が台頭する紛争調停の世界", "title_en": "Autocracies Are Reshaping Global Conflict Mediation", "summary_ja": "権威主義体制の国々が国際的な紛争調停の場で存在感を高め、従来の民主主義国による仲介の役割を侵食しつつある。こうした独裁的な調停者が結ぶ合意は、自国の政治的価値観や利益を色濃く反映しており、民主主義国主導の和平とは異なる性質を持つ。この変化は、そのような和平合意の長期的な持続可能性や公正性に対する懸念を呼び起こしている。", "summary_en": "Authoritarian regimes are increasingly stepping into the role of international peacemakers, displacing traditional democratic mediators. The deals brokered by these autocracies tend to reflect their own political values and interests, producing agreements that look markedly different from those forged under liberal democratic auspices. This shift raises questions about the long-term durability and fairness of such settlements.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会"}, {"title_ja": "アジアの同盟国、トランプ氏との緊密な関係を余儀なくされる", "title_en": "Asian Allies Have No Choice But to Embrace Trump", "summary_ja": "日本をはじめとするアジアの同盟国は、トランプ米大統領の予測不可能な言動にもかかわらず、米国との緊密な関係を維持せざるを得ない状況に置かれている。中堅国による連合体構築という代替案は現実的でないことが明らかになっており、中国への抑止力として米国に代わる存在は地域には存在しない。そのため、アジア諸国はトランプ政権の要求に伴うコストを受け入れながらも、依存する安全保障の傘を守ろうとしている。", "summary_en": "Japan and other Asian allies find themselves compelled to maintain close ties with the United States under Donald Trump, despite his unpredictability. The idea of building middle-power coalitions as an alternative has proven unrealistic, as no regional grouping can substitute for American deterrence against China. Asian nations are therefore accepting the costs of Trump's demands in order to preserve the security umbrella they depend on.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会"}, {"title_ja": "熱波7日間でフランスの病院が「限界点」に到達", "title_en": "French Hospitals Reach 'Tipping Point' After Seven Days of Heatwave", "summary_ja": "フランスでは7日間続く記録的な熱波により、全国の病院が深刻な過負荷状態に陥っている。熱中症関連の入院患者が急増し、医療スタッフと施設は対応に追われている。当局は高齢者や体の弱い人々に対し、引き続き警戒するよう呼びかけている。", "summary_en": "French hospitals are under severe strain following seven consecutive days of intense heatwave conditions. Medical staff and facilities are struggling to cope with a surge in heat-related admissions, pushing the healthcare system to a critical threshold. Authorities are urging vulnerable populations to take precautions as the extreme heat shows little sign of abating.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/france/article/2026/06/26/french-hospitals-at-tipping-point-after-seven-days-of-heatwave_6754898_7.html", "state_media": false, "category": "政治"}, {"title_ja": "熱波への備え不足をめぐり、マクロン大統領とルコルニュ首相が批判にさらされる", "title_en": "Macron and PM Lecornu on defensive over France's heatwave unpreparedness", "summary_ja": "フランスのマクロン大統領とルコルニュ首相は、大規模な熱波に対する準備不足をめぐって批判を受けている。政府の対応に対する世論と政界からの scrutiny が高まる中、両指導者は守勢に立たされている。この論争は、フランスの気候への適応力と緊急時対応計画についての広範な疑問を提起している。", "summary_en": "French President Macron and Prime Minister Lecornu are facing criticism over France's perceived lack of preparation for a major heatwave. The two leaders have been put on the defensive as public and political scrutiny intensifies regarding the government's response to the extreme heat event. The controversy raises broader questions about France's climate resilience and emergency planning.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/politics/article/2026/06/26/heatwave-macron-and-pm-lecornu-on-the-defensive-after-criticism-over-france-s-lack-of-preparation_6754900_5.html", "state_media": false, "category": "政治"}, {"title_ja": "ロシア、スロビャンスクからクラマトルスクにかけてドンバス後方地域に圧力を継続", "title_en": "Russia Keeps Constant Pressure on Ukraine's Donbas Rear Zone from Sloviansk to Kramatorsk", "summary_ja": "ロシア軍はウクライナ東部ドンバス戦線の後方地域、特にスロビャンスクとクラマトルスク間の回廊に対して絶え間ない軍事的圧力をかけ続けている。この2都市はウクライナ軍にとって東部防衛における重要な兵站・戦略拠点となっている。持続的な圧力は、ロシアがウクライナの補給線と指揮インフラを不安定化させようとする意図を示している。", "summary_en": "Russian forces are maintaining relentless military pressure on the rear area of the Donbas front, targeting the corridor between Sloviansk and Kramatorsk. These two cities serve as critical logistical and strategic hubs for Ukrainian defenses in eastern Ukraine. The sustained pressure signals Russia's intent to destabilize Ukrainian supply lines and command infrastructure in the region.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/26/ukraine-s-donbas-rear-area-from-sloviansk-to-kramatorsk-is-under-constant-russian-pressure_6754889_4.html", "state_media": false, "category": "政治"}, {"title_ja": "欧州の歴史的都市は温暖化する気候を生き延びられるか", "title_en": "Can Europe's Historic Cities Survive a Warming Climate?", "summary_ja": "欧州では記録的な熱波が頻発しており、寒冷気候を前提に建設された都市の構造的な脆弱性が露わになっている。ロンドンやパリなどの都市は断熱性や冷房設備が不十分で、2022年夏には熱中症による死者が6万人を超えるなど対策の遅れが顕著だ。歴史的建造物の保存と気候変動への適応という二つの要求は、欧州の都市にとってほぼ相反する課題となっている。", "summary_en": "Europe is experiencing an intensifying heatwave crisis, with record-breaking temperatures exposing the structural inadequacy of its built environment. Cities like London and Paris, historically designed for cold climates, lack sufficient insulation or air conditioning, while heat-related deaths remain in the tens of thousands each summer. Preserving historic architecture while adapting to climate change presents a near-impossible tension for a continent whose identity is rooted in its past.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/opinions/2026/6/26/can-europes-historic-cities-survive-a-warming-climate?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "IAEAがイランの核検証強化を要求、米イラン間で「声明戦争」続く", "title_en": "IAEA Demands Strong Verification System for Iran's Nuclear Program Amid US-Iran Statement Dispute", "summary_ja": "IAEAのラファエル・グロッシ事務局長は金曜日、イランの核施設への完全なアクセスを求め、意図の表明だけでは不十分として強固な検証体制の構築を訴えた。米国とイランは今月署名した14項目の覚書の内容をめぐり相反する主張を展開しており、米国は核査察への合意を強調する一方、イランは制裁解除を条件に挙げて協議が限定的だとしている。昨年の米・イスラエルによる攻撃で被爆した核施設へのアクセスはいまだ認められておらず、濃縮ウランの在庫も未確認のままとなっている。", "summary_en": "IAEA Director General Rafael Grossi called Friday for a robust verification system to monitor Iran's nuclear program, stressing that intentions alone are insufficient and inspectors must have full access to nuclear sites. The demand comes as the US and Iran issue conflicting claims over what was agreed in a 14-point memorandum of understanding, with Washington insisting inspections are fully agreed upon while Tehran says the issue remains unresolved pending US sanctions relief. Iran has yet to grant access to nuclear sites bombed during last year's US-Israeli strikes, and its enriched uranium stockpiles remain unaccounted for.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/26/iaea-demands-strong-verification-of-irans-nuclear-programme?traffic_source=rss", "state_media": false, "category": "政治"}, {"title_ja": "対イラン戦争で最も利益を得たのは誰か", "title_en": "Who Has Profited Most From the US-Israel War on Iran?", "summary_ja": "米国とイスラエルがイランへの攻撃を開始してから約4カ月、エネルギー企業・防衛関連企業・投資銀行は市場の混乱を背景に急激な利益増を記録した。ブレント原油が一時1バレル126ドルに達する中、サウジアラムコやBP、シェル、トタルエナジーズはいずれも前年比で大幅増益を報告した。現在はスイスで60日間の停戦を枠組みとした協議が進んでおり、原油価格は低下しつつあるため、この利益が持続するかどうかは不透明な状況だ。", "summary_en": "Since the United States and Israel launched strikes on Iran nearly four months ago, energy companies, defence contractors, and investment banks have seen profits soar amid market disruption. Saudi Aramco, BP, Shell, and TotalEnergies all reported sharply higher first-quarter earnings as Brent crude briefly hit $126 a barrel. A 60-day ceasefire and ongoing talks in Switzerland have since pushed prices lower, raising questions about how long the windfall will last.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/26/who-has-profited-most-from-the-war-on-iran?traffic_source=rss", "state_media": false, "category": "経済"}, {"title_ja": "「フラッグゲート」：イスラエル、分離主義者のジェノサイド否定論者を招待し物議を醸す", "title_en": "FlagGate: How Israel Sparked Controversy by Hosting a Separatist Genocide Denier", "summary_ja": "イスラエルがジェノサイドを否定する分離主義者を招待したことで、外交的な嵐の中心に立たされた。「フラッグゲート」と呼ばれるこの事件は広範な批判を呼び、イスラエルの外国人ゲスト審査のあり方に疑問を投げかけた。この論争は、イスラエルが国際関係と公共外交において維持すべき微妙なバランスを浮き彫りにしている。", "summary_en": "Israel found itself at the center of a diplomatic storm after hosting a figure known for denying genocide and holding separatist views. The incident, dubbed 'FlagGate,' triggered widespread criticism and raised questions about Israel's vetting of foreign guests. The controversy highlights the delicate balance Israel must maintain in its international relationships and public diplomacy.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMilwJBVV95cUxPZW5XSWthdTJPbTkwUkprdEMxSmQ2RnQweW5iTDVyWnV5OHFMZ0QxcXRMLUNMRGhXdEFGVWNLaVQxeUp4SUk5ZlM0SlVQcXlZSXpEc2FsNGFDdEJCZjg0bG9sZ215Y1MtMHpteTFPb0hUZndfYmFFUUJib05FdmRIWGR6T19qclgzZkNNY3RGR2k2UEpEbmVaLVVZYm9sYkg2NDJGazItVGF5aDZINTdOSHMtZlBLVXBOZEU5bGNtcm9XN2djbGtubzh5V1NYWUN1N19rZ1V3dk9TTFllRVdtUWdMVElFaGJ3WWdjMVZwMjQ4SGJkZmd4elU3NTRuR2tYVUtPZ2szUEgtWUUyWTRxMm5UZ1BfTnM?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "ユダヤ系進歩派がニューヨーク予備選で圧勝、AIPACは失望を表明", "title_en": "AIPAC Disappointed as Jewish Progressives Sweep New York Primary", "summary_ja": "ユダヤ系進歩派の候補者たちがニューヨーク州の予備選挙で大きな勝利を収め、親イスラエルロビー団体AIPACが支援する候補者たちを破った。AIPACは多額の資金を投じて支持候補の当選を目指していたが、今回の結果は同団体にとって大きな打撃となった。この結果は、ニューヨーク州民主党内における進歩派の影響力の高まりを示すものとなった。", "summary_en": "Jewish progressive candidates celebrated a significant victory in New York primary elections, defeating candidates backed by the pro-Israel lobbying group AIPAC. The results mark a notable setback for AIPAC, which had invested heavily in supporting its preferred candidates. The outcome signals growing progressive influence within New York's Democratic political landscape.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMihAJBVV95cUxNM2k1UG9OeWsybHNRSzM5S2xZTmdtWjZLSDZneS1hNURhbGVZVy1SMi1YLUpBcWF1bjljeWRDY1I4dmpzalZKcEMxWUN6LUpkUk9CUks0WENFOGRvSmh5M0phSWxzWjZCMDZIQlZWZUMzSmgxUlVIYnE2Qzc2d21MWGxVdEtpT1NtaVZBN01MTWZLajhEUUNuYUlyZWg4QmVaY1U0TnRhZzBETDN4UE5EQXh1ZTZqcWJVSEliVmROS2JhYWlSaW9aQ3E2OHYxc2pJaDZGOHVITU5RVWRDRjgxZDBPQVRTRTdLa1NyUzNQYjBucjRkMjJZZHhuVlJEbkRuNjVadw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "「民族浄化3.0」：イスラエルはいかにして「移送国家」となったか", "title_en": "Ethnic Cleansing 3.0: How Israel Became the Transfer State", "summary_ja": "ハアレツ紙の論説記事は、イスラエルが著者の言う「移送国家」へと変容し、パレスチナ人に対する民族浄化政策を推進していると主張している。記事は現在のイスラエルの政策を、歴史的な先例に基づく組織的な人口排除の第三段階として位置づけている。著者は、この変化がイスラエルの政治的アイデンティティとパレスチナ人への対応における根本的な転換を示すものだと論じている。", "summary_en": "A Haaretz opinion piece argues that Israel has undergone a transformation into what the author calls a 'transfer state,' pursuing a policy of ethnic cleansing against Palestinians. The piece frames current Israeli policies as the third iteration of systematic population displacement, building on historical precedents. The author contends that this shift represents a fundamental change in Israel's political identity and its approach to the Palestinian population.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi-AFBVV95cUxONWZva2FfeUtuOVhVRWI5LW5oZFhGWWdCSG5DX1BZb2IzSllhNFlULUhXOTZCQWFjLWZ2ZngtR3FOSDJOUGtRNVpsX1E1aTVzbWlzS2Y5SkJLN3JJWmNaUUlSMVE2eDFpeFJCRGFYQ1NNRmV2WWJPMDRuc0pZVWdxbUdTRF92Nkk4YkF0aXV6TFBzMk5zWlBab1F6VkVFdXp0SUJEbVprR2hUTmxPY0VZMENmY2NReDVwZXIwbEJPZk5rWmpuaVFZRXI2MV80Z21sV1pYTUFkUjgxb1VuenFGbEF6S2lRREhyR2U4UEhBcXJERlpMTzZTNQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "国防省（Mindef）ニュース更新 – 2026年6月26日", "title_en": "Mindef News Update – June 26, 2026", "summary_ja": "シンガポール国防省（Mindef）は2026年6月26日（金）、ストレーツ・タイムズを通じて最新情報を発表した。このお知らせはニュースレター形式で配信され、メールが正しく表示されない場合はウェブリンクからの閲覧が案内された。読者は追加の無料ニュースレターへの登録や、既存の購読管理も行えるとされている。", "summary_en": "The Singapore Ministry of Defence (Mindef) released an update on Friday, June 26, 2026, as reported by The Straits Times. The notice was distributed via newsletter and directed recipients to view it properly through a web link if the email format was not displaying correctly. Readers were also invited to sign up for additional free newsletters and manage their existing subscriptions.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治"}, {"title_ja": "イブニングアップデート – ストレーツ・タイムズ", "title_en": "Evening Update – The Straits Times", "summary_ja": "ストレーツ・タイムズは2026年6月26日金曜日にイブニングアップデートニュースレターを配信した。このブリーフィングでは、その日のトップニュースが厳選して読者に届けられる。読者は提供されたリンクからニュースレターの購読管理や新たな無料ニュースレターへの登録が可能となっている。", "summary_en": "The Straits Times published its Evening Update newsletter on Friday, June 26, 2026. The briefing provides subscribers with a curated roundup of the day's top news stories. Readers can manage their newsletter subscriptions or sign up for additional free newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治"}, {"title_ja": "モーニング・ブリーフィング – ストレーツ・タイムズ", "title_en": "Morning Briefing – The Straits Times", "summary_ja": "ストレーツ・タイムズのモーニング・ブリーフィングは、その日のトップニュースを読者にお届けする毎日配信のメールニュースレターです。今回の号は2026年6月26日（金曜日）付となっています。読者はリンクを通じて購読管理や追加の無料ニュースレターへの登録が可能です。", "summary_en": "The Straits Times Morning Briefing is a daily email newsletter delivering top news summaries to subscribers. This edition is dated Friday, June 26, 2026. Readers can manage their subscription or sign up for additional free newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治"}, {"title_ja": "持続可能性の修辞と経済現実：矛盾を解消できるか？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、持続可能性目標と途上国が直面する経済的压力の間に高まる緊張を検証している。政府や企業が環境への取り組みを掲げる一方、経済成長を犠牲にせずに真の構造改革が実現できるかを問いかけている。環境へのコミットメントと財政的現実を両立させることが本当に可能なのか、それとも理想論にとどまるのかを考察している。", "summary_en": "The Jakarta Post examines the growing tension between sustainability goals and economic pressures facing developing nations. As governments and businesses champion green rhetoric, the article questions whether real structural changes can be achieved without sacrificing economic growth. The piece explores whether reconciling environmental commitments with financial realities is genuinely possible or remains an aspirational paradox.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済"}, {"title_ja": "コモド島への観光客が増加", "title_en": "Tourist Visits to Komodo Island on the Rise", "summary_ja": "世界最大のトカゲであるコモドオオトカゲの生息地として知られるコモド島で、観光客数が増加している。この島はインドネシアを代表する観光地として人気が高まっており、多くの旅行者を引き付けている。当局はコモドオオトカゲの生息環境保護を確保するため、観光客増加の動向を注視している。", "summary_en": "Komodo Island, home to the world's largest living lizard, is experiencing a surge in tourist arrivals. The increase in visitors highlights the island's growing popularity as a premier destination in Indonesia. Authorities are monitoring the trend to ensure the conservation of the Komodo dragon habitat remains protected.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikwFBVV95cUxOQnVENlpVakhEVnVrUXdKUzdjUVljNjJzQ2pMRnliQTB5Wm4xV01fdEx3Y3JwaWcxc3Z3SUM2U1MyLU9fNHV6MFJ6MTRmN2E1NTBMZlZKU3d0NGZ2VU0yUVBEZzF4NG4xdTE2NmFXVDQ3TDYyMHRQQ1FaeVhDaVFmWkE1ZmpWOHhiNmxRd0NmbnpSdlk?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "なぜユーラシアは待てないのか：現代のための憲章", "title_en": "Why Eurasia Cannot Wait: A Charter for Our Time", "summary_ja": "ジャカルタ・ポスト紙は、ユーラシアが緊急の地政学的・経済的課題に直面しており、即時の集団的行動が必要だと主張するオピニオン記事を掲載した。この記事は、グローバルな力の均衡が変化する中で、ユーラシア諸国間の協力を導く新たな基本憲章の策定を求めている。こうした枠組みの構築を遅らせることは、大陸全体の不安定化を深めるリスクがあると強調している。", "summary_en": "The Jakarta Post publishes an opinion piece arguing that Eurasia faces urgent geopolitical and economic challenges that demand immediate collective action. The article calls for a new foundational charter to guide cooperation among Eurasian nations in an era of shifting global power. It emphasizes that delays in establishing such a framework risk deepening instability across the continent.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMinAFBVV95cUxOcm1yckdSalducXB1dXFhdnZDQ3VXdjZZdXc1TXFpYTBLNGwxSkNXN2tXODlxY1REYUhpSDk4TllaenNWTkVDaEs1cXkyeXZYbWJqdXNKbHdpOXZzdHdDNTJUQ0JVaUQzY2JyeURDMFlYX2tCNG5WcWkzOFlkTjhwMnJzREZRMWZoNnBiYzB3eXlVNGxDcXdsU0UzMnk?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "国連、イラン核合意に「非常に強固な」検証体制の必要性を強調", "title_en": "UN Calls for Strong Iran Nuclear Verification After West Asia Conflict", "summary_ja": "国連原子力機関（IAEA）のラファエル・グロッシ事務局長は2026年6月26日、米イラン合意を受け、イランが核兵器を開発しないよう確保するための「非常に強固な」検証体制を早急に整備する必要があると述べた。米国のマルコ・ルビオ国務長官は湾岸諸国を歴訪し、いかなるイラン合意にも限界があるとした上で、ホルムズ海峡での通行料徴収案を「混乱を招く」として拒否した。一方、イスラエルによるレバノン南部への攻撃で3人が死亡し、イスラエル軍はヒズボラ工作員を標的にしたと発表した。", "summary_en": "UN atomic watchdog chief Rafael Grossi stated on June 26, 2026 that a 'very strong' verification system is urgently needed to ensure Iran does not develop nuclear weapons following a recent U.S.-Iran agreement. U.S. Secretary of State Marco Rubio, touring Gulf states, affirmed limits on any Iran deal and rejected Tehran charging fees in the Strait of Hormuz. Separately, an Israeli strike in southern Lebanon killed three people, with Israel saying it targeted Hezbollah operatives.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/west-asia-war-iran-usa-israel-conflict-washington-tehran-peace-deal-donald-trump-strait-of-hormuz-live-updates-june-26-2026/article71149347.ece", "state_media": false, "category": "政治"}, {"title_ja": "ベネズエラ地震：世界各国が救助隊と支援を派遣", "title_en": "World Mobilizes Rescuers and Aid for Earthquake-Stricken Venezuela", "summary_ja": "ベネズエラを襲った大地震を受け、数十カ国と国際機関が救助チームや資金援助を表明した。米国は1億5000万ドルの支援と艦船2隻の派遣を約束し、スペイン、フランス、ドイツ、スイスなど欧州各国も専門家や資機材を送り込んでいる。ブラジル、メキシコ、コロンビア、チリ、キューバなど中南米諸国も救助隊や医療チーム、人道支援物資を派遣した。", "summary_en": "Following devastating earthquakes in Venezuela, dozens of countries and international organizations have pledged rescue teams, aid, and financial support. The US committed $150 million and two warships, while European nations including Spain, France, Germany, and Switzerland dispatched specialists and equipment. Regional neighbors Brazil, Mexico, Colombia, Chile, and Cuba also sent rescue personnel, medical teams, and humanitarian supplies.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/venezuela-earthquakes-terremoto-caracas-magnitude-7-damages-death-toll-live-updates-june-26-2026/article71149145.ece", "state_media": false, "category": "政治"}, {"title_ja": "国連調査：イスラエルがパレスチナ人の子どもに対してジェノサイドおよび戦争犯罪を犯したと認定", "title_en": "UN Inquiry: Israel Committed Genocide, War Crimes and Crimes Against Humanity Against Palestinian Children", "summary_ja": "2026年6月23日、国連の独立調査委員会はイスラエル当局がパレスチナ人の子どもを意図的に標的にし、ガザでのジェノサイド・人道に対する罪・戦争犯罪、およびヨルダン川西岸での戦争犯罪を構成すると結論付けた。報告書はICCのローマ規程における各犯罪の定義を根拠としており、ジェノサイドは集団の一部または全部を破壊する意図をもって行われる行為と定義される。今回の認定は2025年9月の以前の報告書の結論と一致しており、イスラエルがパレスチナ人集団を破壊する特定の意図をもって行動したと判断している。", "summary_en": "A UN independent inquiry released on June 23, 2026 found that Israeli authorities deliberately targeted Palestinian children, constituting genocide, crimes against humanity, and war crimes in Gaza and the West Bank. The report draws on definitions from the Rome Statute of the ICC, which codifies genocide under Article 6, crimes against humanity under Article 7, and war crimes under Article 8. The findings are consistent with a previous UN Commission report from September 2025, which concluded Israel acted with specific intent to destroy the Palestinian group in whole or in part.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/what-do-genocide-war-crimes-and-crimes-against-humanity-mean/article71150124.ece", "state_media": false, "category": "政治"}, {"title_ja": "国民党主席：「一つの中国」現状への回帰が両岸対話再開の鍵", "title_en": "KMT Head: Returning to 'One China' Status Quo Is Key to Restarting Cross-Strait Talks", "summary_ja": "台湾の中国国民党（KMT）主席は、台湾と中国の対話を再開するためには「一つの中国」という現状への回帰が不可欠だと述べた。国民党主席は、この基本的な枠組みを認めることが両岸交渉再開の前提条件であると強調した。この立場は、台湾の政治的アイデンティティと北京との関係に関する与党・民主進歩党の見解とは対照的である。", "summary_en": "The chairman of Taiwan's Kuomintang (KMT) party stated that returning to the 'one China' status quo is essential for resuming dialogue between Taiwan and China. The KMT leader emphasized that acknowledging this foundational framework is a prerequisite for restarting cross-strait negotiations. This position contrasts with the ruling Democratic Progressive Party's stance on Taiwan's political identity and relations with Beijing.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE5oTXhBLVZ3a1A3YnZSellabldoMlFWeWlZRzFSVjNEZWNBajFIQ19XTFZfVHFUR0RicHBoZzdQcW1rdDVsdFpHSW1CcEhYeWc5U3UzQmJsQQ?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "頼清徳総統、自衛の決意を改めて強調　中国が地域の現状変更を試みていると非難", "title_en": "Lai Reiterates Taiwan's Self-Defense Resolve, Accuses China of Altering Regional Status Quo", "summary_ja": "台湾の頼清徳総統は、潜在的な脅威に対する台湾の自衛の決意を改めて表明した。同総統は中国がインド太平洋地域の現状を積極的に変えようとしていると非難し、地域の安定に対する懸念を示した。頼総統の発言は、両岸関係の緊張が高まる中、台湾が安全保障維持への強いコミットメントを持っていることを改めて示すものとなった。", "summary_en": "Taiwanese President Lai Ching-te has reaffirmed Taiwan's determination to defend itself against potential threats. He accused China of actively working to alter the regional status quo, raising concerns about stability in the Indo-Pacific. Lai's remarks underscore Taiwan's commitment to maintaining its security amid growing cross-strait tensions.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE9mTEhMclhXLU5aWkdPaWI1bUxZOHBlMHdZb1NodlhzM3BpQ3VCX2l1Yk1mbnN5cWlLb1VBeWpudUp0VTl1ZFdsSkl3SU5Vd1R1XzdoV1Nvaw?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "台湾各地で大雨による洪水が発生", "title_en": "Heavy Rain Triggers Widespread Flooding Across Taiwan", "summary_ja": "フォーカス台湾によると、台湾各地で大雨による洪水が発生し、複数の地域に影響が及んでいる。激しい降雨により日常生活が混乱し、インフラや公共の安全への懸念が高まっている。当局は引き続き状況を監視しており、島内各地で雨の影響が続いている。", "summary_en": "Heavy rainfall has caused flooding in multiple regions across Taiwan, according to Focus Taiwan. The severe weather has disrupted daily life and raised concerns about infrastructure and public safety. Authorities are monitoring the situation as rain continues to affect various parts of the island.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVkFVX3lxTE90Y2FZWVRYcjZNNEZnOEJlSkppRnpUc3BXWVhaaWdkYzZmSVV1WEFPbHZ3U1EtYmkxSndicGF5cmJDMVVXTmRtSk1ZcVkyVHBSbmxhUkN3?oc=5", "state_media": false, "category": "社会"}, {"title_ja": "コロンビア極右勝利でブラジルは南米に孤立する「左派の島」に", "title_en": "Far-Right Win in Colombia Leaves Brazil Isolated as Left-Wing Island in South America", "summary_ja": "コロンビア大統領選での極右候補の勝利により、南米全体で保守派の波が強まり、ブラジルのルラ大統領は選挙まで4か月を残して地域内で政治的に孤立した状況となった。2022年にはアルゼンチンやチリなど多くの国で左派政権が並んでいたが、現在ではその大半が右派・極右政権に転換している。次期大統領アベラルド・デ・ラ・エスプリエリャはミレイ、トランプ、フジモリらから歓迎され、米国とコロンビアの関係正常化も見込まれている。", "summary_en": "The far-right victory in Colombia's presidential election consolidates a conservative wave across South America, leaving Brazil's President Lula politically isolated just four months before his own reelection bid. Where leftist governments once dominated the region in 2022, countries including Colombia, Argentina, Chile, and Peru are now governed by right-wing or far-right leaders. President-elect Abelardo de la Espriella was celebrated by Javier Milei, Donald Trump, and Keiko Fujimori, signaling a realignment of the hemisphere toward the right.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/with-far-right-in-colombia-brazil-is-a-left-wing-island-in-south-america.shtml", "state_media": false, "category": "政治"}, {"title_ja": "イタマラティー、トランプ干渉を警戒——「ブラジルはベネズエラではない」", "title_en": "Itamaraty Fears Trump Interference but Insists Brazil Is Not Venezuela", "summary_ja": "ブラジルのルラ政権は、トランプ米大統領がブラジルの選挙に干渉する兆候を注視しており、外交官たちはその意図が次第に明確になっていると指摘している。トランプ氏はG7でブラジルの政治状況を「危険」と呼びボルソナーロ一家を擁護したため、ルラ大統領は「ブラジルの選挙に干渉するな」と公式に警告した。一方、政府内の一部はトランプ氏の発言が矛盾していると指摘し、慎重な姿勢を求めている。", "summary_en": "Brazil's Lula administration is closely monitoring signs of U.S. President Donald Trump's potential interference in Brazil's upcoming elections, with diplomats noting his intentions are becoming increasingly apparent. Trump raised alarm by calling Brazil's political situation dangerous at the G7 and defending the Bolsonaro family, prompting Lula to publicly warn him not to interfere. A divided government faction urges caution, noting Trump's mixed signals as he claims to like Lula while simultaneously backing the Bolsonaros.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治"}, {"title_ja": "米当局、逮捕のブラジル人をCVとPCCの幹部と主張―ブラジルの判決には組織との関連なし", "title_en": "US Claims Arrested Brazilian Led CV and PCC, but Court Records Show No Gang Ties", "summary_ja": "米移民・関税執行局（ICE）は、ノースカロライナ州でブラジル人のフェリペ・リナレス・デ・オリベイラ・デル・アキッラを逮捕し、ブラジル最大級の犯罪組織PCCとCVの「司令官」と称した。しかし、ブラジルでの麻薬密売・詐欺・恐喝に関する過去の有罪判決には、両組織との関連は一切記載されていない。米国土安全保障省の主張とブラジルの司法記録の間に食い違いがあり、その根拠が問われている。", "summary_en": "Brazilian national Felipe Linares de Oliveira Dell Aquilla was arrested by ICE in Mooresville, North Carolina, with U.S. authorities calling him a 'commander' of both the PCC and CV criminal organizations. However, his prior Brazilian convictions for drug trafficking, fraud, and extortion contain no mention of either group. The U.S. Department of Homeland Security's claims remain unsubstantiated by Brazilian court records, raising questions about the accuracy of the designation.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/us-government-says-brazilian-man-arrested-was-cv-and-pcc-leader-but-convictions-show-no-link.shtml", "state_media": false, "category": "政治"}, {"title_ja": "弁護士、ナイジェリアの代理出産における法的整備の欠如に警鐘", "title_en": "Lawyer Urges Nigeria to Establish Legal Framework for Surrogacy Practice", "summary_ja": "家族法・生殖法専門の弁護士イサク・オルフンショ氏は、ナイジェリア連邦政府に対し、代理出産に関する包括的な法整備を求めた。現行では代理出産を規制する連邦法がなく、親権や契約履行、子どもの福祉をめぐる不確実性が生じていると指摘した。同氏は将来の法律において、子どもの保護、代理母の権利、生殖補助医療クリニックの透明性を最優先事項とするよう訴えた。", "summary_en": "Family law attorney Isaac Olufunsho has called on the Nigerian federal government to enact comprehensive surrogacy legislation, warning that the current absence of specific laws creates uncertainty over parentage rights, contract enforcement, and child welfare. Speaking to the News Agency of Nigeria, he noted that advances in assisted reproductive technology have increased demand for surrogacy, yet arrangements remain governed only by private agreements. He urged that any future law prioritize child protection, surrogate mothers' rights, and transparency in reproductive clinics.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/890903-lawyer-raises-concern-over-regulatory-gaps-in-nigerias-surrogacy-practice.html", "state_media": false, "category": "社会"}, {"title_ja": "ラゴス警察、人体の一部と銃器を所持した強盗容疑者を逮捕", "title_en": "Lagos Police Arrest Armed Robbery Suspect Found With Human Body Part and Firearms", "summary_ja": "ラゴス州警察は、レッキ・エペ高速道路での検問中に21歳のサムソン・オニレワジ容疑者を逮捕し、人間の右手とみられるもの、手製拳銃2丁、斧、POS端末、ATMカード5枚を押収した。容疑者は3人への強盗を自供しており、捜査終了後に起訴される予定。警察は押収された人体の一部の身元確認と、事件に関与した他の容疑者の特定を進めている。", "summary_en": "Lagos State Police arrested 21-year-old Samson Onilewaji during a stop-and-search operation on the Lekki-Epe Expressway, recovering a suspected human right hand, two locally made pistols, axes, a POS terminal, and five ATM cards from him. The suspect confessed to robbing three individuals and will be charged in court after investigations conclude. Police are working to identify the owner of the human hand and apprehend other suspects connected to the case.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/890899-police-arrest-suspected-armed-robber-with-human-body-part-firearms-in-lagos.html", "state_media": false, "category": "社会"}, {"title_ja": "2015年マイドゥグリ攻撃：裁判所がボコ・ハラム構成員に絞首刑の死刑判決", "title_en": "Court Sentences Boko Haram Member to Death by Hanging for 2015 Maiduguri Attacks", "summary_ja": "ナイジェリアの裁判所は、2015年のマイドゥグリ襲撃事件に関連して、ボコ・ハラムの構成員に絞首刑による死刑判決を言い渡した。有罪判決の中には、テロ行為の準備として、武器取り扱い訓練を受けるためにアラブ諸国へ渡航した罪も含まれている。今回の判決は、マイドゥグリ攻撃の実行犯に対する重要な法的措置となった。", "summary_en": "A Nigerian court has sentenced a Boko Haram member to death by hanging in connection with the 2015 attacks in Maiduguri. Among the charges, the convict was found guilty of engaging in conduct preparatory to terrorism, including traveling to an Arab country for arms and weapons training. The verdict marks a significant legal action against perpetrators of the deadly Maiduguri attacks.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/headlines/890897-2015-maiduguri-attacks-court-sentences-boko-haram-member-to-death-by-hanging.html", "state_media": false, "category": "社会"}, {"title_ja": "南アフリカが韓国を1-0で破りW杯決勝トーナメント初進出", "title_en": "South Africa Stun South Korea 1-0 to Reach FIFA World Cup Knockout Stage", "summary_ja": "CGTNによると、南アフリカは2026年FIFAワールドカップのグループA第3戦で韓国を1-0で下し、同国史上初めて決勝トーナメントへの進出を果たしたと伝えている。後半にタペロ・マセコが決勝ゴールを挙げ、ヒューゴ・ブロス監督率いるバファナ・バファナは開幕戦でメキシコに0-2で敗れた後の逆転劇を演じたとCGTNは報じている。ワールドカップ4度目の出場となる南アフリカは、日曜日に決勝トーナメント1回戦でカナダと対戦する予定だ。", "summary_en": "CGTN reports that South Africa defeated South Korea 1-0 in Group A at the 2026 FIFA World Cup, with Thapelo Maseko's second-half strike securing the country's first-ever progression to the knockout stages. CGTN reports that the result marked a remarkable comeback for coach Hugo Broos' side, who had lost their opening match 2-0 to co-host Mexico before drawing with Czechia. South Africa, making their fourth World Cup appearance, will face Canada on Sunday in the round of 16.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://newsaf.cgtn.com/news/2026-06-25/Bafana-Bafana-stun-South-Korea-to-reach-World-Cup-knockouts-1OgChYOJbEI/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "中国・オーストリア外相が北京で会談、国交樹立55周年の節目に", "title_en": "Chinese and Austrian Foreign Ministers Meet in Beijing Amid 55th Anniversary of Diplomatic Ties", "summary_ja": "CGTNによると、中国の外交トップである王毅氏とオーストリアのベアテ・マインル＝ライジンガー外相が木曜日に北京で会談し、両国の国交樹立55周年を迎えた。CGTNによると、王毅氏は相互尊重と平等を基盤とした関係の発展を強調し、オーストリアの国連安全保障理事会非常任理事国選出を祝福するとともに、多国間主義と自由貿易の支持を訴えた。CGTNによると、マインル＝ライジンガー外相は一つの中国政策への支持を改めて表明し、貿易・投資・グリーン開発などの分野での協力拡大に意欲を示した。", "summary_en": "CGTN reports that Chinese top diplomat Wang Yi met with Austrian Foreign Minister Beate Meinl-Reisinger in Beijing on Thursday, marking the 55th anniversary of diplomatic relations between the two countries. CGTN reports that Wang Yi called for mutual respect, high-level exchanges, and stronger multilateral coordination, including on the UN Security Council where Austria recently won a non-permanent seat. CGTN reports that Meinl-Reisinger reaffirmed Austria's adherence to the one-China policy and expressed interest in expanding cooperation in trade, investment, and green development.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-25/Chinese-Austrian-foreign-ministers-hold-talks-in-Beijing-1OgNK8mKveM/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治"}, {"title_ja": "ベネズエラで強い地震が連続発生、少なくとも32人死亡・700人超が負傷", "title_en": "At Least 32 Dead, Hundreds Injured After Powerful Earthquakes Strike Venezuela", "summary_ja": "CGTNによると、2026年6月24日（水）夜、ベネズエラで強い地震が2回発生し、少なくとも32人が死亡、700人以上が負傷したと同国代行大統領デルシー・ロドリゲス氏が発表した。ロドリゲス氏は、北部沿岸州ラ・グアイラが最も深刻な被害を受けており、多数の建物が完全に倒壊したと述べ、同州を「災害地域」と宣言した。同氏はベネズエラ国営テレビで「ラ・グアイラ州はまさに惨事だ」と語った。", "summary_en": "CGTN reports that at least 32 people were killed and more than 700 injured after two powerful earthquakes struck Venezuela late Wednesday, June 24, 2026. Venezuela's acting President Delcy Rodriguez stated that the coastal state of La Guaira in northern Venezuela was the hardest hit, with dozens of buildings completely collapsed. Rodriguez described La Guaira as a 'true tragedy' and declared it a disaster zone in remarks aired on Venezuelan state television.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-25/news-1OgaWO3cn2o/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会"}, {"title_ja": "プーチン大統領、ロシアがベラルーシへの最大投資国と主張", "title_en": "Putin Claims Russia is Leading Investor in Belarus with $4 Billion in Accumulated Investment", "summary_ja": "タス通信によると、ロシアのプーチン大統領は、ロシアがベラルーシへの累積投資において首位であり、総額約40億ドルに上ると主張した。プーチン大統領はロシア・ベラルーシ地域フォーラムへのビデオ演説でこの発言を行ったと国営メディアは伝えている。また、ロシア資本を持つ約2,500社がベラルーシ全土の全地域で事業を展開しているとも述べたとされる。", "summary_en": "TASS reports that Russian President Vladimir Putin claimed Russia is the leading source of accumulated investment in Belarus, totaling around $4 billion. Putin made the remarks in a video address to the Forum of Regions of Russia and Belarus. State media further reports that approximately 2,500 companies with Russian capital operate across all regions of Belarus.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2152007", "state_media": true, "category": "政治"}, {"title_ja": "ロシア、ワシントンでのG20シェルパ会合に代表団を派遣", "title_en": "Russia to Send Delegation to G20 Sherpa Meeting in Washington", "summary_ja": "TASSによると、ロシアは6月29〜30日にワシントンで開催されるG20シェルパ会合に、大統領専門家局長デニス・アガフォノフを団長とする代表団を派遣するという。同会合では、12月14〜15日にマイアミで予定されるG20首脳会議の準備や、貿易・エネルギー・金融などの主要テーマに関する交渉が議題となる予定だとTASSは伝えている。ロシア外務省特使は、代表団が二国間協議を通じて「多極世界構築におけるロシアのアプローチへの支持を結集する」意向だと述べたとされる。", "summary_en": "TASS reports that Russia will participate in the G20 Sherpa meeting in Washington on June 29-30, with Presidential Expert Directorate head Denis Agafonov leading the delegation. TASS reports that the meeting will cover preparations for the Miami G20 summit on December 14-15 and negotiations on key tracks including trade, energy, and finance. The Russian Foreign Ministry's special envoy states that the delegation plans bilateral consultations to, as he put it, 'mobilize support for Russian approaches' in building a multipolar world order.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2152001", "state_media": true, "category": "社会"}, {"title_ja": "クレムリン報道官：米国の調停は歓迎、完全な中立は不可能と主張", "title_en": "Kremlin on US Role in Ukraine: Mediation Welcome, Full Neutrality Impossible", "summary_ja": "タス通信は、クレムリン報道官ドミトリー・ペスコフが、ロシアはトランプ大統領のウクライナ和平実現への誠実な意欲を評価しており、米国の仲介継続を歓迎すると述べたと伝えている。ペスコフ氏はまた、米国がウクライナへの武器供与を続けている以上、完全な中立とは言えないと主張した。さらに同報道官は、米国が中立調停者の立場を離れたとするマクロン仏大統領の発言について、フランス側が「米国の代弁者」を務めることはできないとして、米国自身からそのような確認は得ていないと述べたとタス通信は報じている。", "summary_en": "TASS reports that Kremlin Spokesman Dmitry Peskov stated that Russia values what it describes as Trump's sincere desire to help achieve a peaceful settlement in Ukraine, and welcomes continued US mediation efforts. Peskov claimed that the US cannot be considered fully neutral given its ongoing weapons supplies to Kyiv, but said Moscow has not received any confirmation of Macron's assertion that Washington has abandoned its neutral mediator role. TASS further reports that Peskov dismissed Macron's characterization, saying the French president cannot serve as 'Washington's lawyer or press secretary.'", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/politics/2151989", "state_media": true, "category": "社会"}, {"title_ja": "中国のリバランス失敗：消費主導型経済への転換が進まず", "title_en": "China's Failed Rebalancing: Consumer Demand Remains Stubbornly Low", "summary_ja": "筆者は、中国が長年掲げてきた国内消費主導への経済リバランスが根本的に失敗したと主張する。温家宝元首相が投資・輸出依存型成長の問題を認めてから約20年が経過したにもかかわらず、GDPに占める家計消費の割合は依然として低水準にとどまっている。この失敗は中国当局の政策的信頼性を損なうとともに、中国経済および世界経済にとって重大な問題を提起していると指摘する。", "summary_en": "The author argues that China's long-promised economic rebalancing toward domestic consumer demand has fundamentally failed. Nearly two decades after former Premier Wen Jiabao acknowledged over-reliance on investment- and export-led growth, household consumption as a share of GDP remains persistently low. This failure raises serious questions about China's economic credibility and its implications for both the domestic economy and the wider world.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/chinese-economy-consumer-led-rebalancing-has-failed-by-stephen-s-roach-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "「健全なポピュリズム」の可能性", "title_en": "Crowning a Healthy Populism", "summary_ja": "筆者は、ハンガリーやアルバニアなど中東欧で起きている政治的動員は、MAGAに代表される攻撃的な民族主義的ポピュリズムとは本質的に異なると主張する。21世紀の政治を「自由民主主義への権威主義的反動」と見る通説に対し、筆者はノスタルジアが独裁への抵抗をも生み出し得ると指摘する。こうした運動は、より健全な新たなポピュリズムの形を示す可能性があるという見解を示している。", "summary_en": "The author argues that recent political mobilizations in Hungary, Albania, and Central and Eastern Europe represent a more nuanced form of populism distinct from MAGA-style aggressive ethnonationalism. While conventional wisdom frames 21st-century politics as an autocratic ethnonationalist backlash against liberal democracy, the author suggests that nostalgia and popular revolt can also fuel resistance to autocracy. These movements may offer a model for a healthier, alternative form of populist politics.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/hungary-albania-rejecting-maga-international-by-harold-james-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "ルールに基づく秩序はなぜ失敗するのか", "title_en": "Why Rules-Based Orders Fail", "summary_ja": "筆者は、ダグラス・ホフスタッターの著作『ゲーデル、エッシャー、バッハ』を引用しながら、いかなるルールに基づく国際秩序も、内部から解決できない矛盾を必然的に抱えると主張する。冷戦後にアメリカが信じた「自由主義秩序は自律的に維持される」という考えは幻想に過ぎなかった。こうした秩序の脆弱性は政治的失敗ではなく、構造的な必然であるというのが著者の核心的な視点である。", "summary_en": "The author argues that rules-based international orders are inherently limited, drawing on Hofstadter's Gödel, Escher, Bach to contend that any sufficiently complex system will encounter contradictions it cannot resolve from within its own rules. The post-Cold War belief that the liberal order had become self-sustaining was an illusion, as no set of rules can fully govern or interpret every situation that arises. This perspective suggests that the fragility of rules-based systems is not a political failure but a structural inevitability.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/onpoint/why-rules-based-orders-fail-by-benn-steil-2026-06", "state_media": false, "category": "オピニオン"}, {"title_ja": "なぜタッカー・カールソンとグリーン議員は共和党を離党したのか：「アメリカ・ファースト」対MAGAの亀裂", "title_en": "Why Tucker Carlson and Marjorie Taylor Greene Left the GOP: America First vs. MAGA", "summary_ja": "寄稿者ジェフリー・カバサービスは、カールソンとグリーンの共和党離党が、孤立主義的な「アメリカ・ファースト」派とトランプの拡張主義的なMAGA運動との間に潜む深いイデオロギー的断層を露わにしたと論じる。両派はトランプのイラン攻撃を契機に決裂したが、その根底には19世紀的帝国主義と第二次大戦前の孤立主義という異なる保守主義の歴史的系譜がある。筆者はこの分裂が中間選挙に向けて共和党の結束を大きく損なう可能性があると指摘している。", "summary_en": "Opinion writer Geoffrey Kabaservice argues that the departures of Tucker Carlson and Marjorie Taylor Greene from the Republican Party expose a deep ideological rift between the isolationist 'America First' faction and Trump's expansionist MAGA movement, brought to a head by Trump's war with Iran. While both factions share nostalgia for mid-20th century American culture, they represent fundamentally different conservative traditions — pre-WWII isolationism versus Gilded Age imperialism. Kabaservice contends this split could meaningfully damage Republican unity heading into the midterm elections.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/26/tucker-carlson-marjorie-taylor-greene-republican-split", "state_media": false, "category": "オピニオン"}, {"title_ja": "意見：トランプ政権の文化戦争がMLBに飛び火——ジャイアンツのプライドナイト論争", "title_en": "Opinion: The Right's Culture Wars Have Come to MLB Over Giants' Pride Night Controversy", "summary_ja": "筆者は、サンフランシスコ・ジャイアンツのプライドナイトをめぐる論争にトランプ政権の司法省が介入したのは、宗教的表現の自由を守るためではなく、意図的な文化戦争の一手だと主張する。選手らは処分を受けておらず、介入の真の目的はキリスト教白人男性の優位性を守るというイデオロギー的主張にあるとしている。また、ジャイアンツ球団のLGBTQ+コミュニティへの歴史的関与と比較し、オーナーのチャールズ・ジョンソンの右派的背景を背景に球団が示した及び腰の対応を強く批判している。", "summary_en": "The author argues that the Trump administration's Justice Department intervention in the San Francisco Giants' Pride Night controversy is a calculated culture-war maneuver, not a genuine defense of religious liberty, since the players faced no discipline. The piece contends that the Giants' tepid response betrayed San Francisco's LGBTQ+ history and their own organizational legacy, while owner Charles Johnson's right-wing ties explain the players' protest. The author frames the episode as part of a broader pattern—alongside Hegseth's DEI purges and DOJ harassment of political opponents—of the Trump administration weaponizing government to champion white Christian male grievance.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/sport/2026/jun/26/san-francisco-giants-pride-night-mlb-culture-wars", "state_media": false, "category": "オピニオン"}, {"title_ja": "トランプはイラン和平交渉を守るためにネタニヤフを抑制できるか", "title_en": "Will Trump Finally Restrain Netanyahu to Protect Iran Peace Talks?", "summary_ja": "筆者のモハマド・バッジは、トランプ政権が米・イラン和平交渉をネタニヤフ首相の妨害から守れるかどうかが今まさに問われていると論じる。トランプはネタニヤフを「判断力がない」と公言するなど不満を示してきたが、過去には武器供与停止などの実質的な行動が伴わなかったと指摘する。米・イスラエルによるイラン攻撃が失敗に終わり、ホルムズ海峡封鎖による世界経済危機も招いた今、トランプがレバノン問題を含む包括合意を成立させてイランとの戦争を「勝利」として幕引きするためには、ネタニヤフを本気で抑制する必要があると著者は主張する。", "summary_en": "Opinion writer Mohamad Bazzi argues that Trump faces a critical test of whether he will genuinely restrain Netanyahu from sabotaging US-Iran peace negotiations, after years of unconditional American support enabled Israel to wage wars across the Middle East. Bazzi notes that while Trump and aides have publicly expressed frustration with Netanyahu — with Trump reportedly calling him 'fucking crazy' — past expressions of displeasure were never backed by concrete action such as withholding weapons. The author contends that Trump now has stronger incentive to rein in Netanyahu because the failed US-Israeli war on Iran backfired, and a lasting deal with Tehran — including Israeli withdrawal from Lebanon — is essential for Trump to claim victory and avoid a global economic crisis.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/25/netanyahu-trump-iran-war", "state_media": false, "category": "オピニオン"}, {"title_ja": "アフリカのドローン戦争、勝者はどちらか", "title_en": "Who Is Winning Africa's Drone Wars?", "summary_ja": "著者は、非国家武装勢力が国家軍とのドローン技術格差を急速に縮めていると論じており、2025年にトゥアレグ反政府勢力が最新の光ファイバーFPVドローンをロシア・マリ軍合同部隊に使用した事例をその証拠として挙げている。エチオピアやリビアがかつて優れたドローン技術で戦局を左右した一方、今やサヘルなどの武装勢力は安価な自組式ドローンを国家軍以上に効果的に運用している。著者はアフリカ各国政府が旧来の外国依存戦略を脱却し、自国のドローン開発能力を構築するとともに、対反乱作戦に特化した軍組織へと再編する必要があると主張している。", "summary_en": "The author argues that African nonstate armed groups have rapidly closed the drone technology gap with state militaries, exemplified by Tuareg rebels deploying cutting-edge fiber-optic FPV drones against Russian and Malian forces in 2025. While states like Ethiopia and Libya once used superior drone technology to decisive effect, insurgent groups across the Sahel and beyond are now fielding cheap, locally assembled drones more effectively than governments dependent on foreign suppliers. The author contends that African governments must develop indigenous drone capabilities and restructure their militaries for irregular warfare rather than relying on outdated foreign-supply strategies.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/somalia/who-winning-africas-drone-wars", "state_media": false, "category": "オピニオン"}, {"title_ja": "「イランは戦争に勝っていない」――中東紛争の戦略的総括", "title_en": "Iran Didn't Win the War: A Strategic Assessment of the Middle East Conflict", "summary_ja": "筆者は、政権転覆などの最大目標は達成されなかったものの、米国とイスラエルの軍事作戦によってイランの代理勢力網は壊滅し、通常戦力と核関連インフラは大きく損なわれたと主張する。停戦覚書は不完全ながらも米・イラン直接交渉への道を開き、制裁と軍事的圧力を背景にワシントンはイランの核活動に恒久的な制限を課す交渉力を持つと論じる。著者はこの紛争を失敗ではなく、3年間にわたる対イラン抑止戦略の集大成として位置づけている。", "summary_en": "The author argues that despite falling short of maximalist goals like regime change, the U.S.-Israel military campaign has left Iran significantly weakened, with its proxy network dismantled, conventional forces decimated, and nuclear program constrained. The cease-fire memorandum, while imperfect, opens the door to direct U.S.-Iranian negotiations and gives Washington substantial leverage through sanctions and credible military threat to achieve lasting limits on Iranian enrichment. Rather than a failure, the author frames the conflict as the culmination of a three-year strategic effort that has fundamentally shifted the regional balance of power in America's favor.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/iran/iran-didnt-win-war", "state_media": false, "category": "オピニオン"}, {"title_ja": "新首相、同じ問題：ブレグジットのツケがついに英国に到来", "title_en": "New Prime Minister, Same Problem: Brexit's Bill Finally Arrives for Britain", "summary_ja": "筆者は、キア・スターマー首相の辞任表明に象徴される労働党の政治的崩壊は、戦術的ミスではなく、長年先送りにされてきたブレグジットの経済的代償がトランプ政権による貿易秩序の崩壊と重なって顕在化したものだと主張する。EU加盟がかつて提供していた単一市場や関税同盟などの経済的緩衝材を失った英国は、今や大国交渉において脆弱な立場に置かれており、軍事力を梃子にEUとの大幅な関係強化を図ることが唯一の現実的活路だと論じている。", "summary_en": "The author argues that Labour's political collapse under Keir Starmer—who announced his resignation after trailing Reform UK by nearly ten points in polls—stems not from tactical missteps but from Brexit's long-deferred economic consequences now hitting Britain without cushion amid global trade disruption. The piece contends that EU membership had provided irreplaceable economic shock absorbers, and that the only viable path forward for both Britain's economy and Labour's political survival is pursuing a deeper partnership with the EU, leveraging British military power in exchange for greater market access.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-kingdom/new-prime-minister-same-problem", "state_media": false, "category": "オピニオン"}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  const sb=document.getElementById("d-state");
  sb.style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-26 12:07 JST";
renderTabs();renderList();
</script>
