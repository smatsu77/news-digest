ニセフは180万人が支援を必要していると述べている。\n\nこうした災害の被害規模は、発生前の国家の状態と、その後の政府の対応能力を映し出す。生存者の救出が続き、生存率が著しく低下するとされる72時間の壁を超えた後にも劇的な救出劇が人々に喜びをもたらした一方で、ベネズエラの指導者たちにとって全体的な状況は厳しいものとなっている。\n\n激しく被害を受けたカラカスの一角を視察した代行大統領のデルシー・ロドリゲス氏は、生存者たちからヤジを浴びせられた。ボランティアの救助・救援隊員たちの活発な活動と対照的な政府の鈍い対応に、怒りが高まっている。住民たちは、自分たちだけで何とかするしかないと感じている。今回の地震は、緊急対応サービスよりも治安部隊、とりわけ軍に資金が注ぎ込まれてきた実態を浮き彫りにした。この政権は国民を妨害し抑圧する能力は備えているが、支援する能力は持ち合わせていない。政治学者オーランド・J・ペレス氏はこう記した。「災害は政府が実際に何ができるか、そしてこれまで公金を使って何をしてきたかを示すことを強いる。そのことが国の政治的軌跡を大きく形成しうる。」\n\n長年にわたる国家の失政、盗賊政治、そして米国の制裁により、ベネズエラ国民の80%が貧困にあえぎ、人口の4分の1が国外へ逃れた。年率換算のインフレ率は600%を超え、世界最高水準にある。医療制度は瀕死の状態だ。トランプ政権が1月に当時の大統領ニコラス・マデュロを違法に拘束したことで、政権は存続したものの、国は政治的混乱に陥った。\n\n米国大統領は自らの行動がベネズエラに「繁栄をもたらす」と約束し、同国を民間投資に開放し石油の売買を管理することを優先事項としている。トランプ氏はいつもながらの粗野なやり方で、災害発生地域の外では「人々が街で踊っている」と宣言した。しかしマデュロ氏の退場を望む声が多い一方で、ロドリゲス氏が米国と結んだ取引は、マデュロ氏の党が依拠してきた最後のイデオロギー的基盤である反帝国主義を破壊し、1976年の石油産業国有化を無効にしてしまった。左派の怒りは、ロドリゲス氏（マデュロ氏の副大統領だった人物）との米国の取引と、亡命中の保守系野党指導者マリア・コリナ・マチャード氏を依然として無視し続けていることへの、反体制派の不満と相まっている。\n\nトランプ氏はマデュロを拘束した後、ベネズエラを「管轄している」と宣言した。そうである以上、彼は行動で示すべきだ。しかし、米国際開発庁（USAID）の解体と援助職員の大量解雇は、その意欲だけでなく能力をも疑わしいものにしている。米国は救済活動に3億ドルの拠出を約束し、世界各国から派遣された2,400人の捜索・救助隊員の中に米国チームも含まれている。それは出発点ではある。しかしベネズエラの人々が必要としており、また受けるに値するのは、地震の直後だけでなく、慢性的な危機からの真の復興に向けた、集中的かつ持続的な支援である。それこそが、ロドリゲス氏とその党、そして西半球における米国のリーダーシップの主張にとっての真の試練となるだろう。", "vocab": [{"word": "temblors", "definition": "地震を意味する技術的・文学的な表現。特に英語ニュース記事で「earthquake」の言い換えとして用いられる。"}, {"word": "kleptocracy", "definition": "権力者が公金や国家資源を私的に横領・搾取することで成り立つ腐敗した統治体制を指す政治用語。「泥棒政治」とも訳される。"}, {"word": "evisceration", "definition": "本来は「内臓を取り除く」という意味だが、比喩的に組織や制度の核心部分を完全に破壊・骨抜きにすることを表す。ここではUSAIDの実質的な解体を指す。"}, {"word": "permacrisis", "definition": "長期にわたって継続する複合的な危機状態を表す比較的新しい造語で、単発の危機ではなく慢性的・構造的な不安定状態を意味する。"}, {"word": "annualised", "definition": "月次・週次などの短期データを年率換算した数値を示す際に使われる経済・金融用語。「年率換算の」という意味。"}, {"word": "trajectory", "definition": "本来は弾道・軌道を意味するが、比喩的に国家・組織・個人の発展や変化の方向性・経緯を表す際に広く使われる。"}, {"word": "crass", "definition": "知性や繊細さが著しく欠如した、無神経で粗野な言動や態度を批判的に表現する形容詞。ここではトランプ氏の発言スタイルを批判する文脈で使われている。"}]}, {"title_ja": "異常気象が米中競争を覆す", "title_en": "Extreme Weather Will Upend U.S.-China Competition", "summary_ja": "筆者は、気候変動による異常気象が米中の戦略的競争の行方を左右する見過ごされた要因であると主張する。中国は「スポンジシティ」や強靭なインフラ整備など気候適応策に多大な投資を行い、包括的な国家政策枠組みを整えている。米国がこれに追いつかなければ、経済競争力と国家力がますます深刻な打撃を受けると筆者は警告する。", "summary_en": "The author argues that climate-driven extreme weather is an underappreciated factor that could decisively shape the outcome of U.S.-China strategic competition. China has invested far more than the United States in climate adaptation measures—including sponge cities, resilient infrastructure, and early warning systems—backed by comprehensive national policy frameworks. If the U.S. fails to match these efforts, the author warns, its economic competitiveness and national power could suffer increasingly severe damage.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/china/extreme-weather-will-upend-us-china-competition", "state_media": false, "category": "オピニオン", "full_text": "Climate change looms in the background of the contest between China and the United States. It is the underappreciated factor that could determine who wins the race to develop frontier technologies, gain economic advantages, and secure influence across the world. And as global temperatures continue to climb, its role will become harder to ignore—because the two countries, the world’s largest emitters of carbon dioxide, both face great risks from climate-related extreme weather.\nExtreme weather threatens the physical foundations of Chinese and U.S. economic and technological power. It can degrade critical systems such as those that convey electricity and water. It can obstruct the transportation networks and break the supply chains on which industry relies. It can destroy housing and businesses, pushing communities into economic downturns as people leave and stores shutter. It can constrict insurance markets as the affordability and availability of property coverage decline. And it can dampen labor productivity and force governments to divert resources to manage public health crises. According to the 2026 Climate Risk Index produced by the nonprofit Germanwatch, China and the United States ranked among the top 20 countries that suffered the largest economic and human tolls from extreme weather between 1995 and 2024. These weather events will only intensify as the planet warms. XDI, a firm that performs climate-risk analysis, has projected that by 2050, the world’s 100 subnational jurisdictions most exposed to climate disruption will include 29 Chinese provinces and 18 U.S. states.\nHow well China and the United States prepare for extreme weather will shape their future economic prospects. The harms of climate-related disasters can be mitigated with managed retreat of people and infrastructure from severely threatened areas, ambitious engineering projects to protect financial centers, robust early warning systems, and other forms of adaptation. According to a World Resources Institute study, every dollar invested in climate adaptation and resilience can generate more than $10.50 in benefits over ten years. Today, China is investing far more than the United States in these kinds of measures. If the United States does not do more to protect the sources of its national power from the extreme weather to come, its economic competitiveness could suffer ever more severe blows.\nA STEP AHEAD\nBeijing has been integrating adaptation into its policy planning for more than a decade, releasing its first National Strategy for Climate Adaptation in 2013. Since then, China has gradually built up programs for climate monitoring and early warning, disaster prevention, natural ecosystem resilience, and climate-proofing infrastructure, agriculture, urban development, and public health systems. These efforts involve regional planning—nearly all provinces in China have climate adaptation plans—and at least 17 central government departments and agencies, with goals set through 2035. In 2024 alone, the national government issued around 100 policy documents related to climate adaptation. At the 2025 UN Climate Summit, Chinese leader Xi Jinping committed to making China “a climate-adaptive society” by 2035. China’s 15th Five-Year Plan, adopted earlier this year, similarly calls for a stronger national climate adaptation framework, better risk assessment in vulnerable sectors and regions, and greater capacity to respond to extreme weather.\nBeijing is backing up its pledges with significant investment. To reduce flood risk in urban areas, for example, China has carried out 90 “sponge city” pilot projects and demonstrations since 2015, using permeable pavement, wetlands, rain gardens, green roofs, and upgraded drainage systems to more effectively absorb rainfall. Between 2021 and 2025, the initiative received about $8.5 billion in central government funding and mobilized roughly $23 billion in total investment—around the same amount of money as the insurance payouts after the 2025 Los Angeles wildfires. China has also launched 67 pilot projects that explore additional solutions, including resilient power grids that better coordinate energy supply, demand, and storage; coastal wetlands that act as natural buffers against storms, flooding, and sea-level rise; “cool city” design to reduce heat exposure; and farming practices adapted to heat, drought, and shifting rainfall. The country’s investment in disaster prevention and emergency management increased by an average annual rate of almost nine percent between 2019 and 2023.\nThe harms of climate-related disasters can be mitigated.\nMuch of China’s spending is geared toward preparing the country’s infrastructure to withstand extreme weather. Over the next five years, State Grid, China’s dominant power-grid company, plans to invest roughly $570 billion on upgrades to enable the national grid to better manage electricity-supply fluctuations, to expand local backup power through microgrids, and to ", "translation_ja": "気候変動は、中国と米国の競争の背景に大きくのしかかっている。フロンティア技術の開発競争、経済的優位の獲得、そして世界各地での影響力確保という競争において、誰が勝つかを左右しうる、過小評価された要因がある。それが気候変動だ。そして地球の気温が上昇し続けるにつれ、その役割はますます無視しにくくなるだろう——なぜなら、世界最大の二酸化炭素排出国である両国は、気候関連の異常気象から大きなリスクを抱えているからだ。\n\n異常気象は、中国と米国の経済的・技術的力の物理的基盤を脅かす。電力や水を運ぶような重要なシステムを劣化させる可能性がある。産業が依存する輸送ネットワークを妨害し、サプライチェーンを断ち切ることもある。住宅や事業所を破壊し、人々が去り店が閉まることでコミュニティを経済的低迷に追い込む。財産保険の手頃さと入手可能性が低下するにつれ、保険市場を縮小させる。そして労働生産性を低下させ、公衆衛生危機の管理に政府が資源を振り向けることを余儀なくさせる。非営利団体ジャーマンウォッチが作成した「2026年気候リスク指数」によれば、1995年から2024年の間に異常気象による経済的・人的被害が最も大きかった上位20カ国に、中国と米国はともにランクインしている。地球温暖化が進むにつれ、これらの気象現象はさらに激化するだろう。気候リスク分析を行う企業XDIは、2050年までに気候変動による混乱に最もさらされる世界の100の準国家的行政区画に、中国の29省と米国の18州が含まれると予測している。\n\n異常気象にどれだけ備えられるかが、中国と米国の将来の経済見通しを左右する。気候関連災害の被害は、深刻な脅威にさらされた地域からの人々とインフラの計画的撤退、金融センターを守るための野心的な工学プロジェクト、強固な早期警戒システム、その他の適応策によって軽減できる。世界資源研究所の研究によれば、気候適応と強靭化への1ドルの投資は、10年間で10.50ドル以上の便益をもたらしうる。現在、中国はこうした対策に米国よりはるかに多くを投資している。米国が国家力の源泉を今後の異常気象から守るためにより多くの取り組みをしなければ、その経済競争力はますます深刻な打撃を受ける可能性がある。\n\n【一歩先を行く中国】\n\n北京は10年以上にわたって適応策を政策立案に組み込んできており、2013年に初の「国家気候適応戦略」を発表した。それ以来、中国は気候モニタリングと早期警戒、防災、自然生態系の強靭化、そしてインフラ・農業・都市開発・公衆衛生システムの気候対応強化に向けたプログラムを徐々に構築してきた。これらの取り組みは地域計画を含み——中国のほぼ全省が気候適応計画を持つ——少なくとも17の中央政府省庁が関与し、2035年までの目標が設定されている。2024年だけで、中央政府は気候適応に関連する政策文書を約100件発出した。2025年の国連気候サミットでは、習近平国家主席が2035年までに中国を「気候適応型社会」にすると約束した。今年採択された中国の第15次五カ年計画も同様に、より強固な国家気候適応枠組み、脆弱なセクターと地域でのリスク評価の改善、異常気象への対応能力の強化を求めている。\n\n北京はその公約を多大な投資で裏付けている。たとえば都市部の洪水リスクを低減するため、中国は2015年以降、90の「スポンジシティ」パイロットプロジェクトと実証事業を実施してきた。透水性舗装、湿地、雨水庭園、緑化屋根、排水システムの整備を通じて降雨をより効果的に吸収するものだ。2021年から2025年の間に、このイニシアチブは中央政府から約85億ドルの資金を受け、総投資額は約230億ドルに達した——これは2025年のロサンゼルス山火事後の保険支払い総額とほぼ同額である。中国はまた、追加的な解決策を探る67のパイロットプロジェクトを立ち上げた。エネルギーの供給・需要・貯蔵をより適切に調整する強靭な電力網、嵐・洪水・海面上昇に対する自然の緩衝材として機能する沿岸湿地、熱暴露を軽減する「クールシティ」設計、そして熱・干ばつ・降雨パターンの変化に適応した農業慣行などが含まれる。防災と緊急管理への投資は、2019年から2023年の間に年平均約9%の割合で増加した。\n\n気候関連災害の被害は軽減できる。\n\n中国の支出の多くは、インフラが異常気象に耐えられるよう準備することに向けられている。今後5年間で、中国の主要電力会社である国家電網は約5700億ドルを設備投資に充てる計画だ。これにより、国家電力網が電力供給の変動をより適切に管理できるようにし、マイクログリッドによる地域のバックアップ電源を拡充し、さらなる強靭化を図る予定である。", "vocab": [{"word": "managed retreat", "definition": "気候変動や自然災害のリスクが高い地域から、人々やインフラを計画的・意図的に移転させること。単なる避難ではなく、長期的な政策として行われる点が特徴。"}, {"word": "subnational jurisdictions", "definition": "国家より下位の行政単位（州・省・県など）を指す表現。国際的な政策・統計の文脈でよく使われる専門用語。"}, {"word": "climate-proofing", "definition": "インフラや施設・制度などを気候変動の影響に耐えられるよう強化・設計すること。「気候変動に強くする」という動名詞的な用法で使われる技術・政策用語。"}, {"word": "constrict", "definition": "（市場や流通などを）縮小させる・締め付けるという意味の動詞。保険市場や資金の流れが制限される文脈で用いられる。"}, {"word": "permeable pavement", "definition": "雨水を地中に浸透させるように設計された透水性の舗装材。スポンジシティ政策など都市洪水対策の文脈で使われる専門用語。"}, {"word": "frontier technologies", "definition": "最先端・最前線の技術を指し、AIや量子コンピューティングなど従来の技術的限界を超えた分野に用いられる表現。"}, {"word": "mobilized", "definition": "資金・人材・資源などを特定の目的のために集結・動員したことを表す動詞の過去形。政策・金融の文脈で「資金を集める」意味でよく使われる。"}]}, {"title_ja": "ヨーロッパは独自の道を歩む――米国離れと戦略的自立の加速", "title_en": "Europe Charts an Independent Strategic Course as U.S. Ties Weaken", "summary_ja": "筆者は、トランプ政権がヨーロッパを軽視しているにもかかわらず、ロシアの脅威と米国の信頼性低下を背景に、欧州大陸が深刻な戦略的覚醒を遂げていると主張する。欧州各国は防衛費の増額、徴兵制の復活、米国製軍事装備への依存縮小に向けて動き出している。こうした変化は、ワシントンの優先事項に自動的に従わない、より自立した積極的なヨーロッパの誕生を示している。", "summary_en": "The author argues that despite the Trump administration's dismissive view of Europe, the continent is undergoing a profound strategic awakening driven by the Russian threat and growing U.S. unreliability. Europeans are now willing to increase defense spending, reinstate conscription, and reduce dependence on American military hardware. This shift signals that a more independent and assertive Europe is emerging, one that will no longer automatically align with Washington's priorities.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/europe/europe-goes-its-own-way", "state_media": false, "category": "オピニオン", "full_text": "Europeans have been humiliated, disparaged, and sidelined since U.S. President Donald Trump returned to office in 2025. Indeed, it is no exaggeration to say that Europe has become the president’s favorite punching bag. The continent is, his administration believes, militarily emaciated, economically irrelevant, politically unfit, and culturally doomed to civilizational erasure. Trump’s attempt to coerce Denmark into relinquishing Greenland in 2025 was symbolic of the administration’s dismissive attitude.\nSo set is Washington in its beliefs about Europe, however, that it has overlooked the profound changes that are taking place. For the first time in decades, Europeans recognize the dangers that surround them. They are, accordingly, willing to invest in military resources and serve in their countries’ armed forces. From these shifts a new grand strategy is slowly being forged, which signals a new European geopolitical and strategic trajectory. Europe has come to recognize that its old paradigm—wealth without military strength, influence without sacrifice, and protection without obligation—is no longer sustainable. To dismiss Europe as permanently irrelevant is to ignore the scale and depth of the changes that are now underway. For decades, European countries reflexively aligned themselves with Washington’s priorities. They were even willing to send their soldiers to fight in U.S.-led wars that many of their publics—and at times their governments—regarded as misguided, peripheral, or strategically costly. A Europe that invests seriously in its own defense will no longer do that—and Washington had better get ready.\nEUROPE AWAKENS\nAfter decades of complacency, Europeans have awakened to the reality that they live in a dangerous world. According to polling conducted for the European Commission, 77 percent of Europeans think that Russia’s war in Ukraine represents a direct threat to Europe’s survival. Concern is strongest in eastern and northern Europe, but 59 percent of respondents in Germany, 50 percent in France, and 49 percent in the United Kingdom also consider Russia the greatest threat to their country’s national security. These are Europe’s largest and most powerful states. The Russian threat is thus no longer a concern confined to Europe’s periphery. It has moved to the heart of the continent.\nThis sense of insecurity is increased by the fact that many Europeans now realize that they can no longer rely on the United States. According to a YouGov poll commissioned by the European Council on Foreign Relations in May, only 11 percent of Europeans across the 15 surveyed countries (Austria, Bulgaria, Denmark, Estonia, France, Germany, Hungary, Italy, the Netherlands, Poland, Portugal, Spain, Sweden, Switzerland, and the United Kingdom) viewed the United States as an ally—down sharply from 16 percent six months earlier and 22 percent in November 2024. While confidence in the United States has been steadily declining in most surveyed countries, it is a more recent development in Hungary and Poland. Majorities in every country surveyed expressed doubt that the United States would come to their defense in the event of an attack, while 25 percent of respondents now see the United States as either a rival or an adversary.\nGiven the Russian threat and U.S. unreliability, many Europeans now support military buildups. Majorities in Denmark, Estonia, France, Germany, Poland, Portugal, and the United Kingdom favor increasing national defense expenditures. Italy is the only country where a clear majority remains opposed. Remarkably, across the 15 countries surveyed, 47 percent of respondents now support collective EU borrowing to finance defense initiatives, with 59 percent in favor in Portugal, 56 percent in Denmark, and 55 percent in the Netherlands. Until very recently, this idea was politically unthinkable. Equally striking, majorities now also favor cutting Europe’s dependence on U.S. military hardware and turning instead to European alternatives. Support for buying European is especially pronounced in Denmark, the Netherlands, and Sweden.\nFinally, majorities in France, Germany, and Poland now support reinstating mandatory military service, which is already in place in countries such as Denmark, Estonia, and Switzerland. Poland and Germany ended compulsory conscription in 2010 and 2011, respectively, whereas France phased out mandatory military service in the late 1990s. Over the past 30 years, support for conscription in many European countries had become a minority position. Today, it is becoming increasingly mainstream.\nGOING IT ALONE\nEuropean defense spending is going through the roof. In 2024, the 27 EU member states spent approximately $402 billion on defense, far surpassing Russia’s military outlays of $160 billion. Germany has taken a leading role, and Berlin now accounts for roughly a quarter of total EU defense spending, making it the world’s fourth-largest military spender. It is on track to spend $172 bi", "translation_ja": "ヨーロッパは独自の道を歩む\n\n2025年にドナルド・トランプ米大統領が返り咲いて以来、ヨーロッパ人は屈辱を与えられ、蔑まれ、脇に追いやられてきた。欧州大陸は大統領のお気に入りのサンドバッグになっていると言っても過言ではない。トランプ政権の認識では、欧州は軍事的に衰弱し、経済的に無関係で、政治的に機能不全に陥り、文明的な消滅へと文化的に向かっているとされる。2025年にトランプ政権がデンマークにグリーンランドを手放すよう強要しようとしたことは、政権の侮蔑的な姿勢を象徴するものだった。\n\nしかしワシントンは欧州に対する固定観念にとらわれるあまり、現在進行中の深刻な変化を見落としている。数十年ぶりに、ヨーロッパ人は自分たちを取り巻く危険を認識している。それゆえ、彼らは軍事力への投資や自国軍への入隊を厭わなくなっている。こうした変化から、新たな大戦略がゆっくりと形成されつつあり、欧州の地政学的・戦略的な新たな軌跡が示されている。ヨーロッパは、軍事力なき富、犠牲なき影響力、義務なき保護というかつてのパラダイムがもはや持続不可能であることを認識するようになった。ヨーロッパを永続的に無関係だと切り捨てることは、現在進行中の変化の規模と深さを無視することに等しい。数十年にわたり、欧州各国は反射的にワシントンの優先事項に沿ってきた。自国の国民が――そして時に政府自身が――誤った判断、周辺的、あるいは戦略的にコストがかかると見なした米国主導の戦争に兵士を送り込むことさえ厭わなかった。自国防衛に真剣に投資するヨーロッパは、もはやそうしないだろう。ワシントンはその覚悟をしておくべきだ。\n\n【ヨーロッパの覚醒】\n\n数十年にわたる慢心の後、ヨーロッパ人は自分たちが危険な世界に生きているという現実に目覚めた。欧州委員会のために実施された世論調査によれば、ヨーロッパ人の77％がロシアのウクライナ侵攻は欧州の存続に対する直接的な脅威であると考えている。懸念は東欧・北欧で最も強いが、ドイツでは回答者の59％、フランスでは50％、英国では49％もロシアを自国の安全保障に対する最大の脅威と見なしている。これらは欧州最大かつ最も強力な国家群だ。したがってロシアの脅威は、もはや欧州の周縁部だけの問題ではなくなっている。それは大陸の中心部へと移動してきた。\n\nこうした不安感は、多くのヨーロッパ人が米国をもはや頼れないと認識し始めていることでさらに高まっている。欧州外交問題評議会（ECFR）が委託した5月のユーガブ調査によれば、調査対象の15か国（オーストリア、ブルガリア、デンマーク、エストニア、フランス、ドイツ、ハンガリー、イタリア、オランダ、ポーランド、ポルトガル、スペイン、スウェーデン、スイス、英国）で米国を同盟国と見なすヨーロッパ人はわずか11％にとどまり、6か月前の16％、2024年11月の22％から大幅に低下した。米国への信頼は調査対象国のほとんどで着実に低下してきたが、ハンガリーとポーランドではより最近の動きとなっている。調査対象国すべてで過半数の回答者が、攻撃を受けた際に米国が防衛に来るとは思わないと表明した一方、回答者の25％は今や米国をライバルないし敵対国と見なしている。\n\nロシアの脅威と米国の信頼性低下を踏まえ、多くのヨーロッパ人は軍備増強を支持するようになっている。デンマーク、エストニア、フランス、ドイツ、ポーランド、ポルトガル、英国では過半数が国防費の増額を支持している。明確な過半数が反対のままなのはイタリアだけだ。注目すべきことに、調査対象の15か国全体では47％の回答者が防衛関連事業の資金調達に向けたEUの共同借り入れを支持しており、ポルトガルでは59％、デンマークでは56％、オランダでは55％が賛成している。ごく最近まで、この考えは政治的に考えられないものだった。同様に注目すべき点として、欧州の米国製軍事装備への依存を断ち切り、欧州製の代替品に切り替えることを支持する過半数も生まれている。欧州製品購入への支持は、デンマーク、オランダ、スウェーデンで特に顕著だ。\n\n最後に、フランス、ドイツ、ポーランドでは今や過半数が義務的兵役の復活を支持している。義務的兵役はデンマーク、エストニア、スイスなどではすでに実施されている。ポーランドとドイツはそれぞれ2010年と2011年に徴兵制を廃止し、フランスは1990年代後半に義務的兵役を段階的に廃止した。過去30年間、多くの欧州諸国で徴兵制への支持は少数派の立場だった。今日、それはますます主流になりつつある。\n\n【独自路線の選択】\n\n欧州の防衛費は急騰している。2024年、EU加盟27か国は防衛費に約4020億ドルを支出し、ロシアの軍事支出1600億ドルをはるかに上回った。ドイツが主導的な役割を担っており、ベルリンはEU全体の防衛費の約4分の1を占め、世界第4位の軍事支出国となっている。同国は1720億ドルを支出する軌道に乗っており――", "vocab": [{"word": "emaciated", "definition": "極度に衰弱した、やせ細った、という意味の形容詞。ここでは軍事力が著しく弱体化した状態を比喩的に表すために使われている。"}, {"word": "coerce", "definition": "強制する、脅迫して～させる、という意味の動詞。物理的または心理的な圧力を用いて相手に何かをさせる行為を指す。"}, {"word": "complacency", "definition": "現状への慢心・油断・自己満足を意味する名詞。危機感なく現状に満足し、必要な対策を怠る状態を指す。"}, {"word": "conscription", "definition": "徴兵制・強制的な兵役義務を意味する名詞。国家が国民に対して軍への入隊を法的に義務付ける制度を指す。"}, {"word": "geopolitical", "definition": "地政学的な、という意味の形容詞。地理的条件と政治・軍事・経済戦略との相互関係に関わる事柄を表す際に使われる専門用語。"}, {"word": "paradigm", "definition": "ある時代や分野において支配的な考え方・枠組み・モデルを意味する名詞。ここでは欧州が長年依拠してきた安全保障上の基本的な前提を指している。"}, {"word": "outlays", "definition": "支出・経費を意味する名詞（複数形）。特に政府や大企業による資金の支出額を指すフォーマルな表現。"}]}, {"title_ja": "アフリカのドローン戦争で勝っているのは誰か？", "title_en": "Who Is Winning Africa's Drone Wars?", "summary_ja": "筆者は、アフリカ全土で武装した非国家主体が安価な即席ドローンを国家軍よりも効果的に運用しており、政府がかつて享受していた制空権が失われつつあると主張する。米国がドローン能力をほぼ独占していた10年前と比べ、反政府勢力は急速に技術格差を縮めている。筆者はアフリカ各国政府が外国の供給者に依存するのではなく、独自のドローン能力を開発し、非正規戦に特化した軍を再編すべきだと訴えている。", "summary_en": "The author argues that armed nonstate actors across Africa are now deploying cheap, improvised drones more effectively than state militaries, eroding the air dominance governments once enjoyed. A decade after the U.S. held a near-monopoly on drone capability, rebel groups have rapidly closed the technology gap. The author contends that African governments must develop indigenous drone capabilities and restructure their militaries for irregular warfare rather than depending on foreign suppliers.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/somalia/who-winning-africas-drone-wars", "state_media": false, "category": "オピニオン", "full_text": "On June 22, 2025, fiber-optic first-person-view drones operated by the Azawad Liberation Front (FLA), a Tuareg rebel group, slammed into a convoy of Russian Africa Corps and Malian armed forces vehicles in northern Mali. Footage shows the drones striking two trucks, then cuts to fighters posing beside the wreckage. The significance was unmistakable: a little over a year after fiber-optic drones first appeared in Ukraine, a rebel group with scant resources had deployed the cutting-edge technology to humiliate two comparatively superior state actors.\nA decade earlier, the use of armed drones in African airspace looked very different. In 2011, the United States conducted the first drone strike on the continent, targeting senior leaders of the Somali Islamist group al-Shabab. At the time, Washington held a near monopoly in drone capability: only the world’s most advanced militaries had the access and technical expertise to employ the $20 million Predator drone used in the attack. That monopoly has since collapsed. Over the past decade, at least 37 African militaries have acquired drones of varying sophistication and cost.\nDrones have allowed African states’ small, lightly equipped forces to extend their reach across vast territories where state authority is contested. But over the last four years, armed nonstate actors in more than a dozen countries have begun to acquire and experiment with drones of their own, using them to enable ground operations, drop mortars, and conduct suicide attacks. They are now deploying these small uncrewed systems, many of which can be assembled from widely available and inexpensive parts, more effectively than states, who continue to rely on foreign governments for supply. In doing so, they have demonstrated that the gap between less-resourced and better-resourced adversaries has narrowed since the dawn of the drone wars, threatening the air dominance once enjoyed by states across the world.\nAfrican governments cannot hope to regain the military advantage by employing the strategies of a decade ago. Nor can they rely on foreign governments that have other incentives to provide them with the necessary firepower. Instead, they must learn to develop their own drones and integrate them into militaries built specifically for the irregular warfare required to defeat the insurgents that threaten them.\nAIR TRAFFIC CONTROL\nAfrica’s drone race began in Libya and Ethiopia. During its second civil war, which officially lasted from 2014 to 2020, Libya became the world’s most active drone battlefield. The country’s relatively open terrain, along with extensive weapons supply lines from external state actors, turned the war into a testing ground for emerging technology. The Tripoli-based Government of National Accord and the Benghazi-based Libyan National Army exchanged thousands of drone strikes, culminating in the 2020 battle for Tripoli. During the battle, Bayraktar TB2 drones supplied to the GNA by Turkey loitered just beyond the range of the LNA’s Russian-supplied air defenses and provided critical air support to GNA forces as they beat back an LNA attack on the capital. The failure of the LNA offensive ultimately led to the 2020 cease-fire that ended hostilities.\nDrones played an even more consequential role in Ethiopia’s 2020–22 conflict with the rebel Tigray Defense Forces (TDF). By late 2021, a TDF offensive had advanced to within 65 miles of Addis Ababa, the country’s capital and seat of the African Union. Desperate, Ethiopian Prime Minister Abiy Ahmed turned to Iran, Turkey, and the United Arab Emirates for drones, which inflicted heavy casualties, targeted the TDF’s vulnerable communications and supply lines, and turned the imminent collapse of the government into a sweeping defeat for the TDF. As a former Tigrayan officer involved in the offensive later told The Economist, “We could have captured Addis easily . . . . It was those fucking drones . . . . We had no way of shooting them down.”\nThe outcome of the Libyan and Ethiopian conflicts turned on a small number of capable drones, employed alongside capable infantry and mechanized forces. The GNA and the Ethiopian armed forces’ access to superior drone technology allowed them to repel an exposed, invading adversary whose forces were concentrated. Other states took notice.\nWE’RE NOT IN ADDIS ANYMORE\nIn the years since, dozens of countries across Africa, seduced by the idea of affordable access to the air, have acquired long-endurance drones to deal with their adversaries, regardless of whether those adversaries used the same tactics as the LNA or the TDF.\nToday, the most significant threat facing African governments is a different type of insurgency: militant groups expanding their reach across the Sahel, the Lake Chad Basin, and Somalia. After a wave of military coups between 2020 and 2023 led to the expulsion of French, U.S., and UN forces, juntas in Mali, Burkina Faso, and Niger turned to Turkish Bayraktar and Akinci drones to re", "translation_ja": "2025年6月22日、トゥアレグ族の反政府武装組織であるアザワド解放戦線（FLA）が操縦する光ファイバー式一人称視点（FPV）ドローンが、マリ北部でロシア・アフリカ軍団とマリ軍の車列に突入した。映像には、2台のトラックに命中するドローンが映り、その後、戦闘員たちが残骸のそばでポーズをとる場面に切り替わる。この出来事の重要性は明白だった。光ファイバー式ドローンがウクライナに初めて登場してからわずか1年余り、乏しいリソースしか持たない反政府武装組織が、この最先端技術を用いて、比較的優位に立つ2つの国家主体を窮地に追い込んだのである。\n\n10年前、アフリカの空域における武装ドローンの使用はまったく異なる様相を呈していた。2011年、米国はアフリカ大陸で初めてのドローン攻撃を実施し、ソマリアのイスラム主義武装組織アル・シャバブの幹部を標的にした。当時、ワシントンはドローン能力をほぼ独占しており、その攻撃で使用された2000万ドルのプレデター・ドローンを運用する能力と技術的な専門知識を持つのは、世界で最も高度な軍隊だけだった。しかし、その独占は崩壊した。過去10年間で、少なくとも37のアフリカの軍隊が、さまざまな洗練度とコストのドローンを取得している。\n\nドローンは、アフリカ諸国の小規模で軽装備の部隊が、国家権威が争われている広大な領土に影響力を及ぼすことを可能にした。しかし過去4年間で、12カ国以上の武装非国家主体がドローンを独自に取得・実験し始め、地上作戦の支援、迫撃砲の投下、自爆攻撃に活用している。現在、彼らは広く入手可能な安価な部品から組み立てられるこれらの小型無人機を、外国政府への供給依存を続ける国家よりも効果的に運用している。これにより、ドローン戦争の黎明期と比べて、リソースが乏しい勢力と豊富な勢力との差が縮まったことが示され、かつて世界中の国家が享受していた制空権が脅かされている。\n\nアフリカ諸国政府は、10年前の戦略を用いて軍事的優位を取り戻すことはできない。また、必要な火力を供給する他の動機を持つ外国政府に頼ることもできない。代わりに、独自のドローンを開発し、自国を脅かす反乱軍を打倒するために必要な非正規戦に特化して構築された軍に統合することを学ばなければならない。\n\n【航空管制】\n\nアフリカのドローン競争はリビアとエチオピアから始まった。公式には2014年から2020年まで続いた第二次内戦中、リビアは世界で最も活発なドローン戦場となった。比較的開けた地形と、外部の国家主体からの広範な武器供給ルートが重なり、この戦争は新興技術の実験場となった。トリポリを拠点とする国民合意政府（GNA）とベンガジを拠点とするリビア国民軍（LNA）はドローン攻撃を何千回も交わし、2020年のトリポリ攻防戦で頂点に達した。この戦闘では、トルコがGNAに供給したバイラクタルTB2ドローンが、LNAのロシア製防空システムの射程外で旋回し、LNAが首都への攻撃を仕掛ける中でGNA軍への重要な航空支援を提供した。LNA攻勢の失敗は最終的に、戦闘を終結させた2020年の停戦につながった。\n\nドローンはエチオピアの2020〜22年のティグレ防衛軍（TDF）との紛争においても、さらに決定的な役割を果たした。2021年後半までに、TDFの攻勢はエチオピアの首都でありアフリカ連合の本部でもあるアディスアベバから65マイル以内にまで迫っていた。窮地に立ったエチオピアのアビィ・アハメド首相はイラン、トルコ、アラブ首長国連邦にドローンを求め、それらが甚大な被害をTDFに与え、TDFの脆弱な通信・補給線を標的にし、政府の壊滅的崩壊を一転してTDFの惨敗へと変えた。この攻勢に関わったティグレ人元将校が後に『エコノミスト』誌に語ったように、「我々はアディスを容易に攻略できたはずだった……あの忌まわしいドローンさえなければ……。我々には撃墜する手段がなかった」。\n\nリビアとエチオピアの紛争の帰結は、有能な歩兵部隊や機械化部隊と並んで運用された少数の高性能ドローンによって左右された。GNAとエチオピア軍が優れたドローン技術にアクセスできたことで、兵力を集中させた露出した侵攻相手を撃退することが可能となった。他の国家もこの教訓に注目した。\n\n【アディスはもう昔の話】\n\nそれ以来、アフリカ全土の数十カ国が、手頃な価格で空へのアクセスが得られるという考えに魅せられ、敵対勢力が国民軍（LNA）やTDFと同じ戦術を用いているかどうかに関わらず、長時間滞空型ドローンを取得してきた。\n\n今日、アフリカ各国政府が直面する最も重大な脅威は、異なるタイプの反乱である。サヘル、チャド湖盆地、ソマリアにわたって勢力を拡大する過激派武装組織だ。2020年から2023年にかけての一連の軍事クーデターにより、フランス、米国、国連の部隊が追放された後、マリ、ブルキナファソ、ニジェールの軍事政権はトルコのバイラクタルおよびアクンジ・ドローンに頼るようになった。", "vocab": [{"word": "fiber-optic", "definition": "光ファイバーを用いた（技術・通信に関する形容詞）。本文では、電波妨害を受けにくい光ファイバーケーブルで制御される最新型FPVドローンを指す。"}, {"word": "insurgents", "definition": "反乱者、武装蜂起した勢力を指す名詞。正規の国家権力に対して武力で抵抗する非国家主体を表し、政治・軍事的文脈で頻繁に使われる。"}, {"word": "loitered", "definition": "動詞 loiter の過去形で、軍事文脈では航空機やドローンが目標上空を長時間旋回・待機することを意味する。「徘徊する」が原義だが、軍事・技術文脈では「滞空する」と訳される。"}, {"word": "mechanized", "definition": "機械化された、という意味の形容詞。軍事用語では装甲車両や輸送車両を装備した部隊（機械化部隊）を指し、徒歩の歩兵部隊と区別される。"}, {"word": "monopoly", "definition": "独占、という意味の名詞。特定の技術・資源・市場を一者が排他的に支配している状態を指す経済・政治用語で、TOEIC・ビジネス英語でも頻出。"}, {"word": "junta", "definition": "軍事政権、軍事評議会を指す名詞（スペイン語由来）。クーデターで権力を掌握した軍人集団による統治体制を表す政治用語。"}, {"word": "long-endurance", "definition": "長時間の飛行・稼働が可能であることを示す複合形容詞。ドローンや航空機の文脈では、長時間滞空能力を持つ機体の特性を表す技術用語。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

document.getElementById("footer").textContent="Generated 2026-06-30 12:10 JST";
renderTabs();renderList();
</script>
