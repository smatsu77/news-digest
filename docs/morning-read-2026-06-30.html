 "vocab": []}, {"title_ja": "ゴジェック創業者ナディム・マカリム、汚職罪で禁錮刑を宣告", "title_en": "Gojek Founder Nadiem Makarim Sentenced to Prison for Corruption Over Laptop Deal", "summary_ja": "インドネシアのスーパーアプリ「ゴジェック」の創業者ナディム・マカリム氏が、汚職罪により禁錮刑を言い渡された。事件は同氏が教育大臣を務めていた期間中に行われたノートパソコンの調達契約に関するものである。東南アジアを代表するテック起業家の一人による今回の有罪判決は、大きな衝撃をもって受け止められている。", "summary_en": "Nadiem Makarim, the founder of Indonesian super-app Gojek, has been sentenced to years in jail for corruption. The case centers on a laptop procurement deal made during his tenure as Indonesia's education minister. The conviction marks a significant fall from grace for one of Southeast Asia's most prominent tech entrepreneurs.", "source": "BBC", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c79yvw23yr9o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "南アフリカで不法移民排斥デモ、6月30日を「退去期限」と設定", "title_en": "Anti-Migrant Protests Grip South Africa Ahead of Unofficial June 30 Deadline", "summary_ja": "南アフリカの反移民グループが、不法移民に対して国外退去を求める非公式の期限を6月30日と設定し、各地でデモが行われている。当局によると、これまでのところ大きな暴力事件は発生していないという。地元住民と移民コミュニティの間の緊張が高まる中、国内は不安定な状況に置かれている。", "summary_en": "Anti-immigrant groups in South Africa have set June 30 as an unofficial deadline demanding undocumented migrants leave the country, sparking protests across multiple cities. Authorities report that violence has remained limited so far. The situation has put the nation on edge as tensions between local communities and migrant populations continue to rise.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/south-africa-on-edge-with-anti-migrant-protests-underway/live-77735079?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "レオ14世教皇、分裂派カトリック団体に司教叙階の中止を要請", "title_en": "Pope Leo XIV Urges Rebel Catholics to Halt Bishop Consecrations Amid Schism Fears", "summary_ja": "レオ14世教皇は、分裂派カトリック団体が計画している司教の叙階式を中止するよう訴えた。この叙階が強行された場合、カトリック教会との正式な分裂（シスマ）を引き起こす可能性があるとして、教会関係者は事態を注視している。主流派カトリック教会と反主流派グループの間の緊張が高まっており、世界のカトリック社会に重大な影響を与えかねない状況だ。", "summary_en": "Pope Leo XIV has appealed to a breakaway Catholic group to cancel a planned consecration of bishops, warning that such an act could trigger a formal schism within the Catholic Church. The move reflects growing tensions between the mainstream Church and the rebel faction. Church leaders are closely watching the situation as the potential split could have significant implications for global Catholicism.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/pope-pleads-with-breakaway-catholics-before-possible-schism/a-77767568?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米大使、インド米国貿易協定が「最終段階」と表明", "title_en": "US Envoy Says India-US Trade Deal in Final Steps", "summary_ja": "米国大使セルジオ・ゴル氏は、インドと米国の間の初期貿易協定が「最終段階」にあると楽観的な見通しを示した。両国政府は交渉の進展に自信を持った姿勢を示している。一方、インドの野党政治家アジャイ・ライ氏は警察に拘束されたと主張し、国内政治にも注目が集まっている。", "summary_en": "US Ambassador Sergio Gor expressed optimism that an initial trade deal between India and the United States is in its 'final steps.' Both governments have been projecting confidence as negotiations progress. Meanwhile, Indian opposition politician Ajay Rai claimed he was detained by police, adding a domestic political dimension to the day's news.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/india-news-us-envoy-says-trade-deal-breakthrough-in-sight/live-77764236?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ連続地震、公式死者数1,719人は過小評価の恐れ", "title_en": "Venezuela Earthquake Death Toll Feared Severely Undercounted After Twin Disasters", "summary_ja": "ベネズエラを襲った連続地震により、住宅密集地が壊滅的な被害を受けた。発生から5日が経過した時点での公式死者数は1,719人とされているが、専門家はこの数字が実態を大幅に下回っている可能性があると警告している。災害後の混乱や調査の困難さから、真の被害規模の把握は依然として難しい状況が続いている。", "summary_en": "Twin earthquakes struck Venezuela, flattening entire residential neighborhoods and leaving widespread destruction in their wake. Five days after the disaster, the official death toll stands at 1,719, but experts warn this figure may be a serious undercount. The true scale of casualties remains difficult to determine amid the chaos and challenges of post-disaster assessment.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/30/world/americas/venezuela-earthquake-death-toll.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "米国とイランがカタールで会談、緊張高まる中で外交交渉", "title_en": "U.S. and Iran Hold Talks in Qatar Amid Rising Tensions", "summary_ja": "米国とイランの当局者が外交交渉のためカタールに集まり、湾岸諸国の同国が両国間の重要な仲介役を担っている。会談は、恒久的な和平合意に向けた取り組みを脅かす新たな攻撃が発生してから数日後に行われた。今回の協議の結果は、ワシントンとテヘランの間の交渉の行方を左右する重要な意味を持つ可能性がある。", "summary_en": "American and Iranian officials have gathered in Qatar for diplomatic meetings, with the Gulf state serving as a key mediator between the two countries. The talks come just days after a new round of attacks threatened to derail ongoing efforts to reach a lasting peace agreement. The outcome of these meetings could prove critical to the future of negotiations between Washington and Tehran.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/live/2026/06/30/world/iran-us-talks-qatar-hormuz", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "キーウで卒業ダンスパーティー開催、しかしマーシャの相手は一人で踊った", "title_en": "Kyiv Prom Continues, But One Teen's Date Dances Without Her", "summary_ja": "キーウに住む15歳のマーシャ・ポルスカは、学校の卒業パーティーでグループワルツを踊ることを長年夢見ていた。ウクライナでの戦争が続く中、パーティーは予定通り開催されたが、マーシャはその場に立つことができなかった。彼女の相手は一人でダンスフロアに立ち、その姿は戦争が人々の日常に与える深い悲しみを映し出していた。", "summary_en": "Masha Polska, a 15-year-old avid dancer in Kyiv, had long dreamed of performing in the traditional group waltz at her school prom. The celebration went ahead despite the ongoing war in Ukraine, but Masha was unable to attend. Her date danced alone in her absence, marking a poignant moment that captured the human toll of the conflict on everyday life.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/06/30/world/europe/russia-ukraine-prom.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "人質合意の進展でパレスチナ人が北ガザへ徒歩で帰還", "title_en": "Palestinians Return to Northern Gaza After Hostage Deal Breaks Deadlock", "summary_ja": "イスラエルはガザ地区を二分する軍事ゾーンの通過を避難民に許可し、パレスチナ人が北ガザへ徒歩で戻り始めた。この動きは、人質解放をめぐる膠着状態が打開されたことを受けたものである。紛争に巻き込まれた民間人にとって、状況の大きな転換点となっている。", "summary_en": "Israel has permitted displaced Palestinians to cross a military zone dividing the Gaza Strip, allowing them to return to northern Gaza on foot. The movement follows a resolution of a standoff over hostage releases, which had previously blocked the crossing. The development marks a significant shift in conditions for civilians caught in the ongoing conflict.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/palestinians-flock-back-to-northern-gaza-on-foot-after-hostage-release-breakthrough-3f60e2db", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "中国大手不動産デベロッパーの万科が巨額損失を計上、不動産危機の深刻化を示す", "title_en": "China's Vanke Reports Massive Loss Amid Deepening Property Crisis", "summary_ja": "中国大手不動産デベロッパーの万科（ヴァンキー）が多額の損失を報告し、中国の不動産危機が一層深刻化していることが明らかになった。万科の経営難は、不動産セクターの混乱が中国全土に広がり続けているとの懸念を新たに呼び起こしている。中国政府が事態の悪化を防ぐために介入するかどうかに注目が集まっている。", "summary_en": "Leading Chinese property developer Vanke has reported a significant financial loss, signaling that the country's real estate crisis continues to worsen. The troubled developer's struggles raise fresh concerns about the broader spread of property sector instability across China. Observers are now questioning whether the Chinese government will intervene to prevent further deterioration.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/even-chinas-property-stalwart-isnt-immune-from-the-crisis-19799863", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "解放されたイスラエル人質、10月7日攻撃の破片が体内に残存", "title_en": "Freed Israeli Hostages Found With Shrapnel Still in Bodies From Oct. 7 Attack", "summary_ja": "イスラエルの医療当局者によると、ガザから解放された人質の体内には、10月7日のハマス攻撃による破片がいまだに残っていたことが明らかになった。一部の女性は長期間にわたり単独で拘束され、約8か月を地下トンネルの中で過ごしたという。これらの事実は、拘束された人々が置かれていた深刻な身体的・精神的状況を浮き彫りにしている。", "summary_en": "Israeli hostages released from Gaza were found to still have shrapnel embedded in their bodies from the October 7 Hamas attack, according to an Israeli medical official. Some of the women had been held in isolation for extended periods, spending approximately eight months confined in underground tunnels. The revelations highlight the severe physical and psychological conditions endured by those taken captive.", "source": "Wall Street Journal", "tier": "paper", "link": "https://www.wsj.com/articles/freed-israeli-hostages-still-had-shrapnel-in-their-bodies-from-oct-7-attack-3de8cd1e", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "南アフリカ、反移民デモを前に各地に警察部隊を展開", "title_en": "South Africa Deploys Police Ahead of Anti-Immigration Marches", "summary_ja": "南アフリカ当局は、不法滞在の外国人を標的とした計画的なデモに備え、全国の都市や町に警察部隊を展開した。ヨハネスブルクの中心業務地区では治安部隊や南アフリカ国防軍の車両が目撃され、多くの商店主が休業を決断した。政府は、62人が死亡した2008年の反移民暴力の再発を懸念している。", "summary_en": "South African authorities have deployed police units across towns and cities in anticipation of planned demonstrations against undocumented foreign nationals. Security forces, including the South African National Defence Force, were visible in Johannesburg's central business district, prompting many shopkeepers to close. The government fears a repeat of the 2008 anti-migrant violence that resulted in looting and 62 deaths.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/30/south-africa-police-anti-immigrant-protests", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カーボベルデのW杯躍進、英国の移民コミュニティに誇りと喜び", "title_en": "Cape Verde's World Cup run sparks pride among UK diaspora community", "summary_ja": "カーボベルデ代表がワールドカップでスペインやウルグアイと引き分けるなど健闘を見せ、英国在住のカーボベルデ系移民コミュニティに大きな誇りをもたらしている。13歳のローレンさんをはじめ、多くの在英カーボベルデ人にとって、この大会は小さな島国アフリカ諸国に世界的な注目を集める貴重な機会となっている。選手たちの活躍はSNSや日常会話で広く話題を呼び、カーボベルデの名を世界に知らしめることとなった。", "summary_en": "Cape Verde's impressive performances at the World Cup, including hard-fought draws against Spain and Uruguay, have filled the country's diaspora community in the UK with immense pride. For many Cape Verdeans in Britain, including 13-year-old Lauryn, the tournament has brought rare global visibility to the small African island nation. The team's displays of talent and skill have sparked widespread conversations and put Cape Verde firmly on the world map.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jun/26/cape-verde-world-cup-run-delights-diaspora-community-uk", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コンゴ民主共和国でエボラ陽性者約300人の行方不明、大規模感染拡大を懸念", "title_en": "Nearly 300 Ebola-positive people unaccounted for in DR Congo amid fears of mass outbreak", "summary_ja": "コンゴ民主共和国でエボラ出血熱の陽性判定を受けた約300人の所在が不明となっており、地域社会での大規模感染拡大への懸念が高まっている。アフリカCDCのジャン・カセヤ事務局長は、紛争地帯にある難民キャンプに100万人以上が暮らしているが、医療従事者がアクセスできない状況にあると警告した。感染が封じ込められなければ、9月までに数千人が死亡するとのモデリング予測も示されている。", "summary_en": "Almost 300 people who tested positive for Ebola in the Democratic Republic of the Congo cannot be located, raising fears of widespread community transmission. Africa CDC Director General Dr Jean Kaseya warned that over one million people are living in conflict-zone camps inaccessible to health workers. Modelling projections warn of thousands of deaths in the DRC by September if the outbreak is not contained.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jun/26/whereabouts-of-nearly-300-people-with-ebola-unknown-in-drc", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "大学生の学力は思っているよりずっと低い", "title_en": "Students are doing worse than you think", "summary_ja": "新たな分析により、大学生の学力水準が一般的に思われているよりも大幅に低いことが明らかになった。一部の高等教育機関の学生は、基礎的な能力テストで10歳児と同程度の結果しか出せていない。この調査結果は、現代の高等教育制度の質と厳格さに対して深刻な疑問を投げかけている。", "summary_en": "A new analysis reveals that academic performance among college and university students is significantly lower than commonly assumed. Some higher education students are testing at the same level as ten-year-old children in core competency areas. The findings raise serious questions about the quality and rigor of modern higher education systems.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/25/students-are-doing-worse-than-you-think", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "独裁国家が台頭する国際紛争調停の新潮流", "title_en": "Autocracies Are Reshaping Global Conflict Mediation", "summary_ja": "権威主義体制の国家が国際的な調停役として存在感を増しており、従来の仲介役であった西側民主主義諸国や多国間機関を押しのけつつある。これらの独裁国家が主導する和平合意は、民主主義的規範や人権よりも政治的安定や政権維持を優先する傾向がある。こうした変化は、国際的な紛争解決の性格と結果を根本から塗り替えようとしている。", "summary_en": "Authoritarian states are increasingly stepping into the role of international peacemakers, displacing traditional mediators such as Western democracies and multilateral institutions. The deals brokered by these autocracies tend to reflect their own political values and interests, prioritizing stability and regime survival over democratic norms or human rights. This shift is fundamentally altering the character and outcomes of global conflict resolution.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/18/meet-the-worlds-new-peacemakers", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アジアの同盟国、トランプ氏との緊密関係を余儀なくされる", "title_en": "Asian Allies Have No Choice But to Embrace Donald Trump", "summary_ja": "日本をはじめとするアジア諸国は、トランプ政権への不安にもかかわらず、米国との緊密な関係を維持せざるを得ない状況に置かれている。中堅国連合の結成といった代替案は現実的な抑止力を持たず、中国の軍事・経済的台頭に対抗できるのは米国のみだという認識が地域同盟国の間で共有されている。この厳しい戦略的現実が、アジア各国政府をワシントンとの関係を最優先にさせる要因となっている。", "summary_en": "Japan and other Asian nations are compelled to maintain close ties with the United States despite uncertainties surrounding Donald Trump's presidency. The prospect of forming independent middle-power coalitions holds little appeal, as regional allies recognize that only American deterrence can effectively counter China's growing military and economic influence. This reality forces Asian governments to prioritize the Washington relationship above all other strategic alternatives.", "source": "The Economist", "tier": "paper", "link": "https://www.economist.com/international/2026/06/16/asian-allies-are-doomed-to-hug-donald-trump-close", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震：当局が救助を断念する中、家族たちが自ら瓦礫を掘り続ける", "title_en": "Venezuela Earthquake: Families Dig Through Rubble as Rescuers Stand Down", "summary_ja": "ベネズエラを襲った2度の大地震から5日が経過した今も、最も被害の大きかったラグアイラ地区では、倒壊した建物に家族が埋まっている人々が自力で救助活動を続けている。公式の救助隊は危険を理由に作業を中断しているが、肉親を持つ家族たちは休むことなく瓦礫を掘り進めている。生存者を救い出すため、当局の判断に頼らず自らの手で活動を続ける家族たちの姿が報告されている。", "summary_en": "Five days after two powerful earthquakes struck Venezuela, families in La Guaira — the hardest-hit region — are conducting their own search-and-rescue operations without pause. Official rescue workers have halted efforts, citing safety concerns over the unstable rubble. Desperate relatives refuse to stop, continuing to dig by hand in hopes of pulling survivors from collapsed buildings.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/international/article/2026/06/30/venezuela-earthquakes-the-rescue-workers-didn-t-try-anything-they-say-it-s-too-dangerous-but-we-keep-going_6755002_4.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "南アフリカ：外国人排斥運動が激化、数千人が国外脱出を余儀なくされる", "title_en": "South Africa: Violent Anti-Foreigner Campaign Forces Thousands to Flee", "summary_ja": "「マーチ・アンド・マーチ」と呼ばれる反移民活動家グループが、6月30日までに全ての外国人が南アフリカを離れるよう最後通告を突きつけた。暴力を伴うこの運動により、数千人の移民が荷造りを始め出国の準備を進めている。過去の排外主義的な圧力にも耐えてきた長期滞在者たちでさえ、今回は国を去らざるを得ないと語っている。", "summary_en": "Anti-migrant activists from the 'March and March' movement have issued an ultimatum demanding all foreigners leave South Africa by June 30. The campaign has turned violent, prompting thousands of migrants to pack their belongings and prepare to depart. Even long-term residents who previously weathered xenophobic pressure say they now feel compelled to leave.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/le-monde-africa/article/2026/06/30/i-resisted-xenophobic-pressure-in-the-past-but-now-we-have-to-leave-in-south-africa-a-violent-campaign-against-foreigners_6755003_124.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "フランス、観測史上最も激しい熱波を経験", "title_en": "France Experiences Its Most Intense Heatwave on Record", "summary_ja": "フランスは観測史上最も深刻な熱波に見舞われ、国の対応と準備態勢について広く議論が巻き起こっている。ル・モンド紙の気候担当記者ナビル・ワキムが読者からの質問に答えるライブQ&Aセッションを開催する。セッションでは、気候変動が深刻化する中、今後の猛暑にどう対応すべきかについても議論される予定だ。", "summary_en": "France has just endured its most severe heatwave in recorded history, prompting widespread discussion about the country's preparedness and response. Le Monde's climate journalist Nabil Wakim is hosting a live Q&A session to address reader questions about how France managed the crisis. The session will also explore what measures may be needed to handle future extreme heat events as climate change intensifies.", "source": "Le Monde", "tier": "paper", "link": "https://www.lemonde.fr/en/environment/live/2026/06/30/france-just-experienced-its-most-intense-heatwave-ever-ask-your-questions-to-le-monde-s-climate-expert_6755005_114.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "モロッコのサイバリ、オランダ戦決勝PKを決め母親と抱擁", "title_en": "Morocco's Saibari Embraces Mother After Winning Penalty Against Netherlands", "summary_ja": "モロッコのイスマエル・サイバリがオランダ戦で決勝ペナルティキックを決め、チームの勝利に貢献した。試合後、サイバリはピッチ上で母親と感動的な抱擁を交わし、喜びを分かち合った。この勝利はモロッコにとって大会における重要な成果となった。", "summary_en": "Morocco's Ismael Saibari scored the decisive penalty to defeat the Netherlands, sparking emotional celebrations. The player shared a heartfelt moment with his mother on the pitch following the victory. The win marks a significant achievement for Morocco in the tournament.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/6/30/morocco-player-hugs-mother-as-team-celebrates-win-against-netherlands?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ゴジェック共同創業者ナディム・マカリム氏、汚職罪で懲役10年の判決", "title_en": "Gojek Co-Founder Nadiem Makarim Sentenced to 10 Years for Corruption in Indonesia", "summary_ja": "配車サービス大手ゴジェックの共同創業者で元インドネシア教育相のナディム・マカリム氏が、汚職罪により懲役10年の判決を受けた。インドネシアの裁判所は同氏が職権を乱用し、国家に財政的損失をもたらしたと認定した。東南アジアを代表するテック起業家の一人による今回の判決は、大きな衝撃を与えている。", "summary_en": "Nadiem Makarim, co-founder of ride-hailing giant Gojek and former Indonesian education minister, has been sentenced to 10 years in prison for corruption. An Indonesian court found him guilty of abuse of authority and causing financial losses to the state. The verdict marks a significant fall from grace for one of Southeast Asia's most prominent tech entrepreneurs.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/economy/2026/6/30/gojek-co-founder-nadiem-makarim-sentenced-to-10-years-for-corruption?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "FIFAワールドカップ第20日：フランス、ノルウェー、メキシコが決勝トーナメント進出を争う", "title_en": "FIFA World Cup Day 20: France, Norway and Mexico Vie for Round of 16 Spots", "summary_ja": "ワールドカップ第20日は、フランス、ノルウェー、メキシコが決勝トーナメント進出をかけた重要な試合に臨む。ノックアウトステージが続く中、一部のチームはすでに大会から姿を消している。火曜日のスケジュールでは、トーナメントの行方を左右する緊迫した試合が繰り広げられる見込みだ。", "summary_en": "World Cup Day 20 features crucial matches as France, Norway, and Mexico compete to secure their places in the Round of 16. The knockout stage continues with several teams still fighting for advancement while others have already been eliminated. Tuesday's schedule promises high-stakes action as the tournament field continues to narrow.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/6/30/fifa-world-cup-tuesday-schedule-predictions-and-eliminated-teams?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イスラエル2026年選挙世論調査トラッカー：最新予測", "title_en": "Israel 2026 Election Poll Tracker: Latest Projections", "summary_ja": "ハアレツ紙は、2026年に予定されるイスラエル総選挙に向けた最新の世論調査データを追跡している。このトラッカーは複数の調査結果を集約し、各政党の得票予測を示している。政治・安全保障情勢の変化を受け、有権者の動向を反映した最新予測が随時更新されている。", "summary_en": "Haaretz is tracking the latest polling data ahead of Israel's anticipated 2026 elections. The tracker aggregates survey results to project potential outcomes for the various political parties. Updated projections reflect shifting voter sentiment amid ongoing political and security developments in Israel.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMi_AFBVV95cUxPVUo4RFA4OEd0dE55NzBCQnByUHNCd0JxSmNCU0NYSTc5QXNudFlsMlFzNFMxYVVZQTR0c1pHRkRvVndYZ0ltQWxzNUVuTWJveGxuR1ZvQXVvTkJWLVpqVEVzRjByVHpvR0pWM1lMNjh1dmotQ0FhdE0yVzZ4YkVUUXpUeDhkQ0M1TzZpaFdpejVQQWVUYXhoRzZCRVdLRTVsamptWGVMM1FQVVVyMVlLUkVqeXNXWnd6TTR3MlZIa0oxWDdKV0RPQzBJMmVJVVA3bDd5bDNnUzdXVENLdmJGN0laeDZ0dGFxZUZBbGhSZjJDMWZoQnNGNmo2MDY?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "「ユダヤ人国家」発言めぐりイスラエル外交官がマムダニ氏を反ユダヤ主義と非難", "title_en": "Israeli Diplomats Accuse Mamdani of Antisemitism Over 'Jewish State' Remark", "summary_ja": "イスラエルの高官外交官らが、マフムード・マムダニ氏による「ユダヤ人国家」に関する発言を受け、同氏を反ユダヤ主義だと非難した。この非難は、イスラエルへの批判的発言をどう解釈するかをめぐる緊張を反映している。今回の発言は、政治的批判と反ユダヤ主義の境界線に関する議論を巻き起こしている。", "summary_en": "Top Israeli diplomats have accused Mahmood Mamdani of antisemitism following a remark he made about the 'Jewish state.' The accusation reflects ongoing tensions surrounding criticism of Israel and how such statements are interpreted by Israeli officials. The incident has sparked debate over the boundaries between political criticism and antisemitism.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiiAJBVV95cUxQSXQtMGVmRUtaQTNPeDJiMno1dVhUbFo1ellKbFhKUzVkUTFlTldWUjByaWNab0NrOXVYZE0wNTlFN2FMOF9rZ2RNOFR6WnRUSXJ4YWQxemItRjVOVGFtNnlwdWZ0Wk1iS29TdTRycDZma3J1VmFaaE5IdWV4SkE5bDFlMURMTFJiaXluRExrbE9tOGd0SF9FYmE1T2JocU9MRTM4eDQwTWtIQ1M3bUNYVERyMmJUNlZFOVRnYTdnT3VrYWh3YWJEN3E3R3FsSmhubWVuWWxBcjVvZXIxN0lrSUZMdDVfcXZlOXVsckprM050dTEwWXRjcUxGZE5TM0tVa0xTTUU3ajU?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イスラエル軍がシリア南部への支配を強化、住民たちが「耐え難い現実」を訴える", "title_en": "IDF Tightens Grip on Southern Syria, Locals Describe Unbearable Reality", "summary_ja": "イスラエル国防軍がシリア南部での軍事的プレゼンスを拡大する中、現地住民は移動の自由や生活必需品へのアクセスが厳しく制限され、「無人地帯に閉じ込められた」状態にあると訴えている。アサド政権崩壊後にイスラエル軍が緩衝地帯を越えて支配地域を拡大しており、住民たちは耐え難い生活状況を強いられていると報告されている。人権監視団体もこの地域の人道状況について深刻な懸念を示している。", "summary_en": "As the Israeli Defense Forces expand their presence in southern Syria, residents of the region report being trapped in a no man's land with severely restricted movement and access to basic necessities. Locals describe an unbearable reality under the tightening Israeli military control following the collapse of Assad's government. The situation has drawn concern from human rights observers monitoring conditions in the occupied buffer zone and surrounding areas.", "source": "Haaretz", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMinwJBVV95cUxPV0RRTndfNUFmM081aGh0ZVdRMjFpNHY0cmNXQUpEWUFLdC0wTEdHMUlJcTd5ZWhUR2hMQkhKaWNQY0F1RVlST1hORks5UVJ0WkFUMjZIYUVkRWJndk1tZDdPZjhZSlZzWEJQWkEySDBjeXNfQlpvTWoxR2dKN0lEWlNheDJSM0VXT01iT3VlUEI3dU9nVmRYbzZsTzg5VUFrN2hLYi05LUd3eEhQS2JMVW1VaHBYaHBiYTNrWjRXbTlrLVk0bEx1YVFuWUZTdk9hSkZIeFZBSlgyRldmeV9aM2xtc2VRS2Q2ZFJEdTFDY29PbU5QMUN1NWYzMmNiX0xKdkwxRGxnYk5ERU9RY1dXZ21jWHh1MGl0WXdkSlpsNA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国防省ニュースレター更新 – 2026年6月30日", "title_en": "Mindef Newsletter Update – June 30, 2026", "summary_ja": "シンガポール国防省（Mindef）は2026年6月30日火曜日にニュースレターを配信した。この通知はストレーツ・タイムズのメール購読サービスを通じて発信された。読者はリンクから追加の無料ニュースレターへの登録や購読管理を行うよう案内された。", "summary_en": "The Singapore Ministry of Defence (Mindef) issued a newsletter update on Tuesday, June 30, 2026. The communication was distributed via The Straits Times email subscription service. Readers were directed to manage their subscriptions or sign up for additional free newsletters through the provided links.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1367071", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イブニング・アップデート – ストレーツ・タイムズ・ニュースレター", "title_en": "Evening Update – The Straits Times Newsletter", "summary_ja": "ストレーツ・タイムズがイブニング・アップデートのニュースレターを配信した。本文にはニュースレターの追加登録案内と購読管理に関する情報が含まれている。提供されたテキストからは具体的なニュース内容を抽出することができなかった。", "summary_en": "The Straits Times published its Evening Update newsletter edition. The excerpt contains subscription management information and a sign-up prompt for additional free newsletters. No substantive news content was extractable from the provided text.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179898", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ストレーツ・タイムズ モーニングブリーフィング – 2026年6月30日", "title_en": "The Straits Times Morning Briefing – June 30, 2026", "summary_ja": "ストレーツ・タイムズは2026年6月30日付けのモーニングブリーフィングニュースレターを配信した。このブリーフィングは、購読者向けにその日のトップニュースをまとめた日刊ダイジェストである。読者は同紙のウェブサイトを通じて購読管理や追加の無料ニュースレターへの登録が可能だ。", "summary_en": "The Straits Times published its Morning Briefing newsletter on June 30, 2026. The briefing serves as a daily digest of top news stories for subscribers. Readers can manage their subscription or sign up for additional free newsletters through the publication's website.", "source": "The Straits Times", "tier": "paper", "link": "https://www.straitstimes.com/node/1179656", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "元インドネシア教育相ナディム、クロームブック汚職事件で懲役10年の判決", "title_en": "Former Indonesian Education Minister Nadiem Makarim Sentenced to 10 Years in Chromebook Corruption Case", "summary_ja": "インドネシアの元教育大臣ナディム・マカリムが、学校向けクロームブック調達をめぐる汚職事件で懲役10年の判決を受けた。この事件は、全国の学校にノートパソコンを配布する政府プログラムにおける不正疑惑に関するものである。ライドシェア大手ゴジェックの共同創業者でもある元大臣への判決は、インドネシア社会に大きな衝撃を与えている。", "summary_en": "Former Indonesian Education Minister Nadiem Makarim has been sentenced to 10 years in prison in connection with a corruption case involving the procurement of Chromebook laptops. The case centers on alleged irregularities in a government program to distribute laptops to schools across Indonesia. The verdict marks a significant legal outcome for the high-profile former minister and co-founder of ride-hailing giant Gojek.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMivgFBVV95cUxOQVBXd2RnQTdQMS1UWUZmV1liTGMzbXN5TXNXdEZBTi11QVJMOEhuSEg1YWR4R0NvejRIRUstUW1kNzdFRkVJYXVXU1VTS2lPUmRiUjdnTURiakdicFhwUW8wYmV4UHUtOEh1aWJpNndqUVpqOWZTbmhwMXRUWmI0aDRHdUE0dE9xMXJjbFNwM3Foem4tNHNVa2Y3b3BTd0VJaXJrM0M5N3BCbkNoMkZEZVJLTEQ1bkdYc2xoNm93?oc=5", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "持続可能性の言説と経済の現実：矛盾を解消できるか？", "title_en": "Sustainability Rhetoric vs. Economic Reality: Can We Square the Circle?", "summary_ja": "ジャカルタ・ポスト紙は、持続可能性の目標と途上国が直面する経済的プレッシャーの間に高まる緊張関係を検証している。政府や企業はグリーンな言説を掲げながらも、短期的な経済成長を優先することが多く、環境への真剣なコミットメントが実現可能かどうかが問われている。同記事は、野心的な持続可能性目標と経済開発の現実的な要求を両立させることが可能かどうかを探っている。", "summary_en": "The Jakarta Post examines the growing tension between sustainability goals and economic pressures facing developing nations. Governments and businesses often champion green rhetoric while prioritizing short-term economic growth, raising questions about whether meaningful environmental commitments are achievable. The article explores whether it is possible to reconcile ambitious sustainability targets with the practical demands of economic development.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVFZHNFRKQkxoVGVGRTI2OHZGcUVTdjJvMkVqR0FWX0FGRndjdVVrd3dDem5RVVR5LXYtVUthcE9NX041cW9pX0trT25vRXhMMGF0dVA3VThXM0RyYWRMTXN6dHJ4V2xPLUdnczlVdWROa3JBVkZPWVpLdUwzQTRHcm1xTDlEMVpYUlUxaV9ocnRNUkt5Y2xtaWRwcUdTZVRqc3BvS3E2bnM3X2ItVHJlU1J3NzF3cWJrX1E?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コモド島への観光客が増加傾向", "title_en": "Tourist Visits to Komodo Island on the Rise", "summary_ja": "世界的に有名なコモドオオトカゲの生息地であるコモド島で、観光客数が増加している。この島はインドネシアを代表するエコツーリズムの目的地として注目を集めており、訪問者の関心が高まっている。当局や自然保護活動家たちは、観光開発と島固有の野生動物および生態系の保護を両立させるため、観光客の増加を注視している。", "summary_en": "Komodo Island, home to the world-famous Komodo dragons, is experiencing a surge in tourist arrivals. The increase in visitors highlights the island's growing appeal as a premier ecotourism destination in Indonesia. Authorities and conservationists are monitoring the influx to balance tourism development with the protection of the island's unique wildlife and ecosystem.", "source": "The Jakarta Post", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMikwFBVV95cUxOQnVENlpVakhEVnVrUXdKUzdjUVljNjJzQ2pMRnliQTB5Wm4xV01fdEx3Y3JwaWcxc3Z3SUM2U1MyLU9fNHV6MFJ6MTRmN2E1NTBMZlZKU3d0NGZ2VU0yUVBEZzF4NG4xdTE2NmFXVDQ3TDYyMHRQQ1FaeVhDaVFmWkE1ZmpWOHhiNmxRd0NmbnpSdlk?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "国連でインド：FATFの信頼性への疑問は審査への恐れを反映、と指摘", "title_en": "India at UN: Questioning FATF Credibility Reflects Fear of Scrutiny", "summary_ja": "国連駐在インド代表のパルヴァタネニ・ハリシュ氏は、FATFの信頼性を損なおうとする試みは、国際的な審査を恐れる国々から生じることが多いと述べた。同氏は、否定的な評価を受けた国々に対し、欠陥の是正、国内執行の強化、金融透明性の向上を求めた。インドはテロ資金供与ネットワークに対する不可逆的な措置の重要性を強調した。", "summary_en": "India's Permanent Representative to the UN, Parvathaneni Harish, stated that attempts to undermine FATF's credibility often stem from countries fearing international scrutiny. He urged nations receiving adverse assessments to address deficiencies, strengthen domestic enforcement, and improve financial transparency. India emphasized the need for irreversible action against terror-financing networks rather than challenging the watchdog's legitimacy.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/national/attempts-to-question-fatfs-credibility-often-reflect-fear-of-scrutiny-india-at-un/article71164533.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イラン革命防衛隊員2人が銃撃で死亡", "title_en": "Two Iranian Revolutionary Guards Members Shot Dead in Attack", "summary_ja": "イランの国営メディアによると、イスラム革命防衛隊の隊員2人が銃撃攻撃を受けて死亡した。攻撃の場所や詳細な状況は直ちには明らかにされなかった。イラン当局はこれまでも同地域での同様の暴力事件についてクルド人分離主義グループの関与を指摘してきたが、今回の事件についてはまだ犯行声明は出ていない。", "summary_en": "Two members of Iran's Islamic Revolutionary Guard Corps were killed in a shooting attack, according to Iranian state media. The location and exact circumstances of the attack were not immediately disclosed. Iranian authorities have previously attributed similar violence in the region to Kurdish separatist groups, though no group has yet claimed responsibility for this incident.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/attackers-shoot-dead-two-guards-members-in-iran-state-media/article71165279.ece", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "カタール「米・イラン直接交渉なし」、ウィトコフら特使がドーハで仲介者と会談", "title_en": "Qatar: No Direct US-Iran Talks as Witkoff, Kushner Meet Mediators in Doha", "summary_ja": "カタールは、米国特使のウィトコフらがドーハで仲介者と会合を持つ中、米国とイランの直接交渉は現時点で行われていないと明らかにした。両国は軍事攻撃を一時停止したものの、交渉の形式や次のステップについては意見が対立している。もう一つの仲介国であるパキスタンは、米・イラン協議が6月30日に再開されると述べていた。", "summary_en": "Qatar has clarified that no direct talks between the United States and Iran are currently taking place, even as U.S. envoys Steve Witkoff and Adam Boehler meet with mediators in Doha. Both sides have paused military strikes but remain at odds over the format and next steps for negotiations. Pakistan, another key mediator, had previously indicated that US-Iran talks would resume on June 30.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/us-iran-deal-strikes-live-updates-30-june-2026-trump-israel-west-asia-war/article71164180.ece", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ヤンキース、台湾人投手有望株と100万ドルで契約", "title_en": "Yankees Sign Taiwanese Pitching Prospect for $1 Million", "summary_ja": "ニューヨーク・ヤンキースは、台湾人の投手有望株と100万ドルの契約を結んだ。この契約は、MLBが台湾の野球人材に引き続き注目していることを示している。投手の経歴や育成計画の詳細については、まだ十分に公表されていない。", "summary_en": "The New York Yankees have signed a Taiwanese pitching prospect to a deal worth US$1 million. The signing highlights continued MLB interest in Taiwanese baseball talent. Details about the pitcher's background and development plans have not yet been fully disclosed.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiVEFVX3lxTE51blNPT0lEWlJOVEloZm9BdDd5NnB0LWRlbVVhRXJuV0JReE51cDQ2bUxzY0N5cy15MmxtU0xYRWt0U2xYWWZkcFEyZ2FZZUVyYnIyVA?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台湾の韓国瑜氏が米下院議長と会談、二重課税解消法案への支持を求める", "title_en": "Taiwan's Han Kuo-yu Meets U.S. House Speaker to Push Double-Tax Relief Bill", "summary_ja": "台湾の立法院長・韓国瑜氏は米国下院議長と会談し、二重課税解消に関する法案への支持を求めた。この会談は、台湾と米国間の経済的な結びつきを強化するための継続的な取り組みを示すものである。提案されている法案は、両国にまたがって活動する個人や企業の税負担を軽減することを目的としている。", "summary_en": "Taiwan's Legislative Yuan President Han Kuo-yu met with U.S. House Speaker to seek support for a double taxation relief bill. The meeting highlights ongoing efforts to strengthen economic ties between Taiwan and the United States. The proposed legislation aims to reduce the tax burden on individuals and businesses operating across both countries.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE1ncFVpRW9rcjllSmRfektFNlZjdWY5dEIxTzBFclNQd0lveXNQMmJjYTVtbWhFWEZrc0YyYnlKX1RFbHQ4R3hLVURsdHdxSzc0TlVQMVJ3UQ?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "台湾の通商代表が職場いじめと認定、行政院が発表", "title_en": "Taiwan Trade Representative Found Guilty of Workplace Bullying, Cabinet Says", "summary_ja": "台湾の行政院は、通商代表が職場でいじめ行為を行っていたことを公式に認定した。内部調査の結果、当該官員の不適切な行為が確認されたという。政府はこの不祥事を認め、代表者への懲戒処分が検討される見通しだ。", "summary_en": "Taiwan's Cabinet has confirmed that a trade representative engaged in workplace bullying behavior. The finding follows an internal investigation into the official's conduct. The government has acknowledged the misconduct, signaling potential disciplinary action against the representative.", "source": "Focus Taiwan", "tier": "paper", "link": "https://news.google.com/rss/articles/CBMiV0FVX3lxTE1FbllvcGNycS14YmhTVlkzdzN3UGtjZ3VSZFh3amJzTllvS1NYbWJqYTcydjk2ZzVzWkFxa0xKWlRhUkR0N3lzcExLbDZfQ2VWUEdOcGxJRQ?oc=5", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "キューバ人が家を売り払いアマゾンを越えてブラジルに避難を求める", "title_en": "Cubans Sell Homes to Fund Amazon Journey, Seeking Refuge in Brazil", "summary_ja": "キューバ人移民がブラジルを避難先として選ぶケースが増加しており、アマパー州オイアポキを経由する流入は3年間で拡大し、2025年にピークを迎えた。スリナムやフランス領ギアナを出発し、飛行機・バン・ボート・バスを乗り継ぐ長距離の旅を経てブラジルに到達する。2025年には少なくとも8,400人がオイアポキから入国し、全国で41,900人が庇護を申請——ベネズエラ人の約2倍にあたる数字だ。", "summary_en": "Cuban migrants are increasingly choosing Brazil as a refuge destination, with the flow through Oiapoque, Amapá growing steadily over three years and peaking in 2025. The multi-modal journey spans flights, vans, boats, and buses departing from Suriname and French Guiana. In 2025, at least 8,400 Cubans entered through Oiapoque, and 41,900 requested asylum nationwide — nearly double the number of Venezuelan applicants at 21,200.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/cubans-sell-homes-take-amazon-journey-by-air-land-and-water-and-seek-to-stay-in-brazil.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "コロンビアで極右が勝利、ブラジルは南米で孤立する左派の島に", "title_en": "Brazil Becomes a Left-Wing Outlier as Far Right Wins in Colombia", "summary_ja": "コロンビアでの極右勝利により、南米全体で保守化の波が加速し、4か月後に選挙を控えるブラジルのルラ大統領は地域内でますます孤立した立場に置かれている。2022年のルラ政権発足時には南米主要国の多くが左派政権だったが、現在はコロンビア、エクアドル、ペルー、ボリビア、パラグアイ、チリ、アルゼンチンがいずれも右派または極右政権となっている。この劇的な地政学的変化により、ブラジルは南米大陸で事実上唯一の左派主導国となった。", "summary_en": "A far-right victory in Colombia has deepened a conservative wave across South America, leaving Brazilian President Lula increasingly isolated in the region just four months before Brazil's own elections. In 2022, when Lula was elected, most major South American nations leaned left, but today Colombia, Ecuador, Peru, Bolivia, Paraguay, Chile, and Argentina are all governed by right-wing or far-right leaders. The dramatic regional shift puts Brazil in a rare position as the lone significant left-led government on the continent.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/with-far-right-in-colombia-brazil-is-a-left-wing-island-in-south-america.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イタマラチー、トランプ氏の干渉を懸念もブラジルは「ベネズエラではない」と強調", "title_en": "Itamaraty Fears Trump Interference but Insists Brazil 'Is Not Venezuela'", "summary_ja": "ブラジルのルラ政権は、トランプ米大統領がブラジルの選挙に干渉する可能性について懸念を認め、関与の兆候を注視していく方針を示した。ブラジル外交官らは、トランプ氏による選挙プロセスへの介入の試みがますます明確になりつつあると見ている。ただし、匿名の外交筋はブラジルの状況はベネズエラとは根本的に異なると強調し、外部からの圧力に対してより強固な立場にあることを示唆した。", "summary_en": "Brazil's Lula administration has acknowledged concerns over potential U.S. President Donald Trump interference in Brazil's upcoming elections, saying it will monitor any signs of involvement. Brazilian diplomats believe Trump's attempts to meddle in the electoral process are becoming increasingly apparent. However, an anonymous diplomatic source emphasized that Brazil's situation differs fundamentally from Venezuela's, suggesting the country is better positioned to withstand external pressure.", "source": "Folha de S.Paulo", "tier": "paper", "link": "https://redir.folha.com.br/redir/online/world/rss091/*https://www1.folha.uol.com.br/internacional/en/world/2026/06/itamaraty-fears-trump-interference-but-says-brazil-is-not-venezuela.shtml", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "オヨ州で子ども2人誘拐事件、逮捕の容疑者4人が互いに責任をなすり合い", "title_en": "Oyo Kidnap Suspects Arrested, Blame Each Other Over Abduction of Two Children", "summary_ja": "ナイジェリアのオヨ州で、子ども2人の誘拐に関与したとして容疑者4人が逮捕された。逮捕後、容疑者たちは互いに責任をなすり合っている。警察によると、4人は犯罪ネットワークの他のメンバーの追跡に向けた捜査に協力しているという。", "summary_en": "Four suspects have been arrested in Oyo State, Nigeria, in connection with the kidnapping of two children. Following their arrest, the suspects have begun trading blame among themselves. Police say the four individuals are cooperating with investigators to help track down other members of the criminal network.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/headlines/891817-oyo-kidnap-suspects-trade-blame-after-arrest-over-abduction-of-two-children-in-oyo.html", "state_media": false, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "保険サービス費用が倍増、ユニバーサル保険の年間利益が49.2%減少", "title_en": "Universal Insurance Annual Profit Falls 49.2% as Service Expenses More Than Double", "summary_ja": "ユニバーサル保険の年間利益は、保険サービス費用の急激な増加により49.2%減少した。同費用は83億ナイラ超と倍以上に膨らみ、47%増加した保険収入を上回る圧迫要因となった。この結果は、厳しい経済環境の中でナイジェリアの保険会社がコスト上昇という深刻な課題に直面していることを示している。", "summary_en": "Universal Insurance recorded a 49.2% decline in annual profit, driven by a sharp surge in insurance service expenses. These costs more than doubled to N8.3 billion, overwhelming revenue gains and crowding out insurance revenue that had itself risen by 47%. The steep rise in expenses highlights mounting cost pressures facing Nigerian insurers amid a challenging economic environment.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/891813-galloping-costs-spur-49-2-drop-in-universal-insurances-annual-profit.html", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "政党、裁判所、そして2027年ナイジェリア選挙への道筋", "title_en": "Political Parties, Courts and Nigeria's Path to the 2027 Elections", "summary_ja": "ナイジェリアが2027年総選挙に向けて歩む中、コラムニストのルーベン・アバティ氏はすべての政治関係者に対し、選挙の公正性を損なうような行為を慎み、責任ある行動をとるよう求めている。民主主義への信頼を揺るがしかねない不正な慣行に警鐘を鳴らし、政党と司法が有権者の信頼を守る役割を果たすべきだと訴えている。", "summary_en": "As Nigeria approaches the 2027 general elections, columnist Reuben Abati calls on all political actors to conduct themselves responsibly and avoid practices that could undermine electoral integrity. He warns against actions that may cast doubt on the credibility of the democratic process. The piece urges political parties and the judiciary to uphold standards that reinforce public confidence in Nigeria's democracy.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/opinion/891805-political-parties-the-courts-and-the-path-to-2027-by-reuben-abati.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ベネズエラ地震、死者数1,430人に上昇と報道", "title_en": "Death Toll Reaches 1,430 in Venezuela Earthquakes", "summary_ja": "中国国営メディアの新華社およびCGTNは、水曜日にベネズエラを襲った地震の死者数が1,430人に達したと報じている。ベネズエラ国民議会のホルヘ・ロドリゲス議長が土曜日に発表したとされる数字であり、同メディアが伝えた。なお、これらの数字は独立機関による確認がとれていない。", "summary_en": "Xinhua/CGTN reports that the death toll from earthquakes that struck Venezuela on Wednesday has risen to 1,430, according to Venezuelan National Assembly President Jorge Rodriguez. The state-affiliated outlet reports that Rodriguez made the announcement on Saturday, indicating a significant rise in casualties following the seismic disaster. Independent verification of these figures has not been confirmed.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-28/news-1OkKDNOG0MM/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "外国人記者団が新疆を訪問、国主導のプレスツアーを実施", "title_en": "Foreign Journalists Tour Xinjiang on State-Organized Press Trip", "summary_ja": "新華社によると、19カ国から28人の記者が参加する代表団が、中国・新疆ウイグル自治区で1週間にわたる取材旅行を終えたと報じている。国営メディアは、ホータン、トゥルファン、ウルムチなどを訪れたこのツアーが、地域の経済発展や文化遺産、生態保全、対外開放をアピールする目的で企画されたと伝えている。ツアーは国主導で実施されており、記者が独自に取材できる環境にあったかどうかは明らかにされていない。", "summary_en": "Xinhua reports that a delegation of 28 journalists from 19 countries completed a week-long tour of China's Xinjiang Uygur Autonomous Region. State media reports that the trip, covering cities including Hotan, Turpan, and Urumqi, was organized to showcase the region's economic development, cultural heritage, ecological conservation, and trade openness. The visit was state-facilitated, and independent access and reporting conditions for journalists were not disclosed.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-27/From-silk-to-solar-international-journalists-see-Xinjiang-firsthand-1Ok92WZ6mv6/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "スペインとポルトガルの洞窟壁面から2000年以上前の人類DNAを発見", "title_en": "2,000-Year-Old Human DNA Discovered on Cave Walls in Spain and Portugal", "summary_ja": "新華社／CGTNによると、国際研究チームがポルトガルとスペインの洞窟壁面から少なくとも2000年前の人類DNAを発見したと報じている。同メディアは、洞窟壁面が数千年にわたって人類の遺伝物質を保存できることを示す初めての証拠だと伝えている。この発見が独立した検証を経れば、洞窟環境に保存された環境DNAを通じて古代人類集団を研究する新たな手がかりとなる可能性がある。", "summary_en": "Xinhua/CGTN reports that an international team of researchers has discovered human DNA at least 2,000 years old preserved on cave walls in Portugal and Spain. The state outlet reports this represents the first evidence that cave walls can retain human genetic material for thousands of years. The findings, if confirmed independently, could open new avenues for studying ancient human populations through environmental DNA preserved in cave environments.", "source": "Xinhua/CGTN", "tier": "state", "link": "https://news.cgtn.com/news/2026-06-26/2-000-year-old-human-DNA-found-in-caves-in-Spain-Portugal-1OhEXfrq0hy/p.html?UTM_Source=cgtn&UTM_Medium=rss&UTM_Campaign=World", "state_media": true, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロシア政府、VTB銀行の支配権維持へ――CEO発言", "title_en": "Russian Government to Retain Majority Stake in VTB Bank, CEO Says", "summary_ja": "国営メディアのTASS/RTが伝えるところによると、ロシア政府は大手国営銀行VTBの経営支配権を手放す意向がないとしている。アンドレイ・コスティンCEOは、政府の持ち株比率を50プラス1株以上に維持しなければならないと述べた。この発言は、ロシアが主要金融機関に対する国家支配を継続する姿勢を示すものと見られる。", "summary_en": "State-controlled outlet RT/TASS reports that the Russian government has no plans to relinquish control of VTB, one of the country's largest state-owned banks. CEO Andrey Kostin stated that the government's shareholding must remain at 50 plus one share. The announcement signals continued state dominance over Russia's major financial institutions.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2153533", "state_media": true, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "AfD党首、ロシアからの石油・ガス供給再開を求める", "title_en": "AfD Leader Calls for Resumption of Russian Oil and Gas Supplies", "summary_ja": "タス通信・RTによると、ドイツのための選択肢（AfD）党首アリス・ヴァイデル氏がロシアからの石油・ガス供給の再開を求めた。国営メディアは、ヴァイデル氏がロシア産の低コストエネルギーこそが「メイド・イン・ジャーマニー」の成功の秘訣だったと主張したと報じている。RTは同氏が現在のドイツのエネルギー政策の転換を訴えていると伝えている。", "summary_en": "TASS/RT reports that Alternative for Germany (AfD) leader Alice Weidel has urged the resumption of Russian oil and gas supplies to Germany. State media reports that Weidel claimed low-cost Russian energy was a key factor behind the success of German manufacturing, the so-called 'Made in Germany' brand. RT reports that she is advocating for a reversal of Germany's current energy policy amid ongoing economic pressures.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2153531", "state_media": true, "category": "経済", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ロスアトム、ベトナムに3Dプリンティング技術センター設立を支援へ", "title_en": "Rosatom to Help Establish 3D Printing Technology Center in Vietnam by 2027", "summary_ja": "ロシアの国営原子力企業ロスアトムは、ベトナムに3Dプリンティング技術センターの設立を支援する計画を報じており、施設は早ければ2027年にも開設される可能性があるとTASSは伝えている。同プロジェクトは、ロシアが東南アジア諸国との技術協力を拡大する取り組みの一環とされている。センターの詳細な規模やベトナム国内の具体的な場所については、現時点では明らかにされていない。", "summary_en": "Russian state nuclear corporation Rosatom reports that it plans to help establish a 3D printing technology center in Vietnam, with the facility potentially opening as early as 2027. TASS reports that the initiative represents part of Russia's broader efforts to expand technological cooperation with Southeast Asian nations. The project's scope and specific location within Vietnam have not been detailed in available reports.", "source": "TASS/RT", "tier": "state", "link": "https://tass.com/economy/2153529", "state_media": true, "category": "IT", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "アフリカの多国間開発銀行を強化する方法", "title_en": "How to Empower Africa's Multilateral Development Banks", "summary_ja": "筆者は、国際機関が譲許的融資を縮小する中、アフリカの多国間開発銀行（MDB）の資本基盤を強化することが戦略的に不可欠だと主張する。国内貯蓄の活用、通貨統合の推進、革新的な資金調達手段の導入、地域資本市場の強化という多角的なアプローチを提唱している。こうした構造的課題への対処は、アフリカ全体の経済変革を推進する上で不可欠であると論じている。", "summary_en": "The author argues that boosting the capital base of Africa's multilateral development banks (MDBs) is a strategic necessity, especially as international institutions reduce concessional financing. The piece advocates for a multi-pronged approach including leveraging domestic savings, pursuing monetary integration, deploying innovative financing mechanisms, and strengthening regional capital markets. Addressing these structural challenges is framed as essential to driving Africa's broader economic transformation.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/africa-multilateral-development-banks-must-be-better-capitalized-by-hippolyte-fofack-2026-06", "state_media": false, "category": "オピニオン", "full_text": "How to Empower Africa’s Multilateral Development Banks\n                        Capitalizing multilateral development banks in Africa is a strategic investment in the continent’s economic transformation. To mobilize adequate funding will require leveraging domestic savings, pursuing monetary integration, using innovative financing mechanisms, and strengthening regional capital markets.\n                    \n                        WASHINGTON, DC—Boosting the capital base of multilateral development banks (MDBs) in Africa has been a perennial problem. Finding a solution—which has taken on new urgency as international development institutions continue to scale down concessional financing—requires examining the underlying causes.\n        https://prosyn.org/2gczg3y", "translation_ja": "アフリカの多国間開発銀行を強化する方法\n\nワシントンD.C.――アフリカにおける多国間開発銀行（MDB）の資本基盤を強化することは、同大陸の経済変革への戦略的投資である。十分な資金を動員するためには、国内貯蓄の活用、通貨統合の推進、革新的な資金調達メカニズムの活用、そして地域資本市場の強化が求められる。\n\nアフリカのMDBの資本基盤を増強することは長年の課題であった。国際開発機関が譲許的融資の縮小を続ける中、この問題は新たな緊急性を帯びており、解決策を見出すためには根本的な原因を検討する必要がある。", "vocab": [{"word": "concessional financing", "definition": "途上国向けに市場金利より低い金利や有利な条件で提供される融資のこと。国際開発援助の文脈で頻繁に用いられる専門用語。"}, {"word": "multilateral development banks", "definition": "複数の加盟国が出資・運営する国際的な開発金融機関のこと。世界銀行やアフリカ開発銀行などが代表例。"}, {"word": "capital base", "definition": "金融機関や企業が事業を支えるために保有する資本の総量を指す。財務的安定性や融資能力の基盤となる。"}, {"word": "monetary integration", "definition": "複数の国や地域が通貨政策を統一・協調させること。欧州単一通貨ユーロの導入などが典型的な例として知られる。"}, {"word": "leveraging", "definition": "既存のリソースや資産を最大限に活用して、より大きな効果や利益を引き出すこと。金融・ビジネス文脈で広く使われる。"}, {"word": "perennial", "definition": "長年にわたって繰り返し生じる、あるいは慢性的に続くという意味の形容詞。問題や課題が継続的であることを強調する際に使われる。"}]}, {"title_ja": "なぜアメリカ人はAIに警戒心を抱くのか", "title_en": "Why Americans Are Wary of AI", "summary_ja": "AIに対する米国民の懐疑心は急速に高まっており、AIへの期待より不安を感じる人の割合は2021年の37%から2023年には52%に上昇した。筆者は、政府機関への信頼低下がその根本的な要因であると主張する。AIを監督する規制機関が信頼されない限り、テック業界が国民のAIへの信頼を獲得することは困難であると論じている。", "summary_en": "Public skepticism toward AI in the United States is growing rapidly, with the share of Americans more concerned than excited about AI rising from 37% in 2021 to 52% in 2023. The author argues that declining trust in government institutions is a key underlying factor, making it harder for the tech industry to win public confidence in AI. Without trustworthy regulatory bodies overseeing AI, persuading Americans to embrace the technology will remain an uphill battle.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/why-ai-adoption-requires-trust-in-government-by-ngaire-woods-2026-06", "state_media": false, "category": "オピニオン", "full_text": "Why Americans Are Wary of AI\n                        The tech industry is asking Americans to embrace AI at a moment when trust in government is declining. While these may seem like separate issues, persuading people to trust AI will be far more difficult if they do not trust the institutions responsible for regulating it.\n                    \n                        OXFORD—Most Americans are skeptical and fearful of AI, with public concern rising even faster than chatbot adoption. According to the Pew Research Center, 37% of Americans were more concerned than excited about AI in 2021; by 2023, that figure had risen to 52%. Today, more US adults believe AI will have a negative rather than a positive impact on their own lives and on society.\n        https://prosyn.org/eL4WKTc", "translation_ja": "AIに警戒するアメリカ人\n\nテック業界は、政府への信頼が低下しているまさにこの時期に、アメリカ人にAIを受け入れるよう求めている。これらは一見別個の問題のように見えるが、AIの規制を担う機関を人々が信頼しない限り、AIへの信頼を得ることははるかに難しくなる。\n\nオックスフォード発――アメリカ人の大多数はAIに対して懐疑的かつ不安を抱いており、公的な懸念はチャットボットの普及よりも速いペースで高まっている。ピュー・リサーチ・センターによれば、2021年にAIに対して「期待より不安を感じる」と答えたアメリカ人は37%だったが、2023年にはその割合が52%に上昇した。現在、AIが自分自身の生活や社会全体にポジティブな影響をもたらすと考える米国成人よりも、ネガティブな影響をもたらすと考える人の方が多い。", "vocab": [{"word": "wary", "definition": "警戒している、用心深いという意味の形容詞。潜在的な危険やリスクに対して慎重な態度を示す際に使う。"}, {"word": "skeptical", "definition": "懐疑的な、疑い深いという意味。主張や情報を簡単には信じず、批判的に検討する姿勢を表す。"}, {"word": "adoption", "definition": "（技術や制度などの）導入・普及という意味の名詞。新しい技術やシステムが社会に取り入れられるプロセスを指す。"}, {"word": "regulating", "definition": "規制する、管理・監督するという意味の動詞の現在分詞形。政府や機関が規則を設けて特定の活動を制御することを指す。"}, {"word": "institutions", "definition": "（社会的・政治的な）機関、制度という意味の名詞。政府機関、大学、企業など社会的に確立された組織や仕組みを広く指す。"}, {"word": "embracing", "definition": "（考えや変化などを）喜んで受け入れるという意味。単に受動的に受け入れるのではなく、積極的に取り込む姿勢を含意する。"}]}, {"title_ja": "なぜ湾岸諸国はイランとの経済的結びつきを必要とするのか", "title_en": "Why the Gulf Needs Economic Ties with Iran", "summary_ja": "筆者は、米国とイスラエルによるイランへの攻撃が湾岸地域の旧来の安全保障秩序を崩壊させたと主張する。軍事戦略や外交的再編成に関する議論が中心となっているが、筆者はそれだけでは不十分だと指摘する。持続的な平和を実現するためには、イランとの経済的結びつきを含む強固な経済的基盤の構築が不可欠だと論じている。", "summary_en": "The author argues that the old security order in the Gulf has been shattered by the US-Israeli conflict with Iran, and that current debates over military strategy and diplomatic realignments are insufficient. The piece contends that lasting peace in the region requires building strong economic foundations, including ties with Iran. Without addressing these economic underpinnings, no military or diplomatic solution alone will bring stability.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/gulf-economic-ties-with-iran-provide-would-strategic-insurance-by-adeel-malik-and-jamal-ibrahim-haidar-2026-06", "state_media": false, "category": "オピニオン", "full_text": "Why the Gulf Needs Economic Ties with Iran\nand\n                        Most Gulf observers agree that the old security order is dying. But none of the most commonly proposed options—buying more advanced weapons, seeking protection from new partners in the Global South, or building stronger national militaries—is sufficient on its own.\n                    \n                        OXFORD/BEIRUT—The US-Israeli war against Iran has shattered the Gulf’s old security order. As governments search for alternatives, debate has focused largely on military strategy, diplomatic realignments, and the role of outside powers. Missing are the economic foundations of a lasting peace.\n        https://prosyn.org/yHblaUs", "translation_ja": "なぜ湾岸諸国はイランとの経済的結びつきを必要とするのか\n\nオックスフォード／ベイルート発――米国とイスラエルによるイランへの攻撃は、湾岸地域の旧来の安全保障秩序を打ち砕いた。各国政府が代替策を模索する中、議論の焦点はもっぱら軍事戦略、外交的な再編成、そして外部勢力の役割に当てられている。しかし、そこに欠けているのは、持続的な平和の経済的基盤である。\n\n湾岸地域を観察する専門家の多くは、旧来の安全保障秩序が崩壊しつつあることに同意している。しかし、最もよく提案される選択肢――より高度な兵器の購入、グローバルサウスの新たなパートナーからの保護の模索、あるいはより強力な自国軍の構築――のいずれも、それ単独では十分ではない。", "vocab": [{"word": "security order", "definition": "安全保障秩序。特定の地域や国際社会における安全と安定を維持するための取り決めや勢力均衡の構造を指す。地政学・国際関係の文脈で頻繁に使われる専門用語。"}, {"word": "diplomatic realignments", "definition": "外交的再編成。国家間の同盟関係や外交的立場が大きく組み替えられることを意味する。国際政治の変動期に用いられる上級語彙。"}, {"word": "shattered", "definition": "粉砕した、完全に破壊した。物理的な破壊だけでなく、秩序・信頼・夢などの抽象的なものが根底から崩れた場合にも比喩的に使われる。"}, {"word": "sufficient", "definition": "十分な、足りている。ある目的や条件を満たすのに必要な量・質を備えていることを示す形容詞で、論説文や学術文書でよく使われる。"}, {"word": "underpinnings", "definition": "根拠、基盤、土台。ある考えや制度・構造を支える根本的な要素を指す比喩的表現で、政治・経済・学術的文脈で広く使われる上級語彙。"}, {"word": "Global South", "definition": "グローバルサウス。アフリカ、アジア、ラテンアメリカなど、主に経済的・政治的に発展途上とされてきた国々の総称で、国際政治・開発援助の文脈で使われる専門的概念。"}]}, {"title_ja": "進歩派は都市で勝利しているが、農村部の有権者も獲得できるか？", "title_en": "Progressives Are Winning in Cities — But Can They Reach Rural America?", "summary_ja": "社会主義系論者バスカル・サンカラは、ニューヨーク市でのDSA（民主社会主義者）の選挙勝利を歓迎しつつも、農村部やスウィング選挙区では左派が構造的な壁に直面していると認める。彼は、賃金・医療・反独占といった経済的ポピュリズムが農村有権者への有効な訴求策になると主張し、ネブラスカ州のダン・オズボーン上院選キャンペーンをその証拠として挙げる。農村部を争わない限り、不民主的な政治構造のもとで進歩派が安定した統治多数派を築くことはできないと警告している。", "summary_en": "Socialist author Bhaskar Sunkara celebrates recent DSA electoral victories in New York City but acknowledges the American left faces a structural ceiling in rural and swing districts. He argues that economic populism — focusing on wages, healthcare, and anti-monopoly issues — offers a viable path to rural voters, citing Dan Osborn's Nebraska Senate campaign as proof. Without contesting rural America, he warns, progressives cannot build a durable governing majority given the country's undemocratic political structure.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/30/democratic-socialists-rural-voters", "state_media": false, "category": "オピニオン", "full_text": "I joined the Democratic Socialists of America (DSA) in April 2007 at the age of 17. DSA back then was a small group with an ageing membership and an almost negative amount of buzz. If you’d told me its candidates would someday sweep primaries across New York City, I would have been surprised to say the least.\nLast week, they did. Darializa Avila Chevalier, an organizer in her early 30s, beat the five-term incumbent Adriano Espaillat in a Harlem-and-Bronx seat. Claire Valdez, another socialist, took the open seat Nydia Velázquez is leaving in Brooklyn and Queens. Add the state races, and DSA will seat at least 15 of its endorsed candidates in Albany next year. The movement that made Zohran Mamdani mayor is starting to look less like a pressure campaign and more like a bloc that can govern.\nAs a New Yorker and a socialist, I won’t pretend I’m not thrilled. But the wins sparked rebuttals from centrist commentators that deserve a serious response. Within a day, ABC News had run an analysis under the headline “Mamdani won big, but it’s a mistake to think all Democrats swung left,” noting that on the same night a moderate won the swing-seat primary up in NY-17 and a centrist beat the progressives in Utah.\nAndrew Mamo, a spokesperson for the centrist recruitment outfit The Bench, put a number on it: leftwing candidates have “a ceiling of 30% in swing districts”, even as they clear 50% in New York City.\nThe easy reply is that DSA now has chapters in 47 states across the country and a few wins in the heart of Trump country. That’s true, and it isn’t enough, because even if we don’t trust Mamo’s number, the broader progressive movement is plainly struggling across much of the country.\nAs Jared Abbott of the Center for Working Class Politics noted, of the nearly 100 members of the Congressional Progressive caucus in 2024, exactly one represented a mostly rural district: Teresa Leger Fernández of New Mexico.\nBernie Sanders, the most successful socialist in American history, endorsed nobody like her in 2022. Rural and rural-suburban districts make up 41% of the House and a larger share of most state legislatures. Democrats have often figured out how to win a thin majority without them. They haven’t figured out how to keep one, and they won’t, because the system isn’t built for a party crammed into a dozen metros.\nThis is the wall the American left keeps hitting. The Senate gives Wyoming as many votes as California. In our undemocratic political system, you can win more votes than the other side and still not be able to govern. The math doesn’t work unless we contest rural America.\nYet Abbott’s research suggests the cause is far from hopeless. Rural voters are whiter and older than the country as a whole. They’re likelier to own guns and go to church, and they hold more conservative convictions on immigration than their urban peers.\nOn economics, however, they seem closer to Mamdani than to libertarian Rand Paul. Majorities support a $15 minimum wage and Medicare for All. More than 80% even want background checks on gun sales. When the Race-Class Narrative project tested the line “in small towns and rural communities, we believe in looking out for each other, whether we’re white, black, or brown, tenth generation or newcomer,” 89% of rural respondents agreed.\nBeing competitive in these districts doesn’t require radical voting shifts. By Abbott’s count, 29% of rural Trump voters back a $15 wage and oppose banning abortion. Those persuadable voters are enough to truly reshape American politics.\nDan Osborn provides an instructive example of what progressive populism can do in some of the most conservative areas of the country. A machinist who led the Kellogg’s strike, he’s again running for Senate in Nebraska as an independent and polling far ahead of where Nebraska Democrats usually land. Osborn wants to protect social security and tax the rich, and he’s foregrounded a demand around “right to repair”: the unglamorous idea that if you bought a tractor, you should be allowed to fix it without the manufacturer’s permission.\nIt’s the type of demand that feels locally rooted but taps into a cross-partisan opposition to monopoly. Backed by unions like the United Auto Workers, Osborn, who led in a May poll, is proof that the anti-corporate pitch, delivered plainly by someone voters take for one of their own, can land in “Trump country”.\nA politics aimed squarely at the plant closings and capital flight that devastated small towns in roughly the same way they devastated the urban working class a generation before can win everywhere. But it will take rhetorical discipline from progressives, and a willingness to have hard conversations in every part of the country.\n- \n  Bhaskar Sunkara is a Guardian US columnist. He is the president of the Nation, the founding editor of Jacobin, and the author of The Socialist Manifesto: The Case for Radical Politics in an Era of Extreme Inequality", "translation_ja": "私は2007年4月、17歳のときに民主社会主義者（DSA）に入会した。当時のDSAは高齢化した会員を抱える小さな団体で、世間の注目はほぼゼロに等しかった。いつかその候補者たちがニューヨーク市の予備選挙を席巻するとでも言われていたら、控えめに言って驚いていただろう。\n\n先週、まさにそれが起きた。30代前半のオーガナイザー、ダリアリサ・アビラ・シュヴァリエがハーレムとブロンクスを抱える選挙区で5期連続当選のアドリアノ・エスパイヤットを破った。もう一人の社会主義者、クレア・バルデスはブルックリンとクイーンズでニディア・ベラスケスが空けた議席を獲得した。州議会レースも加えると、DSAは来年オールバニーに少なくとも15人の支持候補を送り込む。ゾーラン・マムダニを市長に押し上げたこの運動は、もはや圧力キャンペーンというより、統治できるブロックに見え始めている。\n\nニューヨーカーかつ社会主義者として、私が興奮していないふりはしない。しかしこれらの勝利は中道派コメンテーターから反論を呼んだ。真剣に向き合う価値のある反論だ。一日も経たないうちにABCニュースは「マムダニは大勝したが、すべての民主党員が左傾化したと考えるのは誤りだ」という見出しの分析記事を掲載した。同じ夜、NY-17の接戦選挙区予備選では穏健派が勝ち、ユタ州でも中道派が進歩派を破ったことを指摘していた。\n\n中道派候補リクルート組織「ザ・ベンチ」の広報担当アンドリュー・マモはこう数値化した。左翼候補はスウィング選挙区では「30%が上限」であり、ニューヨーク市では50%を超えても、だという。\n\n簡単な反論は、DSAはすでに全国47州に支部を持ち、トランプ支持の強い地域でもいくつかの勝利を収めているということだ。それは事実だが、それだけでは十分ではない。マモの数字を信頼しないとしても、より広い進歩派運動が国の多くの地域で明らかに苦戦しているからだ。\n\n「労働者階級政治センター」のジャレッド・アボットが指摘するように、2024年の下院進歩派コーカスのほぼ100人の議員のうち、農村部を主体とする選挙区を代表していたのはニューメキシコ州のテレサ・レガー・フェルナンデスたった一人だった。\n\nアメリカ史上最も成功した社会主義者バーニー・サンダーズは、2022年に彼女のような候補者を誰も支持しなかった。農村・農村郊外の選挙区は下院の41%を占め、多くの州議会ではさらに大きな割合を占める。民主党はしばしばこれらの選挙区なしで薄い多数派を獲得する方法を見つけてきた。しかし多数派を維持する方法を見つけられていないし、これからも見つけられないだろう。なぜなら、この制度は十数の大都市圏に詰め込まれた党のために設計されていないからだ。\n\nここにアメリカの左派が繰り返しぶつかる壁がある。上院ではワイオミング州もカリフォルニア州と同じ票数を持つ。この非民主的な政治制度では、相手より多くの票を得ても統治できないことがある。農村アメリカに挑まない限り、数学は成り立たない。\n\nしかしアボットの研究は、その大義が絶望的とはほど遠いことを示唆している。農村の有権者は国全体と比べて白人が多く、年齢層も高い。銃を所持し教会に通う可能性が高く、移民問題については都市部の有権者より保守的な信念を持つ。\n\n経済問題では、しかし彼らはリバタリアンのランド・ポールよりもマムダニに近いように見える。最低賃金15ドルとメディケア・フォー・オールを多数が支持している。銃購入時のバックグラウンドチェックを求める人は80%以上にも及ぶ。「Race-Class Narrative（人種・階級の物語）」プロジェクトが「小さな町や農村コミュニティでは、白人だろうと黒人だろうと褐色人種だろうと、10代目だろうと新参者だろうと、お互いを思いやることを信じている」というフレーズをテストしたところ、農村回答者の89%が同意した。\n\nこれらの選挙区で競争力を持つには、劇的な票の変化は必要ない。アボットの計算では、農村のトランプ支持者の29%が15ドルの最低賃金を支持し、中絶禁止に反対している。そうした説得可能な有権者がいれば、アメリカの政治を真に再形成するには十分だ。\n\nダン・オズボーンは、国内で最も保守的な地域の一部において、進歩的なポピュリズムが何をなし得るかの教訓的な例を示している。ケロッグ社のストライキを指導した機械工である彼は、ネブラスカ州で無所属の上院候補として再出馬し、ネブラスカの民主党候補が通常記録する水準をはるかに上回る支持率を誇っている。オズボーンは社会保障の保護と富裕層への課税を求め、「修理する権利」という要求を前面に押し出している。買ったトラクターを製造者の許可なしに自分で修理できるべきだ、という地味な主張だ。\n\nそれはローカルに根ざした感覚を持ちながら、独占に対する党派を超えた反発を引き出す類いの要求だ。全米自動車労組などの組合に支持された彼は、5月の世論調査でリードしており、反企業的な訴えが「トランプの国」でも、有権者が仲間だと感じる人物によって率直に語られれば通用することの証明だ。\n\n小さな町を荒廃させた工場閉鎖や資本逃避に――ちょうど一世代前に都市部の労働者階級を同様に壊滅させたのと同じように――正面から向き合う政治は、どこでも勝てる。だが、それには進歩派の言葉の規律と、国のあらゆる地域で困難な対話をする意志が必要だ。", "vocab": [{"word": "bloc", "definition": "共通の目的を持って行動する政治的・社会的集団のこと。ここでは「統治能力を持つ政治勢力」を意味する。"}, {"word": "populism", "definition": "エリート層や既成勢力に対抗し、一般市民・庶民の利益を代弁することを訴える政治的手法や思想。"}, {"word": "libertarian", "definition": "個人の自由と政府の介入最小化を重視する政治的立場を指す形容詞。ランド・ポール上院議員はその代表的論者として知られる。"}, {"word": "persuadable", "definition": "説得によって意見や投票行動を変えられる可能性がある、という意味の形容詞。選挙分析で「獲得可能な有権者層」を指す際に使われる。"}, {"word": "foregrounded", "definition": "ある問題や要求を最も目立つ位置に置き、重点的に訴えること。動詞 foreground の過去形。"}, {"word": "cross-partisan", "definition": "政党の境界を超えた、複数の党派から支持を得られる、という意味の形容詞。党派対立を超えた連帯を示す際に使われる。"}, {"word": "rhetorical discipline", "definition": "政治的メッセージや言葉の使い方において一貫性と節度を保つこと。ここでは有権者に訴える際の言葉の慎重な選択を指す。"}]}, {"title_ja": "最高裁は再び議会の権限を弱体化させた", "title_en": "The Supreme Court Has Again Undermined the Power of Congress", "summary_ja": "著者モイラ・ドネガンは、「トランプ対スローター」訴訟における最高裁の判決が、91年の先例を覆し、大統領が独立機関の長を自由に解任できるようにすることで大統領権限を劇的に拡大させたと主張する。この判決は議会の憲法上の権限をさらに侵食し、行政国家を弱体化させるものだと論じる。ドネガンはこの判決を、保守派多数派の裁判所が民主的統治を犠牲にして行政府に権力を集中させるパターンの一部と見なしている。", "summary_en": "Author Moira Donegan argues that the Supreme Court's ruling in Trump v Slaughter, which overturned the 91-year-old Humphrey's Executor precedent, dramatically expands presidential power by allowing Trump to fire heads of independent agencies at will. She contends this decision further erodes Congress's constitutional authority and weakens the administrative state. Donegan views the ruling as part of a pattern by the court's conservative majority to concentrate power in the executive branch at the expense of democratic governance.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/30/supreme-court-trump-v-slaughter", "state_media": false, "category": "オピニオン", "full_text": "What is Congress for? According to the supreme court, not very much. On Monday, the supreme court overturned Humphrey’s Executor, a 91-year-old precedent, nullified the Federal Trade Commission Act, a 112-year-old law, and presumed to settle a 250-year-old debate on the scope of presidential authority when it reapportioned power away from the people’s representatives in the House and Senate and gave it instead to Donald Trump. In Trump v Slaughter, the court ruled that the heads of independent agencies that Congress created cannot be protected from arbitrary firings by laws that Congress passed. Instead, Donald Trump is now free to fire agency heads at will and to replace them with political loyalists, regardless of what Congress has said about it.\nThe ruling has one key exception: Donald Trump does not, according to the justices, have the ability to fire members of the board of governors of the Federal Reserve without cause and without proper procedure. A separate decision found for Lisa Cook, the Joe Biden appointee who was the first Black woman to serve on the Federal Reserve’s board of governors, and who was fired via social media post by Donald Trump last year. In addition to Cook’s job, the decision protects the independence of the Federal Reserve and the health of financial markets, to say nothing of the considerable personal wealth of the justices themselves.\nBut the Slaughter decision marks yet another expansion of the president’s power, yet another blow to Congress’s prerogatives, and yet another in a long line of attacks on the court’s favorite bete noir: the “administrative state”, that vast network of independent agencies and commissions, staffed by experts and bureaucrats and dully competent civil servants, whose hard, unglamorous work makes the federal government into a body that can regulate commerce, promote public health and safety, and ensure something like equal dignity and protection to its citizens – rather than the husk of cruelty and hierarchy enforcement that many of the justices would prefer it to be. In that sense, the ruling in Slaughter was grimly predictable, another decision meant to foster incompetence and incapacity in the federal government, inflict suffering and indignity on the American people, and concentrate power in the hands of Donald Trump and the court’s Republican appointees at the expense of constitutional integrity.\nAt first glance, the stakes of the ruling might seem obscure. On its face, Trump v Slaughter – a case prompted by Donald Trump’s summary and causeless 2025 termination of Rebecca Slaughter, a member of the Federal Trade Commission – is about employment protections for high-ranking government workers, a question that sounds about as thrilling as watching paint dry or chewing on a crust of burnt, unbuttered toast. But the constitutional stakes become clearer when one considers the case in the abstract. The Federal Trade Commission, where Slaughter worked, like all similar independent agencies, was created by an act of Congress. Congress also passed laws about the scope of the agency’s work and wrote legislation protecting its leaders from being fired for political reasons – a move meant to ensure the efficacy and independence of the FTC. It was Congress, that is, that created the agency; Congress that gave it its authority to act; Congress that dictated its prerogatives, shaped its structure and set these forth in law. And now that law, duly signed by the onetime executive, can be disregarded entirely by another president’s whim. Because the supreme court has decided that now, any agency that can be seen to have “executive” powers must be entirely under the executive’s control.\nThe facile idiocy of the court’s reasoning deserves to be examined in detail. Writing for the majority, Chief Justice John Roberts claims that the constitution’s “separation of powers” means that all bodies that exercise “executive” powers, such as the FTC, “must therefore be controlled by the chief executive”. (Donald Trump, for his part, has evinced a similar assessment of the scope of presidential authority, claiming that article II executive powers means he has “the right to do whatever I want”.) If this is so, then it is not clear why the Federal Reserve is exempt. In their writing on this matter, the justices only manage to sniff unconvincingly about the Fed’s long “tradition” of central banking independence; I guess the FTC’s 112 years of independence is not long enough.\nBut the reasoning also overlooks the plain reality of those “separate” powers that the constitution imagines, in which the legislative, executive and judicial branches are afforded different tools to intervene in decidedly overlapping purviews. For instance, the executive, at least in the constitution, is indeed given a power over the legislative process – his power to veto the bills that Congress passes. In fact it is the court that has invented and granted him a whole new power in Slaughter: the power to", "translation_ja": "議会は何のためにあるのか？最高裁によれば、たいしたことはない。月曜日、最高裁は91年の先例を覆し、112年の歴史を持つ連邦取引委員会法を無効とし、大統領権限の範囲をめぐる250年来の議論に決着をつけようとした。そして、上下院の人民の代表から権力を奪い取り、代わりにドナルド・トランプに与えたのだ。「トランプ対スローター」訴訟において、最高裁は、議会が設立した独立機関の長を、議会が制定した法律によって恣意的な解任から保護することはできないと裁定した。これにより、ドナルド・トランプは議会の意向にかかわらず、機関の長を自由に解任し、政治的な忠臣に置き換えることができるようになった。\n\nこの判決には重要な例外が一つある。裁判官たちによれば、ドナルド・トランプは正当な理由や適正な手続きなしに連邦準備制度理事会の理事を解任する権限を持たないとされた。別の決定では、ジョー・バイデンが任命し、連邦準備制度理事会初の黒人女性理事となったリサ・クックの訴えが認められた。クックは昨年、ドナルド・トランプによってソーシャルメディアの投稿を通じて解任されていた。クックの職を守ることに加え、この決定は連邦準備制度の独立性と金融市場の健全性を守るものであり、裁判官たち自身のかなりの個人資産を守るものでもある、と言うまでもないだろう。\n\nしかし、スローター判決はまたもや大統領権限の拡大を示すものであり、議会の特権へのまたもやの打撃であり、最高裁がお気に入りの標的とする「行政国家」への長い攻撃の歴史における、またもやの一撃である。「行政国家」とは、専門家や官僚、地味だが有能な公務員たちが支える独立機関や委員会の広大なネットワークであり、その地道で華やかさのない仕事が連邦政府を、商業を規制し、公衆の健康と安全を促進し、市民に尊厳と平等な保護をもたらす機関にしている。多くの裁判官が望むような、残酷さと階層秩序を強制するだけの抜け殻ではなく。その意味で、スローター判決は暗鬱なほど予測可能なものだった。連邦政府に無能と機能不全を招き、アメリカ国民に苦痛と屈辱を与え、憲法の完全性を犠牲にしてドナルド・トランプと最高裁の共和党任命判事たちに権力を集中させるための、またもやの判決だったのだ。\n\n一見すると、この判決の重大性は見えにくいかもしれない。表面上、「トランプ対スローター」訴訟は——2025年にドナルド・トランプが連邦取引委員会（FTC）委員レベッカ・スローターを理由なく即時解任したことをきっかけとする訴訟であるが——高位の政府職員の雇用保護に関するものであり、ペンキが乾くのを眺めるか、焦げた無塩のパンの皮を噛むくらい刺激的なテーマに聞こえる。だが憲法上の問題は、抽象的に考えると明確になる。スローターが勤務していた連邦取引委員会は、他の独立機関と同様、議会の法律によって設立された。議会はまた、機関の業務範囲に関する法律を制定し、その長を政治的理由による解任から守る立法を行った——FTCの有効性と独立性を確保するための措置として。つまり、機関を創設したのは議会であり、行動する権限を与えたのも議会であり、その権限を定め、組織を形成し、それを法律として定めたのも議会だった。ところが今や、かつての行政府長が署名したその法律を、別の大統領の気まぐれによって完全に無視できるようになった。最高裁が、「行政的」権限を行使するとみなされるあらゆる機関は、行政府の完全な管理下に置かれなければならないと決定したからだ。\n\n最高裁の論理の浅薄な愚かさは、詳しく検討する価値がある。多数意見を執筆したジョン・ロバーツ長官は、憲法の「権力分立」は、FTCのような「行政的」権限を行使するすべての機関が「したがって行政長官によって管理されなければならない」ことを意味すると主張する。（ドナルド・トランプ自身も大統領権限の範囲について同様の評価を示しており、憲法第2条の行政権は「やりたいことは何でもできる権利」を意味すると主張している。）もしそうならば、なぜ連邦準備制度が例外とされるのかが不明確だ。この点に関する裁判官たちの文章は、中央銀行の独立性という長い「伝統」について説得力なく鼻を鳴らすだけで済ませている。FTCの112年の独立の歴史は、十分に長くないということらしい。\n\nしかしこの論理はまた、憲法が想定している「分立した」権力の明白な現実を見落としている。その現実においては、立法・行政・司法の各府が、明確に重複する管轄領域に介入するための異なる手段を与えられている。例えば、行政府は憲法上、立法過程においてある権限——議会が可決した法案への拒否権——を確かに与えられている。実際、「スローター」判決において最高裁が発明し、大統領に付与したのはまったく新しい権限だ。その権限とは……", "vocab": [{"word": "precedent", "definition": "先例・判例。過去の判決や慣行で、その後の決定の基準となるもの。法律の文脈で頻繁に使われる重要な用語。"}, {"word": "prerogative", "definition": "特権・専権。特定の地位や役職に付随する排他的な権利や権限のこと。本文では議会の憲法上の権限を指す。"}, {"word": "administrative state", "definition": "行政国家。政策立案や規制において大きな権限を持つ独立した行政機関や官僚組織の総体を指す政治学・法律用語。"}, {"word": "bete noir", "definition": "（フランス語由来）忌み嫌うもの・天敵。特定の人物や集団が強い嫌悪感を持つ対象を指すイディオム表現。"}, {"word": "facile", "definition": "浅薄な・安易な。表面的で深みがなく、真剣な思考を欠いていることを批判的に表現する際に使われる形容詞。"}, {"word": "reapportion", "definition": "再配分する・割り当て直す。権力・資源・代表権などを新たな基準で振り分け直すことを意味する動詞。"}, {"word": "causeless", "definition": "正当な理由のない・根拠のない。法的文脈では「理由のない（解雇など）」を意味し、due processの欠如を示唆する語。"}]}, {"title_ja": "ベネズエラ地震：国家能力の欠如とトランプの約束への試練", "title_en": "Venezuela's Earthquake Exposes State Failures and Tests Trump's Promises", "summary_ja": "ガーディアン紙の社説は、ベネズエラを襲ったマグニチュード7.5の大地震が、長年の国家の失政と腐敗を露わにしたと論じている。資金は緊急救助機関ではなく治安部隊に注ぎ込まれており、政府の対応の遅さに対する国民の怒りが高まっている。またトランプ大統領はマデュロ前大統領拘束後に自らがベネズエラを「管轄する」と宣言した以上、真の支援で責任を果たすべきだと訴えている。", "summary_en": "The Guardian argues that Venezuela's devastating 7.5-magnitude earthquake has exposed the Maduro-era regime's chronic mismanagement, with resources funneled into security forces rather than emergency services. The editorial contends that acting president Delcy Rodríguez faces a severe test of governance while Trump, having declared himself 'in charge' of Venezuela after seizing Maduro, must now prove his pledges of prosperity are more than rhetoric. The piece calls for sustained, long-term international support rather than token relief gestures.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jun/29/the-guardian-view-on-venezuelas-earthquake-a-test-of-state-capacity-and-trumps-promises", "state_media": false, "category": "オピニオン", "full_text": "The devastation wrought by an earthquake is shaped by what happened before and after it as much as by the shock itself. The twin tremors that hit Venezuela moments apart last Wednesday were its biggest since 1900, at 7.2 and 7.5, and were shallow temblors, which often cause more destruction than deeper ones of similar magnitude. Aftershocks continued on Monday. At least 1,450 people have died, with tens of thousands reported missing and more than 3,000 injured. The UN estimates that there has been $6.7bn of damage – equivalent to 6% of the country’s GDP – including key infrastructure; 38 hospitals are said to need repairs. Unicef says that 1.8 million people need aid.\nThe toll of such disasters reflects the condition of the nation before they struck, and the state’s capacity to respond. While remarkable rescues in the last few days have brought joy even after the 72-hour window judged crucial to saving lives had closed, the picture is not kind to Venezuela’s leaders.\nSurvivors heckled Delcy Rodríguez, the acting president, as she toured a badly hit area of Caracas. Anger is growing at a sluggish official reaction in sharp contrast to the urgency of volunteer rescue and relief workers: communities feel they have been left to help themselves. The quake has highlighted the way that money has been poured into security forces, especially the military, rather than emergency response services. The regime is equipped to obstruct and repress its people, but not to aid them. As the political scientist Orlando J Pérez wrote: “Disasters force a government to show what it can actually do, and what it has been doing all along with public money.” That can profoundly shape a country’s political trajectory.\nYears of state mismanagement, kleptocracy and US sanctions have left 80% of Venezuelans in poverty and driven a quarter of the population to flee. Its annualised inflation rate stands at over 600% – the world’s highest. The health system is on its knees. The Trump administration’s illegal seizure of the then president, Nicolás Maduro, in January left the regime standing, but the country in political disarray.\nThe US president promised that his actions would “unleash prosperity” in Venezuela; his priority is opening the country up for private investors and managing its oil sales. In typically crass style, Mr Trump declared that outside the disaster zone “people are dancing in the streets”. But while many wanted Mr Maduro to go, Ms Rodríguez’s deal with the US has destroyed his party’s remaining ideological foundation – anti-imperialism – and undone the 1976 nationalisation of the oil industry. Anger on the left is matched by frustration among those opposed to the regime at the US deal with Ms Rodríguez, who was Mr Maduro’s deputy, and its continued snubbing of the exiled conservative opposition leader María Corina Machado.\nMr Trump declared himself to be “in charge” of Venezuela after snatching Mr Maduro. On that basis, he should step up. But the evisceration of the US Agency for International Development and mass layoffs of aid workers put his ability as well as willingness to do so in doubt. The US has pledged $300m for relief efforts and its teams are among the 2,400 search and rescuers sent from around the world. That’s a start. But Venezuela’s people need and deserve concerted and sustained support, not only in the quake’s immediate aftermath, but for real recovery from permacrisis. That will be the real test for Ms Rodríguez and her party, and for US claims to leadership in the western hemisphere.\n- \n  Do you have an opinion on the issues raised in this article? If you would like to submit a response of up to 300 words by email to be considered for publication in our letters section, please click here.", "translation_ja": "地震がもたらす壊滅的な被害は、衝撃そのものだけでなく、その前後に何が起きたかによっても大きく左右される。先週水曜日にベネズエラを数分間隔で襲った二度の揺れは、マグニチュード7.2と7.5を記録し、1900年以降で最大規模となった。いずれも浅発地震であり、同規模の深発地震よりも大きな被害をもたらすことが多い。その後も月曜日まで余震が続いた。少なくとも1,450人が死亡し、数万人が行方不明、3,000人以上が負傷したと報告されている。国連は被害総額を67億ドル（同国GDPの約6%相当）と試算しており、重要インフラも含まれる。38の病院が修繕を必要としているとされ、ユ
