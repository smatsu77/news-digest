ion toward the enemies of the West or the enemies of the United States,\" likely a reference to Russia.\nUkraine on the agenda\nAllies are considering a financial commitment to Ukraine, sources told ABC News, as Russia escalates its war there and Kyiv manages to launch successful attacks inside Russia.\nZelenskyy blamed a Russian barrage on Kyiv on the eve of the summit on Russian President Vladimir Putin's desire to divide", "translation_ja": "トランプ氏、激動の1年を経てNATO同盟国と会談：分析\n\n同盟国はアンカラ首脳会談で「より欧州色の強い」NATOを打ち出す見通し。\n\n大西洋の両岸から集まった同盟国が火曜日、アンカラに集結した。これは北大西洋条約機構（NATO）の結束を問う重要な試金石となる首脳会談で、米国のドナルド・トランプ大統領はこの同盟を揺さぶり、批判し続けてきた。\n\n今回の首脳会談は、トランプ氏が繰り返す同盟国の防衛費批判と、国防総省による欧州駐留米軍の見直しを背景に開催される。\n\nNATOのマーク・ルッテ事務総長は、欧州同盟国が米国の要求に応じてより大きな負担を担うようになったと宣言し、緊張の緩和を図ってきた。ルッテ氏は先月ワシントンを訪問した際、欧州とカナダが昨年に防衛費を20%増加させたことを指摘した。\n\n事務総長はトランプ氏の意向—欧州がより大きな負担を分担することへの要求—を歓迎し、大統領のNATOに対する野心を称賛するとともに「防衛産業革命」を呼びかけた。\n\n首脳会談に先立ち、ルッテ氏はピート・ヘグセス国防長官や他の米政府高官が使う表現を採用した。\n\n「これはNATO 3.0だ」とルッテ氏は語った。「より欧州が主導し、防衛費を均等化しつつも、米国はNATOにしっかりと根差し続ける。」\n\n欧州高官によれば、今回の首脳会談は昨年のハーグ首脳会談で設定された目標の実施に焦点を当てるという。ハーグでは同盟国が、国内総生産（GDP）に占める防衛費の割合を5%に引き上げるという10年目標に合意した。\n\n欧州の貢献をめぐる緊張や米国のイラン攻撃作戦を踏まえ、アナリストたちは、ハーグ首脳会談とは異なり、アンカラで祝うべき明確な成果がないことが首脳会談に一定の不確実性をもたらしていると指摘する。トランプ氏は引き続き同盟国への不満を表明している。\n\n「米国はNATOに他のどの国よりもはるかに多くの資金を費やし、見返りも得ずに彼らを守っている」とトランプ氏は先週述べた。\n\nNATO会議はまた、ウクライナ戦争の激化という状況下でも開催される。同盟国はキーウへの支持を示す場として今回の会議を位置づけるとみられ、トランプ氏は水曜日にウクライナのウォロディミル・ゼレンスキー大統領と会談する予定だ。\n\n欧州における米軍の撤退\n\n今回の首脳会談は、ヘグセス国防長官が6月にブリュッセルで開催されたNATO会議で同盟国の防衛貢献を「恥ずべきもの」と叱責し、欧州駐留米軍の規模に関する6カ月間の見直しを発表した後に行われる。\n\n米軍はすでに、緊急事態の際に同盟国が戦力を拠出する仕組みであるNATOフォースモデルへのコミットメントを「適正化」すると表明している。\n\nアナリストによれば、ポーランドへの展開が予定されていた5,000人の兵士のローテーション中止を含む欧州における米軍態勢の変化は、短期的な穴を生じさせるリスクがあるという。\n\nトランプ氏はポーランドを同盟国として称賛しており、後に公式にこの決定を覆した。しかし、5,000人の兵士はいまだ展開されていない。\n\n米国のNATO大使マシュー・ウィッテカー氏は月曜日にCNBCのインタビューで、他の地域での需要を理由に、米軍は欧州での役割を「縮小する」と述べた。\n\n「目標は、欧州がヨーロッパ大陸の通常戦力による防衛を引き受けることだ」とウィッテカー氏は言った。「では、欧州がそれを引き受けるとしたら、米国が縮小することが予想されるだろう。我々はいなくなるわけではない。グローバルな要求とグローバルな課題があるため、単に役割を減らすだけだ。」\n\n米陸軍野戦砲兵士官の経験を持ち、現在は民主主義防衛財団の上席研究アナリストを務めるキャメロン・マクミラン氏は、「その論理にはいくつかの欠陥がある」と指摘した。\n\nルーマニアから撤退し、ドイツからの撤退も予定されている旅団戦闘団について、マクミラン氏はこう述べた。「それらは基本的に、欧州でロシア軍と戦うため、そしてロシアがバルト三国やポーランドに侵攻したり、カリーニングラード方面に動いたりするのを抑止するために設計されている。」\n\n「台湾有事の際に多数のエイブラムス戦車が台湾まで泳いでいく計画でもない限り、それらの戦車は欧州においてはるかに大きな価値を持つ。」\n\n首脳間の緊張くすぶる\n\nトランプ大統領が感じた不満を理由に同盟国を罰しようとする傾向は、アンカラでの首脳会談が同盟の結束という薔薇色の絵にはならないのではとの懸念を生んでいる。トランプ氏は防衛費の貢献や対イラン作戦における同盟国の役割について不満を募らせている。\n\n32カ国の首脳が一堂に会するという稀な場であるだけに、今回の首脳会談は予期せぬ個人的な衝突が起きる可能性も秘めている。\n\nトランプ氏とイタリアのジョルジャ・メローニ首相が顔を合わせるのは、先月のG7首脳会議でトランプ氏がメローニ氏が写真撮影を「懇願した」と主張して以来、初めてとなる。\n\nトランプ氏の長年の支持者であるメローニ氏は、痛烈なSNS動画でこの主張を否定し、大統領は「西側の敵や米国の敵に対して同じ断固たる姿勢を示していない」と発言した。これはおそらくロシアへの言及とみられる。\n\nウクライナが議題に\n\n関係者がABCニュースに語ったところによれば、ロシアがウクライナへの攻撃を激化させ、キーウがロシア国内への攻撃を成功させている中、同盟国はウクライナへの財政的支援を検討しているという。\n\nゼレンスキー氏は、首脳会談前夜にキーウに対して行われたロシアの砲撃について、プーチン大統領が……（以下本文続き）", "vocab": [{"word": "upheaval", "definition": "大激動、大変動。社会や組織における突然の大きな混乱や変化を指す名詞。「a year of upheaval（激動の1年）」のように使われる。"}, {"word": "admonished", "definition": "叱責した、警告した。権威ある立場から相手の行動を強く戒めることを意味する動詞admonishの過去形。フォーマルな文脈でよく用いられる。"}, {"word": "posture", "definition": "（軍事的・政治的な）態勢、姿勢。force postureのように軍事用語として、ある地域における部隊の配置や戦略的立場を指す専門用語。"}, {"word": "temper", "definition": "（感情・状況を）和らげる、緩和する。動詞として「temper tensions（緊張を和らげる）」のように使い、激しさを抑える意味を持つ上級語彙。"}, {"word": "contingency", "definition": "不測の事態、緊急事案。軍事・外交分野で「Taiwan contingency（台湾有事）」のように、想定される危機的シナリオを指す専門的表現。"}, {"word": "barrage", "definition": "（砲撃・攻撃などの）集中砲火、一斉攻撃。軍事用語として砲弾やミサイルの大量攻撃を指すほか、比喩的に批判の集中なども表す。"}, {"word": "brushups", "definition": "（ここでは）衝突、もめごと。本来は「復習」を意味するが、文脈上「brushup（擦れ合い）」として人物間の個人的な口論や対立を指す慣用的な用法。"}]}, {"title_ja": "ABCニュースライブ：24時間ニュース速報", "title_en": "ABC News Live: 24/7 Breaking News Coverage", "summary_ja": "ABCニュースライブは、速報ニュースやライブイベントを24時間365日配信しています。国内外で展開する主要ニュースをリアルタイムでお届けします。視聴者はいつでも最新情報を確認することができます。", "summary_en": "ABC News Live provides continuous 24/7 coverage of breaking news and live events. The stream delivers real-time updates on major stories as they unfold across the nation and around the world. Viewers can tune in at any time to stay informed on the latest developments.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "マクロン大統領のシリア訪問中にダマスカスで爆発", "title_en": "Explosions Rock Damascus During Macron's Historic Syria Visit", "summary_ja": "フランスのエマニュエル・マクロン大統領がシリアのアフメド・アル＝シャラア大統領と会談するためダマスカスを訪問中の火曜日、観光省付近で少なくとも2件の爆発が発生し、治安要員4人を含む18人が負傷した。マクロン大統領は2024年12月のアサド政権崩壊後、シリアを訪問した初の主要な西側諸国首脳となる。爆発について直接は言及せず、マクロン氏はXに「シリアの人々の主権ある安全な国家への願いを消し去ることはできない」と投稿した。", "summary_en": "At least two explosions occurred near the Ministry of Tourism in Damascus on Tuesday, injuring 18 people including four security personnel, while French President Emmanuel Macron was visiting the city. Macron, the first major Western leader to visit Syria since Assad's fall in December 2024, met with Syrian President Ahmed al-Sharaa. Without explicitly referencing the blasts, Macron posted on X that nothing could suppress Syrians' aspirations for a sovereign and unified nation.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/International/explosions-reported-damascus-amid-macrons-visit-syria-state/story?id=134539914", "state_media": false, "category": "政治", "full_text": "Explosions reported in Damascus amid Macron's visit to Syria, state media says\nMacron is visiting Damascus to meet with Syrian President Ahmed al-Sharaa.\nLONDON -- At least two explosions were reported in the Syrian capital of Damascus on Tuesday, Syrian state media said, as French President Emmanuel Macron was visiting the city to meet with the country's President Ahmed al-Sharaa.\nThe Syrian Arab News Agency said that the explosions occurred near the Ministry of Tourism building and that at least 18 people -- including four security personnel -- were injured.\nSyrian authorities did not immediately comment on the report. The cause of the explosions was not immediately clear.\nWriting on X after the explosions but without explicitly mentioning the blasts, Macron said, \"Nothing can smother the aspiration of Syrian women and men to live in a fully sovereign, safe, pluralistic and united Syria. This morning I met Syria in all its diversity. I saw dignity, courage and determination. My visit continues.\"\nMacron is the first major Western leader to visit Syria since the fall of former President Bashar al-Assad in December 2024. Assad was forced to flee the country after government forces collapsed in the face of a surprise offensive launched by a coalition of rebel groups, led by Sharaa's Hayat Tahrir al-Sham.\nMacron arrived in Damascus on Monday. \"I have come to express France's commitment to the Syrian people. For a sovereign Syria, united in its diversity and at peace with its neighbors. Together, let us open a new chapter of stability and peace,\" he wrote in a post to X.\nLast week, a device exploded in a cafe near the Justice Palace in Damascus, killing at least 10 people and wounding 20.\nThis is a developing story. Please check back for updates.\nABC News' Joe Simonetti contributed to this report.", "translation_ja": "ダマスカスで爆発報告、マクロン大統領のシリア訪問中に――国営メディア\n\nマクロン大統領はシリアのアフメド・アル＝シャラア大統領との会談のためダマスカスを訪問中。\n\nロンドン発 ――フランスのエマニュエル・マクロン大統領がシリアの首都ダマスカスを訪問し、同国のアフメド・アル＝シャラア大統領と会談を行っていた火曜日、シリアの国営メディアによると、首都で少なくとも2件の爆発が報告された。\n\nシリア・アラブ通信（SANA）は、爆発が観光省の建物付近で発生し、治安要員4人を含む少なくとも18人が負傷したと伝えた。\n\nシリア当局はこの報告に対して即座にコメントしなかった。爆発の原因は直ちには明らかにされなかった。\n\nマクロン大統領は爆発後にXへの投稿で、爆発について明示的には触れることなく、「シリアの女性と男性が、完全に主権を持ち、安全で、多元的かつ統一されたシリアで生きることへの願いを消し去ることは何もできない。今朝、私はあらゆる多様性の中でシリアと出会った。尊厳、勇気、そして決意を見た。私の訪問は続く」と述べた。\n\nマクロン大統領は、2024年12月に前大統領バッシャール・アル＝アサドが政権を追われて以来、シリアを訪問した初の主要な西側諸国首脳となる。アサド前大統領は、シャラア氏が率いるハヤット・タハリール・アル＝シャームが主導する反体制派の連合が仕掛けた奇襲攻撃を前に政府軍が崩壊し、国外に逃亡を余儀なくされた。\n\nマクロン大統領は月曜日にダマスカスに到着した。「私はシリアの人々へのフランスのコミットメントを表明するために来た。多様性の中で統一された、近隣諸国と平和な主権あるシリアのために。共に、安定と平和の新たな章を開こう」と同氏はXの投稿に記した。\n\n先週、ダマスカスの司法宮殿付近のカフェで爆発物が爆発し、少なくとも10人が死亡、20人が負傷した。\n\nこれは続報が見込まれるニュースです。最新情報をご確認ください。\n\nABCニュースのジョー・シモネッティがこの報道に貢献した。", "vocab": [{"word": "smother", "definition": "「抑圧する・消し去る」という意味の動詞。感情や動き、希望などを完全に封じ込める際に用いる比喩的な表現。"}, {"word": "pluralistic", "definition": "「多元的な」を意味する形容詞で、多様な価値観・文化・集団が共存する状態を表す。政治・社会的文脈で頻出する上級語彙。"}, {"word": "sovereign", "definition": "「主権を持つ・独立した」を意味する形容詞または名詞。国家が外部の支配を受けず自律的に統治される状態を指す政治用語。"}, {"word": "aspiration", "definition": "「願望・大志」を意味する名詞。個人や集団が強く望む目標や理想を指し、フォーマルな文章や演説でよく使われる。"}, {"word": "offensive", "definition": "軍事用語として「攻勢・攻撃作戦」を意味する名詞。大規模かつ組織的な軍事行動を指し、ニュース報道で頻繁に使われる。"}, {"word": "coalition", "definition": "「連合・連立」を意味する名詞。共通の目的のために複数の集団や国家が一時的に組む同盟関係を指す政治・軍事用語。"}]}, {"title_ja": "マスクのDOGEによるUSAIDエボラ対策予算削減が彼のレガシーを定義する", "title_en": "Musk's DOGE Cuts to USAID Ebola Programs May Define His Legacy", "summary_ja": "イーロン・マスクがDOGEを通じてUSAIDを解体したことで、コンゴ民主共和国で進行中のエボラ出血熱の感染拡大を背景に、エボラ検出プログラムの削減が再び注目を集めている。専門家らは支援削減により数百万人が死亡する可能性があると推定しており、ランセット誌の研究ではUSAIDが完全に廃止された場合、最大1400万人が死亡すると試算している。元USAID高官や研究者たちは、同機関の破壊がマスクの遺産において決定的かつ否定的な部分となるだろうと主張している。", "summary_en": "Elon Musk's dismantling of USAID through DOGE, including the accidental cutting of Ebola detection programs, has come under renewed scrutiny amid an ongoing outbreak in the Democratic Republic of the Congo. Experts estimate millions of deaths could result from the aid cuts, with one Lancet study projecting up to 14 million deaths if USAID were abolished entirely. Former USAID officials and researchers argue the destruction of the agency will become a defining and damaging part of Musk's legacy.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/technology/2026/jul/07/elon-musk-doge-cuts-usaid-ebola", "state_media": false, "category": "政治", "full_text": "Elon Musk has an Ebola problem. SpaceX stock dropped precipitously after its initial public offering, and Tesla faces a wave of lawsuits. But instead of focusing on his companies, Musk has posted frequently on X about the US Agency for International Development (USAID), which he helped dismantle – or, in his words, feed into the woodchipper – last year.\n“Elon’s USAID crash-out over the past week has been a thing to behold,” said Jeremy Konyndyk, a former top USAID official who oversaw the agency’s Ebola response in 2014-2015 and the president of Refugees International. “In a way, it’s helpful that Elon is doing this, because it’s putting attention back on the issue of what he did last year.”\nMusk has said his critics “cannot cite a single name of someone who died” and “If there were, it would be worldwide headline news!” When confronted with the names – including those of children who died because of the cuts – Musk called a journalist “an utter piece of shit and a liar” and “utterly evil”. Musk has claimed, without evidence, that US tax dollars went to arming militants and “corrupt politicians”.\nMusk’s cuts, through the short-lived US “department of government efficiency” (Doge), have come under renewed scrutiny during the Ebola outbreak in the Democratic Republic of the Congo (DRC). Last year, Musk admitted to “accidentally” cutting Ebola detection and response programs.\n“This is one of the reasons why there was not enough surveillance and preparedness for the outbreak of Ebola,” said Davide Rasella, a research professor at the Catalan Institution for Research and Advanced Studies and head of the Global Health Impact Assessment and Evaluation Group at the Barcelona Institute for Global Health (ISGlobal) in Spain.\nIf global health programs hadn’t been slashed in the DRC and elsewhere, the Ebola outbreak would have been detected much earlier, Konyndyk said. “I’m very confident about that,” he added.\nThe cuts have affected global health, nutrition and education around the world.\nOne Lancet study estimated there would be 14 million deaths, including 4.5 million child deaths, if USAID were abolished entirely. When Ro Khanna, a Democratic congressman from California, cited the study, Musk threatened to sue, and he doubled down on his claims that Doge did nothing wrong.\nRasella, one of the authors of the Lancet study, was unfamiliar with the Khanna-Musk conflict, but he stood by the estimates.\nMusk “uses science for launching rockets”, Rasella said. “When we speak about public health and global health, we use the same statistical mathematical tools that we use to launch rockets into space.”\nIt’s difficult to pinpoint exactly how many people will die as a result of these cuts, said Rasella.\n“But the important thing is the scale,” he said. There will probably be millions of deaths over the next several years, he added. “This is really unquestionable.”\nSome of these losses are already occurring.\n“People are absolutely dying. They’re dying in significant numbers in some places,” Konyndyk said.\nMusk’s demolition of USAID, and the resulting suffering and death, “is going to be a defining part of his legacy, and I do wonder if that’s why he’s scrambling so hard to rewrite that history now”, Konyndyk said.\nMusk took a model he used in his companies to “cut until people scream, and then when people scream, you’ve cut too far, and then you restore”, Konyndyk said. “That’s not how public funding works. Here the cost is literal human lives.”\nIf not for Musk, USAID would probably still exist, Konynydk said. Without him, and administrators like Pete Marocco, USAID would have taken “some huge hits”, but would have survived in some form, like other health and science agencies – “much diminished, much weaker, but still existing”, Konyndyk said.\n“His personal investment in that project gave it the reach all the way up to the White House,” he added.\nCongress could have stopped the dismantling of USAID – and it still could, Konyndyk said. USAID is required to exist by law, and what few aid programs still operate have been choked by the slow release of funding from the state department, he said.\nAfter the Covid pandemic caused about 20 million deaths around the globe, it was “absurd” to cut programs that would prevent and prepare for the next pandemic, Rasella said.\n“When you disrupt a single piece of that [aid], you can really create more and larger damage to the entire system,” Rasella said. “This is just the beginning.”\nBut that means there’s still time to act and avert some of the worst effects of ending foreign aid, Konyndyk said.\n“We have a window here to try and bring some of this back before the worst of the harms set in,” he said.", "translation_ja": "イーロン・マスクはエボラ問題を抱えている。SpaceXの株価は新規株式公開後に急落し、テスラは訴訟の波に直面している。しかしマスクは自社のビジネスに集中する代わりに、昨年みずから解体に手を貸した——あるいは彼自身の言葉を借りれば「ウッドチッパーに放り込んだ」——米国国際開発庁（USAID）について、X上に頻繁に投稿し続けている。\n\n「過去1週間のイーロンのUSAIDをめぐるメルトダウンは、目を見張るものがあった」と、2014〜2015年にUSAIDのエボラ対応を監督した元高官であり、現在は難民インターナショナルの会長を務めるジェレミー・コニンダイクは語った。「ある意味で、イーロンがこうした行動をとることは有益だ。なぜなら、彼が昨年やったことに再び注目が集まるからだ。」\n\nマスクは批判者について「死亡した人物の名前を一人も挙げられない」とし、「もし実在するなら、世界中でトップニュースになっているはずだ！」と発言した。しかし、削減によって亡くなった子どもたちを含む名前を突きつけられると、マスクはあるジャーナリストを「最低な嘘つき野郎」「完全に邪悪だ」と呼んだ。マスクはまた、証拠を示すことなく、米国の税金が武装勢力や「腐敗した政治家」への資金提供に使われていたと主張した。\n\nマスクが短命に終わった米国「政府効率化省」（DOGE）を通じて行った予算削減は、コンゴ民主共和国（DRC）でのエボラ感染拡大を受けて、改めて精査されている。マスクは昨年、エボラの検出・対応プログラムを「誤って」削減したことを認めている。\n\n「エボラ感染拡大に対するサーベイランスと備えが十分でなかった理由の一つがこれだ」と、カタルーニャ高等研究院の研究教授であり、スペインのバルセロナグローバルヘルス研究所（ISGlobal）のグローバルヘルス影響評価・評価グループを率いるダヴィデ・ラセッラは語った。\n\nDRCやその他の地域でグローバルヘルスプログラムが削減されていなければ、エボラの感染拡大はもっと早期に検出されていたはずだ、とコニンダイクは言う。「私はそれを確信している」と彼は付け加えた。\n\n今回の削減は世界中のグローバルヘルス、栄養、教育に影響を与えている。\n\nランセット誌に掲載されたある研究は、USAIDが完全に廃止された場合、450万人の子どもを含む1400万人が死亡すると推定した。カリフォルニア州選出の民主党下院議員、ロー・カンナがこの研究を引用すると、マスクは訴訟を起こすと脅し、DOGEは何も悪いことをしていないという主張を繰り返した。\n\nランセット研究の共著者の一人であるラセッラは、カンナとマスクの対立については知らなかったが、自らの推計を支持した。\n\nマスクは「ロケットを打ち上げるために科学を利用する」とラセッラは言う。「しかし、公衆衛生やグローバルヘルスについて話すとき、私たちはロケットを宇宙に打ち上げるために使うのと同じ統計的・数学的手法を使っている。」\n\nこれらの削減の結果として何人が死亡するかを正確に特定することは難しい、とラセッラは言う。\n\n「しかし重要なのは規模だ」と彼は語った。今後数年間でおそらく数百万人が死亡するだろうと付け加えた。「これは本当に議論の余地がない。」\n\nこうした損失の一部はすでに現実のものとなっている。\n\n「人々は確実に死んでいる。一部の地域では相当な数の人々が亡くなっている」とコニンダイクは語った。\n\nマスクによるUSAIDの解体、そしてそれによる苦しみと死は「彼のレガシーを定義する一部となるだろう。だからこそ彼が今、その歴史を必死に書き換えようとしているのではないかと思う」とコニンダイクは語った。\n\nマスクは自身の企業で使ってきたモデルを踏襲した。「人々が悲鳴を上げるまで削減し、悲鳴が上がったら削りすぎだと判断して元に戻す」という手法だ、とコニンダイクは言う。「しかしそれは公的資金の仕組みではない。ここでは、コストは文字通り人間の命だ。」\n\nマスクがいなければ、USAIDはおそらく今も存在していたはずだとコニンダイクは言う。彼がいなければ、またピート・マロッコのような管理者がいなければ、USAIDは「大きな打撃」を受けながらも、他の保健・科学機関のように何らかの形で生き残っていただろう——「大幅に縮小され、大幅に弱体化しながらも、依然として存在し続けていた」はずだとコニンダイクは語った。\n\n「彼個人がそのプロジェクトに深く関与したことで、影響力がホワイトハウスにまで及んだ」と彼は付け加えた。\n\n議会はUSAIDの解体を阻止できたはずだし、今からでもできる、とコニンダイクは言う。USAIDは法律によって存在が義務付けられており、今も細々と続く少数の援助プログラムは、国務省からの資金の緩慢な放出によって息の根を止められようとしている、と彼は言う。\n\n新型コロナウイルスのパンデミックが世界で約2000万人の死者をもたらした後、次のパンデミックを予防・準備するプログラムを削減することは「馬鹿げている」とラセッラは語った。\n\n「その（支援）の一部を壊すだけで、システム全体により大きな、より広範なダメージを与える可能性がある」とラセッラは言う。「これはまだ始まりに過ぎない。」\n\nしかし、それはすなわち、外国援助の終焉がもたらす最悪の影響の一部を行動によってまだ回避できる時間が残されているということでもある、とコニンダイクは言う。\n\n「最悪の被害が現れる前に、この一部を取り戻そうとする窓がまだここにある」と彼は語った。", "vocab": [{"word": "precipitously", "definition": "「急激に、険しく」という意味の副詞。株価や数値などが急落・急騰する場面で使われる。例：stock dropped precipitously（株価が急落した）。"}, {"word": "dismantle", "definition": "組織や機構などを「解体する、分解する」という意味の動詞。単に廃止するだけでなく、構造を意図的に壊すニュアンスを含む。"}, {"word": "scrutiny", "definition": "「精査、厳しい調査・監視」という意味の名詞。政策や行動が批判的な目で詳細に検討される状況で使われる。come under scrutiny で「精査される」となる。"}, {"word": "surveillance", "definition": "公衆衛生の文脈では「感染症の監視・サーベイランス」を指す専門用語。疾病の早期発見や拡大防止のためのモニタリング体制を意味する。"}, {"word": "avert", "definition": "「（危険・災害などを）回避する、防ぐ」という意味の動詞。avert a crisis（危機を回避する）のように、深刻な事態を未然に防ぐ場面で使われる。"}, {"word": "demolished", "definition": "「完全に破壊した、壊滅させた」という意味の動詞（demolishの過去形）。建物だけでなく組織や制度を根底から崩壊させる際にも比喩的に使われる。"}, {"word": "precipitate", "definition": "「（事態を）引き起こす、早まらせる」という意味の動詞、または「急激な」という形容詞。文脈によって名詞・動詞・形容詞として用いられる上級語彙。"}]}, {"title_ja": "リベリアで200kg超のコカイン押収、5人を起訴――調味料に偽装した大規模密輸事件", "title_en": "Five charged in Liberia after 200kg cocaine seizure disguised as seasoning cubes", "summary_ja": "リベリア当局は、モンロビアの国際空港でマギーの調味料キューブと偽申告された200kg超のコカイン（推定価格約1900万ドル）を発見し、5人の容疑者を起訴した。この摘発を受け、ボアカイ大統領は警察と国家麻薬取締機関による合同捜査を命じた。現在も逃走中の容疑者についてはインターポルを通じて逮捕状が請求される予定で、そのうち1人は中国に、別の1人は英国バーミンガムに拠点を置くとみられている。", "summary_en": "Liberian authorities have charged five suspects following the discovery of over 200kg of cocaine falsely declared as Maggi seasoning cubes at Monrovia's international airport, with an estimated street value of $19 million. The bust, which prompted President Boakai to order a joint investigation, highlighted Liberia's role as a transit point for narcotics trafficking between South America and Europe. Arrest warrants are being sought through Interpol for suspects still at large, including one believed to be in China and another based in Birmingham, UK.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/07/charged-liberia-200kg-cocaine-seized-drug-bust", "state_media": false, "category": "社会", "full_text": "Authorities in Liberia have charged five suspects over one of the largest drug seizures in the country’s history, after police found more than 200kg of cocaine falsely declared as Maggi seasoning cubes.\nThe shipment, with an estimated value of $19m (£14.2m), was discovered at the international airport in Monrovia on 8 June, but the suspects were not named until a press briefing at the weekend.\n“This was a serious transnational cocaine trafficking operation using Liberia’s aviation and logistics system as a channel for organised crime,” said Insp Gen Gregory Coleman late on Saturday. He added that his team had found evidence linking the shipment to a similar one processed in May.\nNews of the drug bust caused uproar in Liberia, and prompted President Joseph Boakai to order a combined investigation by the police and national anti-drug agency. “Liberia will not be used as a safe haven, transit point, warehouse, financial centre or operational base by criminal networks engaged in narcotics trafficking,” he said at the time.\nBut the delay in naming the suspects caused a row in parliament, where Coleman was summoned to a special senate hearing, and fed public speculation that the investigation was being tampered with to protect powerful Liberian citizens.\nOn Saturday, Coleman announced that his team had found evidence suggesting the complicity of the logistics company that handled the shipment. He then named the suspects who are being charged for the transportation, possession and illicit trafficking of controlled substances and criminal conspiracy.\nThe key suspect, the operations manager of the firm, is now in custody in Monrovia. Coleman said arrest warrants would be issued in collaboration with Interpol for the others who remain at large. Another suspect, believed to be attending an event in China at the time of the bust, has not been back to the country. Prosecutors also released the Dutch phone number of one UK-based suspect and his house address with a Birmingham postcode.\nThe bust has reinforced reports that west Africa, a region with porous land and sea borders, has become a major staging post for the movement of narcotics between South America and Europe.\nIn October 2022, authorities intercepted a shipping container at Monrovia seaport with 520kg of cocaine valued at $100m (£74.86m). One of the suspects named on Saturday was reportedly released from prison after being arrested in connection with another drug-related case in 2024.\nIn neighbouring Sierra Leone, one of Europe’s most wanted drug dealers has taken refuge since at least 2022 in the country’s capital, Freetown, and is in a serious relationship with the president’s daughter, a Guardian investigation showed in February 2025.\nIn May, Spanish police working with US and Dutch officials confiscated 45 tonnes of cocaine worth €812m (£694m) in what a Madrid court said was Europe’s largest-ever cocaine bust. Authorities said the Comoros-flagged cargo vessel, which was raided near the Canary Islands, had left Freetown with Libya as its official destination. Another drug shipment out of Freetown was also seized en route to Spain in February.", "translation_ja": "リベリア当局は、同国史上最大規模の薬物押収の一つを受け、5人の容疑者を起訴した。警察がマギーの調味料キューブと虚偽申告された200kg超のコカインを発見したもので、推定価格は1900万ドル（約1420万ポンド）に上る。\n\nこの積み荷は6月8日にモンロビアの国際空港で発見されたが、容疑者の名前は週末の記者会見まで公表されなかった。\n\n「これは組織犯罪の経路としてリベリアの航空・物流システムを利用した、深刻な国際的コカイン密輸作戦だった」と、グレゴリー・コールマン警察長官は土曜日の夜に述べた。同長官はさらに、今回の積み荷が5月に処理された類似案件と関連していることを示す証拠を発見したとも付け加えた。\n\nこの薬物摘発のニュースはリベリア国内に大きな波紋を呼び、ジョセフ・ボアカイ大統領は警察と国家麻薬取締機関による合同捜査を命じた。大統領は「リベリアを、麻薬密売に関与する犯罪ネットワークの安全な隠れ家、中継地点、保管庫、資金センター、活動拠点として利用させることはしない」と当時述べた。\n\nしかし、容疑者の名前公表が遅れたことで議会に波紋が広がり、コールマン長官は上院の特別公聴会に召喚された。また、有力なリベリア市民を守るために捜査が操作されているという公の憶測も招いた。\n\n土曜日、コールマン長官は、積み荷を取り扱った物流会社の関与を示す証拠を発見したと発表した。そして、規制薬物の輸送・所持・不正取引および共謀の罪で起訴される容疑者の名前を公表した。\n\n中心的な容疑者である当該会社のオペレーションマネージャーは現在モンロビアで拘留中だ。コールマン長官は、逃走中の他の容疑者についてはインターポルと連携して逮捕状を請求すると述べた。摘発当時、中国でのイベントに参加中だったとみられる別の容疑者はその後帰国していない。また検察は、英国在住の容疑者1人のオランダの電話番号と、バーミンガムの郵便番号を含む自宅住所を公開した。\n\n今回の摘発は、西アフリカが南米と欧州の間の麻薬移送における主要な中継地となっているという報告を裏付けるものとなった。西アフリカは陸と海の国境が脆弱な地域だ。\n\n2022年10月には、当局がモンロビアの海港でコカイン520kg（価格1億ドル、約7486万ポンド相当）が入ったコンテナを押収した。今回名前が挙がった容疑者の1人は、2024年に別の薬物関連事件で逮捕された後、釈放されていたと伝えられている。\n\n隣国シエラレオネでは、欧州で最も指名手配されている麻薬密売人の一人が少なくとも2022年から首都フリータウンに潜伏しており、大統領の娘と真剣な交際関係にあることが、2025年2月のガーディアン紙の調査報道で明らかになった。\n\n5月には、スペイン警察が米国およびオランダの当局と協力し、マドリードの裁判所が欧州史上最大のコカイン摘発と認定した事件で、812百万ユーロ（約6億9400万ポンド）相当のコカイン45トンを押収した。当局によると、カナリア諸島付近で摘発されたコモロ船籍の貨物船は、リビアを公式目的地としてフリータウンを出港していたという。フリータウンから出た別の薬物積み荷も、2月にスペイン向け輸送中に押収されている。", "vocab": [{"word": "transnational", "definition": "国境を越えた、複数の国にまたがる様子を指す形容詞。国際的な組織犯罪や密輸を描写する文脈でよく使われる。"}, {"word": "complicity", "definition": "犯罪や不正行為への共謀・加担を意味する名詞。法律や報道の文脈で「共犯関係」を表す際に用いられる。"}, {"word": "porous", "definition": "本来は「多孔質の」を意味するが、比喩的に国境や管理体制が「穴だらけで侵入しやすい」状態を表すために使われる形容詞。"}, {"word": "staging post", "definition": "長い旅程の途中で立ち寄る中継地点を意味するイディオム。麻薬や物資の輸送における「中継拠点」を指す際に頻繁に用いられる。"}, {"word": "illicit", "definition": "法律や道徳的規範によって禁じられた行為や物を指す形容詞。「不法な、非合法の」という意味でTOEICや法律文書に頻出する語。"}, {"word": "tampered", "definition": "「tamper with～」で「～を不正に操作する・改ざんする」という意味のイディオム。調査や証拠を不正に手を加える行為を指す。"}, {"word": "confiscated", "definition": "当局が資産や物品を公式に没収・押収することを意味する動詞の過去形。法執行や税関の文脈でよく用いられる。"}]}, {"title_ja": "エジプト西部砂漠でビザンチン時代の都市遺跡を発掘", "title_en": "Archaeologists Uncover Well-Preserved Byzantine City in Egypt's Western Desert", "summary_ja": "エジプトの考古学者たちが、西部砂漠のダクラ・オアシスでよく保存されたビザンチン時代の都市を発見した。4世紀の住居や宗教施設、バシリカ式教会、見張り塔のほか、金貨や文字が刻まれた陶器片など多数の遺物が出土した。また、アレクサンドリア近郊のマリーナ・エル・アラメインでは18基の古代墓が発見され、花崗岩の石棺や被葬者の口に金片を置く葬送習慣の証拠も見つかった。", "summary_en": "Archaeologists in Egypt have discovered a well-preserved Byzantine-era city in the Dakhla oasis of the western desert, featuring fourth-century residential and religious structures, a basilica, watchtowers, and thousands of artifacts including gold coins and pottery fragments used as writing material. Separately, 18 ancient tombs were uncovered at Marina el-Alamein near Alexandria, including a 2.5-metre granite sarcophagus and evidence of a funerary practice involving gold pieces placed in the mouths of the deceased. Both discoveries offer significant insights into daily life, urban development, and religious practices during Egypt's Byzantine and Greco-Roman periods.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/04/archaeologists-uncover-ancient-byzantine-city-in-egypts-western-desert", "state_media": false, "category": "経済", "full_text": "Archaeologists in Egypt have uncovered a well-preserved Byzantine-era city in the western desert.\nThe fourth-century quarters had residential and religious structures, including a basilica-style church in the Dakhla oasis. Archaeologists also found coins, pottery fragments and tools.\nSeparately, 18 ancient tombs were discovered at Marina el-Alamein, near Alexandria, which includes rock-cut and limestone tombs, pottery and a granite sarcophagus.\nThe tourism and antiquities ministry said the first discovery reveals details of daily life, urban development and economic activities when Egypt was part of the Byzantine empire.\nThe unearthed quarters included north-south thoroughfares intersected by east-west streets, forming open squares and public spaces, said Hisham el-Leithy, secretary general of the supreme council of antiquities.\nA basilica dating back to the mid-fourth century stands at the settlement’s head, overlooking its main streets, along with remains of two watchtowers to safeguard the outskirts, according to Mahmoud Massoud, who chairs the archaeological mission.\nThe oasis, located in Egypt’s western province of New Valley, is on Unesco’s tentative list, a step away from being added to the agency’s world heritage list.\nA heavily fortified structure with thick defensive walls, and many houses consisting of reception halls and vaulted roofs, were found in the area, Massoud added.\nAmong them were the house of Tisous, a church deacon, which dates to the second half of the fourth century. Archaeologists believe it served as a house church before the construction of the city’s basilica.\nArchaeologists also uncovered bread ovens, kitchens, grinding tools and bronze coins bearing portraits of Byzantine emperors, Latin inscriptions and Christian symbols.\nA group of gold coins unearthed dated to the reign of Roman emperor Constantius II, who ruled between 337 and 361, the ministry statement said.\nDiaa Zahran, head of the Islamic, Coptic and Jewish antiquities department, said they found a collection of about 200 pottery fragments which would have been used as writing material. The fragments, known as ostraca, have inscriptions detailing commercial transactions, correspondence and other details of daily life, according to Zahran.\nArchaeologists also found ancient tombs in the Marina el-Alamein archaeological site, which is about 62 miles (100km) west of the Mediterranean city of Alexandria.\nThe findings included 11 rock-cut tombs with an average depth of eight metres, and seven surface limestone-built tombs, the ministry said. It has brought the total tombs found at the site to 48.\nIn the site, archaeologists found pottery vessels, amphorae, lamps, plates, altars and limestone basins.\nThe mission chief, Eman Abdel-Khaliq, said they found a 2.5-metre-long granite sarcophagus, with skeleton remains that were being studied. Close to the sarcophagus, they found the remains of a plaster sphinx statue, she said.\nFour gold pieces were placed inside the mouths of some of the deceased, known as “the golden tongue”, which had been a practice associated with funerary beliefs of that era, Abdel-Khaliq said.\nMarina el-Alamein is an archaeological site close to the city of Alamein on Egypt’s northern coast, unearthed in 1986. Archaeologists believe the site was the ancient Greco-Roman port city of Leukaspis on the Mediterranean, which was built in the second century and thrived until the fourth century.", "translation_ja": "エジプトの考古学者たちが、西部砂漠でよく保存されたビザンチン時代の都市を発掘した。\n\n4世紀の区画には住居や宗教施設が含まれており、ダクラ・オアシスにはバシリカ式教会もあった。考古学者たちはコイン、陶器の破片、道具なども発見した。\n\n別の発掘では、アレクサンドリア近郊のマリーナ・エル・アラメインで18基の古代墓が発見され、岩を掘り込んだ墓や石灰岩製の墓、陶器、花崗岩の石棺が含まれていた。\n\n観光・遺物省は、最初の発見によってエジプトがビザンチン帝国の一部だった時代の日常生活、都市発展、経済活動の詳細が明らかになると述べた。\n\n最高遺物評議会事務局長のヒシャム・エル・レイシー氏によると、発掘された区画には南北に走る大通りと東西の街路が交差し、広場や公共空間を形成していたという。\n\n考古学調査団長のマフムード・マスード氏によれば、4世紀中頃に建てられたバシリカが集落の中心に位置し、メインストリートを見下ろすように建っており、周辺を守るための見張り塔2基の遺構も発見された。\n\nオアシスはエジプト西部のニューバレー県に位置し、ユネスコの暫定リストに登録されており、世界遺産リストに加えられる一歩手前の状態にある。\n\nマスード氏はさらに、厚い防御壁を持つ重装要塞や、応接間とアーチ型天井を備えた多くの家屋が発見されたと付け加えた。\n\nその中には、4世紀後半に建てられた教会助祭ティスーの家もあり、考古学者たちは、この家が都市のバシリカが建設される以前に家庭教会として使われていたと考えている。\n\nまた、パン焼き窯、台所、粉ひき道具、ビザンチン皇帝の肖像やラテン語の碑文、キリスト教のシンボルが刻まれた青銅のコインも発掘された。\n\n出土した金貨の一群は、西暦337年から361年にかけて統治したローマ皇帝コンスタンティウス2世の治世にさかのぼるものだと、省の声明は述べた。\n\nイスラム・コプト・ユダヤ遺物局長のディアー・ザフラン氏は、書き物の材料として使用されていたとみられる約200点の陶器の破片が見つかったと述べた。オストラカと呼ばれるこの破片には、商取引、書簡、日常生活の詳細が記されているとザフラン氏は語った。\n\n考古学者たちはまた、地中海都市アレクサンドリアの西約100キロメートル（62マイル）に位置するマリーナ・エル・アラメイン遺跡でも古代墓を発見した。\n\n省によると、発見物には平均深さ8メートルの岩窟墓11基と、地上に建てられた石灰岩製の墓7基が含まれており、この遺跡での墓の総数は48基となった。\n\n遺跡では陶器の壺、アンフォラ、ランプ、皿、祭壇、石灰岩の水盤なども発見された。\n\n調査団長のイマン・アブデル・ハリク氏は、長さ2.5メートルの花崗岩の石棺が発見され、中の骨格遺骸が現在調査中であると述べた。石棺の近くには漆喰製のスフィンクス像の残骸も見つかったという。\n\n被葬者の中には口の中に金片4枚が置かれていた者もおり、「黄金の舌」として知られるこの慣習は、その時代の葬送信仰に関連した風習だったとアブデル・ハリク氏は述べた。\n\nマリーナ・エル・アラメインはエジプト北海岸のアラメイン市近郊にある遺跡で、1986年に発掘された。考古学者たちは、この遺跡が2世紀に建設され4世紀まで繁栄した古代ギリシャ・ローマ時代の地中海港湾都市レウカスピスであると考えている。", "vocab": [{"word": "basilica", "definition": "バシリカ。初期キリスト教や古代ローマ時代に建てられた長方形の大型建築物で、特に教会堂として使われた様式を指す。"}, {"word": "ostraca", "definition": "オストラカ（単数形：ostrakon）。古代において文字を書く材料として使用された陶器や石灰岩の破片を指す考古学用語。"}, {"word": "sarcophagus", "definition": "石棺。石材（特に石灰岩や花崗岩）で作られた棺を指し、古代エジプトやギリシャ・ローマ時代の埋葬に使われた。"}, {"word": "amphorae", "definition": "アンフォラの複数形。古代ギリシャ・ローマ時代に液体や穀物などを運搬・保存するために使われた、両側に取っ手のある細長い陶製の壺。"}, {"word": "tentative list", "definition": "ユネスコ世界遺産における「暫定リスト」のこと。世界遺産への正式登録候補として各国が申請・提出した物件の一覧を指す。"}, {"word": "funerary", "definition": "葬送の、埋葬に関する、という意味の形容詞。葬儀や埋葬の儀式・慣習・遺物などを修飾する際に使われる専門的な語。"}, {"word": "vaulted", "definition": "アーチ型の、丸天井の、という意味の形容詞。建築において湾曲した天井や屋根の構造を表す際に使われる技術的な語。"}]}, {"title_ja": "トランプ大統領はNATO同盟国に何を求めているのか？", "title_en": "What Does Trump Want from His NATO Allies?", "summary_ja": "トルコでNATO首脳会議が開催される中、ドナルド・トランプ米大統領は加盟国に対して防衛費の増額を強く求めている。アルジャジーラのオサマ・ビン・ジャバイド記者が、トランプ大統領の就任以降、NATOがどのように変化したかを解説する。米国とNATO同盟国との間では、防衛費負担をめぐる緊張が高まっている。", "summary_en": "A NATO summit is being held in Türkiye as US President Donald Trump continues to pressure member states over defence spending. Al Jazeera's Osama Bin Javaid examines how the alliance has shifted since Trump's return to office. The report highlights growing tensions between the US and its NATO partners over burden-sharing.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/7/what-does-trump-want-from-his-nato-allies?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "What does Trump want from his NATO allies?\nWhat does Trump want from his NATO allies?\nA NATO summit is being held in Turkiye as US President Donald Trump pressures member states over defence spending. Al Jazeera’s Osama Bin Javaid explains how NATO has changed since Trump was elected.\nPublished On 7 Jul 2026", "translation_ja": "トランプ大統領はNATO同盟国に何を求めているのか？\n\nトルコでNATO首脳会議が開催されており、ドナルド・トランプ米大統領が加盟国に対して防衛費をめぐる圧力を強めている。アルジャジーラのオサマ・ビン・ジャバイド記者が、トランプ大統領が選出されて以来、NATOがいかに変化したかを説明する。\n\n2026年7月7日公開", "vocab": [{"word": "allies", "definition": "同盟国・同盟者のこと。軍事や外交の文脈で、共通の利益や条約によって結ばれた国々を指す。"}, {"word": "summit", "definition": "国家元首や政府首脳が集まる最高レベルの会議・首脳会議のこと。外交や国際政治の場でよく使われる語。"}, {"word": "defence spending", "definition": "国防費・軍事費のこと。NATO加盟国はGDP比2%以上の防衛費支出を目標とするよう求められており、政治的議論の中心となっている。"}, {"word": "pressures", "definition": "動詞として「圧力をかける・強要する」の意味。政治的文脈では、ある国や組織が他者に特定の行動をとるよう強く迫ることを表す。"}, {"word": "member states", "definition": "国際機関や条約組織に加盟している国々を指す専門用語。NATOやEUなどの文脈で頻繁に用いられる。"}, {"word": "alliance", "definition": "同盟・連合のこと。共通の目標や相互防衛のために複数の国や勢力が結びついた関係を意味し、国際政治・安全保障の分野で重要な概念。"}]}, {"title_ja": "エジプト代表監督、試合前記者会見でパレスチナへの熱烈な支持を訴える", "title_en": "Egypt Coach Makes Impassioned Plea for Palestine at Pre-Match Press Conference", "summary_ja": "エジプトサッカー代表のホサム・ハッサン監督は、アルゼンチンとの決勝トーナメント1回戦を前にした記者会見で、パレスチナの人々の苦しみについて訴えた。同監督はこの状況を「世界全体の恥だ」と表現し、アスリートやメディアがより積極的に支援に取り組むべきだと呼びかけた。この発言はスポーツの枠を超えて大きな注目を集めている。", "summary_en": "Egypt football coach Hossam Hassan used a pre-match press conference ahead of their Round of 16 clash with Argentina to speak out about the suffering of the Palestinian people. He described the situation as 'a shame on the entire world' and urged both athletes and the media to take a more active role in raising awareness. The remarks came on July 7, 2026, drawing significant attention beyond the sporting context.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/7/egypt-coach-makes-impassioned-plea-for-palestine-in-pre-match-conference?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Egypt coach makes impassioned plea for Palestine in pre-match conference\nEgypt coach makes impassioned plea for Palestine in pre-match conference\nEgypt football coach Hossam Hassan told a pre-match press conference that the suffering of the Palestinian people was a ‘shame on the entire world’. Speaking ahead of Egypt’s last 16 clash with Argentina, he called on athletes and the media to do more to help.\nPublished On 7 Jul 2026", "translation_ja": "エジプトのサッカー代表監督ホサム・ハッサンは、試合前の記者会見においてパレスチナの人々の苦しみは「世界全体の恥だ」と述べた。アルゼンチンとの決勝トーナメント1回戦を前にしたこの会見で、同監督はアスリートとメディアが支援のためにより多くのことをするよう訴えた。発表日：2026年7月7日", "vocab": [{"word": "impassioned", "definition": "強い感情や情熱を込めた様子を表す形容詞。「impassioned plea（熱烈な訴え）」のように、深い感情に駆られた発言や行動を描写する際に使われる。"}, {"word": "plea", "definition": "他者に対して何かを強く求める訴えや懇願のこと。法律文脈では「申し立て」を意味することもあるが、一般的には感情的・道徳的な訴えかけを指す。"}, {"word": "clash", "definition": "スポーツ文脈では激しい対戦や試合を意味する名詞・動詞。一般的には意見や利害の衝突を指すこともあり、ニュース記事で頻繁に使われる表現。"}, {"word": "impassioned plea", "definition": "「熱烈な訴え」を意味する慣用的な表現。公的な場で感情的かつ強い意志をもって何かを要求したり支持を求めたりする行為を指す複合表現。"}, {"word": "suffering", "definition": "苦痛や苦難を経験している状態を指す名詞。人道的・政治的文脈で使われることが多く、単なる「痛み」より広範な継続的苦境を含意する。"}]}, {"title_ja": "「保護する責任」原則の復活は可能だ", "title_en": "The Responsibility to Protect Doctrine Can Be Resurrected", "summary_ja": "2005年に人道的危機への国際的対応を義務付けるために確立された「保護する責任（R2P）」原則は、強国の政治的操作と実施意欲の欠如により、ほぼ機能不全に陥っている。2011年のリビア介入がR2Pを悪用した政権交代作戦に変質したことが、その信頼性を根本から損なった。国連職員である著者は、設立委員会の再招集、国連全機関による承認、そして強力な執行メカニズムの創設を通じてR2Pを復活させるべきだと主張する。", "summary_en": "The UN's Responsibility to Protect (R2P) doctrine, established in 2005 to prevent genocide and crimes against humanity, has largely failed due to political manipulation and lack of will among powerful states. The 2011 Libya intervention, which turned into a regime-change operation, effectively discredited the doctrine. The author, a UN official, argues that R2P must be revived through reconvening its founding committee, securing broad UN endorsement, and establishing stronger enforcement mechanisms.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/opinions/2026/7/7/the-responsibility-to-protect-doctrine-can-be-resurrected?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "The Responsibility to Protect doctrine can be resurrected\nThe legal norm has been manipulated and forgotten. But today it is needed more than ever.\nThe United Nations General Assembly met yesterday at its headquarters in New York to discuss the responsibility to protect (R2P) doctrine and the continuing perpetration of atrocities across the world. These gatherings have been taking place annually since 2018, but they have done little to advance the proper enforcement of R2P. Yesterday’s meeting was no different.\nThe UN may have failed to effectively apply R2P, but that does not mean it is a bad principle. It also does not mean we should give up on it.\nThe idea of establishing a norm in international law to prevent crimes against humanity and genocide first emerged in the aftermath of the failure to stop the genocides in Rwanda and Bosnia.\nIn 2001, the International Committee on Intervention and State Sovereignty developed the framework for R2P. It was crafted first as an obligation of states to protect their own people, and then, when that fails, as an obligation of other states to take action.\nIn 2005, at the UN World Summit, the world’s heads of state met to discuss the new framework. The final document adopted at the summit – which, in effect, embedded R2P into international law – read:\n“The international community, through the United Nations, also has the responsibility to use appropriate diplomatic, humanitarian and other peaceful means, in accordance with Chapters VI and VIII of the Charter, to help to protect populations from genocide, war crimes, ethnic cleansing and crimes against humanity.”\nSimilar efforts resulted, in July 2002, in the establishment of the International Criminal Court tasked with prosecuting individuals accused of committing war crimes, crimes against humanity and genocide.\nAll this represented a high point of the desire to ensure a rules-based order to protect people in need and to punish all those who flout that obligation.\nIt was an ambitious and imaginative effort to make the world a safer place.\nBut it did not work. There are various reasons for that failure.\nPerhaps the main one was the absence of the slightest interest from several powerful member states in implementing R2P. Lack of action from governments has resulted in brutal indifference to suffering, famine, crimes against humanity and genocide. Ironically, several of them remain members of the so-called Group of Friends of R2P.\nThere was also the politicisation of R2P in pursuit of geopolitical agendas. In 2011, when protests erupted in Libya, the government of Muammar Gaddafi responded violently. Western governments led by the US invoked R2P when seeking permission from the UN Security Council to intervene.\nWhat was supposed to be a humanitarian intervention to protect the civilian population turned into a regime-change operation. The manipulation of R2P was its death sentence. Russia, a permanent UNSC member, but also other powers, saw it as a conduit for Western interventionism rather than a humanitarian doctrine.\nWhat followed was global inaction on horrific atrocities in Syria, Palestine, Sudan, DRC, Ethiopia, Myanmar, and elsewhere.\nAs a UN official involved in humanitarian efforts and conflict mediation, I have had a front seat to the suffering and devastation that the failure to protect has led to. I have spent the last six years in the worst places of the world – places of unimaginable suffering.\nI have raged against those leaders who feel comfortable with their “expressions of concern” in the absence of any decisive action. I have mourned the dead and the suffering. And I have seen no justice for those who made these tragedies a new norm.\nAnd yet, in every place, I was reminded of the power of human kindness and compassion. Everywhere I went, I met people who had given their all to help the displaced fleeing from war, who had opened their schools and clinics to host the homeless and injured and spent their own money to feed and clothe them.\nThis world of kindness and respect remains invisible to global politics. The lack of attention, however, has not diminished it. Indeed, it has grown even as leaders continue to betray the most basic humanitarian principles and hypocritically hide behind weak statements of condemnation.\nThe human values and ideals behind R2P still exist, and it is up to us to take it back to the high and inspiring grounds it once occupied. There are steps the UN can take that go far beyond the annual meetings in order to put this legal norm into action.\nFirst, the international committee which put together the R2P framework needs to be reconvened and tasked with revising it in order to ensure proper implementation, outlining conditions and scope of action.\nSecond, their report must be recognised and endorsed by the UN, with the General Assembly, the Security Council, and the Human Rights Council putting their weight behind it.\nThird, a mechanism needs to be set up for reporting back to the", "translation_ja": "「保護する責任」原則の復活は可能だ\n\nこの法的規範は操作され、忘れ去られてきた。しかし今日、それはかつてないほど必要とされている。\n\n国連総会は昨日、ニューヨークの本部において「保護する責任（R2P）」原則と、世界各地で続く残虐行為について協議するため会合を開いた。こうした会合は2018年以来毎年開催されているが、R2Pの適切な執行を前進させるうえでほとんど成果を上げていない。昨日の会合も例外ではなかった。\n\n国連がR2Pを効果的に適用することに失敗してきたとしても、それはR2Pが悪い原則であることを意味しない。また、それを諦めるべきだということを意味するわけでもない。\n\n人道に対する罪や集団虐殺を防ぐための国際法上の規範を確立するという考えは、ルワンダとボスニアにおける大虐殺を阻止できなかったという失敗を受けて初めて浮上した。\n\n2001年、介入と国家主権に関する国際委員会がR2Pの枠組みを策定した。それはまず、国家が自国民を保護する義務として構築され、次に、それが果たされない場合には他の国家が行動を取る義務として位置づけられた。\n\n2005年の国連世界首脳会議では、世界各国の首脳がこの新たな枠組みについて協議するために集まった。首脳会議で採択された最終文書——事実上R2Pを国際法に組み込んだもの——には次のように記されている。\n\n「国際社会は、国連を通じて、国連憲章第6章および第8章に従い、適切な外交的、人道的、その他の平和的手段を用いて、各国が集団殺害、戦争犯罪、民族浄化、人道に対する罪から国民を保護するのを支援する責任を有する。」\n\n同様の取り組みにより、2002年7月には国際刑事裁判所が設立され、戦争犯罪、人道に対する罪、集団虐殺を犯したとして訴追された個人の裁判を担うこととなった。\n\nこれらすべては、困窮する人々を保護し、その義務に違反するすべての者を罰するためのルールに基づく秩序を確保しようとする意志の頂点を象徴するものであった。\n\nそれは世界をより安全な場所にするための、野心的かつ独創的な取り組みであった。\n\nしかしそれは機能しなかった。その失敗にはさまざまな理由がある。\n\nおそらく最大の原因は、いくつかの有力加盟国にR2Pを実施しようとする意志が皆無であったことだ。各国政府の不作為は、苦難、飢饉、人道に対する罪、集団虐殺に対する残酷なまでの無関心をもたらした。皮肉なことに、それらの国の多くは「R2Pの友グループ」と称される会合の加盟国であり続けている。\n\nまた、地政学的な目的のためにR2Pが政治化されるという問題もあった。2011年、リビアで抗議運動が勃発すると、ムアンマル・カダフィ政権は暴力で対応した。西側諸国はアメリカの主導のもと、国連安全保障理事会に介入の許可を求める際にR2Pを持ち出した。\n\n文民を保護するための人道的介入であるはずのものが、政権交代作戦へと変質した。R2Pの悪用は、その死刑宣告となった。安保理常任理事国であるロシアをはじめ、他の諸国も、それを人道的な原則ではなく西側の介入主義の手段と見なすようになった。\n\nその後、シリア、パレスチナ、スーダン、コンゴ民主共和国、エチオピア、ミャンマーなど世界各地で起きた凄惨な残虐行為に対して、国際社会は無為無策を続けた。\n\n人道支援活動と紛争調停に携わる国連職員として、私は保護の失敗がもたらした苦難と惨状を最前線で目撃してきた。私はこの6年間、世界で最も過酷な場所——想像を絶する苦しみの場所——で過ごしてきた。\n\n私は、いかなる決定的な行動も伴わない「懸念の表明」に安住する指導者たちに怒りを覚えてきた。死者と苦しむ人々のために悲しんできた。そして、これらの悲劇を新たな常態としてしまった者たちへの正義が実現されるのを、一度も目にしたことがない。\n\nそれでも、どの場所においても、私は人間の優しさと思いやりの力を再確認させられた。どこへ行っても、戦争から逃れる避難民を助けるためにすべてを捧げた人々、家を失い傷ついた人々を受け入れるために学校や診療所を開放した人々、自らの資金を使って食料や衣類を提供した人々に出会った。\n\nこの優しさと尊重に満ちた世界は、国際政治には見えていない。しかし、注目されないからといって、それが失われたわけではない。指導者たちが最も基本的な人道的原則を裏切り、偽善的に非難の声明の陰に隠れ続ける中でも、それはむしろ大きくなってきた。\n\nR2Pの背後にある人間的な価値観と理想は今も息づいており、それをかつて占めていた高く崇高な場所へと取り戻すのは私たちの使命である。国連が年次総会をはるかに超えた形でこの法的規範を実践するために取り得る手順がある。\n\n第一に、R2Pの枠組みを策定した国際委員会を再招集し、適切な実施を確保するためにその内容を改定し、行動の条件と範囲を明確化する作業を委ねなければならない。\n\n第二に、その報告書は国連によって承認・支持されなければならず、総会、安全保障理事会、人権理事会がその推進に全力を尽くすべきである。\n\n第三に、", "vocab": [{"word": "atrocities", "definition": "残虐行為、凄惨な暴力行為を指す。特に戦時や弾圧下で組織的に行われる大規模な人権侵害に用いられる強い表現。"}, {"word": "perpetration", "definition": "（犯罪や悪行の）実行・遂行を意味する名詞。法律・人権分野で「perpetration of atrocities（残虐行為の遂行）」のように使われる。"}, {"word": "geopolitical", "definition": "地政学的なという意味の形容詞で、地理的条件と政治・国際関係の絡み合いを指す。国際政治や外交の文脈で頻繁に使われる専門用語。"}, {"word": "conduit", "definition": "本来は「導管・水路」を意味するが、比喩的に「手段・経路」として用いられる。ここでは西側介入主義の「手段・口実」という含意で使われている。"}, {"word": "interventionism", "definition": "（他国の内政への）介入主義を指す政治用語。特に軍事的・政治的手段で他国の情勢に干渉しようとする姿勢や政策を批判的に表す場合に使われる。"}, {"word": "reconvened", "definition": "一度解散または休会した委員会や会議などを再び招集・再開させることを意味する動詞の過去分詞形。公式な場での再集合を指す文語的表現。"}, {"word": "hypocritically", "definition": "偽善的に、という意味の副詞。表向きの言葉や行動が実際の意図や行動と乖離している様子を強く批判する際に使われる。"}]}, {"title_ja": "アムネスティ報告書、スーダン・ダルフールでRSFによる民族浄化と人道に対する罪を記録", "title_en": "Amnesty Report Documents RSF Ethnic Cleansing and Crimes Against Humanity in Sudan's Darfur", "summary_ja": "アムネスティ・インターナショナルは2025年7月に発表した報告書で、スーダンの準軍事組織「即応支援部隊（RSF）」が北ダルフール州エル・ファシェル包囲戦において人道に対する罪と民族浄化を行ったと結論付けた。247人へのインタビューと衛星画像分析に基づく調査では、殺害、強姦、拷問、奴隷化、非アラブ系民族への組織的攻撃が記録されている。アムネスティは責任者とされるRSF指揮官3人を名指しし、国際社会に対して武器禁輸措置の実施と責任追及を求めた。", "summary_en": "Amnesty International's July 2025 report concludes that Sudan's Rapid Support Forces committed crimes against humanity and ethnic cleansing during their siege of El Fasher in North Darfur. The investigation, based on 247 interviews and satellite imagery analysis, documents murder, rape, torture, enslavement, and the deliberate targeting of non-Arab ethnic communities including the Zaghawa. Amnesty named three RSF commanders allegedly responsible and called on the international community to impose arms embargoes and hold perpetrators accountable.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/amnesty-reports-findings-of-ethnic-cleansing-in-sudan/article71193075.ece", "state_media": false, "category": "経済", "full_text": "In a report ‘City Under Siege, Children Under Fire: Rapid Support Forces’ Crimes Against Humanity in North Darfur’ released on July 1, Amnesty International concluded that Sudanese paramilitary Rapid Support Forces (RSF) committed “crimes against humanity and carried out ethnic cleansing” during its campaign to seize El Fasher in Sudan’s North Darfur state.\nSudan has been mired in a brutal war since April 2023 between the Sudanese Armed Forces (SAF) and the RSF, which has killed tens of thousands of people and displaced millions, according to the United Nations.\nWhat is the report?\nThe report documents widespread abuses against civilians in and around El Fasher between early 2024 and October 2025, as the RSF fought the SAF and allied joint forces in a conflict that devastated North Darfur.\nAccording to Amnesty, the RSF committed murder, forcible transfer, imprisonment, torture, rape, sexual slavery, other forms of sexual violence, enslavement, extermination and persecution.\nThe investigation, conducted over eight months between August 2025 and April 2026, is based on interviews with 247 people, including 208 survivors (169 adults and 39 children) who experienced or witnessed conflict-related abuses. Amnesty also verified 89 videos and analysed satellite imagery from North Darfur.\nWhat does it say?\nAmnesty concluded that the RSF committed crimes against humanity and carried out ethnic cleansing during its campaign to seize El Fasher.\nThe report states that the RSF had taken control of four of Darfur’s five State capitals by November 2023, leaving El Fasher as the last major stronghold of the SAF and allied joint forces. Beginning in 2024, the RSF systematically attacked villages, towns and displacement camps surrounding the city, targeting civilians, looting property and burning civilian infrastructure. Many of the affected communities were predominantly inhabited by the Zaghawa and other non-Arab ethnic groups.\nAmnesty further finds that the pattern of destroying villages in Abu Zerega area, populated primarily by Zaghawa communities along with smaller numbers of other non-Arab ethnic groups, which took place between December 2024 and March 2025, is consistent with ethnic cleansing. This conclusion is reinforced by the RSF’s continued control of these areas, preventing displaced populations from returning.\nThe report also says the RSF repeatedly used the derogatory slur ‘falangay’ (or ‘falangayat’ in the plural), a term referring to slavery or servitude, while attacking civilians from non-Arab ethnic groups. Amnesty concluded that the RSF committed the crime against humanity of persecution on ethnic grounds.\nThe RSF besieged El Fasher from May 2024 to October 2025, restricting the entry of food and humanitarian aid while shelling the city almost daily. As famine spread, many residents reportedly survived by eating ambaz, a by-product of peanut oil production normally used as animal feed. Pregnant women were also reported to have given birth while fleeing attacks.\nMany civilians attempted to flee towards Tawila, but the RSF made escape nearly impossible, according to the report. By October 2025, El Fasher was encircled by a 57-km network of earthen berms that restricted civilian movement. Witnesses told investigators that RSF fighters intercepted civilians attempting to flee, with many being executed or tortured.\nAmnesty interviewed 18 people who were present at the Saudi Maternity Hospital, El Fasher’s last functioning hospital, including staff, patients and relatives, who said they witnessed RSF fighters kill scores of people there.\nThe report also documented widespread rape and other forms of conflict-related sexual violence. It said the RSF unlawfully detained civilians, held many hostages for ransom in inhumane conditions, and recruited and used boys in violation of international law.\nAmnesty also identified three RSF commanders allegedly responsible for serious violations of international law. It named Maj. Gen. Gedo Hamdan Ahmed Mohamed, known as ‘Abu Shouk’, Lt. Col. Abbas Khater Bakhit, and commander Al-Fateh Abdullah Idris, also known as ‘Abu Lulu’, citing witness testimony and verified videos that allegedly showed torture and summary executions.\nWhat are the recommendations?\nAgnès Callamard, Amnesty International’s Secretary General, urged the international community to move beyond statements of concern and take concrete steps to protect civilians and end impunity.\nShe called on Sudan’s international partners to ensure that humanitarian aid, including child-focused services, reaches refugees and internally displaced people. She also urged action against the commanders identified in the report.\nThe report further called on all countries to immediately stop supplying arms and ammunition to parties to the Sudan conflict. It specifically urged States to stop providing arms to the United Arab Emirates (UAE), which Amnesty described as the RSF’s principal foreign backer, until it complies with the UN ar", "translation_ja": "2025年7月1日に発表された報告書「包囲下の都市、砲火にさらされる子どもたち：北ダルフールにおける即応支援部隊の人道に対する罪」において、アムネスティ・インターナショナルは、スーダンの準軍事組織である即応支援部隊（RSF）が、スーダン北ダルフール州のエル・ファシェル制圧作戦において「人道に対する罪を犯し、民族浄化を実施した」と結論付けた。\n\nスーダンは2023年4月以降、スーダン国軍（SAF）とRSFによる残忍な戦争に巻き込まれており、国連によれば、この紛争により数万人が死亡し、数百万人が避難を余儀なくされている。\n\n■報告書の概要\n\nこの報告書は、2024年初頭から2025年10月にかけて、RSFがSAFおよびその同盟合同部隊と北ダルフールを壊滅させた戦闘を繰り広げる中で、エル・ファシェルおよびその周辺で市民に対して行われた広範な虐待を記録したものである。\n\nアムネスティによれば、RSFは殺害、強制移送、拘禁、拷問、強姦、性的奴隷化、その他の形態の性的暴力、奴隷化、絶滅、迫害を行ったとされている。\n\nこの調査は2025年8月から2026年4月までの8か月間にわたって実施され、紛争に関連する虐待を経験または目撃した208人の生存者（成人169人、子ども39人）を含む247人へのインタビューに基づいている。アムネスティはまた、89本の動画を検証し、北ダルフールの衛星画像を分析した。\n\n■報告書の内容\n\nアムネスティは、RSFがエル・ファシェル制圧作戦において人道に対する罪を犯し、民族浄化を実行したと結論付けた。\n\n報告書によれば、RSFは2023年11月までにダルフール5州の州都のうち4つを掌握しており、エル・ファシェルはSAFおよび同盟合同部隊の最後の主要拠点となっていた。2024年以降、RSFは市を取り囲む村落、町、避難民キャンプを組織的に攻撃し、民間人を標的にし、財産を略奪し、民間インフラを焼き払った。被害を受けた地域の多くは、ザガワ族やその他の非アラブ系民族が主に居住していた。\n\nアムネスティはさらに、2024年12月から2025年3月にかけてアブ・ゼレガ地区で主にザガワ系コミュニティと少数の他の非アラブ系民族が居住する村落が破壊されたパターンは、民族浄化と一致すると認定した。この結論は、RSFがこれらの地域を支配し続けることで避難民の帰還を妨げているという事実によってさらに裏付けられている。\n\nまた、報告書はRSFが非アラブ系民族の民間人を攻撃する際に、奴隷制や従属を意味する侮辱的な言葉「ファランガイ」（複数形は「ファランガヤット」）を繰り返し使用したと述べている。アムネスティは、RSFが民族的理由に基づく迫害という人道に対する罪を犯したと結論付けた。\n\nRSFは2024年5月から2025年10月にかけてエル・ファシェルを包囲し、食料と人道支援物資の搬入を制限しながら、ほぼ毎日市内を砲撃した。飢饉が広がる中、多くの住民は通常は家畜の飼料として使用されるピーナッツオイルの副産物「アンバズ」を食べて生き延びたとの報告がある。また、妊婦が攻撃から逃げる最中に出産したとも伝えられている。\n\n多くの市民がタウィラへの脱出を試みたが、報告書によればRSFが逃亡をほぼ不可能にした。2025年10月までに、エル・ファシェルは市民の移動を制限する全長57キロメートルの土塁ネットワークで包囲された。調査員への証言によると、RSF戦闘員は脱出を試みる市民を拘束し、多くが処刑または拷問されたという。\n\nアムネスティは、エル・ファシェル最後の機能する病院であるサウジ産科病院にいた医療スタッフ、患者、その家族を含む18人にインタビューし、彼らはそこでRSF戦闘員が多数の人々を殺害するのを目撃したと述べた。\n\n報告書はまた、広範な強姦やその他の紛争関連性的暴力を記録した。RSFは民間人を不法に拘禁し、多くを非人道的な環境下で人質として身代金目的に拘束し、国際法に違反して少年を徴兵・使用したとも述べている。\n\nアムネスティはまた、国際法の重大な違反に責任があるとされるRSF指揮官3人を特定した。証人の証言および拷問と即決処刑を映したとされる検証済み動画を引用し、「アブ・ショウク」として知られる少将ゲド・ハムダン・アフマド・モハメド、中佐アッバース・ハーテル・バヒット、「アブ・ルル」としても知られる司令官アル・ファテハ・アブドッラー・イドリスの名を挙げた。\n\n■勧告の内容\n\nアムネスティ・インターナショナル事務総長のアニェス・カラマールは、国際社会に対し、懸念の表明にとどまらず、民間人を保護し不処罰に終止符を打つための具体的な措置を取るよう訴えた。\n\n彼女はスーダンの国際的パートナーに対し、子どもに特化したサービスを含む人道支援が難民および国内避難民に届くよう確保することを求めた。また、報告書で特定された指揮官らへの措置を講じるよう求めた。\n\n報告書はさらに、すべての国に対し、スーダン紛争の当事者への武器・弾薬の供給を直ちに停止するよう要求した。特に、アムネスティがRSFの主要な外国支援国と表現したアラブ首長国連邦（UAE）が国連の武器禁輸措置を遵守するまで、同国への武器供与を停止するよう各国に強く求めた。", "vocab": [{"word": "ethnic cleansing", "definition": "民族浄化。特定の民族集団を特定の地域から強制的に排除・抹消しようとする行為を指す。国際法上の重大な犯罪とされる。"}, {"word": "paramilitary", "definition": "準軍事的な、または準軍事組織を意味する形容詞・名詞。正規軍ではないが軍に類似した組織・活動を指し、しばしば国家から半独立的に行動する武装集団に使われる。"}, {"word": "enslavement", "definition": "奴隷化。人を奴隷の状態に置くこと、または奴隷として扱う行為を指す。人道に対する罪の一類型として国際刑事法で用いられる法律用語。"}, {"word": "impunity", "definition": "不処罰、免責。罪や違反行為を犯しても罰せられない状態を指す。国際人権・人道法の文脈で「責任者が裁かれないまま見逃されること」を批判する際によく使われる。"}, {"word": "berm", "definition": "土塁、堤防状の盛り土。軍事・土木用語で、防衛や境界設定のために築かれた細長い土の構造物を指す。"}, {"word": "forcible transfer", "definition": "強制移送。民間人を合法的な根拠なく、その居住地から強制的に移動させる行為を指す。国際人道法および国際刑事法において人道に対する罪の一形態として定義されている。"}, {"word": "derogatory", "definition": "侮辱的な、軽蔑的な。人や集団を貶めたり傷つけたりする意図を持つ言葉や表現を形容する際に使われる上級語彙。"}]}, {"title_ja": "モディ首相、インドネシア訪問でインド・インドネシア関係の「黄金の新章」を称える", "title_en": "Modi Hails New 'Golden Chapter' in India-Indonesia Relations After Jakarta Summit", "summary_ja": "2026年7月7日、インドのモディ首相とインドネシアのプラボウォ・スビアント大統領がジャカルタで会談し、防衛・重要鉱物・海洋安全保障など幅広い分野で約12件の二国間協定に署名した。主な成果としてブラモスおよびアストラミサイルのインドネシアへの供給が挙げられる。モディ首相はインドネシア最高勲章「ビンタン・アディプルナ」も授与された。", "summary_en": "Prime Minister Narendra Modi and Indonesian President Prabowo Subianto held talks in Jakarta on July 7, 2026, resulting in nearly a dozen bilateral agreements covering defence, critical minerals, and maritime security. Key outcomes included the supply of BrahMos and Astra missiles to Indonesia. Modi was also awarded Indonesia's highest honour, the Bintang Adipurna medal.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/national/pm-modi-in-indonesia-three-nation-diplomatic-visit-live-updates-july-7-2026/article71192288.ece", "state_media": false, "category": "政治", "full_text": "Supplying BrahMos and Astra missiles to Indonesia, boosting maritime security, and strengthening critical mineral supply chains emerged as the key outcomes of Tuesday’s (July 7, 2026) talks between Prime Minister Narendra Modi and President Prabowo Subianto.\nThe two sides inked nearly a dozen agreements to significantly shore up two-way cooperation in a range of areas including critical minerals, technology, food security, medicines and maritime security.\nAlso Read | Watch: Why PM Modi’s Indonesia visit matters for India\nEarlier in the day, Mr. Modi was conferred with Indonesia’s highest honour ‘Bintang Adipurna of the Republic of Indonesia’ medal for his role in strengthening the ties between both the countries.\nPrime Minister Narendra Modi was accorded a grand ceremonial welcome upon his arrival in Jakarta, Indonesia, on Tuesday (July 7, 2026), marking the start of his official state visit to deepen bilateral ties and strengthen strategic cooperation between the two nations. He is on a three-nation diplomatic visit.\nFollow the latest updates here", "translation_ja": "ブラモスおよびアストラミサイルのインドネシアへの供給、海洋安全保障の強化、重要鉱物サプライチェーンの拡充が、7月7日（火）に行われたナレンドラ・モディ首相とプラボウォ・スビアント大統領の会談における主要な成果として浮かび上がった。\n\n両国は、重要鉱物、技術、食料安全保障、医薬品、海洋安全保障など幅広い分野における二国間協力を大幅に強化するため、約12件の協定に署名した。\n\nまた、モディ首相は同日午前、両国の関係強化への貢献が評価され、インドネシア最高勲章である「ビンタン・アディプルナ（インドネシア共和国星章）」を授与された。\n\nモディ首相は7月7日（火）、インドネシアのジャカルタに到着し、盛大な公式歓迎式典を受けた。この公式国賓訪問は、両国の二国間関係の深化と戦略的協力の強化を目的としており、首相は現在、3カ国を歴訪する外交ツアーの途上にある。\n\n最新情報はこちらでご確認ください。", "vocab": [{"word": "bilateral", "definition": "二国間の、という意味の形容詞。二つの国が互いに関与する関係や合意を指す際に外交・貿易文脈で頻繁に使われる。"}, {"word": "shore up", "definition": "「強化する・下支えする」という意味のイディオム。弱くなりそうなものを支えて補強するニュアンスがあり、政策・経済・外交の文脈で用いられる。"}, {"word": "conferred", "definition": "conferの過去形で、「（称号・勲章などを）授与する」という意味。公式な場で名誉や資格を与える際に使われるフォーマルな表現。"}, {"word": "ceremonial", "definition": "「儀礼的な・式典の」という意味の形容詞。公式行事や国家的な式典に関連する場面で使われる。"}, {"word": "supply chain", "definition": "「サプライチェーン」、すなわち原材料の調達から最終製品の消費者への届けまでの一連の流通・生産プロセスを指す専門用語。"}, {"word": "diplomatic", "definition": "「外交的な」という意味の形容詞。国家間の公式な関係や交渉に関わる事柄を表す際に使われる。"}]}, {"title_ja": "アフガニスタンの元速球投手シャプール・ザドラン、38歳で死去", "title_en": "Former Afghanistan pace bowler Shapoor Zadran passes away aged 38", "summary_ja": "アフガニスタンの元ファストボウラー、シャプール・ザドランが2026年7月7日、39歳の誕生日前日にニューデリーの病院で稀な免疫系疾患の治療中に死去した。彼はODI44試合、T20I36試合を含む80の国際試合でアフガニスタンを代表した。2015年のクリケットワールドカップでスコットランドに勝利した際に決勝の一打を放ち、アフガニスタンクリケット史に名を残した。", "summary_en": "Former Afghanistan fast bowler Shapoor Zadran died on July 7, 2026, one day before his 39th birthday, after receiving treatment for a rare immune system disorder in New Delhi. He represented Afghanistan in 80 internationals across formats, including 44 ODIs and 36 T20Is. Zadran is remembered for hitting the winning boundary in Afghanistan's first-ever Cricket World Cup victory in 2015 against Scotland.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/sport/cricket/former-afghanistan-pace-bowler-shapoor-zadran-passes-away/article71193090.ece", "state_media": false, "category": "社会", "full_text": "Former Afghanistan fast bowler Shapoor Zadran died on Tuesday (July 7, 2026), a day short of his 39th birthday, after reportedly undergoing treatment for a rare severe immune system disorder at a hospital in New Delhi.\n\"With profound grief and deep sorrow, the Afghanistan Cricket Board mourns the passing of former Afghanistan fast bowler Shapoor Zadran,\" the ACB posted on X.\n\"Shapoor Zadran was one of the foundation-laying figures of Afghanistan cricket, whose dedication, passion, and unwavering commitment played a vital role in the rise and development of the game in our country.\"\nShapoor made his one-day international (ODI) debut in 2009 and represented Afghanistan in 80 internationals across formats, including 44 ODIs and 36 Twenty20 internationals.\nThe left-arm pace bowler played a key role in one of Afghanistan's landmark cricketing moments, hitting the winning boundary in the country's first World Cup victory in 2015 against Scotland.\nPublished - July 07, 2026 04:53 pm IST", "translation_ja": "アフガニスタンの元ファストボウラー、シャプール・ザドランが火曜日（2026年7月7日）、39歳の誕生日の前日に死去した。ニューデリーの病院で稀な重篤な免疫系疾患の治療を受けていたと伝えられている。\n\n「深い悲しみと哀惜の念をもって、アフガニスタンクリケット委員会（ACB）は元アフガニスタン代表ファストボウラー、シャプール・ザドランの逝去を悼む」とACBはX（旧Twitter）に投稿した。\n\n「シャプール・ザドランはアフガニスタンクリケットの礎を築いた人物の一人であり、その献身、情熱、そして揺るぎない使命感は、わが国におけるクリケットの発展と向上に重要な役割を果たした。」\n\nシャプールは2009年に一日国際試合（ODI）デビューを果たし、ODI44試合、T20I（トゥエンティ20国際試合）36試合を含む80の国際試合でアフガニスタンを代表した。\n\nこの左腕速球投手は、アフガニスタンクリケットの歴史的な瞬間の一つに重要な役割を果たした。2015年のワールドカップにおいて、スコットランド戦で同国初のワールドカップ勝利を決める最後の一打を放ったのである。\n\n掲載：2026年7月7日午後4時53分（IST）", "vocab": [{"word": "unwavering", "definition": "「揺るぎない、確固たる」という意味の形容詞。信念や決意が一切ぶれないさまを表し、人物の強い意志や献身を称える文脈でよく使われる。"}, {"word": "profound", "definition": "「深い、甚大な」という意味の形容詞。感情や影響の深さを強調する際に用いられ、単なる「deep」よりも格式のある表現として公式声明や文学でよく使われる。"}, {"word": "mourns", "definition": "「悼む、哀悼する」という意味の動詞。死者を深く悲しみ、その死を公式に悼む行為を指し、訃報や追悼文で頻繁に使われる表現。"}, {"word": "landmark", "definition": "「画期的な、歴史的に重要な」という意味の形容詞または名詞。ある分野や歴史において特に重要な出来事や転換点を指す際に用いられる。"}, {"word": "foundation-laying", "definition": "「基礎を築く」という意味の複合形容詞。ある組織や分野の発展の土台を作った人物や行為を表す際に使われる慣用的表現。"}, {"word": "immune system disorder", "definition": "「免疫系疾患」を指す医学用語。身体の免疫機能に異常が生じることで引き起こされる病態の総称であり、医療・ニュース報道で使われる専門的表現。"}]}, {"title_ja": "ボンベイ高等裁判所、高等教育のために強制結婚から逃れた女性を保護", "title_en": "Bombay High Court shields woman who fled forced marriage to pursue higher education", "summary_ja": "ボンベイ高等裁判所は、高等教育を受けるために強制結婚から逃れた女性を保護するため介入し、インド憲法第21条に基づく基本的権利を支持した。この件はインディアン・エクスプレス紙のジャーナリスト、オムカル・ゴーカレー氏によって報じられた。今回の判決は、強制的な家族の取り決めに対して個人の自律性を守る司法の役割を改めて示すものとなった。", "summary_en": "The Bombay High Court intervened to protect a woman who escaped a forced marriage in order to pursue higher education, upholding her fundamental rights under Article 21 of the Indian Constitution. The case was reported by Omkar Gokhale of The Indian Express, a journalist known for authoritative coverage of Bombay High Court proceedings. The ruling underscores the judiciary's role in safeguarding individual autonomy against coercive family arrangements.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/legal-news/bombay-hc-adult-woman-right-to-choose-marriage-residence-article-21-10775765/", "state_media": false, "category": "社会", "full_text": "Omkar Gokhale is a journalist reporting for The Indian Express from Mumbai. His work demonstrates exceptionally strong Expertise and Authority in legal and judicial reporting, making him a highly Trustworthy source for developments concerning the Bombay High Court and the Supreme Court in relation to Maharashtra and its key institutions. Expertise & Authority Affiliation: Reports for The Indian Express, a national newspaper known for its rigorous journalistic standards, lending significant Trustworthiness to his legal coverage. Core Authority & Specialization: Omkar Gokhale's work is almost exclusively dedicated to the complex field of legal affairs and jurisprudence, specializing in: Bombay High Court Coverage: He provides detailed, real-time reports on the orders, observations, and decisions of the Bombay High Court's principal and regional benches. Key subjects include: Fundamental Rights & Environment: Cases on air pollution, the right to life of residents affected by dumping sites, and judicial intervention on critical infrastructure (e.g., Ghodbunder Road potholes). Civil & Criminal Law: Reporting on significant bail orders (e.g., Elgaar Parishad case), compensation for rail-related deaths, and disputes involving high-profile individuals (e.g., Raj Kundra and Shilpa Shetty). Constitutional and Supreme Court Matters: Reports and analysis on key legal principles and Supreme Court warnings concerning Maharashtra, such as those related to local body elections, reservations, and the creamy layer verdict. Governance and Institution Oversight: Covers court rulings impacting public bodies like the BMC (regularisation of illegal structures) and the State Election Commission (postponement of polls), showcasing a focus on judicial accountability. Legal Interpretation: Reports on public speeches and observations by prominent judicial figures (e.g., former Chief Justice B. R. Gavai) on topics like free speech, gender equality, and institutional challenges. Omkar Gokhale's consistent, focused reporting on the judiciary establishes him as a definitive and authoritative voice for legal developments originating from Mumbai and impacting the entire state of Maharashtra. ... Read More\n- Tags:\n- Article 21\n- Bombay High Court", "translation_ja": "オムカル・ゴーカレーは、ムンバイからインディアン・エクスプレス紙のために報道するジャーナリストである。彼の取材は、法律・司法報道において並外れて高い専門性と権威を示しており、ボンベイ高等裁判所および最高裁判所に関するマハーラーシュトラ州とその主要機関に関わる動向について、非常に信頼性の高い情報源となっている。\n\n専門性と権威について：インディアン・エクスプレスは厳格なジャーナリズム基準で知られる全国紙であり、ゴーカレー氏の法律報道に対して高い信頼性をもたらしている。\n\n核心的な権威と専門分野：オムカル・ゴーカレー氏の取材は、法律事務および法理学という複雑な分野にほぼ専念しており、以下の分野を専門としている。\n\nボンベイ高等裁判所の取材：同裁判所の本庁および地方法廷の命令、所見、判決をリアルタイムで詳細に報告している。主な取材対象は以下の通りである。\n\n基本的権利と環境：大気汚染、廃棄物処理場の影響を受ける住民の生存権に関する訴訟、および重要インフラ（例：ゴードバンダー・ロードの路面損傷）への司法介入。\n\n民事・刑事法：重大な保釈命令（例：エルガール・パリシャド事件）、鉄道関連死亡事故に対する補償、著名人（ラージ・クンドラおよびシルパ・シェッティ）が関与する紛争についての報道。\n\n憲法および最高裁判所関連事項：地方機関選挙、留保制度、クリーミー・レイヤー判決に関するマハーラーシュトラ州に関係する主要法的原則や最高裁勧告についての報道・分析。\n\nガバナンスおよび機関の監視：違法建造物の合法化に関するBMC（ムンバイ市政公社）への裁判所命令、および選挙延期に関する州選挙管理委員会への判決の取材を通じ、司法による行政の説明責任への注目を示している。\n\n法的解釈：元最高裁長官B・R・ガヴァイ氏などの著名な司法関係者による、表現の自由、ジェンダー平等、制度的課題に関する公開発言および所見の報道。\n\nオムカル・ゴーカレー氏の一貫した司法分野への集中的な取材は、ムンバイを起点としマハーラーシュトラ州全体に影響を与える法的動向について、決定的かつ権威ある報道者としての地位を確立している。", "vocab": [{"word": "jurisprudence", "definition": "法学・法理学を意味する専門用語。法律の理論的・哲学的基盤を研究する学問分野を指し、法律の専門的文脈で使われる。"}, {"word": "coercive", "definition": "強制的な、威圧的なという意味の形容詞。他者に圧力や強制を加えて服従させるような性質を表し、法律・社会問題の文脈で多用される。"}, {"word": "autonomy", "definition": "自律性・自治を意味する名詞。個人や集団が自分自身の意思で決定を下す権利や能力を指し、法律・哲学・政治の分野で重要な概念として使われる。"}, {"word": "rigorous", "definition": "厳格な、徹底的なという意味の形容詞。高い基準や規律をもって物事に取り組む様子を表し、学術・報道・法律分野での品質基準を示す際に使用される。"}, {"word": "regularisation", "definition": "正規化・合法化を意味する名詞（主に英国英語）。違法または非公式な状態にあるものを公式・合法的な状態に移行させる行政手続きを指す。"}, {"word": "creamy layer", "definition": "インドの留保制度（アファーマティブ・アクション）において、社会的・経済的に恵まれた上位層を指す法律・政策用語。この層に属する人々は留保の恩恵を受けられないと定められている。"}, {"word": "intervention", "definition": "介入・仲裁を意味する名詞。第三者（特に裁判所や政府機関）が当事者間の問題に積極的に関与して解決を図る行為を指し、法的・外交的文脈で頻繁に使われる。"}]}, {"title_ja": "最高裁、タミル・ナードゥ州首相のカルール群衆事故被害者家族訪問阻止申請を却下", "title_en": "Supreme Court rejects bid to block Tamil Nadu CM Vijay's visit to Karur stampede victims", "summary_ja": "インド最高裁判所は、DMK党指導者がタミル・ナードゥ州首相C・ジョセフ・ヴィジャイ氏のカルール群衆事故被害者家族との面会を禁じるよう求めた申請を受理しないと判断した。法廷は、ヴィジャイ氏がCBIの捜査において被疑者として名指しされていないことを指摘し、この申請を政治的対立の場に最高裁を利用しようとする試みと批判した。申請者側はその後、申請を取り下げた。", "summary_en": "The Supreme Court refused to entertain a DMK leader's application seeking to prevent Tamil Nadu Chief Minister C Joseph Vijay from meeting families of the Karur stampede victims. The bench criticized the petition as an attempt to settle political scores, noting that Vijay is not named as an accused in the CBI probe. The petitioner subsequently withdrew the application.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/legal-news/supreme-court-karur-stampede-dmk-plea-cm-vijay-comments-10775762/", "state_media": false, "category": "社会", "full_text": "- Tags:\n- Karur stampede\n- supreme court\n- Vijay\nThe Supreme Court Tuesday refused to entertain an application filed by a Dravida Munnetra Kazhagam (DMK) leader seeking to restrain Tamil Nadu Chief Minister C Joseph Vijay and other members of the ruling Tamilaga Vettri Kazhagam (TVK) from making public comments regarding the September 27, 2025, Karur stampedeor interacting with families of the victims.\nA two-judge bench of Justice K V Viswanathan and Justice Alok Aradhe pulled up the petitioner, stating that the Supreme Court cannot be used as a platform to settle political scores.\n“You want the chief minister’s visit to be regulated by the Supreme Court and fix his itinerary?” Justice Viswanathan asked, pointing out that the initial FIR in the case does not name Vijay as an accused.\nFollowing the bench’s strong disinclination to entertain the matter, Senior Advocate Ranjit Kumar, appearing for the petitioner, DMK Rajya Sabha MP and organising secretary R S Bharathi, chose to withdraw the application.\nBharathi’s application was filed just ahead of Chief Minister Vijay’s scheduled July 10 visit to Karur, where he plans to meet the victims’ families to distribute ex gratia compensation and compassionate government appointment orders.\nThe stampede, which claimed 41 lives during a TVK rally last year, has been under investigation by the Central Bureau of Investigation (CBI) following a Supreme Court order in October 2025.\nThe DMK’s application sought to block Vijay from interacting with the families, claiming they are material witnesses in the active CBI probe. The application filed in a pending petition, in which the Supreme Court had ordered a CBI investigation into the stampede, urged the court to make the petitioner a party to the proceedings.\nThe plea highlighted a July 2 public speech by minister Aadhav Arjuna, who reportedly blamed the erstwhile DMK administration for the stampede and spoke of having “a score to settle”.\nKumar contended that such public statements could set a “narrative” about the merits of the case, thereby violating the Supreme Court order entrusting the probe to the CBI. He clarified that there was no objection to providing compensation to victims.\nThe bench remained unconvinced by the petitioner’s arguments. Justice Viswanathan questioned the underlying intent of the application, asking,\n“So you want us to impose an injunction on free speech?”\n“You counter their speech with your speech. How does the Supreme Court, in a matter where it ordered a CBI investigation, allow the impleadment of a political rival and pass one order after the other?”\nIn response to claims that the Chief Minister was playing a “dual role”, acting as both the head of the executive and being implicated in the case, Justice Viswanathan clarified that Vijay was not named as an accused in the FIR.\n“Please check up with your facts,” the judge said and asked the counsel to verify the same.\nSenior Advocate Neeraj Kishan Kaul, appearing for the respondents, also placed on record that Chief Minister Vijay has not been named as an accused in the ongoing CBI probe.", "translation_ja": "最高裁、タミル・ナードゥ州首相ヴィジャイ氏のカルール群衆事故被害者家族との面会阻止申請を却下\n\n最高裁判所は火曜日、ドラビダ・ムンネトラ・カジャガム（DMK）の指導者が申請した、タミル・ナードゥ州首相C・ジョセフ・ヴィジャイ氏および与党タミラガ・ヴェトリ・カジャガム（TVK）の党員が2025年9月27日のカルール群衆事故に関して公的なコメントを行うことや、被害者家族と接触することを禁じるよう求めた申請を受理することを拒否した。\n\nK・V・ヴィスワナタン判事とアロク・アラデ判事の2名による法廷は申請者を厳しく批判し、最高裁は政治的な対立の清算のために利用されるべきではないと述べた。\n\n「あなたは首相の訪問を最高裁が規制し、その行程を決めることを求めているのですか？」とヴィスワナタン判事は問いただし、本件の最初のFIR（第一情報報告書）にヴィジャイ氏が被疑者として名指しされていないことを指摘した。\n\n法廷が申請を受理することへの強い難色を示したことを受け、申請者であるDMKの参議院議員（ラジャ・サバー議員）兼組織書記のR・S・バラティ氏の代理人を務める上級弁護士ランジット・クマール氏は、申請を取り下げることを選択した。\n\nバラティ氏の申請は、首相ヴィジャイ氏が予定していた7月10日のカルール訪問直前に提出された。同訪問では、被害者家族への見舞金の支給および温情的な政府採用辞令の交付が予定されていた。\n\n昨年のTVKの集会中に41名の命を奪ったこの群衆事故は、2025年10月の最高裁命令を受け、中央捜査局（CBI）による捜査が行われている。\n\nDMKの申請は、被害者家族がCBIの現在の捜査における重要な証人であるとして、ヴィジャイ氏が家族と接触することを阻止しようとするものだった。群衆事故に関してCBI捜査を命じた係属中の申請に付随する形で提出されたこの申請は、申請者を手続きの当事者として加えるよう裁判所に求めていた。\n\n申請書では、アーダブ・アルジュナ大臣が7月2日の公開演説において、群衆事故の責任を旧DMK政権に帰し、「落とし前をつける」と発言したと報じられていることが強調された。\n\nクマール弁護士は、そのような公的発言が本件の実体についての「特定の見方」を形成し、CBIへの捜査委託を命じた最高裁命令に違反するおそれがあると主張した。同弁護士は、被害者への補償提供自体には異論がないと明確にした。\n\n法廷は申請者の主張に納得しなかった。ヴィスワナタン判事は申請の意図に疑問を呈し、次のように述べた。\n\n「つまり、あなたは私たちに言論の自由に対して差し止め命令を出すことを求めているのですか？」\n\n「あちらの発言にはこちらの発言で対抗しなさい。最高裁がCBI捜査を命じた事件において、どうして政治的なライバルを当事者として加え、次々と命令を発することができるというのですか？」\n\n首相が行政のトップであると同時に本件に関与しているとする「二重の役割」を果たしているとの主張に対し、ヴィスワナタン判事はヴィジャイ氏がFIRに被疑者として名指しされていないと明確にした。\n\n「事実を確認してください」と判事は述べ、弁護士に内容を確認するよう求めた。\n\n被申請人の代理人を務める上級弁護士ニーラジ・キシャン・カウル氏もまた、首相ヴィジャイ氏が現在進行中のCBI捜査において被疑者として名指しされていないことを記録に残した。", "vocab": [{"word": "restrain", "definition": "（法的に）差し止める、禁じるという意味。法律文脈では裁判所命令により特定の行為を禁止することを指す。"}, {"word": "disinclination", "definition": "気が進まないこと、不本意であること。公式な場や文書において、強い拒否の意志を丁寧に表現する際に使われる格式ある語。"}, {"word": "impleadment", "definition": "（法律用語）訴訟手続きに新たな当事者を加える手続きのこと。インドの法廷でよく用いられる専門用語。"}, {"word": "ex gratia", "definition": "ラテン語由来で「好意として」「義務ではなく恩恵として」という意味。法的義務なしに支払われる補償金や見舞金に対して使われる表現。"}, {"word": "entertain", "definition": "法律・司法の文脈では「（申請・訴えを）受理する・取り上げる」という意味で使われ、日常的な「楽しませる」とは異なるニュアンスを持つ。"}, {"word": "implicated", "definition": "犯罪や不正行為に関与しているとして名指しされる、または示唆されること。直接的な有罪認定ではないが、疑惑を含意する。"}, {"word": "injunction", "definition": "裁判所が特定の行為を行うこと、または行わないことを命じる法的命令（差し止め命令）。民事訴訟における重要な救済手段の一つ。"}]}, {"title_ja": "USポロCEOが就業時間外に社員へ連絡しない理由：「キャリアはマラソン、スプリントではない」", "title_en": "US Polo CEO J Michael Prince Explains Why He Never Texts Employees After Work Hours", "summary_ja": "USポロ・アソシエーションのCEO、J・マイケル・プリンス氏は、緊急事態を除き、就業時間外に従業員へメールや連絡を送ることを意識的に避けている。かつては週90時間労働をこなし健康を犠牲にしてきた経験から、今では持続可能なワークライフバランスの重要性を説く。彼が野心的なプロフェッショナルに贈るアドバイスは「懸命に働きながらも自分自身を大切に。キャリアはマラソンだ」というシンプルなものだ。", "summary_en": "J Michael Prince, CEO of US Polo Assn., deliberately avoids contacting employees outside office hours, believing they deserve uninterrupted personal time to rest and recharge. Having spent much of his earlier career working 90-hour weeks at the expense of his health, he now champions sustainable work habits. His core advice to ambitious professionals is to treat a career as a marathon, not a sprint.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/trending/trending-globally/j-michael-prince-work-life-balance-late-night-emails-ceo-advice-10775771/", "state_media": false, "category": "社会", "full_text": "For many professionals, late-night emails or weekend messages from the boss have become almost routine. But J Michael Prince, CEO of US Polo Assn., has made a conscious effort to avoid that culture after spending years pushing himself to the limit.\nSpeaking to Fortune, Prince said he now avoids contacting employees outside office hours unless something genuinely urgent comes up.\n“One thing I try to respect is—and this never really happened to me throughout my career—unless there’s something major going on, I try to leave people alone in the evenings, so you rarely ever get an email or text from me after the office,” he said.\nDespite leading a global brand worth $2.7 billion with operations spanning 190 countries, around 1,200 stores worldwide and high-profile polo events, including charity matches at Windsor Castle attended by Prince William, Prince believes employees deserve uninterrupted personal time.\n“I leave the office, and I really try to respect people’s weekends, because I feel like that’s your family time, that’s your personal time, that’s your friendship time, that’s your time to reset, recharge spiritually, mentally, physically, emotionally,” he added.\nPrince begins his day early, waking up at around 5.15 a.m. While he isn’t a fan of alarms before dawn, he jokes, “I don’t like the fours, but I like the fives.” His mornings start with an hour-long workout, followed by coffee, checking emails and, most importantly, breakfast with his family. Rather than rushing out, he and his wife alternate school drop-off duties before he heads to work.\nHe also deliberately avoids peak traffic, preferring to arrive at the office a little later. “Because I know once I get to the office, there goes my day, no matter how well it’s planned,” Prince explained.\nHis workday is packed with meetings, conversations with international partners and business discussions. Even so, he aims to leave by 5.30 p.m. so he can have dinner at home. After one final check of emails or messages, he disconnects for the evening. The only exception is in an emergency, when his team knows they can reach him at any hour.\nPrince admits he wasn’t always this disciplined about work-life balance. Earlier in his career, he routinely worked 90-hour weeks, stayed up through the night and rarely slowed down in pursuit of success.\n“I probably lost some years on the front end from some of those ‘good habits’ that could also be considered bad habits,” he recalled.\nLooking back, he believes he could have achieved the same goals without sacrificing so much of his health.\nPrince said. “I could have eaten differently, I could have been a little more thoughtful about my sleep, about my routine around working out, my travel…”\nHe acknowledged that when work consumes nearly every waking hour, healthy habits are often the first thing to disappear. Meals get skipped, sleep is compromised, and exercise takes a back seat. Now in his 50s, Prince says experience has changed his perspective. Instead of treating a career like a race, he believes professionals should think long-term and build habits they can sustain for decades.\nHis advice to those chasing ambitious career goals is simple: “Work hard, but also take care of yourself. It’s a marathon, not a sprint.”", "translation_ja": "多くのビジネスパーソンにとって、上司からの深夜のメールや週末のメッセージはほぼ日常茶飯事となっている。しかしUSポロ・アソシエーションのCEO、J・マイケル・プリンス氏は、長年にわたって自分自身を限界まで追い込んできた経験を経て、そうした文化を意識的に避けるよう心がけてきた。\n\nプリンス氏はフォーチュン誌のインタビューで、本当に緊急の用件がない限り、就業時間外に従業員へ連絡を取ることを避けていると語った。\n\n「私が尊重しようとしていること、そしてこれは私自身のキャリアを通じてほとんど実現できなかったことなのですが、重大なことが起きていない限り、夜間は人々をそっとしておくよう心がけています。ですから、オフィスを出た後に私からメールやメッセージが届くことはほとんどありません」と彼は述べた。\n\n190カ国に事業を展開し、世界中に約1,200店舗を構え、ウィンザー城でのウィリアム王子出席のチャリティーマッチを含むポロの高名なイベントを運営する、総額27億ドル規模のグローバルブランドを率いているにもかかわらず、プリンス氏は従業員が邪魔されることなく個人の時間を過ごす権利があると信じている。\n\n「私はオフィスを出た後、社員の週末を本当に大切にしようと努めています。なぜなら、それは家族との時間であり、個人の時間であり、友人との時間であり、精神的・肉体的・感情的にリセットし英気を養う時間だからです」と彼は付け加えた。\n\nプリンス氏は午前5時15分頃に起床し、早起きで一日を始める。夜明け前のアラームは好きではないものの、「4時台は嫌いだけど、5時台は好きです」とユーモアを交えて話す。朝は1時間のワークアウトから始まり、その後コーヒーを飲みながらメールをチェックし、最も重要な習慣として家族と朝食をとる。急いで外出するのではなく、妻と交互に子どもたちを学校へ送り届けてから出勤する。\n\n彼はまた、ラッシュアワーを意識的に避け、少し遅めにオフィスへ到着することを好む。「オフィスに着いてしまうと、どれほど綿密に計画を立てていても、その日が始まってしまうことがわかっているからです」とプリンス氏は説明する。\n\n彼の一日は会議、国際的なパートナーとの対話、そしてビジネスの協議で埋め尽くされている。それでも彼は午後5時30分までに退社し、自宅で夕食をとることを目標としている。メールやメッセージを最後にひと通り確認した後は、夜の間は完全にオフとなる。唯一の例外は緊急事態であり、その場合はチームがいつでも彼に連絡できることを知っている。\n\nプリンス氏は、ワークライフバランスについて常にこれほど規律があったわけではないと認める。キャリアの初期には週90時間労働が当たり前で、夜を徹して働き、成功を追い求めて立ち止まることはほとんどなかった。\n\n「あの頃の『良い習慣』——裏返せば悪い習慣とも言えるもの——のせいで、前半の数年間を縮めてしまったかもしれません」と彼は振り返る。\n\n今振り返ると、健康をそこまで犠牲にすることなく、同じ目標を達成できたはずだと彼は考えている。\n\n「食事の仕方を変えられたし、睡眠や運動のルーティン、出張のあり方についても、もう少し丁寧に考えられたはずです」とプリンス氏は語った。\n\n彼は、仕事がほぼ全ての時間を占めてしまうと、健康的な習慣が最初に失われがちだと指摘する。食事を抜き、睡眠が削られ、運動は後回しになる。50代を迎えた今、プリンス氏は経験が自らの見方を変えたと語る。キャリアをレースのように捉えるのではなく、何十年も継続できる習慣を長期的な視点で築くべきだと信じている。\n\n野心的なキャリア目標を追う人々へのアドバイスはシンプルだ。「懸命に働きなさい、でも自分自身も大切に。キャリアはマラソンであり、スプリントではありません。」", "vocab": [{"word": "recharge", "definition": "疲れを回復し、エネルギーを蓄え直すこと。ビジネス文脈では、休暇や休息を通じて活力を取り戻す意味で比喩的に使われることが多い。"}, {"word": "high-profile", "definition": "社会的注目度や知名度が非常に高い（イベント・人物・案件など）ことを表す形容詞。「注目を集める」「著名な」というニュアンスで使われる。"}, {"word": "disciplined", "definition": "自己規律があり、規則や習慣を厳格に守る様子を表す形容詞。単なる「真面目」より強く、意志的なセルフコントロールのニュアンスがある。"}, {"word": "routinely", "definition": "決まったパターンとして日常的・習慣的に行うことを表す副詞。「当然のように」「いつもの習慣として」という意味合いで使われる。"}, {"word": "compromised", "definition": "本来あるべき水準や質が損なわれた・犠牲にされた状態を指す。ここでは睡眠の質や量が不十分になっているという意味で使われている。"}, {"word": "deliberate", "definition": "意図的・意識的に行う、または慎重に考えた上での行動であることを示す形容詞。偶然や無意識ではなく、明確な意思をもって行うことを強調する。"}, {"word": "sustain", "definition": "長期間にわたって維持・継続する、または支えるという動詞。ビジネスや健康の文脈では「持続可能な形で続ける」という意味合いで頻出する。"}]}, {"title_ja": "コカ・コーラ、ナイジェリア進出75周年記念として60cl PETボトルを発売", "title_en": "Coca-Cola Launches 60cl PET Bottles to Mark 75 Years in Nigeria", "summary_ja": "コカ・コーラはナイジェリア進出75周年を記念し、標準の50clより20%容量が多い限定版60cl PETボトルを発売した。新ボトルはコカ・コーラ レスシュガー、コカ・コーラ ゼロシュガー、ファンタ、スプライトの4種類で展開される。このキャンペーンは、ナイジェリアの消費者に価値と爽快感を提供し続けるブランドの姿勢を示すものだ。", "summary_en": "Coca-Cola is celebrating its 75th anniversary in Nigeria by launching a limited-edition 60cl PET bottle, offering consumers 20% more volume than the standard 50cl pack. The new bottles are available in Coca-Cola Less Sugar, Coca-Cola Zero Sugar, Fanta, and Sprite, with special Nigerian flag-themed packaging on the Less Sugar variant. The milestone campaign reflects the brand's ongoing commitment to delivering value and refreshment to Nigerian consumers.", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/promoted/893546-more-value-same-great-taste-coca-cola-launches-60cl-pet-bottles-to-celebrate-75-years-with-nigerians.html", "state_media": false, "category": "社会", "full_text": "Since its introduction into the Nigerian market in 1951, Coca-Cola has established itself as one of the country’s most recognisable and beloved household names. Across generations, the brand has remained a constant presence at weddings, birthday celebrations, sporting events, family gatherings and the quiet, ordinary moments that mark everyday Nigerian life.\nAs the iconic brand marks its 75th anniversary in Nigeria, the Coca-Cola System in Nigeria — comprising Coca-Cola Nigeria Limited and Nigerian Bottling Company Limited — is commemorating the milestone in a way that reflects its continuous commitment to consumers. Delivering more value of the same great taste that generations of Nigerians have come to love, the brand has launched a new 60cl PET anniversary bottle, offering consumers an additional 10cl on the standard 50cl pack. The limited-edition packs represent 20% more value and are available exclusively in Coca-Cola Less Sugar, Coca-Cola Zero Sugar, Fanta, and Sprite.\nFor many Nigerians, this offer translates into more moments of refreshment, more opportunities to share with family and friends, and greater satisfaction from every sip. As a tribute to Nigeria’s cultural richness, the packaging on the 60cl Coca-Cola Less Sugar incorporates the country’s flag colours while maintaining the iconic Coca-Cola look that connects Nigerians across geographies, generations, and experiences.\nThe company’s journey in the country mirrors the Nigerian spirit of navigating new realities while remaining
