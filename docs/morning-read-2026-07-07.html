<script>
const CATS = ["全て","政治","経済","IT","社会","オピニオン"];
const DATA = [{"title_ja": "ゼレンスキー大統領、激化するロシアの攻撃を受けNATOに防空システムの供与を訴えへ", "title_en": "Zelensky to press NATO for air defence systems after intense Russian strikes", "summary_ja": "ウクライナのゼレンスキー大統領は、トルコのアンカラで開催されるNATO首脳会議において、1週間足らずの間にロシアの弾道ミサイルがキーウに着弾し50人以上の民間人が死亡したことを受け、緊急に必要な防空システムの提供を同盟国に強く求める予定だ。ウクライナは一方で、ロシアの石油精製施設や軍事目標への長距離ドローン攻撃を強化し、ロシア国内で燃料不足や停電を引き起こしている。ゼレンスキー大統領はロシアの激化する攻撃が弱さの表れであると主張しながら、プーチン大統領に和平交渉を迫ることを目指している。", "summary_en": "Ukrainian President Zelensky plans to urge NATO allies at a summit in Ankara, Turkey, to supply urgently needed air defence systems after Russian ballistic missiles killed over 50 civilians in Kyiv in less than a week. Ukraine has been conducting its own long-range drone strikes on Russian oil refineries and military targets, causing fuel shortages and power cuts across Russia. Zelensky aims to pressure Putin into peace talks while arguing that Russia's escalating attacks demonstrate weakness rather than strength.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c9d227e5zj6o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Zelensky to press Nato for air defence systems after intense Russian strikes\n- Published\nUkraine's president plans to use the Nato meeting in Turkey to urge Kyiv's allies to deliver the air defence systems it urgently needs to protect it from escalating Russian attacks.\nVolodymyr Zelensky's call for help rings with extra intensity after Russian missiles rained down on the Ukrainian capital twice in less than a week, crashing into blocks of flats and killing more than 50 civilians.\nThe summit in Ankara will also be a chance for Zelensky to hold a crucial meeting with Donald Trump and press home his case that Russia's \"brutal\" attacks are a show of weakness, not strength, and that Vladimir Putin should be pressured into talks towards a \"dignified\" peace.\nThe latest strikes on Ukraine come as it has been stepping up its own long-range drone attacks against Russia, hitting oil refineries and military targets there and causing significant fuel shortages and power cuts.\nUnderscoring that threat, Moscow's mayor Sergei Sobyanin said anti-air defences intercepted \"most\" of the 430 unmanned aerial drones fired by Ukraine towards the capital overnight. The severity of the damage was not immediately clear.\nRussian social media accounts are full of videos of people queuing for hours to buy petrol and fighting over what little they're allowed.\nOn the eve of the Nato gathering, which will be held on Tuesday and Wednesday, Zelensky voiced hope that the meeting in Turkey would not be \"empty\".\nNato Secretary General Mark Rutte has urged member states to \"pull their weight\" and ensure Ukraine gets what it needs \"to defend its sovereignty\".\nHe underlined that Kyiv was \"changing the dynamic on the battlefield\", referring to efforts to stall Russian ground troops in the east.\nThat's also about the recent drone strikes, apparently giving Ukraine an edge. \nThe phrase of the month here is \"window of opportunity\".\nBut as the war in the skies has intensified, Russia's ballistic missiles are causing Kyiv real problems.\nUkraine's air force issues a daily tally of the weapons Moscow launches alongside the number intercepted.\nOn Monday, almost all drones were blocked successfully but the failure rate for missiles was glaringly obvious.\nUkraine did not stop a single ballistic missile in that attack.\nIt isn't easy: they fly at several thousand kilometres an hour and there just aren't enough US-made Patriot air defence missiles in Ukraine to counter them.\n\"It is simply absurd that, in today's world, production has still not been scaled up to the level actually required to protect people from ballistic terror,\" Zelensky said, venting his frustration in a video address on Monday.\nHe has been calling on European allies to hand over their own stockpiles of Patriot missiles, arguing that they're no good to anyone in storage when civilians are being killed now in Ukraine.\n\"Russia is placing its bets on ballistic weapons, and those who want peace must place their bets on protection against ballistic attacks,\" Zelensky argues, setting out his case for meetings in Ankara.\nBut Patriot systems are in short supply worldwide and it's not clear how many would ever be enough if Russia were to escalate its ballistic attacks further.\nThat's why Zelensky also talks about Ukraine producing its own equivalent, with Nato help.\nThe Russian attacks, though, do suggest that Ukraine's deep strikes are getting under the Kremlin's skin.\nAfter years of Russia targeting civilian infrastructure in Ukraine, including power stations in mid-winter, Moscow now accuses Kyiv of \"terrorism\" for hitting its oil refineries with drones.\nZelensky calls it an \"influence campaign\" and he will be keen to share details with Nato allies.\nThe aim is to pressure Putin into peace talks on terms that Kyiv could stomach – that doesn't include surrendering the entire eastern Donbas region, as Moscow still demands.\nThe campaign targets have been high profile.\nAn oil terminal in St Petersburg was hit with drones ahead of Putin's showpiece economic forum in the city in June. Then there were strikes on a refinery in Moscow itself, creating explosion videos that went viral.\nNow there's a confirmed hit on an oil refinery in Omsk, Siberia, 2,500 km from Ukraine's border. The drone must have flown undetected for many hours, which shows how stretched Russia's own air defences actually are.\nUkraine's \"influence\" efforts also include Crimea, the peninsula which Putin seized in 2014 and which is deeply important to him personally.\nUkrainian drones are now hitting military logistics, oil refineries and power plants there almost every day, causing power cuts, fuel and food shortages and an official state of emergency.\nA local resident told the BBC the situation was \"catastrophic\", reminiscent of the turbulent 1990s after the USSR collapsed.\nOne of Putin's great claims is that he \"saved\" the country from that chaos, raising Russia \"from its knees\".\nNow his all-out war is bringing danger even to Moscow in t", "translation_ja": "ゼレンスキー大統領、激化するロシアの攻撃を受けNATOに防空システムの供与を訴えへ\n\nウクライナ大統領は、トルコで開催されるNATO会議を活用し、激化するロシアの攻撃からウクライナを守るために緊急に必要な防空システムの提供をキーウの同盟国に求める方針だ。\n\nヴォロディミル・ゼレンスキー大統領の支援要請は、ロシアのミサイルが1週間足らずの間にウクライナの首都に2度降り注ぎ、集合住宅に着弾して50人以上の民間人が死亡したことで、一層切迫した響きを帯びている。\n\nアンカラでの首脳会議は、ゼレンスキー大統領にとってドナルド・トランプ大統領と重要な会談を行う機会ともなり、ロシアの「残虐な」攻撃は強さではなく弱さの表れであり、ウラジーミル・プーチン大統領は「尊厳ある」和平に向けた交渉に応じるよう圧力をかけられるべきだという主張を強く訴える場となる。\n\nウクライナへの最新の攻撃は、ウクライナ自身がロシアに対する長距離ドローン攻撃を強化している最中に行われた。石油精製施設や軍事目標への攻撃により、ロシア国内では深刻な燃料不足と停電が発生している。\n\nその脅威を裏付けるように、モスクワ市長のセルゲイ・ソビャニン氏は、ウクライナが首都に向けて夜間に発射した430機の無人航空ドローンのうち「大部分」を防空システムが迎撃したと述べた。被害の深刻さは即座には明らかにならなかった。\n\nロシアのソーシャルメディアは、ガソリンを購入するために何時間も並んだり、わずかな量をめぐって争ったりする人々の動画であふれている。\n\n火曜日と水曜日に開催されるNATO会合の前夜、ゼレンスキー大統領はトルコでの会議が「空虚」なものにならないよう望むと表明した。\n\nNATO事務総長マルク・ルッテ氏は加盟国に対し「責任を果たし」、ウクライナが「主権を守るために」必要なものを確保するよう求めた。\n\n同氏はキーウが「戦場での力学を変えつつある」と強調し、東部でのロシア地上部隊の進軍を阻止する取り組みに言及した。\n\nこれはまた、最近のドローン攻撃がウクライナに優位性をもたらしているとも受け取れる。\n\n今月のキーワードは「好機の窓」だ。\n\nしかし、上空での戦争が激化する中、ロシアの弾道ミサイルはキーウに深刻な問題をもたらしている。\n\nウクライナ空軍は、モスクワが発射した兵器の数と迎撃数を毎日発表している。\n\n月曜日、ドローンのほぼすべては阻止に成功したが、ミサイルの迎撃失敗率は際立って明らかだった。\n\nウクライナはその攻撃で弾道ミサイルを1発も阻止できなかった。\n\n容易ではない。弾道ミサイルは時速数千キロメートルで飛行し、それを迎撃するための米国製パトリオット防空ミサイルがウクライナに十分に存在しないのだ。\n\n「今日の世界において、弾道テロから人々を守るために実際に必要なレベルまで生産が拡大されていないことは、まったく不条理だ」とゼレンスキー大統領は月曜日のビデオ演説で怒りをあらわにして述べた。\n\n同大統領はヨーロッパの同盟国に対し、自国が保有するパトリオットミサイルの備蓄を引き渡すよう求め続けており、今まさにウクライナで民間人が殺されている状況下で倉庫に眠っているだけでは誰の役にも立たないと主張している。\n\n「ロシアは弾道兵器に賭けており、平和を望む者は弾道攻撃への防衛に賭けなければならない」とゼレンスキー大統領は主張し、アンカラでの会議に向けた自らの立場を示した。\n\nしかし、パトリオットシステムは世界的に不足しており、もしロシアが弾道攻撃をさらにエスカレートさせた場合、どれだけあれば十分かは明らかではない。\n\nそれがゼレンスキー大統領がNATOの支援を得てウクライナ独自の同等システムを製造することについても語る理由だ。\n\nしかし、ロシアの攻撃は、ウクライナによる奥深い攻撃がクレムリンの神経を逆なでしていることを示唆している。\n\nロシアが真冬に発電所を含むウクライナの民間インフラを標的にしてきた数年を経て、モスクワは今や、ドローンによる石油精製施設への攻撃についてキーウを「テロリズム」と非難している。\n\nゼレンスキー大統領はそれを「影響力キャンペーン」と呼んでおり、その詳細をNATO同盟国と共有することに意欲的だ。\n\n目的はプーチン大統領にキーウが受け入れられる条件での和平交渉を迫ることだ。その条件にはモスクワが依然として要求している東部ドンバス地域全体の割譲は含まれない。\n\nキャンペーンの標的は注目度の高いものとなっている。\n\nサンクトペテルブルクの石油ターミナルは、プーチン大統領の看板経済フォーラムが同市で開催される直前の6月にドローンで攻撃された。次いでモスクワ市内の精製所への攻撃があり、爆発の動画がSNSで拡散した。\n\nそして今、ウクライナの国境から2,500キロ離れたシベリアの都市オムスクにある石油精製所への攻撃が確認された。ドローンは何時間もかけて未探知のまま飛行したに違いなく、これはロシア自身の防空網がいかに手薄になっているかを示している。\n\nウクライナの「影響力」工作にはクリミアも含まれる。クリミアは2014年にプーチン大統領が掌握した半島で、同大統領にとって個人的にも極めて重要な地である。\n\nウクライナのドローンは現在、軍事物流、石油精製施設、発電所をほぼ毎日攻撃しており、停電や燃料・食料不足、そして公式の非常事態宣言をもたらしている。\n\nBBCに話した地元住民は、状況は「壊滅的」であり、ソ連崩壊後の混乱した1990年代を思い起こさせると述べた。\n\nプーチン大統領の偉大な主張のひとつは、彼が国を「膝から立ち上がらせ」、その混乱から「救った」というものだ。\n\nしかし今、彼の全面戦争はモスクワにすら危険をもたらしつつある。", "vocab": [{"word": "ballistic", "definition": "弾道の、という意味の形容詞。「ballistic missile（弾道ミサイル）」のように、重力と慣性に従って弧を描いて飛ぶ飛翔体に関連して使われる軍事・技術用語。"}, {"word": "sovereignty", "definition": "主権、独立した統治権を意味する名詞。国家が自国の領土と政策を自律的に支配する権利を指し、国際政治・外交の文脈で頻繁に使われる。"}, {"word": "escalate", "definition": "（紛争・問題などが）段階的に拡大・激化する、またはさせるという動詞。特に軍事・外交の文脈で、状況の深刻化を表すのに用いられる。"}, {"word": "intercept", "definition": "（ミサイルや通信などを）途中で阻止・傍受するという動詞。軍事・防衛の文脈では、飛来する飛翔体を撃墜することを指す技術的用語。"}, {"word": "underscoring", "definition": "underscoreの現在分詞形で、「〜を強調する・裏付ける」という意味。ある事実や主張をより際立たせるために証拠や事例を示す際に使われるフォーマルな表現。"}, {"word": "stockpiles", "definition": "大量の備蓄、貯蔵物を意味する名詞。特に緊急時に備えた兵器・資源・物資の大量保存を指し、軍事・経済の文脈でよく使われる。"}, {"word": "logistics", "definition": "兵站（へいたん）・物流を意味する名詞。軍事では兵器・食料・燃料などの供給・輸送・管理を指し、作戦遂行能力を左右する重要概念。"}]}, {"title_ja": "モナコ爆弾攻撃の容疑者、ウクライナで銃創を受けた遺体で発見", "title_en": "Monaco Bomb Suspect Anastasiia Berezovska Found Dead in Ukraine with Gunshot Wounds", "summary_ja": "モナコで制裁対象の富豪ヴァディム・イェルモライエフとその家族を負傷させた小包爆弾攻撃の容疑者、ウクライナ人女性アナスタシア・ベレゾフスカが、頭部に銃創を受けた遺体でウクライナ国内で発見された。国防省情報局の現役将校を含む2人が殺人の疑いで拘束されており、そのうち1人は犯行を自供している。捜査では暗号通貨や銀行口座への送金、拷問部屋に似た地下室の発見など、複数の重要な証拠が浮かび上がっている。", "summary_en": "Anastasiia Berezovska, the Ukrainian woman suspected of carrying out a parcel bombing in Monaco that injured sanctioned multi-millionaire Vadym Yermolaiev and his family, has been found dead in Ukraine with gunshot wounds to the head. Two men, including a current Ukrainian Ministry of Defence intelligence officer who confessed to her murder, have been detained. The cross-border case involves alleged crypto and bank transfers to Berezovska and the discovery of a basement torture chamber at one suspect's home.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c5yz3770yg8o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Woman suspected of Monaco bomb attack found dead in Ukraine\n- Published\nThe woman suspected of carrying out a parcel bombing in Monaco which injured a sanctioned Ukrainian multi-millionaire and his family has been found dead, Ukraine's security service (SBU) has said.\nA cross-border manhunt had been launched for Anastasiia Berezovska, a Ukrainian woman who officials believed had fled the wealthy city-state after planting the bomb in the entrance hall of an apartment building on 29 June.\nThe 39-year-old's body was found with gunshot wounds to the head, according to the SBU.\nTwo people including a current officer within Ukraine's Ministry of Defence (MoD) have been detained on suspicion of murder.\nBerezovska arrived in Ukraine two days after the attack on 1 July, the SBU said in its statement, citing law enforcement sources.\nThere, she communicated with her family and two men - a former law enforcement officer and a current officer in the MoD's main intelligence directorate.\nThe two men were investigated as possible accomplices in the Monaco attack based on information that they \"repeatedly transferred funds\" to Berezovska's \"crypto and bank accounts\".\nThe intelligence officer subsequently confessed to Berezovska's murder and said he had done so with \"another suspect\", the agency said.\nIt continued: \"During the search of the former law enforcement officer's home, a basement room resembling a torture chamber was found.\n\"Both suspects were detained on suspicion of committing murder with premeditation by a group of individuals.\"\nAn investigation is ongoing with the \"personal assistance\" of the head of the intelligence directorate Oleg Ivashchenko.\nMonaco's deputy prosecutor Morgan Raymond said Berezovska had spent days casing out the residence and was \"disguised as a man\" during the attack last Monday.\nThree people were injured, two of them seriously, when a package exploded just as they entered the building shortly after 21:00 local time (19:00 GMT).\nBerezovska was believed to have fled in a hire car to Italy and onwards to Germany - where special forces searched an apartment rented by a 39-year-old Ukrainian woman \"currently on the run\" in the central state of Hesse on Thursday, police said.\nInterpol issued a red notice alerting police worldwide that she was a fugitive wanted for attempted murder, placing an explosive device on a public road with criminal intent and criminal conspiracy on Friday.\nThe SBU said Ukrainian authorities had shared all available information with officials in Monaco, with who its prosecutor general was in \"close co-operation\".\nLaw enforcement authorities were working to identify \"other suspects\" in the attack, it added.\nAuthorities in Monaco have not confirmed the victims' identities, but local media reported Vadym Yermolaiev, his partner and his 13-year-old son had been targeted.\nYermolaiev, a real estate developer, was named the 39th richest Ukrainian by Forbes magazine in 2020 with a reported fortune of $230m (£173.8m).\nHe has major interests are in wine and alcohol in Crimea, which Russia illegally annexed in 2014, and has been the subject of sanctions imposed by the government in Kyiv since 2023.\nHe is a Cypriot citizen, having renounced his Ukrainian citizenship in 2019, and has been living in Monaco.", "translation_ja": "モナコ爆弾攻撃に関与した疑いのある女性がウクライナで遺体で発見される\n\n・公開日\n\nウクライナの保安局（SBU）は、制裁対象となっているウクライナ人富豪とその家族に怪我を負わせたモナコでの小包爆弾攻撃を実行したと疑われていた女性が遺体で発見されたと発表した。\n\n当局は、ウクライナ人女性アナスタシア・ベレゾフスカが6月29日にあるアパートの玄関ホールに爆弾を仕掛けた後、この富裕な都市国家から逃走したとみており、国際的な指名手配が行われていた。\n\n39歳のベレゾフスカの遺体は頭部に銃創を受けた状態で発見された、とSBUは述べた。\n\nウクライナ国防省（MoD）の現役将校を含む2人が殺人の疑いで拘束された。\n\nベレゾフスカは、攻撃から2日後の7月1日にウクライナに入国したと、SBUは捜査機関筋を引用してその声明の中で述べた。\n\nウクライナに戻った後、彼女は家族および2人の男性と連絡を取っていた。この2人は、元法執行官と国防省主要情報局の現役将校であった。\n\nこの2人の男性は、ベレゾフスカの「暗号通貨口座および銀行口座」に「繰り返し送金」していたという情報に基づき、モナコ攻撃の共犯者として捜査された。\n\nその後、当該情報局将校はベレゾフスカの殺害を自供し、「別の容疑者」と共に行ったと述べた、と同機関は明らかにした。\n\n声明はさらに次のように続けた。「元法執行官の自宅を捜索したところ、拷問部屋に似た地下室が発見された。両容疑者は、集団による計画的殺人の疑いで拘束された。」\n\n捜査は情報局長官オレグ・イワシチェンコの「個人的な支援」のもとで続けられている。\n\nモナコの副検察官モルガン・レイモンドは、ベレゾフスカが先週月曜日の攻撃の際に「男性に変装」し、数日間にわたってその住居の下見をしていたと述べた。\n\n現地時間21時過ぎ（GMT19時）に3人が建物に入ろうとした直後に荷物が爆発し、そのうち2人が重傷を含む3人が負傷した。\n\nベレゾフスカはレンタカーでイタリアへ逃走し、その後ドイツへ向かったとみられており、木曜日には中部ヘッセン州で「現在逃走中」の39歳のウクライナ人女性が借りていたアパートに特殊部隊が踏み込んだと警察は述べた。\n\nインターポールは金曜日に、未遂殺人、公道への爆発物設置、および共謀の疑いで国際逃亡者として彼女を追跡するよう世界中の警察に警告するレッドノーティスを発行した。\n\nSBUは、ウクライナ当局がモナコ当局と入手可能な情報をすべて共有しており、検事総長がモナコと「緊密に協力」していると述べた。\n\n当局は攻撃における「他の容疑者」の特定に向けて捜査を進めていると付け加えた。\n\nモナコ当局は被害者の身元を確認していないが、地元メディアはヴァディム・イェルモライエフ、その交際相手、および13歳の息子が標的にされたと報じている。\n\n不動産開発業者であるイェルモライエフは、2020年にフォーブス誌によってウクライナで39番目の富豪に選ばれており、その資産は2億3000万ドル（約1億7380万ポンド）と報告されている。\n\n彼はロシアが2014年に違法に併合したクリミアでワインおよびアルコール事業に大きな利権を持っており、2023年以降はキーウ政府から制裁の対象となっている。\n\n彼は2019年にウクライナ国籍を放棄してキプロス国籍を取得しており、現在はモナコに居住している。", "vocab": [{"word": "manhunt", "definition": "逃亡中の容疑者を大規模に追跡・捜索する活動のこと。主に法執行機関が組織的に行う場合に使われる。"}, {"word": "accomplice", "definition": "犯罪行為に加担した共犯者のこと。主犯ではなく、犯罪の遂行を支援・協力した人物を指す法律用語。"}, {"word": "premeditation", "definition": "犯罪、特に殺人を事前に計画・意図すること。法律上、刑罰の重さに影響する重要な概念で「計画的」という意味合いを持つ。"}, {"word": "red notice", "definition": "インターポール（国際刑事警察機構）が発行する国際指名手配通知のこと。各国の警察に逃亡中の容疑者の逮捕や所在確認を要請するために使われる。"}, {"word": "annexed", "definition": "ある国が他の国の領土を武力や政治的手段によって自国に編入することを指す。国際法上しばしば違法とみなされる行為に使われる動詞。"}, {"word": "casing out", "definition": "犯罪を実行する前に対象となる場所を密かに下見・偵察すること。犯罪計画の準備段階でよく使われる口語的表現。"}, {"word": "sanctions", "definition": "特定の個人・企業・国に対して科される経済的・外交的制裁措置のこと。国際政治や外交の文脈でよく用いられる専門用語。"}]}, {"title_ja": "BBCがウクライナのロシア「拷問刑務所」を運営する看守と当局者を暴露", "title_en": "BBC Exposes Jailers and Officials Running Russia's 'Torture Prisons' in Ukraine", "summary_ja": "BBC国際放送の調査報道により、ロシアが占領するウクライナで拷問や性的暴力が組織的に行われているとされる拘禁施設の運営に関与した人物が特定された。元アートギャラリーを転用した悪名高い施設「イゾリャツィア」などでの虐待に関与したとされるユーリー・テメルベクら複数の男が明らかにされた。被害者たちは加害者の身元を公開することが正義への一歩だと述べており、ウクライナ当局はすでに刑事手続きを開始している。", "summary_en": "A BBC World Service investigation has identified individuals accused of operating Russian-backed detention facilities in occupied Ukraine where torture and sexual violence are reportedly systematic. The probe exposed Yurii Temerbek and two other men allegedly involved in abusing detainees at notorious sites like Izolyatsia, a former art gallery turned detention centre. Survivors say exposing the perpetrators' identities is a step toward justice, as Ukrainian authorities have opened criminal proceedings against them.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cx2kkrx8jeno?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Jailers and officials at Russia's 'torture prisons' in Ukraine exposed by BBC\n- Published\nThis article contains accounts of torture and sexual violence\nEarly one October morning in 2019, a group of men jumped out of a car and grabbed Liudmyla Huseinova as she left her home.\nThe 64-year-old says they seized her bag and threw her into the back seat, beginning what she describes as a \"nightmare\" in Russia's secretive detention system in parts of Ukraine it had occupied since 2014: \"For three years and 13 days of my life, my soul and body were crippled.\"\nShe says that among the men was Yurii Temerbek, a Ukrainian who had been a local traffic policeman and had joined the Russian-backed separatists.\nTemerbek – a husband, father and grandfather, now aged 56 - was there again, two weeks later, she says, watching as a man with a Russian accent sexually assaulted her in a notorious detention centre.\nA BBC World Service investigation has identified Temerbek, and uncovered details about two other men accused of abusing detainees, shedding light on a system that operates almost completely out of reach of Ukrainian and international justice.\nThe men appear to now be living ordinary lives with their families in Russia and occupied Ukraine. Survivors see revealing their identities as a step towards holding them accountable.\nLiudmyla says that if the men she accuses of abuse aren't found and imprisoned, \"then, justice for me will be their names as criminals, and torturers, will be known to their children\".\nThe prisons these men helped run are part of a detention system in which the UN's human rights office (OHCHR) says the torture and ill-treatment of civilians is \"systematic and widespread\".\nIt says former detainees describe beatings, electric shocks, mock executions and sexual violence, with civilians often detained arbitrarily and families given little information.\nThe Kremlin has accused the OHCHR of bias. In May this year, the UN added Russia to its blacklist of countries suspected of committing sexual violence in conflict zones - allegations Russia dismissed as \"groundless lies\".\nUkrainian authorities say more than 16,000 civilians have been taken captive or disappeared. Some of these cases followed Russia's full-scale invasion of Ukraine in 2022 - others date back as far as 2014, when Russia annexed the southern Ukrainian peninsula of Crimea and occupied parts of eastern Ukraine, triggering widespread international condemnation.\nAt that time, Liudmyla was working as a safety engineer on a poultry farm in Novoazovsk, a city in the Donetsk region close to the border with Russia.\nRussian-backed armed groups seized the city, beginning several years of paramilitary control.\nLiudmyla says that, under occupation, she helped care for orphans and took food to Ukrainian forces, who gave her a Ukrainian flag with notes of thanks written on it. She believes a photo of the flag she shared with trusted friends reached the Russian-backed forces: \"This was probably why they arrested me.\"\nShe was accused of spying, she says, and taken to Izolyatsia - a factory-turned-modern art gallery that had been taken over by Russian-backed forces. It later became widely known and feared, as numerous accounts of torture emerged from former detainees.\nWhen she arrived, she says a group of men - she does not know who - surrounded her, pinching her body. \"It's not a peach,\" she recalls one of them saying. \"Not a dried apricot either. A raisin.\"\nDetainees were forced to stand constantly from 06:00 to 22:00, and bright lights shone at night, she recalls. Her first days, she says, were punctuated with sounds of distress from other rooms: \"I have never heard such terrible screams before.\"\nTwo weeks later, she says, she was taken to the second floor, where a man who was referred to as \"Koval\" in the prison told her she was \"too old for boys who come for 'relaxation'\".\nTemerbek was there, \"being sarcastic… laughing\", she says.\nThen, she says, Koval sexually assaulted her.\nShe knows Temerbek's name, she explains, because she saw his name on a document and remembered he had been known locally for his role in the Ukrainian police.\nUkrainian authorities accuse him of working for the Ministry of State Security (MGB) established by the Donetsk People's Republic (DPR), which was created by Russian-backed paramilitaries.\nUkrainian prosecutors have started criminal proceedings against him for being part of a \"terrorist group\" - a term they often use when alleging collaboration with Russian-backed forces.\nThe BBC worked with two Ukrainian open source investigators, Bohdan Kosokhatko and Vladyslav Chyryk, to find out more about Temerbek and others accused of abuses, building on work they have done with the Ukrainian investigative organisation Truth Hounds.\nInformation including detainees' testimony, social media posts, media reports and documents from Ukrainian prosecutors allowed our team to build up a picture.\nThe investigators working with the BBC discovered that", "translation_ja": "ロシアのウクライナにおける「拷問刑務所」の看守と当局者をBBCが暴露\n\n公開日\n\nこの記事には拷問および性的暴力に関する記述が含まれています\n\n2019年10月のある早朝、一団の男たちが車から飛び出し、自宅を出たリウドミラ・フセイノワを拘束した。\n\n64歳の彼女は、男たちが彼女のバッグを奪い、後部座席に押し込んだと述べており、それが「悪夢」の始まりだったと表現している。その悪夢とは、ロシアが2014年から占領するウクライナの一部に存在する、秘密めいた拘禁システムの中での出来事だ。「私の人生の3年と13日間、私の魂と体は傷つけられた」と彼女は語る。\n\n彼女によると、その男たちの中にユーリー・テメルベクがいたという。テメルベクはウクライナ人で、かつて地元の交通警察官だったが、後にロシアが支援する分離主義勢力に加わった人物だ。\n\n現在56歳の夫、父、祖父でもあるテメルベクは、2週間後にも再び姿を現したと彼女は言う。その際、悪名高い拘禁施設でロシア訛りの男が彼女に性的暴行を加えるのを、テメルベクが傍観していたという。\n\nBBCワールドサービスの調査報道はテメルベクを特定し、被拘禁者への虐待で告発された他の2人の男に関する詳細を明らかにした。これにより、ウクライナおよび国際的な司法がほぼ全く届かない状況で機能しているシステムの実態に光が当てられた。\n\n該当する男たちは現在、ロシアおよびロシア占領下のウクライナで家族とともに普通の生活を送っているようだ。被害者たちは、彼らの身元を明かすことが責任を問うための一歩だと考えている。\n\nリウドミラは、虐待したと彼女が告発する男たちが見つかって投獄されなければ、「正義とは、彼らの名前が犯罪者・拷問者として子供たちに知られることだ」と述べた。\n\nこれらの男たちが関与した刑務所は、国連人権高等弁務官事務所（OHCHR）が民間人への拷問と虐待が「組織的かつ広範に」行われていると指摘する拘禁システムの一部だ。\n\n同事務所によれば、元被拘禁者たちは暴行、電気ショック、模擬処刑、性的暴力などを証言しており、民間人はしばしば恣意的に拘禁され、家族にはほとんど情報が与えられないという。\n\nクレムリンはOHCHRに偏向があると非難している。今年5月、国連はロシアを紛争地帯における性的暴力を犯した疑いのある国のブラックリストに追加したが、ロシアはこれらの申し立てを「根拠のない嘘」として退けた。\n\nウクライナ当局によると、1万6000人以上の民間人が捕虜となったか行方不明になったという。こうした事例の一部は2022年のロシアによるウクライナへの全面侵攻以降のものだが、ロシアがウクライナ南部のクリミア半島を併合し、東部ウクライナの一部を占領した2014年にまで遡るケースもある。その侵略は国際社会から広く非難を浴びた。\n\n当時、リウドミラはロシアとの国境に近いドネツク州の都市ノボアゾフスクの養鶏場で安全管理技師として働いていた。\n\nロシアが支援する武装勢力がその都市を占拠し、数年にわたる準軍事的支配が始まった。\n\nリウドミラは、占領下で孤児の世話をし、ウクライナ軍に食料を届けていたと語る。ウクライナ軍は感謝の言葉を書き込んだウクライナ国旗を彼女に贈った。彼女は、信頼していた友人たちとその国旗の写真を共有したことで、ロシアが支援する勢力の知るところとなったと考えている。「おそらくこれが、私が逮捕された理由だ」と彼女は言う。\n\n彼女はスパイ行為の疑いをかけられ、「イゾリャツィア」に連行されたと語る。イゾリャツィアは工場を改装した現代アートギャラリーだったが、ロシアが支援する勢力に接収された場所だ。後に、元被拘禁者たちからの拷問証言が数多く出てきたことで、この施設は広く知られ、恐れられるようになった。\n\n到着すると、身元不明の男たちの一団が彼女を取り囲み、体を抓ったと彼女は言う。「桃じゃない」とその中の一人が言ったのを覚えていると彼女は振り返る。「干し杏子でもない。干しぶどうだ。」\n\n被拘禁者は06時から22時まで常に立っていることを強制され、夜間は明るいライトが照らし続けたと彼女は語る。最初の数日間は、他の部屋から聞こえてくる苦痛の声が絶えず聞こえてきたという。「あんな恐ろしい叫び声は聞いたことがなかった。」\n\n2週間後、彼女は2階に連れて行かれ、刑務所内で「コバル」と呼ばれていた男から「お前は『息抜き』に来る男たちには年を取りすぎている」と言われたと語る。\n\nテメルベクはそこにいて、「皮肉を言いながら…笑っていた」と彼女は述べる。\n\nそして、コバルが彼女に性的暴行を加えたと彼女は言う。\n\nテメルベクの名前を知っているのは、書類に名前が書いてあるのを見て、彼がウクライナ警察での役職で地元では知られた存在だったことを思い出したからだと彼女は説明する。\n\nウクライナ当局は、テメルベクがロシアの支援を受けた準軍事組織によって設立されたドネツク人民共和国（DPR）の国家保安省（MGB）のために働いていたと告発している。\n\nウクライナの検察当局は、ロシアが支援する勢力との協力関係を主張する際によく使われる「テロ組織」への参加を理由に、彼に対して刑事手続きを開始した。\n\nBBCは2人のウクライナ人オープンソース調査員、ボフダン・コソハトコとウラジスラフ・チリクと協力し、テメルベクや虐待で告発された他の人物についてさらに詳しく調査した。調査員たちは、ウクライナの調査機関「トゥルース・ハウンズ」と行ってきた活動を基盤としている。\n\n被拘禁者の証言、ソーシャルメディアの投稿、報道記事、ウクライナ検察の文書などの情報をもとに、チームは全体像を構築することができた。\n\nBBCと協力した調査員たちは、", "vocab": [{"word": "perpetrators", "definition": "犯罪や悪事を実行した人物を指す。「加害者」「犯行者」と訳され、法律・報道の文脈で頻繁に使われる。"}, {"word": "arbitrarily", "definition": "恣意的に、根拠なく行われることを意味する副詞。法的文脈では「正当な理由なく」という含意を持つ。"}, {"word": "paramilitary", "definition": "正規軍に準じた組織や活動を指す形容詞・名詞。国家公認の軍ではない武装集団を表す際に使われる。"}, {"word": "annexed", "definition": "ある国が他の領土を（しばしば武力や強制によって）自国に編入することを意味する動詞。国際法上の重大な行為を示す。"}, {"word": "notorious", "definition": "悪い意味で広く知られていることを表す形容詞。「悪名高い」と訳され、否定的な文脈で用いられる。"}, {"word": "systematic", "definition": "組織的・計画的に行われていることを意味する形容詞。国際人権の文脈では単発でなく構造的な違反を示す重要な語。"}, {"word": "proceedings", "definition": "法的手続きや訴訟のプロセス全体を指す名詞。「criminal proceedings（刑事手続き）」の形で法律文書・報道に頻出する。"}]}, {"title_ja": "イラン戦争の影響でさらに100万人の英国住宅所有者が住宅ローン増額に直面", "title_en": "One Million More UK Homeowners Face Higher Mortgages Amid Iran War Impact", "summary_ja": "イングランド銀行は、イラン戦争がエネルギー価格とインフレに与えた影響により、2028年末までに住宅ローンの返済額が増加する英国の住宅所有者数が、従来予測の400万人から500万人超に増えると見通しを修正した。ホルムズ海峡の閉鎖により原油・ガス価格が上昇し、中央銀行は想定以上の利上げを迫られ、住宅ローン金利に転嫁された。増加幅は2022〜2024年ほど深刻ではないものの、低所得世帯が最も大きな打撃を受けるとされている。", "summary_en": "The Bank of England now expects over five million UK homeowners to face higher mortgage repayments by end of 2028, up from a previous forecast of four million, due to the impact of the Iran war on energy prices and inflation. The conflict caused the closure of the Strait of Hormuz, pushing up oil and gas costs and forcing central banks to raise interest rates higher than anticipated. While the increases are less severe than in 2022–2024, vulnerable low-income households face the greatest exposure.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cze9kpxx6d8o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "One million more UK homeowners set to face higher mortgages\n- Published\nA million more homeowners face higher mortgage bills than the Bank of England had previously expected due to the impact of the Iran war.\nJust over five million homeowners should expect their monthly mortgage repayments to increase by the end of 2028, according to Bank forecasts.\nThat compared to four million projected by the Bank in December.\nHowever, the Bank's Financial Stability Report said the hit would not be as hard as seen in recent years.\nA typical owner-occupier rolling off a fixed rate in the next two years is likely to face an increase of £45 on their monthly mortgage bill, the Bank said, external. That compares to a typical rise of £120 for those getting a new deal between the end of 2022 and end of 2024.\nHowever, 750,000 homeowners who are paying less than 3% interest on their current deal would be rolling off these products this year and would see an average increase of £170 per month in repayments, the Bank said.\nMore than eight in 10 mortgage customers have fixed-rate deals.\nThe interest rate on this kind of mortgage does not change until the deal expires, usually after two or five years, and a new one is chosen to replace it.\nMore than two million borrowers on a two-year fixed deal expiring by the end of 2028 were projected to remortgage close to their existing rate and see little change in repayments, the Bank said.\nHowever, these borrowers were now unlikely to see repayments fall over coming years, as had been forecast prior to the Iran conflict.\nThe Iran war led to the closure of the key Strait of Hormuz shipping lane, typically responsible for around a fifth of global energy supplies.\nThat pushed up the cost of oil and gas, in turn driving up inflation and raising the prospect of central banks hiking interest rates.\nThese higher-than-expected interest rates were passed on to homeowners by banks, raising mortgage rates for first-time buyers and those refinancing.\nThe average two-year fixed rate jumped from 4.83% at the start of March to a peak of 5.90% on 12 April, according to the financial information service Moneyfacts. It has since dropped to 5.49%.\nThe report is the latest example of the challenging economic inheritance facing Andy Burnham, who is expected to take over from Sir Keir Starmer as Labour leader and prime minister this month.\nBudget watchdog the Office for Budget Responsibility (OBR), external on Tuesday warned the public debt risks spiralling in the coming years.\nThe UK's public finances are in a \"challenging\" position, it said, with debt set to roughly triple to nearly 300% of GDP over the next 50 years without government action.\nIts latest Fiscal Risks and Sustainability report also warned that \"unsustainable fiscal outcomes that may not occur for some years are today's challenge not tomorrow's\".\nIt said to keep debt at its 2030-31 levels - at 95% of GDP - would require spending to be cut by roughly the size of the entire education budget, or the equivalent to the money collected through corporation tax.\n- Homes harder to sell as high mortgage rates frustrate buyers - Published7 days ago\n \n- The economic challenges facing the next prime minister - Published24 June\n \nThe Bank of England report, external says that lower income households, including renters, are likely to be more exposed to higher energy prices.\n\"They spend a larger share of their income on essentials, limiting their ability to adjust spending in response to higher prices,\" it said.\nHowever, overall, the report suggested that household finances remained resilient \"even in a challenging external environment\".\nHousehold debt remained low relative to historical averages.\nAlthough some vulnerable, low-income households remained more exposed, it said debt was unlikely to lead to sharp reductions in buying by consumers.\nElsewhere in the report, the Bank said rapid advances in AI had led to heightened risks over cyber attacks.\nIt also said valuations of AI stocks had become \"more stretched\" amid concerns of a bubble. The Bank sounded a similar warning in December.\nGet in touch\nHave you been impacted by any of the issues raised in this story? Please get in touch using the form below.", "translation_ja": "英国の住宅所有者100万人超が住宅ローン増額に直面へ\n\nイラン戦争の影響により、イングランド銀行がこれまで想定していたよりも100万人多い英国の住宅所有者が、住宅ローンの支払い増加に直面する見通しとなった。\n\nイングランド銀行の予測によると、2028年末までに500万人強の住宅所有者が毎月の住宅ローン返済額の増加を見込む必要があるという。これは同行が12月に予測した400万人と比較したものだ。\n\nただし、同行の「金融安定報告書」によると、その打撃は近年と比べると緩やかなものになるとしている。\n\n同行は、今後2年以内に固定金利期間が終了する典型的な自己居住用住宅の所有者は、毎月の住宅ローン支払いが45ポンド増加する可能性が高いとしている。これは2022年末から2024年末の間に新たな契約を結んだ場合の典型的な120ポンドの増加と比較したものだ。\n\nただし、現在3%未満の金利で契約している75万人の住宅所有者は今年中に固定期間が終了し、返済額が平均で月170ポンド増加するとイングランド銀行は述べた。\n\n住宅ローン利用者の8割以上が固定金利型の契約を持っている。\n\nこの種の住宅ローンの金利は契約期限（通常2年または5年）が切れるまで変わらず、その後新たな契約が選ばれる。\n\n2028年末までに2年固定型の契約が満了を迎える200万人超の借り手は、現行金利に近い水準で借り換えを行い、返済額にほとんど変化がないと予測されていた。\n\nしかし、これらの借り手はイラン紛争前の予測とは異なり、今後数年間で返済額が減少することは見込めなくなった。\n\nイラン戦争により、世界のエネルギー供給の約5分の1を担うとされる重要な航路・ホルムズ海峡が閉鎖された。\n\nこれにより石油・天然ガスのコストが押し上げられ、インフレが加速し、中央銀行が政策金利を引き上げる可能性が高まった。\n\n予想を上回るこれらの金利上昇は銀行を通じて住宅所有者に転嫁され、初めて住宅を購入する人や借り換えを行う人の住宅ローン金利が上昇した。\n\n金融情報サービス「マネーファクツ」によると、2年固定金利の平均は3月初めの4.83%から4月12日には5.90%のピークに跳ね上がり、その後5.49%まで低下している。\n\nこの報告書は、今月サー・キア・スターマーの後継として労働党党首兼首相に就任すると見られているアンディ・バーナムが直面する厳しい経済的課題の最新事例だ。\n\n財政監視機関である予算責任局（OBR）は火曜日、今後数年間で公的債務が膨張するリスクがあると警告した。\n\n英国の公財政は「困難」な状況にあり、政府が行動を取らなければ今後50年間で債務がGDP比約300%と、ほぼ3倍に膨らむ可能性があるとした。\n\nOBRの最新の「財政リスクと持続可能性報告書」はまた、「数年後まで顕在化しないかもしれない持続不可能な財政的帰結が、今日の課題であり明日の課題ではない」とも警告している。\n\n2030〜31年度の水準（GDP比95%）に債務を維持するには、教育予算全体に相当する規模の歳出削減か、法人税収入に相当する財源確保が必要だとしている。\n\nイングランド銀行の報告書によると、賃借人を含む低所得世帯は高いエネルギー価格にさらされやすい可能性が高いとされている。\n\n「彼らは収入のより多くの割合を生活必需品に費やしており、価格上昇に応じた支出調整の余地が限られている」と報告書は述べた。\n\nただし全体的には、報告書は「厳しい外部環境の中でも」家計の財務状況は底堅さを維持していると示唆している。\n\n家計の債務残高は歴史的平均と比較して低水準にとどまっている。\n\n脆弱な低所得世帯は引き続き高いリスクにさらされているものの、債務が消費者の購買行動の急激な縮小につながる可能性は低いとしている。\n\n同報告書の別の箇所では、AIの急速な進歩がサイバー攻撃リスクの高まりをもたらしていると指摘。また、バブルへの懸念からAI関連株の評価額が「より割高」になっているとも述べた。同行は12月にも同様の警告を発していた。", "vocab": [{"word": "remortgage", "definition": "既存の住宅ローンを新しい条件の別のローンに借り換えること。主に固定金利期間の満了時に行われる金融手続きを指す。"}, {"word": "fiscal", "definition": "政府の歳入・歳出や公共財政に関連する形容詞。「財政的な」という意味で、経済・政策の文脈で広く使われる専門用語。"}, {"word": "resilient", "definition": "困難や逆境に対して強く、回復力があることを表す形容詞。金融文脈では経済や家計が衝撃に耐える能力を指す。"}, {"word": "valuation", "definition": "株式や資産などの市場における価値評価・査定額を指す金融用語。株価が実態より高いかどうかを判断する際に使われる。"}, {"word": "spiralling", "definition": "制御不能な形で急速に増大または悪化し続けることを表す動詞の現在分詞形。主に債務やコストが止まらず膨張する状況に使われる。"}, {"word": "inheritance", "definition": "前任者や過去の状況から引き継がれる問題・状況・資産などを指す比喩的な表現。政治文脈では新政権が直面する既存の課題を意味する。"}, {"word": "owner-occupier", "definition": "自分が所有する住宅に実際に居住している人を指す不動産・住宅ローン分野の専門用語。投資用物件の所有者や賃借人とは区別される。"}]}, {"title_ja": "ヘンリー王子が英国訪問を開始、デイリーメール出版社に対するプライバシー訴訟の判決も", "title_en": "Prince Harry begins UK visit amid Daily Mail privacy verdict and family speculation", "summary_ja": "ヘンリー王子はインビクタス・ゲームズをはじめとする慈善活動を支援するため英国に帰国し、1週間の公務を行う予定だが、セキュリティ上の懸念からメーガン妃と子どもたちは渡英しないため単独での訪問となる。火曜日には、エルトン・ジョン卿やリズ・ハーリーらとともに提起したデイリーメール出版社アソシエイテッド・ニュースペーパーズに対するプライバシー訴訟の判決が下される見通しだ。今回の訪問ではチャールズ国王との再会の可能性についても憶測が飛び交っているが、ウィリアム王子との面会は予定されていない。", "summary_en": "Prince Harry has returned to the UK for a week of engagements supporting his charities, including the Invictus Games, while attending alone as Meghan and their children remain in the US due to security concerns. On Tuesday, a verdict is expected in his privacy lawsuit against Associated Newspapers, publisher of the Daily Mail, brought alongside celebrities including Sir Elton John and Liz Hurley. The visit has also sparked speculation about a potential reunion with King Charles III, though Harry is not expected to meet Prince William.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/ce8mmm5v8j0o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Harry begins UK visit as verdict due in privacy case against Daily Mail publisher\n- Published\nThe Duke of Sussex will begin a week of engagements having returned to the UK, starting with an event in London for the Invictus Games, his charity for injured military veterans.\nOn Tuesday he will also find out the result of a court case that the prince and others brought against Associated Newspapers, publishers of the Daily Mail, with claims of unlawful information gathering.\nPrince Harry will be attending events alone, as his wife Meghan and children Archie and Lilibet are not in London because of security concerns.\nThere was a confused start to the visit, when Prince Harry's team announced that an invitation to stay in Buckingham Palace had been accepted.\nBut that was rejected by the Palace, which said that the prince had been told on Saturday that he would not be able to stay, because he had not responded to the invitation in time.\nStarting on Tuesday, there are five days of events to be attended by the prince, showing support for some of his UK charities, as well as raising support for the Invictus Games. This includes a visit to Birmingham later in the week, where they will be held this time next year.\nHis visit has coincided with the result being published on Tuesday of a court case against Associated Newspapers, which he has brought with a number of well-known figures, including Sir Elton John, Sir Simon Hughes, Liz Hurley, Sadie Frost and Baroness Doreen Lawrence.\nThey have claimed that the newspaper group, which publishes the Daily Mail and Mail on Sunday, used unlawful methods for getting information for stories - allegations that have been strenuously denied by the publishers.\nThis is the latest - and is expected to be the last - in a series of courtroom battles fought by Prince Harry against what he has seen as the dishonest practices of the UK press.\nIn 2023, Prince Harry won 15 claims in his case accusing Mirror Group Newspapers of unlawfully gathering information for stories published about him.\nLast year, the publisher of the Sun newspaper agreed to pay \"substantial damages\" and apologised to the Duke of Sussex to settle a long-running legal battle over claims of unlawful intrusion into his life.\nIf the outcome of this case is that the judge supports some claims and rejects others, it is likely that all sides might claim victory.\n- Buckingham Palace says Prince Harry will not stay at palace - Published16 hours ago\n \n- Prince Harry and Meghan: Will they or won't they, and will we care? - Published2 days ago\n \n- Prince Harry will not be joined by Meghan and children on London trip - Published2 days ago\n \nThis week has also been surrounded by speculation about Prince Harry building bridges with his family, including a possible meeting with his father, King Charles III.\nThere had been discussion about whether this would be a chance for the King to see his grandchildren, Archie and Lilibet, who have not been in the UK since the late Queen Elizabeth II's Platinum Jubilee in 2022.\nThat has become more complicated because a dispute over security means that Meghan and the children will not be joining Prince Harry in London, as originally intended - but they could still come for the later part of the visit outside the capital.\nPrince Harry is not expected to see his brother Prince William during the visit.\nBut he could see more of the Spencer side of his family, with reports that he might stay at the Althorp estate, where his late mother, Princess Diana, is buried.\nIf his children come to the UK it would be an opportunity for them to see the grave of the grandmother they never met.\nSign up here to get the latest royal stories and analysis every week with our Royal Watch newsletter. Those outside the UK can sign up here.", "translation_ja": "ヘンリー王子、デイリーメール出版社に対するプライバシー訴訟の判決を前に英国訪問を開始\n\nサセックス公爵は英国に帰国し、1週間の公務をロンドンでのインビクタス・ゲームズ関連イベントから始めた。インビクタス・ゲームズは負傷した軍の退役軍人を支援する同氏の慈善団体である。\n\n火曜日には、王子らがアソシエイテッド・ニュースペーパーズ（デイリーメールの出版社）に対して提起した、違法な情報収集の疑いに関する裁判の結果も判明する。\n\nヘンリー王子は単独での公務参加となる。妻のメーガンと子どもたちのアーチーとリリベットは、セキュリティ上の懸念からロンドンには来ていない。\n\n今回の訪問は混乱した幕開けとなった。ヘンリー王子のチームがバッキンガム宮殿への宿泊招待を受け入れたと発表したが、宮殿側はこれを否定し、招待への返答が遅れたため土曜日に宿泊できない旨を王子に伝えていたと説明した。\n\n火曜日から始まる5日間、王子は英国内の慈善活動を支援するとともに、インビクタス・ゲームズへの支持を呼びかける各種イベントに出席する予定だ。来年の同時期に開催予定のバーミンガムへの訪問も含まれている。\n\n今回の訪問は、アソシエイテッド・ニュースペーパーズに対する裁判の結果が火曜日に公表されるタイミングと重なった。王子はエルトン・ジョン卿、サイモン・ヒューズ卿、リズ・ハーリー、セイディ・フロスト、ドリーン・ローレンス男爵夫人など著名人とともにこの訴訟を起こした。\n\n彼らは、デイリーメールとメール・オン・サンデーを発行する同出版グループが、記事のための情報収集に違法な手段を用いたと主張しており、出版社側はこの主張を強く否定している。\n\nこの裁判は、ヘンリー王子が英国メディアの不誠実な慣行と見なしてきたものに対して行ってきた一連の法廷闘争の中で最新のものであり、最後になると予想されている。\n\n2023年には、ヘンリー王子はミラー・グループ・ニュースペーパーズが自身に関する記事のために違法に情報を収集したとして起こした裁判で15件の申し立てを認められた。\n\n昨年は、サン紙の出版社がヘンリー公爵に「相当額の損害賠償金」を支払うことに合意し、プライバシーへの不当な侵害に関する長年の法廷闘争を和解で終結させ、謝罪を行った。\n\n今回の裁判で裁判官が一部の申し立てを認め、その他を却下するという結果になった場合、双方が勝利を主張する可能性が高い。\n\n今週はまた、ヘンリー王子が父親のチャールズ3世との面会を含む家族との関係修復を図るのではないかという憶測も飛び交っている。\n\n今回の訪問が、故エリザベス女王のプラチナ・ジュビリーが行われた2022年以来英国を訪れていないアーチーとリリベットを国王が孫として会う機会になるかどうかについても議論されていた。\n\nしかしセキュリティをめぐる問題から当初の予定が変わり、メーガンと子どもたちはヘンリー王子と共にロンドンに来ないことになったため、状況はより複雑になった。ただし、ロンドン以外で行われる後半の訪問には合流する可能性もある。\n\nヘンリー王子は今回の訪問中に兄のウィリアム王子に会う予定はない。\n\nしかし、母方のスペンサー家の親族とは会う可能性があり、亡き母ダイアナ妃が眠るアルソープ邸に滞在するという報道もある。\n\nもし子どもたちが英国を訪れれば、会ったことのない祖母の墓参りができる機会ともなる。\n\n毎週最新の王室ニュースと分析をお届けするロイヤル・ウォッチ・ニュースレターの登録はこちら。英国外にお住まいの方はこちらからご登録ください。", "vocab": [{"word": "strenuously", "definition": "「断固として、精力的に」という意味の副詞。主張や否定を強調する文脈で使われ、ここでは出版社が疑惑を強く否定していることを表す。"}, {"word": "intrusion", "definition": "「侵害、立ち入り」を意味する名詞。プライバシーや個人の領域への不当な干渉を指す法律・ジャーナリズム分野でよく使われる語。"}, {"word": "engagements", "definition": "この文脈では「公務、予定された公式行事」を意味する名詞。王族や公人の公式スケジュールを指す際に用いられる表現。"}, {"word": "coincided", "definition": "「同時期に起こった、一致した」を意味する動詞 coincide の過去形。2つの出来事が偶然同じ時期に重なった際に使う表現。"}, {"word": "allegations", "definition": "「申し立て、疑惑」を意味する名詞。証拠が確定する前の段階での告発や主張を指す法律・報道分野の重要語。"}, {"word": "speculation", "definition": "「憶測、推測」を意味する名詞。確証のない情報をもとにした推測や議論を指し、メディア報道でよく使われる語。"}, {"word": "substantial", "definition": "「相当な、かなりの」を意味する形容詞。金額や規模が無視できないほど大きいことを示す際に使われるフォーマルな表現。"}]}, {"title_ja": "MI5がエージェントの女性嫌悪と暴力への「執着」を把握していたと監視機関が認定", "title_en": "MI5 knew agent was misogynist 'obsessed' with violence, watchdog finds", "summary_ja": "MI5の監視機関IPCOが行った秘密調査により、英国の治安機関が、女性嫌悪的で暴力に執着したネオナチの情報提供者を、明確な警告サインがあったにもかかわらず意図的に使用し続けていたことが明らかになった。さらにMI5はIPCOに虚偽の情報を提供し、3つの裁判所でもエージェントXの取り扱いについて偽証していたことが判明した。政府は長年にわたり法廷でエージェントXの元交際相手ベスの信頼性を失墜させようとしてきたが、ようやく彼女が受けた虐待を公式に認めた。", "summary_en": "A secret inquiry by MI5's oversight body IPCO found that the UK security service knowingly used a neo-Nazi informant who was openly misogynistic and obsessed with violence, despite clear warning signs including machete attacks on his girlfriend. The inquiry also revealed that MI5 misled IPCO and gave false evidence to three courts about its handling of the agent, known as Agent X. The government has now publicly acknowledged the abuse suffered by the agent's former partner, Beth, after years of attempting to undermine her credibility in court.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cj9gggjekyjo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "MI5 knew agent was misogynist 'obsessed' with violence, watchdog finds\n- Published\nA secret inquiry by MI5's watchdog concluded the security service knew an abusive agent it defended in court was a misogynist who was \"obsessed\" with violence, the BBC can reveal.\nThe inquiry took place after BBC News originally exposed how MI5 had covered up for the man - a neo-Nazi informant known publicly as agent X.\nThe government took the BBC to court in 2022 in a failed attempt to block our investigation, but it won agent X legal anonymity.\nThat year, the BBC first reported how the MI5 spy had used his status to coercively control his girlfriend, including attacking her with a machete, before moving abroad to continue intelligence work while he was still under investigation.\nFollowing the BBC story, the office of the investigatory powers commissioner (IPCO) Sir Brian Leveson launched an inquiry, which - like much of IPCO's work - was secret. Details of the inquiry can now be reported for the first time.\nIn response to the new revelations, the spy's former partner, known as Beth, told the BBC: \"I'd like to see a full apology for the fact that MI5 actually were willing to use somebody like X and the fact they were aware of his abuse towards me and they did nothing at all.\"\n'Openly misogynistic' with MI5 handlers\nIPCO - which oversees the use of covert investigatory powers, including the UK's intelligence agencies - concluded:\n- \"Strong indications\" of agent X's interest in violence, including video footage of him threatening his girlfriend with a machete, did not lead to an MI5 review of his suitability of as an agent. IPCO said it \"should have done\" \n- agent X was \"openly misogynistic\" with his MI5 handlers, who knew he was involved with a \"pick up artistry\" movement that seeks to exploit women for sex, but \"none of this attracted much attention\" from the handlers \n- MI5 knew agent X was \"obsessed\" with violence, because he told them, and there were indications he might be a threat to others \"arising from his general interest in extreme violence\". But IPCO said there was a \"lack of sufficient professional curiosity\" about him by MI5. \nIn a statement to the BBC, IPCO said its inspection \"identified serious failings in MI5's management of agent X\" and it \"required MI5 to take action to address these failings\".\nIPCO added: \"MI5 subsequently made significant changes to its policies, practices and procedures, which have been tested at subsequent inspections.\n\"MI5's work in this area is ongoing and IPCO will continue to supervise this through its rigorous inspection programme.\"\nDuring its inspection, which concluded in 2024, MI5 misled IPCO about having maintained its core \"neither confirm nor deny\" secrecy policy on X's status as an agent during conversations with the BBC.\nIn fact, MI5 had told the BBC he was an agent during early attempts in 2020 to prevent us investigating him.\nMI5 also gave false evidence to three courts on this point, leading to a further investigation by IPCO, which is due to report to the prime minister imminently.\nIn its inspection, IPCO said it found nothing in \"case records\" to suggest MI5 was aware of any sinister motivation by X for becoming an agent.\nThe IPCO inspection report was recently disclosed to the BBC in the ongoing legal proceedings, along with other previously secret documents. The proceedings remain live because the court will soon need to consider what action to take about MI5's false evidence.\n'Whole case has been a disaster for everyone'\nOne MI5 document, an internal interview with the head of the team that managed agent X, shows him saying X should never have been used as a covert human intelligence source (CHIS), or agent.\n\"This whole case has been a disaster for everyone, and on reflection, we shouldn't have touched him [X] as a CHIS,\" the MI5 officer said.\nFor the first time, the government has now publicly accepted the abuse Beth suffered, having spent years trying to undermine her in the courts.\nDuring the original court battle in 2022, the then government tried to cast doubt on the BBC's case, arguing it rested on \"foundations that are anything but solid\" and there was \"real doubt about the reliability, credibility and motivation of Beth\".\nHowever, in a new statement to the BBC, a government spokesperson said: \"The abuse suffered by the woman in this case, known as Beth, was abhorrent and we extend our sincere sympathies to her.\"\nThe statement added: \"The use of agents is fundamental to MI5's ability to keep the UK safe. It is difficult, human work that is governed by legislation and tightly overseen by the Investigatory Powers Commissioner's Office (IPCO).\n\"MI5 has procedures to address the risks involved in working with Covert Human Intelligence Sources (CHIS), particularly where there might be individuals at risk of harm, and these have been improved in response to learnings.\"\nEarlier this year, MI5 paid compensation to Beth to settle a human rights claim she brought again", "translation_ja": "MI5はエージェントが女性嫌悪の暴力「執着者」であることを知っていた、監視機関が認定\n\nMI5の監視機関による秘密調査の結果、治安機関が法廷で擁護した虐待的なエージェントが、女性を嫌悪し暴力に「執着」した人物であることをMI5は把握していたと、BBCが明らかにした。\n\nこの調査は、BBCニュースが公開情報上「エージェントX」として知られるネオナチの情報提供者をMI5が隠蔽していたことを最初に暴露した後に実施された。\n\n政府は2022年、BBCの調査報道を阻止しようとして訴訟を起こしたが失敗に終わり、エージェントXの法的な匿名性は認められた。\n\n同年、BBCはこのMI5スパイが自身の立場を利用して交際相手の女性を強制的に支配し、マチェーテ（山刀）で彼女を攻撃したことを最初に報じた。その後、彼は捜査対象になったまま海外に渡り、情報活動を継続していた。\n\nBBCの報道を受け、調査権限コミッショナー事務所（IPCO）のサー・ブライアン・レヴェソン長官が調査を開始した。IPCOの業務の大部分と同様、この調査も秘密裏に行われた。その詳細が今回初めて報道可能となった。\n\n新たな事実の公表を受け、スパイの元交際相手でベスとして知られる女性はBBCに対してこう語った。「MI5がXのような人物を使おうとしていたこと、そして私への虐待を把握しながら何もしなかったという事実について、完全な謝罪を求めたい。」\n\n■MI5担当官に「公然と女性嫌悪的」な態度\n\n英国の情報機関を含む秘密捜査権限の使用を監督するIPCOは、以下の点を認定した。\n\n・マチェーテで交際相手を脅迫する映像を含む、エージェントXの暴力への関心を示す「強い兆候」があったにもかかわらず、MI5はエージェントとしての適性を見直さなかった。IPCOは「見直すべきだった」と指摘した。\n\n・エージェントXはMI5の担当官に対して「公然と女性嫌悪的」な態度をとっており、担当官も彼が女性を性的に利用しようとする「ナンパ術（ピックアップ・アーティストリー）」運動に関与していることを知っていたが、「担当官たちはこれをほとんど問題視しなかった」。\n\n・MI5はエージェントXが暴力に「執着」していることを、本人から直接聞いて把握しており、「極端な暴力への全般的な関心」から他者への脅威となる可能性を示す兆候もあった。しかしIPCOは、MI5によるXへの「職業的な注意の欠如」を指摘した。\n\nIPCOはBBCへの声明の中で、今回の検査によって「MI5によるエージェントXの管理に重大な問題があることが判明した」とし、「MI5に対してこれらの問題を是正するための措置を取るよう求めた」と述べた。\n\nIPCOはさらに「MI5はその後、方針・実務・手続きに重大な変更を加え、それらはその後の検査で検証されてきた。MI5のこの分野における取り組みは継続中であり、IPCOは厳格な検査プログラムを通じて引き続き監督を行う」と付け加えた。\n\n2024年に完了した検査の過程で、MI5はエージェントXの身分に関するBBCとの会話の中で「否定も肯定もしない」という中核的な秘密保持方針を維持していたとIPCOに対して虚偽の説明をしていたことが判明した。\n\n実際には、MI5は2020年に調査を阻止しようとした初期の段階で、BBCに対してXがエージェントであることを伝えていた。\n\nMI5はまたこの点について3つの裁判所でも虚偽の証言を行っており、これを受けてIPCOによるさらなる調査が行われており、その報告は間もなく首相に提出される予定だ。\n\nIPCOは検査の中で、Xがエージェントになろうとした悪意ある動機についてMI5が把握していたことを示す「事件記録」は何も見つからなかったと述べた。\n\nIPCOの検査報告書は最近、進行中の法的手続きの中でBBCに開示された。他の従来秘密とされていた文書とともに開示されたものである。MI5の虚偽証拠についての法廷の今後の対応が近く検討される予定であることから、この手続きは依然進行中だ。\n\n■「この案件全体が全員にとって惨事だった」\n\nMI5の内部文書の一つ、エージェントXを管理したチームの責任者への内部インタビューでは、担当者がXをそもそも秘密の人的情報源（CHIS）、つまりエージェントとして使うべきではなかったと語っている。\n\n「この案件全体が全員にとって惨事であり、振り返ってみれば、XをCHISとして関与させるべきではなかった」とそのMI5将校は述べた。\n\n政府はこれまで長年にわたり法廷でベスの信頼性を傷つけようとしてきたが、今回初めてベスが受けた虐待を公式に認めた。\n\n2022年の最初の法廷闘争で、当時の政府はBBCの主張が「到底堅固とは言えない基盤の上に立っている」とし、「ベスの信頼性、信用性、そして動機に真の疑念がある」と主張してBBCの主張に異議を唱えようとした。\n\nしかし今回、政府のスポークスマンはBBCへの新たな声明の中でこう述べた。「ベスとして知られるこの女性が受けた虐待は許しがたいものであり、彼女に対して心からのお見舞いを申し上げます。」\n\n声明はさらにこう続けた。「エージェントの活用はMI5が英国を安全に保つ能力の根幹をなすものだ。それは困難な人間的作業であり、法律によって規定され、IPCOによって厳しく監視されている。MI5は秘密の人的情報源（CHIS）との連携に伴うリスク、特に危害を受けるおそれのある個人に関するリスクに対処する手続きを持っており、これらは経験から学んだことを反映して改善されてきた。」\n\n今年初め、MI5はベスが起こした人権申し立てを和解するため、彼女に補償金を支払った。", "vocab": [{"word": "misogynist", "definition": "女性嫌悪者。女性を憎み蔑む考えを持つ人物を指す名詞・形容詞。社会問題や法的文脈で頻繁に使われる。"}, {"word": "covertly", "definition": "秘密裏に、隠密に。公式には明かされない方法で行動することを表す副詞で、諜報・法律分野でよく用いられる。"}, {"word": "investigatory", "definition": "調査に関する、捜査的な。公式な調査・検査の文脈で使われる形容詞で、行政・法律文書に頻出する専門的な語。"}, {"word": "coercively", "description": "強制的に、威圧的に。他者の意思に反して力や脅迫によって行動させることを表す副詞。法律や人権分野で多用される。", "definition": "強制的に、威圧的に。他者の意思に反して力や脅迫によって行動させることを表す副詞。法律や人権分野で多用される。"}, {"word": "imminently", "definition": "差し迫って、間もなく。重大な出来事が非常に近い将来に起こることを示す副詞で、報道・公式文書でよく使われる。"}, {"word": "anonymity", "definition": "匿名性。個人の身元が公開されない状態を指す名詞。法律・ジャーナリズム・情報保護の文脈で頻繁に登場する上級語彙。"}, {"word": "abhorrent", "definition": "忌まわしい、非常に不快な。道徳的に強く嫌悪される行為や状況を表す形容詞で、公式声明や論説文で用いられる強調表現。"}]}, {"title_ja": "ムバッペ、パラグアイ上院議員の人種差別的暴言に反論", "title_en": "Mbappe Responds to Racist Insults from Paraguayan Senator After World Cup Match", "summary_ja": "フランスのサッカースター、キリアン・ムバッペは、フランスがパラグアイに1-0で勝利したワールドカップの試合後、パラグアイのセレステ・アマリージャ上院議員がSNSに人種差別的な投稿をしたことに対し強く反論した。フランスサッカー連盟、マクロン大統領、FIFAのインファンティーノ会長らが一斉に上院議員の発言を非難し、連盟は刑事手続きの開始に向けた告訴を表明した。アマリージャ議員はその後、発言を部分的に後悔していると述べ、自身も人種差別を受けた経験があると釈明した。", "summary_en": "French football star Kylian Mbappe hit back at Paraguayan Senator Celeste Amarilla after she posted racist remarks on social media following France's 1-0 World Cup victory over Paraguay. France's football federation, President Macron, and FIFA chief Infantino all condemned the senator's comments, with the federation announcing plans for criminal proceedings. Amarilla later expressed partial regret, claiming her words were personal and that she herself had experienced racism.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/mbappe-hits-back-at-racist-insults-from-paraguay-senator/a-77862911?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Mbappe hits back at racist insults from Paraguay senator\nJuly 7, 2026\"Moron,\" \"colonized Cameroonian,\" \"full of inferiority complexes, nouveau riche, arrogant, and ugly\" — these remarks from Paraguayan Senator Celeste Amarilla have triggered a wave of international outrage.\nThe target of her attacks was French football star Kylian Mbappe. Now, all of France is rallying behind the national team captain.\nA fiercely contested, emotional match\nAmarilla's comments followed Saturday's emotionally charged World Cup round-of-16 match between France and Paraguay in Philadelphia, which France won 1-0.\nMbappe was subjected to repeated rough tackles during the match and stirred up further controversy after the final whistle with provocative gestures directed at the Paraguayan players. His refusal to shake hands with goalkeeper Orlando Gill became a major talking point.\nShortly thereafter, Amarilla published several posts on social media. In one, she called the striker a \"moron\" who hadn't even learned to write. \"Instead of mother's milk, he sucked on coconuts, and the most educated things he ever heard were chimpanzees,\" she wrote.\n\"Madame Celeste Amarilla, you are a despicable woman and unworthy of your office. You do not represent Paraguay — a country that has exuded passion and honor throughout the entire tournament,\" Mbappe responded via X, the social media platform formerly known as Twitter.\nThe forward made it clear that he would not let such racist attacks go unanswered. He said Amarilla had, \"through her blatant racism ... presented the worst possible image of her country. I will never allow people like her the freedom to spread their hatred and racism across the world.\"\nMbappe's reaction was met with widespread approval in France. Many politicians, sports officials and fans publicly rallied behind the French star, who helped lead the country to the 2018 World Cup title and the 2022 World Cup final.\nFederation announces legal action\nFrance's football federation (FFF) came out in strong support of the forward.\n\"The racist comments made by Paraguayan Senator Celeste Amarilla against Kylian Mbappe are utterly abhorrent and unacceptable,\" the FFF stated. The federation also announced plans to file a complaint with the public prosecutor's office \"to initiate criminal proceedings.\"\nFFF President Philippe Diallo also demonstratively stood by his captain. He explained that the French national team players represent the entire country; consequently, attacks on Mbappe were also attacks on France itself.\nSupport also came from French President Emmanuel Macron, who stated that he \"supports Kylian Mbappe and the French national team in the face of the racist attacks.\"\nAccording to the presidential office, even Paraguayan President Santiago Pena had condemned the senator's remarks. Paraguay's foreign ministry also distanced itself from Amarilla de Boccia's statements.\nInfantino weighs in\nThe incident eventually drew the attention of the global football community. FIFA President Gianni Infantino responded with a message of solidarity, stating that he condemned the insults \"unequivocally.\"\n\"I unequivocally condemn the racist remarks made against Kylian Mbappe by Paraguayan Senator Celeste Amarilla,\" he wrote on Instagram.\n\"The entire football world and society stand in solidarity with the France captain: we must fight racism and defeat it together.\"\nAmarilla de Boccia responded to the wave of condemnation with an open letter in which she explained that her words were directed at Mbappe personally rather than at France as a whole. She also expressed a measure of regret.\n\"After only a short time, I regretted hurling the very same insults at you that I myself have to endure,\" the senator wrote, adding that as a Latina, she too had also been the victim of racist abuse.\nThis article was originally published in German.", "translation_ja": "ムバッペ、パラグアイ上院議員の人種差別的暴言に反論\n\n2026年7月7日\n\n「バカ」「植民地化されたカメルーン人」「劣等感の塊、成金、傲慢、醜い」――パラグアイのセレステ・アマリージャ上院議員によるこれらの発言は、国際的な激しい怒りの波を引き起こした。\n\n攻撃の標的となったのは、フランスのサッカースター、キリアン・ムバッペだった。今やフランス全土が代表チームのキャプテンの後ろに結集している。\n\n■激戦となった感情的な試合\n\nアマリージャの発言は、土曜日にフィラデルフィアで行われたワールドカップ決勝トーナメント1回戦のフランス対パラグアイの感情的な試合の後に発せられたものだ。この試合はフランスが1-0で勝利した。\n\nムバッペは試合中に何度も激しいタックルを受け、試合終了後にはパラグアイの選手たちに向けて挑発的なジェスチャーをして、さらなる論争を巻き起こした。ゴールキーパーのオルランド・ヒルとの握手を拒否したことも大きな話題となった。\n\nその後まもなく、アマリージャはSNSに複数の投稿を公開した。その中で彼女は、このストライカーのことを「字も覚えられなかったバカ」と呼んだ。「彼は母乳の代わりにヤシの実を吸い、これまで聞いた中で最も教養あるものはチンパンジーの声だった」と彼女は書いた。\n\n「セレステ・アマリージャ議員、あなたは卑劣な女性であり、その職に値しない。あなたはパラグアイを代表していない――パラグアイはこのトーナメント全体を通じて、情熱と誇りを発し続けてきた国だ」と、ムバッペはかつてツイッターと呼ばれていたSNSプラットフォーム「X」を通じて応答した。\n\nこのフォワードは、そのような人種差別的な攻撃を黙って受け入れるつもりはないと明言した。アマリージャは「露骨な人種差別によって……自国の最悪のイメージを世界に示した」とし、「私は彼女のような人物が憎悪と人種差別を世界中に広める自由を決して許さない」と述べた。\n\nムバッペの反応はフランスで広く支持を受けた。多くの政治家、スポーツ関係者、ファンが公に声を上げ、2018年ワールドカップ優勝と2022年ワールドカップ決勝進出に貢献したフランスのスターの後ろに結集した。\n\n■連盟が法的措置を発表\n\nフランスサッカー連盟（FFF）はこのフォワードへの強力な支持を表明した。\n\n「パラグアイのセレステ・アマリージャ上院議員によるキリアン・ムバッペへの人種差別的発言は、全く忌まわしく受け入れがたいものだ」とFFFは声明を出した。また、連盟は「刑事手続きを開始する」ために検察庁への告訴を行う計画も発表した。\n\nFFF会長のフィリップ・ディアロもキャプテンへの支持を明確に示した。フランス代表の選手たちは国全体を代表しているのだから、ムバッペへの攻撃はフランス自体への攻撃でもあると彼は説明した。\n\nフランスのエマニュエル・マクロン大統領からも支持が寄せられ、「人種差別的攻撃に直面しているキリアン・ムバッペとフランス代表チームを支持する」と述べた。\n\n大統領府によれば、パラグアイのサンティアゴ・ペーニャ大統領でさえ上院議員の発言を非難したという。パラグアイの外務省もアマリージャ・デ・ボシア議員の発言から距離を置いた。\n\n■インファンティーノ会長も介入\n\nこの事件はやがてサッカー界全体の注目を集めることとなった。FIFAのジャンニ・インファンティーノ会長は連帯のメッセージで応じ、暴言を「明確に」非難すると述べた。\n\n「パラグアイのセレステ・アマリージャ上院議員によるキリアン・ムバッペへの人種差別的発言を明確に非難する」と彼はインスタグラムに書いた。\n\n「サッカー界全体と社会全体がフランスのキャプテンと連帯している。私たちは共に人種差別と闘い、これを打ち負かさなければならない」\n\nアマリージャ・デ・ボシア議員は非難の嵐に対し公開書簡で応じ、自分の言葉はフランス全体に向けられたものではなく、ムバッペ個人に向けられたものだと説明した。また、ある程度の後悔の念も示した。\n\n「ほんのわずかな時間の後、私自身が耐えなければならないのと同じ侮辱をあなたに浴びせたことを後悔した」と上院議員は書き、ラテン系の女性として自分もまた人種差別的な暴言の被害者になってきたと付け加えた。\n\nこの記事はもともとドイツ語で公開されたものです。", "vocab": [{"word": "outrage", "definition": "激しい怒りや憤慨を意味し、主に道徳的・社会的に許しがたい行為に対する強い反発を表す。例：「国際的な怒りの波（wave of international outrage）」のように用いられる。"}, {"word": "abhorrent", "definition": "非常に嫌悪感を催す、忌まわしいという意味の強い形容詞。道徳的に受け入れがたい行為や考えに対して用いられる。"}, {"word": "unequivocally", "definition": "「明確に、疑いの余地なく」という意味の副詞で、曖昧さのない断固とした態度を示す際に使われる。公式声明や強い立場表明に頻出する表現。"}, {"word": "provocative", "definition": "「挑発的な」という意味で、意図的に相手の怒りや反応を引き出そうとする言動を表す形容詞。スポーツや政治の文脈でよく使われる。"}, {"word": "solidarity", "definition": "「連帯、団結」を意味する名詞で、共通の目標や困難に対して人々がひとつにまとまることを指す。社会運動や公式声明でよく使用される。"}, {"word": "proceedings", "definition": "法律用語で「訴訟手続き、法的措置」を意味する。「criminal proceedings（刑事手続き）」のように、裁判や法的プロセス全般を指す際に用いられる。"}, {"word": "demonstratively", "definition": "「誇示するように、明確に示す形で」という意味の副詞。感情や支持をあえて外に向けて見せる行動を表現する際に使われる。"}]}, {"title_ja": "ドイツのビール醸造所、ノンアルコールビール需要の高まりに対応", "title_en": "German Breweries Boost Non-Alcoholic Beer Output as Demand Surges", "summary_ja": "ドイツの醸造所は2025年にノンアルコールビールを6億1,600万リットル以上生産し、その価値は約6億9,600万ユーロに上り、2024年比で6.5%増加した。一方、ドイツの工場生産高は5月に0.9%上昇し、予測を上回ったものの、経済学者らは回復はまだ脆弱だと警告している。また、ドイツ連邦憲法裁判所は、具体的な脅威が生じる前に警察が介入することを認めるバイエルン州の拡大された警察権限法の審査を開始した。", "summary_en": "German breweries produced over 616 million liters of non-alcoholic beer in 2025, valued at approximately €696 million, marking a 6.5% increase from 2024. Meanwhile, German factory output rose 0.9% in May, beating forecasts though economists warn recovery remains fragile. Germany's Federal Constitutional Court also began reviewing Bavaria's expanded police powers law, which allows intervention before a concrete threat exists.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-news-breweries-tap-thirst-for-alcohol-free-beer/live-77860052?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Germany news: Breweries tap thirst for alcohol-free beer\nPublished July 7, 2026last updated July 7, 2026What you need to know\n- German breweries are increasingly producing non-alcoholic beer\n- Brewery output of non-alcoholic products was worth nearly €700 million in 2025\n- Germany's Federal Constitutional Court is reviewing Bavarian police powers\n- The case concerns police intervention before a concrete threat exists\nHere is a roundup of the headlines from across Germany on Tuesday, July 7:\nTired of missing our real-time updates? Click here to add us as a Preferred Source on Google. Then tap the \"Star\" or \"Preferred\" to keep DW News at the top of your feed.\nGerman factory output beats forecasts but recovery remains fragile\nGerman production has risen more than expected, offering a fresh sign of stabilization in Europe's largest economy.\nThe Federal Statistical Office says industrial, construction and energy output rose 0.9% in May from April.\nIndustrial output alone rose 0.8% in May, driven largely by a 3.6% jump in car production. Output in energy-intensive sectors, which have come under pressure from higher energy costs linked to the Iran conflict, edged up 0.2%.\nThe overall figure beats economists' forecasts of a 0.1% to 0.2% increase.\nMichael Herzum, an economist at fund manager Union Investment, told the Reuters news agency it was \"a sign of life, but not yet a comeback.\"\nHerzum said years of declining competitiveness had pushed production back to levels last seen in 2010, underlining the depth of Germany's industrial slowdown.\n\"German industry has halted the downward trend, but the path out of the crisis is not a sprint upward; it is a snail's pace,\" he said.\nGermany plans state gas reserve for emergencies\nGermany has confirmed plans to build a state-owned natural gas reserve for crisis situations, with costs estimated at €1.2 billion to €1.5 billion ($1.37 billion to $1.71 billion).\nThe reserve would not be funded directly from the federal budget, but through a levy on gas consumers.\nThe plan foresees a reserve of around 24 terawatt-hours (TWh), equivalent to about 10% of Germany's gas storage capacity. To avoid distorting the market, the gas would be bought over two to three years, with the first filling planned for summer 2027.\nEconomics Minister Katherina Reiche has previously described such a reserve as an emergency tool for the Federal Network Agency, which regulates public utilities. The ministry said it could help prevent shutdowns of individual industrial customers and buy time for repairs or alternative imports.\nAccording to the Reuters news agency, the reserve is designed to cover a 30-day outage at Dornum, the main landing point for Norwegian gas. It could also bridge around 40 days of disrupted LNG imports or cover household and commercial supply for 10 days during an extreme winter.\nTop German court reviews Bavarian police powers\nGermany's Federal Constitutional Court has begun reviewing Bavaria's contested police law and whether officers can act before a concrete threat exists.\nJudges in Karlsruhe opened a two-day hearing on Tuesday into the state's 2017 and 2018 changes that expanded police powers in cases of a merely \"impending threat.\"\nThe law lowered the threshold for action in cases involving threats to state security, life and health. It allows police to use tools that include covert searches of phones and computers, undercover officers, drones, and surveillance to determine whether a concrete threat may emerge.\nIn this respect, the Bavarian law is \"unparalleled nationwide,\" the reporting judge, Constitutional Court Justice Yvonne Ott, said at the start of the hearing.\nBavaria amended the law in response to the threat posed by terrorism and extremism, which was considered high at the time. Legislative records cited the 2016 racist attack on a Munich shopping mall and a 2016 Islamist attack on a Berlin Christmas market.\nThe case was brought by lawmakers from the Green Party, the socialist Left Party and the business-focused Free Democrats (FDP), along with civil society groups and the Society for Civil Rights (GFF). They argue the law risks violating the basic rights of people not suspected of wrongdoing.\nGFF lawyer David Werdermann said before the hearing that the law placed citizens \"under general suspicion\" and allowed police to interfere with basic rights with few limits.\nA ruling is not expected during the hearing and will likely follow in several weeks or months.\nNon-alcoholic beer production rises in Germany\nGermany produced more than 616 million liters (163 million gallons) of non-alcoholic beer in 2025, as demand for lower- and no-alcohol drinks continues to grow.\nThe Federal Statistical Office said output was worth about €696 million ($796 million), up 6.5% from just under 579 million liters in 2024.\nAlcoholic beer still dominates German brewing. Breweries produced around 6.8 billion liters in 2025, worth about €6.4 billion, but output fell 5.8% from roughly 7.2 billion l", "translation_ja": "ドイツのニュース：醸造所がノンアルコールビールへの需要を取り込む\n\n掲載日：2026年7月7日（最終更新：2026年7月7日）\n\n【注目のポイント】\n・ドイツの醸造所はノンアルコール製品の生産を増やしている\n・2025年のノンアルコール製品の醸造所出荷額は約7億ユーロに達した\n・ドイツ連邦憲法裁判所はバイエルン州の警察権限を審査中\n・同件は、具体的な脅威が生じる前の警察介入に関するものである\n\n以下は、火曜日（7月7日）のドイツ各地の主要ニュースのまとめです。\n\n■ドイツの工場生産高が予測を上回るも、回復は依然として脆弱\n\nドイツの生産高が予想以上に増加し、ヨーロッパ最大の経済大国における安定化の新たな兆しが見えてきた。\n\n連邦統計局によると、5月の鉱工業・建設業・エネルギー部門の生産高は4月比で0.9%上昇した。\n\n工業生産高だけでも5月に0.8%増加し、その主な原動力となったのは自動車生産の3.6%の急増だった。イラン紛争に伴うエネルギーコスト上昇の圧力を受けてきたエネルギー集約型産業の生産高は、0.2%の小幅増にとどまった。\n\n全体の数値は、0.1%〜0.2%の増加という経済学者の予測を上回った。\n\nファンドマネージャーのユニオン・インベストメントのエコノミスト、ミヒャエル・ヘルツムは、ロイター通信に対し「回復の兆しではあるが、まだ本格的な復活とは言えない」と述べた。\n\nヘルツムは、長年にわたる競争力の低下により生産高が2010年当時の水準にまで落ち込んでいると指摘し、ドイツの産業低迷の深刻さを強調した。\n\n「ドイツの産業は下降トレンドに歯止めをかけたが、危機からの脱出路はまるで蝸牛（かたつむり）のような歩みだ」と同氏は語った。\n\n■ドイツ、緊急時用の国家ガス備蓄の構築を計画\n\nドイツは危機的状況に備えた国家所有の天然ガス備蓄の構築計画を正式に発表した。費用は12億〜15億ユーロ（約13億7,000万〜17億1,000万ドル）と見積もられている。\n\nこの備蓄は連邦予算から直接賄われるのではなく、ガス消費者への課徴金によって資金を調達する。\n\n計画では約24テラワット時（TWh）の備蓄を想定しており、これはドイツのガス貯蔵容量の約10%に相当する。市場への影響を避けるため、ガスは2〜3年かけて購入され、最初の充填は2027年夏に予定されている。\n\n経済大臣のカタリーナ・ライヒェは以前、このような備蓄を公益事業を規制する連邦ネットワーク庁の緊急ツールと表現していた。同省によれば、個々の工業顧客の操業停止を防ぐとともに、修理や代替輸入のための時間を稼ぐことができるという。\n\nロイター通信によると、この備蓄はノルウェー産ガスの主要陸揚げ地であるドルヌムが30日間停止した場合をカバーするよう設計されている。また、LNG輸入が約40日間途絶えた場合や、厳冬時に家庭および商業用供給を10日間賄うことも可能だという。\n\n■ドイツ最高裁、バイエルン州の警察権限を審査\n\nドイツ連邦憲法裁判所は、警察官が具体的な脅威が存在する前に行動できるとするバイエルン州の論争的な警察法の審査を開始した。\n\nカールスルーエの裁判官らは火曜日、単なる「切迫した脅威」の場合に警察権限を拡大した同州の2017年・2018年の改正法について、2日間の審理を開始した。\n\nこの法律は、国家安全保障や生命・健康に対する脅威が関わる案件での行動の敷居を引き下げた。それにより警察は、スマートフォンやコンピューターの秘密捜索、潜入捜査員の活用、ドローン、具体的な脅威が生じうるかを判断するための監視など、さまざまな手段を使用できるようになった。\n\nこの点において、バイエルン州の法律は「全国でも前例がない」と、担当裁判官である連邦憲法裁判所のイヴォンヌ・オット判事が審理の冒頭で述べた。\n\nバイエルン州は、当時高まっていたテロや過激主義の脅威に対応してこの法律を改正した。立法記録では、2016年にミュンヘンのショッピングモールで起きた人種差別的な攻撃や、2016年のベルリンのクリスマス市でのイスラム過激派によるテロが引用されている。\n\nこの訴訟は、緑の党、社会主義系の左翼党、そして経済界寄りの自由民主党（FDP）の議員らや、市民社会団体および市民権協会（GFF）によって提起された。彼らは、この法律が犯罪を疑われていない人々の基本権を侵害するリスクがあると主張している。\n\nGFFの弁護士、ダフィット・ヴェルデルマンは審理前に、この法律は市民を「一般的な疑惑の下」に置き、ほとんど制限なく警察が基本権に干渉することを認めると述べた。\n\n判決は審理中には出されず、数週間ないし数か月後に下される見通しだ。\n\n■ドイツでノンアルコールビールの生産が増加\n\nドイツは2025年に6億1,600万リットル（1億6,300万ガロン）以上のノンアルコールビールを生産した。低アルコールおよびノンアルコール飲料への需要が拡大し続けている。\n\n連邦統計局によると、その出荷額は約6億9,600万ユーロ（7億9,600万ドル）に上り、2024年の約5億7,900万リットルから6.5%増加した。\n\nアルコール入りビールは依然としてドイツの醸造業界を支配している。醸造所は2025年に約68億リットルを生産し、その価値は約64億ユーロに達したが、生産量は2024年の約72億リットルから5.8%減少した。", "vocab": [{"word": "stabilization", "definition": "安定化。不安定な状態が落ち着いてくること。経済や状況が安定に向かうプロセスを指す際によく使われる。"}, {"word": "levy", "definition": "課徴金・賦課金。政府や公的機関が特定の目的のために法的に徴収する税金や料金のこと。"}, {"word": "terawatt-hour", "definition": "テラワット時（TWh）。エネルギー量の単位で、主に大規模なエネルギー貯蔵や消費量を表す際に使われる専門用語。"}, {"word": "impending", "definition": "切迫した・差し迫った。何か（多くは好ましくないこと）がまもなく起こりそうな状態を表す形容詞。"}, {"word": "covert", "definition": "秘密の・隠密の。公に知られないように行われる行動や作戦を表す形容詞で、スパイや警察活動の文脈でよく用いられる。"}, {"word": "competitiveness", "definition": "競争力。市場や国際的な場において他者と効果的に競い合う能力のこと。経済・ビジネス文脈でよく使われる。"}, {"word": "unparalleled", "definition": "前例のない・比類のない。他に類似するものが存在しないほど独自であることを強調する形容詞。"}]}, {"title_ja": "Germany: Record debt and a seismic policy shift", "title_en": "Germany: Record debt and a seismic policy shift", "summary_ja": "The German government's draft budget for 2027 includes more money for the military and less for everything else, while debt continues to grow rapidly. The Cabinet has approved it, and now it needs to pass in parliament.", "summary_en": "The German government's draft budget for 2027 includes more money for the military and less for everything else, while debt continues to grow rapidly. The Cabinet has approved it, and now it needs to pass in parliament.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-record-debt-and-a-seismic-policy-shift/a-77861879?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Germany: Record debt and a seismic policy shift\nJuly 7, 2026In Berlin's government district, a so-called \"debt clock\" hangs on an office building. Installed by the German Taxpayers' Federation, a lobby organization advocating lower taxation and public spending, it is meant to be a reminder of Germany's rising national debt. Against a black display, the red numbers climb higher and higher every day. On July 6 at 1:00 p.m., the debt clock read €2.78 trillion ($3.18 trillion).\nThe draft budget for 2027, announced on Monday, will drive debt levels up further. Germany's finance minister, Lars Klingbeil of the center-left Social Democratic Party (SPD), estimates that spending for 2027 will total €555.4 billion.\nOf that amount, €109.7 billion is earmarked for defense spending, a third more than in 2026.\nBecause expenditures far exceed tax revenues, Klingbeil's plan, once again, calls for taking on more debt — just under €119 billion. But that is far from the whole story.\nTwo special funds for infrastructure and military\nThen there's also spending from debt-financed special funds, which act as a kind of shadow budget. Since these funds are spread out over several years, they are not listed in the current budget.\nAt a staggering €500 billion, this fund is earmarked for the maintenance and restoration of infrastructure and for achieving Germany's goal of becoming climate-neutral. Spread out over 12 years, the money will go toward repairing dilapidated bridges, roads and the rail network, among other things.\nAn additional special fund has also been established for the Bundeswehr, Germany's Armed Forces. By 2029, Germany plans to gradually increase its defense spending to 3.5% of gross domestic product (GDP), which is a measure of economic output. By 2035, it is expected to reach the new NATO target of 5%.\nKlingbeil justified the Bundeswehr fund by citing Russia's war in Ukraine. \"[Russian President Vladimir] Putin's imperialist delusions pose a greater threat to peace in Europe than we have seen in a long time,\" said Klingbeil after the Cabinet meeting. \"We cannot defend ourselves against Putin with a balanced budget.\"\nInstead, he said, Germany must make up for the three decades in which defense spending was \"cut back\" as quickly as possible. \"Doing that without incurring new debt is impossible — it's like flying to the moon without a rocket.\"\nWhat about Germany's debt brake?\nIf debt from the regular budget is added to that from the special funds, new debt is projected to reach around €203 billion in 2027. Over the years to come, this trend is expected to persist.\nBased on the federal government's financial planning, the German Chamber of Commerce and Industry has calculated that spending will rise by an average of 5% per year through 2030. Meanwhile, tax revenues will grow only half as fast during the same period — namely, by about 3% per year.\nWhat's more, the more debt the government accumulates, the more interest it must pay. By 2030, interest is expected to reach €80 billion, and almost one in five euros of tax revenue could be spent on interest.\nYet the Basic Law, the German Constitution, stipulates that the government may spend only as much as it collects in revenue. This is known as the debt brake. Additional borrowing may not exceed 0.35% of gross domestic product (GDP).\nDefense and security spending is largely exempt from the debt brake, while economic downturns allow for higher debt limits. However, as Europe's largest economy and the third largest in the world, Germany can afford the debt, Klingbeil emphasized. \"Our debt level is well below the Eurogroup average.\"\nIn the eurozone, debt is limited to no more than 60% of GDP. In 2027, Germany's debt will stand at 69.5%.\nGermany's sluggish economy\nWhat's more, Germany is mired in a deep economic crisis, and the economy is growing weaker year by year. When it took office in May 2025, the federal government — composed of the conservative Christian Democratic Union (CDU)/Christian Social Union (CSU) and the center-left SPD — announced that it was going to revive the economy. Instead, however, the crisis has persisted.\n\"Donald Trump's reckless war against Iran has cut the economic recovery we expected for this year in half,\" Klingbeil complained in Berlin. \"This war is costing Germany money.\"\nDespite more taxes, government cuts are bound to come\nNew sources of revenue are expected to come from the introduction of a plastic tax, a sugar tax and higher taxes on tobacco and alcohol. There are also plans to tax the wealthy — a \"tax on the super-rich,\" as Klingbeil puts it.\nBut that is just a drop in the proverbial bucket, and government cuts will inevitably have to come. This will not only affect the government's own ministries and their budgets, but also the financial aid the federal government provides to support social security funds.\nThe pension and health insurance funds are notoriously strapped for cash and require billions in annual subsidies from the federal ", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ氏、防衛費問題で緊張が続く中アンカラでNATO首脳と会談", "title_en": "Trump meets NATO allies in Ankara amid tensions over defense spending and U.S. troop reductions", "summary_ja": "NATO同盟国は、トランプ大統領による欧州の防衛費批判をめぐる1年間の緊張を経て、同盟の結束を試すアンカラ首脳会談に集結した。ルッテ事務総長は今回の会議を「NATO 3.0」と位置づけ、より欧州主導の同盟を強調する一方、米国は欧州での軍事プレゼンス縮小を示唆している。首脳会談ではウクライナ情勢も議題に上り、トランプ氏は水曜日にゼレンスキー大統領と会談する予定。", "summary_en": "NATO allies gathered in Ankara for a summit testing alliance unity after a year of tensions sparked by Trump's criticism of European defense spending. Secretary General Rutte framed the meeting as 'NATO 3.0,' emphasizing a more European-led alliance while the U.S. signals it will reduce its military footprint in Europe. The summit also addresses the war in Ukraine, with Trump set to meet Zelenskyy on Wednesday.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/Politics/trump-meets-nato-allies-after-year-upheaval-analysis/story?id=134520967", "state_media": false, "category": "政治", "full_text": "Trump meets with NATO allies after year of upheaval: ANALYSIS\nAllies are expected to unveil a \"more European\" NATO at Ankara summit.\nAllies from both sides of the Atlantic gather in Ankara Tuesday in a key test of the unity of the North Atlantic Treaty Organization, an alliance that U.S. President Donald Trump has shaken and berated.\nThe summit arrives against the backdrop of Trump's repeated criticism of allies' defense spending and a Pentagon review of U.S. troops across Europe.\nNATO Secretary General Mark Rutte has attempted to temper tensions, declaring that European allies have heeded calls from the U.S. to take on a greater burden. Rutte, on a trip to Washington last month, pointed to increased defense spending of 20% by Europe and Canada in the last year.\nThe secretary-general has welcomed Trump's wishes for Europeans to take a greater share of the burden, praising the president's ambitions for NATO and calling for a \"defense industrial revolution.\"\nPreviewing the summit, Rutte adopted language used by U.S. Defense Secretary Pete Hegseth and other U.S. officials.\n\"This is NATO 3.0,\" Rutte said. \"More European-led, equalizing defense spending, but still with the U.S. firmly rooted in NATO.\"\nEuropean officials say the summit will be focused on the implementation of goals set at last year's summit at The Hague, where allies agreed to set a 10-year goal to increase defense spending as a share of gross domestic product to 5%.\nAmid tensions with Europeans over their contributions to NATO -- and the U.S. campaign in Iran -- analysts say the lack of a clear win to celebrate in Ankara, unlike The Hague, leaves a degree of uncertainty at the summit as Trump continues to express displeasure with allies.\n\"The U.S. spends more money on NATO than any other country, by far, to protect them, without getting any benefit,\" Trump said last week.\nThe NATO meetings also come amid an escalation in the war in Ukraine. Allies will look to the venue to signal support for Kyiv and Trump plans to meet with Ukrainian President Volodmyr Zelenskyy on Wednesday.\nUS withdrawal in Europe\nThe summit comes after Hegseth admonished allies at a June NATO meeting in Brussels for what he called \"shameful\" defense contributions to the alliance. He announced a six-month review of U.S. troops' footprint in Europe.\nThe U.S. military has already said it would \"rightsize\" its commitment to the NATO Force Model, a scheme by which allies commit assets in the event of an emergency.\nAnalysts say changes to the U.S. force posture in Europe, including a canceled rotation of 5,000 soldiers due to deploy to Poland, risk creating short-term gaps.\nTrump, who has praised the Poles as allies, later reversed the decision publicly. But the 5,000 troops have not yet deployed.\nU.S. Ambassador to NATO Matthew Whittaker, in an interview with CNBC on Monday, said the U.S. military would \"do less\" in Europe because of the demands of other theaters.\n\"The target is that Europe takes over the conventional defense of the European continent,\" Whitaker said. \"So what would you expect if they take it over, you would expect the U.S. to do less. We're not going away. We're just doing less because we have global requirements and global challenges.\"\nCameron McMillan, a senior research analyst at the Foundation for Defense of Democracies and a former U.S. Army field artillery officer, said there are \"some flaws in that logic.\"\nBrigade combat teams, which were withdrawn from Romania and scheduled to be withdrawn from Germany, are \"designed basically to fight the Russian army in Europe and to deter the Russians from making a move on the Baltics or Poland or making a move towards Kaliningrad,\" McMillan said.\n\"So unless we plan on having a bunch of Abrams tanks swim to Taiwan in a Taiwan contingency, it has much more value in Europe.\"\nSimmering leader tensions\nThe president's inclination to punish allies for perceived grievances leaves doubts that the summit will be a rosy picture of unity in Ankara -- as Trump lodges complaints over defense contributions and allies' role in the U.S. campaign in Iran.\nThe summit harbors the prospect of unexpected personal brushups, a rare setting where 32 heads of state convene in the same place.\nIt will be the first meeting between Trump and Italian Prime Minister Giorgia Meloni since they traded barbs over Trump's claim that Meloni \"begged\" him for a photo at a G7 summit last month.\nMeloni, a longtime ally of Trump, denied the claim in a scathing social media video in which she said the president \"doesn't show the same determinat
