tems from the Israeli-Palestinian conflict, but the region will never be truly stable until it is resolved. That will only happen if Palestinians are given the opportunity to govern themselves.\nFor the past 15 years, Washington has done little to advance that outcome. It has instead treated the Palestinian file as an adjunct to the U.S.-Israeli relationship—an issue revisited only during intermittent peace processes and one in which nearly every decision is subordinated to Israeli preferences. That must change. The Trump administration may seem an unlikely agent for this change. But President Donald Trump is nothing if not unpredictable, and with his administration’s relationship to Israel in flux, there may be room for maneuver. And even if such a change does not happen under Trump, his successors in the White House will need a plan to treat ending the conflict as a geopolitical imperative. If the United States wants a more peaceful and stable Middle East, it must prioritize its bilateral relationship with the Palestinians. Put simply, it must help Palestinians build a state of their own.\nPROGRESSIVE ERA\nThe United States has pursued a nation-building strategy for the Palestinians in the recent past. The Palestinian Authority, the governing body established in the 1990s as part of the Oslo Accords, made great strides from 2007 to 2011 under Prime Minister Salam Fayyad toward building institutions that could eventually support statehood. Fayyad improved the PA’s financial management and transparency, and with the help of a U.S.-led training program, professionalized its security forces. Combined with billions of dollars of aid from Washington and other international donors, these reforms delivered rapid economic growth, increasing GDP in the West Bank by an average of ten percent every year for the first four years of Fayyad’s tenure. In 2011, the World Bank concluded that Palestinian institutions were “well-positioned to establish a state at any point in the near future.” Public support followed performance: A majority of Palestinians approved of PA President Mahmoud Abbas and indicated they would vote for him; 58 percent supported the two-state framework; and over 60 percent backed diplomacy and nonviolence.\nAnalysts often attribute the PA’s successes during this time to Fayyad’s technocratic leadership. But Fayyad could not have succeeded if not for the favorable conditions that made his governing agenda possible. Chief among them was preexisting political legitimacy. Two years before he appointed Fayyad as prime minister, Abbas secured a broad mandate by winning 62 percent of the vote in the Palestinian presidential election. Abbas’s electoral mandate and the relative popularity of his Fatah party provided Fayyad with the political cover he needed to pursue ambitious fiscal transparency reforms and consolidate the PA’s security control across major cities in the West Bank. These reforms gave Palestinians reason to believe that their institutions could deliver meaningful gains toward statehood.\nFayyad’s PA also operated alongside an Israeli government that viewed strengthening Palestinian moderates as a strategic priority. Israeli Prime Minister Ehud Olmert engaged regularly with Abbas, facilitated the transfer of Palestinian tax revenues collected by Israel on the PA’s behalf, and eased restrictions on movement by Palestinians in the West Bank. This cooperation did not resolve core political disputes—Olmert and Abbas ultimately failed to reach a final-status agreement—but it enabled Palestinian institutions to function effectively and deliver for their constituents.\nThe promise of Palestinian domestic legitimacy, backe", "translation_ja": "ここ数カ月、米国とイスラエルの関係はあらゆる方面から前例のない精査にさらされている。民主党上院議員40人が4月、ガザ、イラン、レバノンにおけるイスラエル政府の行動を理由にイスラエルへの武器売却を阻止する投票を行った。これはわずか1年前には想像もできなかった出来事だ。本誌ではアンドリュー・ミラーが、米国がイスラエルに対して長年提供してきた無条件の支援を終わらせ、両国間に「正常な」関係を築くべきだと主張した。イランとの戦争を受けて、批判の声にはトランプ大統領の支持連合のメンバーも加わるようになった。その多くは、イスラエルが米国を不必要かつ費用のかかる紛争へと引き 。主要なものに付け加えられた副次的な要素を指す。「treated as an adjunct to」で「〜の付属物として扱われた」という意味になる。"}, {"word": "technocratic", "definition": "テクノクラート的な、技術官僚的な。政治的イデオロギーより専門的・技術的知識に基づいてリーダーシップを発揮するスタイルを形容する形容詞。"}, {"word": "mandate", "definition": "（選挙などを通じて得た）権限、委任、信任。選挙で多数の票を獲得することで指導者が得る統治の正統性を指す政治用語。"}, {"word": "professionalized", "definition": "（組織や部隊などを）専門化・プロ化した。訓練や制度整備を通じて、ある集団の能力や規律を向上させることを意味する動詞の過去形。"}, {"word": "subordinated", "definition": "従属させられた、二次的な地位に置かれた。ある事項が他のより重要な事項の下位に位置づけられる状況を示す。外交・政策文書で使われる上級語彙。"}, {"word": "intermittent", "definition": "断続的な、時々起こる。定期的ではなく不規則に繰り返される状態を表す形容詞で、TOEIC高得点者向けの語彙。"}]}, {"title_ja": "AIインフラ構築の新たな道：国家的野心と地域の正当性をいかに両立させるか", "title_en": "A Better Way to Build AI Infrastructure: Balancing National Ambition with Local Legitimacy", "summary_ja": "著者は、AIインフラにおける米国の国家的野心と、プロジェクトを阻止・遅延させうる地域分権的なガバナンス構造との間に深刻な緊張関係があると主張する。ニューヨーク州カユーガ湖畔でのデータセンター計画に当事者として関わった経験を踏まえ、開発業者や規制当局は地域住民の支持を官僚的な障壁ではなく戦略的資産として扱うべきだと訴える。こうした転換ができなければ、公衆の同意なしに建設を進める中国などのライバル国に、米国は重要な技術的優位性を譲り渡すリスクがあると警告する。", "summary_en": "The author argues that the U.S. faces a critical tension between its national ambition to lead in AI infrastructure and the decentralized local governance structures that can block or delay projects. Drawing on personal experience with a data center proposal near Cayuga Lake, New York, the author contends that developers and regulators must treat community buy-in as a strategic asset rather than a bureaucratic hurdle. Without a new institutional model that sustains ongoing relationships with local communities, the U.S. risks ceding technological leadership to rivals like China who build without public consent.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/better-way-build-ai", "state_media": false, "category": "オピニオン", "full_text": "As the United States races to build the infrastructure required for artificial intelligence, it faces a constraint: legitimacy at the local level. Data centers, transmission lines, and energy-intensive computing facilities have become strategic assets, central to economic competitiveness and national power. Yet they must be sited, permitted, and sustained in communities whose priorities do not always align with national ambitions. The result is a widening gap between federal technological strategy and the local governance structures responsible for implementing it.\nThis tension between national ambition and local authority is not universal. In China, for example, large-scale digital infrastructure is planned, permitted, and constructed through nationally coordinated processes that subordinate local opposition to state priorities. The Chinese Communist Party treats data centers, transmission corridors, and energy projects as instruments of national strategy rather than negotiated outcomes. That model carries its own political and social risks, concentrating burdens on communities that lack the freedom to contest projects or the legal and political mechanisms to hold planners accountable. But it confers strategic advantage: speed, scale, and predictability.\nThe United States, by contrast, must pursue comparable ambitions within a decentralized system that grants local governments veto power. If the country is serious about leading in artificial intelligence, it will need an institutional model that connects national ambition with local legitimacy. Without such a model, the physical foundations of AI leadership will continue to be contested one community at a time—and each new data center risks becoming another battleground in a broader struggle over how technological progress is governed. The pattern is increasingly familiar: a company proposes a facility, a community mobilizes in opposition, and the debate devolves into mistrust, rumor, and hardened positions. The outcome is not simply delay but a loss of confidence on both sides that makes compromise increasingly difficult.\nThe challenge for democratic institutions is not to imitate China but to adapt fast enough to sustain technological leadership. That requires treating local buy-in as an asset rather than a hurdle. U.S. regulators and developers must transform permitting from a single moment of consent into a sustained relationship. If they fail to make this shift, the United States risks a future in which projects stall in litigation, local resistance hardens into permanent opposition, and the country cedes an important strategic advantage to rivals willing to build without the public’s consent.\nTHE VIEW FROM CAYUGA\nI have observed this debate not as a detached analyst but as a resident of Lansing, New York, where the energy and digital infrastructure company TeraWulf is seeking to develop a large data center campus supporting next-generation AI computing on the site of a retired coal plant. The proposal has drawn passionate support and opposition from local residents and officials.\nLike many in the community, I value Cayuga Lake not as an abstraction but as something irreplaceable that we have a duty to protect. At the same time, the region’s economic realities are difficult to ignore: a shrinking tax base, aging infrastructure, and rising public costs that have strained local government for years.\nAs both a resident who would live with the project’s consequences and a tech policy scholar who studies the governance of digital infrastructure and has a background in environmental impact, I offered to conduct an independent assessment of the project’s likely effects on water use, power demand, employment, and the local tax base. (The company agreed and compensated me for the time required to conduct the analysis. It had no role in determining the scope of the study, conducting the research, interpreting the findings, or drafting the report, and it exercised no editorial control over the final product.) I found that the engineering, on its own terms, was sound. The proposed closed-loop cooling system would largely eliminate operational water withdrawals from Cayuga Lake, replacing the retired coal plant’s once water-intensive operations. Similarly, although the data center campus’s electricity demand would be substantial, the site already has considerable transmission infrastructure and is located within a regional grid in which electricity generation is predominantly carbon free and sizable surplus capacity exists.\nRegulators and developers must treat local buy-in as an asset rather than a hurdle.\nMuch of the opposition ran on misinformation and the conflation of project-specific issues with broader anxieties. Some concerns reflected a general apprehension about AI, corporate power, and environmental change that extended beyond the project itself. Questions about surveillance, workers being displaced by AI, and environmental harm became intertwined with d", "translation_ja": "AIをより良く構築するために\n\n米国が人工知能に必要なインフラの整備を急ぐ中、一つの制約が立ちはだかっている。それは地域レベルにおける正当性の問題だ。データセンター、送電線、そしてエネルギーを大量に消費するコンピューティング施設は、経済競争力と国家権力の中核をなす戦略的資産となっている。しかしそれらは、国家の野心と必ずしも一致しない優先事項を持つ地域社会において、用地選定、許認可取得、そして持続的な維持管理が行われなければならない。その結果、連邦政府の技術戦略と、その実施を担う地方のガバナンス構造との間に、拡大する乖離が生じている。\n\nこうした国家的野心と地方の権限との緊張関係は、すべての国に共通するわけではない。たとえば中国では、大規模なデジタルインフラの計画、許認可、建設が国家主導の調整プロセスを通じて行われ、地域の反対意見は国家の優先事項に従属させられる。中国共産党はデータセンター、送電回廊、エネルギープロジェクトを、交渉によって決まる成果ではなく、国家戦略の手段として扱っている。このモデルには独自の政治的・社会的リスクが伴う。プロジェクトに異議を唱える自由も、計画者に責任を問う法的・政治的手段も持たない地域社会に負担が集中するのだ。しかしこのモデルは戦略的優位をもたらす。すなわち、スピード、規模、そして予測可能性だ。\n\nこれに対し米国は、地方政府に拒否権を与える分権化されたシステムの中で、同等の野心を追求しなければならない。もし米国がAIにおけるリーダーシップを真剣に目指すならば、国家的野心と地域の正当性を結びつける制度的モデルが必要になる。そうしたモデルがなければ、AIリーダーシップの物理的基盤は、地域ごとに争われ続けることになる。そして新たなデータセンターはいずれも、技術の進歩がどのように統治されるべきかをめぐる広範な闘争における新たな戦場と化すリスクがある。そのパターンはますます見慣れたものになってきた。企業が施設を提案し、地域社会が反対運動を起こし、議論は不信感、風評、そして硬直した立場へと崩壊していく。その結果は単なる遅延にとどまらず、双方の信頼が失われ、妥協がますます困難になるのだ。\n\n民主主義的制度にとっての課題は、中国を模倣することではなく、技術的リーダーシップを維持できる速さで適応することだ。そのためには、地域の支持を障壁ではなく資産として扱うことが求められる。米国の規制当局と開発業者は、許認可プロセスを一度限りの同意の瞬間から、継続的な関係へと転換しなければならない。この転換に失敗すれば、米国はプロジェクトが訴訟で頓挫し、地域の抵抗が永続的な反対へと硬化し、公衆の同意なしに建設を進めるライバル国に重要な戦略的優位を明け渡す未来に直面するリスクがある。\n\nカユーガからの視点\n\n私はこの議論を、超然とした分析家としてではなく、ニューヨーク州ランシングの住民として観察してきた。そこではエネルギー・デジタルインフラ企業のTeraWulfが、廃止された石炭火力発電所の跡地に、次世代AIコンピューティングを支援する大規模データセンターキャンパスを開発しようとしている。この提案は、地域住民や行政官から熱烈な支持と反対の両方を引き起こしている。\n\nこの地域の多くの人々と同様に、私はカユーガ湖を抽象的な存在としてではなく、私たちが守る義務を持つ、かけがえのない存在として大切に思っている。同時に、この地域の経済的現実も無視できない。縮小する税基盤、老朽化したインフラ、そして長年にわたって地方行政を圧迫してきた増大する公共コストだ。\n\nプロジェクトの影響を受けて生活する住民として、またデジタルインフラのガバナンスを研究し環境影響評価の背景を持つテクノロジー政策研究者として、私はこのプロジェクトが水使用量、電力需要、雇用、地方税基盤に与える可能性のある影響について独立した評価を実施することを申し出た。（同社はこれに同意し、分析の実施に必要な時間に対して私に報酬を支払った。同社は調査範囲の決定、研究の実施、調査結果の解釈、報告書の起草において何ら関与しておらず、最終的な成果物に対する編集上の管理も一切行使しなかった。）私の調査では、工学的観点からは、この計画は適切なものであることが分かった。提案されている密閉ループ冷却システムにより、カユーガ湖からの運用上の取水はほぼ排除され、かつての石炭火力発電所が行っていた水集約的な操業に取って代わることになる。同様に、データセンターキャンパスの電力需要は相当なものになるが、敷地にはすでにかなりの送電インフラが整備されており、電力発電が主に炭素フリーで相当の余剰容量が存在する地域グリッド内に位置している。\n\n規制当局と開発業者は、地域住民の支持を障壁ではなく資産として扱わなければならない。\n\n反対意見の多くは誤情報と、プロジェクト固有の問題をより広範な不安と混同することに基づいていた。一部の懸念は、AIそのもの、企業権力、そして環境変化に対する一般的な不安を反映しており、プロジェクト自体を超えたものだった。監視、AIによる労働者の置き換え、環境被害に関する疑問が、プロジェクト固有の事実とは無関係な議論と絡み合っていった。", "vocab": [{"word": "legitimacy", "definition": "正当性・合法性を意味し、特に政治・社会的文脈で、権力や決定が広く受け入れられ認められている状態を指す。本文では地域コミュニティからの承認・信頼という意味で使われている。"}, {"word": "decentralized", "definition": "権限や機能が中央ではなく複数の地方・地域単位に分散している状態を指す形容詞。対義語はcentralized（集権化された）で、米国の地方自治の仕組みを説明する際に用いられている。"}, {"word": "permitting", "definition": "政府機関が事業や建設プロジェクトに対して許可証（permit）を発行するプロセス全体を指す名詞。インフラ開発の文脈では、規制当局による審査・承認手続きを意味する。"}, {"word": "subordinate", "definition": "動詞として使う場合、あるものを別のものより下位に置く、または従属させることを意味する。本文では地域の反対意見を国家の優先事項に従わせるという文脈で使われている。"}, {"word": "conflation", "definition": "異なる二つ以上の概念や問題を混同・混在させて一つのものとして扱ってしまうことを指す名詞。本文ではプロジェクト固有の問題とより広範な社会的懸念を混同することを批判する文脈で使われている。"}, {"word": "confers", "definition": "動詞conferの三人称単数形で、利益・称号・権利などを与える・付与するという意味。本文では中国モデルが戦略的優位をもたらすという文脈で使われている。"}, {"word": "apprehension", "definition": "漠然とした不安・危惧・懸念を意味する名詞。単なる心配（worry）よりもやや格式が高く、将来に対する根拠のはっきりしない恐れを指すことが多い。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}

document.getElementById("footer").textContent="Generated 2026-07-07 12:49 JST";
renderTabs();renderList();
</script>
