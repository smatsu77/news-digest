Tehran privately acknowledged to Trump's advisers that the recent shooting at ships was a mistake, and that an \"errant\" sect of hardliners was trying to undermine negotiations, senior US officials told CBS News, the BBC's US partner.\nOne official told the TV network: \"They [the Iranians] came back to the table and said, 'We screwed up. We made a mistake. Let's keep talking.'\"\nThe incident prompted a series of US strikes on around 90 targets across Iran. On Saturday Iran's Health Ministry said 17 people were killed in the strikes and 115 injured. Iran responded with strikes on US allies in the Gulf.\nIn a briefing for reporters on Friday, the US officials said a message to Tehran's leadership had been conveyed through regional mediators demanding Iran release a statement declaring the Strait of Hormuz open and pledging to stop shooting at commercial ships, according to multiple media reports.\n\"They're either going to give us that statement or we're not having a good outcome for them,\" said one official, quoted by Reuters news agency.\nThe White House also wants Iran to publicly acknowledge that firing on the shipping was a mistake, CBS reports.\nMeanwhile, a delegation from Qatar travelled to Iran on Friday for talks aimed at defusing tensions and easing navigation through the Strait of Hormuz - the vital waterway where some 20% of the world's oil and liquefied natural gas passes.\nTrump wrote in a post on Truth Social earlier on Friday: \"The Islamic Republic of Iran has asked us to continue 'talks.'\n\"We have agreed to do so, but the United States has stated to them, in no uncertain terms, that the Cease Fire is OVER!\"\nIt is not clear when those talks will be held. Vice-President JD Vance, Secretary of State Marco Rubio, as well as special US envoys Steve Witkoff and Trump's son-in-law Jared Kushner, are expected to oversee negotiations for the US.\nAccording to Iranian media, Araghchi is in Oman for talks with Omani officials.\nA US official said American technical teams would not be present in Oman, but would be in touch with the Omanis and Qataris as developments occurred.\nIn the early hours of Saturday, Trump also responded to reports that Iran had plans to assassinate him.\nThe US would \"completely decimate and destroy all areas\" of the country in retaliation to such an attack, he said.\nThe Wall Street Journal and other US media reported this week that Israel had shared intelligence with Washington that Iran had recently devised a plan to assassinate the US president.\nHowever, Trump denied that Tehran had made a fresh plan or that Israel was the source of any intelligence. He told the New York Post in an interview that he had been \"No. 1 [on Iran's kill list] for a long time\".\nThere were also open calls for Trump's death at the funeral of Iran's late Supreme leader Ayatollah Ali Khamenei, who was killed in an Israeli strike on his residence in Tehran on 28 February.\nOn Saturday, his son and successor, Mojtaba Khamenei, released a written message that said vengeance for his father's killing was \"inevitable\".\nThe \"matter depends neither on my personal existence nor on that of other officials. Whether we are present or not, it will come to pass,\" Khamenei said.\nThree ships were struck while using a US-recommended route through Omani waters early this week in the worst exchange of fire between the US and Iran since the two nations signed an interim deal in June. Iran has repeatedly said the only \"safe\" passage is a separate route through its waters.\nIn accordance with the US-Iran memorandum of understanding, Iran and Oman must hold talks \"to define the future administration and maritime services\" in the strait with other Gulf states.\nIran has suggested ships would need to pay to pass through Hormuz - with the US saying navigation through the waterway must remain free.\nRelated topics\n- Published3 days ago", "translation_ja": "", "vocab": []}, {"title_ja": "Spain battles to contain one of its deadliest wildfires as at least 12 killed", "title_en": "Spain battles to contain one of its deadliest wildfires as at least 12 killed", "summary_ja": "At least four Britons are believed to be among the victims of the blaze, which left another 23 people missing.", "summary_en": "At least four Britons are believed to be among the victims of the blaze, which left another 23 people missing.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c1wyv383j2xo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Spain battles to contain one of its deadliest wildfires as at least 12 killed\n- Published\nHundreds of firefighters in Spain are still battling to contain pockets of flames in the south east after one of the country's worst-ever wildfires.\nEmergency services have been deployed around the village of Bedar where 12 people have been killed - among them four Britons, according to Spanish authorities. Another 23 people are still missing.\nLocal officials in the Los Gallardos area of Almería have warned the number of dead could rise, with fears that more Britons are among those killed.\nA sustained heatwave with temperatures of around 40C (104F) has caused wildfires across Southern Europe this summer, particularly in France, Portugal and Spain.\nSoaring temperatures, incredibly dry ground and powerful winds led to the Los Gallardos fire spreading quickly on Thursday afternoon.\nAntonio Sanz, Andalusia's health and emergencies minister, said on Saturday the fire had burned across 6,600 hectares (16,300 acres) of land.\nThe cause has been put down to a fallen power line, but local electricity companies have denied this.\nNo additional information has been given about the four people who were found dead in a burnt-out car.\nSanz said previously they are believed to be \"of British origin\" and that the car had a steering wheel on the right.\nHe also said weather conditions had improved overnight, \"allowing us to face the day with better prospects than yesterday\".\nHe added: \"This is the first day we will be able to mount a direct attack on the fire. Until now, weather conditions and the behaviour of the blaze only allowed us to work defensively.\"\nLucinda Curtois, who arrived in Spain with her partner Riyaz Cheytan and their teenage children for a holiday on Thursday, described their escape from Bedar.\n\"It was almost like there was a mushroom cloud of smoke, it was like a bomb had gone off,\" she said.\nCurtois told the BBC she feared at least two other UK nationals had been killed.\n\"They left their home on foot, I don't know why,\" she said. \"I can only presume it was probably because their road was cut off because they live out in the countryside.\"\nOfficials in Bedar said some of those who had died had not taken a recommended evacuation route - but it's not clear how well that guidance was conveyed.\nNeither the Spanish authorities - nor the Foreign Office in London - have revealed the identity of the deceased.\nSanz said the rapid fire had been complex and the majority or even all of the victims may have been foreign nationals.\nBelgian Foreign Minister Maxime Prévot said many Belgians had second homes in the country and consular services were trying to contact \"Belgians with whom they have not been able to get in touch\".\nWith at least 12 people dead, this is already among the deadliest wildfires in Spanish history.\nIn 1984, 20 people died in a fire on the Canary Island of La Gomera, while in 1979, 21 people, including nine children, died in a forest fire near Lloret de Mar in north-eastern Spain.\nWildfires have also plagued France over the summer months.\nOn Monday over 10,000 people were evacuated from their homes in the foothills of the French Pyrenees.\nBut in a social media post on Saturday French Interior Minister Laurent Nuñez said 32 people had been arrested on suspicion of starting some of the fires.\n\"These unacceptable behaviours, which lead to disastrous consequences and put our firefighters' lives at risk, will now be brought before the courts,\" he said.\nClimate change is driving up temperatures around the world, and Europe is the fastest warming continent, heating up twice as fast as the global average, according to the Copernicus climate service.\nThis is causing increased summer heatwaves, greater pressure on Europe's water supply, and more intense wildfires.\nAdditional reporting by Dearbail Jordan\nGet in touch\nHave you been affected by the wildfires and extreme heat in Southern Europe? If it is safe to do so, get in touch.", "translation_ja": "", "vocab": []}, {"title_ja": "Trump administration subpoenas New York Times journalists over Air Force One reporting", "title_en": "Trump administration subpoenas New York Times journalists over Air Force One reporting", "summary_ja": "The reporters received the legal summons after they reported on alleged security issues with the president's new plane, which was gifted by Qatar.", "summary_en": "The reporters received the legal summons after they reported on alleged security issues with the president's new plane, which was gifted by Qatar.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cpd3g8q51g7o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Trump administration subpoenas New York Times journalists over Air Force One reporting\n- Published\nSeveral New York Times journalists were summoned to testify under oath after they reported alleged security concerns involving President Donald Trump's new Air Force One plane, the US newspaper said.\nFederal agents delivered subpoenas to reporters' homes demanding they appear before a federal grand jury investigating a potential crime, the Times said.\nThe paper had published stories alleging that the Qatari-gifted plane was not secure enough, and the Secret Service urged Trump to switch planes on his way home from a Nato summit in Turkey.\nThe Justice Department told the BBC it was investigating illegal leaks, adding: \"Reporters are not the targets, those leaking classified information are.\"\nDavid McCraw, the Times's top newsroom lawyer, called the summons a \"brazen act\" and \"nothing more than an attempt to prevent the public from knowing what is happening in their country by intimidating journalists from doing their jobs\".\nThe subpoenas - a legal requirement from a court or government agency that compels a person to appear or produce records or evidence - say the reporters' testimony is required \"in regard to an alleged violation of federal criminal law\", the Times reported.\nThe summonses require the reporters to appear before a grand jury in Manhattan on Wednesday, the Times said. Grand jurys are composed of members of the public and convened by the US government to examine evidence and decide if there is enough to charge a person or persons with a crime.\nThe New York Times reported on security concerns about the president's plane citing unnamed sources. While speaking to media about classified information is a crime, the US Constitution protects the freedom of the press to report information in the public interest.\n\"We value and appreciate the important role that the press plays in this country, but DOJ also plays an important role to make sure that the people entrusted with our nation's secrets do what they're supposed to do with that information, which means not sharing classified information,\" the Justice Department (DoJ) said in a statement provided to the BBC.\nThe Times reported on Wednesday that while Trump flew to the Nato summit in Turkey on the new Air Force One, he left the summit on an older plane on the advice of the Secret Service. The next day, the newspaper reported that security officials were concerned the newer plane did not have advanced security features, including antimissile capabilities.\n\"Our journalists report the facts and advance the American public's right to know how their government is operating and their taxpayer dollars are being used,\" McCraw, the Times' lawyer, said.\nOther outlets published similar reports, including CBS News, the BBC's US news partner. A former US government official told CBS that there was not enough time or money for the plane to be updated with the security requirements to serve as Air Force One.\nWhile these reports were surfacing, tensions with Iran over a negotiated ceasefire deal were growing, and the US was launching strikes.\nTrump brushed off concerns about the plane when asked by reporters this week and said: \"I have a threat all the time. I'm No. 1 on their list\".\nLast month, Trump unveiled the new Boeing 747-8 jet that the Qatari government donated last year as an \"unconditional\" gift to the US to act as the new Air Force One.\nThe luxury jumbo jet was modified to transport the president and included upgrades in security, mission communications, logistics support, and advanced technology, the Air Force said. Any potential threats identified with the use of previously owned aircraft were \"neutralised\" in the new one, it added.\nIt has been valued at an estimated $400m (£300m).\nRelated topics\n- Published19 June", "translation_ja": "", "vocab": []}, {"title_ja": "TV presenter Dermot Murnaghan dies aged 68", "title_en": "TV presenter Dermot Murnaghan dies aged 68", "summary_ja": "The former BBC, ITV and Sky News journalist has died after revealing he had stage four prostate cancer.", "summary_en": "The former BBC, ITV and Sky News journalist has died after revealing he had stage four prostate cancer.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c20yvg13nqpo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "TV presenter Dermot Murnaghan dies aged 68\n- Published\nTV presenter Dermot Murnaghan has died, a year after he revealed he had been diagnosed with stage four prostate cancer.\nThe former BBC, ITV and Sky News journalist was 68.\n\"It is with great sadness that the family of Dermot Murnaghan announces that he passed away at home in North London earlier this morning,\" his family said in a statement posted to his X account. \"He died peacefully with his family at his side.\"\nA fixture on British TV news across five decades, he presented flagship programmes including the ITV Evening News and the BBC News at Six and Ten.\nMurnaghan was a main presenter of BBC Breakfast from September 2002 to December 2007 and also hosted quiz show Eggheads.\nWhen he revealed his diagnosis last summer, he said he was \"responding positively\" to treatment and \"feeling well\".\nHe became an outspoken advocate for men to get tested for the condition.\n\"Needless to say my message to all men over 50, in high risk groups, or displaying symptoms, is get yourself tested and campaign for routine prostate screening by the NHS,\" he said.\n\"Early detection is crucial. And be aware, this disease can sometimes progress rapidly without obvious symptoms.\"\nHis family thanked the public \"for the many, many kind messages of goodwill that he received over the last year since his diagnosis of Stage IV prostate cancer and his subsequent campaigning to raise awareness for screening programmes for the disease\".\nCommon prostate cancer symptoms can include needing to urinate more frequently, particularly at night; difficulty starting to urinate, weak flow and it taking a long time; and blood in urine or semen. However, there may be no sign or symptoms for years.\nBorn in England, Murnaghan's family moved to Northern Ireland when he was a child. He went to primary school in Armagh city and attended secondary school in Holywood, County Down.\nAfter graduating from Sussex University, he completed a postgraduate course in Journalism at City University.\nMurnaghan started his career at local newspapers, before later moving to Channel 4 News and fronting ITV shows including The Big Story and the News at 10 from 1993 to 1997, and the channel's Evening News and Nightly News from 1999 to 2001.\nIn 1998, he won a Royal Television Society award for his interview with Peter Mandelson over a secret loan of £373,000 he received from his ministerial colleague Geoffrey Robinson. Mandelson resigned from government the following day.\nMurnaghan moved to the BBC in 2002, as one of the main hosts of BBC Breakfast, the Six O'Clock News and the Ten O'Clock News.\nHe presented Eggheads for 11 years from 2003, and was one of the faces of Sky News from 2007 to 2023.\nMurnaghan also hosted the documentaries Crimes That Shook Britain for Channel 5 and Killer Britain for the Crime + Investigation UK channel.\nHe later launched his podcast Legends of News, speaking to other seasoned journalists and correspondents about major stories they had covered.\n'A legend of news'\nTributes have been pouring in for Murnaghan.\n\"He was peerless in the presenter chair,\" Sky News' political editor Beth Rigby posted on X.\n\"I loved being on set, or in Downing Street, with Dermot because he was always in absolute command but so cool too. He made handling the most high-pressure moments look effortless.\"\nSky News presenter Anna Botting said he would \"always be a legend of news\".\nJonathan Munro, interim CEO of BBC News, said: \"Dermot was a true gentleman, and a brilliant journalist and broadcaster who was much-loved by viewers and by his BBC colleagues.\"\n\"He was a consummate professional and someone who really had a natural ability to connect with audiences,\" he added.\nBroadcaster Piers Morgan said it was \"very sad news\", adding that \"Dermot was a terrific journalist, and a lovely man\".\nChannel 4 News lead anchor Krishnan Guru-Murthy said: \"What a sad loss so young.\n\"Dermot was a very fine journalist and presenter whose career spanned all the main British broadcasters. He was also very kind,\" he said, referencing his charity work.\nFormer Prime Minister David Cameron, who has also been treated for prostate cancer, said the presenter's decision to highlight the importance of testing will have helped many men.\n\"I think it's really important that Dermot came out in the way that he did - as in his broadcasting life, he did it with incredible clarity and just simplicity,\" Lord Cameron told Sky News.\n\"And as someone who was so well-known to people through his broadcasting career over 40 years, it will have had a huge impact.\"\nLiberal Democrat leader Sir Ed Davey said Murnaghan was a \"broadcasting legend who we have lost far too soon\".\n\"His tireless advocacy, encouraging more men to get tested for prostate cancer, will no doubt have saved lives.\"\n- Published23 June 2025", "translation_ja": "", "vocab": []}, {"title_ja": "Reeves tells BBC: Burnham needs worked-through plan to govern from the start", "title_en": "Reeves tells BBC: Burnham needs worked-through plan to govern from the start", "summary_ja": "The Chancellor tells Laura Kuenssberg she will be handing over a stable economy to the incoming PM.", "summary_en": "The Chancellor tells Laura Kuenssberg she will be handing over a stable economy to the incoming PM.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cwykdvgv4d4o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "経済", "full_text": "Reeves tells BBC: Burnham needs worked-through plan to govern from the start\n- Published\nRachel Reeves has warned the incoming prime minister, Andy Burnham, that he needs to be properly prepared to govern when he arrives in Downing Street in a little more than a week.\nSpeaking exclusively to the BBC in what is likely to be her last major interview as chancellor, Reeves told Laura Kuenssberg that \"it is important that when Andy walks through that door he has a worked-through plan, because governing is hard in Britain, and lots of challenges and shocks will come his way\".\nShe said Burnham and his team coming into Downing Street must be \"really clear about what they want to achieve\", and that \"he needs to stay laser-focused on those things that have always motivated him, have always driven him\".\nAsked why Sir Keir Starmer's time in office was coming to an end, she said: \"People are impatient for change - I'm impatient for change and I totally get that people want to see their lives changed faster.\"\nWe sat down in one of the lavish 17th Century state rooms upstairs in No 11 Downing Street - exactly the same room where she gave her first full interview as chancellor in July 2024.\nShe would never have suspected then that she and her next-door neighbour would be moving out just 24 months later. Reeves wouldn't explicitly say who should be the next chancellor, or even if she would like to stay.\nShe has always told us that being chancellor is her \"dream job\". She and her team clearly do not expect to stay in No 11, but with the incoming No 10 team tight-lipped about its cast list, we just don't know.\nReeves said that she had returned \"stability and trust\" to the economy over the past two years, and that \"Andy will take over an economy that is much stronger than the one I inherited from the Conservatives just two years ago.\"\nIn the interview, Reeves wanted to focus on what she described as the \"big picture\" - government borrowing costs that have gone down, inflation way down from its peak, increased investment in infrastructure like roads and railways, and the economy growing faster than the UK's nearest competitors.\nBut by other measures, there are still big problems in the economy. Inflation is still above target and is expected to rise, growth has been slow, and just this week, the Bank of England warned that interest rates might have to go up again.\nThe country's debts are due to be higher at the end of this parliament than they were when Labour moved in. And more than anything else, firms and families' spending power is still under pressure, with the latest ONS figures showing disposable income falling.\nOne former senior minister told me Reeves had \"spent a lot of time and energy painting a picture of her grim inheritance in the expectation things would brighten up quickly and she could claim credit\".\n\"By the time she found that things were different, with tight public finances, mushrooming welfare, and the economy stuck in a low-growth trap, she had used up all her political capital and was unable to win the big arguments on welfare reform,\" they said.\n\"It's all actually sad because I think her instincts are generally OK, but by the time she figured out the right things to do, it was too late\".\nA close political ally of Starmer, Reeves became shadow chancellor in 2021 as Labour campaigned to return to power, resulting in their landslide victory two years ago.\nMany Labour MPs believe mistakes made in No 11 soured the prospects for Starmer's government soon after he and Reeves moved into Downing Street. Starmer himself has pointed to the decision to take away the winter fuel allowance from millions of pensioners, later partly reversed, as being one of the government's errors.\nA senior Labour figure told me: \"She'd underestimated the desire for radical change, and lacked political nous on key decisions like winter fuel.\"\nReeves however, would not acknowledge this had been a specific problem, and was eager to highlight the progress she believed the economy has made on her watch. Nor was she in the mood to admit that her relationship with business had worsened after she hiked National Insurance tax for employers.\nOne City source told me the increasing costs for business had an immediate effect, and led to them laying off staff. \"There was so much goodwill, but it was genuinely staggering - it just went in a few weeks,\" they said.\nReeves credited her decisions as the first female chancellor with creating a \"rock of stability and trust\", but acknowledged there had been tough moments in office.\nShe said the worst had been when she was seen in tears in the House of Commons during a session of Prime Minister's Questions in July last year. Reeves said: \"Don't cry on national television. That was probably my toughest moment, or perhaps even tougher, seeing the photos of me crying on national television on the front page of pretty much every newspaper the following day.\"\nAsked if she was disappointed that Burnham has been p", "translation_ja": "", "vocab": []}, {"title_ja": "Pubs can stay open for full Norway game - even if kick-off delayed", "title_en": "Pubs can stay open for full Norway game - even if kick-off delayed", "summary_ja": "The extended hours means fans can watch the entire game, even if the start is delayed.", "summary_en": "The extended hours means fans can watch the entire game, even if the start is delayed.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cm204lgrv10o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Pubs can stay open for full Norway game - even if kick-off delayed\n- Published\nEngland fans can stay in the pub - either celebrating or commiserating with each other - until 30 minutes after the final whistle is blown in the World Cup quarter-final against Norway, the government has said.\nExtended licensing hours will allow supporters in England and Wales to watch the entire game, even if the start is delayed because of extreme heat. An earlier extension had allowed venues to stay open until 02:00 BST.\nThe Three Lions are due to kick off at 22:00 (18:00 local time) at the Hard Rock Stadium, in Miami, Florida.\nIt comes after England's match against Mexico on 2 July, held at the host country's Azteca Stadium, began an hour later than scheduled because of storms.\n\"England fans deserve the chance to watch every minute of the quarter-final together, and that is exactly what our extension guarantees,\" said Policing Minister Sarah Jones.\n\"After the weather delay we saw before the Mexico game, we want to give fans and venues complete certainty that no-one will miss a moment of the action.\"\nThere was confusion ahead of the Mexico game after Fifa went back on a plan to bring the game forward because of bad weather. It was eventually delayed by an hour, after heavy rain in Mexico City and reports of lightning above the stadium.\nJones said she hoped pubs and bars would be \"packed\" for the game, as England \"hopefully move one step closer to bringing football home\".\nIn a statement on Saturday, the Home Office said the extended hours would apply to any further England matches, including potentially the final, ensuring that venues can stay open 30 minutes after the final whistle.\nThe blanket extension means individual venues do not need to apply for extended hours.\nLicensing hours had already been extended for the World Cup, from 23:00 to 01:00 for games with kick-offs from 17:00 up to 21:00, and until 02:00 for kick-offs between 21:00 and 22:00.\nThe home secretary has the legislative power to extend licensing hours on occasions of \"exceptional international, national or local significance\".\n'Tough for players and spectators alike'\nThe threat of high temperatures has been a feature of the World Cup, being co-hosted by Mexico, Canada and the United States.\nFifa also introduced mandatory hydration breaks midway through each half to help players tackle the heat and humidity.\nBBC lead weather presenter Matt Taylor said: \"It's going to be a tough day for players and spectators alike in Miami, as heat and humidity levels soar.\"\nThe National Weather Service has issued a heat advisory for the city from 11:00 to 19:00 local time.\n\"Daytime temperatures will peak at a scorching 33C (91.4F), but the impact of high humidity levels means that it will feel much more like it is 43C out there,\" said Taylor.\nAt kick-off time, the risk of storms in the area stands at about 20-30%, Taylor added. Any lightning reported within eight miles of the stadium would mean an automatic 30-minute delay.\nGlobal sporting bodies such as Fifa use an index called Wet Bulb Globe Temperature (WBGT), taking into account temperature, humidity, time and amount of sunshine, to decide if it is safe to play.\nIn its guidelines for playing in heat, external players' union Fifpro says a WBGT above 28C should lead to the \"delay or postponement of matches\" until conditions are safer.\nCurrently, the wet bulb temperature forecast for Miami falls at 27C. There is no suggestion the game will not take place.\nRelated topics\n- Published13 April", "translation_ja": "", "vocab": []}, {"title_ja": "Vietnam: Indian tourists killed in boat capsize", "title_en": "Vietnam: Indian tourists killed in boat capsize", "summary_ja": "The Indian embassy released the names of all 32 Indians who were aboard the boat that capsized near Phu Quoc island in Vietnam. At least 15 of them died.", "summary_en": "The Indian embassy released the names of all 32 Indians who were aboard the boat that capsized near Phu Quoc island in Vietnam. At least 15 of them died.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/vietnam-indian-tourists-killed-in-boat-capsize/a-77916717?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Vietnam: Indian tourists killed in boat capsize\nJuly 11, 2026At least 15 Indian tourists were killed after a boat carrying a group of Indian tourists capsized off Vietnam's southern island of Phu Quoc, according to local media.\nAccording to Vietnam's VnExpress website, the boat had 36 people on board when it overturned approximately 400 meters off the coast of May Rut Ngoai islet.\nMultiple tourist and coast guard boats participated in the rescue effort, during which some people were safely rescued from the water.\nTwenty-one people were rescued, and all the dead were recovered, authorities said.\nWhat did the Indian embassy say?\nThe Indian Embassy in Vietnam has released the names of all the 32 Indians onboard the boat.\n\"In a tragic incident, a boat carrying several Indian tourists capsized near Phu Quoc Island in Vietnam a few hours ago,\" the Indian embassy in Vietnam said in an earlier statement on X on Saturday.\nIt said it has set up control rooms at the Consulate General of India in Ho Chi Minh City and at the Embassy in Hanoi to provide information and assistance.\nIndian Prime Minister Narendra Modi said the tourists were taking part in an annual meeting of a private mobile phone company. He wrote on social media that the Indian Embassy personnel were at the scene.\nMany of those on board were Lava Mobile employees and distributors from the state of Andhra Pradesh.\nEdited by: Dmytro Hubenko\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google by clicking here and hitting the \"star\" or \"preferred\" button, so you'll always see our verified news first.", "translation_ja": "", "vocab": []}, {"title_ja": "Germany: Left-wing group says it is behind railway sabotage", "title_en": "Germany: Left-wing group says it is behind railway sabotage", "summary_ja": "The \"Angry Birds Commando\" group said they placed incendiary devices on a railroad between the two busy cities of Cologne and Düsseldorf. The group blamed industrial technology for the destruction of the environment.", "summary_en": "The \"Angry Birds Commando\" group said they placed incendiary devices on a railroad between the two busy cities of Cologne and Düsseldorf. The group blamed industrial technology for the destruction of the environment.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-left-wing-group-says-it-is-behind-railway-sabotage/a-77916758?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "IT", "full_text": "Germany: Left-wing group says it is behind railway sabotage\nJuly 11, 2026A left-wing activist group on Saturday claimed responsibility for sabotaging a railway line in western Germany.\nWhat do we know so far?\nThe \"Angry Birds Commando\" group, in a letter posted on German left-wing website indymedia.org, said it placed incendiary devices on the railway line between Cologne and Düsseldorf.\nA fire was ignited in two places between the German city of Leverkusen and the town of Langenfeld on Friday morning, stopping train operations and causing disruption. Firefighters extinguished the flames but the damage on the track remained.\nIn the online letter claiming responsibility, the \"Angry Birds Commando\" group blamed industrial technology for the destruction of the environment: \"This movement will prevent the planet from being shredded.\"\nUnclear when normal train operations will resume\nRepair work on the train line is expected to continue through Saturday afternoon. The act of vandalism has caused cancellations and delays, and it's unclear when normal operations will resume.\nGerman dpa news agency cited security sources who suspect the letter is genuine.\nMeanwhile, Cologne police say an investigation has been launched and have put out a call for witnesses.\nThe \"Angry Birds Commando\" group has claimed responsbility for earlier sabotage, causing disruption on train line used by Deutsche Bahn between the cities of Düsseldorf and Duisdorf in 2025.\nEdited by: Dmytro Hubenko\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google by clicking here and hitting the \"star\" or \"preferred\" button, so you'll always see our verified news first.", "translation_ja": "", "vocab": []}, {"title_ja": "Germany's richest man takes on Big Tech", "title_en": "Germany's richest man takes on Big Tech", "summary_ja": "Dieter Schwarz made his fortune from supermarkets, becoming Germany's wealthiest person. Now he wants to take on Google, Microsoft and Amazon and an entire region stands to benefit.", "summary_en": "Dieter Schwarz made his fortune from supermarkets, becoming Germany's wealthiest person. Now he wants to take on Google, Microsoft and Amazon and an entire region stands to benefit.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-s-richest-man-takes-on-big-tech/a-77893723?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "Germany's richest man takes on Big Tech\nJuly 11, 2026When Bernd Wagner walks through his new company's headquarters, he can barely contain his enthusiasm. He starts rattling off figures like \"seven times as much steel as was used to build the Eiffel Tower\" or \"cables stretching all the way to Naples.\"\nWagner is responsible for cloud business and sales at Schwarz Digits. All that steel and cabling has gone into the new head office, which will officially open on July 21, 2026.\nThe campus, designed for 3,500 employees and complete with a daycare center, restaurant and fitness facilities, is reminiscent of the headquarters of Amazon, Apple, or Google.\nPerched on a hillside, five multi-story curved glass buildings in a honeycomb arrangement surround a small pond at the center of the so-called \"Schwarz Digits Campus,\" with plenty of greenery and shaded benches. \"This is a statement,\" says Wagner. \"We don't have to hide from Google or anyone else.\"\nFrom supermarkets to digitalization\nThe new offices, however, are not located in California, but in Bad Friedrichshall — a small town in southern Germany. It is not far from Heilbronn, the hometown of Wagner's boss, who is arguably Germany's wealthiest individual: Dieter Schwarz, now 86 years old.\nIt was from Heilbronn that Schwarz built his supermarket empire. Now, more than 600,000 people worldwide work for companies under the Schwarz Group umbrella.\nThe conglomerate grew large primarily through its Lidl and Kaufland supermarket chains. But because the Schwarz Group prefers to keep everything in house, it has expanded in all directions: food production, waste management, recycling — and now digitalization.\nLast year, the Schwarz Group generated nearly €185 billion (€162 billion) in revenue, more than SAP, Mercedes, or Bayer. In Germany, only the automaker Volkswagen made more money than Schwarz.\nThe Schwarz Group has long had a reputation for secrecy. Its founder is rarely discussed publicly. To this day, hardly any photographs of Schwarz exist. Some reports say he can walk freely around Heilbronn without being recognized.\nBetting on Germany as a business location\nNow the Schwarz Group is making headlines with a new story — one about digital independence and Germany as a hub for innovation. \"If you're not at the table, you end up on the menu,\" says Wagner from his air-conditioned office.\nSchwarz Digits has spent recent years primarily managing the IT infrastructure of some 14,500 supermarkets worldwide. Now, the company is now offering its cloud and security solutions to businesses and government agencies as well.\nThe goal, says Wagner, is to ensure that Germany and Europe regain their seat at the table and are no longer entirely dependent on technology from the United States or China: \"We want to restore Europe's ability to act.\"\nIt is a strategy that is clearly in tune with the times. The company is currently winning one major contract after another. Its clients and partners include the Dutch government, various German ministries, and the German Football Association (DFB).\nIn the Spreewald region, about an hour's drive south of Berlin, Schwarz Digits is building a data center. At €11 billion, it represents the single largest investment in the company's history.\nHow much the new headquarters in Bad Friedrichshall cost remains undisclosed. What is clear is that the facility is intended to attract and retain IT talent. The message is straightforward: Why move to the expensive Silicon Valley when you can steer the future right here in southern Germany?\nHeilbronn transforms into a knowledge city\nBillionaire Schwarz learned early that success depends on people, talent and education. The Dieter Schwarz Foundation has been active since 1999, with a focus on education, science, research and entrepreneurship. Anyone strolling through Heilbronn can see how the talents of tomorrow are being cultivated here.\nOne example is the Education Campus of the Dieter Schwarz Foundation, where numerous German research institutions train around 8,000 students — with plans to significantly expand that number.\nNot far away stands the Experimenta, which bills itself as Germany's largest science center. Visitors can experience artificial intelligence and technology firsthand. The Experimenta has become both the city's landmark and a major tourist attraction.\nHeilbronn's mayor, Harry Mergel, helped initiate the construction of the Experimenta 20 years ago, when he held a different civic role. One of the major funders at the time was the Dieter Schwarz Foundation.\nMergel has been mayor of the city of more than 130,000 residents since 2014. He, too, speaks sparingly about Schwarz, the prominent patron who continues to live in the city and prefers to stay out of the spotlight. \"Everyone has the right to anonymity,\" Mergel says.\nMega-Project: Artificial Intelligence Campus\nThere is, however, one thing he is willing to share: \"The Schwarz Group and the Dieter Schwarz Foundation play a decisive role i", "translation_ja": "", "vocab": []}, {"title_ja": "Iran live updates: Khamenei vows revenge for his father’s death", "title_en": "Iran live updates: Khamenei vows revenge for his father’s death", "summary_ja": "President Donald Trump announced \"major combat operations\" against Iran on Feb. 28, with massive joint U.S.-Israeli strikes.", "summary_en": "President Donald Trump announced \"major combat operations\" against Iran on Feb. 28, with massive joint U.S.-Israeli strikes.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/International/live-updates/iran-live-updates-thousands-throng-tehran-streets-khamenei/?id=134509610", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "LIVE:  ABC News Live", "title_en": "LIVE:  ABC News Live", "summary_ja": "24/7 coverage of breaking news and live events", "summary_en": "24/7 coverage of breaking news and live events", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Missouri flooding: Campers rescued after building collapses into floodwaters", "title_en": "Missouri flooding: Campers rescued after building collapses into floodwaters", "summary_ja": "The governor of Missouri has declared a state of emergency on Friday in response to flash flooding in central, south-central and southeastern parts of the state.", "summary_en": "The governor of Missouri has declared a state of emergency on Friday in response to flash flooding in central, south-central and southeastern parts of the state.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/US/missouri-governor-declares-state-emergency-flooding-rain/story?id=134658727", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Nigeria says army has killed 300 bandits in north-western state of Zamfara", "title_en": "Nigeria says army has killed 300 bandits in north-western state of Zamfara", "summary_ja": "Vigilantes also took part in the fight that raged all night and the following morning, residents say Nigerian soldiers killed more than 300 members of kidnapping and cattle bandit gangs in the north-western state of Zamfara this week, according to a government official. Government troops targeted th", "summary_en": "Vigilantes also took part in the fight that raged all night and the following morning, residents say Nigerian soldiers killed more than 300 members of kidnapping and cattle bandit gangs in the north-western state of Zamfara this week, according to a government official. Government troops targeted th", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/11/nigeria-army-kills-bandits-north-western-state-zamfara", "state_media": false, "category": "政治", "full_text": "Nigerian soldiers killed more than 300 members of kidnapping and cattle bandit gangs in the north-western state of Zamfara this week, according to a government official.\nGovernment troops targeted the gangs in Gummi district in a two-day operation that “led to the elimination of more than 300 terrorists”, Zamfara’s information commissioner, Mahmud Muhammad Dantawasa, said in a statement.\nGangs made up of cattle rustlers and jihadists have terrorised communities in northern and central Nigeria, where they raid farmers’ land, steal cattle and kidnap people for ransom. They also impose levies on farmers who want to access their own land in protection rackets.\nJihadists and criminal gangs have been cooperating in recent years, according to security analysts, who say their mutual interests align. Criminal gangs have become widespread in impoverished rural Nigeria, while jihadists continue to wage a 17-year insurgency in the north of the country. Both are invested in a weak central government.\nResidents of Gummi said soldiers and local vigilantes had launched a campaign on Wednesday night against about 1,000 bandits who had stolen livestock. “The soldiers and the vigilantes killed more than 300 bandits in the fight which raged all night and the following morning,” Abubakar Muhammad told Agency France-Presse.\nTroops had tried to launch an assault on the bandits’ camp two weeks ago but were outnumbered and were forced to withdraw, residents said.\nThe Zamfara government said the operation had been a significant breakthrough in its fight to restore order to the state.\nNigeria faces a number of security crises, with an Islamist insurgency by Boko Haram and its rival, the Islamic State West Africa Province.\nThe government has killed jihadists in recent months in partnership with the US, which has deployed hundreds of troops to the country to support its fight against Islamists. A joint US-Nigeria operation in May killed the second-in-command of Islamic State and about 200 fighters in a village in north-east Nigeria.\nNigeria also struggles with general lawlessness and banditry, fuelled by poverty. Jihadists and bandits have long used mass kidnappings of elementary-schoolchildren to extract ransom payments and pursue other demands.\nThe army said on Saturday that it had suffered “casualties” during the rescue of more than 40 kidnapped children who were taken by what authorities said were jihadists. The kidnapping had come as a shock because it happened in the south-west of the country, previously thought to be relatively safe.", "translation_ja": "", "vocab": []}, {"title_ja": "Developing countries spend more repaying foreign debt than on education, UN reveals", "title_en": "Developing countries spend more repaying foreign debt than on education, UN reveals", "summary_ja": "Unesco report shows children lost out to servicing debt in 113 countries, with 18 spending five times more on loans Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up ", "summary_en": "Unesco report shows children lost out to servicing debt in 113 countries, with 18 spending five times more on loans Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up ", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/10/developing-countries-spend-more-foreign-debt-education-aid-cuts-unesco", "state_media": false, "category": "社会", "full_text": "Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up to 30%.\nMore was spent on servicing foreign debt than on education in 113 developing countries in 2025, according to research by the UN’s culture and education agency, Unesco. In sub-Saharan Africa, countries spent 3.6 times more on debt than education.\nThe situation is likely to be exacerbated by funding cuts, the agency warned. Low- and lower-middle-income countries have already lost 21% of the aid to education they were receiving in 2023 and could lose up to 30% by 2027. Some countries – including Afghanistan, Mali, Niger and Liberia – have already lost more than 40% in three years.\nMin Jeong Kim, director of Unesco’s education division, said: “Current approaches really keep the countries trapped in a cycle of austerity, underinvestment and stalled development.\n“This is really weakening countries’ stances on economic growth, eroding domestic revenue mobilisation and ultimately also diminishing their ability to handle their debt over time.”\nEighteen of the most indebted countries spent five times the amount they did on education on debt – and up to 16 times more in the case of Sri Lanka.\nAccording to the UK-based campaign group Debt Justice, repayments by poorer countries hit a 35-year high last year, with 56 countries spending almost a fifth of their total revenue on servicing loans.\nTim Jones, policy director at Debt Justice, said: “Countries’ debt payments have ballooned following a series of shocks from Covid, energy price and interest rate rises and climate disasters.\n“In the worst-affected [countries], this is leading to cuts in spending on essential services such as health and education.”\nThe situation has been made worse by aid cuts made by the US and Europe, which saw funding to education drop by $600m (£470m) in 2024, the last recorded figures, and is expected to have fallen further in 2025.\nThe combined impact of aid cuts and public spending being redirected to debt servicing has meant disruption to education systems, with schools often not receiving sufficient funds to operate and teachers not being paid.\nIn the long term, there is concern that weakened education systems affect indebted countries’ ability to develop their economies and better equip themselves to handle debt burdens in the future.\nUnesco said there needed to be a change to how debt relief was structured, shifting away from short-term relief to long-term arrangements that allowed countries to continue funding public services.\nJones said that another key factor in changing debt relief was ensuring that private lenders, often based in Britain and the US, were not able to block agreements to extract more profit for themselves, as they recently did with Ethiopia.\n“The UK needs to use its presidency of the G20 in 2027 to get major changes to the debt-relief process, including more debt cancellation and a faster process,” he said. “Central to this is incorporating the process into English law, so that private creditors can no longer disrupt and hold out from the debt relief.”", "translation_ja": "", "vocab": []}, {"title_ja": "Furore in Nigeria over fake federal agency set up in government HQ", "title_en": "Furore in Nigeria over fake federal agency set up in government HQ", "summary_ja": "President orders investigation after fictitious body given funding, triggering renewed scrutiny of alleged corruption A fictitious federal entity that was allocated 1.3bn naira (£700,000) in Nigeria’s 2026 budget has precipitated a political storm in Africa’s largest democracy in the run-up to a gen", "summary_en": "President orders investigation after fictitious body given funding, triggering renewed scrutiny of alleged corruption A fictitious federal entity that was allocated 1.3bn naira (£700,000) in Nigeria’s 2026 budget has precipitated a political storm in Africa’s largest democracy in the run-up to a gen", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/09/bola-tinubu-under-pressure-fake-nigerian-government-agency-political-storm", "state_media": false, "category": "政治", "full_text": "A fictitious federal entity that was allocated 1.3bn naira (£700,000) in Nigeria’s 2026 budget has precipitated a political storm in Africa’s largest democracy in the run-up to a general election set for January.\nThe fake agency came to light last October when Femi Gbajabiamila, the president’s chief of staff, wrote to the police alleging that his signature, along with official seals and reference numbers, had been forged by Adeniyi Adeyemi Matthew, who was claiming to have been appointed by the presidency to head the presidential foreign intervention promotion council (PFIPC).\nThe case is due to be heard in a court in the capital, Abuja, on 27 July, more than six months after the police filed an eight-count charge including criminal forgery, impersonation and obtaining by false pretence against Adeyemi and two others.\nIn a 1 July statement, the Nigerian presidency also claimed Adeyemi had met ambassadors without the knowledge of the foreign affairs ministry and misled the country’s accountant-general’s office into opening accounts for PFIPC with the central bank and 33 commercial banks.\nThe actual Nigerian investment promotion council had also reportedly raised an alarm about the similarities with the PFIPC.\nApart from being included in the budget, the PFIPC was also allocated office space in the federal secretariat in Abuja, a huge complex housing the headquarters of Nigeria’s civil service and many government ministries and agencies.\nThat has raised questions about how Adeyemi was able to gain access, with some critics speculating collusion with officials at the highest echelons of government.\n“Politicians and members of the public who are weaponising Adeyemi’s claim against the chief of staff should refrain from swallowing his narrative hook, line and sinker,” the presidency statement said, defending Gbajabiamila.\nLocal reports say Adeyemi has claimed he was given the appointment letter by Gbajabiamila, who has denied knowing him or ever being in touch.\nOn Monday, President Bola Ahmed Tinubu directed the independent corrupt practices and other related offences commission (ICPC) to open a probe. Days later, a Senate motion to independently investigate the presidential foreign intervention promotion council (PFIPC) did not pass.\nMeanwhile the House of Representatives set up a committee to question Abubakar Atiku Bagudu, the minister of budget and economic planning.\nThe presidency and supporters of the ruling party have pointed out that Adeyemi had previously misrepresented himself as the newly elected president-general of a UN youth agency called World Youth Organisation back in 2017.\nHis aides had said he was seeking permission from the UN security council to appoint staff across the world.\n“The 967 nominees will work with my office across the globe,” one of his representatives was quoted as saying in Nigerian daily Punch. “This will enable the organisation to function effectively and bring coordination across the world.”\nIt later turned out that the WYO was not affiliated with or part of the UN.\nCritics of the Tinubu administration have pointed to the controversial record of key government officials mentioned in the scandal.\nIn 2007, the supreme court of the US state of Georgia handed Gbajabiamila a three-year suspension from practising law in Atlanta after he failed to pass on $25,000 awarded as an injury settlement to a client four years earlier.\nGbajabiamila paid back the money in 2006, and later admitted he violated professional conduct rules, but blamed the incident on a paralegal who “closed the files as per my instruction, but unfortunately never paid the woman”.\nBagudu spent six months in a federal prison in Houston in 2003. According to the US Department of Justice, he was arrested for being an alleged accomplice to former dictator Sani Abacha who “embezzled, misappropriated and extorted billions of dollars from the government of Nigeria” amounting to more than $282m in one instance.\nBagudu reportedly agreed to return $163m to Nigerian authorities, who in turn dropped all cases against him, leading to his release without admission of wrongdoing.\nThe latest scandal has piled pressure on Tinubu, 74, ahead of January’s election, thrusting endemic corruption in Africa’s largest economy back into the spotlight.\nFormer vice-president Atiku Abubakar, who is due to challenge Tinubu’s re-election bid in January, called on his rival to set an independent commission of inquiry comprising neutral parties such as civil society leaders, opposition parties and the Nigerian Bar Association, to establish , exactly who was involved with the scheme.\n“Nigerians deserve the whole truth, not carefully scripted press statements,” his spokesperson Phrank Shuaibu said earlier this month, adding: “We therefore demand a truly independent investigation that follows the evidence wherever it leads. No sacred cows. No political protection. No selective justice.”", "translation_ja": "", "vocab": []}, {"title_ja": "Algeria and Mali restore diplomatic ties following yearlong rift", "title_en": "Algeria and Mali restore diplomatic ties following yearlong rift", "summary_ja": "Relations begin to thaw as both countries reinstate ambassadors, reopen airspace closed to each other since April 2025.", "summary_en": "Relations begin to thaw as both countries reinstate ambassadors, reopen airspace closed to each other since April 2025.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/11/algeria-and-mali-restore-diplomatic-ties-following-yearlong-rift?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "Algeria and Mali restore diplomatic ties following yearlong rift\nRelations begin to thaw as both countries reinstate ambassadors and reopen airspace closed to each other since April 2025.\nMore than a year after a diplomatic fallout, relations between Algeria and Mali are beginning to thaw, with both countries reinstating their ambassadors and reopening their airspace to one another.\nAlgerian President Abdelmadjid Tebboune announced on Saturday that the country’s ambassador would return to Mali, a day after Algiers fully reopened its airspace to civilian and military aircraft travelling to and from its southern neighbour.\nRecommended Stories\nlist of 3 items- list 1 of 3Mali’s Tuareg rebels say Russian fighters must withdraw from country\n- list 2 of 3Mali crisis: Who are the key leaders to know about?\n- list 3 of 3The Mali crisis could have a dangerous spillover effect\nIssa Ousmane Coulibaly, spokesperson for Mali’s military government, confirmed in a statement that Bamako had taken reciprocal measures.\nRelations between the two African nations deteriorated in April last year after Algeria said it had shot down a Malian surveillance drone for violating its airspace. Bamako disputes this, saying the drone was downed within its own borders.\nThe fallout between Algeria and Mali has jeopardised security in the Sahel region. Mali is a member of the Alliance of Sahel States (AES), along with Burkina Faso and Niger. Both Ouagadougou and Niamey also withdrew their ambassadors to Algeria in April last year in solidarity with their ally.\nThe AES has experienced a surge in attacks by armed groups linked to the ISIL (ISIS) group and al-Qaeda in recent years. Many analysts argue that such groups were able to establish a foothold in the Sahel partly because of the NATO-backed overthrow of longtime Libyan ruler Muammar Gaddafi in 2011.\nThe ousting of Gaddafi left a power vacuum that has been exploited by armed groups. Vast stockpiles of weapons belonging to forces loyal to him were looted and are believed to have been used by those groups.\nAlgeria has previously mediated peace talks between the Malian government and Tuareg separatist rebels waging an armed rebellion there.\nHowever, last year’s diplomatic fallout led Algiers to step back from its role as mediator, raising concerns about Mali’s security and territorial integrity while also posing a threat to Algeria’s own internal security.\nThis April, Algerian Foreign Minister Ahmed Attaf reaffirmed Algiers’s support for Mali’s territorial integrity, rejecting what he described as all forms of “terrorism”.", "translation_ja": "", "vocab": []}, {"title_ja": "UK police free suspect in ex-MP Ann Widdecombe murder investigation", "title_en": "UK police free suspect in ex-MP Ann Widdecombe murder investigation", "summary_ja": "The former government minister is believed to have been attacked a full day before her body was discovered.", "summary_en": "The former government minister is believed to have been attacked a full day before her body was discovered.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/11/uk-police-free-suspect-in-ex-mp-ann-widdecombe-murder-investigation?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "UK police free suspect in ex-MP Ann Widdecombe murder investigation\nThe former government minister is believed to have been attacked on Wednesday, a full day before her body was discovered.\nA man who was arrested on suspicion of murdering former British government minister Ann Widdecombe has been released and is no longer part of the investigation, police said.\nThis comes as detectives revealed the killing took place a day before Widdecombe’s body was found at her home in rural southwest England on Thursday.\nRecommended Stories\nlist of 4 items- list 1 of 4Police probe donations to Britain’s far-right Reform party\n- list 2 of 4Andy Burnham apology for Labour stance on Gaza: Is UK’s position shifting?\n- list 3 of 4UK police arrest man suspected of murdering former MP Ann Widdecombe\n- list 4 of 4Could far-right Reform really win a UK general election now?\nDevon and Cornwall Police said a 26-year-old white British national was arrested in Newton Abbot, about 14.5 kilometres (nine miles) from Widdecombe’s home, on Friday, before being freed on Saturday.\nOfficers now believe the 78-year-old was attacked on Wednesday around 11:30 GMT, a day before ambulance workers called police to her home, where she was found dead with serious injuries.\nPolice said they had found no evidence the killing was “terrorism”-related or politically motivated.\nThey also said the suspect was believed to be a white male and that there was no wider risk to the public.\nSocially conservative views\nWiddecombe was known for her socially conservative views, first as a junior minister in Conservative Prime Minister John Major’s 1992-1997 government and latterly as an immigration spokesperson for Nigel Farage’s far-right populist Reform UK.\nShe converted to Catholicism partly in protest at the Church of England’s ordination of women as priests and was opposed to abortion and to equalising the age of consent for homosexual and heterosexual relationships.\nShe also defended a policy of shackling pregnant prisoners during childbirth to prevent their escape and viewed single mothers as poor role models, but was unusual among Conservative lawmakers in opposing the hunting of foxes with hounds.\nNews of her death led to tributes on Friday from across the political spectrum in the UK, including from Prime Minister Keir Starmer and from Farage, who described her as “an extraordinary woman”.\n“She stood up and fought for what she believed in – a devout Christian and somebody with strong, socially conservative views,” Farage said in a video clip posted on his X account.\nTwo serving British members of parliament have been murdered in the last decade.\nThe Labour lawmaker Jo Cox was shot and stabbed by a Nazi-obsessed loner during the Brexit campaign in 2016.\nThe Conservative lawmaker David Amess was stabbed to death in 2021 by a man inspired by the ISIL (ISIS) group.", "translation_ja": "", "vocab": []}, {"title_ja": "Power cuts plunge Gaza hospitals into darkness as Israel’s attacks persist", "title_en": "Power cuts plunge Gaza hospitals into darkness as Israel’s attacks persist", "summary_ja": "Gaza is suffering from an energy crisis, affecting hospitals struggling to treat patients amid Israeli bombing.", "summary_en": "Gaza is suffering from an energy crisis, affecting hospitals struggling to treat patients amid Israeli bombing.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/features/2026/7/11/power-cuts-plunge-gaza-hospitals-into-darkness-as-israels-attacks-persist?traffic_source=rss", "state_media": false, "category": "経済", "full_text": "Power cuts plunge Gaza hospitals into darkness as Israel’s attacks persist\nGaza is suffering from an energy crisis, affecting hospitals already struggling to treat patients amid Israeli bombing.\nOmar Abu Atwa, a 30-year-old driver, was walking home from work one day in central Gaza last month when an explosion shook the street around him.\nBloodied and confused, he was taken to Al-Aqsa Martyrs Hospital in Deir el-Balah, where doctors examined injuries to his hand.\nAs he waited for an X-ray, the lights cut out, rendering much of the hospital’s medical equipment inoperable, including the machine doctors needed to inspect his wound.\nAfter a six-hour wait in the ward, Omar left tired and frustrated, without an X-ray or proper treatment for his injured hand. This is a repeated experience for patients in Gaza, including those rushed to hospital to receive potentially lifesaving surgery.\n“I waited for many hours inside the hospital hoping for electricity to return and the medical devices to start working again. During that time, I was in pain and anxious because I did not know the nature of my injury or whether my condition required urgent medical intervention,” he told Al Jazeera.\n“I saw children, elderly people and injured individuals waiting just as I was. Some needed medical tests, while others kept asking about when electricity would return so they could continue their treatment. The crisis affected everyone.”\nIsrael’s genocide has already caused immense damage to Gaza’s healthcare sector, with Israeli bombing since October 7, 2023 destroying 38 hospitals and 96 primary healthcare centres or rendering them inoperable.\nBombing has almost completely decimated Gaza’s national grid, with about 90 percent of power lines destroyed, forcing hospitals to rely on generators for power.\nBut an ongoing blockade on Gaza has resulted in severe shortages of fuel needed for generators, which power essential life-saving medical equipment at hospitals such as ventilators, incubators and monitoring devices. The use of non-original engine oils due to the blockade has resulted in generators malfunctioning or affected their performance.\nIt comes as Israel continues its near-daily air raids on Gaza with at least 1,092 people killed and 3,507 injured since a so-called “ceasefire” came into effect in October 2025.\nThe consequential routine power cuts have rendered hospitals semi-dysfunctional and affected thousands of patients and medical staff in Gaza, where the flow of patients caused by new waves of bombings and disease continues.\nMost of Al-Aqsa’s main generators went out of service in early May 2026, when doctors and nurses were already struggling to cope, leaving the hospital to use secondary generators and solar energy or simply cut back on operations.\nSurgeon Omar al-Ashtal said medical teams at the hospital are struggling to provide proper and essential services to patients due to erratic power supplies, especially in operating rooms, where electricity is essential. Surgeons and doctors are having to shorten or delay important operations until stable energy supplies are available, leading to serious consequences for patients.\n“What we are witnessing today is not only a shortage of electricity, but a cumulative crisis that includes worn-out generators, fuel shortages and a lack of spare parts needed for maintenance,” al-Ashtal told Al Jazeera. “The continuation of this situation threatens the hospital’s ability to respond to emergencies and increases the suffering of patients waiting for treatment and medical care.”\nIntensive care units, operating rooms, anaesthesia departments and neonatal care are the most affected by the latest power crisis. Any interruptions to these departments can lead to serious life-threatening complications for patients, including babies in incubators.\nOutages of internet and electronic systems also prevent administrative teams and nurses from fulfilling the essential tasks of accessing or recording patient data, tracking cases and communicating between different departments.\nNurse Hamza Nawas said that medical teams were coping as well as they could under the circumstances.\n“We are living under daily pressure because of the electricity crisis. At night, the difficulties increase, especially with rising temperatures and the disruption of some services related to power,” he told Al Jazeera. “We try as much as possible to continue providing care, but the current conditions make work more difficult and complex.”\nEngineer Omar al-Ghariz, a specialist in energy systems at Al-Aqsa Martyrs Hospital, said that generators have been overloaded, exceeding their capacity for months.\n“The electric generators at Al-Aqsa Martyrs Hospital have been operating continuously for many months under loads that exceed their normal capacity, due to full reliance on them amid ongoing electricity outages,” he told Al Jazeera. “[This has] led to significant wear on many generator components and a noticeable increase in technical", "translation_ja": "", "vocab": []}, {"title_ja": "Watch: Blackouts, scattered debris, as Typhoon Bavi passes by Japan’s Ishigaki island", "title_en": "Watch: Blackouts, scattered debris, as Typhoon Bavi passes by Japan’s Ishigaki island", "summary_ja": "", "summary_en": "", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/shorts/watch-blackouts-scattered-debris-as-typhoon-bavi-passes-by-japans-ishigaki-island/article71211149.ece", "state_media": false, "category": "社会", "full_text": "Watch: Blackouts, scattered debris, as Typhoon Bavi passes by Japan’s Ishigaki island\nMore Shorts\nAt least 15 Indians dead after boat capsizes in Vietnam\nBy\nIran’s Supreme Leader vows revenge for father’s killing\nBy\nSmriti S _11934\nWatch: West Bengal CM Suvendu Adhikari says Indrajit Mondal was murdered, not lynched\nBy", "translation_ja": "", "vocab": []}, {"title_ja": "West Asia war LIVE: Iran's supreme leader pledges revenge for slain father and predecessor", "title_en": "West Asia war LIVE: Iran's supreme leader pledges revenge for slain father and predecessor", "summary_ja": "Iran's supreme leader ​Ayatollah Mojtaba Khamenei said ‌that ​avenging his ⁠slain predecessor and father was \"the demand of ‌the nation\" and \"must certainly\" take ‌place, according ‌to ⁠a written ⁠message released on his Telegram account", "summary_en": "Iran's supreme leader ​Ayatollah Mojtaba Khamenei said ‌that ​avenging his ⁠slain predecessor and father was \"the demand of ‌the nation\" and \"must certainly\" take ‌place, according ‌to ⁠a written ⁠message released on his Telegram account", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/iran-us-war-donald-trump-washington-tehran-peace-talks-west-asia-conflict-strait-of-hormuz-live-updates-july-11-2026/article71209275.ece", "state_media": false, "category": "政治", "full_text": "An explosion heard in the eastern part of Tehran province was caused by the controlled disposal of ammunition remaining from the war, Iranian state media, citing a local official, said on Saturday (July 11, 2026).\nAlso Read | Is the U.S.-Iran agreement falling apart?\nThe official said the operation posed no threat to citizens and that no incident had occurred.\nEarlier, U.S. President Donald Trump threatened Iran after the funeral of Supreme Leader Ayatollah Ali Khamenei saw open calls for his killing, further underlining the tensions gripping the Mideast as an interim deal to end the war buckles under repeated crossfire in the region.\nFollow the live updates", "translation_ja": "", "vocab": []}, {"title_ja": "At least 15 Indian tourists dead after boat capsizes near island off Vietnam; rescue efforts under way", "title_en": "At least 15 Indian tourists dead after boat capsizes near island off Vietnam; rescue efforts under way", "summary_ja": "For any assistance, the first control room can be reached at: +84 36 281 7930, +84 91 552 37 14 and +84 33 452 0414; the other one in Hanoi can be reached at: +84 91 308 9165", "summary_en": "For any assistance, the first control room can be reached at: +84 36 281 7930, +84 91 552 37 14 and +84 33 452 0414; the other one in Hanoi can be reached at: +84 91 308 9165", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/boat-with-indian-tourists-capsizes-vietnam-phu-quoc-island-rescue-efforts-updates/article71209943.ece", "state_media": false, "category": "社会", "full_text": "At least fifteen Indian tourists have died after a boat capsized near an island off Vietnam’s Phu Quoc on Saturday (July 11, 2026).\nThe tourist speedboat AG 26751, operated by Ocean Pearl Island Company (Minh Huy Phu Quoc Trading and Tourism Co. Ltd. was carrying 32 Indian tourists and four crew members from Hon May Rut to An Thoi Port, according to Vietnamese news portal VN Express International. It capsized about 400 metres off Hon May Rut Ngoai, throwing everyone on board into the sea.\nSea conditions were rough with large waves in the area at the time, the report added.\nEarlier, the Indian Embassy in Hanoi said that it set up control rooms as search and rescue operations would continue.\nBut the Indian mission is yet to share details about the deaths. “In a tragic incident, a boat carrying several Indian tourists has capsized near Phu Quoc Island in Vietnam,” it said in the post.\nIt added that control rooms have been established at the Consulate General of India in Ho Chi Minh City and at the Embassy in Hanoi to provide information and assistance.\nThe first control room can be reached at: +84 36 281 7930, +84 91 552 37 14 and +84 33 452 0414.\nThe other one in Hanoi can be reached at: +84 91 308 9165 They are available for any assistance and queries, the Indian mission said.\nSources from AP Bhavan in New Delhi said that the Vietnamese authorities have confirmed that all persons on board have been accounted for.\nAccording to Vietnamese authorities, the boat mishap led to 15 fatalities (13 men and 2 women), all Indian tourists. Twenty-one persons (17 passengers and 4 crew members) were rescued and admitted to hospitals. Two survivors remain in critical condition and are receiving intensive medical care.\nPhu Quoc, Vietnam’s largest island, has become one of the country’s most popular tourist destinations, attracting many Indian visitors in recent years.\n“Our Embassy and Consulate are providing all possible assistance. Our officials are also in close contact with the Vietnamese authorities,” said PM Modi on the boat incident. Expressing his concern for the victims PM said, “Extremely saddened to learn about tragic news of a boat accident involving Indian nationals near Phu Quoc, Vietnam.”\nPreliminary information indicates that seven persons from the Telugu States were among the tourists: Ramasubbu Annavi, Nagalamadugu Sohan, Nallapata Adiseshaiah, Chithapuram Bhaskara Vinay Kumar, Gelli Kishore, Gelli Jayalakshmi (Machilipatnam), and Mudium Sreedhar (Kadapa). Their status is being verified through official channels.\nThe AP Bhavan officials said based on information presently available, Gelli Jayalakshmi (Machilipatnam), Mudium Sreedhar (49), Kadapa, and Thomas Avicot Cheriyan (Tamil Nadu) have been confirmed as dead. The Kadapa district administration has contacted Mr. Sreedhar’s family and is extending all necessary assistance. Photographs of the rescued survivors have also been released by the local authorities to facilitate identification by family members.\nThe Embassy of India in Vietnam has activated its emergency response mechanism. The Indian Ambassador, accompanied by Embassy officials, is proceeding to Phu Quoc Island to coordinate with Vietnamese authorities, oversee consular assistance and facilitate support to the affected families. The official list of deceased is expected after completion of the formal identification process, around 8:00 p.m.\nWith inputs from PTI, Reuters\nPublished - July 11, 2026 03:18 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Gujarat High Court grants default bail to accused in Salaya narco-terror case", "title_en": "Gujarat High Court grants default bail to accused in Salaya narco-terror case", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/legal-news/gujarat-high-court-default-bail-ankur-kapoor-salaya-narco-terror-case-2020-10782289/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Trump vs Supreme Leader Mojtaba: US warns it will ‘destroy all areas of Iran’; Tehran vows Khamenei revenge", "title_en": "Trump vs Supreme Leader Mojtaba: US warns it will ‘destroy all areas of Iran’; Tehran vows Khamenei revenge", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/world/us-iran-war-trump-missile-threat-mojtaba-khamenei-strait-of-hormuz-oman-talks-10782271/", "state_media": false, "category": "政治", "full_text":
