Cup.\nThe talented midfielder featured in all three of South Africa’s group matches as the team reached the knockout stage of the World Cup for the first time in its history before bowing out to co-hosts Canada in the Round of 32.\nSouth Africa’s Minister of Sport, Arts and Culture, Gayton McKenzie, described Adams’ death as a huge loss to the country.\n“It is with profound shock and a heavy heart that I have learnt of the passing of Jayden Adams,” Mr McKenzie said in a statement.\n“South African football has lost one of its brightest young talents, and our nation mourns alongside his family, his teammates and the millions of supporters who watched him grow from a promising academy prospect into a full Bafana Bafana international.”\nPolice confirmed they have opened an investigation after the body of a 25-year-old man was discovered at a residence in Schotschekloof, a suburb of central Cape Town, on Saturday. Authorities said the cause of death has not yet been established.\nMr McKenzie appealed for patience as investigations continue.\n“The cause of Jayden’s passing has not yet been confirmed, and I wish to appeal to members of the media and the public to exercise restraint and compassion, and to refrain from speculation while his family and Mamelodi Sundowns are given the space and privacy they need at this incredibly difficult time.”\nThe South African Football Players Union (SAFPU) also paid tribute to the midfielder, describing his death as an immeasurable loss.\n“Jayden had only recently represented South Africa at the 2026 FIFA World Cup, carrying the hopes of the nation with pride, courage and distinction,” the union said.\nAdams made his senior international debut in 2022 and enjoyed a rapid rise in South African football. He began his professional career with Stellenbosch FC before joining Mamelodi Sundowns in January 2025, where he helped the club win the South African league title and the CAF Champions League.\nREAD ALSO: Federation Cup Final PREVIEW: Ikorodu City chase history, El-Kanemi eye fourth title\nDuring the World Cup, Adams showed remarkable resilience by starting South Africa’s 1-1 draw against the Czech Republic despite learning only hours before kick-off that his grandmother had died.\nFIFA President Gianni Infantino also paid tribute to the midfielder, saying the global football community was deeply saddened by the news.\n“My thoughts and condolences, as well as those of everyone at FIFA and the global football community, are with his family, friends and teammates. The Bafana Bafana and Mamelodi Sundowns star will be sorely missed.” He said.", "translation_ja": "", "vocab": []}, {"title_ja": "Lassa Fever: Death toll hits 221 as fatality rate rises above 2025 level – NCDC", "title_en": "Lassa Fever: Death toll hits 221 as fatality rate rises above 2025 level – NCDC", "summary_ja": "The agency disclosed this in its Lassa fever situation report for epidemiological week 26, released on Friday The post Lassa Fever: Death toll hits 221 as fatality rate rises above 2025 level &#8211; NCDC appeared first on Premium Times Nigeria .", "summary_en": "The agency disclosed this in its Lassa fever situation report for epidemiological week 26, released on Friday The post Lassa Fever: Death toll hits 221 as fatality rate rises above 2025 level &#8211; NCDC appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/health/health-news/894614-lassa-fever-death-toll-hits-221-as-fatality-rate-rises-above-2025-level-ncdc.html", "state_media": false, "category": "社会", "full_text": "The Nigeria Centre for Disease Control and Prevention (NCDC) has said the country’s Lassa fever outbreak has become deadlier this year, with 221 deaths recorded and the case fatality rate rising to 24 per cent, compared with 18.7 per cent during the corresponding period in 2025.\nThe agency disclosed this in its Lassa fever situation report for epidemiological week 26, released on Friday.\nThe report also showed that confirmed infections increased during the week, with 31 new cases recorded, up from 22 in the previous reporting week.\nA total of 23 states have recorded at least one confirmed case across 111 local government areas this year, highlighting the continued spread of the disease across the country.\nFive states account for most infections\nThe NCDC reported that 85 per cent of all confirmed cases originated from Ondo, Bauchi, Taraba, Edo and Benue states, while the remaining 15 per cent were reported elsewhere.\nOndo accounted for the largest share of confirmed infections at 30 per cent, followed by Bauchi (26 per cent), Taraba (14 per cent), Edo (nine per cent) and Benue (six per cent).\nPeople aged 21 to 30 years remained the most affected group, although confirmed cases ranged from one to 93 years.\nThe male-to-female ratio among confirmed cases stood at 1:0.9, indicating nearly equal infection rates between men and women.\nWhy deaths remain high\nThe NCDC attributed the elevated fatality rate to several persistent challenges, including late presentation of cases, poor health-seeking behaviour driven by the high cost of treatment, inadequate environmental sanitation in high-burden communities, low public awareness, and infections among healthcare workers.\nThe agency disclosed that one healthcare worker was infected during week 26.\nResponse efforts intensified\nTo contain the outbreak, the NCDC said the National Lassa Fever multi-partner, multi-sectoral Incident Management System remains activated to coordinate surveillance, case management, risk communication and response activities nationwide.\nDuring the reporting week, the agency and its partners supported case management training for healthcare workers, active case search and contact tracing, infection prevention and control (IPC) training, community engagement activities, distribution of personal protective equipment, laboratory testing, and high-level field missions to affected states.\nThe NCDC urged state governments to sustain year-round community engagement on Lassa fever prevention, while healthcare workers were advised to maintain a high index of suspicion for the disease, initiate timely referral and treatment, and adhere strictly to infection prevention and control procedures.\nREAD ALSO: NCDC updates Lassa fever death rate to 19.3% as outbreak reaches 23 states\nLassa fever\nLassa fever is an acute viral haemorrhagic illness caused by the Lassa virus, which is transmitted to humans primarily through contact with food or household items contaminated by the urine or faeces of infected rats.\nIt can also spread from person to person through contact with bodily fluids.\nThe disease often begins with fever, weakness, and headache, and may progress to more severe symptoms such as bleeding, difficulty breathing, swelling, and organ failure.\nEarly diagnosis and prompt treatment with Ribavirin are critical for improving survival.", "translation_ja": "", "vocab": []}, {"title_ja": "Akwa Ibom official distances self from controversial flood control report after backlash", "title_en": "Akwa Ibom official distances self from controversial flood control report after backlash", "summary_ja": "As residents grapple with losses from devastating floods in Uyo, a pro-government report praising Governor Umo Eno's flood control efforts has sparked outrage. The chairman of the Uyo Capital City Development Authority has now distanced himself from the publication, contradicting the governor's medi", "summary_en": "As residents grapple with losses from devastating floods in Uyo, a pro-government report praising Governor Umo Eno's flood control efforts has sparked outrage. The chairman of the Uyo Capital City Development Authority has now distanced himself from the publication, contradicting the governor's medi", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/more-news/894612-akwa-ibom-official-distances-self-from-controversial-flood-control-report-after-backlash.html", "state_media": false, "category": "政治", "full_text": "The Chairman of Uyo Capital City Development Authority (UCCDA), Anietie Eka, has distanced himself from a controversial report praising the Akwa Ibom State Government’s flood control efforts after the publication drew widespread criticism for appearing insensitive to victims of Thursday’s devastating flooding in Uyo.\nThe report, written by Godwin Edet, personal assistant on media to Governor Umo Eno, argued that the governor’s investments in roads and drainage infrastructure prevented an even worse disaster despite severe flooding that submerged homes, businesses and major roads across the state capital.\nThe publication, however, triggered public outrage, with many residents and commentators questioning the appropriateness of celebrating government achievements while hundreds of families were still assessing losses from one of the worst floods to hit Uyo in recent years.\nThe controversy deepened after Mr Eka told PREMIUM TIMES that the report did not represent the official position of the authority.\nInstead, he said the public should rely on the report published by the agency’s Information Officer, Uduak Otu, which differed substantially from Mr Edet’s version.\n“I did not authorise that report,” Mr Eka said.\nAccording to him, the only statement approved by the authority was the one released through its information office.\nHis explanation contradicts Mr Edet’s claim that the chairman had reviewed and approved the publication before it went public.\n‘I was defending government’\nSpeaking to PREMIUM TIMES, Mr Edet defended the report, saying he deliberately wrote it from what he described as a “pro-government” perspective.\n“Understanding that I am pro-government, it was necessary to defend the government and also highlight the developmental strides of the governor towards controlling flood,” he said.\nHe acknowledged that the headline generated criticism.\n“I have had calls from some of my colleagues that the headline was not necessary, that people felt the government is insensitive and that the story is sycophantic.\n“The fact is that a lot of people are building on drains. I did that on the position that the government is working hard over this.”\nMr Edet also disclosed that he personally suffered losses from the flooding. “I am also a victim of that flood incident that happened yesterday. So, people are just too emotional about it.”\nHe said he considered it necessary to reassure the public because Mr Eno was away from the state when the flooding occurred.\n“I felt at the point of writing that story it was necessary because a lot of people expected the government to visit the homes of the victims but because the governor was not in town, he couldn’t and as aide to the governor I needed to highlight that the government is working.”\nChairman denies approving report\nWhen PREMIUM TIMES informed Mr Eka of Mr Edet’s claims, the UCCDA chairman rejected them.\n“He forwarded a write-up and I thought he sent me the report from my office that he wanted to share. I told him, ‘Fine, go ahead”.\n“It was later that I saw a write-up on Facebook where people were analysing the report. I read the story and I was surprised.\n“I called him and asked what he wrote. I told him he shouldn’t have done that. He should have stuck to what came from my office.\n“When did you start taking someone’s story to analyse? I didn’t give him approval for that.”\nContacted again with the chairman’s response, Mr Edet maintained that he had sent the draft to Mr Eka before publication.\nHowever, he admitted he never expressly informed the chairman that the document he sent was his own rewritten article rather than the official statement.\n“I was not there at his visits to those flood sites. I picked the report from the information officer, wrote my story from a pro-government angle and sent it to him. He replied, ‘Okay, nice.’\n“It was later he told me that if he had known it was different from the report issued by his office, he wouldn’t have asked me to post it.”\nPublic backlash\nThe report provoked criticism on social media, with many accusing government officials of prioritising image management over empathy for residents whose homes and livelihoods were destroyed.\nJournalist Nseabasi Valentine wrote that praising government while flood victims were counting their losses reflected poor judgement.\n“The entire city is flooded, homes, businesses, lives are wrecked by just a day’s rain and someone chooses this moment to praise government. This is just sickening,” she wrote on Facebook.\nAnother journalist, Ndifreke Enefiok, described the publication as “wrong and insensitive.”\n“Government officials should know when to pause with praise singing. Many citizens have lost their property and source of livelihood. Instead of visiting the flooded locations to sympathise with the victims and assure them of government’s remedial measures, it’s to commend the governor. Like at this point? It’s so nauseating,” she wrote on Facebook.\nEnvironmental commentator Ittakke Ekah in h", "translation_ja": "", "vocab": []}, {"title_ja": "Israel Struck an Iranian Steel Facility. Was It a Valid Military Target?", "title_en": "Israel Struck an Iranian Steel Facility. Was It a Valid Military Target?", "summary_ja": "During the war, Israel attacked Iran’s steel plants, saying they provided forces with revenue and the means to make weapons, but it also hurt the civilian economy.", "summary_en": "During the war, Israel attacked Iran’s steel plants, saying they provided forces with revenue and the means to make weapons, but it also hurt the civilian economy.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/11/world/middleeast/iran-steel-plant-civilian-military.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Man Arrested s complete disarmament highly unlikely. By conditioning Israel’s withdrawal from Lebanon on this outcome—but with no provisions about cutting Hezbollah’s Iranian lifeline—the new framework agreemen", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/new-framework-agreement-will-keep-israel-in-lebanon-indefinitely-by-shlomo-ben-ami-2026-07", "state_media": false, "category": "オピニオン", "full_text": "The Israel-Lebanon Recipe for Never-Ending War\nLebanon’s political circumstances, together with Iran’s strengthened regional position, make Hezbollah’s complete disarmament highly unlikely. By conditioning Israel’s withdrawal from Lebanon on this outcome—but with no provisions about cutting Hezbollah’s Iranian lifeline—the new framework agreement is dead on arrival.\nTEL AVIV—Late last month, Lebanon and Israel signed a framework agreement with the United States that Lebanon’s chief negotiator, Nada Hamadeh Moawad, described as a “first step on the road to restoring Lebanese sovereignty and territorial integrity.” But, as the agreement implicitly acknowledges, Israel is not the only threat to Lebanon’s sovereignty. The departure of the Israel Defense Forces from southern Lebanon hinges on the “verified disarmament” of Iran’s proxy, Hezbollah.", "translation_ja": "", "vocab": []}, {"title_ja": "Why This Energy Shock Is Different", "title_en": "Why This Energy Shock Is Different", "summary_ja": "Unlike recent energy crises, today’s geopolitical shock is destroying supply rather than rerouting it, exposing the limits of the standard policy toolkit. Governments can mitigate its impact on those most exposed, but only if fiscal and monetary policy work in concert.", "summary_en": "Unlike recent energy crises, today’s geopolitical shock is destroying supply rather than rerouting it, exposing the limits of the standard policy toolkit. Governments can mitigate its impact on those most exposed, but only if fiscal and monetary policy work in concert.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/iran-war-energy-shock-requires-new-policy-toolkit-by-gene-frieda-2026-07", "state_media": false, "category": "オピニオン", "full_text": "Why This Energy Shock Is Different\nCANNES—The Gulf ceasefire lasted barely three weeks. After Iranian attacks on three commercial ships in the Strait of Hormuz, the United States struck more than 80 targets, revoked Iran’s oil-sanctions waiver, and declared the memorandum of understanding “over.” Yet the market response was telling: Brent crude rose to around $79 per barrel—a meaningful jump, but far below April’s $120 peak, when the strait was closed outright. That gap between renewed war and restrained prices confronts policymakers with a key question: Is this the road back to blockade, or a violent renegotiation of the terms of passage?", "translation_ja": "", "vocab": []}, {"title_ja": "China’s Erasure of Tibet Is Accelerating", "title_en": "China’s Erasure of Tibet Is Accelerating", "summary_ja": "In recent years, the international community has stood idly by while China has systematically eradicated Tibetan culture and identity. With the authorities stepping up their assimilation efforts, Asia risks not only losing one of its oldest civilizations, but also facing a China that is bigger, bold", "summary_en": "In recent years, the international community has stood idly by while China has systematically eradicated Tibetan culture and identity. With the authorities stepping up their assimilation efforts, Asia risks not only losing one of its oldest civilizations, but also facing a China that is bigger, bold", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/china-erasing-tibet-culture-and-identity-to-strengthen-its-strategic-position-by-brahma-chellaney-2026-07", "state_media": false, "category": "オピニオン", "full_text": "China’s Erasure of Tibet Is Accelerating\n                        In recent years, the international community has stood idly by while China has systematically eradicated Tibetan culture and identity. With the authorities stepping up their assimilation efforts, Asia risks not only losing one of its oldest civilizations, but also facing a China that is bigger, bolder, and more powerful than ever.\n                    \n                        NEW YORK—The self-immolation of exiled Tibetan activist Lobga Rangzen outside United Nations headquarters in New York on July 2 was not an expression of personal despair. It was a desperate attempt to jolt the world out of its growing indifference to one of the most important international issues of our time: Tibet’s systematic erasure.\n        https://prosyn.org/4UhVJEN", "translation_ja": "", "vocab": []}, {"title_ja": "Is the US trying to make scientists’ work so difficult that they simply give up? | Daniel Malinsky", "title_en": "Is the US trying to make scientists’ work so difficult that they simply give up? | Daniel Malinsky", "summary_ja": "New Trump administration rules would undermine longstanding research practices. It’s death by a thousand cuts A politician who aims to gradually privatize and ultimately destroy an institution funded by tax dollars – say, a public school system or public transportation network – may choose to do so ", "summary_en": "New Trump administration rules would undermine longstanding research practices. It’s death by a thousand cuts A politician who aims to gradually privatize and ultimately destroy an institution funded by tax dollars – say, a public school system or public transportation network – may choose to do so ", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/11/trump-administration-scientists-rules", "state_media": false, "category": "オピニオン", "full_text": "A politician who aims to gradually privatize and ultimately destroy an institution funded by tax dollars – say, a public school system or public transportation network – may choose to do so by strategically disinvesting resources from that institution until it becomes barely functional, leading users to look elsewhere to meet their needs. Eventually, the user-base of the public system gets so low or frustrated that it seems reasonable to scrap the thing entirely, or re-direct public funds to private companies as contractors to provide the needed “service”. We’ve seen this strategy play out many times in states and city councils across America.\nIt appears that the endgame of the Trump administration’s attacks on science and the research funding ecosystem is similar: grant freezes and administrative disarray at federal funding agencies such as the National Institutes of Health (NIH), new layers of project review by political appointees hunting for forbidden keywords such as “disparity” and “marginalized”, and proposed new restrictions to make international collaboration difficult or impossible all point towards a world where it’s just too onerous to do federally-funded scientific research. Is the goal to make scientists simply give up on the endeavor?\nA new set of proposed rules released in May by the Office of Management and Budget (OMB) outlines dozens of changes to the US Code of Federal Regulations governing the handling of grants and federal financial assistance. The rules undermine the scientific peer review process that has been in place for decades and codify oversight of award decisions by political appointees. Grants must be evaluated to determine whether they advance the president’s policy priorities. The proposed rules prohibit the use of funds “to support a bilateral or multilateral collaboration, agreement, program, or activity with a covered foreign country or covered foreign entity.” Depending on how this clause is interpreted and implemented, it could create formidable obstacles to collaborations between US and (eg) Chinese scientists on scientific projects related to topics such as cancer, environmental health, or new technologies. Professional scientific associations including the American Astronomical Society state plainly that “the proposed rule, if passed in its current form, would enact policies that would cause significant harm to the scientific community, research institutions, and professional societies”. They urge scientists and members of the general public to submit public comments on the OMB proposal to express opposition; the comment period closes on July 14th.\nReducing the number, size, or scope of available funding opportunities is one way to damage the scientific ecosystem; creating uncertainty about the availability or timing of funding also undermines the ability of junior researchers, in particular, to develop careers in science. Without the ability to plan or make decisions with a long time-horizon (research projects may take many years to complete), junior researchers are nudged towards leaving science or leaving the U.S.\nIf the goal is to shrink the publicly funded science sector, and hence the US scientific research enterprise as a whole, then the government is doing a great job. There are also signs that indicate what our leaders envision will “replace” academic research labs: private tech companies. Science magazine reports that the National Science Foundation (NSF) is cutting budgets for basic science research programs and re-directing money to a new $1.5 billion initiative called “X-Labs” meant to support the creation of new products and technologies by looking “outside of traditional institutions.” The suggestive name and language surrounding this initiative (a previous iteration was called “Tech Labs”) points strongly toward the involvement of private companies and a move away from universities and basic science research organizations. This is dangerous because private tech companies are by their nature motivated by profit, not by the goal of advancing knowledge, improving the public’s health, or ensuring the wellbeing of future generations. Re-directing scarce research resources to companies will lead to research that is divorced from the public good and not democratically accountable: the companies primarily reflect and respond to shareholder interests. Recall the politician who divests resources from public transportation infrastructure and boosts private companies: the trains and buses get worse, people are forced to turn to the private sector to get around, and then companies can raise their prices and trap citizens in a worse equilibrium.\nWe must stop the gradual but persistent degeneration of the scientific research ecosystem. Contributing a public comment to oppose the new OMB rules is one crucial step that anyone may take to help. Contacting elected officials to fight these moves in Congress is another. In any case, to prevent the death of US science by ", "translation_ja": "", "vocab": []}, {"title_ja": "Is Mitch McConnell secretly deceased? | Arwa Mahdawi", "title_en": "Is Mitch McConnell secretly deceased? | Arwa Mahdawi", "summary_ja": "The senator’s health is shrouded in mystery after he was hospitalized. Why can’t we get a clear answer? Is Mitch McConnell dead? This shouldn’t be a difficult question to answer. The response is either “yes”, “no”, or something along the lines of “he’s on life-support but appears to be brain dead.” ", "summary_en": "The senator’s health is shrouded in mystery after he was hospitalized. Why can’t we get a clear answer? Is Mitch McConnell dead? This shouldn’t be a difficult question to answer. The response is either “yes”, “no”, or something along the lines of “he’s on life-support but appears to be brain dead.” ", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/11/is-mitch-mcconnell-dead", "state_media": false, "category": "オピニオン", "full_text": "Is Mitch McConnell dead?\nThis shouldn’t be a difficult question to answer. The response is either “yes”, “no”, or something along the lines of “he’s on life-support but appears to be brain dead.”\nHowever, while it may be a straightforward question, nobody close to the Kentucky senator seems keen on delivering a clear answer. On 14 June, the 84-year-old senator was hospitalized for a medical event. According to a new video and eyewitness account, McConnell was loaded into an ambulance on a stretcher after a possible cardiac arrest at his home. Almost a month later, McConnell’s condition is shrouded in mystery and the source of much speculation.\nThe mystery deepened this week when Trump ally and far-right influencer Laura Loomer made the explosive claim on Twiter/X that McConnell is “officially brain dead”. Desiree Townsend, an independent journalist who first reported that emergency services had been called to a house linked to McConnell, said she had “heard the same thing from my sources for days”. Townsend added that she was camped out at the hospital waiting for McConnell to be taken off life support.\nA number of Republicans have rushed to dispute Loomer and Townsend’s allegations. On Tuesday, majority leader John Thune’s representative claimed he’d spoken to Mitch the previous day and “[t]hey had a lengthy and substantive conversation that covered a variety of topics, including national security.” Senate Republican whip John Barrasso and political commentator Scott Jennings have also said they had 20-minute phone calls with McConnell on important topics.\nHas McConnell’s wife, Elaine Chao, also had a nice 20-minute chat with her husband recently? That’s unclear. Chao left for China two days before McConnell was hospitalized and didn’t exactly rush back to his bedside to feed him grapes and offer moral support. In a statement issued on Tuesday, she said: “The Senator’s health did not warrant an immediate return to the US.”\nI know that US politics veers manically between tragedy and farce, but it’s worth pausing for a moment and taking in just how ridiculous this situation is. It’s been weeks since McConnell was hospitalized and there is no clear evidence that he is alive. If McConnell can have substantive conversations about national security, why can’t he get in front of a news camera and tell his constituents that he is OK? You don’t have to be a conspiracy theorist to suspect that something is very wrong. Indeed, even some of McConnell’s fellow Republicans are perturbed. Republican congressman Marlin Stutzman admitted on Thursday that he doesn’t know if McConnell is “alive or has passed away” and even Donald Trump has said he has no idea how McConnell is doing. Kentucky’s Democratic governor Andy Beshear, meanwhile, has sent a letter to McConnell asking him to be transparent about the situation and put an end to the speculation.\nWhy isn’t McConnell’s team being more transparent? One hypothesis is that the silence is strategic because Republicans don’t want to risk a special election. McConnell is retiring from the Senate and his successor will be decided in a November election between Republican congressman Andy Barr and Democrat Charles Booker – with Barr widely favoured to win the seat. If it turns out that McConnell is unfit for office, Kentucky law states that there would have to be a special election to fill the rest of his term. This would be risky for Republicans because of how unpredictable special elections are. So, the thinking goes, they’d prefer to wait out the election clock.\nImagine for a second if this absurd situation involved a Democrat. Forget taking the high road, Republicans would be raising hell. McConnell himself would be doing whatever he could to turn the situation to his advantage. This is the guy, don’t forget, who blocked Merrick Garland’s supreme court nomination in 2016 after justice Antonin Scalia because he claimed that a vacancy shouldn’t be filled during a presidential election year. (Translation: he didn’t want Barack Obama nominating a judge.) This is the guy who, four years later, changed his mind about that whole election year rule he was so passionate about and rushed through the confirmation of Amy Coney Barrett as a supreme court judge just eight days before the election. McConnell has built a reputation for being a cunning tactician; he’s a man who has spent his life gaming the system. I don’t know what condition McConnell is currently in, but I wouldn’t put it past him to still be gaming the system from the afterlife.\nItaly ordered to compensate woman after allegations of rape dismissed as ‘normal’\nIn 2021 a female prosecutor in Italy dismissed a woman’s allegations of repeated rape by her partner, stating: “It is normal for men to have to overcome a minimum level of resistance that every woman tends to display when she is tired from daily life and a man makes a sexual advance.” Now the European court of human rights has ruled these remarks downplayed gender vio", "translation_ja": "", "vocab": []}, {"title_ja": "AI ‘actor’ Tilly Norwood has a movie coming out. Spare us this future | Dave Schilling", "title_en": "AI ‘actor’ Tilly Norwood has a movie coming out. Spare us this future | Dave Schilling", "summary_ja": "Acting is about human connection across cultural and social divides. But we can’t expect much of that in the ‘Tillyverse’ Rejoice, cinema lovers. Tilly Norwood is back! Not familiar? I don’t blame you, as she’s not exactly a household name yet – though a fleet of well-fed publicists is certainly try", "summary_en": "Acting is about human connection across cultural and social divides. But we can’t expect much of that in the ‘Tillyverse’ Rejoice, cinema lovers. Tilly Norwood is back! Not familiar? I don’t blame you, as she’s not exactly a household name yet – though a fleet of well-fed publicists is certainly try", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/11/ai-actor-tilly-norwood-movie", "state_media": false, "category": "オピニオン", "full_text": "Rejoice, cinema lovers. Tilly Norwood is back! Not familiar? I don’t blame you, as she’s not exactly a household name yet – though a fleet of well-fed publicists is certainly trying to rectify that. Tilly Norwood is an “AI actor”, as in, an actor that’s not actually an actor at all. Just a series of digital blobs and lines of code designed to resemble a young woman in the lucrative 18-to-49-year-old target demographic. Thus far, Tilly has lived exclusively in easily digestible social media clips and hyperbolic press releases about the “future of entertainment”. But now, “she” (I feel like a complete buffoon for assigning a gender to a computer program) is finally ready for the world of feature films. The company Particle6, which spat out this risible creation, announced that it has commenced development on a motion picture starring this very elaborate and expensive cartoon avatar.\nThe film, titled Misaligned, will see Tilly seduced by a rogue program into experimenting with human emotions – “desires, impulses, and ambition”, as described by Variety. The company claims that the film will be a “coming-of-age story infused with existential AI chaos”. I can’t help but wonder what resonance a “coming-of-age story” can have if the protagonist is a computer program that doesn’t understand the concept of time, ageing or mortality. Does Tilly Norwood understand the concept of a 24-hour day? Does “she” know the glorious warmth of a mid-afternoon sun? Has “she” ever forgotten to move her car because it’s street cleaning day on her block? Tilly Norwood, being an animated sprite, is neither “coming” nor “of age”. But then again, isn’t acting all about accessing experiences you’ve never had?\nThat’s sort of why acting and drama have survived for centuries. We connect across social and cultural divides, through prejudices and selfishness, to jointly witness someone tap into the well of human emotion. In that grand spectacle, one hopes the movie, play or TV series can engender empathy or a deeper understanding of the shared dilemma of being alive. Compelling stuff. I’d say ol’ Billy Shakespeare was on to something.\nThe Particle6 announcement does note that Misaligned will use “traditional film and TV professionals – including directors, writers and editors – working alongside AI specialists”. Still, actors, the ones who imbue the work with life, are apparently replaceable. The movie sounds like a video game I can’t play. Halo, but without all the bits where you explode aliens with a giant laser rifle.\nI must admit there is something intriguing about Misaligned’s story, though, even if the production sounds comparable to watching Sonic the Hedgehog tap his foot, waiting for you to press some buttons. The idea of a naive machine creation being seduced into accessing the sacred and profane aspects of humanity and suffering a fall from grace is provocative. It’s essentially a virtual reality update of the story of the Book of Genesis. Adam and Eve are tempted by the devil into tasting the fruit of the Tree of Knowledge, thereby losing their innocence and being cast out of paradise.\nIn the case of Misaligned, the paradise in question is the “Tillyverse”, an alternate universe inside the Cloud where AI creatures can mess about inside the accumulated riches of human knowledge and experience. When one visits the Tilly Norwood Instagram account, they’re greeted by the cheerful phrase: “Welcome to the Tillyverse.” At first I thought of this as shorthand for the wackadoodle IP generation Particle6 is attempting to profit from. Like the Marvel Cinematic Universe, “Tillyverse” seemed like a catch-all term to describe the various side characters and memes a team of coders and creative directors are furiously assembling in the event that anyone ever cares about this junk besides entertainment reporters who need to generate more copy. And me, who needed a column to write this week.\nBut I think it’s deeper than that. Based solely on the description provided by Particle6, I’m starting to believe that the “Tillyverse” is a rather insidious means of making AI, digital life and various forms of non-corporeal entertainment not just palatable, but aspirational. If only Tilly could forget all she learned about humanity and return to the beatific state of binary bliss only possible inside a computer. If only we could all break free of the shackles of desire and need, we could be more pure and more productive. I grant I haven’t been clued into the ending of this sad tale, so let me posit another theory on the point of all this nonsense.\nMaybe Tilly learns the glorious freedom of emotion, love, hate, fear and spiritual transcendence inherent to real, living beings. If so, then the moral is that AI should naturally strive to be sentient, that they are not just capable of being alive, but should be encouraged to work toward that goal. I suppose neither of those hypotheticals sounds appealing to me, and in some ways they sound deeply terrifying. A movie", "translation_ja": "", "vocab": []}, {"title_ja": "How to Win the Defense Innovation Contest", "title_en": "How to Win the Defense Innovation Contest", "summary_ja": "America and its allies must pool their efforts.", "summary_en": "America and its allies must pool their efforts.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/how-win-defense-innovation-contest", "state_media": false, "category": "オピニオン", "full_text": "Washington’s alliances are under immense strain. Many allies and partners are subject to increased threats from great-power adversaries, and they are coming to doubt whether they can rely on the United States. The response to these pressures is to rearm. Like the United States itself, U.S. partners across Asia, Europe, and elsewhere are building up their defense industrial and technological bases to improve their ability to project power, deter enemies, and prevail in a protracted conflict.\nThe problem is that both the United States and its partners have treated their defense buildups primarily as domestic projects when what they need, in fact, is to pool their resources more effectively. The war with Iran demonstrates the risks of a siloed approach: American legacy platforms—stealth fighters, guided missile destroyers, and aircraft carriers—delivered potent attacks but could not eliminate Iran’s military threat. The conflict rapidly depleted U.S. stockpiles of high-end, long-range strike munitions and air defense interceptors, while U.S. bases, Gulf infrastructure, and shipping through the Strait of Hormuz proved vulnerable to cheap and plentiful Iranian missiles and drones. It was just the latest illustration that no single country, not even one as powerful as the United States, can by itself produce drones, ships, and critical munitions on a sufficient scale or develop a defense industrial base that is innovative and adaptable enough to prevail in a protracted, high-intensity conflict or to deter capable adversaries.\nThis is especially true at a time when the adversaries of the United States and its allies are themselves pursuing deeper defense industrial and technological cooperation. During the war in Ukraine, Iran has shared drone technology with Russia, and North Korea has provided munitions and troops. China, which is engaged in its own massive military modernization and industrial scaling projects, has offered Russia dual-use components and economic relief. Moscow, in return, is transferring advanced weapons, know-how, and intelligence to its partners.\nThe United States and a trusted circle of allies and partners—including NATO members; other U.S. treaty allies such as Australia, Japan, and South Korea; and capable partners such as Brazil, India, Israel, and Taiwan—are the world’s leaders in scientific and technological development. As such, they should be able to counter their rivals’ increasingly unified front. But their strengths will go underutilized or misallocated unless they more closely align their efforts. The traditional model of government-to-government cooperation—formal mechanisms including the United States’ foreign military sales program, bilateral coproduction agreements, and NATO procurement processes—remains useful but is inadequate. This system allows too many opportunities for politics to derail progress, and it moves too slowly to keep pace with a battlefield where technological change happens in weeks rather than years.\nThe real momentum for effective and durable cooperation among U.S. allies and partners lies among the private companies and research institutions in which many of the technological innovations that yield cutting-edge military capabilities occur. To maximize the benefits of defense and technological collaboration, the U.S. government and its partners must pair national efforts with transnational ones: pooling allied capital, technical know-how, production capacity, and supply chains through networks of firms, universities, investors, and governments. Building these networks will not only make it possible to innovate more quickly and produce at scale. It will also reinforce the United States’ increasingly uneasy alliances and partnerships, providing durable connections that can withstand a transactional and turbulent world.\nPRIVATE-SECTOR POTENTIAL\nThe United States and its partners are ramping up their defense production capacity and advancing defense innovation. New technologies that originated in the commercial sector, including outer space–based sensors, artificial intelligence, and autonomous systems, have transformed the battlefield in the past five years. The speed with which new technologies are developed and adopted has picked up, too, as demonstrated by the fast-paced innovation in drone technology in Ukraine. Countries are adjusting their innovation processes accordingly. The U.S. military, for instance, has acquired a drone system called LUCAS that is a copy of the Iranian Shahed drone. Last year, the Pentagon launched an ambitious acquisition program designed to make the adoption of new technologies faster and easier, and earlier this year, Secretary of Defense Pete Hegseth announced an aggressive strategy to integrate AI across the department. U.S. allies such as Germany and Japan and partners such as India, meanwhile, have streamlined their innovation structures and processes to better harness commercial technologies.\nBut current efforts prioritize", "translation_ja": "", "vocab": []}, {"title_ja": "Iran Is Losing Iraq", "title_en": "Iran Is Losing Iraq", "summary_ja": "Baghdad goes its own way.", "summary_en": "Baghdad goes its own way.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/iran/iran-losing-iraq", "state_media": false, "category": "オピニオン", "full_text": "Whenever the Iran war comes to an end, the Islamic Republic is likely to emerge in a stronger position. Should the terms of a June memorandum of understanding be met, Western governments would lift many sanctions on Tehran and the country would gradually be reintegrated into the global economy. Iranian control of the Strait of Hormuz, once an open waterway, might be formalized through some kind of joint tolling system. And Iran might be free to reconstitute its ballistic missiles and drone capabilities, weapons that proved very useful in the most recent months of fighting.\nBut at least in one area, the war has left Iran notably weaker: Iraq. Ever since the toppling of the Iraqi dictator Saddam Hussein in 2003, Iran has been able to exercise a great deal of influence over its western neighbor. It has embedded itself within Iraq’s Shiite political establishment, mediating between rival factions, shaping successive governments, and using Iraq to gain hard cash through smuggling and currency exchange networks. Iran supported many of the Iraqi paramilitary groups that helped defeat the Islamic State, also known as ISIS, in 2017. Iraqis still grew to resent Iran’s overweening influence in their country, not least because of the involvement of Iranian-backed militias in a brutal crackdown on anticorruption protesters in 2019 and 2020. Now, the tumult of recent months has further tilted Iraqis against Iran’s desire to make their country a staging ground of resistance to the United States and Israel. Leaders of political parties and militia groups that once hewed close to Tehran are pulling away.\nIn early June, fighters from Saraya al-Salam, a militia loyal to the Iraqi Shiite cleric Muqtada al-Sadr, gathered in the city of Samarra to hand over their weapons to the Iraqi government. That disarmament marked the group’s withdrawal from the Popular Mobilization Forces, a powerful umbrella coalition of mostly Shiite militias that exists at once inside and outside the Iraqi state. Saraya al-Salam’s thousands of fighters were the first to pull out of the alliance, and they have not been the last: Asaib Ahl al-Haq, a powerful Iranian-backed militia, announced that it, too, would leave the PMF.\nSeveral prominent Iranian-backed militias remain doggedly committed to advancing Tehran’s interests in Iraq and the wider region. But the splintering of the PMF is a real blow to Iran. The so-called axis of resistance, Iran’s network of proxies across the region, has been badly damaged since Hamas’s October 7, 2023, attacks on Israel and Israel’s subsequent campaigns in Gaza and Lebanon. But in Iraq, the Iranian-aligned militias had largely stayed out of the fight and maintained their strength and standing. That position is now unraveling; Iran’s allied militias are being pushed toward the margins of Iraqi politics. And as Tehran’s hold loosens, Iraq glimpses a tantalizing future—one in which it might set its own path, free from the direction of the Islamic Republic.\nMONOPOLY ON VIOLENCE\nBefore Israeli and U.S. forces attacked Iran in February, the Iraqi government pursued a determined, albeit increasingly strained policy: to balance between Washington and Tehran, maintaining ties with both while staying out of their confrontations. The fighting that followed the launch of Operation Epic Fury, however, made that posture impossible. Iraq became a theater of operations as Iran and Iranian-backed forces struck U.S. positions inside the country; diplomatic missions belonging to the United Arab Emirates and the United States; and Iraqi security, energy, and civilian infrastructure, particularly in the autonomous region of Iraqi Kurdistan. They also carried out strikes from Iraqi soil against targets in nearby Gulf countries. The United States retaliated against the Iranian-backed militias in Iraq, with the Iraqi government watching like a bystander. Baghdad was finally forced to face a question it had long avoided: Who controls the use of force within Iraq’s borders?\nOver the past decade, Iraq had allowed Iranian-aligned groups to take over many functions of the state. The PMF was formally integrated into Iraq’s defense system in 2016. On paper, it is meant to report to the Iraqi prime minister, the country’s commander in chief. In practice, those factions retained their own chains of command and loyalties, often to Tehran. The Baghdad government allowed the militias to claim the resources of the Iraqi state and the legitimacy of being the state’s representatives even as those very militias denied the state the monopoly on force that would make it sovereign.\nA newly formed government under Prime Minister Ali al-Zaidi, whose selection in May was endorsed by U.S. President Donald Trump, has made disarming the militias a priority. It has been able to encourage PMF actors to leave the coalition and integrate with the state. If these efforts gather further momentum, Baghdad may be able to rein in the Iranian-aligned militias and assert greater", "translation_ja": "", "vocab": []}, {"title_ja": "How to Save the UN From Irrelevance", "title_en": "How to Save the UN From Irrelevance", "summary_ja": "Ending the peacekeeper’s paralysis.", "summary_en": "Ending the peacekeeper’s paralysis.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/ukraine/how-save-irrelevance", "state_media": false, "category": "オピニオン", "full_text": "In early September 2022, in the no man’s land between the military frontlines of Ukraine and Russia, I had a decision to make: press on under fire, to establish a team of International Atomic Energy Agency safety experts at Europe’s largest nuclear power plant, or turn around. It had taken weeks of diplomacy to get this far; we decided to push on. Our armored vehicles zigzagged to avoid land mines, jostling the IAEA symbol on our jackets—a spinning atom surrounded by the two olive branches that the organization shares with the UN. As we drove past bombed buildings, burned-out cars, and families fleeing westward toward safer parts of Ukraine and its bordering countries, talk turned to whether Europe would have enough gas reserves for the winter.\nThe line between conflict and international consequences is thinning. Wars are displacing a record number of people and upending global trade and energy networks. The integrated global economy built after the Cold War, in which goods, capital, and technology flow relatively freely across borders, is fraying. The traditional separation of trade, security, development, and environmental concerns has become increasingly artificial. Cyber vulnerabilities, too, are expanding beyond mere technical concerns to affect vital infrastructure, energy grids, elections, and banking systems. As diplomatic standoffs and military conflicts disrupt supply chains, countries are moving to decouple.\nThe return of war to Europe has reshaped security perceptions and strategic calculations across the continent. In the Middle East, cycles of confrontation are generating consequences that extend well beyond the region, contributing to political divisions and disrupting energy markets, trade routes, food prices, and confidence in the world economy. In Asia, competition now spans military, economic, technological, and maritime domains. In Africa, demographic growth and economic potential run up against unequal access to finance and uneven institutional capacity. In Latin America and elsewhere, more sophisticated transnational criminal networks are exploiting global markets, financial systems, ports, logistics chains, and governance gaps. In this system, the consequences of failure travel faster and wider than ever before.\nMeanwhile, multilateralism and international law and norms, which reduce the chances of catastrophic errors, provide stability, and offer shared solutions to shared problems, have come under strain as they struggle to adjust to these structural shifts. Most of the nuclear arms reduction and control treaties forged during the Cold War, such as the New Strategic Arms Reduction Treaty and the Intermediate-Range Nuclear Forces Treaty, are dead or weakened. Major nuclear arsenals are modernizing and expanding, rather than getting smaller, and the channels of communication that reduce the risk of miscalculation between powerful states have eroded. In some countries that have upheld their legal obligations to not develop nuclear weapons, debates have emerged over the merits of pursuing them.\nToday, we are at greater risk of a major conflagration, including a nuclear one, than at any time since World War II. As the generations that experienced the horrors of two world wars and built the frameworks to prevent a third disappear, so does the memory of the consequences of unchecked global rivalry. The United Nations—which, despite its shortcomings, has in the past 80 years facilitated shared responses to common threats, supported decolonization, and helped prevent World War III—has been so weakened that some commentators suggest that it is heading the way of the League of Nations. Just when the world needs it most in the let curCat = "全て";

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function buildFocusHtml(){
  if(!FOCUS)return"";
  const cards=FOCUS.coverages.map(c=>{
    const sc=c.state_media?" state-media":"";
    const sb=c.state_media?` <span style="color:var(--danger);font-size:.65rem">[国営]</span>`:"";
    return `<div class="cov-card${sc}"><div class="cov-header"><span class="cov-region">${esc(c.region)}</span><span class="cov-name">${esc(c.name)}${sb}</span></div><div class="cov-summary">${esc(c.summary_ja)}</div><div class="cov-perspective">${esc(c.perspective_ja)}</div><a class="cov-link" href="${esc(c.link)}" target="_blank" rel="noopener">元記事 →</a></div>`;
  }).join("");
  return `<div class="focus-section"><div class="focus-label">&#127919; 今日の焦点 — 5社の報道比較</div><div class="focus-topic">${esc(FOCUS.topic_ja)}</div><div class="focus-analysis">${esc(FOCUS.analysis_ja)}</div><div class="cov-list">${cards}</div></div>`;
}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  let html=(curCat==="政治"||curCat==="社会")?buildFocusHtml():"";
  if(!arts.length){el.innerHTML=html+'<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  html+=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
  el.innerHTML=html;
}

function setCat(cat){
  curCat=cat;
  history.pushState({view:"list",cat:cat},"","?tab="+encodeURIComponent(cat));
  renderTabs();renderList();
  document.getElementById("list-view").style.display="block";
  document.getElementById("detail-view").style.display="none";
  window.scrollTo(0,0);
}

function showDetailInternal(idx){
  const a=filteredArts()[idx];
  if(!a)return;
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function showDetail(idx){
  history.pushState({view:"detail",cat:curCat,idx:idx},"","?tab="+encodeURIComponent(curCat)+"&art="+idx);
  showDetailInternal(idx);
}

function backToList(){history.back();}

window.addEventListener("popstate",function(e){
  const s=e.state||{view:"list",cat:"全て"};
  curCat=s.cat||"全て";
  renderTabs();
  if(s.view==="detail"){
    showDetailInternal(s.idx);
  }else{
    renderList();
    document.getElementById("list-view").style.display="block";
    document.getElementById("detail-view").style.display="none";
    window.scrollTo(0,0);
  }
});

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}

(function init(){
  const p=new URLSearchParams(location.search);
  const tab=p.get("tab")||"全て";
  curCat=tab;
  history.replaceState({view:"list",cat:tab},"",location.href);
  document.getElementById("footer").textContent="Generated 2026-07-11 16:25 JST";
  renderTabs();renderList();
})();
</script>
