hen they wake up in the morning and rush outside, and knock a ball against a wall, and dream of something even greater than this.”\nI found myself thinking of Edwards’s monologue often during the USA’s run at the World Cup this year. It’s played in my mind whenever I saw the streets teeming with red, white and blue on matchdays all along the west coast. It echoed every time eye-popping TV numbers dropped. I thought of it whenever I saw groups of kids – seven, eight, or nine years old – gathered with their parents at practice facilities and stadiums and hotels, eager to get an autograph or simply to catch a glimpse of their heroes.\nEach time, I found myself wondering: when will that inspirational moment come for these kids? Who will provide it? What will it look like, sound like? At no point during the tournament did I consider the ramifications should the complete opposite come to pass.\nWhat on earth would those kids have thought about what the USA produced on Monday night during their 4-1 defeat against Belgium? What were the nation’s soccer fans saying to their non-soccer-fan friends who they had finally convinced to watch a game with them, because this was the big one? The families Edwards referred to – what must they have thought? One moment they’re blessed with the feeling that they were on the edge of something great, and that the hard work and dedication they had put into the sport might finally pay off with mainstream acceptance.\nWhat inspiration was there to be found in the team’s disjointed moves forward, of the missed defensive assignments, of the lack of poise the team played with in nearly every key moment? Of the alarming lack of technical and tactical wherewithal compared to a very good Belgian side? Of the opponents and pundits from other countries celebrating their national team’s demise?\nWe don’t know yet what the TV numbers from the game on Monday look like, but in a similar weekday primetime slot last week, the previous US record for a soccer broadcast was shattered, with around 31 million. At the very least, millions more – probably tens of millions – were tuning in on Monday night for their first US men’s national team experience. And their first impression was a side that was not up to the task.\nThese people were not the longtime foundations of the game to whom Edwards referred. But they will have understood what a team going toe-to-toe with a top‑class opponent looks like. They would have seen it had they watched Mexico, for all their faults, scrap and claw in search of a foothold against England. They would have seen it had they even watched any of the USA’s previous games in this World Cup – from the fever dream‑like 4-1 win against Paraguay to the businesslike 2-0 victory against Bosnia and Herzegovina in the last 32.\nThe 2026 World Cup was supposed to be a herald of the future for the US men’s national team program. And the great illusion of this tournament may well turn out to be that, for a feverish couple of weeks, we all thought that it would be. Instead we are right back where we were. Good against the teams we should beat, but still waiting for that extra breakthrough against the teams we shouldn’t.\nThere will be plenty of time spent and ink spilled breaking down why the USA fell short on Monday night. I’m not convinced any of that really matters. Rather, I’m left with a belief as unshakeable as it is daunting to consider: that the US have just wasted the single biggest growth opportunity in the history of American soccer.\nWhat happens when a nation of potential new fans – the living, breathing promise of a once‑in‑a‑generation home World Cup tournament – are delivered something worse than heartbreak: total inadequacy?\nWe may be about to find out.", "translation_ja": "2002年ワールドカップにおける米国対ポルトガル戦（3対2で米国勝利）の終盤、ESPNの解説者ジャック・エドワーズは、一晩中起きて視聴していた視聴者に向けて、自分たちが目撃している結果の深い意味を語った。韓国・水原での席から——それは近代米国男子代表の最高到達点であるベスト8進出で終わるキャンペーンの初戦だった——エドワーズは米国男子代表にとってだけでなく、アメリカ社会においてサッカーが果たす深遠な役割の核心を突く独白を披露した。東部時間の午前7時が近づく中で。\n\n「1950年にイングランドを破ったあのチームの選手たちは……この結果はその人たちが築いた土台があってこそだ」とエドワーズは堂々とした口調で語った。「このスポーツを成長させるために尽力してきた何千というアメリカの家族のためでもある。全国各地でサッカーを支え続けてきた人たちのためでもある。そして、朝目が覚めてこの結果を耳にし、外に飛び出してボールを壁に蹴り続け、これよりさらに大きな夢を見るだろう7歳、8歳、9歳の子どもたちのためでもある。」\n\n私は今年のワールドカップにおける米国の戦いを見ながら、エドワーズのその独白を何度も思い返した。試合のたびに西海岸の街々が赤・白・青で溢れかえる光景を見るたびに、その言葉が脳裏をよぎった。驚異的なテレビ視聴率が報じられるたびに、その言葉が響いた。7歳、8歳、9歳の子どもたちが親と一緒に練習施設やスタジアム、ホテルの前に集まり、サインを求めたり、ヒーローたちの姿を一目見ようとしている光景を見るたびに、その言葉を思った。\n\nそのたびに私は自問していた——これらの子どもたちにとっての「あの感動的な瞬間」はいつ訪れるのだろうか？誰がそれをもたらすのか？それはどんな姿で、どんな音で現れるのか？しかしトーナメント中、まったく正反対の事態が生じた場合の影響を考えたことは一度もなかった。\n\n月曜夜、ベルギーに4対1で完敗した米国の試合で、あの子どもたちは一体何を思ったことだろうか？「今度こそ大事な試合だから」とようやく説得してそばで観戦させた非サッカーファンの友人に、サッカーファンたちは何と言ったのだろうか？エドワーズが語った家族たち——彼らは何を感じたのだろうか？ある瞬間まで、自分たちが何か偉大なものの入り口に立っていると感じ、このスポーツに注いできた努力と献身がついに主流への扉を開くかもしれないと信じていたのに。\n\nチームがどんな力強い前進をしたというのか。見逃した守備の受け渡しに、何の感動があったというのか。ほぼすべての重要な場面で見せたその慌てた立ち居振る舞いに、どんな勇気を見出せというのか。非常に優れたベルギーと比較したときの、技術的・戦術的力量の恐ろしいまでの差に？他国の対戦相手や解説者たちが米国の敗退を祝う姿に？\n\n月曜夜の試合の視聴率はまだ明らかになっていないが、同様の平日プライムタイム枠だった先週は、サッカー中継の米国記録が更新され、約3100万人が視聴した。月曜夜は少なくとも数百万人、おそらく数千万人以上が、米国男子代表の試合を初めて見ていたはずだ。そしてその第一印象は、本番の舞台に立つ準備が整っていないチームだった。\n\nこうした人たちは、エドワーズが語ったようなサッカーの長年の基盤を支えてきた人々ではない。しかし彼らは、強豪と正面からぶつかり合うチームの姿がどんなものかを理解できただろう。イングランドを相手に足がかりを求めてもがき、爪を立て続けたメキシコを見ていれば、わかったはずだ。今大会の米国の以前の試合——パラグアイ相手の夢のような4対1の勝利や、ラウンド32でのボスニア・ヘルツェゴビナ戦における整然とした2対0の勝利——を見ていても、わかったはずだ。\n\n2026年ワールドカップは、米国男子代表プログラムの未来の到来を告げるものになるはずだった。そしてこのトーナメントの最大の幻想は、熱狂的な数週間の間、私たちが皆そう信じていたことかもしれない。しかし現実は、私たちは元の場所に戻ってしまった。勝てるべき相手には強いが、勝てないはずの相手への突破口を、今も待ち続けている。\n\n月曜夜になぜ米国が失敗したかを分析するために、多くの時間と紙面が費やされることだろう。しかし私はそのどれも本当に重要とは思えない。むしろ私には、揺るぎない——そして考えるだに恐ろしい——確信がある。米国はアメリカサッカー史上、最大の成長機会を無駄にしてしまったのだ、と。\n\n潜在的な新しいファンの国が——一世一代のホームワールドカップという生きた約束が——胸を打つ惜敗ですらなく、完全な力不足という結果を突きつけられたとき、何が起きるのか？\n\nその答えを、私たちはまもなく知ることになるかもしれない。", "vocab": [{"word": "soliloquy", "definition": "独り言、独白。本来は演劇用語で、登場人物が一人で語る長い台詞を指す。ここでは解説者が感情を込めて語った独白的なコメントを表す。"}, {"word": "wherewithal", "definition": "（ある目的を達成するための）手段・能力・資力。「technical and tactical wherewithal」で「技術的・戦術的な力量・手腕」という意味で使われている。"}, {"word": "demise", "definition": "終焉、消滅、死。ここでは米国代表チームのトーナメントからの敗退・終わりを指す。やや格式ある表現。"}, {"word": "poise", "definition": "落ち着き、沈着さ、平静さ。プレッシャーのかかる重要な場面でも冷静さを保てる精神的・技術的な安定感を指す。"}, {"word": "foothold", "definition": "足がかり、拠点。文字通りには足を踏ん張る場所を意味するが、ここでは試合の中で優位に立つきっかけや糸口を比喩的に表す。"}, {"word": "herald", "definition": "先触れ、前兆；または〜を告げる・予告する（動詞）。ここでは「到来を告げるもの」という意味で名詞として使われている。"}, {"word": "ramifications", "definition": "（行動・決定などの）波及効果、影響、結果。単純な結果ではなく、広範囲に及ぶ複雑な影響を指す場合に使われる上級語彙。"}]}, {"title_ja": "トランプが「共産主義の脅威」を叫ぶ理由――打つ手がなくなったからだ｜ロバート・ライク", "title_en": "Trump's 'Communist Menace' Rhetoric: A Sign He's Run Out of Political Options", "summary_ja": "ロバート・ライク氏は、トランプが中間選挙を前に経済・外交・移民政策いずれでも実績を語れないため、冷戦時代の「共産主義」恐怖煽動に頼り始めたと論じる。同氏はこの手法を1950年代のマッカーシズムと重ね合わせ、一時的には効果があったものの最終的には自滅を招いたと警告する。トランプが「共産主義的」と批判する進歩的政策の多くは、実際には大多数のアメリカ人に支持されていると指摘する。", "summary_en": "Robert Reich argues that Trump is resorting to Cold War-era 'communist' fearmongering because he has no strong record to run on ahead of the midterm elections — with the economy, foreign policy, and immigration all proving liabilities. Reich draws a parallel to McCarthyism of the 1950s, warning that such tactics, while temporarily effective, ultimately destroyed their practitioners. He suggests Trump's red-baiting targets popular progressive policies that most Americans actually support.", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/07/trump-communists-mccarthyism-midterm-elections", "state_media": false, "category": "オピニオン", "full_text": "Trump has run out of cards to play in the midterm elections, which is why he’s now talking about the “communist menace”.\nHe can’t talk about the economy because prices continue to rise faster than wages, which means most Americans are getting poorer. He can’t talk about foreign policy because his war in Iran has been a debacle, his tariffs an utter failure, and he obviously hasn’t settled the war in Ukraine on “day one”. He can’t talk about immigration because his raids and mass deportations have become so unpopular.\nSo, facing the midterm elections, what’s left?\nHe’s resorting to the oldest of rightwing tropes – accusing Democrats (especially a rising generation of new, young, vigorous Democratic politicians) of being communists.\nHe kicked off America’s 250th anniversary celebrations on Friday with a speech at Mount Rushmore extolling American culture and warning of a resurgence of the “communist menace”. With the granite faces of four of his predecessors behind him, Trump took aim at what he called “radicals” and “extremists”.\n“There is now a resurgence of the communist menace in our land, including from newcomers to our country who embrace ideas totally opposed to our way of life and our great success. You can be a communist, or you can be a patriot. You cannot be both.”\nOh, please.\nFor years, Trump has been trying to scare Americans about Democrats who advocate Medicare for All, universal childcare, free public higher education and higher taxes on the super-wealthy to pay for them (all of which the rising young Democrats are advocating).\nBut he hasn’t gotten anywhere because these initiatives are supported by most Americans.\nSo now he’s throwing scary labels at the wall and seeing what sticks.\nCommunism was the scare word used after the first and second world wars to crack the whip on the left. It provoked witch-hunts and ruined careers.\nIt made the former Wisconsin senator Joe McCarthy a one-man bomb squad in the early 1950s, when he forced American citizens to “name names” and ridiculed the “pitiful squealing” of “those egg-sucking phony liberals” who “would hold sacrosanct those communists and queers”.\nMcCarthyism was a by-product of the Republican party’s postwar effort to eradicate the New Deal. The party had portrayed the midterm election of 1946 as a “battle between Republicanism and communism”, and the Republican National Committee chairperson claimed that the federal bureaucracy was filled with “pink puppets”.\nSouthern segregationist Democrats joined in the red-baiting. The Mississippi senator Theodore Bilbo, a Klansman who had filibustered to block anti-lynching legislation, described multiracial labor unions’ advocacy for civil rights as the work of “northern communists”. Representative John Elliott Rankin, a racist and antisemitic Mississippi Democrat who helped establish the House Committee on Un-American Activities, called labor unions’ southern organizing campaign “a communist plot”, fearing it would give more voting rights to Black people. “We’re asleep at the switch,” he warned. “They’re taking over this country; we’ve got to stop them if we want this country.”\nThe communist scare tactics were temporarily successful. In the 1946 midterms, Democrats lost control of both chambers of Congress. Wisconsin sent Joe McCarthy to the Senate. California sent to the House a young Republican lawyer who had already figured out how to use red-baiting as a political tool, Richard Nixon. Four years later it sent him to the Senate, too.\nIt’s likely that Trump’s earliest political memories are of Joe McCarthy’s red scare. Trump and I are the same age, and those are among my earliest memories.\nOn 9 June 1954, I sat at my father’s side on our living room couch watching the Army-McCarthy hearings. McCarthy had accused the US army of having poor security at a top-secret facility, hinting at communist subversion. He charged that one of the young attorneys on the staff of Joseph Welch, who was representing the army, was a communist. The charge could destroy the young man’s career.\n“Son-of-a-bitch!” my father shouted at McCarthy on television. I hid my head.\nAs McCarthy continued his attack on the young attorney, Welch broke in: “Until this moment, senator, I think I never really gauged your cruelty or your recklessness.”\nI was only eight years old, but I was spellbound.\nMcCarthy didn’t stop.\n“Son-of-a-bitch!” my father shouted, even more loudly.\nAt this point, Welch demanded that McCarthy listen to him. “Let us not assassinate this lad further, senator,” he said. “You have done enough. Have you no sense of decency?”\nAlmost overnight, McCarthy imploded. Welch had aroused the decency of the American people. McCarthy’s national popularity evaporated. Three years later, censured by his Senate colleagues, ostracized by his party, and ignored by the press, McCarthy drank himself to death, a broken man at the age of 48.\nDuring those hearings, McCarthy’s chief counsel was Roy Cohn, who had gained prominence as the Dep", "translation_ja": "トランプは中間選挙で打つ手がなくなってしまった。だからこそ今、「共産主義の脅威」について語り始めているのだ。\n\n彼は経済について語ることができない。物価は賃金よりも速いペースで上昇し続けており、ほとんどのアメリカ人が貧しくなっているからだ。外交政策についても語れない。彼のイランとの戦争は惨憺たる失敗であり、関税政策も完全な失敗に終わり、ウクライナ戦争を「初日に」解決するという約束も果たせていない。移民問題についても語れない。彼の強制捜査や大規模強制送還が非常に不人気になってしまったからだ。\n\nでは、中間選挙を前に、何が残っているというのか？\n\n彼は最も古い右派の常套手段に逃げ込んでいる――民主党員（特に台頭しつつある新しい世代の若く活力ある民主党政治家たち）を共産主義者と非難することだ。\n\n彼は金曜日、マウント・ラシュモアでの演説でアメリカ建国250周年記念式典の幕を開け、アメリカ文化を称え、「共産主義の脅威」の復活を警告した。4人の前任大統領の花崗岩の顔を背後に、トランプは「急進主義者」や「過激主義者」と彼が呼ぶ者たちを攻撃した。\n\n「我が国では今、共産主義の脅威が復活しつつある。それにはわが国の生き方や偉大な成功にまったく相反する考えを抱く新たな移民も含まれる。共産主義者にはなれる。愛国者にもなれる。しかし、その両方にはなれない」\n\nまったく、お断りだ。\n\n長年にわたり、トランプは「国民皆保険（メディケア・フォー・オール）」、普遍的育児支援、無償公教育、超富裕層への増税（これらの費用を賄うための）を提唱する民主党員についてアメリカ人を脅かそうとしてきた（台頭する若い民主党員たちはいずれもこれらを提唱している）。\n\nしかし、これらの政策はほとんどのアメリカ人に支持されているため、彼はどこにも辿り着けずにいる。\n\nそこで今、彼は怖い言葉を壁に投げつけ、何かが引っかかるか試している。\n\n「共産主義」は第一次・第二次世界大戦後に左派を鞭打つために使われた脅し言葉だった。それは魔女狩りを引き起こし、多くのキャリアを破滅させた。\n\nそれはかつてウィスコンシン州選出の上院議員ジョー・マッカーシーを1950年代初頭に一人の爆弾処理班にした。彼はアメリカ市民に「名前を挙げる」よう強要し、「共産主義者や同性愛者を神聖視するような」「卵をすすったような偽善的リベラル」の「哀れな泣き声」を嘲笑した。\n\nマッカーシズムは、共和党が戦後にニューディール政策を根絶やしにしようとした努力の副産物だった。同党は1946年の中間選挙を「共和主義と共産主義の戦い」と描写し、共和党全国委員会の議長は連邦官僚機構が「薄赤色の操り人形」で溢れていると主張した。\n\n南部の人種隔離主義的な民主党員も赤狩りに加わった。反リンチ法案を阻止するために議事妨害を行ったKKKのメンバーであるミシシッピ州上院議員セオドア・ビルボは、公民権を求める多人種の労働組合の活動を「北部の共産主義者の仕業」と表現した。人種差別主義者で反ユダヤ主義者であり、非米活動調査委員会の設立に関わったミシシッピ州選出の民主党下院議員ジョン・エリオット・ランキンは、労働組合の南部組織化運動を「共産主義の陰謀」と呼び、それが黒人に対してより多くの選挙権を与えることになると恐れた。「我々は油断している」と彼は警告した。「彼らがこの国を乗っ取ろうとしている。止めなければこの国は終わりだ」\n\n共産主義恐怖の戦術は一時的に成功を収めた。1946年の中間選挙で民主党は議会両院の支配権を失った。ウィスコンシン州はジョー・マッカーシーを上院に送り込んだ。カリフォルニア州は既に赤狩りを政治的道具として活用する方法を見出していた若い共和党弁護士、リチャード・ニクソンを下院に送り込んだ。4年後には彼を上院にも送った。\n\nトランプの最も古い政治的記憶は、おそらくジョー・マッカーシーの赤狩りにまつわるものだろう。トランプと私は同い年であり、私の最も古い記憶の中にもそれがある。\n\n1954年6月9日、私は居間のソファで父の隣に座り、陸軍マッカーシー公聴会をテレビで見ていた。マッカーシーは、陸軍の最高機密施設でのセキュリティが不十分だと非難し、共産主義者による破壊工作を示唆していた。彼は、陸軍側の代理人を務めていたジョセフ・ウェルチのスタッフの若い弁護士の一人が共産主義者だと告発した。その告発はその若者のキャリアを破壊しかねなかった。\n\n「このろくでなし！」と父はテレビに向かってマッカーシーを罵倒した。私は頭を隠した。\n\nマッカーシーがその若い弁護士への攻撃を続けると、ウェルチが割り込んだ。「上院議員、今この瞬間まで、あなたの残酷さと無謀さを私は本当には測り知れていなかったと思います」\n\n私はまだ8歳だったが、魅了されて画面から目が離せなかった。\n\nマッカーシーは止まらなかった。\n\n「このろくでなし！」と父はさらに大声で怒鳴った。\n\nこの時点で、ウェルチはマッカーシーに自分の話を聞くよう求めた。「上院議員、この若者をこれ以上傷つけるのはやめましょう」と彼は言った。「あなたはもう十分なことをしました。あなたには良識というものがないのですか？」\n\nほぼ一夜にして、マッカーシーは自滅した。ウェルチはアメリカ国民の良識を呼び覚ましたのだ。マッカーシーの全国的な人気は消え去った。3年後、上院の同僚から非難決議を受け、党から孤立し、報道機関にも無視されたマッカーシーは、48歳という若さで、壊れた男として酒に溺れて死んだ。\n\n公聴会当時、マッカーシーの主任顧問を務めていたのはロイ・コーンだった。彼は副……", "vocab": [{"word": "debacle", "definition": "完全な失敗、大失敗、崩壊を意味する名詞。特に公の場での惨めな失敗や混乱した敗北を指す。例：「His war in Iran has been a debacle（イランとの戦争は惨憺たる失敗だった）」のように使われる。"}, {"word": "red-baiting", "definition": "政治的反対者を共産主義者や急進的左翼であると（証拠なしに）非難することで信用を失墜させる行為を指す複合語。マッカーシズム時代に特に盛んに使われた戦術。"}, {"word": "filibuster", "definition": "議会において、採決を阻止するために長時間の演説などで議事を引き延ばす議事妨害戦術を指す動詞・名詞。アメリカの立法プロセスに関する文章で頻出する政治用語。"}, {"word": "trope", "definition": "文学・修辞学では比喩的表現を指すが、現代的用法では特定のジャンルや文脈で使い古された典型的な表現・手法・決まり文句を意味する。「the oldest of rightwing tropes（最も古い右派の常套手段）」のように使われる。"}, {"word": "ostracized", "definition": "集団や社会から排除・追放された状態を表す形容詞（動詞ostracizeの過去分詞）。古代ギリシャの追放制度に由来し、社会的・政治的な孤立を強調する際に用いられる上級語彙。"}, {"word": "sacrosanct", "definition": "神聖不可侵で、批判や変更を一切許さないとされていることを意味する形容詞。宗教的な文脈だけでなく、社会・政治的に絶対視されているものに対しても使われる。"}, {"word": "censured", "definition": "公式に非難・譴責されたことを意味する動詞censorの過去形・過去分詞。特に議会や公的機関が正式な手続きを経てメンバーの行為を公式に非難する場合に使われる政治・法律用語。"}]}, {"title_ja": "台湾が見落とし続けるウクライナの教訓", "title_en": "The Ukraine Lesson Taiwan Keeps Missing", "summary_ja": "筆者は、台湾がウクライナの戦争経験から誤った教訓を引き出すリスクを冒していると主張する。焦点が武器調達に向けられており、ドローン戦争を効果的にする広範な制度的エコシステム——ソフトウェアシステム、ドクトリン、国内製造基盤——が軽視されているというのだ。ウクライナの成功を称賛することと、それを再現することの間にある溝を、台湾はいまだ埋められていない。", "summary_en": "The author argues that Taiwan risks drawing the wrong lessons from Ukraine's war experience by focusing on weapons procurement rather than the broader institutional ecosystem—including software systems, doctrine, and domestic manufacturing—that makes drone warfare effective. Despite rhetoric about learning from Ukraine, Taiwan's legislature cut domestic drone production funding, and the island remains far from the institutional reforms needed. The real lesson is that cheap unmanned systems only work at scale when supported by battle-management software, dedicated military services, and rapid industrial adaptation.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/ukraine-lesson-taiwan-keeps-missing", "state_media": false, "category": "オピニオン", "full_text": "The conflict in Ukraine, now in its fifth year, has provided extraordinary lessons about the future of war. The enormous impact of cheap, remotely piloted unmanned systems—on the ground, in the air, and at sea—cannot be overstated. But there is a danger that military strategists will look at the battlefield in Ukraine and see little more than a catalog of weapons to buy.\nAlthough lessons about particular weapons systems are relevant, the more important lesson is about the ecosystem necessary for these new tools to be effective. Ukraine, for instance, has developed Sky Fortress, a network of 14,000 acoustic sensors that locate Russian drones by sound, even at altitudes radar cannot see, to provide a high-fidelity picture of incoming threats. It also has its own battle-management software systems that direct unmanned surveillance, as well as the Unmanned Services Force, an entirely new military service—alongside the army, navy, and air force—that is dedicated to drone warfare, with its own doctrine, leader development, procurement processes, and even recruiting and basic training. Perhaps most critically, the ecosystem in Ukraine also includes manufacturers that can produce enormous quantities of unmanned systems and constantly refine the software and hardware of those systems in response to developments on the battlefield.\nThe risk of missing this wider lesson is especially acute for Taiwan, which also faces the threat of invasion by a larger aggressor. Taiwan’s leaders and partners frequently say that the island is intently focused on understanding the nature of modern warfare, especially what is happening in Ukraine, in order to prepare for and thus deter Chinese aggression. But while Ukraine’s achievements are admired in Taiwan, that admiration has not yet produced the enormous, fundamental changes that enabled Ukraine’s success.\nIndeed, it is not yet clear that Taiwan’s leaders fully understand the Ukraine lesson. Despite the current administration’s stated ambition to eventually field tens of thousands of aerial drones and well over a thousand uncrewed surface vessels, Taiwan’s legislature struck domestic drone production from the government’s special defense budget earlier this year. The opposition parties that control the legislature cited fiscal discipline as well as concerns about potential corruption in domestic procurement, but the move’s overall effect was to dramatically reduce new domestic procurement of unmanned systems and to cut funds set aside for joint development of such systems with the United States.\nEven if Taiwan’s politicians can one day muster the funding for substantial quantities of drones, the island still remains far from making the considerable institutional changes needed to ensure their effective employment. The gap between admiring Ukraine’s success and replicating it, in other words, is precisely the gap Taiwan has yet to close.\nHOW UKRAINE REWROTE THE RULES\nWhen Russia invaded Ukraine in February 2022, Ukraine sank its own flagship (lest it be seized by Russia) and was left, in effect, without a navy. Yet within two years, Ukraine had driven the Russian Black Sea Fleet from Sevastopol, sunk over one-third of Russia’s ships on the Black Sea, and forced the remainder of the fleet to tie up in a port as far from Ukraine as possible. Ukraine accomplished this not by acquiring traditional ships but by devising a means of contesting the sea without them: using aerial drones to find the Russian ships and maritime drones to sink them.\nThat experience—and Ukraine’s similar experiences with aerial and ground drones of various types, ranges, and capabilities—illustrates the most profound lesson of the war: that an overall architecture that links sensors with analysts, leaders, and shooters can enable remotely operated surveillance and weapons systems to work at scale. To build this architecture, Ukraine turned command and control into a software problem. Ukrainian software engineers and technologists, and the foreign volunteers supporting them, produced the Delta system, their own battle-management system, rather than purchasing one from elsewhere. Now run by Ukraine’s Ministry of Defense, the Delta system gathers data from sensors on the ground, at sea, and in the air and then distributes the resulting high-fidelity picture to Ukrainian military units. It is the connective tissue that allows a mass of cheap systems to be directed against a smaller and far costlier array of traditional weapons.\nUkraine also overcame enormous manpower and economic disadvantages by adapting its defenses. When Russia started using relatively inexpensive Shahed drones against it, Ukraine knew it could not defend itself with costly missile interceptors. American-made Patriot interceptors, for instance, cost several million dollars; Shaheds cost less than $50,000. Ukraine reversed this ratio by developing interceptor drones that cost only a few thousand dollars apiece. The Shaheds thus went from being rela", "translation_ja": "ウクライナ紛争は今や5年目に突入し、未来の戦争に関する並外れた教訓をもたらしてきた。地上・空中・海上において安価な遠隔操縦無人システムが与えた甚大な影響は、いくら強調してもし過ぎることはない。しかし、軍事戦略家たちがウクライナの戦場を眺め、購入すべき兵器のカタログ以上のものを見出せないという危険性がある。\n\n特定の兵器システムに関する教訓は確かに重要だが、より重要な教訓は、こうした新しいツールを有効に機能させるために必要なエコシステムについてだ。たとえばウクライナは、ロシアのドローンをその音によって探知する1万4000個の音響センサーからなるネットワーク「スカイ・フォートレス」を開発した。このシステムはレーダーが捉えられない高度においても脅威を識別し、迫りくる敵の高精度な状況図を提供する。また、無人偵察システムを指揮する独自の戦闘管理ソフトウェアや、「無人システム部隊」という全く新しい軍種——陸軍・海軍・空軍と並列する——も整備した。この軍種は独自のドクトリン、幹部育成、調達プロセス、さらには採用・基礎訓練まで備えている。おそらく最も重要なのは、ウクライナのエコシステムには、膨大な数の無人システムを生産し、戦場での展開を踏まえてそのソフトウェアとハードウェアを絶えず改良できるメーカーが含まれているという点だ。\n\nこの広い教訓を見逃すリスクは、台湾にとって特に深刻だ。台湾もまた、より大きな侵略国からの侵攻の脅威に直面しているからだ。台湾の指導者やパートナー国は、中国の侵略を抑止するために、現代戦の性質——特にウクライナで起きていること——を理解することに台湾が真剣に取り組んでいると頻繁に語る。しかしウクライナの成果が台湾で称賛される一方で、その称賛はいまだウクライナの成功を可能にした大規模かつ根本的な変化を生み出してはいない。\n\n実際、台湾の指導者がウクライナの教訓を十分に理解しているかどうかは、いまだ定かではない。現政権は最終的に数万機の空中ドローンと1000機を超える無人水上艇を配備するという目標を掲げているにもかかわらず、台湾の立法院は今年初め、政府の特別防衛予算から国内ドローン生産費を削除した。野党が多数を占める立法院は財政規律と国内調達における腐敗への懸念を理由に挙げたが、この措置の全体的な効果は、無人システムの新たな国内調達を大幅に削減し、米国との共同開発のために確保されていた資金を削ることだった。\n\n仮に台湾の政治家がいつかドローンの大量調達に必要な資金を確保できたとしても、島はいまだその効果的な運用を確保するために必要な相当な制度的変革からは程遠い。言い換えれば、ウクライナの成功を称賛することとそれを再現することの間の溝こそ、台湾がいまだ埋めていない溝なのだ。\n\n【ウクライナはいかにして戦争のルールを書き換えたか】\n\n2022年2月にロシアがウクライナに侵攻したとき、ウクライナはロシアに拿捕されないよう自国の旗艦を自ら沈め、事実上海軍なき状態に置かれた。しかしわずか2年以内に、ウクライナはロシアの黒海艦隊をセバストポリから駆逐し、黒海に展開するロシア艦艇の3分の1以上を撃沈し、残りの艦隊をウクライナからできる限り遠い港に係留させた。ウクライナはこれを、従来型の艦艇を調達することによってではなく、艦艇なしで海を争う手段を考案することによって達成した。航空ドローンでロシア艦艇を発見し、海上ドローンでそれらを撃沈したのだ。\n\nその経験——そして様々な種類・射程・能力を持つ航空・地上ドローンに関するウクライナの同様の経験——は、この戦争が持つ最も深遠な教訓を示している。センサーとアナリスト、指揮官、攻撃手段を結びつける総合的なアーキテクチャが、遠隔操作の監視・兵器システムを大規模に機能させ得るという教訓だ。このアーキテクチャを構築するために、ウクライナは指揮統制をソフトウェアの問題として捉え直した。ウクライナのソフトウェアエンジニアや技術者、そして彼らを支援する外国人ボランティアたちは、他国から購入するのではなく、独自の戦闘管理システム「デルタ」を開発した。現在ウクライナ国防省が運用するデルタシステムは、地上・海上・空中のセンサーからデータを収集し、その結果として得られる高精度の状況図をウクライナ軍部隊に配信する。これは、安価なシステムの大群を少数かつはるかに高価な従来型兵器に対して指向させることを可能にする、結合組織である。\n\nウクライナはまた、防衛体制を適応させることで、甚大な人的・経済的不利を克服した。ロシアが比較的安価なシャヘドドローンを使い始めたとき、ウクライナはコストの高いミサイル迎撃システムでは対抗できないと判断した。たとえば米国製パトリオット迎撃ミサイルは数百万ドルもするが、シャヘドは5万ドル以下だ。ウクライナはわずか数千ドルの迎撃ドローンを開発することで、このコスト比を逆転させた。こうしてシャヘドは、比較的...", "vocab": [{"word": "ecosystem", "definition": "ここでは生態系の比喩的用法で、特定の目的を達成するために相互に連携する組織・技術・人材・制度などの総体を指す。軍事・技術分野で頻出する概念的表現。"}, {"word": "connective tissue", "definition": "本来は生物学用語（結合組織）だが、ここでは比喩として「異なるシステムや要素を統合し機能させる仕組み」を意味する慣用的表現。"}, {"word": "high-fidelity", "definition": "「高精度の」「高忠実度の」という意味で、センサーや情報システムが現実を極めて正確に再現・描写できることを指す技術・軍事用語。"}, {"word": "muster", "definition": "「（資金・勇気・支持などを）かき集める、結集させる」という意味の動詞。特に困難な状況下で必要なリソースや意志を集めるニュアンスを持つ。"}, {"word": "doctrine", "definition": "軍事・政治・宗教などにおける「原則・教義・ドクトリン」を指し、組織が行動・判断する際の基本的な指針や方針体系を意味する専門用語。"}, {"word": "procurement", "definition": "「調達」を意味する専門用語で、特に政府・軍・企業が契約・購入によって物資やサービスを入手するプロセス全体を指す。"}, {"word": "contesting", "definition": "ここでは「（海域などを）争う・支配を競う」という軍事的文脈での用法。単なる反論ではなく、物理的・戦略的な優位を競い合う行為を指す。"}]}, {"title_ja": "民間セクターはベトナムを救えるか？トー・ラム体制下の新たな方向性", "title_en": "Can the Private Sector Save Vietnam? A New Direction Under To Lam", "summary_ja": "筆者は、権力を集中させたベトナム共産党のトー・ラム書記長が、国有企業から民間主導の成長へと大胆かつリスクを伴う転換を図り、年率10％のGDP成長を目指していると主張する。これはベトナムが四十年間維持してきた混合経済モデルからの劇的な脱却を意味する。筆者はこの賭けがベトナムの潜在力を解放する可能性と同時に、過度に中央集権化された権威主義体制が陥りがちな内部腐敗のリスクも伴うと指摘する。", "summary_en": "The author argues that Vietnam's Communist Party, under newly consolidated leader To Lam, is making a bold and risky shift away from state-owned enterprises toward private-sector-led growth, aiming for 10% annual GDP expansion. This represents a dramatic departure from Vietnam's four-decade hybrid economic model, which relied on state firms, small private businesses, and multinational corporations. The author suggests this gamble could either unlock Vietnam's potential or expose it to the dangers of over-centralized authoritarian governance.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/southeast-asia/can-private-sector-save-vietnam", "state_media": false, "category": "オピニオン", "full_text": "Every five years, amid the red banners, choreographed pageantry, and lofty speeches of its party congress, the Communist Party of Vietnam releases two staid policy documents: a political report and a socioeconomic development plan. Although infused with party rhetoric, these texts are more than ideological pronouncements. They define the governing agenda for the next five-year political cycle. In a system in which formal politics is opaque, these documents provide the clearest sense of what the leadership wants to do.\nThe latest documents, released at the party congress in January, reveal that Vietnam is headed in a new direction. The party is transforming the political model that has governed the country for the past four decades. The 2026 documents increase the party’s direct role in managing the country’s affairs while also embracing the private sector and sidelining state-owned enterprises. Vietnam’s leaders are betting that the country needs a new growth plan—one that marries centralized political control with private-sector-led development—in hopes of reaching the ambitious annual growth target of ten percent of GDP.\nThis reorientation comes at a precarious moment for Vietnam and its ruling Communist Party. Since market reforms began in the late 1980s, Vietnam has relied on a mix of small private firms, which manufacture low-cost goods mostly for the domestic market; multinational corporations that produce the bulk of Vietnam’s exports; and large state-owned enterprises, which are economically inefficient but that the party relies on to redistribute resources to poorer regions of the country. This hybrid model has increased incomes, reduced poverty, and integrated Vietnamese industry into global supply chains. But as Vietnam emerged from the COVID-19 pandemic in 2021, the limits of this arrangement were increasingly apparent. State-owned enterprises had failed to become globally competitive, and private firms lacked the capital to scale up, invest in technology, or compete abroad. This left Vietnam dependent on multinational corporations. An emerging consensus developed within the country’s leadership that the existing economic model would no longer sustain rapid growth and distribute its benefits.\nPolicymakers experimented with piecemeal efforts to address these weaknesses. They tried to restructure state-owned enterprises to make them more competitive, improve the business environment by streamlining regulations, and deepen capital markets by developing the corporate bond market and stock exchanges. But these reforms repeatedly stalled. Powerful bureaucratic and provincial interests slowed implementation because they benefited from and believed in the existing role of state-owned enterprises in Vietnam’s economy.\nWhen To Lam took power as the general secretary of the Communist Party, in 2024, manyobservers feared that it would spell the end of Vietnam’s attempts at economic reform. They expected that Lam, who formerly led the Ministry of Public Security, would prioritize national security objectives over economic goals. Their fears seemed warranted when Lam set about consolidating power and authority. He also benefited from ongoing institutional changes that have strengthened party control over governance and from an anticorruption campaign that weakened political rivals and their patronage networks. Within 18 months, Lam had become the most powerful Vietnamese leader in four decades.\nBut as this year’s party congress made clear, Lam is using his newfound power in unexpected ways. Vietnam’s leadership is positioning itself to drive an economic transformation that promotes private businesses and diminishes the role of state-owned enterprises—a stark transformation of the country’s past approach to growth. It is a bold and risky gamble that could either unleash the country’s latent potential or leave it to face the risks of internal degradation that have befallen many highly centralized political regimes elsewhere. As it faces an increasingly uncertain global trade environment, Vietnam is betting that a new form of party-led capitalism will guide it forward.\nTHE POWER BROKER\nFor much of the post–Cold War era, Vietnam maintained a system of collective leadership designed to prevent any single politician from dominating the state. Vietnam divided political authority among four pillars: the general secretary of the Communist Party, the president, the prime minister, and the chair of the National Assembly. Power was also distributed among regional interests through voting blocs in the party’s Central Committee, its most important decision-making body, in which provinces held nearly half the seats. This system often moved slowly, but it proved very stable.\nThe system of collective leadership has been severely weakened. Lam entered January’s party congress in a dominant position, a result of consolidation since he took office and larger trends in Vietnamese politics over the past decade. In 2016, the party ", "translation_ja": "五年ごとに、赤い横断幕と演出された式典、高尚な演説に彩られた党大会の中で、ベトナム共産党は二つの無味乾燥な政策文書を発表する。政治報告と社会経済開発計画である。党の修辞に満ちてはいるものの、これらの文書はイデオロギー的な宣言にとどまらない。次の五年間の政治サイクルにおける統治アジェンダを定義するものだ。公式政治が不透明なこの体制において、これらの文書は指導部の意図を最も明確に示す手がかりとなる。\n\n今年一月の党大会で発表された最新文書は、ベトナムが新たな方向へ向かっていることを示している。党は過去四十年間にわたって国を統治してきた政治モデルを変革しようとしている。2026年の文書は、国政における党の直接的な役割を強化すると同時に、民間セクターを積極的に取り込み、国有企業を後退させる方針を打ち出している。ベトナムの指導者たちは、年率10％というGDP成長の野心的な目標を達成するために、中央集権的な政治支配と民間主導の発展を組み合わせた新たな成長モデルが必要だと賭けに出ている。\n\nこの方向転換は、ベトナムと与党共産党にとって不安定な時期に行われている。1980年代後半に市場改革が始まって以来、ベトナムは主に国内市場向けの低コスト商品を製造する中小民間企業、ベトナムの輸出の大半を担う多国籍企業、そして経済効率は低いものの党が地方の貧困地域への資源再分配に活用してきた大規模国有企業という三者の混合モデルに依存してきた。このハイブリッドモデルは、国民の所得を向上させ、貧困を削減し、ベトナム産業をグローバルなサプライチェーンに組み込むことに貢献した。しかし、2021年にベトナムが新型コロナウイルス感染症のパンデミックから立ち直ると、この仕組みの限界がますます明らかになった。国有企業はグローバル競争力を獲得できず、民間企業は規模を拡大し、技術に投資し、海外で競争するための資本が不足していた。その結果、ベトナムは多国籍企業への依存を余儀なくされた。現行の経済モデルではもはや急速な成長を持続させ、その恩恵を広く分配することはできないという認識が、国の指導部内でコンセンサスとして形成されていった。\n\n政策立案者たちはこれらの弱点に対処するために散発的な改革を試みた。国有企業の再構築による競争力強化、規制の合理化による事業環境の改善、社債市場や証券取引所の発展による資本市場の深化などが試みられた。しかしこれらの改革は繰り返し頓挫した。強力な官僚組織や地方の利益集団が、国有企業の既存の役割から恩恵を受け、それを信奉していたため、実施を遅らせたのである。\n\nトー・ラムが2024年に共産党書記長として権力を握ったとき、多くの観測者はそれがベトナムの経済改革の試みの終わりを告げるものだと危惧した。かつて公安省を率いたラム氏は、経済目標よりも国家安全保障上の目標を優先するだろうと予想されていた。その懸念は、ラムが権力と権限の集中を進め始めたことで正当化されるように見えた。彼はまた、統治に対する党の支配を強化した継続的な制度変革や、政敵とその後援ネットワークを弱体化させた反腐敗キャンペーンからも恩恵を受けた。就任からわずか十八ヶ月で、ラムは四十年ぶりに最も強力なベトナム指導者となった。\n\nしかし今年の党大会が明らかにしたように、ラムはその新たな権力を予想外の方法で行使している。ベトナムの指導部は、民間企業を促進し国有企業の役割を縮小する経済変革を推進する立場を打ち出しており、それはこれまでの成長へのアプローチからの大きな転換である。これは大胆かつリスクを伴う賭けであり、国の潜在力を解き放つ可能性がある一方、高度に中央集権化された政治体制が他国で経験してきた内部崩壊のリスクをもたらす可能性もある。ベトナムは、ますます不確実性を増す世界の貿易環境に直面しながら、党主導の資本主義という新しい形態が前進への道を切り開くと賭けている。\n\n【権力の仲介者】\n\n冷戦後の時代の大半において、ベトナムはいかなる政治家も国家を支配しないよう設計された集団指導体制を維持してきた。ベトナムは政治的権威を四つの柱に分散させていた。共産党書記長、国家主席、首相、そして国会議長である。権力はまた、党の最重要意思決定機関である中央委員会における地域の投票ブロックを通じて地方にも分散されており、そこでは省（地方行政単位）がほぼ半数の議席を占めていた。このシステムはしばしば動きが遅かったが、非常に安定していることを証明してきた。\n\nその集団指導体制は今や著しく弱体化している。ラムは、就任以来の権力集中と過去十年にわたるベトナム政治のより大きな潮流の結果として、今年一月の党大会に支配的な立場で臨んだ。2016年には、党は……", "vocab": [{"word": "pageantry", "definition": "華やかな儀式や見世物的な演出のこと。政治的・式典的な場での大規模で印象的なディスプレイを指す。"}, {"word": "piecemeal", "definition": "断片的・散発的に行われること。体系的な計画なしに少しずつ進められる改革や変化を形容する際に用いられる。"}, {"word": "patronage network", "definition": "有力者が支持者や取り巻きに便宜を図ることで築かれる人脈・利益供与の仕組み。政治的文脈では権力維持のための利権構造を指す。"}, {"word": "collective leadership", "definition": "権力を複数の指導者に分散させる統治形態。一人の人物への権力集中を防ぐために設計された政治的仕組みを指す。"}, {"word": "latent", "definition": "潜在的な、まだ表面化していないという意味。現時点では発揮されていないが内在するポテンシャルや能力を表す形容詞。"}, {"word": "precarious", "definition": "不安定で危うい状態を表す形容詞。将来が不確かで危険にさらされている状況を描写する際に使用される。"}, {"word": "reorientation", "definition": "方針や方向性を根本的に転換すること。組織や政策が従来の路線から新たな方向へ大きく舵を切ることを指す。"}]}, {"title_ja": "パレスチナ国家を建設せよ：米国がパレスチナの自治を支援すべき理由", "title_en": "Build a Palestinian State: The Case for U.S. Commitment to Palestinian Self-Governance", "summary_ja": "筆者は、米国とイスラエルの関係を再調整するだけでは中東を安定させるには不十分であり、米国はパレスチナ人が独立国家を建設するのを支援することを最優先課題とすべきだと主張する。2007年から2011年にかけてのサラム・ファイヤッド首相率いるパレスチナ自治政府の相対的な成功を例に挙げ、パレスチナ国家樹立は持続的な地域安定のための地政学的必須事項であると論じる。予測不可能なトランプ政権、あるいはその後継政権も、イスラエル・パレスチナ紛争の終結を周辺的な問題としてではなく、中心的な戦略的優先事項として扱わなければならないと訴えている。", "summary_en": "The author argues that recalibrating the U.S.-Israel relationship alone is insufficient to stabilize the Middle East, and that the United States must prioritize helping Palestinians build an independent state. Drawing on the relative success of the Palestinian Authority under Prime Minister Salam Fayyad from 2007 to 2011, the piece contends that Palestinian statehood is a geopolitical imperative for lasting regional stability. The author suggests that even the unpredictable Trump administration, or its successors, must treat ending the Israeli-Palestinian conflict as a central strategic priority rather than a peripheral concern.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/palestinian-territories/build-palestinian-state", "state_media": false, "category": "オピニオン", "full_text": "In recent months, the U.S.-Israeli relationship has been subjected to unprecedented scrutiny from all sides. Forty Democratic senators voted to block an arms sale to Israel in April because of the Israeli government’s actions in Gaza, Iran, and Lebanon, a vote that would have been unimaginable only a year earlier. Last December in Foreign Affairs, Andrew Miller made the case for a “normal” relationship between the two countries that ends the blank-check support the United States has provided to Israel over the years. In the wake of the Iran war, the chorus of critics has come to include members of U.S. President Donald’s Trump’s coalition, many of whom see Israel as responsible for dragging the country into an unnecessary and costly conflict.\nRecalibrating the relationship between the United States and Israel is a necessary shift in American policy as Washington seeks to turn its focus away from the Middle East and toward other priorities. But recalibration alone is insufficient. If the United States hopes to avoid being drawn back into conflicts in the region, it must first pursue a more stable regional order. And as Hamas’s October 7, 2023, attack on Israel and its aftermath have made painfully clear, any strategy that ignores the Palestinian issue is doomed to fail. Not every problem in the Middle East stems from the Israeli-Palestinian conflict, but the region will never be truly stable until it is resolved. That will happen only if Palestinians are given the opportunity to govern themselves.\nFor the past 15 years, Washington has done little to advance that outcome. It has instead treated the Palestinian file as an adjunct to the U.S.-Israeli relationship—an issue revisited only during intermittent peace processes and one in which nearly every decision is subordinated to Israeli preferences. That must change. The Trump administration may seem an unlikely agent for this change. But President Donald Trump is nothing if not unpredictable, and with his administration’s relationship to Israel in flux, there may be room for maneuver. And even if such a change does not happen under Trump, his successors in the White House will need a plan to treat ending the conflict as a geopolitical imperative. If the United States wants a more peaceful and stable Middle East, it must prioritize its bilateral relationship with the Palestinians. Put simply, it must help Palestinians build a state of their own.\nPROGRESSIVE ERA\nThe United States has pursued a nation-building strategy for the Palestinians in the recent past. The Palestinian Authority, the governing body established in the 1990s as part of the Oslo accords, made great strides from 2007 to 2011 under Prime Minister Salam Fayyad toward building institutions that could eventually support statehood. Fayyad improved the PA’s financial management and transparency, and with the help of a U.S.-led training program, professionalized its security forces. Combined with billions of dollars of aid from Washington and other international donors, these reforms delivered rapid economic growth, increasing GDP in the West Bank by an average of ten percent every year for the first four years of Fayyad’s tenure. In 2011, the World Bank concluded that Palestinian institutions were “well-positioned to establish a state at any point in the near future.” Public support followed performance: A majority of Palestinians approved of PA President Mahmoud Abbas and indicated they would vote for him; 58 percent supported the two-state framework; and over 60 percent backed diplomacy and nonviolence.\nAnalysts often attribute the PA’s successes during this time to Fayyad’s technocratic leadership. But Fayyad could not have succeeded if not for the favorable conditions that made his governing agenda possible. Chief among them was preexisting political legitimacy. Two years before he appointed Fayyad as prime minister, Abbas secured a broad mandate by winning 62 percent of the vote in the Palestinian presidential election. Abbas’s electoral mandate and the relative popularity of his Fatah party provided Fayyad with the political cover he needed to pursue ambitious fiscal transparency reforms and consolidate the PA’s security control across major cities in the West Bank. These reforms gave Palestinians reason to believe that their institutions could deliver meaningful gains toward statehood.\nFayyad’s PA also operated alongside an Israeli government that viewed strengthening Palestinian moderates as a strategic priority. Israeli Prime Minister Ehud Olmert engaged regularly with Abbas, facilitated the transfer of Palestinian tax revenues collected by Israel on the PA’s behalf, and eased restrictions on movement by Palestinians in the West Bank. This cooperation did not resolve core political disputes—Olmert and Abbas ultimately failed to reach a final-status agreement—but it enabled Palestinian institutions to function effectively and deliver for their constituents.\nThe promise of Palestinian domestic", "translation_ja": "ここ数か月、米国とイスラエルの関係はあらゆる方面から前例のない精査にさらされている。民主党上院議員40人が4月にイスラエルへの武器売却を阻止するための採決を行ったが、これはガザ、イラン、レバノンにおけるイスラエル政府の行動を理由としたものであり、わずか1年前には考えられなかった採決だ。昨年12月に『フォーリン・アフェアーズ』誌でアンドリュー・ミラーは、米国がイスラエルに対して長年提供してきた白紙委任的な支援を終わらせる、両国の「正常な」関係を主張した。イランとの戦争を受けて、批判の声はドナルド・トランプ米大統領の支持連合のメンバーにまで及ぶようになった。その多くは、イスラエルが米国を不必要かつ代償の大きな紛争に引き込んだと見ている。\n\n米国とイスラエルの関係を再調整することは、ワシントンが中東から他の優先課題へと焦点を移そうとするなかで必要な政策転換だ。しかし、再調整だけでは不十分である。米国が中東の紛争に再び引き込まれることを避けたいならば、まずより安定した地域秩序を追求しなければならない。そして、ハマスによる2023年10月7日のイスラエルへの攻撃とその aftermath が痛ましいほど明らかにしたように、パレスチナ問題を無視したいかなる戦略も失敗する運命にある。中東のあらゆる問題がイスラエル・パレスチナ紛争に起因するわけではないが、それが解決されない限り、地域が真に安定することはないだろう。そしてそれは、パレスチナ人が自ら統治する機会を与えられた場合にのみ実現する。\n\nここ15年間、ワシントンはその実現に向けてほとんど何もしてこなかった。代わりに米国は、パレスチナ問題を米イスラエル関係の付属物として扱ってきた。断続的な和平プロセスの間にのみ再検討され、ほぼすべての決定がイスラエルの意向に従属させられる問題として扱ってきたのだ。それは変わらなければならない。トランプ政権はこの変化をもたらす主体として不似合いに見えるかもしれない。しかしトランプ大統領は何にもまして予測不可能であり、同政権とイスラエルの関係が流動的ななかで、動ける余地があるかもしれない。そしてたとえそうした変化がトランプ政権下で起きなくても、その後継者たちは紛争終結を地政学的必須事項として扱う計画を必要とするだろう。米国がより平和で安定した中東を望むならば、パレスチナ人との二国間関係を優先しなければならない。端的に言えば、パレスチナ人が自らの国家を建設するのを支援しなければならない。\n\n【進歩の時代】\n\n米国は近年、パレスチナ人に対する国家建設戦略を追求したことがある。1990年代のオスロ合意の一環として設立されたパレスチナ自治機構（PA）は、2007年から2011年にかけてサラム・ファイヤッド首相のもとで、最終的に国家樹立を支えうる諸制度の構築に向けて大きな前進を遂げた。ファイヤッドはPAの財政管理と透明性を改善し、米国主導の訓練プログラムの助けを借りて治安部隊を専門化した。ワシントンや他の国際的ドナーからの数十億ドルの援助と相まって、これらの改革は急速な経済成長をもたらし、ファイヤッドの在任期間の最初の4年間、ヨルダン川西岸のGDPを平均10パーセント毎年増加させた。2011年、世界銀行はパレスチナの諸制度が「近い将来のいかなる時点においても国家を樹立するのに十分な態勢が整っている」と結論づけた。実績に対して民意も追随した。パレスチナ人の過半数がPA議長マフムード・アッバスを支持し、彼に投票すると示した。58パーセントが二国家枠組みを支持し、60パーセント以上が外交と非暴力を支持した。\n\n分析家はしばしば、この時期のPAの成功をファイヤッドのテクノクラート的なリーダーシップに帰する。しかしファイヤッドは、彼の統治課題を可能にした有利な条件がなければ成功できなかったはずだ。その筆頭は、既存の政治的正統性だった。アッバスはファイヤッドを首相に任命する2年前、パレスチナ大統領選挙で62パーセントの票を獲得し、幅広い信任を確保していた。アッバスの選挙による信任と彼のファタハ党の相対的な人気が、ファイヤッドが野心的な財政透明性改革を追求し、ヨルダン川西岸の主要都市におけるPAの治安管理を強化するために必要な政治的後ろ盾を提供した。これらの改革は、パレスチナ人に対して自分たちの諸制度が国家樹立に向けた有意義な成果をもたらしうるという信念を与えた。\n\nファイヤッドのPAはまた、パレスチナ穏健派の強化を戦略的優先事項とみなすイスラエル政府と並存していた。イスラエルのエフード・オルメルト首相はアッバスと定期的に関与し、イスラエルがPAに代わって徴収したパレスチナの税収の移転を促進し、ヨルダン川西岸におけるパレスチナ人の移動制限を緩和した。この協力は核心的な政治的争点を解決しなかった——オルメルトとアッバスは最終的に最終地位協定に達することができなかった——しかしそれはパレスチナの諸制度が効果的に機能し、構成員に恩恵をもたらすことを可能にした。\n\nパレスチナの国内的な可能性の約束は——", "vocab": [{"word": "recalibrating", "definition": "（政策や戦略などを）再調整・再設定すること。既存のアプローチを見直して軌道修正するという意味で使われる上級表現。"}, {"word": "adjunct", "definition": "付属物、補助的なもの。主要な事柄に付随する二次的・従属的な要素を指す名詞で、ビジネスや外交文書でよく使われる。"}, {"word": "geopolitical imperative", "definition": "地政学的必須事項。国際政治・地理的条件から導き出される避けがたい政策上の要請を指す表現で、外交・安全保障分野で頻出する。"}, {"word": "technocratic", "definition": "テクノクラート的な、技術官僚主義的な。政治的判断よりも専門的・技術的知識に基づいた統治スタイルを形容する上級語彙。"}, {"word": "blank-check support", "definition": "白紙委任的な支援。条件や制限を設けずに全面的・無条件に支持・援助を与えることを指すイディオム表現。"}, {"word": "professionalized", "definition": "（組織や部隊などを）専門化・精鋭化した。訓練や制度整備を通じて組織の能力水準を高めることを指す動詞の過去形。"}, {"word": "intermittent", "definition": "断続的な、不定期な。一定の間隔を置かずに途切れ途切れに起こる様子を表す形容詞で、TOEICや学術文書で頻出する語。"}]}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}

document.getElementById("footer").textContent="Generated 2026-07-08 11:06 JST";
renderTabs();renderList();
</script>
