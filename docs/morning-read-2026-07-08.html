5RXMwbjFfYU1hWG5PLUJ1Um1kcEtYUFJYbi1mQ1p4RldzZTFqU1dJWVV1bjdIb0Z2OFVVRUV0dHB0R1lmOEN6djhCRWY0VGly?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "エジプト代表監督、審判批判し W杯から撤退表明", "title_en": "Egypt Coach Criticizes Refereeing, Withdraws From World Cup", "summary_ja": "エジプト代表監督は、チームに不利な審判の判定を公然と批判し、ワールドカップから距離を置く意向を示した。監督はオフィシャルの判断がエジプトの戦いに悪影響を与えたと強く主張している。この発言はエジプトサッカー界とワールドカップをめぐる深刻な対立を浮き彫りにしている。", "summary_en": "Egypt's coach has publicly blasted the refereeing decisions affecting his team and announced he is turning his back on the World Cup. The move follows apparent frustration over officiating calls that the coach believes negatively impacted Egypt's campaign. The development marks a dramatic fallout between the Egyptian football program and the broader World Cup process.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMipwFBVV95cUxOeXRFc2wzOG9VR2VFTDIxSi1VUVYyVUJGUFlpTnh5bmRwanZMZ3VreGpnYjhMZ2xqX0NkZk9GY2x6MUdZZVdPMTFBN3M1NEdEZ2dPak5CWElma3RvS1F4REE2TFA3aWMzV216cUx1cTBVdG1lTU1sSzZDb0F5RXJuVDVWUE1uZUNnanhQWnNRWG5uT1NQaWJWaTJxNURnUGZudFF1RmY2bw?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ルペン氏、横領有罪確定も大統領選出馬を宣言――フランス右派指導者が断固たる姿勢", "title_en": "Le Pen Vows Presidential Run Despite Embezzlement Conviction Being Upheld", "summary_ja": "フランスの控訴裁判所はマリーヌ・ルペン氏の公金横領に関する有罪判決を支持したが、公職追放の期間を短縮し、大統領選への出馬を可能にした。ルペン氏は判決直後に出馬を宣言し、「プール・ラ・フランス（フランスのために）―ラ・ルネサンス」と題したSNSキャンペーンを開始した。批判者らはその行動を無謀かつトランプ的だと非難しているが、支持率は過去最高水準にある。", "summary_en": "A French appeals court confirmed Marine Le Pen's guilty verdict for misuse of public funds but shortened her ban from public office, allowing her to campaign for the presidency. Defying expectations, Le Pen immediately announced her candidacy and launched a social media campaign titled 'Pour la France – La Renaissance.' Critics call her actions reckless and Trumpian, while her legal team may be betting on a slow ruling from France's highest court.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cvgdlprp1r3o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Will Le Pen rise again? French nationalist leader defiant after court's ruling\n- Published\nFrance is waking up bleary-eyed on Wednesday, with many still incredulous at the political uproar triggered by right-wing nationalist figurehead Marine Le Pen the night before.\nWithin hours of a court of appeal in Paris confirming her guilty verdict for misuse of public funds, she not only defiantly announced she would be running in next year's French presidential election, but she had already launched her social media campaign, too.\nPour la France - For France - reads her online poster, featuring the country's tricolour flag and a smiling Le Pen, her arms outstretched.\n\"Just like (the actress) Kate Winslet aboard the Titanic,\" muttered a French journalist I was chatting to. \"France feels like the Titanic right now - sinking - at least politically!\"\nBut Le Pen's campaign promises quite the opposite. \"La Renaissance\" is its subtitle - rebirth.\nLe Pen has always claimed to be a woman who listens, a woman of the people. Many in France (as in a lot of European countries) feel disillusioned with politics and traditional politicians. They look at gaping inequalities in society and yearn for change.\nLe Pen swims happily in these divided waters. You often hear her talk of \"The People\" versus the \"The Metropolitan Elite\" or \"The Patriots\" - whom, she says, she represents - fighting politically for a France that puts French people first, versus those she dismissively labels \"Globalists\", including her political nemesis, the current French President Emmanuel Macron.\nThe name of his political party is Renaissance, by the way. The fact that word features so prominently in Le Pen's new online campaign can be no coincidence. It's a dig at the man who, when he was first elected president almost a decade ago, promised he would ensure no French citizen would ever again feel the need to vote for what he called political extremes.\nHe made clear that he put Le Pen's National Rally Party in the extremist camp. It's not without some irony that the decisive round in France's presidential election next year could potentially feature Le Pen versus Jean-Luc Mélenchon of the far left in France.\nLe Pen lost out twice to Macron in previous presidential elections. He is prevented by law in France from running for a third term, while she has never looked so strong in public opinion polls.\nRebirth is also a pertinent concept when it comes to Le Pen because she has been written off as a career politician a number of times (such as after her car crash televised debate against Macron in the lead-up to the 2017 presidential election) only to come back more powerful.\nHer outstretched arms on the social media campaign poster are perhaps supposed to make us think of a phoenix rising from the ashes.\nThe majority in France had believed the court of appeal would not only reaffirm Le Pen's conviction for embezzlement on Tuesday but also the original sentence condemning her to a five-year ban on running for public office. Many predicted the end of her political career.\nIn fact, with so much political scrutiny on this case, the appeal court shortened the ban, leaving the decision to Le Pen. It allowed her to campaign for president if she chose, while insisting she wear an electronic tag for a year.\nBut Le Pen came out swinging on French TV soon after.\n\"I am running for president,\" she announced in tones echoing her traditional discourse of standing against the French Establishment. She said she would challenge her guilty verdict and sentence in France's highest court and, before it ruled on her case, she wouldn't be wearing an ankle tag. She insisted the French people would decide who was right and who was wrong.\nCritics in France describe her actions as Trumpian. They are certainly a huge gamble.\nLe Pen and her legal team are possibly banking on the normally glacial pace the Court of Cassation operates at. If the court decision lands next spring, Le Pen could potentially already be president, granting her immunity for her full five-year term in office.\nBut the court may speed up proceedings because of the political importance of this case. Le Pen could end up having to wear an electronic tag after all, hampering her movements in the important closing weeks of the presidential campaign and reminding voters of her guilty verdict.\nWhile that's unlikely to deter loyal Le Pen supporters, traditionally conservative voters, whom she so hopes to attract to her ranks, may be put off by the improbity of it all.\n\"She has been found guilty twice of embezzling €4.1m (£3.5m) in public funds stolen from French taxpayers. And so, she is a criminal. That is the only conclusion one can draw from this court ruling,\" commented Francois Ruffin, head of the left-leaning Debout! Party on Tuesday. \"So, logically, she shouldn't be running in the presidential election.\"\nWho runs, and most importantly, who wins the French presidential election matters, outside the country, as well as in.\n", "translation_ja": "ルペンは再び台頭するか？フランスの右派民族主義指導者、裁判所の判決後も断固たる姿勢\n\nフランスは水曜日、寝ぼけまなこで目を覚ました。多くの国民が、右派民族主義の象徴的存在であるマリーヌ・ルペン氏が前夜に引き起こした政治的大混乱をいまだ信じられずにいる。\n\nパリの控訴裁判所が公金横領に関する有罪判決を支持してから数時間以内に、ルペン氏は翌年のフランス大統領選への出馬を断固として宣言しただけでなく、すでにSNSキャンペーンも立ち上げていた。\n\n「プール・ラ・フランス（フランスのために）」――フランスの三色旗をあしらい、両腕を広げて微笑むルペン氏を描いたオンラインポスターにはそう記されている。\n\n「まるで（女優の）ケイト・ウィンスレットがタイタニック号に乗り込んでいるようだ」と、私が話していたあるフランス人ジャーナリストはつぶやいた。「フランスは今、タイタニックのような気分だ――少なくとも政治的には、沈没しつつある！」\n\nしかしルペン氏のキャンペーンはまったく逆のことを約束している。そのサブタイトルは「ラ・ルネサンス（再生）」だ。\n\nルペン氏はかねてから、自分は耳を傾ける女性であり、庶民の女性だと主張してきた。フランスでは（多くのヨーロッパ諸国と同様に）、政治や既存の政治家に幻滅している人々が多い。社会の格差の拡大を目の当たりにし、変化を切望している。\n\nルペン氏はこうした分断した状況の中を悠然と泳ぐ。彼女がよく口にするのは、「国民」対「大都市のエリート」、あるいは彼女が代表していると主張する「愛国者たち」という言葉だ。彼女の政治的宿敵であり現フランス大統領のエマニュエル・マクロン氏を含む者たちを彼女は「グローバリスト」と軽蔑的に呼び、フランス人を第一に考えるフランスのために政治的に戦っているという姿勢を打ち出している。\n\nちなみに、マクロン氏の政党名も「ルネサンス」である。ルペン氏の新しいオンラインキャンペーンにこの言葉が目立つ形で使われていることは、偶然ではありえない。約10年前に初めて大統領に選出された際、マクロン氏はフランス国民が再び政治的な極端な立場に投票する必要性を感じないようにすると約束した。彼はルペン氏の国民連合党を過激派の陣営に位置付けていることを明確にした。\n\nフランスの来年の大統領選の決選投票が、ルペン氏と左派のジャン=リュック・メランション氏の対決になる可能性があることは、ある意味で皮肉である。\n\nルペン氏は過去2回の大統領選でマクロン氏に敗北している。マクロン氏はフランスの法律により3期目の出馬が禁じられているが、ルペン氏の世論調査における支持率はかつてないほど高い。\n\n「再生」という言葉は、ルペン氏に関してもまた重要な意味を持つ。なぜなら彼女はこれまで何度も政治生命を絶たれたかに見えながら（たとえば2017年大統領選前のマクロン氏とのテレビ討論での惨敗の後など）、そのたびにより強力な姿で復活してきたからだ。\n\nSNKキャンペーンのポスターで両腕を広げるルペン氏の姿は、灰の中から蘇るフェニックスを想起させようとしているのかもしれない。\n\nフランスの多くの人々は、控訴裁判所がルペン氏の横領に関する有罪判決を確認するだけでなく、公職追放5年という元の判決も維持するだろうと信じていた。多くの者が彼女の政治的なキャリアの終わりを予測した。\n\nしかし実際には、この事件に向けられた多大な政治的注目を受けて、控訴裁判所は追放期間を短縮し、ルペン氏に選択肢を残した。1年間の電子タグの装着を義務付けつつも、彼女が望めば大統領選に出馬できるとしたのだ。\n\nしかしルペン氏はすぐさまフランスのテレビに登場し、攻勢に出た。\n\n「私は大統領選に出馬します」と、フランスの既成勢力に立ち向かうという従来の言説を反響させる口調で彼女は宣言した。有罪判決と量刑をフランスの最高裁判所で争い、その判決が下りるまでは足首の電子タグを着用しないと述べた。そして、誰が正しく誰が間違っているかはフランス国民が決めると主張した。\n\nフランスの批判者たちは彼女の行動をトランプ的だと表現している。それは確かに大きな賭けだ。\n\nルペン氏と彼女の法律チームは、破棄院（コール・ド・カサシオン）が通常非常にゆっくりと進むことに賭けているのかもしれない。もし来春に判決が下された場合、ルペン氏はすでに大統領に就任している可能性があり、5年の任期中は免責が与えられることになる。\n\nしかし裁判所はこの事件の政治的重要性から手続きを速める可能性もある。ルペン氏は結局、電子タグを装着しなければならない事態となり、大統領選キャンペーンの重要な終盤で行動が制限され、有罪判決を有権者に改めて想起させることになるかもしれない。\n\nそれが忠実なルペン支持者を遠ざけることはないだろうが、彼女がぜひ取り込みたいと願う伝統的な保守層の有権者たちは、一連の不正行為に幻滅するかもしれない。\n\n「彼女はフランスの納税者から横領した410万ユーロ（350万ポンド）について、二度有罪と認定されました。つまり彼女は犯罪者です。この裁判所の判決から導き出せる結論はそれだけです」と、左派寄りの「ドゥブー！（立ち上がれ！）」党の党首、フランソワ・リュファン氏は火曜日にコメントした。「ですから論理的に言って、彼女は大統領選に出馬すべきではありません。」\n\n誰が出馬し、そして最も重要なことに誰が勝利するかは、フランス国内だけでなく、国外においても重要な意味を持つ。", "vocab": [{"word": "embezzlement", "definition": "横領。公金や預かった資金を不正に私的流用する行為を指す法律用語。企業・政治スキャンダルの文脈で頻出する。"}, {"word": "defiant", "definition": "反抗的な、断固として従わない様子を表す形容詞。権威や判決に屈しない強い姿勢を示す際に用いられる。"}, {"word": "improbity", "definition": "不誠実さ、不正直さを意味する格式ある名詞。道徳的・職業的倫理に反する行為を批判する文脈で使われる。"}, {"word": "glacial", "definition": "氷河のように非常に遅い、という意味の比喩的表現。官僚的・法的手続きの進行の遅さを強調する際に用いられる。"}, {"word": "figurehead", "definition": "名目上または象徴的な指導者を指す語。実質的な権力の有無にかかわらず、運動や組織の顔として機能する人物を表す。"}, {"word": "pertinent", "definition": "（議論や状況に）直接関連している、適切であることを意味する形容詞。フォーマルな文章や評論でよく使われる。"}, {"word": "immunity", "definition": "免責、免除を意味する法律・政治用語。特に公職者が在任中に訴追を免れる権利を指して使われることが多い。"}]}, {"title_ja": "NATO同盟国、新型長距離ミサイル計画に370億ポンドを拠出", "title_en": "NATO Allies Pledge £37bn for New Long-Range Missile Programme", "summary_ja": "英国を含む12のNATO加盟国が、「ディープ・プリシジョン・ストライク」と呼ばれる長距離ミサイル共同開発計画に370億ポンド（約500億ドル）を投じると発表した。このプログラムは最大2,000キロ先の目標を精密攻撃できる能力を目指す。発表はトルコのアンカラで開催されたNATOサミットの場で行われ、欧州各国に防衛費増額を求める米国からの圧力が強まる中での決断となった。", "summary_en": "Twelve NATO member countries, including the UK, have announced a £37 billion ($50bn) joint programme called Deep Precision Strike to develop a long-range missile capable of hitting targets up to 1,250 miles away. The initiative was unveiled at the NATO summit in Ankara, Turkey, where UK Prime Minister Sir Keir Starmer is attending his final summit as PM. The announcement comes amid pressure from the US for European allies to increase defence spending, with NATO members having agreed to a 5% GDP defence target by 2035.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/ckg4e3lwzqzo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Nato allies announce £37bn for new missile project\n- Published\nTwelve countries, including the UK, are set to spend more than £37bn ($50bn) over the next 10 years on a new long-range missile to protect Europe.\nThe Deep Precision Strike project has just been unveiled by No 10 and is due to be discussed later on Wednesday at the Nato summit in the Turkish capital, Ankara.\nSir Keir Starmer is there for his final Nato summit as prime minister. He is likely to face some criticism from US President Donald Trump for failing to set out a plan for reaching 3.5% of GDP spent on defence by 2035, a target agreed by nearly all Nato members last year.\nBut on Wednesday the prime minister will convene around a dozen leaders to discuss the new missile programme.\nBilled as one of Nato's most advanced weapons, it is intended to strike targets nearly 200 miles (300km) away with pinpoint accuracy, possibly extending out to 1,250 miles.\nSir Keir said the UK-led initiative would \"help bring European allies together to keep Nato safe for years to come\".\nForeign Secretary Yvette Cooper said the plan was \"part of a recognition that we're in a more dangerous world\".\n\"This is about how we make sure we have a stronger Europe within a stronger Nato,\" she told BBC Breakfast from Ankara.\nBut like many planned military projects in the pipeline, Deep Strike is not expected to be ready until the 2030s.\nIn June, US Defence Secretary Pete Hegseth announced a six-month review of the presence of US forces in Europe.\nTrump has repeatedly made clear he wants Nato members to contribute more to defence spending in Europe and at last year's Nato summit, members of the alliance agreed to spend 5% of GDP on defence and security by 2035.\nSir Keir said he was \"determined\" to ensure the safety of the UK and its allies, adding: \"We must step up to deliver a stronger, more European Nato.\"\nThe UK government has already committed £300bn by 2030 in the Defence Investment Plan.\n- Trump looms large as Nato grapples with challenge of rearming Europe - Published15 hours ago\n \n- Zelensky presses Nato for air defence systems after intense Russian strikes - Published21 hours ago\n \nAt the summit, Sir Keir is expected to underline the threat posed by Russia to the UK and Nato.\nThe government said Nato had scrambled fighter jets to intercept Russian aircraft approaching allied airspace more than 700 times and that Russian military activity around UK waters had surged 30%.\nSir Keir is expected to stress that whilst Nato did not seek confrontation with Russia, it must be ready to defend every ally.\nCooper said: \"With deep precision strike capability, the UK and our allies will be able to hit high value military targets and the logistical engines that drive armies, deterring any aggressor and strengthening our mutual security.\n\"At Ankara we are sending a clear message to [Russian] President [Vladimir] Putin; Nato is stronger, more European and ready to defend our citizens against the long-term threat posed by him and the Russian state.\"\nUkrainian President Volodymyr Zelensky used a speech at the summit on Tuesday to urge Ukraine's allies to deliver the air defence systems it urgently needs to protect it from escalating Russian attacks.\nUkraine has been stepping up its own long-range drone and missile attacks against Russia, hitting oil refineries and military targets there and causing significant fuel shortages and power cuts.\n\"Ukraine's Armed Forces have proved that the effective use of long-range systems can have game-changing impacts on the battlefield, giving the Armed Forces the ability to degrade enemy forces far behind the frontline,\" Number 10 said.\n\"Ukrainian long-range strikes, such as those on key logistics hubs, have significantly impacted Russia's ability to sustain their offensives.\"\nKremlin spokesman Dmitry Peskov said on Tuesday that Russia, which invaded Ukraine in 2022, would closely monitor the summit in Ankara.\nHe said that no new weapons Kyiv would get from Nato could prevent Russia from pressing on with its military operation in Ukraine until its objectives were achieved.\n\"In the context of preparations for this summit we heard a great many statements concerning our country,\" Peskov told reporters.\n\"To our regret, these were not statements about constructive engagement and dialogue but rather statements of a confrontational nature.\"\n\"Settlement of this conflict through political and diplomatic means remains preferable\" for Russia, Peskov added.", "translation_ja": "NATO同盟国、新型ミサイル計画に370億ポンドを拠出\n\n英国を含む12カ国が、欧州を守るための新型長距離ミサイル開発に今後10年間で370億ポンド（500億ドル）以上を投じる方針を固めた。\n\n「ディープ・プリシジョン・ストライク（深部精密攻撃）」計画は首相官邸によって発表されたばかりで、水曜日にトルコの首都アンカラで開催されるNATOサミットで協議される予定だ。\n\nキア・スターマー首相は首相として最後のNATOサミットに出席している。NATOが昨年合意した「2035年までにGDPの3.5%を防衛費に充てる」という目標への達成計画を示していないことから、米国のドナルド・トランプ大統領から批判を受ける可能性がある。\n\nしかし水曜日、首相は約12カ国の首脳を集め、新たなミサイル計画について協議する。\n\nNATOで最も先進的な兵器の一つとして位置づけられるこのミサイルは、約300キロ（約200マイル）先の標的を精密に攻撃することを目的とし、射程は最大2,000キロに達する可能性がある。\n\nスターマー首相は、英国主導のこの取り組みが「欧州同盟国を一つにまとめ、NATOを長年にわたり安全に保つ助けとなるだろう」と述べた。\n\nデービッド・ラミー外相に次ぐイヴェット・クーパー外相は、この計画は「私たちがより危険な世界にいるという認識の一部だ」と語った。\n\n「これは、より強固なNATOの中でより強い欧州をどう実現するかについての取り組みだ」と同外相はアンカラからBBCブレックファストに語った。\n\nしかし、計画中の多くの軍事プロジェクトと同様に、ディープ・ストライクも2030年代まで実戦配備は期待できない見通しだ。\n\n6月、米国のピート・ヘグセス国防長官は欧州における米軍のプレゼンスについて6カ月間の見直しを発表した。\n\nトランプ大統領はNATO加盟国がより多くの防衛費を欧州に拠出すべきだと繰り返し明言しており、昨年のNATOサミットでは各加盟国が2035年までにGDPの5%を防衛・安全保障費に充てることで合意した。\n\nスターマー首相は英国と同盟国の安全確保に「断固たる決意」があると述べ、「より強く、よりヨーロッパ的なNATOを実現するために総力を挙げなければならない」と語った。\n\n英国政府はすでに「防衛投資計画」として2030年までに3,000億ポンドの拠出を約束している。\n\n・トランプ氏の影響力が色濃く漂う中、NATOは欧州再軍備の課題と格闘　─　15時間前に公開\n・ロシアの激しい攻撃を受け、ゼレンスキー大統領がNATOに防空システムを要請　─　21時間前に公開\n\nサミットでスターマー首相は、ロシアが英国とNATOに与える脅威を強調する見込みだ。\n\n政府によれば、NATOは同盟国の領空に接近するロシア機を迎撃するために戦闘機を700回以上スクランブル発進させており、英国の周辺水域におけるロシアの軍事活動は30%急増したという。\n\nスターマー首相はNATOがロシアとの対立を望んでいない一方で、すべての同盟国を守る準備を整えておく必要があると強調する見通しだ。\n\nクーパー外相は「深部精密攻撃能力によって、英国と同盟国は高価値の軍事目標や軍隊を動かす兵站基盤を攻撃できるようになり、いかなる侵略者も抑止し、相互の安全保障を強化できる」と述べた。\n\n「アンカラで私たちは（ロシアの）プーチン大統領に明確なメッセージを送る。NATOはより強く、よりヨーロッパ的であり、彼とロシア国家がもたらす長期的脅威から市民を守る準備ができていると」\n\nウクライナのウォロディミル・ゼレンスキー大統領は火曜日のサミットでの演説で、エスカレートするロシアの攻撃からウクライナを守るために緊急に必要な防空システムの提供を同盟国に強く求めた。\n\nウクライナはロシアに対する長距離ドローンおよびミサイル攻撃を強化しており、石油精製施設や軍事目標を攻撃し、深刻な燃料不足と停電を引き起こしている。\n\n「ウクライナ軍は、長距離システムの効果的な活用が戦場に決定的な影響を与えることを証明した。これにより前線からはるか後方にいる敵軍を弱体化させる能力が得られる」と首相官邸は述べた。\n\n「主要な兵站拠点へのウクライナの長距離攻撃は、ロシアの攻勢を維持する能力に大きな影響を与えた」\n\nクレムリンのドミトリー・ペスコフ報道官は火曜日、2022年にウクライナに侵攻したロシアはアンカラのサミットを注意深く監視すると述べた。\n\n同報道官は、NATOがキーウに提供するいかなる新型兵器も、ロシアが目標を達成するまで軍事作戦を継続することを阻めないと語った。\n\n「このサミットの準備に関連して、わが国に関する多くの発言を耳にした」とペスコフは記者団に語った。\n\n「遺憾ながら、それらは建設的な関与と対話についての発言ではなく、対立的な性質の発言だった。」\n\n「この紛争を政治的・外交的手段で解決することがロシアにとって望ましい」とペスコフは付け加えた。", "vocab": [{"word": "pinpoint accuracy", "definition": "非常に高い精度で目標を特定・攻撃すること。軍事・技術文脈でよく使われる慣用表現で、「ピンポイントの精確さ」を意味する。"}, {"word": "scramble", "definition": "軍事用語で、戦闘機を緊急発進させること。航空防衛の文脈で「スクランブル発進」として使われる。"}, {"word": "logistical", "definition": "兵站・物資補給に関する形容詞。軍事や大規模組織の運営において、人員・物資・輸送の管理に関わる事項を指す。"}, {"word": "deterring", "definition": "「抑止する」という意味の動詞deterの現在分詞形。特に軍事・外交の文脈で、相手国が攻撃行動を起こさないよう思いとどまらせることを指す。"}, {"word": "confrontational", "definition": "対立的・衝突的な性質を帯びた形容詞。外交や政治の文脈で、協調ではなく対抗姿勢をとることを表す。"}, {"word": "billed as", "definition": "「〜として宣伝・紹介される」という意味の慣用表現。公式な場や報道において、ある物事を特定の形で位置づけて発表するときに使われる。"}, {"word": "convene", "definition": "会議や集会を招集・開催するという意味の動詞。公式な場でリーダーが参加者を集めるときに使われるフォーマルな表現。"}]}, {"title_ja": "ロシアで燃料不足が深刻化――プーチンはウクライナ戦争の方針を変えるか", "title_en": "Russian fuel shortages bite as Ukraine strikes oil refineries", "summary_ja": "ウクライナによる石油精製施設へのドローン・ミサイル攻撃を背景に、ロシア全土でガソリン不足が深刻化し、首都モスクワでさえ給油所に長蛇の列が続いている。市民の間には不満と不安が広がっているものの、プーチン大統領への公開批判は依然として乏しい。世論調査ではプーチン支持率の低下や経済への悲観論の拡大が示されており、クレムリンは輸入拡大や価格補助などで対応に追われている。", "summary_en": "Russia is experiencing widespread fuel shortages, with long queues at petrol stations even in Moscow, as Ukrainian drone and missile strikes target oil refineries. Despite public frustration, citizens remain largely resigned, avoiding open criticism of Putin. The Kremlin is responding with fuel imports, price subsidies, and public reassurances, though polls show declining confidence in both Putin and Russia's economic direction.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cr7xk8j0j2do?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Russian fuel shortages bite – but will Putin change tack in Ukraine war?\n- Published\nIf you want to get a sense of the fuel crisis gripping Russia, all you need to do is spend a day driving around Moscow. At almost every petrol station we passed there was a queue of cars and lorries. Some lines were long, some short; some static, others moving steadily.\nIf there was no queue, that meant the garage had run out of fuel entirely and was closed.\nRemember: this is Moscow, the wealthy, populated capital that draws in so much of Russia's vast resources. Even here the authorities cannot ensure there is enough petrol and diesel to keep Muscovites on the road.\nYet, in the queues, the mood was more frustrated than angry. Yekaterina told us she was \"not happy\" and there was \"panic because everybody thinks there will be no oil\". But it would OK, she said, \"we just need to reorganise the oil distribution\".\nThe situation according to Elmar was \"very bad\" and he complained prices were going up as fuel stocks ran low. \"You are wasting hours to fill up,\" he said. \"At the moment I am planning a trip to Dagestan but I don't know if I should drive there or not because there are so many problems with petrol.\"\nI asked him who was to blame. \"In our country, you can't say what is to blame and who is to blame,\" he said, with a knowing smile.\nIn Russia, criticism of the president, or even the Kremlin, is not something most feel they can do in public.\nValery said it was strange having to queue in a country that extracts so much oil. He blamed the lack of Russian preparedness as much as Ukrainian missiles. \"I have no desire to get used to queues,\" he said. \"I hope the situation will change soon and won't be continued.\"\nSo the war is coming closer to home for many across Russia.\nPresident Vladimir Putin has worked hard to insulate most people from the consequences of what he calls his special military operation, now well into its fifth year. On the streets of Moscow, one can see little sign of the war, just a few posters about heroic soldiers.\nYet what is harder for the authorities to ignore are the increasing number of Ukrainian drone and missile strikes deep into Russian territory, targeting oil refineries, darkening the skies over Moscow and St Petersburg.\nAdd to that internet shutdowns restricting the spread of information, and now the fuel shortages.\nRussia, one of the world's biggest oil producers, is struggling to refine enough fuel to meet domestic demand.\nAndrei was queuing for the first time, with his wife Yekaterina. He blamed what he called \"geopolitics\" and accepted the situation could get worse.\n\"We hope that all sides will start moving towards each other and discuss conditions for a peace deal,\" he said. \"But now unfortunately we don't see it from our European partners. So perhaps the situation will only get worse.\"\nHe remained phlegmatic: \"We survived the 90s. We remember times that were much more difficult. It doesn't scare us.\"\nSocial media is awash with images of drivers queuing for petrol. Some tailbacks go on for miles. Posts show fights breaking out.\nIn the Black Sea resort of Anapa, Cossacks have been deployed to keep order in queues.\nRationing is widespread and many areas have banned the use of jerry cans. One mayor in Siberia is laying on portable toilets for drivers. In some areas bus services and rubbish collections have been reduced. Farmers fear for this summer's harvest.\nThe anxiety is real and widespread.\nBut can Nato leaders meeting in Ankara assume this economic turmoil will translate into political pressure on the Kremlin?\nThat is certainly the hope in Kyiv where strategists are banking on ordinary Russians becoming so exasperated they will urge their leader to bring the war to an end.\nThe Kremlin is certainly paying attention. Putin is concerned enough to address the fuel shortage publicly on state TV, insisting the Ukrainian attacks are \"obviously creating problems\" but insisting \"it's not critical\".\nThat said, authorities are taking no chances and have already begun increasing fuel imports, subsidising fuel prices and allowing the sale of lower-grade fuel that some fear could damage engines.\nPutin and his advisers also know the shortages are shaping public opinion.\nThe latest poll by independent organisation Levada Center suggests Putin's approval rates are dipping to around 74%. It also suggests the number of Russians who believe the country is heading in the right direction has fallen to just 52%, down from 61% in May.\nPolling organisation Gallup suggested last week Russians were more pessimistic about the state of their economy than at any time in the past 20 years, with 60% of respondents saying economic conditions where they lived were getting worse.\nEven state-run Russian Public Opinion Research Centre (VCIOM) suggests public trust in Putin fell by 3.4 percentage points to 73% in the space of a week.\nChristopher Weafer, head of regional consultancy Macro Advisory, says the fuel crisis may be a ", "translation_ja": "ロシアの燃料不足が深刻化――プーチンはウクライナ戦争の方針を変えるか\n\nロシアを覆う燃料危機の実態を知りたければ、モスクワ市内を一日かけて車で走り回るだけで十分だ。私たちが通り過ぎたほぼすべてのガソリンスタンドに、乗用車やトラックの列ができていた。長い列もあれば短い列もあり、まったく動かない列もあれば、着実に進んでいる列もあった。\n\n列がなければ、それはそのスタンドが燃料を完全に使い果たして閉鎖されているということを意味した。\n\nここはモスクワ、ロシアの膨大な資源の多くを引き寄せる、豊かで人口の多い首都だということを忘れてはならない。その首都でさえ、当局はモスクワ市民が道路を走り続けるのに十分なガソリンとディーゼル燃料を確保できていないのだ。\n\nしかし列に並ぶ人々の雰囲気は、怒りというより苛立ちに近かった。エカテリーナさんは「満足していない」と語り、「みんな石油がなくなると思っているからパニックになっている」と言った。しかし大丈夫だ、「石油の流通を立て直せばいい」と彼女は続けた。\n\nエルマルさんによれば状況は「非常に悪い」といい、燃料在庫が減るにつれて価格が上昇していると不満を漏らした。「給油するのに何時間も無駄にする」と彼は言った。「今、ダゲスタンへの旅行を計画しているが、ガソリンの問題がこれほど多いと車で行くべきかどうか分からない。」\n\n私は誰の責任かと尋ねた。「この国では何が悪いのか、誰が悪いのかを言うことはできない」と彼は含み笑いを浮かべながら答えた。\n\nロシアでは、大統領やクレムリンを公の場で批判できると感じている人はほとんどいない。\n\nワレリーさんは、これほど多くの石油を採掘している国で列に並ばなければならないのは奇妙だと語った。彼はウクライナのミサイルと同じくらい、ロシア側の準備不足を責めた。「列に慣れたくない」と彼は言った。「状況が早く変わり、これが続かないことを願っている。」\n\nこうして、ロシア各地で多くの人々にとって戦争が身近なものになりつつある。\n\nウラジーミル・プーチン大統領は、「特別軍事作戦」と呼ぶこの作戦が今や5年目に入る中、大多数の国民がその影響を感じないよう懸命に工夫してきた。モスクワの街頭では、英雄的な兵士たちを称えるポスターがわずかに見られるだけで、戦争の影はほとんど見えない。\n\nしかし当局がより無視しにくいのは、ロシア領土の奥深くまで到達し、石油精製施設を標的にし、モスクワやサンクトペテルブルク上空を黒煙で覆うウクライナのドローンおよびミサイル攻撃が増加していることだ。\n\nそれに加え、情報の拡散を制限するインターネットの遮断、そして今回の燃料不足が重なっている。\n\n世界最大級の石油生産国であるロシアが、国内需要を満たすのに十分な量の燃料を精製できずに苦しんでいる。\n\nアンドレイさんは妻のエカテリーナさんと共に、初めて列に並んだという。彼は「地政学」と表現したことを原因に挙げ、状況はさらに悪化する可能性を認めた。\n\n「すべての当事者が歩み寄り、和平交渉の条件を話し合い始めることを願っている」と彼は言った。「しかし今のところ残念ながら、欧州のパートナー側からはそのような動きは見えない。だから状況はさらに悪くなるかもしれない。」\n\n彼は冷静さを保っていた。「私たちは90年代を生き抜いた。はるかに厳しい時代を覚えている。これくらいでは怖くない。」\n\nソーシャルメディアはガソリンを求めて列に並ぶドライバーの画像であふれている。数キロにわたる渋滞もある。喧嘩が勃発している様子を映した投稿も見られる。\n\n黒海のリゾート地アナパでは、列の秩序を保つためにコサックが派遣されている。\n\n配給制が広範囲に広がり、多くの地域でジェリー缶の使用が禁止されている。シベリアのある市長は、ドライバーのために仮設トイレを設置している。一部の地域ではバス運行やゴミ収集が縮小された。農家は今夏の収穫を心配している。\n\n不安は現実のものであり、広く蔓延している。\n\nしかし、アンカラで会合するNATO首脳たちは、この経済的混乱が政治的圧力に変わってクレムリンに向かうと想定できるだろうか？\n\nそれがキエフの希望であることは間違いなく、ロシアの一般市民が我慢の限界に達してリーダーに戦争を終わらせるよう求めるようになることを、戦略家たちは期待している。\n\nクレムリンも確かに注目している。プーチン氏は燃料不足を国営テレビで公に取り上げるほど懸念しており、ウクライナの攻撃が「明らかに問題を引き起こしている」と認めながらも、「深刻ではない」と主張した。\n\nとはいえ、当局は油断せず、すでに燃料輸入の拡大、燃料価格の補助、そして一部でエンジンを損傷させる恐れがあると心配されている低品質燃料の販売解禁に着手している。\n\nプーチン氏と側近たちも、この不足が世論を形成しつつあることを把握している。\n\n独立系調査機関レバダ・センターの最新の世論調査によると、プーチン氏の支持率は約74%前後まで低下しつつある。また、国が正しい方向に向かっていると考えるロシア人の割合が、5月の61%から52%にまで落ち込んでいることも示されている。\n\n世論調査機関ギャラップは先週、ロシア人の自国経済に対する悲観論が過去20年間で最高水準に達しており、回答者の60%が自分たちの居住地域の経済状況が悪化していると答えたと発表した。\n\n国営のロシア世論調査センター（VCIOM）でさえ、プーチン氏への国民の信頼が1週間で3.4ポイント低下し73%になったと示している。\n\n地域コンサルティング会社マクロ・アドバイザリーの代表クリストファー・ウェーファー氏は、燃料危機は……", "vocab": [{"word": "phlegmatic", "definition": "冷静沈着な、動じないという意味の形容詞。感情的にならず落ち着いた態度を示す際に使われる、やや格式張った表現。"}, {"word": "insulate", "definition": "ここでは「（悪影響から）遮断する・保護する」という比喩的な意味で使われている。物理的な断熱を指すこともあるが、政治・経済文脈では人々を影響から守ることを意味する。"}, {"word": "tailback", "definition": "主に英国英語で「（交通渋滞による）車の長い列」を指す名詞。特に渋滞が後方に伸びている状況に使われる。"}, {"word": "exasperated", "definition": "ひどく苛立った、もうすっかり我慢の限界であるという状態を表す形容詞。frustrate（苛立たせる）よりも強い怒りや疲弊を含意する。"}, {"word": "rationing", "definition": "食料・燃料・物資などを不足時に一人当たりの量を制限して配給することを指す名詞。戦時や緊急事態の文脈でよく用いられる。"}, {"word": "geopolitics", "definition": "地政学、または国際的な地理的・政治的力学を指す名詞。国際情勢や外交政策を論じる際によく使われるTOEIC上級レベルの専門用語。"}, {"word": "turmoil", "definition": "混乱、動乱、騒動を意味する名詞。政治的・経済的・社会的な激しい混乱状態を表す際に頻繁に用いられる。"}]}, {"title_ja": "主要政党、ファラージュ辞職後のクラクトン補欠選挙への不参加を表明", "title_en": "Major parties refuse to contest Clacton by-election after Farage's resignation", "summary_ja": "ナイジェル・ファラージュはクラクトン選挙区の議員を辞職し、自ら「国民対既成体制」と銘打った補欠選挙に即座に再出馬すると表明した。労働党、保守党、自由民主党、緑の党、リストア・ブリテンはいずれも候補者を立てないと発表し、批判派はこれを財務をめぐる議会基準調査からの注意をそらす「政治的パフォーマンス」と非難した。コメディアンのカウント・ビンフェイスは出馬を表明し、その理由として「自分はナイジェル・ファラージュではない」と冗談めかして語った。", "summary_en": "Nigel Farage resigned as MP for Clacton and announced he would immediately re-contest the seat in what he called a 'people versus the establishment' by-election. Labour, the Conservatives, the Liberal Democrats, the Greens, and Restore Britain all declined to field candidates, with critics calling it a political stunt to distract from a parliamentary standards investigation into his finances. Comedian Count Binface confirmed he would stand, joking his appeal was simply that he 'is not Nigel Farage'.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cjdg4y3g0z7o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Farage's rivals rule out standing in Clacton by-election\n- Published\nLabour, the Conservatives, the Liberal Democrats, the Green Party and Restore Britain have all ruled out contesting the Clacton by-election triggered by the resignation of Nigel Farage.\nThe Reform UK leader said that, having announced his resignation, he would re-fight the Essex seat in what he billed as a \"people versus the establishment\" by-election.\nFacing increasing scrutiny over his finances and a parliamentary investigation, Farage said the \"people of Clacton should be the judge of my actions\".\nForeign Secretary Yvette Cooper said the by-election \"shouldn't be happening\" and accused Farage of throwing a \"political tantrum\" as a distraction.\n\"Nobody is going to get drawn into what is a political stunt by Nigel Farage because he wants to duck and dive around the rules that apply to everyone,\" she told BBC Breakfast.\nReform home affairs spokesman Zia Yusuf said rival parties are \"running scared\" of Farage.\nHe told BBC Radio 4's Today programme: \"The only reason they are choosing not to field a candidate is because they know in their hearts that they have virtually no chance of beating him.\"\nFarage on Tuesday said he had \"done nothing wrong\" in regards to his finances, and Yusuf insisted his boss was not attempting to evade scrutiny by calling a by-election.\nHe said: \"Nigel will answer those questions, that is clear. He's already said that he will.\n\"The reason that he has made the decision that he has is because the most serious sanction that parliamentary standards can impose is, of course, a suspension long enough such that a parliamentary by-election would be called if there was a recall petition.\n\"So what he has done is say: 'Let's go directly to that ultimate source of truth'.\"\nConservative leader Kemi Badenoch said her party would not participate in \"the fake election, which Nigel Farage is causing to distract people from what is happening\".\nThe Liberal Democrats urged the government to block Farage's resignation until the standards investigation had concluded, arguing that his constituents needed \"all the facts before they cast their votes\".\n\"We shouldn't be playing Mr Farage's game to escape justice,\" party leader Sir Ed Davey told BBC Radio 4's Today programme.\nRestore Britain - set up by the MP Rupert Lowe after he was suspended from Reform - said it would not stand in this election but would do so if a second by-election was ultimately triggered by the standards inquiry.\nThe Green Party of England and Wales initially said it would be a decision for the local party.\nLater, Green MP Hannah Spencer told BBC Newsnight local members had decided not to field a candidate.\nComedian Jon Harvey, who regularly runs in by-elections under the pseudonym Count Binface, has confirmed he will run.\nAsked what his appeal will be to the people of Clacton, he told the Today programme: \"Well, I'm not Nigel Farage.\"\nHe said he will tailor his manifesto to the constituency, but his national policies remain. He said these include a pledge to \"price cap 99 Flakes at 99p\", adding: \"I think the Clacton folk will like that one.\"\n- Chris Mason: Farage attempts to seize back the agenda after finance row - Published12 hours ago\n \n- Why has Farage resigned and what happens next? - Published16 hours ago\n \n- Reform asks NCA to investigate leaks of private financial information - Published10 hours ago\n \nIn a 20-minute video statement, recorded by the party on Tuesday and without journalists present to ask questions, Farage insisted he had \"done nothing wrong\" in regards to his finances and railed against the media, complaining about the treatment of his family.\nHe said the \"establishment\" were using \"foul means\" to target his party.\nThe by-election would, he said, be \"a chance to stick two fingers up to the entire establishment to frankly tell them where to go\".\nReform sources have said they want the election to take place quickly and under parliamentary rules it could be scheduled as early as August.\nAsked as he left his party's offices if he was staging a stunt, Farage said: \"Oh, it's a big gamble.\"\nFarage has said that his party has offered to cover the cost of the by-election, which is normally paid for from central government funds.\nA government estimate from 2016 put the cost of by-elections at £228,964 but that figure will have risen since then.\nConservative peer and polling expert Lord Hayward said the \"whole principle\" of British electoral law is \"that you separate the administration of the election from the party contest\".\nHe told the Today programme: \"Therefore it would be illegal for them to make a payment to cover the cost of the by-election.\"\nFarage won the Clacton constituency in the 2024 general election, securing a healthy majority of more than 8,000 and beating the Conservatives into second place. Labour finished third followed by the Liberal Democrats and the Green Party.\nFarage has been under investigation from Parliament's standards commissi", "translation_ja": "ファラージュの対立候補、クラクトン補欠選挙への出馬を辞退\n\n労働党、保守党、自由民主党、緑の党、リストア・ブリテンは、ナイジェル・ファラージュの辞職により実施されるクラクトン補欠選挙への出馬を全て見送ることを表明した。\n\nリフォームUKの党首であるファラージュは、辞職を表明した上で、「国民対既成体制」と位置づけるこの補欠選挙に向けてエセックス州の議席を争うために再出馬すると述べた。\n\n財務をめぐる監視強化と議会調査に直面する中、ファラージュは「クラクトンの市民が私の行動を判断すべきだ」と語った。\n\n外務大臣のイヴェット・クーパーは、この補欠選挙は「行われるべきでない」と述べ、ファラージュが注意をそらすために「政治的かんしゃく」を起こしていると非難した。\n\n「誰もが、全ての人に適用されるルールをくぐり抜けようとするナイジェル・ファラージュの政治的パフォーマンスに乗せられることはないでしょう」と彼女はBBC Breakfastに語った。\n\nリフォームの内務問題担当スポークスマン、ジア・ユースフは、対立政党は「ファラージュを恐れて逃げている」と述べた。\n\n彼はBBCラジオ4の「トゥデイ」番組でこう語った。「彼らが候補者を立てないと選択しているのは、心の中では彼に勝てる見込みがほとんどないと分かっているからです。」\n\nファラージュは火曜日、財務に関して「何も悪いことはしていない」と述べ、ユースフは自身の上司が補欠選挙を呼びかけることで調査から逃れようとしているのではないと主張した。\n\n彼は言った。「ナイジェルはそれらの質問に答えるでしょう、それは明確です。本人もすでにそう言っています。\n\n「彼がこの決断を下した理由は、議会基準が課すことのできる最も重大な制裁が、もちろん、不信任請願が成立した場合に補欠選挙が招集されるほどの長期停職だからです。\n\n「だから彼は言ったのです。『真実の究極の源泉であるもの、つまり有権者に直接訴えよう』と。」\n\n保守党党首のケミ・バデノックは、自党は「ファラージュが起こしていることから人々の注意をそらすための偽りの選挙」には参加しないと述べた。\n\n自由民主党は、調査が終了するまで政府がファラージュの辞職を阻止するよう求め、選挙区の住民が「投票前に全ての事実を知る」必要があると主張した。\n\n「ファラージュ氏の司法逃れのゲームに乗るべきではありません」と党首のエド・デイヴィー卿はBBCラジオ4の「トゥデイ」番組に語った。\n\nリフォームから除名されたルパート・ロウ議員が設立したリストア・ブリテンは、今回の選挙には立候補しないが、基準調査によって最終的に2度目の補欠選挙が実施された場合には出馬すると述べた。\n\nイングランド・ウェールズ緑の党は当初、それは地域の党支部が決めることだと述べた。\n\nその後、緑の党のハンナ・スペンサー議員がBBCニュースナイトに対し、地域の党員が候補者を立てないと決定したと伝えた。\n\nコメディアンのジョン・ハーヴェイは、「カウント・ビンフェイス」のペンネームで定期的に補欠選挙に出馬しており、今回も立候補することを確認した。\n\nクラクトンの人々に対するアピールポイントを問われると、彼はトゥデイ番組に答えた。「そうですね、私はナイジェル・ファラージュではありません。」\n\n彼は、選挙区に合わせてマニフェストをカスタマイズすると述べたが、全国的な政策は変わらないとした。そのひとつとして、「99フレーク（アイスクリームのチョコレートスティック）を99ペンスで価格上限設定する」という公約を挙げ、「クラクトンの人々はこれを気に入るでしょう」と付け加えた。\n\n・クリス・メイソン：財務問題後、ファラージュが主導権を取り戻そうとする（12時間前掲載）\n\n・ファラージュはなぜ辞職したのか、次に何が起こるのか（16時間前掲載）\n\n・リフォーム、個人財務情報の漏洩をNCA（国家犯罪庁）に調査依頼（10時間前掲載）\n\n火曜日に録画され、記者が質問できない状態でジャーナリスト不在のまま党が収録した20分間のビデオ声明の中で、ファラージュは財務に関して「何も悪いことはしていない」と主張し、メディアへの怒りを露わにし、家族に対する扱いを訴えた。\n\n彼は「既成体制」が「不正な手段」を使って自分の党を標的にしていると述べた。\n\nこの補欠選挙は、「既成体制に二本指を立て、行くべき場所に行けと告げる機会だ」と彼は言った。\n\nリフォームの関係者は、選挙を早期に実施したいとしており、議会規則の下では早ければ8月にも設定できるとされる。\n\n党事務所を後にする際、「パフォーマンスではないか」と問われたファラージュは「ええ、大きな賭けですよ」と答えた。\n\nファラージュは、通常は国費で賄われる補欠選挙の費用を自党が負担すると申し出ていると述べた。\n\n2016年の政府試算では補欠選挙の費用は228,964ポンドとされていたが、その後上昇しているとみられる。\n\n保守党の貴族院議員で世論調査の専門家であるヘイワード卿は、英国選挙法の「基本原則」は「選挙の運営を政党間の争いから切り離すことにある」と述べた。\n\n彼はトゥデイ番組に語った。「したがって、彼らが補欠選挙の費用を負担することは違法となります。」\n\nファラージュは2024年の総選挙でクラクトン選挙区を制し、8,000票を超える大差で勝利し、保守党を2位に押しやった。労働党が3位、その後に自由民主党と緑の党が続いた。\n\nファラージュは現在、議会の基準委員会による調査を受けており……", "vocab": [{"word": "scrutiny", "definition": "厳しい調査・監視を意味する名詞。政治や財務の文脈で、詳細な検査や批判的な検証を指す際によく使われる。"}, {"word": "sanction", "definition": "制裁または罰則を意味する名詞。ここでは議会が議員に科すことのできる公式な懲罰措置を指す。"}, {"word": "recall petition", "definition": "議員をその職から解任するために有権者が署名する請願書。一定の基準を満たした場合に補欠選挙が実施される仕組み。"}, {"word": "pseudonym", "definition": "本名の代わりに使われる偽名・ペンネームのこと。ここではコメディアンが選挙活動で使用するキャラクター名を指す。"}, {"word": "manifesto", "definition": "政党や候補者が選挙前に発表する政策や公約をまとめた文書。選挙の文脈で頻繁に使われる重要な政治用語。"}, {"word": "railed against", "definition": "激しく非難する・怒りをぶつけるという意味のイディオム表現。強い感情的な批判を表す際に使われる。"}, {"word": "administration", "definition": "ここでは選挙の運営・管理を指す名詞。政党の政治活動とは切り離された、中立的な運営管理の意味で使われている。"}]}, {"title_ja": "NATO同盟国、新たな長距離ミサイル計画に370億ポンドを拠出", "title_en": "NATO Allies Pledge £37bn for New Long-Range Missile Project to Defend Europe", "summary_ja": "英国を含むNATO加盟12か国が、「ディープ・プレシジョン・ストライク」と呼ばれる新型長距離ミサイルシステムの開発に向け、10年間で370億ポンド（500億ドル）の投資を発表した。このミサイルは最大約2,000キロ先の目標を精密攻撃できる能力を持つ。計画はトルコの首都アンカラで開催されたNATOサミットで発表されたが、実戦配備は2030年代になる見通しだ。", "summary_en": "Twelve NATO member countries, including the UK, have announced a £37bn ($50bn) investment over 10 years in a new long-range missile system called Deep Precision Strike, capable of hitting targets up to 1,250 miles away. The initiative was unveiled at the NATO summit in Ankara, Turkey, where UK Prime Minister Sir Keir Starmer convened allied leaders to discuss the programme. The missile is designed to deter Russian aggression, though it is not expected to be operational until the 2030s.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/ckg4e3lwzqzo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Nato allies announce £37bn for new missile project\n- Published\nTwelve countries, including the UK, are set to spend more than £37bn ($50bn) over the next 10 years on a new long-range missile to protect Europe.\nThe Deep Precision Strike project has just been unveiled by No 10 and is due to be discussed later on Wednesday at the Nato summit in the Turkish capital, Ankara.\nSir Keir Starmer is there for his final Nato summit as prime minister. He is likely to face some criticism from US President Donald Trump for failing to set out a plan for reaching 3.5% of GDP spent on defence by 2035, a target agreed by nearly all Nato members last year.\nBut on Wednesday the prime minister will convene around a dozen leaders to discuss the new missile programme.\nBilled as one of Nato's most advanced weapons, it is intended to strike targets nearly 200 miles (300km) away with pinpoint accuracy, possibly extending out to 1,250 miles.\nSir Keir said the UK-led initiative would \"help bring European allies together to keep Nato safe for years to come\".\nForeign Secretary Yvette Cooper said the plan was \"part of a recognition that we're in a more dangerous world\".\n\"This is about how we make sure we have a stronger Europe within a stronger Nato,\" she told BBC Breakfast from Ankara.\nBut like many planned military projects in the pipeline, Deep Strike is not expected to be ready until the 2030s.\nIn June, US Defence Secretary Pete Hegseth announced a six-month review of the presence of US forces in Europe.\nTrump has repeatedly made clear he wants Nato members to contribute more to defence spending in Europe and at last year's Nato summit, members of the alliance agreed to spend 5% of GDP on defence and security by 2035.\nSir Keir said he was \"determined\" to ensure the safety of the UK and its allies, adding: \"We must step up to deliver a stronger, more European Nato.\"\nThe UK government has already committed £300bn by 2030 in the Defence Investment Plan.\n- Trump looms large as Nato grapples with challenge of rearming Europe - Published15 hours ago\n \n- Zelensky presses Nato for air defence systems after intense Russian strikes - Published21 hours ago\n \nAt the summit, Sir Keir is expected to underline the threat posed by Russia to the UK and Nato.\nThe government said Nato had scrambled fighter jets to intercept Russian aircraft approaching allied airspace more than 700 times and that Russian military activity around UK waters had surged 30%.\nSir Keir is expected to stress that whilst Nato did not seek confrontation with Russia, it must be ready to defend every ally.\nCooper said: \"With deep precision strike capability, the UK and our allies will be able to hit high value military targets and the logistical engines that drive armies, deterring any aggressor and strengthening our mutual security.\n\"At Ankara we are sending a clear message to [Russian] President [Vladimir] Putin; Nato is stronger, more European and ready to defend our citizens against the long-term threat posed by him and the Russian state.\"\nUkrainian President Volodymyr Zelensky used a speech at the summit on Tuesday to urge Ukraine's allies to deliver the air defence systems it urgently needs to protect it from escalating Russian attacks.\nUkraine has been stepping up its own long-range drone and missile attacks against Russia, hitting oil refineries and military targets there and causing significant fuel shortages and power cuts.\n\"Ukraine's Armed Forces have proved that the effective use of long-range systems can have game-changing impacts on the battlefield, giving the Armed Forces the ability to degrade enemy forces far behind the frontline,\" Number 10 said.\n\"Ukrainian long-range strikes, such as those on key logistics hubs, have significantly impacted Russia's ability to sustain their offensives.\"\nKremlin spokesman Dmitry Peskov said on Tuesday that Russia, which invaded Ukraine in 2022, would closely monitor the summit in Ankara.\nHe said that no new weapons Kyiv would get from Nato could prevent Russia from pressing on with its military operation in Ukraine until its objectives were achieved.\n\"In the context of preparations for this summit we heard a great many statements concerning our country,\" Peskov told reporters.\n\"To our regret, these were not statements about constructive engagement and dialogue but rather statements of a confrontational nature.\"\n\"Settlement of this conflict through political and diplomatic means remains preferable\" for Russia, Peskov added.", "translation_ja": "NATO同盟国、新たなミサイル計画に370億ポンドを発表\n\n英国を含む12か国が、欧州防衛のための新型長距離ミサイルに今後10年間で370億ポンド（500億ドル）以上を投じる方針だ。\n\n「ディープ・プレシジョン・ストライク」計画はダウニング街10番地によって発表されたばかりで、水曜日にトルコの首都アンカラで開催されるNATOサミットで議題として取り上げられる予定だ。\n\nキア・スターマー首相は首相として最後のNATOサミットに出席している。彼はNATO加盟国のほぼ全てが昨年合意した目標である「2035年までにGDPの3.5%を防衛費に充てる」計画を示せていないとして、ドナルド・トランプ米大統領から批判を受ける可能性が高い。\n\nしかし水曜日、首相は十数か国の首脳を招集し、新たなミサイル計画について協議する。\n\nNATOの最先端兵器の一つとして位置づけられるこのミサイルは、約300キロ（200マイル）先の目標を精密に攻撃する能力を持ち、場合によっては最大約2,000キロ（1,250マイル）の射程を実現する可能性がある。\n\nスターマー首相は、英国主導のこの取り組みが「欧州同盟国を結集し、NATOを今後長年にわたって安全に保つ一助となる」と述べた。\n\nイベット・クーパー外相は、この計画は「私たちがより危険な世界にいるという認識の一部だ」と語った。\n\n「これは、強化されたNATOの中でより強い欧州をいかに実現するかという問題だ」と彼女はアンカラからBBCブレックファストに述べた。\n\nしかし、多くの計画中の軍事プロジェクトと同様に、ディープ・ストライクが実戦配備されるのは2030年代になる見通しだ。\n\n6月、ピート・ヘグセス米国防長官は欧州における米軍のプレゼンスについて6か月間の見直しを発表した。\n\nトランプ大統領はNATO加盟国に対し、欧州防衛への支出増加を繰り返し求めており、昨年のNATOサミットでは加盟国が2035年までにGDPの5%を防衛・安全保障に充てることで合意した。\n\nスターマー首相は英国と同盟国の安全確保に「断固たる決意」を持っていると述べ、「私たちは、より強力でより欧州的なNATOを実現するために奮起しなければならない」と語った。\n\n英国政府はすでに2030年までの防衛投資計画として3,000億ポンドの支出を約束している。\n\nサミットでスターマー首相は、ロシアが英国とNATOに与える脅威を強調する見込みだ。\n\n政府によると、NATOは同盟国の空域に接近するロシア機を迎撃するために700回以上戦闘機をスクランブル発進させており、英国周辺海域でのロシアの軍事活動は30%急増した。\n\nスターマー首相は、NATOはロシアとの対立を求めないが、すべての同盟国を防衛する準備が整っていなければならないと強調する見通しだ。\n\nクーパー外相は次のように述べた。「ディープ・プレシジョン・ストライク能力により、英国と同盟国は高価値の軍事目標や軍を動かす兵站インフラを攻撃し、いかなる侵略者も抑止して相互の安全保障を強化することができる。」\n\n「アンカラで私たちは、プーチン大統領に明確なメッセージを送っている。NATOはより強力で、より欧州的になり、彼とロシア国家がもたらす長期的な脅威から市民を守る準備ができている。」\n\nウクライナのウォロディミル・ゼレンスキー大統領は火曜日のサミットでの演説で、激化するロシアの攻撃からウクライナを守るために緊急に必要な防空システムを届けるよう同盟国に訴えた。\n\nウクライナはロシアに対する独自の長距離ドローンとミサイル攻撃を強化しており、石油精製施設や軍事目標を攻撃して深刻な燃料不足と停電を引き起こしている。\n\n「ウクライナ軍は、長距離システムの効果的な使用が戦場に革命的な影響をもたらし得ることを証明した。これにより軍は前線の遥か後方で敵を弱体化させる能力を得る」とダウニング街10番地は述べた。\n\n「重要な兵站ハブへの攻撃などウクライナの長距離攻撃は、ロシアが攻勢を維持する能力に重大な打撃を与えている。」\n\nクレムリンのドミトリー・ペスコフ報道官は火曜日、2022年にウクライナに侵攻したロシアはアンカラのサミットを注視すると述べた。\n\n同氏は、NATOからウクライナが受け取る新たな兵器はいずれも、ロシアが目標を達成するまでウクライナでの軍事作戦を継続することを阻止できないと語った。\n\n「このサミットの準備に関連して、わが国に関する多くの発言を耳にした」とペスコフは記者団に語った。\n\n「残念ながら、それらは建設的な関与や対話についての発言ではなく、対立的な性質の発言だった。」\n\n「この紛争を政治的・外交的手段によって解決することがロシアにとっては望ましい」とペスコフは付け加えた。", "vocab": [{"word": "pinpoint accuracy", "definition": "非常に高い精度で目標を特定・攻撃する能力を指す慣用表現。軍事・技術文脈でよく使われる。"}, {"word": "convene", "definition": "会議や集会を招集・開催するという意味の動詞。公式な文脈や政治・外交の場でよく用いられる。"}, {"word": "deterring", "definition": "「deterring」はdeterの現在分詞形で、脅威や強制力によって相手が行動を起こすのを思いとどまらせること。安全保障・軍事の分野で頻出する用語。"}, {"word": "logistical", "definition": "兵站や物資の輸送・管理に関する形容詞。軍事・ビジネス文脈で、組織的な運営・供給体制を指して使われる。"}, {"word": "confrontational", "definition": "対立的・挑発的な性質を持つことを表す形容詞。外交や交渉において相手との対決姿勢を示す際に使われる。"}, {"word": "scrambled", "definition": "軍事用語として「スクランブル発進させた」を意味し、緊急事態に対応して戦闘機を即時出動させることを指す。"}, {"word": "billed as", "definition": "「〜として宣伝・紹介される」という意味の慣用表現。特定のイメージや評価を付与して提示する際に用いられる。"}]}, {"title_ja": "英国、1976年以来最長クラスの熱波に見舞われ琥珀色の熱中症警報発令", "title_en": "Amber Heat Health Alerts Issued as UK Faces One of Longest Heatwaves Since 1976", "summary_ja": "英国では1976年以来最長となる可能性がある熱波が到来しており、イングランド全土に琥珀色および黄色の熱中症警報が発令されている。イングランド南部では気温が36℃に達する恐れがあり、熱波は最長14日間続く可能性がある。保健当局は、特に65歳以上の高齢者を中心に、医療・介護サービスへの重大な影響を警告している。", "summary_en": "The UK is experiencing one of its longest-lasting heatwaves since 1976, with amber and yellow heat health alerts in place across England. Temperatures could reach 36°C in southern England, with the heatwave potentially lasting up to 14 consecutive days. Health authorities warn of significant impacts on health and social care services, particularly for those aged 65 and over.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/weather/articles/cwy0jpez1nqo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Amber heat health alerts in effect as UK set for one of longest-lasting heatwaves since 1976\n- Published\nAmber and yellow heat health alerts are in place across England as the UK braces for one of the longest-lasting heatwaves since 1976.\nTemperatures could rise as high as 36C (97F) for parts of southern England this week. However, readings will range widely across the country, from the mid-20s Celsius in the north to those mid-30s further south.\nThe Midlands, eastern and southern England are under amber heat-health alerts by the UK Health Security Agency until 21:00 BST on 12 July.\nMeanwhile, yellow heat health alerts are in force across northern England for the same period.\nSignificant impacts are likely across health and social care services due to the high temperatures, including a rise in deaths, particularly among those aged 65 and over or those with health conditions.\n- Are 'heat spikes' becoming more common? - Published29 May\n \nHeat forecast to peak by Friday\nParts of the south and east officially entered a heatwave on Monday, after three days at or above their threshold temperatures.\nHeatwave criteria were met more widely on Tuesday as temperatures peaked at 32.4C in both Teddington, Richmond upon Thames, and also in Frittenden, Kent.\nMore locations could reach 34C or 35C in the coming days, with the hot spot likely to be in southern England.\nHeat will continue to build and extend north and west into Northern Ireland and Scotland until Friday. Here the peak is expected in the high 20s Celsius.\nAs high pressure shifts towards the end of the week, an easterly wind will pick up. As a result the focus of 30C will move and temperatures will dip a little in eastern areas of the UK, but many will remain in heatwave conditions.\nThe focus of the heat will then be further west, across central southern England in particular. South Wales could also see highs of 33C on Friday.\nUnlike the late June heatwave, humidity levels have been lower making the heat feel less oppressive. But these are now picking up again.\nA few tropical nights - when temperatures do not drop below 20C - are not out of the question, especially later in the week in the bigger towns and cities.\nHow long will the heatwave last?\nAt this stage, temperatures are not forecast to be record breaking like those experienced in May and June.\nHowever, this heatwave could be one of the longest lasting since the infamous heatwave of 1976. During it, England in particular saw multiple locations record 13 to 16 consecutive days above 30C.\nThroughout this week and next, parts of southern England are forecast to experience temperatures in excess of 27 or 28C, meeting the heatwave threshold for the area.\nSome locations could ultimately remain in a heatwave for as many as 14 days.\nKeep up to date with the forecast where you live with the BBC Weather 10 day forecast.\nGet in touch\nHow have you been affected by heatwaves? Have you changed your work and living arrangements to cope?\n- Published22 June\n \n- Published27 June\n \n- Published25 June", "translation_ja": "琥珀色の熱中症警報発令中――英国、1976年以来最長クラスの熱波に備える\n\n英国が1976年以来最長クラスの熱波に備える中、イングランド全土に琥珀色および黄色の熱中症警報が発令されている。\n\n今週、イングランド南部の一部地域では気温が最高36℃（97°F）に達する可能性がある。ただし、気温は地域によって大きく異なり、北部では20℃台半ば、南部ではその30℃台半ばと幅広い分布となる見込みだ。\n\nイングランドのミッドランズ地方、東部および南部では、英国健康安全保障庁（UKHSA）により7月12日21時（英国夏時間）まで琥珀色の熱中症警報が発令されている。一方、イングランド北部には同期間、黄色の熱中症警報が適用されている。\n\n高温の影響により、医療・介護サービスへの重大な影響が見込まれており、特に65歳以上の高齢者や基礎疾患を持つ人々の死亡者数の増加が懸念される。\n\n■熱のピークは金曜日の見込み\n\n南部および東部の一部地域では月曜日、3日間連続で閾値温度に達したことが確認され、正式に熱波入りが宣言された。火曜日にはリッチモンド・アポン・テムズのテディントンおよびケント州フリッテンデンの両地点でそれぞれ32.4℃を記録し、熱波の基準がより広い地域で達成された。\n\n今後数日間でさらに多くの地点が34℃または35℃に達する可能性があり、最高気温はイングランド南部で記録されると見られる。\n\n高温は金曜日にかけて北および西へと広がり、北アイルランドおよびスコットランドにも及ぶ見通しだ。これらの地域では気温のピークは20℃台後半が予想される。\n\n週末にかけて高気圧がシフトすると、東風が強まる。これにより30℃超の地域が移動し、英国東部では気温がやや低下するものの、多くの地域では引き続き熱波の状態が続く。\n\nその後、熱の中心はさらに西へ移動し、特にイングランド中南部に集中する見込みだ。南ウェールズでも金曜日には最高33℃に達する可能性がある。\n\n6月下旬の熱波と異なり、今回は湿度が低く、体感的な蒸し暑さは比較的抑えられていた。しかし湿度は再び上昇しつつある。\n\nいわゆる「熱帯夜」（気温が20℃を下回らない夜）が数日続く可能性も否定できず、特に週後半の大都市圏では注意が必要だ。\n\n■熱波はどのくらい続くのか？\n\n現時点では、5月から6月にかけて記録された記録的な高温が再び観測されるとは予想されていない。\n\nしかしながら、今回の熱波は悪名高い1976年の熱波以来、最長クラスのものとなる可能性がある。1976年の熱波では、イングランドの複数地点で30℃超の日が13〜16日連続して記録された。\n\n今週から来週にかけて、イングランド南部の一部では27〜28℃を超える気温が続き、当該地域の熱波基準を満たすと予想されている。\n\n一部の地点では、最終的に14日間にわたり熱波状態が続く可能性もある。\n\nお住まいの地域の最新の天気予報は、BBCウェザーの10日間予報でご確認ください。\n\n【読者へ】熱波による影響はありましたか？暑さに対処するため、仕事や生活環境を変えましたか？", "vocab": [{"word": "threshold", "definition": "基準値・閾値のこと。ここでは熱波と認定されるための最低気温の基準を指す。科学・気象・医療などの専門的文脈で広く使われる。"}, {"word": "heatwave", "definition": "一定期間にわたって異常な高温が続く気象現象を指す。気象・環境分野では基準温度を超えた日数によって定義される専門用語。"}, {"word": "oppressive", "definition": "（気候・状況などが）息苦しいほど重苦しい、耐えがたいという意味の形容詞。特に湿度や暑さが身体的に不快なほど強烈な状態を表す際に用いられる。"}, {"word": "infamous", "definition": "悪名高い、不名誉な評判で広く知られているという意味の形容詞。単に「有名」ではなく、否定的な理由で広く認知されていることを強調する。"}, {"word": "braces", "definition": "「brace for〜」の形で「〜に備える、身構える」という意味の慣用表現。困難や危険な状況に心身の準備をする際に使われる。"}, {"word": "consecutive", "definition": "連続した、途切れなく続くという意味の形容詞。「consecutive days」で「連続した日々」を表し、統計・気象・スポーツなどの文脈で頻出する。"}, {"word": "humidity", "definition": "大気中の水蒸気の量、湿度を指す名詞。気象予報や健康・建築分野で使われる専門用語で、体感温度に大きく影響する要素として言及される。"}]}, {"title_ja": "OpenAI、ホワイトハウスの安全審査を経て「最強モデル」GPT-5.6を発表", "title_en": "OpenAI Launches GPT-5.6 'Strongest Model Yet' After White House Security Review", "summary_ja": "OpenAIは、ホワイトハウスによる安全保障審査のため数週間延期されていたGPT-5.6シリーズを木曜日にリリースする。モデルはSol、Terra、Lunaの3バージョンで構成され、サイバーセキュリティや自律型タスクにおける強化された機能を備えている。今回の公開は、米国政府が強力なAIシステムの監督プロセス確立を目指す動きの一環でもある。", "summary_en": "OpenAI is releasing its GPT-5.6 AI model series on Thursday after a weeks-long delay prompted by a White House security review. The models, which come in three versions named Sol, Terra, and Luna, feature enhanced capabilities in cybersecurity and autonomous tasks. The launch follows broader US government efforts to establish oversight processes for powerful AI systems.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/openai-to-launch-strongest-model-yet-after-delay/a-77874307?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "IT", "full_text": "ChatGPT creator to launch 'strongest model yet' after delay\nJuly 8, 2026OpenAI is set to roll out its GPT-5.6 AI model series on Thursday, weeks after postponing the launch in June as US officials reviewed potential security risks.\nAccording to Axios, the White House has now cleared the launch following technical testing and discussions with OpenAI executives.\nOpenAI describes its GPT-5.6 model as its strongest yet, with increased capabilities in cybersecurity, biology and autonomous, or agentic, AI tasks.\nWhy did the White House delay the release?\nThe delay came amid growing concern in Washington over increasingly powerful AI systems and their potential misuse.\nIn June, the White House ordered OpenAI rival Anthropic to suspend the use of its cutting-edge Fable and Mythos AI models over national security concerns. Restrictions on those systems were only eased last week.\nUS officials' concerns are linked to advanced AI models' ability to identify vulnerabilities in software code, which could be exploited by foreign militaries or intelligence services, including Russia and China.\nWhen the White House requested a delay to OpenAI's GPT-5.6 launch over similar concerns, the company agreed.\nBut in a statement, the company said it doesn't believe \"this kind of government access process should become the long-term default\" since it \"keeps the best tools\" from users, businesses and others who need them.\nWashington pushes for AI safeguards\nAt the start of his second term, President Donald Trump largely pursued a deregulatory approach to AI, arguing that excessive regulation could weaken the United States' ability to compete with China in the sector.\nBut in June, Trump signed an executive order aimed at addressing cybersecurity risks linked to advanced AI models. The measure is supposed to establish a voluntary process under which AI developers can share models with the government 30 days before their public release.\nOpenAI said it was coordinating with officials \"to develop the cyber Executive Order framework and a repeatable process for future model releases.\"\nGPT-5.6 to debut in three versions\nAccording to OpenAI, the GPT-5.6 model series released on Thursday will include three versions. The first, Sol, is described as the company's \"strongest model yet.\" The Terra version will offer a mid-range model aimed at everyday tasks, while Luna will serve as the cheapest option focused on speed and efficiency.\nThe company also said the GPT-5.6 model incorporates a \"layered safeguard stack\" — multiple security mechanisms designed to prevent the AI's misuse for cyberattacks and other harmful activities.\nEdited by: Natalie Muller", "translation_ja": "ChatGPT開発元、遅延を経て「最強モデル」を発表\n\n2026年7月8日——OpenAIは木曜日、GPT-5.6 AIモデルシリーズをリリースする予定だ。これは、米国当局が潜在的なセキュリティリスクを審査したことを受け、6月に予定されていた公開が延期されてから数週間後のことである。\n\nAxiosによると、ホワイトハウスは技術的なテストおよびOpenAI幹部との協議を経て、今回のリリースを承認した。\n\nOpenAIはGPT-5.6モデルを「これまでで最も強力なモデル」と位置付けており、サイバーセキュリティ、生物学、そして自律型（エージェント型）AIタスクにおける能力が向上しているとしている。\n\nなぜホワイトハウスはリリースを延期したのか？\n\nこの遅延は、ますます強力になるAIシステムとその悪用の可能性に対するワシントンの懸念が高まる中で発生した。\n\n6月、ホワイトハウスはOpenAIの競合であるAnthropicに対し、国家安全保障上の懸念から最先端AIモデル「Fable」および「Mythos」の使用を停止するよう命じた。これらのシステムへの制限は先週ようやく緩和された。\n\n米国当局の懸念は、高度なAIモデルがソフトウェアコードの脆弱性を特定する能力に関連しており、ロシアや中国を含む外国の軍や情報機関に悪用される恐れがある。\n\nホワイトハウスがGPT-5.6のリリース延期を求めた際も同様の懸念が背景にあり、OpenAIはその要請に応じた。\n\nただし同社は声明の中で、「このような政府によるアクセス審査プロセスが長期的なデフォルトになるべきではない」と主張した。なぜなら、それが「最高のツール」をそれを必要とするユーザーや企業などから遠ざけることになるからだと述べた。\n\nワシントン、AIの安全策を推進\n\nトランプ大統領は2期目の就任当初、AIに対して主に規制緩和路線を取り、過度な規制は同分野における米国の対中競争力を弱めると主張していた。\n\nしかし6月、トランプ大統領は高度なAIモデルに関連するサイバーセキュリティリスクへの対応を目的とした大統領令に署名した。この措置は、AI開発者が公開の30日前にモデルを政府と共有できる任意のプロセスを設けることを想定している。\n\nOpenAIは、「サイバー大統領令の枠組みと将来のモデルリリースに向けた再現可能なプロセスを策定するため、当局と連携している」と述べた。\n\nGPT-5.6、3バージョンで登場\n\nOpenAIによると、木曜日にリリースされるGPT-5.6モデルシリーズには3つのバージョンが含まれる。最初の「Sol」は同社の「これまでで最も強力なモデル」と位置付けられている。「Terra」は日常的なタスクを対象とした中級モデルであり、「Luna」はスピードと効率に特化した最も低コストなオプションとなる。\n\nまた同社は、GPT-5.6モデルにはサイバー攻撃などの有害な活動へのAI悪用を防ぐために設計された複数のセキュリティ機構、いわゆる「レイヤード・セーフガード・スタック」が搭載されていると説明した。\n\n編集：ナタリー・ミュラー", "vocab": [{"word": "agentic", "definition": "AIが人間の直接的な指示なしに自律的にタスクを計画・実行する能力に関する形容詞。「自律型」とも訳される新しい技術用語。"}, {"word": "deregulatory", "definition": "規制を撤廃または緩和しようとする方針・姿勢を表す形容詞。政府が産業への規制を減らす政策アプローチを指す。"}, {"word": "safeguard", "definition": "危険や悪用から守るための保護手段や安全装置を意味する名詞・動詞。技術分野では特にシステムの安全対策を指す。"}, {"word": "vulnerability", "definition": "システムやソフトウェアに存在する弱点や欠陥を指すサイバーセキュリティ用語。攻撃者に悪用される可能性のある脆弱な箇所を意味する。"}, {"word": "eased", "definition": "規制や制限などが緩和・軽減されたことを表す動詞の過去形。「ease restrictions」で「制限を緩める」という慣用表現として頻出する。"}, {"word": "incorporate", "definition": "ある要素や機能をシステムや設計の中に組み込む・統合することを意味する動詞。技術文書やビジネス文書で頻繁に使われる。"}, {"word": "executive order", "definition": "米国大統領が議会の承認なしに発令できる行政命令を指す法律・政治用語。大統領令とも呼ばれ、法的拘束力を持つ。"}]}, {"title_ja": "ベルリン緩和ケア医師の殺人裁判、評決下される見通し", "title_en": "Berlin Court to Deliver Verdict in Palliative Doctor Murder Trial", "summary_ja": "ベルリンの裁判所は、2021年から2024年にかけて在宅訪問中に15人の重篤患者に致死的な薬物を注射して殺害したとして起訴された緩和ケア医師に対する判決を言い渡す予定。検察側は終身刑、保護拘禁、医師免許の終身剥奪を求刑している。また、ドイツ連邦議会ではAIを活用したデータ分析を含む警察のデジタル捜査権限を拡大する法案が審議される。", "summary_en": "A Berlin court is set to rule on the case of a palliative care doctor accused of killing 15 seriously ill patients with lethal drug injections during home visits between 2021 and 2024. Prosecutors have demanded life imprisonment along with preventive detention and a lifetime medical ban. Separately, Germany's Bundestag is debating legislation to expand digital investigation powers for police, including AI-assisted data analysis.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/germany-news-verdict-due-in-berlin-doctor-murder-trial/live-77870812?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "経済", "full_text": "Germany news: Verdict due in Berlin doctor murder trial\nPublished July 8, 2026last updated July 8, 2026What you need to know\n- A Berlin court is set to rule in the murder trial of a palliative care doctor\n- He is accused of killing 15 seriously ill patients with lethal drug mixtures\n- The Bundestag is set to debate a package of bills on digital investigation powers\n- The Interior Ministry wants police and prosecutors to have broader tools to fight terrorism and serious crime\nHere is a roundup of the latest headlines from Germany on Wednesday, July 7:\nBerlin court to rule in palliative doctor murder case\nA Berlin court is set to deliver its verdict in the murder trial of a palliative care doctor accused of killing 15 seriously ill patients.\nProsecutors demanded the maximum penalty after a trial lasting almost a year, seeking life in prison, a finding of particular severity of guilt — roughly the German equivalent to a first-degree murder conviction in the US — preventive detention after the sentence and a lifetime ban from practicing medicine.\nThe 41-year-old German doctor is accused of killing 12 women and three men during home visits between September 2021 and July 2024. Prosecutors say he injected patients with a lethal mix of drugs without medical justification and without their knowledge or consent.\nSeveral fires were allegedly set to cover up the killings. The doctor worked in outpatient palliative care in Berlin, where medical teams support seriously ill people by relieving pain and improving quality of life.\nThe alleged victims ranged in age from 25 to 94. All were seriously ill, but prosecutors say their deaths were not imminent. Relatives told the court some of the patients still had plans and had wanted to live.\nThe defendant, who has been in custody since August 2024, stayed silent for almost two years before admitting shortly before the end of the trial to 12 of the 15 killings.\nBundestag weighs expanded digital police powers\nGermany's Bundestag is set to debate a package of bills expanding digital investigation powers for police and prosecutors.\nThe Interior Ministry proposed giving authorities broader tools to analyze data automatically, including with artificial intelligence, as part of efforts to fight terrorism and serious crime.\nThe measures would also put some digital investigation powers on an explicit legal footing for the first time. The package includes rules on automated biometric matching, police data-analysis platforms and new powers for the police.\nThe chamber is also set to discuss further military support for Ukraine, as well as conduct a debate that the Bundestag parliament website labels as \"250 years of the US — freedom, democracy and responsibility.\"\nWelcome to our coverage\nTach zesamm! Welcome to the DW newsroom in Bonn, on the banks of the Rhine River.\nYou join us as a Berlin court is expected to deliver its verdict in the case of a palliative care doctor accused of killing 15 seriously ill patients.\nHe is alleged to have administered lethal drug combinations during home visits between 2021 and 2024.\nAlso in Berlin, the German lower house of parliament is set to talk about expanding authorization for police to use digital tools to assist their investigations.\nStay with us for this and more of the stories that Germany is talking about today.", "translation_ja": "ドイツニュース：ベルリン医師殺人裁判の評決へ\n\n2026年7月8日公開・更新\n\n【注目ポイント】\n・ベルリンの裁判所が緩和ケア医師の殺人裁判で判決を下す予定\n・同医師は致死的な薬物混合物を投与して重篤患者15人を殺害したとして起訴\n・連邦議会はデジタル捜査権限に関する法案パッケージの審議を予定\n・内務省はテロおよび重大犯罪対策として警察・検察に広範な手段を与えることを求めている\n\n以下は水曜日（7月7日）のドイツ最新ニュースまとめです。\n\n■ベルリン裁判所、緩和ケア医師殺人裁判で判決へ\n\nベルリンの裁判所は、重篤患者15人を殺害したとして起訴された緩和ケア医師の裁判について、判決を言い渡す予定です。\n\n約1年にわたる裁判の末、検察は最高刑を求刑し、終身刑、「特別な罪の重大性」認定（これはアメリカにおける第一級殺人罪の有罪評決にほぼ相当するドイツの概念）、刑期終了後の保護拘禁、そして医師免許の終身剥奪を求めています。\n\n41歳のドイツ人医師は、2021年9月から2024年7月にかけて在宅訪問中に女性12人と男性3人を殺害したとして起訴されています。検察によると、同医師は医学的根拠なく、また患者の知識や同意なしに、致死的な薬物混合物を注射したとされています。\n\nまた、殺害を隠蔽するため複数の火災が放火されたとも指摘されています。同医師はベルリンの在宅緩和ケアに従事しており、医療チームが重篤患者の疼痛緩和と生活の質向上を支援する業務を担っていました。\n\n被害者とされる人々の年齢は25歳から94歳にわたっています。全員が重篤な状態でしたが、検察は死が差し迫った状況ではなかったと主張しています。遺族は法廷で、一部の患者にはまだ計画があり、生き続けることを望んでいたと証言しました。\n\n2024年8月から拘禁されている被告は、裁判終了直前に15件のうち12件の殺害を認めるまで、約2年間にわたって黙秘を続けていました。\n\n■連邦議会、デジタル警察権限の拡大を審議\n\nドイツの連邦議会は、警察および検察のデジタル捜査権限を拡大する法案パッケージを審議する予定です。\n\n内務省は、テロおよび重大犯罪対策の一環として、人工知能を活用したデータ自動分析を含む、当局に広範な手段を与えることを提案しています。\n\nこれらの措置により、一部のデジタル捜査権限が初めて明確な法的根拠を得ることになります。法案パッケージには、自動化された生体認証マッチング、警察データ分析プラットフォーム、警察への新たな権限に関する規定が含まれています。\n\nまた、連邦議会はウクライナへのさらなる軍事支援についても議論する予定であり、連邦議会の議会ウェブサイトが「アメリカ建国250年――自由、民主主義、そして責任」と題した討議も行われる見込みです。\n\n■本日の報道へようこそ\n\nタッハ・ツェザム！　ライン川のほとりに位置するボンのDWニュースルームへようこそ。\n\n本日は、重篤患者15人を殺害したとして起訴された緩和ケア医師に対し、ベルリンの裁判所が評決を下すと見られています。\n\n同医師は2021年から2024年にかけて在宅訪問中に致死的な薬物の組み合わせを投与したとされています。\n\nまた、ベルリンでは、ドイツの下院議会が警察による捜査支援のためのデジタルツール活用の承認拡大について審議する予定です。\n\nこれらのニュースをはじめ、ドイツが注目する話題をお届けしますので、引き続きご覧ください。", "vocab": [{"word": "palliative care", "definition": "「緩和ケア」を意味し、重篤な疾患を持つ患者の疼痛や症状を和らげ、生活の質を向上させることを目的とした医療のこと。治癒を目指すのではなく、苦痛の軽減に焦点を当てる点が特徴。"}, {"word": "preventive detention", "definition": "「保護拘禁」または「予防的拘禁」を意味し、刑期終了後も社会への危険性が高いと判断された受刑者を引き続き拘禁する制度。ドイツ法における「Sicherungsverwahrung」に相当する概念。"}, {"word": "lethal", "definition": "「致死的な」「命に関わる」という意味の形容詞。薬物や物質などが死をもたらす可能性がある場合に用いられ、医療・法律・軍事などの分野で頻繁に使われる上級語彙。"}, {"word": "biometric matching", "definition": "「生体認証マッチング」を意味し、指紋・顔・虹彩などの身体的特徴データを照合・識別する技術のこと。デジタル捜査やセキュリティの文脈でよく用いられる専門用語。"}, {"word": "justification", "definition": "「正当な理由」「根拠」を意味する名詞。法律や医療の文脈では、ある行為が適法・適切であることを裏付ける理由や根拠を指す。TOEIC高得点者向けの重要語彙。"}, {"word": "imminent", "definition": "「差し迫った」「今にも起こりそうな」という意味の形容詞。危険や出来事がすぐに起こる可能性が高い状況を表し、法律・医療・ニュース報道などで広く使われる。"}, {"word": "explicit legal footing", "definition": "「明確な法的根拠」を意味する慣用表現。ある行為や権限が法律によって明文化・正式に認められた状態であることを指し、法律や政策の文脈で用いられる上級イディオム。"}]}, {"title_ja": "山火事を激化させるオーストラリア原産のユーカリ——世界各地で広がるリスク", "title_en": "How Australian Eucalyptus Trees Are Intensifying Wildfires Around the World", "summary_ja": "パルプ・木材産業に重宝されるユーカリは、現在90カ国以上で2200万ヘクタールに広がり、各地の火災リスクを変容させている。科学者たちは、ユーカリの可燃性の高い油分や樹皮、そして急速な再生力が山火事を激化させる悪循環を生み出すと警告している。スペインのガリシア地方では50万ヘクタールに及ぶユーカリ農園が深刻な火災状況をもたらし、規制と森林管理のあり方をめぐる議論が高まっている。", "summary_en": "Eucalyptus trees, prized by the pulp and timber industries for rapid growth, now cover 22 million hectares across more than 90 countries, reshaping fire risks in regions far from their Australian origins. Scientists warn that the trees' flammable oils, bark, and fast regrowth create self-reinforcing cycles that intensify wildfires. In Spain's Galicia region, half a million hectares of eucalyptus plantations have contributed to severe fire conditions, prompting debate over regulation and forest management.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/the-australian-tree-reshaping-the-world-s-wildfires/a-77560208?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "政治", "full_text": "The Australian tree reshaping the world's wildfires\nJuly 8, 2026Each year, more than 400,000 hikers descend on Galicia for the Camino de Santiago pilgrim walk, crossing misty hills and dense green woodland. But much of the forest surrounding the route is no longer native.\nInstead of indigenous oak and chestnut, large parts of northwestern Spain are now dominated by eucalyptus.\nThat transformation is not unique to Galicia. Prized by the pulp and timber industries for its rapid growth and profitability, vast monocultures of the Australian tree have been planted in places such as Brazil, Chile, California, India and South Africa.\nGlobally, eucalyptus plantations now cover 22 million hectares across more than 90 countries, and in many regions, they have become a cornerstone of rural economies. But hiding beneath the seemingly tranquil canopies are landscapes vulnerable to extreme wildfires because scientists regard the trees as highly flammable.\nEuropean heatwave raises alarms\nEurope has already been sweltering this summer, with concerns that the unusually early heat waves could intensify fire risk. Parts of the southern continent have been hit in recent days. Last year was the worst wildfire year on record, with more than 1 million hectares burned — much of it on the Iberian Peninsula.\nResearchers say that while eucalyptus trees aren't to blame for igniting these infernos, they can significantly intensify fires once they start.\n\"Eucalypt forests are clearly one of the more flammable forests that we have in the world,\" Tim Curran of Lincoln University in New Zealand told DW.\n\"If you put a eucalypt in a new environment, you're very likely to change what we call fire regimes. So things like fire intensity, fire frequency; how hot the fire gets and how often you get fires.\"\nThe trees' leaves contain highly flammable oils, and strips of bark can ignite into burning embers. In extreme conditions, those embers can travel huge distances to start secondary fires, as happened during Australia's devastating 2009 Black Saturday fires.\n\"There was evidence that embers were blown more than 30 kilometers ahead of the fire front to start a new fire,\" Curran said, adding that it was not a one-off.\nIn Galicia, plantations can easily outgrow their original borders because while native oak and chestnut can take more than 80 years to reach maturity, eucalyptus needs just 15. As a result, they bounce back quickly when fires decimate landscapes, giving them a competitive advantage over native species.\nThat creates a self-reinforcing cycle that ultimately allows monocultures to expand further, increasing wildfire risk.\nEucalyptus divides opinions\nThe plantations in Galicia date back to the 1970s but really took off two decades later.\nIn 1992, the regional government released a forestry plan projecting eucalyptus would reach 250,000 hectares by 2030. It took them 30 years to update that plan, during which time eucalyptus ran rampant.\n\"It's now around half a million hectares, which is a massive amount of land,\" local community leader Joam Evans Pim said.\nThough the regional government has since introduced a moratorium on new eucalyptus plantations, campaigners say enforcement remains uneven, and illegal planting persists.\nOn the one hand, there is money in eucalyptus — the Galician plantations, which predominantly feed the pulp and timber industries, generated €167 million in 2024 alone.\nBut there is also mismanagement. As younger generations ditch rural lifestyles for urban centers, they are leaving behind uncontrolled plantations.\n\"[Eucalyptus growth] is happening both because of plantations, many of these plantations being illegal, but also because of land abandonment, because of forest fires, because of the invasive nature of the species. So it's a mix of all these that has led to this result.\"\nWhat the government did and did not do\nCritics accuse regional authorities of failing to control expansion for too long. Luisa Piñeiro, director general of forest management for the Galician government, told DW there had been failures in the past.\n\"Back then [in the 1990s], there probably wasn't adequate forest management. There wasn't as much control over the plantations or the species being planted,\" she said.\nNevertheless, the government does not classify eucalyptus as invasive, and Piñeiro rejects calls for blanket bans. She argues instead for improved management and greater species diversity.\n\"Rather than banning things, we should first have a forest management plan,\" she said. \"We believe forests should have the species diversity they're meant to have.\"\nGalicia starts to reckon with eucalyptus legacy\nLooking over his community's land in Froxán, about 40 kilometers west of Santiago de Compostela, Evans Pim recalls the wildfires that reshaped the surrounding hills.\n\"This is an area that was affected by a very large fire in 2006. All the woodlands around the village burnt down, and after that it became invaded with eucalyptus,\" he told DW.", "translation_ja": "世界の山火事を塗り替えるオーストラリアの木\n\n2026年7月8日　毎年40万人を超えるハイカーが、霧に包まれた丘と深い緑の森を横断するサンティアゴ・デ・コンポステーラの巡礼路「カミーノ・デ・サンティアゴ」を目指してガリシアに訪れる。しかし、そのルートを取り囲む森の多くは、もはや在来種のものではない。\n\n土着のオークやクリの木に代わり、スペイン北西部の広大な土地は今やユーカリに覆われている。\n\nこの変容はガリシアだけに限った話ではない。急速な成長と高い収益性からパルプ・木材産業に重宝されるこのオーストラリア原産の木は、ブラジル、チリ、カリフォルニア、インド、南アフリカといった地域に大規模な単一栽培農園として植えられてきた。\n\n世界全体では、ユーカリの農園は90カ国以上、2200万ヘクタールに広がっており、多くの地域で農村経済の重要な柱となっている。しかし、一見穏やかに見えるその樹冠の下には、科学者たちが「非常に燃えやすい」と見なすこの木が生み出す、極端な山火事に脆弱な景観が広がっている。\n\n欧州の熱波が警戒感を高める\n\n欧州では今夏すでに猛烈な暑さが続いており、例年より早い熱波が火災リスクをさらに高めるとの懸念が広がっている。欧州南部の一部は近日中にその影響を受けた。昨年は記録史上最悪の山火事の年となり、100万ヘクタール以上が焼失した――その多くはイベリア半島だった。\n\n研究者たちは、ユーカリの木が山火事の火元になるわけではないが、一度燃え始めると火勢を大幅に強める可能性があると指摘する。\n\n「ユーカリ林は、世界に存在する森林の中でも明らかに最も燃えやすい部類に入ります」と、ニュージーランドのリンカーン大学のティム・カランはDWに語った。\n\n「ユーカリを新しい環境に植えれば、私たちが『火災レジーム』と呼ぶものを大きく変えてしまう可能性が非常に高い。火災の強度や頻度、つまり火がどれほど激しく燃えるか、またどれほどの頻度で火災が発生するかということです」\n\nユーカリの葉には燃えやすい油分が含まれており、剥がれた樹皮は燃え飛ぶ火種になり得る。極端な条件下では、その火の粉が長距離を飛んで二次火災を引き起こすこともある。これはオーストラリアで2009年に起きた壊滅的な「ブラック・サタデー」火災でも起きた。\n\n「火前線から30キロメートル以上先に火の粉が飛んで新たな火災を起こした証拠がありました」とカランは述べ、これは例外的な出来事ではないと付け加えた。\n\nガリシアでは、在来種のオークやクリが成熟するのに80年以上かかるのに対し、ユーカリはわずか15年で成熟するため、農園はもともとの境界を容易に越えて広がっていく。その結果、火災で景観が破壊されてもユーカリは素早く回復し、在来種に対して競争上の優位性を持つ。\n\nこれが自己強化型のサイクルを生み出し、最終的には単一栽培農園がさらに拡大して山火事リスクを高めることになる。\n\nユーカリをめぐる賛否両論\n\nガリシアの農園は1970年代に遡るが、本格的に拡大したのは20年後のことだ。\n\n1992年、州政府はユーカリが2030年までに25万ヘクタールに達すると予測する林業計画を発表した。しかしその計画が更新されるまでに30年かかり、その間にユーカリは野放しで広がっていった。\n\n「現在は約50万ヘクタールに達しており、これは膨大な面積です」と、地域コミュニティのリーダーであるジョアム・エヴァンス・ピムは語った。\n\n州政府は新たなユーカリ農園に対するモラトリアム（一時停止措置）を導入したが、活動家たちは取り締まりが不均一で、違法な植林が今も続いていると指摘する。\n\nユーカリには経済的なメリットがある一方で、問題もある。主にパルプ・木材産業に供給するガリシアの農園は、2024年だけで1億6700万ユーロの収益を生み出した。\n\nしかし、管理の問題も存在する。若い世代が農村生活を離れて都市部へと移っていく中、管理されないまま放置された農園が増えている。\n\n「（ユーカリの拡大は）多くが違法な農園の存在と、土地の放棄、森林火災、そしてこの種の侵略的な性質によって引き起こされています。これらすべてが複合的に絡み合ってこの結果をもたらしているのです」\n\n政府が行ったこと、行わなかったこと\n\n批判派は、州当局があまりにも長い間、ユーカリの拡大を制御できなかったと非難している。ガリシア州政府の森林管理局長ルイサ・ピニェイロはDWの取材に対し、過去に失敗があったことを認めた。\n\n「当時（1990年代）は、おそらく適切な森林管理が行われていませんでした。農園や植えられる樹種に対するコントロールが十分ではありませんでした」と彼女は述べた。\n\nそれでも、州政府はユーカリを侵略的外来種として分類しておらず、ピニェイロは一律禁止の要求を退けている。彼女は代わりに、管理の改善と樹種の多様化を主張している。\n\n「禁止を行う前に、まず森林管理計画を持つべきです」と彼女は述べた。「森林は本来あるべき種の多様性を持つべきだと私たちは考えています」\n\nガリシア、ユーカリの遺産と向き合い始める\n\nサンティアゴ・デ・コンポステーラから西へ約40キロに位置するフロハンの地域を見渡しながら、エヴァンス・ピムは周囲の丘を一変させた山火事を振り返る。\n\n「この地域は2006年に大規模な火災に見舞われました。村周辺の森がすべて焼け落ち、その後ユーカリに侵食されていきました」と彼はDWに語った。", "vocab": [{"word": "monoculture", "definition": "単一の作物や植物だけを大規模に栽培する農業・林業の形態。生態系の多様性が失われやすく、病害や自然災害への脆弱性が高まるリスクがある。"}, {"word": "flammable", "definition": "引火しやすい、燃えやすいという意味の形容詞。素材や物質が容易に火がつく性質を持つことを表し、安全・環境分野で頻出する技術的な語。"}, {"word": "moratorium", "definition": "特定の活動や措置を一時的に停止・凍結すること。法律・政策文脈で使われることが多く、「新規農園へのモラトリアム」のように特定の行為を暫定的に禁じる措置を指す。"}, {"word": "invasive", "definition": "生態学では、本来の生息域以外の場所に持ち込まれ、在来種や生態系を脅かす種を「侵略的（invasive）」と表現する。政策や環境議論において重要な分類概念。"}, {"word": "self-reinforcing", "definition": "ある現象が繰り返されることでその原因をさらに強化する、自己強化的な性質を表す複合形容詞。悪循環（vicious cycle）を説明する際に使われる高度な表現。"}, {"word": "decimates", "definition": "動詞decimate の三人称単数形で、大部分を破壊・壊滅させることを意味する。もともとは「10分の1を殺す」という語源を持つが、現代英語では「甚大な被害を与える」という意味で広く用いられる。"}, {"word": "rampant", "definition": "制御不能なほど急激に広がっている状態を表す形容詞。植物の侵食、犯罪、疾病など、望ましくない事象が野放しになっている様子を強調する際に使われる。"}]}, {"title_ja": "クウェート、イランの報復攻撃で飛翔体15発を迎撃", "title_en": "Kuwait Intercepts 15 Projectiles in Iranian Retaliatory Attack", "summary_ja": "クウェート軍は夜明けに領空に侵入した弾道ミサイル2発とドローン13機を迎撃し、人的・物的被害は報告されていない。クウェート外務省はこの攻撃を「凶悪なイランの侵略」として強く非難した。迎撃時に生じた破片により一部の送電線が停止した。", "summary_en": "Kuwait's armed forces intercepted two ballistic missiles and 13 drones that entered its airspace at dawn, with no reported injuries or material damage. The Ministry of Foreign Affairs condemned the strikes as 'heinous Iranian aggressions.' Some power lines were disrupted by shrapnel from the interceptions.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/International/live-updates/iran-live-updates-thousands-throng-tehran-streets-khamenei/?id=134509610", "state_media": false, "category": "政治", "full_text": "Kuwait intercepts 15 projectiles amid 'heinous' Iranian retaliatory attacks\nAir defenses intercepted 15 projectiles in Kuwait's airspace this morning, a spokesperson for the Ministry of Defense said on Wednesday.\nKuwait's Armed Forces intercepted two ballistic missiles and 13 drones that entered Kuwait's air space at dawn, Major General Saud Abulazziz al-Otaibi said in a statement posted on social media.\nThe statement said there was no material damage or injuries. The Ministry of Electricity, Water and Renewable Energy announced some power lines were out of service because of shrapnel from the interceptions.\nKuwait's Ministry of Foreign Affairs issued statements condemning the attacks there and in Bahrain calling them \"heinous Iranian aggressions.\"\n-ABC News' Othon Leyva", "translation_ja": "クウェート、「凶悪な」イランの報復攻撃の中、飛翔体15発を迎撃\n\nクウェート国防省の報道官が水曜日に述べたところによると、今朝クウェートの領空で15発の飛翔体が迎撃された。\n\nクウェート軍は夜明けに領空に侵入した弾道ミサイル2発とドローン13機を迎撃した、とサウド・アブルアジズ・アル・オタイビ少将がソーシャルメディアに投稿した声明の中で述べた。\n\n声明によると、物的損害や負傷者は発生しなかった。電力・水・再生可能エネルギー省は、迎撃による破片のため一部の送電線が停止したと発表した。\n\nクウェート外務省はクウェートおよびバーレーンへの攻撃を非難する声明を発表し、それらを「凶悪なイランの侵略行為」と呼んだ。\n\n－ABCニュース、オトン・レイバ記者", "vocab": [{"word": "projectile", "definition": "飛翔体、発射物のこと。ミサイルや砲弾など、発射されて飛行する物体を指す軍事・技術用語。"}, {"word": "intercept", "definition": "（ミサイルや航空機などを）迎撃する、途中で遮断するという意味。軍事文脈では防衛システムが脅威を無力化する行為を指す。"}, {"word": "ballistic missile", "definition": "弾道ミサイルのこと。発射後に放物線軌道を描いて目標に到達する誘導ミサイルを指す軍事専門用語。"}, {"word": "shrapnel", "definition": "爆発や迎撃によって飛び散る金属の破片のこと。爆弾・砲弾・ミサイルなどが破裂した際に生じる危険な断片を指す。"}, {"word": "retaliatory", "definition": "報復の、仕返しのという意味の形容詞。相手の行動に対する対抗措置として行われる攻撃や行為を修飾する際に使われる。"}, {"word": "heinous", "definition": "極めて凶悪な、憎むべきという意味の形容詞。道徳的に非常に悪質な行為や犯罪を強く非難する際に用いられる。"}]}, {"title_ja": "ABCニュースライブ：24時間体制のニュース・生中継", "title_en": "ABC News Live: 24/7 Breaking News and Live Event Coverage", "summary_ja": "ABCニュースライブは、速報ニュースや生中継イベントを24時間365日配信するサービスです。国内外の主要ニュースをリアルタイムで伝え、最新情報を随時お届けします。視聴者はいつでもライブ報道や専門家による解説を視聴することができます。", "summary_en": "ABC News Live provides around-the-clock coverage of breaking news and live events as they unfold. The continuous stream delivers real-time updates on major national and international stories. Viewers can access live reporting and expert analysis at any time of day.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "トランプ・ゼレンスキー両大統領、トルコNATO首脳会議で会談へ――弾薬不足が緊急課題", "title_en": "Trump and Zelenskyy to Meet at NATO Summit in Turkey Amid Ammunition Crisis", "summary_ja": "ウクライナのゼレンスキー大統領は、アンカラで開催されるNATO首脳会議の傍らでトランプ大統領と会談し、パトリオットミサイル迎撃弾の補充を緊急に要請する見込みです。PAC-3ミサイルの世界的な深刻な不足により、ウクライナはロシアの弾道ミサイルや無人機攻撃に対して脆弱な状況に置かれています。和平への慎重な楽観論も漂う中、ロシアとの外交は依然として行き詰まっています。", "summary_en": "Ukrainian President Zelenskyy is set to meet President Trump on the sidelines of the NATO summit in Ankara, where he will urgently appeal for resupply of Patriot missile interceptors. A critical global shortage of PAC-3 missiles has left Ukraine vulnerable as Russia escalates attacks using ballistic missiles and drone swarms. The meeting comes amid cautious optimism about peace prospects, though diplomacy with Russia has largely stalled.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/Politics/trump-zelenskyy-set-meet-nato-summit-turkey/story?id=134561170", "state_media": false, "category": "政治", "full_text": "Trump and Zelenskyy set to meet at NATO summit in Turkey\nThe meeting comes as Ukraine faces an urgent ammunition shortfall.\nUkraine's President Volodymyr Zelenskyy is expected to make a direct appeal to President Donald Trump during a face-to-face meeting on the sidelines of the NATO summit, asking for help replenishing depleted stocks of American-made ammunition vital to the country's defense.\n\"We need to find a way to get as quick as possible, as much as possible, missiles for Patriot systems. This is the most important thing,\" Zelenskyy said at a defense industry forum at the alliance's annual summit on Tuesday.\nThe meeting between Trump and Zelenskyy in Ankara comes as expenditures of U.S. Patriot PAC-3 interceptor missiles in Ukraine and the Middle East have dramatically outpaced current production capabilities, resulting in a critical global shortage as the Russia-Ukraine war drags on.\nRussia has sought to exploit this shortfall by launching concentrated bombardments of ballistic missiles and drone swarms at Ukrainian targets, overwhelming the country's defenses and resulting in scores of civilian deaths.\nRussia's 'last major advantage'\nIn an address to members of the NATO alliance on Tuesday, Zelenskyy stressed the critical nature of the shortage and argued it was time for Europe to produce its own systems to counter Russian ballistic missiles, calling the rocket-powered missiles Moscow's \"last major advantage.\"\n\"We all value the Patriot system. It's an excellent system,\" he said. \"But today's wars have shown current Patriot production is not enough to meet the growing demand for protection against ballistic missiles. That is a fact.\"\nFor his part, Trump presented a rosier outlook -- asserting that an end to the conflict in Ukraine, which is now in its fifth year, could be on the horizon.\n\"I think we're getting much closer than people realize, and President Putin wants it to end,\" Trump said on Monday. \"And President Zelenskyy actually wants it to end now.\"\nTrump also downplayed the impact of the war in Ukraine on Tuesday, saying \"it doesn't affect us\" and depicting the conflict as a European issue. Trump had promised to end the war on Day 1 in office -- a pledge he later said was hyperbolic.\nTrump's comments come amid Russian escalation in recent days. On Monday, Russian strikes targeted Ukraine’s military-industrial complex and energy infrastr
