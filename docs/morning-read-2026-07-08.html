ucture in and around Kyiv, according to Russia's defense ministry.\nZelenskyy has been warning the Trump administration about the crucial depletion of interceptor missiles for several weeks. He is also pressing the U.S. to expedite a license that would allow Ukraine to manufacture Patriot batteries and interceptors domestically.\nA strained relationship\nThe bilateral meeting will test the strength of Trump and Zelenskyy's sometimes-rocky relationship at a time when Ukraine is facing new vulnerabilities on the battlefield and diplomacy with Russia has largely stalled.\nThe leader's first meeting of Trump's second term -- a February 2025 conversation in the Oval Office -- devolved into a shouting match after Trump expressed skepticism about Ukraine's position in the conflict and called for more gratitude from Zelenskyy for U.S. support.\nBut Trump appeared to grow more sympathetic to the Ukrainian cause over the past year as repeated efforts to bring Russian President Vladimir Putin to the negotiating table fell flat.\nA watershed moment came last July when, after repeatedly pausing military aid to Ukraine, Trump agreed to supply weapons to Ukraine if they were purchased from the U.S. by NATO allies.\nAnd there have been signs over the past month that Trump is reengaging in efforts to bring peace to Ukraine and once again eager to coordinate a deal between Zelenskyy and Putin.\nMost recently, Trump held calls with Zelenskyy and Putin over the weekend, as both leaders congratulated the president on the 250th anniversary of the United States' independence.\nIt's unclear how substantive the conversations were, though a Kremlin aide said that Trump spoke to Putin for 90 minutes and again offered to help end the war. Zelenskyy said he had \"a very good call\" with Trump and conveyed there was a \"real prospect\" for peace.\nTrump last met with Zelenskyy at the G7 summit in June, where he, at times, appeared friendly to Ukraine's cause -- describing Russia as the \"offensive\" party in the conflict and saying he was \"going to do whatever\" he could to strike a deal.\nFrench President Emmanuel Macron -- the host of the G7 summit -- said after the meeting that he was optimistic about Trump's support for Ukraine, claiming he observed \"a real change in comparison to recent months\" in his attitude.", "translation_ja": "トランプ・ゼレンスキー、トルコNATO首脳会議で会談へ\n\nウクライナはひっ迫した弾薬不足に直面する中、会談が行われる。\n\nウクライナのウォロディミル・ゼレンスキー大統領は、NATO首脳会議の傍らでドナルド・トランプ大統領と直接会談し、ウクライナの防衛に不可欠なアメリカ製弾薬の枯渇した在庫の補充について支援を求める見通しだ。\n\n「できるだけ早く、できるだけ多くのパトリオットシステム用ミサイルを調達する方法を見つけなければならない。これが最も重要なことだ」とゼレンスキー大統領は火曜日、同同盟の年次首脳会議で開かれた防衛産業フォーラムで述べた。\n\nアンカラでのトランプ・ゼレンスキー会談は、ウクライナおよび中東における米国製パトリオットPAC-3迎撃ミサイルの消費量が現在の生産能力を大幅に上回り、長引くロシア・ウクライナ戦争の中で世界的な深刻な不足をもたらしている状況下で行われる。\n\nロシアはこの不足を利用しようと、ウクライナの標的に対して弾道ミサイルの集中的な砲撃や無人機の大群を繰り返し投入し、同国の防空網を圧倒して多数の民間人死者を出している。\n\nロシアの「最後の大きな優位性」\n\nNATOの加盟国に対する演説でゼレンスキー大統領は火曜日、この不足の深刻さを強調し、ロシアの弾道ミサイルに対抗するため欧州が独自のシステムを生産すべき時が来たと主張し、ロケット推進式ミサイルをモスクワの「最後の大きな優位性」と表現した。\n\n「私たちは皆、パトリオットシステムを高く評価している。優れたシステムだ」と彼は言った。「しかし現在の戦争が示しているのは、弾道ミサイルに対する防衛の高まる需要を満たすには、現在のパトリオットの生産量では不十分だということだ。それは事実だ」\n\n一方トランプ大統領は、より楽観的な見通しを示し、現在5年目に入るウクライナ紛争の終結が近いと主張した。\n\n「状況は人々が思っている以上にずっと近づいていると思う。プーチン大統領は終わらせたがっており、ゼレンスキー大統領も今すぐ終わらせたいと思っている」とトランプ大統領は月曜日に述べた。\n\nまたトランプ大統領は火曜日、ウクライナ戦争の影響を軽視し、「我々には関係ない」と述べ、この紛争をヨーロッパの問題として描写した。トランプ大統領は就任初日に戦争を終わらせると約束していたが、後にそれは誇張だったと語っている。\n\nトランプ大統領のこうした発言は、ここ数日でロシアが激化させている攻勢の中で出た。月曜日にはロシアの防衛省によると、ロシア軍がキーウ周辺のウクライナの軍事産業施設とエネルギーインフラを標的に攻撃を行った。\n\nゼレンスキー大統領は数週間にわたり、迎撃ミサイルの重大な枯渇についてトランプ政権に警告してきた。また、ウクライナがパトリオットの砲台と迎撃弾を国内で製造できるようにするライセンスを米国が早期に発行するよう求めている。\n\n緊張をはらむ関係\n\n二国間会談は、ウクライナが戦場で新たな脆弱性に直面し、ロシアとの外交が大きく停滞する中、トランプとゼレンスキーの時に険悪になることもある関係の強さを試すことになる。\n\nトランプ大統領の2期目に入って最初の会談となった2025年2月の大統領執務室での会話は、トランプ大統領が紛争におけるウクライナの立場への懐疑的な見方を示し、ゼレンスキー大統領に米国の支援への感謝をもっと示すよう求めたことで口論に発展した。\n\nしかしトランプ大統領は、ウラジーミル・プーチン大統領を交渉の場に引き出そうとする繰り返しの試みが実を結ばない中で、過去1年でウクライナの立場に対してより共感的な姿勢を示すようになった。\n\n転換点となったのは昨年7月で、ウクライナへの軍事支援を繰り返し停止した後、トランプ大統領はNATO同盟国が米国から購入する形であればウクライナに武器を供給することに同意した。\n\nそして過去1か月の間に、トランプ大統領がウクライナに平和をもたらす取り組みに再び関与し、ゼレンスキーとプーチンの間で合意を調整することに再び意欲的であるという兆候が見られている。\n\n最近では、両首脳がアメリカ独立250周年をトランプ大統領に祝うため週末にそれぞれ電話会談を行った。\n\n会話がどの程度実質的なものだったかは不明だが、クレムリンの側近によれば、トランプ大統領はプーチン大統領と90分間話し、再び戦争終結の仲介を申し出たという。ゼレンスキー大統領はトランプ大統領との「非常に良い通話」が行われたと述べ、和平への「真の見通し」があると伝えた。\n\nトランプ大統領が最後にゼレンスキー大統領と会ったのは6月のG7首脳会議で、その場では時にウクライナの立場に友好的な態度を示し、ロシアを紛争の「攻撃的な」当事者と表現し、合意成立に向けて「できる限りのことをする」と述べた。\n\nG7首脳会議の開催国であるフランスのエマニュエル・マクロン大統領は会議後、トランプ大統領のウクライナ支持について楽観的だと述べ、彼の態度に「ここ数カ月と比べて本当の変化」を見て取ったと主張した。", "vocab": [{"word": "interceptor", "definition": "迎撃弾・迎撃機など、敵の攻撃を途中で阻止するために使用される兵器やシステムを指す軍事用語。本記事ではパトリオットミサイルの迎撃弾を指す。"}, {"word": "shortfall", "definition": "必要量や期待量に対する不足・欠如を意味する名詞。経済・軍事・財政などの文脈で広く使われる上級語彙。"}, {"word": "depleted", "definition": "資源や在庫などが大幅に消費・減少して枯渇した状態を表す形容詞。軍事・環境・医療など多様な文脈で用いられる。"}, {"word": "bombardment", "definition": "大量の爆弾・砲弾・ミサイルを継続的に浴びせる砲撃・爆撃を指す軍事用語。比喩的に「質問攻め」などの意味でも使われる。"}, {"word": "hyperbolic", "definition": "誇張した、大げさな表現や主張を形容する語。修辞法の「誇張法（hyperbole）」に由来し、政治・文学の文脈で頻出する上級語彙。"}, {"word": "watershed", "definition": "重大な転換点や局面の変わり目を意味する比喩的表現。本来は水の分水嶺を意味し、歴史・政治の文脈でよく使われる慣用表現。"}, {"word": "stalled", "definition": "交渉・進捗・エンジンなどが行き詰まり、停止した状態を表す動詞の過去形。外交や政治の文脈で「協議が暗礁に乗り上げた」という意味で頻繁に使用される。"}]}, {"title_ja": "キャットニップローションが蚊の忌避効果でディートと同等、研究が明らかに", "title_en": "Catnip lotion as effective as Deet at repelling mosquitoes, study finds", "summary_ja": "ウガンダで行われた研究により、キャットニップオイルで作ったローションが蚊の忌避効果においてディートと同等であることが判明した。この研究はフィレンツェで開催された学会で発表され、マラリアが蔓延する地域の農村コミュニティに安価で地元生産の代替品を提供することを目的としている。専門家たちは研究成果を歓迎しつつも、さらなる研究の必要性と、塗布型忌避剤には定期的な使用が必要であることを指摘した。", "summary_en": "A study conducted in Uganda found that a lotion made from catnip oil is just as effective as Deet at repelling mosquitoes. The research, presented at a conference in Florence, aims to provide an affordable, locally produced alternative to commercial repellents for rural communities in malaria-endemic regions. Experts welcomed the findings but called for further research and noted that topical repellents require consistent application to be effective.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/07/catnip-lotion-as-effective-as-deet-at-repelling-mosquitoes-study-finds", "state_media": false, "category": "社会", "full_text": "A homegrown catnip lotion has proven “just as effective as Deet” as a mosquito repellant in trials carried out in Uganda.\nCatnip, or Nepeta cataria, is a common herb from the mint family. The chemical in the plant that causes feline euphoria – nepetalactone – also has insect-repelling properties but this has not previously been commercialised.\nNew tools are vital in the fight against malaria, the disease spread by mosquitoes that infects about 282 million people a year and killed 610,000 in 2024 – the majority of them young children in African countries. There are concerns about rising resistance to insecticides, as well as the frontline drugs used to treat the disease.\nIn a study presented at the Society for Experimental Biology conference in Florence on Tuesday, a team working between Uganda and Wales found mosquitoes seeking a blood meal were less likely to land on people wearing lotions made from catnip.\nDr Simon Scofield, a senior lecturer at Cardiff University, said: “We found that a 6% catnip oil was just as effective as Deet, and the 2% catnip oil was only marginally less effective than that.\n“Deet is out of the price bracket for most rural Ugandan subsistence farmers, so buying commercially available mosquito repellents is just not practicable.\n“We wanted to make a repellent, which is highly efficacious, but also allows local people to be involved in the production cycle so that it costs a minimal amount of money,” he said.\nWhether or not local cats were more likely to follow lotion wearers was not part of the research, Scofield admitted. “We did not conduct any experiments to see if it is attractive to cats, but given that the active ingredient [nepetalactone] has well-known cat-attractive properties, I would expect they would quite like it,” he said.\nIn the first part of the evaluation, laboratory tests confirmed that catnip oil could be an effective insect repellent. Researchers then successfully tested the catnip repellent in the field in eastern Uganda by checking how many mosquitoes landed on volunteers’ legs over an evening.\nSome volunteers used Deet (the world’s most widely used and effective insect repellent), some used a lotion with 2% concentration of catnip, others a 6% catnip lotion, while others used placebo creams.\nThe research also established that the lotion could be made locally by a community enterprise. So far it has been distributed for free, using grant funding, but the next phase of the project will see production increased and the lotion sold to create a sustainable income for workers.\n“Once we know that we can sell and distribute the repellent at a low cost, that should generate a self-sustaining system where the money is flowing back to everybody at each stage in the development,” said Scofield.\nThe Deet (N,N-Diethyl-meta-toluamide) lotion used for comparison in the trial contains 15% Deet and is the most widely available in Uganda. Travellers from the UK visiting malaria-endemic regions are advised to use stronger repellents of at least 50% Deet.\nSwai Kyeba, a research entomologist from the Ifakara Health Institute in Tanzania who was not involved in the study, said: “New vector-control tools are necessary in the fight against malaria, especially those that are cheap and locally produced, to help improve accessibility.\n“However, a challenge with topical repellents is low compliance because they require regular application. This is why they remain a complementary tool in the fight against malaria.”\nHe urged further research on Ugandan households using currently available repellents before the catnip lotion production was scaled up.", "translation_ja": "地元で栽培されたキャットニップローションが、ウガンダで実施された試験において蚊よけ効果で「ディートと同等」であることが証明された。\n\nキャットニップ（学名：ネペタ・カタリア）はミント科の一般的なハーブである。この植物に含まれ、ネコに陶酔感をもたらす化学物質であるネペタラクトンには昆虫忌避特性もあるが、これまで商業化されてはいなかった。\n\n年間約2億8200万人が感染し、2024年には61万人が死亡した——その大多数はアフリカ諸国の幼い子どもたちであった——蚊によって媒介されるマラリアとの戦いにおいて、新たな対策ツールは不可欠である。殺虫剤に対する耐性の高まりや、治療に用いられる第一線の薬への耐性についても懸念が広がっている。\n\n火曜日にフィレンツェで開催された実験生物学会議で発表された研究で、ウガンダとウェールズの間で共同研究を行うチームは、キャットニップから作ったローションを塗った人には、吸血しようとする蚊が止まりにくいことを発見した。\n\nカーディフ大学の上級講師であるサイモン・スコフィールド博士は次のように述べた。「6%のキャットニップオイルはディートとまったく同等の効果があり、2%のキャットニップオイルもそれよりわずかに効果が低い程度であることがわかりました。」\n\n「ディートはウガンダの農村部の自給農家のほとんどにとって手が届かない価格であり、市販の蚊よけ製品を購入することは現実的ではありません。」\n\n「私たちは、非常に高い有効性を持ちながら、地元の人々が生産サイクルに関わることができ、最小限のコストで作れる忌避剤を開発したかったのです」と彼は語った。\n\nローションを塗った人のあとを地元のネコが追いかけやすくなるかどうかは研究対象ではなかったとスコフィールド氏は認めた。「有効成分（ネペタラクトン）にはネコを引き寄せる特性があることはよく知られているので、ネコはそれをかなり好むだろうと予想しますが、そのような実験は行いませんでした」と彼は述べた。\n\n評価の第一段階では、実験室での試験によりキャットニップオイルが有効な昆虫忌避剤となりうることが確認された。次に研究者たちは、ウガンダ東部でのフィールド試験において、ある夕方の間にボランティアの脚に止まる蚊の数を数えることで、キャットニップ忌避剤を実際の環境で検証し、成功を収めた。\n\n一部のボランティアはディート（世界で最も広く使用されている効果的な昆虫忌避剤）を使用し、別のボランティアは2%濃度のキャットニップ入りローション、また別のグループは6%のキャットニップローションを使用し、さらに別のグループはプラセボクリームを使用した。\n\nこの研究ではさらに、地域の社会的企業によってローションをローカルで製造できることも確認された。これまでは助成金を使って無料で配布されてきたが、次のフェーズでは生産を拡大し、ローションを販売することで労働者に持続的な収入をもたらすことを目指す。\n\n「低コストで忌避剤を販売・流通できることがわかれば、開発の各段階に関わるすべての人にお金が還流する、自立したシステムが生まれるはずです」とスコフィールド氏は語った。\n\n試験で比較に用いられたディート（N,N-ジエチル-メタ-トルアミド）ローションはディート15%含有で、ウガンダで最も広く流通しているものである。マラリア流行地域を訪れる英国からの旅行者には、少なくとも50%のディートを含むより強力な忌避剤の使用が推奨されている。\n\nタンザニアのイファカラ健康研究所の研究昆虫学者で、本研究には関与していないスワイ・キエバ氏はこう述べた。「新たなベクターコントロールツール、特に安価で地元生産されたものは、アクセスしやすさを高めるうえで、マラリアとの戦いにおいて必要不可欠です。」\n\n「しかし、塗布型忌避剤の課題は、定期的な塗り直しが必要なため使用率が低くなりがちな点です。このため、塗布型忌避剤はマラリアとの戦いにおける補完的なツールにとどまっています。」\n\n同氏はキャットニップローションの生産を拡大する前に、現在利用可能な忌避剤を使用しているウガンダの家庭を対象としたさらなる研究を求めた。", "vocab": [{"word": "nepetalactone", "definition": "ネペタラクトン。キャットニップに含まれる化学化合物で、ネコに陶酔感を与えるとともに昆虫忌避特性も持つ。専門的な化学・生物学用語として使われる。"}, {"word": "efficacious", "definition": "（薬や治療法などが）効果的な、有効な、という意味のフォーマルな形容詞。'effective'よりも格式ばった表現で、医学・科学的文脈でよく使われる。"}, {"word": "subsistence farmers", "definition": "自給農家。主に自分たちが生活するための食料を栽培し、余剰分をほとんど販売しない農民を指す表現。途上国の農業・経済に関する議論で頻出する。"}, {"word": "compliance", "definition": "（医療・規則などへの）遵守、順守。医学分野では患者が処方や治療法の指示に従う度合いを指し、公衆衛生の議論でよく使われる専門用語。"}, {"word": "vector-control", "definition": "ベクターコントロール（媒介生物対策）。蚊などの病気を媒介する生物を管理・駆除することで感染症の拡大を防ぐ手法を指す、疫学・公衆衛生分野の専門用語。"}, {"word": "commercialised", "definition": "商業化された、という意味の動詞commercialiseの過去分詞形。研究や発明が製品として市場に出回るようになることを指し、ビジネス・科学の文脈で使われる。"}, {"word": "topical", "definition": "（薬や製品が）皮膚などの体表面に直接塗布する、局所的な、という意味の医学・薬学用語。'topical repellent'は体に塗るタイプの忌避剤を指す。"}]}, {"title_ja": "マスクのDOGEによるUSAIDエボラ対策予算削減が彼の遺産を定義するか", "title_en": "Musk's DOGE Cuts to USAID Ebola Programs May Define His Legacy", "summary_ja": "イーロン・マスクがDOGEを通じてUSAIDを解体したことで、エボラ感染探知プログラムが「誤って」削減され、コンゴ民主共和国での感染拡大の一因となったとして改めて批判を受けている。ランセット誌の研究では、USAIDが完全廃止された場合、最大1400万人が死亡すると推計されている。元USAID高官らはマスクの行動が彼の歴史的評価を左右すると警告しつつも、被害の一部を回避する時間はまだ残されていると強調している。", "summary_en": "Elon Musk's dismantling of USAID through DOGE, including the accidental cutting of Ebola detection programs, has come under renewed scrutiny amid an ongoing outbreak in the Democratic Republic of the Congo. Experts estimate that millions of deaths could result from the foreign aid cuts, with a Lancet study projecting up to 14 million deaths if USAID were abolished entirely. Former USAID officials warn that Musk's actions will define his legacy, while stressing there is still a window to reverse some of the damage.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/technology/2026/jul/07/elon-musk-doge-cuts-usaid-ebola", "state_media": false, "category": "政治", "full_text": "Elon Musk has an Ebola problem. SpaceX stock dropped precipitously after its initial public offering, and Tesla faces a wave of lawsuits. But instead of focusing on his companies, Musk has posted frequently on X about the US Agency for International Development (USAID), which he helped dismantle – or, in his words, feed into the woodchipper – last year.\n“Elon’s USAID crash-out over the past week has been a thing to behold,” said Jeremy Konyndyk, a former top USAID official who oversaw the agency’s Ebola response in 2014-2015 and the president of Refugees International. “In a way, it’s helpful that Elon is doing this, because it’s putting attention back on the issue of what he did last year.”\nMusk has said his critics “cannot cite a single name of someone who died” and “If there were, it would be worldwide headline news!” When confronted with the names – including those of children who died because of the cuts – Musk called a journalist “an utter piece of shit and a liar” and “utterly evil”. Musk has claimed, without evidence, that US tax dollars went to arming militants and “corrupt politicians”.\nMusk’s cuts, through the short-lived US “department of government efficiency” (Doge), have come under renewed scrutiny during the Ebola outbreak in the Democratic Republic of the Congo (DRC). Last year, Musk admitted to “accidentally” cutting Ebola detection and response programs.\n“This is one of the reasons why there was not enough surveillance and preparedness for the outbreak of Ebola,” said Davide Rasella, a research professor at the Catalan Institution for Research and Advanced Studies and head of the Global Health Impact Assessment and Evaluation Group at the Barcelona Institute for Global Health (ISGlobal) in Spain.\nIf global health programs hadn’t been slashed in the DRC and elsewhere, the Ebola outbreak would have been detected much earlier, Konyndyk said. “I’m very confident about that,” he added.\nThe cuts have affected global health, nutrition and education around the world.\nOne Lancet study estimated there would be 14 million deaths, including 4.5 million child deaths, if USAID were abolished entirely. When Ro Khanna, a Democratic congressman from California, cited the study, Musk threatened to sue, and he doubled down on his claims that Doge did nothing wrong.\nRasella, one of the authors of the Lancet study, was unfamiliar with the Khanna-Musk conflict, but he stood by the estimates.\nMusk “uses science for launching rockets”, Rasella said. “When we speak about public health and global health, we use the same statistical mathematical tools that we use to launch rockets into space.”\nIt’s difficult to pinpoint exactly how many people will die as a result of these cuts, said Rasella.\n“But the important thing is the scale,” he said. There will probably be millions of deaths over the next several years, he added. “This is really unquestionable.”\nSome of these losses are already occurring.\n“People are absolutely dying. They’re dying in significant numbers in some places,” Konyndyk said.\nMusk’s demolition of USAID, and the resulting suffering and death, “is going to be a defining part of his legacy, and I do wonder if that’s why he’s scrambling so hard to rewrite that history now”, Konyndyk said.\nMusk took a model he used in his companies to “cut until people scream, and then when people scream, you’ve cut too far, and then you restore”, Konyndyk said. “That’s not how public funding works. Here the cost is literal human lives.”\nIf not for Musk, USAID would probably still exist, Konynydk said. Without him, and administrators like Pete Marocco, USAID would have taken “some huge hits”, but would have survived in some form, like other health and science agencies – “much diminished, much weaker, but still existing”, Konyndyk said.\n“His personal investment in that project gave it the reach all the way up to the White House,” he added.\nCongress could have stopped the dismantling of USAID – and it still could, Konyndyk said. USAID is required to exist by law, and what few aid programs still operate have been choked by the slow release of funding from the state department, he said.\nAfter the Covid pandemic caused about 20 million deaths around the globe, it was “absurd” to cut programs that would prevent and prepare for the next pandemic, Rasella said.\n“When you disrupt a single piece of that [aid], you can really create more and larger damage to the entire system,” Rasella said. “This is just the beginning.”\nBut that means there’s still time to act and avert some of the worst effects of ending foreign aid, Konyndyk said.\n“We have a window here to try and bring some of this back before the worst of the harms set in,” he said.", "translation_ja": "イーロン・マスクにはエボラ問題がある。スペースXの株式は新規公開後に急落し、テスラは訴訟の波に直面している。しかしマスクは自身の企業に注力する代わりに、昨年自ら解体に加担した——彼の言葉を借りれば「木材粉砕機に投げ込んだ」——米国国際開発庁（USAID）についてX上で頻繁に投稿し続けている。\n\n「先週のイーロンのUSAIDに関する一連の行動は、まさに見ものだった」と、2014〜2015年にUSAIDのエボラ対応を監督した元高官で、現在は難民インターナショナルの会長を務めるジェレミー・コニンダイク氏は語った。「ある意味、イーロンがこうしたことをしてくれるのは助かる。なぜなら、彼が昨年やったことに再び注目が集まるからだ。」\n\nマスクは批判者たちが「死亡した人物の名前を一人も挙げられない」と主張し、「もしいたなら、世界的な大ニュースになっているはずだ！」と述べている。しかし、予算削減によって亡くなった子どもたちの名前を含む事例を突きつけられると、マスクはあるジャーナリストを「まったくのクズで嘘つき」「完全に邪悪だ」と罵倒した。マスクはまた、証拠もなく米国の税金が武装勢力や「腐敗した政治家」への資金提供に使われていたと主張している。\n\n短命に終わった米国の「政府効率化省」（DOGE）を通じたマスクの予算削減は、コンゴ民主共和国（DRC）でのエボラ感染拡大を受けて改めて精査されている。昨年、マスクはエボラの検知・対応プログラムを「誤って」削減したことを認めていた。\n\n「これがエボラの感染拡大に対する監視体制と備えが不十分だった理由の一つだ」と、カタルーニャ高等研究院の研究教授で、スペインのバルセロナグローバルヘルス研究所（ISGlobal）のグローバルヘルス影響評価グループを率いるダヴィデ・ラセッラ氏は語った。\n\nDRCや他の地域でグローバルヘルスプログラムが削減されていなければ、エボラの感染拡大はもっと早期に検知されていただろうとコニンダイク氏は言う。「それについては非常に確信している」と彼は付け加えた。\n\nこれらの削減は世界各地のグローバルヘルス、栄養、教育に影響を与えている。\n\nランセット誌のある研究は、USAIDが完全に廃止された場合、450万人の子どもを含む1400万人が死亡すると推計した。カリフォルニア州選出の民主党下院議員ロ・カンナ氏がこの研究を引用すると、マスクは訴訟を示唆し、DOGEは何も悪いことをしていないという主張を改めて強調した。\n\nランセット研究の著者の一人であるラセッラ氏は、カンナとマスクの対立については知らなかったが、推計の正確さを支持した。\n\nマスクは「ロケットを打ち上げるために科学を使っている」とラセッラ氏は述べた。「公衆衛生やグローバルヘルスの話をするとき、私たちはロケットを宇宙に打ち上げるために使うのと同じ統計数学的ツールを使っている。」\n\nこれらの削減によって何人が死亡するかを正確に特定することは難しいとラセッラ氏は言う。\n\n「しかし重要なのはその規模だ」と彼は述べた。今後数年間でおそらく数百万人が死亡するだろうと彼は付け加えた。「これは本当に疑いの余地がない。」\n\nこうした損失のいくつかはすでに起きている。\n\n「人々は確実に死んでいる。一部の地域ではかなりの数の人が亡くなっている」とコニンダイク氏は語った。\n\nマスクによるUSAIDの解体と、それによってもたらされた苦しみと死は、「彼の遺産の定義的な部分になるだろう。だからこそ彼は今、その歴史を書き換えようと必死になっているのではないかと思う」とコニンダイク氏は述べた。\n\nマスクは自身の企業で用いてきたモデル、つまり「人々が悲鳴を上げるまで削減し、悲鳴が上がったら削りすぎたと判断し、それから回復させる」というアプローチを取ったとコニンダイク氏は言う。「しかし公的資金はそのようには機能しない。ここでのコストは文字通り人間の命だ。」\n\nマスクがいなければ、USAIDはおそらく今も存在していただろうとコニンダイク氏は述べた。彼やピート・マロッコのような行政担当者がいなければ、USAIDは「大きな打撃を受けていた」だろうが、他の保健・科学機関と同様に何らかの形で生き延びていた——「大幅に縮小され、大幅に弱体化されながらも、それでも存続していた」だろうとコニンダイク氏は言う。\n\n「彼がそのプロジェクトに個人的に投資したことで、ホワイトハウスまで直接届く影響力が生まれた」と彼は付け加えた。\n\n議会はUSAIDの解体を阻止できたはずだし、今でもできるとコニンダイク氏は述べた。USAIDは法律によって存在が義務付けられており、現在も運営されているわずかな援助プログラムは、国務省からの資金の遅い放出によって圧迫されていると彼は言う。\n\nCOVIDパンデミックが世界で約2000万人の死をもたらした後、次のパンデミックを予防・準備するためのプログラムを削減することは「ばかげている」とラセッラ氏は述べた。\n\n「援助の一部を断ち切ると、システム全体にさらに大きな、より深刻なダメージを与える可能性がある」とラセッラ氏は言う。「これはまだ始まりに過ぎない。」\n\nしかし、外国援助を終わらせることによる最悪の影響のいくつかを回避するための行動を起こす時間はまだあるとコニンダイク氏は述べた。\n\n「最悪の被害が本格化する前に、これらの一部を取り戻そうとする窓が、今ここにある」と彼は語った。", "vocab": [{"word": "precipitously", "definition": "「急激に、険しく」という意味の副詞。株価や数値が急速かつ大幅に下落する場合などに使われる。"}, {"word": "dismantle", "definition": "組織や構造物などを「解体する、分解する」という意味の動詞。制度や機関を段階的に廃止・破壊する文脈で使われる。"}, {"word": "scrutiny", "definition": "「精査、厳しい監視・調査」を意味する名詞。政策や人物の行動が詳細に検討・批判される場面でよく用いられる。"}, {"word": "surveillance", "definition": "「監視、サーベイランス」を意味する名詞。公衆衛生の文脈では感染症の動向を監視・追跡する体制を指す。"}, {"word": "avert", "definition": "危険や悪い結果を「回避する、防ぐ」という意味の動詞。事前に行動することで否定的な結果を未然に防ぐ際に使われる。"}, {"word": "pinpoint", "definition": "何かを「正確に特定する、ピンポイントで指摘する」という意味の動詞。曖昧さなく正確に原因や場所を特定する文脈で使われる。"}, {"word": "choked", "definition": "ここでは比喩的に「妨害される、締め付けられる」という意味で使われており、資金や流れが意図的に制限・滞らされる状況を表す。"}]}, {"title_ja": "調味料に偽装した200kg超のコカイン押収、リベリアで5人起訴", "title_en": "Five charged in Liberia after 200kg cocaine bust disguised as seasoning cubes", "summary_ja": "リベリア当局は、マギーの調味料キューブと虚偽申告された200kg超のコカイン（推定額約1,900万ドル）をモンロビア国際空港で押収し、5人を起訴した。容疑者特定の遅れが国会での紛糾や捜査への介入疑惑を招いた。今回の摘発は、西アフリカが南米と欧州を結ぶコカイン密輸の主要中継地となっている実態を改めて浮き彫りにした。", "summary_en": "Liberian authorities have charged five suspects following the seizure of over 200kg of cocaine, valued at $19 million, that was falsely declared as Maggi seasoning cubes at Monrovia's international airport. The case drew public outrage and a parliamentary row over delays in naming suspects, fueling speculation of high-level interference. The bust highlights West Africa's growing role as a transit hub for cocaine trafficking between South America and Europe.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/07/charged-liberia-200kg-cocaine-seized-drug-bust", "state_media": false, "category": "社会", "full_text": "Authorities in Liberia have charged five suspects over one of the largest drug seizures in the country’s history, after police found more than 200kg of cocaine falsely declared as Maggi seasoning cubes.\nThe shipment, with an estimated value of $19m (£14.2m), was discovered at the international airport in Monrovia on 8 June, but the suspects were not named until a press briefing at the weekend.\n“This was a serious transnational cocaine trafficking operation using Liberia’s aviation and logistics system as a channel for organised crime,” said Insp Gen Gregory Coleman late on Saturday. He added that his team had found evidence linking the shipment to a similar one processed in May.\nNews of the drug bust caused uproar in Liberia, and prompted President Joseph Boakai to order a combined investigation by the police and national anti-drug agency. “Liberia will not be used as a safe haven, transit point, warehouse, financial centre or operational base by criminal networks engaged in narcotics trafficking,” he said at the time.\nBut the delay in naming the suspects caused a row in parliament, where Coleman was summoned to a special senate hearing, and fed public speculation that the investigation was being tampered with to protect powerful Liberian citizens.\nOn Saturday, Coleman announced that his team had found evidence suggesting the complicity of the logistics company that handled the shipment. He then named the suspects who are being charged for the transportation, possession and illicit trafficking of controlled substances and criminal conspiracy.\nThe key suspect, the operations manager of the firm, is now in custody in Monrovia. Coleman said arrest warrants would be issued in collaboration with Interpol for the others who remain at large. Another suspect, believed to be attending an event in China at the time of the bust, has not been back to the country. Prosecutors also released the Dutch phone number of one UK-based suspect and his house address with a Birmingham postcode.\nThe bust has reinforced reports that west Africa, a region with porous land and sea borders, has become a major staging post for the movement of narcotics between South America and Europe.\nIn October 2022, authorities intercepted a shipping container at Monrovia seaport with 520kg of cocaine valued at $100m (£74.86m). One of the suspects named on Saturday was reportedly released from prison after being arrested in connection with another drug-related case in 2024.\nIn neighbouring Sierra Leone, one of Europe’s most wanted drug dealers has taken refuge since at least 2022 in the country’s capital, Freetown, and is in a serious relationship with the president’s daughter, a Guardian investigation showed in February 2025.\nIn May, Spanish police working with US and Dutch officials confiscated 45 tonnes of cocaine worth €812m (£694m) in what a Madrid court said was Europe’s largest-ever cocaine bust. Authorities said the Comoros-flagged cargo vessel, which was raided near the Canary Islands, had left Freetown with Libya as its official destination. Another drug shipment out of Freetown was also seized en route to Spain in February.", "translation_ja": "リベリア当局は、マギーの調味料キューブとして虚偽申告された200kg超のコカインを警察が発見した後、同国史上最大規模の薬物押収事件の一つをめぐり、5人の容疑者を起訴した。\n\n推定価格1,900万ドル（約1,420万ポンド）のこの貨物は、6月8日にモンロビアの国際空港で発見されたが、容疑者の名前は週末の記者会見まで公表されなかった。\n\n「これは、リベリアの航空・物流システムを組織犯罪の経路として利用した、深刻な国際的コカイン密輸作戦だった」と、グレゴリー・コールマン警察長官は土曜日の夜遅くに述べた。また、今回の貨物と5月に処理された類似の貨物とを結びつける証拠を発見したと付け加えた。\n\n今回の薬物押収のニュースはリベリア国内に大きな波紋を呼び、ジョセフ・ボアカイ大統領は警察と国家麻薬取締機関による合同捜査を命じた。「リベリアは、麻薬密輸に関与する犯罪ネットワークの安全地帯、中継地点、倉庫、資金拠点、または活動拠点として利用されることを断じて許さない」と、大統領はその際に述べた。\n\nしかし、容疑者の特定が遅れたことで議会に紛糾が生じ、コールマン長官は上院の特別公聴会に召喚された。また、権力を持つリベリア市民を守るために捜査が操作されているのではないかとの国民の憶測も広がった。\n\n土曜日、コールマン長官は、貨物を取り扱った物流会社の関与を示す証拠を発見したと発表した。そして、規制薬物の輸送・所持・不法密輸および共謀罪で起訴される容疑者の名前を公表した。\n\n主要容疑者である同社のオペレーション・マネージャーは現在モンロビアで拘留中だ。コールマン長官は、逃走中の他の容疑者については、インターポールと連携して逮捕状を発行すると述べた。押収発覚時に中国のイベントに参加していたとみられる別の容疑者は、その後帰国していない。また、検察当局は英国を拠点とする容疑者1人のオランダの電話番号と、バーミンガムの郵便番号を含む自宅住所を公開した。\n\n今回の押収事件は、陸と海の国境が管理の甘い西アフリカが、南米と欧州の間の麻薬移動における主要な中継地となっているという報告を裏付けるものとなった。\n\n2022年10月には、モンロビア港の輸送コンテナから、1億ドル（約7,486万ポンド）相当の520kgのコカインが押収されている。今回名前が挙がった容疑者の一人は、2024年に別の薬物関連事件で逮捕された後、釈放されていたと報じられている。\n\n隣国シエラレオネでは、欧州で最も指名手配された麻薬密売業者の一人が少なくとも2022年から首都フリータウンに潜伏しており、大統領の娘と交際していることが、ガーディアン紙の2025年2月の調査報道で明らかになっていた。\n\n5月には、スペイン警察が米国・オランダ当局と協力し、マドリードの裁判所が欧州史上最大のコカイン押収と認定した作戦で、8億1,200万ユーロ（約6億9,400万ポンド）相当の45トンのコカインを押収した。当局によると、カナリア諸島沖で臨検を受けたコモロ船籍の貨物船は、リビアを公式目的地としてフリータウンを出港していた。また、フリータウンから発送された別の薬物貨物も2月にスペインへの輸送途中で押収されている。", "vocab": [{"word": "transnational", "definition": "国境を越えて複数の国にまたがることを意味する形容詞。「transnational crime（国際犯罪）」のように、組織犯罪や企業活動の文脈でよく使われる。"}, {"word": "complicity", "definition": "犯罪や不正行為への共謀・関与を意味する名詞。法律や報道の文脈で「共犯関係」を指す際に用いられる。"}, {"word": "porous", "definition": "本来は「多孔質の」を意味するが、国境や制度に対して使う場合は「管理が甘い、抜け穴が多い」という意味になる比喩的表現。"}, {"word": "staging post", "definition": "主に中継地点や経由地を意味するイディオム表現。軍事・物流・犯罪報道などで、ある活動の拠点となる場所を指す際に使われる。"}, {"word": "illicit", "definition": "法律や規則によって禁止された、不法・非合法なことを意味する形容詞。「illicit trafficking（不法密輸）」のように法的文脈で頻出する。"}, {"word": "confiscated", "definition": "当局が違法な物品や財産を没収・押収することを意味する動詞の過去形。法執行や税関の文脈でよく用いられる。"}, {"word": "tampered with", "definition": "証拠や調査などを不正に操作・改ざんすることを意味するイディオム。「tamper with evidence（証拠を改ざんする）」のように法的・捜査的文脈で使われる。"}]}, {"title_ja": "米国とイランが相互攻撃、トランプ大統領が停戦「終了」を宣言", "title_en": "Trump declares ceasefire 'over' as US and Iran exchange military strikes", "summary_ja": "トランプ大統領はアンカラでのNATO首脳会議で、イランとの停戦が「終わった」と宣言し、イラン指導部を「クズ」「病んだ人々」と呼んだ。イランはホルモズガン州などへの米国の攻撃に対する報復として、バーレーンとクウェートの米軍基地85か所を攻撃したと主張した。この緊張激化により先月合意した停戦延長が崩壊の危機に瀕しているが、双方はまだ正式に交渉を放棄する意思を示していない。", "summary_en": "President Trump declared the ceasefire with Iran 'over' at a NATO summit in Ankara, calling Iranian leaders 'scum' and 'sick people' after a series of retaliatory strikes between the two nations. Iran claimed it struck 85 US military sites in Bahrain and Kuwait in response to US attacks on its Hormozgan province, while the US said it targeted over 80 Iranian sites following Iranian attacks on ships in the Strait of Hormuz. The escalation threatens last month's ceasefire extension agreement, though neither side has formally abandoned negotiations.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/8/trump-says-ceasefire-over-after-us-iran-trade-attacks?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "Trump says ceasefire ‘over’ after US, Iran trade attacks\nTrump made the announcement at a NATO summit after Iran attacked bases hosting US forces in Kuwait and Bahrain.\nUnited States President Donald Trump says the ceasefire with Iran is “over”, describing Iranian leaders as “sick people” after Iran and the US exchanged attacks.\n“I think it’s over. I don’t want to deal with them any more, they’re scum,” Trump said on Wednesday at a NATO summit in the Turkish capital Ankara, when asked if the ceasefire with Iran was over.\nRecommended Stories\nlist of 3 items- list 1 of 3Ships attacked in the Strait of Hormuz: What that means for ongoing talks\n- list 2 of 3US strikes southern Iran, Tehran claims counterattacks on military sites\n- list 3 of 3US strikes Iran despite promised pause for Khamenei funeral\n“They’re scum, they’re sick people, they’re led by sick people, and they’re vicious, violent people. And if they had a nuclear weapon, they’d use it.”\nTrump also said he would speak to his Middle East envoy Steve Witkoff and his son-in-law Jared Kushner, who have been leading US negotiations with the Iranians, but insisted it was up to Tehran to return to the table.\n“As far as I’m concerned, it’s just a waste of time dealing with them. They’re liars.”\nTrump’s comments came after Iran said it hit 85 US military sites in Bahrain and Kuwait in retaliation for US attacks on its Hormozgan province and the port city of Mahshahr.\nThe US said it launched “the powerful strikes” against more than 80 “targets” after Iranian attacks on three ships in the Strait of Hormuz, a vital waterway through which about 20 percent of the world’s traded oil passes.\nThe latest flare-up risks derailing last month’s agreement between the US and Iran to extend their ceasefire and enter into talks on ending the war, although neither country has immediately signalled their intention to abandon negotiations.\nIt comes after a promised pause in US attacks as Iran holds funeral processions for Iranian Supreme Leader Ayatollah Ali Khamenei, who was killed in joint US and Israeli strikes at the start of the war on February 28.", "translation_ja": "トランプ大統領、米国とイランが相互攻撃後に停戦「終了」と発言\n\nトランプ大統領は、イランがクウェートとバーレーンの米軍基地を攻撃した後、NATOサミットでこの発表を行った。\n\n米国のドナルド・トランプ大統領は水曜日、米国とイランが相互攻撃を行った後、イランとの停戦は「終わった」と述べ、イランの指導者たちを「病んだ人々」と表現した。\n\nトルコの首都アンカラで開催されているNATOサミットで、イランとの停戦が終わったかどうかを問われたトランプ大統領は、「終わったと思う。もはや彼らと交渉したくない。彼らはクズだ」と述べた。\n\n「彼らはクズだ。病んだ人々だ。病んだ人間たちに率いられている。そして彼らは凶暴で暴力的な人々だ。核兵器を持てば、必ず使うだろう」とトランプ大統領は続けた。\n\nトランプ大統領はまた、イランとの交渉を主導してきた中東特使のスティーブ・ウィトコフ氏と義理の息子のジャレッド・クシュナー氏と話し合うとしながらも、交渉の席に戻るかどうかはテヘラン次第だと主張した。\n\n「私にとって、彼らと交渉するのは時間の無駄だ。彼らは嘘つきだ」と述べた。\n\nトランプ大統領のこうした発言は、イランがホルモズガン州および港湾都市マフシャールへの米国の攻撃に対する報復として、バーレーンとクウェートの米軍基地85か所を攻撃したと発表した後に出たものだ。\n\n米国は、世界の取引石油の約20パーセントが通過する重要な水路であるホルムズ海峡での3隻の船舶へのイランの攻撃を受け、80か所以上の「標的」に対して「強力な攻撃」を行ったと発表した。\n\n今回の緊張の高まりにより、米国とイランが停戦を延長し戦争終結に向けた協議に入ることで合意した先月の合意が崩壊する恐れがあるが、両国は直ちに交渉を放棄する意向を示してはいない。\n\nこの事態は、イランが2月28日の開戦時に米国とイスラエルの合同攻撃で死亡したイランの最高指導者アリー・ハメネイー師の葬儀を執り行う間、米国が攻撃を一時停止すると約束した後に起きた。", "vocab": [{"word": "ceasefire", "definition": "停戦。交戦国間で戦闘行為を一時的または恒久的に停止する合意のこと。外交・軍事文脈で頻繁に使われる重要語。"}, {"word": "retaliation", "definition": "報復。相手の攻撃や行動に対して仕返しをする行為を指す。国際紛争や軍事行動の文脈でよく用いられる。"}, {"word": "derailing", "definition": "（計画・交渉などを）脱線させる・頓挫させること。本来は列車の脱線を意味するが、比喩的に物事を失敗・破綻させる意味で使われる慣用表現。"}, {"word": "envoy", "definition": "特使・外交使節。政府を代表して特定の外交任務を帯びて派遣される使節のことで、外交・政治文書に頻出する語。"}, {"word": "vital", "definition": "極めて重要な・不可欠な。単に「重要」というだけでなく、それなしでは成り立たないほど必要不可欠であることを強調する形容詞。"}, {"word": "flare-up", "definition": "（紛争・病気・感情などの）突然の再燃・悪化。一時的に収まっていた問題が急激に悪化する状況を表すイディオム的表現。"}, {"word": "signalled", "definition": "（意図・方針などを）示した・表明した。言葉や行動によって今後の方向性を暗示または明示することを指す、ビジネス・外交文書頻出の動詞。"}]}, {"title_ja": "ナイジェリアの対テロ成果が示す警告：再統合なき正義の危うさ", "title_en": "Nigeria's Counterterrorism Gains Carry a Warning on Reintegration", "summary_ja": "ナイジェリア軍は北東部でテロ組織の幹部らが大量投降したと発表し、2016年から2025年の間に30万人以上の戦闘員が投降したとされる。「セーフ・コリドー作戦」などの更生プログラムは成果を示しているが、被害者への十分な支援なしに元戦闘員を社会に再統合することで、深刻な不満が生まれるリスクがある。元戦闘員への優遇と被害者への軽視という格差が、将来的な不安定化につながる可能性があると専門家らは警告している。", "summary_en": "Nigeria's military has reported mass surrenders of terrorist commanders in the northeast, with over 300,000 fighters surrendering between 2016 and 2025 under programs like Operation Safe Corridor. While these figures suggest progress, analysts warn that reintegrating former fighters without adequately supporting victims risks deepening resentment. The disparity between rehabilitation support for ex-combatants and the neglect of displaced victims could fuel future instability.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/opinions/2026/7/8/nigerias-counterterrorism-gains-carry-a-warning?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "Nigeria’s counterterrorism gains carry a warning\nMass surrenders may weaken armed groups, but reintegration without justice risks fuelling resentment.\nNigeria’s military announced on June 29 that several senior commanders from terrorist groups had surrendered in the northeast. Captain Mohammed Goni, acting military information officer for Operation Hadin Kai (OPHK) against these groups, said the surrenders followed sustained military pressure and that those involved were being held in a secure location for profiling and debriefing.\nThe announcement brought renewed attention to Nigeria’s terrorism crisis, which has widened significantly since the Boko Haram uprising of July 2009. What was once a largely Boko Haram-led insurgency confined to a small geography has become a broader conflict involving multiple terrorist factions and other armed networks. Today, Boko Haram is no longer the only major threat; the landscape also includes the Islamic State West Africa Province (ISWAP), Ansaru, Mahmuda, Lakurawa, and many other, smaller groups involved in banditry, armed robbery and kidnapping.\nNigeria’s response has also evolved since 2009. Alongside military operations such as OPHK, the authorities have developed programmes to process, deradicalise, rehabilitate and reintegrate some of those who leave terrorist groups. Operation Safe Corridor (OPSC), established in 2016, was designed to support military operations by working with eligible, low-risk individuals associated with such groups. OPHK itself was launched in April 2021, replacing Operation Lafiya Dole (OPLD), while other efforts include joint task force operations in the northeast, Operation Desert Sanity and multinational initiatives such as Operation Lake Sanity.\nContinued defections from Boko Haram and ISWAP have strengthened the case made for OPSC. Its proponents argue that, alongside military pressure from OPHK, the programme offers a real opportunity to shift the dynamics of the conflict in the Lake Chad Basin. They also see it as reinforcing the Borno State government’s local, non-kinetic, community-driven approach, known as the “Borno Model”, and as a possible foundation for national reconciliation and transitional justice.\nOn June 12, during Nigeria’s 2026 Democracy Day celebrations, President Bola Ahmed Tinubu said that more than 124,000 fighters and dependants had entered the surrender process since he took office in 2023. Defence Headquarters has put total surrenders between 2016 and 2025 at more than 300,000, with 2,615 people said to have been successfully reintegrated into society after graduating from the OPSC programme.\nThe numbers do indicate success. They show that sustained military pressure, coupled with rehabilitation opportunities, is driving defections and generating intelligence that helps security forces accelerate operations and save lives.\nBut mass surrenders and reintegration, in their current form, could also be a socioeconomic time bomb.\nReintegrating former fighters into communities where many of their victims remain displaced poses serious moral risks. According to the Observatory for Religious Freedom in Africa, 79,323 people were killed and 34,773 abducted in terrorism-related violence across Nigeria between 2020 and 2025, while Nigeria’s internally displaced population reached 3.7 million.\nThis creates a stark contrast between the support offered to “repentant” or surrendered fighters and the conditions endured by their victims. OPSC and other government programmes provide former fighters with counselling, education, vocational training and, in some cases, tools or support intended to help them rebuild their lives after graduation. Many IDPs, by contrast, remain in camps or host communities where food, medical care, education and employment are severely limited.\nThe imbalance sends a dangerous message: that violence and terrorism can lead to rehabilitation and economic support, while victims are left to face poverty, displacement and neglect. It has also fuelled resistance in some affected communities, where reintegration is seen as giving former fighters a route back into society while victims remain without adequate acknowledgement, redress or support.\nOPSC officials reject the idea that the programme rewards those involved in terrorism. They say those who surrender are screened and profiled, and that the Ministry of Justice determines who is eligible for rehabilitation and who should face prosecution. But for many victims, the injustice remains stark: they see former fighters receiving support to rejoin society, while those harmed by the violence are left to grieve lost relatives, homes and livelihoods with little help or redress.\nThat grievance is made worse when former fighters return to the same communities as their victims. For IDPs and other survivors, living alongside people linked to groups responsible for murder, kidnapping and rape can reopen trauma and deepen fears about whether their “repentance” is genuine,", "translation_ja": "ナイジェリアの対テロ成果が示す警告\n\n大量投降は武装勢力を弱体化させうるが、正義なき再統合は憤りを煽るリスクがある。\n\nナイジェリア軍は6月29日、北東部においてテロ組織の複数の上級司令官が投降したと発表した。「オペレーション・ハディン・カイ（OPHK）」の臨時軍事広報担当官、モハメッド・ゴニ大尉は、今回の投降は継続的な軍事的圧力の結果であり、投降した者たちはプロファイリングと事情聴取のために安全な場所に収容されていると述べた。\n\nこの発表により、2009年7月のボコ・ハラム蜂起以来大きく拡大したナイジェリアのテロ危機が改めて注目を集めている。かつては限られた地域に封じ込められたボコ・ハラム主導の反乱であったものが、今では複数のテロ派閥やその他の武装ネットワークを巻き込む、より広範な紛争へと発展している。現在、ボコ・ハラムはもはや唯一の主要な脅威ではなく、イスラム国西アフリカ州（ISWAP）、アンサル、マフムダ、ラクラワ、そして強盗、武装強盗、誘拐に関与する多数の小規模グループも脅威として存在している。\n\nナイジェリアの対応も2009年以降に進化してきた。OPHKのような軍事作戦と並行して、当局はテロ組織を離脱した一部の人々を処理し、過激思想を払拭し、更生・再統合するためのプログラムを開発してきた。2016年に設立された「オペレーション・セーフ・コリドー（OPSC）」は、こうした組織に関与した低リスクの適格者を対象に軍事作戦を補完することを目的として設計された。OPHKそのものは2021年4月に「オペレーション・ラフィア・ドレ（OPLD）」に代わって発足し、北東部における合同任務部隊作戦、「オペレーション・デザート・サニティ」、「オペレーション・レイク・サニティ」などの多国間取り組みも含まれる。\n\nボコ・ハラムおよびISWAPからの継続的な離脱がOPSCの正当性を高めてきた。支持者たちは、OPHKによる軍事的圧力と組み合わせることで、このプログラムがチャド湖盆地における紛争の力学を変える真の機会を提供すると主張する。また、ボルノ州政府による「ボルノ・モデル」として知られる地域主導の非武力的・コミュニティ主体のアプローチを強化し、国民的和解と移行期正義の基盤になりうるとも見ている。\n\n6月12日、ナイジェリアの2026年民主主義記念日の式典で、ボラ・アフメッド・ティヌブ大統領は、2023年の就任以来、12万4,000人以上の戦闘員とその家族が投降プロセスに入ったと述べた。国防本部は2016年から2025年の間の投降総数を30万人以上と発表しており、OPSCプログラムを修了して社会への再統合に成功したとされる人数は2,615人とされている。\n\nこれらの数字は確かに成功を示している。持続的な軍事的圧力と更生機会の組み合わせが、離脱を促し、治安部隊が作戦を加速して命を救うための情報収集に貢献していることが分かる。\n\nしかし、大量投降と再統合は、現在の形のままでは社会経済的な時限爆弾になりうる。\n\n被害者の多くが今なお避難生活を余儀なくされているコミュニティへ元戦闘員を再統合することは、深刻な道義的リスクをはらんでいる。アフリカ宗教の自由観測所によれば、2020年から2025年にかけてナイジェリア全土でテロ関連の暴力により7万9,323人が殺害され、3万4,773人が誘拐された。ナイジェリアの国内避難民数は370万人に達している。\n\nこれは、「悔悛した」あるいは投降した元戦闘員に提供される支援と、被害者が耐えている状況との間の鮮明な対比を生み出している。OPSCなどの政府プログラムは、元戦闘員に対してカウンセリング、教育、職業訓練、および場合によっては卒業後の生活再建を支援するための道具や援助を提供している。一方、多くの国内避難民は食料、医療、教育、雇用が著しく制限されたキャンプや受け入れコミュニティで生活し続けている。\n\nこの不均衡は危険なメッセージを発している。暴力やテロが更生と経済的支援につながる一方、被害者は貧困、避難、放置に直面したままだというメッセージだ。また、一部の被災コミュニティでは、元戦闘員が社会復帰の道を与えられる一方、被害者は十分な承認、救済、支援もないまま取り残されているとして、再統合への抵抗感も生まれている。\n\nOPSC当局者は、このプログラムがテロに関与した者を優遇するという見方を否定している。投降した者はスクリーニングとプロファイリングを受けており、更生の対象となるか起訴されるべきかは司法省が判断すると説明している。しかし多くの被害者にとって、不公正は依然として明白だ。元戦闘員が社会復帰のための支援を受けている一方、暴力によって傷ついた人々が、失った家族や家、生計に対してほとんど支援も救済もなく悲しみ続けている現実がある。\n\nその不満は、元戦闘員が被害者と同じコミュニティに戻ってきた場合にさらに深まる。国内避難民やその他の生存者にとって、殺人、誘拐、強姦に関与したグループと結びつく人々と共に暮らすことは、トラウマを再び呼び起こし、彼らの「悔悛」が本物かどうかという不安を深めることになりうる。", "vocab": [{"word": "counterterrorism", "definition": "テロリズムに対抗するための政策・活動を指す複合語。軍事・情報・法執行などの手段を組み合わせた対テロ戦略全般に用いられる。"}, {"word": "reintegration", "definition": "元戦闘員や受刑者などを社会に再び受け入れ、通常の生活に戻すプロセスを指す。社会復帰・社会統合とも訳される専門用語。"}, {"word": "deradicalise", "definition": "過激な思想や信念を持つ人物の急進的な考えを和らげ、穏健な価値観へと導く取り組みを意味する動詞。テロ対策・更生プログラムの文脈で頻出する。"}, {"word": "transitional justice", "definition": "紛争や独裁体制後の社会において、過去の人権侵害に対処し和解を促進するための司法的・非司法的メカニズムの総称。国際法・平和構築の分野で使われる専門用語。"}, {"word": "internally displaced", "definition": "国際的な国境を越えることなく、自国内で住居を追われた人々を指す表現（略称：IDP）。難民との区別を示す国際人道支援の専門用語。"}, {"word": "insurgency", "definition": "政府や占領勢力に対する組織的な武装反乱・蜂起を指す名詞。ゲリラ戦術を用いた非正規戦争の文脈でよく使われる。"}, {"word": "kinetic", "definition": "軍事・安全保障の文脈で「武力行使を伴う」ことを意味する形容詞。「非動力的（non-kinetic）」は対話・外交・経済支援など武力を使わない手段を指す。"}]}, {"title_ja": "和平交渉中に米国とイランの攻撃が再開、中東の安定に暗雲", "title_en": "US-Iran Strikes Resume Amid Peace Talks, Threatening Middle East Stability", "summary_ja": "米国は水曜日早朝、ホルムズ海峡での商船へのイランによる攻撃への報復として、イラン国内の80以上の目標を攻撃した。この激化は和平交渉の最中に起きており、トランプ大統領はイランとの覚書は事実上「終わった」と宣言した。攻撃を受けて原油価格は6%急騰し、全面戦争再開への懸念から市場も混乱した。", "summary_en": "The United States launched strikes on over 80 targets in Iran early Wednesday, citing Iranian attacks on commercial vessels in the Strait of Hormuz. The escalation occurred while peace negotiations were ongoing, with President Trump declaring the memorandum of understanding with Iran effectively 'over.' The strikes triggered a 6% surge in oil prices and broader market turbulence as fears of renewed all-out war spread.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/8/why-have-us-iran-strikes-resumed-and-what-does-it-mean-for-peace-talks?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Why have US-Iran strikes resumed and what does it mean for peace?\nBoth sides have accused each other of violating the memorandum of understanding signed in June.\nThe United States launched dozens of strikes on Iran early on Wednesday in what it said was retaliation for Tehran’s attacks on commercial ships in the highly contested Strait of Hormuz, sparking widespread fears of the renewal of all-out war in the Middle East.\nAfter the US attacks, President Donald Trump told reporters at a NATO summit in Ankara, Turkiye, that he thinks the memorandum of understanding (MoU) with Iran is “over”. While he “might” allow peace talks to continue for now, he said, he believed they were a “waste of time”.\nRecommended Stories\nlist of 4 items- list 1 of 4US strikes southern Iran, Tehran claims counterattacks on military sites\n- list 2 of 4US strikes Iran despite promised pause for Khamenei funeral\n- list 3 of 4Oil surges as US strikes Iran, reversing return to pre-war prices\n- list 4 of 4How the US-Iran conflict is reshaping Africa’s geopolitical opportunities\nBrent crude rose 6 percent to $78 a barrel, while European stocks fell 1.6 percent, following his remarks. The dollar strengthened and government bond yields climbed, as investors weighed the risk of a renewed flare-up in inflation.\nThe escalatory strikes on Iran came as peace talks were ongoing between the two countries amid the days-long funeral of Iranian Supreme Leader Ayatollah Ali Khamenei, who was killed in the early minutes of the US-Israel war on Iran back in February. They represent the largest such attacks since April, when both sides initially agreed to ceasefire talks.\nIran’s Islamic Revolutionary Guard Corps (IRGC) said it had responded to the strikes by targeting US assets in neighbouring countries as sirens went off in Bahrain and Kuwait early on Wednesday. One of its members was killed by “enemy drones”, the IRGC said.\nBoth sides have blamed each other for breaking earlier agreements outlined in the MoU, which initiated a 60-day peace negotiation process three weeks ago. Wednesday marks the third time the US has launched major attacks on Iran while talks are ongoing, something Tehran has said has caused trust to break down.\nHere’s what we know:\nWhat has happened?\nThe US military’s Central Command (CENTCOM) said it had launched strikes on “over 80 targets” on Tuesday, early on Wednesday in local time, in Iran in response to the attacks on commercial vessels that were transiting the Strait of Hormuz hours before.\nOn Wednesday, US President Donald Trump told reporters in Ankara, Turkiye, where he is attending the NATO summit, “We attacked very powerfully last night, the very dangerous people from Iran.”\n“They’re sick, there’s something wrong with them,” he added.\nIran, CENTCOM said, had attacked three vessels: the Marshall Islands-flagged M/T Al Rekayyat, Saudi Arabia-flagged M/T Wedyan, and Liberian-flagged M/T Cyprus Prosperity, which are thought to have been sailing close to the coast of Oman.\nIran has directed all shipping to follow its map for a “safe route” through the strait, which takes ships much closer to its own coast and marks a section of Omani territorial waters as a “restricted zone”. Local television reported that the ships had ignored warnings to change direction from Iranian forces.\nIn response to the shots fired at tankers, CENTCOM said in a statement: “US forces struck Iranian air defence systems, command and control networks, coastal radar sites, anti-ship missile capabilities, and more than 60 Islamic Revolutionary Guard Corps small boats in and near the strait to degrade Iran’s ability to continue attacking international commerce flowing through the international trade corridor.”\nThe US also revoked a sanctions waiver on Iran in response to the strikes on tankers in the strait.\nCENTCOM also warned that more strikes were imminent if Iran continued to act “outside of agreements”. The MoU stipulates that Iran will allow free passage through the strait for at least 60 days while peace talks continue.\nHossein Royvaran, a Tehran-based analyst, told Al Jazeera on Tuesday that tankers may have been targeted because they strayed into an area where Iranian teams were performing mine-clearing operations.\n“The area near Oman is likely full of mines,” said Royvaran.\n“There is a possibility that these ships are headed in directions where Iranian teams in that area are clearing mines, and the ships’ movement might have threatened those teams.”\nThe strikes came hours before Trump departed for the NATO summit.\nWhich locations in Iran have been hit in strikes?\nIranian media reported several explosions in the southern port city of Sirik, where projectiles were said to have hit commercial and fishing piers. Several people were injured by shrapnel, but the number of casualties is not yet clear.\nStrikes were also reported on the strategically important Qeshm Island in the Strait of Hormuz and areas near the port city of Bandar Abbas, one of the ports ", "translation_ja": "米国とイランの攻撃が再開された理由と、和平への影響とは？\n\n双方は6月に署名された覚書（MoU）を互いが違反したと非難し合っている。\n\n米国は水曜日早朝、高度に争われるホルムズ海峡での商船へのテヘランの攻撃に対する報復として、イランへの数十回の攻撃を実施したと発表した。これにより、中東での全面戦争再開への広範な懸念が高まっている。\n\n米国の攻撃後、ドナルド・トランプ大統領はトルコのアンカラで開催されているNATOサミットで記者団に対し、イランとの覚書（MoU）は「終わった」と思うと述べた。また、和平交渉を今しばらく継続することを「許可するかもしれない」としながらも、「時間の無駄」と考えていると語った。\n\n北海原油（ブレント）は6%上昇して1バレル78ドルとなり、欧州株式市場は1.6%下落した。投資家がインフレ再燃のリスクを見極めようとする中、ドルは強含み、国債利回りも上昇した。\n\nイランへの激化する攻撃は、2月の米国・イスラエルとイランの戦争の開始直後に殺害されたイランの最高指導者アリー・ハメネイ師の数日にわたる葬儀の最中に、両国間の和平交渉が進行している中で行われた。これらの攻撃は、両側が当初停戦交渉に合意した4月以降で最大規模のものとなっている。\n\nイランのイスラム革命防衛隊（IRGC）は、攻撃に対して周辺国の米国資産を標的にしたと発表し、水曜日早朝にはバーレーンとクウェートでサイレンが鳴り響いた。またIRGCは、隊員1名が「敵のドローン」によって殺害されたと述べた。\n\n双方は、3週間前に60日間の和平交渉プロセスを開始したMoUで定められた合意事項を相手側が破ったとして非難し合っている。水曜日は、交渉継続中に米国がイランへの大規模攻撃を実施した3度目となり、イランはこれが信頼関係の崩壊を招いたと述べている。\n\n以下は現時点で判明していることである。\n\n何が起きたのか？\n\n米軍中央軍（CENTCOM）は、ホルムズ海峡を通過していた商船への攻撃への対応として、火曜日（現地時間水曜日早朝）にイラン国内の「80以上の目標」に攻撃を実施したと発表した。\n\n水曜日、NATOサミットに出席しているトルコのアンカラで、トランプ米大統領は記者団に「昨夜、イランの非常に危険な人物たちを非常に強力に攻撃した」と語った。\n\n「彼らは病んでいる、何かがおかしい」とも付け加えた。\n\nCENTCOMによれば、イランはマーシャル諸島船籍の「アル・レカイヤット」、サウジアラビア船籍の「ウェドヤン」、リベリア船籍の「キプロス・プロスペリティ」の3隻のタンカーを攻撃したとされ、これらはオマーン沿岸付近を航行していたと見られている。\n\nイランはすべての船舶に対し、自国海岸により近いルートを通り「安全な航路」のための独自の海図に従うよう指示しており、オマーンの領海の一部を「制限区域」として指定している。現地テレビによると、これらの船はイラン軍からの針路変更警告を無視していたという。\n\nタンカーへの砲撃への対応についてCENTCOMは声明の中で、「米軍はイランの防空システム、指揮統制ネットワーク、沿岸レーダー施設、対艦ミサイル能力、および国際貿易回廊を通じた国際商業へのイランの攻撃能力を低下させるため、海峡内外でイスラム革命防衛隊の小型ボート60隻以上を攻撃した」と述べた。\n\n米国はまた、海峡でのタンカー攻撃への対応として、イランへの制裁免除を撤回した。\n\nCENTCOMはさらに、イランが合意の「枠外」で行動し続ける場合、追加の攻撃が差し迫っていると警告した。MoUは、和平交渉が継続される少なくとも60日間、イランが海峡での自由通行を保障することを規定している。\n\nテヘランを拠点とするアナリスト、ホセイン・ロイバランは火曜日にアルジャジーラに対し、タンカーがイランの機雷除去作業が行われている区域に侵入したために標的にされた可能性があると述べた。\n\n「オマーン近海にはおそらく機雷が多数ある」とロイバランは語った。\n\n「これらの船がイランのチームが機雷除去を行っている方向へ向かっており、その動きがチームを脅かした可能性がある」と述べた。\n\nこれらの攻撃は、トランプ大統領がNATOサミットに向けて出発する数時間前に実施された。\n\nイランのどの地域が攻撃を受けたか？\n\nイランメディアは、南部の港湾都市シリクで複数の爆発が報告され、商業用および漁業用の桟橋が被弾したと伝えた。破片による負傷者が複数出ているが、死傷者数はまだ明らかになっていない。\n\nホルムズ海峡にある戦略的に重要なケシュム島や、主要港湾都市バンダル・アッバース付近でも攻撃が報告された。", "vocab": [{"word": "memorandum of understanding", "definition": "覚書（MoU）。二者間の合意内容を文書化した非拘束的または準拘束的な協定。外交・ビジネス交渉でよく使われる表現。"}, {"word": "escalatory", "definition": "段階的に激化させる、または緊張を高める性質を持つという意味の形容詞。外交・軍事文脈で紛争の拡大傾向を表す際に用いられる。"}, {"word": "sanctions waiver", "definition": "制裁免除。通常は禁止または制限されている経済制裁を特定の条件下で一時的に適用しないことを認める措置。"}, {"word": "imminent", "definition": "差し迫った、今にも起こりそうな、という意味の形容詞。特に危険や脅威がすぐ近くに迫っている状況を強調する際に使われる。"}, {"word": "stipulate", "definition": "（条件・条項として）明確に規定する・定めるという意味の動詞。契約書や協定の文脈で特定の義務や条件を指定する場合に用いられる。"}, {"word": "geopolitical", "definition": "地政学的な、という意味の形容詞。地理的条件が政治・国際関係・軍事戦略に与える影響を分析する際に使われる専門用語。"}, {"word": "revoke", "definition": "（許可・権利・法律などを）正式に取り消す・撤回するという意味の動詞。法律・外交文書において以前付与された権限や免除を無効にする行為を指す。"}]}, {"title_ja": "EASAが航空会社にイランおよびイラク上空の飛行回避を8月31日まで勧告", "title_en": "EASA warns airlines to avoid Iran and Iraq airspace through August 31", "summary_ja": "欧州連合航空安全機関（EASA）は2026年7月8日、地域の緊張の高まりとさらなる軍事行動の可能性を受け、航空会社にイランおよびイラクの領空での運航を避けるよう勧告した。この勧告は8月31日まで有効である。以前の勧告にはレバノンも含まれており、バーレーン、クウェート、イスラエル、ヨルダン、カタール、オマーン、UAE、サウジアラビアの上空を飛行する航空会社にも注意が促されている。", "summary_en": "The European Union Aviation Safety Agency (EASA) issued a bulletin on July 8, 2026, advising airlines to avoid operating in Iranian and Iraqi airspace amid escalating regional tensions. The advisory, valid until August 31, follows a previous bulletin that also covered Lebanon. Airlines flying over Bahrain, Kuwait, Israel, Jordan, Qatar, Oman, UAE, and Saudi Arabia have also been urged to exercise caution.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/european-union-aviation-agency-tells-operators-to-avoid-iran-iraq-airspace-until-august-31/article71197139.ece", "state_media": false, "category": "社会", "full_text": "The European Union Aviation Safety Agency (EASA) said on Wednesday (July 8, 2026) that airlines should not operate within the airspace of Iran and Iraq, amid ongoing tensions and the potential for further military action. The EASA said its bulletin for the airspaces of Iran and Iraq was valid until August 31.\nWest Asia War LIVE: Trump says Iran ceasefire ‘is over’\nThe agency’s previous bulletin, which expires on Wednesday (July 8, 2026), included Lebanon. It had also asked airlines to exercise caution when operating within the airspace of Bahrain, Kuwait, Israel, Jordan, Qatar, Oman, UAE and Saudi Arabia.\nPublished - July 08, 2026 03:57 pm IST", "translation_ja": "欧州連合航空安全機関（EASA）は水曜日（2026年7月8日）、継続する緊張情勢およびさらなる軍事行動の可能性を背景に、航空会社はイランおよびイラクの領空内での運航を行うべきではないと発表した。EASAは、イランおよびイラクの領空に関する同機関の情報提供文書（ブリテン）は8月31日まで有効であると述べた。\n\n西アジア戦争ライブ速報：トランプ氏、イランの停戦は「終わった」と発言\n\n水曜日（2026年7月8日）に期限を迎える同機関の以前のブリテンにはレバノンも含まれていた。また同機関は、バーレーン、クウェート、イスラエル、ヨルダン、カタール、オマーン、アラブ首長国連邦（UAE）、サウジアラビアの各国領空を飛行する航空会社に対しても、注意を払うよう求めていた。\n\n公開：2026年7月8日 午後3時57分（インド標準時）", "vocab": [{"word": "aviation", "definition": "航空に関すること全般を指す専門用語。「aviation safety（航空安全）」や「aviation authority（航空当局）」のように業界・規制の文脈で頻繁に使われる。"}, {"word": "bulletin", "definition": "公的機関や組織が発行する公式の情報提供文書や通知のこと。航空・医療・行政などの専門分野で、最新情報や警告を伝える際に使われる。"}, {"word": "airspace", "definition": "特定の国や地域の主権が及ぶ空域を指す航空用語。国際法や航空規制の文脈で用いられ、「airspace violation（領空侵犯）」などの表現でも使われる。"}, {"word": "ceasefire", "definition": "戦闘や軍事行動を一時的に停止することを指す外交・軍事用語。「ceasefire agreement（停戦合意）」のように紛争解決の文脈で使われる。"}, {"word": "escalating", "definition": "状況や問題が段階的に悪化・拡大していることを表す動詞「escalate」の進行形。特に緊張や紛争が深刻化する文脈でよく用いられる。"}, {"word": "operator", "definition": "ここでは航空機を運航する会社や個人（航空会社など）を指す業界用語。法律や規制文書では「運航者」を意味する技術的な用語として使われる。"}]}, {"title_ja": "インド、イスラエル・パレスチナ問題で二国家解決策を支持　インドネシアと防衛協定も締結", "title_en": "India Backs Two-State Solution for Israel-Palestine, Signs Defense Deals with Indonesia", "summary_ja": "2026年7月7日、ナレンドラ・モディ首相はジャカルタを公式訪問し、イスラエル・パレスチナ紛争に対する二国家解決策へのインドの支持を改めて表明した。モディ首相とインドネシアのプラボウォ・スビアント大統領は、ブラモス超音速巡航ミサイルおよびアストラMk-1空対空ミサイルの供給に関する防衛協定を含む14の協定・覚書の署名に立ち会った。また、モディ首相はインドネシアの最高勲章「ビンタン・アディプルナ」を授与された。", "summary_en": "Prime Minister Narendra Modi reaffirmed India's support for a two-state solution to the Israel-Palestine conflict during a state visit to Jakarta on July 7, 2026. Modi and Indonesian President Prabowo Subianto oversaw the signing of 14 agreements, including landmark defense deals for the supply of BrahMos supersonic cruise missiles and Astra Mk-1 air-to-air missiles to Indonesia. Modi was also honored with Indonesia's highest civilian award, the Bintang Adipurna.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/national/india-supports-two-state-solution-for-solving-israel-palestine-conflict-says-pm-modi/article71194955.ece", "state_media": false, "category": "経済", "full_text": "Prime Minister Narendra Modi on Tuesday (July 7, 2026) said that India and Indonesia are going to deepen cooperation on global issues and reiterated the importance of the two-state solution to end the Israel-Palestine conflict. Mr. Modi made the remark while delivering a statement before the press in Jakarta where he and Indonesian President Prabowo Subianto presided over the signing of multiple agreements including the ones that will allow India to deliver BrahMos supersonic cruise missile system and Astra Mk-1 beyond the visual-range air-to-air missiles to Indonesia.\n“In this period of global turbulence, India believes that the role of dialogue and diplomacy has become more important than ever before. On the issue of Palestine, we continue to support a two-state solution and the pursuit of lasting peace,” said the Prime Minister while focusing on commonalities between India and Indonesia in dealing with globally important issues.\nSynergy with ASEAN\nHighlighting the “special importance” of the ASEAN grouping, he said, “There is strong synergy in our respective outlooks on the Indo-Pacific”. A joint statement issued at the end of the official dialogue mentioned that Mr. Modi and Mr. Subianto expressed “deep concern” over the war in West Asia and “its global effects”. “They welcomed the memorandum of understanding signed on 17 June 2026,” mentioned the joint statement, while adding that “transit passage through the Strait of Hormuz” has to be in “accordance with international law including the provisions of UNCLOS”.\nIt further mentioned that the Indonesian President welcomed “India’s interest in partnering on the integrated development of the Sabang Port” which will include maritime industries, and “shore-based services supporting offshore energy activities in the Andaman Sea”.\n14 agreements signed\nThe two sides signed 14 agreements and MoUs including two on BrahMos missile system and air-to-air missiles. Both are ‘in-principle’ agreements that are aimed at procurement of these weapon systems by Indonesia. The overarching agreement for the procurement of Astra Mk-1 beyond-visual-range air-to-air missiles is for Indonesia’s fleet of Su-30 fighter aircraft. The number of missiles to be acquired will be determined during the contract negotiations, an official has said.\nIndonesian Defence Minister Sjafrie Sjamsoeddin had visited India in November 2025 for discussions on the BrahMos missile deal, paving the way for the agreements during Mr. Modi’s visit to Indonesia. Under the proposed arrangement, Bharat Dynamics Limited (BDL), which manufactures the Astra missile, will integrate the weapon system with the Indonesian Air Force’s Su-30 fighters.\nThe Astra Mk-1 is already in operational service with the Indian Air Force and is powered by a solid rocket motor, offering an engagement range of approximately 80-110 kilometres. The BrahMos missile, jointly developed by India’s Defence Research and Development Organisation (DRDO) and Russia’s NPO Mashinostroyenia, has a range of over 290 kilometres and travels at speeds of up to Mach 2.8.\nIndonesia bestowed the Prime Minister with its highest honour ‘Bintang Adipurna of the Republic of Indonesia’. Mr. Modi is the second Indian Prime Minister to receive this award. India’s first Prime Minister Jawaharlal Nehru received the same award posthumously on December 12, 1995. “It reflects the goodwill of the people of Indonesia and stands as a tribute to the historic and enduring bonds of friendship between India and Indonesia,” said Mr. Modi in his press statement expressing gratitude to Indonesian leadership and people for the gesture.\nPublished - July 07, 2026 11:09 pm IST", "translation_ja": "インドのナレンドラ・モディ首相は火曜日（2026年7月7日）、インドとインドネシアはグローバルな課題における協力を深化させると述べるとともに、イスラエル・パレスチナ紛争の解決に向けた二国家解決策の重要性を改めて強調した。モディ首相はジャカルタで報道陣を前に声明を発表した際にこの発言を行い、同席したインドネシアのプラボウォ・スビアント大統領とともに複数の協定署名式を主宰した。署名された協定には、インドがインドネシアにブラモス超音速巡航ミサイルシステムおよびアストラMk-1視程外空対空ミサイルを供与することを可能にするものも含まれている。\n\n「世界が激動するこの時期において、インドは対話と外交の役割がこれまで以上に重要になったと考えています。パレスチナ問題については、引き続き二国家解決策を支持し、永続的な平和の実現を追求してまいります」と、モディ首相は世界的に重要な課題への対応におけるインドとインドネシアの共通点を強調しながら述べた。\n\n■ASEANとの連携\n\nASEAN（東南アジア諸国連合）の「特別な重要性」を強調したモディ首相は、「インド太平洋に関する双方の見解には強い相乗効果がある」と述べた。公式会談終了後に発表された共同声明では、モディ首相とスビアント大統領が西アジアにおける戦争と「その世界的な影響」に「深刻な懸念」を表明したことが記された。また、共同声明は「2026年6月17日に署名された了解覚書を歓迎する」と記したうえで、「ホルムズ海峡における通過通航権」はUNCLOS（国連海洋法条約）の規定を含む「国際法に従って」行使されなければならないと付け加えた。\n\nさらに共同声明では、インドネシア大統領が「アンダマン海における沖合エネルギー活動を支援する海洋産業および陸上サービス」を含むサバン港の統合開発への「インドのパートナーシップへの関心を歓迎する」と表明したことが明記された。\n\n■14の協定を署名\n\n両国は、ブラモスミサイルシステムおよび空対空ミサイルに関する2件を含む14の協定・覚書を締結した。いずれも、インドネシアによるこれらの兵器システムの調達を目的とした「原則合意」である。アストラMk-1視程外空対空ミサイルの調達に関する包括的な合意は、インドネシアが保有するSu-30戦闘機への搭載を想定したものだ。取得するミサイルの数量は契約交渉の過程で決定される予定であると、関係者は述べた。\n\nインドネシアのシャフリエ・シャムソエッディン国防相は2025年11月にインドを訪問し、ブラモスミサイル取引に関する協議を行っており、これがモディ首相のインドネシア訪問中の合意締結への道を開いた。提案されている取り決めのもとでは、アストラミサイルを製造するバーラト・ダイナミクス・リミテッド（BDL）が、インドネシア空軍のSu-30戦闘機にこの兵器システムを統合することになる。\n\nアストラMk-1はすでにインド空軍で実戦運用されており、固体ロケットモーターを動力源として、約80〜110キロメートルの交戦射程を有する。ブラモスミサイルは、インドの防衛研究開発機構（DRDO）とロシアのNPOマシノストロイェニアが共同開発したもので、射程は290キロメートルを超え、最高速度はマッハ2.8に達する。\n\nインドネシアはモディ首相に同国最高の栄誉である「インドネシア共和国ビンタン・アディプルナ勲章」を授与した。モディ首相はこの賞を受賞した2人目のインド首相となる。インド初代首相ジャワハルラール・ネルーは1995年12月12日に同賞を追贈されている。「これはインドネシア国民の善意を反映するものであり、インドとインドネシアの歴史的で永続的な友好の絆への敬意の証です」と、モディ首相は報道声明の中でインドネシアの指導者と国民への感謝を表明しながら述べた。\n\n掲載日：2026年7月7日午後11時09分（インド標準時）", "vocab": [{"word": "reiterated", "definition": "「繰り返し強調した」を意味する動詞。すでに述べた主張や立場を改めて確認・強調する際に使われるフォーマルな表現。"}, {"word": "supersonic", "definition": "「超音速の」を意味する形容詞で、音速（マッハ1）を超える速度に関して使われる技術・軍事用語。"}, {"word": "synergy", "definition": "「相乗効果」を意味する名詞。複数の要素が組み合わさることで、個々の総和を超える効果が生まれることを指し、ビジネスや外交の文脈でよく用いられる。"}, {"word": "turbulence", "definition": "本来は「乱気流」を意味するが、比喩的に「混乱・動乱」を指す名詞として国際情勢や経済の文脈でも広く使われる。"}, {"word": "procurement", "definition": "「調達」を意味する名詞で、特に政府や軍が公式の手続きを経て物資・兵器・サービスを取得するプロセスを指す専門用語。"}, {"word": "posthumously", "definition": "「死後に」を意味する副詞。人の死後に賞や名誉が授与される場合などに用いられるフォーマルな表現。"}, {"word": "overarching", "definition": "「包括的な・全体を統括する」を意味する形容詞。個別の要素を包み込む上位の枠組みや合意を指す際に使われるフォーマルな語。"}]}, {"title_ja": "トランプ大統領、ホルムズ海峡での戦闘再燃を受けてイランとの停戦「終了」を宣言", "title_en": "Trump declares Iran ceasefire 'over' as Strait of Hormuz fighting escalates", "summary_ja": "米国のドナルド・トランプ大統領は2026年7月8日、イランがホルムズ海峡付近で3隻の船舶を攻撃したことを受け、イランとの停戦は「終了した」と宣言した。米軍はイランの80以上の標的に報復攻撃を行い、イランはクウェートとバーレーンの米軍施設を攻撃した。トランプ大統領の発言を受けて原油価格は5%急騰し、両国が先月締結した暫定的な了解覚書は崩壊の危機に瀕している。", "summary_en": "U.S. President Donald Trump declared the ceasefire with Iran 'over' on July 8, 2026, following Iranian attacks on three ships near the Strait of Hormuz and extensive U.S. retaliatory strikes on over 80 Iranian targets. Iran responded by striking U.S. military facilities in Kuwait and Bahrain, while oil prices surged 5% on Trump's remarks. The breakdown places severe strain on an interim memorandum of understanding reached between Washington and Tehran the previous month.", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/trump-says-iran-ceasefire-over-after-fighting-flares/article71197341.ece", "state_media": false, "category": "社会", "full_text": "U.S. President Donald Trump said the ceasefire with Iran was “over” on Wednesday (July 8, 2026), after fighting flared between the countries sparked by Iranian attacks on ships in the vital Strait of Hormuz.\nThe strategic shipping route remains a flashpoint in the conflict, which began in late February with massive U.S.-Israeli strikes on Iran.\nAlso Read: West Asia war LIVE updates\nTehran insists on controlling the waterway, saying it will charge fees for passage and threatening to hit vessels that deviate from its authorised route.\nIts military has struck at least three ships in recent days, which prompted extensive U.S. strikes against Iranian targets on Tuesday (July 7, 2026), followed by retaliatory attacks from Iran on Gulf countries.\n“As far as I’m concerned, it’s over,” Mr. Trump said at a NATO summit in Türkiye on Wednesday (July 8, 2026) when asked if the truce was intact, saying “It’s just a waste of time dealing with them”.\n“I’ll let our wonderful negotiators keep talking if they want, but I don’t see it. I don’t like these people,” he said.\nOil prices jumped 5% after Mr. Trump’s remarks.\nBoth sides reported hitting dozens of targets, placing fresh strain on an interim deal to end their war and pushing oil prices to their highest level in two weeks.\nIranian state media on Wednesday (July 8, 2026) reported a wave of explosions around the strait, including six on the island of Qeshm, seven in the city of Sirik and more in the major port city of Bandar Abbas.\nIt later also reported a series of blasts in the port city of Bushehr, which hosts the country’s only civilian nuclear power plant and lies near Kharg Island, the main oil terminal through which 90% of the nation’s crude exports transit.\nState media said a member of the military’s Revolutionary Guards was killed in Iran’s southwest.\nU.S. Central Command (CENTCOM) said its forces had struck over 80 targets, including Iranian air defence systems, coastal radar sites and 60 IRGC small boats.\nThe strikes aimed “to degrade Iran’s ability to continue attacking international commerce flowing through the international trade corridor”, it said.\nTehran’s reply came quickly, with the Guards saying they hit dozens of U.S. military facilities in Kuwait and Bahrain, where an AFP journalist heard blasts.\nEarly on Wednesday (July 8, 2026), Bahrain’s interior ministry and the Kuwaiti army both reported their air defence systems were triggered but did not offer details of any possible damage.\nIran’s chief negotiator Mohammad Bagher Ghalibaf accused the United States of “major” breaches of their memorandum of understanding, including by reinstating oil sanctions and “violating Iranian adjustments in the strait”.\nWashington revoked sanction waivers on Iranian oil sales, raising pressure on Tehran as it negotiates over a final settlement to the conflict.\nThe U.S. Treasury Department cancelled a licence announced in June that had allowed Iran to produce, sell and deliver crude oil and related products through August 21.\n“Iran’s actions in the Strait were wholly unacceptable to the United States and will be met with consequences,” a U.S. official told AFP.\nThe official, speaking on condition of anonymity, said the U.S.-Iran memorandum of understanding was “entirely performance-based”, warning that Tehran would see benefits only if it showed “good behaviour”.\nHormuz attacks\nBritish maritime security agency UKMTO said on Tuesday (July 7, 2026) an “unknown projectile” hit a tanker near Hormuz, causing a fire, before two more vessels were struck, at least one by a drone.\nCENTCOM identified the ships as the Marshall Islands-flagged Al Rekayyat, the Saudi Arabia-flagged Wedyan and the Liberia-flagged Cyprus Prosperity.\nAll three vessels were struck close to Oman, which had proposed a temporary transit corridor hugging its coastline -- an initiative opposed by Iran as it seeks to impose fees on ships using the narrow waterway.\nThe Al-Rekayyat is Qatari, and Doha denounced the “unacceptable” attack on international maritime navigation and summoned Iran’s deputy ambassador to lodge a complaint.\nIran voiced “dismay” over Qatar’s accusations in a statement carried by state news agency IRNA, calling the claims “unacceptable”.\n“We are now in a sensitive period where potential alternatives to an Iranian toll or fee system are being explored,” Andreas Krieg, a security expert at King’s College London, told AFP.\n“Iran is sending a clear signal that no alternative will be accepted.”\nMaritime traffic had tentatively resumed after Washington and Tehran signed the memorandum last month, but Iran has insisted there will be no return to pre-war arrangements, under which vessels could pass freely through the strait.\nUnder the 14-point U.S.-Iran memorandum, Iran and Oman, which border Hormuz, must hold talks “to define the future administration and maritime services” in the waterway with other Gulf states.\nPublished - July 08, 2026 02:45 pm IST", "translation_ja": "米国のドナルド・トランプ大統領は水曜日（2026年7月8日）、イランがホルムズ海峡という重要な航路で船舶への攻撃を行ったことで戦闘が再燃したとして、イランとの停戦は「終了した」と述べた。\n\nこの戦略的な海上輸送路は紛争における引き続きの緊張地点となっており、紛争は2月下旬の米国・イスラエルによるイランへの大規模攻撃で始まった。\n\nまた読む：西アジアの戦争 LIVE最新情報\n\nテヘランはこの水路の管理権を主張し、通過に対して料金を徴収するとし、承認されたルートから逸脱する船舶を攻撃すると脅している。\n\nイランの軍は直近数日間で少なくとも3隻の船舶を攻撃しており、これを受けて米国は火曜日（2026年7月7日）にイランの標的に大規模な攻撃を実施し、その後イランが湾岸諸国に報復攻撃を行った。\n\nトランプ氏は水曜日（2026年7月8日）にトルコで開催されたNATOサミットで、停戦が維持されているかどうか問われた際、「私の見解では、もう終わりだ」と述べ、「彼らと交渉するのは時間の無駄だ」と語った。\n\n「望むなら優秀な交渉担当者に引き続き協議させるが、私には見込みがない。あの人たちが嫌いだ」と彼は述べた。\n\nトランプ氏の発言を受けて、原油価格は5%上昇した。\n\n双方は数十の標的を攻撃したと報告しており、戦争を終結させるための暫定合意に新たな圧力をかけ、原油価格を2週間ぶりの高値に押し上げた。\n\nイランの国営メディアは水曜日（2026年7月8日）、クェシュム島での6回、シーリク市での7回を含む海峡周辺での一連の爆発を報じた。また、国内唯一の民間原子力発電所が立地し、国の原油輸出の90%が通過するハルク島の主要石油ターミナルに近いブーシェフル港湾都市でも爆発が相次いだと後に報じた。\n\n国営メディアによると、革命防衛隊のメンバー1人がイラン南西部で死亡した。\n\n米中央軍（CENTCOM）は、イランの防空システム、沿岸レーダー基地、革命防衛隊の小型ボート60隻を含む80以上の標的を攻撃したと発表した。\n\n攻撃は「国際貿易回廊を流れる国際通商への攻撃を続けるイランの能力を低下させること」を目的としていたとCENTCOMは述べた。\n\nテヘランの反撃は素早く、革命防衛隊はクウェートとバーレーンの米軍施設数十か所を攻撃したと発表した。バーレーンでは、AFP通信の記者が爆発音を聞いた。\n\n水曜日（2026年7月8日）早朝、バーレーン内務省とクウェート軍はともに防空システムが作動したと報告したが、被害の詳細は明かさなかった。\n\nイランの首席交渉担当者モハンマド・バゲル・ガリバフ氏は、石油制裁の再開や「海峡におけるイランの調整措置の侵害」など、米国が了解覚書を「重大に」違反したと非難した。\n\nワシントンはイランへの石油販売に対する制裁免除を撤回し、最終的な紛争解決の交渉中にテヘランへの圧力を強めた。\n\n米財務省は、イランが8月21日まで原油および関連製品を生産・販売・納入することを認めていた6月に発表されたライセンスを取り消した。\n\n「海峡におけるイランの行動は米国にとって全く容認できないものであり、相応の結果をもたらすことになる」と米国当局者はAFPに語った。\n\n匿名を条件に語ったこの当局者は、米国・イラン間の了解覚書は「完全に実績に基づくもの」であるとし、テヘランが「良好な行動」を示した場合にのみ恩恵を受けられると警告した。\n\nホルムズ攻撃\n\n英国の海上保安機関UKMTOは火曜日（2026年7月7日）、ホルムズ付近でタンカーに「正体不明の飛翔体」が命中して火災が発生し、その後さらに2隻の船舶が攻撃されたと発表し、少なくとも1隻はドローンによる攻撃だったとした。\n\nCENTCOMは攻撃を受けた船舶を、マーシャル諸島籍の「アル・レカーヤト」、サウジアラビア籍の「ウェディアン」、リベリア籍の「キプロス・プロスペリティ」と特定した。\n\n3隻はいずれもオマーン近海で攻撃された。オマーンは同国の海岸線に沿った一時的な通過回廊を提案していたが、イランはこれに反対し、狭い水路を使用する船舶に料金を課そうとしている。\n\n「アル・レカーヤト」はカタール籍であり、カタールは国際海上航行への「容認できない」攻撃を非難し、イランの副大使を召喚して抗議した。\n\nイランは国営通信IRNAが伝えた声明の中で、カタールの非難に「失望」を表明し、その主張は「容認できない」と述べた。\n\n「現在、イランの通行料・料金制度に代わる潜在的な代替案が模索されている微妙な時期にある」と、ロンドン大学キングス・カレッジの安全保障専門家アンドレアス・クリーグ氏はAFPに語った。\n\n「イランはいかなる代替案も受け入れないという明確なシグナルを送っている。」\n\nワシントンとテヘランが先月了解覚書に署名した後、海上交通は暫定的に再開していたが、イランは船舶が海峡を自由に通過できた戦前の取り決めには戻らないと主張している。\n\n14項目からなる米国・イラン間の了解覚書の下、ホルムズに面するイランとオマーンは、他の湾岸諸国とともに水路の「将来の管理と海上サービスを定める」ための協議を行わなければならない。\n\n掲載日：2026年7月8日 午後2時45分（インド標準時）", "vocab": [{"word": "ceasefire", "definition": "停戦。交戦する双方が戦闘行為を一時的に停止することに合意した状態を指す。外交・軍事報道で頻出する専門用語。"}, {"word": "flashpoint", "definition": "紛争や暴力が突発しやすい危険な場所や状況を指す比喩的表現。「引火点」とも訳され、地政学的な緊張地域を表す際によく使われる。"}, {"word": "retaliatory", "definition": "報復的な、仕返しとしての、という意味の形容詞。retaliate（報復する）の派生語で、軍事・外交文脈で攻撃への応酬を表す際に使われる。"}, {"word": "memorandum of understanding", "definition": "了解覚書（MOU）。法的拘束力を持たないことも多いが、当事者間の合意内容や今後の協力関係を文書化した取り決めを指す外交・法務用語。"}, {"word": "sanction waivers", "definition": "制裁免除。特定の国や企業に対して課された経済制裁の適用を一時的に免除する措置のこと。国際制裁の文脈で頻繁に登場する専門表現。"}, {"word": "degrade", "definition": "軍事的文脈では、敵の能力・機能・戦力を低下・損耗させることを指す。日常的な「質を下げる」という意味とは異なる専門的用法。"}, {"word": "interim", "definition": "暫定的な、一時的な、という意味の形容詞・名詞。最終的な合意や解決策が確定するまでの間に適用される措置や取り決めを表す。"}]}, {"title_ja": "世界で最も幸福な都市2026：英国バースが1位、ジャイプールが6位に輝く", "title_en": "World's Happiest Cities 2026: Bath Tops Rankings, Jaipur Reaches No. 6", "summary_ja": "タイムアウト誌が2026年版「世界で最も幸福な都市」ランキングを発表し、世界中の24,000人以上を対象に文化やコミュニティ、日常の喜びなどの要素を調査した。英国のバースが回答者の93%以上から支持を受けトップに立ち、インドのジャイプールはトップ10内の6位という輝かしい成績を収めた。", "summary_en": "TimeOut released its 2026 list of the world's happiest cities, surveying over 24,000 people globally on factors like culture, community, and daily joy. Bath, England, claimed the top spot with over 93% of respondents saying the city makes them happy. India's Jaipur earned an impressive sixth-place ranking among the top ten.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/trending/top-10-listing/top-10-happiest-cities-in-the-world-2026-english-city-tops-rankings-jaipur-shines-at-no-6-10777189/", "state_media": false, "category": "社会", "full_text": "Top 10 happiest cities in the world 2026: TimeOut recently shared its list of the happiest cities in the world for 2026. Many different things were looked at for this big survey, including each city’s culture, its parks and green spaces, its friendly neighbourhoods, and its fun streets.\nIn total, more than 24,000 people from around the world took part in this huge annual survey. Along with grading things like the local food, art, and nightlife, the residents in these cities were asked to rate how strong the sense of community is, how easy it is to find love, and whether living in that city actually makes them feel happy.\nTo rank the world’s happiest cities, TimeOut asked locals to respond to statements like: ‘My city makes me happy’, ‘I feel happier in my city than in other places I’ve lived or visited’, ‘The people in my city seem positive’, ‘I find joy in the everyday experiences my city offers’ and ‘The sense of happiness in my city has grown a lot recently.’\nThe data was later crunched to find out the percentage of the highest positive responses. The highest ranked city for each country was included in the final 20.\nOne Indian city actually made it to the top 10 list. Jaipur, the capital city of Rajasthan actually made it to the top 10. It was positioned at No. 6.\nBath, the English city famous for it Roman-built baths was positioned at the first place. Over 93% of the respondents of the survey agreed that the city makes them happy. 83% of locals in Bath said that finding community was easy in the city.", "translation_ja": "世界で最も幸福な都市トップ10（2026年版）：タイムアウト誌が2026年の世界で最も幸福な都市リストを発表した。この大規模な調査では、各都市の文化、公園や緑地、親しみやすい近隣環境、そして活気ある通りなど、さまざまな要素が評価対象となった。\n\nこの年次調査には世界中から24,000人以上が参加した。地元の食事、芸術、ナイトライフなどを評価するとともに、居住者たちはコミュニティの絆の強さ、恋愛のしやすさ、そしてその都市に住むことで本当に幸福を感じるかどうかについても回答を求められた。\n\n世界で最も幸福な都市をランキングするにあたり、タイムアウト誌は地元住民に次のような設問への回答を求めた。「私の都市は私を幸せにしてくれる」「私は以前住んだり訪れたりした他の場所よりも、今の都市でより幸福を感じる」「私の都市の人々はポジティブに見える」「私は都市が提供する日常の体験の中に喜びを見出している」「私の都市における幸福感は最近大きく高まっている」。\n\nその後、データが集計され、最も高い肯定的な回答の割合が算出された。各国で最も高くランクされた都市が最終的なトップ20に選ばれた。\n\nインドの都市が実際にトップ10リスト入りを果たした。ラジャスタン州の州都であるジャイプールがトップ10に選ばれ、6位に位置付けられた。\n\nローマ時代に建設された浴場で有名な英国の都市バースが1位に輝いた。調査回答者の93%以上が、この都市が自分たちを幸せにしてくれると答えた。また、バースの地元住民の83%が、同市ではコミュニティを見つけることが容易だと回答した。", "vocab": [{"word": "respondents", "definition": "調査やアンケートに回答した人々を指す。「survey respondents（調査回答者）」のように使われ、統計や報道の文脈で頻出する語。"}, {"word": "crunched", "definition": "ここでは「データを処理・分析した」という意味のイディオム的表現（crunch the data）。大量の数値情報を計算・集計する際に用いられる口語的表現。"}, {"word": "nightlife", "definition": "夜間に楽しめるバー、クラブ、レストランなどの娯楽活動の総称。都市の魅力を評価する文脈でよく使われる複合語。"}, {"word": "annual", "definition": "「年次の」「毎年行われる」を意味する形容詞。ビジネスや報道の場で「annual report（年次報告書）」など幅広く使われる重要語。"}, {"word": "sense of community", "definition": "地域や集団における帰属意識や絆の感覚を表すイディオム。社会学的・都市研究的な文脈で頻繁に用いられる表現。"}, {"word": "green spaces", "definition": "都市内の公園や自然環境など、植物が保全された空間を指す複合名詞。都市計画や環境関連の報道でよく登場する専門的表現。"}]}, {"title_ja": "カルカッタ高裁、SNS投稿を理由にした大学の教授採用拒否を支持", "title_en": "Calcutta HC upholds college's rejection of professor over anti-mission Facebook posts", "summary_ja": "カルカッタ高等裁判所は、ラーマクリシュナ・ミッション住宅大学がウェスト・ベンガル大学サービス委員会の推薦にもかかわらず英語助教の採用を拒否した決定を支持した。裁判所は、信仰の自由や表現の自由は他者の宗教的感情を傷つける権利を含まないと判断した。これにより、採用を命じた下級審の判決は取り消された。", "summary_en": "The Calcutta High Court upheld Ramakrishna Mission Residential College's refusal to appoint a West Bengal College Service Commission-recommended candidate as assistant professor of English, citing his Facebook posts critical of the Ramakrishna Mission and its monks. The court ruled that the right to freedom of speech and religion does not extend to hurting the religious sentiments of others. The division bench set aside a lower court order that had directed the college to issue an appointment letter.", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/legal-news/man-denied-teaching-post-court-backs-colleges-refusal-fb-activity-10777113/", "state_media": false, "category": "政治", "full_text": "4 min readNew DelhiJul 8, 2026 03:30 PM IST\n\t\t\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t\t\t\t\t\t\t\tThe Calcutta High Court recently upheld the decision of Ramakrishna Mission Residential College, Narendrapur, refusing the appointment of a candidate recommended by the West Bengal College Service Commission (WBCSC) as an assistant professor, citing his social media posts against the Ramakrishna Mission and its monks.\nA bench of Justices Debangsu Basak and Md Shabbar Rashidi observed that the right to profess religion does not allow one to hurt the religious sentiments of others.\n“Every person has the fundamental right to profess his or her religion. Right to profess such religion however, cannot be construed to mean that, such person is permitted to hurt the faith or the religious sentiments of any other person,” stated the July 1 order, while setting aside a single-judge’s 2025 ruling that directed the college to issue an appointment letter.\nThe West Bengal College Service Commission had recommended the appointment of the petitioner to the post of assistant professor of English in 2023 following a selection process. However, the governing body of the college refused to accept the recommendation, citing his public social media posts expressing strong views on religion and society.\nThe counsel appearing for the college said that the posts displayed hatred, and contained demeaning and insulting remarks directed at another religion and the ideology of Ramakrishna Mission and its monks. The governing body concluded that appointing him would permanently vitiate the atmosphere of the college.\n Justices Debangsu Basak and Md Shabbar Rashidi observed that the man’s online posts in question had the capacity to hurt religious sentiments.\nFollowing this, the appointee approached the high court, where a single judge disposed of the plea by directing the college to issue a letter of appointment in his favour. Challenging this order, the college filed an appeal.\nPosts could hurt religious sentiments: Court\nThe high court noted that the petitioner did not possess an absolute right to the appointment and observed that it was refused on a plausible ground. The college has the right to refuse a candidate’s appointment, provided that the decision is bona fide, free of arbitrariness and in the best interest of the concerned institution, it said.\nStory continues below this ad\nThe judges observed that the Facebook posts in question had the propensity to hurt the sentiments of other religions. “There is nothing on record to establish that, the decision of the appellants is malafide or contrary to the best interest of the concerned institution,” the court held.\nThrough the Facebook posts, the petitioner had expressed strong views on religions, the conduct of the Ramakrishna Mission, of which the college is a part, and the monks under the mission, the court noted and rejected his contention that the college’s decision affected the fundamental right to freedom of speech and to practise religion.\n“The decision of the appellant (college) is in relation to a recommendation made by the West Bengal College Service Commission and has no bearing on either the freedom of speech of the writ petitioner or his fundamental right to practice his religion,” the court remarked.\nBench allows college’s plea\nIt pointed out that the college neither prevented the man from expressing his views nor restrained him from practising his religion. “We need not enter into the arena as to whether or not the views of the writ petitioner are obscene or seditious as they are not issues for the purpose of consideration of the impugned decision of the College in the writ petition,” the high court added.\nStory continues below this ad\nThe bench allowed the college’s appeal, dismissed the candidate’s cross-objection and set aside the single judge’s order directing his appointment.", "translation_ja": "ニューデリー、2026年7月8日午後3時30分（IST）\n\nカルカッタ高等裁判所はこのほど、ウェスト・ベンガル大学サービス委員会（WBCSC）が助教として推薦した候補者の採用を拒否したナレンドラプールのラーマクリシュナ・ミッション住宅大学の決定を支持した。拒否の理由は、当該候補者がラーマクリシュナ・ミッションおよびその修道僧に対してSNSに投稿した内容であった。\n\nデバングス・バサク判事とムハンマド・シャッバール・ラシーディ判事で構成する法廷は、宗教を信仰する権利は他者の宗教的感情を傷つけることを認めるものではないと指摘した。\n\n「すべての人は自己の宗教を信仰する基本的権利を有する。しかし、かかる宗教を信仰する権利は、当該人物が他者の信仰または宗教的感情を傷つけることを許容するものと解釈されてはならない」と、大学に採用通知書の発行を命じた2025年の単独裁判官の判決を取り消した7月1日付の決定は述べている。\n\nウェスト・ベンガル大学サービス委員会は、選考プロセスを経て2023年に申立人を英語助教のポストに推薦していた。しかし、大学の統括機関は推薦を受け入れることを拒否し、宗教と社会に関する強い見解を示した公開SNS投稿を理由として挙げた。\n\n大学側の弁護士は、当該投稿には憎悪が示されており、別の宗教およびラーマクリシュナ・ミッションとその修道僧のイデオロギーに向けた侮辱的・冒涜的な発言が含まれていると述べた。統括機関は、同人を採用することで大学の雰囲気が恒久的に損なわれるとの結論に至った。\n\nバサク判事とラシーディ判事は、問題となったオンライン投稿が宗教的感情を傷つける可能性を持つと指摘した。\n\nこれを受けて、採用候補者は高等裁判所に申し立てを行ったが、単独裁判官はその申し立てを処理し、大学に採用通知書の発行を命じた。大学はこの命令を不服として上訴した。\n\n「投稿は宗教的感情を傷つける可能性がある」と裁判所\n\n高等裁判所は、申立人が採用に対する絶対的な権利を有しているわけではないとし、採用拒否は相当な根拠に基づくものであると判断した。大学は、その決定が誠実であり、恣意性がなく、関係機関の最善の利益に沿っている限り、候補者の採用を拒否する権利を有すると述べた。\n\n裁判官らは、問題のフェイスブック投稿が他の宗教の感情を傷つける性質を有すると指摘した。「上訴人（大学）の決定が悪意に基づくもの、または関係機関の最善の利益に反するものであることを示す記録は何もない」と裁判所は判示した。\n\nフェイスブックへの投稿を通じて、申立人は宗教、同大学が属するラーマクリシュナ・ミッションの行状、およびミッション傘下の修道僧に関して強い見解を表明しており、裁判所はこれに注目した上で、大学の決定が表現の自由の基本的権利および宗教実践の権利に影響を与えるという申立人の主張を退けた。\n\n「上訴人（大学）の決定は、ウェスト・ベンガル大学サービス委員会による推薦に関するものであり、令状申立人の表現の自由またはその宗教を実践する基本的権利のいずれにも関係するものではない」と裁判所は述べた。\n\n法廷、大学の上訴を認める\n\n裁判所は、大学が当該人物の見解の表明を妨げておらず、宗教実践を制限してもいないと指摘した。「令状申立人の見解が猥褻であるか煽動的であるかという問題については、これらは本件審理における大学の決定の判断目的には関係しないため、立ち入る必要はない」と高等裁判所は付け加えた。\n\n法廷は大学の上訴を認め、候補者の附帯異議申し立てを却下し、採用を命じた単独裁判官の命令を取り消した。", "vocab": [{"word": "vitiate", "definition": "（雰囲気や効力などを）損なう、腐敗させるという意味の動詞。法律・公式文書でよく使われ、「the atmosphere would be permanently vitiated（雰囲気が恒久的に損なわれる）」のように用いる。"}, {"word": "bona fide", "definition": "ラテン語由来で「誠実な、真正の」を意味する形容詞・副詞。法律文脈では「悪意や欺瞞のない」という意味合いで使われ、「bona fide decision（誠実な決定）」のように用いる。"}, {"word": "malafide", "definition": "「悪意のある、不誠実な」を意味する法律用語（bona fideの反意語）。インドの法律文書で頻繁に使われ、「the decision is not malafi
