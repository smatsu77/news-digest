egory": "オピニオン", "full_text": "Judging the Enhanced Games\n                        If fairness in sports required a level playing field that all who wish to compete could afford, that would be a reason for banning expensive performance-enhancing drugs. But it would be a reason for banning expensive high-tech swimming suits and expensive high-tech running shoes, too.\n                    \n                        MELBOURNE—The inaugural Enhanced Games, held in Las Vegas in May, allowed participating athletes to use performance-enhancing drugs. The Games’ founder, Aron D’Souza, claimed before the start: “We’re going to obliterate the world records … it will be a watershed moment in the history of humanity—a new generation of superheroes.”\n        https://prosyn.org/9OBAS76", "translation_ja": "", "vocab": []}, {"title_ja": "What Is the Digital-Money Debate Really About?", "title_en": "What Is the Digital-Money Debate Really About?", "summary_ja": "Both the US and Europe are moving to create digital money, but neither has the right idea about how to do it. The key is to allow “narrow banks,” which issue money but not credit, to keep their reserves in central banks and provide capped interest payments to coin holders.", "summary_en": "Both the US and Europe are moving to create digital money, but neither has the right idea about how to do it. The key is to allow “narrow banks,” which issue money but not credit, to keep their reserves in central banks and provide capped interest payments to coin holders.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/onpoint/how-a-euro-stablecoin-should-work-by-lucrezia-reichlin-2026-07", "state_media": false, "category": "オピニオン", "full_text": "OnPoint Subscriber Exclusive\nLonger Reads provide in-depth analysis of the ideas and forces shaping politics, economics, international affairs, and more.\nWhat Is the Digital-Money Debate Really About?\nBoth the US and Europe are moving to create digital money, but neither has the right idea about how to do it. The key is to allow “narrow banks,” which issue money but not credit, to keep their reserves in central banks and provide capped interest payments to coin holders.\nLONDON—The debate over stablecoins and central bank digital currencies (CBDCs) may seem to be about technology, but it is actually about the architecture of money. It is thus not a new debate, but rather the reopening of an issue that most economists thought had been settled long ago. How this renewed debate plays out will have far-reaching implications—not least for determining whose money Europeans end up using.", "translation_ja": "", "vocab": []}, {"title_ja": "An Athenian View of American Democracy", "title_en": "An Athenian View of American Democracy", "summary_ja": "At 250, America is now producing a mindless, raw power and exponentially growing instability. The possibility of catharsis that characterized the United States at its bicentennial is hard to envisage a half-century later—to the detriment of us all.", "summary_en": "At 250, America is now producing a mindless, raw power and exponentially growing instability. The possibility of catharsis that characterized the United States at its bicentennial is hard to envisage a half-century later—to the detriment of us all.", "source": "Project Syndicate", "tier": "opinion", "link": "https://www.project-syndicate.org/commentary/american-tragedy-can-no-longer-end-in-catharsis-by-yanis-varoufakis-2026-07", "state_media": false, "category": "オピニオン", "full_text": "An Athenian View of American Democracy\n                        At 250, America is now producing a mindless, raw power and exponentially growing instability. The possibility of catharsis that characterized the United States at its bicentennial is hard to envisage a half-century later—to the detriment of us all.\n                    \n                        ATHENS—On the heels of America’s 250th anniversary, I felt the curious need to resist my usual penchant for economic and geopolitical analyses of claims made for or against the United States. Instead, I surrendered to an emotional, personal, indeed an Athenian, take on the global hegemon whose development and actions have shaped us all.\n        https://prosyn.org/zVvWwuK", "translation_ja": "", "vocab": []}, {"title_ja": "Democrats need to rethink their image of a ‘man of the people’ | Judith Levine", "title_en": "Democrats need to rethink their image of a ‘man of the people’ | Judith Levine", "summary_ja": "For progressives too, working-class heroes are bearded, buff white guys. Their treatment of women can be overlooked Ana Marie Cox’s New Republic profile of the Maine oyster farmer and former Democratic senatorial candidate Graham Platner begins with an encounter on the shore with a salt in rubber bo", "summary_en": "For progressives too, working-class heroes are bearded, buff white guys. Their treatment of women can be overlooked Ana Marie Cox’s New Republic profile of the Maine oyster farmer and former Democratic senatorial candidate Graham Platner begins with an encounter on the shore with a salt in rubber bo", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/10/graham-platner-democrats-image", "state_media": false, "category": "オピニオン", "full_text": "Ana Marie Cox’s New Republic profile of the Maine oyster farmer and former Democratic senatorial candidate Graham Platner begins with an encounter on the shore with a salt in rubber boots. Learning that she’s looking for Platner, the guy says: “Good man.”\nIn the 2025 article, Cox is charmed by Platner, who’s as voluble as this guy is terse. She’s impressed by the oyster, calling it a metaphor for “how labor, science, and regulation can still stitch together a community and economy.”.\nShe is unvexed by one of Platner’s biggest contradictions – his protest of the war in Iraq, followed by his enlistment to fight in it, his three voluntary tours of duty with the reputedly badass marines, plus one with the army in Afghanistan. “I might have read too much Hemingway,” explains Platner, who returned from the wars in 2008 with numerous physical injuries and a case of PTSD.\nWrites Cox: “It reminds me of some boys I grew up with. Young men for whom joining the military and radical protests were both ways of proving you could take more than most people could handle.”\nMuck-smeared, disheveled, battle-scarred yet a little bookish, Platner was the very model of the working-class political hero. “If Bernie is what righteous anger sounds like,” says Cox, “Platner is what it sounds like when that anger represents longing for connection.”\nFor more than a year, his allies strained to keep connecting. Progressives agreed to overlook the Nazi-adjacent tattoo, whose meaning Platner claimed not to have understood. When it was revealed that he’d used the “R” word on social media, they accepted his apology: “I am endeavoring to improve, every single day. I am not a perfect person.”\nSupporters in Maine defended him when his primary opponent, governor Janet Mills, ran an ad highlighting social media posts in which Platner appeared to blame victims of rape. Under one Reddit post about rape prevention, he commented: “How about people just take some responsibility for themselves and not get so fucked up they wind up having sex with someone they don’t mean to?”\nEach time he was challenged, he vowed that he is a different person than he was then.\nEven after Jenny Racicot, a woman he dated and political compatriot, accused him of raping her, the feminist state representative Valli Geiger posted that while she would never “slander” Racicot, she believes “Graham is a man becoming a better man and working hard on it.”\nBut on Monday, when Politico published a detailed, highly convincing account of Racicot’s experience, and she told CNN that Platner had “absolutely” raped her, most of his allies decided they’d taken more than they could handle.\nOn Wednesday night, in an 11-minute video suspending the campaign, Platner vehemently denied Racicot’s accusation. The distress and lividness in his face signaled honesty. It is possible that if he did it, he may not know he did. Racicot told Politico he was “almost blackout drunk” that night; he fell asleep afterward and didn’t remember any of it the next morning. We may never know, or find out why she came forward now, when the party has less than a month to choose a replacement.\n“We’re not doing it because of the allegations,” said Platner in the video. “We’re doing it because of the structures that are being taken away from us by those in power.” It is unclear whom Platner is blaming for his downfall: Racicot, anyone who persuaded her to speak up, or the Democratic establishment, which abandoned him. He is blaming everyone but himself.\nCredible as I find Racicot’s account based on the reporting to date, I suspect more people might have defended him were it not for the unceasing ickiness preceding it. But why did everyone put up with the ickiness until now?\nHere’s my take: a party aching for working-class cred – and progressives aching for real working-class politics – feel they’re in no position to be picky. The working-class hero doesn’t even have to be working-class. Platner is a private school graduate, son of a lawyer and a restaurateur, and grandson of a prominent architect. His main source of income is almost $5,000 a month in veterans’ benefits.\nBut what they feel least picky about is how a candidate regards or treats women.\n“Voters don’t want authentic,” noted the New York Times Opinion page writer Michelle Cottle. “They want authentically charming and folksy and looking regular guy-y.”\nCottle may not be suggesting this, but by the unacknowledged logic of candidate selection, across the political spectrum, “regular” means white and “guy-y” means masculine. Only this regular guy can reach the alienated “working-class” voter – because, it is assumed, “working class” also means white and male.\nThis imagined white, male, working-class voter, furthermore, cares about one, “real” issue: his pocketbook. He might also care about the wars in Gaza and Iran, about corruption and healthcare. But what he feels least picky – or icky – about is how a candidate treats women. Because he is a he, “women’s issue", "translation_ja": "", "vocab": []}, {"title_ja": "The Nato summit exposed the real source of Trump’s power", "title_en": "The Nato summit exposed the real source of Trump’s power", "summary_ja": "It comes from his willingness to violate all norms, rules and laws – and leaving everyone else to pick up the pieces At the Nato summit just ended, Trump lashed out at other Nato members, saying he was “very disappointed with Nato” and asking: “Why are we spending hundreds of billions of dollars, an", "summary_en": "It comes from his willingness to violate all norms, rules and laws – and leaving everyone else to pick up the pieces At the Nato summit just ended, Trump lashed out at other Nato members, saying he was “very disappointed with Nato” and asking: “Why are we spending hundreds of billions of dollars, an", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/10/nato-summit-trump-power", "state_media": false, "category": "オピニオン", "full_text": "At the Nato summit just ended, Trump lashed out at other Nato members, saying he was “very disappointed with Nato” and asking: “Why are we spending hundreds of billions of dollars, and they’re not there for us?” He reiterated his desire to take over Greenland, blasted European energy and immigration policies, insulted Spain, and worried allies by declaring that the fighting between Kyiv and Moscow “doesn’t affect us.”\nYet throughout the proceedings, Trump was treated by other Nato powers with as much courtesy and respect as any US president has ever received from Nato – perhaps more. “It was a great meeting, there was a lot of love in that room, a lot of unity,” Trump said when it was over.\nWhat happened? It’s important to understand the source of Trump’s power.\nHis power doesn’t come from his being president of the most powerful nation in the world. In fact, his arbitrary tariffs, absurd war in Iran, and outright abduction of Nicolás Maduro have reduced the US’s standing in much of the world.\nNor does his power come from his Maga base, which is now having second thoughts about supporting someone who got the US involved in another Middle Eastern war, caused prices to rise, and whose administration still refuses to release the complete Epstein files.\nNor does his power flow from any kind of strategic brilliance or cunning.\nTrump’s power comes from his willingness to violate all the norms, rules and laws about how US presidents are supposed to act – to do anything that helps him accumulate more wealth, power, and glory, and wreak vengeance on anyone who has tried to get in the way.\nThe Nato presidents and prime ministers treated Trump with extraordinary deference because they’re afraid of what he might do if he doesn’t get what he wants.\nWhether it’s Nato, Iran, the World Cup, the 2020 election, making billions off his presidency – or anything else – he’s unconstrained by norms, rules, treaties and laws.\nWhen the global community of World Cup fans objected to his intervention last weekend on the side of the US, he responded: “If [Belgium] beat us, then they can be really proud. The other way, if they beat us, we’ll say it was – I’d say – it was rigged, just like the election was rigged in 2020.”\nNote how he corrected himself – from we’ll say to I’d say. Ethics is all about “we” – our collective judgment about what’s right or wrong. Trump doesn’t give a fig for the world’s or the nation’s judgment about right or wrong. He doesn’t think about right or wrong.\nWe’ve been missing the boat by characterizing Trump as breaching ethical standards. Ethics assumes some sort of agreed-upon standards against which a breach can be defined and measured. But Trump doesn’t have any standards at all. His entire approach to life, to business, and now to the presidency, has nothing whatever to do with standards. It’s about winning at all costs. Whatever it takes.\nTrump isn’t unethical. He’s non-ethical. He isn’t immoral. He’s amoral.\nIt’s hard for most of us to conceive of living in a Trumpian world without standards, norms, rules or laws – a world composed only of transactions and calculations in which the only test is what’s in it for me and at what cost.\nAnd that difficulty most of us have of imagining such a world is itself the key to Trump’s power.\nWhether you’re president of the United States or anyone else, it’s always possible to extract personal benefits by being the first to break a widely accepted norm.\nThink of a small town where people don’t lock their doors or windows because of the unwritten rule that no one steals. Under these circumstances, the first thief to commit robberies operates at a huge advantage. He can effortlessly get into anyone’s house.\nThis first-mover advantage disappears as soon as people catch on and start locking their doors and windows. But the thief doesn’t bear the costs of the locks or the hassle of locking all the doors and windows. He exploits the community’s trust. Then, once he destroys that trust, he leaves it to them to protect themselves against such future violations.\nThat asymmetry – small cost for the violator of trust, large costs for everyone who has to thereafter protect themselves – is the very essence of Trump’s MO. He gains wealth, power and glory for himself by shattering norms, after which everyone else has to pick up the pieces.\nAs president, he has far bigger norms to shatter than does a small-town thief, and at far greater benefit to himself.\nAs president, his thuggery has paid off, at least for himself. But it has also damaged all sorts of institutions that the US and the world have relied on – from Nato to Fifa to the US Department of Justice – institutions based on the trust that no American president would ever do what he’s done.\nHe’ll be remembered as the most powerful president the US has ever had, but also the worst.\nWhen he’s gone, all of us will be paying to clean up the mess. We’ll have to buy an infinite number of locks for an endless number of doors and wind", "translation_ja": "", "vocab": []}, {"title_ja": "Once again Trump brought his wrecking ball to the Nato summit, and once again the alliance survived. But for how long? | Paul Taylor", "title_en": "Once again Trump brought his wrecking ball to the Nato summit, and once again the alliance survived. But for how long? | Paul Taylor", "summary_ja": "As the US president swung between threats to take Greenland and promises of help for Ukraine, pledges of a ‘stronger Nato’ were lost in the wind Nato leaders survived another nerve-racking summit with Donald Trump and the 77-year-old defence alliance lives to fight another day, proving its durabilit", "summary_en": "As the US president swung between threats to take Greenland and promises of help for Ukraine, pledges of a ‘stronger Nato’ were lost in the wind Nato leaders survived another nerve-racking summit with Donald Trump and the 77-year-old defence alliance lives to fight another day, proving its durabilit", "source": "Guardian Opinion", "tier": "opinion", "link": "https://www.theguardian.com/commentisfree/2026/jul/10/trump-wrecking-ball-nato-summit-alliance-survived", "state_media": false, "category": "オピニオン", "full_text": "Nato leaders survived another nerve-racking summit with Donald Trump and the 77-year-old defence alliance lives to fight another day, proving its durability against Atlantic storms. But it will never feel safe as long as the unpredictable, vengeful and ruthlessly transactional US president is in the White House.\nAs usual, Trump stole all the headlines at the annual summit, with a mixture of Nato-bashing and implausible threats to take control of Greenland and cut trade with Spain. He declared the ceasefire with Iran dead and called Iranian leaders “scum” as US warplanes bombed Iranian targets along the strait of Hormuz. Pitted against such irresistible clickbait, no Nato communique stood a chance of public attention.\nThe more important question is which show Vladimir Putin was watching – season 94 of Trump Breathes Fire at Nato, or the crisp, upbeat Ankara summit declaration vowing “ironclad commitment to collective defence under article 5” and to the transatlantic bond.\nThe risk is that Putin, bogged down in an unwinnable war in Ukraine that he blames not on his own imperial aggression but on Nato expansionism, pays more attention to Trump’s wrecking ball than to the solemn pronouncements of allied unity and resolve. Who could blame him if he concluded that this US president – whatever the communique says – would not lift a finger to defend a Baltic ally if Russia made a sudden territorial grab or ramped up its hybrid warfare against Europe to show Nato up as a “paper tiger”?\nThe Ankara summit was meant to be focused on delivering Nato’s pledge to invest 5% of GDP in defence and related infrastructure by 2035, turbo-charging allied defence industries and putting support for Ukraine on a sustainable long-term basis. On paper, it ticked all three boxes.\nCoordinated announcements of tens of billions of dollars in equipment purchases and joint projects for urgently needed capabilities, such as air-to-air refuelling tankers, long-range precision missiles and air-defence missiles, illustrated amply that European allies and Canada are signing big cheques to strengthen their defences, even as the US pulls back some forces from Europe.\nThe leaders pledged to “continue our work to eliminate defence trade barriers among allies”. Yet it was not clear whether that ambiguous phrase was meant as a warning to the EU against including “buy European” provisions in EU-funded joint procurement plans, or a plea to the US to ease technology transfer restrictions that mean allies do not have full control of US weapons systems they acquire.\nThe summit declaration added this year’s freshly minted bumper sticker – “a stronger Europe in a stronger Nato” – to the lexicon of incantations around “burden-sharing” and, more recently, “burden-shifting”. European allies are clearly determined to build stronger defences in these uncertain times.\nBut the slogan leaves Europeans unclear about how much US support they can still count on. The US defence secretary, Pete Hegseth, put allies on notice that the Pentagon was conducting a six-month review of the presence of its forces in Europe, implying that Washington could use troops withdrawals to punish those allies deemed to have “failed”. Whether the fail grade would be determined by deficient defence spending or lack of support for the US war on Iran was left unexplained.\nThe biggest change in the Ankara summit from last year’s gathering in The Hague was the US acceptance of a rousing declaration of support for Ukraine. Just 16 months after Trump berated Volodymyr Zelenskyy in the Oval Office, saying he didn’t “have the cards”, Nato officially declared that “Ukraine contributes to transatlantic security, and allies stand united in our unwavering support for Ukraine in defending its freedom, sovereignty and territorial integrity”.\nMark Rutte, the easily derided Supreme Allied Trump Flatterer, deserves praise for helping to bring Trump around to Kyiv’s cause, as do the three leading European allies – the UK, France and Germany. They have consistently defended Volodymyr Zelenskyy and helped him resist US efforts to force an unfair ceasefire “deal” on Ukraine, rewarding Putin for his brutal invasion with territorial concessions.\nPerhaps the best that can be said after the Ankara summit is that Nato is still alive and Ukraine has emerged stronger, even winning a Trump promise to be allowed to build Patriot missile interceptors under licence. With a US president who practises transatlantic diplomacy as a blood sport akin to the no-holds-barred cage fights he recently staged on the White House lawn, allies cannot be sure where the next punch or kick will land, and whether it will be a fatal blow or a mere graze.\nIt may be just as well that the allies did not agree when or where their next summit will be held. The US is right to want fewer Nato meetings, especially those involving the Great Disruptor. The irony of the Turkish president, Recep Tayyip Erdoğan’s, gift to Nato leaders – a customised engr", "translation_ja": "", "vocab": []}, {"title_ja": "How to Win the Defense Innovation Contest", "title_en": "How to Win the Defense Innovation Contest", "summary_ja": "America and its allies must pool their efforts.", "summary_en": "America and its allies must pool their efforts.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/united-states/how-win-defense-innovation-contest", "state_media": false, "category": "オピニオン", "full_text": "Washington’s alliances are under immense strain. Many allies and partners are subject to increased threats from great-power adversaries, and they are coming to doubt whether they can rely on the United States. The response to these pressures is to rearm. Like the United States itself, U.S. partners across Asia, Europe, and elsewhere are building up their defense industrial and technological bases to improve their ability to project power, deter enemies, and prevail in a protracted conflict.\nThe problem is that both the United States and its partners have treated their defense buildups primarily as domestic projects when what they need, in fact, is to pool their resources more effectively. The war with Iran demonstrates the risks of a siloed approach: American legacy platforms—stealth fighters, guided missile destroyers, and aircraft carriers—delivered potent attacks but could not eliminate Iran’s military threat. The conflict rapidly depleted U.S. stockpiles of high-end, long-range strike munitions and air defense interceptors, while U.S. bases, Gulf infrastructure, and shipping through the Strait of Hormuz proved vulnerable to cheap and plentiful Iranian missiles and drones. It was just the latest illustration that no single country, not even one as powerful as the United States, can by itself produce drones, ships, and critical munitions on a sufficient scale or develop a defense industrial base that is innovative and adaptable enough to prevail in a protracted, high-intensity conflict or to deter capable adversaries.\nThis is especially true at a time when the adversaries of the United States and its allies are themselves pursuing deeper defense industrial and technological cooperation. During the war in Ukraine, Iran has shared drone technology with Russia, and North Korea has provided munitions and troops. China, which is engaged in its own massive military modernization and industrial scaling projects, has offered Russia dual-use components and economic relief. Moscow, in return, is transferring advanced weapons, know-how, and intelligence to its partners.\nThe United States and a trusted circle of allies and partners—including NATO members; other U.S. treaty allies such as Australia, Japan, and South Korea; and capable partners such as Brazil, India, Israel, and Taiwan—are the world’s leaders in scientific and technological development. As such, they should be able to counter their rivals’ increasingly unified front. But their strengths will go underutilized or misallocated unless they more closely align their efforts. The traditional model of government-to-government cooperation—formal mechanisms including the United States’ foreign military sales program, bilateral coproduction agreements, and NATO procurement processes—remains useful but is inadequate. This system allows too many opportunities for politics to derail progress, and it moves too slowly to keep pace with a battlefield where technological change happens in weeks rather than years.\nThe real momentum for effective and durable cooperation among U.S. allies and partners lies among the private companies and research institutions in which many of the technological innovations that yield cutting-edge military capabilities occur. To maximize the benefits of defense and technological collaboration, the U.S. government and its partners must pair national efforts with transnational ones: pooling allied capital, technical know-how, production capacity, and supply chains through networks of firms, universities, investors, and governments. Building these networks will not only make it possible to innovate more quickly and produce at scale. It will also reinforce the United States’ increasingly uneasy alliances and partnerships, providing durable connections that can withstand a transactional and turbulent world.\nPRIVATE-SECTOR POTENTIAL\nThe United States and its partners are ramping up their defense production capacity and advancing defense innovation. New technologies that originated in the commercial sector, including outer space–based sensors, artificial intelligence, and autonomous systems, have transformed the battlefield in the past five years. The speed with which new technologies are developed and adopted has picked up, too, as demonstrated by the fast-paced innovation in drone technology in Ukraine. Countries are adjusting their innovation processes accordingly. The U.S. military, for instance, has acquired a drone system called LUCAS that is a copy of the Iranian Shahed drone. Last year, the Pentagon launched an ambitious acquisition program designed to make the adoption of new technologies faster and easier, and earlier this year, Secretary of Defense Pete Hegseth announced an aggressive strategy to integrate AI across the department. U.S. allies such as Germany and Japan and partners such as India, meanwhile, have streamlined their innovation structures and processes to better harness commercial technologies.\nBut current efforts prioritize", "translation_ja": "", "vocab": []}, {"title_ja": "Iran Is Losing Iraq", "title_en": "Iran Is Losing Iraq", "summary_ja": "Baghdad goes its own way.", "summary_en": "Baghdad goes its own way.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/iran/iran-losing-iraq", "state_media": false, "category": "オピニオン", "full_text": "Whenever the Iran war comes to an end, the Islamic Republic is likely to emerge in a stronger position. Should the terms of a June memorandum of understanding be met, Western governments would lift many sanctions on Tehran and the country would gradually be reintegrated into the global economy. Iranian control of the Strait of Hormuz, once an open waterway, might be formalized through some kind of joint tolling system. And Iran might be free to reconstitute its ballistic missiles and drone capabilities, weapons that proved very useful in the most recent months of fighting.\nBut at least in one area, the war has left Iran notably weaker: Iraq. Ever since the toppling of the Iraqi dictator Saddam Hussein in 2003, Iran has been able to exercise a great deal of influence over its western neighbor. It has embedded itself within Iraq’s Shiite political establishment, mediating between rival factions, shaping successive governments, and using Iraq to gain hard cash through smuggling and currency exchange networks. Iran supported many of the Iraqi paramilitary groups that helped defeat the Islamic State, also known as ISIS, in 2017. Iraqis still grew to resent Iran’s overweening influence in their country, not least because of the involvement of Iranian-backed militias in a brutal crackdown on anticorruption protesters in 2019 and 2020. Now, the tumult of recent months has further tilted Iraqis against Iran’s desire to make their country a staging ground of resistance to the United States and Israel. Leaders of political parties and militia groups that once hewed close to Tehran are pulling away.\nIn early June, fighters from Saraya al-Salam, a militia loyal to the Iraqi Shiite cleric Muqtada al-Sadr, gathered in the city of Samarra to hand over their weapons to the Iraqi government. That disarmament marked the group’s withdrawal from the Popular Mobilization Forces, a powerful umbrella coalition of mostly Shiite militias that exists at once inside and outside the Iraqi state. Saraya al-Salam’s thousands of fighters were the first to pull out of the alliance, and they have not been the last: Asaib Ahl al-Haq, a powerful Iranian-backed militia, announced that it, too, would leave the PMF.\nSeveral prominent Iranian-backed militias remain doggedly committed to advancing Tehran’s interests in Iraq and the wider region. But the splintering of the PMF is a real blow to Iran. The so-called axis of resistance, Iran’s network of proxies across the region, has been badly damaged since Hamas’s October 7, 2023, attacks on Israel and Israel’s subsequent campaigns in Gaza and Lebanon. But in Iraq, the Iranian-aligned militias had largely stayed out of the fight and maintained their strength and standing. That position is now unraveling; Iran’s allied militias are being pushed toward the margins of Iraqi politics. And as Tehran’s hold loosens, Iraq glimpses a tantalizing future—one in which it might set its own path, free from the direction of the Islamic Republic.\nMONOPOLY ON VIOLENCE\nBefore Israeli and U.S. forces attacked Iran in February, the Iraqi government pursued a determined, albeit increasingly strained policy: to balance between Washington and Tehran, maintaining ties with both while staying out of their confrontations. The fighting that followed the launch of Operation Epic Fury, however, made that posture impossible. Iraq became a theater of operations as Iran and Iranian-backed forces struck U.S. positions inside the country; diplomatic missions belonging to the United Arab Emirates and the United States; and Iraqi security, energy, and civilian infrastructure, particularly in the autonomous region of Iraqi Kurdistan. They also carried out strikes from Iraqi soil against targets in nearby Gulf countries. The United States retaliated against the Iranian-backed militias in Iraq, with the Iraqi government watching like a bystander. Baghdad was finally forced to face a question it had long avoided: Who controls the use of force within Iraq’s borders?\nOver the past decade, Iraq had allowed Iranian-aligned groups to take over many functions of the state. The PMF was formally integrated into Iraq’s defense system in 2016. On paper, it is meant to report to the Iraqi prime minister, the country’s commander in chief. In practice, those factions retained their own chains of command and loyalties, often to Tehran. The Baghdad government allowed the militias to claim the resources of the Iraqi state and the legitimacy of being the state’s representatives even as those very militias denied the state the monopoly on force that would make it sovereign.\nA newly formed government under Prime Minister Ali al-Zaidi, whose selection in May was endorsed by U.S. President Donald Trump, has made disarming the militias a priority. It has been able to encourage PMF actors to leave the coalition and integrate with the state. If these efforts gather further momentum, Baghdad may be able to rein in the Iranian-aligned militias and assert greater", "translation_ja": "", "vocab": []}, {"title_ja": "How to Save the UN From Irrelevance", "title_en": "How to Save the UN From Irrelevance", "summary_ja": "Ending the peacekeeper’s paralysis.", "summary_en": "Ending the peacekeeper’s paralysis.", "source": "Foreign Affairs", "tier": "opinion", "link": "https://www.foreignaffairs.com/ukraine/how-save-irrelevance", "state_media": false, "category": "オピニオン", "full_text": "In early September 2022, in the no man’s land between the military frontlines of Ukraine and Russia, I had a decision to make: press on under fire, to establish a team of International Atomic Energy Agency safety experts at Europe’s largest nuclear power plant, or turn around. It had taken weeks of diplomacy to get this far; we decided to push on. Our armored vehicles zigzagged to avoid land mines, jostling the IAEA symbol on our jackets—a spinning atom surrounded by the two olive branches that the organization shares with the UN. As we drove past bombed buildings, burned-out cars, and families fleeing westward toward safer parts of Ukraine and its bordering countries, talk turned to whether Europe would have enough gas reserves for the winter.\nThe line between conflict and international consequences is thinning. Wars are displacing a record number of people and upending global trade and energy networks. The integrated global economy built after the Cold War, in which goods, capital, and technology flow relatively freely across borders, is fraying. The traditional separation of trade, security, development, and environmental concerns has become increasingly artificial. Cyber vulnerabilities, too, are expanding beyond mere technical concerns to affect vital infrastructure, energy grids, elections, and banking systems. As diplomatic standoffs and military conflicts disrupt supply chains, countries are moving to decouple.\nThe return of war to Europe has reshaped security perceptions and strategic calculations across the continent. In the Middle East, cycles of confrontation are generating consequences that extend well beyond the region, contributing to political divisions and disrupting energy markets, trade routes, food prices, and confidence in the world economy. In Asia, competition now spans military, economic, technological, and maritime domains. In Africa, demographic growth and economic potential run up against unequal access to finance and uneven institutional capacity. In Latin America and elsewhere, more sophisticated transnational criminal networks are exploiting global markets, financial systems, ports, logistics chains, and governance gaps. In this system, the consequences of failure travel faster and wider than ever before.\nMeanwhile, multilateralism and international law and norms, which reduce the chances of catastrophic errors, provide stability, and offer shared solutions to shared problems, have come under strain as they struggle to adjust to these structural shifts. Most of the nuclear arms reduction and control treaties forged during the Cold War, such as the New Strategic Arms Reduction Treaty and the Intermediate-Range Nuclear Forces Treaty, are dead or weakened. Major nuclear arsenals are modernizing and expanding, rather than getting smaller, and the channels of communication that reduce the risk of miscalculation between powerful states have eroded. In some countries that have upheld their legal obligations to not develop nuclear weapons, debates have emerged over the merits of pursuing them.\nToday, we are at greater risk of a major conflagration, including a nuclear one, than at any time since World War II. As the generations that experienced the horrors of two world wars and built the frameworks to prevent a third disappear, so does the memory of the consequences of unchecked global rivalry. The United Nations—which, despite its shortcomings, has in the past 80 years facilitated shared responses to common threats, supported decolonization, and helped prevent World War III—has been so weakened that some commentators suggest that it is heading the way of the League of Nations. Just when the world needs it most in the quest for peace, the UN is absent, including from the war in Ukraine; the confrontation involving the United States, Israel, and Iran; and regional conflicts in Asia and Africa.\nThe UN cannot be expected to prevent or end every war, but working toward that end is its core task. It can again become a capable, impartial, and present broker for peace. Failing to be in the room where it happens creates disillusionment and puts the UN on a path to irrelevance. Institutions that cannot explain where they add value become vulnerable to indifference, and indifference in the current climate is not a passive condition—it is actively eroding the UN’s finances and political will. The UN has a liquidity crisis, which, at its core, is a crisis of confidence in the institution by its member states.\nThe most immediate action that the international community can take to address this crisis of confidence is in its choice of the next secretary-general, for which I am contending. History suggests that a more active secretary-general, who goes into the field to prevent conflict and who is present at tables where diplomatic solutions are negotiated, can be effective, even in a deeply divided world.\nNATIONS FOR PEACE\nThe United Nations should focus on reducing the conditions that produce crises", "translation_ja": "", "vocab": []}];
let curCat = "全て";

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(c=>`<button class="tab${c===curCat?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function filteredArts(){
  return curCat==="全て"?DATA:DATA.filter(a=>a.category===curCat);
}

function renderList(){
  const arts=filteredArts();
  const el=document.getElementById("list-view");
  if(!arts.length){el.innerHTML='<p style="padding:1rem;color:var(--muted)">記事なし</p>';return;}
  el.innerHTML=arts.map((a,i)=>{
    const sm=a.state_media;
    return `<div class="art-item${sm?" state":""}" onclick="showDetail(${i})">
      <span class="bullet${sm?" st":""}">${sm?"[!]":"•"}</span>
      <span class="art-hed">${esc(a.title_ja)}</span>
      <span class="art-src">${esc(a.source)}</span>
    </div>`;
  }).join("");
}

function setCat(cat){curCat=cat;renderTabs();renderList();document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";}

function showDetail(idx){
  const a=filteredArts()[idx];
  document.getElementById("d-link").href=a.link;
  document.getElementById("d-state").style.display=a.state_media?"block":"none";
  document.getElementById("d-title-ja").textContent=a.title_ja;
  document.getElementById("d-summ-ja").textContent=a.summary_ja;
  document.getElementById("d-title-en").textContent=a.title_en;
  document.getElementById("d-summ-en").textContent=a.summary_en;
  const fts=document.getElementById("d-fulltext-section");
  if(a.full_text){
    document.getElementById("d-fulltext-en").textContent=a.full_text;
    document.getElementById("d-translation-ja").textContent=a.translation_ja||"";
    fts.style.display="block";
  }else{fts.style.display="none";}
  const vs=document.getElementById("d-vocab-section");
  if(a.vocab&&a.vocab.length){
    document.getElementById("d-vocab-list").innerHTML=a.vocab.map(v=>
      `<div class="vocab-item"><span class="vocab-word">${esc(v.word)}</span><span class="vocab-def">${esc(v.definition)}</span></div>`
    ).join("");
    vs.style.display="block";
  }else{vs.style.display="none";}
  document.getElementById("d-source").textContent=a.source+" / "+a.tier;
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

function backToList(){document.getElementById("list-view").style.display="block";document.getElementById("detail-view").style.display="none";window.scrollTo(0,0);}

function shareUrl(){
  const url=location.href;
  if(navigator.share){navigator.share({title:"Morning Read",url:url});}
  else{navigator.clipboard.writeText(url).then(()=>alert("URLをコピーしました")).catch(()=>prompt("このURLをコピーしてください:",url));}
}

renderTabs();renderList();
</script>
