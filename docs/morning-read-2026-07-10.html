\n-ABC News' Mariam Khan", "translation_ja": "米国とイランが技術的協議を継続：米国当局者\n\n米国当局者は木曜日、今週テヘランに対する2日間の報復攻撃が行われた後も、米国とイランが引き続き核問題に関する技術的交渉を行っていると述べた。\n\n「米国は解決策を見つけることに引き続きコミットしており、技術的協議は継続している。イランは決して核兵器を保有してはならない」と当局者は述べた。\n\n60日間の停戦および覚書は「実績に基づくもの」であり、イランの行動は「容認できないレベルの不履行に当たる」と当局者は付け加えた。\n\n「イランによる無実の船舶への攻撃はテロ行為である」と当局者はさらに述べた。\n\n－ABCニュース、マリアム・カーン記者", "vocab": [{"word": "retaliatory", "definition": "「報復の」という意味の形容詞。相手の行動に対する仕返しや反撃を指す際に使われる、外交・軍事文脈で頻出の上級語。"}, {"word": "ceasefire", "definition": "「停戦」を意味する名詞。交戦国や対立勢力が戦闘行為を一時的または恒久的に停止することを指す、国際政治・安全保障分野の専門用語。"}, {"word": "memorandum of understanding", "definition": "「覚書」を意味する法律・外交用語（略称：MOU）。正式な条約ではないが、当事者間の合意事項を文書化したもので、ビジネスや国際交渉でよく使われる。"}, {"word": "constitute", "definition": "「〜を構成する」「〜に当たる」という意味の動詞。ある行為や要素が特定の概念や状態を形成することを表す、法律・学術文書で多用される表現。"}, {"word": "resolution", "definition": "「解決」または「決議」を意味する名詞。問題や紛争の解決策を見つけるという文脈と、国際機関が採択する公式決議の両方の意味で使われる。"}, {"word": "possess", "definition": "「所有する」「保有する」を意味する動詞。単なる「持つ」より改まった・法的なニュアンスがあり、特に兵器や財産の保有を論じる文脈でよく用いられる。"}]}, {"title_ja": "途上国、教育より対外債務返済に多く支出——国連が警告", "title_en": "Developing countries spend more on foreign debt repayment than education, UN warns", "summary_ja": "ユネスコの報告書によると、2025年に113の途上国が教育よりも対外債務の返済に多くの資金を費やしており、サハラ以南のアフリカでは債務返済額が教育支出の3.6倍に達した。さらに、2027年までに教育支援への国際援助が最大30%減少すると予測されており、状況はさらに悪化する見通しだ。専門家たちは、民間債権者を拘束する法的枠組みの整備を含む、債務救済の抜本的な改革を求めている。", "summary_en": "A UNESCO report reveals that 113 developing countries spent more servicing foreign debt than on education in 2025, with sub-Saharan African nations spending 3.6 times more on debt than schooling. The crisis is compounded by a predicted 30% decline in global aid to education by 2027, driven by cuts from the US and Europe. Experts are calling for structural reforms to debt relief, including more cancellations and binding private creditor obligations under English law.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/global-development/2026/jul/10/developing-countries-spend-more-foreign-debt-education-aid-cuts-unesco", "state_media": false, "category": "社会", "full_text": "Most developing countries spent less on education than they did repaying debt last year, according to the UN, at the same time as global aid to education is predicted to decline by up to 30%.\nMore was spent on servicing foreign debt than on education in 113 developing countries in 2025, according to research by the UN’s culture and education agency, Unesco. In sub-Saharan Africa, countries spent 3.6 times more on debt than education.\nThe situation is likely to be exacerbated by funding cuts, the agency warned. Low- and lower-middle-income countries have already lost 21% of the aid to education they were receiving in 2023 and could lose up to 30% by 2027. Some countries – including Afghanistan, Mali, Niger and Liberia – have already lost more than 40% in three years.\nMin Jeong Kim, director of Unesco’s education division, said: “Current approaches really keep the countries trapped in a cycle of austerity, underinvestment and stalled development.\n“This is really weakening countries’ stances on economic growth, eroding domestic revenue mobilisation and ultimately also diminishing their ability to handle their debt over time.”\nEighteen of the most indebted countries spent five times the amount they did on education on debt – and up to 16 times more in the case of Sri Lanka.\nAccording to the UK-based campaign group Debt Justice, repayments by poorer countries hit a 35-year high last year, with 56 countries spending almost a fifth of their total revenue on servicing loans.\nTim Jones, policy director at Debt Justice, said: “Countries’ debt payments have ballooned following a series of shocks from Covid, energy price and interest rate rises and climate disasters.\n“In the worst-affected [countries], this is leading to cuts in spending on essential services such as health and education.”\nThe situation has been made worse by aid cuts made by the US and Europe, which saw funding to education drop by $600m (£470m) in 2024, the last recorded figures, and is expected to have fallen further in 2025.\nThe combined impact of aid cuts and public spending being redirected to debt servicing has meant disruption to education systems, with schools often not receiving sufficient funds to operate and teachers not being paid.\nIn the long term, there is concern that weakened education systems affect indebted countries’ ability to develop their economies and better equip themselves to handle debt burdens in the future.\nUnesco said there needed to be a change to how debt relief was structured, shifting away from short-term relief to long-term arrangements that allowed countries to continue funding public services.\nJones said that another key factor in changing debt relief was ensuring that private lenders, often based in Britain and the US, were not able to block agreements to extract more profit for themselves, as they recently did with Ethiopia.\n“The UK needs to use its presidency of the G20 in 2027 to get major changes to the debt-relief process, including more debt cancellation and a faster process,” he said. “Central to this is incorporating the process into English law, so that private creditors can no longer disrupt and hold out from the debt relief.”", "translation_ja": "国連によると、ほとんどの途上国が昨年、教育への支出よりも債務返済に多くの資金を充てており、同時に教育分野への国際援助は最大30%減少すると予測されている。\n\nユネスコ（国連教育科学文化機関）の調査によれば、2025年に113の途上国で教育よりも対外債務の返済に多くの資金が費やされた。サハラ以南のアフリカでは、各国の債務返済額が教育支出の3.6倍に上った。\n\n同機関は、資金削減によって状況がさらに悪化する可能性があると警告した。低所得国および低中所得国はすでに、2023年に受け取っていた教育支援への援助の21%を失っており、2027年までに最大30%を失う可能性がある。アフガニスタン、マリ、ニジェール、リベリアを含む一部の国では、3年間で既に40%以上を失っている。\n\nユネスコの教育部門ディレクター、ミン・ジョン・キム氏は次のように述べた。「現在のアプローチは、各国を緊縮財政、投資不足、停滞した発展の悪循環に本当に閉じ込めています。これは各国の経済成長の基盤を弱め、国内の歳入確保能力を損ない、最終的には長期的な債務管理能力をも低下させています。」\n\n最も債務を抱える18カ国は、教育の5倍の金額を債務返済に充てており、スリランカの場合は最大16倍に達している。\n\n英国拠点のキャンペーン団体「デット・ジャスティス」によると、貧しい国々の返済額は昨年35年ぶりの高水準を記録し、56カ国が総収入の約5分の1をローンの返済に費やしている。\n\nデット・ジャスティスの政策ディレクター、ティム・ジョーンズ氏は次のように述べた。「各国の債務返済額は、新型コロナウイルス、エネルギー価格高騰、金利上昇、気候災害といった一連の衝撃を経て膨れ上がっています。最も影響を受けた国々では、これが医療や教育などの必須サービスへの支出削減につながっています。」\n\n米国と欧州による援助削減により、教育への資金が2024年（最新データ）に6億ドル（約4億7000万ポンド）減少し、2025年にはさらに落ち込んだと見られており、状況はさらに深刻化している。\n\n援助削減と債務返済への公的支出振り替えが重なった結果、教育システムが混乱しており、学校が運営に十分な資金を受け取れなかったり、教師への給与が支払われなかったりするケースも起きている。\n\n長期的には、教育システムの弱体化が、債務を抱える国々の経済発展能力や将来の債務負担への対応力に影響するとの懸念もある。\n\nユネスコは、債務救済の構造を変える必要があると訴え、短期的な救済から、各国が引き続き公共サービスに資金を充てられるような長期的な取り決めへの転換を求めた。\n\nジョーンズ氏は、債務救済を変える上でもう一つの重要な要素として、英国や米国を拠点とする民間貸し手が、自らの利益をより多く搾り取るために合意を阻止できないようにすることを挙げた。エチオピアのケースでは、最近まさにそのような事態が起きた。\n\n同氏は「英国は2027年のG20議長国としての立場を活かし、より多くの債務帳消しや迅速な手続きを含む債務救済プロセスの抜本的な改革を実現する必要があります。その中心となるのは、民間債権者がもはや債務救済を妨害したり、合意から離脱したりできないよう、このプロセスを英国法に組み込むことです」と述べた。", "vocab": [{"word": "servicing (debt)", "definition": "「債務を履行すること」、すなわち利子や元本を定期的に返済すること。金融・経済のニュースで頻出する技術的表現。"}, {"word": "austerity", "definition": "「緊縮財政」を意味し、政府が公共支出を大幅に削減する政策を指す。経済・政治報道でよく使われる上級語彙。"}, {"word": "exacerbate", "definition": "「悪化させる」「さらに深刻にする」という意味の動詞。問題や状況がより深刻になることを表す際に使われるフォーマルな表現。"}, {"word": "mobilisation", "definition": "ここでは「(国内歳入の)動員・確保」を意味し、資源や資金を集めて活用する能力を指す。政策・経済文書で使われる専門的表現。"}, {"word": "creditors", "definition": "「債権者」を意味し、他者や国家に資金を貸し付けた個人・機関・国家を指す。金融・法律分野の重要語彙。"}, {"word": "hold out", "definition": "「(合意から)離脱する」「応じることを拒否する」という意味の慣用表現。交渉において自らの利益のために合意を拒む行為を指す。"}, {"word": "ballooned", "definition": "「急激に膨れ上がった」という意味の比喩的表現。数値や費用が急速に大幅増加した状況を生き生きと描写する際に使われる。"}]}, {"title_ja": "ナイジェリア、国家予算に7億円計上された幽霊省庁をめぐり政治的混乱", "title_en": "Furore in Nigeria over fake federal agency allocated £700,000 in national budget", "summary_ja": "ナイジェリアで、実在しない連邦機関「大統領対外介入促進評議会（PFIPC）」が2026年度予算に13億ナイラ（約70万ポンド）を計上され、政府庁舎内にオフィスまで割り当てられていたことが発覚し、政治的スキャンダルに発展した。容疑者のアデニイ・アデイェミ・マシューは文書偽造や詐称などの罪で起訴されており、大統領首席補佐官から任命状を受け取ったと主張しているが、同補佐官は関与を否定している。この疑惑は来年1月の総選挙を前にティヌブ大統領への圧力を強め、ナイジェリア政府中枢における腐敗問題を改めて浮き彫りにした。", "summary_en": "A fictitious Nigerian government agency, the Presidential Foreign Intervention Promotion Council (PFIPC), was allocated 1.3bn naira in the 2026 budget and given office space in a federal government complex, despite never legally existing. The alleged fraudster, Adeniyi Adeyemi Matthew, faces charges of forgery and impersonation, and claims he received an appointment letter from the president's chief of staff, who denies any connection. The scandal has intensified pressure on President Tinubu ahead of January's general election, reigniting debates about corruption at the highest levels of Nigeria's government.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/09/bola-tinubu-under-pressure-fake-nigerian-government-agency-political-storm", "state_media": false, "category": "政治", "full_text": "A fictitious federal entity that was allocated 1.3bn naira (£700,000) in Nigeria’s 2026 budget has precipitated a political storm in Africa’s largest democracy in the run-up to a general election set for January.\nThe fake agency came to light last October when Femi Gbajabiamila, the president’s chief of staff, wrote to the police alleging that his signature, along with official seals and reference numbers, had been forged by Adeniyi Adeyemi Matthew, who was claiming to have been appointed by the presidency to head the presidential foreign intervention promotion council (PFIPC).\nThe case is due to be heard in a court in the capital, Abuja, on 27 July, more than six months after the police filed an eight-count charge including criminal forgery, impersonation and obtaining by false pretence against Adeyemi and two others.\nIn a 1 July statement, the Nigerian presidency also claimed Adeyemi had met ambassadors without the knowledge of the foreign affairs ministry and misled the country’s accountant-general’s office into opening accounts for PFIPC with the central bank and 33 commercial banks.\nThe actual Nigerian investment promotion council had also reportedly raised an alarm about the similarities with the PFIPC.\nApart from being included in the budget, the PFIPC was also allocated office space in the federal secretariat in Abuja, a huge complex housing the headquarters of Nigeria’s civil service and many government ministries and agencies.\nThat has raised questions about how Adeyemi was able to gain access, with some critics speculating collusion with officials at the highest echelons of government.\n“Politicians and members of the public who are weaponising Adeyemi’s claim against the chief of staff should refrain from swallowing his narrative hook, line and sinker,” the presidency statement said, defending Gbajabiamila.\nLocal reports say Adeyemi has claimed he was given the appointment letter by Gbajabiamila, who has denied knowing him or ever being in touch.\nOn Monday, President Bola Ahmed Tinubu directed the independent corrupt practices and other related offences commission (ICPC) to open a probe. Days later, a Senate motion to independently investigate the presidential foreign intervention promotion council (PFIPC) did not pass.\nMeanwhile the House of Representatives set up a committee to question Abubakar Atiku Bagudu, the minister of budget and economic planning.\nThe presidency and supporters of the ruling party have pointed out that Adeyemi had previously misrepresented himself as the newly elected president-general of a UN youth agency called World Youth Organisation back in 2017.\nHis aides had said he was seeking permission from the UN security council to appoint staff across the world.\n“The 967 nominees will work with my office across the globe,” one of his representatives was quoted as saying in Nigerian daily Punch. “This will enable the organisation to function effectively and bring coordination across the world.”\nIt later turned out that the WYO was not affiliated with or part of the UN.\nCritics of the Tinubu administration have pointed to the controversial record of key government officials mentioned in the scandal.\nIn 2007, the supreme court of the US state of Georgia handed Gbajabiamila a three-year suspension from practising law in Atlanta after he failed to pass on $25,000 awarded as an injury settlement to a client four years earlier.\nGbajabiamila paid back the money in 2006, and later admitted he violated professional conduct rules, but blamed the incident on a paralegal who “closed the files as per my instruction, but unfortunately never paid the woman”.\nBagudu spent six months in a federal prison in Houston in 2003. According to the US Department of Justice, he was arrested for being an alleged accomplice to former dictator Sani Abacha who “embezzled, misappropriated and extorted billions of dollars from the government of Nigeria” amounting to more than $282m in one instance.\nBagudu reportedly agreed to return $163m to Nigerian authorities, who in turn dropped all cases against him, leading to his release without admission of wrongdoing.\nThe latest scandal has piled pressure on Tinubu, 74, ahead of January’s election, thrusting endemic corruption in Africa’s largest economy back into the spotlight.\nFormer vice-president Atiku Abubakar, who is due to challenge Tinubu’s re-election bid in January, called on his rival to set an independent commission of inquiry comprising neutral parties such as civil society leaders, opposition parties and the Nigerian Bar Association, to establish , exactly who was involved with the scheme.\n“Nigerians deserve the whole truth, not carefully scripted press statements,” his spokesperson Phrank Shuaibu said earlier this month, adding: “We therefore demand a truly independent investigation that follows the evidence wherever it leads. No sacred cows. No political protection. No selective justice.”", "translation_ja": "ナイジェリアの2026年度予算に13億ナイラ（約70万ポンド）が計上された架空の連邦機関が、来年1月に予定されている総選挙を前に、アフリカ最大の民主主義国家に政治的嵐をもたらしている。\n\nこの偽装機関が明るみに出たのは昨年10月のことで、大統領首席補佐官のフェミ・グバジャビアミラ氏が、自身の署名や公式印章・参照番号が偽造され、アデニイ・アデイェミ・マシューという人物が大統領府から「大統領対外介入促進評議会（PFIPC）」の長に任命されたと称していたとして、警察に被害を申告したことがきっかけだった。\n\nこの事件は、警察が刑事偽造・詐称・虚偽申告による詐取などを含む8件の罪状でアデイェミ被告と他の2名を起訴してから半年以上が経過した7月27日、首都アブジャの裁判所で審理される予定となっている。\n\n7月1日付のナイジェリア大統領府の声明によると、アデイェミ被告は外務省の知らないまま各国大使と面会し、中央銀行および33の商業銀行にPFIPCの口座を開設するよう国家経理長官室を欺いたとされている。\n\nまた、実在するナイジェリア投資促進委員会も、PFIPCとの名称の類似性について懸念を表明していたと報じられている。\n\n予算への計上に加え、PFIPCはアブジャにある連邦庁舎内にもオフィスを割り当てられていた。同庁舎はナイジェリアの公務員組織および多数の政府省庁・機関の本部が置かれる大規模な複合施設である。\n\nこのことから、アデイェミ被告がいかにして同施設へのアクセスを得られたのかという疑問が生じており、一部の批判者は政府の最高レベルの当局者との共謀があったのではないかと推測している。\n\n「アデイェミ被告の主張を利用して首席補佐官を攻撃しようとしている政治家や一般市民は、彼の話を丸ごと信じることを慎むべきだ」と大統領府の声明はグバジャビアミラ氏を擁護した。\n\n現地報道によると、アデイェミ被告はグバジャビアミラ氏から任命状を受け取ったと主張しているが、同氏は彼を知らず、連絡を取ったこともないと否定している。\n\n月曜日、ボラ・アハメド・ティヌブ大統領は独立汚職・関連犯罪対策委員会（ICPC）に調査開始を指示した。その数日後、PFIPCを独自に調査するための上院動議は否決された。\n\n一方、下院はアブバカル・アティク・バグドゥ予算・経済計画大臣に説明を求める委員会を設置した。\n\n大統領府および与党の支持者たちは、アデイェミ被告が2017年にも「世界青年機構（WYO）」という国連の青年機関の新会長に選出されたと偽って自らを誤って表現していた過去を指摘している。\n\n彼の補佐官らは、彼が国連安全保障理事会に世界各地でスタッフを任命する許可を求めていると述べていた。\n\n「967名の候補者が世界中で私のオフィスとともに働く予定です」と彼の代理人の一人がナイジェリアの日刊紙「パンチ」で述べたとして引用されている。「これにより、組織が効果的に機能し、世界全体での連携が図れるようになるでしょう」\n\nその後、WYOは国連と提携しておらず、国連の一部でもないことが判明した。\n\nティヌブ政権の批判者たちは、このスキャンダルに名前が挙がっている主要閣僚らの問題ある経歴を指摘している。\n\n2007年、米国ジョージア州の最高裁判所は、グバジャビアミラ氏が4年前に傷害示談金として支払われた2万5000ドルを依頼人に渡していなかったとして、アトランタでの弁護士資格を3年間停止する判決を下した。\n\n同氏は2006年に金銭を返済し、後に職業倫理規則に違反したことを認めたが、「自分の指示通りにファイルを閉じたが、残念ながらその女性に支払いをしなかった」法律補助スタッフのせいだとした。\n\nバグドゥ大臣は2003年にヒューストンの連邦刑務所で6か月間服役した。米国司法省によると、同氏は元独裁者サニ・アバチャの共謀者として逮捕された。アバチャは「ナイジェリア政府から数十億ドルを横領・流用・強奪した」とされており、ある事例では2億8200万ドル以上に上った。\n\nバグドゥ大臣はナイジェリア当局に1億6300万ドルを返還することに合意し、当局はその見返りとして彼に対するすべての訴訟を取り下げ、無罪の認否なしに釈放されたと報じられている。\n\n今回のスキャンダルは、来年1月の選挙を前に74歳のティヌブ大統領への圧力をさらに強め、アフリカ最大の経済大国に蔓延する腐敗問題を再び脚光の下に引き戻した。\n\n1月の選挙でティヌブ大統領の再選に挑む予定の元副大統領アティク・アブバカルは、市民社会のリーダー、野党、ナイジェリア弁護士会などの中立的な関係者で構成される独立調査委員会を設置し、この計画に関与した人物を正確に特定するよう、ライバルに求めた。\n\n「ナイジェリア国民は、慎重に作られた広報声明ではなく、真実の全容を知る権利がある」と同氏のスポークスマン、フランク・シュアイブ氏は今月初めに語り、こう付け加えた。「我々はそれゆえ、証拠をどこへでも追うことのできる、真に独立した調査を要求する。聖域なし。政治的保護なし。選択的正義なし。」", "vocab": [{"word": "precipitated", "definition": "（事件・状況などを）突然引き起こす、招くという意味の動詞。「The scandal precipitated a crisis.」のように、予期せぬ深刻な事態を急速に引き起こす場合に使われる。"}, {"word": "fictitious", "definition": "実在しない、架空の、虚偽の、という意味の形容詞。法律・行政文書の文脈では、意図的に偽造・捏造されたエンティティや情報を指すことが多い。"}, {"word": "impersonation", "definition": "他人や存在になりすますこと、詐称・身分偽装を意味する名詞。法律用語として刑事詐欺の文脈でよく使われる。"}, {"word": "echelons", "definition": "組織や社会における階層・段階・地位を指す名詞。「the highest echelons of government」で「政府の最高レベル・中枢」という意味になり、権力構造を語る際に使われる上級語彙。"}, {"word": "misrepresented", "definition": "事実と異なる形で自分や物事を表現・説明する、虚偽の申告をするという意味の動詞。意図的な欺瞞のニュアンスを含む。"}, {"word": "paralegal", "definition": "弁護士を補佐する法律補助専門職、パラリーガルを指す名詞。弁護士資格は持たないが法律事務所で文書作成や調査を行う職種。"}, {"word": "weaponising", "definition": "本来は武器化するという意味だが、政治・メディアの文脈では情報・スキャンダル・発言などを攻撃的な道具として利用することを指す比喩的表現。"}]}, {"title_ja": "LGBTQクルーズ船、トルコに続きエジプトへの入港も拒否される", "title_en": "LGBTQ+ cruise ship denied entry to Egypt after Turkey ban", "summary_ja": "アトランティス・イベンツ社がチャーターしたLGBTQクルーズ船「スカーレット・レディ」が、トルコに続いてエジプトへの入港も拒否された。ブロードウェイ俳優のパティ・ルポーンを含む約2,000人の乗客は、アレクサンドリアでの寄港を楽しみにしていたが、直前の通告により計画が白紙になった。業界関係者は、今回の相次ぐ入港拒否が他国にも波及することを懸念している。", "summary_en": "The Scarlet Lady, an LGBTQ+ cruise ship chartered by Atlantis Events, was refused entry into Egyptian waters on Thursday, just days after being banned from Turkey. The 2,000 passengers, including Broadway star Patti LuPone, had been expecting Alexandria to be a highlight of their Athens-to-Venice voyage. Industry observers fear the back-to-back bans may embolden other countries to follow suit.", "source": "The Guardian", "tier": "paper", "link": "https://www.theguardian.com/world/2026/jul/09/lgbtq-cruise-ship-refused-entry-egypt-turkey", "state_media": false, "category": "社会", "full_text": "An LGBTQ+ cruise ship blocked from Turkish waters this week has been refused entry into Egypt.\nThe Scarlet Lady’s 2,000 passengers, including the Broadway performer Patti LuPone, woke on Thursday morning to find a note placed under their cabin doors informing them that the ship was urgently looking for alternative ports.\n“Early this morning, we were informed that Scarlet Lady has been denied entry into Egyptian waters, and, as a result, will no longer be able to call in Alexandria today,” Rich Campbell, the chief executive of Atlantis Events, the tour group that chartered the Virgin Voyages ship, told passengers.\n“I know how much this visit meant to so many of you. We successfully sailed a similar itinerary last year without issue. So we were surprised by this unfortunate decision,” he wrote.\nThe note concluded: “Please know that both the Atlantis and Virgin Voyages teams worked tirelessly to make this call in Alexandria a possibility. This news came as a surprise to all of us, and we’re just as disappointed as you are.”\nThe visit to Egypt was already a change to the planned tour, hastily arranged after the ship was refused entry to Turkey. No official reason has yet been given for the decision of the Egyptian government.\nThe 10-day Athens to Venice cruise was blocked from Turkey after authorities published a statement online saying the cruise was chartered “by groups known for behaviours that do not align with the structure of our society and our moral values”.\nThe ship’s arrival had been cancelled after it “sparked significant public concern”, they added. “There is absolutely no possibility of the group in question visiting our province for an event of this nature.”\nRandy Slovacek, who is on the cruise, wrote on his blog: “In the company’s 36-year history, Atlantis had never had a ship denied entry to dock. And now it’s happened in two countries in one week.\n“Trust and believe, me and my fellow passengers will be fine: if they don’t want our tourism, we will sparkle and spend elsewhere. As my fellow blogger Joe Jervis once wrote: ‘They wish we were invisible. We’re not. Let’s dance.’”\nKyle Olsen, the owner of Hermes Holidays, another LGBTQ+ tour company, said he believed that if Turkey had not refused entry to the ship this week, Egypt would not have issued its ban. “I worry that other countries are going to be emboldened in turn to ban gay cruises from their ports as well,” he said.\n“This is a sad representation of the way the world is going. Successive governments are falling to rightwing groups and the rights of LGBT+ people are being taken away as a result across the globe.”\nOlsen said that after the actions of Turkey and Egypt, he would not be recommending the countries to his customers. “But it’s important to note that the views of the government are not necessarily reflective of the views of the peoples of those countries,” he said. “We’ve been to Turkey and Egypt many times in the past and have found the people very warm, friendly and engaging.”\nOlsen, who has friends onboard the Scarlet Lady, said the Egypt stop had been expected to be a high point of the tour by the passengers, who had got up at 6am to be ready for the day. “This was literally a last-minute call by the Egyptian government,” said Olsen. “The night before, everything was fine.\n“Lots of passengers had paid a lot of money for private tours to see the pyramids and the museums. It was going to be the trip of lifetime but now they’re in limbo.”\nThe ship has now been rerouted a second time, and will be docking in Chania, Crete, on Friday and Montenegro on Sunday.\nCampbell called Turkey’s decision “stunning”, telling CNN: “The reasoning behind it is that it’s a gay group.”\nAtlantis had chartered cruises to Turkey 13 times over the past 25 years without incident, he added, and calls involving the US embassy in Turkey had failed to reverse the ban.\nLuPone, the 77-year-old Tony award winner who is performing on the ship, shared her shock regarding the news on Instagram on Saturday. “The Atlantis cruise I am performing on next week has been banned from entering Turkey,” she wrote. “A ship – a magnificent ship – full of gay men. And me. Denied entry to Turkey simply because of who is onboard.\n“I am furious, but I am sailing, as the ship will make other ports of call. I am ready to perform for all the wonderful men on this Atlantis cruise, who deserve so much better than this.”\nAtlantis Events and Virgin Voyages have been approached for comment.", "translation_ja": "トルコ海域への入域を拒否されたLGBTQクルーズ船が、今週エジプトへの入港も拒否された。\n\nパティ・ルポーンなどのブロードウェイ俳優を含む「スカーレット・レディ」の約2,000人の乗客は、木曜日の朝、客室のドアの下に差し込まれたメモで目を覚ました。そのメモには、船が急遽代替の寄港地を探していることが書かれていた。\n\n「今朝早く、スカーレット・レディがエジプト海域への入域を拒否されたことが通知されました。その結果、本日のアレクサンドリア寄港は中止となります」と、バージン・ボヤージズ船をチャーターしたツアーグループ、アトランティス・イベンツの最高経営責任者リッチ・キャンベルは乗客に伝えた。\n\n「この訪問がみなさんにとってどれほど意味のあるものだったか、十分に理解しています。昨年も同様の行程を問題なく航行しました。ですから、この残念な決定に驚いています」と彼は書いた。\n\nメモの結びにはこう記されていた。「アトランティスとバージン・ボヤージズの両チームが、アレクサンドリア寄港を実現するために不眠不休で努力したことをご理解ください。この知らせは私たちにとっても突然のことであり、皆さんと同様に失望しています。」\n\nエジプトへの訪問は、もともと計画された行程への変更であり、同船がトルコへの入港を拒否された後に急遽手配されたものだった。エジプト政府のこの決定について、現時点で公式な理由は示されていない。\n\nアテネからベネチアへの10日間のクルーズは、当局がオンライン上で声明を発表し、このクルーズが「わが社会の構造と道徳的価値観に合致しない行動で知られるグループにチャーターされている」と述べた後、トルコへの入港を阻まれた。\n\n船の到着はそれが「重大な社会的懸念を引き起こした」として取り消されたと当局は付け加えた。「このグループがこのような性質のイベントのために当地を訪問する可能性は一切ありません。」\n\nこのクルーズに参加しているランディ・スロバチェックは自身のブログに次のように書いた。「アトランティスの36年の歴史の中で、入港を拒否されたことは一度もありませんでした。そして今、1週間のうちに2か国でそれが起きました。」\n\n「信じてください、私も同乗している仲間たちも大丈夫です。私たちを歓迎しないなら、私たちは輝きながら別の場所でお金を使います。かつて仲間のブロガー、ジョー・ジャービスが書いたように、『彼らは私たちが見えないことを望んでいる。でも私たちは見える。踊ろう。』」\n\n別のLGBTQツアー会社「ヘルメス・ホリデーズ」のオーナー、カイル・オルセンは、トルコが今週入港を拒否しなければ、エジプトも禁止を出さなかったと考えていると述べた。「他の国々もこれに倣ってゲイクルーズを港から締め出すことに勇気付けられるのではないかと懸念しています」と彼は言った。\n\n「これは世界が向かっている方向の悲しい表れです。次々と政権が右翼グループに取り込まれ、その結果として世界各地でLGBT+の人々の権利が奪われています。」\n\nオルセンは、トルコとエジプトの対応を受けて、今後は顧客にこれらの国を勧めないとした。「ただし、政府の見解が必ずしもその国の人々の見解を反映しているわけではないことに注意することが重要です」と彼は述べた。「過去にトルコやエジプトを何度も訪れており、人々はとても温かく、友好的で、魅力的でした。」\n\nスカーレット・レディに乗船している友人を持つオルセンは、エジプト寄港が乗客にとってツアーのハイライトになるはずだったと話した。乗客たちは、その日に向けて朝6時に起きる準備をしていたという。「これはエジプト政府による文字通り土壇場の決定でした」とオルセンは言った。「前夜まで、すべて問題ありませんでした。」\n\n「多くの乗客がピラミッドや博物館へのプライベートツアーに多額のお金を払っていました。一生に一度の旅になるはずでしたが、今は宙ぶらりんの状態です。」\n\n船は2度目のルート変更を余儀なくされ、金曜日にクレタ島のハニア、日曜日にモンテネグロに寄港する予定となっている。\n\nキャンベルはトルコの決定を「衝撃的だ」とCNNに語り、「その理由はゲイグループだからということです」と述べた。\n\nアトランティスは過去25年間にトルコへのクルーズを13回チャーターしてきたが一度も問題がなかったとも述べ、米国大使館を介した交渉も禁止を覆すには至らなかったと付け加えた。\n\n今回の船上でパフォーマンスを行っている77歳のトニー賞受賞者、ルポーンは、土曜日にインスタグラムでこのニュースへの衝撃を共有した。「私が出演するアトランティスのクルーズがトルコへの入港を禁止されました」と彼女は書いた。「ゲイの男性たちで満ちた——壮大な船が。そして私も。乗っている人たちだというだけでトルコへの入国を拒否されました。」\n\n「激怒していますが、私は乗り続けます。船は他の港に寄港します。私はこのアトランティスクルーズに乗る素晴らしい男性たちのためにパフォーマンスをする準備ができています。彼らはこんな扱いよりずっといいものを受けるに値します。」\n\nアトランティス・イベンツとバージン・ボヤージズにはコメントを求めている。", "vocab": [{"word": "chartered", "definition": "（船・航空機などを）チャーターした、貸し切りにした。特定の団体が乗り物全体を借り切る場合に使われる動詞の過去形。"}, {"word": "emboldened", "definition": "大胆にさせられた、勇気付けられた。他者の行動を見て、自分も同様の行動を取る勇気や動機を持つようになることを指す。"}, {"word": "tirelessly", "definition": "疲れを知らずに、不眠不休で。目標達成のために休まず懸命に努力する様子を表す副詞。"}, {"word": "itinerary", "definition": "旅程、行程表。旅行の訪問地や日程を詳細に記したスケジュールのことを指す名詞。"}, {"word": "hastily", "definition": "急いで、慌てて。十分な準備や検討の時間なく、素早く行動する様子を表す副詞。"}, {"word": "successive", "definition": "次々と続く、相次ぐ。複数のものが途切れることなく連続して起こる状態を表す形容詞。"}, {"word": "reflective", "definition": "～を反映している、～を示している。ある事柄が別の事柄の状態や性質を表している場合に用いられる形容詞。"}]}, {"title_ja": "US-Iran war: Will peace talks resume, and when?", "title_en": "US-Iran war: Will peace talks resume, and when?", "summary_ja": "While Trump said the MoU with Iran is &#039;over&#039;, US officials have reaffirmed Washington&#039;s commitment to continue talks.", "summary_en": "While Trump said the MoU with Iran is &#039;over&#039;, US officials have reaffirmed Washington&#039;s commitment to continue talks.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/10/us-iran-war-will-peace-talks-ever-resume-and-when?traffic_source=rss", "state_media": false, "category": "政治", "full_text": "US-Iran war: Will peace talks resume, and when?\nWhile Trump said the MoU with Iran is ‘over’, US officials have reaffirmed Washington’s commitment to continue talks.\nIran says strikes hit southern areas, but US denies it carried out the attacks\nA United States official has told Al Jazeera that despite two days of launching attacks on Iran this week, Washington remains committed to negotiations with Tehran and that technical talks for a lasting peace deal will continue.\nFrom Tuesday night to Thursday this week, the US and Iran traded attacks in a major escalation of hostilities since a memorandum of understanding (MoU), which triggered a 60-day negotiation period, was signed on June 17.\nThe US initially launched attacks on 85 targets in Iran on Tuesday night and Wednesday morning after commercial ships in the Strait of Hormuz were attacked by the Islamic Revolutionary Guard Corps (IRGC), apparently for not sticking to a route through the strait approved by Iran.\nIran retaliated with attacks on US military assets and infrastructure in Gulf states on Wednesday, triggering more US attacks on 90 Iranian targets on Wednesday night and again on Thursday on Iran’s southern coastal and eastern provinces – including on civilian infrastructure, Iran claimed – further eroding the three-week-old ceasefire pact.\nOn Wednesday, US President Donald Trump told reporters at the NATO summit in Ankara, Turkiye, that he thought the MoU was “over”, triggering fears the ceasefire was off. However, he added that while he would allow peace talks to continue for now, he believed they were a “waste of time”. In an angry tirade, he referred to the Iranian leadership as “scum”.\nTrump appeared to backtrack from this stance somewhat on Thursday, when he told journalists on board the presidential plane, Air Force One, that returning to a full-scale war was not the aim. While it remained on the table, he said, Tehran “wants to make a deal”.\nHowever, early Friday, Iranian media reported multiple explosions across southern Iran, including in Bushehr, where one of the country’s nuclear plants is located, along with Konarak, Choghadak and Bandar Abbas.\nThe US denied any involvement in causing those explosions and, later on Friday morning, it appeared that the guns had finally fallen silent as mediating nations were attempting to get diplomacy back on track. A US official told Al Jazeera that Washington remains committed to negotiations.\nWhile neither side has officially called off talks or declared the MoU at an end, each has accused the other of violating it.\nSo what do we know about whether talks will continue and, if they do, when will that happen?\nWhat talks have happened so far?\nThe US and Iran signed their MoU on June 17, agreeing to stick to a ceasefire on all fronts, including Lebanon, for 60 days to allow for a lasting peace deal to be negotiated. In the MoU, Iran agreed to allow free passage for shipping through the Strait of Hormuz for that period, while the US agreed to lift sanctions on Iranian oil as well as its naval blockade of Iranian ports.\nTalks were then set to begin in Switzerland to agree details about the future of the Strait of Hormuz, Iran’s frozen assets, long-term sanctions relief and Tehran’s nuclear programme, among other issues. However, these were delayed as Israel continued to bombard southern Lebanon, where it has occupied about one-fifth of the country.\nSome direct talks did take place in Switzerland, but since early this month the two sides have engaged in indirect “technical” talks in the Qatari capital Doha. These were paused for the ongoing weeklong funeral processions of former Iranian Supreme Leader Ali Khamenei, who was killed in the first US-Israeli strikes on Tehran on February 28.\nTrump had also promised US attacks would not resume during the funeral proceedings.\nWhen were the talks due to resume?\nTalks had been expected to resume following the state funeral events in Iran, around July 11. However, since the US has struck Iran this week – for the third time while peace talks were ongoing and also during the state funeral proceedings – it is unclear if or when this will happen.\nIranian state media reported early on Friday that the late Supreme Leader Ayatollah Ali Khamenei had been buried in his birthplace of Mashhad at the Shrine of Imam Reza, a vast religious complex with a large golden dome and flanking gilded minarets at the heart of the city. That event marked the conclusion of his funeral.\nIran has previously stated that the US’s habit of launching attacks as talks are ongoing – as it did during the Israel-Iran war last year, and on February 28 this year – caused Tehran not to trust the US leadership.\nHow likely is it that talks will resume at all?\nOn Wednesday, Trump threw the prospect of talks continuing into serious doubt when he said that he thought the MoU with Iran was “over” and described Iranian leaders as “sick people” after Iran and the US exchanged military attacks.\nTrump described the", "translation_ja": "", "vocab": []}, {"title_ja": "Condemned ex-PM Hasina plans December return to Bangladesh", "title_en": "Condemned ex-PM Hasina plans December return to Bangladesh", "summary_ja": "Despite facing a death sentence, exiled Sheikh Hasina pledges to return, setting up a legal clash with Dhaka’s leaders.", "summary_en": "Despite facing a death sentence, exiled Sheikh Hasina pledges to return, setting up a legal clash with Dhaka’s leaders.", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/news/2026/7/10/condemned-ex-pm-hasina-plans-december-return-to-bangladesh?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "Condemned ex-PM Hasina plans December return to Bangladesh\nDespite facing a death sentence, exiled Sheikh Hasina pledges to return, setting up a legal clash with Dhaka’s leaders.\nOusted Bangladeshi Prime Minister Sheikh Hasina says she plans to return to the country from exile in December, despite a death sentence passed during her two-year stay in India.\nThe 78-year-old former leader told the Reuters news agency in an interview published on Friday that she plans to return to Bangladesh alongside senior officials from her Awami League to launch a challenge to the legal shuttering of the party.\nRecommended Stories\nlist of 3 items- list 1 of 3Is Bangladesh killing reforms introduced after student-led protests?\n- list 2 of 3Bangladesh seeks IMF aid: How badly has Iran war hit its economy?\n- list 3 of 3Bangladesh’s top diplomat elected UN General Assembly leader in tight race\nHer return could jolt efforts to stabilise Bangladeshi politics following the 2024 revolt against her increasingly authoritarian rule, which saw her flee after a deadly crackdown failed to quell a student-led uprising.\nHowever, it may also help to improve ties with India, which have been strained by New Delhi’s decision to offer her refuge.\n“They may arrest me on my return, they may even kill me,” Hasina said during the telephone interview from the Indian capital, to which she fled two years ago. “Still, I have to go. If death comes, I want it to come on my own soil.”\nThe former prime minister said that her return is a coordinated effort to challenge the legal actions taken against her party, the Awami League, which has been banned.\nHasina has urged other exiled party members, including former Home Minister Asaduzzaman Khan Kamal who also faces a death sentence, to join her.\n“All together, we will all surrender in court,” she said, insisting that legal proceedings against her are “farcical”.\nHowever, the current authorities have made it clear that they are in no mood to offer quarter to the former leader.\n“After such brutal murders and genocide, the mass murderer Sheikh Hasina has no remorse to this day,” Home Minister Salahuddin Ahmed said at an event on July 4, commemorating the second anniversary of the uprising, reported Bengali daily Prothom Alo.\n“The Awami League has been politically destroyed, eliminated and buried in Delhi,” he added.\nPoint of friction\nSheikh Hasina’s 20-year tenure across multiple terms transformed Bangladesh’s economy, lifting millions out of poverty and turning the nation into a global garment export powerhouse.\nYet, her landmark achievements in infrastructure and development were overshadowed by a stark descent into authoritarianism, systematic suppression of political dissent, and rigged elections.\nShe has begun reorganising her party from abroad, holding online meetings with more than 100 parliamentary constituencies.\nWhile she acknowledged she may be barred from contesting future elections due to her conviction, she criticised Dhaka’s suppression of her political faction. “Why should they suspend the Awami League?” she told Reuters. “If we have done badly, let the people decide.”\nMeanwhile, Hasina’s presence in India has been a major point of friction between the two neighbours.\nBangladesh’s new authorities have repeatedly demanded her extradition, and the Indian media have noted that New Delhi has found itself in a diplomatic bind.\nIndian officials have previously stated they are examining the extradition request and wish to “engage constructively” with Dhaka.\nHasina’s decision to return voluntarily could potentially defuse the bilateral tension.", "translation_ja": "", "vocab": []}, {"title_ja": "FIFA World Cup 2026: Day 29", "title_en": "FIFA World Cup 2026: Day 29", "summary_ja": "FIFA World Cup 2026: Day 29", "summary_en": "FIFA World Cup 2026: Day 29", "source": "Al Jazeera", "tier": "paper", "link": "https://www.aljazeera.com/video/newsfeed/2026/7/10/fifa-world-cup-2026-day-29?traffic_source=rss", "state_media": false, "category": "社会", "full_text": "FIFA World Cup 2026: Day 29\nAl Jazeera’s Rahul Pathak has your #FIFAworldcup26 day 29 recap.\nSave\nShare", "translation_ja": "", "vocab": []}, {"title_ja": "Bangladesh’s ousted leader Hasina plans December return with party colleagues to surrender", "title_en": "Bangladesh’s ousted leader Hasina plans December return with party colleagues to surrender", "summary_ja": "“My party leaders and workers are being subjected to tremendous repression. If death comes, I want it to come on my own soil, where ‌my parents are buried and where their blood was shed,” Ms. Hasina said", "summary_en": "“My party leaders and workers are being subjected to tremendous repression. If death comes, I want it to come on my own soil, where ‌my parents are buried and where their blood was shed,” Ms. Hasina said", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/bangladeshs-ousted-leader-hasina-plans-december-return-with-party-colleagues-to-surrender/article71206327.ece", "state_media": false, "category": "社会", "full_text": "Ousted Bangladeshi Prime Minister Sheikh Hasina, facing a death sentence back home where her party is banned, told Reuters she and senior party colleagues plan to return from exile in India around December and surrender.\nThe South Asian nations longest-serving leader said she and members of her Awami League aim to return voluntarily to the country they fled two years ago and present themselves in court, testing Bangladesh’s handling of its most prominent political opponent.\n“They may arrest me on my return, they may even kill me,” Ms. Hasina, 78, said in the nearly hour-long telephone interview late on Thursday (July 9) and into Friday (July 10).\n“Still, I have to go,” she said. “My party leaders and workers are being subjected to tremendous repression. If death comes, I want it to come on my own soil, where my parents are buried and where their blood was shed.”\nMs. Hasina fled Bangladesh in 2024 after protests ended her 20 years as Prime Minister across multiple terms. The country’s war-crimes court sentenced her in November to death in her absence for ordering a deadly crackdown on a student-led uprising. She has denied the charges from exile.\nA return could sharpen political divisions in the country as the government in Dhaka seeks to restore stability after two years of upheaval. On the other hand, it could improve strained ties with India, which deteriorated sharply after Indian government gave her refuge.\nBangladesh has repeatedly urged Indian government to extradite her.\nMs. Hasina, who has fielded written questions from news outlets but not previously given an interview during her exile, said she has not consulted with any foreign government on whether or when to return.\nThis is the first time she has set out a timetable for her return, said she plans to surrender or said other exiled Awami League leaders would do so. Among them, former Home Minister Asaduzzaman Khan Kamal also faces a death sentence. Reuters could not contact the other party members or establish where they were.\nThe authorities in Dhaka “want to take me back, they are repeatedly sending letters to India seeking to have me sent back”, she said. “I will go myself.”\nSpokespeople for the Bangladesh government did not respond to requests for comment on Ms. Hasina’s remarks.\nForeign Ministry in India did not respond to a request for comment. In April, the Ministry said it was examining Bangladesh’s request to extradite her and that it wanted to “engage constructively with the new government and further strengthen bilateral ties”.\nAllegations of crushing dissent\nMs. Hasina was a dominant figure in Bangladesh for half a century after being thrust into the spotlight by the assassination of her father, an independence leader, and much of her family in a military coup.\nShe fought for democracy early on and was credited with turning around the economy of the Muslim-majority nation of 170 million, but her long rule generated accusations that her government had crushed dissent and dismantled democratic checks and balances — allegations she denies.\nThe crackdown that led to her downfall killed as many as 1,400 people, according to a U.N. report.\n“Cases have been filed against almost all of our leaders and workers, and many of them are in hiding,” Ms. Hasina told Reuters from her exile home in Delhi. “So I said that this time I am returning home, and one day, all of you should come. All together, we will all surrender in court.”\nShe declined to give a date for her return or say exactly when she would surrender or to what court.\n“I believe in justice and I feel that once proceedings start, it will be clear to the people how farcical the court is — and that I want to prove it.”\nMany Awami League workers have faced arrest, legal cases and physical attacks since her government was toppled, according to media reports and government officials.\nMs. Hasina said she had not been in touch with Dhaka over her plans to return. “Democracy, voting rights, the political rights of the Awami League and justice are not subjects for secret talks.”\nShe said she was not worried about jail time, noting that she had been arrested several times before.\nAfter returning from exile in 1981 following her father’s assassination, she was detained repeatedly during campaigns against military rule. She was jailed again in 2007 by a military-backed caretaker government on corruption charges before being freed and winning elections in 2008.\nLeading her to flee this time, she said, were threats on her life as crowds advanced towards her residence.\nHasina on Awami League\n“When a government works for a long time, mistakes can happen — no government is above error,” she said. “But the right to judge the good and bad, the right and wrong of a government belongs to the people. I leave that judgment to the people.”\nMs. Hasina said she has held online meetings covering 125 of Bangladesh’s 300 parliamentary constituencies as part of efforts to reorganise the Awami League.\n“They may have co", "translation_ja": "", "vocab": []}, {"title_ja": "Indian mission in touch with Sri Lanka prison riot victim’s family, say sources", "title_en": "Indian mission in touch with Sri Lanka prison riot victim’s family, say sources", "summary_ja": "The Indian mission sent a note verbale to Sri Lanka’s Ministry of Foreign Affairs on learning about the Indian prisoner’s death in the violence, sources said", "summary_en": "The Indian mission sent a note verbale to Sri Lanka’s Ministry of Foreign Affairs on learning about the Indian prisoner’s death in the violence, sources said", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/indianmission-in-touch-withsri-lanka-prison-riot-victims-family-say-sources/article71206312.ece", "state_media": false, "category": "社会", "full_text": "The High Commission of India in Colombo is in touch with Sri Lankan authorities and the family of the Indian inmate who was among those killed in the recent prison riots, sources told The Hindu on Friday (July 10, 2026). However, neither the Sri Lankan nor Indian authorities have officially commented on the development.\nThe victim, U. Sarathchandran, 73, was killed in the deadly clashes that broke out in a prison in Negombo, located about 35 km north of Colombo and adjoining the Bandaranaike International Airport, on July 6. A total of 28 persons, including eight prison officers, were killed in the riots, one of the most violent episodes witnessed in Sri Lankan prisons. Over 100 inmates were injured. Soon after the riots, authorities moved over 1,000 prisoners, including some Indian nationals in custody, from the Negombo prison to other prisons across the island.\nWhile the Indian inmate is said to have hailed from Kerala, relatives in his native village earlier told The Hindu that he had moved to Chennai over four decades ago, maintaining no contact with his village. “His family prefers to keep details of imprisonment and the circumstances of his death private,” an official source said, requesting anonymity.\nSources confirmed that the Indian mission had sent a note verbale to Sri Lanka’s Ministry of Foreign Affairs on learning about the Indian prisoner’s death.\nAccording to initial investigations, the riots were triggered after rival gangs clashed over some members tipping off prison authorities about a drug operation on the premises.\nRights defenders have long flagged chronic overcrowding in Sri Lankan prisons, which has severely impacted living conditions and safety.\nPrisoners of violence: On Sri Lanka’s prison riots\nAmid long-standing concerns about severe overcrowding in prisons, the Anura Kumara Dissanayake administration has decided to expand its prison capacity, including at an old hospital facility, to manage the crisis. Official data show that Sri Lanka houses around 42,000 inmates across its 22 prisons, with drug-related offences accounting for about two-thirds of the prison population. Official reports point out that the island’s prison system is operating at thrice its capacity.\nMeanwhile, the Human Rights Commission of Sri Lanka has launched an investigation into the violence at Negombo Prison and subsequent reports of attacks in other prisons. The Commission, in a statement issued on Friday, said it would probe the circumstances leading to the violence, deaths, and injuries of inmates and prison officers, allegations of torture and ill-treatment of transferred inmates, denial of access to Commission staff who sought to visit Welikada Prison in Colombo, and the reported death of two inmates in prison custody.\nThe government has appointed a committee headed by a retired judge of the Supreme Court to carry out an investigation into the incident, while the Police Criminal Investigation Department, too, is pursuing a probe.\nPublished - July 10, 2026 05:15 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "Typhoon Bavi takes aim at China as Taiwan’s capital shuts schools; over 17,000 evacuated", "title_en": "Typhoon Bavi takes aim at China as Taiwan’s capital shuts schools; over 17,000 evacuated", "summary_ja": "Many flights to Japan, Hong Kong and other destinations have been cancelled through Saturday (July 11, 2026), though some were still scheduled, Taiwan’s Central News Agency said", "summary_en": "Many flights to Japan, Hong Kong and other destinations have been cancelled through Saturday (July 11, 2026), though some were still scheduled, Taiwan’s Central News Agency said", "source": "The Hindu", "tier": "paper", "link": "https://www.thehindu.com/news/international/typhoon-bavi-takes-aim-at-china-as-taiwans-capital-shuts-schools-over-17000-evacuated/article71206322.ece", "state_media": false, "category": "社会", "full_text": "A powerful typhoon was heading toward China’s east coast on Friday (July 10, 2026), the latest in a series of deadly storms that have already claimed 50 lives this week in two other parts of the country.\nTyphoon Bavi, with maximum sustained winds of 155 kph (96 mph), was first expected to pass north of Taiwan, bringing heavy rains to the island of 23 million people from Friday night (July 10, 2026) into Saturday (July 11, 2026).\nSchools were closed on Friday (July 10, 2026) in Taipei, the island’s capital, and fishing boats have been tied up close together in ports in northern Taiwan. Many flights to Japan, Hong Kong and other destinations have been cancelled through Saturday (July 11, 2026), though some were still scheduled, Taiwan’s Central News Agency said.\nThe typhoon’s current northwest track would take it over some remote Japanese islands before passing north of Taiwan on Saturday. It is forecast to make landfall in China on Saturday night (July 11, 2026) south of Shanghai, near the border between Fujian and Zhejiang provinces.\nMore than 17,000 people have been evacuated in Zhejiang and 170,000 rescue workers placed on standby, the official Xinhua News Agency said. Fujian has suspended some ferry routes because of strong winds and rough seas and called for fishing boats to return to port.\nBavi has weakened from supertyphoon strength earlier this week, when it brought violent winds to Saipan and other U.S. territories in the Pacific.\nIn southern China, authorities announced on Thursday (July 9, 2026) that 39 people had died in flooding from Tropical Storm Maysak, which drenched parts of the Guangxi region for days with record rainfall.\nThe rains breached reservoirs, including the dramatic collapse of part of a dam in Hengzhou that inundated a wide area with fast-flowing muddy water. The floods stranded people on the second and higher floors of buildings for days, many without power, until rescuers could reach them.\nAnother 11 people died in central China when severe thunderstorms and tornadoes wreaked havoc in Hubei province on Monday night (July 6, 2026).\nSeparately, a landslide killed 21 forestry workers in western China’s Gansu province on Tuesday (July 7, 2026) in a disaster that was not storm-related.\nPublished - July 10, 2026 04:59 pm IST", "translation_ja": "", "vocab": []}, {"title_ja": "The Invite review: Penelope Cruz steals the show in Olivia Wilde’s relationship drama", "title_en": "The Invite review: Penelope Cruz steals the show in Olivia Wilde’s relationship drama", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/entertainment/movie-review/the-invite-review-penelope-cruz-steals-the-show-in-olivia-wildes-relationship-drama-10780678/", "state_media": false, "category": "社会", "full_text": "Click here to follow Screen Digital on YouTube and stay updated with the latest from the world of cinema.\nThe Invite review: Penelope Cruz steals the show in Olivia Wilde’s relationship drama\nThe Invite movie review: Pina could easily be insufferable, particularly in the ease with which she dispenses advice, from perimenopause to desire. However, Penélope Cruz injects warmth and charm to make Pina a guest you want to host – and impress.\nThe Invite movie review: Perhaps nothing spoils a meal faster than bad company. Scratch that. It takes bad company trying to put on a happy face to make it really stink.\nAnd, Angela (Olivia Wilde) is trying hard, really hard. Why she is, is evident to us by and by as layers are peeled off the resentment and bitterness that have built up between her and husband Joe (Seth Rogen).\nThe guests for whom Angela plans a spread, from an elaborate charcuterie board to a from-the-recipe-book soufflé, are their upstairs neighbours. Pina is Spanish and “beautiful” and “cool” and “has presence” (an effortlessly posh, and aware of it, Penélope Cruz). Angela clearly is taken in by her and, if not that, with the clearly loud sex-filled relationship she has with boyfriend Hawk (Edward Norton).\nJoe obsesses about it too, alarming Angela with the threat that he will complain to them about it. He is angry at Angela for springing the guests upon him at the end of another frustrating day for him, teaching music at a small conservatory school. Plus he has made home painfully, riding uphill on a collapsible bike that Angela has him use for all the “good” reasons.\nSo it is that by the time Pina and Hawk ring the bell to Angela-Joe’s newly renovated, and ready-to-be-shown-off, home, tensions are literally waiting to spill over.\nIn her third film as director, Wilde has chosen to remake a Spanish film, which itself was based on a stage play. And, The Invite could very well be a play, as the camera weaves in and around four characters and a tight space. They are in each other’s ways, traipsing around the clutter of a home and a house and a life, in a deliberate and often careless way.\nIf you think the film will go a certain way, it is surprising the tonal shifts The Invite makes. The first part is a comedy and contrast of manners, between a couple who are well-settled into classically prosaic parenthood and middle age, and a couple who are still discovering each other in the first flush of their relationship. Unlike some other films which have attempted the same, Angela’s artifice in presenting a surface as polished as her art college-learned house decor doesn’t fool anybody. It’s also not treated for laughs by those picking up the cues.\nThe second part is where the sex comedy comes in as Angela and Joe become aware of how much more adventurous Pina and Hawk’s lives are than they imagined. Angela and Joe drop all pretence of coolness here, and as avidly demand a peek into the lives of their neighbours as any of us would.\nIn the third part, The Invite takes another turn, for a glimpse into how relationships turn into but also how they began; how the longer two people are together, the more oblivious they can be to each other. “We only have a few chances at a meaningful relationship in life,” says Pina. And the reality of that hits you.\nWhile uniformly well-acted, The Invite’s stand-out performance is by in-house cynic and perennial-pessimist Rogen. As a former band member and a one-song wonder, as a husband who feels increasingly distant from his wife, and as a man with a back problem, he pulls off a difficult role as the film’s giant sore thumb.\nAlso Read – Moana 2 movie review: Dwayne Johnson returns, but Disney’s cynical remake fails to go far\nOn the other end is Cruz as Pina, the woman with the looks of the actor and the credentials of being a “psychotherapist” and “sexologist”. As the smartest person in the room, Pina could easily be insufferable, particularly in the ease with which she dispenses advice, from perimenopause to desire. However, Cruz injects warmth and charm to make Pina a guest you want to host – and impress.\nThe relationship between Hawk and Pina is the only inauthentic note in The Invite, with the minor squabble they have slapped on clumsily.\nBut, we can take this pinch of salt.\nThe Invite movie director: Olivia Wilde\nThe Invite movie cast: Olivia Wilde, Seth Rogen, Edward Norton, Penélope Cruz\nThe Invite movie rating: 4 stars", "translation_ja": "", "vocab": []}, {"title_ja": "DTU launches new integrated Data Science, Applied Statistics programmes and Economics double major for BTech students", "title_en": "DTU launches new integrated Data Science, Applied Statistics programmes and Economics double major for BTech students", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/education/dtu-launch-new-integrated-data-science-applied-statistics-programmes-btech-students-jee-main-10780658/", "state_media": false, "category": "経済", "full_text": "Delhi Technological University (DTU) announced a series of new academic programmes at its annual press conference, held to mark the completion of 85 years of the institution. DTU has announced the introduction of two new Integrated BSc–MSc programmes — in Data Science and in Applied Statistics — starting from the 2026–27 academic session.\nThe university has also launched a 4-and-1 Accelerated BTech–MS programme in collaboration with the University of Houston in the US, offering students a pathway to complete their BTech at DTU and subsequently pursue an MS degree at the University of Houston, with eligible academic credits transferable, subject to admission policies.\nIn the future, the university plans to launch three new BTech programmes: Mechanical and Automation Engineering from the 2026–27 session, Computer Science and Engineering, and Quantum Technology, both from the 2027–28 session.\nIn a move toward interdisciplinary education, DTU has introduced a double major track in Economics for BTech students from the 2026–27 session. The track includes courses such as Network Economics, Platform Economics, Economics of AI, Game Theory, Mechanism Design, Machine Learning for Economics, and High-Frequency Algorithmic Trading, aimed at helping engineering graduates build analytical and economic skills alongside their core discipline.\nThe university said it is among the first in the country to integrate industry-recognised micro-credential programmes into its curriculum, in collaboration with organisations including the National Institute of Solar Energy, Bureau of Energy Efficiency, ANSYS-Synopsys, Siemens, IRISET, Premas Life Sciences and the Wadhwani Foundation. These cover domains such as renewable energy, semiconductor design, railway signalling, biotechnology, and entrepreneurship.\nFor younger students, DTU has introduced a six-week, 3-credit Certificate Course on Applied AI, Data Analytics and Entrepreneurship, designed for students from Class 9 onwards. The university has also introduced a Sports Analytics Programme, covering skills in data analytics, artificial intelligence and performance analysis.\nThrough its Centre for Technology Enhanced Learning (CTEL), DTU has launched online certificate programmes for working professionals in Artificial Intelligence, Renewable and Sustainable Energy Management, and CSR, ESG & Corporate Sustainability.\nSpeaking at the event, DTU Vice Chancellor Prof. Prateek Sharma said the university’s initiatives are aligned with the vision of the National Education Policy 2020 and India’s aspirations of becoming a global knowledge economy through interdisciplinary education, research excellence, industry partnerships and entrepreneurship, while addressing the national visions of Atmanirbhar Bharat and Viksit Bharat.\nThe University, in its press release, mentioned that they have secured nearly 40 patents during the year and received major research funding from agencies including ANRF, MeitY, DRDO, ISRO, and the Ministry of Science & Technology.\nTo further strengthen research culture, the University has introduced new faculty support schemes, including the Young Faculty Grant, Equipment Matching Grant, Faculty Interdisciplinary Research Project and Multi-Institutional Faculty Interdisciplinary Research Project, along with institutional awards recognising excellence in sponsored research and timely doctoral completion.\nDTU has also signed a collaboration with several leading organisations, including ASSOCHAM, Esri India, the Indian Army, Defence Space Agency, Bajaj Auto Limited, GRIHA Council, Gujarat Fluorochemicals Limited, National Council for Cement and Building Materials, CSIR-NPL, IUAC, IRISET, Darshan Education Foundation, Premas Life Sciences, Navjyoti India Foundation, ANSYS-Synopsys, ICMAI and the Ministry of Statistics and Programme Implementation.", "translation_ja": "", "vocab": []}, {"title_ja": "‘Rarest of rare’: Death sentence for trader who killed toddler over rejected proposal", "title_en": "‘Rarest of rare’: Death sentence for trader who killed toddler over rejected proposal", "summary_ja": "", "summary_en": "", "source": "Indian Express", "tier": "paper", "link": "https://indianexpress.com/article/cities/lucknow/rarest-of-rare-firozabad-court-death-sentence-jitendra-pathak-toddler-murder-40-days-10780715/", "state_media": false, "category": "経済", "full_text": "Stay updated with the latest - Click here to follow us on Instagram\nStating that the case falls under the “rarest of rare” category, a Firozabad court Friday sentenced a 28-year-old trader to death for killing an 18-month-old boy, whom he slammed to the ground eight times after the child’s mother rejected his marriage proposal.\nThe verdict came within 40 days after the murder. Jitendra Pathak alias Viraj was convicted of murder on Thursday.\n“The court found the case to fall within the ‘rarest of rare’ category and sentenced Pathak to death,” said Rajeev Kumar Upadhyay, District Government Counsel in Firozabad.\nDuring the trial, prosecutors submitted CCTV footage of the incident, which had gone viral on social media, as evidence.\nPolice said their investigation found that the child’s mother, Rati Sharma (24), had rejected Pathak’s marriage proposal, telling him that she already had a son and would not abandon the child. According to the police, Pathak viewed the boy as an obstacle to the relationship.\nOn May 30, Pathak lured the child out of the house on the pretext of buying him sweets. Instead, police said, he took the child about 50 metres away to a deserted stretch of road, where he repeatedly slammed him onto the ground.\n“We are relieved that the court has sentenced the accused to death for a horrific crime that was captured on camera,” said Rati’s mother Anusuiya Sharma, the complainant in the case.\n“We now want to see the sentence carried out. Our fight will continue until then.”\n“I thank the police for completing the investigation swiftly,” she said.\nRati had been living at her parents’ home since January this year due to marital disputes. Around this time, Rati came in contact with Pathak, who was her husband’s relative, and he began visiting the family regularly.\nThe prosecution said Pathak later proposed marriage to Rati, but she rejected him and tried to distance herself. But he continued visiting her home, attempting to persuade her to reconsider while promising to support her in her legal dispute with her husband.\nThey said Rati had made it clear to Pathak that she would not abandon her son. Her refusal angered him and he began viewing the child as an obstacle.\nOn May 30, the prosecution said Rati and her mother travelled to Shikohabad to consult a lawyer over her marital dispute. Since their appointment was scheduled for later in the evening, they waited at the home of a family acquaintance, Pushpalata, in Yadav Colony.\nThe prosecution alleged that Pathak traced their whereabouts and arrived at the house, pressing Rathi to divorce her husband and marry him. She rejected him again.\nPathak then lured the boy and attacked him.\nResidents initially mistook the repeated thuds for the sound of cement bags being unloaded nearby. It was a local resident who noticed what was happening on a CCTV feed and rushed outside, police said.\nPolice alleged that Pathak then stopped the assault, carried the child back to Pushpalata’s home, and claimed he had been injured in a fall. He left him at the doorstep before fleeing.\nThe child was later found unresponsive by family members, who informed the police.\nHours later, police arrested Pathak in an encounter, in which he sustained gunshot wounds to both legs, and was taken into custody.\nPolice had filed the chargesheet in six days.\n“We will appeal against the judgment before the higher court,” said the defence lawyer, who asked not to be identified.\nStay updated with the latest - Click here to follow us Xo0Y29RamNyanhVcUF6U2ZpUEdITV9ubk1oMF82c3FjM2ljZUZVbmZ0UG5sY0hkRTNvNGVqTnpuNlR2N21sYUZybkJHeVBHUkF2MUlUSFlpREtOQTFXaVJVUmfSAcgBQVVfeXFMUDJCRm16ZDU5bjViV21mdm1KMzJ5c3JnVjBEcVpJUGF2b0tnZ1JkRGhVVDVYM1pyMFNKQUNIdDVGQWRkTjNhR0dSai1kQS1nLVFwUFlDYm1aMjFaNEx2Y1YzWjVRWlNfN3lPWC1ERF9ZcVFhOFpTY3VVX0w2bmNyR2Rick9VLXRDemFydWFXOHhaSFhLai1PSmdfUlhDT0NiY0Z0TGJFUGZxLVhDdmxmZ25hcHl0T3dhWm9VeHZaWTRPa252QVNQdkM?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "‘The future looks bright for Morocco’: Ouahbi backs Atlas Lions after historic FIFA World Cup run", "title_en": "‘The future looks bright for Morocco’: Ouahbi backs Atlas Lions after historic FIFA World Cup run", "summary_ja": "Despite the defeat, Ouahbi admitted his side had come up against one of the strongest teams in international football. The post ‘The future looks bright for Morocco’: Ouahbi backs Atlas Lions after historic FIFA World Cup run appeared first on Premium Times Nigeria .", "summary_en": "Despite the defeat, Ouahbi admitted his side had come up against one of the strongest teams in international football. The post ‘The future looks bright for Morocco’: Ouahbi backs Atlas Lions after historic FIFA World Cup run appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/sports/football/894299-the-future-looks-bright-for-morocco-ouahbi-backs-atlas-lions-after-historic-fifa-world-cup-run.html", "state_media": false, "category": "政治", "full_text": "Morocco’s dream of another FIFA World Cup semi-final appearance came to an end on Thursday. Still, head coach Mohamed Ouahbi believes the Atlas Lions have laid the foundations for even greater success after becoming the first African nation to reach the quarter-finals in back-to-back World Cups.\nThe North Africans saw their impressive campaign halted by France, who secured a 2-0 victory to book their place in the semi-finals. While the result ended Morocco’s hopes of matching their historic Qatar 2022 achievement, it did little to diminish the tournament’s status as another landmark for African football.\nHaving reached the last four in Qatar, Morocco returned four years later to establish themselves among the world’s elite once again, achieving a feat no other African nation has managed.\nDespite the defeat, Ouahbi admitted his side had come up against one of the strongest teams in international football.\nFrance arrived in the quarter-finals as one of the favourites to lift the FIFA World Cup 2026 title, having won the tournament in Russia in 2018 before finishing runners-up in Qatar four years later.\nReflecting on the contest, the Morocco coach acknowledged that Les Bleus gave his players very little opportunity to impose their style of play.\n“We have to acknowledge that we were up against a very difficult opponent,” Ouahbi said.\n“We struggled a great deal in the first half, but Bounou’s penalty save kept us in the game.”\n“In the second half, we defended better and were calmer in possession. We started the second half well, but their goal came from a rather strange sequence—a scramble, really—and Mbappe’s individual brilliance was what ultimately led to the goal.”\nBuilding for the future\nOuahbi only took charge of the Moroccan national team in March, less than three months before the start of the World Cup.\nDespite the short preparation period, he guided the Atlas Lions to another memorable campaign and believes the experience will serve as a springboard for future success.\nThe coach, who also led Morocco to glory at the FIFA U-20 World Cup Chile 2025, insisted the focus must now shift towards strengthening the squad and developing greater depth.\n“It was difficult in the end, but we have to keep believing and keep working,” Ouahbi said.\n“We need to work on the fundamentals so that when injuries strike, or when players aren’t at their best, we have a wider range of options on the bench that we can rely on.”\n“We will carry on. We won’t stop here. We’re disappointed because we wanted more, but we have to accept what happened today.”\nLooking beyond the disappointment, the Moroccan tactician expressed confidence that the country’s golden generation still has plenty to offer.\n“The future looks bright for Morocco if we continue on this path. We have a strong group of players and some outstanding young talent.”\n“We’ll remain confident, and we won’t allow this defeat to discourage us.”\nBouaddi embraces the lessons.\nOne of Morocco’s standout performers at the 2026 FIFA World Cup, Ayyoub Bouaddi, echoed his coach’s sentiments after the defeat.\nThe young midfielder admitted the Atlas Lions had hoped to control possession and dictate the rhythm of the game, but found themselves up against a French side whose quality made that task extremely difficult.\n“We wanted to play our usual game, and we’d worked on certain aspects of that with the coach in training, but football isn’t an exact science, and things didn’t go the way we’d planned,” Bouaddi said.\n“We have to adapt. Our opponents played well, and we have to accept that.”\nThe youngster also praised his teammates’ commitment, insisting the players left everything on the pitch despite the result.\n“Before the match, we knew we were facing a very strong French team. We knew it would be difficult and that we’d have to put in a huge effort, and that’s exactly what the players did.”\n“Everyone gave 100%. But that’s football: You can’t win every match.”\nFor Bouaddi, the quarter-final defeat will serve as an important lesson for a squad that continues to grow with every major tournament.\nREAD ALSO: Mbappe’s Era: How France’s record breaker is becoming a World Cup immortal\nThe midfielder believes the experience of facing one of the world’s strongest teams has highlighted the fine margins required to compete for football’s biggest prize.\n“This match will help us develop for future tournaments because it showed us what we’re missing and what small details we need to address if we want to go even further.”\nAlthough Morocco’s journey ended at the quarter-final stage, the Atlas Lions leave North America with another piece of history after becoming the first African nation to reach the last eight at consecutive FIFA World Cups.\nMore importantly, they depart with a squad blending experienced campaigners with an exciting new generation of talent, one that Ouahbi believes is capable of taking Moroccan football to even greater heights in the years ahead.", "translation_ja": "", "vocab": []}, {"title_ja": "Mbappe’s Era: How France’s record breaker is becoming a World Cup immortal", "title_en": "Mbappe’s Era: How France’s record breaker is becoming a World Cup immortal", "summary_ja": "From lifting the trophy in Russia to producing one of the greatest individual performances ever seen in a World Cup final and continuing his remarkable exploits in North America, the France forward has made the sport's biggest stage his own The post Mbappe&#8217;s Era: How France’s record breaker is", "summary_en": "From lifting the trophy in Russia to producing one of the greatest individual performances ever seen in a World Cup final and continuing his remarkable exploits in North America, the France forward has made the sport's biggest stage his own The post Mbappe&#8217;s Era: How France’s record breaker is", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/news/top-news/894288-mbappes-era-how-frances-record-breaker-is-becoming-a-world-cup-immortal.html", "state_media": false, "category": "政治", "full_text": "When Kylian Mbappé announced himself to the world as a fearless 19-year-old at the 2018 FIFA World Cup, it was clear France had unearthed a generational talent. Eight years later, that promise has evolved into an extraordinary legacy that has firmly established the French captain among the greatest players the tournament has ever produced.\nAcross three World Cup editions, Mbappé has combined trophies, records, unforgettable performances and astonishing consistency to carve out a place in football history.\nFrom lifting the trophy in Russia 2018 to producing one of the greatest individual performances ever seen in a World Cup final in 2022 and continuing his remarkable exploits in North America, the France forward has made the sport’s biggest stage his own.\nFrom Teenage Sensation to World Cup Icon\nHaving featured at the 2018, 2022 and 2026 FIFA World Cups, Mbappé has become one of the defining players of his generation. His debut came in Russia at just 19 years old, where his blistering pace, fearless attacking play and composure in front of goal played a crucial role in France’s triumphant campaign.\nThat tournament ended with Mbappé lifting the FIFA World Cup after Didier Deschamps’ side defeated Croatia 4-2 in the final, earning the first World Cup winners’ medal of his career.\nSince then, he has appeared in two World Cup finals. After helping France win the title in 2018, he returned to the biggest match in world football four years later in Qatar, where Les Bleus suffered a heartbreaking defeat to Argentina after a thrilling 3-3 draw that was eventually decided 4-2 on penalties.\nWhile the result denied him a second consecutive World Cup crown, the final further enhanced his reputation as one of football’s greatest big-game players.\nBy the quarter-final stage of the 2026 tournament, Mbappé had accumulated 20 World Cup appearances, seven in Russia, seven in Qatar and six in North America.\nThat remarkable total has made him France’s most-capped player in FIFA World Cup history, moving him ahead of Hugo Lloris, Antoine Griezmann, Olivier Giroud and Raphaël Varane. Only Argentina captain Lionel Messi, with 30 appearances, has played more World Cup matches than the French superstar.\nEven more impressive than his appearances is his extraordinary record of success as the Real Madrid striker has won 17 of his 20 World Cup matches, recording six victories in 2018, five in 2022 and another six in 2026.\nFrance’s 3-0 victory over Sweden at the 2026 tournament saw him become the French player with the most World Cup wins. His next victory, against Paraguay, drew him level with Brazilian legend Cafu on the all-time list, while France’s quarter-final triumph over Morocco saw him equal German great Miroslav Klose with 17 victories. Only Messi, who has recorded 20 World Cup wins, sits above him.\nAcross his three World Cup campaigns, Mbappé has also recorded two draws one in 2018 and another in 2022, and remarkably, only one defeat a 1-0 group-stage loss to Tunisia during the Qatar World Cup.\nBreaking Records on Football’s biggest stage\nIf there is one statistic that truly defines Mbappé’s World Cup greatness, it is his goalscoring record.\nThe French captain has scored 20 goals in 20 World Cup matches, maintaining an astonishing average of one goal per game.\nHe netted four times during France’s victorious campaign in 2018 before producing eight goals at Qatar 2022 to finish as the tournament’s leading scorer. He has matched that tally with another eight goals at the 2026 World Cup.\nHis exploits in North America propelled him into the upper reaches of the competition’s all-time scoring chart. A brace against Sweden moved him clear in second place behind Lionel Messi, further cementing his status among the World Cup’s greatest marksmen.\nMbappé has also become one of the competition’s most creative attackers, contributing five assists during his World Cup career. He registered two assists in Qatar before adding another three during the 2026 tournament.\nHis consistency is further reflected by the number of multi-goal performances he has produced.\nAcross three editions, Mbappé has registered six braces one in 2018, two in 2022 and three in 2026.\nHe also owns one of the most memorable hat-tricks in football history, becoming the first player since Geoff Hurst to score three goals in a World Cup final when he almost single-handedly dragged France back into the 2022 showpiece against Argentina.\nPerhaps no player has delivered more consistently when the pressure is at its highest as the ex-PSG man has scored 12 goals in World Cup knockout matches, the highest total in the history of the competition.\nBefore arriving at the 2026 World Cup, he already had eight knockout-stage goals, placing him alongside Brazilian legends Leônidas and Ronaldo. A brace against Sweden moved him into sole possession of the record before further goals against Paraguay and Morocco extended his tally to 12.\nHis ability to shine on football’s biggest occasion", "translation_ja": "", "vocab": []}, {"title_ja": "“How Hubert Ogunde changed my life, convinced me to quit nursing” — Iya Rainbow", "title_en": "“How Hubert Ogunde changed my life, convinced me to quit nursing” — Iya Rainbow", "summary_ja": "“In 1986, I wrote and submitted my resignation letter to the hospital.” The post “How Hubert Ogunde changed my life, convinced me to quit nursing” — Iya Rainbow appeared first on Premium Times Nigeria .", "summary_en": "“In 1986, I wrote and submitted my resignation letter to the hospital.” The post “How Hubert Ogunde changed my life, convinced me to quit nursing” — Iya Rainbow appeared first on Premium Times Nigeria .", "source": "Premium Times", "tier": "paper", "link": "https://www.premiumtimesng.com/entertainment/nollywood/894282-how-hubert-ogunde-changed-my-life-convinced-me-to-quit-nursing-iya-rainbow.html", "state_media": false, "category": "社会", "full_text": "Veteran actress Idowu “Iya Rainbow” Philips has revealed how the late theatre icon Hubert Ogunde persuaded her to resign from nursing and pursue acting full-time, a decision she says changed the course of her life.\nBefore becoming a full-time actress, Iya Rainbow balanced her nursing career (at the Infectious Disease Hospital in Yaba, the General Hospital in Lagos, and others) with performances for the Osumare Theatre Group. Speaking in an interview on Feel Right News TV on Thursday, the 83-year-old recalled that Ogunde urged her to embrace theatre after watching her performance in the stage production Rabiatu Dance Drama at the Glover Memorial Hall in Lagos.\nWidely regarded as the father of modern Nigerian theatre, Ogunde pioneered travelling theatre in Nigeria and mentored generations of actors, making his endorsement one of the industry’s highest honours.\nOgunde’s advice\nThe actress said, “When we wanted to perform the Rabiatu Dance Drama. Everybody knows he was the one who did dance drama, but before my husband (Augustine Ayanfemi Philips) died, he had taught us. We performed the drama in Lagos, and Baba Ogunde and his three wives came to see it. When we were done, he said, ‘Wasn’t that Idowu who performed Rabiatu?\n“Wasn’t it Idowu who performed so well just now? And she said she didn’t want to leave nursing? Go and resign from nursing and take up theatre fully. You’re good at it.’ His wives greeted me, and that was all. In 1986, I wrote and submitted my resignation letter to the hospital.”\nOgunde’s influence extended beyond the stage. Over the years, several veteran actors have credited him with shaping their careers and encouraging them through difficult moments.\nLast week, veteran actor Adebayo “Oga Bello” Salami also described Ogunde as his mentor who persuaded him not to quit acting after facing public accusations following the deaths of his mentor, Ojo “Baba Mero” Ladipo, and the veteran theatre pioneer’s wife.\nSupport after her husband’s death\nBeyond encouraging her to pursue acting, Iya Rainbow said Ogunde stood by her after the death of her husband, Augustine “Baba Osumare” Philips, founder of the Osumare Theatre Group, in 1984.\n“I salute Hubert Ogunde; may his soul rest in perfect peace. He was my husband’s boss and trained him. When my husband died, whenever I wanted to go to his house, I always put on a mourning dress. He called me one day and said, ‘Idowu, you must not come here with this kind of dress again.’ His wife gave me another dress that day, and he asked them to tear the one I had worn to his house.\n“He said, ‘You don’t mourn with the body but with the mind.’ He supported the group my husband left behind and me. Our leader then was Tajudeen Gbadamosi. We went to Ososa, Ogun State, where we used to rehearse.”\nPatients protested\nShe also recalled that her decision to resign from nursing was met with resistance from patients who pleaded with her to stay.\n“The patients I was taking care of refused; they said they would not allow me to resign. They said that even when they did something wrong, I would scold them but still take care of them.\n“There are a lot of patients whose treatment in the hospital I paid for with my own money,” she said.\nIya Rainbow is regarded as a foundational figure in Yoruba cinema, having appeared in more than 500 films throughout her decades-long career.\nShe last made headlines when she joined the growing calls for the release of the abducted teachers and pupils in Oyo State.", "translation_ja": "", "vocab": []}, {"title_ja": "Moscow Still Has Art and Culture. Just Don’t Say ‘Ukraine.’", "title_en": "Moscow Still Has Art and Culture. Just Don’t Say ‘Ukraine.’", "summary_ja": "An eerie limbo prevails at small art shows, independent theaters and private political clubs, where the war is the elephant in the room.", "summary_en": "An eerie limbo prevails at small art shows, independent theaters and private political clubs, where the war is the elephant in the room.", "source": "New York Times", "tier": "paper", "link": "https://www.nytimes.com/2026/07/10/world/europe/russia-moscow-ukraine-war.html", "state_media": false, "category": "政治", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "Iran’s Supreme Leader Remains Absent, a Void at the Top of the Regime", "title_en": "Iran’s Supreme Leader Remains Absent, a Void at the Top of the Regime", "summary_ja"
