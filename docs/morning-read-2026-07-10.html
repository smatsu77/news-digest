cXptZ2dJb2hBeGl5OFNEWjFhc25yZGpCU2JVWEZpOHEyaERuZnlQWEhOZkM4XzNITU5rd1BvQmpRVmRiRnUyQkEyc01wWmhZaWZn?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "ムバッペがPK失敗後に得点、フランスがモロッコを圧倒しW杯準決勝進出", "title_en": "Mbappe Scores After Missed Penalty as France Beat Morocco to Reach World Cup Semis", "summary_ja": "キリアン・ムバッペはペナルティキックを外した後に得点を決め、フランスはモロッコを破ってワールドカップ準決勝に進出した。フランスは試合を通じて攻撃力の高さを見せつけ、相手を圧倒した。この勝利により、ディフェンディングチャンピオンは注目の準決勝へと駒を進めることとなった。", "summary_en": "Kylian Mbappe scored after missing a penalty as France defeated Morocco to advance to the World Cup semi-finals. France dominated the match, showcasing their attacking quality throughout. The victory sets up another high-profile semi-final clash for the defending champions.", "source": "Reuters", "tier": "wire", "link": "https://news.google.com/rss/articles/CBMipAFBVV95cUxPbFQxckEzYndFZjluM1NJVDZjN0l6QVdqQ0xLX0JwQ0E5bmVkY0J2UGZMWWd2Q2JYUllPUk4tUUpFeFZFUEx0VlU2TUlyUU9la3JfREZoRDh5NEFGLVdRVjRFQmZIT0ZaYmZmdUZ6NndvTG5MM0VNRnhhb0VRcW1ITG5Rd2pmM0lSNWw1Y1J5Tk9OZFA5aDZ3WmdaaEhRVFN1LURLMg?oc=5", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "イランの最高指導者ハメネイ師、マシュハドで埋葬―大勢の群衆が集結", "title_en": "Massive Crowds Gather in Mashhad as Iran's Supreme Leader Khamenei Is Buried", "summary_ja": "イランの最高指導者アリー・ハメネイ師が、イランと隣国イラクの5都市にわたる6日間の公式追悼式を経て、マシュハドのイマーム・レザー廟に埋葬された。ハメネイ師は2月28日、イスラエルによるテヘランの自宅へのミサイル攻撃で死亡しており、これはイランと米国・イスラエルの戦争初日の出来事だった。葬儀は米国との新たな軍事的緊張と、トランプ大統領が「終わった」と示唆した暫定和平合意の不透明感によって影を落としている。", "summary_en": "Iran's late Supreme Leader Ayatollah Ali Khamenei was buried at the shrine of Imam Reza in Mashhad after six days of public mourning across Iran and Iraq. Khamenei was killed in an Israeli strike on his Tehran residence on February 28, the first day of Iran's war with the US and Israel. The funeral has been overshadowed by renewed US-Iran hostilities and uncertainty over a preliminary peace deal, which Trump has suggested may be 'over.'", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c5yzm8m4peeo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Huge crowds in Mashhad as Iran's late supreme leader is buried\n- Published\nHuge crowds lined the streets of the holy city of Mashhad for the burial of Iran's late supreme leader, Ayatollah Ali Khamenei.\nKhamenei was laid to rest at the shrine of Imam Reza, Iran's holiest Shia Muslim site, marking the end of six days of public mourning ceremonies in five cities across Iran and neighbouring Iraq.\nThe burial, reported by the state news agency IRNA, came after an exchange of strikes between Iran and the US that threatens to derail a preliminary deal to end the war in which he was killed.\nEarlier, Iran's Revolutionary Guards accused the US of bombing two bridges on the railway line from the capital, Tehran, to Mashhad overnight \"in an effort to overshadow\" the funeral.\nKhamenei and several members of his family were killed in an Israeli strike on his residence in Tehran on 28 February, the first day of Iran's war with the US and Israel.\nHe was succeeded as supreme leader by his son Mojtaba, who has not been seen in public since he was reportedly seriously wounded in the same attack.\nThe 56-year-old did not participate in the funeral ceremonies in Tehran and Qom, and there was no indication that he attended the burial.\nOn Thursday morning, a plane carrying the coffins of Ali Khamenei, his granddaughter, son-in-law, daughter and Mojtaba's wife landed in Mashhad after flying from Iraq, where huge crowds took part in processions to two Shia shrines in the cities of Najaf and Karbala.\nIn the afternoon, Iranian TV footage showed thousands of mourners dressed in black walking along a main boulevard in central Mashhad. Many were waving Iranian flags and red banners symbolising vengeance.\nSome people were also holding photos of the late supreme leader and placards calling for the death of US President Donald Trump, who, along with Israeli Prime Minister Benjamin Netanyahu, ordered the joint attack on Iran four months ago that triggered the war.\nHanging above the boulevard were banners with official slogans including \"We must rise\".\n\"The loss of the leader is heavier than losing our parents,\" Hoda, a 35-year-old housewife, told AFP news agency. \"Only the death of Trump and Netanyahu will soothe our pain.\"\nLater, a lorry transported Khamenei's coffin slowly through the crowds towards the Imam Reza shrine, eventually reaching the complex as night fell.\nImam Reza was the eighth Shia imam and the only one of the 12 believed to have been buried in Iran. His mausoleum, which dates to the 9th Century and has a towering golden dome and minarets, is visited by millions of pilgrims each year.\nKhamenei was born in Mashhad, Iran's second-largest city located in the north-east of the country, and studied at seminaries in the city before moving to Qom, the centre of Iran's Shia clerical establishment.\nHe was appointed supreme leader in 1989 after the death of the Islamic Republic's founding father, Ayatollah Ruhollah Khomeini.\nDuring his 37 years in power, he maintained a firm grip on Iran's politics and its armed forces, and suppressed domestic challenges, sometimes violently. He also took consistently hard-line stances on external matters, including Iran's confrontation with the US and Israel.\nIran's leadership wanted the choreographed funeral ceremonies for Khamenei to project unity and strength after a war, during which thousands of people have been killed, and the mass protests in January, when a crackdown by security forces left thousands more people dead.\nThe public mourning has, however, been marred by the renewed hostilities with the US.\nTrump warned that US attacks could get \"much worse\" after a second night of strikes on Thursday, which the US military said were intended to degrade Iran's ability to target commercial shipping in the Strait of Hormuz.\nThe Revolutionary Guards said Iranian forces had attacked US military facilities and infrastructure in Kuwait, Bahrain and Qatar in response.\nThree weeks ago, the US and Iran signed a memorandum of understanding (MoU) that called for an end to hostilities on all fronts and the reopening of the Strait of Hormuz. It also gave them two months to reach a final deal that covers Iran's nuclear programme, US sanctions and a permanent truce.\nLast week, mediator Qatar said Iranian and US negotiators made progress at indirect talks in Doha following a four-day exchange of strikes, and that their next meeting would take place after the conclusion of the ceremonies for Khamenei.\nBut on Wednesday, Trump told reporters that he believed that the MoU was now \"over\".\nRelated topics\n- Published3 days ago\n \n- Published21 hours ago", "translation_ja": "マシュハドで大群衆、イランの故最高指導者が埋葬される\n\nイランの故最高指導者、アヤトラ・アリー・ハメネイ師の埋葬に際し、聖地マシュハドの街路には大勢の群衆が並んだ。\n\nハメネイ師は、イランで最も神聖なシーア派イスラム聖地であるイマーム・レザー廟に埋葬された。これにより、イランと隣国イラクの5都市にわたって行われた6日間の公式追悼式が幕を閉じた。\n\nイランの国営通信IRNAが報じた埋葬は、イランと米国の間で一連の空爆が応酬される中で行われた。この応酬は、ハメネイ師が死亡した戦争を終結させる暫定合意を崩壊させる恐れがある。\n\n先立って、イランの革命防衛隊は、米国が首都テヘランからマシュハドへの鉄道路線上の橋2か所を「葬儀を覆い隠そうとする試み」として一晩のうちに爆撃したと非難した。\n\nハメネイ師とその家族数人は、イランと米国・イスラエルの戦争が始まった初日である2月28日、イスラエルによるテヘランの自宅への攻撃で死亡した。\n\n後継の最高指導者には息子のモジュタバー氏が就いたが、同じ攻撃で重傷を負ったと伝えられて以来、公の場に姿を見せていない。\n\n56歳のモジュタバー氏はテヘランとゴムでの葬儀式典には参加せず、埋葬にも出席したとの情報はない。\n\n木曜日の朝、アリー・ハメネイ師、孫娘、娘婿、娘、そしてモジュタバー氏の妻の遺体を乗せた棺を積んだ飛行機がイラクから飛来し、マシュハドに到着した。イラクでは、ナジャフとカルバラーの両市にあるシーア派聖廟への行列に大勢の群衆が参加した。\n\n午後には、イランの国営テレビの映像に、黒い衣をまとった数千人の喪服姿の人々がマシュハド中心部の大通りを歩く様子が映し出された。多くの人がイランの国旗や、復讐を象徴する赤い旗を振っていた。\n\n一部の参列者は、故最高指導者の写真や、4か月前にイランへの共同攻撃を命じた米国のドナルド・トランプ大統領とイスラエルのベンヤミン・ネタニヤフ首相の死を求めるプラカードを手に持っていた。この攻撃が今次戦争の引き金となった。\n\n大通りの上には「我々は立ち上がらなければならない」などの公式スローガンが書かれた横断幕が掲げられていた。\n\n「指導者を失ったことは、親を失うより重い」と35歳の主婦フォダさんはAFP通信に語った。「トランプとネタニヤフの死だけが私たちの痛みを癒やしてくれるでしょう」\n\nその後、トラックがハメネイ師の棺をゆっくりと群衆の中を運び、イマーム・レザー廟へと向かい、夜が訪れる頃に敷地内に到着した。\n\nイマーム・レザーはシーア派の第8代イマームであり、12人のイマームの中でイランに埋葬されたとされる唯一の人物である。9世紀に建てられ、黄金のドームと尖塔がそびえるその廟には、毎年数百万人の巡礼者が訪れる。\n\nハメネイ師はイラン北東部に位置する同国第二の都市マシュハドで生まれ、同市の神学校で学んだ後、イランのシーア派聖職者制度の中心地であるゴムへと移った。\n\n師はイスラム共和国の建国の父であるアヤトラ・ルーホッラー・ホメイニー師の死去を受け、1989年に最高指導者に任命された。\n\n37年にわたる統治の間、師はイランの政治と軍を強く掌握し、時に暴力的な手段で国内の反発を抑え込んだ。また、米国やイスラエルとの対立を含む対外問題においても、一貫して強硬な立場を取り続けた。\n\nイランの指導部は、戦争で数千人が犠牲となり、1月の大規模抗議運動では治安部隊による弾圧でさらに数千人が死亡するという状況の中、ハメネイ師の入念に演出された葬儀式典を通じて結束と強さを示そうとした。\n\nしかし、米国との敵対関係が再燃したことにより、公式追悼は陰りを帯びることとなった。\n\nトランプ大統領は木曜日の夜に2夜連続で行われた空爆の後、米国の攻撃は「さらに深刻化する可能性がある」と警告した。米軍は今回の攻撃について、ホルムズ海峡における商業船舶への攻撃能力を低下させることを目的としていると述べた。\n\n革命防衛隊は、これに対してイラン軍がクウェート、バーレーン、カタールにある米軍施設とインフラを攻撃したと発表した。\n\n3週間前、米国とイランはすべての戦線での敵対行為の停止とホルムズ海峡の再開を求める基本合意書（MoU）に署名した。また、イランの核開発計画、米国による制裁、恒久的停戦を包括する最終合意に向けて2か月の猶予が与えられていた。\n\n先週、仲介国のカタールは、4日間にわたる攻撃の応酬の後にドーハで行われた間接協議でイランと米国の交渉担当者が進展を見せ、次回の会合はハメネイ師の追悼式典の終了後に行われると述べていた。\n\nしかし水曜日、トランプ大統領は記者団に対し、MoUはもはや「終わった」と考えていると語った。", "vocab": [{"word": "memorandum of understanding", "definition": "基本合意書、了解覚書。法的拘束力を持たないが、当事者間の合意事項や協力の枠組みを文書化した外交・ビジネス文書。「MoU」と略されることが多い。"}, {"word": "derail", "definition": "（計画や交渉などを）頓挫させる、脱線させるという意味の動詞。文字通りの「列車の脱線」ではなく、比喩的に物事の進行を妨げる際に使われる上級表現。"}, {"word": "choreographed", "definition": "本来は「振り付けされた」という意味だが、転じて「入念に演出・計画された」という意味で使われる。政治的・公的な場での意図的な演出を批判的に表現する際によく用いられる。"}, {"word": "mausoleum", "definition": "大型の壮麗な墓廟、霊廟を指す名詞。歴史的・宗教的に重要な人物を祀るために建てられた建造物に対して使われ、単なる「墓（grave/tomb）」より格式が高い。"}, {"word": "truce", "definition": "停戦、休戦協定を意味する名詞。対立する勢力が一時的または恒久的に戦闘行為を停止することへの合意を指し、ceasefire とほぼ同義だが書き言葉でよく使われる。"}, {"word": "degrade", "definition": "軍事用語として「（敵の能力や戦力を）低下・劣化させる」という意味で使われる動詞。一般的な「品質を落とす」という意味から派生した専門的な用法。"}, {"word": "suppress", "definition": "（反乱・抗議・言論などを）鎮圧する、抑圧するという意味の動詞。政治的・社会的な文脈で権力者が反対勢力を力で封じ込める行為を表す際に使われる。"}]}, {"title_ja": "ウクライナ情報機関員、モナコ爆発事件容疑者殺害の自白を撤回", "title_en": "Ukrainian intel agent reverses confession in Monaco bomb suspect murder case", "summary_ja": "ウクライナ軍情報機関（GUR）の将校ヴラジスラフ・レウトは、モナコでの爆発事件の主要容疑者アナスタシア・ベレゾフスカを殺害したと当初自白していたが、キーウの法廷でその供述を撤回した。レウトは今や、元SBU職員のヴィタリー・ジコヴィチが実際に殺害を行い、自分を脅して沈黙させたと主張している。両容疑者がウクライナの情報機関と関わりを持っていたことから、キーウ当局にとって不都合な疑問が浮上している。", "summary_en": "A Ukrainian military intelligence officer, Vladyslav Reut, who initially confessed to killing Anastasiia Berezovska — the prime suspect in a Monaco bombing targeting a Ukrainian-born millionaire — has retracted his confession in a Kyiv court. Reut now claims his alleged accomplice, former SBU officer Vitalii Zhykovych, carried out the killing and threatened him into silence. The case has raised uncomfortable questions for Ukrainian authorities, as both suspects were connected to Ukrainian intelligence services.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cpv3e8y39j7o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Ukrainian agent accused of murdering Monaco bomb suspect changes story\n- Published\nA Ukrainian intelligence agent who confessed to killing the woman suspected of trying to assassinate a multimillionaire and his family in Monaco last week, has now claimed he did not pull the trigger.\nIn court in Kyiv for a custody hearing on Thursday, Vladyslav Reut – who a few days ago led investigators to Anastasiia Berezovska's grave in the woods – said that he \"categorically denied\" committing her murder and blamed his alleged accomplice instead.\nThis murky case is capturing attention because Reut is an active and decorated officer of Ukraine's military intelligence agency, GUR, and his co-defendant Vitalii Zhykovych worked for the SBU security service until recently.\nOn Thursday evening President Volodymyr Zelensky said he would have \"additional relevant reports\" to share in the coming days.\nBut the motive for the Monaco blast that targeted Vadym Yermolayev remains unclear.\nThe businessman, who made his money in cognac and real estate, had renounced his Ukrainian citizenship some years ago. He has since been sanctioned by Kyiv for continuing to do business in Crimea after it was taken by Russia.\nNow his would-be assassin has been murdered herself.\nThe two suspects were brought into court for separate hearings with their hands cuffed, surrounded by heavily armed security officers in balaclavas.\nBoth kept their hoods up throughout proceedings and their faces covered by masks so large only their eyes were still visible. They sat hunched inside the glass courtroom cage for most of the hearings, backs to the line of TV cameras.\nIn court, the prosecutor clarified that Anastasiia Berezovska had arrived in Ukraine two days after the blast in Monaco, and before she had been identified as the prime suspect in the case.\nShe crossed by bus from Poland.\nOnce alerted to the allegations against her, investigators seem to have homed in quickly on Zhykovych, 50, and Reut, 34, using Berezovska's phone records.\nThey then identified cash and cryptocurrency transfers that the two had made to her accounts.\nStraight away, Reut appears to have confessed to shooting Berezovska.\nHe then took investigators to the spot where he had buried her body in the woods west of Kyiv, in a grave covered with branches.\nBut in court just days later, the GUR agent announced that he wanted to \"tell the truth\". He then shifted the blame squarely onto Zhykovych.\n\"I fought enemy combatants while defending my country,\" he stressed. \"I would never intentionally murder an innocent civilian woman.\"\nIn his revised version, he claimed that the two men had driven in his BMW to pick up Berezovska on the highway to Kyiv because she \"needed to be hidden\" in connection with \"a criminal matter\".\nHe doesn't clarify what that was.\nOn the way, Reut says Zhykovych produced a modified Makarov pistol from his rucksack and loaded it. When he protested, he says Zhykovych claimed it was just a precaution \"in case she panics\".\nAfter collecting Berezovska he says he was directed to drive towards the village of Yuriv where all three got out on a forest path.\nThere Reut says Zhykovych ordered him to shoot, saying: \"It's either her or us.\"\nIn Reut's telling, Zhykovych then killed Berezovska himself, with four shots, before the pair dug a grave and hid her body.\nHe says Zhykovych then threw the gun into a nearby lake along with her belongings.\nBut if Reut didn't shoot her, why would he confess?\nHe now says he was threatened by Zhykovych. \"He said, 'If anything happens to me, your relatives are in danger',\" he claims.\nZhykovych's lawyer rejected that new account.\nShaven-headed and fiddling incessantly with wooden rosary beads, Anatoliy Ivanov described his client as a low-level former SBU officer and dismissed the idea that a mere civilian could have ordered a serving GUR member to do anything, let alone carry out a murder.\nHe called Zhykovych a \"patriot\" who had fought in eastern Ukraine in 2014, like himself, and then \"actively defended\" the Kyiv region after 2022 when Russia launched its full-scale invasion.\n\"He does not want to be imprisoned. I understand,\" Ivanov commented on Reut's statement.\nBut he insisted that his own client \"did not kill\".\nThe prosecutor says the two men acted \"jointly and in a coordinated fashion\" and both have been charged with premeditated murder.\nFor now, there are many more questions than answers in this case, which is an uncomfortable one for the authorities in Kyiv.\nIn court, Zhykovych's lawyer suggested there might be a \"Russian trail\", as Ukrainian intelligence agents have been recruited by Moscow in the past.\n\"We've had a lot of such rats, unfortunately,\" he said.\nBut he has no evidence of that, and other theories from corruption to organised crime have also been mooted.\n\"All versions are being considered,\" prosecutor Dmytro Tkachuk told the BBC.\nHe added that one suspect had \"revealed\" some information about a possible motive but said it would hinder the ", "translation_ja": "ウクライナ情報機関員、モナコ爆発事件容疑者殺害をめぐり供述を変更\n\n先週モナコで富豪とその家族の暗殺を試みたとされる女性を殺害したと自白していたウクライナの情報機関員が、今度は自分が引き金を引いていないと主張している。\n\n木曜日にキーウの法廷で行われた勾留審問において、ヴラジスラフ・レウトは数日前に捜査員をアナスタシア・ベレゾフスカの墓まで案内したにもかかわらず、彼女の殺害を「断固否定する」と述べ、代わりに共犯者とされる人物に責任を押しつけた。\n\nこの不透明な事件が注目を集めているのは、レウトがウクライナの軍事情報機関GURの現役かつ勲章を持つ将校であり、共同被告のヴィタリー・ジコヴィチが最近までSBU治安機関に勤務していたためだ。\n\n木曜日の夕方、ヴォロディミル・ゼレンスキー大統領は「今後数日以内に追加の関連報告を共有する」と述べた。\n\nしかし、ヴァジム・エルモライエフを標的にしたモナコの爆発事件の動機は依然不明のままだ。\n\nコニャックと不動産で財を成したこのビジネスマンは、数年前にウクライナ国籍を放棄していた。その後、ロシアがクリミアを占領した後もクリミアでのビジネスを継続したとして、キーウから制裁を受けている。\n\nそして今、彼を暗殺しようとした人物が、自身殺害されてしまった。\n\n2人の容疑者は手錠をかけられ、バラクラバ（目出し帽）を着用した重武装の警備員に囲まれて、それぞれ別々の審問のために法廷に連行された。\n\n両者は審理を通じてフードをかぶり続け、目しか見えないほど大きなマスクで顔を覆っていた。審理の大半において、ガラス張りの被告席の中で身を丸め、テレビカメラの列に背を向けて座っていた。\n\n法廷で検察官は、アナスタシア・ベレゾフスカがモナコでの爆発から2日後、まだ主要容疑者として特定される前にウクライナに入国していたことを明らかにした。\n\n彼女はポーランドからバスで越境した。\n\n彼女に対する疑惑が浮上すると、捜査員たちはベレゾフスカの通話記録を使い、ジコヴィチ（50歳）とレウト（34歳）に迅速に絞り込んだようだ。\n\n続いて、2人が彼女の口座に行った現金および暗号通貨の送金が特定された。\n\nすぐにレウトはベレゾフスカを射殺したと自白したようだ。\n\nその後、彼は捜査員をキーウ西方の森の中、枝で覆われた墓に埋められた遺体の場所まで案内した。\n\nしかし、それから数日後の法廷で、GURの将校は「真実を話したい」と宣言し、責任をジコヴィチに全面的に転嫁した。\n\n「私は祖国を守りながら敵の戦闘員と戦ってきた」と彼は強調した。「無実の民間人女性を意図的に殺害するようなことは絶対にしない。」\n\n修正後の供述によると、2人はレウトのBMWでキーウへの幹線道路沿いにベレゾフスカを迎えに行ったという。彼女を「ある犯罪がらみの事情で」匿う必要があったためだという。\n\n何の犯罪であるかは明らかにされていない。\n\nレウトによれば、道中ジコヴィチがリュックサックから改造マカロフ拳銃を取り出し、弾を込めたという。レウトが抗議すると、ジコヴィチは「彼女がパニックになった場合に備えた用心にすぎない」と言ったという。\n\nベレゾフスカを乗せた後、レウトはユーリウ村方面へ向かうよう指示されたと言い、3人全員が森の小道で車を降りた。\n\nそこでジコヴィチが「彼女か俺たちか、どちらかだ」と言って射殺を命じたとレウトは主張する。\n\nレウトの話では、その後ジコヴィチが自らベレゾフスカを4発の銃弾で殺害し、2人で墓を掘って遺体を隠したという。\n\nその後ジコヴィチは拳銃を彼女の所持品とともに近くの湖に投げ捨てたとしている。\n\nしかし、もし撃っていないなら、なぜレウトは自白したのか。\n\n今になって彼は、ジコヴィチに脅されたからだと言う。「『もし俺に何かあれば、お前の家族が危険にさらされる』と言われた」と主張している。\n\nジコヴィチの弁護士はその新たな供述を否定した。\n\n頭を剃り上げ、木製のロザリオを絶え間なくいじりながら、アナトリー・イワノフは依頼人を元SBUの下級職員と表現し、単なる民間人が現役GUR隊員に何かを命じることができる、まして殺人を実行させることができるという考えを退けた。\n\n彼はジコヴィチを「愛国者」と呼び、2014年に東部ウクライナで戦い、その後2022年にロシアが全面侵攻を開始した際にはキーウ周辺の防衛に「積極的に参加した」と述べた。\n\n「彼が投獄されたくないのは理解できる」とイワノフはレウトの陳述についてコメントした。\n\nしかし彼は、自分の依頼人が「殺していない」と主張した。\n\n検察官は2人が「共同かつ協調した形で」行動したと述べており、両者は計画的殺人罪で起訴されている。\n\n現時点では、この事件はキーウ当局にとって都合の悪いものであり、疑問が答えをはるかに上回っている。\n\n法廷でジコヴィチの弁護士は、ウクライナの情報機関員が過去にモスクワにリクルートされた前例があるとして、「ロシアの関与」がある可能性を示唆した。\n\n「残念ながら、そういった裏切り者は多くいた」と彼は述べた。\n\nしかし、それを裏付ける証拠はなく、汚職から組織犯罪に至るまで他の説も取り沙汰されている。\n\n「あらゆる可能性が検討されている」と検察官のドミトロ・トカチュクはBBCに語った。\n\n同氏はまた、一方の容疑者が動機の可能性についていくらかの情報を「明かした」とも述べたが、それを公開すれば捜査の妨げになるとして詳細を伏せた。", "vocab": [{"word": "categorical denial", "definition": "「断固とした否定」という意味。証拠や状況に関係なく、完全かつ絶対的に何かを否定すること。法廷や公式の場でよく使われる表現。"}, {"word": "moot", "definition": "ここでは「提起された、取り沙汰された」という意味の動詞として使われている。ある考えや可能性が議論や検討のために持ち出されることを指す。"}, {"word": "accomplice", "definition": "「共犯者」という意味。犯罪行為において他者を援助または協力する人物を指す法律用語。"}, {"word": "retract", "definition": "「撤回する」という意味。以前に述べた発言や主張を正式に取り消すこと。法的・公式な文脈でよく用いられる。"}, {"word": "premeditated", "definition": "「計画的な、故意の」という意味の形容詞。特に犯罪行為が事前に計画・意図されていたことを示す法律用語で、量刑に大きく影響する。"}, {"word": "homed in on", "definition": "「～に絞り込んだ、～に照準を合わせた」という意味のイディオム。多くの可能性の中から特定の対象や目標に集中していくことを表す。"}, {"word": "murky", "definition": "「不透明な、曖昧な、不明瞭な」という意味の形容詞。事実や意図が不明確で、理解しにくい状況を表す際に使われる。"}]}, {"title_ja": "台風バビが東アジアを脅かす―フィリピンでは土砂崩れで15人死亡", "title_en": "Typhoon Bavi Threatens East Asia After Killing 15 in Philippines Landslides", "summary_ja": "幅1,000kmに及ぶ数十年ぶりの大型台風「バビ」がフィリピンで土砂崩れを引き起こし、少なくとも15人が死亡した。台風は台湾、日本の離島、中国南東部へと向かっており、土曜日に上陸する見込みだ。域内では多数の航空便が欠航し、軍が待機態勢に入るなど、各地で備えが急ピッチで進んでいる。", "summary_en": "Typhoon Bavi, one of the strongest storms in decades spanning 1,000km wide, has triggered deadly landslides in the Philippines killing at least 15 people. The typhoon is tracking toward Taiwan, remote Japanese islands, and southeastern China, where it is expected to make landfall Saturday. Across the region, flights have been cancelled, troops mobilized, and residents are stocking up on supplies in preparation.", "source": "BBC World", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c04y6wr03gxo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "East Asia braces for destructive typhoon as landslides kill 15 in Philippines\n- Published\nLandslides triggered by one of the strongest storms in decades have killed at least 15 people in southern Philippines, as parts of East Asia brace themselves for the looming storm.\nTyphoon Bavi, which spans 1,000km (620 miles) at its widest point – roughly the width of France – is sweeping across the Pacific towards Taiwan.\nIt is expected to dump rain on Taiwan's north and east, and on a chain of remote Japanese islands, before making landfall in south-eastern China on Saturday.\nDozens of flights have been cancelled while schools have suspended classes across the region. Supermarket shelves have been wiped clean as residents stock up on supplies ahead of the typhoon.\nOn the Philippine island of Mindanao, families have been buried overnight by landslides, and rescuers are still searching for those missing.\nModerate to heavy rains will continue to drench parts of the country throughout the weekend, officials say.\nTaiwanese authorities have warned that Bavi could bring up to 1m (39 inches) of rainfall. Some 29,000 soldiers have been put on standby to help with relief efforts, according to the island's defence ministry.\nBavi is set to be the largest storm, by size, to hit the island since 1987, Taiwan's Central Weather Administration told Reuters.\nFarmers across the region rushed to harvest or protect their crops while the weather held earlier on Friday, while fishermen made sure to secure their vessels tightly.\n\"Don't be fooled by the nice and calm weather now. A storm like this could be the most terrifying,\" 60-year-old fisherman Chen Ming-hui told Reuters.\nThousands of sandbags have been distributed to residents and shop-owners in flood-prone areas.\nAcross the strait, China has also warned of \"significant impact\" from the typhoon that could move northward after smashing into the south-eastern Fujian province.\n\"Bavi's large size and abundant energy mean its remnants and outer rainbands could move from Jiangsu and Anhui provinces toward the Bohai Sea region,\" said Ma Jun, director of China's Institute of Public and Environmental Affairs.\nThe northern provinces, which have \"less experience\" dealing with typhoons in comparison with the south, should \"strengthen preparations\", he warned.\nSome forecasts suggest Bavi could make landfall twice in China.\nIn Japan, residents on the remote Sakishima Islands are also on high alert. Photographs shared online show some of them taping up windows and draping windproof nets across their homes and shops.\nVarious airlines have grounded flights in the region. Japan Airlines, for instance, has axed more than 100 flights for Friday and Saturday, disrupting travel for nearly 20,000 passengers.\nAll Nippon Airways, another Japanese carrier, has cancelled more than 160 flights through Sunday, also affecting about 20,000 people, according to Reuters.\nThai Airways and Malaysia Airlines have also grounded flights to and from Taipei.\nParts of southern China are still reeling from the devastation brought by Typhoon Maysak earlier this week.\nMaysak left at least 39 people dead, with rescuers still combing through wreckage for missing people. More than 130,000 were evacuated, mostly in the Guangxi region.\nMaysak killed large swathes of livestock and resulted in massive agriculture loss. It also spurred two rare tornadoes in the central Hubei province.\nRelated topics\n- Published3 days ago", "translation_ja": "東アジア、猛烈な台風に身構え―フィリピンでは土砂崩れで15人死亡\n\n数十年ぶりの最強クラスの嵐が引き起こした土砂崩れにより、フィリピン南部で少なくとも15人が死亡した。東アジア各地では、迫りくる台風に備えた態勢が続いている。\n\n最大幅1,000km（約620マイル）―ほぼフランスと同じ広さ―に達する台風バビは、太平洋を横断して台湾へと向かっている。\n\n台風は台湾の北部・東部および日本の遠隔離島群に大雨をもたらした後、土曜日に中国南東部へ上陸する見通しだ。\n\n域内では多数の航空便が欠航し、学校は授業を停止している。台風上陸を前に住民が物資を買いだめしているため、スーパーマーケットの棚はすでに空になっている。\n\nフィリピンのミンダナオ島では、土砂崩れが夜間に複数の家族を埋め、救助隊が行方不明者の捜索を続けている。\n\n当局によると、週末にかけて国内の一部地域では中程度から強い雨が降り続く見込みだという。\n\n台湾当局は、バビが最大1m（39インチ）の降雨をもたらす可能性があると警告している。台湾国防部によると、救援活動に備えて約2万9,000人の兵士が待機態勢に入っているという。\n\n台湾中央気象署がロイターに伝えたところによると、バビは規模の面で1987年以来最大の台風となる見込みだ。\n\n域内の農家は金曜日の天気が保っているうちに作物の収穫や保護を急ぎ、漁師たちは船をしっかりと固定した。\n\n「今の穏やかな天気に油断してはいけない。このような嵐は最も恐ろしいものになりうる」と、60歳の漁師チェン・ミンフイさんはロイターに語った。\n\n浸水しやすい地域の住民や店舗オーナーには数千袋の土のうが配布された。\n\n海峡を挟んだ中国側でも、台風が中国南東部の福建省を直撃した後に北上する可能性があるとして「甚大な影響」を警告している。\n\n「バビの大きさと豊富なエネルギーを考えると、その残骸や外側の雨域が江蘇省・安徽省から渤海地域へと移動する可能性がある」と、中国の公衆・環境問題研究所所長のマ・ジュン氏は述べた。\n\n台風への対応経験が南部に比べて「乏しい」北部の省は「準備を強化すべきだ」と同氏は警告した。\n\n一部の予報では、バビが中国に二度上陸する可能性も示唆されている。\n\n日本でも、遠隔地の先島諸島の住民が高い警戒態勢を維持している。オンラインで共有された写真には、窓にテープを貼ったり、防風ネットを家屋や店舗に張り巡らせたりする住民の様子が映っている。\n\n複数の航空会社が域内で運航を取りやめている。日本航空は金曜日と土曜日に100便以上を欠航し、約2万人の乗客の旅程に影響が出ている。\n\nもう一つの日本の航空会社、全日本空輸も日曜日までに160便以上を欠航し、同じくおよそ2万人に影響が出ているとロイターは伝えている。\n\nタイ航空やマレーシア航空も台北との往復便を運休している。\n\n中国南部の一部地域では、今週初めに上陸した台風メイサークによる被害からの復旧が続いている。\n\nメイサークでは少なくとも39人が死亡し、救助隊が引き続き行方不明者を求めて瓦礫を掘り起こしている。主に広西チワン族自治区で13万人以上が避難した。\n\nメイサークは広範囲にわたる家畜に甚大な被害をもたらし、農業にも多大な損失を与えた。また、内陸部の湖北省では珍しいトルネードを2件発生させた。", "vocab": [{"word": "landslide", "definition": "土砂崩れ。大雨や地震などで斜面の土砂が崩れ落ちる現象を指し、地質・災害報道で頻出する専門用語。"}, {"word": "standby", "definition": "待機態勢・スタンバイ。緊急時にすぐ行動できるよう準備している状態を意味し、軍や緊急サービスの文脈でよく使われる。"}, {"word": "remnants", "definition": "残骸・残存物。ここでは台風が勢力を弱めた後も残る雨域や風を指し、気象報道で慣用的に使われる表現。"}, {"word": "rainbands", "definition": "雨域・レインバンド。台風や低気圧の周囲に螺旋状に発達する降雨帯のことで、気象学の専門用語。"}, {"word": "reeling", "definition": "（打撃・衝撃から）立ち直れずにいる様子を表すイディオム的表現。'still reeling from'で「〜の打撃からまだ立ち直れていない」という意味になる。"}, {"word": "spurred", "definition": "引き起こした・促進した。spur（拍車をかける）の過去形で、ある事象が別の事象を誘発したことを意味する上級語彙。"}, {"word": "looming", "definition": "（危険・脅威などが）迫り来る、不気味に近づいている様子を表す形容詞・分詞。差し迫った脅威を強調する際に用いられるやや文語的な表現。"}]}, {"title_ja": "バイユーのタペストリー、900年ぶりに警察の護衛のもと英国に到着", "title_en": "Bayeux Tapestry arrives in UK for first time in 900 years under police guard", "summary_ja": "1066年のヘイスティングスの戦いに至る出来事を描いた11世紀の刺繍作品「バイユーのタペストリー」が、約1000年ぶりに英国に戻り、ロンドンの大英博物館に深夜に到着した。全長70メートルの作品は、振動を抑えるクレートと2度の予行演習を経て、警察の護衛とともにユーロトンネル経由でフランス北部の秘密の場所から輸送された。この貸し出しは英仏友好の象徴として歓迎される一方、フランスでは「文化遺産に対する犯罪」と批判する声も上がっている。", "summary_en": "The Bayeux Tapestry, an 11th-century embroidery depicting events leading to the 1066 Battle of Hastings, arrived at the British Museum in London in the early hours, marking its first return to England in nearly 1,000 years. The 70-metre-long work was transported from a secret location in northern France via the Eurotunnel under police escort, with shock-absorbing crates and two practice runs to ensure its safe passage. While the loan has been welcomed as a symbol of Franco-British friendship, it has also sparked controversy in France, with critics calling the move a 'heritage crime.'", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/cly9r54e5r4o?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "社会", "full_text": "Bayeux Tapestry arrives in UK for first time in 900 years under police guard\n- Published\nThe Bayeux Tapestry has arrived in the UK, for the first time since it is believed to have been created here nearly 1,000 years ago.\nAt 02:50 BST, chaperoned from a secret location in northern France by a police guard, it was driven into a loading bay at the British Museum, which will put it on display in September.\nThe 70m-long 11th Century embroidery depicts in 58 scenes events leading up to the Battle of Hastings and Norman Conquest of England in 1066 - the moment that changed the country forever.\nThe heavy-looking crate, encased in an aluminium frame, was lowered out of the lorry in front of a select crowd including the French ambassador to the UK and the director of the British Museum.\nNick Cullinan, the director of the British Museum, told me: \"We've just witnessed something rather extraordinary, which is the arrival of the Bayeux Tapestry at the British Museum but specifically it is returning to England for the first time in almost 1,000 years.\n\"It feels like a really remarkable thing not just to witness but to be part of, and we're so excited to share it with as many people as possible.\"\nA big black crate being removed from a lorry in the dead of night may not sound that exciting but this is a historic moment - and BBC News was also there to witness it.\nMillie Horton-Insch, project curator of British Museum Bayeux Tapestry exhibition, said: \"It probably sounds a bit strange to be that excited at seeing a lorry reverse into a loading bay and a box removed, but when you consider the object within it, how old it was, how close to the events it depicts it was made, by people who lived through those events, it's really profound.\n\"I did well up a little bit when I saw it coming off the lorry so I imagine I'll probably be in floods of tears when I actually see it.\"\nFrench President Emmanuel Macron said in the Times, external that the loan was \"a gesture of trust, a tangible expression of a long-standing friendship and a sign of our shared desire to see France and the United Kingdom build their future together\".\nHe earlier posted a photograph of an image of the Bayeux Tapestry which the British Museum had projected on to the white cliffs of Dover. On the image was \"merci\" (thank you).\nBut in France ever since the announcement, there has been some disquiet that a work of such fragility and historical importance was to go on loan more than 300 miles away. A French petition to stop it called it a \"heritage crime\".\nEven artist David Hockney, before his death, said that he did not think it should come to the UK because moving it could put it in jeopardy. \"Some things are too precious to take a risk with,\" he wrote.\nShock absorbers and practice runs - how it was moved\nTo ensure it travelled safely - and without damage - the folding stand, which the tapestry has been kept on since it was taken down from display in Bayeux last year, was put inside a crate, with temperature and humidity regulation. That crate was then placed into an outer cage, in which metal springs acted as shock absorbers to protect it from bumps in the road.\nThe work travelled across the Channel on the Eurotunnel before making its way to central London in the dead of night.\nCullinan told me: \"If anybody had said on the other side, especially on the French side as the lenders, 'I think this is too risky to do', it wouldn't be arriving now. That's the reality. A museum would never do something that imperilled the objects in its care.\"\nNo damage is \"the goal\", he added. \"That's what all the care has gone into trying to achieve and we feel very confident about that. And the thing to say too is much more fragile things travel all the time. We lend more fragile things.\"\nTwo practice journeys with a textile copy were previously made, to test the route and the crate. The point was to measure the vibrations and reduce any major impact or shock.\nPeter Ricketts, the UK special envoy for the loan of the tapestry, said: \"everything possible\" had been done to avoid damage.\n\"No-one would want to bring the tapestry to the UK if they thought there was any damage or danger to this extraordinary object. I'm not worried, I'm relieved. It looks like all those meticulous arrangements for the transport are working very well.\"\nHe described the loan as \"two old nations coming together to look at their shared history and that is very special\".\nThe Bayeux Tapestry's epic story\nThe Bayeux Tapestry is not actually a tapestry at all: it is linen with embroidered pictures of the tussle between William, Duke of Normandy then Conqueror of England, and Harold II, King of England, stitched on in coloured woollen yarn.\nAn embroidery of immense significance - 58 scenes, 626 characters (but only six women), 202 horses - ships, swords and arrows (including one hitting the soldier believed to be Harold II - although there are questions about whether this was added later).\nHorton-Insch said it was ", "translation_ja": "バイユーのタペストリー、警察の護衛のもと900年ぶりに英国に到着\n\nバイユーのタペストリーが英国に到着した。作品がここで制作されたと考えられてから、約1000年ぶりのことである。\n\n英国夏時間午前2時50分、フランス北部の秘密の場所から警察の護衛に守られながら、タペストリーは大英博物館の搬入口に運び込まれた。大英博物館は9月にこの作品を一般公開する予定だ。\n\n全長70メートルに及ぶ11世紀のこの刺繍作品は、58の場面に分かれ、1066年のヘイスティングスの戦いとノルマン人によるイングランド征服――この国の歴史を永遠に変えたその瞬間――に至るまでの出来事を描いている。\n\nアルミ製フレームで覆われた重厚なクレートは、英国駐在フランス大使や大英博物館の館長など選ばれた関係者が見守る中、トラックから降ろされた。\n\n大英博物館のニック・カリナン館長は私にこう語った。「今まさに、非常に特別な瞬間を目撃しました。バイユーのタペストリーが大英博物館に到着したのです。そして特筆すべきは、これがほぼ1000年ぶりにイングランドに戻ってきたということです。目撃するだけでなく、その一端を担えたことは本当に素晴らしいことだと感じています。できるだけ多くの人々とこの感動を分かち合えることを心から楽しみにしています。」\n\n深夜に大きな黒いクレートがトラックから運び出される光景は、あまり興奮するものには聞こえないかもしれない。しかしこれは歴史的な瞬間であり、BBCニュースもその場に立ち会った。\n\n大英博物館バイユーのタペストリー展のプロジェクト・キュレーター、ミリー・ホートン=インシュ氏は語った。「トラックが搬入口にバックして箱が取り出されるのを見てそれほど興奮するのは少し奇妙に聞こえるかもしれません。でも、その中に入っている作品のことを考えると――どれほど古いか、描かれている出来事からどれほど近い時代に作られたか、その出来事を実際に生きた人々によって縫われたということを考えると――本当に深く胸に響きます。トラックから降ろされるのを見て少し涙ぐんでしまいました。実際に作品を目にしたときは号泣してしまうかもしれません。」\n\nフランスのエマニュエル・マクロン大統領はタイムズ紙への寄稿で、この貸し出しは「信頼の証、長年の友情の具体的な表れ、そしてフランスと英国が共に未来を築いていくという共通の願いの象徴だ」と述べた。\n\n大統領はまた、大英博物館がドーバーの白い断崖に投影したバイユーのタペストリーの画像を自身のSNSに投稿した。その画像には「merci（ありがとう）」という言葉が添えられていた。\n\nしかしフランスでは、この発表以来、これほど繊細で歴史的に重要な作品が300マイル以上離れた場所に貸し出されることへの不満の声が上がっている。貸し出し中止を求めるフランスの請願書はこれを「文化遺産に対する犯罪」と呼んだ。\n\n亡くなる前の画家デイヴィッド・ホックニーも、輸送によって危険にさらされるとして英国への来訪に反対していた。「あまりにも貴重なものには、リスクを冒すべきではない」と彼は記していた。\n\nショック・アブゾーバーと予行演習――どのように輸送されたか\n\n安全かつ無傷で輸送するため、昨年バイユーでの展示から外された後、タペストリーが保管されていた折り畳み式のスタンドごと温度と湿度が管理されたクレートに収納された。そのクレートはさらに外側のケージの中に入れられ、金属製のバネが道路の凹凸から守るショック・アブゾーバーとして機能した。\n\nタペストリーはユーロトンネルで英仏海峡を渡り、深夜にロンドン中心部へと運ばれた。\n\nカリナン館長は私にこう話した。「もし誰かが、特に貸し出し元であるフランス側が『リスクが大きすぎる』と言っていたなら、今日ここに到着することはなかったでしょう。それが現実です。博物館は自館が管理する作品を危険にさらすようなことは絶対にしません。」\n\n損傷ゼロが「目標」だと彼は付け加えた。「そのためにあらゆる注意が払われてきました。私たちはそれに強い自信を持っています。また、もっと繊細な作品が常に輸送されているということも申し添えておきます。私たちはもっと繊細な作品を貸し出してもいます。」\n\n事前に織物のコピーを使って2回の予行演習が行われ、ルートとクレートの安全性が確認された。目的は振動を測定し、大きな衝撃やショックを軽減することだった。\n\nタペストリー貸し出しの英国特別特使、ピーター・リケッツ氏は、損傷を避けるために「できる限りのことがなされた」と述べた。\n\n「損傷や危険の恐れがあると思っていれば、誰もタペストリーを英国に持ってこようとはしなかったでしょう。私は心配していません。安心しています。輸送のための綿密な手配がうまく機能しているようです。」\n\n同氏はこの貸し出しを「二つの古い国家が共通の歴史を振り返るために集うことであり、それは非常に特別なことだ」と表現した。\n\nバイユーのタペストリーが伝える壮大な物語\n\nバイユーのタペストリーは実際にはタペストリーではない。ノルマンディー公ウィリアム（後のイングランド征服王）とイングランド王ハロルド2世との戦いの様子が、色とりどりの毛糸で刺繍された麻布の作品である。\n\n計り知れない重要性を持つこの刺繍には、58の場面、626人の登場人物（しかし女性はわずか6人）、202頭の馬、そして船・剣・矢（ハロルド2世と考えられる兵士に当たるものを含む――ただしこれが後から追加されたかどうかについては議論がある）が描かれている。\n\nホートン=インシュ氏は――（原文未完）", "vocab": [{"word": "chaperoned", "definition": "「付き添われた、護衛された」という意味。主に人や物が保護者や護衛と共に移動する際に使われる表現で、ここでは貴重な美術品が警察の護衛付きで輸送された状況を指す。"}, {"word": "imperilled", "definition": "「危険にさらした」という意味の動詞 imperil の過去形。非常にフォーマルな語で、人や物が重大なリスクや危険にさらされる状況で用いられる。"}, {"word": "disquiet", "definition": "「不安、懸念、不満」を意味する名詞または動詞。単なる心配以上の、社会的・政治的な不安感や反発を表すやや格調ある表現として使われる。"}, {"word": "meticulous", "definition": "「細部にまで注意を払った、綿密な」という意味の形容詞。非常に丁寧で慎重な作業や準備を表す際に用いられる上級語彙。"}, {"word": "embroidery", "definition": "「刺繍（ししゅう）」を意味する名詞。布に色糸で模様や絵を縫い付ける技法、またはその作品を指す。比喩的には「誇張や装飾」の意味でも使われることがある。"}, {"word": "envoy", "definition": "「特使、外交使節」を意味する名詞。政府や機関を代表して特定の任務のために派遣される公式の代表者を指す外交・政治用語。"}, {"word": "jeopardy", "definition": "「危険、危うい状態」を意味する名詞。主に put ~ in jeopardy（〜を危険にさらす）という形で使われるイディオム的表現で、TOEIC・英検などでも頻出の上級語彙。"}]}, {"title_ja": "元保守党大臣アン・ウィデカム氏が78歳で死去", "title_en": "Former Tory Minister Ann Widdecombe Dies Aged 78", "summary_ja": "元保守党大臣でリフォームUKの広報担当を務めたアン・ウィデカム氏が78歳で死去した。ケント州メイドストーンの国会議員を23年間務め、ジョン・メージャー政権下で閣僚を歴任した。政界引退後はブレグジット党の欧州議会議員となり、また『ストリクトリー・カム・ダンシング』などのテレビ番組への出演で広く知られるようになった。", "summary_en": "Ann Widdecombe, a former Conservative minister and Reform UK spokesperson, has died at the age of 78. She served as MP for Maidstone for 23 years and held ministerial roles under John Major's government, later becoming an MEP for the Brexit Party. Beyond politics, she gained wider public recognition through appearances on Strictly Come Dancing and Celebrity Big Brother.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/ced47jqyg1eo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Former Tory minister Ann Widdecombe dies at 78\n- Published\nFormer Conservative minister turned Reform UK spokeswoman Ann Widdecombe has died aged 78.\nHer political career spanned decades, serving as MP for Maidstone in Kent for 23 years, before going on to join Reform UK.\nShe worked as a Home Office and employment minister in Sir John Major's government between 1994 to 1997.\nAfter leaving Parliament she embarked on a showbiz career, appearing on Strictly Come Dancing in 2010 and Celebrity Big Brother in 2018.\nA staunch supporter of the UK's departure from the EU, she became an MEP for the Brexit Party, representing South West England in the European Parliament between 2019-2020.\nIn 2023, Widdecombe joined Nigel Farage's Reform UK, after the party changed its name from the Brexit Party, and made a number of appearances as the party's immigration and justice spokesperson.\nFollowing news of her death, Farage credited Widdecombe for playing a \"decisive role\" in getting Brexit \"over the line\".\n\"When Ann Widdecombe decided to stand for The Brexit Party in the snap 2019 European Elections, it was a big moment and huge boost. The voters loved her,\" he wrote in a post on X, adding she would be \"missed by us all\".\n- Ann Widdecombe: Brexit-backing, animal-loving Strictly star - Published20 minutes ago\n \n- Ann Widdecombe to stand for Brexit Party - Published24 April 2019\n \n- 'Ann Widdecombe was a national treasure' - Published1 hour ago\n \nConservative leader Kemi Badenoch described Widdecombe as a \"formidable politician who was never afraid to speak her mind and fought hard for what she believed\".\nTory MP and former party leader Iain Duncan Smith said she expressed her views \"strongly and straight, which was refreshing in many senses and sometimes difficult\".\nBy appearing on Strictly, he said she discovered \"a new lease of life, an inner Ann that we never had any sight of at all\".\nFormer Conservative MP and friend Gyles Brandreth described her as \"a curious mix of Danny de Vito and Margaret Rutherford\".\n\"We met when we were both 19 and remained friends because she was fun and kind - even when you disagreed with her fiercely.\"\nLord Howard, a former Conservative leader who clashed with Widdecombe when they were both ministers at the Home Office, told BBC Radio Kent she was a \"feisty lady\" and a \"good minister\".\nWiddecombe famously described him as having \"something of the night about him\".\nLord Howard acknowledged they had had \"our ups and downs\" but later \"made up\".\nA Downing Street spokeswoman said Widdecombe was \"a distinctive figure in British politics for many years\".\nShe said the prime minister \"pays tribute to the conviction and dedication with which she served her country\".\nIn a statement, her agent Cloud 9 Management said her life and career were \"driven by her strong Christian values and commitment to public service\".\nThey added that Widdecombe loved the \"cut and thrust of political debate\" and despite leaving Parliament 16 years ago, was \"still actively campaigning for Reform UK\".\n\"For many, of course, she will be best (or worst?) remembered for her unforgettable appearances on Strictly Come Dancing, defying the judges week-after-week as the public delighted in her unsuccessful attempts to follow the choreography of the long-suffering Anton Du Beke,\" the statement went on to say.\nThe former Tory minister became a favourite with viewers when she appeared on the BBC's Strictly Come Dancing in 2010.\nOne judge likened her to a \"Dalek in drag\" but her popularity with the audience took her to the semi-finals.\nShe described her 10 weeks on the show as \"magnificent\" and life-enhancing\".\nDuring her parliamentary career, Widdecombe, a staunch Catholic, often sparked controversy due to her socially conservative views, including opposing abortion and comments about the LGBT community.\nIn 2019, the former minister received backlash after suggesting science might one day \"produce an answer\" to being gay.\nIn the 1990s she converted to Catholicism, a move she later described as the best decision she ever made.\nShe told The Times newspaper: \"To have a church which calls a sin a sin and has done with it is a blessed relief.\"\nDuring her political career, faced cruel comments about her appearance, with newspapers calling her \"Doris Karloff\", a reference to the old Hollywood horror movie star, Boris Karloff.\nHowever, she breezily dismissed the jibes saying: \"I am toothy, dumpy, ugly, overweight, a spinster – what the hell.\"\nSign up for our Politics Essential newsletter to keep up with the inner workings of Westminster and beyond.", "translation_ja": "元保守党大臣アン・ウィデカム氏が78歳で死去\n\n元保守党大臣でリフォームUKの広報担当を務めたアン・ウィデカム氏が78歳で死去した。\n\n同氏の政治キャリアは数十年にわたり、ケント州メイドストーンの国会議員を23年間務めた後、リフォームUKに参加した。\n\n1994年から1997年にかけて、ジョン・メージャー政権下で内務省および雇用省の大臣を務めた。\n\n議会を離れた後は芸能界に進出し、2010年に『ストリクトリー・カム・ダンシング』、2018年には『セレブリティ・ビッグ・ブラザー』に出演した。\n\nEU離脱の熱烈な支持者であった同氏は、ブレグジット党の欧州議会議員となり、2019年から2020年にかけてイングランド南西部を代表して欧州議会で活動した。\n\n2023年、ウィデカム氏はブレグジット党から党名を変更したナイジェル・ファラージ氏のリフォームUKに加入し、同党の移民・司法問題担当広報として数多くの場面に登場した。\n\n訃報を受け、ファラージ氏はウィデカム氏がブレグジットを「実現させる上で決定的な役割」を果たしたと称えた。\n\n「アン・ウィデカム氏が2019年の急遽実施された欧州議会選挙にブレグジット党から立候補を決意したことは、大きな出来事であり、党にとって多大な励みとなった。有権者は彼女を愛した」とファラージ氏はX（旧ツイッター）への投稿に記し、「私たち全員が彼女を惜しむだろう」と付け加えた。\n\n保守党党首のケミ・バデノック氏は、ウィデカム氏を「自分の考えを臆せず発言し、信じるもののために懸命に戦った、侮りがたい政治家」と評した。\n\n保守党議員で元党首のイアン・ダンカン・スミス氏は、同氏が「力強く、率直に意見を述べた。それは多くの意味で清々しく、時に難しくもあった」と語った。\n\nストリクトリーへの出演によって「新たな生きがいを見つけ、これまで誰にも見せたことのなかった内なるアンが現れた」と同氏は述べた。\n\n元保守党議員で友人のジャイルズ・ブランドレス氏は、ウィデカム氏を「ダニー・デビートとマーガレット・ラザフォードを合わせたような不思議な存在だった」と表現した。\n\n「私たちが出会ったのは二人とも19歳のときで、彼女が楽しく思いやりのある人物だったからこそ友人でいられた。激しく意見が対立していたときでさえも」と語った。\n\nハワード卿は、ウィデカム氏と内務省で同僚大臣として対立したこともある元保守党党首であるが、BBCラジオ・ケントに対し、同氏は「気概ある女性」であり「有能な大臣」だったと語った。\n\nウィデカム氏はかつてハワード卿について「夜の何かを持った人物」と評したことで有名だ。\n\nハワード卿は「お互い浮き沈みがあった」と認めつつも、後に「和解した」と述べた。\n\nダウニング街の報道官は、ウィデカム氏は「長年にわたって英国政界で際立った人物だった」と述べた。\n\nまた、首相は「国に尽くした彼女の信念と献身に敬意を表する」と語ったとした。\n\n同氏のエージェントであるクラウド9マネジメントは声明の中で、同氏の生涯とキャリアは「強いキリスト教的価値観と公共への奉仕精神によって支えられていた」と述べた。\n\nまた、ウィデカム氏は「政治的議論の激しいやり取り」を愛し、議会を離れて16年が経った今も「リフォームUKのために積極的に活動し続けていた」と付け加えた。\n\n「もちろん多くの人にとって、彼女はストリクトリー・カム・ダンシングへの忘れがたい出演で最もよく（あるいは最も悪く？）記憶されているだろう。長患いのアントン・ドゥ・ベケの振り付けを毎週毎週ものともせず、観客が彼女の失敗を喜ぶという姿で」と声明は続けた。\n\n元保守党大臣のウィデカム氏は、2010年にBBCの『ストリクトリー・カム・ダンシング』に出演し、視聴者のお気に入りとなった。\n\nあるジャッジは彼女を「ドラッグをまとったダーレク（ドクター・フーに登場するロボット）」と評したが、観客からの人気に支えられて準決勝まで勝ち上がった。\n\n同氏は番組の10週間を「壮大で人生を豊かにするもの」と表現した。\n\n議会在籍中、敬虔なカトリック教徒であったウィデカム氏は、中絶反対やLGBTコミュニティへの発言など、社会保守的な見解により度々物議を醸した。\n\n2019年には、科学がいつか同性愛に対する「答えを出すかもしれない」と示唆し、批判を浴びた。\n\n1990年代にカトリックに改宗したことを、同氏は後に「自分が下した最良の決断」と述べた。\n\nタイムズ紙には「罪を罪と呼び、それで終わりにする教会があることは、この上ない安堵だ」と語った。\n\n政治家としてのキャリアを通じて、外見に関する辛辣なコメントにさらされ、新聞には古いハリウッドのホラー映画スター、ボリス・カーロフになぞらえた「ドリス・カーロフ」と書かれた。\n\nしかし同氏はこうした揶揄を軽くかわし、「私は歯が目立ち、ずんぐりして、不細工で、太っていて、独身だ。それが何だというの」と述べた。\n\nウェストミンスターとその先の動向を追うには、政治エッセンシャルニュースレターにご登録ください。", "vocab": [{"word": "staunch", "definition": "「断固とした、熱烈な」という意味の形容詞。特定の信念や立場を揺るぎなく支持する様子を表す。例：a staunch supporter（熱烈な支持者）。"}, {"word": "backlash", "definition": "「強い反発、反動」を意味する名詞。ある発言や行動に対して多くの人が一斉に示す否定的な反応を指す。政治・社会的文脈でよく使われる。"}, {"word": "feisty", "definition": "「気骨のある、負けん気の強い」という意味の形容詞。困難や反対意見にも臆せず立ち向かう気概のある人物を表す、やや口語的な表現。"}, {"word": "formidable", "definition": "「侮りがたい、強大な、畏敬の念を起こさせる」という意味の形容詞。非常に能力が高く、対抗するのが難しいほど印象的な人物や物事を指す。"}, {"word": "conviction", "definition": "「信念、確信」を意味する名詞。自分が正しいと強く信じる考えや価値観のことを指し、政治や道徳的文脈で特によく使われる。"}, {"word": "embark", "definition": "「（新たな事業や活動に）乗り出す、着手する」を意味する動詞。通常 'embark on' の形で使われ、新しい重要な取り組みを始めることを表す。"}, {"word": "choreography", "definition": "「振り付け」を意味する名詞。ダンスや舞台パフォーマンスにおける動きの構成・配置を指す専門用語で、その設計者はchoreographerと呼ばれる。"}]}, {"title_ja": "改革党への50万ポンド超の選挙献金めぐり英警視庁が捜査", "title_en": "Met Police investigating Reform UK over £500,000 election donations", "summary_ja": "ロンドン警視庁（メトロポリタン警察）は、2024年英総選挙前に改革党（Reform UK）へ行われた50万ポンド超の献金をめぐり、有罪判決を受けた詐欺師の母親フィオナ・コットレル氏を中心に捜査を進めている。この捜査は選挙委員会からの付託を受けて2025年2月に開始され、「不適格」な献金者からの資金を隠蔽・偽装した疑いが焦点となっている。これまでに2人が任意同行の上で事情聴取を受けたが、逮捕者は出ていない。", "summary_en": "The Metropolitan Police are investigating over £500,000 in donations made to Reform UK by Fiona Cottrell, mother of convicted fraudster George Cottrell, ahead of the 2024 UK general election. The inquiry, launched after a referral from the Electoral Commission, concerns allegations of concealing or disguising donations from an 'impermissible' donor. Two people have been interviewed under caution, though no arrests have been made.", "source": "BBC UK", "tier": "public", "link": "https://www.bbc.co.uk/news/articles/c3eyq2np7qgo?at_medium=RSS&at_campaign=rss", "state_media": false, "category": "政治", "full_text": "Met police investigating Reform over election donations - reports\n- Published\nThe police are reportedly investigating at least £500,000-worth of donations made to Reform UK by the mother of a convicted fraudster who paid for Nigel Farage's social media staff and security.\nThe Times newspaper, external has reported that Fiona Cottrell is at the centre of a more than year-long inquiry being conducted by the Metropolitan Police.\nA spokesperson for the force confirmed that two people had been interviewed under caution, no arrests had been made and an investigation into donations made to a political party is ongoing.\nReform sources say no party officials have been interviewed by the police.\nThe investigation is said to relate to allegations of concealing or disguising donations derived from an \"impermissible\" donor to a party, or the use of \"false\" information about a donation including the amount or the identity of the donor.\nAs first reported by The Times, the investigation relates to two payments of £250,000 Fiona Cottrell made to Reform before the last general election in 2024.\nThe first donation appeared in the party's accounts on May 9 2024. The second appeared a few weeks later on 29 May, just over a month before polling day. Records of the donations have been published by the Electoral Commission., external\nReform UK leader Nigel Farage was elected to the Commons for the first time at that election.\nThe Times claims that Fiona Cottrell's husband Mark, who died in 2023, left an estate valued at £1.5m and that she has described herself as a \"retired stylist\".\nBBC News has attempted to contact Fiona Cottrell for comment.\nThe concept of \"permissible\" and \"impermissible\" donors was introduced by the Political Parties, Elections and Referendums Act 2000, which prohibits foreign funding for political parties.\nThe legislation means parties can only accept money from a permissible donor.\nPermissible donors include individuals registered on an electoral register and companies registered in the UK.\nThe Sunday Times reported at the weekend that Fiona Cottrell's son, George Cottrell, had supported Farage by paying for staff and security before the 2024 election, but these benefits were not declared once Farage became an MP.\nGeorge Cottrell has long been a close political and personal ally of the Reform UK leader.\nHe pleaded guilty to fraud in the United States and spent eight months in jail there, before being released in 2017.\nUpon his release, Cottrell moved back to the UK and dated Georgia Toffolo, reality TV star and winner of I'm a Celebrity... Get Me Out of Here.\nHe then moved to Montenegro where the Sunday Times reports he became a \"key player\" in Tether.bet, an online bookmaker and casino offering users large stakes on sports and politics in cash or cryptocurrency.\nLawyers for Cottrell said he \"categorically disputes allegations and assertions made by the Sunday Times\" in relation to his financial help for Farage.\nThe Reform leader has denied any wrongdoing on his part and said he didn't need to declare the benefits because they were not related to his political activity.\nAs reported by the Guardian, in June 2024 Fiona Cottrell also gave a £1m donation to Britian Means Business, a think tank owned by Reform's deputy leader Richard Tice.\nData from the Electoral Commission shows, external that Britain Means Business donated £500,000 to Reform UK in the same month.\nIt's not known whether the Met Police investigation is also looking at her donation to Britain Means Business.\nThe revelation about the Met's investigation comes amid increased scrutiny into Nigel Farage's personal finances.\nHe is facing a parliamentary standards investigation into an undeclared £5m payment given to him before the 2024 general election by the crypto billionaire and Reform donor Christopher Harborne.\nFarage has insisted the money was an unconditional personal gift which did not need to be declared to the parliamentary authorities.\nThe Reform leader resigned as the MP for Clacton this week to trigger what he called a \"people versus the establishment\" by-election, which he will stand in.\nTice told Times Radio he'd known the Cottrell family \"for 50 years\" and said the latest revelations were \"a politically motivated smear campaign\".\nApproached by the BBC, a spokeswoman for the Metropolitan Police said: \"An investigation was launched in February 2025 after a referral was made to the Metropolitan Police by the Electoral Commission relating to donations made to a political party ahead of the 2024 UK General Election.\"\nShe added: \"Detectives from the Met's Special Enquiry Team are investigating alleged offences under Section 61 of the Political Parties, Elections and Referendums Act 2000.\n\"Early investigative advice has been sought from the Crown Prosecution Service and two people have so far been interviewed under caution. No arrests have been made.\n\"An offence under this section is not one that the Electoral Commission can investigate and, ", "translation_ja": "メトロポリタン警察、改革党への選挙献金めぐり捜査――各報道より\n\n警察は、有罪判決を受けた詐欺師の母親がナイジェル・ファラージ氏のソーシャルメディアスタッフと警護費用を負担したとされる改革党（Reform UK）への50万ポンド超の献金について、捜査を行っていると報じられている。\n\n英タイムズ紙は、フィオナ・コットレル氏がメトロポリタン警察による1年以上にわたる捜査の中心人物であると報じた。\n\n警察の報道官は、2人が任意同行の上で事情聴取を受けたこと、逮捕者はいないこと、そしてある政党に対してなされた献金に関する捜査が現在進行中であることを確認した。\n\n改革党の関係者によると、党の幹部は誰も警察に聴取されていないという。\n\n捜査は、「不適格」な献金者からの献金資金を隠蔽・偽装したとされる疑惑、または献金の金額や献金者の身元を含む「虚偽」の情報を使用したとされる疑惑に関連しているとされる。\n\nタイムズ紙が最初に報じたように、捜査は2024年の前回総選挙前にフィオナ・コットレル氏が改革党に対して行った2件の25万ポンドの支払いに関係している。\n\n最初の献金は2024年5月9日に党の会計に記載された。2件目は数週間後の5月29日、投票日の1か月余り前に記載された。これらの献金の記録は選挙委員会によって公表されている。\n\n改革党党首のナイジェル・ファラージ氏は、この選挙で初めて庶民院（下院）議員に選出された。\n\nタイムズ紙は、フィオナ・コットレル氏の夫マーク氏が2023年に死去し、遺産の評価額は150万ポンドであったこと、また彼女が自らを「引退したスタイリスト」と称していたと報じている。\n\nBBCニュースはフィオナ・コットレル氏にコメントを求めたが、連絡は取れていない。\n\n「適格」・「不適格」な献金者という概念は、政党への外国からの資金提供を禁じる2000年政党・選挙・国民投票法によって導入された。\n\nこの法律により、政党は適格な献金者からのみ資金を受け取ることができる。\n\n適格な献金者には、選挙人名簿に登録された個人や英国に登録された企業が含まれる。\n\nサンデー・タイムズ紙は週末に、フィオナ・コットレル氏の息子であるジョージ・コットレル氏が2024年選挙前にファラージ氏のスタッフや警護費用を負担することで支援していたが、ファラージ氏が議員になった後もこれらの便益は申告されなかったと報じた。\n\nジョージ・コットレル氏は長年にわたり、改革党党首の政治的・個人的な緊密な同盟者である。\n\n彼は米国で詐欺罪に対して有罪答弁を行い、8か月間服役した後、2017年に釈放された。\n\n釈放後、コットレル氏は英国に帰国し、リアリティTVスターでありサバイバル番組「アイム・ア・セレブリティ…ゲット・ミー・アウト・オブ・ヒア！」の優勝者であるジョージア・トッフォロ氏と交際した。\n\nその後、彼はモンテネグロに移住し、サンデー・タイムズ紙の報道によれば、スポーツや政治に関するスポーツ・政治賭博を現金または暗号通貨で大口賭けで提供するオンラインブックメーカー兼カジノ「Tether.bet」において「中心的プレーヤー」となったという。\n\nコットレル氏の弁護士は、彼が「ファラージ氏への財政的支援に関するサンデー・タイムズの主張および申し立てを断固として否定する」と述べた。\n\n改革党の党首は自らの不正行為を否定し、それらの便益は政治活動とは無関係であるため申告の必要はなかったと述べた。\n\nガーディアン紙の報道によれば、2024年6月、フィオナ・コットレル氏はまた、改革党副党首リチャード・タイス氏が所有するシンクタンク「Britain Means Business（ブリテン・ミーンズ・ビジネス）」に対して100万ポンドの献金を行った。\n\n選挙委員会のデータによると、Britain Means Businessは同月に改革党へ50万ポンドを寄付している。\n\nメトロポリタン警察の捜査が、Britain Means Businessへの彼女の献金についても調べているかどうかは不明である。\n\nメトロポリタン警察の捜査に関するこの情報は、ナイジェル・ファラージ氏の個人的な財政に対する監視が強まる中で明らかになった。\n\n同氏は、2024年総選挙前に暗号通貨億万長者で改革党支持者のクリストファー・ハーボーン氏から提供された500万ポンドの未申告の支払いをめぐり、議会の基準調査に直面している。\n\nファラージ氏は、この資金は無条件の個人的な贈り物であり、議会当局への申告は不要だったと主張している。\n\n改革党の党首は今週、「国民対体制」の補欠選挙と彼が呼ぶ選挙を引き起こすためにクラクトン選挙区の議員を辞職し、自らもその選挙に立候補する。\n\nタイス氏はタイムズ・ラジオに対し、コットレル家のことを「50年来知っている」と述べ、最新の暴露は「政治的動機に基づく誹謗中傷キャンペーンだ」と語った。\n\nBBCの取材に対し、メトロポリタン警察の広報担当者は次のように述べた。「2024年英国総選挙前に政党に対してなされた献金に関して、選挙委員会からメトロポリタン警察に付託が行われた後、2025年2月に捜査が開始されました。」\n\nさらに次のように付け加えた。「警視庁特別捜査チームの捜査員が、2000年政党・選挙・国民投票法第61条に基づく犯罪の疑いについて捜査しています。\n\n「王立検察庁（CPS）に対して事前の捜査上の助言が求められており、これまでに2人が任意同行の上で事情聴取を受けました。逮捕者は出ていません。\n\n「本条に基づく犯罪は選挙委員会が調査できるものではなく、（以下略）」", "vocab": [{"word": "permissible", "definition": "許容される、認められるという意味の形容詞。法律・規則の文脈で「適法な」「認可された」という意味でよく使われ、ここでは献金者が法律上認められた資格を持つかどうかを指す。"}, {"word": "caution (interviewed under caution)", "definition": "英国法において「任意同行の上で事情聴取する」という慣用表現。警察が容疑者に対して、発言が証拠として使用される可能性があることを警告した上で行う聴取を指す。"}, {"word": "concealing", "definition": "隠蔽するという意味の動詞concealの現在分詞形。法律文書や報道において、不正な目的で情報や資産を意図的に隠すことを指す際に使われる。"}, {"word": "impermissible", "definition": "許可されない、認められないという意味の形容詞。permissibleの反意語で、法律や規則に違反する行為や人物を指す際に使われる専門的な表現。"}, {"word": "referral", "definition": "付託、照会という意味の名詞。ある機関が案件や問題を別の機関に正式に送付・委託する行為を指し、法律・行政の文脈で頻繁に使われる。"}, {"word": "scrutiny", "definition": "精査、厳しい監視という意味の名詞。何かを注意深くかつ批判的に調べることを指し、政治や財務に関する報道でよく使われる上級語彙。"}, {"word": "unconditional", "definition": "無条件のという意味の形容詞。いかなる条件や制約も伴わないことを意味し、贈与や合意などの法的・財務的文脈でよく使われる。"}]}, {"title_ja": "中国、再使用型ロケットのブースター回収に初めて成功", "title_en": "China retrieves rocket booster in reusable launch breakthrough", "summary_ja": "中国は金曜日、軌道クラスロケットのブースター回収に初めて成功し、再使用型打ち上げシステム開発に向けた大きな前進を遂げた。長征10Bは海南省の商業宇宙発射場から打ち上げられ、衛星を所定の軌道に投入した後、ブースターが洋上プラットフォーム上のネット式回収システムで捕捉された。この成果は、中国が約10年かけて進めてきた再使用ロケット技術開発と打ち上げコスト削減の取り組みにおける重要な節目となる。", "summary_en": "China successfully recovered the booster of an orbital-class rocket for the first time on Friday, using a net-based retrieval system on an offshore platform. The Long March 10B lifted off from Hainan and placed a satellite into orbit before its booster was caught by hooks and net approximately six minutes after stage separation. The achievement marks a major step in China's decade-long push to develop reusable launch technology and cut costs for its expanding commercial satellite programs.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/china-retrieves-booster-in-reusable-rocket-breakthrough/a-77904960?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "China retrieves booster in reusable rocket breakthrough\nJuly 10, 2026China on Friday successfully recovered the booster of an orbital-class rocket for the first time, marking a major advance in its push to develop reusable launch systems.\nThe Long March 10B lifted off from the Hainan commercial space launch site in southern China at 12:15 p.m. on Friday and placed a satellite into its designated orbit, state media reported.\nWhat do we know about the Long March flight?\nAround six minutes after the booster separated from the rocket's upper stage, it descended vertically toward an offshore platform and was captured by a net-based retrieval system.\nUnlike the rockets used by US companies SpaceX and Blue Origin, which land autonomously on deployable legs, the Long March 10B uses four hooks to catch a net suspended above the sea platform.\nChina Academy of Launch Vehicle Technology expert Chen Muye said the approach simplifies the rocket's onboard structure, reduces its weight and could increase payload capacity.\n\"It is also highly adaptable to landing-point deviations, as coordinated net systems can effectively expand the capture window,\" Muye told state media agency Xinhua.\nHow is China planning to deploy reusable rockets?\nChina has spent nearly a decade developing reusable rocket technology as it seeks to cut launch costs and support its rapidly expanding commercial satellite networks.\nPrevious recovery attempts by private company LandSpace and the state-owned China Aerospace Science and Technology Corporation failed during the final landing stage last year.\nThe Long March 10B is also part of the broader Long March 10 family that China is developing for planned crewed lunar missions before 2030. Data from Friday's flight could help validate technology for the country's lunar program.\nShares in several Chinese aerospace companies surged following the test, with China Spacesat and China Satellite Communications reaching their daily trading limits.\nThe Long March 10B can carry at least 16 metric tons into low-Earth orbit and has been compared to SpaceX's Falcon 9, which has a maximum payload of 22.8 metric tons.\nSpaceX first landed a Falcon 9 booster following an orbital mission in December 2015. It now launches the rocket around 150 times a year, frequently reusing individual boosters dozens of times.\nEdited by: Dmytro Hubenko\nDon't let the algorithm hide the news. If you rely on our team for trusted reporting, please take a moment to select us as your Preferred Source on Google by clicking here and hitting the \"star\" or \"preferred\" button, so you'll always see our verified news first.", "translation_ja": "中国、再使用型ロケットのブースター回収に初めて成功\n\n2026年7月10日 — 中国は金曜日、軌道クラスロケットのブースター回収に初めて成功し、再使用型打ち上げシステムの開発推進において重要な前進を遂げた。\n\n長征10Bは金曜日の午後0時15分、中国南部・海南省にある商業宇宙発射場から打ち上げられ、衛星を所定の軌道に投入したと国営メディアが伝えた。\n\n長征10Bの飛行についてわかっていること\n\nブースターがロケットの上段から分離してから約6分後、ブースターは洋上プラットフォームに向けて垂直降下し、ネット式回収システムで捕捉された。自律的に展開脚を使って着陸する米スペースXやブルーオリジンのロケットとは異なり、長征10Bは海上プラットフォームの上方に張られたネットを4本のフックで捕まえる方式を採用している。\n\n中国運載ロケット技術研究院の専門家・陳木葉氏は、このアプローチによってロケット本体の構造が簡素化され、重量が軽減されるとともに、ペイロード能力の向上も期待できると述べた。\n\n「着地点のずれへの適応性も高く、連携したネットシステムによって捕捉ウィンドウを効果的に拡大できる」と陳氏は国営通信社の新華社に語った。\n\n中国は再使用型ロケットをどのように展開する計画か\n\n中国は打ち上げコストの削減と急速に拡大する商業衛星ネットワークの支援を目指し、約10年にわたって再使用型ロケット技術の開発に取り組んできた。昨年は民間企業のランドスペースと国営の中国航天科技集団による回収試験が、いずれも最終着陸段階で失敗していた。\n\n長征10Bはまた、中国が2030年までに実施を計画している有人月面ミッションに向けて開発中の長征10ファミリーの一部でもある。金曜日の飛行で得られたデータは、中国の月面探査プログラムに向けた技術の検証に役立てられる可能性がある。\n\n今回の試験を受け、中国スペースサットや中国衛星通信が日次の値幅制限に達するなど、複数の中国航空宇宙企業の株価が急騰した。\n\n長征10Bは低軌道に少なくとも16メートルトンを運ぶ能力を持ち、最大ペイロード22.8メートルトンのスペースXファルコン9と比較されている。\n\nスペースXが軌道ミッション後にファルコン9のブースター着陸に初めて成功したのは2015年12月のことだ。現在同社は年間約150回のロケット打ち上げを行い、個々のブースターを数十回にわたって繰り返し使用している。\n\n編集：ドミトロ・フベンコ", "vocab": [{"word": "retrieval", "definition": "回収・取り戻すこと。技術的文脈では、使用済み機器や物体を再利用のために回収する行為を指す。"}, {"word": "orbital-class", "definition": "軌道クラスの。宇宙用語で、地球周回軌道に到達するのに十分な能力を持つロケットや飛行体を形容する複合形容詞。"}, {"word": "autonomously", "definition": "自律的に、自動的に。人間の直接介入なしにシステムが独立して動作・判断する様子を表す副詞。"}, {"word": "deployable", "definition": "展開可能な。必要に応じて広げたり伸ばしたりできる構造や装置に用いられる技術用語。"}, {"word": "payload capacity", "definition": "ペイロード能力・積載能力。ロケットや輸送機が運搬できる貨物・衛星などの最大重量を指す航空宇宙用語。"}, {"word": "validate", "definition": "検証する・有効性を確認する。データや実験結果によって理論・技術・システムが正しく機能することを証明するという意味で用いられる。"}, {"word": "surged", "definition": "急騰した・急増した。株価や数値などが急激に大幅上昇した状況を表す動詞の過去形で、金融・経済報道で頻出する表現。"}]}, {"title_ja": "ヴィーガン妊娠検査から廃材建築まで：今週の環境分野の明るいニュース", "title_en": "Eco Wins: Vegan Pregnancy Tests, Clay Pot Cooling & Waste Construction", "summary_ja": "今週の環境ニュースでは、海洋微細藻類を使用した動物不使用の妊娠検査薬を開発したドイツのスタートアップ企業、インドの伝統的な土器にヒントを得たテラコッタ製冷却システム、そしてモザンビークで廃棄プラスチックやガラスを使って施設を建設する若者支援プロジェクトが取り上げられている。これらの革新的な取り組みは、気候変動への適応、倫理的な医療検査、資源の少ない地域での循環型経済を推進する低コストかつ持続可能なソリューションを示している。", "summary_en": "This week's environmental highlights include a German start-up's animal-free pregnancy test made using marine microalgae, a terracotta-based cooling system inspired by India's traditional clay pots, and a Mozambican project teaching youth to build community structures from recycled waste materials. These innovations demonstrate low-cost, sustainable solutions addressing climate adaptation, ethical medical testing, and circular economies in resource-limited regions.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/vegan-pregnancy-tests-and-other-eco-wins-this-week/a-77902157?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Vegan pregnancy tests and other eco wins this week\nJuly 10, 2026\nA traditional way to manage extreme temperatures\nAs India grapples with longer, more frequent and more severe heatwaves, access to cooling or even a refrigerator remains out of reach for millions. In New Delhi, many households rely on the matka – a traditional clay pot that uses evaporation to keep water cool. It’s an affordable alternative for homes without refrigerators.\nThe same centuries-old principle is now inspiring modern solutions such as CoolAnt, a terracotta-based cooling system that lowers air temperatures in interior spaces, using water and natural airflow. Supporters say such low-cost, energy-efficient technologies could help vulnerable communities adapt while reducing dependence on air conditioning. \nHome medical tests that don't hurt animals \nA German start-up has developed what it says is the world's first pregnancy test made without antibodies from animals such as rabbits or mice, the test uses marine microalgae.\nThe European Union-certified product has been on sale since 2025. Its founders hope the technology will make diagnostic testing more sustainable while helping reduce the use of animals in medical research.\nBuilding with discarded plastic and glass \nIn northeastern Mozambique, a project called Yopipila – meaning \"green” in the local Emakua language – is helping young people turn waste into opportunity. Supported by the Hakuna Matata Foundation, participants in Cabo Delgado learn eco-friendly techniques to build community facilities from discarded plastic and glass bottles, bamboo, earth and recycled tyres.\nThe training promotes sustainable construction while creating skills and green income opportunities in a region with limited jobs and little recycling infrastructure. For many participants, the project offers both environmental solutions and a pathway to a more secure future.\nEdited by: Anke Rasper", "translation_ja": "ヴィーガン妊娠検査とその他の今週のエコな成果\n2026年7月10日\n\n■ 極端な気温を管理する伝統的な方法\nインドがより長く、より頻繁で、より深刻な熱波に悩まされる中、冷房や冷蔵庫へのアクセスは数百万人にとって依然として手の届かないものとなっている。ニューデリーでは、多くの家庭が「マトカ」と呼ばれる伝統的な素焼きの壺に頼っており、蒸発の原理を使って水を冷たく保っている。これは冷蔵庫のない家庭にとって手頃な代替手段だ。\n\nこの何世紀にもわたる原理が今、「CoolAnt」のような現代的なソリューションに着想を与えている。CoolAntはテラコッタベースの冷却システムで、水と自然な気流を利用して室内の気温を下げる。支持者たちは、こうした低コストでエネルギー効率の高い技術が、エアコンへの依存を減らしながら、脆弱なコミュニティの適応を助ける可能性があると述べている。\n\n■ 動物を傷つけない家庭用医療検査\nドイツのスタートアップ企業が、ウサギやマウスなどの動物由来の抗体を使わない、世界初とされる妊娠検査薬を開発した。この検査薬は海洋の微細藻類を使用している。\n\nEU認証を取得したこの製品は2025年から販売されている。創業者たちは、この技術が診断検査をより持続可能なものにし、医学研究における動物の使用を減らす助けになることを望んでいる。\n\n■ 廃棄プラスチックとガラスで建てる\nモザンビーク北東部では、地元のエマクア語で「緑」を意味する「Yopipila（ヨピピラ）」というプロジェクトが、若者たちが廃棄物を機会に変えるのを支援している。ハクナ・マタタ財団の支援を受け、カボ・デルガド州の参加者たちは、廃棄されたプラスチックやガラス瓶、竹、土、リサイクルタイヤを使ってコミュニティ施設を建設するエコフレンドリーな技術を学んでいる。\n\nこの研修は持続可能な建設を推進するとともに、雇用が限られリサイクルインフラも乏しい地域において、技術と環境に配慮した収入機会を生み出している。多くの参加者にとって、このプロジェクトは環境問題の解決策であると同時に、より安定した未来への道筋でもある。\n\n編集：アンケ・ラスパー", "vocab": [{"word": "evaporation", "definition": "液体が気体に変わる蒸発のプロセスを指す。本文では素焼きの壺が蒸発の原理を使って水を冷やす仕組みの説明に使われている。"}, {"word": "terracotta", "definition": "素焼きの陶器や焼成された粘土素材を指す専門用語。建築材料や工芸品に使われ、本文では冷却システムの素材として登場する。"}, {"word": "microalgae", "definition": "顕微鏡でしか見えない微小な藻類の総称。バイオテクノロジーや医療分野で注目される素材であり、本文では動物不使用の妊娠検査薬の原料として使用されている。"}, {"word": "antibodies", "definition": "免疫システムが抗原に対して産生するタンパク質（抗体）を指す医学・生物学用語。本文では従来の妊娠検査薬が動物由来の抗体を必要としていたことの文脈で使われている。"}, {"word": "circular economy", "definition": "廃棄物を最小限に抑え、資源を繰り返し利用することを目指す経済モデルを指す概念。本文では廃棄プラスチックや廃ガラスを建材として再利用するプロジェクトがその実践例として示されている。"}, {"word": "vulnerable communities", "definition": "貧困、気候変動、社会的不平等などのリスクにさらされやすい人々や集団を指す表現。政策・環境・社会系の文章で頻繁に使われる上級語句。"}, {"word": "diagnostic", "definition": "疾病や状態を識別・判断するための検査や技術に関連する形容詞。医療分野で広く使われ、本文では妊娠検査などの診断検査の持続可能性を論じる文脈で登場する。"}]}, {"title_ja": "ワールドカップがメンタルヘルスに良い理由", "title_en": "Why the World Cup can be good for your mental health", "summary_ja": "臨床心理士のケイティ・ウッド氏は、FIFAワールドカップが見知らぬ人々の間に「つながり」を生み出すことでメンタルヘルスを促進すると説明する。試合中の共感的な感情体験――共に喜び、悲しむこと――は、人間の根本的な「帰属欲求」を満たすという。応援するチームを持たないファンでさえ、大会の雰囲気の中にコミュニティと喜びを見出している。", "summary_en": "Clinical psychologist Katie Wood explains that the FIFA World Cup fosters mental health by creating a sense of connectedness among strangers. Shared emotional experiences during matches—cheering, celebrating, and commiserating together—fulfill a fundamental human need to belong. Even fans without a favorite team find joy and community in the atmosphere of the tournament.", "source": "Deutsche Welle", "tier": "public", "link": "https://www.dw.com/en/why-the-world-cup-can-be-good-for-your-mental-health/a-77889619?maca=en-rss-en-all-1573-rdf", "state_media": false, "category": "社会", "full_text": "Why the World Cup can be good for your mental health\nJuly 10, 2026It's the kind of thing many football fans experience during World Cup watch parties: The \"home\" team scores a goal and fans in a beer garden or pub cheer as one – and may even embrace in celebration – even though they had been complete strangers just moments earlier.\nFor Katie Wood, a clinical psychologist at Swinburne University in Melbourne, these shared moments can actually support mental health.\n\"The greatest protective factor for our mental health is connectedness—the connection to ourselves, to other people, to our community, and to our culture,\" Wood told DW. And sport, in her view, hits exactly this note; it brings people together.\nThis form of connection isn't limited to families or friends. It can also emerge when, for a brief moment, one feels they are part of something bigger. A World Cup is the perfect setting for giving people this sort of feeling.\nAmericans celebrate alongside Algerians\nWhat this looks like in practice has been on show throughout this World Cup: fans from a wide variety of countries cheer together, swap jerseys, or suddenly find themselves side-by-side supporting the same team.\nIn Lawrence, Kansas, the city center was spontaneously transformed into a green-and-white public viewing area during the match between Algeria and Austria. Because the Algerian national team had set up its World Cup base there, hundreds of local Americans turned up wearing Algerian jerseys, with the national colors painted on their faces and flags in their hands.\nIt is also becoming evident elsewhere just how quickly football can build bridges. After the Round-of-16 match between Switzerland and Colombia in Vancouver, DW observed two fans swapping jerseys as a memento of the evening they had shared. In Seattle, meanwhile, following the USA's elimination, a Belgium supporter was seen comforting a disappointed American fan.\nA visitor to San Francisco told DW about a moment that stuck with him: \"A man saw my jersey. He didn't know me at all. He walked up, hugged me, and simply said, 'This is the World Cup.'\"\nA sense of belonging: a fundamental need\nKatie Wood sees this as the unique strength of a tournament like the World Cup. People who might never have crossed paths in everyday life share the same emotions for a brief time.\n\"You can come from vastly different walks of life. But the moment you support the same team, a collective experience with a shared goal emerges.\"\nThat goal taps into a fundamental need that many underestimate: the need to belong. It makes no difference whether someone has been a fan for decades or is watching a match for the very first time. What matters more is the shared experience, the tension before kickoff, the roar when a goal is scored, the shared frustration after a defeat.\n\"No one knows what we go through as human beings day in and day out,\" a visitor at a fan zone told DW. \"That's why moments like these are so special.\"\nAnd even those without a favorite team can get caught up in the atmosphere.\n\"I'm just happy,\" a visitor in Philadelphia told DW. \"I don't even have a team, but I've come to love watching the games.\"\nAn escape from the stresses of everyday life\nThe World Cup can offer a way to step back from everyday life for a while.\n\"When so much is happening in the world, we look for ways to escape our daily routine for a bit,\" Wood explained. \"And experiencing the World Cup—with all the excitement surrounding it—together with other people is a very healthy way to do that.\"\nOf course, the focus of a tournament like the World Cup is usually the football itself. For many fans, however, the strongest memories of a World Cup are about the moments that happened on the fringes of the match itself.\nThis article was originally published in German.\nEdited by: Jonathan Harding", "translation_ja": "ワールドカップがメンタルヘルスに良い理由\n\n2026年7月10日\n\nワールドカップのパブリックビューイングで、多くのサッカーファンが経験するようなことがある。「地元」チームがゴールを決めると、ビアガーデンやパブに集まったファンたちが一斉に歓声を上げ、ほんの数分前まで完全な赤の他人だったにもかかわらず、抱き合って喜び合う——そんな光景だ。\n\nメルボルンにあるスウィンバーン大学の臨床心理士、ケイティ・ウッド氏にとって、こうした共有の瞬間は実際にメンタルヘルスを支えるものになりうる。\n\n「私たちのメンタルヘルスを守る最大の要因は『つながり』です——自分自身とのつながり、他者とのつながり、コミュニティとのつながり、そして文化とのつながりです」と、ウッド氏はDWに語った。そしてスポーツは、まさにこの点に訴えかけるものだと彼女は考えている。スポーツは人々を結びつけるのだ。\n\nこのつながりの形は、家族や友人に限ったものではない。自分が何か大きなものの一部であると、ほんの一瞬感じられるときにも生まれうる。ワールドカップは、人々にそのような感覚を与えるのにうってつけの舞台だ。\n\nアメリカ人がアルジェリア人と共に喜ぶ\n\nこれが実際にどのような形で現れているかは、今回のワールドカップを通じて随所で見られてきた。多種多様な国のファンたちが共に声援を送り、ユニフォームを交換し合い、あるいは突然同じチームを隣り合って応援することになる。\n\nカンザス州ローレンスでは、アルジェリア対オーストリアの試合の際、市の中心部が自然発生的にグリーンとホワイトのパブリックビューイングエリアへと変貌した。アルジェリア代表チームがそこをワールドカップの拠点に設けていたため、何百人ものアメリカ人がアルジェリアのユニフォームを着て、顔に国旗の色を塗り、手に旗を持って集まってきたのだ。\n\nサッカーがいかに素早く橋を架けられるかは、他の場所でも明らかになりつつある。バンクーバーで行われたラウンド16のスイス対コロンビア戦の後、DWは2人のファンが思い出として共に過ごした夜の記念にユニフォームを交換する場面を目撃した。また、シアトルでは、アメリカが敗退した後、落胆するアメリカ人ファンをベルギーのサポーターが慰める光景が見られた。\n\nサンフランシスコを訪れていたある人物は、忘れられない瞬間についてDWに語ってくれた。「ある男性が私のユニフォームに気づいた。まったく見知らぬ人だ。彼は近づいてきて、私を抱きしめ、こう言った。『これがワールドカップだ』と」\n\n帰属感——根本的な欲求\n\nケイティ・ウッド氏は、これこそがワールドカップのようなトーナメントの独自の強みだと見ている。普段の生活では決して交わることがなかったかもしれない人々が、ほんの短い時間、同じ感情を共有する。\n\n「まったく異なる境遇の人々が集まっていても、同じチームを応援した瞬間に、共通の目標を持つ集合的な体験が生まれる」\n\nその目標は、多くの人が過小評価しがちな根本的な欲求——「帰属したい」という欲求——に訴えかけるものだ。何十年ものファン歴があろうと、初めて試合を見る人であろうと、関係ない。大切なのは、共有された体験——キックオフ前の緊張、ゴールが決まったときの歓声、敗戦後の共有された悔しさ——なのだ。\n\n「私たちが日々何を経験しているかを、誰も知ることはできない」とあるファンゾーンの訪問者はDWに語った。「だからこそ、こういう瞬間がとても特別なんです」\n\n特定のお気に入りチームを持たない人でさえ、この雰囲気に引き込まれてしまうことがある。\n\n「ただただ幸せです」とフィラデルフィアを訪れていた人物はDWに語った。「応援するチームがいるわけでもないのですが、試合を見ることが好きになってしまいました」\n\n日常のストレスからの逃避\n\nワールドカップは、日常生活から少し離れる機会を提供してくれることがある。\n\n「世界でこれほど多くのことが起きているとき、私たちは日常のルーティンから少し逃れる方法を探します」とウッド氏は説明した。「そして他の人々と一緒に、その周囲のすべての興奮と共にワールドカップを体験することは、とても健全な方法のひとつです」\n\nもちろん、ワールドカップのようなトーナメントの焦点は通常、サッカーそのものだ。しかし多くのファンにとって、ワールドカップで最も強く残る記憶は、試合そのものの周辺で起きた瞬間についてのものだ。\n\nこの記事はドイツ語で最初に公開されました。\n編集：ジョナサン・ハーディング", "vocab": [{"word": "connectedness", "definition": "「つながり」「結びつき」を意味する名詞。心理学・社会学の文脈で、個人が他者やコミュニティと精神的・感情的に結びついている状態を指す。"}, {"word": "protective factor", "definition": "「防御因子」「保護要因」を意味する専門用語。心理学や公衆衛生の分野で、精神疾患やリスクの発生を抑制・軽減する要素のことを指す。"}, {"word": "commiserating", "definition": "「共に嘆く」「同情する」という意味の動詞commiserateの現在分詞形。他者の不運や失望に対して共感や慰めを示す行為を表し、やや改まった表現。"}, {"word": "spontaneously", "definition": "「自然発生的に」「自発的に」を意味する副詞。事前の計画や外部からの強制なしに、自然に物事が起こる様子を表す。"}, {"word": "fringes", "definition": "本来「縁」「周辺部」を意味するが、比喩的に「本筋から外れた周辺の出来事や空間」を指す。ここでは試合本体ではなく、その周囲で起きた出来事という意味で使われている。"}, {"word": "elimination", "definition": "「敗退」「脱落」を意味する名詞。スポーツのトーナメント競技において、チームが敗北によって大会から除外される状態を指す。"}, {"word": "underestimate", "definition": "「過小評価する」を意味する動詞。何かの重要性・価値・影響力を実際よりも低く見積もってしまうことを指し、ビジネス・学術両面でよく使われる。"}]}, {"title_ja": "ホワイトハウスUFCイベント襲撃計画で8人が起訴される", "title_en": "8 Suspects Indicted in Alleged Plot to Attack White House UFC Event", "summary_ja": "連邦大陪審は、6月14日にホワイトハウス南芝生で開催されたUFCイベントを襲撃しようとした疑いで8人の男を起訴した。計画ではドローンで陽動作戦を行い、逃げる参加者を狙撃手で攻撃するとされていた。標的にはトランプ大統領、ヴァンス副大統領、イーロン・マスク氏、イスラエル首相が含まれていたとされ、有罪となれば終身刑に処される可能性がある。", "summary_en": "A federal grand jury has indicted eight men for allegedly conspiring to attack a UFC event held at the White House South Lawn on June 14, using drones as diversions and snipers to target fleeing attendees. The alleged targets included President Trump, Vice President Vance, Elon Musk, and the Israeli Prime Minister. If convicted, each defendant faces up to life in prison.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/US/total-8-suspects-now-indicted-alleged-plot-attack/story?id=134638906", "state_media": false, "category": "社会", "full_text": "Total of 8 suspects now indicted in alleged plot to attack White House UFC event\nThe suspects wanted to use drones and snipers, prosecutors said.\nA total of eight men have been indicted for their alleged roles in the plot to attack a UFC event on the grounds of the White House last month, according to federal prosecutors.\nThe men allegedly wanted to use drones to create a diversion, and then use snipers to attack attendees fleeing from the June 14 event on the South Lawn of the White House, according to the Justice Department.\nAuthorities arrested five men in connection with the alleged plot on the weekend it took place and another two suspects the following week.\nThe indictment, unveiled Thursday, includes an eighth defendant -- Chandler D. Scaggs, 21, of Chapmanville, West Virginia, who was allegedly assigned to be one of the snipers in the attack, according to the Justice Department.\nScaggs was allegedly planning to be picked up by Tycen Proper, 19, of Danville, Ohio, another alleged coconspirator, and to travel to Washington, D.C., with him, according to prosecutors. Scaggs and other alleged members of the plot lost contact with Proper after he was arrested by federal authorities.\nAccording to prosecutors, after losing contact with Proper, Scaggs allegedly made new plans to travel to Washington, D.C., and indicated he still wanted to carry out the attack.\nScaggs was taken into custody in West Virginia.\nAn attorney for Scaggs said his office is in \"the very early stages of gathering and reviewing the government's evidentiary materials.\"\n\"Because of the serious nature of the allegations, I decline any further comment until I've had an opportunity to more thoroughly review this matter,\" Eric Brehm, who is representing Scaggs told ABC News.\nThe seven people initially arrested were previously charged by criminal complaint in various districts around the country. However, the two-count indictment by a grand jury in Columbus, Ohio, replaces the initial charges.\nThe indictment charges all eight men with conspiracy to provide material support to terrorists and conspiracy to commit murder on federal government territory and to murder a federal government official.\nAn attorney for Proper said he will enter a not guilty plea.\n\"We have received a copy of the indictment that was returned today,\" Joseph Patituce, an attorney representing Proper, told ABC News. \"Mr. Proper will enter a plea of not guilty and as we move forward we will carefully review the charges against him and go step by step from there. We ask that the public keep an open mind and remember that he is 19 years old, the youngest of any person charged here.\"\nThe men allegedly wanted to attack \"high value targets\" such as President Donald Trump, Vice President JD Vance, Elon Musk and the Prime Minster of Israel, according to prosecutors.\nThe men \"created, organized, and participated in a structured system of action, including a 'tier' system to classify participants in the conspiracy, with \"tier one\" participants committing \"to put themselves in harms [sic] way, break the law, and potentially go into hiding,\" according to court records.\nIn addition to Scaggs and Proper, the other defendants are: Abraham Alvarez, 31, of Omaha; Daniel K. Eskridge, 32, of Hamilton, Missouri; William L.S. Falkner, 21, of Belfair, Washington; Jordan W. Rincker, 28, of St. Joseph, Missouri; Bryan O. Roa, 25, of Calimesa, California and Michael Thomas, 32, of Pinon Hills, California.\nIf convicted, all eight men could each face up to life in prison.\nAuthorities have said concerned phone calls by Proper's mother helped tip off authorities to what would become a nationwide investigation into the alleged plot. She raised concerns to police about his recent amassing of firearms and troubling conversations with individuals online, according to authorities.", "translation_ja": "ホワイトハウスUFCイベント襲撃計画で合計8人が起訴される\n\n容疑者らはドローンと狙撃手を使用しようとしていたと検察は述べている。\n\n連邦検察によると、先月ホワイトハウス敷地内で開催されたUFCイベントを襲撃する計画に関与したとして、合計8人の男が起訴された。\n\n司法省によると、男たちは6月14日にホワイトハウスの南芝生で行われたイベントから逃げ出す参加者を、ドローンで陽動し、その後狙撃手で攻撃しようとしていたとされている。\n\n当局はイベントが行われた週末に5人を逮捕し、翌週にさらに2人の容疑者を逮捕した。\n\n木曜日に公表された起訴状には8人目の被告——ウェストバージニア州チャップマンビル出身のチャンドラー・D・スキャッグス（21歳）——が含まれており、司法省によると彼は攻撃における狙撃手の一人として割り当てられていたとされている。\n\nスキャッグスはオハイオ州ダンビル出身の共犯者とされるタイセン・プロパー（19歳）に迎えに来てもらい、共にワシントンD.C.へ移動する計画だったと検察は述べている。スキャッグスとほかの共謀者たちは、プロパーが連邦当局に逮捕された後、彼との連絡を失った。\n\n検察によると、プロパーとの連絡が途絶えた後、スキャッグスはワシントンD.C.へ向かう新たな計画を立て、それでも攻撃を実行する意思を示していたとされている。\n\nスキャッグスはウェストバージニア州で身柄を拘束された。\n\nスキャッグスの弁護士は、「政府の証拠資料を収集・精査する非常に初期の段階にある」と述べた。\n\n「申し立ての深刻な性質を考慮し、この件をより十分に検討する機会を得るまで、それ以上のコメントは差し控える」と、スキャッグスを代理するエリック・ブレームがABCニュースに語った。\n\n当初逮捕された7人は、全米各地の複数の地区で刑事訴状によって起訴されていた。しかし、オハイオ州コロンバスの大陪審による2つの訴因からなる起訴状が最初の訴追に取って代わる形となった。\n\n起訴状は8人全員に対し、テロリストへの物質的支援の共謀、および連邦政府の土地における殺人共謀と連邦政府高官殺害共謀の罪で起訴している。\n\nプロパーの弁護士は、彼が無罪答弁を行う予定だと述べた。\n\n「本日返された起訴状の写しを受け取った」と、プロパーを代理するジョセフ・パティトゥーチェがABCニュースに語った。「プロパーは無罪の答弁を行い、今後進めていく中で彼に対する訴追内容を慎重に検討し、一歩一歩対応していく。起訴された中で最年少の19歳であることを忘れず、先入観を持たずに見ていただくよう、国民にお願いしたい」\n\n男たちは、ドナルド・トランプ大統領、JDヴァンス副大統領、イーロン・マスク氏、イスラエル首相などの「高価値標的」を攻撃しようとしていたと検察は述べている。\n\n男たちは「行動の組織的なシステムを作成・組織・参加しており、参加者を分類する『階層』システムを含み、『第一層』の参加者は『自らを危険にさらし、法律を破り、潜伏する可能性』を約束した」と裁判記録は示している。\n\nスキャッグスとプロパーに加え、その他の被告は以下の通りである：ネブラスカ州オマハ出身のアブラハム・アルバレス（31歳）、ミズーリ州ハミルトン出身のダニエル・K・エスクリッジ（32歳）、ワシントン州ベルフェア出身のウィリアム・L・S・フォークナー（21歳）、ミズーリ州セントジョセフ出身のジョーダン・W・リンカー（28歳）、カリフォルニア州カリメサ出身のブライアン・O・ロア（25歳）、カリフォルニア州ピノンヒルズ出身のマイケル・トーマス（32歳）。\n\n有罪となった場合、8人全員がそれぞれ最高終身刑に処される可能性がある。\n\n当局によると、プロパーの母親からの懸念の電話が当局への情報提供となり、この疑惑の計画に関する全国的な捜査につながったとされている。彼女は、息子が最近大量の銃器を入手していることや、オンラインで個人と行っている不穏な会話について警察に懸念を申し出たという。", "vocab": [{"word": "indicted", "definition": "大陪審によって正式に起訴されること。法的手続きにおいて、証拠が十分あると判断された場合に用いられる法律用語。"}, {"word": "coconspirator", "definition": "共謀者のこと。犯罪や違法行為を共に計画・実行した人物を指す法律用語で、複数人が関与する事件で使われる。"}, {"word": "material support", "definition": "テロリストや犯罪組織に対して資金・物資・人員などの実質的な支援を提供すること。米国の反テロ法において重大な犯罪として規定されている法律用語。"}, {"word": "diversion", "definition": "注意や関心を他方向へ逸らす陽動作戦のこと。ここでは本来の攻撃を隠すためにドローンを使って混乱を引き起こす戦術として使われている。"}, {"word": "amassing", "definition": "大量に蓄積・収集すること。特に武器や資産などを短期間に大量に集める行為を表す際に使われる動詞。"}, {"word": "indictment", "definition": "大陪審による正式起訴状のこと。十分な証拠があると認められた場合に発行される法的文書で、刑事訴追の正式な開始を意味する。"}, {"word": "conspiracy", "definition": "二人以上の人物が違法行為を行うために共謀すること。米国の刑法において独立した重大犯罪として扱われる法律用語。"}]}, {"title_ja": "ABCニュースライブ：24時間365日のニュース速報と生中継", "title_en": "ABC News Live: 24/7 Breaking News and Live Event Coverage", "summary_ja": "ABCニュースライブは、ニュース速報や生中継イベントを24時間365日ストリーミング配信するサービスです。国内外の主要ニュースをリアルタイムで報道し、視聴者に最新情報を届けます。ABCニュースの記者陣が幅広いトピックについて随時最新情報を提供しています。", "summary_en": "ABC News Live provides continuous 24/7 streaming coverage of breaking news and live events. The service delivers real-time reporting on major national and international stories as they unfold. Viewers can access up-to-the-minute updates across a wide range of topics from ABC News journalists.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/video/41463246/", "state_media": false, "category": "社会", "full_text": "", "translation_ja": "", "vocab": []}, {"title_ja": "報復攻撃後もイランと米国が核問題の技術的協議を継続", "title_en": "US and Iran Continue Technical Nuclear Talks After Retaliatory Strikes", "summary_ja": "米国とイランは、テヘランへの2日間にわたる報復攻撃にもかかわらず、核問題に関する技術的交渉を継続している。米国当局者はイランが核兵器を保有することは決して許されないと改めて強調し、現行の停戦は「実績に基づくもの」だと述べた。また、船舶への攻撃はテロ行為であると非難した。", "summary_en": "The United States and Iran are continuing technical negotiations on nuclear issues despite two days of retaliatory strikes against Tehran. A U.S. official reaffirmed that Iran must never possess a nuclear weapon and described the ongoing ceasefire as 'performance-based.' The official also condemned Iran's attacks on vessels as acts of terrorism.", "source": "ABC News", "tier": "public", "link": "https://abcnews.com/International/live-updates/iran-live-updates-thousands-throng-tehran-streets-khamenei/?id=134509610", "state_media": false, "category": "政治", "full_text": "Technical talks between Iran and U.S. continue: U.S. official\nThe U.S. and Iran continue to engage in technical negotiations on nuclear issues, a U.S. official said Thursday, following two days of retaliatory strikes against Tehran this week.\n\"The United States is still committed to finding a resolution, and technical talks continue. Iran can never possess a nuclear weapon, the official said.\nThe 60-day ceasefire and memorandum of understanding, the official added, are \"performance-based\" and Iran’s actions \"constitute failed performance at an unacceptable level.\"\n\"Iran’s attacks on these innocent vessels are acts of terrorism\" the official added.
